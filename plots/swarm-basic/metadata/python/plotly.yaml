review:
  strengths:
  - 'Perfect theme-adaptive chrome implementation: all six tokens (PAGE_BG, ELEVATED_BG,
    INK, INK_SOFT, GRID, FILL_COLORS) applied correctly in both renders'
  - 'Excellent data design: four classrooms with intentionally varied distributions
    (wide, tight, bimodal, normal) maximize educational value'
  - Clean KISS code structure with idiomatic plotly patterns and proper sys.path fix
  - Translucent box fills (18% opacity) are aesthetically refined
  weaknesses:
  - 'Primary issue: The dominant visualization is a box-and-whisker plot, not a swarm/beeswarm
    plot. A swarm plot should show only individual points spread to reveal density
    — box/whisker/IQR overlays are not part of the chart type. Replace go.Box with
    go.Scatter, computing non-overlapping beeswarm jitter positions, and add a small
    median marker per group'
  - Box borders on all four traces add visual clutter; no top/right spine removal
  - Jitter is purely random; a swarm plot's value is algorithmic point spreading that
    reveals distribution density through point position, not through box statistics
