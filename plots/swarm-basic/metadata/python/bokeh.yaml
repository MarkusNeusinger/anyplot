review:
  strengths:
  - Perfect spec compliance and data quality — excellent bimodal Sales distribution
    demonstrates swarm plot capabilities
  - All font sizes explicitly set above minimums; both themes render cleanly with
    no legibility failures
  - Median markers add analytical value beyond just showing individual points
  - 'Perfect code quality: reproducible, clean, idiomatic KISS structure'
  weaknesses:
  - Point overlap in dense clusters (especially Engineering near y=80) — jitter algorithm
    is simplified approximation; tighten bin_size or implement proper beeswarm collision
    resolution
  - outline_line_color = INK_SOFT creates visible box frame; set to None for L-shaped
    spine aesthetic
  - tools="" wastes Bokeh interactive advantage — add HoverTool with department and
    score to make HTML output meaningful
  - y-axis range (25–108) has large empty space below data; tighten to ~45–105 for
    better canvas utilization
  - Numeric axis with major_label_overrides is non-idiomatic — Bokeh recommends x_range=categories
    for categorical axes
