review:
  strengths:
  - Excellent data quality with realistic, varied distributions showcasing swarm plot
    strengths (bimodal Sales, HR outliers)
  - Clean idiomatic Altair code using transform_calculate for jitter and proper layer
    composition
  - Full theme-adaptive chrome with correct Okabe-Ito palette and background tokens
    in both renders
  - Mean diamond markers with dashed reference lines add analytical value beyond a
    plain scatter
  - Font sizes explicitly set throughout; both light and dark renders are fully readable
  weaknesses:
  - Vega-Lite random() jitter in transform_calculate is not reproducible — pre-compute
    numpy-seeded jitter offsets as a dataframe column instead
  - configure_view stroke creates a visible border around the plot area adding visual
    clutter — remove or set stroke=None
  - Y-axis extends to 20 but data starts around 40 — tighten range to approximately
    30-105
  - No visual emphasis on interesting data patterns (Sales bimodality, HR extreme
    outliers) — use opacity or size variation to guide the viewer
  - Typography is functional but not intentional — consider heavier title weight or
    removing the legend box border
