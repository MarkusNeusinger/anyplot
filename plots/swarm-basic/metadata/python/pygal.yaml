review:
  strengths:
  - Correct beeswarm/swarm plot type implemented from scratch using pygal.XY — appropriate
    chart type for categorical distribution comparison
  - 'Full Okabe-Ito palette compliance: Engineering=#009E73 (first series), with correct
    canonical order for all 4 departments'
  - 'Theme-adaptive chrome correctly implemented: warm off-white background in light
    render, near-black in dark render, no dark-on-dark failures'
  - Font sizes explicitly set (title=72, labels=48, major_labels=42) and readable
    in both themes
  - Realistic, neutral business scenario (employee performance by department) with
    seed-reproducible data
  - Produces both PNG and interactive HTML output — correctly leverages pygal's distinctive
    interactive SVG feature
  - 'KISS code structure: clean linear flow, no functions/classes, proper np.random.seed(42)'
  weaknesses:
  - 'Design Excellence is underdeveloped (9/20): no mean/median markers per category,
    no visual hierarchy or data storytelling element, looks like a configured default
    rather than a polished publication'
  - Beeswarm overlap detection uses square (AABB) logic instead of circular distance,
    causing visible point overlap in dense regions (Marketing 60-70 range, Engineering
    80-85 cluster) — VQ-02 penalized
  - No mean or median marker overlaid per category, which the spec explicitly suggests
    — missed opportunity for DE-03 storytelling and SC-02 feature completeness
  - Y-axis label 'Performance Score' has no units — penalized VQ-06; consider adding
    '(0-100 scale)' or similar
  - Performance scores exceed 100 (Sales has points at ~106 and ~114) which is slightly
    implausible for a 0-100 performance score metric — DQ-03 penalized
  - 'Library Mastery could be stronger: pygal''s Box chart type should be considered
    as a fallback for comparison; tooltips and HTML export are used but no pygal-specific
    trick beyond that'
  - 'DE-02: minimal visual refinement beyond grid toggles — opacity=0.85 is subtle
    but no whitespace tuning, no spine adjustment (pygal allows some via margin settings)'
  image_description: |-
