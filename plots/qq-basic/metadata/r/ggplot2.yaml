review:
  strengths:
  - Confidence envelope (95% pointwise normal-theory band, narrower in the dense center
    / wider in the tails) directly answers attempt 1's LM-02/DE-03 feedback with a
    statistically sound, well-commented addition
  - Point alpha reduced from 0.75 to 0.6, improving separation in the dense central
    cluster as attempt 1 suggested
  - Reference line and confidence band both use the theme-adaptive neutral ink token
    rather than a palette color -- correct semantic choice since they're baseline/reference
    elements, not data series
  - Theme tokens correctly threaded through all chrome; both renders are fully theme-correct
    with identical data colors
  - Realistic, neutral shaft-diameter QC dataset (n=150, mean=25.00mm, sd=0.08mm),
    clean KISS code, correct canvas dimensions
  weaknesses:
  - Grid lines use full INK color rather than a lighter/faded tint (library.md's own
    guidance says "faint INK color") -- at the current 0.15mm linewidth this reads
    fine, but a slightly lighter shade would give more headroom
  - coord_fixed() for a literal 1:1 quantile aspect ratio (suggested in attempt 1)
    still not applied -- would be a small additional distinctive touch
  - No annotation calls out the specific tail-deviation points now that the confidence
    band shows some points near/at the envelope edge -- a light callout on the most
    extreme point would sharpen the story further
