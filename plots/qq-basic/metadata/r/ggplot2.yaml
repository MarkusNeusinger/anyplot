review:
  strengths:
  - Idiomatic use of stat_qq() / stat_qq_line() — the canonical ggplot2 grammar-of-graphics
    approach to Q-Q plots, cleaner than manually computing quantiles
  - Theme tokens (PAGE_BG / INK / INK_SOFT) correctly threaded through all chrome
    elements; both renders are theme-correct with identical data colors between light
    and dark
  - Realistic, neutral QC dataset (shaft diameter machining measurements, n=150) within
    the spec's recommended 30-500 range, with plausible mm-scale values
  - Thoughtful design decision to render the diagonal reference line in neutral ink
    rather than a palette color, since it is a baseline/reference element rather than
    a data series
  - Correct canvas dimensions (3200x1800 landscape), clean KISS code with set.seed(42)
    and no unused imports
  weaknesses:
  - Design excellence is competent but plain — no annotation calling out the tail
    deviations (e.g. the heavier-tail curvature at both ends), no subtitle giving
    sample context (n=150), and no additional distinctive layering beyond the two
    base stat layers
  - Dense clustering of points near the center (theoretical quantile ~0) forms a solid
    green blob due to natural Q-Q distribution shape — slightly lowering alpha (e.g.
    to ~0.6) in that band would improve individual-point separation, though current
    alpha=0.75 is acceptable
  - 'LM-02: only stat_qq + stat_qq_line are used; consider coord_fixed() for a literal
    1:1 aspect ratio, or a confidence-band overlay, to showcase more ggplot2-specific
    Q-Q refinements'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white, not dark.
      Chrome: Title "qq-basic · r · ggplot2 · anyplot.ai" in dark ink (INK), clearly readable top-left. Axis titles "Theoretical Quantiles" (x) and "Sample Quantiles" (y) in dark ink, fully legible. Tick labels in softer dark gray (INK_SOFT), legible. Major gridlines (horizontal and vertical) in light gray, subtle but visible.
      Data: ~150 green (#009E73) points, alpha=0.75, clustered densely near the center (theoretical quantile ~0, sample ~25.0) with visible slight tail curvature at both extremes indicating a marginally heavy-tailed sample. A black 45-degree reference line (INK) runs diagonally through the point cloud, clearly visible and distinguishable in color from the data points.
      Legibility verdict: PASS — all text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black, not light.
      Chrome: Title and axis titles rendered in light cream ink, clearly readable against the dark surface. Tick labels in lighter gray (INK_SOFT), legible. Gridlines in subtle light gray, visible without dominating.
      Data: Points are identical green (#009E73) to the light render, confirming data-color consistency across themes as required. The reference line correctly flips to a near-white/light color (INK for dark theme), remaining clearly distinguishable from the green points.
      Legibility verdict: PASS — all text is clearly readable against the dark background; no dark-on-dark failures detected. Brand green remains visible on both surfaces.
