review:
  strengths:
  - 'Directly addresses attempt 1''s feedback: the deviating-tail plot bands with
    ''Deviating tail'' labels and the size/opacity split between tail markers (radius
    5.5, opaque) and mid-cluster markers (radius 3.5, alpha 0.55) turn a generic scatter
    into a plot that visually explains the skew.'
  - Deterministic seeded data generation via a tiny fixed-seed LCG plus a self-contained
    inverse-normal-CDF (Acklam's approximation) — statistically correct sample-vs-theoretical
    quantile mapping with no external dependency.
  - 'The y = x reference line is a separate non-interactive dashed series (`enableMouseTracking:
    false`, `marker: { enabled: false }`) styled with the theme-adaptive `neutral`
    role (t.ink) rather than spending a categorical palette slot on it — correct semantic
    use per the style guide.'
  - Right-skewed page-load-time dataset (lognormal, seed 42) is a realistic, neutral
    domain choice that produces a clean, textbook S-curve deviation immediately visible
    in both renders.
  - 'Full theme-token compliance: identical brand-green (#009E73) data color between
    light/dark renders, with ink/inkSoft/grid correctly threaded through title, subtitle,
    axes, legend, and the reference line (which correctly flips black→white for dark-mode
    visibility).'
  weaknesses:
  - The 'Deviating tail' plotBand labels are set at 11px CSS — legible at full resolution
    but will shrink below ~2px when the PNG is scaled to the ~400px mobile preview;
    bump to ~13-14px to stay readable at that width.
  - X-axis title 'Theoretical Quantiles' and Y-axis title 'Sample Quantiles (z-score)'
    are asymmetric in unit annotation — both are z-scores under a standard normal
    reference, so appending '(z-score)' to the X-axis title too would make the pair
    fully consistent.
  - 'Library Mastery is good but not maximal: the plotBand + per-point marker override
    combo is a genuine Highcharts-specific technique, but nothing pushes further into
    truly unique territory (e.g. a `Highcharts.SVGRenderer` custom annotation or a
    responsive rule).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark-ink title "qq-basic · javascript · highcharts · anyplot.ai" and soft-grey subtitle "Page load times vs. normal distribution" both clearly readable. Axis titles "Theoretical Quantiles" / "Sample Quantiles (z-score)" and tick labels render in soft grey, gridlines are light and subtle. Two pale-green shaded plotBands sit at the left and right edges (beyond |theoretical quantile| > 1.15) with small italic "Deviating tail" labels in the top corners.
      Data: Brand-green (#009E73) diamond "Sample" markers — larger and fully opaque in the tail bands, smaller and translucent (alpha 0.55) in the dense mid-cluster — trace a clear upward-bowing curve away from the black dashed y=x reference line, consistent with a right-skewed distribution.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title, subtitle, axis titles, tick labels, and legend all flip to light/soft-grey and remain clearly readable; no dark-on-dark failures. The reference line correctly switches from black to white dashed to stay visible against the dark surface. The plotBand shading and "Deviating tail" labels are preserved and legible.
      Data: Sample markers are the identical brand green as the light render (#009E73, same tail/mid-cluster size and opacity split) — data colors are unchanged between themes, only chrome flipped.
      Legibility verdict: PASS
