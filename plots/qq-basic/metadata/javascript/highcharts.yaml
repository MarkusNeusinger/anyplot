review:
  strengths:
  - Deterministic seeded data generation with a self-contained inverse-normal-CDF
    (Acklam's approximation), giving a statistically correct sample-vs-theoretical
    quantile mapping.
  - 'The y = x reference line is its own non-interactive dashed series (enableMouseTracking:
    false) so it never fights the Sample series for tooltip/legend focus — a thoughtful
    Highcharts-specific touch.'
  - Axis min/max are computed from the full point range with symmetric padding on
    both axes, keeping the diagonal reference line fully visible and the aspect visually
    square.
  - Right-skewed page-load-time dataset is a realistic, neutral domain choice that
    produces a textbook S-curve/heavy-tail deviation — a good illustration of the
    plot's diagnostic purpose.
  - 'Full theme-token compliance: identical brand-green data color between light/dark
    renders, with ink/inkSoft/grid correctly threaded through title, subtitle, axes,
    and legend in both themes.'
  weaknesses:
  - Sample markers cluster tightly in the theoretical-quantile range roughly -1..1,
    causing minor overlap in the mid-section; a slightly smaller marker radius (~3.5)
    or lower opacity there would improve mid-cluster clarity.
  - Library Mastery is generic — beyond dashStyle and enableMouseTracking:false, nothing
    showcases a Highcharts-distinctive feature (e.g. an annotation calling out the
    deviating tail, or a labeled band highlighting the heavy-tail region).
  - Design Excellence is functional but plain — visual hierarchy relies on color alone;
    emphasizing the deviating tail points (size/opacity contrast vs. the well-fit
    middle) would strengthen the data storytelling (DE-03).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1-range), not pure white, not dark — matches the light-theme token.
      Chrome: Title "qq-basic · javascript · highcharts · anyplot.ai" in bold dark ink, subtitle "Page load times vs. normal distribution" in soft grey, both clearly readable. X-axis title "Theoretical Quantiles" and Y-axis title "Sample Quantiles (z-score)" in soft grey, readable. Tick labels dark grey, readable. Gridlines light grey, subtle but visible. Legend at bottom ("Reference (y = x)", "Sample") in soft grey, readable.
      Data: First (and only) categorical series "Sample" is the brand green #009E73 diamond markers; the reference line is a black dashed line (chrome color, not a data series) running diagonally corner to corner. Points trace a mild S-curve that bows above the reference line on the left tail and above it on the right tail, revealing a right-skew/heavy-tail deviation from normality.
      Legibility verdict: PASS — all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17-range), not pure black, not light — matches the dark-theme token.
      Chrome: Title and subtitle now in light/white and soft grey respectively, both clearly readable. Axis titles and tick labels in light grey, readable. Gridlines dark-but-visible grey. Legend text in light grey, readable. The reference line correctly flips from black to white dashed so it stays visible on the dark surface.
      Data: The "Sample" series markers are the identical brand green #009E73 diamonds as in the light render — confirming data colors do not change between themes, only chrome flips.
      Legibility verdict: PASS — all text is clearly readable against the dark background; no dark-on-dark failures observed (title, axis labels, tick labels, and legend all have sufficient contrast).
