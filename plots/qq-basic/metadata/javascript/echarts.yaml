review:
  strengths:
  - 'Statistically correct Q-Q plot: Blom''s plotting positions matched to sorted,
    standardized sample quantiles against a proper inverse-normal-CDF approximation
    (Acklam''s algorithm), not a naive shortcut.'
  - 45-degree y=x reference line correctly spans the theoretical-quantile data range
    and uses the theme-adaptive neutral ink token rather than a data-palette color,
    matching the style guide's semantic-anchor rule for reference lines.
  - 'Both renders are fully theme-correct: warm off-white / warm near-black backgrounds,
    all chrome (title, axis names, ticks, legend, gridlines) readable in both themes,
    and the brand-green marker color is identical across themes.'
  - Right-skewed reaction-time dataset (lognormal-like via exp(sigma*z)) gives a genuinely
    informative Q-Q plot where the tail deviation from the reference line is visible
    and meaningful, not just noise around the line.
  - 'Deterministic and reproducible: fixed-seed LCG (seed=42) with no external RNG
    dependency, appropriate for the browser-only ECharts runtime.'
  - 'Clean mount-node/harness contract: animation disabled, echarts.init called with
    no explicit size/devicePixelRatio, single chart instance, satisfying CQ-05 and
    the canvas gate.'
  weaknesses:
  - Three numeric helper functions (makeLcg, standardNormal, invNormCdf) push the
    script past a strict single-flow KISS structure; largely justified by the lack
    of a seeded RNG / erfinv in the browser, but keep an eye on further growth.
  - Styling stays close to the token-driven defaults (standard axisLine/splitLine
    treatment, no distinctive ECharts-only feature such as a custom legend, visualMap,
    or graphic annotation calling out the tail deviation) — a bit more visual emphasis
    on the skewed tails (e.g., a subtle annotation or shaded band) would sharpen the
    data storytelling and better showcase ECharts' distinctive capabilities.
  - Legend uses generic default marker styling for the two series; a slightly larger
    legend text or spacing tweak could improve visual hierarchy against the title,
    though no actual overlap occurs.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), matches the required light-theme surface.
      Chrome: Title "qq-basic · javascript · echarts · anyplot.ai" centered at top in dark ink, clearly legible. Legend top-right ("Reaction times" filled green dot, "Reference (y = x)" dashed line with open marker) in dark ink text. X-axis "Theoretical Quantiles" and Y-axis "Sample Quantiles (z-score)" labels in dark ink, tick labels in a slightly softer ink tone, gridlines subtle light gray, axis lines at x=0/y=0 slightly bolder for orientation. All text is readable against the light background.
      Data: ~120 green (#009E73) scatter points forming a monotonic S-curve, following a black dashed 45-degree reference line down the center, with visible upward/downward deviation at both tails (heavier tails than normal, consistent with the right-skewed reaction-time data). First series is the brand green as required.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), matches the required dark-theme surface.
      Chrome: Same title, legend, and axis labels now rendered in light ink (off-white), clearly legible against the dark background. Reference line rendered in light/near-white dashed strokes (theme-adaptive neutral token) instead of black. Gridlines subtle, still visible but not dominant. No dark-on-dark or light-on-light failures observed anywhere.
      Data: Scatter points are the identical green (#009E73) as in the light render — confirmed unchanged across themes, satisfying the Imprint palette identity requirement. Same S-curve shape and tail deviation pattern as the light render.
      Legibility verdict: PASS
