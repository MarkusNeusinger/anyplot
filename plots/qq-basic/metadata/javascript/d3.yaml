review:
  strengths:
  - Deterministic, seeded data generation (mulberry32 + Acklam probit approximation)
    produces a realistic right-skewed reaction-time sample with two explicit outliers,
    giving the Q-Q plot a genuine S-curve/heavy-tail story instead of a boring on-line
    scatter.
  - Reference line uses a normal fit to the sample (mean/stddev estimated with d3.mean/d3.deviation)
    rather than a naive raw y=x, and is clearly labeled 'Normal fit (y = x)'.
  - Equal left+right and top+bottom margin sums keep the plot area square so the diagonal
    renders at a true visual 45 degrees — a subtle but important correctness detail
    for Q-Q plots.
  - 'First categorical series correctly uses Imprint #009E73, background/chrome are
    theme-correct in both light and dark renders, and all font sizes are explicitly
    set.'
  - 'Clean idiomatic D3: data-join with .join(), tickSize(-ih)/tickSize(-iw) gridline
    trick with domain removed, standard margin convention.'
  weaknesses:
  - Axis labels 'Theoretical Quantiles' / 'Sample Quantiles' are descriptive but omit
    units — since the sample is reaction time in ms, label as 'Theoretical Quantiles
    (ms)' / 'Sample Quantiles (ms)' for full VQ-06 credit.
  - 'Design Excellence is only at the ''well-configured default'' tier: consider a
    stronger typographic hierarchy or a secondary annotation calling out the two slow-trial
    outliers directly (e.g. small text near the top-right pair) to push the storytelling
    further.'
  - The dense mid-region of the sample (roughly the 250-350 quantile range) has moderately
    overlapping markers from natural data clustering near the distribution's center
    — a touch more fill-opacity reduction or a slightly smaller radius in that band
    would improve separation, though this is a minor, largely data-driven effect.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Bold dark title "Reaction Times vs Normal · qq-basic · javascript · d3 · anyplot.ai" centered at top, comfortably sized (~57% width) and fully visible with no clipping. Dark axis titles "Theoretical Quantiles" (bottom, centered) and "Sample Quantiles" (left, rotated) are both clearly legible. Tick labels along both axes (100-550 range) are readable, medium-gray. Subtle beige gridlines on both axes are visible but not dominant. A dashed gray diagonal reference line runs from bottom-left to top-right at a true 45 degrees (square plot area), labeled "Normal fit (y = x)" in italic gray text at the top-right, positioned within the top margin band without overlapping the title or the plot corner.
      Data: All points rendered in Imprint green (#009E73) with a thin light-colored (page-background) stroke ring separating overlapping markers. The point cloud follows the diagonal closely through the mid-range (~200-350) then visibly bows above the line in the upper tail, ending in a cluster of 5-6 clearly separated outlier points and one distinctly isolated topmost point (~425, 540) — a textbook right-skew/heavy-tail Q-Q signature. Lower tail also deviates slightly above the line. No text overlaps data or other text.
      Legibility verdict: PASS — all title, axis-label, and tick text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Title, axis titles, and tick labels all render in light/white text, clearly legible against the dark background. Gridlines are subtle dark-gray, still visible. The dashed reference line and "Normal fit (y = x)" annotation remain legible in light gray. No dark-on-dark failures observed anywhere — every text element (title, axis titles, tick labels, annotation) uses a light ink token.
      Data: Marker fill color, opacity, and stroke treatment are visually identical to the light render (#009E73 green, same size/alpha), confirming data colors do not shift between themes — only chrome (background, text, grid) flips as required. Same distribution shape and outlier cluster visible.
      Legibility verdict: PASS — all text is clearly readable against the dark background; brand green remains vivid on both surfaces.
