review:
  strengths:
  - 'Correct Q-Q plot construction: sorted sample quantiles plotted against theoretical
    normal quantiles via Acklam''s inverse-CDF approximation, with a clearly visible
    dashed 45-degree reference line'
  - 'Fully deterministic and self-contained: seeded Park-Miller LCG + Box-Muller sampler
    + inverse-normal rational approximation, no external dependencies'
  - 'First (and only data) series uses brand green #009E73 correctly; the reference
    line uses the theme-adaptive ink token rather than a palette color, which is the
    right semantic choice since it''s a guide, not data'
  - 'Theme-adaptive chrome verified correctly in both renders: title/axis labels/ticks/grid/legend
    all flip appropriately, data green is identical across themes'
  - Title font size scales with title length via the linear formula, keeping the descriptive-prefixed
    title well within canvas bounds
  - 'Realistic, neutral data narrative (precision gauge calibration residuals) that
    also demonstrates the diagnostic value of a Q-Q plot: the S-shaped deviation at
    both tails visibly signals heavy tails/outliers, matching the spec''s stated use
    case'
  weaknesses:
  - 'Design Excellence is fairly standard: relies on default Chart.js scatter+line
    combo styling with token-based colors; no additional visual device (e.g. a subtle
    confidence band, or an annotation calling out the largest deviation) to elevate
    storytelling beyond the bare reference line'
  - Markers in the dense mid-region (theoretical quantiles roughly -1 to 1) touch/overlap
    slightly at radius 6 with only ~80% opacity; a touch more transparency or a slightly
    smaller radius would reduce clumping in that band
  - The dashed reference line's padding is computed from the data's min/max coordinates
    (8% of data range) rather than the chart's auto-scaled axis extent, so it visibly
    stops short of the plot corners instead of spanning the full visible diagonal
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "Calibration Residuals · qq-basic · javascript · chartjs · anyplot.ai" in dark ink at top, legend below it with a green swatch labeled "Sample vs. Theoretical" and a dashed-line swatch labeled "Reference Line (y = x)". Axis titles "Theoretical Quantiles" (x) and "Sample Quantiles" (y) in dark ink; tick labels in a softer gray; grid lines are thin and subtle on both axes.
      Data: ~100 green (#009E73) circular markers with a thin off-white/page-colored edge, tracing an S-curve that hugs a black dashed 45-degree reference line through the middle and bows away at both tails (heavy-tail/outlier signature).
      Legibility verdict: PASS — all title, legend, axis, and tick text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title and legend text now rendered in near-white/light ink; axis titles and tick labels flip to light tones; grid lines are thin, subtle, and light-toned; the dashed reference line flips from black to white/light so it stays visible against the dark surface.
      Data: The same ~100 green (#009E73) markers in the identical positions and identical hue as the light render — confirming data colors are unchanged across themes.
      Legibility verdict: PASS — no dark-on-dark issues; all title, legend, axis, and tick text is clearly readable against the dark background.
