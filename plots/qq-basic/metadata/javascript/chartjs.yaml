review:
  strengths:
  - 'Both attempt-1 weaknesses fully resolved: the reference line''s padding now matches
    the axes'' explicit min/max, so the dashed line reaches the plot corners in both
    renders; a new tailCalloutPlugin (native Chart.js afterDatasetsDraw hook) draws
    a leader-line annotation calling out the largest tail deviation'
  - 'Correct, fully deterministic Q-Q construction: seeded Park-Miller LCG + Box-Muller
    sampler + Acklam''s inverse-normal rational approximation, no external dependencies'
  - Theme-adaptive chrome verified in both renders — title/axis labels/ticks/grid/legend/reference-line
    all flip correctly; data green identical across themes
  - 'Marker density improved: radius reduced from 6 to 5 with alpha lowered to ~70%,
    reducing clumping in the dense mid-region (theoretical quantiles -1 to 1)'
  - Realistic, neutral data narrative (precision gauge calibration residuals) whose
    S-shaped deviation at both tails visibly demonstrates the diagnostic value of
    a Q-Q plot
  weaknesses:
  - Tick label font (13px) is a touch small relative to the axis title font (16px)
    — could be nudged up 1-2px for stronger visual balance, though currently readable
    in both themes
  - Design Excellence, while improved, still relies primarily on token-driven default
    styling plus one annotation; a secondary visual device (e.g., a subtle shaded
    confidence band around the reference line) would push storytelling further
