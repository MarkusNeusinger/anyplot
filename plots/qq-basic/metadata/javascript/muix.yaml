review:
  strengths:
  - 'Statistically rigorous Q-Q construction: Blom plotting positions ((i-0.375)/(n+0.25)),
    an accurate inverse-normal CDF (Acklam''s rational approximation), and z-score
    standardization ensure a perfectly Normal sample would land exactly on y = x.'
  - Deliberately right-skewed lognormal sample data clearly demonstrates the spec's
    core teaching point — the upper-tail points visibly bow away from the diagonal,
    a textbook skew signature.
  - 'Idiomatic MUI X composition: builds the chart from ChartContainer + ScatterPlot
    + ChartsGrid + axis components instead of the monolithic ScatterChart, and uses
    useXScale/useYScale hooks to inject a scale-synced y = x reference line — a genuinely
    library-distinctive technique that would need real replumbing in another library.'
  - 'Clean theme handling: title, subtitle, axis labels, tick labels, grid, and reference
    line all read theme tokens (t.ink, t.inkSoft, t.pageBg) so both light and dark
    renders are fully legible with no dark-on-dark / light-on-light failures.'
  - Thoughtful typographic hierarchy plus a descriptive subtitle that narrates the
    statistical finding ('upper-tail curvature reveals right skew'), giving the plot
    a clear focal point without needing per-point annotations.
  - Clean L-frame spine masking (background-colored overlay lines) removes the top/right
    spines without leaving artifacts, and margins/whitespace are balanced with no
    clipped or crowded elements.
  weaknesses:
  - In the dense central cluster (roughly theoretical quantiles -1.0 to +0.5) the
    markerSize=9 scatter points touch and merge into solid blobs with no way to tell
    individual points apart — reduce marker size slightly or add opacity (alpha ~0.7-0.85)
    / a subtle white stroke (edgecolors) so overlapping points stay distinguishable,
    per the style guide's overlapping-marker guidance.
  - The mandated title renders comfortably small (~35-40% of plot width) at fontsize=22
    — well under the ~70-85% typically expected for the full 67-character mandated
    string; a slightly larger title fontsize would better anchor the page hierarchy
    (minor, not a legibility failure).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), consistent with the required light-theme surface — not pure white.
      Chrome: Bold dark title "qq-basic · javascript · muix · anyplot.ai" centered at top, with a smaller gray-brown subtitle underneath ("Order fulfillment time (n = 60, standardized) vs. Normal — upper-tail curvature reveals right skew"). Axis titles "Theoretical Quantiles" (x) and "Sample Quantiles" (y) and all tick labels render in dark/soft-dark ink, fully legible. Subtle warm-gray grid lines run both horizontally and vertically. Top and right spines are cleanly masked (no visible border), leaving an implicit L-frame. A dashed gray diagonal (y = x) reference line runs corner to corner with a caption "– – – y = x (perfect Normal fit)" in the upper right, positioned with clear space above the nearest data point (no overlap).
      Data: 60 solid brand-green (#009E73) circular markers trace the sample quantiles against theoretical quantiles. The markers sit almost exactly on the diagonal through the middle of the range and curve visibly above the line in the upper-right tail, correctly visualizing right skew. In the dense central cluster (theoretical quantiles roughly -1.0 to +0.5) many markers touch/overlap and merge into a continuous blob since no alpha or edge-stroke was applied to separate them.
      Legibility verdict: PASS — all text (title, subtitle, axis titles, tick labels, reference-line caption) is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), consistent with the required dark-theme surface — not pure black.
      Chrome: Same title/subtitle/axis-title/tick-label layout as the light render, now rendered in light ink (white/near-white title, light-gray subtitle and tick labels) — fully legible against the dark background, no dark-on-dark failures anywhere. Grid lines are a subtle light-gray at low opacity, visible but not competing with the data. The dashed y = x reference line and its caption remain clearly visible in light gray, same position, same clear spacing from the nearest marker.
      Data: The same 60 markers are rendered in the identical brand green (#009E73) as the light render — confirmed unchanged between themes, only the chrome (background, text, grid) flipped. The same central-cluster overlap issue is present here as well (inherent to the data/marker size, not theme-dependent).
      Legibility verdict: PASS — every chrome element (title, subtitle, axis titles, tick labels, reference-line caption) is clearly readable against the dark background; no dark-on-dark issues detected.
