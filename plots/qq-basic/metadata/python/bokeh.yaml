review:
  strengths:
  - 95% quantile confidence envelope (varea) adds genuine statistical rigor beyond
    spec requirements, mirroring R's car::qqPlot convention and directly serving the
    spec's guidance about identifying genuine deviations
  - HoverTool with per-point Theoretical Q / Sample Q / Height tooltips plus click-to-hide
    legend showcases Bokeh's distinctive interactivity without harming the static
    PNG
  - Theme-adaptive chrome correctly threaded through title, axis labels, ticks, grid,
    and legend colors; brand green data color is identical between light and dark
    renders
  - Engineered dataset (adult heights core + planted outliers in both tails) produces
    a Q-Q plot that visibly demonstrates heavy-tail deviation, directly matching the
    spec notes about revealing skewness/heavy tails/outliers
  - Canvas is exactly 3200x1800 with no clipped text in either render; toolbar_location=None
    and min_border_* correctly reserved
  weaknesses:
  - Aesthetic sophistication is solid but a fairly standard scatter+line+band composition;
    DE-01 could go further with a bolder visual treatment (e.g. varying envelope opacity,
    more distinctive reference-line styling)
  - Scatter markers (size=14) are adequate but could be slightly larger/bolder to
    serve as a stronger focal point given the large 3200x1800 canvas and ~100 points
  - Title fontsize (50pt) for the short mandated title leaves it occupying only ~35%
    of plot width; within readable range but there is headroom to size it more assertively
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), matches spec.
      Chrome: Bold dark title "qq-basic · bokeh · anyplot.ai" top-left, clearly readable. Italicized axis labels "Theoretical Quantiles" / "Sample Quantiles" in dark ink, fully legible. Tick labels in a softer gray, legible against the light background. Subtle light-gray gridlines, visible but not dominant. Legend box (top-left, off-white elevated background) lists "95% quantile envelope", "Normal reference", "Sample quantiles" in gray text, all readable, no overlap with data points.
      Data: Green (#009E73) scatter points form the Q-Q cloud, a dark dashed 45-degree reference line, and a light-gray shaded confidence envelope band behind the line. Points diverge from the reference line in both tails (heavy-tail pattern from the planted outliers), which is the intended visual story.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), matches spec.
      Chrome: Title, axis labels, and tick labels are rendered in light/off-white and light-gray tones, fully readable against the dark background — no dark-on-dark issues observed. Grid lines are subtle light gray at low alpha, visible but unobtrusive. Legend box uses a dark elevated background with light-gray text, readable and consistent with the theme.
      Data: Same green (#009E73) scatter points, same dashed reference line (now rendered in a light gray-white to contrast the dark background), same gray confidence envelope — data colors and shapes are identical to the light render, confirming only chrome flipped as required.
      Legibility verdict: PASS
