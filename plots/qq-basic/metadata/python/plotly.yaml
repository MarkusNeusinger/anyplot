review:
  strengths:
  - 'Statistically rigorous: Blom''s plotting positions with Winitzki erfinv approximation
    for theoretical quantiles, plus an asymptotic 95% confidence envelope around the
    reference line — well beyond a bare scatter-plus-line Q-Q plot'
  - Sample data mixes two normal components (main body + right-tail bump) so the plot
    visibly demonstrates the S-curve/heavy-tail deviation the spec's Notes section
    calls out, rather than a trivially-normal sample that would show a perfectly straight
    line
  - Theme tokens (PAGE_BG/INK/INK_SOFT/GRID) threaded consistently through paper,
    chrome, axis lines, and legend; both renders pass the light/dark readability check
    with no dark-on-dark or light-on-light text
  - Canvas is exactly 3200x1800 via width=800/height=450/scale=4 with autosize=False
    and pinned margins, per the plotly hard rule
  - 'Data-driven marker/line styling: legendrank establishes a clear visual hierarchy
    (markers > reference line > confidence band), alpha on markers (0.85) and band
    fill (0.15) avoids overplotting at n=100'
  weaknesses:
  - Confidence band and reference line lean entirely on the neutral/muted Imprint
    chrome tokens (INK, INK_MUTED) rather than any second brand-adjacent categorical
    color, which is correct per the palette rules but leaves the plot feeling slightly
    monochrome outside the green markers — a subtle DE-01 opportunity, not a defect
  - No annotation or callout marking the visible tail deviation (points diverging
    from the dashed line past |theoretical| > 1.5) that would turn the skew into an
    explicit story beat for a first-time viewer
  - hovertemplate is customized only for the marker trace; the confidence band and
    reference line rely on hoverinfo='skip', which is reasonable but means the HTML
    detail view offers no interactive read of the band bounds themselves
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "qq-basic · python · plotly · anyplot.ai" top-left in dark ink, clearly legible. X-axis title "Theoretical Quantiles" and Y-axis title "Sample Quantiles" (rotated) both dark and readable. Tick labels on both axes are soft dark grey, legible against the cream background. Legend box (top-left, inside plot area) has an off-white/elevated fill, thin border, and three entries — "Sample Quantiles" (green dot), "Reference (y=x)" (black dashed line), "95% Confidence Band" (grey swatch) — all text dark and readable. Gridlines are faint warm-grey, visible but subtle.
      Data: ~100 green (#009E73) markers tracing a diagonal path against a black dashed y=x reference line, with a light grey shaded 95% confidence envelope around the line. Points hug the line in the middle and show a mild S-curve/upward bow at both tails (from the injected right-tail bump), a legitimate demonstration of the spec's "S-curves/heavy tails" note.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Title, axis titles, and tick labels all render in light ink/off-white and are clearly legible against the dark background — no dark-on-dark failures observed. Legend box uses a dark elevated fill with a light border and light-grey text, fully readable. Gridlines are faint light-grey, visible but subtle, matching the light render's grid density.
      Data: Marker color is identical #009E73 green to the light render — confirmed unchanged. Reference line correctly flips from black dashes (light theme) to white/off-white dashes (dark theme), and the confidence band renders as a darker grey shaded region appropriate to the dark surface. Only chrome flipped; data colors match exactly.
      Legibility verdict: PASS
