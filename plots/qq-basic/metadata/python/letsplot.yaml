review:
  strengths:
  - 'Attempt-1 weakness fixed: the full four-sided box border is gone, replaced with
    panel_border=element_blank() and axis_line drawn only on the bottom/left — a cleaner,
    more minimal frame in both themes'
  - 'Attempt-1 weakness fixed: a contextual annotation ("Heavy tails: points bow away
    from the reference line at both ends") now explicitly calls out the insight the
    data was designed to show, anchored dynamically to the sample''s own quantile
    range so it always lands in the empty upper-left corner'
  - Correct, idiomatic use of lets-plot's dedicated geom_qq/geom_qq_line statistical
    geoms; reference line is a properly fitted (mean/std) line through the sample
    quantiles, the statistically correct convention for a Q-Q plot against an estimated
    normal
  - 'Data tells a clear, textbook story: Student''s t (df=3) draws produce the classic
    heavy-tailed S-curve bowing away from the reference line at both ends, in a realistic,
    neutral manufacturing QC calibration scenario'
  - All font sizes explicitly set (axis_title=12, axis_text=10, plot_title=16, annotation
    size=3.2); Imprint palette (#009E73 primary) and theme-adaptive chrome are both
    correctly and identically applied across light/dark renders
  - Clean KISS structure, seeded RNG, only used imports, correct plot-{THEME}.png/.html
    output via ggsave(scale=4); canvas is exactly 3200×1800 (landscape target, within
    gate)
  weaknesses:
  - 'Aesthetic still reads as a well-refined default rather than fully publication-grade:
    a single accent color plus a muted dashed reference line and one text annotation
    is solid but not yet FiveThirtyEight-level polish — further hierarchy (e.g. subtle
    emphasis on the tail points themselves) could push Design Excellence higher'
  - Marker density in the dense mid-quantile cluster (~[-0.7, 0.7] theoretical quantiles)
    is fairly tight with many overlapping points at size=2.5/alpha=0.75; a touch smaller
    or slightly lower alpha in that region would ease the crowding without weakening
    the tail signal
  - No lets-plot-distinctive feature is leveraged beyond the basic statistical geoms
    plus a text layer — interactive tooltip customization, faceting, or other library-unique
    theme features remain unused
