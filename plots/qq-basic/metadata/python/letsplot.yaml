review:
  strengths:
  - Correct, idiomatic use of lets-plot's dedicated geom_qq/geom_qq_line statistical
    geoms rather than manually computing quantiles
  - Reference line correctly reflects a fitted (mean/std) line through the sample
    quantiles rather than a naive y=x, which is the statistically correct convention
    for a Q-Q plot against an estimated normal
  - 'Data tells a clear, textbook story: Student''s t (df=3) draws produce the classic
    heavy-tailed S-curve bowing away from the reference line at both ends'
  - Realistic, neutral manufacturing QC scenario with plausible pressure values (85-116
    psi)
  - All font sizes explicitly set (axis_title=12, axis_text=10, plot_title=16), matching
    library-recommended defaults
  - Clean KISS structure, seeded RNG, only used imports, correct plot-{THEME}.png/.html
    output via ggsave(scale=4)
  - 'Imprint palette respected: primary series is #009E73, identical between light
    and dark renders; theme-adaptive chrome (background, text, grid) correctly flips
    between #FAF8F1 and #1A1A17'
  weaknesses:
  - Panel renders with a full four-sided box border (top/right/bottom/left axis lines)
    in both themes instead of an open bottom+left axis — reads as a library default
    rather than a refined, minimal frame; set axis_line to only draw on the bottom/left
    (or override the top/right panel border to element_blank()) for a cleaner look
  - No visual hierarchy or annotation calling out the heavy-tail deviation the data
    was specifically designed to show — a viewer must notice the S-curve themselves;
    consider a subtle annotation or emphasis marking where sample quantiles depart
    from the reference line at the tails
  - 'Design feels like a well-configured default rather than a distinctive, polished
    chart: palette is minimal (one series + one neutral reference line), grid/whitespace
    are fine but unremarkable — push aesthetic sophistication further (e.g. slightly
    refined grid treatment, more deliberate visual hierarchy between line and points)'
  - geom_qq/geom_qq_line usage is correct but fairly generic within lets-plot's toolkit
    — no distinctive lets-plot-only feature (e.g. interactive tooltip customization,
    faceting, or theme features unique to the library) is leveraged beyond the basic
    statistical geoms
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "qq-basic · python · letsplot · anyplot.ai" in dark ink top-left, clearly legible. X-axis title "Theoretical Quantiles" and y-axis title "Sample Quantiles (Pressure, psi)" in dark ink, both readable. Tick labels in a slightly lighter gray-ink, all legible. Subtle light-gray gridlines on both axes, visible but unobtrusive. The panel is enclosed by a thin box border on all four sides (full rectangle frame) rather than an open bottom/left axis.
      Data: Green (#009E73) circular markers (alpha ~0.75) tracing an S-shaped curve; a solid dark-gray diagonal reference line runs through the middle. Points closely hug the line in the [-1, 1] theoretical-quantile range and bow away from it at both tails (heavy-tailed signature), with sparse outlier points at each extreme.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Title, axis titles, and tick labels rendered in light/off-white ink, all clearly legible against the dark background — no dark-on-dark text found. Gridlines are a muted light-gray, subtle but visible. Same full-box panel border as the light render, now in light ink.
      Data: Same green (#009E73) markers and same S-curve shape/positions as the light render — data colors are identical between themes as required. Reference line is now a light-gray line (chrome color flipped correctly), clearly visible against the dark panel.
      Legibility verdict: PASS
