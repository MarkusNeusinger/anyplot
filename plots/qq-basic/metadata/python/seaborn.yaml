review:
  strengths:
  - 'Genuinely creative reference guide: a 300-replicate 95% simulation envelope built
    with sns.lineplot(estimator=''mean'', errorbar=(''pi'', 95)) instead of a bare
    y=x line, giving the Q-Q plot real statistical depth and leaning on seaborn''s
    own estimation machinery.'
  - 'Correct Imprint palette usage: sample quantiles use brand green #009E73, and
    the reference band/line uses the theme-adaptive muted/neutral token in its confidence-band
    role rather than spending a categorical color on it.'
  - Theme-adaptive chrome is threaded consistently through sns.set_theme rc params
    — both light and dark renders are fully legible with no dark-on-dark or light-on-light
    failures.
  - 'Both fixes from the Attempt 1 review are correctly applied and now reflected
    in the render: title reads ''qq-basic · python · seaborn · anyplot.ai'' and marker
    size was reduced to s=90, sitting comfortably in the density-appropriate range
    for ~200 points.'
  - Clean, idiomatic KISS structure, reproducible via a seeded np.random.default_rng(42),
    spines removed, subtle grid, realistic mixture-distribution sample (normal core
    + right-tail bump) that visibly demonstrates the Q-Q deviation the spec asks for.
  weaknesses:
  - Only the upper/right tail visibly strays from the reference envelope; the sample
    could show a touch more variety in deviation (e.g. mild left-tail behavior) for
    fuller Q-Q feature coverage — minor polish item, not a correctness issue.
  - In the dense mid-section (theoretical quantiles roughly -1 to 1), overlapping
    markers merge into a near-continuous ribbon; a hair more transparency or slightly
    smaller markers there would keep individual points distinguishable, though this
    does not rise to an Element Visibility failure.
