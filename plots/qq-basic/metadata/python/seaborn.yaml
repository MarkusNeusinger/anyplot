review:
  strengths:
  - 'Genuinely creative reference guide: a 300-replicate 95% simulation envelope built
    with sns.lineplot(estimator=''mean'', errorbar=(''pi'', 95)) instead of a bare
    y=x line, giving the QQ plot real statistical depth and leaning on seaborn''s
    own estimation machinery.'
  - 'Correct Imprint palette usage: sample quantiles use brand green #009E73, and
    the reference band/line uses the theme-adaptive muted/neutral token in its documented
    ''confidence-band fill'' role rather than spending a categorical color on it.'
  - Theme-adaptive chrome is threaded consistently through sns.set_theme rc params
    — both light and dark renders are fully legible with no dark-on-dark or light-on-light
    failures.
  - Clean, idiomatic KISS structure (imports -> data -> plot -> save), reproducible
    via a seeded np.random.default_rng(42), spines removed, subtle grid.
  - Realistic mixture-distribution sample (normal core + right-tail bump) clearly
    demonstrates the Q-Q deviation the spec asks for.
  weaknesses:
  - Title reads 'qq-basic · seaborn · anyplot.ai' — missing the mandated language
    segment. Per SC-04 it must be '{spec-id} · {language} · {library} · anyplot.ai',
    i.e. 'qq-basic · python · seaborn · anyplot.ai'. Fix the ax.set_title() string.
  - Marker size (s=120, alpha=0.75) for a ~200-point scatter is a bit larger than
    the density-appropriate 50-100 range for the 100-300 point bucket — reduce slightly
    (e.g. s=90) to cut down on marker-to-marker crowding in the dense mid-section.
  - Only the upper/right tail visibly strays from the reference envelope; the sample
    could show a touch more variety in deviation (e.g. mild left-tail behavior) for
    fuller Q-Q feature coverage, though this is a minor polish item, not a correctness
    issue.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "qq-basic · seaborn · anyplot.ai" in dark ink, clearly legible; axis labels "Theoretical Quantiles" / "Sample Quantiles" in dark ink; tick labels in a softer dark-gray; legend box (cream fill, dark border) in the upper-left reads "Normal reference (95% envelope)" and "Sample quantiles", both fully legible; grid lines are faint and unobtrusive.
      Data: Green (#009E73) circular markers trace the sample quantiles against theoretical quantiles from -3 to 3, tracking closely to a dashed gray identity line surrounded by a light-gray 95% simulation-envelope band; the markers curve above the envelope in the upper-right (theoretical quantile > ~1.2), visibly showing the right-tail deviation from normality baked into the sample data.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Title, axis labels rendered in light ink (near-white), fully legible against the dark background; tick labels in a lighter gray, also legible; legend box (dark-elevated fill, light border) with light text, no dark-on-dark issues anywhere; grid lines faint but visible.
      Data: Same #009E73 green markers as the light render (identical hue, confirming data-color parity across themes), same dashed reference line (now light gray) and simulation envelope (dark gray shading), with the same upper-tail deviation pattern.
      Legibility verdict: PASS.

    Both renders are theme-correct and readable; no dark-on-dark or light-on-light failures observed. The title text itself, however, is missing the mandated language segment ("python") in both renders — a Spec Compliance defect, not a legibility one.
