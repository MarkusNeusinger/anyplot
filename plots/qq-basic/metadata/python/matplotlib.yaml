review:
  strengths:
  - Idiomatic scipy.stats.probplot usage for computing quantiles, plus a properly-derived
    95% pointwise confidence band (order-statistic standard error formula) — a genuinely
    distinctive, statistically rigorous touch beyond a bare scatter+line Q-Q plot.
  - Exact spec-compliant title and axis labels ("Theoretical Quantiles" / "Sample
    Quantiles"), correct Imprint palette usage (brand green scatter, position-2 purple
    reference line), and fully correct theme-adaptive chrome in both renders.
  - 'Realistic, well-motivated data: bimodal systolic blood pressure mixture (normotensive
    + hypertensive cohorts) that produces a visually interesting, diagnostically meaningful
    S-shaped deviation from the reference line — directly demonstrating the "deviations
    reveal distribution characteristics" note from the spec.'
  - 'Clean, reproducible, single-purpose script: seeded RNG, no unused imports, no
    functions/classes, canvas exactly 3200x1800.'
  weaknesses:
  - Dense clustering of roughly 40 overlapping points in the central quantile range
    (theoretical quantile approx -0.5 to 0.7) makes individual points hard to distinguish
    even with edge highlighting and alpha=0.75 — consider slightly reducing marker
    size (e.g. s=70) in that region's visual weight or increasing edge contrast to
    better separate the densest cluster.
  - Design relies mostly on the CI band as its single distinguishing technique; DE-01/DE-02
    could be pushed further with, e.g., a light annotation calling out the tail deviation
    or the bimodal jump around quantile 0.5-0.7 to reinforce the diagnostic use case
    named in the spec notes.
  - Both x- and y-axis grids are drawn at identical alpha/color — functional but not
    exceptional; a slightly more restrained grid (e.g. lighter x-grid since the diagonal
    reference line already anchors horizontal reading) could refine the layout further.
