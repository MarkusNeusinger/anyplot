review:
  strengths:
  - Correct Q-Q construction via scipy.stats.probplot with a properly derived 95%
    pointwise confidence band (not just eyeballed)
  - Bimodal blood-pressure data (normotensive + hypertensive cohorts) creates a genuine,
    visible upper-tail deviation from normality — the plot demonstrates exactly the
    distribution characteristics the spec calls out (S-curve/tail effects)
  - Annotation calls out the hypertensive-cohort deviation, giving the chart a clear
    focal point and story instead of a raw point cloud
  - 'Clean theme-adaptive chrome: spines removed, subtle asymmetric grid (y=0.15,
    x=0.06 alpha), legend styled with elevated background — both light and dark renders
    are fully readable with identical data colors'
  - Title format, axis labels ('Theoretical Quantiles' / 'Sample Quantiles'), and
    legend labels match the specification exactly
  weaknesses:
  - Scatter marker size (s=70) sits below the style guide's recommended 100-200 range
    for a ~100-point dataset — points are visible but slightly smaller than optimal
  - Annotation text (fontsize=7.5) is noticeably smaller than the rest of the chrome
    and becomes borderline small when the PNG is scaled to a ~400px mobile thumbnail
    — consider fontsize=9-10
  - Distinctive matplotlib-specific features (e.g. fill_between for the CI band, annotate
    with arrowprops) are used well but are easily replicated in other libraries —
    nothing uniquely leverages matplotlib beyond common patterns
