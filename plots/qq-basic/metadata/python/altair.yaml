  - 'Reference line color is #FFD43B (Python yellow) - should use neutral adaptive
    token (INK_SOFT)'
  - No theme adaptation - missing os.getenv(ANYPLOT_THEME), PAGE_BG, INK, INK_SOFT
    tokens and all configure_* theme calls
  - Output filename is plot.png - must be plot-light.png / plot-dark.png (run twice
    per theme)
  - Title says pyplots.ai - must be anyplot.ai
  - Grid opacity 0.3 is too heavy; style guide recommends 10-15% (0.10)
