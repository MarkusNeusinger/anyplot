review:
  strengths:
  - 'Correct Q-Q construction: Blom-type plotting positions p=(i-0.5)/n and theoretical
    quantiles scaled by the sample''s own mean/std, producing a mathematically sound
    comparison.'
  - Realistic bimodal bolt-torque QC dataset produces a genuine S-curve deviation
    from the reference line, directly illustrating the spec's callout that S-curves
    reveal skewness.
  - 'Theme-adaptive chrome is fully correct in both renders — backgrounds match #FAF8F1/#1A1A17
    exactly, text stays legible, and the diagonal reference line uses the theme-adaptive
    INK_SOFT token so it reads on both surfaces.'
  - 'Imprint palette used correctly: brand green (#009E73) for data points, neutral
    dashed line for the reference — no stray colors.'
  - Canvas gate passes cleanly (3200×1800), code is clean single-pass KISS style with
    a seeded RNG for reproducibility.
  weaknesses:
  - Points in the mid-quantile range (~42-51 on both axes) overlap into a dense blob
    — consider slightly smaller markers or lower opacity there to keep individual
    points distinguishable.
  - Title is the plain mandated string with no descriptive prefix, so it only fills
    ~30-35% of the plot width instead of the comfortable 50-70% band — a short prefix
    like 'Bolt Torque QC · ' would improve title-bar balance and reinforce the data
    story.
  - No annotation on the reference line (e.g. a small 'y = x' label) or on the deviation
    region — a light annotation would push data storytelling beyond a bare scatter+line.
  - Relies on generic layer composition (points + line) without any distinctive Altair-only
    features (e.g. interactive selections, transform_ API, faceting) that would demonstrate
    deeper library mastery.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches spec, not pure white.
      Chrome: Title "qq-basic · python · altair · anyplot.ai" in bold dark ink, centered near top. Axis titles "Theoretical Quantiles" (x) and "Sample Quantiles" (y, rotated) in dark ink. Tick labels in a softer dark gray. Subtle dashed gridlines. All text is clearly readable against the light background.
      Data: Filled green (#009E73) circular markers with slight transparency, plus a dark dashed diagonal reference line (y=x). Points trace a monotonic S-curve that departs visibly from the reference line at both tails, correctly signalling the underlying bimodal (two-station) mixture.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches spec, not pure black.
      Chrome: Same title and axis titles now in light off-white ink, tick labels in a lighter soft gray, gridlines subtle but visible. All text is clearly readable against the dark background — no dark-on-dark failures observed. The reference line switches to a light gray dashed stroke so it remains visible on the dark surface.
      Data: Same green (#009E73) markers as the light render, identical positions and shapes — confirms data colors are unchanged between themes, only chrome flipped.
      Legibility verdict: PASS
