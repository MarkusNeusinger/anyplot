review:
  strengths:
  - 'Correct Q-Q plot statistics: plotting positions (i-0.5)/n, theoretical quantiles
    scaled by the sample mean/std, matches standard convention.'
  - 'Distinctive Altair interactivity: a functional pointer-hover selection (alt.selection_point)
    that enlarges the nearest marker via alt.condition, alongside static tooltips
    — genuine, not fake.'
  - 'Thoughtful realistic dataset: bimodal bolt-torque QC mixture (well-calibrated
    station + drifting station) that visibly departs from the y=x line, directly demonstrating
    the skewness/heavy-tail scenario called out in the spec notes rather than a boring
    perfect-normal sample.'
  - Theme-adaptive chrome correctly threaded through INK/INK_SOFT/PAGE_BG tokens —
    both renders pass legibility checks, and the Imprint palette (#009E73 markers)
    and backgrounds (#FAF8F1/#1A1A17) are correct.
  - 'Canvas discipline: correctly sized landscape inner view (620x320) padded to the
    exact 3200x1800 target with no clipping.'
  - Semi-transparent markers with a background-colored stroke give overlapping mid-quantile
    points a subtle separation effect.
  weaknesses:
  - 'Marker overlap in the densest mid-quantile clusters (~theoretical 42-52): points
    visually merge into a solid blob despite opacity=0.65; slightly smaller markers
    (size~35) or lower opacity would improve individual-point distinguishability at
    n=100.'
  - Tick label font (10pt) is small relative to the axis titles (12pt) and chart title
    (16pt) — bumping to ~11pt would sharpen the size hierarchy and mobile legibility
    without crowding.
  - The 'y = x' reference-line label is quite subtle (fontSize=11, italic, INK_SOFT)
    — a slightly bolder/larger label would strengthen the data-storytelling read for
    a viewer scanning quickly.
  - No unit annotation (e.g. 'N·m') on the axes despite the torque-based dataset —
    would reinforce the realistic context without conflicting with the spec's mandated
    axis-label text.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Bold black title "Bolt Torque QC · qq-basic · python · altair · anyplot.ai" is clearly legible; bold dark axis titles "Theoretical Quantiles" (x) and "Sample Quantiles" (y) are clearly legible; grey tick labels on both axes are readable; subtle dashed grey gridlines are visible without dominating; a dark dashed diagonal reference line runs corner to corner with a small italic "y = x" label near its top end.
      Data: Teal-green (#009E73) semi-transparent filled circles with a thin background-colored stroke trace an S-shaped path that hugs the reference line through the mid-range and steps away from it at both tails (bimodal QC mixture), which is exactly the "S-curve indicates skewness / heavy tails" behavior the spec calls out. First (and only) series correctly uses the Imprint palette position-1 color.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: White/light bold title and axis titles are clearly legible; light-grey tick labels are readable; subtle dashed light-grey gridlines are visible; the reference line is now a light-grey dashed diagonal with the same small italic "y = x" label, legible against the dark background. No dark-on-dark text anywhere.
      Data: Same teal-green (#009E73) markers in the identical positions/shape as the light render — only the chrome (background, gridlines, line color, text color) flipped, exactly as required.
      Legibility verdict: PASS
