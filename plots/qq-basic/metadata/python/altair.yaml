    from normality
  - Layer composition using Altair + operator is idiomatic and clean
  - Tooltip encoding adds interactivity appropriate for Altair
  - configure_view(strokeWidth=0) is a nice polish touch
  weaknesses:
  - 'Data point color is #306998 (Python blue) - must be #009E73 (Okabe-Ito position
