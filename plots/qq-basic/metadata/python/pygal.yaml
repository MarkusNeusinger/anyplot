review:
  strengths:
  - 'First series uses brand green #009E73, the flagged slow-response outliers correctly
    use the amber (#DDCC77) semantic anchor, and the reference line uses the theme-adaptive
    ink/neutral token — all textbook use of the Imprint palette and its semantic anchors'
  - All font sizes are explicitly set via the Style object (title/label/major_label/legend/value)
    and remain legible at full size in both light and dark renders with no dark-on-dark
    or light-on-light failures
  - Realistic, neutral API-latency scenario with a genuine right-skewed tail (fast
    core cluster + slow-request tail), which is exactly the kind of deviation a QQ
    plot exists to reveal
  - Fully reproducible (np.random.seed(42)), clean KISS top-to-bottom structure, correct
    pygal.XY API usage with a thoughtful per-point color/tooltip override to call
    out the outlier subset
  - No overlapping elements, no edge clipping, good canvas utilization, and a legend
    positioned close to the plot
  weaknesses:
  - The reference line is a fitted normal line (y = mean + std*x) rather than a literal
    y=x diagonal, while the spec explicitly says 'The 45-degree reference line (y=x)
    should be clearly visible'. The fitted-line approach is the statistically correct
    convention when axes are in different units (z-score vs ms) and matches how scipy.stats.probplot
    / statsmodels qqplot work, but a viewer following the spec's literal wording could
    be confused — consider a code comment or title note making the y=mean+std*x convention
    explicit, or standardize the sample axis to z-scores so a literal slope=1 line
    applies.
  - The amber-highlighted 'slow response outlier' points have no distinct legend entry
    — a static PNG viewer (who cannot see the pygal tooltip) has no way to know what
    the amber color means. Add a small annotation/callout or a third legend swatch
    labeled something like 'Outlier (>2σ)' so the story reads without hovering.
  - The y-axis title wraps awkwardly mid-parenthetical ('Sample Quantiles (Response'
    / 'Time, ms)') — reflow or shorten the label so the line break doesn't split inside
    the parenthesis.
  - 'Design Excellence stays close to a well-configured library default (DE-02): the
    grid renders on both axes at the pygal default look. Consider restraining to a
    single-axis grid or nudging grid opacity down further, and add one more deliberate
    refinement (e.g. a subtle emphasis on the flagged tail region) to push past ''good
    default'' into genuinely polished territory.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "qq-basic · python · pygal · anyplot.ai" sits centered at the top in dark ink, comfortably within the canvas (~45-50% of plot width, well short of overflow). X-axis title "Theoretical Quantiles" and Y-axis title "Sample Quantiles (Response Time, ms)" (wrapped onto two lines) are both dark and clearly legible. Tick labels on both axes are dark and readable. A dashed grid is visible on both axes, subtle gray tone, not competing with the data. Legend sits at the bottom-left with two entries: a green swatch "API Response Time" and a gray swatch "Reference (Normal)".
      Data: Sample points render as brand-green (#009E73) dots tracking closely to the thin ink-colored fitted reference line through the low-to-mid quantile range, curving visibly above the line in the upper tail. The uppermost ~5 points (the synthetic slow-response outliers) are colored amber (#DDCC77), clearly distinct from the green cluster, sitting furthest above the reference line — this is the intended right-skew signal a QQ plot is meant to surface.
      Legibility verdict: PASS — all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title, both axis titles, and all tick labels render in light/off-white ink, clearly legible against the dark background. The dashed grid is a subtle light-gray tone, visible but unobtrusive. The reference line, which is dark ink on the light render, correctly flips to a light/off-white line here (theme-adaptive neutral token) so it stays visible on the dark background. Legend renders at the bottom-left with the same two entries, both legible.
      Data: The green (#009E73) and amber (#DDCC77) data point colors are pixel-identical to the light render — only the chrome (background, text, grid, reference line) flipped. No dark-on-dark failures anywhere; every text element and every data point is clearly distinguishable from the near-black surface.
      Legibility verdict: PASS — all text is clearly readable against the dark background, no dark-on-dark failures. Data colors confirmed identical to the light render.
