    pointing at the outlier cluster) to push aesthetic sophistication further.
  - Library Mastery is solid but generic to XY-style libraries generally; leaning
    further into a pygal-only capability (e.g. per-point tooltip value formatting
    via `value_formatter`, or `interpolate` styling) would raise distinctiveness.
