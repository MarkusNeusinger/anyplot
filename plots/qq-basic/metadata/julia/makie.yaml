    the classic Q-Q deviation pattern the spec's Notes call for.
  - Theme-adaptive chrome correctly threaded through Figure/Axis — both renders are
    fully legible and theme-correct, with identical data colors.
  - Subtle marker stroke-halo (strokecolor = PAGE_BG) improves separation of the naturally
    dense midsection.
  weaknesses:
  - Axis labels lack units ("Theoretical Quantiles (ms)" / "Sample Quantiles (ms)")
    given the underlying data is in milliseconds.
  - Title occupies only ~25-30% of canvas width — consider bumping titlesize a bit
    for better visual weight/canvas utilization.
  - No Makie-distinctive feature leveraged — current implementation (scatter + reference
    line) reads generically, could use a small text! annotation or layout-grid companion
    panel.
  - Dense midsection markers (theoretical quantiles ~380-420) partially merge into
    a solid band; a touch more separation (smaller markers or slight alpha) would
    help there.
