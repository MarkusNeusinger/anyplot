  weaknesses:
  - 'No theme adaptation: Code hardcodes colors instead of reading ANYPLOT_THEME environment
    variable'
  - 'Wrong color palette: Uses custom colors instead of Okabe-Ito palette'
  - 'First series not #009E73: The brand green requirement is not met'
  - 'Wrong backgrounds: Pure white and pure black instead of #FAF8F1 and #1A1A17'
  - 'Data colors change between themes: Green and blue appear more saturated/lighter
    in dark render, violating theme consistency requirement'
  - 'Output files incorrectly named: Saves plot.png/plot.html instead of plot-light/dark.png/html'
  - 'No theme tokens: Title and text don''t use INK/INK_SOFT tokens, legend background
    not using ELEVATED_BG'
  image_description: |-
    Light render (plot-light.png):
      Background: Pure white (#ffffff) — FAIL. Must be warm off-white (#FAF8F1) per style guide.
      Chrome: Title 'waffle-basic · highcharts · anyplot.ai' is readable (dark text), legend shows categories with percentages on right side, all text is clearly visible against light background.
      Data: Four colors used — green (42 squares), blue (28 squares), orange (18 squares), pink (12 squares). The green does not match Okabe-Ito brand color #009E73 (code uses #4DAF4A). Other colors appear to be from Okabe-Ito palette but used out of order.
      Legibility verdict: PASS for text readability, but FAIL for palette compliance (wrong colors, wrong background).

    Dark render (plot-dark.png):
      Background: Pure black (or very dark, near pure black) — FAIL. Must be warm near-black (#1A1A17) per style guide.
      Chrome: Title and legend text are light-colored and readable against dark background.
      Data: CRITICAL FAILURE — data colors have changed significantly from light render. Green appears much lighter/more vibrant, blue appears lighter and more saturated. These are NOT the same colors as light render. Okabe-Ito colors (positions 1-7) must be identical between themes; only chrome should flip.
      Legibility verdict: FAIL for palette consistency. The data colors should be identical to light render but are visibly different in saturation and brightness.
  verdict: REJECTED
