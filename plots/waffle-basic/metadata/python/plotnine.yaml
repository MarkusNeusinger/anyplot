review:
  strengths:
  - Correct waffle chart implementation with proper 10x10 grid structure
  - Okabe-Ito palette correctly applied to data colors with proper category mapping
  - Light theme renders perfectly with excellent text readability and contrast
  - Clean, minimal code with no unnecessary complexity or dependencies
  - Proper data normalization and category ordering with realistic budget allocation
    example
  weaknesses:
  - 'CRITICAL: Dark theme text colors not properly applied - near-black text on near-black
    background renders unreadable'
  - Theme-adaptive tokens (INK, INK_SOFT) defined correctly but not properly threaded
    through text rendering elements in dark theme
  - Legend completely unreadable in dark mode with 0% light pixels detected in rendered
    output
  - No design polish or visual refinement beyond default theme - generic appearance
  - Data domain dominated by single category (Housing 35%) limits chart variety demonstration
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - correct and matches spec
      Chrome: Title "waffle-basic · plotnine · anyplot.ai" in dark text (#1A1A17) - clearly readable. Legend on right with category labels and percentages in dark INK_SOFT color - all readable.
      Data: 10×10 waffle grid with four color-coded categories: Housing 35% (#009E73), Food 25% (#D55E00), Transport 18% (#0072B2), Entertainment 12% (#CC79A7). All waffle squares visible and distinct.
      Legibility verdict: PASS - excellent contrast between dark text and light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct color value
      Chrome: Title text appears in near-black/very dark gray instead of light text (#F0EFE8). Legend area completely black with 0% light pixels - unreadable. Text colors are (#26,26,23) to (#45,45,41) range - far too dark for dark background.
      Data: Waffle colors identical to light render (#009E73, #D55E00, #0072B2, #CC79A7 confirmed) - correct theme-independence
      Legibility verdict: FAIL - dark-on-dark text rendering makes both title and legend unreadable. Critical violation of theme-readability requirements.

    Root cause: `element_text(color=INK)` parameters not being properly applied by plotnine during dark theme rendering. Environment variable ANYPLOT_THEME=dark is set, INK variable correctly resolves to "#F0EFE8", but rendered text shows near-black colors instead of light colors.
