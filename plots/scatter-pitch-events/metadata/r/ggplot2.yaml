review:
  strengths:
  - Complete FIFA-accurate pitch geometry including center circle, penalty arcs, corner
    arcs, penalty spots, and goal rectangles
  - Elegant triple aesthetic encoding (color + shape + alpha) with properly merged
    Event type legend and separate Outcome legend
  - Directional arrows for both passes and shots with distinct styling per event type
  - Correct Imprint palette in canonical order; full theme-adaptive chrome switches
    correctly between light and dark renders
  - Realistic synthetic match data with event types distributed across tactically
    appropriate pitch zones
  weaknesses:
  - Shot arrows in the attacking third form a dense fan that is hard to parse individually
    — consider reducing arrow linewidth to 0.5 or alpha to 0.40 for cleaner readability
  - 'Corner arc geometry for two corners (top-left at (0,68) and bottom-right at (105,0))
    draws the arc outside the pitch boundary rather than inward; correct ranges: ca2
    should use seq(-pi/2, 0) and ca4 should use seq(pi, 3*pi/2)'
  image_description: |-
