review:
  strengths:
  - Accurate FIFA-standard pitch geometry rendered entirely within ggplot2 using annotate('path',
    ...) for circles and arcs — center circle, penalty arcs, corner arcs, and goals
    are all correctly positioned
  - 'Complete spec coverage: all four event types with distinct Imprint palette colors
    and shapes, outcome encoding via alpha, and directional arrows for passes and
    shots'
  - Theme-adaptive chrome is fully wired — background, ink, legend box fill, and pitch
    fill all flip correctly between light (#FAF8F1) and dark (#1A1A17), with no dark-on-dark
    or light-on-light failures
  - 'Realistic tactical data distribution: shots concentrated in attacking box (x:
    82–105), passes spread across attacking two-thirds, tackles in midfield, interceptions
    in defensive third — tells a coherent match story'
  - Correct Imprint palette assignment with meaningful semantic mapping (green=passes
    as most common event / brand color, lavender=shots, blue=tackles, ochre=interceptions)
    plus shape redundancy for CVD safety
  weaknesses:
  - library(dplyr) is imported but no dplyr-specific functions are called — all array/indexing
    operations use base R (which(), pmin(), pmax(), data.frame()); remove the unused
    import
  - Pass arrows at alpha=0.45 and linewidth=0.5 are somewhat faint, especially in
    the dense attacking third cluster — increase linewidth to 0.7 and alpha to 0.55
    to match shot arrow visibility
  - Plot title font size is 11pt, one point below the library guide recommendation
    of 12pt — increase to 12pt for consistent sizing with other implementations
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Pitch: Dark green (#3a7d2e) fill with white pitch lines — center circle, halfway line, penalty areas (both sides), goal areas, penalty spots, penalty arcs, corner arcs, and goal boxes all clearly drawn.
      Chrome: Title "scatter-pitch-events · r · ggplot2 · anyplot.ai" in dark ink, clearly readable. Axis labels "Pitch length (m)" and "Pitch width (m)" in dark ink. Tick labels in INK_SOFT (#4A4A44). Legend box has elevated background with border. All text is clearly readable against the light background — no light-on-light failures.
      Data: Green (#009E73) circles with arrows for passes, lavender (#C475FD) diamonds with arrows for shots, blue (#4467A3) triangles for tackles, ochre (#BD8233) squares for interceptions. High alpha (0.90) for successful events, low alpha (0.35) for unsuccessful events. Shot arrows fan toward goal center (105, 34) in a distinctive pattern. Pass arrows cluster densely in attacking third.
      Legibility verdict: PASS — all chrome readable, data elements distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
