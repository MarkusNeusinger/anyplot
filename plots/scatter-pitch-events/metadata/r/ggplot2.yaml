      Data: Colors are identical to light render — green passes, lavender shots, blue tackles, ochre interceptions. The Imprint palette stays constant across themes as required.
      Legibility verdict: PASS — all chrome readable against dark background, data colors identical to light render, no dark-on-dark issues.
