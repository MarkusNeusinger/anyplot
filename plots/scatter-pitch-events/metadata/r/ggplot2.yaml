      Data: Pass markers (green circles #009E73) with green arrow trajectories in midfield/attacking third; shot markers (lavender diamonds #C475FD) with lavender arrows converging on right goal; tackle markers (blue triangles #4467A3) in midfield; interception markers (ochre squares #BD8233) in defensive/middle third. Successful events alpha=0.90, unsuccessful alpha=0.35. First series is #009E73 (passes). Imprint palette canonical order used.
