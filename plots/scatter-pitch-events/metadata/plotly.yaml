  strengths:
  - Comprehensive pitch diagram with all FIFA-standard markings including corner arcs,
    penalty arcs, and goal posts
  - Strong design with custom two-tone green scheme, well-chosen event colors, and
    white marker edge highlighting
  - Excellent data generation with realistic spatial distributions per event type
    and plausible success rates
  - Effective use of Plotly-specific features (hover tooltips, HTML export, shape
    layering, aspect ratio locking)
  - Clear visual hierarchy through marker size differentiation (shots=22, tackles/interceptions=16,
    passes=11)
  weaknesses:
  - Right side of pitch near the goal is cluttered with converging pass/shot lines
    overlapping markers
  - Unsuccessful open markers at low opacity can be difficult to distinguish against
    the green background
  - Yellow tackle markers have reduced contrast against the green pitch for some viewers
  - Legend font size (15pt) is on the small side for the output resolution
  image_description: 'The plot displays a soccer pitch event map on a green field
    (#3A9D5C) with a darker green frame (#1B5E20). White pitch markings include the
    outline, penalty areas, goal areas, center circle, halfway line, penalty arcs,
    corner arcs, penalty spots, center spot, and goal posts rendered as semi-transparent
    rectangles. Four event types are plotted with distinct markers: light blue circles
    for passes (filled=successful, open=unsuccessful), orange/red stars for shots
    (filled=on target, open=off target), yellow triangles for tackles (filled=successful,
    open=unsuccessful), and purple diamonds for interceptions (filled=successful,
    open=unsuccessful). Directional lines connect pass origins to endpoints (solid
    light blue for successful, dotted for unsuccessful) and shot origins toward the
    goal (solid orange for on target, dotted for off target). Shots are concentrated
    in the final third, passes are distributed with an attacking bias, tackles and
    interceptions cluster in midfield/defensive zones. A legend at the bottom lists
    all 8 event categories with matching symbols. The title "scatter-pitch-events
    · plotly · pyplots.ai" appears centered at the top in white.'
