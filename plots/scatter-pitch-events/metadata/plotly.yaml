review:
  strengths:
  - Comprehensive pitch diagram with all FIFA-standard markings including corner arcs,
    penalty arcs, and semi-transparent goal posts
  - Strong design with custom two-tone green scheme, well-chosen event colors, and
    white marker edge highlighting
  - Excellent data generation with realistic spatial distributions per event type
    and plausible success rates
  - Effective use of Plotly-specific features (hover tooltips, HTML export, shape
    layering, aspect ratio locking)
  - Clear visual hierarchy through marker size differentiation creating natural focal
    points on shots
  weaknesses:
  - Right side of pitch near the goal is congested with converging pass/shot lines
    overlapping markers
  - Yellow tackle markers have slightly reduced contrast against the green pitch for
    some colorblind viewers
  - Could benefit from annotation or callout to highlight a key tactical insight for
    stronger data storytelling
  image_description: 'The plot displays a soccer pitch event map on a vivid green
    field (#3A9D5C) framed by a darker green background (#1B5E20). White pitch markings
    include the full outline, penalty areas, goal areas, center circle with center
    spot, halfway line, penalty arcs with penalty spots, corner arcs, and goal posts
    rendered as semi-transparent rectangles. Four event types are plotted with distinct
    markers: light blue filled circles for successful passes and open circles for
    unsuccessful passes, orange/red filled stars for shots on target and open stars
    for off-target shots, yellow filled triangles for successful tackles and open
    triangles for unsuccessful tackles, and purple filled diamonds for successful
    interceptions and open diamonds for unsuccessful interceptions. Directional lines
    connect pass start positions to endpoints (solid light blue for successful, dotted
    for unsuccessful) and shot positions toward the goal (solid orange for on target,
    dotted for off target). Shots cluster in the final third, passes distribute with
    an attacking-half bias, tackles and interceptions concentrate in midfield and
    defensive zones. A horizontal legend at the bottom-left lists all 8 event categories
    with matching symbols on a semi-transparent black background. The title "scatter-pitch-events
    · plotly · pyplots.ai" appears centered at the top in white Arial Black font.'
