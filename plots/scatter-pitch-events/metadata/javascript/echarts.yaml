review:
  strengths:
  - Perfect FIFA-standard pitch rendering with all required markings (penalty areas,
    goal areas, center circle, halfway line, corner arcs, penalty arcs, penalty spots,
    and goal posts)
  - Elegant opacity-based outcome encoding (successful events bright, unsuccessful
    faded) combined with distinct per-event-type marker shapes — passes as circles,
    shots as diamonds, tackles as triangles, interceptions as squares
  - Directional arrows implemented idiomatically via ECharts lines series with arrow
    symbols, correctly pointing pass end-to-end and shots toward goal
  - Correct 105:68 aspect ratio preserved through careful margin calculation (187px
    left/right, 65px top/bottom)
  - 'Theme-adaptive pitch color (#3D7A35 light / #2C5A27 dark) while Imprint palette
    data colors stay constant across both themes'
  - Seeded LCG RNG ensures fully reproducible data generation without browser Date/Math
    dependency issues
  - 'Clean ECharts composition: markArea for pitch background, line series for pitch
    geometry, lines series for arrows, scatter series for event markers — all at correct
    z-ordering'
  weaknesses:
  - 'Pass arrows use palette[0] #009E73 (brand green) over pitch green #3D7A35 — contrast
    is limited in the light render, making pass direction lines subtler than ideal.
    Consider using near-white (e.g. rgba(255,255,255,0.75)) or a lighter tint for
    the pass arrow lines to differentiate them from the pitch surface without abandoning
    the green encoding on the markers themselves'
  - 'Subtitle text is fontSize: 13 CSS px on a 1600×900 mount — slightly small for
    mobile-scaled reads. Increase to 14–15px to improve legibility at small viewports'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 page background; pitch rendered in #3D7A35 grass green filling most of the canvas.
      Chrome: Title "scatter-pitch-events · javascript · echarts · anyplot.ai" in dark ink, bold, centered at top — clearly readable. Subtitle "Opacity = outcome (bright: successful · faded: unsuccessful) · Arrows show event direction" in inkSoft, readable but small (13px). Legend at bottom showing all 4 event types with correct icon and label, clearly readable.
      Data: Pass circles in #009E73 (brand green), Shot diamonds in lavender #C475FD, Tackle triangles in blue #4467A3, Interception squares in ochre #BD8233. All markers visible against green pitch. Directional arrows: pass arrows in green (#009E73) are present but somewhat subtle against the green pitch surface; shot arrows in dashed lavender clearly visible. Opacity encoding distinguishes successful (high alpha) from unsuccessful (low alpha) events. White pitch lines are clean and contrast well.
      Legibility verdict: PASS — all chrome text clearly readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 page background; pitch rendered in #2C5A27 (darker grass green), darker variant appropriate for dark theme.
      Chrome: Title and subtitle both render in light-colored text (t.ink / t.inkSoft), clearly readable against dark background. Legend at bottom readable. No dark-on-dark issues observed.
      Data: All data colors are identical to light render — #009E73 circles, lavender diamonds, blue triangles, ochre squares. Pass arrows are more visible in the dark render because the dark page background creates stronger visual context. White pitch lines remain high contrast on green pitch in dark mode. Opacity encoding still clearly distinguishes outcomes.
      Legibility verdict: PASS — all text readable against near-black background; no dark-on-dark failures detected.
