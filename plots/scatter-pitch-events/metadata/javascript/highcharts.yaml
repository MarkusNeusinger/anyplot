review:
  strengths:
  - 'Complete FIFA-standard pitch with all required markings: boundary, halfway line,
    center circle, penalty areas, goal areas, corner arcs, penalty arcs, and goals'
  - All 4 event types implemented with distinct markers (circles=Pass, diamonds=Shot,
    triangles=Tackle, squares=Interception) and correct Imprint palette order
  - Trajectory lines for passes and shots clearly show directional play, with shot
    lines converging on the attacking goal creating a natural focal point
  - Outcome encoding via fill opacity (22% for unsuccessful, 100% for successful)
    with white outlines making all markers pop against the dark grass
  - Deterministic LCG RNG (seed 42) ensures reproducibility in the offline browser
    runtime
  - Correct aspect ratio maintained via smart X-axis padding calculation (X_PAD) based
    on CSS mount dimensions
  - 'Theme-adaptive chrome: `t.ink`, `t.inkSoft`, `t.elevatedBg`, `t.grid` tokens
    correctly applied to all non-data elements'
  weaknesses:
  - No true arrowheads on pass/shot trajectory lines — spec requests 'directional
    arrows' but implementation uses plain line segments (Highcharts core has no built-in
    arrow renderer; consider an SVG `marker` workaround or note the limitation in
    the subtitle)
  - Subtitle fontsize 13px is slightly small — at CSS 13px (26px native on 3200px
    canvas) it may be hard to read at mobile widths; increase to 14–15px to match
    the legend label size
  - Unused variable `const THEME = window.ANYPLOT_THEME` is captured but never referenced
    — all theme adaptation flows through `t`; remove it to keep the code clean
  - Faded unsuccessful markers at 22% opacity may be borderline invisible for small
    marker types (circles at radius 5) on the dark green pitch — consider raising
    to 28–30% opacity
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) visible in canvas margins around the pitch — correct light theme surface.
      Chrome: Title "scatter-pitch-events · javascript · highcharts · anyplot.ai" in dark ink (#1A1A17) at 22px — clearly readable. Subtitle in softer dark ink at 13px — readable at full resolution but slightly small. Legend at bottom center with box border, labels "Pass / Shot / Tackle / Interception" in #4A4A44 on light elevated background — readable. Axis labels and tick labels suppressed (correct for a pitch visualization).
      Data: Dark green pitch (#2d5a27) with white boundary lines, halfway line, center circle, penalty areas, goal areas, corner arcs, and goal boxes clearly rendered. Four event types visible: green circles (Pass, brand #009E73), lavender/purple diamonds (Shot, #C475FD), blue triangles (Tackle, #4467A3), ochre squares (Interception, #BD8233). Successful events show solid fills; unsuccessful events show faded ~22% opacity fills. Green semi-transparent pass trajectory lines fan across the pitch; purple shot trajectory lines converge toward the right goal.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) visible in canvas margins — correct dark theme surface.
      Chrome: Title text rendered in light ink (#F0EFE8) via t.ink token — clearly visible on dark background. Subtitle uses t.inkSoft (#B8B7B0) — readable against dark background. Legend box uses elevated dark background (#242420) with #B8B7B0 label text — readable. No dark-on-dark failures detected.
      Data: Pitch content is identical to light render — same green pitch, same white markings, same event marker colors (Imprint palette is theme-invariant). Only the outer canvas background flips from cream to near-black. Pass/shot trajectory lines have identical colors and opacity. Marker fills and outlines are identical.
      Legibility verdict: PASS — title and subtitle adapt correctly to dark theme; legend text visible on dark elevated background; data colors are identical between both renders.
