review:
  strengths:
  - Accurate FIFA-standard pitch diagram (penalty areas, goal areas, center circle,
    halfway line, penalty arcs clipped to outside penalty box, corner arcs, goal posts)
    using custom SVG within ChartContainer
  - 'Advanced idiomatic MUI X: useDrawingArea/useXScale/useYScale hooks for coordinate
    conversion between pitch meters and SVG pixels'
  - 'Correct Imprint palette in canonical order: Pass=#009E73, Shot=#C475FD, Tackle=#4467A3,
    Interception=#BD8233'
  - Directional arrows with SVG <marker>/<defs> arrowheads for passes and shots; dashed
    lines distinguish unsuccessful trajectories
  - Outcome encoded via alpha-blending (35-40% opacity for unsuccessful) — clean redundant
    encoding without cluttering the legend
  - Deterministic LCG data generation (seed 42) with realistic football distributions
    (78% pass success, 25% shot success)
  - Correct FIFA 105:68 aspect ratio maintained via computed margins
  - Both themes render correctly with no dark-on-dark issues; data colors identical
    across themes
  weaknesses:
  - 'Missing distinct marker shapes per event type: spec requires circles for passes,
    stars for shots, triangles for tackles, diamonds for interceptions. All events
    use default circles differentiated only by color and size. Can be implemented
    via custom SVG shapes in ArrowsLayer using the existing useXScale/useYScale hooks,
    or via ScatterPlot slots.mark per-series callbacks.'
  - Shot trajectories and markers cluster densely in the right-penalty area causing
    slight crowding, though still readable.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white outer background (#FAF8F1); pitch itself in dark green (#2a6e1e)
      Chrome: Title "scatter-pitch-events · javascript · muix · anyplot.ai" in dark text above pitch — clearly readable. Legend row "Pass Shot Tackle Interception" in dark text below pitch — readable. Axis ticks disabled (appropriate for pitch map).
      Data: Teal circles (Pass, #009E73, first series = brand green), lavender circles (Shot, #C475FD), blue circles (Tackle, #4467A3), ochre circles (Interception, #BD8233). Successful events fully opaque; unsuccessful events at ~35-40% alpha. Pass arrows in teal with arrowheads; shot arrows in lavender converging toward right goal. White pitch markings: penalty areas, goal areas, center circle, halfway line, penalty arcs, corner arcs, goal posts.
      Legibility verdict: PASS — all text readable, data markers clearly visible against green pitch

    Dark render (plot-dark.png):
      Background: Warm near-black outer background (#1A1A17); same green pitch (#2a6e1e)
      Chrome: Title renders in light text against dark background — clearly readable. Legend text also light — readable. No dark-on-dark failures detected anywhere.
      Data: Colors identical to light render — #009E73 passes, #C475FD shots, #4467A3 tackles, #BD8233 interceptions. Same arrows, same alpha encoding. Only the outer page background and chrome text colors change between themes.
      Legibility verdict: PASS — all text readable in dark theme, no elements lost against the dark background
