review:
  strengths:
  - Fully accurate FIFA-standard pitch markings drawn entirely via MUI X custom SVG
    layers using scale hooks — an advanced and idiomatic MUI X pattern
  - Four distinct marker shapes (circles, stars, triangles, diamonds) with directional
    arrow overlays exactly matching spec requirements
  - Seeded LCG random number generator for deterministic, reproducible synthetic data
  - Opacity + linestyle dual-encoding for successful vs unsuccessful events provides
    strong visual differentiation without needing extra colors
  - Correct 105:68 aspect ratio maintained dynamically using margin computation
  - Theme-adaptive title and legend text via t.ink token; page backgrounds correctly
    differ between light/dark
  weaknesses:
  - Legend labels at 14px CSS (28 source-px) are too small relative to the 3200x1800
    canvas; recommend increasing to 18-22px CSS for mobile readability
  - Legend mark dimensions (18x12px CSS) are quite small; increase itemMarkWidth to
    24 and itemMarkHeight to 16 for better visibility
  - Shot event cluster near the right goal creates visual density with overlapping
    arrows and markers; minor — acceptable for a match analytics map
