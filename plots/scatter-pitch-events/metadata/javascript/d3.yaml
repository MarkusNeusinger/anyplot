review:
  strengths:
  - 'Accurate FIFA-spec pitch diagram with all required markings: penalty areas, goal
    areas, center circle, halfway line, corner arcs, and goal posts'
  - Four distinct marker shapes (circle, star, triangle, diamond) plus Imprint palette
    colors provide excellent CVD-safe redundant encoding for event types
  - Directional arrows for passes and shots with filled vs hollow markers elegantly
    encode both trajectory and outcome in a single mark
  - Deterministic LCG with seed ensures reproducible output; idiomatic D3 usage (d3.line(),
    d3.arc(), SVG defs/markers, .join() data binding)
  - 'Correct 105:68 pitch aspect ratio maintained; theme-adaptive pitch background
    (#3a7d44 light / #1e3a28 dark) and page chrome'
  - Imprint palette in canonical order (pass=#009E73, shot=#C475FD, tackle=#4467A3,
    interception=#BD8233); correct page backgrounds both renders
  weaknesses:
  - Pass/shot arrow lines are thin (1.2px CSS = 2.4px native); at mobile scale (~400px
    wide) these become sub-pixel and effectively invisible — increase stroke-width
    to at least 2px CSS
  - Legend layout uses fixed pixel offsets (tSp=185, oSp=220) that could misalign
    if pitch position shifts; two-row legend has good content but could benefit from
    a subtle background box (t.elevatedBg) to delineate it from the pitch area
  - 'CQ-01: Seven helper functions (rand, rr, starP, triP, diaP, prect, parc) — reasonable
    for complexity but slightly non-KISS; D3-idiomatic alternatives (d3.symbol() for
    marker shapes) could reduce custom path code'
  - 'DE-02: Legend could be more polished with a bounding box or frame (using t.elevatedBg)
    so text doesn''t float disconnected below the pitch'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) outer canvas — correct theme surface.
      Pitch: Vibrant green (#3a7d44) with white semi-transparent pitch lines (outline, halfway line, penalty areas, goal areas, center circle, penalty arcs, corner arcs, goals).
      Chrome: Title "scatter-pitch-events · javascript · d3 · anyplot.ai" rendered in dark ink at top center, clearly readable. Two-row legend below pitch with dark text labels (Pass, Shot, Tackle, Interception; Successful/Unsuccessful).
      Data: Pass circles in #009E73, Shot stars in #C475FD, Tackle triangles in #4467A3, Interception diamonds in #BD8233. Arrows visible for passes (distributed across pitch) and shots (converging to right goal). Filled markers = successful, hollow = unsuccessful.
      Legibility verdict: PASS — all title and legend text clearly readable against warm off-white.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) outer canvas — correct dark theme surface.
      Pitch: Darker green (#1e3a28) with white pitch lines, slightly more muted appearance appropriate for dark theme.
      Chrome: Title and legend text rendered in light ink (#F0EFE8 / #B8B7B0 tokens), clearly readable against near-black background. No dark-on-dark failures detected.
      Data: Colors are identical to light render — pass=#009E73, shot=#C475FD, tackle=#4467A3, interception=#BD8233. Arrows and filled/hollow encoding preserved exactly as in light render.
      Legibility verdict: PASS — all chrome elements readable; data colors correctly unchanged from light render.
