review:
  strengths:
  - Complete, accurate FIFA pitch rendering (centre circle, penalty arcs, corner arcs,
    goal boxes, penalty spots) at correct dimensions
  - 'Excellent Imprint palette application: Pass=#009E73 as first series; shot/tackle/interception
    follow canonical positions 2-4'
  - Multi-layer outcome encoding (filled/hollow markers + opacity differentiation
    for arrows) is intuitive and spec-correct
  - Fixed-seed LCG provides perfect reproducibility without any external dependency
  - 'Theme-adaptive pitch colours (bright green light / dark green dark) while keeping
    outer page backgrounds correctly at #FAF8F1 / #1A1A17'
  - SVG arrowhead marker defs via D3 defs element is a D3-distinctive technique applied
    cleanly
  weaknesses:
  - Legend text at 13px is slightly below the 14px style-guide recommendation for
    secondary text; increase to 14px for both event-type and outcome legend items
  - 'Shot-zone crowding near right goal: 25 arrows converging at a single point creates
    a visually dense region; reduce shot arrow stroke-width to 1.2px and widen opacity
    split (successful 0.7 / unsuccessful 0.18) to improve readability'
  - Outcome legend indicator circle uses t.inkSoft (gray) rather than a representative
    event colour; consider using palette[0] for the filled circle to better communicate
    the encoding
  - LM-02 could be elevated by using d3.arc() for the centre circle arc or d3.line()
    for pitch outline segments instead of manual SVG path strings
