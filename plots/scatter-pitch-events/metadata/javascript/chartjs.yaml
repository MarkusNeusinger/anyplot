review:
  strengths:
  - Sophisticated custom pitch-drawing plugin renders full FIFA-accurate pitch with
    penalty areas, goal areas, center circle, halfway line, corner arcs, and penalty
    spots — all in correct dimensions
  - Alpha-based outcome encoding (high opacity = successful, low opacity = unsuccessful)
    combined with distinct marker shapes per event type creates a rich multi-dimensional
    encoding
  - Directional arrows for passes and shots implemented via custom afterDatasetsDraw
    plugin with proper canvas clipping and arrowhead geometry
  - LCG seeded at 42 provides deterministic data generation without relying on browser
    RNG, with realistic event count distributions and zone-appropriate positioning
  - Advanced use of Chart.js plugin API (beforeDraw, afterDatasetsDraw, getPixelForValue)
    demonstrates deep library mastery for bespoke canvas rendering
  weaknesses:
  - 'Pitch aspect ratio is not preserved: the 105:68m (≈1.54:1) pitch is rendered
    in a 16:9 landscape canvas, stretching the pitch to approximately 2:1 — center
    circle appears as a wide ellipse rather than a circle. Could be addressed by adding
    layout padding to force the chart area to a 105:68 sub-region, or by choosing
    a square canvas with chart-area offsets'
  - Title font size (22px CSS) is a touch small relative to the full canvas — consider
    increasing to 24-26px for better title presence at full resolution
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) canvas surrounds the pitch. The pitch itself renders in the specified dark grass green (#2e7d3a) with slightly lighter alternating 10m stripe bands for visual depth.
      Chrome: Title "scatter-pitch-events · javascript · chartjs · anyplot.ai" in dark ink is readable above the pitch. Legend at bottom shows all 8 series with correct Imprint palette swatches — all text is dark and readable against the light-theme canvas background. Pitch lines (white/near-white) are clearly visible.
      Data: Pass events as green circles (#009E73); shots as lavender stars (#C475FD); tackles as blue triangles (#4467A3); interceptions as ochre diamonds (#BD8233). Successful events are solid (alpha ~0.85–0.92), unsuccessful are transparent (alpha ~0.18–0.28). Green and lavender arrows show pass/shot trajectories.
      Legibility verdict: PASS — all text and legend items are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) canvas surrounds the pitch. Pitch renders in darker grass green (#1b4a22) with darker alternating stripes.
      Chrome: Title text renders in light ink (#F0EFE8 equivalent from t.ink token), clearly readable against the dark canvas. Legend text is light-colored and readable. Pitch markings (white lines) remain high-contrast.
      Data: Data colors are identical to the light render — green circles, lavender stars, blue triangles, ochre diamonds — consistent with the Imprint palette's theme-invariant data colors. Arrows remain in the same palette colors.
      Legibility verdict: PASS — all chrome (title, legend) uses light text via t.ink token. No dark-on-dark text failures. Data colors unchanged between themes as required.
