review:
  strengths:
  - Custom Chart.js beforeDraw plugin draws a full FIFA-spec pitch with alternating
    grass stripes, penalty areas, goal areas, center circle, corner arcs, and goal
    posts — all correctly positioned using scale pixel coordinates
  - Custom afterDatasetsDraw plugin renders directional arrow vectors (pass and shot
    trajectories) with arrowhead barbs clipped to the chart area, going well beyond
    Chart.js scatter defaults
  - Eight datasets cleanly encode 4 event types × 2 outcomes using distinct pointStyle
    (circle/star/triangle/rectRot) + Imprint palette canonical order (palette[0-3])
    + alpha-opacity for successful vs unsuccessful
  - Deterministic LCG (seed 42) makes the random event positions reproducible in a
    browser environment without a seeded RNG
  - 'Theme-adaptive chrome: t.ink for title and legend, t.pageBg inherited from mount,
    theme-keyed GRASS/STRIPE constants — both renders pass the legibility check'
  - White marker borders (rgba(255,255,255,0.55)) on successful events give definition
    against the green pitch background without using an off-palette color
  weaknesses:
  - Legend font size is 13px CSS (26px source) vs the recommended ~16px CSS (32px
    source); all 8 legend entries remain readable but labels are slightly small at
    mobile scale — increase to 15–16px
  - 'Pass (complete) markers (#009E73 at 85% opacity) against the forest-green pitch
    (#2e7d3a light / #1b4a22 dark) have reduced luminance contrast; white marker borders
    partially compensate, but adding a slightly thicker border (borderWidth: 2) for
    complete events would improve separation from the green background'
  - 'DQ-01 minor gap: the penalty arc (D-area arc outside the penalty box, radius
    ~9.15m centered on penalty spot) is omitted from the pitch markings; not required
    by the spec but would make the pitch more complete'
  - Incomplete event markers (22–25% opacity) become very faint on the dark render's
    dark-green pitch — acceptable as intentional outcome encoding but worth noting
    for repair if readability is flagged
  image_description: |-
    Light render (plot-light.png):
      Background: Page background is warm off-white (#FAF8F1). Pitch fill is forest green (#2e7d3a) with alternating slightly darker stripe bands (~every 10m). The pitch occupies nearly the full chart area.
      Chrome: Title "scatter-pitch-events · javascript · chartjs · anyplot.ai" in dark ink (#1A1A17) above the pitch — clearly readable against the off-white margin. Legend at bottom in 8 entries with dark text, readable against the off-white footer area.
      Data: Teal circles (#009E73) for passes with white borders; faint teal circles for incomplete passes. Lavender stars (#C475FD) for shots concentrated in the attacking third with trajectory arrows pointing toward goal. Blue triangles (#4467A3) for tackles, ochre rotated-squares (#BD8233) for interceptions spread across the pitch. Arrow vectors in matching colors with arrowheads visible. Pitch markings in white (penalty areas, goal areas, center circle, halfway line, corner arcs, penalty spots, goals) are clear against the green.
      Legibility verdict: PASS — all text readable; data markers distinguishable with marker shape + color + opacity redundancy; white marker borders help separate teal passes from green pitch.

    Dark render (plot-dark.png):
      Background: Page background is warm near-black (#1A1A17). Pitch fill is dark forest green (#1b4a22) with slightly lighter stripe bands. The pitch occupies the same area.
      Chrome: Title text is cream/off-white (#F0EFE8 via t.ink) on the dark background — clearly readable. Legend at bottom shows same 8 entries in light-colored text against the dark footer — readable. No dark-on-dark failure observed.
      Data: Same Imprint palette colors as light render — #009E73 teal passes, #C475FD lavender shots, #4467A3 blue tackles, #BD8233 ochre interceptions. All data colors are identical between themes (only chrome flips). Arrows and pitch markings (white lines) contrast well against the darker green. Incomplete events remain very faint (22–25% opacity) which is the intentional outcome encoding.
      Legibility verdict: PASS — title and legend text are light on dark background; no dark-on-dark issues; brand green #009E73 visible against dark pitch green; all marker types distinguishable.
