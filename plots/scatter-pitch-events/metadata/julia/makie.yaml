review:
  strengths:
  - Accurate FIFA-standard pitch rendering with all required markings (penalty areas,
    goal areas, center circle, corner arcs, halfway line, goal posts)
  - 'Semantic Imprint palette assignment is well-reasoned: pass=green (constructive),
    shot=red (aggressive/goal), tackle=blue (defensive), interception=ochre (opportunistic)'
  - Alpha-based outcome encoding (filled=successful, faded=unsuccessful) is clean
    and effective with clear legend explanation
  - Directional arrows for a sampled subset of passes and all shots add tactical insight
    without visual clutter
  - Theme adaptation is excellent -- pitch line color, background, and chrome all
    flip correctly between light and dark
  - DataAspect() ensures the correct 105:68 FIFA pitch proportions are maintained
  - Clean code structure with Random.seed!(42) for reproducibility, all font sizes
    explicitly set
  weaknesses:
  - 'DE-01 (5/8): Overall design is functional and thoughtful but stops short of publication-ready.
    Adding subtle pitch zone shading (e.g., lightly shading attacking/defensive thirds)
    or a single annotated zone label around the penalty arc would elevate the visual
    sophistication significantly.'
  - 'DE-02 (4/6): Pass arrows use uniform styling regardless of outcome -- varying
    arrow linewidth or opacity by pass outcome would add a layer of refinement. The
    arrow sampling (every 3rd pass) works but the resulting arrow density varies unevenly
    across pitch zones.'
  - 'DE-03 (4/6): The plot displays data well but does not guide the viewer to a specific
    tactical insight. A single zone annotation (e.g., labeling the penalty arc area
    as Shot zone) or pitch-third dividers with labels would create a clear focal point
    and transform this from data display to data storytelling.'
  - 'LM-02 (3/5): The Makie primitives are well chosen (poly!, arrows!, DataAspect,
    MarkerElement) but more distinctive Makie capabilities remain untapped -- for
    example, a secondary Axis panel (small multiple) for home vs. away comparison,
    or Colorbar with continuous shot xG encoding.'
  - 'VQ-01 (7/8): Footer annotation at fontsize=10 (20 px effective at px_per_unit=2)
    is slightly small -- bumping to 11-12 would improve mobile legibility without
    crowding the pitch.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as expected -- not pure white.
      Pitch: Light green semi-transparent fill with dark gray pitch lines showing all required FIFA markings: outer boundary, penalty areas, goal areas, halfway line, center circle, corner arcs, and goal posts extending beyond the pitch boundary.
      Chrome: Title "scatter-pitch-events - julia - makie - anyplot.ai" is dark-colored, clearly readable, occupies approx 55-60% of canvas width. Legend on the right column shows all four event types with correct marker shapes (circle=Pass, star=Shot, triangle=Tackle, diamond=Interception) and counts. Footer note "Filled = successful - Faded = unsuccessful" appears below the pitch in muted ink color.
      Data: Pass circles (#009E73 brand green) distributed across the pitch with green arrows for a sampled subset; Shot stars (#AE3030 matte red, size=18) clustered in the attacking third with red arrows; Tackle triangles (#4467A3 blue) spread across defensive/middle thirds; Interception diamonds (#BD8233 ochre) in the defensive half. Unsuccessful markers rendered at low alpha (0.30-0.35) are visibly faded.
      Legibility verdict: PASS -- all text is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as expected -- not pure black.
      Pitch: Darker deep-green fill with light gray/cream pitch lines that contrast well against the dark green surface. All pitch markings are clearly visible.
      Chrome: Title is rendered in light cream text, clearly readable against the dark background. Legend text and labels are in light colors (B8B7B0 range), framed with an elevated-dark background (#242420). Footer note is in muted light ink.
      Data: All four event type colors are identical to the light render -- green passes, red shots, blue tackles, ochre interceptions -- confirming only chrome flips between themes. Faded (unsuccessful) markers are still distinguishable at low alpha on the dark green surface.
      Legibility verdict: PASS -- no dark-on-dark failures observed. Title, legend, and footer text are all clearly readable against the dark background. Brand green #009E73 (pass markers) remains visible against the dark green pitch.
