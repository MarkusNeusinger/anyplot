review:
  strengths:
  - 'Semantically meaningful Imprint palette mapping: green (#009E73) for passes (constructive),
    matte red (#AE3030) for shots (aggressive/goal attempts), blue (#4467A3) for tackles
    (defensive), ochre (#BD8233) for interceptions — each color intuitively matches
    the action''s football role'
  - 'Complete and accurate FIFA-standard pitch rendering: penalty areas, goal areas,
    center circle, penalty arcs, corner arcs, goal posts, halfway line, dashed zone
    dividers — all correctly dimensioned'
  - DataAspect() enforces the 105:68 pitch proportion so the layout never distorts
    regardless of figure size
  - 'Meaningful size hierarchy: shots (markersize=18) > tackles/interceptions (12)
    > passes (9) — emphasizes the most tactically critical events'
  - Directional arrows for every shot and every 3rd pass cleanly encode ball trajectory;
    arrow size and opacity also scale with outcome (thicker/larger for successful)
  - Outcome encoded via per-marker alpha (0.85/0.90 for successful, 0.30/0.35 for
    unsuccessful) using RGBAf, giving a natural filled-vs-faded visual contrast in
    both themes
  - Attacking third gets a subtle red zone shading that primes the viewer for shot
    clustering without overwhelming the data
  - 'Full theme adaptation: PAGE_BG, INK, INK_SOFT, INK_MUTED, PITCH_LINE, PITCH_FILL,
    ELEVATED_BG all flip correctly; data colors remain identical between themes'
  - Custom MarkerElement legend clearly maps shape, color, and event count in a compact,
    well-spaced layout; legend title 'Event Type\n(filled = successful)' doubles as
    a decoding key
  - 'Idiomatic Makie throughout: poly!, lines!, scatter!, arrows!, text!, MarkerElement,
    colsize! with Relative() — no workarounds or non-native primitives'
  weaknesses:
  - Zone labels ('Defensive', 'Midfield', 'Attacking') and the 'Shot Zone' annotation
    are rendered at fontsize=8, which equates to ~16 source-px in the 3200×1800 PNG
    and becomes barely legible when the image is scaled to ~400px mobile width — increase
    to fontsize=10 or 11
  - 'Arrow density for passes: every-3rd sampling (≈37 arrows for 110 passes) produces
    a visually sparse arrow layer in the defensive third and a crowded cluster near
    midfield; consider every-4th or threshold by pass length to distribute more evenly'
  - Legend frame (framevisible=true with strokecolor=INK_SOFT) adds visual weight
    that competes slightly with the pitch boundary lines; a frameless legend would
    feel cleaner against the open pitch design
  - 'DE-01/DE-02: design is solid but not exceptional — no typography weight variation
    (bold title vs regular labels), no pitch texture or stripe pattern that would
    elevate polish toward publication-ready'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) canvas — correct.
      Pitch: Light green fill (rgba green ~10% alpha) covering the full 105×68 m area; dark pitch lines (strokecolor dark at ~55% opacity) delineate penalty areas, goal areas, center circle, penalty arcs, corner arcs, halfway line, goal posts, and dashed zone dividers.
      Chrome: Title "scatter-pitch-events · julia · makie · anyplot.ai" centered in dark ink at top — clearly readable. Legend on the right with dark INK labels, warm elevated background (#FFFDF6), and soft-ink frame. Zone labels ("Defensive", "Midfield", "Attacking") in muted dark at fontsize=8 near pitch top edge — legible at full resolution, marginal at mobile scale. Outcome footnote at bottom in tertiary ink color.
      Data: Green circles (#009E73) for passes with directional arrows; matte-red 5-point stars (#AE3030) for shots in attacking third with arrows; blue upward triangles (#4467A3) for tackles; ochre diamonds (#BD8233) for interceptions. Successful events are solid/vivid; unsuccessful events are faded (~30–35% opacity). Shot zone has a very subtle red tint overlay. Marker size hierarchy is clear: shots largest (18), tackles/interceptions medium (12), passes smallest (9).
      Legibility verdict: PASS — all critical text (title, legend labels, outcome note) readable; zone labels and "Shot Zone" annotation are small but contextually acceptable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) canvas — correct.
      Pitch: Deeper green fill (~18% alpha) on the dark surface; pitch lines appear in cream-white (rgba 0.9/0.9/0.85 at 70% opacity) giving strong contrast against the dark green pitch.
      Chrome: Title in near-white (#F0EFE8 via INK token) — clearly readable against dark background. Legend labels in secondary light text (#B8B7B0 via INK_SOFT) on elevated dark background (#242420) — readable. Zone labels in muted light tone at fontsize=8 — small but no dark-on-dark failure. Outcome footnote in tertiary light (#A8A79F via INK_MUTED) — readable.
      Data: All Imprint data colors identical to light render: green passes, matte-red shots, blue tackles, ochre interceptions. Alpha-based outcome encoding applies identically. No color shift between themes — only chrome flips.
      Legibility verdict: PASS — no dark-on-dark failures detected; all text elements use theme-adaptive tokens and render in appropriately light colors against the near-black background.
