  image_description: 'The plot displays a soccer pitch event map rendered on a correctly
    proportioned 105m x 68m pitch diagram with a light green background. Standard
    pitch markings are present: penalty areas, goal areas, center circle with center
    spot, halfway line, penalty arcs, corner arcs, and goal posts (rendered as dark
    gray bars). Subtle zone shading distinguishes the defensive third (blue tint)
    and attacking third (red tint). Four event types are plotted with distinct markers
    and colors: blue circles for passes, red stars for shots, teal triangles for tackles,
    and orange diamonds for interceptions. Successful events appear as filled markers
    while unsuccessful ones are hollow with colored outlines. Blue directional arrows
    show pass trajectories across the pitch, and red arrows show shot trajectories
    toward the right goal. The legend at the bottom center displays all 8 categories
    (4 event types x 2 outcomes) in a horizontal layout across 2 rows. Axis labels
    read "Pitch Length (m)" and "Pitch Width (m)" with tick values matching FIFA dimensions.
    The title "scatter-pitch-events · bokeh · pyplots.ai" appears at the top left.'
