    canonical order
  - Interactive legend filtering via alt.selection_point(bind=legend) demonstrates
    Altair distinctive declarative interactivity
  - 'Comprehensive pitch markings from scratch: penalty areas, goal areas, both arcs,
    corner arcs, center circle, penalty spots — all accurate'
  - Smart opacity gradient for zone shading (0.20 → 0.34 → 0.58) creates natural visual
    emphasis on the attacking third matching the subtitle narrative
  weaknesses:
  - Zone labels at fontSize=8.5 are intentionally subtle but may become unreadable
    at thumbnail sizes (~400 px) — consider 10pt for better mobile readability
  - Attacking third shows moderate event congestion with ~18 shots and their trajectory
    arrows overlapping; reducing arrow strokeWidth to 0.8 and arrowhead size to 65
    would reduce visual noise
  - Arrowhead angle encoding uses pre-computed pandas trigonometry rather than Vega-Lite
    calculate transform — a more idiomatic approach for the Altair grammar
