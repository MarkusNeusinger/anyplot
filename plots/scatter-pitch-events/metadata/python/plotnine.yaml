review:
  strengths:
  - Full soccer pitch drawn with accurate FIFA dimensions (105×68m) — penalty areas,
    goal areas, center circle, penalty arcs, corner arcs, and goal posts all present
  - All four event types use distinct shape+color dual encoding (circles/stars/triangles/diamonds
    with Imprint palette positions 1–4) satisfying CVD-safety requirements
  - Directional arrows implemented for both passes (thin, green) and shots (bold,
    lavender) with correct alpha encoding for outcome (Successful=0.92, Unsuccessful=0.40)
  - Theme-adaptive chrome correctly implemented — INK and INK_SOFT tokens adapt title,
    subtitle, and legend text between light (#FAF8F1) and dark (#1A1A17) backgrounds
  - 'Visual hierarchy achieved: shot markers larger (size=8) vs other events (size=4.5),
    and shot arrows bolder (size=0.9) vs pass arrows (size=0.4), creating a clear
    focal point on attacking actions'
  - All axis elements intentionally removed (ticks, tick labels, axis title) — correct
    design choice for a pitch spatial map
  - coord_fixed(ratio=1) ensures correct 105:68 pitch aspect ratio is maintained
  - Reproducible synthetic data with np.random.seed(42) and realistic event frequency
    and success-rate distributions
  - Grass stripe effect adds subtle visual texture without distracting from the data
  weaknesses:
  - Subtitle at 8pt may be borderline at mobile scale (~400px viewport) — rendered
    source pixels would be ~44px, which scales to ~5–6px at mobile widths; consider
    9pt for the subtitle to improve mobile legibility
  - Shot arrows converge toward a relatively small area near the right goal, causing
    moderate visual congestion with overlapping arrow shafts and star markers in the
    right penalty box — the endpoint-spreading logic helps but the cluster remains
    dense
  - 'Library Mastery could be elevated by using more plotnine-distinctive features:
    e.g., using geom_spoke() for directional arrows instead of manual geom_segment
    with arrow= parameters, or scale_size_manual() to size markers by event importance'
  - DE-01 could reach 8/8 with a descriptive title prefix (e.g., 'Match Event Spatial
    Map · scatter-pitch-events · python · plotnine · anyplot.ai') and more intentional
    whitespace around the pitch within the canvas frame
