review:
  strengths:
  - Comprehensive and accurate pitch rendering with all FIFA-standard elements (penalty
    areas, goal areas, center circle, penalty arcs, corner arcs, goal posts, penalty
    spots, center spot)
  - 'Correct Imprint palette usage: Pass=#009E73 as first series, remaining event
    types in canonical order (positions 1-4)'
  - Both renders correctly theme-adapted with no dark-on-dark failures in the dark
    render
  - 'Effective multi-dimensional encoding: color + shape + alpha + size for event
    type and outcome without overloading the legend'
  - Shot arrows fanning toward goal area create an immediately readable attacking
    pattern
  - Reproducible with seed(42); clean flat script structure
  weaknesses:
  - Shot arrows converge quite densely in the right penalty area (all endpoints concentrated
    in y=27-41, x=98-105); could benefit from even wider spread or lower arrow opacity
    (0.5-0.6) to reduce visual clutter in that zone
  - The Outcome legend section uses override_aes with two alpha values producing a
    combined stacked icon rather than two cleanly separated swatches — consider separate
    guide entries or more explicit legend construction
  - Slight lack of breathing room between pitch boundary and canvas edge (plot_margin=0.04
    is tight for this composition) — increase to 0.07
