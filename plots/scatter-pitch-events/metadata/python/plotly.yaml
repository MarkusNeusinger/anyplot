review:
  strengths:
  - Accurate FIFA-spec pitch layout with all required markings (penalty areas, goal
    areas, center circle, halfway line, corner arcs, penalty arcs, goal posts)
  - 'Strong Imprint palette compliance — passes use brand green #009E73, shots use
    semantic matte red #AE3030, all four event types use distinct Imprint hues'
  - Outcome encoding via filled vs open markers is immediately legible — clear visual
    distinction without relying on color alone
  - 'Idiomatic Plotly usage: layer=''below'' for pitch shapes, None-separator batching
    for direction lines, custom hovertemplate, html-export alongside PNG'
  - Correct aspect ratio preserved via scaleanchor='x' / scaleratio=1 — pitch proportions
    match 105:68 field dimensions
  - Tactical 'Danger Zone' annotation adds storytelling and guides the viewer's attention
    to the shot-dense final third
  - Canvas dimensions at 3200×1800 (width=800, height=450, scale=4) match the landscape
    hard target
  - 'Theme-adaptive paper background (#FAF8F1 light / #1A1A17 dark) correctly applied;
    pitch grass and surround are semantic real-world green (not theme chrome), which
    is the correct exception'
  weaknesses:
  - Pass direction lines are rendered at opacity 0.22 (successful) and 0.18 (unsuccessful)
    — at these levels they are nearly invisible in the static PNG render; raise to
    at least 0.45 / 0.30 so the directional component of passes reads clearly
  - Event direction traces are lines only — no arrowheads; the spec explicitly requires
    'directional arrows'. Consider using Plotly annotations (one per event, with arrow=True)
    for at least the shot traces, or add small arrowhead markers at the endpoint via
    a separate Scatter trace
  - Legend occupies a large portion of the top-left pitch area (8 entries at 10px);
    consider reducing tracegroupgap and splitting into two columns, or moving to an
    outside-pitch position to free up playing-field readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 paper surround, dark green (#1B5E20) pitch perimeter, bright green (#3A9D5C) playing surface — all semantically correct for a football pitch.
      Chrome: Title "scatter-pitch-events · python · plotly · anyplot.ai" in dark ink, clearly readable above the canvas. Legend sits top-left inside the pitch with a semi-transparent dark background and white text — all 8 entries (Pass successful/unsuccessful, Tackle successful/unsuccessful, Interception successful/unsuccessful, Shot on/off target) are legible. "Danger Zone" annotation box (dark bg, white text) in the final third is readable.
      Data: Green circles (passes, #009E73), purple triangles (tackles, #C475FD), blue diamonds (interceptions, #4467A3), red stars (shots, #AE3030). Filled = successful, open = unsuccessful. Shot direction lines (red, ~0.8 opacity) are clearly visible. Pass direction lines (green, ~0.22 opacity) are very faint and barely perceptible in the static render.
      Legibility verdict: PASS — title and annotation text are clearly readable; legend white-on-dark is legible; pass direction lines are a functional weakness but not a legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 paper surround (correct), same green pitch surface. The dark paper border provides clear contrast with the pitch edges.
      Chrome: Title text shifts to light cream (#F0EFE8 INK token) — clearly readable against the dark background. Legend retains its dark semi-transparent background with white text — readable in both themes since the legend always uses its own dark container. "Danger Zone" annotation remains readable.
      Data: All four event-type colors (#009E73, #C475FD, #4467A3, #AE3030) are identical to the light render — only chrome (paper background) flips, consistent with Imprint palette rules. No dark-on-dark text failure observed.
      Legibility verdict: PASS — no dark-on-dark issues; all text elements are readable against their respective backgrounds in both themes.
