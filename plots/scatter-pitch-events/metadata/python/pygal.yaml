review:
  strengths:
  - Complete FIFA pitch geometry drawn correctly with all standard markings (penalty
    areas, goal areas, center circle, penalty/corner arcs) using pygal's None-break
    line technique
  - 'Theme-adaptive semantic pitch green (#276b2e light / #1b3b1f dark) is an appropriate
    and well-executed semantic color exception'
  - 'Full Imprint palette in canonical order; first event series (Pass ✓) correctly
    uses brand green #009E73'
  - Dashed strokes for unsuccessful events provide redundant encoding beyond color
    alone
  - Shot prominence hierarchy (largest dots, thickest strokes) effectively draws the
    eye to key events
  - Clean, flat code with correct sys.path fix, seed, and dual-theme output
  weaknesses:
  - All event types use circular dots — spec requests distinct marker shapes (circles,
    stars, triangles, diamonds). Consider using different dot sizes more aggressively
    or annotating event-type labels near cluster centroids since pygal cannot render
    polygon markers
  - Pass origin dots (dots_size=4) are too small relative to the large canvas; increase
    to 7-8 for visibility at render scale
  - No goal posts drawn (thin rectangles at x=0 and x=105 centered on y=34, width
    ~2.4m, height ~7.32m)
  - The shot convergence zone (right penalty area) shows crowding; modest alpha reduction
    (opacity 0.6-0.7) on shot lines would help
  - Goal events could be annotated (e.g., small label or a slightly different marker
    outline) to elevate storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surround; pitch area filled with medium grass-green #276b2e
      Chrome: Title "scatter-pitch-events · python · pygal · anyplot.ai" in dark text at top — readable; no axis labels or tick labels (intentionally disabled for pitch diagram); legend at bottom in 4 columns with readable colored swatches and text
      Data: Brand-green circles/lines for Pass ✓ (first series = #009E73 ✓); lavender dashed lines for Pass ✗; blue large circles + lines for Shot ✓ (goal); ochre dashed lines for Shot ✗; matte-red circles for Tackle ✓; cyan circles for Tackle ✗; rose circles for Intercept ✓; lime circles for Intercept ✗ — all Imprint palette in canonical order; pitch markings in semi-transparent white
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 surround; pitch area shifts to darker #1b3b1f (theme-adaptive semantic green)
      Chrome: Title and legend text render in light color against dark background — clearly readable; no dark-on-dark failures observed; legend swatches match light render
      Data: All data colors identical to light render — same green, lavender, blue, ochre, red, cyan, rose, lime — only pitch background and page chrome flip; brand green #009E73 remains visible on the dark pitch surface
      Legibility verdict: PASS
