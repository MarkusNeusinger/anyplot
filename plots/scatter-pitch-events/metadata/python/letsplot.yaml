      Data: Data colors visually identical to light render. Arrows and markers maintain the same visual clarity. Shot cluster in attacking third has the same dense-but-readable pattern as in light mode.
      Legibility verdict: PASS — all chrome adapts correctly to dark theme; no dark-on-dark failures observed.
