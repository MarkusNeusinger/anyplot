review:
  strengths:
  - Correct Imprint palette in canonical order (Pass=#009E73, Shot=#C475FD, Tackle=#4467A3,
    Interception=#BD8233)
  - 'Accurate FIFA-spec pitch geometry: penalty areas, goal areas, center circle,
    halfway line, corner arcs, goal posts'
  - Directional arrows via geom_segment + arrow() for passes and shots — tactically
    meaningful
  - Dual-outcome encoding using fill (colored vs white) and alpha (1.0 vs 0.42) is
    clear and spec-compliant
  - 'Correct canvas: ggsize(800, 450) + scale=4 = 3200×1800, both themes render correctly'
  - Interactive HTML tooltips via layer_tooltips() leverage letsplot-specific feature
  - coord_fixed(ratio=1) maintains the 105:68 pitch aspect ratio precisely
  - Custom legend below the pitch with markers + labels + outcome key is well-organised
  - Dual-zone highlights (attacking/defensive thirds) add tactical context without
    dominating
  - Flat, KISS code structure with np.random.seed(42) for reproducibility
  weaknesses:
  - Shot marker shape is a diamond (shape=23) instead of a star/asterisk — spec suggests
    stars for shots; while spec says "e.g.", a star would be more distinctive from
    other polygon shapes
  - Clustering of shot arrows in the attacking third creates a dense visual tangle
    in the right side of the pitch — minor overplotting is not avoidable but could
    use a slightly higher alpha contrast between series
  - Zone label geom_text at size=5 (≈14pt pre-scale) is on the small end when the
    pitch occupies ~60% of the canvas area — at mobile scale (~400px) the zone annotations
    may be slightly hard to read
  - The pitch green (#1A5C2A) is outside the Imprint palette — justified by the spec
    requirement for a green pitch surface, but worth noting as a deviation from the
    strict palette rule
  - 'DE-02 refinement: the zone highlights use pure white and pure black overlays
    at low alpha; a warmer tint (e.g., a very faint Imprint green/blue) would feel
    more on-brand than pure #FFFFFF/#000000 overlays'
