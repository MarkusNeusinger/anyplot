      Pitch: Dark forest green (#1A5C2A) with white markings (pitch outline, penalty areas, goal areas, center circle, halfway line, corner arcs, goal posts). Zone highlights (attacking third: faint white overlay; defensive third: faint dark overlay) are subtle and legible. "Defensive Third" and "Attacking Third" labels in italic white are visible against the green pitch surface.
      Data: Pass events in brand green #009E73 (circles), Shot events in lavender #C475FD (diamonds), Tackle events in blue #4467A3 (triangles), Interception events in ochre #BD8233 (squares). Directional arrows for passes and shots clearly visible. Successful events filled (opaque, alpha=1.0), unsuccessful events have white fill with lower alpha (0.42) — distinction is clear.
      Legibility verdict: PASS — all chrome text readable against light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title and subtitle in light ink (#F0EFE8 / #B8B7B0) clearly visible against the near-black background. Legend event labels in INK_SOFT (#B8B7B0), outcome labels in INK_MUTED (#A8A79F) — both readable. No dark-on-dark failures detected.
