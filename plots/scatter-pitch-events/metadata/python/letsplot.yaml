review:
  strengths:
  - Accurate FIFA-standard pitch with penalty areas, goal areas, center circle, penalty
    arcs, corner arcs, and goal posts drawn correctly
  - Imprint palette applied in canonical order (Pass=#009E73, Shot=#C475FD, Tackle=#4467A3,
    Interception=#BD8233) with redundant shape encoding for accessibility
  - Clever in-coordinate custom legend below the pitch using coordinate extension
    (ylim to -20), keeping layout clean without needing a separate legend box
  - Alpha encoding (1.0 vs 0.42) clearly distinguishes successful from unsuccessful
    events while keeping all markers visible
  - Zone highlights (attacking third / defensive third) with subtle alpha add tactical
    context beyond the bare spec requirements
  - Directional arrows with open arrowheads for passes and shots correctly implement
    trajectory visualization
  - scale_*_identity() chain correctly handles pre-mapped color, fill, shape, size,
    alpha aesthetics — idiomatic letsplot pattern
  - coord_fixed(ratio=1) combined with xlim/ylim correctly maintains 105:68 pitch
    proportions
  - 'Theme-adaptive chrome correctly applied: PAGE_BG, INK, INK_SOFT, INK_MUTED all
    flip between light and dark; data colors remain constant across themes'
  weaknesses:
  - Subtitle runs very close to canvas edges in dark render — subtitle 'hjust=0.5'
    at size=12 spans nearly the full canvas width with minimal margins; consider reducing
    subtitle fontsize to ~10 or shortening the subtitle text to add breathing room
  - Zone annotation labels (geom_text size=4) and outcome description text ('Colored
    fill = Successful', size=4) are on the small side relative to the plot — increasing
    to size=5 would improve mobile readability
  - Attacking third is visually congested with overlapping shots, interceptions, and
    arrows — consider increasing marker alpha contrast (e.g. unsuccessful alpha from
    0.42 to 0.30) to better separate event layers in dense areas
  - 'LM-02: arrow() function and in-coordinate legend are distinctive but the implementation
    doesn''t exploit letsplot''s built-in interactive features (tooltips, HTML output)
    to differentiate from static-library alternatives — the HTML is saved but tooltips
    are not configured'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct theme surface.
      Chrome: Title "scatter-pitch-events · python · letsplot · anyplot.ai" in bold dark (#1A1A17) text, centered, readable. Subtitle "100 match events — passes, shots, tackles & interceptions with outcome encoding" in INK_SOFT (#4A4A44), centered, spans ~85% of canvas width with visible margin on both sides. Custom legend below the pitch: event-type labels ("Pass", "Shot", "Tackle", "Interception") in bold INK_SOFT, outcome text in INK_MUTED — all legible.
      Data: Dark forest green pitch (#1A5C2A) with white (#FFFFFF) standard FIFA markings. Four Imprint colors in canonical order: green circles (Pass), lavender diamonds (Shot), blue triangles (Tackle), ochre squares (Interception). Transparent markers (alpha=0.42) and white fills encode unsuccessful events. Teal/lavender directional arrows with open arrowheads for passes and shots. Zone highlights (attacking/defensive thirds) with subtle white/black overlay (alpha 0.15/0.12). Zone italic labels in white at top corners.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire canvas — correct dark surface.
      Chrome: Title clearly readable in light (#F0EFE8) bold text. Subtitle in lighter INK_SOFT (#B8B7B0) — very close to both canvas edges (subtitle runs nearly full canvas width with minimal margin), but pixels appear intact, not clipped. Legend text and outcome descriptions remain readable in dark-theme tokens.
      Data: Pitch colors (green, white markings) and all four Imprint data colors are identical to light render — green circles, lavender diamonds, blue triangles, ochre squares, consistent with palette rule that data colors do not flip between themes. Zone highlights and labels appear at same positions.
      Legibility verdict: PASS (with minor concern about tight subtitle margins in dark render — no actual pixel clipping observed but breathing room is very limited).
