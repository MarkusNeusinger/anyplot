review:
  strengths:
  - Complete pitch diagram with all required FIFA markings (penalty areas, goal areas,
    center circle, halfway line, corner arcs, goal posts)
  - Four distinct event types with both color AND shape encoding for redundant CVD-safe
    discrimination
  - Opacity encoding for outcome (successful vs unsuccessful) is clean and intuitive
    — large filled vs small faded markers
  - Directional arrows for passes and shots add tactical context at appropriate density
  - KDE density contours per event type (sns.kdeplot with clip) reveal spatial clustering
    without cluttering
  - 'Full theme adaptation: pitch background, title, legend all adapt correctly across
    light and dark renders'
  - Correct Imprint palette with brand green (#009E73) as Pass (first series)
  weaknesses:
  - Arrows are subtle (alpha=0.35) and may be hard to read when scaled to mobile (~400
    px); consider raising to alpha=0.50
  - Legend fontsize=8 and title_fontsize=7 are at the lower bound of readability when
    scaled to small displays; consider 9/8 pt
  - Shot markers (X-marks) are visually crowded in the x>75 attacking zone — consider
    a mild alpha reduction for unsuccessful shots in that zone to reduce clutter
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) figure background — correct. Axes area uses a light sage green (#EEF4E5) as the pitch surface — appropriate semantic choice for a football pitch.
      Chrome: Title "scatter-pitch-events · python · seaborn · anyplot.ai" at fontsize=12, centered, clearly readable in dark ink against light background. Legend at bottom (4 columns) with fontsize=8 shows Pass/Shot/Tackle/Interception with marker shapes; title explains opacity encoding.
      Data: Four event types rendered with distinct Imprint palette colors and shapes: Pass (green squares #009E73), Shot (lavender X-marks #C475FD), Tackle (blue triangles #4467A3), Interception (ochre hexagons #BD8233). Successful events are opaque+larger (s=110, alpha=0.90); unsuccessful are smaller+faded (s=65, alpha=0.38). Directional arrows in matching palette colors at alpha=0.35 indicate pass/shot trajectories. KDE density contours (2 levels, alpha=0.18) overlay each event type. Pitch markings (penalty areas, goal areas, center circle, halfway line, corner arcs, goal posts) in dark green #3A5A40.
      Legibility verdict: PASS — all text readable, data colors clear, pitch markings contrast well with pitch background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) figure background — correct. Axes area uses dark forest green (#1C3828) as the pitch surface — well-adapted for dark theme.
      Chrome: Title renders in light cream (#F0EFE8) against dark background — clearly readable. Legend has light text (INK token) on dark elevated background (#242420). No dark-on-dark text failures observed.
      Data: Data colors are identical to light render (Pass #009E73, Shot #C475FD, Tackle #4467A3, Interception #BD8233) — only chrome flipped. Pitch markings use lighter color (#C8E6C4) against dark pitch background, providing good contrast. Markers, arrows, and KDE contours remain fully visible.
      Legibility verdict: PASS — title and legend clearly readable against dark background; data colors identical to light; no dark-on-dark failures.
