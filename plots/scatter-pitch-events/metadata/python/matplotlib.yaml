review:
  strengths:
  - Full FIFA-standard pitch markings including penalty areas, goal areas, center
    circle, halfway line, corner arcs, penalty arcs, and goal posts — accurate 105×68m
    layout
  - Expert use of matplotlib.patches API (Rectangle, Circle, Arc, FancyBboxPatch)
    for custom pitch drawing — this is idiomatic matplotlib for custom geometry
  - Correct 105:68 aspect ratio enforced via set_aspect('equal') and xlim/ylim padding
  - Theme-adaptive pitch colors (medium green light / dark green dark) with appropriate
    pitch line contrast in both renders
  - Path effects (pe.withStroke) applied to title and 'Attacking Third' label for
    legibility on colored backgrounds
  - Per-point RGBA alpha arrays via to_rgba() for vectorized successful/unsuccessful
    differentiation — elegant matplotlib pattern
  - Attacking Third zone highlight (amber FancyBboxPatch + text annotation) creates
    a clear tactical focal point for storytelling
  - 'Perfect Imprint palette compliance: passes #009E73, shots #C475FD, tackles #4467A3,
    interceptions #BD8233 in canonical order; amber #DDCC77 correctly used for zone
    annotation'
  - Directional arrows via ax.annotate() for both passes and shots with per-event
    alpha encoding
  - Canvas exactly 3200×1800px (figsize=(8,4.5), dpi=400) with no bbox_inches='tight'
  weaknesses:
  - Pass arrows (#009E73 brand green) have relatively low contrast against the light-theme
    pitch background (#3a7d44 medium green) — white marker edges and alpha help but
    arrows blend more than ideal; consider a thin white stroke on arrow lines or a
    slightly different visual treatment
  - Pass circle markers (markersize=4, ~100 events' worth of visual density) are somewhat
    small on the 3200px canvas — increasing to markersize=5-6 would improve visibility
    without crowding
  - Code comment on title line says 'fontsize stays at 12pt' but the formula max(8,
    round(12 * 67 / len(title))) gives ~15pt for a 54-char title — the comment is
    misleading (formula is applied unconditionally rather than clamping at 12 for
    titles shorter than 67 chars as the guide specifies)
  - Corner arcs are very small (radius=1 in 105m coordinate space → effectively 1px
    at the render scale) and may not be visible on the pitch; corner arc radius in
    FIFA specs is 1m which maps to ~1 unit but renders as a barely-visible arc
