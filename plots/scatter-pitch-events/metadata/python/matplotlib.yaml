      Pitch: Medium green (#3a7d44) field fills the plot with white/cream (#FAF8F1) pitch markings — outer boundary, penalty areas, goal areas, center circle, halfway line, penalty spots, penalty arcs, corner arcs, and goal posts all clearly drawn.
      Chrome: Title "scatter-pitch-events · python · matplotlib · anyplot.ai" in dark #1A1A17 ink at ~15pt is clearly readable above the pitch. Legend bar at bottom shows Pass, Shot, Tackle, Interception, Successful (bright), Unsuccessful (faded) with #FFFDF6 elevated background and #4A4A44 text — all readable.
      Data: Pass arrows and circles in #009E73 (brand green) — slightly low contrast against the medium-green pitch but white marker edges and high alpha for successful events keep them visible. Shot stars in #C475FD (lavender) at markersize=12 are very prominent in the attacking zone. Tackle triangles in #4467A3 (blue) at s=80 are clearly visible. Interception diamonds in #BD8233 (ochre) at s=60 are clearly visible. Amber #DDCC77 "Attacking Third" zone annotation with rounded-rectangle highlight in top-right quadrant provides strong focal point.
      Legibility verdict: PASS — all text readable; data colors distinguishable; minor concern with pass-green-on-pitch-green contrast but still legible.

