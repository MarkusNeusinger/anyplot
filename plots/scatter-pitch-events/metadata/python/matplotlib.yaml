      Background: Warm near-black #1A1A17 surrounds the plot — correct dark page surface.
      Pitch: Dark green (#1e4d2b) field with light grey (#e0e0e0) pitch markings — all pitch elements remain clearly visible against the darker surface.
      Chrome: Title in light #F0EFE8 ink clearly readable against the dark background. Legend bar uses #242420 elevated background with #B8B7B0 text — fully readable. No dark-on-dark failures detected anywhere.
