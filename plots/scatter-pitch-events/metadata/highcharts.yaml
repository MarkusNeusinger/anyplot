  image_description: 'The plot displays a soccer pitch event map on a dark navy (#1a1a2e)
    background with a gradient green pitch surface. Standard FIFA pitch markings are
    drawn in semi-transparent white lines: two penalty areas, two goal areas, center
    circle with center spot, halfway line, penalty spots with arcs, corner arcs, and
    goal outlines beyond the pitch. Four event types are plotted as scatter markers:
    Pass (blue circles, ~55 points distributed across the pitch), Shot (red upward
    triangles, ~18 points concentrated in the attacking third), Tackle (orange downward
    triangles, ~25 points across defensive/middle thirds), and Interception (teal
    diamonds, ~22 points across the pitch). Successful events are filled with their
    color; unsuccessful ones have white fill with colored borders. Blue directional
    arrows show pass trajectories; red arrows show shot trajectories toward the goal.
    The title reads "scatter-pitch-events · highcharts · pyplots.ai" in light gray.
