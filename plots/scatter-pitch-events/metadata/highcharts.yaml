  strengths:
  - Excellent pitch rendering with all FIFA-standard markings including penalty arcs,
    corner arcs, and goal outlines
  - Complete spec compliance — all required features implemented including directional
    arrows with arrowheads
  - Realistic data distribution with event-appropriate spatial clustering (shots near
    goal, passes distributed)
  - Good use of Highcharts renderer API for custom SVG drawing on the chart canvas
  - Thoughtful outcome encoding with filled vs hollow markers and varying arrow opacity
  weaknesses:
