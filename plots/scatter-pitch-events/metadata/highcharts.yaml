    events hard to spot
  - Blue and purple markers may be hard to distinguish under color vision deficiencies
  - No visual hierarchy or focal point — all events have equal visual weight, missing
    storytelling opportunity
  - Repetitive data-building code could be more concise
  image_description: 'The plot displays a soccer pitch event map on a rich green (#2d6a30)
    background with white pitch markings including penalty areas, goal areas, center
    circle, halfway line, corner arcs, penalty spots, and goal outlines. Four event
    types are plotted: blue circles for Passes (55 events), red/coral upward triangles
    for Shots (18 events), orange downward triangles for Tackles (25 events), and
    purple diamonds for Interceptions (22 events). Filled markers indicate successful
    outcomes; hollow (transparent fill with colored border) markers indicate unsuccessful
    ones. Semi-transparent directional arrows with arrowheads show pass and shot trajectories
    across the pitch. The title "scatter-pitch-events · highcharts · pyplots.ai" appears
    at top center, with a subtitle explaining the encoding. A legend with a semi-transparent
    white background is positioned in the upper-left corner.'
