  strengths:
  - Excellent spec compliance — all required features implemented including pitch
    markings, directional passes/shots, and outcome encoding
  - Thematic green pitch background with well-drawn FIFA-standard markings creates
    an authentic soccer analysis feel
  - Smart use of pygal None-break technique for individual line segments representing
    passes and shots
  - Good data storytelling with shots as focal points using larger markers and bolder
    strokes
  - Realistic data with appropriate event counts and success rates
  weaknesses:
  - Pass line density creates visual clutter — the web of 80 pass lines makes individual
    passes hard to trace
  - Blue vs teal color distinction (passes vs interceptions) could be improved for
    colorblind accessibility
  - Legend text could be larger for better readability at the rendered resolution
  image_description: 'The plot displays a soccer pitch event map on a dark green background
    with white pitch markings (outline, penalty areas, goal areas, center circle,
    halfway line, corner arcs). Events are scattered across the pitch: blue solid
    lines for successful passes, yellow dashed lines for unsuccessful passes, large
    red dots with thick lines for successful shots (goals) directed at goal, pink/salmon
    dots with dashed lines for missed shots, orange dots (larger for successful) for
    tackles, and teal/cyan dots for interceptions. The title "scatter-pitch-events
    · pygal · pyplots.ai" appears at top. A legend at the bottom shows 8 categories
    in 4 columns. The pitch fills the canvas well with correct aspect ratio. Pass
    lines create a dense web across the pitch, while shots cluster near the right
    goal area.'
