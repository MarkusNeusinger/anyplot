  strengths:
  - Complete and accurate pitch diagram with all standard FIFA markings (penalty areas,
    goal areas, arcs, spots, corner arcs)
  - Excellent use of Altair layered composition to build the pitch and overlay events
  - 'Strong data storytelling: shot size hierarchy and convergence on goal create
    a clear focal point'
  - Colorblind-safe palette with good contrast against green pitch
  - Proper aspect ratio maintenance (105:68) and realistic event distributions
  weaknesses:
  - Shot direction lines converge heavily near the goal, making individual arrows
    hard to distinguish in the attacking third
  - White space below the pitch reduces overall canvas utilization
  - Zone shading is extremely subtle (opacity 0.18) — barely perceptible differentiation
    between thirds
  image_description: 'The plot displays a soccer pitch event map on a green background
    with three subtle zone shadings (defensive, middle, attacking thirds). White pitch
    markings are clearly drawn: boundary lines, penalty areas (both sides), goal areas,
    center circle, halfway line, penalty arcs, corner arcs, and center/penalty spots.
    Four event types are scattered across the pitch using distinct markers and colors:
    blue circles for passes, orange right-triangles for shots, teal upward-triangles
    for tackles, and purple diamonds for interceptions. Directional lines with arrowheads
    connect pass and shot origins to their endpoints. Shots cluster in the attacking
    third (right side) with lines converging toward the goal, creating a clear focal
    point. Opacity differentiates successful (darker/more opaque) from unsuccessful
    (lighter/more transparent) events. Two legends on the right show "Event Type"
    and "Outcome" with styled backgrounds. The title reads "scatter-pitch-events ·
    altair · pyplots.ai" with a subtitle describing the content. There is some white
    space below the pitch canvas.'
