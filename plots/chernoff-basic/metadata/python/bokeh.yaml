    should save both static PNG and interactive HTML
  - 'Background color #FAFAFA should be #FAF8F1 (light theme per style guide) - minor
    but inconsistent'
  - Code uses bokeh.io.export_png which style guide explicitly says NOT to use; should
    use Selenium+Chrome for robust rendering
  - 'Code/image version mismatch: rendered colors and text appearance don''t match
    hardcoded values in code, suggesting implementation wasn''t executed from provided
    source file'
