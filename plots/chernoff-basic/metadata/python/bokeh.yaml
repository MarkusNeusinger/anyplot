    Dark render (plot-dark.png):
      Background: Very dark, approximately #1A1A17 or darker (dark theme appropriate)
      Chrome: Title text is light-colored and readable. Face labels are light-colored and readable against the dark background. Legend items are visible with light text labels.
      Data: Same 12 faces in 4×3 grid. Facial feature representations are identical to light render (same expressions, eye sizes, mouth curves). Data colors should be identical hex codes to light render (only chrome changes between themes).
      Legibility verdict: PASS - All text is readable, dark-on-light contrast achieved. However, comparing to light render, the overall appearance differs more than expected if using identical hex codes, suggesting potential theme-adaptation issues or image generation concerns.

