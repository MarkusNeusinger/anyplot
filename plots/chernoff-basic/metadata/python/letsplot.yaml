review:
  strengths:
  - Perfect Okabe-Ito palette compliance with correct theme-adaptive chrome (background,
    text colors)
  - Excellent data choice (Iris dataset) that demonstrates all four multivariate dimensions
  - Clean, reproducible code with proper random seed and clear linear structure
  - Professional layout and grid composition with balanced whitespace
  - 'Correct feature mapping: sepal length → face width, sepal width → eye size, petal
    length → mouth curvature, petal width → eyebrow slant'
  weaknesses:
  - 'Pupil visibility in dark mode: pupils render with light INK color (#F0EFE8) against
    white eyes, creating low contrast. Pupils should be dark (e.g., INK_SOFT or inverted)
    for visibility in both themes.'
  - 'Design Excellence ceiling: visually generic implementation that looks like a
    well-configured default rather than intentional aesthetic design.'
  - 'Limited Library Mastery: does not leverage letsplot-specific features beyond
    basic geom layering; no distinctive or sophisticated usage patterns.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 - matches specification
      Chrome: Title "chernoff-basic · letsplot · anyplot.ai" is dark 24pt bold, clearly readable. Species labels below each face in dark gray, fully readable. Legend on right with species colors.
      Data: 12 Chernoff faces in 3×4 grid. Setosa faces (#009E73 green) with various facial expressions. Versicolor faces (#D55E00 tan) showing different mouth curvatures. Virginica faces (#0072B2 blue) with varied eyebrow slants. Eyes have white fills with dark pupils - high contrast. All four facial features (face width, eye size, mouth curvature, eyebrow slant) are clearly distinguishable.
      Legibility verdict: PASS - all text readable, all facial features visible with good contrast

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 - matches specification
      Chrome: Title is light-colored and readable. Species labels in light gray (#B8B7B0) and readable. Legend text legible.
      Data: Same 12 faces. Data colors (Okabe-Ito green #009E73, tan #D55E00, blue #0072B2) are IDENTICAL to light render - only chrome flips, not data colors. Mouth expressions, eyebrows, and nose features are visible.
      **ISSUE**: Pupils are rendered with INK color (#F0EFE8 in dark mode) against white eye fills, creating near-white-on-white with very poor contrast. Pupils are barely distinguishable in dark render, whereas they are clearly dark and visible in light render. This is a theme-adaptation failure.
      Legibility verdict: PARTIAL PASS - most elements readable, but pupil visibility is poor in dark mode
