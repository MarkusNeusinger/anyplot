review:
  strengths:
  - Smooth, well-shaped energy profile curve with proper Gaussian barrier and Hermite
    smoothstep transitions
  - Custom y-axis labels at chemically meaningful energy values (20, 50, 120)
  - Informative legend entries with computed Ea and ΔH values
  - Clean layout with hidden x-labels and selective y-guides
  - Deterministic data generation with realistic chemistry values
  weaknesses:
  - Red-green color pair for Ea/ΔH indicators fails colorblind accessibility
  - Reactant/Product/Transition State labels only appear in legend, not directly on
    the plot as spec requires
  - Ea/ΔH indicators are simple dashed lines without arrowheads (spec requests double-headed
    arrow)
  - Monospace font throughout reduces visual sophistication
  image_description: 'The plot displays a reaction coordinate energy diagram on a
    white background. A smooth blue curve (#306998) traces the energy profile from
    reactants at 50 kJ/mol through a Gaussian-shaped transition state peak at 120
    kJ/mol, then descends to products at 20 kJ/mol. Two horizontal gray dashed lines
    mark the reactant (50) and product (20) energy levels across the full width. A
    red dashed vertical line at x≈3.2 indicates the activation energy (Ea) with dot
    endpoints at 50 and 120 kJ/mol. A green dashed vertical line at x≈9.2 indicates
    the enthalpy change (ΔH) with dot endpoints at 50 and 20 kJ/mol. A larger blue
    dot marks the transition state at the curve peak. Smaller blue dots mark reactants
    (left plateau) and products (right plateau). The y-axis shows "Potential Energy
    (kJ/mol)" with custom labels at key energy values (0, 20, 50, 80, 100, 120, 140).
    The x-axis shows "Reaction Coordinate" with no tick labels. The title reads "line-reaction-coordinate
    · pygal · pyplots.ai" in monospace font. A bottom legend lists: Energy Profile,
    Ea = 70 kJ/mol, ΔH = -30 kJ/mol, Transition State (‡), Reactants (50 kJ/mol),
    Products (20 kJ/mol).'
