  image_description: The plot displays a reaction coordinate energy diagram rendered
    as a smooth blue spline curve on a white background. The title reads "line-reaction-coordinate
    · highcharts · pyplots.ai" at the top center. The y-axis is labeled "Potential
    Energy (kJ/mol)" ranging from 0 to 140, and the x-axis is labeled "Reaction Coordinate"
    with no tick labels (appropriate for arbitrary units). The curve starts flat at
    the "Reactants" level (~50 kJ/mol), rises smoothly to a peak at ~120 kJ/mol labeled
    "Transition State (‡)" in an orange-bordered box, then descends to the "Products"
    level (~20 kJ/mol). A vertical orange double-headed arrow on the left side of
    the curve marks the activation energy with a label "Eₐ = 70 kJ/mol" in an orange-bordered
    box. A vertical blue double-headed arrow on the right marks the enthalpy change
    with "ΔH = -30 kJ/mol" in a blue-bordered box. Two horizontal gray dashed lines
    indicate the reactant and product energy levels. The design is clean with no grid
    lines, no legend (single series), and good use of color to distinguish Eₐ (orange)
    from ΔH (blue).
