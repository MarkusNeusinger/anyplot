  - Arrow markers on the Ea and ΔH annotation shapes are small relative to the large
    canvas
  - JS string injection for annotations is fragile - would be better to use the highcharts-core
    Python API if possible
  image_description: The plot shows a reaction coordinate energy diagram with a smooth
    blue spline curve on a white background. The title reads "line-reaction-coordinate
    · highcharts · pyplots.ai" at the top. The y-axis is labeled "Potential Energy
    (kJ/mol)" with tick values from 0 to 135. The x-axis has no tick labels (appropriate
    for reaction coordinate). The curve starts at a flat plateau around 50 kJ/mol
    (labeled "Reactants" in blue text), rises smoothly through a transition state
    peak at ~120 kJ/mol (labeled "Transition State (‡)" in an orange-bordered box),
    then descends to a product plateau at ~20 kJ/mol (labeled "Products" in blue).
    Two horizontal dashed gray lines mark the reactant and product energy levels.
    An orange double-headed arrow on the left side shows Ea = 70 kJ/mol with an orange-bordered
    label. A blue double-headed arrow on the right shows ΔH = -30 kJ/mol with a blue-bordered
    label. The x-axis title "Reaction Coordinate" appears to be cut off or not visible
    in the rendered output. No legend is shown. Overall clean, scientific appearance.
