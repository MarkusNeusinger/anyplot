  - 'Perfect spec compliance — all required features present: smooth energy curve,
    direct state labels (Reactants/Transition State/Products), double-headed Ea and
    ΔH arrows, and dashed reference lines at reactant and product energy levels'
  - 'Excellent theme adaptation — both renders are theme-correct: warm off-white (#FAF8F1)
    background in light, warm near-black (#1A1A17) in dark; data colors (green curve,
    red/blue arrows) are identical across themes; chrome (text, grid, axis lines)
