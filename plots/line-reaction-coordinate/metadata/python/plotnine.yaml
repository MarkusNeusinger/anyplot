    barrier (cost/warning semantic) and blue (#4467A3) for enthalpy change, creating
    an immediate visual hierarchy that guides the chemistry narrative
  - Realistic and factually correct chemistry data — Ea=70 kJ/mol and ΔH=-30 kJ/mol
    are physically plausible for a single-step exothermic reaction; 300-point CubicSpline
    curve produces smooth, publication-appropriate rendering
