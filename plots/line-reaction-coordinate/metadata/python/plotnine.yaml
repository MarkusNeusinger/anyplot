    but the annotation approach (annotate(''segment'') + annotate(''text'')) is functionally
    identical to ggplot2 — no plotnine-distinctive features are showcased'
  - State label annotations (size=3.5 in mm ≈ 10pt) are on the small side for key
    labeling at mobile widths — 'Reactants 50 kJ/mol', 'Transition State 120 kJ/mol',
    and 'Products 20 kJ/mol' could be nudged to size=4.0 for slightly better readability
    when scaled to 400px
  - Key-point markers (size=3) are modest given only 3 sparse data anchor points —
    increasing to size=4 or 5 would make the reactant, transition state, and product
    dots more prominent without crowding
