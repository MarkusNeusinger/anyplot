      Data: Main energy curve in brand green #009E73 (correct Imprint position 1) — smooth Gaussian bell curve from ~50 kJ/mol rising to 120 kJ/mol at the transition state then descending to ~20 kJ/mol. Dashed reference lines at 50 kJ/mol (reactant) and 20 kJ/mol (product). Large lavender (#C475FD) marker at transition state (5.0, 120). Blue (#4467A3) marker at reactants (1.0, 50). Matte red (#AE3030) marker at products (9.5, 20). Cyan (#2ABCCD) dashed vertical line for Ea indicator from (5, 50) to (5, 120) with endpoint dots. Ochre (#BD8233) dashed vertical line for ΔH indicator from (8.5, 50) to (8.5, 20) with endpoint dots.
