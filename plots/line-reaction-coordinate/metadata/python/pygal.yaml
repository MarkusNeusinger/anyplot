review:
  strengths:
  - Smooth Gaussian-based energy curve with box-filter smoothing produces a realistic
    single-step exothermic profile
  - Excellent color assignments using semantic Imprint palette roles — green for energy
    profile, cyan for Ea, ochre for ΔH, lavender for transition state
  - Horizontal dashed reference lines at reactant and product energy levels match
    spec requirements
  - 'Full code quality: deterministic data, clean imports, KISS structure, and correct
    HTML+PNG dual output for pygal (interactive library)'
  - Theme-adaptive chrome implemented correctly — backgrounds, INK, INK_MUTED all
    flip properly between light and dark
  weaknesses:
  - Spec requires labeling reactants, products, and transition state *directly on
    the plot* (as text annotations), but the implementation uses only legend entries
    — direct on-plot text labels are expected for educational clarity
  - Spec requires double-headed arrows for Ea and ΔH, but pygal cannot render SVG
    path arrows natively; the dashed vertical lines with endpoint dots are a reasonable
    approximation but fall short of the arrow requirement
  - Some unused blank canvas space at bottom — the large margin_bottom=260 pushes
    a visible gap below the 3-column bottom legend
  - 'Design Excellence is moderate: the chart reads as a well-configured pygal chart;
    no spines can be hidden in pygal (library constraint), and grid lines use pygal
    defaults with limited styling control'
