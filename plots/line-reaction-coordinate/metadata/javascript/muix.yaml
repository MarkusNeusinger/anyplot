review:
  strengths:
  - Perfect spec compliance with all required annotation features (Ea arrow, ΔH arrow,
    dashed reference lines, and all three point labels)
  - Sophisticated use of MUI X composition API with useDrawingArea hook for accurate
    coordinate-mapped custom SVG annotations
  - 'Accurate chemistry data: Gaussian baseline + peak model produces a physically
    plausible smooth curve; Ea and ΔH values correctly computed'
  - Dual-theme implementation using ANYPLOT_TOKENS works correctly in both renders
    with no dark-on-dark or light-on-light failures
  - 'High code quality: deterministic data generation, clean React component structure,
    no forbidden patterns'
  weaknesses:
  - Annotation text at fontSize=16 CSS px may be difficult to read at mobile display
    widths (~400px); increase to 18-20px for better mobile readability
  - The Reactants (50 kJ/mol) label is only 14px above the dashed reference line,
    appearing crowded — increase yOffset to ~22-24px
  - Design excellence is functional but not visually distinctive beyond spec requirements
    — appropriate scientific styling but lacks a strong aesthetic signature
