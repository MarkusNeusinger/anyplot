review:
  strengths:
  - Idiomatic use of useDrawingArea hook for custom SVG annotation overlay — coordinate
    mapping from data space to SVG pixels is precise and theme-adaptive
  - 'Full spec compliance: all required features implemented (Ea double-headed arrow,
    ΔH double-headed arrow, dashed reference lines at reactant/product levels, direct
    labels, transition state marker)'
  - 'Perfect palette compliance — brand green #009E73 as first (and only) series,
    t.pageBg for background, all chrome via theme tokens'
  - Both light and dark renders are fully readable — no dark-on-dark or light-on-light
    failures; theme adaptation is seamless
  - Deterministic data generation from clearly named constants (E_REACTANTS, E_TRANSITION,
    E_PRODUCTS) — scientifically accurate energy curve via Gaussian peak formula
  - ChartsReferenceLine used effectively for dashed horizontal lines at reactant and
    product energy levels
  - 'Clean code quality: KISS structure, all imports used, EnergyAnnotations component
    is justified by the useDrawingArea hook dependency'
  weaknesses:
  - Title fontSize=22 CSS px renders too small at the final 3200×1800 canvas — title
    occupies only ~40-45% of canvas width (target is 50-70%); increase to ~26-28 CSS
    px
  - 'No Y-axis grid lines: without subtle horizontal reference lines at regular energy
    intervals (e.g. every 25 kJ/mol), readers struggle to read exact energy values
    from tick labels alone — add a light horizontal grid (opacity ~0.15) on the Y
    axis'
  - 'DE-01: SVG annotations are functional but could be more visually refined — arrowhead
    polygon style and text offsets are mechanical; a light shaded fill under the energy
    curve (area fill from y=0) would increase aesthetic sophistication significantly'
  - 'DE-03: Data storytelling is spec-complete but does not go beyond requirements
    — no emphasis technique (e.g. shading the activation energy region, gradient fill
    under curve) to help the viewer''s eye identify the key feature of the diagram'
