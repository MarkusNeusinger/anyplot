    lines mark the reactant (50) and product (20) energy levels. A red double-headed
    arrow at x≈0.18 indicates Eₐ = 70 kJ/mol, and a green double-headed arrow at x≈0.85
    indicates ΔH = −30 kJ/mol. Bold labels identify "Reactants", "Transition State",
    and "Products". The background is light gray (#fafafa) with no x-grid and a very
    subtle y-grid. The toolbar is removed.
