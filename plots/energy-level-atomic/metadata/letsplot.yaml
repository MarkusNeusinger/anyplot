review:
  strengths:
  - Perfect spec compliance with all required features including ionization limit,
    nonlinear scale, and three spectral series
  - Scientifically accurate hydrogen atom data (E_n = -13.6/n² eV)
  - Clean visual design with removed x-axis, subtle grid, and intentional color palette
  - Well-organized deterministic code with clear data/plot separation
  - Smart nonlinear y-axis transform (power 0.4) to spread converging upper levels
  weaknesses:
  - Energy value labels partially overlap with thick level line endpoints (minus signs
    obscured)
  - Title font size (22) and annotation text sizes (11-13) are below recommended thresholds
    for optimal legibility
  - No strong focal point or data storytelling emphasis — the three series are presented
    uniformly
  - Purple and blue series colors could be more distinct for accessibility
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    clean white background. Six dark horizontal lines represent energy levels n=1
    through n=6, positioned vertically using a nonlinear (power) transform that spreads
    the converging upper levels. Each level is labeled on the left with its quantum
    number (e.g., "n=1", "n=2") in bold dark text and on the right with its energy
    value (e.g., "-13.60 eV", "-3.40 eV"). A dashed gray line at the top marks the
    ionization limit at 0 eV. Downward-pointing arrows with V-shaped arrowheads represent
    emission transitions: purple arrows for the Lyman series (to n=1), blue arrows
    for the Balmer series (to n=2), and red arrows for the Paschen series (to n=3).
    Arrows within each series are staggered horizontally. A manual legend on the right
    identifies the three series with colored line segments and labels ("Lyman series
    (UV)", "Balmer series (Visible)", "Paschen series (IR)"). The Y-axis is labeled
    "Energy (eV)" with custom tick marks showing actual energy values. The title reads
    "Hydrogen Atom Energy Levels · energy-level-atomic · letsplot · pyplots.ai".'
