review:
  strengths:
  - Physically accurate hydrogen atom data with correct energy values and wavelengths
    creates an authoritative, educational visualization
  - Excellent data storytelling through Balmer series emphasis (thicker arrows), wavelength
    alpha-line annotations, and spectral region labeling (UV, Visible, IR)
  - Strong visual refinement with hidden x-axis, subtle grid, clean backgrounds, and
    intentional gray hierarchy
  - Power transform for y-positioning effectively spreads converging upper levels
    for readability
  - Horizontal staggering of arrows within each series prevents overlap and creates
    clear visual groupings
  - Interactive tooltips via layer_tooltips() add genuine value with series, transition,
    and wavelength information
  weaknesses:
  - Upper energy levels (n=4, n=5, n=6) are closely spaced causing slight visual crowding
    in labels and energy values
  - Title prepends descriptive text before the required format pattern
  - Manual legend construction adds code verbosity
  - Arrowheads could be slightly more prominent for better visual impact at the rendered
    resolution
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    clean white background. Six horizontal dark slate lines represent energy levels
    n=1 through n=6, positioned vertically using a power-transformed scale that spreads
    the converging upper levels. Each level is labeled in bold on the left (n=1, n=2,
    etc.) with energy values in gray on the right (-13.60 eV, -3.40 eV, -1.51 eV,
    -0.85 eV, -0.54 eV, -0.38 eV). A dashed gray line at the top marks the ionization
    limit (0 eV). Vertical downward arrows represent emission transitions in three
    color-coded spectral series: teal for Lyman (UV, 3 arrows to n=1), blue for Balmer
    (Visible, 4 arrows to n=2, drawn thicker for emphasis), and dark red for Paschen
    (IR, 3 arrows to n=3). Small V-shaped arrowheads point downward at each arrow
    tip. Wavelength annotations in italic gray appear on alpha-lines: 121.6 nm (Lyman),
    656.3 nm (Balmer), 1875.1 nm (Paschen). A custom legend on the right shows colored
    line segments with labels: Lyman series (UV), Balmer series (Visible), Paschen
    series (IR). The title reads "Hydrogen Atom Energy Levels · energy-level-atomic
    · letsplot · pyplots.ai" centered at top. The y-axis is labeled "Energy (eV)"
    with subtle horizontal grid lines. The x-axis is completely hidden.'
