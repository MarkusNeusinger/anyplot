      Data: Lyman series arrows in #009E73 brand green — three long arrows from n=2/3/4 down to n=1, dominant visual element. Balmer series arrows in #C475FD lavender — two mid-length arrows from n=3/4 down to n=2, clearly visible. Paschen series arrow in #4467A3 blue — one very short arrow from n=4 to n=3, visible but small. Ionization dashed line at 0 eV in muted gray. Energy level horizontal lines in INK_SOFT. Series labels at bottom in matching colors.
      Layout note: n=2/3/4 levels compressed in top ~22% of y-range; large empty zone between n=1 and n=2 (linear scale issue).
      Legibility verdict: PASS — all text readable against the light background, no light-on-light failures.

