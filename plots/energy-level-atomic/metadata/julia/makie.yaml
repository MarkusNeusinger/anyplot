review:
  strengths:
  - 'Correct hydrogen physics: accurate energy levels using E_n = -13.6/n² eV, correct
    Lyman/Balmer/Paschen transition groupings'
  - 'Full Imprint palette compliance: brand green (#009E73) for Lyman series (first/most
    prominent), lavender (#C475FD) for Balmer, blue (#4467A3) for Paschen — canonical
    ordinal order'
  - 'Theme-adaptive chrome: all non-data elements correctly adapt between light (#FAF8F1)
    and dark (#1A1A17) surfaces without any dark-on-dark failures'
  - Ionization reference line with dashed style and INK_MUTED color shows good visual
    hierarchy distinguishing structural from data elements
  - Colored series labels at bottom ('Lyman (UV)', 'Balmer (visible)', 'Paschen (IR)')
    provide lightweight legend with spectral region context
  - 'Clean CairoMakie idioms: arrows!, lines!, text! all used idiomatically; proper
    Figure/Axis composition; deterministic data needs no random seed'
  weaknesses:
  - 'Linear Y-axis scale creates severe visual imbalance: n=2/3/4 levels are compressed
    into the top ~22% of the axis while the lower ~78% shows only Lyman arrows with
    no energy levels — the spec explicitly recommends a nonlinear scale; implementing
    a log scale or segmented/broken axis for the binding energy (absolute value) would
    spread the upper levels and use the canvas more effectively'
  - Paschen transition (n=4→n=3, ΔE=0.66 eV) produces an arrow covering only ~4% of
    the y-axis height — barely visible and easily overlooked; a nonlinear scale would
    fix this, or increasing arrowsize/linewidth for short transitions would compensate
  - No individual transition wavelength annotations — the spec mentions transitions
    with optional wavelength/label; adding reference wavelengths (e.g., 121 nm for
    n=2→1, 486 nm for n=4→2, 1875 nm for n=4→3) to the arrows would significantly
    improve educational value
  - Lower two-thirds of the plot area has no energy level lines and serves only as
    a pass-through for the Lyman arrows — this wastes canvas space and makes the chart
    feel bottom-heavy
