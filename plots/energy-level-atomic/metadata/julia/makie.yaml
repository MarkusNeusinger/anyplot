review:
  strengths:
  - 'Correct Imprint palette: brand green (#009E73) for Lyman UV, lavender (#C475FD)
    for Balmer visible, blue (#4467A3) for Paschen IR — all in canonical order'
  - Nonlinear equal visual spacing (n_pos=[1,2,3,4]) prevents the compression of n=2/3/4
    levels that linear eV scaling produces
  - Theme-adaptive chrome fully implemented — all title, axis label, tick, spine,
    and annotation colors flip correctly between light (#FAF8F1) and dark (#1A1A17)
  - 'Physics-accurate data: energies from E_n=-13.6/n² eV, wavelengths from hc/ΔE
    — values (122nm, 103nm, 97nm, 656nm, 486nm, 1876nm) match known hydrogen spectral
    lines'
  - 'Clean design: no grid, minimal spines (only left kept), hierarchical line weights
    (level lines 2.2 vs arrows 2.4) with dashed ionization line for visual distinction'
  - Native Makie arrows! primitive used for transition arrows — idiomatic and not
    easily replicated in other libraries; custom yticks with nonlinear position→eV
    mapping is a Makie-specific strength
  weaknesses:
  - Only 4 quantized energy levels (n=1–4) vs. spec minimum of 5; add n=5 (and ideally
    n=6) to satisfy the spec and show more Lyman/Balmer/Paschen transitions
  - Large empty area in the top ~20% of the axis between the n=4 level (display y=4.0)
    and the ionization line (display y=5.5); reduce ion_pos from 5.5 to ~4.8 or tighten
    ylims to compress the gap and improve canvas utilization
  - 'Helper functions draw_arrow!, wavelength_nm, and fmt_λ break the strict KISS
    structure (CQ-01: no functions); consider inlining the logic or accepting the
    tradeoff'
  - Wavelength annotations at fontsize=10 (20px effective after px_per_unit=2) are
    on the small side for mobile legibility; bumping to fontsize=11–12 would improve
    readability at 400px viewport
  - The 103nm annotation (Lyman 3→1) is at display y=2.18, only 0.18 units above the
    n=2 level line at y=2.0 — visually very tight; increasing the annotation offset
    from 0.18 to 0.30 would give more clearance
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correctly not pure white
      Chrome: Title "energy-level-atomic · julia · makie · anyplot.ai" in dark ink, clearly readable. Y-axis label "Energy (eV)" in dark ink. Tick labels (-13.6, -3.4, -1.51, -0.85, 0) in INK_SOFT. Level labels "n=1" through "n=4" and "n=∞ (ionized)" on right side in dark ink — all readable.
      Data: Four horizontal energy level lines in INK_SOFT (gray), a dashed ionization reference line. Three spectral series as downward emission arrows: Lyman UV in #009E73 (brand green, 3 arrows), Balmer visible in #C475FD (lavender, 2 arrows), Paschen IR in #4467A3 (blue, 1 arrow). Wavelength annotations on each arrow in matching colors. Series legend text at bottom in matching colors.
      Legibility verdict: PASS — all text readable. Wavelength annotations at fontsize=10 (20px effective) are small but legible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correctly not pure black
      Chrome: Title in INK (#F0EFE8) light cream, clearly visible against dark background. Y-axis label and tick labels in INK_SOFT (#B8B7B0) — all readable. Level labels on right in INK cream — no dark-on-dark failures observed. Energy level lines appear as bright white/light lines.
      Data: All three spectral series use identical colors to light render — #009E73 Lyman, #C475FD Balmer, #4467A3 Paschen. Data colors are unchanged between themes; only chrome flips.
      Legibility verdict: PASS — all text readable against the dark background. No dark-on-dark failures detected.
