  - Large empty region between n=1 (-13.6 eV) and n=2 (-3.4 eV) wastes canvas space
  - Design could be pushed further toward publication quality with background tinting,
    series bracket annotations, or wavelength labels on arrows
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    light background. Six solid dark horizontal lines represent energy levels n=1
    (at -13.6 eV) through n=6 (near -0.38 eV), with a grey dashed line at 0 eV for
    the ionization limit (n=infinity). Each level is labeled at its right endpoint
    with bold dark text. Nine vertical arrows with triangle-down arrowheads represent
    emission transitions grouped into three spectral series: Lyman (UV) in steel blue
    targeting n=1, Balmer (Visible) in amber/gold targeting n=2, and Paschen (IR)
    in pink/mauve targeting n=3. Arrows are spatially separated along the x-axis by
    series. The y-axis is labeled "Energy (eV)" with tick marks at even intervals
    from -14 to 0. A legend titled "Spectral Series" appears in the upper right. The
    title reads "energy-level-atomic · altair · pyplots.ai" centered at the top. Subtle
    horizontal gridlines at low opacity are visible. The upper energy levels (n=3
    through n=6) are closely spaced due to the 1/n-squared convergence, creating some
    crowding in that region.'
