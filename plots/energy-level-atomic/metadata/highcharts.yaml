  strengths:
  - Excellent data quality with physically accurate hydrogen energy levels and three
    complete spectral series
  - Clean code with elegant use of linkedTo pattern for legend grouping of multiple
    transition series
  - 'Good visual refinement: grid removed, x-axis hidden, clean typography'
  - Proper title format and descriptive legend with spectral region labels (UV, Visible,
    IR)
  - Thoughtful label y-offsets to mitigate upper-level crowding
  weaknesses:
  - Linear energy scale wastes ~60% of the canvas as empty space between n=1 and n=2,
    while upper levels are compressed into a narrow band
  - Paschen series red (#c0392b) and ionization limit red (#e74c3c) are confusingly
    similar colors
  - Upper level transitions (especially Paschen) are very short and hard to distinguish
    visually
  - No visual hierarchy or emphasis to tell a specific story about the data
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background. The title "energy-level-atomic · highcharts · pyplots.ai" is
    centered at the top in bold dark text, with a subtitle "Hydrogen Atom Energy Levels
    and Spectral Transitions" below it. The Y-axis is labeled "Energy (eV)" and ranges
    from -14 to 0. Six horizontal dark gray lines represent energy levels: n=1 at
    -13.60 eV (bottom), n=2 at -3.40 eV, n=3 at -1.51 eV, n=4 at -0.85 eV, n=5 at
    -0.54 eV, and n=6 at -0.38 eV (near top). A dashed red line at 0 eV marks the
    ionization limit. Each level is labeled on the right with its quantum number and
    energy value. Vertical lines with circle markers (top) and triangle-down markers
    (bottom) represent emission transitions: purple for Lyman Series (UV, transitions
    to n=1), blue (#306998) for Balmer Series (Visible, transitions to n=2), and red
    for Paschen Series (IR, transitions to n=3). The Lyman transitions are the tallest,
    stretching from upper levels down to n=1. A horizontal legend at the bottom identifies
    the three series. The upper energy levels (n=4, n=5, n=6) and ionization line
    are tightly clustered near 0 eV, and the large gap between n=1 and n=2 creates
    substantial empty space in the middle of the chart.'
