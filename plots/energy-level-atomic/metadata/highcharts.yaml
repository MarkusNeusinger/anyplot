  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    light off-white (#fafafa) background. Six horizontal dark charcoal lines represent
    energy levels n=1 through n=6, each labeled on the right with quantum number and
    energy value (e.g., "n=1 (-13.60 eV)"). A dashed gray ionization limit line sits
    at 0 eV, labeled "Ionization (0 eV)". Three spectral series are shown as vertical
    transition lines with endpoint markers: Lyman Series (UV) in purple targeting
    n=1, Balmer Series (Visible) in blue targeting n=2, and Paschen Series (IR) in
    orange targeting n=3. Triangle-down markers at the lower end indicate emission
    direction. Alpha transitions are emphasized with larger markers, thicker lines,
    and wavelength labels (λ = 122 nm, λ = 656 nm, λ = 1879 nm). A y-axis break compresses
    the large gap between n=1 (-13.6 eV) and n=2 (-3.4 eV). The Y-axis is labeled
    "Energy (eV)" with tick marks at -14, -13, -3, -2, -1, 0. A horizontal legend
    at the bottom identifies all three series. The title reads "energy-level-atomic
    · highcharts · pyplots.ai" with a subtitle "Hydrogen Atom Energy Levels and Spectral
    Transitions".'
