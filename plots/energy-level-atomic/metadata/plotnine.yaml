  strengths:
  - Physically accurate hydrogen atom data with correct energy formula and transition
    wavelengths
  - Clever connector line design to spread converging upper-level labels for readability
  - Clean series grouping with color-coded Lyman (UV) and Balmer (Visible) headers
  - 'Strong theme customization: subtle grid, hidden x-axis, themed background, bold
    typography'
  - Perfect spec compliance and data quality with all features implemented
  - Idiomatic plotnine code using annotate() for fixed elements and layer composition
  weaknesses:
  - Upper energy levels n=4, n=5, n=6 visually merge into an indistinguishable cluster
    of blue lines
  - Ly-alpha and H-gamma transition colors are nearly identical purple shades, reducing
    color distinguishability
  - Some wasted vertical space in the layout below n=1 and above series labels
  image_description: 'The plot displays a hydrogen atom energy level diagram with
    blue horizontal lines positioned at their physical energy values from n=1 (-13.6
    eV) at the bottom to n=6 (-0.38 eV) near the top. A dashed gray line marks the
    ionization limit at 0 eV. Six downward emission arrows are colored distinctly:
    three Lyman series transitions (Ly-α 122nm in dark purple, Ly-β 103nm in blue,
    Ly-γ 97nm in pink) target n=1, and three Balmer series transitions (Hα 656nm in
    red, Hβ 486nm in cyan, Hγ 434nm in violet) target n=2. Series group labels ("Lyman
    Series (UV)" and "Balmer Series (Visible)") appear at the top. Right-side labels
    show quantum numbers and energy values (e.g., "n = 1 (-13.60 eV)"), connected
    by thin gray connector lines to their respective energy levels to avoid overlap
    for the converging upper states. The y-axis is labeled "Energy (eV)" with ticks
    at -13.6, -3.4, -1.5, and 0. The x-axis is hidden. Background is light gray (#FAFBFC)
    with very subtle y-axis grid lines. Title reads "energy-level-atomic · plotnine
    · pyplots.ai" in bold.'
