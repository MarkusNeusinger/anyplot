review:
  strengths:
  - Physically accurate hydrogen atom data with correct -13.6/n² formula and real
    spectral wavelengths
  - Clever connector-line approach to spread overlapping labels for closely-spaced
    upper energy levels
  - Complete spec compliance with both Lyman and Balmer series, ionization limit,
    and all required features
  - Clean, well-organized deterministic code with good visual refinement (subtle grid,
    clean axes)
  - Good data storytelling with series group labels and color-coded transitions
  weaknesses:
  - Transition labels (size=5.5) are small and harder to read, especially the Lyman
    series labels in the lower region
  - 'Three Lyman series arrows use nearly indistinguishable purple shades (#7B2FBE,
    #6D28D9, #9333EA)'
  - Title format has non-standard Hydrogen Atom prefix before the required spec-id
    format
  - Upper energy levels (n=3 to n=6) are visually very crowded with nearly merging
    horizontal lines
  image_description: 'The plot shows a hydrogen atom energy level diagram on a 16:9
    canvas with a light gray minimal theme. Six horizontal blue (#306998) lines represent
    energy levels n=1 (-13.60 eV) through n=6 (-0.38 eV), positioned at their correct
    energy values on the y-axis labeled "Energy (eV)". A dashed gray line at 0 eV
    marks the ionization limit. Right-side labels show quantum state and energy value
    (e.g., "n = 1 (-13.60 eV)") connected to their levels via thin gray connector
    lines — a clever approach to avoid overlap of the closely-spaced upper levels.
    Six vertical arrows with closed arrowheads represent transitions: three purple
    Lyman series arrows (Ly-α 122 nm, Ly-β 103 nm, Ly-γ 97 nm) descending to n=1,
    and three Balmer series arrows (Hα 656 nm in red, Hβ 486 nm in cyan, Hγ 434 nm
    in purple) descending to n=2. Group labels "Lyman Series (UV)" and "Balmer Series
    (Visible)" appear at the top. The title reads "Hydrogen Atom · energy-level-atomic
    · plotnine · pyplots.ai". X-axis is intentionally blank. Subtle horizontal grid
    lines (alpha=0.15) on the y-axis only.'
