    the crowded upper region. Six colored downward arrows represent emission transitions:
    three for the Lyman series (UV) in purple (Ly-alpha 122 nm), blue (Ly-beta 103
    nm), and pink (Ly-gamma 97 nm) going to n=1; and three for the Balmer series (visible)
    in red (H-alpha 656 nm), sky blue (H-beta 486 nm), and orange (H-gamma 434 nm)
    going to n=2. Series group labels at top read "Lyman Series (UV)" in purple and
    "Balmer Series (Visible)" in red. The y-axis is labeled "Energy (eV)" with ticks
    at -13.6, -3.4, -1.5, -0.85, and 0. The title follows the required format: "energy-level-atomic
    · plotnine · pyplots.ai" with a descriptive subtitle.'
