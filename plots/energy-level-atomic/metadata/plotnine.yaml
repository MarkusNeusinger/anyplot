  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    light gray (#FAFBFC) background. Six horizontal dark blue (#306998) lines represent
    energy levels from n=1 (-13.60 eV) at the bottom to n=6 (-0.38 eV) near the top,
    each terminated with small blue dots. A dashed gray line at 0 eV marks the ionization
    limit. Right-side labels (e.g., "n = 1 (-13.60 eV)") are connected to their levels
