review:
  strengths:
  - Elegant -1/n display-position transformation provides correct visual spacing for
    higher n levels while preserving accurate eV labels on the y-axis — exactly what
    the spec recommends for levels converging near ionization limit
  - Creative use of coord_cartesian(clip='off') allows series name labels to render
    below the n=1 level line without being clipped — idiomatic ggplot2 trick
  - 'Full theme adaptation: INK and INK_SOFT tokens applied to all chrome elements
    (level lines, tick labels, axis line), Imprint palette in canonical order for
    Lyman/Balmer/Paschen series'
  - 'All spec requirements met: partial-width horizontal level lines, downward emission
    arrows, color-coded spectral series, ionization limit dashed reference line, quantum
    number labels on right side'
  - Clean KISS code structure — no functions/classes, all deterministic physics data,
    correct ragg device, both themes handled in a single script
  weaknesses:
  - Ionization limit label ('Ionization limit (0 eV)') at size=2.6 (≈7.4pt) is the
    smallest text element on the plot — slightly too small for comfortable mobile
    readability; increase to size=3.0
  - Y-axis tick labels for -0.54 eV (n=5) and -0.85 eV (n=4) sit very close together
    vertically because the -1/n spacing compresses high-n levels — minor readability
    concern but not overlapping
  - Only 1 Paschen transition shown (n=4→3); spec allows 3-10 transitions and a second
    Paschen arrow (n=5→3) would better demonstrate the series pattern and add data
    richness
  - 'Design Excellence is solid but could be elevated: adding small wavelength annotations
    (e.g. ''Hα 656 nm'') to selected arrows would turn this from a textbook diagram
    into a genuinely informative visualization'
