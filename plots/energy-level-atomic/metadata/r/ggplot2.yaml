review:
  strengths:
  - Factually precise hydrogen atom data with all Bohr model energy levels and correct
    wavelengths for annotated transitions
  - Thoughtful non-linear display scale (-1/n) that spreads crowded upper levels without
    distorting the physics story
  - Full Imprint palette compliance and clean theme-adaptive chrome in both renders
  - No grid on energy level diagram is the right call; clean L-shaped axis frame
  - Color-coded series annotations below n=1 double as a legend, keeping the diagram
    uncluttered
  weaknesses:
  - Wavelength annotation text (size=2.4 mm) is at the lower end of mobile-readable;
    consider bumping to size=2.8 for all wl_label annotations
  - Upper region (n=3/4/5 levels) is slightly crowded — Paschen arrows and termination
    near n=3 could benefit from slightly more horizontal spread
  - Balmer (visible) series does not receive special visual emphasis to distinguish
    it as the humanly observable series; slightly thicker linewidth would improve
    storytelling
