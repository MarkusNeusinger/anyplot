  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    white background. Six horizontal dark charcoal lines represent energy levels from
    n=1 (−13.60 eV) at the bottom to n=6 (−0.38 eV) near the top, with a dashed gray
    line at the top marking the ionization limit (0.00 eV). Three spectral series
    are shown as colored downward arrows: Lyman series in purple (transitions to n=1,
    wavelengths 122 nm, 103 nm, 97 nm), Balmer series in blue (transitions to n=2,
    wavelengths 656 nm, 486 nm, 434 nm), and Paschen series in red (transitions to
    n=3, wavelengths 1875 nm, 1282 nm, 1094 nm). Each arrow has a rotated 90° wavelength
    label. Series names appear in bold at the top in matching colors. A gray "Energy"
    label with an upward arrow sits on the left. All spines are removed. Title reads
    "Hydrogen Atom · energy-level-atomic · seaborn · pyplots.ai" at the top.'
