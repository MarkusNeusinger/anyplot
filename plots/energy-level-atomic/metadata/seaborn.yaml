  strengths:
  - Physically accurate hydrogen atom data with correct E_n = -13.6/n² formula and
    real spectral wavelengths
  - Thoughtful qualitative y-spacing that prevents upper converging levels from becoming
    unreadable
  - Spectrum-inspired color palette (UV=purple, visible=blue, IR=red) with intentional
    visual hierarchy
  - Clean design with removed spines, dashed ionization line, and organized columnar
    layout
  - 'Significant improvement from attempt 1: seaborn now properly imported and used,
    title format corrected, font sizes increased'
  weaknesses:
  - Wavelength labels at 13pt are still below ideal for 4800x2700 resolution; increase
    to at least 15pt
  - Level labels and series labels at 18pt are close but slightly below the 20pt guideline
  - Purple and dark blue could be difficult to distinguish under some color vision
    deficiencies
  - Seaborn usage is mostly for styling/theming; core visualization relies heavily
    on matplotlib primitives
  image_description: 'The plot displays a hydrogen atom energy level diagram on a
    clean white background. Six horizontal dark charcoal (#2C3E50) lines represent
    energy levels from n=1 (−13.60 eV) at the bottom to n=6 (−0.38 eV) near the top,
    each with small endpoint dots. A dashed gray line at the top marks the ionization
    limit (0.00 eV). Three spectral series are shown as colored downward emission
    arrows arranged in columns: Lyman series in purple (#7B2FBE, transitions to n=1,
    wavelengths 122/103/97 nm), Balmer series in dark blue (#306998, transitions to
    n=2, wavelengths 656/486/434 nm), and Paschen series in red (#C0392B, transitions
    to n=3, wavelengths 1875/1282/1094 nm). Each arrow has a 90°-rotated wavelength
    label alongside it. Series names appear in bold at the top in matching colors.
    A gray "Energy" label with an upward arrow sits on the left margin. All spines
    are removed. The title reads "energy-level-atomic · seaborn · pyplots.ai" centered
    at the top.'
