review:
  strengths:
  - Physics-meaningful color scheme with distinct color families per spectral series
    (UV=indigo, visible=spectrum colors, IR=warm tones)
  - Effective visual hierarchy through varying line widths and asymmetric dot sizes
    conveying emission direction and transition strength
  - Perfect data quality with real hydrogen atom physics and correct spectral data
  - Clean deterministic code with well-organized per-series structure
  - Creative use of pygal per-point node customization to simulate directional arrows
  weaknesses:
  - Some purple/violet shades across Lyman and Balmer series could be confusable for
    deuteranopia viewers
  - Upper-level origin dots (r=6-8) are quite small at the canvas scale
  - Pygal lack of native arrow support limits the diagram directional clarity compared
    to what the spec envisions
  image_description: |-
    The plot displays a hydrogen atom energy level diagram on a 4800x2700 canvas with a subtle lavender (#F4F5FB) plot background against a white outer background. The title "Hydrogen Atom · energy-level-atomic · pygal · pyplots.ai" is displayed at the top in dark text. Six horizontal gray lines represent the energy levels n=1 through n=6, positioned at evenly-spaced visual y-coordinates (nonlinear scale) to avoid the convergence problem near ionization. A dashed red line at the top marks the ionization limit at 0 eV. The y-axis is labeled "Energy (eV)" with custom tick labels showing both quantum number and energy value (e.g., "n=1: -13.60 eV"). The x-axis is hidden since x-positions serve only as layout coordinates.

    Ten vertical colored transition lines connect energy levels: three Lyman series (deep indigo, violet, orchid) dropping to n=1; four Balmer series (red, cyan, blue, purple) dropping to n=2; and three Paschen series (burnt orange, gold, bronze) dropping to n=3. Each transition line has asymmetric dots — large dots at the lower (destination) level and small dots at the upper (origin) level — conveying downward emission direction without actual arrows. Line widths and dot sizes vary by transition strength, with H-alpha 656 nm being the thickest/largest as a focal point. A bottom legend in 4 columns lists all named transitions with wavelengths.
