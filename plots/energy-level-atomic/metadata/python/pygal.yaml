review:
  strengths:
  - Semantic spectral color mapping (UV→lavender/blue, visible→brand green H-alpha
    focal, IR→ochre/amber/lime) creates intuitive wavelength-domain association and
    demonstrates thoughtful design intent
  - 'H-alpha 656 nm anchored to brand green #009E73 with widest stroke (11px) and
    largest destination dot (r=28) establishes a clear visual focal point — the reader''s
    eye goes straight to the most prominent hydrogen transition'
  - Varying stroke widths (6–11px) and node radii across series create an elegant
    visual weight graduation that encodes relative importance without labels
  - Ionization reference line correctly rendered as a dashed horizontal at the continuum
    boundary — INK-colored and wider, clearly distinguishing it from the energy level
    lines
  - Nonlinear visual Y-axis scale (positions 1.0, 2.5, 4.0, 5.5, 7.0, 8.5) correctly
    approximates the converging upper levels from the spec requirement
  - 'Theme-adaptive chrome properly applied: background #FAF8F1 light / #1A1A17 dark,
    INK/INK_MUTED tokens threaded to foreground/foreground_subtle — both renders pass
    readability in every element'
  - Grid disabled (show_x_guides=False, show_y_guides=False) and x-axis labels hidden
    — appropriate choice as horizontal axis has no physical meaning in an energy level
    diagram
  - Custom y_labels dict correctly annotates each level with both quantum number and
    actual eV value, providing scientific context directly on the chart
  weaknesses:
  - label_font_size=48 is set below the pygal style guide recommendation of 56 — increase
    to 56 to ensure axis label proportions match the target visual hierarchy at 3200×1800
  - Transitions are represented as vertical line segments with endpoint dots rather
    than true directional arrows; spec requires downward arrows for emission transitions
    — consider using pygal's SVG marker or arrow capabilities to add arrowheads, or
    at minimum ensure the directional encoding (large dot at destination, small at
    origin) is clearly documented in a legend note
  - 'DQ-01: Spectral series data could mention selection rules (ΔL=±1) or show fine-structure
    splitting for n>2 levels to increase feature coverage depth — currently shows
    transitions correctly but omits quantum mechanical context beyond wavelengths'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "Hydrogen Atom · energy-level-atomic · python · pygal · anyplot.ai" fully visible in dark ink at the top; Y-axis title "Energy (eV)" rotated vertically in dark ink; Y-axis tick labels (n=1: -13.60 eV through Ionization: 0.00 eV) readable in muted dark tone; legend at bottom with 4-column layout clearly readable; no x-axis tick labels (intentionally hidden)
      Data: Six thin horizontal energy level lines in INK_MUTED (grey-brown); dashed ionization reference line in INK at top; Lyman transitions in lavender (#C475FD), rose (#954477), blue (#4467A3) as vertical lines with dots; Balmer transitions anchored by Hα in brand green (#009E73) as widest stroke with largest destination dot at n=2, followed by cyan (#2ABCCD), blue (#4467A3), lavender (#C475FD); Paschen transitions in ochre (#BD8233), amber (#DDCC77), lime (#99B314) with dots at n=3; first-series Hα in #009E73 is the visual focal point with stroke width 11px
      Legibility verdict: PASS — all text clearly readable against light background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black
      Chrome: Title visible in light cream text against dark background; Y-axis title "Energy (eV)" visible; tick labels in muted light tone (INK_MUTED #A8A79F); legend text readable; all chrome elements properly inverted
      Data: Data colors are identical to the light render — brand green Hα (#009E73) still prominently visible; lavender, rose, blue Lyman transitions; ochre/amber/lime Paschen transitions unchanged; energy level lines in dark-muted tone appropriate for the dark surface
