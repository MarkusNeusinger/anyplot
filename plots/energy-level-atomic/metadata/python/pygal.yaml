review:
  strengths:
  - 'Spectral semantic color mapping is excellent: UV (Lyman) -> violet/blue/rose,
    visible (Balmer) -> red/cyan/blue/violet, IR (Paschen) -> ochre/amber/lime — physically
    intuitive and all drawn from the Imprint palette'
  - 'Accurate real-world physics data: correct hydrogen energy levels in eV and correct
    wavelengths for all 10 transitions'
  - Visual hierarchy through varying line widths with H-alpha 656 nm as the clear
    focal point (widest stroke at 11px, largest lower dot at r=20)
  - Both light and dark themes render correctly with all text fully legible; no dark-on-dark
    or light-on-light failures
  - 'Y-axis labels elegantly encode both quantum number and actual energy value simultaneously
    (e.g., n=1: -13.60 eV)'
  - Clean idiomatic pygal code with proper use of dict-format y_labels, node radius
    suppression on structure lines, and stroke_style dasharray
  weaknesses:
  - 'Brand green #009E73 is absent from all series — violates hard palette rule; consider
    using #009E73 for H-alpha 656 nm (visible green spectral region maps naturally
    to brand green) to honor canonical first-palette-slot intent with semantic validity'
  - Transitions are plain lines without arrowheads — spec explicitly requires arrows
    showing emission direction; make asymmetry between destination dot (r=28) and
    origin dot (r=5) more extreme to visually communicate emission direction
  - Minor unused dead space (~8%) on right side of plot — reduce xrange from (0, 10.0)
    to (0, 9.5) and level_x_end from 9.2 to 9.0 to tighten the canvas
  image_description: |-
