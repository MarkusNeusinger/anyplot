  strengths:
  - Excellent Imprint palette usage — Lyman (#009E73), Balmer (#C475FD), Paschen (#4467A3)
    in correct canonical order with clear UV/Visible/IR semantic grouping
  - Sophisticated Highcharts broken-axis module for y-axis break elegantly compresses
    the n=1 ground-state gap, making all levels visible without distortion
  - Plot bands with alpha overlays distinguish ground state vs excited states region
    — adds physics context without visual clutter
  - Series linking (linkedTo) correctly groups transition arrows under three legend
    entries, keeping the legend clean despite many individual series
  - Wavelength labels on alpha transitions (Lyman 122nm, Balmer 656nm, Paschen 1879nm)
    highlight the most important spectral lines in each series
  - Staggered label y-offsets for closely-spaced upper levels (n=4/5/6) prevent label
    overlap in the congested upper region
  - 'Full spec compliance: partial-width energy lines, downward emission arrows, ionization
    limit dashed reference, correct hydrogen energy values (E_n = -13.6/n² eV)'
  - Canvas gate passed; PIL safety-net and CDP override correctly ensure exact 3200×1800
    output
  - 'Perfect code quality: KISS structure, deterministic data, clean imports, no fake
    interactivity'
  weaknesses:
  - Wavelength annotation labels (λ = 122nm, λ = 656nm, λ = 1879nm) are rendered at
    32px — slightly on the small side; bumping to 36px would improve mobile readability
  - Upper levels (n=4/5/6) are tightly packed on the right-side label column; the
    staggering helps but minor visual crowding remains — a larger marginRight (420px)
    could give more breathing room
  - 'Design Excellence has headroom: the plot reads as a well-configured technical
    diagram rather than a publication-ready infographic — adding subtle emphasis (e.g.,
    slightly heavier Balmer series line weight, since visible light is the most recognizable
    series) would improve storytelling'
  - 'LM-01: Series are added via raw dict literals rather than typed series objects
    (e.g., LineSeries()) — using the highcharts_core typed API is more idiomatic'
