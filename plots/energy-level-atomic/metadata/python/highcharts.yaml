review:
  strengths:
  - 'Excellent spec compliance: all 6 hydrogen energy levels shown with correct eV
    values, three spectral series (Lyman/Balmer/Paschen), ionization limit reference,
    and alpha-transition wavelength annotations'
  - Sophisticated y-axis break using the broken-axis module to compress the large
    gap between ground state (-13.6 eV) and excited states, communicating the non-linear
    nature of energy quantization
  - 'Full theme-adaptive chrome: INK and INK_SOFT tokens applied to all non-data elements;
    both light (#FAF8F1) and dark (#1A1A17) renders are fully legible with no dark-on-dark
    failures'
  - 'Imprint palette in canonical order: Lyman (#009E73), Balmer (#C475FD), Paschen
    (#4467A3) — correct order, all three data colors identical between light and dark
    themes'
  - Plot bands with band-region labels (Ground state / Excited states → Continuum)
    add strong data storytelling context; triangle-down markers convey emission direction
    clearly
  - Correct canvas (3200×1800), PIL pad guard, CDP viewport override, and inline JS
    embedding — all four canvas-size knobs aligned
  weaknesses:
  - 'Band label ''Excited states → Continuum'' (plotBand right side, y≈-1.5 eV) overlaps
    visually with the ''n=3 (-1.51 eV)'' data label in both renders — move the band
    label higher (y: 60 or adjust verticalAlign) or shift the n=3 label right to create
    separation'
  - 'DE-01/DE-02: Design is functional but stops short of publication polish — removing
    the legend border box frame (borderWidth: 0) and softening the bottom legend area
    would improve refinement; the plot band fills are very subtle (4% opacity) which
    is good but the transitions could use slightly more visual weight differentiation
    (alpha lines slightly thinner than alpha transitions)'
  - 'LM-01: Series configuration uses raw dict literals instead of typed highcharts_core
    series objects (LineSeries), which is less idiomatic for the Python SDK'
