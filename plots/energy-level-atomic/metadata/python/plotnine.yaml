review:
  strengths:
  - Nonlinear sqrt visual transform correctly implements the spec's suggestion for
    crowded upper levels, spreading n=5/6 while compressing the large n=1→n=2 gap
  - Semantic spectral color mapping (UV→lavender, visible→matte red) is domain-appropriate
    and uses only Imprint palette colors
  - 'Theme adaptation is thorough: BALMER_LABEL_COLOR switches to INK_SOFT in dark
    mode to maintain contrast against the dark Balmer band'
  - All 6 required spec features implemented (partial-width lines, quantum labels,
    directional arrows, spectral color coding, ionization reference, nonlinear scale)
  - Shaded series bands provide redundant encoding that helps colorblind readers distinguish
    the two spectral series
  - 'Perfect code quality: deterministic, clean imports, idiomatic plotnine patterns
    with arrow=arrow() in geom_segment'
  weaknesses:
  - Transition wavelength labels (Ly-α 122 nm, Hα 656 nm, etc.) at size=2.8mm are
    borderline small; consider raising to 3.2–3.5mm for better mobile readability
    at 400px scaled width
  - 'First categorical series (Lyman UV) uses Imprint position 2 (#C475FD) rather
    than brand green position 1 (#009E73); brand green is used for the structural
    ionization limit instead — semantic exception is justified but deviates from the
    ''first series = #009E73'' rule'
  - Upper energy levels (n=4, n=5, n=6) are tightly packed even after the sqrt transform;
    connector lines help, but the label area is slightly crowded
