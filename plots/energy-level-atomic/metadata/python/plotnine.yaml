review:
  strengths:
  - Physically accurate hydrogen atom data (En = -13.6/n² eV) with correct spectral
    line wavelengths (Ly-α 122 nm, Hα 656 nm)
  - Clever nonlinear visual transform (sign(E)·sqrt(|E|)) that addresses the spec
    recommendation for spreading converging upper levels
  - 'Semantic spectral color mapping: UV→lavender (#C475FD), Visible→matte red (#AE3030)
    — both Imprint palette members with justified spectroscopic conventions'
  - 'Excellent spec compliance: partial-width level lines, wavelength-labeled arrows,
    ionization reference line, Lyman+Balmer grouping all present'
  - Theme tokens correctly threaded through all chrome elements; dark render fully
    functional with no dark-on-dark failures for primary text
  weaknesses:
  - 'Balmer transition wavelength labels (Hα 656 nm, Hβ 486 nm, Hγ 434 nm) rendered
    in matte red (#AE3030) against dark Balmer band (#3C1A1A) — contrast ratio ~2.7:1,
    too low for comfortable reading in dark render. Fix by nudging labels outside
    the band or using THEME-conditional color (INK_SOFT #B8B7B0 in dark theme)'
  - 'Brand green #009E73 absent from both series — semantic exception for spectral
    physics is valid, but palette compliance would improve if a third structural element
    (e.g. ionization limit line or ground state level) uses #009E73'
  - n=5 and n=6 energy levels are very close on the transformed scale; connector lines
    are slightly cramped — increase label_y nudge for n=5 from 0.05 to 0.08 and n=6
    from 0.12 to 0.20
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Bold title "energy-level-atomic · python · plotnine · anyplot.ai" in near-black ink, clearly readable. Subtitle in secondary ink, readable. Y-axis label "Energy (eV)" and tick labels (-13.6, -3.4, -1.51, -0.85, 0) all readable in INK_SOFT. X-axis correctly omitted.
      Data: Six horizontal energy level lines in dark gray (INK_SOFT #4A4A44) spanning partial width. Lavender arrows (#C475FD, Imprint pos 2) for Lyman series; matte red arrows (#AE3030, Imprint pos 5) for Balmer series. Data colors are distinct and visible. Light lavender and light pink background bands group each series.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and subtitle in light cream (#F0EFE8), clearly readable. Y-axis label and tick labels in INK_SOFT (#B8B7B0), readable. Energy level lines shift to light gray — correct theme adaptation.
      Data: Lavender (#C475FD) and matte red (#AE3030) arrows identical to light render — correct. Dark Balmer band shifts to #3C1A1A (dark brownish-red); Lyman band to #2A1A40 (dark purple). Lavender transition labels readable against dark purple band. Balmer wavelength labels (Hα, Hβ, Hγ) in matte red (#AE3030) against dark Balmer band (#3C1A1A) — contrast ~2.7:1, barely readable.
      Legibility verdict: PARTIAL FAIL — Balmer wavelength labels have insufficient contrast in dark theme against the dark Balmer band background
