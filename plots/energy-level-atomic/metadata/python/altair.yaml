review:
  strengths:
  - Physically correct hydrogen atom energy levels using E_n = -13.6/n² eV with Rydberg-calculated
    wavelengths — scientifically rigorous data
  - Excellent six-layer Altair composition (mark_rule for level lines + ionization
    ref + mark_text for labels + mark_rule for arrows + mark_point for arrowheads
    + mark_text for wavelength annotations) demonstrating deep Altair mastery
  - Symlog scale (alt.Scale(type='symlog')) is an excellent and appropriate choice
    that reveals the converging nature of upper energy levels
  - 'Full Imprint palette compliance: Lyman=#009E73, Balmer=#C475FD, Paschen=#4467A3
    in canonical order; both renders theme-correct with warm off-white/near-black
    backgrounds'
  - Staggered line endpoints (line_ends dict) prevent label collision at converging
    upper levels — thoughtful design detail
  - Ionization limit shown as dashed reference line using strokeDash=[8,5] with INK_SOFT
    color — visually distinct and semantically correct
  - 'Perfect spec compliance: 6 energy levels, 9 transitions across 3 spectral series,
    ionization reference, upward energy axis, partial-width level lines, quantum number
    labels, wavelength annotations'
  weaknesses:
  - 'Wavelength label overlap in the Paschen (IR) series: the three rotated text labels
    (1875 nm, 1282 nm, 1004 nm at x=6.8/7.2/7.6 with y_mid values -1.18/-1.025/-0.945
    eV) sit very close together on the symlog scale, causing visible crowding and
    overlap — consider adding x-offset variation (dx alternating between -12 and +12)
    or reducing the angle from 90 to 45 for these labels, or omitting wavelengths
    for Paschen and using a table/subtitle instead'
  - 'Energy level lines use INK (#1A1A17 in light mode / #F0EFE8 in dark mode) making
    them visually heavy and dominant — using INK_SOFT (#4A4A44 / #B8B7B0) instead
    would reduce visual weight and let the colored transition arrows read as the primary
    data story'
  - 'Design not yet publication-ready: the heavy energy level lines overpower the
    colored transition arrows that carry the actual spectral series information; invert
    the visual hierarchy by making level lines thinner (strokeWidth=1.5) and colored
    arrows thicker (strokeWidth=3.0)'
  - No `configure_title` call — the title color is set via `alt.Title(color=INK)`
    which is correct, but an explicit `configure_title(color=INK)` would be more robust
    across Altair versions
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "energy-level-atomic · python · altair · anyplot.ai" bold and readable at ~70% of canvas width. Subtitle "Hydrogen atom emission lines · energy levels: −13.6/n² eV" readable below title. Y-axis label "Energy (eV)" clearly visible. Tick labels (-13.60, -3.40, -1.51, -0.85, -0.54, -0.38, 0.00) legible in INK_SOFT. Level labels "n = 1" through "n = 6" and "n = ∞" readable in bold INK on right side of level lines.
      Data: Six thick dark horizontal rule lines for energy levels n=1 to n=6, heavy in INK (#1A1A17). Dashed gray ionization limit at 0.00 eV. Three Lyman (UV) arrows in #009E73 (green), three Balmer (Visible) in #C475FD (lavender), three Paschen (IR) in #4467A3 (blue). Arrowheads as filled triangles matching series color. Rotated wavelength labels (122/103/97 nm for Lyman, 665/486/434 nm for Balmer, 1875/1282/1004 nm for Paschen) in INK_MUTED italic.
      Issues: Paschen wavelength labels (1875/1282/1004 nm) visibly crowded/overlapping in the upper region where levels converge on the symlog scale. Balmer labels are close but readable.
      Legibility verdict: PASS overall, with minor crowding issue in Paschen wavelength labels.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
