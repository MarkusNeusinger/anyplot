review:
  strengths:
  - Physically accurate hydrogen atom data (E_n = −13.6/n² eV, Rydberg-formula wavelengths)
    — all 9 transitions factually correct
  - 'Expert Altair layer composition: 8 distinct layers using mark_rule with x/x2
    and y/y2 spanning, mark_point with triangle-down arrowheads — genuinely idiomatic
    Vega-Lite'
  - Scientifically motivated symlog scale (constant=1) compresses the large n=1→n=2
    gap while expanding the convergent upper levels — chart communicates energy quantisation
    structure
  - 'Intentional visual hierarchy: thin INK_SOFT level lines recede behind thick (strokeWidth=3)
    coloured arrow shafts — viewer''s eye is drawn to transitions first'
  - Staggered level endpoints (line_ends dict) and graduated dx offsets for Paschen
    labels mitigate crowding in the symlog-compressed upper region
  - 'Full Imprint palette compliance (Lyman #009E73, Balmer #C475FD, Paschen #4467A3),
    correct backgrounds, and clean theme-adaptive chrome in both renders'
  weaknesses:
  - 'Crowding in n=3–6 region: wavelength labels (8pt, rotated 90°) and level labels
    (n=3–n=6) are tightly packed due to symlog compression — increase wavelength label
    fontSize from 8 to 9-10pt and widen dx spread for the Paschen labels'
  - Wavelength label fontSize=8 with 90° rotation is borderline legible at full 3200×1800
    resolution — the tertiary annotation tier should be at least 9pt for comfortable
    reading
  - Some unbalanced empty canvas space at the top (above legend, above the ionization
    limit line) — slightly expanding the y domain upper bound or reducing top padding
    would make better use of the canvas
