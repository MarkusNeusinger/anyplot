review:
  strengths:
  - Scientifically accurate hydrogen atom data with correct eV energies and nm wavelengths
    for all 9 transitions across Lyman, Balmer, and Paschen series
  - Nonlinear visual Y-positioning prevents the upper converging levels from becoming
    unreadably dense — a sophisticated design decision
  - Background column tints using sns.light_palette/dark_palette adapt correctly to
    both themes and clearly delineate the three series regions
  - Spectral region labels (ultraviolet, visible, infrared) in italic add interpretive
    context without clutter
  - Right-margin energy labels via clip_on=False and subplots_adjust(right=0.60) keep
    the axes clean while displaying full eV values
  - Both themes render correctly with proper chrome adaptation throughout
  weaknesses:
  - 'Upper Paschen section is crowded: three short transitions (n=4/5/6 to n=3) at
    x-spacing 0.060 with rotated fontsize=8 wavelength labels partially overlap each
    other — consider increasing col_spacing to 0.072 or shifting Paschen x_base to
    0.74'
  - Rotated wavelength labels (fontsize=8) are at the lower legibility threshold,
    especially for the short Paschen transitions in the upper section — mobile scaling
    may render these unreadable
