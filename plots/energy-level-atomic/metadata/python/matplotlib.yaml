  strengths:
  - Physically accurate hydrogen energy levels (E_n = -13.6/n^2 eV) with correct sqrt-compression
    of the y-axis to spread upper levels and reveal convergence to ionization limit
  - Spectral color coding of Balmer transitions (H-α red, H-β cyan, H-γ lavender,
    H-δ rose) using Imprint palette members — a well-justified semantic exception
    that teaches wavelength associations
  - All 5 Lyman + 4 Balmer transitions shown, ionization dashed reference line included
    — full spec compliance
  - 'Perfect theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG)
    correctly applied in both renders, data colors identical across themes'
  - Custom y-tick mapping from compressed display positions back to real eV values
    adds technical accuracy without cluttering the x-axis
  - 'Clean matplotlib idioms: Axes methods throughout, mpatches.Patch for legend,
    annotate with arrowprops for transitions'
  - Correct canvas dimensions (8×4.5 @ dpi=400 = 3200×1800), no bbox_inches='tight'
    drift
  weaknesses:
  - '"Balmer series (Visible)" italic label at (0.76, midpoint of n=3–n=4) overlaps
    with the ''n = 4'' quantum number text and the adjacent H-δ arrow in both renders
    — move the Balmer label further right or lower its y-position to avoid the n=4
    label'
  - Upper-level energy labels (-0.38 eV, -0.54 eV, -0.85 eV for n=6, n=5, n=4) are
    crowded on the left side due to level convergence — consider offsetting alternating
    labels or reducing fontsize for the upper cluster
  - Design Excellence is above-median but not exceptional — the visualization is clean
    and accurate but lacks a single strong focal point or typographic hierarchy emphasis
    (e.g., the ground state n=1 line could be bolder to anchor the diagram)
