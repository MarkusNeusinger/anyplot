  strengths:
  - Exact Bohr-model energy values and published hydrogen wavelengths — factually
    impeccable physics data
  - Power transform on y-axis elegantly spreads converging upper levels while preserving
    level ordering
  - Differential Balmer arrow thickness (2.2 vs 1.4) creates natural visual hierarchy
    emphasising the visible-spectrum series
  - 'Full Imprint palette compliance in canonical order (Lyman #009E73, Balmer #C475FD,
    Paschen #4467A3); chrome fully theme-adaptive in both renders'
  - Manual V-shape arrowheads and per-series horizontal staggering keep 10 transitions
    readable without overlap
  - layer_tooltips() provides meaningful hover content (series, transition pair, wavelength)
    in the HTML output
  weaknesses:
  - Upper-right canvas area (above n=2, right of legend) is sparse — legend floats
    in empty space rather than being anchored near the data; consider shifting legend
    closer to the main data area or adding spectral-region annotation labels
  - The 1875.1 nm wavelength annotation overlaps visually with the crowded Balmer/Paschen
    arrow-crossing zone near n=3 -> n=2; nudge its x-position to clear the arrow cluster
  - Upper-region label density (n=4, n=5, n=6 and eV values -0.38/-0.54/-0.85 eV)
    is tight; a slight increase in y-spread of those three levels would ease readability
