review:
  strengths:
  - Physically accurate hydrogen atom data (E_n = -13.6/n² eV) with correct wavelengths
    for all spectral series
  - All Imprint palette colors used deliberately — spectral-region semantic mapping
    (UV=purple, visible=red/ochre/cyan/lime, IR=green) is defensible
  - Clean three-column layout separating Lyman/Balmer/Paschen series with group headers
  - Ionization limit reference line at 0 eV adds professional scientific context
  - Invisible hover targets leverage Plotly's interactive HTML strengths — correct
    technique for an interactive library
  - Perfect spec compliance — all required features present including labels, wavelengths,
    and ionization reference
  - Deterministic data with no randomness needed
  - Both themes correctly implemented with theme-adaptive chrome
  weaknesses:
  - 'Balmer series transition labels (Hα, Hβ, Hγ, Hδ) are placed in a narrow band
    between n=2 (−3.40 eV) and n=3 (−1.51 eV) causing significant overlap — labels
    are positioned at x+0.015 offsets that are only 0.06 apart, resulting in text
    collision. Fix: stagger the label y-positions for these four transitions so they
    spread across the mid-height gap between n=2 and n=4 rather than all sitting near
    the midpoint.'
  - 'Upper energy level labels (n=3, n=4, n=5, n=6) overlap each other — the yshift
    values of −18/0/14 for n=4/5/6 are insufficient for the tight clustering of levels
    near 0 eV. n=3 and n=4 labels visibly collide. Fix: use yshift of at least ±25
    for alternating labels, or move them to a separate legend column.'
  - 'Paschen series labels at y=−2.05 and y=−2.65 eV (Pa-α 1875 nm, Pa-β 1282 nm)
    fall in the dense Balmer transition zone and overlap with Balmer arrows. Fix:
    move Paschen labels to x > 0.85 (right side of plot) or use a distinct y-offset
    scheme.'
  - 'DE-01/DE-02: The plot has good bones but the crowding prevents it from reaching
    publication-ready quality. Once overlap is resolved, consider removing plot spines
    entirely and adding subtle horizontal grid lines only at the major energy level
    positions.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "energy-level-atomic · python · plotly · anyplot.ai" in dark ink, centered, ~60% width — clearly readable. Y-axis label "Energy (eV)" in dark ink, readable. Tick labels (−15, −10, −5, 0, 5) in dark muted tone — readable. Energy value annotations (0 eV Ionization, −1.51 eV, −3.40 eV, −13.60 eV) readable on left side.
      Data: 6 horizontal energy level lines in INK_SOFT (dark gray); dashed ionization limit at 0 eV. Three spectral series shown as colored downward arrows: Lyman (purple/mauve/blue family), Balmer (red/ochre/cyan/lime), Paschen (brand-green/amber). Series group headers "Lyman Ultraviolet", "Balmer Visible", "Paschen Infrared" positioned above. First Paschen series uses #009E73 (brand green).
      Legibility verdict: PASS overall, but PARTIAL FAIL on label overlap — Balmer transition labels (Hα, Hβ, Hγ, Hδ) cluster in a narrow vertical band between n=2 and n=3 and visibly overlap each other; upper level labels n=3/n=4 also appear to overlap at the top cluster of levels near 0 eV.

