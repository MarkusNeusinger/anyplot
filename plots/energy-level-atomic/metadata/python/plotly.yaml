      Data: Data colors are identical to the light render — same purple/mauve/blue Lyman arrows, same red/ochre/cyan/lime Balmer arrows, same green/amber Paschen arrows. Energy level lines now appear in lighter gray against the dark background. The visual effect is consistent with light render, only chrome flips.
