review:
  strengths:
  - Clear spiral structure with 5-year temperature data clearly showing seasonal variation
  - Correct Viridis colormap for continuous temperature data with proper ColorBar
  - 'Full spec compliance: radial month dividers, year labels, Archimedean spiral
    expanding outward'
  - Theme-adaptive chrome with no dark-on-dark failures in either render
  - 'Idiomatic Bokeh usage: ColumnDataSource, segment renderer for per-segment color
    mapping, HoverTool with line_policy=interp'
  weaknesses:
  - Color bar is very small (40×600px on 3600×3600 canvas) — label text appears tiny
    in the rendered image; increase height to 800-1000px
  - Spiral lines at line_width=6 on a 3600×3600 canvas appear thin; bumping to 8-10
    would improve visibility especially at smaller display sizes
  - Year labels placed at fixed x=65 which is slightly awkward positioning — they
    are legible but not elegantly placed
  - Title font appears small relative to the canvas size despite 28pt — the plot would
    benefit from a bolder or slightly larger title
  - 'Design sophistication is functional but not highly polished: the radial dividers
    could use varying alpha or the outermost ring could be annotated more prominently'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, approximately #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "spiral-timeseries · bokeh · anyplot.ai" is visible at the top center in dark text. Month labels (Jan–Dec) are placed around the spiral perimeter in muted dark text and are clearly readable. Year labels (2019–2023) appear in bold dark text near the center-right of the spiral, stacked by revolution radius.
      Data: Five full Archimedean spiral revolutions, each representing one year of daily temperatures. Viridis colormap applied per-segment: deep purple/blue in winter months (Dec–Feb), transitioning through cyan/teal in spring/autumn, reaching yellow-green in summer (Jun–Aug). The seasonal pattern is immediately apparent. ColorBar on the right side labeled "Temperature (°C)" with values roughly -5 to 30°C.
      Legibility verdict: PASS — all text elements are readable against the light background. No light-on-light issues detected.

    Dark render (plot-dark.png):
      Background: Near-black, approximately #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title appears in light cream/off-white text (INK = #F0EFE8 in dark mode), clearly readable. Month labels appear in muted light gray (INK_MUTED = #A8A79F) — adequately visible against dark background. Year labels in light-colored bold text are readable. Color bar labels use INK_SOFT (#B8B7B0), visible on dark background.
      Data: Viridis colors are identical to the light render — purple for cold, yellow-green for warm. Data colors unchanged between themes as required. Radial dividers slightly more visible against the dark background.
      Legibility verdict: PASS — no dark-on-dark failures detected. All text elements use appropriate light-colored tokens for the dark theme.
