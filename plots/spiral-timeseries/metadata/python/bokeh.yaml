    np.random.seed(42)
  weaknesses:
  - Title format deviates from required `{spec-id} · {library} · anyplot.ai` pattern
    — has extra descriptive prefix 'Daily Temperatures 2019–2023'
  - No HoverTool — missing Bokeh's most distinctive interactive capability; tooltip
    showing date and temperature on hover would complete the interactive HTML and
    raise LM-02
  - Screenshot window (4000×3700) is larger than the Bokeh figure (3600×3600), producing
    a PNG with extra whitespace margins
  - Title placement in top-left corner is cramped and leaves composition asymmetric
    — centering above the spiral would improve DE-01
