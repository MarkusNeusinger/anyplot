review:
  strengths:
  - Archimedean spiral implemented correctly with outward expansion, earliest data
    at center
  - 'Full spec compliance: viridis colormap, radial month grid lines, year labels,
    colorbar'
  - Perfect theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders pass
    readability checks
  - All default chart chrome removed; only custom radial grid lines remain — very
    clean look
  - Correct continuous colormap (viridis) for temperature encoding
  - Reproducible with np.random.seed(42); realistic Northern Hemisphere temperature
    dataset
  weaknesses:
  - Month and year label sizes (5.5pt / 5pt) are slightly small for a 3600×3600px
    canvas — could be 7-8pt for better legibility at full resolution
  - Uses geom_point (dots) rather than a connected geom_path/geom_line, resulting
    in a dotted spiral instead of a smooth curve
  - Spiral is visually off-center (shifted left) because year labels are placed at
    x=-0.35 without compensating the plot margin
  - Design Excellence is competent but not exceptional — no focal point emphasis or
    trend annotation beyond the basic spiral form
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "spiral-timeseries · plotnine · anyplot.ai" dark-on-light, clearly readable (24pt). Month labels (Jan–Dec) in muted gray around perimeter, readable. Year labels (2019–2023) in lighter gray left of 12 o'clock, readable. Legend "Temp (°C)" with INK title and INK_SOFT values — readable.
      Data: Five concentric spiral rings expanding outward, colored with viridis (dark purple = cold ~0°C winters, yellow-green = hot ~28°C summers). First data series 2019 at center, 2023 at outermost ring. Radial month grid lines at 12 positions, subtle gray alpha=0.35.
      Legibility verdict: PASS — all text readable against light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title light-colored on dark background, readable. Month labels render in lighter gray (INK_SOFT = #B8B7B0 in dark theme), clearly visible. Year labels in medium gray (INK_MUTED = #A8A79F), readable. Legend background slightly elevated (#242420), text in correct light tones.
      Data: Identical viridis colors to light render — data colors unchanged between themes, only chrome adapts. Same spiral pattern, same colorbar range 0–30°C.
      Legibility verdict: PASS — no dark-on-dark failures. All text uses INK/INK_SOFT/INK_MUTED tokens correctly.
