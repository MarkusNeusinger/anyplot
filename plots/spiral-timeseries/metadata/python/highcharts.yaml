review:
  strengths:
  - 'Excellent Archimedean spiral implementation with correct geometry: constant spacing,
    Jan 1 at 12-o''clock, innermost = 2020, outermost = 2024'
  - Viridis colormap correctly applied as continuous per-point coloring via manual
    interpolation — appropriate choice for continuous temperature data (not Okabe-Ito)
  - 'Perfect theme-adaptive chrome: background, ink, grid tokens all respond to ANYPLOT_THEME
    in both light (#FAF8F1) and dark (#1A1A17) renders with no dark-on-dark or light-on-light
    failures'
  - All font sizes explicitly set (title 30px, subtitle 19px, year labels 24px, month
    labels 20px) and readable in both themes
  - 'Perfect code quality: KISS linear structure, np.random.seed(42), clean imports,
    good numpy vectorization for color channel interpolation, saves both .png and
    .html artifacts'
  - Realistic and neutral temperature dataset (northern hemisphere, 2020-2024, plausible
    -3.8°C–26.6°C range) with visible warming trend and seasonal periodicity showing
    all spiral chart features
  weaknesses:
  - Missing color bar/colorscale legend — spec explicitly requires 'Include a color
    bar or legend when using color mapping for values.' The subtitle text describes
    the range in words but there is no graphical color scale showing the temperature-to-color
    mapping. Add a vertical colorscale bar (e.g. via a custom SVG gradient rect or
    a gradient-filled scatter series) with temperature tick marks in °C.
  - Canvas is 2700×2700 px — only 4800×2700 (landscape) and 3600×3600 (square) are
    allowed formats. The spiral chart should use 3600×3600. Scale up chart width/height
    and adjust Chrome --window-size accordingly.
  - 'Title format has a descriptive prefix before the spec-id: ''spiral-timeseries
    · highcharts · anyplot.ai'' is the required format, but the title reads ''5-Year
    Daily Temperatures · spiral-timeseries · highcharts · anyplot.ai''. Remove or
    integrate the descriptive prefix so spec-id leads: ''spiral-timeseries · highcharts
    · anyplot.ai'''
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "5-Year Daily Temperatures · spiral-timeseries · highcharts · anyplot.ai" visible in dark ink at top. Subtitle in INK_SOFT describes the temperature range. Month labels (Jan–Dec) placed around the outer edge of the spiral in INK_SOFT. Year labels (2020–2024) printed in dark INK at the Jan-1 position of each revolution inside the spiral. All text clearly readable against the light background. No light-on-light failures.
      Data: Five concentric spiral revolutions rendered as scatter dots. Viridis colormap applied per-point: purple-blue (winter, ~0°C) → teal/green (spring/autumn, ~12°C) → lime-yellow (summer, ~24°C). Radial grid lines extend from center at each month boundary in a very subtle GRID color. The color gradient creates a clear seasonal story with warm-colored arcs at top (summer, Jul) and cool-colored arcs at bottom (winter, Dec/Jan). The subtle warming trend from inner (2020) to outer (2024) rings is faintly visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct, not pure black.
      Chrome: Same title and subtitle visible in light-colored text (INK = #F0EFE8, INK_SOFT = #B8B7B0). Month labels and year labels rendered in light tones, clearly readable against dark background. No dark-on-dark failures observed.
      Data: Viridis data colors are identical to the light render — same purple-to-yellow gradient, same spiral pattern. Only the background and text (chrome) have flipped to dark theme. Radial grid lines remain subtle.
      Legibility verdict: PASS
