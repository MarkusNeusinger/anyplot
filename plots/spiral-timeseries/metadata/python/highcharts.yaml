review:
  strengths:
  - Archimedean spiral math correctly implemented with expanding radii, phase-offset
    for Jan-1 at 12 o'clock, and correct angle-to-date mapping
  - Viridis colormap correctly chosen for continuous temperature data with vectorized
    per-point color interpolation
  - 'Full theme adaptation: INK, INK_SOFT, GRID, PAGE_BG tokens applied to all chrome
    elements in both renders'
  - 'All spec requirements satisfied: color encoding, radial grid lines, year-cycle
    labels, colorbar, outward-expanding spiral'
  - Clean reproducible code with np.random.seed(42); inline Highcharts JS embedding
    correctly handled for headless Chrome
  weaknesses:
  - Canvas is 2700x2700 instead of standard 3600x3600; text elements (title 30px,
    month labels 20px) are slightly undersized — use 3600x3600 with title 32px, month
    labels 22-26px
  - Scatter marker radius=5 is small for the canvas size; increase to radius 7-8 for
    better dot visibility
  - LineSeries imported from highcharts_core.options.series.area instead of canonical
    highcharts_core.options.series.line
  - No data storytelling annotation to highlight the visible warming trend across
    5 years — a subtle callout near the 2024 ring would elevate design
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "5-Year Daily Temperatures · spiral-timeseries · highcharts · anyplot.ai" in dark INK (#1A1A17), readable. Subtitle in INK_SOFT. Month labels (Jan-Dec) around outer edge in muted dark-grey text, readable. Year labels (2020-2024) inside spiral rings in bold dark text, readable. Colorbar ticks on right in dark text, readable.
      Data: Viridis colormap from deep purple (cold winter ~2C) through teal-green (spring/autumn ~12C) to bright yellow-green (peak summer ~24C). 1825 scatter dots form 5 clear concentric rings. Radial grid lines extend from center to outer edge for each month.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title and subtitle in light INK (#F0EFE8), clearly visible against dark background. Month labels and year labels in light/muted text (#B8B7B0), readable. Colorbar ticks in light text. No dark-on-dark failures observed. No near-black text on near-black background.
      Data: Viridis data colors are visually identical to light render — purple/teal/yellow sequence unchanged. Spiral rings and radial grid lines clearly distinguishable from dark background.
      Legibility verdict: PASS
