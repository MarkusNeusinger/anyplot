review:
  strengths:
  - 'Perfect spec compliance: all required spiral features (radial grid, year/month
    labels, viridis colorbar, outward expansion) correctly implemented.'
  - Correct continuous colormap (viridis) for temperature data; proper theme-adaptive
    chrome throughout both renders with no legibility failures.
  - Clever use of Altair's detail encoding to draw disconnected radial grid-line segments
    — idiomatic and avoids manual loop drawing.
  - Square format (3600x3600 effective) appropriate for a circular symmetric plot;
    scale_factor=3.0 correctly applied.
  - Clean, flat, reproducible code with full HTML + PNG output.
  weaknesses:
  - Dot size (mark_circle size=18) is too small for a 3600px canvas — spiral reads
    as a fine dotted line rather than a bold visible path. Increase to at least size=35-50
    or switch to mark_line for a continuous ribbon.
  - 'Title font size (24px) and tick-equivalent labels (month: 17px, year: 15px) are
    below the recommended 28px/18px for pixel-based libraries at this resolution.'
  - Year labels stacked vertically at the bottom centre are tight; spreading them
    slightly along the spiral starting arc would improve readability.
  - Altair interactive features underused — chart.interactive() or selection-based
    highlighting would better showcase the library's distinctive strengths.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "Daily Temperatures 2019-2023 · spiral-timeseries · altair · anyplot.ai" at top-left in dark INK text, readable. Month labels (Jan-Dec) at outer rim in INK_SOFT at fontSize=17, readable. Year labels (2019-2023) at bottom centre in bold INK at fontSize=15, readable but slightly crowded.
      Data: Five concentric Archimedean spiral rings colored with viridis — deep purple for cold months (Dec/Jan/Feb), teal for spring/autumn, yellow-green for warm summer months (Jun/Jul). Radial grid lines from centre at 12 month boundaries, opacity=0.20, subtle. First series uses viridis (continuous data; not categorical). Viridis colorbar legend upper right with "Temp (°C)" title.
      Legibility verdict: PASS — all text readable against light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light INK (F0EFE8) text, readable. Month labels in INK_SOFT (B8B7B0), readable. Year labels in INK, readable. Legend box background #242420 with INK_SOFT stroke and labels. No dark-on-dark failures detected.
      Data: Viridis data colors identical to light render — purple winters, yellow-green summers. Only chrome (background, text, legend box) flipped. Dots remain visible against dark background.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures.
