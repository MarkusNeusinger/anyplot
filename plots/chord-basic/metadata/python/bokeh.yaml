review:
  strengths:
  - 'Correct chord-diagram structure: proportional outer arcs, bidirectional flows
    rendered as separate chords, chord width scaled to flow value — every spec requirement
    met.'
  - 'Full Imprint palette in canonical order with brand green #009E73 as the first
    entity; data colors are identical across light and dark renders, only chrome flips.'
  - 'Strong theme adaptation — warm off-white #FAF8F1 and warm near-black #1A1A17
    backgrounds, with all titles, entity labels, flow totals, legend, and annotation
    readable in both (no dark-on-dark).'
  - Genuine Bokeh interactivity (HoverTool tooltips + HTML artifact) rather than faked
    UI, plus visual hierarchy via per-chord alpha and a focal annotation calling out
    the largest flow.
  - Clean square 2400x2400 canvas, round circle, centered layout with sorted bottom
    legend and per-entity flow totals — polished and uncluttered chrome.
  weaknesses:
  - The thin, low-alpha minor-flow chords crossing the center are hard to trace individually
    at full size and nearly invisible when scaled to ~400px mobile width — consider
    a touch more alpha floor or slight width for sub-75th-percentile flows.
  - Per-entity flow-total subtitles (24pt, e.g. '41M') are the smallest text and approach
    the legibility floor when the square render is scaled down; they survive but have
    little headroom.
  - Storytelling leans on a single annotation; the dense center could benefit from
    de-emphasizing crossing minor chords further so the strong relationships read
    as the clear focal structure.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: title "chord-basic · python · bokeh · anyplot.ai" in dark ink, centered and fully readable. Entity labels (Africa, Asia, Europe, N. America, S. America, Oceania) in their entity colors, bold, with muted-gray flow totals beneath. Bottom legend (3x2) with color swatches + "(NNM)" totals readable in soft ink. Italic muted annotation "Largest flow: Asia → Europe (15M)". All text readable.
      Data: six proportional outer arcs colored Imprint — Africa #009E73 (green), Asia #C475FD (purple), Europe #4467A3 (blue), N. America #BD8233 (ochre), S. America #AE3030 (red), Oceania #2ABCCD (cyan). First series is #009E73. Chords colored by source with alpha-based hierarchy.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: title in light ink, fully readable. Entity labels in the same entity colors (still legible on dark), flow totals in light-muted gray, legend text light-soft, annotation light-muted italic. No dark-on-dark failures observed.
      Data: arc and chord colors are identical to the light render (Imprint positions unchanged); only background and ink tokens flipped.
      Legibility verdict: PASS
