review:
  strengths:
  - 'First series Africa = #009E73 (brand green) with the full Imprint palette in
    canonical order; each continent keeps its identity (arc, ribbons, label, legend
    swatch all share one hue) across both themes.'
  - 'Backgrounds are theme-correct (#FAF8F1 light / #1A1A17 dark) with a subtle ELEVATED_BG
    hub disc; data colors are byte-identical between renders and only chrome flips.'
  - Chord width is genuinely proportional to flow magnitude and bidirectional flows
    render as separate ribbons, fully satisfying the spec.
  - Opacity scaled by magnitude (0.30 + 0.55 * v/max) plus depth-scaled quadratic
    control points let dominant corridors read first and stop thin ribbons piling
    up at the hub — real data storytelling.
  - Geometry is derived from parsed pygal chrome (title baseline + legend top) and
    canvas size, so the diagram fits between title and legend with no magic numbers.
  - 'Real interactivity preserved: SVG <title> hover tooltips (''Africa -> Asia: 8k/yr'')
    embedded in the exported HTML — appropriate for pygal as an interactive library.'
  - Clean module-level code, deterministic data, only used imports, correct plot-{THEME}.png/.svg/.html
    outputs.
  weaknesses:
  - The dense bundle of low-magnitude ribbons crossing near the center is slightly
    busy and can be hard to trace individually — inherent to chord diagrams, partially
    mitigated by the depth/opacity scaling, but it costs a little center clarity (DE-03).
  - Continent labels are colored to match their arc; ochre 'N. America' and cyan 'Oceania'
    are the lowest-contrast on the cream light surface — still readable at 56px bold,
    but the least legible elements. Consider an ink-color stroke or slightly darker
    label tint for the lighter hues.
  - The chord geometry is hand-rolled SVG injected into pygal's output; pygal itself
    only provides title/legend/style chrome. This is a reasonable workaround (pygal
    has no native chord type) but limits how 'idiomatic' the core visualization can
    be (LM).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1, with a slightly lighter elevated hub disc (#FFFDF6) grounding the circle. Correct, not pure white.
      Chrome: title "chord-basic · python · pygal · anyplot.ai" in dark ink, centered at top, fully readable. Bottom legend with 6 swatches (Africa, Asia, Europe, N. America, S. America, Oceania) in dark text, readable. Continent labels sit just outside each arc, colored to match the arc — all readable at 56px bold; ochre/cyan are lowest contrast but still legible.
      Data: six perimeter arcs colored Imprint canonical — Africa green #009E73 (first series, top-right), Asia lavender, Europe blue, N. America ochre, S. America matte red, Oceania cyan. Filled chord ribbons flow between arcs, colored by source, opacity scaled by flow magnitude. Arc widths proportional to total flow (Asia/N.America widest).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 with a #242420 elevated hub disc. Correct, not pure black.
      Chrome: title light ink, readable. Legend text light, readable. Continent labels in the same data hues, readable against the dark surface (the saturated hues read well on near-black). No dark-on-dark failures.
      Data: arc, ribbon, label and legend colors are identical to the light render — only the background/text chrome flipped. First series still #009E73.
      Legibility verdict: PASS
