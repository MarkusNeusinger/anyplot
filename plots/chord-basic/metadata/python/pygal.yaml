review:
  strengths:
  - Genuinely sophisticated custom chord geometry hand-built in SVG (trig-derived
    arc spans, ribbon paths) layered on top of pygal's native title + legend chrome
    — a clever, clean way to render a chord diagram in a library that has no native
    support.
  - 'Perfect theme adaptation: identical Imprint data colors across both renders,
    only chrome flips. Light is warm off-white #FAF8F1, dark is warm near-black #1A1A17,
    all text readable in both — no dark-on-dark.'
  - 'Africa = #009E73 first, full canonical Imprint palette per continent, colored
    perimeter arcs AND matching colored labels give each entity a strong consistent
    identity.'
  - Chord opacity scales with flow magnitude (0.30–0.85), so dominant migration corridors
    read first — real data storytelling, not just a tangle of equal ribbons.
  - Square 2400x2400 canvas (correct for a symmetric circular plot), centered between
    parsed title baseline and legend top with no magic numbers — nothing clipped,
    canvas gate passed.
  - Clean flat KISS script, deterministic hardcoded data, all imports used, bidirectional
    flows present as separate ribbons per direction.
  weaknesses:
  - 'Interactive feature gap: although pygal is an interactive library, the chord
    diagram is injected as a static SVG <g> and the .html merely embeds that same
    static SVG. The spec''s suggested hover tooltips showing exact flow values are
    absent; only the legend swatches come from pygal. Add <title> child elements (SVG
    tooltips) on each ribbon and arc so hovering reveals the flow value.'
  - 'Library mastery is modest by construction: pygal is used only for title + bottom
    legend + invisible anchor points, while the visualization proper is hand-drawn
    SVG, so few pygal-distinctive features are exercised.'
  - Center of the diagram is slightly busy where many thin low-magnitude ribbons cross
    near the hub — readable but a touch muddy; pulling the quadratic control point
    slightly off-center or insetting it would declutter the hub.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: title "chord-basic · python · pygal · anyplot.ai" in dark ink, top-centered, fully readable. Bottom legend with 6 colored swatches (Africa, Asia, Europe, N. America, S. America, Oceania) in dark text — readable. Perimeter labels colored to match each arc, all readable.
      Data: 6 continent arcs in Imprint palette — Africa #009E73 (green), Asia lavender, Europe blue, N. America ochre, S. America red, Oceania cyan. Filled chord ribbons colored by source with magnitude-scaled opacity. First series = #009E73 confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: title in light ink, readable; bottom legend text light, readable; colored perimeter labels readable. No dark-on-dark text.
      Data: identical continent colors to the light render — only chrome flipped. Arc separators use the page bg so arcs read cleanly against the dark surface. Brand green clearly visible.
      Legibility verdict: PASS
