review:
  strengths:
  - 'Genuinely sophisticated from-scratch chord diagram in Altair (a grammar-of-graphics
    library with no native chord support): outer arc-ring polygons, quadratic-bezier
    chord ribbons, and per-entity angular layout all hand-computed.'
  - 'First categorical series Europe is brand green #009E73 and the full Imprint canonical
    palette (positions 1-6) is applied; data colors are identical across light and
    dark renders with only chrome flipping.'
  - 'Backgrounds are exactly theme-correct (#FAF8F1 light / #1A1A17 dark); all chrome
    (title, subtitle, color-coded entity labels, muted totals, Top Flows callout)
    is readable in both themes with no dark-on-dark or light-on-light failures.'
  - 'Real interactivity for an interactive library: alt.selection_point on pointerover
    highlights chords, plus per-chord tooltips (From/To/Flow) — no fake/simulated
    UI.'
  - 'Strong spec compliance: bidirectional flows render as separate ribbons, chord
    width is proportional to value, each entity has a distinct color, and entity totals
    are annotated.'
  - Direct color-coded labeling replaces a redundant legend cleanly; chrome is refined
    (no axes, no grid, generous whitespace, arc gaps).
  - Canvas lands exactly on the 2400x2400 square target via pad-only (no crop); KISS
    top-level script, deterministic data, clean imports.
  weaknesses:
  - The central chord tangle is visually busy — with 15 overlapping translucent ribbons
    it is hard to trace an individual corridor end-to-end. This is partly inherent
    to chord diagrams, but slightly higher gap spacing or stronger major/minor contrast
    would aid readability.
  - The major/minor visual hierarchy (opacity 0.6 vs 0.45) is subtle and barely perceptible
    in the static PNG, so the 'dominant corridors highlighted' storytelling promise
    lands weakly without the hover interaction.
  - The circle sits slightly low-and-center of the square canvas, leaving more whitespace
    at the upper-right; the Top Flows callout fills it but balance is imperfect.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — not pure white, correct.
      Chrome: title "chord-basic · python · altair · anyplot.ai" in near-black, large and crisp; grey subtitle "Migration between continents — dominant corridors highlighted" readable; "Top Flows" callout (bold black heading + two grey flow lines) top-left, readable; entity labels printed in their own entity colors (Europe green, North America purple, Asia blue, Africa amber, South America red, Oceania teal) with muted-grey "(NNNk)" totals beneath — all clearly legible.
      Data: six colored outer arcs around the ring; chord ribbons colored by source. First series Europe = #009E73 brand green confirmed. Imprint palette throughout.
      Legibility verdict: PASS — all text crisp against the off-white surface.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black, correct.
      Chrome: title in off-white (#F0EFE8), subtitle and Top Flows lines in soft/muted grey, all clearly readable; entity labels remain in their identical entity colors with muted-grey totals — readable, no dark-on-dark failure.
      Data: arc and chord colors are identical to the light render (only chrome flipped). Europe green #009E73 reads well on the dark surface; all six entity colors remain distinct.
      Legibility verdict: PASS — no dark-on-dark text; all elements distinguishable.
