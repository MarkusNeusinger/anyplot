review:
  strengths:
  - Correctly implements a custom chord diagram built from scratch using Plotly Scatter
    traces and bezier curves — the only viable approach since Plotly has no native
    chord chart type
  - 'Full Imprint palette compliance: colors #009E73 through #2ABCCD used in canonical
    order, theme-adaptive backgrounds (#FAF8F1 / #1A1A17) and all chrome tokens correctly
    applied in both renders'
  - 'Excellent data storytelling: subtitle identifies the Europe–Asia dominant corridor
    at 65M, and the dominant chord is visually highlighted at 0.75 opacity vs 0.38
    for secondary flows'
  - 'Rich hover interaction: hovertemplate with flow details on arc segments (total
    in/out per continent) and on chord fills (directional flow + share) — including
    hoveron=''fills'' for the chord polygons'
  - Both PNG and HTML exports correct, title follows {Descriptive Title} · {spec-id}
    · python · plotly · anyplot.ai format with scaled fontsize for the long string
  - 'Perfect spec compliance: bidirectional flows visible as separate chords, chord
    width proportional to flow, 6 entities with distinct colors, hover tooltips with
    exact values'
  - Clean, deterministic code with no functions or classes; deterministic data matrix;
    only used imports
  weaknesses:
  - Non-dominant chord opacity of 0.38 is too low — in the busy chord interior, smaller
    flows (e.g. Africa–Oceania, S. America–Oceania) are barely distinguishable; increase
    non-dominant chord opacity to 0.48–0.55 for better readability without losing
    the dominant-chord contrast
  - Subtitle annotation at 12px (48 source-px at scale=4) is slightly below the comfortable
    reading threshold on this 2400×2400 canvas; increase to 13–14px
  - Dominant chord visual emphasis is subtle in the dense chord interior — the 0.75
    vs 0.38 opacity difference gets lost; consider also increasing line_width of the
    dominant chord from 1.2 to 1.8–2.0, or adding a thin solid border outline
  - Migration flow totals (~402M non-diagonal flows, 804M double-counted) are roughly
    3× higher than real-world international migration stocks (~281M globally); scale
    the matrix values down by ~3 to be more factually grounded
  - 'LM-02 opportunity missed: the implementation uses low-level Scatter + bezier
    primitives (which look identical to a matplotlib approach) rather than leveraging
    any Plotly-exclusive higher-level features beyond hover tooltips'
