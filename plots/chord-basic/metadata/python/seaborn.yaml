review:
  strengths:
  - Genuine, well-engineered chord diagram hand-built with matplotlib Path/PathPatch
    bezier ribbons and Wedge arcs — outer arcs are proportional to each continent's
    total outgoing flow and ribbon widths are proportional to per-direction flow,
    exactly as a chord diagram should behave.
  - 'Imprint palette applied correctly: first entity (Africa) is brand green #009E73
    and the remaining continents follow canonical order (lavender, blue, ochre, red,
    cyan); identical data colors across light and dark, only chrome flips.'
  - 'Theme-adaptive chrome is correct — warm off-white #FAF8F1 / warm near-black #1A1A17
    backgrounds, ink-colored title and continent labels readable in both renders with
    no dark-on-dark failure.'
  - Square 2400x2400 canvas is the right choice for a radial/symmetric chart and matches
    the gate exactly; bbox_inches left default.
  - Title follows mandated format with descriptive prefix and uses the length-aware
    fontsize formula to avoid overflow.
  - 'Clean KISS script: flat top-level code, deterministic hardcoded data (no seed
    needed), only used imports, alpha=0.72 ribbons handle center overplotting well.'
  weaknesses:
  - Bidirectional flows are merged into a single asymmetric ribbon colored by the
    dominant direction's source, rather than two separate chords as the spec note
    literally requests ('both directions should be visible as separate chords'). This
    is the standard d3-style chord convention and reads cleanly, but it does not surface
    each direction independently.
  - 'Library mastery is inherently limited: seaborn is used only for set_theme/set_palette
    while all the actual drawing is raw matplotlib patches — unavoidable since seaborn
    has no chord primitive, but it means little idiomatic seaborn or seaborn-distinctive
    feature usage.'
  - No legend or value scale — continent identity comes only from the ring labels
    and there is no indication of the flow magnitude scale (e.g. thousands/year),
    so absolute values are not recoverable from the static image.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "Global Migration Flows · chord-basic · python · seaborn · anyplot.ai" in dark ink at top, fully visible, not clipped. Six continent labels (Africa, Asia, Europe, N. America, S. America, Oceania) in dark ink positioned outside the ring — all readable, none clipped at canvas edges.
      Data: outer ring arcs colored Africa=#009E73 (green), Asia=#C475FD (lavender), Europe=#4467A3 (blue), N. America=#BD8233 (ochre), S. America=#AE3030 (red), Oceania=#2ABCCD (cyan). First series is brand green. Ribbons connect continent pairs with width proportional to flow; alpha~0.72 keeps the center tangle legible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and continent labels in light ink (#F0EFE8), all clearly readable against the dark surface. No dark-on-dark failure.
      Data: ribbon and ring colors are identical to the light render — only the background and text color flipped. Brand green and all other hues remain visible on the dark surface.
      Legibility verdict: PASS
