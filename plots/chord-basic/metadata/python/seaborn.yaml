review:
  strengths:
  - Authentic chord diagram built from scratch with matplotlib Path/PathPatch ribbons
    and Wedge arcs — arc length encodes each continent's total outgoing flow and ribbon
    width at each end encodes the directional flow, exactly matching the spec's 'width
    proportional to value' and bidirectional requirements.
  - 'Imprint palette applied in canonical order with Africa (first entity) correctly
    = #009E73; each of the 6 continents gets a distinct, CVD-safe hue.'
  - 'Theme adaptation is flawless: light render on #FAF8F1, dark render on #1A1A17,
    identical data colors across both, all text remains fully legible (no dark-on-dark).'
  - Strong data storytelling — the largest bidirectional corridor (Asia <-> Europe,
    320k/yr) is highlighted with an ink edge + higher alpha and called out in a top-left
    annotation, giving the busy diagram a clear focal point.
  - 'Smart use of the square canvas: the inscribed circle leaves corners free, which
    are used for the focal-insight annotation and the flow-magnitude scale note instead
    of wasted whitespace.'
  - Exact 2400x2400 canvas, no bbox_inches='tight', clean linear KISS script with
    deterministic hardcoded data and no unused imports.
  weaknesses:
  - 'Library Mastery is inherently low for this spec: seaborn has no native chord
    primitive, so the diagram is hand-built with matplotlib patches and seaborn only
    supplies set_theme/set_palette. This is the correct and honest approach, but it
    limits LM-01/LM-02 credit.'
  - Near the top of the circle (around the small Oceania arc) several thin crossing
    ribbons bunch together and are hard to trace individually — inherent to chord
    diagrams at this density, but the busiest region of the chart.
  - No legend or per-ribbon value labels for non-focal corridors; exact flows for
    pairs other than the highlighted one must be inferred from ribbon width (acceptable
    for a static chord, and tooltips are correctly omitted rather than faked per AR-08).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: title "Global Migration Flows · chord-basic · python · seaborn · anyplot.ai" in dark ink across the top, fully readable. Six continent labels (Africa, Asia, Europe, N. America, S. America, Oceania) sit outside the ring in dark ink, all readable. Top-left annotation "Largest corridor / Asia <-> Europe: 320k / year" and bottom-left scale note both legible. No overlap of text.
      Data: 6 distinct Imprint hues — Africa green (#009E73, first series), Asia lavender, Europe blue, N. America ochre, S. America matte red, Oceania cyan. Outer ring arcs sized by total outgoing flow; ribbons connect pairs with width proportional to flow. Asia<->Europe ribbon highlighted with ink edge + higher opacity as the focal corridor.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title, continent labels, and both corner annotations render in light ink (#F0EFE8 / soft), all clearly readable — no dark-on-dark failures.
      Data: identical hues to the light render (only chrome flipped). Brand green for Africa still vivid; matte red, blue, ochre, lavender, cyan all hold their identity. Focal Asia<->Europe ribbon highlighted identically.
      Legibility verdict: PASS
