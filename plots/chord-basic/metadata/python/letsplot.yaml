review:
  strengths:
  - 'First series Asia rendered in brand green #009E73; full Imprint palette used
    in canonical order with distinct colors per continent.'
  - 'Backgrounds correct in both themes (#FAF8F1 light / #1A1A17 dark); all chrome
    (title, labels, legend, caption) flips theme-adaptively while data colors stay
    identical.'
  - 'Sophisticated hand-built chord geometry: proportional arc sizes with gaps, bezier-curved
    ribbons, three-tier opacity hierarchy so weak flows stay legible, tick marks linking
    arcs to labels.'
  - Bidirectional flows shown as separate chords (e.g. Asia→Europe 45 and Europe→Asia
    22), satisfying the spec's bidirectional requirement.
  - 'Data storytelling via a ''Strongest: Asia→Europe (45)'' annotation and a caption
    explaining the width/opacity encoding.'
  - Correct square canvas (2400×2400), title in the exact mandated format, interactive
    HTML export with hover tooltips, deterministic hardcoded data, flat KISS script
    with clean imports.
  weaknesses:
  - 'The center annotation ''Strongest: Asia→Europe (45)'' overlaps the dense crossing
    chord ribbons, reducing its legibility against the busy backdrop — consider a
    small elevated background pill behind the text or relocating it to a calmer area.'
  - The legend title 'Continent' sits very close to / slightly overlaps the first
    column of legend swatches — add horizontal spacing between the legend title and
    the keys.
  - The central region is visually busy where many ribbons cross (inherent to chord
    diagrams), but this compounds the annotation overlap above.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) page and an elevated cream legend frame (#FFFDF6) — not pure white.
      Chrome: bold near-black title "chord-basic · python · letsplot · anyplot.ai" top-left; bold dark continent labels (Asia, Oceania, South America, North America, Africa, Europe) around the ring; italic muted caption bottom-right; legend title "Continent" + 6 keys all dark-on-light. All text readable.
      Data: outer ring arcs and bezier chords colored by Imprint palette — Asia = brand green #009E73 (first series), Europe = lavender, North America = ochre, Africa = blue, South America = matte red, Oceania = cyan. Chord width proportional to flow, three opacity tiers. Center annotation "Strongest: Asia→Europe (45)" in soft-ink bold overlaps the crossing ribbons (slightly busy but legible).
      Legibility verdict: PASS (annotation is the only mildly-strained element, still readable).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) page and elevated dark legend frame (#242420) — not pure black.
      Chrome: light off-white title, labels, legend text and italic caption — all clearly readable, no dark-on-dark failures. Tick marks and arc separators use the dark theme's page-bg seam color.
      Data: identical data colors to the light render (Asia green #009E73, Europe lavender, North America ochre, Africa blue, South America red, Oceania cyan) — only the chrome flipped. Three-tier chord opacity preserved.
      Legibility verdict: PASS (center "Strongest" annotation in light-ink over mixed dark ribbons is readable; same mild central busyness as light).
