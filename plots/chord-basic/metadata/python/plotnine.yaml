review:
  strengths:
  - Hand-builds a true d3-style chord diagram entirely from plotnine grammar primitives
    (geom_polygon arcs + ribbons, coord_fixed, theme_void) with no matplotlib fallback
    — a strong demonstration of the library's flexibility
  - 'Correct chord geometry: each entity arc is sized by total outflow and subdivided
    per destination, with ribbon ends attaching to direction-specific slices so bidirectional
    asymmetry is encoded geometrically'
  - 'Palette compliance is perfect: first series (Africa) = #009E73, full Imprint
    canonical order, backgrounds #FAF8F1 (light) / #1A1A17 (dark), data colors identical
    across themes with only chrome flipping'
  - Both renders are theme-correct and legible — bold entity labels and title use
    INK token that flips light/dark appropriately
  - Realistic, neutral data (annual migration flows between 6 continents) at sensible
    scale; deterministic hardcoded matrix needs no seed
  - 'Clean KISS code: no functions/classes, all imports used, idiomatic ggplot composition'
  weaknesses:
  - 'In the dark render the ribbons (alpha=0.6 over #1A1A17) read noticeably more
    muted/dark than in the light render — e.g. S. America''s red ribbons become deep
    maroon and lose some pop; consider a slightly higher ribbon alpha in dark theme
    for parity'
  - Bidirectional pairs are drawn as a single ribbon colored by the dominant source
    rather than two separate chords; this is the canonical chord representation and
    is acceptable, but the spec note explicitly suggested both directions be visible
    as separate chords
  - Entity labels (geom_text size=6.5 ≈ 18pt) are bold and clear at full size but
    sit near the borderline for a ~400px mobile downscale — slightly larger would
    add margin
  - 'No focal-point emphasis: all flows are treated visually equally, so the diagram
    shows structure but does not steer the eye toward the strongest single relationship
    (data storytelling)'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: title "chord-basic · python · plotnine · anyplot.ai" in dark ink, fully readable. Entity labels (Africa, Asia, Europe, N. America, S. America, Oceania) in bold dark text outside the ring — all readable. Legend titled "Continent" with 6 swatches + labels, elevated off-white box with soft border, fully within canvas (not clipped).
      Data: 6 outer arc bands in Imprint order — Africa #009E73 (green), Asia #C475FD (purple), Europe #4467A3 (blue), N. America #BD8233 (amber), S. America #AE3030 (red), Oceania #2ABCCD (cyan). First series #009E73 confirmed. Ribbons curve through centre, width proportional to flow, colored by source, alpha-blended.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title and all entity labels in light ink (#F0EFE8), clearly readable — no dark-on-dark. Legend box on elevated near-black (#242420) with light text, readable, within canvas.
      Data: identical arc colors to the light render (only chrome flipped). Ribbons appear somewhat more muted because alpha=0.6 over the near-black surface darkens them, but all entities remain distinguishable. Brand green #009E73 visible.
      Legibility verdict: PASS
