review:
  strengths:
  - 'Genuine matplotlib mastery: a full chord diagram built from primitives (mpatches.Wedge
    arcs + PathPatch cubic-Bezier ribbons with explicit Path codes) since matplotlib
    has no native chord support'
  - Chord width and alpha/linewidth scale with flow magnitude (flow_ratio**0.6) creating
    a clear visual hierarchy, with a raised floor so the smallest Oceania flows stay
    legible
  - 'Color-coordinated entity labels matching each arc''s Imprint color; first series
    (Africa) is brand green #009E73 and the full canonical Imprint palette is used
    in order'
  - 'Strong data storytelling: italic insight subtitle (''Asia-Europe corridor dominates
    global flows'') plus top-3 flow annotations with leader lines connecting boxes
    to their source ribbons'
  - Theme adaptation is correct and complete in both renders — data colors identical,
    only chrome (page bg, ink, annotation boxes) flips; square 2400x2400 canvas is
    the right choice for a circular chart
  - Realistic, neutral data (continental migration flows in millions) with a proper
    bidirectional flow matrix rendered as separate directional chords
  weaknesses:
  - The chord control points are pulled toward the center (ctrl_factor=0.25), so ribbons
    converge into a dense tangle through the middle of the ring — individual small
    flows are hard to trace. Consider a slightly larger ctrl_factor (~0.35-0.45) to
    keep ribbons nearer the perimeter and reduce center clutter.
  - 'The two top annotation boxes (''Africa -> Asia: 12M'' and ''N. America -> Europe:
    12M'') sit close to the top canvas edge; they are fully visible (no clipping)
    but margins are tight — keep an eye on this if title length grows.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: dark title "Continental Migration · chord-basic · matplotlib · anyplot.ai" fully visible at top; italic gray subtitle; three annotation boxes with elevated off-white fill and colored borders ("Africa → Asia: 12M", "N. America → Europe: 12M", "Asia → Europe: 15M"). All text readable.
      Data: six continent arcs in distinct Imprint colors — Africa green #009E73, Asia purple #C475FD, Europe blue #4467A3, N. America amber #BD8233, S. America red #AE3030, Oceania cyan #2ABCCD. Bezier chord ribbons connect arcs with magnitude-scaled width/alpha. First series is brand green. Labels color-matched to arcs.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: light title text, light/gray subtitle, annotation boxes with dark elevated fill (#242420) and colored borders, INK light text inside — all readable, no dark-on-dark.
      Data: identical Imprint arc colors and chord geometry to the light render — only chrome flipped. Brand green clearly visible.
      Legibility verdict: PASS
