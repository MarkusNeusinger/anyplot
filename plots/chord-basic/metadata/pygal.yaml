  image_description: 'The plot displays a chord diagram on a white background with
    6 continents (Africa, Asia, Europe, N. America, S. America, Oceania) arranged
    in a circle. Each continent has a colored arc segment and a bold colored label
    positioned outside the circle. Curved Bezier chords connect the continents through
    the center, with stroke width varying by flow magnitude. Colors used: Africa (dark
    blue), Asia (gold/yellow), Europe (green), N. America (orange), S. America (purple),
    Oceania (cyan). The title "chord-basic · pygal · pyplots.ai" appears at the top.
    A legend with colored squares sits at the bottom, far below the diagram. Many
    chords — especially the yellow/gold Asia ones — are extremely faint against the
    white background due to 0.45 opacity on light colors. The chords are rendered
    as stroked lines rather than filled ribbons, making this look more like a network
    arc diagram than a traditional chord diagram.'
