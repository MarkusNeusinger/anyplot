review:
  strengths:
  - Full spec compliance with all required features including interactive tooltips
    and bidirectional flows
  - Clean, well-structured code that manually constructs chord geometry with proper
    bezier curves
  - Excellent use of letsplot-specific layer_tooltips() for interactivity and HTML
    export
  - Realistic, neutral migration flow data with good variety in magnitudes
  - Appropriate use of theme_void() and coord_fixed() for circular visualization
  weaknesses:
  - Color palette has similar hues for Asia (dark teal) and Oceania (dark green-teal),
    reducing distinguishability
  - No visual emphasis on dominant flows — all chords treated equally, missing storytelling
    opportunity
  - Title is left-aligned rather than centered over the circular diagram
  - Thin chords for small flows are hard to distinguish individually
  image_description: 'The plot displays a chord diagram showing continental migration
    flows between 6 continents: Asia (dark teal-blue), Europe (gold/amber), Africa
    (light blue), North America (orange), South America (purple), and Oceania (dark
    green-teal). Each continent occupies an arc segment around the circle perimeter,
    with arc width proportional to total flow volume. Semi-transparent chords connect
    continents, colored by their source continent, with width proportional to flow
    magnitude. Asia and Europe have the largest arcs indicating highest total flow.
    The title reads "Continental Migration Flows · chord-basic · letsplot · pyplots.ai"
    at the top left. A legend at the bottom maps colors to continent names. Entity
    labels are positioned outside the ring in bold dark text. The white background
    is clean and the overall layout is well-balanced within a square canvas.'
