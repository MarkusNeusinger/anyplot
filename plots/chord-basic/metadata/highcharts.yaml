  image_description: 'The plot displays a dependency wheel (chord diagram) on a 3600x3600
    square canvas with a subtle light-gray linear gradient background transitioning
    from #FAFBFC to #EEF1F5. Six continents are arranged around the circle perimeter:
    Europe (dark steel blue #306998), Asia (golden amber #E8A838), Africa (muted purple
    #8B6CAF), N. America (teal #2BA5B5), S. America (green #3DAA6D), and Oceania (coral
    #D4654A). Colored arc segments along the rim represent each continent''s total
    trade volume, with Asia and N. America having the largest arcs. Chords connect
    continents with widths proportional to bilateral trade values at 50% opacity,
    with the largest chords being Asia-N. America and Europe-N. America clearly dominant.
    Node arcs have semi-transparent white borders (2px) for definition. The title
    "chord-basic · highcharts · pyplots.ai" appears at top in bold 60px dark text
    (#1A2332), with subtitle "Trade Flows Between Continents (Billions USD)" in 40px
    lighter gray (#5A6878) below. Data labels (continent names) are positioned outside
    the wheel at 44px with white text outlines for contrast. The wheel fills approximately
    84% of the canvas with good centering. The Inter web font is loaded for typography.'
