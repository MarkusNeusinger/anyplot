review:
  strengths:
  - Genuine native chord diagram built entirely within ggplot2's grammar — geom_polygon
    ribbons formed from arc segments + quadratic beziers pinned to the circle centre,
    with no fallback to another backend (respects the ggplot2 'no workarounds' rule).
  - Sector arcs are sized proportional to each region's total flow and chords are
    width-proportional to migration value, exactly matching the spec; widest chords
    are drawn first so thin ones stay visible.
  - 'Perfect Imprint palette compliance: first sector (Africa) is brand green #009E73,
    every region gets a distinct hue, and data colors are identical between light
    and dark renders — only chrome flips.'
  - 'Both renders are highly legible: warm off-white #FAF8F1 / warm near-black #1A1A17
    backgrounds, bold region labels readable in both themes, no dark-on-dark or light-on-light
    failures.'
  - Clean theme-token threading (PAGE_BG/INK/INK_SOFT), theme_void for minimal chrome,
    coord_fixed for a true circle, square 2400x2400 canvas exactly on target.
  weaknesses:
  - Four top-level helper functions (deg2rad, pt_on_circle, arc_seq, bezier_to_centre)
    are defined; they are well-justified geometry helpers but nudge slightly against
    the strict KISS 'no functions' preference (CQ-01).
  - The chord interior is visually busy where many ribbons cross near the centre —
    inherent to chord diagrams and mitigated by colour-by-origin + alpha, but the
    densest crossings (Asia/Europe region) are hard to trace individually.
  - Africa and S. America sector labels sit close together at the top of the circle;
    they do not overlap but the margin is tight.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) across the full canvas — not pure white, not dark. Correct.
      Chrome: title "chord-basic · r · ggplot2 · anyplot.ai" in bold dark ink, centered; grey subtitle "Annual migration flows between world regions · chord width ∝ migrants, coloured by origin" readable; six bold region labels (Africa, S. America, N. America, Oceania, Asia, Europe) in dark ink around the circle — all clearly readable.
      Data: six sector bands each a distinct Imprint hue — Africa = brand green #009E73, S. America = cyan, N. America = matte red, Oceania = ochre, Asia = blue, Europe = lavender. Semi-transparent chords (alpha 0.55) coloured by origin sector connect the arcs; chord widths vary with flow magnitude. First series is #009E73.
      Legibility verdict: PASS — every text element is clearly readable against the off-white surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) across the full canvas — not pure black, not light. Correct.
      Chrome: title and region labels in light ink (off-white), subtitle in soft grey — all clearly readable; no dark-on-dark failures. Sector borders use the page background so bands separate cleanly.
      Data: identical hues to the light render (Africa green #009E73, cyan, red, ochre, blue, lavender) — only chrome flipped, data colors unchanged. Chord transparency reads well on the dark surface; brand green remains visible.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark issues.
