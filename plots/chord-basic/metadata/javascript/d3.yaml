review:
  strengths:
  - Idiomatic d3.chord/d3.ribbon/d3.arc layout — textbook use of the library’s signature
    chord module
  - 'First series is brand green #009E73 with the full Imprint palette in canonical
    order; data colors identical across light and dark, only chrome flips'
  - Department labels rotated tangent to the arc with auto text-anchor flip, no overlap
    and readable in both themes
  - Native <title> tooltips on both arcs and ribbons expose exact bidirectional flow
    values without faking interactivity
  - 'Clean KISS script: deterministic in-memory matrix, no functions/classes, d3 global
    only, square canvas honored via //# anyplot-orientation directive'
  - Neutral, plausible data (weekly inter-team message volume) that exercises all
    chord features incl. bidirectional flows
  weaknesses:
  - At the 400px mobile variant the 17px subtitle and tangent department labels get
    small though still legible — minor
  - Chord diagrams have no single focal point; data storytelling relies only on sorted
    descending chords rather than emphasis of a key relationship
