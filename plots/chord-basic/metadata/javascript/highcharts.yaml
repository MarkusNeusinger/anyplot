review:
  strengths:
  - Genuine native chord diagram built with Highcharts' own SVGRenderer (chart.renderer.path/g/text)
    instead of shelling out to a forbidden library or faking a sankey — the correct,
    idiomatic response to the dependency-wheel module not being vendored.
  - 'Faithful d3-chord layout: group arc length proportional to total outflow, sub-arcs
    sized by per-pair flow, tapered quadratic-bezier ribbons whose two ends reflect
    each direction''s magnitude.'
  - 'Imprint palette in canonical order with Africa = brand green #009E73 as the first
    entity; data colors identical across light and dark, only chrome flips.'
  - 'Both renders are clean, centered and theme-correct: warm off-white #FAF8F1 (light)
    and warm near-black #1A1A17 (dark) via transparent chart background; all labels
    legible in both.'
  - Honest interactivity — real SVG <title> elements give exact bidirectional flow
    values in the HTML view without faking tooltips in the PNG.
  - Deterministic hard-coded migration matrix; no imports, no network, fully reproducible.
  weaknesses:
  - Bidirectional flows are merged into a single tapered ribbon per unordered pair
    (colored by the dominant direction's origin) rather than two visibly separate
    chords as the spec note suggests; both directions are encoded in the ribbon's
    differing end-widths and the hover title, but they are not drawn as distinct arcs.
  - The fully-connected 6-node layout makes the center dense — several 0.6-opacity
    ribbons overlap into muddy blended colors where they cross, which is partly inherent
    to chord diagrams but slightly reduces per-link traceability.
  - Radial entity labels (16px CSS) are comfortably readable at full resolution but
    become small when the 2400px square is scaled to ~400px mobile width.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), transparent chart bg showing the page surface — not pure white.
      Chrome: dark title "chord-basic · javascript · highcharts · anyplot.ai" (22px bold) and grey subtitle describing migration flows; six radial entity labels (Africa, Asia, Europe, N. America, S. America, Oceania) in dark bold text. All readable.
      Data: six annular group arcs in Imprint canonical order — Africa = brand green #009E73, Asia = lavender, Europe = blue, N. America = ochre, S. America = matte red, Oceania = cyan. Tapered bezier ribbons (0.6 opacity) connect the groups, width proportional to flow, colored by origin. First entity is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), transparent chart bg — not pure black.
      Chrome: light title and subtitle, light entity labels — all clearly readable, no dark-on-dark.
      Data: identical group-arc and ribbon colors to the light render (Africa green, Asia lavender, Europe blue, N. America ochre, S. America red, Oceania cyan) — only chrome flipped.
      Legibility verdict: PASS
