review:
  strengths:
  - Builds a genuine chord diagram from a core Chart.js doughnut plus a custom afterDatasetsDraw
    plugin that reads the live arc geometry (getProps for start/end angles, innerRadius,
    centre) and bows ribbons through the centre — no D3, no community plugin, exactly
    the 'pure Chart.js extensibility' path the library prompt asks for.
  - 'Imprint palette in canonical order with brand green #009E73 leading (Africa);
    data colours are pixel-identical across light and dark, only chrome flips.'
  - Bidirectional flows are encoded as asymmetric ribbon ends (slot[i][j] vs slot[j][i]),
    the standard Circos/d3-chord convention, with ribbon width proportional to flow
    value and arc length proportional to total outgoing flow.
  - Largest-pair-first draw order keeps thin ribbons readable on top of thick ones;
    alpha 0.6 fill with a 0.9 stroke gives clean layering in both themes.
  - Square 2400x2400 canvas via the //# anyplot-orientation directive; title matches
    the mandated 'chord-basic · javascript · chartjs · anyplot.ai' format; deterministic
    hard-coded data, animation:false, no filesystem/network access.
  weaknesses:
  - Spec notes suggest hover tooltips showing exact flow values for interactive libraries,
    but the ribbons are drawn in the plugin layer and are not hit-testable — the tooltip
    only reports each arc's total outgoing flow ('X k outgoing'), so hovering a ribbon
    does not reveal its directional flow values in the HTML render.
  - Ribbons are coloured solely by the dominant direction's entity, so a pair's minor-direction
    entity has no colour cue; a reader cannot always tell which two entities a faint
    ribbon connects without tracing it to both arcs.
  - Each arc is tiled only by its outgoing slots, so incoming flow is not separately
    reserved on the destination arc (a simplification vs a full Circos in+out segmented
    arc); geometrically consistent but slightly less precise as a flow-balance readout.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), no pure-white plot area.
      Chrome: title "chord-basic · javascript · chartjs · anyplot.ai" in dark ink, fully readable above the circle; bottom legend (Africa, Asia, Europe, N. America, S. America, Oceania) in dark text with matching colour swatches, all readable. PASS.
      Data: doughnut ring of 6 arcs — Africa green #009E73 (first), Asia lavender #C475FD, Europe blue #4467A3, N. America ochre #BD8233, S. America matte red #AE3030, Oceania cyan #2ABCCD — canonical Imprint order. Translucent ribbons (alpha ~0.6) bow through the centre, widths proportional to flow. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black.
      Chrome: title and legend in light ink (#F0EFE8), clearly readable against the dark surface; no dark-on-dark text. PASS.
      Data: identical arc and ribbon colours to the light render (Africa still #009E73, etc.) — only the background and text colour flipped. Ribbons remain distinguishable on the dark surface.
      Legibility verdict: PASS
