review:
  strengths:
  - Idiomatic circular `graph` series — the correct ECharts equivalent for a native
    chord type, with a clear code comment explaining the choice
  - Imprint palette applied in canonical order (Africa=#009E73 brand green first,
    then lavender/blue/ochre/red/cyra), identical across both themes
  - Node size encodes total throughput and chord width is proportional to flow magnitude
    with a sensible minimum-width + opacity floor that keeps 1–2M flows legible
  - Bidirectional flows rendered as separate directed chords with arrow edge symbols,
    satisfying the spec requirement
  - Interactive tooltip formatter shows exact flow values and node totals; emphasis
    focus:adjacency adds genuine distinctive ECharts polish
  - Title follows the mandated `{Descriptive} · {spec-id} · {language} · {library}
    · anyplot.ai` format and is readable in both themes
  - Deterministic hard-coded data, clean KISS structure, square canvas passes the
    dimension gate
  weaknesses:
  - Chords bundle tightly and overlap heavily near the Asia node at the bottom, creating
    a slightly muddy crossing region — consider nudging curveness or spreading low-value
    chords so individual flows stay traceable (minor; inherent to chord layouts)
  - Without a legend, low-volume thin chords (1–2M) can be hard to attribute to a
    source at a glance; node-coloured chords help but tracing in the dense center
    still takes effort
  - Design refinement is good but not exceptional — node-throughput sizing and adjacency
    emphasis are the main storytelling devices
