review:
  strengths:
  - 'Idiomatic ECharts: a circular `graph` series is the correct native stand-in for
    a chord type ECharts lacks — entities on a ring, curved arcs carrying flow, with
    `emphasis.focus: ''adjacency''` for hover highlighting.'
  - Imprint palette applied in canonical order with brand green `#009E73` on the first
    entity (Africa); all six entity colors are identical across light and dark, only
    chrome flips.
  - Chord width is genuinely proportional to flow magnitude (`width = 1.5 + value
    * 0.8`) and node symbolSize encodes total throughput, giving real visual hierarchy
    (Asia/Europe read as hubs).
  - 'Directional arrowheads (`edgeSymbol: [''none'',''arrow'']`) render bidirectional
    pairs as distinct chords, satisfying the spec''s bidirectional requirement.'
  - 'Clean, KISS, deterministic hard-coded data; `animation: false` set; tooltips
    defined for the interactive HTML output; node borders use `pageBg` for crisp separation.'
  weaknesses:
  - 'The top entity node (S. America) sits directly under the title text — the red
    circle crowds/slightly overlaps the ''chord-basic'' word of the title in both
    renders. Nudge the circular layout center down (e.g. center: [''50%'',''58%''])
    or reduce the ring radius so the topmost node clears the title band.'
  - The thinnest chords (value 1-2M, e.g. Africa→Oceania, S.America→Asia) are faint
    at opacity 0.55 — consider a slightly higher minimum width or opacity floor so
    low-volume flows stay legible when scaled to mobile width.
  - No explicit legend; entity identity relies on node labels + color. Acceptable
    for a labeled chord, but a compact legend or keeping labels fully clear of crossing
    arcs would harden identification.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), transparent series over the container surface — not pure white.
      Chrome: title "Migration Between Continents · chord-basic · javascript · echarts · anyplot.ai" in dark ink, centered, fully readable. Six entity labels (Africa, Asia, Europe, N. America, S. America, Oceania) in dark ink, all readable. NOTE: the S. America node at top-center crowds the title text slightly (the red circle abuts the "chord-basic" word).
      Data: six distinct nodes in Imprint canonical order — Africa #009E73 brand green, Asia #C475FD lavender, Europe #4467A3 blue, N. America #BD8233 ochre, S. America #AE3030 matte red, Oceania #2ABCCD cyan. Curved arcs colored by source node, widths proportional to flow, arrowheads showing direction. First series (Africa) confirmed brand green.
      Legibility verdict: PASS (minor title/top-node crowding, but all text readable).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black.
      Chrome: title and all six entity labels render in light ink (#F0EFE8), clearly readable; no dark-on-dark failures. Same slight S. America node / title crowding as the light render.
      Data: identical entity colors and chord geometry to the light render — only chrome (background + text) flipped. Brand green Africa remains vivid; all six hues hold.
      Legibility verdict: PASS (no dark-on-dark; all text legible).
