review:
  strengths:
  - Genuine chord diagram built entirely on the MUI X community surface via the documented
    escape hatch — a <ChartContainer> linear coordinate space with the ring and ribbons
    drawn as SVG overlays positioned through the chart's own useXScale/useYScale hooks;
    no Pro/Premium, no second charting library.
  - 'Imprint palette used in canonical order: Asia=brand green #009E73 (first series),
    Africa=lavender, Europe=blue, N.America=ochre, S.America=matte red, Oceania=cyan
    — all data colors identical across light and dark, only chrome flips.'
  - 'Correct chord semantics: region arc length is proportional to total outbound
    flow, ribbon ends differ in width to encode bidirectional pair magnitudes, and
    fat ribbons are drawn first so thin ones stay legible on top.'
  - Region labels are colored to match their arc with a secondary 'NN.NM out' total
    beneath each — strong visual hierarchy and self-documenting legend without a separate
    legend box.
  - Title exactly matches the mandated format 'chord-basic · javascript · muix · anyplot.ai',
    with an informative subtitle and footnote stating units (millions/yr) and the
    bidirectional encoding.
  - Deterministic in-memory migration matrix, skipAnimation set, clean and fully-used
    imports — reproducible and idiomatic for the React/MUI X harness.
  weaknesses:
  - Footnote and subtitle are set at 14-16px in the 1200px CSS mount space; readable
    at full resolution but become small when the square render is scaled down to a
    ~400px mobile preview — consider nudging the footnote to ~16-18px for mobile legibility.
  - Several thin ribbons converge through the center of the ring and can be hard to
    trace individually where they overlap at low opacity — acceptable for a chord
    diagram but the smallest flows (e.g. Oceania pairs) read faintly.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no painted white box; page shows through the transparent SVG.
      Chrome: dark title "chord-basic · javascript · muix · anyplot.ai" centered at top, readable; gray subtitle and bottom footnote readable; six region labels colored to match their arcs (e.g. "Asia" green, "Africa" lavender) each with a soft-ink "NN.NM out" subtitle — all readable.
      Data: ring of six colored arcs around the circle with curved ribbons connecting them. First series Asia is brand green #009E73. Ribbons at ~0.6 opacity with pageBg-colored separating strokes. Arc length tracks total outbound flow (Asia largest at 17.2M).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), no pure black, transparent SVG over the dark page.
      Chrome: title in light ink, subtitle and footnote in soft gray — all clearly readable, no dark-on-dark. Region labels remain their category colors and stay legible on the dark surface.
      Data: identical to light render — same six arc colors, same ribbon geometry and Asia=green #009E73. Only the chrome (background + neutral text) flipped; data colors unchanged.
      Legibility verdict: PASS
