review:
  strengths:
  - Correct, fully-realized chord diagram built natively in CairoMakie with hand-constructed
    arc geometry and quadratic Bezier ribbons — no fallback to another library
  - 'Each of the 6 regions gets a distinct Imprint hue in canonical order (Africa
    = brand green #009E73), arc width ∝ total throughput, ribbon width ∝ flow magnitude'
  - Bidirectional flows render as two separate source-tinted chords (out_foot / in_foot
    split), satisfying the spec's directed-flow requirement
  - Largest flows drawn first so thin tail flows stay legible on top — deliberate
    draw-order storytelling
  - 'Theme chrome is correct in both renders: warm off-white #FAF8F1 (light) / warm
    near-black #1A1A17 (dark); region labels and title flip to INK while vivid data
    colors stay identical'
  - Title is exactly 'chord-basic · julia · makie · anyplot.ai'; footnote explains
    the encoding without faking interactivity (AR-08 clean)
  - 'Clean KISS script: deterministic hardcoded data, only used imports (CairoMakie,
    Colors), no functions/classes, idiomatic poly!/text!/DataAspect usage'
  weaknesses:
  - The footnote string in the saved PNGs ('Arc width ∝ total outflow · ribbon width
    ∝ flow magnitude') does not match the current source footnote ('Arc width ∝ total
    flow · each ribbon is one direction, tinted by its source region'), suggesting
    plot_images/ may be one render behind the last fix commit — ensure artifacts are
    re-rendered from current code so footnote text matches.
  - In the dark render the alpha-0.5 ribbons over the near-black surface lose some
    saturation where they cross the centre, making a few thin overlapping ribbons
    slightly muddier than in the light render — consider nudging ribbon alpha up to
    ~0.55-0.6 for the dark theme only.
  - No legend mapping color->region beyond the perimeter arc labels; acceptable for
    a chord diagram but a tiny swatch key would remove any ambiguity for the muted
    central crossings.
  - Footnote fontsize 17 (≈34px effective on the 2400px canvas) is on the small side
    relative to the 24pt region labels — readable but could come up a couple of points
    for mobile down-scaling.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface.
      Chrome: bold dark title "chord-basic · julia · makie · anyplot.ai" centered at top, fully readable. Six region labels (Africa, Asia, Europe, N. America, S. America, Oceania) in bold dark ink placed just outside the ring, each clearly readable. Soft-grey footnote at the bottom explains the encoding. No clipping at any edge.
      Data: a circular chord diagram with six colored perimeter arcs sized by throughput — Africa green (#009E73), Asia lavender, Europe blue, N. America ochre, S. America cyan, Oceania rose. First series is the brand green. Semi-transparent Bezier ribbons connect arcs, tinted by source region, width proportional to flow. Asia (lavender) and Africa (green) dominate; Oceania is the thinnest arc.
      Legibility verdict: PASS — all text dark-on-light and crisp; data colors vivid and distinguishable.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface.
      Chrome: same title and labels now in light ink (#F0EFE8), all clearly readable against the dark background — no dark-on-dark failures. Footnote in soft light grey, readable.
      Data: identical arc colors and layout to the light render (only chrome flipped). Brand green arc still reads well. Alpha-0.5 ribbons sit over the dark surface and appear slightly more muted where they overlap near the centre, but every arc and ribbon remains distinguishable.
      Legibility verdict: PASS — all chrome light-on-dark and readable; data colors match the light render.
