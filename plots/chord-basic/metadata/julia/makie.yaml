review:
  strengths:
  - Builds a true chord diagram from CairoMakie primitives (poly! + quadratic Bezier
    ribbons) without any external graph/chord package — idiomatic and self-contained.
  - 'First region (Africa) is brand green #009E73 and all six regions use canonical
    Imprint palette hues in order; semantic-red slot 5 is correctly skipped since
    regions are abstract categories.'
  - 'Theme tokens are threaded through every chrome element — title, region labels,
    and footnote are fully legible on both #FAF8F1 (light) and #1A1A17 (dark) surfaces
    with data colors identical across themes.'
  - Arc width is proportional to total outflow and ribbon feet are sized per-direction,
    giving an honest, well-encoded flow visualization with a clarifying footnote instead
    of faked interactivity.
  - Clean square 2400x2400 canvas, decorations/spines hidden, alpha-blended ribbons
    (0.6) under solid arc segments separated by background-colored strokes — polished
    and intentional.
  weaknesses:
  - Bidirectional flows are merged into a single ribbon per region pair tinted by
    the dominant direction, rather than rendered as two separate chords as the spec
    note requests — a viewer cannot read i->j vs j->i as distinct arcs (the asymmetric
    feet hint at it but it is subtle).
  - Tinting each ribbon by only the dominant source means the color near the non-dominant
    foot does not match that region, which slightly weakens color-based attribution
    for the smaller direction.
  - The center of the diagram gets visually muddy where many alpha-blended ribbons
    cross (especially the lavender Asia and cyan/blue flows), reducing per-ribbon
    distinguishability in the core.
  - Two inline lambda helpers (on_ring, bezier) are defined — minor deviation from
    the strict KISS no-functions guideline, though they are small and the chord geometry
    justifies them.
  - Random.seed!(42) and using Random are present but the data is fully hardcoded,
    so the seed/import are effectively unused.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white.
      Chrome: bold dark title "chord-basic · julia · makie · anyplot.ai" centered at top, fully readable.
        Six bold dark region labels (Africa, Asia, Europe, N. America, S. America, Oceania) placed
        just outside the ring, anchored by quadrant — all readable, none clipped. Soft-ink footnote
        "Arc width ∝ total outflow · ribbon width ∝ flow magnitude" readable at bottom.
      Data: six colored arc segments — Africa green #009E73, Asia lavender, Europe blue, N. America
        ochre, S. America cyan, Oceania rose. Alpha-blended Bezier ribbons connect regions, width
        proportional to flow. First series is brand green. Imprint palette in canonical order (red slot skipped).
      Legibility verdict: PASS — all text crisp and high-contrast on the warm light surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface — not pure black.
      Chrome: light (#F0EFE8) title and region labels, all clearly readable; no dark-on-dark failures.
        Footnote in soft light ink, readable.
      Data: identical region colors and ribbon geometry to the light render — only chrome flipped.
        Africa green, Asia lavender, Europe blue, N. America ochre, S. America cyan, Oceania rose,
        all matching the light render exactly.
      Legibility verdict: PASS — every label and the title are legible against the near-black background.
