  strengths:
  - Excellent data storytelling with dominant corridor highlighting (opacity + line
    width differentiation) and explicit subtitle callout
  - Thoughtful colorblind-safe palette with explicit green-to-teal replacement for
    deuteranopia
  - Layered arc effect (dim outer ring + solid inner ring) adds visual depth and sophistication
  - Full spec compliance including bidirectional flows, hover tooltips with flow details,
    and correct title format
  - Clean, well-commented code with deterministic data and appropriate complexity
  weaknesses:
  - Bottom ~25% of canvas is empty whitespace — vertical centering or tighter y-axis
    range would improve layout balance
  - Thinnest chords (small flows like Oceania-Africa=2M) are barely distinguishable
    from each other
  - Inline HTML font-size:15px for totals in labels is slightly below the 16pt minimum
    threshold
  image_description: 'The plot displays a chord diagram showing migration flows between
    6 continents (Africa, Asia, Europe, N. America, S. America, Oceania) arranged
    around a circle. Each continent has a layered arc segment — a dimmed outer ring
    and solid inner ring — in distinct colors: Africa (dark blue #306998), Asia (yellow
    #FFD43B), Europe (teal #00B4D8), N. America (crimson #DC143C), S. America (purple
    #9370DB), Oceania (orange #FF8C00). Chords connect continents with width proportional
    to flow magnitude and source-colored fills. The Europe-Asia corridor is visually
    emphasized with higher opacity (0.72 vs 0.45). Labels around the perimeter show
    continent names in bold colored text with total flow in gray (e.g., "Asia 175M").
    A subtitle reads "Europe–Asia corridor dominates at 65M combined flow · Chord
    width proportional to flow magnitude." The title follows the required format.
    A legend on the right lists all 6 continents. Background is off-white (#FAFAFA)
    with white plot area. The bottom ~25% of the canvas has significant empty whitespace.'
