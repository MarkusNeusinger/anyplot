  strengths:
  - Perfect spec compliance with all required features (log colorbar, units, zero-bin
    distinction) implemented correctly
  - Excellent data quality with realistic fatigue engineering context and two-cluster
    rainflow pattern
  - Strong text legibility with all font sizes explicitly set to appropriate values
  - Clean, well-structured code following KISS principles with proper reproducibility
  - Good visual refinement with removed grids, clean backgrounds, and subtle tile
    borders
  weaknesses:
  - Colormap renders as orange-brown instead of the intended viridis palette, reducing
    perceptual uniformity and mid-range differentiation
  - Annotations (Peak concentration and Secondary loading cluster) are coded but not
    clearly visible in the rendered output
  - Mid-range cycle count values show limited color differentiation in the rendered
    palette
  image_description: The plot displays a 20x20 rainflow counting matrix heatmap on
    a 16:9 canvas. The x-axis shows "Mean Stress (MPa)" ranging from -100 to 100,
    and the y-axis shows "Stress Amplitude (MPa)" ranging from 0 to 200. The title
    "heatmap-rainflow · plotnine · pyplots.ai" is bold and centered at the top in
    large font. The heatmap tiles are colored using a sequential orange-brown palette
    (dark chocolate brown for high counts fading to pale cream for low counts), despite
    the code specifying viridis via scale_fill_cmap(cmap_name="viridis"). A colorbar
    legend on the right side is labeled "Cycle Count (log₁₀)" with a gradient ranging
    from 0.0 to 2.5. Zero-count bins appear as white tiles with subtle light gray
    borders, creating clear visual distinction from non-zero tiles. The highest cycle
    concentrations form a characteristic bell shape at low amplitudes (0-50 MPa) near
    zero mean stress. A secondary cluster is faintly visible around amplitude ~60
    MPa and mean ~30 MPa. The background uses a light gray (#fafafa) outer region
    with a white panel interior. Grid lines are fully removed for a clean appearance.
    The code includes two annotation labels ("Peak concentration" and "Secondary loading
    cluster") with connecting white segments, but these are not clearly visible in
    the rendered output. All text elements are explicitly sized and highly readable.
