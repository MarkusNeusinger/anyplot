  strengths:
  - Perfect spec compliance — all required features (log colorbar, units, zero-bin
    distinction) implemented correctly
  - Realistic fatigue engineering data with primary and secondary cycle concentration
    clusters
  - Clean, well-structured code with excellent KISS discipline
  - Thoughtful two-layer geom_tile approach for zero vs. non-zero visual distinction
  weaknesses:
  - Lightest non-zero color values nearly indistinguishable from white zero-count
    bins — needs better low-end contrast
  - No visual storytelling emphasis to guide the viewer to key insights
  - Design is polished but not publication-quality — could benefit from a more perceptually
    uniform colormap
  image_description: The plot displays a 20x20 heatmap of rainflow counting results
    for fatigue analysis. The x-axis shows "Mean Stress (MPa)" ranging from -100 to
    100, and the y-axis shows "Stress Amplitude (MPa)" ranging from 0 to 200. Tiles
    are colored using a sequential orange-brown palette from light cream (low counts)
    to dark brown (high counts), with a colorbar on the right labeled "Cycle Count
    (log₁₀)" ranging from 0.0 to 2.5. Zero-count bins appear as white tiles with light
    gray borders. The highest cycle concentrations appear in the lower-center region
    (low amplitude, near-zero mean), forming a characteristic bell shape. A visible
    secondary cluster appears around amplitude ~60 MPa and mean ~30 MPa. The title
    "heatmap-rainflow · plotnine · pyplots.ai" is bold and centered at the top. The
    background is light gray (#fafafa) with a white panel, and all grid lines are
    removed for a clean appearance.
