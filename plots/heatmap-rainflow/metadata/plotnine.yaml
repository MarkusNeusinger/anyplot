review:
  strengths:
  - Excellent data quality with realistic fatigue analysis context and two-cluster
    rainflow pattern
  - Clean well-structured code following KISS principles with good reproducibility
  - Good text legibility with all font sizes explicitly set to appropriate values
  - Smart use of log10 scale to reveal the full range of cycle counts
  - Good visual refinement with removed grids clean backgrounds and subtle tile borders
  weaknesses:
  - Annotations (Peak concentration and Secondary loading cluster) are coded but NOT
    visible in the rendered plot likely due to unsupported fontstyle parameter
  - scale_fill_gradientn with custom viridis colors renders as plain orange/brown
    instead of intended viridis palette
  - Mid-range color differentiation is weak with many pale orange tones looking similar
  - Legend/colorbar is relatively small
  image_description: The plot displays a 20x20 rainflow counting matrix heatmap. The
    x-axis shows "Mean Stress (MPa)" ranging from -100 to 100, and the y-axis shows
    "Stress Amplitude (MPa)" ranging from 0 to 200. The title reads "heatmap-rainflow
    · plotnine · pyplots.ai" in bold, centered at the top. The color scale appears
    as a single-hue orange/brown sequential scheme (dark brown for high counts, pale
    cream for low counts) despite the code defining a viridis-inspired palette. A
    legend labeled "Cycle Count (log₁₀)" sits on the right side with a small gradient
    strip. The highest cycle counts are concentrated at low amplitudes near zero mean
    stress, forming a dark triangular region in the lower-center. A secondary cluster
    is faintly visible around amplitude ~60 MPa and mean ~30 MPa. Zero-count bins
    appear white, creating a clear boundary. The coded annotations ("Peak concentration"
    and "Secondary loading cluster" with connecting segments) are NOT visible in the
    rendered output. The plot has a clean white panel background with a light gray
    (#fafafa) outer background, no grid lines, and well-spaced tick labels.
