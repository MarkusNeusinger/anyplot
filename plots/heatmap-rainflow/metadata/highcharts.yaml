  image_description: 'The plot displays a 20x20 heatmap of rainflow cycle counts using
    a viridis-inspired color gradient (dark purple through teal/green to bright yellow).
    The y-axis shows "Cycle Amplitude (MPa)" from 10 to 200, the x-axis shows "Cycle
    Mean (MPa)" from -50 to 250. A vertical logarithmic colorbar on the right is labeled
    "Cycle Count" with values from 1 to 6k. The background is light gray (#fafafa),
    and zero-count bins appear as a lighter gray (#f0f0f0) visible mainly in the upper
    corners. The highest cycle counts (bright yellow cells) cluster at low amplitudes
    (10-30 MPa) near a mean of ~100 MPa, showing the expected exponential decay pattern.
    A subtle annotation box near the bottom-right reads "Peak region: low-amplitude
    cycles near 100 MPa mean stress dominate fatigue damage." The title "heatmap-rainflow
    · highcharts · pyplots.ai" appears at the top with a descriptive subtitle. X-axis
    labels are rotated at 315 degrees.'
