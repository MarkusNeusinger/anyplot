review:
  strengths:
  - Excellent data quality with multi-cluster Gaussian mixture modeling realistic
    fatigue loading patterns (primary load + vibration fatigue + sparse high-amplitude
    events)
  - 'Full spec compliance: all required features present, correct axes, units, and
    title format'
  - 'Strong design choices: custom serif typography, warm custom colorscale, intentional
    typographic hierarchy with graduated font colors'
  - Good use of Plotly-specific features (hovertemplate, xgap/ygap, connectgaps, dual
    PNG+HTML output)
  - Clean, well-commented, reproducible code
  weaknesses:
  - Low-count peripheral bins barely distinguishable from zero-count white background
    due to very light starting color (#fff7ec)
  - Custom colorscale is not perceptually uniform (library guide recommends viridis/plasma/cividis
    for sequential data)
  - No data storytelling annotations — the dual-cluster pattern has a clear engineering
    narrative that goes unexplained
  image_description: The plot displays a 20x20 heatmap on a white background with
    a warm cream-to-orange-to-dark-brown sequential colorscale. The title reads "heatmap-rainflow
    · plotly · pyplots.ai" in a serif font (Palatino/Georgia) with a smaller gray
    subtitle "Rainflow cycle counting matrix from a simulated variable-amplitude load
    history." The x-axis is labeled "Cycle Mean Stress (MPa)" ranging from -50 to
    250, and the y-axis is labeled "Cycle Amplitude (MPa)" ranging from approximately
    15 to 195. A colorbar on the right shows "Cycle Count" from ~50 to ~750. Zero-count
    bins appear as white gaps, clearly distinct from the populated bins. The primary
    cluster of high cycle counts (darkest cells, ~750 cycles) is centered around amplitude
    ~60 MPa and mean ~100 MPa. A secondary, weaker cluster is visible at low amplitude
    (~25 MPa) and higher mean (~160 MPa). Sparse faint cells appear at higher amplitudes.
    Thin white gaps separate each cell. The overall layout is square (3600x3600 px)
    with balanced margins.
