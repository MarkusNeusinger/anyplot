review:
  strengths:
  - Correct 2400x2400 square canvas with px_per_unit=2
  - 'Imprint sequential colormap (#009E73 to #4467A3) correctly applied for single-polarity
    continuous data'
  - Log10 color scale with computed decade ticks (1/10/100/1000) is scientifically
    appropriate and elegantly implemented
  - Zero-count bins rendered as PAGE_BG (NaN to background) — seamless empty-bin treatment
    in both themes
  - Full theme-adaptive chrome — all INK/INK_SOFT tokens correctly applied to every
    axis element
  - 'Physically realistic data: exponential amplitude distribution + Gaussian mean
    stress is fatigue-accurate'
  - Contour iso-lines at fatigue-relevant thresholds (100/1000 cycles) and dominant-region
    annotation are conceptually strong additions
  weaknesses:
  - Contour iso-lines use color=INK_SOFT (medium gray) with linewidth=1.5 — insufficient
    contrast against the green-blue heatmap; increase linewidth to 2.5-3.0 and consider
    using white with alpha=0.6 or INK for better visibility
  - Annotation text at fontsize=11 (effective 22px on 2400px canvas) is too small
    — increase to fontsize=14 or 16 for readability at mobile scale (~400px)
  - Both contour lines and annotation appear effectively invisible in the rendered
    output at full scale; verify they are rendering and increase visual weight
