review:
  strengths:
  - 'Correct Imprint sequential colormap (imprint_seq equivalent: #009E73 → #4467A3)
    used for continuous heatmap data — no forbidden viridis/jet colormaps'
  - Full theme adaptation with correct PAGE_BG for both background and nan_color,
    so zero-count bins seamlessly blend into the canvas in both themes
  - Logarithmic colorbar scale with adaptive tick labels (1/10/100/1000) correctly
    reveals the wide cycle-count range without losing low-frequency bins
  - 'Proper axis orientation: amplitude on Y-axis, mean stress on X-axis, matching
    spec requirements exactly'
  - 'Realistic engineering data: exponential amplitude distribution and Gaussian mean
    stress centered at 100 MPa simulate genuine variable-amplitude bridge loading
    with 80,000 cycles and appropriate MPa units'
  - All font sizes explicitly set for every text element (title, axis labels, tick
    labels, colorbar label and ticks), with correct theme-adaptive INK/INK_SOFT colors
    throughout
  - Clean code structure with no functions or classes, Random.seed!(42) for reproducibility,
    and only the three genuinely used imports
  weaknesses:
  - Design sophistication (DE-01) is at a 'well-configured default' level — the plot
    is technically correct but lacks the visual polish of a publication-ready figure.
    Consider adding a descriptive title prefix (e.g., 'Fatigue Cycle Distribution
    · heatmap-rainflow · julia · makie · anyplot.ai') and a subtle text annotation
    highlighting the dominant fatigue region (e.g., the centroid of the high-count
    zone around mean=100 MPa, amplitude=20-60 MPa).
  - Data storytelling (DE-03) is minimal — the log colorbar reveals structure but
    the viewer must hunt for insight. A thin contour overlay at log10(count)=2 (100
    cycles) and log10(count)=3 (1000 cycles) would create visual hierarchy and immediately
    communicate the dominant cycle combinations.
  - Several isolated interior NaN patches (zero-count bins surrounded by high-count
    neighbours) appear as scattered white/black rectangles in the middle of the heatmap,
    creating visual noise. The data generation can be improved by using a 2D Gaussian
    kernel over the matrix to ensure smoother distribution without isolated interior
    zeros, or by increasing n_cycles to ~200,000 so all interior bins get at least
    one count.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "heatmap-rainflow · julia · makie · anyplot.ai" in bold dark ink, clearly readable at ~50-55% of plot width. X-axis label "Mean Stress (MPa)" and Y-axis label "Cycle Amplitude (MPa)" in dark INK, readable. Tick labels in darker INK_SOFT, readable at all positions. Colorbar label "Cycle Count" in INK, tick labels (1, 10, 100, 1000) in INK_SOFT — all clearly readable against the light background.
      Data: 20x20 heatmap with smooth green-to-blue gradient (Imprint sequential cmap: #009E73 → #4467A3). Most of the heatmap interior is teal-green (cycle counts in the 100-1000 range), transitioning to blue at the top-right corner (highest counts, ~1000+). Scattered white NaN patches visible throughout, representing zero-count bins — these blend with the off-white background and are slightly distinct. The overall shape shows a distribution concentrated in the low-to-moderate amplitude range (0-100 MPa) with mean stress centered around 50-150 MPa.
      Legibility verdict: PASS — all text is dark on light, fully readable. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8, clearly readable against the dark background. Axis labels in light INK, tick labels in lighter INK_SOFT — all readable. Colorbar label and tick labels in light colors, fully readable. No dark-on-dark text failures found.
      Data: Colors are identical to the light render — same green-to-blue gradient with the same distribution pattern. The NaN patches that appeared white in light mode now render as the dark background color (#1A1A17), appearing as black rectangular holes in the heatmap — they remain distinguishable against the colorful data cells.
      Legibility verdict: PASS — all text is light on dark, fully readable. No dark-on-dark issues detected.
