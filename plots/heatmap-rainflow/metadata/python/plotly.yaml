review:
  strengths:
  - Physically realistic two-regime rainflow data (exponential amplitude decay + dual
    Gaussian mean clusters) with clear scientific motivation
  - sqrt-transform with matching colorbar tick labels is technically elegant and perceptually
    correct for this data range
  - 'customdata + hovertemplate decoupling: sqrt-transformed z drives color but hover
    shows original cycle counts — excellent plotly idiom'
  - Data-coordinate annotation placement (axref/ayref=x/y) is robust to zoom and keeps
    arrows stable
  - Full theme-adaptive chrome with all tokens applied correctly — both renders pass
    readability check
  weaknesses:
  - 'The bulk of the heatmap (~80% of cells) maps to nearly identical teal shades,
    making it visually hard to distinguish moderate count differences; consider adding
    a mid-stop to imprint_seq (e.g. #009E73 → #2ABCCD → #4467A3) to improve perceptual
    separation across the full count range'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "heatmap-rainflow · python · plotly · anyplot.ai" in dark Palatino serif, clearly readable. Axis labels "Cycle Amplitude (MPa)" and "Cycle Mean Stress (MPa)" in dark text at size 12. Tick labels in INK_SOFT (#4A4A44) at size 10 — all readable. Colorbar labeled "Cycle Count" with ticks 2, 25, 100, 200, 400, 610 — readable.
      Data: imprint_seq colorscale (green #009E73 at low counts → blue #4467A3 at high counts). High-count cluster (blue) in bottom-center of matrix at low amplitude / mean ~100–175 MPa. Bulk of matrix is near-uniform teal-green. Zero-count bins in upper-right corners are transparent. Two annotation boxes with arrows identify primary service loads and tensile-dominated regime.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and axis labels in light cream (#F0EFE8), tick labels in #B8B7B0 — all readable against dark surface. Colorbar panel uses ELEVATED_BG (#242420), distinct from page. Annotation boxes flip to dark fill (#242420) with light text — readable. No dark-on-dark failure anywhere.
      Data: Colors identical to light render — same green-to-blue gradient, same cluster positions, same transparent zero-count bins. Data colors unchanged between themes as required.
      Legibility verdict: PASS
