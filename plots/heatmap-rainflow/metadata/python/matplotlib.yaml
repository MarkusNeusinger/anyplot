review:
  strengths:
  - Correct imprint_seq colormap with LogNorm — ideal pairing for single-polarity
    cycle-count data spanning 3+ decades
  - Masked zero-count bins with set_bad(PAGE_BG) elegantly blends empty cells into
    the page surface
  - Contour overlay with variable linewidths and inline labels adds quantitative reference
    without cluttering the heatmap
  - Two well-placed annotate() arrows guide the viewer to the dominant cycle zone
    and overload cluster
  - 'Full theme-adaptive chrome: all ink tokens (INK, INK_SOFT) correctly applied
    to spines, ticks, labels, annotations, and colorbar'
  - LogFormatterSciNotation with minor_thresholds on colorbar is a sophisticated formatting
    choice
  - No bbox_inches='tight' on savefig — canvas dimensions are exact (3200×1800 landscape)
  - np.random.seed(42) ensures reproducibility; clean flat script with no unnecessary
    abstraction
  weaknesses:
  - 'DE-01 room: The overall composition is strong but could reach 8/8 with one more
    refinement pass — e.g. adding a subtle horizontal reference line at the overload
    cluster amplitude (~75 MPa) or a minor tick density increase on the colorbar'
  - 'DE-02 room: Top/right spines are removed but left/bottom spines are retained;
    for a heatmap with a dense color fill, removing all four spines and relying solely
    on axis ticks would produce a cleaner look (style guide: ''Remove all spines for
    very clean looks (heatmaps, minimal scatter)'')'
  - 'DE-03 room: The contour labels (10, 50, 200, 1000) are readable but provide only
    partial guidance — an explicit annotation or sub-title noting the units (cycles)
    would strengthen the storytelling for viewers unfamiliar with rainflow analysis'
  - 'LM-02 minor gap: LogFormatterSciNotation is used but the minor_thresholds parameter
    is set to (2, 0.5) — the default is (10, 0.5); setting to (2, 0.5) suppresses
    most minor tick labels, which slightly reduces colorbar readability at intermediate
    decades'
