review:
  strengths:
  - 'Perfect spec compliance: 2D heatmap with amplitude on y-axis, mean stress on
    x-axis, imprint_seq colormap with log₁₀ scale, colorbar with physical units, and
    visually distinct zero-count bins.'
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) with fully theme-adaptive chrome
    in both light and dark renders.'
  - Realistic fatigue-analysis data with exponential amplitude decay plus secondary
    vibration cluster at ~60 MPa / +30 MPa mean — physically plausible and clearly
    annotated.
  - 'Distinctive plotnine usage: layered geom_tile approach for zero-count bins, stepped
    colorbar via guide_colorbar(display=''rectangles''), and coord_fixed for enforcing
    square cells.'
  - 'Perfect code quality: np.random.seed(42), clean imports with valid noqa justification,
    KISS flat structure, correct plot-{THEME}.png output.'
  - Amber dashed-rectangle annotation creates a clear focal point for the secondary
    vibration cluster and elevates storytelling beyond a plain data dump.
  weaknesses:
  - Annotation text 'Vibration cluster' is very small (size=3.0mm ≈ 8.5pt) — may not
    be readable at mobile viewport widths (~400 px). Increase to size=3.5 or 4.0 mm.
  - 'DE-01 limited to 5/8: while annotation and stepped colorbar show design thought,
    overall aesthetic impact could be elevated — consider refining typography hierarchy
    and polishing colorbar-to-plot spacing.'
  - 'LM-02 limited to 3/5: the stepped colorbar and layered geom_tile are plotnine-distinctive
    but deeper features (e.g. labeller functions, custom stat transforms, or theme
    element inheritance) could further differentiate from other libraries.'
