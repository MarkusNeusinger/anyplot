review:
  strengths:
  - 'Perfect spec compliance: colorbar, log scale, zero-bin distinction, axis labels
    with MPa units, and data mapping all fully implemented'
  - 'Imprint sequential palette used correctly — #009E73 to #4467A3 gradient is the
    canonical imprint_seq cmap for single-polarity data'
  - 'Theme-adaptive chrome fully correct in both renders: text, backgrounds, legend,
    and borders all flip properly between light and dark'
  - Two-layer tile composition (zero vs nonzero bins with separate data sources per
    geom) leverages plotnine grammar of graphics elegantly
  - Realistic physics-based data with exponential amplitude distribution and secondary
    cluster makes the plot tell a genuine fatigue engineering story
  - Code quality is clean, reproducible (np.random.seed(42)), and idiomatic throughout
    with a documented sys.path workaround
  weaknesses:
  - 'DE-01: Design lacks publication-ready polish — functionally correct but visually
    plain with no visual focal point to distinguish it from a default-configuration
    output'
  - 'DE-03: The secondary cluster at moderate amplitude / positive mean (~60 MPa amplitude,
    +30 MPa mean) is present in the data but not highlighted for the viewer — a subtle
    annotation or labeled rectangle would immediately elevate the storytelling'
  - 'LM-01: DataFrame construction uses row-by-row Python loop (rows.append inside
    nested for loops) instead of idiomatic numpy array flattening from the already-computed
    meshgrid'
  - 'LM-02: No advanced plotnine features used — coord_fixed() (critical for symmetric
    rainflow matrices to enforce square cells) is absent, which is a plotnine-specific
    feature with no direct matplotlib equivalent in this grammar'
