review:
  strengths:
  - Correct 2D heatmap with amplitude on y-axis and mean on x-axis per spec
  - Imprint sequential colormap (green→blue) used correctly for single-polarity continuous
    data
  - LogColorMapper + LogTicker is the right choice for cycle count data spanning 3
    orders of magnitude
  - All font sizes explicitly set with proper bokeh pt sizing — title (50pt), axis
    labels (42pt), tick labels (34pt) all well-proportioned on 2400×2400 canvas
  - 'Full theme-adaptive chrome: background, text, axis colors, colorbar all use theme
    tokens; data colors identical between light and dark renders'
  - Annotations with elevated background boxes guide viewer to dominant loading cluster
    and rare severe events — good data storytelling
  - Subtle cell borders (line_alpha=0.2) add visual hierarchy at transition zones
    without distracting from data
  - Spines and grid explicitly removed for clean heatmap aesthetic
  - Zero-count bins show as background (nan_color=PAGE_BG) matching spec requirement
  - HoverTool provides interactive tooltips in HTML output; construct_color_bar()
    idiomatic bokeh pattern
  - CDP setDeviceMetricsOverride ensures reliable 2400×2400 screenshot with PIL fallback
    pin
  weaknesses:
  - 'Rare severe events annotation is mispositioned: label is placed at mean=150 MPa,
    amplitude=193 MPa but the actual rare cluster center is at amplitude=150 MPa,
    mean=100 MPa — the ↓ arrow does not clearly point to the cluster'
  - Dominant loading cluster annotation is at mean=100, amplitude=25 MPa while the
    actual cluster center is mean=80, amplitude=40 MPa — slightly off but the ↑ arrow
    still approximately indicates the correct region
  - 'DE-01 and DE-03 have room to grow: annotation placement precision and minor additional
    polish (e.g. colorbar border subtlety) would push aesthetic sophistication higher'
