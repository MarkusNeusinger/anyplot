    frame. For a clean heatmap aesthetic the conventional choice is to remove all
    four spines (set p.xaxis.axis_line_color = None, p.yaxis.axis_line_color = None)
    so the data tiles float on the background surface'
  - 'DE-03: ''Rare severe events →'' annotation placed at (x=-60, y=185) points right
    (→) but the sparse high-amplitude bins extend across all mean values, not specifically
    to the right — reposition to the top-right of the plot area or change arrow direction
    to ''↓'' to indicate the region above the dominant cluster where rare cycles appear'
  - 'DE-01: No intentional visual hierarchy within the heatmap itself — consider adding
    a thin white/muted cell border (line_color=INK_SOFT with alpha=0.2) to the rect()
    glyph to help distinguish adjacent cells at the transition zones, improving readability
    of individual bins'
