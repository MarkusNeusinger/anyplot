      Data: Green (#009E73) at low cycle-count end of IMPRINT_SEQ colormap, transitioning through teal to blue (#4467A3) at high counts. Triangular distribution shape (high amplitude = few cycles; low amplitude + mean ≈ 100 MPa = many cycles). Amber glow halo (#DDCC77, opacity 0.7) around the absolute peak cell near amplitude 5 MPa / mean 100 MPa. Three pill annotations at bottom showing 9,629 / 9,817 / 8,790 — crowded but readable.
