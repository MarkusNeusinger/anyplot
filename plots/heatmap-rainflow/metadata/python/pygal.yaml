review:
  strengths:
  - Custom RainflowHeatmap class extending pygal's Graph base — the only correct approach
    for a chart type not natively supported by pygal, demonstrating deep library knowledge
  - Amber glow halo (#DDCC77) on the absolute peak cell creates a strong, tasteful
    focal point that guides the viewer immediately to the most damage-relevant zone
  - Smooth 120-segment gradient colorbar with log-scale ticks (0, 1, 10, 100, 1000)
    accurately represents the wide cycle-count range and is visually polished
  - Full theme-adaptive chrome throughout — PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED
    all correctly token-driven for both light and dark renders
  - 'Imprint sequential colormap (brand green #009E73 → blue #4467A3) correctly applied
    as a continuous cmap, never the forbidden viridis/hot'
  - Interactive HTML export via pygal's native SVG/JS rendering — leverages the library's
    most distinctive feature
  - 'Elevated panel background (#FFFDF6 / #242420) with subtle border frames the heatmap
    grid tastefully without competing with the data'
  - Zero-count bins rendered in PAGE_BG (visually distinct from the elevated panel
    fill) satisfies the spec requirement cleanly
  weaknesses:
  - The three top-peak annotation pills (9,629 / 9,817 / 8,790) all land in adjacent
    cells at the bottom-left of the active zone. The row-stagger logic partially helps
    but the pills remain visually congested — numbers are readable but the cluster
    is noisy and slightly detracts from the amber-glow focal point
  - 'VQ-02 dock: pill crowding constitutes minimal overlap at the bottom of the heatmap;
    consider reducing annotations to top-1 or top-2, or replacing pill labels with
    a separate legend entry listing peak cells'
  - 'CQ-01 note: the RainflowHeatmap class is architecturally necessary for pygal,
    but it moves the code away from the ideal KISS linear structure (Imports → Data
    → Plot → Save)'
