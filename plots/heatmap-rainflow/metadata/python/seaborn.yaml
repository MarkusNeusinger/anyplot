review:
  strengths:
  - Perfect spec compliance — all required features (colorbar, log scale, physical
    units, zero-count masking, y-axis inversion) correctly implemented
  - Imprint sequential colormap used correctly for continuous data, with fully theme-adaptive
    chrome throughout both renders (warm backgrounds, INK/INK_SOFT tokens on all text
    and grid elements)
  - Realistic, neutral fatigue engineering data with physically accurate distribution
    (exponential amplitude decay, Gaussian mean peak in mean stress)
  - Seaborn mask= parameter elegantly handles zero-count bins by showing the page
    background as fill — idiomatic seaborn usage
  - Annotation with callout box and directional arrow provides a data storytelling
    focal point identifying the peak cycle count region
  weaknesses:
  - Dense lower-half region (low amplitude, high cycle count) appears visually monotone
    — LogNorm compresses a similar-magnitude count range into near-identical blue,
    making individual cell count differences invisible. Consider increasing data variation
    in the low-amplitude bins or annotating key count values directly on cells.
  - The annotation arrow points to the peak cell inside the uniform-blue dense region,
    but that cell is visually indistinguishable from its neighbors. Add a thin Rectangle
    border patch around the peak cell to create a clear focal point.
  - Tick labels at 8pt with every-other-bin labeling is at minimum size for mobile
    readability on the 2400x2400 canvas. Consider raising to 9pt for better legibility
    when scaled to 400px width.
