review:
  strengths:
  - 'Perfect spec compliance: colorbar, physical units (MPa), zero-bin handling, and
    sequential colormap all correctly implemented'
  - Contour overlay at 25% of peak is a genuine engineering insight — highlights the
    dominant fatigue cycle zone without crowding the visualization
  - Correct imprint_seq gradient (green→blue) with sqrt transform well-suited to cycle
    count data that spans multiple orders of magnitude
  - 'Fully theme-adaptive chrome: all INK/INK_SOFT tokens correctly wired through
    axis labels, tick labels, title, legend, and NA tiles'
  - Realistic structural steel fatigue scenario with physically plausible amplitude/mean
    ranges and a concentrated hot-spot distribution
  weaknesses:
  - NA threshold count <= 2L is too aggressive — bins with 1–2 actual cycles are masked,
    creating scattered white/black holes throughout the outer region rather than a
    smooth boundary; lower to count == 0L so all non-zero bins are colored
  - Contour line lacks any label or annotation explaining what the threshold represents;
    a small geom_text label (e.g., '25% of peak') near the contour would improve data
    storytelling without cluttering the plot
  - Legend box (ELEVATED_BG fill + borderless) is functional but slightly detached
    from the color scale — a minimal adjustments like reducing legend padding or omitting
    the background entirely would increase visual refinement
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "heatmap-rainflow · r · ggplot2 · anyplot.ai" centered in dark #1A1A17 ink at 12pt, clearly readable. Axis labels "Mean Stress (MPa)" (x) and "Stress Amplitude (MPa)" (y) in dark ink at 10pt, readable. Tick labels in #4A4A44 (INK_SOFT) at 8pt, readable.
      Data: Heatmap tiles using imprint_seq gradient (green #009E73 low → blue #4467A3 high) with sqrt transform. Hot spot (highest cycle count ~2500) at low amplitude (5–15 MPa) near 60 MPa mean, displayed in blue. Outer tiles appear in green (low counts). NA bins (count ≤ 2) displayed as PAGE_BG cream — scattered white patches visible in the outer high-amplitude/extreme-mean region, creating a slightly patchy boundary. A subtle gray contour line (INK_SOFT, alpha=0.7) outlines the 25% of peak threshold zone. Colorbar on right with "Cycle Count" label, comma-formatted values from ~500 to ~2500.
      Legibility verdict: PASS — all text elements readable; data visible; contour subtle but clear.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title in #F0EFE8 (INK light on dark), axis labels and tick labels in #B8B7B0 (INK_SOFT dark). All text clearly readable against the dark background. No dark-on-dark failures observed.
      Data: Imprint data colors identical to light render — same green #009E73 to blue #4467A3 gradient, same hot spot location and distribution. NA bins now display as dark (#1A1A17), creating dark holes in place of light holes from the light render. Contour is rendered in B8B7B0 (INK_SOFT dark) and remains visible. Legend background uses #242420 (ELEVATED_BG dark).
      Legibility verdict: PASS — all chrome adapts correctly; no dark-on-dark text; data colors identical to light render as required.
