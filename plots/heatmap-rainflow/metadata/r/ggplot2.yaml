review:
  strengths:
  - 'Perfect Visual Quality (30/30): all font sizes explicitly set, clean theme adaptation,
    no legibility issues in either render'
  - Correct imprint_seq colormap (green→blue) with sqrt transform — well-suited for
    the data value range
  - Zero-count masking via NA + na.value = PAGE_BG is clean and spec-compliant
  - 'All spec requirements met: correct axes, physical units, colorbar, title format'
  - Excellent code quality and idiomatic ggplot2 usage throughout
  weaknesses:
  - 'Data storytelling is weak: synthetic data fills almost all bins uniformly, hiding
    the rainflow matrix key insight. Tighten the distribution — use exp(-amp_mpa/15)
    and Gaussian sigma ~25 MPa — to produce a concentrated high-cycle cluster with
    visible zero-count regions at the edges'
  - 'Visual polish is at library-default level: remove or open the panel border (drop
    top/right sides); soften the legend box (no border or very faint INK_SOFT color);
    optionally add a geom_contour() overlay in INK_SOFT at a meaningful count threshold
    to guide the viewer to dominant cycles'
  - No visual emphasis on the dominant cycle combination zone — the key engineering
    insight of a rainflow matrix
