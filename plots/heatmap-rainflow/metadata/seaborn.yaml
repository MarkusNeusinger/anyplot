review:
  strengths:
  - Perfect spec compliance with all required features implemented (log scale, colorbar,
    units, zero-count distinction, bin labels)
  - Excellent data quality with realistic fatigue analysis context and physically
    plausible stress values for steel
  - Good use of seaborn mask parameter for zero-count bins — a genuinely distinctive
    library feature
  - Clean, well-structured code with reproducible seed and no unnecessary complexity
  weaknesses:
  - Tick label font sizes at 14pt fall below the recommended 16pt for the target canvas
    resolution
  - Design lacks a distinctive focal point or visual emphasis — the natural data gradient
    tells a story but nothing is actively highlighted
  - The y-axis has low amplitudes at top (matrix convention) rather than increasing
    upward; inverting could improve readability for engineers
  image_description: The plot displays a 20x20 rainflow counting matrix heatmap using
    the "inferno" colormap. The x-axis is labeled "Mean Stress (MPa)" with values
    ranging from approximately -42 to 228 MPa (every other bin labeled). The y-axis
    is labeled "Stress Amplitude (MPa)" with values from 10 at the top to 185 at the
    bottom. The title reads "heatmap-rainflow · seaborn · pyplots.ai" in medium weight.
    A colorbar on the right shows "Cycle Count (log scale)" spanning from ~1 (dark
    purple/black) to ~10^3+ (bright yellow). The upper portion (low amplitudes) is
    dominated by yellow/orange cells indicating thousands of cycles, with a smooth
    gradient transitioning to deeper orange at mid-amplitudes. The lower portion (high
    amplitudes >=146 MPa) is sparse, with many zero-count bins shown as light gray
    background and scattered red/orange cells representing rare high-stress cycles.
    Thin light gray gridlines separate cells. All four spines are removed for a clean
    appearance.
