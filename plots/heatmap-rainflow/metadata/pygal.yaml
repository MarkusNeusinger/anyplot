review:
  strengths:
  - Excellent data generation with physically realistic wind turbine blade root fatigue
    scenario, including dual loading clusters and physically-constrained cutoff boundaries
  - 'Full spec compliance: all required features present including log-scale colorbar,
    units, zero-count distinction, and correct axis mapping'
  - Custom warm sequential colormap is domain-appropriate and visually effective
  - Clever use of pygal Graph subclass pattern to implement a chart type not natively
    supported, with working HTML/SVG export
  weaknesses:
  - Hard-coded pixel margins (520, 300, 60, 400) make layout fragile and non-adaptive
  - sys.path manipulation hack for pygal import resolution is inelegant
  - Dummy series hack (chart.add empty series) to trigger rendering is a workaround
  - Warm colormap (yellow to red) is less colorblind-accessible than perceptually
    uniform alternatives
  - No visual emphasis on peak cycle-count regions to guide the viewer
  image_description: 'The plot shows a 20x20 rainflow counting matrix heatmap with
    the title "heatmap-rainflow · pygal · pyplots.ai" at the top center. The x-axis
    is labeled "Mean Stress (MPa)" with rotated 45-degree tick labels ranging from
    -42 to 242 (showing every other value). The y-axis is labeled "Stress Amplitude
    (MPa)" with tick labels from 5 to 195 (every other value). A vertical colorbar
    on the right is titled "Cycle Count" with log-scale tick marks at 0, 1, 10, 100,
    and 1000. The colormap is a sequential warm palette progressing from white (zero
    counts) through light yellow, peach/orange, to deep red/dark red for the highest
    counts. The heatmap cells form a dome-shaped pattern: the bottom rows (low amplitude)
    are densely populated with dark red cells concentrated around mean stress 50-100
    MPa, while high-amplitude rows show progressively fewer and lighter-colored cells.
    Peripheral cells with physically impossible stress combinations are white with
    subtle gray borders. The overall layout is clean with white background and well-separated
    cells.'
