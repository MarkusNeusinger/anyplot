  image_description: The plot shows a 20×20 rainflow counting matrix heatmap with
    the title "heatmap-rainflow · pygal · pyplots.ai" centered at the top. The x-axis
    is labeled "Mean Stress (MPa)" with 45°-rotated tick labels at every other bin
    center, ranging from -42 to 242. The y-axis is labeled "Stress Amplitude (MPa)"
    with horizontal tick labels at every other bin, from 5 to 195. A vertical colorbar
    on the right is titled "Cycle Count" with logarithmic tick marks at 0, 1, 10,
    100, and 1000. The colormap is viridis — progressing from dark purple (low counts)
    through teal and green to bright yellow (highest counts). Zero-count cells are
    white with subtle gray borders, forming the outline of a dome/triangle shape.
    The highest counts (bright yellow/green, ~6000–9600 cycles) concentrate in the
    bottom two rows at low amplitudes (5–15 MPa) centered around mean stresses of
    50–130 MPa. Peak cells in the bottom rows are annotated with their count values
    (e.g., 9629, 9017, 8790, 6846, 6644). A secondary cluster is visible around mean=55
    MPa. The overall layout is clean with white background, well-spaced cells with
    tiny gaps, and balanced margins.
