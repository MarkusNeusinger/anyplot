  strengths:
  - Classic Sudoku puzzle with warm-toned monochrome palette that adapts correctly
    to both themes
  - Excellent thick/thin line hierarchy (3px vs 0.6px) clearly delineating 3×3 boxes
    from individual cells
  - Clever 3-level cell encoding (empty-even-box / empty-odd-box / clue) using a ListedColormap
