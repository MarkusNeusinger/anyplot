review:
  strengths:
  - Three-level line weight hierarchy (cell=2px, box=10px, border=16px) creates clear
    visual structure and professional sudoku layout
  - Alternating checkerboard 3×3 box fills using elevated background token add subtle
    visual grouping that reinforces puzzle structure
  - Theme adaptation is thorough — background, border color, cell lines, and elevated
    fills all switch correctly between light (#FAF8F1) and dark (#1A1A17)
  - All font sizes explicitly set and proportional; numbers are large, bold, and clearly
    readable in both themes
  - Canvas gate passed; 2400×2400 square format is the right choice for a symmetric
    9×9 grid
  - 'Correct output format: saves plot-{THEME}.png and plot-{THEME}.html'
  - Code is clean, flat, and deterministic (hardcoded puzzle data, no random seeds
    needed)
  weaknesses:
  - 'Spec deviation: specification explicitly requires ''Monochrome design suitable
    for printing'' and ''clean black-and-white design'', but numbers are rendered
    in brand green (#009E73). Numbers should use the dark ink token (INK = #1A1A17
    light / #F0EFE8 dark) to match the monochrome spec requirement.'
  - 'Library Mastery gap: pygal''s chart rendering engine is entirely bypassed — the
    Bar chart is created but its plot groups are immediately cleared, and the Sudoku
    grid is drawn manually with raw xml.etree.ElementTree SVG calls. This is not idiomatic
    pygal usage. The render_tree() approach is creative but means none of pygal''s
    distinctive visualization features (data series rendering, interactive chart modes,
    built-in label/value display) are demonstrated.'
  - 'Design Excellence room: The visual design is good but can be pushed to publication-ready
    level. Consider adding subtle cell number vertical centering adjustment using
    dominant-baseline SVG attribute for more precise typographic alignment.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
