      Data: 9×9 Sudoku grid with alternating checkerboard 3×3 box fills (elevated #FFFDF6 vs base #FAF8F1). Three-level line weight hierarchy: thin 2px cell lines in INK_SOFT (#4A4A44), medium 10px box dividers in INK (#1A1A17), heavy 16px outer border in INK (#1A1A17). Numbers rendered in brand green (#009E73), bold, large (~130px), centered in cells. Empty cells blank.
      Legibility verdict: PASS — all text including title and grid numbers is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title in light ink (#F0EFE8), clearly readable against dark background. No dark-on-dark issues detected.
      Data: Same grid structure with alternating box fills (elevated #242420 vs base #1A1A17). Cell lines now render as light-toned strokes against the dark surface. Outer border in light INK (#F0EFE8). Numbers are identical brand green (#009E73) as in light render — data colors unchanged between themes, only chrome flipped.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures. Brand green numbers remain clearly visible on dark background.
