review:
  strengths:
  - Clean theme-adaptive implementation — light and dark renders both look correct
    and readable with no dark-on-dark or light-on-light failures
  - Three-level line hierarchy (outer border size=2.5, box dividers size=1.5, thin
    cell lines size=0.4 with alpha=0.35) clearly distinguishes visual levels
  - 'Perfect spec compliance: bold/thick 3×3 box boundaries, thin cell lines, centered
    bold numbers, blank empty cells, monochrome design'
  - 'Excellent code quality: KISS top-level script, hardcoded deterministic data,
    clean imports, correct plot-{THEME}.png output'
  - Smart use of coord_fixed with slight padding (xlim=(-0.05,9.05)) to ensure outer
    border is not clipped at canvas edges
  weaknesses:
  - Alternating 3×3 box backgrounds (PAGE_BG vs ELEVATED_BG) differ by only a tiny
    shade — the checkerboard distinction is very subtle in light mode and nearly invisible
    in dark mode; a slightly greater contrast between the two box shades would improve
    box-region legibility for solvers
  - DE-03 is constrained by the spec nature — a functional puzzle grid leaves little
    room for data storytelling or visual emphasis beyond the line-weight hierarchy
