review:
  strengths:
  - Perfect spec compliance — all five required features (thick 3x3 borders, thin
    cell dividers, centered numbers, blank empty cells, monochrome design) correctly
    implemented.
  - Theme adaptation is textbook correct — INK and INK_SOFT tokens used for grid lines,
    text, and borders; PAGE_BG for cell fills; both light and dark renders look polished.
  - layer_tooltips() intelligently exposes row, col, box, and status metadata — makes
    the HTML export genuinely interactive without faking anything.
  - Correct 2400x2400 square canvas via ggsize(600,600) + scale=4; coord_fixed(ratio=1)
    ensures the grid stays perfectly square.
  - Clean, minimal code with no unnecessary abstractions; fully deterministic data.
  weaknesses:
  - ELEVATED_BG token is defined but never used in the plot — minor dead code (could
    be removed or used for 3x3 box cell differentiation as a design enhancement).
  - Design Excellence is constrained by the functional nature of the spec; no alternating
    3x3 box shading or other visual refinements that could elevate the aesthetic beyond
    a basic grid.
