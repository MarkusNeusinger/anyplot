review:
  strengths:
  - 'Perfect theme adaptation: INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens are threaded
    correctly — dark render has fully legible light text on near-black background
    with no dark-on-dark issues'
  - 'Correct thick/thin line hierarchy: box boundaries at positions 0,3,6,9 use linewidth=3.5
    and thin cell dividers use linewidth=1.0 — grid reads clearly at a glance'
  - Elevated background for given cells (ELEVATED_BG vs PAGE_BG) is a thoughtful UX
    touch that distinguishes clues from empty cells in both themes
  - DataAspect() ensures perfect 1:1 square cell proportions — no distorted grid
  - Deterministic puzzle data (hardcoded), no seed needed; code is linear and highly
    readable
  - linesegments! used efficiently for grid drawing — avoids N² individual line calls
    by grouping all thin and all thick segments
  weaknesses:
  - 'DE-01/DE-02: Design is clean but minimal — the elevated cell background is the
    only design refinement beyond basic grid drawing; consider adding a subtle drop
    shadow or slightly more prominent clue cell styling to lift aesthetic polish'
  - 'LM-02: Primitive usage (poly!, linesegments!, text!) is correct but basic — no
    Makie-distinctive feature such as recipes, observables, or custom Makie plot types
    that would showcase Makie''s unique capabilities'
