  - 'Correct square canvas orientation with proper //# anyplot-orientation: square
    directive'
  - Strong thick/thin line hierarchy (3.5px box boundaries, 0.75px cell lines) using
    theme-adaptive tokens
  - Intentional serif font (Georgia) fits the traditional printed-puzzle aesthetic
  - Alternating 3x3 box elevation fills using t.elevatedBg add visual structure without
    visual noise
