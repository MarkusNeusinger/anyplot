review:
  strengths:
  - 'Perfect theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders have
    correct warm backgrounds, readable chrome with properly flipped text colors, and
    identical brand-green (#009E73) data numbers'
  - Correct visual hierarchy between thick box-boundary lines (stroke-width 2.5, ink
    color) and thin cell-divider lines (stroke-width 0.75, inkSoft) — immediately
    communicates the 3×3 box structure to the solver
  - Deliberate serif typography (Georgia/Times New Roman) gives a classic print-puzzle
    aesthetic clearly above typical D3 defaults; responsive cell font-size (52% of
    cellSize) keeps numbers proportional at any canvas size
  - 'Fully spec-compliant: all 9×9 cells rendered, empty cells shown as blank, correct
    title format ''sudoku-basic · javascript · d3 · anyplot.ai'', responsive square
    layout via anyplot-orientation pragma'
  weaknesses:
  - 'Library Mastery gap: grid lines are drawn with a plain JavaScript for-loop (for
    let i = 0; i <= 9; i++) and numbers are placed with grid.forEach — neither uses
    D3''s core data-join pattern (selectAll/data/join). D3''s defining paradigm is
    data-driven DOM binding; without it the implementation reads as plain SVG manipulation
    with D3 convenience methods. Fix: convert grid lines to g.selectAll(''line.col'').data(d3.range(10)).join(''line'')
    and numbers to g.selectAll(''text'').data(cells).join(''text'') where cells =
    grid.flatMap((row, ri) => row.map((v, ci) => ({v, ri, ci}))).filter(d => d.v !==
    0)'
  - 'Design Excellence ceiling: the outer grid border could be bolder (3–4 px) to
    frame the puzzle more prominently; the 3×3 box regions could use a very subtle
    background fill (e.g., t.elevatedBg at low opacity) to visually distinguish them
    from cell divisions — both are small touches that push the aesthetic from ''clean''
    to ''polished publication-quality'''
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct pageBg token.
      Chrome: Title "sudoku-basic · javascript · d3 · anyplot.ai" in dark ink, approximately 60% of canvas width, clearly readable. No axis labels (appropriate for sudoku grid).
      Data: 9×9 grid with thick dark lines (t.ink) separating 3×3 boxes and thin softer lines (t.inkSoft) dividing individual cells. Given numbers rendered in brand green (#009E73) using bold Georgia serif font, centered in cells. Empty cells shown as blank. Numbers are large, prominent, and clearly readable against the cream background.
      Legibility verdict: PASS — all text readable, no overlaps, correct proportions.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct pageBg token for dark theme.
      Chrome: Title appears in light ink (#F0EFE8) — clearly readable against near-black background. No dark-on-dark issues detected.
      Data: Grid lines appear as lighter strokes (t.ink = #F0EFE8 for thick box lines, t.inkSoft = #B8B7B0 for thin cell lines) against the near-black background. Numbers remain #009E73 (brand green) — identical to light render, data colors correctly unchanged between themes. Green is distinctly visible on near-black background.
      Legibility verdict: PASS — all text readable in dark theme, no dark-on-dark failures.
