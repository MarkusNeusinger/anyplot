review:
  strengths:
  - 'Perfect spec compliance: thick box-boundary lines, thin cell lines, bold centered
    numbers, blank empty cells, monochrome design — all required features present'
  - 'Excellent theme adaptation: dark render uses t.elevatedBg for cell fill and t.ink
    for text/borders, producing a clean near-black grid with fully readable cream-colored
    numbers'
  - 'Correct ECharts idioms: animation:false, no explicit width/height in echarts.init(),
    transparent backgroundColor, ANYPLOT_TOKENS consumed correctly'
  - Smart use of ECharts graphic component with z-layering (z:1-5) to correctly stack
    background, thin lines, thick lines, outer border, and numbers without conflicts
  - Outer border (4px) slightly heavier than box-boundary lines (3px) which are heavier
    than thin cell lines (1px) — three-level visual hierarchy correctly implemented
  - 'Font sizing is data-adaptive: NUM_FONT = Math.round(CELL * 0.50) ensures numbers
    scale proportionally to grid size regardless of canvas dimensions'
  weaknesses:
  - 'Light-mode cell background is pure #FFFFFF rather than the warm off-white #FAF8F1;
    while defensible for a printable Sudoku (white cells are conventional), the style
    guide explicitly prohibits pure white — consider using #FEFCF5 or #FFFDF6 (elevated
    bg) instead of #FFFFFF'
  - 'DE-01/DE-02: Design is functional and appropriate but lacks optional polish opportunities
    — e.g., subtle drop shadow on the outer grid border or slight tonal variation
    for the 3×3 box fill to visually reinforce box regions'
  - 'LM-02: Only the ECharts graphic component is used; no ECharts-specific features
    like tooltip, visualMap, or rich text labels are showcased beyond what''s strictly
    required'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) outer canvas; cell interiors are pure white (#FFFFFF) — conventional for a printable Sudoku grid.
      Chrome: Title "sudoku-basic · javascript · echarts · anyplot.ai" rendered in dark ink at the top-center; fully readable.
      Grid structure: 9×9 grid is centered on the canvas with 75px (CSS) side margins and 90px top for the title. Outer border (4px dark ink), box-boundary lines at cols/rows 3 and 6 (3px dark ink), individual cell lines (1px semi-transparent). Three-level line-weight hierarchy clearly visible.
      Data: 23 given clues (non-zero cells) rendered as bold dark numbers, large (~58px CSS = ~116 native px), centered horizontally and vertically in each cell. Empty cells show as blank. Numbers are crisp and unambiguous.
      Legibility verdict: PASS — all text (title and puzzle numbers) is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) outer canvas; cell interiors use t.elevatedBg (#242420) — slightly elevated so the grid boundary is visible against the outer background.
      Chrome: Title rendered in t.ink (#F0EFE8, cream-white) — fully readable against near-black. Grid borders and box-boundary lines are the same t.ink cream color; thin lines use a lighter opacity variant. All structural lines visible.
      Data: Same 23 clues in bold cream/off-white (#F0EFE8) on the dark cell background (#242420). Adequate contrast; no dark-on-dark issue. Data colors are identical in character to the light render — monochrome ink style, only the specific hex flips with the theme.
      Legibility verdict: PASS — title and all puzzle numbers are clearly readable against the dark background. No dark-on-dark failure observed.
