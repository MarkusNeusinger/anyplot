review:
  strengths:
  - Custom Chart.js plugin using beforeDraw/afterDraw hooks is idiomatic and elegant
    — proper use of chart.ctx and chartArea coordinates
  - 'Perfect spec compliance: thick box boundaries, thin cell lines, numbers centered,
    empty cells blank'
  - Alternating 3×3 box region tints (pageBg vs elevatedBg) add subtle visual depth
    and aid navigation
  - Theme adaptation is correct throughout — t.ink for borders/title, t.pageBg for
    background, t.palette[0] for clue numbers
  - Square canvas orientation is the right choice for a symmetric 9×9 grid
  - Hard-coded classic Wikipedia puzzle ensures reproducibility
  - 'Zero chart chrome: all axes, ticks, and legend hidden — the grid is the entire
    composition'
  weaknesses:
  - Title font size (24px CSS) is slightly conservative for a 2400×2400 canvas — consider
    bumping to 26–28px for better visual weight at full resolution
  - Green (#009E73) clue numbers deviate from the spec's 'monochrome design suitable
    for printing' intent, though this is acceptable per anyplot palette rules and
    actually improves visual hierarchy
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white
      Chrome: Title "sudoku-basic · javascript · chartjs · anyplot.ai" appears in dark text above the grid, readable. No axis labels or tick marks (axes intentionally hidden).
      Data: 9×9 Sudoku grid with thick dark borders demarcating the nine 3×3 boxes and thin gray cell-divider lines. Alternating box regions have a slightly lighter tint (elevatedBg vs pageBg). Clue numbers (5, 3, 7, 6, 1, 9, 5, 9, 8, 6, 8, 6, 3, 4, 8, 3, 1, 7, 2, 6, 6, 2, 8, 4, 1, 9, 5, 8, 7, 9) are rendered in bold brand green (#009E73), centered in their cells. Empty cells are blank. Grid fills the canvas cleanly with generous margins on all sides.
      Legibility verdict: PASS — title and all numbers are clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black
      Chrome: Title is rendered in light off-white text (t.ink = #F0EFE8 in dark theme), clearly readable against the dark background. Thick box borders are #F0EFE8 (near-white), creating high contrast against the dark cells. Thin cell dividers use #B8B7B0 (inkSoft), subtle but visible. Alternating box tints use #242420 (elevatedBg) vs #1A1A17 (pageBg), preserving the checker pattern.
      Data: Clue numbers are identical green (#009E73) as in the light render — data colors are unchanged, only chrome flips. The green numbers read clearly against both box shading tones in dark.
      Legibility verdict: PASS — no dark-on-dark failures; title, borders, and numbers all clearly legible in the dark render. Brand green #009E73 remains highly visible.
