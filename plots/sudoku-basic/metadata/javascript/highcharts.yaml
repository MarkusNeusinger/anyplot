review:
  strengths:
  - 'Perfect visual quality in both themes: warm backgrounds (#FAF8F1 light / #1A1A17
    dark), theme-adaptive chrome, no dark-on-dark failures in dark render.'
  - Full spec compliance — thick lines at 3×3 box boundaries, thin cell lines, numbers
    centered, empty cells blank, monochrome design all correctly implemented.
  - 'Clean flat code structure: data constants → plotLines construction → single Highcharts.chart()
    call; fully deterministic hard-coded puzzle.'
  - 'Creative idiomatic workaround for core-bundle constraint (no heatmap module):
    scatter with marker.enabled=false + dataLabels for numbers, plotLines for grid
    structure.'
  - 'Correct square orientation with //# anyplot-orientation: square directive; animation:
    false in both chart and series; credits disabled.'
  weaknesses:
  - 'DE-03/DE-01: Missing alternating 3×3 box background fills. Standard sudoku designs
    tint every other box with elevatedBg token (#FFFDF6 light / #242420 dark) in a
    checkerboard pattern. Add via chart.renderer.rect() calls using chart.plotLeft/plotTop/plotWidth/plotHeight
    to compute 9 box positions. Apply to 5 ''shaded'' boxes ([row,col]: [0,0],[0,2],[1,1],[2,0],[2,2]).
    This fixes DE-03 and pushes DE-01 above 5.'
  - 'DE-02: Margin asymmetry (margin: [80, 60, 40, 60]) leaves 40px at bottom vs 80px
    at top. Change to margin: [80, 60, 60, 60] for balanced whitespace.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "sudoku-basic · javascript · highcharts · anyplot.ai" in 22px semi-bold dark text, clearly visible. No axis labels or tick labels (correctly disabled for this chart type).
      Data: 9×9 sudoku grid with thick bold outer border and thick box-boundary lines at columns/rows 3 and 6. Thin lines for individual cell dividers. Numbers displayed in 28px bold dark ink (#1A1A17), centered in cells. Empty cells show no text. No categorical palette colors used (monochrome design per spec).
      Legibility verdict: PASS — all elements clearly readable

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title in light/off-white text (#F0EFE8), clearly visible. Grid lines (outer border, box boundaries, cell dividers) all render in light colors against the dark surface. No dark-on-dark failure anywhere.
      Data: Same numbers in same positions, displayed in bold white/light text. Colors identical to light render (monochrome — t.ink token flips between themes). Grid structure clearly distinguishable.
      Legibility verdict: PASS — all elements clearly readable, no dark-on-dark issues
