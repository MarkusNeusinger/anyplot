review:
  strengths:
  - Opacity and line-width gradient (0.55→1.0 opacity, 1.5→3.0px width) is a purposeful
    and effective design encoding that emphasizes recent cohorts without hiding older
    ones
  - 'Perfect spec compliance: all required features (start at 100%, cohort sizes in
    legend, 0–100% Y-axis, X-grid disabled, 20% reference line) are implemented'
  - End-of-line data labels with a custom last-point formatter cleanly avoid cluttering
    all 13 points
  - Deterministic hardcoded data with realistic Q1 2025 SaaS retention story
  - Theme adaptation is correctly implemented throughout (transparent background,
    t.ink/t.inkSoft/t.grid tokens throughout)
  weaknesses:
  - 'End data labels (13%, 15%, 21%, 27%) are stacked very tightly at week 12 with
    minimal vertical separation; 13% and 15% nearly touch. Consider adding y offset
    to the lowest labels or using dataLabels.allowOverlap: false with increased point
    padding.'
  - 'The dataLabels style does not set color explicitly, so Highcharts inherits the
    series color. Combined with series-level opacity (Jan at 55%), the 13% label in
    the dark render becomes the dimmest text element on the chart. Adding style: {
    color: t.inkSoft } to the dataLabels style would decouple label readability from
    series opacity.'
  - The series opacity also dims the end labels in the dark render — the Jan 2025
    13% label at 55% opacity green on near-black background is readable but noticeably
    faint.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme background visible through transparent chart
      Chrome: Title "line-retention-cohort · javascript · highcharts · anyplot.ai" at 22px dark ink, clearly readable. Axis title "Weeks Since Signup" (X) and "Retention Rate (%)" (Y) at 16px in inkSoft tone, readable. Y-axis tick labels (0%, 20%, 40%, 60%, 80%, 100%) at 14px, readable. X-axis tick labels (0–12) at 14px, readable.
      Data: Four spline curves — Jan 2025 (#009E73 brand green, 55% opacity), Feb 2025 (lavender, 70% opacity), Mar 2025 (blue, 85% opacity), Apr 2025 (ochre/amber, 100% opacity). All starting at 100% at week 0, declining to 13%, 15%, 21%, 27% at week 12. Dashed reference line at 20% with "20% target" label on left side. End-of-line data labels stacked at right (tightly spaced, readable). Legend at bottom with cohort names and sizes.
      Legibility verdict: PASS (minor crowding of bottom data labels 13% and 15% but both readable)

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct dark theme background
      Chrome: Title, axis titles, tick labels all rendered in light text (t.ink / t.inkSoft tokens) and clearly readable against the dark background. No dark-on-dark failures detected. Grid lines are faint but visible.
      Data: Colors are identical to light render — brand green, lavender, blue, ochre in same positions. Opacity gradient preserved. The Jan 2025 "13%" end label is the faintest element (55% opacity green text, no explicit color override from inkSoft) but remains readable. No pure-black background (correct warm near-black).
      Legibility verdict: PASS (13% end label slightly faint due to series opacity propagation, but readable)
