    in matte red #AE3030 which is the Imprint semantic anchor for bad/loss/error —
    this sends a misleading signal to viewers; consider using the optional opacity/width
    hierarchy instead so all 5 cohorts stay in canonical order but the oldest fades
    back'
  - 'DE-02 visual refinement: MUI X default axis border lines (left and bottom) are
    visible without customisation; consider setting axisHighlight or slotProps to
    reduce axis line prominence, and lower the grid opacity further for a more polished
    look'
