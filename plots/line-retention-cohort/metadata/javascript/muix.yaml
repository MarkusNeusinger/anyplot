review:
  strengths:
  - All 5 cohort curves correctly start at 100% and show realistic exponential decay
    toward distinct long-term retention floors
  - Visual hierarchy via progressive line width (1.5→2.75) and opacity (0.45→1.0)
    elegantly emphasises the newest cohort without cluttering
  - Deterministic LCG (seed 42) with buildCurve provides realistic jitter and reproducible
    data — correct approach for browser-runtime MUI X
  - ChartsReferenceLine at 20% adds a meaningful benchmark anchor per spec requirement
  - Legend correctly includes cohort sizes (n = X,XXX format), right-positioned with
    ample chart margin
  - Grid lines subtle at 0.22 opacity with dashed strokes; axis lines and ticks disabled
    for clean minimalist look
  - Both light (#FAF8F1) and dark (#1A1A17) themes render cleanly — all text readable
    in both themes via ThemeProvider chrome
  - monotoneX curve interpolation produces smooth, professional retention curves
  - Community-only @mui/x-charts usage throughout — no Pro/Premium imports
  weaknesses:
  - 'Palette slot 5 (#AE3030, matte red) is used as the 5th cohort colour by ordinal
    position. The style guide explicitly states: ''Slot 5 is the deferred semantic-red
    anchor — reached intentionally for bad/loss/error roles, not by ordinal position
    in every chart.'' May 2025 is the highest-performing cohort, so red is semantically
    misleading. Fix: skip index 4 and assign t.palette[5] (#2ABCCD cyan) to the 5th
    cohort instead.'
  - Legend text font size is not explicitly set in slotProps; the ThemeProvider default
    may render legend labels slightly small on the final 3200×1800 PNG. Consider adding
    itemMarkHeight or labelStyle to slotProps.legend to ensure ~14px legend text.
  - Title is rendered via a custom Typography element outside the LineChart rather
    than using a MUI X chart slot — this is fine but means the title is not natively
    part of the chart's SVG, which can cause subtle sizing drift on non-standard mounts.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface
      Chrome: Title "line-retention-cohort · javascript · muix · anyplot.ai" centred at top in dark ink, clearly readable. X-axis label "Weeks since signup" and Y-axis label "Retained users (%)" both readable in inkSoft. Tick labels for weeks 0–11 and retention 0–100 are legible.
      Data: 5 cohort lines starting at 100% and decaying to floors between ~17–30%. Jan 2025 (index 0) correctly uses brand green (#009E73). Feb–Apr use lavender, blue, ochre (positions 2–4). May 2025 uses matte red #AE3030 (palette position 5). Older cohorts progressively faded (0.45→1.0 opacity gradient). Dashed reference line at 20% labelled "20% retention target" at right end. Right-side legend shows all 5 cohorts with sizes.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface
      Chrome: Title and axis labels render in light ink (cream/off-white) against the dark background — all clearly readable. Tick labels are light-coloured and fully legible. Grid lines visible but subtle.
      Data: All 5 cohort line colours are identical to the light render — green, lavender, blue, ochre, matte red. The opacity gradient is preserved. Reference dashed line and label "20% retention target" are readable. Legend text is light-coloured and readable on dark background.
      Legibility verdict: PASS — no dark-on-dark failures; brand green (#009E73) is clearly visible on dark surface; all chrome correctly flipped via ThemeProvider
