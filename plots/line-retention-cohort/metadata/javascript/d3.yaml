review:
  strengths:
  - Visual hierarchy through progressive opacity (1.0 → 0.6) and stroke-width (3.5
    → 1.7) elegantly ranks cohort prominence
  - Direct inline end-of-line labels complement the legend and reduce back-and-forth
    eye movement
  - 20% dashed reference line with annotation adds genuine interpretive value
  - Fully deterministic data using mathematical decay model with realistic plateaus
    and improving trend across cohorts
  - Oldest-first render order ensures newest cohort (brand green) paints on top —
    correct and intentional
  - Domain lines and tick marks cleanly removed; gridlines at meaningful breakpoints
    only
  weaknesses:
  - Inline end-of-line labels at 11px CSS are tight — "Feb '25" and "Jan '25" are
    ~17px apart for 11px-tall text; increase to 12–13px and/or add vertical offset
    to bottom labels
  - Circle markers at r=3 CSS are functional but on the small side — r=4 would improve
    prominence
  - d3.selectAll(null) per-series loop is slightly dated — grouping each series into
    a <g> element per cohort is more idiomatic modern D3
  - DE-01/DE-03 could reach higher with a brief descriptive subtitle below the main
    title to frame the story explicitly
