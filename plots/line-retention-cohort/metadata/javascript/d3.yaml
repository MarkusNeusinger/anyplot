review:
  strengths:
  - All spec requirements implemented with zero omissions — 100% start, legend with
    n= values, 0–100% Y-axis, gridlines, decreasing opacity/thickness encoding for
    cohort age, 20% reference line with label.
  - 'Correct Imprint palette application: brand green (#009E73) as the newest/most
    prominent cohort; canonical order for remaining cohorts. Full theme adaptation
    using window.ANYPLOT_TOKENS throughout.'
  - Fully deterministic data using exponential decay model with realistic plateaus
    (10–22%) showing genuine improving retention trend across cohorts.
  - Smooth monotone curves (d3.curveMonotoneX) and deliberate layer-ordering (oldest
    rendered first so newest sits on top) show thoughtful D3-idiomatic design.
  - Complete theme adaptation — all chrome (text, grid, axis lines) uses token values,
    producing a correctly legible dark render with no dark-on-dark failures.
  weaknesses:
  - No explicit Y-axis domain-line removal or tick-mark suppression. Calling .select('.domain').remove()
    and .selectAll('.tick line').remove() on both axis groups would lift visual polish
    toward a cleaner D3 chart aesthetic.
  - For 5-series line charts, the style guide recommends redundant encoding beyond
    color. Consider adding distinct linestyles (dashed/dotted) for older cohorts or
    small circle markers at data-point positions to improve series differentiation
    for colorblind viewers.
  - 'LM-02 is low: no advanced D3-distinctive features. Adding inline end-of-line
    text labels for each cohort at week 12 (positioned using D3 text elements at the
    terminal data point) would be both a distinctive D3 technique and a design improvement.'
  - The regular gridline at 20% and the dashed reference line at 20% overlap, creating
    minor visual redundancy. Consider drawing gridlines only at [40, 60, 80, 100]
    and letting the dashed reference line stand alone at 20%.
