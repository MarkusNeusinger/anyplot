  weaknesses:
  - Jan 2025 cohort (alpha=0.55, line_width=2.5, dashed green) is very faint in both
    renders — especially in the dark render it nearly disappears; consider raising
    floor alpha to 0.65 and minimum line_width to 3.0 to keep all cohorts traceable
  - May 2025 cohort is rendered in matte red (#AE3030, Imprint slot 5), which is the
    semantic anchor for bad/loss/error roles — in this retention chart the most-recent
    cohort is the best performer, so using red for it could confuse readers expecting
    red=bad; consider swapping to a non-red canonical order or adding a note clarifying
    the canonical ordering
  - Legend at label_text_font_size='34pt' produces a large legend block in the upper-right;
    glyph_height/width of 36 is slightly small relative to the 34pt label text — consider
    raising glyph sizes to 48–52 to match the label height better
