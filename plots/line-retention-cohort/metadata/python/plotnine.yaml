      Data: Five cohort lines using Imprint palette in canonical order: Jan 2025 = #009E73 (green, thinnest/most faded), Feb 2025 = #C475FD (lavender), Mar 2025 = #4467A3 (blue), Apr 2025 = #BD8233 (ochre), May 2025 = #AE3030 (red, boldest/full opacity). All start at 100% at week 0, decay to week 12 endpoints (17%, 19%, 34%, 40%, 57%). Green ribbon between Jan and May curves visible at low alpha. Endpoint percentage labels on right margin.
      Legibility verdict: PASS — all text readable, no light-on-light failures.

