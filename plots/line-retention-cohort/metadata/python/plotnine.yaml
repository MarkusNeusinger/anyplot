review:
  strengths:
  - 'Progressive visual encoding: older cohorts rendered with lower alpha (0.6→1.0)
    and thinner lines (1.0→2.0), clearly emphasising the most recent cohort.'
  - Ribbon between oldest and newest cohort (geom_ribbon) elegantly highlights the
    retention improvement gap with minimal visual noise.
  - 20% threshold reference line with italic annotation provides meaningful business
    context inline.
  - Endpoint labels at week 12 for each cohort allow quick reading of final retention
    values; stagger logic prevents overlap for the two closest lines.
  - Legend correctly includes cohort size (n=X,XXX) per spec, using override_aes to
    show clean line swatches.
  - Theme-adaptive chrome correctly flips between light (#FAF8F1) and dark (#1A1A17)
    backgrounds with appropriate text/grid color tokens in both renders.
  - Imprint palette used in correct canonical order (green→lavender→blue→ochre→red)
    for all five cohorts.
  - 'Idiomatic plotnine: scale_alpha_identity() + scale_size_identity() pattern avoids
    redundant scale legends; inherit_aes=False on geom_ribbon is correct.'
  weaknesses:
  - 'DE-01 / DE-02: Refinement is good but not at publication-ready level — top/right
    spines are removed via theme_minimal but explicit element_blank() calls for spines
    would make intent clearer; the ribbon fill is quite faint (alpha=0.08) and could
    be slightly stronger (0.12) to read better on dark background.'
  - 'VQ-01 minor: The ''Improvement\ngap'' callout box label (size=3.0mm ≈ 8.5pt)
    and ''20% threshold'' annotation (size=2.5mm ≈ 7pt) are the smallest text elements;
    consider bumping to 3.2mm and 2.8mm respectively for better mobile readability.'
  - 'VQ-02 minor: The two lowest endpoint labels at week 12 (''19%'' and ''17%'')
    sit very close to the 20% threshold dashed line; the stagger offsets (±3.0 units)
    help but the combined cluster is still slightly crowded in the lower right area.'
  - 'LM-02: The guide_legend(override_aes) customisation is plotnine-idiomatic but
    is a generic ggplot2 pattern; no plotnine-exclusive feature (e.g. facet_wrap,
    stat_smooth, coord_flip) is leveraged.'
