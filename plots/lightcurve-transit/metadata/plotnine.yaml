review:
  strengths:
  - Clean, scientifically accurate transit light curve with realistic limb-darkened
    model
  - 'Strong visual hierarchy: red model line as focal point, blue data as context,
    transparent error bars receding'
  - Good theme refinement with removed grids, subtle y-grid, and clean minimal styling
  - Proper grammar-of-graphics layering with separate data frames for observations
    and model
  weaknesses:
  - No legend distinguishing observed data points from the fitted transit model curve
  - Data point markers slightly too small (size=1.5) for this density at 4800x2700
  - Transit model code is duplicated for data and fine-resolution model arrays
  - Could leverage more distinctive plotnine features (geom_ribbon, annotate, scale_color_manual)
  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a clean white background. Blue scatter points (#306998) with semi-transparent
    light blue vertical error bars (#92b4cc) show 400 photometric observations distributed
    across orbital phase 0.0-1.0. A bold red model curve (#e8453c) overlays the data,
    showing a flat baseline at ~1.000 relative flux with a characteristic U-shaped
    dip centered at phase 0.5, reaching down to ~0.988 (approximately 1.2% transit
    depth) with smooth ingress/egress shaped by quadratic limb darkening. The X-axis
    is labeled "Orbital Phase" (0.00 to 1.00), Y-axis is labeled "Relative Flux" with
    values formatted to 3 decimal places. Title reads "lightcurve-transit · plotnine
    · pyplots.ai" in bold. Minimal theme with subtle y-axis grid lines only.
