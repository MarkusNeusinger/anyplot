  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a white background. Blue scatter dots (#306998) represent observed flux measurements
    spanning orbital phase 0.0–1.0 on the x-axis, with relative flux on the y-axis
    ranging from approximately 0.9830 to 1.0120. Light blue vertical error bars (low
    alpha ~0.25) extend from each data point showing measurement uncertainty. A red
    (#d4513d) smooth transit model curve is overlaid, showing a characteristic ~1%
    dip centered at phase 0.5 with smooth ingress/egress shoulders indicating limb
    darkening. The title reads "lightcurve-transit · highcharts · pyplots.ai" with
    a subtitle "Phase-folded exoplanet transit with quadratic limb darkening model".
    A vertical legend in the upper right lists "Observed Flux", "Measurement Error",
    and "Transit Model". Dotted horizontal grid lines appear on the y-axis. The layout
    fills the canvas well with balanced margins.
