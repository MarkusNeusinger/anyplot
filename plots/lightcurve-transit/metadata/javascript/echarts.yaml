      Legibility verdict: PASS — all major text readable; annotation text at fontSize=11 is a minor concern for mobile.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17 style) — NOT pure black; warm-dark surface visible.
      Chrome: Title, axis labels, and tick labels all render in light-colored text (t.ink / t.inkSoft) against the dark background — no dark-on-dark failure observed. The legend box uses t.elevatedBg (#242420) and t.grid border, which is correctly adapted for dark mode.
      Data: Green scatter (#009E73) and lavender model line (#C475FD) are IDENTICAL to the light render — only chrome (background, text, grid, legend box fill) flipped. Transit window shading appears as a darker band against the near-black background. Depth annotation visible but small.
      Legibility verdict: PASS — light text on dark background throughout; no dark-on-dark failures detected.
