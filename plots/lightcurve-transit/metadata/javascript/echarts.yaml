  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1 style) — NOT pure white; the off-cream surface is clearly visible.
      Chrome: Title "Astronomical Light Curve · lightcurve-transit · javascript · echarts · anyplot.ai" renders in dark ink at fontSize=18 and is clearly readable. Axis labels ("Orbital Phase", "Relative Flux") and tick labels (0-1 on x-axis, 0.980-1.010 on y-axis) use t.inkSoft and are all fully legible. Small annotation labels "Transit Window" and "depth ≈ 1.2%" use fontSize=11 and are readable at full resolution but will not survive mobile scaling to ~400px.
