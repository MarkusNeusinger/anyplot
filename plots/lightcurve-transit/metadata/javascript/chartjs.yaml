review:
  strengths:
  - Perfect spec compliance — scatter + error bars + smooth transit model overlay
    with all required features (phase folding, ~1% depth, 200-1000 points, quadratic
    limb-darkening)
  - Robust deterministic data generation using a seeded LCG (seed=1337) and Box-Muller
    transform — no Math.random(), fully reproducible
  - 'Idiomatic Chart.js plugin API usage: Chart.register with beforeDraw (canvas background)
    and afterDatasetsDraw (per-point error bars with canvas clipping) — correct way
    to extend Chart.js rendering'
  - 'Realistic TESS-like exoplanet photometry: physically accurate ~1.08% transit
    depth, 0.16-0.28% per-point noise, ingress/egress shape, 320 data points'
  - 'Correct Imprint palette for primary series (t.palette[0] = #009E73) and full
    theme-adaptive chrome via ANYPLOT_TOKENS — both light and dark renders readable
    with correct backgrounds'
  weaknesses:
  - 'VQ-07 (1/2): Second series uses t.palette[2] (#4467A3 blue), skipping t.palette[1]
    (#C475FD lavender) — violates canonical Imprint palette ordinal order. Fix: change
    t.palette[2] to t.palette[1] for the transit model dataset, or document a clear
    semantic reason for the skip'
  - 'DE-03 (2/6): No design emphasis on the transit region — the dip appears naturally
    but there is no visual treatment (no shaded transit window, no horizontal reference
    line at flux=1.0, no ingress/egress markers). Fix: draw a semi-transparent rect
    over the transit window (phase ±0.042) using the plugin''s beforeDatasetsDraw
    hook with t.palette[0] at ~10% opacity'
  - 'DE-01 (4/8): Chart reads as a well-configured default rather than a publication-quality
    design. The model line at 2.5px and scatter at radius 3 could be more visually
    differentiated — e.g. increase model line width to 3.5px, reduce scatter point
    opacity slightly, or add a shaded ±1σ band around the model'
  - 'DE-02 (3/6): Chart.js default box frame (all 4 axis borders visible) not removed
    — style guide prefers L-shaped frame. Fix: add `border: { display: false }` to
    the unused top/right border sides, or at minimum set the border color to match
    pageBg to visually suppress top/right spines'
  - 'VQ-05 (3/4): Right-side canvas margin is tight — ''0.5'' x-axis tick label is
    very close to the right canvas edge. Fix: add options.layout = { padding: { right:
    20, top: 10 } } to prevent clipping risk'
  - 'VQ-01 (7/8): Y-axis tick callback shows 4 decimal places (v.toFixed(4)) which
    is compact at 13px font. Fix: reduce to v.toFixed(3) for 0.980 / 0.990 / 1.000
    display — preserves precision while improving mobile readability'
  - 'CQ-01 (2/3): Three helper functions defined (rand, randn, transitFlux) — necessary
    for JS determinism but departs from the KISS flat-structure ideal. The transitFlux
    function could be inlined or expressed more compactly'
