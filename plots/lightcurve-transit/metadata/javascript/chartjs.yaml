review:
  strengths:
  - Physics-accurate quadratic limb-darkened transit model with 320 phase-folded synthetic
    measurements
  - Custom Chart.js plugin implementing error bars with caps (not natively supported
    by Chart.js) via canvas 2D API
  - Transit window shading and dashed baseline at flux=1.0 create strong visual storytelling
    focal points
  - Deterministic LCG with seed=1337 ensures full reproducibility without Math.random()
  - Mixed scatter+line chart types with correct Imprint palette (green for data, lavender
    for model)
  - Both themes handled correctly via t.pageBg, t.ink, t.inkSoft — no dark-on-dark
    failures
  - Correct axis labels (Orbital Phase, Relative Flux) with explicitly set font sizes
    throughout
  weaknesses:
  - Scatter point radius=3 is slightly on the small side for 320 data points — consider
    radius=4 to improve individual-point visibility in the dense transit region
  - Tick labels at 13px are slightly below the recommended 14px — a minor but addressable
    detail
  - Transit window shading (palette[0] + 1a = 10% opacity) is less prominent in the
    dark render where the teal wash is harder to read against the near-black background
    — consider boosting to 25-30% opacity in dark mode
  - 'KISS concern: three top-level helper functions (rand, randn, transitFlux) plus
    a multi-hook plugin add complexity beyond a flat script — acceptable here but
    worth noting'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, visually confirmed.
      Chrome: Title "lightcurve-transit · javascript · chartjs · anyplot.ai" displayed clearly in dark ink at ~65% canvas width. Y-axis label "Relative Flux" rotated left, X-axis label "Orbital Phase" at bottom — both dark, fully readable. Tick labels in dark-gray (inkSoft) on all axes clearly visible and balanced. Legend top-right shows "Transit model" (lavender circle) and "Photometric data" (green circle) in dark ink — readable.
      Data: 320 green (#009E73) scatter dots with error bars spanning orbital phase -0.5 to 0.5. Transit dip visible around phase 0 dropping to ~0.988 relative flux. Smooth lavender (#C475FD) model curve overlaid. Semi-transparent green shading marks the transit window. Dashed gray baseline at flux=1.0.
      Legibility verdict: PASS — all text readable against light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, visually confirmed.
      Chrome: Title, axis labels, tick labels, and legend all rendered in light cream/gray tones against the dark surface. No dark-on-dark failures observed. Axis labels and title clearly readable.
      Data: Green scatter dots (#009E73) and lavender model curve (#C475FD) are identical in color to the light render — only chrome flipped. Error bars visible in a lighter inkSoft tone. Transit window shading appears as a subtle darker-teal wash (10% opacity green on near-black is less obvious but still detectable). Dashed baseline visible.
      Legibility verdict: PASS — all text readable against dark background. Minor: transit shading is slightly less prominent in dark mode than light mode, but data and model remain fully readable.
