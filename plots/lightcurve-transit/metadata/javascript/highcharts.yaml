review:
  strengths:
  - Custom SVG error bars drawn via Highcharts renderer API (chart.renderer) — genuinely
    distinctive Highcharts usage for per-point uncertainty visualization
  - Deterministic LCG seeded at 42 ensures fully reproducible output in a browserless/headless
    environment where Math.random() cannot be seeded
  - 'Accurate transit physics: simplified Mandel-Agol model with quadratic limb-darkening,
    realistic 1.1% depth and T14=0.085 phase units matching real hot-Jupiter parameters'
  - 'Full spec compliance: scatter observations + spline model overlay + error bars
    + phase-folded axis — all four required features present and working'
  - Proper theme-adaptive chrome via ANYPLOT_TOKENS throughout (t.ink, t.inkSoft,
    t.grid, t.elevatedBg) — both light and dark renders are fully readable with no
    dark-on-dark failures
  - Baseline plotLine at 1.000 with label adds scientific context as a reference line
    for out-of-transit flux
  - 'Title fontsize correctly scaled to 19px for the 77-character title string (formula:
    round(22 × 67/77) = 19)'
  - 'animation: false set on both chart-level and plotOptions.series — no mid-frame
    screenshot risk'
  weaknesses:
  - 'Palette skip: second series uses palette[2] (#4467A3, blue) instead of canonical
    palette[1] (#C475FD, lavender). The category labels ''Observed Flux'' and ''Transit
    Model'' do not carry a universally recognized color expectation that would justify
    skipping the canonical order — fix by using t.palette[1] for the Transit Model
    series'
  - 'Excessive vertical padding: vPad = 0.42 × flux_range pushes the Y-axis down to
    0.970 when the actual data minimum is ~0.983, leaving about 20-25% of the plot
    height as empty whitespace at the bottom — reduce vPad to 0.18-0.22 to keep proportions
    balanced'
  - Helper functions (rand, randn, transitModel) technically violate KISS structure
    criterion. The LCG and transit model computation are justified by the browser
    environment, but consider inlining the model evaluation or at least consolidating
    the RNG helpers to reduce function count
