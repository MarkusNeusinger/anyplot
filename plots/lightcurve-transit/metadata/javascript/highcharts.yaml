      Data: Scatter points in brand green (#009E73 = palette[0]), error bars in same green at opacity 0.45. Spline transit model in blue (#4467A3 = palette[2]). Baseline dashed line in inkSoft. Transit dip clearly visible centered at phase=0, reaching ~0.989 minimum. Data spans roughly 0.983–1.010 but Y-axis extends to 0.970 (excessive lower padding).
