    the 0.994–0.998 region in both renders — increase left margin from 112px to ~135–140px
    to give the rotated label enough clearance from the 5-character tick values
  - Data dots at r=2.8 CSS px are slightly small for 280 scatter observations — increase
    to r=3.5–4.0 for better visibility when the chart is scaled down to mobile (~400px
    wide)
  - Error bar opacity at 0.38 is somewhat too faint on the light theme; consider 0.50–0.55
    so the measurement uncertainty reads more clearly
