review:
  strengths:
  - 'Full spec compliance: phase-folded light curve with error bars, ±1σ confidence
    band, smooth transit model overlay, and ~1% transit depth all correctly implemented'
  - 'Expert D3 idiomatic usage: d3.area() for confidence band, d3.line() for model
    curve, clipPath in <defs>, modern .data().join() binding, .datum() for continuous
    paths — all hallmarks of expert D3 code'
  - Deterministic data generation via LCG (seed=42) satisfies the browser-reproducibility
    requirement with a proper Box-Muller Gaussian for photometric noise
  - 'Strong data storytelling: transit window background highlight, dashed midpoint
    vertical, and tight Y-domain all focus the viewer''s attention on the transit
    event'
  - 'Correct Imprint palette usage — first series (observations) = #009E73, second
    series (model) = #C475FD — with all chrome tokens (t.ink, t.inkSoft, t.grid) properly
    adapted per theme'
  - 'Realistic astronomical data: 450-point phase-folded light curve with limb-darkened
    transit model, per-point observational errors (0.0025–0.0035), and ~1.1% transit
    depth matching Kepler/TESS survey parameters'
  weaknesses:
  - ±1σ confidence band uses constant σ=0.003 across all phases (including the flat
    out-of-transit region), creating a wide lavender band spanning ~23% of the total
    Y-axis height. This makes the band visually dominant in the flat region and somewhat
    misleading — the transit model has no actual uncertainty in the flat region, only
    the measurements do. Consider deriving the shaded region from per-point fluxErr
    values or narrowing it to better reflect photometric precision.
  - Legend has no background box, so out-of-transit data points appear behind the
    legend symbols and text in the upper-right corner. This doesn't fully obstruct
    the legend text, but creates a slightly cluttered appearance. A subtle elevated-background
    rect (t.elevatedBg) behind the legend would improve readability.
  - 'Markers are slightly small (r=2.5 CSS px) for 450 data points: in the flat region,
    individual measurements merge into a smear rather than distinct circles. Increasing
    to r=3.0 with opacity=0.70 would maintain the density while making individual
    points clearer in the transit ingress/egress shoulders.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color, clearly not pure white.
      Chrome: Title "lightcurve-transit · javascript · d3 · anyplot.ai" in dark ink (#1A1A17), readable at 22px. Y-axis label "Relative Flux" and X-axis label "Orbital Phase" in dark ink at 16px, clearly legible. Tick labels in inkSoft at 14px — readable at full resolution; borderline at mobile widths but within D3 guidelines. Axis domain lines in inkSoft; subtle Y-axis grid lines in grid token (rgba 15% opacity). Legend text for "Transit Model (±1σ)" and "Observations" in inkSoft at 14px — readable but positioned without a background box, so scattered data points appear behind it in the upper-right area.
      Data: First series (observations) = #009E73 green circles (r=2.5, opacity=0.80) with green error bars (opacity=0.45, stroke-width=1.3). Second series (transit model line) = #C475FD lavender (stroke-width=2.5) with a ±1σ confidence band in the same lavender (opacity=0.18). Transit window highlighted with a very subtle lavender fill (palette[1], opacity=0.07); dashed lavender vertical at phase=0.5 marks the transit midpoint. The transit dip at phase≈0.5 is clearly visible (flux drops ~1.1% to ~0.989). Tight Y-domain (0.9835–1.009) ensures the transit depth fills the canvas rather than sitting in a narrow bottom strip.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light failures observed.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color, clearly not pure black.
      Chrome: Title uses t.ink (#F0EFE8 in dark mode) — light cream text on dark background, readable. Axis labels and tick labels use t.ink / t.inkSoft (#B8B7B0 in dark mode) — both visible and contrasting well against the dark surface (estimated contrast ratio ~8.8:1 for inkSoft on dark bg). Grid lines use dark-mode grid token (rgba(240,239,232,0.15)) — subtle and appropriate.
      Data: Observations remain #009E73 (identical to light render — data colors do not flip). Transit model line and confidence band remain #C475FD. The lavender confidence band is visually MORE prominent in the dark render (same opacity=0.18, but higher perceptual contrast on dark background), creating a more visually dominant horizontal band in the flat region than in the light render. Transit dip is clearly visible at the same depth. No dark-on-dark failures observed.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark failures. Data colors are identical to light render (only chrome flips as required).
