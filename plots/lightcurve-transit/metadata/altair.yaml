  - Design could be pushed further toward publication quality with more refined polish
  image_description: The plot displays a phase-folded exoplanet transit light curve
    on a clean white background. Teal/dark cyan (#2A6B7C) circular markers represent
    500 observed data points scattered across orbital phase 0.0–1.0 on the x-axis,
    with relative flux on the y-axis ranging from ~0.986 to ~1.005. Light teal vertical
    error bar rules (opacity 0.2) extend from each point. An amber/orange (#D4820E)
    smooth model curve overlays the data, showing a flat baseline at flux ~1.000 with
    a sharp transit dip centered at phase 0.5, reaching down to ~0.990. The transit
    shape shows clear ingress/egress with limb-darkening effects. A styled legend
    in the top-right corner with a white semi-transparent background identifies "Observed
    Data" (teal circle) and "Transit Model" (amber circle). The title reads "Exoplanet
    Transit · lightcurve-transit · altair · pyplots.ai" in bold 28pt with a gray subtitle
    "Phase-folded Kepler photometry with limb-darkened transit model". Grid lines
    are subtle dashed lines at low opacity. View borders are removed.
