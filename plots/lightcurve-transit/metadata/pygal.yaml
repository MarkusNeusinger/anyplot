review:
  strengths:
  - Effective data storytelling with in-transit/out-of-transit color and size differentiation
    creating a clear focal point
  - Realistic astronomical data with appropriate transit parameters and noise levels
  - Clean, well-organized code with creative workaround for pygal lack of native error
    bars
  - Good use of pygal-specific tooltip customization with formatted labels
  - Custom color palette with good colorblind accessibility
  weaknesses:
  - Error bars represented as tiny dots are nearly invisible and do not convey measurement
    precision as the spec requires
  - In-transit classification is too broad, causing baseline-flux points to appear
    as in-transit
  - Some wasted canvas space with generous margins
  image_description: 'The plot displays a phase-folded exoplanet transit lightcurve
    on a light gray (#FAFAFA) background. The title "lightcurve-transit · pygal ·
    pyplots.ai" appears at the top. The X-axis is labeled "Orbital Phase" (0.00–1.00)
    and the Y-axis "Relative Flux" (approximately 0.986–1.010). Four series are shown:
    (1) tiny light gray dots representing ±1σ error bounds, barely visible in the
    background; (2) blue dots for out-of-transit data points scattered around flux
    ~1.0; (3) larger magenta/purple dots for in-transit data, concentrated around
    phase 0.35–0.65; (4) an orange smooth curve showing the transit model with a clear
    Gaussian-like dip centered at phase 0.5, reaching a minimum around 0.990. The
    legend is displayed at the bottom in four columns. Subtle horizontal grid lines
    are visible. The transit dip is the clear visual focal point, with the in-transit
    points being larger and distinctly colored from the out-of-transit baseline scatter.'
