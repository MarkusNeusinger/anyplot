    failures
  weaknesses:
  - Scatter marker size (markersize=7) is slightly small for 400 medium-density points;
    8–9 would give better visibility without overplotting
  - The transit_model named function technically violates KISS — could be replaced
    with an inline expression for flat-script style
  - No additional data storytelling layer (e.g., a flux=1.0 reference line, transit
    depth annotation, or contact-point markers) to push DE-03 higher
  - The lavender model line blends into the light-theme plot area near flux=1.0 against
    the dense scatter; a slightly increased linewidth (e.g., 4.0) would improve separation
