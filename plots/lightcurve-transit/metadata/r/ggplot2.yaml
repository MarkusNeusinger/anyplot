      Data: Identical colors to light render — green (#009E73) scatter, blue (#4467A3) model line. Data colors unchanged across themes as required.
      Legibility verdict: PASS — all text elements readable; grid lines slightly more prominent in dark mode (full INK color at linewidth=0.15) but acceptable given ggplot2's lack of alpha support on grid lines
