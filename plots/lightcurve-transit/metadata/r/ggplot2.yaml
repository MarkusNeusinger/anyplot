review:
  strengths:
  - 'Imprint palette perfectly applied: #009E73 observed data (first series), #4467A3
    transit model (position 3); data colors identical across both renders.'
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all correctly
    branched for light/dark; both renders pass legibility check with no dark-on-dark
    failures.'
  - Ingress/egress contact-region shading (vectorized annotate rect) adds genuine
    scientific context and is excellent ggplot2 idiomatic usage.
  - Y-axis tick labels formatted to 3 decimal places — scientifically appropriate
    for 1% transit depth.
  - guide_legend(override.aes) correctly distinguishes point symbol from line for
    the two series — shows ggplot2 mastery.
  weaknesses:
  - Marker size=1.4 with 600 points is appropriate for density but slightly small;
    size=1.8-2.0 would improve individual point legibility without losing the dense-scatter
    aesthetic.
  - Panel grid uses solid INK tokens at linewidth=0.15 — correct per ggplot2 alpha
    limitation, but a lighter intermediate hex could provide more subtle grid lines.
  - T1-T4 contact point labels (short text annotations at the vertical shaded boundaries)
    are absent — adding them would complete the ingress/egress storytelling and raise
    DE-01 and DE-03.
