review:
  strengths:
  - 'Perfect spec compliance: scatter, error bars, model overlay, and phase-fold all
    implemented correctly'
  - Correct Imprint palette (green observed, blue model) with fully theme-adaptive
    chrome in both renders
  - Density-aware alpha blending (alpha=0.55 points, alpha=0.3 error bars) keeps the
    plot legible at 600 data points
  - guide_legend(override.aes) correctly differentiates point vs. line legend icons
    — idiomatic ggplot2
  - Realistic astronomical scenario (Hot Jupiter, ~350 ppm photometric noise) with
    appropriate scale
  - All code clean, reproducible (seed 42), and uses modern ggplot2 API
  weaknesses:
  - Data point size=0.9 is at the lower limit for 600 points; increase to size=1.3-1.6
    to improve visibility when scaled to mobile (~400px width)
  - Error bars at alpha=0.3 are very faint — increase to alpha=0.45 and linewidth=0.3
    so they remain meaningful at reduced display sizes
  - Minor grid lines (panel.grid.minor) add visual noise without aiding data reading
    for this plot type — remove with panel.grid.minor = element_blank()
  - DE could be elevated by adding a horizontal reference line at flux=1.000 (baseline)
    using geom_hline(yintercept=1, color=INK_SOFT, linetype='dashed', linewidth=0.35,
    alpha=0.7) to anchor the out-of-transit baseline
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "lightcurve-transit · r · ggplot2 · anyplot.ai" in dark ink, left-aligned. Axis titles "Orbital Phase" and "Relative Flux" in dark ink (size 10pt). Tick labels in INK_SOFT (#4A4A44, size 8pt). All chrome elements readable.
      Data: 600 green (#009E73) scatter points at size=0.9, alpha=0.55. Error bars in green at alpha=0.3 (very faint but present). Transit model as blue (#4467A3) line at linewidth=1.0. Transit dip clearly visible at phase ~0.50, reaching flux ~0.990 (~1% depth). Legend inside plot at lower-right: "Observed" (green dot) and "Transit model" (blue line).
