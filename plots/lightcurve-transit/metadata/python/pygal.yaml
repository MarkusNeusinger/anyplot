review:
  strengths:
  - Correct Imprint palette application with canonical color ordering across both
    themes
  - Theme-adaptive chrome works correctly in both light and dark renders — no dark-on-dark
    or light-on-light failures
  - 'Effective visual hierarchy: in-transit points use larger dots (size 8) and Imprint
    position 2, creating a natural focal point at the transit dip'
  - Complete spec coverage including phase-folding, model overlay, and error bound
    representation despite pygal's XY error bar limitation
  - 'Perfect code quality: seed, clean imports, KISS structure, correct output format
    including HTML'
  - Realistic, scientifically-plausible data simulation with Gaussian limb-darkened
    model
  weaknesses:
  - Error bounds represented as paired dot pairs (±1σ endpoint dots) rather than traditional
    error bar lines — pygal's XY mode lacks native error bar support, so this creative
    workaround is valid, but adds 400 extra scatter points that increase visual noise.
    Consider using a narrow 'error band' alternative via area series or reducing dot
    density.
  - Design refinement limited by pygal's SVG renderer — no spine removal, no alpha
    blending on dense scatter, no custom font. The implementation works within these
    constraints but a more sophisticated design is not achievable without library-level
    workarounds.
  - Legend at bottom is slightly cramped with 4 series in a single row — the 4-column
    layout fits but could benefit from 2 columns at wider spacing.
  - Dense out-of-transit scatter (170+ points) would benefit from slight alpha transparency
    to reduce overplotting perception; pygal's opacity control is limited via the
    Style object.
