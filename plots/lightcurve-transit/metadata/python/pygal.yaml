review:
  strengths:
  - 'Correct Imprint palette with semantic color choices: green for out-of-transit
    baseline, lavender for in-transit dip, blue for model curve'
  - Clear visual emphasis on transit dip through larger in-transit markers (dots_size=8
    vs 5 for baseline)
  - 'Perfect theme adaptation in both renders: light (#FAF8F1) and dark (#1A1A17)
    surfaces with fully legible chrome'
  - Scientifically plausible Kepler-style simulated exoplanet transit data with correct
    ~1% depth and limb-darkened Gaussian model
  - Correct canvas dimensions (3200×1800) and idiomatic pygal API usage including
    tooltip labels, HTML export, and legend at bottom
  weaknesses:
  - Error bars not implemented as true vertical bar segments — pygal XY lacks native
    error bar API, so approximated with ±1σ endpoint dots at size=2, which are barely
    visible in the renders and only shown for every 3rd data point; a reader struggles
    to gauge measurement uncertainty from these nearly-invisible specks
  - 'DE limited by pygal constraints: no spine control (all four borders remain visible),
    limited grid styling; the result is functional but lacks the refined L-shaped
    frame and subtle grid that publication-quality scientific plots achieve'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 - correct, no pure white.
      Chrome: Title "lightcurve-transit · python · pygal · anyplot.ai" in dark ink, clearly readable at top. Y-axis label "Relative Flux" rotated vertically, readable. X-axis label "Orbital Phase" at bottom, readable. Tick labels on both axes in dark muted ink, clearly legible (0.00–1.00 on X; 0.986–1.01 on Y). Bottom legend with 2 columns shows all 4 series legibly.
      Data: Out-of-transit points in #009E73 brand green (size=5), in-transit points in #C475FD lavender (size=8, larger for emphasis), transit model in #4467A3 blue smooth line, error cap dots in INK_SOFT dark gray (size=2, barely visible). Transit dip clearly visible at phase ~0.5, ~1% depth.
      Legibility verdict: PASS — all text elements readable; error cap dots nearly invisible due to size=2 but this is a data-density/emphasis issue, not a legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 - correct, no pure black.
      Chrome: Title in light cream text, fully readable. Y-axis and X-axis labels in light ink, readable. Tick labels in light muted tone, readable. Bottom legend readable with light text. No dark-on-dark failures detected.
      Data: Green (#009E73), lavender (#C475FD), and blue (#4467A3) data series colors are identical to the light render — only chrome flipped. Error cap dots slightly lighter gray (INK_SOFT = #B8B7B0 in dark mode).
      Legibility verdict: PASS — all text clearly visible against dark background; brand green #009E73 remains visible.
