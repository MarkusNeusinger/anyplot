  strengths:
  - Two-panel overview+zoom layout is an ideal design for scientific light curve data
    — provides both global context and transit detail in one figure
  - Physically motivated transit simulation with quadratic limb darkening, realistic
    error bars, and correct ~1% depth
  - Differential alpha (0.55 out-of-transit / 0.90 in-transit) creates visual emphasis
    exactly where needed without redundant encoding
  - FancyArrowPatch + patheffects combination for the delta-F annotation is polished
    and robust in both themes
  - 'Perfect spec compliance: all four required features (error bars, model overlay,
    phase-folded data, publication style) present and correctly implemented'
  - Canvas correctly sized to 3200x1800 via figsize=(8,4.5) dpi=400 with no bbox_inches='tight'
    drift
  - 'Full theme adaptation: all chrome tokens properly wired for both light and dark
    renders'
  weaknesses:
  - axvspan transit zone shading in main panel at alpha=0.04 is nearly invisible —
    increase to alpha=0.07-0.08 to improve visual cueing without adding noise
  - elinewidth=0.7 error bars are quite thin for a 3200-px canvas; 0.9-1.0 would improve
    visibility without cluttering at 500-point density
