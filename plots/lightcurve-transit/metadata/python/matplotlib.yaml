review:
  strengths:
  - 'Perfect spec compliance: all required features present (error bars, phase folding,
    model overlay, transit dip orientation, ingress/egress contact markers)'
  - Scientifically appropriate dual-panel layout (full orbit + transit zoom) that
    directly serves the data storytelling
  - Complete and correct theme adaptation — all chrome tokens applied consistently
    to every non-data element in both renders
  - 'Imprint palette correctly applied: brand green (#009E73) for photometry (position
    1), Imprint blue (#4467A3) for model (position 3)'
  - Differential visual treatment of in-transit vs out-of-transit data (size + alpha)
    creates meaningful visual hierarchy
  - FancyArrowPatch transit depth annotation is a sophisticated, library-specific
    technique
  - 'Realistic physical parameters: 1% depth, quadratic limb darkening (u1=0.3, u2=0.1),
    realistic photon noise (800-2000 ppm)'
  weaknesses:
  - 'DE-01 (5/8): Typography hierarchy is functional but lacks weight variation for
    the key scientific result; the delta-F value and contact labels are the same visual
    weight as surrounding annotation text'
  - 'DE-02 (4/6): Tick marks remain on both axes of both panels; removing them would
    add polish; the wspace between panels (0.05) is very tight and the panels feel
    merged'
  - 'VQ-01 (7/8): Annotation labels (t1, t4, delta-F) are at 8pt; bumping to 9pt would
    improve mobile readability'
  - 'VQ-03 (5/6): Out-of-transit error bar width (elinewidth=0.5) is very thin and
    barely distinguishable from axis structure; elinewidth=0.7 would improve visibility'
  - 'LM-02 (3/5): Distinctive matplotlib techniques are solid but limited; ax.xaxis.set_major_formatter
    or patheffects could demonstrate deeper library mastery'
