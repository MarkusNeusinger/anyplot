review:
  strengths:
  - Custom marching-squares algorithm produces accurate isobar contour lines at every
    4 hPa interval — impressive pure-Python geometric computation
  - Filled pressure field using viridis colormap with alpha blending provides clear
    color-encoded geographic context
  - 'Proper meteorological conventions: H/L pressure center markers in Okabe-Ito vermillion
    and blue, isobar value labels in callout boxes at climatologically correct positions'
  - 'Complete spec compliance: contour lines, filled contours, colorbar with hPa units,
    geographic coastlines, and labeled isolines all present'
  - Both themes render correctly with warm off-white (#FAF8F1) / near-black (#1A1A17)
    backgrounds and fully theme-adaptive chrome
  - Realistic North Pacific sea-level pressure data with correct geographic extent
    and meteorologically plausible values (996–1032 hPa)
  weaknesses:
  - Grid/axis lines show a faint teal-cyan tinge in the light render — pygal's default
    axis stroke colour leaks through despite guide_stroke_color being set; the tick
    lines and axis guides should be set to INK_MUTED via foreground_subtle to suppress
    the teal artefact
  - Title font_size=52 is below the recommended 66 for the mandated title length;
    while still readable it is slightly undersized relative to the style-guide target
  - Isobar label and colorbar annotation text (30–32 px SVG units) will be marginal
    at mobile scale (~400 px wide); consider increasing to ≥36–40 px
  - Filled pressure cells render as a slightly blocky mosaic (40×40 grid of rectangles)
    rather than smooth fills — the visual is functional but the banding between cell
    boundaries is visible on close inspection
  - 'Library Mastery is limited: pygal is used mainly as an SVG container and axis
    frame; the core visualization (marching squares, colorbar, annotations) is raw
    SVG injection bypassing most pygal chart API features'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "North Pacific Pressure Isobars · contour-map-geographic · python · pygal · anyplot.ai" in dark ink spans ~75% of width, readable. X-axis label "Longitude (°E)" and Y-axis label "Latitude (°N)" clearly visible in dark ink. Tick labels readable. Grid lines very faint — they show a slight teal/cyan tinge from pygal's default axis stroke leaking through rather than a pure neutral gray, but contrast is acceptable.
      Data: Filled pressure cells use viridis (purple/dark for low ~996 hPa in NW Pacific near Aleutian Low, yellow-green for high ~1028+ hPa in the subtropical North Pacific High). Isobar contour lines (every 4 hPa, with bold major lines every 8 hPa) overlay the fill. Muted coastlines for Japan, Kamchatka, Aleutians, Alaska, and North American west coast. Isobar callout labels (1000, 1004, 1008, 1012, 1016, 1024) in elevated-background boxes at representative positions. Red "H" (vermillion, Okabe-Ito) marks the North Pacific High near 200°E/35°N; blue "L" (Okabe-Ito blue) marks the Aleutian Low near 145°E/45°N and 185°E/53°N. Colorbar on the right edge shows viridis from 996 to 1032 hPa with "hPa" label.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, tick labels all render in light cream/off-white ink, clearly readable against the dark surface. No dark-on-dark failures. Grid lines remain subtle. Colorbar border and labels light-coloured.
      Data: Viridis fill colours are identical to the light render — purple at low pressure, yellow-green at high. Isobar contour lines, coastlines, H/L markers, and callout labels all maintain same colours; only the background and chrome flip to dark theme. The "H" and "L" markers (Okabe-Ito vermillion and blue) remain visible and distinguishable.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures detected.
