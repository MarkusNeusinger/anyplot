  - 'LM-02 missed opportunity: Plotly has powerful native geographic APIs (go.Scattergeo,
    geo layout with coastlines, landcolor, oceancolor, showland, showcoastlines) that
    would correctly implement the basemap requirement; using go.Contour with geographic
    axes only is not idiomatic for this spec type'
