review:
  strengths:
  - Excellent spec compliance — filled contours (contourf) + contour lines (contour)
    + clabel + colorbar all implemented as required
  - Realistic Alpine elevation data with accurate geography (Mont Blanc, Swiss Alps,
    Tyrol at correct coordinates and heights)
  - 'Theme adaptation is correct: backgrounds (#FAF8F1/#1A1A17), all chrome tokens
    (INK, INK_SOFT, INK_MUTED) applied consistently to title, labels, ticks, spines,
    colorbar'
  - Canvas dimensions correct (figsize=(8, 4.5) dpi=400 → 3200×1800 px), no bbox_inches='tight',
    explicit subplots_adjust for fine-tuned margins
  - terrain colormap is spec-compliant for elevation data; extend='max' on contourf
    handles out-of-range values cleanly
  - Country border overlay with dashed lines provides geographic context as required
    by spec
  - Clean, flat script structure with seed(42) for reproducibility; no extraneous
    imports
  weaknesses:
  - Contour label fontsize=7 is on the small side — at 3200×1800 px the labels are
    about 39 source-pixels, readable on desktop but borderline on mobile (~400 px
    scaled); consider increasing to fontsize=8 or 9
  - Design Excellence is modest — no typographic hierarchy beyond default weight,
    no intentional focal point emphasis (e.g., highlighting the highest peaks with
    annotation or distinct marker), no custom visual treatment that elevates above
    a textbook map
  - plt.colorbar() called at pyplot level instead of the axes method — minor idiom
    inconsistency; prefer fig.colorbar(filled, ax=ax, ...) for fully object-oriented
    style
