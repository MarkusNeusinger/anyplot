  weaknesses:
  - 'VQ-07: ''terrain'' colormap is domain-appropriate (spec explicitly calls for
    terrain colors for elevation) but deviates from the style-guide approved list
    (viridis/cividis/BrBG). Consider using viridis or cividis if a style-guide-compliant
    sequential cmap can convey elevation effectively.'
  - 'VQ-01/mobile: Peak annotation text at fontsize=7 is technically explicit but
    will be effectively unreadable when the 3200px image is scaled to ~400px mobile
    width. Increase to fontsize=8 or 9 to improve mobile legibility.'
  - 'VQ-02: Mont Blanc and Matterhorn annotation boxes are very close together (peaks
    only ~0.8° apart in longitude with fixed offset logic). At small render scales
    the boxes may appear to merge. Consider adjusting annotation offsets to stagger
    them more (e.g., place Matterhorn annotation above its marker instead of below-right).'
