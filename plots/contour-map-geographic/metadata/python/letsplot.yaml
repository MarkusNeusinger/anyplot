review:
  strengths:
  - 'Perfect spec compliance: geom_contourf + geom_contour + geom_text labels + colorbar
    + geographic basemap all implemented as required'
  - Theme-adaptive chrome is correctly wired — all chrome tokens (PAGE_BG, INK, INK_SOFT,
    ELEVATED_BG, GRID_MAJOR, GRID_MINOR) adapt per theme, and contour color and label
    color flip appropriately
  - Domain-appropriate terrain colormap (green→tan→white) matches the spec's explicit
    instruction to use terrain colors for elevation data
  - Geographic aspect ratio correction via coord_fixed(ratio=1/cos(radians(40))) prevents
    latitude/longitude distortion — shows geographic awareness
  - Reproducible synthetic Western US elevation data with realistic peak locations
    (Tetons, Sierra Nevada, Wasatch, Rockies)
  - Coastline in Okabe-Ito blue (#0072B2) is theme-independent and visually distinct
    in both renders
  - Contour label collision-avoidance algorithm places labels with minimum separation
    to reduce clutter
  - 'Canvas size and save parameters correct: ggsize(800, 450) + ggsave(scale=4) =
    3200×1800 px'
  weaknesses:
  - geom_livemap() — lets_plot's signature interactive geographic layer — is unused;
    the coastline and borders are hand-drawn with simplified polylines instead of
    real geodata, which is the primary missed library-mastery opportunity
  - Contour labels sized at size=9 (effective 36px at scale=4) are legible at full
    resolution but may be borderline small on mobile-scaled thumbnails (~400px); consider
    increasing to size=10 or 11
  - 'DE design is functional but not polished: theme_bw() is used only as a base and
    immediately overridden by a custom theme — could apply theme_minimal() or a more
    refined base, and removing the heavy black panel border would improve visual clarity
    since geographic maps conventionally use a lighter frame'
  - Label placement restriction (lon < -108.5) positions the '2000m' label close to
    the right panel interior border; in letsplot geom_text clips at panel boundaries,
    and tighter placement logic or a right-side buffer of 4+ degrees would prevent
    any risk of clipping
  - State border segments are very simplified (4 straight line segments for several
    state boundaries) — while acceptable for synthetic data, more segments or actual
    simplified shapefiles would improve geographic realism
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "contour-map-geographic · python · letsplot · anyplot.ai" renders in dark ink at top, fully readable. Axis labels "Longitude (°W)" and "Latitude (°N)" in dark ink, clearly readable. Tick labels (-120 to -106, 35 to 45) in INK_SOFT, legible. Colorbar on right labeled "Elevation (m)" with values 1,000–6,000 in dark text, all readable.
      Data: Filled contours use terrain gradient (dark green low → tan/gold mid → near-white high). Contour lines as thin dark-gray isolines overlay the fills. Eight contour labels ("1500m"–"5000m") placed across the plot in bold dark ink, readable. Pacific coastline in Okabe-Ito blue (#0072B2) runs diagonally along the left/lower-left. Dashed gray state borders visible.
      Legibility verdict: PASS — all text readable against light background. "2000m" label near right panel interior is tight but fully visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels render in #F0EFE8 (light ink), clearly readable against dark background. Tick labels in #B8B7B0 (INK_SOFT for dark), readable. Colorbar text in light colors, readable. No dark-on-dark failures observed — all chrome elements successfully flip to light colors.
      Data: Terrain gradient colors (green→tan→white) are visually identical to light render — only chrome flips. Contour lines are lighter (#CCCCCC) for dark theme, maintaining visibility. Contour labels render in #F0EFE8, clearly readable. Coastline in #0072B2 remains visible on dark background. Dashed borders visible.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures.
