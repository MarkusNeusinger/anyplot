  weaknesses:
  - 'Contour labeling is sparse: only the first path of 1000m and 3000m levels receive
    labels, so 2000m is unlabeled and 500m/1500m/2500m levels have no text at all
    — add labels at every 1000m interval and at least the first 2-3 paths per level'
  - Colorbar tick labels use 36px (smaller than the 44px style-guide standard for
    legend/tick text) — increase to 44px
  - 'No filled-contour option: spec notes ''Support both line-only contours and optional
    filled contours between levels'' — consider adding a semi-transparent filled band
    between contour pairs using a mappolygon series'
  - Design storytelling could be strengthened — e.g. annotate the highest peak area
    with a callout label or bold the 3000m contour more prominently to draw the viewer's
    eye to the key insight
