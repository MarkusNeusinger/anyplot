review:
  strengths:
  - 'Full spec compliance: filled raster + labeled isobar lines + geographic coastlines
    + colorbar all present'
  - Realistic meteorological scenario (Azores High, Icelandic Low, Baltic High) with
    factually correct pressure values (990–1031 hPa) and appropriate 4 hPa isobar
    intervals
  - BrBG diverging colormap is an excellent data-appropriate choice for pressure —
    brown/teal immediately signals high/low pressure
  - Clever use of contourpy for path computation, keeping the implementation pure-plotnine
    with geom_path instead of falling back to matplotlib contourf
  - 'Theme-adaptive chrome fully implemented: INK/INK_SOFT/PAGE_BG tokens propagate
    through title, axis labels, ticks, legend, and geom_label fills — both renders
    pass legibility check'
  - geom_label with background fill (fill=PAGE_BG) makes isobar value labels readable
    over the raster in both themes
  - Clean flat script structure, np.random.seed(42) ensures determinism, all imports
    used
  weaknesses:
  - Isobar contour lines (geom_path size=0.4, alpha=0.65) are notably thin and semi-transparent
    — at mobile scale they become hard to distinguish from the raster background;
    increase size to 0.6–0.8 and alpha to 0.80–0.85 for better element visibility
  - Contour label font size=6 in geom_label is at the lower readable threshold; increase
    to size=7–8 for better mobile legibility
  - 'Design Excellence headroom: no spines removed (panel_border retained is correct
    for a map, but top/right could still be lightened), and geographic outlines are
    simplified hardcoded approximations that look rough in places — coastline fidelity
    limits aesthetic sophistication'
  - 'DE-02: Grid opacity (alpha=0.10 on panel_grid_major) is already quite subtle
    — no grid-styling issues, but panel_grid_minor is element_blank while minor ticks
    could add geographic precision context'
