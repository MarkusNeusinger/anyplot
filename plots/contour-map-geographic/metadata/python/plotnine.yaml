review:
  strengths:
  - Realistic meteorological domain data with scientifically accurate pressure systems
    (Azores High, Icelandic Low, Baltic High) — values, spatial placement, and magnitudes
    are all plausible
  - Theme-adaptive chrome correctly applied throughout — backgrounds, text, axis,
    grid, outlines, and legend all flip correctly between warm off-white (#FAF8F1)
    and near-black (#1A1A17)
  - Clever hardcoded geographic coastlines (British Isles, Scandinavia, Iceland, European
    coast) avoid the geopandas dependency while providing meaningful spatial context
  - Well-layered multi-geom composition (geom_raster + geom_path isobars + geom_path
    outlines) produces a professional weather-map appearance using plotnine's grammar
  - Correct 4 hPa contour interval matching the spec's stated example for atmospheric
    pressure data
  weaknesses:
  - Contour lines are not labeled with their pressure values — spec explicitly requires
    'Label contour lines with values at appropriate intervals.' Isobar value labels
    (e.g. '1000', '1008', '1016') are entirely absent; users cannot read isobar values
    without tracing to the colorbar.
  - Colormap RdBu_r deviates from the style guide's mandated diverging colormap BrBG.
    The approved continuous colormaps are viridis/cividis (sequential) and BrBG (diverging);
    RdBu_r is not in the approved list.
  - Uses matplotlib directly (plt.subplots(), _ax.contour(), _ax.allsegs) to extract
    isobar paths, violating the plotnine library rule 'DO NOT use matplotlib as a
    workaround.' Plotnine has native geom_contour / stat_contour that should be used
    instead.
  - Panel border is retained on all four sides (top, right, left, bottom) — style
    guide recommends removing top/right spines by default. For a geographic map a
    full border is defensible, but should at least be evaluated.
  - No annotations identifying the main pressure centers (Azores High ~1031 hPa, Icelandic
    Low ~991 hPa) — adding even minimal callout text would greatly improve data storytelling.
