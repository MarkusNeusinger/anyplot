      Data: RdBu_r colormap raster fill showing pressure gradient — deep blue (low ~993 hPa) in NW Atlantic / Icelandic Low region, transitioning through white (neutral ~1013 hPa) to deep red (high ~1031 hPa) in Azores High and Baltic High region. White isobar lines (alpha=0.65) visible across the raster. Black geographic outlines clearly delineating British Isles, Scandinavia, Iceland, and western European coast. Colorbar on right labeled "Pressure (hPa)" with tick values ~1000–1030.
      Legibility verdict: PASS — all text readable, data clearly visible, no dark-on-dark or light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color, not pure black.
      Chrome: Title in light ink (#F0EFE8) clearly readable on dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0) — all legible against dark background. Grid lines subtle. Panel border visible.
      Data: Identical RdBu_r colormap raster to light render — Okabe-Ito data colors do not apply here (continuous data). Same blue (Icelandic Low), white neutral, red (Azores/Baltic Highs). White isobar lines remain white and visible. Geographic outlines now rendered in light INK (#F0EFE8) against the dark background — correctly theme-adapted and clearly visible. Colorbar present with light text labels.
      Legibility verdict: PASS — all chrome correctly flips to light-on-dark. No dark-on-dark text failures detected. Data colors identical between renders.
