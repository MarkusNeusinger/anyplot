review:
  strengths:
  - Uses ContourPy to generate true, smooth contour paths anchored to geographic coordinates
    — not a simplified approximation
  - Mercator-uniform latitude grid eliminates stripe artifacts in the heatmap — sophisticated
    domain knowledge applied correctly
  - Multi-layer Altair composition (raster heat + country borders + isolines + labels)
    is idiomatic and clean
  - Contour label halos (stroke=PAGE_BG, strokeWidth=2) adapt to theme and ensure
    readability on any background color
  - 'Full theme adaptation: backgrounds, legend box, title, borders all use correct
    theme tokens'
  - Pad-only PIL logic ensures exact 3200x1800 without cropping or clipping
  weaknesses:
  - 'Palette non-compliance: scheme=''redyellowblue'' is domain-conventional for temperature
    but violates the style guide''s recommendation of BrBG for diverging continuous
    data — use scheme=''brownbluegreen'' (Altair''s name for BrBG) or a CVD-safe sequential
    alternative'
  - 'Color accessibility concern: RdYlBu uses red-yellow-blue contrast which is problematic
    for protanopia/deuteranopia CVD viewers — BrBG or cividis would improve accessibility'
  - Only 3 of 7 contour levels are labeled (5°C, 15°C, 25°C); the spec requires labels
    at appropriate intervals — consider labeling more levels (e.g., -5, 5, 15, 25°C
    covering the visible range)
  - configure_axis is absent — add with theme tokens (labelColor=INK_SOFT, titleColor=INK)
    for complete defensive theme-adaptive chrome coverage
