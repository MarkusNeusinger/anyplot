      Data: The temperature raster covers Europe and surroundings using the BrBG (brownbluegreen) diverging colormap with domain [−10, 30]. Cooler/lower-positive temperatures (northern/central Europe ~0–10°C) appear as light near-white or faint teal; warmer southern areas (Mediterranean ~20–25°C) appear as greenish-teal; the southernmost warm areas approach brown. Country borders are drawn as thin gray lines. Seven contour isolines (−5, 0, 5, 10, 15, 20, 25°C) are drawn in dark ink. Only one contour label is visible: "25°C" near the southern edge of the map, shown as dark fill with white halo. Data elements use first series as #009E73 (N/A; continuous colormap applies).
      Legibility verdict: PASS — all chrome text readable; contour label uses adequate stroke halo.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) fills the canvas margins. PASS.
      Chrome: Title in light off-white text clearly readable against dark background. Colorbar "Temp (°C)" label and scale ticks readable. Isolines rendered in light (#F0EFE8) color instead of dark, making them visible over the colored raster. Country borders in slightly lighter gray than light theme.
      Data: Temperature raster colors are identical to the light render — BrBG diverging colormap with same values; data palette unchanged between themes. Two contour labels are visible: "15°C" in the northern-central area and "25°C" near the southern edge. Both labels show light fill with dark halo. No dark-on-dark failure: the dark-theme background (#1A1A17) shows light chrome text, and the colored raster areas underneath the labels provide sufficient contrast.
