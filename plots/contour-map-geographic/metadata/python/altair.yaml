review:
  strengths:
  - Sophisticated multi-layer geographic visualization using real-world TopoJSON basemap
    via alt.topo_feature
  - Creative use of contourpy for true isoline computation with correct segment ordering
    via detail channel
  - Mercator-uniform latitude grid eliminates stripe artefacts in the raster fill
  - Correct theme-adaptive chrome with all tokens applied (PAGE_BG, INK, INK_SOFT,
    ELEVATED_BG)
  - Canvas padding logic correctly avoids cropping and pads to exact 3200×1800 target
  - BrBG diverging colormap is appropriate for signed temperature data spanning negative
    and positive values
  - sys.path guard prevents the file from shadowing the installed altair package —
    a real edge case handled cleanly
  weaknesses:
  - 'Only 1–2 contour labels appear visible in the renders (light: only 25°C; dark:
    15°C and 25°C). The label-selection filter (lon 5–40, lat 35–64) excludes the
    −5°C and 5°C isotherms which sit in northern or off-map latitudes at these summer
    temperatures — expand the label filter or annotate at more isoline crossings closer
    to the center of the map.'
  - Contour isolines are thin (strokeWidth=0.9 × scale_factor=4 = 3.6 px at full resolution).
    On the colored raster they can be hard to distinguish especially in regions with
    low temperature gradient. Increase strokeWidth to 1.3–1.5 for better prominence.
  - The mark_square raster fill produces a grid of discrete squares rather than a
    smooth continuous fill. The size=40 squares are visible as a pixel-grid artefact,
    particularly at the edges of the projection. Consider increasing grid resolution
    or using a finer square size to reduce the blocky appearance.
  - BrBG assigns green/teal to WARM temperatures (positive end) and brown to COLD
    (negative end), which is counterintuitive for a temperature map where audiences
    expect blue=cold, red/orange=warm. A cividis or viridis scheme (or reversing BrBG)
    would feel more natural for a weather-context map.
