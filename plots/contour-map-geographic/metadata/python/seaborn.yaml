review:
  strengths:
  - 'Excellent spec compliance — all required features implemented: filled contours
    (BrBG_r colormap), contour lines with inline labels, colorbar with units, simplified
    geographic basemap with coastlines, and meaningful contour intervals'
  - Two-panel composition elegantly connects spatial distribution (main map) to global
    pattern (zonal mean side panel), with Arctic Amplification annotation and 60°N
    reference line delivering clear data storytelling
  - Perfect theme adaptation — all chrome elements (axis labels, tick labels, colorbar
    text, contour labels, zonal panel title) use theme-adaptive INK/INK_SOFT tokens;
    both light and dark renders are fully readable with no dark-on-dark or light-on-light
    failures
  - Perfect code quality — reproducible with np.random.seed(42), clean imports (all
    used), flat script structure (no classes/functions), correct output filename format
  weaknesses:
  - Inline contour labels at fontsize=8pt and the 'Arctic Amplification' annotation
    at fontsize=6pt are small; at ~400px mobile width these map to ~5px and ~4px respectively
    — increase contour labels to 9pt and annotation to 7–8pt for better mobile readability
  - Simplified coastline polygons (WORLD_COASTLINES list) produce blocky, geometrically
    crude continent shapes; while functional, these reduce geographic authenticity
    and visual polish compared to real coastline data
  - Library Mastery is constrained — seaborn functions primarily as a theme wrapper
    (sns.set_theme RC params) plus sns.lineplot for the zonal mean sidebar; the core
    geographic contour visualization is entirely matplotlib (contourf, contour, clabel,
    fill), leaving little room for seaborn-distinctive techniques
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct throughout figure and both axes.
      Chrome: Title "Global Temperature Anomaly · contour-map-geographic · python · seaborn · anyplot.ai" is bold, dark (#1A1A17), fully visible. Axis labels "Longitude (°)" and "Latitude (°)" are dark and clearly readable at 10pt. Tick labels along both axes are dark gray (#4A4A44) at 8pt — readable. Colorbar label "Temperature Anomaly (°C)" is dark and legible. Zonal panel "Zonal Mean" title (8pt) and "Anomaly (°C)" x-label (8pt) are readable. Inline contour labels at 8pt and the "Arctic Amplification" annotation at 6pt are small but technically readable at full resolution; mobile readability may be marginal.
      Data: Filled contours use BrBG_r — warm brown tones covering positive anomalies (Arctic/high-latitude), teal covering negative anomalies (tropical ocean). Contour lines overlay in dark ink with "%.1f°C" labels. Land masses in sandy tan (#D8CEA8), ocean in light blue (#C4D8EC). Colorbar ranges -2 to 4+°C. Zonal mean panel shows orange (#D55E00 / Okabe-Ito position 2) line and fill for positive anomalies, with dotted 60°N reference line.
      Legibility verdict: PASS — all primary text clearly readable; annotation text marginally small.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct throughout figure.
      Chrome: Title is light (#F0EFE8) and fully readable against dark background. Axis labels and tick labels flip to light (#F0EFE8 / #B8B7B0) — no dark-on-dark failures. Colorbar label and tick labels are light-colored and readable. Zonal panel text is light and readable. Contour labels use INK (#F0EFE8 in dark mode) — visible against the filled contour surface.
      Data: Contour fills (BrBG_r) are identical to light render — same warm brown for positive, teal for negative anomalies. Data colors are unchanged between themes as required. Land becomes dark brown (#5A5040), ocean becomes dark blue-gray (#182633). Orange zonal mean line (#D55E00) remains the same Okabe-Ito color and is clearly visible on the dark background.
      Legibility verdict: PASS — all text readable in dark theme; chrome correctly adapts; no dark-on-dark issues detected.
