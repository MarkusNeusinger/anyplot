review:
  strengths:
  - Sophisticated multi-layer geographic visualization combining filled elevation
    raster (Viridis) with contour lines, peak annotations, and geographic overlay
    elements
  - 'Correct bokeh idioms: contourpy for contour generation, p.image() for raster,
    ColumnDataSource + LabelSet for efficient label rendering, LinearColorMapper +
    ColorBar'
  - Overlap-aware contour label placement with MIN_LABEL_DIST guard prevents crowded
    annotations
  - Full theme-adaptive chrome with all text colors (title, axis labels, tick labels,
    legend, colorbar, annotation boxes) properly switching between light and dark
  - Semantic use of Okabe-Ito palette for geographic overlays (blue coastline = water,
    orange = border) — contextually justified
  - 'Perfect code quality: flat KISS structure, deterministic seed, clean imports,
    HTML + PNG dual output'
  weaknesses:
  - No real geographic basemap library used — coastline and state border are manually
    approximated polylines; a cartopy/geopandas tile or natural earth boundary would
    better satisfy the spec requirement for an actual basemap
  - Legend label_text_font_size (28pt) is slightly below the standard 34pt from the
    style guide; at small thumbnail widths the legend text reads small
  - The colorbar major_label_text_font_size (22pt) is below the 34pt tick-label standard
    — these labels read small at scale
  - Peak elevations in annotations (~4361m, ~4347m) are plausible for simulated data
    but slightly above real Cascade peaks (Rainier 4392m is an outlier); minor realism
    concern
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 fills the entire canvas including borders — correct.
      Chrome: Title "contour-map-geographic · python · bokeh · anyplot.ai" is fully visible in dark ink at the top. X-axis label "Longitude (°W)" and Y-axis label "Latitude (°N)" are clearly readable in INK color. Tick labels (-125 to -117 on X, 42–49 on Y) appear in INK_SOFT. All chrome text is readable against the light surface.
      Data: Viridis256 elevation raster covers the plot area — deep purple in low-elevation coastal/eastern areas, transitioning through green to bright yellow at the Cascade Range peaks (~3000m). Contour isolines in INK_SOFT run across the full extent at 250m intervals. Major contour labels (500m, 2000m, 3000m, 1000m, 1500m) appear in labeled boxes with ELEVATED_BG (#FFFDF6) fill and border. Pacific coastline is drawn in #0072B2 (Okabe-Ito blue). OR/WA state border is a dashed #D55E00 (Okabe-Ito orange) line at lat≈46.2. Two peak markers (inverted triangles) annotate the N. Cascades and S. Cascades with elevation labels. Colorbar on the right shows the elevation range 0–3000m.
      Legibility verdict: PASS — all text is readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 surface — correct warm near-black, not pure black.
      Chrome: Title, axis labels, and tick labels appear in light (F0EFE8 / B8B7B0) text against the dark surface — clearly readable. No dark-on-dark failures observed. The colorbar labels and legend text are also visible in light INK_SOFT color.
      Data: Viridis256 raster colors are visually identical to the light render — the purple-to-yellow gradient is unchanged (only chrome colors shifted). Contour lines remain visible as lighter strokes on the dark surface. Elevation label boxes now use ELEVATED_BG (#242420) with light INK text — readable. Peak annotation boxes similarly use elevated dark background with light text. Coastline (blue) and border (orange dashed) remain distinguishable.
      Legibility verdict: PASS — all text is readable against the near-black background with no dark-on-dark issues detected.
