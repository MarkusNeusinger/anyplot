review:
  strengths:
  - Excellent geographic basemap integration using map_data() with geom_polygon(),
    giving coastlines and borders without requiring sf or ggmap
  - Theme-adaptive OCEAN_COL token adds meteorological realism — panel background
    shifts from light-blue (#C8DFF0) on light to deep navy (#1E2E3B) on dark, enhancing
    the oceanic context
  - 'Meteorologically accurate data: Azores High, Icelandic Low, and European ridge
    are plausibly placed at realistic hPa values with 4 hPa synoptic intervals'
  - Correct viridis discrete palette via scale_fill_viridis_d() for filled pressure
    bands — CVD-safe and perceptually uniform
  - 'Clean layer composition: geom_contour_filled + geom_polygon (coastlines) + geom_contour
    stacked correctly so borders appear over fill'
  - Proper theme-adaptive chrome throughout — INK/INK_SOFT tokens applied to all text,
    legend, grid, and panel border elements
  weaknesses:
  - Missing isobar labels on the map itself — spec explicitly requires labeling contour
    lines with values at appropriate intervals; only the legend shows numeric ranges,
    but synoptic weather maps need hPa values printed on the isobars (use metR::geom_text_contour
    or metR::geom_label_contour)
  - library(dplyr) is imported but no dplyr function is called anywhere in the script
    — remove it to keep imports clean
  - Contour lines drawn with alpha=0.55 are subtle enough that on some screens they
    may be hard to distinguish from the filled colour bands; consider raising alpha
    to 0.7-0.8 or linewidth to 0.45
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot surface.
      Panel/ocean: Light sky blue (#C8DFF0), clearly distinguishing ocean from landmass.
      Data: Filled pressure contours using discrete viridis (deep purple for ~994 hPa Icelandic Low in NW, transitioning through teal/green to yellow-green ~1022-1026 hPa over SW Atlantic/N. Africa). White coastlines and border polygons visible over the fill. Thin semi-transparent dark contour lines overlay the fill at 4 hPa intervals.
      Chrome: Title "N. Atlantic Isobars · contour-map-geographic · r · ggplot2 · anyplot.ai" in dark bold text fully visible. "Longitude" and "Latitude" axis labels dark and readable. Tick numerals (lat/lon) in INK_SOFT dark grey, readable. Legend "Pressure (hPa)" with interval labels clearly readable.
      Legibility verdict: PASS — all text clearly readable against the off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct anyplot dark surface.
      Panel/ocean: Dark navy (#1E2E3B), maintaining geographic ocean-vs-land distinction on the dark theme.
      Data: Viridis fill colours are visually identical to light render — same purple (Icelandic Low), teal (European mid-range), yellow-green (Azores High/S. Atlantic). White coastlines remain prominent. Contour lines visible though subtle.
      Chrome: Title text rendered in warm cream (INK=#F0EFE8) — fully readable against near-black. Axis labels, tick labels, and legend text all in INK/INK_SOFT cream/grey tones. No dark-on-dark failures observed. Legend box uses ELEVATED_BG (#242420) with INK_SOFT border.
      Legibility verdict: PASS — both renders pass theme-readability; data colours identical between themes as required.
