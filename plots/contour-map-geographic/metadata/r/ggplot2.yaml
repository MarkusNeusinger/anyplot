review:
  strengths:
  - Multi-layer geographic composition (geom_contour_filled + geom_contour + geom_polygon
    + geom_label) is idiomatic ggplot2 grammar and creates a professional synoptic
    weather map aesthetic
  - Theme-adaptive ocean panel background (OCEAN_COL) and all chrome tokens correctly
    flip between light/dark — no dark-on-dark or light-on-light failures
  - 'Meteorologically accurate data: Azores High, Icelandic Low, European ridge all
    represented with realistic pressure values (994–1032 hPa) and standard 4 hPa isobar
    intervals'
  - Isobar label positioning via contourLines() midpoint algorithm is clever and places
    labels cleanly on the longest contour segment for each level
  - viridis_d is correctly applied to the discrete-binned fill from geom_contour_filled,
    and the ocean background / viridis gradient together communicate the pressure
    field intuitively
  - 'Perfect spec compliance: filled contours, line contours, labeled isobars, geographic
    basemap (coastlines + borders), and colorbar legend all present'
  weaknesses:
  - Isobar labels use geom_label size=2.2 (~6.3pt equivalent), which is readable at
    full 3200×1800 canvas resolution but will be marginal at mobile viewport (~400px
    scaled down ~8×); consider increasing to size=2.8–3.0 for better mobile legibility
  - The panel background OCEAN_COL is fully covered by geom_contour_filled over the
    entire data grid, so the ocean color never shows through; it only adds value at
    grid edges — this is cosmetically fine but architecturally misleading
  - Design storytelling (DE-03) could be elevated by adding minimal text annotations
    for the key pressure systems (e.g., 'Azores H' and 'Icelandic L' labels) to guide
    viewers unfamiliar with synoptic meteorology — the current plot shows the gradient
    clearly but doesn't name the story
  - 'DE-01 capped below 8: the aesthetic is professional and well-composed but relies
    on standard viridis + contour-fill without distinctive typographic hierarchy or
    focal emphasis beyond the gradient itself'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "N. Atlantic Isobars · contour-map-geographic · r · ggplot2 · anyplot.ai" in dark bold text at top, clearly readable. Axis labels "Latitude" (Y) and "Longitude" (X) in dark text, readable. Tick labels in muted dark (#4A4A44-equivalent) at 8pt, fully readable. Legend box upper-right with elevated background, "Pressure (hPa)" title and interval labels legible.
      Data: viridis filled contours from deep purple (994–998 hPa, Icelandic Low region) through teal/cyan (1006–1014 hPa) to yellow-green (1022–1026 hPa, Azores High). Coastlines and political borders drawn as thin dark lines over filled contours. Bold isobar value labels (998, 1002, 1006, 1010, 1014, 1018, 1022) in geom_label boxes with PAGE_BG fill and INK text — all readable. Geographic extent covers North Atlantic and Europe (-30°W to 45°E, 35°N to 72°N).
      Legibility verdict: PASS — all text elements clearly readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light (#F0EFE8-equivalent) bold text, clearly readable against dark background. Axis labels in light text, readable. Tick labels in muted light (#B8B7B0-equivalent), readable. Legend box with elevated dark background (#242420), legend text in light muted color — all legible. No dark-on-dark failures observed.
      Data: viridis data colors are IDENTICAL to light render — same purple for Icelandic Low, same yellow-green for Azores High. The contour palette did not shift. Coastlines/borders rendered as lighter lines (INK flipped to #F0EFE8-equivalent) on the dark surface. Isobar labels use INK (light) text on PAGE_BG (dark) fill — readable. Ocean panel uses OCEAN_COL dark variant (#1E2E3B), providing appropriate maritime context.
      Legibility verdict: PASS — all text is clearly readable against warm near-black background; data colors are unchanged from light render; chrome correctly flipped.
