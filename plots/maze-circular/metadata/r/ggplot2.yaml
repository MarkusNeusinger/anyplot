review:
  strengths:
  - Algorithmically correct DFS maze generation guarantees exactly one solution with
    set.seed(42) for reproducibility
  - Perfect theme-adaptive chrome — all colors (walls, bands, text, background) flip
    correctly between light and dark
  - Correct square canvas (6x6 in at 400 dpi = 2400x2400 px) ideal for a symmetric
    circular plot
  - Alternating ring band shading adds subtle visual depth without overwhelming the
    wall structure
  - 'Clear visual narrative: START label at entry gap → navigate concentric rings
    → green goal disc at center'
  - Differentiated wall stroke weights (1.3 outer, 0.9 inner) create a natural visual
    frame hierarchy
  - Full spec compliance — concentric rings, radial walls, radial passages, entry
    point, goal marker all present
  - Clean code using only ggplot2 and ragg with no unnecessary complexity
  weaknesses:
  - Caption font at 7pt renders ~39 source-px which is on the smaller side for mobile
    viewports — consider 8pt
  - 'DE-01: Design is above defaults (alternating bands, stroke weights) but not publication-exceptional
    — could add subtle shadow on goal disc or bolder entry arrow for more polish'
  - 'DE-03: Story is clear but the solution path itself is not highlighted — a faint
    colored path from START to goal would elevate storytelling significantly'
  - 'LM-02: Implementation uses ggplot2 primarily as a drawing tool via Cartesian
    trigonometry — could leverage coord_polar() or additional ggplot2-native features
    for more library distinctiveness'
