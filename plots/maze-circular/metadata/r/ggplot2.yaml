review:
  strengths:
  - Algorithmically correct DFS-based maze generation guarantees exactly one solution
  - Theme-adaptive chrome (INK token for walls) works flawlessly — walls flip from
    dark to light between themes with zero dark-on-dark failures
  - Correct use of coord_equal() ensuring perfect circular geometry
  - 'Strategic use of #009E73 brand green for the goal disc, creating clear visual
    hierarchy'
  - geom_path() with group=factor(seg) idiomatically draws all wall segments in a
    single geom call
  - theme_void() is the ideal choice for a maze — removes all unnecessary chrome
  - Square canvas (2400×2400) is the right format for a symmetric circular plot
  - set.seed(42) ensures reproducibility
  weaknesses:
  - Wall linewidth=0.5 is thin for pen/pencil solving (spec requirement) — increase
    to 0.8–1.0 for better printability
  - 'DE-01 (5/8): Aesthetic sophistication is good but not exceptional — could add
    more visual polish such as a subtle radial gradient on the background, a concentric
    ring count annotation, or a difficulty indicator'
  - 'DE-02 (4/6): Minor refinement opportunities — could add rounded wall endpoints
    more prominently or subtle shadow effect on center disc'
  - 'DE-03 (3/6): No visual storytelling beyond basic entry/goal marking — consider
    highlighting the outermost ring or using slightly different wall opacity for depth
    effect'
  - 'CQ-01 (2/3): Helper functions defined (ring_in, ring_out, sec_angle, append_seg)
    — minor KISS deviation though necessary for maze complexity'
  - 'LM-02 (3/5): Could leverage more ggplot2-distinctive features such as annotation_custom()
    for richer goal marker or geom_curve() for stylized entry arrow'
