review:
  strengths:
  - Excellent use of visible="legendonly" for solution path toggle — pure plotly interactivity
    making this a genuinely fun puzzle
  - Correct DFS maze generation guaranteeing exactly one solution path
  - 'Theme tokens applied throughout: backgrounds, INK colors, elevated legend box
    all flip correctly between light and dark'
  - 'Okabe-Ito palette used correctly: #009E73 for accent (goal/labels), #D55E00 for
    solution path'
  - Square canvas (2400x2400) correctly chosen for a circular symmetric plot
  - 'Clean chrome: no grid, no axes, no spines — appropriate for a maze'
  weaknesses:
  - 'Inner ring sector density is inverted: SECTORS=[6,12,18,24,30,36,42] puts 42
    sectors in innermost ring (radius 0-1), creating a visually unreadable, unnavigable
    center. Fix: reverse to SECTORS=[42,36,30,24,18,12,6] so outer rings have more
    sectors.'
  - 'START arrowhead overlaps START text: arrow head at OUTER_R*cos/sin(entry_angle)
    falls within the text bounding box of the START label at (OUTER_R+1.3), producing
    a ''ST▲RT'' artifact. Fix: move text to (OUTER_R+2.2)*cos/sin.'
  - 'GOAL text at y=-(goal_r+1.0)=-1.4 sits inside the innermost ring wall zone and
    overlaps inner maze elements. Fix: move to y=-(goal_r+2.0) or further.'
  - Two helper functions (add_passage, cell_mid) defined at module level — violates
    KISS no-functions principle. Inline them.
