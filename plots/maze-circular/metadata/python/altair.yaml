review:
  strengths:
  - Excellent use of Altair's detail:N + order:O encoding to render hundreds of disconnected
    wall segments cleanly — the canonical Altair approach avoiding explicit rendering
    loops
  - 'Flawless theme adaptation: backgrounds, wall colors, and text chrome all flip
    correctly between light and dark renders'
  - Clean Kruskal's maze generation guarantees exactly one solution with np.random.seed(42)
    for reproducibility
  - Square 2400x2400 canvas with scale_factor=4.0 is the correct choice for a symmetric
    circular plot
  - START/GOAL visual hierarchy (blue entry, gold star) clearly communicates the puzzle's
    entry and exit
  weaknesses:
  - 'START label uses different Okabe-Ito positions between themes (#0072B2 pos 3
    in light vs #56B4E9 pos 6 in dark) — data marker colors must be identical across
    themes; use #0072B2 for both'
  - difficulty parameter from the spec (easy/medium/hard affecting passage density)
    is not implemented — add a difficulty-to-sector-density mapping in Kruskal's generation
  - Design stays at configured-default level — consider slightly thicker outer boundary
    arc, filled center circle for goal area, or arrow indicator at entry gap to improve
    first-glance navigability
