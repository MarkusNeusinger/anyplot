review:
  strengths:
  - Correct circular maze structure with concentric rings, radial walls, and passages
    generated via Kruskal's spanning tree — guarantees exactly one solution
  - Theme-adaptive custom colormap (PAGE_BG→INK) that correctly flips walls/paths
    between light and dark renders
  - 'Clear visual storytelling: branded green entry marker with annotated START label
    and gold star goal at center'
  - 'Perfect spec compliance: 7 rings, entry on outer perimeter, goal at center, all
    required features present'
  - Clean code structure using np.random.seed(42) for reproducibility, no fake UI
    elements, idiomatic sns.heatmap usage
  weaknesses:
  - Pixelated/blocky wall rendering due to low-resolution grid (300×300) rasterized
    onto 2400×2400 canvas — walls appear as chunky pixel clusters rather than smooth
    arcs; switch to vector-based rendering using matplotlib arc patches or increase
    grid resolution significantly
  - Design Excellence is limited by the raster quality — the maze looks algorithmically
    correct but not visually polished; consider using matplotlib.patches.Arc/Wedge
    or ax.add_patch() for smooth concentric ring walls
  - Library Mastery is low — seaborn's heatmap is used as a styled imshow wrapper;
    the visualization relies mostly on numpy/matplotlib; there is no use of seaborn's
    distinctive statistical features
  - Maze circle not fully centered within canvas — noticeable whitespace at bottom;
    improve centering with explicit axis limits or figure padding
