review:
  strengths:
  - Algorithmically correct maze using Prim's spanning-tree guarantees exactly one
    solution as required by spec
  - 'Theme adaptation is complete and correct: walls, title, and background all flip;
    Okabe-Ito data colors (goal green, entry orange) stay constant across themes'
  - Dual-layer entry arrow (thick colored fill + dark/light outline) ensures visibility
    in both light and dark modes
  - Square 2400x2400 canvas appropriately chosen for a symmetric circular visualization
  - 'Full spec compliance — all required features present and working: 7 concentric
    rings, radial passages, entry opening, GOAL circle with label'
  weaknesses:
  - START HTML label positioned off-screen (-2% top) due to coordinate-to-percentage
    math error when entry angle is near pi/2 — only the arrow marks the entry; fix
    by using a Highcharts subtitle or data-label instead of an absolute-positioned
    HTML div
  - Walrus operator on line 229 assigns entry_x but it is never referenced again —
    remove and write the expression directly
  - 'Design is functional but not elevated: maze walls are plain uniform-weight lines
    with no visual depth; consider adding a subtle semi-transparent green fill to
    the innermost ring and a thicker outer boundary circle to reinforce hierarchy'
  - Library mastery is limited — Highcharts used purely as a line-chart renderer;
    no Highcharts-specific features (SVG renderer, custom shapes, animation API) are
    leveraged
