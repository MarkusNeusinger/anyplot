review:
  strengths:
  - Uses pygal's native Funnel chart — the idiomatic high-level API for this plot
    type — with each stage added as its own single-value series so segments carry
    distinct Imprint colors and the legend names every stage.
  - 'Imprint palette applied correctly via the Style object: first series is brand
    green #009E73, canonical order thereafter; chrome backgrounds #FAF8F1 (light)
    / #1A1A17 (dark) flip cleanly while the five data colors stay identical across
    themes.'
  - Every segment is labeled with both raw value and conversion percentage via a custom
    value_formatter, directly satisfying the spec's value/percentage requirement;
    the explicit symmetric range tightens pygal's default padding so the funnel commands
    more vertical presence.
  - Deterministic hardcoded data, KISS structure (no functions/classes), only used
    imports, theme-suffixed PNG + interactive HTML output, exact 3200x1800 canvas
    (dimension gate passed).
  weaknesses:
  - pygal's native Funnel renders horizontally (narrowing left->right) rather than
    the top->bottom orientation in the spec notes. This is the library idiom and acceptable,
    but the first two segments (Awareness 1000, Interest 600) render at near-identical
    heights, so stage-to-stage proportionality is conveyed mainly by the printed labels
    rather than the segment shape. Not fixable without abandoning the native Funnel
    chart.
  - In the dark render the on-segment value labels are dark text; on the darker blue
    (#4467A3) and red (#AE3030) segments the value/percentage labels sit at slightly
    reduced contrast — still readable but the least legible elements in the dark theme.
  - Design is functional but restrained — essentially theme tokens + palette on the
    default Funnel, with no added visual hierarchy or emphasis to direct the viewer
    beyond the inherent narrowing.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface, no pure white.
      Chrome: title "funnel-basic · python · pygal · anyplot.ai" in dark monospace, centered top, fully visible. Bottom legend (5 entries: Awareness, Interest, Consideration, Intent, Purchase) with color swatches in dark text — all readable.
      Data: horizontal funnel of 5 trapezoidal segments narrowing left->right. Colors in Imprint canonical order — green #009E73 (first), lavender #C475FD, blue #4467A3, ochre #BD8233, matte red #AE3030. On-segment labels "1,000 (100%)", "600 (60%)", "400 (40%)", "200 (20%)", "100 (10%)" in dark text, all readable.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface, no pure black.
      Chrome: title and legend labels in light off-white (#F0EFE8), clearly readable against dark background. No dark-on-dark failure on any chrome element.
      Data: identical five data colors to the light render (only chrome flipped). On-segment value labels are dark text on the colored segments — readable on all five, slightly lower contrast on the blue and red segments but no information lost.
      Legibility verdict: PASS

    AR-09 edge-clipping check: title, legend, funnel point and all value labels are fully within the canvas on both renders — no clipped pixels.
