review:
  strengths:
  - Uses pygal's native Funnel chart type — the idiomatic high-level API for this
    plot, with each stage as its own single-value series so segments carry distinct
    Imprint colors and the legend names every stage.
  - 'Imprint palette applied correctly via the Style object: first series is brand
    green #009E73, remaining stages follow canonical Imprint order; chrome backgrounds
    are #FAF8F1 (light) / #1A1A17 (dark) and flip cleanly between themes while data
    colors stay identical.'
  - Every segment is labeled with both raw value and conversion percentage via a custom
    value_formatter (e.g. '600 (60%)'), directly satisfying the spec's value/percentage
    labeling requirement.
  - Deterministic hard-coded data (no RNG needed), clean KISS structure with no functions/classes,
    only used imports, and saves theme-suffixed PNG plus interactive HTML — correct
    for an interactive library.
  - Canvas is exactly 3200x1800 (landscape), passing the dimension gate; minimal chrome
    (no axes/grid) suits a funnel well.
  weaknesses:
  - pygal's native Funnel renders horizontally (narrowing left-to-right) rather than
    the top-to-bottom orientation described in the spec notes. This is the library's
    idiom and acceptable, but the first two segments (Awareness 1000, Interest 600)
    render at near-identical heights, so the geometric proportionality between stage
    values is not strongly conveyed by shape alone — the viewer relies on the printed
    value/percent labels. Not fixable without abandoning the native Funnel chart.
  - Large vertical whitespace above and below the funnel band; the funnel occupies
    roughly the middle third of the canvas height. Could be tightened with a smaller
    margin for a more commanding presence, but nothing is cut off.
  - Design is functional but restrained — styling is essentially theme tokens + palette
    applied to the default Funnel; no extra hierarchy or emphasis beyond the inherent
    funnel narrowing.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: title "funnel-basic · python · pygal · anyplot.ai" in dark monospace, fully readable and centered at top. Bottom legend lists Awareness/Interest/Consideration/Intent/Purchase with colored swatches, dark text — all readable.
      Data: horizontal funnel narrowing left→right. Segments in Imprint order — green #009E73 (Awareness), purple #C475FD (Interest), blue #4467A3 (Consideration), amber #BD8233 (Intent), red #AE3030 (Purchase). First series is brand green, confirmed. Each segment shows dark value+percent label (1,000 (100%), 600 (60%), 400 (40%), 200 (20%), 100 (10%)) — readable on every segment.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: title in light/near-white monospace, fully readable. Bottom legend labels in light text against dark background — readable, no dark-on-dark.
      Data: identical funnel geometry and identical segment colors to the light render — only chrome flipped. Value/percent labels are dark text but sit on the bright Imprint-colored segments, so they remain legible (no dark-on-dark failure since labels are never on the dark background). Brand green still vivid.
      Legibility verdict: PASS
