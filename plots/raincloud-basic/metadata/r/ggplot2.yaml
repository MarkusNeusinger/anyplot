review:
  strengths:
  - 'Spec-perfect three-band layout: half-violin ribbon rises above each category
    baseline, boxplot sits centered on the baseline with width=0.14, and jittered
    rain points fall ~0.18-0.38 below — the cloud/rain metaphor reads instantly in
    both renders.'
  - Bimodal Sleep-deprived distribution (fast subgroup ~470 ms + slow subgroup ~640
    ms) is exactly the structure a boxplot alone would hide — the data choice turns
    this from a generic raincloud demo into a clear storytelling argument for the
    chart type.
  - 'Theme tokens are threaded through every chrome element (PAGE_BG, INK, INK_SOFT,
    INK_MUTED, GRID, BOX_FILL): both renders pass the readability check with no dark-on-dark
    or light-on-light failures, and the box plot fill flips correctly (#FFFDF6 light
    / #242420 dark) so the colored borders remain the focal element.'
  - 'Palette compliance is clean — first series is brand green #009E73 (Control),
    then lavender (Sleep-deprived) and blue (Caffeinated) in canonical anyplot order
    — and the legend is suppressed since the y-axis category labels already identify
    each row, removing redundant chrome.'
  - 'Idiomatic ggplot2 grammar throughout: per-group KDE via dplyr::group_modify into
    a geom_ribbon layer (since ggplot2 has no half-violin geom natively), geom_boxplot
    with orientation = ''y'', and expansion(add=...) used to give each cloud headroom
    without crashing into the next row.'
  - Bold title weight + thin INK_MUTED gridlines (linewidth = 0.1) establish a clean
    typographic hierarchy without competing with the data; the x-axis range extends
    to 900 ms to cover the full Sleep-deprived tail without clipping.
  weaknesses:
  - 'Boxplot fill in the dark render (#242420) is so close to PAGE_BG (#1A1A17) that
    the box interior almost disappears — only the colored border and median line remain
    visible. Consider lifting BOX_FILL slightly (e.g. #2E2E29) or using a translucent
    category-tinted fill so the box body reads as a distinct shape rather than a colored
    outline on the background.'
  - Plot title at size = 11 with the long mandated suffix (~67 chars) renders at the
    smaller end of the readable range for a 3200x1800 canvas. The library guide suggests
    plot.title = element_text(size = 12); bumping to 12 would give the title more
    presence without crowding the data area.
  - Jitter spread for the rain band uses runif(n, 0, 0.20), giving a y-range of 0.20
    — slightly wider than the spec's suggested 0.05-0.1 'moderate jitter' guidance.
    The current 140-per-group density tolerates it, but tightening to runif(n, 0,
    0.12) would match the spec while still avoiding excessive overplotting.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white at #FAF8F1 as specified — no pure white anywhere.
      Chrome: bold dark title centered across the top, "Reaction time" x-axis label
        centered below, "300 ms"-"900 ms" tick labels in soft grey, and category
        labels (Caffeinated, Sleep-deprived, Control) rendered at size 11 in INK
        (#1A1A17). Vertical x-only gridlines rendered very faintly in INK_MUTED at
        linewidth 0.1 — present but recedes behind the data. No y-axis ticks (set
        to element_blank).
      Data: three rows stacked bottom-to-top — Control in brand green #009E73,
        Sleep-deprived in lavender #C475FD (clearly bimodal with a fast cluster
        ~470 ms and a slow cluster ~640 ms), Caffeinated in blue #4467A3. Each row
        shows a half-violin ribbon rising above the category baseline, a thin
        boxplot (width=0.14) sitting on the baseline with a cream fill #FFFDF6
        and a tiny visible median tick, and 140 jittered rain points spread below
        the baseline at alpha=0.55.
      Legibility verdict: PASS — every text element has strong contrast against
        the off-white background, and the green/lavender/blue palette is
        distinguishable.

    Dark render (plot-dark.png):
      Background: warm near-black at #1A1A17 as specified — no pure black.
      Chrome: bold title in light ink #F0EFE8, axis label and tick labels in
        light B8B7B0/F0EFE8 — all clearly readable. Vertical gridlines flipped
        to INK_MUTED light variant #A8A79F at linewidth 0.1, still subtle.
      Data: colors are IDENTICAL to the light render — Control green, Sleep-
        deprived lavender, Caffeinated blue. The boxplot fill flips to #242420
        (near-black, only one shade off PAGE_BG) so the box interior reads as
        a faintly darker rectangle bordered by the category color; the median
        tick remains visible. Rain points sit on the dark background at alpha
        0.55 and remain clearly distinguishable.
      Legibility verdict: PASS — no dark-on-dark text failure. Brand green
        #009E73 reads cleanly on the near-black surface. Minor note: the
        boxplot fill is *very* close to the page background (only one step
        darker), so the box body is more outline-than-shape; flagged as a
        weakness rather than a legibility failure since the colored border
        and median line carry the information.
