review:
  strengths:
  - Canonical raincloud layout perfectly executed — half-violin 'cloud' rises above
    each category baseline, boxplot sits centered on the baseline, and jittered 'rain'
    points fall below. The cloud-rises-rain-falls visual metaphor is unmistakable
    in both renders.
  - Excellent storytelling via data design — the Sleep-deprived group is intentionally
    bimodal (fast subgroup that stayed alert + slow subgroup that degraded), which
    is exactly the kind of distribution structure a box plot alone would hide. This
    is the canonical raincloud use-case and the bimodal lavender cloud reads at-a-glance.
  - Pure-ggplot2 half-violin built from geom_ribbon over a per-group density() — no
    ggdist dependency, no faked geom. group_modify cleanly produces the per-category
    KDE band, demonstrating real grammar-of-graphics fluency.
  - 'Theme tokens (PAGE_BG, INK, INK_SOFT, BOX_FILL) flip cleanly between light (#FAF8F1)
    and dark (#1A1A17) renders. Data colors (#009E73 green / #C475FD lavender / #4467A3
    blue) stay identical across themes — only chrome inverts, as required.'
  - 'Palette compliance is exact: first series Control = #009E73 brand green, then
    palette[2] lavender and palette[3] blue in canonical order. Box fill uses the
    elevated-surface token (#FFFDF6 / #242420), legend suppressed (single semantic
    group, redundant).'
  - 'Clean axis/tick design: ms-suffixed x-tick labels (''300 ms'' … ''800 ms''),
    category labels as y-ticks, no redundant y-axis title, only x-axis spine retained
    — minimal L-frame chrome that lets the data breathe.'
  weaknesses:
  - Plot title 'Reaction Time by Condition · raincloud-basic · r · ggplot2 · anyplot.ai'
    is rendered at face='plain' weight (11pt). The style guide asks for bold or medium-weight
    titles to anchor the typographic hierarchy — set face='bold' (or 'semibold' via
    the systemfonts route) so the title clearly outranks axis text.
  - 'Vertical gridlines use the full INK color (#1A1A17 light / #F0EFE8 dark) at linewidth=0.15.
    On the light render they read a bit prominent for a ''subtle'' grid. Style-guide
    target is ~15–25% opacity equivalent; either lower linewidth (try 0.1) or switch
    GRID to a lighter token (e.g. INK_MUTED) so gridlines recede behind the data.'
  - Data extends slightly past the last labeled tick (800 ms) — a couple of Sleep-deprived
    rain points and the right tail of its KDE drift to ~850 ms, beyond the labeled
    scale. Either extend breaks to include 900 ms or clip the x-scale at 850 ms with
    expand=c(0,0) so the visible range matches the labeled range.
  - 'Outliers are suppressed on the boxplot (outlier.shape=NA) which is correct since
    the rain layer already shows every point, but the resulting whisker tips have
    nothing visually marking their endpoints in the dark render — they fade into the
    dark BOX_FILL. Optional polish: thin colored whisker caps via stat=''boxplot''
    geom=''errorbar'' or simply trust the rain to show the full range.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 (confirmed — not pure white, not dark).
      Chrome: title "Reaction Time by Condition · raincloud-basic · r · ggplot2 · anyplot.ai"
        rendered in dark ink, clearly readable. X-axis label "Reaction time" and tick labels
        ("300 ms" through "800 ms") are dark and readable. Y-axis tick labels ("Caffeinated",
        "Sleep-deprived", "Control") are dark and readable. Vertical gridlines visible (slightly
        prominent — see weaknesses). Only the bottom (x) axis spine is drawn.
      Data: three categories using palette positions 1–3 in canonical order:
        Control = #009E73 brand green (bottom), Sleep-deprived = #C475FD lavender (middle),
        Caffeinated = #4467A3 blue (top). Each row shows a half-violin "cloud" rising above the
        baseline (alpha-blended ribbon), a small boxplot centered on the baseline with the
        BOX_FILL elevated-surface fill (#FFFDF6) and category-colored outline + median tick, and
        jittered rain points below the baseline at alpha~0.55. Sleep-deprived cloud is clearly
        bimodal (peak near 470 ms, second hump near 640 ms) — the spec's intended storytelling.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 (confirmed — not pure black, not light).
      Chrome: title and axis labels rendered in light ink (#F0EFE8), tick labels in INK_SOFT
        (#B8B7B0). All title/label/tick text clearly readable against the dark surface — no
        dark-on-dark failure observed. Vertical gridlines now drawn in #F0EFE8 (faint linewidth)
        and read as subtle structure lines, not dominant.
      Data: identical category colors to the light render — Control green (#009E73),
        Sleep-deprived lavender (#C475FD), Caffeinated blue (#4467A3). Confirmed palette
        constancy across themes. Box fills flip to #242420 (elevated dark) with category-colored
        outlines, so the boxplots still read as distinct from the page background.
      Legibility verdict: PASS
