      Data: four stacked rainclouds with cloud above baseline, box centered on baseline, rain band below — Baseline = anyplot brand green #009E73, Variant A = lavender #C475FD (clearly bimodal cloud), Variant B = blue #4467A3 (tight unimodal), Variant C = ochre #BD8233 (broad with heavy right tail). Box fill is elevated near-white #FFFDF6 with dark median tick visible; rain points alpha-blended at ~0.6.
      Legibility verdict: PASS — every label, tick, and title is clearly visible; no light-on-light failures; first categorical series is the mandated #009E73.

