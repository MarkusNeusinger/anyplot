review:
  strengths:
  - Faithful raincloud composition built from Makie primitives (band! + lines! + poly!
    + scatter!) — cloud rises above baseline, box sits on baseline, rain falls below;
    the visual metaphor is unambiguous in both renders.
  - Anyplot palette applied in canonical order (Baseline=#009E73 brand green, Variant
    A=lavender, Variant B=blue, Variant C=ochre) and rendered identically across light
    and dark themes.
  - 'Theme-adaptive chrome is correctly wired: PAGE_BG, INK, INK_SOFT, and ELEVATED_BG
    (used for the box fill) all flip on the ANYPLOT_THEME env var; no dark-on-dark
    or light-on-light text in either render.'
  - Hand-rolled Gaussian KDE with Silverman/IQR bandwidth produces clean, smooth densities
    — the bimodal cache hit/miss pattern in Variant A is clearly visible.
  - Realistic, neutral A/B-test page-load context (ms scale 200–1100) with four meaningfully
    distinct distribution shapes (right-skewed, bimodal, tight, heavy-tailed) — exercises
    the raincloud's full descriptive power.
  - Canvas lands exactly on the canonical landscape size (3200×1800) via resolution=(1600,900)
    + px_per_unit=2; no canvas-gate violation.
  weaknesses:
  - 'Rain band sits almost flush against the box bottom: box extends to baseline−0.07
    and rain starts at baseline−0.08, leaving only a 0.01 y-unit gap. Visually the
    topmost rain points touch the box outline (most visible on Variant A and Baseline).
    Increase rain_gap to ~0.12 or shrink box_height to ~0.10 so the box and rain are
    clearly separated bands.'
  - Category ordering follows the declaration order (Baseline at bottom → Variant
    C at top) rather than a meaningful sort. Reordering by median (fastest variant
    at top or bottom) would create a clearer visual hierarchy and stronger storytelling
    — currently the viewer has to scan and compare without a guided reading order.
  - X-axis tick labels are set to 12pt while y-axis tick labels are 13pt — a minor
    imbalance with no semantic reason. Make them equal (both 12 or both 13) for tick-label
    balance.
  - Y-axis baseline spine is visible (leftspinecolor = INK_SOFT) but carries no information
    since the category labels are positioned to the left of it; removing the left
    spine (leftspinevisible = false) would further declutter the chrome and match
    the minimal-grid aesthetic of the x-axis-only grid.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface across the full 3200×1800 canvas. No pure-white.
      Chrome: Title "raincloud-basic · julia · makie · anyplot.ai" centered at the top in dark INK, ~50% canvas width — readable with breathing room. X-axis label "Page Load Time (ms)" centered below the axis, dark INK. X tick labels (200, 400, 600, 800, 1000) and y tick labels (Baseline, Variant A, Variant B, Variant C) all rendered in INK_SOFT against the warm cream background — fully readable, no light-on-light failures. Vertical x-grid is subtle (~12% alpha INK), y-grid hidden, top/right spines removed, left + bottom spines in INK_SOFT.
      Data: Four rainclouds stacked vertically. From bottom to top: Baseline (anyplot brand green #009E73, right-skewed cloud peaking ~750 ms), Variant A (lavender #C475FD, clearly bimodal cloud), Variant B (blue #4467A3, tight cloud peaking ~470 ms), Variant C (ochre #BD8233, broad cloud peaking ~600 ms with a long right tail). Each group shows the cloud above the baseline, a small box+whisker on the baseline with elevated-bg fill and dark median line, and jittered rain points (alpha 0.6) below the baseline. First series uses the brand green as required.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 surface across the full 3200×1800 canvas. No pure-black.
      Chrome: Title rendered in light INK (#F0EFE8) — clearly visible against the dark background. X-axis label "Page Load Time (ms)" in light INK. X and y tick labels in INK_SOFT (#B8B7B0) — readable, no dark-on-dark failures. Vertical x-grid uses semi-transparent INK so the grid is now light-on-dark (~12% alpha) and remains subtle. Box-plot interiors flip to the elevated dark fill #242420 with the median line in light INK — both clearly readable.
      Data: Same four rainclouds in the same anyplot palette colors as the light render — Baseline green, Variant A lavender, Variant B blue, Variant C ochre. Cloud shapes, box positions, whisker extents, and rain-point positions are pixel-identical to the light render; only the background, text, spines, and box fill have flipped. Brand green #009E73 reads cleanly on the warm dark surface.
      Legibility verdict: PASS
