review:
  strengths:
  - Spec-faithful raincloud composition built from Makie primitives — cloud above
    baseline (band! + lines! envelope), box centered on baseline (poly! + Rect2f),
    and rain jittered below (scatter!) — visual metaphor unambiguous in both themes.
  - Imprint palette in canonical order with brand green `#009E73` assigned to Baseline;
    PALETTE_BY_CAT keeps colors stable per category after the sort, so data colors
    are pixel-identical between light and dark renders.
  - 'Theme-adaptive chrome wired all the way through: PAGE_BG, INK, INK_SOFT, ELEVATED_BG
    (box fill) flip on ANYPLOT_THEME — no contrast failures in either render, brand
    green stays readable on both surfaces.'
  - Hand-rolled Silverman/IQR-bandwidth Gaussian KDE on a 256-point grid produces
    clean cloud shapes; Variant A's bimodal `cache hit vs cache miss` distribution
    is clearly visible — the exact case a plain boxplot would hide.
  - Realistic, neutral A/B-test page-load context with four meaningfully distinct
    distribution shapes (right-skewed control, bimodal, tight unimodal, heavy-right-tail)
    — DQ-01/02/03 all exercised.
  - Canvas lands exactly on 3200×1800 (Figure(1600,900) × px_per_unit=2); canvas-dimension
    gate not present, no AR-09 clipping in either render.
  - 'Prior-review feedback applied cleanly: rain_gap bumped 0.08 → 0.14 (rain band
    now clearly separated from box bottom), x/y tick sizes equalized at 12pt, left
    spine hidden, categories sorted by median.'
  weaknesses:
  - 'DE-03: Category sort happens but there is no annotation, emphasis, or focal marker
    (no highlighted winner, no shared median reference line, no callout) — the comparison
    is left for the viewer to do. A subtle vertical reference line at the Baseline
    median, or a one-line subtitle naming the fastest variant, would convert four
    parallel rainclouds into a single A/B-test story.'
  - 'DE-01: Aesthetic is competent but generic — solid color blocks plus white/elevated
    boxes, no typographic hierarchy beyond default title vs axis label, no whitespace
    flourish. Consider a thinner cloud outline (linewidth ~1.0 instead of 1.6), a
    slightly muted box stroke, or a refined typographic accent.'
  - 'LM-02: Built-in `Makie.rainclouds!` (or `violin!(...; side = :right)` + `boxplot!`
    + `scatter!`) would be more idiomatic and shorter, and would surface the library''s
    distinctive recipe ecosystem. The manual construction works and gives full layout
    control, but doesn''t lean on Makie''s high-level recipes — points left on the
    table for LM-02.'
  - Markersize 6 px (post px_per_unit=2 → 12 px on canvas) is on the small side for
    the rain band in landscape — alpha=0.6 keeps them readable but a slight bump (8
    px) plus a thin contrasting stroke (1 px ELEVATED_BG) would lift VQ-03 without
    inviting overplotting.
