review:
  strengths:
  - 'Correct horizontal raincloud composition: half-violin clipped to side=''positive''
    rises above each category baseline, boxplot is centered on the baseline, and jittered
    scatter falls below — the cloud-above / rain-below metaphor required by the spec
    is unambiguously rendered.'
  - Anyplot palette applied in canonical order with brand green (#009E73) as the first
    series (Control); colors are pixel-identical between light and dark renders and
    only chrome flips, exactly as the style guide requires.
  - Theme tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT, GRID) thread cleanly through
    title, axis titles, tick labels, gridlines, axis line, legend chrome, and hover
    label — both renders pass the dark-on-dark / light-on-light legibility check.
  - Idiomatic plotly graph_objects build (go.Violin + go.Box + go.Scatter overlaid
    via legendgroup) is the recommended pattern for raincloud in plotly; KISS structure
    with no functions/classes, deterministic seeding, and clean imports.
  - Realistic and neutral domain (reaction times across control + three treatments)
    with sensible scale (250–650 ms, ~80 obs/group + a few outliers); Treatment B's
    bimodality is genuinely visible in the cloud — the plot actually tells a story.
  - Plotly-distinctive features used in the HTML output (rangeslider on x-axis, per-condition
    hovertemplate, legendgroup-linked traces) — leverages the library beyond a static-screenshot
    facsimile.
  - Canvas locked to the mandated 3200×1800 landscape via autosize=False + width/height/scale,
    with explicit margins; title fontsize length-scaled so the mandated '{spec-id}
    · python · plotly · anyplot.ai' format fits comfortably.
  weaknesses:
  - 'Tick labels are a touch small for the 3200×1800 canvas: x-axis ticks render at
    10pt which is fine on desktop but is the smallest comfortable size for the 400-px
    mobile thumbnail — consider bumping to 11pt for a bit more headroom.'
  - 'Box plots are visually understated: marker_color=color is set but boxpoints=False
    makes it a no-op, so all four boxes look identical (same dark/light outline, same
    neutral fill). Tinting the box outline or fill with a desaturated version of the
    category color would improve series identity at a glance and tighten visual hierarchy
    (DE-03).'
  - 'Design Excellence is solid but not standout: layout, palette, and typography
    are clean and theme-correct, but there is no extra emphasis beyond the brand-green
    default — e.g. a subtle highlight on Control (the reference series) or a one-line
    subtitle would raise DE-01/DE-03 without breaking style-guide constraints.'
  - Legend is technically correct but slightly redundant on a horizontal raincloud
    where each row already carries its category label on the y-axis — consider showlegend=False
    on the violins (or move the legend to the top in a single line) to reclaim vertical
    space for the plot area.
