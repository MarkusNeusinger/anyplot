review:
  strengths:
  - 'Correct horizontal raincloud composition: half-violin clipped to side=''positive''
    rises above each category baseline, box-plot centered on the baseline, jittered
    scatter falls below — cloud-above / rain-below metaphor required by the spec is
    unambiguously rendered.'
  - Imprint palette in canonical order with brand green (#009E73) as the first series
    (Control); colors are pixel-identical between light and dark renders and only
    chrome flips, exactly as the style guide requires.
  - Theme tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT, GRID) thread cleanly through
    title, axis titles, tick labels, gridlines, axis line, and hover label — both
    renders pass the dark-on-dark / light-on-light legibility check.
  - Tick fontsize bump from 10pt to 11pt (attempt-1 fix) gives more mobile-thumbnail
    headroom; box outlines now tinted with each category's color (attempt-1 fix) lifts
    series identity in the boxes.
  - Idiomatic plotly graph_objects build (go.Violin + go.Box + go.Scatter overlaid
    via legendgroup) is the recommended pattern for raincloud in plotly; KISS structure
    with no functions/classes, deterministic seeding, and clean imports.
  - Realistic and neutral domain (reaction times across control + three treatments)
    with sensible scale (250–650 ms, ~80 obs/group + a few outliers); Treatment B's
    bimodality is genuinely visible in the cloud — the plot actually tells a story.
  - Plotly-distinctive features used in the HTML output (rangeslider on x-axis, per-condition
    hovertemplate, hoverlabel styling, legendgroup-linked traces) — leverages the
    library beyond a static-screenshot facsimile.
  - Canvas locked to the mandated 3200×1800 landscape via autosize=False + width/height/scale=4,
    with explicit margins; canvas gate not triggered; title fontsize length-scaled
    so the mandated '{spec-id} · python · plotly · anyplot.ai' format fits comfortably.
  weaknesses:
  - 'Legend is still visible at the bottom of both renders (''Condition: Control /
    Treatment A / Treatment B / Treatment C'') even though the code sets showlegend=False
    on every trace AND in update_layout. The visible legend is redundant on a horizontal
    raincloud where the y-axis already labels each row; either the legend hide didn''t
    take effect or the rendered PNGs are stale relative to the latest fix commit.
    Worth verifying that the attempt-1 legend-hide fix actually propagated to the
    PNG render.'
  - Box outlines are tinted with the category color but the effect is subtle at the
    rendered scale; the median line and the box outline both use line.color so the
    median isn't differentiated by emphasis. A slightly thicker median line (e.g.
    width=2.5) or a contrasting median color would tighten the box-plot's information
    density (DE-02/DE-03).
  - 'Design Excellence is solid but not standout: layout, palette, and typography
    are clean and theme-correct, but there is still no extra emphasis on the reference
    series (Control) — e.g. a subtle desaturation of the three Treatment series or
    a one-line subtitle would raise DE-01/DE-03 without breaking style-guide constraints.'
