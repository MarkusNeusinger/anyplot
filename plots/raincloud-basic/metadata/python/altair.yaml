review:
  strengths:
  - 'All three minor weaknesses from Attempt 1 addressed cleanly: median labels lifted
    to dy=-14 (no longer graze IQR-box stroke), rain jitter tightened to -0.22 to
    -0.08 (inside spec''s moderate-jitter envelope), and ''Bimodal distribution''
    caption bumped to INK + bold to match the Peak 1/2 labels'' visual weight.'
  - Faithful raincloud anatomy in horizontal orientation — cloud above, box on baseline,
    rain below — exactly matching the spec's mandatory geometry.
  - 'Anyplot palette applied correctly: Control = #009E73 (first series), with semantic
    red #AE3030 reserved for the median tick + median value labels.'
  - 'Theme-adaptive chrome flips cleanly: data hues identical between light and dark
    renders, only background/text/box-fill flip.'
  - 'Strong altair idiom: transform_density + transform_calculate project the half-violin
    upward from each baseline via condition_num + 0.04 + density * 100.'
  - Canvas lands exactly on 3200×1800 via inline PAD-only block; no AR-09 edge clipping.
  weaknesses:
  - 'LM-02 leaves altair power on the table: only .interactive() (pan/zoom) and tooltips
    — no alt.selection_point/add_params for interactive condition cross-filter, no
    faceting. A flagship altair raincloud should bind a selection on condition:N to
    mark opacity so the user can isolate a single condition.'
  - '''Bimodal distribution'' caption + arrow + peak labels are anchored to fixed
    (x, y) coordinates (e.g. x=355, y=3.95). If condition_order is reordered or jitter
    geometry changes, annotations would float free — slightly fragile compared to
    data-driven annotation.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1, 3200×1800 exact.
      Chrome: Bold dark title "raincloud-basic · python · altair · anyplot.ai" centered at top. X-axis title "Reaction Time (ms)" in bold INK; tick labels 260–600 in INK_SOFT. Y-axis baseline labels "Control"/"Treatment A"/"Treatment B" in bold INK. Subtle vertical gridlines at low opacity. All readable.
      Data: Three half-violin clouds rise above baselines — green #009E73 (Control, bottom), purple #C475FD (Treatment A, middle), navy-blue #4467A3 (Treatment B, top). IQR boxes with elevated #FFFDF6 fill, dark stroke, rounded corners; semantic-red #AE3030 vertical median tick; red numeric median labels "442"/"383"/"361" sitting clear of the box stroke (dy=-14 nudge applied). Whisker rules extend from each box. Rain dots in matching category colors fall below baselines within tightened band (-0.22 to -0.08). Treatment B has italic-bold "Peak 1"/"Peak 2" labels, dashed connector, and INK + bold "Bimodal distribution" caption.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17, 3200×1800 exact.
      Chrome: Title and y-baseline labels in light INK #F0EFE8; tick labels, peak labels, bimodal caption in light INK_SOFT variant. IQR box fill flips to #242420 with light stroke. All text clearly readable — no dark-on-dark failures.
      Data: Identical to light render — same #009E73/#C475FD/#4467A3 cloud and rain colors, same semantic red #AE3030 median tick + red numeric labels (readable against the elevated-dark box surface).
