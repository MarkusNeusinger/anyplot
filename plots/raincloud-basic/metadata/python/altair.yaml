review:
  strengths:
  - Faithful raincloud anatomy in horizontal orientation — half-violin cloud rises
    ABOVE each baseline, IQR box sits centered ON the baseline, and jittered rain
    points fall BELOW, exactly matching the spec's 'cloud above / rain below' metaphor.
  - 'Anyplot palette applied correctly: first categorical series (Control) is #009E73,
    with #C475FD and #4467A3 for Treatment A/B; semantic red #AE3030 reserved for
    the median tick — clear semantic separation between category and statistic.'
  - Treatment B bimodality is explicitly storytold with two italic peak labels, a
    dashed horizontal connector, and a 'Bimodal distribution' caption — gives the
    plot a real focal point and demonstrates why a raincloud beats a plain boxplot.
  - 'Theme-adaptive chrome flips cleanly between #FAF8F1 and #1A1A17 backgrounds while
    data colors stay identical; INK_SOFT tick labels and INK titles read well in both
    renders.'
  - 'Strong altair idiom: transform_density for KDE, transform_calculate to project
    the half-violin upward via condition_num + density*100, layered composition (violin
    + whisker + box + median tick + median labels + strip + annotations) with shared
    scales — leverages multiple distinctive altair features.'
  - Canvas lands exactly on 3200×1800 with PAGE_BG padding, no AR-09 edge clipping,
    all axis labels and the long mandated title fully visible in both themes.
  weaknesses:
  - The median value labels ('442', '383', '361') are placed dy=-10 directly above
    each box top edge and slightly clip / overlap the upper IQR-box stroke — nudge
    them further above (e.g. dy=-14 or anchor them outside the box envelope) so the
    numbers float cleanly above the box without touching the stroke.
  - Rain jitter offset uses np.random.uniform(-0.30, -0.08), a 0.22-unit range that
    is wider than the spec's recommended 'moderate jitter (0.05-0.1)'. The visual
    still reads as rain, but tightening the jitter band (e.g. -0.22 to -0.08) would
    keep the rain band more compact and visually distinct from the box.
  - '''Bimodal distribution'' caption is rendered in INK_SOFT and sits between gridlines
    — it reads as quite subtle, especially in the light render. Consider INK color
    (not INK_SOFT) or a small bold weight so the storytelling caption matches the
    visual weight of the ''Peak 1'' / ''Peak 2'' labels it summarizes.'
  - 'LM-02 leaves some altair power on the table: there is no `selection_point()`
    / `add_params()` legend-style interactivity, no faceting, and the tooltips are
    minimal — for a flagship altair raincloud, an interactive selection or hover-driven
    cross-filter on condition would strengthen distinctive-features scoring.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 as required — not pure white, not dark.
      Chrome: bold dark title "raincloud-basic · python · altair · anyplot.ai" centered at top, fully visible. X-axis title "Reaction Time (ms)" in dark INK with bold weight; tick labels 260–600 in 20-unit steps clearly visible in INK_SOFT gray. Y-axis condition labels "Control", "Treatment A", "Treatment B" in bold dark INK at three baselines. Subtle vertical gridlines at gridOpacity ~0.15. No spine, no y-ticks (intentional minimalism).
      Data: three half-violins above each baseline — green #009E73 (Control), purple #C475FD (Treatment A), navy-blue #4467A3 (Treatment B). IQR boxes have ELEVATED_BG #FFFDF6 fill with dark stroke, vertical red #AE3030 median tick with red numeric label above each box. Jittered rain dots in the matching category color sit below each baseline. Italic "Peak 1" and "Peak 2" labels with a dashed connector and "Bimodal distribution" caption call out Treatment B's bimodality.
      Legibility verdict: PASS — all chrome and data text readable.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 as required — not pure black.
      Chrome: title in light INK #F0EFE8 clearly visible against the dark background; x-axis title and tick labels in lighter INK_SOFT #B8B7B0 fully readable; condition labels on y-axis bold and clearly readable. No dark-on-dark failures. Gridlines subtle but visible.
      Data: identical hues to the light render — #009E73 green Control, #C475FD purple Treatment A, #4467A3 blue Treatment B; only the IQR-box fill flips to ELEVATED_BG #242420 with a light stroke (matches theme inversion). Semantic red median tick is identical and clearly visible. Annotation labels and dashed connector still readable.
      Legibility verdict: PASS — all chrome and data text readable, no dark-on-dark elements detected.
