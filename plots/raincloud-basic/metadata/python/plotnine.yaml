review:
  strengths:
  - Correct raincloud anatomy in both themes — half-violin clouds rise above each
    category baseline, narrow boxplots sit on the baseline, and jittered rain falls
    below, perfectly matching the spec's 'cloud rises, rain falls' visual metaphor
  - Smart use of plotnine's stage(after_scale='x+0.15' / 'x-0.18') idiom to nudge
    violins up and jitter down on a categorical axis — a non-obvious technique that
    produces clean offsets without manual coordinate math
  - Treatment B's synthesized bimodal distribution (mixture of N(350,40) and N(500,45))
    showcases the unique value of raincloud plots over plain boxplots — the two clusters
    are clearly visible in the cloud and the rain
  - 'Palette compliance is exact: Control = #009E73 (brand green, reference group),
    Treatment A = #C475FD, Treatment B = #4467A3 (positions 1-3 of the anyplot palette),
    and the data colors are identical between light and dark renders with only chrome
    flipping'
  - Theme tokens (PAGE_BG / INK / INK_SOFT / INK_MUTED / ELEVATED_BG) are threaded
    correctly through plot_background, panel_background, axis_line, text, grid, and
    boxplot fill — both renders pass the dark-on-dark / light-on-light readability
    checks
  - 'Clean script: no functions/classes, seeded RNG (np.random.seed(42)), no unused
    imports, correct PNG output as plot-{THEME}.png at the mandated 8×4.5in @ dpi=400
    (3200×1800)'
  weaknesses:
  - 'The ''Bimodal: two distinct response clusters'' annotation overlaps with Treatment
    B''s rain points in both renders — the text sits at pre-flip (x=0.55, y=425),
    which after coord_flip places it directly inside the Treatment B rain row. Move
    the text further below (lower x value before flip, e.g. x=0.4) or pin it outside
    the plot area / use a callout box with a subtle background fill so the text floats
    above the rain dots without colliding with them.'
  - Title fontsize=12pt with the long mandated title 'raincloud-basic · python · plotnine
    · anyplot.ai' fills only ~55% of plot width and looks slightly undersized for
    a 3200×1800 canvas — consider raising plot_title size to 14pt for a more confident
    header without risking overflow.
  - The dashed segment arrows for the bimodal callout (x=0.7→0.95, y=370→350 and y=480→500)
    point into the gap between the cloud and the rain rather than landing directly
    on the two visible cluster peaks of the half-violin — anchor the arrow tips inside
    the violin's left/right humps so the visual link between annotation text and the
    bimodal feature is unambiguous.
  - 'axis_line is drawn in INK_SOFT but the warm/elevated boxplot fill (#FFFDF6 light
    / #242420 dark) reads very close to the panel background, making the box outline
    the only thing carrying the boxplot shape — consider raising boxplot edge contrast
    (e.g. use INK instead of INK_SOFT for the box stroke) so the median and quartile
    markers pop more strongly inside the cloud''s coverage area.'
  - The base text size in theme(text=element_text(size=7)) is small enough that mobile
    readers at 400px width may struggle with the annotation text — annotation sizes
    12-13pt are fine, but the inherited size=7 base means anything not explicitly
    sized (geom defaults, etc.) is borderline.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page and panel — passes the warm-not-pure-white check.
      Chrome: Title "raincloud-basic · python · plotnine · anyplot.ai" centered at top in dark INK, fully readable. Y-axis label "Experimental Condition" (rotated), x-axis label "Reaction Time (ms)" with units, x-axis ticks at 300/400/500/600 — all in soft dark ink, all clearly readable. Subtle vertical grid lines only, no y-grid (panel_grid_major_y blanked). Single thin axis line in INK_SOFT. No legend (categories on y-axis so legend correctly hidden).
      Data: Three horizontal raincloud rows top→bottom: Control (green #009E73), Treatment A (purple #C475FD), Treatment B (blue #4467A3) — first series is brand green ✓. Each row shows a half-violin cloud above the baseline, a narrow boxplot on the baseline (off-white fill, dark edges, median tick visible), and jittered alpha-blended scatter rain below. Treatment B's bimodality is visibly captured in both the cloud shape and the rain distribution.
      Annotations: "Faster responses vs. Control →" sits in the left margin between Treatment A and Treatment B rows, "← Bimodal: two distinct response clusters" sits below Treatment B with two dashed segment arrows pointing into the data. The Bimodal annotation overlaps with Treatment B's rain points — visible but readable.
      Legibility verdict: PASS — all chrome and annotations readable; minor annotation/data overlap noted under weaknesses.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) page and panel — passes the warm-not-pure-black check.
      Chrome: Title in light INK (#F0EFE8), axis labels in light ink, ticks in INK_SOFT light, vertical grid lines subtle light, axis_line in light INK_SOFT — all readable against the dark surface, no dark-on-dark failures. Boxplot fill switches to the dark elevated tone (#242420) with light edges. Brand green #009E73 still pops on the dark background as expected.
      Data: Same three categories in identical positions and identical brand-palette colors (Control green, Treatment A purple, Treatment B blue) — chrome flips but data colors stay constant, exactly as the palette rule requires. Cloud-box-rain anatomy identical.
      Annotations: Same two annotations in INK_SOFT light — both clearly readable against the dark background. Same overlap with Treatment B's rain points as in light render.
      Legibility verdict: PASS — no dark-on-dark text, all chrome elements visible, data colors identical to light render.
