      Data: Three horizontal raincloud rows top-to-bottom: Control (green #009E73), Treatment A (purple #C475FD), Treatment B (blue #4467A3) — first series is brand green ✓. Each row shows a half-violin cloud above the baseline (style="right" + stage after_scale x+0.15), a narrow boxplot on the baseline (off-white #FFFDF6 fill, dark INK edges, median tick visible), and jittered alpha=0.6 scatter rain below the baseline (stage after_scale x-0.18). Treatment B's bimodality is clearly visible in the cloud shape and the rain distribution.
      Annotations: "Faster responses vs. Control →" sits in the gap between Treatment A and Control rows in italic INK_SOFT; "Bimodal: two distinct response clusters" sits below Treatment B in italic INK_SOFT with two dashed segment arrows pointing up into Treatment B's two cloud humps at y=350 and y=500.
