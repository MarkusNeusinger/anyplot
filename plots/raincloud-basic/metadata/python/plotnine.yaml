review:
  strengths:
  - Correct raincloud anatomy in both renders — half-violin clouds rise above each
    category baseline (cloud_shift=+0.15 via stage after_scale), narrow boxplots sit
    on the baseline, and jittered rain falls below (-0.18 nudge), perfectly matching
    the spec's 'cloud rises, rain falls' visual metaphor
  - Title fontsize raised from 12pt to 14pt and the dashed callout arrows now anchor
    inside Treatment B's two violin humps (y=350 and y=500) — both previous-review
    weaknesses addressed; the bimodal annotation is also moved further from the rain
    (x=0.35) and simplified to a single line for cleaner reading
  - Boxplot stroke upgraded from INK_SOFT to INK so the median and quartile markers
    carry stronger contrast inside the cloud's coverage area in both themes — directly
    addresses the prior 'box outline reads close to background' weakness
  - 'Palette compliance is exact: Control=#009E73 (brand green, reference group),
    Treatment A=#C475FD, Treatment B=#4467A3 — Imprint palette positions 1/2/3 with
    semantic assignment, and the data colors are pixel-identical between light and
    dark renders (only chrome flips)'
  - Theme tokens (PAGE_BG/INK/INK_SOFT/INK_MUTED/ELEVATED_BG) threaded through plot_background,
    panel_background, axis_line, text, grid, boxplot fill, annotation text, and arrow
    color — both renders cleanly pass the dark-on-dark / light-on-light readability
    checks
  - Treatment B's synthesized bimodal distribution (mixture of N(350,40) and N(500,45))
    showcases the unique value of raincloud plots over plain boxplots; the two clusters
    are clearly visible in the half-violin shape and the rain dots, then explicitly
    annotated for the reader
  - 'Clean, idiomatic plotnine: no functions/classes, seeded RNG (np.random.seed(42)),
    no unused imports, advanced use of stage(after_scale=...) for category-axis nudges,
    correct PNG output as plot-{THEME}.png at the mandated 8x4.5in @ dpi=400 (3200x1800)'
  weaknesses:
  - The two dashed callout arrows pointing into Treatment B's bimodal humps cross
    directly through Treatment B's boxplot row (y-extent of the box and rain) before
    reaching the cloud — visually the lines pass over the box and median tick. Consider
    either thinning the lines further (size=0.3), increasing alpha softening (e.g.
    add alpha=0.5 to annotate('segment',...)), or anchoring the arrow start position
    to the side of the boxplot (e.g. xend at the cloud's left edge instead of straight
    up through the box) so the arrows read as guides rather than as overlays cutting
    through the data.
  - The 'Faster responses vs. Control →' callout sits at pre-flip (x=1.55, y=290),
    which lands in the gap between Treatment A and Control rows but the leftmost rain
    dots of Treatment A and the leftmost cloud edge of Control crowd the text — a
    couple of jittered Treatment A points appear close enough to clip the descenders
    of 'Faster responses'. Either raise x to ~1.7 (further from Treatment A's rain)
    or move the annotation entirely outside the panel (e.g. as a subtitle / caption-style
    label) so it cannot collide with any individual rain point.
  - Base text size in theme(text=element_text(size=7)) is small enough that on the
    400-px scaled mobile preview the inherited base size (anything not explicitly
    resized — geom defaults, legend strings, etc.) hovers near the lower readability
    bound. Raising the base text size to ~9pt (and keeping axis_text=8 as the explicit
    override) would lift mobile legibility without changing the desktop look.
  - The Treatment A annotation reads 'Faster responses vs. Control →' but the arrow
    glyph is part of the text string rather than an actual annotate('segment',...)
    — a small dashed line pointing from the text to Treatment A's median (~380 ms)
    would make the comparative claim graphically explicit and consistent with the
    Bimodal callout's use of real arrows for the bimodal humps.
