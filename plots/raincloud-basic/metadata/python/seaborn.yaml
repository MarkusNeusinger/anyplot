review:
  strengths:
  - 'Raincloud metaphor is unambiguous in both renders: half-violin clouds rise above
    each category baseline, the outlined box plot sits exactly on the baseline, and
    jittered rain points fall below — the spec''s ''rain from a cloud'' visual is
    preserved end to end.'
  - 'Anyplot palette is applied correctly: Control = #009E73 (first series), Treatment
    A = #C475FD, Treatment B = #4467A3, and the colors are identical between light
    and dark renders — only chrome flips, as required.'
  - 'Theme adaptation is fully threaded: warm off-white #FAF8F1 / warm near-black
    #1A1A17 backgrounds, INK/INK_SOFT/INK_MUTED tokens flow into spines, ticks, labels,
    annotation boxes, and edgecolor on rain markers — no dark-on-dark or light-on-light
    failures.'
  - 'Two thoughtful annotations carry the storytelling: a callout on Treatment B''s
    upper mode highlights the bimodality (the very feature the raincloud is meant
    to reveal vs. a plain boxplot), and a second callout quantifies Treatment A''s
    ~59 ms speedup vs. Control. Both use subtle arrows on rounded ELEVATED_BG boxes
    — refined, not noisy.'
  - Box plot is rendered as outlined-only (fill=False, linewidth=1.4) with thickened
    median — uses palette to color outlines/whiskers/caps/median in one stroke, avoiding
    the fragile post-hoc artist recoloring that plagues many seaborn raincloud attempts.
  - 'Synthetic data is well-chosen: Treatment B is deliberately bimodal (two normals
    at 350±30 and 480±40) so the raincloud actually demonstrates its claimed advantage
    over a plain box plot — strong DQ-01 feature coverage.'
  weaknesses:
  - Treatment B's bimodality is more visible in the box-plot internals (off-center
    median, wide IQR) than in the cloud silhouette itself — the half-violin reads
    as a single skewed hump with only a faint shoulder around 480 ms. Consider increasing
    the violin's KDE resolution or reducing the bandwidth (e.g. bw_adjust=0.6) so
    the upper mode reads as a distinct second peak rather than a shoulder, which is
    the whole point of choosing a bimodal example for a raincloud demo.
  - The 'Bimodal distribution revealed by raincloud' annotation arrow lands on the
    upper-right tail of the Treatment B violin (~500 ms) rather than between the two
    suspected modes. Either re-anchor the arrow tip near the valley around ~420 ms
    (where the bimodality is most diagnostic) or rephrase the label to point at the
    specific mode it's calling out.
  - Annotation text at fontsize=7 is on the small side for a 3200×1800 canvas — readable
    at full size but starts to feel cramped when the page resizes to the 800/1200
    px catalog variants. Bumping to ~9 pt would keep the annotation boxes visually
    proportional to the 10 pt axis labels without crowding the plot area.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — matches the light-theme spec, not pure white.
      Chrome: title "raincloud-basic · seaborn · anyplot.ai" rendered in dark INK at the top
        and well-centered. Y-axis label "Condition" and x-axis label "Reaction Time (ms)"
        are dark and clearly readable. Tick labels (300, 350 … 550 on x; Control, Treatment A,
        Treatment B on y) are INK_SOFT and legible. Vertical grid lines at major x-ticks
        are subtle. Top and right spines removed; left and bottom spines visible at thin
        weight. Two annotation boxes ("Bimodal distribution revealed by raincloud" and
        "~59 ms faster than Control") render as rounded #FFFDF6 boxes with dark text and
        thin gray arrows — both fully legible.
      Data: three rows, top-to-bottom Treatment B / Treatment A / Control. Each shows
        a half-violin "cloud" above the baseline, an outlined box plot exactly on the
        baseline, and a jittered strip of points (alpha~0.55) below the baseline.
        Colors: Control = green #009E73 (first series, correct), Treatment A = light
        purple #C475FD, Treatment B = blue #4467A3 — anyplot palette in canonical order.
      Legibility verdict: PASS — all text dark on light, no overlap, all elements within canvas.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — matches the dark-theme spec, not pure black.
      Chrome: title and axis labels rendered in light INK (#F0EFE8), clearly readable
        against the near-black surface. Tick labels in INK_SOFT (#B8B7B0) — visible but
        appropriately understated. Grid lines remain subtle. Annotation boxes flip to the
        dark ELEVATED_BG (#242420) with light text and thin gray arrows — no dark-on-dark
        failure, no light-on-light failure.
      Data: colors are identical to the light render — Control = #009E73 green, Treatment A
        = #C475FD purple, Treatment B = #4467A3 blue. Brand green is fully visible against
        the near-black background. Half-violins, box outlines, and rain points all
        distinguishable from the background. The rain-point edgecolor flips to PAGE_BG
        (#1A1A17) which gives the markers a subtle dark halo against the cloud and
        background — works on both themes.
      Legibility verdict: PASS — no chrome-token failures observed.
