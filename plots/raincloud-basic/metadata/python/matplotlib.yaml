review:
  strengths:
  - 'Raincloud composition is faithful to the spec: cloud above the baseline (fill_between
    with a scipy gaussian_kde half-violin), boxplot centered on the baseline, jittered
    rain below — the cloud-rises / rain-falls metaphor reads cleanly in both renders.'
  - 'Theme-adaptive chrome is applied consistently: PAGE_BG, INK, INK_SOFT tokens
    flow through title, axis labels, ticks, spines, grid, boxplot edge/whisker/cap,
    and the box fill uses ELEVATED_BG so the box stays subtly visible against the
    page surface in both light and dark modes.'
  - Deliberate distribution shapes (unimodal Control, clearly bimodal Treatment A,
    right-skewed Treatment B with outliers) actively demonstrate what a raincloud
    reveals over a plain boxplot — strong data storytelling for the spec's intent.
  - 'First categorical series is brand green #009E73, with positions 2 (lavender)
    and 3 (blue) used in canonical anyplot palette order across both renders; data
    colors are identical light vs dark, only chrome flips.'
  - 'Clean KISS code: no helper functions or classes, single loop over categories,
    np.random.seed(42) for reproducibility, modern zip(..., strict=True), and idiomatic
    matplotlib (Axes methods, explicit fig/ax, zorder=1/2/3 layering, set_axisbelow
    for the grid).'
  weaknesses:
  - Tick labels at fontsize=8pt are at the small end of the readable range — bumping
    to 9pt would noticeably improve mobile readability at the 400 px srcset variant
    without disturbing the layout (everything else stays at the style-guide defaults).
  - In the dark render the boxplot fill (#242420 ELEVATED_BG) is intentionally close
    to the page background (#1A1A17) so the box reads as quiet chrome, but at thumbnail
    scale the box almost disappears. Consider thickening the box edge from linewidth=1.2
    to ~1.6 (or using INK rather than INK_SOFT for the box edge) so the IQR rectangle
    still parses at 400 px.
  - Whisker caps are drawn at matplotlib's default tiny size; lengthening the caps
    slightly (e.g. via capwidths=0.04 on ax.boxplot) would make the whisker endpoints
    easier to read at the wide horizontal layout.
