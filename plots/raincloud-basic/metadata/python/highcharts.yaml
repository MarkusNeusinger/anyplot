review:
  strengths:
  - Faithful raincloud layout — half-violin 'cloud' above each category baseline,
    box plot centered on the baseline, jittered 'rain' below — visual metaphor reads
    instantly on both themes
  - 'Theme-adaptive chrome is wired correctly: PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    GRID all derive from ANYPLOT_THEME — box fill, whiskers, polygon outlines and
    annotation backgrounds all flip cleanly between light/dark'
  - 'Anyplot palette in canonical order (#009E73, #C475FD, #4467A3, #BD8233) with
    first series = #009E73, plus partially transparent fills that keep the four clouds
    visually distinct without competing with the data points'
  - Idiomatic highcharts-core usage — inverted scatter chart, PolygonSeries for the
    half-violin, native BoxPlotSeries with highcharts-more, ScatterSeries for the
    rain; chart.renderer.label is used for the four color-coded annotation callouts
    (a genuinely distinctive highcharts feature)
  - Realistic and neutral data scenario (reaction times across control + three treatments,
    80 obs each) with deliberate bimodality on Treatment B that the KDE cloud and
    the 'Bimodal distribution' callout both surface
  - 'Strong storytelling: each category has a colored callout box (Baseline / Fastest
    responses / Bimodal distribution / Widest variability) that names the takeaway
    rather than restating the data'
  weaknesses:
  - 'Legend ↔ annotation overlap (top-right): the ''Baseline / Mean ~450 ms'' callout
    sits on top of the ''Control'' legend entry in BOTH renders — the green legend
    swatch and the ''Control'' text are partially obscured by the callout. Either
    move the legend (e.g. align:''left'' or y offset below the title block) or move
    the Baseline annotation to a different x_frac/y_frac that doesn''t collide with
    the legend rectangle.'
  - 'Small stray vertical mark on the far-left edge near the Treatment B baseline
    (around the left margin / x≈70 px). Looks like a leftover tick or axis stub from
    the inverted axis. Set explicit tickLength: 0 on the x_axis (the category axis)
    — currently only tickWidth: 0 is set, which hides the stroke but the tick geometry
    may still render in some Highcharts builds.'
  - Bimodal-distribution annotation overlaps the right tail of the Treatment B violin/whisker
    (annotation x_frac=0.70 lands on top of the data). Move it to a free region —
    either above the cloud (lower y_frac) or to the right of the whisker tip — so
    it labels the data without sitting on it.
  - Annotation callouts are positioned with hard-coded x_frac/y_frac values relative
    to plotWidth/plotHeight — they don't track the data, so any change to value range
    or marker positions will desync them. Consider anchoring to data coordinates via
    chart.xAxis[0].toPixels / yAxis[0].toPixels so future repairs don't have to re-tune
    the fractions.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) — correct light surface, not pure white.
      Chrome: title "raincloud-basic · python · highcharts · anyplot.ai" in bold near-black, large and readable; subtitle "Reaction time distributions across four experimental conditions" in soft grey directly under the title; x-axis title "Reaction Time (ms)" centered at the bottom in bold dark ink; x-axis tick labels (100, 150, … 650, step 50) in soft grey; y-axis category labels "Control / Treatment A / Treatment B / Treatment C" in dark ink along the left margin. All chrome is legible against the off-white surface.
      Data: four raincloud rows, each with the half-violin cloud rising upward, a white-fill box plot with dark median/whiskers on the category baseline, and jittered scatter "rain" below. Colors follow the anyplot palette in canonical order — green #009E73 (Control), lavender #C475FD (Treatment A), blue #4467A3 (Treatment B), ochre #BD8233 (Treatment C). Treatment B's cloud visibly shows a bimodal shape. Four colored annotation callouts ("Baseline", "Fastest responses", "Bimodal distribution", "Widest variability") are placed near each row with a colored stroke matching that row's series.
      Legibility verdict: PASS for chrome and data text — but the "Baseline" annotation callout overlaps the "Control" legend entry in the top-right, partially hiding the legend swatch and the word "Control" (VQ-02 issue rather than a legibility failure).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) — correct dark surface, not pure black.
      Chrome: title in light ink (~#F0EFE8), subtitle and tick labels in muted light grey, axis title and category labels in lighter ink — all are clearly readable, no dark-on-dark failures.
      Data: identical four-row layout with the SAME four data colors as the light render (#009E73 / #C475FD / #4467A3 / #BD8233) — only the box-plot fill flips from cream (#FFFDF6) to charcoal (#242420) and the white spine/whisker chrome flips to light ink. Brand green is still distinct against the warm-black surface, as expected.
      Legibility verdict: PASS — all text and markers are clearly distinguishable on the dark background. The same Baseline-callout-vs-Control-legend overlap is present, but it is a layout issue, not a theme-readability failure.
