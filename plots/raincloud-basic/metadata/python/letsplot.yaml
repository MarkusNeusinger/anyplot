review:
  strengths:
  - 'Correct raincloud anatomy: half-violin clouds nudged above each baseline (show_half=1),
    boxplot centered on the category baseline, and jittered rain points below — the
    spec''s cloud-up / box-on-line / rain-down metaphor is preserved cleanly for all
    three conditions.'
  - 'Idiomatic lets-plot composition: layered geom_violin / geom_boxplot / geom_jitter
    combined via position_nudge for layer offset, scale_y_discrete with explicit limits
    to control category order, and scale_*_manual driven by a typed palette dict.'
  - Theme-adaptive chrome wired through tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    RULE) so both light (#FAF8F1) and dark (#1A1A17) renders are fully legible — no
    dark-on-dark or light-on-light failures, no pure black/white backgrounds.
  - 'Canonical Imprint palette in canonical order: Control = #009E73 (brand green,
    first series), Treatment A = #C475FD lavender, Treatment B = #4467A3 blue. Data
    colors are identical across light and dark — only chrome flips.'
  - 'Strong data storytelling: italic-gray annotations with arrows highlight Treatment
    B''s bimodal cluster structure and Treatment A''s ~70 ms speed advantage, surfacing
    exactly the kind of insight a raincloud is meant to reveal.'
  - 'Arrow routing fix from attempt 1 has landed: arrowheads no longer terminate inside
    the violin cloud fills — they now resolve outside the violin silhouettes, addressing
    the prior VQ-02 deduction.'
  - x-axis line removed (axis_line_x=element_blank) so the subtle vertical grid alone
    anchors the x-scale, picking up the DE-02 refinement called out in attempt 1.
  - Canvas exact at 3200×1800 (ggsize(800,450) + scale=4); canvas dimension gate not
    triggered. Reproducible (np.random.seed(42)), no functions/classes, only-used
    imports, saves both plot-{THEME}.png and plot-{THEME}.html.
  weaknesses:
  - 'DE-01: Title at plot_title size=16 looks slightly compact relative to the wide
    landscape canvas — the mandated title fills only ~30–35% of the plot width instead
    of the 50–70% sweet spot. Either nudge plot_title size up a couple of points or
    align it more deliberately (hjust) to give it more visual weight without overflowing.'
  - 'DE-02: Boxplot interior in the dark render appears noticeably lighter than the
    intended ELEVATED_BG (#242420) — it reads almost cream/light-gray against the
    warm near-black background, which is visually striking but does not match the
    dark-mode chrome token actually requested in the code. Worth verifying that the
    explicit geom_boxplot(fill=ELEVATED_BG, ...) override is winning over the aes(fill=''condition'')
    mapping; if lets-plot is leaking the categorical fill through alpha=0.95, an explicit
    override via fill=ELEVATED_BG together with dropping the fill aesthetic on the
    boxplot layer (or using fill=None on aes for this geom) would lock the box interior
    to the elevated dark token.'
  - 'DE-03: A small touch that would tighten the storytelling further — the ''Two
    distinct response clusters'' annotation uses two arrowheads to point at the bimodal
    peaks, but the arrows land in the rain area below the baseline rather than at
    the cloud peaks themselves; nudging the segment endpoints up to land just outside
    the top edge of each violin peak would make the bimodality call-out unambiguous.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — matches the anyplot light surface, not pure white.
      Chrome: title "raincloud-basic · python · letsplot · anyplot.ai" in bold dark ink at the top of the canvas. Y-axis category labels (Control, Treatment A, Treatment B) in bold dark ink; x-axis title "Reaction Time (ms)" and y-axis title "Experimental Condition" in dark gray; x-tick labels 200, 250, …, 700 in dark gray. Subtle vertical major grid lines, axis lines and ticks hidden.
      Data: three half-violin clouds rise above each category baseline in canonical anyplot colors — Control = #009E73 brand green, Treatment A = #C475FD lavender, Treatment B = #4467A3 blue. Boxplots with light/cream ELEVATED_BG fill sit on the baselines, showing median + quartile markers. Color-matched jittered rain points (alpha ~0.5) fall below each baseline. Italic gray annotations with thin arrows highlight Treatment A's faster mean and Treatment B's two response clusters.
      Legibility verdict: PASS — all title, axis title, tick, category, and annotation text is clearly readable against the off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — matches the anyplot dark surface, not pure black.
      Chrome: title and axis titles render in light INK (#F0EFE8) and are fully readable; tick labels render in light INK_SOFT and are legible against the dark surface. Vertical grid lines are subtle light rule lines (RULE token). Axis lines/ticks hidden as in light render.
      Data: data colors are IDENTICAL to the light render (Control = brand green #009E73, Treatment A = lavender, Treatment B = blue) — only chrome flipped. Italic annotations and arrow segments switch to light INK_SOFT — no dark-on-dark text failures detected. Brand green reads cleanly against the dark surface. One minor observation: the boxplot interior fills appear lighter than the intended dark ELEVATED_BG (#242420) token would suggest, reading closer to a cream/light-gray rather than a near-black box — visually striking and high-contrast but worth verifying the explicit fill override is winning over the categorical fill mapping.
      Legibility verdict: PASS — every text element (title, axis titles, ticks, category labels, italic annotations) is readable against the near-black background; no dark-on-dark text.
