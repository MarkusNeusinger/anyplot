review:
  strengths:
  - 'Correct raincloud anatomy: half-violin clouds nudged above each baseline (show_half=1),
    boxplot centered on the baseline, jittered rain below — the spec''s vertical metaphor
    (cloud up, rain down) is preserved cleanly for all three conditions.'
  - 'Idiomatic lets-plot composition: ggplot grammar with layered geom_violin/geom_boxplot/geom_jitter,
    position_nudge to offset each layer, scale_y_discrete with explicit limits to
    control category order, and scale_*_manual with the anyplot palette.'
  - Theme-adaptive chrome wired through tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    RULE) so both light (#FAF8F1) and dark (#1A1A17) renders are fully legible — no
    dark-on-dark or light-on-light failures.
  - 'Canonical anyplot palette in canonical order: Control = #009E73 (brand green,
    first series as required), Treatment A = #C475FD, Treatment B = #4467A3.'
  - 'Strong data storytelling: italic-gray annotations with arrows highlight the bimodal
    Treatment B distribution and Treatment A''s ~70ms speed advantage — turns a basic
    raincloud into a real insight.'
  - 'Clean code: KISS structure (no functions/classes), np.random.seed(42) for reproducibility,
    only used imports, saves both plot-{THEME}.png and plot-{THEME}.html as required.'
  - Canvas dimensions exact at 3200x1800 (ggsize(800,450) + scale=4) — canvas gate
    not triggered.
  weaknesses:
  - The two annotation arrows for 'Two distinct response clusters' both terminate
    inside the Treatment B violin curve — the arrowheads overlap the cloud fill, creating
    minor visual clutter. Consider routing the arrows so the heads land just outside
    the violin silhouette (e.g. end at the violin's outline, not inside the fill),
    or shorten the segments so they stop at the cluster centers without crossing the
    boundary.
  - The annotation arrow for '~70ms faster mean than Control' crosses through the
    upper portion of the Treatment A violin curve on its way to the cluster — the
    line passes through filled cloud area. Adjust the arrow start/end so the segment
    skirts around the violin shape rather than piercing it.
  - 'DE-02 could push further: the x-axis line (axis_line_x at INK_SOFT) is the only
    spine and is fine, but visible vertical grid major lines together with the axis
    line slightly compete. Consider removing axis_line_x entirely (theme_minimal-style)
    since the vertical grid already anchors the x-scale, leaving the chart even cleaner.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — neither pure white nor dark. Confirmed.
      Chrome: Title "raincloud-basic · python · letsplot · anyplot.ai" is bold dark ink at top, fully visible above the plot area (no clipping). Y-axis category labels "Control", "Treatment A", "Treatment B" are bold dark ink, clearly readable. X-axis tick labels (200, 250, ..., 700) and the "Reaction Time (ms)" / "Experimental Condition" titles are dark gray on the off-white surface. Vertical major grid lines are subtle rgba(26,26,23,0.15). Italic annotations in INK_SOFT gray with thin arrows are visible and legible.
      Data: Control = brand green (#009E73), Treatment A = lavender (#C475FD), Treatment B = blue (#4467A3) — canonical anyplot order. Box plots have a near-white ELEVATED_BG fill with dark outlines. Rain points are color-matched with alpha 0.5 below each baseline; half-violin clouds rise above. The visual metaphor (cloud up, rain down) reads clearly.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — not pure black, slight warmth visible. Confirmed.
      Chrome: Title and all axis labels render in light ink (#F0EFE8) and are fully readable against the dark surface. Tick labels render in INK_SOFT light gray — readable. Vertical grid lines are subtle light rule. Italic annotations are light gray with light arrows — readable, no dark-on-dark failures detected.
      Data: Control green, Treatment A lavender, Treatment B blue — identical hues to the light render (chrome flipped, data colors held constant as required). Box plot fills use the dark ELEVATED_BG (#242420) with the same dark INK box outlines — the box outlines are slightly thinner-looking against the dark fill but remain visible.
      Legibility verdict: PASS
