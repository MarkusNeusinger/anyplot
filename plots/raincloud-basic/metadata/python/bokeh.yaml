review:
  strengths:
  - Correct raincloud layout — half-violin cloud rises above each category baseline,
    boxplot sits on the baseline, jittered rain falls below; the visual metaphor reads
    cleanly in both renders.
  - Horizontal orientation per spec — categories on the y-axis, reaction time on x-axis
    with ms units in the axis title.
  - Anyplot palette applied in canonical order — Control=#009E73 (brand green), Treatment
    A=#C475FD, Treatment B=#4467A3, Treatment C=#BD8233 — and data colors are identical
    between light and dark renders, with only chrome flipping.
  - 'Theme-adaptive chrome handled correctly: light render uses #FAF8F1 background
    with dark ink; dark render uses #1A1A17 background with light ink and elevated
    boxplot fill (#242420) so the box still reads against the dark surface.'
  - Box plot fill uses ELEVATED_BG (not the page background) so the box stays visible
    on the dark surface — a subtle but correct theming choice many bokeh implementations
    miss.
  - 'Genuine bokeh interactivity in the HTML artifact: per-series HoverTool with category/mean/median/std/n
    tooltips, interactive Legend with click_policy=''hide'' — not faked UI.'
  - Treatment B's synthetic data is intentionally bimodal and the half-violin cloud
    surfaces the two modes clearly — good demonstration of why a raincloud beats a
    plain boxplot.
  - Flat KISS script — no helper functions, deterministic via np.random.seed(42),
    clean imports (every import is used).
  weaknesses:
  - 'Title is wrong on TWO counts vs. the SC-04 spec format `{spec-id} · {language}
    · {library} · anyplot.ai`. Currently rendered as `raincloud-basic · bokeh · pyplots.ai`
    — (a) missing the `python` language segment between spec-id and library, (b) uses
    the legacy `pyplots.ai` domain instead of the current `anyplot.ai`. Fix at line
    46 of plots/raincloud-basic/implementations/python/bokeh.py: change title="raincloud-basic
    · bokeh · pyplots.ai" to title="raincloud-basic · python · bokeh · anyplot.ai".
    Also update the docstring on line 1 ("""pyplots.ai → """anyplot.ai) and the two
    output_file() title= args at lines 190 and elsewhere if they still say pyplots.ai.'
  - Legend is redundant — the categories Control / Treatment A / Treatment B / Treatment
    C are ALREADY labelled on the y-axis next to each violin row, so the right-side
    legend duplicates that mapping and adds visual clutter without new information.
    Either drop the legend entirely (categories self-identify by row), or keep it
    only if it's load-bearing for HoverTool color matching in the interactive HTML
    — in which case shrink it. Adds noise to DE-03 visual hierarchy.
  - Rain points overlap heavily within each row (~70–85 points jittered into y ∈ [-0.32,
    -0.10], width 0.22 at 3200 px wide) — visibility is okay but density looks more
    like a strip plot than 'rain'. Consider widening the jitter range slightly or
    reducing marker size from 16 to ~12 so individual points are more discriminable,
    especially in the Control row where points clump under the box.
  - 'X-axis grid lines use INK (#1A1A17 / #F0EFE8) at alpha=0.15 which is fine on
    light but on dark renders the grid is almost invisible — verify visually that
    this is the intended subtlety (it borders on missing). Not a hard fail, but a
    single tone-down/up tweak would balance both renders.'
  - Treatment C's cloud at the top of the plot has its peak crowding the title — the
    cloud apex sits very close to the title baseline. No actual clipping (AR-09 does
    not fire) but the y_range upper bound (3.55) leaves very little headroom above
    the +0.40 cloud height. Bumping y_range upper to ~3.7 would breathe more space
    between title and topmost cloud and improve VQ-05 perceived layout.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) — correct light surface, not pure white, not dark.
      Chrome: Title "raincloud-basic · bokeh · pyplots.ai" rendered in dark bold ink at top-left, fully visible and crisp. X-axis title "Reaction Time (ms)" and rotated y-axis title "Treatment Group" both readable in dark ink. Y-tick category labels (Control / Treatment A / Treatment B / Treatment C) and x-tick numeric labels (200–600 at increments of 100) all clearly readable as dark-grey text on the warm-cream background. Subtle vertical x-grid at ~15% alpha, no y-grid. Legend (right side, framed in elevated #FFFDF6) lists all four categories with their swatches in dark-ink text — readable but redundant with the y-axis labels.
      Data: Four horizontal raincloud rows. Each row shows a half-violin "cloud" rising above the category baseline, a centred white box plot with whiskers and a coloured median line sitting on the baseline, and ~70–85 jittered "rain" dots below the baseline. Colors in canonical anyplot order: Control = green #009E73 (bottom row), Treatment A = lavender #C475FD, Treatment B = blue #4467A3, Treatment C = sand/brown #BD8233 (top row). Treatment B's cloud is visibly bimodal (two humps) — a deliberate teaching feature of the synthetic data.
      Legibility verdict: PASS — no light-on-light text, all chrome legible against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) — correct dark surface, not pure black, not light.
      Chrome: Title rendered in light off-white ink, fully readable against the dark surface. X-axis "Reaction Time (ms)" and rotated y-axis "Treatment Group" both in light ink — readable. Y-tick category labels and x-tick numeric labels are rendered in INK_SOFT (#B8B7B0) — light grey on near-black, fully readable with no dark-on-dark failure. Subtle x-grid is very faint on dark (INK at 15% alpha against #1A1A17 — borderline visible) — usable but borderline. Legend frame uses elevated #242420 panel with light-ink labels — readable. Boxplot fill correctly uses ELEVATED_BG (#242420) instead of the page bg so the box stays distinguishable on the dark surface.
      Data: Identical four raincloud rows in the EXACT SAME palette colors as the light render — only chrome flipped, palette unchanged. Brand green #009E73 still vivid against the dark backdrop. Treatment B bimodality still visible.
      Legibility verdict: PASS — no dark-on-dark text, brand green still vivid, only minor caveat is that the x-grid is very faint on dark and could be nudged up to ~20% alpha for symmetry with light.
