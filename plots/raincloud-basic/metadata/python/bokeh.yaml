review:
  strengths:
  - 'Raincloud geometry is textbook-correct: half-violin cloud rises above each category
    baseline, box plot sits centered on the baseline, jittered rain points fall below
    — the cloud/rain metaphor reads instantly.'
  - 'Imprint palette applied in canonical order — Control is #009E73 green (mandatory
    first-series brand color), then purple/blue/brown for Treatment A/B/C.'
  - Both light (#FAF8F1) and dark (#1A1A17) renders use the correct warm backgrounds;
    theme tokens (INK, INK_SOFT, BOX_FILL) thread through every chrome element — no
    dark-on-dark or light-on-light failures.
  - 'Box plot internals are well-rendered: white/dark-elevated fills, whiskers with
    caps, and a category-color median line that ties each box visually to its cloud
    and rain.'
  - HoverTool with per-group stats (mean, median, std, n) on the rain points is a
    genuinely distinctive bokeh feature that the static-PNG catalog can't show but
    the .html catalog artifact will.
  - Canvas is exactly 3200×1800 with toolbar_location=None — passes the canvas gate
    cleanly.
  - Reproducible (np.random.seed(42)), single-file/top-level (no functions or classes),
    and uses ColumnDataSource for the scatter — idiomatic bokeh.
  - 'Synthetic data tells a real story: Treatment B is bimodal (two superimposed normals),
    giving the raincloud something to actually reveal that a box plot alone would
    hide.'
  weaknesses:
  - The 'bimodal distribution' annotation (Label at x=475, y=2.35, 28pt italic INK_SOFT)
    is not visually detectable in either render — it should be the focal call-out
    that justifies Treatment B's two-peak shape, but it gets lost. Either reposition
    it above the Treatment B cloud peak (closer to y≈2.5, slightly left of x=475 toward
    the wider lobe) and raise its font weight/size, or draw a thin connector line
    from the annotation to the second peak so the reader knows what's being labeled.
  - Treatment B's bimodality is intentionally synthesized in the data but the KDE
    bandwidth (Silverman's rule on the combined sample) over-smooths the two modes
    into a single broad shoulder. Consider either a smaller bandwidth multiplier (e.g.
    0.7 × Silverman) or splitting the visual focus so the bimodal feature actually
    pops — right now Treatment B looks only slightly wider than the others, undermining
    the storytelling beat the annotation is trying to highlight.
  - 'DE-01/DE-03: beyond the four uniformly-styled rows there is no visual hierarchy
    — no series is emphasized, the annotation doesn''t land, and the legend duplicates
    the y-axis tick labels (every group''s name appears twice). Either suppress the
    legend (color is already bound to the y-axis category, so the legend is redundant)
    and reclaim the right-side whitespace, or make the legend useful by showing per-group
    sample sizes (e.g. ''Control (n=80)'').'
  - 'LM-01: box-plot internals are built from raw p.line + p.patch calls; bokeh has
    a higher-level pattern (whisker glyphs / quad for the box body) that would express
    intent more idiomatically and reduce the per-iteration line count.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct light theme surface, not pure white.
      Chrome: bold dark-ink title at top-left ("raincloud-basic · python · bokeh · anyplot.ai" per the source), italic dark-ink axis labels ("Reaction Time (ms)" on x, "Treatment Group" on y), 34pt INK_SOFT tick labels 200/300/400/500/600 on x and the four category names on y. Subtle vertical-only grid at GRID_ALPHA=0.15. Legend on the right with the four category swatches. All chrome elements clearly readable on the warm cream background — no light-on-light failures.
      Data: four horizontal raincloud rows stacked Control (green #009E73) at bottom → Treatment A (purple #C475FD) → Treatment B (blue #4467A3) → Treatment C (brown #BD8233) at top. Each row shows: a fill-color half-violin "cloud" rising above the category baseline, a white #FFFDF6 box plot centered on the baseline with INK whiskers/borders and a category-color median line, and jittered scatter "rain" points (size 12, alpha 0.65) below the baseline. First series is the brand green — palette compliant.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: light-ink title, light-ink italic axis labels, INK_SOFT tick labels (B8B7B0) on both axes — all clearly visible against the dark background. Grid lines are at the slightly raised GRID_ALPHA=0.20 and stay subtle but visible. Legend on the right uses INK_SOFT text. No dark-on-dark text failures — every chrome element threads through the theme tokens correctly.
      Data: identical colors to light render — Control green, Treatment A purple, Treatment B blue, Treatment C brown (the four Imprint palette positions are unchanged between themes, only chrome flips). Box plot fills use the elevated dark surface #242420 with white borders, which reads cleanly. The category-color median line still pops inside each box.
      Legibility verdict: PASS.

    Both renders pass the theme-readability checklist. The "bimodal distribution" annotation that the code adds at (x=475, y=2.35) is not visually locatable in either render — flagged in weaknesses as a storytelling failure rather than a legibility failure, since it appears to be a positioning/contrast issue rather than chrome being chopped.
