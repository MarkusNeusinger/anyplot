review:
  strengths:
  - 'Correct raincloud geometry: half-violin clouds extend above each category baseline,
    box plots are centered on the baseline, and jittered rain points fall below —
    the visual metaphor reads cleanly in both renders.'
  - 'Anyplot palette applied correctly: first series (Control) is brand green #009E73,
    second is #C475FD, third is #4467A3 — colors are identical across light and dark
    renders with only chrome flipping.'
  - 'Both themes render legibly: light uses warm off-white #FAF8F1 with dark text
    and subtle dotted grid; dark uses warm near-black #1A1A17 with light text — no
    dark-on-dark or light-on-light failures.'
  - 'All raincloud features present: KDE cloud with Silverman bandwidth and 5% tail
    trimming, box with median + Q1/Q3 + whiskers (1.5×IQR), jittered rain with transparency
    on dots (via large dots_size on pygal series).'
  - 'Mandated title format exact: ''raincloud-basic · python · pygal · anyplot.ai'',
    axis labels descriptive with units (ms), reaction-time data is realistic and neutral.'
  weaknesses:
  - Heavy SVG post-processing via regex to inject cloud polygons and overlay boxplot
    rects — fragile against any pygal SVG-structure change, and the implementation
    already pulls plot transform back out of the rendered SVG with regex (search for
    '<g transform=...class="plot">'). Acceptable trade-off given pygal has no native
    violin/box-stacking primitives, but flag for future maintenance.
  - Box-fill in dark mode uses PAGE_BG (#1A1A17) at 0.85 opacity — the box interior
    is nearly indistinguishable from the surrounding plot background, leaving only
    the colored outline + median line to communicate the box. Light mode works fine
    because the off-white fill stands out against the off-white background only via
    the outline either way; consider a slightly lighter fill (e.g. mix of PAGE_BG
    with INK at low alpha) for dark mode so the box reads as a distinct shape.
  - 'Limited use of pygal''s distinctive features — the implementation effectively
    uses pygal as an SVG container for hand-rolled geometry. The dots_size=22 series
    gives hover tooltips (''Control: 442 ms'' etc.) so the HTML version is partially
    interactive, but the cloud polygons and box rects injected as raw SVG do not participate
    in pygal''s tooltip/legend machinery.'
  - A faint horizontal stroke is visible at the cloud baseline where the polygon closes
    back to the baseline — minor but visible artifact of the polygon construction
    (baseline → top curve → baseline). Could be hidden by separating the baseline
    edge from the cloud outline (e.g. polygon with stroke only on the curved top).
  image_description: |-
