review:
  strengths:
  - 'Correct raincloud geometry in both renders: half-violin clouds rise above each
    category baseline, the boxplot sits centered on the baseline, and jittered rain
    points fall below — the cloud-above / rain-below metaphor reads cleanly.'
  - 'Imprint palette applied correctly and identically across themes: Control = brand
    green #009E73, Treatment A = lavender #C475FD, Treatment B = blue #4467A3. Only
    chrome flips (PAGE_BG, INK tokens).'
  - 'Repair feedback from attempt 1 fully addressed: dark-mode box fill switched from
    PAGE_BG to #2E2E29 so the box reads as a distinct shape, and the cloud baseline
    stroke is suppressed by drawing the polyline only on the curved top (poly[1:-1]).'
  - 'All raincloud statistical features present: Silverman-bandwidth KDE with 5% tail
    trim, IQR-clipped whiskers (1.5×IQR), Q1/Q3 box bounds, median rule, jittered
    rain at spread=0.10.'
  - Mandated title format exact; axis labels descriptive with units ('Reaction Time
    (ms)', 'Treatment Group'); reaction-time data realistic and politically neutral.
  weaknesses:
  - 'Heavy SVG post-processing remains: regex extraction of pygal''s plot transform
    (<g transform=... class=''plot''>) plus string-splice injection of cloud polygons
    and absolute-coord box rects. Fragile against any pygal SVG-structure change,
    but acceptable since pygal lacks native violin / arbitrary-polygon primitives.'
  - 'Limited use of pygal''s distinctive features: only the rain-dot series and the
    whisker/median XY series flow through chart.add(...) and pygal''s tooltip/legend
    machinery. Clouds and box rects are raw SVG so they bypass pygal''s interactivity
    entirely — caps LM-02 at 2/5.'
  - Rain dots from Treatment A approach the top of the Control cloud closely (gap
    ≈ 0.18 data units vs cloud_height 0.36). No actual overlap but visually tight;
    could be improved by slightly reducing cloud_height (e.g. 0.32) or rain_spread
    (0.08) to add breathing room between layers.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 page + plot background, no pure white.
      Chrome: mandated title "raincloud-basic · python · pygal · anyplot.ai" centered above the plot in dark ink (~75% of plot width). Y-axis title "Treatment Group" rotated on the left; x-axis title "Reaction Time (ms)" centered below. Tick labels 100–600 in dark ink. Subtle vertical x-guides only; no y-guides. All text fully readable against the light background.
      Data: three horizontal raincloud rows. Bottom = Control (brand green #009E73): half-violin cloud above the baseline, hollow box (cream-white interior, green outline, green median rule) centered on the baseline, jittered rain dots below. Middle = Treatment A (lavender #C475FD) with the same triple layout. Top = Treatment B (blue #4467A3) likewise. KDE polygon strokes only on the curved top — no visible baseline closure line.
      Legibility verdict: PASS — all elements readable, no overlap, palette correct.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 page + plot background, no pure black.
      Chrome: title, axis titles, and tick labels all in light ink (#F0EFE8 / INK_MUTED variants) — clearly visible against the dark surface. No dark-on-dark failures detected on any chrome element.
      Data: identical cloud / rain / box colors to the light render (#009E73, #C475FD, #4467A3), confirming only chrome flips. Box fill is now #2E2E29 (rather than PAGE_BG) so the box interior reads as a distinct lighter shape against the darker plot background — the attempt-1 weakness is resolved. Colored box outlines and median rules are clearly visible. Brand green Control series stands out well on the dark surface.
      Legibility verdict: PASS — all elements readable, no dark-on-dark, palette correct.
