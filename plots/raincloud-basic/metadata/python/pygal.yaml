      Data: Three half-violin clouds extend upward from each category baseline (Control = brand green #009E73 at bottom, Treatment A = purple #C475FD in middle, Treatment B = blue #4467A3 at top), each with a centered hollow box (outline in category color, near-white interior at ~85% opacity), whisker line through the box, vertical median rule, and a band of jittered rain dots falling below the baseline.
      Legibility verdict: PASS — all text and data clearly readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 plot/page background, no pure black, no light bleed.
      Chrome: Title and axis text in light ink (#F0EFE8 / #B8B7B0 range), fully readable against the dark background. Vertical guide lines are visible but subtle. No dark-on-dark failures detected — y-axis tick labels "Control", "Treatment A", "Treatment B" and x-axis numerics all clearly visible.
      Data: Cloud / box / rain colors are identical to the light render (Control #009E73, Treatment A #C475FD, Treatment B #4467A3). Only chrome flips. The box-fill is the dark page background at 0.85 alpha, so the box interior reads as a near-empty dark rect outlined in the category color — readable but lower contrast than the light render.
      Legibility verdict: PASS — all text readable; minor design note about box-fill contrast captured in weaknesses, not a legibility failure.
