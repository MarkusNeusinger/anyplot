review:
  strengths:
  - Accurate NBA half-court geometry with all required elements (three-point arc with
    corner straights, dashed lower free-throw circle, restricted area arc, basket
    rim, backboard)
  - 'Correct semantic color mapping: Made = brand green (#009E73), Missed = matte
    red (#AE3030), with redundant shape encoding (filled circle vs X cross) for CVD
    accessibility'
  - Zone efficiency annotations (Paint, Mid-Range, 3-Pt Arc, Corner) with elevated-background
    label boxes add meaningful data storytelling
  - Flawless theme adaptation — all chrome tokens (PAGE_BG, INK, INK_SOFT, ELEVATED_BG,
    COURT_LINE) flip correctly between light and dark renders
  - 1:1 aspect ratio via coord_fixed() prevents court distortion; square 2400×2400
    canvas is the correct choice for this symmetric plot type
  weaknesses:
  - Zone efficiency label text (size=2.5, ~7pt) and corner percentage text (size=2.2,
    ~6pt) are slightly small on the 2400×2400 canvas — increase zone label size to
    3.2 and corner text to 2.8 for better readability at mobile widths
  - Shot type (2-pointer/3-pointer/free throw) is generated and used for spatial placement
    but is not visually encoded in the plot — the spec lists it as a data field and
    mentions a legend for shot type; consider a third scale (e.g. scale_shape_manual
    with 3 shapes) or faceting to expose it
  - Minor visual overlap between the Mid-Range and Paint zone efficiency label boxes
    and nearby shot markers — slightly more vertical offset or a larger fill box padding
    would help separation
