      Court lines drawn in adaptive soft gray (COURT_LINE=#8A8880): outer baseline, three-point arc with corner straight lines, paint/key rectangle, dashed lower free-throw circle half, restricted area arc, basket rim circle, backboard segment.
      Data: Green filled circles (#009E73) for made shots, matte-red X marks (#AE3030) for missed shots. 300 total shots distributed across paint, mid-range, three-point arc, and corners. Zone efficiency label boxes with elevated fills: "3-Pt Arc 28%", "Mid-Range 58%", "Paint 45%"; rotated "62%" text on both corner zones. Data colors are clear against the off-white background.
      Legibility verdict: PASS — all text readable; zone label text (size=2.5) is slightly small but legible.

