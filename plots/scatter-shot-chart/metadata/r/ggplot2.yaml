review:
  strengths:
  - Full NBA half-court geometry drawn from scratch with accurate dimensions — three-point
    arc, free-throw circle (dashed bottom half convention), restricted area arc, backboard,
    and basket all present and correctly sized
  - 'Semantic Imprint palette use: #009E73 (brand green) for Made, #AE3030 (matte
    red) for Missed — both palette-compliant and semantically correct positive/negative
    roles'
  - Redundant color+shape encoding (circle vs X) delivers strong CVD accessibility
    without extra packages
  - 'Perfect spec compliance: all required court elements present, 1:1 aspect ratio
    via coord_fixed, 300 shots within the 200–500 target, shot outcomes correctly
    color-encoded'
  - 'Excellent code quality: linear structure, set.seed(42), modern ggplot2 linewidth=
    API, ragg device, theme-adaptive COURT_LINE token'
  weaknesses:
  - No zone efficiency annotations or storytelling beyond basic shot placement — FG%
    callouts per zone or a hot/cold color overlay would raise DE-03 meaningfully
  - Legend positioned to the right outside the court creates wasted canvas space;
    tucking it inside the upper-corner dead zone of the court would improve spatial
    efficiency and DE-01
  - Shot type (2-pointer vs 3-pointer vs free throw) is in the data but not visually
    encoded — the spec marks it optional but the redundant shape channel is already
    spent on outcome; a note or facet would improve DQ-01 feature coverage
