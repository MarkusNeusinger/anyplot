review:
  strengths:
  - Geometrically accurate NBA half-court with all required elements (three-point
    arc with corner break at 22 ft, free-throw circle both halves, restricted area
    arc, basket rim, backboard, half-court center circle)
  - 'Correct Imprint palette semantic assignment: brand green for made (success),
    matte red for missed (failure) — follows both spec and style guide'
  - 'Fully theme-adaptive: background, court lines, title, and legend text respond
    to ANYPLOT_THEME; data colors constant across both renders'
  - coord_fixed(ratio=1) ensures court geometry is never distorted — correct plotnine
    idiom
  - Clean reproducible code with zone-realistic FG% (higher near basket, lower from
    three)
  weaknesses:
  - shot_type (2-pointer, 3-pointer, free-throw) is a listed data field in the spec
    but missing from the dataset — add it and encode via marker shape so CVD users
    can distinguish outcome independent of color
  - 'No redundant encoding for made/missed: red-green binary is the only signal —
    deuteranopes cannot distinguish the two series; add shape encoding via aes(shape=outcome)'
  - 'DE-03 low: no focal point or storytelling emphasis — add per-zone FG% text annotations,
    hexbin density underlay, or highlighted zones to guide the viewer'
  - 'DE-01: court is functional but aesthetically plain — consider subtle paint area
    background tint or slightly bolder court lines'
  - Marker size=2.2 with alpha=0.75 causes noticeable overplotting in the paint zone
    (~90 shots); lower alpha to 0.6 or reduce size slightly
