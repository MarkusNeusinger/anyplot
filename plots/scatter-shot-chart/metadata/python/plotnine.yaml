review:
  strengths:
  - Accurate NBA half-court geometry with all required elements (three-point arc at
    23.75 ft, free-throw circle, paint/key, restricted area arc, basket rim, backboard,
    center circle)
  - Semantic Imprint palette assignment — Made=#009E73 (brand green for success) and
    Missed=#AE3030 (matte red for error/loss) is textbook semantic use of the palette
    anchors
  - 'Redundant encoding (color + shape: circle vs. X) ensures CVD accessibility beyond
    color alone'
  - Per-zone FG% callouts via geom_label() add genuine analytical value to the shot
    chart
  - Subtle amber paint tint (#DDCC77 at 12% alpha) provides zone context without competing
    with data
  - 'Theme-adaptive chrome correct in both renders: title and labels light on dark,
    dark on light; no dark-on-dark failures'
  - Square canvas (2400×2400) with coord_fixed(ratio=1) preserves 1:1 court proportions
    exactly
  - 'Clean flat structure: no functions or classes, seed=42 ensures reproducibility,
    all imports used'
  weaknesses:
  - FG% zone annotations are small (geom_label size=3.0mm ≈ 8.5pt) — at thumbnail
    sizes these percentage labels become hard to read; increase to size=4.0–4.5 for
    better legibility
  - Shot markers at size=2.0 with alpha=0.70 are appropriately sized for ~360 shots
    but could be slightly larger (size=2.5) in the lower-density zones like corners
    where only ~25 shots appear
  - Design storytelling lacks a focal point — no hot-zone emphasis or highlighted
    insight guides the viewer's eye; consider using slightly larger markers or slightly
    higher alpha for the player's most frequent shooting zones to create visual hierarchy
  - DE-01 is at the 'well-configured default' level — the design is functional and
    correct but doesn't achieve the polished aesthetic of a publication-ready basketball
    shot chart
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "scatter-shot-chart · python · plotnine · anyplot.ai" renders in dark ink (#1A1A17) at the top, spanning ~70% of the canvas width. No axis labels or ticks (intentionally hidden per spec). Legend at bottom shows "Made ● Missed ×" in muted dark text on an elevated box.
      Data: Green circles (#009E73) mark made shots; red X marks (#AE3030) mark missed shots. Court lines are drawn in muted gray. Paint area has a very subtle amber tint (#DDCC77 at 12% alpha). Per-zone FG% labels appear as small boxed annotations (36%–62% range across zones).
      Legibility verdict: PASS — all text readable against light background; annotation labels are small but visible at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title renders in near-white text (#F0EFE8) — clearly visible. Court lines appear in lighter gray/white against the dark surface. Legend box uses elevated dark fill (#242420) with light-colored text. FG% annotation boxes use dark elevated fill with light text — readable, no dark-on-dark failures detected.
      Data: Green circles (#009E73) and red X marks (#AE3030) are identical to light render — Imprint palette data colors correctly unchanged between themes. Paint tint is barely visible (amber at 12% alpha over near-black) but present.
      Legibility verdict: PASS — all chrome correctly flipped; no dark-on-dark text failures; all labels readable against dark background.
