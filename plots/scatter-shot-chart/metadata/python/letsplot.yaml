review:
  strengths:
  - Meticulously hand-drawn NBA half-court geometry with all required elements (three-point
    arc at 23.75 ft, corner sidelines at 22 ft, paint 16 ft wide, free-throw circle,
    restricted area arc at 4 ft, backboard, rim)
  - 'Smart semantic color assignment: #009E73 (Imprint green) for made shots and #AE3030
    (Imprint red semantic anchor) for missed — redundant shape encoding (filled circle
    vs X) makes it CVD-safe without red-green reliance'
  - geom_density2d contour overlay on made shots reveals hot zones (paint area concentration
    clearly visible), adding analytical depth beyond individual scatter points
  - Zone efficiency statistics (FG% and count per zone) positioned in sparse court
    areas with semi-transparent background fills — adds storytelling layer without
    requiring a separate panel
  - 'Theme-adaptive court colors (warm hardwood #E8DCC8 in light, near-dark #2A2318
    in dark) and line colors ensure the court reads cleanly on both surfaces'
  - layer_tooltips() with rich .line().format() chaining leverages letsplot's distinctive
    interactive feature, producing informative hover content in the HTML output
  - 'Perfect spec compliance: all required NBA court features, correct data mapping,
    exact title format, legend with counts, 1:1 aspect ratio via coord_fixed, 350
    shots in spec range'
  - 'Correct square canvas: ggsize(600, 600) + scale=4 → 2400×2400 px, matching the
    letsplot square format exactly'
  - Clean KISS structure with np.random.seed(42) for reproducibility and all imports
    actually used
  weaknesses:
  - 'VQ-01 (minor): geom_text annotation sizes (10, 12, 13 mm) exceed the letsplot
    guide recommendation of ~3-5 mm for annotation text; the visual result is acceptable
    but the zone stat labels appear somewhat large relative to the court area'
  - 'VQ-02: Zone annotation background rectangles (0.85-0.88 opacity) occlude shot
    markers beneath them — Paint and Mid-Range annotations in particular overlap dense
    shot clusters; a lower opacity (~0.6-0.7) or smaller annotation boxes would preserve
    more underlying data visibility'
  - 'VQ-03 (minor): Missed shot X markers (#AE3030 on dark court surface #2A2318)
    have slightly lower contrast in the dark render compared to made shot circles;
    missed markers are still distinguishable but could benefit from a slightly brighter
    red or increased size in dark mode'
  - 'DE-02 (minor): The ''FG: 43.4% · 152/350'' overlay text sits at y=44 inside the
    court boundary (above the deep-3 zone) — while no shots cluster there, placing
    this summary stat in the margin above the court (as part of the title row or a
    subtitle) would be cleaner than floating it inside the court diagram'
