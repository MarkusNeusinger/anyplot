    200-500 spec range
  - 'Clean minimal aesthetic: all four spines removed, no axis labels or ticks (appropriate
    per spec), no grid — court geometry provides the spatial reference'
  weaknesses:
  - 'LM-02 LOW (1/5): Seaborn contributes only basic sns.scatterplot() with hue —
    the entire court drawing is matplotlib patches/arcs. No distinctive seaborn features
    (KDE overlay for shot density, statistical annotations, or FacetGrid for shot_type
    breakdown) are used.'
  - 'VQ-04 PARTIAL (1/2): Made/Missed distinguished only by color (red-green pair)
    with no redundant marker-shape encoding. Adding marker=''o'' for Made and marker=''X''
