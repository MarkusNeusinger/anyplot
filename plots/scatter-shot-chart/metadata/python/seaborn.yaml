  - 'Accurate NBA half-court geometry with all required elements: three-point arc
    (23.75 ft top, 22 ft corners), free-throw line, paint/key (16 ft wide), restricted
    area arc, basket, and backboard — precise dimensions'
  - 'Semantically correct Imprint palette: Made=#009E73 (brand green) and Missed=#AE3030
