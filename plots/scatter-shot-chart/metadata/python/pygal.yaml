review:
  strengths:
  - Accurate NBA half-court geometry with three-point arc, paint, free-throw circle
    (with dashed bottom half), restricted area, backboard, and ochre rim
  - 'Semantic Imprint palette: brand green (#009E73) for made shots, matte red (#AE3030)
    for missed shots — both are correct semantic exceptions to canonical palette order'
  - FG% statistics in legend labels add real analytical value (56% inside, 34% perimeter)
  - Marker size differentiation (inside=r14, perimeter=r9) provides visual zone encoding
    on top of color
  - Warm neutral court-line colors adapt to theme — court blends gracefully in both
    light and dark renders
  - Both renders pass theme-readability checks; dark render uses correct light-on-dark
    text
  - Correct 2400x2400 square canvas for 1:1 aspect ratio court
  - Clean code with no unnecessary abstractions; np.random.seed(42) ensures reproducibility
  weaknesses:
  - 'VQ-04: Red (#AE3030) and green (#009E73) are the sole color signal for made/missed
    — spec-mandated but colorblind viewers (deuteranopia/protanopia) cannot distinguish
    them. Consider adding a redundant encoding: different marker shapes (circle=made,
    x=missed) to complement the color signal'
  - 'DQ-01: shot_type categorical dimension from spec (2-pointer / 3-pointer / free-throw)
    appears only in tooltip labels but not as a distinct visual encoding. Free-throws
    are merged into the inside zone rather than shown as a distinct category — the
    legend partially compensates but the 3-category shot_type field is not fully visualized'
  - 'LM-02: pygal-distinctive features like gauge charts, sparklines, or advanced
    dot graph customization are not leveraged — the XY chart with custom series is
    solid but leaves some pygal specialty features unexplored'
