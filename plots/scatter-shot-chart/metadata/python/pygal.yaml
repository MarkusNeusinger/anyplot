review:
  strengths:
  - Accurate NBA half-court geometry with three-point arc, paint/key, free-throw circle
    (dashed bottom half), restricted area arc, backboard, and rim drawn in theme-adaptive
    warm-gray colors
  - 'Semantic color mapping: Imprint green (#009E73) for made shots, Imprint matte
    red (#AE3030) for missed shots — correct semantic exception for good/bad outcome'
  - FG% statistics embedded in legend labels (e.g. Made Inside — 56% FG 48/85) add
    immediate analytical value without clutter
  - Marker size differentiation between inside (r=14) and perimeter (r=9) shots provides
    redundant encoding for shot zone
  - Theme-adaptive court lines (warm beige in light, darker warm-gray in dark) keep
    structural lines from competing with data markers
  - 2400x2400 square canvas enforces 1:1 aspect ratio as required for court geometry
  - 'Clean code: np.random.seed(42) for reproducibility, no functions/classes, all
    imports used, both PNG and HTML output'
  weaknesses:
  - 'Legend rendering artifact: the ⬤ emoji prefix in series labels collides with
    pygals own colored swatch circle, producing a double-dot appearance in both renders
    — the circle swatch from pygal renders alongside the Unicode bullet in the label
    text, reducing legend polish'
  - Red-green sole signal for made vs missed — no shape or symbol redundancy differentiates
    the outcomes under deuteranopia or protanopia; adding marker shape variation (e.g.
    circle for made, x/cross for missed) would make the chart fully CVD-safe per VQ-04
    guidance
  - foreground_subtle set to PAGE_BG (background color) as a suppression trick — while
    functional, this unconventional setting hides the muted text slot entirely rather
    than using INK_MUTED, which could cause unintended side effects in pygal internal
    rendering paths
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface, clearly visible
      Chrome: Title "scatter-shot-chart · python · pygal · anyplot.ai" in dark ink at top, clearly readable at full size; approximately 60-65% of canvas width (good). No axis labels or ticks — appropriate since court geometry provides spatial reference. Legend at bottom in 2 columns with dark text on warm-off-white — readable.
      Data: Made shots in #009E73 (brand green), missed shots in #AE3030 (matte red). Larger dots for paint/free-throw shots, smaller for midrange/three-point. Court lines in warm beige-gray, rim in Imprint ochre. Court structure clearly visible: three-point arc, paint rectangle, free-throw circle (dashed lower half), restricted area arc, backboard, and rim.
      Legend artifact: Each legend entry shows both pygals colored swatch circle AND the ⬤/▪ emoji prefix in the label text, creating a double-dot appearance. Readable but slightly cluttered.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct Imprint dark surface, visibly warm near-black (not pure black).
      Chrome: Title in light (#F0EFE8) ink — clearly readable against dark background. Legend text is light-colored and readable. Court lines adapted to darker warm-gray (#7A6A5A for lines, #9A8A7A for backboard) — visible but subtle.
      Data: Made shots still #009E73 (brand green, identical to light render), missed shots still #AE3030 (matte red, identical to light render). Palette colors are preserved as required. In dark mode the legend swatch circles render with white outlines (pygals foreground=INK_SOFT adaptation) rather than black outlines, which is slightly more visible but creates the same double-dot artifact.
      Legibility verdict: PASS — all text readable against near-black background; no dark-on-dark failures detected. Brand green #009E73 is clearly visible in dark mode.
