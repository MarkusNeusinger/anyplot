review:
  strengths:
  - 'Accurate NBA half-court geometry drawn from scratch: three-point arc at 23.75
    ft / 22 ft corners, restricted area arc, free-throw circle with solid top / dashed
    bottom, corner three-point straight lines, hoop circle and backboard — all fully
    implemented in Bokeh native geometry'
  - Zone efficiency overlays (FG% + made/total per zone) placed on the court give
    the viewer immediate analytic insight into shooting efficiency by zone — good
    data storytelling
  - 'Semantic color exception correctly applied and documented: #009E73 (brand green)
    for Made, #AE3030 (matte red) for Missed, with different marker shapes (circle
    vs X) providing redundant CVD-safe encoding'
  - 'Full Bokeh interactive HTML output alongside the static PNG: HoverTool with multi-field
    tooltips (Result, Zone, Shot Type, Distance) leverages Bokeh''s core differentiator'
  - 'Immaculate theme adaptation: PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED,
    COURT_FLOOR, COURT_LINE all flip correctly between light (#FAF8F1) and dark (#1A1A17)
    renders — no dark-on-dark failures'
  - All text sizes explicitly set at appropriate values (title 50pt, legend 28pt,
    zone labels 22pt/18pt, FG% annotation 24pt), matching style-guide defaults for
    the 2400×2400 bokeh canvas
  - Clean code structure — linear KISS pattern, np.random.seed(42) for reproducibility,
    ColumnDataSource for each outcome group enabling targeted HoverTool binding
  - 2400×2400 square canvas with match_aspect=True correctly enforces 1:1 court proportions
    as required by spec
  weaknesses:
  - Free Throw zone efficiency label is placed at (18, 16) — in the right midrange
    area — rather than near the actual free throw lane (x≈0, y≈15). Viewers will associate
    the 67% figure with the midrange zone to the right of the paint instead of the
    free throw line. Relocate to e.g. (10, 17) or add a directional cue to avoid geographic
    mismatch.
  - y_range = (-12, 42) reserves 12 units (22% of vertical data range) of empty court
    floor below the baseline, creating visible dead space at the bottom of the plot.
    Tighten to y_range = (-4, 42) or (-6, 42) to reduce wasted space while still giving
    breathing room to the baseline.
  - Paint area (~87 shots in 16×12 ft) shows unavoidable overplotting; alpha=0.60
    helps but could be reduced to 0.45 to further differentiate the dense cluster
    and improve individual shot visibility in that zone.
  - Sidelines are drawn only to y=35, not to the full NBA half-court depth of y=47
    ft. For a spec that explicitly calls for standard dimensions (50×47 ft), extending
    the sidelines to y=47 (even if no shots appear there) would be more accurate.
  - Legend font size 28pt is below the style-guide default of 34pt for the bokeh 2400×2400
    canvas — minor but noticeable at thumbnail resolution; increasing to 32–34pt would
    improve mobile readability.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 throughout — both the page background and the court floor (slightly darker #EDE8DC tan) are clearly distinguishable from each other, giving the court a natural wood-floor feel.
      Chrome: Title "scatter-shot-chart · python · bokeh · anyplot.ai" rendered in dark INK (#1A1A17) at 50pt, centered, fully visible without clipping. Legend above the plot area shows filled green circle "Made (164)" and red X "Missed (186)" in dark INK_SOFT (#4A4A44) at 28pt — readable. No axis labels or tick labels (intentionally hidden; the court provides spatial reference). Zone efficiency labels (percentage in 22pt, made/total in 18pt) appear at: Paint 56%/54/97, Mid-Range 44%/27/61, Three-Point 29%/27/92, Corner-3 left 36%/13/36, Corner-3 right 36%/13/36, and Free Throw at (18,16) showing values in bold dark ink with light elevated-background fill. FG% annotation "FG: 46.9% · 350 attempts" in INK_MUTED at 24pt at top of court area — readable. All text is clearly readable against the warm off-white background.
      Data: Made shots rendered as filled green circles (#009E73) at alpha=0.60 size=16; missed shots as hollow red X markers (#AE3030) at line_width=3.5. First data series is #009E73 brand green ✓. Court lines drawn in INK_SOFT (medium gray). Hoop in orange-red #C44E2B. Shot distribution realistic across all zones.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface. Court floor #242420 is subtly lighter than the background, maintaining the court structure visual.
      Chrome: Title renders in light #F0EFE8 (INK_DARK) — clearly readable against near-black. Legend text in light #B8B7B0 (INK_SOFT_DARK) — readable. Zone efficiency labels in bold light INK_DARK with elevated background #242420 fill — all readable. FG% annotation in muted #A8A79F — lower contrast as intended for tertiary annotation, still readable. Court lines rendered in #B8B7B0 (lighter than background). No dark-on-dark failure detected.
      Data: Made shots (#009E73 green) and Missed shots (#AE3030 red) are IDENTICAL to the light render — only chrome flipped ✓. Both colors are clearly visible against the near-black background. The green (#009E73) reads particularly well on dark; the red (#AE3030) remains distinguishable.
      Legibility verdict: PASS
