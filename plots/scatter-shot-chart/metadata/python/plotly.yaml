review:
  strengths:
  - Sophisticated court geometry with theme-adaptive hardwood textures (COURT_FLOOR/PAINT_FILL),
    shadow effect in light theme, and golden court lines in dark theme
  - 'Excellent palette semantics: brand green (#009E73) for made shots and Imprint
    matte red (#AE3030) for missed shots, with circle vs X shape redundancy for CVD
    accessibility'
  - Strong data storytelling via zone percentage annotations (Paint/Mid/3-Point) with
    theme-adaptive semi-transparent backgrounds and overall FG% subtitle
  - Proper 1:1 aspect ratio using scaleanchor='y' and correct 2400x2400 square canvas
    for this symmetric court plot
  - Domain-appropriate orange rim (#CC5500 structural element), dashed FT circle bottom
    half, restricted area arc — all NBA-standard court elements present
  - Distance-scaled marker sizes (np.clip(14 - distance*0.15, 8, 14)) add natural
    visual depth cue, larger markers near basket
  - 'Clean plotly patterns: shapes with layer=''below'', hoverinfo=''skip'' for court
    lines, custom hovertemplate for data points, both PNG and HTML output'
  weaknesses:
  - Shot type (2-pointer, 3-pointer, free-throw) from the spec data model is not visually
    encoded — legend only shows made/missed, not shot type; the spec says 'optionally
    include a legend for made/missed and shot type' but encoding shot type via marker
    shape or a second legend group would enrich the visualization
  - Annotation font at size=18px (72 source px at scale=4) is slightly large relative
    to the canvas, making the zone labels visually dominant; size=14-15px would better
    balance the annotations against the dense shot data
  - No global font=dict(color=INK) set in update_layout — relies on explicit per-element
    color overrides; if any element were missed it would fall back to plotly's default
    (black), potentially causing dark-on-dark failure in dark theme
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 page background. Court floor rendered in warm cream (#FDF3E3) with a slightly deeper paint/key area (#F5E5C5). Court boundary and lines drawn in warm brown (#7A6248). Subtle shadow rectangle adds depth in light theme.
      Chrome: Title "scatter-shot-chart · python · plotly · anyplot.ai" in dark (#1A1A17) at fontsize=16 — readable and occupies ~60% of canvas width. Subtitle "193/420 made (46.0% FG) · Paint 53% · Mid 48% · 3PT 28%" in INK_SOFT, clearly readable. Legend in top-right with warm elevated background (#FFFDF6), "Missed" and "Made" labels in INK_SOFT — readable. Zone annotation boxes (Paint 53%, Mid 48%, 3-Point 28%) have warm-white semi-transparent backgrounds with dark INK text — readable. No axis labels/ticks (intentionally hidden per spec).
      Data: Made shots as green (#009E73) filled circles, missed shots as red (#AE3030) X markers. Variable marker sizes (8–14px) based on distance from basket. Both series visually distinct and prominent against the warm court floor. Orange rim circle (#CC5500) visible at basket center. Dashed bottom half of free-throw circle visible.
      Legibility verdict: PASS — all text elements clearly readable against warm-off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 page background. Court floor in very dark warm-black (#1E1509) with slightly less-dark paint area (#281C0A). Court lines in warm golden (#A08850) — excellent contrast against the dark floor.
      Chrome: Title and subtitle render in light (#F0EFE8) text — clearly visible against dark background. Legend background is dark elevated (#242420) with medium-gray text (#B8B7B0) — readable. Zone annotation boxes have dark semi-transparent backgrounds (rgba(36,36,32,0.88)) with light (#F0EFE8) text — readable; no dark-on-dark failure. No axis labels/ticks.
      Data: Made shots (#009E73 green circles) and missed shots (#AE3030 red X) colors are identical to light render — only chrome elements flipped. Both series clearly distinguishable against the dark court floor. The orange rim and golden court lines provide natural visual anchors.
      Legibility verdict: PASS — all text readable against near-black background; brand green #009E73 remains visible and strong; no dark-on-dark failures detected.
