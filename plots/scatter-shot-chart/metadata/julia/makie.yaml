review:
  strengths:
  - 'Accurate NBA half-court geometry with all required elements: three-point arc
    with corner straights, paint/key box, free-throw circle with dashed lower semicircle,
    restricted-area arc, basket rim, and backboard'
  - Correct semantic palette usage — made shots use Imprint pos 1 (#009E73 brand green)
    and missed shots use Imprint pos 5 (#AE3030 matte red), with the semantic exception
    clearly noted in code comments
  - 'Full theme adaptation: all chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT)
    properly flip between light and dark; court lines shift from dark-gray to light-gray
    INK_SOFT in the dark render without touching data colors'
  - Clean minimal aesthetic — all four spines hidden, ticks and tick labels suppressed,
    no grid, leaving the court geometry as the sole spatial reference as the spec
    intends
  - DataAspect() constraint preserves 1:1 court proportions; xlims/ylims padded symmetrically
    to prevent court elements from touching the canvas edge
  - Realistic shot distribution across zones with plausible field-goal percentages
    (paint ~56%, mid-range ~40%, three-point ~34%) and correct 300-shot total within
    the spec range
  weaknesses:
  - Shot markers are markersize=9 — at a 2400×2400 canvas with 300 points this is
    functional but on the small side, especially for thumbnails or mobile (~400 px).
    Increase to markersize=12-14 for more prominent markers; the medium density (300
    shots) warrants larger than the default.
  - 'Red-green color distinction is the sole signal for made/missed — no redundant
    marker shape. CVD readers (deuteranopia / protanopia) cannot distinguish the two
    outcomes. Add marker shape encoding: e.g., marker=:circle for made and marker=:xcross
    or :utriangle for missed, preserving the color signal and adding a second channel.'
  - Shot type (2-pointer / 3-pointer / free-throw) is a required data field in the
    spec's Data section but is not encoded or shown anywhere in the visualization.
    The spec notes say 'Optionally include a legend for made/missed and shot type'
    — while optional, including shot_type as a shape or size dimension would fully
    satisfy the data specification and improve feature coverage.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct, not pure white.
      Chrome: Title "scatter-shot-chart · julia · makie · anyplot.ai" is dark (#1A1A17 INK) and clearly readable at the top. No axis labels or tick labels — intentionally suppressed, appropriate for a court diagram where geometry provides spatial reference. Court lines drawn in INK_SOFT (dark gray ~#4A4A44) are clearly visible. Legend at bottom shows "Missed (183)" and "Made (117)" with colored swatches, light text on ELEVATED_BG background (#FFFDF6), readable. Legend frame uses INK_SOFT. All text is readable against the light background.
      Data: Made shots in Imprint #009E73 (brand green), missed shots in #AE3030 (matte red), both with modest alpha (0.78 and 0.62). Markers at size=9 are small but distinguishable. Distribution shows expected shot patterns: denser paint area for made shots, three-point shots spread along the arc, mid-range sparse. Court drawing includes three-point arc with corner straight lines, free-throw circle (top solid, bottom dashed), restricted area arc, basket rim (small circle), and backboard.
      Legibility verdict: PASS — all text readable, court elements clear, data markers visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire canvas — correct, not pure black.
      Chrome: Title "scatter-shot-chart · julia · makie · anyplot.ai" is light (#F0EFE8 INK in dark mode) and clearly readable against the dark background — no dark-on-dark failure. Court lines shift to INK_SOFT (#B8B7B0 light gray) in dark mode, remaining clearly visible as light-gray lines on the dark surface. Legend shows same text with INK-colored labels (#F0EFE8) on ELEVATED_BG (#242420) background — readable. No dark-on-dark text failures observed anywhere.
      Data: Made shot color (#009E73 green) and missed shot color (#AE3030 red) are identical to the light render — only chrome has flipped. Both colors are clearly visible against the dark background. The green in particular reads well on the near-black surface.
      Legibility verdict: PASS — all text readable in dark mode, data colors unchanged from light render, no dark-on-dark failures.
