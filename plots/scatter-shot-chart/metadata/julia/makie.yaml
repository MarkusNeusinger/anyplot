review:
  strengths:
  - 'Correct NBA half-court geometry with all required spec elements: three-point
    arc (23.75 ft), corner straight lines, free-throw circle (dashed lower half),
    restricted-area arc, paint/key, basket rim, and backboard'
  - 'Semantic color exception correctly applied: #009E73 (Imprint pos 1) for made
    shots and #AE3030 (Imprint pos 5) for missed shots — semantic made=success=green
    / missed=loss=red mapping follows Imprint palette rules'
  - 'CVD-accessible dual encoding: missed shots use :xcross marker, made shots use
    :circle — a second encoding channel beyond color so deuteranopia/protanopia viewers
    can distinguish outcomes'
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens applied
    correctly to title, legend text, legend frame, and court lines — both renders
    pass the legibility check with no dark-on-dark or light-on-light failures'
  - DataAspect() correctly enforces 1:1 aspect ratio so the court is not distorted
    — the appropriate Makie idiom for this constraint
  - Square canvas (2400x2400) is the right format choice for a court diagram; canvas
    gate passed
  - Realistic shot percentages by zone (paint ~56%, mid-range ~40%, 3PT ~34%) and
    total shot count (300) are within spec range and statistically authentic
  - Alpha blending with strokecolor=PAGE_BG gives each marker subtle definition without
    adding visual noise — a polished detail
  weaknesses:
  - 'Marker size (markersize=12) is slightly small for the 2400x2400 canvas: 300 shots
    spread over a large court area result in individual markers that are hard to distinguish
    at mobile widths (~400px). Increasing to markersize=15-18 for made shots and 13-16
    for missed shots would improve visibility, especially for the :xcross shape which
    needs more area to read clearly as an X'
  - Shot type (2-pointer / 3-pointer) is not encoded as a visual channel despite being
    a listed data field in the spec — an optional but valuable third dimension that
    could be shown via a size or shape variation for the three zones (paint=2PT, mid-range=2PT,
    3PT) to support richer zone analysis
  - 'Design storytelling opportunity missed: the paint zone (high FG%) and three-point
    arc zone (low FG%) have clearly different made/missed ratios that a viewer must
    discover manually. A subtle zone shading or FG% annotation per region would elevate
    this from a data display to a data story and improve DE-03'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "scatter-shot-chart · julia · makie · anyplot.ai" in dark ink, clearly readable. No axis tick labels or axis labels (intentionally hidden — court geometry provides spatial reference). Legend below court shows "Missed (183)" and "Made (117)" in dark text on warm elevated background (#FFFDF6) with INK_SOFT frame. All text readable.
      Court: NBA half-court drawn in dark gray (INK_SOFT = #4A4A44) — boundary box, three-point arc + corner straight lines, paint/key rectangle, free-throw circle (solid top / dashed bottom), restricted-area arc, basket rim circle, backboard line. Court geometry clearly visible, neutral against the off-white surface.
      Data: Green (#009E73, alpha 0.80) circle markers for made shots, muted red (#AE3030, alpha 0.65) xcross markers for missed shots. Dual encoding visible — :xcross shape distinguishable from :circle especially in denser regions. Spatial distribution realistic: more makes in the paint, more misses on the arc.
      Legibility verdict: PASS — all text and data elements readable against the light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light off-white text, clearly readable against the dark background. Legend text visible in light colors on elevated dark background (#242420). Court lines rendered in light gray (INK_SOFT = #B8B7B0) — visually distinct from the dark background, no dark-on-dark issues.
      Court: Same geometry as light render, but court lines flip to light gray on dark background — all court elements remain clearly visible.
      Data: Data colors (#009E73 green for made, #AE3030 red for missed) are identical to the light render — only chrome flips. The Imprint palette is theme-invariant as required.
      Legibility verdict: PASS — no dark-on-dark failures; all text, court lines, and shot markers are clearly readable against the near-black surface
