  image_description: 'The plot displays a basketball half-court on a warm beige (#f5f0e8)
    background evoking a hardwood floor. Court markings are drawn in light gray: three-point
    arc (curved from corner to corner), paint/key rectangle (16ft wide), free-throw
    circle (solid top half, dashed bottom half), restricted area arc near the basket,
    baseline, corner three-point vertical lines, backboard (darker gray), and rim
    (orange circle). 200 shot attempts are plotted as colored dots using a colorblind-safe
    blue/orange palette: darker blue (#2166ac) for made inside shots (larger dots,
    48 shown), lighter blue (#5aa3d9) for made perimeter shots (smaller dots, 39 shown),
    darker orange-red (#d6604d) for missed inside shots (larger dots, 37 shown), and
    lighter orange (#e8a088) for missed perimeter shots (smaller dots, 76 shown).
    Shots cluster realistically in the paint, mid-range, along the three-point arc
    including corners, and tightly at the free-throw line. The title "scatter-shot-chart
    · pygal · pyplots.ai" appears at the top. A 4-column legend at the bottom shows
    all four categories with counts. No axis ticks or labels. Square 1:1 aspect ratio.'
