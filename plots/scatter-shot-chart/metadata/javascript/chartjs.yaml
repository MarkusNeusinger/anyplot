review:
  strengths:
  - Complete NBA court geometry with accurate dimensions (50x47 ft, 23.75 ft arc,
    22 ft corners, 16 ft paint, restricted area)
  - 'Excellent semantic palette use: green for made, matte-red for missed — both correct
    Imprint palette members for their semantic roles'
  - 'Three-level encoding: color (outcome) + shape (outcome) + size (shot type) creates
    information density without clutter'
  - Deterministic LCG with seeded RNG ensures reproducible shot data
  - Legend filter cleanly hides all 12 court-line datasets while showing only Made/Missed
  weaknesses:
  - Missed shot X marks (transparent fill, border-only) appear slightly less prominent
    than filled green circles in dense areas — consider a subtle rgba fill at ~0.2
    opacity to improve visual parity
  - Shot type size encoding (free-throw=4, 2-pointer=5.5, 3-pointer=7 CSS px) is not
    represented in the legend — adding a size legend or annotation would complete
    the third encoding dimension
  - Paint area has no visual differentiation (e.g., subtle tinted fill) that could
    help orient the viewer to the key zone
