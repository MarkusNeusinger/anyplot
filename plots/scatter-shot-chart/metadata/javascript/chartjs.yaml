review:
  strengths:
  - Accurate NBA half-court geometry with all required elements (paint, FT line, FT
    circle solid+dashed, three-point corners+arc, restricted area arc, basket ring,
    backboard)
  - Correct semantic color use (green=made, red=missed) with redundant shape encoding
    (circle vs. crossRot) resolving colorblind accessibility
  - 'Idiomatic mixed chart approach: court lines as line datasets + shot scatter in
    a single Chart.js instance'
  - Legend filter function to exclude court-line datasets from legend — clean and
    professional
  - Deterministic LCG with seed 42 — fully reproducible without Math.random()
  - 'Theme-adaptive chrome: t.ink, t.inkSoft, t.pageBg correctly applied in both renders'
  - Correct square orientation directive
  weaknesses:
  - Upper ~35% of court area above three-point arc contains no shot data, creating
    empty visual dead zone — consider clamping y.max to ~35 ft or adding a midcourt
    annotation
  - shot_type field (2-pointer, 3-pointer, free-throw) from spec is not tracked in
    generated shot objects or visually encoded — adding shape or size variation per
    type would improve coverage
  - Legend positioned above court with gap between it and data area — consider embedding
    inside court or reducing vertical separation
