review:
  strengths:
  - Accurate NBA half-court geometry with all required elements (three-point arc at
    23.75ft, corner lines at 22ft, paint/key 16ft wide, free-throw circle, restricted
    area arc, basket and backboard)
  - 'Correct Imprint palette usage: brand green #009E73 for made shots, semantic matte
    red #AE3030 for missed shots — appropriate sports analytics convention with Imprint
    semantic-exception justification'
  - Square canvas with 1:1 aspect ratio per spec requirement, theme-adaptive chrome
    works perfectly in both renders
  - Deterministic LCG (seed=42) with Box-Muller transform for realistic clustered
    shot distribution — correct browser workaround for no seeded RNG
  - Legend counts (Made 165, Missed 255) provide instant 39% FG% analytics; rendering
    order (missed first, made on top) shows design awareness
  - 'Perfect code quality: clean linear structure, well-justified helpers (LCG, Box-Muller,
    aPath, cLine), excellent reproducibility'
  weaknesses:
  - 'DE-03/DE-01 WEAK: No zone-level storytelling — adding FG% text annotations per
    shooting zone (at-rim ~62%, mid-range ~38%, corner-3 ~38%, wing-3 ~34%) or subtle
    zone shading would elevate to publication quality'
  - 'DE-02: Upper court area (y=30–47ft) occupies ~30% of canvas but contains almost
    no shots, creating dead space — crop ySc domain to [0, 32] to tighten the composition
    and make the shot-dense area more prominent'
  - 'VQ-03: Shot markers at r=5 SVG px (=10 physical px on 2400×2400) are slightly
    small for 420 data points — increase to r=6–7 for better individual shot visibility'
  - 'VQ-04: Made/missed distinction relies solely on green/red color hue without redundant
    shape encoding — adding distinct marker shapes (circle=made, X or cross=missed)
    would significantly improve CVD accessibility'
  - 'LM-01/LM-02: Arc paths use manual Math.cos/sin string generation; more idiomatic
    D3 would use d3.arc() or d3.path() for the court arc segments'
