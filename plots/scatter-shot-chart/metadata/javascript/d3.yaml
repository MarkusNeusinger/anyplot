      Data: Shot marker colors identical to light render — green (#009E73) and matte red (#AE3030) both clearly visible against dark background. Data colors unchanged between themes.
      Legibility verdict: PASS — no dark-on-dark failures; all text light-colored and readable; brand green #009E73 clearly visible on dark background
