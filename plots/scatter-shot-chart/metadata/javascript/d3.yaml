review:
  strengths:
  - Excellent CVD accessibility via dual encoding (circle=made, X-cross=missed) using
    d3.symbolCross — directly addresses previous attempt weakness
  - Zone FG% annotations (At-Rim ~62%, Mid ~38%, Top-3 ~35%) with semi-transparent
    backdrop rects significantly elevate the analytical storytelling
  - Y-domain cropped to [0, 32] eliminates dead upper-court area, tightening composition
    and making shot-dense regions more prominent
  - Increased marker size to r=7 circles and MARKER_AREA=180 crosses provides excellent
    visibility for 420 data points with appropriate alpha (0.85 made, 0.65 missed)
  - 'Perfect theme adaptation: pageBg/inkSoft/elevatedBg tokens used throughout; data
    colors identical between light and dark renders'
  - Deterministic LCG (seed=42) + Box-Muller transform for realistic clustered shot
    distribution — correct browser workaround; all 12 clusters cover expected basketball
    shooting zones
  - ClipPath via SVG defs keeps court elements within the plot rectangle — idiomatic
    D3/SVG technique
  weaknesses:
  - 'VQ-05 / COORD DISTORTION: Court coordinate system is ~55% stretched vertically
    — xSc maps 50 ft to iw=1100 px (22 px/ft) but ySc maps 32 ft to ih=1090 px (34
    px/ft). The spec requires ''1:1 aspect ratio so the court is not distorted.''
    Free-throw circle and restricted area arc appear visually oval in both renders.
    Fix: compute a uniform scale factor as min(iw/50, ih/32) = min(22, 34.1) = 22
    px/ft and center the resulting court rectangle within the plot area.'
  - 'VQ-01 MINOR: Zone annotation labels at 12px CSS (= 24 source px on 2400-px canvas)
    are below the 14-22px recommended minimum. They are readable at full resolution
    but will become near-illegible when scaled to mobile (~400 px). Increase to 14px
    CSS.'
  - 'LM-01/LM-02 MINOR: Arc paths still generated via manual aPath() helper using
    Math.cos/sin line segments rather than d3.arc() generator or d3.path() API. Consider
    using d3.arc() for the restricted-area arc and free-throw circle, and d3.path()
    for the three-point arc — more idiomatic and easier to maintain.'
  - 'DE-01/DE-02 MINOR: Zone coverage is asymmetric — only 3 of 5+ analytically distinct
    zones are labelled. Left/right corner-3 zones (highest frequency in dataset) have
    no annotation. Adding symmetric left/right annotations or subtle zone-shading
    polygons would elevate to publication quality.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white. Subtle tan court-floor wash (#D4B483 at 18% opacity) overlays the inner plot area, giving the court a hardwood feel.
      Chrome: Title "scatter-shot-chart · javascript · d3 · anyplot.ai" at 22px bold, dark ink (#1A1A17) — clearly readable at top center. Legend box in upper-left with elevated cream background (#FFFDF6 approx.) and rounded corners; "Made (165)" (green circle) and "Missed (255)" (matte red X) at 16px in inkSoft — readable. Zone labels ("Top-3 · ~35%", "Mid · ~38%", "At-Rim · ~62%") with semi-transparent backdrop boxes at 12px bold — small but visible at full resolution. No axis tick labels (correct per spec). Court lines in neutral inkSoft — visible and clean.
      Data: Green (#009E73) circles for made shots, matte red (#AE3030) X-cross shapes for missed. Dual encoding distinguishes outcomes for CVD users. Shot clusters visible around rim/paint (dense), three-point arc (distributed), mid-range (scattered). Made shots rendered on top of missed for visual clarity.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues; data markers clearly visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black. Court floor tint barely visible but present.
      Chrome: Title in light text (#F0EFE8 approx.) — clearly readable against dark background. Legend box uses elevated dark fill (#242420); text in light inkSoft tone — readable. Court lines appear in lighter inkSoft against dark background — clearly defined. Zone annotation labels have dark-theme elevated backdrop and light text — readable. No dark-on-dark text failures found.
      Data: Shot marker colors are IDENTICAL to the light render — green (#009E73) circles for made, matte red (#AE3030) X-crosses for missed. Both types clearly visible on dark background. Brand green #009E73 reads well on the near-black surface.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome elements use theme-adaptive tokens correctly; data colors unchanged between themes.
