review:
  strengths:
  - 'Excellent use of MUI X composition API: ChartContainer + ScatterPlot + custom
    SVG components instead of simple ScatterChart — demonstrates advanced library
    knowledge'
  - useDrawingArea hook correctly used to map ft coordinates to SVG pixels, maintaining
    court geometry under any canvas resize
  - 'Complete and dimensionally accurate NBA half-court: three-point arc (23.75ft
    top / 22ft corners), paint (16ft wide), free-throw circle (6ft radius), restricted
    area (4ft), backboard, and basket all present'
  - 'Correct square canvas via //# anyplot-orientation: square directive — appropriate
    for 1:1 court aspect ratio'
  - 'Both themes render correctly: warm backgrounds (#FAF8F1 / #1A1A17), court lines
    adapt opacity per theme, all chrome text is theme-adaptive via t.ink'
  - Deterministic LCG (seed=42) with realistic zone-weighted shot generation and zone-appropriate
    make percentages
  - 'Semantic color exception correctly applied: made=brand green (#009E73), missed=matte
    red (#AE3030)'
  weaknesses:
  - Missing skipAnimation on ChartContainer — library rule requires it on every chart
    component to guarantee the static screenshot captures the final frame
  - No free-throw shots in the generated data; free-throws are listed as a shot_type
    in the spec and should appear at approximately (0, 19) with realistic frequency
    (~15% of attempts)
  - No shot_type visual encoding — the spec lists shot_type (2-pointer, 3-pointer,
    free-throw) as a data dimension; encoding via marker shape would satisfy the spec's
    optional legend note and add important basketball context
  - No alpha transparency on markers — 300 shots without alpha creates opaque blobs
    in the paint area; alpha ~0.65 would reveal individual shot positions in dense
    zones
  - Side margins too tight (42px left/right) — some corner three-point shots render
    right at the plot boundary; increase to 56-64px
  - 'Title rendered in normal weight (default fontWeight) — style guide specifies
    bold or medium weight for titles; add fontWeight: 600 to the ChartTitle text element'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "scatter-shot-chart · javascript · muix · anyplot.ai" in dark text, 22px CSS, centered above chart. Legend at bottom center: "Missed" (red swatch) and "Made" (green swatch) in dark text, 20px CSS. All text clearly readable against the light background.
      Data: Shot markers as filled circles — green (#009E73) for made, matte red (#AE3030) for missed. 300 shots distributed across court zones. Dense cluster of overlapping markers in the paint area around the basket. Court lines in semi-transparent warm gray (~40% opacity).
      Legibility verdict: PASS — all text readable; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title and legend text render in light cream color, clearly readable against the dark background. Court lines switch to lighter semi-transparent cream (~50% opacity). No dark-on-dark text failures observed.
      Data: Shot colors identical to light render — green (#009E73) for made, matte red (#AE3030) for missed. Imprint palette data colors unchanged between themes.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures detected.
