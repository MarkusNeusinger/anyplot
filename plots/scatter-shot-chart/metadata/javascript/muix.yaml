review:
  strengths:
  - 'Accurate NBA half-court geometry: three-point arc at 23.75 ft, corner lines at
    ±22 ft, free-throw circle at 19 ft, restricted area arc, backboard, basket — all
    correctly computed from real dimensions'
  - Dual encoding (shape + color) for made/missed — circles for made, × marks for
    missed — provides colorblind-safe redundancy beyond the green/red contrast
  - Shot type encoded via marker radius variation (free-throw 4.5, 2-pointer 5.5,
    3-pointer 6.5) adds a third data dimension without cluttering the legend
  - 'Idiomatic MUI X composition pattern: ChartContainer + useDrawingArea hook synchronizes
    the custom SVG court overlay to the chart''s data coordinate space cleanly'
  - Deterministic LCG (seed=42) with realistic make percentages (free throw 78%, 3-pointer
    37%, close 2-pointer 60%) produces plausible, reproducible basketball data
  - 'Full theme-adaptive chrome: COURT_STROKE and t.ink used throughout, both light
    (#FAF8F1) and dark (#1A1A17) renders look clean and professional'
  - 'Imprint palette semantic exception correctly applied: brand green (#009E73) for
    made shots, semantic red anchor (#AE3030) for missed shots — matches the good/bad
    domain convention'
  - 'Square canvas (//# anyplot-orientation: square) is the right choice for a 1:1-aspect-ratio
    court diagram'
  weaknesses:
  - Legend marker shapes (MUI X default squares) do not match the actual chart markers
    (× for missed, ○ for made) — ChartsLegend renders colored rectangles regardless
    of the custom SVG markers drawn by ShotMarkers; consider using a custom legend
    slot or adding shape icons to label text to make the legend consistent with the
    markers
  - Legend label fontSize is 20px vs the muix.md recommended 14–16px for a 1200×1200
    CSS mount; this makes the legend labels noticeably oversized compared to the title
    at 22px — reduce legend labelStyle.fontSize to ~14–15px
  - Marker radii (4.5–6.5 CSS px) are somewhat small for medium-density 300-point
    data on a 1200×1200 mount; at 2× DPR the final markers are 9–13px diameter — consider
    increasing to 6–8 px base radius for better visibility, especially in the lower-density
    mid-range and three-point zones
  - 'DE-02: no axis-tick suppression is explicit in the code — axis lines are absent
    only because no <ChartsXAxis /> / <ChartsYAxis /> children are added; the approach
    works but is implicit; add a comment explaining this is intentional'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface consistent with #FAF8F1 — not pure white, correct anyplot light theme.
      Chrome: Title "scatter-shot-chart · javascript · muix · anyplot.ai" centered above the court in dark ink at ~22px — clearly readable. No axis tick labels or axis lines visible (correct for court diagram; court boundary provides spatial reference). Legend at bottom-center: "Missed" (red) and "Made" (green) with MUI X default square marks, fontSize ~20px — slightly oversized but readable.
      Court: NBA half-court rendered in semi-transparent medium gray (rgba(26,26,23,0.40)): court boundary rectangle, paint/key rectangle, free-throw circle, restricted area arc, corner three-point straight lines, three-point arc, backboard line, basket ellipse — all visible and accurately sized.
      Data: Green filled circles (made shots) with fillOpacity=0.7 and red × marks (missed shots) with strokeOpacity=0.7. First series (made) correctly uses brand green #009E73; missed uses semantic red anchor #AE3030. ~300 data points distributed realistically across zones — clustering at rim/paint and at three-point arc visible. Mild overplotting near paint area; alpha mitigates it.
      Legibility verdict: PASS — all text elements clearly readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black surface consistent with #1A1A17 — not pure black, correct anyplot dark theme.
      Chrome: Title text renders in light cream/off-white (t.ink = #F0EFE8) — clearly readable against dark background. Legend text is also light-colored — readable. No dark-on-dark failures observed.
      Court: Lines rendered in semi-transparent light (rgba(240,239,232,0.50)) — court geometry clearly visible against the dark background; contrast is appropriate and not overpowering.
      Data: Data colors are identical to light render — brand green #009E73 circles and #AE3030 × marks maintain their colors as required. Only chrome (background, court lines, text) adapts to dark theme.
      Legibility verdict: PASS — both data markers and text elements are clearly readable against dark background. No dark-on-dark failures.
