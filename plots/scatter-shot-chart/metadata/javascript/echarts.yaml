review:
  strengths:
  - Accurate NBA half-court geometry with all required elements (three-point arc,
    free-throw line, paint/key, restricted area arc, backboard, basket)
  - 'Semantic color exception correctly applied: green (#009E73) for Made, matte red
    (#AE3030) for Missed — matching spec requirement and Imprint palette guidelines'
  - Redundant shape encoding (circle vs inverted-triangle) ensures CVD safety beyond
    color alone
  - Deterministic seeded LCG RNG for reproducibility
  - Square orientation correctly chosen to preserve 1:1 court aspect ratio
  - Proper z-ordering (z:1 court lines, z:10 scatter) keeps court geometry behind
    shot markers
  - 'silent: true on court series prevents tooltip interference with shot data'
  - 'Theme-adaptive chrome: all text and court lines use ANYPLOT_TOKENS (ink, inkSoft,
    pageBg)'
  weaknesses:
  - shot_type (2-pointer / 3-pointer / free-throw) is not visually differentiated
    — the spec lists it as data and says legend for shot type is optional, but including
    marker-size or shape variation per shot type would improve feature coverage
  - Legend text (fontSize=14) is quite small relative to the 2400×2400 canvas — at
    mobile widths (~400px) it may be marginally readable
