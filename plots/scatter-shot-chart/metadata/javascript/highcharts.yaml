review:
  strengths:
  - Accurate NBA half-court geometry with all required court elements (three-point
    arc+corners, free-throw circle with dashed lower half, restricted area, backboard,
    basket rim)
  - Elegant CL template with spread operator for efficient court series definition
    — minimal code duplication
  - 'Correct semantic Imprint palette usage: palette[0] green for made (good), palette[4]
    matte red for missed (bad/loss) — the canonical semantic exception'
  - 'Dual encoding: color (outcome) + marker shape (shot type) makes the chart fully
    CVD-accessible'
  - Informative subtitle explaining shape encoding without needing a complex legend
  - Realistic zone-specific FG% (78% FT, 65% under basket, ~42% mid-range, ~36% 3PT)
    match NBA averages closely
  - 1:1 aspect ratio preserved via square canvas + symmetric X/Y data range (52x52
    ft)
  - Fixed-seed LCG ensures fully deterministic data generation
  weaknesses:
  - Shot markers (radius=5) are slightly small for 400+ shots on the square canvas;
    radius=6-7 would improve readability of individual shot positions
  - Subtitle font (13px) is slightly below recommended 14px minimum for secondary
    chrome; minor mobile readability concern
  - Corner-3 shot generation uses cx=±22 which can place some shots slightly outside
    the three-point line corner segments — clamping y to [BL+0.5, CY+1] would keep
    corner shots in the proper zone
  image_description: |-
