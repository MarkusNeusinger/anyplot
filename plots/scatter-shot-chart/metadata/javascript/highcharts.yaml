      Data: Made shots in brand green (#009E73, Imprint palette[0]), missed shots in matte red (#AE3030, Imprint palette[4]/semantic anchor). Court lines in subtle gray (inkSoft token). Shots distributed across all court zones. Dense green cluster near basket, spread of red misses at range.
