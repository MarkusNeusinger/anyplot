review:
  strengths:
  - Accurate NBA court geometry with all required elements (three-point arc 23.75/22
    ft, dashed lower free-throw circle, restricted area, backboard, basket rim)
  - Excellent theme adaptation — transparent background, all chrome tokens applied,
    data colors identical across light and dark renders
  - Semantic color assignment (green=made, red=missed) correctly uses Imprint palette[0]
    and palette[4] with documented semantic-exception justification
  - Deterministic LCG for reproducible browser-side data generation — solid pattern
    for Highcharts
  - 'Clean Highcharts API usage: no explicit dimensions, correct animation flags,
    credits disabled, enableMouseTracking false on non-data series'
  weaknesses:
  - 'Free-throw shots are absent from the data: the spec defines free-throw as a shot_type
    and the data schema includes it, but no addShots call targets the free-throw spot
    (cx=0, cy~14, tight spread). Add ~20-25 free-throw attempts with pct~0.78 (NBA
    average)'
  - 'No visual storytelling: the shot chart shows where shots were taken but does
    not emphasize efficiency. Consider encoding shot_type via marker shape (triangle
    for 3-pointers, square for free-throws) to add a second data dimension'
  - Helper functions (rnd, rn, arc, addShots) are justified but technically violate
    KISS flat structure; minor issue
