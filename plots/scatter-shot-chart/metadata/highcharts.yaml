  image_description: |-
    The plot displays a basketball half-court shot chart on a dark navy background (#1a1a2e) with a slightly lighter plot area (#2a2a3e). The court is drawn in white/light gray lines at varying opacities: the outer court outline is prominent, the three-point arc and corner straight lines are bold (0.75 opacity), while the paint/key rectangle, free-throw circle (top half solid, bottom half dashed), and restricted area arc are more subtle (0.55 opacity). The basket is rendered as an orange circle at the origin with a white backboard line above it. "BASELINE" appears in faint italic text below the court.

    Shot markers use blue (#4A90D9) for made shots and orange (#E8833A) for missed shots. Made shots are solid-filled with a thin white border; missed shots are semi-transparent with a thicker white border. Marker shapes differentiate shot types: circles for 2-pointers, diamonds for 3-pointers, squares for free throws. Shots cluster realistically in the paint area, along the mid-range, around the three-point arc, in both corners, and tightly at the free-throw line. The title reads "scatter-shot-chart · highcharts · pyplots.ai" with a subtitle "Season Shot Chart — 370 Attempts". A vertical legend in the top-right lists all six series with appropriate symbols. The chart uses a square 1:1 aspect ratio (3600x3600).
