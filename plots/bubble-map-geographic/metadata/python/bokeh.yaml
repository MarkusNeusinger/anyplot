review:
  strengths:
  - Theme-adaptive CARTO tile basemap (light_all vs dark_all URL swap) is a polished
    and distinctively Bokeh approach to geographic visualization
  - 'Correct Okabe-Ito palette with Asia (first region) mapped to brand green #009E73
    and subsequent regions following canonical order'
  - Custom size reference legend built with ColumnDataSource + LabelSet at Pacific
    Ocean coordinates — adds significant value beyond auto-generated legends
  - Real-world city population data with accurate coordinates and plausible 2024 estimates;
    excellent data choice for the bubble map spec
  - All font sizes explicitly set (title 32pt, axis labels 22pt, tick labels 18pt,
    legend 20pt) with full theme-adaptive chrome tokens throughout
  - 'Idiomatic Bokeh usage: WMTSTileSource for tiles, per-region ColumnDataSource
    for grouped hover tooltips, LegendItem for manual legend control'
  - Correct sqrt-based bubble sizing (area proportional to population) as required
    by the spec for perceptual accuracy
  weaknesses:
  - 'Tooltip bug: @lat and @lon are referenced in tooltips but not included in the
    per-region ColumnDataSource — the Coordinates row will render as ''(???°, ???°)''
    in the interactive HTML. Fix: add lat/lon arrays to each rsrc ColumnDataSource.'
  - 'Design Excellence could be elevated: no spine removal (not applicable to maps,
    but the grid lines over tile map are unusual and could be removed entirely since
    the basemap already provides geographic structure)'
  - Bubble crowding in East/South Asia (9 cities in the region) creates visual density
    that alpha handles but could be further mitigated with a slightly smaller max
    bubble size or a 'jitter-free' note
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white border fill (#FAF8F1) surrounds the plot area; inside the axes, the CARTO light_all tile basemap renders with a light grey/white map on which country boundaries are softly visible — this is the expected behavior for tile-based maps (tiles cover the plot background).
      Chrome: Title "World Cities by Population · bubble-map-geographic · python · bokeh · anyplot.ai" is bold and clearly readable in dark ink at top. Axis labels "Longitude (°)" and "Latitude (°)" are dark-colored and readable. Tick labels along both axes are legible in dark secondary ink. Region legend on the right has "Region" header in dark ink with labeled colored swatches; Population size-reference legend shows four graduated bubble sizes labeled "5M", "15M", "25M", "35M" in dark secondary ink, with a "Population" header in bold dark ink.
      Data: Bubbles are color-coded by region — Asia in #009E73 (brand green, first series), Americas in #D55E00 (orange), Europe in #0072B2 (blue), Africa in #CC79A7 (pink/purple), Oceania in #E69F00 (yellow). Tokyo is the largest bubble, clearly visible in East Japan. Dense clustering of bubbles in South/East Asia; transparent at fill_alpha=0.65.
      Legibility verdict: PASS — all text is readable against the light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black border fill (#1A1A17) surrounds the plot area; inside the axes, the CARTO dark_all tile basemap renders as a very dark grey map with light country outlines — matches the dark theme expectation.
      Chrome: Title text is light-colored (#F0EFE8) and clearly readable against the near-black border. Axis labels and tick labels are light-colored (#B8B7B0) and readable. Region legend header and labels are light-colored, readable. Population reference legend uses light ink tokens — all text is visible against the dark elevated background (#242420) of the legend box. No dark-on-dark text failures observed.
      Data: Bubble colors are identical to the light render — #009E73 Asia, #D55E00 Americas, #0072B2 Europe, #CC79A7 Africa, #E69F00 Oceania. The CARTO dark tiles provide strong contrast for the saturated Okabe-Ito colors, making the bubbles pop visually on the dark map. Data colors confirmed identical between light and dark renders.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures detected.
