review:
  strengths:
  - 'Excellent geographic context: simplified continent polygons and ocean fill (#d4e8f7)
    create a convincing basemap without external libraries'
  - Dual legend system (continent color + population size scale) is well-executed
    and clearly communicates both data encodings
  - Bubble size scaling uses sqrt(population) for area-proportional encoding, exactly
    as the spec requires
  - Real-world city dataset with accurate coordinates and plausible population values
    (Tokyo 37.4M, Delhi 32.9M, etc.)
  - Alpha=0.6 with white edgecolors provides good layering and definition for overlapping
    bubbles
  - Font sizes are explicitly set throughout (title=24pt, labels=20pt, ticks=16pt)
    — consistent with the high-resolution rendering standard
  - 'Full spec compliance: bubble sizing, transparency, basemap, size legend, category
    color grouping all present'
  weaknesses:
  - 'Palette non-compliant: continent_palette uses arbitrary custom hexes (#306998
    Python Blue, #FFD43B Python Yellow, etc.) instead of Okabe-Ito. First series (Asia)
    must be #009E73. Use OKABE_ITO = [''#009E73'', ''#D55E00'', ''#0072B2'', ''#CC79A7'',
    ''#E69F00'', ''#56B4E9''] mapped to continents in order.'
  - 'No theme adaptation: code does not read os.getenv(''ANYPLOT_THEME'') and hardcodes
    ocean color (#d4e8f7) and figure style without adapting to dark mode. Must follow
    the sns.set_theme RC pattern from the seaborn library guide.'
  - 'Wrong output filename: plt.savefig(''plot.png'') should be plt.savefig(f''plot-{THEME}.png'').
    Without ANYPLOT_THEME reading, both renders would produce identical output saved
    to the same file.'
  - 'Title in code is wrong: ''bubble-map-geographic · seaborn · pyplots.ai'' is missing
    the ''python'' language token and uses ''pyplots.ai'' instead of ''anyplot.ai''.
    Correct format: ''World Major City Populations · bubble-map-geographic · python
    · seaborn · anyplot.ai''.'
  - Legend body fontsize=14pt is below the 16pt minimum for the 4800x2700 canvas —
    increase to fontsize=16.
  - Top and right spines are not removed (seaborn whitegrid keeps them). For a map
    plot a full border is defensible, but spines should be styled via ax.spines to
    be theme-adaptive (edgecolor from INK_SOFT token).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white figure background outside axes; axes area shows light blue (#d4e8f7) ocean with light gray continent polygons overlaid — a convincing geographic basemap.
      Chrome: Title "World Major City Populations · bubble-map-geographic · python · seaborn · anyplot.ai" rendered in dark bold text, clearly readable. Axis labels "Longitude (°)" and "Latitude (°)" in dark text, readable. Tick labels in dark text, readable. Grid lines subtle (dashed, low alpha). Two legend boxes (Continent lower-left, Population size scale lower-right) with readable labels.
      Data: Sized bubbles at city coordinates. Largest bubbles (Tokyo, Delhi, Shanghai) clustered in East/South Asia. Colors vary by continent with a teal/green hue dominant for Asia. All bubbles have white edges and 0.6 alpha. Size range is good — differences between 5M and 37M cities are immediately visible.
      Legibility verdict: PASS — all text (title, labels, ticks, legends) is clearly readable against the light background. No "light-on-light" issues.

    Dark render (plot-dark.png):
      Background: Dark near-black figure background; axes area shows a very dark navy ocean with near-black continent fills. Both adapt correctly for dark mode.
      Chrome: Title text appears in light color against dark background — clearly readable. Axis labels and tick labels render as light text on dark — no dark-on-dark failures observed. Legend boxes have dark semi-transparent backgrounds with light text. Grid lines are subtle and readable.
      Data: Same bubble positions and relative sizes as the light render. Colors appear visually consistent with the light render (same hue distribution). White edgecolors on bubbles provide good contrast against the dark ocean background.
      Legibility verdict: PASS — all text and data elements are readable in the dark render. No dark-on-dark failures. Data colors appear identical to the light render confirming only chrome flipped.

    NOTE: Discrepancy observed — the code on disk uses a non-Okabe-Ito continent_palette (#306998, #FFD43B, etc.) and does not read ANYPLOT_THEME. The rendered images appear to use different colors (closer to Okabe-Ito) and show distinct light/dark theming, suggesting the images may have been generated from a different version of the code. The code title also reads "pyplots.ai" without the "python" language token, while the images correctly show "anyplot.ai" and "python". The code must be fixed to match the rendered output.
