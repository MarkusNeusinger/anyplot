review:
  strengths:
  - Interactive tooltips using letsplot's layer_tooltips() with city name, population,
    and region — idiomatic use of the library's strongest feature
  - Custom continent polygon basemap built with geom_polygon provides geographic context
    without external geodata dependencies
  - Proper area-based bubble scaling with scale_size(range=[4,28]) and a well-formatted
    size legend showing Population (M)
  - 30 real-world cities across 6 continents with accurate population values; excellent
    geographic spread and size variation
  - Good transparency (alpha=0.65) handles bubble overlap, coord_fixed preserves accurate
    geographic proportions
  weaknesses:
  - 'Color palette is non-Okabe-Ito: uses [''#306998'', ''#DC2626'', ''#2CA02C'',
    ''#9467BD'', ''#FFD43B'', ''#17BECF''] — ''#306998'' (Python Blue) is explicitly
    forbidden; must use OKABE_ITO = [''#009E73'', ''#D55E00'', ''#0072B2'', ''#CC79A7'',
    ''#E69F00'', ''#56B4E9''] with scale_color_manual(values=OKABE_ITO)'
  - 'No theme-adaptive Chrome: ANYPLOT_THEME env var is never read; plot_background
    is hardcoded to ''#F8F8F8'' (should be ''#FAF8F1'' light / ''#1A1A17'' dark);
    grid color ''#D0D0D0'' is hardcoded; text colors not set from INK/INK_SOFT tokens'
  - 'Wrong output filenames: saves as ''plot.png'' / ''plot.html'' — must use f''plot-{THEME}.png''
    and f''plot-{THEME}.html'' where THEME = os.getenv(''ANYPLOT_THEME'', ''light'')'
  - Title in code is 'World City Populations · bubble-map-geographic · letsplot ·
    pyplots.ai' — wrong domain ('pyplots.ai' should be 'anyplot.ai') and missing 'python
    ·' before 'letsplot'
  - Grid is somewhat heavy — both horizontal and vertical major gridlines at full
    opacity on the map; a map basemap would benefit from reduced grid opacity or x-axis
    only gridlines
  image_description: |-
    Light render (plot-light.png):
      Background: Light gray — appears to be around #F8F8F8 (code-set), slightly cool rather than the required warm #FAF8F1; acceptable visually.
      Chrome: Title "World City Populations · bubble-map-geographic · python · letsplot · anyplot.ai" is bold and clearly readable (dark text on light background). Axis labels "Longitude" and "Latitude" are readable. Tick labels (-180 to 180 longitude, -60 to 80 latitude) are readable at the rendered size. Grid lines are visible but moderately heavy — both horizontal and vertical lines cover the full map area.
      Data: Continent polygons rendered in light gray (#E5E5E5) provide geographic context. Bubbles are colored by region: Asia appears in green/teal, S. America in orange, N. America in blue, Africa in red, Europe in pink/purple, Oceania in light blue. Sizes span from small dots (~3.5M) to large circles (~37.4M Tokyo). Asian cluster (Tokyo, Delhi, Shanghai, Beijing) dominates with largest bubbles in the eastern portion. Alpha=0.65 handles overlap well. Size legend on right shows "Population (M)" with reference circles at 5, 10, 20, 30. Region legend clearly labeled.
      Legibility verdict: PASS — all text elements readable against light background.

    Dark render (plot-dark.png):
      Background: Dark near-black background — appears consistent with ~#1A1A17. Continent polygons render as dark gray/charcoal (letsplot appears to auto-adapt polygon fills). The overall dark render looks properly themed despite the code hardcoding #F8F8F8 for background.
      Chrome: Title visible with light-colored text against dark background. Axis labels and tick labels appear light-colored and readable. Grid lines visible as subtle lighter lines on dark surface.
      Data: Bubble colors are identical to the light render — Asia green/teal, S. America orange, N. America blue, Africa red, Europe pink/purple, Oceania light blue. The Okabe-Ito brand green #009E73 is NOT the first series color (code uses non-compliant palette #306998 as first value). Size and region legends visible on dark background.
      Legibility verdict: PASS — text appears readable in dark render, no dark-on-dark failures visible. However, the code does not implement explicit theme-adaptive Chrome tokens, which is a code quality concern.
