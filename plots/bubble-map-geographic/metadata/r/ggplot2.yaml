  weaknesses:
  - plot.title (22pt) and axis.text (14pt) are slightly below library guide minimums
    (24pt and 16pt) — increase font sizes
  - library(dplyr) and library(scales) are imported but not used anywhere — remove
    both
  - 'No geographic basemap: spec requires country/coastline outlines; use ggplot2
    native borders(database="world", colour=INK_SOFT, fill=NA, linewidth=0.2) before
    geom_text layer'
