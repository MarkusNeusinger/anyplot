review:
  strengths:
  - Area-proportional bubble scaling via scale_size_area() is correct and idiomatic
  - Custom ocean-blue panel background (OCEAN_BG token) makes the lat/lon grid immediately
    feel geographic without requiring sf
  - All theme tokens correctly threaded through every chrome element (title, axis,
    grid, legend, panel border)
  - Dual legends (population size + continent color) are well-composed and clearly
    placed
  - 40-city dataset with real 2023 estimates provides credible, engaging data storytelling
  weaknesses:
  - 'Missing country/coastline basemap: spec requires geographic context with country
    boundaries or coastlines. Fix: add geom_polygon(data=map_data("world"), aes(x=long,
    y=lat, group=group), fill=LAND_COLOR, color=NA) as first layer before bubbles'
  - 'Continent labels in dark mode use #4A6070 on #182530 ocean background (contrast
    ~2.3:1). Fix: change dark-mode LABEL_COLOR to INK_SOFT (#B8B7B0) for adequate
    contrast'
  - library(dplyr) and library(scales) are imported but unused — remove them
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 outer background; light-blue #D6E8F2 ocean panel — PASS
      Chrome: Title (bold dark), subtitle, "Longitude"/"Latitude" axis labels, degree-notation tick labels all clearly readable against light background. Continent labels (#7A8C96 on #D6E8F2) are intentionally muted but legible. Legend text readable.
      Data: 40 city bubbles with Okabe-Ito colors — Asia=#009E73 (brand green, largest cluster), Africa=#D55E00, N. America=#0072B2, S. America=#CC79A7, Europe=#E69F00, Oceania=#56B4E9. Size encoding via scale_size_area() clearly shows Tokyo/Delhi dominance. Alpha=0.70 handles overlap in Asia cluster.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 outer background; dark navy #182530 ocean panel — PASS
      Chrome: Title, subtitle, axis labels, tick labels all use light-on-dark tokens and are legible. Continent labels use #4A6070 on #182530 ocean background (contrast ratio ~2.3:1, below 3:1 threshold for bold text) — technically a weak point but labels remain somewhat visible due to bold weight.
      Data: Colors identical to light render — Asia=#009E73, Africa=#D55E00, N. America=#0072B2, S. America=#CC79A7, Europe=#E69F00, Oceania=#56B4E9. No color shift between themes. Both legends readable on elevated dark background.
      Legibility verdict: PARTIAL FAIL — continent labels (#4A6070 on #182530) have insufficient contrast (~2.3:1); main chrome passes.
