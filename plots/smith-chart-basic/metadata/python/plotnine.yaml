review:
  strengths:
  - Perfect spec compliance — all required Smith chart elements (resistance circles,
    reactance arcs, impedance locus, frequency labels, matched-load reference) correctly
    implemented with accurate gamma formula
  - Excellent data quality — realistic patch antenna S11 scenario (1–6 GHz, Z0=50Ω)
    with physically correct impedance behavior
  - Strong theme adaptation — all chrome tokens (INK, INK_SOFT, INK_MUTED) correctly
    vary between light/dark; data colors fixed at Okabe-Ito positions
  - Thoughtful visual hierarchy — alpha gradient from reactance arcs (0.4) to resistance
    circles (0.6) to boundary (1.0) creates natural depth
  - Directional arrow mid-locus is a domain-appropriate storytelling device that guides
    RF engineers through the frequency sweep
  weaknesses:
  - Resistance circle labels at size=8pt are at the lower bound of mobile readability
    — increase to 9pt
  - Minor crowding risk near '0.5' resistance label and the 4.5 GHz/2.5 GHz frequency
    annotation cluster; nudges help but could use slightly more aggressive offsets
  - Square canvas leaves noticeable empty corners outside the unit circle — add panel_border=element_blank()
    and tighten xlim/ylim to (-1.25, 1.25) for cleaner canvas utilization
  - 'LM-02 capped at 3/5: core Smith chart geometry is computed in numpy before plotting;
    plotnine used primarily as a rendering layer rather than for grammar-of-graphics
    statistical capabilities'
