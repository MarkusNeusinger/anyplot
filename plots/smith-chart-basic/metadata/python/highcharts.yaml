    label size for visual balance
  - Connected-line series use ScatterSeries + line_width instead of LineSeries — more
    idiomatic Highcharts would use LineSeries for impedance locus and VSWR/grid circles
  - Design Excellence could be pushed further with a descriptive title prefix and
    stronger visual emphasis on the resonance region near the center
