  - LineCollection with cividis colormap creates an elegant gradient impedance locus
    that encodes frequency progression without requiring a separate legend entry
  - 'Smith chart grid rendered from scratch with correct mathematical formulas (resistance
    circles: center=r/(r+1), radius=1/(r+1); reactance arcs: center=1/x, radius=1/x)
    and proper unit-disk clipping via np.where/mask'
  - 'Complete theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG,
    PAGE_BG) correctly applied to every text element, colorbar, legend, and spines
    in both renders'
  - Realistic RF engineering scenario (antenna impedance 1-6 GHz) with physically
    correct normalization and gamma calculation
  - 'Perfect spec compliance: all required and optional features implemented (resistance
    circles, reactance arcs, impedance locus, frequency labels, VSWR circles, matched
    condition marker)'
  weaknesses:
  - 'Brand green #009E73 (Okabe-Ito position 1) is absent — VSWR circles start at
    OI_2 (#D55E00) and matched condition uses OI_3 (#0072B2). Fix: swap matched condition
    to use #009E73 as OI_1, keep VSWR circles at #D55E00 as OI_2.'
  - All four matplotlib spines are kept; style guide default is to remove top/right
    spines. For a Smith chart the unit circle boundary makes top/right spines redundant.
  - Small grid labels (resistance and reactance labels) at fontsize=6 are at the minimum
    legibility threshold; increase to 7pt for a small legibility margin.
