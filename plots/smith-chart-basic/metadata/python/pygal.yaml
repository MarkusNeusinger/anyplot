review:
  strengths:
  - 'Excellent Smith chart grid implementation: unit circle, constant-R circles, constant-X
    arcs, and real axis correctly computed via bilinear gamma-transform'
  - Full theme adaptation — both renders use correct backgrounds (#FAF8F1/#1A1A17)
    and all chrome tokens adapt (INK, INK_SOFT, INK_MUTED)
  - Brand green (#009E73) correctly used for the first data series (Antenna Z(f));
    Okabe-Ito order respected for the 3 frequency markers
  - 'Good code quality: seed, clean imports, no functions/classes, informative palette
    comments'
  - HTML interactive output alongside PNG (pygal differentiator honored)
  weaknesses:
  - 'X-axis tick labels truncated to ''-0...'' for negative values between -1 and
    0 — pygal clips the label text. Fix: use shorter tick label format or explicitly
    format labels to fewer decimal places (e.g. ''-0.8'' not ''-0.80000'').'
  - 'CHART_COLORS tuple starts with #E69F00 (amber), not #009E73 — structural series
    take palette positions 1-4, pushing brand green to position 5. Fix: reorder so
    #009E73 is position 1 and structural elements use later palette slots.'
  - 'Frequency labels exist only in the legend, not as in-chart text annotations beside
    the marker dots. Fix: add brief text near each frequency marker dot on the chart
    itself.'
  - Empty-label structural series (4 entries) appear as unlabeled colored squares
    at the top of the legend, creating visual confusion.
