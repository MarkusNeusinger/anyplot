review:
  strengths:
  - Correct Smith chart with all required grid elements (resistance circles, reactance
    arcs, unit circle, real axis, impedance locus with dots) — a technically challenging
    plot for a general-purpose charting library
  - 'Deliberate palette design: Okabe-Ito data series (green locus + vermillion/blue/pink
    frequency markers) added before structural elements (amber unit circle, sky blue
    resistance grid, muted gray reactance arcs) — correct palette ordering'
  - Clean code with the elegant (None, None) segment-break technique for multi-segment
    resistance circles and reactance arcs; seed set for reproducibility
  - Theme-adaptive styling correctly implemented — both light and dark renders pass
    readability checks with no dark-on-dark failures
  weaknesses:
  - Frequency labels ("1 GHz", "3.5 GHz", "6 GHz") appear only as legend entries with
    colored dots — the spec calls for "frequency labels at key points along the impedance
    curve"; adding short text labels near the marker dots would fulfill this more
    directly
  - Eight legend entries (including structural grid series) clutter the left side;
    structural elements like Resistance Grid, Reactance Grid, Real Axis could be omitted
    from the legend or merged into a single "Grid" entry to reduce visual noise
