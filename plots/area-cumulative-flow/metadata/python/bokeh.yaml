      Data: Identical Okabe-Ito data colors as the light render (#009E73, #D55E00, #0072B2, #CC79A7, #E69F00) — only chrome flips between themes. All five bands clearly distinguishable.
      Legibility verdict: PASS — all text readable against the warm near-black background; no dark-on-dark failure detected.
