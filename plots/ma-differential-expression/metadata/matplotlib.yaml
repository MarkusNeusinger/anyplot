  image_description: 'The plot displays an MA plot for differential gene expression
    analysis. The x-axis shows "Mean Expression (A)" ranging from 0 to ~27, and the
    y-axis shows "Log₂ Fold Change (M)" ranging from about -5 to +5. Non-significant
    genes are rendered as small, faint gray dots (alpha ~0.15), while significant
    genes (adj. p < 0.05) appear as larger salmon/red dots. A solid horizontal black
    line marks M=0 (no change), with dashed gray lines at M=±1 (2-fold change thresholds).
    A blue LOESS trend line runs nearly flat near y=0 across the expression range.
    Gene labels in bold italic identify top differentially expressed genes: BRCA1
    is clearly visible near the top, while KRAS, APC, RB1, and PTEN are clustered
    and overlapping in the bottom-left corner. The title reads "ma-differential-expression
    · matplotlib · pyplots.ai". Top and right spines are removed, with a subtle y-axis
    grid. Legend is in the upper left.'
