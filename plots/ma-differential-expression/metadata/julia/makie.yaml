  - 'Perfect spec compliance: all required features implemented (horizontal reference
    at M=0, dashed ±1 thresholds, LOESS-like smoothing via inline Gaussian kernel,
    alpha transparency for density, three-class significance coloring)'
  - 'Excellent data simulation: funnel-shaped variance (RNA-seq realistic), ~10% DE
    injection with both up/down-regulated groups, normalization artifact (upward bias
    at low expression) that the LOESS actually reveals'
  - 'Semantically correct color assignment: non-significant → INK_MUTED (gray), up-regulated
    → brand green (#009E73), down-regulated → matte red (#AE3030) — matches the gain/loss
    semantic exception in the style guide'
  - 'Full theme-adaptive chrome: all axis, tick, spine, grid, and legend colors correctly
    keyed to INK / INK_SOFT / INK_MUTED tokens — dark render has no dark-on-dark failures'
  - 'Clean Julia / CairoMakie code: no functions or classes, seed set, only used imports,
    correct canvas (1600×900 × px_per_unit=2 = 3200×1800)'
  - 'Idiomatic Makie layout: colsize!(fig.layout, 1, Relative(0.78)) and custom Legend
    with MarkerElement/LineElement show solid command of the Makie layout API'
  weaknesses:
  - Legend labelsize=12 is too small relative to the 3200×1800 canvas — at px_per_unit=2
    this is only 24 source-px; raise to labelsize=14 or 15 to match the axis tick
    labels
  - 'DE-01/DE-02 limited by lack of visual polish beyond the basics: consider dropping
    the x-grid entirely (only y-grid is needed for MA plots), increasing significant
    gene markersize to 8-9 for stronger pop from the background cloud, and adding
    a thin INK_SOFT stroke (strokewidth=0.5) on significant markers for definition'
  - LM-02 score held back by generic multi-scatter approach — Makie's Observable/recipe
    system or a density-overlay (e.g. using hexbin or density!) for the non-significant
    background could showcase Makie's unique strengths more clearly
