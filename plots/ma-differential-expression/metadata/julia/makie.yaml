      Data: Green up-regulated and red/salmon down-regulated genes maintain their identity. Due to alpha=0.65 compositing over dark background, matte red appears slightly more salmon than on light render — expected alpha-blending behavior, underlying hex is unchanged. LOESS ochre line and reference lines remain visible. Legend readable on elevated dark background (#242420).
