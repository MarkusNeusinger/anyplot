review:
  strengths:
  - 'Full spec compliance: all five required features (significant highlighting, M=0
    reference, ±1 thresholds, LOESS curve, transparency) correctly implemented'
  - 'Excellent semantic color mapping: brand green for up-regulated, matte red for
    down-regulated, muted gray for non-significant — aligns with both Imprint palette
    rules and biological convention'
  - Biologically realistic data simulation with expression-variance funnel, normalization
    bias artifact, and realistic DE gene rate (~10%)
  - 'Complete theme-adaptive chrome: all tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) applied throughout — both renders pass legibility checks'
  - Clean CairoMakie code with idiomatic primitives, no helper functions, and proper
    layout control via colsize!
  weaknesses:
  - Design excellence ceiling limited by absence of any callout annotation for top
    DE genes (spec marks gene labeling as optional, but even 3–5 labeled outliers
    would elevate storytelling significantly)
  - Semi-transparent significant genes (alpha=0.65) produce slightly different visual
    weights between light and dark renders due to alpha compositing — could be reduced
    by using fully opaque fill + matching stroke instead
  - DE-02 could be higher with more intentional whitespace tuning (legend is tightly
    packed against the right edge) and a slightly softer grid opacity
  image_description: |-
