      Data: Non-significant genes as gray cloud (INK_MUTED, alpha=0.18). Up-regulated significant genes in brand green #009E73 (alpha=0.65). Down-regulated in matte red #AE3030 (alpha=0.65). Ochre LOESS trend line. Solid reference at M=0, dashed at M=±1. Legend with elevated warm background (#FFFDF6).
