review:
  strengths:
  - 'Full Imprint palette compliance: significant genes in brand green (#009E73),
    non-significant in the muted semantic anchor, LOESS curve in Imprint ochre — all
    semantically motivated choices'
  - 'Complete spec coverage: M=0 reference line, ±1 dashed threshold lines, LOESS
    smoothing curve, transparency for overplotting, and top-10 gene labels all implemented
    correctly'
  - Layered geom rendering (non-significant behind significant) creates correct visual
    depth without explicit Z-order hacks
  - Realistic DESeq2-style synthetic data with gamma-distributed mean expression,
    expression-dependent LFC heteroscedasticity, and recognisable gene names adds
    genuine domain credibility
  - 'Theme adaptation is correct in both renders: all chrome tokens flip appropriately,
    data colors stay identical between light and dark'
  - LOESS subsampled to 3000 points for performance — a thoughtful engineering decision
    for 12k-point datasets
  weaknesses:
  - 'Minor gene-label crowding: BRCA1, CD8A, and VEGFA labels cluster in the upper-left
    dense region; despite check_overlap=TRUE, BRCA1 and CD8A are still very close
    — consider nudging offsets (nudge_y or repel via ggrepel) or reducing the top-gene
    count to 8'
  - Grid lines use INK_SOFT at full opacity rather than the style-guide recommended
    very-subtle rgba(26,26,23,0.15) value — the grid is visually slightly more prominent
    than ideal for a dense scatter plot
  - 'DE scores modest: no decorative flourishes or advanced ggplot2 theme polish (e.g.
    custom legend key design, refined annotation frames for the top genes)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "ma-differential-expression · r · ggplot2 · anyplot.ai" in dark #1A1A17 at 12pt is fully readable and spans ~70% of plot width. X-axis label "Mean Average Expression (log₂)" and Y-axis label "Log₂ Fold Change" at 10pt in dark ink are readable and balanced. Tick labels at 8pt in INK_SOFT (#4A4A44) are legible. Legend inside top-right with elevated #FFFDF6 background and INK_SOFT border shows "Non-significant" (muted gray dot) and "Significant" (green dot) clearly.
      Data: Dense scatter of ~12,000 genes; non-significant genes in muted gray (INK_MUTED) with alpha=0.18 form a horizontal band, significant genes in brand green #009E73 with alpha=0.55 are visually prominent. LOESS curve in Imprint ochre #BD8233 runs through the cloud revealing slight low-expression bias. Horizontal solid reference line at M=0 in dark ink; dashed lines at ±1 in INK_SOFT. Ten gene labels (MYC, BRCA1, CD8A, VEGFA, TP53, HIF1A, EGFR, IL6, FOXP3, TNF) in dark ink — BRCA1 and CD8A are visually close together.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issue.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light tokens (#F0EFE8 / #B8B7B0) — fully readable against the dark surface. Legend has elevated #242420 background with INK_SOFT border, text in B8B7B0. No dark-on-dark failure detected anywhere.
      Data: Data colors are identical to the light render — significant genes in same brand green #009E73, LOESS curve in same ochre #BD8233, reference/threshold lines in light INK/INK_SOFT tokens. Non-significant genes in light muted anchor (#A8A79F dark) — distinctly visible against near-black background.
      Legibility verdict: PASS — all text readable against dark background; theme adaptation is correct throughout.
