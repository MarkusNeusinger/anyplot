review:
  strengths:
  - 'Perfect spec compliance — all required features implemented: reference lines
    at M=0 and ±1, LOESS smoothing curve, transparency for overplotting, gene name
    labels for top DEGs'
  - Excellent data quality with realistic DESeq2-style RNA-seq simulation and real
    biologically-meaningful gene names (MYC, TP53, EGFR, etc.)
  - 'Correct Imprint palette usage: significant genes in #009E73 (first series), non-significant
    in theme-adaptive muted — both themes fully readable with no dark-on-dark failures'
  - 'Sophisticated layered rendering creates clear visual hierarchy: dense gray non-sig
    cloud → teal sig points → ochre LOESS curve → labeled top genes'
  - Density-appropriate marker sizes (size=0.4/alpha=0.18 for 12,000 non-sig; size=0.85/alpha=0.55
    for sig) handle overplotting well
  weaknesses:
  - panel.border retains all 4 spines — style guide default requires removing top
    and right (L-shaped frame); replace panel.border with axis.line = element_line(color
    = INK_SOFT) for the default minimal look
  - library(dplyr) is imported but no explicit dplyr functions are called in the code
    — remove unused import (CQ-03)
  - Gene annotation labels at geom_text(size=2.5) are on the small side for a 3200x1800
    canvas; increasing to size=3.0 would improve mobile readability
  - 'Design lacks the final polish push: retaining all 4 spines and full-INK-color
    grid (rather than lighter rule) prevents reaching publication-ready aesthetic
    (DE-01/DE-02 opportunity)'
