  image_description: 'The plot displays an MA plot with Mean Expression (A) on the
    x-axis (range 0-16) and Log2 Fold Change (M) on the y-axis (range approximately
    -7 to +6). Non-significant genes appear as small, semi-transparent gray dots,
    while significant genes (padj < 0.05) are rendered as slightly larger salmon/pink-red
    dots with moderate transparency. A solid blue LOESS trend line runs near y=0 across
    the full expression range. A solid blue horizontal reference line sits at y=0,
    and dashed gray lines mark the plus/minus 1 log2 fold change thresholds. Ten top
    differentially expressed genes are labeled by name (BRCA1, TP53, STAT3, TNF, VEGFA,
    IL6, CDK2, MYC, KRAS, EGFR). The title reads "ma-differential-expression · plotly
    · pyplots.ai". The legend in the upper-left shows three entries: "Not significant",
    "Significant (padj < 0.05)", and "LOESS trend". The background is white with very
    subtle gridlines.'
