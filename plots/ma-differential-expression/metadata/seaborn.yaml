review:
  strengths:
  - Excellent spec compliance — all required features implemented (reference lines,
    LOESS, gene labels, significance highlighting)
  - Realistic RNA-seq data with plausible gene names and expression distributions
  - Clean, well-structured code with proper seed and KISS pattern
  - Good visual hierarchy separating significant from non-significant genes
  weaknesses:
  - Gene label annotations overlap in the lower-left corner (EGFR, VEGFA, BRCA1 crowded
    together)
  - Red color for significant genes is not colorblind-optimal; a blue/teal would maintain
    contrast while being more accessible
  - Library mastery is low — seaborn is used only for basic scatterplot, with all
    other elements done via matplotlib
  - Top DE genes cluster at low expression; spreading labels across the expression
    range would improve storytelling
  image_description: The plot displays an MA plot (M-versus-A) for differential gene
    expression. The x-axis shows "Mean Expression (A)" ranging from 0 to ~27, and
    the y-axis shows "Log₂ Fold Change (M)" ranging from about -6 to +4.5. Non-significant
    genes appear as small gray dots (alpha ~0.25) forming a dense cloud centered at
    M=0. Significant genes (adj. p < 0.05) are shown as larger salmon-red dots with
    white edges scattered throughout, particularly dense at low expression values.
    A solid blue horizontal line marks M=0 (no change), with dashed blue lines at
    M=±1 (2-fold change thresholds). A yellow LOESS trend line runs nearly flat near
    y=0. Gene labels (EGFR, VEGFA, BRCA1, IL6) appear in the lower-left corner but
    are crowded and partially overlapping. Top/right spines are removed, with a subtle
    y-axis grid. The legend is in the upper-left corner. Title reads "ma-differential-expression
    · seaborn · pyplots.ai".
