review:
  strengths:
  - 'Complete MA plot with all required features: M=0 reference line, ±1 fold-change
    dashed lines, LOESS-like trend, transparency on non-significant genes'
  - 'Excellent CVD safety via shape redundancy: triangles (pointing up/down for up/down-regulated)
    drawn in addition to color coding, with explicit CVD comment in code'
  - 'Idiomatic MUI X composition: ChartContainer with ScatterPlot, LinePlot, ChartsAxis,
    ChartsLegend, ChartsReferenceLine, ChartsGrid — all from community @mui/x-charts'
  - 'Semantically correct Imprint palette: brand green (#009E73) for up-regulated,
    matte red (#AE3030) for down-regulated (semantic exception justified by biology),
    inkSoft muted for non-significant'
  - Deterministic LCG RNG (seed=42) ensures full reproducibility of the 10,000-gene
    synthetic dataset
  weaknesses:
  - Legend icons show circles for Up-regulated/Down-regulated (ScatterPlot series
    icons) but the visually dominant markers are the SVG triangles drawn by SignificantMarks
    — this symbol mismatch in the legend may confuse readers expecting triangles
  - Local trend line (cyan, t.palette[5]) is very difficult to distinguish inside
    the dense 10,000-point scatter cloud — consider a thicker stroke (2-3px) or drawing
    the line on top of the scatter layers
  - SignificantMarks draws SVG triangles on top of the ScatterPlot circles for significant
    genes, resulting in double-rendered elements — the circles underneath are hidden
    by triangles but still consume render budget unnecessarily; the chart would be
    cleaner with significant genes only in the SVG layer
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface; no pure white.
      Chrome: Title "ma-differential-expression · javascript · muix · anyplot.ai" clearly readable in dark ink at top. Y-axis label "Log₂ Fold Change (M)" and X-axis label "Mean Expression (log₂ A)" both readable in dark ink. Tick labels visible at appropriate size. Reference line labels "log₂FC = 1" and "log₂FC = −1" visible in inkSoft. Legend at bottom shows all four series legibly.
      Data: Classic MA plot funnel — 10,000 genes with higher M-dispersion at low A (left) narrowing toward right. Non-significant genes rendered as small semi-transparent gray circles. Up-regulated genes shown as brand green (#009E73) upward-pointing triangles. Down-regulated shown as matte red (#AE3030) downward-pointing triangles. Horizontal reference line at M=0 (solid dark), dashed reference lines at M=±1. Thin cyan local trend line visible in center of cloud.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface; no pure black.
      Chrome: Title visible in light cream text against dark background (ThemeProvider + explicit fill:t.ink). Axis labels and tick labels flip to light-on-dark via t.ink/t.inkSoft tokens. Legend text readable. No dark-on-dark text failures detected.
      Data: Same MA funnel shape. Data colors are identical to light render — green (#009E73) up-regulated triangles, red (#AE3030) down-regulated triangles, same cyan trend line. Non-significant genes appear as semi-transparent light-gray blobs (t.inkSoft in dark mode ≈ #B8B7B0 at 40% opacity) against the dark background. Reference lines visible.
      Legibility verdict: PASS — all text readable against dark background; explicit t.ink/t.inkSoft fill props correctly apply theme-adaptive colors to axis elements.
