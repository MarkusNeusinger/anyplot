review:
  strengths:
  - Correct MA plot funnel shape with biologically accurate dispersion model
  - Excellent semantic color application (brand green = up-regulated, matte red =
    down-regulated, muted = background layer)
  - Idiomatic MUI X ChartContainer multi-type composition (scatter + line, shared
    y-axis)
  - Deterministic LCG RNG (seed=42) ensures reproducible renders
  - 'Full spec compliance: reference lines at 0/±1 with labels, LOESS-approximate
    trend, and alpha transparency'
  - Hidden xSmooth axis for trend series binding is a clean MUI X pattern
  weaknesses:
  - Gene count (3,000) is well below the spec-typical 10,000-20,000; the MA funnel
    is visible but density and biological realism are reduced — increase N_GENES to
    ~10,000
  - Local trend line (cyan) appears thin in the densest region of the scatter; consider
    increasing line width for LinePlot via slotProps or series strokeWidth
  - Red-green sole signal for up/down-regulation without redundant shape encoding
    (CVD concern); consider adding distinct marker shapes (circle vs triangle) as
    a second encoding channel
