review:
  strengths:
  - 'Perfect visual quality: all font sizes explicitly set, no overlap, excellent
    density management with alpha/radius, correct Imprint palette semantics'
  - 'Complete spec compliance: all required features (reference lines, LOESS, significance
    highlighting, transparency) implemented correctly'
  - 'Scientifically authentic data: realistic expression-level variance increase at
    low A, biologically plausible fold-change distributions'
  - Seeded LCG ensures deterministic rendering without any random state
  - In-place LOESS tricube kernel implementation avoids any external dependency
  - Legend filter callback elegantly removes the duplicate ±1 reference line entry
  weaknesses:
  - 'Chart.js default border (all four spines) is present in both renders. Remove
    for cleaner look using scales.x.border = { display: false } and scales.y.border
    = { display: false } (Chart.js 4.x API)'
  - 'DE-02 deficit: remove horizontal gridlines on the x-axis (scales.x.grid = { display:
    false }) and keep only y-axis grid, more appropriate for this scatter plot type'
  - No top-gene labels for the most extreme differentially expressed genes — adding
    5-8 text annotations (highest |M| at high A) would push DE-01 and DE-03 significantly
    higher
  - The LOESS trend line (palette[2] blue at borderWidth 3) is somewhat subtle in
    the light render against the dense background cloud. Increase borderWidth to 4-5
    to make it more visible
