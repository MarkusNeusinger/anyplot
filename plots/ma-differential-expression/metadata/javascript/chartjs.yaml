review:
  strengths:
  - Complete spec compliance — reference lines at M=0, ±1 fold change (solid + dashed),
    LOESS trend, significance highlighting, and alpha-blending for overplotting all
    present
  - 'Biologically realistic synthetic data: noise increases at low expression levels
    and a small systematic negative bias at low A is baked in — matches real DESeq2/edgeR
    output character'
  - 'Correct semantic color assignment: brand green (#009E73) for up-regulated, matte
    red (#AE3030) for down-regulated, muted ink for not-significant background — all
    palette-compliant'
  - Counts embedded in legend labels (e.g. 'Not significant (4006)') give quantitative
    summary at a glance
  - 'Clean visual hierarchy: faint background population (alpha ~18%) → colored DE
    genes (alpha ~80%) → prominent LOESS trend (borderWidth 4)'
  - Deterministic LCG + Box-Muller transform gives reproducible, normally-distributed
    gene scatter without Math.random
  - Legend filter (`item.text !== ''`) cleanly suppresses the unlabeled negative-1
    reference line dataset — idiomatic Chart.js
  weaknesses:
  - Legend font size (14) and tick label font size (13) are slightly below the chartjs
    guide's recommended defaults (16 and 14 respectively) — increase legend to 16
    and ticks to 14 to match the canonical sizing
  - Down-regulated color `#AE3030CC` is hardcoded instead of using `t.palette[4] +
    'CC'` — use the Imprint token so the color source is consistent with all other
    series
  - 'Gene count (4500 total: 4000 background + 500 DE) is below the spec''s ''typical
    10,000–20,000'' — consider increasing to ~10,000 background to better represent
    whole-transcriptome density; the LOESS computation is O(n×51) so it remains fast
    enough in the browser'
