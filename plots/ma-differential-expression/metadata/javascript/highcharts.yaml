review:
  strengths:
  - Correct MA plot format with characteristic fan shape and realistic RNA-seq data
    distribution including expression-dependent variance
  - 'Semantic use of Imprint palette: brand green for upregulated, matte red for downregulated,
    amber for LOESS trend — all semantically appropriate'
  - Reference lines at M=0 and ±1 with descriptive labels add critical biological
    context to the fold-change axes
  - Deterministic LCG implementation for reproducibility in the browser environment
    (no seeded Math.random)
  - 'Theme-adaptive chrome: all text, grid, and legend colors respond correctly to
    light/dark ANYPLOT_TOKENS'
  - LOESS sliding-window trend effectively reveals the slight upward bias at low expression
    — realistic normalization artefact
  weaknesses:
  - 'Red-green as the sole distinguishing signal for up vs down-regulated genes is
    CVD-problematic under deuteranopia/protanopia — both #009E73 and #AE3030 read
    as similar brown tones without redundant encoding; add marker size or shape differentiation
    to the two significant-gene series'
  - Data generation produces ~5000 genes, below the spec-specified typical 10,000-20,000
    for whole-transcriptome experiments; increase N for denser, more realistic RNA-seq
    scatter
  - Legend text at 14px for long labels such as Upregulated (padj < 0.05) reads small
    at 3200x1800 resolution; raise to 15-16px so the legend is comfortably readable
    at full canvas size
  - 'Design excellence remains close to defaults: no spine removal, minimal visual
    polish beyond the functional minimum; removing the top and right axis frame or
    lightening grid lines further would improve refinement'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct pageBg token, no pure white.
      Chrome: Title "ma-differential-expression · javascript · highcharts · anyplot.ai" in dark #1A1A17 ink at 22px — clearly readable. X-axis label "A — Mean Average Expression (log₂)" and Y-axis label "M — Log₂ Fold Change" in soft-ink at 16px — readable. Tick labels at 14px — readable. Reference-line labels "+1 (2× up)" and "−1 (2× down)" at 12px on the right margin — small but legible. Legend (top-right, bordered) with 14px text — slightly small for long labels but readable.
      Data: ~4200 non-significant genes in MUTED gray at 45% opacity form the background cloud showing the characteristic fan shape (wider at low A, tighter at high A). Green upregulated genes (#009E73) and matte-red downregulated genes (#AE3030) at 85% opacity are prominent against the muted cloud. LOESS trend in amber (#DDCC77) runs along the center revealing a slight upward bias at low expression. Solid reference line at M=0, dashed at ±1.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct pageBg for dark theme, no pure black.
      Chrome: Title, axis labels, tick labels all render in light ink (#F0EFE8 / #B8B7B0 tokens) against the dark surface — clearly readable. No dark-on-dark failures detected. Legend and reference-line labels adapt to light text correctly.
      Data: Data colors are identical to the light render — same gray muted cloud, same teal/green upregulated, same matte-red downregulated, same amber LOESS line. Only chrome (background, text, grid, legend frame) flipped to dark. Brand green #009E73 is clearly visible on the dark surface.
