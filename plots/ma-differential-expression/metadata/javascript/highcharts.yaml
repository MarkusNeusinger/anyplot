review:
  strengths:
  - 'Excellent CVD-safe redundant encoding: color + marker shape (triangle-up green
    for upregulated, triangle-down red for downregulated) immediately distinguishes
    both groups without relying on hue alone'
  - 'Biologically realistic synthetic data: LCG generates ~12,000 genes with characteristic
    fan-shape variance (wider at low expression) and a subtle upward bias at low expression
    — a real RNA-seq normalisation artifact'
  - 'Semantic color choices follow both the Imprint palette and scientific conventions:
    palette[0] (brand green) = upregulated, palette[4] (matte red) = downregulated,
    amber = LOESS bias trend'
  - 'All spec-required features implemented: M=0 solid reference line, ±1 dashed threshold
    lines with labels, LOESS approximation curve, and transparency for the dense scatter'
  - 'Idiomatic Highcharts usage: native plotLines with right-aligned labels, mixed
    scatter+spline series types, series-level opacity, and correct animation:false
    + credits:disabled'
  - 'Perfect code quality: deterministic LCG seed, clean KISS structure, all Highcharts
    tokens correctly mapped (t.ink, t.inkSoft, t.grid, t.palette, t.amber)'
  weaknesses:
  - 'Spines not explicitly removed: Highcharts default preserves the chart border
    frame — set chart.plotBorderWidth:0 and consider axis lineWidth:0 to achieve a
    cleaner L-frame look'
  - marginRight:30 (CSS px) may be too tight for the right-aligned plotLine labels
    '+1 (2× up)' and '−1 (2× down)' — increase to marginRight:60 to give the labels
    breathing room against the canvas edge
  - LOESS is approximated as a sliding-window bin average rather than true weighted
    local regression — this is adequate for bias detection but the label 'LOESS bias
    trend' slightly overstates the statistical rigor; 'Smoothed trend' or 'Sliding-window
    trend' would be more accurate
  - Optional gene-name labels for the top differentially expressed genes are not implemented
    — the spec explicitly marks this optional so no deduction, but adding them would
    lift DE-03 (data storytelling) meaningfully
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "ma-differential-expression · javascript · highcharts · anyplot.ai" in dark ink at 22px — clearly readable, spans ~80% of width as expected for the long mandated format. X-axis label "A — Mean Average Expression (log₂)" and Y-axis label "M — Log₂ Fold Change" in dark secondary ink at 16px — descriptive and readable. Tick labels at 14px — readable. Legend in top-right with background box and border — all items legible.
      Data: ~12,000 gene scatter with non-significant genes in muted gray (radius 2, opacity 0.4), upregulated genes in brand green #009E73 (triangle-up, radius 4, opacity 0.85), downregulated in matte red #AE3030 (triangle-down, radius 4, opacity 0.85). Amber LOESS trend line visible near M=0. Solid reference line at M=0 and dashed lines at M=±1 with right-aligned labels.
      Legibility verdict: PASS — all text clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
      Chrome: Title, axis labels, tick labels, and legend text all appear in light-colored ink (theme-adaptive). No dark-on-dark failures observed. Grid lines subtle.
      Data: Data colors identical to light render — green upregulated, red downregulated, gray non-significant, amber LOESS. The brand green and amber contrast well against the dark background.
      Legibility verdict: PASS — all text readable against the dark background, no dark-on-dark failures detected.
