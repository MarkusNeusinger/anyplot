review:
  strengths:
  - 'Full spec compliance: MA plot with correct axes, all three reference lines (M=0
    solid, M=±1 dashed), LOESS trend, transparency, and gene name labels'
  - 'Semantic color mapping perfectly aligned with biology domain conventions: #009E73
    green=upregulated, #AE3030 red=downregulated, muted anchor=non-significant'
  - In-browser LOESS implementation (tricube kernel, local linear regression, 25%
    bandwidth, 60 query points) is technically impressive with no external dependencies
  - Deterministic data generation via LCG (seed=42) correctly avoids Math.random()
    browser seeding issues per ECharts requirements
  - Both light and dark themes render correctly with full theme-adaptive chrome (ink,
    inkSoft, grid tokens throughout)
  - 'Realistic biologically meaningful synthetic data: cancer gene names (TP53, EGFR,
    KRAS), plausible expression ranges, ~10% DE rate with low-expression bias modeled'
  weaknesses:
  - Gene labels for upregulated genes in upper-left (BRCA1/MDM2 cluster) and upper-right
    (PTEN/VEGFA cluster) visually overlap each other — ECharts has no automatic label
    deconfliction for scatter; consider offsetting labels or only labeling the single
    top gene per quadrant to reduce collision
  - Gene annotation labels use fontSize=11 CSS px (22px native) which is small at
    400px mobile width; increase to 13px to match axis tick label size
  - Grid lines are shown on both X and Y axes; Y-axis-only grid would reduce visual
    noise and better follow minimal-chrome style guide guidance
  - Significant gene markers at symbolSize=6 CSS (12px native) are modest for a 2000-point
    scatter on a 3200×1800 canvas; bumping to 8 would improve visibility of highlighted
    genes without overcrowding
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "ma-differential-expression · javascript · echarts · anyplot.ai" in dark ink (#1A1A17), centered, fontSize=22px, spans ~65% of canvas width. X-axis label "Mean Average Expression (log₂ A)" and Y-axis label "Log₂ Fold Change (M)" in dark ink, 14px — both readable. Tick labels in inkSoft (#4A4A44), 13px — readable. Legend at bottom shows four series in inkSoft text. MarkLine labels (M = 0, M = +1, M = −1) appear on the right margin in inkSoft — readable.
      Data: ~1700 non-significant genes in muted gray (#6B6A63 @ opacity 0.4, size 4) as background mass. ~150 upregulated genes in brand green #009E73 (opacity 0.75, size 6) — clearly pop against gray mass. ~80 downregulated genes in matte red #AE3030 (opacity 0.75, size 6) — visible and distinct. LOESS trend line in ochre #BD8233, width 2.5 — subtle low-expression positive bias visible near x=1-3, trending to near-zero at high expression. Gene labels (TP53, BRCA1, MDM2, PTEN, VEGFA, KRAS, MYC, CDK4, EGFR, RB1) in dark ink, 11px — readable but some crowding (BRCA1/MDM2 and PTEN/VEGFA pairs overlap).
      Legibility verdict: PASS — all structural text readable; minor annotation overlap noted.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title in light ink (#F0EFE8) — clearly readable against dark background. Axis names and tick labels in inkSoft (#B8B7B0) — readable, no dark-on-dark failure. Grid lines subtle (#rgba(240,239,232,0.15)). Legend text in light inkSoft — readable. MarkLine labels in inkSoft on right margin — readable.
      Data: Non-significant genes now render as medium gray (#A8A79F, opacity 0.4) matching the dark muted anchor — still clearly subordinate to significant genes. Upregulated #009E73 green and downregulated #AE3030 red are identical to light render — data colors correctly unchanged. LOESS trend ochre #BD8233 unchanged. Gene labels switch to light ink for readability on dark background.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures; data colors correctly identical between themes; only chrome flips.
