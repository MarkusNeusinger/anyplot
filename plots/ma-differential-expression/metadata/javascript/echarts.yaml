review:
  strengths:
  - Real LOESS smoother implemented from scratch using tricube kernel and local linear
    regression — not a simple trendline, but a statistically correct smoother that
    reveals expression-dependent bias
  - Smart quadrant-based gene label selection picks one representative per spatial
    quadrant, eliminating label collisions while still highlighting key DEGs
  - 'Semantically correct Imprint palette usage: green (#009E73) for gain/upregulated,
    muted red (#AE3030) for loss/downregulated, theme-adaptive muted gray for non-significant
    — all per palette semantic rules'
  - Reference lines at M=0 (solid), M=+1 and M=-1 (dashed) with inline labels correctly
    implemented via ECharts markLine with mixed lineStyle
  - 'Full theme-adaptive chrome: all text elements (title, axis labels, tick labels,
    mark labels, legend) draw from ANYPLOT_TOKENS for both light and dark renders'
  - Deterministic LCG RNG with fixed seed 42 ensures reproducible data generation
    in the browser environment
  weaknesses:
  - Gene count is only 2000 — spec states 10k–20k genes is typical for whole-transcriptome
    experiments; a higher count (e.g. 12000) would better demonstrate overplotting
    behavior and the value of alpha transparency
  - Mark line labels (fontSize 11 for M=0, M=+1, M=−1) are the smallest text in the
    chart and may be marginal at mobile scale (~400 px); consider fontSize 12–13 to
    match axis tick labels
  - Upregulated vs. downregulated distinguished only by color (green vs. muted red)
    with no redundant shape encoding — affects CVD (red-green colorblind) users who
    cannot distinguish the two significant categories
  - Helper functions (rand, randn, bsearch, loessAt, labelPos) in top-level script
    scope are a mild KISS violation; the LOESS complexity justifies them, but the
    code length is higher than strictly necessary
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — NOT pure white, correct anyplot surface color.
      Chrome: Title "ma-differential-expression · javascript · echarts · anyplot.ai" is dark (#1A1A17), centered, ~70% of width — expected for the long mandated format. X-axis label "Mean Average Expression (log₂ A)" and Y-axis label "Log₂ Fold Change (M)" are dark, clearly readable. Tick labels are gray (t.inkSoft) and legible. Legend at bottom with four entries is visible. Mark line labels (M=0, M=+1, M=−1) on the right side are small (fontSize 11) but readable at full resolution.
      Data: ~1750 non-significant genes rendered as small muted gray circles (size 4, opacity 0.4). ~200+ significant genes split into green (#009E73) upregulated dots (size 8, opacity 0.75) and muted red (#AE3030) downregulated dots (size 8, opacity 0.75). An ochre (#BD8233) LOESS trend line runs near y=0 revealing minimal systematic bias. Reference lines at M=0 (solid) and M=±1 (dashed) clearly visible. Gene labels TP53 (upper-left), EGFR (upper-right), KRAS (lower-left), MYC (lower-right) placed per quadrant with no collisions.
      Legibility verdict: PASS — all text elements are readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — NOT pure black, correct anyplot dark surface.
      Chrome: Title and all axis labels/tick labels render in light text (t.ink / t.inkSoft tokens for dark theme). Grid lines are subtle and visible against the dark background. Legend text is visible at bottom. Mark line labels are readable.
      Data: Data colors are identical to the light render — green upregulated, muted red downregulated, muted gray non-significant, ochre LOESS trend. Only chrome (background, text, grid) flipped; data hues unchanged as required.
      Legibility verdict: PASS — no dark-on-dark failures. All text (title, axis labels, tick labels, legend, gene labels, mark line labels) is clearly visible in light colors against the near-black surface. Brand green #009E73 remains clearly visible and distinguishable.
