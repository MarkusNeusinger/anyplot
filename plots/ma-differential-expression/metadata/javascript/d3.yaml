review:
  strengths:
  - 'Excellent semantic color mapping: up-regulated genes use brand green (#009E73),
    down-regulated use semantic red (#AE3030) — biologically appropriate and Imprint-compliant'
  - 'Intelligent layer ordering: non-significant genes rendered first as muted gray
    background, significant DEGs layered on top for immediate visual pop'
  - LOESS approximation via bin medians + Catmull-Rom spline reveals the characteristic
    heteroscedastic variance funnel at low expression
  - Deterministic LCG RNG with seed=42 ensures fully reproducible 12,000-gene dataset
  - Clip path correctly contains all scatter points within the plot bounds — no overflow
    artifacts
  - Complete legend with gene counts dynamically embedded ('Up-regulated (1052)')
    adds quantitative context
  - 'Theme-adaptive chrome uses all correct tokens: t.ink for primary text, t.inkSoft
    for secondary, t.grid for gridlines, INK_MUTED for non-significant genes'
  - 'Full spec compliance: reference lines at M=0 (solid) and M=±1 (dashed), transparency
    for overplotting (opacity 0.2 non-sig, 0.7 sig), and LOESS trend'
  weaknesses:
  - 'VQ-04 (Color Accessibility): Green (#009E73) vs red (#AE3030) is the primary
    visual signal distinguishing up- vs down-regulated DEGs — deuteranopia/protanopia
    viewers may struggle. Redundant encoding (e.g. triangle up vs circle down marker
    shapes) would resolve this while preserving the biologically conventional color
    semantics'
  - 'DE-01 (Aesthetic Sophistication): At 5/8, the design is above generic defaults
    but lacks the typographic refinement or distinctive polish needed for 6+. Additional
    differentiation — subtle font-weight variation for the gene count annotation,
    or a thin separator line between legend groups — would elevate the aesthetic'
  - 'LM-02 (Distinctive Features): Catmull-Rom spline and clip-path are D3-native
    but straightforward. A more distinctive use of D3 (e.g. d3.contourDensity for
    the non-significant gene cloud rather than individual circles, or a density-colored
    background via 2D histogram) would showcase D3''s unique capabilities more forcefully'
