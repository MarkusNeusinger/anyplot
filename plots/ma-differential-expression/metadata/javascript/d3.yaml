review:
  strengths:
  - 'Excellent semantic color usage: brand green (#009E73) for up-regulated, matte
    red (#AE3030) for down-regulated — precisely the Imprint palette semantic exceptions
    for positive/negative biological signal'
  - Sophisticated LOESS approximation via 35-bin medians rendered as a Catmull-Rom
    spline — visually clean trend curve that reveals expression-dependent bias without
    true LOESS computation overhead
  - Layered scatter rendering (non-significant background → down-regulated → up-regulated
    foreground) creates strong visual hierarchy with appropriate transparency (0.2
    for nonsig, 0.7 for significant)
  - Deterministic LCG RNG with seed=42 generates biologically realistic heteroscedastic
    data — variance decreases with expression level, mimicking real DESeq2 results
  - Comprehensive 6-item legend with live gene counts; reference lines use distinct
    visual encodings (solid for M=0, dashed for M=±1) conforming to spec
  - Clip path properly contains scatter within plot area; theme-adaptive INK_MUTED
    correctly branches on ANYPLOT_THEME for non-significant dot color
  weaknesses:
  - 'Y-axis only grid on a scatter plot: the style guide specifies ''both axes for
    scatter plots''. Add X-axis vertical grid lines using the same t.grid stroke so
    both axes have subtle guidance lines.'
  - N=8,000 genes is slightly below the spec's recommended 10,000-20,000 range for
    whole-transcriptome experiments — increase to 12,000-15,000 for full spec compliance.
  - Legend and gene-count annotation text both at 13px — slightly small for thumbnail
    readability at 400px mobile width. Increase legend text to 14px and annotation
    text to 14px to match tick label size.
  - 'DE-02: Y-axis only grid for a scatter plot misses style-guide requirement for
    both axes grid lines in scatter context.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "ma-differential-expression · javascript · d3 · anyplot.ai" centered at top in dark ink, bold 22px — clearly readable. X-axis label "Mean Average Expression (A)" and Y-axis label "Log₂ Fold Change (M)" in dark ink at 16px — readable. Tick labels at 14px in dark secondary text — readable. Gene count annotation "n = 8,000 genes | ..." in muted gray at 13px top-left — legible. 6-item right-side legend with 13px text — slightly small but readable.
      Data: Dense scatter of ~6,600 muted gray semi-transparent dots (non-significant, alpha=0.2, r=2) forming the background cloud. ~723 brand-green (#009E73) dots (up-regulated, r=3, alpha=0.7) clearly visible above the cloud. ~681 matte-red (#AE3030) dots (down-regulated) clearly visible below. Blue Catmull-Rom LOESS curve (#4467A3) hugs M=0, revealing slight upward bias at low expression. Solid gray reference line at M=0, dashed lines at M=±1.
      Legibility verdict: PASS — all text readable against the light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light near-white text — clearly readable. Axis labels and tick labels in light secondary text — readable. Gene count annotation in lighter muted gray — readable. Legend text in light secondary text — legible. All chrome elements adapted to dark theme.
      Data: Data colors are identical to the light render — brand green up-regulated dots, matte red down-regulated dots, blue LOESS curve, muted gray non-significant dots (lighter gray in dark theme via INK_MUTED branch). Reference lines adapt via t.ink/t.inkSoft tokens.
      Legibility verdict: PASS — no dark-on-dark failures observed, all text readable against the near-black background. Brand green #009E73 is clearly visible on dark surface.
