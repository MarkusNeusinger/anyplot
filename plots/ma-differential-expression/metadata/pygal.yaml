review:
  strengths:
  - Excellent data quality with realistic RNA-seq gene names and biologically plausible
    expression distributions
  - Clean KISS code structure with good use of pygal XY chart and node dict format
    for rich data points
  - Good visual hierarchy with red significant genes standing out against steel blue
    non-significant background
  - Thoughtful subsampling strategy that keeps all significant genes while downsampling
    non-significant for SVG performance
  - LOESS smoothing approximation well-implemented without external dependencies
  weaknesses:
  - Dense overlap in low-expression region makes individual points hard to distinguish
  - Top DE gene labels only appear in tooltips not as visible text annotations on
    the plot
  - Legend with 7 entries slightly crowded at bottom
  - Non-significant dots could use more transparency to better reveal density patterns
  image_description: The plot displays an MA plot (M-versus-A) for differential gene
    expression on a white background. The x-axis is labeled "Mean Expression (A)"
    ranging from 0 to ~26, and the y-axis is labeled "Log₂ Fold Change (M)" ranging
    from about -4 to 5. The title reads "ma-differential-expression · pygal · pyplots.ai".
    Non-significant genes are shown as steel blue dots clustered densely in the low-expression
    region (left side), while significant genes (p < 0.05) are rendered as red dots
    spread across the full expression range, with upregulated genes above M=0 and
    downregulated genes below. A solid blue horizontal reference line marks M=0 (no
    change). Two dashed gray horizontal lines mark the ±1 (2-fold change) thresholds.
    An orange LOESS trend curve runs near M=0, showing minimal systematic bias. Dark/black
    larger dots mark the top 10 most differentially expressed genes (BRCA1, TP53,
    MYC, etc.). A 7-item legend at the bottom identifies all series. The plot is dense
    on the left and sparse on the right, reflecting the exponential distribution of
    gene expression levels.
