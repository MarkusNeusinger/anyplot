  image_description: 'The plot displays an MA plot (M-versus-A) for differential gene
    expression analysis. The x-axis shows "Mean Expression (A)" ranging from 0 to
    15, and the y-axis shows "Log₂ Fold Change (M)" ranging from approximately -6
    to +6. Non-significant genes appear as light gray semi-transparent points (alpha
    ~0.2), while significant genes are shown in a muted red/pink (alpha ~0.75). A
    solid dark horizontal reference line sits at M=0, with dashed gray lines at M=+1
    and M=-1 marking 2-fold change thresholds. A blue LOESS smoothing curve runs nearly
    flat near zero across the expression range. Eight top differentially expressed
    genes are labeled: BRCA1, APC, RB1, MYC, TP53, KRAS, EGFR, and PTEN. The title
    reads "ma-differential-expression · plotnine · pyplots.ai" in bold at the top.
    The legend at top shows "Not significant" and "Significant" categories. The background
    is clean white with subtle horizontal grid lines only.'
