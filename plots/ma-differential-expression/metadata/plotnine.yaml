  image_description: 'The plot displays an MA plot with Mean Expression (A) on the
    x-axis (range 0-15) and Log2 Fold Change (M) on the y-axis (range approximately
    -7 to +6). Points are colored in two groups: light gray with low alpha for "Not
    significant" genes and pink/red with moderate alpha for "Significant" genes. A
    solid dark horizontal line marks M=0 (no change), with dashed gray lines at M=+1
    and M=-1 (2-fold change thresholds). A blue LOESS smoothing curve runs through
    the data near M=0 showing slight expression-dependent bias. Eight well-known cancer
    genes (APC, BRCA1, RB1, MYC, TP53, KRAS, EGFR, PTEN) are labeled near the extremes
    of the fold-change distribution. The legend is positioned at the top. Title reads
    "ma-differential-expression · plotnine · pyplots.ai". Layout is 16:9 landscape
    with theme_minimal styling.'
