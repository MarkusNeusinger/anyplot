  strengths:
  - Clean, well-structured code with appropriate data generation for RNA-seq context
  - Good use of alpha transparency to handle overplotting with 15K genes
  - Correct title format and descriptive legend with gene count
  - Proper reference lines at fold-change thresholds with labels
  - All font sizes explicitly set for high-resolution output
  weaknesses:
  - Yellow LOESS trend line (#FFD43B) is nearly invisible against white background
    — needs a darker, higher-contrast color
  - Layout has significant empty space on right side due to gamma-distributed expression
    data extending sparsely to 30+
  - Design is functional but not publication-quality — needs more visual polish
  - No gene name annotations for top DE genes (would improve storytelling)
  - Could leverage more Bokeh-specific features (HoverTool, color mappers, etc.)
  image_description: The plot displays an MA plot for differential gene expression
    with "Mean Expression (log₂)" on the x-axis (range 0–30+) and "Log₂ Fold Change
    (M)" on the y-axis (range approximately -4 to +4). Non-significant genes are rendered
    as small gray dots with low opacity, while significant genes (n=1,746) appear
    as larger red/pink dots (#E63946) with higher opacity. A solid blue horizontal
    reference line sits at M=0, with dashed blue lines at M=+1 and M=-1 labeled "FC
    = 2" and "FC = −2" respectively on the right side. A yellow LOESS trend line runs
    through the center of the data, though it is difficult to see against the white
    background. The legend is in the top-left corner showing "Not Significant", "Significant
    (n=1,746)", and "LOESS Trend". The title reads "ma-differential-expression · bokeh
    · pyplots.ai". Background is white with subtle grid lines.
