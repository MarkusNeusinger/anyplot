review:
  strengths:
  - 'Semantic color mapping: Up=green (#009E73/gain), Down=red (#AE3030/loss), Significant=lavender
    (#C475FD), NSig=INK_MUTED — all semantically justified by biology and Imprint
    palette anchors'
  - Two-layer scatter (background noise at small alpha + emphasis layer for DE genes)
    creates excellent visual hierarchy with clean composition
  - Bootstrap CI for LOESS trend (80 iterations on 2k subsample) provides uncertainty
    quantification matching seaborn own CI-band methodology
  - Gene labels (BRCA1, TP53, MYC, EGFR, VEGFA, IL6) spatially distributed across
    expression range with arrowhead annotations for biological context
  - In-plot No expression bias annotation delivers the key MA plot conclusion directly
    on the chart
  - 'Perfect spec compliance: all required features (reference lines, LOESS, alpha,
    gene labels) correctly implemented'
  weaknesses:
  - LOESS trend line (blue) has no legend entry; the 95% CI label in the legend describes
    the CI band but the trend line itself is not labeled there — viewers unfamiliar
    with MA plots must infer its meaning from the floating No expression bias text
    annotation
  - Significant lavender dots (p<0.05 but |LFC|<1) merge into the gray background
    cloud in dense low-expression region — slightly larger size or higher alpha for
    this category would improve their visual distinctness
  - DE-03 storytelling limited by unlabeled LOESS line; adding a small LOESS trend
    label to the line (via ax.lines or custom legend handle) would complete the narrative
