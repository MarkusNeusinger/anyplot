review:
  strengths:
  - 'Perfect spec compliance — all required features present: reference line at M=0,
    dashed ±1 LFC thresholds, LOESS bias curve, transparency for overplotting, significance-coded
    colors, and gene labels with leader segments'
  - 'Excellent three-tier visual hierarchy: muted gray non-significant cloud (alpha=0.20),
    vivid Imprint-colored significant genes (alpha=0.70), and amber LOESS diagnostic
    curve — viewer immediately reads the story'
  - 'Semantic color assignment is justified and on-palette: green (#009E73) for up-regulation,
    matte red (#AE3030) for down-regulation, amber (#DDCC77) for the LOESS caution
    indicator — all correct Imprint anchors'
  - Realistic cancer biology context with real gene names (FOXM1, CDK1, MYC, EGFR,
    CDKN1A, RB1, BRCA2, TP53) and biologically plausible distribution including funnel-shape
    heteroscedasticity at low expression
  - 'Theme-adaptive chrome fully implemented: PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED all branch on ANYPLOT_THEME — both renders are clean and readable'
  - Uses letsplot-specific layer_tooltips() for interactive HTML export with formatted
    gene data — genuinely distinctive feature with dual PNG+HTML output
  - 'Clean KISS code structure: seed set (np.random.seed(42)), no functions/classes,
    all imports used, correct ggsave API with scale=4'
  weaknesses:
  - 'Gene labels slightly small (geom_label size=4 mm) — on the dark render, down-regulated
    red labels (#AE3030 on #242420 elevated background) have borderline contrast (~3.2:1);
    consider size=5 and adding INK border stroke to label boxes for the dark theme'
  - 'LM-02: layer_tooltips is a good start but letsplot''s full distinctive feature
    set is underused — consider adding geom_livemap / coord_flip / more interactive
    aes mappings to push library mastery higher'
  - 'DE-02: Minor refinement opportunity — the legend box border uses INK_SOFT which
    is visible but could use a thinner stroke; legend title ''Regulation'' is redundant
    given clear color semantics in the axis labels'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "ma-differential-expression · python · letsplot · anyplot.ai" is dark ink, readable at ~75% of canvas width. X-axis label "Mean Expression (A)" and Y-axis label "Log₂ Fold Change (M)" are dark ink, well-sized at 12pt. Tick labels in INK_SOFT (#4A4A44), clearly readable. Subtle horizontal-only grid in muted tone. Legend at bottom with "Regulation ● Up-regulated ● Down-regulated" — both labels clear.
      Data: 14,200 non-significant genes as a dense muted gray cloud (alpha=0.20, INK_MUTED). 420 up-regulated genes in Imprint green (#009E73, alpha=0.70) fanning above the reference band. 380 down-regulated in Imprint matte red (#AE3030, alpha=0.70) below. LOESS curve in amber (#DDCC77) running horizontally near M=0 revealing near-zero systematic bias. Solid reference line at M=0, dashed lines at M=±1 visible. Eight gene labels (MYC, FOXM1, CDK1, EGFR, BRCA2, TP53, RB1, CDKN1A) with dotted leader segments — all readable.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light cream text (#F0EFE8), clearly visible. Axis labels and tick labels in INK_SOFT (#B8B7B0 dark) — all readable. Grid lines subtle in dark mode. Legend text visible against dark elevated background (#242420).
      Data: Data colors IDENTICAL to light render — green (#009E73) up-regulated, red (#AE3030) down-regulated, gray muted non-significant cloud. LOESS amber (#DDCC77) is notably more visually prominent on the dark surface (bright band effect) which is appropriate — it draws attention as a diagnostic indicator. Gene labels with colored text (green/red matching series) on dark elevated-bg label boxes; green labels read well, red labels (#AE3030 on #242420) are borderline but still readable at full resolution.
      Legibility verdict: PASS — all chrome is light-on-dark, no dark-on-dark failures; minor note that red gene labels have lower contrast in dark mode (~3.2:1 on elevated bg)
