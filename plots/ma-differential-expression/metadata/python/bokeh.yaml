review:
  strengths:
  - Sophisticated gradient coloring by -log10(p-value) via imprint_seq colormap —
    more informative than binary red/gray approach
  - 'All spec requirements implemented: M=0 reference line, ±1 dashed FC thresholds,
    LOESS smoothing, transparency, top-gene annotations'
  - 'Highly idiomatic Bokeh usage: ColumnDataSource, HoverTool, LinearColorMapper+transform(),
    Span, Label, ColorBar — full library feature set'
  - Full theme adaptation for all major elements (title, axis labels, ticks, grid,
    legend, page/border background)
  - Realistic RNA-seq simulation with biologically plausible gene names, expression
    distribution (gamma), 8% DE rate, and p-value structure
  - Summary annotation (upregulated/downregulated counts) adds at-a-glance context
  - Clean reproducible code with np.random.seed(42), proper Selenium headless export,
    and both HTML + PNG artifacts saved
  weaknesses:
  - 'Title is missing the language token: ''ma-differential-expression · bokeh · anyplot.ai''
    should be ''ma-differential-expression · python · bokeh · anyplot.ai'''
  - ColorBar background not adapted for dark theme — color_bar.background_fill_color
    and color_bar.bar_line_color are not set; add background_fill_color=PAGE_BG (or
    ELEVATED_BG) and background_fill_alpha=1 to the ColorBar constructor so it blends
    with the dark surface rather than showing as a light box
  - Gene annotation labels cluster at the bottom-left quadrant (COL2168, SHH1305,
    RBB441, etc.) and overlap each other — consider spreading labels with x/y offsets
    or limiting to top 5 rather than 8
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct for light theme
      Chrome: Title 'ma-differential-expression · bokeh · anyplot.ai' at 50pt in dark ink — readable. X-axis 'Mean Expression (log²)' and Y-axis 'Log² Fold Change (M)' at 42pt in dark ink. Tick labels at 34pt in INK_SOFT. All chrome text is dark and clearly readable against the light background.
      Data: ~13,000 non-significant genes as muted gray scatter (alpha=0.12) form a background cloud. ~1,746 significant genes colored teal-to-blue via imprint_seq gradient encoding -log10(p-value) (alpha=0.7, size=9). LOESS trend in lavender (#C475FD) — clearly visible. Reference lines at M=0 (solid) and M=±1 (dashed). FC=2 and FC=-2 italic labels. Summary annotation at bottom-left. ColorBar on right side with proper teal-blue gradient.
      Legibility verdict: PASS — all elements readable. Gene annotation labels (22pt) and summary annotation (24pt) are readable at full resolution but may be tight at small sizes.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct for dark theme
      Chrome: Title, axis labels, and tick labels rendered in light theme-adaptive colors (INK=#F0EFE8, INK_SOFT=#B8B7B0) — all clearly readable against the dark background. No dark-on-dark failures observed for text elements.
      Data: Data colors are identical to the light render — same teal-to-blue gradient for significant genes, same muted color for non-significant. LOESS lavender line clearly visible. Reference lines and FC labels visible.
      Legibility verdict: PASS for text. MINOR ISSUE: The ColorBar on the right side appears to have a lighter background inconsistent with the dark page background — color_bar.background_fill_color is not explicitly set to PAGE_BG or ELEVATED_BG, so Bokeh's default (likely near-white) is used, creating a visible light rectangle against the dark surface. This is a theme-chrome adaptation failure for the ColorBar widget specifically.
