review:
  strengths:
  - Complete and accurate MA plot with all required spec features (significant highlights,
    reference lines, LOESS, gene annotations)
  - Excellent use of imprint_seq continuous colormap to encode significance strength
    as a gradient rather than binary color
  - Principled top-gene selection using composite score (|LFC| × −log10p) avoiding
    arbitrary cutoffs
  - 'Full theme adaptation: all 5 chrome tokens applied to all text, axis, grid, legend,
    and colorbar elements in both renders'
  - LOESS approximation via binned moving average + convolution avoids scipy dependency
    while producing smooth trend
  weaknesses:
  - 'Text overlap in lower-left quadrant: summary annotation (''▲ 599 upregulated
    · ▼ 643 downregulated'') at screen coords (70, 70) overlaps with gene name labels
    SHH1360 and COL1158 in data-space — relocate summary annotation to top-right or
    bottom-right screen-space position to clear all gene annotations'
  - 'Design headroom: tick marks could be removed for a cleaner look; axis_line_width
    could be reduced'
