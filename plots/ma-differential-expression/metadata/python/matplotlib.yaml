review:
  strengths:
  - Perfect spec compliance — all five required features (significant highlighting,
    M=0 reference, ±1 dashed thresholds, LOESS, gene labels) implemented correctly
  - Excellent data quality — realistic RNA-seq statistics, appropriate gene count,
    real cancer gene names (BRCA1, TP53, MYC, EGFR, PTEN, RB1, APC, KRAS), biologically
    plausible fold-change magnitudes
  - Correct semantic color exception — upregulated=green (gain), downregulated=red
    (loss) is exactly the right application of the Imprint palette's semantic anchor
    rule, matching genomics domain convention
  - Complete theme adaptation — every chrome element flips correctly between light
    and dark; data colors stay identical; no dark-on-dark failures in the dark render
  - Performance-aware implementation — rasterized=True prevents vector-rendering overhead
    for 15k scatter points
  - 'Three-tier visual hierarchy is textbook MA plot storytelling: grey cloud (non-significant)
    → colored significant → named outliers'
  weaknesses:
  - Minor annotation crowding in the lower-left region — KRAS, RB1, and PTEN labels
    and their connector arrows compete in a small area at low mean expression / strongly
    negative fold change; consider increasing vertical spread in label offsets for
    the downregulated cluster
  - Gene annotation labels at fontsize=7pt are slightly small; increasing to 7.5–8pt
    would improve readability at mobile-scaled views without causing layout issues
  - The LOESS computation uses a binned spline approximation (UnivariateSpline) rather
    than true weighted local regression; the label 'LOESS trend' is slightly misleading
    — 'smoothed trend' would be more accurate
