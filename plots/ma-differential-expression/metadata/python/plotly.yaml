  strengths:
  - 'Semantically correct Imprint palette assignment throughout: brand-green (#009E73)
    for significant genes, muted anchor for non-significant background noise, Imprint
    blue (#4467A3) for LOESS, amber (#DDCC77) for threshold markers — no arbitrary
    color choices'
  - 'Strong visual hierarchy following biological MA-plot conventions: receding gray
    cloud, emerging green focal points, overlaid smoothing curve, amber threshold
    anchors'
  - 'Complete spec compliance: all required features present (M=0 reference line,
    ±1 fold-change thresholds, LOESS-like smoothing curve, significance highlighting
    with alpha, gene-level annotation)'
  - 'Perfect code quality: np.random.seed(42) set, all imports used, no dead code,
    linear structure, title fontsize auto-scales with length via formula'
  - 'Theme adaptation correct in both renders: INK/INK_SOFT/INK_MUTED/GRID/PAGE_BG/ELEVATED_BG
    all threaded through every element; no dark-on-dark failures detected'
  weaknesses:
  - 'Gene annotation boxes overlap in the upper-left quadrant: BRCA1 and TP53 labels
    are positioned too close (showing ''TP53 1'' instead of two clean separate boxes);
    VEGFA and IL6 labels also overlap (showing ''VE IL6'') — adjust annotation ax/ay
    offsets to spread labels, or limit top-gene labels to fewer (top 7) with larger
    offset values (ay: ±55) to prevent clustering in dense regions'
  - MYC annotation (high expression, high LFC, rightmost data point) is positioned
    partially behind the legend box — annotation at x~14-15 with ax=-32 places the
    label near x=0.82 conflicting with legend at xanchor='right' x=0.86; fix by using
    ax=-60 for genes with mean_expression > 13, or move legend to x=0.99/y=0.98
  - Full plot border box visible in both renders (plotly default frame) instead of
    cleaner L-shaped or minimal frame — add xaxis=dict(showline=False, mirror=False)
    and yaxis=dict(showline=False, mirror=False), or use template='none' as base to
    remove the default border box
