review:
  strengths:
  - 'Semantically correct Imprint palette: brand green (#009E73) for upregulation,
    matte red (#AE3030) for downregulation, muted anchor for NS — all three semantically
    justified and palette-compliant'
  - Redundant encoding (color + shape + alpha + size) provides CVD safety for the
    red-green distinction while also adding visual hierarchy
  - Perfect spec compliance — all five required features (M=0 reference line, M=±1
    dashed thresholds, LOESS smoothing, alpha transparency, gene labels) implemented
    correctly
  - Realistic immunogenomics domain with real T-cell activation gene names (IL2, IFNG,
    FOXP3, CD69, TNF, GATA3, TBX21) and biologically plausible data distribution
  - Both themes pass readability checks; theme-adaptive chrome fully threaded through
    all elements with no dark-on-dark or light-on-light failures
  weaknesses:
  - Gene label cluster around x=7-10 (FOXP3, CD69, IL2, TNF) is crowded; reduce labeled
    gene set to the 4-5 most extreme genes by |LFC|*sqrt(baseMean) to improve readability
  - 'LOESS curve (#4467A3) loses visibility in the dense NS band near M=0 — increase
    size from 1.2 to ~1.8 or use a higher-contrast Imprint color (e.g., #BD8233 ochre)
    for better legibility'
  - Missing explicit axis_line in theme() — adding element_line(color=INK_SOFT) for
    axis_line ensures consistent axis borders across plotnine versions
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
