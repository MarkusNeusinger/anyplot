      Data: Dense scatter of ~15,000 points. Upregulated: green upward triangles (#009E73, alpha=0.8). Downregulated: dark-red downward triangles (#AE3030, alpha=0.8). Not significant: muted gray circles (INK_MUTED, alpha=0.15). Solid M=0 reference line, dashed M=±1 threshold lines, blue (#4467A3) LOESS curve through center. Eight italic gene labels placed with nudge. "±2-fold threshold" callout annotation.
