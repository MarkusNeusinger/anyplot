review:
  strengths:
  - 'Semantically correct Imprint palette exception: green (#009E73) for upregulated
    and matte-red (#AE3030) for downregulated follow bioinformatics convention and
    match the style guide semantic exception rule'
  - Full spec compliance — all required features present (LOESS curve via stat_smooth,
    M=0 solid reference line, ±1 dashed threshold lines, alpha=0.12 transparency for
    non-sig genes, top gene labels in italic)
  - 'Sophisticated multi-layer plotnine composition: coordinated scale_color_manual/scale_alpha_manual/scale_size_manual
    creating distinct visual hierarchy between significant and non-significant genes'
  - Realistic T-cell activation immunology data with genuine marker genes (IL2, IFNG,
    FOXP3, CD69, TNF, TBX21, etc.) and plausible DEG proportions (~8%)
  - Both light (#FAF8F1) and dark (#1A1A17) themes render correctly with proper chrome
    token adaptation throughout
  weaknesses:
  - 'CVD accessibility gap: upregulated (green) vs downregulated (red) are distinguished
    by color alone with no shape redundancy — colorblind users (deuteranopia/protanopia)
    may struggle to tell the two significant groups apart; adding distinct marker
    shapes (e.g. triangle_up/triangle_down) would fix this'
  - Gene labels (size=3.0 mm ≈ 8.5pt) are small — barely readable when the plot is
    scaled to mobile width (~400px); increase to size=3.5–4.0 for better legibility
  - Non-significant genes at alpha=0.12 and size=0.8 are nearly invisible individually
    — while the mass effect is intentional for dense scatter, the combination is at
    the boundary of element visibility; alpha=0.15 and size=1.0 would improve the
    aggregate impression without losing hierarchy
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white
      Chrome: Title "ma-differential-expression · python · plotnine · anyplot.ai" in bold dark ink, clearly readable. X-axis label "Mean Expression (A)" and Y-axis label "Log₂ Fold Change (M)" both in dark ink at matching sizes. Tick labels on both axes readable in INK_SOFT (#4A4A44). Legend at top shows three categories with correct swatch colors and dark text — fully readable.
      Data: Dense scatter of ~15,000 genes. Non-significant genes appear as a faint gray cloud (alpha=0.12, size=0.8 — near-transparent but visible as a mass). Upregulated genes in brand green (#009E73) and downregulated in matte-red (#AE3030) — both at alpha=0.8, size=2.0 — clearly pop against the gray cloud. Solid dark horizontal line at M=0. Dashed INK_SOFT lines at M=±1 with a "±2-fold threshold" annotation box. Blue LOESS curve (#4467A3) tracks the data trend near M=0. Eight top gene labels in italic dark text (IL2, IFNG, IL4, FOXP3, CD69, TNF, GATA3, TBX21) with nudge offsets — small but legible at full resolution.
      Legibility verdict: PASS — all chrome elements readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface
      Chrome: Title in light ink (#F0EFE8) — clearly readable. Axis labels and tick labels in light INK_SOFT (#B8B7B0) — readable against the near-black background. Legend text readable. No dark-on-dark failure observed.
      Data: Data colors identical to the light render — green upregulated, red downregulated, muted gray for non-significant (INK_MUTED adapts to #A8A79F in dark, clearly visible against #1A1A17). The LOESS curve in #4467A3 blue remains visible. Reference lines and annotation box (using ELEVATED_BG #242420) all visible. Gene labels in light ink — readable.
      Legibility verdict: PASS — no dark-on-dark failures; all text readable against the warm near-black background.
