review:
  strengths:
  - 'Complete spec compliance — all required elements present: LOESS smoothing via
    transform_loess, reference lines at M=0 and M=±1, background band, significance
    highlighting with semantic color assignment (green=up, red=down), and gene labels
    for top DE genes'
  - 'Excellent palette usage with semantic exception: upregulated genes use Imprint
    pos 1 (#009E73 brand green) and downregulated use Imprint pos 5 (#AE3030 matte
    red) — the category labels (''Upregulated''/''Downregulated'') clearly justify
    the semantic override'
  - Shape redundancy (triangle-up / triangle-down) for colorblind accessibility —
    addresses the red-green CVD concern explicitly
  - Native Altair statistical transform (transform_loess) for the LOESS curve — idiomatic
    and distinctive Altair usage that avoids manual scipy LOESS computation
  - 'Proper theme adaptation in both renders: no dark-on-dark issues in the dark render,
    all chrome tokens correctly flip while Imprint data colors stay constant'
  weaknesses:
  - Grid uses dashed lines (gridDash=[3, 3]) — the style guide specifies solid thin
    lines (no dashes) for grid. Change to gridDash=[] or remove the gridDash parameter
  - PTEN and KRAS gene labels are crowded in the lower region (both around x≈6, y≈-4
    to -5) — the collision avoidance only adjusts adjacent pairs sorted by x, leaving
    these two labels close enough to feel cramped. Consider increasing the label_y
    adjustment factor from 0.5 to 0.8–1.0
  - The ±1 FC background band is extremely faint (opacity=0.07) — barely perceptible
    in both renders. Consider raising to 0.10–0.12 so it reads as a purposeful design
    element rather than an artifact
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page surface, not pure white.
      Chrome: Title "ma-differential-expression · python · altair · anyplot.ai" in dark ink, clearly readable. Subtitle "RNA-seq differential expression: upregulated (green) and downregulated (red) genes" in INK_SOFT, legible. X-axis label "Mean Expression (A)" and Y-axis label "Log₂ Fold Change (M)" both clearly readable with explicit font sizes. Tick labels (0–16 on X, -4 to +4 on Y) in INK_SOFT, all visible. Dashed grid lines at gridOpacity=0.15 are subtle but present. Legend in top-right with ELEVATED_BG fill, showing upward green triangle (Upregulated) and downward red triangle (Downregulated).
      Data: ~14,250 non-significant genes rendered as tiny faint gray dots (size=15, opacity=0.2) forming a dense horizontal cloud near M=0. Upregulated genes (n=400) shown as green (#009E73) upward triangles, downregulated (n=350) as red (#AE3030) downward triangles — clearly visible above the non-sig cloud. LOESS line in ochre (#BD8233, Imprint pos 4) shows near-zero bias across the expression range. Horizontal reference lines at M=0 (solid dark) and M=±1 (dashed, INK_SOFT) clearly visible. Background band between ±1 FC is extremely faint (opacity=0.07). Gene labels: BRCA1 and EGFR at top, RB1 at bottom-left, PTEN and KRAS close together at bottom-center (slight crowding).
      Legibility verdict: PASS — all text readable; minor crowding between PTEN/KRAS labels but both distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Same title and subtitle now rendered in light ink (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in light INK_SOFT (#B8B7B0), all visible. Grid lines subtle against dark background. Legend box uses dark ELEVATED_BG (#242420) fill with light text — no dark-on-dark issues detected. All chrome correctly flips for dark theme.
      Data: Data colors are identical to light render — green (#009E73) upward triangles for upregulated, red (#AE3030) downward triangles for downregulated. Non-significant genes appear as light-gray faint dots. LOESS ochre line visible. Reference lines visible. Same gene labels readable in light ink.
      Legibility verdict: PASS — no dark-on-dark failures; all text readable against the dark background; brand green #009E73 remains visible and clearly distinguishable on the dark surface.
