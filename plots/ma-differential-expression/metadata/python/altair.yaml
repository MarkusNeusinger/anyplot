review:
  strengths:
  - 'Complete spec compliance — all required MA plot features implemented: LOESS smoothing,
    reference lines at 0 and ±1 FC, significant gene highlighting, and gene labeling'
  - Semantic color assignment with shape redundancy (triangle-up/down) provides CVD-accessible
    encoding without violating Imprint palette rules
  - Realistic RNA-seq simulation with 15,000 genes and recognizable cancer gene names
    (BRCA1, MYC, EGFR, PTEN, RB1, KRAS) adds scientific authenticity
  - 'Idiomatic Altair: transform_loess built-in transform, selection_point hover interaction,
    alt.condition for dynamic sizing, and layer composition via + operator'
  - 'Both renders pass theme-adaptive chrome — correct warm backgrounds (#FAF8F1 light
    / #1A1A17 dark) with fully legible text in both themes'
  weaknesses:
  - Gene labels use fontSize=10 which is small relative to the 3200×1800 canvas —
    at mobile widths (~400px) the italic gene names (BRCA1, MYC, etc.) may become
    difficult to read; consider fontSize=11–12
  - PTEN and KRAS labels are visually close together in the downregulated zone (both
    near x=5–7, y≈−4 to −5) — the collision-avoidance loop adjusts y but the labels
    remain near each other, creating slight visual crowding
  - Design excellence slightly below potential — the legend stroke border on an already
    elevated-background legend adds visual weight; removing the stroke and using only
    the fill difference would be cleaner (DE-02 refinement opportunity)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "ma-differential-expression · python · altair · anyplot.ai" in dark ink (#1A1A17) at fontSize=16, fully visible. Subtitle "RNA-seq differential expression: upregulated (green) and downregulated (red) genes" in softer ink, readable. Axis labels "Mean Expression (A)" (x) and "Log₂ Fold Change (M)" (y) in dark ink at fontSize=12, clearly readable. Tick labels at fontSize=10, readable. Legend box top-right with elevated background, labeled "Upregulated" (green triangle-up) and "Downregulated" (red triangle-down) — text readable.
      Data: 15,000 non-significant genes as tiny gray dots (opacity=0.2) forming the characteristic fan-shaped MA cloud. ~400 upregulated genes as green (#009E73) filled triangle-up markers. ~350 downregulated genes as red (#AE3030) filled triangle-down markers. Ochre (#BD8233) LOESS line nearly flat near y=0 showing good normalization. Horizontal solid rule at y=0 and dashed rules at y=±1. Subtle gray band between y=−1 and y=+1. Gene labels: BRCA1 (y≈4.2), MYC (y≈5.0), EGFR (y≈4.0) in upper half; RB1 (y≈−4.0), PTEN (y≈−4.5), KRAS (y≈−5.0) in lower half — italic bold, readable but small.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title and subtitle rendered in light cream (#F0EFE8), fully visible. Axis labels in light ink, readable. Tick labels in softer light (#B8B7B0), readable. Legend text in light color, readable against elevated dark-charcoal (#242420) legend background. No dark-on-dark text failures detected.
      Data: Data colors IDENTICAL to light render — upregulated genes remain #009E73 green (triangle-up), downregulated remain #AE3030 red (triangle-down), LOESS line remains ochre. Non-significant gray cloud adapts to slightly lighter muted tone against the dark background. Reference lines and ±1 band remain visible.
      Legibility verdict: PASS — all text clearly readable against the dark background; brand green #009E73 remains clearly visible.
