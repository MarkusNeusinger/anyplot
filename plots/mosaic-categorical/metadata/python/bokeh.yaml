review:
  strengths:
  - Both themes render perfectly with correct backgrounds (#FAF8F1/#1A1A17), fully
    theme-adaptive chrome, and identical data colors across renders
  - Titanic dataset is factually accurate and tells a compelling story about class
    and survival inequality
  - HoverTool with Class/Status/Count/Proportion tooltip is a genuine Bokeh-distinctive
    interactive feature
  - Clean minimalist design with no grid, axes, or border — appropriate and elegant
    for mosaic plots
  - Percentage + count dual labels inside each cell give viewers both relative and
    absolute context at a glance
  weaknesses:
  - 'Minor code duplication: class-label x_pos loop recomputes class widths separately
    from the main rectangle-building pass — could be unified into one iteration'
  - Custom legend construction is slightly verbose; Bokeh native legend could simplify
    the code
  - Typographic hierarchy between percentage label and count label inside cells could
    be stronger (larger size delta or weight contrast)
