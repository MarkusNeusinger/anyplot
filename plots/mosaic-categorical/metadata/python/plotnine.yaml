  - Correct mosaic geometry hand-built in plotnine grammar (geom_rect with computed
    xmin/xmax/ymin/ymax), since plotnine has no native mosaicplot
  - 'Perfect Okabe-Ito palette: Survived = #009E73 (brand green, position 1), Did
    Not Survive = #D55E00 (position 2)'
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, ELEVATED_BG tokens applied
    to all non-data elements, both renders pass legibility check'
  - Subtitle encodes the key insight numerically ('62% vs 25%, 2.5×'), and per-class
    survival rate annotations below each column reinforce the story
  - '100% spec compliance: widths proportional to class marginal frequency, heights
    proportional to conditional survival, gap spacing, count labels inside each cell'
  - Clean, flat script — no functions or classes; reproducible with hardcoded Titanic
    counts; all imports used
  weaknesses:
  - Class name labels (size=14) and per-class survival rate labels (size=12) are below
    the style-guide minimum of 16pt for secondary/tertiary text at 4800×2700px; raise
    to 16pt and 14pt respectively
  - Design sophistication is limited to flat colored rectangles and text — no visual
    refinement beyond gap spacing (e.g., subtle inner drop shadow, rounded corners,
    or typographic weight hierarchy on count labels vs. rate labels)
  - 'LM-02: plotnine''s grammar-of-graphics strengths (stat layers, position adjustments,
    coord_flip) are not leveraged — plot is built via raw coordinate math rather than
    plotnine''s higher-level abstractions'
