    cluttering the design
  weaknesses:
  - Design Excellence is moderate — no subtitle or annotation highlighting the key
    insight (e.g., survival rate per class like 62% in First vs 25% in Third), which
    would push DE-03 toward 6/6
  - Panel border is a full bounding box; removing top/right spines to an L-spine or
    removing all spines would be more refined (DE-02)
