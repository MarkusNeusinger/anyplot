    would better match the Okabe-Ito mapping order
  - 'Library Mastery is basic: no distinctively plotnine feature is used beyond the
    grammar of graphics foundation (shared with ggplot2) — consider stat_*() transformations
    or faceting to add a second variable dimension'
  - 'Minor right-side canvas imbalance: space below the legend is empty; reducing
    figure width or adding a subtitle/caption would fill that area'
