  weaknesses:
  - 'DE-01 (5/8): Design is functional and clean but lacks typographic sophistication
    — consider a more refined font hierarchy, perhaps a distinct display weight for
    the title vs. body labels, or subtle background accents to elevate visual polish
    to publication level'
  - 'DE-02 (4/6): No grid or spines is correct for a mosaic plot, but the layout has
    room for more refinement — consider tighter proportional spacing, a hairline separator
    between column label and proportion sublabel, or a more intentional margin system'
  - 'DE-03 (4/6): The proportional story is visible but could be more emphasized —
    highlighting the most striking pattern (e.g., Productivity dominates Desktop at
    57% vs ~15% on Mobile) with a subtle annotation or contrasting label weight would
    guide the viewer directly to the key insight'
  - 'VQ-01 (7/8): Title is slightly small relative to the 4800×2700 canvas — style
    guide recommends at least 56px but at this canvas size a title of 64–72px would
    read better as a dominant headline'
