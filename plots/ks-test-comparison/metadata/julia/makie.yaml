      Background: Warm off-white #FAF8F1 — correct anyplot light surface, no pure white.
      Chrome: Title "ks-test-comparison · julia · makie · anyplot.ai" in dark INK text, ~50-55% of plot width, clearly readable. "Credit Score" x-label and "Cumulative Proportion" y-label in dark INK, proportional size. Tick labels in muted INK_SOFT gray, clearly legible. Top and right spines removed. Subtle grid at 12% alpha.
      Data: Green (#009E73) step-function ECDF for "Good Customers"; lavender (#C475FD) step-function ECDF for "Bad Customers". Semi-transparent red (#AE3030 at 12% alpha) shaded band fills the divergence region between the two ECDFs. Dashed red vertical line marks the KS maximum at ~score 540. Thick solid red segment shows the D-statistic gap. Annotation "D = 0.658 / p < 0.001" in dark INK text positioned to the right of the KS marker. Legend in bottom-right with elevated background frame, both labels readable.
