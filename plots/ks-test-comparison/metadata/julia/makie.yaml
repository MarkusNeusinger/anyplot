review:
  strengths:
  - Correct full ECDF step-function implementation with proper KS statistic visualization
    — both the dashed full-height vertical line and the thick gap segment are present
    and work together effectively
  - 'Semantic color usage: matte red (#AE3030) for the KS divergence marker is the
    correct palette member for this role, reinforcing the story'
  - Full theme-adaptive chrome in both renders — dark render shows proper near-black
    background with light text throughout, no dark-on-dark failures
  - 'Perfect spec compliance: all required elements (two ECDFs, KS stat highlight,
    D/p annotation, legend) present and correct'
  - Realistic credit scoring context with plausible score distributions (Good ~620,
    Bad ~490) demonstrating strong model discrimination
  weaknesses:
  - Annotation text (fontsize=13) is slightly small; increase to 15-16 and optionally
    add a subtle semi-transparent background box to improve readability when the annotation
    sits near a curve
  - The helper functions (ecdf_step, ks_stat, ks_pvalue) add structural complexity;
    consider inlining the KS computation directly for a flatter KISS structure
  - 'Design ceiling: the plot is clean and functional but to reach 90+ consider adding
    a light-alpha shaded fill between the two ECDF curves at the maximum gap area,
    which would enhance the visual storytelling and push DE-01 toward 6'
