review:
  strengths:
  - Complete KS test visualization with correct ECDF step functions, D statistic,
    p-value annotation, and maximum-divergence marker — all spec requirements fulfilled
  - 'Semantic Imprint palette: brand green #009E73 for Good Customers, lavender #C475FD
    for Bad Customers, matte red #AE3030 for the KS divergence region — intentional
    and appropriate'
  - Shaded divergence band plus dashed vertical line and thick KS segment create a
    clear focal point that guides the viewer directly to the key insight
  - All theme tokens correctly wired — both light (#FAF8F1) and dark (#1A1A17) renders
    are readable with full chrome adaptation (title, labels, ticks, grid, legend box)
  - Inline KS statistic computation (D and asymptotic p-value) in idiomatic Julia
    using dot-broadcast operators — no external stats package dependency
  - Clean title-size scaling formula ensures the mandated anyplot title fits without
    overflow
  weaknesses:
  - ecdf_step helper function departs from KISS structure (CQ-01) — the two-call step-function
    construction could be inlined to remove the function definition
  - 'Shaded divergence band on dark render creates a large dark brownish-red region
    (transparent #AE3030 over #1A1A17) that is visually heavy and slightly mutes the
    elegance of the dark theme'
  - LM-02 could be strengthened — the implementation uses Makie band!/axislegend but
    misses opportunities to leverage distinctively Makie-specific features like Layout
    composition with colorbars or statistical recipe integration
  - 'DE-01 is above a configured default but not publication-ready: the chart is clean
    and professional but lacks a distinctive typographic hierarchy or compositional
    flourish that would push it to FiveThirtyEight quality'
  image_description: |-
