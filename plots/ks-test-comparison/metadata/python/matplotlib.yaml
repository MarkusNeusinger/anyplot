  strengths:
  - 'Full spec compliance: both ECDFs as step functions, KS statistic annotated with
    double-headed arrow, shaded max-distance region, p-value in interpretation box,
    and clear legend — every required feature is present.'
  - 'Semantic color assignment: Good Customers = brand green (#009E73), Bad Customers
    = matte red (#AE3030) with dashed linestyle providing redundant encoding for CVD
    safety — palette usage is correct and justified.'
  - 'Theme adaptation is complete and correct: all chrome tokens (INK, INK_SOFT, ELEVATED_BG,
    PAGE_BG) propagate to title, axis labels, tick params, legend frame, and annotation
    boxes — no dark-on-dark or light-on-light failures.'
  - 'Rich data storytelling: the shaded fill_betweenx region, double-headed dotted
    arrow, endpoint scatter markers, and interpretation box work together to communicate
    the KS test conclusion visually.'
  - Canvas dimensions correct (3200x1800), no bbox_inches='tight', clean KISS code
    structure with seed for reproducibility.
  weaknesses:
  - Annotation text in the interpretation box (lower right) is set at fontsize=8,
    which renders to ~44 source pixels on the 3200px canvas — readable at desktop
    but tight at mobile widths (~400px). Consider bumping to 9pt to match the D-value
    annotation box.
  - Library Mastery is moderate — ax.fill_betweenx and the double-headed arrowstyle
    annotation are good idiomatic choices, but there is no use of more advanced matplotlib
    features (e.g. ax.margins(), custom tick locator, or rcParams-based styling) that
    would elevate the score further.
  - The white-outline trick for the Bad Customers line (drawing a PAGE_BG-colored
    line first, then the actual line) is functional but adds a redundant step that
    could be replaced with a matplotlib linewidth/zorder approach — minor elegance
    concern.
