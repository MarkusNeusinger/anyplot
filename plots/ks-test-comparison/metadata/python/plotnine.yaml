review:
  strengths:
  - 'Full spec compliance: ECDFs as step functions, max divergence highlighted with
    dashed line, D statistic and p-value prominently displayed, both distributions
    labeled in legend'
  - Correct semantic color exception — Good Customers→green (#009E73), Bad Customers→red
    (#AE3030) — explicit and well-justified by category labels
  - 'Well-structured data storytelling: interpretive subtitle (''Distributions are
    highly distinct…'') plus D value annotation at divergence point plus stats summary
    box'
  - Complete theme adaptation — all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied in both light and dark renders
  - 'Idiomatic plotnine grammar: geom_step for ECDFs, geom_segment for divergence
    line, annotate(''label'') with boxstyle and fill for styled callout boxes'
  - Robust ECDF computation using np.searchsorted across merged value set to find
    exact maximum divergence point
  weaknesses:
  - Stats annotation box (size=3.0 mm ≈ 8pt) and subtitle annotation (size=2.8 mm
    ≈ 8pt) are close to the minimum readable size — at mobile thumbnail (~400 px)
    these risk becoming illegible; nudge both up by ~0.3–0.5 mm
  - K-S statistic box positioned at y=0.07 overlaps marginally with the rising green
    ECDF step function near x=500–600 — slight visual clutter where data and annotation
    share the same vertical band; moving the box lower (y=0.03) or adjusting x would
    eliminate the conflict
  - 'Design Excellence ceiling: DE-01 left room with only moderate visual hierarchy
    beyond palette — could add a subtle horizontal reference line at y=0.5 or employ
    size variation between the divergence line and ECDF lines to create stronger focal
    emphasis'
