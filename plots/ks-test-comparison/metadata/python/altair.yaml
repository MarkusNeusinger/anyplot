    colors across themes.
  - PAD-only canvas strategy correctly implemented; canvas gate passed.
  weaknesses:
  - 'The D = 0.623 annotation uses #4467A3 (Imprint blue) which reads clearly on light
    but has slightly lower contrast on the dark background #1A1A17 — a theme-adaptive
    annotation color (lighter blue or INK_SOFT) for dark mode would improve legibility.'
  - DE-01 is limited by lack of a distinctive visual treatment beyond clean defaults
    — e.g., subtle shading of the K-S gap region between the two ECDFs would make
    the maximum divergence more immediately visually prominent.
  - LM-02 could be pushed further with Altair-specific features like selection-based
    conditional encoding or vconcat for an inset panel showing the distribution histograms.
