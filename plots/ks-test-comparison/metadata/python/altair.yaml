review:
  strengths:
  - 'Excellent spec compliance — all required KS-plot features present: step ECDFs,
    vertical KS line, endpoint dots, D-statistic annotation, p-value in subtitle'
  - Semantic color pairing (green=#009E73 for Good, red=#AE3030 for Bad) is appropriate
    and immediately readable; redundant stroke-dash encoding adds colorblind safety
  - Idiomatic Altair layer composition with typed encodings, custom scales, and configure_*
    theme adaptation
  - Realistic credit-scoring context with statistically meaningful 300-point samples
    and correct ECDF computation via searchsorted on union grid
  - Monospace bold font for the KS annotation adds data-science aesthetic; subtitle
    with K-S stat and p-value provides immediate interpretive context
  weaknesses:
  - 'DE-01/DE-02: Well-configured but not publication-ready — the chart has both horizontal
    and vertical grid lines; prefer Y-axis-only gridlines in configure_axis (set gridOpacity=0
    on X axis) and consider adding a more distinct typographic hierarchy (larger title
    weight/size delta vs subtitle)'
  - 'DE-03: The D=0.623 annotation is positioned at the midpoint of the KS gap, but
    extends to the right into the region where the green ECDF rises — repositioning
    the label to the left of the KS line (align=right, slight x offset) or nudging
    it further right and up would give it cleaner whitespace and improve storytelling
    clarity'
  - 'CQ-04: ks_line_df and ks_endpoints_df are defined as identical DataFrames; ks_dots
    could reuse ks_line_df directly, removing the redundant definition'
  - 'VQ-05: The padded canvas results in noticeable background-only margins; consider
    slightly larger inner view dimensions (e.g., width=680, height=360) to make the
    chart fill more of the 3200x1800 canvas'
