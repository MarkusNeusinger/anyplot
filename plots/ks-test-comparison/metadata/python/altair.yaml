  - 'Semantic color assignment is exemplary: #009E73 (brand green) for Good Customers
    and #AE3030 (Imprint matte red, semantic anchor for bad/loss/error) for Bad Customers
    — maximally intuitive and palette-compliant.'
  - Redundant strokeDash encoding alongside color provides robust CVD safety — a deliberate
    and correct accessibility choice.
