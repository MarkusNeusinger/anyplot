review:
  strengths:
  - 'Perfect spec compliance: both ECDFs rendered as step functions (series.step=''left''),
    K-S statistic prominently displayed in subtitle and annotation, vertical line
    at max divergence with band highlight, p-value in subtitle, legend labels all
    correct.'
  - 'Excellent semantic color encoding: Good Customers → #009E73 (Imprint brand green),
    Bad Customers → #AE3030 (Imprint semantic red anchor for bad/loss/error) — the
    most obvious palette exception, correctly applied and strongly reinforced by the
    category labels.'
  - 'Strong storytelling: callout annotation ''D = 0.7300 · Strong separation'' with
    interpretive text, subtitle reports both D-statistic and p-value, band highlight
    at max divergence draws the eye to the key feature.'
  - 'Redundant encoding for CVD-accessibility: solid line for Good Customers vs. dashed
    line for Bad Customers supplements the green/red color difference — colorblind
    users can distinguish series by line style alone.'
  - 'Full theme adaptation: all chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED, GRID) correctly branch on ANYPLOT_THEME; data colors identical across
    light and dark renders; annotation callout background and border use elevated
    and soft ink tokens.'
  - All 4 canvas-size anchors properly aligned (chart options width/height, --window-size,
    CDP setDeviceMetricsOverride, div style) plus PIL safety-net pad — canvas gate
    passed.
  - 'Clean KISS structure: linear imports → tokens → data → chart → export, no functions
    or classes, seed set (np.random.seed(42)), only used imports, correct output filenames.'
  weaknesses:
  - Annotation label text (36px) is at the lower end of tertiary-text sizing for this
    3200×1800 canvas — at mobile scale (~400 px wide) this renders at ≈4.5 px, below
    the readable threshold. Increase to 40–44px to match tertiary text conventions.
  - 'Design Excellence capped at mid-range: DE-01 sits at the boundary between ''well-configured
    default'' and ''strong design.'' The callout and semantic colors are thoughtful
    but the overall composition doesn''t quite reach publication-ready polish — consider
    removing the legend border (use borderWidth:0) and making the band more visually
    prominent to reinforce the chart''s focal point.'
  - 'Library Mastery is average: the distinctive highcharts features used (plotBands,
    plotLines with labels, Annotations module, step-function lines) are correct but
    relatively straightforward. More advanced usage — e.g., Highcharts'' built-in
    responsive rules, dynamic series visibility, or chart.renderer custom SVG elements
    — would push this higher.'
  - LineSeries imported from highcharts_core.options.series.area (the area module)
    rather than highcharts_core.options.series.line — while functionally equivalent,
    this is non-idiomatic and could confuse maintainers.
