review:
  strengths:
  - 'Excellent semantic color mapping: Imprint green (#009E73) for Good Customers
    and matte red (#AE3030) for Bad Customers, exactly matching the palette''s semantic
    bad/fail anchor role'
  - Shaded divergence region (fill=toself with rgba blue at 12% opacity) provides
    extra visual clarity beyond spec requirements, drawing the eye to the maximum
    divergence area
  - Both ECDFs correctly implemented as step functions (line shape='hv') with proper
    scipy KS test computation via ks_2samp and ecdf
  - 'Full theme adaptation: all chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED, GRID) correctly applied across both light and dark renders'
  - 'Rich plotly-distinctive interactive features: unified hover mode, crosshair spike
    lines, HTML export with custom modeBarButtonsToAdd (drawline, eraseshape)'
  - Annotation with arrow clearly communicates K-S statistic (D=0.585) and p-value
    at the midpoint of the divergence line, with theme-adaptive background and border
  weaknesses:
  - The shaded fill color is hardcoded as rgba(68,103,163,0.12) — a fixed hex rather
    than derived from a theme-adaptive token. While it renders acceptably in both
    themes, the fill could use the BLUE variable with explicit alpha to stay idiomatic
    with the rest of the theme-adaptive code
  - 'DE-01 could reach 8/8 with more refined typography: differentiating font weights
    between the main title and the subtitle <span> to create stronger visual hierarchy,
    and slightly larger annotation font (14px) for clearer prominence'
  - DE-02 could be improved by completely removing the zero-line markers from both
    axes (zeroline=True is default in plotly_white template) and ensuring the annotation
    box border is slightly more subtle (use GRID color instead of solid BLUE border)
