review:
  strengths:
  - 'Perfect cycle plot structure: seasonal groups, chronological within-group lines,
    horizontal mean reference lines, shared y-axis — all spec features present'
  - CustomJSTickFormatter + FixedTicker for clean x-axis month labels is idiomatic
    and Bokeh-distinctive
  - 'Correct Imprint palette usage: brand green for subseries data, Imprint blue for
    mean reference lines'
  - Theme-adaptive chrome fully implemented for both renders — no dark-on-dark failures
  - Dynamic title fontsize scaling (max(34, round(50*67/n_chars))) handles the 75-char
    title correctly
  - Efficient multi_line() batch rendering for 12 subseries + 12 mean lines + 11 group
    dividers
  - Realistic synthetic data with meaningful warming signal (0.05°C/year) and appropriate
    noise (σ=0.8°C)
  - 'Clean code structure: linear, no functions/classes, all layout math pre-computed
    before figure construction'
  weaknesses:
  - Group dividers between months are barely perceptible at alpha=0.25 — increase
    to alpha=0.35–0.40 so seasonal boundaries are clearer without being dominant
  - The within-season warming trend (the key second story of a cycle plot) is visible
    but not emphasized — consider a subtle annotation pointing to one month's upward
    slope or a faint regression line over the subseries to make the trend narrative
    explicit
  - Legend box border is present (p.legend.border_line_color = INK_SOFT) — removing
    it or reducing its weight would improve visual refinement slightly
  - No explicit visual emphasis guides the reader to the cross-season mean comparison
    first, then to the within-season trends — a slight prominence difference or annotation
    would lift the storytelling score
