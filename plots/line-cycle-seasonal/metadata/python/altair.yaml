  weaknesses:
  - No legend provided — the two visual elements (green trend lines and lavender mean
    lines) are unexplained; a reader cannot tell at a glance which is which. Add a
    manual legend or annotation labels near each element type to anchor the key insight.
  - 'DE-03 gap: the chart shows the data but does not maximally guide the viewer —
    consider a brief annotation or subtitle calling out that horizontal lines show
    seasonal means and the slope of the green lines shows year-over-year warming within
    each month.'
  - 'Minor: within-month lines become quite dense in summer months (Jun–Aug) where
    25 overlapping data points form a thick band — a slight opacity reduction (0.55–0.65)
    or thinner strokeWidth (1.4) would help readability at those months.'
