review:
  strengths:
  - 'Correct cycle plot architecture: 12 month groups × 10 year points per group,
    with horizontal mean reference lines at each group''s mean — exactly matching
    the spec'
  - 'Excellent semantic color choice: Imprint position 1 (#009E73 green) for trend
    lines, Imprint position 5 (#AE3030 matte red) for mean reference lines — distinct
    and semantically meaningful'
  - 'Full Imprint palette and theme compliance: warm off-white/near-black backgrounds,
    theme-adaptive chrome, data colors identical across both renders'
  - Realistic neutral Berlin temperature dataset with factually correct values (1–22°C
    range) and detectable warming trend (0.08°C/year)
  - Both themes render without dark-on-dark or light-on-light failures
  - allow_interruptions=True with None-gap structure is idiomatic and distinctive
    pygal technique for visual group separation
  - HTML interactive export alongside PNG correctly implemented
  weaknesses:
  - 'X-axis month labels render as ''...'' (ellipsis) instead of Jan–Feb–...–Dec —
    pygal computes slot width from total_slots (131 positions) giving ~24px per slot,
    insufficient for 44-pt font. Fix: reduce major_label_font_size to ~28 so labels
    fit in pygal''s computed slot width, OR restructure x_labels to 12 entries (one
    per month) and map data differently'
  - No X-axis title set — add x_title='Month' to the pygal.Line constructor so the
    seasonal axis is labeled
  - Helper functions gstart(), trend_series(), mean_series() defined — violates KISS
    flat structure. Inline as list comprehensions in main body
  - CVD redundancy for mean vs. trend distinction is marginal — dashed style alone
    is insufficient for protanopia; consider adding a more distinctive dasharray pattern
    (e.g., 12,6) for mean lines
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Monthly Temperature Cycle · line-cycle-seasonal · python · pygal · anyplot.ai" in dark ink at top (~85% width, appropriate for long title with descriptive prefix). Y-axis label "Average Temperature (°C)" in dark text on left, clearly readable. Y-axis tick labels (2,4,6,...,22) in dark text, readable. X-axis group labels: FAIL — renders "..." (ellipsis) instead of month names (Jan–Dec) due to pygal computing slot width from full 131-position x_labels array (~24px/slot, insufficient for 44-pt font).
      Data: 12 seasonal groups of green (#009E73) connected lines (10 points each = years 2015–2024). Dashed red (#AE3030) horizontal mean reference lines at each group's seasonal mean. Winter groups cluster at low values (~1–4°C), summer groups at high values (~19–22°C). Warming trend visible in within-group slopes.
