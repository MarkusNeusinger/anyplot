      Data: Green (#009E73) trend lines and red (#AE3030) dashed mean lines are identical in color to the light render — only chrome flips. Data colors consistent across both themes as required.
      Legibility verdict: PARTIAL FAIL — X-axis month labels not showing (same ellipsis truncation as light render).
