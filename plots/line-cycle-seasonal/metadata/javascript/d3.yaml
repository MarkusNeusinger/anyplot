    mean reference lines (thicker blue) clearly distinguish the two key elements of
    a cycle plot
  - Descriptive title with prefix, well-labeled legend and y-axis with units (°C)
  weaknesses:
  - 'Palette ordering violation: mean reference lines use palette[2] (#4467A3 blue)
    instead of palette[1] (#C475FD lavender) — canonical order for a 2-series chart
    requires palette[0] then palette[1]; cherry-picking palette[2] over palette[1]
    violates the hard rule'
  - Design excellence is functional but not highly refined — no intentional typography
    hierarchy beyond font sizes, legend background has no elevated fill box, and the
    subtle group separators could be slightly more prominent to aid season-to-season
    readability
  - Year annotations (11px CSS = 22px physical) are on the small side for 3200px canvas
    — increase to 12–13px CSS for better readability when scaled to mobile widths
