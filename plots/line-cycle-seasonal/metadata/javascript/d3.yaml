  - Excellent data quality — realistic monthly temperature anomaly data with 20-year
    warming trend that clearly demonstrates within-season trend and seasonal-mean
    comparison
  - Perfect code quality — deterministic LCG seed, clean procedural structure, idiomatic
    D3 patterns throughout
  - Strong theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders fully
    readable with correct chrome token usage
