review:
  strengths:
  - 'Full spec compliance: all required cycle-plot elements present — seasonal groups,
    chronological within-group subseries lines, horizontal mean reference lines, shared
    y-axis, subtle vertical separators, natural calendar order'
  - Custom Chart.js plugin for range bands (min-max envelope) and month labels below
    x-axis is a sophisticated addition that shows deep library knowledge
  - Clean consolidated legend (only 2 entries for 24 datasets) via generateLabels
    — avoids the 12-legend-entry clutter that would normally result from the multi-dataset
    architecture
  - Insightful subtitle ('Upward slopes in every group reveal consistent +1.8°C warming
    across all seasons (2000–2019)') guides the viewer directly to the story
  - Deterministic LCG RNG with fixed seed ensures reproducibility without Math.random()
  - Dynamic title font scaling (22 * 67 / title.length) correctly handles the long
    descriptive title prefix
  - 'Theme-adaptive chrome fully correct in both renders: data colors identical (#009E73),
    only backgrounds and text flip'
  - 'Perfect code quality: KISS structure, clean helper functions gs() and rng(),
    no functions/classes, no over-engineering'
  weaknesses:
  - X-axis tick labels all display '2000' repeated 12 times (once per group), which
    is technically accurate (each subseries starts at 2000) but confusing for viewers
    who may wonder why the axis always reads the same value — consider removing x-axis
    ticks entirely and relying solely on month names, or show '2000–2019' as an annotation
    or axis subtitle instead
  - Data points within each group are compact (20 years across ~116 CSS px at pointRadius
    3.5) — individual year identification within a group is difficult; this is inherent
    to 20-year data in a cycle plot, but could be slightly improved with marginally
    increased group spacing or slightly smaller point radius to reduce visual crowding
  - Range band fill uses hardcoded rgba(0,158,115,0.08) instead of deriving from t.palette[0]
    — should be constructed dynamically e.g. via a hex-to-rgba utility or a CSS var
    for full theme-token purity
  - Design lacks any focal-point emphasis distinguishing the summer-peak months or
    highlighting the warming trend magnitude — color variation or size variation across
    groups could elevate storytelling from 'good' to 'excellent'
