review:
  strengths:
  - Perfect cycle plot implementation matching the William Cleveland canonical design
    — seasonal groups, chronological subseries, horizontal mean reference lines, all
    in one shared panel
  - Deterministic sin-based noise function produces realistic-looking temperature
    variation without Math.random(); excellent reproducibility
  - 'Palette compliance is exact: brand green (#009E73) for trend data, blue (#4467A3)
    for mean reference lines, colors: t.palette set globally; both tokens flow through
    chrome correctly in both themes'
  - Alternating plotBands (native Highcharts feature) cleanly separate the 12 month
    groups without visual clutter
  - Perfect spec compliance — all required features implemented; data scale and context
    are excellent
  - 'Code is exceptionally clean: flat structure, 24 series managed elegantly via
    .map(), custom tick positions computed precisely at group midpoints'
  weaknesses:
  - Marker radius=3 is slightly small for 20 data points per group — individual years
    are hard to read precisely; increase to radius=4 or 5 for better legibility without
    overcrowding
  - No annotations or callout labels highlight the key insights (warming trend slope,
    peak seasonal group) — a single text annotation on one representative month would
    elevate storytelling from data representation to narrative
  - The alternating plotBands use a hardcoded rgba(120,120,120,0.07) rather than a
    token-derived color; minor inconsistency with the design system
