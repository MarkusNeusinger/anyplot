review:
  strengths:
  - 'Excellent cycle plot implementation: 12 seasonal groups with chronological subseries,
    horizontal mean reference lines, and shared y-axis all match spec requirements
    precisely.'
  - Warming annotation ('+1.2 °C warming (Jul, 20 yrs)') creates a clear focal point
    and data insight on the hottest month group.
  - Alternating plotBands cleanly separate month groups without visual noise; BAND_COLOR
    is correctly theme-adaptive (dark vs light rgba opacity).
  - Deterministic fakeNoise() via sin-based hash is elegant and fully reproducible
    without Math.random().
  - 'Expert Highcharts API usage: chart.renderer.text with xAxis[0].toPixels() coordinate
    conversion, plotBands, per-series showInLegend and enableMouseTracking controls,
    zIndex layering.'
  weaknesses:
  - Annotation font size is 11px — marginally small at mobile scale (~400px viewport);
    increase to 12-13px for better readability.
  - Trend lines at lineWidth 1.5 are slightly thin for the grouped dot clusters; 2px
    would strengthen visual presence without adding noise.
  - 'Legend box uses Highcharts defaults; add legend.borderWidth: 0 to remove the
    default box stroke for cleaner visual refinement.'
