review:
  strengths:
  - Perfect spec compliance — 12 monthly groups, 6-year chronological subseries per
    group, and horizontal mean reference lines all correctly implemented
  - Idiomatic ECharts null-separator technique cleanly breaks lines between seasonal
    groups on a value-type x-axis without faceting
  - 'Two-tier visual hierarchy: thin (2.5px) green trend lines vs thick (4px) lavender
    mean lines, reinforced by different colors from the Imprint palette, immediately
    signals which layer encodes what'
  - Informative subtitle 'slope of each group reveals within-month trend · bar marks
    seasonal mean' guides interpretation without requiring annotations
  - Dynamic title font scaling (Math.max(14, Math.round(22 * 67 / titleText.length)))
    handles the long descriptive prefix elegantly
  - LCG fixed-seed RNG gives fully deterministic synthetic data despite the browser
    environment lacking seeded Math.random()
  - 'Theme-adaptive chrome is complete: t.ink, t.inkSoft, t.grid tokens used throughout;
    both renders are fully legible'
  - Seasonal pattern (winter highs, summer lows) and within-month upward trend (2018→2023)
    are both clearly visible — demonstrates the dual-pattern insight that defines
    the cycle plot
  weaknesses:
  - Secondary text (subtitle, legend, y-axis name) at fontSize 13px is slightly small
    for the 3200×1800 canvas; the ECharts library guide recommends ~14px for labels
    — nudge these to 14px for better mobile readability when scaled to 400px
  - 'DE-01 limited at 5/8: the design is clean but not exceptional — consider adding
    subtle vertical dividers or band fills between month groups to strengthen the
    seasonal-panel visual idiom and separate the spec''s ''subtle gaps or light vertical
    dividers'' requirement more explicitly'
  - 'DE-02 limited at 4/6: the x-axis spine (axisLine with inkSoft color) is still
    present; removing it (axisLine: { show: false }) would give the chart a more refined,
    open look consistent with the y-axis treatment'
  - No top-level color array set (option.color = t.palette is missing); colors are
    set at the series level which works, but following the library pattern guide to
    set the top-level palette improves consistency
  image_description: |-
