    seasonal mean') creates genuine data storytelling
  - Correct use of ANYPLOT_TOKENS for theme-adaptive chrome — both light (#FAF8F1)
    and dark (#1A1A17) renders are fully readable with no dark-on-dark or light-on-light
    failures
  - Deterministic LCG (seed=42) ensures reproducibility in the browser environment
    where seeded RNG is unavailable
  - 'Clean ECharts idioms: animation:false, connectNulls:false for group separation,
    customValues for month tick positions, emphasis:{ disabled:true } to freeze hover
    state for screenshot'
  - All font sizes explicitly set with title-scaling formula for the long mandated
    title string
  weaknesses:
  - 'VQ-07: Second series (Seasonal mean) uses t.palette[2] (#4467A3, blue, palette
    position 3) instead of canonical t.palette[1] (#C475FD, lavender, palette position
    2). No semantic justification for skipping position 1 — mean reference lines have
    no real-world color association. Fix: change lineStyle/itemStyle color for the
    ''Seasonal mean'' series to t.palette[1].'
  - 'DE-02: Spec suggests ''separate groups with subtle gaps or light vertical dividers''
    to help the eye parse month boundaries. Currently only null-separator line breaks
    create implicit separation, but no visual divider lines are drawn. Adding faint
    vertical markLine or visualMap pieces at group boundaries would improve group
    readability.'
  - 'DE-01: Design is thoughtful but the mean-line visual weight (width:4, palette[2])
    blends with the trend data rather than standing out as the primary comparative
    reference. Consider a distinct styling — e.g. a dashed or dotted linestyle on
    the mean line — to create stronger visual hierarchy between the ''within-group
    trend'' and the ''cross-group seasonal comparison'' messages.'
