      Data: 12 seasonal groups (Jan–Dec) arranged left to right. Each group has 6 connected data points (2018–2023) in #009E73 brand green with size-7 circle markers. A thicker horizontal lavender (#C475FD) mean reference line spans each group. Seasonal pattern clearly visible: Jan/Feb/Dec highest (~47–50 TWh), Jun/Jul lowest (~29–34 TWh). Within-group upward trend (2018→2023) visible especially in Jan, Feb, Dec.
