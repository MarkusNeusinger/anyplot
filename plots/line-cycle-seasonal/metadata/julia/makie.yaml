    rowgap!) and LineElement-based legend construction — distinctly Makie patterns
  weaknesses:
  - Warming trend annotation (Label in fig[2, 1:2]) appears very compressed or not
    clearly visible in both renders — without an explicit row height constraint, rowgap!
    of 4pt leaves insufficient space for fontsize=11 text; add rowsize!(fig.layout,
    2, Fixed(40)) before the save call to guarantee minimum height
  - Seasonal arc at 45% INK opacity and linewidth 1.5 is too subtle — barely distinguishable
    in the plot area, and the 'Seasonal arc' legend swatch appears very faint against
    the elevated background; increase to RGBAf(INK.r, INK.g, INK.b, 0.60) and linewidth
    = 2.0 for better presence
