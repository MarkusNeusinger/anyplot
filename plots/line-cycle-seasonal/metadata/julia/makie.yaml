review:
  strengths:
  - 'Correct cycle plot structure: 12 seasonal groups across x-axis, 30-year chronological
    subseries within each group, and clearly visible horizontal mean reference lines
    — spec fully implemented'
  - All required chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG) properly threaded
    through every Makie parameter; both themes render cleanly with no dark-on-dark
    or light-on-light failures
  - 'Color choices: #009E73 (brand green) for annual subseries and #4467A3 (Imprint
    blue, palette position 3) for mean lines create clear visual separation between
    the two encoding layers'
  - Code is flat, reproducible (Random.seed!(42)), and idiomatic for modern Makie
    — uses size=(1600,900) + px_per_unit=2 producing the correct 3200×1800 canvas,
    colsize!() for layout, RGBAf for alpha, and LineElement handles for a manually
    constructed legend
  - Subtle vertical dividers at 10% INK opacity between month groups and y-only grid
    at 12% opacity keep the chart readable without competing with data
  weaknesses:
  - 'Design Excellence / Storytelling: no annotation or highlighting of the within-group
    warming trend (0.04°C/year) — this is one of the two key insights cycle plots
    reveal; a short text annotation or per-group color gradient communicating the
    upward slope across years would substantially raise DE-03'
  - 'Within-group density: 30 annual observations squeezed into a ±0.35-unit band
    produces visually tangled lines especially for mid-season months (May–Sep); widening
    GROUP_HALF to 0.42–0.45 or reducing linewidth to 1.4 would improve within-group
    trend readability'
  - 'Design Excellence baseline: no standout visual innovation — the chart is correct
    and professional but relies entirely on default proportioning with no focal point,
    call-out, or emphasis element beyond the dual-color encoding'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) covering the entire canvas including axis interior and outer margins — correct.
      Chrome: Title "Monthly Temperature Cycles · line-cycle-seasonal · julia · makie · anyplot.ai" in dark ink at the top, font-size scaled down to ~17pt for the longer-than-67-char title, spanning ~65-70% of canvas width — well proportioned. X-axis label "Month" and Y-axis label "Average Temperature (°C)" in INK dark text. Tick labels (Jan–Dec, temperature values) in slightly lighter INK_SOFT gray. All text clearly readable against the off-white background. Top and right spines removed (L-frame). Y-only grid in subtle gray (~12% opacity). Subtle vertical dividers between month groups.
      Data: 12 seasonal columns (Jan–Dec) left to right in calendar order. Within each column, 30 annual temperature observations (1994–2023) connected as a thin green (#009E73) subseries line at alpha=0.72. A bold blue (#4467A3) horizontal mean reference line spans each group at linewidth=3.5 — clearly visible and standing out above the subseries. Seasonal arc clearly visible: winter months (Jan, Feb, Dec) cluster around −3 to −1°C; summer months (Jun, Jul, Aug) peak at 22–26°C. Legend in upper-right corner with semi-transparent frame showing both series types.
      Legibility verdict: PASS — all title, axis, and tick text readable; data elements clearly distinguishable; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) across entire canvas — correct, not pure black.
      Chrome: Title rendered in light near-white ink (#F0EFE8); axis labels and tick labels in lighter gray (INK_SOFT = #B8B7B0). Grid lines show as faint white horizontal lines on dark background. Legend has elevated dark background (#242420) with light label text. All chrome tokens correctly adapted for dark theme.
      Data: Data colors identical to light render — green (#009E73) subseries and blue (#4467A3) mean lines unchanged between themes. Brand green #009E73 reads well on the dark surface. The mean lines remain the dominant visual element.
      Legibility verdict: PASS — no dark-on-dark failures detected; all chrome elements correctly use light tokens against the dark background; data colors identical to light render as required.
