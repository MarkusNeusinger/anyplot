    values and warming trend
  weaknesses:
  - Palette uses positions 1 and 3 (green + blue) for the two series instead of canonical
    positions 1 and 2 (green + lavender). For a 2-series abstract dataset, canonical
    order should be 1→2.
  - Within-month trend lines are tightly clustered (year x-offset ±0.36 is small)
    making the chronological slope within each season hard to discern visually — spec
    emphasizes this slope as a key insight.
  - Annotation text size=2.5mm (~7pt) is at the lower edge of readability when the
    image is scaled to mobile width (~400px).
