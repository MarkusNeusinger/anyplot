review:
  strengths:
  - 'Authentic astronomical data: real bright-star coordinates and magnitudes (Sirius
    -1.46, Betelgeuse, Capella, Aldebaran, the Orion belt) give the chart genuine
    credibility'
  - Custom stereographic projection produces a natural circular sky window with a
    clean boundary circle and curved RA/Dec graticule — idiomatic CairoMakie via NaN-gap
    polylines and DataAspect()
  - Magnitude is mapped to marker size with brighter stars rendering larger (correct
    inversion), reinforced by a clear size legend (mag 0/2/4)
  - 'Strong visual hierarchy: brand-green #009E73 constellations pop against the muted
    gray background star field, creating an obvious focal layer'
  - Theme adaptation is flawless — data colors identical across both renders, only
    chrome (background, ink, grid, labels) flips; both light and dark are fully legible
  - Bold constellation labels (Ori, Tau, Gem, CMa, CMi, Aur) placed near group centroids
    aid orientation
  weaknesses:
  - Only 6 constellations are drawn versus the spec's stated target of 20-30 constellations;
    the chart reads as a focused winter-sky excerpt rather than the broad coverage
    requested — consider adding a few more well-known constellations (e.g. Per, Lep,
    Mon, Lyn) within the existing sky window
  - Some constellation labels sit close to their brightest star (Ori next to Betelgeuse,
    CMa next to Sirius, Aur next to Capella) — readable but a touch crowded; a small
    offset would add breathing room
  - Helper functions (project, angdist, magsize) are defined at top level; justified
    for the projection math, but a mild deviation from the strict KISS no-functions
    guideline
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) page and axis surface — not pure white. Correct.
      Chrome: dark title "star-chart-constellation · julia · makie · anyplot.ai" centered at top, fully readable. Bold dark constellation labels (Ori, Tau, Gem, CMa, CMi, Aur) clearly legible. Soft-gray coordinate tick labels (+30°, 0°, -30°, 4h-8h) readable. Subtle gray graticule and a darker gray circular sky boundary. Legend header "Star magnitude" and "mag 0/2/4" entries readable. All text passes.
      Data: constellation bright stars rendered in brand green #009E73 with off-white stroke, sized by magnitude; constellation stick-figure lines in semi-transparent green; background field stars in faint gray with magnitude-based alpha. First series is #009E73. Correct.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black. Correct.
      Chrome: light title and light bold constellation labels clearly visible against the dark surface. Soft light-gray coordinate tick labels readable. Subtle light graticule and a pale circular boundary. Legend text light and readable. No dark-on-dark text anywhere.
      Data: identical green #009E73 constellation stars and lines as the light render; field stars now light-gray with magnitude alpha. Data colors match the light render exactly — only chrome flipped. Correct.
      Legibility verdict: PASS
