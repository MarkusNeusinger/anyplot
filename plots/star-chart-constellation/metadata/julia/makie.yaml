review:
  strengths:
  - Sophisticated, hand-rolled stereographic projection centred on the winter sky
    — bright stars use real catalog coordinates (Sirius at mag -1.46, Betelgeuse,
    Rigel, etc.), giving a genuinely accurate and recognisable sky map.
  - 'Magnitude-to-size mapping is correct and inverted (brighter = larger via magsize),
    and the faint background star field uses alpha keyed to magnitude, creating a
    clean visual hierarchy: green constellation stars pop against the muted field.'
  - 'Both themes render correctly — warm off-white #FAF8F1 (light) and warm near-black
    #1A1A17 (dark); the dark render in particular reads as a convincing night sky.
    Data colours (brand green #009E73) are identical across themes, only chrome flips.'
  - 'Idiomatic CairoMakie: NaN-gap polylines for the coordinate grid and constellation
    edges, DataAspect() for an undistorted circular sky boundary, hidedecorations!/hidespines!
    for minimal chrome, per-point markersize arrays. Square 2400x2400 canvas hits
    the canonical target exactly.'
  - 'Thoughtful details: constellation labels are offset away from the brightest star
    of each group, RA/Dec ticks carry units (h, °), and a magnitude legend (mag 0/2/4)
    is parked in the empty corner outside the sky circle.'
  weaknesses:
  - Only 14 named constellations are drawn, below the spec's stated range of 20-30
    constellations. The chart is clean and readable, but adding ~6-10 more bright
    constellations (e.g. Cas, And, Cep, Cet) would better satisfy the spec coverage
    target.
  - RA/Dec tick labels are rendered at fontsize 15 on the 2400px square canvas, which
    reads small relative to the constellation labels (fontsize 22) — legible at full
    size but borderline when scaled to ~400px mobile width. Consider bumping tick
    labels to ~18.
  - The 'Ori' constellation label sits very close to / lightly crowds one of its bright
    green stars near the chart centre — not a true overlap, but the label-offset heuristic
    could push it a touch further for breathing room.
  - Optional ecliptic line and Milky Way band from the spec notes are omitted (both
    explicitly optional, so not a hard miss, but they would enrich the celestial-map
    storytelling).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface — not pure white, not dark.
      Chrome: title "star-chart-constellation · julia · makie · anyplot.ai" in dark ink at top, fully visible and readable. Constellation name labels (Ori, Tau, Gem, CMa, CMi, Aur, Per, Eri, Lep, Col, Mon, Cnc, Lyn, Hya) in bold dark text, all readable. RA ticks (4h,5h,6h,8h) and Dec ticks (-30°,0°,+30°) in soft gray, small but legible. Magnitude legend top-left ("Star magnitude", mag 0/2/4) readable. Circular sky boundary and subtle coordinate grid visible.
      Data: constellation bright stars and stick-figure lines in brand green #009E73 (first series); faint background star field in muted gray dots sized/alpha'd by magnitude. First series is #009E73. PASS.
      Legibility verdict: PASS (RA/Dec ticks are on the small side but readable).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface — not pure black, reads as a night sky.
      Chrome: title and constellation labels in light ink (#F0EFE8), all clearly readable against the dark background — no dark-on-dark failures. Tick labels and legend text in soft light gray, readable. Grid and boundary subtle but visible.
      Data: constellation stars and lines identical brand green #009E73 as the light render; background field stars now light/gray dots. Only chrome flipped between themes — data colours identical. PASS.
      Legibility verdict: PASS (no dark-on-dark; brand green visible on the dark surface).
