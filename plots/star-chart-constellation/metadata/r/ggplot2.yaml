review:
  strengths:
  - Authentic astronomical data — real named stars with accurate RA/Dec/magnitude
    across 14 northern constellations, giving genuine educational value and a neutral,
    plausible context.
  - Azimuthal-equidistant projection done idiomatically with coord_fixed; circular
    sky boundary, declination circles, RA spokes and labeled tick marks make a natural
    celestial map.
  - 'Magnitude double-encoded by point size (inverted: brighter = larger) AND the
    imprint_seq continuous colormap (brand green -> blue) via scale_color_gradient
    — fully palette-compliant.'
  - 'Thoughtful depth touches: 280 uniformly-distributed faint field stars (sin(dec)
    sampling), the dashed ecliptic line, and semi-transparent constellation stick-figure
    edges.'
  - Clean theme-token threading — chrome (page/elevated bg, ink tokens) flips correctly
    between light and dark while data colors stay identical; both renders are readable.
  - Idiomatic, KISS, reproducible ggplot2 (set.seed(42), theme_void, scale_size_identity,
    guide_colorbar reverse, layered geoms).
  weaknesses:
  - Constellation name labels sit directly on top of their star clusters (e.g. Ursa
    Minor, Ursa Major, Cassiopeia near the centre), causing mild text-on-data overlap;
    a small dodge or halo/background stroke behind the italic labels would improve
    VQ-02.
  - Spec asks for 200-500 stars across 20-30 constellations; the chart covers ~14
    constellations with stick figures. Within readability limits, but a few more constellations
    (or labeling field-star density) would better meet the coverage target.
  - Field-star points use no alpha, so the densest central region shows slight overplotting;
    a small alpha (<1) on faint stars would clean up the core.
  - Optional Milky Way faint band (mentioned in spec notes) is not rendered — acceptable
    omission but would add atmosphere.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white page (#FAF8F1) with a slightly elevated near-white sky disc (#FFFDF6); NOT pure white.
      Chrome: dark title "star-chart-constellation · r · ggplot2 · anyplot.ai" across the top, fully visible (not clipped). RA spoke labels (0h..22h) ring the disc, declination ticks (+0°, +30°, +60°) along a spoke, italic soft-grey constellation names at cluster centroids, "Apparent magnitude" colorbar (0 green at top -> 5 blue at bottom) on the right. All readable.
      Data: stars colored by magnitude on the imprint_seq gradient (brand green #009E73 for bright -> blue #4467A3 for faint), sized inversely by magnitude (bright = larger). Thin semi-transparent stick-figure edges connect constellation stars. Dashed ecliptic curve present.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black page (#1A1A17) with a slightly elevated disc (#242420); NOT pure black — mimics night sky well.
      Chrome: light-toned title, RA/Dec labels, italic constellation names and legend all clearly visible against the dark surface. No dark-on-dark failures observed.
      Data: identical magnitude colormap and sizing to the light render — only the surrounding chrome flipped. Brand green bright stars remain vivid.
      Legibility verdict: PASS
