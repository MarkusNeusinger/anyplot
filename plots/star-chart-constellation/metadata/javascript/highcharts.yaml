review:
  strengths:
  - 'Real catalog data: actual RA/Dec positions and apparent magnitudes for ~96 named
    stars (Vega 0.03, Arcturus -0.05, Deneb 1.25) across 17 northern constellations
    — highly plausible and neutral.'
  - Genuine north-polar azimuthal-equidistant projection with a circular celestial-equator
    boundary, RA meridians + Dec parallels grid, labeled RA ticks (0h-22h) and Dec
    ticks (+30/+60), plus a dashed amber ecliptic curve.
  - Magnitude-to-radius mapping is inverted correctly (brighter = larger) and clearly
    readable; faint deterministic field stars add depth without clutter.
  - 'Clean theme-adaptive chrome: warm cream (#FAF8F1) light surface and warm near-black
    (#1A1A17) dark surface with identical brand-green (#009E73) star data across both
    renders.'
  - Sophisticated layered z-index composition (stars, field, constellation lines,
    ecliptic, equator, grid, label layers) — strong design polish and idiomatic Highcharts
    scatter+line usage.
  weaknesses:
  - 'Star/constellation count falls short of the spec''s stated range: ~96 real named
    stars over 17 constellations vs the requested 200-500 stars covering 20-30 constellations
    (the 165 random faint field stars pad the visual count but are not catalogued/constellation-bearing).
    Consider adding ~3-6 more constellations (e.g. Aquila, Triangulum, Lacerta, Camelopardalis)
    to reach the 20+ range.'
  - Optional Milky Way faint band from the spec is not rendered — acceptable since
    optional, but would add storytelling depth.
  - A few constellation labels (Cas, Cep, And, Aur) sit very close to their stars;
    readable but slightly crowded — minor only.
  - Small chrome text (12px RA/Dec ticks) becomes borderline when the square render
    is scaled to ~400px mobile width; title and constellation labels remain clear.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white, not dark.
      Chrome: bold dark title "star-chart-constellation · javascript · highcharts · anyplot.ai" fully visible at top; gray subtitle readable; RA tick labels (0h-22h) and Dec ticks (+30°,+60°) in soft gray, readable; italic dark constellation labels (UMa, UMi, Cas, Cep, Cyg, Lyr, Dra, Boo, CrB, Her, Peg, And, Per, Aur, Gem, Leo) all legible.
      Data: brand green (#009E73) stars sized by magnitude; gray constellation stick-figure lines; dashed amber ecliptic on the right; gray equator boundary ring; subtle grid. First/only star series is #009E73. Confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface — not pure black, not light.
      Chrome: white title fully visible; gray subtitle, RA/Dec ticks and white italic constellation labels all readable against the dark surface; no dark-on-dark failures.
      Data: identical brand-green (#009E73) stars, same sizes/positions; only chrome flipped (lines/grid/equator/ticks lightened). Ecliptic dashed amber identical. Data colors match the light render exactly. Confirmed.
      Legibility verdict: PASS
