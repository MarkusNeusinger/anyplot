review:
  strengths:
  - Custom azimuthal-equidistant projection centred on the north celestial pole produces
    a true circular sky boundary, exactly as the spec requested
  - Apparent magnitude is double-encoded as both point size (bright = large) and Imprint
    sequential colour via a continuous visualMap — correct use of imprint_seq for
    continuous data
  - Real bright-star catalogue across 21 constellations with accurate J2000 RA/Dec/magnitude
    — realistic, neutral, well-scaled data
  - Theme-adaptive glow (shadowBlur on named stars in dark mode only) gives the dark
    render an authentic night-sky feel while staying clean in light mode
  - 'Complete feature set: constellation stick-figure lines, dec circles + RA radials
    grid, dashed ecliptic, deterministic area-uniform field stars, RA/Dec tick labels,
    and italic constellation labels at centroids'
  - 'Idiomatic ECharts: lines series with polyline for grid/ecliptic/constellations,
    scatter for stars, visualMap for the magnitude legend — all on a single cartesian2d
    system'
  weaknesses:
  - 'Mild label crowding in the dense central region: dec tick labels (+30°, +60°,
    0°) sit close to constellation labels (Cep, UMi, Dra) — readable but slightly
    competing. Consider nudging dec ticks off the RA=7h radial or reducing their visual
    weight.'
  - Several small helper functions (project, decCircle, rng) sit at module top level
    — reasonable and idiomatic for JS, but pushes slightly against the KISS 'no functions'
    preference.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "star-chart-constellation · javascript · echarts · anyplot.ai" in dark
        bold text, clearly readable. RA tick labels (0h..21h) and dec ticks (+60°,+30°,0°,-30°)
        in soft ink, readable. Italic constellation labels (UMa, Ori, Leo, Peg, etc.) readable
        with subtle text-shadow halo. visualMap legend "bright -0.5 / faint 5.0" bottom-left, readable.
      Data: stars coloured along the Imprint sequential ramp (bright = brand green #009E73 through
        to blue for faint), sized by magnitude. Grid circles, dashed ecliptic, thin constellation
        lines and faint field stars all visible against the cream surface.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and all tick/constellation labels in light ink, clearly readable; no dark-on-dark.
        Grid lines and boundary subtle but visible.
      Data: identical Imprint-seq star colours (green→blue) as the light render — only chrome flipped.
        Named stars carry a soft glow (shadowBlur) that reads beautifully as a night sky. Brand green
        bright stars clearly visible.
      Legibility verdict: PASS
