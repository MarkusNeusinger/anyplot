review:
  strengths:
  - 'Constellation stick-figure lines use brand green #009E73 (palette[0]) and stars
    use pale amber #DDCC77 — exactly matching the spec''s pale-yellow-stars-on-dark-sky
    requirement'
  - 'Real astronomical data: 15 northern constellations with accurate RA/Dec coordinates,
    apparent magnitudes, and real stick-figure edges (Big Dipper, Cassiopeia, Cygnus,
    Lyra, etc.)'
  - 'Sophisticated idiomatic D3/SVG: radial-gradient night sky, feGaussianBlur glow
    blooms on bright stars, clip-path disk, magnitude-scaled point sizing, deterministic-LCG
    twinkling field stars for depth'
  - Correct north-polar azimuthal-equidistant projection with a natural circular sky
    boundary, labeled RA spokes (0h-22h) and Dec circles (+30deg/+60deg/+80deg)
  - Title exactly matches the mandated 'star-chart-constellation . javascript . d3
    . anyplot.ai' format; square 2400x2400 canvas gate passed
  - Data colors are identical across light and dark renders; only the page-surface
    chrome (title) flips with theme, which is the correct handling for a domain that
    requires a constant dark sky
  weaknesses:
  - Constellation name labels render at 12px with opacity 0.62 (CON_LABEL) — readable
    at full resolution but faint and small; when the chart is scaled to ~400px mobile
    width these may become hard to read. Consider bumping to ~13-14px or opacity ~0.72.
  - 'Minor crowding: in the upper region the ''ANDROMEDA'' centroid label sits close
    to the ''+30deg'' Dec tick label — no true pixel overlap, but slightly tight.'
  - By design the entire sphere interior is theme-constant (dark navy on both renders)
    and only the page surface + title flip with theme — this is the correct interpretation
    of the spec's dark-sky requirement, but means the dark/light renders differ only
    in the thin chrome border around the disk.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white page surface (~#FAF8F1) surrounding a circular night-sky disk that is intentionally dark navy (radial gradient #16223A center -> #0E1726 -> #090F1C rim). The spec explicitly mandates a dark sky, so the disk does not flip with theme.
      Chrome: Title "star-chart-constellation . javascript . d3 . anyplot.ai" in dark ink (t.ink #1A1A17) on the cream surface — clearly readable. RA tick labels (0h..22h) ring the disk in ink-soft. Dec labels (+30deg/+60deg/+80deg) and uppercase letter-spaced constellation names (PEGASUS, CYGNUS, LYRA, URSA MAJOR, BOOTES, LEO, etc.) sit on the dark disk in pale tones — readable, though the constellation names are somewhat faint/small.
      Data: Constellation stick-figure lines are brand green #009E73 (palette[0]) at ~0.55 opacity. Stars are pale amber #DDCC77 sized by apparent magnitude; bright named stars (Vega, Deneb, Arcturus, Capella, Regulus, Polaris, etc.) carry a soft Gaussian-blur bloom and labels. A faint field-star scatter fills the disk.
      Legibility verdict: PASS — all chrome readable; constellation names faint but legible at full size.

    Dark render (plot-dark.png):
      Background: Warm near-black page surface (~#1A1A17) surrounding the same dark navy sky disk. The disk interior is pixel-identical to the light render.
      Chrome: Title in light ink (t.ink #F0EFE8) on the near-black surface — clearly readable, no dark-on-dark failure. All in-disk text (RA/Dec ticks, constellation names, star names) is identical to the light render and reads as pale tones on the dark sky.
      Data: Constellation lines, stars, blooms, and field stars are identical to the light render — only the thin page-surface border and the title color flipped. Brand green #009E73 and amber stars both clearly visible.
      Legibility verdict: PASS — title correctly flips to light ink; no dark-on-dark text.
