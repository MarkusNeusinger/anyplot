review:
  strengths:
  - Real J2000 coordinates for ~90 named bright stars across 20 constellations plus
    a deterministic faint field — astronomically authentic and neutral data
  - 'Idiomatic Chart.js: scatter dataset with per-point pointRadius/pointBackgroundColor
    arrays plus a custom plugin using beforeDatasetsDraw/afterDatasetsDraw and getPixelForValue
    to draw the RA/Dec grid, constellation stick-figures, labels, and magnitude key
    in pixel space'
  - Azimuthal-equidistant projection from the north celestial pole yields a natural
    circular sky boundary as the spec requests
  - 'Continuous brightness mapped to the Imprint sequential ramp (bright stars anchor
    at #009E73, faint → blue) and to point size (brighter = larger) — palette-compliant
    and spec-correct magnitude inversion'
  - Square 2400x2400 canvas correctly selected via the orientation directive; data
    colors identical across light/dark with only chrome flipping
  - Magnitude size key is a genuine legend, not a fake interactive control
  weaknesses:
  - Several constellation name labels (e.g. Ursa Major, Leo, Cassiopeia) sit directly
    on top of their star markers and grid spokes, creating mild text-on-data overlap
    — consider a small centroid offset or a subtle halo behind label text to separate
    it from markers
  - Constellation labels (13px) and dec-ring labels become small and hard to read
    when the square canvas is scaled to ~400px mobile width; the title and overall
    structure still read, but labels lose legibility
  - Ecliptic line and Milky Way band (both optional in the spec) are omitted — adding
    the ecliptic as a dashed curve would increase feature coverage
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct anyplot light chrome — NOT a literal dark night sky, but the mandated theme surface.
      Chrome: dark title "star-chart-constellation · javascript · chartjs · anyplot.ai" fully visible at top; RA hour labels (0h,3h,...,21h) ringing the disk readable; "+30°/+60°" dec labels and "Apparent magnitude" key (bottom-left) readable; italic constellation names dark and legible.
      Data: stars colored along the Imprint sequential ramp — bright stars green (#009E73), faint stars blue; point size scales with brightness. Thin semi-transparent constellation stick-figure lines connect named stars. Circular azimuthal-equidistant sky with dec rings + RA spokes.
      Legibility verdict: PASS (labels small but readable at full size; mild label-on-marker overlap).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct anyplot dark chrome.
      Chrome: light title, RA/dec labels, constellation names, and magnitude key all clearly visible against the dark surface — no dark-on-dark failures.
      Data: colors identical to light render (green→blue brightness ramp, same point sizes, same constellation lines) — only chrome flipped.
      Legibility verdict: PASS.
