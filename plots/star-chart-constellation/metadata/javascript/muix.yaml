review:
  strengths:
  - Custom north-pole azimuthal-equidistant projection renders a natural circular
    sky boundary with a labelled RA/Dec coordinate grid (RA spokes every 2h, declination
    circles at +60/+30/0/-30) — exactly the orientation the spec calls for.
  - 'Apparent magnitude is correctly inverted into marker size (brightest stars large,
    faint field stars tiny) AND mapped onto the Imprint sequential ramp (brand green
    #009E73 -> blue), with a clear bottom-left magnitude legend that doubles as a
    brightness key.'
  - Real, factually-accurate bright-star catalogue (Sirius -1.46, Vega 0.03, Arcturus
    -0.05, etc.) across 23 constellations with proper IAU stick-figure edges and centroid-placed
    constellation labels — strong, neutral, educational data.
  - 'Expert idiomatic MUI X community usage: ChartContainer composed with ScatterPlot
    plus custom SVG layers (SkyGrid, ConstellationLines, ConstellationLabels, ChartTitle,
    MagnitudeLegend) that read the live chart scales through useXScale/useYScale/useDrawingArea
    hooks — a distinctive composable-API pattern hard to replicate elsewhere.'
  - 'Both renders are theme-correct: warm off-white #FAF8F1 / warm near-black #1A1A17
    backgrounds, identical data colours across themes, all chrome legible, deterministic
    LCG-seeded background star field (no network).'
  weaknesses:
  - In the dense central region of the disk (Ursa Minor / Draco / Hercules / Bootes
    / Corona Borealis) several italic constellation labels sit close to or lightly
    overlap stars and stick-figure lines — readable but slightly crowded. Consider
    a small leader-offset or lower-priority de-cluttering for centroid labels that
    land on top of markers.
  - Constellation labels use inkSoft at opacity 0.78 and fontSize 13 — legible at
    full 2400px but on the fainter side; a touch more weight/contrast would help them
    survive the 400px mobile downscale.
  - Grid colour is a hard-coded rgba(120,140,170,0.30) cool tone rather than the theme
    RULE token. It reads well on both surfaces by design, but it is not strictly theme-adaptive
    chrome — acceptable for a sky chart, just noting the deviation.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure white, no painted panel — page shows through the transparent SVG.
      Chrome: dark title "star-chart-constellation · javascript · muix · anyplot.ai" centred at top, fully readable. RA hour labels (0h..22h) ring the rim; declination labels (+60°, +30°, 0°, -30°) along the 20h spoke; magnitude legend bottom-left. Faint cool grid circles + spokes visible but subtle. All text readable.
      Data: stars coloured on the Imprint sequential ramp — brightest band is brand green #009E73 (large markers), fading to blue #4467A3 for the faintest. Sizes scale inversely with magnitude. Constellation stick-figure lines (subtle inkSoft) connect catalogue stars; italic constellation names near centroids.
      Legibility verdict: PASS (minor crowding of a few centre labels, but nothing unreadable).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black.
      Chrome: light title and labels, all clearly readable against the dark surface; no dark-on-dark failures. Grid and rim read correctly.
      Data: star colours are identical to the light render (green->blue ramp, same sizes) — only the chrome flipped. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS.
