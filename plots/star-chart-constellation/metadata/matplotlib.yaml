  strengths:
  - Excellent astronomical data accuracy with real star names, positions, and magnitudes
    across 21 constellations
  - Beautiful dark theme with intentional color hierarchy (white to pale blue to gray
    stars, golden ecliptic)
  - Magnitude-to-size mapping with power-law scaling creates compelling visual hierarchy
  - Smart label offset system with overlap avoidance logic
  - Clean, well-organized code with comprehensive star catalog
  weaknesses:
  - Label overlap in crowded regions (Taurus/Gemini, Bootes/Hercules/Corona Borealis
    areas)
  - Star name annotations at 12pt could be slightly larger for improved readability
  - Manual color assignment loop could use a colormap for smoother gradient
  - Aitoff projection used instead of spec-suggested stereographic/azimuthal equidistant
  image_description: The plot displays a celestial star chart on a deep navy (#0A0A2A)
    background using an Aitoff all-sky projection. Stars are rendered as white-to-pale-blue
    circles with sizes inversely proportional to apparent magnitude — the brightest
    stars (Sirius, Vega, Arcturus) appear as large white dots while dimmer stars are
    smaller and slightly blue-gray. Constellation stick-figure lines connect stars
    in thin, semi-transparent blue-gray segments across 21 constellations. Constellation
    names are displayed in italic gray text near each group's centroid. The 10 brightest
    stars (mag < 1.0) are individually labeled in light text. A golden dashed ecliptic
    line curves sinusoidally across the chart. The coordinate grid shows Right Ascension
    in hours (0h-22h) along the x-axis and Declination in degrees (-75 to +75) along
    the y-axis. The title "star-chart-constellation · matplotlib · pyplots.ai" is
    centered at the top. An "Ecliptic" legend sits in the lower right corner. Bottom
    annotation reads "Right Ascension (hours) — Aitoff Projection | Declination (°)".
