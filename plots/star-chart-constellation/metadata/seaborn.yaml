  strengths:
  - Excellent dark-sky aesthetic with custom navy theme and yellow-to-brown star colors
  - Rich, realistic astronomical data with 15 constellations and accurate star positions
  - Good visual hierarchy through magnitude-based sizing and selective labeling of
    brightest stars
  - Path effects on text ensure readability against the dark background
  - Clean legend with only magnitude classes (size entries properly filtered out)
  weaknesses:
  - Axis label Right Ascension (°) is inconsistent with hour-based tick labels
  - Missing stereographic or azimuthal equidistant projection as specified
  - Minor label overlaps between Capella/Auriga and Orion/Betelgeuse
  image_description: 'The plot displays a star chart on a deep navy background (#0a0e2a).
    Stars are plotted with Right Ascension on the x-axis (24h to 0h, reversed) and
    Declination on the y-axis (-45° to +75°). Stars are color-coded by apparent magnitude
    using a yellow-to-brown palette: bright yellow for the brightest (< 1.0), golden
    for 1.0-2.0, darker orange for 2.0-3.0, and brownish for faintest (> 3.0). Star
    sizes are inversely proportional to magnitude (brighter = larger). Thin semi-transparent
    blue lines connect stars to form 15 constellation stick figures (Orion, Ursa Major,
    Cassiopeia, Leo, Cygnus, Gemini, Taurus, Lyra, Aquila, Scorpius, Boötes, Perseus,
    Auriga, Canis Major, Andromeda). Constellation names are labeled in blue-gray
    near their centroids. The brightest stars (Sirius, Vega, Capella, Arcturus, Altair,
    Aldebaran, Rigel, Betelgeuse, Antares) are individually labeled. ~200 faint background
    stars in muted blue-gray fill the sky. A legend in the lower left shows the four
    magnitude classes. Subtle grid lines mark RA/Dec intervals. The title reads "star-chart-constellation
    · seaborn · pyplots.ai". Top and right spines are removed.'
