review:
  strengths:
  - Real catalogued star data (positions, magnitudes, IAU constellations) with hand-authored
    stick-figure edges — highly authentic and neutral subject matter
  - Correct stereographic projection centred on RA=12h/Dec=30 with RA flipped east-left,
    giving a natural circular northern-sky boundary
  - Magnitude correctly inverted and encoded by BOTH size and opacity (brighter =
    larger + more opaque), never colour — keeps Imprint identity intact
  - 'Brand green #009E73 used as the leading data series for constellation lines;
    backgrounds are exactly #FAF8F1 (light) / #1A1A17 (dark); data colours identical
    across themes with only chrome flipping'
  - 'Idiomatic plotnine grammar: layered geom_segment/geom_point/geom_text, coord_fixed
    for true aspect, theme_void for minimal chrome, and merged size+alpha legends
    via guides()'
  - Thoughtful manual label de-cluttering via per-constellation (dx,dy) nudges, plus
    RA/Dec coordinate grid with labelled meridians and parallels
  weaknesses:
  - Circumpolar core is crowded — labels such as URSA MINOR, URSA MAJOR, DRACO, LYRA,
    AQUILA, COR. BOREALIS and BOOTES sit close together near the centre; all remain
    readable but breathing room is tight. Consider slightly smaller label size or
    wider nudges for the densest cluster.
  - Tick labels (RA hours / Dec degrees) are small at geom_text size=6; legible at
    full 2400px but approach the lower bound when scaled to ~400px mobile.
  - A small project() helper function is defined (mild CQ-01 KISS deviation), though
    justified by the projection maths being applied to multiple coordinate arrays.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) parchment-atlas surface — not pure white, not dark. PASS.
      Chrome: title "star-chart-constellation · python · plotnine · anyplot.ai" in soft dark ink, top-centre, fully visible. Italic-bold constellation names (ORION, URSA MAJOR, SCORPIUS, ...) in soft grey ink, readable. RA/Dec tick labels (6h, 9h, 15h, 18h, 20°, 40°, 60°) in muted ink. Legend "Apparent magnitude" (0–5) framed top-right, all readable. No clipping at any edge.
      Data: constellation stick-figures in brand green #009E73; stars rendered as dark ink dots sized + opacity-scaled by magnitude (Sirius largest near Canis Major). Subtle declination rings + RA meridians grid.
      Legibility verdict: PASS — all text clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) night-sky surface — not pure black, not light. PASS.
      Chrome: title and labels flipped to pale warm ink (light text), fully readable; no dark-on-dark anywhere. Legend frame visible with light text. RA/Dec ticks readable. No clipping.
      Data: constellation lines remain identical brand green #009E73; stars now pale warm-white dots, same size/opacity magnitude encoding as light render — only chrome flipped, data colours identical. Grid subtle but visible.
      Legibility verdict: PASS — all text clearly readable against the dark background; no legibility failures.
