review:
  strengths:
  - 'Genuinely beautiful celestial-atlas aesthetic: stereographic projection with
    a circular sky boundary, constellation stick-figures in Imprint brand green (#009E73)
    as the leading data series, and stars rendered as theme-ink engraving marks sized
    + opacity-scaled by apparent magnitude.'
  - Real astronomical data — 90 named stars across 22 constellations (Orion, Ursa
    Major, Cassiopeia, Scorpius, etc.) with accurate RA/Dec/magnitude, plus 230 procedural
    background stars for sky depth.
  - Magnitude correctly inverted for sizing (brighter/lower-mag = larger, more opaque)
    and a single merged size+alpha legend via guide_legend — idiomatic plotnine.
  - RA/Dec coordinate grid (declination rings + RA meridians) drawn with projection-aware
    clipping to the circular boundary, with labeled tick marks (0h-21h, 0deg-60deg).
  - 'Perfect theme adaptation: warm off-white #FAF8F1 (light) and warm near-black
    #1A1A17 (dark) backgrounds; brand-green constellation lines identical across both
    renders; all chrome legible in both themes.'
  - Title exactly matches mandated format; square 2400x2400 canvas passes the dimension
    gate; clean imports, seeded RNG, theme_void for a minimal atlas chrome.
  weaknesses:
  - Minor label crowding in the circumpolar core (URSA MAJOR / URSA MINOR / DRACO
    / AURIGA / COR. BOREALIS / BOOTES) and around RA tick labels (12h/9h) — readable
    but tight; further de-clutter nudges or a slightly smaller label size could open
    it up.
  - Star marks use the theme-ink token (dark in light theme, pale in dark theme),
    so the star color flips between renders. This is justified (magnitude is encoded
    by size+opacity, not color, and the primary green data series IS identical) but
    is a slight deviation from the strict identical-data-colors expectation.
  - A single project() helper function is used for the stereographic transform — necessary
    and reused for stars/grid, but slightly outside the strict KISS no-functions guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: title "star-chart-constellation · python · plotnine · anyplot.ai" in soft dark-grey, fully readable. Constellation names in italic bold dark-grey, readable. RA/Dec tick labels (40°, 20°, 18h, 15h, 12h, 9h, 6h, 0°/20°/40°/60°) in muted grey, readable. Legend "Apparent magnitude" box top-right with dark dot swatches sized 0-5, fully visible inside canvas.
      Data: constellation stick-figures in brand green #009E73 (first/primary series). Stars rendered as dark ink dots sized + opacity-scaled by magnitude (Sirius largest near Canis Major). Faint grid rings.
      Legibility verdict: PASS — all text readable on the light surface; no clipping at canvas edges.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: title and labels flip to light/pale tones, all clearly readable on the night-sky surface. No dark-on-dark failures. Legend text light, readable.
      Data: constellation stick-figures in the SAME brand green #009E73 (chrome flipped, primary data color identical). Stars rendered as pale warm-white dots (theme-ink token flips), magnitude-sized identically to light render. Grid rings subtle.
      Legibility verdict: PASS — all text readable on the dark surface; brand green visible on both surfaces as expected.
