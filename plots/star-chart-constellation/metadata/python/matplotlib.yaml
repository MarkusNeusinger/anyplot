review:
  strengths:
  - 'Authentic real-star catalog: ~130 named stars across 21 constellations with accurate
    RA/Dec/magnitude (Sirius mag -1.46 through faint members), giving exceptional
    data realism and feature coverage'
  - Correct north-polar azimuthal-equidistant projection yields a natural circular
    sky boundary, exactly as the spec recommends; RA spokes every 2h and Dec circles
    (+60/+30/0/-30) are clearly labelled
  - 'Sophisticated layering: faint Milky Way band (galactic->equatorial transform),
    muted background field stars, dashed amber ecliptic (with RA-seam break), soft
    halos behind the brightest stars, and path-effect strokes for label legibility'
  - Magnitude encoded twice (point size via inverted-magnitude power law AND Imprint
    sequential green->blue color), with a dedicated size legend and a feature legend
    (ecliptic + Milky Way)
  - 'Fully theme-adaptive chrome: data colors identical between renders, only background/ink/grid/legend
    frames flip; backgrounds are correct #FAF8F1 / #1A1A17'
  - 'Canvas is exactly 3200x1800; square polar axes centered with legends in the side
    margins; brand green #009E73 anchors the brightest stars'
  weaknesses:
  - 'Constellation/star label overlaps in the dense north-polar center: ''Altair''
    (bright-star label) collides with the ''Cygnus'' constellation label; ''Cassiopeia''
    is visually truncated by ''Perseus'' (reads as ''CassiopPerseus''); ''Capella''
    overlaps the ''Taurus'' label; ''Corona Bor.'' runs into ''Ursa Major''. The force-relaxation
    pass resolves most groups but does not fully separate these crowded central names.
    Repair: include the bright-star labels (Altair, Capella, Vega, Aldebaran) as movable
    nodes in the relaxation (not just fixed obstacles), or increase MIN_D_FIXED /
    half_w reservation for the long names so the densest northern cluster spreads
    further.'
  - 'Center crowding reduces mobile legibility (~400px): the overlapping italic constellation
    names in the dense region would be hard to read when the chart is scaled down.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) across full canvas and inside the circular polar chart. Correct.
      Chrome: title "star-chart-constellation · python · matplotlib · anyplot.ai" in dark ink, centered, fully visible. RA hour spokes (0h-22h) and Dec circle labels (+60°/+30°/0°/-30°) in soft/muted ink, readable. Footer subtitle readable. Two legends (Ecliptic+Milky Way upper-right; Apparent magnitude lower-right) on elevated cream frames with readable text.
      Data: named stars colored along Imprint sequential ramp — brightest = brand green #009E73 fading to blue #4467A3 for fainter; sizes scale with brightness. Halos behind brightest stars. Faint grey Milky Way band and background field stars. Dashed amber ecliptic curve. Constellation stick-figure lines in soft ink. First/brightest series is #009E73. Correct.
      Legibility verdict: PASS overall, BUT central north-polar region has several overlapping labels (Altair/Cygnus, Cassiopeia/Perseus, Capella/Taurus, Corona Bor./Ursa Major) — localized crowding, not invisibility.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17). Correct.
      Chrome: title and labels in light ink (#F0EFE8 / soft), all clearly readable against dark — no dark-on-dark failures. Grid dashed circles subtle but visible. Legend frames on #242420 elevated panels with light text.
      Data: data colors IDENTICAL to light render — brand green brightest stars fading to blue, same sizes, same Milky Way/field-star greys, same amber ecliptic. Only chrome flipped. Brand green clearly visible on dark surface.
      Legibility verdict: PASS overall, same central-crowding overlaps as the light render (theme-independent layout issue).
