review:
  strengths:
  - 'Authentic astronomical dataset: real star names with true RA/Dec and apparent
    magnitudes across 21 constellations (~125 named stars + 300 muted field stars)
    — plausible and neutral'
  - Distinctive matplotlib Aitoff all-sky projection with x-ticks relabelled from
    degrees to Right Ascension hours — idiomatic use of a built-in projection
  - Magnitude correctly inverted to point size (brighter = larger) with a power-law
    mapping, a soft halo glow behind the brightest stars, and magnitude also encoded
    along imprint_seq
  - Theme-adaptive chrome threaded through every non-data element; data colours stay
    identical between light and dark renders
  - 'Polished layered composition: muted background field stars, semi-transparent
    constellation stick-figure lines, path-effect strokes on labels for legibility,
    dashed amber ecliptic with a legend'
  weaknesses:
  - 'Projection deviates from the spec note: the spec asks for stereographic or azimuthal
    equidistant so the sky boundary looks circular, but Aitoff renders an ellipse.
    Acceptable but not what was specified.'
  - Central sky region (Hercules / Boötes / Corona Bor. / Lyra / Pegasus) is crowded;
    some constellation labels and star markers sit close together, slightly reducing
    readability when scaled to ~400px mobile width.
  - Optional Milky Way band feature from the spec is not included (ecliptic is present).
  - Constellation labels (7.5pt) and bright-star labels (7pt) are small — legible
    at full 3200px resolution but marginal at mobile scale.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface (not pure white).
      Chrome: title "star-chart-constellation · python · matplotlib · anyplot.ai" in dark ink, fully readable; RA-hour ticks (22h..2h) and Dec ticks (+75°..-75°) in soft grey, readable; dashed coordinate grid subtle; footer subtitle readable; "Ecliptic" legend lower-right with elevated fill.
      Data: stars coloured along imprint_seq (brand green #009E73 for brightest, fading toward blue), sized by magnitude; muted grey background field stars; grey semi-transparent constellation lines; amber dashed ecliptic; italic constellation names and bright-star labels with light stroke halos.
      Legibility verdict: PASS — all text readable; only the dense central cluster is slightly crowded.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface (not pure black).
      Chrome: title and ticks in light ink (#F0EFE8 / #B8B7B0), fully readable; grid subtle but visible; legend frame uses dark elevated fill; no dark-on-dark failures detected.
      Data: star colours identical to the light render (green->blue imprint_seq), amber ecliptic identical; only chrome flipped.
      Legibility verdict: PASS — all text readable; brand green clearly visible on the dark surface.
