review:
  strengths:
  - 'Genuinely sophisticated celestial composition: real star catalog (RA/Dec/magnitude)
    for 15 constellations, glow-stroked stick-figure lines, faint Milky Way band,
    dashed amber ecliptic, and a magnitude colorbar — all elements from the spec present.'
  - Magnitude is correctly inverted for sizing (bright stars larger) AND encoded as
    color via the Imprint sequential cmap (green->blue), giving a dual encoding that
    reads cleanly.
  - 'Theme adaptation is clean: both light (#FAF8F1) and dark (#1A1A17) renders are
    fully legible, data colors identical across themes, only chrome flips. White/near-black
    path-effect strokes keep star and constellation labels readable over the busy
    field.'
  - 'Strong code hygiene: deterministic seed, KISS top-level script, only-used imports,
    exact figsize=(8,4.5) dpi=400 canvas, saves plot-{THEME}.png.'
  weaknesses:
  - 'Projection deviation: the spec Notes call for a stereographic or azimuthal-equidistant
    projection so the circular sky boundary looks natural; the implementation uses
    an equirectangular RA-Dec rectangle instead (honestly labeled in the subtitle).
    The chart loses the natural circular sky look. Acceptable seaborn tradeoff but
    a partial miss on a stated feature.'
  - 'Central dense region (RA 4-8h: Gemini/Auriga/Taurus/Orion/Perseus/Andromeda plus
    star labels Capella/Betelgeuse/Rigel/Sirius/Aldebaran) is crowded — labels are
    readable thanks to the stroke halos but sit close together; at ~400px mobile width
    this cluster would be hard to parse.'
  - 'Library mastery is moderate: only the two sns.scatterplot calls and sns.set_theme
    are seaborn-specific; the bulk (axvline grid, fill_between, plot, text, colorbar)
    is raw matplotlib. Reasonable given the chart type but not deeply idiomatic seaborn.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface; no pure white.
      Chrome: title "star-chart-constellation · python · seaborn · anyplot.ai" in dark ink, fully readable; subtitle "Equirectangular RA–Dec chart · Ecliptic (dashed) & Milky Way (band)" in muted gray; axis labels "Right Ascension (h)" / "Declination (°)" and h/° tick labels in soft ink, readable. Colorbar "Apparent magnitude" labeled, ticks readable. Constellation names (teal-ink, bold italic, white halo) and bright-star labels readable over the field.
      Data: stars colored by magnitude via Imprint sequential cmap (brand green #009E73 -> blue #4467A3); faint background stars muted gray; constellation stick-figure lines soft gray with glow; ecliptic dashed amber (#DDCC77); Milky Way faint gray band. First/continuous color anchored on brand green.
      Legibility verdict: PASS (central RA 4-8h cluster is crowded but every label remains readable via stroke halos).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface; no pure black.
      Chrome: title and axis labels in light ink (#F0EFE8), tick labels in light gray (#B8B7B0) — all clearly readable, NO dark-on-dark failures. Colorbar label/ticks light, readable. Constellation labels light-gray with dark halo, readable.
      Data: identical to light render — magnitude colors (green->blue), background-star gray, amber ecliptic, Milky Way band all unchanged; only chrome flipped. Brand green #009E73 visible on the dark surface.
      Legibility verdict: PASS.
