review:
  strengths:
  - Real catalog coordinates and apparent magnitudes for 23 well-known constellations
    (Sirius -1.46, Vega 0.03, etc.) — astronomically authentic and neutral.
  - 'Azimuthal-equidistant projection from the North Celestial Pole gives the natural
    circular sky boundary the spec asks for: Polaris near centre, Dec parallels as
    concentric circles, RA meridians as radial spokes.'
  - 'Magnitude encoded by BOTH size (28→7 px tiers, brighter=larger) and color sampled
    from the Imprint sequential ramp (#009E73→#4467A3), with the brightest tier landing
    exactly on brand green #009E73.'
  - 'Full feature set: constellation stick-figure lines, RA/Dec graticule, RA-hour
    + Dec-degree coordinate labels, italic constellation names, and a properly computed
    ecliptic great circle as a dashed ochre (#BD8233) reference curve.'
  - 'Theme-adaptive chrome done correctly — backgrounds #FAF8F1 / #1A1A17, ink tokens
    flip, data colors stay identical across both renders. The dark render naturally
    fulfils the spec''s night-sky intent.'
  - Clever single-series collapse of 23 constellation paths via None breaks (avoids
    23 redundant legend entries) and SVG XML post-processing to add labels pygal cannot
    place natively. Interactive HTML + tooltips retained.
  weaknesses:
  - Center-top label zone is crowded — Pegasus / Andromeda / Triangulum / Aries /
    Cassiopeia labels sit close together and a couple touch each other and the graticule;
    consider small per-label radial offsets or leader nudges to declutter.
  - Constellation name labels are anchored on the brightest star, so they overlay
    their own star marker and stick-figure lines in several places (e.g. Draco, Leo,
    Bootes). Minor, but a few-px offset away from the marker would read cleaner.
  - Dense field of small italic labels + many faint field-star dots may be hard to
    read when the square chart is scaled to ~400 px (mobile) — the constellation labels
    at 42 unitless px get small relative to the 2400 px canvas.
  - The +0° declination label appears hidden/overlapped near the centre while +60°,
    +30°, -30° read clearly — verify all four Dec ticks are visible.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface — not pure white, not dark.
      Chrome: dark title "star-chart-constellation · python · pygal · anyplot.ai" clearly readable; RA-hour labels (0h..22h) around the rim and Dec labels (+60°, +30°, -30°) along a meridian readable in muted ink; italic constellation names (Orion, Ursa Major, etc.) readable in soft gray; subtle solid graticule (concentric Dec circles + radial RA spokes) visible but not dominant; bottom legend (RA/Dec grid, Constellations, Ecliptic, 4 magnitude tiers) readable.
      Data: brightest-tier stars are brand green #009E73 (large dots); fainter tiers step down the Imprint sequential ramp toward blue (#4467A3) with shrinking sizes; constellation stick-figure lines thin gray; ecliptic a dashed warm ochre (#BD8233) curve. First/brightest categorical series = #009E73 confirmed.
      Legibility verdict: PASS (minor center-top label crowding but all text legible).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface — not pure black, not light.
      Chrome: light title and labels clearly readable against the dark sky; coordinate/constellation labels in light ink, no dark-on-dark failures; graticule subtle dark-gray, still visible; legend readable.
      Data: data colors identical to the light render — same green brightest tier, same sequential ramp, same ochre dashed ecliptic. Only chrome flipped. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS.
