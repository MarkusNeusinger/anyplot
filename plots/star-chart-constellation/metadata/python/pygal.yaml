review:
  strengths:
  - Uses real, factually accurate star catalog data (Sirius mag -1.46, Betelgeuse
    mag 0.42, accurate RA/Dec) across 8 recognizable constellations — excellent Data
    Quality.
  - 'Magnitude is encoded both by point size (brighter = larger) and by an Imprint
    sequential ramp (brightest tier == brand green #009E73 -> blue), giving a clear
    visual hierarchy and focal points.'
  - 'Theme-adaptive chrome is correct in BOTH renders: warm off-white #FAF8F1 (light)
    / warm near-black #1A1A17 (dark), with all text legible — no dark-on-dark or light-on-light
    failures.'
  - Constellation stick-figure lines collapsed into a single subtle muted layer (None-break
    trick) instead of 8 redundant legend entries — thoughtful legend design.
  - Ecliptic drawn as a dashed ochre (#BD8233) reference curve — a sensible semantic-color
    choice (the Sun's warm path).
  - Leverages pygal's distinctive interactive HTML/SVG output with per-star tooltips
    (name + magnitude + constellation).
  - Clean KISS structure, seeded (np.random.seed(42)), all imports used, exact mandated
    title format and canvas size (3200x1800).
  weaknesses:
  - 'No sky projection: the spec explicitly asks for a stereographic or azimuthal-equidistant
    projection so the circular sky boundary looks natural, but the chart is a plain
    rectangular RA/Dec scatter. pygal cannot project natively, but projected x/y could
    be precomputed and fed to pygal.XY (accepting that the RA/Dec grid would then
    be conceptual). This is the single biggest spec gap.'
  - 'Only 8 constellations are shown; the spec calls for 20-30 constellations covering
    200-500 stars. Total star count (~190: 8x ~6 named stars + 150 background) is
    also slightly under the 200 floor. Add ~12-20 more constellations (e.g. Cassiopeia,
    Cygnus, Lyra, Scorpius, Bootes, Andromeda, Pegasus) with real catalog coordinates.'
  - Grid guides render dashed; the style guide prefers solid thin subtle lines (opacity
    ~15-25%). Minor, but a solid subtle grid would read cleaner.
  - Milky Way band (optional spec feature) is omitted — could add a faint filled region
    for extra fidelity, though not required.
  - Constellation name labels (font-size 40) are slightly smaller than tick labels
    (44); they remain readable but could be bumped for clearer hierarchy.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across full canvas, NOT pure white. Correct.
      Chrome: Title "star-chart-constellation · python · pygal · anyplot.ai" in dark ink, centered top, fully visible (no clipping). Axis titles "Right Ascension (hours)" (bottom) and "Declination (°)" (left, rotated) dark and readable. Tick labels "3h..14h" and "-30°..60°" dark, fully visible incl. leftmost digits. Grid is subtle dashed gray. All chrome readable. Constellation name labels (Orion, Gemini, Taurus, Auriga, Canis Major/Minor, Leo, Ursa Major) in muted italic gray, readable.
      Data: Stars colored by magnitude tier — brightest tier is brand green #009E73 (large circles), mid tiers teal/blue, faintest tier small blue dots — a green->blue Imprint sequential ramp. Constellation stick-figure lines in muted gray. Ecliptic an ochre (#BD8233) dashed curve. First/brightest series = #009E73 confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), NOT pure black. Correct.
      Chrome: Same title/axis/tick layout, now in light ink (#F0EFE8 / #B8B7B0) — all clearly readable against the dark surface. No dark-on-dark failures; tick labels and constellation labels are light-toned and legible. Grid subtle and visible.
      Data: Star colors IDENTICAL to light render — brightest = #009E73 green, ramp to blue, muted-gray constellation lines, ochre dashed ecliptic. Only chrome flipped; data palette unchanged as required.
      Legibility verdict: PASS

    No AR-09 edge clipping in either render. Canvas gate file absent (3200x1800 passed).
