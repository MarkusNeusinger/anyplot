review:
  strengths:
  - Real astronomical catalogue data — true RA/Dec coordinates, apparent magnitudes
    (Sirius -1.46, Vega 0.03, etc.) and IAU constellation memberships across 26 constellations,
    giving an authentic, educationally accurate sky map.
  - Custom azimuthal-equidistant projection centred on the North Celestial Pole produces
    a natural circular sky boundary exactly as the spec requests, with Dec rings,
    RA spokes, an emphasised equator, ecliptic (amber dashed) and a faint Milky Way
    band.
  - 'Magnitude is double-encoded: brighter stars are both larger and pulled toward
    Imprint brand green via the allowed imprint_seq (green->blue) continuous colormap
    — palette-compliant and intuitive.'
  - Theme-adaptive chrome is threaded through every element (title, labels, grid,
    colorbar, boundary). Both light (#FAF8F1) and dark (#1A1A17) renders are correct
    and the data colors are identical across themes.
  - 'Idiomatic plotly: Scattergl for the dense star field, horizontal colorbar with
    custom title placement, scaleanchor for equal aspect, fill=''toself'' for the
    Milky Way ribbon, hover text per star.'
  - Title matches the mandated '{spec-id} · python · plotly · anyplot.ai' format;
    reproducible via np.random.seed(42).
  weaknesses:
  - 'Central crowding: in the dense star region a few constellation labels collide
    with each other and with stick-figure lines — e.g. the Cassiopeia/Perseus/Taurus/Capella/Auriga
    cluster, ''Andromeda'' near ''Aries'', and ''Arcturus'' overlapping ''Bootes''.
    Consider nudging labels further from their centroids or dropping the abbreviation
    for the most crowded groups.'
  - Declination ring labels ('+60°', '-30°', '0°') and the central 'NCP' marker are
    quite small (font size 8.5-9) and sit close to spokes/the equator, reducing legibility
    when the chart is scaled to mobile width.
  - Two coordinate helper functions (project, gal_to_eq) are defined — justified for
    the repeated projection math, but a stricter KISS reading prefers inline/vectorised
    code with no top-level function definitions.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Correct.
      Chrome: dark title "star-chart-constellation · python · plotly · anyplot.ai" centred at top, fully readable. RA labels (0h..22h) around the rim and Dec labels (+60°/-30°/0°) along a clear gap are dark and legible (the Dec labels are small). Constellation names in dark grey (INK_SOFT) read well; a few overlap in the crowded centre. Horizontal colorbar "Apparent magnitude" at bottom, readable.
      Data: stars coloured by the imprint_seq green->blue continuous scale (brightest e.g. Sirius rendered large and green), faint grey background star field, amber dashed ecliptic, faint Milky Way band. First/continuous series correctly uses Imprint colors.
      Legibility verdict: PASS (minor central label crowding).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black. Correct.
      Chrome: light title and light-grey labels (INK / INK_SOFT) clearly readable against the dark surface — no dark-on-dark failures. Grid, rings and boundary are subtle light strokes. Colorbar title and ticks readable.
      Data: identical star colors to the light render (green->blue magnitude scale), same ecliptic/Milky Way/grid geometry — only chrome flipped. Confirmed colors identical.
      Legibility verdict: PASS.
