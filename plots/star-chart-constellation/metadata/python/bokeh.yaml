review:
  strengths:
  - 'Clever dual-theme reading of an intrinsically dark domain: dark render is a literal
    night sky (pale-yellow #FFFDE7 bright stars on near-black #1A1A17), light render
    an antique engraved atlas (ink stars on cream #FAF8F1) — magnitude stays encoded
    by SIZE in both, so the data dimension is preserved while only chrome/tone flips.'
  - Real astronomical catalog — accurate RA/Dec/magnitude for ~70 named stars across
    19 constellations plus 220 procedural background stars, giving a genuine, neutral,
    domain-plausible sky.
  - Stereographic north-pole projection with RA meridians (0h-21h) and Dec parallels
    (+0deg/+30deg) labelled — circular sky geometry reads naturally.
  - Magnitude inverted to point size (brighter = larger) exactly per spec, plus a
    bonus magnitude-scale legend in the corner.
  - Thoughtful per-constellation and per-bright-star label offsets to dodge collisions;
    spines hidden, dotted grid kept subtle, generous whitespace.
  - 'Idiomatic bokeh: ColumnDataSource, LabelSet, real interactive hover tooltips,
    and a working HTML artifact alongside the static PNG.'
  weaknesses:
  - Center pole region is crowded — background stars and the Ursa Major/Draco constellation
    lines crowd together near the middle, and a few italic constellation labels (Cassiopeia,
    Ursa Major, Auriga) sit over or very close to stars. All still readable, but the
    central focal area is the least clean part of the composition.
  - 'Brand green #009E73 is absent. This is a legitimate night-sky semantic exception
    (green stars would be wrong) and constellation lines correctly use Imprint blue
    #4467A3, but worth noting the categorical-first-series rule does not apply to
    this domain.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm cream ~#FAF8F1 (correct, not pure white).
      Chrome: bold black title "star-chart-constellation · python · bokeh · anyplot.ai" fully visible; gray RA/Dec grid labels (0h..21h, +0°, +30°) subtle but readable; italic gray constellation names; dark star-name labels (Sirius, Rigel, Betelgeuse, Capella, Vega, Altair, Arcturus, Antares). All text readable against the light surface.
      Data: stars rendered as ink tones — near-black #1A1A17 for brightest, navy #3D4D6B mid, gray-blue #8089A0 dim; size encodes magnitude (brighter=larger). Constellation stick-figure lines in Imprint blue. Magnitude legend bottom-left. First series is NOT #009E73 — intentional night-sky semantic exception.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (correct, not pure black).
      Chrome: light-ink title fully visible; same grid labels in muted blue, readable; italic light constellation names; light star-name labels. No dark-on-dark failures.
      Data: star TONE flips to night-sky palette — pale-yellow #FFFDE7 bright stars, light blue-white mid, gray-blue dim. Size encoding identical to light render. Constellation lines lightened Imprint blue. Data geometry/positions identical between renders; only chrome + star tone flip as designed.
      Legibility verdict: PASS
