review:
  strengths:
  - Uses real astronomical data — actual RA/Dec coordinates and apparent magnitudes
    for 60+ named stars (Sirius -1.46, Vega 0.03, Betelgeuse 0.42), giving genuine
    real-world authenticity
  - Custom azimuthal equidistant projection centred on the North Celestial Pole produces
    the natural circular sky boundary the spec calls for, with concentric Dec rings
    and radial RA meridians
  - 'Sophisticated layered design: glow halos beneath the brightest stars, magnitude-inverted
    point sizing (brighter = larger), thin semi-transparent constellation stick-figure
    lines'
  - Custom magnitude legend panel tucked into the empty top-left corner outside the
    sky disc — elegant use of dead space
  - Real lets-plot interactivity via layer_tooltips() exporting to HTML — a distinctive
    library feature, not faked
  - 'Both light and dark renders are fully theme-correct: identical green (#009E73)
    data colors, only chrome flips; all text readable on both surfaces'
  weaknesses:
  - A few constellation name labels (e.g. Orion, Canis Major) sit close to or lightly
    overlap nearby background/green stars — could nudge label offsets slightly further
    to fully clear markers (minor VQ-02).
  - Optional spec extras (ecliptic dashed line, Milky Way faint band) were not included
    — acceptable since they are explicitly optional, but adding the ecliptic would
    strengthen feature coverage.
  - Grid tick labels at geom_text size 5.5 are on the small side; readable at full
    2400px scale but could be marginal when downscaled to ~400px mobile.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: bold dark title "star-chart-constellation · python · letsplot · anyplot.ai" top-left, dark caption bottom; RA hour labels (0h..22h) around the rim and Dec labels (-30°, 0°, 30°, 60°) along the meridian in muted ink; italic constellation names (Orion, Ursa Major, Cassiopeia, etc.) in soft ink. All readable.
      Data: stars in brand green #009E73 sized by inverted magnitude with soft green glow halos on the brightest; faint gray background stars; green semi-transparent constellation stick-figure lines; subtle concentric Dec rings + radial RA meridians as the coordinate grid. Magnitude legend panel (mag 0-5) top-left on an elevated cream card. First/only series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: title/caption/labels flip to light ink (#F0EFE8 / soft) and remain clearly readable; no dark-on-dark failures. Legend card uses #242420 elevated fill with light text.
      Data: data colors are IDENTICAL to the light render — same green #009E73 stars, halos, and constellation lines; grid uses light ink at low alpha. Brand green reads well on the dark surface.
      Legibility verdict: PASS
