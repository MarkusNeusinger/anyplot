review:
  strengths:
  - Stereographic projection from the north celestial pole renders a natural circular
    sky boundary — an idiomatic, sophisticated use of altair layered marks
  - 'Real star catalog data: 70 named stars across 15 constellations with authentic
    RA/Dec/magnitude values, plus 200 magnitude-thresholded field stars for realistic
    depth'
  - Summer Triangle (Vega/Deneb/Altair) highlighted with dashed amber lines and a
    label as a deliberate storytelling focal point
  - Magnitude inverted to size (brighter = larger) per spec, with an in-plot size
    legend explaining the mapping
  - 'Imprint palette correct: first series brand green #009E73, blue constellation
    lines, amber focal anchor; backgrounds #FAF8F1 / #1A1A17 with only chrome flipping
    between themes'
  - Genuine altair interactivity (selection_point pointerover highlight + tooltips)
    plus HTML export — no fake UI
  - 'Clean KISS structure: no functions/classes, seeded (np.random.seed(42)), all
    imports used, pad-only canvas handling per library rules'
  weaknesses:
  - Magnitude legend size circles overlap vertically in the lower-right — the large
    mag<1 marker collides with the mag 1-2.5 circle below it; increase vertical spacing
    or shrink the largest legend marker
  - 'The amber italic Summer Triangle label is low-contrast against the light #FAF8F1
    background and crowds the Aquila constellation label on the left side — nudge
    it clear and/or use INK for the text while keeping amber for the triangle lines'
  - 'Central region is crowded: Ursa Major, Draco, Corona Bor., Cygnus, Hercules and
    Lyra labels cluster tightly near the projection center; still individually readable
    but visually busy'
  - In the dark render the legend markers slightly overlap the 3h RA grid label near
    the lower-right edge
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: title "star-chart-constellation · python · altair · anyplot.ai" in dark ink, fully readable, with a grey subtitle. RA hour labels (0h..21h) and constellation names render in dark/soft ink against the light surface — all readable. Dashed RA/Dec coordinate grid is subtle but visible.
      Data: named stars are brand green #009E73 sized by magnitude (brighter=larger); field stars muted grey; constellation stick-figure lines Imprint blue; Summer Triangle dashed amber. First data series confirmed #009E73.
      Legibility verdict: PASS — all chrome readable. Minor note: amber "Summer Triangle" label is low-contrast on the off-white surface but still legible.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: title and subtitle render in light ink, fully readable. RA labels and constellation names in light/soft ink — no dark-on-dark failures. Grid lines subtle but visible.
      Data: colors identical to the light render — same brand green stars, grey field stars, blue lines, amber Summer Triangle. Only the chrome (background/text) flipped.
      Legibility verdict: PASS — all chrome readable, no dark-on-dark text. Brand green visible on the dark surface.
