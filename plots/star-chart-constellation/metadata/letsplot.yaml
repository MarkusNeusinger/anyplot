review:
  strengths:
  - Excellent dark-sky aesthetic with thoughtful color palette (yellow-to-gray star
    colors based on magnitude)
  - Real astronomical data with accurate star positions and magnitudes for 13 constellations
  - Custom magnitude legend built into the plot for reference
  - Good use of lets-plot interactive tooltips for star identification
  - Well-organized constellation line data with per-label offset adjustments
  weaknesses:
  - Several constellation labels overlap with stars or lines (Bootes, Scorpius, Gemini)
  - Manual magnitude legend placed inside the data area causes visual clutter in the
    lower-right
  - Constellation label font size (12) is slightly small relative to the canvas size
  - Flat Cartesian projection rather than a more natural sky projection
  image_description: 'The plot displays a star chart on a dark navy (#0a0e1a) background
    mimicking the night sky. Stars are rendered as circles with sizes proportional
    to brightness (inverted magnitude) — the brightest star Sirius appears as the
    largest pale-yellow dot near Canis Major. 13 constellations are plotted with stick-figure
    lines in semi-transparent blue connecting named stars: Orion, Ursa Major, Cassiopeia,
    Leo, Cygnus, Scorpius, Gemini, Lyra, Aquila, Canis Major, Taurus, Bootes, and
    Perseus. Constellation names are labeled in italic light-blue text. The x-axis
    shows Right Ascension (0h–22h), the y-axis shows Declination (-30° to 60°). A
    subtle blue coordinate grid overlays the chart. ~150 gray background stars are
    scattered across the field. A custom magnitude legend in the lower-right shows
    circle sizes for mag 0 through mag 5. The title reads "star-chart-constellation
    · lets-plot · pyplots.ai" in bold light text.'
