review:
  strengths:
  - Excellent dark sky aesthetic with thematically appropriate color palette (white/gold/blue
    stars)
  - Real astronomical data with accurate star names, coordinates, and magnitudes
  - Creative SVG post-processing to add constellation labels beyond pygal native capabilities
  - Well-differentiated magnitude tiers with 4 distinct size levels
  - Ecliptic line adds valuable astronomical context
  weaknesses:
  - Constellation labels overlap with star dots in several places (Orion, Canis Major)
  - Constellation stick-figure lines are very faint against dark background
  - SVG post-processing code is fragile and complex (regex-based circle matching)
  - Background star magnitude range goes to 5.5 instead of spec suggested 5.0 threshold
  image_description: 'The plot displays a star chart on a dark navy-blue background
    (#04041a/#060820). Stars are rendered as colored dots of varying sizes: large
    white dots for the brightest stars (mag < 1, e.g., Sirius, Rigel, Capella), medium
    gold/yellow dots for mag 1-2, medium blue dots for mag 2-3, and small gray dots
    for faint background stars (mag 3-5.5). Eight constellations (Orion, Taurus, Gemini,
    Canis Major, Canis Minor, Leo, Ursa Major, Auriga) are connected by thin dark-blue
    stick-figure lines, with italic constellation name labels placed near each group''s
    centroid. A curved orange/red ecliptic line sweeps across the chart. The x-axis
    shows "Right Ascension (hours)" from 3h to 14h, the y-axis shows "Declination
    (°)" from about -30° to 60°. The title reads "star-chart-constellation · pygal
    · pyplots.ai". A legend at the bottom lists all constellation names, the ecliptic,
    and four magnitude tier categories with star symbols.'
