    Constellation stick-figure lines in dark blue (#2a4878) connect stars within 8
    constellations (Orion, Ursa Major, Taurus, Gemini, Canis Major, Leo, Auriga, Canis
    Minor). Stars are colored by magnitude tier: brightest (mag < 1) are large white
    dots, mag 1–2 are medium yellow/gold dots, mag 2–3 are smaller light blue dots,
    and mag 3–5.5 (field stars) are tiny gray dots. The title "star-chart-constellation
    · pygal · pyplots.ai" appears at top center. A legend at the bottom lists all
    constellation names and magnitude tiers across 6 columns. Grid lines are visible
    as subtle lines on the dark background. Background field stars are scattered randomly
    across the chart area.'
