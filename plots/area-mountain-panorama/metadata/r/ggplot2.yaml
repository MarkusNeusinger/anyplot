      Data: Near-black mountain silhouette (#2C2A28) with excellent contrast against light blue sky; slightly darker foreground ridge (#1E1C1A) adds depth layer; thin ridge-edge line (#4A4540); subtle dashed horizontal grid lines at low linewidth; 10 peak leader lines in muted gray connecting summit tips to staggered labels
      Labels: Bold peak names at size 3.0 (≈8.5pt) in near-black INK; elevation sub-labels at size 2.4 (≈6.8pt) in INK_SOFT — all readable; Matterhorn and Dufourspitze at highest label tier (5500m), other peaks alternating HIGH(5300)/LOW(5050)
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues

