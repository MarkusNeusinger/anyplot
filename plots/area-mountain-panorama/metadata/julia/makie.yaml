review:
  strengths:
  - Striking light-mode panorama with deep black silhouette against ice-blue sky —
    photographic alpine feel executed well
  - Staggered peak labels with thin leader lines are well-separated and readable across
    all 15 summits
  - Correct use of Makie Theme object, layout grid Label for subtitle, and poly! for
    the silhouette polygon — idiomatic Makie
  - All chrome tokens (INK, INK_SOFT, PAGE_BG, SKY_BG, MTN_FILL) are theme-adaptive
    and correctly wired
  - Asymmetric tent functions + midpoint-displacement jitter produce convincingly
    jagged triangular peaks — not bell-curve bumps
  - Accurate real-world elevations and factually correct peak order for a Gornergrat-area
    westward sweep
  weaknesses:
  - 'Dark-mode mountain silhouette (#324060) against dark-navy sky (#0D1825) has very
    low luminance contrast (~1.6:1) — the mountains are barely distinguishable from
    the sky in dark render; increase MTN_FILL luminance to at least #4A5F80 or adjust
    SKY_BG darker'
  - Large flat baseline gap (~36° of bearing) between Dent Blanche (52°) and Matterhorn
    (88°) — the actual alpine skyline has sub-peaks and cols in this gap; add 2-3
    intermediate tent peaks at lower elevations (e.g. 3700-3900m) to fill the dead
    zone
  - Peak annotation labels at fontsize=11 are quite small for a 3200×1800 canvas —
    at mobile scale (400px wide) they would be illegible; increase to fontsize=13
    for better readability
  - tent() helper function violates KISS/CQ-01 (no functions) — can be inlined as
    a lambda or reformulated as a one-liner broadcasted expression
  - Breithorn (4164m) from the spec example dataset is missing — add it between Castor
    and Pollux at ~168°
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page background — PASS, not pure white
      Axis background: Ice-blue sky (#B8D8EF) fills the plot panel, creating a photographic "sky" effect above the ridgeline
      Chrome: Title "Wallis Peaks Panorama · area-mountain-panorama · julia · makie · anyplot.ai" renders in dark ink (#1A1A17) clearly above the plot; axis labels "Bearing (°)" and "Elevation (m)" in dark ink; tick labels in INK_SOFT (#4A4A44), all readable
      Data: Mountain silhouette in near-black (#262623) stands out sharply against the ice-blue sky. Teal (#009E73) peak markers are clearly visible at each summit. Leader lines are thin grey vertical segments. All 15 peak name + elevation labels are staggered at three height levels (~4640m, ~4870m, ~5100m) to avoid overlap. Matterhorn label is highest (5250m) with a slightly larger marker.
      Legibility verdict: PASS — all text elements readable; peak labels are small but legible at full resolution; title and axis labels well-proportioned

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) page background — PASS, not pure black
      Axis background: Very dark navy (#0D1825) fills the plot panel as the night-sky equivalent of the light ice-blue
      Chrome: Title in light cream (#F0EFE8) readable against dark background; axis labels in light ink; tick labels in INK_SOFT (#B8B7B0) — all clearly readable. No dark-on-dark failures for text elements.
      Data: Mountain silhouette uses #324060 (dark grayish-navy) — data colors are DIFFERENT from light render (navy-blue vs near-black), which is acceptable as MTN_FILL is not a categorical data color but a custom silhouette fill. Peak markers remain teal (#009E73) — identical to light render, consistent with Imprint palette rule. The silhouette contrast against #0D1825 sky is LOW (luminance ratio ~1.6:1) — the mountains are barely visible, appearing as slightly lighter angular shapes against an almost identical dark sky.
      Legibility verdict: PASS for text; PARTIAL FAIL for mountain visibility — silhouette contrast is too low for comfortable dark-mode reading
