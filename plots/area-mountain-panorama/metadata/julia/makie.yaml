review:
  strengths:
  - Beautiful mountain panorama concept with themed sky-atmosphere axis backgrounds
    (light blue / dark navy) that align with the spec photographic mood goal
  - Exemplary staggered label system with alternating heights preventing any overlap
    across 15 closely-spaced peaks
  - 'Perfect real-world data quality: authentic Wallis Alpine peaks with accurate
    real-world elevations'
  - Piecewise-linear tent function approach with midpoint-displacement noise correctly
    produces jagged non-Gaussian ridgeline silhouette
  - All theme-adaptive chrome (INK, INK_SOFT, SKY_BG, MTN_FILL) properly branched
    for both light and dark renders
  weaknesses:
  - Dark render mountain silhouette (#1C2230) has very low contrast against the dark
    navy sky (#0D1825) — increase MTN_FILL luminance in dark mode so peaks read with
    stronger visual presence
  - Peak annotation labels at fontsize=9 (18 source px in 3200x1800 PNG) are borderline
    small at mobile viewports (~400px) — increase to fontsize=10 or 11
  - LM-02 is low — implementation uses basic CairoMakie primitives but misses opportunity
    to leverage Makie-specific features like set_theme!, composite themes, or layout
    widgets
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 page background (correct); axis background is custom light blue #B8D8EF evoking a daytime sky — intentional artistic choice per spec
      Chrome: Title "Wallis Peaks Panorama · area-mountain-panorama · julia · makie · anyplot.ai" in dark ink, fully readable; "Bearing (°)" and "Elevation (m)" axis labels in dark ink, readable; tick labels in INK_SOFT dark gray, readable; peak annotation labels at fontsize=9 are small but legible at full canvas
      Data: Dark near-black mountain silhouette (#262623) filling area below ridgeline; 15 brand-green (#009E73) summit markers; thin leader lines to staggered text labels; clear alpine panorama composition
      Legibility verdict: PASS (all text readable; annotation labels borderline small at mobile scale)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 page background (correct); axis background is very dark navy #0D1825 evoking a night/dusk sky
      Chrome: Title and all axis labels flip to light ink (INK = #F0EFE8) — fully readable against dark background; tick labels in INK_SOFT #B8B7B0 — readable; no dark-on-dark failures for chrome
      Data: Mountain silhouette uses dark blue-grey #1C2230 against #0D1825 sky — peaks are distinguishable but contrast is notably low; brand-green #009E73 markers are identical to light render and clearly visible against dark background
      Legibility verdict: PASS (chrome text fully readable; mountain silhouette visible but low-contrast — main design weakness of this render)
