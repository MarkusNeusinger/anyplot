      Data: Brand green #009E73 mountain silhouette fills from ridgeline down to 2,900 m. Dusk sky gradient from deep blue-purple (zenith) through rose-pink to warm peach-orange at horizon. Warm gold alpenglow rim (#FFBA6A) traces the ridgeline boundary. Six peaks labeled with thin leader lines (Weisshorn, Dent Blanche, Matterhorn, Monte Rosa, Alphubel, Dom).
