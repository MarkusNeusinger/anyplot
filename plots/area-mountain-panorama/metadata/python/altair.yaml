review:
  strengths:
  - Dusk sky gradient (theme-adaptive, zenith→horizon) using Vega-Lite native gradient
    spec creates authentic alpine atmosphere in both light and dark themes
  - Brand green (#009E73) silhouette with alpenglow warm-gold rim is visually striking
    and spec-appropriate
  - 'Matterhorn treated as an unambiguous compositional focal point: highest label
    tier (5500m), larger font (15pt vs 10pt), bolder leader line (2.5px vs 1.0px)'
  - Piecewise-linear ridgeline using tent functions (65 random jagged peaks + 16 named
    summits) strictly follows the spec's no-Gaussian-bumps requirement
  - All 16 Wallis summits with accurate names and real-world elevations; Y-axis range
    and scale realistic
  - 'Full palette compliance: brand green (#009E73) for single data series; backgrounds
    #FAF8F1/#1A1A17; only chrome adapts to theme'
  weaknesses:
  - 'Inter-tier label overlap in left cluster (Weisshorn 9°, Zinalrothorn 22°, Ober
    Gabelhorn 30°, Dent Blanche 42°): adjacent Y-tier spacing of ~200m (≈52px at scale
    4) is less than two stacked name+elevation text lines (~80px), causing elevation
    numbers to overlap with adjacent-tier peak names. Increase label Y-tier separation
    from 200m to ~280–300m, or raise the Y_SCALE domain ceiling to spread tiers further
    apart.'
  - 'Same inter-tier overlap affects right cluster (Allalinhorn 137°, Alphubel 148°,
    Täschhorn 155°, Dom 168°): four peaks within 31° at adjacent tiers.'
  - Bottom third of the chart (~2900–3200m Y zone) is entirely empty PAGE_BG fill;
    raising the Y_SCALE lower bound to ~3100m or adding a subtle baseline annotation
    would use the canvas more efficiently.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "Wallis Panorama · area-mountain-panorama · python · altair · anyplot.ai" top-left in dark ink — readable. Subtitle in INK_SOFT — readable. Y-axis label "Elevation (m)" in dark ink — readable. Y-axis tick labels 3,000–5,000 in INK_SOFT — readable. Peak name/elevation labels in INK/INK_SOFT — readable individually, but crowded in left (9°–42°) and right (137°–168°) clusters due to inter-tier overlap.
      Data: Brand green #009E73 silhouette fills area below ridgeline. Alpenglow warm-gold/orange stroke traces ridgeline boundary. Dusk sky gradient (zenith violet → mid rose-purple → horizon warm orange/peach) fills upper chart zone. Leader lines thin but visible. Matterhorn gets heavier 2.5px leader and larger 15pt bold font.
      Legibility verdict: PASS (all elements readable; crowding in label clusters is a layout issue, not a legibility failure)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and all text in light-colored ink (INK #F0EFE8 and INK_SOFT #B8B7B0) — clearly readable against dark background. No dark-on-dark failure observed anywhere.
      Data: Brand green #009E73 silhouette — IDENTICAL to light render (only chrome flips, data color stays constant). Alpenglow rim becomes warm copper-terra-cotta stroke. Sky gradient adapts: deep navy/near-black at zenith, dark aubergine/brown mid, warm copper at horizon.
      Legibility verdict: PASS (all text readable, no dark-on-dark failure)
