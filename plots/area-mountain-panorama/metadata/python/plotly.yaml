      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light-colored text clearly visible against dark background. Y-axis label and tick labels render in appropriate light INK_SOFT color. No dark-on-dark failures observed. Subtitle remains readable.
