      Chrome: Title "area-mountain-panorama · plotly · anyplot.ai" (note: missing "python") is large and dark-colored, clearly readable. Y-axis label "Elevation (m)" visible in dark ink. Tick labels (2500, 3000, 3500, 4000, 4500, 5000) in INK_SOFT, readable. Subtitle "Wallis panorama — sixteen 4 000 m peaks of the Pennine Alps" visible.
