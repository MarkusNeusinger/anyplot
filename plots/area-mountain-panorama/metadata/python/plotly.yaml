review:
  strengths:
  - 'Correct Imprint palette compliance — brand green #009E73 for the mountain silhouette,
    amber #DDCC77 for the Matterhorn focal point'
  - Fully theme-adaptive chrome in both renders — readable dark text on warm off-white
    (light) and light text on warm near-black (dark) with no dark-on-dark failures
  - All 16 Wallis peaks placed with leader lines and staggered three-tier label system
  - Sky fill adds atmospheric depth per the spec; subtitle provides clear context
    for the panorama
  - Matterhorn clearly called out as focal peak with amber dot and bold font weight
  - Factually correct Wallis/Valais elevation data; np.random.seed(42) ensures reproducibility
  - Canvas at correct 3200×1800 landscape dimensions; HTML output also saved correctly
  weaknesses:
  - 'Title is missing the language component: current is "area-mountain-panorama ·
    plotly · anyplot.ai" but must be "area-mountain-panorama · python · plotly · anyplot.ai"'
  - Ridgeline uses cosine smoothstep interpolation producing smooth rounded curves
    — spec explicitly requires piecewise-linear / fractal silhouette with sharp triangular
    peaks and steep angular flanks ("Do NOT model summits as Gaussian / bell-curve
    bumps"). Use piecewise-linear segments between control points, not cosine smoothstep.
  - Severe label overlap in the annotation area — 16 peaks in 180° with only 3 height
    tiers causes many adjacent labels to collide; elevation values are visibly truncated
    (e.g., 4,063 m appears as 63 m, 4,221 m as 221 m, 4,206 m as 06 m). Need wider
    tier spacing, smaller font sizes, or horizontal jitter of label x-positions to
    resolve collisions.
