review:
  strengths:
  - Excellent 6-tier interleaved label stagger prevents overlap across all 16 densely-packed
    Wallis peaks
  - Matterhorn focal hierarchy — amber dot (12px) plus bold 11px label against all-other
    6px dots creates a clear focal point matching spec intent
  - Piecewise-linear ridgeline with random V-saddle depths (420–820 m drop) and asymmetric
    approach flanks correctly reads as alpine rock silhouette, not bell curves
  - 'Fully theme-adaptive chrome: all ink tokens (INK, INK_SOFT, INK_MUTED) propagate
    to title, annotations, tick labels, and leader lines in both light and dark renders'
  - Sky fill uses Imprint palette colors at low opacity (cyan 12% light / blue 22%
    dark) — atmospheric tint without competing with the silhouette data layer
  weaknesses:
  - Silhouette fill color is bright Imprint brand green (#009E73) — spec explicitly
    asks for 'dark solid color (photo-like silhouette, evening/dusk feel)'; the bright
    green shifts the mood from alpine dusk panorama to infographic, reducing SC-02
    by 1 point
  - Peak elevation labels use font-size:8px (32 px source pixels at scale=4) which
    is at the lower edge of legibility at full resolution and barely readable when
    scaled to mobile (~400 px thumbnail)
  - Subtitle annotation at font size 15 (60 px source) and y-axis title at 16 px (64
    px source) are nearly the same visual weight, weakening typographic hierarchy
    between secondary and tertiary text levels
  - 'No sky gradient: spec suggests ''light blue → white, or dusk orange → deep blue''
    gradient above the ridgeline for photographic mood — flat low-opacity tint is
    present but gradient would strengthen the panorama aesthetic'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface.
      Chrome: Title "area-mountain-panorama · python · plotly · anyplot.ai" at fontsize 18 is fully readable in dark ink. Subtitle "Wallis panorama — sixteen 4 000 m peaks of the Pennine Alps" in INK_SOFT sits below the title. Y-axis label "Elevation (m)" and tick labels (2500–5000 m) are clearly legible. No text is light-on-light.
      Data: Bright Imprint brand green (#009E73) filled silhouette spans the full horizontal range. Very faint cyan sky tint (rgba(42,188,205,0.12)) fills the region above the ridgeline. All 16 peak leader lines are thin gray verticals with small summit dots; Matterhorn has an amber dot (12px) and bold label. Staggered 6-tier labels at 4800–5500 m show name + elevation for each peak — spacing is adequate with no visible overlaps.
      Legibility verdict: PASS — all elements readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title, subtitle, y-axis label, and tick labels all render in light INK (#F0EFE8) / INK_SOFT (#B8B7B0) tokens and are clearly visible against the dark background. No dark-on-dark text failures detected.
      Data: Silhouette color is identical to light render (#009E73 green) — data identity preserved. Sky fill switches to a darker blue tint (rgba(68,103,163,0.22)) which maintains atmospheric depth on the dark surface. Summit dots and leader lines use theme-adaptive INK_SOFT (light gray). Matterhorn amber dot is visible against the dark background. All peak labels are readable in light text.
      Legibility verdict: PASS — both themes read cleanly with no legibility failures.
