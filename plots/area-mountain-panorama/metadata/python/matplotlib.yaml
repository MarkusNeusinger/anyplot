review:
  strengths:
  - Excellent use of real Wallis Alps data with authentic peak names and elevations
    — highly realistic and geographically accurate
  - Well-implemented 3-level staggered annotation system that keeps 17 labels readable
    with thin leader lines and variable opacity
  - Both light and dark themes are correctly handled with all chrome tokens (background,
    title, tick labels, spines, grid) properly adapted
  - Reproducible synthetic skyline built from Gaussian peak bumps and seeded random
    noise creates a convincing mountain horizon
  - Matterhorn is correctly designated as the focal point with bold text and a more
    prominent leader line
  weaknesses:
  - Peak annotation labels (fontsize=11 for non-anchor, 13 for Matterhorn) are below
    the 16pt minimum recommended for a 4800x2700 canvas — increase to at least 14pt
    for non-anchors and 16pt for the Matterhorn
  - The gaussian_smooth() function definition violates the KISS/no-functions rule
    — inline the kernel convolution or use np.convolve without wrapping it in a function
  - Spec explicitly requires 'dark solid color (photo-like silhouette, evening/dusk
    feel)' for the mountain fill, but brand green (#009E73) is used — while palette-compliant,
    the visual mood is closer to nature illustration than a dramatic alpine silhouette;
    consider a sky-gradient background above the ridgeline (even as a LinearSegmentedColormap)
    to compensate and boost the panoramic atmosphere
  - No elevation-based visual differentiation between peaks (e.g., higher peaks slightly
    brighter or wider fills) — all mountains share the same flat brand green, reducing
    the sense of topographic drama
  - DE-03 storytelling is limited — beyond Matterhorn bold text, there is no visual
    hierarchy guiding the viewer; consider contrasting the Matterhorn peak with a
    slightly different shade or adding a subtle halo/glow to it
  image_description: |-
