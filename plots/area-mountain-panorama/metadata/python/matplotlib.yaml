      Background: warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Wallis Alps · area-mountain-panorama · matplotlib · anyplot.ai" in dark ink, clearly readable; y-axis label "Elevation (m)" in dark ink; compass bearing x-ticks (W, SW, S, SE, E) in INK_SOFT dark gray; y-axis tick values (2500–6000) in INK_SOFT; all text readable
      Data: Mountain silhouette filled solid brand green (#009E73) from y=2400 to the synthetic ridgeline with Gaussian summit bumps; 17 peaks annotated at three staggered height levels (5050/5320/5590 m) with thin vertical leader lines; Matterhorn label in bold with thicker line; non-anchor labels in regular weight
      Legibility verdict: PASS — all text including the smallest peak labels (fontsize=11) is readable against the warm off-white background, though the annotation labels are smaller than the recommended 16pt minimum for this canvas size

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in #F0EFE8 (INK for dark theme) — clearly readable; axis labels and tick labels in #B8B7B0 (INK_SOFT for dark theme); leader lines in INK_SOFT tones; subtle grid at 10% opacity using INK token; no dark-on-dark text failures observed
      Data: Mountain silhouette fill is identical brand green (#009E73) — data colors unchanged from light render; annotation labels in theme-appropriate light gray; Matterhorn label in #F0EFE8 (bold, bright), others in #B8B7B0
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark issues; brand green #009E73 remains well-visible on #1A1A17; theme adaptation is complete and correct
