review:
  strengths:
  - 'Excellent theme adaptation: sky gradient switches from warm dusk peach (#FAF8F1→#E8C8A0)
    in light to deep navy in dark, creating distinct and compelling moods for each
    theme'
  - Three-tier peak label hierarchy (Matterhorn bold/INK, top-3 semibold, others regular
    with decreasing leader-line opacity) shows intentional design storytelling and
    makes the Matterhorn the clear focal point
  - 'Correct Imprint palette usage: brand green #009E73 fill, theme-adaptive chrome
    throughout, correct backgrounds #FAF8F1/#1A1A17'
  - No bbox_inches on savefig — canvas gate passed 3200×1800
  - Realistic Wallis Alps data with accurate real peak elevations (4027–4634 m range),
    ordered W→E with compass bearings
  - Clean KISS code structure with np.random.seed(42) for reproducibility; LinearSegmentedColormap
    for sky gradient is distinctive matplotlib usage
  weaknesses:
  - 'SPEC VIOLATION — Gaussian bumps explicitly prohibited: spec says "Do NOT model
    summits as Gaussian/bell-curve bumps — the silhouette must read as alpine rock,
    not as a probability density." The code uses np.exp(-((angle - pos)**2)/(2*width**2))
    which produces smooth bell-shaped peaks. The rendered ridgeline looks like overlapping
    probability densities, not jagged alpine terrain. Fix: replace Gaussian summation
    with piecewise-linear triangular tent functions with midpoint-displacement noise
    — steep linear flanks, sharp pointed apexes, asymmetric slopes, irregular cols
    between summits.'
  - 'SPEC DEVIATION — Dark fill required: spec says "Fill the area below the ridgeline
    with a dark solid color (photo-like silhouette, evening/dusk feel)." The implementation
    fills with brand green #009E73, giving a stylized look rather than the photographic
    dark silhouette the spec envisions. Consider using a very dark near-black or deep
    navy fill (INK_MUTED or a dark slate) for the mountain body, reserving the brand
    color for a ridge highlight or other accent.'
  - Minor label crowding in the Breithorn/Pollux/Castor cluster (3 peaks at angles
    120/132/139°, only 8–12° apart horizontally) — labels are staggered vertically
    across three levels so no actual overlap, but the cluster is dense. Consider wider
    horizontal spacing or slightly smaller label fontsizes for that region.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm peach/dusk gradient sky from PAGE_BG (#FAF8F1, warm off-white bottom) rising to sandy peach (#E8C8A0) near top — theme-correct and visually inviting
      Chrome: Title "Wallis Alps · area-mountain-panorama · matplotlib · anyplot.ai" clearly readable in dark INK on light background; Y-axis label "Elevation (m)" readable at 10pt; compass bearing tick labels (W/SW/S/SE/E) readable in INK_SOFT at 8pt; all peak labels at 8-10pt with INK/INK_SOFT colors visible against warm sky gradient; left/bottom spines in INK_SOFT; subtle y-axis grid (alpha=0.10)
      Data: Mountain silhouette filled with brand green #009E73 — vivid and prominent against the warm peach sky; smooth bell-shaped peaks (Gaussian-derived) spanning 2500–4634 m range; 17 peaks annotated with three-tier leader lines (Matterhorn bold/1.2pt/alpha=0.85, top-3 semibold, others 0.7pt/alpha=0.45)
      Legibility verdict: PASS — all text readable in light theme; no dark-on-light failures

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 with deep navy gradient sky (#1A1A17 → #252D40) — theme-correct warm near-black, not pure black; creates atmospheric alpine night
      Chrome: Title text light-colored (INK=#F0EFE8 in dark mode) — readable; axis label "Elevation (m)" readable; compass bearings readable; peak labels use INK_SOFT (#B8B7B0) and INK (#F0EFE8) against dark navy background — all clearly readable; spines and grid subtle and appropriate
      Data: Mountain fill still #009E73 (identical to light render — correct Imprint behavior); brand green reads strongly against the deep navy sky, possibly even more striking than in light theme
      Legibility verdict: PASS — all text readable in dark theme; no dark-on-dark failures detected; data colors identical to light render (chrome flipped correctly)
