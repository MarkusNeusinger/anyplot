review:
  strengths:
  - 'Excellent atmospheric design: dusk-mood sky gradient plus dark mountain silhouette
    creates a photographic alpine panorama feel'
  - Asymmetric triangular tent functions correctly produce sharp, jagged alpine peaks
    (not Gaussian bell curves) per spec requirement
  - Three-tiered label staggering with tiered emphasis (bold/semibold/regular by peak
    importance) solves a hard label-placement problem elegantly
  - Brand-green ridge line provides excellent separation between sky and mountain
    in the dark theme where fill-on-background contrast is lower
  - Full Wallis Alps dataset with accurate real-world elevations; Matterhorn is clearly
    the focal point
  - All chrome is correctly theme-adaptive; both renders pass the readability check
  weaknesses:
  - 'Title is missing the required ''python'' language component: current ''Wallis
    Alps · area-mountain-panorama · matplotlib · anyplot.ai'' must be ''Wallis Alps
    · area-mountain-panorama · python · matplotlib · anyplot.ai'''
  - Optional layered depth (foreground/background ridge) not implemented — would add
    further visual depth and sophistication
  - The sky gradient in the dark theme (near-black to dark navy) is quite subtle;
    a slightly brighter navy (#3A4A6A) would create a more visible atmospheric effect
    in the dark render
