review:
  strengths:
  - 'Excellent theme-adaptive chrome in both renders: correct #FAF8F1 light background,
    #1A1A17 dark background, and adaptive text/grid colors — no dark-on-dark failures
    in the dark render'
  - 'Brand green #009E73 correctly used as the single data series fill color with
    full Imprint palette compliance; data colors are identical between light and dark
    themes'
  - Comprehensive Wallis peak coverage — all 16 summits from the spec example included
    with factually correct elevations (Dufourspitze 4634m, Dom 4545m, Matterhorn 4478m,
    etc.)
  - Smart 3-level stagger algorithm prevents same-level label overlaps even in the
    dense right cluster (Rimpfischhorn/Allalinhorn/Alphubel/Täschhorn within 30° of
    arc)
  - 'Matterhorn focal point clearly implemented: open circle marker at summit + semibold
    label weight distinguish it from all other peaks'
  - 'Perfect code quality: KISS structure (no functions/classes), np.random.seed(42),
    clean imports, saves plot-{THEME}.png without bbox_inches=''tight'''
  - Canvas exactly 3200×1800 px (figsize=(8,4.5) @ dpi=400, no bbox_inches='tight')
    — canvas gate passed
  - Semi-transparent leader lines (alpha=0.55, linewidth=0.8) are elegant and don't
    compete with the mountain silhouette
  weaknesses:
  - 'Critical SC-02 violation: peak shapes use Gaussian bell-curve bumps (np.exp(-0.5*((a-peak_angle)/sigma)**2))
    which the spec explicitly prohibits (''Do NOT model summits as Gaussian / bell-curve
    bumps''). Replace with piecewise-linear tent functions with varied left/right
    slope steepness per peak and deep saddles between summits so each apex reads as
    sharp alpine rock, not a probability density. Example: ridge = max(ridge, valley
    + max(0, h*(1 - max((a-peak)/left_slope, (peak-a)/right_slope)))) with left_slope
    != right_slope per peak.'
  - 'Missing atmospheric sky effect: the spec calls for ''evening/dusk feel'' and
    optional sky-gradient above the ridgeline (e.g. light blue → white or dusk orange
    → deep blue). Adding a gradient fill above the ridgeline (using fill_between with
    vertical alpha or an imshow gradient behind the data) would transform the design
    from functional to evocative and raise DE-01 significantly.'
  - Y-axis grid lines extend into the upper annotation zone (y=4880–5500m) where all
    16 peak labels live, creating visual noise that competes with the annotation layer.
    Clip the grid to the data range only (2500–4700m) or remove the grid entirely
    since the ridgeline silhouette carries the visual.
  - 'Matterhorn not visually dominant in the ridgeline: the Matterhorn (4478m) is
    shorter than Dufourspitze (4634m), Dom (4545m), and Liskamm (4527m), so the ridgeline
    itself doesn''t support the Matterhorn as the compositional focal peak. The spec
    says it ''should read as visually prominent''. Consider giving the Matterhorn
    a narrower, sharper sigma to make it visually pierce the ridgeline, or use a slightly
    different color/highlight for its filled section.'
  - 'Limited seaborn library mastery: core visualization (fill_between, ax.plot for
    leader lines, ax.text for annotations) is done in raw matplotlib. Seaborn contributes
    only set_theme, despine, one lineplot, and one scatterplot call. For LM-02, consider
    if any seaborn statistical technique (e.g. kdeplot or rugplot) could add value,
    or lean more heavily into sns.lineplot with its built-in CI rendering.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white. Matches the theme requirement.
      Chrome: Title "area-mountain-panorama · python · seaborn · anyplot.ai" in dark #1A1A17 at fontsize=12, clearly readable and filling ~65% of plot width. Y-axis label "Elevation (m)" and X-axis label "Compass bearing" in dark text at fontsize=10, clearly readable. Tick labels (2500–5500 on Y, W/SW/S/SE/E on X) in dark-gray INK_SOFT at fontsize=8, readable. All 16 peak name labels (fontsize=8/9) and elevation labels (fontsize=7) visible and legible. Leader lines thin and semi-transparent (alpha=0.55). Three-level stagger visible in the annotation layer.
      Data: Brand green #009E73 fills the mountain silhouette as a solid color from Y_FLOOR=2500m up to the ridgeline. The ridgeline shows some textural jaggedness from the sin/cos texture overlay. 16 Wallis peaks labeled with name+elevation. Matterhorn marked with open circle marker (PAGE_BG interior, BRAND edge) at summit ~4478m. Peaks range from ~4027m (Allalinhorn) to ~4634m (Dufourspitze). Subtle y-axis grid at alpha=0.10.
      Legibility verdict: PASS — all text readable against light background. No light-on-light issues. Minor crowding in right cluster (Rimpfischhorn/Allalinhorn/Alphubel area) but labels remain distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black. Matches the theme requirement.
      Chrome: Title in light #F0EFE8 text — clearly readable against dark background. Y-axis and X-axis labels in light text, clearly visible. Tick labels in #B8B7B0 (INK_SOFT dark variant), readable. Peak name labels and elevation labels in light colors, readable. Leader lines visible. No dark-on-dark failures observed.
      Data: Brand green #009E73 fill color is IDENTICAL to the light render — data colors unchanged between themes as required. The silhouette reads clearly against the dark background due to the high contrast of green on near-black. Matterhorn open circle (dark interior, green edge) visible.
      Legibility verdict: PASS — all text readable against dark background. Chrome correctly inverts to light text. No "dark text on dark background" failures. The grid lines at alpha=0.10 are subtler on dark but still provide orientation.
