review:
  strengths:
  - Piecewise-linear tent functions with per-peak asymmetric flanks produce a convincingly
    alpine jagged silhouette — not smooth Gaussian bumps
  - Rocky texture noise (summed sine waves + Gaussian jitter with edge taper) adds
    authentic rocky detail
  - All 16 Wallis peaks with accurate elevations and correct geographic ordering W→E
    from Gornergrat
  - 3-level label stagger algorithm prevents collisions even in dense peak clusters
  - Theme-adaptive chrome is fully correct across both renders; dark render sky gradient
    creates a genuine night-sky dusk atmosphere
  - np.random.seed(42) ensures reproducible renders; fig.subplots_adjust (not bbox_inches='tight')
    correctly avoids canvas drift
  weaknesses:
  - Gridlines at 5000 m and 5500 m extend into the annotation zone despite ax.set_yticks([2500..4500])
    intent — add FixedLocator or targeted ax.grid(axis='y') call to suppress auto-generated
    ticks above the data ceiling
  - 'Sky gradient alpha=0.6 is nearly invisible in the light render against #FAF8F1
    — increase to 0.85–1.0 for the light theme or use brighter gradient colors so
    the dusk atmosphere reads'
  - Matterhorn focal emphasis is subtle relative to taller peaks (Dufourspitze 4634
    m, Dom 4545 m appear higher) — strengthen with a background accent strip, larger
    marker, or a dedicated callout annotation
  - Elevation sub-labels at fontsize=7 may be too small at mobile scale — increase
    to 7.5 or 8
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "area-mountain-panorama · python · seaborn · anyplot.ai" in dark #1A1A17 at 12pt — clearly readable. Axis labels "Compass bearing" and "Elevation (m)" at 10pt in #1A1A17 — readable. Tick labels at 8pt in #4A4A44 — readable. Peak name labels at 8–9pt in #1A1A17 — readable. Elevation sub-labels at 7pt in #6B6A63 — legible at full res but small.
      Data: Mountain silhouette filled in #009E73 (brand green) — identical to dark render. Ridgeline edge crisp. 16 peak labels staggered in 3 levels above the ridgeline with thin leader lines. Matterhorn distinguished with open circle marker and semibold label. Faint warm-amber dusk gradient barely visible in annotation zone at alpha=0.6. Faint gridlines visible at 5000 m and 5500 m extending into annotation zone.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, tick labels all in light cream (#F0EFE8 / #B8B7B0 / #A8A79F) — all clearly readable against dark background. No dark-on-dark failures. Peak labels in light ink — readable.
