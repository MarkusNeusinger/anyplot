review:
  strengths:
  - Beautiful alpine panorama silhouette with dark mountain fill (#2C3E50) and brand
    green (#009E73) ridge outline — striking visual contrast in light mode
  - Three-row label staggering algorithm handles 16 clustered peaks cleanly with no
    overlaps
  - Piecewise-linear triangular tent functions correctly produce angular alpine peaks
    (not Gaussian bumps) as required by spec
  - Matterhorn anchor peak emphasised with larger fontsize (4.5 vs 3.5 mm) for focal
    prominence
  - 'Themed sky panel backgrounds (light-blue #B8D4E8 / dark-navy #0B1726) reinforce
    the panorama photographic aesthetic'
  - layer_tooltips() with peak name + elevation leverages letsplots interactive HTML
    output — a genuine library differentiator
  - All 16 Wallis 4000-m summits with correct real-world elevations, compass bearings,
    and Gornergrat vantage point
  weaknesses:
  - 'Dark render: mountain fill #2C3E50 is lighter than the dark sky panel background
    #0B1726 (RGB 44,62,80 vs 11,23,38), subtly inverting the silhouette effect. Consider
    making MOUNTAIN_FILL theme-adaptive so it remains darker than the sky in both
    themes.'
  - Elevation sub-labels use size=3.0 mm (~8.5 pt), which may be slightly small at
    mobile scale (~400 px). Increasing to 3.2–3.5 mm would improve legibility on small
    screens.
  - 'DE-03: storytelling is good (Matterhorn emphasis, compass bearings) but the subtitle
    already provides context — a visual annotation pointing out the tallest peak (Monte
    Rosa / Dufourspitze at 4634 m) as the highest summit could further elevate narrative
    clarity.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct page surface.
      Panel background: Light sky-blue (#B8D4E8) filling the full chart area above the ridgeline — matches the atmospheric panorama intent from the spec.
      Mountain silhouette: Dark slate-navy fill (#2C3E50) clearly darker than the sky blue, creating the intended photo-like silhouette with brand green (#009E73) ridge outline tracing the full skyline.
      Peak markers: Brand green (#009E73) dots at all 16 summit positions — clearly visible.
      Labels: Three-row staggered system; peak names in bold dark INK (#1A1A17), elevation sub-labels in INK_SOFT (#4A4A44). All clearly readable.
      Title: "Wallis Panorama from Gornergrat · area-mountain-panorama · python · letsplot · anyplot.ai" — dark text, fills ~80% of width, readable.
      Subtitle: Smaller grey text below title, readable.
      Compass X-axis: WSW, W, NW, N, NE labels readable.
      Legibility verdict: PASS — all text elements clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct page surface.
      Panel background: Very dark navy (#0B1726) — night-sky feel appropriate for dark mode.
      Mountain silhouette: Mountain fill (#2C3E50, RGB 44,62,80) is slightly lighter than the very dark sky (#0B1726, RGB 11,23,38), causing a subtle inversion of the silhouette effect — mountains appear as medium-dark blue forms against a darker sky rather than dark silhouettes against a lighter sky. The brand green (#009E73) outline still clearly defines the ridgeline. Visually acceptable but different from the light render's photographic silhouette effect.
      Peak markers: Brand green (#009E73) dots visible — data colors identical to light render. ✓
      Labels: Peak names use INK (#F0EFE8, near-white) — clearly readable against the dark background. Elevation sub-labels use INK_SOFT (#B8B7B0) — readable. Leader lines appear light-colored (INK_SOFT in dark mode).
      Title/subtitle: Light text on near-black background — fully readable.
      No dark-on-dark failures detected.
      Legibility verdict: PASS — all text readable. Minor visual note: mountain silhouette effect inverted in this theme but not a legibility failure.
