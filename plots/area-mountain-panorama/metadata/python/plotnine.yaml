review:
  strengths:
  - Piecewise-linear tent functions with per-peak asymmetric flanks create genuinely
    angular alpine silhouette that reads as rock, not probability density — exactly
    as spec requires
  - 3-tier vertical staggering (5050/5250/5450 m) elegantly handles 16 labels across
    a dense 0–150° sweep without overlap
  - Matterhorn focal emphasis (bold label, larger marker, thicker/darker leader line)
    creates clear visual hierarchy
  - Fully theme-adaptive chrome with correct Imprint palette (#009E73) for data elements
    in both renders
  - Per-peak deterministic RandomState ensures reproducible asymmetric flank widths
    across runs
  weaknesses:
  - 'Mountain fill uses custom hex #263040 — not in Imprint palette or semantic anchors.
    Consider using the neutral anchor token (INK) or another palette member as semantic
    silhouette color'
  - Optional sky-color gradient above the ridgeline (light-blue→white or dusk orange→deep
    blue) from the spec was not implemented — this would significantly enhance photographic
    mood
  - Optional layered background ridges (lighter foreground/darker background) not
    implemented — would add depth and Zermatt-panorama-style atmosphere
  - Peak labels (geom_text size=3.0mm ≈ 8.5pt) are small for the information density;
    increasing to 3.4–3.8mm would improve mobile legibility
  - Title fontsize 11pt for ~79-char title is marginally above formula-scaled recommendation
    (12×67/79 ≈ 10pt); reduce to 10pt to follow the scaling rule
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "Wallis from Gornergrat · area-mountain-panorama · python · plotnine · anyplot.ai" readable in dark ink at top-left. Y-axis label "Elevation (m)" readable. Y-axis tick labels (2,500–5,000) readable in INK_SOFT. X-axis blank (intentional).
      Data: Dark slate-blue (#263040) filled silhouette traces jagged alpine ridgeline. 16 brand-green (#009E73) circular markers at summit positions. Thin leader lines rise to 3-tier staggered labels (peak name + elevation). Matterhorn bold and larger.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title and axis labels render in light text (#F0EFE8). Y-axis tick labels in light secondary text (#B8B7B0). All text clearly visible on dark surface. No dark-on-dark failures observed.
      Data: Mountain fill (#263040) remains same color as light render — produces subtle blue-grey silhouette against near-black background, still readable as mountain form. Peak markers (#009E73) identical to light render — Imprint data colors unchanged. Leader lines light-colored.
      Legibility verdict: PASS
