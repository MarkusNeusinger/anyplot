review:
  strengths:
  - Correct panoramic area chart with geom_ribbon fill covering the full ridgeline
    from 2500 m floor
  - All 16 Wallis peaks labeled with name + elevation, staggered across 3 vertical
    tiers to prevent overlap
  - 'Matterhorn correctly differentiated as focal point: bold label, larger summit
    marker (size=3.2 vs 2.0), and stronger leader line (INK color vs INK_MUTED for
    others)'
  - 'Theme adaptation is flawless — both renders use correct backgrounds (#FAF8F1
    light / #1A1A17 dark), all chrome tokens (title, labels, ticks) flip correctly
    between themes with no dark-on-dark failures'
  - 'Palette compliance: Imprint brand green #009E73 used as the single data color;
    grid alpha=0.12 keeps it subtle'
  - Canvas correctly sized at 3200×1800 px (8×4.5 in at 400 dpi); canvas gate passed
  - Code is clean, reproducible (np.random.seed(42)), and idiomatic plotnine grammar-of-graphics
    layering
  - np.maximum() used to combine Gaussian contributions creates visually distinct
    peak profiles without explicit looping over the render array
  weaknesses:
  - Ridgeline uses Gaussian/bell-curve functions (np.exp(-((angles-p['angle_deg'])**2)/(2*sigma**2)))
    — the specification explicitly forbids Gaussian bumps and requires piecewise-linear/fractal
    silhouette with triangular peaks and sharp apexes. Replace with summed tent/triangle
    functions or midpoint-displacement noise to produce a jagged alpine profile.
  - 'Title is missing the ''python'' language segment. Current: ''Wallis from Gornergrat
    · area-mountain-panorama · plotnine · anyplot.ai''. Required format: ''{Descriptive
    Title} · {spec-id} · {language} · {library} · anyplot.ai''. Fix: ''Wallis from
    Gornergrat · area-mountain-panorama · python · plotnine · anyplot.ai'''
  - Silhouette fill is brand green (#009E73, bright) rather than the 'dark solid color'
    described in the spec for a 'photo-like silhouette, evening/dusk feel'. While
    the Imprint palette rules mandate green as first series, this bright green fill
    significantly departs from the intended dark/atmospheric alpine aesthetic of the
    plot type.
  - Monte Rosa (4634 m) renders visually taller than Matterhorn (4478 m) in the silhouette,
    which is correct data-wise, but the spec says Matterhorn 'should read as visually
    prominent — it is the focal point'. The label emphasis alone is insufficient when
    the mountain shape itself makes Monte Rosa appear largest.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface, not pure white.
      Chrome: Title "Wallis from Gornergrat · area-mountain-panorama · plotnine · anyplot.ai" is centered at top in dark INK text (~11pt), clearly readable. Y-axis label "Elevation (m)" in dark ink at 10pt, readable. Y-axis tick labels (2,500 to 5,000 in 500 m steps) at 8pt in INK_SOFT, clearly visible. X-axis ticks and labels hidden (intentional per spec). Subtle horizontal grid lines visible at low alpha.
      Data: Bright Imprint brand green (#009E73) filled area traces the mountain ridgeline across 0–150° panorama. All 16 peaks marked with green circles (white centers) and thin vertical leader lines extending to 3-tier label zones (5050/5250/5450 m). Matterhorn has a thicker, darker (INK) leader line and bold label at size=3.8mm. Other peaks use INK_MUTED leaders at size=3.0mm. Peak labels show name and elevation (e.g., "Matterhorn / 4,478 m"). Ridgeline silhouette is smooth/Gaussian-shaped rather than jagged.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface, not pure black.
      Chrome: Title visible in light text (#F0EFE8 / INK token). Y-axis label and tick labels rendered in light INK_SOFT (#B8B7B0) — all clearly readable against dark background. No dark-on-dark failures observed. Subtle horizontal grid lines visible at low alpha against dark background.
      Data: Identical Imprint brand green (#009E73) silhouette — data colors unchanged from light render as required. Leader lines adapt: Matterhorn uses white/light INK leader; others use INK_MUTED (#A8A79F). Both are visible against the dark background. Summit markers (green circles) readable. Peak labels in light text, all legible.
      Legibility verdict: PASS — all text readable against the near-black background. Brand green #009E73 clearly visible. No dark-on-dark failures.
