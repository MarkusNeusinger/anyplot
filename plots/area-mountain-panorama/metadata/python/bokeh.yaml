      Background: Warm near-black #1A1A17 — correct. The sky gradient shifts to deep navy (#081424 top → #1C2E45 horizon), giving a dramatic dusk/night alpine atmosphere. The contrast between the dark sky and the green silhouette is striking and effective.
      Chrome: Title in light INK (#F0EFE8) — clearly visible against dark background. Y-axis label and tick labels in INK_SOFT (#B8B7B0) — legible. No dark-on-dark text issues found anywhere.
      Data: Mountain silhouette is identical brand green #009E73 — correct, palette data colors unchanged between themes. Summit dots show as white/light-colored rings on the dark theme (PAGE_BG line_color inverts to near-black rings against green, which is subtly different). Leader lines lighter (INK → #F0EFE8 for focal, INK_SOFT → #B8B7B0 for others). "focal peak" callout in INK_SOFT — visible. All peak name labels in INK (#F0EFE8) — readable.
      Legibility verdict: PASS — all text elements are readable against the dark background. Chrome correctly adapts via INK/INK_SOFT tokens. No dark-on-dark failures detected.
