review:
  strengths:
  - Authentic Wallis/Valais geographic data with accurate elevations for all 16 labeled
    peaks
  - Elegant cosine smoothstep interpolation produces a natural, non-mechanical ridgeline
    curve
  - Both light and dark renders pass full legibility checks with zero dark-on-dark
    or light-on-light failures
  - 'Perfect code quality: KISS structure, reproducible seed, clean imports, dual
    PNG+HTML output'
  - Three-tier staggered label system cleanly avoids annotation collisions despite
    16 labeled peaks
  weaknesses:
  - No sky gradient above the ridgeline — the spec's evening/dusk feel is not achieved;
    adding a subtle gradient (pale blue or dusk-orange) above the ridge would be the
    single biggest visual improvement
  - Matterhorn (4478m) is not the tallest silhouette peak — Dufourspitze (4634m) and
    Dom (4545m) visually dominate the profile, contradicting the Matterhorn's role
    as focal point
  - No HoverTool in the Bokeh HTML output — missed opportunity for the library's most
    distinctive interactive feature
  - Tall blank gap between top label tier (~5200m) and plot upper boundary (5400m)
    wastes canvas space
