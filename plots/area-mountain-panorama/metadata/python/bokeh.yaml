  - Matterhorn focal emphasis (larger dot, bolder text, stronger leader line) plus
    'focal peak · 4478 m a.s.l.' callout creates clear visual hierarchy
  - Bokeh HoverTool on invisible hit-targets at each summit adds genuine interactivity
    to the HTML artifact — idiomatic and correct for an interactive library
  - 'Both light and dark themes render cleanly: brand green silhouette, correct warm-off-white
    / near-black backgrounds, and fully adaptive chrome (INK / INK_SOFT) — no dark-on-dark
    failures'
