      Background: Warm off-white #FAF8F1 — correct. The sky area shows a smooth atmospheric gradient from light blue (#4A8EC4) at the top to a pale sky-blue horizon (#D4EBF7), rendered via 60 stacked quads. The mountain silhouette fills the lower portion with brand green (#009E73), creating a sharp contrast against the sky.
