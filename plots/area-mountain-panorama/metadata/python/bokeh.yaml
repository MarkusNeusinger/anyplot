review:
  strengths:
  - 'Perfect spec compliance: all 16 Wallis peaks annotated, correct ridgeline shape,
    correct axis configuration.'
  - Full theme-adaptive chrome correctly implemented with both renders passing readability
    checks.
  - Three-tier label staggering handles dense peak clusters effectively without collisions.
  - Cosine smoothstep ridgeline generation creates a realistic, smooth mountain silhouette
    with proper saddle depths.
  - Focal Matterhorn emphasis via bold type and larger summit dot shows design intent.
  - 'Flawless code quality: seed for reproducibility, clean imports, no classes/functions,
    correct output filenames.'
  weaknesses:
  - No Bokeh HoverTool — misses the library's core distinctive feature; adding hover
    would show peak name + elevation interactively.
  - No ColumnDataSource for the peak scatter/line data — less idiomatic Bokeh and
    would enable HoverTool if added.
  - Sky gradient background (optional per spec, but high visual impact) not implemented;
    a dusk gradient above the ridgeline would significantly elevate the photographic
    mood.
  - Matterhorn focal emphasis is understated — Dufourspitze renders visually taller,
    undermining the stated focal point; a distinct accent color or stronger visual
    treatment for the Matterhorn column would clarify intent.
  - Dead space above label tiers (5000–5400 m in y-range) creates an empty band at
    the top of the canvas.
