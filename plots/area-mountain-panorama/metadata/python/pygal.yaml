review:
  strengths:
  - Genuinely jagged alpine ridgeline using midpoint-displacement fractal + asymmetric
    tent functions (spec-compliant, not Gaussian)
  - Secondary depth ridge adds visual depth and layering, creating the panoramic feel
    the spec requests
  - Peak labels tiered across 4 height levels with distinct focal treatment for Jungfrau
    (larger font, top tier, bold leader)
  - Accurate real-world elevations for Bernese Oberland peaks (Finsteraarhorn 4274
    m, Eiger 3967 m, Mönch 4107 m, Jungfrau 4158 m — all factually correct)
  - Sky gradient above ridgeline creates atmospheric mood; compass bearings on X-axis
    orient the viewer
  - Both light and dark themes fully adaptive — chrome (text, grid, axis frame) flips
    correctly while data colors remain constant
  - 'Reproducible: two independent np.random seeds (42 and 99) for the two fractal
    ridges'
  - Generates both interactive HTML (pygal native) and PNG via cairosvg — full output
    contract met
  weaknesses:
  - Silhouette fill uses brand green (#009E73) rather than the spec-specified dark
    solid color — spec says fill with a dark color for photo-like silhouette/evening-dusk
    feel; brand green produces a stylised diagram mood instead
  - 'Secondary depth ridge uses custom hex #A8BAB4 (light) / #2C3E38 (dark) rather
    than the Imprint muted anchor (#6B6A63 / #A8A79F) — minor palette deviation for
    a decorative element'
  - Jungfrau (4158 m) is treated as the focal peak but Finsteraarhorn (4274 m) is
    actually the highest summit — the emphasis choice could cause viewers to misjudge
    the skyline hierarchy; at minimum the subtitle or label should cue why Jungfrau
    is highlighted
  - Peak dot markers render as plain black (light) / white (dark) pygal defaults,
    slightly at odds with the polished custom SVG chrome; using brand-colored or styled
    dots would unify the look
  - Peak label crowding is manageable but tight in the Eiger–Mönch–Jungfrau–Silberhorn
    cluster (angles 192°–248°) — leader lines from nearby summits cross visually
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) at the margins and outside the plot area. Inside the plot box the background transitions from a light sky-blue (#BDD8EC) at the top to the page cream at the ridgeline — a subtle atmospheric sky gradient.
      Chrome: Title "Bernese Oberland · area-mountain-panorama · python · pygal · anyplot.ai" is dark-ink text, clearly readable at the top. Subtitle "Thirteen peaks of the Swiss Bernese Oberland, viewed W → E from the north" is secondary-ink below. Y-axis tick labels (2,500 – 4,500 m) and compass bearing labels (W, SW, S, SE, E) are visible in muted ink. The L-shaped axis frame provides clean structural chrome without a distracting box.
      Data: The main ridgeline fills with brand green (#009E73) as a solid filled area. The fractal + tent-function ridgeline reads as genuinely alpine — sharp triangular peaks, steep flanks, irregular saddles. A secondary depth ridge in sage-grey (#A8BAB4, 0.60 opacity) peeks above the green silhouette valleys, adding layered distance. Thirteen peak labels (name + elevation, e.g. "Finsteraarhorn / 4,274 m") sit above their respective summits connected by thin leader lines, staggered across four height tiers. Jungfrau is the focal peak: largest font (32 px vs 24 px), highest tier (4820 m data-unit), bolder leader.
      Legibility verdict: PASS — all text is dark on the cream/sky surface, no light-on-light issues. Y-axis labels and compass labels are slightly small but readable. Peak-label crowding in the Eiger–Mönch–Jungfrau–Silberhorn cluster (192°–248°) is tight but tiering keeps them individually readable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17). Inside the plot box the sky gradient transitions from deep navy (#1B2A3D) at the top to near-black at the ridgeline — a dramatic night-sky effect.
      Chrome: Title and all text flip to light ink (#F0EFE8 / #B8B7B0), clearly readable against the dark background. Axis frame lines are in muted light ink. No dark-on-dark failures observed — all text renders in light tones.
      Data: Brand green (#009E73) ridgeline is identical to the light render — correct per Imprint palette rule (data colors do not flip between themes). Secondary depth ridge shifts to a dark teal (#2C3E38, 0.60 opacity), harmonising with the night-sky background. Peak labels remain in light ink, readable against the dark surface.
      Legibility verdict: PASS — light text on near-black background, no "dark-on-dark" failures. The atmospheric night-sky gradient in dark mode is visually coherent.
