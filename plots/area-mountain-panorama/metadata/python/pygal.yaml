review:
  strengths:
  - Fractal midpoint-displacement silhouette with asymmetric tent-function peaks reads
    as genuinely alpine rock, not smooth Gaussian bumps — exactly what the spec requires
  - Sky gradient (light-blue→page-bg in light, deep-blue→near-black in dark) beautifully
    evokes a Bernese Oberland alpine backdrop and adapts correctly per theme
  - Tiered label staggering (4 tiers via i%3 cycle + focal override) keeps all 13
    peak names readable with zero overlap despite a crowded right cluster
  - Focal treatment of Jungfrau — bold font weight, top tier (4820 m), thicker darker
    leader line — creates the required visual hierarchy and anchor point
  - Precise SVG coordinate calibration from pygal dot positions enables accurate custom
    chrome (tick labels, compass bearings, axis frame) overlaid on the pygal fill
  - 'Perfect spec compliance: 13 real Bernese Oberland peaks with accurate elevations,
    correct chart type, optional sky-gradient, leader lines, subtitle, and jagged
    angular silhouette'
  - Reproducible synthetic ridge via np.random.seed(42) and full Imprint palette /
    theme-adaptive chrome in both light and dark renders
  - HTML output preserved alongside PNGs so the interactive pygal hover-tooltips (showing
    peak name + elevation) are still available
  weaknesses:
  - Y-axis tick labels are rendered at font-size:30px SVG units, below the style-guide
    recommended 44px (pygal major_label_font_size default); increase to 38-44px to
    match the recommended sizing and improve readability at full canvas resolution
  - The pygal XY fill area bleeds below the drawn L-shaped axis frame into the bottom
    margin (~130px band of solid green below the x-axis line), because the custom
    axis overlay is drawn after the pygal fill rather than clipping it; consider setting
    a clipPath on the SVG plot group or reducing the Y_FLOOR so the fill terminates
    visually above the axis line
  - Bottom-left compass label 'W' (at angle=20°, font-size:30px) appears very close
    to the left-canvas edge and the bottom margin; consider nudging the angle to 25-30
    or increasing the bottom margin to give it breathing room
  - Design excellence is solid but not exceptional — no layered depth ridges (the
    spec lists this as optional) which would add the cinematic alpine depth of a classic
    Zermatt panorama photograph; consider adding a faint muted secondary ridge layer
    for DE-01 uplift
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 fills the canvas — correct, no pure white.
      Sky: a light-blue (#BDD8EC) to off-white gradient fills the plot area above the ridgeline, evoking a Bernese Oberland mountain sky.
      Chrome: title "Bernese Oberland · area-mountain-panorama · python · pygal · anyplot.ai" in dark #1A1A17 at ~62px — large and readable. Subtitle "Thirteen peaks of the Swiss Bernese Oberland, viewed W → E from the north" at 28px in #4A4A44, readable. Y-axis title "Elevation (m)" rotated, readable. Y-axis tick labels (2,500–4,500) at 30px — present but slightly small against the style-guide recommended 44px; values appear near the left edge. Compass labels (W, SW, S, SE, E) at 30px visible along the bottom axis. L-shaped axis frame drawn cleanly.
      Data: brand-green (#009E73) filled area silhouette with a visibly jagged, angular ridgeline — sharp triangular peaks with asymmetric flanks, not Gaussian bumps. Black dot markers at each of the 13 summit positions. Leader lines from each summit dot to the tiered peak labels. Jungfrau label is bold and assigned the topmost tier; remaining 12 peaks cycle through three lower tiers with adequate horizontal spacing. First series color is #009E73 (correct Imprint position 1).
      Legibility verdict: PASS — all primary labels readable in both themes. Minor: y-axis tick font is smaller than recommended, and the green fill bleeds slightly below the drawn axis line into the bottom margin.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, no pure black.
      Sky: deep navy (#1B2A3D) to near-black gradient fills the plot area above the ridgeline — evocative evening alpine mood.
      Chrome: title and subtitle rendered in light #F0EFE8 / #B8B7B0 — clearly readable against the dark background. Y-axis labels and compass labels in light muted tones — no dark-on-dark failures observed. L-shaped axis frame visible in lighter INK_SOFT tone. All axis and label text adapts correctly to the dark theme.
      Data: brand-green (#009E73) silhouette fill is identical to the light render — Imprint data colors unchanged between themes (only chrome flips). White dot markers (INK token in dark = #F0EFE8) replace black dots from the light render — well visible on the dark background. Peak label text uses light INK / INK_SOFT colors, readable against near-black.
      No dark-on-dark text failures found. All text readable.
      Legibility verdict: PASS — both themes fully legible. Green fill below axis frame is more visually prominent on dark (appears as a solid green bar below the axis line) — minor layout issue but does not affect readability.
