review:
  strengths:
  - Sky gradient plotBackgroundColor creates an authentic panoramic atmosphere — dusk
    feel in light mode, night-sky mood in dark mode — directly matching the spec's
    'evening/dusk feel' intent
  - 'Expert use of Highcharts SVGRenderer: chart.renderer.path() for thin leader lines
    and chart.renderer.text() for two-line peak labels, with chart.xAxis[0].toPixels()
    / chart.yAxis[0].toPixels() for precise coordinate mapping — distinctively Highcharts
    idioms'
  - 'Accurate real-world Wallis Alps data: 16 named 4000m peaks with correct elevations,
    Gornergrat panorama viewpoint, compass bearings (S, SW, W, NW) on the X-axis —
    strong geographic authenticity'
  - Piecewise-linear ridgeline with deterministic LCG noise (seed 42) correctly produces
    sharp angular peaks, not Gaussian bumps — spec requirement satisfied
  - 'Theme-adaptive chrome correctly applied throughout: backgroundColor: transparent
    lets page bg show, t.ink/t.inkSoft/t.grid used consistently; animation: false
    in both chart and plotOptions.series'
  - 'Matterhorn at panorama center with the largest annotation offset (yOff: -120)
    anchors the composition as the spec''s focal peak'
  weaknesses:
  - 'Label overlap in the NW cluster (VQ-02): Allalinhorn (x=925, xOff=30) and Rimpfischhorn
    (x=955, xOff=-20) have near-identical label center positions (~5px horizontal
    separation after offsets) and nearly identical vertical positions (yOff -110 vs
    -75, with only ~48px peak elevation difference in screen space) — labels significantly
    overlap in both renders. Fix: increase staggering in this cluster, e.g. Allalinhorn
    yOff=-130, xOff=-30 and Rimpfischhorn yOff=-80, xOff=25; also re-check Alphubel
    (x=890, xOff=-35) which crowds from the left.'
  - 'Area fill uses custom hex colors outside the Imprint palette (ROCK_FILL: #29261F
    light / #3A3830 dark; ROCK_LINE: #3F3C35 light / #5A5750 dark; sky gradient: #BBD5E8/#0D1820
    top). These are semantically justified by the spec''s ''dark solid color silhouette''
    requirement, but technically deviate from the Imprint palette rule. Consider using
    t.ink (which is #1A1A17 on light, #F0EFE8 on dark) as the silhouette fill with
    fillOpacity ~0.92, or keep the custom colors with a clear comment citing the spec
    requirement.'
  - 'Matterhorn is only distinguished by a larger yOff value (-120 vs -55 to -100
    for others) — its label font weight and color are identical to all other peaks.
    For stronger focal hierarchy, use fontWeight: ''800'' and color: t.ink (vs t.inkSoft
    for secondary peaks) on the Matterhorn label, or slightly increase the fontSize
    to 12px.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page background visible outside the plot area; plot background has a sky gradient from light blue (#BBD5E8) at the top to near-white (#FAF8F1) at the bottom, creating an authentic alpine panorama atmosphere.
      Chrome: Title "Wallis Alps Panorama · area-mountain-panorama · javascript · highcharts · anyplot.ai" in dark ink at 18px — fully readable. Y-axis label "Elevation (m)" in dark soft ink at 14px — readable. Compass tick labels (S, SW, W, NW) at 13px — readable. Y-axis tick values (2500–5000 m) at 13px — readable. Subtle horizontal grid lines using t.grid color.
      Data: Dark near-black (#29261F) mountain silhouette fills the area below the piecewise-linear ridgeline. Sky gradient is light blue-to-cream above the ridge. All 16 peak annotations visible with thin leader lines (0.8 stroke) and two-line labels (peak name 11px bold dark ink, elevation 10px soft ink). NW cluster (Alphubel/Allalinhorn/Rimpfischhorn area) shows crowded/overlapping labels.
      Legibility verdict: PASS for most elements; FAIL for label overlap in the NW cluster (Allalinhorn + Rimpfischhorn labels significantly overlap).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) page background; plot background gradient from dark navy (#0D1820) at the top to near-black (#1A1A17) at the bottom — creating a night-sky panorama feel.
      Chrome: Title in light ink (#F0EFE8) — clearly readable against dark background. Y-axis label in soft light ink — readable. Compass labels in soft light ink — readable. Y-axis ticks in soft light ink — readable. No dark-on-dark text failures observed.
      Data: Data colors are thematically different from light render by design (dark brownish-grey #3A3830 rock silhouette on dark navy sky, vs dark near-black silhouette on light blue sky in light). This is a justified semantic difference: the rock silhouette color adapts to the dark theme so it remains clearly visible against the near-black background (contrast is maintained). The same NW cluster label overlap persists. Peak label text colors use t.ink (light in dark theme) — readable.
      Legibility verdict: PASS for most elements; label overlap in the NW cluster (Allalinhorn + Rimpfischhorn) persists in dark render as well.
