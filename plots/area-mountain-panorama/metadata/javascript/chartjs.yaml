review:
  strengths:
  - Beautiful sky gradient plugin creates authentic panoramic atmosphere — light render
    uses blue sky gradient, dark render uses deep navy/night sky, creating a photographic
    alpine mood
  - 'Perfectly spec-compliant: piecewise-linear ridgeline with sharp jagged peaks,
    layered background ridge for atmospheric depth, 12 annotated Valais summits with
    name and elevation'
  - Real-world Swiss Alps data with accurate elevations (Matterhorn 4478m, Monte Rosa/Dufourspitze
    4634m, Dom 4545m, Liskamm 4527m, Weisshorn 4506m, etc.)
  - 'Matterhorn clearly highlighted as focal peak: larger dot (7px vs 4px), outer
    highlight ring, bold text — strong visual hierarchy per spec requirement'
  - Deterministic sin-hash noise function (sinNoise) avoids Math.random() non-reproducibility
    while still producing realistic jagged ridgeline texture
  - 'Chart.js plugin system used expertly: skyPlugin (beforeDraw) for gradient background,
    annotPlugin (afterDraw) with scales.getPixelForValue() for pixel-accurate annotation
    placement'
  - Staggered yOff values for annotation labels prevent overlap across the panorama;
    dashed leader lines with text shadows maintain readability against the gradient
    sky
  weaknesses:
  - Peak annotation name text (13-15px CSS = 26-30 source px) is on the small side
    at full 3200x1800 resolution — increase name labels to 15-16px CSS and elevation
    text to 13-14px CSS for better readability
  - Left cluster (Weisshorn at 12°, Zinalrothorn at 20°, Ober Gabelhorn at 30°) labels
    are somewhat horizontally crowded due to close bearings — the yOff staggering
    helps but horizontal proximity still creates visual clustering on the left quarter
    of the chart
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) canvas margins; chart area features a sky gradient from deep blue (#2e6fa8) at top through mid-blue (#7fb3d8) to pale blue-white (#d6eaf8) near the bottom — per spec "Optional sky-gradient background above the ridgeline".
      Chrome: Title "area-mountain-panorama · javascript · chartjs · anyplot.ai" in dark ink (#1A1A17) at top — fully visible. Compass tick labels (W, WSW, SW, S, SSE, SE, E) in secondary ink on x-axis, elevation tick labels (2,500 m … 5,100 m) on y-axis — all readable. X-axis title "Bearing — Panorama from Gornergrat" and Y-axis title "Elevation (m)" in dark ink — clearly visible.
      Data: Mountain silhouette filled near-black (rgba(26,24,20,0.94)) with jagged triangular peaks. Background ridge in lighter semi-transparent grey-blue for atmospheric depth. Summit markers in #009E73 brand green — Matterhorn has larger dot (7px radius) with highlight ring. Peak annotation labels in #FAF8F1 white with drop shadow — 12 peaks labeled from Weisshorn (W) to Täschhorn (E).
      Legibility verdict: PASS — all text elements clearly readable against the warm light background; annotation labels readable against sky gradient with text shadows.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) canvas margins; chart area features a night sky gradient from very dark navy (#080d1f) at top through dark navy (#0f1a36) to the background color (#1A1A17) at bottom, creating a seamless transition into the dark canvas.
      Chrome: Title in light ink (#F0EFE8) — clearly readable against dark background. Compass tick labels and elevation tick labels in secondary light ink (#B8B7B0) — visible against dark background. Axis titles in light ink — readable. Subtle horizontal y-axis grid lines visible.
      Data: Data colors are identical to light render — same near-black mountain silhouette fill with dark ridge, same #009E73 brand green summit markers, same white annotation text with drop shadows. No dark-on-dark text issues: all annotation labels and axis labels use light-colored text that reads clearly against the dark surfaces.
      Legibility verdict: PASS — both themes render correctly. No dark-on-dark failures observed. Brand green #009E73 reads well on both light sky and dark night sky backgrounds.
