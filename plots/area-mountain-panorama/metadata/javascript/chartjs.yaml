review:
  strengths:
  - Stunning custom sky gradient plugin using Chart.js beforeDraw lifecycle — atmospheric
    light-to-dark transitions in both themes are visually impressive
  - Authentic Valais Alps data with factually correct elevations for 12 real Swiss
    peaks (Matterhorn 4478 m, Monte Rosa 4634 m, Dom 4545 m, etc.)
  - Layered depth (semi-transparent background ridge + near-opaque main silhouette)
    creates genuine 3D panoramic feel without any 3D rendering
  - Deterministic sine-hash noise (sinNoise function) generates natural-looking ridgeline
    texture reproducibly without Math.random()
  - Full theme-adaptation via ANYPLOT_TOKENS with correct Imprint palette (#009E73
    brand green for summit markers)
  - Piecewise-linear ridgeline with sharp triangular peaks exactly as spec requires
    (not Gaussian bumps)
  - Compass-bearing x-axis (W, WSW, SW, S, SSE, SE, E) adds authentic navigational
    flavor
  weaknesses:
  - 'Matterhorn (angle 60°, 4478 m) lacks visual distinction as the spec''s focal
    summit — it receives the same dot size and annotation style as all other peaks,
    while Monte Rosa (4634 m, taller) draws the eye more. Fix: increase the Matterhorn
    summit dot radius to 7–8 px (vs 4 px for others), use a slightly bolder/larger
    annotation label, or add a subtle highlight ring around the dot.'
  - 'Vertical grid lines (t.grid color on x-scale) compete with the panoramic sky
    aesthetic — a pure mountain silhouette typically uses horizontal elevation guides
    only. Fix: add grid: { display: false } to the x-scale and keep only y-axis grid
    lines.'
  - 'Annotation crowding at far right: Dom (168°) and Täschhorn (175°) are only 7°
    apart; while yOff staggering (55 vs 87) prevents overlap, the labels are very
    tight at the right edge. Fix: increase the Dom yOff to 110 and Täschhorn to 60
    to push them further apart vertically.'
  - 'Annotation text uses hardcoded #FAF8F1 rather than a computed contrast color
    — on the light-theme sky (pale blue near the horizon), light cream text has reduced
    contrast. Fix: add canvas text-shadow (ctx.shadowColor = ''rgba(0,0,0,0.45)'';
    ctx.shadowBlur = 3) so labels stay crisp against both light and dark sky gradients.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page margins with a sky-blue gradient filling the chart area (deep blue at top transitioning to pale blue-white at the horizon).
      Chrome: Title "area-mountain-panorama · javascript · chartjs · anyplot.ai" in dark ink at top — fully readable. Y-axis ticks ("2,500 m", "3,000 m", etc.) in dark inkSoft on off-white margin — readable. X-axis compass labels (W, WSW, SW, S, SSE, SE, E) and axis title "Bearing — Panorama from Gornergrat" clearly readable. Grid lines subtle using t.grid token.
      Data: Dark near-opaque mountain silhouette fills the lower portion; semi-transparent gray background ridge provides atmospheric depth. Brand green (#009E73) dots mark 12 summit positions. Peak annotation labels (name + elevation) appear in cream (#FAF8F1) with dashed leader lines. Monte Rosa at 4634 m is visually the tallest peak; Matterhorn at 4478 m is prominent but not specially distinguished.
      Legibility verdict: PASS — all text readable; annotation cream on light-blue sky is functional though slightly reduced contrast near pale horizon.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) page margins with dark navy sky gradient (from #080d1f at top to #1A1A17 at bottom horizon).
      Chrome: Title and axis labels are light-colored (via t.ink = #F0EFE8 in dark theme) against the near-black margins — fully readable. Tick labels use t.inkSoft = #B8B7B0 — visible. Grid lines subtle. No dark-on-dark failures detected anywhere.
      Data: Mountain silhouette remains near-black against dark navy sky — contrast is maintained. Brand green (#009E73) summit dots identical to light render. Peak annotation labels in cream (#FAF8F1) read clearly against the dark navy sky background. Sky/mountain depth effect transitions to navy/dark scheme effectively.
      Legibility verdict: PASS — all text readable in dark theme; data colors identical to light render; only chrome flips theme.
