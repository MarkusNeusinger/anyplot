    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title in light cream (#F0EFE8), Y-axis labels in light gray (#B8B7B0), all readable against dark background. No dark-on-dark failures. Grid lines in dark-theme grid token (rgba(240,239,232,0.15)) very subtle.
      Data: Mountain silhouette appears white/cream (#F0EFE8 = t.ink in dark mode), creating snow-mountain-on-night-sky aesthetic. Sky gradient more vivid (75% opacity Imprint blue at top). Matterhorn still in brand green (#009E73) — readable on dark background. Data colors identical to light render; only chrome flips.
      Legibility verdict: PASS — all text readable against dark sky background; no dark-on-dark failures observed; brand green visible on dark surface.
