review:
  strengths:
  - Authentic Wallis/Valais panorama data with factually correct Swiss Alps peak elevations
  - Sharp piecewise-linear ridgeline correctly implements alpine silhouette (no Gaussian
    bumps)
  - Matterhorn focal point immediately reads via brand green (#009E73) — spec primary
    design requirement fulfilled
  - 'Sky gradient uses Imprint blue (palette[2] = #4467A3) keeping palette compliance
    while adding atmospheric depth'
  - chart.convertToPixel for dynamic leader-line positioning is the correct idiomatic
    approach in ECharts
  - Fully deterministic, self-contained implementation with animation:false and correct
    ECharts init pattern
  weaknesses:
  - Peak elevation sub-labels at 11px are small; consider bumping to 12-13px for better
    mobile readability when scaled to ~400px width
  - Left cluster (Weisshorn, Zinalrothorn, Ober Gabelhorn) has tight horizontal spacing;
    minor xShifts could improve visual breathing room
  - Dark-mode silhouette inverts to white/cream (t.ink) — creative and visually compelling,
    but slightly deviates from the spec dark solid color evening/dusk feel directive
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Alpine Panorama · area-mountain-panorama · javascript · echarts · anyplot.ai" clearly visible in dark ink (#1A1A17). Y-axis label "Elevation (m)" and tick labels ("2600 m", "3000 m", etc.) readable in secondary ink (#4A4A44). X-axis hidden (correct per spec). Grid lines subtle and horizontal-only.
      Data: Near-black mountain silhouette (t.ink = #1A1A17) fills lower portion. Sky gradient in Imprint blue (#4467A3 at 32% opacity) above ridgeline. 12 peak annotations with leader lines, staggered heights. Matterhorn highlighted with brand green (#009E73) dot and label text — clear focal point.
