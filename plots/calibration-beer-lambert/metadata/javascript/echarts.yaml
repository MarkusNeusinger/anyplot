review:
  strengths:
  - 'Complete spec compliance — all required features implemented: calibration scatter
    points, linear regression fit, 95% prediction interval band, regression equation
    and R² annotation, and unknown sample with dashed guide lines to both axes'
  - Statistically rigorous 95% prediction interval using the correct t-critical value
    (t=2.447 for 6 df) and the proper PI formula — factually accurate and demonstrates
    domain knowledge
  - 'Advanced ECharts graphic API usage: convertToPixel for data→pixel coordinate
    transformation to render the tapered PI band polygon — the correct approach for
    non-rectangular shaded regions in ECharts'
  - 'Professional equation annotation box styled with t.elevatedBg, subtle border,
    and monospace font; white-ring markers (borderColor: t.pageBg) add visual depth
    to scatter points'
  - 'Both light and dark renders are fully theme-adaptive: data colors identical across
    themes, chrome (text, background, grid) flips correctly with Imprint palette palette[0]
    first series'
  weaknesses:
  - PI band opacity (bandColor rgba opacity 0.18) is very subtle; increasing to ~0.25
    would improve visibility when the chart is thumbnailed or viewed at small sizes
    on mobile
  - 'The legend position (bottom: 22) with four entries creates a moderately crowded
    bottom margin — placing the legend inside the upper-right chart area (where the
    data is sparse) would free up vertical space and improve layout balance'
  - 'DE design could go further: the color story is monochromatic (scatter, regression
    line, and PI band all use palette[0]); a secondary Imprint color for the regression
    line (e.g. palette[2] blue) would add intentional visual contrast and guide the
    eye through the layered elements more effectively'
