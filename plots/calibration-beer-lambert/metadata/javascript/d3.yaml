review:
  strengths:
  - Semantic color assignment (green=calibration standards, blue=regression fit, red=unknown
    sample) shows genuine design thinking rather than ordinal defaults
  - 'Full spec compliance: all required features present — scatter standards, regression
    line, 95% prediction interval band, equation+R² annotation, and dashed guide lines
    for unknown sample'
  - Theme-adaptive band opacity (0.15 light / 0.25 dark) is a non-trivial craft decision
    that improves readability on both surfaces
  - 'Idiomatic D3 usage: d3.area() for prediction band, d3.line() for regression path,
    proper data-join pattern for gridlines'
  - Manual OLS regression with prediction interval computed correctly in-code — deterministic
    and self-contained
  - Custom legend with per-element swatches (dot, line, band rect+outline) adds visual
    clarity beyond a generic color square
  - 'Perfect data quality: realistic UV-Vis spectrophotometry context, plausible concentration/absorbance
    values, R²=0.9998 consistent with careful lab calibration'
  weaknesses:
  - Tick labels set at 14px CSS (28 source px at deviceScaleFactor=2) — at the lower
    bound of the 14–22 px recommendation; increasing to 15–16px would improve legibility
    at full canvas size
  - DE-01 limited by lack of typographic hierarchy beyond bold title — axis labels
    and tick labels share the same visual weight; subtle weight differentiation would
    add sophistication
  - 'DE-02 could be refined further: the axis domain lines (spines) use inkSoft which
    is fine, but removing top/right domain strokes entirely or reducing tick line
    length would tighten the minimal-chrome look'
  - Legend position (bottom-right) slightly crowds the data region near the high-concentration
    end; repositioning to top-left (below the equation box) or adjusting iw/margin
    allocation would give the regression line more breathing room
