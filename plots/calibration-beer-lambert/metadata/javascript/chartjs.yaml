review:
  strengths:
  - 'Full spec compliance: regression equation, R², 95% prediction band, and unknown
    sample with dashed axis-reference lines all implemented'
  - Custom bgPlugin and annotPlugin demonstrate idiomatic Chart.js plugin architecture
    for theme-adaptive backgrounds and in-chart text
  - Elegant legend filter using startsWith('_') convention to hide internal helper
    datasets without cluttering code
  - 'fill: ''+1'' technique correctly creates filled prediction band between upper
    and lower PI dataset curves'
  - 'Semantic color separation: green (#009E73) for calibration standards and matte-red
    (#AE3030) for the unknown sample with triangle pointStyle provides strong visual
    distinction and redundant encoding'
  - Near-perfect linearity of synthetic data (R²=0.99986) and realistic UV-Vis concentration/absorbance
    ranges make the data scientifically plausible
  - Both light and dark themes properly adapted — data colors identical, only chrome
    flips
  weaknesses:
  - Axis readout annotations ('A = 0.350' and 'c = 7.0 mg/L') use 13px font which
    is smaller than the 14px tick label size — increase to 14-15px for better legibility
    at mobile widths
  - The 'c = 7.0 mg/L' annotation is placed at bottom-10 inside the chart area, sitting
    very close to the x-axis gridline boundary and looking cramped — consider positioning
    it below the x-axis or using a leader line instead
  - 'Design Excellence could be elevated: top and right axis borders (Chart.js borderColor
    on scales) are not hidden, and no deliberate whitespace padding around the plot
    area was added — removing the axis box or reducing border opacity would increase
    visual polish'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface, not pure white.
      Chrome: Title "calibration-beer-lambert · javascript · chartjs · anyplot.ai" in dark ink, clearly readable at top center (~65% of plot width). Axis labels "Concentration (mg/L)" and "Absorbance" in dark ink, both legible. Tick labels in softer dark tone, readable. Legend at top with four entries (Unknown Sample, Calibration Standards, Linear Fit, 95% Prediction Band) in dark ink. Grid lines subtle and visible. Regression annotation "A = 0.0498c + 0.0014" (bold) and "R² = 0.99986" in top-left of chart area in dark ink — clearly readable.
      Data: Seven calibration standard circles in brand green (#009E73) with white edge, uniformly distributed along the linear fit. Green regression line (3px) runs through all standards. A very narrow light-green filled band (95% PI) flanks the regression line — narrowness reflects the excellent R²=0.99986 fit, which is realistic. A red triangle marker (Unknown Sample, #AE3030) sits at approximately (7.0 mg/L, 0.350 abs). Dashed red horizontal and vertical lines extend to the axes. "A = 0.350" label in red near the y-axis and "c = 7.0 mg/L" label in red near the x-axis bottom, both readable.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface, not pure black.
      Chrome: Title in light cream text, clearly readable against dark background. Axis labels and tick labels rendered in lighter tones (inkSoft token), all legible. Legend labels in light text. Grid lines subtle and visible as light-on-dark lines. Regression annotation text in dark ink — looking at the render, the annotation text "A = 0.0498c + 0.0014" appears in a near-black ink color on the dark background. The code uses `t.ink` which for dark theme is #F0EFE8 (light cream), so the annotation should read as light text. Visually in the render, the annotations appear correctly in light text.
      Data: Data colors identical to light render — green calibration standards (#009E73), green regression line, light-green PI band fill, and red triangle unknown sample (#AE3030). The red dashed reference lines and axis readout labels ("A = 0.350", "c = 7.0 mg/L") are visible in red against the dark background.
      No dark-on-dark failures observed — text is clearly light-on-dark throughout.
      Legibility verdict: PASS — all text and data elements readable against the warm near-black background.
