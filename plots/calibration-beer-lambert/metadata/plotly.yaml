  image_description: The plot displays a Beer-Lambert calibration curve with "Concentration
    (mg/L)" on the x-axis (range 0–15) and "Absorbance" on the y-axis (range 0–0.7).
    Eight blue circular markers represent calibration standards at concentrations
    0, 2, 4, 6, 8, 10, 12, and 14 mg/L, lying along a strong linear trend. A solid
    dark blue regression line passes through the data, flanked by a light blue shaded
    95% prediction interval band. A boxed annotation in the upper-left area shows
    "y = 0.0453x + 0.0020" and "R² = 0.99935". A red diamond marker at approximately
    8.3 mg/L marks the unknown sample, with red dashed lines extending horizontally
    to the y-axis and vertically to the x-axis. The legend in the upper-left lists
    all four traces. The title reads "calibration-beer-lambert · plotly · pyplots.ai".
