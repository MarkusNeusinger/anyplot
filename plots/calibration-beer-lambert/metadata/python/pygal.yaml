      Data: 7 calibration standard scatter points in brand green (#009E73) — large, prominent circles. Blue regression fit line (#4467A3) running through the data. Narrow ochre (#BD8233) dashed upper/lower PI boundary lines very close to the fit line. Red (#AE3030) dashed horizontal crosshair at A=0.350 and vertical crosshair at C≈7.59 mg/L, with a red dot at both the horizontal start and the intersection/base.
      Legend: 4 entries at the bottom (2 columns): Calibration Standards (green), Fit equation with R² (blue), 95% Prediction Interval (ochre), Unknown determination result (red).
      Legibility verdict: PASS — all text readable; fit line and PI band visually close together but distinguishable by color.

