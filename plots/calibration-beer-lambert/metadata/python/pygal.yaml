      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "calibration-beer-lambert · python · pygal · anyplot.ai" clearly readable in dark ink. X-axis label "Concentration (mg/L)" and Y-axis label "Absorbance" clearly readable. Tick labels (0.0–13.0, 0.0–0.6) legible. Regression equation annotation "A = 0.0457·C + 0.0031 R² = 0.9985" in italic muted text upper-left — readable. Bottom legend 4 entries in 2 columns — legible.
      Data: 7 green (#009E73) scatter dots for calibration standards. Blue (#4467A3) regression fit line running diagonally bottom-left to top-right (partially overlapped by ochre PI band). Ochre (#BD8233) dashed lines for upper/lower PI bounds close to fit line. Red (#AE3030) crosshair (horizontal + vertical dashed lines with markers) at ~7.59 mg/L.
