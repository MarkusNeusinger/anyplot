review:
  strengths:
  - 'Imprint palette correctly applied with semantic color choices: brand green for
    calibration standards, semantic red for the unknown determination, blue for the
    regression fit line'
  - Both light and dark renders have correct theme-adaptive chrome — warm off-white
    / near-black backgrounds, all text clearly legible in both themes, no dark-on-dark
    issues
  - Font sizes explicitly set following pygal style guide defaults (title=66, label=56,
    major_label=44, legend=44)
  - Realistic copper sulfate 810 nm calibration scenario with factually plausible
    Beer-Lambert data (R²=0.9985, absorbance 0–0.57)
  - 'Interactive pygal features used well: html-export, tooltip_fancy_mode, per-point
    dict labels with values, dashed stroke_dasharray for crosshair and PI bands'
  - np.random.seed(42) for reproducibility; clean KISS structure with no functions
    or classes
  - Unknown sample crosshair effectively guides the viewer to the key analytical insight
    — the red determination lines tell the story clearly
  weaknesses:
  - 'The regression equation and R² value are displayed only in the legend series
    label ("Fit: A = 0.0457·C + 0.0031 (R² = 0.9985)") — the spec explicitly requires
    them as a text annotation INSIDE the plot area. In pygal this can be achieved
    via a single-point stub series placed at an appropriate location (e.g. x=1.5,
    y=0.50) with show_dots=False and the equation as the series value label rendered
    via print_values=True, or by post-rendering SVG text injection'
  - 'The 95% prediction interval is shown as two dashed boundary lines rather than
    a filled shaded band. Pygal XY does not natively support area fills between lines.
    A workaround: render the band as a filled polygon series using a sequence of points
    tracing the upper boundary then reversed lower boundary, which pygal renders as
    a closed stroke that can approximate a band'
  - The prediction interval band is visually very narrow (high R², narrow CI) making
    it nearly indistinguishable from the fit line at a glance — consider filling the
    band even with a low-opacity workaround, or making the band lines slightly thicker
    to be more visible
  - Design excellence is limited — no spine removal, grid uses pygal defaults with
    minimal visual refinement. The CSS override removes axis lines but the overall
    look is functional rather than polished
