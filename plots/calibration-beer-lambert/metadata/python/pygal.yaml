review:
  strengths:
  - Full Imprint palette with well-reasoned semantic color assignment (green=standards,
    blue=fit, ochre=uncertainty band, red=result)
  - Regression equation + R² annotation correctly injected into the SVG at a non-overlapping
    upper-left position
  - Crosshair dashed lines effectively demonstrate the Beer-Lambert concentration-determination
    workflow
  - Both themes render correctly with full chrome adaptation; no dark-on-dark or light-on-light
    failures
  - Code is clean, reproducible, and idiomatic pygal throughout (per-point tooltip
    labels, None gaps, HTML export)
  - Interactive HTML output saved alongside the PNG
  weaknesses:
  - 'Prediction interval is shown as two dashed boundary lines (upper + lower) rather
    than a filled band — spec says ''prediction interval band'', which implies a shaded
    area. Repair should inject a semi-transparent polygon via SVG (fill-opacity~0.15
    in OCHRE #BD8233) using the same SVG-injection mechanism already used for the
    equation annotation.'
  - PI upper/lower dashed lines and the regression fit line are visually very close
    together, making the three lines hard to distinguish at first glance — increase
    stroke_dasharray spacing (e.g., '12,8') or reduce PI stroke width to 6 to differentiate
    from the 5px solid fit line.
  - Bottom legend with 4 entries is slightly cramped; nudging legend_font_size to
    48 would improve mobile-scale readability without overflow.
