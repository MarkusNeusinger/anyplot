    ~(9.55, 0.46) in data coordinates, placing it very close to the calibration standard
    at (10, ~0.45) — the annotation box and that data point compete for the same space;
    consider shifting the anchor point further right or up (e.g. x = unknown_concentration
    + 2.0, y = unknown_absorbance + 0.12) to give the annotation more breathing room'
  - 'DE-02 refinement: Y-axis grid uses dotted lines which is good, but X-axis has
    no grid at all — for scatter plots the style guide recommends grid on both axes;
    adding subtle X-axis gridlines (same GRID token, same dotted style) would improve
    reading precision without adding visual noise'
