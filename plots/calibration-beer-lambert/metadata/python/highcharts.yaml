review:
  strengths:
  - 'Full spec compliance: scatter + linear fit + prediction interval + unknown sample
    dashed-line determination — every required feature present'
  - 'Semantic color use: brand green (#009E73) for calibration series, matte red (#AE3030)
    for the unknown sample — semantically motivated and matches Imprint palette conventions'
  - Annotation boxes with color-matched borders (green for equation, red for unknown)
    create a coherent visual language linking annotation to its data
  - 'Excellent data storytelling: dashed crosshair lines guide the eye from unknown
    absorbance horizontally to the fit line and then vertically down to the concentration
    reading'
  - All four canvas encoding sites kept in sync (--window-size, CDP override, HTML
    div, chart.options.chart) — PIL safety net also present
  - 'Theme-adaptive chrome correctly applied in both renders: light (#FAF8F1) and
    dark (#1A1A17) backgrounds, INK/INK_SOFT token propagation throughout all text,
    tick, grid, and legend elements'
  - 'Clean, flat reproducible script: no unnecessary abstractions, np.random.seed(42),
    all imports used'
  - Highcharts annotations module used for floating label boxes — a library-distinctive
    feature that goes beyond basic series API
  weaknesses:
  - 'VQ-04 / CVD: The two primary data-distinguishing colors are brand green (#009E73)
    and matte red (#AE3030). While shape encoding (circle vs diamond marker) partially
    compensates, red-green is still the dominant color axis — deuteranopia/protanopia
    users lose the hue distinction. A subtle hatching or a more divergent shape choice
    (e.g., triangle for unknown) would make the CVD-safety robust.'
  - 'DE-02: Prediction interval band fill is rgba(0,158,115,0.15) — extremely transparent.
    In the dark render the band nearly disappears against the dark green plot area;
    increasing to 0.20–0.25 opacity or adding a thin dashed border to the band would
    preserve its visibility in dark mode.'
  - 'DE-01: Spines are partially present (left and bottom axis lines rendered in INK_SOFT).
    Hiding the top/right axes spines is already done implicitly by Highcharts defaults,
    but explicitly removing the bottom/left axis lines would push toward a cleaner
    publication style.'
  - 'LM-02: The CDN download approach (urllib.request fetching three separate JS files
    on every run) is functional but slow. Consider caching to a temp path across both
    THEME runs, or use the Highcharts NPM package if available in the environment.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface. No pure white.
      Chrome: Title "calibration-beer-lambert · python · highcharts · anyplot.ai" in dark ink (~65% width, well-proportioned). Subtitle "UV-Vis Spectrophotometric Calibration Standards" in INK_SOFT. Both are clearly readable. X-axis label "Concentration (mg/L)" and Y-axis label "Absorbance" in bold INK at 56px — appropriate weight. Tick labels in INK_SOFT, all visible. Dotted horizontal grid lines subtle on y-axis; no x-axis grid (intentional). Legend box (top-right) with warm elevated background, 4 entries clearly labeled.
      Data: 8 green (#009E73) scatter points (calibration standards, radius 14) with white ring separation from background. Green (#009E73) linear fit line, width 5. Light green prediction band (rgba(0,158,115,0.15)) — visible in light mode as a soft halo around the fit line. Red dashed vertical and horizontal lines (plotLines) marking unknown concentration ~8.3 mg/L and absorbance 0.38. Red diamond marker (#AE3030, radius 16) at intersection. Regression equation annotation box (green border, "y = 0.0452x + 0.0028", "R² = 0.99933") positioned at upper-left of plot area. Unknown annotation box (red border, "Unknown: 8.3 mg/L") near the unknown marker.
      Legibility verdict: PASS — all text clearly readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface. No pure black.
      Chrome: Title and subtitle in light (#F0EFE8) INK — clearly readable against dark background. Axis labels in light INK, tick labels in INK_SOFT (#B8B7B0) — adequately contrasted. Legend box with dark elevated background (#242420), text in INK_SOFT — readable. No dark-on-dark failures observed.
      Data: Same green (#009E73) scatter points and fit line — identical to light render as required. Prediction band (rgba(0,158,115,0.15)) is noticeably less visible in dark mode — the transparent green sits on a near-black background and nearly disappears. Red dashed lines and red diamond marker remain visible. Annotation boxes render with dark elevated background and color-matched borders — regression equation in green, unknown in red. Both readable.
      Legibility verdict: PASS overall, but WEAK: prediction band nearly invisible in dark render due to very low opacity (0.15) on a dark surface. Recommend increasing band fill opacity to 0.22–0.25 for dark mode.
