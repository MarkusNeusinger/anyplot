  - Color-matched annotation box borders (green border for regression equation, red
    border for unknown label) create strong visual cohesion and immediately signal
    which annotation belongs to which element
  - 'Theme-adaptive design executed correctly: variable prediction band opacity (0.15
    light / 0.22 dark), all chrome tokens (INK, INK_SOFT, GRID, ELEVATED_BG) tied
    to ANYPLOT_THEME, both renders pass readability check'
