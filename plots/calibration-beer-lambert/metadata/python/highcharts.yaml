  - 'All Beer-Lambert spec requirements met: calibration scatter, regression line,
    95% prediction interval band, equation+R² annotation, and unknown sample with
    dashed guide lines extending to both axes'
  - 'Semantic Imprint palette usage: BRAND green (#009E73) for calibration data/fit
    line, Imprint matte red (#AE3030) for the unknown sample — semantic anchor correctly
    used for a ''special/unknown'' role; circle vs triangle marker shapes provide
