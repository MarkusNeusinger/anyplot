review:
  strengths:
  - 'All spec-required features implemented: regression equation, R² annotation, prediction
    interval band, dashed reference lines projecting unknown sample to both axes'
  - Idiomatic plotnine usage — stat_smooth(method='lm') for regression + prediction
    interval in one layer, multiple scale_*_manual for redundant encoding
  - 'Excellent data storytelling: dashed projection lines clearly guide the viewer
    through the Beer-Lambert concentration determination workflow'
  - Semantic color choice (green calibration standards / red unknown sample) with
    redundant shape encoding (circle / diamond) mitigates CVD concern
  - 'Theme-adaptive chrome fully threaded — both renders use correct backgrounds (#FAF8F1
    / #1A1A17), all text elements switch correctly'
  weaknesses:
  - panel_border=element_rect(color=INK_SOFT, fill=None) creates an enclosed box (all
    4 spines) rather than L-shaped frame — remove panel_border and rely only on axis_line_x
    / axis_line_y per style guide
  - R² annotation box placed at y=0.46 while the horizontal dashed projection line
    runs at y=0.47 — the line passes through/immediately adjacent to the box, creating
    visual ambiguity; move R² label to y=0.42 to give clear separation
  - Calibration standard at 10 mg/L (green circle, abs≈0.45) and unknown sample (red
    diamond, abs=0.47) are very close together spatially, causing visual crowding
    in that region
