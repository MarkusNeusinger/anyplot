    by a light blue/gray prediction interval band that widens at the extremes. An
    orange diamond marker represents the unknown sample at approximately 8.3 mg/L
    with absorbance 0.38. Orange dashed lines extend horizontally from the unknown
    point to the y-axis and vertically down to the x-axis, demonstrating concentration
    determination. The label "Unknown (8.3 mg/L)" appears in orange near the unknown
    point. The regression equation "y = 0.0453x + 0.0024  R² = 0.9993" is displayed
    in blue in the lower-right area. The title reads "calibration-beer-lambert · altair
    · pyplots.ai" at the top. Grid is removed, view stroke is removed, axis domains
    are subtle gray. There is minor tick label crowding at the far right of the x-axis
    where "14.5" and "15.0" appear very close together.
