review:
  strengths:
  - 'All Beer-Lambert spec requirements fully met: 9 calibration standards (blank
    through 4 mg/L), regression fit, 95% prediction interval, equation + R² annotation,
    and dashed guide lines illustrating unknown concentration determination.'
  - 'Semantically appropriate Imprint colour use: #009E73 for calibration series (first/brand),
    #AE3030 (matte red) for unknown sample — mirrors the palette''s semantic role
    documentation.'
  - Realistic analytical chemistry context (iron/ferrozine at 562 nm) with scientifically
    accurate Beer-Lambert data and correct ε·l value.
  - 'Complete theme-adaptive implementation: all chrome tokens (INK, INK_SOFT, PAGE_BG,
    ELEVATED_BG, GRID_COLOR) correctly flip between light and dark; data colours remain
    invariant.'
  - Correct canvas (3200×1800), reproducible seed, idiomatic ggplot2 grammar throughout.
  weaknesses:
  - 'Annotation text is slightly small: regression equation size=2.8 (≈8pt) and unknown
    label size=2.5 (≈7pt) in ggplot2 geom units are legible at full resolution but
    borderline at mobile widths. Increase to size=3.2–3.5 for the equation box and
    size=3.0 for the unknown label.'
  - Design excellence is functional rather than distinctive — could further refine
    by removing tick marks (axis.ticks = element_blank()), adding a horizontal reference
    line at y=0 in muted ink, or tightening the axis expansion around y=0.
