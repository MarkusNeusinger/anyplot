review:
  strengths:
  - 'Perfect spec compliance — all required features present: regression equation
    with R², 95% prediction interval band, dashed guide lines from unknown point to
    both axes, and labeled unknown sample'
  - Scientifically realistic and domain-appropriate data (iron colorimetric method
    via ferrozine at 562 nm, epsilon*l=0.245 L/(mg·cm), 0.006 AU noise) — highly plausible
    analytical chemistry context
  - 'Correct semantic color choices: #009E73 (brand green) for calibration standards,
    #AE3030 (matte red) as the unknown sample highlight — semantically motivated rather
    than ordinal'
  - Well-styled annotation box using ELEVATED_BG, rounded corners (label.r), and border
    (label.size=0.25) — visually distinct from the plot background in both themes
  - Theme-adaptive chrome fully implemented — INK, INK_SOFT, PAGE_BG, ELEVATED_BG
    all switch correctly; data colors stay identical across light and dark renders
  - 'Clean, idiomatic ggplot2 code: correct use of inherit.aes=FALSE for separate-data
    layers, expansion() for scale padding, linewidth= (not size=) for lines'
  weaknesses:
  - Text label 'Unknown\nC = 2.63 mg/L' placed at x=unknown_conc+0.10 overlaps with
    the green calibration standard point at C=3.0 mg/L — the 'Unknown' text line extends
    into the vicinity of that point; nudge x offset to +0.15 or adjust vjust to place
    the label more clearly above the unknown diamond without intersecting the next
    standard
  - Prediction interval ribbon is very subtle at alpha=0.12 — barely distinguishable
    from the plot background in both renders; increase to alpha=0.18–0.22 to make
    the 95% PI band clearly visible while remaining non-distracting
  - Design Excellence is functional but minimal — the scientific layout is correct
    but no particularly distinctive visual treatment (e.g. a subtle reference line
    at A=1.0 marking the practical upper limit of Beer-Lambert linearity, or minor
    tick lines for finer axis resolution) would elevate the aesthetic
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "calibration-beer-lambert · r · ggplot2 · anyplot.ai" in dark INK (#1A1A17), left-aligned, clearly readable. X-axis label "Concentration (mg/L)" and Y-axis label "Absorbance" in dark INK at size 10 — both readable. Tick labels at size 8 in INK_SOFT (#4A4A44) — clearly readable. Subtle major grid lines at ~15% INK opacity. L-shaped frame (left + bottom axis lines in INK_SOFT, top/right spines absent).
      Data: 9 calibration standard points in #009E73 (brand green), size 3.5, with the regression fit line through them in the same green. A very subtle light-green ribbon (prediction interval, alpha=0.12) is present but barely distinguishable from background. Dashed red (#AE3030) horizontal guide from y-axis to unknown point at absorbance ~0.648. Dashed red vertical guide from unknown to x-axis at concentration ~2.63 mg/L. Unknown sample shown as a red diamond (shape=18). Annotation box in upper-left showing "A = 0.2461 × C + 0.0015 / R² = 0.99979" with elevated (#FFFDF6) background, rounded corners, and thin border. "Unknown\nC = 2.63 mg/L" label in red near the unknown diamond, with minor visual crowding near the C=3.0 calibration standard point.
      Legibility verdict: PASS — all text is readable. Minor concern: the "Unknown" label is close to the C=3.0 calibration standard point.

