      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8, clearly readable against dark background. Axis labels in light #F0EFE8 readable. Tick labels in #B8B7B0 clearly readable — no dark-on-dark issues. Grid lines adapt correctly to the dark theme (subtle light gridlines at ~15% INK opacity). Annotation box uses #242420 elevated background (slightly lighter than #1A1A17) with light text — distinct and readable.
      Data: Calibration standard points and regression line remain #009E73 (identical to light render — correct). Prediction interval ribbon remains very subtle. Dashed red guide lines and unknown diamond remain #AE3030 (identical to light render — correct). "Unknown\nC = 2.63 mg/L" label in red — readable against dark background. Brand green #009E73 clearly visible on dark surface.
