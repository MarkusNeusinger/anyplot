review:
  strengths:
  - Alpha storytelling (1.0 vs 0.5 opacity) creates an immediate focal point on the
    Hamilton/Verstappen championship battle without suppressing other drivers
  - Direct end-labels instead of a legend improve chart readability and eliminate
    back-and-forth visual lookups
  - Correct Imprint palette application in canonical order with Hamilton correctly
    assigned brand green (#009E73)
  - Theme-adaptive chrome is fully correct in both light and dark renders with no
    dark-on-dark failures
  - adjustcolor() workaround for subtle grid alpha demonstrates ggplot2-idiomatic
    problem solving
  - Clean minimal structure with only necessary imports; code reads as a clear narrative
  weaknesses:
  - Driver end-label geom_text size=3.5mm may be slightly small when the 3200px image
    is scaled to ~400px mobile width; consider size=4.0-4.5 for better mobile legibility
  - 'DE-01 could reach 6+ with minor polish: explicit plot.title.position = ''plot''
    to align title to the full plot width, and optionally a subtitle in INK_SOFT to
    surface the storytelling intent'
  - 'DE-02: The y-axis has no explicit axis line while x-axis does; adding panel.border
    = element_blank() explicitly would confirm the intentional asymmetry'
