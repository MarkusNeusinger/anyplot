review:
  strengths:
  - 'Semantic color assignment is excellent: McLaren=green (protagonist/rising) and
    Ferrari=matte-red (iconic livery) are well-motivated and match real-world expectations'
  - Variable stroke widths create meaningful visual hierarchy, making McLarens P4-to-P1
    narrative immediately clear
  - Dual-output (interactive HTML + static PNG) correctly leverages pygals core strength
  - Dict-format y_labels with inverted rank mapping is a sophisticated pygal API usage
    that cleanly solves the bump chart Y-axis inversion requirement
  - 'Perfect spec compliance: Y-axis inversion, dot markers, multi-entity coloring,
    and rank crossings all present'
  weaknesses:
  - Aston Martin (lavender) line at P5 is thin and dots are noticeably smaller than
    for other constructors despite equal competitive importance — increase stroke_width
    from 12 to at least 14-16 and dots_size from 16 to at least 18-20 for more even
    visual presence
  - P4-P5 vertical spacing gap is larger than the P1-P4 spacing, creating uneven rank
    distribution on Y-axis — adjust y_labels or scale parameters to equalize row spacing
  - DE-02 ceiling is pygal-inherent (no spine removal) but grid/guide line opacity
    could be reduced further to keep them more receded behind the data
