      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "bump-basic · python · plotnine · anyplot.ai" is bold, dark ink, spans ~80% of canvas width — expected and fine. Y-axis label "Market Share Ranking" and X-axis label "Quarter" clearly readable in dark ink. Tick labels (Q1'24–Q4'25 and 1–6) readable in INK_SOFT. End labels on the right (bold for WavePlay/StreamVue, italic for supporting cast) small but readable at desktop resolution.
