review:
  strengths:
  - Protagonist/supporting visual hierarchy with different line weights (size=2 vs
    0.9) and alpha (0.95 vs 0.4) creates a clear focal point
  - Crossover halo at Q4 24 elegantly marks the WavePlay→StreamVue overtake moment
  - End labels instead of a box legend is a professional bump-chart convention, cleanly
    executed
  - 'Full Imprint palette in canonical order, first series brand green #009E73, both
    renders theme-correct'
  - Clean KISS structure with hardcoded deterministic data and idiomatic plotnine
    layered grammar
  - scale_y_reverse() + horizontal-only grid is the correct minimal-chrome treatment
    for a ranking chart
  weaknesses:
  - End labels for supporting cast (3.0 mm ≈ 8.5 pt) are small enough to be borderline
    at mobile width (~400 px); consider nudging to 3.3–3.5 mm for the italic labels
    as well
  - There is notable empty vertical space between rank 5 and rank 6 due to EchoTV
    being locked at the bottom — no structural fix needed but worth noting if proportions
    feel loose
  - Crossover halo (alpha=0.12) is nearly invisible in the dark render against the
    dark background; raising halo alpha slightly to 0.18 would make it consistently
    visible across both themes
