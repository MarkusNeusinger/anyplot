review:
  strengths:
  - Smooth cubic spline interpolation for elegant bump curves
  - Rank-encoded marker sizes (rank 1 = largest) create visual hierarchy
  - Subtle P1 zone background band focuses attention on the lead
  - Path effects (withStroke) on end-of-line labels for legibility across both themes
  - Full Imprint palette compliance with correct canonical order
  - No bbox_inches=tight — canvas dimensions exact at 3200×1800
  - Direct driver labels instead of legend — ideal for bump chart readability
  weaknesses:
  - 'Some driver label colors (Norris #4467A3 blue, Sainz #AE3030 red) have borderline
    contrast on the dark #1A1A17 background — the path_effects stroke foreground=PAGE_BG
    uses near-black on dark theme, which does not boost label-to-background contrast.
    Consider a cream/INK_SOFT foreground for dark theme: path_effects=[pe.withStroke(linewidth=2,
    foreground=INK_SOFT if THEME == dark else PAGE_BG)]'
  - 'LM-02: Cubic spline is scipy-based (not matplotlib-native); while path_effects.withStroke
    is distinctly matplotlib, the overall technique mix relies on an external dependency
    for the key bump-curve feature'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, no pure white.
      Chrome: Title "bump-basic · python · matplotlib · anyplot.ai" at fontsize=13 — readable, fills ~70% of width. X-axis label "Grand Prix" and Y-axis label "Championship Position" at fontsize=10 — appropriately sized and balanced. Tick labels at fontsize=8, rotated 30° on x-axis — all readable. All chrome is dark ink on light background — no legibility issues.
      Data: Seven smooth cubic spline bump curves, each in Imprint palette canonical order: Verstappen=#009E73 (brand green, first series ✓), Hamilton=#C475FD (lavender), Norris=#4467A3 (blue), Leclerc=#BD8233 (ochre), Sainz=#AE3030 (red), Piastri=#2ABCCD (cyan), Russell=#954477 (rose). Rank-encoded scatter markers at each data point, with rank-1 markers largest and rank-7 smallest. End-of-line labels on the right side in each driver's Imprint color with path_effects stroke halo. Subtle P1 zone band adds emphasis. Subtle horizontal gridlines at alpha=0.15.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, no pure black.
      Chrome: Title, axis labels, and tick labels all use light INK tokens — clearly readable against dark background. No dark-on-dark failures for structural chrome elements.
      Data: Imprint palette data colors are identical to light render — Verstappen still #009E73, all drivers retain same colors (only chrome flipped). Markers and spline lines clearly visible against dark surface. End-of-line driver labels retain their Imprint palette color with path_effects stroke using PAGE_BG (#1A1A17 in dark theme) — the stroke background matches the canvas, helping separate labels from crossing bump lines but not adding luminance contrast. Some driver colors (notably Norris #4467A3 and Sainz #AE3030) have borderline contrast on #1A1A17 background (~3.4:1 and ~2.9:1), though labels remain legible at source pixel size (~44px).
      Legibility verdict: PASS (marginal) — all labels readable, with slight contrast concern for two driver label colors on dark surface.
