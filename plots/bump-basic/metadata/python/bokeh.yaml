review:
  strengths:
  - Theme-adaptive chrome is fully wired (INK/INK_SOFT tokens on all text and grid
    elements), and both renders pass legibility checks cleanly.
  - CustomJSTickFormatter for ordinal labels (1st/2nd/3rd) is an elegant, distinctively
    bokeh touch.
  - 'Visual hierarchy through the highlight set is well-executed: thicker lines, larger
    markers, and bold labels for the three dynamic constructors draw the eye naturally.'
  - Direct end-of-line entity labeling replaces the legend cleanly — correct choice
    for bump charts.
  - Canvas gate passed; PIL normalization safety net and CDP setDeviceMetricsOverride
    both address the known bokeh/Chrome height-drift bug.
  weaknesses:
  - Right border for 'Red Bull Racing' label is tight (~10 px mathematical clearance
    at bold 28pt). Consider increasing min_border_right from 380 to 420, or reducing
    end-label font size to 26pt to add safety margin.
  - Straight-line segments between data points; modern bump charts typically use smooth
    sigmoid/bezier curves which would improve DE-01 and DE-03.
  - No data storytelling annotations (e.g. 'Ferrari's surge' or a highlight on the
    race where Red Bull took the lead) that would lift DE-03.
