      Data: 5 lines — Alpha Corp (brand green #009E73, thin), Beta Inc (lavender #C475FD, thick hero line at size=3.0), Gamma Tech (blue #4467A3, thin), Delta Systems (ochre #BD8233, thin), Epsilon Labs (matte red #AE3030, thin). Dots mark each rank position. Annotation box "Beta Inc: Rank #1 / (Q2–Q3 peak)" visible at upper-left of plot in lavender on #FAF8F1 fill. Y-axis is correctly inverted (rank 1 at top). Horizontal grid lines subtle.
