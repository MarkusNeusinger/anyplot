review:
  strengths:
  - Correct bump chart implementation with inverted Y-axis and all required features
  - Idiomatic hero/rest aesthetic encoding via mapped alpha and size scales — professional
    pattern for bump chart storytelling
  - End-of-line entity labels instead of legend — eliminates legend look-up cognitive
    load
  - Y-axis-only grid is the right choice for bump charts
  - 'Full theme-adaptive chrome: both light and dark renders correct and readable'
  - Deterministic hardcoded data with built-in narrative arc (rise and fall of Beta
    Inc)
  - layer_tooltips + HTML export leverages letsplot interactive capabilities
  - Clean flat code structure with no unnecessary abstractions
  weaknesses:
  - 'Hero emphasis is subtle at final canvas scale: geom_line size 2.0 (hero) vs 1.2
    (rest) is a 1.67x difference that reads as barely noticeable at 3200x1800. Increase
    hero size to 2.5-3.0 and drop rest to 0.8-1.0 for a more dramatic focal point.'
  - 'DE-03 storytelling is understated: the Beta Inc meteoric rise and collapse narrative
    is in the data but not visually telegraphed. A brief annotation at the Q2-Q3 peak
    or a background highlight band could make the story immediately legible.'
  - End-of-line labels (geom_text size=4) are slightly small; bumping up to size=5
    would improve mobile readability when scaled to 400px.
