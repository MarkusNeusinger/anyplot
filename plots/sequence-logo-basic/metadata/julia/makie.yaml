review:
  strengths:
  - Correct Imprint palette with bioinformatics semantic exception (A=#009E73 green,
    C=blue, G=ochre, T=red) — all four Imprint palette members used with correct semantic
    mapping
  - 'Excellent code quality: KISS structure, explicit font sizes, Random.seed!(42),
    clean imports, saves to plot-$(THEME).png'
  - Perfect theme adaptation — PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens all wired
    to every chrome element; dark render has no dark-on-dark issues
  - Realistic TATA-box motif with scientifically accurate frequency data; position
    7 near-zero IC is correct bioinformatics behavior for a weakly conserved position
  - 'Good Makie usage: PolyElement for custom legend swatches, Rect2f for stacked
    bars, RGBAf for grid opacity — all idiomatic CairoMakie primitives'
  weaknesses:
  - 'Missing scaled glyph rendering: spec explicitly requires letters stretched to
    fill their allocated bar height (like Weblogo/MEME-suite logos). Current code
    uses fixed fontsize=16 for all letter labels regardless of bar height. Fix: scale
    fontsize proportionally to contrib * axis_height_in_points, or use Makie text
    transformation to stretch each letter glyph to fill its allocated rectangle.'
  - Letters only shown when contrib > 0.14 — this means small but non-trivial contributions
    (e.g. 0.05-0.13 bits) show a colored bar with no letter. The threshold should
    be lowered or all bars above ~0.01 should show a scaled glyph (stretched thin
    for small contributions, tall for large ones). This is the defining visual feature
    of sequence logos.
  - 'Design storytelling is minimal: the dominant letter labels guide the eye but
    there is no visual emphasis on the TATA-box consensus pattern (positions 2-6 are
    the conserved core). Consider adding a subtle shaded band or annotation under
    the high-IC positions to highlight the binding site core.'
  - 'DE-01: No title annotation, no vertical baseline reference line, no emphasis
    gradient — the plot reads as a correct stacked bar chart rather than a bioinformatics
    sequence logo. The distinctive stretched-glyph aesthetic is what makes sequence
    logos recognizable.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint surface. Figure and axis backgrounds identical, no white contamination.
      Chrome: Title "TATA-box Motif · sequence-logo-basic · julia · makie · anyplot.ai" in dark ink — readable. Axis labels "Position" (x) and "Information content (bits)" (y) in dark INK, tick labels in INK_SOFT dark gray. Top/right spines removed, only left/bottom visible. Subtle y-axis grid at ~15% opacity.
      Data: 10-position stacked bars. Colors: A=green (#009E73), C=blue (#4467A3), G=ochre (#BD8233), T=red (#AE3030). Dominant nucleotide letter label in white centered on large bars (threshold >0.14 bits). Legend at right with PolyElement swatches.
      Position 7 appears empty (near-zero IC ~0.045 bits — scientifically correct for a weakly conserved position).
      Notable: letters are fixed-size (fontsize=16) text labels, NOT stretched glyphs filling bar height — this deviates from the spec requirement.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface. Figure and axis backgrounds consistent.
      Chrome: Title in light (#F0EFE8) text — clearly readable. Axis labels and tick labels in INK_SOFT (#B8B7B0) — readable. Grid lines flip to light opacity (RGBAf from INK light values). Legend frame visible with ELEVATED_BG (#242420) background and INK_SOFT border. No dark-on-dark failures observed.
      Data: Colors identical to light render — A=#009E73, C=#4467A3, G=#BD8233, T=#AE3030. Letter labels remain white (color=(:white, 0.92)) on both themes — appropriate.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark issues.
