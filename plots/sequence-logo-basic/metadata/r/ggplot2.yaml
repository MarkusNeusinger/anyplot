review:
  strengths:
  - 'Correct semantic color mapping: A=#009E73 (green), C=#4467A3 (blue), G=#BD8233
    (ochre), T=#AE3030 (red) — matches bioinformatics convention while staying within
    Imprint palette'
  - 'Full IC calculation: IC = 2 - H with per-letter height = frequency * IC is mathematically
    correct'
  - 'Theme-adaptive chrome: INK/INK_SOFT/PAGE_BG/ELEVATED_BG correctly applied in
    both light and dark renders'
  - 'Clean TATA-box dataset: 12-position motif with realistic conservation pattern
    (TATAAATA core), biologically plausible'
  - 'Code structure: idiomatic dplyr pipeline (group_by/mutate/cumsum/lag) for stacking
    positions; scale_size_identity trick avoids legend bleed for letter sizes'
  - 'Axis labels correct: ''Position'' (x) and ''Information content (bits)'' (y)
    with units as specified'
  weaknesses:
  - 'Large letter glyphs overflow their bar widths horizontally and overlap adjacent
    positions — especially at conserved positions 2-8 where size reaches ~40mm. Fix:
    switch to a narrow/condensed font family (e.g., fontfamily=''mono'' or similar
    condensed typeface) or reduce letter_size multiplier from 35 to ~20 so letters
    stay within their bar boundaries. Alternatively, clip text to each position''s
    x-range using annotation_custom with a clipping viewport.'
  - letter_size = pmax(2.0, height * 35) produces letters far wider than the 0.9-unit
    bar slot at high IC values, causing significant horizontal overlap at conserved
    positions 2-8. The multiplier 35 maps 1 bit ≈ 35mm text but bar width is ~13mm
    — letters are 2-3x wider than their slot.
  - Positions 11 and 12 show empty or near-invisible bars (IC ≈ 0), leaving blank
    space at the right of the plot — acceptable biologically but slightly imbalanced
    visually. No fix needed if data is faithful.
  - Grid lines use color = INK_SOFT (solid color) rather than the RULE token (rgba
    with 15% opacity) from the style guide — a minor deviation from the reference
    style.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "sequence-logo-basic · r · ggplot2 · anyplot.ai" in dark bold text, clearly readable. Axis labels "Position" (x) and "Information content (bits)" (y) in dark #1A1A17, readable. Tick labels in #4A4A44 (INK_SOFT), readable. Y-axis gridlines are subtle thin lines; x-axis has no grid. Legend box with elevated #FFFDF6 background shows A (green), C (blue), G (ochre), T (red) clearly.
      Data: 12 positions shown as stacked colored bars. Positions 2-8 are highly conserved (TATAAATA motif) with tall stacks. White letter glyphs (A, T, A, T, A, A, T, A) overlaid on dominant bars — these letters are VERY large at conserved positions and overflow horizontally beyond their bar boundaries, creating significant overlap with adjacent positions. The bars themselves are visible in the lower portion. Positions 9-10 show moderate conservation; positions 11-12 are near-empty (low IC).
      Legibility verdict: PASS — all chrome text readable. Data letters readable but significantly overlapping between positions 2-8 (letter glyph overflow).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title in cream/light text (#F0EFE8) clearly readable against dark background. Axis labels and tick labels in #B8B7B0 (INK_SOFT dark), clearly readable. No dark-on-dark failure. Legend box uses elevated dark #242420 background with light text.
      Data: Identical data colors to light render — A=#009E73 (green), C=#4467A3 (blue), G=#BD8233 (ochre), T=#AE3030 (red). White letter glyphs identical to light render. Same horizontal overflow of large letters at conserved positions 2-8.
