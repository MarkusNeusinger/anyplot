review:
  strengths:
  - Semantic DNA color mapping using Imprint palette positions (A=#009E73, C=#4467A3,
    G=#BD8233, T=#AE3030) matches bioinformatics convention perfectly
  - Correct IC formula (IC = 2 - H) applied per position with letter heights proportional
    to frequency × IC
  - Clean dplyr pipeline for stacked bar geometry using cumsum for y_bottom/y_top
    — idiomatic ggplot2
  - TATA-box motif is a canonical, factually accurate example that demonstrates conserved
    vs. variable positions clearly
  - Full theme-adaptive chrome — both renders pass with correct backgrounds, text
    colors, grid, and legend styling
  - White bold letter glyphs overlaid on colored bars create genuine sequence-logo
    appearance with scale_size_identity
  weaknesses:
  - Minor letters stacked at the bottom of high-IC positions (e.g., G/C/C/A labels
    at base of positions 2-7) are very small and cramped — at mobile widths (~400px)
    these bottom-stack labels may become illegible; consider increasing min letter_size
    from 2.0 to 2.5 or filtering out height < 0.06 instead of 0.04
  - 'DE-01 moderate: design is correct and semantically thoughtful but lacks additional
    polish elements (e.g., subtle bar edge separation, position-number emphasis at
    conserved sites, or a note about the motif name in subtitle/caption)'
  - Positions 11 and 12 render as effectively invisible bars (near-zero IC from near-uniform
    frequencies) leaving the right portion of the x-axis visually empty — consider
    trimming to 10 positions or adding a note that flanking positions have low conservation
  - 'LM-02: implementation uses ggplot2 grammar correctly but does not leverage any
    truly distinctive ggplot2 feature — ggseqlogo or coordinate transforms would be
    more distinctive; the current approach is reproducible in plotnine with nearly
    identical code'
