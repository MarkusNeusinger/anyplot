review:
  strengths:
  - 'Excellent data choice: TATA-box transcription factor binding site motif is a
    real, recognizable biological example'
  - Clean code structure with deterministic data and correct information content calculation
    (entropy-based)
  - Good use of letsplot ggplot grammar with appropriate geom layering (rect + text)
  - Correct title format and descriptive axis labels with units
  - Code quality is exemplary with clean KISS structure
  weaknesses:
  - Still uses colored rectangles with white text overlay rather than colored letters
    as primary elements — looks like a stacked bar chart, not a sequence logo
  - White text inside thin rectangles is illegible at minor-frequency positions (especially
    positions 9, 10)
  - No meaningful improvement from attempt 1 feedback on the core visual approach
  image_description: The plot shows a sequence logo approximation using stacked colored
    rectangles at 10 positions along the x-axis ("Position"). Each position displays
    nucleotides A (green), C (blue), G (orange), and T (red) as colored rectangles
    stacked vertically, with total stack height proportional to information content
    in bits. White bold text labels appear inside each rectangle, sized proportionally
    to bar height. The title "sequence-logo-basic · letsplot · pyplots.ai" appears
    at top left in bold. Y-axis is labeled "Information content (bits)" ranging from
    0 to ~1.5. A "Nucleotide" legend with four colored entries sits on the right.
    Positions 2–5 clearly show the TATA motif (T, A, T, A dominant with tall stacks
    ~1.0–1.4 bits). Position 7 shows moderate G conservation, position 8 shows C conservation.
    Positions 1, 9, and 10 have near-zero information content with tiny barely-visible
    bars. The background uses a minimal theme with only horizontal gridlines.
