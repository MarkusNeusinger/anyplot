review:
  strengths:
  - 'Excellent data choice: TATA-box motif is a real, recognizable biological example'
  - Clean code structure with deterministic data and proper information content calculation
  - Good use of letsplot grammar with appropriate geom layering
  - Correct title format and descriptive axis labels with units
  weaknesses:
  - 'Not a true sequence logo: uses colored rectangles with white text instead of
    stretched letter glyphs'
  - White text inside small rectangles is illegible at minor-frequency positions
  - Significant unused vertical space (y-axis extends well beyond max data)
  - Design is functional but not visually distinctive
  image_description: The plot displays a sequence logo approximation using stacked
    colored rectangles at 10 positions along the x-axis. Each position has bars for
    nucleotides A (green), C (blue), G (orange), and T (red), stacked vertically with
    total height proportional to information content in bits. White bold text labels
    appear inside each rectangle, sized proportionally to the bar height. The title
    reads "sequence-logo-basic · letsplot · pyplots.ai" at the top left. X-axis is
    labeled "Position" (1-10), Y-axis is labeled "Information content (bits)" (0-2.2).
    A "Nucleotide" legend appears on the right. Positions 2-5 show the TATA motif
    clearly (T, A, T, A dominant), positions 7-8 show moderate conservation (G and
    C dominant), while positions 1, 9, and 10 have near-zero information content (uniform
    distribution). The background is clean with a minimal theme and only horizontal
    grid lines.
