review:
  strengths:
  - Scientifically accurate ETS transcription factor binding site data with realistic
    information content values
  - Clean, well-structured code with linear flow and deterministic data
  - Good use of pygal-specific features (formatters, tooltips, dual output)
  - Custom DNA color palette with intentional typography choices
  - Effective use of conditional value printing to avoid clutter in small segments
  weaknesses:
  - Not a true sequence logo — letters are text labels inside stacked bars rather
    than scaled glyphs (pygal limitation)
  - Green-red color pairing could be improved for colorblind accessibility
  - Low-conservation positions (8-10) create visual emptiness on the right side
  - No active emphasis on the conserved core region to guide viewer attention
  image_description: 'The plot displays a stacked bar chart with 10 positions along
    the x-axis representing a DNA transcription factor binding site motif (ETS family).
    Each position has stacked colored bars: green (A), blue (C), orange (G), and red/crimson
    (T). The y-axis shows "Information content (bits)" ranging from 0 to 1.5. Positions
    4 and 5 have the tallest stacks (~1.35 bits, dominated by green/A), positions
    2 and 3 are orange/G-dominated (~0.85 and ~1.15 bits), positions 6 and 7 are red/T-dominated
    (~1.15 bits each). Positions 1, 8, 9, and 10 have very short bars indicating low
    conservation. Some bars display nucleotide letters (G, A, T) centered inside larger
    segments. The title "sequence-logo-basic · pygal · pyplots.ai" appears at top.
    A legend at the bottom displays A, C, G, T in a single row with colored squares.
    Bars have slightly rounded corners. Background is white with light gray (#fafafa)
    plot area and subtle horizontal grid lines.'
