  strengths:
  - Correct information content calculation with proper entropy formula
  - Good realistic bioinformatics data with varied conservation levels
  - Clean well-structured code with perfect KISS pattern
  - Appropriate DNA color scheme (A=green, C=blue, G=orange, T=red)
  - Good text sizing with explicit font size settings throughout
  weaknesses:
  - Letters rendered as plain text on colored rectangles rather than scaled/stretched
    glyphs filling their allocated height
  - Small text labels on thin segments at positions 3, 4, 7 are crowded and partially
    overlap
  - Green/red nucleotide colors could be improved for colorblind accessibility
  image_description: 'The plot displays a sequence logo for a 10-position DNA transcription
    factor binding site motif. Each position shows a vertical stack of colored rectangles
    representing the four nucleotides: A (green), C (blue), G (orange), T (red). Stack
    heights are proportional to information content in bits (y-axis, ranging 0 to
    ~1.5). Position 5 is empty (uniform distribution = 0 bits), while position 8 has
    the tallest stack (~1.5 bits, dominated by A). White bold letter labels are overlaid
    on larger rectangles, with smaller labels on medium segments. The title reads
    "sequence-logo-basic · plotnine · pyplots.ai". X-axis shows "Position" (1-10),
    y-axis shows "Information content (bits)". A "Nucleotide" legend on the right
    shows the four color-letter mappings. The layout uses theme_minimal with removed
    x-grid and visible axis lines.'
