  image_description: The plot shows a sequence logo for a 10-position DNA transcription
    factor binding site motif. Each position has stacked colored letters (A=green,
    C=blue, G=orange/yellow, T=pink/mauve) with heights proportional to information
    content in bits. The Y-axis ranges from 0 to ~1.5 bits. Position 8 is highlighted
    with a pale yellow background and an italic "most conserved" annotation, showing
    a large green "A" as the dominant nucleotide. Position 5 is empty (uniform distribution
    = 0 bits). The title reads "sequence-logo-basic · plotnine · pyplots.ai" in bold.
    The background is light gray (#FAFAFA) with subtle horizontal gridlines. Smaller
    letters at the bottom of stacks are very tiny and difficult to read. Letters are
    rendered as text of varying font sizes rather than stretched glyphs.
