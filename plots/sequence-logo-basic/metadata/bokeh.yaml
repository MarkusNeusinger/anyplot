    contribution. Standard DNA colors are used: A=green, C=blue, G=orange/yellow,
    T=red. The title reads "CREB1 Binding Motif · sequence-logo-basic · bokeh · pyplots.ai".
    X-axis labeled "Position" (1-10), Y-axis labeled "Information content (bits)"
    (0-1.2). Highly conserved positions (3: G, 4: A, 5: C, 6: G, 8: C, 9: A) show
    large dominant letters. Low-information positions (1, 10) have small, cramped
    letters near the baseline. A legend on the right side shows colored squares for
    each base. Background is light gray (#FAFAFA), no grid lines, clean layout. Letters
    are rendered as text glyphs of varying font size rather than stretched/scaled
    glyphs filling their allocated rectangular space.'
