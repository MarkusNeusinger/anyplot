review:
  strengths:
  - 'Excellent data choice: real CREB1 transcription factor binding motif with biologically
    accurate frequencies'
  - Clean, well-structured code with proper information content calculation
  - Correct standard DNA color scheme (A=green, C=blue, G=orange, T=red)
  - 'Good visual refinement: removed grid lines, subtle background'
  weaknesses:
  - Letters are white text on colored rectangles instead of colored stretched letter
    glyphs - not a true sequence logo
  - Excessive empty vertical space (y-range goes to 2.15 but data max is ~1.2 bits)
  - No legend explaining color-to-base mapping
  - No Bokeh-specific interactive features (HoverTool would add value)
  - Small letters at low-IC positions are illegible
  image_description: The plot displays a CREB1 transcription factor binding motif
    as a sequence logo across 10 positions. Each position shows stacked colored rectangles
    with white letter labels (A=green, C=blue, G=orange, T=red). The y-axis shows
    "Information content (bits)" ranging from 0 to ~2.15, and the x-axis shows "Position"
    numbered 1-10. Position 1 has very low information content (~0.08 bits), position
    10 is similarly low (~0.03 bits). The conserved core (positions 3-6, 8) shows
    tall stacks reaching ~0.95-1.2 bits. The background is light gray (#FAFAFA) with
    no grid lines. The title reads "CREB1 Binding Motif · sequence-logo-basic · bokeh
    · pyplots.ai". Letters are rendered as white text centered on colored rectangles
    rather than as stretched/scaled colored glyphs, which deviates from the standard
    sequence logo appearance.
