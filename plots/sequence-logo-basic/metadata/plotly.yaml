review:
  strengths:
  - Clean, well-structured code with deterministic data and proper KISS layout
  - Realistic bioinformatics data with good variation in conservation levels
  - Correct information content calculation with proper entropy formula
  - Good use of Plotly interactivity (hover tooltips showing frequency and height)
  - Properly formatted title and legend following spec conventions
  weaknesses:
  - Uses stacked bars with text overlays instead of actual scaled letter glyphs
  - Small bar segments have cramped, overlapping letter annotations
  - Y-axis range extends to 2.1 but max data is ~1.2, wasting upper canvas space
  - Color palette follows spec convention but green-red pairing is not colorblind-optimal
  image_description: 'The plot displays a stacked bar chart approximating a DNA sequence
    logo for a 10-position transcription factor binding site. Each position has colored
    bars representing nucleotides: A (green), C (blue), G (orange), T (red). White
    bold letter annotations are overlaid on each bar segment. The y-axis shows "Information
    content (bits)" ranging 0-2, and the x-axis shows "Position" 1-10. Position 4
    is empty (zero information content due to equal frequencies). Highly conserved
    positions (1, 3, 7) have tall stacks (~1.0-1.2 bits), while others are shorter.
    A horizontal legend for A, C, G, T sits above the plot. The title reads "sequence-logo-basic
    · plotly · pyplots.ai". The background is white with very subtle horizontal gridlines.'
