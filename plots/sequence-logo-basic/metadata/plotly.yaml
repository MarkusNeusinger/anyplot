  image_description: 'The plot displays a 10-position DNA transcription factor binding
    site motif as a stacked bar chart approximation of a sequence logo. At each position,
    colored bars represent four nucleotides stacked vertically, with total stack height
    proportional to information content in bits. The colors are: A = teal/green (#009E73),
    C = blue (#0072B2), G = amber/orange (#E69F00), T = pink/mauve (#CC79A7). Bold
    white letter labels are overlaid on bars that are tall enough to be legible. Positions
    3 and 7 have the highest conservation (~1.15 bits), while position 4 is nearly
    flat (uniform distribution, ~0 bits). A subtle gray "most conserved" annotation
    with a downward triangle marks position 3. The title reads "sequence-logo-basic
    · plotly · pyplots.ai" centered at the top, with a horizontal legend showing all
    four nucleotides. The background is white with a subtle dotted y-axis grid. X-axis
    labeled "Position" (1-10), y-axis labeled "Information content (bits)" (0-1.2).'
