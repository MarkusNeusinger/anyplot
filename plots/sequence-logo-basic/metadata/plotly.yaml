review:
  strengths:
  - True SVG path letter glyphs that stretch to fill their allocated height — authentic
    sequence logo rendering
  - Excellent colorblind-safe Wong palette (green, blue, orange, burnt-orange)
  - Conservation annotations at positions 3 and 7 create clear focal points
  - Interactive hover templates showing position, nucleotide, frequency, and IC height
  - Correct information content calculation with well-varied PWM data
  weaknesses:
  - Helper function svg_path_to_plotly() breaks KISS structure (though justified by
    complexity)
  - Conservation annotation font size (13pt) could be larger for better readability
  - No position reaches maximum 2-bit conservation, slightly limiting range demonstration
  image_description: 'The plot displays a 10-position DNA transcription factor binding
    site as a true sequence logo with SVG-rendered letter glyphs. Each position shows
    stacked nucleotide letters (A, C, G, T) with height proportional to information
    content in bits. The letters are rendered as stretched SVG path shapes — not text
    overlays — creating an authentic sequence logo appearance. Colors follow the standard
    DNA scheme: A = teal-green (#009E73), C = blue (#0072B2), G = amber-orange (#E69F00),
    T = burnt-orange/red (#D55E00), all from the colorblind-safe Wong palette. Position
    3 shows a tall blue C (~1.7 bits) and position 7 shows a tall red-orange T (~1.8
    bits), both annotated with downward triangle and bit values. Position 4 is empty
    (uniform distribution = 0 bits). The title "sequence-logo-basic · plotly · pyplots.ai"
    is centered at top. A horizontal legend (A, C, G, T) sits below the title. X-axis
    labeled "Position" (1-10), Y-axis labeled "Information content (bits)" (0-2.0).
    Background is white with subtle dotted y-grid lines. Only bottom and left axes
    are drawn.'
