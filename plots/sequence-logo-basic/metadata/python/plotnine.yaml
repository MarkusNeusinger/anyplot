review:
  strengths:
  - 'Correct semantic exception: DNA standard colors (A=green, C=blue, G=ochre, T=red)
    mapped to Imprint palette positions 1/3/4/5, with clear justification in code
    comment'
  - 'Perfect theme-adaptive chrome in both renders — backgrounds, text, grid, and
    legend all correctly flip between #FAF8F1 and #1A1A17'
  - Clever variable font-size scaling for letter labels using scale_size_identity
    — letters grow with segment height, smaller segments filtered with height > 0.12
    threshold
  - 'Clean deterministic data: realistic 10-position TF binding site motif with good
    IC range (0 bits at position 5 to ~1.3 bits at positions 3 and 8)'
  - 'Perfect code quality: sequential KISS structure, explicit theme tokens, clean
    imports, saves as plot-{THEME}.png'
  weaknesses:
  - Adjacent large letters at positions 7-8 (T and A) have glyph extents that appear
    to touch or slightly overlap at the bar boundary — the variable geom_text font
    sizes are large enough to bleed past the 0.12-unit gap between bars. Consider
    capping max fontsize at a value where the text stays within bar width, or reduce
    bar_half_width to 0.40 to add more inter-bar breathing room.
  - Letter glyphs are not truly stretched to fill their allocated rectangle height
    (the spec requests 'scaled glyphs stretched to fill their allocated height').
    The current approach scales font size proportionally to height but preserves the
    glyph's natural aspect ratio. Consider using matplotlib patches or PathPatch via
    fig.canvas to render stretched letter glyphs, or accept the current approximation
    and document it.
  - 'Design excellence is moderate: DE-01 is at generic-default level (no typographic
    hierarchy beyond the data, no annotation highlights on conserved positions), DE-02
    is good but could add panel border removal for a cleaner look. No visual storytelling
    additions (e.g., a shaded band or annotation calling out the most conserved positions).'
  - LM-02 (Distinctive Features) is low — the geom_rect + geom_text approach is transferable
    to any grammar-of-graphics library. Consider using plotnine's faceting, coord_flip,
    or other idiomatic plotnine mechanics to add library-distinctive character.
  image_description: |-
