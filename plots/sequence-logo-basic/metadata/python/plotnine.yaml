      Data: Stacked colored bars across 10 positions. A=#009E73 (brand green), C=#4467A3 (blue), G=#BD8233 (ochre), T=#AE3030 (matte red). White near-white letter labels inside bars, scaled proportionally to segment height. Position 5 (uniform distribution) shows correctly as zero height. Subtle horizontal grid lines at y=0.5 and y=1.0 with alpha~0.15.
      Legend: "Nucleotide" box on right with INK_SOFT border and ELEVATED_BG fill, showing A/C/G/T — all readable.
      Legibility verdict: PASS — all text readable, no light-on-light issues, no overflow.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color, no pure black.
      Chrome: Title in light text (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in light INK_SOFT (#B8B7B0) — all readable. No dark-on-dark text issues detected.
      Data: Colors are identical to light render — A=#009E73, C=#4467A3, G=#BD8233, T=#AE3030. Data colors correctly unchanged between themes. White letter labels remain readable on colored bars in dark theme.
      Legend: Nucleotide legend box with #242420 fill and INK_SOFT border — correctly adapted to dark theme.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures, correct theme inversion.
