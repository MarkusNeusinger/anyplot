review:
  strengths:
  - Biologically accurate TATA-box motif with correct IC calculations and meaningful
    conservation pattern
  - Semantic DNA color convention correctly mapped to Imprint palette members (A=#009E73,
    C=#4467A3, G=#BD8233, T=#AE3030)
  - TATA core amber cap adds genuine data storytelling — visually highlights the conserved
    binding site positions 2–7
  - All font sizes explicitly set with theme-adaptive chrome; both light and dark
    renders fully readable
  - Clean deterministic data, no random seeding needed; KISS structure maintained
    throughout
  - Interactive HTML export uses pygal distinctive feature with per-value formatters
    for conditional letter display
  weaknesses:
  - Letters not rendered as scaled glyphs filling bar height — spec explicitly requires
    scaled glyphs, not plain text labels. Per-value formatter shows uniform-size letters
    regardless of bar segment height.
  - Stack ordering is a global IC-weighted approximation, not per-position frequency
    ordering as the spec requires. True sequence logos reorder nucleotides at each
    position by local frequency.
  - 'DE-01/DE-02: Visual design is well-configured but still looks like a library
    default — rounded bars and opacity tuning add some polish but the overall look
    remains a styled stacked bar chart rather than an iconic sequence logo aesthetic.'
