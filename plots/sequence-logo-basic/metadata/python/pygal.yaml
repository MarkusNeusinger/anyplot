review:
  strengths:
  - Correct information-content calculation (Shannon entropy formula) producing biologically
    accurate IC values for the TATA-box motif
  - 'Well-documented semantic exception: DNA color convention (A=green, C=blue, G=ochre/orange,
    T=red) mapped precisely to Imprint palette members with inline code comment'
  - Clean threshold logic (height >= 0.08) suppressing labels on insignificant bar
    segments — avoids clutter at low-IC positions
  - All Imprint palette semantic anchors and chrome tokens correctly applied; both
    light and dark theme chrome elements adapt properly
  - Elegant lambda formatter pattern for per-data-point conditional letter display
    in tooltips
  weaknesses:
  - 'Value labels (T, A, G) printed inside bars use dark/black monospace text in both
    light and dark themes — in the dark render, these should use a lighter color (e.g.,
    #F0EFE8) for better aesthetic consistency; the print_values color should be derived
    from INK token per-theme'
  - Stacking order is fixed by global average frequency (ascending) rather than per-position
    frequency — spec requires 'most frequent on top' which implies per-position reordering;
    at position 2 (T dominant), A (top slot with lowest global avg) sits above T in
    the stack rather than T being at the visible apex
  - No visual emphasis differentiating the conserved TATA core (positions 2-7) beyond
    asterisks and height — a contrasting background stripe, annotation, or distinct
    top-cap color on conserved bars would improve storytelling
  - Letter labels are plain text via print_values, not scaled glyphs filling their
    allocated segment height; using a bolder monospace font or larger value_font_size
    scaled to segment height would bring this closer to the sequence logo ideal
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "sequence-logo-basic · python · pygal · anyplot.ai" in dark text, clearly visible. Y-axis label "Information content (bits)" and x-axis label "Position (* = conserved, IC > 0.5 bits)" readable. Tick labels (0, 0.3, 0.7, 1.0, 1.4) and position numbers (1-10) all clearly readable in dark text.
      Data: 4 nucleotide colors — A=#009E73 (brand green), C=#4467A3 (blue), G=#BD8233 (ochre), T=#AE3030 (matte red). Bars stacked correctly; conserved positions (2-8) are taller, non-conserved (1, 9, 10) near-zero. Value labels T, A, G displayed in dark monospace text inside dominant bar segments.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title, axis labels, tick labels, and legend text all render in light/cream color — clearly readable against dark background. No dark-on-dark failures for chrome elements.
      Data: Bar colors identical to light render (A=green, C=blue, G=ochre, T=red) — confirmed Imprint palette semantic exception maintained across themes. Value labels (T, A, G) inside bars appear in dark/black monospace text — suboptimal for dark theme aesthetic but readable since bars provide color contrast. Grid lines subtle and visible.
      Legibility verdict: PASS (minor caveat: in-bar value labels use dark text in dark theme, readable on colored bars but not theme-adaptive)
