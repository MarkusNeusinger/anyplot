      Data: Stacked bars for 10 positions. Conserved TATA-box core at positions 2–7 shows tall bars (~1.1–1.15 bits IC). Non-conserved positions 1, 9, 10 show near-zero bars. Nucleotide colors: A=brand green (#009E73), C=blue (#4467A3), G=ochre (#BD8233), T=matte red (#AE3030). Amber (#DDCC77) TATA core caps sit above conserved bars. Letter labels (A, T, G) visible inside large bar segments. Legend at bottom: C, G, T, A, ▲ TATA core.
      Legibility verdict: PASS — all text elements clearly readable against warm off-white background.

