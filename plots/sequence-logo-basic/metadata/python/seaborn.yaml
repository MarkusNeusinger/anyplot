review:
  strengths:
  - Technically sophisticated sequence logo implementation using TextPath/PathPatch
    for properly scaled letter glyphs
  - Two-panel layout (sequence logo + frequency heatmap) provides both the visual
    consensus and the underlying numerical data
  - Semantic DNA color mapping using Imprint palette members (A=#009E73, C=#4467A3,
    G=#BD8233, T=#AE3030) — biologically standard and palette-compliant
  - Conservation annotation with highlight span and arrow callout effectively communicates
    the key biological insight
  - Both renders fully pass theme-readability — proper chrome token use including
    the C-label contrast fix for dark mode
  - 'Perfect spec compliance: IC calculation, letter ordering, axis labels, glyph
    rendering all match specification exactly'
  - Canvas correctly 3200x1800 px without bbox_inches=tight — no canvas drift
  weaknesses:
  - Heatmap cell annotation numbers (annot_kws size=5) are too small at thumbnail/mobile
    display sizes (~7px at 800px width) — increase to size=7 or 8 for readability
    at reduced scales
  - At near-zero IC positions (e.g. positions 1, 6, 8), multiple letters crowd the
    base of the stack with heights just above the 0.01 threshold — these micro-glyphs
    are visually noisy; consider raising the minimum render threshold to ~0.03-0.05
    to hide near-zero letters cleanly
  - The seaborn-distinctive panel (heatmap) is secondary to the matplotlib-rendered
    sequence logo — LM score is limited by this architecture, which is unavoidable
    but worth noting
