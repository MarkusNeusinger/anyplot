      Data: Sequence logo (top panel) shows stacked letter glyphs at 10 positions. A=green (#009E73), C=blue (#4467A3), G=ochre (#BD8233), T=red (#AE3030). First series (A) is brand green ✓. Position 3 (G, ~1.4 bits) is the tallest, positions 2 (T), 4 (A), 5 (C), 9 (T), 10 (C) show moderate conservation. Position 8 shows near-uniform distribution (short stack). Subtle gray background highlight at position 3. Heatmap panel (bottom) shows frequencies via imprint_seq colormap (green→blue). Only ~15% of canvas height, compact but readable.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures observed.

