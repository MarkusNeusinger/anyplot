review:
  strengths:
  - Correct sequence logo implementation with scaled glyph rendering using TextPath/PathPatch
    — letters are properly stretched to fill their allocated height at each position
  - Semantic Imprint palette colors for DNA bases (A=#009E73 green, C=#4467A3 blue,
    G=#BD8233 ochre, T=#AE3030 red) matching both the spec requirement and Imprint
    brand rules
  - Accurate information content calculation (IC = 2 + Σ f·log₂(f)) with correct handling
    of zero frequencies
  - Creative dual-panel layout pairing the sequence logo with a seaborn heatmap panel
    showing raw frequencies — adds quantitative context beyond the logo's symbolic
    representation
  - 'Effective data storytelling: annotated arrow + background highlight at position
    3 (most conserved, 1.4 bits) guides the viewer''s eye to the key insight'
  - Perfect spec and data quality — 10-position DNA motif with realistic variation
    from near-uniform (position 8) to highly conserved (positions 2, 3, 4, 10) clearly
    demonstrates all conservation levels
  - imprint_seq colormap correctly applied to the frequency heatmap (single-polarity
    data, green→blue)
  - Correct canvas (3200×1800) and no bbox_inches='tight' — matches seaborn canvas
    rules exactly
  weaknesses:
  - 'Dark theme contrast: Imprint blue #4467A3 (used as C heatmap y-tick label color)
    has ~3:1 contrast ratio against the #1A1A17 dark background — below WCAG AA (4.5:1)
    for small 8pt text. Fix: in dark render, lighten the C label to a more luminous
    blue or override heatmap base labels with INK_SOFT (#B8B7B0) and rely on bold
    weight + the logo coloring for semantics.'
  - 'DE-01/DE-02: The heatmap panel is visually basic relative to the sophisticated
    sequence logo — default seaborn heatmap styling with minimal refinement. Fix:
    add `annot=True, fmt=''.2f''` to show frequency values in cells, remove all heatmap
    spines (`sns.despine(ax=ax_heat, top=True, right=True, left=True, bottom=True)`
    after removing colorbar border), or use a horizontal colorbar below the heatmap
    to free y-axis space.'
  - 'LM-01: The primary sequence logo visualization relies entirely on matplotlib
    primitives (TextPath, PathPatch, Affine2D transforms); seaborn contributes only
    the supplementary heatmap panel and theme configuration. No native seaborn plot
    type is used for the main chart — this is expected for sequence logos but limits
    seaborn mastery score.'
