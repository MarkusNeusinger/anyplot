review:
  strengths:
  - Excellent Altair layer composition with semantically meaningful layers (core_bg
    → bars → letters → ic_ticks → annotation), each serving a distinct visual role
  - 'Theme-adaptive implementation is exemplary: PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED all correctly applied to every chrome element; both renders are visually
    clean and readable'
  - 'Data storytelling is clear: opacity contrast (0.95 vs 0.45), core region shading,
    and annotation collectively direct the viewer to the biologically significant
    CCGGAAGT motif'
  - transform_calculate for letter sizing and coloring is distinctively Altair — avoids
    Python pandas preprocessing by pushing computation into the Vega-Lite spec
  - Canvas handling (PAD-only to exact 3200x1800 with raise on overshoot) follows
    the canonical pattern exactly
  weaknesses:
  - 'Non-Imprint palette hex codes used for nucleotides: #2ca02c (A), #1f77b4 (C),
    #F5A623 (G), #d62728 (T). The semantic exception for DNA color convention is correctly
    identified, but hex values must come from the Imprint palette members: #009E73
    (A=green), #4467A3 (C=blue), #BD8233 (G=ochre/orange), #AE3030 (T=matte red).'
  - Letter glyphs are sized proportionally via font-size but do not physically stretch
    to fill their allocated IC height as canonical sequence logo renderers do. This
    is a known Altair text limitation; letters are centered at proportional size rather
    than occupying the full vertical extent of the bar.
