    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title in light text (#F0EFE8), clearly readable. Axis labels in INK (#F0EFE8), tick labels in INK_SOFT (#B8B7B0) — all light-colored against dark background, no dark-on-dark failures. Legend box has elevated dark background (#242420) with light text. Subtle grid lines visible.
      Data: Identical nucleotide colors to light render — brand green (A), blue (C), ochre (G), matte red (T). Color identity preserved across themes. White letter labels inside blocks remain readable. Same conservation pattern visible.
