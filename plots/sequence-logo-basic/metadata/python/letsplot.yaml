review:
  strengths:
  - 'Semantically correct Imprint palette for nucleotides (A=green #009E73, C=blue
    #4467A3, G=ochre #BD8233, T=red #AE3030) — proper use of the semantic exception
    rule with biologically recognized color conventions'
  - Proportional letter label sizing (height / max_info * 9) cleanly communicates
    letter dominance within blocks; height threshold guard (>0.08) prevents rendering
    unreadably small labels
  - Correct information content calculation (IC = 2 - entropy) with biologically accurate
    TATA-box motif as dataset
  - Fully theme-adaptive chrome in both renders with no dark-on-dark or light-on-light
    failures
  - 'Excellent code quality: clean flat structure, KISS pattern, deterministic data,
    all imports used'
  - 'letsplot-specific features: layer_tooltips() with formatted content for interactive
    exploration, HTML export, scale_size_identity() with mapped size aesthetic'
  weaknesses:
  - Letters rendered as proportionally-sized centered plain text, not as stretched
    glyphs that fill their allocated height — the spec requires 'scaled glyphs (stretched
    to fill their allocated height), not plain text'; current approach is the best
    letsplot approximation but loses the iconic stacked-letter sequence logo appearance
  - No visual emphasis on conserved positions — adding a subtle annotation at peak
    conservation positions (e.g., positions 3 and 5 with >1.1 bits) would improve
    storytelling without clutter
  - Positions 1, 9, 10 are completely empty due to low information content; a faint
    shading or indicator could better communicate 'measured but no conservation' vs.
    missing data
