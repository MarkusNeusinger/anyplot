      Chrome: Title "sequence-logo-basic · python · letsplot · anyplot.ai" in bold dark ink, clearly readable. Axis labels "Position" (x) and "Information content (bits)" (y) in dark INK color, size 12, well-balanced. Tick labels in INK_SOFT (#4A4A44), size 10, readable. Legend "Nucleotide" header bold, A/C/G/T labels in INK_SOFT. Subtle horizontal-only grid lines at RULE opacity.
      Data: Stacked colored blocks — A in brand green (#009E73), C in blue (#4467A3), G in ochre (#BD8233), T in matte red (#AE3030). Block heights correctly reflect information content. White bold letter labels inside blocks, proportionally sized. Positions 1, 9, 10 empty (correct — low/zero info content).
