review:
  strengths:
  - Fully theme-adaptive chrome; both renders pass legibility check without any dark-on-dark
    or light-on-light failure
  - Semantic Imprint palette mapping (A=green, C=blue, G=ochre, T=red) correct per
    both DNA convention and Imprint spec
  - Box highlights for conserved positions and 1-bit reference line add meaningful
    interpretive context
  - Rich HoverTool with per-segment data (position, base, frequency, IC contribution)
    makes HTML artifact genuinely useful
  - Deterministic CREB1 data is scientifically accurate and professionally contextualized
  - Dynamic letter font sizing with MIN_TEXT_HEIGHT gating correctly prevents unreadable
    micro-labels
  weaknesses:
  - Letter glyphs use proportionally-sized text overlaid on colored rectangles rather
    than truly vertically-stretched letter shapes (spec requires stretched glyphs
    to fill allocated height) — colored rect + text approach is the practical Bokeh
    solution but does not achieve the distorted-glyph aesthetic of canonical sequence
    logos
  - PT_SCALE / WIDTH_BASED_PT pixel arithmetic block is verbose and could be condensed
    without loss of function
