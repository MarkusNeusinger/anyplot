review:
  strengths:
  - Excellent use of matplotlib's path/transform system (TextPath + PathPatch + Affine2D)
    to render correctly scaled letter glyphs -- the right technique for sequence logos
  - 'Semantic color exception correctly applied: all four DNA letters mapped to Imprint
    palette members matching the spec''s mandated standard color scheme (A->#009E73,
    C->#4467A3, G->#BD8233, T->#AE3030)'
  - Conserved core highlight with amber rectangle and annotation creates genuine data
    storytelling and guides the viewer to the key GAGT motif
  - 'Perfect spec compliance: glyph stacking order (most frequent on top), information
    content scaling, axis labels all match spec requirements exactly'
  - 'Full theme-adaptive chrome: both renders pass legibility checks with no dark-on-dark
    failures; legend and annotation text correctly use INK/INK_SOFT/INK_MUTED tokens'
  weaknesses:
  - Dense tiny-glyph stacks at near-uniform low-IC positions (1, 7, 8, 10) create
    minor visual clutter near y=0; raise minimum height threshold from 0.01 to 0.03
    bits to suppress visually uninformative micro-glyphs
  - Subplot padding is tight after tight_layout; add fig.subplots_adjust(left=0.10,
    right=0.97, top=0.93, bottom=0.12) before tight_layout for more generous margins
    and cleaner chrome
