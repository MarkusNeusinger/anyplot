review:
  strengths:
  - Custom SVG glyph paths (fig.add_shape type=path) render biologically authentic
    letter shapes scaled to information content — a non-trivial plotly technique
  - Correct IC formula (IC = 2 + sum(f * log2(f))) with edge-case handling (f>0 guard,
    max(0,...)); near-perfect conservation at position 7 (~1.97 bits) and position
    4 at 0 bits demonstrate full dynamic range
  - Imprint palette applied semantically to DNA nucleotides (A=#009E73 green, C=#4467A3
    blue, G=#BD8233 ochre, T=#AE3030 red) matching established biological color conventions
  - Invisible go.Bar traces with nucleotide-specific hovertemplate enable rich interactive
    tooltips over custom glyph shapes — distinctive plotly technique
  - 'Theme-adaptive chrome correctly implemented: backgrounds #FAF8F1/#1A1A17, all
    text colors from INK/INK_SOFT tokens, data colors identical across both renders'
  - Annotations call out the two most conserved positions (1.70 bits at pos 3, 1.97
    bits at pos 7) creating clear visual storytelling hierarchy
  weaknesses:
  - '''no signal'' annotation at pos 4 is placed at y=-0.08 (outside the [0, 2.15]
    axis range) and is clipped by the plot-area boundary — not visible in either render;
    reposition using paper/axis reference or move to y=0.05 with yanchor=''bottom''
    to keep it inside the axis range'
  - At position 7 the near-perfect T conservation (~0.997 frequency) produces an extremely
    narrow tall glyph at the canvas scale; while technically correct, the T shape
    is hard to read at that aspect ratio — consider enforcing a minimum bar half-width
    for positions where a single letter dominates (>0.95 frequency)
  - Small letter glyphs at low-IC positions (e.g. pos 2, 8, 9, 10) are visibly small;
    minor aesthetic weakness inherent to sequence logos but could be mitigated by
    skipping glyphs below a threshold height (e.g. h < 0.02 bits)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "sequence-logo-basic · python · plotly · anyplot.ai" fully readable at ~70% canvas width in dark ink. X-axis label "Position" and Y-axis label "Information content (bits)" clearly visible. Tick labels (1–10 on x, 0–2.0 on y) legible. Annotations "▼ 1.97 bits" (pos 7) and "▼ 1.70 bits" (pos 3) are clearly readable. Legend (A/C/G/T colored squares) sits above the plot area, readable.
      Data: Letter glyphs rendered as custom SVG shapes. A=#009E73 green, C=#4467A3 blue, G=#BD8233 ochre, T=#AE3030 red. Position 3 (C dominant, ~1.70 bits) shows a tall blue C glyph; position 7 (T ~1.97 bits) shows a tall red T glyph that nearly fills the 2-bit scale. Positions with low IC have small stacked letter glyphs. Position 4 (0 bits, uniform) is empty — correct.
      Legibility verdict: PASS — all text and data elements readable; "no signal" annotation at pos 4 is invisible (clipped below y=0 axis boundary, minor weakness).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title, axis labels, and tick labels all render in light-colored text (INK_SOFT #B8B7B0 / INK #F0EFE8) and are clearly readable against the dark background. No dark-on-dark failures detected. Grid lines are subtle white-toned horizontals. Legend text is legible.
      Data: DNA letter glyph colors are IDENTICAL to the light render — A=#009E73, C=#4467A3, G=#BD8233, T=#AE3030. No color drift between themes. The same conservation pattern is visible: large C at pos 3, tall T at pos 7.
      Legibility verdict: PASS — all text readable; brand green #009E73 remains visible and identifiable on dark background.
