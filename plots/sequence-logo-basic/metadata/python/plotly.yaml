      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "sequence-logo-basic · python · plotly · anyplot.ai" dark and centered; horizontal legend (A/C/G/T colored squares) sits just below title; axis label "Position" on x, "Information content (bits)" on y — all dark text clearly readable. Conservation annotations "▼ 1.70 bits" and "▼ 1.97 bits" visible above positions 3 and 7. Subtle "no signal" label visible below position 4 in the bottom margin.
      Data: Stacked letter glyphs at 10 positions. Position 3 shows a large blue C (~1.70 bits, dominant). Position 7 shows an extremely tall red rectangle representing near-perfectly conserved T (~1.97 bits). Position 5 shows a green inverted-chevron shape (upside-down A glyph). Position 6 shows ochre G. Colors: A=green (#009E73), C=blue (#4467A3), G=ochre (#BD8233), T=red (#AE3030). First series (A) is brand green ✓.
      Legibility verdict: PASS — all title/axis/tick/legend/annotation text is clearly readable. Y-axis grid lines are subtle. Minor issue: A and T glyphs appear upside-down (see weaknesses).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title, axis labels, tick labels, and annotations all appear in light cream/off-white text — fully readable against the dark background. No dark-on-dark text failures observed. Grid lines subtle (white with 15% opacity).
      Data: Identical colors to light render — A=green, C=blue, G=ochre, T=red. Conservation pattern identical; glyph shapes identical. The tall red T bar at position 7 and upside-down green A at position 5 are the same in both renders.
      Legibility verdict: PASS — all text is readable against the dark surface. Brand green #009E73 remains visible. No dark-on-dark failures.
