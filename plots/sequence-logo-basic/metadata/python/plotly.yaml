review:
  strengths:
  - Custom SVG glyph paths built from scratch and transformed into Plotly data coordinates
    — genuinely sophisticated non-trivial visualization technique
  - Correct information content formula (IC = 2 + Σ f·log₂f) with letter heights =
    IC × frequency, matching the sequence logo spec exactly
  - DNA colors map perfectly to the Imprint palette (A=#009E73 brand green, C=#4467A3
    blue, G=#BD8233 ochre, T=#AE3030 matte red) — both biologically conventional and
    palette-compliant
  - Conservation annotations (▼ 1.70 bits, ▼ 1.97 bits) and 'no signal' marking create
    strong data storytelling with immediate biological insight
  - Invisible transparent bar traces carry genuine hover tooltips over SVG shapes
    — creative idiomatic Plotly technique
  - 'Perfect theme adaptation: all chrome tokens (INK, INK_SOFT, GRID, PAGE_BG, ELEVATED_BG)
    applied consistently; both renders are fully readable'
  - 'Excellent data design: 10-position motif showcases near-perfect conservation
    (1.97 bits), moderate conservation, and zero-information positions for full feature
    coverage'
  weaknesses:
  - 'A and T glyphs are upside-down: the A glyph places its apex (M 0.5 0) at the
    BOTTOM of the allocated height and legs at the TOP, so it renders as an inverted
    chevron (∧) instead of an A. The T crossbar (y=0 to y=0.24 full-width) sits at
    the BOTTOM instead of the top, making the letter appear inverted. Fix: flip the
    glyph path y-coordinates so y=0 maps to the TOP and y=1 maps to the BOTTOM — i.e.,
    change every `y` coordinate in glyph paths to `1 - y` before transformation into
    data coords, OR redefine the glyph paths with the apex/crossbar at y=1 (top of
    the unit square).'
  - Position 7 (T at 1.97 bits near-perfect conservation) renders as a thin red rectangle
    rather than a recognizable T shape — at maximum stretch the T stem dominates and
    the crossbar is too narrow and too low to read as a letter. With the correct upright
    T orientation the crossbar would be at the top and would remain visually distinctive
    even when the glyph is tall.
