  strengths:
  - 'Major improvement: properly uses highcharts-core Python API (Chart, ColumnSeries,
    CallbackFunction) instead of raw JSON'
  - CSS scaleY glyph rendering creates visually stretched letters approximating a
    real sequence logo
  - Excellent data choice with real ETS-family GGAATT motif and informative subtitle
  - Clean deterministic code with all imports used
  - 'Refined visual details: subtle dashed grid, removed tick marks, text shadows
    on letters'
  weaknesses:
  - Letters are white on colored bars rather than colored letter glyphs (standard
    sequence logo has colored glyphs on white background)
  - Low-IC positions (1, 8, 10) have cramped small letter labels that add visual noise
  - Design could be more polished with colored glyphs and position emphasis
  image_description: 'The plot displays a stacked column sequence logo for a 10-position
    ETS-family transcription factor binding site. Positions 1-10 are on the x-axis,
    information content (bits) 0-2.0 on the y-axis. Each position has stacked colored
    bars: A=green (#2ca02c), C=blue (#1f77b4), G=orange (#ff7f0e), T=red (#d62728),
    with white CSS-scaled letter glyphs overlaid on each segment. Positions 2-3 show
    dominant G (tall orange bars), positions 4-5 show dominant A (tall green bars),
    positions 6-7 show dominant T (tall red bars with smaller blue/green/orange segments
    on top). Position 1 has nearly zero information content (tiny barely-visible bars).
    Position 9 has zero IC (empty — uniform distribution). Positions 8 and 10 have
    low IC with small stacked bars showing C dominance. The title reads "sequence-logo-basic
    · highcharts · pyplots.ai" with subtitle "ETS-family transcription factor binding
    site — conserved GGAATT core motif". Background is light gray (#fafafa), subtle
    dashed grid lines on y-axis.'
