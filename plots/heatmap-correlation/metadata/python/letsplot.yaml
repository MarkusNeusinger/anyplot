review:
  strengths:
  - Well-structured correlation matrix with clear data representation
  - Correct use of diverging colormap (blue-white-red) centered at zero with fixed
    -1 to 1 limits
  - 'All required features implemented: symmetric matrix, variable names on both axes,
    cell annotations with 2 decimal places'
  - Proper title format (spec-id · library · anyplot.ai)
  - Clean ggplot2-style code using letsplot API
  - Reproducible data generation with np.random.seed(42)
  - Realistic financial metrics dataset showing meaningful correlation patterns
  weaknesses:
  - Text color in geom_text() hardcoded as black — fails theme adaptation; should
    use conditional color based on ANYPLOT_THEME environment variable (black for light,
    white/light for dark)
  - Implementation does not read ANYPLOT_THEME; code should set plot-{THEME}.png output
    filename based on environment variable
  - Color coding uses custom blue-white-red palette instead of recommended BrBG diverging
    colormap from ColorBrewer
  - 'Theme customization missing: no use of theme-adaptive chrome tokens (PAGE_BG,
    INK, INK_SOFT); axis title and text colors not explicitly set'
  - Minimal design polish and visual hierarchy; uses library defaults with no distinctive
    aesthetic refinement
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1, correct for light theme
      Chrome: Title "heatmap-correlation · letsplot · anyplot.ai" in dark text (readable); Y-axis labeled "Financial Metric" and X-axis labeled "Financial Metric"; all tick labels on both axes clearly visible in dark color
      Data: 8×8 symmetric correlation matrix with diverging blue-white-red colormap; values range from -1 (dark blue, Debt Ratio negative correlations) to 1.0 (dark red, perfect correlations on diagonal); all cell annotations display 2-decimal correlation values in black text; annotations are clear and readable on all colored backgrounds
      Legibility verdict: PASS - All text elements including title, axis labels, ticks, and cell annotations are clearly readable against the light background

    Dark render (plot-dark.png):
      Background: Warm near-black approximately #1A1A17, correct for dark theme
      Chrome: Title is visible in light color; axis labels and tick labels appear light-colored and readable against dark background; legend present and readable
      Data: Same 8×8 correlation matrix structure maintained; data colors (blue-white-red) appear identical to light render (only chrome changed); however, cell annotation text shows critical theme-adaptation failure — text is hardcoded black, causing poor contrast on light-colored cells (near-zero correlations); for example, "0.08", "-0.04", and other values on white and pale pink cells are barely visible; text on dark red cells is readable due to color contrast, but light cells fail legibility
      Data color consistency: PASS - The Okabe-Ito data colormap is identical between light and dark renders; only chrome changed appropriately
      Legibility verdict: FAIL - Cell annotations fail readability on light-colored cells due to dark text on light background; text should be theme-adaptive (white/light in dark mode)
