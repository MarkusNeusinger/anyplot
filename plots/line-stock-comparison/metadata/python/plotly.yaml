review:
  strengths:
  - Rebasing normalization correctly applied; all 4 series start at exactly 100
  - End-point percentage annotations (+73%, +27%, +19%, -12%) provide an immediate
    performance summary without requiring the reader to interpret the y-axis
  - Range selector (1M/3M/6M/1Y) and range slider are idiomatic financial chart features
    that make excellent use of Plotly's interactivity
  - Unified hover mode (hovermode=x unified) enables side-by-side comparison of all
    stocks at any date
  - 'Full theme adaptation: all chrome tokens correctly flip between light and dark
    with no legibility failures in either render'
  - Imprint palette used in canonical order; brand green (#009E73) correctly assigned
    to AAPL as the first series
  weaknesses:
  - Top and right plot borders remain visible in both renders (default Plotly frame);
    style guide preference is L-shaped frame — add mirror=False to xaxis/yaxis settings
  - Both paper_bgcolor and plot_bgcolor are set to PAGE_BG; using ELEVATED_BG for
    plot_bgcolor would create a subtle inner-panel distinction
  - End-point annotations for GOOGL (+27%) and AAPL (+19%) are vertically close (~8
    units apart on y-axis); add a small yshift to prevent visual crowding
  - Right margin (r=80) is tight given end-point annotations extend rightward with
    xanchor=left; increase to r=100 or r=120
