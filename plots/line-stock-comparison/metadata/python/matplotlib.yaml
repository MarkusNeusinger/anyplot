  - 'Perfect palette compliance: canonical anyplot order 1-4, correct backgrounds
    (#FAF8F1/#1A1A17), full theme-adaptive chrome in both renders.'
  - Clean KISS structure with deterministic seed (np.random.seed(42)) — exemplary
    code quality for a 252-day 4-series simulation.
