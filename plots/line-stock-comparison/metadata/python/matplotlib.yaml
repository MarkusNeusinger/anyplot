    individual stocks. Consider linewidth=3.0 for SPY and linewidth=2.0 for others,
    or a subtle fill_between highlighting outperformance above the 100 baseline.
  - 'DE-03 storytelling gap: no focal point or visual hierarchy guides the viewer
    to the key narrative (benchmark comparison). A single annotation or size differentiation
    would create emphasis without clutter.'
