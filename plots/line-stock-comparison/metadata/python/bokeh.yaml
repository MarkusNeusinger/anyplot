review:
  strengths:
  - Perfect visual quality in both light and dark renders — all font sizes explicitly
    set (50pt title, 42pt axis labels, 34pt ticks), fully readable in both themes
    with correct theme-adaptive chrome
  - 'Correct anyplot palette in canonical order (AAPL=#009E73, GOOGL=#9418DB, MSFT=#B71D27,
    SPY=#16B8F3) with correct theme backgrounds (#FAF8F1 light, #1A1A17 dark)'
  - Reference line at 100 is an effective storytelling element — immediately shows
    which stocks are above/below the starting benchmark
  - Y-only grid (xgrid disabled) is the right design call for a line chart, subtle
    at 10% alpha
  - 'Excellent code quality: reproducible with seed 42, clean KISS structure, correct
    dual output (HTML + PNG), idiomatic Selenium headless Chrome pattern'
  - 'Distinctive bokeh features well-used: HoverTool with datetime formatter, Legend
    click_policy=''hide'' for series toggling, Span annotation, interactive HTML +
    static PNG dual output'
  - Correct GBM simulation with realistic stock tickers (AAPL, GOOGL, MSFT, SPY) and
    plausible daily drift/volatility parameters
  weaknesses:
  - 'Prices are NOT explicitly rebased to 100 — spec requires ''rebased = price /
    first_price * 100'' but the code uses ''100 * np.exp(np.cumsum(returns))'' which
    starts each series at ~100±2% (not exactly 100). Fix: after generating prices,
    divide by prices[0] and multiply by 100.'
  - All 4 spines remain visible (p.outline_line_color = INK_SOFT creates a complete
    box). Style guide says to remove top and right spines — in bokeh set p.outline_line_color
    = None to remove the box, or set a specific frame/spine approach to achieve an
    L-shaped frame effect.
  - Design lacks visual hierarchy — no series is visually emphasized. Consider making
    the best-performing and worst-performing lines stand out via line_width differentiation
    (e.g., 7pt for top performer, 4pt for others) or using an annotation label at
    the end of each line to show final value, eliminating the need for the legend
    box.
  - SPY's synthetic trajectory (~65% annual return with seed 42) is unrealistically
    high for an index ETF — consider adjusting drift/volatility parameters or normalizing
    the simulation to produce more realistic relative performance spreads.
