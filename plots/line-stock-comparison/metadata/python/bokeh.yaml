      Data: 4 lines — AAPL (#009E73 green), GOOGL (#9418DB purple), MSFT (#B71D27 red), SPY (#16B8F3 cyan) — at line_width=5, alpha=0.9. Dashed horizontal reference line at y=100 in INK_SOFT. Subtle Y-only grid at 10% alpha. SPY (cyan) rises dramatically to ~160-170 by Jan 2025; GOOGL (purple) rises to ~130-140; AAPL (green) and MSFT (red) both decline below 100 for much of the year before recovering partially. All lines start near (but not exactly at) 100 in Jan 2024.
      Legibility verdict: PASS — all text elements clearly readable against the warm off-white background.

