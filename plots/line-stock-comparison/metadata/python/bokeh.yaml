      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title, axis labels, tick labels all rendered in light text (INK / INK_SOFT tokens) — clearly visible against the dark background. No dark-on-dark text failure observed. Legend background switches to elevated dark (#242420) with INK_SOFT border. All chrome elements correctly flip between themes.
