      Background: Warm off-white (#FAF8F1) — correct anyplot light surface.
      Chrome: Title "line-stock-comparison · python · seaborn · anyplot.ai" in dark text, clearly readable. X-axis label "Date" and y-axis label "Rebased Price (Start = 100)" both in dark text at fontsize=10, readable. Tick labels at fontsize=8, rotated 30° on x-axis (2024-01 through 2025-01), horizontal on y-axis (80–170) — all legible. Legend "Symbol" in upper-left with AAPL/GOOGL/MSFT/SPY entries at 8pt — readable. Dashed gray reference line at y=100.
      Data: AAPL=#009E73 (green), GOOGL=#9418DB (purple), MSFT=#B71D27 (red), SPY=#16B8F3 (cyan). Lines at linewidth=2.5. All four series clearly distinguishable. IMPORTANT: series do NOT all start at 100 — MSFT starts near ~85, others near ~107 — rebasing bug.
      Legibility verdict: PASS (all text readable against light background).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface.
      Chrome: Title in light text clearly readable against dark background. Axis labels and tick labels in light/soft-ink colors — all readable. Legend text readable. No dark-on-dark failures observed. Dashed reference line visible as subtle lighter element.
      Data: Colors identical to light render — AAPL green, GOOGL purple, MSFT red, SPY cyan. No data color drift between themes. Same rebasing bug visible (series don't start at 100).
      Legibility verdict: PASS (all text readable against dark background, no dark-on-dark issues).
