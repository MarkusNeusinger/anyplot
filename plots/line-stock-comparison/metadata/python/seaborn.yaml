review:
  strengths:
  - 'Perfect theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders use
    correct backgrounds, all chrome elements flip correctly, no dark-on-dark failures.'
  - 'Strong seaborn idioms: sns.move_legend(), sns.despine(), sns.set_context(), palette_map
    with hue_order for controlled multi-series coloring.'
  - Reference line at y=100 adds meaningful analytical baseline context for rebased
    stock comparison.
  - Anyplot palette order strictly followed with green (#009E73) as first series (AAPL).
  - Y-axis-only grid at alpha=0.10 is appropriately subtle; top+right spines removed.
  - Geometric Brownian motion generates realistic synthetic stock price data with
    appropriate per-symbol drift and volatility parameters.
  weaknesses:
  - 'Critical rebasing bug: `price = 100 * np.exp(np.cumsum(returns))` does not normalize
    each series to start at exactly 100. The cumsum starts at returns[0] (not 0),
    so the first price equals 100 * exp(returns[0]) — a random value. Visually: MSFT
    starts near 85 and AAPL/GOOGL/SPY near ~107 instead of all starting at exactly
    100. Fix: use np.concatenate([[0], np.cumsum(returns[:-1])]) in the exponent,
    OR normalize afterward: price = price / price[0] * 100.'
  - Legend positioned in upper-left partially overlaps the AAPL (green) data line
    in early-2024 period where lines are clustered; consider nudging with bbox_to_anchor
    or choosing a less congested position.
  image_description: |-
