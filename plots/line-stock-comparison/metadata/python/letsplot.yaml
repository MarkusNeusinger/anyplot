  strengths:
  - Full spec compliance — normalization to 100, reference line at y=100, legend,
    and grid lines all present
  - Correct canvas size (3200×1800) via ggsize(800, 450) + ggsave(scale=4) — the canonical
    lets-plot landscape pair
  - Both light (#FAF8F1) and dark (#1A1A17) themes handled correctly with proper INK/INK_SOFT/ELEVATED_BG
    tokens threaded through every chrome element
  - Realistic synthetic stock data with per-symbol drift and volatility parameters,
    plus proper rebasing transform
  - 'Clean KISS structure: flat script, np.random.seed(42) for reproducibility, all
    imports used'
  weaknesses:
  - 'Grid lines use solid INK_SOFT color (#4A4A44 light / #B8B7B0 dark) instead of
    the style-guide-recommended ~10% opacity rgba, making the grid slightly heavier
    than ideal — switch panel_grid_major to element_line(color=INK_SOFT, size=0.3)
    with an added alpha or use rgba tokens'
  - Design lacks visual hierarchy — no emphasis on the best/worst performer, no annotations
    on notable crossings; adding a geom_text label at the final data point per series
    would improve storytelling (DE-03)
  - LM-02 low — the lets-plot html export is generated but no interactive lets-plot-specific
    features (tooltips, hover) are used beyond the default; adding geom_line with
    Kotlin-style tooltip_lines() would demonstrate library mastery
