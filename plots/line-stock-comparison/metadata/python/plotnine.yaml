review:
  strengths:
  - Correct Imprint palette order (AAPL=green, GOOGL=purple, MSFT=red, SPY=sky-blue)
    with perfect theme-adaptive chrome in both light and dark renders
  - 'Intentional visual hierarchy: SPY benchmark rendered at 1.6 line weight vs 0.9
    for others, clearly distinguishing the reference series'
  - SPY outperformance ribbon (geom_ribbon with alpha=0.08) adds meaningful contextual
    shading without cluttering the chart
  - Reference dashed line at 100 grounds the rebased comparison and gives viewers
    an instant anchor
  - End-of-line value labels (geom_text + geom_point) allow readers to immediately
    read final portfolio values without consulting the y-axis
  - 'Fully idiomatic plotnine grammar: separate data= per geom layer, inherit_aes=False
    on the ribbon, scale_x_date with date_labels/date_breaks'
  - All font sizes explicitly set (title=12, axis_title=10, axis_text=8, legend=8)
    with correct theme tokens throughout both renders
  - 'Spec fully met: normalized series, reference line at 100, distinct colors, legend,
    realistic stock tickers and dates'
  weaknesses:
  - End-of-line value labels (size=7pt) are on the small side; consider bumping to
    8pt for better mobile readability
  - Secondary series line weight of 0.9 is slightly thin for medium-density daily
    data; 1.1-1.2 would improve visibility without losing the SPY distinction
  - End-of-line labels show only bare numbers (e.g. '149', '112') without stock symbol
    — readers must cross-reference legend color to map number to stock; annotating
    with symbol name or color-matching would improve clarity
  - Panel border is removed but axis_line is kept, creating an L-shaped frame — this
    is correct, but top and right axis lines could also be removed for a cleaner minimal
    look (remove axis_line_x for top spine, etc.)
