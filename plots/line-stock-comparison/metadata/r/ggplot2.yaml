review:
  strengths:
  - 'Full spec compliance: all required features implemented (normalization to 100,
    reference line at 100, distinct stock colors, legend, grid)'
  - 'Excellent data storytelling: real 2023 market events (SVB collapse, NVDA AI surge,
    Fed rate peak) with shaded rect, vertical markers, and rotated italic labels'
  - 'Perfect theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders pass
    readability checks; adjustcolor() trick embeds alpha into grid hex for dark-mode
    where element_line lacks alpha support'
  - 'Clean, idiomatic ggplot2 grammar-of-graphics layering: geom_rect with inherit.aes=FALSE,
    scale_x_date, scale_color_manual with setNames, proper linewidth= for ggplot2
    ≥ 3.4'
  - 'Realistic data: NVDA/MSFT/AAPL/SPY with calibrated mu/sigma parameters; cumprod(exp(returns))
    log-normal model is financially sound'
  weaknesses:
  - 'Event annotation text (annotate size=2.1) is too small: at the 3200px canvas,
    the labels render at ~7pt equivalent; when scaled to mobile (~400px), they become
    ~0.9pt and essentially invisible — increase annotation size to at least size=3.0-3.5'
  - 'Slight visual crowding in the SVB shaded region: the ''SVB Collapse'' rotated
    label at y=102 partially overlaps with the NVDA/MSFT stock lines in that price
    range — consider placing label at a y value above the data range (e.g., y=145)
    or adjust vjust to shift it clear of the cluster'
  - 'Design sophistication below the 90+ threshold: the implementation is polished
    but reads as well-configured ggplot2 defaults with event overlays rather than
    a deliberately crafted visualization — consider adding end-of-series stock labels
    (ggrepel or direct geom_text at last date), or a subtle fill ribbon under the
    NVDA line to emphasize its outperformance'
  - Library mastery uses standard patterns but misses an opportunity to use a distinctively
    ggplot2 feature such as coord_cartesian(clip='off') for off-axis annotations,
    or annotate with geom='label' for styled callout boxes instead of plain text
