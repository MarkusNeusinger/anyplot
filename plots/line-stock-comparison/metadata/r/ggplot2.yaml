      Data: NVDA line in #009E73 (brand green) — first series correct; MSFT in #9418DB (purple); AAPL in #B71D27 (red); SPY in #16B8F3 (cyan/sky blue). Dashed horizontal reference line at 100 in secondary ink. Light pink-red shaded rect for SVB collapse period (Mar 6–17 2023). Three vertical dotted lines at SVB midpoint, NVDA AI Surge (May 24), and Rates Peak (Oct 26). Rotated italic annotation labels at each marker — small (size=2.1, ~7pt equivalent) but visible at 3200px; would be unreadable at mobile scale
      Legibility verdict: PASS for desktop; WARN — annotation labels too small for mobile readability

