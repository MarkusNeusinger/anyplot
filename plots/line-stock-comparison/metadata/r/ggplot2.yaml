review:
  strengths:
  - 'All spec requirements implemented: rebased-to-100 normalization, reference line
    at 100, 4-series comparison with correct Imprint palette order'
  - 'Excellent data storytelling: NVDA ribbon fill creates clear focal point highlighting
    outperformance vs other series'
  - 'Realistic, accurate historical context: SVB bank collapse (Mar 2023), NVDA AI
    Surge (May 2023), Rates Peak (Oct 2023) are all correct events'
  - 'Advanced ggplot2 features used idiomatically: geom_ribbon(), annotate(''label'')
    styled callouts, coord_cartesian(clip=''off'') for off-panel labels'
  - 'Theme adaptation fully correct: all chrome tokens flip between #FAF8F1 and #1A1A17,
    data colors stay identical between renders'
  - Clean code with set.seed(42), no functions/classes, correct canvas (3200x1800),
    proper ragg device, themed output filenames
  weaknesses:
  - 'End-of-line label for MSFT shows as ''MSF.'' in both renders — MSFT and SPY end
    the year at similar rebased values (~115-120), causing their hjust=-0.2 ticker
    labels to overlap vertically, partially obscuring the ''T'' in MSFT. Fix: add
    a small y-nudge to separate close end labels (e.g., use ggrepel::geom_text_repel
    or manually offset last_pts y-values for overlapping labels by ±2-3 units).'
  - Right legend inside panel potentially crowds the end-of-line labels for mid-range
    lines (MSFT, SPY). Consider moving legend to a corner with legend.justification
    or reducing legend.key.size to reduce collision risk.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Title "line-stock-comparison · r · ggplot2 · anyplot.ai" in dark INK (#1A1A17) clearly readable. Subtitle in softer INK_SOFT. Y-axis label "Rebased Price (Start = 100)" and X-axis label "Date" in dark INK, properly sized (10pt). Tick labels in INK_SOFT (8pt), x-axis ticks rotated 30° for date readability. Grid lines subtle (0.18 linewidth, soft alpha). All text is legible against the warm off-white background.
      Data: Four lines in Imprint palette canonical order — NVDA (#009E73 green, first series correct), MSFT (#9418DB purple), AAPL (#B71D27 red), SPY (#16B8F3 sky blue). Subtle green ribbon fill under NVDA line emphasizing outperformance. SVB region shaded in faint red (#B71D27 at alpha=0.07). Dashed horizontal reference line at rebased=100. Vertical dotted event markers with styled label annotations (SVB Collapse in red, NVDA AI Surge in green, Rates Peak in INK_SOFT). End-of-line ticker labels: NVDA visible at ~150, AAPL at ~90-95; MSFT label appears as "MSF." — the "T" is obscured, likely overlapping with the nearby SPY end label (both stocks finish at similar values ~115-120).
      Legibility verdict: PASS overall, with VQ-02 concern on MSFT/SPY end-label overlap at right edge.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title and subtitle fully flipped to light text (#F0EFE8 INK and #B8B7B0 INK_SOFT). All axis labels, tick labels, and legend text rendered in light tones against the dark background. No dark-on-dark failures detected. Grid lines remain subtle with dark-theme adjusted alpha. SVB collapse region shading still uses #B71D27 (red) which is visible on dark background.
      Data: All four data line colors are identical to the light render — NVDA green #009E73, MSFT purple #9418DB, AAPL red #B71D27, SPY blue #16B8F3. Ribbon fill, reference line, and event annotations render correctly on dark surface. The "MSF." end-label overlap issue persists identically to light render, confirming it is a real visual issue (MSFT and SPY end labels overlap vertically).
      Legibility verdict: PASS, with same VQ-02 MSFT/SPY end-label overlap as in light render.
