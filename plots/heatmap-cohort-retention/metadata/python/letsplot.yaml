  - Design Excellence is moderate — the plot is technically correct but the aesthetic
    is primarily functional; additional typography refinement (e.g. explicit fontface/weight
    variation in axis labels) or a directional annotation pointing to the best/worst
    cohort row could elevate DE-03
  - DE-02 refinement limited to grid removal and tile gap sizing; explicit spine removal
    via axis_line=element_blank() or axis_ticks=element_blank() would sharpen the
    clean heatmap look further
