review:
  strengths:
  - Triangular heatmap shape correctly implemented — newer cohorts have fewer columns,
    creating the characteristic staircase pattern
  - Cell text with adaptive dark/light coloring based on retention value (scale_color_identity
    pattern) is elegant and idiomatic plotnine
  - Cohort sizes displayed in y-axis labels as required by spec
  - SaaS monthly cohort scenario is realistic, business-plausible, and neutral
  - Sequential imprint_seq gradient (blue→green) is semantically appropriate — green=high
    retention, blue=low retention
  - All font sizes explicitly set using theme tokens; chrome is fully theme-adaptive
    for both light and dark renders
  - Subtitle and M4 annotation provide genuine data storytelling context
  - 'Full spec compliance: period 0 = 100% for all cohorts, colorbar legend included'
  - Clean KISS structure with np.random.seed(42) for reproducibility
  weaknesses:
  - 'Annotation text "M4: +14pp Jan→Jun 2024" (size=3.0mm) is somewhat small relative
    to the large empty triangular area — bump to 3.5–4.0mm for better legibility'
  - 'DE-01: Aesthetic sophistication is good but not exceptional — the legend box
    sits outside the plot in a large empty zone; consider repositioning inside the
    plot or tightening the right margin to reduce wasted space'
  - 'DE-02: Could add a subtle bottom-axis spine or a hairline border around the heatmap
    grid to give the triangular shape more visual definition rather than floating
    against the warm background'
  - 'LM-02: The scale_color_identity technique is good but could be complemented by
    using plotnine-native faceting or coord_flip for additional library-distinctive
    flavor'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface.
      Chrome: Bold title "heatmap-cohort-retention · python · plotnine · anyplot.ai" in dark ink at top (~80% width, expected for long mandated format). Italic subtitle "SaaS monthly cohorts — newer signups retain significantly better month over month" in dark-soft ink. Y-axis labels "Jan 2024 (n=1,200)" through "Oct 2024 (n=1,020)" in dark-soft ink — all clearly readable. X-axis labels M0–M9 and x-title "Months Since Signup" in dark ink. Colorbar on right side labeled "Retention %" with scale ticks 0/25/50/75/100. Small annotation "M4: +14pp Jan→Jun 2024" in lower-right empty zone — visible but on the small side.
      Data: Triangular staircase heatmap — Jan 2024 (top) has all 10 columns (M0–M9), Oct 2024 (bottom) has 1 column (M0 only). High-retention cells (M0–M2, newer cohorts) render in brand green (#009E73); lower-retention cells transition through teal to blue (#4467A3). Cell annotations show percentages as dark text on green tiles and light text on blue tiles. The gradient correctly uses Imprint palette stops only.
      Legibility verdict: PASS — all text readable; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface.
      Chrome: Title in light (#F0EFE8) ink — fully readable. Subtitle in secondary light text — readable. Y-axis labels in light secondary text — readable. X-axis labels and title in light text — readable. Legend has dark elevated background (#242420) with light text. Small annotation in the lower-right empty zone is rendered in muted light text — visible.
      Data: Color gradient (blue→green) identical to light render — Imprint data colors unchanged between themes, only chrome flipped. Cell text adaptive coloring preserved: dark text on bright-green, light text on blue tiles.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome properly theme-adaptive.
