review:
  strengths:
  - 'Perfect spec compliance: triangular shape, period-0 anchoring, in-cell annotations,
    cohort size labels, colorbar, and Month N x-axis labels all present'
  - Correct Imprint sequential colormap (imprint_seq) applied to continuous retention
    data — no forbidden colormaps used
  - Both light and dark themes fully functional with no dark-on-dark or light-on-light
    failures; all chrome tokens properly thread through to every element
  - Rich interactive hover tooltips with cohort size and bold retention value — good
    use of Plotly's native interactivity
  - Realistic synthetic data with exponential decay, per-cohort trend bonus, and noise
    that produces a visually interesting triangular pattern
  weaknesses:
  - Cell annotation font size (8px x scale=4 = 32 source-px) is somewhat small; 9-10px
    would improve mobile readability without crowding cells
  - 'No data storytelling layer: no annotation calling out the best-performing cohort,
    no average retention annotation, no reference highlighting notable patterns —
    the chart communicates the data but does not guide the viewer'
  - The text color threshold (dark below 50%, light at/above 50%) may produce borderline
    readability at the midpoint of the gradient; a luminance-based threshold would
    be more robust
