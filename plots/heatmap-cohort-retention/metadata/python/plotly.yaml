review:
  strengths:
  - WCAG luminance-based adaptive text color in cells (crossover at 88%) ensures readability
    across the full retention range in both themes
  - Perfect triangular NaN mask correctly emerges from the data structure (np.full
    with NaN fill, then per-cohort fill up to max_period)
  - Cohort sizes embedded in y-axis labels (f"{label}  (n={size:,})") is exactly what
    the spec requires without a separate annotation column
  - imprint_seq colormap correctly applied for single-polarity continuous data with
    zmin=0/zmax=100 anchoring the retention scale
  - Storytelling annotation in the empty triangle area is clever use of dead space
    — creates a concrete focal point (Best Month-3 cohort)
  - Both HTML and PNG outputs created for interactive + static use
  weaknesses:
  - Cell annotation font size 9pt (36 source-px at scale=4) may be too small for mobile-width
    rendering (~400px); consider increasing to 10-11pt
  - 'Annotation box uses bgcolor=PAGE_BG instead of ELEVATED_BG (#FFFDF6 light / #242420
    dark) — on dark theme the box relies only on the border for distinction; switch
    to ELEVATED_BG for proper callout contrast'
  - Axis line spines (linecolor=INK_SOFT) slightly clutter the heatmap appearance;
    consider showline=False on both xaxis and yaxis for a cleaner floating heatmap
    aesthetic
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "heatmap-cohort-retention · python · plotly · anyplot.ai" centered in dark ink (#1A1A17), size=16. Axis labels "Months Since Signup" (x) and "Signup Cohort" (y) in dark ink, size=12. Tick labels in INK_SOFT (#4A4A44), size=10. All clearly readable.
      Data: Triangular heatmap with imprint_seq colormap (green #009E73 at 0% → blue #4467A3 at 100%). 10 cohorts × 10 periods with NaN for unavailable future periods. Cell annotations show retention percentages (white on dark cells, dark on light cells). Colorbar on right with "Retention Rate" title and % ticks. Storytelling annotation in lower-right empty triangle: "★ Best Month-3 cohort / Jul 2024: 53%".
