      Data: Cell colors are identical to light render — same green-to-blue imprint_seq gradient; confirms data colors are theme-independent. In-cell text auto-switches appropriately (white on blue cells, dark on bright green cells at period 0).
      Legibility verdict: PASS — no dark-on-dark text failures; chrome fully adapted to dark theme
