review:
  strengths:
  - Sophisticated custom CohortRetentionHeatmap class correctly extends pygal Graph
    architecture to implement a native triangular heatmap not available in stock pygal
  - 'Full spec compliance: triangular tapering shape, cell text percentages with luminance-adaptive
    text color, cohort sizes in italic muted text, gradient colorbar with Retention
    % label and tick values'
  - 'Proper Imprint sequential colormap interpolated between palette endpoints #4467A3
    and #009E73 with semantically meaningful green=high retention direction; both
    render backgrounds correct (#FAF8F1/#1A1A17)'
  - _text_on() luminance function ensures cell text is always readable (dark text
    on light cells, light text on dark cells) across the full color range
  - Interactive HTML output generated with pygal tooltips showing cohort label and
    month index per cell — a distinctive pygal feature
  weaknesses:
  - Column headers (Month 0 – Month 9) are rendered at col_fs=28 source pixels; at
    mobile scale (~400 px display width) these compress to ~4–5 px — consider raising
    the col_fs floor slightly or abbreviating labels for smallest sizes
  - The colorbar tick labels (100%, 80%, 61%, 41%, 21%) and Retention % header are
    positioned close to the right canvas boundary; minimal overflow protection if
    column count increases in a future repair
  - Bottom-right empty triangle (inherent to the triangular heatmap shape but amplified
    here because the Oct 2024 row has only one cell) leaves notable white space —
    a brief data summary or note could improve storytelling use of that area
