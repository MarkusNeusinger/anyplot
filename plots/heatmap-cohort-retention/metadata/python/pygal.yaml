      Data: Triangular grid of 10 cohorts × up to 10 periods. Month 0 column is uniformly bright green (#009E73-end of colormap). Colors transition from green (high retention, 60–100%) through teal to blue (#4467A3-end, ~20–30%). Rounded cells with percentage text inside (adaptive dark/light text based on cell luminance). Triangular shape clearly visible — Jan 2024 has 10 cells, Oct 2024 has 1.
