review:
  strengths:
  - Rounded-corner FancyBboxPatch cells add a polished, distinctive look beyond a
    plain imshow heatmap
  - Luminance-based adaptive text color inside cells (light on dark cells, dark on
    light cells) ensures readability across the full retention gradient
  - Semantic amber dashed highlight with star prefix on the best-performing cohort
    creates a clear visual focal point and strong data story
  - Triangular shape correctly emerges from cohort-period data, immediately communicating
    the cohort analysis concept
  - Correct square canvas (2400×2400 px) and all spines removed — clean, appropriate
    layout for a symmetric heatmap
  - 'Full theme-adaptive chrome: backgrounds, tick labels, axis labels, colorbar all
    flip correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - 'Imprint sequential colormap built from the two canonical endpoints (#4467A3 and
    #009E73); colorbar labeled ''Retention Rate (%)'''
  weaknesses:
  - 'imprint_seq colormap direction is reversed: implementation uses [''#4467A3'',
    ''#009E73''] (blue→green) but the canonical definition is [''#009E73'', ''#4467A3'']
    (green→blue). The spec also requests ''light (low retention) to dark (high retention)''
    — the current mapping makes low-retention cells dark blue and high-retention cells
    bright green, inverting that contract. Fix: swap the endpoints to LinearSegmentedColormap.from_list(''imprint_seq'',
    [''#009E73'', ''#4467A3'']) and flip norm so 0→green and 100→blue, or keep current
    direction and rename ''imprint_seq_r''.'
  - 'DE-01 moderate: aesthetic is good but the typography hierarchy inside cells is
    limited — the only variation is normal vs bold for the best cohort. Adding size
    variation (slightly larger text in earlier periods, smaller in later sparse cells)
    or a subtle background wash for period-0 column would add more design intention.'
  - plt.tight_layout(pad=1.5) + plt.savefig() without bbox_inches is correct, but
    tight_layout interacts with the colorbar shrink=0.6, sometimes causing slight
    vertical axis shortening. Prefer explicit fig.subplots_adjust() to lock margins
    instead.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "heatmap-cohort-retention · python · matplotlib · anyplot.ai" in dark ink at ~12pt, clearly readable. Y-axis label "Signup Cohort" and X-axis label "Months Since Signup" in dark ink at 10pt — both readable. Tick labels at 8pt in INK_SOFT (#4A4A44) — readable, though tight on the y-axis where "(n=1,xxx)" suffixes are added. X-axis ticks rotated 45° — "Month 0" through "Month 9" — no overlap.
      Data: Triangular heatmap using imprint_seq reversed (blue=#4467A3 for low retention → green=#009E73 for high retention). Period-0 column is uniformly bright green (100%). Color gradient clearly shows retention decay across periods. Cell percentages printed in adaptive ink (white on dark-blue cells, dark on bright-green cells) — all readable. Best cohort (May 2024, row 4) highlighted with amber dashed border and star prefix; May cohort values are bold. Colorbar on right labeled "Retention Rate (%)" — visible and well-sized.
      Legibility verdict: PASS — all title, axis, tick, and cell text is readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels all flip to light ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures observed. Colorbar tick labels are light-colored. All spines remain hidden.
      Data: Data colors (cell fill gradient and amber highlight) are identical to the light render — only chrome (text, background) flips as expected. Period-0 column remains vivid green. Blue-end cells appear slightly less saturated on dark bg but remain distinct. Cell percentage text adapts correctly (luminance-based) in dark render too.
      Legibility verdict: PASS — all text is readable against the near-black background; no dark-on-dark failures detected.
