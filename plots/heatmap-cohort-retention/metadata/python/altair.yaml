review:
  strengths:
  - 'Exemplary data storytelling: amber border on Jan 2024 cohort + ''avg −38%'' cliff
    annotation + descriptive subtitle work together to guide the viewer through the
    key insights'
  - 'Perfect spec compliance: triangular shape correctly implemented, cohort sizes
    embedded in y-axis labels (n=X,XXX), retention values as cell text, colorbar legend,
    Month 0/1/2... axis labels all present'
  - 'Full Imprint palette compliance: imprint_seq (green→blue) correctly applied for
    single-polarity continuous data; both theme backgrounds correct (#FAF8F1 light
    / #1A1A17 dark); theme-adaptive chrome (INK, INK_SOFT, INK_MUTED tokens) threaded
    through all chrome elements'
  - 'Idiomatic Altair layer composition: five distinct marks (mark_rect heatmap, mark_rect
    highlight, mark_text values, mark_text percent symbols, mark_text annotation)
    combined cleanly via alt.layer()'
  - 'Typographic polish: percentage symbols rendered as a separate layer with dx=14
    offset and reduced opacity (rgba 0.7), creating a professional sub-number typographic
    pairing without cluttering the value'
  weaknesses:
  - 'Cell text color hardcoded to #F0EFE8 (light warm cream) regardless of theme —
    works because heatmap cells are always colored, but contrast at the green (low-retention)
    end is borderline (~4.6:1) and would fail WCAG AA for small text on the lightest
    cells; consider using a theme-adaptive approach or ensuring the domain minimum
    maps to a darker color'
  - 8px percentage symbol layer is at the edge of legibility when the plot is scaled
    to mobile widths (~400 px); consider increasing to 9-10px or omitting at this
    size
  - The 'avg −38%' cliff annotation uses clip=False with dy=-26 to position above
    the first row, placing it in a visually crowded space between the subtitle and
    the chart area; the annotation is readable but tight against the subtitle line
    in both renders
