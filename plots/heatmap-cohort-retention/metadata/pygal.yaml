review:
  strengths:
  - Excellent triangular heatmap structure with all spec requirements implemented
  - Custom Graph subclass demonstrates deep pygal knowledge
  - Thoughtful data storytelling with Apr 2024 dip and progressive cohort improvement
  - Professional green colormap with smooth interpolation and dynamic text contrast
  - Native pygal tooltips and HTML export leverage the library interactive SVG capabilities
  - Clean colorbar with gradient and labeled tick marks
  weaknesses:
  - sys.path manipulation to avoid filename collision adds unnecessary complexity
  - CSS injection hack to suppress pygal focus outlines is fragile
  - Dummy chart.add call is a workaround that could confuse readers
  - Single-hue green colormap could be more accessible for some color vision deficiencies
  image_description: The plot displays a triangular cohort retention heatmap with
    the title "heatmap-cohort-retention · pygal · pyplots.ai" at the top. Ten monthly
    cohorts (Jan 2024 through Oct 2024) are listed on the Y-axis under the rotated
    label "Signup Cohort", each with cohort sizes shown below (e.g., n=1,200, n=1,350).
    The X-axis shows "Month 0" through "Month 9" under the header "Months Since Signup".
    Cells use a sequential green colormap ranging from very light green (low retention
    ~21%) to deep dark green (high retention/100%). Each cell contains the retention
    percentage as text, with white text on dark cells and dark text on light cells
    for readability. The triangular shape is correctly formed — Jan 2024 has all 10
    periods while Oct 2024 has only Month 0. A vertical colorbar on the right labeled
    "Retention %" shows the scale from 21% to 100% with tick marks at 5 intervals.
    White background with subtle gaps between cells and rounded corners on each cell.
