review:
  strengths:
  - 'Perfect spec compliance: triangular heatmap shape, 100% period-0 retention, cohort
    sizes in y-labels, color bar legend, and ''Wk N'' x-axis labels all implemented
    correctly'
  - 'Excellent palette use: Imprint colors (#4467A3 low → #009E73 high) with semantically
    appropriate direction — high retention maps to brand green'
  - 'Fully theme-adaptive chrome: all background, text, and legend elements correctly
    flip between #FAF8F1/#1A1A17 surfaces with zero dark-on-dark or light-on-light
    failures'
  - Realistic SaaS data with product-quality drift across cohorts and natural retention
    decay curve
  - Clean, flat code structure with set.seed(42), correct ragg device usage, and only
    used imports
  weaknesses:
  - Y-axis tick labels at size=7.5pt are small for a 2400×2400 canvas — two-line format
    works but at borderline readability when scaled to 400px mobile width; consider
    increasing to 8–9pt
  - Cell text uses hardcoded color='#FFFDF6' regardless of tile fill value — works
    well here since the green-to-blue gradient never produces near-white tiles, but
    fragile if the gradient range changes
  - 'Design Excellence could be pushed further: no visual emphasis on the ''Week 1
    cliff'' (the dramatic retention drop from Wk 0 to Wk 1 is the key story), a subtle
    annotation or title callout would elevate DE-03'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, visible canvas margin around the heatmap.
