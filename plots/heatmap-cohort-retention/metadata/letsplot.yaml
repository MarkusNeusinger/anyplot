    dark purple represents high retention (100%) and yellow-green represents low retention
    (~20%). Each cell contains a bold percentage label with appropriate contrast —
    white text on dark cells and dark text on light cells. Orange borders highlight
    the Month 1 column across all cohorts, drawing attention to the critical first-month
    churn drop. The title reads "heatmap-cohort-retention · letsplot · pyplots.ai"
    with a subtitle explaining the orange border storytelling. Cohort sizes (n=921
    to n=2438) appear in parentheses next to each y-axis label. A vertical color bar
    legend on the right shows the "Retention %" scale from 0 to 100. The triangular
    shape is clearly visible — Jan 2024 has all 10 periods while Oct 2024 has only
    Month 0.'
