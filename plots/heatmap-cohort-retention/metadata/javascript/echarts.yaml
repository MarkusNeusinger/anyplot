review:
  strengths:
  - Triangular cohort heatmap shape correctly implemented — older cohorts have more
    periods, newer cohorts fewer, giving the expected triangular form
  - Imprint sequential colormap used correctly via t.seq tokens API, producing a green-to-blue
    gradient that is CVD-safe and perceptually uniform
  - 'All chrome is theme-adaptive: background uses t.pageBg, titles t.ink, axis labels
    t.inkSoft — both renders pass the theme-readability check'
  - 'Spec fully satisfied: triangular shape, cell percentage labels, cohort sizes
    in y-axis labels (n=Xk), week labels on x-axis at top, colorbar legend'
  - Informative subtitle explicitly narrates the retention improvement story
  - 'Clean ECharts idiom: heatmap series with visualMap, inverse y-axis, axis lines/ticks/splitLines
    all hidden, borderColor=pageBg for crisp cell separation'
  weaknesses:
  - 'Cell label color is hardcoded #FFFFFF (white) — on low-retention cells (~25-30%
    values at right edge) contrast is marginal. Consider using a theme-adaptive label
    color that switches between white and ink based on cell brightness (e.g. luminance
    threshold on the cell value)'
  - formatSize() helper function deviates from KISS structure; inline the formatting
    directly in the cohortLabels mapping
  - DE-03 storytelling is carried entirely by the subtitle text — no visual emphasis
    on the retention improvement trend (e.g. a slight highlight or annotation on week-1
    column could reinforce the narrative)
  - 'LM-02: ECharts-distinctive visualMap and inverse axis are used correctly, but
    the implementation doesn''t leverage more advanced ECharts heatmap capabilities
    like piecewise visualMap or custom label formatter based on value thresholds'
