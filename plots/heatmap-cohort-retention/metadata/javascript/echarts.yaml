review:
  strengths:
  - 'Clean triangular cohort heatmap with correct shape: Jan 2024 has 10 periods,
    Oct 2024 has 1 — exactly per spec'
  - Perfect use of imprint_seq sequential colormap via t.seq tokens for retention
    data (single-polarity continuous)
  - 'Fully theme-adaptive chrome: title uses t.ink, all labels use t.inkSoft, background
    uses t.pageBg — both renders look correct'
  - 'All spec requirements met: sequential colormap, percentage text in cells, cohort
    sizes in Y-axis labels, Week N axis labels, color bar'
  - X-axis positioned at top — idiomatic choice for cohort heatmap reading pattern
  - Cell borders use t.pageBg for clean visual separation between cells
  - Deterministic data with realistic SaaS retention decay pattern and cohort improvement
    trend
  - 'animation: false set correctly; no explicit size or devicePixelRatio passed to
    echarts.init'
  - 'Excellent ECharts API usage: visualMap for continuous scale, label/tooltip formatters,
    yAxis inverse'
  weaknesses:
  - Cell label font size is 13px, slightly below the style-guide default of 14px for
    JS library labels — increase to 14px for optimal readability at mobile widths
  - 'Design storytelling is minimal: the color gradient shows retention decay but
    there is no visual emphasis on key patterns (e.g., the clear improvement in later
    cohorts or the steep Week 0 to Week 1 drop). Consider a subtitle or annotation
    to guide the reader.'
  - 'Design aesthetic is clean but not exceptional (DE-01=5/8): the plot looks like
    a polished library default rather than a publication-ready composition. Removing
    the axis lines or adding more generous padding would add refinement.'
  - No explicit axis title labels (no xAxis.name for Period Since Signup, no yAxis.name
    for Cohort Month). The descriptive tick labels partially compensate, but adding
    brief axis names would clearly label the axes for readers unfamiliar with cohort
    notation.
