      Background: Warm off-white (#FAF8F1) — correct Imprint light surface.
      Chrome: Title "heatmap-cohort-retention · javascript · echarts · anyplot.ai" in dark ink at top center, clearly readable. Subtitle "Monthly SaaS cohorts — later cohorts show improved Week-1 retention" in softer ink below. X-axis week labels (Week 0–Week 9) rendered at top in inkSoft; Y-axis cohort labels (Jan 2024 (n=2.1k) … Oct 2024 (n=1.6k)) in inkSoft on left. Colorbar on right with "100%" / "0%" text labels.
      Data: Triangular heatmap — 10 cohorts × 10 max periods. Color gradient from lighter teal-green (low retention ~25%) to deep blue-green (100%). Percentage values printed as white text with a subtle dark border on each cell. The triangular void in the lower-right is empty (correctly, as newer cohorts have fewer elapsed periods). First series anchor is the imprint_seq gradient starting at #009E73 (brand green).
