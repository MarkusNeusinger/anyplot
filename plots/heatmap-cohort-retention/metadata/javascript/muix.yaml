review:
  strengths:
  - Excellent use of MUI X useXScale/useYScale hooks to build a custom heatmap — demonstrates
    genuine library mastery for a chart type not natively available in the community
    edition
  - 'Perfect spec compliance: triangular shape, cell percentages, cohort sizes, colorbar,
    correct period-0 baseline at 100%'
  - Fully deterministic data via LCG seed 42; clean focused React components each
    with a single responsibility
  - Theme-adaptive chrome throughout (tok.ink, tok.inkSoft); correct imprint_seq colormap
    applied to sequential retention data
  - Square orientation correctly chosen for the symmetric triangular heatmap layout
  weaknesses:
  - Cell text (12px CSS) and colorbar tick labels (11px CSS) are slightly below the
    14px CSS floor for the 1200px mount — bump to 13-14px and 12px respectively for
    sharper mobile readability
  - 'Cell text hardcodes #FFFDF6 (light-theme elevated bg) rather than a theme-adaptive
    token — currently works visually because cells are medium-dark fills, but fragile
    if the palette changes'
  - No visual emphasis on the most actionable insights (period-1 churn cliff, or relative
    cohort quality comparison) — a single annotation or color highlight on a key pattern
    would lift DE-03 to 4-5
