    cohorts (e.g. no highlight stroke on the best/worst row), no subtle background
    fill for the empty triangular area, no cell border styling to distinguish the
    filled from empty half-triangle'
  - 'DE-03 (Data Storytelling): data is displayed correctly but viewer must find the
    retention story themselves — consider adding a subtle annotation pointing to the
    strongest vs weakest cohort, or shading the empty upper-right area with a muted
    fill to emphasize the triangular shape'
