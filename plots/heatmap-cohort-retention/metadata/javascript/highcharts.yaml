    drawAll) deviate from KISS; architecturally necessary for the SVG renderer pattern
    but adds complexity'
  - 'DE-01 not yet at strong-design level: no distinctive typographic hierarchy between
    cohort label sizes; the colorbar could use tick marks or a frame to separate it
    from the plot area'
  - Double header block in source (pipeline artifact from impl-review header rewrite
    + generator prepend) — cosmetically messy but no functional impact
