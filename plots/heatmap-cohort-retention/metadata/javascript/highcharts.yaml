review:
  strengths:
  - Perfect triangular heatmap shape with correct cohort retention logic (period 0
    = 100%, power-decay model, null for future periods)
  - 'Complete spec compliance: all required features present including cell labels,
    cohort sizes (n=X,XXX), colorbar, and ''Wk N'' axis labels'
  - Creative use of Highcharts SVG Renderer API to implement a native heatmap without
    the (unavailable) heatmap module — architecturally sound workaround
  - Luminance-based adaptive text color ensures white text on dark cells and dark
    text on light cells, maintaining readability at every retention value
  - 'Both themes render correctly: warm off-white (#FAF8F1) light and warm near-black
    (#1A1A17) dark, with identical data colors and theme-adaptive chrome'
  - 'Correct Imprint sequential colormap (#009E73 green to #4467A3 blue) for continuous
    retention data'
  - Square orientation correctly chosen for this symmetric grid-based plot
  weaknesses:
  - Colorbar annotation text ('Retention' header + 100%/50%/0% tick labels) is 11px
    CSS — increase to 13-14px to match secondary label sizing guidelines
  - 'No data storytelling emphasis: add a short annotation (e.g., callout near best-performing
    cohort row or median first-week retention footnote) to create a focal point'
  - DE-01 could be elevated with one additional polish detail — bold the Wk 0 '100%'
    column labels to anchor the triangular shape visually, or add a thin separator
    between plot area and colorbar
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "heatmap-cohort-retention · javascript · highcharts · anyplot.ai" in dark ink (#1A1A17), clearly readable. Cohort labels "Jan 2024 (n = 1,842)" etc. in inkSoft (#4A4A44) on left — readable. Period labels "Wk 0"–"Wk 9" in inkSoft at bottom — readable. Axis titles "Signup Cohort" and "Weeks Since Signup" in inkSoft at 15px — readable. Colorbar labels ("Retention", "100%", "50%", "0%") in inkSoft at 11px — small but readable.
      Data: Heatmap cells use Imprint sequential colormap (#009E73 green for low retention to #4467A3 blue for high retention). Wk 0 column (100%) appears deep blue-purple; cells with 5–7% retention appear teal-green. White percentage text centered in each cell. Triangular shape clearly visible — older cohorts have more columns.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface
      Chrome: Title in light cream (#F0EFE8, t.ink for dark theme) — clearly readable. Cohort labels, period labels, axis titles in #B8B7B0 (inkSoft dark) — clearly readable against near-black. Colorbar labels in same inkSoft dark color — readable. No dark-on-dark failures detected.
      Data: Heatmap cell colors are pixel-identical to the light render — same blue-green gradient (#009E73 to #4467A3). Only the background and chrome flipped. Empty lower-right triangle (future periods for recent cohorts) shows dark page background correctly. Brand green #009E73 visible in low-retention cells.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark issues
