review:
  strengths:
  - Perfect spec compliance — triangular heatmap shape, all 12 cohorts with sizes,
    sequential Imprint colormap, cell percentage annotations, and colorbar all correctly
    implemented
  - Correct use of ANYPLOT_SEQ (green→blue) for single-polarity continuous retention
    data; matches imprint_seq specification exactly
  - Thorough theme-adaptive chrome — INK/INK_SOFT tokens applied to title, axis labels,
    spine colors, colorbar label and ticks; PAGE_BG used for nan_color to achieve
    seamless triangular cutout in both themes
  - Efficient batch text! call for all cell annotations avoids per-cell loop overhead;
    uses NaN guard to skip empty cells
  - Square canvas (2400×2400) correctly chosen for the symmetric 12×12 heatmap grid;
    xtickcolor/ytickcolor set to PAGE_BG for invisible tick marks (clean refinement)
  weaknesses:
  - Y-axis label missing — no ylabel defined in Axis(); the cohort dimension should
    carry a label like "Cohort" or "Signup Cohort" for axis completeness (x-axis has
    "Months Since Signup", y-axis has no title — VQ-06)
  - 'Cell text color fixed as :white for all cells — cells near the green-teal end
    of the colormap (#009E73-area, low retention ~15-20%) have insufficient contrast
    with white text (~2.6:1 WCAG ratio); use a luminance-adaptive approach: dark ink
    text on lighter cells, white on darker cells — VQ-04 / DE-02'
  - Colorbar is very narrow (width=16) — the thin strip makes the gradient hard to
    read and looks visually sparse; increase to 20-24 — DE-02
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly distinguishable from pure white
      Chrome: Title "heatmap-cohort-retention · julia · makie · anyplot.ai" in dark ink, fully readable; x-axis label "Months Since Signup" in dark ink, readable; y-axis has no title label (only cohort tick labels); x-axis tick labels "Month 0"–"Month 11" rotated 45°, readable; y-axis tick labels "Jan 2024 (2840)"–"Dec 2024 (3680)" in INK_SOFT, readable at this scale; colorbar label "Retention Rate (%)" readable
      Data: Triangular heatmap with sequential green (#009E73) to blue (#4467A3) colormap; Month 0 column (100% retention) is deepest blue; Month 1 (~65-73%) is teal; later months progressively lighten toward green; NaN cells (empty triangular area) render as the off-white page background making the triangular shape seamless; white percentage text annotations in every active cell, readable on the blue and teal cells but with marginal contrast on the lighter green-teal end (~2.6:1); colorbar on right side shows 0-100 gradient, narrow but functional
      Legibility verdict: PASS — all chrome text readable; cell annotation contrast is borderline on lowest-retention cells but still legible

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct warm dark background
      Chrome: Title in light (#F0EFE8-ish) text clearly readable against dark background; axis labels and tick labels in INK_SOFT (#B8B7B0) light enough for dark bg — no dark-on-dark failure; colorbar label and tick labels readable; all chrome correctly flipped for dark theme
      Data: Identical green-to-blue colormap as light render — data colors unchanged; NaN (empty triangular) cells render as #1A1A17 matching the dark background — correct seamless triangular cutout; white text annotations visible on the colored cells; colorbar gradient correct
      Legibility verdict: PASS — no dark-on-dark failures; all text elements use theme-adaptive light colors against the dark surface; data colors identical to light render
