  image_description: The plot displays a triangular heatmap with 10 monthly signup
    cohorts (Jan 2024 to Oct 2024) on the y-axis and 10 periods (Month 0 to Month
    9) on the x-axis. The color scheme uses the GnBu (green-blue) sequential colormap,
    transitioning from dark blue for high retention (100%) to light green for low
    retention (~34%). Each cell contains the retention percentage as white or dark
    text depending on cell darkness. The triangular shape is correctly formed — Jan
    2024 has all 10 periods while Oct 2024 has only 1. Cohort sizes are shown in parentheses
    next to y-axis labels (e.g., "Jan 2024 (n=1,200)"). A vertical colorbar on the
    right shows the 0-100% retention scale. All four spines are removed, and white
    borders separate the cells cleanly. The title reads "heatmap-cohort-retention
    · matplotlib · pyplots.ai" at the top.
