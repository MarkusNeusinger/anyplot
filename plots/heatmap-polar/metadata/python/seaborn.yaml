review:
  strengths:
  - 'Perfect spec compliance: polar heatmap with angular hours, radial days, viridis
    colormap, colorbar legend, and gridlines all correctly implemented.'
  - 'Excellent data quality: realistic website traffic with distinct weekday/weekend
    patterns tells a clear story without annotations.'
  - 'Complete theme adaptation: both renders correctly use #FAF8F1/#1A1A17 backgrounds
    with fully adaptive chrome.'
  - Clock-face orientation (midnight at top, clockwise) is an elegant and intuitive
    choice for hourly cyclic data.
  - 'Near-perfect visual quality: all font sizes explicitly set, no text overlaps,
    viridis ideal for this continuous data type.'
  weaknesses:
  - 'Seaborn library not used for any plotting function: sns.set_theme() is styling
    only — the actual visualization is matplotlib''s pcolormesh with polar projection,
    limiting Library Mastery to minimum scores.'
  - Day labels (Mon-Sun) placed inside the polar data area using dark INK_SOFT color
    in light theme. Against dark purple midnight-hours viridis cells, contrast is
    marginal. Labels should be repositioned outside the circle or given a semi-transparent
    background.
  - Design stays at the well-configured-default level; no focal point emphasis or
    distinctive visual polish elevating it beyond a standard matplotlib polar plot.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Website Traffic · heatmap-polar · seaborn · anyplot.ai" readable in dark text. Hour labels (12am, 6am, 12pm, 6pm) readable at 18pt. Day-of-week labels (Mon-Sun) appear inside the polar data area using dark gray (#4A4A44 INK_SOFT) — in the midnight-to-early-morning sector where viridis cells are dark purple/blue, these labels have marginal contrast. Colorbar label "Hourly Visits" readable at 20pt.
      Data: Viridis colormap from dark purple (~100 visits) to bright yellow (~650 visits). Afternoon peak (green/yellow) visible in lower half; midnight dip (dark purple) in upper quadrants. First series: continuous data uses viridis (not Okabe-Ito — correct).
