    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct warm near-black, not pure black.
      Chrome: Title and all labels flip to light text. Day labels now use light gray (#B8B7B0 INK_SOFT) which reads well against dark midnight viridis cells. No dark-on-dark failures. Colorbar tick labels in light gray.
      Data: Viridis colors identical to light render — afternoon peak and midnight dip in same positions.
      Legibility verdict: PASS — all text readable against dark background.
