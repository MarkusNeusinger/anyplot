      Background: Warm off-white #FAF8F1 — correct per style guide, not pure white
      Chrome: Title "heatmap-polar · pygal · anyplot.ai" in dark #1A1A17 ink, bold, clearly readable. Subtitle in INK_SOFT (#4A4A44). Month labels (Jan-Dec) in dark ink at 40px around ring perimeter — all readable. Year legend labels and colorbar tick labels in INK_SOFT at 28-34px — readable.
      Data: Viridis colormap — deep purple/blue for summer months (Apr-Aug, low ~57-70 kWh), teal/green for spring/autumn, yellow-green for peak winter (Jan, Dec, ~90-101 kWh). Cell gaps (0.022 rad) create white separator lines. White ring separator circles visible between radial bands.
      Legibility verdict: PASS — all text clearly readable against light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct per style guide, not pure black
      Chrome: Title and subtitle use light text (#F0EFE8), clearly readable. Month labels rendered in light ink, readable. Year legend text and colorbar tick labels in light muted tones — readable. No dark-on-dark text failures.
      Data: Viridis cell colors identical to light render — deep purple summer, yellow-green winter peaks. Ring separator lines (PAGE_BG-colored) blend into dark background, making ring boundaries slightly less visible than in light mode, but still functional.
      Legibility verdict: PASS — all text readable against dark background. Minor note: ring separators less visible in dark mode due to PAGE_BG (#1A1A17) matching background, but not a critical failure.
