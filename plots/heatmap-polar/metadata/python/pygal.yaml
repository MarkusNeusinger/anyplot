review:
  strengths:
  - Correct polar heatmap implementation with all spec features present
  - Viridis colormap correctly chosen for continuous heatmap data
  - Both light and dark themes render correctly with proper chrome adaptation
  - Realistic and neutral household energy consumption scenario with factually correct
    seasonal pattern
  - All output files present and correctly named (plot-light.png, plot-dark.png, plot-light.html,
    plot-dark.html)
  weaknesses:
  - No pygal API is used — import pygal is absent; entire implementation is raw SVG
    + matplotlib.cm + cairosvg bypassing the library entirely
  - Year legend color swatches are nearly identical (avg values differ <2% per year)
    — the legend is decorative rather than informative; consider direct radial ring
    labels instead
  - Ring separator lines use PAGE_BG fill — in dark mode these blend into the background;
    use elevated background color or explicit stroke for better dark-theme contrast
  - Inner circle hole (R_MIN=320) is large relative to ring area — consider reducing
    to R_MIN=180-240 for more data-dense rings
  - Colorbar renders 256 individual rect elements instead of SVG linearGradient —
    unnecessary verbosity
  image_description: |-
