review:
  strengths:
  - Correct viridis colormap for continuous data in both themes with per-cell color
    injection
  - Theme-adaptive chrome (background, text, colorbar labels) correctly switches via
    ANYPLOT_THEME tokens
  - Custom SVG post-processing cleanly adds month labels and colorbar that pygal cannot
    natively produce
  - Realistic, neutral energy consumption data with clear seasonal and year-over-year
    patterns
  - Correct title format and output file naming
  weaknesses:
  - No explicit thin borders/gridlines between the radial (year) rings — spec recommends
    them for readability
  - Dec/Jan labels at 12 o'clock are slightly crowded; a small outward offset or font-size
    reduction on those two labels would help
  - Data storytelling could be strengthened — e.g., a brief text annotation or subtle
    emphasis on the peak month
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "heatmap-polar · pygal · anyplot.ai" dark on light — clearly readable. Subtitle in INK_SOFT readable. Month labels around perimeter (42px, dark) all readable. Colorbar labels (kWh, 57/79/101) in INK_SOFT readable. Year legend at bottom readable.
      Data: Viridis colormap applied per-cell. 5 concentric rings (years 2019-2023 inner to outer), 12 angular sectors (months). Winter months (Jan, Feb, Nov, Dec) show yellow-green (high kWh ~90-101), summer months (May-Jul) show dark purple/teal (low kWh ~57-65). First series color is determined by viridis mapping, not Okabe-Ito (correct for continuous data).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct theme surface, not pure black
      Chrome: Title and subtitle rendered in light (#F0EFE8 / INK) text — clearly readable against dark background. Month labels are light-colored and readable. Colorbar labels light and readable. Year legend text light and readable. No dark-on-dark failures found.
      Data: Viridis colormap colors are identical to the light render — only background and text chrome has flipped between themes.
      Legibility verdict: PASS
