review:
  strengths:
  - Correct use of `annular_wedge` — the ideal Bokeh primitive for polar heatmap segments
  - 'Full spec compliance: all required features implemented (angular/radial axes,
    colorbar, hour labels, cell gaps, viridis colormap)'
  - Proper Viridis256 colormap for continuous traffic data — perceptually uniform
    and CVD-safe
  - Clean flat code structure with explicit theme-adaptive chrome tokens throughout
  - Realistic website traffic data with plausible weekday/weekend patterns (morning
    and evening peaks on weekdays, afternoon peak on weekends)
  weaknesses:
  - Title uses `text_font_style = 'normal'` — the style guide recommends bold/medium
    weight for titles; increasing font size to 32–34px would also improve prominence
    at 3600×3600
  - Day labels hardcoded to `text_color='white'` instead of a theme-adaptive token;
    white on viridis cells works but it's an inconsistency if cells with very high
    luminance (yellow) appear
  - Spoke lines use `line_color=PAGE_BG` — in the dark render this makes them invisible
    (near-black lines on dark cells), reducing hour-boundary legibility; a subtle
    neutral alpha line (e.g. rgba(240,239,232,0.25)) would work in both themes
  - 'No visual storytelling: peak traffic hours (9am and 8pm weekdays) are not annotated
    or visually emphasized; a brief callout or title subtitle would guide the viewer
    to the insight'
  - Design lacks a distinctive design touch that elevates it above a competent default
    — larger title, bolder labels, or a subtle annotation would meaningfully raise
    the aesthetic register
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — PASS
      Chrome: Title "Website Traffic · heatmap-polar · bokeh · anyplot.ai" visible at top (small but readable); hour labels "12am, 3am, 6am, 9am, 12pm, 3pm, 6pm, 9pm" placed outside the outermost ring in INK_SOFT grey; day labels (Mon–Sun) in white bold inside the ring cells near the midnight position; colorbar on the right with "Hourly Visits" title and viridis scale
      Data: Annular wedge segments fill 7 concentric rings; viridis colormap transitions from deep purple (low ~80 visits/hour) through blue/teal to bright yellow-green (high ~900 visits/hour); high-traffic peaks clearly visible at 9am and 8pm for weekday rings; weekend rings show a flatter afternoon peak; spoke lines divide hours every 3-hour boundary; inner hole of warm off-white provides clean focal anchor
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire canvas — PASS
      Chrome: Title readable in light text (INK_SOFT); hour labels appear in light grey (#B8B7B0) — readable; day labels remain hardcoded white — still visible on the viridis cells; colorbar background blends into the dark canvas seamlessly
      Data: Data colors are identical to the light render — same viridis colormap, same yellow-green peaks, same purple lows — only chrome flips; the inner hole is now near-black; spoke lines use PAGE_BG (#1A1A17) making them nearly invisible on dark viridis cells — hour boundaries less distinct than in the light render
      Legibility verdict: PASS overall, but spoke lines are invisible (dark on dark) — minor readability concern for hour boundaries; no dark-on-dark text issues
