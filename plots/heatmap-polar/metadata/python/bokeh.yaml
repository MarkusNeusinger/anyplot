review:
  strengths:
  - Correct use of annular_wedge — the ideal Bokeh primitive for polar heatmap segments,
    handles inner/outer radii and angular ranges natively
  - 'Full spec compliance: angular/radial axes, Viridis colormap, colorbar, hour labels,
    cell gaps — all implemented correctly'
  - Realistic and engaging dataset (website traffic with plausible weekday/weekend
    patterns)
  - Clean flat code structure with consistent theme-adaptive chrome tokens throughout
  - Proper Viridis256 colormap for continuous traffic data — perceptually uniform
    and CVD-safe
  weaknesses:
  - Title uses text_font_style=normal instead of bold; increase font size to 32-34px
    for stronger hierarchy at 3600x3600
  - Day labels hardcoded to text_color=white instead of a theme-adaptive token; works
    in practice but is inconsistent with the rest of the chrome
  - Spoke lines use line_color=PAGE_BG making them nearly invisible in dark render
    (near-black on dark Viridis cells); use a neutral rgba line for theme-independent
    visibility
  - 'No visual storytelling: weekday double-peaks and weekend single-peak are discoverable
    but not emphasized; a title subtitle or ring highlight would improve DE-03'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — PASS
      Chrome: Title "Website Traffic · heatmap-polar · bokeh · anyplot.ai" centered at top, readable in dark ink (28px); hour labels at 12am, 3am, 6am, 9am, 12pm, 3pm, 6pm, 9pm placed outside the ring in INK_SOFT grey; day labels (Mon–Sun) in white bold inside ring cells near midnight position; colorbar on right with "Hourly Visits" title and Viridis scale — all readable
      Data: 7 concentric annular rings × 24 angular wedges. Viridis colormap from deep purple (low ~80 visits/hr) to bright yellow-green (peak ~900 visits/hr). Weekday rings (Mon–Fri) show two bright peaks at ~9am and ~8pm. Weekend rings show single afternoon peak around ~2pm. Spoke lines at 3-hour boundaries separate the hourly cells. Inner hole of warm off-white provides clean center anchor.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire canvas — PASS
      Chrome: Title in light text (#F0EFE8), readable; hour labels in light grey (#B8B7B0) — readable; day labels remain hardcoded white — still visible on dark-purple Viridis cells; colorbar background blends into dark canvas seamlessly; spoke lines use PAGE_BG (#1A1A17) making them nearly invisible on dark Viridis cells — hour boundaries unclear in dark render
      Data: Viridis data colors are identical to light render — same yellow-green peaks at weekday 9am and 8pm, same purple lows. Only chrome flips. Inner hole is now near-black.
      Legibility verdict: PASS overall — no dark-on-dark text failures; minor issue: spoke lines invisible in dark render reduces hour-boundary visibility but does not affect text readability
