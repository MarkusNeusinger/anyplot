review:
  strengths:
  - Creative use of geom_polygon to build polar wedge cells manually — plotnine has
    no native polar coordinate, so this is the correct approach and avoids an illegal
    matplotlib fallback
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens applied
    to every non-data element (backgrounds, text, legend, cell borders) in both renders'
  - Correct viridis colormap for continuous single-sign data; thin cell borders using
    PAGE_BG color give clean cell separation without chartjunk
  - 'Perfect spec compliance: all required features present — cyclic angular layout,
    outward radial rings, colorbar with units, angular labels at 12am/6am/12pm/6pm'
  - Realistic and neutral data scenario (website traffic by hour/day) with statistically
    distinct weekday vs weekend patterns that clearly demonstrate the plot type's
    purpose
  weaknesses:
  - 'Font sizes are below style guide recommendations: title 22pt (should be 24pt),
    hour labels 11pt and day labels 9pt (both should be ≥16pt for 3600×3600px canvas).
    These are all explicitly set but too small for the render size.'
  - Day labels placed at fixed x=0.4 inside the inner ring cells, causing them to
    sit awkwardly over the data wedges rather than in a clean label area outside or
    in the true center void (r < 1)
  - DE-01 limited by typography scale and label placement — the overall design is
    competent but not publication-polished; larger labels and a cleaner day-label
    placement strategy would elevate it
  - 'DE-03 could be stronger: no emphasis on peak hours (e.g., a subtle annotation
    or ring highlight for the 9am morning peak on weekdays) to guide the viewer to
    the key insight'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. Panel and plot background both correctly set.
      Chrome: Title "Website Traffic · heatmap-polar · plotnine · anyplot.ai" in dark ink at top — readable. Hour labels 12am/6am/12pm/6pm at cardinal positions in INK_SOFT (medium dark) — readable but small. Day labels (Mon–Sun) rendered as small geom_label boxes with elevated light fill (#FFFDF6) and dark ink text — readable but tight at 9pt.
      Data: 168 wedge-shaped cells arranged in 7 concentric rings (Mon innermost, Sun outermost) × 24 angular hours. viridis colormap: deep purple for low-traffic overnight hours, teal/green for mid-traffic, bright yellow for peak. Prominent yellow-green cluster at 9am–1pm on weekdays clearly visible. Weekend rings show a softer midday peak. Colorbar on right labeled "Visits/hr" with range ~150–700. Thin PAGE_BG cell borders provide clean separation.
      Legibility verdict: PASS — all text readable, no light-on-light failures. Font sizes are set but below style guide recommendations (especially day labels at 9pt, hour labels at 11pt vs recommended ≥16pt).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct. Center void also dark (panel_background).
      Chrome: Title in light ink (#F0EFE8) — clearly readable against dark background. Hour labels in INK_SOFT (#B8B7B0 in dark mode) — readable. Day labels rendered with elevated dark fill (#242420) and light INK text — readable. Legend has dark elevated box with light text — readable.
      Data: Viridis data colors are identical to light render — purple, teal, green, yellow gradient unchanged. Only chrome flipped as expected. Cell borders in PAGE_BG (#1A1A17) blend into background, making borders nearly invisible — a minor detail issue. Peak pattern (9am–1pm weekdays) still prominently visible in yellow.
      Legibility verdict: PASS — no dark-on-dark failures detected. All text elements correctly use theme-adaptive tokens. The center hole is dark (#1A1A17 panel_background showing through) which is correct behavior.
