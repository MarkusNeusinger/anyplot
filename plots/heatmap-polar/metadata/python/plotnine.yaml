review:
  strengths:
  - Creative polygon-based polar construction achieves the spec natively in plotnine
    without fallbacks or matplotlib workarounds
  - Perfect spec compliance — cyclic hour axis, radial day-of-week rings, viridis
    colorbar, time labels at cardinal directions, peak annotation, and thin cell borders
    all present
  - Perfect data quality — realistic website traffic scenario with plausible weekday
    morning/lunch/evening peaks vs. weekend midday peak
  - Clean, reproducible code with proper theme-adaptive tokens throughout (INK/INK_SOFT/PAGE_BG/ELEVATED_BG
    correctly wired to all chrome elements)
  weaknesses:
  - Day labels (Mon–Sun) are placed at x=0, y>0 (midnight position of each ring) where
    viridis renders dark-purple cells; in light render the dark INK (#1A1A17) text
    on dark-purple cells gives reduced legibility — consider adding a semi-transparent
    label background or using INK_SOFT for day labels
  - Design excellence is functional but not visually distinctive — the viridis-on-circular-grid
    look is utilitarian; the overall composition lacks the typographic hierarchy and
    spacing polish needed to score above 85
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "Website Traffic · heatmap-polar · plotnine · anyplot.ai" in dark ink, clearly readable at top. Time labels (12am top, 6am right, 12pm bottom, 6pm left) in INK_SOFT, readable. Day labels (Mon–Sun) in dark INK at x=0 inside each ring — readable overall but with reduced contrast at the midnight/12am position where viridis renders dark purple cells.
      Data: All 168 cells (7 days × 24 hours) visible with viridis palette — dark purple for low overnight traffic, transitioning through teal/green to bright yellow-green for weekday morning peaks (~9–13h). Weekend rings show a gentler single midday peak. "Peak 9am–1pm weekdays" annotation in INK_SOFT in lower-right, readable. Colorbar legend "Visits/hr" with range ~200–700 on right side.
      Legibility verdict: PASS (minor: day label contrast slightly reduced on dark-purple cells, but still readable)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8, clearly readable against dark background. Time labels in INK_SOFT (#B8B7B0), clearly visible. Day labels now in light INK (#F0EFE8) on dark viridis cells — good contrast. Legend background uses ELEVATED_BG (#242420), legend text readable. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — same viridis gradient, same peak position, same weekday/weekend pattern. The yellow-green peak is equally prominent in both themes. Colorbar readable with light text.
      Legibility verdict: PASS
