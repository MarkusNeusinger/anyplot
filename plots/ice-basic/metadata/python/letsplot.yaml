    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — matches the required light surface. Panel background blends with outer plot background giving a unified appearance.
      Chrome: Title "ice-basic · letsplot · anyplot.ai" in dark ink (size 24) is clearly readable. Subtitle in smaller text below. Axis labels "Square Footage (sq ft)" and "Predicted Price ($K)" are visible (size 20). Tick labels readable in INK_SOFT (size 16). Legend on the right with "Series" heading and three entries (Suburban, Urban, Avg. Trend (PDP)) all readable.
      Data: ~50 Suburban ICE lines in #009E73 (brand green) at alpha=0.15, ~50 Urban ICE lines in #D55E00 (vermillion) at alpha=0.15, and one bold black PDP line (size=2.5) showing the average. Lines show a clear positive monotonic trend with steps typical of gradient boosting. Urban curves cluster noticeably higher, revealing the neighborhood interaction effect.
