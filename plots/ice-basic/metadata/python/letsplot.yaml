    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — matches the required dark surface. Consistent warm-dark tone, not pure black.
      Chrome: Title and labels appear in #F0EFE8 (light ink) and #B8B7B0 (soft ink) — clearly readable against the dark background. No dark-on-dark failures observed. The PDP overlay line has switched to white/near-white (INK token in dark theme), creating strong contrast. Legend text and title are legible.
      Data: ICE line colors are identical to the light render — Suburban green (#009E73) and Urban orange (#D55E00) are unchanged, only chrome flipped. The PDP overlay becomes white/light in the dark theme, which is the correct adaptive behavior (INK token). The ICE density and pattern are clearly visible with good contrast against the dark background.
      Legibility verdict: PASS — all text elements readable against the near-black background; no dark-on-dark issues.
