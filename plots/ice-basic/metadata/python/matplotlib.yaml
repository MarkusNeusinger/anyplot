    GradientBoostingRegressor scenario'
  - 'KISS code structure: no functions/classes, deterministic seed in both np.random.seed
    and model random_state'
  weaknesses:
  - 'DE-01 (5/8): The alpha-density ICE visualization is well-executed but stops short
    of FiveThirtyEight-level polish — no subtitle or annotation calling out the key
    insight (e.g. spread widens past 2500 sqft)'
  - 'DE-02 (4/6): Grid alpha=0.10 is correct but rug_y uses ax.get_ylim()[0] before
    final layout, which could misplace the rug if tight_layout shifts limits; no explicit
    tick removal to further reduce chrome'
  - 'DE-03 (4/6): Visual hierarchy is clear (bold orange PDP vs subtle green ICE)
    but no focal annotation highlights where individual curves diverge from the average
    — viewer must discover the story themselves'
  - 'LM-02 (3/5): FuncFormatter and Line2D handles are idiomatic matplotlib but are
    common techniques; no use of more distinctive matplotlib features (e.g. fill_between
    for confidence band, axline for reference)'
