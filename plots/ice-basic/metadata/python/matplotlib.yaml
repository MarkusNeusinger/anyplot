  - 'Correct Okabe-Ito palette: #009E73 for ICE lines, #D55E00 for PDP — canonical
    order followed'
  - Both light (#FAF8F1) and dark (#1A1A17) themes fully implemented with all chrome
    tokens (INK, INK_SOFT, INK_MUTED) applied to every element
  - All font sizes explicitly set (title=24, labels=20, ticks=16) — reads well at
    4800x2700px
  - Rug plot adds distributional context without cluttering the visualization
  - alpha=0.14 on 120 ICE lines creates an effective density band that intuitively
    shows heterogeneous effects
  - Dollar FuncFormatter on y-axis is professional and informative
  - Custom Line2D legend handles are idiomatic matplotlib
