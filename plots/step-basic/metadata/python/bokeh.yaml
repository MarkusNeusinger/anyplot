review:
  strengths:
  - 'Perfect spec compliance: correct step chart with p.step(mode=''after''), markers
    at each data point, descriptive axis labels with units'
  - 'Excellent theme adaptation: all chrome tokens correctly wired for both light
    and dark renders; no dark-on-dark failures'
  - Deterministic, realistic data (monthly cumulative sales) with appropriate variability
    in step heights (13-23 unit increments)
  - Clean, linear KISS code structure with all imports used and correct plot-{THEME}.png
    + .html output filenames
  weaknesses:
  - Box outline retained (outline_line_color = INK_SOFT) keeps all four spines; set
    p.outline_line_color = None and remove X-axis grid for a cleaner L-frame look
    per style guide
  - Both X and Y grid lines enabled; for a step/line chart, Y-axis grid only is preferred;
    X-axis grid adds visual noise
  - 'No visual storytelling or hierarchy: data is monotonically increasing with no
    emphasis on inflection points or acceleration periods; consider varea_step fill
    or marker size variation'
  - Scatter markers size=18 are small relative to 4800x2700 canvas; increase to 25-30
    for better definition
  - 'No bokeh-distinctive features: no HoverTool or interactive elements; the HTML
    output offers no tooltip benefit currently'
