review:
  strengths:
  - 'Perfect spec compliance — all required features present: background tracks, rounded
    end-caps, center annotation, outer-to-inner ring ordering, legend with metric
    values and units'
  - 'Palette and theme-adaptive chrome correctly implemented: brand green as outer/primary
    ring, INK/INK_SOFT/INK_MUTED tokens threaded through all text elements in both
    themes with no dark-on-dark failures'
  - Center 76% annotation is a genuine design improvement that creates a clear focal
    point and at-a-glance completion summary
  - Code is clean, well-structured, and fully deterministic with three small focused
    helper functions and no unnecessary abstraction
  - Generates interactive HTML with rich hovertemplate on each arc (name, value/goal,
    percentage), making good use of Plotly's distinctive interactive capability
  weaknesses:
  - 'Background tracks at 14% opacity are nearly invisible in dark render against
    the near-black #1A1A17 surface — the remaining-progress cue is lost; fix by using
    theme-conditional opacity (0.14 light / 0.22 dark)'
  - Inner arc faceting is slightly visible due to N_POINTS=400 at small radii — fix
    by scaling point count inversely with radius, e.g. max(400, int(600 / radius))
    per ring
  - Legend font size 10px (40px rendered at scale=4) is on the small side — increasing
    to 11px would improve legibility at mobile widths
