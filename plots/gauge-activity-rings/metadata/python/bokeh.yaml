review:
  strengths:
  - 'Perfect spec compliance: all required features implemented (concentric arcs,
    background tracks, rounded end caps, 3-ring canonical count, centre summary, per-ring
    legend)'
  - Flawless Imprint palette usage in canonical order with fully theme-adaptive chrome
    tokens across both renders
  - Clean, readable linear code structure with correct bokeh idioms (annular_wedge,
    match_aspect, Selenium PNG export)
  - 'Strong data storytelling: fitness context immediately clear; colour-coded legend
    percentages reinforce ring identity'
  weaknesses:
  - 'Ring spacing (gap=0.06 units) is smaller than end-cap radius (CAP_R=0.09), causing
    end-cap circles to reach adjacent ring territory at 12 o clock start position.
    Fix: reduce CAP_R to 0.05 or spread OUTER_RADII for a gap of 0.10+ (e.g. [0.82,
    0.54, 0.26] with RING_WIDTH=0.18)'
  - '"avg complete" text at y=CY-0.15 is on the boundary of the inner blue ring inner
    edge (at y=-0.04), entering the ring fill area in light mode and reducing contrast.
    Fix: move to y=CY-0.08 to stay fully inside the inner clear space'
  - 'Faint background tracks at alpha=0.13 become very subtle in dark mode, nearly
    invisible for the outer green ring. Fix: increase to alpha=0.18 in dark theme'
  - 'Thin border artifact visible in dark render. Fix: set p.outline_line_width=0
    explicitly'
  image_description: |-
