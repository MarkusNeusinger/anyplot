      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title in light cream ink (#F0EFE8), legend metric names in light ink, value/goal text in secondary light ink (#B8B7B0). All text clearly visible against the dark background. No dark-on-dark failures observed.
      Data: Ring colours identical to light render (green, lavender, blue) — data colours correctly theme-independent. Faint background tracks at 13% alpha appear as very subtle dark-tinted shadows on the dark surface; slightly less prominent than in light mode but still perceptible. Centre "79%" readable in light ink.
