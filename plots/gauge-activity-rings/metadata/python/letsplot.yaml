review:
  strengths:
  - Correct concentric radial ring layout with outer-to-inner ordering and equal stroke
    widths
  - Background tracks rendered at alpha=0.15 providing subtle full-circle guides behind
    each progress arc
  - 'Imprint palette applied in canonical order (green, lavender, blue) with correct
    first series #009E73'
  - 'Both theme backgrounds correct (#FAF8F1 light, #1A1A17 dark) with theme-adaptive
    chrome tokens throughout'
  - Center 'Daily Activity' label adds elegant contextual summary inside the innermost
    ring
  - Color-coded metric labels with percentage and value/goal sub-labels provide clear
    legibility without a traditional legend
  - coord_fixed() correctly preserves circular ring geometry
  - Deterministic data taken directly from the spec example (Move 420/600, Exercise
    25/30, Stand 9/12)
  - Clean KISS code structure with no functions or classes
  - HTML export included alongside PNG output
  weaknesses:
  - Missing rounded line caps on geom_path arcs — the spec explicitly requires lineend='round'
    for the iconic activity-rings look; current square/butt caps make the arcs look
    like basic donut segments rather than the fitness-tracker aesthetic
  - Visible panel frame/border appears in both renders — a thin dark rectangle in
    light mode and a thin lighter rectangle in dark mode is visible around the plot
    area; add panel_border=element_blank() to the theme to remove it (theme_void()
    does not eliminate this in letsplot)
  - Blue ring label text (#4467A3) for 'Stand 75%' in dark render has borderline contrast
    (~3.1:1) against the near-black background — borderline acceptable for large text
    but worth noting
  - LM-02 score is low because the implementation uses only generic ggplot2-compatible
    patterns with no letsplot-distinctive features (e.g., interactive tooltips in
    the HTML output via geom_text tooltips or letsplot-specific layer configs)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "gauge-activity-rings · python · letsplot · anyplot.ai" renders in dark ink at top, fully readable. No axis labels or tick labels (theme_void). Center text "Daily / Activity" renders in INK_SOFT (dark secondary). Metric labels "Move 70%", "Exercise 83%", "Stand 75%" in respective ring colors below rings. Sub-labels "420 / 600 kcal", "25 / 30 min", "9 / 12 hr" in muted ink. A thin dark rectangular frame is visible around the canvas edge — this is a panel border that was not removed by theme_void.
      Data: Three concentric rings: outer=Move (green #009E73, sweeping ~70% clockwise from 12 o'clock), middle=Exercise (lavender #C475FD, sweeping ~83%), inner=Stand (blue #4467A3, sweeping ~75%). Background tracks show full circles at alpha=0.15 in each ring color. Arc endpoints have flat/butt caps — rounded end caps (spec-required for iconic look) are absent.
      Legibility verdict: PASS — all text elements are readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct theme surface, not pure black. A thin lighter-colored rectangular frame is visible at the canvas edge.
      Chrome: Title renders in off-white (#F0EFE8) — clearly readable on dark background. Center "Daily / Activity" renders in secondary light text, readable. Metric labels render in their ring colors: Move green and Exercise lavender are clearly readable; Stand blue (#4467A3) has borderline contrast (~3.1:1) against the dark background — technically acceptable for large text, not critical. Sub-labels in muted light gray (#A8A79F), readable.
      Data: Ring colors are identical to light render (#009E73, #C475FD, #4467A3) — data colors correctly unchanged across themes. Background tracks at alpha=0.15 over dark background produce very dark faint rings, visible but subtle. Overall ring contrast is good against the dark background.
      Legibility verdict: PASS — no dark-on-dark failures for chrome elements. The blue (#4467A3) ring label has borderline contrast but is readable at this text size.
