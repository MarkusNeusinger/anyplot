review:
  strengths:
  - Clean activity rings design using Imprint palette correctly (green outer, lavender
    middle, blue inner)
  - Rounded end caps implemented via Circle patches at both endpoints of each arc
    — gives the iconic wearable-tracker look
  - Background tracks at alpha=0.15 clearly show remaining progress without competing
    with the arcs
  - Center summary 79% provides strong focal point; "Daily Goals" subtitle adds context
  - Per-ring labels use matching ring colors with value/goal/unit/percent — informative
    and visually cohesive
  - Square 2400×2400 canvas appropriate for symmetric rings; no bbox_inches=tight
    drift
  - 'Theme adaptation is correct: INK and INK_MUTED tokens used for chrome text, data
    colors constant across both renders'
  - Code is clean, flat, and fully deterministic (no random seed needed — data is
    hardcoded)
  weaknesses:
  - Daily Goals subtitle at fontsize=9 may be too small for mobile display (~8 CSS
    px at 400px width) — increase to at least 11pt
  - Per-ring bottom labels at fontsize=10 similarly risk mobile illegibility (~9 CSS
    px at 400px width) — increase to 11-12pt
  - 'INK_SOFT token (#4A4A44 light / #B8B7B0 dark) is defined in the style guide but
    not declared in the code — minor token hygiene issue, though has no visual impact
    since ax.axis(off) suppresses all chrome'
  - 'DE-01 ceiling: no emphasis on the nearly-complete ring (Exercise at 93%) — a
    subtle highlight glow or slightly brighter color could add storytelling lift'
