review:
  strengths:
  - Rounded end caps (lineend='round') achieve the iconic Apple Watch-style activity
    ring look perfectly
  - Background tracks are correctly color-blended with PAGE_BG per theme (TRACK_ALPHA
    computation) rather than a flat overlay, producing natural-looking faint tracks
    in both light and dark renders
  - theme_void() + coord_equal() is exactly the right pair for a circular chart —
    no axes, no grid, perfectly round rings
  - 'Imprint palette positions 1-3 (green #009E73, lavender #C475FD, blue #4467A3)
    used in canonical order'
  - 'Theme-adaptive chrome is fully correct: title, legend text, legend box all flip
    between dark INK (#1A1A17) and light INK (#F0EFE8) correctly across renders'
  - Legend provides full context with metric name, current value, goal, and percentage
    — no axis labels needed
  - 'Clean KISS code: deterministic data, no functions or classes, all imports used'
  weaknesses:
  - No center label in the ring area — the spec explicitly mentions 'Optional center
    label area can show a headline summary'; adding a geom_text at (0,0) with a summary
    value (e.g. overall average completion or the primary metric value) would elevate
    storytelling significantly
  - No per-ring endpoint annotations — small percentage labels or tick marks at each
    arc's end would allow the viewer to read progress without consulting the legend,
    improving data storytelling (DE-03)
  - Library Mastery is limited — the entire radial chart is manual coordinate math
    (theta→x,y); while plotnine lacks native coord_polar, more idiomatic plotnine-specific
    usage (e.g. annotate(), geom_text() for ring labels) could raise LM-02
  - Slight excess whitespace between the title and the top of the rings — coord_equal
    xlim/ylim could be tightened to ylim=(-4.2, 4.2) or similar to reduce the gap
    and better utilize canvas height
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "gauge-activity-rings · python · plotnine · anyplot.ai" in dark ink, centered, size=12pt, clearly readable. No axis labels (theme_void). Legend at bottom in a slightly elevated (#FFFDF6) box with dark INK_SOFT text, showing three entries with color swatches.
      Data: Three concentric partial arcs with rounded end caps. Outer ring: green (#009E73) Move at 70% completion (sweeps ~252° clockwise from 12 o'clock). Middle ring: lavender (#C475FD) Exercise at 83% (~299°). Inner ring: blue (#4467A3) Stand at 75% (~270°). Each ring has a faint blended background track (ring color blended with PAGE_BG at 20% alpha) showing the full circle.
      Legibility verdict: PASS — all title, legend text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title text is light (#F0EFE8), clearly readable against dark background. Legend box has elevated dark fill (#242420) with subtle INK_SOFT border. Legend text is light-colored and readable.
      Data: Same three concentric arcs with identical Imprint colors (green/lavender/blue) — data colors unchanged from light render as required. Background tracks appear as dark-blended variants of each ring color (32% alpha on dark surface), giving a slightly deeper tone that remains distinguishable.
      Legibility verdict: PASS — title and legend text are light-on-dark and clearly readable. No dark-on-dark failures detected. Brand green #009E73 visible and reads well on the dark surface.
