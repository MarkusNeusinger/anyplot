review:
  strengths:
  - 'Spec-perfect concentric ring chart: outer→inner ordering, clockwise sweep from
    12 o clock, rounded caps via lineend=round, faint background tracks — all exactly
    as specified'
  - 'Imprint palette (positions 1–3: green/purple/blue) in canonical order; backgrounds
    #FAF8F1/#1A1A17 correct; data colors identical across both themes'
  - Center headline 76% avg provides an at-a-glance summary focal point
  - Clean void theme with theme_void() is the right call for a radial chart — no unnecessary
    chrome
  - Fully deterministic, clean flat-script code; all plotnine API usage is current
    and idiomatic
  - Realistic Apple Watch fitness data directly from spec example; all three values
    and percentages are accurate
  weaknesses:
  - Arc endpoint percentage labels are too small (size=2.8mm plotnine units ≈ 8pt)
    — they become approximately 7px at 400px mobile display width, which is below
    the mobile-readable threshold. Increase endpoint label size to at least size=3.5–4.0.
  - Track colors are computed via manual RGB blending against page background rather
    than using true alpha transparency. Consider using geom_path with alpha=0.18 if
    plotnine supports alpha on paths, or document as intentional workaround.
