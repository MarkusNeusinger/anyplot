review:
  strengths:
  - Correct Imprint palette applied in canonical order; both theme renders pass legibility
    and chrome checks
  - Font sizes explicitly set with a smart scaling formula for the long title; fully
    readable in both themes
  - Legend enriched with actual values and units (e.g., 'Move 420/600 kcal') — informative
    beyond just a color key
  - Deterministic data from the canonical spec example; realistic and neutral fitness
    domain
  - Clean, flat code structure; interactive HTML output alongside PNG
  weaknesses:
  - 'Concentric layout missing: spec requires all rings to share one center point
    at different radii (Activity Rings style). Implementation renders three separate
    donut charts stacked vertically instead.'
  - 'Rounded arc end caps absent: spec explicitly calls for rounded line caps for
    the iconic look; pygal SolidGauge uses flat arc ends.'
  - Background track should use ring color at low opacity (not neutral gray). Spec
    says 'typically the ring color at low opacity'.
  - 'Canvas utilization suboptimal: three stacked vertical donuts leave wide empty
    margins left and right; concentric layout would naturally fill the square canvas
    better.'
  - 'No visual hierarchy: no emphasis indicating which goal is on track vs. behind
    — data is displayed but not interpreted.'
