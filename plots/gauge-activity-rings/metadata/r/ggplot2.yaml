review:
  strengths:
  - Correct Imprint palette with brand green as the outer primary ring, lavender for
    exercise, and blue for stand — canonical order and colors identical between themes
  - 'Complete spec compliance: concentric arcs with rounded end caps, faint background
    tracks, center average percentage, and per-ring color-coded labels with value/goal/percentage'
  - Square canvas (2400x2400) and theme_void are ideal choices for this radial chart
    — no unnecessary chrome
  - Clean, readable code with efficient arc/track helper functions using trigonometric
    path generation in Cartesian coordinates
  - Proper theme-adaptive chrome tokens applied throughout — background, center text,
    and label colors adapt correctly between light and dark renders
  weaknesses:
  - 'Blue ring (Stand label #4467A3) has borderline contrast against the near-black
    dark background (#1A1A17) — consider lightening the label text to INK_SOFT (#B8B7B0)
    for the unit/percentage values while keeping the metric name in ring color'
  - 'DE-03: Center focal point limited to a single average percentage — the storytelling
    could be stronger by visually emphasizing the near-complete Exercise ring (83%)
    or adding a short motivational annotation'
  - The right-side label block (3 metrics × 3 lines each) is functional but somewhat
    dense — a small vertical gap between label groups would improve scannability
