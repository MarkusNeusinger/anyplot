    visual range and show the iconic 'almost complete' vs. 'well under goal' contrast
  - Center label font sizes (17px metric, 14px header) could be slightly larger (20–22px
    for metric labels, 16px for header) to improve readability at mobile-scaled sizes
    and better fill the inner ring's empty space
  - Bottom-row raw values at 14px CSS are at the minimum readable threshold — consider
    15–16px
