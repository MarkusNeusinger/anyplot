review:
  strengths:
  - Correct ECharts gauge-series implementation with concentric rings, roundCap end
    caps, and faint background tracks — exactly as the spec calls for
  - Imprint palette positions 1–3 correctly assigned to the three rings (green→Steps,
    lavender→Active Min, blue→Stand); colors identical across light and dark renders
  - Square orientation directive present; rings fill the canvas well with no wasted
    space
  - Center graphic overlay in matching ring colors elegantly links legend to each
    ring without a separate legend box
  - 'Data is realistic and varied: 45.2% / 95% / 100% completion levels create immediate
    visual narrative showing Steps as the laggard'
  - 'Perfect spec compliance: 90° start, clockwise sweep, roundCap, background track,
    equal stroke widths, three rings from outer to inner'
  - 'Clean, idiomatic ECharts code — gauge series with axisLine track, pointer/tick/label
    disabled, graphic layer for annotations; animation: false correctly set'
  weaknesses:
  - Secondary text elements — 'Daily Goals' header and the bottom raw-values row ('4,521
    / 10,000 steps · 57 / 60 min · 12 / 12 hr') — are at fontSize 16 CSS px. At the
    400px mobile srcset width these render at ~3–4 px and are barely legible. Increase
    both to at least 18–20 CSS px to remain readable at mobile scale.
  - Design polish in the center label area is functional but plain — five stacked
    lines of text (italic header + 3 metric lines + bottom row) feel slightly cluttered.
    Consider tightening vertical spacing, making the percentage values larger/more
    prominent, or consolidating the bottom raw-values row into the center area with
    a cleaner layout.
  - DE-01 (Aesthetic Sophistication) is at the 'well-configured default' level — the
    rings themselves are clean but the composition lacks extra polish (e.g., a soft
    inner glow on the progress arc tip, slightly varied ring widths to create visual
    weight hierarchy, or a cleaner center-label typographic scale).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly set via transparent backgroundColor, page surface shows through. PASS.
      Chrome: Title "gauge-activity-rings · javascript · echarts · anyplot.ai" at fontSize 22 in t.ink (dark ink), centered at top — fully readable. Center "Daily Goals" italic label at fontSize 16 in t.inkSoft — readable at full res, very small at 400px mobile. Three metric labels (Steps: 45.2%, Active Min: 95%, Stand: 100%) at fontSize 22 bold in their respective ring colors — clearly readable. Bottom raw-values row at fontSize 16 in t.inkSoft — readable at full res but very small (~3–4 px) at the 400px srcset variant.
      Data: Outer ring (Steps, #009E73 brand green) sweeps ~45% of the circle clockwise from 12 o'clock. Middle ring (Active Min, #C475FD lavender) sweeps ~95%, nearly a full circle. Inner ring (Stand, #4467A3 blue) is a complete 100% circle. Background tracks visible as faint same-hue circles at ~15% opacity behind each arc. Rounded end caps on the progress arcs are clear. Rings are thick and prominent, filling the canvas well.
      Legibility verdict: PASS — all primary text readable; secondary 16px text borderline at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly set via transparent background, dark page surface shows through. PASS.
      Chrome: Title in t.ink (#F0EFE8 light cream) — clearly readable against the dark background. Center "Daily Goals" in t.inkSoft (#B8B7B0) — readable. Metric labels in their respective ring colors (green, lavender, blue) — all highly visible and bright against dark surface. Bottom raw-values row in t.inkSoft (#B8B7B0) at fontSize 16 — readable at full res, very small at 400px. No dark-on-dark failures detected.
      Data: Identical data colors to light render — outer ring green, middle ring lavender, inner ring blue. Colors are vivid against the dark background, especially the lavender which appears very bright. Background tracks at 15% opacity are darker and subtler on the near-black surface, still distinguishable. Full-circle Stand ring clearly complete.
      Legibility verdict: PASS — all primary text readable. Secondary 16px text (Daily Goals header and bottom values row) is small but passes at full resolution; at 400px mobile it is barely legible.
