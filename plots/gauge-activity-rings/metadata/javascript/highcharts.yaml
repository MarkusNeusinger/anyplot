review:
  strengths:
  - 'Perfect spec compliance: three concentric rings with correct 12-o''clock start,
    clockwise sweep, rounded caps, and faint background tracks exactly as specified'
  - Highcharts SVG Renderer used expertly to hand-craft the entire visualization via
    chart.events.render — a genuinely Highcharts-specific capability
  - 'Complete Imprint palette compliance: Move=palette[0] (#009E73), Exercise=palette[1],
    Stand=palette[2]; data colors identical between light and dark'
  - 'Theme-adaptive chrome: title uses t.ink, legend/labels use t.inkSoft, background
    is transparent (pageBg from harness shows through correctly)'
  - Center label (70% / Move goal) creates an immediate focal point and communicates
    the headline metric at a glance
  - Faint background tracks at 18% opacity show remaining progress cleanly in both
    themes
  - Deterministic hardcoded data matching the spec's canonical example (Move 420/600,
    Exercise 25/30, Stand 9/12)
  - Square orientation directive correctly applied for the ring chart
  weaknesses:
  - Legend value detail text is 12px CSS — slightly below the recommended 14px floor;
    in dark mode these become faint. Increase to 13-14px for better mobile legibility.
  - Dead space between ring bottom and legend bottom is too large (~170px CSS). Reposition
    the legend closer to the rings by either increasing ring size slightly or moving
    legY up, so the layout uses the canvas more evenly.
  - Background tracks at 18% opacity are nearly invisible in dark mode for the middle
    (lavender) and inner (blue) rings — consider 0.22-0.25 opacity for dark theme
    or making tracks slightly thicker.
  - Two helper functions (clearEls, drawRings) are defined — minor KISS deviation;
    for Highcharts SVG renderer this is idiomatic but represents added structural
    complexity.
  - 'DE-03: The chart displays the data clearly but leaves storytelling potential
    on the table — adding per-ring percentage annotations near each arc''s endpoint
    (or a subtle ''completed / in-progress'' framing) would elevate the visual narrative.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), correct — never pure white.
      Chrome: Title "gauge-activity-rings · javascript · highcharts · anyplot.ai" in bold dark text (~22px), fully readable. Subtitle "Daily fitness goal completion" in medium gray, readable. No axes or grid (appropriate for ring chart). Custom bottom legend with three colored dot/label pairs, all readable.
      Data: Three concentric activity rings centered on canvas. Outer ring (Move): brand green #009E73, ~70% filled — clearly visible arc with faint green track behind it. Middle ring (Exercise): lavender #C475FD, ~83% filled — purple arc clearly visible. Inner ring (Stand): blue #4467A3, ~75% filled — blue arc clearly visible. All arcs have rounded end caps as required. Faint background tracks visible for all three rings. Center label "70%" at large 46px in dark ink, with "Move goal" caption beneath in medium gray — both readable.
      Legibility verdict: PASS. All text readable. First series is #009E73. No overflow.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correct — not pure black.
      Chrome: Title text is light/white (#F0EFE8 via t.ink), clearly readable against dark background. Subtitle in light gray, readable. Legend text in light gray (#B8B7B0 via t.inkSoft), readable. Center "70%" in light (#F0EFE8), readable. Center "Move goal" caption in lighter gray, readable.
      Data: Ring colors are identical to light render — green outer, lavender middle, blue inner. Rounded caps intact. Background tracks are noticeably fainter in dark mode: the outer green track remains subtly visible as dark teal, but the middle lavender track and especially the inner blue track are nearly indistinguishable from the near-black background (18% opacity of already-dark hues over dark bg). Progress arcs in full-saturation color remain clearly visible. No dark-on-dark text failures.
      Legibility verdict: PASS. All text readable. No dark-on-dark failures. Minor: inner ring background tracks barely visible in dark mode.
