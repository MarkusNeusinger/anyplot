review:
  strengths:
  - Custom afterDraw plugin creates a radial gradient glow behind the center percentage
    — elegant focal point that immediately communicates overall progress
  - Glowing endpoint dots (shadowColor + shadowBlur on canvas arc) mark each ring's
    progress tip with subtle professional polish
  - Rich custom legend labels (value / goal / unit / percentage) pack full context
    into a single clean row
  - Theme-adaptive track opacity (0.15 light / 0.28 dark) ensures the background arcs
    stay visible in both themes without overpowering the progress arcs
  - 'Complete Imprint palette compliance: Move=#009E73, Exercise=#C475FD, Stand=#4467A3
    in correct canonical order'
  - Exercise ring correctly clamps to full circle visually and labels '>127%' in the
    legend — handles goal-exceeded case per spec
  - Square orientation correctly chosen; rotation:-90 places the start at 12 o'clock
    exactly as the spec requires
  - generateLabels() override produces descriptive, information-dense legend entries
    rather than the default dataset-name labels
  weaknesses:
  - Legend font (17px CSS = ~34 source-px on 2400×2400 canvas) is slightly small —
    the rich label text with value/goal/unit/% makes each legend entry very wide,
    compressing readability at mobile scale; consider reducing label verbosity or
    increasing legend font to 19-20px
  - 'CQ-01: hexToRgba helper function and centerTextPlugin object add structural complexity
    beyond pure KISS; the helper is used 4 times (justified), but the plugin object
    could be passed inline to the plugins array without a named variable'
  - 'DE-02: The chart rings extend very close to the canvas edges (particularly left/right
    in the dark render); slightly reducing the chart area or adding explicit chart
    padding would improve breathing room'
  - 'DE-01: The glow effects are present but subtle — the radial gradient radius (90px)
    is quite small relative to the 1200px CSS canvas, making the center glow nearly
    invisible; consider increasing to 130-150px for a more distinctive accent'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "gauge-activity-rings · javascript · chartjs · anyplot.ai" in dark ink at top — fully readable. Legend at bottom with colored circle dots and rich text labels ("Move · 420/600 kcal · 70%", "Exercise · 38/30 min · >127%", "Stand · 9/12 hr · 75%") — readable though text is dense.
      Data: Three concentric doughnut rings. Outer ring in #009E73 brand green (Move, 70% filled). Middle ring in #C475FD lavender (Exercise, full circle = 127% achieved). Inner ring in #4467A3 blue (Stand, 75% filled). Background tracks visible as low-opacity versions of same hues. Center shows bold "82%" (avg pct) with "avg. complete" sublabel. Glowing dots at each ring's progress endpoint. Exercise ring shows full arc with no gap (goal exceeded).
      Legibility verdict: PASS — all text is clearly readable against the light background; center percentage is prominent; no dark-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface, warm not pure black.
      Chrome: Title in light cream text — readable. Legend at bottom in light text — readable, though the text sits close to the bottom edge of the canvas. "avg. complete" sublabel in lighter inkSoft token color — visible. Center "82%" in light cream, clearly readable against the dark center area.
      Data: Colors identical to light render — same green/lavender/blue rings, same background tracks. Data colors have not shifted. Track alpha is correctly increased (0.28 vs 0.15) for the dark surface, keeping them visible without overpowering the progress arcs.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures detected; center percentage and ring colors contrast well against the near-black surface.
