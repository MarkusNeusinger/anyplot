    render because the translucent palette colors merge into the near-black (#1A1A17)
    background — increase alpha to ~0.25 in dark theme or use a lighter base for the
    track
  - Legend font size (14px CSS) renders small at the bottom of the 2400×2400 image
    — increase to 16-18px for better readability at mobile widths
  - 'DE-01 is moderate: chart uses elegant patterns but the overall design stays close
    to Chart.js doughnut defaults with no extra polish beyond center text and custom
    legend'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white.
      Chrome: Title "gauge-activity-rings · javascript · chartjs · anyplot.ai" in dark ink at top, clearly readable. No axis labels (radial chart). Legend at bottom with three entries (Move, Exercise, Stand) readable but small. Center text "82%" (bold, large, dark) and "avg. complete" (lighter, smaller) visible and readable.
      Data: Three concentric doughnut rings — outer (Move) in brand green #009E73, middle (Exercise) in lavender #C475FD, inner (Stand) in blue #4467A3 — Imprint palette positions 1-3 in canonical order. Background tracks visible as faint 15%-opacity arcs of the corresponding ring color. Progress arcs have rounded end-caps giving the iconic fitness-tracker look. Exercise ring is full (>100% complete, clamped to 360°).
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface.
      Chrome: Title in light/white ink readable at top. Center text ("82%", "avg. complete") renders in light ink and is clearly visible. Legend at bottom shows light-colored text, readable but small. No dark-on-dark failures.
      Data: Ring colors are identical to light render (#009E73, #C475FD, #4467A3) — only chrome flips as expected. Background tracks are present but nearly invisible in dark theme (15%-opacity palette colors on near-black background produce very dark translucent arcs). The colored progress arcs themselves are clearly visible and vibrant against the dark background.
      Legibility verdict: PASS — all chrome text readable. Minor: background tracks are much fainter in dark mode than in light mode, slightly reducing "remaining progress" readability.
