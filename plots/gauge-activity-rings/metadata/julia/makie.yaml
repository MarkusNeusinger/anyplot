  strengths:
  - 'Perfect spec compliance — all required features implemented: thick arcs from
    12 o''clock clockwise, faint background tracks, rounded end caps via scatter dots,
    center 76% COMPLETE summary, per-ring legend strip with values and units'
  - 'Correct Imprint palette in canonical order (#009E73 outer, #C475FD middle, #4467A3
    inner) — data colors identical between light and dark renders'
  - 'Proper theme-adaptive chrome throughout: title, center text, and legend text
    correctly flip between dark INK and light INK tokens'
  - Square 2400x2400 canvas correctly chosen for circular composition; DataAspect()
    ensures perfect circles
  - 'Clean idiomatic Julia: zip/range/pi for arc generation, dot-broadcasting for
    fractions, flat sequential script with no classes or functions'
  - Fitness-tracker aesthetic is instantly recognizable and well-executed; the 76%
    center summary provides immediate at-a-glance context
  weaknesses:
  - 'Background track opacity (0.12f0) is too low in dark mode — the green (#009E73)
    track at 12% on #1A1A17 background is nearly invisible, undermining the remaining-progress
    visual cue; raise to 0.20-0.25 for dark theme (branch on THEME) or use a fixed
    lighter-contrast neutral track color'
  - End caps are simulated with scatter! dots rather than using Makie native linecap
    support, causing a subtle dot/line join seam at arc endpoints; consider lines!(...;
    linecap=:round) if supported by CairoMakie 0.21, or keep scatter approach but
    verify seam is invisible
  - Bottom legend color dots (markersize=16 device px -> 32 output px) are visually
    small relative to the 2400px canvas; increase to markersize=22-24 for better visual
    weight at catalog thumbnail sizes
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "gauge-activity-rings · julia · makie · anyplot.ai" in dark ink at top — clearly readable. Center "76%" in large dark text and "COMPLETE" in muted gray below it — both readable. Bottom legend strip shows "Move", "Exercise", "Stand" labels in dark ink and "420 / 600 kcal", "25 / 30 min", "9 / 12 hr" in soft dark ink — all readable.
      Data: Three concentric progress arcs. Outer ring: brand green #009E73 sweeping ~70% clockwise from 12 o'clock. Middle ring: lavender #C475FD sweeping ~83%. Inner ring: blue #4467A3 sweeping ~75%. Faint full-circle background tracks visible at ~12% opacity in matching ring colors. Rounded end caps implemented via scatter dots at arc endpoints. Small color dots in legend match ring colors.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light cream text — clearly readable against dark background. Center "76%" in light text and "COMPLETE" in muted light gray — both readable. Bottom legend labels in light ink — readable. No dark-on-dark failures observed. Brand green #009E73 remains clearly visible.
      Data: Data colors are identical to the light render — same green outer, lavender middle, blue inner arcs. Background tracks are noticeably fainter in dark mode (12% opacity on near-black), especially for the green track which is nearly invisible; the lavender track is slightly more visible due to its lighter hue. Progress arcs remain bold and prominent.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures. Minor concern: background track opacity insufficient in dark mode for darker hues, reducing the remaining-progress cue for the outer green ring.
