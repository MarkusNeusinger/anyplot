      Legibility verdict: PASS — all text readable, bars well-separated from background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface
      Chrome: Title, axis labels, tick labels all rendered in light text (#F0EFE8 / #B8B7B0 family) — readable. No dark-on-dark failures. Stats box uses elevated dark fill (#242420) with light-colored text. Mean label and peak callout annotations readable.
      Data: Bars remain brand green (#009E73) — identical to light render (correct). ISSUE: stroke_width=2.5 in the Style object creates visible dark vertical gaps between histogram bars on the dark background. The bars appear slightly discontinuous where the dark background shows through at bar edges — more pronounced than in the light render where the cream background hides the gaps.
      Legibility verdict: PASS for text — MINOR FAIL for bar continuity: dark-background gaps between bins make the histogram look fragmented in dark mode.
