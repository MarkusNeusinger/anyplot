    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface
      Chrome: Title "histogram-basic · python · pygal · anyplot.ai" fully visible at top (~65% width), dark ink (#1A1A17). Y-axis label "Number of Students" and X-axis label "Exam Score (points)" both readable. Tick labels (60, 70, 80, 90 on X; 0–40 on Y) clear. Legend at bottom "Score Distribution (n=500)" readable.
