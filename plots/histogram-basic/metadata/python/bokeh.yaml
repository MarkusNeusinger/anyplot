review:
  strengths:
  - imprint_seq gradient fill on histogram bars (low→green, high→blue) is a sophisticated
    and idiomatic Bokeh design choice that adds visual depth and density encoding
  - Bimodal marathon distribution with labeled group annotations and median/mean reference
    lines delivers clear, compelling data storytelling
  - All font sizes explicitly set (title ~50pt, axis labels 42pt, ticks 34pt, annotations
    28pt) — well-proportioned in both themes
  - 'Full theme-adaptive chrome: background, text, legend, and grid all correctly
    flip between #FAF8F1 and #1A1A17 surfaces'
  - HoverTool with bin-range and count tooltips, explicit LegendItem construction,
    NumeralTickFormatter, and HTML export all showcase idiomatic Bokeh features
  - Reproducible synthetic data (np.random.seed(42)) with realistic marathon finish
    time distribution (right-skewed bimodal) and factually plausible values
  weaknesses:
  - Full box outline (p.outline_line_color = INK_SOFT) creates a four-sided frame
    instead of the preferred L-shaped axes — in Bokeh this can be approximated by
    setting outline_line_color=None and ensuring only left/bottom axis lines are visible;
    reduces DE-02 by ~1-2 points
  - LM-02 could reach 5/5 with one additional Bokeh-distinctive technique (e.g. a
    Band glyph for IQR shading, a Span annotation for a threshold, or a callback-powered
    selection highlight on the HTML artifact)
  - 'Minor: the ''Main group'' annotation anchor x=190 sits at the left shoulder of
    the distribution rather than above the mode (~250 min) — clearer if shifted to
    x=220-230 so the ▼ glyph is closer to the peak'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Bold dark title "histogram-basic · python · bokeh · anyplot.ai" fills ~70% of canvas width and is clearly readable. X-axis label "Finish Time (min)" and Y-axis label "Number of Runners" both at 42pt, dark ink, well-balanced. Tick labels at 34pt in INK_SOFT are fully readable. Legend in top-left corner shows solid red Median:251 min and dashed ochre Mean:259 min with 34pt text — all text readable against the light background.
      Data: 28 histogram bars colored by count via imprint_seq gradient (#009E73 green at low-count edges → #4467A3 blue at the high-count peak). Bars span ~130–400 min. Right-skewed bimodal distribution clearly visible with main peak around 250 min and secondary shoulder around 290-310 min. Matte red (#AE3030) vertical median line and dashed ochre (#BD8233) mean line bisect the distribution. Annotations "▼ Main group (~4 hr pace)" and "▼ Slower group (~5 hr pace)" label the two modes. Subtitle "N = 500 runners │ Right-skewed bimodal distribution" in muted ink above the plot area.
      Legibility verdict: PASS — all text elements clearly readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and axis labels rendered in light #F0EFE8 ink — clearly visible against the dark surface. Tick labels in #B8B7B0 (INK_SOFT dark token) — readable. Legend box uses elevated dark background (#242420) with light label text — no dark-on-dark failure. Subtle light-on-dark grid lines at alpha 0.15.
      Data: Bar colors are IDENTICAL to light render (same imprint_seq gradient from green to blue — only chrome flips). Median and mean reference lines maintain the same colors. Annotations in INK_SOFT dark token remain readable.
      Legibility verdict: PASS — all text readable against the dark background, no dark-on-dark failures observed
