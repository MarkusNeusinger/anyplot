      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "histogram-basic · python · altair · anyplot.ai" in bold dark ink, top-left anchored — fully readable. Subtitle "Distribution of human heights — bimodal pattern with primary and taller subgroups" in lighter gray (INK_SOFT) beneath title — readable. Y-axis label "Frequency" vertical, X-axis label "Height (cm)" bold — both readable. Tick labels at 10px, clearly legible.
