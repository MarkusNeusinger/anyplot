review:
  strengths:
  - 'Excellent spec compliance: all histogram requirements met (no gaps between bins,
    borderWidth for bin edges, y-axis starts at zero, 20 bins appropriate for 500-point
    dataset)'
  - 'Distinctive Highcharts features used effectively: plotBands for grade zones (D/F,
    C, B, A, A+) and plotLines for mean/median reference lines with labeled annotations'
  - 'Perfect palette and theme compliance: brand green (#009E73) bars on correct warm
    off-white (#FAF8F1) light background and warm near-black (#1A1A17) dark background;
    all chrome (text, grid, ticks) correctly theme-adaptive in both renders'
  - Realistic, contextual exam-score scenario with bimodal distribution (main cluster
    ~72, high-achievers ~88); subtitle reinforces the narrative
  - Idiomatic HistogramSeries derived from hidden ColumnSeries base — the correct
    Highcharts-specific histogram pattern; clean KISS code with seed for reproducibility
  weaknesses:
  - 'DE-01 (6/8): Strong design but not quite publication-ready — grade zone band
    labels (D/F, C, B, A, A+) in different hues add visual interest but the overall
    typographic hierarchy and annotation style fall short of FiveThirtyEight-level
    polish'
  - 'DE-02 (4/6): Horizontal grid lines are present and correct; removing them entirely
    or making them even more ghost-like would lift the refinement; no explicit spine-removal
    API used in Highcharts, which leaves the default axis-line style intact'
  - 'DE-03 (4/6): Mean and Median lines with labels guide the reader well but the
    key insight (bimodal separation between cluster at ~72 and high-achievers at ~88)
    is not visually emphasized — a small callout annotation pointing to the dip between
    the two modes around score 77 would immediately direct the viewer''s attention'
  - 'LM-02 (4/5): plotBands and plotLines are Highcharts-distinctive and used well;
    a tooltip formatter customizing the hover text per bin (showing bin range and
    count) would fully leverage Highcharts'' interactive HTML output'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Title "histogram-basic · python · highcharts · anyplot.ai" in dark ink (#1A1A17), centered, bold, occupies ~70% of canvas width — expected for the mandated title length. Subtitle in muted ink provides context ("500 students · Intro to Statistics, Fall 2024 · bimodal: main cluster ~72, high-achievers ~88"). Y-axis label "Number of Students" and X-axis label "Exam Score (points)" in dark ink at matching font sizes. Tick labels on both axes in secondary ink (#4A4A44), well-spaced with no overlap. Grade zone labels (D/F, C, B, A, A+) appear as colored text at the top of the plot bands in their respective semantic colors.
      Data: Histogram bars in brand green (#009E73) with thin visible borders between bins. 20 bins across scores 25–100. Distribution shows right skew with the peak around bins 75–83. Plot bands cover grade zones with subtle tinted backgrounds (D/F=red-tinted, C=amber-tinted, B=green-tinted, A=blue-tinted, A+=purple-tinted). Red dashed vertical line marks Mean: 75.3; blue short-dotted line marks Median: 75.8 — labels positioned on opposite sides so they don't overlap.
      Legibility verdict: PASS — all text elements are clearly readable against the light background. No "light on light" issues. Grade zone labels and reference-line annotations are readable. X-axis label sits close to the bottom canvas edge but all pixels are visible.

