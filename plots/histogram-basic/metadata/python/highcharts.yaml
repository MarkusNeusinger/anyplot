      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title in light off-white text (#F0EFE8), clearly readable against the dark background. Subtitle in muted light ink. Axis labels and tick labels use the lighter INK and INK_SOFT tokens — all readable against the dark surface. Grade zone labels and reference-line labels retain their original semantic colors (red, amber, green, blue, purple) which remain sufficiently visible on the dark background.
      Data: Histogram bars remain identical brand green (#009E73) — same as the light render, confirming data colors are theme-invariant. Plot bands (grade zone tinted backgrounds) are very subtle at 7% opacity on the dark surface — nearly invisible, which is appropriate. Mean/Median reference lines still visible in their respective colors.
      Legibility verdict: PASS — no dark-on-dark failures detected. All title, axis labels, and tick labels are clearly readable in white/light text on the dark background. Brand green #009E73 remains easily visible. No element is illegible.
