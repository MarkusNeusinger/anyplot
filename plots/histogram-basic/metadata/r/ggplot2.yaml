review:
  strengths:
  - 'Perfect palette compliance — brand green #009E73 used as sole fill color, backgrounds
    correct (#FAF8F1 light / #1A1A17 dark), all chrome tokens applied (INK/INK_SOFT)'
  - All font sizes explicitly set (title 12pt bold, axis labels 10pt, ticks 8pt) and
    readable in both themes with no dark-on-dark or light-on-light failures
  - 'Excellent data choice: three-component mixture produces a visually interesting
    right-skewed salary distribution, clearly demonstrating histogram''s purpose'
  - 'Correct canvas: 8×4.5 in × dpi=400 = 3200×1800 px landscape, matching canonical
    spec exactly'
  - 'Idiomatic ggplot2: expansion(), label_dollar() via scales, modern linewidth=
    (not deprecated size=), and PAGE_BG-colored bar edges for subtle bin separation'
  - 'Perfect spec compliance: geom_histogram with bins=35, y-axis starts at zero,
    descriptive axis labels with salary context, no gap between bars'
  weaknesses:
  - 'DE-01/DE-03 LOW: The histogram is technically correct but has no visual storytelling
    — it displays data without guiding the viewer to an insight. Add a geom_vline()
    for the median or mean salary (using ANYPLOT_PALETTE[4] or INK_SOFT), or a geom_density()
    overlay to emphasize the distribution shape, creating a focal point and visual
    hierarchy.'
  - 'DE-02 MODERATE: While grid and spine handling is good, the visual refinement
    could go further — remove axis ticks entirely (axis.ticks = element_blank()),
    or add a subtle subtitle describing the distribution (e.g., ''Right-skewed: majority
    earn $40k–$90k, with a long executive tail'') to elevate polish beyond a configured
    default.'
  - 'LM-02 LOW: The implementation doesn''t leverage ggplot2''s distinctive features
    beyond geom_histogram. Consider a geom_density() overlay scaled to count (aes(y
    = after_stat(count * ..density..))) — a ggplot2 idiom that visually separates
    it from other histogram implementations and highlights the mixture shape.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Title "histogram-basic · r · ggplot2 · anyplot.ai" in bold dark (#1A1A17) at ~55% canvas width — well-proportioned. Y-axis label "Number of Employees" and X-axis label "Annual Salary" in dark ink (10pt), tick labels in INK_SOFT (#4A4A44, 8pt). Horizontal-only grid lines subtle (INK_SOFT, linewidth 0.2). Left and bottom axis lines present; top and right spines absent.
      Data: Histogram bars in brand green #009E73 with thin PAGE_BG-colored edges providing subtle bin separation. 35 bins spanning roughly $28k–$260k. Right-skewed distribution clearly visible: main mass peaks around $60–75k (highest bar ~58 count), a secondary hump around $100–110k, and a long thin tail to ~$250k. Three-component mixture structure is perceptible.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
