review:
  strengths:
  - Sophisticated density overlay scaled to histogram count space using manual density()
    computation — idiomatic ggplot2 multi-layer grammar technique that avoids geom_density()'s
    density-scale limitation
  - Median reference line + annotation creates a clear visual focal point; ochre (#BD8233)
    as a semantic 'reference' color is a well-reasoned anyplot palette choice
  - 'Both themes render correctly: warm off-white (#FAF8F1) in light, near-black (#1A1A17)
    in dark, with all chrome (title, axis labels, ticks, grid, density line) adapting
    properly via INK/INK_SOFT tokens'
  - Informative subtitle directly states the distributional insight — viewer immediately
    understands the salary story without analysis
  - 'Clean visual refinement: y-axis-only subtle grid, no tick marks, spines removed
    via theme_minimal, generous margins, axis lines as structural elements'
  weaknesses:
  - Bar edge color uses PAGE_BG (color = PAGE_BG), which creates invisible bin separation
    in dark mode — the dark edge (#1A1A17) blends with the dark background. Use a
    semi-transparent ink edge or a fixed contrast colour so separators are visible
    in both themes.
  - Density overlay (dashed line) has no label or legend entry — a viewer unfamiliar
    with overlaid density curves cannot immediately identify it. Consider a small
    inline annotation (e.g. 'density') near the curve tail or a minimal legend.
  - 'DE-01 could be elevated further: the design is clean and functional but the colour
    palette is limited to a single categorical hue (green bars + ochre reference).
    A more sophisticated implementation might add subtle visual polish beyond the
    required palette.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Bold title "histogram-basic · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17) at 12pt — fully readable. Subtitle in INK_SOFT at 9pt — readable. Y-axis label "Number of Employees" and X-axis label "Annual Salary" in dark ink at 10pt — clearly readable. Tick labels ($100k, $200k, 0/20/40/60) in INK_SOFT at 8pt — readable.
      Data: 35-bin histogram in brand green (#009E73) with thin white (PAGE_BG) bin separators — individual bins clearly distinguishable. Dashed density overlay in INK_SOFT (dark grey) follows the histogram shape. Vertical ochre (#BD8233) median reference line with annotation "Median: $72k" positioned at top. Distribution is visibly right-skewed with peak around $65-75k and a long tail extending to ~$250k.
      Legibility verdict: PASS — all text readable, appropriate contrast, no dark-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title "histogram-basic · r · ggplot2 · anyplot.ai" in light (#F0EFE8) — clearly readable against dark background. Subtitle in light INK_SOFT (#B8B7B0) — readable. Y-axis and X-axis labels in light ink — readable. Tick labels in light INK_SOFT — all readable. No dark-on-dark failures observed.
      Data: Histogram bars remain identical brand green (#009E73) — data color unchanged from light render as required. Density dashed line is now light grey (#B8B7B0) adapting from INK_SOFT. Ochre median line (#BD8233) identical. Bar edge separators use PAGE_BG (#1A1A17) which blends with the dark background — bins slightly less visually separated than in light mode, though still distinguishable by height differences.
      Legibility verdict: PASS — all chrome elements readable on dark background, no dark-on-dark failures.
