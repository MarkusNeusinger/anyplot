review:
  strengths:
  - 'Correct use of Okabe-Ito palette for main department categories — Engineering
    correctly uses #009E73 as first series'
  - Theme-adaptive colors properly applied with appropriate tokens (PAGE_BG, INK,
    INK_SOFT) for both light and dark backgrounds
  - Hierarchical data structure well-represented with clear parent-child relationships
    between departments and teams
  - Clean, straightforward code following KISS principle — no unnecessary functions
    or classes
  - Realistic and appropriate example data — company department budgets are domain-relevant
    and neutral
  - Correct title format (spec-id · library · anyplot.ai) and proper file naming (plot-light.png,
    plot-dark.png, etc.)
  weaknesses:
  - 'CRITICAL: Pie slice labels severely overlap and are completely unreadable — label
    positioning algorithm does not account for canvas constraints or text collision'
  - 'CRITICAL: Missing core spec requirements — no breadcrumb navigation, no back
    button, no animation, no interactive drill-down in output'
  - Drilldown mechanism is non-functional in static PNG output — all pie charts are
    layered and stacked vertically instead of showing one interactive level at a time
  - Label placement uses fixed radius without collision detection — labels at similar
    angles stack on top of each other
  - 'Code duplication: pie/label/center definitions repeated for each department rather
    than loop-based generation'
  - Center donut background in dark render could be more visually refined with explicit
    fill styling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface.
      Chrome: Title "pie-drilldown · altair · anyplot.ai" is readable dark text. Center text "All Departments" and "$3.20B" is clear and readable.
      Data: Pie slices display four main departments (Engineering 54.8%, Marketing 23.1%, Operations 15.2%, HR 6.9%) in distinct colors from Okabe-Ito palette. Engineering (#009E73) is correctly the first series.
      Labels: CRITICAL FAILURE — Pie slice labels (showing department names, values, and percentages) are severely overlapping and unreadable. Text stacks on top of each other around the circumference, making it impossible to read most labels.
      Legibility verdict: FAIL — Core data labels are unreadable due to severe overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title is readable white text. Center text "All Departments" and "$0.22B" appears to be displayed with light text colors.
      Data: Pie slices display identical colors to light render (data colors are correctly consistent across themes). Engineering slice maintains #009E73, other colors match light render exactly.
      Labels: Same CRITICAL FAILURE as light render — pie slice labels completely overlap and are unreadable. No improvement in dark theme.
      Dark-on-dark check: Text appears to be using light colors (INK token) so no dark-on-dark failure, but the overlap issue remains fatal.
      Legibility verdict: FAIL — Same severe label overlap as light render makes the visualization unreadable in both themes.

    Both renders have identical data colors (correct), theme-adaptive backgrounds (correct), but BOTH are compromised by the critical text overlap issue. The visualization is not suitable for publication in either theme.
