      Background: Warm off-white (#FAF8F1) - correct theme color
      Chrome: Title "pie-drilldown · bokeh · anyplot.ai" centered and dark; breadcrumb "Total Expenses" at top; click indicator "Click a slice to drill down" at bottom - all clearly readable
