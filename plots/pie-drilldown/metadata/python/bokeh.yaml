    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct theme color
      Chrome: Title, breadcrumb, and indicator all in light text colors, clearly readable against dark background
      Data: Same four slices with identical data colors to light render (only chrome changed as expected). All labels legible in light text.
      Legibility verdict: PASS (text contrast is adequate in dark theme; no dark-on-dark failures)
      Palette issue: FAIL - Same issue as light render: first series is pink/magenta, NOT #009E73

