review:
  strengths:
  - 'Correct theme-adaptive Style configuration: background, INK, INK_MUTED, Okabe-Ito
    palette all properly derived from ANYPLOT_THEME'
  - Creative and technically sound use of XY chart with None-separator segments to
    approximate bipartite network layout in a charting library without native network
    support
  - Realistic and neutral author-paper scenario with plausible connection counts (8
    authors, 10 papers, 24 edges)
  - 'Clean backgrounds (#FAF8F1 / #1A1A17), no grid clutter, both HTML and PNG output
    produced correctly'
  weaknesses:
  - 'Color scheme does not reflect set membership: each author has its own Okabe-Ito
    color and papers inherit edge colors. Spec requires all authors = one color (#009E73),
    all papers = another color (#D55E00) to reinforce two-mode structure.'
  - 'Node size does not encode degree: dots_size=8 is fixed for all nodes. Hub nodes
    (Patel with 4 papers, P01 with 3 authors) should be visually larger.'
  - 'No node labels visible in the PNG: the label field on each XY point is HTML tooltip
    metadata only. Adjacent text labels for author names and paper IDs must be rendered
    in the static PNG.'
  - 'Title format incorrect: should be exactly ''network-bipartite · pygal · anyplot.ai''
    without the extra ''Author-Paper Network · '' prefix.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "Author–Paper Network · network-bipartite · pygal · anyplot.ai" in dark ink at top, readable. Legend at bottom with 8 author names in 4 columns, readable at explicit legend_font_size=16. No axis tick labels (intentionally hidden).
      Data: Left column has 8 author nodes as small colored dots (one Okabe-Ito color per author series). Right column has 10 paper nodes colored by whichever author series connects to them (papers connected to multiple authors show overlapping dots in different colors). Gray lines connect nodes across columns with characteristic crossing pattern. All nodes uniform size (dots_size=8), no degree encoding. No text labels adjacent to nodes — labels exist only as HTML tooltip metadata.
      Legibility verdict: PASS — all visible chrome text is readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title and legend labels rendered in light color (#F0EFE8 INK token) — clearly readable against dark background. No dark-on-dark failures observed.
      Data: Okabe-Ito data colors (node dots and edge lines) are visually identical to the light render — only chrome flips. Lines appear slightly brighter against the dark background. Nodes remain distinguishable.
      Legibility verdict: PASS — all visible text is readable in both themes. Theme adaptation is correct.
