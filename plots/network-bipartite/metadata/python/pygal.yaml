review:
  strengths:
  - 'Clean bipartite layout: two clearly separated columns (authors left x=0, papers
    right x=10) makes the two-mode structure immediately apparent'
  - Correct Okabe-Ito palette and full theme-adaptive tokens (PAGE_BG, INK, INK_MUTED)
    — both light and dark renders use correct background colors
  - Interactive HTML output with labeled data points (author/paper labels as tooltips)
    is idiomatic pygal usage
  - Clean, deterministic code — no functions or classes, hardcoded academic dataset
    is realistic and neutral
  weaknesses:
  - Node size does not encode degree — spec explicitly requires node size to reflect
    connection count to highlight hubs; all nodes use uniform dots_size=8
  - Color encodes series (author) rather than set membership — spec requires nodes
    colored by which set they belong to (authors vs papers); paper nodes inherit the
    color of the last author series that drew them, creating visual ambiguity
  - No direct node labels visible in PNG render — labels are tooltip-only in the interactive
    HTML; the spec requires legible labels positioned to avoid overlap with edges;
    paper node identifiers (P01–P10) and author names are not readable in the static
    image
  - Legend text at bottom is very small and barely readable at full canvas resolution;
    author names in the 4-column legend are rendered at a size that strains readability
  - Title uses extra descriptive prefix 'Author–Paper Network · ' before the required
    format 'network-bipartite · pygal · anyplot.ai'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Author–Paper Network · network-bipartite · pygal · anyplot.ai" visible at top center in dark ink; small but legible. No axis labels (hidden by design). Legend at bottom (4 columns) shows author names in very small text — marginally readable.
      Data: 8 left-column nodes colored in Okabe-Ito order starting with #009E73 (green) for Smith. 10 right-column nodes appear as overlapping colored dots (multiple series draw paper nodes at same positions). Numerous gray crossing edge lines connect left to right. All dots_size=8 uniform.
      Legibility verdict: PASS — title and legend text readable; no light-on-light failures. Legend text is small but discernible.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface
      Chrome: Title visible in light ink on dark background. Legend text at bottom renders as light text — readable. No axis ticks or axis labels visible (hidden by design).
      Data: Data node colors are identical to the light render — same Okabe-Ito sequence, same crossing edge pattern. Edge lines appear slightly lighter against dark background. No dark-on-dark text failure detected.
      Legibility verdict: PASS — both title and legend text are readable against the dark background; no chrome failures.
