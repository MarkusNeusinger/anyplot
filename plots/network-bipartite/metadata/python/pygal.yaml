review:
  strengths:
  - Correct Okabe-Ito palette with theme-adaptive backgrounds and foreground tokens
    applied properly
  - Creative and valid use of pygal.XY with None-segment separators to construct bipartite
    line layout
  - Realistic academic author-paper domain with plausible connectivity
  - Clean KISS structure — deterministic data, no functions/classes, correct output
    files
  - Grid and axis labels correctly disabled for a network-graph context
  weaknesses:
  - Color nodes by set membership (all authors one color, all papers another) instead
    of coloring each author as a separate series — the spec explicitly requires set-membership
    coloring
  - Node size must encode degree (number of connections) per spec — all dots are constant
    dots_size=8 regardless of hub status
  - 8 authors but only 7 Okabe-Ito colors defined — 8th series (Novak) falls back
    to a near-black default that is nearly invisible on the dark (#1A1A17) background
  - 'Title format should start with spec-id: network-bipartite · pygal · anyplot.ai
    — drop or move the descriptive subtitle prefix'
  - Paper node labels (P01-P10) are never shown on the chart, only author names appear
    in the legend — consider labelling paper nodes directly
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "Author–Paper Network · network-bipartite · pygal · anyplot.ai" visible at top in small dark text. No axis tick labels (show_x_labels=False, show_y_labels=False). Legend at bottom in four columns listing 8 author series names — text is small but technically readable at full resolution.
      Data: 8 colored line-bundles spanning from left (author nodes) to right (paper nodes). Colors follow Okabe-Ito order starting with #009E73 (Smith, green), then vermillion, blue, pink, gold, sky-blue, yellow. 8th series (Novak) falls outside the 7-color palette and renders near-black — visible but not from the defined palette. Dots at both ends represent nodes; all dots are the same small size (dots_size=8) regardless of degree. Node colors follow the author-series color, not set membership.
      Legibility verdict: PASS — text is readable; however the 8th series (near-black) against the light background is visible.

