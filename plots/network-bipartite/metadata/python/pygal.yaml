      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title and legend text flipped to light color against dark surface — no dark-on-dark failures for chrome text. Legend at bottom with same 4-column layout, light-colored text, readable.
      Data: Same Okabe-Ito data colors preserved across themes (green, orange, blue, pink, gold, sky-blue, yellow — confirmed identical to light render for the first 7 series). 8th series (Novak) uses near-black which has critically low contrast on the near-black (#1A1A17) background — lines for this series are barely distinguishable from the background.
      Legibility verdict: PARTIAL FAIL — all chrome text is readable (light on dark); however the 8th series (near-black) is near-invisible against the dark background, a palette/contrast failure for that series.
