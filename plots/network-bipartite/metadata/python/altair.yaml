review:
  strengths:
  - Correct bipartite layout with two clearly separated columns at x=0.22/0.78, nodes
    color-coded by set using Okabe-Ito positions 1 and 2
  - Node size encodes degree, immediately highlighting hubs — satisfies spec requirement
    and improves storytelling
  - Color-coded 'Authors' / 'Papers' column headers (matching node colors) add a polished,
    intentional visual hierarchy
  - 'Both themes rendered correctly: warm off-white background in light, near-black
    in dark, with all chrome tokens properly threaded'
  - 'Full Altair idiomatic usage: mark_rule for edges via x/y → x2/y2, alt.layer()
    composition, configure_* method chaining, HTML export'
  weaknesses:
  - Node label fontSize=15 is below the recommended 18px minimum for tick/data labels
    on a 4800×2700 canvas — labels are readable but slightly cramped, especially for
    longer author names
  - Edge lines (opacity=0.28) are very subtle; slightly higher opacity or a marginally
    thicker strokeWidth (e.g., 1.5) would improve traceability without adding clutter
  - Outer horizontal margins are generous to the point of some wasted canvas space
    — nodes span only ~56% of the width (0.22–0.78); could use more horizontal spread
  - No visual differentiation between high-degree and low-degree edges (all edges
    uniform); edge opacity encoding weight would be a small but meaningful enhancement
    for hubs
