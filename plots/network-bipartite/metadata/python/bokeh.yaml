review:
  strengths:
  - Correct bipartite two-column layout with students on left and courses on right
  - Node sizes elegantly encode degree (connectivity) — hubs are immediately visible
  - 'Okabe-Ito palette correctly applied: #009E73 for students (set A), #D55E00 for
    courses (set B)'
  - Full theme adaptation — backgrounds, title, and label colors all use correct theme
    tokens for both light and dark renders
  - Colored column headers matching node colors provide clear, integrated group identification
  - Reproducible with np.random.seed(42) and realistic weighted enrollment distribution
  - 'Correct Bokeh-specific export pattern: Selenium-based PNG screenshot as prescribed
    by library guide'
  - Edge semi-transparency (alpha=0.30) handles the dense connection set cleanly
  weaknesses:
  - Title format deviates from required pattern — should be exactly 'network-bipartite
    · bokeh · anyplot.ai', not prefixed with 'Student-Course Enrollment ·'
  - No formal legend box — colored column headers substitute but a legend would satisfy
    the criterion cleanly
  - 'Design Excellence ceiling: node sizes and colors are intentional but the plot
    lacks a clear visual focal point or emphasis beyond the raw bipartite structure
    (e.g., no annotation for the most-connected student or most-popular course)'
  - Large unused horizontal space between the two node columns reduces canvas utilization
  - Bokeh distinctive features underused — HoverTool or ColumnDataSource could leverage
    Bokeh's interactive HTML output more effectively
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white
      Chrome: Title "Student-Course Enrollment · network-bipartite · bokeh · anyplot.ai" renders in dark ink (#1A1A17) at 28pt in Bokeh's toolbar area (top-left). Column headers "Students" (green #009E73) and "Courses" (orange #D55E00) are bold 24pt and clearly visible. Student name labels (18pt, INK_SOFT #4A4A44) are right-aligned left of nodes; course code labels (18pt, INK_SOFT) are left-aligned right of nodes. All text clearly readable against the warm background.
      Data: Green (#009E73) circles for 15 student nodes on the left column, orange (#D55E00) circles for 12 course nodes on the right column. Node sizes visibly vary by degree — Emma, James, Noah have notably larger green circles; CS101 has the largest orange circle. Gray semi-transparent edge lines (alpha=0.30) connect students to enrolled courses. White node outlines (line_color=PAGE_BG) provide clean separation.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black
      Chrome: Title text renders in light #F0EFE8 (INK token) and is visible against the dark background. Column headers maintain their Okabe-Ito data colors (green #009E73, orange #D55E00) — unchanged from light render as expected. Student name and course code labels render in lighter #B8B7B0 (INK_SOFT dark token) and are clearly readable against the near-black background. No dark-on-dark failures observed.
      Data: Green (#009E73) and orange (#D55E00) node colors are identical to the light render — only chrome flips. Edge lines appear lighter gray against the dark surface (INK_MUTED #A8A79F with alpha=0.30) providing good contrast. Node outlines use dark PAGE_BG for separation.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures
