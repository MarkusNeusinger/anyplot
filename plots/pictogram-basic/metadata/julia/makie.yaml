review:
  strengths:
  - 'Excellent spec compliance — all required pictogram features implemented: unit
    legend, partial icons (ghost circle + pie sector), grid-row layout, category labels
    on left Y-axis'
  - 'Thoughtful semantic color mapping: all five fruit categories assigned the closest
    Imprint palette member (green apple, ochre orange, lime banana, lavender grape,
    red mango) — no custom hexes'
  - Elegant partial-icon design using ghost circle (15% alpha fill + coloured stroke)
    overlaid with a filled pie sector, correctly computing the arc from 12 o'clock
    clockwise
  - DataAspect() ensures geometrically perfect circular icons across the canvas without
    distortion
  - Clean minimal design — all four spines hidden, tick marks suppressed, no grid
    — generous whitespace
  - 'Perfect theme adaptation in both renders: INK/INK_SOFT tokens correctly applied
    to title, Y-tick labels, value labels, and legend; backgrounds exactly PAGE_BG
    in both themes'
  - 'Perfect code quality: KISS structure, Random.seed!(42), all imports used, correct
    plot-$(THEME).png output naming'
  weaknesses:
  - Ghost circle opacity (15%) is too low in dark mode — for lime (banana) and matte-red
    (mango) categories the ghost outline against the near-black background is barely
    perceptible; raise fill alpha to ~25% and stroke to 2px for better readability
    in dark theme
  - 'DQ-03: Data labelled ''global fruit production (million tonnes)'' does not reflect
    real-world magnitudes or ranking — actual global production (bananas ~116 Mt,
    apples ~88 Mt, oranges ~79 Mt, mangoes ~57 Mt, grapes ~77 Mt) differs substantially
    in both ordering and scale; use factually accurate values'
  - 'DE-01/DE-03: Design lacks a focal point or storytelling device — the chart is
    functional but neutral; consider emphasising the leading category (Apples) with
    a slightly larger icon or a subtle callout annotation to guide the viewer''s eye
    and create hierarchy'
  - 'LM-02: Makie-specific distinctiveness is present but under-used — the implementation
    constructs circles via a raw 60-gon polygon instead of leveraging Makie''s Scatter
    with Circle marker or BezierPath, which would be more idiomatic and accurate'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct for light theme.
      Chrome: Title "Fruit Production · pictogram-basic · julia · makie · anyplot.ai" in dark INK (#1A1A17) at top, clearly readable. Y-axis category labels (Apples, Oranges, Bananas, Mangoes, Grapes) in muted INK_SOFT (#4A4A44), readable. Value labels ("35 Mt", "22 Mt", etc.) on the far right in INK_SOFT, readable. Legend "● = 5 million tonnes" at bottom in INK_SOFT, small but legible.
      Data: Five horizontal rows of filled circles: Apples = 7 full green (#009E73) circles; Oranges = 4 full ochre (#BD8233) circles + 1 ghost-circle with ~40% pie sector; Bananas = 3 full lime (#99B314) circles + 1 ghost + 60% sector; Mangoes = 2 full matte-red (#AE3030) circles + 1 ghost + ~40% sector; Grapes = 1 full lavender (#C475FD) circle + 1 ghost + ~60% sector. Ghost circles have cream-colored fill (light PAGE_BG) with colored stroke and a filled pie sector overlay — all partial icons are clearly readable.
      Legibility verdict: PASS — all text is readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the canvas — correct for dark theme.
      Chrome: Title in light #F0EFE8, clearly readable. Y-axis category labels in #B8B7B0, readable. Value labels and legend in #B8B7B0, readable.
      Data: Data colors are identical to the light render — green Apples, ochre Oranges, lime Bananas, matte-red Mangoes, lavender Grapes. Ghost circles now have near-black fill (dark PAGE_BG) with colored stroke. The lime ghost circle (Bananas) and matte-red ghost circle (Mangoes) are noticeably less visible in dark mode — the 15% alpha fill is nearly invisible on the near-black background and only the thin colored stroke delineates the ghost. The pie sectors within the ghosts remain visible.
      Legibility verdict: PASS overall, with minor concern — all chrome text is readable; no dark-on-dark text failures. Ghost circle "empty" outlines are significantly harder to read in dark mode for some colors (lime, matte-red), reducing the visual clarity of partial icons in this theme.
