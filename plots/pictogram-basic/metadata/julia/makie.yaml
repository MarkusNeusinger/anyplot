  strengths:
  - Semantic fruit-to-color mapping (lime→Bananas, green→Apples, ochre→Oranges, lavender→Grapes,
    red→Mangoes) is well-reasoned and reader-intuitive
  - Partial icon rendering using ghost circle (25% alpha) + filled pie sector is technically
    sophisticated and visually clear
  - 'All spec requirements met: unit legend, fractional icons, left-aligned grid layout,
    category labels on y-axis'
  - Full spec compliance — 5 categories, realistic FAO production data, correct title
    format with descriptive prefix
  - Clean flat script with zero unnecessary abstractions; code is readable and maintainable
  weaknesses:
  - DataAspect() causes excessive vertical whitespace above and below the icon rows
    — the pictogram content occupies only ~50% of canvas height; adjust ylims or remove
    DataAspect and manually enforce circle proportions
  - Focal annotation fontsize=10 renders small at final resolution; increase to 11-12
    for readability
  - 'DE-02: Background whitespace is unbalanced due to DataAspect constraint — consider
    layout tuning to better fill the landscape canvas'
