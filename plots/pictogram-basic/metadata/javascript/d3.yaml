review:
  strengths:
  - 'Correct Imprint palette in canonical order — Apples first with #009E73, then
    lavender, blue, ochre, red; all data colors identical across both themes.'
  - Partial icon clip-path technique is technically sophisticated and precisely implements
    the spec's fractional-remainder requirement.
  - Empty slot outlines at low opacity (0.22) provide scale context without visual
    clutter.
  - 'All font sizes explicitly set with clear hierarchy: title 22px/600, category
    labels 18px/500, value labels 16px/600, legend 15px.'
  - 'Fully theme-adaptive chrome: ink/inkSoft tokens applied to labels and separators;
    backgrounds are correct #FAF8F1 light and #1A1A17 dark.'
  - 'Spec fully satisfied: unit legend, partial icons, left-aligned category labels,
    horizontal grid-row layout.'
  - Clean D3 code — deterministic hard-coded data, no fake interactivity, correct
    canvas sizing from window.ANYPLOT_SIZE.
  weaknesses:
  - 'Minor: inner drawing loop uses forEach + manual append rather than D3''s data-join
    pattern (d3.range(maxIcons).data().join()), which is more idiomatic; low priority
    since the mixed-state logic (full/partial/empty) makes the procedural approach
    pragmatically reasonable.'
  - DE-03 could be elevated with a subtle emphasis on the highest-value category (e.g.
    slightly larger circles or a value-label callout for Bananas at 48k t) to create
    a clearer focal point.
  - The partial icon for Grapes (only 20% fill = 1,000 tonnes out of 5,000) is very
    narrow and nearly invisible — a min-width clip or stroke-only outline at low fill
    fractions would improve legibility.
