review:
  strengths:
  - Correct Imprint palette usage with each country assigned palette positions 1-5
    in canonical order
  - Elegant partial-circle ghost effect using 18% opacity fill + clip-rect technique
    — clearly communicates fractional units
  - 'Expert Chart.js plugin API usage: beforeDraw for background, afterDraw for icon
    rendering with scale pixel conversion via getPixelForValue()'
  - White stroke separating adjacent circles adds clean definition without visual
    noise
  - Footnote legend is well-placed and uses theme-adaptive inkSoft color
  - Title, axis labels, tick sizes all explicitly set and well-proportioned in both
    themes
  - Landscape orientation is correct for a horizontal pictogram chart
  weaknesses:
  - 'DE-01/DE-02: Both horizontal and vertical grid lines are visible, creating a
    faint tablecloth grid that competes with the icons. For a pictogram chart, consider
    removing the y-axis grid entirely (grid: { display: false } on the y scale) and
    keeping only subtle x-axis vertical lines as counting guides. Also remove the
    chart border/spines (grid: { drawBorder: false }) for a cleaner look.'
  - 'DE-01: Top and right borders around the chart area are still present — removing
    them would lift visual refinement to the next level.'
  - 'DQ-03: Brazil values 35 vs Vietnam 25 gives a 1.4:1 ratio, but actual coffee
    production is roughly 2:1 (Brazil ~63M bags vs Vietnam ~29M). Consider normalising
    to e.g. [63, 29, 14, 10, 9] or dividing by a common factor to preserve more accurate
    relative proportions.'
  - 'CQ-01: Four helper functions/plugin objects add structural complexity beyond
    the pure linear KISS flow — unavoidable for custom drawing but slightly detracts
    from the KISS ideal.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "pictogram-basic · javascript · chartjs · anyplot.ai" in bold dark text, centered at top (~65% canvas width, well-proportioned). Y-axis tick labels (Brazil, Vietnam, Colombia, Indonesia, Ethiopia) in dark text, clearly readable. X-axis tick labels (0–35) in softer dark text, readable. X-axis label "Production (thousand 60 kg bags)" in dark ink. Footnote "● = 5 thousand 60 kg bags · partial circle = fractional unit" in muted ink at bottom-left.
      Data: Brazil row: 7 full green circles (#009E73). Vietnam: 5 full lavender circles (#C475FD). Colombia: 3 full + 1 partial blue circle (~60% filled, #4467A3). Indonesia: 2 full + 1 partial ochre circle (~80% filled, #BD8233). Ethiopia: 1 full + 1 partial red circle (~80% filled, #AE3030). Partial circles show ghost (18% opacity faint tint) on right side and solid fill clipped on left — clearly readable. White stroke separates adjacent circles.
      Legibility verdict: PASS — all text and data elements are fully readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface, not pure black.
      Chrome: Title in light off-white text, clearly readable. Y-axis country labels in light text, readable. X-axis ticks and label in appropriate light colors. Footnote in muted light ink.
      Data: Circle colors are IDENTICAL to light render — Brazil green (#009E73), Vietnam lavender (#C475FD), Colombia blue (#4467A3), Indonesia ochre (#BD8233), Ethiopia red (#AE3030). Partial circles visible with ghost effect on dark background (18% opacity tint renders as faint color over the dark surface). White stroke between circles is visible. Brand green #009E73 remains clearly visible.
      Legibility verdict: PASS — no dark-on-dark failures; all text is light-colored against the dark background. No elements are unreadable.
