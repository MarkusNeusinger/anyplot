review:
  strengths:
  - 'Excellent spec compliance: all pictogram requirements (consistent unit, partial
    icons, left-aligned rows, legend) fully implemented'
  - Creative use of Chart.js plugin hooks (beforeDraw/afterDraw) to build a non-native
    chart type without external libraries
  - Correct Imprint palette assignment across all 5 categories with both themes handled
    cleanly
  - Real-world coffee production dataset with accurate proportions that reinforce
    the visual storytelling
  weaknesses:
  - Partial-circle ghost portions use globalAlpha=0.18 of the data color, which becomes
    nearly invisible on dark background (especially red/ochre categories) — increase
    alpha to ~0.30 or use t.inkSoft at low alpha for ghost fill so fraction indicator
    reads equally well in both themes
  - Two helper functions (filledCircle, partialCircle) defined — departs from strict
    KISS; could be inlined into the plugin
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "pictogram-basic · javascript · chartjs · anyplot.ai" in bold dark text — readable. Category labels (Brazil, Vietnam, Colombia, Indonesia, Ethiopia) in dark text — readable. X-axis ticks and title "Production (million 60 kg bags)" readable. Footnote readable.
      Data: Brazil=9 green (#009E73) circles, Vietnam=4 lavender (#C475FD) + 1 partial, Colombia=2 blue (#4467A3), Indonesia=1 ochre (#BD8233) + 1 partial, Ethiopia=1 red (#AE3030) + 1 partial. Partial circles show ghosted outline at 18% alpha + clipped solid fill — clearly visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title and all category labels rendered in light text — fully readable. X-axis title and ticks in light text — readable. Footnote text readable. No dark-on-dark failures.
      Data: Colors identical to light render (Imprint palette positions 1–5 unchanged). Partial-circle ghost portions noticeably more subtle on dark surface — 18% alpha of data color blends into near-black background, particularly for Ethiopia (red ghost nearly invisible) and Vietnam (faint purple ghost). Still perceptible but weaker than light render.
      Legibility verdict: PASS (with minor note: partial ghost circles less visible in dark theme)
