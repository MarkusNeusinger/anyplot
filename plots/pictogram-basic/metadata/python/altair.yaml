review:
  strengths:
  - Highlight bar behind top-value row (Apples) creates clear focal point and visual
    storytelling
  - Bold green '35k' label for top value gives strong hierarchy; other labels correctly
    de-emphasised
  - Partial opacity correctly communicates fractional icon counts (e.g. 0.4 remainder
    for Oranges)
  - Sorted descending by value for immediate comparison — good data design decision
  - Full Imprint palette positions 1–5 used correctly; brand green on first series
    (Apples)
  - Theme-adaptive chrome is correct in both renders — no dark-on-dark failures
  - 'Perfect spec compliance: unit legend in subtitle, left-aligned labels, grid-row
    layout, partial icons'
  - Clean canvas padding to 3200×1800 with PIL, no cropping
  - Layer composition (highlight + icons + labels) is idiomatic Altair
  weaknesses:
  - Subtitle fontsize=11 is on the small side — at scale_factor=4 it renders at ~44
    source px, which is readable at full size but borderline at mobile scale (400
    px wide thumbnail)
  - Partial icon opacity is applied to the full circle, which on the dark background
    produces a muted, near-invisible partial icon for some hues (e.g. partial Oranges
    icon on dark blends into background more than on light)
  - Design excellence is functional but not sophisticated — icons are plain circles
    with no custom shape or texture that would distinguish this from a basic dot chart;
    the ISOTYPE/pictogram identity relies entirely on the subtitle legend
