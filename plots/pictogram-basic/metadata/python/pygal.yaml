review:
  strengths:
  - Correct use of pygal.Dot as the closest native chart type for a pictogram; the
    dot-matrix layout satisfies the ISOTYPE grid-row requirement
  - Partial icons correctly implemented as proportionally scaled dots (e.g., 0.4x
    size for a 2k remainder when icon_unit=5)
  - Full Imprint palette compliance, correct first series color (#009E73 for Apples),
    and correct theme-adaptive chrome in both renders
  - Title fontsize scaled by formula to avoid overflow; title correctly formatted
    with descriptive prefix
  - Both PNG and HTML outputs saved correctly; sys.path guard prevents module name
    shadowing
  weaknesses:
  - 'Missing unit legend: spec explicitly requires display a legend indicating the
    unit value per icon. Add a subtitle or annotation such as Each dot = 5k tonnes
    to satisfy this requirement.'
  - 'No x-axis title: the x-axis cumulative labels (5k, 10k, ...) lack a descriptive
    label explaining they represent Thousands of tonnes — add x_title to give the
    axis context.'
  - 'Tight right margin at column 35k: the last Apples dot sits very close to the
    right canvas edge; increase margin_right from 40 to ~80 to give breathing room.'
