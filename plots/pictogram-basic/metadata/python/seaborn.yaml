review:
  strengths:
  - 'Full spec compliance: correct isotype layout with left-aligned icon rows, partial
    icons for fractional remainders, unit annotation, and value labels'
  - 'Imprint palette applied in canonical order with Python = #009E73 as required;
    both theme backgrounds correct (#FAF8F1 light / #1A1A17 dark)'
  - Creative use of sns.stripplot with jitter=False for precise icon positioning —
    smart seaborn adaptation for a non-standard chart type
  - Python row highlight band + bold percentage annotation creates clear visual hierarchy
    and focal point
  - 'Perfect code quality: linear structure, deterministic data, clean imports, correct
    output filename, no bbox_inches=''tight'''
  weaknesses:
  - 'Partial icons use alpha=0.35, which works on light background but makes them
    nearly invisible in the dark render — alpha-transparent colored dots on #1A1A17
    produce very dark brownish/olive smudges that barely read as icons (especially
    Go red → near-black, C++ ochre → near-black). Use an additive tint approach instead:
    mix 35% category color + 65% PAGE_BG as a computed hex to get a light muted version
    that reads in both themes.'
  - 'Y-axis tick labels use colors=INK (primary text) instead of INK_SOFT (secondary
    text); the style guide specifies tick labels as secondary text (#4A4A44 light
    / #B8B7B0 dark). Minor inconsistency with the token hierarchy.'
  - 'Design excellence has headroom: slightly larger icons for the Python row (size=16
    vs 14) could reinforce the visual hierarchy already established by the highlight
    band.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "pictogram-basic · python · seaborn · anyplot.ai" in dark ink — clearly readable. Category labels (Python, JavaScript, Java, C++, Go) on Y-axis in dark ink — readable. Value annotations (67%, 55%, 43%, 32%, 25%) in dark ink — readable. X-axis label "Icons (each = 10% of respondents)" — readable. Unit footnote "● = 10% of respondents   (lighter = partial unit)" at fontsize=8 — readable.
      Data: Five rows of colored circles using Imprint palette in canonical order: Python=#009E73 (green), JavaScript=#C475FD (purple), Java=#4467A3 (blue), C++=#BD8233 (ochre), Go=#AE3030 (red). Partial icons appear as faded (alpha=0.35) versions of the same color — clearly distinguishable as lighter/faded versions on the cream background. Subtle green background band highlights Python row.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in light text (#F0EFE8-ish) — clearly readable. Category labels in light text — readable. Value annotations in light text — readable. X-axis label in light text — readable. Unit footnote in light/muted text — readable. No dark-on-dark text failures.
      Data: Data colors are identical to the light render — Python green (#009E73), JavaScript purple (#C475FD), Java blue (#4467A3), C++ ochre (#BD8233), Go red (#AE3030) — all consistent across themes as required. Python row highlight band visible as subtle dark-green tint. HOWEVER: partial icons at alpha=0.35 on #1A1A17 background are nearly invisible — Go partial (matte red × 0.35 blended on near-black ≈ rgb(79,34,32)), C++ partial (ochre × 0.35 on near-black), Java partial (blue × 0.35 on near-black) all render as very dark near-black smudges that barely read as icons.
      Legibility verdict: PASS for text chrome. MARGINAL for partial icon visibility in dark mode.
