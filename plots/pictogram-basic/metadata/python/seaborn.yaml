review:
  strengths:
  - 'Correct Imprint palette in canonical order with first series #009E73'
  - Elegant use of sns.stripplot with jitter=False for deterministic icon placement
  - Partial icon technique via color blending clearly communicates fractional remainders
    in light mode
  - Python row highlighted with axhspan band and bold percentage annotation — clear
    focal point
  - 'Full Imprint theme-adaptive chrome: backgrounds, text, legend all correctly themed'
  - Clean code with strict=True zip, deterministic data, no functions/classes
  - Descriptive x-axis label with unit context; unit legend at bottom
  weaknesses:
  - 'Partial icons in dark mode have very low contrast for warm palette colors: Go
    partial (#4E2120 approx) and C++ partial (#533E20 approx) nearly disappear against
    the #1A1A17 background — use alpha-based transparency (ax.scatter with alpha=0.35)
    instead of blending toward PAGE_BG so dark mode partial dots retain more luminance'
  - Design is functional but not exceptional — no annotations, callouts, or additional
    storytelling elements beyond the highlight band
  - X-axis tick labels hidden but x-axis label retained, creating a slight visual
    inconsistency — the axis label floats without any scale reference ticks
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface.
      Chrome: Title "pictogram-basic · python · seaborn · anyplot.ai" in dark near-black text at 12pt — readable. Y-axis category labels (Python, JavaScript, Java, C++, Go) in dark ink at 8pt — readable. X-axis label "Icons (each = 10% of respondents)" in INK_SOFT at 10pt — readable. Bottom unit annotation in muted gray — readable.
      Data: Five horizontal rows of colored circles. Python row: 6 full #009E73 green + 1 faded partial (lighter greenish) + bold "67%". JavaScript: 5 full #C475FD lavender + 1 faded partial. Java: 4 full #4467A3 blue + 1 faded partial. C++: 3 full #BD8233 ochre + 1 faded partial. Go: 2 full #AE3030 red + 1 faded partial. Python row has a subtle green highlight band. Partial icons appear clearly as lighter/faded versions of full icons.
      Legibility verdict: PASS — all text readable, partial icons clearly distinct from full icons.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title in light cream text (#F0EFE8 approx) — readable. Y-axis category labels in light text — readable. X-axis label in INK_SOFT (#B8B7B0) — readable. Bottom annotation in #A8A79F muted gray — readable. No dark-on-dark text failures.
      Data: Full icon colors are identical to light render — #009E73 green for Python, #C475FD lavender for JavaScript, #4467A3 blue for Java, #BD8233 ochre for C++, #AE3030 red for Go. Data palette is theme-constant. HOWEVER, partial icons in dark mode are very low contrast: the color blending formula uses PAGE_BG=#1A1A17 as the blend target at 35% opacity, so Go's partial blends to approximately #4E2120 (very dark red) and C++'s partial blends to approximately #533E20 (very dark brown) — both nearly invisible against the near-black background. Python partial (dark teal) and JavaScript partial (dark purple) are more visible but still subtle.
      Legibility verdict: PASS for text — all chrome readable. PARTIAL FAIL for Go and C++ partial icons — very low contrast against dark background.
