review:
  strengths:
  - Semantic Imprint color assignments (strawberries→red, bananas→ochre, grapes→purple)
    make the chart immediately intuitive
  - Clever three-layer geom_tile stacking (full / outline / partial fill) cleanly
    implements partial icon fractions within plotnine's grammar
  - Sorted descending by value creates natural visual hierarchy; direct value labels
    enable quick reading
  - Full theme-adaptive chrome — all text, legend, and background tokens flip correctly
    for dark mode
  - Deterministic data with real-world FAO framing and appropriate scale
  weaknesses:
  - Partial tile fills are subtle (especially Oranges at ~40% width in dark mode);
    the unfilled portion of the dashed-outline box blends toward background — consider
    slightly increasing the partial fill opacity or adding a very faint background
    fill to the outline tile
  - Legend wording ('Each ■ = 5k tonnes' as title/label split) is slightly awkward;
    a single-text approach like 'Each square = 5k tonnes' would be cleaner
  - Value label geom_text size=3.5 (≈10pt equivalent) could be bumped to 4.0 for better
    mobile readability at scaled-down sizes
