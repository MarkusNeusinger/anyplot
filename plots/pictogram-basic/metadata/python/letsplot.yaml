review:
  strengths:
  - Correct pictogram chart type using geom_tile with alpha-blending for partial icons
    — functional and spec-compliant approach
  - 'Imprint palette applied in canonical order with Brazil (first series) correctly
    using #009E73'
  - 'Full theme adaptation: both light (#FAF8F1) and dark (#1A1A17) backgrounds render
    correctly with adaptive INK/INK_SOFT tokens throughout'
  - Alternating lane backgrounds (LANE_BG) add visual refinement and improve row readability
  - Native letsplot layer_tooltips() used for interactive HTML output — not fake interactivity
  - Value labels ('45k MT', etc.) provide direct data readout alongside the pictogram
  - '''★ Top producer'' annotation in brand green creates a clear focal point on Brazil'
  - Clean code structure with proper KISS pattern and deterministic hardcoded data
  - scale_alpha_identity() correctly paired with alpha aes mapping for partial icon
    representation
  - HTML output saved alongside PNG for interactive use
  weaknesses:
  - 'Indonesia''s partial tile (alpha=0.2 of #BD8233) is barely visible on the light
    background — the ochre at 20% alpha over the off-white lane blends into the background.
    Consider a minimum alpha floor of 0.3-0.35 so the faintest partial icon remains
    clearly distinguishable from the background'
  - Icons are plain colored squares with no pictographic identity — while squares
    are spec-compliant, using Unicode symbols (e.g., ☕ for coffee) or distinct shapes
    would elevate this from a segmented bar chart to a true ISOTYPE pictogram. At
    minimum, circles would be more iconic than rectangles
  - 'DE-01: Aesthetic design is clean but not publication-ready — the plain square
    tiles lack the visual character expected of a pictogram chart. Even switching
    to geom_point with a larger size and ''square'' shape, or using Unicode text labels
    as the icon markers, would dramatically increase visual impact'
  - Subtitle does the job of the icon-value legend, but a formal legend entry (e.g.,
    '□ = 5k MT') as an annotation near the bottom-left would make the chart more self-contained
    and spec-aligned with 'display a legend indicating this'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white
      Chrome: Title "pictogram-basic · python · letsplot · anyplot.ai" bold dark (#1A1A17), clearly readable. Subtitle "Coffee Production by Country — Each icon represents 5 thousand metric tonnes" in soft ink (#4A4A44), readable. Y-axis country labels bold dark, readable. No x-axis tick labels (hidden, appropriate). Value labels ("45k MT" etc.) in INK_SOFT with bold face, clearly readable.
      Data: Five rows of colored square tiles — Brazil 9 green (#009E73) tiles, Vietnam 6 purple (#C475FD) full + 1 partial (40% alpha = lighter lavender), Colombia 2 blue (#4467A3) full + 1 partial (80% alpha), Indonesia 2 ochre (#BD8233) full + 1 partial (20% alpha = very faint cream tile barely distinguishable from the light lane background), Ethiopia 1 red (#AE3030) full + 1 partial (60% alpha = muted rose). Alternating gray lane bands separate rows. Star annotation "★ Top producer" in brand green above Brazil row. First series is #009E73 ✓.
      Legibility verdict: PASS overall, but Indonesia's 0.2-alpha partial tile (third tile) is nearly invisible against the off-white lane background — a minor but real visibility concern.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black
      Chrome: Title and country labels in near-white (#F0EFE8), clearly readable against dark background. Subtitle in soft light tone (#B8B7B0), readable. Value labels in INK_SOFT dark equivalent, readable. No dark-on-dark failures found.
      Data: Data colors are identical to light render — Brazil green, Vietnam purple, Colombia blue, Indonesia ochre, Ethiopia red. Alternating lanes switch to dark gray (#2A2A26). The 0.2-alpha partial tile for Indonesia appears as a very dark brownish square, slightly more distinguishable against the dark lane than on the light side, but still quite subtle. Star annotation in brand green remains visible.
      Legibility verdict: PASS — all chrome elements are correctly adapted to dark theme, no dark-on-dark failures.
