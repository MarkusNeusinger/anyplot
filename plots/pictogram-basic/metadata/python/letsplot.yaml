review:
  strengths:
  - Correct Imprint palette in canonical order with Brazil (#009E73) first — consistent
    across both renders
  - Partial icons encoded via scale_alpha_identity() with MIN_ALPHA floor (0.33) preventing
    invisible icons — elegant approach
  - Alternating lane backgrounds (geom_rect) provide structure without grid lines,
    keeping chrome minimal
  - 'Strong data storytelling: ''★ Top producer'' annotation, right-side value labels,
    and quantity-sorted order all guide the viewer'
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT correctly applied to all text
    elements in both light and dark renders'
  - layer_tooltips() provides native letsplot interactivity with context-rich content
  - Both PNG and HTML outputs generated — leverages letsplot's dual static/interactive
    capability
  weaknesses:
  - Partial icons in dark mode lose the 'fading' metaphor — on a dark background,
    alpha blending produces darker/murkier versions of each color rather than lighter
    tints, making the partial icons look like a different data series rather than
    a fractional unit. Consider rendering partial icons with a pattern fill or outline-only
    style for dark mode.
  - Scale note '● = 5k MT' at geom_text size=3.5mm is on the small side (~10pt at
    final resolution). Increase to size=4 or 4.5 to ensure mobile readability.
  - 'Design could push further: the alternating lane backgrounds and annotation are
    good foundations, but marker size=12 on large circles leaves room for more distinctive
    icon styling (e.g., filled circles with heavier stroke or custom point shape).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface.
      Chrome: Title "pictogram-basic · python · letsplot · anyplot.ai" in bold dark ink, clearly readable. Subtitle in softer INK_SOFT tone, readable. Y-axis category labels (Brazil, Vietnam, Colombia, Indonesia, Ethiopia) in bold dark ink — all clear. Value labels "45k MT", "32k MT" etc. in INK_SOFT, readable. "★ Top producer" annotation in brand green. Small "● = 5k MT" scale note in bottom-left, small but readable.
      Data: 5 rows of filled circles. Brazil: 9 full green (#009E73) circles. Vietnam: 6 full lavender (#C475FD) + 1 partial (lighter tint at alpha≈0.4). Colombia: 2 full blue (#4467A3) + 1 partial (slightly faded). Indonesia: 2 full ochre (#BD8233) + 1 very light partial (alpha≈0.33). Ethiopia: 1 full red (#AE3030) + 1 partial. Alternating grey lane backgrounds visible on even rows.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title and subtitle in light-colored ink (#F0EFE8 / #B8B7B0) — both readable against dark background. Y-axis labels in light bold ink — readable. Value labels in lighter INK_SOFT tone (#B8B7B0) — readable. "★ Top producer" annotation still in brand green (#009E73). Scale note in lighter tone. No dark-on-dark failures observed.
      Data: Imprint palette colors identical to light render — Brazil green, Vietnam lavender, Colombia blue, Indonesia ochre, Ethiopia red. Partial icons appear as darker/murkier versions of their category color on the dark surface (alpha blending behavior differs from light mode where partials appear as lighter tints). All full icons fully visible and distinct.
      Legibility verdict: PASS — all text elements are readable on the dark background with properly adaptive chrome tokens applied.
