review:
  strengths:
  - Partial icon wedge fill technique is elegant and correct — ghost circles + wedge
    overlay accurately represents fractional remainders
  - 'All Imprint palette colors applied in canonical order with brand green #009E73
    as first series (Apples/highest value)'
  - 'Perfect theme adaptation: both renders fully readable, no dark-on-dark failures,
    correct #FAF8F1/#1A1A17 backgrounds'
  - 'Idiomatic Bokeh usage: ColumnDataSource, HoverTool with tooltips, CustomJSTickFormatter,
    BoxAnnotation bands, FixedTicker — all correct'
  - CDP screenshot technique (Page.captureScreenshot with clip) ensures exact 3200×1800
    pixel output, more reliable than driver.save_screenshot()
  - Sorted by value descending with bold INK emphasis on top category provides clear
    visual hierarchy
  - Interactive HTML artifact preserved alongside PNG — both catalog artifacts present
  weaknesses:
  - 'DE-03: Data storytelling is functional but limited to sorted ordering — no focal-point
    annotation or comparative callout guides the viewer beyond raw rank inspection'
  - 'DE-02: Alternating row bands (BoxAnnotation) create an unintended full-area ''box''
    effect in the dark render — the elevated bands collectively give the plot area
    a slightly raised appearance relative to the outer border, subtle but visible'
  - 'LM-02: CDP/Selenium screenshot technique is advanced but HoverTool interactivity
    is the only Bokeh-distinctive feature in the visualization itself; more Bokeh-specific
    interactions (e.g. TapTool, CustomJS callbacks) could further showcase library
    strengths'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white
      Chrome: Title "pictogram-basic · python · bokeh · anyplot.ai" in bold dark INK (#1A1A17), ~70% width, perfectly readable. Subtitle "Fruit Production — Annual output in thousands of tonnes" in INK_SOFT gray, centered below title. Y-axis category labels (Apples, Grapes, Oranges, Bananas, Mangoes) in 34pt bold INK — prominent and clearly readable. Value labels (35k, 28k, 23k, 17k, 11k) on the right in 28pt, top label in bold INK, rest in INK_SOFT. Legend key "Each ● = 5,000 tonnes" in INK_MUTED at bottom left.
