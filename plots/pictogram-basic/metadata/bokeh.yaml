    are sorted by value descending: Apples (steel blue, 7 full circles, "35 k" in
    bold 24pt), Grapes (muted purple, 5 full + 1 partial, "28 k"), Oranges (warm orange,
    4 full + 1 partial, "22 k"), Bananas (golden yellow, 3 full + 1 partial, "18 k"),
    and Mangoes (teal green, 2 full + 1 partial, "12 k"). Partial icons use colored
    wedges over light gray background circles. Category labels appear on the left
    y-axis in bold 26pt. Value annotations appear to the right of each row. The top
    category has full opacity while lower rows fade slightly (alpha hierarchy). A
    legend at the bottom reads "Each ● = 5,000 tonnes" in 26pt. All spines, grid lines,
    and tick marks are removed. White borders separate each circle. Notable empty
    space remains on the right side of the canvas for shorter category rows.'
