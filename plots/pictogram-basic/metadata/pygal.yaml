review:
  strengths:
  - Creative use of pygal.Dot chart as a pictogram approximation — leverages a distinctive
    pygal chart type
  - Clean, well-structured code with thoughtful data preparation (min 0.5 for partial
    dot visibility)
  - Intentional color hierarchy with dark navy for top producer and descending data
    order
  - Grid lines removed and margins tuned for a clean, refined appearance
  - Fully deterministic data with good mix of exact multiples and remainders
  weaknesses:
  - Partial dots represented only by size reduction — less intuitive than half-filled
    or segmented icons
  - Color palette could be more harmonious — the 5 colors lack a unifying theme
  - No stronger focal point or data insight beyond descending order
  - Legend text appears small relative to the canvas despite explicit font sizing
  image_description: 'The plot displays a dot matrix chart on a white background with
    the title "Fruit Production (each dot = 5k tonnes) · pictogram-basic · pygal ·
    pyplots.ai" at the top. Five fruit categories are listed on the Y-axis (Apples,
    Oranges, Bananas, Grapes, Mangoes) in descending order of production. Each category
    has a row of large colored circles: Apples in dark teal/navy (7 full dots), Oranges
    in gold/yellow (4 full + 1 small partial), Bananas in green (3 full + 1 small
    partial), Grapes in purple (3 full dots), and Mangoes in coral/red (1 full + 1
    small partial). The X-axis shows cumulative values (5, 10, 15, 20, 25, 30, 35).
    Partial dots are rendered as smaller circles representing fractional remainders.
    A legend at the bottom shows all five categories with colored square indicators.
    No grid lines are visible, giving the chart a clean appearance.'
