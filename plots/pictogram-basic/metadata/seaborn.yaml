    has 5 full purple circles plus 1 lighter partial circle (28k), Oranges has 4 full
    orange circles plus 1 faded partial (22k), Bananas has 3 full yellow circles plus
    1 lighter partial (18k), and Strawberries has 2 full red circles plus 1 faded
    pink partial (12k). The top category (Apples) is highlighted with a subtle light
    blue background band. Value annotations appear to the right of each row, with
    the top value in bold. The title reads "pictogram-basic · seaborn · pyplots.ai"
    and a bottom legend states "● = 5 thousand tonnes (lighter = partial value)".
    All spines are removed, creating a clean white background.'
