review:
  strengths:
  - Correct Imprint palette assignment with brand green to leading category and matte
    red to lowest — semantically coherent
  - 'Partial icon implementation accurate: alpha = fractional remainder of value/ICON_UNIT'
  - Both themes render cleanly with no dark-on-dark or light-on-light failures
  - Subtitle and bold focal emphasis on top-category value label create effective
    data storytelling
  - Grid-free, spine-free layout is right for a pictogram
  - scale_alpha_identity() elegantly handles partial-icon fading
  weaknesses:
  - Caption font (8pt) is at the lower readable limit for the 3200x1800 canvas — increase
    plot.caption size to 9pt in theme()
  - Design is clean-and-correct but not visually inventive — no additional flourish
    beyond icon grid and color assignment limits DE-01 ceiling
