  image_description: The plot shows a root locus diagram for G(s) = 1/[s(s+1)(s+2)]
    with three color-coded branches. Branch 1 (blue) extends along the negative real
    axis to the left. Branches 2 (orange) and 3 (green) curve into the upper and lower
    half-planes respectively, forming complex conjugate trajectories. Red cross markers
    indicate open-loop poles at s=0, s=-1, and s=-2 on the real axis. Red filled diamond
    markers with labels identify the imaginary axis crossings at jw = +/-j*sqrt(2)
    (K=6). A small gray square marks the breakaway point near s=-0.42. Very faint
    dashed gray lines show constant damping ratio lines radiating from the origin
    and natural frequency semicircular arcs. Semi-transparent thick blue segments
    indicate the real-axis portions of the root locus. Small colored triangle arrows
    on the complex branches indicate the direction of increasing gain. The title reads
    "root-locus-basic - altair - pyplots.ai" with subtitle about the transfer function.
    A legend in the top-right identifies the three branches. The domain spans [-7,
    2.5] x [-6, 6] with content concentrated in the center-right area.
