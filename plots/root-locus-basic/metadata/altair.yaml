  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/s(s+1)(s+2) on a square canvas with equal axis scaling from -6 to 6.
    Three branches are shown in distinct colors: Branch 1 (blue) extends along the
    negative real axis from the origin toward negative infinity; Branch 2 (orange)
    curves upward from the real axis into the upper half-plane; Branch 3 (green) curves
    downward into the lower half-plane. Open-loop poles are marked with red cross
    markers at s=0, s=-1, and s=-2 on the real axis. Red diamond markers indicate
    imaginary axis crossings at jw = plus/minus sqrt(2) with labels showing K=6. A
    dark gray square marks the breakaway point near s approximately -0.42. Light blue
    thick lines highlight real axis segments between (-1, 0) and from -2 to negative
    infinity. Subtle dashed gray lines show constant damping ratio guides radiating
    from the origin and natural frequency semicircular arcs in the left half-plane.
    Triangle-shaped direction arrows on the complex branches indicate the direction
    of increasing gain. The title reads "root-locus-basic · altair · pyplots.ai" with
    a subtitle describing the transfer function. A legend in the top-right identifies
    the three branches.'
