review:
  strengths:
  - Accurate numerical root locus computed via polyroot() across 1000 gain values
    — physically correct pole trajectories for G(s)=K/(s(s+2)(s+4))
  - 'Full theme adaptation: background, text, grid, legend frame, and pole markers
    all flip correctly between #FAF8F1 and #1A1A17 surfaces'
  - Correct use of coord_equal() to preserve geometric relationships in the complex
    plane
  - 'Domain-appropriate marker encoding: × shape for open-loop poles, filled diamond
    for imaginary axis crossings at the stability boundary'
  - 'Imprint palette used canonically (branch 1 = #009E73, branch 2 = #C475FD, branch
    3 = #4467A3); semantic red #AE3030 correctly chosen for stability-boundary crossings'
  - Arrows on each branch via geom_segment(arrow=...) clearly communicate direction
    of increasing gain
  weaknesses:
  - Missing damping ratio (zeta) and natural frequency (omega_n) reference lines —
    the spec explicitly requires 'a dashed or light grid to indicate constant damping
    ratio and natural frequency lines'. These are radial rays from the origin (at
    arccos(zeta) angles) and concentric circles (radius = omega_n), NOT the standard
    Cartesian grid. Add them as geom_path/geom_segment layers with dashed linetype
    and INK_MUTED color before the locus branches.
  - 'Unused imports: library(tidyr) and library(scales) are loaded but no functions
    from either package are called in the script. Remove both to keep imports clean.'
  - 'Grid uses raw INK (#1A1A17 light / #F0EFE8 dark) at linewidth 0.15 rather than
    the style-guide recommended rgba-opacity approach. Consider switching panel.grid.major
    to element_line(color = INK_MUTED, linewidth = 0.15) for softer grid lines that
    better recede behind data.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "root-locus-basic · r · ggplot2 · anyplot.ai" in dark #1A1A17, spanning ~55% of canvas width — fully readable. Axis labels "Real Axis" and "Imaginary Axis" in dark ink at 10pt, tick labels in #4A4A44 at 8pt — all clearly visible. Legend box has elevated background with INK_SOFT border; all legend text readable.
      Data: Branch 1 (green #009E73) traces the lower complex-plane path from pole at (0,0) downward. Branch 2 (lavender #C475FD) forms the real-axis segment running from approx (-5.5, 0) to (-1, 0). Branch 3 (blue #4467A3) traces the upper complex-plane path crossing the imaginary axis. Open-loop poles marked with bold × markers (shape=4) in dark ink at 3 positions on the real axis (0, -2, -4). Imaginary axis crossings at (0, ±√8 ≈ ±2.83) marked with red diamonds (#AE3030). Gain-direction arrows visible on each branch.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black.
      Chrome: Title and axis labels rendered in light #F0EFE8, tick labels in #B8B7B0 — all visible against the dark surface. Legend background is elevated dark #242420 with subtle border. No dark-on-dark failures detected. Open-loop pole × markers render in white (INK flips to #F0EFE8) — clearly visible.
      Data: Branch colors are identical to the light render (#009E73 green, #C475FD lavender, #4467A3 blue) — data palette unchanged between themes as required. Red diamond stability-boundary markers (#AE3030) clearly visible. Grid lines lighter/white-tinted and more visible than in light mode, but still subtle.
      Legibility verdict: PASS — all text readable against the near-black surface; theme adaptation complete and correct.
