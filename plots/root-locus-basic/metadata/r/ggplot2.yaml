review:
  strengths:
  - Correct numerical root locus computed via polyroot for a classic 3rd-order system
    G(s) = K/(s(s+2)(s+4)); imaginary axis crossing at K=48 derived analytically via
    Routh-Hurwitz
  - Domain-specific reference grid (damping ratio rays zeta=0.2/0.4/0.6/0.8 and natural
    frequency circles omega_n=1-5) adds professional control-system context
  - Full Imprint palette compliance with theme-adaptive chrome; pole markers correctly
    flip between black (light) and white (dark) via INK token
  - Direction arrows on all three branches using geom_segment with closed arrow heads
    correctly indicating increasing gain K direction
  - Equal-aspect scaling (coord_equal) preserves geometric relationships as required
    by the specification
  - Clean linear code structure; modern linewidth= API throughout; set.seed(42) for
    reproducibility
  weaknesses:
  - 'Branch tracking discontinuity at the breakaway point (K~3.08): the order(Im(r))
    sort swaps which physical pole each branch label tracks as the system transitions
    from 3 real roots to 1 real + 2 complex roots, causing geom_path to draw a spurious
    real-axis segment from s~-0.845 to s=-4 through the non-locus region. Fix: track
    branches by nearest-neighbour distance to previous root positions instead of sorting
    by imaginary part, or restructure by generating pre/post-breakaway data frames
    with explicit branch assignments.'
  - 'xlim=c(-7,2) leaves ~1.5 units of unnecessary empty space to the left (real-axis
    branch only reaches x~-5.5 at K=40). Fix: tighten to coord_equal(xlim=c(-6,1),
    ylim=c(-6,6)) to better frame the locus.'
  - 'Gain range K=0 to 40 leaves the locus 17% short of the imaginary axis crossing
    (K=48). Fix: extend gain_vals to K=55 so the locus visually reaches past the crossing
    point.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "root-locus-basic · r · ggplot2 · anyplot.ai" in dark near-black ink (#1A1A17), clearly readable. X-axis label "Real Axis" and Y-axis label "Imaginary Axis" in dark ink at 10pt, readable. Tick labels at 8pt in INK_SOFT (#4A4A44), readable. Grid lines subtle (linewidth 0.15/0.08 in INK_MUTED with alpha).
      Data: Three root locus branches — Branch 1 in #009E73 (brand green), Branch 2 in #C475FD (lavender), Branch 3 in #4467A3 (blue). Open-loop poles at s=0,-2,-4 marked with bold × in near-black. Red diamond markers (#AE3030) at imaginary axis crossings (0, ±2.83j). Dashed concentric circles (omega_n=1-5) and radial rays (zeta=0.2-0.8) in muted gray. Direction arrows on all three branches. Legend boxed with elevated background.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title and axis labels switch to near-white (#F0EFE8) for primary text, #B8B7B0 for secondary text (ticks, legend). All text clearly readable against dark background. No dark-on-dark failures observed. Pole markers flip from near-black to near-white (via INK token) — correctly visible. Legend box uses elevated dark background #242420.
      Data: All three Imprint palette branch colors (#009E73, #C475FD, #4467A3) are identical to the light render — data colors unchanged. Red diamond stability crossings (#AE3030) remain visible. Dashed reference grid adapts appropriately.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures.
