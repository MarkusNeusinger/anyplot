  strengths:
  - Perfect spec compliance — every required feature from the specification is implemented
  - 'Excellent domain-specific data: realistic 4th-order transfer function with meaningful
    pole/zero placement'
  - Smart use of domain-specific overlays (damping ratio lines, natural frequency
    arcs) replacing the default grid
  - Clean, well-structured code with deterministic computation
  - Good use of lets-plot interactive tooltips for branch/gain information
  weaknesses:
  - Red-green color pair for Branch 2 and Branch 3 is not colorblind-safe
  - Branch overlap on the real axis makes it hard to distinguish Branch 1 and Branch
    2
  - Design could be more polished to reach publication quality
  image_description: 'The plot shows a root locus diagram on a light gray (#FAFAFA)
    background. Four locus branches are displayed in distinct colors: dark blue (Branch
    1), red/orange (Branch 2), green (Branch 3), and purple (Branch 4). Open-loop
    poles are marked with large black × markers at s = 0, -1, -2, and -4 on the real
    axis. An open-loop zero is marked with a black ○ at s = -3. Dashed gray semicircular
    arcs represent constant natural frequency (ωn = 1, 2, 3, 4), and dashed gray radial
    lines show constant damping ratios (ζ = 0.2, 0.4, 0.6, 0.8) with labels in the
    upper half-plane. Red diamond markers indicate imaginary axis crossings (stability
    boundary). Small arrows on the branches show the direction of increasing gain.
    The title reads "root-locus-basic · letsplot · pyplots.ai" in bold. Axis labels
    are "Real Axis" and "Imaginary Axis". A caption at the bottom shows the transfer
    function G(s) = (s + 3) / [s(s + 1)(s + 2)(s + 4)] with a legend for × = poles
    and ○ = zeros. The legend on the right identifies the four branches. The axes
    use equal scaling via coord_fixed.'
