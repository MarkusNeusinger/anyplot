  image_description: 'The plot displays a root locus diagram on a near-white (#FCFCFC)
    background. Four locus branches are shown in distinct colorblind-safe colors:
    dark blue (#306998, Branch 1), orange (#E69F00, Branch 2), pink (#CC79A7, Branch
    3), and light blue (#56B4E9, Branch 4). Open-loop poles are marked with large
    black × markers at s = 0, -1, -2, and -4 on the real axis. An open-loop zero is
    marked with a black ○ at s = -3. The left half-plane has a very faint green (#E8F4E8)
    shading indicating the stable region. Dashed gray semicircular arcs represent
    constant natural frequency (ωn = 1, 2, 3, 4), and dashed gray radial lines show
    constant damping ratios (ζ = 0.2, 0.4, 0.6, 0.8) with labels in monospace font
    in the upper half. Orange diamond markers highlight imaginary axis crossings (stability
    boundary). Small open arrows on branches indicate direction of increasing gain.
    The title reads "root-locus-basic · letsplot · pyplots.ai" in bold. Axis labels
    are "Real Axis (σ)" and "Imaginary Axis (jω)" with serif "jω" and "σ" labels near
    the axes. A caption shows the transfer function with pole/zero legend. The legend
    on the right identifies all four branches under "Locus Branch".'
