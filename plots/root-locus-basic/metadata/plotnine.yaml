  strengths:
  - Perfect spec compliance — all required features (poles, arrows, real-axis segments,
    stability crossings, guide lines) implemented correctly
  - Excellent data choice — classic textbook transfer function that demonstrates all
    root locus features
  - Clean, deterministic code with well-structured data preparation
  - Proper use of coord_fixed to preserve geometric relationships
  - Thoughtful custom color palette and subtle guide line styling
  weaknesses:
  - Branch 1 (blue) visually merges with the blue real-axis segment — hard to distinguish
    the two overlapping elements
  - Damping ratio and natural frequency guide lines lack text labels on the plot itself
  - No annotation of key features like breakaway point gain or imaginary crossing
    gain values
  - Canvas utilization could be improved — significant empty space due to 16:9 + fixed
    aspect ratio
  image_description: The plot displays a root locus diagram for the transfer function
    G(s) = 1/[s(s+1)(s+3)] with three branches colored in blue (#306998), orange (#E8833A),
    and green (#5BA65B). Open-loop poles are marked with black × markers at s=0, s=-1,
    and s=-3 on the real axis. Red diamond markers indicate imaginary axis crossings
    (stability boundary) at approximately ±1.7j. Dashed gray lines radiate from the
    origin showing constant damping ratio guidelines (ζ=0.2, 0.4, 0.6, 0.8), and dotted
    gray circles show constant natural frequency contours (ωn=1,2,3,4). A blue real-axis
    segment extends left from s=-3. Direction arrows in black indicate increasing
    gain on each branch. The axes are labeled "Real Axis (σ)" and "Imaginary Axis
    (jω)" with a legend on the right showing Branch 1, 2, 3. The title reads "root-locus-basic
    · plotnine · pyplots.ai". Equal axis scaling is maintained via coord_fixed.
