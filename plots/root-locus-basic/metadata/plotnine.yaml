    lines. The left half-plane has a subtle green "Stable" shading and the right half-plane
    has subtle red "Unstable" shading. Direction arrows indicate increasing gain on
    each branch. The legend (right side) shows both Markers and Branch categories.
    Axis labels read "Real Axis (σ)" and "Imaginary Axis (jω)" with custom mizani
    formatters showing "j" suffix on imaginary axis ticks.'
