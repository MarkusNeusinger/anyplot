  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = 1/[s(s+1)(s+3)] on a white background with a square aspect ratio. Three
    branches are shown: Branch 1 (blue) extends left along the negative real axis,
    Branch 2 (orange) curves downward from the breakaway point into the lower half-plane
    crossing the imaginary axis, and Branch 3 (green) curves upward into the upper
    half-plane also crossing the imaginary axis. Open-loop poles are marked with large
    black X markers at s=0, s=-1, and s=-3 on the real axis. A black square marks
    the breakaway point near s=-0.45 with a "Breakaway K=0.63" annotation below it.
    Red diamond markers highlight the imaginary axis crossings at approximately +/-1.7j,
    labeled "K=12.0" in bold red text. Faint dashed lines show constant damping ratio
    guides (zeta=0.2, zeta=0.4 visible; zeta=0.6 and zeta=0.8 labels partially cut
    off or invisible). Very faint dotted circles indicate natural frequency contours
    (wn=1, 2, 3, 4). Brown/tan segments on the real axis show root locus real-axis
    portions. Black arrows on branches indicate direction of increasing gain. The
    legend on the right shows Markers (Breakaway Point, Open-loop Pole) and Branch
    colors. Title reads "root-locus-basic - plotnine - pyplots.ai" in bold. Axes labeled
    "Real Axis (sigma)" and "Imaginary Axis (jw)".'
