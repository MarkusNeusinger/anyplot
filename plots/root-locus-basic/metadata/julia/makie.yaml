      Data: Three locus branches in Imprint palette order: brand green (#009E73) for branch from s=0, lavender (#C475FD) for branch from s=-2, blue (#4467A3) for branch from s=-4. Open-loop poles marked with × in INK (black). jω-axis crossings marked with red diamonds (IMPRINT[5] = #AE3030 — semantic stability boundary). Rotated triangle direction arrows on each branch. Dashed radial ζ guide lines (0.3/0.5/0.7) and dotted semicircular ωn arcs (2/4/6) as control-engineering overlays. Annotation "±j2.83 (K = 48)" in INK_SOFT at 11pt. DataAspect() preserves 1:1 axis scale.
