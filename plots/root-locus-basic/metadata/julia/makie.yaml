  strengths:
  - 'Perfect spec compliance — all required features implemented: open-loop pole markers,
    locus branches with direction arrows, imaginary-axis crossings annotated at exact
    K value, damping-ratio lines, and natural-frequency arcs'
  - 'Mathematically rigorous: eigenvalue computation via companion matrix correctly
    tracks all three branches through the full K range including the breakaway point
    and jω crossings'
  - Full theme adaptability — every chrome token (titlecolor, xlabelcolor, ylabelcolor,
    xticklabelcolor, yticklabelcolor, xtickcolor, ytickcolor, grid, spine, legend
    background) is threaded through INK / INK_SOFT / PAGE_BG / ELEVATED_BG; dark render
    shows no dark-on-dark failures
  - 'Imprint palette used correctly — first branch is brand green #009E73; jω crossings
    use semantic IMPRINT[5] matte-red appropriately as a stability-boundary marker;
    all three branch colors are identical across both themes'
  - DataAspect() correctly applied for equal axis scaling, preserving the geometric
    relationships of the complex plane that are central to root-locus interpretation
  - 'Strong data storytelling: rotated triangle markers showing increasing-K direction,
    annotated jω crossings with exact gain value, imaginary-axis reference line, and
    labelled damping-ratio / natural-frequency overlay all guide the viewer through
    the control-theory narrative'
  weaknesses:
  - Helper function `companion_roots` is defined at script level — minor KISS (CQ-01)
    violation; the eigvals call could be inlined with a one-liner lambda or closure
    inside the loop to avoid defining a named function
  - Damping-ratio labels (ζ=0.3, ζ=0.5, ζ=0.7) are rendered at fontsize=13 (26 source-px
    after px_per_unit=2); they are readable at full 2400×2400 resolution but sit close
    to the lower-legibility threshold when scaled to mobile thumbnail widths (~400
    px) — consider raising to fontsize=14 or 15
  - 'Upper-right corner is slightly crowded: the jω crossings annotation at (0.2,
    ~3.2) and the axislegend at :rt position leave little breathing room; the annotation
    text could be shifted slightly further left (e.g. x=0.3 → x=-0.3 to move it left
    of the crossing) to open the corner'
