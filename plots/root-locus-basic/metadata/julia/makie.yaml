review:
  strengths:
  - 'Technically accurate root locus computation: companion matrix eigenvalue tracking
    produces correct branches, breakaway at s≈−0.845 and jω crossings at K=48/s=±j√8
    are precisely placed.'
  - 'Complete spec coverage: all required root locus features present — direction
    arrows, open-loop poles, stability crossings, damping-ratio lines, natural-frequency
    arcs, DataAspect equal scaling.'
  - 'Exemplary Imprint palette use: semantic matte-red for stability boundary, INK
    for structural pole markers, canonical 3-color branch sequence — color hierarchy
    tells the control-engineering story.'
  - 'Full dual-theme adaptation: both renders theme-correct with no dark-on-dark or
    light-on-light failures.'
  - 'Distinctive Makie features: rotated triangle markers for gain-direction arrows,
    DataAspect(), full Axis attribute theming.'
  weaknesses:
  - Secondary annotation text (ζ labels and jω crossing annotation) at fontsize=11
    is small at the 2400-px canvas size and becomes barely visible at mobile-width
    srcset scales — increase both to fontsize=12 or 13.
  - Natural frequency arcs at RGBAf α=0.10 are almost invisible in both themes — increase
    to α=0.15 to make them recognizable as guide elements.
  - 'To reach 90+ design polish: add a subtle vertical reference line at x=0 (imaginary
    axis / stability boundary) using a thin INK line at ~15% opacity; increase ζ-label
    fontsize to 13 to match tick-label visual weight.'
