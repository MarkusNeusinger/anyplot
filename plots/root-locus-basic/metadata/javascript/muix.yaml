review:
  strengths:
  - Mathematically rigorous root locus computation using Newton-Raphson iteration
    — poles trace correctly from K=0 to K=90 with accurate breakaway (≈−0.845) and
    imaginary-axis crossing (K=48, ±j2.83)
  - 'Custom slot override (`slots={{ mark: CustomMark }}`) elegantly handles four
    distinct mark shapes (×-poles, ▶-arrows, tiny dots for damping, circles for branches)
    — idiomatic MUI X pattern'
  - Amber ChartsReferenceLine at x=0 labeled 'Stability boundary (K=48)' creates a
    strong visual focal point and storytelling anchor
  - 'Imprint palette used correctly: Branch A green (#009E73), Branch B lavender,
    Branch C blue; poles use ink color; damping lines use inkSoft — all theme-adaptive'
  - 'Both light and dark renders pass readability: warm #FAF8F1 / #1A1A17 backgrounds,
    light-on-dark chrome in dark render, no dark-on-dark failures'
  - 'Data quality is excellent: three-pole academic transfer function G(s)=K/[s(s+2)(s+4)]
    is a classic neutral example covering all root locus features (real-axis segments,
    complex departure, stability crossing)'
  - Gain direction arrows placed at branch midpoints (K≈45) computed from finite-difference
    angles — correct directional storytelling
  weaknesses:
  - Constant natural frequency (ωn) circles missing — spec requires 'dashed or light
    grid to indicate constant damping ratio AND natural frequency lines'; only damping
    ratio rays are drawn, not the concentric ωn arcs from the origin
  - Legend row is tight with 5 entries in a single horizontal line — 'Const. damping
    ratio ζ=0.3, 0.5, 0.7' label and 'Branch B (s=−2 → lower half-plane)' label are
    long and cause crowding; consider wrapping to two rows or abbreviating
  - Stability boundary label ('Stability boundary (K=48)') rendered at fontSize 12
    is small and may be hard to read at mobile scale (~400 px); increase to 14 or
    move outside the chart area
  - x-axis range is −9 to 3 (center at −3) while y-axis range is −6 to 6 (center at
    0) — spec asks the plot to be centered on the origin with equal axis scaling;
    adjust x range to e.g. −7 to 7 or −8 to 8 for a symmetric view
  - Code has multiple top-level helper functions (polyVal, polyDeriv, findRealRoot,
    complexPair, dirAngle) that deviate from KISS structure; acceptable given the
    math, but could inline the trivial one-liners
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, no pure white.
      Chrome: Title "root-locus-basic · javascript · muix · anyplot.ai" at top in dark ink, ~55% plot width, clearly readable. X-axis label "Real Axis σ" and Y-axis label "Imaginary Axis jω" in dark ink, balanced sizes. Tick labels at 14px CSS are readable. Legend row at top with 5 series labels — slightly crowded but legible.
      Data: Branch A (brand green #009E73) curves upward from near the origin into the upper half-plane. Branch B (lavender #C475FD) mirrors downward. Branch C (blue #4467A3) is the real-axis branch traveling left from s=−4 toward −∞ with a solid horizontal line. Three open-loop pole × markers (black ink) at s=0, −2, −4. Dotted damping ratio rays (inkSoft, low opacity) fan outward at ζ=0.3, 0.5, 0.7. Triangle gain-direction arrows on each branch. Amber dashed vertical reference line at x=0 labeled "Stability boundary (K=48)".
      Legibility verdict: PASS — all title, axis labels, tick labels, and legend entries are readable against the light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title and axis labels render in light ink (off-white), clearly readable against the dark background. Tick labels are light-colored and legible. Legend text appears in light ink. No dark-on-dark failures detected.
      Data: Branch colors are identical to light render — brand green, lavender, blue remain the same. Open-loop pole markers appear as white × symbols on the dark background. Amber reference line remains visible. Damping dots are subtle but visible.
      Legibility verdict: PASS — all text elements are readable in the dark theme. Chrome correctly flips from dark-on-light to light-on-dark. Data colors are identical between themes.
