review:
  strengths:
  - Mathematically accurate root locus via Newton's method + quadratic deflation —
    impressive physics fidelity for a frontend chart
  - Correct Imprint palette application (brand green/lavender/blue in canonical order,
    amber semantic anchor for stability boundary reference line)
  - Clean code organization with well-documented polynomial math and clear section
    separation
  - 'Perfect theme adaptation: Imprint data colors identical across light and dark
    renders, only chrome flips'
  - ChartsReferenceLine with custom amber lineStyle and labelStyle is idiomatic MUI
    X community usage
  weaknesses:
  - 'Reference line label ''Stability boundary (K=48)'' overlaps the markerSize=16
    pole circle at s=0 — leading ''Stab'' visually hidden in dark render. Fix: reduce
    pole markerSize to 8-10 and/or position label above the reference line via labelStyle
    y-translate.'
  - Missing gain-direction arrows on locus branches — spec explicitly requires arrows
    indicating the direction of increasing gain on each branch. Add small triangle
    markers as an extra scatter series at branch midpoints.
  - Missing constant damping-ratio / natural-frequency grid lines — spec requires
    'a dashed or light grid to indicate constant damping ratio and natural frequency
    lines'. Add arc scatter series at ζ=0.3, 0.5, 0.7 using parametric semicircle
    data in muted color.
  - 'Non-equal axis scaling distorts complex-plane geometry: x spans 12 units (-9
    to +3), y spans 9 units (-4.5 to +4.5). Spec requires equal axis scaling to preserve
    geometric relationships. Fix: set yAxis to min=-6, max=+6 or adjust xAxis to match
    y span.'
  - Open-loop poles rendered as filled circles instead of × markers as the spec requires.
    Reduce markerSize and consider using a custom mark slot or per-pole ChartsReferenceLine
    as approximation.
