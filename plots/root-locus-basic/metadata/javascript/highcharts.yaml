review:
  strengths:
  - Mathematically rigorous cubic root computation using Cardano formula and trigonometric
    method — correct branch tracking across all K
  - Custom Highcharts SVG symbol (x_pole) for open-loop pole markers — idiomatic and
    precise
  - Post-render gain-direction arrows via chart.renderer.path() with trigonometric
    orientation — showcases advanced Highcharts renderer
  - 'Semantic color assignment: matte red (palette[4]) for stability boundary crossings
    — appropriate semantic exception'
  - Square canvas orientation chosen correctly for equal-axis-scaling requirement
    of root locus
  - Damping ratio guide lines (ζ=0.5 and ζ=0.7) with ShortDash style add engineering
    context without visual clutter
  - All theme tokens applied correctly — transparent background, inkSoft for chrome,
    t.grid for grid lines
  weaknesses:
  - Missing natural frequency (ωn) concentric-circle guide lines — spec says both
    damping ratio AND natural frequency lines; only ζ lines are present
  - Two helper functions (cubicRoots, dampingLine) deviate from the KISS no-functions
    preference; acceptable for this math-heavy chart but worth noting
  - Legend text is slightly small at the bottom in both renders — may be hard to read
    at mobile scale (~400px wide)
  - Gain-direction arrows are small (len=10, w=5 px) — may not be visible at thumbnail
    sizes; consider increasing to len=14, w=7
