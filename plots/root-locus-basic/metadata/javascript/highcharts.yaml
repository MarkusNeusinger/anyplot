review:
  strengths:
  - 'Mathematically rigorous: implements exact analytic cubic-root solver (Cardano
    + trigonometric method) for smooth, perfectly accurate root locus curves'
  - Custom SVGRenderer symbol extension (x_pole) for open-loop pole markers is idiomatic,
    advanced Highcharts usage
  - Correct semantic use of matte red (palette[4]) for jω stability-boundary markers
    matching the Imprint bad/loss/error semantic anchor rule
  - Complete theme-token wiring throughout (t.ink, t.inkSoft, t.grid, t.palette) with
    no dark-on-dark failures in dark render
  - Physics comments (breakaway K~3.08, imaginary crossing K=48) make the data generation
    readable and auditable
  weaknesses:
  - 'Missing gain-direction arrows on locus branches: spec requires ''arrows indicating
    the direction of increasing gain'' — add small scatter series at intermediate
    K values (~K=20 and K=60) for each branch with triangle/arrowhead symbols oriented
    tangent to the branch direction'
  - 'Axes not equally scaled: landscape 16:9 canvas with equal x/y ranges (both 11
    units) means horizontal pixels-per-unit exceeds vertical — distorts geometric
    angles on root locus; fix by switching to square orientation (//# anyplot-orientation:
    square) and adjusting bounds to ~±6 on both axes'
  - 'Palette out of canonical order: branchColors uses [palette[0], palette[2], palette[1]]
    skipping ordinal order without semantic justification — should use [palette[0],
    palette[1], palette[2]]'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, approximately #FAF8F1 — correct
      Chrome: Title "root-locus-basic · javascript · highcharts · anyplot.ai" at 22px readable; X axis "Real Axis (σ)" and Y axis "Imaginary Axis (jω)" at 16px readable; tick labels at 14px readable; legend text readable at bottom
      Data: Three branches — Branch 1 (green, #009E73) curves upward from s=0; Branch 2 (blue, #4467A3) curves downward from s=−2; Branch 3 (lavender, #C475FD) moves left from s=−4. Open-loop poles marked with custom × at 0, −2, −4 in dark ink. jω crossings at ±j2.828 marked with matte-red diamonds. Dashed gray damping guide lines for ζ=0.5 and ζ=0.7 extend from origin.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, approximately #1A1A17 — correct
      Chrome: Title and all axis labels in light off-white text, clearly readable against dark background; tick labels light-colored; legend text readable. No dark-on-dark failures detected.
      Data: Colors are identical to light render (same green, blue, lavender, matte-red). Open-loop pole × markers appear as white symbols on dark background. Damping guide lines subtle but visible.
