  strengths:
  - Correct Imprint palette usage — brand green (#009E73) for locus, matte red (palette[4])
    for poles as semantic exception, lavender for jω crossings
  - 'All spec requirements met: × pole markers, arrows indicating gain direction,
    real-axis segments, imaginary axis crossings, damping-ratio and natural-frequency
    reference lines, equal axis scaling on square canvas'
  - Mathematically rigorous data — correct transfer function G(s)=K/[s(s+1)(s+3)],
    accurate breakaway at −0.45, correct imaginary axis crossing at ±j√3 (K=12)
  - 'Thoughtful ECharts-specific techniques: custom SVG path for × pole markers, arrow
    scatter series with computed symbolRotate for gain-direction indicators'
  - Full theme-adaptive chrome — transparent background, t.ink/t.inkSoft/t.grid tokens
    used throughout; both renders pass legibility check
  weaknesses:
  - Root Locus legend icon shows a circle-on-line (ECharts default) but the series
    uses showSymbol:false — the legend icon does not match the actual rendering style;
    use legend.data with icon override to show a plain line segment
  - Helper functions cplxPair() and arrowAt() deviate from KISS flat structure — the
    mathematical logic could be inlined or the comment block expanded to compensate
  - jω crossing markers (symbolSize=18) are placed exactly on the locus curve making
    them hard to distinguish from the line; increase to symbolSize=22 and/or add a
    light stroke to make the stability-boundary markers stand out more prominently
  - Left half of the complex plane (x ∈ [−6, −1]) is largely empty except for the
    real-axis branch — the locus is heavily weighted to the right half; consider adjusting
    the x range to [−5, 1.5] to balance visual weight
  - 'DQ-01: no label or annotation identifies the breakaway point (~−0.45, 0), which
    is a key feature of the root locus narrative'
