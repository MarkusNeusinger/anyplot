review:
  strengths:
  - Mathematically rigorous implementation — uses exact Vieta's formulas (cplxPair
    helper) to compute the complex conjugate pair trajectories for G(s)=K/[s(s+1)(s+3)],
    with analytically-correct breakaway point (-0.4514) and jω crossing (±j√3, K=12)
    built in
  - 'Full Imprint palette compliance: root locus in brand green (#009E73 = palette[0]),
    poles in matte-red (palette[4] — semantically correct for instability markers),
    jω crossings in lavender (palette[1]); all chrome tokens from window.ANYPLOT_TOKENS'
  - Deterministic, self-contained data generation — no randomness, no network fetches;
    all locus paths computed analytically with fixed-phase loops (N1=60, N2=200)
  - 'Three reference overlays add control-theory context: ζ=0.5 damping-ratio lines
    and ωn=2 natural frequency circle, all rendered as dashed subtle lines using t.grid
    token'
  - Custom SVG path symbol for open-loop pole × markers (rotated plus shape) is idiomatic
    ECharts and clearly distinguishes poles from crossing diamonds
  - 'Both light and dark renders pass theme-readability: warm off-white (#FAF8F1)
    / warm near-black (#1A1A17) backgrounds correct; data colors identical across
    themes; no dark-on-dark text issues'
  weaknesses:
  - Missing gain-direction arrows on locus branches — the spec explicitly requires
    'arrows indicating the direction of increasing gain'; ECharts markLine or custom
    markPoint symbol at representative K values could satisfy this; without arrows,
    the viewer cannot tell which end of each branch corresponds to high vs low gain
  - 'Landscape orientation (3200×1800) distorts the complex plane geometry — the spec
    states ''equal axis scaling to preserve geometric relationships''; x range is
    -6..2 (8 units) and y range is -4..4 (8 units) but the 16:9 canvas means x pixels/unit
    ≈ 1.5× y pixels/unit; the ωn=2 reference circle visibly renders as an ellipse
    (wider than tall) rather than a true circle, confirming the distortion; this should
    use `//# anyplot-orientation: square` (2400×2400)'
  - No annotations for critical gain values — the spec context calls out breakaway
    points and imaginary-axis crossings; only the ±jω crossing locations are symbolically
    marked; adding a small text annotation for K=12 at the crossing diamonds, and
    marking the breakaway point (K≈0.631 at s≈-0.451), would improve storytelling
    for a control-systems audience
  - No open-loop zeros shown — the chosen system has no zeros so o markers cannot
    be demonstrated; a minor note only, not a defect, but future specs might choose
    a system with zeros to test that feature
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct; not pure white, not dark.
      Chrome: Title "root-locus-basic · javascript · echarts · anyplot.ai" in bold dark text, centered, fully readable. X-axis label "Real Axis" and Y-axis label "Imaginary Axis" both in dark secondary text, balanced sizes. Tick labels at integer intervals (-6 to 2 on x, -4 to 4 on y) in dark secondary text — all clearly readable. Subtle grid lines (t.grid token).
      Data: Three root locus branches in brand green (#009E73): two converge from poles at 0 and -1 to breakaway at ≈-0.45, then fan out into complex conjugate paths diverging to upper-right and lower-right; one real-axis branch extends from pole at -3 leftward to x=-6. Open-loop poles (×) at (0,0), (-1,0), (-3,0) in matte red. jω crossing diamonds at (0, ±1.73) in lavender. Dashed reference lines: ζ=0.5 damping-ratio lines from origin (upper-left / lower-left) and ωn=2 natural-frequency circle (visually elliptical due to non-equal axis scaling). Legend at bottom shows "Root Locus", "Open-Loop Poles", "jω Crossings (K=12)".
      Issue noted: ωn=2 circle renders as ellipse (wider than tall) — confirmed non-equal axis scaling for the complex plane.
      Legibility verdict: PASS — all text readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct; not pure black, not light.
      Chrome: Title and axis labels in light text — fully readable against dark background. Tick labels in lighter secondary color — readable, no dark-on-dark issues. Grid lines light/subtle.
      Data: All data colors IDENTICAL to light render — brand green locus branches, matte-red pole markers, lavender crossing diamonds. Only chrome elements have flipped (light text, lighter grid on dark bg). Same elliptical ωn circle issue.
      Legibility verdict: PASS — no dark-on-dark failures; all labels clearly visible against near-black background; brand green #009E73 remains clearly visible.
