review:
  strengths:
  - Sophisticated Durand-Kerner root-finding algorithm correctly traces all three
    locus branches with 600 data points each, producing smooth and accurate pole trajectories
    for G(s) = K/[s(s+2)(s+4)]
  - Three custom Chart.js plugins implement gain-direction arrows (afterDatasetsDraw
    with canvas path drawing), theme-adaptive background (beforeDraw fillRect), and
    inline ζ/ωn reference labels using scale.getPixelForValue() for precise coordinate
    conversion
  - 'All spec-required features present: open-loop pole × markers, amber stability-boundary
    triangles at ±j√8 ≈ ±j2.83, constant-ζ damping-ratio rays and constant-ωn natural-frequency
    semicircular arcs as dashed overlays, and per-branch gain-direction arrows'
  - Legend filter correctly excludes the six reference-overlay datasets (ζ and ωn
    lines) so the legend shows only the three locus branches, open-loop poles, and
    stability boundary — clean and focused
  - Imprint palette used in canonical order (palette[0] green, palette[1] lavender,
    palette[2] blue) for branches; amber anchor for stability boundary; data colors
    identical between light and dark renders with correct theme-adaptive chrome throughout
  weaknesses:
  - 'ωn=2 label is positioned right-aligned at x=-2 (the exact x of the open-loop
    pole at -2), causing the trailing characters of the label to overlap with the
    × marker (pointRadius=12). Fix: offset the label further left, e.g. use x = xs.getPixelForValue(-wn)
    - 20 instead of -6, or shift the ωn=2 entry to x=-2.3 so the text clears the marker.'
  - 'ζ reference labels are drawn at py = ys.getPixelForValue(Y_MAX) + 2, placing
    them at the very top boundary of the plot area with only 2 CSS px of clearance.
    Combined with the minimal top padding (layout.padding.top = 4), the upper region
    feels cramped. Fix: set Y_MAX to 3.3 or draw ζ labels 8–10 px lower (py + 10)
    so they sit comfortably inside the chart with breathing room.'
  - Layout padding is very tight (top:4, right:20, bottom:10, left:10), reducing whitespace
    around the plot. Increase to at least {top:16, right:24, bottom:16, left:16} to
    give axis labels and tick numbers more room.
