review:
  strengths:
  - Mathematically rigorous root locus computation using Durand-Kerner iterative root
    finding with 600 points per branch — smooth, accurate curves
  - 'Correct Imprint palette usage: brand green (#009E73) for first branch, canonical
    order for subsequent branches, amber for stability-boundary semantic role, all
    data colors theme-invariant'
  - Theme-adaptive chrome fully wired through t.ink, t.inkSoft, t.pageBg, t.grid,
    t.amber tokens — no hardcoded hex for chrome elements; dark render reads cleanly
    with no dark-on-dark failures
  - 'Meaningful point styles: crossRot for open-loop poles (control-systems x convention),
    triangle for stability boundary — adds semantic redundant encoding beyond color
    alone'
  - Custom beforeDraw background plugin ensures canvas background matches the page
    surface token correctly; dynamic title font-size scaling adapts to string length
  weaknesses:
  - 'Gain-direction arrows missing: spec requires arrows indicating the direction
    of increasing gain on each locus branch — add small triangle annotations at midpoints
    of each branch pointing in the direction of increasing K'
  - 'Constant damping-ratio / natural-frequency reference lines missing: spec calls
    for a dashed or light grid to indicate constant zeta and omega_n lines — implement
    as radial ζ-lines (0.3, 0.5, 0.7) and concentric ω_n arcs as extra dashed datasets
    with grid color at low opacity'
  - 'Non-equal axis pixel scaling on landscape canvas distorts the complex plane geometry:
    X range 10 units displayed over 3200px vs Y range 10 units over 1800px — fix by
    setting y.min/max to approximately -2.8/2.8 (or equivalent) so pixels-per-unit
    is equal on both axes, preserving geometric relationships as specified'
