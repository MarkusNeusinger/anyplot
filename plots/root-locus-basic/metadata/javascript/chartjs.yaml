      Data: Three locus branches in Imprint palette order — Branch 1 (green #009E73) starting at origin and curving up through the stability crossing; Branch 2 (lavender #C475FD) starting at -2 and curving downward; Branch 3 (blue #4467A3) going left from -4 as a horizontal line. Open-loop pole × markers at 0, -2, -4 on the real axis. Amber stability-boundary triangles at ±j2.83 on the imaginary axis. Constant-ζ damping-ratio rays (0.3, 0.5, 0.7) and constant-ωn semicircular arcs (1, 2, 3) rendered as subtle dashed overlays. Gain-direction arrows on each branch. First series is #009E73 ✓.
      Overlap note: The "ωn=2" label and the × marker at the open-loop pole x=-2 are in the same area; the trailing characters of the label slightly overlap the marker.
      Legibility verdict: PASS — all text readable; minor overlap of ωn=2 label with × marker at x=-2.

