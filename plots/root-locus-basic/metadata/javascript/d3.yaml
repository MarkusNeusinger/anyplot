review:
  strengths:
  - Analytically correct root locus computation using Newton's method + polynomial
    deflation — the physics is exact, not approximated
  - 'All spec requirements satisfied: poles with × markers, direction arrows, real
    axis segments, jω crossings labeled with K=48, ζ/ωn reference grid, equal aspect
    ratio, stability boundary'
  - 'Exceptional semantic color choices: matte red (palette[4]) for open-loop poles,
    amber for stability boundary — strongly aligned with Imprint palette semantics'
  - Full theme adaptation with all chrome tokens correctly applied (ink, inkSoft,
    grid, elevatedBg, amber); data colors identical across light and dark renders
  - 'Rich data storytelling: directional arrows indicate increasing K, annotated breakaway
    point (K≈3.1), labeled jω crossings (K=48), and prominent amber stability boundary
    together tell the complete root locus narrative'
  weaknesses:
  - Breakaway point annotation 'K≈3.1' uses 11px font — below safe threshold for mobile
    readability; increase to 13px minimum
  - Damping ratio (ζ) and natural frequency (ωn) reference annotations at 13px are
    borderline at mobile scale (~400px width); increase to 14px to match tick label
    size
  - Three helper functions (findRealRoot, solveDeflated, addArrow) technically violate
    KISS structure; addArrow() especially could be simplified or inlined as it is
    a simple polygon construction
