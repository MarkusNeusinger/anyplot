review:
  strengths:
  - Mathematically accurate root locus using Newton\u2019s method + analytical deflation
    — three branches for G(s)=K/[s(s+2)(s+4)] with correct breakaway at s\u2248-0.845
  - 'Complete spec compliance: X markers for open-loop poles, directional arrows on
    all three branches, jω-axis crossing circles at ±j·2√2 with K=48 labels, breakaway
    annotation, equal-aspect complex plane'
  - Domain-specific reference lines (constant ζ=0.3/0.5/0.707 damping ratio lines,
    ωn=1–4 circles) add genuine control-theory value beyond the minimum
  - 'Semantic color use: amber stability boundary (imaginary axis), Imprint palette
    for branches in canonical order, matte red for pole markers — all with appropriate
    alpha and opacity hierarchy'
  - 'Both themes fully pass readability: warm off-white (#FAF8F1) light / near-black
    (#1A1A17) dark, all text visible, no dark-on-dark failures'
  weaknesses:
  - Reference line labels (ζ=0.3, ζ=0.5, ζ=0.707, ωn=2, ωn=4) are set at 11–12px CSS
    — small at mobile scale (~400px), increase to 13–14px for better readability
  - Pole marker color is hardcoded as \u0022#AE3030\u0022 in both the drawing code
    and legend items, rather than using t.palette[4] — minor palette token inconsistency
  - Helper functions findRealRoot() and solveDeflated() increase code complexity beyond
    the KISS ideal; the numerical logic could be inlined or pre-computed
  - Legend box has no stroke border and uses only opacity=0.92 fill — a thin 1px border
    in t.grid color would improve visual definition in both themes
  - The convergence zone near s=0 (stability boundary dashed line, pole X marker,
    jω-crossing circle, branch convergence) is slightly crowded — a small margin between
    the jω circle label and the locus lines would help
