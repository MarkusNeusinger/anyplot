    locus branches that depart from the real axis near the origin and curve upward/downward
    into the right half-plane. Four red dots mark open-loop poles at s = 0, -1, -2,
    -4 on the real axis. One green dot marks the open-loop zero at s = -3. Two orange
    dots mark the stability boundary (jω axis crossings) at approximately ±1.6j. Light
    gray dashed lines radiate from the origin showing constant damping ratio (ζ) guide
    lines, and gray dashed semicircles show constant natural frequency (ωn) arcs.
