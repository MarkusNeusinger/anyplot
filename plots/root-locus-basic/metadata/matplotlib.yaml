  image_description: 'The plot displays a root locus diagram for the transfer function
    G(s) = (s+2)/[s(s+1)(s+3)(s+5)]. Four X markers on the real axis at 0, -1, -3,
    and -5 represent open-loop poles, and one hollow O marker at -2 represents the
    open-loop zero. Four locus branches are drawn in distinct colors: blue (extending
    left from pole at -5), red/salmon (short segment between poles at -3 and zero
    at -2), purple (rising upward from near -1 into the right-half plane), and green
    (descending downward symmetrically). Directional arrows on each branch indicate
    increasing gain. Two red diamond markers near (0.2, ±3) mark the imaginary axis
    crossings (stability boundary). Semi-transparent blue segments highlight the real-axis
    portions of the root locus. Dashed gray lines show constant damping ratio (ζ=0.2,
    0.4, 0.6, 0.8) and dashed semicircles show constant natural frequency contours.
    Top and right spines are removed. Axes are labeled "Real Axis (σ)" and "Imaginary
    Axis (jω)". Title reads "root-locus-basic · matplotlib · pyplots.ai". Legend in
    upper-left identifies poles and zeros.'
