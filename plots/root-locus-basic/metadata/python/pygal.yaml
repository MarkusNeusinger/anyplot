review:
  strengths:
  - Comprehensive root locus implementation with realistic G(s) = (s+3)/[s(s+1)(s+2)(s+4)]
    transfer function covering all spec features
  - 'Thoughtful semantic color mapping: muted gray for background reference lines,
    brand green for primary locus, red for critical poles, amber for breakaway caution,
    cyan for stability boundary'
  - 'Excellent data quality: variable-density gain sweep (finer near breakaway and
    jω crossings), nearest-neighbor branch tracking, accurate breakaway and stability-crossing
    detection'
  - Interactive HTML output alongside PNG — unique pygal capability; direction arrows
    as V-shaped tick marks elegantly indicate increasing gain direction
  - All font sizes explicitly set via Style object; both light and dark renders fully
    readable with correct theme-adaptive chrome
  weaknesses:
  - Poles and zeros rendered as circle dots rather than × and ○ marker shapes as specified
    — pygal XY does not support custom marker glyphs; consider using emoji or unicode
    in label strings or differentiating more clearly in legend
  - Root Locus (#009E73 green) and Stability Boundary (#2ABCCD cyan) appear in similar
    teal-adjacent hues; at mobile scale they may be harder to distinguish — size differentiation
    already helps but adding stroke outlines or separate marker size jumps would improve
    CVD robustness
  - 'VQ-01 minor: legend with 8 items in 4 columns is somewhat dense; spacing could
    be increased with additional margin_bottom or a 3-column layout'
