review:
  strengths:
  - Mathematically rigorous root locus computation using nearest-neighbor pole tracking
    for correct branch continuity
  - Excellent theme-adaptive chrome — INK, INK_MUTED, PAGE_BG tokens correctly applied;
    both renders are fully legible
  - 'Semantic color choices are well-motivated: brand green for root locus, red for
    poles (critical), amber for breakaway (caution), cyan for stability boundary'
  - Reference guide lines (damping ratio rays + natural frequency arcs) elegantly
    combined into one series to reduce legend clutter
  - Mathematically correct imaginary-axis crossings and breakaway point computed analytically,
    not hardcoded
  - HTML output alongside PNG correctly leverages pygal's interactive tooltip labels
    on each data point
  - Code is clean KISS structure with no functions or classes; deterministic data
    means no seed needed
  weaknesses:
  - 'Real-Axis Locus (ochre #BD8233) is not visually distinguishable in either render
    — the thick line segments at y=0 are lost behind the X axis spine, overlapping
    reference guide lines, and the pole/zero/breakaway marker dots drawn on top; this
    is a key spec requirement'
  - No directional arrows indicating the direction of increasing gain along the locus
    branches — the spec explicitly requires arrows; consider adding arrow-head annotation
    points at intermediate gain values
  - Open-loop poles are rendered as filled circles, not × markers as the spec requires;
    the label text '(×)' conveys intent in the legend but the visual marker shape
    is still circular — use a very small custom annotation or unicode × symbol placed
    at pole positions as a separate series with show_dots=False and annotations
  - Root locus complex branches are only partially visible in the light render — the
    green (#009E73) curve against the off-white (#FAF8F1) background has limited contrast,
    especially where it overlaps the gray reference arcs; increase stroke width from
    6 to 8-10 px for the root locus series
  - 'Design Excellence is limited: no visual hierarchy distinguishing the primary
    story (the root locus trajectories) from the supporting reference lines; the reference
    lines and main locus have similar visual weight in the light render'
  - The legend at bottom compresses 7 items into a small area that may be hard to
    read at mobile widths; consider reducing to bottom_columns=3 or 4 rows to give
    each item more breathing room
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "root-locus-basic · python · pygal · anyplot.ai" at top in dark ink — readable. Y-axis label "Imaginary Axis (jω)" and X-axis label "Real Axis (σ)" both dark and legible. Tick labels (-6 to 4 on X, -5 to 5 on Y) clear and dark.
      Data: Gray dashed reference arcs and rays (damping ratio + natural frequency). A teal-green (#009E73) curve forming the complex locus branches visible primarily as it curves through the upper-right quadrant and exits toward the top-right. Several colored marker dots on the real axis at y=0: red circles (poles at 0, -1, -2, -4), a blue circle (zero at -3), an amber/yellow dot (breakaway ~-1.5), and cyan dots (stability boundary at approximately ±j1.6 on the imaginary axis). The Real-Axis Locus ochre (#BD8233) series is listed in the legend but NOT visually distinct — it is lost behind the X axis line, reference lines, and marker dots at y=0. Legend at bottom in 2 rows is compact but readable.
      Legibility verdict: PASS — all text elements are readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
      Chrome: Title text is light-colored and readable. Both axis labels are light text, clearly visible. Tick labels are light on dark, fully legible. No dark-on-dark failures detected.
      Data: The green (#009E73) root locus complex branches are MORE visible in this render — the curve arcs from left-center through the upper area and exits at the top-right clearly. Gray reference arcs/rays are subtly visible. Marker dots maintain identical colors to light render (red poles, blue zero, amber breakaway, cyan stability boundary). The Real-Axis Locus ochre series remains indistinct at y=0 in the dark render as well. The brand green is clearly legible against the dark background.
      Legibility verdict: PASS — all text is readable. No dark-on-dark failures. Data colors are identical to light render as required.
