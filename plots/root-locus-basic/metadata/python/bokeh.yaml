  weaknesses:
  - 'Text overlap in center: ''ωn=1'' label (x=-1.1, y=0.25, 22pt) and ''Centroid
    σ=-1.33'' label (x=-1.38, y=0.35, 22pt italic) are only ~19px apart vertically
