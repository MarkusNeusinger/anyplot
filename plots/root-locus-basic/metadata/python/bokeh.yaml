  - 'Annotation ''jω-crossing: K=12, ω=√3≈1.73'' (26pt bold) placed at x=0.2 in x_range
    (-5.5, 1.5) — only ~600px of canvas space remain to the right edge but text is
    ~700px wide, so the final characters likely overflow the canvas right boundary.
    Fix: move annotation start to x=-1.0 or reduce font to 22pt, or place it below
    the crossing points'
  - 'Equal axis scaling not implemented: spec explicitly requires equal axis scaling
    to preserve geometric relationships. x_range is 7 units at 2970px (424 px/unit)
    but y_range is ~8.2 units at ~1530px (187 px/unit), making natural frequency arcs
    appear as ellipses instead of circles. Fix: set match_aspect=True in figure()
    or compute y_range from x_range so px-per-unit is equal. Alternatively use x_range=Range1d(-5.5,
    1.5) and y_range=Range1d(-y_max, y_max) where y_max is calculated to match the
    px-per-unit of the x axis given the canvas aspect ratio'
