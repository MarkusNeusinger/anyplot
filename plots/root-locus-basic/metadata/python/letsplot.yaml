  - 'Perfect spec compliance — all required elements present: open-loop poles (×),
    zero (○), imaginary-axis stability crossings (◆), direction arrows, ζ/ωn reference
    guides, and equal-axis scaling via coord_fixed'
  - 'Sophisticated letsplot-specific usage: layer_tooltips() with .format()/.line()
