    segment from s=−2 to s=−3, but at size=2.0 it reads as a tiny stub; increase its
    visual weight (size=3.0 or add a direct geom_text label ''Branch 2'') so all four
    branches are clearly distinguishable in the legend'
  - Caption text at size=9 is very small at 2400×2400; raise to size=10 for mobile
    readability
  - Zeta guide labels (size=3.5mm) are small near the LHP; consider size=4.0 to improve
    legibility when plot is scaled to thumbnail size
  - The ζ=0.2 label and Branch 4 locus crowd each other near the top-right LHP; a
    slight radial offset outward (from 0.50 to 0.55 of r_max for the ζ=0.2 position)
    would prevent visual collision
