  - Damping-ratio (zeta) and natural-frequency (wn) guide labels at size=2.8mm may
    be too small at mobile scale; increase to 3.2-3.5mm for better readability in
    scaled-down renders
  - 'Slight visual crowding in the origin cluster (s=[-1, 0]): two X markers, a breakaway
    square, and arrow heads from two branches all converge in a small region; minor
    coord limit expansion or slightly increased marker spread could help'
