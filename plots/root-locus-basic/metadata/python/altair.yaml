review:
  strengths:
  - 'Comprehensive spec coverage: all required root locus features (poles, branches,
    crossings, real-axis segments, direction arrows, damping/omega_n guide lines,
    breakaway point) implemented in a single chart'
  - 'Correct Imprint palette application with semantic use of #AE3030 for boundary-critical
    markers (poles, crossings)'
  - Fully theme-adaptive chrome with all six tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED) applied correctly to every element
  - Clean 13-layer Altair composition using idiomatic patterns (detail encoding, order
    encoding, configure_* methods)
  - 'Excellent data quality: G(s)=1/[s(s+1)(s+2)] is a canonical control-systems example
    with pedagogically rich locus behavior'
  weaknesses:
  - 'Non-equal axis scaling: x domain spans 7 units in width=500 px, y spans 9 units
    in height=460 px, producing ~71 px/unit vs ~51 px/unit — natural frequency arcs
    appear oval rather than circular, violating the spec''s ''equal axis scaling''
    requirement. Fix: adjust x/y domain ranges or width/height ratio so pixels-per-unit
    is equal (e.g., use width=height=480 with symmetric domains like x=[-4.5,4.5]
    and y=[-4.5,4.5]).'
  - Breakaway point square marker is relatively small (size=180) compared to pole
    cross markers (size=420); consider increasing to ~280 for better visual consistency.
  - 'LM-02: Implementation does not exploit Vega-Lite selections or parameter-driven
    interactivity that would distinguish Altair from a static library translation.'
