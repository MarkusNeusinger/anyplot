      Data: Five rose (#954477) filled bands with graduated alpha (darker at extremes P3-P10/P90-P97 at alpha=0.45, lighter at inner P25-P75 at alpha=0.12). Six subtle rose boundary lines at linewidth=0.4 plus an emphasized P50 line at linewidth=1.4. Individual patient data as brand green (#009E73) connected line with circular markers — clearly contrasting against the rose reference bands. Grid is subtle and non-competing.
      Legibility verdict: PASS — all text readable against the off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black surface matching #1A1A17 — correct anyplot dark theme background.
      Chrome: Title in light (F0EFE8) text, clearly visible against the dark background. Axis labels and tick labels rendered in INK_SOFT (#B8B7B0) light-gray — all legible, no dark-on-dark failures. Right-margin labels in INK_MUTED (#A8A79F) muted light-gray, readable.
