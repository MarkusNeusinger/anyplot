review:
  strengths:
  - Perfect spec compliance — all 7 percentile bands (P3–P97) present with correctly
    graduated alpha intensity (outer 0.45, mid 0.28, inner 0.12), emphasized P50 median
    at 1.4 linewidth, and patient data as connected green markers
  - 'Both themes render correctly: warm off-white #FAF8F1 background on light, warm
    near-black #1A1A17 on dark; all chrome tokens (INK, INK_SOFT, INK_MUTED) flip
    appropriately; no dark-on-dark or light-on-light failures'
  - 'Semantic color choices are well-justified: Imprint rose (#954477) for girls''
    reference data (palette wellness/health role), brand green #009E73 for the individual
    patient (clear contrast and correct first-series usage)'
  - Right-margin percentile labels use coord_cartesian(clip='off') idiomatically to
    render P3–P97 labels outside the panel area without clipping — correct ggplot2
    pattern for right-margin annotations
  - 'Idiomatic ggplot2 layer composition: geom_ribbon × 5 for graduated bands, geom_line
    × 7 for boundaries and emphasized median, geom_point for patient markers — grammar-of-graphics
    approach correctly stacked'
  - Realistic parametric LMS-approximation model (p50_fn, sd_fn) with sensible weight
    values (birth ~3.3 kg through 60-month ~17–20 kg); patient tracking near 30th
    percentile is a clinically plausible and neutral scenario
  weaknesses:
  - 'Unused dplyr import: library(dplyr) is loaded but no dplyr functions are called
    — all data prep uses base R (data.frame, vectors, indexing). Remove to keep imports
    clean.'
  - Full panel border (4-sided box via panel.border) goes against the style guide
    default of L-frame (top/right spines removed). For a growth chart the box is defensible,
    but removing the top and right spines would reduce visual clutter and better align
    with anyplot style conventions.
  - Percentile margin labels use geom_text(size = 2.8) ≈ 8pt — borderline small at
    mobile scale (~400 px wide). Consider raising to size = 3.2–3.5 to improve legibility
    when the chart is displayed at thumbnail sizes.
  - Minor Y-axis grid breaks at seq(0, 30, by = 1) produce 30 minor tick lines, which
    is denser than needed and adds visual noise — seq(0, 30, by = 2) or seq(0, 30,
    by = 5) for minor breaks would be subtler.
