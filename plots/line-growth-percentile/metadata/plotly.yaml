    (~3.5 kg) to 36 months (~15.5 kg). The patient starts near the 50th percentile
    and gradually tracks toward the 25th percentile by 36 months. The title reads
    "Weight-for-Age Boys (0-36 months) · line-growth-percentile · plotly · pyplots.ai".
    X-axis shows "Age (months)" in 3-month intervals, Y-axis shows "Weight (kg)".
    Background is white with subtle gray gridlines. A legend box in the upper-left
    identifies "Patient (Boy)" in red.
