    below 3rd percentile by 36 months
  - Inner percentile bands (P25-P50, P50-P75) are very faint and hard to distinguish
  image_description: The plot displays a pediatric growth chart titled "Weight-for-Age
    Boys (0–36 months) · line-growth-percentile · plotly · pyplots.ai". Seven percentile
    curves (P3 through P97) are rendered as graduated blue-toned filled bands — darker
    at the extremes (P3-P10, P90-P97) and lighter near the median (P25-P50, P50-P75).
    The P50 median line is visually emphasized with a thicker, darker blue stroke.
    Percentile labels (P3, P10, P25, P50, P75, P90, P97) appear on the right margin,
    with P50 in bold. A teal-colored patient trajectory line with circular markers
    (white-bordered) is overlaid, showing a child's weight from birth (~3.5 kg) to
    36 months (~15.5 kg). The patient line starts near the 50th percentile and progressively
    falls below all percentile bands by 36 months. An annotation box near the end
    reads "~25th percentile at 36 months" with an arrow pointing to the last data
    point. The x-axis shows "Age (months)" from 0 to 39, y-axis shows "Weight (kg)"
    from 0 to ~24. Background is light blue-gray with subtle gridlines. A legend in
    the top-left shows "Patient (Boy)".
