  image_description: The plot displays a pediatric growth chart (weight-for-age, boys,
    0-36 months) with blue-toned percentile bands (P3-P97) rendered as graduated filled
    ribbons — darker blue at the extremes (P3-P10, P90-P97) and lighter blue near
