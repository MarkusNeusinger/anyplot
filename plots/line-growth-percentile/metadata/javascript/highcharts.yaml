review:
  strengths:
  - 'Precise clinical design: blue Imprint tones for reference bands with graduated
    alpha (darker at extremes, lighter near median) — matches spec intent perfectly'
  - 'Thoughtful stacked areaspline + overlaid spline combination: bands fill inter-percentile
    regions accurately while spline curves draw at exact percentile y-values'
  - Right-margin P-labels (P3–P97) via dataLabels.formatter eliminate the need for
    a separate legend — direct labeling on the curves is best practice for a growth
    chart
  - P50 visually emphasized with thicker lineWidth (2.5) and bold label, creating
    a clear focal point / clinical reference anchor
  - Patient trajectory in brand green (#009E73) provides high-contrast separation
    from the blue reference data — immediately communicates the individual-vs-population
    story
  - 'Complete spec compliance: all 7 percentile bands, direct labeling, gender-specific
    coloring, patient data with markers, realistic WHO weight-for-age reference values,
    correct title format'
  weaknesses:
  - 'Missing `colors: t.palette` at the Highcharts top-level config — explicitly required
    by the highcharts library rules; add `colors: t.palette` alongside the chart options
    so the palette cycles correctly if any future series omit explicit colors'
  - 'P3 and P10 right-margin labels are close together (0.9 kg gap in a 17 kg range
    chart), appearing slightly crowded at the lower right of the chart — consider
    applying a small `y` offset on the P3 label (e.g., `y: 14`) to push it slightly
    below the P10 label and prevent visual crowding'
  - Inner percentile bands (P25–P50 and P50–P75) use alpha=0.13 of rgba(68,103,163),
    which blends very close to the dark background (#1A1A17) and becomes nearly invisible
    in the dark render — consider raising the minimum alpha to 0.18–0.20 for the inner
    bands to maintain graduated visibility in both themes
  - 'Design Excellence is good but not refined: the chart retains Highcharts'' default
    outer plot border; adding `chart.plotBorderWidth: 0` and cleaning up the axis
    line color for a fully L-shaped frame would push DE-02 higher'
