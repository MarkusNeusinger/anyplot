      Data: Seven ascending spline curves in Imprint blue (#4467A3) at varying alpha (subtle but distinguishable). P50 thicker (lineWidth=2.5) and bold-labeled. Graduated fill bands visible between P3 and P97 but with very low alpha (0.09–0.26) making them barely distinguishable from the background — lighter blue-grey wedge visible. Patient trajectory plotted in brand green (#009E73) with triangle markers (radius=6), tracking between P75 and P90, clearly contrasting with the blue reference curves.
      Band gradient: Fill is DARKEST near median (P25–P50 at alpha=0.26) and LIGHTEST at extremes (P90–P97 at alpha=0.09) — OPPOSITE of the spec requirement (darker near extremes).
      Legibility verdict: PASS — all text readable at full size and scaled down.

