review:
  strengths:
  - Complete spec compliance with all 7 percentile curves, filled bands, P50 emphasis,
    right-margin P-labels, and patient trajectory overlay.
  - 'Advanced MUI X technique: ChartContainer + useDrawingArea() hook for pixel-accurate
    custom SVG layers — demonstrates deep library mastery.'
  - Graduated band opacity (0.24 outer to 0.09 inner) creates an elegant clinical
    hierarchy matching WHO/CDC chart conventions.
  - 'Proper Imprint palette usage: brand green for the patient series, Imprint position-3
    blue for reference bands (justified semantic exception for boys'' growth charts).'
  - Theme-adaptive chrome throughout — t.pageBg, t.ink, t.inkSoft, t.grid tokens used
    consistently; correct backgrounds in both renders.
  - Realistic, medically plausible WHO-approximated weight data with correct birth
    weight and growth trajectory.
  weaknesses:
  - Inner percentile band (P25-P75) at fillOpacity=0.09 becomes nearly invisible on
    the dark background (#1A1A17). The graduated design that works beautifully in
    light mode loses its central band in dark mode. Consider using theme-adaptive
    opacity (higher opacity values in dark theme, e.g. 0.18 for the inner band when
    dark).
  - skipAnimation is not passed to ChartContainer. While the anchor series has no
    visible animation, the library rules require it on the container component for
    screenshot safety.
