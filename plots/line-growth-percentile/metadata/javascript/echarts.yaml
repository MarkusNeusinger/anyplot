review:
  strengths:
  - Stacked area series with graduated opacity (#4467A3 at 0.13/0.28/0.45) correctly
    implements 'darker near extremes, lighter near median' from the spec — a visually
    elegant clinical-chart convention
  - Patient trajectory uses brand green (#009E73) as the first categorical series,
    creating strong visual contrast against the blue percentile bands; correct Imprint
    palette application
  - ECharts-native endLabel cleanly annotates all 7 percentile curves (P3–P97) at
    the right margin without legend clutter — an idiomatic pattern few other libraries
    support natively
  - 'connectNulls: true handles visit gaps in patient data naturally; symbolSize:
    12 markers are well-sized for the sparse dataset'
  - P50 median correctly emphasized with width:3 and bold end-label; legendHoverLink:false
    and silent:true on background series are clean ECharts-idiomatic patterns
  - 'Full spec compliance: all 7 percentile curves rendered, graduated bands, gender-specific
    blue convention, patient overlay with contrasting color, end labels on right margin'
  - Both light and dark renders are theme-correct — data colors identical across themes,
    chrome adapts via t.ink/t.inkSoft/t.grid tokens throughout
  weaknesses:
  - 'DE-01: All percentile bands derive from a single base color (#4467A3) at varying
    opacities — while effective, a publication-level treatment could add a subtle
    visual differentiation to the outer extreme bands (e.g., slightly warmer tint
    for P3–P10/P90–P97) to reinforce the ''danger zone'' vs. ''normal range'' narrative'
  - 'DE-03: Clear visual hierarchy exists (P50 emphasized, patient in contrasting
    green) but the chart lacks a storytelling callout — a brief annotation at the
    patient''s latest point (e.g., ''~68th percentile'') or a subtle highlight band
    around the patient''s trajectory region would guide the viewer directly to the
    key insight'
  - 'VQ-01 minor: P3 and P10 end labels are at fontSize:13 with opacity:0.75, making
    them slightly smaller/dimmer than adjacent labels — increasing to fontSize:14
    and opacity:0.85 would improve readability when the chart is scaled to mobile
    widths'
  image_description: |-
