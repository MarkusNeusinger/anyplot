  - 'Idiomatic Altair: transform_fold + transform_filter for multi-percentile lines,
    alt.layer() composition, and alt.selection_point for interactive hover — all distinctive
    Altair patterns used correctly'
  - 'Graduated band opacity (0.14–0.36) creates effective visual hierarchy: darker
    near extremes, lighter near median — exactly as specified'
  - P50 median emphasized with strokeWidth=2.5 vs 0.8 for others — clear clinical
    anchor
  - Patient trajectory in brand green (#009E73) against blue reference bands provides
    immediate perceptual contrast
  - Right-margin percentile labels (P3–P97) with nudging are a more elegant solution
    than a separate legend
  - Subtitle adds clinical context ('Boys Weight-for-Age (0–36 months) · WHO Reference
    Standard')
  - Interactive hover with size=condition (80→160) and tooltips for the HTML output
    is a legitimate Altair-native feature
  - 'Theme-adaptive chrome is complete: INK/INK_SOFT/INK_MUTED applied to all text,
    grid, and domain elements'
