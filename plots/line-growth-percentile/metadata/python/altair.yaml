review:
  strengths:
  - Excellent use of transform_fold + transform_filter for idiomatic multi-line Altair
    rendering
  - Graduated opacity bands (0.14 / 0.22 / 0.36) give professional depth to the reference
    area
  - Interactive selection_point with conditional size encoding is a genuinely distinctive
    Altair feature
  - 'Patient trajectory (green #009E73) contrasts clearly against blue (#4467A3) reference
    bands'
  - P50 median line visually emphasized with thicker strokeWidth=2.5
  - 'Both themes render correctly: warm #FAF8F1 light background and #1A1A17 dark
    background with properly flipped chrome'
  - All font sizes explicitly set with consistent Helvetica Neue font family throughout
  - Right-margin percentile labels (P3–P97) with hand-tuned nudge values to reduce
    crowding
  - HTML export alongside PNG — interactive tooltips work in both outputs
  - Pillow padding pattern correctly pads to exact 3200×1800 canvas without cropping
  weaknesses:
  - 'Percentile band gradient direction is inverted from spec: spec says ''darker
    near extremes, lighter near median'', but the implementation has P25–P75 (inner
    band) at opacity=0.36 (darkest) and P3–P10 / P90–P97 (outer bands) at opacity=0.14
    (lightest) — reverse the opacity assignment so the extreme bands are most opaque'
  - Right-margin percentile labels at fontSize=9 are small (36 source-px at scale=4);
    P75/P90 and P25/P10 pairs are crowded — the natural gap between adjacent curves
    at age=37 months is narrow; consider fontSize=10 and wider nudge spread, or move
    labels to a slightly different x position
  - 'DE-01 / DE-03: design is clean but not publication-ready; the clinical chart
    would benefit from one additional storytelling element, e.g. a shaded annotation
    band or text callout highlighting which percentile the patient currently tracks
    near'
