    where the reference curves converge at 36 months — the current nudge values (0.15–0.25
    kg) partially help but the labels in those pairs read as tight
  - Patient label 'Patient A' (fontSize=9) and callout '≈ P75' (fontSize=9) are somewhat
    small at the rendered scale; consider increasing to 10–11 to match the percentile
    label size and ensure mobile readability
  - 'DE-01/DE-02: While clearly above library defaults, the design stops short of
    FiveThirtyEight-level polish — primarily the right-margin label crowding and small
    callout text pull the aesthetic down slightly'
