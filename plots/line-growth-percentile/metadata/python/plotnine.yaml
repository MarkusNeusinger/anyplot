    median → patient overlay with open-circle markers (fill=PAGE_BG)
  weaknesses:
  - 'Patient trajectory falls below P3 reference line from ~age 18 months onwards:
    polynomial approximation overestimates median for 18-36 months (formula gives
    P50≈20.5 kg at 36 months vs WHO P50≈14.3 kg), causing the patient at 15.6 kg to
    appear well below P3=18.4 kg — contradicts the code comment describing a healthy
    boy at the 65th percentile'
  - Patient also exceeds P97 at ages 2-6 months (patient=5.8 kg at age 2 vs P97≈5.5
    kg) — polynomial approximation is inaccurate in both directions
  - Right-margin percentile labels (geom_text size=3.8mm) are tight and small — consider
    size=4.5 and nudge_x=1.2 for better readability
  - No descriptive title prefix — chart would benefit from Pediatric Weight-for-Age
    Growth Chart · line-growth-percentile · ... for context
