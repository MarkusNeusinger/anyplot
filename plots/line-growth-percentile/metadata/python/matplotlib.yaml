review:
  strengths:
  - 'Perfect spec compliance: all 7 percentile curves rendered as filled bands with
    graduated alpha, P50 emphasized with bold/thick line, percentile labels on right
    margin with collision avoidance, patient trajectory as connected green markers
    over blue reference bands'
  - 'Strong semantic color design: Imprint blue (#4467A3) used for boys-blue convention
    (correctly documented as semantic exception), patient line in brand green #009E73
    stands out clearly against the blue background'
  - 'Distinctive matplotlib features: axvspan() for developmental phase shading, ax.get_xaxis_transform()
    for mixed-coordinate ''Infancy'' label, minor tick locator for clinical chart
    convention, annotation_clip=False for right-margin percentile labels'
  - 'Clinical storytelling: LGA normalization arc is explicitly annotated (''High
    birth weight (LGA)'' and ''Normalized to P50''), developmental phase context via
    ''Infancy'' shading, P50 emphasis guides clinical interpretation'
  - 'Perfect code quality: KISS structure, all font sizes explicitly set, dynamic
    title fontsize formula, deterministic data, all imports used, no deprecated APIs,
    correct output naming'
  weaknesses:
  - 'Synthetic weight values diverge substantially from real WHO standards at older
    ages: P50 at 36 months is ~20 kg in the code versus ~14.3 kg in actual WHO data
    (~40% too high). The polynomial formula grows too steeply after 12 months. Consider
    scaling the polynomial to approximate: P50 = 3.3 kg at birth, 9.7 kg at 12 months,
    12.2 kg at 24 months, 14.3 kg at 36 months.'
  - Birth annotation ('High birth weight (LGA)') positioned at xytext=(3.0, 5.2 kg)
    overlaps slightly with the patient trajectory line in the 2-4 month region where
    patient weight is ~5 kg. Move the annotation higher, e.g. xytext=(4.0, 7.5) to
    position the text clearly above the patient line at that age.
  - 'DE-02 refinement: the right-side percentile labels (outside axes) could be improved
    by aligning the annotation anchor to ax.transAxes to avoid manual x=36.6 positioning
    that may drift if xlim changes. Minor visual polish opportunity.'
