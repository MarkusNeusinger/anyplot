review:
  strengths:
  - Correct graduated blue-band approach matching clinical 'boys' convention — band
    tones derived from Imprint blue (#4467A3) via lerp from PAGE_BG, creating proper
    'darker near extremes, lighter near median' effect in light render
  - Brand green (#009E73) used for patient data as the clear focal element — semantically
    correct choice (patient=primary, population bands=reference), overriding strict
    ordinal series position with clinically appropriate convention
  - Sophisticated SVG post-processing injects right-margin percentile labels (P3–P97)
    not available natively in pygal; P50 distinctively rendered in bold Imprint blue
    while others use INK_MUTED
  - 'Proper dual-theme adaptation throughout: PAGE_BG, INK, INK_MUTED tokens correctly
    threaded into Style object; dark render shows light text on near-black background
    with no dark-on-dark failures'
  - Correct canvas (3200×1800), np.random.seed(42), both plot-{THEME}.png and plot-{THEME}.html
    outputs — all pipeline requirements satisfied
  weaknesses:
  - P50 median is de-emphasized (dashed gray, thin) despite the spec explicitly requiring
    'visually emphasized (thicker or distinct color)' for the 50th percentile median
    line — stroke width=8 with dasharray renders subtly behind the band fills
  - Patient data markers (dots_size=10) are too small relative to the 3200px canvas
    for 'prominent connected markers' as specified — markers appear as minor swellings
    on the green line rather than clearly visible circular dots
  - 'Dark render band graduation is low-contrast — BAND_OUTER (#354C72), BAND_MID
    (#2E3F5A), and BAND_INNER (#273141) appear as near-identical dark navies against
    #1A1A17, making the clinical ''graduated intensity'' harder to read in dark mode'
  - 'Inner band legend swatches (BAND_INNER = #273141 in dark mode) are nearly indistinguishable
    from the near-black background (#1A1A17) in the dark render legend'
