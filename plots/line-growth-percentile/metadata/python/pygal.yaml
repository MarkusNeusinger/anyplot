review:
  strengths:
  - SVG injection technique for right-margin percentile labels produces professional
    clinical chart appearance not easily achievable through pygal API alone.
  - Graduated band fills using polygon technique with theme-adaptive Imprint blue
    interpolation correctly represent the graduated intensity required by the spec.
  - Brand green (#009E73) patient line provides strong, immediate visual contrast
    against blue-toned percentile bands.
  - 'Perfect code quality: flat script, seeded RNG, clean imports, proper output files
    including interactive HTML.'
  - Title font size correctly scaled with the linear formula for the long combined
    title string.
  weaknesses:
  - 'Patient data markers are invisible in both renders: show_dots=False at the chart
    level overrides dots_size=10 on the patient series. Use show_dots=True globally
    and suppress dots on bands/median, OR inject SVG circle elements for patient visits.'
  - 'P50 median line is de-emphasized (dashed INK_MUTED) instead of emphasized as
    spec requires — spec says visually emphasized (thicker or distinct color). Change
    color to Imprint blue #4467A3 and increase stroke width to 7-8.'
  - 'Dark render inner band differentiation is poor: BAND_INNER (#222830) is nearly
    indistinguishable from PAGE_BG (#1A1A17). Increase dark-theme lerp factor for
    inner bands to t=0.30+ so all 6 bands remain distinguishable.'
  - Right-margin percentile labels at font-size=28 are relatively small on 3200px
    canvas — increase to 36-40 for better legibility.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "WHO Weight-for-Age · line-growth-percentile · python · pygal · anyplot.ai" is dark, bold, clearly readable at top. Axis labels "Age (months)" and "Weight (kg)" in dark ink, readable. Tick labels (0-36 months, 2-18 kg) in muted dark gray, readable. Bottom legend with 8 series in 4-column layout is legible.
      Data: Six graduated blue-toned filled bands from P3-P10 (outer, darker #96A8C6) grading to P25-P50 (inner, lighter #D9DEE3). A dashed muted gray P50 median line runs through the center. Brand green (#009E73) patient line tracks through P25-P50 zone — visible but without dot markers at individual visits. Right-margin percentile labels P97/P90/P75/P50(blue bold)/P25/P10/P3 at correct positions.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title and all text labels are in light/white ink — readable against dark background. No dark-on-dark failures. Bottom legend text is white on near-black — legible. Tick labels and axis labels all light-colored.
      Data: Colors are identical to light render — same brand green patient line, same Imprint blue band tones (dark versions: #314464 outer, #293548 mid, #222830 inner). Data colors unchanged between themes. Inner bands (#222830) very close to background (#1A1A17), reducing band differentiation for P25-P50 and P50-P75. Outer bands more distinguishable. Brand green #009E73 patient line visible. P50 in Imprint blue (#4467A3) on right margin readable.
      Legibility verdict: PASS (with caveat: inner band differentiation poor in dark mode — not a legibility failure but a visibility concern flagged in VQ-03)
