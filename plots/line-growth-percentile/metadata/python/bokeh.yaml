review:
  strengths:
  - Graduated alpha on percentile bands (darker at extremes, lighter near median)
    creates a clinical-quality visual hierarchy
  - 'Correct Imprint palette usage: patient line uses #009E73 (first categorical series),
    blue #4467A3 bands follow boys convention'
  - P50 median visually emphasized (lw=5, alpha=0.90 vs lw=2, alpha=0.50 for others)
    — draws eye to median reference
  - Right-margin percentile labels (P3–P97) correctly positioned outside the data
    area with extended x_range
  - All font sizes explicitly set (50pt title, 42pt axis labels, 34pt tick/legend
    labels, 26pt margin labels)
  - 'Theme-adaptive chrome implemented completely: INK/INK_SOFT/INK_MUTED used throughout,
    both light and dark renders correct'
  - HoverTool adds genuine interactivity to the HTML artifact — not fake functionality
  - varea() used idiomatically for filled percentile bands — distinctive Bokeh feature
  - min_border_* reservations prevent label clipping at canvas edges
  - Realistic WHO-approximating weight data with correct birth weight (~3.4 kg) and
    plausible 0–36 month trajectory
  weaknesses:
  - P3/P10/P25 labels on the right margin are slightly closer together than P75/P90/P97
    due to curve convergence — minor spacing concern but still readable
  - No x-grid removal — both x and y grids are shown at 15% opacity; removing x-grid
    would reduce visual noise for this time-series context
  - outline_line_color is set to None (good) but the implementation keeps all four
    spines equivalent (axis lines on all sides via axis_line_color=INK_SOFT) — removing
    the top and right spine equivalents would be cleaner
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, seamlessly extends from plot area to border
      Chrome: Title "line-growth-percentile · python · bokeh · anyplot.ai" in bold dark ink (~60% of width), clearly readable. Y-axis label "Weight (kg)" in dark ink, italic, well-sized. X-axis label "Age (months)" in dark ink, italic, well-sized. Tick labels (0–20 on y, 0–30 on x) in INK_SOFT dark gray. Percentile margin labels (P97, P90, P75, P50, P25, P10, P3) in INK_SOFT at 26pt, stacked on right margin, all readable.
      Data: Blue (#4467A3) percentile bands with graduated alpha (0.55 at extremes, 0.22 near median) creating a smooth clinical visual hierarchy. Seven thin blue percentile lines overlay the bands. Green (#009E73) patient line (lw=5) with solid circle markers (size=20, white outlines). Patient tracks below the P25 line early then rises toward the P25-P50 band by 36 months.
      Legibility verdict: PASS — all text readable, no dark-on-light or overflow issues, balanced font sizing.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
      Chrome: Title visible in light off-white (#F0EFE8), clearly readable. Y and X axis labels in light ink. Tick labels in INK_SOFT (#B8B7B0) against dark background — readable, no dark-on-dark failure. Legend uses ELEVATED_BG (#242420) fill with INK_SOFT text — correct contrast. Percentile labels in INK_SOFT at 26pt — readable.
      Data: Blue bands appear darker/deeper but the band color (#4467A3) is identical to light render. Green (#009E73) patient line with open-circle markers stands out clearly against the dark background — brand green is visible and well-contrasted. Data colors are identical between themes — only chrome flipped.
      Legibility verdict: PASS — all text is light-colored on dark background, no dark-on-dark issues, both themes fully readable.
