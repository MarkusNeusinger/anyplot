  strengths:
  - Excellent spec compliance with all 7 percentile bands, P50 emphasis, right-margin
    labels, gender-appropriate colors, and patient overlay
  - Strong design with graduated blue band opacities creating a professional clinical
    chart aesthetic
  - Realistic WHO-approximated data with appropriate growth curve shapes
  - Good use of Altair layer composition for building complex multi-layer chart
  - Clean well-structured code with appropriate complexity
  weaknesses:
  - Right-margin percentile labels slightly crowded in P25/P50/P75 cluster
  - Band opacity transitions too subtle (0.12 to 0.25 range)
  - Uses Python loops for band/line creation instead of more idiomatic Altair transforms
  image_description: The plot displays a pediatric growth chart with WHO-style percentile
    bands in graduated blue tones on a light blue-gray background. The x-axis shows
    "Age (months)" from 0 to 38, and the y-axis shows "Weight (kg)" from 0 to 18.
    Seven percentile curves (P3, P10, P25, P50, P75, P90, P97) are rendered as blue
    filled bands between adjacent curves, with darker opacity near the center (P25-P75)
    and lighter at the extremes. The P50 median line is visually emphasized with a
    thicker stroke. Percentile labels appear in bold blue text on the right margin.
    An individual patient trajectory is overlaid in coral/red with connected circle
    markers (white-stroked), tracking from birth (~3.5 kg) to 36 months (~15.6 kg),
    consistently above the 50th percentile around the 60th-75th range. The title reads
    "line-growth-percentile · altair · pyplots.ai" with subtitle "Boys Weight-for-Age
    (0–36 months)". Y-axis has subtle dashed grid lines; x-axis grid is disabled.
