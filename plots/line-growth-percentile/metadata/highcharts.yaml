  image_description: The plot displays a pediatric growth chart for boys' weight-for-age
    from birth to 36 months. Seven percentile curves (P3, P10, P25, P50, P75, P90,
    P97) are rendered as graduated blue-toned bands — darker at the extremes (P3–P10,
    P90–P97) and lighter near the median (P25–P75). The 50th percentile median line
    is drawn as a thicker solid dark blue line. Each percentile is labeled on the
    right margin (P3 through P97). An orange spline with filled circle markers traces
    an individual patient's weight trajectory from ~3.5 kg at birth to 15.5 kg at
    36 months, crossing from near the median down toward P3 range. The x-axis reads
    "Age (months)" from 0–36 with ticks every 3 months; the y-axis reads "Weight (kg)"
    from 0–24. The title is "Boys Weight-for-Age · line-growth-percentile · highcharts
    · pyplots.ai" with a subtitle "WHO Growth Standards, Birth to 36 Months". A floating
    legend in the upper-right identifies the 50th Percentile (Median) and Patient
    (Boy, Age 0–36m). Background is white with subtle dotted grid lines.
