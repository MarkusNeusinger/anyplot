  image_description: The plot displays a WHO Weight-for-Age growth chart for boys
    aged 0–36 months. Six graduated blue-toned percentile bands (P3–P10, P10–P25,
    P25–P50, P50–P75, P75–P90, P90–P97) fan outward from a narrow origin near birth
    weight ~2–4 kg to a wider spread at 36 months (~11–17.5 kg). The bands are semi-transparent
    with lighter blues at the extremes and medium blues near the center. A dark blue
    P50 median line runs through the center of the bands but appears quite thin. A
    red patient data line is present but barely visible — it is extremely thin with
    no discernible individual data point markers, making it very difficult to distinguish
    from the background. The x-axis reads "Age (months)" with labels 0–36, the y-axis
    reads "Weight (kg)" with values "10.0 kg" and "20.0 kg". The title reads "WHO
    Weight-for-Age (Boys) · line-growth-percentile · pygal · pyplots.ai". A legend
    at the bottom shows all 8 series in two rows. The overall layout is clean with
    a white background and subtle dashed horizontal grid lines.
