review:
  strengths:
  - Graduated band opacity (outer=0.38, inner=0.16) creates excellent visual hierarchy
    that matches clinical convention
  - Semantic blue color (#4467A3, Imprint position 3) for boys is properly documented
    and justified
  - Patient trajectory in brand green (#009E73) contrasts clearly against blue bands
    — strong focal point
  - Percentile labels on right margin via xlims extension to 42 is clean and idiomatic
  - 'Full theme-adaptive chrome: all text, spine, grid, legend colors correctly thread
    INK/INK_SOFT tokens'
  - 'Uses Makie-distinctive primitives: band!, scatterlines!, axislegend(), subtitle
    in Axis constructor'
  - P50 median emphasized with thicker line and dedicated legend entry — matches clinical
    chart convention
  - Y-grid only at alpha=0.12, spines removed, frameless legend — polished visual
    refinement
  weaknesses:
  - Subtitle at subtitlesize=13 is the same size as tick labels — for a clinical chart
    with important context text, a subtitlesize of 15 would better differentiate it
    from axis tick labels and improve mobile readability
  - 'DE-02: Legend frame is explicitly set to framevisible=false but framecolor is
    still passed — minor dead code; more importantly, the elevated background in dark
    mode (ELEVATED_BG=#242420) is barely distinguishable from PAGE_BG (#1A1A17), making
    the legend blend slightly into the dark background'
  - 'DE-03: The bands and patient line tell the story well, but there is no annotation
    marking where the patient currently sits (e.g., a label at the last data point
    ''36 mo: 15.0 kg'') — clinical charts often call this out explicitly to guide
    the clinician''s eye to the endpoint'
