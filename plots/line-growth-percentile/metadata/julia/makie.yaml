  strengths:
  - 'Complete spec compliance: all 7 percentile curves, graduated band opacity (outer
    darker, inner lighter), P50 emphasis, patient overlay, right-margin labels — nothing
    missing.'
  - 'Semantic color exception correctly applied: Imprint blue (#4467A3) for boys reference
    framework with brand green (#009E73) for contrasting patient data; both from the
    Imprint palette.'
  - Fully deterministic data based on WHO z-score methodology — realistic and clinically
    appropriate.
  - 'Full theme-adaptive chrome: all six INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens correctly
    threaded through every axis and legend property.'
  - 'Perfect code quality: flat script, clean imports, no randomness needed.'
  - 'Idiomatic Makie API usage: band!, scatterlines!, axislegend, RGBAf.'
  weaknesses:
  - Inner bands (P25-P50, P50-P75) at alpha=0.13 are very subtle in dark mode — slightly
    increasing to 0.16 would improve dark-theme graduation visibility without washing
    out the light render.
  - Legend framevisible=true with a visible box can feel heavy; consider framevisible=false
    or reducing framecolor alpha for a lighter look.
  - Percentile label fontsize (12pt) is slightly small; bumping to 13-14pt would improve
    mobile readability at 400px width.
  - Missing a descriptive title prefix (e.g. Boys Weight 0-36 Months) which would
    add clinical context at zero spec cost.
