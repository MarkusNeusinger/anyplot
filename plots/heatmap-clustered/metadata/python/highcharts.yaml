review:
  strengths:
  - 'Excellent theme-adaptive implementation: backgrounds, text colors, and dendrogram
    strokes correctly flip between light and dark themes while data colors remain
    constant.'
  - Dendrograms clearly visualize hierarchical clustering structure; reordered heatmap
    reveals drug-specific expression patterns.
  - Proper use of diverging colormap (BrBG) for signed data centered on zero with
    good scale centering.
  - Clean code with deterministic seeding; all imports justified; proper output format.
  - Bioinformatics-appropriate color choices and scientifically plausible gene expression
    patterns.
  - All text legible in both renders with excellent visual hierarchy.
  weaknesses:
  - Dendrogram rendering via SVG overlay is somewhat unconventional; could explore
    Highcharts modules for native support.
  - Design excellence is solid but conservative—could innovate with custom typography,
    accent colors, or refined spacing to elevate aesthetic sophistication.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white color at #FAF8F1 as expected. Clean, neutral surface.
      Chrome: Title "Gene Expression Clusters · heatmap-clustered · highcharts · anyplot.ai" in bold dark text (42px) is clearly visible. Subtitle explaining clustering insight is legible (28px dark). X-axis labels (sample names Control_1-3, Drug_A_1-3, Drug_B_1-3, Drug_C_1-3) rotated 315° and readable in 24px dark text. Y-axis labels (Gene_01-20) displayed vertically in 22px dark text, fully legible. Axis titles "Samples" and "Genes" in 36px dark text. Colorbar legend titled "Expression" in 24px dark text.
      Data: BrBG diverging colormap applied consistently—brown/tan colors for positive values (upregulated genes), light cream for near-zero, light blue for negative values (downregulated genes). Data colors are vibrant and distinguishable. Dendrograms displayed as light gray tree diagrams at top and left margins.
      Legibility verdict: PASS — All text is crisp, dark, and highly readable against the light background. No "light on light" issues. Dendrogram strokes are visible. Heatmap cells are clearly distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black color at #1A1A17 as expected. Subtle warmth, not harsh pure black.
      Chrome: Title, subtitle, axis labels, and tick labels all displayed in light tones for readability against dark background. Text is clearly visible and legible in light cream/off-white (confirming INK and INK_SOFT tokens applied correctly). Dendrograms rendered in light gray/cream color, contrasting well against dark background.
      Data: Heatmap data colors are IDENTICAL to light render (BrBG colormap unchanged)—brown/tan, cream, and light blue in same positions. This confirms proper theme-adaptive implementation where only chrome flips, not data representation.
      Legibility verdict: PASS — All text is light-colored and clearly readable against dark background. No "dark on dark" issues detected. Dendrogram strokes are visible. Heatmap cells are clearly distinguishable. The warm near-black background is not harsh and complements the color palette well.
