review:
  strengths:
  - Perfect theme-adaptive rendering across both light and dark themes with identical
    data colors and properly theme-flipped chrome
  - Sophisticated dendrogram visualization using hierarchical clustering (Ward method)
    with proper coordinate scaling and alignment
  - Correct diverging colormap (BrBG-style) for z-score data representation with clear
    semantic meaning (brown=negative, teal=positive)
  - Excellent data organization showing clear cluster structure with 20×15 density
    at good visual legibility
  - Clean, reproducible code with proper seed and minimal dependencies (only scipy.cluster
    beyond plotting stack)
  - Idiomatic lets-plot usage with proper geom composition and ggbunch multi-panel
    layout
  weaknesses:
  - Design uses correct defaults but lacks distinctive customization beyond compliance
    — could include more visual emphasis for cluster boundaries or refined color palette
    transitions
  - Tight margins reduce visual breathing room between dendrograms and heatmap — minor
    refinement could improve spatial hierarchy
  - Limited exploration of lets-plot's advanced features like custom interactive callbacks
    or theme customization beyond standard tokens
