review:
  strengths:
  - Correct plot type with both row and column dendrograms properly rendered
  - Data realistically represents gene expression clustering with natural group structure
  - RdBu_r diverging colormap is perceptually uniform and colorblind-safe
  - Hierarchical clustering correctly applied with Euclidean distance and Ward linkage
  - Grid layout using gridspec elegantly integrates dendrograms with heatmap and colorbar
  - Dendrograms are rendered with appropriate sizing and visual integration
  weaknesses:
  - 'CRITICAL: Title and all text (axis labels, tick labels, colorbar label) are dark/black
    in dark theme, creating dark-on-dark unreadable text - must use ANYPLOT_THEME
    environment variable with INK and INK_SOFT tokens'
  - 'CRITICAL: Background is hard-coded to white instead of reading theme tokens -
    should use PAGE_BG (#FAF8F1 light / #1A1A17 dark)'
  - File output uses plot.png instead of plot-light.png and plot-dark.png - incompatible
    with pipeline requirements
  - 'Dendrogram line colors hard-coded to #306998 instead of being theme-adaptive'
  - Implementation doesn't use os.getenv(ANYPLOT_THEME) to support both light and
    dark rendering
  - Design lacks visual hierarchy and refinement - uses default matplotlib styling
    throughout
  - Minimal design customization - no custom palette, no visual emphasis, no distinctive
    styling
