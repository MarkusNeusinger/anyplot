review:
  strengths:
  - 'Perfect spec compliance: canonical 18-group × 7-period layout with detached f-block
    rows, placeholder tiles (†/‡), atomic numbers, symbols, EN values, and labeled
    colorbar all present'
  - Real Pauling electronegativity data for all 118 elements — factually accurate
    and scientifically neutral
  - 'Imprint sequential colormap (#009E73 green → #4467A3 blue) correctly applied
    to continuous unipolar data, with TILE_EMPTY gray for NA values'
  - 'Full theme-adaptive chrome: background, title, axis labels, tick labels, and
    legend all correctly flip between light (#FAF8F1) and dark (#1A1A17)'
  - 'Idiomatic ggplot2 usage: scale_color_identity() for per-row text color, guide_colorbar()
    with custom dimensions, multiple geom_text() layers with data= argument — expert
    grammar-of-graphics application'
  - Clean code structure (Imports → Data → Plot → Save), deterministic (hardcoded
    real data), minimal chrome (no grid, no borders, no ticks)
  weaknesses:
  - 'Design Excellence needs improvement: no visual grouping of element families (s/p/d/f
    blocks), no period-trend annotation, no highlighting of notable elements (F as
    most electronegative, Fr as least) — adding subtle background rectangles for element
    family regions or a brief text annotation would significantly boost storytelling'
  - Atomic number text (size=0.9mm ≈ 2.6pt) and EN value text (size=0.75mm ≈ 2.1pt)
    are too small for comfortable desktop reading and effectively unreadable at mobile
    scale; increase atomic numbers to size=1.2mm and EN values to size=1.0mm
  - dplyr is imported but never used (no dplyr functions called — subset(), rbind(),
    as.numeric(), ifelse() are all base R); remove the unused import
  - 'LM-02 could be stronger: scale_color_identity() is a nice ggplot2-specific touch
    but element family background regions (geom_rect() behind the tiles) would showcase
    ggplot2''s layer composition in a more distinctive way'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Bold dark title "heatmap-periodic-table · r · ggplot2 · anyplot.ai" clearly visible. "Group" (x) and "Period" (y) axis labels in dark INK. Tick labels (1–18, 1–7, Ln, An) in INK_SOFT muted dark — all readable. Colorbar labeled "Electronegativity (Pauling scale)" with breaks at 1.0, 2.0, 3.0, 4.0 in INK_SOFT text.
      Data: Imprint sequential colormap green (#009E73) → blue (#4467A3) across 118 tiles. Alkali metals (group 1) show brightest green, halogens (group 17) show deepest blue. Gray (TILE_EMPTY) for noble gases and most period-7 transactinides. White #F0EFE8 element symbols on colored tiles; INK_MUTED text on gray tiles. Atomic numbers (size=0.9mm) and EN values (size=0.75mm) visible but very small.
      Legibility verdict: PASS for desktop; MARGINAL for mobile due to tiny atomic number and EN value text inside tiles.

