review:
  strengths:
  - Canonical 18×7 periodic table layout with f-block correctly detached as two rows
    below, including dashed-border reference tiles (57–71, 89–103) in group 3 positions
    of periods 6–7
  - Real NIST first ionization energy data for all 118 elements — values are factually
    accurate (e.g., H=1312.0, He=2372.3, Cs=375.7 kJ/mol)
  - 'Luminance-adaptive tile text color (getTextColor function switches between #1A1A17
    and #F0EFE8 at L=0.30 threshold) ensures readability on every tile color in both
    themes'
  - Imprint sequential colormap (#009E73→#4467A3 via t.seq) correctly chosen for single-polarity
    unipolar data; color is identical between light and dark renders
  - Null/superheavy elements (period 7 d-block, Rf–Og) shown as theme-adaptive grey
    tiles rather than omitted — preserves the canonical table shape
  - Category annotations in the 0.5-row gap ('Alkali', 'Alk. Earth', 'Transition Metals',
    'p-block', 'Noble Gases') enhance data storytelling by naming the IE trend blocks
  - '''low IE'' / ''high IE'' colorbar annotations and min/max labels guide reader
    interpretation without extra legend'
  - Period labels (1–7) and f-block row labels (Ln, Ac) on left margin provide axis
    context
  - 'Title format correct: ''heatmap-periodic-table · javascript · echarts · anyplot.ai'''
  weaknesses:
  - 'CQ-01: Two helper functions (lerpColor, getTextColor) technically violate the
    ''no functions'' KISS rule, though each is short (3–5 lines) and necessary for
    tile color computation and luminance-based text switching'
  - 'VQ-01: The IE value text at the bottom of tiles (valFont ≈ 36 source-px) is the
    smallest text element and may be borderline on mobile (<400 px) where the periodic
    table is already pixel-dense by nature'
  - 'DE-01: Design is strong but still below ''publication-ready'' — colorbar is built
    from discrete rect segments rather than a CSS gradient; minor inconsistency in
    the colorbar segment rendering creates a slightly banded appearance at segment
    boundaries'
