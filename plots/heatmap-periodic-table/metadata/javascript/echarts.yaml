review:
  strengths:
  - 'Full spec compliance: canonical 18x7 periodic table layout, lanthanides/actinides
    correctly detached below with a visual gap, f-block reference tiles with dashed
    borders'
  - Scientifically accurate first ionization energy data covering all 118 elements
    (NIST-level values)
  - WCAG-compliant luminance-adaptive text color per tile using the sRGB gamma formula
    — prevents contrast failures across the full green-to-blue gradient
  - Correct use of imprint_seq (t.seq) for the continuous heatmap — both data colors
    and chrome properly theme-adaptive
  - Manual colorbar with 160-segment gradient rectangles renders the color scale precisely
    without relying on ECharts built-in visualMap component
  weaknesses:
  - Lower ~30% of the 2400x2400 canvas is empty background — the TILE size is constrained
    by the 18-column width, leaving height underutilized; increase bottom margin content
    or reduce margin.bottom and compute a TILE that also expands vertically to fill
    the canvas better
  - IE value text at the bottom of each tile (TILE * 0.13 ≈ 8px CSS / 16px source)
    is too small for mobile readability at 400px viewport width — increase to at least
    TILE * 0.18 or move values to a tooltip/omit in favor of readability
  - Design storytelling is minimal — the periodic trends are implicit but no visual
    emphasis directs the viewer eye (e.g., a subtle annotation or group label for
    noble gases vs. alkali metals would dramatically improve the narrative)
  - Colorbar could be taller and wider to improve legibility; current 15px height
    is thin
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct.
      Chrome: Title "heatmap-periodic-table · javascript · echarts · anyplot.ai" centered in dark ink, clearly readable. Subtitle "First Ionization Energy (kJ/mol)" in t.inkSoft, readable. Colorbar tick labels ("376", "kJ/mol", "2372") and context labels ("low IE", "high IE") in t.inkSoft, readable.
      Data: imprint_seq gradient (t.seq[0]=#009E73 green → t.seq[1]=#4467A3 blue). Alkali metals (low IE, left column) are green; noble gases (high IE, right column) are blue. Null-value elements (Rf–Og) rendered as light grey tiles (#C4C3BC) with dark text. Element symbols clearly visible in light (#F0EFE8) on colored tiles. Atomic numbers (top-left) small but visible. IE values at tile bottom very small (~8px CSS) and barely legible.
      Layout note: Lower ~30% of canvas is empty background — content fits in top 70%.
      Legibility verdict: PASS (with caveat: IE value text at tile bottom is too small for mobile readability)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title and subtitle text in light color (#F0EFE8), clearly readable. Colorbar labels in t.inkSoft (light grey), readable. No dark-on-dark failures detected.
      Data: Tile colors identical to light render — imprint_seq gradient unchanged. Null-value tiles are dark grey (#3C3C38) with light text (#F0EFE8). IE values at tile bottom more visible in dark render due to higher contrast of light text on mid-luminance tile colors. f-block reference tile strokes use t.inkSoft (light grey), readable.
      Layout note: Same ~30% empty space at bottom as light render.
      Legibility verdict: PASS
