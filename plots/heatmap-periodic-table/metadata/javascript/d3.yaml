review:
  strengths:
  - Luminance-based text color switching (dark/light text adapts to tile fill) is
    a sophisticated design choice that ensures readability across the full color scale
  - 'Correct canonical periodic table layout: 18 groups × 7 periods with f-block rows
    detached below and placeholder tiles at group 3 for periods 6–7'
  - Theme-adaptive empty tile fill (gray tones matched to light/dark surface) preserves
    the recognizable periodic table shape for null-value elements
  - Real Pauling electronegativity data with correct values (Fr 0.70 → F 3.98); all
    known values accurately represented
  - 'Idiomatic D3 usage: d3.scaleSequential with d3.interpolateRgbBasis(t.seq) for
    imprint_seq colormap, d3.axisBottom for colorbar scale, correct SVG mount contract'
  weaknesses:
  - 'Design Excellence (DE-01/DE-03) leaves room for improvement: the visualization
    is clean and correct but lacks aesthetic differentiation beyond the required layout
    — element-type boundaries (e.g. subtle border colors or background tints distinguishing
    metals / nonmetals / metalloids) would raise sophistication without adding clutter'
  - Data storytelling (DE-03) is implicit in the periodic table structure but not
    actively guided — a visual emphasis on the notable trend (e.g. halogens in group
    17 having the highest EN values, or circling fluorine as the global maximum) would
    create a focal point and turn the chart from a reference table into a story
  - Colorbar uses 260 individual <rect> elements instead of a single SVG <linearGradient>;
    a defs/linearGradient approach is more idiomatic D3/SVG and would also make it
    easier for the repair loop to add tick marks above the bar rather than below (currently
    the axis runs below the gradient)
  - Sub-symbol text (EN value at 7px CSS, atomic number at 8px CSS) is readable at
    the 3200px canvas but not at mobile width (~400px); given the 68px tile constraint
    this is partly inherent, but EN value font could be bumped to 8px and atomic number
    to 9px to improve the mobile scaling story
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Bold centered title "heatmap-periodic-table · javascript · d3 · anyplot.ai" in dark ink (#1A1A17), clearly readable. Group numbers 1–18 above the main grid and period labels 1–7 to the left are rendered in secondary ink (inkSoft), legible. Colorbar tick labels (0.5, 1.0 … 4.0) are readable. "Electronegativity (Pauling scale)" colorbar label in primary ink is clear.
      Data: Green-to-blue sequential gradient (imprint_seq) spanning electronegativity 0.70 (Fr, teal-green) to 3.98 (F, dark blue). Noble gases (He, Ne, Ar, Kr, Xe, Rn) and several f-block elements (Eu, Tb, Yb, Lr) rendered as warm-gray empty tiles (#CCCAC3). Element symbols (15px CSS bold) clearly dominant in each tile. Atomic numbers (8px CSS, top-left corner) and EN values (7px CSS, bottom-center) visible at full resolution. Text color on each tile switches between dark (#1A1A17) and light (#F0EFE8) based on tile luminance — correctly readable throughout. Placeholder tiles at group 3, periods 6–7 show "57-71" and "89-103" in secondary ink. F-block rows (lanthanides / actinides) sit below the main grid with Ln / An labels.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light failures observed.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title in light ink (#F0EFE8) clearly readable. Period / group labels in secondary inkSoft token adapt correctly to the dark surface. Colorbar tick labels remain light-colored and readable. "Electronegativity (Pauling scale)" label visible. No dark-on-dark text failures observed.
      Data: Element tile colors are identical to the light render — same green-to-blue imprint_seq gradient for the EN values. Empty tiles use dark-theme gray (#3A3A36) which contrasts correctly against the near-black background. Luminance-based text color switching correctly uses light text on dark/medium tiles and dark text on the very light tiles (those tiles appear primarily in the higher-EN halogen region). Placeholder tile borders and labels visible.
      Legibility verdict: PASS — all text readable against the dark background; data colors identical to light render as expected.
