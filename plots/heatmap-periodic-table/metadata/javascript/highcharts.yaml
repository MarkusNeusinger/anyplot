    and are unreadable when scaled to mobile widths — inherent constraint of 118 tiles
    but could be mitigated by omitting them on f-block tiles or using a more compact
    notation
  - Colorbar is very minimal (gradient strip + two endpoint labels only) — adding
    3–4 intermediate tick marks at round values would significantly improve readability
    and storytelling
