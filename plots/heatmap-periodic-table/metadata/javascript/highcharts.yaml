review:
  strengths:
  - Correct canonical periodic table layout (18x7 main body + detached f-block rows
    with connector lines and Ln/An labels)
  - imprint_seq colormap correctly implemented from t.seq[0]/t.seq[1] tokens, applied
    consistently across both renders
  - Luminance-based dynamic text contrast (WCAG-correct) ensures tile text is readable
    on both teal and blue tiles in both light and dark themes
  - Factually accurate first ionization energy data for all 118 elements, including
    correct period anomalies (N > O, P > S)
  - Null-value placeholder tiles rendered as muted gray preserving the canonical periodic
    table silhouette
  - Colorbar with intermediate tick marks at 1000, 1500, 2000 kJ/mol provides quantitative
    reference
  - Dashed connector lines linking group-3 placeholder tiles to f-block rows are an
    elegant design detail
  - Square orientation correctly chosen for a grid-based symmetric layout
  - Completely deterministic — all 118 element data points hard-coded
  weaknesses:
  - Atomic numbers in tile top-left corners render at ~9 px CSS (~18 px native) —
    functionally legible at full 2400x2400 resolution but barely so; at 400 px mobile
    thumbnail they become invisible. Consider increasing to 11-12 px CSS.
  - Group numbers (1-18) at 9 px CSS are similarly small; bumping to 11 px CSS would
    improve readability at thumbnail sizes without overcrowding.
  - 'DE-01 stopped short of publication-ready polish: element family background differentiation
    (s/p/d/f blocks with subtle shading), bolder period/group labels, or a small legend
    for element categories would elevate to a higher tier.'
  - No IE numeric value shown inside tiles (optional per spec, but would enhance information
    density for this property-focused visualization).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, approximately #FAF8F1 — correct theme surface
      Chrome: Title "First Ionization Energy · heatmap-periodic-table · javascript · highcharts · anyplot.ai" (~17 px CSS) dark and clearly readable. Group numbers (1-18) at 9 px CSS and period numbers (1-7) at 10 px CSS are small but visible at full resolution. Colorbar labels at 10-11 px CSS are readable. Ln/An f-block row labels visible.
      Data: Green-to-blue gradient (imprint_seq: #009E73 → #4467A3) applied to first ionization energy. Alkali metals (group 1) teal-green (low IE ~400 kJ/mol), noble gases (group 18) navy blue (high IE up to 2372 kJ/mol). Null-value period-7 tiles are muted gray (#C0BFB8). Placeholder tiles for 57-71 and 89-103 also muted gray. First data series uses brand green #009E73. Tile text adapts by luminance: dark text on teal tiles, light text on blue tiles.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, approximately #1A1A17 — correct dark theme surface
      Chrome: Title and colorbar labels render as light text against the dark background (t.ink = #F0EFE8). Group/period/Ln/An labels use t.inkSoft (~#B8B7B0) — adequate contrast. No dark-on-dark failures. Placeholder tiles appear as charcoal #383834. Connector lines at #4A4A44 are subtly visible.
      Data: Colormap colors are identical to light render — same green-to-blue gradient. Only chrome has flipped. Tile text contrast still correct via luminance check (dark text on teal, light text on blue).
      Legibility verdict: PASS
