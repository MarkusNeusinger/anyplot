review:
  strengths:
  - Correct and complete periodic table in canonical layout with all 118 elements,
    proper f-block detachment, and dashed placeholder tiles at group 3
  - 'Imprint sequential colormap (#009E73 → #4467A3) implemented precisely from scratch
    via linear interpolation — exactly matches the imprint_seq spec'
  - WCAG luminance-based adaptive tile text color ensures strong contrast across the
    full EN gradient in both light and dark themes
  - Fully deterministic hardcoded element data with accurate Pauling EN values (Fr=0.70,
    F=3.98)
  - Named extremes in colorbar ('Low (Fr = 0.70)' / 'High (F = 3.98)') and grey tile
    legend improve interpretability without cluttering the chart
  - Both light and dark renders are theme-correct with identical data colors and adaptive
    chrome
  weaknesses:
  - Atomic number (7px CSS) and EN value (8px CSS) text is very small; at 400px mobile
    scaled view these elements are unreadable — minimum should be 8px for atomic numbers
    and 9px for EN values within the tile layout constraints
  - F-block row separation is marked only by a gap distance; a thin visual rule or
    faint bracket annotation connecting the placeholder tiles (57-71, 89-103) to the
    f-block rows would strengthen the layout story
  - Title font at 20px CSS is slightly below the recommended 22px for the square canvas;
    bumping to 22px would give the title marginally more visual weight
  - No focal points or group annotations guide the reader to key periodic trends (halogens
    as highest-EN group, alkali metals as lowest)
