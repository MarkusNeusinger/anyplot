      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "heatmap-periodic-table · javascript · muix · anyplot.ai" in dark ink, clearly readable. Subtitle "Pauling Electronegativity — periodic trends across all elements" in softer dark ink, readable. Colorbar label "Electronegativity (Pauling Scale)" and tick labels (0.70, 1.50, 2.50, 3.50, 3.98) in dark ink, readable. Low/High annotations and grey tile note in soft ink, readable.
      Data: Tiles colored with Imprint sequential colormap — bright teal-green (#009E73) for low EN (alkali metals, Fr=0.70) transitioning to steel blue (#4467A3) for high EN (halogens, F=3.98). Noble gases and undefined-EN elements rendered in warm grey (#CCCBC3). Tile text (symbols, atomic numbers, EN values) dynamically switches between dark (#1A1A17) and light (#F0EFE8) based on WCAG luminance — all tile text is readable.
      Legibility verdict: PASS — all text clearly readable against the light background

    Dark render (plot-dark.png):
