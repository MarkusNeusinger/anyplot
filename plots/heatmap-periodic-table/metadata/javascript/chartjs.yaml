review:
  strengths:
  - fgForBg luminance function switches per-tile text color (dark/light) based on
    tile background — ensures readability across the full imprint_seq gradient in
    both themes
  - Complete real Pauling electronegativity dataset for all 118 elements with correct
    null handling for noble gases and synthetic elements; grey null tiles preserve
    recognizable periodic table shape
  - Correct imprint_seq colormap applied via t.seq[0]→t.seq[1] design tokens (#009E73→#4467A3),
    showing the electronegativity trend visually from alkali metals to halogens
  - 'Perfect theme adaptation: pageBg, ink, inkSoft tokens applied to all chrome;
    theme-adaptive NULL_BG for greyed tiles; both renders pass legibility checks with
    no dark-on-dark failures'
  - Square canvas orientation correctly chosen for the near-square periodic table
    layout; layout mathematics center the table with balanced margins and proper f-block
    offset
  weaknesses:
  - Group labels (column numbers 1–18) rendered at 10px CSS (20 native px) — becomes
    very small at mobile thumbnail scale; increase to 11–12px CSS
  - Colorbar tick lines drawn in pageBg color are barely perceptible; replacing with
    t.inkSoft at low opacity would add subtle definition without clutter
  - Tile borders absent — a 1px ink-color (t.inkSoft) stroke on each roundRect would
    sharpen tile edges at small display sizes and improve DE-02 polish
  - 'LM-02: rendering is primarily raw Canvas 2D through Chart.js plugin lifecycle
    hooks; the Chart.js-native data layer is not leveraged (acceptable for this spec
    but limits library mastery score)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct pageBg token applied
      Chrome: Title "heatmap-periodic-table · javascript · chartjs · anyplot.ai" in bold dark ink, clearly readable. Subtitle "Electronegativity — Pauling Scale (all 118 elements)" in inkSoft. Period labels (1–7) on left, group labels (1–18) above table — all readable. Colorbar labels (0.70 Fr / 3.98 F) readable. No light-on-light issues.
      Data: Element tiles range from teal-green (#009E73) for low-EN elements (alkali metals, Fr=0.70) to slate-blue (#4467A3) for high-EN elements (F=3.98). Noble gases and synthetic elements in warm grey #D4D1CA. fgForBg function correctly alternates tile text between dark #1A1A17 and light #F0EFE8 based on tile luminance. Colorbar gradient matches tile colors.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark pageBg token applied
      Chrome: Title and subtitle in light #F0EFE8/B8B7B0 tones, clearly readable against dark background. Period and group labels in inkSoft light tone. Colorbar labels readable. No dark-on-dark failures observed — all chrome correctly uses light tokens.
      Data: Tile colors are identical to light render — same green-to-blue imprint_seq gradient. Null tiles use theme-adaptive darker grey #2C2C29. Per-tile text contrast maintained by fgForBg luminance function in both themes.
      Legibility verdict: PASS
