review:
  strengths:
  - Correct canonical periodic table geometry with f-block detached at display rows
    8.5/9.5 — the right coordinate approach for plotnine
  - Luminance-adaptive tile text color (dark/light based on tile brightness) correctly
    ensures legibility across the full colormap range
  - 'Perfect palette compliance: uses imprint_seq (#009E73 → #4467A3) for continuous
    data and fully theme-adaptive chrome throughout'
  - scale_color_identity for pre-computed text colors is an advanced, idiomatic plotnine
    technique showing library mastery
  - 'Complete spec coverage: symbol, atomic number, EN value per tile; NA grey tiles;
    colorbar; group/period reference labels — all present'
  weaknesses:
  - No visual hierarchy beyond the colormap gradient — no callouts, group-family shading,
    or emphasis elements to guide the viewer toward the key periodic trend (EN rises
    toward F, drops toward Fr); adding an annotation for max/min EN or subtle family
    outlines would elevate DE-01 and DE-03
  - Group/period reference labels at size=1.5 mm are near the legibility floor; increase
    to 1.8–2.0 mm for better readability at intermediate display sizes
  - Importing matplotlib.colors.LinearSegmentedColormap for the text-color luminance
    computation introduces a matplotlib dependency; the luminance formula could be
    computed directly on hex RGB values without the cmap object
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "heatmap-periodic-table · python · plotnine · anyplot.ai" in dark ink (#1A1A17), clearly readable at ~15pt. Group numbers 1–18 above main table in INK_SOFT (#4A4A44). Period numbers 1–7 to the left in INK_SOFT. Colorbar on right with title "Pauling Electronegativity" in INK (#1A1A17) and tick labels in INK_SOFT. All chrome elements readable.
      Data: Full 118-element periodic table. Main table 18 groups × 7 periods. Lanthanides row 8.5, actinides row 9.5, detached below. Tiles colored with imprint_seq gradient: brand green #009E73 (low EN, alkali metals, lower-left) grading to blue #4467A3 (high EN, halogens, upper-right). Noble gases and placeholders shown as warm grey (#E0DFD8). Each tile shows element symbol (bold, center), atomic number (top-left, small), and EN value (bottom center, smaller). Text color luminance-adapted (dark text on green tiles, light text on blue tiles).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light cream (#F0EFE8), clearly readable against dark background. Group numbers 1–18 in INK_SOFT dark token (#B8B7B0), subtle but visible. Period numbers 1–7 in #B8B7B0 similarly visible. Colorbar title and ticks readable in light text. Legend background at elevated #242420 with INK_SOFT border. No dark-on-dark failures detected.
      Data: Data colors are identical to the light render — the imprint_seq gradient (green → blue) is unchanged between themes. NA tiles shift to #2C2C28 (dark-appropriate grey) with #B8B7B0 text. Tile text color computation yields appropriate light/dark text per tile luminance.
      Legibility verdict: PASS
