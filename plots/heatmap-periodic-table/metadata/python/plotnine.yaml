review:
  strengths:
  - Perfectly accurate Pauling EN data for all 118 elements; canonical periodic table
    layout implemented precisely (18x7 main block + detached f-block rows at display_row
    8.5/9.5, group-3 placeholder tiles preserve the recognisable shape).
  - Luminance-based text colour switching (dark text on light tiles, light text on
    dark tiles) ensures legibility across the full colour gradient — a sophisticated
    technique.
  - 'Full Imprint palette compliance: imprint_seq (#009E73 to #4467A3) for the sequential
    heatmap, theme-adaptive chrome in both renders, correct #FAF8F1/#1A1A17 backgrounds.'
  - Dynamic title-size formula (max(8, round(12*67/n))) correctly prevents title overflow
    for the long mandatory title string.
  - scale_color_identity(guide=None) for per-tile variable text colours is a distinctive
    grammar-of-graphics pattern that cleanly handles the luminance-based colour assignment.
  weaknesses:
  - Colorbar legend title Pauling Electronegativity extends within ~50 px of the right
    canvas edge — needs ~80-120 px more right clearance via plot_margin in theme()
    or reducing legend_text size from 7pt to 6pt.
  - Atomic-number text (size=1.5 mm approx 4.3 pt) and EN-value text (size=1.4 mm
    approx 4 pt) are marginal; increase to size=1.7 and size=1.5 respectively for
    better legibility without tile overflow.
  - No group-number labels (1-18 along top) or period-number labels (1-7 on left)
    — standard on published periodic tables; add as a geom_text layer to lift aesthetic
    sophistication.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "heatmap-periodic-table · python · plotnine · anyplot.ai" in dark #1A1A17 text, clearly readable. No axis labels (theme_void appropriate for periodic table). Colorbar labelled "Pauling\nElectronegativity" in INK/INK_SOFT colours. Legend box uses ELEVATED_BG (#FFFDF6) with INK_SOFT border.
      Data: imprint_seq gradient (green #009E73 low EN → blue #4467A3 high EN). Alkali metals are deep teal-green, halogens are deep blue, noble gases and no-value elements show grey NA tiles (#E0DFD8). Element symbols are bold and centred; atomic numbers in top-left; EN values at bottom-centre of each tile. Text colour switches between dark and light based on tile luminance.
      Legibility verdict: PASS — all major text readable; sub-labels (atomic numbers, EN values) are small but visible at full resolution. Colorbar text extends very close to right canvas edge (~50 px clearance) but not clipped.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
