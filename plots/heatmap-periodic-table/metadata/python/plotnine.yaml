      Data: Tile colours are identical to light render — alkali metals teal-green, halogens blue, NA tiles in #2C2C28. Luminance-based text colour switching functions correctly in dark theme.
      Legibility verdict: PASS — all text readable; dark theme chrome adapts correctly. Same tight right-margin issue on colorbar label as light render.
