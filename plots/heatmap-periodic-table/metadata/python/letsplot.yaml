    blue high-EN tiles (F, O, N, Cl, Br, Kr range) have reduced contrast with dark
    ink in light mode. Spec requires luminance-adaptive text switching: compute relative
    luminance of the fill color and use dark text for light tiles and light text for
    dark tiles. (This requires building a luminance lookup per element and conditionally
    setting geom_text color.)'
