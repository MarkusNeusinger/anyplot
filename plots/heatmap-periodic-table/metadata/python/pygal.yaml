review:
  strengths:
  - Luminance-adaptive tile ink (relative_luminance + ink_for_tile) ensures text contrast
    on every tile colour across the entire green→blue gradient — a sophisticated correctness
    detail
  - 'Perfect IUPAC canonical layout: La/Ac placed at col 3 in their periods, f-block
    rows at correct offset with dashed connector lines and italic Ln/An labels'
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) applied to single-polarity electronegativity
    data; both renders theme-correct with identical data colours'
  - Grey tiles for noble gases and transactinides preserve the familiar periodic table
    silhouette while honestly representing missing data
  - Interactive HTML export alongside PNG, appropriate for pygal as an interactive
    library
  weaknesses:
  - 'DE-03 gap: no visual emphasis on trend extremes or notable elements (F at 3.98
    as the global maximum, Fr at 0.70 as the minimum); a subtle text callout or slightly
    heavier border on those tiles would lift the storytelling score'
  - 'LM-02: pygal’s tooltip interactivity is not wired to the element tiles (tiles
    are low-level SVG rects, not pygal data points), so hovering tiles in the HTML
    shows no tooltip — the primary interactive differentiator of pygal is unused'
  - 'CQ-01: the PeriodicHeatmap class and five helper functions are justified by the
    complexity but still deviate from the preferred flat-script KISS structure'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "heatmap-periodic-table · python · pygal · anyplot.ai" in dark ink at top, clearly readable. Group numbers 1–18 above the table in INK_MUTED tone. Period numbers 1–7 to the left. Colorbar label "Pauling Electronegativity" and tick labels (0.5 intervals) visible and readable.
      Data: Sequential gradient from brand green (#009E73, low EN alkali metals) to slate blue (#4467A3, high EN halogens/H). Noble gases and transactinides rendered as neutral grey tiles. Tile text (atomic number, symbol, EN value) adapts via luminance — dark ink on light tiles, off-white on dark tiles. All legible.
