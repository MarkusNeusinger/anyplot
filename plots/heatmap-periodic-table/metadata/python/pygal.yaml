      Chrome: Title and period/group labels in light off-white text, clearly readable. Colorbar tick labels use INK_SOFT (#B8B7B0), readable. No dark-on-dark failures detected.
      Data: Data tile colours identical to light render (green→blue gradient, grey empty tiles). Luminance-adaptive tile ink ensures readable contrast throughout. Brand green #009E73 clearly visible in alkali-metal tiles.
      Legibility verdict: PASS
