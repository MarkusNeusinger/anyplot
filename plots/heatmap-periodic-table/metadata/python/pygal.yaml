  strengths:
  - Perfect spec compliance — canonical 18×7 IUPAC layout with lanthanide and actinide
    f-block rows correctly detached below, all 118 elements placed, gray tiles for
    missing values
  - Excellent visual quality — imprint_seq colormap (brand green → blue) vividly reveals
    the electronegativity trend toward the upper-right; luminance-adaptive text on
    tiles ensures readability at every color level
  - 'Robust dual-theme implementation — both #FAF8F1 (light) and #1A1A17 (dark) renders
    are clean, all chrome tokens correctly adapted, data colors identical between
    themes'
  - Rich annotation layer — group numbers (1–18) above tiles, period numbers (1–7)
    on the left, Ln/An italic labels for f-block rows, dashed connector lines from
    period 6/7 group-3 tile to f-block, colorbar with tick marks and end labels
  weaknesses:
  - Pygal API not used — the implementation generates raw SVG strings directly and
    uses cairosvg only as a PNG renderer; there is no `import pygal` statement. This
    showcases custom SVG engineering rather than pygal's charting library capabilities.
    A future repair should use pygal's rendering engine (e.g. pygal.treemap or a custom
    chart subclass) or at minimum build the SVG via pygal's low-level SVG graph class
    so the library is actually exercised.
  - Design excellence headroom — element category backgrounds (alkali metals, alkaline
    earths, halogens, noble gases, transition metals, etc.) rendered as very subtle
    tinted regions behind the tiles would add a second data dimension and increase
    storytelling depth without cluttering the view; colorbar padding could be slightly
    more generous.
