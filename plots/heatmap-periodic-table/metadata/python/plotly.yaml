review:
  strengths:
  - 'Correct canonical periodic table layout: 18 columns × 7 periods with lanthanide
    and actinide f-block rows properly separated below the main body'
  - Two-layer go.Heatmap approach (grey trace + colored trace) elegantly handles elements
    with missing IE1 data without omitting them from the grid
  - 'imprint_seq (#009E73 → #4467A3) used correctly for the single-polarity continuous
    property; colorbar labeled with IE₁ (kJ/mol) including proper subscript formatting'
  - Theme-adaptive chrome is fully wired — PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED
    all flip correctly between light (#FAF8F1) and dark (#1A1A17) renders
  - Title font-size dynamically scales with title length (ratio = 67/len(title)) so
    the long mandated title does not overflow the canvas
  - xgap=3 / ygap=3 creates the equal-sized tile grid with consistent small gaps that
    define the periodic table heatmap aesthetic
  - sys.path self-import guard at the top is the correct, safe pattern for a file
    named plotly.py that would otherwise shadow the installed package
  - All 118 elements are represented — grey tiles preserve the recognizable periodic
    table shape for elements without IE1 data, exactly as the spec requires
  weaknesses:
  - 'Text on grey tiles uses #D8D8D0 on #8A8A82 (light mode) — contrast ratio ~2.35:1,
    below the 3:1 threshold for large text; switch to a darker ink token (e.g. INK_SOFT
    = ''#4A4A44'' in light mode) for grey-tile annotations'
  - 'Spec requires luminance-adaptive tile text (switch between dark and light text
    based on tile background luminance), but implementation uses fixed white (#FFFFFF)
    for all colored tiles — for very low-IE1 green tiles the contrast is borderline
    ~4.25:1; compute luminance from the tile color and choose INK vs #FFFFFF accordingly'
  - Atomic numbers are rendered at font size 3.5 px (14 source-px at scale=4, 3200×1800
    output); this is at minimum legibility at full resolution and invisible when the
    image is scaled to mobile width (~400 px) — raise to at least 5 px (20 source-px)
  - 'Design storytelling is sparse: the color gradient shows the trend but there are
    no period numbers along the left edge or group numbers (1–18) along the top edge
    to help readers orient themselves — adding these as axis annotations would significantly
    improve navigability'
  - 'DE-01/DE-02 polish gap: colorbar border uses a hard-coded 1px line and the layout
    has notable empty whitespace in the gap row between the main table and the f-block
    rows — consider a lighter visual separator or a thin rule to make the gap intentional
    rather than empty'
