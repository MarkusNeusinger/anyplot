review:
  strengths:
  - 'Correct imprint_seq sequential colormap (#009E73 → #4467A3) for single-polarity
    IE1 data'
  - Luminance-adaptive text coloring on tiles (dark on green, white on blue) — non-trivial
    design detail
  - Grey tiles for elements with missing IE1 data preserve the recognizable periodic
    table shape
  - Thin separator lines framing the f-block gap are a polished visual cue
  - All 118 elements placed in canonical positions; lanthanides/actinides correctly
    detached into separate rows
  - Colorbar with descriptive label IE₁ (kJ/mol) and theme-adaptive chrome
  - 'Correct title format with descriptive prefix: First Ionization Energy · heatmap-periodic-table
    · python · plotly · anyplot.ai'
  - Factually accurate IE1 values (H=1312, He=2372.3, N=1402.3 — anomalous N correctly
    higher than O)
  - Layered heatmap approach (grey trace + colored trace) is idiomatic Plotly for
    mixed-data tiles
  - Fully deterministic — hardcoded element data, no random seed needed
  weaknesses:
  - Period numbers (4.5px) and group numbers (3.8px) are very small — at scale=4 they
    render at ~18px and ~15px source-pixels, barely visible at full resolution and
    essentially invisible when scaled to mobile (~400px width). Increase to at least
    6px each.
  - Two helper functions (_srgb_lin, _tile_text) break the KISS flat structure (Imports
    → Data → Plot → Save). Inline the luminance check as a lambda or single expression
    to restore strict KISS.
  - Title font size adaptive formula (max(11, round(16 × 67/len(title)))) results
    in 14px logical = 56px source, which is slightly on the smaller end for the long
    mandated title. Consider floor of 13 → capped at 52px; current rendering looks
    acceptable but is near the lower boundary.
