  strengths:
  - Complete and accurate data for all 118 elements with correct first ionization
    energy values
  - Correct canonical periodic table layout including lanthanide and actinide detachment
    with placeholder tiles
  - 'Perfect Imprint sequential colormap usage (green #009E73 → blue #4467A3) for
    continuous IE data'
  - Full theme-adaptive chrome throughout — backgrounds, legend fill, legend text,
    title color all correctly branch on ANYPLOT_THEME
  - 'Tile text hierarchy well implemented: atomic number small top-left, symbol bold
    center, IE value small below'
  - Grey null tiles preserve the recognizable table shape for superheavy elements
    without IE values
