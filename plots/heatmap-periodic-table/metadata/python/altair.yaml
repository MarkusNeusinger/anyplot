    cropping
  - Idiomatic Altair layer composition combining null rects, valid rects, atomic text,
    symbol text, and value text
  weaknesses:
  - At mobile width (~400px) the atomic number (fontSize=5) and IE value (fontSize=4.5)
    text within tiles becomes essentially unreadable — these are too small even for
    a dense 18-column grid; consider a minimum effective fontSize of 6 and 5 respectively
  - 'White space: the right portion of the canvas (~20%) and bottom (~15%) are blank
    padding due to the asymmetric periodic table shape; while inherent to the layout,
    the f-block separator gap and bottom empty area could be tightened'
  - The legend frame box adds visual weight; a frameless gradient bar would look cleaner
    for this plot type
  - 'DE-02: spines are not removed (no spines is the correct choice for a periodic
    table) but the legend box stroke slightly clutters the lower-left area'
