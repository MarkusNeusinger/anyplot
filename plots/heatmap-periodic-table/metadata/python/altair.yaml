  strengths:
  - 'Spec fully met: canonical periodic table layout with all 118 positions, f-block
    rows, colorbar with units, per-tile symbol/atomic-number/IE-value labels, and
    greyed null tiles for unmeasured elements'
  - Imprint imprint_seq (green to blue) applied precisely; both renders theme-adapt
    correctly with zero dark-on-dark or light-on-light failures
  - Factually accurate first ionization energy data (NIST reference values) makes
    this a trustworthy scientific visualization
  - 'Perfect code quality: KISS structure, deterministic, clean imports, canonical
    PIL padding guard'
  - Altair layer composition is idiomatic and expressive — five mark layers composed
    cleanly in alt.layer()
  weaknesses:
  - 'Tile text contrast on low-IE (bright green) tiles: near-white #F0EFE8 against
    #009E73 achieves ~3.5:1 contrast — sufficient for bold symbols but marginal for
    smaller atomic-number and IE-value text (6px and 5.5px). Spec recommends switching
    text color based on tile luminance. Fix: extend the np.where text_color logic
    to use INK_SOFT (dark) for IE < ~8 eV tiles and TEXT_ON_TILE (near-white) for
    higher IE tiles.'
  - 'DE-01 not at publication level — additional polish opportunities: a label row
    explicitly annotating the lanthanide/actinide f-block connector, or subtle block-type
    background tinting (d-block, p-block, s-block, f-block) would lift aesthetic sophistication
    and data storytelling.'
