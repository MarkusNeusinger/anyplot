  strengths:
  - Luminance-adaptive text color (perceptual formula 0.299R+0.587G+0.114B) ensures
    tile text is always readable regardless of EN value — a sophisticated and correct
    implementation detail
  - Complete canonical 118-element periodic table with proper f-block handling (dashed
    placeholder tiles, detached lanthanide/actinide rows, rotated row labels)
  - Correct imprint_seq colormap usage (["#009E73", "#4467A3"]) matching the mandated
    sequential definition exactly
  - 'Theme-adaptive chrome is thorough: all six token variables used consistently
    across tiles, colorbar, annotations, and labels'
  - Annotation arrows to highest/lowest EN elements clearly communicate the periodic
    trend gradient
  - No bbox_inches='tight' — canvas dimensions exactly 3200x1800
  weaknesses:
  - Secondary text (atomic numbers 2.8pt, EN values 2.6pt, period/group labels 2.5pt)
    renders to ~14-15px at 400dpi — borderline at full resolution and unreadable when
    scaled to mobile thumbnail (~400px) width; consider bumping to 3.5-4pt for atomic
    numbers and period/group labels
  - Colorbar tick positions [1.0, 1.5, 2.0, 2.5, 3.0, 3.5] don't extend to the actual
    data extremes (vmin=0.70, vmax=3.98); while annotations compensate, adding tick
    marks at 0.7 and 4.0 would make the colorbar self-contained without needing annotations
    to communicate the range
