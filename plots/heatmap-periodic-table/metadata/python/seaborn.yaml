    tiles)
  - 'Perfect spec compliance: canonical periodic table layout with detached f-block,
    grey tiles for undefined-EN elements, all required features present'
  - imprint_seq colormap applied with exact vmin/vmax matching actual Pauling scale
    range (0.7-4.0)
  - 'Theme-adaptive chrome is complete: all INK/INK_SOFT tokens threaded through title,
    colorbar label, colorbar ticks, and colorbar spines'
  - Scientifically accurate Pauling electronegativity data for all 118 elements
  - Saves correctly without bbox_inches=tight, preserving exact 3200x1800 canvas
  weaknesses:
  - No labels for element group families (alkali metals, halogens, noble gases) or
    trend annotations; add Lanthanides/Actinides text labels beside f-block rows and
    annotate max (F, 3.98) and min (Cs/Fr, 0.79) elements with numeric values to improve
    DE-01 and DE-03
  - Custom grey tile overlays and element text use plain plt.Rectangle + ax.text (matplotlib);
    use seaborn annot parameter with custom annotation array instead for more seaborn-idiomatic
    approach (improves LM-02)
  - Atomic number fontsize=2.8pt is very small and challenging on mobile (400px width);
    increase to 3.5-4pt for better readability without crowding tiles
  - No visual separator between main periodic table body and f-block rows beyond empty
    space; add Lanthanides/Actinides text labels left of those rows for refinement
    (DE-02)
