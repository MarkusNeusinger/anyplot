review:
  strengths:
  - Per-tile luminance computation (_lum() with proper sRGB linearisation) for adaptive
    dark/light tile text — professional and correct
  - Amber border focal highlights on He (highest IE=2372) and Fr (lowest IE=393) provide
    a natural data storytelling entry point
  - 'Correct Imprint sequential colormap (#009E73 → #4467A3) for single-polarity continuous
    data; both themes pass readability checks with no dark-on-dark or light-on-light
    failures'
  - CDP viewport override (Emulation.setDeviceMetricsOverride) ensures exact 2400×2400
    screenshot; outline_line_alpha=0 suppresses bokeh dark-mode frame artefact
  - 'Full spec compliance: canonical 18x7 layout, detached f-block rows, grey tiles
    for missing data (Z=104-118), all tile text layers (symbol, atomic number, IE
    value) present'
  weaknesses:
  - IE value text on tiles at 13pt is slightly small for a 2400px canvas; bumping
    to 15-16pt would improve legibility without causing overlap
  - No visual separator (thin horizontal rule or text label) between the main periodic
    table body and the detached f-block rows; a 'Lanthanides' / 'Actinides' label
    would add clarity
  - No annotation explaining what the amber border highlights on He/Fr represent —
    a small p.text() label ('Highest IE' / 'Lowest IE') near those tiles would complete
    the storytelling
