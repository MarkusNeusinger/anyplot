review:
  strengths:
  - 'Correct canonical periodic table layout: 18 groups × 7 periods with lanthanides
    and actinides properly detached as separate rows offset below, pointer tiles (*
    marker) at group 3 of periods 6 and 7'
  - Luminance-adaptive tile text color (text_color_for function) switches between
    dark and light ink based on tile background luminance — all element symbols remain
    legible across the full colormap gradient
  - 'Complete element dataset: all 118 elements represented, missing-EN elements (noble
    gases, many transactinides) rendered as distinctly-colored gray TILE_MISSING tiles
    rather than omitted'
  - 'Correct Imprint continuous colormap (ANYPLOT_SEQ: #009E73 → #4467A3) for single-polarity
    electronegativity data, with proper theme-adaptive chrome (INK/INK_SOFT/PAGE_BG
    tokens) applied to colorbar and title in both renders'
  - Clean CairoMakie code using native poly!/text! primitives with Makie layout grid
    (fig[1,1] + fig[1,2] for colorbar), colsize! for proportional sizing — idiomatic
    Makie approach
  weaknesses:
  - Atomic number fontsize is 5.5pt (effective ~11px at px_per_unit=2) — too small;
    at 400px mobile width these reduce to ~1.5px and become invisible; increase to
    at least 7–8pt to ensure mobile legibility and a VQ-01 score of 8/8
  - 'DE-03 (Data Storytelling): the chart relies entirely on the inherent periodic
    table layout to communicate the electronegativity trend, with no additional visual
    hierarchy, focal-point callout, or subtitle/annotation to guide the viewer; adding
    even a one-line subtitle (e.g. ''Pauling electronegativity — higher values toward
    top-right'') or a small annotation highlighting F (highest, 3.98) and Fr (lowest,
    0.70) would lift storytelling to 4–5/6'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as expected — not pure white.
      Chrome: Title "heatmap-periodic-table · julia · makie · anyplot.ai" in dark ink (#1A1A17), clearly readable. No axis tick labels (correctly suppressed for this plot type). Colorbar on the right side labeled "Pauling Electronegativity" in dark ink with dark tick labels, ticks at 1, 2, 3 — all readable. Ln/An labels in INK_MUTED at the left of f-block rows, small but visible.
      Data: Element tiles colored with ANYPLOT_SEQ sequential colormap from #009E73 (low EN, e.g. Fr=0.70 alkali metals) to #4467A3 (high EN, e.g. F=3.98). Noble gases and elements without Pauling EN values rendered as light gray TILE_MISSING tiles. Element symbols centered in tiles with luminance-adaptive text (dark ink on light/mid tiles, light ink on dark tiles). Atomic numbers in upper-left corner of each tile — very small (5.5pt / effective 11px).
      Legibility verdict: PASS — all main text elements (title, colorbar labels, element symbols) are readable at full resolution. Minor concern: atomic number text at 5.5pt is barely legible at full size and would be invisible at 400px mobile.

