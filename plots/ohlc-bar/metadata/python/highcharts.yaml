    charts but the outer chart frame should be hidden.'
  - 'DE-03 LOW (3/6): The chart shows price data but does not guide the viewer to
    any insight. The clear upward trend from ~$145 in June to ~$155 in August is the
    story. Reinforce it by adding a thin trend line or a net-change annotation (e.g.
    ''+$10 / +6.7%'' label near the final bar) to create a focal point and give the
    viewer an immediate takeaway.'
