review:
  strengths:
  - 'Finance semantic exception correctly applied: green (#009E73) for up-bars, red
    (#B71D27) for down-bars with explicit rationale in code comment.'
  - Informative subtitle with computed net-change statistics adds real data storytelling
    value.
  - 5-day SMA overlay provides trend context without cluttering the OHLC display.
  - Both themes render cleanly with no dark-on-dark or light-on-light failures.
  - Perfect spec compliance and data quality; all 50 OHLC bars and SMA visible.
  - Canvas pinning via CDP + PIL fallback prevents dimension drift.
  weaknesses:
  - Both horizontal and vertical gridlines enabled; for an OHLC financial chart, y-axis-only
    gridlines are conventional and reduce visual noise — remove gridLineWidth from
    xAxis.
  - Red/green up/down coloring is the sole visual discriminator for CVD users; bar
    direction provides secondary signal but a shape/pattern difference would improve
    accessibility.
  - Subtitle at 36px is smaller than tick labels at 44px, creating a hierarchy anomaly
    — consider 40px for subtitle.
  - Legend marker for ohlc series renders as a filled circle rather than an OHLC bar
    symbol, which can mislead readers.
