review:
  strengths:
  - 'Full spec compliance: weekday labels (Mon-Sun) on the y-axis, month labels along
    the top, imprint_seq sequential colormap, graceful faint-neutral handling of out-of-range
    calendar cells, and a horizontal Colorbar legend labelled Daily commits'
  - 'Correct 3200x1800 canvas; both themes render correctly with identical data colors
    and only chrome flipping (warm off-white #FAF8F1 vs warm near-black #1A1A17)'
  - 'Idiomatic Makie: poly! with a vector of Rect2f cells and per-cell colors, yreversed
    for Monday-at-top, xaxisposition=:top for month headers, and a Relative-width
    horizontal Colorbar'
  - 'Clean KISS script: no functions/classes, Random.seed!(42) for reproducibility,
    only used imports, well-commented'
  - Realistic and neutral GitHub-style daily commit data with weekday/seasonal/yearly-trend
    structure and occasional rest days
  weaknesses:
  - 'Vertical layout imbalance: the 7-row calendar band occupies only the upper ~40%
    of the canvas and the Colorbar sits far below it, leaving a large empty mid-canvas
    band. Tighten the composition (increase cell aspect/height or reduce the gap)
    so it fills the canvas more evenly - deduct VQ-05.'
  - 'Color differentiation is subtle: because commit values cluster in the mid-range,
    most cells read as similar teal, making day-to-day pattern reading harder. This
    is largely data-driven, but a slightly wider value spread would improve legibility
    of the color signal.'
  - Month and weekday tick labels are modest (~15pt on the 1600-unit figure); readable
    at full size but on the small side when scaled to ~400px mobile width - a small
    bump would help.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), not pure white. Correct.
      Chrome: title "heatmap-calendar · julia · makie · anyplot.ai" in dark ink, bold, clearly readable. Month labels (Jan..Dec) along the top and weekday labels (Mon..Sun) down the left in soft ink — all readable. Colorbar ticks 0/5/10/15 and label "Daily commits" readable.
      Data: calendar grid of week-column x weekday-row cells colored with imprint_seq (brand green #009E73 -> blue #4467A3). Out-of-range corner cells rendered as faint neutral gray. First-series/low end is brand green.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black. Correct.
      Chrome: title light ink, readable. Month/weekday labels in soft light ink, readable. Colorbar label/ticks readable. No dark-on-dark failures.
      Data: identical cell colors to light render (green->blue imprint_seq); only chrome flipped. Out-of-range cells are faint dark rectangles.
      Legibility verdict: PASS
