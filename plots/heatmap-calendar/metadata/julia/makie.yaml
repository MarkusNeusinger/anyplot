review:
  strengths:
  - 'Faithful GitHub-style calendar heatmap: weeks as columns, Mon–Sun rows, month
    labels across the top, and a horizontal sequential colorbar — every required spec
    feature is present.'
  - 'Correct Imprint theming: imprint_seq (brand green → blue) for the single-polarity
    commit counts, #FAF8F1 / #1A1A17 backgrounds, and theme-adaptive INK / INK_SOFT
    chrome threaded through title, ticks, and colorbar in both renders.'
  - Missing/out-of-range days are handled gracefully as faint neutral cells (6% ink
    alpha) instead of being dropped, exactly as the spec asks.
  - 'Idiomatic CairoMakie: poly! over precomputed Rect2f cells, a GridLayout with
    transparent spacer Boxes to vertically center the block on the 16:9 canvas, and
    Relative colorbar width — clean, flat, seed-reproducible script.'
  - Realistic, neutral synthetic data with weekday/weekend contrast, a yearly growth
    trend, and a seasonal sine term, giving the grid genuine temporal texture.
  weaknesses:
  - Design is polished but reads as an even grid with no deliberate focal point —
    a subtle emphasis (e.g. slightly stronger stroke on peak weeks or a callout) would
    lift data storytelling.
  - The green→blue sequential ramp shifts hue as well as lightness, which is legible
    but can read as two categories at a glance rather than pure intensity; acceptable
    since imprint_seq is the mandated continuous ramp.
  - Vertical centering leaves a visible whitespace gap between the calendar block
    and the colorbar; intentional, but the legend feels slightly detached from the
    grid it explains.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: dark title "heatmap-calendar · julia · makie · anyplot.ai" centered above the grid; month labels Jan–Dec along the top in soft ink; Mon–Sun weekday labels down the left in soft ink; colorbar labeled "Daily commits" (0–~23) below. All text clearly readable against the light surface.
      Data: 7×53 calendar grid of padded cells colored on the imprint_seq green→blue ramp; low counts read brand green (#009E73), high counts blue (#4467A3). Leading/trailing out-of-range days render as faint light-gray cells. First/low end of the ramp is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: light title, month labels, weekday labels, and colorbar text — all clearly readable against the dark surface; no dark-on-dark failures. Empty cells render as faint near-black tiles.
      Data: identical calendar geometry and identical green→blue cell colors to the light render — only the surrounding chrome flipped, as required.
      Legibility verdict: PASS
