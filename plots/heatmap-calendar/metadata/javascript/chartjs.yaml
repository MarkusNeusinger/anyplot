review:
  strengths:
  - Correct, spec-compliant calendar-heatmap structure with all required elements
    (weekday labels, month labels, sequential colormap, no-activity handling, legend)
  - Smart use of a scatter chart with square points and pixel-scale-aware radius to
    fake a matrix/heatmap grid within Chart.js's core chart-type constraints (per
    the library's no-plugin-workarounds rule)
  - Data-driven, quantile-based legend bins that reflect the actual value distribution
    rather than arbitrary fixed thresholds
  - Fully deterministic, reproducible data generation via a fixed-seed LCG
  - 'Palette and theme handling are both correct: imprint_seq for the continuous scale,
    identical data colors across light/dark, theme-correct backgrounds and chrome'
  weaknesses:
  - Excessive vertical whitespace between the seven weekday rows makes the grid feel
    sparse and dot-plot-like rather than a compact, touching calendar grid — reduce
    the y-scale's effective range so rows sit closer together, closer to the GitHub-contribution-graph
    convention referenced in the spec
  - The generous row spacing also dilutes overall visual hierarchy/focal point — tightening
    the layout would let the burst outliers and weekday pattern stand out more clearly
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "heatmap-calendar · javascript · chartjs · anyplot.ai" at top in dark ink; month labels (Jan-Dec) along the top; weekday labels (Mon-Sun) down the left edge; four-swatch legend ("No activity", "1-4", "5-6", "7+") centered below the grid. All clearly readable.
      Data: 365 day-cells across 7 weekday rows x ~53 week columns, colored via sequential green-to-blue scale (imprint_seq), gray "No activity" cells on low-activity days (mostly weekends), scattered darker-blue "hackathon burst" outliers. First-tier color anchor is brand green #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title/month/weekday labels and legend, now rendered in light ink against the dark background. No dark-on-dark issues; "No activity" gray swatches read clearly against the near-black surface.
      Data: Cell colors are pixel-identical to the light render at every date (verified same day-cells show green/teal/blue/gray in both renders) — only chrome (background, text) flips, as required.
      Legibility verdict: PASS
