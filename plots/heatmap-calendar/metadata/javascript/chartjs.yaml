review:
  strengths:
  - 'Clever core-API-only workaround for Chart.js''s lack of a native heatmap type:
    a scatter dataset with square point markers positioned by (week, weekday), matching
    the calendar-grid structure the spec requires without reaching for an unsupported
    plugin.'
  - 'Sequential Imprint colormap (imprint_seq, brand green -> blue) correctly interpolated
    per-cell via colorForValue(), and data colors are pixel-identical between the
    light and dark renders (verified: cell RGB (30,134,136) in both).'
  - 'Realistic, well-structured synthetic data: per-weekday baseline (busier weekdays,
    quieter weekends) plus periodic ''hackathon burst'' spikes gives genuine low/medium/high/zero
    feature coverage rather than a flat dataset.'
  - Data-driven legend bins (quantile-based) accurately represent the actual color
    scale, and the previously-flagged 'legend disconnected from the grid' issue is
    now fixed -- the legend sits close under the grid instead of pinned far below.
  - 'Title, month labels, and weekday labels are correctly theme-adaptive: pixel-sampled
    colors match t.ink (#F0EFE8) and t.inkSoft (#B8B7B0) exactly in the dark render,
    and the mandated title format is used.'
  - Deterministic LCG-seeded data generation; no fetch/network calls; animation disabled
    per the mount-node contract.
  weaknesses:
  - 'CRITICAL dark-on-dark failure in the legend: pixel-sampling the dark render''s
    legend text (''No activity'', ''1-4'', ''5-6'', ''7+'') shows a dominant near-black
    fill (~rgb(0,0,0), 697 of the sampled non-background pixels) instead of the theme-adaptive
    t.inkSoft (#B8B7B0 / rgb(184,183,176)) that the title and axis tick labels correctly
    use elsewhere in the same render. The same near-black text also appears in the
    light render, so `legend.labels.color: t.inkSoft` is not being honored for the
    legend text at all (it works for `plugins.title.color` and `scales.*.ticks.color`,
    which sample correctly) -- something in the custom `generateLabels()` path or
    a later plugin/default is overriding the legend''s text fillStyle. Result: the
    legend is essentially unreadable in the dark render. Fix direction: confirm Chart.js
    is actually applying `options.plugins.legend.labels.color` when a custom `generateLabels`
    is supplied (in some Chart.js versions per-item label objects need their own color-adjacent
    field, or a later `ctx.fillStyle` reset elsewhere is winning); a minimal repro
    without the custom generateLabels would confirm whether the custom label objects
    are the cause.'
  - 'Canvas underutilization (VQ-05) is still present, just now symmetric instead
    of bottom-heavy: pixel-measured content (title through legend) spans only rows
    556-1229 of 1800 (37% of canvas height), with a 31% empty band above the title
    and a 32% empty band below the legend. The `compactGrid` afterLayout fix successfully
    closed the previous review''s ''legend isolated from grid'' gap (legend now sits
    ~24px under the grid), but it re-centers the same total amount of dead space rather
    than reducing it -- the actual 7-row grid itself still only occupies ~27% of the
    canvas height (rows ~660-1140). Fix direction: grow the grid itself (larger cells
    / more generous row height) to consume more of the reclaimed vertical space instead
    of only recentering the compact block, or increase title/legend font sizes and
    padding so the whole composition reads as intentionally spacious rather than a
    small island of content in a mostly-empty canvas.'
  - Because the legend text bug and the canvas dead-space both compound, the dark-theme
    render currently reads as broken (illegible legend) rather than merely under-styled
    -- this should be the top fix priority before any further layout polish.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (pixel-sampled corner: rgb(250,248,241)) -- not pure white, not dark.
      Chrome: Title "heatmap-calendar · javascript · chartjs · anyplot.ai" in dark ink, centered, clearly readable. Month labels (Jan-Dec) run along the top in medium-gray secondary text, evenly spaced and readable. Weekday labels (Mon-Sun) run down the left side in the same secondary ink, readable.
      Legend: Bottom-centered legend ("No activity" / "1-4" / "5-6" / "7+") with colored square swatches now sits close under the grid (previous review's "isolated legend" complaint is fixed). The legend text itself renders in near-black (pixel-sampled ~rgb(0,0,0)) rather than the expected t.inkSoft (#4A4A44); on the light background this still reads as legible dark text, so no visible defect here, but it confirms the color token isn't actually reaching the legend text (see dark render).
      Data: A 53-week x 7-weekday grid of square cells. First non-zero series color reads as brand green (#009E73) at low values, blending through teal toward blue (#4467A3) at higher values (sequential imprint_seq), with zero-activity cells rendered in a neutral muted gray. Weekday pattern is visible (weekends show more gray/no-activity cells than weekdays), plus a few brighter blue-violet "7+" outlier cells scattered through the year. Legend swatches for "1-4" and "5-6" are now visually distinct (subtle page-bg stroke sharpens the step), fixing the previous review's "hard to distinguish" complaint.
      Layout: Content (title through legend) occupies only rows 556-1229 of 1800px height (~37%), with a ~31% empty band above the title and ~32% empty band below the legend -- the 7-row grid itself is only ~27% of canvas height. Still a real layout defect, though the legend-to-grid gap specifically has been fixed.
      Legibility verdict: PASS (all text reads fine against the light background; the token-application bug is masked here because black-on-cream still has contrast).

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (pixel-sampled corner: rgb(26,26,23)) -- not pure black, not light.
      Chrome: Title and axis labels are correctly theme-adaptive -- pixel-sampled title text is rgb(240,239,232), an exact match for t.ink (#F0EFE8); month-label text is rgb(184,183,176), an exact match for t.inkSoft (#B8B7B0). No dark-on-dark issue for these elements.
      Legend: FAIL. Pixel-sampling the legend text region shows the dominant non-background, non-swatch color is near-black (~rgb(0,0,0), the single largest color cluster in the sampled area), not the expected t.inkSoft (#B8B7B0). Visually (zoomed native-resolution crop), "No activity", "1-4", "5-6", "7+" are barely distinguishable dark-gray-on-near-black -- a textbook dark-on-dark failure, and the single most common theme-adaptation bug this check exists to catch. The legend swatch colors and stroke are theme-correct; only the label text color is broken.
      Data: Identical cell colors to the light render (pixel-verified: same cell samples rgb(30,134,136) in web light and dark) -- confirms data colors are theme-independent, only chrome flips as required (except for the broken legend text).
      Layout: Same dead-space defect as the light render -- grid occupies a thin, now-centered band with large empty regions above and below.
      Legibility verdict: FAIL -- legend text is a dark-on-dark failure (near-black text on #1A1A17 background); title, month, and weekday labels all PASS.
