review:
  strengths:
  - Correct idiomatic workaround for chartjs's lack of a native calendar/matrix chart
    type — a `scatter` dataset with square point markers mapped to week/weekday coordinates
  - Sequential imprint_seq green→blue ramp correctly implemented with perceptual sqrt
    scaling, and quantile-derived legend bins that actually match the rendered color
    distribution
  - Fully theme-adaptive chrome (title, ticks, legend, muted no-activity anchor) with
    data colors identical between light and dark renders
  - Realistic, deterministic synthetic data (seeded LCG) showing believable weekday/weekend
    commit patterns plus occasional hackathon bursts
  - Custom legend generateLabels correctly sets legendItem.fontColor (not options.labels.color)
    so the theme-adaptive text actually renders instead of falling back to a near-black
    default
  weaknesses:
  - 'Row pitch vs. column pitch mismatch: weeks (columns) sit almost touching (~96%
    fill) while weekdays (rows) have large gaps (~36% fill) from the compactGrid plugin''s
    afterLayout stretch — the grid reads as loosely-spaced dashed rows rather than
    a cohesive calendar mosaic, making it harder to compare the same weekday across
    weeks. Bring the row pitch closer to the column pitch (e.g. cap the gridHeight
    growth nearer 1.3–1.5x the bare square height instead of up to 2.6x) rather than
    stretching gaps between otherwise fixed-size cells.'
  - The legend/color scale never states the unit (e.g. "Commits") — a viewer of the
    static PNG alone can't confirm what the 1–4 / 5–6 / 7+ bins are counting; only
    the interactive tooltip (invisible in the PNG) mentions "commits".
  - The compactGrid plugin reaches into Chart.js internal/private state to force a
    relayout (calling scale.configure() to invalidate cached _startPixel/_length,
    and mutating chart.chartArea / legend.top / legend.bottom directly) — this isn't
    part of the public API contract and is fragile against future Chart.js version
    bumps.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "heatmap-calendar · javascript · chartjs · anyplot.ai" in dark ink, month labels (Jan-Dec) along the top in secondary gray, weekday labels (Mon-Sun) down the left in secondary gray, legend below the grid with 4 swatches ("No activity" / "1–4" / "5–6" / "7+"). All text is clearly readable against the light background — no light-on-light issues.
      Data: 53 weekly columns x 7 weekday rows of square cells. Cells are gray ("no activity", concentrated on Sat/Sun), teal-green (low activity), teal-blue (mid activity), and a handful of blue/purple accent cells (bursts, e.g. one per ~47 days plus natural high-variance days). First bin above zero is teal-green, ramping toward blue for higher values — consistent with the imprint_seq sequential scale, not the categorical brand green.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title, month labels, and weekday labels now in light gray/off-white; legend swatches unchanged in hue, legend text light gray. All text is clearly readable against the dark background — no dark-on-dark failures.
      Data: Cell colors are pixel-identical to the light render (gray no-activity cells, teal-green low values, teal-blue mid values, blue/purple burst cells) — only the chrome (background, ticks, title, legend text) flips theme, exactly as required.
      Legibility verdict: PASS.
