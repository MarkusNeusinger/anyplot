review:
  strengths:
  - 'Clever plot-type workaround: builds a calendar heatmap on Chart.js''s scatter
    type using square point markers positioned by (week, weekday), since Chart.js
    has no native heatmap/matrix type.'
  - Sequential Imprint colormap (imprint_seq, green -> blue) correctly interpolated
    per-cell via colorForValue(), matching the spec's 'sequential colormap, light
    to dark for positive values' requirement.
  - 'Realistic, well-structured synthetic data: per-weekday baseline (busier weekdays,
    quieter weekends) plus periodic ''hackathon burst'' spikes gives genuine feature
    coverage (low/medium/high activity + zero-activity days), not a flat/uniform dataset.'
  - Zero-activity days correctly use the theme-adaptive MUTED semantic anchor rather
    than a categorical/sequential color, matching the style guide's semantic-anchor
    guidance.
  - Data-driven legend bins (quantile-based) accurately represent the actual color
    scale used in the cells rather than arbitrary fixed thresholds.
  - Deterministic LCG-seeded data generation; theme-correct backgrounds and text in
    both renders with identical data colors across light/dark.
  - Title format matches the mandated 'heatmap-calendar · javascript · chartjs · anyplot.ai'
    pattern.
  weaknesses:
  - 'Severe canvas underutilization (VQ-05): the 7-row calendar grid occupies only
    roughly the middle ~20% of the canvas height, with a huge empty band between the
    month labels and the first data row, and another huge empty band between the last
    data row and the legend. Root cause: the `compactRows` afterLayout plugin widens
    the y-axis domain (y.min/y.max) so that px-per-row equals px-per-week (giving
    square cells), but it does this by expanding the *value domain* to consume the
    full existing chartArea height rather than shrinking the chartArea itself — so
    the 7 real weekday rows end up compressed into a small fraction of a much taller
    (mostly empty) plotting area. Fix direction: instead of widening the y-domain
    to fill the existing chartArea, shrink the chartArea allocated to the scale (e.g.
    reserve fixed-height layout padding for the space above/below the grid so Chart.js
    only gives the y-axis the vertical pixels the 7 rows actually need), or accept
    non-square (rectangular) cells that stretch to fill the available height instead
    of forcing a square aspect that leaves dead space.'
  - 'Because the grid is squeezed into a thin horizontal band, the effect will be
    even worse at mobile width (~400px): the already-small activity squares will occupy
    only a sliver of the scaled-down image, making the core calendar-heatmap content
    hard to read exactly where it matters most (the data cells), while title/legend
    keep their proportionally readable size.'
  - The legend sits far below the grid with a large empty gap, reading as visually
    disconnected/isolated from the plot rather than 'near the plot' as the layout
    guidelines require.
  - The '1–4' and '5–6' legend swatches are close in hue (both teal-green) and can
    be hard to distinguish at a glance in the actual grid cells; consider stretching
    the imprint_seq interpolation range or adding a subtle stroke to sharpen the visual
    steps between bins.
  - The compactRows plugin (re-invoking scale.configure() mid-layout to move data)
    is a fairly intricate workaround; once the layout issue above is fixed by reserving
    space rather than stretching the domain, this can likely be simplified.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "heatmap-calendar · javascript · chartjs · anyplot.ai" in dark ink at top-center, clearly readable. Month labels (Jan-Dec) run along the top in medium-gray secondary text, evenly spaced and readable. Weekday labels (Mon-Sun) run down the left side in the same secondary ink, readable. A bottom-centered legend ("No activity" / "1-4" / "5-6" / "7+") with colored square swatches is present and readable.
      Data: A 53-week x 7-weekday grid of square cells. First non-zero series color reads as brand green (#009E73) at low values, blending through teal toward blue (#4467A3) at higher values (sequential imprint_seq), with zero-activity cells rendered in a neutral muted gray. Weekday pattern is visible (weekends show more gray/no-activity cells than weekdays), plus a few brighter blue-violet "7+" outlier cells scattered through the year.
      Layout defect: the grid itself is squeezed into a narrow horizontal band roughly in the lower-middle of the canvas — there is a very large empty gap between the month-label row and the first grid row, and another very large empty gap between the last grid row and the legend at the bottom. The plot's actual data ink fills well under 30% of the canvas height.
      Legibility verdict: PASS for text; FAIL for canvas/layout proportion (see VQ-05 in the score below) — all text is readable, but the huge dead space around a thin data band is a real layout defect.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, month labels, weekday labels, and legend, all now in light ink/secondary-light text against the dark background — no dark-on-dark text found anywhere; every label is clearly legible.
      Data: Identical cell colors to the light render (brand green -> teal -> blue sequential scale, muted-gray no-activity cells, occasional "7+" blue-violet outliers) — confirms data colors are theme-independent, only chrome flipped as required.
      Layout defect: identical to the light render — the grid occupies only a thin band in the lower-middle of the canvas with large empty regions above (below the month labels) and below (above the legend).
      Legibility verdict: PASS for text; FAIL for canvas/layout proportion (same VQ-05 issue as the light render).
