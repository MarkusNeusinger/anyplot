review:
  strengths:
  - 'Idiomatic ECharts calendar coordinate system: two stacked calendar instances
    (2023/2024) each paired with a heatmap series via calendarIndex, exactly the recommended
    pattern for this chart type.'
  - 'Correct Imprint theming throughout: continuous scale bound to t.seq, chrome (title,
    year/month/day labels, cell borders) sourced from t.ink/t.inkSoft/t.pageBg, backgrounds
    theme-correct in both renders with only chrome flipping.'
  - 'Thoughtful structural touches beyond the minimum: bold per-year title labels,
    cell borderColor set to the page background to visually separate the two calendar
    blocks, deterministic fixed-seed LCG data generation with a weekday bias (lower
    on Sat/Sun) that reads as plausible commit-activity data.'
  - 'Canvas and mount-node contract respected: animation disabled, no explicit width/height
    or devicePixelRatio passed to echarts.init, both PNGs land at the expected landscape
    size with comfortable margins and no clipped elements.'
  weaknesses:
  - The visualMap legend shows only numeric bounds ('0' / '8') with no unit/label
    (e.g. 'Commits') — a viewer without the title context can't tell what the color
    scale measures. Add a visualMap.text or a small axis label.
  - At the ~400px mobile thumbnail scale, the month/weekday tick labels and year labels
    become essentially illegible because two full years of daily cells are compressed
    into one row each — consider whether cell size / label font could scale better
    at small widths, or whether a shorter default time range would serve the mobile
    preview better.
  - Data storytelling is minimal — the chart is a raw two-year grid with no annotation,
    highlight, or callout drawing attention to the weekday-biased pattern or any streak,
    so there's no clear focal point guiding the viewer to the data's actual point
    (commit-activity habits).
  - Data generation uses three helper functions (nextRand, datesInYear, commitSeries)
    rather than flat inline code — reasonable for date arithmetic but a KISS deduction
    relative to the ideal of no functions.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), consistent across the whole canvas, not pure white.
      Chrome: Centered dark-ink title "heatmap-calendar · javascript · echarts · anyplot.ai" at top; bold dark "2023"/"2024" year labels; gray "Jan"-"Dec" month labels above each calendar block; gray "Mon"-"Sun" weekday row labels; horizontal visualMap legend at the bottom labeled "0" to "8" with a green-to-blue-purple gradient bar. All chrome text renders in dark ink/gray against the light background and is clearly legible.
      Data: Calendar cells for every day of 2023 and 2024 are filled with a continuous sequential palette running from bright green (low values) through teal to blue-purple (higher values), matching the Imprint imprint_seq scale. Cells have a thin off-white border separating them, consistent with the page background.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), consistent across the canvas, not pure black.
      Chrome: Same title, year, month, and weekday labels now rendered in white/light-gray ink; the visualMap legend labels ("0"/"8") are light-colored and clearly visible against the dark background. Cell borders are now dark, matching the dark page background, giving the same visual separation as in the light render.
      Data: The calendar cell colors are identical to the light render (same green-to-blue-purple sequential palette per cell) — only the chrome (background, text, borders) flipped, as required. No dark-on-dark or light-on-light failures observed; every label remains readable.
      Legibility verdict: PASS
