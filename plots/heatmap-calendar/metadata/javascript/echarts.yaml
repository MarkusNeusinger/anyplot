review:
  strengths:
  - 'Idiomatic ECharts calendar coordinate system: two stacked calendar instances
    (2023/2024) each paired with a heatmap series via calendarIndex, exactly the recommended
    pattern for this chart type.'
  - 'Correct Imprint theming throughout: continuous scale bound to t.seq (green->blue),
    chrome sourced from t.ink/t.inkSoft/t.pageBg, backgrounds theme-correct in both
    renders with only chrome flipping.'
  - 'Repair loop addressed both attempt-1 weaknesses well: the visualMap legend now
    carries a ''Commits per day'' unit caption, and a per-year ''busiest week'' amber-bordered
    highlight gives the chart a clear focal point and data story.'
  - Deterministic fixed-seed LCG data generation with a plausible weekday bias (lower
    weekend activity) plus a streak/rest cycle, giving the calendar visible day-to-day
    and week-to-week variation.
  - 'Canvas and mount-node contract respected: animation: false, no explicit width/height
    or devicePixelRatio, both PNGs land at 3200x1800 with comfortable margins and
    no clipped elements.'
  weaknesses:
  - At ~400px mobile thumbnail scale, the month/weekday/year labels become hard to
    read because two full years of daily cells are compressed into one row each per
    calendar -- inherent to the density of a 2-year calendar heatmap, but still a
    legibility cost.
  - Data generation and layout now rely on five helper functions (nextRand, datesInYear,
    commitSeries, busiestWeek, plus the inline fmt closure) rather than flatter inline
    code -- reasonable for the date arithmetic and week-max search involved, but a
    KISS deduction versus a flat imports/data/plot script.
  - Design Excellence is still closer to 'well-configured default plus one highlight'
    than genuinely distinctive -- the per-cell grid itself has no additional refinement
    (e.g. no subtle emphasis for weekends vs weekdays) beyond the single busiest-week
    callout.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 -- not pure white.
      Chrome: Centered dark-ink title "heatmap-calendar · javascript · echarts · anyplot.ai" at top; bold dark "2023"/"2024" year labels; gray "Jan"-"Dec" month labels above each calendar block; gray "Mon"-"Sun" weekday row labels (correctly starting the week at Monday per spec); amber "Busiest week: <date range>" callout per year; horizontal visualMap legend at the bottom labeled "0" to "8" with a "Commits per day" caption underneath. All text is clearly dark-on-light and readable.
      Data: Calendar cells for every day of 2023 and 2024 filled with a continuous sequential gradient from brand green (#009E73) through teal to blue (#4467A3) -- matches imprint_seq. The busiest week in each year is outlined with a thin amber (#DDCC77) border, standing out clearly from the unhighlighted cells.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 -- not pure black.
      Chrome: Same title, year, month, weekday labels and busiest-week callouts, now rendered in white/light-gray/amber against the dark surface; cell borders flip from off-white to near-black to match the page background; visualMap legend text and "Commits per day" caption are light-colored and clearly visible.
      Data: Cell colors are identical to the light render (green-to-blue gradient, same busiest-week amber border) -- only chrome flipped as required. No dark-on-dark or light-on-light failures observed anywhere (title, year labels, month/weekday labels, legend text, and callouts all remain legible).
      Legibility verdict: PASS.
