review:
  strengths:
  - Correctly uses imprint_seq (green→blue) for the continuous visits-per-day scale,
    computed via manual RGB interpolation since the core Highcharts bundle has no
    colorAxis/heatmap module — a well-documented, spec-compliant workaround.
  - Weekday pattern (weekday busier than weekend), seasonal drift, and the August
    data-collection outage are all immediately visible at a glance, giving the calendar
    genuine storytelling value.
  - 'Theme-adaptive chrome is threaded through correctly: transparent chart background
    over the page surface, ink/inkSoft tokens for title/subtitle/labels, and the ''No
    data'' cells use the theme grid token so they read as neutral gray in both themes.'
  - 'Spec features are all present: Mon-Sun weekday rows on the y-axis, month labels
    along the top, sequential low-to-high coloring, gracefully handled missing dates,
    and a color-scale legend.'
  - Deterministic LCG-seeded data generation, clean KISS-ish script structure, exact
    mandated title string.
  weaknesses:
  - 'Library Mastery is generic: the calendar is built from a plain scatter series
    with square markers rather than any Highcharts-distinctive mechanism (e.g. leveraging
    colorAxis-style legend semantics, dataLabels, or point-level styling patterns)
    — this exact visual could be replicated with near-identical code in any library
    that supports a scatter/square-marker primitive. Given the core-bundle heatmap-module
    restriction this is understandable, but nothing in the implementation reaches
    for what Highcharts specifically offers beyond that baseline.'
  - 'Layout has uneven whitespace distribution: there''s a large gap between the month-label
    row and the first weekday row, and another sizeable gap between the last weekday
    row and the legend, while the calendar band itself is vertically loose (row height
    much greater than the cell size). Tightening these gaps would make better use
    of the landscape canvas and read as more intentional.'
  - The color-scale legend is 4 discrete swatches standing in for what the spec calls
    a 'color scale legend' — a reasonable workaround given the missing colorAxis module,
    but a continuous-looking gradient bar (e.g. many thin adjacent swatches) would
    communicate the scale more faithfully than 4 sparse bins.
  - 'Design Excellence is solid but not exceptional: the plot works and is legible
    but doesn''t yet reach ''publication ready'' — e.g. no emphasis/annotation calling
    out the outage or the highest-traffic day beyond the subtitle text, and the row
    spacing gives it a slightly plain, evenly-gridded look rather than a refined calendar
    composition.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "heatmap-calendar · javascript · highcharts · anyplot.ai" top-left, dark-gray subtitle below it explaining the outage gap. Month labels (Jan-Dec) run along the top in medium gray; weekday labels (Mon-Sun) run down the left side in the same gray. Legend at bottom-left ("Visits / day" title, "No data" gray swatch + 4 numeric color swatches). All text is clearly dark-on-light and fully readable.
      Data: 52-53 columns of square cells per weekday row, colored from bright green (low visits) through teal to blue (high visits) — matches the imprint_seq gradient (#009E73 → #4467A3). A visible light-gray gap of ~12 cells in mid-August (two per row) shows the outage. Weekend rows (Sat/Sun) read visibly greener/lower than weekday rows, and a broader seasonal swing is visible across the year.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title/subtitle now in light cream text, clearly legible against the dark surface. Month and weekday labels are light gray, fully readable. Legend text is light-colored and legible. "No data" cells render as a slightly lighter charcoal gray, distinguishable from the background without being jarring.
      Data: Cell colors are pixel-identical to the light render (bright green → teal → blue gradient), confirming the data-color/chrome separation. No dark-on-dark or light-on-light failures detected anywhere — title, subtitle, axis labels, and legend text all have strong contrast against the near-black background.
      Legibility verdict: PASS.
