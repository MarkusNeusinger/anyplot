review:
  strengths:
  - Vertical calendar band is now tight (MARGIN_TOP=110, BAND_HEIGHT=210) so the month
    header, weekday rows, and legend sit close together, resolving the attempt-1 complaint
    about uneven internal gaps
  - Color-scale legend is now a continuous linear-gradient bar (imprint_seq stops)
    with min/max value labels, replacing the sparse 4-swatch legend from attempt 1
    and reading as a real continuous scale
  - New chart.renderer.label(...,'callout',...) peak-day annotation with a leader
    line is genuinely Highcharts-specific (the built-in 'callout' shape + anchorX/anchorY
    leader-line idiom), directly addressing the attempt-1 Library Mastery weakness
  - The post-render callback (third argument to Highcharts.chart) used to draw the
    gradient legend and callout is itself an idiomatic Highcharts pattern for custom
    SVG chrome, not a generic overlay hack
  - Weekday pattern, seasonal drift, and the August outage gap remain immediately
    visible through color and layout; data colors are pixel-identical between light
    and dark renders
  - Theme-adaptive chrome (transparent background, ink/inkSoft tokens, theme-adaptive
    'No data' cells) and all spec-required features (Mon-Sun rows, month labels, sequential
    colormap, missing-date handling, legend) remain correct
  - Deterministic LCG-seeded data, clean structure, exact mandated title string
  weaknesses:
  - 'Canvas utilization is still weak: tightening the band (fixing the attempt-1 internal-gap
    complaint) shifted the wasted space rather than removing it — the calendar, legend,
    and title now cluster in roughly the top 40-45% of the 3200x1800 canvas, leaving
    a large flat empty region below the legend down to the bottom edge. Increase marker
    radius / cell pitch and BAND_HEIGHT (or grow MARGIN_TOP moderately and shrink
    MARGIN_BOTTOM) so the plot content fills closer to 50-80% of the canvas as required
    by VQ-05'
  - The core mechanism is still a scatter series with square markers standing in for
    a heatmap (unavoidable given the core-bundle module restriction, documented in
    comments) — Library Mastery improved via the renderer-based gradient legend and
    callout but the primary chart body itself remains a generic scatter primitive
  - 'Design Excellence is solid but not exceptional: composition still reads as somewhat
    plain given how much of the canvas is unused; consider filling the extra vertical
    space with larger cells, more breathing room around the legend, or a secondary
    visual element instead of leaving it blank'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (not pure white, not dark).
      Chrome: Bold dark title "heatmap-calendar · javascript · highcharts · anyplot.ai" top-left with a dark-gray subtitle below it explaining the August outage gap. Month labels (Jan-Dec) run along the top of the grid; weekday labels (Mon-Sun) run down the left side, both in medium gray. All fully legible against the light background.
      Data: 52-53 columns of square cells per weekday row, colored on the imprint_seq gradient from bright green (low visits) through teal to blue (high visits). A ~12-cell light-gray gap in mid-August shows the outage, matching the "No data" legend swatch. A "Peak: 480 visits (2023-01-12)" callout box with a leader line points to the peak cell in early January. Below the grid, a continuous gradient legend bar ("Visits / day", green-to-blue, labeled 67 and 480) plus the "No data" swatch explain the scale. First-series intent (#009E73-adjacent green) anchors the low end of the gradient as expected.
      Legibility verdict: PASS — all text (title, subtitle, month/weekday labels, legend labels, callout text) is clearly dark-on-light and readable.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (not pure black, not light).
      Chrome: Same title/subtitle now rendered in light cream text, fully legible. Month and weekday labels are light gray and readable. The peak-day callout box uses a dark elevated-surface fill with light text and a soft border, readable against the dark background. No dark-on-dark text was found anywhere.
      Data: Cell colors are pixel-identical to the light render (green through teal to blue), confirming only chrome flipped. The "No data" outage cells render as a slightly lighter charcoal gray, clearly distinguishable from the near-black page background and from the data cells.
      Legibility verdict: PASS — no dark-on-dark or light-on-light failures found; all chrome is theme-correct.
