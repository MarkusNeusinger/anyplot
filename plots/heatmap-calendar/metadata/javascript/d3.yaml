review:
  strengths:
  - Clean, idiomatic D3 join pattern (`selectAll(...).data(...).join("rect")`) with
    a deterministic fixed-seed LCG for reproducible data since the browser has no
    seeded RNG.
  - Correct Imprint `imprint_seq` sequential scale (brand green → blue via `d3.interpolateRgbBasis(t.seq)`),
    with a legend gradient bar built by sampling the actual color scale rather than
    a separate hardcoded gradient — colors stay perfectly in sync.
  - 'Thoughtful missing-data handling: dashed-border neutral cells for gaps, documented
    with a dedicated "No data" legend swatch, and multiple realistic gap patterns
    (a multi-day range plus isolated single-day gaps).'
  - Realistic, neutral dataset (daily step count in thousands) with a believable seasonal
    curve and weekday/weekend variation.
  - Full theme-adaptive chrome — identical data colors between light/dark renders,
    all text legible on both surfaces, no dark-on-dark or light-on-light failures.
  weaknesses:
  - 'Severe unused whitespace: the calendar grid + legend content ends at y≈697 of
    the 1800px-tall canvas (~39% of height), leaving roughly 60% of the canvas as
    a completely empty band at the bottom with no visual content and no counterbalancing
    whitespace above. Increase `step`/`cellSize` (or scale up margins/legend size
    proportionally) so the composition fills closer to the recommended 50-80% of canvas
    height, or otherwise re-balance vertical whitespace instead of leaving it all
    on one side.'
  - 'Library Mastery is fairly generic for D3: the grid uses manual date-arithmetic
    loops instead of D3-idiomatic date/time utilities (e.g. `d3.utcParse`/`d3.timeFormat`,
    `d3.timeDays`/`d3.timeWeek` for calendar layout) that would better showcase D3''s
    distinctive time-scale/time-interval features.'
  - Data Storytelling is present via the color gradient (seasonal + weekday/weekend
    pattern) but there is no explicit visual emphasis (e.g., a subtle annotation or
    highlighted band) drawing the eye to the clearest seasonal peak — a missed opportunity
    for a stronger focal point given the generous canvas space available.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "heatmap-calendar · javascript · d3 · anyplot.ai" in bold dark ink, subtitle "Daily step count (thousands) · 2025" in softer dark gray directly below. Month labels (Jan-Dec) run along the top of the grid in medium-weight dark-gray text; weekday labels (Mon-Sun) run down the left side in the same tone. Legend row below the grid shows a dashed-border "No data" swatch on the left and a green→blue gradient bar with "Less"/"More" labels on the right. All text is clearly legible against the light background — no light-on-light issues.
      Data: 53×7 grid of rounded-rect cells colored on a green(#009E73)→blue sequential scale by step-count value; a handful of cells (a run in mid-April, plus isolated days in Jan/Sep/Nov) render as dashed-border neutral "no data" cells instead. First-series brand green appears at the low end of the scale as expected.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title/subtitle/month/weekday layout, now rendered in light ink (near-white title, softer light-gray subtitle/labels/legend text) against the dark background. No dark-on-dark failures — every text element is clearly visible.
      Data: Same 53×7 grid with identical green→blue cell colors as the light render (confirmed pixel-for-pixel matching hues); missing-data cells show a dashed border in the theme-adaptive grid tone against the elevated dark-bg fill, clearly distinguishable from filled cells.
      Legibility verdict: PASS

    Shared observation (both renders): the grid + legend content occupies only the top ~39% of the 1800px canvas height; the bottom ~60% of the canvas is empty with no counterbalancing whitespace above — flagged as the primary VQ-05/DE-02 weakness in both themes.
