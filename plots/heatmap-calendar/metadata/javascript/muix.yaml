review:
  strengths:
  - Creative custom calendar-cell renderer (slots.scatter override with a SquareCell
    component) produces genuine rounded-rect GitHub-style contribution cells instead
    of default scatter circles — strong, distinctive MUI X usage.
  - 'Clever dual band-axis trick: two x-axis definitions sharing the same week-index
    data, with topAxis="month" driving month section headers while the primary "week"
    axis positions the grid — avoids any manual layout math.'
  - Correct sequential Imprint colormap (t.seq[0] to t.seq[1], brand green to blue)
    applied to the single-polarity commit-count data via zAxis.colorMap, paired with
    a ContinuousColorLegend showing the 0-max range.
  - 'Realistic, varied daily-activity data: distinct weekday/weekend rhythm, deterministic
    release-day spikes, and a 9-day vacation gap that is genuinely omitted from the
    points array (not drawn as a neutral cell) — a clean demonstration of "missing
    dates handled gracefully."'
  - Deterministic LCG-seeded data generation, clean minimal code, no fake interactivity,
    skipAnimation set correctly.
  weaknesses:
  - At the ~400px mobile preview width, the weekday and month labels shrink to the
    point of being hard to read — increase tickLabelStyle fontSize slightly and/or
    widen categoryGapRatio so labels hold up better at mobile scale.
  - The ContinuousColorLegend shows only the bare numeric range "0"-"28" with no accompanying
    label (e.g. "Commits per day") — a first-time viewer has no way to know what the
    color scale measures. Add a text label near the legend.
  - Noticeable, slightly asymmetric whitespace above the grid (title-to-grid gap)
    versus below the legend, since the calendar+legend block is vertically centered
    in a taller mount than it needs — tighten TOP_MARGIN / GRID_HEIGHT or reduce the
    centering gap so the composition fills the canvas more tightly.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "heatmap-calendar · javascript · muix · anyplot.ai" centered at top in dark ink, clearly legible. Month labels (Jan-Dec) run along the top of the grid as section headers, weekday labels (Mon-Sun) run down the left as row labels — both in a softer dark-gray ink, all readable at full resolution. A horizontal ContinuousColorLegend sits bottom-right with a green-to-blue gradient bar and "0" / "28" numeric endpoints, no accompanying units label.
      Data: 53 weeks x 7 weekdays of rounded-rectangle "day" cells. Low-value cells render in brand green (#009E73-ish), high-value cells shift toward blue (~#4467A3), matching the Imprint sequential colormap. A ~9-day gap in early August (missing vacation days) appears as a genuine blank column, not a neutral-colored cell. Weekday/weekend rhythm and occasional bright "spike" cells (release days) are clearly visible.
      Legibility verdict: PASS (title, axis labels, and legend numbers are all readable against the light background; legend lacks a units label but that is a content gap, not a legibility failure).

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, month labels, and weekday labels now rendered in light ink (off-white/soft gray), clearly legible against the dark background — no dark-on-dark failures observed. Legend bar and "0"/"28" labels also correctly flipped to light text.
      Data: Cell colors are identical to the light render — same green-to-blue gradient, same vacation gap, same spike pattern — confirming only chrome (background + text) flipped between themes, not the data-encoding colors.
      Legibility verdict: PASS (all title/axis/legend text is clearly readable against the dark background; no dark-on-dark or light-on-light issues in either theme).
