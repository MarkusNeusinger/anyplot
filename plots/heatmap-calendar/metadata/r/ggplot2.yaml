review:
  strengths:
  - 'Correct GitHub-style calendar heatmap layout: weeks as columns, weekdays (Mon-Sun)
    as rows, months as facet sections - matches the spec''s explicit ''GitHub-style
    contribution graph'' application'
  - 'All required spec features present: weekday labels on y-axis, month header strips,
    sequential colorbar legend, and graceful handling of missing dates via distinct
    muted-gray cells'
  - 'Correct imprint_seq gradient (#009E73 to #4467A3) for single-polarity commit-count
    data, with theme-adaptive chrome (background, strip fills, text) correctly flipped
    in both light and dark renders and no edge clipping'
  - 'Realistic, well-varied synthetic data: seasonal upward trend toward year-end,
    lower weekend activity, and a small percentage of missing-tracker days'
  - Clean, reproducible KISS-structured code with set.seed(42), explicit theme font
    sizes, and correct ragg::agg_png output naming
  weaknesses:
  - No x/y axis titles at all (labs(x = NULL, y = NULL)), and the legend title 'Commits'
    lacks a unit qualifier (e.g. 'Commits (count)') - VQ-06 wants at least a descriptive/units-bearing
    label somewhere in the value encoding
  - 'Design Excellence and Library Mastery are solid but not exceptional: no explicit
    visual emphasis (e.g. highlighting the busiest month/streak) beyond the color
    gradient itself, and no ggplot2-distinctive feature beyond standard facet_wrap
    + guide_colorbar that couldn''t be replicated easily in another library'
  - Title/typography hierarchy is fairly flat (title at 12pt, strip text at 9pt) -
    a touch more contrast between title and strip weights would sharpen the visual
    hierarchy
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 - not pure white.
      Chrome: Title "heatmap-calendar · r · ggplot2 · anyplot.ai" in dark ink, fully visible at top with no clipping. 12 month facets (Jan-Dec) arranged 3 rows x 4 columns, each with a bold dark-ink label on a subtly elevated cream strip background. Weekday labels (Mon-Sun) in soft dark-gray on the y-axis of each facet, clearly legible. Bottom colorbar legend "Commits" with ticks at 0/5/10/15, dark ink text, well separated from the bar itself with no overlap.
      Data: Tile grid per month, color = commits, gradient running from brand green (#009E73, low values) through teal to blue (#4467A3, high values). A handful of gray tiles mark missing-tracker days (na.value = INK_MUTED), clearly distinguishable from the green-blue gradient. First-series green confirmed at the low end of the continuous scale.
      Legibility verdict: PASS - all title, strip, weekday, and legend text reads clearly against the light background; no light-on-light text found.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 - not pure black.
      Chrome: Same title, now in light/cream ink, fully visible and uncut. Month strips use a dark elevated background (#242420) with light bold text, clearly distinct from the page background. Weekday labels render in light gray, legible against the dark surface. Colorbar legend "Commits" and its 0/5/10/15 ticks render in light gray/cream, easily readable.
      Data: Tile colors are pixel-identical to the light render (green-to-blue gradient, gray NA cells) - only the chrome (background, strip fills, text) flipped, exactly as required.
      Legibility verdict: PASS - no dark-on-dark failures observed; every title, strip, axis, and legend text element is clearly legible against the dark background.
