review:
  strengths:
  - 'Correct Imprint continuous colormap: imprint_seq (brand green -> blue) built
    via the canonical 256-stop _lerp_hex ramp, matching the single-polarity nature
    of contribution counts'
  - 'Theme chrome fully threaded through: background, title, axis labels, tick labels,
    outline, and ColorBar all branch on ANYPLOT_THEME with correct tokens in both
    renders'
  - Peak-day focal point (outline-only rect on the max-value cell) is a genuine data-storytelling
    touch that doesn't fake interactivity
  - Subtle month-divider Span lines (alpha 0.25) give calendar structure without adding
    a competing grid
  - GitHub-style weekday ordering (Mon top -> Sun bottom) and month labels placed
    'above' via a second LinearAxis is idiomatic, low-level bokeh layout composition
  - 'Realistic, varied synthetic data: weekday/weekend base-rate difference, occasional
    streak spikes, and occasional zero days give genuine feature coverage'
  - All font sizes explicitly set (title 50pt, axis labels 42pt, tick/colorbar labels
    34pt) per the bokeh native-pixel sizing guide
  - 'Clean KISS structure: single top-to-bottom script, np.random.seed(42), only used
    imports, HoverTool tooltips add real interactive value without being required
    by the PNG'
  weaknesses:
  - 'Canvas utilization is moderate (~48%) rather than optimal 50-80%: the 3200x1800
    landscape canvas has noticeable unused whitespace above/below the 7-row weekday
    grid — consider trimming min_border_top/min_border_bottom slightly or enlarging
    cell height to fill more of the vertical space'
  - 'Design Excellence is solid but stops short of publication-grade: the peak-day
    highlight and month dividers are good but the overall composition still reads
    as ''a well-executed default heatmap'' rather than a fully art-directed graphic
    — consider adding a brief data-driven subtitle or refining the ColorBar''s proportions/placement
    for more intentional hierarchy'
  - 'Library Mastery is correct and idiomatic but not maximally distinctive: HoverTool,
    ColorBar, and FixedTicker are common across interactive libraries; leaning further
    into bokeh-only capabilities (e.g. CustomJS-driven linked highlighting, categorical
    range factors) would raise LM-02'
  - Colorbar title 'Contributions' is descriptive but has no explicit unit/context
    beyond the axis label; a slightly more specific label (e.g. 'Contributions (count)')
    would nudge VQ-06 to a cleaner 'with units' read
