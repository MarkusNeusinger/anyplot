review:
  strengths:
  - 'Theme-adaptive chrome is threaded correctly end to end: PAGE_BG/ELEVATED_BG/INK/INK_SOFT
    tokens drive plot background, panel background, legend background and all text
    colors, and both renders pass the light/dark legibility check with no dark-on-dark
    or light-on-light failures.'
  - Zero-contribution days are mapped to NA with na_value=PAGE_BG and geom_tile(color=PAGE_BG),
    so empty days blend seamlessly into the panel background in both themes (verified
    by pixel sampling) — a clean GitHub-style calendar look instead of a jarring placeholder
    color.
  - 'Continuous color scale correctly uses the Imprint imprint_seq stops (#009E73
    -> #4467A3) via scale_fill_gradient, identical between light and dark renders
    — only chrome flips, exactly as required.'
  - Deliberate seasonal + weekday data pattern (1.5x boost in Mar/Apr/Sep/Oct, 0.5x
    dip in Jul/Aug, weekday-vs-weekend contrast, 15% random zero days) gives the heatmap
    genuine visual hierarchy and a real story instead of flat noise.
  - Title matches the mandated 'heatmap-calendar · python · plotnine · anyplot.ai'
    format exactly, and canvas is exactly 3200x1800 (landscape target, gate passed).
  - 'Idiomatic ggplot grammar: geom_tile + a second geom_text layer with inherit_aes=False
    for month headers, categorical y-scale reversal to put Monday at the top — clean
    layered composition rather than post-hoc matplotlib patching.'
  weaknesses:
  - 'LM-02: distinctive plotnine/grammar-of-graphics features are used competently
    (layer composition, NA handling, categorical reversal) but nothing library-uniquely
    showcase-worthy beyond that (e.g. no coord_flip, facet, or stat layer) — a bit
    more of plotnine''s distinctive toolkit would lift this further.'
  - 'DE-03: the spring/fall vs. summer seasonal contrast is present but fairly subtle
    at a glance — a slightly wider low/high value spread between quiet and busy months
    would make the visual focal point read faster.'
  - The spec's 'handle missing dates gracefully' is satisfied in spirit (zero-value
    days render as neutral/empty cells) but the dataset itself has no literal date
    gaps (continuous date_range for the full year) — a future iteration could drop
    a handful of dates entirely to also demonstrate true missing-date handling, not
    just zero-value handling.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), sampled pixel value (250,248,241) — matches the required light page background exactly.
      Chrome: Bold dark title "heatmap-calendar · python · plotnine · anyplot.ai" centered at top, clearly readable. Month labels (Jan-Dec) run along the top of the grid in soft ink-gray. Weekday labels (Mon-Sun, top to bottom) sit on the left in soft ink-gray. "Contributions" legend with 5/10/15 tick labels sits at the right. All chrome text is dark-on-light and legible.
      Data: A calendar grid of tiles, one column per week, one row per weekday, spanning Jan-Dec 2024. Filled cells run from brand green (#009E73, low values) through teal to blue (#4467A3, high values) — a sequential imprint_seq gradient. Zero-value days are invisible (blended into the page background) rather than drawn as a jarring placeholder. Visible seasonal pattern: denser/bluer clusters in Mar/Apr and Sep/Oct, sparser and lighter in Jul/Aug, and lighter weekend rows (Sat/Sun) vs. weekdays.
      Legibility verdict: PASS — no light-on-light text, no unreadable elements, no clipping at any edge.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), sampled pixel value (26,26,23) — matches the required dark page background exactly.
      Chrome: Same title, month labels, weekday labels, and "Contributions" legend, now rendered in light ink-gray/white against the dark background — all clearly legible, no dark-on-dark failures detected anywhere (title, axis text, legend text and ticks all checked).
      Data: Pixel sampling confirms the filled-tile colors are byte-identical to the light render (e.g. (0,158,115), (24,138,132), (53,115,153) appear in both images) — only the chrome (background/text) flips between themes, exactly as required. Zero-value days again blend fully into the dark panel background (sampled as the same (26,26,23) as the surrounding chrome) rather than reading as a false "hole."
      Legibility verdict: PASS — no dark-on-dark text, all chrome and data clearly distinguishable from the background, no clipping at any edge.
