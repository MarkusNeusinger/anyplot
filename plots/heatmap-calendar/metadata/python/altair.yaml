review:
  strengths:
  - 'Sequential Imprint palette (#009E73 → #4467A3 / imprint_seq) is used correctly
    for the continuous contribution values, and the data colors are pixel-identical
    between the light and dark renders.'
  - 'Peak-day highlight (outlined ring) combined with the subtitle callout (''Outlined
    cell marks the busiest day: Mar 26 (13 contributions)'') creates a genuine focal
    point instead of a raw data dump.'
  - Theme-adaptive chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT) are threaded
    through configure_view/configure_axis/configure_title/configure_legend, so both
    renders are fully readable with no dark-on-dark or light-on-light failures.
  - 'All specification features are present: Mon-Sun weekday labels on the y-axis,
    month section headers along the top, a color-scale legend, and a full year of
    daily data.'
  - Idiomatic Altair composition via alt.layer() (heatmap rects + month text + highlight
    ring) with explicit font sizes set on every text element.
  weaknesses:
  - cornerRadius=3 on ~366 tightly-packed, touching mark_rect cells produces small
    diamond-shaped gaps of page background at every 4-cell corner intersection across
    the whole grid, visible as a distracting cross-hatch pattern in both renders —
    set cornerRadius=0 for the calendar cells, or add a small gap between cells (e.g.
    via band-scale padding) so rounded corners don't collide.
  - Both x and y axis titles are left empty (title=''); the layout is self-explanatory
    via weekday/month labels, but a minimal descriptive axis title would fully satisfy
    VQ-06 rather than relying only on tick labels and the legend title.
  - The dataset covers all 366 days of 2024 with no gaps, so the specification's 'handle
    missing dates gracefully with neutral or empty cells' requirement is never actually
    exercised — introducing a few missing days would demonstrate that feature.
  - 'Design Excellence reads as solid-but-default rather than fully polished: beyond
    the single peak-day annotation there is no further visual hierarchy, and the corner-radius
    artifact above keeps the visual refinement score down.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (not pure white).
      Chrome: Bold dark title top-left ("Daily Contributions 2024 · heatmap-calendar · python · altair · anyplot.ai"), gray subtitle below it calling out the peak day. Weekday labels (Mon-Sun) run down the left in dark-gray. Bold dark month abbreviations (Jan-Dec) sit above the grid marking month boundaries. A bordered legend box ("Contributions", values 0/5/10/15) sits to the right of the grid. All chrome text renders dark-on-cream and is clearly legible.
      Data: Grid of ~366 rounded-corner cells (7 rows x ~53 week-columns) colored from vivid green (low values) through teal to blue (high values, up to 15). The single busiest day (late March, Tue row) has a dark outlined ring around its cell. First-series/low-end color is #009E73 as required.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (not pure black).
      Chrome: Same layout as light — title and subtitle now render in light/white and light-gray tones, weekday and month labels are light-toned, and the legend box uses a dark elevated fill with light text/border. No dark-on-dark or unreadable elements observed anywhere.
      Data: Green-to-blue cell colors are identical to the light render (confirmed same #009E73 → #4467A3 range and same value-to-color mapping). The peak-day highlight ring is now a light stroke, still clearly visible against its darker cell.
      Legibility verdict: PASS
