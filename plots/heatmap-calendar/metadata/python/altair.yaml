    between light and dark renders — only chrome (background, title, ticks, legend)
    flips per theme.'
  - Bold month labels (Jan–Dec) stay clearly legible in bold high-contrast ink against
    every underlying cell color (green through blue) in both themes — verified via
    pixel crop, no dark-on-dark or light-on-light failures.
  - 'Peak-day highlight ring plus subtitle callout (''Outlined cell marks the busiest
    day: Mar 26 (13 contributions)'') gives the chart a genuine focal point instead
    of a flat data dump.'
  - Idiomatic Altair layered composition (`alt.layer(heatmap, month_text, peak_highlight)`)
    with explicit font sizes on every text mark and theme tokens threaded through
    configure_view/axis/title/legend.
  - Canvas lands exactly on the 3200×1800 landscape target with no cropping; all-four-spines
    frame is the correct exception for an enclosed calendar grid.
  weaknesses:
  - X-axis title is still left empty (title=""); acceptable since month labels serve
    that role, but a minimal label (e.g. 'Week') would round out VQ-06 fully.
  - Month labels are overlaid directly on top of the Monday row's data cells rather
    than sitting in dedicated whitespace above the grid — legible in every sampled
    case here, but a design choice with less margin for error if a future data run
    produced very light cell colors.
