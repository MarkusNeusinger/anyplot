    tokens for proper light/dark adaptation
  - 'linecolor=white is hardcoded — in dark render creates harsh high-contrast white
    grid lines and near-zero cells appear as jarring bright-white patches; fix: use
    adaptive linecolor token (PAGE_BG) for invisible cell separators'
  - Title code mismatch — ax.set_title(...pyplots.ai...) must be changed to anyplot.ai
  - Stats annotation overlaps x-axis month tick labels — reposition or adjust layout
    padding to prevent overlap
