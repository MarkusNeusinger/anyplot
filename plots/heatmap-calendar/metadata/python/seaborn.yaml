    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 -- not pure white.
      Chrome: Title "heatmap-calendar · python · seaborn · anyplot.ai" centered at top in dark ink. Month labels (Jan-Dec) run along the top of the grid; weekday labels (Mon-Sun) run down the left side. A vertical colorbar labeled "Daily Contributions" sits to the right of the grid. All chrome text is clearly readable against the light background. NOTE: the code's `fig.text(...)` "Peak day: {date} · {value} contributions" callout (positioned between the title and month-label row) and the `ax.plot(..., marker='o')` ring meant to circle the peak cell are BOTH ABSENT from this render -- confirmed via pixel-level scan (no non-background pixels between the title and month row; no ink-colored ring pixels anywhere on the grid).
