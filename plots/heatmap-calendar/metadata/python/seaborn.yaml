review:
  strengths:
  - Correct use of the Imprint sequential colormap (imprint_seq, brand green -> blue)
    for single-polarity daily contribution counts, identical data colors in both themes
  - 'Theme-adaptive chrome fully threaded through: figure/axes background, tick colors,
    colorbar outline and label, title all correctly flip between #FAF8F1/#1A1A17 light/dark
    surfaces'
  - Partial last week of the year (2024 ends on a Tuesday) is left as blank/background
    cells rather than forced data, gracefully satisfying the spec's 'handle missing
    dates gracefully' requirement without any special-case code
  - Cell borders drawn in the page-background color so gaps read as clean 'punched
    out' separation instead of a harsh fixed gridline color
  - Realistic, neutral GitHub-style contribution data with weekday/weekend contrast,
    zero-activity days, and occasional high-activity spikes up to the vmax=15 cap
  - Clean KISS script structure with seeded random data, only used imports, and correct
    plt.savefig call (no bbox_inches='tight')
  weaknesses:
  - 'Design Excellence is at ''well-configured default'' level: beyond the required
    imprint_seq cmap and punched-out grid, there''s no additional polish (e.g., tighter
    colorbar integration, refined spine/frame treatment) that would push this into
    publication-ready territory'
  - No visual emphasis or callout highlights the data's actual story (e.g., the single
    highest-activity day, or the weekday-vs-weekend contrast) - the pattern is present
    in the data but the viewer has to find it unaided
  - 'Layout margins are imbalanced: there is a large blank strip (~450px, ~14% of
    canvas width) to the right of the colorbar with nothing in it, while the left
    side is tightly used by weekday labels - tighten fig.subplots_adjust(right=...)
    or widen the colorbar/its label to use that space'
  - Library Mastery is generic pivot-table + sns.heatmap usage; no seaborn-distinctive
    feature (e.g., clustermap, mask parameter for explicit missing-data styling, or
    annotate for the sparse high-value cells) is leveraged to distinguish it from
    a manual matplotlib grid
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 - not pure white.
      Chrome: Title "heatmap-calendar · python · seaborn · anyplot.ai" centered at top in dark ink, month labels (Jan-Dec) along the top of the grid in soft dark gray, weekday labels (Mon-Sun) along the left in soft dark gray, colorbar on the right labeled "Daily Contributions" with dark tick labels. All fully legible.
      Data: 52-week x 7-day grid of cells colored from the Imprint sequential colormap - brand green (#009E73) for low/zero-activity days grading to blue (#4467A3) for high-activity days (up to 15). Weekend rows (Sat/Sun) are visibly more uniformly green (lower activity) than weekday rows, which show more teal/blue variation. The final week of the year (ends on a Tuesday) correctly leaves Wed-Sun cells blank/background-colored rather than showing fabricated data.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 - not pure black.
      Chrome: Same title, month labels, weekday labels, and colorbar, all re-rendered in light ink (#F0EFE8) / soft light gray (#B8B7B0) tick and label colors. No dark-on-dark text anywhere - every label is clearly legible against the near-black surface.
      Data: Identical cell colors to the light render (same green-to-blue imprint_seq gradient, same weekday/weekend contrast, same partial last week). Cell border gaps read as thin near-black separators instead of off-white, consistent with linecolor=PAGE_BG.
      Legibility verdict: PASS
