    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title, now rendered in light ink (#F0EFE8), fully readable. Month and weekday labels in light gray (#B8B7B0), fully legible. Colorbar and its "Daily Commits" label/ticks also rendered in light gray, readable against the dark surface.
      Data: Identical green-to-blue gradient and identical cell values/positions as the light render — same August vacation gap, same March deadline spike in dark blue. Confirms the Imprint data colors are constant across themes; only chrome (background + text) flipped.
      Legibility verdict: PASS — no dark-on-dark failures; all text remains clearly visible against the near-black surface, and the brand green is still vivid on this background.
