review:
  strengths:
  - 'Correct GitHub-style calendar layout: weekdays (Mon-Sun) on the y-axis, month
    labels along the top, weeks as columns — matches the spec''s Notes exactly'
  - Uses imprint_seq (brand green -> blue) sequential colormap exactly as specified
    in the style guide, identical data colors across both themes
  - Missing/zero-activity days rendered as true empty cells via NaN + cmap.set_bad(PAGE_BG),
    so the August vacation gap reads as a clear visual gap rather than a low-value
    cell
  - 'Realistic, vectorized synthetic data: weekday-biased baseline activity, a two-week
    vacation dip, and a late-March deadline spike give the heatmap genuine feature
    variety'
  - Clean, fully vectorized KISS structure with np.random.seed(42), no manual loops
    for the grid construction, and all imports used
  - 'Both renders are fully theme-correct: warm off-white / near-black backgrounds,
    all chrome (title, tick labels, colorbar) uses theme-adaptive INK/INK_SOFT tokens
    with no dark-on-dark or light-on-light failures'
  - All spines removed and colorbar tastefully styled (outline color, label) for a
    clean, uncluttered composition
  weaknesses:
  - Weekday and month tick labels are set to fontsize=16, very close to the title's
    fontsize=18 — this flattens the typographic hierarchy; reduce tick label fontsize
    to ~12-13pt so the title reads as clearly dominant
  - The two narrative moments in the data (the August vacation gap and the March deadline
    spike) are only visible through color/gaps with no callout — a subtle annotation
    or short caption pointing at one of these would push Data Storytelling from 'good'
    to 'excellent'
  - 'Minor vertical whitespace imbalance: more empty margin sits below the calendar
    grid (before the colorbar) than above the title; tightening `subplots_adjust`/padding
    would improve canvas balance slightly'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "heatmap-calendar · python · matplotlib · anyplot.ai" in dark ink at top, clearly readable, occupies ~75-80% of plot width (expected for the mandated title string). Month labels (Jan-Dec) along the top in medium-gray, weekday labels (Mon-Sun) on the y-axis in medium-gray, all legible against the light background. Horizontal colorbar below the grid labeled "Daily Commits" with tick labels 5/10/15/20, dark-gray outline.
      Data: Calendar grid of small rectangular cells, one per day, colored on a continuous green (#009E73) -> blue (#4467A3) gradient (imprint_seq). Low-activity days are pale green, high-activity/spike days (e.g. late March "deadline spike") are deep blue. A visible empty band in early-to-mid August (the vacation period) shows as bare page-background cells rather than colored cells, clearly reading as a gap.
