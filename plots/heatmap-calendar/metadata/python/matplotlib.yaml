review:
  strengths:
  - 'Attempt 1''s typographic-hierarchy weakness is resolved: weekday/month tick labels
    are now 12pt, clearly subordinate to the 18pt title'
  - New italic caption explicitly narrates both data moments (late-March deadline
    crunch, August vacation break), directly answering the Attempt 1 "no callout"
    weakness and improving both DE-03 and overall vertical balance
  - 'Correct GitHub-style calendar layout: weekdays on the y-axis, months along the
    top, weeks as columns — matches the spec''s Notes exactly'
  - Missing/zero-activity days render as true empty cells via NaN + cmap.set_bad(PAGE_BG),
    so the vacation gap reads as a clear visual gap rather than a low-value cell
  - 'Both renders remain fully theme-correct: warm off-white/near-black backgrounds,
    all chrome uses theme-adaptive tokens with no dark-on-dark or light-on-light failures,
    identical data colors across themes'
  - Clean, fully vectorized KISS structure with np.random.seed(42), no manual loops
    for grid construction, all imports used
  weaknesses:
  - Title fontsize (18pt) is too generous for its 51-character length — it now spans
    ~86.5% of the canvas width with only ~6-8% margin on each side, a squeezed look
    with little breathing room. Reduce to ~13-14pt so it comfortably occupies closer
    to 60-70% of the width while remaining the clear typographic anchor.
  - The narrative caption states the two data moments in text but doesn't visually
    point at the specific grid cells (e.g. a subtle arrow or bracket near the March/August
    columns) — the last increment toward excellent data storytelling.
