review:
  strengths:
  - Sqrt-transformed color mapping spreads out the common low-count (0-5) range for
    readability while raw values are preserved intact for hover text and colorbar
    tick labels
  - Peak-day annotation with arrow creates a genuine authored focal point rather than
    relying on the color scale alone to surface the burst day
  - Missing calendar cells at the year edge (only Mon/Tue populated in the final week
    since 2024 starts on a Monday) render as graceful empty gaps instead of a false
    zero color, correctly satisfying the spec's 'handle missing dates gracefully'
    requirement
  - Theme-adaptive chrome is fully threaded through title, tick labels, colorbar (bg/border),
    and annotation box (bg/border/arrow) — both renders are clean with no dark-on-dark
    or light-on-light failures
  - Realistic weekly seasonality (lower weekend activity), occasional bursts, and
    zero-days give genuine feature coverage for a calendar-heatmap dataset
  weaknesses:
  - The peak-annotation callout box sits directly over roughly 6-9 data cells around
    the Apr 09 peak (Tue/Wed rows), occluding those values behind the box — nudge
    the box further from the grid or add a slight background transparency so it stops
    hiding data
  - At 365+ cell density, low-value distinctions (e.g. 1 vs 2 commits) are hard to
    separate by color alone even with the sqrt transform — consider stretching the
    low end of the color range further or accepting this as an inherent density tradeoff
  - Styling leans mostly on the two-stop sequential colorscale and default heatmap
    conventions (DE-01/DE-02) — solid execution but there's room for more distinctive
    polish beyond a well-executed default treatment
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches the required light-theme surface — not pure white.
      Chrome: Title "heatmap-calendar · python · plotly · anyplot.ai" in dark ink, centered, clearly readable. Month labels (Jan-Dec) along the top in soft ink, weekday labels (Mon-Sun) along the left in soft ink — both fully legible. Colorbar "Daily commits" on the right with tick labels 0/5/10/15, boxed in an elevated cream panel with a soft border — readable. Peak annotation callout ("Peak: 19 commits, Apr 09") in a bordered cream box with a dark arrow pointing to the spike cell — readable, no clipping.
      Data: Heatmap cells run from brand green (#009E73, low counts) to blue (#4467A3, high counts) via the imprint_seq sequential scale, with thin cream gaps between cells acting as cell separators. First-series green anchors the low end as required.
      Legibility verdict: PASS — no light-on-light issues, all text has strong contrast against the cream background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches the required dark-theme surface — not pure black.
      Chrome: Title in light ink, fully readable. Month and weekday labels in light soft-ink, legible. Colorbar box uses the elevated dark panel (#242420) with light text and a light border — clearly readable, no dark-on-dark failure. Peak annotation box similarly uses the dark elevated panel with light text and a light arrow — fully legible against the near-black grid gaps behind it.
      Data: Cell colors are pixel-identical to the light render (same green-to-blue imprint_seq gradient) — only the chrome (background, text, borders) flips between themes, confirming correct theme-adaptive implementation.
      Legibility verdict: PASS — no dark-on-dark text, no illegible elements; cell gap lines read as near-black against the near-black background by design (theme-consistent), not as an accessibility problem.
