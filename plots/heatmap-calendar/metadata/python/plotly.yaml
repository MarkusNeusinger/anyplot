  strengths:
  - Correct GitHub-style calendar layout (7 rows x 53 week-columns) with weekday labels
    on Y and month labels on top-X
  - 'Handles the year''s trailing partial week correctly: Dec 30-31 populated, Wed-Sun
    of that same week genuinely left blank rather than faked'
  - Rich hover via customdata + hovertemplate showing full date and exact commit count
    per cell
  - 'Correct imprint_seq Imprint colorscale (#009E73 to #4467A3); data colors identical
    between light and dark renders, only chrome flips'
  - Explicit font sizes throughout with theme-adaptive INK/INK_SOFT tokens threaded
    consistently into every chrome element
  - Realistic, seeded Poisson-based commit data with weekday/weekend variation, occasional
    bursts, and sparse zero-activity days
  - Canvas target hit exactly (width=800, height=450, scale=4 -> 3200x1800), generous
    margins, nothing clipped in either render
  weaknesses:
  - Low-to-mid daily commit counts (the majority of the calendar) compress into visually
    similar green tones on the 2-stop linear imprint_seq scale - only bursts read
    distinctly; consider a mild non-linear z transform (sqrt/log1p) or extra colorscale
    stops so mid-range activity is easier to differentiate
  - 'Design Excellence is default-leaning: no explicit emphasis technique (annotation,
    callout, bolded label) calls out burst days or weekly rhythm - hierarchy currently
    comes only from the raw color scale'
  - Default plotly axis tick marks (small dashes) are visible at every row boundary
    along the y-axis line in both themes since ticks='' was never set - minor polish
    item
  - LM-02 distinctive-feature usage is limited to hover customization; consider a
    more plotly-specific feature (range slider, annotation overlay on top burst days)
    for stronger Library Mastery credit
