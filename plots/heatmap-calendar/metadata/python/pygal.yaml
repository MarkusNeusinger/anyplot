review:
  strengths:
  - Correct canonical 3200×1800 canvas confirmed by pixel measurement — content spans
    x=80–3129 and y=26–1300, comfortably inside bounds on both axes with no AR-09
    clipping on either render.
  - 'Vertical whitespace is genuinely balanced, not just visually close: the measured
    gap between the title and the calendar grid (≈492px) closely matches the gap between
    the stats footer and the canvas bottom (≈500px) — the custom `vpad` centering
    math works as intended.'
  - 'Theme-adaptive chrome is correct in both renders: `#FAF8F1`/`#1A1A17` backgrounds,
    INK/INK_MUTED tokens correctly threaded through every hand-drawn SVG text and
    rect element, no dark-on-dark or light-on-light failures.'
  - Color bins interpolate exactly along the Imprint `imprint_seq` gradient (`#009E73`
    → `#4467A3`), with the first/lowest active bin anchored to brand green; empty-day
    cells use a subtle neutral tint blended from background + muted ink, matching
    the spec's 'handle missing dates gracefully' requirement.
  - Adds a genuinely useful summary-stats footer (total commits, active days, longest
    streak, avg commits/active day) beyond the spec's minimum ask, strengthening data
    storytelling.
  - 'All required spec features present: Mon–Sun weekday labels, Jan–Dec month labels,
    sequential color legend with bin-range captions, and correct data mapping (weeks
    as columns, weekdays as rows).'
  weaknesses:
  - 'Calendar cells have zero hover interactivity: the HTML output references pygal''s
    `pygal-tooltips.min.js`, but the hand-drawn SVG `<rect>` cells lack the data-tooltip/reactive
    classes pygal''s JS looks for, so hovering a day shows nothing — pygal''s core
    distinguishing feature (per-datapoint hover detail) is dead code in the shipped
    HTML. Add `<title>{date}: {n} commits</title>` children to each cell rect (cheap,
    works via native browser tooltips even without pygal''s own JS) or wire up pygal''s
    reactive tooltip markup.'
  - The implementation never calls `chart.add()` or uses any of pygal's native charting/data-binding
    API — `pygal.Bar()` is only used via `render_tree()` as an SVG/title/background
    scaffold, then all actual chart content (grid, labels, legend, stats) is drawn
    manually with `xml.etree.ElementTree`. Understandable since pygal has no native
    calendar-heatmap chart type, but it means little of pygal's own high-level API
    is exercised; pair with the tooltip fix above to reclaim some library-mastery
    credit.
  - Legend bin-edge captions ('0', '1-4', '4-8', '8-11', '11+') render at `int(fs_legend
    * 0.78)` ≈ 28px unitless — noticeably smaller than the library's standard 44px
    tick-label baseline and close to unreadable once scaled to a ~400px mobile thumbnail.
    Raise the numeric-caption floor (e.g. `max(38, int(fs_legend * 0.78))`) so the
    legend scale stays legible at small sizes.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white, not dark.
      Chrome: Title "heatmap-calendar · python · pygal · anyplot.ai" centered at the top in dark ink, clearly readable. Below it, bold "Jan"–"Dec" month labels sit above the grid, and bold "Mon"–"Sun" weekday labels sit to the left of each grid row, both rendered in dark ink and fully legible against the light background. A "Less ... More" color-scale legend with 5 swatches and numeric bin captions ("0", "1-4", "4-8", "8-11", "11+") sits below the grid, followed by a two-line summary footer ("264 commits · 112 active days" / "Longest streak: 4 days · 2.4 commits/active day") in bold ink and muted secondary ink.
      Data: 53 columns × 7 rows of rounded-corner cells spanning the full year 2025. Inactive days are a soft neutral gray, active days step through 4 shades from brand green (#009E73, low activity) through teal/blue-green to a deeper blue (#4467A3, high activity) — first/lowest active bin is exactly the brand green. Weekend rows (Sat/Sun) are mostly empty with occasional spikes, consistent with a coding-activity dataset.
      Legibility verdict: PASS — all title, chrome, and data-adjacent text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black, not light.
      Chrome: Same title, month labels, weekday labels, legend, and summary footer as the light render, now rendered in light ink (#F0EFE8 primary / muted secondary) — all clearly visible against the dark background. No dark-on-dark failures: every text element flips to a light tone.
      Data: Cell colors are pixel-identical to the light render — brand green through blue-green to blue for the 4 activity bins, same neutral gray for inactive days. Only the chrome (background, text) flipped; the data-color gradient did not change, confirming correct light/dark parity.
      Legibility verdict: PASS — all text reads clearly on the near-black surface; no dark-on-dark text found.
