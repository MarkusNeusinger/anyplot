review:
  strengths:
  - Perfect spec compliance — all required dashboard tile features implemented (value,
    sparkline, change indicator, status color coding, grid layout)
  - Excellent data quality with realistic, domain-appropriate operational metrics
    (CPU, Memory, Response Time, Active Users, Error Rate, Throughput)
  - 'Perfect code quality: KISS flat-script structure, reproducible with np.random.seed(42),
    clean imports, correct plot-{THEME}.png output format'
  - Strong theme adaptation — sns.set_theme rc parameters correctly adapt all chrome
    elements (text, background, borders) between light and dark themes
  - 'Smart colorblind-safe design: Okabe-Ito blue/orange/pink for status avoids red-green
    distinction issues; directional arrows provide redundant signal for change direction'
  - Canvas exactly at 3200x1800 spec with no bbox_inches='tight' drift; tight_layout
    with rect=[0,0,1,0.95] prevents title clipping
  weaknesses:
  - 'Brand green #009E73 is entirely absent — good status uses #0072B2 (Okabe-Ito
    position 3) instead of position 1. The first categorical color must always be
    #009E73. Fix: set status_colors[''good''] = ''#009E73'' (green=good is also semantically
    natural for ops dashboards)'
  - 'Sparkline area fills in dark render look muddy: orange (#E69F00 at alpha=0.2
    on dark #242420) becomes brownish-olive; pink/purple (#CC79A7 at alpha=0.2 on
    dark #242420) becomes dark maroon. Fix: increase fill alpha to 0.3 to maintain
    saturation in dark mode'
  - Seaborn library mastery is shallow — the core dashboard layout relies almost entirely
    on matplotlib primitives (ax.text, fill_between, inset_axes). Only sns.lineplot
    and sns.set_theme are seaborn-native. Could leverage more seaborn-idiomatic patterns
    such as sns.despine
