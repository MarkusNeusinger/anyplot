review:
  strengths:
  - Clean 3x2 dashboard layout with well-proportioned rounded tiles and semantic status
    border colors (green/orange/red)
  - 'Complete spec coverage: each tile displays metric name, prominent value with
    unit, directional change indicator with arrow, and embedded sparkline'
  - 'Correct theme adaptation: warm off-white (#FAF8F1) and near-black (#1A1A17) backgrounds,
    theme-adaptive INK/INK_SOFT tokens applied to all text elements'
  - 'Excellent data quality: realistic infrastructure metrics (CPU, Memory, Response
    Time, Requests/sec, Error Rate, Disk I/O) with varied statuses and mixed favorable/unfavorable
    changes'
  - Highcharts area sparklines with gradient fill (#009E73 brand green) are visually
    distinctive and appropriate for compact trend display
  weaknesses:
  - 'Dark render sparkline gradient fill is nearly invisible — the #009E7355 (upper)
    and #009E7308 (lower) gradient stops are too transparent for the #1A1A17 dark
    surface, leaving only the line visible; increase upper stop alpha to ~88 hex (#009E7388)
    so the fill remains perceptible in dark mode'
  - Status tile borders use green/orange/red color exclusively with no secondary non-color
    signal — CVD users cannot distinguish good (green) from critical (red) borders;
    consider a small status text badge or icon on each tile
  - Tiles lack visual depth — no box-shadow or elevation effect separates them from
    the page background; add subtle shadow (e.g. 0 2px 8px rgba(0,0,0,0.12) light
    / rgba(0,0,0,0.4) dark) for polish
  - Implementation bypasses the Python highcharts_core library entirely (no highcharts_core.chart.Chart),
    using raw HTML/JS string generation; LM-01 score limited because the Python library's
    idiomatic API is not used
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page background — correct. Tile backgrounds are slightly elevated (#FFFDF6), clearly distinct from the page.
      Chrome: Title "dashboard-metrics-tiles · python · highcharts · anyplot.ai" at 52px, bold, dark ink — readable and centered at top. Metric name labels (34px, INK_SOFT) are visible. Large value labels (88px, INK) are highly prominent. Change indicator labels (30px, green/red) are clear.
      Data: Sparklines use #009E73 (Okabe-Ito position 1 brand green) for the line. Gradient fill uses #009E7355 to #009E7308 — visible as a soft teal fill on light background. Status borders: CPU/Response Time/Requests/Disk (green #059669), Memory (orange #D97706), Error Rate (red #DC2626).
      Legibility verdict: PASS — all text clearly readable against the light background. No "light-on-light" failures.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct. Tile backgrounds are dark elevated (#242420), subtly distinct from the page.
      Chrome: Title uses light text, readable against dark background. Metric name labels (INK_SOFT: #B8B7B0 in dark mode) readable. Value labels (INK: #F0EFE8) are prominent and bright. Change indicator labels readable in green/red. No dark-on-dark text failures observed.
      Data: Sparkline lines use identical #009E73 brand green — consistent with light render. ISSUE: The gradient fill (#009E7355 to #009E7308) is nearly invisible on the dark #1A1A17 surface — only the line is perceptible; the area fill essentially disappears into the dark tile background. Status border colors are unchanged (semantic colors stay constant across themes).
      Legibility verdict: PASS for text; PARTIAL for sparkline gradient fill (fill invisible in dark mode, line visible).
