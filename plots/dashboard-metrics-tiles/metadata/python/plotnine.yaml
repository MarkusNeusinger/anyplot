review:
  strengths:
  - 'Excellent dual-theme adaptation: both light and dark renders use correct background
    tokens (#FAF8F1/#1A1A17), elevated tile fills, and appropriate INK/INK_SOFT text
    colors throughout — no dark-on-dark failures'
  - Creative and idiomatic use of plotnine's facet_wrap + scale_color_identity to
    build a fully grid-based dashboard layout without falling back to matplotlib
  - Status-aware Okabe-Ito color coding (green/orange/red) creates immediate visual
    triage — the critical Error Rate tile stands out clearly
  - 'Comprehensive spec compliance: all six required tile components (label, value,
    sparkline, change indicator, status color, change direction) are present and working'
  weaknesses:
  - Noticeable vertical gap between the two rows of tiles — panel_spacing or figure
    height could be tuned to reduce the empty vertical band between row 1 and row
    2 (affects VQ-05)
  - Change indicator text at size=6 is quite small for the 3200x1800 canvas — increasing
    to size=7 or 8 would improve mobile readability (affects VQ-01)
  - Memory tile shows a green up-arrow for an already-at-warning-status metric — minor
    semantic inconsistency where increasing memory (moving toward critical) signals
    as a 'favorable' direction (affects DE-03 storytelling accuracy)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "dashboard-metrics-tiles · python · plotnine · anyplot.ai" in dark INK text at top — readable. Metric labels in bold dark INK. No axis labels (theme_void). Tile borders in INK_SOFT.
      Data: Six tiles in 3x2 grid. CPU Usage 45% in #009E73 (green), Memory 72% in #E69F00 (orange/warning), Response Time 120ms in #009E73, Active Users 1284 in #009E73, Error Rate 0.8% in #D55E00 (critical red-orange), Throughput 3450req/s in #009E73. Sparklines use status-colored lines on #EDEAE0 background strips.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
