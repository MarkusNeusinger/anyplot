    #ef4444 critical) override the brand green (#009E73) — justified by spec semantic
    requirements but still a deviation'
  - Sparklines are quite small in height within each tile (sparkline_height=0.12 domain
    fraction at scale=4 renders as ~32px tall) — slightly hard to read trend at smaller
    display sizes
  - Title uses fig.add_annotation at y=1.06 with fontsize=18 rather than layout title
    — annotation approach means it may not be reliably positioned if margins change;
    fontsize=18 → 72 source-px is borderline small for a 3200px-wide canvas
  - 'DE-02: minimal visual refinement beyond the status coloring — no subtle grid,
    no sophisticated typography hierarchy beyond size variation'
  - 'LM-02: sparkline overlay via custom xaxis/yaxis domain is clever but the axis
    domain math is manual and brittle; Plotly''s native inset-axes or shape-based
    sparklines would be more maintainable'
