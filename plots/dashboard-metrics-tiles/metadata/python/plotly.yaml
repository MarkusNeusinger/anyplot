      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "dashboard-metrics-tiles · python · plotly · anyplot.ai" in dark ink, clearly readable. Metric name labels (CPU Usage, Memory, etc.) in dark INK token at fontsize=24, clearly readable. Delta percentages in semantic status colors or gray, readable.
      Data: 6 tiles in 3x2 grid. Good tiles (CPU, Response Time, Requests/sec, Disk I/O) show values in green (#22c55e). Warning tile (Memory 72%) in orange (#f59e0b). Critical tile (Error Rate 2.3%) in red (#ef4444). Sparklines with area fills at bottom of each tile in matching status colors.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct
      Chrome: Title and metric labels rendered in light (#F0EFE8) tone, clearly readable against dark background. Delta labels use light text. Tile elevated backgrounds (#242420) distinctly darker than page background, creating clear tile separation. No dark-on-dark failures.
      Data: Colors identical to light render — semantic green/orange/red status colors unchanged. Sparkline lines clearly visible. Sparkline area fills slightly less prominent on dark tile backgrounds (especially orange Memory tile) but lines remain clear. Brand green equivalent reads well.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures
