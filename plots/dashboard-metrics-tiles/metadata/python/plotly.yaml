review:
  strengths:
  - Direction-aware delta semantics (higher_is_bad) correctly inverts color/arrow
    meaning per metric — CPU decrease shown as good green, throughput decrease shown
    as bad red
  - go.Indicator used natively rather than simulated with annotations — idiomatic
    Plotly approach
  - Sparklines overlaid via custom axis domains is a sophisticated Plotly-specific
    technique
  - Full theme adaptation with correct token usage (PAGE_BG, ELEVATED_BG, INK, INK_SOFT)
    across both renders
  - Both PNG and HTML outputs produced as required for interactive library
  weaknesses:
  - Red/green are the sole distinguishing signals for critical vs. good status; an
    additional shape or pattern cue would make status encoding CVD-safe
  - Sparkline area fills in dark mode are slightly dim (especially orange Memory tile
    where semi-transparent fill blends with dark elevated tile background) — consider
    higher alpha (0.25–0.30) for dark theme fills
  - Title at fontsize=16 is a bit small relative to the large KPI values; bumping
    to 18px would improve hierarchy at full canvas resolution
  - Tile borders could use a slightly more polished dashboard look
  image_description: |-
