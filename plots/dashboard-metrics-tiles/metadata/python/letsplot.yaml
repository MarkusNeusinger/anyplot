review:
  strengths:
  - 'All 6 required dashboard features implemented: value display, metric label, sparkline,
    change indicator with directional arrow, status color coding, and warning badge'
  - Theme adaptation is correct and complete — both light and dark renders are readable
    with proper background tokens throughout
  - Warning badge emoji in strip header for Memory tile is an elegant way to signal
    elevated status without adding a separate element
  - Data choices are realistic DevOps/SRE metrics with semantically meaningful change
    directions (decrease in error rate = favorable, increase in memory = unfavorable)
  - Canvas dimensions exactly correct at 3200x1800 via ggsize(800,450)+scale=4
  weaknesses:
  - 'Error Rate tile shows visual crowding: the large "0.8%" value text is positioned
    too close to the sparkline area chart — increase scale_y_continuous expand from
    [0.45, 0.45] to [0.55, 0.55] and push y_value offset to +0.55 of range so value
    labels have clear breathing room above the sparkline'
  - Change indicator labels land inside or near the sparkline area in narrow tiles
    — the y_change position (y_min - 25% of range) is too close to the data; increase
    the bottom multiplier from 0.25 to 0.40 for more separation below the sparkline
  - LM-02 relatively low — HTML output does not configure tooltips, missing an opportunity
    to showcase lets-plot's interactive capabilities in the HTML artifact
