      Data: Green (#009E73) sparklines with area fill (alpha=0.25) for 5 good-status tiles. Amber (#F59E0B) for Memory/warning tile. Large bold dark-ink value labels (1,284; 45%; 0.8%; 120ms; 847req/s; 72%). Green/red colored change arrows. Minor crowding in Error Rate tile between "0.8%" value text and sparkline area chart.
