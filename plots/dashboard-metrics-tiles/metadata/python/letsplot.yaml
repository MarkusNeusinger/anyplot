review:
  strengths:
  - 'Full spec compliance: all four required tile elements (value, sparkline, change
    indicator, metric label) present across all 6 tiles'
  - Fully theme-adaptive chrome in both renders — correct backgrounds, INK/INK_SOFT
    token usage, no dark-on-dark failures
  - 'Semantically correct change indicator logic: favorable/unfavorable determined
    per metric context, not just raw positive/negative'
  - Warning badge (⚠) in Memory strip text provides instant at-a-glance differentiation
    beyond color alone
  - Clean dashboard aesthetic with elevated card backgrounds, removed axis decorations,
    generous tile spacing
  - Correct canvas (3200×1800), title format, and dual HTML+PNG output; layer_tooltips()
    enhances interactive HTML
  weaknesses:
  - Change labels (size=14) in a 3-column tile layout become borderline small at mobile
    width (~400px) — consider increasing to size=16-17 for better mobile legibility
  - Strip text and change label are similar size (both 14), flattening the typographic
    hierarchy within each tile — strip_text could be 16-18 to anchor metric identity
    more strongly
  - 'LM-02 underutilizes letsplot-distinctive features: layer_tooltips is present
    but tooltip content could be richer; ggbunch() or plot composition could create
    more independent tile layouts'
  image_description: |-
