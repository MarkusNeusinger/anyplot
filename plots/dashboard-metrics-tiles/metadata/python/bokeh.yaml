review:
  strengths:
  - Complete spec compliance — all 6 metric tiles rendered in correct 3×2 grid with
    status bars, sparklines, directional change indicators, and color-coded status
  - 'Smart semantic color usage with Okabe-Ito palette — #009E73/good, #E69F00/warning,
    #D55E00/critical; favorable vs. unfavorable change logic correctly inverts for
    Response Time and Error Rate'
  - Both themes render flawlessly — dark render has proper off-white (#F0EFE8) text
    on near-black (#1A1A17) background with no dark-on-dark failures
  - Effective dashboard storytelling — status bar colors immediately signal which
    metrics need attention (Error Rate critical, Memory warning) before reading any
    values
  - Excellent data quality — realistic ops metrics (CPU/Memory/Response Time/Error
    Rate/Throughput/Active Users) with mixed units, realistic values, and varied sparkline
    patterns
  - Solid code structure — normalized coordinate system (x_range=(0,1)) is an elegant
    approach for tile-internal layout; sys.path fixup correctly avoids bokeh.py shadowing
  weaknesses:
  - Title at 28pt in the 160px header figure spans ~40% of canvas width — below the
    expected 70–85% for the mandated anyplot title; the recommended bokeh title size
    is 50pt which would fill the expected proportion (increase title_fig height or
    use a larger font)
  - 'Sparkline area fill (fill_color=#0072B2, fill_alpha=0.25) is near-invisible on
    the dark render''s #242420 tile background — consider increasing fill_alpha to
    0.35–0.45 for dark theme or using a slightly lighter fill color'
  - Tile inner whitespace is functional but unrefined — adding explicit top/bottom
    padding between status bar and metric name, and between change indicator and sparkline,
    would improve perceived polish (DE-02)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 page background with slightly elevated #FFFDF6 tile backgrounds — correct, no pure white
      Chrome: Title "dashboard-metrics-tiles · python · bokeh · anyplot.ai" in dark #1A1A17 ink at top center, readable but spans ~40% of canvas width (smaller than the 70–85% recommendation for the standard bokeh 50pt title). Metric name labels (20pt bold, dark ink), value text (42pt bold, dark ink), and change indicators (22pt bold, colored) all clearly readable.
      Data: 3×2 grid of metric tiles. Each tile has a colored status bar at top (green #009E73 for good, amber #E69F00 for warning, red-orange #D55E00 for critical), large bold current value, directional change indicator (▲/▼), and a compact sparkline with light-blue (#0072B2) filled area at bottom. Endpoint dots on each sparkline.
      Legibility verdict: PASS — all text is clearly readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 page background with slightly elevated #242420 tile backgrounds — correct, no pure black
      Chrome: Title in off-white (#F0EFE8) clearly visible on dark background. Metric names, values, and change indicators all render in off-white INK token — no dark-on-dark failures. Tile outlines visible as subtle INK_SOFT borders.
      Data: Identical layout to light render. Status bar colors unchanged (#009E73 / #E69F00 / #D55E00 — same as light ✅). Change indicator colors unchanged (green #009E73 favorable / orange #D55E00 unfavorable ✅). Sparkline lines visible in blue #0072B2. Sparkline area fill (fill_alpha=0.25 over #242420) is noticeably less visible than in the light render — the fill reads as a very subtle darker shade, providing minimal contrast depth.
      Legibility verdict: PASS — all text is readable; data colors identical to light render; no dark-on-dark failures; sparkline fill is reduced in visual impact on dark theme but the line itself remains clearly visible
