review:
  strengths:
  - 'Excellent Altair compositing: vconcat/hconcat creates a true dashboard grid without
    any workarounds — idiomatic and clean'
  - Gradient sparkline fills using alt.Gradient with GradientStop are a genuinely
    Altair-distinctive feature that adds visual polish
  - 'Color-coded status tiles (Okabe-Ito #009E73 for good, #E69F00 for warning) create
    immediate at-a-glance readability'
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT are all threaded
    through title, view, and tile colors — both renders pass readability'
  - 'Canvas handling is correct: raises SystemExit on overshoot, pads to exact 3200×1800
    on undershoot — no cropping'
  - KISS code structure with inline per-tile loop, no helper functions, deterministic
    seeding per tile for reproducibility
  - Tile value formatting adapts by magnitude (thousands, fractions, integers) and
    embeds units — highly realistic dashboard data
  - Change indicators use favorable/unfavorable logic correctly (down = good for CPU/latency,
    up = good for Requests/sec)
  weaknesses:
  - Dark-render warning tiles (Memory, Error Rate) have amber gradient fills (#E69F0055
    alpha) that blend into the dark elevated background (#242420) and appear brownish/olive
    — the stroke line remains readable but the area fill loses color identity; consider
    using a slightly higher alpha (88 or AA instead of 55) for the gradient top stop
    in dark mode to retain amber character
  - No 'critical' status tile is present in the data despite the spec explicitly listing
    good/warning/critical as categories — adding one critical tile (e.g. 'Queue Depth'
    or 'Cache Miss Rate') would give full feature coverage for DQ-01
  - 'DE-02: tile border stroke uses INK_SOFT at strokeWidth=1 which appears as a dark
    ring in light mode; while not ugly, removing or softening it to strokeOpacity=0.3
    would give cleaner tiles and improve visual refinement'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "dashboard-metrics-tiles · python · altair · anyplot.ai" in dark ink at top, clearly readable. Tile value labels (45%, 72%, 120ms, 2,847, 0.8%, 156MB/s) are bold, very large, dark — prominent and readable. Metric subtitles (CPU Usage, Memory, etc.) in dark INK, smaller, readable. Change indicators (▼ 5.2%, ▲ 8.1%, etc.) in green/vermillion, clearly readable.
      Data: 3×2 grid of metric tiles on elevated off-white (#FFFDF6) backgrounds with rounded corners. Green (#009E73) sparklines with teal gradient fill for "good" tiles (CPU, Response Time, Requests/sec, Disk I/O). Amber (#E69F00) sparklines with warm-amber gradient fill for "warning" tiles (Memory, Error Rate). All sparklines show clear trend lines above filled gradient areas.
      Legibility verdict: PASS — all text readable, no light-on-light issues, adequate contrast throughout.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light cream text (#F0EFE8 range), clearly readable against dark background. All tile values in light text, very readable. Metric subtitles in light secondary text, readable. Change indicators in green/orange, readable.
      Data: Colors are identical to light render for data elements — green sparklines for good tiles, amber sparklines for warning tiles (data colors match). Tile elevated backgrounds shift to dark (#242420) correctly. Minor observation: the amber gradient area fill on warning tiles blends slightly brownish/olive against the dark elevated background due to #E69F0055 alpha blending — the sparkline stroke line remains clearly amber and readable.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures. Brand green (#009E73) remains visible and prominent.
