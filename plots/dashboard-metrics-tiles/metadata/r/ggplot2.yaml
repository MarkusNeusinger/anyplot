review:
  strengths:
  - Innovative use of ggplot2 facet_wrap to create a dashboard tile grid — idiomatic
    and visually clean
  - 'Proper semantic color coding using Okabe-Ito: #009E73 (good), #E69F00 (warning),
    #D55E00 (critical/unfavorable change)'
  - 'Complete tile content: large KPI value, directional change indicator with arrow,
    compact sparkline with area fill and terminal dot, metric name'
  - Theme-adaptive chrome fully implemented — backgrounds, INK, INK_SOFT all flip
    correctly between light and dark renders
  - Panel ELEVATED_BG creates a professional card-like tile appearance distinguishable
    from the PAGE_BG outer surface
  - All grid, axis, and strip elements correctly suppressed for a clean dashboard
    look
  - Clean, reproducible R code using set.seed(42), dplyr pipe, and proper modern ggplot2
    API (linewidth= not size=)
  weaknesses:
  - No 'critical' status tile in the example data — spec mentions critical as a status
    option; add at least one critical tile (e.g. set Error Rate status to 'critical')
    so all three status colors are demonstrated
  - Change indicator text (size=3.2) is slightly small at canvas scale — increase
    to ~3.8-4.0 to ensure readability when image is scaled to mobile width (~400 px)
  - 'Memory tile area fill in dark render appears brownish/muddy — the alpha=0.15
    of #E69F00 on the dark #242420 panel background creates a desaturated khaki fill;
    consider increasing alpha slightly to ~0.25 or using a lighter tint approach to
    keep the fill recognizable as warning-orange in dark mode'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct per style guide. Panel interiors use elevated background (#FFFDF6).
      Chrome: Title "Server Health · dashboard-metrics-tiles · r · ggplot2 · anyplot.ai" in dark ink, well-centered. Metric name labels at bottom of each tile in INK_SOFT (#4A4A44) — all readable. No axis text or grid.
      Data: 6 tiles in 3×2 grid. CPU Usage (45.2%), Response Time (118ms), Disk I/O (38.6%), Throughput (1247 req/s), Error Rate (0.82%) all display in brand green (#009E73). Memory (72.1%) in warning orange (#E69F00). Change indicators use green for favorable changes and vermillion (#D55E00) for unfavorable. Sparklines with shaded area fill and terminal dot clearly visible.
      Legibility verdict: PASS — all text readable, status colors well-distinguished against warm off-white.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct. Panel interiors use dark elevated (#242420).
      Chrome: Title and metric name labels display in light ink — fully readable against dark background. No dark-on-dark text issues observed.
      Data: Data colors are identical to light render — green (#009E73) for good metrics, orange (#E69F00) for Memory warning. Change indicator colors unchanged. Minor observation: Memory tile area fill (alpha=0.15 of #E69F00 on dark panel) appears as a slightly muddy brownish-gold fill compared to the cleaner golden tint in the light render, but the sparkline itself remains clearly orange and readable.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures.
