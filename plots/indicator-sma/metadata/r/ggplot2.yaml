  - 'Complete spec compliance: all four required series (Price + three SMA periods)
    rendered with correct Okabe-Ito colors'
  - Both themes work correctly — chrome tokens fully threaded through all elements;
    no dark-on-dark failures
  - Idiomatic ggplot2 with clean use of scale_linewidth_manual + guides(linewidth
    = none) to control line weights without polluting the legend
