    and year-boundary ticks, causing ''Jan 2024 Jan 2024 Feb Feb...'' doubling visible
    in both renders — fix by adding explicit tickInterval and dateTimeLabelFormats
    to xAxis config'
  - Raw JSON chart construction instead of highcharts_core Python SDK (as recommended
    by library guide) — functional but bypasses the idiomatic Python API
  - 'DE-02: No spine removal — Highcharts'' default border is not removed; using borderWidth:
    0 or removing chart plotBorderWidth and axis lineWidth selectively would improve
    visual refinement'
  - Legend text (28px) and axis tick labels are sized appropriately for 4800x2700
    canvas but legend box has no borderColor/borderWidth set, leaving the ELEVATED_BG
    box without a defined edge
