review:
  strengths:
  - Full theme-adaptive chrome implementation with all six design tokens (PAGE_BG,
    ELEVATED_BG, INK, INK_SOFT, legend frame) correctly switching between light and
    dark renders
  - 'Idiomatic seaborn usage: wide-to-long reshape via pd.melt plus hue/palette dict
    provides automatic legend and Okabe-Ito colour assignment in canonical order'
  - All four spec data series present (Close Price, SMA 20, SMA 50, SMA 200) with
    correct rolling-window NaN behaviour shown for SMA 200 appearing only after day
    200
  - All font sizes explicitly set to spec-correct values (title=24, axis labels=20,
    tick labels=16, legend=16) ensuring full legibility at 4800×2700 px
  - Realistic geometric random walk data with upward drift produces a natural-looking
    stock price chart; np.random.seed(42) ensures reproducibility
  weaknesses:
  - Design storytelling is minimal — no visual emphasis on crossover events or trend
    phases; close price volatility vs. SMA smoothness creates implicit hierarchy but
    the designer made no deliberate storytelling choice (DE-03 limited to default
    2/6)
  - All four lines share linewidth=2.2, which is slightly below the recommended 2.5
    minimum for primary lines; differentiating the close price (e.g. 2.8–3.0) from
    the SMA lines (e.g. 1.8–2.0) would improve visual hierarchy
  - Aesthetic sophistication remains at well-configured-default level (DE-01=4/8)
    — no distinctive typographic or compositional choices that elevate it beyond a
    standard seaborn output
