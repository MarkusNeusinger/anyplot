review:
  strengths:
  - Full theme-adaptive chrome implementation — all text, grid, legend, and background
    tokens correctly flip between light and dark
  - Dual visual encoding (color + dash pattern + stroke weight) makes all four series
    distinguishable without relying on hue alone — excellent CVD accessibility
  - Idiomatic Altair declarative grammar with strokeDash and strokeWidth as typed
    encoding scales with explicit domain/range
  - Clean, reproducible flat code structure with np.random.seed(42); correct output
    filenames for both PNG and HTML
  weaknesses:
  - 'SMA 200 line is slightly faint: [2,2] dash pattern combined with 1.5px stroke
    width reduces visibility on the light background — increase stroke to 2.0px or
    use [4,3] dash'
  - DE-03 storytelling is limited — chart displays data without guiding the viewer
    to crossover signals or trend inflection points; emphasis on key crossover moments
    would improve this
  - 300-day window gives only ~100 days of SMA-200 history; using 400–500 periods
    would better demonstrate long-term SMA behavior per spec guidance
