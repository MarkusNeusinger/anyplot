    Background: Near-black (~#1A1A17) ✓
    Chrome: Light text clearly readable; no dark-on-dark failures ✓
    Data: Same box structure; data colors identical to light render ✓
    Legibility verdict: PASS (for the seaborn render — irrelevant to this highcharts review)

