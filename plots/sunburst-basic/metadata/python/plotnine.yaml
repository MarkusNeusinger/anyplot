review:
  strengths:
  - Successfully implements sunburst from polygon primitives in plotnine — a difficult
    feat without native radial support
  - Two-weight typography (bold L1/regular L2 labels) creates clear visual hierarchy
    between ring levels
  - Alpha blending (0.65) on outer ring subtly distinguishes hierarchy levels while
    keeping the color family intact
  - 'Perfect spec compliance: correct structure, Okabe-Ito starting at #009E73, adaptive
    theming, correct title format'
  - Deterministic business-context data that naturally fits the hierarchical chart
    type
  weaknesses:
  - Outer-ring (L2) labels are size=10, below 16pt guideline — increase to ≥14pt for
    large-canvas readability at 3600×3600px
  - 'No data storytelling: largest segment (Engineering, 40%) has no visual emphasis;
    no percentage annotations to guide viewer attention'
  - Dark-mode ring separator uses color=PAGE_BG (#1A1A17) which merges with near-black
    background — use slightly lighter separator for dark mode ring definition
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "sunburst-basic · plotnine · anyplot.ai" at size-24 in dark ink — readable. No axis labels or ticks (appropriate for radial chart). Inner ring labels (Engineering, Marketing, Operations, R&D) bold size-15 dark ink — readable. Outer ring labels (DevOps, Backend, Frontend, Digital, Brand, HR, Product) size-10 smaller dark ink — readable but small.
      Data: Engineering=#009E73 (brand green, first series ✓), Marketing=#D55E00, Operations=#0072B2, R&D=#CC79A7. Outer ring uses same colors at alpha=0.65. Ring separator is warm off-white (PAGE_BG), clearly visible.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, not pure black
      Chrome: Title and all labels rendered in light cream #F0EFE8 — clearly visible against dark background. No dark-on-dark failures. Ring separator uses #1A1A17 border (matches dark background), creating a thin dark gap — slightly less defined than light version but ring boundary still distinguishable.
      Data: Colors identical to light render — Engineering teal, Marketing vermillion, Operations blue, R&D reddish-purple. Inner hole matches dark background.
      Legibility verdict: PASS — all text light-colored and readable on dark surface, no dark-on-dark failures
