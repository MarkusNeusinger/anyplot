review:
  strengths:
  - Correct Okabe-Ito palette in canonical order, theme-adaptive backgrounds correctly
    applied for both light and dark renders
  - Clean KISS code structure with properly set font sizes and correct output files
    (PNG + HTML)
  - Realistic and neutral organizational budget data with sensible proportions across
    4 departments and sub-teams
  weaknesses:
  - 'WRONG CHART TYPE: Uses pygal.Treemap instead of a sunburst chart — the rendered
    output is a flat pie-like visualization with barely visible subdivision lines
    on the perimeter, NOT concentric rings showing hierarchy levels. Must use a sunburst-appropriate
    approach (e.g., pygal.Pie with nested slices, or manual concentric ring construction).'
  - No segment labels inside the chart — only a tiny bottom legend identifies the
    4 departments; subcategory labels (Backend Engineering, Frontend Engineering,
    etc.) are completely invisible in the render.
  - Hierarchy is not visually communicated — the inner ring (parent) vs outer ring
    (child) structure required by the spec is absent; the chart reads as a flat single-level
    pie chart.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white. PASS.
      Chrome: Title "sunburst-basic · pygal · anyplot.ai" visible at top in dark ink — readable. Bottom legend shows four colored squares with labels (Technology, Business, Operations, Marketing) in very small text — marginally readable. No segment labels inside the chart body.
      Data: Four large segments in Okabe-Ito order — green (#009E73, Technology, ~42%), orange (#D55E00, Business, ~36%), blue (#0072B2, Operations, ~20%), pink (#CC79A7, Marketing, ~12%). Very faint arc lines near the outer perimeter hint at subcategory subdivisions but are barely visible. Renders as a flat pie-like circle, NOT as concentric rings.
      Legibility verdict: PASS for chrome text; FAIL for subcategory representation (hierarchy invisible).

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct warm dark surface, not pure black. PASS.
      Chrome: Title visible in light-colored text against the dark background — readable. Bottom legend labels appear in light text — readable. No dark-on-dark failures detected.
      Data: Identical data colors to light render — green, orange, blue, pink segments in same Okabe-Ito order. The orange (#D55E00) segment appears slightly muted on the dark surface but remains distinguishable. Same flat pie-like appearance with barely visible outer arc subdivisions.
      Legibility verdict: PASS for chrome; FAIL for hierarchy visualization — the concentric ring sunburst structure required by spec is absent in both renders.
