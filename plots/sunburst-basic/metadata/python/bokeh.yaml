review:
  strengths:
  - Custom color tint families (base/mid/light) per department elegantly communicate
    hierarchical relationships through color lightness
  - Per-renderer HoverTool for each ring level showing contextually different tooltips
    is excellent Bokeh-idiomatic interactive design
  - Perfect spec, data quality, and code quality — realistic organizational budget
    scenario with correct angular math
  - Conditional label display (>4% for L3, >6% for L2) prevents crowding and gracefully
    handles small segments
  weaknesses:
  - 'Okabe-Ito departments use positions 1,5,3,4 instead of canonical 1,2,3,4 — Marketing
    should be #D55E00 (position 2) not #E69F00 (position 5)'
  - Level 3 outer-ring labels at 14pt are below the 18px minimum for pixel-based libraries
    at 4800px; increase to 16-18pt
  - Ring gap color (PAGE_BG) creates more prominent dark circles in dark mode — narrowing
    gap from 0.02 to 0.01 units would reduce artifact
  - No emphasis on dominant insight (Engineering ~50% of total budget); center annotation
    or label would improve storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "sunburst-basic · bokeh · anyplot.ai" in dark ink at top-center — readable. Legend header "Departments" at 22pt — readable. Ring level labels ("Department", "Team", "Project") at 16pt near bottom edge — readable but very close to canvas boundary.
      Data: Three concentric rings. Engineering (right half) in #009E73 base with #55C4A4 mid and #AAE0D5 light tints. Marketing (lower-left) in #E69F00/#F0BC4D/#F7D899. Sales (left) in #0072B2/#4DA6D5/#99CDE8. Operations (upper-left) in #CC79A7/#DDA5C5/#EED2E3. White line separators between segments. L1 labels (18pt, abbreviations like "Eng.", "Sales") in white or INK per segment. L2 labels (16pt, full names like "Backend", "Enterprise") on mid-ring. L3 labels (14pt, project names) on outer ring — small but visible.
      Legibility verdict: PASS — all text readable, though L3 labels at 14pt are below the 18px minimum recommendation

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title visible in light text (#F0EFE8 approximately). Legend text in gray (#B8B7B0 approximately) — readable. Ring level labels appear at bottom in muted gray — readable.
      Data: Colors identical to light render — Engineering #009E73, Marketing #E69F00, Sales #0072B2, Operations #CC79A7, with same tint families. The 0.02-unit gaps between ring levels (background color #1A1A17) create more prominent dark ring separators in dark mode due to higher contrast with mid-tone segments. L3 labels use INK (#1A1A17 in dark mode) on light-pastel outer segments — readable since pastel colors are light enough. No dark-on-dark failure.
      Legibility verdict: PASS — all text readable; visual artifact is the prominent dark ring gaps between hierarchy levels (more visible in dark than light mode)
