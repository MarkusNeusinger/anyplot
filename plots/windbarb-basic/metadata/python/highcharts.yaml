  strengths:
  - Perfect spec compliance — all required wind barb features correctly implemented
    using Highcharts windbarb series type
  - Excellent data storytelling — pre-frontal to post-frontal synoptic transect narrative
    is meteorologically meaningful and visually clear
  - Correct meteorological convention — barbs point FROM wind direction, speed encoded
    via barb notation (half/full barbs and pennants)
  - Both light and dark themes pass readability checks with no dark-on-dark or light-on-light
    failures
  - Speed category coloring using Okabe-Ito positions 1–4 (teal, orange, blue, pink)
    adds a meaningful secondary data dimension to the visualization
  weaknesses:
  - Y-axis max set to 90 when data peaks at ~68 knots — ~25% of vertical chart area
    is unused empty space; set max to ~75 or use auto-scaling
  - Legend clips at the bottom edge of both light and dark renders — increase marginBottom
    from 200 to ~280px to give the speed-category legend room
