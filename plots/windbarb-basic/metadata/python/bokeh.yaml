review:
  strengths:
  - 'Complete wind barb geometry: staff, half-barbs, full barbs, pennants, and calm
    circles all implemented correctly'
  - 'Correct meteorological convention: barbs extend in the wind-FROM direction using
    arctan2(-v, -u)'
  - Efficient use of Bokeh's multi_line for rendering all barb line segments in two
    draw calls (staff + barb lines)
  - Good data structure with ColumnDataSource and separate sources for barbs, pennants,
    and calm indicators
  - Font sizes explicitly set (28pt title, 22pt axis labels, 18pt tick labels) for
    the 4800x2700 canvas
  weaknesses:
  - 'CRITICAL: Uses #306998 (Python Blue) for barb color instead of #009E73 (Okabe-Ito
    position 1); images in plot_images/ show green barbs indicating these images came
    from a different code version'
  - 'CRITICAL: No theme adaptation — missing os.getenv(''ANYPLOT_THEME'') pattern;
    all colors hardcoded to light-theme defaults, causing unreadable dark-on-dark
    text in dark render'
  - 'CRITICAL: Uses export_png (explicitly forbidden per bokeh library guide); must
    use Selenium approach to screenshot HTML'
  - 'CRITICAL: Saves to plot.png instead of plot-{THEME}.png; no HTML output generated
    (required for bokeh as interactive library)'
  - 'CRITICAL: Title ''windbarb-basic · bokeh · pyplots.ai'' is missing language (''python'')
    and uses outdated domain (''anyplot.ai'' required)'
  - Observation points use yellow (#FFD43B) which is non-Okabe-Ito and inconsistent
    with the barb color palette
  - Pennants (50+ knots) rarely occur with ±30 knot random wind range — increase to
    ±60 knots for reliable multi-pennant demonstration
  - No visual storytelling or emphasis — no annotations highlighting interesting patterns,
    no visual hierarchy
  - 4-sided plot frame (all spines) rather than L-shaped or frameless style recommended
    by design guide
