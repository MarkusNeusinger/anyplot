review:
  strengths:
  - Equal-scale axes (scaleanchor='x', scaleratio=1) correctly lock longitude/latitude
    to the same unit scale — meteorologically essential and visually correct.
  - 'Complete wind barb notation: half barbs (5 kt), full barbs (10 kt), and pennant
    triangles (50 kt) all implemented with correct trigonometry; calm wind open circles
    displayed.'
  - Interactive hover tooltips on station markers show U, V, and wind speed — excellent
    use of Plotly's distinctive interactivity.
  - Wind barb key annotation is a professional, informative design touch that aids
    interpretation.
  - Realistic spatial wind coherence via sine/cosine base patterns produces a plausible
    synoptic-scale wind field.
  weaknesses:
  - 'CRITICAL CODE REGRESSION: Source code uses #306998 (blue) for barb/marker color
    instead of Okabe-Ito #009E73. Any regeneration will produce blue barbs, violating
    palette compliance.'
  - 'CRITICAL: No ANYPLOT_THEME support — hardcoded template=''plotly_white'' with
    no os.getenv(''ANYPLOT_THEME''). Background, grid color, annotation bgcolor, and
    legend bgcolor are all hardcoded for light theme only.'
  - 'CRITICAL: Wrong output filenames — saves as plot.png / plot.html instead of plot-{THEME}.png
    / plot-{THEME}.html.'
  - 'CRITICAL: Wrong title format — code has ''windbarb-basic · plotly · pyplots.ai''
    instead of ''windbarb-basic · python · plotly · anyplot.ai''.'
  - All four spines visible (template default box frame); preferred style is L-shaped
    (remove top and right spines).
  - Annotation bgcolor hardcoded rgba(255,255,255,0.95) and legend bgcolor hardcoded
    rgba(255,255,255,0.9) — do not adapt to dark theme.
