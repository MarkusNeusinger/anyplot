review:
  strengths:
  - 'Meteorologically correct barb rendering: pennants, full/half barbs, and calm
    circles implemented with proper orientation math'
  - Smart use of pygal's internal view.x()/view.y() coordinate transform to position
    barbs at exact data coordinates
  - Complete theme-adaptive chrome (background, ink, muted tokens) with no dark-on-dark
    failures in either render
  - Realistic cyclonic wind pattern data that tells a coherent meteorological story
  - Full-spec wind speed legend with sample barbs in the bottom margin
  weaknesses:
  - 'Design lacks visual sophistication: default pygal frame visible; no focal point
    (e.g., low-pressure centre marker) to anchor the cyclone story'
  - Legend x-spacing (hardcoded 340px per item) is brittle and slightly crowded for
    the Calm entry; positions should be computed proportionally
  - Title and axis labels are at minimum recommended size (28/18px) and are thin;
    a bolder or slightly larger title would improve visual hierarchy
