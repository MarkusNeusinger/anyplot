      Chrome: Title "windbarb-basic · python · altair · anyplot.ai" is clearly readable in dark ink; subtitle "Half barb = 5 kt | Full barb = 10 kt | ▲ Pennant = 50 kt | ○ Calm < 2.5 kt" is readable; axis labels "Longitude (°E)" and "Latitude (°N)" are dark and legible; tick labels are small but readable in dark ink
      Data: All elements rendered in #009E73 (brand green) — staff lines for each station, barb tick-marks of two lengths (half and full), triangular pennants at high-speed stations (~57 kt), open circles for two calm-wind stations (visible at bottom-left and bottom-right)
      Legibility verdict: PASS — all text is dark on warm-off-white background with no light-on-light issues

