review:
  strengths:
  - 'Correct wind barb symbology: staffs, half/full barbs, pennants, and calm circles
    all implemented with proper meteorological convention'
  - Continuous cividis colormap for wind speed encoding is CVD-safe and creates a
    clear speed gradient across the grid
  - 'Theme-adaptive chrome is fully wired: background, text, grid, and legend all
    respond correctly to light/dark ANYPLOT_THEME'
  - Altair angle encoding (alt.Angle()) for pennant direction is a genuinely distinctive
    use of the library
  - Subtitle serves as an embedded legend key, clearly explaining all barb symbology
  - Feature-coverage forcing (calm and pennant cases) ensures all wind barb types
    are present in the example
  weaknesses:
  - Legend font sizes not explicitly set via configure_legend(labelFontSize=..., titleFontSize=...)
    — relies on Altair defaults rather than the 16px/18px spec requirement
  - 'Design storytelling is minimal: the cividis gradient shows speed variation but
    there is no focal point annotation or callout to highlight the notable high-wind
    events'
  - Some dark-blue lower-speed staffs have marginal contrast against the off-white
    background — slightly harder to read than higher-speed yellow barbs
