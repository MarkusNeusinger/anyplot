  weaknesses:
  - No data-storytelling emphasis — every bar is weighted equally; a focal annotation
    (e.g. the female-skewed older cohorts) would lift DE-03
  - Pyramid is built with the generic negative-value trick rather than anything uniquely
    seaborn, so distinctive library features (LM-02) are modest
  - Tick labels at 8pt are on the small side when the 3200x1800 canvas is scaled down
    to ~400px mobile width — still legible but near the floor
