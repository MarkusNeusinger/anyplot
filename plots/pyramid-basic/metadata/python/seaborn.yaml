      Data: Male bars = brand green #009E73 extending LEFT, Female bars = lavender #C475FD extending RIGHT from a central axis; first series is #009E73. Three oldest cohorts (60-69, 70-79, 80+) carry dark ink edge highlights and a "Women outlive men — female-skewed 60+ cohorts" annotation with arrow.
