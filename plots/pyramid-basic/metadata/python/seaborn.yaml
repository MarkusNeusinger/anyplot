review:
  strengths:
  - 'Textbook population pyramid: green Male bars extend left, lavender Female bars
    extend right from a shared central axis, with a symmetric x-axis (±6,000) for
    fair side-by-side comparison.'
  - 'Imprint palette compliance is exact — first series Male = #009E73 brand green,
    second series Female = #C475FD lavender, identical data colors across light and
    dark renders with only chrome flipping.'
  - 'Both themes are fully readable: warm off-white #FAF8F1 in light, warm near-black
    #1A1A17 in dark; title, axis labels, ticks, legend, and annotation are all legible
    with no dark-on-dark or light-on-light failures.'
  - Strong data storytelling — the three oldest cohorts (60-69, 70-79, 80+) carry
    crisp ink edge-highlighting and an annotated arrow ('Women outlive men — female-skewed
    60+ cohorts') creating a clear focal point.
  - 'Idiomatic seaborn: sns.set_theme rc-driven chrome, sns.barplot with hue/hue_order/palette,
    sns.despine for the clean L-frame, plus a subtle theme-adaptive center reference
    line and x-only grid.'
  - Canvas is exactly 3200×1800 px (figsize=(8,4.5) @ 400 dpi), no bbox_inches='tight',
    deterministic hardcoded data — fully reproducible.
  weaknesses:
  - Title and axis labels are on the smaller side (title 12pt, labels 10pt, ticks
    9pt) — readable at full size but would benefit from slightly larger type for mobile
    (~400px) legibility.
  - 'LM-02: pyramid is built via barplot with negated left-side values, which is a
    sound general technique but not deeply distinctive to seaborn versus matplotlib.'
  - 'Minor: y-axis label ''Age Group'' renders quite close to the left canvas edge
    — all pixels visible (not AR-09), but margin is tight; a touch more left padding
    would add breathing room.'
  image_description: |-
