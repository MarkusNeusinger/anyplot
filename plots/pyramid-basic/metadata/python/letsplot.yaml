review:
  strengths:
  - 'First categorical series is brand green #009E73 (Male) with Imprint lavender
    #C475FD (Female) — palette-compliant, and the data colors are identical across
    light and dark renders with only chrome flipping'
  - 'Correct butterfly/pyramid construction: negative-signed male values place bars
    left of a shared central axis, female bars right, with a symmetric -80..80 break/label
    scheme for fair comparison'
  - Strong data storytelling — a black/white emphasis outline spotlights the peak
    working-age cohorts (20-29, 30-39) and a faint dashed central reference line anchors
    the two opposing sides
  - Direct read-off value labels nudged just outside each bar tip, no overlap with
    bars or the central line
  - 'Both renders fully theme-correct: warm off-white #FAF8F1 (light) and warm near-black
    #1A1A17 (dark), all text legible, no dark-on-dark or light-on-light failures'
  - Canvas exactly 3200x1800; clean KISS code, deterministic data, only used imports
  weaknesses:
  - Spec note says category labels 'should be placed along the central axis'; here
    they sit on the conventional left y-axis instead of straddling the center. This
    is a standard population-pyramid convention and acceptable, but a centered-label
    variant would match the spec wording more literally.
  - geom_text value labels at size=4 (~11pt) are slightly small relative to the large
    bars; bumping to ~5 would improve read-off prominence without crowding.
  - Library-distinctive usage is moderate — interactive HTML export is leveraged,
    but the chart could lean further into lets-plot-specific features (e.g. tooltips
    configuration) to differentiate from a plain plotnine equivalent.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure-white panel.
      Chrome: title "pyramid-basic · python · letsplot · anyplot.ai" in dark ink, top-left, ~50% width. Y-axis title "Age Group" and X-axis title "Population (thousands)" dark and readable. Tick labels symmetric 80/60/40/20/0/20/40/60/80 in soft ink. Subtle y-only major gridlines. Legend "Gender" on right with Male (green) / Female (lavender) swatches on elevated cream panel.
      Data: Male bars #009E73 (green) extend left, Female bars #C475FD (lavender) extend right from a dashed central reference line. Black emphasis outline on 20-29 and 30-39 rows. Value labels just outside each bar tip.
      Legibility verdict: PASS — all title/labels/ticks clearly readable against light background.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black.
      Chrome: title and axis titles in light ink (#F0EFE8), tick labels in soft light ink — all clearly readable. Gridlines subtle and visible. Legend on elevated dark panel with light text. Emphasis outline flips to near-white.
      Data: colors identical to light render — Male #009E73 green, Female #C475FD lavender. Central dashed line present.
      Legibility verdict: PASS — no dark-on-dark; all text clearly visible against the near-black background.
