review:
  strengths:
  - Correct population-pyramid (butterfly) form via coord_flip() + negative male values
    sharing a central population axis — idiomatic lets-plot grammar.
  - 'Imprint palette compliant: Male is brand green #009E73 (first series), Female
    lavender #C475FD (second); identical data colors across light and dark, only chrome
    flips.'
  - Symmetric y-axis with manual breaks at ±20/40/60/80 and absolute-value labels
    so both sides read as positive populations — exactly the fair-comparison the spec
    asks for.
  - 'Both renders fully legible: warm off-white #FAF8F1 / near-black #1A1A17 backgrounds,
    dark/light ink correctly threaded to title, axis titles, ticks and legend; no
    dark-on-dark or light-on-light.'
  - Exact mandated title 'pyramid-basic · python · letsplot · anyplot.ai', Gender
    legend, descriptive axis labels with units (Population (thousands)), and page-bg
    bar borders giving clean separation.
  - Canvas exactly 3200×1800; KISS structure, deterministic hardcoded data, clean
    imports, saves plot-{THEME}.png plus interactive HTML.
  weaknesses:
  - Design is clean but mostly relies on theme_minimal defaults — no extra storytelling
    emphasis (e.g. annotating the largest 20-39 cohorts or a subtle reference line
    at center) to create a stronger focal point (DE-03).
  - Tick labels at size=10pt are readable but slightly modest for a 3200px-wide canvas;
    nudging axis_text to ~11-12pt would improve mobile legibility when scaled to ~400px
    (VQ-01).
  image_description: |-
