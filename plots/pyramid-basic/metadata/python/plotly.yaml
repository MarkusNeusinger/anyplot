review:
  strengths:
  - Correct Okabe-Ito palette (Male=#009E73, Female=#D55E00) with full theme-adaptive
    chrome in both renders
  - Perfect font sizing — title=28px, labels=22px, ticks=18px, legend=16px all explicitly
    set
  - Clean symmetric axis with custom tick labels showing absolute values for negative
    bars
  - Custom hovertemplate with customdata correctly shows positive population values
    on left (Male) side
  - 'Full spec compliance: symmetric scale, center zeroline, legend, age groups 0–9
    to 80+'
  - Deterministic hardcoded data — no seed needed, fully reproducible
  - 'KISS structure: Imports → Data → Plot → Save with no functions or classes'
  weaknesses:
  - Design lacks visual storytelling — the pyramid just displays data without highlighting
    any demographic insight (e.g., the working-age bulge vs. elderly tail)
  - DE-01 at configured-default level — no bar edge styling, no size variation, no
    focal point emphasis to elevate beyond library defaults
  - 'Germany-scale data label is slightly misleading: total (~92.9M) exceeds Germany
    actual (~83M) and male/female split is too skewed (43.7M vs 49.2M) vs near-50/50
    reality'
  - No data annotations on key age groups or peak bars to guide the viewer to the
    insight
  - barmode=overlay is technically correct but the more idiomatic plotly population
    pyramid approach could be more polished
