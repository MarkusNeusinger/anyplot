review:
  strengths:
  - 'Correct butterfly/population-pyramid layout: male bars extend left, female bars
    extend right, sharing a central age-group axis with a clean structural divider
    at x=0.'
  - Symmetric x-axis (±max*1.15) with absolute-value tick labels on both sides, so
    both wings read positive — a fair-comparison detail the spec explicitly calls
    for.
  - 'Full Imprint + theme compliance: first series #009E73 (brand green), second #C475FD
    (lavender), backgrounds #FAF8F1 / #1A1A17, all chrome theme-adaptive. Data colors
    identical across both renders; only chrome flips.'
  - 'Clean KISS code: deterministic hardcoded data (no seed needed), explicit font
    sizes, axes-methods only, correct plot-{theme}.png save with no bbox_inches=''tight''.'
  - 'Strong visual refinement: top/right/left spines removed, bottom kept, subtle
    15% vertical grid behind bars (set_axisbelow), bar edges colored to page background
    for crisp separation.'
  weaknesses:
  - 'DE-03 (Data Storytelling, 3/6): the butterfly shape carries the narrative but
    there is no explicit focal point or emphasis — e.g. the female-outlives-male asymmetry
    at 70-79/80+ is the real insight and could be highlighted (subtle annotation,
    or de-emphasizing the symmetric middle).'
  - 'VQ-05 minor: x-limits at ±max*1.15 leave noticeable empty margin beyond the 8M
    ticks on both far edges; the legend uses the upper-right gap well but the upper-left
    gap is dead space. Tightening to ~±max*1.05 would let the data breathe less wastefully.'
  - 'LM-02 (Distinctive Features, 2/5): negative-value barh for a pyramid is a solid
    but common matplotlib idiom; nothing here is hard to replicate in another library.'
  - 'VQ-01 minor: tick labels at 8pt are on the small side for the ~400px mobile srcset
    variant — still legible, but bumping x/y ticks to ~9pt would harden mobile readability.'
