review:
  strengths:
  - Excellent theme-aware styling with proper light/dark color adaptation
  - Clean KISS code structure with no unnecessary functions or classes
  - Data is realistic, geographically diverse (54-84 year range across continents),
    and factually accurate
  - Readable at full resolution with explicitly-set font sizes (24pt title, 18pt label,
    14pt ticks)
  - No overlapping elements; marker sizing scaled appropriately by data value
  - 'Subtle visual refinement: grid alpha 0.05, spines hidden, generous whitespace'
  weaknesses:
  - 'Chart type deviation: spec requires choropleth (shaded regions), implementation
    provides bubble map/symbolic map with point markers - fundamentally different
    visualization approach'
  - 'Non-approved colormap: RdYlGn (diverging) used for sequential data; style guide
    recommends viridis/cividis (sequential) or BrBG (diverging with meaningful center)'
  - 'Text contrast suboptimal on light-colored markers in dark render: light text
    (#F0EFE8) on yellow markers creates low contrast; text color strategy doesn''t
    account for colormap hues'
  - 'Missing geographic features: no map projection (spec mentions Robinson/Albers),
    no region boundaries, no cartographic elements that define true choropleth'
  - 'Generic design: no custom palette beyond colormap choice, no intentional visual
    hierarchy beyond size variation'
