  - 'Missing data color is not theme-adapted (light #E0E0E0 on both light and dark
    backgrounds)'
  - Missing data visualization doesn't match spec (shows flat color instead of gray/hatched
    pattern)
  - Design is functional but generic using default viridis without customization
