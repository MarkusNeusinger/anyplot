      Background: Warm off-white #FAF8F1 — correct Imprint surface, no pure-white.
      Chrome: Title "90-Min Endurance Ride · bar-heart-rate-zones · julia · makie · anyplot.ai" in bold dark ink, clearly readable. Y-axis label "Time (minutes)" and x-axis label "Heart Rate Zone" in dark INK, readable. Tick labels in INK_SOFT grey — all clearly legible against the cream background. Y-axis gridlines are a barely-there horizontal rule at 40 and 20 — very subtle, correct.
