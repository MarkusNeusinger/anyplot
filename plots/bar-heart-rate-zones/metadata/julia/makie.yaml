      Background: Near-black #1A1A17 — correct Imprint dark surface, no pure black.
      Chrome: Title, axis labels, tick labels all switch to near-white/light-grey tones (INK = #F0EFE8, INK_SOFT = #B8B7B0). All clearly readable against the dark background. No dark-on-dark failure observed. Y-axis gridlines remain barely-there horizontal strokes — correct.
