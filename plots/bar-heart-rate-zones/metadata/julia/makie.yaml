  strengths:
  - Semantic zone colors correctly mapped to closest Imprint palette members (Z1→muted-grey,
    Z2→Imprint blue, Z3→Imprint green, Z4→Imprint ochre, Z5→Imprint red) with clear
    semantic-exception rationale in code comments
  - 'Strong data storytelling: Z2 Endurance bar highlighted with bold label in its
    zone color, callout annotation contextualising the session as a Z2-heavy base
    ride'
  - 'Full spec compliance: all 5 zones in fixed Z1→Z5 order, duration labels above
    each bar, HR boundary legend below, and conventional per-zone colors all present'
  - 'Idiomatic Makie composable layout: Legend in fig[2,1] with PolyElement patches,
    rowsize!/rowgap! for compact but separate legend row'
  - 'Complete theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ygridcolor alpha) correctly flipped; Z1 muted-grey also flips for readability
    on dark surface'
  weaknesses:
  - Legend row is very compact at 8% of figure height (144px rendered), making the
    10pt zone-boundary text (20px at px_per_unit=2) barely legible at full resolution;
    consider increasing rowsize to Relative(0.12–0.14) or labelsize to 11–12
  - Callout annotation ('Base endurance ride · Z2-heavy · 53% of session') uses INK_MUTED
    color at fontsize=11 — too faint against both backgrounds to communicate its storytelling
    intent reliably; increase to INK_SOFT and fontsize=12
  - Percentage labels (second line of 'X min\n53%') are at fontsize=12 (24px rendered),
    one size smaller than the 'X min' line at fontsize=13 — minor but the two-line
    label hierarchy is slightly hard to parse at thumbnail scale
