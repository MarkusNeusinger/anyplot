review:
  strengths:
  - Semantic Imprint palette mapping for heart rate zones (muted anchor for Z1, palette
    positions 3/1/4/5 for Z2–Z5) correctly applies fitness domain conventions while
    staying within palette rules
  - Three-tier x-axis labels (zone ID + name + HR boundary range) provide complete
    reader context without a separate legend — elegant information density
  - Dynamic title font sizing correctly shrinks the title for the long descriptive
    prefix
  - Full theme-adaptive chrome via ANYPLOT_TOKENS throughout; Z1 muted anchor correctly
    adapts between themes as designed
  - D3 gridline-as-separate-axis pattern and group-based multi-line tick labels are
    idiomatic and distinctively D3
  weaknesses:
  - 'DE-03: No visual emphasis on the dominant zone (Z2 at 22:00 = 37% of total session)
    — consider a percentage annotation on the tallest bar, a subtle highlight stroke,
    or a short insight subtitle to guide the viewer''s eye'
  - 'DE-01: No additional typographic hierarchy or storytelling layer to elevate beyond
    a standard bar chart — a bold label or accent color on the peak bar would increase
    sophistication'
  - 'VQ-01 minor: HR range labels at 12px CSS (24px native) are the smallest text
    element; raising to 13–14px CSS would improve mobile-scale readability'
