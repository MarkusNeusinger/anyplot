review:
  strengths:
  - 'Semantic exception correctly applied: fitness-zone color conventions (grey→blue→green→ochre→red)
    use Imprint palette members with documented rationale — matches Garmin/Strava/Polar
    convention exactly as the spec requests'
  - 'Perfect spec compliance: all 5 zones in Z1→Z5 order, duration bar labels, correct
    y-axis, realistic 60-min tempo run data with HR boundaries consistent with max
    HR 185 bpm'
  - 'Theme adaptation is fully correct: t.ink / t.inkSoft / t.grid / t.elevatedBg
    all wired to the right elements; both renders readable with no dark-on-dark or
    light-on-light failures'
  - 'Code quality is exemplary: flat KISS structure, hard-coded deterministic data,
    clean map() for per-bar itemStyle, correct animation:false and no devicePixelRatio
    override'
  - 'ECharts idioms used correctly: rich tooltip formatter with HR range context,
    per-bar itemStyle color, borderRadius on bar tops, multi-line category labels
    via \n, subtext subtitle'
  weaknesses:
  - HR boundary ranges (e.g. '< 111 bpm', '111–130 bpm') are only shown in the tooltip
    and are invisible in the static PNG — the spec says these are optional but including
    them as x-axis secondary tick labels or small annotations below zone names would
    make the static chart more self-contained and closer to the Garmin/Strava/Polar
    reference format
  - Y-axis tick labels already carry the unit ('0 min', '5 min', ...) while the axis
    name is 'Time (minutes)' — this is minor double-encoding; either use plain numeric
    ticks ('0', '5', '10') with the axis name, or drop the axis name
  - 'DE-01 ceiling: rounded bar tops and semantic colors are good but the chart has
    no focal emphasis — the spec mentions ''distribution of training intensity immediately
    readable'' but nothing visually highlights the dominant Z2 block or the high-intensity
    Z4+Z5 combination that characterises a tempo run; a subtle background band or
    emphasis annotation would lift storytelling'
  - 'DE-02 ceiling: no top/right spine removal is explicit (ECharts default hides
    them for category axes), y-axis spine is correctly hidden; could further refine
    by removing the baseline x-axis line (axisLine: {show: false}) for a more minimal
    look'
  image_description: |-
