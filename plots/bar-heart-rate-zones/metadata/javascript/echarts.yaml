      Data: 5 bars left to right — Z1 muted grey (#6B6A63), Z2 Imprint blue (#4467A3), Z3 Imprint brand green (#009E73), Z4 Imprint ochre (#BD8233), Z5 Imprint matte red (#AE3030). Each bar topped with a bold dark "X min" label. Rounded bar corners (4px). Heights: 8, 22, 15, 12, 3 min.
      Legibility verdict: PASS — all titles, labels, tick marks, and bar annotations are clearly readable against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
