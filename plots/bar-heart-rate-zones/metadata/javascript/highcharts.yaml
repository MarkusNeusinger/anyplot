review:
  strengths:
  - 'Correct and well-considered semantic color exception: fitness zone colors (grey/blue/green/ochre/red)
    mapped to closest Imprint palette members with clear code comments documenting
    the rationale'
  - 'Data quality is excellent: physiologically accurate HR ranges (95-190 bpm), exact
    60-minute total, realistic criterium race duration distribution'
  - 'HTML x-axis labels with two-line zone name + bpm range is an elegant Highcharts-specific
    technique using useHTML: true'
  - 'Full spec compliance: all required features (zone colors, Z1-Z5 order, MM:SS
    labels, HR boundary ranges) present'
  - No tooltip, no legend — correct minimalist choices for this chart type; zone names
    on x-axis serve as sufficient legend
  weaknesses:
  - 'Z1 Recovery bar color changes between light and dark renders because the theme-adaptive
    muted anchor is used ("#6B6A63" light / "#A8A79F" dark). This violates the data-colors-identical-between-themes
    rule. Fix: replace the conditional with static "#6B6A63" for both themes — keeps
    Z1 grey without the theme-variant identity shift.'
  - 'Design storytelling underdeveloped (DE-03=3/6): all bars styled identically with
    no focal point. The dominant Z2 Endurance bar (20:00, 33% of session) is not visually
    emphasized. Fix: add one emphasis technique — annotation on the peak bar, a horizontal
    mean reference line, or a distinct data label size for the tallest bar.'
  - 'Minor KISS concern (CQ-01=2/3): toMMSS() helper function and pre-processed seriesData
    array depart from the flat-script structure preferred for JS implementations.'
