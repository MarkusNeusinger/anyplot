review:
  strengths:
  - 'Correct semantic zone colors using Imprint palette members (Z1 muted grey, Z2
    blue #4467A3, Z3 brand green #009E73, Z4 ochre #BD8233, Z5 matte red #AE3030)
    — valid semantic exception since the spec explicitly mandates zone-conventional
    colors'
  - Opacity hierarchy (Z2 Endurance at full opacity, others at 75%) creates a clear
    focal point on the dominant zone, guiding the viewer immediately to the 22-min
    Z2 bar
  - 'Complete spec compliance: all 5 zones in Z1→Z5 order, bar labels (format ''N
    min''), HR boundary ranges as a bottom strip, Y-axis in minutes'
  - Physiologically accurate data — 60-min total (8+22+15+12+3), realistic tempo-run
    zone distribution, valid HR ranges (<125, 126-145, 146-162, 163-174, >174 bpm)
  - 'Idiomatic MUI X usage: colorMap with type=''ordinal'' on xAxis for per-bar coloring,
    barLabel callback for dynamic labels, valueFormatter with ctx.dataIndex for rich
    tooltips — all distinctively MUI X features'
  - Subtitle ('60-minute tempo run — time spent in each training intensity zone')
    and HR ranges strip add narrative depth without cluttering the chart
  weaknesses:
  - 'Z1 Recovery bar label (''8 min'', color #F0EFE8 warm white) on the muted-grey
    bar at 75% opacity in the light theme has ~2.6:1 contrast ratio — below the 3:1
    threshold for large bold text. In dark theme contrast is ~5.7:1 (passes). Fix:
    use a conditional bar label color (dark ink for the grey Z1 bar, warm white for
    the darker-colored bars), or darken the Z1 bar color slightly to improve contrast.'
  - 'HR boundary range strip uses left: 76+60=136 for centering, but the BarChart''s
    band center offset may not align perfectly with the inner left margin of 76px
    — minor positional drift visible at right side of strip.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "bar-heart-rate-zones · javascript · muix · anyplot.ai" at top-left in dark ink, clearly readable. Subtitle in softer dark ink below. Y-axis label "Time (minutes)" in inkSoft, visible. Y-axis tick labels (0–28 in steps of 2) in inkSoft, readable. X-axis zone labels ("Z1 Recovery" through "Z5 Maximum") in bold ink, clearly readable. HR boundary ranges at bottom ("< 125 bpm" through "> 174 bpm") in inkSoft, legible at full resolution.
      Data: Five bars. Z1=muted grey (#6B6A63 at 75% opacity on cream ≈ #8F8E87 effective), Z2=Imprint blue (#4467A3, full opacity), Z3=brand green (#009E73 at 75% opacity), Z4=ochre (#BD8233 at 75%), Z5=matte red (#AE3030 at 75%). Bar labels ("8 min", "22 min", "15 min", "12 min", "3 min") in #F0EFE8 warm white inside each bar. Z2 Endurance is visually dominant (tallest + full opacity). Subtle horizontal grid lines.
      Legibility verdict: PASS with caveat — all chrome readable; Z1 bar label "8 min" (warm white on mixed effective grey ~#8F8E87) has reduced contrast (~2.6:1, below 3:1 for large bold text). All other bar labels and chrome elements fully readable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title and subtitle in light near-white (#F0EFE8 range) — clearly readable against dark background. Y-axis label and tick labels in light inkSoft tone — readable. X-axis zone labels in light ink — readable. HR boundary ranges at bottom in light inkSoft — legible. No dark-on-dark failures detected.
      Data: Bar colors are identical to light render — same Imprint palette members with same opacity values (semantic zone colors unchanged). Z2 Endurance still at full opacity, others at 75%. Bar labels remain in #F0EFE8 warm white; on the dark background, the Z1 grey bar effective color is much darker (~#575650) giving ~5.7:1 contrast for the label — fully passes. Subtle horizontal grid lines in light-opacity rule color.
      Legibility verdict: PASS — all elements readable, no dark-on-dark failures, data colors identical to light render confirming only chrome flipped.
