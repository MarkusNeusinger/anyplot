review:
  strengths:
  - Semantic zone colors mapped to Imprint palette members are an excellent design
    decision matching fitness industry conventions (grey/blue/green/ochre/red) exactly
    as the spec requires
  - 'Perfect spec compliance: zone ordering, per-bar duration labels, HR boundary
    annotations, and theme-adaptive chrome all implemented correctly'
  - Data sums to exactly 60 minutes with physiologically accurate HR ranges — pristine
    data quality
  - Both themes render correctly with no dark-on-dark failures; ThemeProvider chrome
    is handled cleanly
  - colorMap ordinal mapping with barLabel demonstrates solid MUI X-specific knowledge
  weaknesses:
  - 'Bar label color hardcoded to #FAF8F1 (fixed light cream) instead of a theme-adaptive
    token — works in both themes in practice but deviates from best practice'
  - No visual emphasis on dominant Z2 Endurance bar — consider reducing opacity on
    non-dominant bars or adding a reference line at the average to guide the viewer's
    eye
  - Bottom axis spine and x-axis line visible in both renders — removing them would
    lift visual refinement
  - Title/subtitle built with absolute-positioned Box+Typography instead of MUI X
    native title slot (slotProps) — the native approach is more idiomatic
