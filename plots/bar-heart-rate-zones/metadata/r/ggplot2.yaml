review:
  strengths:
  - 'Semantically-driven Imprint palette mapping: Z1=muted(grey), Z2=blue(#4467A3),
    Z3=green(#009E73), Z4=ochre(#BD8233), Z5=red(#AE3030) — all standard HR zone associations
    correctly resolved to Imprint members'
  - Bold bar-value annotations with correct vjust placement, clean KISS code with
    no unnecessary complexity
  - Multi-line x-axis tick labels (zone · name + bpm range on second line, lineheight=1.3)
    convey all required metadata cleanly
  - 'Both themes fully theme-adaptive: INK/INK_SOFT/PAGE_BG tokens applied consistently
    to every chrome element; no dark-on-dark or light-on-light text failures'
  - Correct ggsave canvas (8×4.5in @ 400dpi = 3200×1800px), ragg device, and output
    filenames sprintf('plot-%s.png', THEME)
  weaknesses:
  - 'Z1 bar uses INK_MUTED (theme-adaptive: #6B6A63 light / #A8A79F dark) as its fill
    color — this causes Z1''s data color to differ between the two renders (dark grey
    vs light grey), technically violating the rule that data colors must be identical
    across themes. Consider using a fixed grey (#6B6A63 or #8A8A82) as the Z1 fill
    color regardless of theme, so the bar colour is stable while the chrome around
    it adapts.'
  - DE-01/DE-02 are at baseline — no visual hierarchy enhancements (e.g. subtle alpha
    on Z1/Z2 to de-emphasise vs Z4/Z5, gradient-width bars keyed to intensity, or
    a faint zone-colour background stripe) that would elevate the chart above a generic
    bar chart appearance.
  - 'Y-axis grid lines use full INK color (#1A1A17 / #F0EFE8) at linewidth=0.2mm;
    style guide recommends ~15% opacity for grid rules. The thin linewidth partially
    compensates but the result is slightly crisper than intended. Consider an intermediate
    muted hex (e.g. ''#D0CFC7'' light / ''#3A3A36'' dark) for the grid line color
    to better approximate the 15% opacity rule without needing rgba alpha.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "60-Minute Tempo Run · bar-heart-rate-zones · r · ggplot2 · anyplot.ai" in dark ink at ~12pt, spanning ~65-70% of plot width — fully readable. Y-axis label "Time (minutes)" in dark ink at 10pt. Y-axis tick labels ("0 min" to "25 min") in INK_SOFT at 8pt. X-axis two-line tick labels ("Z1 – Recovery / 100–119 bpm" etc.) at 7.5pt with 1.3 lineheight — readable but slightly compact. All text clearly visible against light background.
      Data: 5 bars in Z1→Z5 order: Z1 dark muted-grey, Z2 blue (#4467A3), Z3 brand-green (#009E73), Z4 ochre (#BD8233), Z5 matte-red (#AE3030). Each bar topped with a bold "X min" label in INK. Horizontal y-grid lines subtle (INK @ linewidth=0.2). No legend.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and all axis/tick labels rendered in light cream (INK=#F0EFE8 / INK_SOFT=#B8B7B0). All text clearly visible against the dark background. No dark-on-dark failure observed. Bar-value annotations appear in INK (light cream) against the dark canvas.
      Data: Bar colors Z2–Z5 are identical to the light render (blue, green, ochre, red). Z1 appears as lighter grey (#A8A79F, the dark-theme INK_MUTED) versus the darker grey in the light render (#6B6A63) — a minor theme-adaptive deviation in the data layer. All 5 bars clearly distinguishable. Brand green #009E73 (Z3) is fully visible on the dark surface.
      Legibility verdict: PASS (minor note: Z1 color differs across themes due to INK_MUTED being theme-adaptive)
