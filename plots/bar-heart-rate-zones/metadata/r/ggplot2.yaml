review:
  strengths:
  - Semantic zone colors (Z1 grey, Z2 Imprint blue, Z3 Imprint brand green, Z4 Imprint
    ochre, Z5 Imprint matte red) correctly apply the spec's domain-convention exception
    and fully match Imprint palette members
  - Alpha intensity gradient (0.55→1.0 from Z1→Z5) adds a meaningful visual metaphor
    — bars saturate as workout intensity increases, creating a readable hierarchy
    without annotations
  - Multi-line x-axis labels combine zone code, zone name, and HR range into a compact
    and informative tick label
  - 'Both themes render correctly: warm off-white (#FAF8F1) light background and near-black
    (#1A1A17) dark background with all chrome tokens properly adaptive'
  - Fully deterministic data with realistic 60-min tempo run profile (total = 60 min,
    Z2-heavy distribution matches a base-endurance session)
  - 'Expert-level ggplot2 idiom: I() identity aesthetic for per-bar alpha avoids a
    separate scale and is idiomatic in the grammar-of-graphics model'
  weaknesses:
  - 'VQ-01 minor: x-axis tick labels at 7.5pt carry three lines of text each (zone
    code, name, HR range) — consider bumping to 8pt to match y-axis ticks and improve
    mobile legibility'
  - 'DE-01 ceiling: implementation is above defaults but falls short of publication-ready
    — the alpha gradient is clever but the overall composition lacks a focal-point
    highlight or a second differentiation layer (e.g. a thin INK-color stroke on the
    top edge of the tallest bar, or a subtle annotation calling out the dominant zone)'
  - 'DE-02 ceiling: spines are removed by theme_minimal but no explicit panel.border
    = element_blank() is set, and the baseline at y=0 could benefit from a light axis.line.x
    to ground the bars'
