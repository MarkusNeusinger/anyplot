review:
  strengths:
  - 'Excellent semantic color mapping: Imprint palette members used for fitness zone
    conventions (grey muted anchor for Z1 recovery, brand green for Z3 aerobic, matte
    red for Z5 maximum) — exactly what the spec mandates and what a fitness app reader
    expects'
  - Rich multi-line x-axis tick labels (bold zone code + name + HR range) using Plotly
    HTML formatting — spec-compliant and informative without needing a legend
  - 'Perfect spec compliance: all 5 zones shown in Z1→Z5 order, duration labels on
    every bar, HR boundary ranges annotated, conventional zone colors all present'
  - 'Perfect data quality: 60-minute total (8+22+15+12+3=60), realistic tempo run
    Z2-dominant distribution, accurate HR ranges (< 115 bpm through > 171 bpm)'
  - 'Both themes render correctly: warm off-white (#FAF8F1) background in light, warm
    near-black (#1A1A17) in dark; all chrome tokens flip appropriately; data colors
    identical across themes'
  - 'Clean code structure: KISS layout with no functions or classes, deterministic
    data, only two imports used'
  weaknesses:
  - Excessive bottom margin (b=110) creates ~25% of canvas height as empty space below
    the x-axis tick labels in both renders — reduce bottom margin to b=60–75 to bring
    the plot closer to center and improve canvas utilization (VQ-05 lost 2 pts)
  - 'DE-01 (Aesthetic Sophistication 5/8): chart is a well-configured bar chart but
    lacks a strong design statement — consider removing the Y-axis spine line to go
    full minimal, adding a faint horizontal emphasis line at the tallest bar, or adjusting
    bar colors to have subtle ink-color outlines for definition on lighter zones (Z1
    grey on light background has low contrast against #FAF8F1)'
  - 'DE-02 (Visual Refinement 4/6): the horizontal grid is present but spines (left
    and bottom axis lines) are not explicitly hidden — consider removing the left
    and bottom linecolor to go spine-free, which would modernize the look; bargap=0.35
    is fine but could be increased to 0.4 for more breathing room'
  - 'LM-02 (Distinctive Features 3/5): the HTML multi-line tick labels and hovertemplate
    are good Plotly-specific features, but the chart doesn''t exploit Plotly''s most
    distinctive capabilities — consider using `go.Bar` with `customdata` for richer
    hover info, or adding a reference annotation line (e.g. 80/20 polarized split
    marker) using `fig.add_hline()` which is native Plotly'
