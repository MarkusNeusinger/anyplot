    no fake interactivity'
  weaknesses:
  - No visual focal point or narrative emphasis — could highlight the dominant Z2
    bar (22 min endurance) or add a total-time summary annotation to anchor the training
    story
  - Design is functional but not ambitious — a subtle background stripe per zone or
    a reference annotation for target zone could elevate from solid to sophisticated
  - Bar value labels use manual ax.text() instead of the more idiomatic modern ax.bar_label()
    (available since matplotlib 3.4)
  - Multi-line x-tick labels at fontsize=8 are on the small side for a 1800px canvas
    — fontsize=9 would be slightly more comfortable without overlap risk
