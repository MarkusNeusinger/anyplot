  - 'Semantic zone color mapping using Imprint palette members (INK_MUTED for Z1 grey,
    #4467A3 for Z2 blue, #009E73 for Z3 green, #BD8233 for Z4 ochre, #AE3030 for Z5
    red) — justified by spec''s explicit zone color requirements and fitness domain
    convention'
  - 'Excellent spec compliance: all 5 zones with HR boundary ranges embedded in x-axis
    tick labels, value annotations on bars, correct Z1→Z5 ordering, realistic 90-minute
    polarized cycling session data'
  - 'Idiomatic pygal usage: per-bar color dicts ({"value": x, "color": c}), custom
    Style object with full theme token coverage, html-export alongside PNG, rounded_bars=10,
    value_formatter lambda'
  - Title scaled via linear formula (66 × 67/len(title)) to prevent overflow — proper
    length-aware sizing
  - 'Theme adaptation works correctly in both renders: warm off-white bg in light
    (#FAF8F1), near-black in dark (#1A1A17), all chrome tokens (INK, INK_SOFT, INK_MUTED)
    applied to foreground/foreground_strong/foreground_subtle'
  - Total session context embedded in y_title ("90 min total") adds useful data storytelling
    without extra annotation clutter
  weaknesses:
  - label_font_size=40 for x-axis tick labels is below the style-guide default of
    56 for pygal — the rotated zone+HR labels are readable but slightly smaller than
    optimal; consider increasing to ~48–52 to better balance with the major_label_font_size=44
    y-axis ticks
  - DE-02 limited by pygal's characteristic full-border SVG frame — the plot area
    shows the standard pygal box frame on all four sides with no way to remove spines
    via the API, which reduces visual refinement compared to matplotlib/plotly implementations
  - DE-01 and DE-03 are above baseline but not exceptional — the chart lacks visual
    emphasis on the dominant Z2 bar (45 min / 50% of session); adding even a subtle
    stroke or distinct border on the Z2 bar to call out 'most time here' would lift
    the storytelling score
