review:
  strengths:
  - 'Semantic Imprint palette mapping is textbook correct: each zone gets the Imprint
    palette member that best matches its conventional color (grey→muted anchor, blue→#4467A3,
    green→#009E73, ochre→#BD8233, red→#AE3030)'
  - Multi-line x-tick labels (zone ID / full name / HR boundary) are dense but well-organized
    and eliminate the need for a separate legend
  - Both light and dark renders are fully legible with no dark-on-dark issues; chrome
    tokens thread correctly through all elements including title, axis labels, tick
    labels, and bar labels
  - 'Perfect spec compliance and data quality: realistic 60-minute tempo run with
    physiologically accurate HR zone boundaries (Z1 <111 bpm through Z5 >166 bpm)'
  - Clean, maintainable KISS code structure with 100% code quality score; no fake
    interactivity, deterministic data, current seaborn API
  weaknesses:
  - 'Core plot uses ax.bar() (matplotlib primitive) instead of seaborn''s native sns.barplot()
    — fix: build a DataFrame with zone data and call sns.barplot(data=df, x=''zone'',
    y=''minutes'', palette=ZONE_COLORS, ax=ax, errorbar=None), then restore x-tick
    labels with ax.set_xticks/set_xticklabels after the barplot call'
  - No seaborn-distinctive visualization features leveraged at all; beyond set_theme()
    and despine(), the implementation is indistinguishable from pure matplotlib code
    — using sns.barplot() resolves both LM-01 and LM-02
  - 'DE-01 could be elevated with a minor polish pass: e.g., add a subtle highlight
    or stronger visual emphasis on the dominant zone (Z4 Threshold, 20 min) to strengthen
    the data story'
