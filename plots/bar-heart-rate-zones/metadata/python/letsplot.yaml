    rich interactive HTML tooltips per zone'
  - 'Clean, KISS structure: no functions/classes, all imports used, deterministic
    hardcoded data, correct ggsize(800,450)+scale=4 canvas'
  weaknesses:
  - 'Z1 bar color uses theme-adaptive INK_MUTED (#6B6A63 light / #A8A79F dark), so
    the data colour changes between renders — use a fixed grey hex (e.g. #6B6A63 or
    #808080) so the zone identity is identical in both themes'
  - 'Design emphasis is absent: Z2 dominance (37% of training time) is not visually
    reinforced — consider a bolder border or a background annotation band to highlight
    the key coaching insight'
  - geom_text bar labels (size=4mm) may read small on mobile (~400px scaled) — size=5
    would improve mobile legibility without crowding
