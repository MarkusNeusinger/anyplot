  - 'Semantic zone palette: all five zone colors drawn from Imprint palette members
    with documented semantic exception (grey/blue/green/ochre/red matching fitness-platform
    convention)'
  - 'Full spec compliance: dual-metric bar labels (minutes + %), multi-line x-axis
    ticks showing zone code + name + HR boundary, subtitle contextualising the session'
  - 'Excellent theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, INK_MUTED, RULE all
    correctly branched on ANYPLOT_THEME — both renders pass the readability checklist'
