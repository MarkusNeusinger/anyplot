review:
  strengths:
  - 'Idiomatic ECharts approach: uses the `custom` series with a `renderItem` callback
    to draw the flame graph rectangles — the right mechanism for a chart type ECharts
    has no native series for.'
  - Brand green (#009E73, Imprint position 1) anchors the root `main` frame, satisfying
    the first-categorical-series rule while preserving the warm flame palette above
    and creating a clear visual focal point.
  - 'Both renders are theme-correct: warm off-white #FAF8F1 background in light, warm
    near-black #1A1A17 in dark, with chrome (title/axis/ticks) flipping cleanly while
    data colors remain identical between themes.'
  - Function-name labels rendered inside bars when width > 70 px, with narrow bars
    left unlabelled — sensible truncation strategy that keeps the plot readable at
    full resolution.
  - 'Realistic, neutral synthetic profile: a plausible web-service call tree (`main`
    → `init_database`/`process_requests`/`render_template`/...) with ~58 unique stack
    traces, totals folded up so bar width encodes self + descendant time.'
  - 'Deterministic and self-contained: no fetch, no RNG — the profile tree is hard-coded
    and the layout is a pure function of it, so renders are bit-stable across runs.'
  weaknesses:
  - 'Dark-mode ''light-on-light'' contrast on the pale bars: function-name labels
    use `fill: t.ink` (a light off-white in dark mode) on top of #DDCC77 (sandy yellow)
    and #C475FD (lavender) fills, which are both already light. Labels like ''seed_data'',
    ''create_pool'', ''parse_request'', ''interpolate_values'' read with noticeably
    reduced contrast in `plot-dark.png` versus `plot-light.png`. Pick the label color
    per-bar from the fill''s luminance (dark text on light fills, light text on dark
    fills) instead of blindly inheriting the theme''s ink token.'
  - 'Palette includes lavender #C475FD, which contradicts the spec''s ''warm color
    palette (yellows, oranges, reds) following the conventional flame graph aesthetic''.
    The implementation comment acknowledges the trade-off, but lavender reads as cool/purple
    and breaks the warm-flame visual convention. Consider replacing it with the Imprint
    amber token (`t.amber`) or a second ochre/red shade so all non-root frames stay
    warm.'
  - Adjacent in-bar labels visually butt against each other at depth 3 around x≈460–560
    ('serialize_response' and 'transform_result' look almost merged because each label
    is anchored insideLeft with distance=8 but the rectangles abut). Increase the
    left-inset distance, or hide the label when the next rectangle's text would start
    within ~4 px of the current label's right edge.
  - Bar count is at the low end of the spec's 50–500 unique stack traces (~58). Not
    a failure, but enlarging the tree (deeper or wider sibling fan-out) would showcase
    the flame-graph's strength at visualising long tails of small frames.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1, no pure-white surface anywhere. Canvas reads landscape 3200×1800.
      Chrome: Title "flamegraph-basic · javascript · echarts · anyplot.ai" at top center in dark ink, clearly readable. X-axis title "Samples (proportional CPU time)" and Y-axis title "Call stack depth" both in dark ink. Tick labels (0, 100, 200, 300, 400, 500, 636 on X; 0-6 on Y) in soft dark gray, clearly readable. No spines or gridlines — clean.
      Data: Root bar `main` at depth 0 spans the full width in brand green #009E73 (Imprint position 1). Stacked frames above use the warm Imprint subset — ochre #BD8233, matte red #AE3030, sandy yellow #DDCC77, lavender #C475FD — keyed deterministically off function name. 1 px page-bg-colored strokes separate adjacent rectangles. In-bar function labels ("init_database", "process_requests", "create_pool", "route_handler", "sql_execute", "decode_json", "query_users", etc.) appear in dark ink only where bar width > 70 px.
      Legibility verdict: PASS — all chrome text is clearly readable against the warm off-white background; in-bar dark labels contrast well against every warm fill.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17, no pure-black anywhere. Same landscape canvas.
      Chrome: Title, axis titles, and tick labels now use light ink against the dark background, all clearly readable. Theme tokens are threaded through correctly.
      Data: All bar fill colors are identical to the light render (root green, ochre, matte red, sandy yellow, lavender) — only chrome flipped, as required. In-bar labels are now light ink.
      Legibility verdict: FAIL (mild) — labels on dark-red and ochre fills are fine, but light ink labels on the pale lavender #C475FD bars ("create_pool", "parse_request", "interpolate_values") and on the sandy yellow #DDCC77 bars ("seed_data", "init_database") read as light-on-light with noticeably reduced contrast versus light mode. Still legible at 3200×1800 but not at smaller mobile sizes. This is the symmetric counterpart of the dark-on-dark failure mode in §5c and should be fixed by picking label color per-bar from fill luminance instead of inheriting the theme's ink token.
