review:
  strengths:
  - 'Clean idiomatic ECharts custom-series implementation: a single chart.setOption
    with a renderItem callback computes per-rectangle coordinates from a value-encoded
    data array — exactly the recommended pattern for non-built-in chart types like
    flame graphs.'
  - 'Smart palette anchoring: depth-0 root frame uses Imprint brand green (#009E73)
    to satisfy the ''first categorical series'' rule, while depths 1+ pick from a
    warm flame subset (ochre #BD8233, matte red #AE3030, amber #DDCC77) so the conventional
    flame-graph aesthetic survives without diluting palette compliance.'
  - Per-bar label ink is computed from WCAG relative luminance of the fill, so 'main'
    gets light-on-green text and amber/ochre/red bars get appropriate dark/light text
    regardless of theme — no dark-on-dark or light-on-light failures.
  - Hash-based color assignment keyed off function name keeps repeated frames identically
    colored across the chart (e.g. the 'parse_request' frames), aiding visual identification.
  - Theme tokens (t.ink, t.inkSoft, t.pageBg) thread correctly through title, axis
    names, tick labels, and bar strokes — chrome flips cleanly between themes while
    data colors stay identical.
  - 'Conservative in-bar labeling: estTextWidth gate (width > nameLen*7.2 + 28) only
    labels bars that actually fit the text, avoiding the classic flame-graph overflow
    problem.'
  - Deterministic in-memory data tree (no fetch, no RNG) with bottom-up total folding
    via a recursive computeTotals — meets reproducibility requirements without seeded
    RNG.
  weaknesses:
  - 'The 1px stroke set to t.pageBg around every rectangle reads as a visible seam
    between adjacent siblings — on the dark render the stroke is near-black (#1A1A17)
    which actually creates a clear gutter pattern that looks more like a packed treemap
    than the gap-free flame graph the spec calls for (''directly adjacent with minimal
    or no gaps between siblings''). Consider stroke: ''none'' or a thinner lineWidth,
    or use a theme-neutral hairline only between non-sibling neighbors.'
  - 'Y-axis is treated as a continuous numeric axis (type: ''value'' with interval
    1, tick label formatter hides non-integers), which is a workaround that achieves
    the right look but produces a tick at 6 on top of the empty row above the deepest
    frame — the axis runs 0..maxDepth+1 leaving a labeled ''6'' on an empty strip.
    A category axis or capping max at maxDepth (and shifting depth → row mapping)
    would cleanly show only the depths that exist.'
  - 'DE-03 (visual hierarchy): every depth-0 cell is uniform green and every upper
    frame is one of three warm hues with no encoding of ''hot path'' (largest self-time
    or deepest stack) — the conventional flame-graph reading ''tallest narrow tower
    = bottleneck'' is preserved, but there is no extra emphasis on the dominant call
    path (sql_execute, scan_index) that would turn the chart from a faithful flame
    graph into a story-telling one. A subtle luminance bump or outline on the top-N
    hottest frames would lift DE-03.'
  - The seam/stroke is also why several narrow bars at the right edge (e.g. the four
    depth-4 rectangles between samples ~600–636) read as nearly empty strokes only
    — the bar fills are so thin that the 1px page-bg stroke consumes most of the rectangle.
    At those widths the stroke effectively erases the bar.
  - Hard-coded warmColors[] (BD8233 / AE3030 / DDCC77) duplicates palette values inline
    rather than pulling them from t.palette by index — a minor maintainability nit;
    if the Imprint palette ever shifts hues, this implementation will drift from the
    rest of the catalog.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "flamegraph-basic · javascript · echarts · anyplot.ai" rendered in dark ink, comfortably centered at the top. Axis names "Samples (proportional CPU time)" (bottom) and "Call stack depth" (rotated, left) plus tick labels (0, 100, 200, ..., 636 on x; 0..6 on y) all clearly readable in dark text against the warm background. All chrome PASS.
      Data: Bottom row at depth 0 is a single wide bar in brand green (#009E73) labeled "main" — first categorical color is correct. Depths 1–6 are filled from a warm three-color flame subset: ochre (#BD8233), matte red (#AE3030), amber/yellow (#DDCC77). Function name labels (init_database, process_requests, route_handler, query_users, transform_result, sql_execute, seed_data, create_pool, run_migrations, parse_request) appear inside bars wide enough to fit the text, with per-bar label ink chosen for contrast (light text on ochre/red, dark text on amber). A subtle 1px stroke in page-bg color separates each rectangle.
      Legibility verdict: PASS — all text readable, no overlaps, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black surface consistent with #1A1A17 — not pure black, not light.
      Chrome: Title, axis names, and tick labels all render in a light ink against the dark background and are clearly readable. No dark-on-dark failures. All chrome PASS.
      Data: Identical color assignments to the light render — brand green main bar at depth 0, same ochre/red/amber subset at higher depths, same per-bar labels with luminance-driven ink. Only the inter-rectangle stroke (page-bg color, now near-black) flips with the theme, which is correct theme adaptation but produces a more visible seam between adjacent siblings than on the light render.
      Legibility verdict: PASS — all text readable, data colors stable across themes, chrome flipped correctly.
