review:
  strengths:
  - Uses d3.hierarchy + d3.partition idiomatically — the canonical d3 pattern for
    flame-graph layout that would require manual work in almost any other JS library.
  - 'Perfect Imprint palette compliance: top module (http_handler) gets #009E73, the
    next two modules (worker, runtime_gc) follow canonical palette order, and the
    ''main'' root is rendered with a theme-adaptive muted anchor so the categorical
    pool stays clean.'
  - 'Theme chrome is correctly threaded through tokens — light render is on #FAF8F1
    with dark ink, dark render is on #1A1A17 with light ink; data colors are identical
    across themes as required.'
  - Thoughtful per-fill text-color picker (FILL_TO_TEXT map) ensures function labels
    stay readable on every palette swatch instead of using a single luminance heuristic
    that misclassifies ochre and cyan.
  - Function-name labels truncate cleanly with an ellipsis when the bar is too narrow,
    with a hard cutoff at <3 chars so narrow bars don't get illegible stubs.
  - 'Title is exactly the required format: ''flamegraph-basic · javascript · d3 ·
    anyplot.ai'', and the subtitle explains that bar width ∝ time in stack — strong
    data storytelling cue.'
  - Canvas is 3200×1800 (landscape, exact target) and svg is sized from window.ANYPLOT_SIZE
    — no hard-coded pixel dimensions.
  weaknesses:
  - Stack-trace count (32 unique stacks) is below the spec's stated range of 50–500.
    Add ~20 more synthetic stacks (e.g. extra worker job paths or a second http endpoint
    cluster) so the data sits inside the spec's lower bound.
  - Title fontsize 22px renders the mandated long title at roughly ~30% of the 3200px
    width — visually small relative to the canvas. Consider bumping to 26–30px so
    the title comfortably occupies ~50–70% of plot width per the proportional-sizing
    guidance.
  - 'Design Excellence is solid but not exceptional: the bars themselves are flat
    fills with only a 1px page-bg stroke separating siblings. Consider a subtle hierarchy
    cue (e.g. slightly darker shade for deeper frames, or a soft inner shadow on the
    root) to lift DE-01 beyond ''well-configured defaults''.'
  - buildTree includes an IIFE-based post-processing strip() pass over the tree that's
    slightly more cleverness than KISS calls for; inlining the cleanup into the build
    loop would shorten the data-prep block.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), no pure white anywhere — matches the Imprint light surface.
      Chrome: Title "flamegraph-basic · javascript · d3 · anyplot.ai" rendered in dark ink at top center, easily readable.
        Legend below the title shows three module swatches (http_handler in #009E73, worker in #C475FD, runtime_gc in #4467A3) with dark labels.
        X-axis along the bottom shows cumulative-sample tick labels 0..1,000 in soft ink (#6B6A63-ish) and a one-line caption "Cumulative CPU samples (1,015 total) — bar width ∝ time in stack" centered beneath the axis. All chrome is readable.
      Data: 7 horizontal rows of bars stacked bottom-to-top. Bottom row is a single full-width "main" bar in muted gray (the theme's soft anchor, outside the categorical pool). Above it, the categorical layer is split into http_handler (green, dominant), worker (lavender), and runtime_gc (blue) — first series is correctly #009E73. Function-name labels are baked into wide-enough bars (e.g. dispatch, get_user, db_query, db_transaction, execute, deserialize_rows, process_job, aggregate_m…, mark_ph…); narrow bars use a "…" ellipsis or omit text entirely. Text color is picked per-fill for contrast (light text on green/blue/lavender-rose, dark text where the swatch is light).
      Legibility verdict: PASS — every chrome element and every label inside a wide bar reads cleanly against the warm-off-white surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), no pure black — matches the Imprint dark surface.
      Chrome: Title at top is rendered in light ink, legend swatches identical to the light render with light labels, X-axis ticks and caption all in light soft-ink. No dark-on-dark text anywhere — title, legend labels, tick labels, and subtitle are all clearly readable against the dark surface.
      Data: Colors are pixel-identical to the light render — http_handler stays #009E73, worker stays #C475FD, runtime_gc stays #4467A3, and the "main" root bar uses the dark-theme muted anchor (light gray). Only the chrome flipped; the data palette did not. Brand green #009E73 remains highly visible against the dark surface.
      Legibility verdict: PASS — no dark-on-dark failures, all text reads.
