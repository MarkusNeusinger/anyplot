review:
  strengths:
  - 'Color now meaningfully encodes self-time hotness via three Imprint warm anchors
    (#DDCC77 amber ≤10, #BD8233 ochre ≤24, #AE3030 matte red >24), so the actual CPU
    hotspots — executeQuery (92), compileTemplate (28), resampleImg (26), renderHTML
    (24) — pop out as red focal points instead of being hashed at random.'
  - 'Y-axis numeric tick labels are now hidden (`ticks: { display: false }`); the
    rotated y-title ''Call stack depth (root → leaf)'' carries the meaning and the
    bar stacking shows depth visually, eliminating the redundant chrome flagged in
    attempt 1.'
  - Call-stack tree now contains 54 unique frames (main → backgroundJobs/runServer
    with auth, DB, render, gc, image-resize subtrees), comfortably inside the spec's
    50–500 range and demonstrating the density a flame graph is built for.
  - 'Helper-function surface is reduced to just two: `visit` (necessary recursive
    DFS for tree → frames) and `colorFor` (3-line tier threshold) — the FNV hash and
    luminance threshold from attempt 1 are gone, keeping the snippet KISS.'
  - 'Per-tier text contrast is explicit and correct: `#1A1A17` ink on the amber/ochre
    bars, `#FFFDF6` on the matte-red bars — readable in both light and dark themes
    without relying on a luminance heuristic.'
  - Custom `afterDatasetsDraw` plugin idiomatically extends Chart.js with `scale.getPixelForValue`
    and `chartArea` for coordinate transforms — the canonical escape hatch when Chart.js
    has no native chart type for the spec.
  - Data colors are identical between light and dark renders; only chrome (background,
    title, ticks, grid, separator hairlines via `t.pageBg`) flips — theme adaptation
    correct.
  - Subtitle explicitly states `bar width = samples · color = self-time tier · horizontal
    order is arbitrary, not temporal`, preventing the most common misreading of flame
    graphs and now also documenting the new color encoding.
  - Canvas is exactly 3200×1800 landscape; title spans ~70% width as expected for
    the mandated long format; no clipping or overflow on either render.
  weaknesses:
  - 'DE-01 minor: The three-tier color encoding is a clear upgrade over hashing, but
    the boundaries (≤10, ≤24, >24) are coarse — frames at 22 samples (gzipCompress)
    and 28 (compileTemplate) land in different tiers despite being similarly hot.
    A continuous warm gradient (e.g. `t.seq` or interpolated across the three anchors)
    would let the eye rank hotness more precisely instead of bucketing.'
  - 'LM-01 minor: Most actual flame-graph geometry is drawn in raw `ctx.fillRect`
    / `ctx.fillText` inside the plugin; Chart.js really only contributes title/subtitle/axes/grid
    chrome. This is the right approach for a non-native chart type, but it means the
    implementation does not exercise Chart.js''s higher-level dataset/scale features
    deeply — closer to a canvas-on-Chart.js scaffold than full Chart.js mastery.'
  - 'DE-02 minor: The single dataset has a placeholder `data: depthLabels.map(() =>
    0)` plus invisible fill/border colors purely to keep Chart.js''s bar pipeline
    happy. Functional and well-commented, but a slight hack — a non-deduction since
    there''s no cleaner option in Chart.js core for this case.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white around #FAF8F1 — the correct Imprint light surface, not pure white.
      Chrome: Title "flamegraph-basic · javascript · chartjs · anyplot.ai" is bold dark ink, clearly readable.
        Subtitle "Simulated CPU profile · bar width = samples · color = self-time tier · horizontal order is arbitrary, not temporal" is in muted ink-soft italic, fully readable.
        Y-axis title "Call stack depth (root → leaf)" rotated 90° on the left in dark ink, readable. Numeric y-tick labels are correctly hidden (the attempt-1 weakness was fixed).
        X-axis title "Samples" centered below the plot in dark ink. X-axis tick labels (0, 100, 200, 300, 400, 500, 554) are dark and readable.
        Subtle vertical grid hairlines in the Imprint grid token color — visible but not dominant.
      Data: Stacked horizontal bars layered bottom-up — depth 0 "main" full width (554 samples, amber), depth 1 splits "runServer" + "backgroundJobs", up through "handleRequest", "parseHeaders/routeRequest/writeResponse" etc. to leaves at depth 6/7. Colors map to self-time tiers: amber #DDCC77 for low (≤10), ochre #BD8233 for medium (≤24), matte red #AE3030 for the actual hotspots (executeQuery at 92, compileTemplate at 28, resampleImg at 26). Function names sit inside any bar wide enough (≥60 px); narrower bars truncate with an ellipsis ("dbFe…", "compil…", "rende…", "gzip…", "resam…", "parseH…", "write…") — readable, no overlap. No #009E73 brand green — documented warm-palette semantic exception for the conventional flame-graph aesthetic.
      Legibility verdict: PASS — all chrome and bar-internal text is clearly visible against the warm off-white background; dark ink on amber/ochre bars is readable, light ink on matte-red bars is readable, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black around #1A1A17 — the correct Imprint dark surface, not pure black.
      Chrome: Title is rendered in light Imprint ink against the dark background, clearly readable.
        Subtitle is light ink-soft italic, readable.
        Y-axis title "Call stack depth (root → leaf)" in light ink, readable. Numeric y-ticks hidden (as in light). X-axis title "Samples" and X-axis tick labels in light ink, readable.
        Subtle grid hairlines visible against the warm dark surface; pageBg-coloured hairlines between sibling bars are dark and tidy.
      Data: Bar fill colors are IDENTICAL to the light render — same warm Imprint anchors at the same positions (main = amber, executeQuery = matte red, compileTemplate = matte red, resampleImg = matte red, etc.). Only the chrome flipped. Inside-bar text contrast preserved: dark #1A1A17 on amber/ochre bars (still readable because amber is light enough), white #FFFDF6 on the matte-red bars (e.g. white "executeQuery", "compil…", "rende…", "resam…").
      Legibility verdict: PASS — no dark-on-dark failures; title, axis title, ticks, and every visible bar-internal label are readable; the warm bar colors remain clearly distinguishable from the warm near-black background.
