review:
  strengths:
  - Custom Chart.js `afterDatasetsDraw` plugin cleanly renders the flame graph on
    top of an invisible bar chart, reusing the library's title/scales/grid chrome
    instead of building everything from scratch — genuinely idiomatic plugin pattern.
  - 'Warm palette (#DDCC77, #BD8233, #AE3030) draws from Imprint''s three warm anchors
    rather than inventing arbitrary yellows/oranges/reds, satisfying both the spec''s
    Brendan-Gregg aesthetic and the style guide''s semantic-exception rule.'
  - Data colors are identical between light and dark renders; only chrome (background,
    title, ticks, labels, grid) flips — theme adaptation is correct.
  - Per-frame text contrast is computed from per-bar luminance (`textOn`), so dark
    labels land on amber bars and light labels land on the matte red — readable in
    both themes.
  - Realistic web-API request handler tree with auth middleware, DB query, and template
    render stages; neutral domain, plausible sample counts (4–78 per frame).
  - Bar labels truncate with an ellipsis when the bar is too narrow, and the 60 px
    threshold suppresses labels on tiny frames so nothing overlaps.
  - Subtitle explicitly states `bar width = samples · horizontal order is arbitrary,
    not temporal`, which prevents the most common misreading of flame graphs.
  - Canvas dimensions are exactly 3200×1800 landscape; layout is balanced with clean
    inner padding and no clipping.
  weaknesses:
  - 'DQ-01: The call-stack tree contains only ~20 unique frames, well below the spec''s
    stated size of 50–500 unique stack traces. Broaden the simulated profile (more
    sibling branches, deeper leaf subtrees, a second top-level child of `main`) so
    the flame graph demonstrates the density it is designed for.'
  - 'DE-03: Frame colors are picked by hashing `name + depth`, so hue carries no signal
    about which frames are hot. Convention is that a flame graph''s color is decorative,
    but storytelling would improve if the warm palette was mapped to a meaningful
    axis — e.g. depth, or a `self`-time threshold — so `executeQuery` (the actual
    hotspot at 78 samples) reads as the focal point rather than being one red box
    among several.'
  - 'DE-02: The y-axis still shows numeric depth tick labels (0–6) on the left, which
    duplicate information already encoded by the visible bar stacking. Consider hiding
    y-tick labels (`ticks: { display: false }`) and relying on the rotated axis title
    alone — would reduce chrome noise and let the bars breathe.'
  - 'VQ-01 minor: Bar-internal text uses a hard-coded system font stack and the `textOn`
    luminance threshold of 0.5 puts dark `#1A1A17` text on the amber `#DDCC77` bars.
    Contrast is acceptable but not great; raising the threshold (e.g. 0.6) or switching
    amber-bar text to a slightly darker ink would tighten legibility at the 400 px
    mobile size.'
  - 'CQ-01: Helper functions `visit`, `warmFor`, and `textOn` are reasonable for the
    tree-flattening and color-mapping work, but `textOn` (3 lines of luminance math)
    and `warmFor` (FNV-style hash) could be inlined or replaced with simpler logic
    to keep the snippet flatter — the spec implementation style favors KISS over extensibility
    hooks.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white around #FAF8F1 — the correct Imprint light surface, not pure white.
      Chrome: Title "flamegraph-basic · javascript · chartjs · anyplot.ai" is dark and bold at the top, clearly readable.
        Subtitle "Simulated CPU profile · bar width = samples · horizontal order is arbitrary, not temporal" is in muted ink-soft italics, readable.
        Y-axis title "Call stack depth (root → leaf)" rotated 90° on the left, dark ink, readable.
        Y-axis tick labels (numeric depths 0–6) and X-axis tick labels (0–378 in increments of 50) are dark, readable.
        X-axis title "Samples" sits centered below the plot, readable.
        Grid lines are subtle vertical hairlines in the Imprint grid token color — visible but not dominant.
      Data: Stacked horizontal bars layered bottom-up from "main" (depth 0, full red bar at 378 samples) up through "runServer", "handleRequest" (amber), down to leaves like "executeQuery" (ochre, 78 samples) and "renderHTML" (red, 24 samples). Colors drawn from the warm Imprint anchors #DDCC77 (amber), #BD8233 (ochre), #AE3030 (matte red). Function names appear inside each wide-enough bar; "writeR…" truncates with an ellipsis. No #009E73 brand green — this is the documented warm-palette semantic exception for flame graphs.
      Legibility verdict: PASS — all chrome and bar-internal labels are clearly visible against the warm off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black around #1A1A17 — the correct Imprint dark surface, not pure black.
      Chrome: Title is rendered in light Imprint ink against the dark background, clearly readable.
        Subtitle is in muted light ink-soft italics, readable.
        Y-axis title and tick labels in light ink, readable. X-axis title and tick labels in light ink, readable.
        Grid hairlines are subtle but visible against the warm dark surface.
      Data: Bar colors are IDENTICAL to the light render — same warm anchors at the same positions (main = red, runServer = ochre, handleRequest = amber, parseHeaders = red, …). Only the chrome flipped. Inside-bar text contrast is preserved: dark text on amber/ochre bars, white text on the matte-red bars (e.g. white "main", white "parseRows").
      Legibility verdict: PASS — no dark-on-dark failures; title, axis labels, ticks, and bar-internal labels are all readable; the warm bar colors remain clearly distinguishable from the warm near-black background.
