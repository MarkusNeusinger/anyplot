review:
  strengths:
  - Excellent flame graph implementation using columnrange inverted — creative and
    effective approach
  - 'Intelligent label fitting: calculates pixel width per bar and shows full label,
    name-only, truncated, or nothing based on available space'
  - Professional warm color palette with 15 distinct flame colors and deterministic
    color assignment
  - Realistic CPU profiling data with meaningful function names and plausible call
    hierarchy
  - Clean code structure with iterative (non-recursive) stack traversal
  - White monospace text with rgba outline for readability on colored backgrounds
  weaknesses:
  - Some empty space at bottom of canvas could be utilized better
  - Warm palette is conventional but not colorblind-optimized
  - Could have more stack traces to match spec suggested 50-500 range
  image_description: 'The plot displays a flame graph visualization of CPU profiling
    data for web server request handling (668 samples). The chart uses Highcharts''
    columnrange series type in inverted mode to create horizontal bars stacked bottom-to-top.
    The root function "main (100.0%)" spans the full width at the bottom in a warm
    orange. Above it, "process_request (85.8%)", "log_metrics (9.0%)", and "gc_collect"
    are visible. The hierarchy continues upward through parse_headers, authenticate,
    handle_route (56.9%), query_database (29.5%), render_template (20.4%), and leaf
    functions like fetch_rows (14.3%), compile_template, serialize_json, etc. Colors
    use a warm flame palette of yellows (#F4C430, #FFD700), oranges (#E25822, #D4602E),
    and reds (#CC3300, #B8301C). Function names are displayed in white monospace font
    with dark text outlines inside bars, with intelligent truncation (ellipsis) for
    narrow bars. The title "flamegraph-basic · highcharts · pyplots.ai" appears at
    top center in bold 48px, with a subtitle showing sample count. The "Stack Depth"
    axis label is on the left. No legend is shown (appropriate for this chart type).
    Layout fills most of the canvas with some empty space at the bottom.'
