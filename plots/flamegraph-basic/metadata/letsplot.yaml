  - Color gradient could use more distinct intermediate steps for better depth discrimination
  image_description: The plot displays a flame graph with a light gray (#fafafa) background.
    At the bottom, the widest bar labeled "main" spans nearly the full width in pale
    yellow. Above it, "init_config" (narrow, yellow) and "process_request" (wide,
    yellow-orange) sit at depth 1. Depth 2 shows "compute" (wide, orange), "parse_input"
    (medium, orange), and "serialize" (medium, orange), with thin slivers for "cleanup"
    and "flush_cache" on the far left. Depth 3 has "aggregate", "matrix_mult", "transform",
    "tokenize", "compress", and "to_json" in orange-red. The topmost depth shows "dot_product"
    and "normalize" in red, with tiny unlabeled bars for "scale" and "validate". Function
    names appear inside bars in bold dark text. White borders separate rectangles.
    The title "flamegraph-basic · letsplot · pyplots.ai" is centered at the top in
    bold dark text. No axes or grid are shown (theme_void). The warm yellow-to-red
    color gradient effectively conveys the "flame" metaphor with deeper call stack
    levels rendered in hotter colors.
