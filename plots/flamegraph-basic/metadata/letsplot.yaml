  image_description: The plot displays a flame graph on a warm off-white (#f5f5f0)
    background. At the bottom, the widest bar "main" spans the full width in bright
    yellow (#FFD54F) with a dark red (#BF360C) border. Above it at depth 1, narrow
    muted bars for "cleanup" and "init_config" sit on the left in pale yellow, while
    the wide "process_request" bar dominates in saturated amber (#FFB300) with a dark
    red border. At depth 2, "compute" is the widest bar in saturated orange (#FB8C00)
    with dark red border, flanked by muted "parse_input" and "serialize" bars. Depth
    3 shows "matrix_mult" prominently in saturated red-orange (#F4511E) with dark
    red border, alongside muted bars for "aggregate", "transform", "tokenize", "validate",
