    red (#E53935) with dark red border, and "normalize" in muted pink. Function names
    are displayed in bold dark text inside bars wide enough to fit them. The hot path
    (main → process_request → compute → matrix_mult → dot_product) is clearly distinguished
    by saturated warm colors and thick dark red borders, while non-hot-path bars use
    muted pastel versions. Title "flamegraph-basic · letsplot · pyplots.ai" is centered
    at top in bold dark text (size 26).
