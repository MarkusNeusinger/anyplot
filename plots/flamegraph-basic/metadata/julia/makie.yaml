review:
  strengths:
  - Theme tokens (PAGE_BG, INK, INK_SOFT) hoisted into a single Theme() block — idiomatic
    CairoMakie and the chrome flips cleanly between light and dark renders with no
    element left behind.
  - 'Hot-path focal point is genuinely effective: the dominant db.fetch_rows leaf
    gets a thick INK outline plus a ''hot path · 19% of CPU samples'' caption, directing
    the eye while preserving the flame aesthetic.'
  - 'Warm flame-graph palette uses Imprint members only — amber anchor #DDCC77, ochre
    #BD8233 (Imprint #4), matte red #AE3030 (Imprint #5) — and the code explicitly
    documents this as a semantic exception driven by the spec''s ''yellow → orange
    → red'' note.'
  - Luminance-based label ink chosen per fill (dark on amber/ochre, light on matte
    red) keeps function-name labels readable on every bar color.
  - Hairline PAGE_BG stroke between sibling rectangles solves the same-color-adjacency
    problem without using a heavy ink border that would compete with the data.
  - Title-length adaptive sizing (round(20 × 67 / len(title))) prevents the long descriptive-prefix
    title from overflowing on the landscape canvas.
  - Canvas hits the canonical 3200×1800 landscape via resolution=(1600, 900) × px_per_unit=2
    — no gate failure.
  weaknesses:
  - Profile contains only 20 unique stack traces but the spec asks for 50-500 — well
    below the lower bound. Extend the synthetic profile so the flame graph shows a
    richer call-tree (more siblings at depths 3-5, more leaves) and the chart density
    better matches the spec's intended scale.
  - The `contrast_ink(c)` helper is the only top-level function in the script and
    slightly bends CQ-01 KISS. Consider inlining the luminance check as a comprehension
    since FLAME_COLORS has only 3 entries — e.g., FLAME_LABEL_INK = [colorant"#1A1A17",
    colorant"#1A1A17", colorant"#FAF8F1"] hardcoded alongside FLAME_COLORS.
  - 'LM-02 distinctive-features ceiling: the implementation uses Makie''s vectorized
    poly! with a Rect2f array and the Theme() block, which is idiomatic but not a
    strong showcase. Consider Makie-distinctive touches such as a Colorbar tied to
    value, or annotation! arrows that lock to data coordinates, to push library-mastery
    higher.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — confirmed, not pure white.
      Chrome: title "CPU Profile of a Web Request Handler · flamegraph-basic · julia · makie · anyplot.ai" in dark INK at top, x-axis label "Proportion of CPU samples" and rotated y-axis label "Stack depth (caller → callee)" both in dark INK along the bottom and left edges. X-axis tick labels (0%, 20%, 40%, 60%, 80%, 100%) in INK_SOFT mid-gray. Bottom spine in INK_SOFT; top, right and left spines hidden; no grid. All chrome cleanly readable.
      Data: stacked flame bars in warm Imprint palette — amber #DDCC77, ochre #BD8233 (Imprint #4), matte red #AE3030 (Imprint #5). First categorical series is NOT brand green #009E73 — this is the documented semantic exception per the spec's "warm yellow/orange/red flame aesthetic" note. Bottom row "main" spans the full width in amber; "server.handle_request" / "runtime.gc" sit one row up; "app.route" / "user_handler" / "product_handler" higher; the dominant "db.fetch_rows" leaf (right side of row 5) carries a thick black INK outline plus a "▼ hot path · 19% of CPU samples" annotation in INK_SOFT — the focal point. In-bar function-name labels are dark on amber/ochre, light on matte-red, all legible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — confirmed, not pure black.
      Chrome: same title now in light INK (#F0EFE8), same x-axis label and rotated y-axis label in light INK, x-tick labels in INK_SOFT light gray. Bottom spine in INK_SOFT. No dark-on-dark failures — every text element clearly visible against the dark surface.
      Data: identical amber / ochre / matte-red fills to the light render (Imprint identity preserved across themes). Hot-path outline correctly flipped to light INK so it reads on the dark surface. Bar geometry and "hot path · 19%" caption identical to light.
      Legibility verdict: PASS
