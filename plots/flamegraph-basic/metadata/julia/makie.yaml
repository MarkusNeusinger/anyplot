review:
  strengths:
  - 'Correct flame-graph topology: root ''main'' at bottom, callees stacked upward,
    widths proportional to aggregated samples — reads as a textbook Brendan-Gregg
    flame graph.'
  - 'Semantic-exception palette is well-grounded: warm subset of Imprint (#DDCC77
    amber, #BD8233 ochre, #AE3030 red) keeps the conventional flame aesthetic without
    inventing colors outside the brand palette, and a comment explains why brand green
    sits out.'
  - Theme tokens are threaded cleanly through every chrome element (title/labels/ticks/spine)
    so both light and dark renders are fully legible; data colors are byte-identical
    across themes as required.
  - Iterative DFS layout keeps the script top-level (no recursive helper function)
    while still producing a deterministic alphabetical sibling order — KISS done right.
  - 'Minimal chrome is intentional: top/right/left spines removed, grid removed, y-ticks/labels
    removed (depth is conveyed by stacking position) — restraint matches the visualization''s
    needs.'
  - In-bar label gating ('only draw when bar width ≥ text width') prevents the classic
    flame-graph text-overflow mess at narrow stacks.
  - Hairline page-background strokes between sibling rectangles cleanly separate adjacent
    same-color bars without visible gaps — matches the spec's 'directly adjacent,
    minimal gaps' requirement.
  - 'Idiomatic batched CairoMakie usage: a single poly! call with a vector of Rect2f
    and per-rectangle fill colors instead of looping rect-by-rect.'
  weaknesses:
  - 'In-bar text color is hardcoded to colorant"#1A1A17" (dark ink). On amber/ochre
    bars contrast is fine, but on the matte-red #AE3030 bars (e.g. ''app.route'',
    ''server.handle_request'', ''product_handler'') the dark-on-dark-red contrast
    is noticeably weak in both themes — labels read but barely. Consider a luminance-aware
    label color: dark ink on amber/ochre, light ink (#FAF8F1) on red. This is a VQ-01
    nick, not a failure.'
  - DE-03 storytelling is limited to what the flame shape itself conveys — there is
    no extra emphasis on the obvious hot path (db.fetch_rows ≈ 24% of total). A subtle
    annotation or thicker stroke on the dominant leaf could promote the focal point
    without breaking the flame-graph convention.
  - 'LM-02 distinctive Makie features are modest: the implementation uses Figure/Axis/poly!/text!
    but does not lean on anything uniquely Makie (no GridLayout composition, no recipe,
    no Theme(), no Observable). A more characterful Makie touch (e.g. a Theme() block
    for the chrome tokens, or a small inset Axis showing the per-depth sample sum)
    would lift the score.'
  - Color assignment via abs(hash(name)) % 3 produces a stable mapping but is semantically
    arbitrary — adjacent siblings can end up the same color, slightly muting the 'distinct
    child' signal that the hairline separators are doing the work to restore. Assigning
    color by depth (or by child index within a parent) would give a more readable
    color rhythm; this is a minor DE-01/VQ-03 polish, not a correctness issue.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), matches the spec exactly — no pure white anywhere.
      Chrome: Title "CPU Profile of a Web Request Handler · flamegraph-basic · julia · makie · anyplot.ai" rendered in dark ink, centered above the plot at a comfortable ~80% width (fontsize auto-scaled to ~16pt because the title exceeds the 67-char threshold). X-axis label "Proportion of CPU samples" in dark ink, x-tick labels "0%, 20%, 40%, 60%, 80%, 100%" in softer ink — all sharply readable against the warm bg. Y-axis label "Stack depth (caller → callee)" rotated, in soft ink. Y-axis ticks/labels intentionally hidden (depth is shown by stacking position). Only the bottom spine is drawn (soft ink); top/right/left spines removed. No grid.
      Data: Seven stack-depth rows, root 'main' at the bottom spanning the full 0-100% width, then 'server.handle_request' + 'runtime.gc' above it, then 'app.route' + 'walk_heap', etc. — pyramid narrows toward the leaves. Bars colored from the warm Imprint subset: amber #DDCC77, ochre #BD8233, matte-red #AE3030 — no brand green (semantic flame-graph exception, properly noted in the code). Hairline page-bg strokes between adjacent siblings give clean separation. In-bar function-name labels appear only where the bar is wide enough to fit the text — narrow stacks (e.g. small auth.verify subbars at the top right) correctly have no labels. The label text is dark ink: high contrast on amber/ochre, noticeably weaker on the red bars but still legible.
      Legibility verdict: PASS — all chrome readable; in-bar labels readable but red-bar labels are at the edge of comfortable contrast.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), matches the spec — no pure black.
      Chrome: Title in light ink (~#F0EFE8), x-axis label in light ink, x-tick labels in soft light ink, y-axis label in soft light ink — every chrome element flipped correctly via the theme tokens. No "dark-on-dark" failures on any chrome element.
      Data: Bar colors are byte-identical to the light render (same amber/ochre/red) — exactly as required (only chrome flips, never data). The hairline separators now read as dark slits between same-color sibling bars (they use PAGE_BG which is dark in this theme) — this works structurally and visually. In-bar labels remain dark ink, which is intentional: the bars are warm-colored, not the page bg, so dark labels on amber/ochre are fine. Dark labels on the red bars (e.g. 'app.route', 'server.handle_request', 'product_handler') have the same weak contrast as in the light render — not a theme-adaptation failure, but a global polish opportunity.
      Legibility verdict: PASS — no dark-on-dark chrome; data labels readable with the same caveat as the light render (red-bar contrast).
