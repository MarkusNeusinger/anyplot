review:
  strengths:
  - 'Canonical flame-graph layout: depth on Y, samples on X, children packed left-to-right
    widest-first within parent span — true hierarchical icicle, not just a stacked
    bar'
  - 'Idiomatic Altair distinctive features used well: transform_calculate for conditional
    in-bar labels, selection_point + condition for hover highlight overlay, layered
    (bars + highlight + labels) declarative composition'
  - 'Warm-palette semantic exception handled correctly per style guide: amber #DDCC77
    → ochre #BD8233 → matte-red #AE3030 with HSL interpolation gives a smooth flame
    gradient using only Imprint members'
  - 'Hot-path storytelling: dominant call chain (main → request_handler → process_request
    → db_query → execute_sql) explicitly traced, called out in subtitle, AND visually
    emphasized via opacity 1.0 vs 0.55 on cold stacks — clear focal point'
  - Canvas pinned to exactly 3200×1800 with PIL pad-not-crop fallback after vl-convert;
    gate passed
  - Theme tokens (PAGE_BG / ELEVATED_BG / INK / INK_SOFT / INK_MUTED) threaded through
    bars stroke, axes, title, subtitle, and label color — both renders are clearly
    theme-correct
  - Realistic, neutral CPU-profiling data (Python web-request handler with parse/dispatch/db/template/gc
    branches) at sensible scale (8–500 samples, max depth 5)
  - Title format matches required `flamegraph-basic · python · altair · anyplot.ai`
    pattern; subtitle adds useful context without competing
  weaknesses:
  - 'Dark render: in-bar labels use INK=#F0EFE8 (light cream) which has marginal contrast
    against the lightest warm-palette stops — the ''main'' label on the depth-0 amber
    #DDCC77 bar and ''request_handler'' on the depth-1 yellow-ochre bar are readable
    but low-contrast. Consider switching in-bar text to a fixed dark ink (e.g. #1A1A17)
    regardless of theme, since flame-graph warm bars are always light-mid luminance
    in both renders'
  - Hover-highlight overlay (selection_point + INK stroke) is a distinctive Altair
    feature but invisible in the static PNG — it only adds value to the HTML companion
    artifact. Not a defect, but the visual contribution to the PNG score is zero
  - Stack Depth axis is ordinal with sort='descending' which correctly puts depth
    0 at the bottom, but the y-axis tick labels are integers without a visible 'depth=root'
    anchor — a minor opportunity to label depth 0 as 'root' or add a one-line note
    that bottom=entry point
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct.
      Chrome: Title "flamegraph-basic · python · altair · anyplot.ai" in bold dark ink, ~55% of plot width, anchored start. Two-line subtitle ("Hot path: main → request_handler → process_request → db_query → execute_sql" / "Hover bars to highlight · drag to pan · scroll to zoom") in muted ink — readable, not competing with title. Y-axis title "Stack Depth (level)" rotated, ticks 0–5; X-axis title "Samples (count)", ticks 0–500 in 40-step intervals. All chrome legible against off-white surface.
      Data: Six rows of horizontally adjacent rectangles encoding the call-stack hierarchy. Color follows a warm Imprint-derived gradient — depth 0 (main) at the bottom in amber #DDCC77, ascending through ochre to matte-red #AE3030 at depth 5 (fetch_rows / parse_query). Hot-path bars (main → request_handler → process_request → db_query → execute_sql) rendered at full opacity; cold branches (gc_collect, logger, send_response, parse_headers tail) at 0.55 — creating clear visual hierarchy. In-bar labels in dark bold ink appear only where bar width > 6% of total samples (e.g. main, request_handler, process_request, db_query, execute_sql, parse_headers, route_dispatch, gc_collect, mark_sweep, render_html, fetch_rows, parse_query) — narrow siblings stay unlabeled, which is the canonical flame-graph behavior. First categorical/semantic series anchored on Imprint warm members. Standard flame-graph convention met.
      Legibility verdict: PASS — all title, subtitle, axis-title, tick-label, and in-bar text is clearly readable against the off-white background. No dark-on-dark issues.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct.
      Chrome: Title in light ink (#F0EFE8) — clearly readable on dark ground. Subtitle in soft ink — readable but appropriately quieter. Axis titles and tick labels in soft ink, all readable.
      Data: Same warm-gradient palette and same hot-path opacity emphasis as the light render — verified identical data colors per the "data colors must be identical between renders, only chrome flips" rule. Bars are visibly more saturated against the dark surface (good).
      In-bar labels: rendered in light cream (#F0EFE8) which gives strong contrast on the deeper (red/maroon) bars at the top of the stack but lower contrast on the lightest amber depth-0 "main" bar and yellow-ochre depth-1 "request_handler" bar. Still readable in the saved PNG, but marginal — flagged as a weakness (consider fixed dark ink for in-bar text regardless of theme since warm bars stay light-luminance in both modes).
      Legibility verdict: PASS — no element is fully unreadable. Chrome is clearly theme-correct (no dark-on-dark for axes/title/ticks). One soft caveat on in-bar labels on the lightest two bars — captured in weaknesses, not severe enough to drop VQ-01 to 0.
