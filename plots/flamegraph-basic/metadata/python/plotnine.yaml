review:
  strengths:
  - 'Excellent data storytelling: the hottest call path (main → request_handler →
    route_dispatch → query_database → execute_sql → fetch_rows) is outlined with a
    bold ink stroke and explicitly explained by the upper-right annotation — eye lands
    on the bottleneck immediately.'
  - 'Clean grammar-of-graphics composition: layered geom_rect (one for fills, one
    filtered to the hot path for outline), geom_text for in-bar labels, theme_void()
    for chartjunk-free chrome — pure plotnine idiom.'
  - Width-encoded sample counts computed precisely with children laid out within each
    parent's extent — siblings sum to parent width, no gaps, no overflow.
  - Theme-adaptive chrome wired through correctly — PAGE_BG / INK / INK_SOFT tokens
    cascade to background, title, bar text, legend frame, ticks, annotation, and even
    the bar separator color.
  - 'Dark-mode label contrast handled smartly: scale_color_identity + per-row label_color
    flips text to dark INK on the lightest amber bars (samples < 200) where cream-on-amber
    would be borderline — addresses attempt-1 feedback.'
  - Stack-trace count (59 unique traces) is now comfortably inside the spec's 50–500
    floor — addresses attempt-1 DQ-01 weakness.
  - Annotation lifted to max_depth + 1.1 with ylim extended to max_depth + 1.3 — gives
    the meta line breathing room above the topmost bar (addresses attempt-1 DE-02
    weakness).
  - Realistic, neutral CPU-profiling scenario (web request handling) with sensible
    totals (1,000 samples) and a believable hierarchy.
  - 'VQ-07 deviation is now explicitly documented in the file header with a clear
    rationale: spec mandates a warm palette, all three stops are Imprint palette members
    (#DDCC77, #BD8233, #AE3030).'
  weaknesses:
  - 'VQ-07 — continuous fill uses a custom 3-stop warm gradient (#DDCC77 → #BD8233
    → #AE3030) via scale_fill_gradientn rather than the canonical imprint_seq (green→blue)
    or imprint_div (red↔mid↔blue). All three stops are Imprint members and the deviation
    is documented as a deliberate semantic exception (spec mandates warm yellows/oranges/reds),
    but the style guide''s continuous-cmap rule is strict — net 1/2.'
  - LM-01 / LM-02 — sys.path manipulation at module load to dodge the script-vs-package
    name collision is a necessary workaround but slightly muddies the idiomatic-plotnine
    read. Consider renaming the file artifact upstream (out of scope here, just a
    note for the catalog).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — confirmed correct (not pure white, not dark).
      Chrome: bold dark title "flamegraph-basic · python · plotnine · anyplot.ai" centered at top in INK #1A1A17, clearly visible. Upper-right meta annotation "Total: 1,000 samples  ·  outlined = hottest call path" in INK_SOFT #4A4A44 gray, readable. Bottom-centered horizontal "Samples" colorbar with bold INK title and INK_SOFT tick labels 100 / 500 / 1000. theme_void() correctly drops all axis chrome (flame graphs use no x/y axes).
      Data: 7-row stacked flame graph as a pyramid — bottom row "main" in matte red #AE3030 (1,000 samples), "request_handler" red one level up, "route_dispatch" + "gc_collect" + "logging" in ochre, then progressively narrower amber #DDCC77 leaves at the top. 59 unique stack frames laid out left-to-right by sample count within each parent's extent. The hottest call path (main → request_handler → route_dispatch → query_database → execute_sql → fetch_rows) is overlaid with a thick dark INK stroke, drawing the eye straight to the bottleneck. Bar text in dark INK throughout — well-contrasted against every fill. Narrow bars correctly suppress their labels via the width-fraction gate.
      Legibility verdict: PASS — every text element (title, meta annotation, in-bar labels, colorbar title + ticks) is sharply readable on the off-white surface.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — confirmed correct (not pure black, not light).
      Chrome: title and "Samples" legend title flip to cream INK #F0EFE8 and remain crisply legible. Upper-right meta annotation and colorbar tick numbers in INK_SOFT #B8B7B0 — soft cream/gray, fully readable. Hot-path outline stroke flips to cream so it stays visible against the warm fills. No dark-on-dark failures anywhere.
      Data: identical 59-frame warm gradient — amber #DDCC77 → ochre #BD8233 → matte red #AE3030. Only the chrome flipped; data colors match the light render exactly (Imprint slots 1–7 invariance respected). The label-color logic kicks in correctly: amber leaves (samples < 200 — parse_headers, decode_json, verify_token, fetch_rows, mark_sweep, render_template, etc.) carry dark #1A1A17 text (high contrast); the deeper ochre / red bars (route_dispatch, request_handler, main, query_database) carry cream INK #F0EFE8 text (high contrast). This addresses the attempt-1 cream-on-amber borderline-contrast weakness.
      Legibility verdict: PASS — both polarities of label coloring tested by eye, both readable; no "dark-on-dark" or "light-on-light" failures.

    Canvas: both renders measured 3200×1800 px — landscape canvas gate passes cleanly, no /tmp/anyplot-canvas-gate.txt sentinel written.
