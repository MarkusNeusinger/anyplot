review:
  strengths:
  - 'Excellent data storytelling: the hottest call path is outlined with a bold ink
    stroke, immediately guiding the eye to the bottleneck. The annotation in the top-right
    explicitly explains the outline convention.'
  - 'Clean grammar-of-graphics composition: layered geom_rect for fills plus a second
    geom_rect (filtered to hot path) for the outline, geom_text for in-bar labels,
    and theme_void() for chartjunk-free chrome.'
  - 'Width-encoded sample counts are computed precisely: children laid out within
    each parent''s extent, so siblings sum to the parent width and the flame-graph
    invariant holds across all depth levels.'
  - Theme-adaptive chrome is wired through correctly — PAGE_BG, INK, INK_SOFT tokens
    cascade to plot background, title, bar text, legend title, and the meta annotation.
    Both light and dark renders are readable.
  - 'Bar text uses width-fraction gating (>5%) so narrow bars are silently unlabeled
    rather than overlapping their neighbors, and label color flips with the theme
    (#1A1A17 light / #F0EFE8 dark).'
  - Realistic, neutral CPU-profiling scenario (web request handling with auth, query,
    render, gc) — domain-recognizable without controversy.
  weaknesses:
  - 'VQ-07 palette compliance: continuous fill uses a custom 3-stop warm gradient
    (amber #DDCC77 → ochre #BD8233 → matte red #AE3030) via scale_fill_gradientn,
    rather than the mandated imprint_seq (green→blue) or imprint_div (red↔mid↔blue).
    All three hues are Imprint palette members so the violation is mild, and the flame-graph
    spec explicitly asks for a warm palette — but the style guide''s continuous-cmap
    rule is strict. Consider documenting this as a semantic exception in the file
    header to make the tradeoff explicit.'
  - 'DQ-01 feature coverage: spec calls for 50–500 unique stack traces; the implementation
    has only 27. The chosen stacks are well-designed and readable, but the trace count
    is below the spec floor. Add ~25–50 more leaf stacks (e.g. deeper nesting under
    execute_sql, render_template, or extra siblings) without losing the storytelling
    clarity.'
  - 'VQ-01 in dark mode: cream INK text (#F0EFE8) on the lightest amber bars (#DDCC77)
    is borderline low-contrast on the small leaf bars (fetch_rows, verify_token, apply_filters).
    Bold weight keeps it legible, but adding a thin INK_SOFT stroke around the text
    — or switching to INK_SOFT for the lightest fills only — would lift contrast without
    hurting the dark theme.'
  - 'DE-02 polish: the meta annotation sits flush at the same y-coordinate as the
    topmost bar (max_depth + 0.85) which crowds it slightly in the upper-right. Adding
    ~0.3 of headroom (annotation y → max_depth + 1.1, ylim → max_depth + 1.3) would
    let it breathe and read as truly supplementary text.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), correct light-theme surface — not pure white.
      Chrome: Bold dark title "flamegraph-basic · python · plotnine · anyplot.ai" at top, centered, ~50% width — clearly readable against the cream surface. Meta annotation "Total: 1,000 samples  ·  outlined = hottest call path" sits in INK_SOFT gray in the upper-right, readable but appropriately secondary. The "Samples" legend at the bottom uses bold dark INK title with INK_SOFT tick labels (100 / 500 / 1000). No "light-on-light" failures anywhere.
      Data: 6-row stacked flame graph with warm gradient — yellow/amber #DDCC77 for low-sample leaves (verify_token, fetch_rows, apply_filters, decode_json, mark_sweep, gc_collect kids, logging kids), ochre #BD8233 for mid-tier frames (query_database, route_dispatch), and matte red #AE3030 for the hot foundational frames (main, request_handler). The hottest call path (main → request_handler → route_dispatch → query_database → execute_sql → fetch_rows) is overlaid with a black ink stroke so the bottleneck pops immediately. Bar text is INK (#1A1A17), bold, well-contrasted against all three bar fills.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correct dark-theme surface — not pure black.
      Chrome: Title in cream INK (#F0EFE8) at the top — clearly readable against the dark background. Meta annotation in INK_SOFT (#B8B7B0) in the upper-right — readable. Legend "Samples" title in cream INK, tick labels (100/500/1000) in INK_SOFT — both readable. The hot-path outline flips to cream (#F0EFE8) on dark — clearly visible against all three bar fills. No "dark-on-dark" failures.
      Data: Colors identical to the light render — same #DDCC77/#BD8233/#AE3030 warm gradient applied to the same bars. Only chrome (background, title text, annotation text, legend text, bar-text color, hot-path stroke color, and the thin bar-separator gaps which now match #1A1A17) has flipped, exactly as the theme contract requires. Bar labels flip to cream INK (#F0EFE8); on the lightest amber leaf bars the contrast is borderline but the bold weight keeps it readable.
      Legibility verdict: PASS (with minor note: cream-on-amber on the smallest yellow leaves is on the edge of comfortable contrast — see VQ-01 weakness)
