  strengths:
  - Theme-adaptive chrome correctly threaded through every element (background, ink,
    spines, annotation box) — both renders are fully readable
  - 'Custom warm flame colormap built from Imprint palette anchors (#DDCC77, #BD8233,
    #AE3030) — honors spec''s ''warm flame aesthetic'' requirement while staying in
    palette'
  - 'Strong data storytelling: hot path is detected programmatically and called out
    with a curved-arrow annotation in an elevated rounded box'
  - Text path-effect strokes (pe.withStroke) keep in-bar labels readable across varied
    bar colors
  - Proportional fontweight tiers (bold for wide bars, medium for narrow) show care
  - Correct canvas (3200x1800), no bbox_inches='tight', deterministic data
  weaknesses:
  - 'Narrow-bar labels overflow their bar boundaries and visually collide with adjacent
    labels — ''dot_product (21%)'' collides with ''allocate_buffer'', ''tokenize (13%)''
    collides with ''validate'', ''send_response (13%)'' collides with ''load_config''.
    Fix: for bars under ~12% width, show only the function name (no ''(X%)'' suffix)'
  - Only 19 stack traces vs spec's stated 50-500 range — flame graph would feel denser
    and more realistic with 60-100 traces and 5-6 depth levels
  - FancyBboxPatch with rounding_size=2 creates small visible gaps between sibling
    bars at each depth, slightly contradicting spec note 'Bars should be directly
    adjacent with minimal or no gaps'. Consider replacing with mpatches.Rectangle
    for cleaner adjacency
