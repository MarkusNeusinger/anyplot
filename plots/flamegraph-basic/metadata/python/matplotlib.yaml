review:
  strengths:
  - Theme-adaptive chrome correctly threaded through every element (background, ink,
    spines, annotation box) — both renders fully readable with no dark-on-dark or
    light-on-light failures
  - 'Custom warm flame colormap built from Imprint palette anchors (#DDCC77, #BD8233,
    #AE3030) — honors the spec''s ''warm flame aesthetic'' requirement as a semantic
    exception while staying in palette'
  - Programmatic hot-path detection (widest child at each depth) called out with a
    curved-arrow annotation in an elevated rounded box — strong data storytelling
    and clear focal point
  - 'Smart label-fit heuristic: tries ''name (XX%)'' first, falls back to name only,
    skips when neither fits — narrow-bar overflow from attempt 1 is fixed'
  - Trace count expanded to 57 stacks across 6 depth levels — now sits inside the
    spec's 50-500 range and produces a dense, realistic CPU profile
  - Switched from FancyBboxPatch to mpatches.Rectangle — siblings now sit directly
    adjacent with only a thin PAGE_BG edge separator, matching spec note about minimal
    gaps
  - Path-effect strokes (pe.withStroke) on in-bar labels keep text readable across
    the full amber→ochre→red color range; text-color flip uses the data-color value,
    not the theme (correct)
  - Correct canvas (3200×1800), no bbox_inches='tight', deterministic data, clean
    linear KISS structure with no functions or classes
  weaknesses:
  - The annotation 'Hot path (CPU bottleneck)' box at xytext y=hot_leaf[0]+1.25 floats
    above the topmost bar and into negative-data-space; it reads fine here but the
    magic offset (260 samples horizontally, 1.25 depth units vertically) would break
    if the hot path landed near the right edge of the canvas — consider clamping xytext
    to ax.get_xlim() so future repairs do not push the box past the canvas right edge
  - LM-02 is solid but not exceptional — uses path_effects + LinearSegmentedColormap
    + annotate-with-bbox, all standard matplotlib idioms; a hex-tile or treemap-style
    sub-block could showcase more distinctive features but is not required by spec
