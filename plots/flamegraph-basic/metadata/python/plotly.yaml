review:
  strengths:
  - Hot-path emphasis via matte red (#AE3030) creates strong visual hierarchy and
    clearly tells the bottleneck story — the eye tracks main → process_request → route_handler
    → query_db → execute_sql → fetch_rows → deserialize without effort.
  - 'Warm flame palette is correctly scoped to the Imprint trio (matte red, ochre
    #BD8233, amber #DDCC77) with the semantic-exception justified in a code comment
    — preserves the conventional flame-graph aesthetic without inventing colors outside
    the brand system.'
  - Monospace label font (Consolas/Monaco) is a thoughtful choice — function names
    read as code, reinforcing the profiling context.
  - Theme tokens are threaded cleanly through every chrome element (paper_bgcolor,
    plot_bgcolor, axis fonts, tick fonts, legend bg/border) — both light and dark
    renders are fully theme-correct with identical data colors.
  - Realistic, neutral CPU-profiling dataset (web-request handler with 29 nested stacks
    across 7 depth levels) — plausible bottleneck story, hits the spec's 50–500 stacks
    ceiling on the low end but covers all the structural variety a flame graph needs
    to demonstrate.
  - 'Idiomatic Plotly: batched horizontal Bar traces grouped by color (3 traces, not
    29), per-bar hovertemplate with function/stack/samples/percentage, write_html
    for interactivity. Canvas is exactly 800×450×4 = 3200×1800 as required.'
  weaknesses:
  - 'Label overflow on narrow bars at depth 2 and depth 3: ''send_resp…'' (send_response
    bar, ~10% wide) visually collides with the ''route_handler'' label to its right;
    at depth 3 ''comp'' (compile bar, ~5% wide) sits flush against ''render_template''.
    The width<0.10 truncation kicks in but the resulting labels still extend past
    their bar boundaries because they are anchored to the bar center, not clipped
    to the bar width. Fix: only render a label when the truncated text actually fits
    inside the bar''s pixel width (estimate ~7px per char at 13pt monospace), otherwise
    omit the label entirely — the hover tooltip already covers it.'
  - 'VQ-02 deduction: the overlapping function-name labels at depths 2 and 3 are the
    dominant readability issue in both renders; they make the narrow bars look like
    one continuous label rather than discrete frames.'
  - Bar height of 0.84 leaves a visible horizontal gap between every depth row. Flame-graph
    convention is for adjacent depth rows to touch (or have only a 1px hairline separator).
    Spec note about 'minimal or no gaps' refers to siblings but the same aesthetic
    principle applies vertically. Consider width=0.96 or 1.0 with a thin BAR_EDGE
    line for separation.
  - Legend takes valuable vertical space (y=1.06, horizontal orientation) above the
    title area, pushing the plot region down. The three legend entries ('Hot path',
    'Other frames (ochre)', 'Other frames (amber)') could be encoded directly via
    an inline color key or even dropped — the ochre/amber distinction is a sibling-alternation
    decoration, not a semantic axis worth a legend slot.
  - 'LM-02: distinctive Plotly features are underused — no fig.update_traces with
    selector, no hover unified mode toggle, no marker pattern_shape for CVD redundancy.
    The hovertemplate per-trace is good but the implementation could lean further
    into Plotly''s strengths (e.g., facet_row for comparative profiles, or sunburst/treemap
    as alternative views).'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct.
      Chrome: title "flamegraph-basic · python · plotly · anyplot.ai" in dark ink, centered, ~55% of canvas width — readable. Y-axis title "Stack Depth (root → leaf)" rotated 90°, X-axis title "Proportion of Total Samples" — both readable in dark INK. Tick labels (0%–100% on x, 0–6 on y) in INK_SOFT — clearly visible. Legend chip in elevated-bg with INK_SOFT border, horizontal orientation above the plot — all three series labels readable.
      Data: warm trio — hot-path bars in matte red #AE3030 (main, process_request, route_handler, query_db, execute_sql, fetch_rows, deserialize), other frames alternating ochre #BD8233 and amber #DDCC77. Function-name labels embedded in bars: bold white on red hot-path bars, dark ink on ochre/amber bars. Monospace font for code-style readability.
      Legibility verdict: PASS overall, BUT label overflow at depth 2 ("send_resp…" overlaps "route_handler") and depth 3 ("comp" overlaps "render_template") — labels extend past narrow-bar bounds.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct.
      Chrome: title in light INK (#F0EFE8), readable on dark surface. Axis titles in same light INK, readable. Tick labels in INK_SOFT (#B8B7B0) — visible against the dark background. Legend frame in elevated dark (#242420) with INK_SOFT border — readable. No dark-on-dark failures detected.
      Data: identical warm trio to light render (matte red, ochre, amber) — confirmed identical bar colors. Function-name labels: bold cream on red hot-path bars (readable), light INK on ochre/amber bars (readable against the lighter warm fills).
      Legibility verdict: PASS overall, with the same label-overlap issues as the light render at depths 2 and 3 (the overflow problem is symmetric across themes).
