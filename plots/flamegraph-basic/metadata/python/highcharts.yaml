review:
  strengths:
  - Correct flame graph orientation with root (main, 100%) at the bottom and depth
    growing upward — matches Brendan Gregg convention.
  - 'First series / root frame is rendered in Imprint brand green #009E73; remaining
    frames cycle the Imprint categorical palette for sibling separation.'
  - 'Sophisticated hot-path highlighting: dominant call chain (main → process_request
    → handle_route → query_database → execute_sql → fetch_rows) gets a darker ink
    border and bolder weight, guiding the eye to the bottleneck without an overlay
    annotation.'
  - Pixel-width-aware label truncation with three tiers (full label, name only, ellipsis)
    plus an ambiguity pass that drops truncated labels mapping to multiple distinct
    names — avoids three identical 'load…' labels for load_session/load_perms/load_cache.
  - Theme tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT) are wired through chart background,
    title, subtitle, and tooltip — both light (#FAF8F1) and dark (#1A1A17) renders
    are fully readable and chrome-correct.
  - 'Creative use of Highcharts columnrange + inverted: True to achieve true variable-width
    horizontal bars stacked vertically — uses a distinctive Highcharts feature for
    the flame layout.'
  - Canvas pinned to exactly 3200×1800 via CDP setDeviceMetricsOverride plus PIL pad-or-crop
    safety net; HTML artifact and PNG both correctly sized.
  - Bars are directly adjacent with borderColor matched to PAGE_BG, producing the
    tight flame look mandated by the spec.
  - 'KISS code structure: no functions/classes, iterative tree traversal, deterministic
    (no RNG).'
  weaknesses:
  - Top-level depth (depth 6) bars are very narrow (e.g., 'build…', 'fetch_rows 10.1%',
    'parse_re…', 'dese…') — at 400 px mobile scale the truncated single-char fragments
    become illegible. Consider hiding labels for bars under a stricter min-width threshold
    and relying on tooltips at small sizes.
  - Hot-path border accent is subtle at thumbnail scale — a 4 px ink border on a colored
    fill barely separates the hot chain from sibling frames in the dark render. Consider
    increasing borderWidth to ~6 px or introducing a slightly desaturated fill for
    non-hot frames so the hot chain pops more.
  - Subtitle 'CPU profile — web-server request handler (940 samples, root at bottom)'
    is rendered at 34 px (default-ish) which reads small relative to the 60 px title
    at thumbnail/mobile scale. Bumping to ~38–40 px would tighten visual hierarchy.
  - Code uses a hand-rolled hash (i * 5 + rect['x'] * 3) % 8 to pick palette colors;
    this works but produces some adjacent same-color sibling frames at higher depths
    (e.g., near 'compile_template' and 'serialize_json' the cyan repeats). A simple
    per-row palette rotation tied to depth would guarantee adjacent siblings always
    differ.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as required by the Imprint chrome rules — not pure white, not dark.
      Chrome: Bold dark title "flamegraph-basic · python · highcharts · anyplot.ai" reads clearly at the top. Subtitle "CPU profile — web-server request handler (940 samples, root at bottom)" in soft ink underneath. No axis ticks/labels (intentional for flame graph format). All chrome text passes contrast against the off-white surface.
      Data: Bottom row is a single full-width Imprint brand-green (#009E73) "main 100.0%" bar — first series correctly mapped to the brand color. Above it, the call tree expands into rows of stacked frames colored from the Imprint categorical palette (green, purple, blue, brown, red, cyan, magenta, olive). Each in-bar dataLabel is white monospaced text with a dark text-outline for legibility. The dominant call chain (process_request → handle_route → query_database → execute_sql → fetch_rows) carries a thicker dark border, marking the hot path.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as required — not pure black, not light. Visibly warm vs. true black.
      Chrome: Title and subtitle flip to light ink (#F0EFE8 / #B8B7B0 family) and read cleanly against the dark surface — no dark-on-dark failures detected. Tooltip background would be ELEVATED_BG (#242420) per the wired-up theme tokens.
      Data: Bar colors are visually identical to the light render — only chrome flipped, palette held constant per the style-guide rule. Brand green #009E73 root bar remains the focal anchor at the bottom; white-with-outline in-bar labels remain readable against every fill color.
      Legibility verdict: PASS

