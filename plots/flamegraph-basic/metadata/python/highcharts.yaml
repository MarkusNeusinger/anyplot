review:
  strengths:
  - Root frame correctly anchored at the bottom (`main 100.0%`) with caller-to-callee
    depth growing upward — conventional flame-graph orientation matched.
  - 'Smart pixel-width-aware label truncation: wide bars get `name + pct%`, medium
    bars get the bare function name, narrow bars get an ellipsis, sub-4-char bars
    stay unlabeled — keeps every readable cell informative without overflow.'
  - White dataLabels with a 2px rgba(0,0,0,0.55) textOutline read cleanly on every
    Imprint hue in BOTH light and dark renders (no dark-on-dark, no light-on-light).
  - 'Theme tokens are threaded through every chrome surface: backgroundColor, title.color,
    subtitle.color, tooltip background/border/text all swap between #FAF8F1 / #1A1A17
    correctly — data colors are byte-identical across themes.'
  - Brand green `#009E73` lands on the root `main` bar (Imprint slot 1) per the 'first
    series always brand green' rule, and the rest of the palette cycles the canonical
    Imprint order.
  - Useful subtitle adds total-sample context (`940 samples, root at bottom`) — directly
    addresses the spec's note that x-axis is non-temporal.
  - Canvas pinned to exact 3200×1800 (CDP override + PIL belt-and-braces) — post-render
    gate passes cleanly.
  - Realistic, neutral CPU-profile dataset (web-server request handler with auth/db/template/middleware
    sub-stacks at 5 levels deep) — plausible domain without controversy.
  weaknesses:
  - Color cycling formula `IMPRINT_PALETTE[(i*5 + depth*3) % 8]` produces no semantic
    relationship between hue and call hierarchy — siblings sharing a parent get different
    colors, and unrelated frames at different depths can share a color. For a flame
    graph this is acceptable (colors are decorative), but a hue-by-depth or hue-by-top-level-ancestor
    scheme would tell the viewer more.
  - Several distinct functions truncate to the same prefix at narrow widths (`load…`
    could be load_session / load_perms / load_cache; `wri…` could be write_response
    / write_buffer / write_syscall) — readers cannot disambiguate without the interactive
    tooltip. Consider showing the leading char of the parent prefix or letting the
    bar grow taller so two-line labels fit.
  - Upper-right quadrant of the canvas is mostly empty because the deepest stacks
    (5 levels) only cover a small horizontal slice — visually correct but wastes ~25%
    of the landscape canvas. A square 2400×2400 canvas, or reducing chart marginTop
    now that the title is up at 200 px, would tighten the composition.
  - 'DE-03 storytelling is competent but neutral: nothing visually emphasizes the
    hottest path (`handle_route 51.2%` → `query_database 25.2%` → `execute_sql 21.6%`
    → `fetch_rows 10.1%`). A subtle highlight (slightly bolder border, darker stroke,
    or a small annotation arrow) on the dominant column would guide the eye to the
    bottleneck the chart is supposed to surface.'
  - Title fontSize of 66px is at the high end for the 67-char mandated string at 3200
    px wide — it visually spans ~55-60% of width which is fine, but the subtitle at
    40px feels slightly heavy beneath it; reducing title to 58-60px and subtitle to
    32-36px would give the chart more breathing room without losing legibility.
  image_description: |-
    Light render (plot-light.png), 3200x1800:
      Background: warm off-white (~#FAF8F1) — NOT pure white, matches the Imprint
        light token. Top margin holds the title and subtitle on the same off-white
        surface (no banner / no fill behind the text).
      Chrome: Title "flamegraph-basic · python · highcharts · anyplot.ai" rendered
        in bold near-black (#1A1A17) at 66 px, fully readable. Subtitle "CPU profile
        — web-server request handler (940 samples, root at bottom)" in soft ink
        (#4A4A44) at 40 px — readable, clearly secondary. No axes/ticks/grid are
        drawn (intentional — value axis hidden, category axis hidden), so there's
        no "tick label on background" failure mode to worry about.
      Data: Stacked horizontal bars in 6 depth tiers, root `main` at the BOTTOM
        spanning full width (Imprint brand green #009E73), `process_request` second
        row at 88.1 %, then `parse_headers / authenticate / handle_route / write_response`
        on tier 3, then deeper auth + DB + middleware sub-frames climbing upward.
        Adjacent siblings alternate hues from the Imprint palette
        (#009E73, #C475FD, #4467A3, #BD8233, #AE3030, #2ABCCD, #954477, #99B314).
        First series (root) IS the brand green per the rule. Bar labels are white
        SF-Mono with a dark text-outline — every visible label legible on every hue.
      Legibility verdict: PASS — no light-on-light text anywhere; title, subtitle,
        and all dataLabels readable; no clipped edges; canvas exactly 3200x1800.

    Dark render (plot-dark.png), 3200x1800:
      Background: warm near-black (~#1A1A17) — NOT pure black, matches the Imprint
        dark token. Same upper-margin layout as the light render, just inverted.
      Chrome: Title in light ink (#F0EFE8) at 66 px bold — clearly readable on the
        dark surface. Subtitle in soft light ink (#B8B7B0) at 40 px — readable as
        secondary. No "dark-on-dark" failures detected — the implementation routes
        INK and INK_SOFT tokens to title.style.color and subtitle.style.color, so
        nothing falls back to a hardcoded near-black. Bar borders are PAGE_BG
        (#1A1A17) so the dark interstitial lines between adjacent bars are visible
        as faint separators rather than black-on-black gaps.
      Data: Colors are byte-identical to the light render (verified visually —
        same green, purple, blue, brown, red, cyan, plum, olive). DataLabels are
        still white-on-color with the same dark outline; legible against every hue
        on the dark surface — even brown (#BD8233) and red (#AE3030) read fine.
      Legibility verdict: PASS — no dark-on-dark text; all title/subtitle/bar
        labels render with high contrast against the near-black ground; canvas
        exactly 3200x1800.

    Both renders pass the theme-readability gate. Imprint data colors are
    identical across themes; only chrome (background + text inks) flipped, which
    is exactly the expected theme-adaptation behaviour.
