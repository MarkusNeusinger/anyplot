review:
  strengths:
  - 'Theme adaptation is solid in both renders: warm off-white #FAF8F1 chrome in light,
    warm near-black #1A1A17 in dark, with identical data colors and only chrome flipping
    as required.'
  - 'Imprint palette positions used semantically by top-level branch (brand-green
    #009E73 for the main root, ochre #BD8233 for handle_request, lavender #C475FD
    for log_metrics, matte-red #AE3030 for gc_collect) — far more informative than
    the conventional random flame-graph coloring while staying on canonical positions.'
  - 'Hot-path emphasis: handle_request → process_query → execute → fetch_rows chain
    gets an INK 4 px outline, drawing the reader''s eye to the bottleneck — genuine
    data storytelling beyond a plain flame graph.'
  - Bokeh's distinctive HoverTool surfaces full call-stack tooltips (function, samples,
    CPU %, stack path), exercising a library-unique interactive feature.
  - Canvas dimensions are exact 3200x1800 (gate passed). Selenium CDP setDeviceMetricsOverride
    + a Pillow normalisation pin defends against the May 2026 bokeh shrink-to-1661
    failure mode mentioned in prompts/library/bokeh.md.
  - '55-row simulated CPU profile (web-server: parse_headers → authenticate → process_query
    → send_response, plus gc_collect and log_metrics) is realistic, neutral, and exercises
    6 stack depths.'
  - In-bar labels include both function name AND percentage for wide bars (>12% width),
    name-only for medium bars (>5%), HoverTool fallback for narrower bars — clean
    width-aware rule that prevents collisions.
  weaknesses:
  - 'Spec asks for a warm palette (yellows / oranges / reds) following Brendan Gregg''s
    flame-graph aesthetic; the implementation deviates by using brand-green for the
    main root and lavender for log_metrics. The Imprint mandate justifies keeping
    canonical positions, but the result loses the ''warm wash'' the spec calls for.
    Consider keeping #009E73 only for the root frame and remapping log_metrics to
    ochre or amber so the canopy reads as warm yellows/oranges/reds with green as
    a single anchor.'
  - Adjacent sibling bars are separated by 1.5 px PAGE_BG-colored strokes. The spec
    asks for 'minimal or no gaps between siblings at the same stack depth'; in both
    renders the result is visible separator lines between every frame, which slightly
    fights the dense-tile aesthetic of a flame graph. Either drop line_width to 0.5
    (or use the same fill color for the stroke) so adjacent frames feel directly adjacent.
  - 'In light render, the in-bar labels on the matte-red gc_collect frames (e.g. gc_collect,
    mark_phase, sweep_phase, trace_refs) sit at a lower contrast than on the ochre
    handle_request frames — INK on #AE3030 is readable but lacks the snap of INK on
    #BD8233. A small fontweight bump or switching label_color to PAGE_BG specifically
    on the red frames would even out legibility across branches.'
  - Label fontsize ramp (14/18/22pt) keeps mid-width labels at 18pt, which on a 3200-px
    canvas is visibly smaller than the 50pt title; the gap between title and the largest
    in-bar label (22pt) feels wide. Bumping the upper bin to 26-28pt would give the
    dominant frames (process_query, handle_request, execute) more visual weight to
    match their data weight.
  image_description: |-
    Light render (plot-light.png, 3200x1800):
      Background: Warm off-white (#FAF8F1) covers the full canvas including the
        border/title area — correctly theme-tokenised, no pure white.
      Chrome: Bold dark title "flamegraph-basic · python · bokeh · anyplot.ai"
        centered at top, takes ~55% of canvas width, fully visible (no clipping at
        top edge). Axes are hidden by design (flame-graph convention). No grid,
        no spines, no outline — clean.
      Data: Seven stack-depth rows from depth 0 (root) to depth 6. Root frame
        (main, 100%) is brand-green #009E73 spanning the full width at the bottom.
        Depth 1 splits into log_metrics (lavender #C475FD, far left), handle_request
        (ochre #BD8233, dominant ~85% middle), and gc_collect (matte-red #AE3030,
        right). Children inherit branch color. The handle_request → process_query →
        execute → fetch_rows hot path carries a thicker INK outline. In-bar labels
        (function name + percentage on wide bars, name-only on medium bars) are
        rendered in INK (#1A1A17). On ochre frames the contrast is comfortable;
        on the matte-red gc_collect frames it is acceptable but lower-contrast.
      Legibility verdict: PASS

    Dark render (plot-dark.png, 3200x1800):
      Background: Warm near-black (#1A1A17) covers the full canvas — correctly
        theme-tokenised, no pure black.
      Chrome: Bold light-cream title in #F0EFE8 reads crisply against the dark
        background, fully visible at top. Axes hidden, no grid, no spines.
      Data: All bar colors are IDENTICAL to the light render (brand-green root,
        ochre handle_request, lavender log_metrics, matte-red gc_collect) — only
        chrome flipped, as required. In-bar labels are now light cream (#F0EFE8)
        and remain readable on every branch color. No dark-on-dark failure: title,
        bar labels, and percentages are all light text on the saturated bar fills.
        Hot-path INK outline is the same dark INK color, which on the dark page
        background becomes slightly less prominent than in the light render, but
        still distinguishes the hot frames against their ochre fill.
      Legibility verdict: PASS
