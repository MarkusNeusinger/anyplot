review:
  strengths:
  - HoverTool with rich call-stack tooltip (Function, Samples, CPU %, Call Stack)
    — bokeh's distinctive interactive feature surfaced cleanly and exported alongside
    the static PNG
  - 'Branch-by-branch coloring uses canonical Imprint palette positions (brand green
    #009E73 root, ochre #BD8233 + matte red #AE3030 for the warm flame mass, lavender
    #C475FD for the log_metrics tail) — palette-compliant and visually intentional'
  - Theme-adaptive Label.text_color is wired through INK so function-name labels flip
    dark→light between renders — both themes are fully readable with no dark-on-dark
    or light-on-light failures
  - Subtle parity-based fill_alpha (0.94/0.86) gives a faint banding cue between adjacent
    depths without competing with the data
  - Canvas is pinned to exactly 3200x1800 via CDP setDeviceMetricsOverride + PIL belt-and-braces
    resize — passes the canvas dimension gate cleanly
  - Iterative DFS layout with sibling-proportional sample widths is clean, deterministic,
    and KISS — no helper functions, no recursion stack risk
  - Width-scaled label tiers (22/18/14pt) with appended '(pct%)' on wide bars give
    immediate visual readout of the hot path
  - Hidden axes + outline + grid follows flame-graph convention and removes visual
    noise (minimal-chrome)
  weaknesses:
  - 'Label overlap on narrow adjacent bars: in the upper-depth clusters (most visibly
    around verify_signature + base64_decode at the rightmost authenticate branch,
    and the small siblings around compare_values/check_null), function-name labels
    on bars ~1.5-3 wide visually touch and read as one merged string like ''verify_signaturebase64_decode''.
    Fix: raise the existing `if r["width"] <= 3: continue` cutoff to ~5, OR shrink
    the smallest-bar font tier from 14pt to ~10pt, OR drop the label entirely on the
    narrowest bars and rely on the hover tooltip for those frames.'
  - 'DE-01 stops at ''clean flame graph'' rather than reaching publication-grade design
    polish. Consider one storytelling lift: a thin INK outline (1-1.5px) on the dominant
    hot-path chain (handle_request → process_query → execute → fetch_rows) to emphasise
    the bottleneck, OR a small italic annotation under the title naming the dominant
    stack (''process_query dominates at 40% of CPU''). The plot tells the story implicitly
    but does not point at it.'
  - Bar separators use a 2.5px PAGE_BG stroke which slightly thickens the apparent
    gap between siblings at small widths — the spec asks for 'minimal or no gaps between
    siblings'. Consider line_width=1.5 instead, so narrow bars don't lose visible
    fill area to the separator stroke.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white, not dark.
      Chrome: Bold dark title "flamegraph-basic · python · bokeh · anyplot.ai" at top, ~55% canvas width, fully readable. Axes are hidden by design (flame-graph convention) so there are no tick labels or axis titles to evaluate.
      Data: Brand green #009E73 root bar "main (100.0%)" spans the full bottom. Ochre #BD8233 handle_request subtree dominates the middle (handle_request 85%, process_query 40%, execute 24%, fetch_rows 15%, parse_headers 20%, authenticate 14%, etc.) with depth up to 6. Matte red #AE3030 gc_collect cluster sits on the right (gc_collect with sweep_phase, mark_phase, trace_refs). Lavender #C475FD log_metrics column on the far left. Function names render in dark INK on bars wider than ~3 units, with "(pct%)" appended on bars wider than 12.
      Legibility verdict: PASS — all text comfortably readable against the warm off-white surface; first series is confirmed #009E73; only minor issue is adjacent narrow-bar labels touching in a few depth-4/5 clusters (counted under VQ-02).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black, not light.
      Chrome: Bold light-cream #F0EFE8 title — readable against dark surface. Same axes-hidden flame-graph convention.
      Data: Colors are pixel-identical to the light render — brand green root, ochre middle, matte red gc_collect, lavender log_metrics — confirming the data palette is theme-independent as required. Function-name labels switch to light cream (INK on dark theme = #F0EFE8) so they remain readable on every coloured bar.
      Legibility verdict: PASS — no dark-on-dark failure detected. Title, in-bar labels, and percentages all readable; the theme tokens (PAGE_BG, INK) thread correctly through to every chrome element. Same minor narrow-bar label overlap as the light render.
