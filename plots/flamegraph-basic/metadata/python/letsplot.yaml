review:
  strengths:
  - 'Hot-path emphasis is a strong storytelling device: saturated red/orange/yellow
    on main → process_request → compute → matrix_mult → dot_product instantly draws
    the eye to the bottleneck, while cool dusty browns recede for non-hot branches.'
  - Layered rendering with INK-colored borders on hot bars vs PAGE_BG-colored borders
    on cool bars creates a subtle 'outline glow' around the hot path in both themes
    — extra hierarchy at zero cost.
  - 'Warm flame palette (semantic exception, correctly applied) is mid-luminance enough
    that dark #1A1A17 in-bar labels stay readable on every bar in both themes — clever
    choice to avoid theme-dependent label color.'
  - Theme tokens (PAGE_BG, INK) are threaded correctly through plot_background, title,
    and bar borders; data colors are identical across light and dark renders as required.
  - 'Idiomatic letsplot: geom_rect + scale_fill_identity for pre-computed colors,
    layer_tooltips() with @field references for the interactive HTML, theme_void()
    as a clean base. Canvas hits exactly 3200×1800 via ggsize(800,450) + scale=4.'
  - Adaptive label suppression — bars too narrow to fit their function name simply
    omit the label rather than truncating or overlapping — keeps the chart clean at
    all widths.
  - 'Reproducible (np.random.seed(42)) with hardcoded, plausible CPU profiling data:
    realistic main → process_request → parse_input/compute/serialize hierarchy with
    sample counts that sum correctly per parent.'
  weaknesses:
  - 'In-bar labels are always hardcoded to #1A1A17 (dark). On the dark render the
    cool brown bars (transform, tokenize, to_json, parse_input, serialize) have mid-luminance
    backgrounds so dark text still reads, but contrast is noticeably softer than the
    hot-path labels — consider choosing label color per-bar based on bar luminance
    (or always use #1A1A17 on warm bars and INK_SOFT on the darkest cool browns) to
    even out legibility across the chart.'
  - char_width_units = total_samples * 0.013 is a magic heuristic — works for the
    current data and ggsize(800,450), but a slightly more conservative coefficient
    (e.g. 0.014–0.015) would prevent edge cases where labels like 'parse_input' or
    'process_request' nearly fill their bar with no horizontal breathing room.
  - 'DE-01: chart is polished but not exceptional — no caption/footnote explaining
    how to read the flame graph (root at bottom, width = sample share), no callout
    for the dominant ''matrix_mult/dot_product'' hot leaf. A short subtitle or annotation
    on the hottest bar would add narrative without clutter.'
  - 'LM-02: tooltips and scale_fill_identity are nice, but letsplot has more distinctive
    features that could be exercised here (e.g. plot_subtitle/caption via labs(),
    ggtb()-style toolbar, or storing the data on the plot via ggplot(df) rather than
    per-layer).'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 as required — confirmed not pure white.
      Chrome: Bold dark title "flamegraph-basic · python · letsplot · anyplot.ai" centered at top, fully visible, ~55% of canvas width — readable. theme_void() removes axes (correct for a flame graph; x-position has no temporal meaning).
      Data: Six-layer stacked rectangle pyramid with root "main" at the bottom (yellow #FFD54F), "process_request" above it (orange #FFA726), then "compute" (#FB8C00), "matrix_mult" (#EF5350), and the leaf "dot_product" (deep red #D32F2F) — saturated warm gradient marks the hot path. Non-hot branches (init_config, cleanup, parse_input, serialize, transform, tokenize, to_json, normalize, scale) use dusty mid-luminance browns (#E8C580 → #A2563B). Each bar has a function-name label in bold dark #1A1A17 only when the bar is wide enough to fit it. Hot-path bars have a thin dark INK border (#1A1A17), cool bars have a near-invisible PAGE_BG-colored border acting as a subtle 1px gap.
      Legibility verdict: PASS — all titles, in-bar labels, and color distinctions are clearly readable on the warm off-white background.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 as required — confirmed not pure black.
      Chrome: Title rendered in light off-white #F0EFE8, same placement, fully readable on the dark surface.
      Data: Identical hot-path warm palette (yellow → orange → red) and cool brown palette to the light render — verified data colors do not flip across themes. Hot-path bars now carry a light off-white INK border (#F0EFE8) that pops nicely against the dark canvas, giving the hot path an "outline glow". Cool-bar borders are PAGE_BG (#1A1A17), so the gaps between cool bars read as thin black slits — clean and intentional.
      In-bar labels: still hardcoded dark #1A1A17. On the yellow/orange/red bars (main, process_request, compute, matrix_mult, dot_product) contrast is strong. On the cool brown bars (transform, tokenize, to_json, parse_input, serialize) the dark labels are still readable because the browns sit at mid-luminance, but contrast is the softest spot of the chart. No "dark-on-dark" failure — all labels remain legible.
      Legibility verdict: PASS — no text is rendered invisibly; data colors match the light render exactly; the hot path actually pops slightly more on dark than on light thanks to the light INK outline.
