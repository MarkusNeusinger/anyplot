review:
  strengths:
  - Theme-adaptive chrome correctly threaded through sns.set_theme rc params — both
    light (#FAF8F1) and dark (#1A1A17) backgrounds render with appropriate ink colors,
    no dark-on-dark or light-on-light failures.
  - Imprint warm palette via sns.blend_palette([AMBER, OCHRE, RED]) — stays inside
    the Imprint identity while honoring the flame-graph warm-palette convention from
    the spec.
  - 'Hot path highlighted with brand-green #009E73 outline (main → process_request
    → handle_route → query_database → execute → send_query) creates an unmistakable
    focal point and elevates DE-03 storytelling beyond a generic flame graph.'
  - 'Luminance-based per-bar text color (INK on light bars, #FAF8F1 on dark bars)
    keeps in-bar labels readable across the entire warm gradient.'
  - 'Smart label sizing/truncation: bars >9% get 7pt, >4.5% get 6pt, narrow bars skip
    labels entirely — avoids the tiny-truncated-5pt clutter that was flagged in attempt
    1.'
  - RES=4 column expansion of the heatmap substrate eliminates the antialiased seams
    between sibling bars at the same depth, giving the directly-adjacent look the
    spec requires.
  - hashlib.md5 instead of Python hash() — deterministic colors across PYTHONHASHSEED-randomised
    processes, so light/dark renders match exactly.
  - Realistic and neutral CPU-profiling dataset (web service request handler with
    auth, DB query, serialization, logging) — domain-plausible and free of controversial
    content.
  - Title exactly matches mandated format 'flamegraph-basic · python · seaborn · anyplot.ai'.
    Canvas at figsize=(8, 4.5)·dpi=400 hits 3200×1800 cleanly (no canvas gate failure).
  weaknesses:
  - The continuous warm colormap is built from Imprint warm anchors via sns.blend_palette
    rather than from imprint_seq/imprint_div. This is a justified deviation (spec
    explicitly mandates a warm flame palette), but a future reviewer should note that
    the canonical Imprint continuous cmaps are not used.
  - color_for() helper function adds a small abstraction that bumps the implementation
    slightly off pure KISS — it's reused twice (grid fill + label luminance), so the
    abstraction is warranted, but a stricter reading docks 1 pt on CQ-01.
  - The brand-green hot-path outline overlaps with the warm red-tones for any viewer
    with red-green CVD — semantic context (focal-point outline, not categorical encoding)
    keeps this acceptable, but a CVD-strict pass would prefer a non-green emphasis
    (e.g., heavier black outline + label callout).
