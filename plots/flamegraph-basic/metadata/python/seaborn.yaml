      Data: warm flame palette (amber #DDCC77 → ochre #BD8233 → red #AE3030) blended via seaborn.blend_palette. First series role (focal hot path) uses brand green #009E73 as outline only. In-bar labels use dark INK on light amber bars and near-white #FAF8F1 on dark red bars (luminance-gated), all readable. Stacked layout with D0 main(100%) at bottom, ascending through process_request → handle_route → query_database → execute → send_query.
      Legibility verdict: PASS — every text element clearly visible against the off-white surface, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: warm near-black at #1A1A17 — correct, not pure black.
      Chrome: same title in light INK (#F0EFE8), clearly readable. Axis labels and tick labels in INK_SOFT (#B8B7B0), readable. Vertical grid hint visible at the same alpha — chrome flipped to light tones.
      Data: identical warm flame palette to the light render — confirmed amber/ochre/red bars in the same positions with the same hash-derived shading. Brand-green #009E73 hot-path outline identical and equally visible against the warm bars. In-bar labels keep the same luminance-gated dark/light text color (the bar fill colors are theme-invariant, so the per-bar text colors don't flip either — correct behavior).
