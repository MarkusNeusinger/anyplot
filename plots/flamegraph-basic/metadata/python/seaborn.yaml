review:
  strengths:
  - 'Creative seaborn-native approach: uses sns.heatmap with a masked 2D grid as the
    substrate for flame-graph bars, leveraging the library''s high-level API instead
    of dropping to bare matplotlib rectangles.'
  - 'Custom warm flame colormap built via sns.blend_palette from three Imprint warm
    anchors (#DDCC77 amber, #BD8233 ochre, #AE3030 red) — satisfies the flame-graph
    aesthetic convention while staying inside the Imprint palette.'
  - Theme-adaptive chrome wired through sns.set_theme rc dict — both light (#FAF8F1)
    and dark (#1A1A17) renders are fully readable with no dark-on-dark or light-on-light
    failures.
  - Canvas hits exactly 3200×1800 via figsize=(8, 4.5) × dpi=400 with no bbox_inches='tight';
    subplots_adjust used for margin control.
  - Realistic CPU profiling dataset (~65 stack traces, 7 depth levels) modelled on
    a web-service request handler — bottleneck distribution (process_request 63%,
    handle_route 37%, query_database 21%) tells a plausible performance story.
  - In-bar labels with percentages on wide bars, semibold weight on the largest spans,
    ellipsis truncation calibrated to bar width — clear visual hierarchy from main
    → leaves.
  - Luminance-aware text-color selection so labels stay readable on both light and
    dark bar colors.
  - Spines despined (top/right) and only a subtle vertical grid retained — horizontal
    grid would have fought the stacked-bar layout.
  weaknesses:
  - 'CQ-02 reproducibility: color_val uses Python''s built-in hash(func_name), which
    is PYTHONHASHSEED-dependent. Within a single process this is stable, but across
    the two separate light/dark render runs the bar colors could drift unless the
    CI environment pins PYTHONHASHSEED. Use a deterministic hash (hashlib.md5(func_name.encode()).hexdigest()
    → int) or a sorted enumeration index instead, so the same function name maps to
    the same color on every machine.'
  - 'DE-02 visual refinement: heatmap cells leave faint vertical seams between same-depth
    siblings (visible as thin background slivers between adjacent bars at D2/D3).
    Consider rendering the bars as solid rectangles per stack frame (or increasing
    the integer column granularity) so siblings appear truly adjacent with zero gaps,
    matching the flame-graph ''no gap between siblings'' convention.'
  - 'DE-03 storytelling: the hottest path (process_request → handle_route → query_database
    → execute, the actual bottleneck) is not emphasised beyond shared semibold weight.
    A subtle outline or a brand-green accent on the longest leaf-to-root path would
    give the eye an obvious focal point — the whole point of a flame graph.'
  - 'VQ-01 small-bar legibility: 5pt font on the narrowest bars (rea..., loa..., gzi...,
    deco..., compr...) is borderline at 400 px web preview width. Either drop those
    labels entirely below the 0.045 fraction threshold, or replace the ellipsis truncation
    with a single-letter glyph for very narrow bars.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — confirmed, not pure white, not dark.
      Chrome: Title "flamegraph-basic · python · seaborn · anyplot.ai" in dark ink at top — fully readable. "Stack depth" Y-axis label (rotated) and "Samples" X-axis label both in dark ink — readable. Y-tick labels D0–D6 visible in soft ink. X-tick labels 0, 200, 400, 600, 800 visible in soft ink. Subtle vertical grid lines at the X-tick positions, low alpha. Top and right spines despined; left+bottom spines in soft-ink color. No clipping at any edge.
      Data: Warm flame palette — amber/yellow (#DDCC77), ochre/orange (#BD8233), red (#AE3030) — built via sns.blend_palette. Stack frames stacked bottom-up, root "main (100%)" as the full-width bar at D0, "process_request (63%)" at D1 in deep red, "handle_route (37%)" + "log_metrics (19%)" + "authenticate..." at D2, narrower deeper frames above. In-bar labels readable on wide bars; narrow bars carry truncated labels at 5pt. Bar text alternates dark/light based on luminance.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — confirmed, not pure black, not light.
      Chrome: Title in light ink (#F0EFE8) at top — fully readable, NOT dark-on-dark. "Stack depth" + "Samples" axis labels in light ink — readable. D0–D6 Y-ticks and 0/200/400/600/800 X-ticks in soft ink (#B8B7B0) — readable against the warm near-black background. Subtle vertical grid lines visible. No dark-on-dark failures anywhere.
      Data: Bar colors identical to light render — same amber/ochre/red flame palette at the same depth + function positions (cleanup ochre, process_request deep red, log_metrics amber, handle_route amber, query_database ochre, etc.). Only chrome (background + text + tick + grid color) flipped — data colors are preserved as required.
      Legibility verdict: PASS

    Both renders pass the theme-readability gate. Canvas-dimension gate file (/tmp/anyplot-canvas-gate.txt) is absent → canvas at the required 3200×1800 target.
