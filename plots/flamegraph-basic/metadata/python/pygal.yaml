review:
  strengths:
  - 'Faithful flame-graph semantics: BFS-built call-stack tree with widths proportional
    to sample counts, siblings touch via transparent-spacer alignment inside pygal''s
    HorizontalStackedBar.'
  - Dark-theme legibility on matte-red bars is now fixed — per-depth label ink switches
    to INK_LIGHT (#F0EFE8) when perceived bar luminance < 130, so the deepest Depth
    4–5 bars ('execute_sql', 'walk_dfa') read cleanly in both themes.
  - 'Theme adaptation is clean: chrome flips correctly between #FAF8F1/#1A1A17 and
    INK light/dark; warm bar gradient (amber → ochre → matte red) stays identical
    between renders as the style guide requires.'
  - 'Warm gradient is sourced from Imprint anchors (#DDCC77, #BD8233, #AE3030) via
    the Semantic Exception for the Brendan Gregg flame-graph convention, with an in-code
    rationale — VQ-07 compliant.'
  - 'Realistic, neutral CPU-profile dataset: 42 stacks across 6 depth levels modelling
    a web-service request handler.'
  - In-bar label gating tries 'name (samples)' → plain name → empty, so wide bars
    stay informative and narrow ones don't overflow; right margin bumped to 90 px
    so 'send_response' has breathing room.
  - 'Distinctive pygal usage: SVG post-processing via regex to inject per-row inline
    label color, leveraging pygal''s open SVG output as a customization surface.'
  weaknesses:
  - 'DE-01/DE-03 ceiling: no hot-path callout, no depth-color scale strip, no annotation
    on the dominant deep stack — a thin arrow + label at ''db_query;execute_sql''
    would lift storytelling above current ''faithful display'' level.'
  - Left vertical axis spine is still visible; matching the style guide's L-shaped
    frame default (or going spine-less since this is a categorical depth axis) would
    tighten DE-02.
  - importlib + sys.path.pop(0) dance to avoid the filename collision works but reads
    as defensive boilerplate ahead of the chart logic; a top-level module rename or
    pyproject `tool.pytest`-style entry would be cleaner long-term.
  - Regex-based SVG label recoloring is clever but fragile — if pygal's SVG label
    markup changes in a future release, the per-depth ink swap silently no-ops. A
    short comment noting the pygal version that was probed would help future maintainers.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 (style-guide compliant; not pure white).
      Chrome: title "flamegraph-basic · python · pygal · anyplot.ai" in dark INK ink at top center; y-axis title "Call Stack Depth" rotated on the left; x-axis title "Samples" centered below; "Depth 0" through "Depth 5" row labels in dark INK on the left; x-axis ticks 0/100/200/.../1000 in dark INK along the bottom — all chrome readable against the cream background.
      Data: six rows of stacked horizontal bars representing the call-stack profile. Depth 0 is a full-width amber #DDCC77 base labeled "main (1000)". Depth 1 carries "process_request (780)" plus gc_collect / idle_wait / log_metrics in ochre tones. Depth 2 shows "execute_handler (340)", "parse_headers (140)", "route_dispatch (200)", "send_response". Depth 3 surfaces "authorize", "db_query (160)", "regex_match". Depth 4 reaches matte-red #AE3030 with "execute_sql" and "walk_dfa". Depth 5 caps with the narrowest leaf. Colors are sourced from Imprint anchors via the Semantic Exception for the Brendan Gregg flame-graph convention; first-warm-anchor is #DDCC77 (amber) not the default #009E73, justified by the domain convention. Sibling bars touch with only a 1.2 px page-bg stroke. In-bar labels sit on warm bars in dark text where it reads clearly.
      Legibility verdict: PASS — every text element is readable, no overflow past the canvas frame, title fits at ~70% of plot width as expected for the long mandated string.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 (style-guide compliant; not pure black).
      Chrome: title, axis titles, "Depth 0..5" row labels, and 0–1000 x-axis ticks all render in light INK (#F0EFE8). No dark-on-dark failures on the chrome layer — every chrome element is readable.
      Data: identical Imprint-anchor warm gradient as the light render (amber #DDCC77 at Depth 0 → ochre #BD8233 mid-stack → matte red #AE3030 at Depth 4–5). The first-attempt weakness (dark text on matte-red bars in dark theme) is resolved: the implementation now precomputes perceived luminance per bar color and switches the in-bar label ink to INK_LIGHT (#F0EFE8) on the deep-red rows, so "execute_sql" and "walk_dfa" are now light text on red rather than dark-on-red. Labels on the bright amber/ochre rows remain dark for contrast there.
      Legibility verdict: PASS — chrome is theme-correct, in-bar labels are now legible on every depth, both bright and dark bars.
