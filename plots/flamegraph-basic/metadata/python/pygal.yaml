review:
  strengths:
  - 'Faithful flame-graph semantics: hierarchical stacks built bottom-up (Depth 0
    = main at the base, leaves on top), widths proportional to sample counts, siblings
    touch with no gaps — the BFS + transparent-spacer trick correctly aligns children
    under their parents inside pygal''s HorizontalStackedBar.'
  - 'Theme adaptation is clean: chrome (background, ink, ticks, axis titles) correctly
    flips between #FAF8F1/#1A1A17 and INK light/dark; warm bar gradient stays identical
    between renders as required by the style guide.'
  - 'Warm amber→ochre→matte-red gradient is sourced from Imprint anchors (#DDCC77,
    #BD8233, #AE3030) with a clear in-code rationale citing the Semantic Exception
    for Brendan Gregg''s flame-graph convention — VQ-07 compliant.'
  - 'Realistic, neutral CPU-profile dataset: 42 unique stacks across 6 depth levels
    modelling a web-service request handler (parse_headers, route_dispatch, execute_handler/db_query/serialize_json,
    gc_collect, log_metrics) — domain-plausible and free of controversial content.'
  - 'In-bar label gating is well thought through: tries ''name (samples)'', falls
    back to plain name, then drops the label when it can''t fit — keeps wide bars
    informative without overflow on the narrow ones.'
  - Title format is correct ('flamegraph-basic · python · pygal · anyplot.ai'), legend
    correctly suppressed for a flame graph (depth axis already encodes the hierarchy),
    canvas is exactly 3200×1800.
  - 'Distinctive pygal usage: per-value dicts to override color/label/style per segment,
    HorizontalStackedBar repurposed as a flame-graph substrate, dual PNG + interactive
    SVG-in-HTML export.'
  weaknesses:
  - 'Dark-render legibility on the darkest bars: in-bar labels at Depth 4 (''execute_sql'',
    ''walk_dfa'') render as dark text on the matte-red #AE3030 bar — readable but
    contrast is noticeably tighter than the lighter depths. Consider switching in-bar
    label color to INK_DARK (#F0EFE8) when the bar''s perceived luminance falls below
    a threshold (i.e. for the deepest red bars), so labels stay punchy on dark theme
    without losing readability on light.'
  - 'DE-01/DE-02 ceiling: the chart is functional and on-brand but visually conservative.
    No legend/scale strip for the depth-color encoding, no subtle separator between
    adjacent same-depth siblings beyond a 1.2 px page-bg stroke, no callout for the
    dominant hot path. A thin annotation arrow + small label at the widest deep stack
    (e.g. ''hot path → db_query;execute_sql'') would lift DE-03 storytelling considerably.'
  - 'Right-edge crowding at Depth 2: ''send_response'' sits flush against the plot''s
    right boundary at ~x=1000 in both renders, with the trailing ''e'' touching the
    inner axis line. Pixels appear present (so it is not AR-09), but margin_right=40
    leaves no breathing room — bump margin_right to ~80–100 or compute the rightmost
    label width and reserve space for it.'
  - Y-axis label 'Call Stack Depth' is set at label_font_size=56 — that's appropriate
    for the 3200×1800 canvas, but the per-row 'Depth 0…5' major labels are 44 px and
    visually compete with the data. Reducing major_label_font_size to ~36 would calm
    the left margin and let the bars dominate visually.
  - 'LM-01 / CQ-03: the importlib + sys.path dance (''_saved = sys.path.pop(0)'')
    is a workaround for the filename collision with the pygal package. The comment
    explains why, but renaming the file is not an option in this pipeline — consider
    at least extracting it behind a single-line shim or accepting the standard `import
    pygal` pattern by guaranteeing the implementation isn''t shadowed at the package
    level. As-is it works but reads as defensive boilerplate that obscures the chart-construction
    logic.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — matches the spec target exactly; no pure-white surfaces.
      Chrome: title "flamegraph-basic · python · pygal · anyplot.ai" rendered in dark monospaced ink across the top, comfortably within the canvas (~70% width, expected for the mandated title). Y-axis row labels "Depth 0" through "Depth 5" along the left edge in dark ink, "Call Stack Depth" rotated vertical axis title in dark ink, "Samples" axis title centered at the bottom, x-axis ticks 0/100/200/.../1000 across the bottom. All chrome is fully legible against the cream background.
      Data: stacked horizontal bars one row per call-stack depth (Depth 0 = full-width "main (1000)" at the bottom, "process_request (780)" + sibling group gc_collect/idle_wait/log_metrics at Depth 1, and so on up to Depth 5 with only the narrow execute_sql leaves). Bars use a warm amber→ochre→matte-red gradient keyed to depth (#DDCC77 at depth 0, ramping through #BD8233 mid-stack, to #AE3030 at the deepest level). In-bar labels render where they fit ("main (1000)", "process_request (780)", "execute_handler (340)", "authorize", "db_query (160)", "execute_sql", "walk_dfa", "regex_match", "parse_headers (140)", "route_dispatch (200)", "send_response", "gc_collect", "idle_wait", "log_metrics"). Adjacent siblings touch with only a thin 1.2 px page-bg stroke separating them — flame-graph convention preserved.
      Legibility verdict: PASS — all titles, axis labels, ticks, and in-bar text are readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — matches the spec target; no pure-black surfaces. The transparent spacer columns between stacks let the dark surface show through correctly under the gaps.
      Chrome: title and axis labels render in the light INK token (#F0EFE8) — title, "Call Stack Depth", "Samples", "Depth 0..5" row labels, and 0–1000 x-axis ticks are all crisp light-on-dark, no dark-on-dark failures on the chrome layer.
      Data: bar colors are IDENTICAL to the light render — amber/ochre/matte-red gradient unchanged (verified by visual comparison). Only the surrounding chrome flipped, exactly as required. In-bar labels remain dark text on the warm bars — this works well on the bright amber rows (Depth 0–2) and is still readable, though noticeably tighter, on the matte-red Depth 4 rows ("execute_sql", "walk_dfa") where the bar luminance is lower; the contrast is not failing but it is the weakest point of the dark theme.
      Legibility verdict: PASS — all chrome readable, in-bar labels readable across all depths; flag noted in weaknesses for tightening dark-bar in-label contrast.
