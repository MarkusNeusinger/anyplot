  image_description: The plot displays a flame graph for CPU profiling of a web server
    application. The bottom bar is "main (100.0%)" in deep red/orange spanning the
    full width. Above it, "handle_request (85.0%)" dominates in orange, with smaller
    "log_metrics" and "gc_collect" bars flanking it. Higher levels show "process_query
    (40.0%)", "authenticate (20.0%)", "send_response", "parse_headers" etc. The deepest
    level (depth 5) shows "read_index" and "deserialize" in pale yellow. Colors transition
    from deep red (high sample count) to pale yellow (low sample count), following
    flame graph conventions. White borders separate bars cleanly. Function names and
    percentages are displayed inside bars when wide enough. White background, no axes,
    title "flamegraph-basic · bokeh · pyplots.ai" centered at top.
