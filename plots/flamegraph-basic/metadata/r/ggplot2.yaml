review:
  strengths:
  - 'Correctly implements the classic flame-graph layout: bottom-anchored root ''main'',
    stacked depths growing upward, sibling widths summed from descendant leaves so
    parent spans equal child totals.'
  - 'Theme-adaptive chrome is wired through cleanly via ANYPLOT_THEME — PAGE_BG (#FAF8F1
    / #1A1A17), INK, INK_SOFT, INK_MUTED tokens all flip together; data colors stay
    identical across both renders.'
  - 'Warm Imprint-anchored palette (FLAME_BASE #AE3030 → FLAME_MID #BD8233 → FLAME_TIP
    #DDCC77) via scale_fill_gradientn delivers the conventional flame aesthetic the
    spec calls for while staying within Imprint''s semantic-exception envelope.'
  - 'Smart label budgeting: function names truncated with ''…'' proportional to bar
    fraction, and labels dropped entirely below the ~3-char threshold — keeps narrow
    slivers clean instead of cluttered.'
  - 'Idiomatic ggplot2: geom_rect with xmin/xmax/ymin/ymax aesthetic, scale_fill_gradientn,
    expansion(add=…) for tight axes, theme_minimal + token overrides — uses the high-level
    API throughout.'
  - Title matches the mandated 'flamegraph-basic · r · ggplot2 · anyplot.ai' format
    exactly; axis titles 'Samples (CPU time)' and 'Call stack depth' carry implicit
    units and read clearly.
  - Canvas at 8in × 4.5in @ dpi=400 = 3200×1800 — hits the canonical landscape target
    exactly, no canvas-gate drift.
  weaknesses:
  - 'Low text contrast on the depth-1 and depth-2 bars in both renders: the ''main''
    / ''train_model'' / ''load_dataset'' labels are LABEL_INK (#1A1A17) on FLAME_BASE
    (#AE3030, matte red) and the BASE→MID interpolation — measured contrast ratio
    ~3.0:1 to ~3.8:1, below WCAG AA for normal text. Labels are still legible at full
    size but feel washed out. Consider switching LABEL_INK to a near-white token (e.g.
    #F0EFE8) only for bars whose fill luminance is below ~0.3, or darkening FLAME_BASE
    further so dark text reads cleanly.'
  - 'Slight visual refinement gap: the warm-fill bars sit directly on the page background
    with no axis line on the y-axis side and no subtle hierarchy beyond the depth-driven
    gradient. A faint baseline tick row or a 1-px ELEVATED_BG panel under the flame
    body could lift it from ''correct'' to ''polished''.'
  - expand_stack() is the only helper function — CQ-01 strictly prefers a flat script.
    The function is short and arguably load-bearing here, but it could be inlined
    as a vectorised tidyr/dplyr separate_rows + cumulative-prefix pipeline to keep
    the script function-free.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — matches the Imprint light surface; not pure white.
      Chrome: Title "flamegraph-basic · r · ggplot2 · anyplot.ai" in dark ink, top-left, ~45% of plot width — clean and readable. Y-axis title "Call stack depth" rotated 90°, x-axis title "Samples (CPU time)" centered below; both INK with INK_SOFT tick labels (1–5 on y, 0/200/400/600 on x). X-axis has a subtle INK_SOFT baseline line; no grid (intentional — flame graphs don't need gridlines). All chrome readable.
      Data: Five rows of stacked bars forming the canonical flame shape — depth 1 'main' (matte red FLAME_BASE #AE3030) anchored at bottom spanning full width; depth 2 splits into evalu… / load_dataset / parse_co… / train_model; depths 3–5 narrow further with the gradient warming toward amber (FLAME_TIP #DDCC77) at the top. Sibling bars share a hairline #FAF8F1 separator so they read as adjacent but distinct. Labels truncated with '…' where bars are narrow; dropped on the thinnest slivers.
      Legibility verdict: PASS — all axis chrome and most bar labels are clearly readable. Caveat: dark labels on the matte-red FLAME_BASE bars (depths 1–2) have a measured contrast ratio of only ~3.0–3.8:1 (sub-AA for normal text) — still legible at full size but the weakest contrast on the chart.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — matches the Imprint dark surface; not pure black.
      Chrome: Title flips to INK light (#F0EFE8) and reads crisply against the dark surface. Axis titles in INK, ticks in INK_SOFT (#B8B7B0) — all clearly readable. No dark-on-dark failures on any chrome element; baseline x-axis line is visible in INK_SOFT. No text is invisible.
      Data: Bar fills are identical to the light render — same FLAME_BASE → FLAME_MID → FLAME_TIP gradient by depth, same warm flame aesthetic. Only the inter-bar separator color flips: dark slits in #1A1A17 between bars on the dark surface still cleanly delimit siblings. Label color stays LABEL_INK (#1A1A17) — intentional fixed-dark text on warm fills, which preserves the colour identity across themes.
      Legibility verdict: PASS — all chrome readable; data colors confirmed identical to light render. Same caveat as light: dark labels on the depth-1/depth-2 matte-red bars are the lowest-contrast text on the plot, but still legible.
