review:
  strengths:
  - 'Full hierarchical flame-graph layout derived from leaf stacks: prefix expansion
    + per-depth cumulative x-positioning with alphabetical sibling ordering — exactly
    the standard flame-graph convention'
  - Conditional in-bar labels with ellipsis truncation when bars are narrow and complete
    suppression for very thin bars — prevents the most common flame-graph overlap
    failure
  - Per-bar luminance-aware label ink (WCAG relative-luminance threshold on the interpolated
    gradient) — depth-1/2 dark-red rows get light text, ochre/amber tip rows keep
    dark text, so every label keeps AA-level contrast on both themes
  - Warm flame palette correctly sourced as the Imprint semantic exception (matte
    red → ochre → amber) — convention preserved while staying inside the palette spec
  - Realistic, neutral CPU-profile of a model-training script (parse_config → load_dataset
    → train_model → evaluate → render_report) with plausible sample counts (4–152)
    showing the canonical hot-path pattern
  - Theme tokens flipped through every chrome element on both renders; data colors
    are pixel-identical between light and dark
  weaknesses:
  - 'DE-02: a thin axis line is still drawn on the left and bottom of the panel; pure
    flame graphs read cleaner with no panel border at all — consider element_blank()
    for axis.line.x/y and rely on the panel background contrast'
  - 'DE-03: the depth-based gradient is the only storytelling cue; consider highlighting
    the dominant hot path (main → train_model → forward_pass/backward_pass → matmul
    → simd_kernel) via a thin accent stroke or a slight saturation boost so the eye
    lands on the bottleneck immediately'
  - 'CQ-01: defines an `expand_stack()` helper function — KISS prefers fully inline
    code. Could be folded into a single `do.call(rbind, Map(...))` using an anonymous
    function or a tidyr::separate_rows pipeline, eliminating the named helper'
  - 'LM-02: the layout math is hand-rolled in a `for` loop rather than expressed via
    dplyr group_by + cumulative arithmetic — a more idiomatic tidyverse expression
    (e.g. group_by(depth, parent) %>% mutate(xmin = lag(cumsum(value), default = 0)
    + parent_offset)) would showcase ggplot2''s grammar-of-graphics ecosystem better'
  - 'VQ-01 (minor): inside-bar labels at geom_text size = 3.0 mm (~8.5 pt) read fine
    at full size but get tight in the 400 px mobile preview — labels on the narrowest
    5-char bars approach unreadability when shrunk'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white at #FAF8F1 with a slightly elevated panel at #FFFDF6 — matches the Imprint light spec.
      Chrome: title "flamegraph-basic · r · ggplot2 · anyplot.ai" sits top-left in dark ink and is fully visible; "Call stack depth" y-axis label and "Samples (CPU time)" x-axis label both clearly readable in dark ink; tick labels (0, 200, 400, 600 on x; 1–5 on y) render in soft gray (#4A4A44) and are crisp; a thin INK_SOFT axis line is visible at the panel edges.
      Data: five-level flame graph with the conventional warm gradient — depth 1 ("main") in matte red #AE3030, depth 2 (evaluate / load_dataset / parse_config / train_model) in a red-orange interpolation, depth 3 in ochre #BD8233, depth 4 in pale ochre, depth 5 (leaves: simd_kernel, syscall_read, cast_types, etc.) in amber #DDCC77. Function names sit centered in each bar where there's room; narrow bars are truncated to e.g. "sysca…", "cas…", "for…", "ste…"; sliver bars are unlabeled. The luminance-aware ink picker correctly switches: depth-1/2 dark-red rows carry LIGHT labels (#F0EFE8), depth-3+ ochre/amber rows carry DARK labels (#1A1A17). All text passes "no light-on-light" check.
      Legibility verdict: PASS — every chrome element and every in-bar label is readable; no clipping at canvas edges.

    Dark render (plot-dark.png):
      Background: warm near-black at #1A1A17 with elevated panel at #242420 — matches the Imprint dark spec.
      Chrome: title rendered in light ink #F0EFE8 and is fully visible against the near-black surface; both axis titles and tick labels render in light-gray INK_SOFT (#B8B7B0) and remain crisp; no "dark-on-dark" failure anywhere — every chrome element passes the explicit theme-readability check.
