review:
  strengths:
  - 'Excellent spec compliance: all required features implemented correctly — 50%
    reference line, dual-color fills above/below 50%, scoring event annotations with
    dot+connector+label, quarter dividers (Q1–Q4), final score corner annotation'
  - 'Strong data storytelling: the Lakers comeback narrative is immediately legible
    through fill colors, HOME WINS/AWAY WINS directional labels, and annotated key
    turning points'
  - 'Idiomatic Chart.js: `fill: { target: { value: 50 }, above, below }` conditional
    fill is the correct Chart.js v4 API; custom afterDraw plugin for quarter markers
    and event annotations is proper Chart.js pattern'
  - 'Semantic Imprint palette: brand green (#009E73) for home team win, matte red
    (#AE3030) as semantic exception for away/loss — both are justified by Imprint
    style guide semantic anchor rules'
  - Deterministic LCG with fixed seed ensures 100% reproducible output across renders
  - Theme-adaptive chrome correctly wired through ANYPLOT_TOKENS in both light and
    dark renders — all text elements use t.ink / t.inkSoft, background comes from
    pageBg
  - Realistic NBA context (Lakers 112 – Celtics 101, 48-minute game) with plausible
    win probability arc
  weaknesses:
  - Event annotation labels drawn at 11px CSS (22px native output pixels) — this is
    below the legible floor for the 3200×1800 canvas; increase to 13px CSS minimum
    for readability when the PNG is scaled to mobile viewport (~400px)
  - 'Chart.js border/spines not removed — add `border: { display: false }` to both
    x and y scale configs to achieve the L-shaped (or borderless) look required by
    the Anyplot style guide; current implementation keeps all four plot-area borders
    visible which adds visual clutter'
  - 'CQ-01: two helper functions (trendAt, lcg) deviate from the KISS flat-script
    pattern; the LCG seed can be inlined as a simple constant data array or moved
    to a single flat expression to keep the code more linear'
