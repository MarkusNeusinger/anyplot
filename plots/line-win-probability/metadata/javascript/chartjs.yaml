review:
  strengths:
  - Excellent use of Chart.js fill API with threshold target at 50% (above/below fill
    for home/away momentum) — idiomatic and visually effective
  - Custom afterDraw plugin elegantly handles quarter dividers, directional labels,
    and final score annotation on the canvas
  - 'Semantic Imprint palette choice: brand green for home team, matte red (#AE3030)
    for away team — sports win/loss convention correctly triggers the semantic exception'
  - Deterministic LCG seeded at 42 with a compelling game narrative (Lakers trail
    in Q2, stage comeback, seal Q4 win)
  - 'Full theme adaptation: both light (#FAF8F1 background) and dark (#1A1A17 background)
    renders are legible with data colors unchanged'
  - Legend filter correctly hides the _ref50 internal reference dataset from the legend
  - 'Title format is exact per spec: ''line-win-probability · javascript · chartjs
    · anyplot.ai'''
  weaknesses:
  - Missing specific scoring event annotations on the probability line — the spec
    explicitly requires annotating key plays (touchdowns, field goals, etc.) that
    cause significant probability swings; only quarter dividers are present, but no
    point-specific event labels on the curve itself
  - Lower quarter of the chart (0–25% range) is completely empty due to data only
    dipping to ~28%; while the 0–100% axis range is spec-required, this large empty
    zone creates visual imbalance in both renders
  - Quarter labels (Q1–Q4) rendered at 13px bold are the smallest text on the chart;
    acceptable but marginally tight — consider 14px for better readability at mobile
    thumbnail sizes
  - Right layout padding (24px) and bottom padding (10px) leave very little breathing
    room for the corner annotations; AWAY WINS label sits at the very bottom edge
    of the chart area
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface
      Chrome: Title "line-win-probability · javascript · chartjs · anyplot.ai" in dark ink at top, clearly readable. Y-axis label "Home Team Win Probability" and X-axis label "Game Time (minutes)" both readable. Tick labels show 0%/25%/50%/75%/100% and 0'/6'/12'/18'/24'/30'/36'/42'/48' — all readable. Quarter labels Q1–Q4 at 13px bold visible. In-chart annotations "HOME WINS ↑" (green) and "AWAY WINS ↓" (red) and "Final: Lakers 112 – Celtics 101" all fully visible.
      Data: Brand green (#009E73) line tracing win probability from ~50% (game start), rising slightly in Q1, dipping to ~28% at Q2/Q3 midpoint, then recovering strongly through Q4 to ~85%. Green semi-transparent fill above 50% reference line; pink/red semi-transparent fill below 50% reference line. Dashed gray 50% reference line visible. Dashed vertical lines mark quarter boundaries.
      Legibility verdict: PASS — all text readable against the warm off-white background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title, axis labels, and tick labels all visible in light ink against dark background. Quarter labels Q1–Q4 visible. "HOME WINS ↑" in brand green and "AWAY WINS ↓" in matte red both readable against dark. Final score annotation in light ink readable.
      Data: Data colors identical to light render — brand green line and fills, matte red fill below 50%. Only chrome (text, background, grid) changes between themes. The red/dark fill area (when probability < 50%) blends slightly more into the dark background but the green line boundary remains visible. Both fills distinguishable.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome elements correctly use light ink tokens on dark background
