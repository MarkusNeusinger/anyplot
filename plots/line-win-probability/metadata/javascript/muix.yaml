review:
  strengths:
  - Correct split-fill technique using two area series with baseline=0.5 — elegantly
    captures home/away probability zones without custom SVG
  - 'Excellent data storytelling: reference lines for all key events (goals, half-time)
    plus the final-score subtitle make the match narrative immediately clear'
  - Perfect Imprint palette compliance — home series uses t.palette[0] (#009E73 brand
    green), away series uses t.palette[2] (#4467A3 Imprint blue) with semantic justification
    for City Blue FC
  - Deterministic LCG (seed=42) ensures full reproducibility without Math.random()
  - 'Fully theme-adaptive chrome: all title, label, and reference-line text uses t.ink
    / t.inkSoft / t.pageBg; both renders pass readability checks with no dark-on-dark
    or light-on-light issues'
  weaknesses:
  - 'VQ-01 minor: reference line labels are 12px CSS (~24px native at 2x) — on the
    small side for the 3200x1800 canvas; raise to 13–14px for all ChartsReferenceLine
    labelStyle entries for slightly better mobile readability'
  - 'VQ-02 minor: labelAlign=end places both Goal-Home-84-prime and 50-pct-even-odds
    labels in the right-hand zone at a shared horizontal band; with the 48px right
    margin they are visually crowded and could overlap under different font-metric
    conditions — consider labelAlign=start for the 84-minute reference line or increase
    right margin to 72px'
  - 'DE-02: MUI X default grid and axis chrome are mostly untouched; a lower-opacity
    grid (e.g. strokeOpacity: 0.12) and explicit removal of axis spine lines where
    MUI X allows it would lift the visual refinement further'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) cream surface — correct theme background.
      Chrome: Title "line-win-probability · javascript · muix · anyplot.ai" in dark bold text, clearly readable. Subtitle "Forest Green FC 2 – 1 City Blue FC · 90 minutes" in secondary ink below. Y-axis label "Home Win Probability" (rotated) and X-axis label "Match Time (minutes)" both readable in secondary ink. Tick labels (0%–100% on Y; 0'–90' on X) in 12px CSS are legible. Reference-line labels "Goal (Away) 19'", "Half Time", "Goal (Home) 58'" at top of vertical lines, "Goal (Home) 84'" at bottom-right with labelAlign=end, and "50% — even odds" at the right end of the horizontal dashed line — all readable, though the right-side zone is somewhat crowded.
      Data: Green (#009E73) area fill above the 50% baseline (home advantage), blue (#4467A3) area fill below 50% baseline (away advantage). Fill opacity 0.82. Probability starts at 50%, drops to ~27% after away goal (19'), stays suppressed through first half, bounces after equaliser (58'), then surges to ~89% after the winning home goal (84'). Legend top-right correctly labels both series.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) surface — correct dark theme background.
      Chrome: Title and subtitle appear in light-cream ink, clearly readable against the dark background. Axis labels, tick labels, reference-line labels all render in theme-adaptive inkSoft — light text on dark background, no dark-on-dark failure observed. Legend text is light and legible. Grid lines are subtle against the dark surface.
      Data: Green (#009E73) and blue (#4467A3) area fills are IDENTICAL to the light render — only the chrome (background, text) has flipped. Brand green #009E73 remains clearly visible on the dark surface. Reference lines (goal markers in team colors, half-time and 50% line in adaptive ink) are visible.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark issues detected.
