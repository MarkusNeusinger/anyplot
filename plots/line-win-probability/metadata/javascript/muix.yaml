review:
  strengths:
  - Deterministic LCG data generation (seed 42) produces a realistic, reproducible
    soccer match narrative with coherent probability swings at key events
  - Clever stacked area implementation using stack='prob' — home probability fills
    0→wp, away fills wp→100%, giving both teams visual weight throughout the 90 minutes
  - ChartsReferenceLine used skillfully for all five annotations (away goal, half-time,
    home equaliser, home winner, 50% baseline) — positions and labelAlign chosen to
    avoid overlap
  - 'Hides the redundant top-of-stacked away series line via CSS class selector .MuiLineElement-series-away:
    display:none — clean MUI X-specific refinement'
  - 'Theme tokens wired correctly: pageBg, ink, inkSoft all flow through, and both
    light and dark renders show correct warm-off-white / warm-near-black backgrounds'
  - Final score shown in subtitle ('Forest Green FC 2 – 1 City Blue FC · 90 minutes')
    satisfies spec requirement for final score display
  - 'Semantic color exception is justified: Home = brand green (#009E73, palette[0]),
    Away = Imprint blue (#4467A3, palette[2]) because the away team is ''City Blue
    FC'''
  weaknesses:
  - Reference line annotation labels are set to fontSize=10 (CSS px), which becomes
    effectively unreadable (~2.5px) when the 3200px image is scaled to mobile width
    (~400px) — raise to at least 12px to match tick label size
  - 'The fill approach deviates from the spec: spec says ''fill area above 50% with
    home team color and below 50% with away team color'' (i.e., fill the region between
    the probability line and the 50% baseline), but the implementation fills 0→win_probability
    with home color and win_probability→100% with away color (full-space stacked approach).
    While this is a valid sports-viz pattern, it does not match the specified fill
    semantics'
  - 'slotProps.legend right padding is only 12px while the chart SVG spans full width
    — the ''Away Win — City Blue FC'' legend text appears visually very close to the
    right canvas edge; increase to right: 24-32 for breathing room'
  - 'DE-01/DE-02: Aesthetic work is largely handled by MUI ThemeProvider; no explicit
    spine removal, custom grid styling, or typographic hierarchy beyond MUI defaults'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "line-win-probability · javascript · muix · anyplot.ai" in dark ink, readable. Subtitle "Forest Green FC 2 – 1 City Blue FC · 90 minutes" in softer secondary ink. Y-axis label "Home Win Probability" (vertical), X-axis label "Match Time (minutes)" — both dark, clearly legible. Tick labels 0%–100% on Y and 0'–90' on X are readable. Legend top-right shows green/blue swatches with team names at 12px — tight at right edge but visible. Reference line labels ("Goal (Away) 19'", "Half Time", "Goal (Home) 58'", "Goal (Home) 84'", "50% — even odds") are at 10px CSS — readable at full resolution but very small.
      Data: Two stacked areas — brand green #009E73 fills 0→win_probability (home), Imprint blue #4467A3 fills win_probability→100% (away). The probability boundary line is visible in green at 2.5px stroke. After away goal at minute 19 the green area shrinks sharply; home fights back through minutes 58 and 84. Five dashed reference lines mark key events. Horizontal dashed line at 50% labeled "even odds".
      Legibility verdict: PASS — all primary text (title, axis labels, tick labels, legend) is readable. Reference line labels at 10px are legible at full size but borderline at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title and subtitle rendered in light ink, clearly readable against the dark surface. Axis labels, tick labels, and legend text all appear in light-colored secondary ink — no dark-on-dark issues. Reference line labels visible in inkSoft (light gray) on dark background.
      Data: Data colors identical to light render — brand green #009E73 for home area, Imprint blue #4467A3 for away area. The stacked fill areas maintain identical saturation and hue. The probability boundary line is clearly visible. Both #009E73 (brand green) and #4467A3 (blue) read well on the dark surface.
      Legibility verdict: PASS — no dark-on-dark failures detected. All chrome adapts correctly via ThemeProvider. Brand green #009E73 remains clearly visible. Data colors are identical between light and dark renders.
