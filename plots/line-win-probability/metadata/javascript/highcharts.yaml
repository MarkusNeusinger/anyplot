review:
  strengths:
  - 'Excellent use of Highcharts area series with threshold: 50 and negativeColor
    — a distinctive library feature that perfectly satisfies the spec''s dual-fill
    requirement with zero custom rendering code'
  - 'Complete spec compliance: 50% reference line with label, dotted quarter markers,
    per-point event annotations, subtitle with final score, and full 0–100% y-axis
    range'
  - Deterministic LCG seed-42 data generation produces a realistic NFL game arc (close
    early, decisive late) with named key plays
  - 'Proper theme-adaptive chrome: all colors sourced from window.ANYPLOT_TOKENS,
    background transparent over pageBg, data colors identical between light and dark'
  - 'Clean code with no unnecessary abstractions; animation: false correctly set in
    both chart-level and plotOptions.series positions as required by the harness'
  weaknesses:
  - 'DE-01 MODERATE: Design is polished but not exceptional — adding a subtle fill
    gradient from the line color to transparent (instead of flat fillOpacity) would
    elevate the aesthetic; consider also a thin white/ink stroke on the probability
    line itself to improve definition at small display sizes'
  - 'DE-02 LOW: No explicit chart.plotBorderWidth: 0 — Highcharts may render a thin
    frame around the plot area in some builds; add it to guarantee a clean, frameless
    look'
  - 'DE-03 MODERATE: Data storytelling is good but could be stronger — a small callout
    box near the game-winning TD spike (e.g. ''Home clinches'') or a shaded region
    for each quarter would add meaningful narrative layer'
  - 'VQ-01 MINOR: Event annotation data labels at 12px are at the lower boundary of
    readability when the chart is scaled to mobile widths (~400 px) — increasing to
    13px would help; the 50% plotLine label is also small at 12px'
  - 'LM-02 MODERATE: The negativeColor/threshold technique is well used, but per-point
    marker placement could leverage Highcharts'' plotLines/plotBands more (e.g. plotBands
    for each quarter background) to show even more library depth'
  image_description: |-
