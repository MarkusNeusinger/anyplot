review:
  strengths:
  - 'Semantic dual-color fill using Highcharts threshold + negativeColor perfectly
    matches the spec: green above 50% (home leading), matte red below 50% (home trailing)
    — uses Imprint palette positions 0 and 4 with correct semantic exception for loss/trailing'
  - 'Full spec compliance: 50% reference line, annotated key events with dynamic y-positioning
    (above/below threshold), final score subtitle, and quarter period markers all
    present'
  - 'Excellent data narrative: realistic NFL play-by-play with genuine momentum swings,
    both teams leading at different points, and a dramatic game-winning TD spike at
    the end creates a compelling visual story'
  - LCG with seed 42 elegantly solves the browser reproducibility challenge; animation:false
    on both chart and plotOptions ensures clean screenshots; idiomatic Highcharts
    area threshold pattern
  weaknesses:
  - Annotation data labels use fontSize 10px (CSS) — at 2x DPR this is 20px native
    on the 3200x1800 canvas; increase to 12px for better mobile legibility
  - Quarter plotLine labels (Q2/Q3/Q4 at top of chart, y:-6, 11px) are redundant with
    the x-axis formatter labels that already show Q2/Q3/Q4 at the bottom — remove
    the label property from quarterLines to reduce visual clutter at the top of the
    chart
  - The 0-25% probability band is permanently empty since game probability stays above
    ~30%; lower canvas feels slightly sparse — consider setting yAxis.min:5 / yAxis.max:95
    to zoom in on the active range, or keep 0-100 as-is (which is the convention for
    this chart type)
