      Data: Single area series showing win probability trajectory. Green (#009E73) fill above 50% (home team leading), salmon/rose fill (matte red #AE3030 at 38% opacity) below 50% (away team leading). The line fluctuates between ~40–75% through most of the game before spiking to 99.2% at the final play. Horizontal 50% reference line with "50%" label on right. Dotted vertical quarter-boundary lines at Q2/Q3/Q4. Six key event annotations (Home TD, Away TD, Away FG, Home TD, Pick-six, Game-winning TD) as small text above/below their respective markers. No legend (single series, appropriate).
