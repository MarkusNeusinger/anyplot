review:
  strengths:
  - 'Semantic Imprint palette usage: Eagles correctly mapped to brand green (#009E73)
    and Cowboys to Imprint blue (#4467A3) — both a palette-rule win and a domain-expectation
    win'
  - 'Theme-adaptive chrome fully threaded: all text, backgrounds, and elevated label
    fills use INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens, producing readable renders
    in both light and dark themes'
  - 'Layer composition shows clear design thinking: ribbon fills, probability line,
    50% reference line, quarter dividers, event markers, and annotated labels all
    work together without visual conflict'
  - 'Spec fully satisfied: 0–100% y-axis, prominent 50% dashed reference line, ribbon
    fills above/below baseline, key event annotations, quarter progression markers,
    and final score in subtitle'
  - layer_tooltips() provides genuine letsplot interactivity in the HTML output with
    formatted win-probability values
  - np.random.seed(42) ensures reproducibility; clean linear KISS structure with no
    functions or classes
  weaknesses:
  - Event label size=4 (mm) is on the small side for a 3200px output — consider size=5
    for slightly better legibility at scaled-down mobile widths
  - Win probability main line uses size=1.0; with 120 plays rendered at 3200px width,
    size=1.2–1.5 would give slightly more visual weight to the primary data series
  - Only 5 of 8 scoring events are labelled — a design tradeoff that avoids clutter
    but leaves 3 events (Eagles FG 3-0, Eagles FG 13-7, Cowboys FG 20-17) unmarked;
    the alternating-nudge approach could accommodate the field-goal events at smaller
    size or leader lines
  - 'Design excellence ceiling: DE-01 and DE-03 are good but not exceptional — no
    dominant focal emphasis (e.g., shading the ''comeback window'' in Q3–Q4 with a
    highlighted band or stronger visual anchor at the peak Eagles deficit) that would
    push it above a solid-but-standard sports chart'
