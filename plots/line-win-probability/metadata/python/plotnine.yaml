review:
  strengths:
  - 'Excellent data storytelling: golden highlight zone marks the decisive late-game
    period, event annotations label key scoring plays, and a final score callout box
    provides narrative closure — all working together to guide the viewer through
    the game narrative'
  - 'Complete spec compliance: all required features implemented — 50% reference line,
    team-colored area fills above/below baseline, key event annotations (TD/FG labels),
    quarter markers, final score display, and correct title format'
  - 'Strong plotnine idiom: multi-layer ggplot2 grammar composition with geom_ribbon
    for area fills, geom_hline for reference line, geom_text for annotations, and
    geom_segment for quarter boundaries — idiomatic and well-structured'
  - 'Full code quality: KISS structure, deterministic seed, clean imports, adaptive
    theme tokens (PAGE_BG, INK, INK_SOFT) correctly applied across both light and
    dark renders'
  - 'Both themes render correctly — background adapts to #FAF8F1 (light) / #1A1A17
    (dark), all chrome (text, grid, axis lines, legend) flips appropriately, and data
    line color adapts via INK token'
  weaknesses:
  - 'VQ-07 PALETTE VIOLATION: Fill colors #004C54 (Eagles) and #8B1A1A (Cowboys) are
    custom hex values NOT from the Imprint palette. Hard rule: ''Colors must come
    from the Imprint palette or the 3 anchors (no custom hexes).'' For a semantic
    exception with team colors, use the closest Imprint member: Eagles (Home, green
    role) → #009E73 (brand green), Cowboys (Away, loss role) → #AE3030 (matte red
    semantic anchor). The golden highlight also uses #DAA520 — replace with ANYPLOT_AMBER
    = ''#DDCC77'' (the official amber anchor) or omit the rect fill.'
  - 'VQ-02 ANNOTATION CROWDING: In the Q2-Halftime region, labels ''TD Home'' (play
    42), ''FG Away'' (play 55), and ''TD Home'' (play 68) are close together with
    moderate density; the alternating-offset logic helps but leaves some labels visually
    crowded near the dotted quarter lines. Consider a slightly larger base offset
    (0.12 instead of 0.09) or a minimum horizontal gap check to better spread the
    annotations.'
  - 'DE-01 DESIGN CEILING: The design is above generic defaults but falls short of
    publication quality. The golden highlight and annotations add storytelling, but
    the legend box frame and overall typography are still relatively plain. To push
    toward 6-7/8: consider removing the legend box border, using a more refined annotation
    style (hairline connector lines from label to marker), and ensuring the golden
    highlight has the correct Imprint amber (#DDCC77) fill.'
  - 'VQ-05 VERTICAL SPACE: The y-axis spans 0–100% but the data occupies roughly 30–78%,
    leaving significant empty bands at the top and bottom. The chart would benefit
    from tighter y-axis limits (e.g., coord_cartesian ylim=(0.0, 1.0) is correct,
    but perhaps a larger margin is eaten by the legend — check if moving legend inside
    reduces wasted vertical canvas space).'
