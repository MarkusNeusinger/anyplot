review:
  strengths:
  - Semantic colour assignment (home=green/brand, away=red/matte) is well-justified
    as a semantic exception and instantly readable
  - Real 2022 AFC Championship game data with authentic scoring waypoints adds narrative
    authenticity
  - Layered fill technique (100% green background, red overlay) creates a clean momentum
    metaphor
  - Title-length-scaled font size (max(44, round(66 * 67 / len(title)))) is good defensive
    practice
  - Theme tokens applied correctly across all chrome elements; dark render has zero
    dark-on-dark failures
  weaknesses:
  - label_font_size=34 is below the style-guide reference of 56 for pygal minor axis
    labels — Y-axis percentage tick labels are smaller than ideal at thumbnail viewing
    sizes; raise to 44-50
  - Key scoring event text labels (KC FG 3-0, CIN TD 7-3, etc.) are only visible in
    the interactive HTML tooltip, not in the static PNG — the spec explicitly says
    annotate key scoring events; add visible text annotations or callout labels near
    the dots in the static render
  - 'The INK-coloured win-probability line (#1A1A17 in light mode) has low contrast
    against the dark-red Chiefs fill area — consider using a lighter neutral or #FFFDF6
    stroke so the line remains legible over both fill colours in light mode'
  - Green/red fills without secondary encoding for CVD users — adding a marker shape
    or hatching to one fill would improve accessibility without changing the colour
    scheme
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white
      Chrome: Title "Bengals vs Chiefs (20-23 OT) · line-win-probability · python · pygal · anyplot.ai" in dark INK, fully readable; Y-axis label "Win Probability (%)" readable; X-axis label "Game Progression (Play Number)" readable; Y-axis ticks (0%–100%) readable though slightly small (label_font_size=34); X-axis major labels (Kickoff, Q2, Halftime, Q4, OT) readable at major_label_font_size=44
      Data: Brand green (#009E73) fill for Bengals lead region (above win prob line), matte red (#AE3030) fill for Chiefs lead region (below); first series correctly uses Imprint position 1 (#009E73); thin dark INK win-probability line; ochre dashed 50% reference line; cyan event dots at key plays
      Legibility verdict: PASS — all text is readable against the light background; no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title, axis labels, tick labels, and legend text all render in off-white ink (#F0EFE8 range); clearly readable against the dark surface; no dark-on-dark failures detected anywhere; brand green (#009E73) in legend swatch remains clearly visible on dark background
      Data: Fill colours (brand green and matte red) are identical to the light render — only chrome flips; win-probability line switches to off-white stroke, which contrasts well against both fill colours; ochre 50% baseline and cyan event dots unchanged
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures
