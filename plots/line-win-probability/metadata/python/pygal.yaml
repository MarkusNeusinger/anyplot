review:
  strengths:
  - Creative dual-fill technique (Bengals green background, Chiefs red overlay) makes
    team momentum immediately intuitive
  - Real, historically accurate 2022 AFC Championship game data with a compelling
    narrative arc — KC wins 23-20 OT
  - Title includes actual game score (20-23 OT) making the plot self-contained and
    informative at a glance
  - Title font-size scales gracefully with the long mandated title string using a
    linear formula
  - 'Perfect code quality: KISS structure, reproducible seed (np.random.seed(42)),
    clean imports'
  - Both themes fully functional with correct Imprint palette, semantic team-color
    exception, and theme-adaptive chrome
  weaknesses:
  - Scoring event text annotations are missing in the static PNG — cyan dots mark
    event positions but are unlabeled; only the HTML version has hover labels. The
    spec says to annotate key scoring events.
  - The 50% reference line (#BD8233 ochre dashed) is too faint — barely distinguishable
    from the background fills in both renders. Increase stroke width or use a more
    contrasting color (e.g. INK_MUTED).
  - Red-green fill encoding has no CVD fallback — deuteranopia/protanopia viewers
    cannot distinguish team dominance areas. Add a thin ink outline between fills
    or text labels near the fill areas.
  - The near-white win-probability line (#FFFDF6 in light mode) is somewhat subtle
    against the green fill; thicker stroke or a slightly more contrasting color would
    improve traceability.
