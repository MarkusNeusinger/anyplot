review:
  strengths:
  - LineCollection with per-segment coloring is an idiomatic, efficient matplotlib
    technique that makes the line itself change color as the probability crosses 50%
  - 'Full theme-adaptive chrome: both renders pass the readability check with no dark-on-dark
    or light-on-light failures'
  - Semantic palette mapping is correct and intentional — Eagles green (#009E73, Imprint
    pos 1) and Cowboys blue (#4467A3, Imprint pos 3) match real-world team color expectations
  - 'All spec requirements fulfilled: 50% reference line, fill-above/fill-below with
    team colors, quarter period markers, event annotations with dots, and final score
    in title'
  - Path effects (withStroke) on annotation text ensure labels remain legible over
    any fill color in both themes
  - 'Code quality is exemplary: np.random.seed(42), no functions/classes, all imports
    used, correct savefig without bbox_inches=''tight'''
  weaknesses:
  - Annotation labels and quarter markers are at fontsize=7, which renders to ~39
    source-px on the 3200px canvas — at mobile width (~400px) these shrink to ~5px
    and become unreadable. Raise annotation fontsize to 8pt and quarter labels to
    8pt.
  - Asymmetric fill alphas (Eagles 0.22 vs Cowboys 0.55) makes the Cowboys (losing)
    blue regions appear more visually dominant than the Eagles (winning) green regions.
    Consider balancing to ~0.30 for both, or reversing the logic so the team ahead
    gets the higher alpha.
  - The lower 30% of the chart area (0%–35% win probability) is permanently empty,
    making the filled area appear cramped into the top 65% of the plot. Consider setting
    ylim to (0.1, 1.0) or using a tighter range to give data more vertical room while
    keeping the 0%/100% anchors as reference ticks.
