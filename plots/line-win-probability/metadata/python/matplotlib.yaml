      Data: Win probability line color-coded green (#009E73) above 50%, blue (#4467A3) below. Green fill above 50%, blue fill below (alpha=0.30). Six scoring event annotations (FG 3-0, TD 7-3, TD 10-7, TD 14-13, TD 20-14, TD 27-17) with white path-effect halos. Event dots in team color with white edge ring. 50% dashed reference line subtle grey.
