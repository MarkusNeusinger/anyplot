review:
  strengths:
  - LineCollection with per-segment coloring is an elegant, distinctly matplotlib
    technique that makes the win probability line itself a storytelling device — each
    segment reveals which team is winning
  - Dual fill_between layers (above/below 50%) with team colors create immediate visual
    storytelling without requiring a legend to understand the narrative
  - Path effects (pe.withStroke) on annotations prevent visual interference with both
    the colored fills and the line — a professional production detail
  - 'Full theme-adaptive chrome: both renders pass legibility checks with no dark-on-dark
    or light-on-light failures; ELEVATED_BG applied to legend frame in dark render'
  - Realistic NFL data with authentic play-by-play structure, final score in title,
    annotated key moments, and quarter markers
  weaknesses:
  - Y-axis starts at ~10% (ax.set_ylim(0.10, 1.02)) rather than the spec-required
    0–100% full range — fix by changing to ax.set_ylim(-0.02, 1.05) and updating yticks
    to [0, 0.25, 0.5, 0.75, 1.0]
