review:
  strengths:
  - 'Perfect spec compliance: 50% reference line, dual fill bands (home green above
    / away blue below), quarter markers, three key event annotations, final score
    annotation, and in-plot team color labels — all present and correctly implemented'
  - 'Full theme-adaptive implementation: PAGE_BG, INK, INK_SOFT, and INK_MUTED tokens
    correctly threaded through every axis element (title, labels, ticks, spines, dividers),
    producing a fully correct dark render without dark-on-dark failures'
  - Semantically correct use of INK/neutral for the win probability line — avoids
    confusion with the two Imprint fill colors while band! fills correctly use Imprint
    positions 1 (#009E73, home) and 3 (#4467A3, away)
  - 'Idiomatic CairoMakie multi-primitive composition: band! + lines! + hlines! +
    vlines! + scatter! + text! in a clean single-axis layout; all Makie-native primitives,
    no workarounds'
  - Reproducible data generation with Random.seed!(42) and a plausible game narrative
    encoded in the quarter-by-quarter drift parameters (home leads Q1/Q2, Eagles surge
    Q3, Wolves hold Q4)
  weaknesses:
  - Annotation and quarter-label font sizes (fontsize=11) are at the minimum for full-resolution
    readability and will be too small at 400px mobile width — increase to fontsize=12
    or 13 for all text!() calls and quarter labels
  - Skip of Imprint position 2 (lavender) in favour of position 3 (blue) for the away
    team lacks an inline comment justifying the semantic exception — add a comment
    or switch to canonical positions 1 and 2
  - 'Design sophistication is functional but not exceptional: no y-axis grid lines
    to aid probability tracing, and no visual hierarchy differentiation beyond the
    required elements — a subtle ygridvisible=true with alpha ~0.10-0.15 would improve
    readability without adding noise'
