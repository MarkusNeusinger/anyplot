  strengths:
  - 'Perfect spec compliance — all required features implemented: band fills above/below
    50%, prominent reference line, quarter markers (Q1–Q4), key event annotations
    with dots, final score annotation'
  - Excellent theme adaptation — all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG)
    properly threaded through Axis and text elements; dark render shows clean light-on-dark
    with no dark-on-dark failures; data colors remain identical between themes
  - 'Correct Imprint palette usage — home team uses brand green #009E73 (position
    1), away team uses #4467A3 (position 3); backgrounds match spec (#FAF8F1 light
    / #1A1A17 dark)'
  - Compelling narrative arc — Wolves build early lead through Q1–Q2, Eagles surge
    in Q3, complete comeback in Q4; annotated turning points guide the viewer through
    the story
  - Clean idiomatic CairoMakie code — flat script structure, Random.seed!(42) set,
    all font sizes explicitly declared, correct use of band!, hlines!, vlines!, text!,
    scatter! primitives with proper RGBAf alpha syntax
  weaknesses:
  - 'DE-01: Chart is functional but visual hierarchy could be stronger — the 50% reference
    line (linewidth=1.8, INK_SOFT color) blends somewhat with the grid; a slightly
    more prominent separator (e.g., linewidth=2.2, INK color at full opacity) would
    anchor the threshold visually'
  - 'LM-02: Implementation stays with basic Makie primitives and does not leverage
    distinctively Makie-specific capabilities beyond band!() — for example, custom
    Makie Legend element (axislegend! or manual Legend) would show deeper library
    knowledge compared to raw text!() team labels'
  - 'DE-02: Lower chart area (below 25% win probability) is visually empty across
    the full game because probability rarely dips below 30%; a note annotation or
    subtle shaded zone could use that whitespace purposefully'
