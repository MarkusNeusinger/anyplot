  - Strong data storytelling with narrative event annotations (Wolves 10-0 run, Hawks
    comeback, back-to-back 3-pointers) creating a compelling game arc
  - Proper theme-adaptive chrome throughout — INK/INK_SOFT/INK_MUTED tokens applied
    to all text, grid, and marker elements in both renders
  - Idiomatic geom_ribbon usage for dual-fill approach above/below 50% threshold —
    the correct ggplot2 technique for this chart type
  weaknesses:
  - 'Dark render ribbon fills barely visible: alpha=0.18 on #1A1A17 background renders
    both the home (#009E73) and away (#AE3030) zone fills nearly invisible — consider
    theme-adaptive alpha (e.g. 0.28 for dark, 0.18 for light) or a slightly higher
    base alpha (~0.25) to ensure fills read as momentum indicators in both themes'
  - 'Event annotation text sizes too small for mobile legibility: geom_text(size=2.4)
    and annotate(size=2.6) translate to ~6.8–7.4 pt which becomes ~5 px at 400 px
    display width — increase to size=3.0–3.5 for both'
  - 'Upper-right corner is congested: Back-to-back 3-pointers event label, Q4 quarter
    marker, and Final score annotation all cluster near x=36–48 y=0.75–0.96 — minor
    risk of visual crowding on scaled views'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface — correct Imprint light theme background.
      Chrome: Title "line-win-probability · r · ggplot2 · anyplot.ai" in dark ink (~55% of canvas width) clearly readable. Y-axis label "Hawks Win Probability" and X-axis label "Game Time (minutes)" in dark INK text, readable. Tick labels (0%–100% and 0'–48') in INK_SOFT dark grey, readable. Quarter markers (Q1–Q4) in INK_MUTED grey, small but legible at full resolution. "Final: Hawks 108 – Wolves 101" annotation in upper-right corner readable.
      Data: Win probability line in brand green #009E73 clearly drawn against light background. Green ribbon fill (above 50%) appears as a light translucent teal wash — visible and conveys home momentum. Red ribbon fill (below 50%, during Wolves 10-0 run) appears as a light pink wash — visible in the Q2 dip region. Three annotated events with open circles (ELEVATED_BG fill, INK outline) and text labels. "Hawks winning" zone label in brand green bold, "Wolves winning" in matte red bold — both prominent. 50% dashed reference line clearly visible in INK_SOFT.
      Legibility verdict: PASS — all text elements readable against light background. Event annotation text (size=2.4–2.6, ~7pt) is small at full res but legible; at 400px mobile width it would become near-invisible (~5px).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 surface — correct Imprint dark theme background.
      Chrome: Title in #F0EFE8 light ink, clearly readable against dark background. Axis labels and tick labels in #B8B7B0 (INK_SOFT dark mode), clearly readable. Quarter labels in #A8A79F (INK_MUTED dark mode), readable. "Final: Hawks 108 – Wolves 101" in light grey, readable.
      Data: Win probability line remains #009E73 (brand green) — identical to light render data color, clearly visible on dark background. Home zone ribbon fill (alpha=0.18 on #1A1A17) produces a very dark teal barely distinguishable from background — fill is technically present but momentum signal is weak in dark mode. Away zone ribbon fill produces a very dark burgundy — similarly subdued. Event point markers have #242420 fill (ELEVATED_BG dark) with #F0EFE8 (INK dark) outline, showing as light-outlined open circles. "Hawks winning" label in #009E73 brand green clearly visible. "Wolves winning" label in #AE3030 matte red, readable on dark background.
      Data colors identical to light render: both HOME_COLOR (#009E73) and AWAY_COLOR (#AE3030) are theme-independent constants — only alpha-blended appearance on different backgrounds differs. This is expected behavior.
      Legibility verdict: PASS for chrome — no dark-on-dark text failures. However, ribbon fills are significantly less visible in dark mode due to alpha=0.18 on near-black background — this is the main visual quality concern.
