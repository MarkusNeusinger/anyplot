  - 'Excellent semantic color mapping: #009E73 (Imprint slot 1) for home win zone,
    #AE3030 (Imprint slot 5) for away loss zone — semantically motivated and CVD-safe'
  - 'Complete spec compliance: 50% reference line, dual ribbon fills, quarter dividers,
