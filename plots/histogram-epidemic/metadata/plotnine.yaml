  - Y-axis label lacks units specification
  - Cumulative line could be slightly thicker for better visibility
  image_description: 'The plot displays a stacked bar chart (epidemic curve) spanning
    from Jan 15 to Apr 14, 2024, with 90 daily bars. Each bar is stacked with three
    case classification categories: Confirmed (blue #306998, bottom), Probable (orange
    #E8963E, middle), and Suspect (gray #C0C0C0, top). The x-axis shows "Date of Symptom
    Onset" with 2-week tick intervals rotated 45 degrees, and the y-axis shows "Number
    of New Cases" ranging from 0 to ~70. A dark red cumulative cases line curves upward
    from left to right, labeled "Cumulative cases →" in italic bold near the top right.
    Two dashed vertical lines mark intervention events: "Lockdown" around Feb 10 and
    "Vaccination campaign" around Mar 1, with italic text labels. The title reads
    "histogram-epidemic · plotnine · pyplots.ai" in bold at the top. The legend is
    positioned at the top showing all three case types. The background is a light
    off-white (#FAFAFA) with subtle horizontal grid lines. Two epidemic waves are
    visible: a sharp peak around Feb 2-5 (~70 total cases) and a broader secondary
    wave around Mar 10-15 (~43 total cases).'
