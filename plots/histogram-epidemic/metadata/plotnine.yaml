  image_description: 'The plot displays a stacked bar chart (epi curve) over 90 days
    from Jan 15 to mid-April 2024. Bars are stacked by case classification: Confirmed
    (steel blue, bottom), Probable (orange, middle), and Suspect (grey, top). There
    is a sharp initial peak around Jan 29-Feb 2 reaching approximately 70 total cases
    per day, followed by a trough after a "Lockdown" vertical dashed line at Feb 10,
    then a secondary broader wave peaking around Mar 11 at approximately 43 cases
    per day, declining after a "Vaccination campaign" dashed line at Mar 1. A dark
    red cumulative case line rises monotonically from left to right, scaled to the
    primary y-axis. The title reads "histogram-epidemic · plotnine · pyplots.ai" in
    bold at top. Legend is positioned at top showing all three case categories. Background
    is light off-white (#FAFAFA), y-axis grid is subtle grey, x-axis grid removed.
    X-axis labels are rotated 45 degrees showing biweekly dates. Axis labels are bold:
    "Date of Symptom Onset" (x) and "Number of New Cases" (y).'
