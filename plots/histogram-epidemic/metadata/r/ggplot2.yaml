review:
  strengths:
  - Correct Imprint palette with brand green (#009E73) as first (Confirmed) series,
    canonical order maintained throughout
  - 'Full theme-adaptive chrome: both light (#FAF8F1 bg) and dark (#1A1A17 bg) renders
    are fully legible with no dark-on-dark or light-on-light failures'
  - Idiomatic ggplot2 layering — geom_col + geom_vline + geom_text with separate data
    frames and inherit.aes=FALSE correctly implemented
  - Epidemiologically realistic two-wave Gaussian mixture dataset with Poisson noise
    and Binomial case-type splitting
  - 'Clean code: set.seed(42) for reproducibility, no functions/classes, only used
    imports, correct ggsave with ragg device at 3200×1800'
  weaknesses:
  - '"School closures" annotation text is positioned at y=y_max*0.88 (~182), which
    falls inside the bar area at the first-wave peak (bar total ~192–207) — the muted
    gray text renders on top of the green confirmed bars, creating overlap. Move to
    y_max*0.97 or anchor text above the visible bar top to avoid collision.'
  - No secondary y-axis with cumulative case count line overlay, which the spec explicitly
    calls out as a feature to consider for total burden context. Adding geom_line
    with a right-axis (sec_axis) for cumulative cases would improve spec completeness.
  - 'Y-axis grid lines use INK (#1A1A17 in light / #F0EFE8 in dark) at full opacity
    rather than a softer tone such as INK_MUTED. In the light render this makes horizontal
    gridlines slightly more prominent than the 15% opacity target in the style guide.
    Use INK_MUTED for grid color to reduce visual weight.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Bold title "histogram-epidemic · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17), clearly readable. Y-axis label "New cases" and X-axis label "Date of symptom onset" in dark ink at 10pt. Tick labels (Jan 22 through Apr 15 at 2-week intervals) in INK_SOFT gray at 8pt, rotated 30°, readable. Legend box at top with elevated cream background, "Case classification" title and three color swatches (Confirmed, Probable, Suspect) all legible. Two dashed vertical lines in INK_SOFT with annotations "School closures" (Feb 05) and "Vaccination campaign" (Feb 20) in INK_MUTED.
      Data: Stacked bars — Confirmed in #009E73 (brand green, dominant), Probable in #C475FD (lavender, mid layer), Suspect in #4467A3 (blue, bottom). Correct Imprint palette order. Two-wave epidemic clearly visible with primary peak around Feb 12–14 (~207 cases) and smaller secondary peak around Mar 12–18 (~95 cases). Subtle horizontal y-axis grid lines.
      Notable: "School closures" annotation text overlaps with bar content at peak (~182 px into bar reaching ~192–207). Minor but visible.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title in light ink (#F0EFE8), clearly visible. Axis labels and tick labels in INK_SOFT (#B8B7B0 equivalent), readable. Legend box with dark elevated background (#242420), text legible. Dashed intervention lines in INK_SOFT, annotations in INK_MUTED (#A8A79F) — visible.
      Data: Colors are identical to light render — #009E73 green, #C475FD lavender, #4467A3 blue. Same two-wave epidemic shape. No color shift between themes.
      Legibility verdict: PASS — no dark-on-dark failures. All text, tick labels, and legend entries clearly readable against near-black background. Brand green #009E73 remains prominent.
