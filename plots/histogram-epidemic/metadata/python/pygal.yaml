      Background: Warm off-white #FAF8F1 — correct Imprint light surface
      Chrome: Title "Epidemic Curve (Respiratory Outbreak) · histogram-epidemic · python · pygal · anyplot.ai" in dark ink, clearly readable. Y-axis title "New Cases (Daily)" and X-axis title "Date of Symptom Onset" both dark and readable. Y-tick labels (0, 10, 20, 30, 40, 50, 60) readable. X-axis major labels (Jan 15, ▼ Cluster Identified, ▼ Contact Tracing, ▼ Quarantine Order, ▼ Vaccination Drive, ▼ Outbreak Contained, Apr 13) rotated 45°, readable but bottom zone is snug.
      Data: Three stacked series — Confirmed (#009E73 brand green, position 1), Probable (#C475FD lavender, position 2), Suspect (#4467A3 blue, position 3). Two epidemic waves clearly visible: first peak ~Feb 4 (~38 total cases), second larger peak ~Mar 17 (~53 total cases). Subtle vertical guides at 5 intervention positions.
