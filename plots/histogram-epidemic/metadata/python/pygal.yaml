review:
  strengths:
  - 'Correct stacked bar type with exact Imprint palette order (positions 1–3); first
    series brand green #009E73'
  - Intervention events effectively communicated through ▼ markers in x-axis labels
    + x_guides vertical lines — creates a temporal narrative
  - Dynamic title font-size formula prevents overflow for the long descriptive title
  - 'Complete code quality: seed, clean imports, proper output filenames for both
    PNG and HTML'
  - Both light and dark themes render correctly with no dark-on-dark failures
  weaknesses:
  - x-guides shown on both axes (show_x_guides=True + show_y_guides=True); for a bar
    chart, only y-guides are recommended — the vertical x-grid lines add visual noise
    on top of the already-prominent intervention guides; set show_x_guides=False
  - 'Bottom area is tight: rotated intervention labels + x-axis title + legend are
    stacked closely; increase margin_bottom from 140 to 160–180 px or reduce major_label_font_size
    from 44 to 38'
  - Missing the recommended cumulative case count overlay (secondary y-axis with a
    running total line) — would have elevated data storytelling and spec coverage
    above the «Consider» threshold
