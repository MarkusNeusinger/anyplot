review:
  strengths:
  - 'Full theme duality: both renders use correct backgrounds with all text tokens
    adapted, no dark-on-dark failures'
  - Intervention events encoded cleverly in x-axis label strings with triangle markers,
    making the 90-day timeline self-documenting
  - Title font-size auto-scaling formula (66 x 67 / len) prevents overflow for the
    long mandated title
  - x_labels_major + show_minor_x_labels=False reduces 90-label congestion to 7 anchor
    points cleanly
  - Rich tooltip dicts make the interactive HTML genuinely informative (total cases,
    event name, per-day breakdown)
  - 'Perfect code quality (10/10): seed set, KISS structure, clean imports, correct
    output files'
  weaknesses:
  - 'Title uses pyplots.ai instead of anyplot.ai and omits the required python language
    token — fix to: Epidemic Curve (Respiratory Outbreak) · histogram-epidemic · python
    · pygal · anyplot.ai'
  - Spec requires annotated vertical reference lines for intervention events; triangle
    markers in tick labels are less visually prominent — add vertical lines at intervention
    x-positions using pygal x_lines_major or equivalent
  - Noticeable blank space below the legend (margin_bottom=260 is too generous) —
    reduce to ~140 to tighten bottom and improve canvas utilization
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface
      Chrome: Title readable at scaled ~51px font; Y-axis "New Cases (Daily)" and X-axis "Date of Symptom Onset" both visible and clear; tick labels at 44px (major) with 45-degree rotation legible at full resolution
      Data: Stacked bars with Confirmed (green #009E73), Probable (lavender #C475FD), Suspect (blue #4467A3) — first series is brand green; two-wave epidemic curve visible across 90 days; intervention events shown as rotated tick labels with triangle markers
      Legibility verdict: PASS — all text readable against light background; long rotated intervention labels borderline at mobile scale but acceptable

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface
