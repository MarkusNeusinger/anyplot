review:
  strengths:
  - 'Complete spec compliance: stacked bars by case type (Confirmed/Probable/Suspect),
    annotated intervention markers (Lockdown/Vaccination vertical lines), cumulative
    overlay trend line, weekly datetime axis ticks — all features correctly implemented'
  - 'Perfect theme adaptation in both renders: warm off-white (#FAF8F1) and warm near-black
    (#1A1A17) backgrounds with all chrome tokens (title, axis labels, ticks, legend,
    grid, caption) correctly adaptive in both light and dark modes'
  - Epidemiologically realistic data using log-normal distribution to produce a natural
    point-source outbreak shape; 45-day window with 2,650 total cases is plausible
    for a foodborne outbreak scenario
  - Dynamic title sizing formula (max(11, round(16 * 67/n_chars))) prevents overflow
    for the mandated long title format — shows library-aware implementation
  - 'Clean code quality: linear structure (imports → data → plot → save), seeded randomness
    (np.random.seed(42)), clean imports, idiomatic ggplot grammar with dict-based
    scale_fill_manual and ms-based datetime breaks'
  weaknesses:
  - Caption font at 9pt is the smallest element in the hierarchy; minimum recommended
    is 10pt for mobile-scale (~400px) legibility — change plot_caption=element_text(size=9)
    to size=10
  - Stacked bar layers lack edge definition — thin Suspect (blue) slivers at low case
    counts can be hard to distinguish from the Probable (lavender) layer; add a subtle
    white or neutral stroke on geom_bar (e.g., color='white', size=0.1) to visually
    separate stacked layers
  - 'LM-02: uses layer_tooltips and HTML export as lets-plot distinctive features
    but leaves richer options unused; could leverage tooltip format strings, geom_ribbon
    for confidence bands, or advanced sampling'
