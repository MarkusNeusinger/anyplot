review:
  strengths:
  - 'Perfect spec compliance — all required features implemented: stacked bars by
    case classification, annotated vertical intervention markers, cumulative overlay
    line scaled to share the primary y-axis, and date-based x-axis with weekly ticks'
  - 'Realistic and well-executed data story: simulated foodborne point-source outbreak
    with log-normal timing produces a visually distinctive sharp-peak epi curve that
    matches the spec description'
  - 'Semantic color choices for intervention markers are intentional and read correctly:
    matte red (#AE3030) for the lockdown restriction, cyan (#2ABCCD) for the vaccination
    health intervention — both from the Imprint palette'
  - 'Correct Imprint palette in canonical order for case classifications: Confirmed=#009E73
    (brand green), Probable=#C475FD (lavender), Suspect=#4467A3 (blue)'
  - 'Theme-adaptive chrome fully implemented: background, text, grid, legend box all
    flip correctly between #FAF8F1 light and #1A1A17 dark; data colors are identical
    across both renders'
  - Interactive tooltips via layer_tooltips() and dual PNG+HTML export leverage lets-plot's
    distinctive capabilities appropriately
  - Code is clean, linear, reproducible (seed=42), with all font sizes explicitly
    set and dynamic title scaling for the long mandated title string
  weaknesses:
  - 'Vaccination annotation label is partially obscured by the legend box in both
    renders. The text (''Vaccination'', hjust=1, nudge_x=-80000000) ends at approximately
    83% of plot width, directly where the legend starts (legend_position=[0.82, 0.88]).
    Fix: move the legend lower (e.g. legend_position=[0.82, 0.75]) or reposition the
    Vaccination annotation to the right of the cyan line (hjust=0, nudge_x=+80000000)
    — VQ-02 and VQ-05.'
  - The cumulative grey line's tail extends behind the legend box in the upper right,
    creating a visual intrusion into the legend area. Moving the legend down (as above)
    would also resolve this.
  - 'Design excellence could be raised with one or two targeted refinements: (a) explicitly
    removing any remaining panel border/frame spines via element_blank() if theme_minimal()
    leaves them, (b) slightly increasing bar visual separation or adding a thin outline
    stroke on bars to help distinguish stacked segments under CVD.'
  - 'Library Mastery: the layer_tooltips tooltip is a good start but the tooltip line
    format could be improved — currently shows both ''@|case_type'' and ''Cases|@case_count''
    on separate lines; a single cleaner format such as ''.line("@case_type|@case_count
    cases")'' is more idiomatic.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "histogram-epidemic · python · letsplot · anyplot.ai" is bold dark text, clearly readable. Subtitle in softer dark ink is readable. X-axis label "Date of Symptom Onset" and Y-axis label "Daily New Cases" are visible. Tick labels (Mar 01 through Apr 12 on x, 0–180 on y) are clearly legible against the warm background. Caption at bottom is small but readable.
      Data: Stacked bars show confirmed cases in brand green (#009E73) at the base, probable cases in lavender (#C475FD) in the middle, suspect cases in blue (#4467A3) on top. A grey cumulative line rises from left and flattens on the right. A dashed red vertical line marks Lockdown (~Mar 15) with a red "Lockdown" annotation to its right. A dashed cyan vertical line marks Vaccination (~Apr 05) with a cyan "Vaccination" annotation. First series is correctly #009E73.
      Layout issue: The "Vaccination" annotation text is partially obscured by the legend box (upper right, legend_position=[0.82, 0.88]). The text appears as "Vaccinatio" with the trailing characters hidden behind the legend — confirmed overlap, not canvas-edge clipping.
      Legibility verdict: PASS (all axis/title/tick text is fully readable; "Vaccination" annotation is partially obscured by legend — overlap issue, not legibility failure in both renders).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
