      Data: Stacked bars — brand green (#009E73) for Confirmed (largest layer, bottom), lavender (#C475FD) for Probable (middle), blue (#4467A3) for Suspect (top, thin at low counts). Classic point-source epidemic curve peaks around Mar 11–15 at ~170 total daily cases. Gray cumulative trend line arcs smoothly from lower-left to upper-right. Dashed matte-red vertical line at Mar 15 (Lockdown); dashed cyan vertical line at Apr 05 (Vaccination). Legend "Case Classification" in lower-right float position with elevated background.
