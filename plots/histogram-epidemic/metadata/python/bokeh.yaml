review:
  strengths:
  - 'Complete spec implementation: all four required features (daily stacked bars,
    case classification, intervention lines, cumulative secondary axis) present and
    correct.'
  - Excellent Imprint palette usage with semantically appropriate color assignment
    — matte red (#AE3030) for 'source' event matches the error-anchor role, INK_SOFT
    for 'intervention' correctly uses a neutral tone.
  - Idiomatic Bokeh API usage throughout (vbar_stack, Span, extra_y_ranges, HoverTool)
    with genuine interactive HTML artifact.
  - Clean, reproducible code with correct min_border_* reservations preventing axis
    label clipping.
  - Both themes pass legibility — chrome fully adaptive, data colors identical across
    renders.
  weaknesses:
  - 'DE-03 storytelling could be strengthened: the chart lacks an annotation of the
    peak case count or a label for the outbreak pattern type (e.g., ''Point-source
    + propagated wave'' caption).'
  - DE-01 is held from 8 by annotation labels (28pt bold) being slightly heavy relative
    to the overall composition — reducing to 22pt would improve polish.
  - 'LM-02 minor gap: the CDP viewport override is a technical workaround rather than
    a Bokeh visualization feature; a BoxAnnotation or Band for the inter-wave period
    would be a more Bokeh-native storytelling enhancement.'
