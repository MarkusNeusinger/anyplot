  - Proper use of Okabe-Ito color palette for categorical data
  - Well-proportioned layout with generous margins and good whitespace
  - Proper Highcharts sankey implementation with correct nodePadding and linkOpacity
  weaknesses:
  - Dark render has prominent dark/black strokes on sankey ribbon links that are not
    theme-adapted
  - Sankey link stroke colors default to dark values (likely black) in dark theme,
    violating theme-adaptive chrome principle
  - Series config does not explicitly set link stroke colors, leaving them to Highcharts
    defaults
  - Dark and light renders look substantially different - only chrome should flip,
    data rendering must be identical
  - Unintended strokes make dark render significantly less polished than light render
