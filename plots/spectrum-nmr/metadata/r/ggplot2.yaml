review:
  strengths:
  - Scientifically accurate Lorentzian peak synthesis with correct J-coupling constants
    (7 Hz at 400 MHz = 0.0175 ppm) and intensity ratios for ethanol 1H NMR
  - 'Full spec compliance: reversed x-axis (scale_x_reverse), all four peak groups
    (CH3 triplet, CH2 quartet, OH singlet, TMS reference), clean baseline'
  - Both theme renders visually correct and fully readable — no dark-on-dark or light-on-light
    failures, all chrome tokens flip correctly
  - Informative peak annotations showing chemical group, ppm shift, multiplicity,
    and proton count guide the viewer through the spectrum
  - Correct 3200x1800 canvas size with proper ragg device usage and modern linewidth=
    API
  weaknesses:
  - library(dplyr) is imported but never used — no dplyr functions are called; all
    data manipulation uses base R (data.frame, for loops, pmax) — remove this unused
    import
  - Annotation geom_text size=2.5 (~7.1pt) is slightly smaller than axis tick labels
    (8pt); increase to size=3.0-3.5 for better mobile readability at ~400px viewport
    width
  - lorentz() helper function breaks flat KISS structure; consider inlining the three-line
    Lorentzian formula directly into the accumulation loop
  - Plain floating geom_text annotation labels lack visual separation from spectrum
    line; replacing with annotate('label', fill=PAGE_BG, label.size=0, ...) would
    add subtle background lift without heavy boxes, improving DE-01 polish
