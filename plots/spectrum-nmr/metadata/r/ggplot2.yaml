      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white.
      Chrome: Title "Ethanol 1H NMR · spectrum-nmr · r · ggplot2 · anyplot.ai" in bold dark (#1A1A17) text, spans ~75% of plot width. X-axis label "Chemical Shift (delta, ppm)" and Y-axis label "Intensity (a.u.)" in dark INK text at 10pt. Tick labels in INK_SOFT gray at 8pt (x-axis) and INK_MUTED at 7pt (y-axis). L-frame axis lines in INK_SOFT. All chrome elements readable.
      Data: Single NMR spectrum line in #009E73 (brand green). CH3 triplet at 1.17 ppm (~1.1 a.u. peak height), CH2 quartet at 3.69 ppm (~0.65 a.u.), broad OH singlet at 2.60 ppm (~0.35 a.u.), TMS reference at 0.00 ppm (~0.4 a.u.). Thin horizontal baseline in INK_SOFT. Two-line annotations per peak in INK_MUTED gray at size=2.5.
      Legibility verdict: PASS — all text readable against light background. Minor: annotation text is slightly small (7.1pt vs 8pt tick labels).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
