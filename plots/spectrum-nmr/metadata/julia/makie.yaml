review:
  strengths:
  - Scientifically accurate Lorentzian peak model with correct 1H NMR coupling constants
    and chemical shifts for ethanol (CH3 triplet at 1.18 ppm, OH singlet at 2.61 ppm,
    CH2 quartet at 3.69 ppm)
  - 'Full spec compliance: reversed x-axis with xreversed=true, correct multiplet
    patterns (1:2:1 triplet, 1:3:3:1 quartet, singlet), TMS reference at 0 ppm, and
    labeled functional group assignments'
  - Perfect theme adaptation — all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG)
    applied to every axis element; both renders pass the dark-on-dark and light-on-light
    readability checks
  - Clean idiomatic CairoMakie code with correct 3200x1800 canvas (size=(1600,900),
    px_per_unit=2), proper Julia broadcasting (.+=), and current Makie API (size=
    over deprecated resolution=)
  - Realistic baseline noise with max.(intensity, 0.0) clamping adds authenticity;
    subtle styling (TMS in INK_MUTED vs peak labels in INK_SOFT) shows design awareness
  weaknesses:
  - Peak annotation font sizes are small (fontsize=11 for peak labels, 10 for TMS).
    At mobile-thumbnail scale these become borderline. Consider increasing to 12-13pt
    for peak labels and 11pt for TMS.
  - Large empty vertical space above the peak tops (y from ~3.5 to 4.0 is mostly blank
    canvas). The y-axis limit is fixed at 4.0 but the tallest peak reaches ~3.1. Tightening
    the upper ylimit to ~3.6-3.8 would improve canvas utilization and make the peaks
    more prominent.
  - Design Excellence could be elevated with a subtle shaded peak-area fill under
    the spectrum trace — a common NMR presentation technique that adds polish without
    complexity.
