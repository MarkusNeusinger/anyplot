review:
  strengths:
  - Chemically accurate Lorentzian NMR model with correct J-coupling (7 Hz at 300
    MHz) producing realistic triplet (1:2:1) and quartet (1:3:3:1) multiplet patterns
  - Correct x-axis reversal (high ppm on left) following NMR convention; all spec
    requirements met including TMS reference, peak labels, clean baseline
  - ECharts markPoint with coord positioning delivers precise, domain-correct peak
    annotations with chemical formula subscripts (CH₂, CH₃)
  - Gradient area fill (areaStyle with two-stop colorStops at 19% and 4% opacity)
    adds visual depth without overpowering the spectrum line
  - Perfect palette compliance and full theme adaptation; domain-appropriate hidden
    y-axis tick labels; no grid lines (clean NMR look)
  - Fully deterministic synthetic data; clean idiomatic ECharts code structure
  weaknesses:
  - X-axis range is 0–12 ppm but all ethanol NMR peaks fall within 0–4 ppm, leaving
    ~65% of the horizontal canvas as empty baseline — narrow max from 12 to 4.5 (or
    5) ppm to fill the canvas, making peaks more prominent and readable without sacrificing
    the reversed-axis NMR convention
  - 'No x-axis split lines make it harder to read precise chemical shift values at
    a glance — add subtle x-axis split lines at 1-ppm intervals: xAxis.splitLine:
    { show: true, lineStyle: { color: t.grid, type: ‘dashed’ } }'
  - 'The y-axis axisLine (show: true) renders a vertical artifact near x=0 ppm on
    the inverted axis (ECharts draws the y-axis at the data origin when the x range
    spans through 0) — set yAxis.axisLine.show: false to eliminate this; the xAxis
    baseline provides sufficient framing'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface
      Chrome: Title "spectrum-nmr · javascript · echarts · anyplot.ai" centered in dark ink, readable; x-axis label "Chemical Shift (ppm)" bottom-center, y-axis label "Intensity (a.u.)" vertical left — both dark text, clearly readable; x-axis tick labels at 1-ppm intervals (12 to -0.5) in dark secondary text, readable; y-axis tick labels hidden (intentional, appropriate for relative NMR intensity)
      Data: Brand green (#009E73) spectrum line (width=2) with subtle two-stop gradient area fill (19% opacity top → 4% opacity bottom). Peaks: CH₂ quartet cluster at 3.69 ppm (tallest), CH₃ triplet cluster at 1.17 ppm, OH broad singlet at 2.61 ppm, TMS singlet at 0.00 ppm. Each peak annotated with green dot and dark-ink label. X-axis range 0–12 ppm; data occupies only 0–4 ppm (left ~65% of x-axis is empty baseline).
      Legibility verdict: PASS — all visible text readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface
      Chrome: Title, axis labels, tick labels all flip to light-colored text — clearly readable against dark background. No dark-on-dark failures. Annotation labels visible in light text.
      Data: NMR spectrum remains identical brand green (#009E73) — data colors unchanged from light render; only chrome flips. Gradient area fill visible with same opacity. All four peak groups and their annotations clearly visible.
      Legibility verdict: PASS — all text readable against dark background; brand green #009E73 reads well on both surfaces
