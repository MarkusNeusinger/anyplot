review:
  strengths:
  - 'Perfect Visual Quality (30/30): all font sizes explicitly set and proportional,
    no overlaps, clean readable renders in both themes, correct Imprint palette throughout'
  - Scientifically accurate ethanol 1H NMR data with correct chemical shifts, coupling
    constants, and peak types (singlet, triplet, quartet, broad singlet)
  - Custom Chart.js canvas plugins (bgPlugin + labelPlugin) demonstrate idiomatic
    library mastery and enable correct canvas background and peak annotations
  - Deterministic Lorentzian data generation is clean, reproducible, and physically
    motivated
  - Translucent fill under spectrum curve adds visual depth without distraction
  - Title font size correctly scaled for long title length via formula
  weaknesses:
  - 'Multiplet splitting patterns are not visually resolved: J=0.0175 ppm with hw=0.012
    ppm gives J/hw~1.46, below the >=2 threshold for resolved Lorentzian peaks; triplet
    and quartet sub-peaks overlap into broadened single peaks rather than distinct
    split lines; increase J to ~0.04 ppm or reduce hw to ~0.006 ppm so each multiplet
    component is clearly separated'
  - 'Axis spines not managed: Chart.js border.display is not set, resulting in a fully-boxed
    frame appearance rather than the preferred L-shaped (left+bottom only) frame;
    add border:{display:false} to the top/right borders to suppress right/top axis
    lines'
  - 'DE-02 refinement limited: no spine removal reduces visual cleanliness; removing
    top-right frame lines would achieve the minimal scientific look that NMR spectra
    typically use in publications'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correctly not pure white
      Chrome: title "1H NMR Spectrum of Ethanol · spectrum-nmr · javascript · chartjs · anyplot.ai" in dark text, readable; x-axis label "Chemical Shift (ppm)" and y-axis label "Intensity (a.u.)" in dark ink; tick labels in inkSoft — all clearly readable
      Data: single green (#009E73) Lorentzian spectrum line with translucent teal fill; peaks at CH3 1.25ppm, CH2 3.69ppm, OH 2.61ppm, TMS 0.00ppm; x-axis correctly reversed (4.5 left, -0.3 right)
      Legibility verdict: PASS

    Dark render (plot-dark.png):
