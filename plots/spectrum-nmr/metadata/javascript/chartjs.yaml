review:
  strengths:
  - Scientifically accurate Lorentzian lineshape with correct J-coupling multiplets
    (triplet, quartet, singlet) for 1H NMR of ethanol
  - 'X-axis correctly reversed using Chart.js reverse: true, matching NMR convention'
  - Custom plugin architecture (bgPlugin, spinePlugin, labelPlugin) is idiomatic Chart.js
    and cleanly structured
  - 'Transparent fill under the spectrum curve (backgroundColor: t.palette[0] + ''1a'')
    adds professional laboratory-report aesthetic'
  - Perfect theme adaptation — all chrome uses t.pageBg, t.ink, t.inkSoft, t.grid
    tokens; data color unchanged between themes
  - Dynamic title font size formula prevents overflow on the longer descriptive-prefix
    title
  weaknesses:
  - NMR integration lines (horizontal bars under peak groups indicating proton count
    ratio 2:1:3 for CH2:OH:CH3) are missing — a standard 1H NMR spectrum element that
    would improve DQ-01 feature completeness
  - TMS label at 0.00 ppm is center-aligned at the rightmost peak with limited right-side
    clearance; consider right-aligning or nudging this label left by ~0.05 ppm to
    give more breathing room
  - Visual polish is functional but not fully refined — subtle peak-to-label leader
    lines and a slightly higher y-axis max (1.15) would give the tall CH3 peak label
    more vertical headroom
