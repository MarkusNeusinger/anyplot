review:
  strengths:
  - Scientifically accurate ethanol 1H NMR spectrum with realistic Lorentzian peak
    shapes for TMS (singlet), CH3 (triplet), CH2 (quartet), and OH (singlet)
  - 'Full Imprint palette compliance: brand green #009E73 for data series, theme-adaptive
    chrome tokens (INK, INK_SOFT, INK_MUTED) correctly wired to ANYPLOT_THEME'
  - Reversed x-axis per NMR convention with -0.5 to 5.5 ppm window showing all ethanol
    peaks — empty high-ppm region correctly cropped
  - Highcharts annotations module used with connector-style labels pointing to each
    key peak (TMS, CH3, OH, CH2) — a distinctive library feature
  - Plot band highlighting the dominant CH3 triplet region with labelled band and
    subtle green tint adds storytelling depth
  - Informative subtitle with compound formula, solvent, and spectrometer frequency
    (CH3CH2OH in CDCl3, 400 MHz)
  - Dynamic title fontsize scaling logic correctly handles the mandated title string
  - Single-series area fill with subtle rgba fill opacity perfectly suited to spectral
    data density (~6000 points)
  weaknesses:
  - 'CH3 (triplet) annotation at delta 1.18 and the plot-band ''dominant'' label are
    both positioned near the top of the chart in the same x-region (~1.18 ppm) — the
    annotation y:-50 offset pushes its label to the same vertical space as the band
    label, causing visual crowding or overlap. Fix: increase the CH3 annotation y-offset
    to y:-90 or reposition the band label (e.g. verticalAlign: bottom) so the two
    text elements clear each other.'
  - 'DE-02 visual refinement: annotation boxes in the dominant region are slightly
    cluttered together. A small y-offset tweak to the CH3 annotation (see above) would
    also resolve this. No other polish issues found.'
