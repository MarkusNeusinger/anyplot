review:
  strengths:
  - Scientifically accurate ethanol 1H NMR with correct splitting patterns (1:2:1
    triplet, 1:3:3:1 quartet) and chemically accurate peak positions
  - 'Color-coded annotation system: annotation box border, arrow color, and region
    shading all share the same Imprint palette color per functional group — elegant
    visual system'
  - 'Theme adaptation is thorough: all chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG,
    GRID) are wired through every annotation, axis, hover label, and shape'
  - 'Plotly-distinctive features used effectively: unified hover, spike lines, spline
    smoothing, and HTML export'
  weaknesses:
  - Region shadings at 7% opacity on dark background are barely perceptible for CH3
    (blue) and TMS (green) zones — consider increasing dark-theme shading opacity
    to ~0.13-0.15 for these lighter Imprint colors
  - Annotation font size (10px) may render too small at mobile widths (~400px display);
    bumping to 11-12px would improve readability at smaller viewports
  image_description: |-
