      Data: Spectrum line in identical brand green #009E73, confirming data colors are unchanged between themes. Annotation border colors (ochre, lavender, blue, green) identical to light render. Region shadings at 7% opacity are more subtle on dark background — blue (CH3) and green (TMS) zones barely visible, but this is minor.
      Legibility verdict: PASS — all primary text elements readable; no dark-on-dark issues; brand green clearly visible on dark surface.
