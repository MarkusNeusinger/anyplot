      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "Ethanol 1H NMR · spectrum-nmr · python · plotly · anyplot.ai" centered, dark INK color (#1A1A17), ~75% width. Axis labels "Chemical Shift δ (ppm)" and "Intensity (a.u.)" clearly readable. Tick labels in INK_SOFT (#4A4A44), fully legible.
      Data: Main spectrum line in brand green #009E73 with subtle green fill. Four annotated peaks: CH2 quartet (ochre #BD8233 border), OH singlet (lavender #C475FD border), CH3 triplet (blue #4467A3 border), TMS (green #009E73 border). Subtle Imprint-palette region shadings for each zone.
      Legibility verdict: PASS — all text, annotations, and labels clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
