      Data: Spectrum line in #009E73 (brand green) dominates the display with sharp Lorentzian peaks — CH3 triplet cluster at ~1.1–1.25 ppm, CH2 quartet at ~3.63–3.75 ppm, OH singlet at ~2.61 ppm, TMS at ~0.00 ppm. Peak marker dots: lavender (#C475FD) for TMS, blue (#4467A3) for CH3, ochre (#BD8233) for OH, red (#AE3030) for CH2 — correct Imprint palette positions 2–5. On-chart labels present: "CH3 triplet (1.18 ppm)", "CH2 quartet (3.69 ppm)", "OH singlet (2.61 ppm)", "TMS (0.00 ppm)". Legend at bottom shows all 5 series.
      Issue: The CH3 triplet (blue) and CH2 quartet (red) peak marker dots float slightly above the spectrum line because peak positions are found from full-resolution data while the spectrum line uses downsampled data that misses the exact peak maximum. Right-edge labels (TMS, CH3) are tight against the canvas right boundary.
