review:
  strengths:
  - Scientifically accurate Lorentzian line shapes with realistic 1:2:1 triplet and
    1:3:3:1 quartet splitting patterns for ethanol
  - 'Near-perfect spec compliance: x-axis correctly reversed, all multiplets present,
    TMS reference peak included, clean baseline, peaks labeled with chemical shift
    values'
  - Excellent data quality with accurate ethanol chemical shifts (CH3 ~1.18 ppm, CH2
    ~3.69 ppm, OH ~2.61 ppm) and realistic NMR conventions
  - 'Imprint palette applied correctly — first series (#009E73) is the spectrum line,
    peak markers use positions 2–5 in canonical order, backgrounds are #FAF8F1/#1A1A17'
  - All font sizes explicitly set (title=66, axis labels=56, major labels=44, legend=44,
    value=40)
  - Interactive HTML output leverages pygal's interactive advantage; on-chart peak
    labels using print_labels=True with custom per-point label text is idiomatic pygal
    usage
  weaknesses:
  - 'Peak marker dots (especially CH3 triplet at y≈1.03 and CH2 quartet at y≈0.78)
    float visibly above the spectrum line because peak position is found from the
    original 6000-point data but the spectrum line uses downsampled 1000-point (every-6th)
    data that misses the exact Lorentzian maximum — the dot should snap to the spectrum
    line, not hover above it. Fix: find peak in the downsampled cs_plot/int_plot arrays
    instead of original chemical_shift/intensity arrays.'
  - 'Right-edge annotation labels (''TMS (0.00 ppm)'' and ''CH3 triplet (1.18 ppm)'')
    crowd the right canvas boundary — margin_right=140 is insufficient for the label
    lengths at value_font_size=40. Calculated available space for TMS label is ~303px
    but the text needs ~374px. Fix: increase margin_right to at least 260, or position
    labels to the LEFT of their dots for points near the right axis edge.'
  - Design excellence is moderate — the bottom legend lists all 5 series including
    4 peak markers that are already labeled on the chart, making it redundant and
    visually heavy. Removing peak markers from the legend (or setting legend_at_bottom=False
    and using only on-chart labels) would improve visual refinement. Also consider
    a subtle shaded baseline fill to emphasize peak contrast.
  - 'DE-02 styling could go further: the default pygal dotted horizontal grid, the
    visible border frame, and the all-spines appearance detract from scientific polish.
    Consider: removing all border spines (keep only the bottom axis line via CSS),
    reducing grid opacity, and using a lighter grid line style.'
