  weaknesses:
  - CH2 annotation at ha='center' with arrowstyle='-' connector causes the vertical
    connector line to partially obscure the '6' in '3.69 ppm' label — consider offsetting
    text horizontally by ~0.1–0.2 ppm or using a bent connector (connectionstyle='arc3,rad=0.2')
