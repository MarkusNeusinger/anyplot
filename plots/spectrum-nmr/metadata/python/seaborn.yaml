  - Annotation fontsize=8pt produces ~5px text at mobile scale (400px wide); consider
    fontsize=9–10pt for annotations
  - Grid lines present despite this being a spectroscopic plot where a clean baseline
    is more conventional — consider removing the x-axis grid or setting to alpha=0.08
