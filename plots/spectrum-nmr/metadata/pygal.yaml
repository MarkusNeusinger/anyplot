  image_description: 'The plot displays a 1H NMR spectrum of ethanol on a white background.
    A blue spectrum line runs along the baseline from 12.0 to approximately 0.0 ppm
    (x-axis reversed, high ppm on left). Four distinct peak groups are visible: a
    tall CH3 triplet (~1.18 ppm) with three resolved lines and the highest intensity
    (~1.0), a CH2 quartet (~3.69 ppm) showing four resolved peaks reaching ~0.65 intensity,
    an OH singlet (~2.61 ppm) as a single peak at ~0.35, and a TMS reference peak
    at 0.00 ppm. Each peak is marked with a colored dot (teal, blue, purple, orange
    respectively) and labeled with its functional group and ppm value. The title reads
    "Ethanol 1H NMR - spectrum-nmr - pygal - pyplots.ai". Axis labels show "Chemical
    Shift (ppm)" and "Intensity (a.u.)". A legend at the bottom lists all five series.
    The axis line is hidden via CSS. The x-axis extends slightly past 0 to show "1.0"
    on the far right (a negated -1.0 region).'
