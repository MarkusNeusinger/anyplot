  strengths:
  - Excellent scientific accuracy with correct ethanol NMR chemical shifts, splitting
    patterns (1:2:1 triplet, 1:3:3:1 quartet), and J-coupling values
  - Clean visual design with hidden grid/axis lines, white background, and generous
    margins
  - Correct NMR convention with reversed x-axis using clever negation and abs() formatting
  - Good use of pygal per-point label dictionary format and CSS injection for axis
    styling
  weaknesses:
  - Peak labels (chemical shift values and functional group assignments) not visible
    in static PNG - only red dots appear, labels exist only as tooltip hover data
  - Helper function _peak() breaks KISS flat structure requirement
  - Blue/red color pairing could be more colorblind-friendly
  image_description: 'The plot displays an ethanol 1H NMR spectrum on a white background.
    A blue line (#306998) traces the spectrum across the x-axis labeled "Chemical
    Shift (ppm)" running from 12.0 on the left to 0.0 on the right (correct NMR convention).
    The y-axis is labeled "Intensity (a.u.)" ranging from 0 to 1.1. The title reads
    "Ethanol 1H NMR · spectrum-nmr · pygal · pyplots.ai" in dark text at the top.
    Four distinct peak groups are visible: a tall triplet near 1.2 ppm (CH3, tallest
    peak ~1.0), a quartet near 3.7 ppm (CH2, peaks ~0.6-0.75), a smaller singlet near
    2.6 ppm (OH, ~0.35), and a small TMS reference peak at 0.0 ppm (~0.3). Red dots
    (#c0392b) mark the four peak assignments. The baseline is clean with very subtle
    noise. A legend at the bottom shows "1H NMR Spectrum" (blue square) and "Peak
    Assignments" (red square). No grid lines are visible, giving a clean professional
    appearance. The large region from 5-12 ppm is empty, consistent with ethanol''s
    NMR profile.'
