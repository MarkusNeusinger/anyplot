    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title and all axis labels render in light INK (#F0EFE8), clearly visible against dark background. Tick labels in INK_SOFT (#B8B7B0) — readable. Grid lines subtle. Legend frame uses ELEVATED_BG (#242420) with INK_SOFT edge.
      Data: Data colors identical to light render — green/lavender/blue/ochre bubbles confirm palette stability across themes. All four income tier clusters visible with good contrast against dark background.
      Issue: The size legend markers (reference circles for 15/30/45/60 population values) inherit edgecolor=PAGE_BG which in dark mode is #1A1A17 (near-black). These circles appear very dark against the #242420 elevated legend background, making the size reference hard to visually parse. Text labels "15 / 30 / 45 / 60" next to them are light and readable, partially compensating, but the circles themselves lack contrast.
