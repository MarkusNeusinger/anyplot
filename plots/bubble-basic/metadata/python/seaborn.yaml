    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, no pure white.
      Chrome: Title "bubble-basic · python · seaborn · anyplot.ai" at ~12pt renders at ~65% plot width, well-proportioned. X-axis label "Healthcare Spending ($ / year)" and Y-axis label "Child Mortality (per 1,000 births)" at 10pt with units — descriptive and balanced. Tick labels at 8pt in INK_SOFT grey, readable. Top/right spines removed, L-frame retained.
