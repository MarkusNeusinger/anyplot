  strengths:
  - 'Complete theme adaptation with #FAF8F1 / #1A1A17 backgrounds and all chrome tokens
    properly threaded through every element'
  - Area-proportional bubble scaling using correct sqrt formula — spec requirement
    met precisely
  - Custom size legend using BoxAnnotation + colormap-matched scatter glyphs — sophisticated
    and visually coherent with the main chart
  - Realistic neutral city-metrics scenario demonstrating all three bubble chart dimensions
    with meaningful real-world correlations
  - Trend line adds immediate storytelling value and guides viewer to the density-income
    relationship
  weaknesses:
  - 'Legend text hierarchy inverted: legend entry labels (26pt) are smaller than tick
    labels (34pt) — increase legend entries to 34pt and header to 38pt'
  - Both X and Y grid lines at alpha=0.12; scatter plots are cleaner with Y-axis-only
    grid — add p.xgrid.grid_line_color = None to disable horizontal grid clutter
  - No subtitle or annotation calling out the key insight; a Label near the trend
    line or a descriptive title prefix would strengthen storytelling (DE-03)
