review:
  strengths:
  - Correct imprint_seq colormap for continuous green-space variable; backgrounds
    and all chrome tokens are theme-adaptive and correct in both renders.
  - 'Thoughtful legend placement: BoxAnnotation + Label elements occupy the naturally
    empty upper-left corner without overlapping data.'
  - 'Idiomatic Bokeh: ColumnDataSource with transform()-based color mapping, HoverTool
    with formatted tooltips, captureBeyondViewport CDP call to avoid common height-truncation
    bug.'
  - Realistic neutral data scenario (city metrics) that naturally creates interesting
    3-variable relationships.
  - np.random.seed(42) ensures reproducibility; all imports are actually used.
  weaknesses:
  - 'Bubble area scaling is incorrect: code maps green_space linearly to the size
    (diameter) parameter. Fix: bubble_size = np.sqrt(size_min**2 + (size_max**2 -
    size_min**2) * green_norm) to make area scale linearly with data value.'
  - Minimum bubble size (15 px diameter) is too small at 3200x1800 — low-green-space
    / high-density points on the right appear as barely-visible dots. Raise size_min
    to 20-25 px.
  - Top and right spines not fully suppressed — Bokeh default axis box partially remains.
    Confirm outline_line_color=None fully removes the outer frame in the rendered
    output.
  - No visual storytelling element (trend line, annotation) guides the viewer to the
    main finding. Add a lightweight dashed regression/trend line or a callout annotation
    to lift DE-03.
