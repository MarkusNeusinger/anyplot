review:
  strengths:
  - Full spec compliance — correct bubble chart with x/y/size dimensions, area-scaled
    tier sizing, transparency, and a size/color legend
  - Clever tier-based sizing workaround for pygal's lack of per-point size API, with
    sqrt scaling for perceptual area accuracy
  - 'Effective focal point: amber (#DDCC77) Peak Congestion city immediately draws
    the eye as the visual anchor'
  - 'Both light and dark themes render correctly — #FAF8F1 / #1A1A17 backgrounds,
    theme-adaptive chrome, all text readable in both renders'
  - 'imprint_seq colormap correctly applied: #009E73 → #4467A3 gradient across 8 tiers
    encodes green space as a continuous variable'
  - 'Perfect code quality: np.random.seed(42), clean imports, KISS structure, HTML
    + PNG outputs both saved'
  - Realistic and neutral city-comparison scenario with plausible data relationships
    (density → commute ↑, density → green space ↓)
  weaknesses:
  - 'DE-02 limited by pygal: no spine removal possible via the API, so top/right frame
    lines remain — reduces visual refinement score'
  - 'Legend crowding: 9 entries (8 tiers + amber focal) in 4 columns at the bottom
    is functional but somewhat dense; consider reducing to 5 tiers or abbreviating
    tier labels to free vertical space for the plot area'
  - The green → blue gradient across 8 tiers produces visually similar mid-range bubbles;
    size differences between adjacent tiers are subtle and can be hard to distinguish
    without the legend
  - 'DE-01: design is thoughtful but the overall aesthetic still reads as a pygal
    default — no additional polishing touches (e.g. no stroke on markers for separation
    on overlapping bubbles) that would push it to a higher aesthetic tier'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly applied, not pure white.
      Chrome: Title "bubble-basic · python · pygal · anyplot.ai" is dark text, clearly readable, spans ~55% of plot width. X-axis label "Population Density (people/km²)" and Y-axis label "Avg Commute Time (min)" both dark and readable with units. Tick labels (2,000–13,000 on x; 16.0–32.0 on y) are dark and legible. Subtle grid lines in both directions.
      Data: 50 city bubbles rendered in an 8-tier imprint_seq gradient from brand green (#009E73) at the low end to blue (#4467A3) at the high end, encoding green space percentage. The amber (#DDCC77) Peak Congestion focal city at the upper right (~12,500 density, ~32 min commute) stands out clearly. Bubble sizes scale from small (low green space) to large (high green space) via sqrt area scaling.
      Legibility verdict: PASS — all text elements are readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly applied, not pure black.
      Chrome: Title, axis labels, tick labels all rendered in light text (#F0EFE8 tone), clearly readable against the dark background. Grid lines subtle but visible. No dark-on-dark failures observed.
      Data: Bubble colors are identical to the light render — the imprint_seq gradient from #009E73 to #4467A3 is unchanged, and the amber Peak Congestion bubble is the same #DDCC77. Only the chrome (background, text, grid) flips to the dark theme.
      Legibility verdict: PASS — all text is light-colored and readable on the dark surface; brand green #009E73 remains clearly visible.
