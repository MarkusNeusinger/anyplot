      Data: 142 country bubbles plotted using anyplot palette: Africa (#009E73 green, ★ correct first series), Americas (#C475FD lavender), Asia (#4467A3 blue), Europe (#BD8233 ochre), Oceania (#AE3030 red). Bubbles use shape=21 with PAGE_BG edge stroke and alpha=0.65. Large India/China bubbles clearly dominate mid-chart. Clear regional clustering: Africa lower-left, Europe/Americas upper-right, Asia spanning the middle.
