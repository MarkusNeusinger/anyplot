review:
  strengths:
  - Perfect anyplot palette compliance — Africa as first series (#009E73), all five
    continents use canonical palette positions 1–5 in semantically correct order
  - scale_size_area() ensures visually accurate area-based bubble sizing, meeting
    the spec requirement to 'scale bubble sizes by area'
  - All theme-adaptive chrome tokens (PAGE_BG, INK, INK_SOFT, ELEVATED_BG, GRID) correctly
    wired to every element in both light and dark themes; zero dark-on-dark or light-on-light
    failures
  - Real-world gapminder 2007 dataset creates an immediately compelling wealth-health
    story with clear regional clustering visible through color coding
  - 'Idiomatic ggplot2 code: grammar of graphics pattern, proper scale layering (scale_x_log10,
    scale_size_area, scale_fill_manual), and guides() with override.aes for legend
    control'
  - All font sizes explicitly set (title=12, axis.title=10, axis.text=8, legend.text=8,
    legend.title=10) matching style-guide recommendations
  weaknesses:
  - Minor grid lines (panel.grid.minor) add visual noise on the log-scale x-axis;
    removing them with element_blank() would clean up the chart without information
    loss
  - The two dominant population outliers (China and India, the largest bubbles) are
    not labeled; adding geom_text or geom_label for the top 2-3 bubble labels would
    guide the viewer to the most important data points and elevate the storytelling
  - guides(size = guide_legend(title = 'Population')) is redundant since scale_size_area(name
    = 'Population') already sets the legend title — minor code cleanup
  image_description: |-
