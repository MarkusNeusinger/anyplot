  image_description: The plot shows a horizontal tornado diagram for NPV sensitivity
    analysis. Ten financial parameters are listed on the y-axis, sorted by impact
    range from smallest (Inflation Rate, top) to largest (Discount Rate, bottom).
    Bars extend left (orange, "Low Scenario") and right (blue, "High Scenario") from
    a dashed vertical base case reference line at $120M. The x-axis shows "Net Present
    Value ($M)" ranging from $70 to $160. Each bar has value annotations at its ends
    (e.g., "$82M" and "$152M" for Discount Rate). The top 3 most impactful parameters
    (Discount Rate, Revenue Growth, Material Cost) have bold, larger y-axis labels.
    A "Base Case $120M" italic annotation sits near the bottom of the reference line.
    The legend in the upper right shows orange for Low Scenario and blue for High
    Scenario. The background is clean white with subtle vertical grid lines.
