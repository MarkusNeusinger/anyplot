    value labels are the main visual flourishes beyond defaults; no additional focal-point
    emphasis (e.g., annotation highlighting the top driver)
  - 'Very narrow bars at bottom (Inflation Rate High Input Effect: +0.1M) produce
    tight value label ''+0.1'' that could become unreadable at mobile-scaled (~400
    px) widths'
