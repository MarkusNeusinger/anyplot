review:
  strengths:
  - 'Semantic Imprint palette assignment: green for gain (high scenario), red for
    loss (low scenario) — both from Imprint palette, semantically documented, immediately
    intuitive for financial audiences'
  - 'Complete spec compliance: reference line, sorted order, dual colors, value labels
    at bar ends all present'
  - Captioned insight adds genuine storytelling value (Revenue Growth and Discount
    Rate account for over 50% of total NPV sensitivity)
  - Dynamic title font scaling formula correctly applied for the 83-char mandated
    title
  - layer_tooltips() adds genuine interactive value in the HTML output — a distinctive
    letsplot capability
  - Directional arrows in legend labels (◀ Low Scenario / High Scenario ▶) are a polished
    redundant-encoding touch
  weaknesses:
  - flavor_high_contrast_dark() adds visible dark outlines around each bar segment
    in the dark render, creating a cluttered look — consider removing the high-contrast
    flavor and relying on manual theme settings, or set geom_bar(color="transparent",
    size=0) to suppress outlines
  - The panel frame from the high-contrast flavor differs from the style guide recommended
    L-shaped or borderless aesthetic — set panel_border=element_blank() or remove
    the flavor
  - Bar value labels at size=4mm become very small (~7–8 px) at 400px mobile viewport
    width — increase to size=5 or size=6
