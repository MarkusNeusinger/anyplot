review:
  strengths:
  - Perfect spec compliance — all required tornado features implemented (vertical
    reference line, sorted bars, dual-color scenarios, bar-end value labels)
  - 'Semantic color exception correctly applied: #009E73 (brand green) for High Scenario
    (gain) and #AE3030 (matte red) for Low Scenario (loss), motivated by finance domain
    conventions'
  - Alpha-blending visual hierarchy (top-3 at 1.0 opacity vs rest at 0.55) creates
    a clear focal point and guides the viewer to the most influential parameters
  - Deterministic, realistic NPV financial model data with 10 credible financial assumptions
    and plausible ranges
  - Clean KISS code structure with all text sizes explicitly set; both theme renders
    correctly adapted via theme tokens
  weaknesses:
  - Bar-end value labels use size=2.5mm (≈ 7pt) — at the lower bound of readability
    on the 3200×1800 canvas and nearly illegible at mobile scale (~400px width); increase
    to size=3.0–3.5mm
  - Legend box has a visible INK_SOFT border that adds unnecessary chrome noise and
    clutters the upper area; setting legend_background border color to PAGE_BG (or
    element_blank for the border) would clean this up
  - DE-01 could be elevated by removing the legend border and making the title weight
    hierarchy more pronounced (plot title slightly bolder than currently)
  - 'DE-03 storytelling is good via alpha but could be stronger with a small annotation
    near the top bar identifying it as the primary driver (e.g., ''Largest NPV swing:
    $53M range'')'
