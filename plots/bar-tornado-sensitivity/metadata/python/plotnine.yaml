      Data: Top 3 bars (Discount Rate, Revenue Growth, Material Cost) at full opacity — High Scenario in #009E73 brand green extending right, Low Scenario in #AE3030 matte red extending left. Lower 7 bars at 55% alpha (muted but clearly visible). Dashed vertical reference line at base case ($120M). Bar-end value labels (e.g., "$95M", "$148M") at size=2.5mm — visible at full resolution but very small, likely problematic at mobile width. Legend at top with "High Scenario" (green) and "Low Scenario" (red) labeled correctly in a bordered box.
