  - 'Perfect spec compliance: all required tornado chart features (sorted bars, dual-direction,
    base reference line, two scenario colors, data labels) implemented correctly'
  - 'Strong theme adaptation: all chrome tokens (INK, INK_SOFT, GRID, PAGE_BG, ELEVATED_BG)
    correctly flow through every element in both light and dark renders'
  - Distinctive Highcharts renderer.label callout using the native callout SVG shape
