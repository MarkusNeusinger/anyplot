  - Region plot-bands with ghost labels add contextual storytelling without cluttering
    the chart
  - 'Full code quality: clean imports, deterministic data, correct output files, idiomatic
    API usage throughout'
  weaknesses:
  - Data labels at 30px are noticeably smaller than tick labels at 40px — bump data
    labels to 36–38px for better visual balance across both renders
  - The Negative Impact plot-band label (rgba(174,48,48,0.35)) is nearly invisible
    in the dark render against the dark background — increase alpha to at least 0.5
    or use INK_MUTED token for dark-theme visibility
  - The top-driver callout uses green (#009E73) and is anchored at the positive end
    of the Discount Rate row (the Low Scenario blue bar tip), creating a minor color-signal
    mismatch — consider anchoring to the widest absolute bar end regardless of direction,
    or use INK as callout color to remain scenario-neutral
