review:
  strengths:
  - Correct tornado shape achieved via barmode=overlay with base=base_npv — idiomatic
    plotly approach for tornado diagrams
  - Opacity gradient (0.35 to 1.0 by rank) creates an elegant visual hierarchy where
    most influential bars are most vivid
  - Semantic color assignment (green=high/upside, blue=low/downside) is well-reasoned
    and documented in code comments
  - 'Both themes fully adapted: all chrome tokens (INK, INK_SOFT, GRID, PAGE_BG) correctly
    threaded through every element including annotations, ticks, and legend'
  - 'Complete spec compliance: reference line at base case, sorted by range descending,
    dual colors, bar-end value labels, and storytelling annotation all present'
  - 'Strong data storytelling: Largest swing annotation directly highlights the key
    insight for the reader'
  - Interactive hover templates with meaningful formatted output (delta with sign,
    dollar-formatted scenario values)
  weaknesses:
  - 'Bottom bars (Salvage Value, Working Capital) at ~0.35 minimum opacity are noticeably
    faint — readers may underestimate their NPV impact; raise minimum opacity from
    0.35 to 0.50 in the gradient formula: 0.50 + 0.50 * i / (n - 1)'
  - Top/right spines not explicitly removed — plotly default border lines conflict
    with anyplot L-shaped or borderless spine preference; add showline=False and mirror=False
    to both axes
  - Largest swing annotation (yshift=10) sits too close to the $16.0M bar-end label
    for Revenue Growth; increase yshift to 20 or add x-offset for breathing room
