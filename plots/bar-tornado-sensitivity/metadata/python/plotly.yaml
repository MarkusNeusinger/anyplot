review:
  strengths:
  - Gradient opacity by influence rank adds a second visual encoding of importance
    alongside bar width — a creative technique that goes beyond defaults
  - Semantic color assignment (green=#009E73 for High/upside, blue=#4467A3 for Low/downside)
    is intentional and appropriate for the financial NPV context
  - 'Full spec compliance: sorted bars create proper tornado shape, vertical base-case
    reference line is clear, dual-scenario colors are distinct, value labels at bar
    ends enable precise reading'
  - 'Plotly interactive features fully leveraged: hovertemplate with formatted delta
    values, cliponaxis=False for outside text labels, HTML export alongside PNG'
  - Both light and dark renders are theme-correct with all chrome tokens wired through
    to annotations and legend
  weaknesses:
  - 'Minor crowding in the top-right corner: the ''Largest swing: $8.0M'' annotation
    (yshift=20) and the ''$16.0M'' outside text label for the Revenue Growth high
    bar are positioned very close together horizontally — consider increasing right
    margin or adjusting annotation x/y to create clearer separation'
  - Legend border (borderwidth=1) adds visual weight that could be removed or made
    hairline for a cleaner look; spines are correctly removed but bar bargap=0.25
    could be tightened slightly to 0.3 for denser grouping
  - Annotation for 'Largest swing' uses INK_SOFT color which is intentionally secondary,
    but given it's meant as the key focal-point annotation, using INK (primary) or
    even the green palette color for emphasis would reinforce its storytelling role
