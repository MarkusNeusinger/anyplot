review:
  strengths:
  - Textbook tornado shape — bars sorted by impact range with the widest (Discount
    Rate, $70M span) at top narrowing to Inflation Rate at the bottom, anchored by
    a dashed base-case reference line at $120M
  - 'Correct dual-color semantics using the Imprint palette: brand green #009E73 for
    Low Scenario, lavender #C475FD for High Scenario, and the colors correctly track
    the *scenario* not the side — Material Cost and Tax Rate invert (purple-left/green-right)
    because lowering them raises NPV'
  - 'Strong visual hierarchy: top-3 most-impactful parameter labels are bolded, bar-end
    value labels show resulting NPV at each scenario end, and x-ticks are relabeled
    to absolute NPV ($M) rather than deltas'
  - Clean theme adaptation — data colors are pixel-identical between light (#FAF8F1)
    and dark (#1A1A17) renders, only chrome flips; all text legible in both themes
  - 'Idiomatic seaborn: long-form DataFrame fed to sns.barplot with hue/hue_order/palette,
    dodge=False to overlay the diverging low/high bars on a single row, sns.despine
    + set_theme rc tokens'
  weaknesses:
  - The italic 'Base case $120M' annotation sits very close beneath the centered title
    in both renders, crowding the top of the plot — nudge it down or anchor it to
    the axvline lower in the plot area to give the title breathing room (VQ-05).
  - Bar-end value labels are set at fontsize=7, which is small; readable at full 3200px
    but would be hard to read when scaled to ~400px mobile — consider fontsize ~8
    (VQ-01).
  - Bold emphasis is applied to the top 3 rows, but Material Cost (4th) has the same
    $40M span as Labor Cost (3rd, bolded); the cutoff at 3 is slightly arbitrary given
    the tie — minor cosmetic inconsistency.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: title "bar-tornado-sensitivity · python · seaborn · anyplot.ai" in dark ink, centered top; x-label "Net Present Value ($M)" and y-label "Input Parameter" both dark and readable; x-ticks $80-$160 and y-axis parameter names all clearly legible; top-3 labels bolded. Italic "Base case $120M" annotation sits just under the title near the dashed base line. All text readable.
      Data: horizontal diverging tornado bars — Low Scenario = brand green #009E73, High Scenario = lavender #C475FD. First series is #009E73. Dashed vertical base-case line at $120M. Bar-end $ value labels in soft ink. Tornado sorted widest-at-top.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: title and both axis labels in light ink, fully readable; tick labels and parameter names light gray on dark, readable; no dark-on-dark failures. "Base case $120M" italic annotation visible in muted light ink.
      Data: identical green/lavender bars as the light render — only chrome flipped. Base-case dashed line now light. Bar-end labels light gray.
      Legibility verdict: PASS
