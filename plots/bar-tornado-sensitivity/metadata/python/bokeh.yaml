    — while justified for long labels, the size disparity is prominent; consider 26-28pt
    for a more balanced tick-label hierarchy
  - '"Base: $12.5M" label positioned at y=9.5 + y_offset=55 places it awkwardly in
    the top border margin, partially overlapping the border line — consider reducing
    y_offset to ~20 and using a slightly larger base_label fontsize'
