review:
  strengths:
  - Perfect tornado shape with bars sorted by impact magnitude — widest at top (Revenue
    Growth) narrowing to Salvage Value at bottom
  - Alpha gradient (opacity proportional to bar range) adds a subtle but effective
    visual dimension reinforcing the sort order
  - Bold y-tick labels for top 3 drivers (Revenue Growth, Discount Rate, Terminal
    Value) create clear focal hierarchy without annotations
  - PathEffects halo strokes on value labels ensure readability across both light
    and dark themes without visual clutter
  - 'Styled ''Base: $12.5M'' annotation box with ELEVATED_BG fill and rounded corners
    is clean and informative'
  - Both light and dark renders are visually excellent — data colors identical, chrome
    properly flips, no dark-on-dark failures
  - 'Correct Imprint palette: Low Scenario = #009E73 (brand green), High Scenario
    = #C475FD (lavender position 2)'
  - Left/top/right spines removed — only bottom spine retained, appropriate for horizontal
    bar orientation
  - Bar-end value labels use nudge logic to prevent crowding near the center reference
    line
  weaknesses:
  - 'DE-01: Design is strong but not yet publication-ready — the top driver (Revenue
    Growth) could be given an additional visual accent (e.g., slightly bolder bar
    edge or a distinct reference annotation) to push it from ''configured'' to ''editorial''
    quality'
  - 'DE-02: The x-axis grid uses color=INK (full ink color) at alpha=0.15 — switching
    to a muted ink color token (INK_SOFT or INK_MUTED) at alpha=0.15 would give slightly
    cleaner grid lines more consistent with the style guide''s RULE token intent'
  - 'DE-03: Visual hierarchy established via bold labels and alpha gradient is effective
    but the story could be reinforced with a brief subtitle or a callout noting which
    parameter dominates'
