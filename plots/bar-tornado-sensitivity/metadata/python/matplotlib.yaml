review:
  strengths:
  - Alpha-gradient encoding (bar opacity scales with ranking magnitude) adds a second
    redundant encoding channel that reinforces the tornado message without chartjunk
  - PathEffects.withStroke halos on bar-end labels solve foreground-on-bar readability
    elegantly and idiomatically in matplotlib
  - Top-3 driver highlighting via bold INK-colored y-tick labels creates a clear focal
    zone
  - 'Perfect spec compliance: all five required features implemented correctly'
  - Full theme-adaptation with all chrome tokens correctly applied; dark render passes
    with no dark-on-dark failures
  weaknesses:
  - Bottom 2-3 bars rendered at alpha ~0.40 making them noticeably faint; raise alpha
    floor from 0.40 to 0.55 (change alphas = 0.40 + 0.60 * range_norm to alphas =
    0.55 + 0.45 * range_norm)
  - Value label pairs on narrow bottom bars sit very close together; consider a minimum
    offset nudge for bars where total span is under ~$1.5M
  - Manual ax.text() loop for bar-end labels instead of idiomatic ax.bar_label() method
    available since matplotlib 3.4
