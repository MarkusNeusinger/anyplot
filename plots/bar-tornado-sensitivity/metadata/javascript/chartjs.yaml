review:
  strengths:
  - 'Perfect spec compliance: correct tornado/sensitivity chart type with all required
    features (vertical base line, magnitude-sorted bars, dual-color low/high encoding,
    9 realistic parameters)'
  - Excellent three-dataset stacked approach (transparent filler + left segment +
    right segment) cleanly handles both normal and inverted parameters with per-bar
    color arrays
  - 'Custom Chart.js plugin API used expertly: `bgPlugin` fills theme-correct background,
    `baseLinePlugin` draws annotated dashed reference line using scale pixel APIs'
  - 'Realistic, neutral, professional dataset: renewable energy NPV sensitivity analysis
    with plausible dollar values and parameter names'
  - 'Perfect palette compliance: first series = #009E73, second series = #C475FD (Imprint
    positions 1–2); both themes render correctly with data colors identical and chrome
    flipping cleanly'
  - 'All font sizes explicitly set (title: 22, legend: 16, axis title: 18, ticks:
    14); typography is balanced and readable at both desktop and mobile scale'
  - Legend filter `item => !item.text.startsWith("_")` cleanly hides the helper filler
    dataset while keeping the two semantic legend entries
  - Deterministic hard-coded data ensures reproducibility without any random-seed
    ceremony
  weaknesses:
  - 'Minor wasted space on the right side of the x-axis: `max: 11` leaves ~10% of
    axis unused beyond the largest data point ($9.8M); tightening to `max: 10.5` or
    removing the explicit max would reduce dead space and score VQ-05 higher'
  - 'Design Excellence is good but not exceptional: top/right chart border (Chart.js
    `border`) not removed, and no further visual storytelling emphasis (e.g. highlighting
    the widest bar or annotating the #1 driver)'
  - 'LM-02 stays at 3/5: the implementation is sophisticated but the custom plugin
    pattern, while idiomatic, is a well-known Chart.js technique; adding a distinctive
    Chart.js-only feature (e.g. custom tooltip with formatted value, animation on
    first draw suppressed via the correct `animation: false` mechanism already present)
    would not raise this'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas as expected. The background plugin correctly paints the chart surface before Chart.js draws.
      Chrome: Title "bar-tornado-sensitivity · javascript · chartjs · anyplot.ai" in bold dark (#1A1A17) text spans ~65% of canvas width — well within the expected 65–85% for this title length. X-axis title "Net Present Value ($ millions)" in dark ink at size 18. Y-axis parameter labels (Electricity Price … Grid Connection Fee) in dark secondary ink at size 14. X-axis dollar tick labels ($0M … $11M) in secondary ink at size 14. "Base: $5M" annotation in secondary ink just above the dashed base line at the top of the chart area. Legend at bottom: "Low Scenario" (green swatch) and "High Scenario" (purple swatch) in dark ink.
      Data: Nine horizontal stacked bars sorted widest-to-narrowest (Electricity Price at top, Grid Connection Fee at bottom), creating the characteristic tornado shape. Low-scenario segments in brand green #009E73 and high-scenario segments in Imprint lavender #C475FD. Inverted parameters (Discount Rate, Construction Cost) correctly swap color sides. Dashed vertical base line at $5M clearly visible.
      Legibility verdict: PASS — all text readable, no dark-on-light failures, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire canvas correctly.
      Chrome: Same title, axis labels, ticks, and legend text now in light (#F0EFE8 / #B8B7B0) ink — all clearly readable against the dark background. Base line switches to near-white dashed line. "Base: $5M" annotation in light secondary ink, readable. Legend text in light color.
      Data: Bar colors are pixel-identical to the light render — #009E73 (green) and #C475FD (lavender) both pop against the dark background with excellent visibility. Tornado shape and sorting identical.
      Legibility verdict: PASS — no dark-on-dark text failures detected; all chrome elements adapt correctly to the dark surface.
