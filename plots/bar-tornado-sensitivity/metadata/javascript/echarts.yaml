review:
  strengths:
  - 'Perfect spec compliance: all required tornado features (reference line, sorted
    bars, dual colors, value labels) present and correct.'
  - 'Exemplary semantic color mapping: matte red for downside risk and brand green
    for upside opportunity is the exact right application of the Imprint semantic
    exception for finance data.'
  - markLine for the base case reference line is the idiomatic ECharts declarative
    approach — a genuine showcase of library-distinctive capability.
  - Transparent-offset stacking technique correctly positions bars at minOut without
    any DOM/SVG workarounds.
  - Custom tooltip formatter provides full context (downside, base, upside, range)
    in a clean readable format.
  - Clean, flat, deterministic code; no over-engineering.
  weaknesses:
  - Bar inner/outer labels at fontSize 11 are slightly small for a 3200x1800 canvas;
    increase to 12-13 to improve mobile-width readability.
  - DE-01 could be elevated by adding visual emphasis on the highest-impact parameter
    (e.g., bolder bar, annotation, or background band on Revenue Growth Rate row).
  - 'DE-02 refinement gap: the default ECharts axis-line style is visible but not
    as clean as removing all unnecessary chrome — consider hiding the y-axis line
    (axisLine: { show: false }) for a cleaner look.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as required — not pure white, not dark.
      Chrome: Title "NPV Sensitivity Analysis · bar-tornado-sensitivity · javascript · echarts · anyplot.ai" in dark ink, clearly readable. Axis label "Net Present Value ($ Million)" readable at bottom. Y-axis parameter names (Revenue Growth Rate, Market Share, etc.) readable in inkSoft. X-axis tick labels ($6M–$20M) readable. Legend "Below Base Case" / "Above Base Case" readable.
      Data: Two bar segments per row. Matte-red (#AE3030, palette[4]) bars for downside (Below Base Case); brand-green (#009E73, palette[0]) bars for upside (Above Base Case). First data series (brand green for upside) matches #009E73. Semantic exception applied correctly — red for loss, green for gain. Dashed vertical reference line at $12.5M base case clearly visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as required — not pure black, not light.
      Chrome: Title, axis labels, tick labels, and legend all render in light ink against the dark background. All text is clearly readable — no dark-on-dark failure observed. Dashed reference line visible.
      Data: Matte-red and brand-green bar colors are identical to the light render — only chrome (background, text, grid) has flipped. All bar-end labels ($7.8M, $18.2M, etc.) remain visible.
      Legibility verdict: PASS
