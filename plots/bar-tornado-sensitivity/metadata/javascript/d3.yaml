review:
  strengths:
  - 'Correct tornado diagram implementation: bars sorted by range (widest at top),
    bilateral bars extending left/right from the $10M base case dashed reference line'
  - 'Semantic Imprint palette color assignment is appropriate: brand green (#009E73)
    for high-scenario (positive NPV impact) and semantic red (#AE3030) for low-scenario
    (negative NPV impact) — explicitly documented in the code'
  - 'Modern D3 idioms throughout: .data().join() pattern, scaleBand for categorical
    Y-axis, tickSize(0) for clean tick removal, hidden domain lines, custom tickFormat'
  - All font sizes explicitly set (title 22px, y-labels 16px, x-ticks and value labels
    14px, x-axis label 17px) — readable at 3200px and mobile scale
  - '''highest impact'' span-line annotation over the widest bar adds storytelling
    value beyond basic requirements'
  - Realistic NPV sensitivity analysis data with 8 plausible financial parameters
    and credible $M values
  - 'Theme adaptation correct in both renders: warm off-white #FAF8F1 light / warm
    near-black #1A1A17 dark backgrounds via t.pageBg token, chrome flips correctly'
  weaknesses:
  - 'VQ-04: Red (#AE3030) and green (#009E73) are the primary color signal for Low
    vs High scenario — CVD viewers (deuteranopes) would lose the hue distinction;
    positional encoding (left/right of base) partially compensates but the chart could
    add a legend swatch border or pattern fill for full accessibility'
  - 'DE-01: Design is functional and well-configured but sits at the upper end of
    ''configured default'' — does not reach the ''strongly above defaults'' tier;
    adding typographic polish (e.g., a subtle subtitle showing the base case value,
    or slightly softer grid treatment) would push it toward 6/8'
  - 'DE-02: tick marks removed and domain lines hidden, but gridlines are full-opacity
    vertical lines rather than the style-guide''s 15% opacity rule — use stroke-opacity
    0.15 on the grid lines to make them more subtle'
  - 'LM-02: Uses standard D3 bar chart patterns (scaleBand, axisLeft/Bottom, .join())
    without reaching truly distinctive D3-only capabilities; no use of d3.format for
    consistent number formatting, no d3.max/min for dynamic domain calculation (domain
    is hard-coded as [4,17])'
