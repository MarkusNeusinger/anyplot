  - Delta labels on bars provide precise quantification without cluttering the layout
  weaknesses:
  - Bar annotation text (size=13) is noticeably smaller than axis text — could be
    bumped to 14-15 for better consistency
  - Nudge logic for label positioning is slightly redundant — the conditional branches
    produce the same result for negative deltas
  - Legend labels with '(decrease)'/'(increase)' suffixes from scale_fill_manual appear
    truncated in the rendered output
  image_description: The plot shows a horizontal tornado/butterfly bar chart for NPV
    Sensitivity Analysis. Ten financial parameters are listed on the y-axis, sorted
    by total range with the widest bars at top (Revenue Growth) and narrowest at bottom
    (Inflation Rate). Blue bars extend leftward representing the Low Scenario (decrease
    in NPV) and orange bars extend rightward for the High Scenario (increase in NPV).
    A dark vertical reference line at x=0 represents the base case. Each bar has bold
    delta labels showing the exact change (e.g., -4.3, +4.8 for Revenue Growth). The
    title reads "NPV Sensitivity Analysis · bar-tornado-sensitivity · letsplot · pyplots.ai"
    in bold, centered. A subtitle states "One-at-a-time parameter variation from base
    case (NPV = $12.5M)". The x-axis is labeled "Change in NPV ($M)" with tick marks
    from -5 to 6. The legend at the top shows "Low Scenario" (blue) and "High Scenario"
    (orange). The background is clean white with subtle vertical gridlines. The overall
    layout is well-proportioned with the chart filling the canvas effectively.
