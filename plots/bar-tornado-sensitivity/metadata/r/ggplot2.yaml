review:
  strengths:
  - 'Full spec compliance: correct tornado shape sorted by impact range, vertical
    base case reference line, dual-color Low/High Input distinction, all 9 NPV parameters
    present'
  - 'Perfect Imprint palette usage: Low Input = #009E73 (position 1), High Input =
    #C475FD (position 2), both renders theme-correct with adaptive chrome'
  - 'Excellent data quality: realistic solar energy NPV sensitivity scenario with
    plausible financial parameters and sensible value ranges'
  - 'Clean, idiomatic ggplot2 code: geom_rect with explicit xmin/xmax/ymin/ymax is
    the right grammar-of-graphics approach for tornado bars'
  - Both themes render correctly with full readability — dark render has no dark-on-dark
    failures
  weaknesses:
  - library(scales) is imported but not used — the custom sprintf label function and
    ggplot2-native expansion() make it unnecessary; remove to keep imports clean
  - 'Design Excellence could be elevated: consider adding NPV value labels at bar
    ends (e.g. geom_text on the outer tip of each bar) to make the chart self-contained
    and publication-ready'
  - 'DE-02 Visual Refinement: top/right axis lines could be explicitly removed (axis.line
    = element_blank()) for a cleaner look; the legend box border is a minor distraction
    in the dark theme — consider removing or making it more subtle'
  - 'DE-03 Storytelling: the chart displays data well but lacks emphasis on the most
    impactful parameter — consider a subtle highlight (slightly brighter fill or annotation)
    on the top bar (Discount Rate) to guide the viewer to the key insight'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "bar-tornado-sensitivity · r · ggplot2 · anyplot.ai" centered at top in dark ink, occupying ~65-70% of canvas width — readable and well-proportioned. Y-axis parameter labels (Discount Rate, Electricity Price, Construction Cost, Capacity Factor, Financing Rate, Project Lifetime, Operating Cost, Tax Rate, Land Lease Cost) in dark text, clearly legible at size 9. X-axis "Net Present Value (USD Millions)" in dark ink at size 10. X-axis tick labels ($30M, $40M, $50M, $60M) at size 8 — all readable. "Base: $42.5M" annotation in muted ink above the vertical reference line — small but legible.
      Data: Green (#009E73) bars for "Low Input", lavender (#C475FD) bars for "High Input". Bars are horizontal and sorted with widest range (Discount Rate) at top, narrowest (Land Lease Cost) at bottom — classic tornado shape. Vertical reference line at $42.5M in dark ink. Legend at bottom with "Input Scenario" label and colored swatches.
      Legibility verdict: PASS — all text fully readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in light cream text — fully readable against the dark background. Y-axis labels in light text — clearly visible. X-axis label and tick labels in light/muted colors — readable with no dark-on-dark failures. Vertical reference line renders in white/light against the dark background. "Base: $42.5M" annotation visible in muted light text. Legend box has elevated dark background (#242420) with light-colored text — legible.
      Data: Green (#009E73) and lavender (#C475FD) bars are identical to the light render — only chrome flipped. Both colors remain visually distinct and well-contrasted against the dark background.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures found
