      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Crop Yield by Variety & Treatment · bar-3d-categorical · pygal · anyplot.ai" clearly readable in dark ink; Y-axis label "Yield (kg / hectare)" visible; X-axis "Crop Variety" visible; tick labels for varieties (Aster, Borealis, Crocus, Delphi, Ember) and treatment depth labels (Control, Nitrogen+, Phosphorus+, NPK Blend) all readable; legend in upper-left with dark text; all elements legible
      Data: First series (Control) is #009E73 (brand green); Nitrogen+ is #D55E00 (orange); Phosphorus+ is #0072B2 (blue); NPK Blend is #CC79A7 (pink) — correct Okabe-Ito order; bars arranged in 3D perspective with depth; one value annotation "4,020" on max bar
      Legibility verdict: PASS

