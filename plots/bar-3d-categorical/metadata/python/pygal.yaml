review:
  strengths:
  - Excellent 3D visualization using pygal's native perspective rendering — achieves
    the 3D bar chart effect without external 3D libraries
  - 'Perfect data quality: realistic agricultural context (crop yield × fertilizer
    treatments), correct value ranges, and plausible treatment hierarchy'
  - Both light and dark themes fully implemented with correct backgrounds (#FAF8F1/#1A1A17),
    adaptive text and grid colors — no dark-on-dark failures
  - Clean, idiomatic code structure with complete KISS pattern and proper Okabe-Ito
    palette in canonical order
  weaknesses:
  - Value labels missing on most bars — spec requires labeling all bars when grid
    < 25 (20 bars in this chart); only the maximum bar shows a value
  - Axis label font (18px) and tick font (16px) are below the recommended 22px/18px
    for pixel-based libraries at 4800×2700 resolution
  - Limited design storytelling — no visual hierarchy emphasis, no focal point beyond
    the implicit height comparison
  image_description: |-
