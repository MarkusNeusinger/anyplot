review:
  strengths:
  - Custom oblique 3D projection using Bokeh's patches glyph is technically impressive
    and demonstrates deep library knowledge
  - Three-face bar shading (hex_darken/hex_lighten) creates convincing depth perception
    without any external 3D library
  - 'Full Okabe-Ito compliance with correct color ordering; identical data colors
    in both themes; correct background tokens (#FAF8F1 light / #1A1A17 dark)'
  - Painter's algorithm for depth-correct bar rendering is correctly implemented
  - Value labels on all 20 bars add practical readability without cluttering the chart
  weaknesses:
  - Axis label font size (17pt) and title font size (26pt) are below the 22pt/28pt
    guidelines for pixel-based Bokeh at 4800px
  - Character-by-character vertical axis label is inelegant — a rotated Label at angle=pi/2
    would be cleaner
  - Canvas whitespace is unbalanced — significant empty area in upper-right due to
    oblique projection; x_range right bound could be tightened
  - No HoverTool on the HTML output — missed opportunity to leverage Bokeh's most
    distinctive interactive feature
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Retail Sales by Product & Quarter · bar-3d-categorical · bokeh · anyplot.ai" centered at top in dark ink (#1A1A17), readable. Product labels (Electronics, Apparel, Food & Bev, Books, Sports) in INK_SOFT at bottom, readable. Value tick labels (30/60/90/120) in INK_MUTED at left axis, readable. Quarter labels (Q1-Q4) in their respective Okabe-Ito colors on right side, readable. "Sales (K units)" spelled character-by-character vertically at left, visible but inelegant.
      Data: Q1=green (#009E73), Q2=orange (#D55E00), Q3=blue (#0072B2), Q4=pink (#CC79A7). Three-face shading (front/side/top) with darkened and lightened variants. Value labels visible on bar tops. Base-plane grid at 12% alpha.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and all text elements rendered in light ink (#F0EFE8 / #B8B7B0), clearly visible against dark background. No dark-on-dark failures detected. Quarter labels retain their Okabe-Ito series colors. Vertical axis ticks and product labels fully readable.
      Data: Colors identical to light render — Q1 green, Q2 orange, Q3 blue, Q4 mauve. Face shading consistent. No color shift between themes.
      Legibility verdict: PASS
