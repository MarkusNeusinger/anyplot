review:
  strengths:
  - Sophisticated 3D oblique projection built entirely with Bokeh's 2D patch primitives
    — genuinely impressive for a library with no native 3D support
  - Three-face bar shading (front/right/top with hex_darken/hex_lighten) creates convincing
    depth and dimension
  - 'Correct Okabe-Ito palette: Q1=#009E73 first, followed by correct order; colored
    quarter labels serve as an effective inline legend'
  - 'Proper theme-adaptive chrome: backgrounds (#FAF8F1 / #1A1A17), ink tokens, and
    border settings all correct in both renders'
  - Painter's algorithm (back-to-front rendering loop) correctly handles depth ordering
  weaknesses:
  - 'Y-axis label is broken: ''Sales (k units)'' is rendered as individual characters
    in a for-loop, producing scattered uneven vertical text that is barely readable
    — replace with a single Label(angle=pi/2) or position the full text as one Label
    rotated 90 degrees'
  - 'Missing value labels on top of bars: spec explicitly requires them for grids
    under 25 bars; this has 20 bars — add Label annotations above each bar''s top
    face'
  - 'Poor canvas utilization: chart fills roughly the left 40-45% of the 4800x2700
    canvas; right side is mostly empty — adjust x_range / layout parameters to better
    center and scale the 3D scene across the full canvas'
  - 'No hover interactivity: Bokeh is an interactive library — adding HoverTool with
    product/quarter/value data would showcase the library''s distinctive strength'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "Retail Sales by Product & Quarter · bar-3d-categorical · bokeh · anyplot.ai" visible in dark (#1A1A17) ink at top. Tick labels (30, 60, 90, 120) visible in INK_MUTED color. Product labels (Electronics, Apparel, Food & Bev, Books, Sports) clearly readable along the bottom in INK_SOFT. Quarter labels (Q1, Q2, Q3, Q4) in their respective Okabe-Ito colors on the right edge.
      Data: Q1 bars in #009E73 (green, correct first series), Q2 in #D55E00 (orange), Q3 in #0072B2 (blue), Q4 in #CC79A7 (pink). Three-face shading applied (front/right/top). All bars clearly visible.
      Issues: Y-axis label "Sales (k units)" rendered as individual stacked characters — very poor visual result. Canvas utilization ~40-45% (right side mostly empty).
      Legibility verdict: PASS (all labels readable; Y-axis label is aesthetically poor but technically present)

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title appears in light (#F0EFE8) text — clearly readable. Tick labels in INK_MUTED (#A8A79F) — light enough against dark surface. Product labels in INK_SOFT (#B8B7B0) — readable. No dark-on-dark failures observed.
      Data: Colors identical to light render — Q1 #009E73, Q2 #D55E00, Q3 #0072B2, Q4 #CC79A7. Three-face shading maintained. All bars clearly distinguishable from the dark background.
      Issues: Same Y-axis label character-stacking problem as light render. Same canvas utilization issue.
      Legibility verdict: PASS (no dark-on-dark failures; all text elements light-colored and readable)
