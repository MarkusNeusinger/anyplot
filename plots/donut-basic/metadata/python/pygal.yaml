review:
  strengths:
  - 'Perfect Imprint palette compliance — US Stocks correctly uses brand green #009E73
    as the first series, followed by lavender, blue, ochre, and red in canonical order'
  - Clever SVG injection for center metric — piggybacks on pygal's SVG render() output
    to add the donut-hole label that pygal cannot natively produce
  - 'Both themes render correctly: warm off-white #FAF8F1 background in light, warm
    near-black #1A1A17 in dark; title and legend text adapt properly to each surface'
  - 'All spec requirements met: hollow center with summary statistic ($1,000K total),
    percentage labels on each segment, legend, and realistic portfolio allocation
    domain'
  - Dynamic title font size calculation (66 * 67/len(title)) prevents overflow for
    the long mandated title
  weaknesses:
  - value_colors hardcoded to ["#F0EFE8"] * len(categories) regardless of theme —
    works in practice (near-white has contrast on all Imprint segment colors) but
    the semantic token INK should be used explicitly for dark-theme value readability
  - Regex-based SVG parsing (plot_match / slice_match) to locate donut center is brittle
    — would break silently if pygal changes its SVG structure; a safer fallback would
    use a fixed geometric center (width/2, height/2 adjusted for title area)
  - Design refinement is adequate but not exceptional — no spine removal applies to
    a pie/donut, but the surrounding white-space management and center typographic
    hierarchy could be more polished
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "Portfolio Allocation · donut-basic · python · pygal · anyplot.ai" wraps to two lines at the top, dark near-black text, fully readable. Legend at bottom shows US Stocks / Intl Stocks / Bonds / Real Estate / Cash with color swatches — all readable dark text.
      Data: Five donut segments in Imprint canonical order — US Stocks #009E73 (brand green, 45%), Intl Stocks #C475FD (lavender, 20%), Bonds #4467A3 (blue, 20%), Real Estate #BD8233 (ochre, 8%), Cash #AE3030 (matte red, 7%). Percentage labels in near-white #F0EFE8 appear inside each segment. Center hole shows "Portfolio" (muted secondary label) and "$1,000K" (bold headline, dark ink) — injected via SVG manipulation.
      Legibility verdict: PASS — all title, legend, and segment labels are clearly readable. Center metric text has good hierarchy and contrast.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black
      Chrome: Title appears in light off-white text, fully readable against the dark surface. Legend text at bottom is also light-colored and readable — no dark-on-dark issues.
      Data: Segment colors are identical to the light render (#009E73, #C475FD, #4467A3, #BD8233, #AE3030) — only chrome flips. Center "Portfolio" text appears in muted #B8B7B0 and "$1,000K" in near-white #F0EFE8 — both readable against the dark interior.
      Legibility verdict: PASS — all text is readable against the dark background. No dark-on-dark failures. Brand green #009E73 remains clearly visible.
