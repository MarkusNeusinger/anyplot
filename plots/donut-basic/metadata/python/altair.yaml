review:
  strengths:
  - 'Correct Imprint palette (positions 1–5) applied in canonical order with Engineering
    at #009E73 first'
  - 'All spec requirements met: ring format, center key metric, percentage labels
    on segments, thick ring width, category legend'
  - Theme-adaptive chrome correct in both renders — INK token used for center text,
    ELEVATED_BG and INK_SOFT for legend box
  - Emphasis arc for the dominant Engineering segment (outerRadius=218 vs 200) creates
    clear focal point without clutter
  - Altair-idiomatic interactive hover (alt.selection_point + alt.condition) dims
    non-hovered segments — clean storytelling technique
  - Center text TWO-line layout using Y encoding hack positions Total budget + dollar
    amount correctly in the donut hole
  - Deterministic hardcoded data with realistic budget-allocation scenario (Engineering/Marketing/Operations/Sales/Support)
  weaknesses:
  - arc_emphasis layer (Engineering emphasis ring at outerRadius=218) does not include
    add_params(highlight) or alt.condition for hover opacity — the emphasis ring will
    not dim when hovering on other segments in the HTML interactive version, creating
    a subtle inconsistency
  - The hover selection (alt.selection_point with empty=False) means all segments
    are fully opaque at rest and dim only on hover; this design choice is valid but
    the arc_emphasis inconsistency means the Engineering outer extension glows while
    the rest dim — consider either removing arc_emphasis or adding the same highlight
    condition to it
  - No minor complaints about visual quality or palette compliance — implementation
    is clean
