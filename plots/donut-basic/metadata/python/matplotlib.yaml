review:
  strengths:
  - Correct donut chart with hollow center via wedgeprops width=0.42
  - Center metric with 'Total budget' subtitle, thin divider rule, and bold $1,025K
    total is an elegant design touch
  - Value-enriched legend (category + $ amount) adds context without cluttering the
    chart
  - Slight explode on dominant Engineering segment creates clear visual focal point
  - 'Imprint palette in canonical order starting with brand green #009E73'
  - Both light (#FAF8F1) and dark (#1A1A17) themes render correctly with all chrome
    adapting
  - Percentage labels in fixed off-white (#F0EFE8) provide consistent contrast on
    colored wedges in both themes
  - Realistic budget allocation scenario with believable proportions for a mid-sized
    company
  - Clean KISS code structure with no functions/classes, deterministic hardcoded data
  - Square 2400x2400 canvas is the correct choice for a symmetric circular plot
  weaknesses:
  - Percentage labels at fontsize=7.5pt (~42px) are on the small side for mobile readability
    — the smallest segment (Support 5.4%) label could be hard to read at 400px mobile
    width; consider increasing to 8.5-9pt
  - plt.setp() is slightly non-idiomatic in a matplotlib axes-based code style — prefer
    leg.get_texts() iteration or a direct set call
  - 'DE-02 refinement: the ax.set_aspect(''equal'') call is correct but the implementation
    lacks any grid removal call or spine visibility override (not needed for pie charts
    where matplotlib auto-removes, but explicit is clearer)'
