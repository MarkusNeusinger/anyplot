    which has no native pie/donut geom
  - Center "$1,025K / Total Budget" creates a strong focal point and satisfies the
    hollow-center requirement
  weaknesses:
  - 'Percentage labels and category labels overlap on horizontally-crowded segments:
    the right-side Engineering segment shows "46.8%" bleeding into "Engineering",
    and the left-side Operations segment shows "15.1%" overlapping "Operations" —
    increase PCT_R inward and/or LABEL_R outward to add separation, or rotate/offset
    specific labels'
  - LABEL_R=1.22 places category labels near the x-axis limit of 1.50, leaving little
    breathing room for the right-side Engineering label — consider LABEL_R=1.30 to
    push labels further from the ring
  - 'Minor: the Support segment (5.4%) is small enough that the white "5.4%" label
    inside the thin arc is cramped — consider moving it outside or using a leader
    line for segments under ~8%'
