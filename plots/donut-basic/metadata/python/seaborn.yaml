  weaknesses:
  - 'DE-01 (5/8): Center metric area lacks visual containment — the "Total Budget"
    label, separator line, and dollar amount float without an enclosing element (e.g.,
    a subtle circle or card). The explode offset (0.07) creates a small gap in the
    ring that makes the composition look slightly disjointed.'
  - 'DE-02 (4/6): No subtle elevation treatment on the center text area; the ring
    sits slightly low in the square canvas relative to the title weight — adjust subplots_adjust
    and xlim/ylim to better balance.'
  - 'DE-03 (4/6): The storytelling relies on segment size alone. A single direct label
    or brief annotation noting Engineering + Sales account for >60% of budget would
    strengthen the narrative.'
  - 'LM-02 (2/5): Seaborn used only for styling — structural limit of the chart type,
    but seaborn utilities (despine, etc.) could be used more aggressively to demonstrate
    library awareness.'
