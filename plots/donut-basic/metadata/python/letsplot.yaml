    Dark render (plot-dark.png):
      Background: Near-black approximately #1A1A17 — correct for dark theme
      Chrome: Title in light/white text, readable. Legend text in light color, readable. Center label adapts (dark box, white text). No dark-on-dark failures in the rendered image.
      Data: Identical segment colors to light render — data colors preserved correctly across themes.
      Legibility verdict: PASS for the rendered images. However, the current code does NOT implement ANYPLOT_THEME handling — if the code were actually run for dark theme, it would fail: fill='white' hardcoded in geom_label, no plot_background set, no INK/INK_SOFT tokens applied to legend/title text. The images shown are stale from a prior run with different (better) code.
