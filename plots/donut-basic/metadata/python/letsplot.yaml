review:
  strengths:
  - Correct donut via geom_pie(hole=0.5) — uses the native lets-plot pie/donut API
    properly
  - layer_labels().line().format().size() chain is the idiomatic lets-plot label API
    for segment percentages
  - Center label with total budget value adds good data storytelling
  - theme_void() is the right choice for a clean donut chart with no axes needed
  - Clean KISS code structure; static deterministic data; categorical ordering handled
    correctly
  weaknesses:
  - 'CRITICAL: Non-Okabe-Ito palette — first color is Python Blue #306998 instead
    of #009E73; must use OKABE_ITO = [''#009E73'', ''#D55E00'', ''#0072B2'', ''#CC79A7'',
    ''#E69F00'']'
  - 'CRITICAL: No ANYPLOT_THEME environment variable handling — no os.getenv, no PAGE_BG/INK/INK_SOFT
    tokens, no plot_background set; dark render would be broken'
  - 'CRITICAL: Center label uses hardcoded fill=''white'' — must adapt to ELEVATED_BG
    token for dark theme'
  - 'CRITICAL: Output files saved as plot.png / plot.html instead of plot-{THEME}.png
    / plot-{THEME}.html'
  - Title contains 'pyplots.ai' instead of 'anyplot.ai'
  - Canvas utilization low — donut is relatively small in the 16:9 canvas; consider
    square canvas (ggsize(1200,1200) scale=3) for better proportions
  - 5.4% segment label uses leader line rather than fitting inside the segment
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct for light theme
      Chrome: Title "donut-basic · letsplot · anyplot.ai" in dark text, clearly readable. Legend "Department" header and labels in dark text, readable. No axis labels (theme_void). Center "Total budget $1,025K" in dark text on white box.
