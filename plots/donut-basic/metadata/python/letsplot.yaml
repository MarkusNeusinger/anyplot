review:
  strengths:
  - 'Full theme-adaptive chrome: all non-data elements (title, legend, center callout)
    correctly flip between light and dark backgrounds using INK/INK_SOFT tokens.'
  - Center callout box ('Total $100M') makes excellent use of the donut's hollow center
    as specified, adding data storytelling value.
  - 'Perfect spec compliance: all required features (hole, percentage labels, center
    metric, proper title format) are present.'
  - Clean code structure with idiomatic lets-plot patterns (layer_labels(), geom_pie,
    theme_void).
  - 'Okabe-Ito palette applied correctly with #009E73 as the first segment (Marketing).'
  weaknesses:
  - 'Canvas utilization: the donut occupies only ~50% of the vertical canvas height
    in the 1200x1200 frame, leaving excessive blank space above and below. Increase
    geom_pie(size=...) or reduce padding.'
  - 'No segment separation (gap): adding a thin white or background-colored border
    between segments would improve readability, especially between similarly-sized
    slices.'
  - HR segment (7%) is small enough that the 7.0% label is slightly cramped — consider
    adjusting label placement or using expanded labels for small segments.
  - 'Design lacks a focal/emphasis element: the largest segment (Marketing, 28%) is
    not visually distinguished beyond its color. An annotation callout or slight visual
    emphasis would elevate storytelling.'
  image_description: |-
