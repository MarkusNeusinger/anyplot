      Data: Five segments — Marketing (#009E73, 28%), Operations (#D55E00, 22%), R&D (#0072B2, 25%), Sales (#CC79A7, 18%), HR (#E69F00, 7%). Percentage labels in white on colored segments. First series is #009E73.
