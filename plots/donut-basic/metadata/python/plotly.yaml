review:
  strengths:
  - Three-level center annotation (header / bold total / fiscal year) is an excellent
    use of the donut's hollow center — exactly what the spec asks for, implemented
    elegantly
  - Theme-adaptive separator lines (using PAGE_BG as the segment border color) create
    a seamless, polished look in both themes with no harsh outlines
  - Engineering segment pull effect (5%) is a subtle but effective way to emphasize
    the dominant category without being distracting
  - Full spectrum of Plotly interactivity (hovertemplate, HTML export) used correctly
    alongside static PNG export
  - Perfect spec compliance and data quality — realistic FY2026 budget context, all
    required donut features delivered
  weaknesses:
  - The Marketing segment label ('Marketing / 14%') appears very close to the title
    text at the top of the canvas due to the large hole=0.58 donut leaving the top
    arc close to the title — increase top margin (t=80→120) or reduce hole from 0.58
    to 0.50 to create more breathing room
  - The upper external labels (Marketing, Operations, R&D, G&A) are clustered in the
    upper half while the lower half has only Engineering and Sales — the asymmetric
    label distribution creates visual crowding in the upper-right quadrant
