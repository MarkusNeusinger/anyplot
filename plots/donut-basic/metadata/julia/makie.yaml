review:
  strengths:
  - 'Perfect spec compliance: donut ring chart with center annotation ($4.8M Total
    Budget), percentage labels on all significant segments (correctly omitting the
    6% Support slice below the 7% threshold), 6 categories in consistent clockwise
    order'
  - 'Correct Imprint palette in canonical order (first series #009E73 for Software)
    with fully theme-adaptive chrome — background, title, legend label, and center
    text tokens all flip correctly between light (#FAF8F1) and dark (#1A1A17) renders,
    no dark-on-dark issues'
  - 'Clean code structure: explicit font sizes throughout (titlesize=20, segment labels
    16, center $4.8M at 24, Total Budget at 13, legend labelsize=14), Random.seed!(42)
    set, all imports used, KISS flat structure with no functions or classes'
  - 'Good Makie layout system usage: colsize!(fig.layout, 1, Relative(0.72)) and colgap!
    provide a well-balanced donut/legend split; DataAspect() ensures perfect circular
    proportions in the square 2400x2400 canvas'
  - Segment gap stroke (strokecolor=PAGE_BG, strokewidth=3.0) provides clean visual
    separation between slices without jarring hard borders
  weaknesses:
  - 'DE-01 (4/8): Design lacks differentiation — no descriptive title prefix (e.g.,
    ''R&D Budget Allocation · donut-basic · julia · makie · anyplot.ai''), no emphasis
    on the dominant Software segment (e.g., bold percentage label, a subtle radial
    callout line, or slightly thickened outer stroke on the largest segment). The
    chart is correct and clean but not visually memorable.'
  - 'DE-02 (4/6): Legend frame (framevisible=true) adds subtle visual clutter on a
    minimalist donut chart — consider framevisible=false for a cleaner look consistent
    with the hidden spines and decorations. The outer empty corners of the square
    canvas are somewhat underused.'
  - 'VQ-01 (7/8): Title ''donut-basic · julia · makie · anyplot.ai'' at titlesize=20
    spans approximately 50% of canvas width — at the lower bound of the 50-70% guideline
    for a 2400x2400 canvas. Increasing titlesize from 20 to 24 would give it better
    visual presence.'
  - 'DE-03 (4/6): No explicit emphasis or annotation highlights the data insight —
    the dominant 34% Software segment is visible by natural size but a callout annotation
    (e.g., a small leader line from the green segment) or bolded percentage label
    would guide the reader more deliberately to the key finding.'
