  - Correct Imprint palette positions 1-6 in canonical order with brand green (#009E73)
    as the first series for Software
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT tokens correctly flip between
    light (#FAF8F1) and dark (#1A1A17) renders'
