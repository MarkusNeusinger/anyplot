    for segment dividers, frame-free legend with PolyElement swatches'
  - Realistic and neutral R&D budget allocation dataset with plausible department
    breakdown
  weaknesses:
  - Title fontsize (16pt → 32px effective on 2400×2400 canvas) is at the lower end;
    consider increasing to 18–20pt for better visual authority on the square canvas
  - The smallest segment (Support, 6%) is unlabeled due to the threshold filter —
    consider adding a small callout line or reducing the threshold to 0.05 to include
    it, otherwise the segment appears mysterious in the ring
  - Percentage labels use hardcoded pure-white `RGBf(1.0, 1.0, 1.0)` rather than a
    theme token — works here because all Imprint palette colors are dark enough, but
    consider using a luminance-adaptive approach for robustness
  - Moderate vertical whitespace above and below the donut in the square canvas —
    axis limits of ±1.35 with outer radius 1.0 leave 26% padding; could tighten to
    ±1.25 to better fill the canvas
