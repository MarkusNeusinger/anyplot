review:
  strengths:
  - Correct Imprint palette with brand green (#009E73) as first series (Equities)
    and correct canonical order for all 5 categories
  - Excellent use of center overlay with $500M total assets metric — fulfills spec
    requirement for center space information
  - Per-segment arc label fills with WCAG contrast optimization (dark text on light
    segments, white text on dark segments) is thoughtful accessibility work
  - Square canvas orientation correctly chosen for donut chart; ring proportions (innerRadius
    180, outerRadius 360) provide thick, readable ring
  - Both light and dark themes render correctly — data colors identical, chrome flips
    appropriately, no dark-on-dark failures
  - Clean, idiomatic MUI X PieChart usage with arcLabel, arcLabelMinAngle, slotProps.legend,
    and skipAnimation
  weaknesses:
  - Design Excellence could be elevated further — consider a slight drop-shadow or
    glow on the dominant Equities segment to visually emphasize the largest allocation,
    creating stronger data storytelling
  - LM-02 could be improved by using MUI X-specific slot customization (e.g., custom
    arc label component via slots.pieArcLabel) rather than generic CSS nth-child selectors
    for per-segment label styling
  - The title fontsize (22px CSS) occupies roughly 50% of the square canvas width
    which is proportionally appropriate, but a slightly bolder weight would improve
    desktop readability
