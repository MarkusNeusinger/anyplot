review:
  strengths:
  - Dynamic labelColor() function computes luminance contrast for each segment fill,
    ensuring readable percentage labels across both light and dark themes.
  - Center annotation ($2.4M) correctly implements the spec requirement to use hollow
    center for a key metric, with a secondary label for context.
  - 'Perfect Imprint palette compliance: first series is brand green, canonical order
    through position 6, theme-adaptive chrome via token system.'
  - Square canvas chosen correctly for a symmetric plot type; donut proportions and
    whitespace are well-balanced.
  - Fully deterministic data (hardcoded), correct canvas dimensions, appropriate D3
    idioms throughout.
  weaknesses:
  - Small segment labels at 13px (for segments < 10%) fall just below the style guide
    14px minimum for the square canvas; use Math.max(14, ...) or set a 14px floor
    for all percentage labels.
  - The labelColor() helper function breaks KISS structure; inline the luminance logic
    as an IIFE or replace with a simpler threshold expression.
  - 'DE-01 headroom: the dominant segment (Product Dev, 34%) could be visually differentiated
    with a slightly larger outer radius or bolder percentage label weight to create
    more explicit visual hierarchy.'
