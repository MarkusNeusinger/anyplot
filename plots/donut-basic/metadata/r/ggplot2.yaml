review:
  strengths:
  - 'Perfect Imprint palette adherence: canonical order positions 1-6, theme-correct
    backgrounds (#FAF8F1 light / #1A1A17 dark) in both renders'
  - Clever and correct label-positioning algorithm using reversed factor levels +
    cumsum to align percentage labels with donut segments
  - Center annotation ($10.0M Total Budget) fulfills the spec requirement and creates
    a strong visual focal point
  - 'Full spec compliance: all required donut features (hollow center, percent labels,
    thick ring, legend with Department header) implemented'
  - Clean, readable code with no unnecessary abstractions; set.seed(42) for reproducibility;
    elegant flat script structure
  weaknesses:
  - Title is visually left-of-center on the full canvas because ggplot2 centers the
    title over the plot panel area, not the full figure width; adding plot.title.position
    = 'plot' to the theme() call would center it over the full 2400x2400 canvas
  - IMPRINT_PALETTE only defines 6 of 8 Imprint colors — harmless for 6-category data
    but the full 8-color definition is preferred for consistency with the library
    guide
  - Legend lacks a defining border in dark mode (color = NA makes it blend with the
    near-black background); a subtle stroke with color = INK_SOFT and linewidth =
    0.3 on the legend.background element_rect would add clear separation
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white.
      Chrome: Title "donut-basic · r · ggplot2 · anyplot.ai" in dark near-black ink, fully readable. No axis labels (theme_void appropriate). Legend labeled "Department" with light soft ink text on FFFDF6 elevated background.
      Data: 6 donut segments in Imprint canonical order: Technology (#009E73 green, 28%), Operations (#C475FD lavender, 22%), Marketing (#4467A3 blue, 19%), Finance (#BD8233 ochre, 13%), HR (#AE3030 matte red, 11%), R&D (#2ABCCD cyan, 7%). Bold white percentage labels on each segment. Center annotation "$10.0M / Total Budget" in bold dark ink.
      Legibility verdict: PASS — all text clearly readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in light cream text (#F0EFE8 INK token), fully readable against dark background. Center annotation "$10.0M Total Budget" adapts to white — no dark-on-dark issue. Legend text in soft light ink (#B8B7B0 INK_SOFT) on elevated dark (#242420) background.
      Data: All 6 segment colors are identical to light render (Imprint palette is theme-invariant). White percentage labels remain white and readable on all segments. Brand green #009E73 (Technology) is clearly visible on dark background.
      Legibility verdict: PASS — no dark-on-dark failures; all text readable against dark background.
