review:
  strengths:
  - Correct donut chart implementation using ggplot2's coord_polar with proper hollow
    center via scale_x_continuous limits
  - Full Imprint palette applied in canonical order (Technology=green, Operations=lavender,
    Marketing=blue, etc.)
  - Center annotation '$10.0M Total Budget' satisfies the spec requirement for summary
    info in the center hole
  - Both light (#FAF8F1) and dark (#1A1A17) backgrounds are correct theme-adaptive
    tokens — chrome flips correctly
  - Accurate label midpoint computation accounting for geom_col reverse stacking order
    ensures percentage labels land in their segments
  - theme_void() removes all chart chrome appropriately for a donut chart
  - Square canvas (2400×2400) is the right choice for a symmetric circular chart
  weaknesses:
  - The 7% R&D cyan segment is small and its label is slightly cramped — consider
    reducing font size slightly for that label or ensuring geom_text size is calibrated
    so small segments don't get clipped text
  - Design excellence is functional but not particularly elevated — no additional
    visual hierarchy, emphasis, or annotation beyond the basic donut format; segment
    labels are plain white text without any subtle styling differentiation
  - Legend is boxed with a border (legend.background rect), which is acceptable but
    slightly old-fashioned — a subtler or no-border legend would refine the look further
  - Title at size=12 centered on the plot appears somewhat small relative to the canvas
    area — it fills roughly 40-45% of the width rather than the expected 50-70%
