  strengths:
  - Perfect spec compliance — all required Pareto features implemented correctly
  - Realistic manufacturing defect data that naturally demonstrates the 80/20 principle
  - Creative SVG post-processing to achieve dual-axis functionality that pygal does
    not natively support
  - Good custom legend explaining all three visual elements
  - Data storytelling through the natural visual hierarchy of the Pareto chart
  weaknesses:
  - Cumulative percentage labels overlap with bars and the 80% threshold line in several
    places
  - Library mastery is low — most of the visualization is raw SVG rather than pygal
    API
  - The first 30% label is partially obscured near the left edge of the first bar
  - No units on axis labels
  - Blue-red color pairing could be improved for accessibility
  image_description: 'The plot shows a Pareto chart with 8 steel-blue bars sorted
    in descending order representing manufacturing defect types: Scratches (142),
    Dents (98), Misalignment (84), Cracks (56), Discoloration (42), Warping (31),
    Contamination (18), and Burrs (9). A red cumulative percentage line with circular
    markers runs from bottom-left (~30%) to top-right (100%), with percentage labels
    at each point. A gray dashed horizontal line marks the 80% threshold, intersecting
    the cumulative line between the 4th and 5th bars. The primary y-axis shows "Frequency"
    (0-140), and a red secondary y-axis on the right shows "Cumulative %" (0-100%).
    X-axis labels are slightly rotated. A custom legend at the bottom identifies "Defect
    Count" (blue square), "Cumulative %" (red line with dot), and "80% Threshold"
    (gray dashed line). The title reads "bar-pareto · pygal · pyplots.ai". White background
    throughout.'
