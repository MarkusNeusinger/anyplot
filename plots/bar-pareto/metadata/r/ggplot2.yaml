    scales::comma for tick formatting'
  - Data distribution strongly demonstrates the Pareto principle (top 2 categories
    = ~80% of defects)
  weaknesses:
  - No legend explaining the three visual elements (green bars = defect count, blue
    line = cumulative %, amber dashed = 80% threshold) — a multi-element chart with
    no legend reduces clarity
