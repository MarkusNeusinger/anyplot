  - 'Color-coded right y-axis label and tick marks in Imprint blue #4467A3 matching
    the cumulative line — sophisticated and intentional'
  - 'All required Pareto features implemented: descending bars, dual y-axes via sec_axis(),
    cumulative line with markers, 80% amber dashed reference line'
