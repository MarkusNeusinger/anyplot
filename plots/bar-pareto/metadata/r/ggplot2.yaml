    L-frame (remove top and right spines) — full box frame is slightly heavier than
    the anyplot minimalism standard
  - 'Right y-axis percentage tick labels use Imprint blue #4467A3 which has borderline
    contrast (~3:1) against dark background #1A1A17 — consider using INK_SOFT (#B8B7B0)
    for the tick labels in dark mode while keeping the axis title in blue'
