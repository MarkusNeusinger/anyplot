    for cumulative line, matte red (#AE3030) for threshold — semantically appropriate
    and CVD-safe'
  weaknesses:
  - Primary Y-axis auto-scales to max count (~350) instead of total (1330) — in the
    canonical Pareto convention ylims!(ax1, 0, total) ensures cumulative % markers
    visually sit at each bar top; currently the first marker is at ~23% height while
    the first bar extends to ~97%, breaking the visual alignment story
  - Annotation text 'Top 5 of 7 categories' uses fontsize=11 (effective 22pt on 3200px
    canvas) — slightly small when scaled to mobile widths (~400px); increase to fontsize=13
    for better mobile legibility
  - Diamond crossing-point marker (markersize=14) is subtle relative to the plot;
    slightly larger or a brief highlight stroke would improve visual prominence of
    this key Pareto insight
