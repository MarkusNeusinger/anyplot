      Background: Warm off-white consistent with #FAF8F1 — correct anyplot surface color, not pure white.
      Chrome: Title "bar-pareto · javascript · highcharts · anyplot.ai" in dark ink at 22px is bold and clearly readable. Left y-axis title "Defect Count" and right y-axis title "Cumulative Percentage (%)" both in soft-ink at 16px are readable. X-axis category tick labels (Scratches, Dents, Cracks, Misalignment, Discoloration, Blistering, Warping, Contamination) at 14px are clearly legible. Numeric tick labels on both y-axes at 14px are readable. Legend ("Defect Count", "Cumulative %") at bottom center is readable.
      Data: Eight descending green bars (#009E73, palette[0]) dominate the left portion. The blue cumulative line (#4467A3, palette[2]) rises from ~33% at Scratches through to 100% at Contamination, with filled circle markers at each data point. An amber dashed reference line (#DDCC77) is drawn at the 80% mark on the right axis, labeled "80% threshold" in amber text at the right margin — crossing approximately between the Misalignment and Discoloration bars.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background with no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct dark surface, not pure black.
      Chrome: Title in light ink is clearly readable. Left and right y-axis titles in soft-light ink are readable. X-axis and y-axis tick labels in soft-light ink are clearly visible against the dark background — no dark-on-dark failures observed. Legend text is readable. The amber 80% threshold label is clearly visible against the dark background.
      Data: Brand green bars (#009E73) are identical in color to the light render — data colors unchanged between themes. The blue cumulative line (#4467A3) is identical to the light render. The amber threshold line remains the same. Only chrome elements (backgrounds, tick labels, axis labels, title) have adapted to the dark theme.
      Legibility verdict: PASS — all text is clearly readable against the warm near-black background; no dark-on-dark failures detected.
