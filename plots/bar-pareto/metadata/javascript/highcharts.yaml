review:
  strengths:
  - 'Perfect spec compliance — all Pareto chart requirements implemented correctly:
    descending bars, cumulative percentage line on dual y-axis (0–100%), and the 80%
    threshold reference line'
  - Semantically correct use of the amber anchor (#DDCC77) for the 80% threshold plotLine
    — a warning/caution role that the style guide explicitly maps to amber
  - 'Clean, readable data computation: hard-coded deterministic manufacturing defect
    data, correctly sorted descending, with an efficient running cumulative-sum'
  - 'Idiomatic Highcharts dual-axis configuration: plotLines for the threshold line,
    per-axis grid control (secondary axis grid hidden to reduce clutter), and correct
    animation: false in both positions'
  - Theme adaptation is thorough — transparent background, all chrome tokens (t.ink,
    t.inkSoft, t.grid) applied to title, axis labels, tick labels, and legend in both
    light and dark renders
  weaknesses:
  - 'Palette ordering violation: the cumulative % line uses t.palette[2] (#4467A3,
    blue) instead of t.palette[1] (#C475FD, lavender) — canonical rule is positions
    1→N in order; palette[1] is skipped without a semantic reason'
  - 'Top and right chart spines (frame box) are visible in both renders — style guide
    default is to remove top and right spines (L-shaped frame). Highcharts does not
    auto-remove these; set xAxis.lineWidth: 0 / yAxis[0].lineWidth: 0 and remove via
    chart styling or plotOptions to achieve L-shaped look'
  - 'Design Excellence is competent but generic: no visual hierarchy emphasis beyond
    color (no size variation, no direct data labels on the 80% crossing bar, no annotation
    calling out which categories fall below the 80% threshold)'
  - The 80% threshold label font size (12px) is smaller than tick labels (14px) —
    slight typographic inconsistency; aligning it to 13–14px would be more polished
  image_description: |-
