review:
  strengths:
  - 'Correct Imprint palette: brand green (#009E73) bars, lavender cumulative line,
    amber threshold — all from window.ANYPLOT_TOKENS'
  - 'Both themes render with correct backgrounds (#FAF8F1 light / #1A1A17 dark) and
    theme-adaptive chrome (t.ink/t.inkSoft) — no dark-on-dark failures'
  - Sophisticated use of ChartContainer + useXScale/useYScale hooks — correct architectural
    approach for dual-axis custom overlay in MUI X
  - ChartsReferenceLine with amber semantic anchor for the 80% threshold is semantically
    correct and visually distinct
  - 'Excellent code quality: deterministic hardcoded data, clean imports, proper skipAnimation,
    community-only @mui/x-charts API, correct export default'
  weaknesses:
  - 'CRITICAL: Cumulative percentage line renders near y=0 in both themes — dots appear
    at approximately y=0-10 on the primary count scale instead of rising from 145.8
    (31.7%) to 460 (100%). The useYScale(''counts'') coordinate output does not align
    with the SVG coordinate space as expected. Fix: convert the CumulativeLine custom
    SVG component to a native MUI X line series in the ChartContainer series prop:
    { type: ''line'', id: ''cum-line'', yAxisId: ''counts'', data: scaledCum, color:
    t.palette[1], showMark: true }. Remove the CumulativeLine component entirely so
    MUI X handles coordinate placement automatically.'
  - 'Right y-axis tick labels display a ''~'' prefix (e.g. ''~100%'', ''~80%'') instead
    of clean percentage labels. Fix: remove the tickInterval array [0, 92, 184, 276,
    368, 460] and instead use tickMinStep: 92, or let MUI X auto-generate ticks with
    the valueFormatter applied.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "bar-pareto · javascript · muix · anyplot.ai" in dark ink, centered, readable. Left y-axis label "Defect Count" and x-axis label "Defect Type" in dark ink. Right y-axis label "Cumulative %" in dark ink. Tick labels in inkSoft (muted dark). Right y-axis tick labels show "~" prefix (e.g. "~100%", "~80%") — looks non-standard.
      Data: Eight descending green bars (#009E73) from Scratches (412) to Surf. Flaw (32). Amber dashed 80% reference line visible at y≈368 on primary scale. Cumulative percentage line (lavender #C475FD) rendered near y=0-10 on the primary count scale — BROKEN: dots appear at chart bottom instead of rising from ~32% to 100%. Legend at bottom shows three items with correct color swatches.
      Legibility verdict: PASS for chrome (all text readable). FAIL for data element (cumulative line at wrong y-coordinates — functionally invisible as meaningful data).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title and all axis/tick labels rendered in light-colored ink (t.ink = #F0EFE8 in dark mode). No dark-on-dark text failures observed. All labels clearly readable against dark background.
      Data: Identical data colors to light render — bars remain #009E73 (brand green), cumulative line attempts lavender, threshold uses amber. Same cumulative line positioning bug: dots near y=0 instead of at cumulative percentage heights. Legend visible at bottom.
      Legibility verdict: PASS for chrome (no dark-on-dark failures). FAIL for data element (same broken cumulative line rendering as light render).
