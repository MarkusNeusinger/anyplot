review:
  strengths:
  - 'Perfect Imprint palette compliance: brand green bars, lavender cumulative line,
    amber reference line, correct theme backgrounds in both renders'
  - Clever COUNT_MAX=500 tick alignment ensures left-axis intervals (100,200,300,400,500)
    align perfectly with right-axis % intervals (20,40,60,80,100)
  - Custom ChartContainer composition with BarPlot+LinePlot+ChartsReferenceLine demonstrates
    idiomatic MUI X multi-series dual-axis approach
  - 'All spec requirements met: descending bars, cumulative % on secondary y-axis,
    80% reference line, markers at bar centers'
  - Custom legend and title layout (separate Box components) avoids MUI's default
    chrome and gives clean visual structure
  - Both light and dark themes render correctly with readable text and consistent
    data colors
  - Manufacturing QC defect data is realistic, neutral, and shows clear Pareto distribution
    with 80% threshold landing exactly at 4th category
  weaknesses:
  - 'DE-01 (5/8): Design is above defaults but not yet publication-ready — missing
    annotation labeling which categories comprise the critical 80% (e.g. a bracket
    or text callout ''Top 4 types = 80% of defects'')'
  - 'DE-02 (4/6): Visual refinement is good but not perfect — the right y-axis label
    ''Cumulative %'' is small and rotated, could benefit from a non-rotated label
    or slightly larger font in labelStyle'
  - 'DE-03 (4/6): Pareto story is clear via the reference line, but no visual emphasis
    distinguishes the categories above vs below the 80% threshold (e.g., bars above
    threshold could be slightly differentiated through opacity or annotation)'
  - 'VQ-01 (7/8): Title is readable but could use slightly larger font (currently
    22px CSS) for better presence; line mark circles are small at the 3200x1800 resolution'
  - 'LM-02 (3/5): Could leverage more distinctive MUI X features like slotProps.mark
    for larger/custom markers or ChartsLegend slot customization rather than the manual
    Box-based legend'
  image_description: |-
