  - 'Strong data storytelling: amber 80% threshold line creates a clear focal point,
    viewer immediately identifies dominant defect categories'
  weaknesses:
  - 'Chart area axis borders not removed — Chart.js v4 renders visible borders on
    all four sides of the chart area by default; add `border: { display: false }`
    to each scale (x, y, y2) to strip the box frame and achieve a cleaner L-shaped
    or frameless look'
  - 'X-axis vertical grid lines are visible alongside horizontal grid lines — for
    a categorical bar chart the x-axis grid adds visual noise without information
    gain; set `scales.x.grid.display: false` to show only horizontal y-axis gridlines'
  - 'No explicit layout padding customization — adding `layout: { padding: { top:
    10, bottom: 10, left: 10, right: 20 } }` would give the chart area more breathing
    room and improve visual refinement'
