      Data: Green bars (#009E73) are identical to light render — brand green remains high-contrast on dark background. Lavender cumulative line (#C475FD) is identical. Amber threshold (#DDCC77) dashed line is identical. Point halo effect (pointBorderColor: pageBg) uses the dark pageBg (#1A1A17) for outlines — this still works as the points are on the line, not on the dark background directly.
