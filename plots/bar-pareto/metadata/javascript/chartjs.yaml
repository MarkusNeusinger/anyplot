review:
  strengths:
  - 'Perfect spec compliance: sorted bars, cumulative line on secondary y-axis, 80%
    threshold line, and markers at bar centers all implemented correctly'
  - 'Correct Imprint palette usage: bars use #009E73 (brand green), cumulative line
    uses palette[1] (#C475FD lavender), 80% threshold uses amber (#DDCC77) as a semantic
    warning anchor'
  - Dynamic title font sizing formula (22 * 67 / len(title)) correctly handles the
    extended descriptive title prefix without overflow
  - Background fill plugin using beforeDraw is the idiomatic Chart.js pattern and
    correctly applies pageBg for both light (#FAF8F1) and dark (#1A1A17) themes
  - 'Point markers on cumulative line use pointBorderColor: t.pageBg creating a professional
    halo/outline effect that works in both themes'
  - 'Dual-axis implementation is correct: yAxisID system, drawOnChartArea: false on
    right axis prevents double-gridding, order property ensures bars render behind
    line'
  - Realistic manufacturing defect data with 9 categories exhibiting a genuine Pareto
    distribution — data is neutral, plausible, and instructive
  - All chart chrome (title, axis labels, tick labels, legend) uses theme-adaptive
    tokens (t.ink, t.inkSoft) correctly, passing readability in both light and dark
    renders
  weaknesses:
  - X-axis tick labels use font size 13px (CSS) — slightly smaller than the 14px used
    for Y-axis ticks, creating a minor imbalance; bumping to 14px would give better
    balance and improve mobile readability when scaled to ~400px
  - 'Design Excellence is adequate but not distinguished: no additional visual emphasis
    highlights the ''vital few'' categories (e.g., the first 2-3 bars that cross the
    80% threshold could use a subtle opacity boost or stroke to draw the viewer''s
    eye to the key Pareto insight)'
  - DE-02 refinements are present (no x-grid, no axis borders) but the overall visual
    treatment remains close to a well-configured default; more deliberate whitespace
    and padding choices could push it further
