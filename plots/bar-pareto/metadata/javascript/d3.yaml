review:
  strengths:
  - 'Correct Pareto chart: bars sorted descending, cumulative % line with markers
    at bar centers, amber 80% threshold reference line — all spec requirements met'
  - 'Imprint palette applied idiomatically: bars use palette[0] (#009E73), 80% threshold
    uses amber token — no custom hexes'
  - 'Dual-axis layout well-executed: left axis (raw count), right axis (0–100%) with
    correct D3 axisRight, both styled with theme-adaptive inkSoft tokens'
  - 'Full theme-adaptive chrome: pageBg, ink, inkSoft, grid tokens used throughout;
    both light (#FAF8F1) and dark (#1A1A17) backgrounds render correctly with readable
    text'
  - E-commerce complaint data is realistic, plausible, and neutral with realistic
    power-law distribution (312 down to 18)
  - 'Idiomatic D3 usage: d3.scaleBand, d3.line with .datum(), .join(), d3.format('',''),
    d3.axisRight — modern D3 v5+ patterns throughout'
  - 'Subtle grid (stroke-opacity: 0.15) and pageBg stroke on cumulative dot markers
    show deliberate visual polish'
  weaknesses:
  - 'Palette canonical order violated: cumulative line uses palette[2] (#4467A3, blue)
    instead of palette[1] (#C475FD, lavender) — no semantic cue justifies skipping
    position 1; use t.palette[1] for the second data series'
  - Legend text at 13px is just below the recommended 14px minimum for D3 at 3200px
    canvas; increase legend font-size to 14px for better mobile readability
  - No visual differentiation between 'vital few' bars (below 80% threshold) and 'trivial
    many' bars (above 80%) — adding reduced opacity or a subtle color shift on post-threshold
    bars would strengthen data storytelling
  - Axis domain lines (spines) are retained on all three axes; for a Pareto chart
    with dual y-axes the right axis and bottom axis are structural and should stay,
    but the left domain line could optionally be removed for a cleaner look
