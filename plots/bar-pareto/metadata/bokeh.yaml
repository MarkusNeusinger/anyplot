  image_description: The plot displays a Pareto chart of manufacturing defect types.
    Ten blue bars are sorted in descending order from "Scratches" (~187) on the left
    to "Porosity" (~7) on the right. The bars use a steel blue color (#306998) with
    white edge lines. An orange cumulative percentage line with circle markers overlays
    the bars, rising from ~28% at Scratches to 100% at Porosity, plotted against a
    secondary y-axis (0-100%) on the right. A horizontal dashed gray/orange line marks
    the 80% threshold at approximately the "Cracks" bar. The left y-axis shows "Frequency"
    (0-200+), the x-axis shows "Defect Type" with slightly rotated labels, and the
    title reads "bar-pareto · bokeh · pyplots.ai" centered at top. The background
    is white with subtle horizontal grid lines. The first five bars appear in a deeper
    blue shade while the remaining bars appear lighter, and a small legend in the
    upper-left identifies "Frequency (vital few)" and "Cumulative %".
