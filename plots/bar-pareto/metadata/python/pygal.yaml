    for a warning/boundary marker'
  - Realistic, neutral manufacturing defect dataset with proper Pareto distribution
  - Both light and dark renders are theme-correct with no dark-on-dark failures
  - Creative use of pygal SVG output pipeline for secondary axis and legend overlays
  weaknesses:
  - Secondary y-axis is tight on the right side — the rotated Cumulative % label at
    title_x = right_edge + 130 leaves minimal breathing room before the canvas right
    edge; consider reducing to title_x = right_edge + 100 and adjusting margin_right
  - The 30% label for the first cumulative point (i=0, placed below-left of dot at
    lx=cx-26, ly=cy+42, anchor=end) sits in an awkward position close to the primary
    y-axis area; repositioning to lx=cx+22 anchor=start would improve readability
  - Minor crowding at top-right where the last three cumulative percentage labels
    (94%, 98%, 100%) converge near the secondary axis top labels — consider omitting
    the 100% secondary axis label since it overlaps with the cumulative endpoint
  - Pygal default grid dots create a slightly busy chart background; setting show_y_guides=False
    or post-processing SVG to remove grid/spine elements would increase visual refinement
    (DE-02)
  - SVG regex bar geometry extraction is brittle — depends on pygals exact SVG output
    format and could break on version updates
