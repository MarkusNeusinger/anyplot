  - 'Excellent semantic design: vital-few (green #009E73) vs. trivial-many (muted
    gray) instantly communicates the 80/20 split'
  - 'Perfect spec compliance: all required features implemented correctly — sorted
    bars, cumulative line with markers, secondary y-axis (0-100%), 80% threshold line'
