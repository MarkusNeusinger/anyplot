review:
  strengths:
  - Perfect spec compliance — all Pareto chart requirements implemented correctly
    (descending bars, cumulative line, 80% threshold, secondary y-axis with percentage
    labels, markers at bar centers)
  - Excellent semantic color usage — brand green (#009E73) for vital few, muted grey
    for useful many creates instant visual comprehension of the Pareto principle
  - Robust dual-theme implementation with full chrome adaptation; both light and dark
    renders pass readability checks
  - Clean, deterministic code with explicit theme tokens and comprehensive plotnine
    theme settings
  - Realistic call-centre complaint data with convincing Pareto distribution (9 categories,
    counts 14–245)
  weaknesses:
  - Last three cumulative percentage labels (96%, 99%, 100%) are mildly crowded in
    the upper-right quadrant — consecutive cumulative values differ by only 1–3pp
    and nudge_y=10 provides insufficient vertical separation
  - Secondary y-axis implementation requires matplotlib ax.twinx() fallback after
    plot.draw() — necessary for this spec but reduces plotnine library mastery score
  - 80% threshold annotation placed at x=0.5 (left of first bar, in left margin area)
    reads as slightly awkward — would be cleaner positioned inside the plot area near
    the first bar
  - Design excellence is functional but not exceptional — legend placement and typography
    hierarchy could be more refined
