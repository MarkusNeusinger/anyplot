review:
  strengths:
  - Dual-color bar encoding (green for vital few, muted for trivial many) creates
    immediate visual hierarchy with no legend needed
  - Secondary y-axis title and tick labels colored in ochre (#BD8233) to match the
    cumulative line — elegant design detail
  - resolve_scale(y="independent") correctly decouples the two y-axes for the Pareto
    overlay pattern
  - alt.condition(alt.datum.vital_few, ...) for computed-field conditional color encoding
    is distinctly Altair and demonstrates real library mastery
  - Both renders theme-adapt correctly; all chrome tokens properly wired through configure_*
    directives
  - PAD-only canvas logic is correctly implemented (fail-loud on overshoot, pad on
    undershoot)
  weaknesses:
  - '"80%" reference line label (positioned at x=alt.value(10)) overlaps with the
    top portion of the Scratches bar in both renders — should be repositioned to the
    right side or a non-overlapping offset for clearer readability'
