      Data: 8 descending bars — first 4 in brand green (#009E73), last 4 in muted gray (INK_MUTED #6B6A63). Lavender (#C475FD) cumulative curve with open circle markers. Amber (#DDCC77) dashed 80% threshold line. Simulated secondary y-axis labels (20%–100%) in lavender on right margin.
