review:
  strengths:
  - Semantic bar coloring (green = contributes to 80%, muted = tail) is an elegant
    design choice that immediately conveys the Pareto principle without a legend
  - 'Full theme adaptation: all chrome tokens (background, ink, grid, axis lines)
    correctly flip between light and dark; data colors stay constant'
  - Interactive tooltip support (layer_tooltips with formatted counts and cumulative
    %) adds real value as an HTML artifact
  - Creative use of geom_segment() to connect discrete categorical x positions — a
    non-trivial letsplot technique
  - Amber threshold line with annotation and caption gives complete context without
    a legend
  - Manufacturing defect domain is realistic, neutral, and demonstrates the chart's
    real industrial use case
  weaknesses:
  - Simulated secondary y-axis labels use geom_text(size=11) in mm units, rendering
    at ~31pt equivalent — approximately 2x the size of primary y-axis tick labels
    (element_text size=16pt). The labels are visually oversized and create proportional
    imbalance on the right side of the chart. Reduce geom_text size for secondary
    axis labels to ~6-7 (mm) to better match the primary tick label visual weight.
  - The y_max is set to 1.25 x max_count (232) rather than total count (636), causing
    the first two cumulative markers (Scratches at y~68, Dents at y~121) to fall inside
    their respective bars rather than at or above the bar tops. Using y_max = total
    (636) would place the first cumulative marker at y=186, exactly at the Scratches
    bar top, consistent with standard Pareto chart behavior and the spec's center-top
    requirement.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface
      Chrome: Title "bar-pareto · python · letsplot · anyplot.ai" in bold dark ink, centered; X-axis label "Defect Type" and Y-axis label "Frequency (Count)" in dark INK; tick labels in INK_SOFT; caption in INK_SOFT — all clearly readable
      Data: First 4 bars (Scratches, Dents, Misalignment, Cracks) in brand green #009E73; tail 4 bars in muted gray (INK_MUTED #6B6A63); cumulative line in lavender #C475FD with open-circle markers; amber dashed 80% threshold line; simulated secondary axis labels (20%-100%) in lavender bold; cumulative annotations 29%, 52%, 67% in lavender
      Legibility verdict: PASS — all text clearly readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title, axis labels, tick labels, and caption all rendered in light INK tokens (#F0EFE8 / #B8B7B0) — clearly visible against dark background; grid lines subtle; no dark-on-dark failures detected
      Data: Brand green bars and lavender cumulative line are pixel-identical to light render (hue unchanged); tail bars shift to warmer gray (INK_MUTED #A8A79F dark), clearly distinguishable; amber threshold line and lavender secondary axis labels visible
      Legibility verdict: PASS — all chrome adapts correctly to dark surface; no dark-on-dark failures
