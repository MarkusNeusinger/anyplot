review:
  strengths:
  - Semantic bar coloring (green for ≤80% / gray for >80%) immediately communicates
    the Pareto 80/20 insight without requiring a legend — excellent data storytelling
  - Correct use of amber (#DDCC77) semantic anchor for the 80% threshold line, as
    specified in the style guide
  - layer_tooltips() with .format() used distinctively to add interactive tooltip
    value in the HTML output
  - All theme tokens correctly implemented for both light and dark renders — no dark-on-dark
    failures
  - Cumulative line constructed via geom_segment across discrete X positions with
    open circle markers — clean workaround for letsplot's discrete axis limitation
  weaknesses:
  - '"29%" cumulative annotation is positioned very close to the top of the first
    bar (vjust=-1.5, but the cumulative circle is at y≈184 while the bar top is at
    y=186), creating a near-proximity issue — increase vjust offset to avoid visual
    ambiguity'
  - Simulated secondary y-axis labels (geom_text at hjust=-1.6) look rough compared
    to a native right axis — readable but lack axis line/tick visual anchoring, reducing
    professional polish
  - axis_title size=20 is somewhat larger than the recommended 12px baseline for scale-based
    libraries; 'Defect Type' in particular looks slightly oversized for a short label
