review:
  strengths:
  - 'Vital-few vs trivial-many color distinction using brand green #009E73 for key
    bars — intentional, elegant, and semantically correct Pareto storytelling'
  - 'Complete spec compliance: dual Y-axes with correct scale, 80% threshold reference
    line, cumulative % line, markers at bar tops'
  - Perfect code quality — clean KISS structure, deterministic data, all imports used,
    correct Bokeh API
  - Realistic manufacturing defect scenario with genuine Pareto distribution (top
    5 of 10 categories account for 84% of defects)
  - 'Idiomatic Bokeh usage throughout: ColumnDataSource, HoverTool with mode=vline,
    extra_y_ranges, Span, PrintfTickFormatter, Label widgets'
  - Full theme-adaptive chrome in both renders — light (#FAF8F1) and dark (#1A1A17)
    backgrounds both correct with readable text
  weaknesses:
  - 'Cumulative percentage label for Scratches (first bar) uses x=i (integer index
    0) in a categorical x_range — Bokeh maps integer 0 to the left edge of the first
    category interval rather than its center, so the label 28% is clipped at the plot
    boundary and only % is visible. Fix: replace x=i with x=categories[i] in the Label
    loop so the label anchors to the string category name and renders centered on
    its bar'
  - 'Design Excellence has room for improvement: DE-02 could be polished further by
    ensuring all four axis spines are intentionally hidden (currently the bottom/left
    axis lines remain as styled elements), and DE-01 could gain from a subtle value
    annotation on the first bar (count label) to complete the information hierarchy'
