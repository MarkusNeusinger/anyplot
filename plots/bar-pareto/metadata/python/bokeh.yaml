review:
  strengths:
  - Vital-few / trivial-many color split using brand green vs. INK_MUTED semantic
    anchor directly encodes the Pareto principle's core insight
  - 'Full spec compliance: all required Pareto features (sorted bars, cumulative line,
    secondary axis, 80% threshold, markers, percentage labels) are correctly implemented'
  - Theme adaptation is complete and correct — all chrome tokens flip properly; no
    dark-on-dark or light-on-light failures in either render
  - HoverTool with defect/count/cumulative tooltip leverages Bokeh's interactive HTML
    capability effectively
  - Data is realistic, domain-appropriate manufacturing defect data with a proper
    Pareto distribution shape
  - Code is clean, linear, and idiomatic with no over-engineering
  weaknesses:
  - 'Percentage labels for the first two vital bars (29% at Scratches, 56% at Dents)
    are positioned inside the bar bodies because the cumulative pct-axis position
    maps below the corresponding bar height on the left axis. Fix: detect when the
    label y-position falls below the bar top and clamp label y to max(cumulative_pct[i]
    + 3, bar_top_in_pct_units + 3) so labels always sit above the bar body.'
