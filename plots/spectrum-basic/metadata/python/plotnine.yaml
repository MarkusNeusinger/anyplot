  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) provides clean, professional canvas for visualization.
      Chrome: Title, axis labels ("Frequency (Hz)", "Amplitude (dB)"), and tick labels are dark and clearly readable with explicit sizing (24pt title, 20pt labels, 16pt ticks).
      Data: Line is rendered in teal/cyan color (#306998) showing frequency spectrum from 10–1000 Hz on logarithmic x-axis with dB scale. Clear peaks visible at fundamental frequency (~50 Hz), harmonics (~100, ~150 Hz), and high-frequency component (~500 Hz). Grid lines are subtle and present.
      Legibility verdict: PASS - all elements readable despite non-compliant color.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) provides consistent dark theme surface.
      Chrome: Title and axis labels are light-colored and clearly readable. No dark-on-dark legibility failures detected. Grid lines remain visible at appropriate opacity.
      Data: Line maintains same teal/cyan color (#306998) as light render, confirming consistent data representation between themes. Frequency peaks and structure identical to light render.
      Legibility verdict: PASS - all text readable, no theme-specific failures, but data color is not brand-compliant (#009E73).

    Both renders display the frequency spectrum clearly with proper log-scale handling and maintain visual consistency between themes. However, the data line color (#306998) is non-compliant with the required Okabe-Ito palette specification (must be #009E73 for first series).
