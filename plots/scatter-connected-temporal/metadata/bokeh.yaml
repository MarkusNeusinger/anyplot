    background
  image_description: 'The plot displays a connected scatter plot titled "US Phillips
    Curve Dynamics (1990-2023) · scatter-connected-temporal · bokeh · pyplots.ai".
    The X-axis shows "Unemployment Rate (%)" ranging from ~3 to ~10, and the Y-axis
    shows "Inflation Rate (%)" ranging from about -0.5 to 8. Data points are connected
    by line segments in chronological order, forming a temporal path through 2D space.
    A sequential blue color gradient encodes time: light blue for early years (1990s)
    darkening to deep navy for recent years (2020s). Each data point has a circular
    marker with a white edge outline. Key years are annotated: "1990 ▸" (start), "1999",
    "2009" (lower right, GFC), "2015" (low inflation), "2020" (COVID), "2022" (high
    inflation spike at ~8%), and "◂ 2023" (end). A vertical color bar on the right
    maps colors to years from 1990 to 2020+. The background is light gray (#FAFAFA)
    with subtle grid lines. Axis lines and tick marks are removed for a clean look.
    The path clearly shows the economy''s journey through unemployment-inflation space
    over three decades.'
