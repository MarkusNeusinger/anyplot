review:
  strengths:
  - Correct use of geom_path() (not geom_line) preserves temporal order — idiomatic
    ggplot2 for connected scatter
  - 'imprint_seq gradient (green #009E73 → blue #4467A3) elegantly encodes temporal
    progression along both path and points'
  - Arrow overlay (geom_segment with arrow parameter) reinforces time direction without
    cluttering the chart
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, INK_MUTED all correctly toggled
    between light and dark'
  - Title font scaling formula correctly handles the 80-character mandated title (size
    capped at 10pt via linear formula)
  - Real historical Phillips curve data (1980–2019) with accurate economic values
    provides compelling real-world context
  - guide_colorbar with barwidth/barheight customization makes the continuous legend
    compact and well-positioned
  - Panel border removed, minor grid disabled, axis lines added — clean L-shaped frame
    without full box
  weaknesses:
  - 'Label overlap: ''2000'' and ''2019'' are nearly co-located (lbl_x both = 3.7%,
    lbl_y = 3.1 vs 3.0 — only 0.1% separation on a 17%-range axis, ~8 source-px gap
    vs ~50px text height). Labels overlap in both renders. Fix: increase y-offset
    for ''2019'' to at least inflation + 1.5 or nudge x for one of the two labels.'
  - 'Year colorbar legend (1980–2010) is truncated — the colorbar ticks show 1980,
    1990, 2000, 2010 but not 2019. Minor cosmetic issue: the max scale value (2019)
    is cut off. Widen barwidth or set breaks explicitly to include 2019.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly set, not pure white.
      Chrome: Title "Phillips Curve Dynamics · scatter-connected-temporal · r · ggplot2 · anyplot.ai" renders at ~10pt (scaled from default 12pt for 80-char title), bold, dark ink — readable. X-axis label "Unemployment Rate" and Y-axis label "Inflation Rate" both at 10pt in dark ink — readable. Tick labels (3%, 4%, ... 10% on x; 0%, 5%, 10%, 15% on y) at 8pt in INK_SOFT — readable. Bottom legend "Year" colorbar shows gradient from green to blue across 1980–2010 range.
      Data: Path and points graduate from brand green #009E73 (1980, high-inflation/high-unemployment region, upper-right) through teal/mid-green to blue #4467A3 (recent years, lower-left cluster). Small arrow at start (1980→1981) in green reinforces temporal direction. Year labels "1980", "1990", "2010" are well-spaced; "2000" and "2019" appear nearly stacked (overlapping vertically) in the lower-left of the scatter.
      Legibility verdict: PASS overall. Minor readability issue: "2000" and "2019" labels nearly overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly set, not pure black.
      Chrome: Title, axis labels, and tick labels all render in light-colored ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures observed. Legend text and title in appropriate light tones.
      Data: Path and point colors are identical to the light render — green #009E73 through to blue #4467A3 gradient. Arrow at start visible. Year annotation labels appear in INK (#F0EFE8 in dark mode) — readable against the dark background. The "2000"/"2019" overlap issue persists identically in the dark render.
      Legibility verdict: PASS. Data colors identical to light render (only chrome flipped). No dark-on-dark failures.
