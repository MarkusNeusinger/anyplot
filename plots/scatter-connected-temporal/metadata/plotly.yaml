review:
  strengths:
  - Excellent real-world Phillips Curve data with accurate economic values spanning
    multiple cycles
  - Strong annotation system highlighting key historical moments (1990, 1999, 2009,
    2020, 2022, 2023)
  - 'Good use of Plotly-specific features: hovertemplate, customdata, HTML interactive
    export'
  - Viridis-based color gradient effectively communicates temporal progression
  - Professional font sizing across all text elements
  weaknesses:
  - Line segment colors use manual RGB interpolation that does not match the viridis
    colorscale on markers, creating visual inconsistency
  - Dense clustering in the 4-5% unemployment region makes the temporal path hard
    to follow
  - Layout has wasted space on the right side; colorbar is small relative to the plot
    area
  image_description: 'The plot displays a connected scatter plot showing the Phillips
    Curve relationship between Unemployment Rate (%) on the x-axis and Inflation Rate
    (%) on the y-axis for 1990-2023. Data points are circular markers with white borders,
    colored along a viridis gradient from dark purple (1990) to yellow (2023). A vertical
    colorbar on the right maps colors to years. Connecting line segments between consecutive
    points also follow a color gradient, transitioning from darker tones to golden/yellow.
    Key years are annotated: 1990 (upper center, high inflation ~5.4%), 1999 (left
    cluster, low unemployment ~4.2%), 2009 (lower right, high unemployment ~9.3%),
    2020 (right area, pandemic spike), 2022 (upper left, high inflation ~8%), and
    2023 (left, recovery). A directional arrow near the center indicates temporal
    flow. The background is a very light gray-blue with subtle dotted gridlines. The
    title reads "scatter-connected-temporal · plotly · pyplots.ai" centered at the
    top.'
