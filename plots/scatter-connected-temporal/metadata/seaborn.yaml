  image_description: 'The plot shows a connected scatter plot of Unemployment Rate
    (%) on the x-axis vs Inflation Rate (%) on the y-axis, tracing the Phillips curve
    dynamics from 1990 to 2023. Points are connected by line segments in chronological
    order. A blue sequential color gradient (light blue for 1990 to dark navy for
    2023) encodes temporal progression on both the markers and connecting lines. Six
    key years are annotated with bold labels: 1990 (top-center, high inflation ~5.4%),
    2000 (left, low unemployment ~4.0%), 2009 (bottom-right, high unemployment ~9.3%
    with negative inflation), 2012 (center-right), 2019 (left, pre-pandemic low unemployment),
    and 2023 (upper-left, post-pandemic). The background is light gray (#fafafa),
    top and right spines are removed, and subtle gridlines appear on both axes at
    alpha=0.2. A vertical colorbar on the right maps color to year (1990-2023). The
    title reads "scatter-connected-temporal · seaborn · pyplots.ai". The path clearly
    shows cyclical economic patterns, the 2008-2009 recession excursion to high unemployment
    with deflation, and the 2022 inflation spike.'
