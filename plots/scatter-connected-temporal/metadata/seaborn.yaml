  strengths:
  - 'Excellent data choice: Phillips curve dynamics is a perfect real-world application
    for connected scatter temporal plots'
  - 'Strong visual design: custom blue sequential colormap, white marker edges, clean
    spine removal'
  - Well-chosen year annotations that highlight key economic events (1990 start, 2009
    recession, 2023 end)
  - Good font sizing throughout — all text explicitly sized and clearly readable
  - LineCollection approach for colored path segments is technically elegant
  weaknesses:
  - No seaborn usage at all — this is a pure matplotlib implementation in a seaborn
