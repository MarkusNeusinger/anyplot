    styling functions
  - Dense cluster region (unemployment 4-6%) has visual crowding where many path segments
    cross
  image_description: 'The plot displays a connected scatter plot of Unemployment Rate
    (%) on the x-axis versus Inflation Rate (%) on the y-axis, tracing Phillips curve
    dynamics from 1990 to 2023. Points are connected by line segments in chronological
    order. A sequential blue colormap transitions from light blue (1990) to dark navy
    (2023) encoding temporal progression on both markers and line segments. White
    edge highlights distinguish individual markers. Six key years are annotated with
    leader lines: 1990, 2000, 2009, 2012, 2019, and 2023. A vertical colorbar on the
    right maps color to year. Top and right spines are removed, and subtle grid lines
    (alpha=0.2) appear on both axes. The title reads "scatter-connected-temporal ·
    seaborn · pyplots.ai". The plot fills the canvas well with a 16:9 aspect ratio.'
