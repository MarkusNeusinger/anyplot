review:
  strengths:
  - Excellent data storytelling through the Phillips Curve narrative with well-chosen
    key year annotations marking economic regime shifts
  - Custom blue gradient palette with white-stroked markers creates a polished, professional
    appearance
  - Per-label nudge offsets demonstrate careful attention to label placement
  - Full spec compliance with all required features (temporal path, annotations, color
    gradient, directional arrow, visible markers)
  - Perfect data quality with realistic economic data and appropriate scales
  - Clean, well-structured code with good use of letsplot-specific features (layer_tooltips,
    HTML export)
  weaknesses:
  - Mid-range area (4-6% unemployment, 2-4% inflation) has visual congestion where
    the path crosses itself multiple times
  - Point markers could be slightly larger given the 34-point density to improve visual
    prominence
  - Could push design further with bolder typographic hierarchy or background color
    treatment to reach publication-quality level
  image_description: The plot displays a connected scatter plot tracing US-style unemployment
    rate (%) on the x-axis against inflation rate (%) on the y-axis from 1990 to 2023.
    Points are connected by line segments in chronological order, with a light-to-dark
    blue color gradient encoding temporal progression (light blue = 1990, dark blue
    = 2023). Each data point is shown as a circle with a white stroke. Key years (1990,
    1995, 2000, 2007, 2009, 2020, 2023) are annotated in bold monospace text with
    per-label nudge offsets to avoid overlap. A dark arrow at the final segment indicates
    the direction of time. The title reads "scatter-connected-temporal · letsplot
    · pyplots.ai" with a subtitle "Phillips Curve Dynamics — US-style unemployment
    vs inflation, 1990-2023". The background is white with a subtle light gray major
    grid, no minor grid, and no spines (minimal theme). A vertical color bar legend
    labeled "Year" appears on the right with labels 1990, 2006, 2023. The path traces
    a generally inverse relationship between unemployment and inflation with visible
    regime shifts — the 2008 crisis pushing unemployment to ~10%, and post-COVID 2023
    showing low unemployment with high inflation in the upper-left.
