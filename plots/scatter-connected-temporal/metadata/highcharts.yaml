review:
  strengths:
  - Excellent data choice — US Phillips Curve data is a perfect real-world example
    for this plot type
  - Full spec compliance with all required features implemented
  - Color gradient effectively encodes temporal progression
  - Key year annotations create strong focal points for storytelling
  - Clean well-structured code with deterministic data
  - Interactive HTML export is a nice Highcharts-specific bonus
  weaknesses:
  - Connecting line opacity (0.30) is too low — the temporal path is hard to follow,
    undermining the core purpose of the visualization
  - Library mastery could be improved by using the Python API more idiomatically rather
    than raw dict injection
  - Minor label crowding in the lower-left where 2000 and 2023 cluster together
  image_description: The plot displays a connected scatter plot titled "scatter-connected-temporal
    · highcharts · pyplots.ai" with subtitle "Unemployment vs Inflation in the US
    (1990–2023) — tracing the Phillips Curve over time". The x-axis shows "Unemployment
    Rate (%)" ranging from 3 to 11, and the y-axis shows "Inflation Rate (%)" ranging
    from -2 to 10. Data points are connected by very faint light blue/gray lines (low
    opacity ~0.30) tracing the temporal path. Points use a color gradient from light
    steel blue (1990s) to dark navy (2020s), with white-bordered circular markers.
    Key years (1990, 2000, 2009, 2020, 2023) have larger markers and bold text labels.
    The background is a light off-white (#fafbfc) with subtle dotted grid lines. The
    2009 recession point sits at ~9.6% unemployment/-0.4% inflation at the far right,
    while the 2022 post-COVID inflation spike appears at ~3.6% unemployment/8.0% inflation
    at the top left.
