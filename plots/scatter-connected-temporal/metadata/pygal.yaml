  image_description: 'The plot displays a connected scatter plot of Life Expectancy
    (years) vs GDP per Capita (USD) for a fictional country from 1990 to 2023. The
    temporal path moves generally from lower-left (~$8,500, 68 yrs) to upper-right
    (~$22,000, 76 yrs). The path is segmented into 6 temporal eras using a light-to-dark
    blue gradient: lightest blue for 1990-1998, progressively darker through 2020-2023.
    Key years are marked with amber/orange dots (though without visible text labels).
    A large red dot marks Start (1990) and a large dark navy dot marks End (2023).
    The plot background is a subtle off-white (#f7f9fb) with light gray dashed grid
    lines. The title reads "Life Expectancy vs GDP · scatter-connected-temporal ·
    pygal · pyplots.ai". Axis labels include units (USD and years). A 2-row legend
    at the bottom identifies all 9 series (6 era segments, key years, start, end).
    The path shows visible loops/dips at the 1998 recession, 2008 financial crisis,
    and 2020 pandemic periods.'
