  image_description: The plot displays a connected scatter plot of Life Expectancy
    (years) vs GDP per Capita (USD) for a fictional country from 1990 to 2023. The
    temporal path moves from the lower-left (~$8,500 GDP, ~68.3 years LE in 1990)
    to the upper-right (~$22,000 GDP, ~76 years LE in 2023). Points are connected
    by line segments in chronological order, with a light-to-dark blue color gradient
    across six era segments (1990-1998 lightest, 2020-2023 darkest) encoding temporal
    progression. Six key years (1990, 1998, 2008, 2015, 2020, 2023) are highlighted
    with larger amber/orange dots and bold dark-brown year labels. The start point
    (1990) has a large red dot and the end point (2023) a large dark navy dot. The
    plot background is a subtle light blue-gray (#f7f9fb) with dashed light-gray grid
    lines. The legend at the bottom shows era segments in 4 columns plus Key years,
    Start, and End markers. Title reads "Life Expectancy vs GDP · scatter-connected-temporal
    · pygal · pyplots.ai". Both axes have descriptive labels with units and formatted
    tick values ($X,XXX and X.X yrs).
