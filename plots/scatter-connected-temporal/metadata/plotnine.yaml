review:
  strengths:
  - Excellent use of geom_path for correct temporal ordering shows deep plotnine understanding
  - Well-crafted recession highlight with red accent creates clear focal point and
    narrative
  - Custom per-label offsets prevent annotation crowding with thoughtful attention
    to detail
  - Realistic Phillips curve data with plausible economic values
  - Perfect code structure with clean KISS pattern and full font size customization
  weaknesses:
  - Color gradient range is too subtle to clearly convey temporal progression in mid-range
    years
  - Layout has wasted space in upper-right quadrant creating imbalanced canvas
  - Year legend uses indirect numeric mapping (0-30 to 1990-2020)
  image_description: The plot shows a connected scatter plot depicting the Phillips
    Curve relationship between Unemployment Rate (%) on the x-axis and Inflation Rate
    (%) on the y-axis for 1990-2020. Data points are connected by path lines in temporal
    order, with a blue color gradient from light blue (1990) to dark navy (2020) encoding
    temporal progression. Each data point has a circular marker with a white stroke
    border. Key years (1990, 1995, 2000, 2005, 2015, 2020) are annotated with bold
    gray text labels positioned with custom offsets. The 2009 recession point is highlighted
    with a larger red circle outline and bold red "2009 Recession" label. A continuous
    color bar legend on the right shows the Year mapping. The title reads "Phillips
    Curve (1990-2020) · scatter-connected-temporal · plotnine · pyplots.ai" in bold.
    The background is minimal with subtle gray gridlines. The layout is 16:9 landscape
    format.
