      Data: Connected scatter path in brand green (#009E73). Markers sized 7-9px radius with pageBg edge stroke. Start marker is a triangle (1960), end marker is a diamond (1995), peak is an enlarged amber circle (1980). The spiral shape of the Phillips Curve is clearly visible.
