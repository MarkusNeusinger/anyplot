review:
  strengths:
  - 'Correct Highcharts pattern: scatter type with lineWidth preserves data array
    (temporal) order — unlike line series which sorts by x-value — clearly understood
    and documented in the code comment'
  - Distinct marker symbols for start (triangle, radius 9) and end (diamond, radius
    9) give the reader immediate visual anchors for the temporal journey without needing
    to trace the full path
  - 'All theme tokens correctly applied throughout: t.ink for title, t.inkSoft for
    axes/labels/subtitles, t.grid for grid lines, t.pageBg for marker outline — chrome
    adaptation is complete'
  - Historically meaningful US Phillips Curve dataset (1960–1995) showcases cyclical
    patterns, stagflation era crossings, and regime change in a single compelling
    connected scatter
  - 'textOutline: ''2px '' + t.pageBg on year annotations ensures labels remain readable
    regardless of whether they fall on a line or a colored marker'
  weaknesses:
  - Regular data point markers at radius 5 are slightly small for 36 sparse data points;
    the style guide recommends prominent markers for < 50 points — increase regular
    circle radius from 5 to 7–8 for better individual point visibility
  - 'No visual emphasis on the key narrative moment: the 1979–1981 stagflation peak
    is the climax of the Phillips Curve story but receives no special treatment —
    adding a larger marker radius or distinct label at the 1980 peak point (highest
    inflation: 13.5%) would create a stronger focal point and improve DE-01/DE-03'
  - Year annotation labels at fontSize 13px are slightly small — 15px would improve
    mobile readability without crowding the plot
  - 'Design lacks the extra polish to reach 90+: consider increasing plot margin spacing,
    reducing grid opacity further, or adding a directional annotation to show time
    flow from 1960→1995 (the spec explicitly notes this as a recommended technique)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot surface.
      Chrome: Title "scatter-connected-temporal · javascript · highcharts · anyplot.ai" in dark text (~22px bold) fills ~70% of width — readable and well-proportioned. Subtitle in lighter secondary text, readable. X-axis label "Unemployment Rate (%)" and Y-axis label "Inflation Rate (%)" in inkSoft text, clear. Tick labels with % format at 14px, readable. Subtle grid lines on both axes (appropriate for scatter).
      Data: Single series in brand green #009E73. 36 data points connected in temporal order with lineWidth 2 lines. Regular points as small filled circles (radius 5); start point (1960) as larger triangle (radius 9); end point (1995) as larger diamond (radius 9). Year labels at 5-year intervals (1960, 1965, 1970, 1975, 1980, 1985, 1990, 1995) with textOutline for legibility. Path shows clear cyclical pattern with stagflation peak visible at upper right (~13.5% inflation, 1980).
      Legibility verdict: PASS — all text clearly readable against light background. No dark-on-dark issues. Slight crowding of labels around 5.5% unemployment zone (1960, 1990, 1995 all cluster there) but individually readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title, subtitle, axis labels, and tick labels all render in light-colored text against the dark background — fully readable. No dark-on-dark failure observed. Grid lines are subtle and appropriate.
      Data: Brand green #009E73 data series is visually identical to the light render — same marker positions, same line connections, same year labels. The green reads well on the dark surface with good contrast. Marker outline using t.pageBg (dark bg color) adapts correctly to provide a subtle dark ring on dark surface, maintaining marker definition.
      Legibility verdict: PASS — all text readable against dark background. Data colors are identical between light and dark renders. Chrome adapts correctly. No issues found.
