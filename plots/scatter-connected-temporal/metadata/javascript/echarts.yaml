review:
  strengths:
  - Excellent use of ECharts visualMap with dimension:2 encoding for temporal gradient
    — the 3rd value in each [x, y, t] data tuple drives color from imprint_seq, which
    is a distinctively ECharts-native pattern
  - Terminal markLine arrow at 2023 makes time direction immediately obvious without
    any labeling
  - Mixed symbolSize (16 for key years, 8 for others) creates a clear visual hierarchy
    along the temporal path
  - All chrome (text, axis, grid) is fully theme-adaptive via t.ink/t.inkSoft/t.grid
    tokens; both renders are clean and readable
  - Excellent real-world dataset (CO₂ ppm vs. temperature anomaly 1980–2023) with
    factually accurate values that tells a compelling climate narrative
  - 'Clean code structure: flat data → config → setOption, no functions or classes,
    fully deterministic'
  weaknesses:
  - Non-key markers (symbolSize:8) are on the small side for a 44-point connected
    scatter — the spec sits just at the <50 boundary where the style guide calls for
    more prominent markers; increase to 10–12 for the intermediary points
  - 'DE-03 storytelling could be strengthened: a brief annotation (e.g. a text label
    near 2015–2023 noting ''Acceleration'') or a bolder emphasis on the rightmost
    cluster would let viewers immediately spot the insight rather than having to trace
    the path themselves'
  - 'DE-02 refinement is strong but not yet perfect: both X and Y split-lines are
    drawn; removing X split-lines (keeping only Y) would clean up the grid for a plot
    where the primary trend is along Y'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "Temperature Anomaly vs CO₂ · scatter-connected-temporal · javascript · echarts · anyplot.ai" in dark ink at top-center, clearly readable. X-axis name "Atmospheric CO₂ (ppm)" and Y-axis name "Global Temperature Anomaly (°C)" in dark ink, both readable. Tick labels in inkSoft color at fontSize 13, fully legible.
      Data: Connected scatter path spanning CO₂ 338–421 ppm and temperature anomaly -0.1–1.2 °C. Line and markers colored via imprint_seq gradient: starts at brand green (#009E73) in 1980 and transitions to blue (#4467A3) by 2023. Key year markers (1980, 2000, 2010, 2023) rendered larger (symbolSize 16) with bold year labels; non-key markers smaller (symbolSize 8). A markLine arrow at the 2022→2023 segment indicates time direction.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface, not pure black.
      Chrome: Title in light ink (#F0EFE8), clearly readable against the dark background. X/Y axis names in light ink, readable. Tick labels in inkSoft (#B8B7B0), readable. Year labels (1980, 2000, 2010, 2023) in inkSoft bold, readable. Grid lines visible as subtle warm-gray lines.
      Data: Colors are identical to the light render — imprint_seq gradient from teal-green (1980) to blue (2023). Marker halos use t.pageBg (the dark background color) as borderColor, creating a clean dark-theme halo effect. The markLine arrow is in t.seq[1] blue. No data colors have shifted.
      Legibility verdict: PASS — all text is clearly readable against the warm near-black background. No dark-on-dark failures observed. The inkSoft tick and year labels provide adequate contrast.
