review:
  strengths:
  - 'Correct use of imprint_seq (t.seq: green → blue) as a continuous temporal gradient
    — brand green (#009E73) on earliest points satisfies VQ-07'
  - 'Chart.js plugin system used idiomatically: canvasBg fills page background before
    render, temporalLabels draws year annotations after data draw — both classic Chart.js
    patterns'
  - Real climate CO₂-vs-temperature data (1970–2020) is scientifically plausible,
    factually accurate, and immediately compelling
  - Start/end points emphasized via larger radius (11 vs 6) creating natural focal
    points without annotation clutter
  - Subtitle plugin repurposed as a color-range legend — elegant solution that avoids
    a redundant chartjs legend entry for a continuous gradient
  - 'All font sizes explicitly set: title 22px/600, subtitle 14px, axis labels 16px,
    tick labels 14px, year annotations bold 14px'
  - Theme-adaptive chrome properly threaded through all elements (t.ink, t.inkSoft,
    t.grid, t.pageBg)
  - Both light and dark renders pass theme-readability check with no dark-on-dark
    or light-on-light failures
  weaknesses:
  - 'Chart.js axis scale borders (the thick border line along each axis — equivalent
    to all-four-sides spines) are not explicitly removed. Adding `border: { display:
    false }` to both x and y scale configs would produce a cleaner L-shaped or open
    look per style-guide defaults.'
  - 'The connecting line uses a flat semi-transparent green throughout (rgba(0,158,115,0.45))
    while the point colors transition green→blue. This minor visual inconsistency
    de-emphasizes the temporal direction along the path. A workaround: use a neutral
    ink color (t.inkSoft at 0.3 opacity) for the line so it reads as purely structural,
    making the point-color gradient the clear temporal signal.'
  - Two helper functions (hexToRgb, lerpColor) and two Chart.register plugin calls
    with methods reduce KISS purity — necessary for this technique but adds complexity
    vs the flat default structure.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page surface color, not pure white.
      Chrome: Title "scatter-connected-temporal · javascript · chartjs · anyplot.ai" in dark bold text fully readable. Subtitle "Color encodes time: 1970 (green) → 2020 (blue)" in slightly softer dark text. X-axis label "CO₂ Concentration (ppm)" and Y-axis label "Temperature Anomaly (°C)" clearly readable in dark ink. Tick labels in inkSoft (dark gray) readable at all positions. Year annotations (1970, 1980, 1990, 2000, 2010, 2020) in bold dark text above their respective points — all readable.
      Data: Connected scatter plot. Points transition from brand green (#009E73) at 1970 to blue (#4467A3) at 2020 via imprint_seq gradient. Non-annotated points at radius 6, start (1970) and end (2020) at radius 11. Connecting line is semi-transparent green. Grid lines are subtle. Clear upward-right trend visible.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title in light-colored text, clearly readable against dark background. Subtitle in slightly softer light text. Axis labels and tick labels in appropriate light colors (t.ink and t.inkSoft for dark theme). Year annotations in light gray against dark background — readable. No dark-on-dark failures detected.
      Data: Point colors are identical to light render — brand green (#009E73) at 1970 transitioning to blue (#4467A3) at 2020. The connecting semi-transparent green line is visible against the dark background. Grid lines subtle.
      Legibility verdict: PASS — all text readable, no dark-on-dark issues, data colors identical to light render.
