review:
  strengths:
  - 'Perfect spec compliance: all four required features (chronological connection,
    year annotations, temporal color gradient, visible markers) implemented correctly.'
  - 'Excellent data quality: real-world GDP/life-expectancy scenario with genuine
    economic events visible in the path shape (2001-02 dot-com dip, 2008-09 financial
    crisis, 2020 COVID drop), making the chart immediately meaningful.'
  - Proper Imprint sequential palette (t.seq[0] to t.seq[1] via d3.interpolateRgb)
    for temporal encoding; fully theme-adaptive chrome via ANYPLOT_TOKENS in both
    renders.
  - Clean, deterministic, idiomatic D3 code with no over-engineering; per-segment
    temporal coloring loop and labelConfig offset array are elegant.
  - Dynamic title font scaling (Math.max(13, Math.round(22 * 67 / title.length)))
    prevents title overflow on the long mandated title string.
  weaknesses:
  - Temporal legend (gradient bar + labels) is placed inside the inner plot area in
    the upper right, overlapping the data path and endpoint markers. The '1992'/'2021'
    legend labels sit directly on or adjacent to data path lines near the 2021 endpoint
    cluster. Move the legend into the right margin (lgX = iw + 12, lgY = ih/2 - lgH/2)
    and widen margin.right to ~180.
  - Design storytelling stops at year labels; brief event annotations ('Financial
    Crisis' near 2009 dip, 'COVID-19' near 2020 dip) styled in t.inkSoft at 11-12px
    would make the narrative self-explanatory without domain knowledge.
  - 'LM-02 could be stronger: consider using a d3.line() generator with a linearGradient
    applied to the path stroke via gradientUnits=''userSpaceOnUse'' instead of per-segment
    line coloring — a more idiomatic SVG/D3 technique that cannot be replicated in
    other libraries.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "GDP & Life Expectancy · scatter-connected-temporal · javascript · d3 · anyplot.ai" bold centered at top, fully visible. X-axis label "GDP per Capita (USD thousands, 2015 prices)" and Y-axis label "Life Expectancy (years)" both in dark ink, clearly readable. Tick labels ($20k-$55k on X; 75-80 yrs on Y) in dark inkSoft, readable. Year annotations (1992 bold, 2000, 2007, 2009, 2015, 2020, 2021 bold) visible at key data points. Temporal legend gradient bar in upper-right plot area with "Temporal direction →" label and "1992"/"2021" labels.
      Data: Path colored by Imprint sequential gradient (green #009E73 at 1992 → blue #4467A3 at 2021). Larger circles (r=9) at start (1992) and end (2021), smaller circles (r=5) at intermediate points. Overall trend goes lower-left to upper-right with visible dips at 2001-02, 2008-09, and 2020.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: All text (title, axis labels, tick labels, year annotations, legend text) rendered in light colors (t.ink / t.inkSoft) against the dark background. No dark-on-dark failures. Grid lines remain subtle. All elements clearly legible.
      Data: Colors are identical to the light render — green-to-blue Imprint sequential gradient unchanged. Both endpoint circles clearly distinguishable. Brand green #009E73 at the 1992 start marker is visible.
      Legibility verdict: PASS
