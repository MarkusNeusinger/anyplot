review:
  strengths:
  - Sophisticated SVG linearGradient with gradientUnits='userSpaceOnUse' applied as
    path stroke — correctly encodes temporal direction with an Imprint seq gradient
    (green→blue) along the actual diagonal trajectory
  - Color interpolation on markers via d3.interpolateRgb mirrors the path gradient,
    creating a unified visual metaphor for time
  - Endpoint circles (r=9) are differentiated from intermediate points (r=5) with
    ink-colored bold labels — clear visual hierarchy for 1992/2021
  - Key economic events annotated with dashed leader lines and italic italic text
    (Financial Crisis, COVID-19), adding narrative value aligned with the spec
  - 'Full Imprint token usage: pageBg, ink, inkSoft, grid, and t.seq all correctly
    applied; both themes pass readability checks'
  - Gradient legend in right margin is compact, informative, and does not overlap
    data
  weaknesses:
  - Annotation and legend text at 11px CSS (22px native) is borderline at mobile/thumbnail
    scale — consider raising to 12–13px for 'Financial Crisis', 'COVID-19', and 'Temporal
    direction →' labels
  - 'LM-02 near-miss: the gradient path technique is strong but no arrowhead is drawn
    on the path to reinforce direction (spec suggests ''arrow or color gradient''
    — only gradient used; adding a terminal arrowhead marker would complete the spec''s
    suggestion and earn full LM-02)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), correct anyplot light surface.
      Chrome: Title "GDP & Life Expectancy · scatter-connected-temporal · javascript · d3 · anyplot.ai" in bold dark ink, scaled to ~18px CSS — readable and spans ~75% of plot width. X-axis label "GDP per Capita (USD thousands, 2015 prices)" and Y-axis label "Life Expectancy (years)" in ink at 16px CSS — clear and descriptive. Tick labels "$20k"–"$55k" and "75 yrs"–"80 yrs" at 14px CSS — legible. Annotation text ("Financial Crisis", "COVID-19") at 11px CSS italic in inkSoft — readable at this resolution but borderline at mobile scale.
      Data: A smooth connected path from 1992 (green, large circle at lower-left) to 2021 (blue, large circle at upper-right), with an SVG linearGradient stroke transitioning from #009E73 (Imprint brand green) to #4467A3 (Imprint blue). Intermediate markers are r=5 circles colored via d3.interpolateRgb. Key year labels (1992, 2000, 2007, 2009, 2015, 2020, 2021) positioned beside relevant points. Dashed leader lines connect to "Financial Crisis" (2009 dip) and "COVID-19" (2020 drop) annotations. Gradient legend bar (150px wide) in right margin with "Temporal direction →" label and year endpoints "1992" / "2021". Grid: subtle on both axes using t.grid token. No top or right spines.
      Legibility verdict: PASS — all title, axis labels, tick labels, and year annotations are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correct anyplot dark surface.
      Chrome: Title, axis labels, tick labels, and year/event annotations all render in light ink (#F0EFE8 / #B8B7B0 tokens) — clearly readable against the dark background. No dark-on-dark failure detected: tick labels, year labels, and annotation text all use inkSoft/ink tokens that adapt correctly to the dark theme. Grid lines are subtle with the rgba dark-theme token.
      Data: Path gradient colors are identical to the light render (green #009E73 → blue #4467A3) as required — only chrome flips, data colors remain constant. Markers appear with the same color interpolation. The gradient legend bar and its labels are correctly visible on the dark surface.
      Legibility verdict: PASS — all text elements are clearly readable against the near-black background; no dark-on-dark failures observed.
