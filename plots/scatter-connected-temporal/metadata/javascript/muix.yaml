review:
  strengths:
  - Correct Imprint palette in canonical order (1970s→green, 1980s→lavender, 1990s→blue,
    2000s→ochre)
  - All font sizes explicitly set — tick labels 14px, axis labels 16px, title 19px
    (correctly scaled for 79-char title)
  - 'Fully theme-adaptive: pageBg for container background, ThemeProvider handles
    all chrome'
  - Data colors identical between light and dark renders — only chrome flips as required
  - US Phillips Curve 1970–2009 is a perfect real-world dataset for this chart type
  - Clean KISS structure with deterministic hard-coded data
  - skipAnimation and window.ANYPLOT_SIZE used correctly per harness contract
  - 'Title format correct: Descriptive prefix + spec-id · javascript · muix · anyplot.ai'
  weaknesses:
  - Missing temporal direction indicators within each decade path — the spec explicitly
    requests arrows or a gradient to show which direction time flows along each connected
    path; without them a viewer cannot tell which end of the 1970s path is 1970 vs
    1979
  - Missing text annotations for key time points — spec explicitly requires labels
    for start, end, and notable years (e.g. 1970, 1979, 1980, 1989, 1990, 1999, 2000,
    2009 at minimum; notable events like 1973 oil shock or 2008 crisis are ideal);
    MUI X ScatterChart or LineChart mark slots can render SVG text annotations
  - Markers are small open circles — with only 10 data points per series (sparse per
    style guide), markers should be larger and more prominent to distinguish the connected
    scatter from a plain line chart; increase mark size via slotProps or custom mark
    component
  - Grid has no explicit opacity tuning — both horizontal and vertical grids are on
    but use MUI default opacity; explicit grid opacity (e.g. via sx targeting .MuiChartsGrid-root,
    or gridAxis stroke-opacity) would make the grid more subtle and reduce visual
    noise in the dense overlap area
  - LM-02 low — the implementation uses MUI X as a generic line chart; consider using
    a custom mark slot (slotProps.mark) to render styled scatter markers, or add reference
    lines / highlighted areas specific to MUI X community features
