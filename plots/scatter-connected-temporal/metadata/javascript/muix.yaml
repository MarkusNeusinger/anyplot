review:
  strengths:
  - Historically accurate US Phillips Curve data (1970-2009) providing real economic
    context and factual accuracy
  - Excellent use of MUI X composition API (useXScale/useYScale) for data-coordinate
    custom SVG overlay — a genuinely distinctive library feature
  - Four-color decade segmentation with directional arrowheads creates clear temporal
    narrative
  - Null-masking for decade path segmentation is an elegant MUI X pattern for multi-series
    line charts with gaps
  - Year annotations at the 1973 oil shock and 2008 financial crisis provide narrative
    depth without over-annotating
  - Correct Imprint palette application with t.palette[0]-[3] and theme-adaptive chrome
    through ANYPLOT_TOKENS
  weaknesses:
  - Title font size (19px CSS) is slightly below the 22px CSS guideline for JS libraries;
    minor legibility reduction at small display sizes
  - Annotation text (fontSize=12 SVG units) is on the smaller side for mobile readability
    — increase to 13-14
  - MUI X default chart frame/border retained; removing or softening via sx override
    would improve visual refinement (DE-02)
  - Lower-left annotation cluster (1989/1990, 1999/2000 labels near 4-6% unemployment)
    is dense, though not overlapping thanks to dx/dy offsets
