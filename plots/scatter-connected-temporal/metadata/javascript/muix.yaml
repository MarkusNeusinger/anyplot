      Data: Four connected-scatter paths: 1970s in brand green (#009E73), 1980s in lavender (#C475FD), 1990s in blue (#4467A3), 2000s in ochre (#BD8233). Each path has small open-circle markers at each data point (10 per decade). Lines connect points in temporal (chronological) order. Both horizontal and vertical grid lines visible at default MUI X opacity. No arrows or annotations indicating temporal direction within paths.
