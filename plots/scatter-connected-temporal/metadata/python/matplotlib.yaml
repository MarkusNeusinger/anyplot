    consistently across every element
  weaknesses:
  - 'Year annotation text color uses imprint_seq gradient color (color=imprint_seq(norm(idx))).
    For later-year annotations (~2013, ~2023) the blue end (#4467A3) on dark background
    #1A1A17 yields ~2.2:1 contrast — below WCAG AA (4.5:1) for small text. Fix: replace
    annotation text color with INK or INK_SOFT token while keeping the arrowprops
    leader lines in the gradient color.'
