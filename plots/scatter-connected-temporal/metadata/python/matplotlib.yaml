  strengths:
  - Temporal color gradient via imprint_seq correctly applied and invariant between
    light/dark themes
  - FancyArrowPatch directional arrows integrated with matching colormap colors at
    each path segment position
  - Year annotation text uses matching gradient color creating strong visual coherence
