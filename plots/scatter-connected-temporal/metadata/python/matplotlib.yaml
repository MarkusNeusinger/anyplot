review:
  strengths:
  - Excellent use of imprint_seq colormap applied segment-by-segment to both lines
    and scatter points — a technically sophisticated approach for continuous temporal
    encoding
  - FancyArrowPatch directional arrows add a uniquely matplotlib-native visual cue
    for temporal flow direction
  - Color-matched year annotations (labels inherit gradient color at each time position)
    create elegant visual cohesion
  - 'Perfect theme adaptation in both renders: backgrounds, chrome, colorbar outline,
    and marker edges all flip correctly; data colors are identical across themes'
  - Full spec compliance with all four required features (connected path, key-point
    annotations, directional arrows, color gradient) present and working
  - Clean code with np.random.seed(42), strict=True on zip, and explicit bbox_inches=None
    comment showing awareness of canvas-drift issue
  weaknesses:
  - Scatter marker size s=80 is below the recommended 100-200 for ~30 data points;
    individual year positions are harder to isolate visually, particularly in the
    dense cluster around 6.2-6.5% unemployment — increase to s=120-150
  - Year annotation fontsize=7 is slightly too small; at mobile display widths (~400px
    scaled from 3200px) these labels risk becoming unreadable — increase to 8-9pt
  - 'Design storytelling could be stronger: the Phillips curve story (cyclical regime
    changes across decades) is visible but not emphasized — adding subtle visual emphasis
    on the most economically significant inflection point would elevate DE-01 and
    DE-03'
