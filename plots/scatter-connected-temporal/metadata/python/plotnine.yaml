review:
  strengths:
  - Correct use of geom_path (not geom_line) to preserve temporal row-order rather
    than x-sorted order — demonstrates genuine plotnine knowledge
  - 'Full spec compliance: color gradient + directional arrows + key year annotations
    + recession highlight all present'
  - 'Proper imprint_seq gradient (#009E73 → #4467A3) for continuous temporal data'
  - Both theme renders pass readability checks with no dark-on-dark failures
  - Real-world Phillips curve dataset is historically accurate and editorially appropriate
  weaknesses:
  - Year annotation labels (geom_text size=3.5 mm ≈ 10pt) and "2009 Recession" annotation
    text are on the small side; increasing to size=4.0–4.5 would improve mobile-scale
    readability without cluttering the plot
  - Some visual complexity in the central path crossing area; consider slightly higher
    line alpha or a different visual weight to make the directional flow clearer amid
    crossings
