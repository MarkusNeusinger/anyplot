review:
  strengths:
  - Perfect spec compliance — geom_path correctly preserves temporal ordering, all
    required features present (gradient, year annotations, recession highlight)
  - Excellent data quality — realistic US Phillips curve data (1990-2020) with historically
    plausible unemployment and inflation values
  - Clean, idiomatic plotnine grammar-of-graphics code; geom_path vs geom_line distinction
    is the correct choice for temporal order
  - 'Temporal gradient (#009E73 → #4467A3) correctly implements imprint_seq for single-polarity
    continuous data'
  - 'Semantic recession annotation (red circle + label) adds meaningful editorial
    emphasis using #AE3030 semantic anchor appropriately'
  - Theme-adaptive chrome fully implemented — PAGE_BG, INK, INK_SOFT, ELEVATED_BG
    all branch on ANYPLOT_THEME for both renders
  weaknesses:
  - 'DE-01 MODERATE: Design is competent but not yet ''strong design'' — visual feels
    like a well-configured default rather than an intentional editorial design; no
    directional arrows on the path to reinforce temporal flow, spines are present
    (theme_minimal keeps them in plotnine by default)'
  - Year labels for 1995 and 2005 are positioned within the central tangled-path region
    (5–6% unemployment, 2–3% inflation) where multiple line segments cross — label
    offsets are small and leave labels overlapping with path lines; increase offsets
    or reduce to 3–4 key years (1990, 2000, 2010, 2020)
  - Annotation and year-label font sizes (geom_text size=3.0mm, annotate size=3.5mm
    ≈ 8–10pt equivalent) are on the smaller side; at 400px mobile width these render
    at ~5–7 source pixels, which is borderline legible
  - 'LM-02: Could leverage more distinctively plotnine/ggplot2 features — geom_path
    is a good choice but directional arrow geoms (geom_segment with arrow parameter)
    would be more idiomatic and distinctive'
