review:
  strengths:
  - 'Excellent temporal narrative: imprint_seq gradient (green→blue across 6 eras)
    encodes time direction visually and the ▶ 1990 / ● 2023 bookend markers frame
    the story clearly'
  - Three-tier marker hierarchy (dots_size 12→20→26) creates intentional visual prominence
    for era points, key events, and start/end anchors
  - 'Correct semantic anchor usage: amber (#DDCC77) for key years and #AE3030 for
    the start marker match the style-guide roles precisely'
  - SVG label-color patching correctly adapts year annotation text to INK token in
    dark theme, avoiding dark-on-dark failure
  - 'Full spec compliance: connected path, chronological connection, color gradient,
    key-year annotations, temporal direction arrow — all present'
  - Realistic and rich dataset (developing country GDP vs life expectancy 1990–2023)
    with correctly calibrated economic shocks (1998, 2008, 2020)
  - Interactive HTML output produced alongside the PNG — pygal's distinctive interactive
    feature used correctly
  weaknesses:
  - 'Label crowding in the $13k–$16k GDP band: the ''2005'' and ''2008'' year labels
    plus their amber dots cluster tightly with the era connection line — reduce label
    font size slightly or offset the labels outward to reduce visual noise'
  - Right margin is tight for the '● 2023' end-label — increase margin_right from
    80 to ~120 to give the label comfortable breathing room and prevent edge proximity
    on the dark render
  - Pygal's frame renders with all four spines (no spine removal support) — reduces
    visual refinement compared to the L-shaped or no-spine ideal; this is a library
    constraint but worth noting as a polish gap
  - The '2015' and '2020' labels in the upper-right zone also cluster near the data
    path — slightly larger x-offset for those label positions would improve readability
    at the dense end of the trajectory
  - Top margin (margin_top=60) is slightly small for the title; raising to ~90 would
    give the title line more separation from the top of the chart area
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "Life Expectancy vs GDP · scatter-connected-temporal · python · pygal · anyplot.ai" in dark ink at top, clearly readable. X-axis label "GDP per Capita (USD)" and Y-axis label "Life Expectancy (years)" are dark and readable. Tick labels ($8k–$22k, 68.0–78.0 yrs) in muted dark tone, readable. Subtle dashed grid lines visible without competing with data. Legend at bottom with 7 entries in 3 columns — all text readable.
      Data: Six era segments form a connected scatter path from lower-left (1990, ~$8k / 68 yrs) to upper-right (2023, ~$22k / 76.5 yrs). Colors progress from #009E73 (brand green, 1990–1997) through teal-to-blue interpolations to #4467A3 (2020–2023), correctly implementing imprint_seq. Amber (#DDCC77) dots mark key years (1998, 2005, 2008, 2015, 2020) with year labels in dark text. Red (#AE3030) large dot at 1990 start with "▶ 1990" label; dark-blue large dot at 2023 end with "● 2023" label. Dots clearly visible at 12/20/26px sizes. Some label crowding around $13k–$16k zone.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title text light-colored and readable against dark background. Axis labels and tick labels render in light ink, clearly legible. Grid lines subtle. Legend text readable. No dark-on-dark failures detected — the SVG label-color patch correctly changed year annotation text (1998, 2005, 2008, 2015, 2020, "▶ 1990", "● 2023") to INK (#F0EFE8), so they read as light text on the dark background.
      Data: Colors are identical to the light render — brand green (#009E73) first era, sequential gradient to blue (#4467A3) final era. Amber key-year markers and red/blue start/end markers retain their correct colors. Data colors unchanged between themes as required.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures.
