review:
  strengths:
  - 'Temporal gradient from #009E73 to #4467A3 elegantly encodes time progression
    using the imprint_seq ramp — matches spec intent exactly'
  - Era-segment colour coding with 6 named phases gives the legend semantic value
    beyond visual redundancy
  - Amber key-year markers (1998, 2005, 2008, 2015, 2020) contextualise historical
    economic events visually
  - Semantic red start / blue end anchoring creates a clear narrative arc across the
    scatter path
  - Correct imprint_seq continuous treatment for temporal gradient; palette compliance
    excellent
  - pygal interactive HTML export leveraged alongside PNG — distinctive library feature
    used well
  - Fully deterministic data generation with realistic GDP/life-expectancy shock events
    modelled
  weaknesses:
  - 'Dark-on-dark label failure: year annotation labels (rendered via print_labels=True)
    appear in dark ink on the dark (#1A1A17) background — pygal''s print_labels text
    does not automatically inherit the foreground Style token. Fix: override label
    text colour to INK (#F0EFE8) in dark mode via per-point label_color dict entries
    or by patching the SVG fill attribute before cairosvg conversion.'
  - 'X-axis tick label truncation: all X-axis ticks show ''$8,0...'', ''$9,0...''
    etc. — pygal abbreviates because tick label width exceeds the column width. Fix:
    use shorter formatter (lambda x: f''${x/1000:.0f}k'' producing ''$8k'', ''$9k''
    etc.) or reduce x_labels_major_count to give each label more horizontal room.'
  - Minor crowding of the End (2023) annotation label at the right canvas margin —
    in dark render this compounds the dark-on-dark issue.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "Life Expectancy vs GDP · scatter-connected-temporal · python · pygal · anyplot.ai" in dark ink — readable. Y-axis label "Life Expectancy (years)" and X-axis label "GDP per Capita (USD)" — readable. Y-axis tick labels "68.0 yrs" through "78.0 yrs" — clearly readable. X-axis tick labels TRUNCATED: showing "$8,0...", "$9,0...", "$10,..." etc. — GDP values not fully readable.
      Data: Six era segments from brand green (#009E73, 1990–1997) through teal shades to steel blue (#4467A3, 2020–2023). Amber (#DDCC77) larger dots mark key years 1998, 2005, 2008, 2015, 2020 with year text labels adjacent. Red (#AE3030) large dot at start (1990) with "▶ 1990" label. Large blue dot at end (2023) with "● 2023" label. Connected line follows temporal order through era segments.
      Legibility verdict: PARTIAL FAIL — X-axis tick label truncation; all other text readable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title, Y-axis label, Y-axis tick labels, and legend entries are in light text — readable. X-axis tick labels remain truncated (same issue as light render). CRITICAL FAILURE: year annotation labels ("▶ 1990", "1998", "2005", "2008", "2015", "2020", "2023") appear rendered in dark ink on the dark #1A1A17 background — dark-on-dark failure. These labels are barely visible or invisible in the dark render. This is because pygal's print_labels text does not automatically inherit the foreground Style token in dark mode.
      Data: Data colours identical to light render — correct. Era gradient segments, amber key markers, red start, blue end all visible (colours are theme-independent). The data colour constancy is correct.
      Legibility verdict: FAIL — year annotation labels are dark-on-dark (near-invisible); X-axis ticks truncated.
