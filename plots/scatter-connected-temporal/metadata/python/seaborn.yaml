      Chrome: Title "scatter-connected-temporal · python · seaborn · anyplot.ai" in dark near-black at top (12pt, medium weight). Italic subtitle "U.S. Phillips Curve Dynamics: Tracing Unemployment vs. Inflation (1990–2023)" centered just below in dark-soft gray (7pt). X-axis label "Unemployment Rate (%)" and Y-axis label "Inflation Rate (%)" in dark text (10pt). Tick labels in dark-soft gray (8pt). All readable against the light background.
      Data: 34 scatter points and connecting line segments both colored with imprint_seq gradient (brand green #009E73 for 1990 → blue #4467A3 for 2023). LineCollection lines at linewidth=1.8, alpha=0.85. Scatter markers at s=60 with PAGE_BG edge — visible but noticeably small for 34 data points. Colorbar on right labeled "Year" (1990–2022). Six annotation arrows pointing to key years (1990, 2000, 2009, 2012, 2019, 2023) in dark text. Subtle horizontal-only grid lines. L-shaped spine frame (top+right removed).
      Legibility verdict: PASS — all text readable. Annotation labels at 7pt are at the lower boundary but still readable at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, subtitle, axis labels, and tick labels all rendered in light cream/gray tones (#F0EFE8 / #B8B7B0 range). Colorbar tick labels and "Year" label appear in light gray. Grid lines subtle on dark background. No dark-on-dark failures observed — all chrome correctly flipped.
      Data: Scatter points and path lines show the identical imprint_seq gradient (brand green #009E73 early years → blue #4467A3 recent years) — data colors are identical to the light render as required. Only chrome flipped.
      Legibility verdict: PASS — no dark-on-dark issues. Year annotation text and arrows are visible against the dark background. Colorbar labels readable.
