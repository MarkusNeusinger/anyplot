review:
  strengths:
  - Correct imprint_seq colormap (brand green → blue) applied to both LineCollection
    and scatter markers for temporal gradient — palette-compliant and visually coherent
  - Six well-placed year annotations (1990, 2000, 2009, 2012, 2019, 2023) at economically
    meaningful turning points, with curved arrowheads and offset logic that avoids
    heavy overlap
  - Descriptive italic subtitle provides narrative context (Phillips Curve Dynamics)
    without cluttering the main title block
  - 'Theme adaptation is complete: all chrome tokens (PAGE_BG, INK, INK_SOFT) correctly
    applied to background, text, ticks, grid, legend, and colorbar in both light and
    dark renders'
  - No bbox_inches='tight' — canvas exactly 3200×1800 px per the seaborn library rule
  - Clean, flat KISS structure; all imports used; deterministic data; saves as plot-{THEME}.png
    correctly
  weaknesses:
  - Marker size s=60 is well below the density guideline (34 data points → s=100–200).
    The scatter dots are noticeably small relative to the canvas and to the connecting
    lines, making individual year positions harder to read on mobile-scaled views.
    Increase to s=110–130.
  - 'Seaborn''s role is limited to sns.scatterplot + sns.set_theme + sns.despine —
    the primary visual technique (temporal gradient path) uses matplotlib''s LineCollection
    directly. While this is a valid hybrid pattern, it reduces Library Mastery: the
    seaborn-idiomatic approach would be to use relplot or pair the LineCollection
    with seaborn''s FacetGrid, or at least use a seaborn-native continuous palette
    approach more prominently.'
  - Annotation font size of 7pt is at the lower boundary of legibility. Combined with
    the bold weight this is readable at full resolution but may be marginal at the
    400px mobile thumbnail. Increase to 8–9pt.
  - No directional arrow drawn on the temporal path itself (only annotation call-out
    arrows). The spec notes 'an arrow...can indicate the direction of time' — a small
    arrowhead drawn mid-path (e.g. on the segment 2019→2020) would make temporal direction
    immediately obvious without relying on the colorbar or annotations alone.
  image_description: |-
