review:
  strengths:
  - Excellent temporal encoding using Imprint sequential palette (brand green → blue)
    with LinearColorMapper — intuitively shows the passage of time
  - 'Sophisticated design: variable line widths (2–5px) and alphas (0.45–0.95) fade
    older segments, creating natural visual recency emphasis'
  - Compelling real-world data (US Phillips Curve 1990–2023) with annotated economic
    turning points (GFC 2009, COVID 2020, inflation spike 2022)
  - 'Both light and dark themes render correctly: backgrounds are #FAF8F1 / #1A1A17,
    all chrome tokens (INK, INK_SOFT) correctly adapted'
  - 'Idiomatic Bokeh usage: ColumnDataSource, multi_line with per-segment properties,
    transform() + LinearColorMapper for ColorBar — all distinctly Bokeh patterns'
  - CDP-based viewport override (Emulation.setDeviceMetricsOverride) ensures exact
    3200×1800 dimensions — more reliable than --window-size alone
  weaknesses:
  - Title is missing the 'python' language component — should be 'US Phillips Curve
    Dynamics (1990–2023) · scatter-connected-temporal · python · bokeh · anyplot.ai'
    (SC-04 deduction)
  - Dense central cluster (3–5% unemployment, 1.5–3.5% inflation) where many data
    segments overlap creates visual noise — earlier data from the 1990s through 2010s
    converges in this zone, making it hard to trace the individual year-to-year path
    without the colorbar reference
  - Year annotation labels (font_size='26pt') are well-placed but 'annotations' (1999,
    2009) label text is fairly close to adjacent data points; a slightly larger y_offset
    would reduce ambiguity about which point each label refers to
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct light surface, not pure white.
