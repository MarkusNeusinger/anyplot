      Data: 34 data points with marker size=20, ink outline, colored via Imprint sequential gradient from #009E73 (brand green, 1990) to #4467A3 (blue, 2023). Connecting multi-line segments vary in width (2–5px) and alpha (0.45–0.95) — older segments thinner/more transparent. The temporal path is clearly readable. The 2022 data point (8% inflation, low unemployment) stands out prominently in the upper-left. The connected path reveals the Phillips curve dynamics and regime changes.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
