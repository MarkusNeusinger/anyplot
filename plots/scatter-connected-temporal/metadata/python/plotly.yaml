review:
  strengths:
  - Sequential Imprint colormap (green→blue) applied to both line segments AND markers
    — temporal direction is immediately visible without reading labels
  - Interactive hover tooltips with custom year/unemployment/inflation data — excellent
    use of plotly's native interactivity
  - Directional arrows using data-coordinate system (axref/ayref='x'/'y') correctly
    show temporal flow between specific years
  - Realistic US Phillips Curve dataset (1990–2023) with historically accurate values
    including the 2022 inflation spike, providing genuine narrative value
  - Theme-adaptive annotation backgrounds (ELEVATED_BG) and full chrome token coverage
    — both renders pass readability checks
  - Both PNG and HTML outputs saved with correct canvas (3200×1800)
  - Hardcoded data with no randomness — fully reproducible
  weaknesses:
  - '''2020'' annotation label and ''2000s'' decade italic label are nearly overlapping
    in the lower-right area (data coords ~x=7.8-8.1, y=-0.1 to -0.4) — shift the ''2000s''
    label to x=8.5, y=0.8 or move ''2020'' annotation ax_off to place text above the
    data point rather than below'
  - Center of the plot is visually busy with many criss-crossing path segments making
    it hard to trace the temporal sequence — consider reducing line opacity further
    (0.45) in dense regions or adding a subtle fade for older segments
  - 'DE-02: plotly_white template is declared but immediately overridden by custom
    theme tokens — remove the redundant template=''plotly_white'' to keep code clean
    and avoid potential conflicts with bg color settings'
  - 'DE-01: decade labels (''1990s'', ''2000s'', etc.) are placed at fixed coordinates
    that may overlap data points in some views — consider placing them in less-cluttered
    margins or as light watermark-style annotations'
  image_description: |-
