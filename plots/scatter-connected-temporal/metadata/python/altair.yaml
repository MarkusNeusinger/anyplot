review:
  strengths:
  - 'Temporal color gradient uses correct imprint_seq range (#009E73 → #4467A3), encoding
    time direction visually in the most appropriate Altair-idiomatic way'
  - Layer composition (path + points + annotations) is textbook Altair — order:Q encoding
    for the connecting line is a library-specific feature that non-Altair users would
    not discover easily
  - 'Theme-adaptive chrome is thorough: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all thread
    through configure_axis, configure_legend, configure_title, and mark_text color
    — both renders pass the legibility check'
  - Year annotations with explicit nudge offsets avoid naive label-point collisions;
    the 2008 recession spike and the 2023 low-inflation cluster are correctly identified
    and labelled
  - Canvas handling follows the PAD-only pattern exactly — raises SystemExit if vl-convert
    overshoots, pads with PAGE_BG if undershoots — no crop risk
  weaknesses:
  - 'Mild annotation crowding: ''1994'' (nudged to y≈3.3) and ''2010'' (nudged to
    y≈2.95) are vertically close in the right-centre cluster; consider increasing
    the y-nudge for 1994 from 0.30 to 0.55 so the two bold labels have a full text-line
    of separation'
  - 'DQ-03: Data is plausibly realistic but synthetically generated; the 2008 unemployment
    spike is hand-tuned rather than sourced from actual Bureau of Labor Statistics
    figures — values are reasonable but not fact-checked against historical records'
  - DE-01 is above generic defaults (temporal gradient is intentional) but the connecting
    path uses a plain gray (INK_SOFT) with no arrowheads or directional marker — an
    arrow at the final point or a slightly tapered path would lift the storytelling
    from good to excellent
