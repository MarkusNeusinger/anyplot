review:
  strengths:
  - Two-panel PMC layout with linkxaxes! for shared x-axis is the correct Makie-idiomatic
    approach for this chart type
  - Correct TrainingPeaks-standard EWMA formula implementation with realistic 180-day
    cycling season (base→build→peak→taper periodization)
  - 'Semantic-aware Imprint palette: brand green for CTL/fitness and TSB+ fresh form,
    lavender for ATL fatigue, blue for daily TSS bars, matte red for TSB- fatigued
    form'
  - Two-toned TSB fill (green positive, red negative) with zero reference line cleanly
    separates fresh from fatigued states
  - All font sizes explicitly set with full theme-adaptive chrome — both light and
    dark renders are fully readable with no dark-on-dark or light-on-light failures
  - Custom legend with LineElement and PolyElement correctly represents each series
    type (line vs. fill area)
  weaknesses:
  - 'DE-01: Publication-ready PMC charts typically mark key season phases (Base /
    Build / Peak / Taper) with vertical span annotations or phase labels — adding
    these would push the storytelling closer to FiveThirtyEight-level polish'
  - 'DE-02: The row gap between the two panels (6px) is quite tight; increasing to
    ~12-16px would give the chart more breathing room and make the panel boundary
    clearer'
  - TSB negative fill at 0.22 alpha on dark background (#1A1A17) is noticeably darker/less
    visible than on the light background — consider slightly higher alpha (0.28-0.32)
    for the dark theme to maintain visual parity
