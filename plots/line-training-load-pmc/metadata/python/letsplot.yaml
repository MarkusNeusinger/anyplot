review:
  strengths:
  - 'Excellent realistic data: 180-day periodized training block with EWMA-correct
    CTL/ATL/TSB calculations and authentic weekly structure'
  - Two-toned TSB ribbon elegantly distinguishes positive form (blue, fresh) from
    negative form (red, fatigued) with semantic palette colors
  - Multi-panel gggrid layout (75%/25%) cleanly separates smoothed training load from
    raw TSS input — matches PMC best practice
  - 'Full Imprint palette compliance with justified semantic exception for TSB fills;
    first series = #009E73 correct'
  - Perfect canvas sizing (ggsize(800,450) + scale=4 = 3200x1800) and correct theme-adaptive
    chrome in both renders
  weaknesses:
  - Legend is missing Form (TSB) entries and daily TSS label — spec requires legend
    distinguishing all four series (CTL, ATL, Form/TSB positive/negative, TSS); add
    ribbon/fill legend entries for 'Positive Form (TSB)' and 'Negative Form (TSB)'
    using scale_fill_manual or geom_rect legend keys
  - Top and right spines not removed — style guide requires L-shaped frame; add theme(panel_border=element_blank())
    or axis_line settings to remove top/right borders from both panels
  - TSB ribbon fills at alpha=0.22 are quite faint; increase to alpha=0.30-0.35 to
    make positive/negative form zones more visually prominent without overwhelming
    the CTL/ATL lines
