review:
  strengths:
  - Two-panel gggrid layout cleanly separates CTL/ATL/TSB dynamics from raw daily
    TSS input — a purposeful, spec-faithful design choice
  - 'Semantic Imprint palette assignment is excellent: green for Fitness, lavender
    for Fatigue, blue for positive form, matte red for negative form — all from the
    palette, no custom hexes'
  - Correct EWMA formulas for CTL (42-day) and ATL (7-day) with TSB derived as previous-day
    CTL minus ATL — textbook PMC implementation
  - 'Theme-adaptive chrome fully implemented: background, INK, INK_SOFT, INK_MUTED
    all switch correctly between light (#FAF8F1) and dark (#1A1A17) themes'
  - No axis tick marks (element_blank()) + subtle grid (size=0.3) + panel border removed
    — clean visual refinement above library defaults
  - KISS code structure with np.random.seed(42) reproducibility, clean imports, and
    pd.melt() for idiomatic long-format CTL/ATL series
  - HTML output saved alongside PNG for both themes via ggsave
  weaknesses:
  - Legend overlaps CTL/ATL line data in the upper-right quadrant of the main panel
    — consider moving to a non-overlapping position or using direct line labels instead
    of a boxed legend
  - TSB ribbons at alpha=0.32 are slightly faint, especially the negative (red) regions
    — raising alpha to 0.45-0.50 would make the form zones more readable without overwhelming
    the CTL/ATL lines
  - Lower TSS panel with heights=[3,1] ratio is quite compressed — individual daily
    bars are thin; consider heights=[3,1.2] or reducing bar count visibility to improve
    readability
