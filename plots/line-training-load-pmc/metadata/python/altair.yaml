  weaknesses:
  - X-axis tick format %b %Y with auto tick density causes duplicate adjacent month
    labels (Jan 2025 appearing twice in sequence) — add tickCount=month to show each
    month exactly once
  - Legend symbols for Form (TSB) and Daily TSS render as lines rather than area swatch
    and bar because they use dummy NaN entries in the line-mark layer — misleads about
    actual mark types
