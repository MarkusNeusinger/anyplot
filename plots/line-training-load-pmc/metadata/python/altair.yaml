review:
  strengths:
  - Semantic Imprint palette assignment for PMC metrics fully justified and matches
    domain conventions (blue=fitness, lavender=fatigue, green=fresh, red=fatigued
    — all from Imprint palette)
  - EWMA implementation with correct time constants (42-day CTL, 7-day ATL) and previous-day
    TSB convention is domain-accurate
  - Two-panel alt.vconcat() layout with alt.Y2(datum=0) TSB fills is an elegant Altair-idiomatic
    solution to the dual-scale PMC problem
  - Realistic 26-week training block with 3-week build / 1-week recovery mesocycle
    gives the chart genuine data story (CTL rising from 52 to ~85)
  - Theme-adaptive chrome is complete and correct in both light and dark renders —
    INK/INK_SOFT/ELEVATED_BG all correctly applied
  weaknesses:
  - 'Legend only labels CTL and ATL — spec requires legend distinguishing all four
    PMC components: Fitness (CTL), Fatigue (ATL), Form (TSB), and Daily TSS. Add legend
    entries for TSB positive/negative fill areas and TSS bars.'
  - 'TSB filled-area opacity (0.30) is slightly low in dark mode, making the green
    positive-form pockets appear very dark against #1A1A17 background — increase to
    0.40-0.45 or add a thin line stroke on the area marks for better dark-theme contrast.'
  - Design excellence could be pushed further — consider a subtle annotation marking
    the taper window or adding more breathing room between the two panels to guide
    the viewer's attention to the key PMC insight (rising fitness, controlled fatigue).
