  strengths:
  - Semantically justified Imprint palette assignment matching domain conventions
    (blue=fitness, lavender=fatigue, green=fresh, red=fatigued)
  - Clean two-panel layout separating smooth PMC trends from raw TSS bars
  - TSB two-toned fill (green above zero, red below) immediately communicates athlete
    form state
  - Realistic 180-day synthetic training block with 3:1 build:recovery mesocycle structure
  - Theme-adaptive chrome correctly implemented in both renders with no dark-on-dark
    failures
