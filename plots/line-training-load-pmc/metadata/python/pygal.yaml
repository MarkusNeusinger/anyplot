      Chrome: Title and axis labels in light-coloured ink — readable. Same six-entry legend with same truncation. Tick labels in muted light tone — readable. No dark-on-dark text failures detected anywhere.
      Data: Colours identical to light render — green CTL, lavender ATL, red TSB-negative fill, blue TSB-positive fill, ochre TSS spikes. Only background and text chrome have flipped.
      Legibility verdict: PASS (all text readable against dark background; no dark-on-dark failures)
