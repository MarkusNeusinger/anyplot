review:
  strengths:
  - Two-toned TSB fill (blue for fresh/positive, red for fatigued/negative) correctly
    implemented using allow_interruptions=True and split positive/negative series
  - Imprint palette applied correctly with semantic colour assignments (CTL=green,
    ATL=lavender, fatigue=red, fresh=blue)
  - Realistic 6-month training block with correct EWMA formulas and 3-week-build/1-week-recovery
    periodisation
  - Stroke-width hierarchy (CTL 5.5, ATL 3.5, TSB fills 1.5) gives visual weight to
    the most important signals
  - 'Perfect code quality: reproducible, clean imports, correct output format, no
    fake UI'
  - Interactive HTML export alongside PNG leverages pygal native strength
  weaknesses:
  - 'Daily TSS rendered as a full line chart reaching 100-130 units, dominating the
    CTL/ATL signal. Spec requires TSS as light points or thin bars near the bottom
    without dominating. Fix: use show_dots=True with a small dot size and suppress
    the TSS stroke (stroke_style width 0) so TSS appears as scattered dots rather
    than tall spikes; alternatively clip visible range so TSS dots cluster near the
    top of a compressed scale'
  - 'Legend labels truncated by pygals narrow left-legend area: Form TSB (fresh) becomes
    Form TSB (fres...) and Form TSB (fatigued) becomes Form TSB (fati...). Fix: shorten
    series names to 12 chars or fewer or switch to legend_at_bottom=True which gives
    more horizontal space for full names'
  - 'Design storytelling is weak: the taper period and form peak are visible in the
    data but not visually highlighted. Consider adding a vertical marker or annotation
    at day 155 (race day) to anchor the narrative'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "line-training-load-pmc · python · pygal · anyplot.ai" in dark ink, centred — readable. Y-axis label "Training Load (TSS pts)" rotated left — readable. X-axis label "Date (2024)" at bottom — readable. Six monthly tick labels (Jan–Jun 2024) along x-axis. Six-entry left-side legend — "Form TSB (fresh)" and "Form TSB (fatigued)" truncated to "Form TSB (fres..." / "Form TSB (fati..." by narrow legend column.
      Data: CTL green (#009E73) smooth rising line; ATL lavender (#C475FD) more oscillating; TSB-negative fill in matte red (#AE3030) dominant below zero; TSB-positive fill in blue (#4467A3) small islands; Daily TSS in ochre (#BD8233) as tall jagged spikes reaching 100-130 units — overwhelms CTL/ATL signal.
      Legibility verdict: PASS (all chrome readable; legend truncation is a content issue, not a contrast failure)

    Dark render (plot-dark.png):
