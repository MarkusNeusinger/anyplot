review:
  strengths:
  - 'Correct Imprint palette assignment: reference line uses INK_MUTED neutral anchor,
    then CTL=#009E73, ATL=#C475FD, Form=#4467A3, TSS=#BD8233 — semantically well-reasoned'
  - Highly realistic EWMA data generation with authentic 3-week build / 1-week recovery
    periodization and a proper 2-week taper leading to race day
  - 'Idiomatic pygal usage: x_labels_major for sparse month-start labels, show_minor_x_labels=False,
    per-series stroke_style width differentiation (5.5/3.5/2.5/1.5)'
  - Both PNG and interactive HTML saved for both themes — correct pygal artifact set
  - sys.path.pop(0) fix for script-name collision with the pygal package is a nice
    robustness detail
  - 'Theme adaptation is correct: background, foreground, foreground_strong, foreground_subtle
    all derived from ANYPLOT_THEME'
  - Canvas is exactly 3200×1800 — hard rule satisfied
  weaknesses:
  - 'SC-02 MISS: TSB (Form) must be rendered as a FILLED AREA relative to the zero
    baseline, not a plain line. Spec says ''filled area or band, ideally two-toned
    (positive form = fresh, negative = fatigued)''. Fix: add fill=True per-series
    on the Form TSB chart.add() call (pygal supports per-series fill). Optionally
    split into two filled series (positive / negative) with green vs red for the two-toned
    effect.'
  - 'X-axis major labels appear as indistinct small marks at both renders — month
    names (''Jan 2024'', ''Feb 2024'' etc.) are unclear. Likely a pygal rendering
    artefact with 180 empty-string labels in x_labels alongside 6 major labels. Consider
    setting explicit x_labels only at month starts (6 entries) and removing the empty-string
    approach: chart.x_labels = x_labels_major works directly.'
  - 'Design: no visual hierarchy or focal point — the taper and race day (day 155/June
    4) are the story of the chart but are not annotated or emphasized. A vertical
    annotation at the race date or a shaded taper window would significantly improve
    storytelling (DE-03).'
  - Pygal box frame (all 4 spines) is retained by default; DE-02 is limited by the
    library, but removing dots is already done — no further action needed on spines
    for pygal.
