review:
  strengths:
  - Semantically justified Imprint palette mapping (CTL=green/fitness, ATL=red/fatigue,
    TSS=blue/neutral) with clear domain rationale
  - Secondary y-axis properly implemented via make_subplots, keeping TSB oscillations
    readable against CTL/ATL scale
  - 'CVD-safe design: ATL uses both dotted dash AND semantic red so colorblind readers
    can distinguish from CTL solid green'
  - 'Full PMC spec compliance: TSS bars, CTL/ATL smoothed lines, two-toned TSB filled
    zones, zero reference line, legend, dual axis — all present'
  - 'Clean code: np.random.seed(42), no functions/classes, only used imports, correct
    output filenames'
  - Per-trace custom hovertemplate enriches interactivity; bar width in milliseconds
    correctly fills date slots without gaps
  - 'Both renders fully theme-adaptive: background (#FAF8F1 / #1A1A17), INK/INK_SOFT
    tokens applied to all chrome elements'
  weaknesses:
  - TSB fill opacity (0.18) is quite subtle — the positive/negative form zones can
    be hard to distinguish at smaller render sizes; raising to 0.25-0.30 would improve
    readability without cluttering the chart
  - TSB=0 reference line (1px dotted in INK_SOFT) is nearly invisible where it passes
    through the TSB fills — consider slightly thicker or higher-contrast styling
  - Form (TSB) legend line uses INK_SOFT (#4A4A44 in light) which reads as near-black
    and can be momentarily confused with a spine or axis line in the light render;
    adding a small stylistic distinction (e.g. dashed) could help
  - 'DE-02: top/right spines not explicitly removed — `mirror=False` stops mirroring
    but full spine removal (`showline=False` on top/right, or `fig.update_layout(xaxis_showline=False…)`)
    would give a cleaner look'
