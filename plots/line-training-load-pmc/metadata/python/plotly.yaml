  weaknesses:
  - Red (#AE3030) and green (#009E73) are the primary distinguishers for CTL vs ATL
    without redundant encoding (distinct line styles or markers) — deuteranopic/protanopic
    users may struggle to separate them; add dashes to one line (e.g. ATL as dash=dot)
    to provide a non-color cue
  - TSB Form line (1.5px, INK_SOFT gray) is the thinnest element on the chart; increasing
    to 2px and adding a subtle marker at key events (e.g. peak TSB) would aid reading
  - Plotly default plot border (all four spines) is retained; removing top and right
    spines via fig.update_xaxes(showline=True, mirror=False) would give a cleaner
    L-frame per style-guide defaults
  - Bar chart TSS bars are drawn with width=auto which can leave gaps; setting width=86400000
    (one day in ms) ensures bars fill the day slots without gaps
  - Legend is upper-left but sits partially over the first few bars; shifting to x=0.01,
    y=0.99 or moving to lower-right would avoid data overlap during high-TSS January
    weeks
