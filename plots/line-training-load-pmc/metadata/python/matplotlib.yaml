review:
  strengths:
  - 'Semantically correct Imprint palette: green (#009E73) for fresh/positive form,
    matte red (#AE3030) for fatigued/negative form, blue (#4467A3) for CTL, lavender
    (#C475FD) for ATL — all grounded in domain convention and spec language'
  - Z-order layering technique (ax2.set_zorder / ax1.patch.set_visible) correctly
    renders TSB fills behind the primary axis data without transparency overlap artifacts
  - Two-toned fill_between with where= and interpolate=True produces a clean above/below
    zero area without stepped artifacts at crossings
  - 'Complete theme-adaptive chrome: all non-data elements (title, labels, ticks,
    spines, grid, legend frame/text) correctly use INK/INK_SOFT/ELEVATED_BG tokens
    in both renders'
  - Realistic periodized training data with EWMA calculation, mesocycle structure,
    stage race events, and taper progression — reads as genuine athlete data
  weaknesses:
  - 'DE-03: Key training events (stage races at days 40-43 and 118-121, taper onset
    at day 159) are visible in the data but not annotated — a small text label or
    vertical event marker at each race block would make the PMC narrative immediately
    legible without requiring domain knowledge'
  - 'DE-01: The visual hierarchy between the four series (CTL, ATL, TSB fills, TSS
    bars) is effective but the final plot lacks a clear hero focal point — the taper
    recovery story (green form rising at the end) could be more visually prominent
    with a light axvspan or vertical rule at taper onset'
