review:
  strengths:
  - 'Semantic Imprint palette assignments: green=fitness (CTL), lavender=fatigue (ATL),
    blue=fresh form, matte-red=fatigued form — colors reinforce data meaning'
  - 'Complete PMC feature set in a single ggplot2 plot: CTL/ATL lines, two-toned TSB
    ribbons, TSS bars, TSB=0 reference line, secondary y-axis'
  - Both themes fully legible with correct chrome flipping — no dark-on-dark failures
    in dark render
  - Realistic 180-day cyclist training dataset with proper EWMA computation (42-day
    CTL, 7-day ATL) and phased build/recovery/taper structure
  - 'Modern ggplot2 idioms: linewidth=, inside legend placement, sec_axis()'
  weaknesses:
  - TSS daily bars have no legend entry — spec requires distinguishing all four metrics
    including daily TSS; add a manual legend swatch using guide override or a dummy
    aesthetic
  - Two separate legend boxes (fill + color) consume upper-left canvas space; merge
    into one vertical box using guides() with consistent order
  - library(scales) imported but not explicitly used — ggplot2 already depends on
    scales internally; remove the standalone library() call
  - Right-axis title size=9 vs left-axis size=10 creates minor typographic imbalance
    — both should be 10pt
