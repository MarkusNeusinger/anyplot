review:
  strengths:
  - Complete, correct PMC implementation with all four components (CTL, ATL, TSB ribbon,
    daily TSS) using accurate EWMA formulas
  - Two-toned TSB ribbon using Imprint semantic anchors (blue=fresh, red=fatigued)
    communicates athlete form at a glance with correct palette positions
  - Dual-axis via sec_axis correctly transforms so TSB=0 aligns at visual center of
    chart
  - guide_legend(override.aes=...) elegantly mixes line and fill swatches across 5
    heterogeneous geom types in a single legend
  - All chrome tokens fully threaded through theme — both renders fully readable with
    no dark-on-dark failures
  weaknesses:
  - Daily TSS segments at linewidth=0.2 are extremely thin — may disappear at mobile-thumbnail
    widths (~400 px); increase to linewidth=0.4-0.5
  - Positive TSB ribbon (blue, alpha=0.35) appears as washed-out gray on warm off-white
    light background; increase alpha to 0.45-0.50 for clearer blue appearance
