review:
  strengths:
  - Correct EWMA implementation (42-day CTL, 7-day ATL, lag-1 TSB) from the spec formulas
  - Sophisticated five-layer composition with intentional visual hierarchy — TSS bars
    frame context, TSB fills signal form, CTL/ATL lines carry the main fitness narrative
  - 'Semantically justified palette choices: brand green for fitness, red (palette[4])
    as semantic anchor for fatigued/negative TSB'
  - 'Full spec feature coverage: dual axes, two-toned TSB, zero-reference dashed line,
    all four series in legend'
  - Realistic 180-day periodized training data with correct phase structure, rest
    days, and day-of-week variability
  - Browser-compatible seeded LCG for deterministic output without native RNG
  - Clean D3 code with clip paths preventing data overflow across both theme renders
  weaknesses:
  - Form+/Fresh blue fill (opacity 0.18) is barely visible on the light render and
    nearly invisible on the dark render — increase opacity to 0.30–0.35 so the positive-form
    taper period is clearly legible as blue, not just inferred from the TSB line stroke
  - Tick labels and axis labels both use 14px, collapsing the typographic hierarchy
    — consider 12px for tick labels to better distinguish axis labels from tick-label
    chrome
  - No annotations to highlight key training moments (e.g., taper start, peak CTL)
    that would lift the data storytelling to a higher level
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface
      Chrome: Title "line-training-load-pmc · javascript · d3 · anyplot.ai" centered, bold, clearly readable. Left y-axis label "Training Load (TSS)" and right y-axis label "Form / TSB" both visible. X-axis monthly tick labels (Oct '25 through Mar '26) readable. Legend in upper-right with all 5 series labeled — all text readable.
      Data: CTL line in brand green #009E73 (smooth, rising fitness curve). ATL line in lavender #C475FD (spiky weekly oscillation). TSB positive fill in blue #4467A3 at opacity 0.18 (subtle, barely perceptible). TSB negative fill in red #AE3030 at opacity 0.22 (visible, dominates the building phase). TSB stroke in blue at opacity 0.65 (readable form oscillation line). Daily TSS bars in inkSoft gray at opacity 0.28 (subtle background context). Dashed TSB=0 reference line visible.
      Legibility verdict: PASS — all text readable; first series is #009E73 brand green

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title, axis labels, tick labels, and legend text all flip to light/warm-gray tones (inkSoft token). No dark-on-dark text failures detected. All text elements clearly readable against the dark background.
      Data: Colors are identical to the light render — CTL green, ATL lavender, TSB fills blue/red. On the dark surface, the red negative-TSB fill is visually stronger. The Form+/Fresh blue fill at opacity 0.18 becomes near-invisible against the near-black background — this is the primary visual weakness. CTL and ATL lines remain clearly distinguishable. Brand green #009E73 reads well on dark surface.
      Legibility verdict: PASS for chrome text; PARTIAL FAIL for Form+/Fresh blue TSB fill (opacity 0.18 insufficient on dark background — element barely visible)
