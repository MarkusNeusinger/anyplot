review:
  strengths:
  - Correct PMC with all four signals (CTL, ATL, TSB, daily TSS) rendered faithfully
  - 'Semantically correct color assignments: green (fitness), lavender (fatigue),
    blue (fresh/positive form), red (fatigued/negative form) — all Imprint palette
    members with justified semantic reasoning'
  - Two-tone TSB filled area using separate d3.area() generators for positive and
    negative regions — distinctively D3
  - Dual Y-axes correctly separate CTL/ATL scale from TSB oscillating scale
  - Seeded LCG RNG provides reproducibility in browser context where Math.random()
    cannot be seeded
  - Realistic 180-day cycling season with periodized build → peak → race prep → taper
    arc, realistic EWMA math
  - Clip paths prevent data from bleeding outside the plot area on all layers
  - Dashed zero reference line at TSB=0 cleanly separates fresh (positive) from fatigued
    (negative) zones
  - All font sizes explicitly set; both renders are clean and fully readable
  weaknesses:
  - 'Dark render: negative TSB fill (#AE3030 at opacity 0.22 on #1A1A17) creates a
    murky brownish zone — consider raising opacity to 0.30 or using a slightly warmer
    red for better distinction in dark mode'
  - Legend border box adds visual noise — consider removing the stroke or replacing
    with a more minimal translucent fill only
  - No phase-transition markers or annotations indicating the build / peak / taper
    boundaries — would strengthen data storytelling without requiring extra spec features
