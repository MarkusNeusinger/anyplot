review:
  strengths:
  - 'Complete PMC spec implementation: all seven required elements (CTL line, ATL
    line, two-tone TSB fill, TSS bars, secondary y-axis, zero reference, four-element
    legend) present and working.'
  - 'Semantically-aware color mapping: green=fresh form (positive TSB), red=fatigued
    (negative TSB), blue=long-term fitness (CTL), purple=acute fatigue (ATL) — domain-appropriate
    and visually intuitive.'
  - 'Excellent data modeling: xorshift RNG for browser reproducibility; realistic
    phase-based TSS distribution (base → intensity → peak → taper); proper EWMA formulas
    for CTL (42-day) and ATL (7-day); rest days correctly modeled.'
  - 'Both renders pass theme-readability checklist: no dark-on-dark failures, all
    chrome tokens correctly applied across light and dark themes.'
  - 'Clean, deterministic code with appropriate complexity for this chart type; no
    fake interactivity; correctly follows ECharts initialization rules (no explicit
    size, animation: false, transparent background).'
  weaknesses:
  - 'First categorical series (Fitness/CTL) uses t.palette[2] (blue #4467A3) rather
    than brand green t.palette[0] (#009E73). Green IS used for positive TSB (semantically
    appropriate), but the strict ''first series = #009E73'' rule is not satisfied.
    Repair should either (a) assign CTL to t.palette[0] and pick another color for
    positive TSB form, or (b) document the semantic exception more explicitly.'
  - 'Zero reference line uses a dedicated _tsb_zero series instead of idiomatic ECharts
    markLine: { silent: true, symbol: [''none'',''none''], lineStyle: { color: t.inkSoft,
    opacity: 0.55, width: 1 }, data: [{ yAxis: 0 }] } on the secondary axis.'
  - 'Design Excellence is functional but not premium: no annotations marking key training
    events (Peak Fitness, Race Week, taper start), no markArea for training phase
    shading, no custom typography or refined visual hierarchy beyond baseline ECharts
    configuration.'
  - 'Secondary Y-axis should explicitly set splitLine: { show: false } to prevent
    potential grid line overlap with the primary axis grid on the right side.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · echarts · anyplot.ai" in dark bold text centered at top, ~85% canvas width — readable. Left Y-axis name "Load (TSS units)" and right Y-axis name "Form (TSB)" in muted dark text — readable. Tick labels on both axes in dark muted gray (t.inkSoft) — readable. Legend at bottom with four entries in dark muted text — readable.
      Data: CTL (blue #4467A3) smooth rising line on primary axis; ATL (lavender #C475FD) reactive line on primary axis; Positive TSB form area in green (#009E73) fills where CTL > ATL (end of season taper most prominent); Negative TSB area in matte red (#AE3030) fills where ATL > CTL (heavy training mid-season); Daily TSS thin gray vertical bars at 35% opacity across the full date range.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in light off-white text — readable, no dark-on-dark failure. Left and right Y-axis names in muted light gray — readable. Tick labels on both axes in light muted color (t.inkSoft dark token #B8B7B0) — readable. X-axis date labels in light muted color — readable. Legend text in light muted color — readable. No dark-on-dark failures detected.
      Data: Colors are IDENTICAL to light render — CTL blue (#4467A3), ATL lavender (#C475FD), TSB positive green (#009E73), TSB negative matte red (#AE3030). Only chrome flips. Daily TSS bars use t.inkSoft (light gray at 35% opacity in dark theme) — subtle but appropriately muted as raw input background data.
