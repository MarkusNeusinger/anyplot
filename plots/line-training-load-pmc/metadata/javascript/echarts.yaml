review:
  strengths:
  - 'Perfect spec compliance: all PMC features implemented correctly (CTL/ATL/TSB/TSS,
    dual y-axis, two-toned TSB area, TSB=0 reference line, secondary axis)'
  - Two-tone TSB (positive blue / negative matte-red) is a sophisticated and elegant
    response to the spec's 'ideally two-toned' requirement, using correct Imprint
    semantic color for negative form
  - Phase annotations (Base/Intensity/Peak/Taper) via markArea with subtle background
    shading create excellent narrative context and data storytelling unique to ECharts
  - Deterministic xorshift LCG (seed=12345) produces physiologically realistic training
    data with proper 42-day/7-day EWMA calculations and a realistic taper phase
  - 'Correct Imprint palette usage throughout: brand green #009E73 for CTL (first
    series rule), lavender for ATL, blue for positive TSB, matte red semantic anchor
    for negative form, muted inkSoft for TSS bars'
  weaknesses:
  - Phase shading opacity (0.04) is essentially invisible in the dark render — consider
    branching on isDark to increase to 0.07-0.08 for the dark theme so the phase regions
    remain visible
  - markArea and markLine annotation labels use fontSize 10 (CSS px, so 20 native
    px at 2x DPR) — slightly small; 11-12px would improve legibility at smaller viewport
    widths without overcrowding
  - 'Axis lines are kept visible (axisLine: { show: true }) — removing the right/top
    axis lines or reducing their opacity would add visual refinement toward the L-shaped
    frame style'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface (#FAF8F1) — correct, not pure white.
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · echarts · anyplot.ai" appears at top center in dark ink at a scaled font size (~20px CSS, appropriate for the long string). Left y-axis label "Load (TSS units)" and right y-axis label "Form (TSB)" both readable. X-axis tick labels (Dec 16 → Jun 2) rendered in t.inkSoft at 13px CSS, clearly readable. Legend at bottom shows all four series correctly labeled.
      Data: Brand green (#009E73) CTL/Fitness line (3.5px smooth) rises from ~38 to ~85 across the 180-day block. Lavender (#C475FD) ATL/Fatigue line (2.5px) shows higher volatility as expected from 7-day EWMA. Two-toned TSB: positive region filled in blue (#4467A3, opacity 0.45) above the zero line; negative region in matte red (#AE3030, opacity 0.40) below — two large red areas dominate Feb–May as the athlete accumulated fatigue. Muted gray daily TSS bars (opacity 0.35) form the background layer. Subtle phase shading (opacity 0.04) with italic labels "Base / Intensity / Peak / Taper" provide training phase context. Dashed vertical line marks peak CTL with "Peak" label.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, tick labels, and legend all rendered in light ink (t.ink / t.inkSoft) that reads cleanly against the dark surface. No dark-on-dark failures observed. Both y-axis labels and x-axis tick labels are clearly visible.
      Data: Data colors are identical to the light render — brand green CTL, lavender ATL, blue positive TSB area, matte red negative TSB area, gray muted TSS bars. Colors read correctly on the dark surface. Phase shading at opacity 0.04 is essentially invisible in dark mode (very minor). The blue positive TSB region at the taper phase (late May/June) stands out clearly against the dark background as a bright recovery signal.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures detected.
