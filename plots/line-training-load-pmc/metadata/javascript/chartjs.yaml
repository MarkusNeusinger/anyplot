review:
  strengths:
  - 'Complete spec compliance: all PMC elements implemented (CTL line, ATL dashed
    line, two-tone TSB fill, TSS bars, zero reference line, dual y-axis)'
  - Deterministic LCG with fixed seed (7919) generates realistic training data with
    day-of-week variation, 4-week macro cycles, and taper phase
  - 'Two-tone TSB fill (green for positive/fresh, red for negative/fatigued) with
    fill: ''origin'' clearly distinguishes training zones'
  - 'Excellent Chart.js library usage: mixed chart type, dual yAxisID, borderDash,
    tension, maxTicksLimit, usePointStyle, inline canvas background plugin'
  - Legend filter function (hiding datasets prefixed with '_') keeps the legend clean
    while supporting helper datasets
  - Dynamic title font scaling (max(15, round(22 * 67 / length))) prevents overflow
    for the long descriptive+spec-id title
  - Correct EWMA formulas for CTL (42-day) and ATL (7-day); TSB as prev_CTL - prev_ATL
    is spec-accurate
  - 'Theme-adaptive chrome: all text, grid, and background elements correctly use
    ANYPLOT_TOKENS; data colors identical between themes'
  - Canvas background plugin correctly sets pageBg before chart draw, preventing default
    white background
  weaknesses:
  - 'Red-green CVD concern: positive TSB fill uses palette[0] (#009E73 green) and
    negative TSB fill uses palette[4] (#AE3030 red) — while semantically motivated
    and position-encoded (above/below zero), deuteranopia viewers may struggle to
    distinguish the two fill zones; consider using a blue (#4467A3) for positive TSB
    fill to match spec''s suggestion and improve CVD safety'
  - CTL line and positive TSB fill share the same green (#009E73) — the solid fitness
    line and the transparent fresh-zone fill are visually conflated in the upper-right
    portion of the chart where positive TSB peaks coincide with rising CTL; using
    a lighter green or different encoding for the fill would reduce ambiguity
  - 'TSS bars (palette[2] = #4467A3 at 40% alpha) are quite subtle in the dark render
    against the dark background — increasing opacity to ~55-60% would keep them readable
    as background context without dominating the primary lines'
  - 'Design refinement ceiling: Chart.js canvas-based rendering prevents spine removal
    (no easy equivalent to ax.spines), limiting the minimal-chrome aesthetic; this
    is a library constraint, not a code fault'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct; not pure white, not dark.
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · chartjs · anyplot.ai" is clear and bold at ~19px computed size; occupies ~85% of canvas width (expected for the long descriptive+spec-id prefix). Left y-axis label "CTL / ATL / TSS" and right y-axis label "TSB (Form)" are both readable. X-axis label "Date" is visible. Tick labels on all three axes are readable at size 12px. Legend at top-right shows "Daily TSS", "Form (TSB)", "Fatigue (ATL)", "Fitness (CTL)" — all readable in dark ink against light background.
      Data: A large pinkish-red semi-transparent fill dominates the middle and upper chart area (negative TSB / fatigued zone). Small green mountainous peaks appear in the April-May portion (positive TSB / fresh zone). The CTL fitness line (solid green #009E73, 3.5px) runs along the lower chart as a gradually rising curve. The ATL fatigue line (purple #C475FD dashed, 2.5px) oscillates with weekly peaks above CTL. Light blue-gray transparent bars (Daily TSS, palette[2] at ~25% alpha) form a background layer. A dashed horizontal reference line at TSB=0 is faintly visible.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct; not pure black, not light.
      Chrome: Title, axis labels, tick labels, and legend text all render in light cream (#F0EFE8 / #B8B7B0 range) against the dark background — clearly readable. No dark-on-dark failures observed. The right y-axis "TSB (Form)" label on the far right reads correctly in light text.
      Data: Data colors are identical to the light render — green CTL line, purple dashed ATL, red TSB fill (negative), green TSB fill (positive), blue-transparent TSS bars. The large negative TSB fill (semi-transparent red) is visible against the dark background. The positive TSB peaks at the taper period are clearly green. The CTL green line is traceable at the bottom. The TSS bars are subtly darker against the near-black background (slightly less visible than in light mode, but still readable as background context). Grid lines in light rgba are appropriately subtle.
      Data color identity: Confirmed identical between light and dark renders — only chrome (background, text, grid) flips; Imprint palette data colors are unchanged.
      Legibility verdict: PASS — all text elements readable; no dark-on-dark failures; brand green (#009E73) remains visible and distinct on the dark surface.
