review:
  strengths:
  - Perfect spec compliance — all PMC elements (CTL, ATL, TSB, daily TSS) correctly
    implemented with dual Y-axes
  - Two-toned TSB fill (positive=blue, negative=red) using semantic Imprint palette
    exceptions appropriately (red = fatigue/overload)
  - Elegant legend filtering via filter callback hiding underscore-prefixed helper
    datasets cleanly
  - Deterministic LCG with fixed seed provides reproducible synthetic training data
    with realistic 4-week periodization cycles and taper
  - Sophisticated Chart.js mixed chart (bar + multiple line types) with per-dataset
    yAxisID and secondary grid suppression — expert-level library usage
  - 'Perfect Imprint palette compliance throughout: CTL first series = #009E73, ATL
    = #C475FD, TSS bars = #4467A3, theme-adaptive chrome via tokens'
  weaknesses:
  - The daily TSS bars reach 80–160 units while CTL only grows to 40–50 after 180
    days, making the bars visually dominate and partially obscure the CTL/ATL smoothed
    lines — the spec says TSS bars should be light background elements, not dominant
    foreground elements. Consider capping bar height via a secondary axis or reducing
    to TSS/3 for display.
  - The ATL (fatigue) dashed purple line is sometimes hard to track through the dense
    TSS bar region in the lower chart area — the 7-day EWMA should spike above the
    bars occasionally but reads as noise through the bar forest
  - No clear visual focal point or storytelling emphasis — no annotation for the taper
    phase start or a notable recovery peak, meaning the viewer must read the data
    without visual guidance
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · chartjs · anyplot.ai" visible and correctly scaled (titleSize=19px from length-based formula). Left Y-axis "CTL / ATL / TSS" and right Y-axis "TSB (Form)" labels readable. X-axis "Date" label present. All tick labels on both axes readable.
      Data: Fitness (CTL) rendered as thick green (#009E73) line — first Imprint series, correctly first categorical slot. Fatigue (ATL) is a dashed lavender line (#C475FD) — second Imprint slot. Daily TSS bars in blue (#4467A3, ~40% opacity) fill the lower portion. TSB positive fill is blue (palette[2]+opacity), TSB negative fill is red (#AE3030+opacity, semantic anchor for fatigue/overloaded state). TSB=0 reference line is dashed inkSoft. Legend at top-right shows: Daily TSS, Form (TSB), Fatigue (ATL), Fitness (CTL).
      Visual observation: The TSS bars (reaching 80-160 on left axis) are visually dominant relative to CTL/ATL lines (running at 20-50). A large red negative-TSB fill covers most of the upper area of the chart, reflecting realistic sustained negative form during heavy training. The CTL green line and ATL purple dashed line are visible but somewhat compressed into the lower area.
      Legibility verdict: PASS — all text elements readable against warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title visible in light ink. Axis labels, tick labels all rendered in light-colored text (t.ink and t.inkSoft adaptive tokens). Grid lines subtle. Canvas background filled via beforeDraw plugin using t.pageBg.
      Data: All data colors identical to light render — CTL green (#009E73), ATL lavender (#C475FD), TSS bars blue, TSB fills (blue positive / red negative) unchanged as expected for Imprint palette. Only chrome flips between themes.
      Legibility verdict: PASS — no dark-on-dark issues. Title and axis labels clearly visible against near-black background. All tick text is light-colored.
