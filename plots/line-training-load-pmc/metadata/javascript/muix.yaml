review:
  strengths:
  - 'Correct PMC implementation with all required elements: CTL/ATL smooth lines,
    two-toned TSB filled areas (fresh=blue, fatigued=semantic red), step-curve TSS
    at the bottom, dual y-axis, and TSB=0 reference line'
  - 'Excellent semantic color use: brand green for CTL (first series), semantic red
    (#AE3030) for fatigued TSB — exactly the right exception to canonical palette
    order'
  - Sophisticated data generation with phase-structured training (base, build, peak,
    taper) and deterministic LCG seed, producing a realistic 6-month endurance build
    to race
  - 'Idiomatic MUI X composition API: ChartContainer + LinePlot + AreaPlot + ChartsXAxis/YAxis
    + ChartsReferenceLine — demonstrates advanced multi-axis multi-series usage'
  - Semi-transparent area fills (0.3 opacity TSB, 0.45 TSS) keep overlapping elements
    readable without drowning the CTL/ATL lines; both themes render cleanly with correct
    chrome adaptation
  weaknesses:
  - Daily TSS is rendered as a step-curve area rather than 'light points or thin bars
    near the bottom' as the spec explicitly requests — a bar-like step area is close
    but diverges from the spec language
  - Form (Fresh) blue area is nearly invisible in most of the chart since the training
    block generates mostly negative TSB (fatigue); while this is data-realistic, a
    note or annotation marking the taper's positive-form zone would improve storytelling
    (DE-03)
  - Title spans approximately 44% of the plot width, slightly below the 50–70% guideline;
    consider increasing the font size marginally (e.g. 24–25px CSS) to improve proportion
  - 'DE-01/DE-02 ceiling: the multi-series chart is dense but not visually polished
    beyond the data-driven composition — top/right spines are absent by MUI X default
    but no additional refinement (legend box, subtle axis line styling) was added'
  image_description: |-
