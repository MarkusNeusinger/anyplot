review:
  strengths:
  - 'Full PMC spec compliance: all five data elements (CTL, ATL, TSB+/TSB-, TSS) correctly
    rendered with appropriate axis assignments'
  - Sophisticated ChartContainer composition combining LinePlot, AreaPlot, and ScatterPlot
    in a single SVG frame
  - 'Semantically correct Imprint palette: brand green for CTL (fitness as primary
    metric), matte red as valid semantic exception for Form (Fatigued), two-toned
    TSB area clearly communicates fresh vs. fatigued narrative'
  - Deterministic LCG with realistic phase-structured training data (base -> build
    -> peak -> taper) makes the chart genuinely informative
  - Dual Y-axes correctly keep TSB readable against CTL/ATL magnitudes; hidden TSS
    axis keeps daily dots in the bottom quarter without cluttering the primary axis
    scale
  - Both renders fully theme-adaptive with clean dark-mode legibility
  weaknesses:
  - TSS scatter markerSize=3 is quite small for 180 points at the final canvas resolution;
    increasing to 4-5 would improve readability without compromising the 'light background
    noise' intent
  - The ATL/TSB overlap zone is visually dense — the spiky ATL lavender line overlapping
    with the salmon fatigued TSB area creates a complex mid-chart region; a slightly
    higher TSB fillOpacity or explicit z-order adjustment could improve separation
