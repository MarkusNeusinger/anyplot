review:
  strengths:
  - Two-tone TSB area fill using Highcharts negativeColor/negativeFillColor is sophisticated
    and domain-appropriate
  - 'Correct dual y-axis setup: primary for CTL/ATL/TSS, secondary for TSB'
  - 'Proper semantic color assignment: green=fresh/positive TSB, red=fatigued/negative
    TSB, blue=fitness/CTL, lavender=fatigue/ATL'
  - Deterministic LCG seeded RNG for reproducible synthetic data
  - Realistic 26-week training periodization (build1→build2→peak→taper) with correct
    TSS day patterns
  - Perfect EWMA formulas for ATL (7-day) and CTL (42-day), with TSB as previous-day
    difference
  - zIndex ordering ensures CTL/ATL lines render above TSB area fill
  - Title length scaling formula correctly applied to handle long descriptive title
  - 'animation: false set on both chart and plotOptions.series as required'
  - Correct Highcharts plotLines on secondary axis for TSB=0 reference
  weaknesses:
  - 'VQ-04: Red/green used as primary visual signal for positive/negative TSB — industry
    standard for PMC charts but a CVD concern; consider adding a positional annotation
    ("Fresh" / "Fatigued") to provide a non-color cue'
  - 'VQ-03: TSB negative fill (rgba(174,48,48,0.22)) on dark near-black background
    (#1A1A17) produces a very muted brownish-red that is harder to distinguish than
    on light; consider increasing the fill alpha to 0.35 for dark theme'
  - 'VQ-01: Title computed at ~18px (down from 22px default due to length scaling)
    — readable but slightly compact; acceptable but borderline'
  - 'DE-01/DE-02: Chart is functionally sophisticated but could benefit from phase
    annotations (e.g., vertical bands or text labels marking Build/Peak/Taper phases)
    to elevate storytelling above raw data display'
  - 'LM-02: plotOptions.column.maxPointWidth=4 keeps TSS bars narrow but Highcharts
    stacking or pointWidth could be used more expressively for visual density control'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface color
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · highcharts · anyplot.ai" renders in dark ink at ~18px, fills ~85% of width. Left y-axis label "Training Load (TSS units)" and right y-axis label "Form / TSB" both visible in inkSoft tone. X-axis shows date ticks from Dec 30 to Jun 30 in readable 14px labels. Bottom legend shows four entries with correct colored swatches: ochre dot (Daily TSS), green line (Form TSB), dark-blue line (Fitness CTL), lavender line (Fatigue ATL) — all readable.
      Data: Ochre columns (palette[3] #BD8233, alpha=0.45) for daily TSS across the full 182-day block; column height peaks in May (peak phase). Red semi-transparent area fill (rgba(174,48,48,0.22)) covers the negative TSB region for roughly weeks 1-22 (fatigue accumulation during build/peak). Green semi-transparent area fill (rgba(0,158,115,0.22)) covers positive TSB region in final taper weeks (Jun 2–Jun 30). Blue spline (#4467A3) for Fitness CTL rises smoothly from ~30 to ~100+ TSS units. Lavender spline (#C475FD) for Fatigue ATL spikes with training load and is spikier than CTL. Dashed reference line at TSB=0 on right axis is visible.
      Legibility verdict: PASS — all text, labels, and legend entries are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface color
      Chrome: Title and all axis labels flip to light-ink tone (#F0EFE8 / #B8B7B0) and are fully readable against the dark background. No dark-on-dark text failures observed. Grid lines are subtle and visible. Legend text in light inkSoft is readable.
      Data: Data colors are identical to light render — ochre TSS bars, red/green TSB fills, blue CTL line, lavender ATL line. The red negative TSB fill (rgba(174,48,48,0.22)) on the near-black background is somewhat muted (darker brownish-red tone) but still distinguishable from the background and from the green positive fill. Positive TSB green fill at the end is more visually prominent on dark background. Brand green #009E73 (positive TSB fill color) remains clearly visible. CTL and ATL lines are visible over the fills.
      Legibility verdict: PASS — all chrome elements are readable; the red negative TSB fill is slightly more muted in dark theme but still interpretable. No dark-on-dark failures.
