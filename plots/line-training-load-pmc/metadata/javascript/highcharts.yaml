review:
  strengths:
  - Phase-band narrative (Build 1 → Build 2 → Peak → Taper) encoded as background
    plotBands with labels — exceptional PMC storytelling that guides unfamiliar viewers
    through periodization
  - 'Two-toned TSB area using Highcharts threshold: 0 + negativeColor / negativeFillColor
    — semantic green (fresh) / red (fatigued) split is perfectly idiomatic and impossible
    to replicate as cleanly in most other libraries'
  - Dual y-axis design keeps TSB oscillation readable on its own scale while CTL/ATL/TSS
    share the left axis — avoids the magnitude confusion common in naïve PMC implementations
  - Deterministic seeded LCG for in-browser data generation ensures reproducible renders
    across both themes
  - CVD-redundant 'Fresh ↑' / 'Fatigued ↓' text labels on the TSB axis supplement
    the green/red color signal for accessibility
  - 'All spec features present: CTL spline, ATL spline, two-toned TSB area, daily
    TSS columns, secondary y-axis, TSB=0 reference plotLine, four-series legend'
  - Title length correctly scaled via Math.max(14, Math.round(22 * 67 / TITLE.length))
    — text fits without overflow
  weaknesses:
  - Negative TSB fill (rgba(174,48,48,0.35)) on the dark background (#1A1A17) has
    insufficient contrast — the fatigued region appears nearly invisible in the dark
    render; increase negFillAlpha to at least 0.5 on dark, or use a brighter red stop
    (e.g. rgba(200,60,60,0.45))
  - Annotation labels ('Fresh ↑', 'Fatigued ↓') and phase-band labels are 11px italic
    — too small to read comfortably when the chart is scaled to 800px or 400px thumbnail
    sizes; raise to 12-13px minimum
  - 'Highcharts default axis spines are retained — explicitly setting xAxis.lineWidth:
    0 and yAxis.lineWidth: 0 would remove the structural borders and clean up the
    visual chrome in line with the L-frame convention'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly theme-adaptive, not pure white.
      Chrome: Title "Training Load PMC · line-training-load-pmc · javascript · highcharts · anyplot.ai" in dark bold text, font scaled down from 22px default to approximately 18px for the longer string — fully readable. Left y-axis label "Training Load (TSS units)" at 16px and right y-axis label "Form / TSB" at 16px are both clearly legible. X-axis date tick labels (Dec 30 – Jun 30) and y-axis numeric tick labels at 14px are all sharp. Four-item legend at the bottom (Daily TSS, Form TSB, Fitness CTL, Fatigue ATL) is readable. Phase-band labels ("Build 1", "Build 2", "Peak", "Taper") at 11px italic are small but legible. "Fresh ↑" and "Fatigued ↓" directional labels at 11px are readable within the right margin.
      Data: Daily TSS shown as ochre (#BD8233) columns at varying heights (0–250 TSS range). Form (TSB) as a dual-toned area — green (#009E73) above zero (strongly visible in the Taper phase) and red (#AE3030) below zero (semi-transparent, clearly distinguishable on cream background). Fitness (CTL) as a smooth blue (#4467A3) spline trending upward across the 26-week block. Fatigue (ATL) as a spikier lavender (#C475FD) spline. Subtle phase-band shading divides the timeline into four training phases. Zero reference line on the TSB axis (right side) shown as a dashed line.
      Legibility verdict: PASS — all primary text (title, axes, ticks, legend) clearly readable; annotation labels (11px) are secondary and acceptable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly theme-adaptive, not pure black.
      Chrome: Title in light off-white text — clearly readable against the dark surface. Left and right y-axis labels in light gray (#B8B7B0 equivalent, from t.inkSoft on dark) — readable. X-axis date tick labels and y-axis numeric tick labels in light gray — all readable. Legend at bottom with light-gray text — readable. Phase-band labels and directional labels are in light/soft colors — readable. No dark-on-dark text failure detected.
      Data: Imprint palette data colors are identical to the light render — Daily TSS bars remain ochre, CTL remains blue, ATL remains lavender, TSB positive area remains green. The negative TSB fill (rgba(174,48,48,0.35) on #1A1A17) is notably less prominent than in the light render — the red fill area is visible but significantly subdued against the dark background; the red boundary line (negativeColor) is still discernible. The green TSB positive area during the Taper phase is very prominent and clearly visible. Phase bands have slightly increased alpha on dark (0.07/0.105 vs 0.05/0.075) and are visible.
      Legibility verdict: PASS with one note — all chrome text is readable (no dark-on-dark failure); however, the negative TSB filled region (fatigued area) has reduced visual prominence on the dark background due to low fill opacity, which slightly reduces the informativeness of the dark render compared to the light render.
