  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color.
      Chrome: Title "pdp-basic · letsplot · anyplot.ai" and axis labels ("Temperature (standardized)", "Partial Dependence (predicted outcome)") are rendered in very faint gray text, barely legible against the light background. Tick labels and legend text are similarly faint. This suggests theme colors are reversed or not properly applied — text should be dark (#1A1A17) for contrast, but appears light instead.
      Data: Main PDP line is bright green (#009E73), clearly visible. Confidence band is orange (#D55E00). Individual ICE lines and rug plot are visible. Data colors are Okabe-Ito compliant and visible.
      Legibility verdict: FAIL — title and axis labels are unreadably faint on light background. Theme color mapping appears reversed.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color.
      Chrome: Title, axis labels, tick labels, and legend text appear dark/nearly black, making them essentially unreadable against the dark background. This is a critical "dark-on-dark" failure. The intended INK color for dark theme (#F0EFE8, a light gray) is clearly not being applied; instead, text renders very dark.
      Data: Green PDP line and orange confidence band are visible (data colors are identical to light render, as required). Individual ICE lines and rug plot visible.
      Legibility verdict: FAIL — title, axis labels, tick labels, and legend text are unreadable. Dark text on dark background is a theme-adaptation failure. This render is unusable.

    Both renders fail critical legibility checks. The implementation has the correct structural approach (theme tokens, correct color names) but the theme color mapping is reversed or broken, resulting in unreadable text in both themes. The dark render is particularly severe — a plot that ships with this dark-on-dark failure would be broken for dark-mode users.
