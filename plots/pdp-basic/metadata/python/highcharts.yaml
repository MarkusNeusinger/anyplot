  image_description: |-
    Light render (plot-light.png):
      Background: Appears light (approximately #FAF8F1) but is hardcoded as pure #ffffff
      Chrome: Title "pdp-basic · highcharts · anyplot" at top is extremely small (48px renders tiny); axis labels and tick labels are also very small (36px and 28px respectively, well above recommended 22px and 18px). Text IS legible but requires close inspection - poor visual hierarchy.
