      Legibility verdict: MARGINAL PASS - text is readable but uncomfortably small and wrong colors reduce clarity

    Dark render (plot-dark.png):
      Background: Very dark, appears to be pure black or near-black (#000000 or very close, should be #1A1A17)
      Chrome: CRITICAL FAILURE - title, axis labels, and tick labels are nearly invisible. Dark text colors (hardcoded) on dark background creates dark-on-dark contrast failure. This render is effectively unreadable.
      Data: Orange line still visible but all text elements are lost in the dark background - poor data-to-chrome separation
      Grid: Grid lines using rgba(0,0,0,0.1) are completely invisible on dark background
      Legibility verdict: FAIL - dark-on-dark failure makes labels and title unreadable; chrome colors not adapted to dark theme

    OVERALL: Both renders fail to meet readability standards. Light render is barely readable with wrong colors. Dark render is essentially unreadable due to complete lack of theme adaptation. Data colors violate Okabe-Ito compliance requirement.
