review:
  strengths:
  - Complete bullet chart implementation with all three required elements (actual
    value bars, target markers, and qualitative background bands)
  - 'Excellent semantic color mapping: brand green (#009E73) for above-target metrics
    and Imprint matte red (#AE3030) for below-target — immediately communicates performance
    status'
  - 'Theme-adaptive warm-gray band colors (light: #E4E3DC/#C0BFB8/#8E8D87; dark: #3A3A30/#484843/#60605A)
    that complement the Imprint palette without competing'
  - Creative SVG injection technique to implement a chart type pygal lacks natively
    — shows advanced understanding of pygal internals
  - Realistic manufacturing KPI dataset (OEE, First Pass Yield, etc.) with plausible
    values normalized to a common percentage scale
  - All font sizes explicitly set via Style object matching style-guide pygal defaults
  weaknesses:
  - Green/red is the primary color signal for above/below target status — CVD users
    may struggle to distinguish the two bar colors; adding a thin INK-color stroke
    on the bars or using bar hatching would provide redundant encoding
  - Background band differentiation is lower contrast in the dark render (BAND_POOR=#3A3A30,
    BAND_SAT=#484843, BAND_GOOD=#60605A are three very similar dark grays — consider
    increasing the contrast step between bands in dark mode)
  - 'Design could be more polished: the chart reads as a functional implementation
    but lacks signature refinements that would elevate it to publication quality (e.g.
    more intentional spacing, subtle gridline tuning)'
