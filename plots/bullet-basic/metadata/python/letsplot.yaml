    in both themes, OR make the band note text theme-conditional'
  - '$275K value annotation nearly overlaps the Revenue target marker: actual_pct[0]=78.6%,
    annotation starts at 80.6% with hjust=0 and extends ~4–5 percentage units right
    in bold text, reaching ~85%+ — the target marker sits at 85.7%; increase offset
    to `actual_pct[i] + 4` and consider right-aligning annotations that fall close
    to target (add check: if abs(actual_pct[i] - target_pct[i]) < 8, place annotation
    to the left of the bar with hjust=1)'
  - Profit Margin 88% is unrealistically high for a business KPI dashboard — most
    real businesses report 20–45% gross margin; replace with a more plausible value
    such as 38% (actual) vs 42% (target) to keep the Below-Target case
  - 'Green/red CVD risk: red (#AE3030) and green (#009E73) are indistinguishable under
    deuteranopia/protanopia; the legend text and bar lengths provide partial redundant
    encoding but the legend color swatches alone cannot be distinguished — add a small
    text marker in legend (e.g. bold ''↑'' / ''↓'') or mention in subtitle'
