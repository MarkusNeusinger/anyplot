review:
  strengths:
  - 'Complete bullet chart with all spec-required components: actual bar (brand green),
    target marker (INK-adaptive), qualitative background bands, zone labels, and value
    annotations per spec notes'
  - Theme-adaptive target markers using the INK token correctly flip between dark
    (light theme) and light (dark theme) — no dark-on-dark or light-on-light failures
    in either render
  - Realistic, neutral business KPI data with intentional mixed above/below-target
    performance (Revenue and Satisfaction above target; Profit and New Orders below)
    that demonstrates the chart purpose clearly
  - Clean grammar-of-graphics code composing a non-native chart type from plotnine
    primitives (geom_tile for bands, geom_rect for actual bar, geom_segment for target
    line) — idiomatic and readable
  - All font sizes are explicitly set (title=12, axis title x=10, axis text 8–9pt,
    geom_text 3.5mm, annotate 3.4mm) with correct theme-adaptive colors throughout
    both renders
  weaknesses:
  - Zone labels (Poor/Satisfactory/Good) at annotate size=3.4mm are slightly small
    — at mobile scaling (~400px wide) they become very difficult to read; increase
    to ~4.0–4.5mm
  - Target marker at geom_segment size=2.0mm is thin; at thumbnail sizes the marker
    can be hard to distinguish from band edges — increase to ~2.5–3.0mm for better
    thumbnail visibility
  - 'DE-03 storytelling gap: no visual cue distinguishing above-target vs below-target
    metrics (e.g. a subtle annotation or title suffix like ''Mixed KPI Performance'')
    — the viewer must read both bar and marker position carefully to extract the story'
