review:
  strengths:
  - All three bullet chart components (bands, actual bar, target marker) correctly
    implemented per Stephen Few's specification
  - 'Grayscale band ordering is semantically correct: darkest = worst performance
    zone, lightest = best'
  - INK token correctly used for target markers — adapts to near-black in light theme
    and near-white in dark theme automatically
  - Legend suppressed with guides(fill=False); zone labels provided inline instead
    — much cleaner result
  - Mixed above/below-target dataset makes the chart immediately informative as a
    real dashboard example
  - Fully deterministic, reproducible hardcoded data
  weaknesses:
  - Zone labels ('Poor', 'Satisfactory', 'Good') at 3.0mm (~8.5pt) are borderline
    small — consider raising to 3.3-3.5mm for better mobile readability
  - scale_y_continuous expand=(0.18, 0.08) creates ~18% top-padding leaving noticeable
    dead space above the Revenue ($K) row; reduce upper expand to ~0.08 to match the
    bottom padding
