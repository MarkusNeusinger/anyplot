review:
  strengths:
  - 'Semantically coherent Imprint palette usage: green (#009E73) for on-target, red
    (#AE3030) for off-target with clear justification from data labels'
  - Bold/normal font weight provides a second visual channel beyond color for on/off-track
    status — partially addresses CVD concerns
  - Custom hand-coded legend below chart avoids Bokeh default legend box and matches
    Stephen Few bullet chart aesthetic
  - Background fill alpha on value labels ensures dark-mode contrast without adding
    extra chrome
  - 'Proper Bokeh idioms throughout: ColumnDataSource enabling HoverTool, add_layout
    for annotations, toolbar_location=None for canvas stability'
  weaknesses:
  - Metric category labels (28pt) and value labels (26pt) are slightly below the 34pt
    guideline for secondary text; consider raising to 30-32pt for better mobile thumbnail
    readability
  - 'Poor qualitative band (#3A3A3A) has marginal contrast against the near-black
    background (#1A1A17) in dark mode — lighten to #484848 or #505050 to improve band
    distinctness'
  - Red-green semantic dichotomy lacks strong CVD-safe redundant encoding; adding
    a label suffix or symbol to metric labels would help colorblind users distinguish
    on-target from off-target metrics
