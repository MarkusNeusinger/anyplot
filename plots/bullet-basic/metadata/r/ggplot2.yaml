review:
  strengths:
  - 'Correct bullet chart structure: layered geom_rect for qualitative bands, narrower
    bars for actual performance, geom_segment for target markers — all spec-required
    elements present'
  - Theme-adaptive grayscale bands (BAND_POOR/SATS/GOOD) flip correctly between light
    and dark — visually distinct in both renders
  - Above-target value label highlighted in Imprint green (#009E73) creates a clear
    focal point for Product Quality at 91%
  - Zone labels via annotate() is idiomatic ggplot2 — avoids a legend while still
    guiding interpretation
  - scale_fill_identity() + scale_color_identity() pattern used cleanly for pre-specified
    band fills and conditional label colors
  - Caption used as a decoder (Bar / Vertical line / Green label) instead of a redundant
    legend — clean design decision
  - X-axis grid only (panel.grid.major.y = element_blank()) suits horizontal bullet
    layout perfectly
  - All theme chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG) threaded consistently
    through every text and background element
  weaknesses:
  - Zone labels ('Poor', 'Satisfactory', 'Good') rendered at geom size=2.3 mm (~6.5
    pt) — readable at full 3200 px resolution but will likely fall below mobile-readable
    threshold (~4–5 px) when the plot is scaled to 400 px width. Increase to size=2.8–3.0
    to ensure legibility at thumbnail sizes.
  - DE-02 Visual Refinement is adequate but the implementation does not go beyond
    theme_minimal defaults plus standard overrides; a touch more polish (e.g. a subtle
    left-axis hairline or more intentional inter-row whitespace) would lift the score
    further.
  - 'LM-02 Distinctive Features: the layer-composition approach (stacked geom_rect
    + geom_segment) is correct ggplot2 but doesn''t showcase any advanced or less-obvious
    ggplot2 capability (e.g. coord_flip, stat layers, custom facet strips, or ggplot2
    extensions).'
