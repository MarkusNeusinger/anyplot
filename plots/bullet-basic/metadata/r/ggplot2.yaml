  strengths:
  - Correct bullet chart with all required components — background bands, performance
    bars, target markers, and value labels all present and properly composed using
    ggplot2 layered grammar
  - 'Perfect Imprint palette compliance: #009E73 bars on theme-adaptive grayscale
    qualitative bands; light/dark backgrounds match #FAF8F1/#1A1A17 exactly; all chrome
    tokens (INK, INK_SOFT, INK_MUTED) applied to title, axis, legend, caption'
  - 'Perfect spec compliance and data quality: 5 KPI metrics with varied performance
    (some below, at, and above target) show the full bullet chart feature set in a
    realistic Q2 dashboard scenario'
  - 'Expert ggplot2 usage: scale_fill_identity() with guide_legend(), breaks, and
    labels is an advanced library-specific idiom for generating a proper legend from
    raw hex fill values'
  - Clean KISS code structure — flat Imports → Data → Plot → Save with section headers;
    no functions/classes; explicit font sizes set throughout the theme() hierarchy
  weaknesses:
  - 'DE-01 (5/8): Design lacks publication-ready sophistication — all bars are uniform
    green with no visual emphasis on over/under-performing metrics. Product Quality
    (91% vs 85% target) is the only metric beating its target, but nothing in the
    render highlights this insight. Consider giving the value label of the exceeding
    metric a distinct color (e.g., INK instead of INK_SOFT), or adding a subtle annotation
    like ''Above target'' for Product Quality to create a clear focal point and narrative.'
  - 'VQ-01 (7/8): Caption text at size=7 (≈39 source-px) is borderline for mobile
    viewports scaled to ~400px. Bump plot.caption to size=8 to improve readability
    without disrupting the typography hierarchy.'
  - 'LM-02 (3/5): The implementation builds the bullet chart by composing basic geoms
    (geom_rect, geom_segment) rather than using any distinctly ggplot2-unique feature
    such as ggplot2''s stat framework, faceting, or a more advanced coord_* transform.
    A small ggplot2-idiomatic touch (e.g., using coord_flip on a vertical chart, or
    annotate() for zone labels instead of a side legend) would raise this score.'
