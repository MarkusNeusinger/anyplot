    colored bar overlays each set of bands: dark green (#2D6A4F) for metrics above
    target (Profit Margin, New Customers) and copper/terracotta (#C0785A) for metrics
    below target (Revenue, Satisfaction). A thick black vertical marker indicates
    the target position for each metric. Bold text annotations beside each bar show
    actual values ($275K, 88%, 3.8, 42). The title reads "bullet-basic · letsplot
