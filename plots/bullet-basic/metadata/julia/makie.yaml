      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title visible in near-white (#F0EFE8). Axis labels and tick labels flip to light gray (#B8B7B0). Bottom spine rendered in lighter tone. Target markers become white/near-white lines — correct theme flip. Legend labels light gray on dark elevated background.
      Data: Band colors flip to dark-tone grays (BAND_POOR ≈ #383837, BAND_SAT ≈ #4D4D4A, BAND_GOOD ≈ #616060). Brand green bars identical to light render — correct. Non-exceeding value labels (38%, 68%, 78%, 82%) in INK_SOFT (#B8B7B0) are readable on respective band backgrounds (~3.2:1 contrast).
      ISSUE: "91%" exceeds-target label uses BRAND green (#009E73) on BAND_GOOD dark background (~#616060), yielding ~1.8:1 contrast ratio — below WCAG 3:1 threshold. The label is technically visible but accessibility-suboptimal.
      Legibility verdict: PARTIAL PASS — all chrome and non-exceeding labels readable; the single exceeds-target value label ("91%") has insufficient contrast in dark mode.
