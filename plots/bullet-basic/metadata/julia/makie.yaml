    title
  weaknesses:
  - 'Dark-render contrast for the exceeds-target value label: the green #009E73 text
    for "91%" sits on BAND_GOOD dark (~#616060), giving ~1.8:1 contrast ratio — below
    readable threshold. Fix: in dark mode use INK (#F0EFE8) for the exceeds label
    instead of BRAND, so the label is always light text on dark background. Alternatively
    add a very small semi-transparent PAGE_BG backdrop behind the label text.'
  - 'Design Excellence ceiling: while the exceeds color indicator adds hierarchy,
    overall aesthetic is still well-configured-default level. Adding a subtle visual
    anchor (e.g. a faint reference line or small icon at the 75% target zone boundary)
    and reducing inter-row whitespace slightly for compactness would push DE-01 and
    DE-03 higher.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "Sales KPI Dashboard · bullet-basic · julia · makie · anyplot.ai" is bold, well-proportioned (~75% canvas width), dark ink color. X-axis label "Score (%)" readable in dark ink. Y-axis tick labels (Q1 Revenue, Customer Satisfaction, Project Completion, Code Quality, Cost Efficiency) visible in medium-dark ink. X-tick labels (0, 25, 50, 75, 100) readable. No left or top/right spines; only bottom spine shown.
