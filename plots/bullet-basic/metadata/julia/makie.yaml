review:
  strengths:
  - 'Perfect spec compliance: all bullet chart elements (bands, actual bar, target
    marker, value labels, multi-row stacking) correctly implemented'
  - Realistic KPI dashboard scenario exercises all three performance band zones
  - Theme-adaptive grayscale bands with warm tones in light mode and cooler near-blacks
