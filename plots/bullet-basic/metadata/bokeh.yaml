review:
  strengths:
  - Excellent adherence to Stephen Few bullet chart conventions (grayscale bands,
    varying heights, thin target markers)
  - Two-tone blue color coding for above/below target creates immediate visual storytelling
  - Full spec compliance with all required and recommended features implemented
  - Realistic, diverse business data with meaningful variation across metrics
  - Clean, deterministic code with good Bokeh idioms (ColumnDataSource, HoverTool,
    dual output)
  weaknesses:
  - Excessive vertical whitespace between title and first bullet and between bullet
    rows reduces canvas utilization
  - Actual value bars are thin relative to qualitative bands reducing their visual
    prominence
  - Manual legend construction instead of Bokeh Legend model
  image_description: 'The plot displays 5 horizontal bullet charts stacked vertically,
    representing sales performance metrics: Revenue ($K), Profit ($K), Orders, Customers,
    and Satisfaction (/5). Each bullet has three grayscale qualitative bands (dark
    gray for Poor, medium gray for Satisfactory, light gray for Good) with varying
    heights — tallest for Good, shortest for Poor — following Stephen Few''s convention.
    The actual performance is shown as a thin horizontal blue bar in the center of
    each bullet. Metrics exceeding their target (Revenue at 275, Customers at 1450)
    use a darker blue (#306998), while below-target metrics (Profit at 85, Orders
    at 320, Satisfaction at 4.2) use a muted blue (#7a9bb5). Black vertical markers
    indicate targets. Value labels appear to the right of each bar, color-coded to
    match the bar. A custom legend at the bottom shows Poor, Satisfactory, Good swatches
    and a Target marker. The title "bullet-basic · bokeh · pyplots.ai" is centered
    at the top. The x-axis reads "% of Maximum Range" with ticks at 0, 20, 40, 60,
    80, 100. There is notable whitespace between the title and first bullet and between
    each bullet row.'
