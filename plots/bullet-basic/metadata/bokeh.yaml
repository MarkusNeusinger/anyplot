review:
  strengths:
  - Excellent data choice with 5 realistic business metrics showing both above-target
    and below-target performance
  - All font sizes explicitly set and properly scaled for 4800x2700 canvas
  - Clean, well-structured code with proper normalization to common percentage scale
  - Cohesive color scheme with Python Blue and grayscale bands
  - 'Good visual refinement: hidden y-axis, subtle dashed grid, removed outline'
  weaknesses:
  - 'Qualitative band colors are inverted: good range (widest) is darkest, poor range
    (narrowest) is lightest — contradicts legend and bullet chart convention'
  - Legend color labels are inconsistent with the chart actual rendering
  - No ColumnDataSource usage (Bokeh idiomatic data pattern)
  - HTML export lacks interactive features (HoverTool, tooltips) that showcase Bokeh
    strengths
  - No visual storytelling — all bullets styled identically with no emphasis on above/below-target
    distinction
  image_description: 'The plot displays five horizontal bullet charts stacked vertically
    for sales performance metrics: Revenue ($K), Profit ($K), Orders, Customers, and
    Satisfaction (/5). Each bullet has three grayscale qualitative background bands
    of decreasing height (tallest is narrowest, shortest is widest), a blue (#306998)
    horizontal bar representing the actual value, and a thin black vertical marker
    for the target. Value labels in blue text appear at the end of each actual bar.
    The title "bullet-basic · bokeh · pyplots.ai" is centered at the top. The x-axis
    shows "% of Maximum Range" with ticks at 0, 20, 40, 60, 80, 100. A manually constructed
    legend at the bottom shows Poor (dark), Satisfactory (medium), Good (light), and
    Target (black) entries. However, the qualitative band colors in the chart are
    inverted — the widest band (good range, 75-100%) appears as the darkest gray while
    the narrowest band (poor range, 0-50%) appears lightest, contradicting both the
    legend labels and standard bullet chart convention.'
