review:
  strengths:
  - Complete and technically correct Code 128 Subset B encoding including start character,
    check digit (mod 103), stop pattern, and quiet zones
  - Correctly preserves white barcode background in dark mode — respects scan reliability
    requirement from spec
  - INK / INK_SOFT theme tokens properly wired throughout; both renders pass readability
    checks
  - Appropriate use of theme_void() and coord_cartesian(clip = 'off') for this plot
    type
  - Realistic healthcare lab specimen context with neutral data
  weaknesses:
  - 'Bottom canvas is over-padded: ylim lower bound of -0.70 while human-readable
    text sits at y=-0.30 leaves ~18% of the y-range empty below the text; combined
    with plot.margin bottom=40pt, the bottom ~30% of canvas is blank — tighten ylim
    to c(-0.55, 1.50) and reduce bottom margin to 20pt'
  - 'No visual hierarchy or storytelling emphasis: subtitle and human-readable label
    provide context but there is no typographic weight differentiation or focal element
    — consider making the human-readable text slightly larger (size=6.5) and adding
    a thin subtle border (color=INK_SOFT, linewidth=0.5) around the barcode rect to
    frame it'
  - 'DE-01 below publication quality: annotation sizes and typography hierarchy are
    functional but not polished — increase subtitle to size=4.5, apply slight weight
    difference between title and subtitle for better hierarchy'
