review:
  strengths:
  - Technically correct Code 128 Subset B encoding with proper Mod-103 check digit,
    start (value 104) and stop patterns, and 10-module quiet zones on each side
  - 'Theme-adaptive chrome correctly implemented in both renders — warm #FAF8F1 /
    #1A1A17 backgrounds with INK tokens applied to all text elements; no dark-on-dark
    or light-on-light issues'
  - Clean minimal layout with theme_void() and a subtle frame border (INK_SOFT) that
    anchors the barcode without cluttering; monospace font for human-readable text
    is an excellent design choice
  - Idiomatic R implementation using vapply() for vectorized character-to-code conversion
    and do.call(rbind, ...) for efficient data frame construction
  weaknesses:
  - Human-readable text annotation (size=6.5mm ≈ 18.5pt) is visually larger than the
    title (size=12pt), creating an inverted hierarchy where the specimen ID dominates
    the plot title — consider reducing to size=5.0 or 5.5 so the title leads visually
  - Spec highlights three code subsets (A, B, C) with dynamic switching as a key feature;
    implementation only demonstrates Subset B without commentary — a brief caption
    note or second label example would improve DQ-01 coverage
  - Design Excellence is at default levels — no visual emphasis or focal point beyond
    the barcode's inherent structure; subtitle adds context but storytelling remains
    passive
