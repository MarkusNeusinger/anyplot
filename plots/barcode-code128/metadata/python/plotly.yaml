review:
  strengths:
  - Implements Code 128B encoding from scratch with the full 106-value encoding table,
    check digit (modulo 103), quiet zones, START_B, data symbols, and STOP — all per-spec
    mandatory elements
  - Per-character interactive hover tooltips expose the Code 128B encoded value for
    each character in the payload — a distinctive and highly educational Plotly feature
  - Structural anatomy annotations (bracket line, tick marks, region labels START
    B / DATA / CHK / STOP) teach barcode structure in a static render
  - Human-readable monospace text below the barcode satisfies the visual verification
    requirement from the spec
  - Theme-adaptive chrome correctly swaps INK / INK_SOFT tokens for bars, bracket,
    annotations, and labels in both light and dark renders without any dark-on-dark
    failures
  - Correct canvas size (800×450×scale=4 → 3200×1800) with properly pinned margins
    and autosize=False
  weaknesses:
  - Anatomy region labels (START B, DATA (16 chars), CHK, STOP) rendered at font-size
    10–11 px (×scale=4 = 40–44 source-px) are quite small relative to the canvas and
    may be hard to read on mobile breakpoints (~400 px srcset) — consider increasing
    to 13–14 px for better mobile legibility
  - The horizontal bracket line is rendered at opacity=0.55 in INK_SOFT, which is
    appropriately subtle but makes the structural annotation band visually thin —
    a slightly heavier or more opaque bracket would make the anatomy region clearer
    without harming the aesthetic
  - Dark-mode barcode uses INK (#F0EFE8) bars on near-black background (inverted barcode),
    which is thematically consistent but diverges from the spec note recommending
    high-contrast black-on-white — acceptable for display context but worth noting
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "barcode-code128 · python · plotly · anyplot.ai" at top center in dark INK (#1A1A17) — clearly readable. Subtitle "Code 128B · ASCII Subset (32–127)" in INK_SOFT medium gray above the barcode bars — readable. Anatomy bracket line and region labels (START B, DATA (16 chars), CHK, STOP) appear in the narrow band between the barcode top and subtitle in INK_SOFT at font-size 10–11 px — present but subtle at display resolution. Human-readable "SHIP-2024-ABC123" in Courier New monospace in INK (#1A1A17) below the barcode — clearly readable. No axes visible (correctly hidden).
      Data: Barcode bars rendered in INK (#1A1A17 — near-black) on the warm off-white background, giving high contrast. Quiet zones visible on left and right. Bars span full height of allocated barcode area.
      Legibility verdict: PASS — all key text (title, subtitle, human-readable code) is clearly readable. Anatomy labels are present but small; no illegibility in either theme.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in INK (#F0EFE8 near-white) — clearly readable against the dark background. Subtitle "Code 128B · ASCII Subset (32–127)" in INK_SOFT (#B8B7B0 medium gray) — readable. Anatomy bracket and region labels in INK_SOFT on dark background — slightly more visible than in light render due to the gray-on-dark contrast. Human-readable "SHIP-2024-ABC123" in near-white INK — clearly readable. No dark-on-dark failures observed.
      Data: Barcode bars rendered in INK (#F0EFE8 near-white/cream) on the near-black background — inverted barcode appearance consistent with dark theme. Data colors are identical to the light render's structural encoding; only the bar fill color flips with the theme token (which is the correct behavior for this plot type). High contrast maintained.
      Legibility verdict: PASS — all text elements are clearly readable against the dark background. No dark-on-dark failures.
