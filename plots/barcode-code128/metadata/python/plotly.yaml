review:
  strengths:
  - Full Code 128 encoding implemented from scratch without external barcode libraries
    — demonstrates algorithmic depth (pattern table, modulo 103 check digit, START/STOP
    framing)
  - 'Excellent theme adaptation: bars use INK token so light theme renders classic
    dark-on-light barcode, dark theme renders light-on-dark variant — both high contrast'
  - Clean monospace typography for human-readable text is contextually appropriate
    and typographically deliberate
  - 'Perfect spec compliance: all five mandatory elements (quiet zones, start, check
    digit, stop, human-readable text) present'
  weaknesses:
  - 'DE-03 is near-default: the visualization shows a single barcode without educational
    annotations marking the structural regions (start pattern, data area, check digit,
    stop) — adding annotated region markers or a legend would significantly raise
    data storytelling'
  - 'LM-02 is low: plotly''s interactivity is not leveraged — hover tooltips revealing
    the encoded value per bar group would be a distinctive plotly feature for this
    plot type'
  - 'DQ-01 minor: only Code 128B subset demonstrated; the spec explicitly describes
    A/B/C subsets as a key feature — a second annotation or labeled example string
    showing subset switching would improve feature coverage'
