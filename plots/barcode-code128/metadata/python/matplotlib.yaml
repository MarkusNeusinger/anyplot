review:
  strengths:
  - 'Correct and complete Code 128 Subset B implementation: start pattern, data symbols,
    modulo-103 checksum, and stop pattern all correctly encoded'
  - Theme-adaptive LinearSegmentedColormap for bars/spaces elegantly flips between
    light (#FAF8F1/#1A1A17) and dark (#1A1A17/#F0EFE8) themes — bars appear dark-on-light
    and light-on-dark correctly
  - Structural zone annotations (Quiet Zone, Start, Data, Check, Stop) with bracket
    lines provide excellent educational context for the barcode anatomy
  - Human-readable text below barcode in bold monospace matches real-world barcode
    label conventions and is clearly visible in both themes
  - Clean KISS code with no functions/classes, deterministic output, and only used
    imports
  weaknesses:
  - Zone annotation text at fontsize=6 is borderline small at mobile widths (~400px);
    increase to 7-8pt for better readability when the image is displayed at smaller
    sizes
  - Approximately 25-30% of the canvas below the human-readable text is empty (ylim
    bottom=275 but last content at y≈228); tighten ylim or adjust subplots_adjust
    to center barcode content vertically and reduce wasted canvas area
