review:
  strengths:
  - 'Correct and complete Code 128B encoding: character mapping, weighted modulo-103
    checksum, proper symbol sequence (start -> data -> check -> stop), quiet zones'
  - White barcode background rectangle correctly isolates the barcode from both light
    and dark page backgrounds — scannable in both themes
  - Interactive tooltips expose symbol-level detail (character, position, code value)
    on hover — excellent use of lets-plot's distinctive layer_tooltips() capability
  - All text elements use theme-adaptive color tokens; perfect light/dark theme handling
    throughout
  - Fully deterministic, clean, flat code — easy to audit and verify
  weaknesses:
  - 'Design Excellence is functional but modest: the composition is technically correct
    but there is no creative visual emphasis beyond the barcode itself. Consider adding
    a subtle rounded border or shadow to the white barcode rectangle, or slightly
    larger quiet-zone padding for more visual breathing room.'
  - 'Title rendered with INK_SOFT (#4A4A44 light / #B8B7B0 dark) instead of INK (#1A1A17
    light / #F0EFE8 dark) — the title should use primary ink for stronger typographic
    hierarchy over the human-readable text below.'
  - No visual differentiation between start/stop patterns and data bars — an annotation
    or subtle bracket marking these structural zones would improve educational value.
