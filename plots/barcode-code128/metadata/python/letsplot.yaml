review:
  strengths:
  - 'Complete, technically correct Code 128B implementation from scratch: correct
    start-B symbol (104), character value mapping, modulo-103 checksum, and stop pattern
    (106) — all per the spec'
  - White barcode background (df_barcode_bg) ensures the black bars remain scannable
    in both light and dark themes — a deliberate, non-obvious design decision
  - 'Perfect canvas dimensions: ggsize(800,450) + scale=4 = 3200×1800 px exactly'
  - 'All required spec features present: quiet zones, start/check/stop patterns, human-readable
    text below barcode, high-contrast black bars on white'
  - Realistic, neutral content ('SHIP-2024-ABC123') fits the shipping label application
    listed in the spec
  - 'Correct theme-adaptive chrome throughout: PAGE_BG, INK, and INK_SOFT tokens applied
    to all text and backgrounds'
  weaknesses:
  - 'Design Excellence gap (12/20): the layout is functional and well-structured but
    does not reach publication-ready sophistication. The white barcode box has a visible
    default geom_rect border that breaks the seamlessness — add `color=PAGE_BG` (or
    `color=''white''`) on df_barcode_bg to eliminate the outlined-box look and integrate
    cleanly with the background.'
  - 'DE-01 limited (5/8): no design differentiation beyond the functional minimum
    for a barcode. Consider adding a subtle annotation with contextual metadata (e.g.,
    ''16 chars · Code 128B · check digit: XX'') beneath or beside the barcode to add
    informational hierarchy and polish.'
  - 'DE-03 limited (3/6): visual hierarchy exists (title → barcode → human text) but
    no storytelling layer. A descriptive subtitle such as ''Shipping label · Code
    128B · 16 characters'' positioned between the title and the barcode would add
    meaningful context and improve narrative flow without cluttering the design.'
  - 'LM-02 low (2/5): lets-plot''s HTML export is generated but the interactive potential
    (e.g., a tooltip showing character-level encoding details on hover) is not explored.
    Even a static annotation layer using letsplot''s geom_text with a well-designed
    label panel would better demonstrate the library''s grammar-of-graphics strength.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white.
      Chrome: Title "barcode-code128 · python · letsplot · anyplot.ai" rendered in muted dark gray (INK_SOFT = #4A4A44), clearly readable at the top center. No axis labels, tick labels, or grid (theme_void, appropriate for a barcode).
      Data: A large white rectangle (quiet zone + barcode area) holds dense black bars occupying roughly 80% of canvas width and 45% of canvas height. All bars are high-contrast black on white — maximum scan fidelity. Human-readable "SHIP-2024-ABC123" in large dark INK text is prominently displayed below the barcode. The white background rect has a thin default border visible against the off-white page — a minor refinement gap (see weaknesses).
      Legibility verdict: PASS — all text elements are clearly readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title in lighter muted gray (INK_SOFT = #B8B7B0 for dark theme), clearly legible against the dark background. Human-readable "SHIP-2024-ABC123" rendered in INK (#F0EFE8) — bright, large, fully readable.
      Data: The white barcode background rectangle is retained (mandatory for barcode functionality — black bars on white for scanning), appearing as a white label inset on the dark canvas. The barcode bars are identical black-on-white as in the light render. The white rect border becomes a white outline on dark background — also visible as in the light render.
      Legibility verdict: PASS — no dark-on-dark failures. All text is light-colored against the near-black surface. Data colors (black barcode bars on white background) are functionally unchanged between themes as required — background adapts, barcode scan zone does not.
