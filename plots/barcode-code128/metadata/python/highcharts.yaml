review:
  strengths:
  - Full Code 128B encoding implemented from scratch with correct check digit (modulo
    103 algorithm), start/stop patterns, and quiet zones — technically sound and spec-compliant
  - Both light (#FAF8F1) and dark (#1A1A17) theme backgrounds are correctly applied;
    title and footer text flip to INK/INK_SOFT tokens as required
  - 'All mandated spec features present: quiet zones, human-readable text below bars,
    high-contrast black-on-white barcode area, check digit calculation'
  - Clean KISS code structure — flat script, no functions or classes, deterministic
    output with fixed barcode string
  - Saves both plot-{THEME}.png and plot-{THEME}.html artifacts as required
  weaknesses:
  - Excessive whitespace in the lower half of the canvas — the barcode box ends around
    y=65% of canvas height and the footer sits at y=95%, leaving ~30% of canvas unused;
    either expand bar_height to fill more vertical space or reposition barcode to
    vertically center it in the canvas area
  - Title fontsize is 56px instead of the recommended 66px for highcharts; increase
    to 66px to match the style-guide default
  - Only Code 128B subset is demonstrated — the spec highlights three subsets (A,
    B, C) and dynamic switching; showing even a subtitle or annotation explaining
    subset selection, or using a numeric-only segment in Code C, would improve DQ-01
    feature coverage
  - 'Design storytelling is minimal — the footer text ''Code 128B · Shipping Label
    · Check digit: mod 103'' is helpful but a subtle annotation or label pointing
    to the start pattern, stop pattern, or quiet zone boundaries would elevate the
    educational value and DE-03 score'
  - 'Highcharts chart is used purely as a rendering canvas (series: []) with all drawing
    via renderer.rect()/text() — the Highcharts series API is not leveraged at all,
    which weakens LM-01 idiomatic usage score'
