review:
  strengths:
  - Technically correct Code 128B encoding with proper character table, check digit
    (mod 103), start/stop patterns, and quiet zones
  - Creative use of Highcharts xrange series to render barcode bars with per-bar color
    control
  - Thoughtful structural annotation system (zone dividers, zone labels, human-readable
    text, technical footer) that educates viewers about barcode anatomy
  - 'Correct theme-adaptive chrome: outer page background and title/footer text correctly
    flip between light (#FAF8F1) and dark (#1A1A17) themes'
  - Realistic shipping-label content ('SHIP-2024-ABC123') with neutral, real-world
    context
  - 'Complete spec feature coverage: quiet zones, START B, DATA, CHK, STOP all labeled
    and present'
  - Effective use of Highcharts renderer API (renderer.text, renderer.rect) for custom
    SVG annotations inside chart events.load callback
  - PIL normalization step ensures exact 3200x1800 canvas dimensions
  weaknesses:
  - 'plotBackgroundColor is hardcoded ''#FFFFFF'' (pure white) — violates the ''never
    pure #FFFFFF'' palette rule. For a barcode this is domain-justified, but consider
    using ''#FEFEFE'' or wrapping it in a white rect on top of the themed background
    instead'
  - Zone label font size (28px) is below the recommended 44px for tick-equivalent
    labels; at mobile scale (~400px) these labels may be hard to read — increase to
    at least 36px
  - One helper function `bx_to_px` is defined, violating the KISS/flat-structure rule;
    inline the single formula `MARGIN_L + (bx_units / x_total) * PLOT_W` where used
  - 'Zone label colors are hardcoded dark greys (#555550, #444440, #999990) instead
    of using INK/INK_SOFT tokens; while they''re inside the white inner area so readability
    is fine, using tokens would be more consistent'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white outer page (#FAF8F1) surrounds a white inner barcode area (plotBackgroundColor=#FFFFFF). The contrast between the warm outer and the crisp white inner is clean and intentional.
      Chrome: Title "barcode-code128 · python · highcharts · anyplot.ai" in bold dark text (#1A1A17) at top — fully readable, ~70% width. Footer "Code 128B · Subset B encodes ASCII 32–126..." in muted grey at bottom, readable.
      Data: Dense black vertical bars of varying widths fill the barcode area, rendered correctly as a Code 128B pattern. Below the barcode: zone divider ticks, then zone labels (← Quiet Zone, START B, DATA (16 chars · Subset B), CHK, STOP, Quiet Zone →) in dark grey at 28px. Human-readable "SHIP-2024-ABC123" in bold Courier New at 54px — prominent and clear.
      Legibility verdict: PASS — all text readable, no "light on light" issues.

    Dark render (plot-dark.png):
      Background: Near-black outer page (#1A1A17) surrounds the same white inner barcode area. The white barcode card stands out as a bright rectangle against the dark surface.
      Chrome: Title rendered in near-white (#F0EFE8/INK) against the dark outer background — clearly readable. Footer rendered in light grey (#B8B7B0/INK_SOFT) — readable.
      Data: Barcode bars are identically rendered (black on white inner area). Zone labels and human-readable text inside the white area remain dark text on white — no dark-on-dark issues since all barcode content is inside the white inner card. Data colors (black bars) are identical between light and dark renders.
      Legibility verdict: PASS — no dark-on-dark failures. All text elements readable in both theme zones (outer dark background with light chrome; inner white area with dark labels).
