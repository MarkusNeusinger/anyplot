review:
  strengths:
  - Implements the full Code 128B symbol table and encoding algorithm natively, with
    no external barcode library dependency — impressive engineering for a data-viz
    script
  - 'Correct barcode structure: quiet zones, start B pattern, Mod-103 check digit,
    stop pattern — spec-accurate'
  - Design choice to keep label card white regardless of theme is correct for scan
    reliability, and the green brand header adds visual identity without compromising
    the barcode
  weaknesses:
  - 'Metadata annotation at y=0.10 uses INK_SOFT token (#B8B7B0 in dark mode — light
    gray) on the always-white label card background, yielding ~2.2:1 contrast in dark
    render. Fix: use hardcoded ''#4A4A44'' for any text inside the white card area
    across both themes, since the card is always white.'
  - 'Separator segment annotate(''segment'', ..., colour=INK_SOFT) has the same issue
    in dark mode — #B8B7B0 on white is nearly invisible. Fix: use ''#4A4A44'' for
    this separator regardless of theme.'
  - Metadata font size=6 is very small for a 3200 px canvas — increase to size=7.
