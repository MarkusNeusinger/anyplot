review:
  strengths:
  - 'Correct full Code 128B implementation: valid start/stop patterns, modulo-103
    check digit, proper character encoding tables, and quiet zones — all per spec.'
  - 'Excellent theme adaptation: INK token correctly inverts bars between light (#1A1A17)
    and dark (#F0EFE8) themes with zero readability loss in either render.'
  - Clean PIL padding block properly targets the 3200x1800 canvas without cropping.
  - Idiomatic use of Altair mark_rect with x2 encoding as a creative barcode renderer
    — a genuinely appropriate API choice, not a workaround.
  - Code is fully deterministic, flat, and elegantly concise despite the necessarily
    large encoding table.
  weaknesses:
  - 'Title is wrong format: ''barcode-code128 · altair · pyplots.ai'' should be ''barcode-code128
    · python · altair · anyplot.ai'' (missing language=python, wrong domain name pyplots.ai→anyplot.ai).
    Fix: change the string in alt.Title(...).'
  - Dark mode renders barcode as inverted (white bars on dark background), diverging
    from the spec's 'high contrast black bars on white background' guideline. Keep
    the barcode interior white in both themes; only flip the outer canvas and title
    color.
  - No visual annotation highlighting start, stop, check digit, or quiet-zone regions,
    which would add educational value for a viewer unfamiliar with Code 128 structure.
