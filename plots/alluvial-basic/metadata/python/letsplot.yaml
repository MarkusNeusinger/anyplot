review:
  strengths:
  - Correct alluvial diagram type effectively showing voter transitions across election
    cycles
  - Good data representation with realistic, neutral scenario (US voter migration)
  - Clean layout with clear time points and category labels; good visual hierarchy
    in light theme
  - Light render is visually polished and readable with proper transparency to show
    overlapping flows
  - Accurate title format and appropriate legend omission with direct category labeling
  weaknesses:
  - Dark render flows are not clearly visible - colors lack contrast on dark background
    and transparency exacerbates readability
  - No theme-aware color or background adaptation - code doesn't read ANYPLOT_THEME
    or use theme tokens
  - Wrong output filenames - saves to plot.png instead of plot-{THEME}.png, breaking
    pipeline
  - Color hex values in code do not match Okabe-Ito palette or rendered output
  - No use of letsplot-specific interactive features; implementation is generic
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - correct theme color
      Chrome: Title, time headers (2016, 2020, 2024), party labels (left), value labels with counts (right) all clearly visible in black/dark text
      Data: Alluvial flows colored by destination (green #009E73 Democrats, orange #D55E00 Republicans, blue #0072B2 Independents, pink #CC79A7 Non-Voters). Node rectangles are solid colored and clearly defined. Flows use alpha=0.55 for transparency to show overlapping.
      Legibility verdict: PASS - all elements clearly readable

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct theme color
      Chrome: Title and all labels remain readable in light text with good contrast
      Data: CRITICAL ISSUE - The alluvial flows are very dark and difficult to distinguish against the dark background. Colors are unchanged from light theme (green, orange, blue, pink) but lack sufficient contrast on #1A1A17. Combined with 55% transparency, the dark blue in particular is nearly invisible, and the green/orange flows are also obscured. Node rectangles are somewhat difficult to see. The data colors are IDENTICAL to light render (correct per style guide), but the RENDERING lacks adequate contrast for readability in dark theme.
      Legibility verdict: FAIL - dark-on-dark contrast failure makes flows unreadable. This is a critical usability issue for an alluvial diagram where flow visibility is essential.
