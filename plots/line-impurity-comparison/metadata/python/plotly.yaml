  - Two targeted annotations (Peak at p=0.5, Divergence region) with themed background
    boxes and arrows create clear focal points and guide the reader directly to the
    key insights
  - All font sizes explicitly set (title=16px, axis labels=12px, ticks=10px, legend=10px,
    annotations=13–14px) and proportions look well-balanced at 3200×1800 px
  - 'Spec fully satisfied: correct curve math, edge cases handled (entropy=0 at p=0
    and p=1), legend includes formulas, vertical reference line at p=0.5, subtitle-style
    title format correct'
  - 'Redundant encoding: Gini solid line vs Entropy dashed — makes series distinguishable
    without relying on hue alone, improving CVD robustness'
  - Interactive hovertemplate per series plus write_html() export leverage Plotly's
    interactive strengths beyond a pure static PNG
  weaknesses:
  - 'Design Excellence has room to grow: no spines are explicitly removed (mirror=False
    suppresses mirroring but does not hide the axis lines — consider showline=False
    on top/right or use showspikes=False to tighten the look toward a true L-frame)'
  - 'DE-02: Both X and Y grids are active; for this smooth curve plot a Y-only grid
    would be cleaner and reduce visual noise without losing readability'
  - 'LM-02: fill=''toself'' and hover tooltips are good, but leveraging Plotly''s
    add_shape() for the reference line or using rangeslider/selection events would
    add a stronger Plotly-distinctive touch'
