  - 'Full theme-adaptive chrome: all tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    GRID) correctly branched for light and dark renders, both visually clean'
  - Shaded region between curves using fill='toself' with concatenated arrays is an
