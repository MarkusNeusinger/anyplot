review:
  strengths:
  - Perfect spec compliance — Gini and entropy curves with correct mathematical formulas,
    vertical dashed guide at p=0.5, peak annotation dots at both maxima
  - 'Imprint palette applied correctly: brand green (#009E73) for Gini as first series,
    lavender (#C475FD) for Entropy as second'
  - Creative CSS injection into pygal SVG to soften axis border lines — a distinctive
    pygal-specific technique leveraging the SVG rendering pipeline
  - Cubic interpolation produces visually smooth curves well-suited to the mathematical
    nature of the data
  - 'Correct theme-adaptive chrome: background, foreground, and all text tokens flip
    correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Edge-case handling at p=0 and p=1 via np.nan_to_num with np.errstate(divide='ignore')
    — no artefacts at curve endpoints
  weaknesses:
  - In the dark render the 'Entropy peak = 1.00' value label at (0.5, 1.0) sits right
    on the y=1.0 horizontal guide line, causing minor crowding — consider offsetting
    the annotation slightly above the guide or using a contrasting label background
  - Helper function _render_png defined inside the script breaks the KISS Imports→Data→Plot→Save
    pattern (CQ-01); the CSS manipulation could be inlined after chart construction
    rather than wrapped in a function
  - Design Excellence is functional but not exceptional — additional visual polish
    (e.g. a subtle filled area between the two curves, or a shaded region under Gini
    to contrast with the open Entropy arch) would elevate storytelling from 'data
    displayed' toward 'insight communicated'
