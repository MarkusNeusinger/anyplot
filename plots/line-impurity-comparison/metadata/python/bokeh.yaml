    HTML artifact alongside the static PNG'
  - 'Correct Imprint palette (brand green #009E73 first, lavender #C475FD second)
    with solid/dashed line redundant encoding for CVD safety'
  - Beautiful shaded inter-curve region plus dotted connector segment between maxima
    clearly communicates the mathematical relationship
  - Fully theme-adaptive chrome with correct token usage in both renders; dark render
    has no dark-on-dark failures
  - 'Mathematically rigorous: correct formula implementations with proper edge-case
    handling at p=0/1 using np.errstate + nan_to_num'
  - CDP device metrics override (Emulation.setDeviceMetricsOverride) ensures the screenshot
    is exactly 3200x1800 px
  weaknesses:
