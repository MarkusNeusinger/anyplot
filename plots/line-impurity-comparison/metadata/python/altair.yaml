  - 'Full spec compliance — all required features present: both curves, formula-labelled
    legend, annotated maxima at p=0.5, edge-case handling at p=0 and p=1, light grid,
    normalized entropy to [0,1]'
  - 'Correct Imprint palette with redundant encoding: Gini in #009E73 (solid) and
    Entropy in #C475FD (dashed) — CVD-safe dual encoding'
  - Perfect theme adaptation — both light (#FAF8F1 bg, dark-ink chrome) and dark (#1A1A17
    bg, light-ink chrome) renders are fully readable with no dark-on-dark failures
  - Well-structured Altair layer composition using + operator (lines + vertical_rule
    + annotation_point + annotation_text)
  - 'Clean, idiomatic Altair code: explicit strokeDash scale, legend orient/symbolStrokeWidth
    customisation, configure_view/axis/legend/title all set with theme-adaptive tokens'
  - 'Mathematically correct data: entropy edge cases handled with np.errstate + np.nan_to_num,
    200-point smooth curves (exceeds spec''s 100)'
  weaknesses:
  - 'X-axis tick density is excessive: 21 ticks at every 0.05 step from 0.00 to 1.00
    creates a cluttered baseline — reduce to every 0.10 (11 ticks) or 0.25 (5 ticks)
    for cleaner presentation; use axis=alt.Axis(values=[0,0.1,0.2,...,1.0], labelFontSize=10)
    to limit ticks'
  - The 'Entropy max = 1.0' annotation with dx=65 offset is positioned close to the
    legend in the upper-right quadrant, creating minor visual crowding — either reduce
    dx to ~40 or reposition the legend to 'bottom-right' to separate them
  - 'Design excellence is spec-driven rather than above-spec: DE-01 and DE-02 are
    limited by keeping all four chart borders (axis domain lines visible on all sides)
    and using a fairly basic layout — consider removing top/right axis domain lines
    via configure_axis(domainWidth=0 for top/right) or configure_view(strokeWidth=0
    only on unneeded sides), and adding subtle area fill between curves to show the
    difference between Gini and Entropy'
  - 'No visual hierarchy emphasis on the key insight: the plot shows two curves but
    doesn''t visually guide the viewer to the meaningful difference between Gini and
    Entropy — consider adding a shaded region between curves (area mark with the two
    series) or a subtle callout/annotation explaining that entropy is uniformly higher
    than Gini across [0,1], which is the educational point'
