      Data: Solid green (#009E73) Gini curve and dashed lavender (#C475FD) Entropy curve both arc symmetrically from (0,0) to (1,0), peaking at (0.5,1.0). A dotted vertical INK_MUTED line at p=0.5 with "max at p = 0.5" annotation in INK_MUTED gray. Annotation text at fontsize=11 is visibly small but readable at full resolution. Legend in a right-column panel with semi-transparent frame, showing formula labels with Unicode subscripts.
