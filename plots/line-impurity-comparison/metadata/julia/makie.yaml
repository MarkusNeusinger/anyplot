review:
  strengths:
  - 'Perfect spec compliance — all required features implemented: both curves, correct
    formulas, edge-case handling, legend with formula labels, and p=0.5 annotation'
  - Exemplary theme-adaptive chrome — all tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied in both light and dark renders; data colors identical
    across themes
  - 'Redundant encoding with color+linestyle (solid #009E73 Gini vs dashed #C475FD
    Entropy) makes the series distinguishable even under CVD'
  - Clean KISS code structure with correct Imprint palette, Makie layout system used
    correctly (fig[1,2] for legend), and all font sizes explicitly set
  - Annotation at p=0.5 with vertical dotted reference line effectively guides the
    viewer to the key insight
  weaknesses:
  - Annotation text fontsize=11 renders to ~22px at the canvas resolution (11pt ×
    px_per_unit=2). When scaled to ~400px mobile width this becomes ~2.75px — below
    legible threshold. Bump to fontsize=13 or 14 to match the tertiary-text minimum.
  - DE-01 design sophistication sits at a well-configured-default level. To push higher,
    consider filling the area between the two curves with a subtle semi-transparent
    band (band! or poly! in Makie) to visually emphasise the gap between Gini and
    Entropy, or adding a filled region under the Gini curve at low alpha to add depth.
  - LM-02 Makie-distinctive features are limited — the layout system (fig[1,2]) and
    vlines! are correct but the implementation misses opportunities like using Makie's
    Band primitive for area-between-curves or explicit tickformat for axis formatting.
