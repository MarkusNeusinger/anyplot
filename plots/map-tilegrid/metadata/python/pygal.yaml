  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "map-tilegrid · pygal · anyplot.ai" centered at top in dark ink — clearly readable. No axis labels (appropriate for map). Legend at bottom-left with 5 quintile entries in small but readable text.
