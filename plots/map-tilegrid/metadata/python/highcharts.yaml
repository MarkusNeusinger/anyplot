review:
  strengths:
  - Excellent spec compliance — all 51 US state/DC tiles rendered in correct equal-area
    grid layout with accurate geographic approximation
  - Viridis colormap with precise stops is the correct choice for continuous unipolar
    data and is perceptually uniform and colorblind-safe
  - All font sizes explicitly set (title 56px, subtitle 34px, data labels 40px, legend
    26px) ensuring readability at 4800x2700
  - Clean theme adaptation — PAGE_BG, INK, INK_SOFT tokens properly applied to chart
    background, title, legend, and colorbar labels in both light and dark renders
  - White text labels with dark outline on tiles ensures readability across the full
    viridis color range (dark purple to bright yellow-green)
  - Data is regionally plausible with correct directionality (Pacific Northwest high
    renewable, Coal Belt low) giving the plot immediate credibility
  - JS label-lookup formatter is an elegant solution for mapping (x,y) tile coordinates
    back to state abbreviations
  weaknesses:
  - Canvas utilization in corners is uneven — the irregular US tile grid shape leaves
    noticeable empty space in the lower-left (below AK/HI) and the lower-right area
    near the colorbar; this is partly inherent to the US shape but could be mitigated
    with slightly better margin tuning
  - Design sophistication is functional-clean but not publication-grade — there is
    no intentional visual hierarchy emphasis, no focal-point highlighting (e.g. highest/lowest
    states annotated), and no typographic flourish that elevates it above a well-configured
    default
  - The colorbar legend is vertically centered while the map occupies more of the
    upper canvas, creating a slight visual imbalance between the map and the colorbar's
    anchor point
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "map-tilegrid · highcharts · anyplot.ai" in dark ink, clearly readable. Subtitle "Renewable Energy Share by U.S. State — equal-area tile grid" in secondary dark ink, readable. Axes are hidden (appropriate for tile grid map). Colorbar legend "Renewable %" with percentage labels in dark soft ink — all legible.
      Data: 51 equal-area square tiles arranged in US geographic approximate positions. Viridis colormap: deep purple (#440154) for low renewable % (WV, KY, WY low end), through blue/teal mid-range, to yellow-green (#FDE725) for high renewable % (WA, OR). State abbreviations in white bold text with dark shadow/outline — readable across all tile colors. Page-background-colored border (5px) between tiles creates a clean mosaic.
      Legibility verdict: PASS — all text is clearly readable against the warm light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and subtitle rendered in light off-white ink (#F0EFE8), clearly visible against the dark background. Colorbar legend title and percentage labels rendered in light secondary ink (#B8B7B0) — readable. No dark-on-dark text observed.
      Data: Tile colors are visually identical to the light render — same viridis gradient from deep purple for low renewable % states to yellow-green for high. White bold state abbreviation labels with dark outline remain clearly legible on all tile colors. Border between tiles uses the dark page background, maintaining the clean mosaic effect.
      Legibility verdict: PASS — all chrome flips correctly to light-on-dark; data colors are identical between both renders.
