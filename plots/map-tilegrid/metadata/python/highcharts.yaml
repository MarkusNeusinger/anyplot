review:
  strengths:
  - Perfect spec compliance — all required tile grid features implemented (equal-area
    tiles, geographic layout, colorbar, state abbreviation labels)
  - Excellent data quality with regionally plausible renewable energy data and realistic
    state-level overrides using bounded random generation
  - 'Correct viridis colormap for sequential continuous data; both theme backgrounds
    (#FAF8F1 / #1A1A17) correctly applied with full theme-token wiring'
  - Clean reproducible code with seed, no abstraction overhead, and proper fallback
    CDN handling for Highcharts JS download
  - Idiomatic Highcharts heatmap with JS formatter for dynamic label lookup — a distinctive
    library feature well-utilized
  weaknesses:
  - Large empty vertical space between title/subtitle and the start of the tile grid
    — approximately 20% of canvas height is wasted; adjust y_axis range or reduce
    marginTop to better fill the 4800x2700 canvas
  - Tooltip uses this.point.name but heatmap data is [x, y, value] arrays with no
    name field — state name shows as empty in tooltips; the JS lookup table already
    built for dataLabels should be reused in the tooltip formatter
  - Title (56px) and subtitle (34px) appear smaller than ideal for the high-resolution
    canvas; 72px/48px would improve visual hierarchy
