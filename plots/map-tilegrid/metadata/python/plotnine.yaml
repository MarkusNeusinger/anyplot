    (PAGE_BG, ELEVATED_BG, INK, INK_SOFT)
  - Realistic and neutral US renewable energy dataset covering all 50 states plus
    DC with plausible percentage values
  - Clean idiomatic plotnine implementation using coord_fixed() for equal-area preservation
    and scale_color_identity() for custom tile labels
  weaknesses:
