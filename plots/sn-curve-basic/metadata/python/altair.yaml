  strengths:
  - 'Full spec coverage: log-log S-N axes, scatter data with Basquin power-law fit,
    three fatigue-region text annotations, and dashed reference rules for UTS/YS/EL
    all present and correctly rendered'
  - 'Okabe-Ito palette applied correctly: #009E73 for data/fit, positions 2-3-4 for
    the three reference lines — CVD-safe throughout'
  - 'Theme-adaptive chrome is thorough: PAGE_BG, ELEVATED_BG, INK, and INK_SOFT tokens
    drive every non-data element; both renders pass the legibility check'
