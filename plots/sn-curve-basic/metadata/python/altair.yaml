    region labels and tick values provide sufficient context and remove the encoding
    titles to stop them from inflating image dimensions unnecessarily.'
  - 'DE-01 slightly below publication-ready: design is strong but no explicit spine
    removal code (relying on altair defaults for L-shaped axes). Adding configure_axis(domain=False)
    for top/right axes would improve visual refinement.'
  - mark_text used for chart title (y=alt.value(8)) as a workaround for the PIL crop
    — pragmatic but not idiomatic altair; the proper alt.Title approach with fine-tuned
    padding would be more aligned with library conventions.
