    than silently cropping (which would trigger AR-09)'
  - Infinite-life zone (mark_rect band below EL) adds excellent visual context with
    minimal opacity (0.10) that doesn't overpower the data
  - 'Altair layer composition idiomatic: five mark types composed cleanly with shared
    scales propagated through encoding rather than repeated per layer'
  weaknesses:
  - Legend box (bottom-right) sits flush against the EL reference line (150 MPa) and
    slightly crowds the bottom-right data area — consider orient='bottom-left' or
    bump legend inside-left to give the EL line visual breathing room
  - X-axis grid is fully suppressed (gridOpacity=0) while the style guide recommends
    y-grid-only for line/bar but both-axes for scatter; in a scatter context the missing
    x-grid slightly reduces cycle-count readability
  - 'DE-01 ceiling: the visual hierarchy (scatter → fit → ref lines → zone band) is
    well-designed but DE polish could go further — e.g. a bolder fit line (strokeWidth=3
    vs current 2.5) to signal it as the primary trend element vs raw data'
  - Font weight on region annotations matches axis tick labels (INK_SOFT, fontSize=12)
    — a weight=lighter or fontSize=11 would create clearer tertiary hierarchy below
    the axis labels
