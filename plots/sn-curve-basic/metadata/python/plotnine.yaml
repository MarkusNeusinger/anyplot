review:
  strengths:
  - 'Full Okabe-Ito compliance: data, fit line, band, and all three reference lines
    use palette positions 1–4 in order'
  - geom_rug adds marginal data density visualization — a distinctive ggplot/plotnine
    feature rarely used elsewhere
  - ±2σ confidence band via geom_ribbon correctly represents Basquin scatter uncertainty
  - Shape encoding (circle=failure, triangle=runout) provides redundant coding beyond
    color — CVD-safe and spec-correct
  - Endurance limit reference line deliberately made thicker (1.2 vs 0.9) to create
    focal point hierarchy
  - 'Theme-adaptive chrome fully implemented: all chrome tokens (INK, INK_SOFT, PAGE_BG)
    flow through properly in both renders'
  - 'Perfect spec compliance: log-log axes, all three reference lines, Basquin fit,
    runout points, and confidence band all present'
  - 'Clean grammar-of-graphics layer composition: each visual feature is a separate
    idiomatic geom layer'
  - np.random.seed(42) ensures full reproducibility; all data generated deterministically
  weaknesses:
  - Annotation text size (size=10) is the same as axis labels — slightly increasing
    to 10.5–11pt would improve readability of the reference line labels at mobile
    widths
  - geom_rug adds visual complexity to the x-axis margin; could optionally restrict
    to x-axis only (sides='b') to reduce clutter
  - DE-01 score limited because the design, while polished and technically correct,
    relies on relatively conventional ggplot aesthetics without distinctive layout
    or typographic choices beyond Okabe-Ito
