      Data: Green (#009E73) circles for failure data (~40 points), green triangles for runout (3 points near 10^7 cycles / ~250 MPa). Basquin fit line in solid green with ±2σ green ribbon band (alpha=0.12). Orange (#D55E00) dashed line for Ultimate Strength (550 MPa), blue (#0072B2) dashed for Yield Strength (350 MPa), pink (#CC79A7) dashed for Endurance Limit (250 MPa). Each reference line annotated with text in matching color. geom_rug visible at bottom and left margins.
