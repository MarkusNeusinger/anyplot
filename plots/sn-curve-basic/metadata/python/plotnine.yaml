review:
  strengths:
  - 'Full spec compliance: both log scales, all three reference lines (Ultimate/Yield/Endurance),
    Basquin fit line, scatter band, and runout markers'
  - geom_rug for marginal data density is a distinctive plotnine/ggplot2 feature used
    effectively
  - Shape encoding (circles for failure, triangles for runout) provides redundant
    encoding beyond color alone
  - geom_ribbon uncertainty band communicates ±2σ scatter in an idiomatic ggplot manner
  - 'Correct theme-adaptive chrome: all INK/INK_SOFT tokens wired to title, axis labels,
    tick labels, legend'
  - 'Okabe-Ito reference line colors follow canonical order (#D55E00, #0072B2, #CC79A7
    for positions 2–4)'
  - Perfect canvas dimensions (3200×1800) and correct background colors in both themes
  - Endurance limit line slightly thicker than other reference lines — good focal-point
    choice
  weaknesses:
  - The 'Yield Strength (350 MPa)' text annotation (placed at y=yield_strength+20=370,
    x=1e3, ha='left') overlaps with multiple green data points clustered around 350–370
    MPa and 10^3–10^5 cycles in both renders. Shift annotation x to a less crowded
    region (e.g. x=2e5) or nudge y offset to +35.
  - 'Design Excellence is functional but modest: no spine-hiding or L-frame (panel_border
    is blank but axis lines are also blank — invisible borders rather than intentional
    spine styling), no prominent focal-point beyond the slightly thicker endurance-limit
    line.'
  - The Basquin fit line extends well beyond the data range to lower-right, showing
    the extrapolation region but without visual cue (e.g. dashed segment or clip).
    Minor cosmetic issue.
