review:
  strengths:
  - Full Okabe-Ito palette in canonical order across five series — each data category
    has a consistent color identity
  - Three-region shading with italic annotations correctly delineates low-cycle, high-cycle,
    and infinite-life fatigue zones
  - Reference lines with MPa values embedded in legend labels — no need for separate
    annotations
  - Complete theme-adaptive chrome in both renders; no dark-on-dark failures in the
    dark theme
  - Realistic structural steel data (UTS 500, Yield 350, Endurance 200 MPa) with proper
    Basquin equation implementation and scatter per stress level
  weaknesses:
  - 'Y-axis tick labels render in scientific notation (2 × 10²) rather than plain
    MPa integers (200, 300 …) as intended by FixedFormatter — use FuncFormatter(lambda
    x, _: str(int(x))) after set_yscale(''log'') for reliable plain-integer output'
  - X-axis minor gridlines from log-scale default behavior are visible despite ax.yaxis.grid(True)
    — add ax.xaxis.grid(False) after ax.set_xscale('log') to suppress them and achieve
    the intended horizontal-only grid
