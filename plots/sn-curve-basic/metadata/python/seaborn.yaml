review:
  strengths:
  - 'Perfect theme-adaptive chrome: all tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    threaded through sns.set_theme rc dict AND individual element calls; dark render
    is fully readable with no dark-on-dark failures'
  - Full spec compliance including all three reference lines (Ultimate Strength, Yield
    Strength, Endurance Limit) with MPa values in legend
  - Realistic, well-parameterised structural steel fatigue data using Basquin equation
    with correct exponent range (b=-0.12)
  - 'Perfect code quality: reproducible (seed=42), flat sequential structure, clean
    imports, correct output filenames'
  weaknesses:
  - 'Seaborn library mastery thin: the S-N fit line uses ax.plot() (matplotlib) instead
    of sns.lineplot(); consider sns.lineplot for the fit curve to make seaborn the
    primary plotting API beyond just the scatter'
  - Grid with which='both' produces dense minor gridlines on log-log axes adding visual
    noise; prefer y-axis-only major gridlines or ax.grid(True, which='major', ...)
    for a cleaner look
  - No visual delineation of the three S-N fatigue regions (low-cycle, high-cycle,
    infinite life); axvspan shading with low alpha (0.03-0.05) or text annotations
    in region corners would significantly improve data storytelling
