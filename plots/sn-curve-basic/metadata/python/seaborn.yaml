review:
  strengths:
  - Sophisticated use of seaborn lineplot with estimator=mean and errorbar=(pi, 95)
    to display bootstrap-derived 95% prediction interval — distinctive seaborn feature
  - Full Okabe-Ito palette compliance across 4 series with correct ordering; both
    renders theme-correct with all chrome tokens applied
  - Infinite life region shaded via axhspan creates a clear focal point at the endurance
    limit; reference lines tell the complete material properties story
  - Canvas correctly sized (figsize=(8,4.5), dpi=400) with subplots_adjust instead
    of bbox_inches=tight — no canvas drift
  - Realistic structural steel data with physically meaningful Basquin parameters
    and lognormal scatter representing multi-specimen variability
  weaknesses:
  - Design storytelling leaves the three fatigue regions (Low-Cycle Fatigue, High-Cycle
    Fatigue, Infinite Life) unlabeled — text annotations in the plot area would elevate
    educational value and visual hierarchy; the spec explicitly describes these three
    regions
  - Scatter markers use edgecolor=none while the style guide recommends white or page-background
    edges for definition when points overlap (visible clustering around 10^4–10^6
    cycles)
  - Legend at 8pt is at the lower readability threshold; minor upward adjustment to
    9pt would improve readability at mobile widths
