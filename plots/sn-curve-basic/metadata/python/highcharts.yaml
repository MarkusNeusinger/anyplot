review:
  strengths:
  - 'Perfect spec compliance: all required S-N curve features implemented (log-log
    axes, three region bands, three reference lines, scatter data, Basquin fit)'
  - Region shading via Highcharts plotBands is an excellent use of library-specific
    features that adds clear fatigue-regime context
  - Color-coded reference line labels with right-aligned text provide clear engineering
    hierarchy
  - Realistic, factually accurate steel fatigue data with proper Basquin equation
    parameterization (UTS=500, YS=350, EL=200 MPa)
  - Theme adaptation fully correct — backgrounds, text, and chrome flip correctly
    between light and dark renders
  weaknesses:
  - 'marginBottom: 120 too tight for 44px tick labels + 56px axis title on X-axis
    — increase to at least 180 to prevent bottom clipping (known Highcharts PNG pitfall)'
  - Reference lines use red (#E53935) and green (#43A047) — CVD-problematic red-green
    pair; replace with Okabe-Ito blue (#0072B2) for endurance limit and orange (#E69F00)
    for yield strength
  - Y-axis min of 150 creates empty dead space below the 200 MPa endurance limit where
    no data exists; set min to ~185
  - LineSeries imported from highcharts_core.options.series.area instead of correct
    highcharts_core.options.series.line
  - Region band label font size at 32px is marginally small; raise to 38px for visual
    balance with other secondary text
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "sn-curve-basic · python · highcharts · anyplot.ai" in dark bold text, readable. Y-axis label "Stress Amplitude (MPa)" clearly visible rotated on left. X-axis label "Number of Cycles to Failure (N)" and tick labels present but marginBottom=120 is tight for 44px ticks + 56px title — potential clipping at bottom edge. Y-axis ticks (160,180,...,600) clearly visible.
      Data: Green scatter points (#009E73, Okabe-Ito #1) at ~40 data points across stress levels 210-470 MPa. Orange Basquin fit line (#D55E00, Okabe-Ito #2) runs through scatter. Three region bands (orange/blue/green tint) label Low-Cycle, High-Cycle, Infinite Life. Three dashed reference lines: red (Ultimate Strength 500 MPa), orange (Yield Strength 350 MPa), green (Endurance Limit 200 MPa) with right-aligned labels.
      Legibility verdict: PASS with concern — X-axis bottom may be clipped due to tight margin

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title and all axis labels flip to light text (#F0EFE8/#B8B7B0) — clearly readable against dark background. No dark-on-dark failures detected. Legend box uses elevated dark background (#242420). Same X-axis bottom margin concern applies.
      Data: Green scatter points (#009E73) and orange fit line (#D55E00) are identical to light render — data colors unchanged between themes. Reference line colors also unchanged. Region bands appear as darker tinted overlays that work well on dark background.
      Legibility verdict: PASS with same X-axis bottom concern as light render
