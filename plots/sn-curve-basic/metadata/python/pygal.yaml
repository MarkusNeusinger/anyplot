    (VQ-02)'
  - Reference lines for Ultimate Strength and Yield Strength use thin strokes (width=5)
    — at mobile/thumbnail scale these may be difficult to distinguish from the region-band
    dividers (VQ-03)
  - 'DE-01: Aesthetic is functional/engineering-focused; the region band fills (faint
    red/green/blue tints) are somewhat arbitrary and lack a unified design rationale'
  - 'DE-02: Full plot frame retained (no top/right spine removal) and grid styling
    is default; minor whitespace refinement possible in the legend area'
