  - Advanced SVG injection technique for fatigue region bands demonstrates deep pygal
    knowledge (regex parsing of pygal SVG, inserting custom elements in plot coordinate
    space)
  - 'Strong data storytelling: region labels, differentiated reference-line stroke
    styles (solid/long-dash/short-dash with varying widths), and tooltip zone annotations
    layer multiple information channels'
