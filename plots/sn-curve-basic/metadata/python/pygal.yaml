review:
  strengths:
  - 'Excellent log-log implementation: x-axis uses native pygal logarithmic mode,
    y-axis uses log10 transform with explicit MPa label mapping — a sophisticated
    and necessary workaround for pygal''s single-axis log limitation'
  - 'Perfect Okabe-Ito palette order — first series #009E73 (Test Data), followed
    by #D55E00, #0072B2, #CC79A7, #E69F00 — with distinct stroke styles (solid/long-dash/dotted)
    on reference lines aiding accessibility beyond color alone'
  - All three required material property reference lines present with precise MPa
    values in legend labels (Su=520, Sy=350, Se=190)
  - Interactive tooltip formatter maps raw log10 values back to human-readable MPa
    and cycles — correctly uses pygal's value_formatter for this
  - 'Both light and dark renders clean and readable: correct #FAF8F1/#1A1A17 backgrounds,
    all theme tokens (INK, INK_MUTED) properly threaded through Style object'
  - Zone information (Low-Cycle Fatigue / High-Cycle Fatigue / Near Endurance Limit)
    in per-point tooltip labels adds engineering context for interactive HTML output
  - 'Complete spec coverage: scatter with 3-5 replicates per stress level, Basquin
    fit curve, three reference lines, log-log axes, appropriate 100–10M cycle range'
  weaknesses:
  - Test data points in the high-stress, low-cycle region (450–400 MPa) overlap significantly
    due to dots_size=26 and no alpha transparency; the scatter distribution is masked
    — reducing dots_size to ~20 and adding opacity=0.75 would make individual specimens
    more distinguishable
  - 'Endurance Limit reference line (yellow #E69F00 dotted) is the least visually
    prominent — the dotted stroke style and lighter color make it harder to spot against
    the off-white background, especially in the legend where swatches are small; consider
    increasing stroke_style width to 6+ for this line'
  - Full-frame box spine remains (pygal library limitation — no spine removal API);
    while unavoidable, the enclosed grid frame reduces visual refinement versus an
    L-shaped frame
  - Legend color swatches are small (legend_box_size=32) for a 5-series plot making
    it slightly harder to quickly match series to their chart elements at a glance
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, non-pure-white surface
      Chrome: Title "Steel Fatigue · sn-curve-basic · python · pygal · anyplot.ai" in dark ink, spanning ~65% of canvas width, clearly readable. Y-axis label "Stress Amplitude (MPa)" and X-axis label "Cycles to Failure (N)" both in dark ink at appropriate size. Tick labels (100 to 10,000,000 on X; 150–550 MPa on Y) rendered in muted ink, fully readable. Horizontal Y-guides are subtle and non-dominant.
      Data: Large green (#009E73) scatter dots for Test Data — prominent and clearly visible. Orange dashed Basquin fit line (#D55E00) visible across the full cycle range. Blue solid horizontal line for Ultimate Strength (#0072B2) at ~520 MPa. Pink long-dashed line for Yield Strength (#CC79A7) at ~350 MPa. Yellow dotted line for Endurance Limit (#E69F00) at ~190 MPa. First series correctly #009E73.
      Legibility verdict: PASS — all text elements readable on warm off-white background, no light-on-light issues observed.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct warm dark surface
      Chrome: Title and axis labels rendered in light ink (#F0EFE8 equivalent), clearly readable against dark background. Tick labels in muted light tone, visible. Grid lines subtle on dark surface.
      Data: All data colors identical to light render — green #009E73 scatter dots, orange dashed Basquin fit, blue Ultimate Strength line, pink Yield Strength line, yellow Endurance Limit line. No color shift between themes (only chrome adapts).
      Legibility verdict: PASS — no dark-on-dark failures observed. All text elements readable against #1A1A17 background. Dark render is a clean inversion of the light render with identical data colors.
