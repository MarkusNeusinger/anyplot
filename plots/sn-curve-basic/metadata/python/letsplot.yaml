review:
  strengths:
  - 'Full spec compliance: logarithmic axes, Basquin fit line, scatter from multiple
    specimens, and all three reference lines (Ultimate Strength, Yield Strength, Endurance
    Limit) are present and correctly positioned.'
  - Three-zone fatigue regime shading (low-cycle / high-cycle / infinite life) with
    complementary Okabe-Ito fills and very subtle alpha (0.07) adds visual depth and
    engineering context without overwhelming the data.
  - Dual CVD encoding on reference lines — each uses a distinct color AND linetype
    (dashed / dotted / dot-dash), making them distinguishable without relying on hue
    alone.
  - Interactive layer_tooltips() for scatter points (cycles + stress) leverages lets_plot's
    distinctive feature, and the HTML output is correctly saved alongside the PNG.
  - Theme-adaptive chrome is correctly wired through all elements (background, text,
    grid, legend) — both renders are fully readable with no dark-on-dark failures.
  weaknesses:
  - 'VQ-02 OVERLAP: The ''Yield Strength'' inline text label (x=500, y=364 MPa) overlaps
    with the Basquin fit line in the N≈1000-5000 cycle range, where the descending
    fit line crosses y≈374-341 MPa — the same vertical band as the text. Fix: move
    all three inline labels to the right side of the plot (e.g. x=2e6 with hjust=1)
    where the fit line has moved well below 200 MPa and label-line crowding is eliminated.'
  - 'DE-01 DESIGN: Label placement at x=500 crowds the left margin where data points
    and the fit line converge. Moving the labels rightward (e.g., x=5e5 to x=5e6)
    would separate them from the dense data region and improve overall polish.'
  - 'VQ-01 MINOR: The ''Ultimate Strength'' label is rendered at y=520 MPa (above
    the visible y-axis range of ~100-500), placing it in the top margin above the
    data area. While visible, it sits very close to the top of the panel — nudging
    it down slightly (e.g., y=ultimate_strength * 1.01 or position it just below the
    dashed line) would be cleaner.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — not pure white, correct anyplot surface.
      Chrome: Title "sn-curve-basic · python · letsplot · anyplot.ai" in dark ink at top-left, ~65% of plot width. Y-axis label "Stress Amplitude (MPa)" and X-axis label "Number of Cycles to Failure (N)" in dark ink, clearly readable. Tick labels in INK_SOFT (medium gray), all readable. Subtle warm-gray grid lines visible but non-dominant.
      Data: Basquin fit line in #009E73 (brand green), size=1.5. ~35 scatter points in #009E73, size=3.5, alpha=0.85. Three horizontal reference lines: orange dashed (Ultimate Strength @ 500 MPa), blue dotted (Yield Strength @ 350 MPa), pink dot-dash (Endurance Limit @ 200 MPa). Three zone-shaded backgrounds: orange-tinted (low-cycle above yield), blue-tinted (high-cycle), pink-tinted (infinite life below endurance). Inline text labels for each reference line in matching colors at x=500. Y-axis log scale shows ticks 79, 100, 126, 158, 200, 251, 316, 398, 501. X-axis log scale 100 to 10^8.
      Issue: "Yield Strength" label (x=500, y≈364) visually overlaps with the descending Basquin fit line in the N≈1000-5000 cycle range. The "Ultimate Strength" label is placed slightly above y=500 (the axis upper bound), rendering it in the top margin above the 501 MPa tick.
