review:
  strengths:
  - 'Complete spec implementation: all three fatigue regimes (low-cycle, high-cycle,
    infinite life zone shading), all three material property reference lines (Ultimate
    Strength, Yield Strength, Endurance Limit), Basquin fit line, and multi-specimen
    scatter'
  - Elegant inline labels via geom_text replace a separate legend — cleaner design
    and fewer distractions
  - Color-coded zone shading matches reference line colors (Okabe-Ito positions 2–4)
    for strong visual coherence between zones and their boundary lines
  - CVD-accessible distinct linetypes (dashed, dotted, dot-dashed) on reference lines
    provide redundant encoding beyond hue alone
  - Letsplot-distinctive layer_tooltips() used for interactive HTML output with meaningful
    cycle/stress data — both PNG and HTML saved correctly
  weaknesses:
  - Inline reference line text (geom_text size=9) may be slightly small for mobile
    readability at ~400px width — consider increasing to size=10 or 11
  - Basquin fit line and data points share the same BRAND color (#009E73), reducing
    visual hierarchy between the mathematical model and the raw test data — a slightly
    thicker fit line (size=1.5) or a secondary Okabe-Ito color would differentiate
    them
  - At the left edge (x~200), the green fit line and the orange Ultimate Strength
    horizontal line are very close together, creating minor visual crowding at the
    top-left corner of the plot
