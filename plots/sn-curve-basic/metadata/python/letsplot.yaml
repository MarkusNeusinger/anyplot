review:
  strengths:
  - 'Full spec compliance: all required features present — log-log axes, Basquin fit
    line, scatter from multiple specimens, three horizontal reference lines (Ultimate
    Strength / Yield Strength / Endurance Limit), and three fatigue regime zones via
    subtle geom_rect shading'
  - 'Complete theme-adaptive chrome: all six tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    GRID) correctly applied to every chrome element in both light and dark renders
    — no dark-on-dark or light-on-light failures'
  - 'CVD-accessible design: distinct linetypes (dashed, dotted, dot-dash) are used
    alongside distinct Okabe-Ito colors for the three reference lines, providing two
    independent encodings for colorblind viewers'
  - 'Native letsplot interactivity: layer_tooltips().line() provides rich hover tooltips
    in the HTML exports showing formatted cycle count and stress amplitude per specimen'
  - 'Realistic structural steel data: UTS=500 MPa, yield=350 MPa, endurance limit=200
    MPa are physically correct for medium-carbon steel; lognormal scatter (sigma=0.15)
    represents typical fatigue test variability'
  weaknesses:
  - 'Inline text labels for reference lines slightly overlap the reference lines themselves:
    ''Ultimate Strength'' at y=485 (500×0.97) sits just below the dashed line at y=500;
    ''Endurance Limit'' at y=208 (200×1.04) sits just above the dot-dash line at y=200
    — in log space these gaps are tiny and the labels visually cross the lines. Consider
    offsetting labels further (e.g., y*0.93 / y*1.08) or nudging horizontally to a
    data-free region where the lines and labels don''t intersect.'
  - Zone shading at alpha=0.07 is extremely subtle — the fatigue regime zones (low-cycle,
    high-cycle, infinite life) are barely perceptible in both renders, especially
    where different zones meet. Consider raising to alpha=0.10–0.12 so the zones read
    as distinct regions without overwhelming the data.
  - 'Design Excellence could be elevated: panel_background is set to the same PAGE_BG
    as the plot background (no elevation), all four spines are visible through axis_line
    (L-shape would need removing top/right explicitly in letsplot), and the overall
    composition, while functional, stops short of publication-level polish.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct, not pure white
      Chrome: title "sn-curve-basic · python · letsplot · anyplot.ai" in dark #1A1A17 at top-left, spans ~65% of width; Y-axis label "Stress Amplitude (MPa)" and X-axis label "Number of Cycles to Failure (N)" in dark ink, both clearly readable; tick labels in medium-gray INK_SOFT, readable including the scientific notation labels (10^6, 10^7, 10^8) at the right of the X-axis
      Data: green (#009E73) scatter points clustered at x~200–20,000 (10 stress levels, 3–5 specimens each), green Basquin fit line extending from x~300 to x~10^7; three very subtle zone-shaded regions (orange for low-cycle, blue for high-cycle, pink for infinite life at alpha=0.07); three horizontal reference lines — dashed orange at y=500 (Ultimate Strength), dotted blue at y=350 (Yield Strength), dot-dash pink at y=200 (Endurance Limit); inline text labels for each reference line positioned at x=2e6 and colored to match their respective lines
      Legibility verdict: PASS — all text readable against light background

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, not pure black
      Chrome: title, axis labels, and tick labels all render in light #F0EFE8 / #B8B7B0 tones — clearly readable against the dark surface; no dark-on-dark failures observed; grid lines subtle and visible
      Data: green (#009E73) data points and fit line are IDENTICAL to the light render; zone shading colors unchanged; reference lines and inline labels all visible in their respective Okabe-Ito colors; legend background elevated to #242420 per token
