review:
  strengths:
  - 'Excellent spec compliance: all required features (log-log axes, three reference
    lines, scatter from multiple specimens, Basquin fit line) implemented correctly'
  - Color-coordinated inline text labels for reference lines create effective visual
    hierarchy without needing a legend
  - 'Strong data storytelling: three fatigue regions (low-cycle, high-cycle, infinite
    life) are immediately readable from the labeled reference lines'
  - Realistic, factually accurate structural steel fatigue data with physically plausible
    Basquin parameters (A=800, b=-0.10) and specimen scatter via lognormal sampling
  - layer_tooltips() leverages letsplot's built-in interactive capability distinctively;
    HTML export provides a bonus interactive version
  weaknesses:
  - Code uses color='#306998' (Python Blue) for data points and fit line — must be
    '#009E73' (Okabe-Ito first position, brand green)
  - 'Reference line colors (#DC2626, #B8860B, #22C55E) are non-Okabe-Ito custom hexes;
    use ''#D55E00'', ''#0072B2'', ''#CC79A7'' in canonical order'
  - 'No os.getenv(''ANYPLOT_THEME'', ''light'') adaptive chrome block: background,
    text, and grid colors must flip between light and dark themes using PAGE_BG/INK/INK_SOFT
    tokens'
  - Output saved as plot.png / plot.html instead of plot-{THEME}.png / plot-{THEME}.html
    with the ANYPLOT_THEME variable
  - 'Title in code is ''sn-curve-basic · letsplot · pyplots.ai'' — missing ''python
    ·'' and uses wrong domain; correct format: ''sn-curve-basic · python · letsplot
    · anyplot.ai'''
  - linetype='dashed' on the panel grid visually competes with the three dashed reference
    lines; switch to solid thin grid lines with low opacity per style guide
  - Canvas ggsize(1600, 900) at scale=3 produces 4800x2700 px (non-standard); target
    is ggsize(800, 450) at scale=4 = 3200x1800 px
  - Reference lines use color as sole distinguishing signal; adding distinct linetype
    per reference line (dashed, dotted, dotdash) would improve CVD accessibility
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, not gray.
      Chrome: Title "sn-curve-basic · python · letsplot · anyplot.ai" in dark text at top left — readable. Y-axis label "Stress Amplitude (MPa)" and X-axis label "Number of Cycles to Failure (N)" in dark text — readable. Log-scale tick labels (100, 1000, 10000 ... 10^7 on X; ~200-500 MPa on Y) clearly legible. Subtle dashed gray grid on both axes.
      Data: ~35 green/teal scatter points (size=5, alpha=0.7) with a prominent green/teal fit line. Three dashed horizontal reference lines: orange (Ultimate Strength ~500 MPa), blue (Yield Strength ~355 MPa), pink/magenta (Endurance Limit ~200 MPa). Each reference line has a matching-color text label on the left side. First data series appears green consistent with #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black consistent with #1A1A17 — not pure black.
      Chrome: Title, axis labels, and tick labels all render in light-colored text clearly readable against the dark surface. No dark-on-dark failures observed. Grid lines appear subtle on the dark background.
      Data: Scatter points and fit line remain the same green/teal as the light render — data colors are identical across themes as required. Three reference lines (orange, blue, pink) unchanged from light render.
      Legibility verdict: PASS
