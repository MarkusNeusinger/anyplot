review:
  strengths:
  - 'Full Okabe-Ito palette compliance: BRAND green (#009E73) as first series (Basquin
    fit line), then #D55E00 test data, #0072B2/#CC79A7/#E69F00 for reference lines
    — canonical order throughout'
  - 'Complete spec compliance: log-log axes, scatter data with realistic per-stress-level
    scatter, Basquin power-law fit line, and all three reference lines (Ultimate Strength,
    Yield Strength, Endurance Limit)'
  - 'Full theme adaptation: #FAF8F1 light / #1A1A17 dark backgrounds, all chrome tokens
    (INK, INK_SOFT, GRID, ELEVATED_BG) consistently applied in both renders — no dark-on-dark
    failures'
  - Idiomatic Plotly use of add_hrect() for the infinite life zone fill and add_annotation()
    with showarrow=True for the fatigue knee — both are Plotly-distinctive features
  - Direct line labeling of reference lines (showlegend=False + right-edge annotation
    boxes) instead of legend entries — cleaner, more professional presentation
  - Fatigue Knee annotation with arrow at ~10^6 cycles identifies the key engineering
    transition point — adds genuine educational value beyond raw data display
  - Proper canvas dimensions (3200×1800 via width=800, height=450, scale=4) and both
    PNG+HTML outputs with hovertemplate for the interactive view
  - Reproducible data generation with np.random.seed(42) and realistic Basquin model
    parameters (A=1200 MPa, b=-0.12) with log-normal scatter — matches real steel
    fatigue behavior
  - 'Clean flat code structure: no functions/classes, all imports used, appropriate
    loop for the three reference line annotations'
  weaknesses:
  - 'VQ-03 -1: Infinite life zone fill at opacity=0.11 (add_hrect fillcolor=BRAND)
    is extremely subtle — the green tint is barely perceptible against #FAF8F1. The
    text label saves comprehensibility but the fill itself barely registers as a meaningful
    visual cue. Raise opacity to 0.15-0.20 for better impact without overwhelming
    the data.'
  - 'VQ-01 -1: Reference line annotation boxes at x=8e6 with xanchor=''right'' sit
    at ~90% across the log-axis and are very close to the right-edge tick area. While
    not clipped, they appear cramped against the trailing x-axis ticks. Consider moving
    to x=5e6 or x=6e6 and adjusting xanchor to provide more breathing room.'
  - 'DQ-01 -1: Spec Notes mention three distinct fatigue regions (low-cycle fatigue,
    high-cycle fatigue, infinite life). Only the infinite life zone is visually delineated.
    The LCF/HCF boundary at approximately N=10^4 cycles is unmarked. A subtle vertical
    dashed reference line or light shading for the LCF region would improve feature
    coverage.'
  - 'DE-01 5/8: Design is clean and functional but does not quite reach ''strong design''
    level — the combination of Okabe-Ito palette, direct labeling, and zone fill shows
    intentional design thought, but the overall composition still reads as a well-configured
    library output rather than a publication-quality figure.'
  - 'DE-02 4/6: Good L-shaped frame and subtle grid, but could further benefit from
    removing minor tick marks and adding slightly more vertical breathing room between
    annotations at the bottom (endurance limit box and ''Infinite Life Zone'' text
    are at y=230 and y=218, leaving only ~18 MPa gap above the y-axis minimum of ~200).'
