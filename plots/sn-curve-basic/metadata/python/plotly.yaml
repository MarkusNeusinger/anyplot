  strengths:
  - 'Complete spec compliance: all five visual elements (scatter, fit line, three
    reference lines) with correct log-log scaling on both axes'
  - Physically realistic steel fatigue data with accurate Basquin parameters (A=1200
    MPa, b=-0.12) and consistent material thresholds
  - 'Flawless code quality: seed set, clean imports, KISS structure, no over-engineering'
  - Both renders pass theme readability — no dark-on-dark or light-on-light failures;
    chrome adapts while data colors stay identical
  - Good hover templates with <extra> tag providing clean, informative tooltip labeling
    for all five series
  weaknesses:
  - Legend box frame adds visual noise — set legend.borderwidth=0 and legend.bgcolor=rgba(0,0,0,0)
    for a cleaner floating legend
  - Grid on both axes is noisier than needed for a log-log scatter/line plot — suppress
    X-axis grid (xaxis.showgrid=False) to show only horizontal gridlines
  - No visual emphasis on the Infinite Life zone below the endurance limit — add fig.add_hrect(y0=200,
    y1=230, opacity=0.05, fillcolor=#009E73, layer=below) to transform data-display
    into data-storytelling; this is a distinctly Plotly capability
  - X-axis extends to 10^8 cycles but Basquin fit exits the y-range before ~3x10^7,
    leaving rightmost 2 decades sparse — restrict x-range to [2, 7] or lower y lower
    bound to [2.1, 2.9]
