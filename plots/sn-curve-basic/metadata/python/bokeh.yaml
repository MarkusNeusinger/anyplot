    #CC79A7 reddish purple). Fix: reassign Yield Strength to position 4 (#CC79A7)
    to follow strict 1->2->3->4 order, updating YIELD_COLOR and the matching label
    color.'
  - 'Design excellence has room to grow: the right-side axis line is present; consider
    removing it for cleaner L-frame. The Basquin fit line (line_width=5) and reference
    lines (line_width=4) are close in weight — increase fit to line_width=7 and reduce
    reference lines to line_width=3 to strengthen visual hierarchy. Slightly bolder
    infinite-life shading (fill_alpha=0.12) would improve the storytelling emphasis.'
