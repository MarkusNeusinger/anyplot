review:
  strengths:
  - Correct log-log S-N curve with Basquin power-law fit line and realistic AISI 1045
    steel scatter data
  - All three material property reference lines (Ultimate Strength, Yield Strength,
    Endurance Limit) correctly color-coded with Okabe-Ito palette positions 2, 3,
    5
  - 'Full theme-adaptive chrome: both light (#FAF8F1) and dark (#1A1A17) renders pass
    readability checks with no dark-on-dark failures'
  - Clean KISS structure with explicit font sizes, proper set.seed(42) reproducibility,
    and correct ragg PNG output
  - Idiomatic scales::trans_format + math_format for 10^x tick notation — a distinctly
    ggplot2 pattern
  weaknesses:
  - Annotation label placement at x=10^1.35 (≈22) sits very close to the left plot
    edge; reposition to the right side of each reference line (e.g. x=10^6.8) for
    better readability and visual balance
  - Design Excellence is held back by the absence of a shaded geom_rect region for
    the infinite-life zone; adding a subtle fill below the endurance limit line would
    elevate storytelling (DE-03) and clearer three-region demarcation (spec requirement)
  - 'DE-01 lacks the polish needed for 6+: consider removing the panel border entirely,
    adding a subtle annotation for the Basquin equation parameters, or a footnote
    crediting the material'
  - 'LM: geom_hline + annotate + scale_*_log10 covers the basics but leaves room for
    more idiomatic ggplot2 — e.g. using geom_ribbon for the scatter uncertainty band
    or stat_function for the fit line instead of a manually computed data frame'
