review:
  strengths:
  - 'Complete and accurate spec implementation: all required S-N curve features (log-log
    axes, three material property reference lines, Basquin fit, data scatter, infinite
    life region) are present and correct.'
  - 'Scientifically accurate data: AISI 1045 steel with physically correct UTS/Ys/Se
    values and a proper Basquin equation calibration (Se ~50% UTS, mapping to ~10^5.6
    endurance life).'
  - 'Excellent theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    GRID) flip correctly; data colors identical across both renders.'
  - 'Intentional visual hierarchy: the endurance limit is distinguished by a thicker
    line, bold annotation, and matching shaded zone — making the key engineering threshold
    immediately apparent.'
  - Clean, modern ggplot2 code with proper linewidth= (not deprecated size=), scales::trans_format
    for math-formatted log tick labels, and flat procedural structure.
  weaknesses:
  - Title fontsize is 13pt, slightly above the recommended 12pt. No visual problem,
    but tightening to 12pt would bring the title width closer to the expected 70-85%
    of canvas width for this mandated title format.
  - The Basquin fit line uses INK_MUTED (gray) color which blends somewhat with the
    neutral tone of the plot; a slightly more prominent or distinctly styled line
    (e.g., a dash-dot pattern or subtle opacity distinction) could improve visual
    hierarchy between the fit curve and the reference lines.
  - LM-02 stays at 3/5 — the trans_format math labels and annotate(rect) are good,
    but no truly unique ggplot2 feature (e.g., coord_trans, secondary axes, stat_function
    for the fit instead of manual data frame) is leveraged.
