review:
  strengths:
  - 'Perfect spec compliance: all required features present (log-log axes, three reference
    lines, Basquin fit curve, scatter replicates, shaded Infinite Life region)'
  - Correct Okabe-Ito palette application with data in brand green (#009E73); reference
    lines in subsequent Okabe-Ito positions with semantically appropriate color choices
  - Theme-adaptive chrome working correctly in both renders — text, grid, and backgrounds
    all flip; data colors are identical between light and dark
  - Color-coded inline annotations replace legend box, reducing visual clutter while
    preserving engineering context
  - 'Engineering storytelling through visual hierarchy: thicker endurance limit line,
    bold font on its label, shaded Infinite Life region, neutral gray for the secondary
    Basquin fit curve'
  - Clean KISS code structure with set.seed(42), explicit font sizes, and a meaningful
    scientific caption
  weaknesses:
  - Endurance limit of 250 MPa for AISI 1045 steel (UTS=750 MPa) is notably lower
    than the engineering standard of ~375 MPa (≈50% × UTS); correcting this improves
    factual accuracy without changing the visual approach
  - Grid lines are drawn on both X and Y axes; for S-N curves the convention is Y-axis-only
    major grid — removing X-axis grid would reduce visual noise and improve readability
    of the log-decade tick marks
  - 'Typographic hierarchy could be stronger: the title uses the same regular weight
    as axis labels; adding fontface="bold" to plot.title and increasing from 12pt
    to 13pt would improve visual hierarchy'
  - 'DE-01 gap: design is thoughtful but not yet at publication quality — the annotated
    reference lines are a good start but the overall composition lacks the visual
    punch needed for the top tier'
