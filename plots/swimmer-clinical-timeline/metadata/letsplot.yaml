  image_description: 'The plot displays a horizontal swimmer plot with 25 patients
    (PT-001 through PT-025) sorted by treatment duration from shortest (bottom, PT-016
    ~5 weeks) to longest (top, PT-011 ~48 weeks). Bars are colored by treatment arm:
    steel blue (#306998) for "Arm A (Combo)" and medium purple (#8E44AD) for "Arm
    B (Mono)". Clinical event markers are overlaid on the bars: small orange upward-pointing
    triangles for Partial Response, green six-pointed asterisks for Complete Response,
    small red/coral diamonds for Progressive Disease, and larger red/coral downward-pointing
    open triangles for Ongoing markers at bar endpoints. The x-axis reads "Time on
    Study (Weeks)" ranging from 0 to ~48. The y-axis reads "Patient" with individual
    IDs. The title "swimmer-clinical-timeline · letsplot · pyplots.ai" appears in
    bold at top. A right-side legend is split into "Treatment Arm" (two colored entries)
    and "Clinical Event" (three shaped entries). The background is clean white with
    subtle light-gray vertical grid lines and no horizontal grid lines.'
