  image_description: 'The plot displays a swimmer plot for a simulated Phase II clinical
    trial with 25 patients arranged vertically, sorted by treatment duration (shortest
    at top, longest at bottom). Horizontal bars represent each patient''s time on
    study, colored by treatment arm: deep teal/blue for Arm A (Combo) and warm terracotta/salmon
    for Arm B (Mono). Event markers appear on the bars: blue triangles for Partial
    Response, pink/magenta stars for Complete Response, orange diamonds for Progressive
    Disease, and yellow squares for Adverse Events — all outlined in dark grey. Right-pointing
    dark grey triangles mark ongoing patients (PT-001, PT-011, PT-019). A faint dotted
    vertical line indicates the median duration. The x-axis reads "Time on Study (Weeks)"
    ranging from 0 to ~55. The y-axis label is "Patient" with individual IDs (PT-001
    through PT-025). The title reads "swimmer-clinical-timeline · bokeh · pyplots.ai".
    A vertical legend in the bottom-right lists all categories with matching symbols.
    Background is light grey (#f7f7f7) with subtle dashed horizontal gridlines and
    no vertical grid.'
