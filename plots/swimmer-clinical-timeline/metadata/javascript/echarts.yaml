review:
  strengths:
  - Perfect spec compliance with all required swimmer-plot features present and correctly
    mapped
  - 'Excellent semantic color choices: matte-red for Progressive Disease, ochre for
    Partial Response, blue for Complete Response — communicates clinical meaning through
    the Imprint palette'
  - Duration-sorted layout immediately tells the clinical story; color-coded treatment
    arms enable at-a-glance comparison
  - Fully deterministic hard-coded data with realistic Phase II oncology context (25
    patients, two arms, plausible event timing)
  - Clean, linear ECharts code with no over-engineering; per-item bar coloring in
    a single series is an elegant pattern
  - Both light and dark renders are theme-correct with no dark-on-dark or legibility
    failures
  weaknesses:
  - Font sizes on axis tick labels (12–13 CSS px → 24–26 source px) and x-axis name
    (15 CSS px → 30 source px) are below the style-guide recommendation (~44 source
    px for browser-rendered libs); increase title to 26–28, axis name to 18–20, tick
    labels to 15–16 CSS px to improve mobile readability
  - 'Y-axis is missing an explicit axis title (e.g. name: Patient, nameLocation: end)
    — x-axis already has a proper label with units but y-axis has none'
  - Event markers on short bars (duration ≤ 10 wk) are slightly crowded; consider
    reducing marker symbolSize on very short bars or slightly increasing barMaxWidth
    to improve visual separation
