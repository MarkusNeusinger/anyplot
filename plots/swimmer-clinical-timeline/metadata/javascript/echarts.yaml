review:
  strengths:
  - 'Full spec compliance: horizontal bars sorted by duration, four distinct event
    symbol types, ongoing-patient arrows, and dual treatment-arm color coding all
    present'
  - 'Imprint palette applied correctly: Arm A uses #009E73 (brand green), Arm B #C475FD;
    matte red #AE3030 for PD (semantic bad/loss) is correct and idiomatic'
  - Both themes render correctly — warm off-white (#FAF8F1) light background, warm
    near-black (#1A1A17) dark background; all chrome tokens flip and no dark-on-dark
    failures
  - Hardcoded deterministic data with 25 realistic Phase II oncology patients across
    two treatment arms — realistic IDs, event times, and durations
  - 'Clever ECharts-specific technique: empty scatter series used as legend proxy
    to render colored rect legend icons for treatment arms independently of the bar
    series'
  - Custom SVG path in legend for Progressive Disease icon matches the symbolRotate:180
    triangle in the scatter series — visually consistent
  - 'Clean KISS code structure: inline data, clean forEach loops, single setOption
    call — no unnecessary abstraction'
  weaknesses:
  - Y-axis 'Patient' label placed at nameLocation:'end' with inverse:true — this puts
    the label at the bottom-left near the x-axis intersection, which is unconventional
    and visually awkward; move to nameLocation:'middle' with appropriate nameGap
  - Event marker symbolSize 13-15 is small for a 3200×1800 canvas; at 2× devicePixelRatio
    that is ~26-30 output pixels — slightly undersized for easy visual parsing at
    mobile scale; increase to 16-20
  - 'Design Excellence is functional but not exceptional: no emphasis technique distinguishes
    notable patients (e.g., a complete-responder at 52 weeks), and no visual focal
    point is created; consider size variation on the ongoing-arrow markers or a vertical
    reference line at median duration'
  - No horizontal reference line or annotation marking the data cutoff or median duration
    — a single markLine would significantly improve storytelling without adding complexity
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "swimmer-clinical-timeline · javascript · echarts · anyplot.ai" in dark bold text, centered, fully visible (~75% width). Patient IDs (PT-001 through PT-023) on Y-axis in dark soft text, all readable. X-axis label "Time on Study (Weeks)" in dark soft text, fully visible. "Patient" Y-axis label appears at the bottom-left (nameLocation:'end' with inverse:true), slightly unconventional but readable. Legend at bottom with six entries (Arm A rect, Arm B rect, Partial Response triangle, Complete Response diamond, Progressive Disease inverted triangle, Ongoing arrow) — all visible and labeled.
      Data: Arm A bars in brand green (#009E73), Arm B bars in lavender (#C475FD). Bars are horizontal and sorted longest-at-top (PT-001, 52 wks) to shortest-at-bottom (PT-023, 6 wks). Ochre upward triangles mark Partial Response events. Blue diamonds mark Complete Response events. Red inverted triangles mark Progressive Disease. Gray/neutral arrows extend past bar ends for ongoing patients. Vertical grid lines are subtle.
      Legibility verdict: PASS — all text readable, no clipping, no overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light text, clearly readable. Patient IDs in light text on Y-axis, all readable. X-axis label in light text, readable. "Patient" Y-axis label at bottom in light text — readable but unconventional placement persists. Legend text is light-colored, all entries visible.
      Data: Bar colors are identical to light render — green (#009E73) for Arm A, lavender (#C475FD) for Arm B. All event markers (ochre triangles, blue diamonds, red inverted triangles, theme-adaptive arrows) identical to light render. No dark-on-dark failures observed — tick labels, axis labels, and title all appear in appropriately light colors.
      Legibility verdict: PASS — both themes fully readable, chrome tokens applied correctly throughout.
