review:
  strengths:
  - 'Perfect spec compliance: all required swimmer plot features implemented (event
    markers with distinct shapes, arm color coding, ongoing markers, legend, unit-labeled
    axes)'
  - Clever hidden y2 axis technique for precisely aligning scatter event markers to
    categorical bar rows — a non-trivial Chart.js pattern executed cleanly
  - Full Imprint palette compliance with correct theme-adaptive chrome tokens; bgfill
    plugin guarantees correct background color in both renders
  - Realistic, comprehensive oncology dataset with varied patient timelines across
    both arms
  - Elegant code with no over-engineering
  weaknesses:
  - Y-axis tick font size (11px CSS = 22 source px) is below the 14px recommendation;
    with 25 patients the smaller size is a reasonable compromise, but increasing to
    12-13px would better serve mobile viewports
  - 'Complete Response star markers (pointRadius 9, #BD8233 ochre) have low visual
    salience — they render but are harder to spot among the other event markers; increase
    pointRadius to 11-12 for CR stars to give them more prominence'
  - 'Design Excellence can be pushed higher: the chart looks professional but not
    yet publication-quality; consider slightly reducing legend font (12px) to balance
    with the 11px y-tick labels, and ensuring the x-axis border color uses t.grid
    rather than the default for full theme-consistency'
