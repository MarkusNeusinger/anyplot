review:
  strengths:
  - Correct swimmer plot with horizontal bars sorted by duration longest-to-shortest
  - Clever hidden y2 linear axis technique to align scatter event markers with categorical
    bar rows
  - Imprint palette applied correctly across all 6 categorical series (arms + event
    types in canonical order)
  - Redundant shape encoding (triangle/star/diamond/circle/right-arrow) for event
    types — CVD-safe at 6 colors
  - Semi-transparent bar fills (hex+99) with solid palette-colored borders — polished
    and professional
  - 'Complete spec implementation: all clinical event types, ongoing markers, treatment
    arm coding, and correct legend'
  weaknesses:
  - Legend font size 12pt is slightly small for a 3200x1800 canvas — increase to 14pt
    for better readability at full resolution
  - With 25 patients in landscape, bars are quite narrow (barPercentage=0.55 + categoryPercentage=0.9
    gives ~50% row height); consider reducing categoryPercentage to 0.8 for slightly
    thicker bars
  - CR star markers (pointRadius=12) are hard to distinguish from PD diamond markers
    at this chart density — increase star radius to 14-15 to make the distinction
    clearer
  - 'Missing explicit //# anyplot-orientation: landscape directive in file header
    — add for explicitness per library guide convention'
