  image_description: 'The plot displays a horizontal swimmer plot for 25 patients
    (PT-001 through PT-025) in a simulated Phase II oncology trial. Patients are sorted
    by treatment duration (longest at top, shortest at bottom). Horizontal bars represent
    time on study in weeks (x-axis 0-45). Bars are colored by treatment arm: blue
    for Arm A (Combo) and orange for Arm B (Mono). Clinical event markers are overlaid
    on the bars: yellow triangles for Partial Response, green diamonds for Complete
    Response, red/pink squares for Progressive Disease, and dark right-pointing triangles
    for Ongoing patients. The title reads "swimmer-clinical-timeline · plotnine ·
    pyplots.ai" in bold at the top. A legend on the right side shows both Treatment
    Arm colors and Clinical Event shapes. The background is clean white with subtle
    vertical gridlines. A small annotation at the bottom shows median durations per
    arm.'
