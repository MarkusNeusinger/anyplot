  image_description: 'The plot displays a horizontal swimmer plot for 25 patients
    (PT-001 through PT-025) in a simulated Phase II oncology trial. Patients are sorted
    by treatment duration (longest at top, shortest at bottom). Horizontal bars represent
    time on study in weeks (x-axis ranges 0-45). Bars are color-coded by treatment
    arm in two shades of blue: a darker blue for "Arm A (Combo)" and a lighter blue
    for "Arm B (Mono)" — though these two shades are quite similar and difficult to
    distinguish. Event markers are overlaid on bars: yellow triangles for Partial
    Response, green stars (appearing hollow/unfilled) for Complete Response, red diamonds
    for Progressive Disease, and black right-pointing triangles for Ongoing patients.
    The legend on the right clearly lists both Treatment Arm colors and Clinical Event
    shapes. The title reads "swimmer-clinical-timeline · plotnine · pyplots.ai" in
    bold at the top. The background uses a minimal theme with subtle vertical gridlines.'
