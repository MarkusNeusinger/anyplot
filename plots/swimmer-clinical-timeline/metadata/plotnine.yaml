  image_description: 'The plot shows a horizontal swimmer plot for 25 patients (PT-001
    through PT-025) in a simulated Phase II oncology trial. Patients are sorted by
    treatment duration (longest at top, shortest at bottom). Horizontal bars are colored
    by treatment arm: teal/blue (#306998) for "Arm A (Combo)" and amber/golden (#CF8A2E)
    for "Arm B (Mono)" — clearly distinguishable. Clinical event markers are overlaid
    on bars with white stroke: orange triangles (Partial Response), blue diamonds
    (Complete Response), purple squares (Progressive Disease), and dark right-pointing
    triangles (Ongoing). The x-axis shows "Time on Study (weeks)" from 0 to ~54 with
    6-week intervals. The y-axis shows Patient IDs in monospace font. Two vertical
    reference lines mark median durations per arm: a dashed blue line at "Median A:
    17w" and a dotted amber line at "Median B: 29w". An ORR summary label ("ORR: 68%
    (17/25)") appears in the upper right on a light blue background. The legend on
    the right has a styled background showing both Treatment Arm and Clinical Event
    sections. The background is clean white with subtle x-axis gridlines only.'
