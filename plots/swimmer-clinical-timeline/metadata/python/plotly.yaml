review:
  strengths:
  - Correct and complete swimmer plot with all spec-required features (4 event types,
    ongoing markers, sorted bars, arm color-coding, legend)
  - Both themes correctly implemented with full chrome token propagation — no dark-on-dark
    or light-on-light failures
  - 'Imprint palette applied with clinical semantic intent: red for progressive disease,
    amber for adverse events'
  - Median reference line adds a clear analytical focal point
  - Reproducible synthetic data with realistic Phase II oncology context
  - Clean code structure with dummy trace pattern for multi-trace legends — idiomatic
    plotly
  weaknesses:
  - Y-axis tick labels (25 patient labels) will be very small at mobile viewing scale
    (~400 px wide); consider reducing patient count to 20 or increasing y-axis tick
    font to 11px
  - Event markers can cluster visually in the short-duration rows (x < 10 wk) where
    multiple event types occur at similar positions; slight jitter or reduced marker
    size (9px) could improve
  - 'DE-02 could be pushed further: Y-axis spine (showline=True on Y) and tick marks
    add visual noise; removing the Y-axis line (showline=False on yaxis) and tick
    marks (ticks=\u0022\u0022) would clean up the left edge'
  - 'DE-03: arm separation storytelling could be reinforced by adding a subtle annotation
    showing median difference between arms or grouping patients by arm with a shaded
    band'
