      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "swimmer-clinical-timeline · python · pygal · anyplot.ai" in dark ink, ~65% width; x-axis label "Time on Treatment (Weeks)" large and prominent; patient ID y-labels and x-axis tick labels (0,10,20...60) readable but noticeably smaller than axis title due to major_label_font_size=36 (below recommended 44); two-row SVG legend at bottom readable
