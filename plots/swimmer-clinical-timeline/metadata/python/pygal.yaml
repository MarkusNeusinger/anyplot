review:
  strengths:
  - Perfect spec compliance — all required swimmer plot features implemented (sorted
    bars, 4 event-type markers, ongoing arrows, arm color coding, complete legend)
  - Creative SVG injection technique that effectively extends pygal native capabilities
    to render custom event markers
  - Correct Imprint palette with full theme-adaptive chrome — both light and dark
    renders pass legibility checks with no dark-on-dark failures
  - Redundant encoding (color + shape) for event markers improves accessibility and
    distinguishability
  - Clinically realistic oncology data with appropriate cohort size and event distribution
  weaknesses:
  - major_label_font_size=36 is below the recommended 44 — tick labels appear noticeably
    smaller than the axis title; increase to 44
  - Event markers crowd on short-duration patients where multiple events pack into
    small time window — increase marker half-size ms from 15 to 18
  - legend SVG font sizes (font_lg=38) below recommended 44 — increase to 44
  image_description: |-
