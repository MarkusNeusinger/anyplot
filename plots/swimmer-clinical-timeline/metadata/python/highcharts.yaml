      Data: Data colors identical to light render — green (#009E73) for Arm A, lavender (#C475FD) for Arm B, same event marker colors. No data color shift between themes — only chrome flips. Reference lines visible with muted styling.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures detected.
