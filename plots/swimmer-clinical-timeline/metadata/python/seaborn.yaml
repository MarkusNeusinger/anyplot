review:
  strengths:
  - 'Perfect spec compliance — all swimmer plot features present: horizontal bars,
    distinct event markers (triangle/star/diamond/X), ongoing treatment arrows, treatment
    arm color coding, and patient IDs on y-axis'
  - 'Correct Imprint palette with semantic color choices: brand green for Arm A, lavender
    for Arm B, ochre/blue/red/amber for event types — amber correctly used for adverse
    events (warning anchor)'
  - 'Both themes render correctly: warm off-white background on light, near-black
    on dark, with theme-adaptive chrome; data colors identical between themes'
  - 'Realistic Phase II oncology trial data: 25 patients, two arms, clinically plausible
    durations (3–22 months) and event probabilities'
  - Clean KISS code structure with np.random.seed(42), no bbox_inches='tight', correct
    canvas (3200×1800 px)
  weaknesses:
  - No seaborn plotting functions used at all — only sns.set_theme() is called; all
    chart elements (barh, scatter, annotate) are drawn with raw matplotlib. A seaborn
    implementation must use at least one seaborn plotting function such as sns.scatterplot
    for event markers or sns.barplot for a base layer. Use sns.scatterplot(data=events_df[mask],
    x='time', y='patient_idx', ax=ax, ...) for event markers instead of ax.scatter(...).
  - Y-axis tick label size is 6.5pt for 25 patients — at mobile width (~400 px) the
    PT-xxx labels will collapse to near-unreadable. Increase to 7–7.5pt or trim patient
    count to 20 for better mobile legibility.
  - Design storytelling stays at 'shows data' level — no visual annotation or summary
    emphasizing the key clinical finding (e.g., Arm A patients skew longer treatment
    duration). Adding even a single inline text marker or a summary metric in the
    whitespace area would elevate DE-03 meaningfully.
