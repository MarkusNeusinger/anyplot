  image_description: 'The plot displays a swimmer plot with 25 horizontal bars representing
    patients (PT-002 through PT-011) from a simulated Phase II oncology trial. Bars
    are colored steel blue (#306998) for Arm A (Combo) and medium purple (#9370DB)
    for Arm B (Mono), with semi-transparency (opacity 0.75) and rounded corners. Bars
    are sorted by treatment duration, longest at bottom (PT-002 reaching ~60 weeks)
    to shortest at top (PT-011 at ~5 weeks). The x-axis shows "Time on Treatment (Weeks)"
    from 0 to 60 with dashed vertical guide lines every 10 weeks. Event markers appear
    on bars: green triangles for Partial Response, yellow stars for Complete Response,
    red/crimson diamonds for Progressive Disease, and orange squares for Adverse Events.
    One patient (PT-004) has a small arrow indicating ongoing treatment. A two-row
    legend sits below the chart: treatment arms on the first row, event symbols on
    the second. Title reads "swimmer-clinical-timeline · pygal · pyplots.ai" in monospace
    font at the top.'
