  image_description: 'The plot displays a swimmer plot with 25 horizontal bars representing
    individual patients (PT-001 through PT-025) in a simulated Phase II oncology trial,
    sorted by treatment duration (longest at top). Bars are color-coded: steel blue
    (#306998) for "Arm A (Combo)" and medium purple (#9370DB) for "Arm B (Mono)".
    The x-axis shows "Time on Treatment (Weeks)" ranging from 0 to 60, with vertical
    grid lines at intervals. Event markers are overlaid on bars: blue open triangles
    for Partial Response, yellow 5-point stars for Complete Response, pink/magenta
    diamonds for Progressive Disease, and orange rounded squares for Adverse Event.
    One patient (PT-009) has an arrow at bar end indicating ongoing treatment. The
    title reads "swimmer-clinical-timeline · pygal · pyplots.ai" in monospace font.
    A two-row legend at the bottom explains arm colors and event symbols. Background
    is light off-white (#F7F9FB), bars have rounded corners, and event markers have
    white stroke borders for visibility.'
