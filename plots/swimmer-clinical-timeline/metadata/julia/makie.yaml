review:
  strengths:
  - Perfectly correct Imprint palette usage with semantic-aware color assignment (green=experimental,
    lavender=control, amber=adverse-event warning anchor)
  - 'Clinical narrative is immediately legible: sorted bars, reference line at Week
    24, and ongoing arrows communicate trial dynamics without annotations'
  - Makie layout system used expertly — PolyElement/MarkerElement mixed legend, colsize!,
    RGBAf alpha compositing
  - Both themes render correctly with no chrome bleed-through
  - Transparent bars with stroke give definition without heaviness; event marker white
    strokes prevent merging with bar fill
  weaknesses:
  - Y-axis tick labels (yticklabelsize=10) are slightly small for 25 rows; could be
    bumped to 11pt to improve mobile readability without causing overlap
  - Event markers on colored bars could benefit from slightly larger markersize (14-16)
    to improve visibility at small rendered sizes — the xcross at 12 is the smallest
    and least distinguishable
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "swimmer-clinical-timeline · julia · makie · anyplot.ai" in dark ink, clearly readable. X-axis label "Time on Study (weeks)" in dark ink. Y-axis patient ID tick labels (PT-001 to PT-025) in INK_SOFT dark. Legend with dark text on elevated #FFFDF6 background with INK_SOFT frame. All chrome text readable.
      Data: Arm A bars in brand green #009E73 at 78% alpha; Arm B bars in lavender #C475FD. Event markers: blue upward triangles (partial response), ochre stars (complete response), matte-red downward triangles (progressive disease), amber X-crosses (adverse events). All markers have white stroke edges. Ongoing patient arrows in arm color. Week 24 dashed reference line with annotation. First series is #009E73 ✓
