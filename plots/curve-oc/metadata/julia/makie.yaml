  - Annotation text (AQL=2%, LTPD=8%, 1-α, β) at fontsize=11 is noticeably smaller
    than tick labels (12pt) and axis labels (14pt), reducing typographic cohesion
    — raise to 12pt for consistency
  - DE-01 and DE-02 are above defaults but not at publication quality — no descriptive
    title prefix was added, and the plot could benefit from slightly more generous
    top padding so the 1-α label has more breathing room inside the producer risk
    zone
