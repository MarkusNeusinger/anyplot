review:
  strengths:
  - Full spec compliance — all 4 required annotation layers (OC curves, AQL/LTPD lines,
    alpha/beta risk points) implemented correctly
  - 'Excellent theme adaptation — correct Imprint palette, correct backgrounds (#FAF8F1
    / #1A1A17), data colors constant across themes, chrome adapts cleanly'
  - 'Redundant encoding: distinct dasharray patterns (solid, dashed, dotted) plus
    line-width hierarchy eliminates sole reliance on color for curve identification'
  - SVG CSS injection to strip the plot-area border frame is an elegant, well-commented
    workaround for a pygal limitation
  - Hermite interpolation with cardinal parameters produces smooth S-curves appropriate
    for the OC domain
  weaknesses:
  - 'DE-01: No direct annotations on the chart body — the AQL/LTPD crossings with
    the reference OC curve and the risk labels would benefit from in-chart text callouts
    rather than solely relying on the legend entries'
  - 'DE-02: Legend box still renders with a slight default frame — pygal legend styling
    could be further refined via Style or CSS override'
  - 'LM-02: Custom tooltips could be richer (e.g., showing all 4 P(accept) values
    at the hovered x fraction), which would leverage pygals distinctive interactive
    SVG strength more fully'
  - alpha and beta risk dots share the same color (#AE3030) — while contextually distinguishable
    by position (1% vs 8%), different dot sizes or hollow vs filled treatment would
    strengthen per-point identity
