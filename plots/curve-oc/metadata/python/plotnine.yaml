      Data: three OC curves in Imprint palette positions 1-3 (#009E73 solid, #C475FD dashed, #4467A3 dash-dot); green AQL zone fill and muted red LTPD zone fill; green discrimination envelope ribbon; hollow circle markers at risk points
      Legibility verdict: PASS

