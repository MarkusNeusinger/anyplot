      Data: identical Imprint palette colors to light render (#009E73, #C475FD, #4467A3); quality zone fills (alpha=0.09) are barely perceptible on dark surface — storytelling weakened but not a legibility failure; risk markers and annotations readable
      Legibility verdict: PASS
