review:
  strengths:
  - Discrimination envelope ribbon (geom_ribbon between most-lenient and most-strict
    plans) is a clever, spec-exceeding visualization device that immediately communicates
    discrimination power range
  - Dual semantic zone fills (green for AQL zone, muted red for LTPD reject zone)
    provide instant visual framing before reading axes — strong data storytelling
  - Redundant encoding (color + linetype) across all three sampling plans ensures
    CVD-safe and print-safe rendering
  - 'Perfect spec compliance: binomial CDF, AQL/LTPD lines, risk markers with alpha/beta
    labels, three plan comparison, correct x-axis range'
  - 'Clean code structure: deterministic, no classes, well-organized data pipeline'
  weaknesses:
  - Quality zone fills (alpha=0.09) are nearly invisible in the dark render — increase
    alpha to ~0.13–0.15 for dark theme, or use a theme-adaptive alpha value
  - AQL/LTPD italic labels (size=3.0mm) and alpha/beta risk annotations (size=2.8mm)
    are small; alpha annotation is spatially crowded between the AQL dashed line,
    producer's risk circle, and the curve itself — consider repositioning or increasing
    to size=3.5mm
  - Green AQL zone fill and green discrimination ribbon stack in the 0–1% region creating
    a darker-green artifact in the far left; differentiate by using a lighter ribbon
    fill (e.g. reduce ribbon alpha to 0.06) or shift ribbon fill color to INK_MUTED
  image_description: |-
