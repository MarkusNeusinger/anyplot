review:
  strengths:
  - 'Semantic color mapping: amber for AQL (caution/warning) and matte red for LTPD
    (rejection/consumer risk) are principled, not arbitrary palette choices'
  - Dash-pattern redundancy (solid/dashed/dotted) layered on top of color separation
    provides genuine CVD accessibility without visual noise
  - Binomial CDF computed from first principles using math.comb — no scipy dependency,
    clean and reproducible
  - Theme-adaptive INK token correctly threads through annotation dots and risk labels
    — dark render has no dark-on-dark failures
  - Interactive hover (selection_point nearest, transform_filter) is genuine Altair
    native interactivity with correct tooltip encoding
  - Risk zone rectangle fills at 5% opacity add spatial storytelling without competing
    with the data
  weaknesses:
  - Risk annotation labels use fontSize=9, one point below the recommended 10pt minimum;
    may be marginal at ~400px mobile widths — raise alpha_label and beta_label mark_text
    fontSize from 9 to 10 or 11
