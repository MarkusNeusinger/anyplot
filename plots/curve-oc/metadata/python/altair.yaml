    is exemplary use of Altair's Vega-Lite selection system
  - Subtle risk zone shading (opacity=0.05) provides visual interpretive context —
    quality regions (acceptable / rejection) are immediately apparent without overwhelming
    the S-curves
  - Correct binomial CDF implementation from scratch (math.comb) with 200 smooth points
    per curve produces proper S-shaped OC curves
