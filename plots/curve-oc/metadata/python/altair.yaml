  - Semantic color choices — amber (#DDCC77) for AQL caution threshold and matte red
    (#AE3030) for LTPD rejection boundary perfectly match the Imprint palette semantic
    guidance, showing genuine domain understanding
  - Color AND strokeDash redundant encoding across all three OC curves ensures CVD-safe
    discrimination even without color
