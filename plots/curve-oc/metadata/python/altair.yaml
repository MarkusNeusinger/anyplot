    points with labeled percentages, three sampling plans with descriptive legend'
  - 'Theme-adaptive chrome is properly implemented — all text, legend box, grid, and
    backgrounds correctly flip between #FAF8F1 and #1A1A17 surfaces'
  weaknesses:
  - Risk annotation labels (alpha, beta) use fontSize=10 — at scale_factor=4 this
    is 40px source text, which is near the readability floor for the 3200×1800 canvas;
    increasing to fontSize=11 or 12 would improve legibility at mobile viewports
  - 'Risk annotation dots use color=INK (theme-adaptive near-black / near-white) rather
    than the color of the plan they annotate (n=100, c=3 moderate = #C475FD lavender)
    — coloring them to match the plan would strengthen the visual connection between
    marker and curve'
  - Design Excellence limited by Altair's inherent visual defaults — the chart reads
    as 'Altair' despite good semantic choices; bolder typographic hierarchy (heavier
    title weight, slightly larger axis label fontSize=13) would push toward publication-ready
