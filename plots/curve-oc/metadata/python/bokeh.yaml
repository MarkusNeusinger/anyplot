review:
  strengths:
  - 'Full spec compliance: binomial CDF calculation, AQL/LTPD vertical reference lines,
    producer/consumer risk markers with labeled diamonds, and three sampling plans
    all implemented correctly.'
  - 'Excellent semantic palette use: amber (#DDCC77) for producer risk (warning anchor),
    matte red (#AE3030) for consumer risk (loss/error anchor), and green BoxAnnotation
    zone for acceptable quality — all well-reasoned semantic exceptions.'
  - Redundant encoding with both Imprint palette colors AND distinct line dash patterns
    (solid / [12,6] dashed / [6,4,2,4] dot-dash) for the 3 curves — CVD-best-practice
    for 3-series lines.
  - 'Strong data storytelling: shaded risk zones, vertical reference lines, labeled
    diamond markers, and italic zone label together create a genuinely educational
    acceptance-sampling visualization.'
  - 'Idiomatic bokeh feature usage: ColumnDataSource, Span, BoxAnnotation, custom
    Legend with LegendItem, and CDP captureScreenshot for reliable exact-dimension
    PNG export.'
  weaknesses:
  - outline_line_color = INK_SOFT creates a full box border around the plot area in
    both renders rather than an open L-shaped frame. Set p.outline_line_color = None
    and retain only p.xaxis.axis_line_color / p.yaxis.axis_line_color to achieve the
    preferred minimal L-frame look.
  - 'The ''Rejectable Quality'' zone label (text_color=IMPRINT_PALETTE[4], text_alpha=0.65)
    is noticeably dim in the dark render on the near-black background — matte red
    #AE3030 at 65% alpha blends into the dark zone fill. Raise to text_alpha=0.85
    or use INK_SOFT for the dark theme.'
  - Annotation labels (AQL label 22pt, risk labels 20pt) are smaller than tick labels
    (34pt), making them slightly harder to read at scaled sizes. Raise to ~26pt for
    AQL/LTPD and ~24pt for risk annotations.
