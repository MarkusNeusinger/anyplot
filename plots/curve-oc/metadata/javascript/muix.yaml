  strengths:
  - 'Perfect spec compliance: all four reference lines (AQL, LTPD, 1-alpha, beta)
    correctly placed with appropriate styling using t.inkSoft tokens'
  - Binomial CDF computed correctly from first principles, 200-point smooth S-curves
    with catmullRom interpolation
  - Imprint palette applied in canonical order with correct brand green as first series;
    both theme renders pass the readability check
  - ChartsReferenceLine used idiomatically for all reference annotations — correct
    MUI X community API usage
  - 'Data storytelling is strong: increasing n clearly shows tighter discrimination,
    matching the spec''s stated educational purpose'
  weaknesses:
  - 'X-axis auto-generates duplicate tick labels (0%, 1%, 1%, 2%, 2%...) because 200
    dense data points trigger ticks at ~0.1% intervals; rounding to integer % produces
    visually paired duplicates. Fix: add explicit tickInterval (e.g., 0.02) or tickNumber
    on the xAxis config to show ticks only at 0%, 2%, 4%, ..., 20%.'
  - 'Legend label ''n=100, c=2'' line-wraps at the comma, showing ''n=100,'' and ''c=2''
    on two lines. Fix: replace the comma-space in the label with a non-breaking separator
    or drop the comma: ''n=100 c=2''.'
  - Right half of chart (~10-20% defective range) is nearly all near-zero data, creating
    visible empty space. Consider reducing P_MAX to 0.15 to keep the visual weight
    balanced.
