    for mobile-scaled renders — increase to 14px
  - No explicit intersection-point markers on the curves at AQL/LTPD to show exact
    producer/consumer risk values per plan
  - MUI X top/right axis borders not explicitly suppressed — a subtle visual refinement
    gap
