  strengths:
  - Correct numerically-stable binomial CDF implementation for OC probabilities via
    binomCoeff+ocProb helpers
  - Reference lines for AQL (2%), LTPD (10%), producer's risk (1-α=95%), and consumer's
    risk (β=10%) add strong analytical context via idiomatic ECharts markLine
  - 'Full Imprint palette compliance: brand green #009E73 as first series, positions
    1-4 in canonical order, data colors identical between themes'
  - 'Full spec compliance: 4 sampling plans with correct parameters, proper title
    format, percentage-formatted axes, x-axis capped at 20%'
  - Smooth OC curve shapes (symbol:none, lineStyle.width:3.5, 201 points) with clearly
    distinct series colors across both themes
  - 'Theme-adaptive chrome correctly applied: t.ink for title/axis names, t.inkSoft
    for tick labels and reference lines, transparent background'
  weaknesses:
  - Subtitle textStyle uses t.inkSoft (secondary text color) at fontSize:15, making
    it faint and small — increase to fontSize:17 and consider t.ink for stronger readability
  - markLine labels for AQL/LTPD use position:'insideEndTop' which rotates text 90°
    and places it at the top of vertical lines — the AQL label near the left edge
    feels cramped; consider position:'insideStartTop' or increasing fontSize from
    13 to 14
  - curveSeries[0].markLine is assigned after the PLANS.map() construction (mutation)
    — minor elegance issue; consider building it inline
  - 'DE-02: No explicit spine removal/hiding; while ECharts lacks direct axisLine:''off''
    for non-existing spines, adding axisLine:{show:false} on the top/right could further
    minimize chrome'
