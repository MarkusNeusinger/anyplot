    features, correct data mapping, correct title format
  weaknesses:
  - 'DE-01 not quite ''strong design'': chart is above library defaults (Imprint palette,
    reference lines, risk annotations) but lacks a stronger visual focal point — consider
    shaded AQL-LTPD region or highlighted crossover points on each curve where they
    cross the risk thresholds'
  - 'DE-02 refinement incomplete: xAxis.gridLineWidth not explicitly set to 0 (no
    explicit grid suppression on x-axis), and the axis lines (lineColor: t.inkSoft
    on both axes) could be softened or removed for a cleaner look'
