    or shaded regions'' for producer''s/consumer''s risk — adding a light shaded band
    between AQL and LTPD or labeling the exact intersection points would elevate storytelling
    from ''good'' to ''excellent'''
  - 'CQ-01 uses helper functions: logFactorial, binomialPMF, binomialCDF — necessary
    for the computation but deviates from KISS; consider inlining the binomial CDF
    as a single compact function'
  - Reference line annotation labels at fontSize 12px are noticeably smaller than
    tick labels (14px), creating a slight typography imbalance — consider 13px for
    the annotation labels for better visual harmony
