  image_description: 'The plot displays three Operating Characteristic (OC) curves
    for acceptance sampling plans: n=50 c=1 (blue), n=100 c=2 (orange), and n=150
    c=3 (teal). The x-axis shows "Fraction Defective (p)" ranging from 0 to 0.20,
    and the y-axis shows "Probability of Acceptance P(a)" from 0 to 1.0. The title
    reads "curve-oc · letsplot · pyplots.ai" in bold black at the top left. Vertical
    dotted gray lines mark AQL at 0.02 and LTPD at 0.10, with bold "AQL" and "LTPD"
    labels near the bottom. Two red circle markers with white borders highlight risk
    points: α = 0.264 at AQL and β = 0.034 at LTPD, with red label text. Horizontal
    dashed gray lines extend from these risk points to the y-axis. Three colored background
    zones divide the plot: light green (left of AQL, acceptable quality), light beige/yellow
    (between AQL and LTPD, indifference zone), and light pink (right of LTPD, rejectable
    quality), with italic zone labels. The legend titled "Sampling Plan" sits in the
    upper right. The background is white with subtle horizontal grid lines on the
    y-axis only.'
