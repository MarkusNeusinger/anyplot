review:
  strengths:
  - Clean KISS code structure - straightforward Imports → Data → Plot → Save flow
  - Correct theme token definitions (PAGE_BG, ELEVATED_BG, INK, INK_SOFT, RULE) for
    light/dark adaptation
  - 'Realistic and neutral data scenario: monthly sales forecast with growing confidence
    intervals'
  - Deterministic output via np.random.seed(42)
  - Correct Okabe-Ito BRAND color (#009E73) chosen for single-series use
  weaknesses:
  - 'CRITICAL: geom_ribbon uses fill=''95% Confidence Interval'' inside aes() - lets-plot
    treats this as a column name lookup, not a label, causing ''Variable not found''
    error and blank render'
  - 'CRITICAL: geom_line uses color=''Sales Forecast'' inside aes() - same column-name
    lookup error prevents plot from rendering'
  - 'CRITICAL: ggsave() called with w=4800, h=2700, unit=''px'', dpi=100 instead of
    the correct scale=3 parameter - results in wrong dimensions or blank PNG'
  - shutil.move() is unnecessary and incorrect - ggsave() already saves to the working
    directory; the move path is the same as the source
  - shutil import should be removed once move() is eliminated
  - Both plot-light.png and plot-dark.png are ~13KB and visually blank - pipeline
    failure in attempt 2 same as attempt 1
  image_description: |-
    Light render (plot-light.png):
      Background: Pure white (#FFFFFF) - NOT the expected warm off-white #FAF8F1
      Chrome: No title, axis labels, or tick labels visible; only a tiny fragment of text in the very top-left corner
      Data: No line, confidence band, or data points rendered
      Legibility verdict: FAIL - Plot is essentially blank. The lets-plot HTML output confirms the error: "Variable not found: '95% Confidence Interval'. Variables in data frame: ['Month', 'Sales', 'Lower', 'Upper']" — the aes() fill/color string literals were treated as column name lookups, causing a full render failure.

    Dark render (plot-dark.png):
      Background: Pure white (#FFFFFF) - NOT the expected warm near-black #1A1A17; same blank white as light render
      Chrome: No title, axis labels, or tick labels visible
      Data: No data elements rendered; plot is indistinguishable from the light render
      Legibility verdict: FAIL - Plot is completely blank. The dark theme tokens were not applied because the plot never rendered. Both files are identical (~13KB, all white), confirming a pipeline rendering failure. The ggsave() parameters (w=4800, h=2700, unit='px', dpi=100) are also incorrect and contribute to the failure.
