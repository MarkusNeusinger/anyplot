  image_description: 'The plot displays a vertical stratigraphic column showing 10
    geological layers spanning 0–180m depth (increasing downward). The left panel
    shows geological age labels (Late Cretaceous, Late Jurassic, Middle Jurassic,
    Late Triassic, Early Permian) in bold italic text with bracket annotations and
    subtle pastel background bands. The main column uses distinct hatching patterns:
    dots for sandstone (blue), horizontal dashes for shale (orange), plus signs for
    limestone (teal), diagonal lines for siltstone (pink-orange), circles for conglomerate
    (purple), and x-patterns for dolomite (brown). Formation names (Dakota Fm, Graneros
    Sh, Greenhorn Ls, etc.) appear to the right of each layer. Three red wavy lines
    mark unconformities at ~100m, ~140m, and ~162m with italic red labels (Cretaceous–Jurassic,
    Jurassic–Triassic, Triassic–Permian). A lithology legend sits in the upper right.
    Title reads "column-stratigraphic · seaborn · pyplots.ai" at the top.'
