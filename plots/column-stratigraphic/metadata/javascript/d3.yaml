review:
  strengths:
  - Six bespoke SVG <pattern> fills (stipple dots, horizontal dashes, brick, mixed
    dashes, pebbles, dash-dot) approximate FGDC/USGS lithology symbols and give a
    redundant pattern-plus-color encoding that reads even in grayscale
  - 'Canonical Imprint palette in order with Sandstone = #009E73 as the first series;
    data colors are identical across light and dark renders while only chrome flips'
  - 'Strong stratigraphic conventions: depth axis increases downward in meters, period
    bands merge consecutive same-age layers, full-width boundary rules mark period
    changes, and formation labels use leader lines with lithology+thickness sub-labels'
  - Realistic, neutral geology (Mesa Verde, Mancos, Greenhorn, Morrison, Entrada,
    Chinle, Moenkopi, Kaibab, Coconino) spanning Cretaceous through Permian with plausible
    thicknesses (14-38 m)
  - Canvas is exactly 3200x1800; both themes pass the readability check with no clipping
    or overlap
  weaknesses:
  - Landscape canvas leaves a large empty region in the lower-right quadrant below
    the legend; a square orientation (or wider use of the right band) would balance
    the inherently vertical stratigraphic column better
  - Layers are drawn with forEach loops rather than D3 data-join (selection.data().join());
    using a join would be more idiomatic and is the library's distinctive strength
  - Two helper functions (buildPattern, drawLithoBox) are used; reasonable for six
    patterns but slightly off the KISS/no-functions guideline
  - Formation sub-labels at 13px and depth/age labels at 13-15px are fine at full
    size but become small when the 3200px render is scaled to ~400px mobile width
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no white rect painted over it.
      Chrome: title "column-stratigraphic · javascript · d3 · anyplot.ai" in dark ink centered top; "Depth (m)" rotated y-axis label; depth ticks 0-240 in dark ink; "Geological Age" header and period names (Cretaceous, Jurassic, Triassic, Permian) in bold dark ink; "Lithology" legend header. All text clearly readable.
      Data: 9 stacked lithology boxes with tinted fills + pattern overlays — Sandstone green #009E73 stipple dots, Shale lavender dashes, Limestone blue brick, Siltstone ochre mixed dashes, Conglomerate red pebbles, Mudstone cyan dash-dot. First series (Sandstone) is brand green. Leader lines connect each box to formation+thickness labels.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17).
      Chrome: title and period names in light ink; "Geological Age" / "Lithology" / depth ticks in soft light ink — all clearly visible, no dark-on-dark failures.
      Data: identical lithology colors to the light render (green/lavender/blue/ochre/red/cyan patterns); only the box base-tint and chrome flip for the dark surface. Brand green remains visible.
      Legibility verdict: PASS
