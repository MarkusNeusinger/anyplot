review:
  strengths:
  - Six visually distinct SVG lithology textures (stipple dots, dashes, brick, random
    dashes, pebble rings, fine horizontal lines) injected into the chart <defs> via
    the Highcharts renderer API — a genuinely advanced, idiomatic technique that approximates
    FGDC/USGS map symbols
  - 'Geologically plausible, neutral data: real Colorado Plateau formations (Navajo,
    Kaibab, Coconino, Redwall, Bright Angel) with sensible depths (0-398 m) and ages
    spanning Jurassic to Cambrian, depth increasing downward as the spec requires'
  - Title is exactly 'column-stratigraphic · javascript · highcharts · anyplot.ai';
    legend is a cleanly framed 'Lithology' key whose labels match the layers
  - Data colors are identical between light and dark renders — only chrome flips;
    first lithology (sandstone) uses Imprint palette[0] green and the rest follow
    canonical Imprint order
  - Formation/age labels sit in semi-opaque rounded boxes so they stay fully legible
    over the busy fill patterns in both themes
  weaknesses:
  - 'Large empty grey region on the left ~40% of the landscape canvas: the single-category
    column is capped at maxPointWidth 520 and pushed center-right by the right-side
    legend, leaving the area between the y-axis and the column unused. The spec explicitly
    suggests ''Age labels or geological period names should appear on the left side''
    — placing age/period annotations there would both better satisfy the spec hint
    and fill the dead space (VQ-05, DE-03).'
  - Several small helper arrow-functions (dot/seg/ring/cap) and a TEXTURE map add
    structure beyond strict KISS; justified for pattern generation but slightly above
    the 'no functions' bar (CQ-01).
  - Layer-boundary lines are drawn via column borderWidth 1.5 which is fine, but the
    spec's optional unconformity wavy-line convention is not used — acceptable since
    unconformities are optional.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), page shows through transparent chart background. PASS.
      Chrome: dark title "column-stratigraphic · javascript · highcharts · anyplot.ai" centered (~50% width), grey subtitle "Synthetic borehole BH-1 · Colorado Plateau · lithology by fill pattern", rotated y-axis title "Depth below surface (m)", tick labels "0 m"–"400 m" all dark and clearly readable. Right-side framed "Lithology" legend with 6 entries. All chrome readable.
      Data: vertical stacked column of 9 layers, depth increasing downward. Sandstone = Imprint green (#009E73) stipple dots, shale = purple dashes, limestone = blue brick, siltstone = amber random dashes, conglomerate = red pebble rings, mudstone = cyan fine lines. Formation+age labels in light rounded boxes inside each layer, all legible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17). PASS.
      Chrome: light/white title, grey subtitle, light y-axis title and tick labels — all clearly readable, no dark-on-dark. Legend frame on elevated dark surface with light text. No black-on-black failures.
      Data: identical pattern colors to light render — green/purple/blue/amber/red/cyan textures unchanged; only chrome flipped. Formation label boxes use dark elevated fill with light text, fully legible over patterns.
      Legibility verdict: PASS
