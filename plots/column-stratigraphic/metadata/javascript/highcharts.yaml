review:
  strengths:
  - 'Genuinely sophisticated Highcharts mastery: custom SVG lithology textures (stipple,
    dashes, brick, pebbles) injected into the chart <defs> via chart.events.load +
    this.renderer, then referenced as url(#litho-*) fills — a clean, idiomatic workaround
    for the core bundle shipping no pattern-fill module.'
  - 'All spec features present: 6 distinct lithology patterns (>= 5 required), formation+age
    labels boxed inside each layer, depth axis in metres with reversed (downward-increasing)
    scale, solid 1.5px layer-boundary lines, and left-side geologic-period brackets
    drawn with renderer paths + toPixels coordinate mapping.'
  - Realistic, neutral, geologically plausible data — real Colorado Plateau / Grand
    Canyon section (Navajo, Kaibab, Coconino, Redwall, Bright Angel) with sensible
    Jurassic-to-Cambrian ages and depths 0-398 m.
  - 'Palette + theme compliance is exact: first lithology (sandstone) = #009E73, Imprint
    tints assigned in canonical first-appearance order, data colors identical between
    light and dark, backgrounds warm off-white / near-black, all chrome readable in
    both themes.'
  - 'Clean, deterministic, KISS code: hard-coded data, no network, no imports, tooltip
    disabled for the static screenshot, animation:false set in both required places.'
  weaknesses:
  - Landscape canvas leaves a large empty horizontal band between the right edge of
    the column and the legend — a vertical stratigraphic column under-uses the 16:9
    width. Consider widening the column (maxPointWidth) or moving the legend/period
    content to better balance the horizontal space (VQ-05).
  - Formation/age data-label boxes use small type (13px/11px on the 1600px CSS mount);
    they are readable at full size but become tight when the PNG is scaled down to
    ~400px mobile width. A modest bump would improve small-screen legibility (VQ-01).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1); chart background transparent so the page surface shows through.
      Chrome: title "column-stratigraphic · javascript · highcharts · anyplot.ai" in dark ink, subtitle "Synthetic borehole BH-1 · Colorado Plateau · lithology by fill pattern" below it. Left y-axis "Depth below surface (m)" with tick labels "0 m"..."400 m". Geologic-period brackets on the left (Jurassic, Permian, Pennsylvanian, Mississippian, Cambrian) in dark ink. Legend "Lithology" panel at right (Sandstone, Shale, Limestone, Siltstone, Conglomerate, Mudstone) on an elevated off-white card. All text clearly readable against the light background.
      Data: vertical stacked column of 9 layers, depth increasing downward; each layer tinted in an Imprint hue at ~0.58 opacity over a distinct SVG fill pattern (dots, dashes, brick, pebbles). First lithology (sandstone) = brand green #009E73. Formation+age labels boxed inside each layer with a semi-transparent light box and dark text.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), chart transparent.
      Chrome: same title/subtitle/axis/brackets/legend, now in light ink on the dark surface. Legend card is a dark elevated panel. No dark-on-dark failures — period labels, tick labels, axis title and legend entries all render in light ink and are clearly readable.
      Data: identical layer colors, patterns and ordering to the light render — only the chrome and the formation-box backgrounds flip. Sandstone is still #009E73; all six lithology tints match the light render exactly.
      Legibility verdict: PASS.
