review:
  strengths:
  - 'First lithology (Sandstone) anchored to brand green #009E73 with the rest following
    the Imprint palette in canonical order; the semantic-red slot is deliberately
    skipped for these neutral earth categories — exactly the right call.'
  - FGDC/USGS-style lithology decals (stipple dots, broken dashes, staggered brick,
    diagonal hatch, coarse pebbles, fine laminae) give six visually distinct, domain-correct
    fill patterns — exceeds the spec's minimum of 5.
  - Decal ink flips with the theme (dark texture on the light surface, light texture
    on the dark surface) so the hatch stays legible on the saturated fills in BOTH
    renders — a careful, non-obvious touch.
  - Depth axis is inverted (increasing downward) per borehole convention with a labelled
    'Depth (m)' scale; age/period sits left of the column and formation + lithology
    sit right — a clean, readable geological narrative top-to-bottom.
  - 'Idiomatic ECharts: stacked single-category bars carry color+decal and draw the
    boundary lines via the ink border, while a custom renderItem series overlays the
    formation/age labels in data coordinates.'
  - Realistic, neutral data — genuine Western US formations (Niobrara, Morrison, Dakota,
    Sundance, Bearpaw, Mowry, Frontier) with plausible ages and thicknesses across
    Paleocene → Late Jurassic.
  weaknesses:
  - 'Minor: the implementation uses two helper functions (decalFor, renderLabels).
    renderLabels is mandatory for an ECharts custom series and decalFor is a clean
    lookup, so this is idiomatic rather than a real KISS violation — no action needed
    unless strict no-function structure is enforced.'
  - 'DE-03: all layers carry equal visual weight (appropriate for a stratigraphic
    column), so there is no single focal point — acceptable for the plot type but
    it caps Data Storytelling slightly below full marks.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Correct.
      Chrome: bold dark title "column-stratigraphic · javascript · echarts · anyplot.ai"
        centered at top; dark "Depth (m)" rotated y-axis label; dark-grey tick labels
        0..470; subtle warm gridlines. Bottom legend with 6 lithology swatches in
        secondary-grey text. All chrome clearly readable against the light surface.
      Data: a centered vertical column of 9 stacked layers. First lithology Sandstone
        is brand green #009E73 (stipple dots), then Shale lavender (dashes), Limestone
        blue (brick), Siltstone ochre (diagonal hatch), Conglomerate cyan (pebbles),
        Mudstone rose (fine laminae). Crisp dark layer-boundary borders. Formation +
        lithology labelled to the right of each layer (dark bold + grey), age/period to
        the left (grey). Decal ink is dark, legible on the saturated fills.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black. Correct.
      Chrome: light title and "Depth (m)" label; light-grey tick labels; subtle light
        gridlines; light legend text. No dark-on-dark anywhere — all chrome readable.
      Data: data colors are IDENTICAL to the light render (green/lavender/blue/ochre/
        cyan/rose in the same order). Only the chrome flipped. The decal ink flipped to
        a light texture so the hatch stays visible on the fills. Layer borders are light.
        Brand green remains clearly visible on the dark surface.
      Legibility verdict: PASS
