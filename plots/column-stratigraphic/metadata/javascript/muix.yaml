review:
  strengths:
  - Hand-crafted FGDC/USGS-style SVG fill patterns (stipple dots, horizontal laminations,
    brickwork, rhombic brick, scattered dashes, pebble clasts) give every lithology
    a distinct, colourblind-safe texture cue — pattern is the primary signal, Imprint
    colour the redundant secondary.
  - 'Idiomatic use of MUI X community composition API: ChartContainer + useXScale/useYScale
    hooks turn the chart into a coordinate-space provider for fully custom SVG, the
    correct community-surface approach for a chart type MUI X has no native primitive
    for.'
  - Rich, geologically authentic data — a real Western Canada Sedimentary Basin succession
    (Horseshoe Canyon, Bearpaw, Rundle, Palliser, Leduc, etc.) with plausible ages,
    thicknesses, and two unconformities rendered as wavy contacts vs solid conformable
    lines.
  - 'Excellent information architecture: depth axis (m, increasing downward) and geological-period
    time brackets on the left, patterned column in the centre, formation/age/thickness
    labels with leader lines on the right, and a two-part legend (lithology + contact
    types).'
  - 'Perfect theme adaptation — first series is brand green #009E73 (palette[0]);
    saturated pattern motifs are identical between renders, only chrome flips; backgrounds
    are correct #FAF8F1 / #1A1A17 with all text fully legible in both themes.'
  weaknesses:
  - The 0.26-opacity colour wash behind each pattern blends with the page background,
    so the perceived layer tint differs subtly between light and dark (the saturated
    motif strokes remain identical) — acceptable theme behaviour but worth noting
    if strict colour parity is ever required.
  - Secondary text (period ages 12.5px, formation sub-labels 13px) is on the small
    side; at a ~400px mobile downscale these approach the lower bound of comfortable
    legibility — consider nudging to ~14px for the smallest labels.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: dark bold title "column-stratigraphic · javascript · muix · anyplot.ai" with grey subtitle; "Depth (m)" axis label and 0–280 ticks; period brackets (Cretaceous/Carboniferous/Devonian/Cambrian) with Ma ranges; formation labels with age·thickness; "Lithology" and "Contacts" legend headers. All readable (dark ink on cream).
      Data: 9 stacked patterned layers — sandstone green stipple (#009E73, palette[0]), shale lavender laminations, limestone blue brick, dolomite cyan rhombic, siltstone ochre dashes, conglomerate red clasts. Solid conformable contacts; two wavy unconformities (black). First series is brand green.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: light ink title/subtitle, light axis ticks, light period/formation labels, light legend text — all clearly readable, no dark-on-dark failures. Wavy unconformity contacts flip to white for contrast.
      Data: identical saturated pattern motifs and hues to the light render (sandstone green, shale lavender, limestone blue, dolomite cyan, siltstone ochre, conglomerate red); only the faint background wash blends darker. Brand green #009E73 clearly visible.
      Legibility verdict: PASS
