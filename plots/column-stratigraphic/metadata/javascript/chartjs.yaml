review:
  strengths:
  - Custom HTML5-canvas fill patterns approximate FGDC/USGS lithology symbols (stipple
    dots, horizontal dashes, offset brick courses, random dashes, outlined pebbles)
    — five visually distinct textures as required
  - 'Idiomatic Chart.js: stacked horizontal-segment bar on a reversed depth axis plus
    an afterDatasetsDraw plugin for formation/age/thickness labels and the wavy angular-unconformity
    boundary'
  - Custom legend via generateLabels renders the actual CanvasPattern swatches, so
    the key matches the column textures exactly
  - 'Theme-adaptive chrome is correct in both renders: warm off-white #FAF8F1 / warm
    near-black #1A1A17 backgrounds, INK/INK_SOFT text and grid threaded from tokens'
  - First-appearing lithology (sandstone) takes Imprint position 1 (#009E73); remaining
    lithologies follow canonical Imprint order with CVD-safe pattern redundancy
  - Realistic, neutral synthetic borehole (BH-01) spanning Neogene→Carboniferous with
    a plausible angular unconformity between Jurassic and Triassic
  weaknesses:
  - Block fill is a 0.2-alpha colour wash composited over the theme background, so
    the interior tint reads lighter in light mode and darker in dark mode; the dominant
    pattern-stroke colour is identical between themes, but the wash technically makes
    the fill differ — consider compositing the wash over a fixed neutral so the two
    renders match more exactly
  - Dense right-side text (formation name + thickness for 9 layers) is comfortable
    at full 3200px size but shrinks toward the small end when scaled to ~400px mobile
    width
  - No single emphasised focal layer — the column reads as a uniform sequence, so
    data-storytelling hierarchy is modest
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no white plot box painted.
      Chrome: title "column-stratigraphic · javascript · chartjs · anyplot.ai" in dark ink, centered; y-axis "Depth below surface (m)" with reversed ticks 0→418; x caption "BH-01 · Onshore Basin"; legend row of 5 pattern swatches. All text crisp dark-on-light. Readable.
      Data: vertical stacked column of 9 layers. Sandstone = #009E73 green stipple dots (first series), Shale = purple horizontal dashes, Limestone = blue brick, Siltstone = amber random dashes, Conglomerate = red outlined pebbles. Solid dark layer boundaries; black wavy "~ angular unconformity" line below Ironcliff Conglomerate. Formation names + thickness to the right, age labels (Neogene…Carboniferous) to the left.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17).
      Chrome: same title/axis/caption now in light ink; grid lines subtle; legend swatches retain pattern colours. No dark-on-dark text — all labels light-on-dark and clearly readable.
      Data: identical lithology palette positions and patterns to the light render; layer borders and the wavy unconformity line flip to light. Interior block tint reads darker because the 0.2-alpha wash composites over the dark surface, but pattern-stroke colours (green/purple/blue/amber/red) are identical to light. Brand green #009E73 remains visible.
      Legibility verdict: PASS
