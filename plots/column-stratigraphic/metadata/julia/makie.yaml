review:
  strengths:
  - 'Exceptional spec fidelity: seven hand-drawn FGDC/USGS-style lithology textures
    (stipple, laminae, brick, broken dashes, clasts, rhombs, coal cleats) exceed the
    5-pattern minimum and are reused identically in both the column and the legend
    key.'
  - 'Correct stratigraphic conventions: depth increases downward via inverted ylims,
    solid boundary rules with a genuine wavy unconformity line plus a leadered ''unconformity''
    annotation, formations + depth ranges to the right, geological ages to the left.'
  - 'Clean theme adaptation — chrome flips correctly between #FAF8F1 and #1A1A17 while
    all data colors stay identical; coal is given a theme-stable dark fill with a
    light outline + pale cleats so it reads as semantic black in both renders.'
  - 'First categorical series is brand green #009E73 (Sandstone); the rest follow
    canonical Imprint order. Patterns give redundant (CVD-safe) encoding beyond color.'
  - Title matches the mandated 'column-stratigraphic · julia · makie · anyplot.ai'
    format; legend labels match lithology names exactly.
  - 'Idiomatic CairoMakie: poly!/Rect2f blocks, batched linesegments! for textures
    and boundaries, hidexdecorations!, explicit spine controls, Point2f primitives.'
  weaknesses:
  - Layout leaves a wide empty band between the column (left third) and the legend
    (far right); only the unconformity leader occupies it. Tightening the column-to-legend
    gap or widening the column would improve balance (VQ-05).
  - Formation/depth-range labels (13pt) and age labels (12.5pt) are on the small side;
    when the 3200×1800 PNG is scaled to ~400px thumbnails they become hard to read.
    Consider a small bump for mobile legibility (VQ-01).
  - 'Coal fill (#2E2E28) on the dark #1A1A17 surface is low-contrast; it reads only
    thanks to its INK_SOFT outline and pale cleats. Acceptable as a semantic-black
    choice but borderline.'
  - add_pattern! is a helper function — defensible here for DRY reuse across blocks
    and legend, but slightly against the KISS 'no functions' preference (CQ-01).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across figure and axis — correct, not pure white.
      Chrome: dark title "column-stratigraphic · julia · makie · anyplot.ai" centered; "Depth (m)" y-axis label and 0–240 ticks in dark/soft ink, all clearly readable; "Lithology" legend heading and entry labels dark and legible; "unconformity" annotation in muted ink readable.
      Data: vertical column of 9 layers — Sandstone green (#009E73, first series), Shale lavender, Limestone blue brick, Siltstone ochre dashes, Conglomerate cyan clasts, Dolostone rose diamonds, Coal black; each with distinct texture. Ages left, formation + depth range right. Wavy unconformity at 120 m. Legend swatches mirror the patterns.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: title, "Depth (m)", ticks, legend heading/labels all in light ink, clearly readable; no dark-on-dark failures. "unconformity" annotation light-muted, readable.
      Data: identical lithology colors and patterns to the light render (only chrome flipped). Coal block uses a fixed dark fill with a light outline + pale cleats so it stays visible on the near-black surface; brand green Sandstone reads well.
      Legibility verdict: PASS
