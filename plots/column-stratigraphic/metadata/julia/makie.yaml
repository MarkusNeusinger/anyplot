review:
  strengths:
  - Seven hand-built FGDC/USGS-style lithology textures (stipple dots, fine laminae,
    staggered brick courses, broken dashes, scattered open clasts, rhombic diamonds,
    coal cleat partings) drawn from Makie primitives and reused identically in both
    the column blocks and the legend swatches
  - 'Correct stratigraphic convention: depth increases downward via inverted y-limits,
    youngest formation (Neogene) at top, oldest (Mississippian) at the base, with
    a proper wavy unconformity boundary at 120 m and solid layer rules elsewhere'
  - All required spec features present — age labels (left), formation names + depth
    ranges (right), Depth (m) scale axis, lithology legend, and >=5 distinct patterns
    (7 delivered)
  - 'Exact mandated title ''column-stratigraphic · julia · makie · anyplot.ai'' and
    canonical 3200x1800 canvas; chrome flips cleanly between the #FAF8F1 light and
    #1A1A17 dark surfaces with all text legible in both'
  - 'Idiomatic CairoMakie: poly! + Rect2f blocks, linesegments! for boundaries/patterns,
    scatter! for clasts/diamonds, hidexdecorations!, and a clean theme-token block
    read from ANYPLOT_THEME'
  weaknesses:
  - Layer fills use FILL_ALPHA (0.42 light / 0.52 dark) over different backgrounds,
    so the apparent layer hues shift between themes (e.g. sandstone green reads brighter/mint
    on light vs deep teal on dark). Base Imprint hues are identical; only the alpha-over-background
    blend differs — acceptable for a textured geological plot but worth noting.
  - Coal is mapped to the INK token, so in dark mode the coal layer and its legend
    swatch render as a near-white block (#F0EFE8) rather than reading as semantic
    black/coal. Consider a fixed dark fill for coal so it stays 'coal-coloured' in
    both themes.
  - The 'unconformity' annotation glyph (⌇) renders as a stray bracket-like mark and
    the label sits in the narrow gap just right of the column, slightly crowding the
    column edge — minor. Consider dropping the glyph or nudging the label further
    right.
  - Large empty band of whitespace between the formation labels (~x=7) and the legend
    (~x=10) — the column + legend could be brought closer or the canvas used more
    efficiently (VQ-05).
  - add_pattern! is a multi-branch helper function; justified here by genuine reuse
    across blocks and legend, but it nudges the implementation away from the flat
    KISS ideal (CQ-01).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: bold dark title 'column-stratigraphic · julia · makie · anyplot.ai' fully visible; 'Depth (m)' rotated y-label and 0–240 tick labels in soft dark ink, all readable. Age labels (Neogene…Mississippian) at left and formation names + depth ranges at right all legible.
      Data: 9 stacked layers with distinct patterns — Sandstone (mint-green stipple), Shale (lavender laminae), Limestone (blue staggered brick), Siltstone (ochre broken dashes), Conglomerate (cyan open clasts), Dolostone (rose diamonds), Sandstone again, Coal (solid black w/ pale cleat lines), Shale. First series (Sandstone) = brand green #009E73. Wavy unconformity at 120 m. Legend at right keys all 7 lithologies.
      Legibility verdict: PASS
    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: light title and light/soft tick + formation + age labels all clearly readable; no dark-on-dark failures.
      Data: same lithology hues and patterns, same layer order and unconformity. Fills appear more saturated due to higher alpha over the dark surface; base Imprint hues preserved. Note: Coal block flips to near-white (INK token) in dark mode.
      Legibility verdict: PASS
