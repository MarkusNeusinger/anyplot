review:
  strengths:
  - 'First categorical series correctly anchored to Imprint green #009E73 (Sandstone);
    full Imprint palette used in canonical order with red #AE3030 deliberately reserved
    as the semantic anchor for unconformity markers'
  - 'Theme adaptation is flawless — data fill colors are pixel-identical between light
    and dark, only chrome (page background, ink, grid, legend frame) flips; warm #FAF8F1
    / #1A1A17 backgrounds correct in both'
  - 'Strong stratigraphic storytelling: depth axis increases downward per borehole
    convention, age-period brackets on the left, formation names on the right, italic
    thickness annotations far-right, and red dashed unconformity rules at the two
    major age boundaries create clear visual hierarchy'
  - Canvas is exactly 3200x1800 via PAD-only-to-target (no crop), honoring the altair.md
    hard rule
  - Clean KISS module-level code, deterministic hardcoded data, all imports used,
    real Altair tooltips (no fake interactivity), idiomatic layered composition with
    transform_calculate
  weaknesses:
  - 'Left-side age labels overlap the depth-axis tick numbers: the long italic period
    names collide with the numerals — Pennsylvanian over 140, Mississippian over 160,
    Devonian over 180. Push the age-label lane further left (lower x_pos / widen left
    padding) or shrink the age fontsize so the period names clear the depth scale
    (VQ-02).'
  - Lithology pattern symbols only fill a narrow central band of each layer rather
    than tiling the full rectangle width — the spec calls for a distinct fill pattern/texture
    per lithology. The texture reads as a small motif rather than a true fill (VQ-03/SC-02).
    Consider tiling the pattern across more of the column width.
  - Unconformity text labels sit slightly on top of the conglomerate circle motif
    / layer content near depth 120 — minor crowding (VQ-02).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface. Legend frame on elevated #FFFDF6.
      Chrome: dark title "column-stratigraphic · python · altair · anyplot.ai" with grey subtitle
