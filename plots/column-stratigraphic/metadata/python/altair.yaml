review:
  strengths:
  - 'Correct stratigraphic-column plot type: vertical depth axis reversed (increasing
    downward), 10 stacked lithology layers with solid boundary lines — all spec features
    present.'
  - Five visually distinct fill textures (sandstone dots, shale em-dashes, limestone
    brick-like horizontal dashes, siltstone short dashes, conglomerate circles) tiled
    across each layer, approximating FGDC/USGS conventions.
  - 'Clean lane-based layout: age-period brackets + italic labels on the far left,
    formation names to the right of the column, italic thickness annotations in a
    far-right lane — no collisions between side labels.'
  - 'Imprint palette used correctly: first series (Sandstone) = #009E73, lithologies
    use positions 1,2,3,4,6 with position 5 (matte red #AE3030) reserved semantically
    for the dashed unconformity markers.'
  - 'Theme-adaptive chrome is correct in both renders — warm off-white #FAF8F1 (light)
    / warm near-black #1A1A17 (dark); data fill colors identical across themes, only
    chrome flips. Dark glyph texture reads well on every mid-tone fill in both themes.'
  - Realistic, neutral data (Grand Canyon sedimentary section, Cambrian–Permian) with
    sensible depth scale (0–200 m) and varied thicknesses (10–35 m).
  - KISS module-level code, deterministic (no RNG), clean imports, real tooltips (interactive
    lib), saves plot-{THEME}.png + .html with pad-only-to-3200x1800 (no crop).
  weaknesses:
  - 'VQ-02: The red ''Unconformity'' label at depth ~120 overlaps the conglomerate
    (cyan) layer''s circle texture glyphs and sits on the layer boundary line. Readable
    but cluttered — nudge the label up (larger negative dy) or shift it into a clearer
    horizontal lane so it doesn''t collide with the tiled circles and the boundary
    rule.'
  - 'VQ-01: Age-period labels (Permian, Pennsylvanian, Mississippian, Devonian, Cambrian)
    at fontSize=10 italic are a touch small relative to the formation labels (12pt);
    legible at full size but tight when scaled to ~400 px. Consider 11pt.'
  - 'DE-03: Only the second unconformity (depth 170, Mississippian/Devonian boundary)
    draws attention through red; the storytelling is solid but the focal hierarchy
    could be sharpened (e.g. a faint shaded band at each unconformity to signal missing
    time).'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: title "column-stratigraphic · python · altair · anyplot.ai" + subtitle "Grand Canyon Sedimentary Section — Cambrian to Permian" in dark ink, fully readable. Left "Depth (m)" axis with ticks 0–200 increasing downward (dark labels). Age-period italic labels and far-left bracket readable. Formation names (Cedar Mesa Fm … Muav Fm) in bold dark ink to the right; italic muted thickness "30 m" etc. in far-right lane. Bottom legend (Sandstone/Shale/Limestone/Siltstone/Conglomerate) on elevated cream frame. All text readable.
      Data: 10 stacked rectangles — Sandstone #009E73 (green), Shale #C475FD (lavender), Limestone #4467A3 (blue), Siltstone #BD8233 (ochre), Conglomerate #2ABCCD (cyan). Each filled with a distinct dark-ink tiled texture glyph. First series Sandstone is #009E73. Two red dashed unconformity rules with "Unconformity" labels.
      Legibility verdict: PASS (minor clutter: red "Unconformity" label overlaps cyan circle texture + boundary line).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: title/subtitle in light ink, axis labels/ticks light, formation names light, age labels light italic — all clearly readable, NO dark-on-dark failures. Legend on dark elevated frame with light labels.
      Data: identical fill colors to the light render (green/lavender/blue/ochre/cyan); only chrome flipped. Dark-ink texture glyphs still read on each mid-tone fill. Brand green #009E73 visible. Red unconformity dashed rules visible.
      Legibility verdict: PASS.
