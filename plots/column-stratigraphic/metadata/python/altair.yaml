        0–200 in dark-soft ink, all readable. Formation names (Cedar Mesa Fm … Muav Fm) in dark bold
        on the right, italic grey thickness annotations (30 m … 20 m) far-right. Italic age-period
        labels (Permian, Pennsylvanian, Mississippian, Devonian, Cambrian) on the left.
      Data: 10 stacked rectangles colored by lithology — Sandstone = Imprint green #009E73 (first
