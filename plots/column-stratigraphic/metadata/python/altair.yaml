        Conglomerate = cyan #2ABCCD. Dark text pattern motifs overlaid; red dashed unconformity rules
        at depths 120 and 170. Layer boundaries are solid ink strokes.
      Legibility verdict: PASS — all chrome readable. NOTE: long age-period labels (Pennsylvanian,
