review:
  strengths:
  - Three-panel composite (geological-age column · stratigraphic column · thickness
    strip plot) packs age context, lithology, and quantitative thickness into one
    coherent figure
  - Six distinct FGDC/USGS-style hatch patterns (stipple, dashes, brick/grid, diagonal,
    clasts, rhombic) exceed the spec's 5-pattern minimum and decode cleanly via the
    bottom legend
  - Unconformities drawn as semantic matte-red (#AE3030) wavy boundary lines with
    italic labels — a deliberate, geologically literate focal point reserved outside
    the categorical pool
  - 'Imprint palette compliance is exact: first lithology is brand green #009E73,
    backgrounds are #FAF8F1 (light) / #1A1A17 (dark), and data colors are identical
    across both themes with only chrome flipping'
  - Faint per-period tint bands span the age and column panels, visually grouping
    formations by geological age
  - Canvas is exactly 3200×1800 px; title format matches the mandated 'column-stratigraphic
    · python · seaborn · anyplot.ai'
  - Real Western Interior Seaway formations (Dakota, Graneros, Greenhorn, Niobrara,
    Kaibab) give plausible, neutral domain context
  - Idiomatic seaborn usage — sns.set_theme theming, sns.stripplot for thickness-by-lithology,
    sns.despine — with linear KISS structure and clean imports
  weaknesses:
  - Thickness strip-plot x-axis upper limit sits exactly at the max data value (22
    m), so the largest diamonds rest right on the boundary gridline; they remain fully
    visible (no clipping) but a small right-side margin (e.g. ax_thick.set_xlim(right=23))
    would give them breathing room
  - 'Smallest annotations are tight for mobile: formation names at 7pt and unconformity
    labels at 6pt may become hard to read when the 3200px render is scaled to ~400px
    — consider 8pt / 7pt respectively'
  - The thickness strip panel is somewhat secondary/decorative relative to the core
    stratigraphic column; its data-ink ratio is lower than the rest of the figure
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) across all three panels and figure.
      Chrome: title "column-stratigraphic · python · seaborn · anyplot.ai" in dark ink, ~55% width, fully above plot. "Depth (m)" y-axis label and 0-180 ticks in soft ink, readable. Italic period labels (Late Cretaceous, Late Jurassic, Middle Jurassic, Late Triassic, Early Permian) on the left in dark ink with bracket markers. "Layer Thickness" subtitle and "Thickness (m)" axis label readable. Bottom "Lithology" legend with 6 hatched swatches on elevated off-white frame.
      Data: stratigraphic column with 10 layers; first lithology (Sandstone) = brand green #009E73, then purple Shale, blue Limestone, amber Siltstone, teal Conglomerate, magenta Dolomite — each with distinct hatch. Formation names right of each layer in dark ink. Three matte-red (#AE3030) wavy unconformity lines with italic labels. Strip-plot diamonds (size 10, ink edges) along right panel.
      Legibility verdict: PASS — all text clearly readable against the light surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) across all panels.
      Chrome: title and all labels in light ink (#F0EFE8), ticks in soft light ink — all clearly readable, NO dark-on-dark. Period labels white italic, formation names light, legend text light on elevated dark frame.
      Data: identical lithology colors to the light render (green/purple/blue/amber/teal/magenta), identical hatches, identical matte-red unconformities — only chrome flipped. Strip-plot diamonds now carry light ink edges for contrast.
      Legibility verdict: PASS — all text readable; brand green #009E73 reads well on the dark surface; no dark-on-dark failures.
