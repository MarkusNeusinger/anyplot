review:
  strengths:
  - Five visually distinct FGDC/USGS-style lithology patterns (sandstone stipple,
    shale dashes, limestone brick, siltstone tilted dashes, conglomerate circles)
    clearly demonstrate variety as the spec requires
  - 'Correct Imprint palette: Sandstone is brand green #009E73 as the first series,
    with matte-red #AE3030 intelligently reserved for the wavy unconformity line rather
    than spent as an ordinal layer color'
  - Pattern ink overlays the saturated fills (not the page background), so all five
    textures and the layer/age annotations remain legible in BOTH light and dark renders
  - 'Strong spec coverage: depth axis increases downward (scale_y_reverse), age period
    brackets on the left, formation labels on the right, solid layer boundaries, and
    a wavy unconformity line at 110 m with a red label'
  - 'Idiomatic lets-plot: grammar-of-graphics layering, scale_fill_manual with explicit
    limits, flavor_high_contrast_{light,dark}, and real interactive layer_tooltips
    on the HTML export'
  weaknesses:
  - Legend swatches show solid colors only — they do not reproduce the per-lithology
    fill patterns, so the pattern-to-rock-type mapping is conveyed by color alone
    in the legend (the layers themselves are still pattern + color + formation label,
    so impact is minor)
  - 'In the dark render the limestone brick pattern (constant dark ink #1A1A17) sits
    on the dark-blue #4467A3 fill, giving lower texture contrast than the other lithologies
    — still visible but the least crisp pattern of the five'
  - The red 'Unconformity' label sits close above the 'Gravel Bed Fm' formation label
    on the right margin; they remain on separate lines without overlap, but the spacing
    is tight
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Confirmed correct.
      Chrome: bold near-black title "column-stratigraphic · python · letsplot · anyplot.ai",
        italic gray subtitle, "Depth (m)" y-axis title with ticks 0/50/100/150/200/250,
        italic gray age labels (Triassic/Jurassic/Cretaceous/Paleogene) with left brackets,
        black formation labels on the right, bottom "Lithology" legend. All text crisp and readable.
      Data: 10 stacked layers with five distinct patterns. First series Sandstone = brand green
        #009E73 (stipple dots); Shale lavender #C475FD (horizontal dashes); Limestone blue #4467A3
        (brick); Siltstone ochre #BD8233 (tilted dashes); Conglomerate cyan #2ABCCD (circles).
        Matte-red #AE3030 wavy unconformity line at 110 m with red "Unconformity" label.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black. Confirmed correct.
      Chrome: title now light/white, subtitle light-gray, axis title/ticks light, formation labels
        light, age labels muted-light, legend frame on elevated dark surface. No dark-on-dark issues —
        every label is clearly legible against the near-black surface.
      Data: data fill colors are IDENTICAL to the light render (green/lavender/blue/ochre/cyan);
        only chrome flipped. Layer borders flip to light ink. Unconformity red line + label preserved.
        Limestone brick pattern is slightly lower-contrast on dark-blue fill but still visible.
      Legibility verdict: PASS
