review:
  strengths:
  - 'Correct stratigraphic column plot type: vertical stacked layers with depth increasing
    downward, exactly per spec convention.'
  - Five distinct fill patterns (dots, horizontal dashes, plus-grid, diagonal lines,
    cross-hatch) approximate FGDC/USGS lithology symbols and double as CVD-safe redundant
    encoding beyond color.
  - 'All required features present: formation names + lithology to the right, geological
    age labels on the left, ''Depth (m)'' scale axis, solid bar boundaries, and dotted
    age-period boundary lines.'
  - 'Imprint palette used correctly — Sandstone is brand green #009E73, remaining
    lithologies drawn from canonical Imprint colors; data colors are identical across
    light/dark, only chrome flips.'
  - 'Realistic, neutral data: named Western Interior Seaway formations (Dakota, Greenhorn,
    Niobrara, Lance, Wasatch) spanning Late Cretaceous→Eocene with plausible thicknesses.'
  - 'Clean KISS structure: linear script, deterministic hardcoded data, only used
    imports, idiomatic plotly graph_objects with marker.pattern fills and hovertemplate.'
  - 'Theme tokens threaded through every element; both renders pass legibility with
    correct #FAF8F1 / #1A1A17 backgrounds.'
  weaknesses:
  - Age-period shading rectangles (x0=0.62→x1=1.38) render as visible grey blocks
    flanking the column, most noticeable in the dark theme where they read as boxy
    panels rather than subtle tint — consider lowering alpha further or constraining
    the shading to the column width.
  - Formation/lithology label pairs for thin layers (Graneros Sh, Carlile Sh) sit
    close together; spacing is acceptable but tight on the smallest layers.
  - Spec mentions unconformities may use wavy lines; period boundaries use dotted
    lines instead — acceptable since wavy is optional, but a wavy unconformity marker
    would more faithfully follow the geological convention.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), no pure white.
      Chrome: title "column-stratigraphic · python · plotly · anyplot.ai" in dark ink, centered; "Depth (m)" y-axis title and tick labels (0–180) clearly dark and readable; age labels (Late Cretaceous, Maastrichtian, Paleocene, Eocene) on the left in soft ink; formation names (bold) + lithology (italic) on the right readable. Legend box "Lithology" with elevated off-white background and pattern swatches.
      Data: stacked column — Sandstone green #009E73 (dots), Shale purple #C475FD (h-dashes), Limestone blue #4467A3 (plus grid), Siltstone amber #BD8233 (diagonals), Conglomerate cyan #2ABCCD (cross). First series is brand green. Dotted age boundary lines at 100/148/170 m.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), no pure black.
      Chrome: title and all labels in light ink (#F0EFE8 / #B8B7B0) clearly readable; ticks and age labels light-on-dark, no dark-on-dark failures; legend on elevated #242420 panel with light text.
      Data: colors identical to light render (green/purple/blue/amber/cyan, brand green first); patterns identical. Age-shading bands read as faint grey panels around the column.
      Legibility verdict: PASS
