review:
  strengths:
  - Authentic FGDC/USGS-style lithology fill patterns (stipple dots, brick, dashes,
    pebble outlines, rhombs) hand-injected into the SVG <defs> — 7 distinct rock types,
    each visually unambiguous and identical across light and dark themes
  - 'Imprint palette used correctly: first lithology (sandstone) = brand green #009E73,
    with the matte-red semantic anchor deliberately skipped; pattern + hue give redundant
    CVD-safe encoding'
  - Depth axis reads 0 at top -> 135 m at bottom (depth-increasing-downward convention
    satisfied), with a clear 'Depth (m)' caption and tick scale
  - Period brackets on the far left group consecutive same-age layers (Eocene -> Triassic)
    and formation labels with thickness sit to the right via subtle leader lines —
    strong data storytelling and clean visual hierarchy
  - 'Theme adaptation is flawless: warm off-white #FAF8F1 / warm near-black #1A1A17
    chrome flips perfectly while data colors stay constant; all text legible in both
    renders'
  - Creative repurposing of pygal StackedBar + Style with retained interactive HTML
    output; monospace typography reinforces the technical geological-log aesthetic
  weaknesses:
  - The mandated title renders fairly large (~85% canvas width) on the 2400 px square
    canvas at fontsize 66 — expected for the long mandated title and within tolerance,
    but a slightly smaller title fontsize would leave more breathing room at the top
  - Implementation relies on regex parsing and string-replacement of pygal's generated
    SVG to place patterns, labels and brackets — robust here, but tightly coupled
    to pygal's current SVG output structure
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure white.
      Chrome: dark monospace title "column-stratigraphic · python · pygal · anyplot.ai" fully visible at top; "Period" and "Depth (m)" headers in bold dark ink; depth ticks 0/25/50/75/100/125/135 readable; formation labels (Red Mesa Fm ... Crystal Ridge Fm) with thickness in m to the right; rotated period names (Eocene ... Triassic) on far left with bracket markers; bottom legend lists 7 lithologies with pattern swatches. All text clearly readable.
      Data: 10 stacked layers filling distinct FGDC-style patterns; first lithology sandstone = brand green #009E73; shale lavender, limestone blue, siltstone ochre, conglomerate rose, mudstone cyan, dolomite lime. Layer boundaries are solid lines.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), no pure black.
      Chrome: title and all axis/period/formation/legend text flipped to light ink (#F0EFE8 / muted), all clearly readable — no dark-on-dark failures.
      Data: lithology fill colors and patterns are identical to the light render; only the chrome flips. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS
