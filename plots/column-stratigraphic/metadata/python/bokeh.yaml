review:
  strengths:
  - Five distinct lithologies each encoded redundantly by Imprint color AND FGDC-style
    hatch (stipple, dashes, brick crosshatch, circles, diagonal) — colorblind-safe
    double encoding that reads in both themes
  - 'K-Pg boundary rendered as a semantic focal point: dashed Imprint-red Span at
    100 m with a labelled, framed event marker — strong data storytelling and a clear
    visual anchor'
  - Geological age brackets (Eocene/Paleocene/Late Cretaceous) on the left with rotated
    italic labels and bracket lines, formation names cleanly placed to the right of
    each layer — no overlap
  - Realistic, neutral Western-Interior section with genuine formation names (Uinta,
    Wasatch, Green River, Pierre, Niobrara, Dakota) and sensible 0-200 m depths increasing
    downward per spec convention
  - Real bokeh interactivity (per-layer HoverTool tooltips) plus interactive HTML
    artifact — distinctive library features, not faked UI
  - Canvas exactly 3200x1800 in both renders; toolbar disabled, min_border reservations
    prevent edge clipping; clean theme-token threading (INK/INK_SOFT/PAGE_BG/ELEVATED_BG)
    so chrome flips correctly while data colors stay identical
  weaknesses:
  - 'VQ-07 minor: brand green #009E73 is assigned to Sandstone, but the legend''s
    first entry (by first-appearance order) is Siltstone in amber #BD8233 — the canonical
    ''first series = #009E73'' rule wants the leading legend swatch to be brand green.
    Colors are all valid Imprint members so impact is small; consider ordering the
    legend so the green series leads, or document the semantic mapping.'
  - 'DE-02/DE-03: a few adjacent depth ticks crowd slightly (150/166/184 and 66/84)
    given the FixedTicker uses every layer boundary; readable but a touch dense at
    the bottom of the column.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (confirmed, not pure white). Border fill matches.
      Chrome: dark title "column-stratigraphic · python · bokeh · anyplot.ai" top-left; bold rotated "Depth (m)" y-axis label; y-tick labels (0,22,40,66,84,100,120,150,166,184,200) in soft ink; age labels Eocene/Paleocene/Late Cretaceous rotated italic on left with bracket lines; formation names (Uinta Fm ... Dakota Fm) in dark bold to the right; "Lithology" legend on far right. All text clearly readable. PASS.
      Data: 10 stacked layers with Imprint fills + hatch — Siltstone amber #BD8233 diagonal, Sandstone #009E73 stipple, Shale #C475FD dashes, Conglomerate #2ABCCD circles, Limestone #4467A3 crosshatch. Brand green #009E73 present (Sandstone). K-Pg dashed red rule + framed label at 100 m.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (confirmed, not pure black). Elevated legend/marker panels slightly lighter.
      Chrome: title, "Depth (m)", ticks, age labels and formation names all in light ink (#F0EFE8 / #B8B7B0) — clearly visible, no dark-on-dark failures. Outline frame visible in soft ink. PASS.
      Data: identical fill colors and hatch patterns to the light render — only chrome flipped. K-Pg red marker still reads, label box on elevated dark surface. Brand green still visible on the dark surface.
      Legibility verdict: PASS
