review:
  strengths:
  - 'Hits every spec requirement: 10 stacked lithology layers with 5 distinct FGDC-style
    hatch patterns (circles=conglomerate, dots=sandstone, diagonals=siltstone, dashes=shale,
    brick=limestone), formation names labelled right, italic period labels with bracket
    lines on the left, solid layer boundaries, a wavy red unconformity surface, and
    a Depth (m) scale increasing downward.'
  - 'First categorical series is brand green #009E73 (conglomerate); remaining lithologies
    use canonical Imprint hues (ochre sandstone, lavender siltstone, muted gray shale,
    blue limestone). Backgrounds are correct #FAF8F1 / #1A1A17 and only chrome flips
    between renders.'
  - 'Sophisticated design: block width encodes grain size with an explanatory ''grain
    size: fine to coarse'' arrow, subtle alternating period-band shading, removed
    top/right/bottom spines, faint y-grid (alpha 0.12), and a well-framed lithology
    legend with theme-adaptive frame.'
  - 'Realistic, neutral data: real US Great Plains formations (Ogallala, Arikaree,
    Niobrara, Dakota, Morrison, Entrada) with correct Miocene-through-Jurassic ages
    and plausible 12-25 m thicknesses over a 0-200 m section.'
  - 'Clean, deterministic, KISS code: no functions/classes, hardcoded data (fully
    reproducible, no RNG needed), all imports used, idiomatic mpatches.Rectangle/hatching
    and manually-constructed legend handles; canvas is exactly 3200x1800.'
  weaknesses:
  - Layout leaves a large empty horizontal band between the formation labels and the
    far-right legend; pulling the legend inward or widening the column area would
    use the canvas more efficiently (minor VQ-05).
  - Code comment on the subplots line says 'square canvas' while the implementation
    correctly uses landscape figsize=(8, 4.5) -> 3200x1800; harmless but the comment
    should be corrected to avoid confusion in future edits.
  - The grain-size-as-block-width encoding is clever but non-standard for stratigraphic
    columns; the explanatory arrow mitigates this, but a reader could briefly misread
    varying widths as a data artifact rather than a designed channel.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), confirmed — not pure white.
      Chrome: dark title "column-stratigraphic · python · matplotlib · anyplot.ai" centered at top; "Depth (m)" y-axis label and 0-200 m tick labels in soft ink, fully readable; italic period labels (Miocene/Oligocene/Eocene/Cretaceous/Jurassic) and formation names (Ogallala Fm … Entrada Fm) clearly legible; faint horizontal grid visible but subtle. All text readable. PASS.
      Data: first layer (conglomerate) is brand green #009E73 with circle hatch; sandstone ochre w/ dots, siltstone lavender w/ diagonals, shale muted gray w/ dashes, limestone blue w/ brick hatch; red wavy unconformity line + italic "unconformity" label at ~72 m; grain-size arrow up top. First series confirmed #009E73.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), confirmed — not pure black.
      Chrome: title, axis label, ticks, period labels and formation names all in light ink (#F0EFE8 / #B8B7B0) and clearly readable against the dark surface; no dark-on-dark failures; grid lines subtle but present; legend frame uses elevated dark bg with light text.
      Data: identical Imprint hues to the light render (green/ochre/lavender/gray/blue with the same hatches); unconformity stays red #AE3030 and remains visible; only chrome flipped. Data colors confirmed identical.
      Legibility verdict: PASS.
