review:
  strengths:
  - 'Exemplary Imprint palette discipline: all six lithology fills drawn from the
    canonical palette, with Sandstone mapped to brand green (#009E73) as the dominant
    lithology and matte red (#AE3030) deliberately reserved for the wavy unconformity
    line — exactly the semantic-anchor usage the style guide recommends.'
  - 'Strong data storytelling: the red wavy unconformity at the J/K boundary with
    an italic ''Unconformity'' annotation creates a clear focal point that guides
    the eye, supported by age brackets on the left and formation labels on the right.'
  - Six distinct FGDC/USGS-style lithology patterns hand-generated inline (stipple
    dots, horizontal dashes, staggered brick, random siltstone dashes, open conglomerate
    clasts, fine mudstone dashes) — exceeds the spec minimum of 5 and reads as a professional
    geological log.
  - 'Flawless theme adaptation: pattern overlays and boundary lines flip from dark
    INK in the light render to light INK in the dark render, both fully legible with
    no dark-on-dark or light-on-light failures; backgrounds are correct #FAF8F1 /
    #1A1A17.'
  - 'Idiomatic plotnine grammar-of-graphics: geom_tile for layer fills with aes fill
    mapping, scale_fill_manual, geom_linerange for age brackets, geom_label with elevated-background
    framing, coord_cartesian with reversed depth axis.'
  weaknesses:
  - 'Layer fills use alpha=0.62, so the composited fill hue differs subtly between
    the two themes (same RGBA over #FAF8F1 vs #1A1A17). The legend swatches remain
    identical, so this is minor, but a higher alpha or theme-constant fill would make
    data colors truly identical across renders.'
  - Generous empty whitespace on the left flank between the depth axis and the age
    labels/bracket; the column itself is offset right of center. Centering the column
    or tightening the left margin would improve balance (minor VQ-05).
  - Formation and age labels are on the small side (~3.6-3.7 mm geom_text); legible
    at full 2400px size but become faint when the square render is scaled down toward
    ~400px mobile width.
  - Madison Fm is mapped to Early Cretaceous limestone here; the real Madison is Mississippian.
    Synthetic and neutral so not a scoring issue, but a geologically aware naming
    would add polish.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: bold dark title "column-stratigraphic · python · plotnine · anyplot.ai" fully visible at top; "Depth (m)" y-axis title and depth ticks 0–180 in soft ink, all readable; age labels (Late Cretaceous … Triassic) on left, formation labels (Frontier Fm … Sundance Fm) in framed boxes on right, all dark and readable. Bottom legend "Lithology" with six framed swatches. PASS.
      Data: ten stacked layers with six Imprint fills — Sandstone green #009E73, Shale lavender, Limestone blue, Siltstone ochre, Conglomerate cyan, Mudstone rose. Pattern overlays (dots, brick, dashes, open clasts) drawn in dark ink. Red wavy unconformity line at ~95 m with red "Unconformity" annotation. First/dominant series is brand green #009E73. Boundaries solid black.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title and all axis text rendered in light ink (#F0EFE8 / soft), clearly visible; framed formation/age labels readable with light text; legend frame elevated dark with light text. No dark-on-dark failures detected.
      Data: identical six fill hues to the light render (only chrome flips); pattern overlays and layer boundaries flip to light ink so they remain visible over the dark fills. Red unconformity line stays matte red #AE3030 and reads well on the dark surface. Brand green #009E73 sandstone clearly visible.
      Legibility verdict: PASS
