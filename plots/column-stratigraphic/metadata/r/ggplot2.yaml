review:
  strengths:
  - Faithful FGDC/USGS-style lithology patterns hand-composed natively from segments,
    dot grids and open-circle clasts — brick courses for limestone, stipple for sandstone,
    laminae for shale, broken dashes for siltstone, scattered clasts for conglomerate
    — overcoming ggplot2's lack of a fill-texture geom without any workaround.
  - 'Complete spec coverage: depth axis with meters scale (scale_y_reverse, increasing
    downward), formation names labeled right, geological ages labeled left, solid
    layer boundaries, and a wavy unconformity contact at the Aptian/Tithonian boundary
    with an italic ''unconformity'' annotation.'
  - 'First categorical series (Sandstone) is brand green #009E73 and the five lithologies
    follow the canonical Imprint palette; backgrounds are correct (#FAF8F1 light /
    #1A1A17 dark) and pattern ink flips with theme while data fills stay identical.'
  - Realistic, neutral domain data — genuine Western Canada Sedimentary Basin formations
    (Belly River, Wapiabi, Greenhorn, Viking, Cadomin, Fernie) with plausible Cretaceous–Jurassic
    ages and sensible 0–250 m depths.
  - 'Strong geological storytelling and visual hierarchy: bold formation names, soft-ink
    ages/lithology subtitles, subtle y-only grid, removed spines, and the unconformity
    wave as a clear focal accent.'
  weaknesses:
  - The italic per-layer lithology subtitles (geom_text size 2.9) and age labels (size
    3.0) are on the small side; at the ~400 px mobile render these become hard to
    read. Consider bumping the smallest annotations by ~0.3-0.5 mm so they survive
    downscaling without crowding the formation names.
  - Layer fills use alpha 0.62, which slightly mutes the Imprint colours; a touch
    more saturation (e.g. alpha ~0.7) would strengthen the legend-to-layer colour
    match while keeping the ink patterns legible.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: bold dark title "column-stratigraphic · r · ggplot2 · anyplot.ai"; "Depth (m)" y-axis title and 0–250 tick labels in soft ink; right-side legend "Lithology" with elevated cream frame. All readable.
      Data: eight stacked layers filled with Imprint colours (Sandstone green #009E73 first), overlaid with dark-ink FGDC patterns (brick/stipple/laminae/dashes/clasts), wavy unconformity line, ages on left, bold formation names + italic lithology on right. First series confirmed #009E73.
      Legibility verdict: PASS (small italic lithology/age labels are readable at full size; flagged as a minor mobile-scaling concern).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title, axis title, ticks and legend text all in light ink, clearly readable — no dark-on-dark.
      Data: layer fill colours identical to light render; only the pattern ink, text and grid chrome flipped to light. First series still #009E73; conglomerate red and limestone blue read well on dark.
      Legibility verdict: PASS.
