review:
  strengths:
  - 'Full spec compliance: diagonal reference line (y=x), temporal coloring via imprint_seq,
    and r annotation all present and correctly styled'
  - Theme-adaptive chrome is correctly implemented throughout — INK, INK_SOFT, PAGE_BG,
    ELEVATED_BG all resolve correctly for both light and dark renders; no dark-on-dark
    failures
  - Imprint sequential colormap (green→blue) correctly applied for single-polarity
    temporal index data; both renders show identical data colors
  - Density-adaptive marker sizing (s=8, alpha=0.35) appropriate for 1499 high-density
    scatter points
  - r annotation is styled cleanly with rounded-corner bbox, theme-adaptive ELEVATED_BG
    fill, and INK_SOFT border — reinforces the quantitative story immediately
  - Code is clean, flat, reproducible (np.random.seed(42)), and linearly structured
    with no unnecessary abstractions
  weaknesses:
  - Colorbar tick labels set at fontsize=7 and label at fontsize=8 are slightly below
    the style-guide minimum of 8pt for tick labels at 3200×1800 — increase colorbar
    ticks to 8pt and label to 9pt
  - Core scatter uses matplotlib's ax.scatter rather than sns.scatterplot — seaborn's
    idiomatic plotting functions are bypassed; the sns layer is used only for styling
    (set_theme, despine); consider using sns.scatterplot with hue= and a norm for
    more seaborn-idiomatic continuous coloring, or supplementing with sns.kdeplot
    for density contours
  - No visual emphasis differentiating the dense central cluster from the sparse outer
    scatter — a subtle sns.kdeplot contour overlay or hexbin underlay would add depth
    and improve DE-01/DE-02
