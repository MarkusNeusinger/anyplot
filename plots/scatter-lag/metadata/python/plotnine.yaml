review:
  strengths:
  - Faceted multi-lag layout (lags 1, 3, 7) elegantly demonstrates how autocorrelation
    weakens with increasing lag in a single compact view
  - Temporal day-index coloring using imprint_seq adds a meaningful second dimension
    revealing whether early or late observations drive the autocorrelation
  - 'Perfect spec compliance: diagonal reference line, multi-lag support, and temporal
    coloring all implemented'
  - Clean theme-adaptive chrome correctly flips all non-data elements between light
    and dark without any dark-on-dark failures
  - pd.Categorical with ordered=True for facet panel ordering is idiomatic plotnine
  weaknesses:
  - Slight overplotting in the central dense region of each facet panel (size=2.5,
    alpha=0.55 is adequate but could be tuned to size=2.0, alpha=0.45 for better separation)
  - Panel borders from panel_background render as a full box frame around each facet
    — less refined than an L-shaped or no-spine approach; add panel_border=element_blank()
    to remove the box
  - Optional correlation coefficient annotation (r value) not included — adding it
    would significantly improve data storytelling (DE-03) by quantifying the visual
    pattern seen in each facet
