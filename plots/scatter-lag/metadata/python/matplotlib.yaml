review:
  strengths:
  - 'Perfect spec compliance: all required features (diagonal reference line, time-index
    coloring, r annotation, configurable lag) implemented correctly.'
  - Correct imprint_seq colormap for continuous time-index encoding — palette compliance
    is flawless.
  - Both themes render cleanly with proper INK/INK_SOFT token threading — no dark-on-dark
    or light-on-light failures.
  - Canvas dimensions exact at 3200x1800; no bbox_inches tight drift.
  - Dynamically generated y-axis label f"y(t + {lag})" is a nice touch.
  - r = 0.834 annotation in a themed elevated box is clean and informative.
  weaknesses:
  - Grid is y-axis only (ax.yaxis.grid); the style guide recommends both-axis grid
    for scatter plots — adding ax.xaxis.grid with the same alpha/linewidth would better
    serve visual alignment in a lag plot.
  - plt.tight_layout() is used before savefig — the library guide recommends fig.subplots_adjust()
    for internal padding control to avoid potential canvas drift with complex layouts
    (colorbars). Canvas gate passed this time, but it is safer to use explicit margin
    controls.
  - 'Design Excellence is moderate: the colorbar spacing is tight and the visualization
    lacks a strong typographic hierarchy or focal-point emphasis element beyond the
    r annotation.'
