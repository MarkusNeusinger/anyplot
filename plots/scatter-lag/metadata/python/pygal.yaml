review:
  strengths:
  - Temporal quartile coloring with progressive dot-size encoding (7→10) is excellent
    data storytelling — temporal structure within the scatter is immediately legible
  - 'Full spec compliance: diagonal reference line, time-index coloring, correlation
    coefficient in title, configurable lag parameter'
  - Imprint palette applied correctly with brand green (#009E73) as first series;
    theme-adaptive chrome works correctly in both renders
  - ±1σ spread envelope adds statistical context without competing with data points;
    dashed line styles on reference layers are well-chosen
  - 'Idiomatic pygal code: proper sys.path fix for filename collision, correct stroke/show_dots
    per series, x_value_formatter and value_formatter set'
  - 'Both light and dark renders pass readability checks — no dark-on-dark failures,
    backgrounds correctly #FAF8F1 and #1A1A17'
  weaknesses:
  - ±1σ envelope lines use None as series name so they have no legend entry — viewer
    must infer their meaning from the related y=x label. Consider labeling them or
    combining into a shaded fill with a single legend entry.
  - Minor overplotting in the central dense cluster (around 19–21°C) is partially
    mitigated by opacity=0.45, but the center remains visually dense; slightly smaller
    dots (size 6–8 range) with lower opacity (~0.35) could improve individual point
    legibility there.
  - Pygal renders a full bounding box (all 4 spines) by default — no top/right spine
    removal is possible without SVG post-processing; this is a library constraint
    but noted as a visual refinement gap.
