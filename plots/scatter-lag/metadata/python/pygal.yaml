  - 'Perfect data quality: realistic AR(1) hourly temperature process with φ=0.78,
    np.random.seed(42), and 399 points producing a convincing autocorrelation demonstration'
  - 'Perfect code quality: KISS structure, clean imports, sys.path fix for filename
