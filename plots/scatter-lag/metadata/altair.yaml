  - Dense x-axis tick labels at 0.4-unit increments create a crowded axis; reduce
    tick count to ~10-12
  - Missing correlation coefficient annotation (spec explicitly suggests r value);
    this would significantly improve data storytelling
  - Legend label font size (14pt) is below the minimum 16pt guideline
  - No intentional visual hierarchy beyond color; design stays at well-configured
    defaults level
  image_description: The plot shows a scatter lag plot of approximately 499 points
    from a synthetic AR(1) process (phi=0.85). Points are colored using the viridis
    colormap — dark purple for early time indices and yellow-green for later — revealing
    temporal structure in the autocorrelation. A dashed gray diagonal reference line
    (y=x) traverses the chart, helping viewers assess autocorrelation strength. The
    x-axis is labeled "y(t)" and the y-axis "y(t + 1)". Title reads "scatter-lag ·
    altair · pyplots.ai". A gradient colorbar legend on the right is labeled "Time
    Index" (0–400). The overall pattern is a clear positive linear cluster along the
    diagonal, visually confirming strong positive autocorrelation. Background is white
    with very subtle gridlines. The x-axis has quite dense tick marks at 0.4 increments,
    appearing crowded at display resolution. The center of the data cloud shows visible
    overplotting due to the large marker size (120) and opacity (0.7).
