    API'
  weaknesses:
  - Title (titlesize=20) renders the 40-char title at ~40–45% canvas width, slightly
    below the 50–70% comfort zone; consider raising titlesize to 22–24 for better
    proportional fill
  - LM-02 only partially demonstrates Makie-distinctive capabilities; the Colorbar
    and cgrad integration are good but more Makie-specific API surface (e.g. Makie
    theme API, custom tick format functions) could push mastery higher
  - The redundant Float32 casts in RGBAf calls are harmless but more verbose than
    needed — RGBAf(INK.r, INK.g, INK.b, 0.15f0) is sufficient since INK components
    are already Float32
