review:
  strengths:
  - Deterministic Park-Miller LCG seed produces reproducible AR(1) synthetic data
    with realistic hourly temperature values and strong positive autocorrelation (r≈0.916),
    making the lag pattern immediately interpretable
  - Sequential Imprint colormap (green→blue via t.seq) encodes temporal order directly
    onto the scatter points, revealing temporal structure within the autocorrelation
    pattern — well-aligned with spec requirement
  - Pearson r computed in-snippet and annotated top-left, quantifying the visual pattern
    as the spec requests
  - SVG linearGradient colorbar legend is idiomatic D3 (defs/linearGradient) and provides
    clear time index context without a bulky legend box
  - 'Dashed diagonal reference line (y=x) correctly anchors the interpretation: tight
    clustering around the diagonal signals high positive autocorrelation at lag 1'
  - All chrome tokens (t.ink, t.inkSoft, t.grid, t.pageBg) correctly applied — both
    light and dark renders are fully readable with no dark-on-dark or light-on-light
    failures
  - Marker stroke (pageBg color) provides clean edge definition for overlapping points
    without cluttering the display
  - Generous margins (top:90, right:80, bottom:100, left:110) ensure axis labels and
    annotations never crowd the canvas edges
  weaknesses:
  - Colorbar legend labels ('time index', 't = 1', 't = 280') use 12–13px CSS font
    sizes, which map to ~24–26 source px at deviceScaleFactor=2 — slightly small for
    the large canvas and potentially marginal at 400px mobile width; increase to at
    least 14px to match the rest of the secondary text
  - 'DQ-01: Implementation shows only lag=1; while `const lag = 1` is technically
    changeable, the spec encourages demonstrating configurable lag (e.g., adding a
    subtitle noting the current lag order or structuring the data loop around the
    `lag` constant more prominently)'
  - 'DE-01: No subtitle or interpretive callout distinguishing ''linear cluster =
    autocorrelation present'' vs ''uniform scatter = white noise'' — adding a concise
    subtitle would elevate the storytelling without adding complexity'
  - 'LM-02: D3''s native path/shape generators and scale utilities are used well,
    but more distinctively D3 capabilities (e.g., custom symbol shapes on points to
    add a second redundant encoding dimension) are not explored'
