review:
  strengths:
  - Temporal quartile coloring elegantly reveals time evolution within the lag scatter,
    transforming a static diagnostic into a temporal narrative
  - Custom diagonal (y=x) line implemented via MUI X scale hooks (useXScale/useYScale)
    is technically correct and library-idiomatic
  - Pearson r annotation quantifies the visual autocorrelation pattern as required
    by spec
  - 'Perfect Imprint palette compliance: positions 1-4 in canonical order, theme-adaptive
    chrome via ThemeProvider'
  - Deterministic LCG (seed=42) solves the browser no-RNG constraint elegantly
  - Descriptive axis labels with units and informative subtitle enrich the plot context
  - 'Complete spec compliance: lag plot, diagonal reference line, temporal color encoding,
    r annotation, AR(1) data'
  weaknesses:
  - All four chart spines are visible (MUI X default); removing or fading the top
    and right spines with slotProps or sx overrides would give a cleaner L-frame look
    consistent with the style guide
  - Legend label fontSize is 13px (below the recommended 14-16px MUI X guideline);
    raise to 14px in ChartsLegend slotProps
