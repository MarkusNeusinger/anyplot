review:
  strengths:
  - Excellent use of useXScale/useYScale hooks to place the diagonal reference line
    precisely in chart coordinate space — highly idiomatic MUI X pattern not available
    in other libraries.
  - Temporal quartile coloring (earliest to latest time periods) reveals temporal
    autocorrelation structure within the lag scatter, adding genuine informational
    depth beyond a basic lag plot.
  - Fully deterministic LCG (seed=42) satisfies the browser harness reproducibility
    requirement; AR(1) data generation with rho=0.82 produces a realistic and visually
    clear autocorrelation pattern.
  - 'Perfect spec compliance: diagonal y=x reference line, temporal color encoding,
    Pearson r annotation, and descriptive axis labels with units all present.'
  - Both themes render correctly — text is fully readable in light and dark renders
    with no dark-on-dark failures.
  weaknesses:
  - 'No alpha blending on scatter markers (markerSize=7, 199 points) — the central
    cluster is slightly crowded; adding opacity: 0.8 or similar on each series would
    reduce visual noise without losing the elliptical pattern.'
  - Spine masking via background-colored SVG overlay lines (stroke={t.pageBg}) is
    a workaround that depends on the background color matching exactly; a CSS or SVG
    visibility approach on the spine elements would be more robust.
  - The diagonal reference line has no text label — a small 'y = x' label near the
    line end would make its purpose immediately obvious to readers unfamiliar with
    lag plots.
