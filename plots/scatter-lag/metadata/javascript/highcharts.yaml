      Data: Scatter points use identical green-to-blue gradient (imprint_seq) as the light render — data colors unchanged between themes. Temporal ordering is equally apparent. Reference line visible as dashed lighter line.
      Legibility verdict: PASS — all text readable against warm near-black background. No dark-on-dark issues detected. Brand green (#009E73) remains visible and identifiable on the dark surface.
