    used as marker border color for definition'
  - 'animation: false set, echarts.init called without explicit size or devicePixelRatio
    — follows library rules exactly'
  - 'All spec optional features implemented: diagonal reference, correlation annotation,
    temporal coloring, configurable lag'
  weaknesses:
