review:
  strengths:
  - Correct imprint_seq (green→blue) for temporal continuous coloring — both data
    colors and colormap choice are compliant
  - 'All spec features implemented in a single clean script: lag scatter, configurable
    LAG, diagonal reference line, temporal color encoding, Pearson r annotation'
  - Three well-implemented custom Chart.js plugins demonstrating deep platform knowledge
    (bgPlugin, rAnnotation, colorbarPlugin)
  - LCG with seed 42 gives fully deterministic output without any browser RNG dependency
  - Dark mode adaptation is flawless — all chrome tokens thread through to every text
    element
  weaknesses:
  - Scatter pointRadius=4 is slightly small for 300 points at 3200×1800; increase
    to 5–6 for better visibility
  - The r annotation at 15px is functional but small for a key quantitative callout
    — consider 16–17px with a subtle background rectangle to lift it off the scatter
  - 'Marker edges have no highlighting (borderColor: ''transparent'') — a 1px stroke
    in inkSoft or white would improve definition against the off-white background
    on dense points'
  - The bottom legend/colorbar area is compact but utilitarian; a small padding increase
    between the colorbar and the 'y = x' legend entry would improve polish
