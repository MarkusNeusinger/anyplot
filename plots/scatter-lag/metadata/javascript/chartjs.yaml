review:
  strengths:
  - Correct scatter lag implementation using AR(1) process with clear positive autocorrelation
    (r=0.828)
  - Temporal gradient coloring using imprint_seq (green→blue) elegantly reveals time
    structure within the scatter
  - Custom Chart.js plugins for background fill and correlation annotation are well-implemented
  - Mixed chart type (scatter + line overlay) is idiomatic Chart.js usage
  - Equal axis min/max enforces true 45° diagonal reference line
  - Deterministic LCG (seed 42) ensures reproducibility
  - Both light and dark renders are fully legible with correctly adaptive chrome tokens
  weaknesses:
  - Lag is hardcoded to 1 — spec requests configurable lag support (e.g., 1, 7, 12);
    for a JS in-browser implementation, a hardcoded CONST with a comment noting configurability
    or showing multiple lag panels would satisfy spec intent
  - No visual colorbar for the gradient encoding — only subtitle text explains the
    green→blue temporal gradient; a Chart.js-native approach (e.g., custom color-scale
    legend drawn via plugin) would strengthen data storytelling
  - Minor overplotting in the dense central cluster — pointRadius=4 with alpha=0.82
    is reasonable but a slightly lower alpha (0.65–0.75) would better reveal the density
    gradient in that region
  - 'Chart borders are visible on all 4 sides (default Chart.js box style); removing
    top/right borders via border: { display: false } per scale would align with the
    L-shaped spine recommendation in the style guide'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "AR(1) Process · scatter-lag · javascript · chartjs · anyplot.ai" in dark ink at top, fully readable. Subtitle "Points colored by time index (early: green → late: blue)" visible in muted ink below title. Y-axis label "y(t + 1)" and X-axis label "y(t)" are clear and legible. Tick labels (-2.8 to 3.2 on both axes) in dark gray, fully readable. Correlation annotation "r = 0.828" in upper-left plot area, readable in dark ink. Legend at bottom shows dashed-line entry for "y = x (no autocorrelation)", readable.
      Data: 299 scatter points colored along imprint_seq gradient from green (#009E73, early) through teal to blue (#4467A3, late), with alpha ~0.82. Dashed diagonal reference line (y = x) visible in dark inkSoft color. Point density is medium-high in center; overplotting present but alpha mitigates it.
      Legibility verdict: PASS — all text readable; no light-on-light issues; warm off-white background confirmed.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title and subtitle visible in light ink (#F0EFE8 equivalent) against dark background. Axis labels "y(t)" and "y(t + 1)" readable in light ink. Tick labels in lighter secondary ink, clearly readable — no dark-on-dark failure. Correlation annotation "r = 0.828" in upper-left, fully readable in light ink. Legend at bottom, legible against dark background.
      Data: Scatter gradient colors are identical to the light render (imprint_seq green→blue unchanged) — correct palette behavior. Dashed diagonal reference line appears in lighter inkSoft color, clearly distinguishable. Brand green #009E73 is visually prominent in the dark render.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures; warm near-black background confirmed; data colors unchanged between themes.
