review:
  strengths:
  - Excellent data quality with 7 real material families and accurate engineering
    property values spanning 5 orders of magnitude
  - Large semi-transparent dots effectively create the Ashby-style bubble region appearance
  - SVG post-processing to add family centroid labels is a creative solution to pygal
    lack of annotation API
  - Custom color palette with white-stroke text labels ensures readability over data
    points
  - Rich tooltip configuration with per-material detail (name, family, properties)
  weaknesses:
  - Family centroid labels (font-size=20 in SVG) are relatively small — increasing
    to 24-26 would improve visibility
  - Composites label positioning between composites and ceramics regions could confuse
    viewers — needs offset adjustment
  - Red (Ceramics) and burnt orange (Natural Materials) colors are somewhat close
    in hue
  - Grid lines could be more subtle for a cleaner look
  - No guide lines for constant performance indices which would add engineering context
  image_description: The plot displays a log-log scatter chart of Density (kg/m³)
    on the x-axis versus Young's Modulus (GPa) on the y-axis, covering 7 material
    families. Each family is represented by large semi-transparent dots (opacity ~0.35)
    creating a bubble-region effect. Ceramics (red) occupy the upper region with high
    modulus values (65–680 GPa), Metals (steel blue) cluster at high density and high
    modulus in the upper-right, Composites (amber) span the mid-upper range, Natural
    Materials (burnt orange) sit in the middle, Polymers (emerald green) form a tight
    cluster at moderate density and low modulus (~0.5–3.6 GPa), Elastomers (purple)
    appear at the bottom with very low modulus values (0.001–0.025 GPa), and Foams
    (silver gray) are in the lower-left corner at low density and low modulus. Each
    family has a text label near its centroid with a white stroke outline for readability.
    The background is white with a light gray (#f8f9fa) plot area and subtle grid
    lines. A legend at the bottom shows all 7 families in a single row. The title
    reads "Density vs Young's Modulus · scatter-ashby-material · pygal · pyplots.ai".
