  image_description: 'The plot displays a log-log scatter chart of Density (kg/m³)
    on the x-axis versus Young''s Modulus (GPa) on the y-axis. Six material families
    are shown: Metals (steel blue, #306998), Ceramics (burnt orange-red, #C75B39),
    Polymers (green, #4DAF4A), Composites (cyan, #17BECF), Elastomers (purple, #984EA3),
    and Foams (olive-brown, #A6761D). Each family is represented by individual scatter
    points (size=4.5, alpha=0.8) overlaid on semi-transparent convex hull envelopes
    (alpha=0.15). Bold family labels are placed near each hull centroid with manual
    nudge offsets applied for Ceramics (up), Composites (down), and Metals (right)
    to reduce crowding. The title "scatter-ashby-material · plotnine · pyplots.ai"
    appears in bold at the top. A legend titled "Material Family" sits on the right
    with a light gray background. The panel has a very light gray background (#F8F9FA)
    with subtle major grid lines (alpha=0.4). Minor grid lines are removed. The x-axis
    spans ~30 to ~10,000 kg/m³ and the y-axis from ~0.001 to ~500 GPa. Foams occupy
    the lower-left, Elastomers and Polymers are at mid-density/low-modulus, while
    Ceramics and Metals cluster in the upper-right with some hull overlap.'
