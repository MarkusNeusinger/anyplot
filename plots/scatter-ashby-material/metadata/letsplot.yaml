  image_description: 'The plot displays a log-log Ashby material selection chart with
    Density (kg/m³) on the x-axis and Young''s Modulus (GPa) on the y-axis. Seven
    material families are shown as colored elliptical envelopes with individual data
    points: Ceramics (teal, upper-center, highest modulus ~65–380 GPa), Metals (dark
    blue, upper-right, high density ~2700–19300 kg/m³), Composites (magenta, center-upper),
    Natural Materials (brown, center), Polymers (warm orange, center with moderate
    density and low modulus ~0.9–3.9 GPa), Foams (sky blue, lower-left, lowest density
    and modulus), and Elastomers (crimson, lower center-right, very low modulus ~0.002–0.02
    GPa). Three diagonal dashed guide lines show constant E/ρ performance indices
    (10⁻³, 10⁻², 10⁻¹) with angled labels. Family labels are bold black text positioned
    near their clusters, with dotted leader lines connecting displaced labels to envelope
    centers. The legend on the right shows "Material Family" with all 7 categories.
    Title reads "scatter-ashby-material · letsplot · pyplots.ai". Background is light
    gray with a white panel, subtle major gridlines, and no minor grid.'
