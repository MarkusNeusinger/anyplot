review:
  strengths:
  - 'Correct Ashby chart implementation: convex hull polygons per material family
    rendered in log-log space — the canonical approach for this plot type'
  - Guide line 'E/ρ = const' with annotation adds engineering context and creates
    a focal reference for lightweight stiffness trade-offs
  - Inline geom_label family labels inside regions eliminate the need for a separate
    legend, keeping the chart clean
  - 'Full Imprint palette in canonical order (Metals=brand-green first), correct backgrounds
    (#FAF8F1 / #1A1A17), and all chrome tokens theme-adaptive'
  - Realistic materials data (40 points across 6 families) with accurate density/modulus
    values; both axes span the correct physical range on log scale
  - Clean, linear code structure; dplyr chull() used idiomatically for hull computation;
    ragg device used correctly
  weaknesses:
  - Ceramics and Metals label proximity in the upper-right region causes slight visual
    crowding — label_data placement at geometric mean puts both labels near the same
    area; a small offset or background-aware placement would resolve this
  - Guide line annotation 'E/ρ = const' is at size 2.8 (mm ≈ 8pt) — slightly undersized
    for the canvas; bumping to 3.2–3.5 would improve mobile readability without disrupting
    the layout
