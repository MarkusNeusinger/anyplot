review:
  strengths:
  - 'Perfect spec compliance: log-log scatter with convex hull regions, embedded family
    labels, and E/ρ guide line all present'
  - Correct Imprint palette in canonical order (Metals=#009E73 first), theme-adaptive
    chrome works correctly in both renders
  - 'Excellent data: 40 real materials across 6 families with accurate density and
    Young''s modulus values'
  - 'Clean ggplot2 grammar: chull() via group_by+slice on log-scale coordinates is
    idiomatic dplyr+ggplot2'
  - 'Both theme renders pass legibility — all text readable, backgrounds correct (#FAF8F1
    light / #1A1A17 dark)'
  - Legend replaced by embedded geom_label boxes — cleaner than a legend for this
    chart type
  - E/ρ = const guide line adds meaningful engineering context (lightweight stiffness
    direction)
  weaknesses:
  - Hull fill alpha=0.13 is too low — regions are barely perceptible, especially in
    dark render where teal fill on near-black is almost invisible. Increase to 0.20–0.25.
  - geom_point size=1.7 is below the recommended ggplot2 starting value of 2.5 for
    scatter; with 40 points the markers look small. Increase to 2.0–2.2.
  - geom_label family labels at size=2.6 (≈7.4pt) are slightly small for the 3200×1800
    canvas; size=3.0–3.2 would improve readability at reduced sizes.
  - Guide line annotation 'E/ρ = const' at size=2.3 (≈6.5pt) is very faint (INK_MUTED
    + small) and easy to miss — consider size=2.8 or a slightly bolder color.
  - 'DE-01 (Aesthetic Sophistication): Hull fills barely visible at alpha=0.13 reduces
    overall visual impact. Raising fill alpha and point size would significantly improve
    the aesthetic quality.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "scatter-ashby-material · r · ggplot2 · anyplot.ai" in dark ink at ~65% plot width, clearly readable. X-axis label "Density (kg/m³)" and Y-axis label "Young's Modulus (GPa)" in dark ink at size 10pt — proportional and balanced. Tick labels (8pt, INK_SOFT #4A4A44) visible on both axes. Subtle major grid lines at linewidth=0.18.
      Data: 6 material families colored from Imprint palette in canonical order — Metals #009E73 (green, upper right), Ceramics #C475FD (lavender, upper middle-right), Polymers #4467A3 (blue, center), Composites #BD8233 (ochre, center-right), Elastomers #AE3030 (matte red, center-bottom), Foams #2ABCCD (cyan, lower left). Convex hull fills at alpha=0.13 are very faint — barely visible. Hull outlines and data points clearly visible. Embedded geom_label boxes for each family readable. Dashed E/ρ=const guide line with annotation in INK_MUTED.
      Legibility verdict: PASS — all text elements readable against light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black.
      Chrome: Title in light #F0EFE8 — clearly readable. Axis labels and tick labels in #B8B7B0 (INK_SOFT dark) — readable against dark background. Grid lines subtly visible. No dark-on-dark failures observed.
      Data: Data colors are identical to light render (Imprint palette is theme-independent). Foams hull fill (#2ABCCD at alpha=0.13) is almost invisible on near-black background — the fill polygon is extremely faint, though the outline and points remain visible. All other families visible. geom_label boxes use ELEVATED_BG #242420 fill — subtly distinguishable from the background, labels readable.
      Legibility verdict: PASS — all text readable, but Foams hull fill nearly disappears on dark background due to very low alpha.
