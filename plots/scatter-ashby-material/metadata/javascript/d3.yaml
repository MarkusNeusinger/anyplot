review:
  strengths:
  - 'Perfect spec compliance: log-log axes, convex hull family regions, direct family
    labels, E/rho guide lines all implemented correctly'
  - 'Excellent D3 idioms: d3.polygonHull() + d3.curveCatmullRomClosed.alpha(0.5) produces
    smooth, visually distinctive Ashby-chart blobs'
  - 'Accurate material property data: density and Young''s modulus values match CES
    Edupack / Ashby textbook references for all families'
  - 'Clean theme-adaptive chrome: t.pageBg background, t.ink/inkSoft for text and
    axes, t.grid for gridlines, correctly adapted in both light and dark renders'
  - Clip paths applied correctly to hull group and scatter group preventing data overflow
    beyond the plot area
  weaknesses:
  - Helper function expandHull() defined in top-level scope — minor KISS violation;
    could be inlined into the hull-drawing loop
  - Family labels at 14px CSS (28px in PNG) are slightly small — at 400px mobile scale
    they may become marginal; bump to 15-16px for safety
  - 'DE-02 refinement: tick marks (the short lines) share the same inkSoft color as
    the axis domain line — using a lighter t.grid color for tick lines would add polish'
  - 'Design storytelling could be enhanced: the E/rho guide annotation ''E/rho = c''
    is present but minimal — labeling individual guide lines with actual k-values
    (e.g. E/rho = 0.01) would make the performance-index story clearer'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "scatter-ashby-material · javascript · d3 · anyplot.ai" in dark bold text at 22px, clearly readable. X-axis label "Density (kg/m³)" and Y-axis label "Young's Modulus (GPa)" in dark medium-weight text at 16px. Tick labels (30, 100, 300, 1k, 3k, 10k on x; 0.001–100 on y) in dark secondary text at 13px. All text readable against the warm off-white background. No light-on-light issues.
      Data: 7 material families each with a semi-transparent filled hull region (fill-opacity 0.13) and colored border stroke plus scatter points (r=5). Color order: Metals=green (#009E73), Ceramics=lavender (#C475FD), Polymers=blue (#4467A3), Composites=ochre (#BD8233), Elastomers=matte-red (#AE3030), Foams=cyan (#2ABCCD), Natural=rose (#954477). Family labels in matching family color sit inside each region. Three dashed E/rho guide lines at low opacity (0.3) with an "E/rho = c" annotation in the upper-right.
      Legibility verdict: PASS — all text and data elements clearly readable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title in light cream text, clearly visible. Axis labels and tick labels in light secondary text against the dark surface. Grid lines subtle but visible. Axis domain lines visible in muted light color. No dark-on-dark failures observed — all text is light-on-dark as expected.
