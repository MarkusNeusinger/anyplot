review:
  strengths:
  - 'Perfect spec compliance: log-log axes, convex hull family regions, family labels,
    guide lines for E^½/ρ performance index — all required features implemented'
  - 'Excellent data quality: 60 real engineering materials across 7 families with
    accurate property values (steel 200 GPa, aluminium 70 GPa, natural rubber 0.05
    GPa) spanning full density and modulus ranges'
  - 'Distinctive ECharts feature use: custom series with renderItem callback for padded
    convex hull polygon rendering is a distinctively ECharts approach'
  - 'Good theme adaptation: transparent background uses page tokens, all text (title,
    axis labels, tick labels, legend) uses t.ink / t.inkSoft tokens — both light and
    dark renders are clearly readable'
  - Guide lines for E^½/ρ performance index elevate the chart from data display to
    engineering storytelling
  weaknesses:
  - 'Non-canonical Imprint palette order: FAMILIES assigns palette[0] to Metals, palette[2]
    to Ceramics, palette[1] to Polymers — out of canonical 1→N order. Fix: assign
    palette[0]=Metals, palette[1]=Ceramics, palette[2]=Polymers, palette[3]=Composites,
    palette[4]=Elastomers, palette[5]=Natural, palette[6]=Foams'
  - Three helper functions (hullCross, convexHull2D, buildPaddedHull) violate KISS
    structure — inline or flatten where possible
  - Marker symbolSize=9 is slightly small for 60 data points at 3200×1800 — increase
    to 12-14 for better visibility, especially for the sparse Foams and Elastomers
    clusters
  - Upper-right hull area (Metals/Ceramics/Composites) has visually complex overlapping
    regions where the family labels become hard to disambiguate — consider slightly
    increasing label font size to 17px and adjusting centroid label positions to reduce
    visual clutter in this dense region
