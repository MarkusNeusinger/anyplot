review:
  strengths:
  - Programmatic Graham-scan convex hull builds accurate material family boundary
    envelopes in log-log space with a configurable 0.20-decade padding — a genuinely
    impressive ECharts custom series implementation
  - Log-centroid label placement correctly positions family names at the visual center
    of each cluster, matching the Ashby chart convention
  - 'Full spec coverage: log-log axes, hull regions, per-family scatter series, and
    E^½/ρ guide lines all present'
  - All 7 families use realistic, domain-accurate property values (e.g., Tungsten
    at 19,300 kg/m³ / 400 GPa, Elastomers at 0.002–0.05 GPa) spanning the canonical
    Ashby chart range
  - ECharts custom series renderItem (polygon + text group) is used expertly — one
    of ECharts' most powerful and library-distinctive capabilities
  - 'Both light and dark renders are fully theme-correct: Imprint palette, transparent
    background letting pageBg show, and all chrome tokens (ink, inkSoft, grid) applied
    consistently'
  weaknesses:
  - 'Guide lines (E^½/ρ = const) appear in the chart without any visible label — legend.data
    is explicitly set to only family names, so the ''E^½/ρ = const'' series name is
    excluded from the legend and no in-chart annotation is present. Viewers see unexplained
    diagonal dashes. Fix: either add the series name to legend.data or add a small
    text annotation near the upper end of one guide line.'
  - 'Minor label-on-marker overlap in the Composites and Polymers regions — family
    labels are positioned at the log-centroid which coincides with the densest point
    cluster. Fix: add a semi-transparent pageBg-colored background behind each family
    text label (ECharts text style supports backgroundColor).'
  - 'Family text labels at 17px are borderline-small for mobile-thumbnail readability
    at ~400 px viewport width. Fix: increase to 20–22px.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 as expected — not pure white.
      Chrome: Title "scatter-ashby-material · javascript · echarts · anyplot.ai" is dark and clearly readable at fontSize=22. Y-axis label "Young's Modulus (GPa)" and X-axis label "Density (kg/m³)" both clearly readable in dark ink at fontSize=16. Tick labels (fontSize=13) readable. Bottom legend (Metals, Ceramics, Polymers, Composites, Elastomers, Natural, Foams) readable at fontSize=14.
      Data: Seven material family hull regions with fill opacity=0.15 and border stroke at 0.55 opacity. First family (Metals) renders in #009E73 (brand green), followed by Ceramics (#C475FD lavender), Polymers (#4467A3 blue), Composites (#BD8233 ochre), Elastomers (#AE3030 matte red), Natural (#2ABCCD cyan), Foams (#954477 rose). Scatter markers (size=12) per family clearly visible with pageBg border. Two dashed diagonal guide lines visible but unlabeled. Log-log axes clearly spanning density 10–25000 kg/m³ and Young's modulus 0.001–1000 GPa.
      Legibility verdict: PASS — all text readable against the light background. Minor: family labels (17px) slightly small for mobile thumbnails; Composites/Polymers labels partially overlap scatter markers.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 as expected — not pure black.
      Chrome: Title clearly visible in light (#F0EFE8) ink. Y-axis and X-axis labels visible in light inkSoft tone. Tick labels and legend text all readable in light colors. No dark-on-dark text failures observed.
      Data: Identical data colors to light render — all 7 Imprint palette hues unchanged. Hull regions, scatter markers, and guide lines all correctly visible against the dark background. Brand green #009E73 for Metals clearly legible.
      Legibility verdict: PASS — all text readable against the dark background; chrome correctly flips to light tones while data colors remain constant.
