review:
  strengths:
  - Sophisticated custom Chart.js plugin implementing convex hull envelopes (Andrew's
    monotone chain algorithm) at pixel-space with scale-aware getPixelForValue — the
    defining visual feature of an Ashby chart, done properly
  - 'Full Imprint palette compliance: Metals first in #009E73, 7 families in canonical
    ordinal order, correct backgrounds in both themes, data colors theme-invariant'
  - 'Complete spec implementation: log-log axes, hull envelopes, pill labels at log-centroids,
    E/ρ guide lines, descriptive axis labels with units'
  - Realistic and accurately-scaled materials science data spanning the correct orders
    of magnitude for each family
  weaknesses:
  - 'Chart.js default chart border visible on all four sides — add scales.x.border.display:
    false and scales.y.border.display: false to remove the box frame and achieve a
    cleaner L-frame or borderless aesthetic consistent with DE-02 Visual Refinement
    expectations'
  - 'pointRadius: 9 is slightly conservative for 81 points on a 3200×1800 canvas —
    increasing to 11–13 would improve readability when scaled to mobile (400 px width)'
  - Four helper functions (logCentroid, guideLineData, convexHull, expandHull) depart
    from flat-script KISS; convex hull logic is unavoidably complex, but guideLineData
    could be inlined
