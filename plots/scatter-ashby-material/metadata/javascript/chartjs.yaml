review:
  strengths:
  - Custom familyLabels Chart.js plugin using afterDatasetsDraw renders text pills
    at log-centroids — a distinctive, library-native technique
  - Guide lines for E/ρ performance index with correct log-log parameterization implement
    the optional spec feature showing material efficiency frontiers
  - Highly accurate material property data (steel, aluminium, ceramics, elastomers,
    foams all within real-world ranges)
  - Semi-transparent markers (53% opacity) and colored borders give good visual depth
    for overlapping clusters
  - Theme-adaptive chrome fully wired through window.ANYPLOT_TOKENS — background,
    text, grid, pill labels all flip correctly between themes
  weaknesses:
  - 'Non-canonical Imprint palette order: Ceramics assigned palette[2] (#4467A3 blue)
    while Polymers gets palette[1] (#C475FD lavender), skipping canonical 1→N order.
    Fix: swap so Ceramics=t.palette[1] and Polymers=t.palette[2].'
  - 'Missing convex-hull or bubble region envelopes: the spec explicitly requires
    colored bubble regions or convex-hull envelopes, not just individual points. Repair:
    compute a simple convex hull of each family''s projected pixel coordinates in
    afterDatasetsDraw and draw a filled semi-transparent polygon (~15-20% opacity)
    behind the points.'
  - Guide lines are visually present but unlabeled — add canvas text annotations (e.g.
    E/ρ = const) near each dashed line using ctx.fillText in the plugin.
  - Family label font hardcoded at 15px in canvas ctx — consider 18–20px for better
    readability at full 3200×1800 resolution.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface
      Chrome: Title "scatter-ashby-material · javascript · chartjs · anyplot.ai" bold dark text, clearly readable. X-axis label "Density (kg/m³)" and Y-axis label "Young's Modulus (GPa)" both readable. Tick labels at 13px visible. Legend with 7 family swatches at top, readable.
      Data: 7 material family clusters — Metals (green #009E73), Ceramics (blue #4467A3), Polymers (lavender #C475FD), Composites (ochre #BD8233), Elastomers (matte red #AE3030), Foams (cyan #2ABCCD), Natural (rose #954477). Semi-transparent circular markers. Text pill labels at centroids. Two dashed E/ρ guide lines in lower-right diagonal.
      Legibility verdict: PASS — all text readable against light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title and axis labels appear in light/cream text, clearly readable. Legend text visible as lighter secondary text. Pill label backgrounds adapt via t.pageBg+D0 (near-black pill, colored text).
      Data: Colors are identical to light render — all 7 Imprint palette hues unchanged between themes. Guide lines visible as low-opacity dashed lines.
      Legibility verdict: PASS — no dark-on-dark failures detected, all text elements legible against dark surface.
