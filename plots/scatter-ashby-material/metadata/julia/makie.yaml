  strengths:
  - 'Perfect spec compliance — all required features implemented correctly: log-log
    scales, ellipse bubble regions, per-family labels, axis labels with units, and
    optional performance index guide lines'
  - 'Sophisticated Makie technique: ellipses defined in log10 space and converted
    to data space so the log-log axis transformation renders them as correct ellipses'
  - Clean code with proper reproducibility (Random.seed!(42)), theme-adaptive chrome
    tokens, and correct output naming (plot-$(THEME).png)
  - Both light and dark renders are fully legible — all chrome correctly adapts between
    themes
  weaknesses:
  - 'Palette position 7 incorrect: implementation uses lime (#99B314) at position
    7, but the canonical Imprint order for position 7 is rose (#954477) and lime is
    position 8 — fix by using colorant"#954477" at index 7 and colorant"#99B314" at
    index 8 (Natural Mat. should be rose)'
  - Family labels placed at ellipse centroids overlap with scatter points in the dense
    upper-right cluster (Ceramics, Metals, Composites) — consider offsetting labels
    slightly above the centroid or using a dedicated legend to separate labels from
    data
  - Bubble region alpha (0.20) is quite subtle and the regions barely distinguish
    themselves visually — increasing to 0.28-0.32 would make family groupings more
    prominent without overwhelming the scatter points
  - 'DE-01/DE-02: Overall design is clean but not highly polished — consider adding
    a bold font for the title, slightly increasing marker size (9→12) for the sparse
    family clusters, and using a slightly more generous alpha on the ellipses to create
    clearer visual separation between families'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Stiffness vs Weight · scatter-ashby-material · julia · makie · anyplot.ai" in dark ink, readable. X-axis label "Density (kg/m³)" and Y-axis label "Young's Modulus (GPa)" with units, both dark and readable. Tick labels in secondary ink (#4A4A44), readable at both log-axis extremes (10^1 to 10^4 on x, 10^-3 to 10^3 on y). Top and right spines removed; subtle grid lines.
      Data: Seven material family groups — Metals (green #009E73), Polymers (lavender #C475FD), Ceramics (blue #4467A3), Composites (ochre #BD8233), Elastomers (matte red #AE3030), Foams (cyan #2ABCCD), Natural Mat. (lime #99B314 at palette position 7 — should be rose #954477). Each family shows a translucent ellipse bubble region (20% alpha) with a matching stroke, scatter points, and a text label at the ellipse centroid. Two dashed performance index guide lines ("E/ρ = c", "E^½/ρ = c") are visible in muted ink. Family labels overlap with scatter points in the dense upper-right cluster (Ceramics, Metals, Composites).
