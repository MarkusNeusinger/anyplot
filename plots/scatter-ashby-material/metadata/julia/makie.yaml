  strengths:
  - Correct Ashby chart with log-log scatter, colored ellipse bubble regions, and
    direct family labels
  - 'All 7 Imprint palette colors applied in canonical order; #009E73 correctly first
    (Metals)'
  - Both themes fully readable — warm off-white light bg (#FAF8F1) and near-black
    dark bg (#1A1A17) with correct chrome inversion
  - Performance index guide lines (E/ρ and E^½/ρ) add genuine engineering context
    and storytelling value
  - 'Perfect spec compliance: log-log axes, bubble regions, family labels, units on
    both axes, optional guide lines'
  - Factually accurate material property ranges (foams at ~0.01 GPa / 63 kg/m³, metals
    at ~126 GPa / 4500 kg/m³)
  - 'Idiomatic Makie usage: poly! with Point2f arrays for ellipse polygons, RGBAf
    typed colors, xscale=log10 as Axis property'
  - Clean KISS structure with a single for-loop over family groups; Random.seed!(42)
    for reproducibility
  weaknesses:
  - Ellipse bubble regions are too faint (fill alpha=0.30) — spec requires clearly
    visible colored regions; increase to 0.45-0.55 and stroke to 0.90
  - Family labels placed at only 0.55× ry above center, causing overlap with scatter
    points in the dense Ceramics/Composites/Metals zone — place labels at 1.15-1.30×
    ry outside the ellipse top
  - Guide line annotation labels fontsize=9 (18px effective) too small to read at
    mobile width — increase to fontsize=11-12
  - Family label fontsize=11 (22px effective) is on the small side for a 3200×1800
    canvas — nudge to 12-13pt for better mobile legibility
