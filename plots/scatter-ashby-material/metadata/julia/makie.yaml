    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Title "Stiffness vs Weight · scatter-ashby-material · julia · makie · anyplot.ai" in dark ink at top, fully visible. "Density (kg/m³)" x-axis label and "Young's Modulus (GPa)" y-axis label both dark and readable. Tick labels in dark secondary ink, all visible. Top and right spines removed; subtle grid at ~12% alpha.
