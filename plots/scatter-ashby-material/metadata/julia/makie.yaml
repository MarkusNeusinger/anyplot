      Data: All data colors are identical to the light render — Metals (green), Polymers (lavender), Ceramics (blue), Composites (ochre), Elastomers (red), Foams (cyan), Natural Mat. (lime). Ellipse regions remain visible at 20% alpha on the dark surface. Performance guide lines visible in muted light ink.
      Legibility verdict: PASS — all text is readable against the dark background. Chrome correctly adapts; no dark-on-dark issues.
