review:
  strengths:
  - Impressive convex hull envelope implementation using monotone chain algorithm
    in log-space — visually accurate and technically sophisticated
  - Performance index guide lines (E/rho = 0.01 / 1 / 100) are an excellent optional
    feature that transforms this from a plain scatter into a true engineering decision
    tool
  - 'Perfect spec compliance: both log axes, convex hull regions, labeled families,
    units on both axes, and optional guide lines all present'
  - Highcharts renderer API (renderer.path, renderer.label, renderer.text) used creatively
    for custom SVG overlays — genuinely distinctive library feature
  - Full Imprint palette compliance across both themes — data colors identical, chrome
    flips correctly, theme-adaptive tokens threaded through all elements
  - High-quality realistic material property data with factually accurate density
    and Young's modulus ranges for all 7 families
  weaknesses:
  - Guide line labels (30 px italic) will be unreadable when the PNG is scaled to
    400 px mobile viewport — guide labels become ~3.7 source-px at that scale; bump
    to 36–40 px or note they are supplementary
  - Composites label_pos is {x:1550, y:220} but the Composites modulus range is only
    15–200 GPa, so the label sits just above the hull and visually bleeds into the
    Ceramics & Glasses region — move label_pos to y ≈ 80–100 GPa (inside the hull)
  - 'Upper-right area is visually crowded: Metals & Alloys, Ceramics & Glasses, and
    Composites hulls and labels all overlap in the same region, making individual
    region boundaries harder to read — consider tightening the expansion factor (currently
    1.03) or adjusting label positions for those three families'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "scatter-ashby-material · python · highcharts · anyplot.ai" bold at 66 px, clearly readable. Subtitle "Ashby chart — 7 material families across the engineering property space" readable at 36 px. Axis labels "Density (kg/m³)" and "Young's Modulus (GPa)" at 56 px — bold and prominent. Tick labels at 44 px clearly readable on both log axes (10 → 10 k on x; 0.0001 → 1 k on y). Legend entries at 44 px all legible. Family-name label boxes (30 px bold) visible for all 7 families. Guide line labels (30 px italic) are small but readable at canvas resolution.
      Data: 7 Imprint palette colors starting with #009E73 for Metals & Alloys (correct canonical order). Each family has distinct scatter points with radius 8, PAGE_BG edge, and a semi-transparent convex hull envelope (alpha 0.18) with dashed colored border. Three E/ρ performance index guide lines in muted ink color clearly visible. Spatial distribution is faithful to real material engineering property space.
      Legibility verdict: PASS — all primary text elements fully readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black.
      Chrome: Title, subtitle, axis labels, tick labels, and legend entries all rendered in light cream (#F0EFE8 / #B8B7B0) — clearly readable against dark surface. Family-name label boxes use ELEVATED_BG #242420 fill with colored borders, text in matching Imprint color — all legible. Guide line labels in INK_MUTED (#A8A79F) — small but visible. No dark-on-dark failures detected anywhere.
