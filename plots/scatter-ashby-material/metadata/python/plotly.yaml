review:
  strengths:
  - Convex-hull family envelopes with semi-transparent fills provide genuine visual
    context for material clusters
  - E/rho = const guide lines are an excellent storytelling element that directly
    communicates the material-selection purpose of the chart
  - Full Imprint palette applied in canonical order with redundant shape encoding
    across all 7 families
  - Rich interactive hover tooltips with computed E/rho performance index leverages
    plotly's distinctive interactivity
  - Physically realistic data with proper log-uniform sampling and intra-family correlations
  - Theme-adaptive chrome is correctly implemented throughout — both light and dark
    renders look polished
  weaknesses:
  - '"Metals" annotation box overlaps the "Material Family" legend header — the annotation
    centroid falls at density ~7400 kg/m3 which is adjacent to the legend box, partially
    obscuring the legend title. Fix: add `if family == "Metals": centroid_d /= 1.8`
    in the per-family centroid adjustment block, or reposition legend to y=0.98, yanchor="top"
    to anchor at top-right instead of bottom-right.'
  - '"Composites" and "Natural Materials" annotation boxes are too close together
    in the mid-chart area, and the Composites annotation overlaps with its own data
    markers. Fix: reduce all annotation fontsize from 14 to 12 to give more breathing
    room.'
  - 'Elastomers convex hull is nearly a vertical sliver because all points are clustered
    in a very narrow density band (~1000-1100 kg/m3). Fix: widen Elastomers density
    range from (900, 1300) to (700, 1500) to produce a proper 2D envelope.'
