  weaknesses:
  - Metals family label is positioned within the dense scatter cluster; label_nudge
    (0.0, -0.22) places it inside the marker cloud — a larger y-nudge or horizontal
    shift toward the envelope edge would improve visibility
  - Marker stroke on dark theme is PAGE_BG (#1A1A17), making the ring highlight invisible
    against the dark background — using INK_SOFT or semi-transparent white would preserve
    separation from light mode
  - Log-scale gridlines on both axes create a somewhat busy crosshatch even at opacity=0.15
    — removing x-axis grid (configure_axisX(grid=False)) would reduce visual clutter
    typical of Ashby charts
