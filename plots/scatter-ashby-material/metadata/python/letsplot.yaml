review:
  strengths:
  - Eigendecomposition-based elliptical envelopes computed in log space — scientifically
    accurate region boundaries that adapt to each family's actual data covariance
  - Performance index guide lines (E/ρ = constant) add genuine engineering analysis
    value, directly supporting the spec's material-selection use case
  - Leader lines elegantly handle displaced labels to avoid crowding in the dense
    upper-right quadrant (Ceramics/Composites/Metals)
  - 'Complete spec compliance: all 7 material families, log-log axes, labeled regions,
    guide lines, and interactive tooltips with full material details'
  - 'Correct Imprint palette with brand green (#009E73) correctly assigned to Metals
    (first factor), full theme-adaptive chrome (#FAF8F1 light / #1A1A17 dark)'
  - Both PNG and HTML output generated; layer_tooltips() provides rich interactive
    material info (density, modulus, family) in the HTML version
  weaknesses:
  - n=7 categorical series with no marker shape redundancy — at the CVD discrimination
    floor (ΔE_CVD ≈ 10.7). The style guide requires marker shapes or direct labels
    at n=7. Direct text labels on envelopes provide partial redundancy, but individual
    geom_point markers all use shape=16 (circle); adding 7 distinct shapes would fully
    address this.
  - 'Semi-transparent envelope fills (alpha=0.22) lose distinctiveness in dark mode
    on the near-black background — the fills become very dark tinted overlays. Consider
    making alpha theme-adaptive: alpha=0.22 for light, alpha=0.30 for dark, or increasing
    dark-mode alpha in the geom_polygon call.'
  - Legend box uses a visible INK_SOFT border (color=INK_SOFT on legend_background
    element_rect), which adds a distracting frame around the legend. The style guide
    recommends removing or making legend box borders very subtle.
  - 'Code comment ''# Alphabetical factor order: Ceramics, Composites, Elastomers,
    Foams, Metals, Natural Materials, Polymers'' is factually incorrect — the rendered
    output shows insertion order (Metals first), matching the families dict order.
    Misleading comment should be corrected or removed.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot.ai surface, not pure white.
      Chrome: Title "scatter-ashby-material · python · letsplot · anyplot.ai" bold at ~60-65% of canvas width, fully readable. Subtitle "Young's Modulus vs Density — Material Selection Landscape" in smaller INK_SOFT text, readable. X-axis label "Density (kg/m³)" and Y-axis label "Young's Modulus (GPa)" clearly visible. Tick labels (log scale: 100, 1,000, 10,000 on x; 0.001, 0.01, 0.1, 1, 10, 100 on y) rendered in INK_SOFT, readable. Legend title "Material Family" and 7 family labels readable on the right.
      Data: 7 material families shown as colored elliptical envelopes (alpha=0.22 fills) + 57 individual scatter points. Colors correctly follow Imprint palette: Metals=#009E73 (brand green), Polymers=#C475FD (lavender), Ceramics=#4467A3 (blue), Composites=#BD8233 (ochre), Elastomers=#AE3030 (red), Foams=#2ABCCD (cyan), Natural Materials=#954477 (rose). Performance index dashed guide lines (E/ρ = 10⁻³, 10⁻², 10⁻¹) at 38° angle with small labels. Bold family name labels with dotted leader lines for displaced labels (Ceramics, Natural Materials, Composites).
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot.ai dark surface, not pure black.
      Chrome: Title, subtitle, axis labels, tick labels, and legend text all rendered in light INK (#F0EFE8 / #B8B7B0) — clearly readable against the dark background. Family labels in bold light text, fully legible. No dark-on-dark failures observed.
      Data: Imprint palette data colors are identical to light render (Metals green, Polymers lavender, Ceramics blue, etc.) — correct, only chrome flips. The elliptical envelopes at alpha=0.22 on dark background produce darker, less visible fills with white/light borders from the polygon stroke, which defines the boundaries effectively. Data points remain fully visible and distinguishable.
      Legibility verdict: PASS — all text is readable against the dark background. The semi-transparent fills are somewhat less colorful in dark mode (alpha=0.22 on near-black yields dark tinted regions) but the white outlines and bold labels fully compensate.
