review:
  strengths:
  - KDE envelopes using sns.kdeplot fill=True are an elegant, seaborn-native solution
    for material family regions -- avoids manual convex-hull patches entirely
  - Performance index guide lines (E/rho=0.01, E/rho=1) with directional annotation
    add genuine engineering storytelling
  - Redundant marker shapes per family applied correctly (required for n=7 per style
    guide)
  - Direct family annotation labels replace legend cleanly, improving readability
  - Full Imprint palette compliance with all 7 families in canonical order; theme-adaptive
    chrome correct in both renders
  - Physically realistic material data values across all 7 families
  weaknesses:
  - Guide-line annotation text (fontsize=6) is very small -- borderline readable at
    mobile widths; increase to fontsize=8
  - Scatter marker size s=60 is slightly small for ~95-point dataset; s=80 would improve
    prominence without causing over-plotting
  - E/rho=100 guide line is computed but never appears in the rendered chart (its
    range lies outside the plotted modulus span); either remove it or adjust mask
    range to make it visible
