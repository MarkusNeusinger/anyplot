review:
  strengths:
  - Convex hull regions implemented correctly via SVG post-processing — adds the spec-required
    bubble regions that pygal cannot do natively
  - E/rho performance index guide lines included with correct slope-1 log-log geometry
    and INK_MUTED styling
  - Full Imprint palette compliance with both themes adapting chrome correctly
  - Family labels with stroke background provide readability in both light and dark
    modes
  - Physically accurate material property data spanning the correct order-of-magnitude
    ranges
  weaknesses:
  - X-axis tick labels are severely truncated in log scale — pygal generates too many
    minor tick marks and they crowd/truncate to '4... 5.6.7.8.91...'; fix by providing
    explicit x_labels at decade values only (e.g., [30, 100, 300, 1000, 3000, 10000])
    so each label has room to display fully
  - Legend entry 'Natural Materials' truncated to 'Natural Materia' — truncate_legend=-1
    does not disable truncation; replace with truncate_legend=20 or a larger positive
    value
  - Some family label positions overlap nearby data markers, particularly in the overlapping
    Polymers/Natural Materials/Composites region; increase offset magnitudes or compute
    a gap away from the nearest hull boundary
  - pygal's JS tooltip interactivity is lost by saving the post-processed SVG string
    to .html — call chart.render_to_file() for the interactive HTML separately before
    SVG post-processing
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "scatter-ashby-material · python · pygal · anyplot.ai" readable. Y-axis label "Young's Modulus (GPa)" readable. X-axis label "Density (kg/m3)" readable. Y-axis ticks (600, 400, 200, 100 ... 0.001) clearly readable. X-axis ticks severely truncated — log-scale density produces "30 40 5060708 0... 2... 3... 4... 5.6.7.8.91..." pattern that is unreadable.
      Data: Seven families in Imprint palette canonical order. First series Metals = #009E73 (brand green). Ceramics #C475FD lavender, Polymers #4467A3 blue, Composites #BD8233 ochre, Elastomers #AE3030 red, Foams #2ABCCD cyan, Natural Materials #954477 rose. Convex hull regions rendered as semi-transparent fills behind scatter markers. E/rho guide lines as dashed diagonal lines.
      Legend: "Natural Materials" truncated to "Natural Materia" at bottom.
      Legibility verdict: PARTIAL FAIL (x-axis tick labels unreadable due to log-scale truncation; legend entry truncated)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and all axis labels switch to light text (#F0EFE8) — readable against dark background. Y-axis ticks readable. X-axis tick truncation persists. No dark-on-dark failures detected. Family labels remain readable with stroke backgrounds.
      Data: Colors identical to light render — all 7 Imprint palette positions unchanged. Hull regions and guide lines clearly visible on dark background.
      Legend: Same "Natural Materials" truncation as light render.
      Legibility verdict: PARTIAL FAIL (x-axis tick labels unreadable; legend entry truncated — same issues as light render)
