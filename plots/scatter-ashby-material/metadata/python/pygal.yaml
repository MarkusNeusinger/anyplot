review:
  strengths:
  - Convex hull regions drawn via SVG post-processing give authentic Ashby-chart family
    envelopes — visually distinct from simple scatter plots
  - E/ρ performance-index guide lines (log-log slope-1 dashed lines) add genuine scientific
    context for material selection decisions
  - 'Imprint palette applied in canonical order with brand green #009E73 correctly
    assigned to Metals (first series)'
  - 'Both themes correctly use #FAF8F1 / #1A1A17 backgrounds with all chrome tokens
    (foreground, foreground_subtle) properly flipped'
  - Logarithmic dual-axis correctly spans 6+ decades on both axes, matching the wide
    property ranges of engineering materials
  - Interactive HTML output with per-point density/modulus tooltips leverages pygal's
    native JS feature
  - Code is flat, reproducible (np.random.seed(42)), and all imports are used
  weaknesses:
  - Family labels injected via SVG post-processing use font-size='28' SVG units —
    at 3200×1800 this is 0.875% of canvas width; at mobile 400 px the labels shrink
    to ~3.5 px and become unreadable. Raise to at least font-size='40' (ideally 44–48)
    to match the scale of other secondary text
  - E/ρ guide-line labels use font-size='22' SVG units — even smaller than family
    labels; unreadable at any scale below 800 px. Raise to at least font-size='32'
  - 'Default pygal four-sided box frame is used; removing top and right spines would
    improve visual refinement. If pygal''s Style does not expose a direct spine toggle,
    set stroke_style={''dash'': [0,0]} on the top/right rule elements or suppress
    via SVG post-processing'
  - The 'Composites' family label offset (80, 70) places the label BELOW and RIGHT
    of its median point — it may overlap nearby Ceramics or Metals hull border; verify
    no collision and consider a cleaner anchor (e.g. above-left offset or leader line)
  - 'With 7 series the style guide requires redundant encoding beyond color (marker
    shapes or direct labels). Direct family labels are present in the SVG, which satisfies
    this — but the legend at bottom also shows color-only swatches. No change needed
    beyond confirming the on-chart labels are legible (see weakness #1)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct; not pure white.
      Chrome: Title "scatter-ashby-material · python · pygal · anyplot.ai" in dark ink at the top, clearly readable. Y-axis label "Young's Modulus (GPa)" and X-axis label "Density (kg/m³)" in dark ink, both readable. Log-scale tick labels on both axes in dark ink — major labels (30, 100, 300, 1000, 3000, 10000 on X; decade intervals on Y) are clearly readable; minor intermediate ticks are present but not labeled (correct). Grid lines are subtle. Bottom legend shows all 7 families with correct color swatches and readable labels.
      Data: Seven material families with Imprint palette in canonical order: Metals (#009E73 brand green, upper-right high density/modulus), Ceramics (#C475FD lavender, upper-right high modulus), Polymers (#4467A3 blue, middle cluster), Composites (#BD8233 ochre, middle-right), Elastomers (#AE3030 red, bottom-middle low modulus), Foams (#2ABCCD cyan, lower-left low density/modulus), Natural Materials (#954477 rose, middle range). Each family has a convex hull polygon (fill opacity 0.14, stroke opacity 0.55) in its family color. In-chart family name labels appear in family colors with PAGE_BG stroke for contrast. Two E/ρ dashed guide lines visible with small italic labels "E/ρ = 0.01" and "E/ρ = 10⁻⁴". First series (Metals) is correctly #009E73.
      Legibility verdict: PASS for primary elements (title, axis labels, tick labels, legend). Family labels (28px SVG) and guide-line labels (22px SVG) are small — readable at full 3200×1800 but marginal at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct; not pure black.
      Chrome: Title, axis labels, and tick labels all render in warm light tone (#F0EFE8 range) against the dark background — clearly readable, no dark-on-dark failures. Legend text at bottom is readable. Grid lines are subtle and appropriate.
      Data: All 7 family colors are identical to the light render — Imprint palette hues are unchanged between themes (only chrome flips). Convex hull fills and strokes retain their family colors. Family name labels remain in their family colors (which are all saturated/bright and read well on dark backgrounds). The in-chart label stroke changes to PAGE_BG (#1A1A17 dark) which provides appropriate contrast on the dark surface. Brand green #009E73 (Metals) is clearly visible on the dark background.
      Legibility verdict: PASS. No dark-on-dark issues found. Data colors are identical to the light render confirming correct theme separation (only chrome flips).
