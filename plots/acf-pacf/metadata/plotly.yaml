  image_description: The plot displays two vertically stacked subplots on a clean
    white background. The top subplot is titled "Autocorrelation (ACF)" and the bottom
    "Partial Autocorrelation (PACF)". The main title reads "acf-pacf · plotly · pyplots.ai"
    centered at the top. Each subplot shows vertical stem lines from zero to correlation
    values at each lag (0–35). Significant lags are highlighted with larger orange
    markers (size ~13) and orange stem lines, while non-significant lags use smaller
    gray markers (size ~10) with gray stems. A light gray shaded band with dashed
    borders marks the 95% confidence interval (approximately ±0.14). A horizontal
    legend at the top-right shows "Significant", "Non-significant", and "95% Confidence".
    The ACF subplot shows strong significance at lags 0 (1.0), 1 (~0.5), 2 (~-0.2),
    and 4 (~-0.15), with geometric decay pattern. The PACF shows sharp cutoff after
    lag 2 (lag 1 ~0.48, lag 2 ~-0.33), consistent with an AR(2) process. X-axis labeled
    "Lag", Y-axes labeled "ACF" and "PACF".
