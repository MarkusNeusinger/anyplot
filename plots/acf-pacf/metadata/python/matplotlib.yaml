review:
  strengths:
  - LineCollection used for efficient multi-segment stem rendering — genuinely idiomatic
    matplotlib for this pattern
  - Significance encoding through both color (#009E73 vs INK_MUTED) and marker size
    creates clear visual hierarchy
  - Arrow annotation for the 12-month seasonal cycle adds real insight beyond decorative
    elements
  - 'Full theme-adaptive chrome: title, axis labels, tick params, legend frame, spines,
    and annotation all use the correct INK/INK_SOFT/ELEVATED_BG tokens — both renders
    are clean'
  - Confidence band using fill_between with low alpha adds polish without visual noise
  - PACF correctly starts from lag 1; ACF includes lag 0 at exactly 1.0 — spec-compliant
    detail
  - savefig uses no bbox_inches='tight' — correct 3200×1800 canvas preserved
  - statsmodels acf/pacf with alpha=0.05 is the right statistical approach
  weaknesses:
  - Annotation text for '12-month seasonal cycle' is at fontsize=8 — borderline readable
    at thumbnail sizes; consider bumping to 9pt
  - PACF subplot has no legend of its own and no contextual annotation, leaving the
    bottom panel slightly bare compared to the annotated ACF panel — a brief text
    note or second annotation would improve symmetry
  - Annotation xytext placement (20, acf_values[12]+0.20) is hardcoded and could overlap
    the legend in edge cases where acf_values[12] is high; a relative offset would
    be more robust
