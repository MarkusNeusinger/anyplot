  strengths:
  - Excellent significant/non-significant visual hierarchy using both color (#009E73
    vs INK_MUTED) and size (thick/thin stems, large/small points) — immediately guides
    the eye to significant autocorrelations
  - 'Full Imprint theme-adaptive chrome: all colors correctly flip between light (#FAF8F1)
    and dark (#1A1A17) backgrounds; no dark-on-dark or light-on-light failures'
  - Correct faceted ACF/PACF layout via facet_wrap with bold strip labels; ACF includes
    lag 0, PACF starts from lag 1 per spec
  - 95% CI shown via both dashed horizontal lines and a subtle geom_ribbon band —
    dual encoding adds clarity
  - Seasonal autocorrelation pattern clearly visible with periodic green spikes at
    lags 12, 24, 36 in ACF panel
  - 'Idiomatic lets-plot grammar with comprehensive theme customization: x-grid removed,
    y-grid only, panel border removed, elevated strip backgrounds'
  - Generates both PNG and HTML output; seed-reproducible synthetic data with realistic
    airline-style seasonality
  weaknesses:
  - 'Confidence band (geom_ribbon fill=INK_SOFT alpha=0.1) is nearly invisible in
    the dark render — INK_SOFT is #B8B7B0 on #1A1A17 background at 10% opacity fades
    almost completely; consider alpha=0.15 or a theme-adaptive fill that remains perceptible
    in dark mode'
  - Y-axis label is 'Correlation' instead of per-panel 'ACF'/'PACF' as specified in
    the spec — compensated by bold facet strip labels but technically diverges from
    spec wording
