review:
  strengths:
  - Correct ACF/PACF stem plot with two stacked facet panels sharing the lag x-axis
  - Effective color encoding of significant vs non-significant lags using brand green
    (#009E73) and muted gray — adds analytical storytelling without annotation
  - All five theme-adaptive chrome tokens correctly applied in both light and dark
    renders — no dark-on-dark failures
  - Seasonal pattern at lag 12 is clearly visible in ACF panel, demonstrating realistic
    airline-style time series data
  - 95% CI dashed lines, lag-0 ACF=1.0, PACF starting from lag 1 — all spec requirements
    met
  - 'Perfect code structure: KISS, seed set, clean imports, correct plot-{THEME}.png
    + HTML output files'
  - Statsmodels ACF/PACF computation is idiomatic and correct for this plot type
  weaknesses:
  - 'Design sophistication (DE-01): plot is a well-configured default — the color-significance
    encoding is a good touch but not enough to elevate beyond 4/8. Consider intentional
    visual hierarchy beyond just color coding: e.g., slightly bolder stem lines for
    significant lags, or a subtle shaded confidence band instead of just dashed lines.'
  - 'Visual refinement (DE-02): all four panel borders are visible on each facet panel
    (default lets-plot facet style). Remove the top and right panel borders by adding
    panel_border=element_blank() or equivalent to give an L-shaped frame consistent
    with the anyplot style guide.'
  - 'Library mastery (LM-02): the implementation uses grammar-of-graphics patterns
    available in any ggplot-style library. A more distinctive lets-plot approach could
    leverage lets-plot''s built-in theme presets or its unique faceting options to
    set it apart from a plotnine equivalent.'
  - Strip text (facet labels) at size=12 is slightly small relative to the panel content
    — increasing to size=14 would make the 'ACF' / 'PACF' panel headers more prominent
    and readable at mobile widths.
  - The y-axis label 'Correlation' is correct but the spec explicitly calls for labeling
    each y-axis as 'ACF' and 'PACF' respectively. The facet strips currently carry
    those labels; individual y-axis labels per panel would satisfy the spec more precisely
    — though this is a minor point since the facet design is standard practice.
