      Data: Significant bars rendered in #009E73 (brand green), non-significant bars in muted grey. Dashed amber (#DDCC77) CI lines visible. Zero baseline in muted grey. Seasonal pattern at lags 12, 24, 36 clearly visible in ACF. "95% CI: ±0.139" amber annotation in top-right corner.
