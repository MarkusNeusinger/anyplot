review:
  strengths:
  - 'Correct Imprint palette: significant bars in #009E73, non-significant in INK_MUTED,
    CI lines in ANYPLOT_AMBER — semantic color roles applied correctly'
  - 'Theme-adaptive chrome works correctly in both renders: warm off-white background
    in light, near-black in dark, all text readable in both'
  - SVG injection technique for CI dashed lines and zero baseline is creative and
    works around pygal's lack of native reference-line API
  - 36-lag ACF/PACF with synthetic airline-style data clearly shows seasonal pattern
    at multiples of lag 12 — data story is visible
  - Interactive HTML export correctly leverages pygal's distinctive interactive SVG
    feature
  weaknesses:
  - Y-axis tick labels are densely packed and overlapping in both ACF and PACF panels
    — the y_labels_major_count=4 setting does not appear to be suppressing minor labels;
    fix by explicitly setting y_labels to 4–5 key values (e.g., acf_chart.y_labels
    = [-0.4, -0.2, 0.0, 0.5, 1.0]) instead of relying on the count setting
  - The spec explicitly states 'Use vertical stem lines (not filled bars)' — while
    pygal has no native stem chart type, narrower bars using bar_spacing or a custom
    width setting would better approximate the stem appearance
  - 'DE-02 refinement is minimal: the default pygal Y-axis horizontal grid guides
    are shown for every minor label which creates a busy grid; limit to 4–5 major
    Y guides to reduce visual noise'
  - 'CQ-01 KISS violation: two helper functions defined (hex_to_rgb, _inject_ci_lines)
    — _inject_ci_lines is necessary but should be inlined or the pattern documented
    as necessary for pygal''s SVG API limitation'
