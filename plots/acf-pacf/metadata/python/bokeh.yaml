  strengths:
  - Complete Imprint palette theme adaptation with semantic color assignments (green=significant,
    gray=non-significant, red=CI threshold, ochre=AR structural lags) — thoughtful
    and professional
  - AR(2) structure clearly identified with highlighted ochre markers and annotation,
    creating a strong data storytelling focal point
  - Linked x_range between ACF and PACF subplots enables synchronized pan/zoom in
    the HTML — a distinctively Bokeh feature
  - Interactive hover tooltips with vline mode provide per-lag inspection in the HTML
    showing lag, value, and significance status
  - Correct 95% CI formula (+/-1.96/sqrt(n)), confidence band with both fill and dashed-line
    boundary
  weaknesses:
  - 'SC-04 (title format): Title is ''acf-pacf · bokeh · anyplot.ai'' — missing the
    required ''python'' language identifier. Fix: change to title="acf-pacf · python
    · bokeh · anyplot.ai" in the p_acf figure constructor.'
  - 'DE-02 (outline frame): Both subplots show a full 4-sided outline_line_color border
    box. Fix: set p.outline_line_color = None in the style loop for a cleaner, less
    boxy appearance.'
  - 'SC-04 (no legend): Color coding for significant vs. non-significant lags is implicit
    with no legend key. Consider adding a small legend indicating green = significant
    / gray = not significant at 95% CI.'
