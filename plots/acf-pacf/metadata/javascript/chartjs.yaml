review:
  strengths:
  - 'Textbook AR(2) dataset demonstrates all key ACF/PACF diagnostic properties: exponential
    decay, PACF cutoff at model order, lag-0 = 1.0, positive and negative correlations'
  - Semantic green/red color coding (Imprint palette) for positive/negative correlations
    is statistically correct and visually clear
  - Mathematically sound Levinson-Durbin PACF computation and biased ACF estimator
    — correct statistical implementation
  - Dual-canvas flex layout cleanly solves Chart.js's lack of native subplot support
  - All theme tokens correctly applied; both light and dark renders pass theme-readability
    checks with no chrome failures
  - Scriptable grid color callback (zero-line highlight via zeroGridColor) is an elegant
    Chart.js-idiomatic touch
  - Fixed LCG seed (seed=42) with Box-Muller transform ensures fully deterministic
    output
  weaknesses:
  - 'ACF x-axis uses maxTicksLimit:16 (even lags: 0, 2, 4…) while PACF shows all 30
    lags — inconsistent tick density between panels makes the shared x-axis harder
    to read as a unified scale; apply same maxTicksLimit to both x-axes'
  - Y-axis renders to approximately ±1.5 in practice (Chart.js padding beyond suggestedMin/Max),
    creating unused vertical space since ACF is all-positive and most PACF values
    cluster within ±0.15 for lags > 2; tighten suggestedMin to ~-0.4 and suggestedMax
    to ~1.1
  - No real-world domain context — data is abstract statistical (AR(2) process) without
    any label indicating what the time series represents
  - 'DE-03: No annotation pointing to the key insight that the PACF cutoff at lag
    2 identifies this as an AR(2) process; a small annotation at lag 2 would elevate
    storytelling'
  image_description: |-
