review:
  strengths:
  - Semantic positive/negative color encoding (brand green for positive, matte red
    for negative) adds analytical value beyond single-color implementation
  - 'AR(2) data choice is pedagogically perfect: demonstrates ACF exponential decay
    and PACF lag-2 cutoff simultaneously'
  - Levinson-Durbin PACF recursion computed from scratch — statistically correct and
    reproducible with fixed-seed LCG
  - Legend correctly filtered to show only the 95% CI entry, reducing visual noise
  - Highlighted zero baseline via zeroGridColor callback is a thoughtful chart.js
    refinement
  - 'Perfect spec compliance: lag 0 in ACF, PACF starts at lag 1, x-axis title on
    bottom panel only'
  weaknesses:
  - Chart borders (top and right spines) visible in both renders — remove by setting
    border display:false on scale configs to lift visual refinement score
  - Duplicate '95% CI' legend blocks appear above each subplot — suppress legend on
    the ACF chart (or use plugins.legend.display:false on one chart) and show only
    one shared legend
  - Bar thickness of 4px makes near-zero PACF bars (~5-6 source px tall) barely visible
    — increase barThickness to 6-8 for low-value visibility
  - Tick font size at 13px CSS fractionally below recommended 14px — bump to 14px
  - X-axis grid lines present on both charts — consider hiding x-axis grid (grid.display:false
    on x) to reduce visual noise and improve data-to-ink ratio
