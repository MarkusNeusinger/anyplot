review:
  strengths:
  - Correct Durbin-Levinson PACF algorithm implemented entirely in browser JS — shows
    statistical depth
  - 'Perfect spec compliance: ACF top panel with lag 0=1.0, PACF bottom panel starting
    at lag 1, 95% CI dashed amber lines with subtle fill'
  - 'Semantically appropriate color choices: brand green #009E73 for ACF, Imprint
    blue #4467A3 for PACF, amber anchor #DDCC77 for confidence bands'
  - Deterministic LCG (seed=42) elegantly solves browser lack of seeded RNG
  - AR(2) data choice creates canonical PACF cutoff pattern at lag 2 — excellent pedagogical
    data that illustrates the diagnostic value of the plot
  weaknesses:
  - Helper functions (lcg, randn, drawPanel) technically diverge from the no-functions
    CQ-01 rule, though pragmatically justified for browser-RNG limitation and DRY
    panel rendering
  - Tick label font size at 13px is 1px below the D3-recommended minimum of 14px;
    minor readability improvement available
  - 'Design Excellence headroom: top/right domain lines remain visible (acceptable
    for stem plots), but no subtitle or annotation to guide the viewer to the AR(2)
    cutoff story'
