review:
  strengths:
  - Correct mathematical implementation of ACF and PACF using the Durbin-Levinson
    recursion with a deterministic LCG RNG — demonstrates real algorithmic depth for
    a JavaScript implementation
  - Proper use of ChartsReferenceLine for 95% CI bounds with well-styled dashed lines
    (strokeDasharray, strokeOpacity) — idiomatic MUI X usage
  - 'Both themes render correctly — brand green #009E73 bars on warm cream (#FAF8F1)
    and near-black (#1A1A17) backgrounds, all text uses t.ink / t.inkSoft tokens for
    adaptive chrome'
  - 'Good data choice: AR(2) process clearly shows exponential ACF decay and PACF
    cutoff after lag 2 — pedagogically illustrative of how ACF/PACF identify model
    order'
  - Legends correctly hidden, skipAnimation set, explicit font sizes on all elements
  weaknesses:
  - '"95% CI" label placed with labelAlign=''end'' on ChartsReferenceLine and only
    30px right margin — label text at ~40-50px native width is very tight against
    the right canvas edge. Increase margin.right from 30 to 60-70px in the ACF panel,
    or use labelAlign=''start'' to place label at left end of reference line.'
  - Fixed y-axis range [-1.0, 1.0] wastes vertical space — ACF values stay above ~0.1
    and PACF values are mostly in [-0.1, 0.75]. Remove the explicit min/max on yAxis
    to let MUI X auto-scale, or use tighter bounds like [-0.35, 1.05] to make data
    bars more prominent.
  - 'categoryGapRatio: 0.82 makes bars too thin — small correlation values (0.01–0.06)
    produce barely-visible marks at higher lags. Reduce to 0.60-0.65 to improve readability
    of small-but-significant values while retaining stem-like spacing.'
  - Title fontsize 19px CSS is below the recommended 22px from muix.md (title ≈ 22
    px). Increase to 22px to better fill the canvas.
  - MUI X default axis frame borders visible around plot area — remove or lighten
    the axis border with slotProps.axisContent or sx overrides for a cleaner, more
    minimal look appropriate for a statistical chart.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), correct anyplot light surface — not pure white
      Chrome: Title "AR(2) Process · acf-pacf · javascript · muix · anyplot.ai" in dark ink, clearly readable at top center. Y-axis labels "ACF" (upper panel) and "PACF" (lower panel) rotated and readable. X-axis label "Lag" on bottom panel readable. Tick labels 0–30 along x-axis are small but legible. "95% CI" label at right edge of upper reference line is very tight against the canvas edge but appears readable.
      Data: Brand green (#009E73) bars dominate for early lags in ACF (lag 0 = 1.0, then exponential decay). PACF shows clear cutoff after lag 2 (~0.70, ~0.07 for lag 1 and 2 respectively). Dashed confidence interval lines (t.inkSoft) visible in both panels. Zero reference line faintly visible. Small-value bars at high lags (lags 10+) are very thin due to 82% gap ratio.
      Legibility verdict: PASS — all text readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correct anyplot dark surface — not pure black
      Chrome: Title in light cream text against dark background, clearly readable. Y-axis labels "ACF" and "PACF" in light ink, readable. X-axis label "Lag" and tick labels in light ink, readable. "95% CI" label at right edge readable. No dark-on-dark text issues — MUI X ThemeProvider correctly adapted all chrome to light text.
      Data: Brand green (#009E73) bars identical to light render — same data pattern (exponential ACF decay, PACF cutoff after lag 2). Dashed CI lines visible against dark background. Data colors perfectly consistent between themes.
      Legibility verdict: PASS — all text readable against the near-black background. Chrome correctly adapted to light-on-dark.
