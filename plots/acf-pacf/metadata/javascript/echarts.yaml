review:
  strengths:
  - Significant vs. insignificant lag opacity coding is an elegant, information-rich
    design choice unique to this implementation
  - AR(2) data is pedagogically optimal — produces both the characteristic PACF cutoff
    and ACF decay pattern, immediately illustrating when ACF/PACF analysis is useful
  - Amber semantic token used correctly for CI bounds (warning/threshold role)
  - Both themes render correctly with full theme-adaptive chrome; no dark-on-dark
    or light-on-light failures
  - Durbin-Levinson PACF recursion and sample ACF computation are mathematically correct
  weaknesses:
  - 'PACF uses t.palette[2] (#4467A3, blue) — canonical Imprint order requires position
    2 (t.palette[1], lavender #C475FD) for the second categorical series; change SIG_PACF
    = t.palette[2] to t.palette[1] and update INSIG_PACF rgba to rgba(196,117,253,0.28)'
  - ACF x-axis has 36 categories (lags 0–35) and PACF has 35 categories (lags 1–35);
    bars don't vertically align between panels — fix by prepending a null entry to
    PACF data so both grids use 36 slots, making lag N line up visually between the
    two panels
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "acf-pacf · javascript · echarts · anyplot.ai" centered in dark ink; subtitle in secondary ink; Y-axis names "ACF"/"PACF" in dark ink; tick labels in secondary ink; X-axis label "Lag" — all clearly readable
      Data: Two stacked panels. ACF panel (top): 36 vertical bars, significant lags in brand green #009E73 (full opacity), insignificant in rgba(0,158,115,0.28). Amber dashed CI at ±0.113; solid near-black zero baseline. Gradual geometric decay pattern visible. PACF panel (bottom): 35 bars (lags 1–35) in blue #4467A3 (significant) and rgba(68,103,163,0.28) (insignificant). Clear spikes at lags 1–2; near-zero beyond.
      Legibility verdict: PASS

