  image_description: The plot displays two vertically stacked panels showing ACF (top)
    and PACF (bottom) for a simulated monthly airline-style passenger time series.
    Blue stem lines (#306998) extend from a zero baseline to each correlation value,
    capped with small blue circles. A light red/pink shaded band marks the 95% confidence
    interval, with red dashed lines (#E74C3C) at the CI boundaries. The ACF panel
    shows a clear sinusoidal decay pattern with period ~12 (seasonal autocorrelation),
    with lag 0 at 1.0. The PACF panel starts from lag 1 and shows significant spikes
    at the first few lags before largely falling within the CI band. Both panels share
    the x-axis labeled "Lag" (0-35), with y-axes labeled "ACF" and "PACF". Subtle
    dashed y-axis gridlines are visible. The title "acf-pacf · altair · pyplots.ai"
    appears at the top left. Overall layout is clean and well-proportioned.
