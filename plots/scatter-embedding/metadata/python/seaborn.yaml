      Background: Warm off-white surface (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "scatter-embedding · seaborn · anyplot.ai" in dark ink, clearly readable. Subtitle "t-SNE (perplexity=30) · 1500 cells · 6 cell types · scRNA-seq simulation" in muted dark ink. Axes labeled "t-SNE 1" and "t-SNE 2" in dark ink. No tick numbers on either axis (correct per spec). Legend "Cell Type" with all 6 labels, light-background box.
