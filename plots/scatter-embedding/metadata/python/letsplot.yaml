review:
  strengths:
  - 'Perfect spec compliance: all required features implemented (color-coded clusters,
    legend, subtitle with algorithm/perplexity, tick-label-free axes)'
  - 'Correct Okabe-Ito palette with brand green #009E73 as first series (T-cell)'
  - 'Full theme-adaptive chrome: backgrounds, ink, soft ink, and legend fill all respond
    correctly to ANYPLOT_THEME'
  - Clean code with reproducible seeds (np.random.seed(42), TSNE random_state=42)
    and no functions/classes
  - Appropriate alpha=0.65 for 1500-point density and realistic single-cell RNA-seq
    domain context
  - Both PNG and HTML output saved correctly
  weaknesses:
  - No explicit panel border removal — letsplot may render a full four-sided box frame
    instead of the preferred L-shaped (bottom+left only) axis frame; add panel_border=element_blank()
    to the theme
  - No centroid annotations — spec explicitly mentions annotating cluster centroids
    with label text (optional but strongly recommended for storytelling)
  - Marker edge color not set — points lack edge definition (edgecolors='white' equivalent)
    which reduces clarity where clusters are dense
  - 'Design sophistication is minimal: no convex hulls, no size variation, no emphasis
    technique beyond color; DE-01 remains close to default'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, correct.
      Chrome: Title "scatter-embedding · letsplot · anyplot.ai" in dark ink (#1A1A17) at top-left, clearly readable. Subtitle "t-SNE (perplexity=30) · Single-cell RNA-seq Cell Type Clusters" in softer ink, readable. Axis labels "t-SNE 1" (x) and "t-SNE 2" (y) visible. No tick labels or tick marks (per spec). Legend "Cell Type" on right side with elevated background and dark-ink labels listing all six cell types.
      Data: Six well-separated clusters spread across the canvas. Colors: T-cell (#009E73 brand green), Monocyte (#D55E00 vermillion), NK-cell (#0072B2 blue), Dendritic (#CC79A7 pink), Neutrophil (#E69F00 orange), B-cell (#56B4E9 sky blue). Points at alpha=0.65 show density within clusters. No grid lines visible.
      Legibility verdict: PASS — all text readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black consistent with #1A1A17 — not pure black, correct.
      Chrome: Title and subtitle rendered in light/off-white ink, clearly readable against the dark background. Axis labels "t-SNE 1" and "t-SNE 2" in light ink, readable. Legend shows elevated-dark background (#242420) with light-ink text — all cell type labels clearly visible. No dark-on-dark failures detected.
      Data: Cluster colors are identical to the light render (Okabe-Ito positions 1–6 unchanged) — only chrome elements have flipped. Cluster separation and marker visibility are maintained on the dark surface.
      Legibility verdict: PASS — all text readable against the near-black background; no dark-on-dark failures.
