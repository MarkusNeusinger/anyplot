review:
  strengths:
  - Interactive legend-bound selection (alt.selection_point) allows clicking a cell
    type to highlight its cluster — a distinctive Altair feature used idiomatically
  - Real sklearn t-SNE dimensionality reduction on synthetic high-dimensional data
    — not fake/random 2D blobs, actual non-linear embedding
  - Bioinformatics single-cell RNA-seq context with specific domain-appropriate cell
    type labels (T cells, B cells, NK cells, etc.)
  - Centroid number annotations (1–7) positioned with dy offset provide orientation
    without cluttering the scatter
  - 'Perfect spec compliance: tick labels disabled, subtitle with algorithm and parameters,
    Okabe-Ito palette in correct order, theme-adaptive chrome throughout'
  - Interactive zoom/pan + tooltips with formatted t-SNE coordinates reinforce Altair's
    interactive strengths
  - Background stroke on circles (alt.value(PAGE_BG)) provides edge separation on
    overlapping points without explicit edge color
  weaknesses:
  - 'Marker size (100) and opacity (0.70) are above the density guidelines for 700
    points (guidelines: size 20-50, alpha 0.3-0.5 for 300+ points) — within each cluster
    points overlap noticeably; reduce size to ~50-60 and opacity to ~0.55 for better
    within-cluster density handling'
  - Both X and Y grid lines are shown; for scatter plots a Y-only grid (or no grid)
    reduces visual noise and gives a cleaner feel
  - Axis domain lines (spines) are still visible via domainColor=INK_SOFT — removing
    them with domain=False would produce a cleaner look aligned with the style guide's
    'L-shaped or no-spine' recommendation
  - Centroid annotations use plain numbers (1–7) that require cross-referencing with
    the legend to identify cluster names; labeling directly with abbreviated cell
    type names (e.g., 'T', 'B', 'NK') would be more immediately readable
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "scatter-embedding · altair · anyplot.ai" in dark ink, clearly readable. Subtitle "t-SNE (perplexity=30) · 20-dimensional synthetic scRNA-seq · 7 cell types, 700 cells" in muted ink, readable. Axis labels "t-SNE Dimension 1" and "t-SNE Dimension 2" in dark ink, clearly readable. No tick labels shown (correct per spec). Subtle 10%-opacity grid on both axes. Legend box with elevated (#FFFDF6) fill, all seven cell type labels readable.
      Data: Seven well-separated clusters colored in Okabe-Ito order — T cells (#009E73 teal-green, upper right), B cells (#D55E00 vermillion-orange, far left), NK cells (#0072B2 blue, top center), Monocytes (#CC79A7 pink, lower center-left), Dendritic cells (#E69F00 amber-gold, bottom right), Macrophages (#56B4E9 sky-blue, center), Plasma cells (#F0E442 yellow, bottom center). Numbered centroid annotations 1–7 in dark ink positioned above each cluster centroid. Circles have thin background-colored stroke for visual separation.
      Legibility verdict: PASS — all chrome elements clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and subtitle in light ink (#F0EFE8), clearly readable against dark background. Axis labels in light ink, readable. No tick labels. Grid lines faint (light ink at 10% opacity). Legend box with elevated (#242420) fill, labels in muted light ink (#B8B7B0), readable. No dark-on-dark failures detected.
      Data: Same seven clusters with identical Okabe-Ito data colors as the light render — T cells green, B cells orange, NK cells blue, Monocytes pink, Dendritic cells amber, Macrophages sky-blue, Plasma cells yellow. Data colors correctly unchanged between themes. Centroid numbers rendered in light ink (#F0EFE8) against the dark background, readable.
      Legibility verdict: PASS — all chrome elements correctly adapt to the dark surface; no dark-on-dark issues observed.
