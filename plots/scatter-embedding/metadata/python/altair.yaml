  - 'Perfect theme-adaptive chrome: all chrome tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT) correctly threaded through configure_axis, configure_legend, configure_view,
    and TitleParams'
  - 'Correct Okabe-Ito palette with explicit domain mapping ensuring Cluster 1 = #009E73'
  - Centroid annotations with bold cluster numbers add spatial navigation without
    cluttering
  - No tick labels on embedding axes is the right call — dimensionless coordinates
    should not have tick values
  - 'Fully reproducible: triple-seeded (numpy seed, make_blobs random_state, TSNE
    random_state)'
  - Subtitle 't-SNE (perplexity=30) · 20-dimensional synthetic data · 7 clusters,
    700 points' is exactly what the spec requested
  weaknesses:
  - 'Full rectangular view border present: configure_view(stroke=INK_SOFT) draws a
    box around the entire plot — change to strokeWidth=0 or stroke=''transparent''
    to match the style guide''s L-shaped / no-frame preference'
  - Generic 'Cluster 1–7' labels reduce DQ-02; replace with domain-specific cell-type
    names (e.g., T cells, B cells, NK cells, Monocytes, Dendritic cells, Macrophages,
    Plasma cells) for a real-world single-cell RNA-seq scenario
  - LM-02 limited by generic scatter usage — add altair point selection (alt.selection_point
    with condition encoding) to enable interactive cluster highlighting, a feature
    unique to altair's grammar
