  image_description: The plot displays a Mohr's Circle for stress analysis on a square
    3600x3600 canvas. A blue circle (#306998) is centered at approximately (25, 0)
    with radius ~68 MPa, representing the stress transformation. The horizontal axis
    is labeled "Normal Stress σ (MPa)" and the vertical axis "Shear Stress τ (MPa)".
    Two red diamond markers indicate principal stresses σ₁ ≈ 93.0 MPa (right) and
    σ₂ ≈ -43.0 MPa (left) on the horizontal axis. Two orange triangle markers show
    τ_max ≈ 68.0 MPa at the top and bottom of the circle. Blue circular markers denote
    Point A (80, 40) and Point B (-30, -40) with a dashed gray diameter line connecting
    them. A red arc near the center shows the angle 2θp = 36.0°. Gray reference lines
    (solid horizontal at y=0, dashed vertical at x=center) provide orientation. The
    grid is very subtle (alpha 0.2). An annotation at the bottom shows "Center = (25.0,
    0) | R = 68.0 MPa". The title reads "Mohr's Circle for Stress Analysis · mohr-circle
    · bokeh · pyplots.ai". The circle appears as a true circle due to equal aspect
    ratio.
