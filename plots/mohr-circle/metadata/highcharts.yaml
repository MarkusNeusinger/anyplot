  image_description: The plot displays a Mohr's Circle for a 2D stress state (σx=80
    MPa, σy=−30 MPa, τxy=40 MPa) rendered as a Highcharts line/scatter chart. The
    circle is drawn in Python Blue (#306998) centered at approximately (25, 0) with
    a radius of ~68 MPa. Two red circular markers label stress points A (80, 40) and
    B (−30, −40) connected by a gray dashed diameter line. Green diamond markers on
    the horizontal axis mark the principal stresses σ₁ = 93.0 MPa (right) and σ₂ =
    −43.0 MPa (left). Purple triangle markers indicate τmax = 68.0 MPa (top, upward
    triangle) and τmin = −68.0 MPa (bottom, downward triangle). A small dark circle
    marks the center C (25.0, 0). An orange arc from the center shows the angle 2θp
    = 36.0°. Light dashed gray reference lines pass through the center both horizontally
    and vertically. The grid is very subtle. The x-axis is labeled "Normal Stress
    σ (MPa)" ranging from −150 to 200, and the y-axis "Shear Stress τ (MPa)" from
    −95 to 95. The title reads "mohr-circle · highcharts · pyplots.ai" with a subtitle
    showing the input stress state. The white background is clean, and the circle
    appears as a true circle thanks to equal aspect ratio handling.
