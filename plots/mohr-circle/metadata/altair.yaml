  image_description: 'The plot displays a Mohr''s Circle for 2D stress analysis on
    a light gray (#FAFBFC) background. A dark blue circle (#306998) is drawn with
    center at C(20, 0) and radius ~67.1 MPa. The horizontal axis is labeled "Normal
    Stress σ (MPa)" ranging from about -80 to 120, and the vertical axis is labeled
    "Shear Stress τ (MPa)" ranging from -100 to 100. The title reads "mohr-circle
    · altair · pyplots.ai" in bold dark text (28pt) with a subtitle "2D Stress Transformation
    — σx=80, σy=−40, τxy=30 MPa" in gray. Six key points are marked with filled circles
    and white stroke: stress state points A(80, 30) and B(-40, -30) in blue, principal
    stress points σ₁=87.1 MPa and σ₂=-47.1 MPa in red on the horizontal axis, and
    maximum shear points τmax=67.1 MPa and −τmax=−67.1 MPa in orange at the top and
    bottom. A dashed diameter line connects A to B. An orange arc shows the 2θp=26.6°
    angle near the center. The center point C(20, 0) is marked in gray. A color-coded
    legend in the bottom-right distinguishes Stress State (blue), Principal (red),
    and Max Shear (orange). The grid is very subtle (opacity 0.12), reference lines
    pass through the center, and the view frame is removed. The circle appears as
    a true circle with equal aspect ratio.'
