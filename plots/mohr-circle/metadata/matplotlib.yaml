    the center. Green (#2E8B57) markers indicate principal stresses σ₁ = 87.1 MPa
    (right intersection with x-axis) and σ₂ = -47.1 MPa (left intersection), plus
    τ_max = 67.1 MPa (top) and −τ_max = −67.1 MPa (bottom). A blue arc near the center
    shows the principal angle 2θp = 26.6°. The center is marked with a blue + as C
    (20, 0). A horizontal reference line at y=0 and a vertical dashed reference line
    at x=center are visible. The grid is very subtle, top and right spines are removed,
    and equal aspect ratio makes the circle appear as a true circle. Title reads "mohr-circle
    · matplotlib · pyplots.ai".
