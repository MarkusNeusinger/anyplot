  strengths:
  - Perfect spec compliance - all eight specification requirements implemented correctly
    with accurate math
  - Strong design with intentional five-color coding system and distinct marker shapes
    for each element category
  - Excellent data choice - stress values create a circle spanning both positive and
    negative normal stress regions
  - Professional annotation system with color-matched arrows and clear labels including
    computed values
  weaknesses:
  - Library mastery is the main gap - seaborn is used minimally (styling + one scatterplot),
    with most work done through matplotlib
  - Red-green color pair between stress states and principal stresses is suboptimal
    for colorblind accessibility
  - Minor annotation crowding in the upper-right quadrant where three labels converge
  image_description: The plot displays a Mohr's Circle for stress analysis on a square
    canvas with a light grid background. A large dark blue circle (#306998) with a
    very faint blue fill is centered at (20, 0) on the Normal Stress σ vs. Shear Stress
    τ plane. Two red circular markers represent stress states A (80, 30) and B (-40,
    -30), connected by a red dashed diameter line. Two cyan diamond markers show principal
    stresses σ₁ = 87.1 MPa and σ₂ = -47.1 MPa on the horizontal axis. Two orange square
    markers indicate maximum shear stress τmax = 67.1 MPa at the top and bottom of
    the circle. A small purple arc near the center annotates the principal angle 2θp
    = 26.6°. A dark blue center point is labeled C (20, 0). All annotations use colored
    arrows matching their respective element types. A legend in the lower left lists
    all five element categories. Top and right spines are removed, the grid is subtle
    (alpha=0.2), and the aspect ratio is equal so the circle appears as a true circle.
    Axis labels read "Normal Stress σ (MPa)" and "Shear Stress τ (MPa)" with the title
    "mohr-circle · seaborn · pyplots.ai" at the top.
