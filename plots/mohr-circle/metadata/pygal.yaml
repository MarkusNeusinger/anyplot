  image_description: The plot displays a Mohr's Circle for stress analysis on a clean
    white background. The title "mohr-circle · pygal · pyplots.ai" is centered at
    the top in dark text. The x-axis is labeled "Normal Stress σ (MPa)" and the y-axis
    "Shear Stress τ (MPa)", both with tick values showing units (e.g., "80 MPa").
    The circle is rendered in steel blue, centered at approximately σ=25 MPa, spanning
    from about -43 to 93 MPa on the horizontal axis. Two light gray dashed reference
    lines cross through the center (one horizontal along the σ-axis, one vertical
    at the center). Two orange dots connected by a dashed orange line represent stress
    points A(80, 40) and B(-30, -40). Two dark indigo dots on the horizontal axis
    mark the principal stresses σ₁=93.0 and σ₂=-43.0 MPa. Two teal dots at the top
    and bottom of the circle mark τ_max = ±68.0 MPa. A small coral/pink arc near the
    center shows the 2θp = 36.0° angle, though it is quite small and faint. The legend
    at the bottom lists all 7 series with descriptive labels including computed values.
    Overall, the layout is clean and professional with good use of the canvas area.
