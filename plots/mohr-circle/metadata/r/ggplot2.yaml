review:
  strengths:
  - 'Perfect spec compliance: circle, principal stresses (σ1/σ2), max shear (τmax),
    stress points A and B, arc showing 2θp, equal aspect ratio, and reference lines
    all correctly implemented'
  - 'Intentional color-role assignments: brand green for the primary circle and principal
    stress markers, blue for point A, matte red for point B, ochre for max shear —
    semantic choices beyond ordinal ordering'
  - Correct square 2400×2400 canvas with coord_fixed(ratio=1) ensuring the circle
    renders as a true circle
  - 'Full theme-adaptive chrome: both renders pass readability checks — warm off-white
    background in light, near-black in dark, all text colors flip correctly'
  - Clean, procedural code with no functions/classes, deterministic data, and appropriate
    use of ragg device
  weaknesses:
  - Annotation text labels (size=3.3 ggplot2 units, ~9.4pt) are at the lower end of
    mobile readability — increase to size=3.8 for the primary labels (A, B, σ1, σ2,
    τmax) and size=3.3 for the secondary arc label
  - τmax triangle marker and its label sit very close to the top panel border — the
    coord_fixed ratio + current margin leaves almost no breathing room above the circle;
    expand top plot margin from 20pt to 35pt or slightly widen the y expansion
  - 'DE-01: Design sophistication is functional but not yet polished — consider a
    subtle filled circle as the center marker rather than a cross (+), add a thin
    white edge stroke to the colored markers for definition, and slightly reduce the
    panel border linewidth to 0.25 for a lighter frame'
  - 'DE-02: Panel border keeps all 4 spines which is appropriate for this diagram,
    but the grid lines could be even more subtle (alpha=0.08 instead of 0.12) and
    the major/minor grid sizing could be differentiated more clearly'
  - 'DE-03: Visual hierarchy is good but could be strengthened — consider making the
    diameter line (A-to-B segment) slightly more prominent (linewidth=0.8) to reinforce
    the relationship between stress points, and give the center crosshair marker a
    slightly larger size=3.5'
