review:
  strengths:
  - 'Mathematically correct Mohr''s circle: center at ((σx+σy)/2, 0) = (50,0) and
    radius = 50 MPa, verified by visual inspection.'
  - 'Full spec compliance: all required elements present including 2θp arc, reference
    lines, equal aspect ratio via coord_fixed.'
  - Both renders (light/dark) clean and fully legible; theme tokens correctly applied
    throughout (backgrounds, ink colors, grid alpha).
  - 'Semantically meaningful color mapping: brand green for the main construction,
    matte red for the critical threshold (Max Shear), aiding engineering interpretation.'
  - Deterministic, reproducible code with clean flat structure; idiomatic plotnine
    grammar-of-graphics layering with heterogeneous DataFrames per geom.
  weaknesses:
  - Annotation geom_text at size=3.0–3.2 mm is at the low end of the recommended range
    (2.5–4 mm); at 400px mobile display the labels scale to ~8px which is borderline
    — consider size=3.5–4.0 for value labels.
  - Palette positions 2, 3, 5 used for point categories (skips position 4 ochre);
    the semantic red choice for Max Shear is defensible but mildly non-canonical.
  - 'Design storytelling is functional but not elevated: no visual emphasis on the
    principal stress axis region to guide the viewer to the engineering insight.'
