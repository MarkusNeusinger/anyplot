    and/or increase stroke width to 12.'
  - 'Design refinement ceiling: pygal''s limited style API prevents spine removal
    and fine grid opacity control; consider adding direct text value labels to the
    key data points (σ₁, σ₂, τ_max) using the chart''s `value_font_size` and tooltip
