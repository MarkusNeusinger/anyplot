      Data: Main Mohr's Circle in brand green #009E73 (6px stroke), visually dominant. Stress points A (80, 40) and B (-30, -40) as filled red circles. Principal stresses σ₁ = 93.0 MPa and σ₂ = -43.0 MPa as blue diamonds on the horizontal axis. τmax = 68.0 MPa (top) and τmin = -68.0 MPa (bottom) as lavender triangles. Center C (25.0, 0) as small black dot. Dashed diameter line (gray) connecting A to B. Ochre angle arc for 2θp = 36.0°. All annotation labels colored to match their respective data series, with text outlines for readability.
