  image_description: 'The plot displays a bifurcation diagram of the logistic map
    showing the classic period-doubling route to chaos. The x-axis is labeled "Growth
    Rate (r)" spanning 2.50 to 4.00, and the y-axis is "Steady-State Population (x)"
    spanning 0.0 to 1.0. Points are rendered in a muted blue (#306998) with alpha
    transparency on a minimal white background with very subtle gray grid lines. The
    diagram clearly shows: a single stable fixed point from r=2.5 to ~3.0, a period-2
    bifurcation at r≈3.0, subsequent period-doubling cascades, and the onset of chaos
    around r≈3.57 with visible windows of periodicity within the chaotic regime. The
    title reads "bifurcation-basic · plotnine · pyplots.ai" in bold at the top. No
    annotations mark the key bifurcation points.'
