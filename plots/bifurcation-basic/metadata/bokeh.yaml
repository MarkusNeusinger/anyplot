    labels mark key bifurcation points: "r ≈ 3.0", "r ≈ 3.449", and "r ≈ 3.57 (chaos)".
    The background is light gray (#FAFAFA) with subtle grid lines (alpha=0.15). Axis
    lines and tick marks are removed for a clean look. Windows of periodicity within
    the chaotic regime are visible near r≈3.83.'
