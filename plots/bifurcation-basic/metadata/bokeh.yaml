  image_description: 'The plot displays a bifurcation diagram of the logistic map
    with "Growth Rate (r)" on the x-axis ranging from 2.5 to 4.0 and "Steady-State
    Population (x)" on the y-axis from 0 to 1. The title reads "bifurcation-basic
    · bokeh · pyplots.ai" in dark gray at the top. Blue (#306998) scatter points with
    very low alpha (0.12) create a density-based visualization showing the classic
    period-doubling cascade: a single stable branch from r=2.5 to ~3.0, period-2 splitting
