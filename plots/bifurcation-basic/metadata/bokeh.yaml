  - Dual output (PNG + HTML) leverages Bokeh web-native nature
  weaknesses:
  - Chaotic region (r > 3.57) too faint and sparse - the most visually striking part
    of a bifurcation diagram is nearly invisible
  - Chaos annotation placed at y=0.10 disconnected from actual chaos onset region
  - No HoverTool for HTML version - missed opportunity for Bokeh signature interactivity
  - Insufficient point density (n_r=2000) combined with very low alpha (0.12) makes
    chaotic bands imperceptible
  image_description: 'The plot displays a bifurcation diagram of the logistic map
    with the title "bifurcation-basic · bokeh · pyplots.ai" at the top in dark gray.
    The x-axis is labeled "Growth Rate (r)" ranging from 2.5 to 4.0, and the y-axis
    is "Steady-State Population (x)" ranging from 0 to 1. Data points are rendered
    in a muted blue (#306998) with very low alpha (0.12). The stable fixed-point branch
    is visible from r=2.5 to ~3.0 as a thin line, followed by period-doubling splits.
    Three red annotations mark key bifurcation points: "r ≈ 3.0", "r ≈ 3.449", and
    "r ≈ 3.57 (chaos)". The background is light gray (#FAFAFA) with very subtle grid
    lines. Axis lines and ticks are removed for a clean look. However, the chaotic
    region (r > 3.57) appears extremely sparse and faint — the characteristic dense
    fill of the chaotic band is barely visible, making the diagram look incomplete
    in its most important region.'
