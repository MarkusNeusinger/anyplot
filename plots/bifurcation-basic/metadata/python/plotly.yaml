review:
  strengths:
  - Correct, canonical bifurcation diagram of the logistic map — ~200K density points
    (2000 r-values × 100 post-transient iterations) rendered with size=2, opacity=0.13
    via Scattergl/WebGL, exactly the small-point low-alpha density visualization the
    spec calls for.
  - Full period-doubling cascade (period-1 → 2 → 4 → 8 → chaos) is clearly visible
    and explicitly labeled at r≈3.0, 3.449, 3.544 and the chaos onset 3.5699 with
    dotted reference lines, matching the spec's labeling requirement.
  - 'Excellent theme adaptation: data green (#009E73) identical across both renders,
    chrome (background #FAF8F1/#1A1A17, ink tokens, grid) flips correctly; all titles/labels/ticks
    readable in both themes.'
  - Thoughtful design touches — subtle shaded vrect marking the chaotic regime creates
    a focal point, staggered two-row callout placement attempts to resolve crowding
    in the tightly-packed onset region.
  - Clean, KISS, deterministic (fixed x0=0.5, no RNG needed), correct canvas (3200×1800),
    saves both PNG and interactive HTML; idiomatic plotly graph_objects with Scattergl,
    add_vrect, add_vline, and hovertemplate.
  weaknesses:
  - The three rightmost callout boxes (Period-4 at r=3.449, Period-8 raised at r=3.544,
    Chaos onset at r=3.5699) are crowded in the narrow onset region; Period-8 and
    Chaos onset boxes sit very close and nearly touch. Text stays readable but the
    cluster is tight — consider widening vertical stagger, smaller box padding, or
    anchoring Chaos-onset further right so the three boxes have clearer separation
    at 400px mobile width.
  - 'Minor: the Period-8 callout ''r ≈ 3.544'' box partially overlaps horizontally
    with the Chaos-onset box''s column; relying on the y-stagger alone leaves the
    cluster looking dense. A leader-line + offset label, or merging Period-8/Chaos-onset
    annotations, would reduce visual congestion.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure white. Confirmed.
      Chrome: title "bifurcation-basic · python · plotly · anyplot.ai" centered at top, fully visible (not clipped). X label "Growth Rate (r)" and Y label "Steady-State Population (x)" in dark ink; tick labels (2.5–4.0 on x, 0–1 on y) in soft gray. Four callout boxes (Period-2, Period-4, Period-8, Chaos onset) with light box fill, dark border, dark text. All readable.
      Data: single green (#009E73) bifurcation cloud; period-doubling fork clearly visible, dense chaotic band on the right with a faint shaded rect marking the chaos regime. Dotted vertical reference lines at each labeled bifurcation point.
      Legibility verdict: PASS (minor crowding of the three right-side callouts, but no unreadable text).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), no pure black. Confirmed.
