review:
  strengths:
  - Correct logistic-map bifurcation diagram with the full period-doubling cascade
    from a stable fixed point through period-2/4/8 into the chaotic fan (r spans 2.5-4.0).
  - 'Density-aware rendering: ~1,000,000 points (5000 r-values × 200 post-transient
    states) with tiny markers (s=0.5), low alpha, and rasterized=True, plus larger
    markers on the sparse stable branch.'
  - Regime storytelling via Imprint colors — Stable=#009E73 (brand, first series),
    Period-Doubling=#4467A3 (blue), Chaos=#AE3030 (matte-red semantic anchor) — a
    justified semantic mapping.
  - Distinctive seaborn JointGrid with a per-regime marginal KDE on the y-axis that
    reveals the steady-state density structure alongside the cascade.
  - 'Clean theme-adaptive chrome: warm off-white (#FAF8F1) / near-black (#1A1A17)
    backgrounds, theme tokens threaded through title/labels/ticks/legend; data colors
    identical across both renders.'
  - Exact 3200x1800 canvas; deterministic (fixed x0=0.5, no RNG); KISS linear script
    with only used imports; correct title format and proxy-marker legend.
  weaknesses:
  - 'Annotation overlap (both renders): the ''Period-2 / r ≈ 3.0'' label (anchored
    x≈3.05, left-aligned) collides with the ''Period-4 / r ≈ 3.449'' label (anchored
    x≈3.289, right-aligned), producing garbled text that reads ''Period-Period-4''
    and ''r ≈ 3.0≈ 3.449''. Fix: give the three bifurcation labels non-overlapping
    x positions (e.g. stagger their y-heights, or place Period-2 to the left of its
    line and Period-4/Period-8 further right) so no two annotation boxes intersect.'
  - The chaotic-regime classification (r ≥ 3.57 → red) also colors the periodic windows
    inside chaos (e.g. the period-3 window near r≈3.83) as 'Chaos', which is a minor
    semantic simplification — acceptable, but worth noting.
  - Marginal KDE for the Chaos regime is a broad fill that slightly competes visually
    with the Stable green spike on the right margin; consider lowering marginal fill
    alpha further for cleaner separation.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) on both the joint axes and the y-marginal panel. Not pure white.
