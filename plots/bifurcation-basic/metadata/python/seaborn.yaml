review:
  strengths:
  - 'Faithful logistic-map bifurcation diagram: 5000 r-values × 200 post-transient
    samples (~1M points) spanning r=2.5–4.0, capturing the full period-doubling cascade
    into chaos exactly as the spec requires'
  - Density-aware marker strategy — larger opaque markers on the sparse stable branch,
    sub-pixel low-alpha markers on the dense chaotic fan — combats overplotting cleanly
  - 'Semantic three-regime coloring (Stable→brand green #009E73, Period-Doubling→blue,
    Chaos→matte-red) tells the route-to-chaos story and is justified as an Imprint
    semantic-exception mapping'
  - Distinctive seaborn JointGrid with a per-regime marginal KDE on the y-axis adds
    real density insight rather than decoration
  - Key bifurcation points (Period-2 r≈3.0, Period-4 r≈3.449, Period-8 r≈3.544) annotated
    with dashed rules and non-overlapping labels
  - 'Both light and dark renders are fully theme-correct: warm backgrounds, identical
    data colors, all chrome readable; canvas exactly 3200×1800'
  - Clean, flat, deterministic script (no RNG, fixed x0=0.5); all imports used; custom
    legend uses readable marker proxies since the real markers are sub-pixel
  weaknesses:
  - Marginal y-axis KDE is quite narrow (ratio=8) and the green stable hump protrudes
    slightly past the marginal panel; could be tightened or the marginal clip refined
    for a cleaner edge
  - Tick labels at 8pt are on the smaller side for mobile (~400px) scaling — readable
    at full res but the lower bound of comfortable
  - Period-4 (r≈3.449) and Period-8 (r≈3.544) annotation labels sit fairly close in
    the upper band; they do not overlap but the horizontal breathing room between
    them is tight
