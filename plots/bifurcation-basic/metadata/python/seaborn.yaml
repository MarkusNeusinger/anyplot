      Data: stable branch in brand green #009E73, period-doubling tree in blue #4467A3, chaotic fan in matte-red #AE3030. Marginal y-KDE shows green + red density humps. First series is #009E73 — correct.
      DEFECT: the Period-2 and Period-4 annotations near r=3.0–3.45 overlap, rendering garbled "Period-Period-4" and "r ≈ 3.0≈ 3.449".
      Legibility verdict: PASS for chrome/data; FAIL for the two overlapping bifurcation annotations.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) on joint and marginal panels. Not pure black.
      Chrome: title, axis labels light (#F0EFE8), tick labels soft light — all clearly readable, no dark-on-dark. Legend on #242420 elevated fill with light text — readable. Brand green visible and vivid on the dark surface.
      Data: identical colors to the light render (green stable, blue cascade, red chaos); only chrome flipped. Marginal KDE matches.
      DEFECT: same annotation overlap ("Period-Period-4" / "r ≈ 3.0≈ 3.449") present.
      Legibility verdict: PASS for chrome/data; FAIL for the two overlapping bifurcation annotations.
