    shorten legend label strings, or reduce legend_font_size to ~28.'
  - Design excellence is moderate — the chart is a well-configured library output
    but lacks the visual polish to push past 4/8 for aesthetic sophistication. Reducing
    spine/border visibility in pygal (if possible) or adding subtle refinement would
    help.
  - The CQ-01 KISS score is slightly reduced due to the moderate complexity of the
    region-based sampling + downsampling logic, though this is partly justified by
    the visualization type.
