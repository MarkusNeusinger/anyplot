    it matters most
  - 'Perfect spec compliance: bifurcation point labels, Feigenbaum annotation, transient
    discard, parameter range all correct'
  - 'Theme-adaptive chrome fully correct: all non-data elements flip correctly between
    light and dark renders'
  - sampling_pick() is the appropriate letsplot tool for large datasets and shows
    library mastery
  weaknesses:
  - Period-4, Period-8, and Chaos labels cluster tightly around r=3.45-3.57; nudge
    x-offsets wider so labels have more breathing room from the chaotic scatter
  - x-axis major grid uses solid INK colour rather than the style-guide-recommended
    semi-transparent rgba(26,26,23,0.15); should use INK_SOFT with alpha or rgba token
  - Feigenbaum annotation (size=3.5mm, italic) is quite small in the bottom-right
    corner; increase to size=4.5 for better mobile readability
  - No y-axis major grid (panel_grid_major_y=element_blank()); faint horizontal grid
    lines would help readers estimate y-values in the chaotic band
