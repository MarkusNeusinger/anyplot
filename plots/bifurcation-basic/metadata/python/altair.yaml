    move ''Period 8'' y-position from 0.55 to 0.35-0.40 for cleaner visual separation'
  - Inner view height=275 is below the recommended 320 in the altair library guide;
    a slightly taller data area would improve proportions without risking canvas gate
    failure
  - 'Design excellence headroom: standard Altair marks without additional typographic
    hierarchy or focal-point emphasis to elevate beyond competent execution — consider
    a subtle callout annotation at the first period-doubling branch'
