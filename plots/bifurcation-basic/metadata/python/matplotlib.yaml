review:
  strengths:
  - Density-based 2D histogram rendering (pcolormesh + PowerNorm gamma=0.40) reveals
    periodic windows within the chaotic band far better than a raw small-point scatter
    — a sophisticated, idiomatic choice
  - 'Full period-doubling cascade is clearly legible: period-1 fixed point, period-2/4/8
    splits, and the route into chaos with embedded periodic windows'
  - Strong data storytelling — 'Stable / Periodic / Chaotic' regime labels along the
    bottom plus Period-2/4/8 bifurcation callouts and an 'Onset of chaos r ≈ 3.57'
    arrow guide the viewer through the narrative
  - 'Theme-adaptive chrome is flawless: warm off-white #FAF8F1 (light) and warm near-black
    #1A1A17 (dark) backgrounds, with all text, spines, dashed bifurcation lines, and
    annotation boxes flipping correctly while the green→blue Imprint density colors
    stay identical'
  - Clean, KISS flat script with deterministic seed-free logistic map (x0=0.5), correct
    3200x1800 canvas, top/right spines removed, all imports used
  weaknesses:
  - The three bifurcation callout boxes (Period-2/4/8) are horizontally offset well
    to the left of their dashed reference lines, so the visual link between a label
    and its r-value is weaker than ideal — consider anchoring each box nearer its
    vline or adding a short leader to the line
  - Annotation/regime-label text is fixed at fontsize 9 on the 3200px-wide canvas;
    readable at full size but on the smaller side when the gallery thumbnail is scaled
    to ~400px — a point or two larger would improve mobile legibility
  - Density colormap maps high-density branches to blue and the diffuse chaotic spray
    to green; this is correct but slightly counterintuitive (chaos visually 'brighter'
    green than the stable trunk) — acceptable, just noting the perceptual tradeoff
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct — not pure white, not dark.
