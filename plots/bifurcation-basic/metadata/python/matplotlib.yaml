      Data: bifurcation diagram rendered as a density heatmap, green (#009E73, low density) → blue (#4467A3, high density) Imprint sequential gradient. Stable trunk reads blue/teal, chaotic spray reads green. First-series brand anchor green present.
      Legibility verdict: PASS — no light-on-light, all text crisp.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct — not pure black, not light.
      Chrome: title and axis/tick labels rendered in light ink (#F0EFE8 / soft), all clearly readable against the dark surface — NO dark-on-dark failures. Dashed bifurcation lines visible in lighter grey. Annotation boxes flip to dark elevated fill (#242420) with light borders and light text, fully legible. Regime labels readable in muted light italic.
      Data: identical green→blue Imprint density gradient as the light render — only the chrome (background, text, spines, box fills, line colors) flipped. Brand green #009E73 visible on the dark surface as required.
      Legibility verdict: PASS — no dark-on-dark, both renders theme-correct.
