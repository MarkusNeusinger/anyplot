  image_description: 'The plot displays a bifurcation diagram of the logistic map
    with "Growth Rate (r)" on the x-axis (2.5-4.0) and "Steady-State Population (x)"
    on the y-axis (0-1.0). The title reads "bifurcation-basic · altair · pyplots.ai"
    with subtitle "Logistic map period-doubling cascade from stability to chaos".
    Three color-coded regimes are shown: Stable (blue), Period-doubling (gold/amber),
    and Chaotic (red/pink). Small semi-transparent circles create a density-based
    visualization. The stable region shows a single fixed-point line rising from ~0.6
    at r=2.5. The period-doubling cascade is clearly visible with branches splitting
    at r≈3.0 (two), r≈3.45 (four), r≈3.54 (eight), before entering chaos at r≈3.57.
    Vertical dashed gray lines mark bifurcation points with rotated 270° labels. A
    styled legend with white background and rounded corners sits in the top-right.
    The chaotic region fills the right portion with faint red/pink points showing
    characteristic structure including periodicity windows. Grid lines are subtle
    dashed lines at low opacity. View borders are removed.'
