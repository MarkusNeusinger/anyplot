review:
  strengths:
  - 'Correct logistic-map bifurcation diagram: full period-doubling cascade (period-1
    -> 2 -> 4 -> 8 -> chaos) clearly visible from r=2.5 to 4.0'
  - 'Density-based rendering done right: markerSize=1 with low-alpha brand green #009E73
    (alpha 0.55) creates an authentic attractor-cloud look that thickens into chaos'
  - 'Strong data storytelling: amber dashed reference lines plus staggered ''period-2/4/8/chaos''
    annotations with analytic r-values (3.0, 3.449, 3.544, 3.5699) guide the viewer
    through the route to chaos'
  - 'Idiomatic MUI X composition: ChartContainer + ScatterPlot + ChartsXAxis/ChartsYAxis,
    with the useDrawingArea hook used to overlay custom SVG reference lines in exact
    data coordinates'
  - Title format exact ('bifurcation-basic · javascript · muix · anyplot.ai'); axis
    labels descriptive with variables ('Growth rate r', 'Steady-state population x');
    legend correctly hidden for single series
  - 'Both themes render correctly: warm cream #FAF8F1 / warm near-black #1A1A17 backgrounds,
    theme-adaptive chrome, identical green data colour across both'
  - Fully deterministic data (no RNG) and clean canvas at exact 3200x1800
  weaknesses:
  - 'Point density is below the spec''s ''100,000+'' target: 720 r-steps x 45 recorded
    states = ~32,400 points. The chaotic band shows mild vertical sparseness/banding
    in places. Raising RECORD (e.g. 45 -> 120) would enrich the density texture without
    changing layout.'
  - Y-axis ticks are dense (every 0.05, ~21 labels); slightly busy though still readable.
    Reducing to ~10-11 ticks (step 0.1) would calm the left margin.
  - In the dark render the 'r ≈ 3.5699' (chaos) sublabel sits very close to the period-8
    dashed reference line; not overlapping but a touch crowded in the r=3.45-3.57
    cluster.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (not pure white) — correct.
      Chrome: dark title bar text "bifurcation-basic · javascript · muix · anyplot.ai" (centered, ~22px), dark x-axis label "Growth rate r", rotated y-axis label "Steady-state population x", and dark grey numeric ticks (x: 2.50–4.00 step 0.05; y: 0.00–1.00 step 0.05). Annotation labels period-2/4/8/chaos in soft ink with grey r≈ sublabels. All readable against the light background. PASS.
