  strengths:
  - 'Perfect spec compliance: all six required features (point size, alpha, parameter
    range, logistic map, transient discard, bifurcation labels) are correctly implemented.'
  - Excellent canvas+SVG hybrid architecture — the right tool for 150,000 density
    points in D3.
  - Fully deterministic data generation (logistic map is mathematically exact, fixed
    initial condition x=0.5).
  - 'Correct Imprint palette usage: brand green #009E73 as the first (and only) series
    via t.palette[0].'
  - Both renders theme-adapt flawlessly via ANYPLOT_TOKENS — no dark-on-dark or light-on-light
    failures.
  - Canvas clipping prevents data points from bleeding into the margin area.
  weaknesses:
  - 'DE-01/DE-03: No period-regime callout labels in the chart body (''Period 1'',
    ''Period 2'', ''Chaos'') — would guide first-time readers through the diagram''s
    structure.'
  - 'DE-02: Axis domain lines (spine stroke) could be lowered to ~0.4 opacity to soften
    the chart frame and improve visual refinement.'
  - 'LM-02: Misses advanced D3-specific techniques such as d3.contourDensity() overlay
    for the chaotic region, or a color gradient along the x-axis to signal the transition
    from order to chaos.'
