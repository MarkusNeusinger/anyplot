review:
  strengths:
  - Textbook logistic-map bifurcation diagram — the full period-doubling cascade (period-1
    → 2 → 4 → 8 → chaos) is crisply resolved with ~150k deterministic points at symbolSize
    1.1 and opacity 0.34, exactly the density-based rendering the spec calls for.
  - 'Idiomatic ECharts performance handling: scatter with `large: true` / `largeThreshold:
    2000` to render the 150k-point cloud efficiently, plus `markLine` dashed annotations
    labelling the key bifurcation thresholds (period-2, period-4, period-8, chaos).'
  - 'First series is brand green #009E73 from the Imprint palette; chrome flips correctly
    between light (#FAF8F1) and dark (#1A1A17) while data color stays identical.'
  - Exact required title format, descriptive axis labels with variable names ('Growth
    rate  r', 'Long-term state  x'), fully deterministic data (no RNG, transient of
    300 discarded, 100 kept).
  - 'Refined chrome: x-axis vertical grid suppressed, subtle y-only splitLine, axis
    ticks hidden, generous margins — clean publication-ready look.'
  weaknesses:
  - The three rightmost markLine labels (period-4 at r=3.449, period-8 at r=3.544,
    chaos at r=3.5699) sit very close together near the chaos onset; rotated and small
    (fontSize 13) they read as slightly crowded and would be hard to parse when the
    chart is scaled to ~400px mobile width. Consider staggering label `position` or
    nudging the thresholds' label offsets for breathing room.
  - markLine labels at fontSize 13 are the smallest text on the chart; legible at
    full 3200px but borderline at mobile scale — a slightly larger size or selective
    labelling would harden legibility.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), not pure white.
      Chrome: title "bifurcation-basic · javascript · echarts · anyplot.ai" in dark bold ink, centered and fully readable. Axis names "Growth rate  r" (bottom) and "Long-term state  x" (left, rotated) clear. Tick labels (2.5–4.0 on x, 0–1 on y) in soft ink, readable. Four dashed vertical markLines with rotated labels period-2 / period-4 / period-8 / chaos.
      Data: single brand-green (#009E73) dense point cloud forming the classic logistic-map bifurcation tree — single fixed point to ~r=3, splitting into period-2, period-4, then the chaotic fan with embedded periodic windows. First series confirmed #009E73.
      Legibility verdict: PASS — all chrome readable; the three rightmost markLine labels are slightly crowded but not overlapping.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black.
      Chrome: title in light ink (#F0EFE8), fully readable. Axis names and tick labels in soft light ink, clearly visible — no dark-on-dark failure. markLine dashed lines and labels visible in soft ink.
      Data: identical brand-green (#009E73) point cloud, same geometry and density as the light render — only chrome flipped. Green reads well on the dark surface.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark issues.
