review:
  strengths:
  - 'Perfect spec compliance: all required features implemented — 16-QAM ideal points,
    received symbols, dashed decision boundaries, EVM annotation, and equal aspect
    ratio via symmetric grid margins (1000×1000 CSS plot area)'
  - 'Semantically appropriate color assignment: green (#009E73) for received symbols
    follows Imprint palette order; matte red (#AE3030) for ideal points follows telecom
    domain convention and the spec''s explicit suggestion, qualifying as a valid semantic
    exception'
  - 'Idiomatic ECharts usage: markLine on the scatter series for decision boundaries
    is a clean, library-native approach; graphic overlay component for EVM annotation
    is the correct ECharts pattern for absolute-positioned text'
  - 'Excellent data quality: realistic 16-QAM noise model using Box-Muller Gaussian
    via a fixed-seed LCG, with EVM calculated from actual error power — ~5.0% EVM
    is physically realistic for a ~20 dB SNR link'
  - 'Both themes pass theme-readability: background, text, grid, and legend colors
    all flip correctly while data colors remain identical across light and dark renders'
  - Square orientation selected correctly for a constellation diagram, satisfying
    the spec's equal-aspect-ratio requirement
  weaknesses:
  - 'CQ-01 minor: Two helper functions (mkRng, gaussian) technically break the KISS
    flat-script rule; while justified by JS''s lack of a seeded RNG, a single inline
    LCG closure could replace both and make the data generation portion flat'
  - 'LM-02 moderate: markLine and graphic are used correctly but more distinctive
    ECharts features could demonstrate deeper library mastery — e.g., using a custom
    SVG path symbol (cross/plus) for the ideal points instead of the built-in rect
    would both match the spec suggestion and showcase ECharts'' path-symbol capability'
  - 'DE-01 moderate: The design is clean and domain-appropriate but does not reach
    ''clearly above defaults'' level — edge-highlighting on the received-symbol dots
    (thin ink-colored stroke) would improve definition at the cluster boundaries,
    and using cross/plus instead of square for ideal points would be more conventional
    in the engineering domain'
  - 'DE-02 minor: Axis spines (axisLine) are still fully visible; removing or thinning
    the top/right axis lines where possible would add polish without losing the axis
    reference needed for this plot type'
