review:
  strengths:
  - 'Near-perfect spec compliance: all required features present — 16-QAM ideal points,
    received symbol clusters, dashed decision boundaries, EVM annotation, equal aspect
    ratio, and correct axis labels'
  - Deterministic data generation with fixed-seed LCG (seed=42195) and Box-Muller
    transform produces reproducible constellation noise
  - Excellent use of Highcharts SVG renderer API (chart.renderer.label()) for the
    styled EVM annotation box — idiomatic and precise placement
  - Semi-transparent received symbols (palette[0] + '66', radius 3) correctly convey
    cluster density without overwhelming the ideal point markers
  - 'Strong visual hierarchy: large red diamond markers (radius 11) immediately catch
    the eye as ideal reference points, then secondary attention goes to the green
    symbol clouds'
  weaknesses:
  - 'DE-02: The chart retains the default Highcharts axis border lines at full weight
    (lineColor: t.inkSoft); softening these to match the dashed decision boundaries
    or removing top/right equivalents would improve visual refinement'
  - 'VQ-03: Received symbol marker radius (3) causes the tight clusters (NOISE_STD=0.12)
    to appear as near-solid blobs rather than showing cloud structure; increasing
    to radius 4–5 would preserve the semi-transparent effect while revealing more
    scatter detail'
  - 'DE-01: The chart uses the Highcharts default frame/border around the plot area;
    setting plotBorderWidth: 0 and relying on axis lines creates a cleaner look —
    this is already in the code but the chart border is still visible'
  - 'VQ-01 minor: EVM annotation text is 13px, slightly below the 14px minimum guideline;
    raise to 14px for consistency with other secondary text elements'
