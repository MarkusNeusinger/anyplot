review:
  strengths:
  - Custom squareAspect plugin (afterLayout hook) elegantly enforces equal aspect
    ratio for accurate I/Q geometry — a Chart.js-native solution
  - 'All spec requirements met: 16-QAM constellation, cross-style ideal points, semi-transparent
    received symbols, dashed decision boundaries at ±2/0, EVM annotation, symmetric
    axis limits ±4.5, correct axis labels'
  - 'Correct Imprint palette: palette[0] (#009E73) for received symbols, semantic
    matte-red #AE3030 for ideal reference points — with cross/circle shape redundancy
    ensuring CVD safety'
  - Deterministic LCG (seed 42) replaces Math.random() for full reproducibility in
    the headless render harness
  - Three custom inline plugins (bgFill, squareAspect, evmLabel) using Chart.js lifecycle
    hooks demonstrate strong library mastery
  - Legend filter removes decision-boundary line datasets from the legend — clean
    UX detail
  - 'Both renders fully theme-correct: warm off-white light / near-black dark backgrounds,
    all chrome (text, grid, EVM label) adapts to theme tokens'
  weaknesses:
  - Received symbol alpha at 50% ('80' hex suffix) is slightly more transparent than
    optimal for ~50 points per cluster (style guide recommends 0.7–0.9 for 30–100
    point density); consider 'B3' (70%) hex suffix for better individual-point visibility
    within clusters
  - Aesthetic sophistication is above-default but not at editorial quality level —
    the chart reads as a well-engineered technical plot rather than a publication-ready
    visualization; consider adding subtle radial or depth emphasis to differentiate
    inner vs outer constellation points
  - 'Grid density is moderately high: 9 regular grid lines + 3 dashed decision boundaries
    per axis = 12 visual lines each axis; the regular chart grid could be suppressed
    (grid: { display: false }) in favour of only the dashed decision boundaries to
    reduce visual noise'
