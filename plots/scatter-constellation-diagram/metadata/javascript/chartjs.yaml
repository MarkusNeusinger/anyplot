review:
  strengths:
  - 'Complete spec compliance: all required features present (16-QAM constellation,
    ideal points as red crosses, received symbols as semi-transparent green dots,
    dashed decision boundaries at ±2/0, EVM annotation, equal-aspect square format,
    correct axis labels).'
  - 'Excellent use of Chart.js plugin API: background-fill plugin ensures proper theme-adaptive
    pageBg on every render; canvas-API EVM annotation plugin draws the quantitative
    insight directly on the plot.'
  - Deterministic data generation via fixed-seed LCG — correct solution for a browser
    environment where Math.random() cannot be seeded.
  - 'Semantic color choice: #009E73 (Imprint brand green) for received symbols (primary
    data), #AE3030 (Imprint matte-red anchor) for ideal reference points — matches
    standard signal-processing convention for constellation diagrams.'
  - Legend filter cleanly hides boundary-line datasets so only meaningful series appear
    in the legend.
  - 'Perfect code quality: flat KISS structure, reproducible seed, no over-engineering.'
  weaknesses:
  - 'Equal aspect ratio only approximated via square canvas (2400×2400). Chart.js
    does not enforce a 1:1 inner chartArea ratio; the Y-axis labels and legend consume
    different horizontal vs. vertical space, potentially skewing the constellation
    geometry. Fix: add a custom afterLayout/afterResize plugin that reads chart.chartArea
    and reduces whichever dimension is larger so the data viewport is forced to a
    square (e.g., `if (w > h) { chartArea.left += (w-h)/2; chartArea.right -= (w-h)/2;
    }`).'
  - 'All 4 axis borders visible (Chart.js defaults). Remove them with `border: { display:
    false }` inside each scale definition for cleaner visual refinement and higher
    DE-02.'
  - 'DE-01 limited by reliance on Chart.js defaults for the overall visual frame.
    Consider adding a thin ink-colored stroke (`borderColor: t.inkSoft`, `borderWidth:
    0.5`) to the received-symbol markers to improve definition in the dark render
    where the semi-transparent green dots can appear low-contrast against the near-black
    background.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "scatter-constellation-diagram · javascript · chartjs · anyplot.ai" in dark ink, spanning ~75% of plot width, clearly readable. Axis titles "In-Phase (I)" (x) and "Quadrature (Q)" (y) in dark ink, readable. Tick labels (-4.5 to 4.5 in steps of 1) in muted dark ink, readable. Legend at top shows "Received Symbols" (green circle) and "Ideal Points (16-QAM)" (red cross), both clearly visible. EVM annotation "EVM = 8.9%" in bold dark ink at top-right of chart area.
      Data: 800 received symbols as semi-transparent teal-green (#009E73 at ~50% opacity) circular dots, clustered in 16 distinct groups around the 4×4 QAM grid positions. 16 ideal points as large red cross markers (#AE3030) clearly visible at the center of each cluster. Dashed decision boundaries at x/y = -2, 0, +2 in muted ink, clearly visible. Subtle regular grid lines in theme grid color.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface.
      Chrome: Title visible in light ink against dark background. Axis titles and tick labels are rendered in light/muted colors, all readable. Legend visible at top. EVM annotation "EVM = 8.9%" readable in upper-right corner. No dark-on-dark failure observed.
      Data: Received symbol colors are identical to the light render (#009E73 teal-green at ~50% opacity). The green dots are well-visible against the dark background. Red cross markers (#AE3030) slightly lower contrast against dark background but still clearly identifiable within the clusters. Dashed decision boundaries visible in muted light color.
      Legibility verdict: PASS — all text elements are readable against the dark background; no dark-on-dark failures detected. Brand green #009E73 is clearly visible on the dark surface.
