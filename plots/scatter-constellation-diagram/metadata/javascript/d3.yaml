review:
  strengths:
  - 'Exemplary spec compliance: every required feature present — ideal X crosses,
    semi-transparent received dots, dashed decision boundaries at correct ±2/0 positions,
    equal aspect ratio, EVM annotation computed from actual data'
  - 'Excellent semantic color application: matte red #AE3030 for ideal reference points
    matches the spec''s call for red crosses and the semantic role of the Imprint
    palette''s position-5 anchor'
  - Perfect reproducibility via Park-Miller LCG (seed 42) — no seeded Math.random
    needed; a robust browser-side pattern
  - Square canvas (2400×2400) with exactly equal inner dimensions (iw=ih=1020 CSS
    px) ensures mathematically correct equal aspect ratio for the constellation geometry
  - Dynamic EVM calculation from the actual generated noise — the displayed 5.2% is
    accurate to the data, not hard-coded
  weaknesses:
  - Cross markers use forEach + append instead of a D3 data-join (.selectAll().data(idealPoints).join('g'))
    — slightly non-idiomatic for D3
  - Axis labels at 18px bold create a slightly compressed visual hierarchy vs. the
    22px title (only 4px gap); could drop to 16px or reduce weight to regular for
    a cleaner separation
  - No d3.symbolCross usage for ideal points — the d3-shape module provides a built-in
    cross symbol that would be more idiomatic and easier to maintain than manual line
    pairs
