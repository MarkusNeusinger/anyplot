review:
  strengths:
  - Seeded LCG RNG achieves full determinism without Date.now() or Math.random(),
    satisfying the browser RNG constraint cleanly
  - useDrawingArea hook for custom SVG overlays is the correct MUI X composability
    pattern — demonstrates strong library understanding
  - 'Semantic color choice: matte red (#AE3030 via t.palette[4]) for ideal points
    aligns with both the spec explicit guidance and the Imprint semantic exception
    rule'
  - Square orientation is appropriate for the symmetric I/Q constellation
  - EVM calculation is mathematically correct and the annotation directly communicates
    the key diagnostic metric
  - All 16 constellation points on the canonical ±1, ±3 normalized 16-QAM grid; 992
    received symbols within spec range
  weaknesses:
  - Margin asymmetry (left:80, right:36 vs top:72, bottom:72) produces a ~1084x1056
    CSS px plot area — not square — violating the spec equal-aspect-ratio requirement;
    fix by setting symmetric margins (e.g., left:72, right:72 or left:64, right:64)
  - Received symbol markers at markerSize=4 are small for 992 points; consider markerSize=5-6
    to improve cloud legibility at mobile widths
  - Default MUI X axis appearance visible (axis border on all sides); removing top
    and right axis spines via sx would improve visual refinement
