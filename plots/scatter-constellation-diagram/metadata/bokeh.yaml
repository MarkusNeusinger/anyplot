  image_description: The plot displays a 16-QAM constellation diagram on a light gray
    (#FAFAFA) background. Sixteen clusters of semi-transparent blue dots (received
    symbols, alpha ~0.35) are arranged in a 4×4 grid pattern centered at I/Q coordinates
    ±1 and ±3. Red cross markers indicate the 16 ideal constellation points at the
    center of each cluster. Three vertical and three horizontal dashed gray lines
    at -2, 0, and 2 serve as decision boundaries separating the symbol regions. The
    title reads "scatter-constellation-diagram · bokeh · pyplots.ai" in the top-left.
    The x-axis is labeled "In-Phase (I)" and the y-axis "Quadrature (Q)". An EVM annotation
    "EVM = 7.4%" appears in bold in the lower-right area. The default bokeh grid is
    hidden and the outline is removed. The plot uses equal aspect ratio with symmetric
    axis limits of ±4.8.
