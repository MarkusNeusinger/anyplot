review:
  strengths:
  - Imprint sequential colormap (green→blue) used correctly for continuous error-magnitude
    data — adds a meaningful third dimension to the scatter without violating palette
    rules
  - Semantic red (#AE3030) for ideal 16-QAM reference points is the correct use of
    the matte-red anchor; cross markers plus color gives redundant encoding
  - match_aspect=True enforces the equal-aspect-ratio requirement; square 2400×2400
    canvas is the right format for this symmetric constellation geometry
  - Span elements for dashed decision boundaries are Bokeh-native and replace the
    grid cleanly — the right approach for a constellation diagram
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all flip correctly
    between light and dark; no dark-on-dark failures visible'
  - LinearColorMapper + transform() pattern is idiomatic and distinctive Bokeh usage;
    HoverTool adds real interactivity to the HTML artifact
  - SNR-based noise model (20 dB) and 1000 received symbols are exactly within the
    spec's 500-2000 range; EVM computed correctly from received vs ideal vectors
  - np.random.seed(42) ensures reproducibility; KISS script structure with no functions
    or classes
  weaknesses:
  - Legend label_text_font_size is 28pt, below the 34pt standard for a 2400×2400 canvas
    — legend appears slightly small in both renders; raise to 34pt
  - No ColorBar widget to explain the green→blue error-magnitude scale — viewers see
    the gradient but cannot read quantitative error values off the color axis; add
    a ColorBar positioned to the right of the plot
  - Received symbol size=18 is just below the recommended ≥20 for 1000-point datasets;
    alpha=0.55 is slightly above the ≤0.50 upper bound — together they cause mild
    overplotting in the dense inner clusters; reduce to size=16 and alpha=0.45
  - EVM annotation at 32pt is below the 34pt tick-label standard; increase to 34pt
    for visual consistency with the rest of the chrome
