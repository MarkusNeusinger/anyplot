review:
  strengths:
  - Correct 16-QAM constellation diagram with 1000 received symbols using SNR-based
    physics-accurate noise model
  - Excellent use of imprint_seq (green→blue LinearColorMapper) for continuous error-magnitude
    encoding — adds a third dimension without cluttering the scatter
  - Semantic use of matte red (#AE3030) for ideal constellation points follows Imprint
    palette role conventions perfectly
  - 'All required spec features present: dashed decision boundaries, EVM annotation,
    equal aspect ratio (match_aspect=True), symmetric axis limits ±4.5'
  - 'Full theme-adaptive chrome: INK/INK_SOFT tokens applied to all text, legend,
    grid, and axis elements — both renders are readable'
  - 'Idiomatic Bokeh: ColumnDataSource + transform() + LinearColorMapper pattern,
    explicit Span elements for boundaries, HoverTool for interactive HTML'
  - 'Perfect code quality: KISS structure, np.random.seed(42), all imports used, Selenium
    screenshot with documented WIN_H compensation'
  weaknesses:
  - Legend placed at top_left overlaps the top-left constellation cluster (I≈-3, Q≈3)
    — approximately 10–15 received symbol markers are partially hidden behind the
    legend box. Move legend to location='bottom_right' or 'top_right' to clear all
    16 data clusters.
  - 'DE-01 below publication-ready: color gradient and semantic red are sophisticated
    choices, but overall visual polish is ''well-configured default'' level. Consider:
    add subtle region fills or alpha shading per symbol quadrant, or refine legend/annotation
    typography to reach FiveThirtyEight quality.'
  - 'LM-02 moderate: Bokeh-specific features used (transform, Span, HoverTool) but
    no feature that couldn''t be replicated in plotly with minor changes. Consider
    leveraging Bokeh''s unique model-callback architecture or JS customHover for the
    HTML export to be more distinctively Bokeh.'
  - 'VQ-05 minor: legend placement (top_left overlapping data) slightly disrupts layout
    balance — relocating legend would also fix this.'
