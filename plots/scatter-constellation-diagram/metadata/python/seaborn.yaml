review:
  strengths:
  - Per-quadrant KDE density contours clipped to decision boundaries — sophisticated
    use of sns.kdeplot(clip=) that reveals cluster shape without bleed across regions
  - 'Full spec compliance: ideal X markers, received scatter, dashed decision boundaries,
    EVM annotation, equal aspect ratio, symmetric axes all present'
  - Theme-adaptive chrome correctly applied throughout — backgrounds, text, grid,
    legend, annotation box all switch cleanly between light and dark
  - No bbox_inches='tight' on savefig — correct square canvas 2400×2400 produced via
    figsize=(6,6) dpi=400
  - Vectorized quadrant labeling and iteration with strict=True zip shows clean, idiomatic
    Python
  - 'Imprint palette first 4 positions used in canonical order with Q1 correctly assigned
    #009E73'
  weaknesses:
  - Legend placed at upper-left (loc='upper left') overlaps with Q2 (−I, +Q) scatter
    clusters at (-3,3) and (-3,1), obscuring data behind the opaque legend box — consider
    placing legend at lower-right or a corner not occupied by constellation points
  - KDE contours in neighboring-quadrant boundary zones show minor artifacts/elongation
    near the decision boundary crossings despite clip parameter — visual quality impact
    is minor but noticeable at decision boundary intersections
  - Ideal marker edge color is PAGE_BG (cream/near-black) which makes the X markers
    blend slightly with the background rather than using a contrasting ring — a white
    edge on light and a dark edge on dark would add cleaner definition
