review:
  strengths:
  - Excellent use of geom_density2d showing symbol clustering — a distinctive lets-plot
    technique that adds real analytical insight beyond a simple scatter
  - Clever alternating checkerboard decision-region pattern using geom_rect + scale_fill_identity()
    — technically elegant and visually informative
  - 'Full spec compliance: equal aspect ratio via coord_fixed(), correct 16-QAM 4x4
    grid geometry, dashed decision boundaries, EVM annotation'
  - Imprint palette positions 1 (#009E73) and 4 (#BD8233 ochre) chosen for good colorblind
    contrast between received symbols and ideal markers
  - 'Perfect code quality: seed for reproducibility, correct ggsave API, clean linear
    flow, no unnecessary abstractions'
  weaknesses:
  - Title renders small (font size ~10pt by formula) at the 2400×2400 square canvas
    — barely acceptable but slightly cramped for the long mandated title
  - 'Decision-region checkerboard is nearly invisible in dark mode (alternating fills
    #222220 / #1E1E1B have very low contrast on the near-black surface)'
  - No legend distinguishing received symbols vs ideal markers — first-time viewers
    unfamiliar with constellation diagrams may not know which is which without axis
    context
