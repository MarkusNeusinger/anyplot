review:
  strengths:
  - 'Excellent semantic color use: brand green (#009E73) for received symbols (first
    series rule honored) and matte red (#AE3030) for ideal reference points — a textbook
    semantic-exception application'
  - Checkerboard decision-region shading clearly demarcates all 16 symbol regions
    without overwhelming the data — subtle alternating fill is a clever, effective
    design choice
  - Error vector segments connecting ideal to received points go beyond spec and directly
    illustrate the EVM concept — strong data storytelling
  - 'Full spec compliance: decision boundaries (dashed), EVM annotation, SNR annotation,
    equal aspect ratio (coord_fixed), correct axis labels with parenthetical units'
  - Guide legend override with matching shapes (circle vs. X) and sizes ensures the
    legend accurately represents what appears on the plot
  - 'Theme-adaptive chrome fully wired: backgrounds, text, legend, borders all use
    INK/INK_SOFT/ELEVATED_BG tokens — both renders pass readability check'
  - Redundant shape encoding (circle for received, X for ideal) alongside color makes
    the two series distinguishable without relying on hue alone — CVD-robust
  weaknesses:
  - Title font size (9pt) is more conservative than optimal for a 2400×2400 canvas
    — for a 62-char title the formula gives ~13pt; 9pt causes mild mobile-readability
    risk when the PNG is displayed at ~400px viewport width
  - EVM/SNR annotations at (4.2, -3.7) and (4.2, -4.15) are positioned in a relatively
    sparse region but are in close proximity to the bottom-right constellation cluster
    (centered at (3,-3)) — minor symbol overlap possible; consider shifting annotations
    to a dedicated corner box or increasing their x-position
  - SNR annotation text size (3.8mm ≈ 10.8pt source pixels) is on the small side;
    at 400px mobile width this renders at ~1.8pt — consider increasing to 4.5mm to
    match the EVM line
