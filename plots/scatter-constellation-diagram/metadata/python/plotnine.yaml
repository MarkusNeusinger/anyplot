      Data: 1000 received symbols in brand green (#009E73), semi-transparent (alpha=0.4), size=3.5 — clearly visible and appropriately clustered around the 16 ideal points. 16 ideal X markers in matte red (#AE3030), opaque, size=6.0 — prominent and immediately distinguishable. Alternating checker shading (PAGE_BG and CHECKER_ALT) for 16 decision regions — subtle, effective. Dashed decision boundary lines in INK_SOFT at ±2 and 0 — clearly visible. 12 error vector segments in matte red (alpha=0.75) connecting ideal to received — visible, adds storytelling.
