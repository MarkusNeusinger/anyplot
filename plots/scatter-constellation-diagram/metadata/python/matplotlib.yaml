review:
  strengths:
  - Correct use of imprint_seq colormap for continuous error-magnitude data (single-polarity)
    — exactly the right cmap choice per style guide
  - PowerNorm gamma correction (γ=0.7) compresses the upper range of the error distribution,
    making spatial spread patterns more visible
  - matplotlib.patheffects.withStroke on ideal-symbol X markers creates clean ink-outline
    separation from the scatter layer beneath
  - All theme-chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG) threaded through
    every element — both renders are theme-correct with zero dark-on-dark or light-on-light
    failures
  - 'EVM calculation is technically accurate: 2D complex-baseband noise gives ~14.1%
    RMS EVM at 20 dB SNR (= sqrt(2/SNR_linear)*100), not the naive 1D approximation'
  - Alternating decision-region shading (alpha=0.05) and concentric reference circles
    (alpha=0.25) add visual depth without competing with data
  - Square 2400×2400 canvas is the right choice for a symmetric I/Q constellation;
    canvas gate passed
  weaknesses:
  - plt.tight_layout() is called before savefig — while the canvas gate passed (2400×2400
    confirmed), the library guide recommends fig.subplots_adjust() for explicit margin
    control instead; tight_layout can unpredictably shift subplot boundaries
  - Concentric circles (radius=0.5, linewidth=0.4, alpha=0.25) around ideal points
    are barely perceptible in the final render and add visual noise without meaningful
    informational value — removing them would clean up the plot
  - 'DE-01/DE-02: the design is polished but slightly below publication-ready — a
    Y-axis-only subtle grid (alpha=0.08) would improve readability of the Q values
    without competing with the domain-specific decision boundaries'
