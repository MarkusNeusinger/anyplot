  - Strong Imprint palette usage with imprint_seq gradient (green→blue) for continuous
    error magnitude encoding
  - 'All spec requirements met: 16 ideal cross markers, semi-transparent received
    symbols, dashed decision boundaries, EVM annotation, equal aspect ratio, correct
    axis labels'
