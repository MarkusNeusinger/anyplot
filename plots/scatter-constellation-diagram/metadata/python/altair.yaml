    is clean and expressive
  - Interactive hover selection using alt.selection_point(nearest=True) with conditional
    opacity/size is distinctively Altair and adds value in the HTML output
  - 'Theme-adaptive chrome correctly implemented across both renders — no dark-on-dark
    failures, correct backgrounds #FAF8F1 / #1A1A17'
  - Perfect spec compliance and data quality — realistic 16-QAM telecommunications
    scenario with mathematically correct EVM calculation
  weaknesses:
  - 'DE-01/DE-02: Good aesthetic foundation but spines (all 4 axis domain lines) are
    still present — for a constellation diagram the standard L-frame or no-spine approach
    would improve visual refinement'
  - 'DE-03: Color-coded error magnitude tells a story but visual hierarchy could be
    stronger — consider making the ideal cross markers more prominent (e.g., slightly
    larger or with a shadow/halo) to better anchor the eye'
  - 'VQ-01: Tick labels at labelFontSize=10 are at the minimum readable size on the
    2400×2400 canvas — bumping to 11–12 would improve mobile readability'
  - 'VQ-03: Received symbol size=40 (opacity=0.35) produces faint dots at this density;
    size=55–65 would improve cluster visibility without overplotting'
  - 'LM-02: The interactive hover feature is good but the static PNG loses it — consider
    adding a static visual cue (e.g., a subtle annotation indicating the nearest-point
    feature exists in the HTML version)'
