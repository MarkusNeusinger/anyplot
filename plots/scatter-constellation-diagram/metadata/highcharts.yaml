  image_description: The plot shows a 16-QAM constellation diagram on a square white
    canvas. Sixteen clusters of semi-transparent steel-blue circular markers (received
    symbols) are arranged in a 4x4 grid at positions ±1, ±3 on both I and Q axes.
    Orange diamond markers with darker orange outlines mark the 16 ideal constellation
    points at the center of each cluster. Dashed gray decision boundary lines appear
    at -2, 0, and 2 on both axes. The title reads "16-QAM Constellation · scatter-constellation-diagram
    · highcharts · pyplots.ai" at the top in dark blue bold text. The Y-axis is labeled
    "Quadrature (Q)" in large text. The X-axis has numeric tick labels from -5 to
    5 but the "In-Phase (I)" title label is not visible — it appears cut off at the
    bottom of the rendered image. An "EVM = 14.0%" annotation box with a subtle border
    sits in the upper-left corner of the plot area. A vertical legend in the upper-right
    shows "Received Symbols" (blue circle) and "Ideal Points" (orange diamond) with
    a semi-transparent white background.
