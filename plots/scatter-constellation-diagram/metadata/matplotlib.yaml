  image_description: The plot displays a 16-QAM constellation diagram on a square
    canvas (12x12 inches) with equal aspect ratio. Sixteen large dark red "X" markers
    (s=320) with white edge highlights mark the ideal constellation points in a 4x4
    grid at +/-1 and +/-3 on both I and Q axes. Approximately 1200 received symbols
    are scattered around the ideal points as small semi-transparent dots (s=28, alpha=0.55)
    colored by error magnitude using the plasma colormap - purple/dark dots near ideal
    positions transitioning to pink/yellow for larger errors. A vertical colorbar
    on the right displays "Error Magnitude" ranging from about 0.1 to 1.0. Dashed
    gray decision boundary lines at -2, 0, and 2 on both axes separate the 16 decision
    regions. Faint origin lines are drawn at x=0 and y=0. The title reads "scatter-constellation-diagram
