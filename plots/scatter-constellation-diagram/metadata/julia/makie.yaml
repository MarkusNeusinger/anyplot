review:
  strengths:
  - Correct 16-QAM data with ideal points at ±1,±3 grid and Gaussian noise model (noise_std=0.18)
    giving a realistic EVM of ~8.1%
  - 'Semantic color use: brand green #009E73 for received symbols and matte red #AE3030
    (semantic anchor) for ideal reference points'
  - Full theme-adaptive chrome with correct Makie INK/INK_SOFT token mapping — dark
    theme passes readability checks with no dark-on-dark issues
  - Equal aspect ratio via DataAspect() preserves the geometric meaning of the I/Q
    diagram
  - Decision boundaries replace generic grid — hlines!/vlines! at ±2 with subtle alpha=0.2
    dashes provide domain-appropriate context
  - Redundant marker shape encoding on ideal points (xcross + red) mitigates green/red
    CVD ambiguity
  weaknesses:
  - Title fontsize=20 produces ~40 source pixels on the 2400×2400 canvas, slightly
    below the style-guide target of ~67px — marginally small at mobile widths (~400px)
  - EVM annotation uses INK (primary text weight) rather than INK_SOFT — a minor hierarchy
    opportunity to differentiate the metric annotation from primary axis labels
  - Received symbol markersize=8 is reasonable for 1200 points, but slightly denser
    clusters (near busier ideal points) show minor visual congestion — markersize=6
    with alpha=0.35 could improve separation
