review:
  strengths:
  - geom_ribbon with pmin/pmax in aes() elegantly creates the symmetric waveform fill
    in a single declarative layer — idiomatic ggplot2
  - Seismic context (P-wave, S-wave, coda) is scientifically accurate and domain-appropriate
    for the waveform-audio spec
  - 'Full theme-adaptive chrome correctly flips background, text, and grid tokens
    between light and dark renders; data color #009E73 is identical in both'
  - 'All spec requirements met: filled area mirrored at zero, semi-transparent fill
    (alpha=0.78), horizontal zero-line, correct axis ranges'
  - Dynamic title font-size scaling (max(8L, round(12 * 67 / nchar(plot_title))))
    prevents title overflow
  - Subtle grid (linewidth=0.2, minor grid blanked) and removed axis ticks produce
    a clean, polished look
  weaknesses:
  - 'Unused import: library(dplyr) is loaded but not called anywhere in the script
    — no dplyr verbs, no pipe, data.frame() is base R. Remove it.'
  - 'No phase annotations: the title promises ''P-wave & S-wave Arrivals'' but neither
    phase boundary is marked in the plot. Even minimal vertical dashed lines at t=0.4s
    (P) and t=0.8s (S) with geom_vline() plus annotate(''text'', ...) would anchor
    the viewer and elevate storytelling from DE-03 3/6 to 5/6.'
  - 'DE-01 headroom: the design is clean but visually simple. Adding the phase-line
    annotations (different dash style or color) and a subtle text hierarchy between
    the descriptive prefix and the spec watermark in the title would push aesthetic
    sophistication closer to 6/8.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Seismic P-wave & S-wave Arrivals · waveform-audio · r · ggplot2 · anyplot.ai" in dark ink at ~11pt; Y-axis label "Normalized Amplitude" and X-axis label "Time (s)" in dark ink at 10pt; tick labels in INK_SOFT (#4A4A44) at 8pt. All text clearly readable against the light background.
      Data: Brand green (#009E73) filled ribbon spanning from 0 to 2 seconds, amplitude symmetric around zero. Noise baseline visible 0–0.4s; P-wave transient (high-frequency, ~0.35 peak amplitude) arriving at 0.4s; S-wave (lower frequency, ~0.9 normalized peak) arriving at 0.8s; coda fading after 1.3s. Horizontal zero-line in INK_MUTED. Subtle grey grid at x=0,0.25,…,2.00.
      Legibility verdict: PASS — all elements readable at desktop and mobile scales.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels render in light cream (#F0EFE8 / INK on dark theme); tick labels in #B8B7B0 (INK_SOFT on dark). Grid lines adapt to muted-dark INK_MUTED. No dark-on-dark failures observed.
      Data: Waveform fill color is identical #009E73 — matches light render exactly. Waveform amplitude and shape are indistinguishable between themes (only chrome flips). Zero-line visible in faint muted tone.
      Legibility verdict: PASS — all text clearly readable against the near-black background; no dark-on-dark issues.
