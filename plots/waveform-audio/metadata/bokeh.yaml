review:
  strengths:
  - Excellent min/max envelope rendering technique that adapts dense waveform data
    for display
  - Complete spec compliance with all required features implemented
  - Clean well-structured code with good data synthesis (fundamental + harmonics +
    envelope + tremolo)
  - Dual output (PNG + HTML) leverages Bokeh web capability
  - Good visual refinement with subtle grid, removed ticks, and clean outline
  weaknesses:
  - 'Design Excellence is the main gap: plot lacks visual storytelling and could use
    more sophisticated aesthetics'
  - No visual differentiation of waveform phases (attack, sustain, release) through
    color or annotation
  - Could use Bokeh varea glyph instead of manual patch construction for more idiomatic
    code
  image_description: 'The plot displays an audio waveform rendered as a filled area
    (using Bokeh''s patch glyph) in semi-transparent Python Blue (#306998) centered
    around a zero baseline. The x-axis shows "Time (seconds)" from 0 to ~1.4, and
    the y-axis shows "Amplitude" with ticks at -1.0, -0.5, 0.0, 0.5, 1.0. The title
    "waveform-audio · bokeh · pyplots.ai" appears in the top-left corner. The waveform
    shows a clear attack-sustain-release envelope: amplitude rises quickly from zero,
    sustains with visible tremolo modulation creating a wavy upper/lower boundary,
    then tapers to zero at the end. Min/max envelope rendering creates the characteristic
    DAW-style filled waveform shape. A thin horizontal zero-line bisects the waveform.
    The background is white with very subtle horizontal y-grid lines. No x-grid is
    present. Ticks are removed for a clean look. The outline frame is removed.'
