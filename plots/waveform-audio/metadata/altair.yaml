review:
  strengths:
  - Excellent min/max envelope rendering approach for handling dense waveform data
    (2000 bins from 33k samples)
  - Attractive vertical gradient fill creating a natural energy-toward-center aesthetic
  - Well-crafted amplitude envelope with attack-dip-sustain-release providing genuine
    visual storytelling
  - Clean readable code with proper audio engineering parameters (440 Hz, 22050 Hz
    sample rate)
  - Subtle grid and removed view stroke show attention to visual refinement
  weaknesses:
  - Y-axis domain extends to +/-1.05 creating excess whitespace above/below actual
    signal peaks
  - The for-loop binning could be vectorized with numpy reshape for cleaner code
  - Limited use of Altair-distinctive features beyond gradient and tooltips
  - Vertical space not fully utilized - waveform rarely reaches plot boundaries
  image_description: The plot displays an audio waveform as a filled area chart using
    a blue gradient (semi-transparent, darker toward the center/zero-line, lighter
    at extremes). The waveform is symmetric around zero, rendered via min/max envelope
    binning (2000 bins from 33,075 samples). The x-axis shows "Time (seconds)" from
    0.00 to ~1.60, and the y-axis shows "Amplitude" from about -1.2 to 1.2. A dashed
    blue zero-line reference runs horizontally at y=0. The amplitude envelope clearly
    shows an attack phase (rapid onset at ~0-0.05s), a sustained section that dips
    around 0.4-0.7s (half amplitude), returns to full, then releases/fades from ~1.2s
    onward. The title reads "waveform-audio · altair · pyplots.ai" in large font at
    the top. Grid lines are very subtle (opacity 0.15). No view border/stroke. The
    waveform fills the canvas well with good proportions.
