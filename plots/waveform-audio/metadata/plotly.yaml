  image_description: The plot displays an audio waveform as a filled envelope in semi-transparent
    blue (#306998) against a white background. The x-axis shows "Time (seconds)" from
    0 to ~1.5s, and the y-axis shows "Amplitude" from -1 to 1. The waveform is symmetric
    around a subtle dark zero-line. The envelope shape clearly shows an attack phase
    (rapid amplitude increase from 0 to ~0.05s), a sustained section with visible
    tremolo modulation (~0.05-1.0s), and a decay phase tapering to low amplitude (~1.0-1.5s).
    The title reads "waveform-audio · plotly · pyplots.ai" in the upper left. Subtle
    horizontal gridlines appear on the y-axis only. The min/max envelope rendering
    creates a textured fill showing individual oscillation peaks within the overall
    shape.
