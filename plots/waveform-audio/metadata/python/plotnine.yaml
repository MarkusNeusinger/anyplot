review:
  strengths:
  - Three-phase color segmentation (Attack/Sustain/Release) with Imprint palette positions
    1-3 in correct order creates an informative, visually purposeful waveform
  - Min/max envelope downsampling (chunk_size=64) correctly avoids aliasing on the
    22050 Hz signal — spec-compliant and technically sound
  - All theme tokens properly adapted for both light and dark renders with no dark-on-dark
    failures
  - Realistic synthetic audio data (220 Hz + harmonics + vibrato + noise) at standard
    22050 Hz sample rate
  weaknesses:
  - Y-axis label reads 'Amplitude' without a unit/range qualifier; change to 'Amplitude
    (normalized)' or 'Amplitude [-1, 1]' to earn full VQ-06 points
  - Phase annotation labels use size=3.5 (~10 pt) which is too small for annotations
    at this canvas size and especially cramped for the narrow Attack region at x~0.025;
    increase to size=5-6
  - Design Excellence loses points due to the annotation labels being too small to
    function as strong narrative anchors — the phase story is told by color but not
    reinforced by legible text emphasis
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct, not pure white
      Chrome: Title "waveform-audio · python · plotnine · anyplot.ai" in dark ink — readable. Axis labels "Time (seconds)" and "Amplitude" in dark ink — readable. Tick labels (-1.00 to 1.00 on y, 0.00 to 1.50 on x) in secondary ink — readable. Phase annotations "Attack", "Sustain", "Release" in respective palette colors — small but visible.
      Data: Attack ribbon in Imprint green (#009E73), Sustain ribbon in Imprint lavender (#C475FD), Release ribbon in Imprint blue (#4467A3). All ribbons symmetric around zero. Horizontal zero reference line visible. Dashed vertical phase boundary lines visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct, not pure black
      Chrome: Title and axis labels in light ink (#F0EFE8) — readable against dark background. Tick labels in secondary ink (#B8B7B0) — readable. Phase annotations in palette colors — legible. No dark-on-dark failures detected.
      Data: Same Imprint green, lavender, and blue data colors as light render — palette is theme-independent and identical. Zero reference line visible in warm muted gray (INK_MUTED dark token). Grid lines subtle.
      Legibility verdict: PASS
