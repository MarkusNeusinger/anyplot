review:
  strengths:
  - 'Creative seaborn-native approach: uses sns.lineplot(errorbar=(''pi'', 100)) to
    render the full amplitude envelope as a percentile band — an idiomatic seaborn
    technique adapted to signal visualization'
  - Loud/quiet dynamic classification via smoothed RMS adds informative visual distinction
    beyond basic waveform rendering, with semantically correct use of the Imprint
    muted anchor for quiet sections
  - Musical dynamics annotations (Attack + Sustain, Decay, Second Phrase) in italic
    fontstyle tell a clear story about the audio structure and guide the viewer's
    eye through the signal
  - Correct min/max envelope rendering via chunk binning (chunk_size=80, ~275 bins)
    avoids aliasing for dense 22kHz waveform data — exactly as the spec recommends
  - 'Perfect theme-adaptive chrome: all text, backgrounds, grid, and legend boxes
    correctly flip between light (#FAF8F1) and dark (#1A1A17) themes with no dark-on-dark
    or light-on-light failures'
  - 'Acoustically accurate synthetic data: 220 Hz fundamental (A3 note) with realistic
    harmonic series (0.6 / 0.25 / 0.1 / 0.05 weights) and multi-segment dynamic envelope'
  weaknesses:
  - 'Legend labeling creates a slight ambiguity: quiet sections actually show both
    the green seaborn envelope AND the muted gray overlay overlaid, so they appear
    as a green-gray mix, while the legend implies a clean binary Loud=green / Quiet=gray
    distinction; consider adding a note or using opacity more clearly'
  - 'DE-01 ceiling: aesthetic sophistication is strong but not publication-tier; additional
    touches (e.g., subtle annotation leader lines, a faint horizontal amplitude grid
    aligned to 0.5 / -0.5, or a slightly larger alpha contrast between loud and quiet)
    could elevate the visual hierarchy further'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "waveform-audio · python · seaborn · anyplot.ai" in dark medium-weight text, clearly readable at ~70% of plot width. Y-axis label "Amplitude" and X-axis label "Time (s)" in dark text, proportional (fontsize 10). Tick labels in dark-soft tone, readable at 8pt. Top and right spines removed via sns.despine(). No grid (appropriate for dense signal).
      Data: Large filled waveform envelope in brand green #009E73 (alpha 0.4) representing the full amplitude range at each time bin. A thin oscillating mean line (near zero) is visible within the envelope. Quiet sections (decay region and inter-phrase gap) are overlaid with a semi-transparent muted gray fill (INK_MUTED, alpha 0.35), creating visual distinction. Zero reference line in INK_SOFT at alpha 0.5. Three italic text annotations ("Attack + Sustain", "Decay", "Second Phrase") in INK_SOFT/INK_MUTED tones clearly label the musical phases. Legend in upper right with green and gray patch swatches.
      Legibility verdict: PASS — all elements readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
