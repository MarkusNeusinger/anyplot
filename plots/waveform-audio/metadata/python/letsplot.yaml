      Data: Waveform segment colors identical to light render — same #009E73→#4467A3 gradient. Envelope shape identical. Zero dashed line visible in theme-adaptive INK_MUTED. Section dotted lines visible. Colorbar legend readable with light text.
      Legibility verdict: PASS — all text readable against near-black background, no dark-on-dark failures
