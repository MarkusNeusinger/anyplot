review:
  strengths:
  - DAW-style vertical segment rendering with Imprint sequential colormap (#009E73→#4467A3)
    adds meaningful amplitude-range encoding beyond basic waveform display
  - ASR phase annotations (Attack/Sustain/Dip/Release) with dotted boundary lines
    create clear data storytelling — viewer immediately understands the envelope dynamics
  - Correct min/max envelope binning (22050 samples → 800 bins) prevents aliasing
    artifacts at display resolution, matching spec guidance
  - 'Perfect theme-adaptive chrome in both renders: #FAF8F1 light background and #1A1A17
    dark background with all text tokens properly switched'
  - Clean KISS code structure with np.random.seed(42), all sizes explicitly set, and
    both PNG + HTML output files saved correctly
  weaknesses:
  - 'Design excellence is good but not publication-ready: section annotation labels
    (Attack/Sustain/Dip/Release) all share the same thin italic style with no visual
    weight hierarchy — a bolder or larger label for the primary phase transitions
    would add polish'
  - 'LM-02 could be higher: the implementation uses layer_tooltips() but misses an
    opportunity to use geom_ribbon() as the more idiomatic lets-plot ''filled area''
    geom for waveform rendering, which would better match the spec''s ''filled area
    mirrored above and below zero'' description'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface
      Chrome: Title "waveform-audio · python · letsplot · anyplot.ai" in dark ink, clearly readable. Subtitle in INK_SOFT gray. X-axis label "Time (seconds)" and Y-axis label "Amplitude" in dark ink at size 12. Tick labels at size 10 in INK_SOFT, all visible. Section annotations (Attack, Sustain, Dip, Sustain, Release) in dark italic text above the waveform.
      Data: Dense vertical segment bars rendered with Imprint sequential gradient from #009E73 (green, low amplitude range) to #4467A3 (blue, high amplitude range). Waveform clearly shows ASR envelope: tall sustain sections (±1.0), reduced dip section (±0.5), smooth release taper. Dotted vertical boundary lines in INK_MUTED at section transitions. Dashed zero reference line across full width. Colorbar legend "Amplitude Range" on right with values 0.5, 1, 1.5, 2.
      Legibility verdict: PASS — all text readable against warm off-white background

    Dark render (plot-dark.png):
