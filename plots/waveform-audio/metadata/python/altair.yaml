      Data: Main waveform as a teal/green filled area (#009E73 with gradient opacity 0.28–0.60) symmetric around zero; clipped region (~0.15–0.25 s) overlaid in brownish-red (#AE3030, 50% opacity); dashed zero baseline at y=0; subtle dashed threshold lines at y=±1.0; green fills from amplitude -0.8 to +0.8 at peak, narrowing to ±0.4 during the amplitude dip (0.40–0.70 s) and tapering to zero in the release
      Legibility verdict: PASS — all text clearly readable, no light-on-light issues

