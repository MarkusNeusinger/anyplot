review:
  strengths:
  - Vertical gradient fill on mark_area is a sophisticated aesthetic choice — the
    opacity taper from center (0.60) to edges (0.28) gives the waveform visual depth
  - Semantic use of Imprint matte red (#AE3030) for clipping overlay is intentional
    and correctly represents the audio engineering concept
  - Min/max envelope binning (600 bins) is the correct approach for this dense signal
    and avoids sub-pixel aliasing artifacts
  - Theme-adaptive chrome is fully wired (PAGE_BG, INK, INK_SOFT, INK_MUTED) — both
    renders pass legibility check
  - 'Interactive features are genuinely altair-native: alt.selection_point crosshair
    + transform_filter + tooltip layer composition'
  - Zero baseline and ±1.0 clipping threshold lines are clean design refinements
  - 'Data is highly realistic: A440 fundamental with harmonics, proper attack-sustain-release
    envelope, realistic clipping segment'
  - All font sizes explicitly set (title=16, subtitle=10, axis label=12, tick label=10)
  - Canvas correctly sized at 3200×1800 with PIL pad-to-target block
  - Both PNG and HTML outputs saved correctly
  weaknesses:
  - Both X and Y grid lines are present (11 horizontal + 9 vertical lines) — for a
    waveform time series, Y-axis-only grid would be cleaner and less visually heavy
  - Horizontal grid lines at exactly y=1.0 and y=-1.0 (the y-axis domain boundaries)
    create a 'boxed top/bottom' visual effect; slight y-domain padding (e.g. domain=[-1.05,
    1.05]) would give the waveform breathing room
  - No visual annotation distinguishing the amplitude dip region (0.4–0.7 s) — a subtle
    annotation or legend callout could help viewers understand the dynamics phases
    beyond what the subtitle states
