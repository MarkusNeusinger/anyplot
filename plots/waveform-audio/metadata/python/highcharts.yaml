      Data: Two distinct waveform "lobes" in brand green #009E73 with semi-transparent fill (0.35 opacity), one between ~0.15-0.65 s peaking at ~0.65 amplitude and a second between ~0.85-1.55 s peaking at ~0.55. The silence before, between, and after the syllables is clearly visible near the zero baseline. Minor noise floor visible in silent regions.
