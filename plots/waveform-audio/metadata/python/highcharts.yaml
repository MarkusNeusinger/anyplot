review:
  strengths:
  - Syllable band overlays (plotBands) are a high-quality design choice that immediately
    communicates speech structure to the viewer
  - Min/max envelope downsampling (1500 windows x 2 samples) correctly handles the
    88200-sample waveform without aliasing artifacts
  - 'Complete theme-adaptive chrome: all INK, INK_SOFT, GRID tokens applied throughout
    — both renders look correct'
  - Both PNG and HTML artifacts saved correctly; CDP + PIL belt-and-braces ensures
    exact 3200x1800 output
  - Acoustically realistic synthetic data (harmonics, hanning envelopes, noise floor,
    silence gap)
  weaknesses:
  - 'Y-axis range is ±0.8 instead of the spec-mandated ±1.0 — fix: set min: -1.0,
    max: 1.0, tickInterval: 0.5 on y_axis'
  - LM-02 could be stronger — no use of Highcharts-specific advanced features beyond
    plotBands/plotLines; consider Highcharts Boost module or navigator for dense waveform
    data
