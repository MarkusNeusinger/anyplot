review:
  strengths:
  - 'Perfect spec compliance: filled area waveform with semi-transparent fill, zero
    reference line, and correct time/amplitude axes'
  - Full theme adaptation — all chrome tokens (background, INK, INK_SOFT, GRID) properly
    branch on ANYPLOT_THEME, both renders pass readability checks
  - AreaSeries with threshold:0 correctly produces bidirectional fill from zero —
    a Highcharts-specific feature well-suited to waveform visualization
  - 'Realistic synthetic speech data: physically accurate fundamental (130 Hz) + harmonics
    with Hanning amplitude envelope producing two clearly separated voiced syllables'
  - All font sizes explicitly set following the style guide (title 65px dynamically
    scaled, axis labels 56px, tick labels 44px); clean KISS code with seed=42
  weaknesses:
  - 'Design lacks visual distinction: DE-01/DE-02/DE-03 are at or just above default
    — no spine removal, no emphasis technique (color contrast, annotations, highlighted
    peaks), and the chart reads as a configured-default rather than a crafted visualization'
  - Y-axis auto-extends to ±1.5 (tickInterval 0.5 from min -1.2) while data peaks
    at ~0.65 — waveform occupies only ~43% of vertical space, making the signal appear
    small; tighten y-axis range to e.g. min:-0.8/max:0.8 or clip to ±1.0 to better
    frame actual dynamics
  - Spec notes explicitly require min/max envelope rendering to avoid aliasing — implementation
    uses simple stride-N decimation (every 29th sample) instead; for a 44 100 Hz signal
    downsampled to 3 000 display points this may miss peaks and under-represent transients
    in the onset/offset region
  - 'No visual hierarchy: syllable onsets/offsets or peak amplitude regions are not
    emphasized — even a single vertical annotation or subtle shaded region between
    syllables would substantially improve storytelling (DE-03)'
  image_description: |-
    Light render (plot-light.png):
