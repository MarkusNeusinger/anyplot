review:
  strengths:
  - Dual-layer envelope rendering (outer peak/trough + inner 70th-percentile energy)
    creates professional visual depth unique to this implementation
  - Semantic color coding for phase annotations (green=attack, muted=sustain, amber=decay)
    demonstrates intentional design thinking aligned with the Imprint palette semantic
    anchor system
  - Realistic audio parameters (220 Hz, 22050 Hz, harmonics at 2f/3f/5f, tremolo at
    5.5 Hz) produce a visually authentic waveform
  - Complete theme-adaptive chrome implementation with all tokens correctly applied
    in both light and dark renders
  - Clean KISS code structure with well-chosen block size (40 samples) for envelope
    extraction
  weaknesses:
  - 'DE-01 could reach 8/8 with one further refinement: the SUSTAIN region could benefit
    from a subtle mid-section label or energy annotation to add storytelling depth
    beyond the phase boundaries'
  - 'LM-02 at 3/5: the HTML interactivity (hover showing time/amplitude) is underutilized
    — the hovertemplate is set only on the outer fill trace; the peak lines have hoverinfo=skip,
    missing an opportunity to show per-block statistics in the tooltip'
