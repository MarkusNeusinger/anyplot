review:
  strengths:
  - Min/max envelope binning (300 bins from 5000 samples) correctly avoids aliasing
    — spec explicitly required this for dense waveforms
  - Gradient areaStyle with origin:0 creates an authentic DAW-like filled waveform
    appearance; mirrored inverted gradient on lower envelope is a clever dual-series
    approach
  - Syllabic region annotations (markArea) with labels add genuine storytelling value
    — viewer immediately understands the 3-syllable speech structure
  - Fully deterministic data generation using a physically plausible speech model
    (Gaussian envelopes + 175 Hz harmonic carrier)
  - 'Perfect theme adaptation: both light and dark renders pass all legibility checks
    with no dark-on-dark failures; all chrome tokens (t.ink, t.inkSoft, t.grid) correctly
    applied'
  weaknesses:
  - Syllable region labels at markArea.label.fontSize=12 are slightly small on the
    3200x1800 canvas — increase to 14-15 for better mobile readability
  - Axis name labels at nameTextStyle.fontSize=18 are somewhat large relative to tick
    labels at fontSize=14; reduce to 15-16 for better typographic balance
