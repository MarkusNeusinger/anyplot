review:
  strengths:
  - 'Correct waveform-audio plot type: filled area chart symmetric around zero baseline
    using ECharts areaStyle with origin:0'
  - Imprint brand green (#009E73) correctly used as primary series color via t.palette[0]
  - 'Theme-adaptive chrome fully wired: title uses t.ink, axis labels use t.inkSoft,
    grid uses t.grid token'
  - Sophisticated gradient fill (opaque at extremes, transparent at center) mimics
    professional DAW aesthetics
  - Zero reference line implemented via markLine — clean and idiomatic ECharts approach
  - 'Highly realistic speech-like synthetic data: three Gaussian syllabic envelopes
    at 175 Hz fundamental with four harmonics'
  - Deterministic data generation (pure math, no RNG) ensures perfect reproducibility
  - 'Well-balanced font hierarchy: title 22px, axis names 18px, tick labels 14px —
    all explicitly set'
  - Correct canvas orientation directive and proper harness contract (no explicit
    width/height, no devicePixelRatio)
  weaknesses:
  - 'DE-01/DE-03: No visual storytelling elements — the three syllabic peaks are the
    core insight but nothing highlights them. Add subtle vertical annotations or colored
    region spans marking the three burst centers (0.14s, 0.47s, 0.81s) with light
    labels (''Syllable 1'', ''Syllable 2'', ''Syllable 3'') to give the chart a narrative
    and elevate design sophistication.'
  - 'SC-02 minor: Spec recommends min/max envelope rendering for dense waveforms to
    avoid aliasing artifacts. Consider computing and rendering a downsampled min/max
    envelope (e.g. 200 bins) as a solid fill behind the fine line, which is also more
    authentic to how professional DAWs display waveforms.'
  - 'DE-01: Gradient fill is a good touch but the linear vertical gradient (from y=0
    to y=1) doesn''t fully capture the symmetric waveform aesthetics — the top half
    fades from opaque at top to transparent at center and the bottom half is nearly
    invisible. Consider making the gradient symmetric around zero with equal fill
    intensity above and below, or use two separate series (positive / negative envelope
    bands) for a more polished professional look.'
  - 'CQ-01: Small hexToRgba helper function deviates from the flat KISS structure
    rule. Could inline the rgba calculation or use ECharts'' built-in rgba support
    via a string template if available.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly matches the light theme surface.
      Chrome: Title "waveform-audio · javascript · echarts · anyplot.ai" in dark ink, centered, clearly readable. Y-axis label "Amplitude" and X-axis label "Time (s)" in secondary ink (inkSoft), both readable. Tick labels at 14px in inkSoft, well-spaced on both axes. Y-axis grid lines are subtle and understated. No top/right frame lines visible (ECharts default).
      Data: A filled area waveform rendered in Imprint brand green (#009E73). The fill uses a vertical linear gradient — opaque green at the waveform extremes fading to near-transparent at the zero crossing, creating an envelope-style visual. A thin horizontal zero line (markLine) in inkSoft runs across the entire width. Three distinct amplitude peaks are visible (syllabic bursts), with near-silence regions between them. The dense oscillations (5000 samples) are individually visible as rapid vertical strokes.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly matches the dark theme surface.
      Chrome: Title in light ink (F0EFE8-range), axis labels and tick labels in lighter inkSoft token — all clearly readable against the dark background. Grid lines use the dark-theme grid token and remain subtle. No dark-on-dark failures detected.
      Data: Green waveform (#009E73) is identical to the light render — data colors unchanged, only chrome flipped. The gradient fill reads slightly differently on dark (the semi-transparent regions blend into the near-black background cleanly), creating an equally professional look. The zero line is visible in the lighter inkSoft on dark background.
      Legibility verdict: PASS — all text clearly readable against the warm near-black background, no dark-on-dark failures.
