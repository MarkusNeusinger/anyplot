review:
  strengths:
  - Sophisticated 4-harmonic vocal synthesis produces a scientifically realistic speech
    signal — three syllables with distinct frequencies (130/155/145 Hz) and trapezoidal
    amplitude envelopes
  - Min/max envelope downsampling per pixel column correctly avoids waveform aliasing
    on dense data, exactly as specified
  - Envelope overlay curves (d3.curveCatmullRom.alpha(0.5)) add a visually informative
    layer showing amplitude modulation — a creative addition beyond the baseline spec
  - Syllable onset dashed vertical markers and mid-label annotations with frequency
    values make the chart self-documenting for a speech-analysis audience
  - 'Full palette and theme compliance: t.palette[0] (#009E73) for data, t.ink/t.inkSoft/t.grid
    for chrome, warm backgrounds correct in both renders'
  - Fully deterministic code — no RNG, fixed SYLS parameters — guarantees reproducible
    output across runs
  - 'Clean D3 idioms: d3.area() y0/y1 for filled waveform, .datum() binding, d3.axisBottom/Left,
    all idiomatic'
  weaknesses:
  - Syllable annotation labels at 14px CSS (28 source px after 2× Playwright scale)
    are noticeably smaller than the tick labels (16px) and axis labels (20px) — increase
    to at least 16px to match tick-label sizing and improve readability at mobile
    widths
  - Design excellence is above default but not exceptional — single brand-green (#009E73)
    dominates the entire visualization with no secondary visual layer; consider using
    a slightly different opacity or stroke treatment for the envelope curves to create
    visual hierarchy between the waveform fill and the envelope outline
  - Top and right axis domain lines are present via the .domain stroke on xAxis/yAxis
    — the L-shape is correct in D3 (only bottom + left axes created), but the domain
    stroke on the bottom axis extends across the full width giving a box-like feel;
    suppressing the bottom and left .domain paths would yield a cleaner floating-axis
    look consistent with the style guide's spine-removal recommendation
  image_description: |-
