review:
  strengths:
  - 'Full UpSet plot layout correctly implemented: horizontal set-size bars, vertical
    intersection bars, dot matrix, and connecting lines all aligned in a coherent
    2×2 GridSpec'
  - Color-coding by intersection degree (green=1, orange=2, blue=3) using Okabe-Ito
    order adds genuine analytical value and guides the reader
  - Alternating row shading in the matrix improves readability at low cost
  - 'Complete theme-adaptive chrome: all text (title, axis labels, tick labels, bar
    count labels, legend) correctly uses INK/INK_SOFT tokens for both light and dark
    renders'
  - Data context (bug reports spanning software modules) is realistic, neutral, and
    well-suited to demonstrate UpSet plot advantages over Venn diagrams
  - Seed set, no functions/classes, clean imports — fully reproducible and KISS-compliant
  - Inactive dots rendered at low alpha to indicate non-membership without cluttering
    the matrix
  weaknesses:
  - 'Font sizes are consistently 1-2pt below spec recommendations: title 22pt (spec:
    24pt), axis labels 18pt (spec: 20pt), set name labels 15pt, tick labels 14pt (spec:
    16pt), bar count labels 13pt — at 4800×2700 px these are readable but smaller
    than optimal'
  - 'Design excellence is functional rather than distinguished: no annotation of the
    most interesting intersections, no subtitle providing context, visual hierarchy
    beyond descending-sort is absent'
  - Only 5 sets shown — spec allows 4–15 but using 7–8 sets would better showcase
    UpSet's advantage over Venn diagrams and create a richer matrix
  - DE-03 storytelling is neutral — no emphasis technique (bold color, callout, or
    annotation) draws attention to the most important insight in the data
