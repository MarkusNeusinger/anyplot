    spec suggestion to use color to distinguish intersection degree
  - 'Perfect theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders are
    fully readable with correct chrome tokens throughout'
  - 'Clean code: shared Range1d objects elegantly handle multi-panel axis alignment,
    FixedTicker with overrides handles categorical-style numeric axes idiomatically'
  weaknesses:
  - 'Okabe-Ito canonical order not followed for degree colors: degree-2 uses blue
    (position 3 = #0072B2) instead of vermillion (position 2 = #D55E00), skipping
    the second color'
  - No HoverTool implemented despite Bokeh generating interactive HTML — a major missed
    opportunity; tooltips on bars showing gene counts and on matrix dots showing set
    membership would be highly distinctive
  - Corner legend panel oversized relative to legend content, creating unbalanced
    whitespace in the top-left quadrant
  - Experiment labels (Exp A–F) are generic — more descriptive names would improve
    data storytelling
