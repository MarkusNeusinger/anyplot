      Background: Near-black #1A1A17 — correct, no pure black
      Chrome: Title in light #F0EFE8 — clearly readable. Y-axis labels and tick text in #B8B7B0 (INK_SOFT dark). Set-name labels light-colored and readable. No dark-on-dark failures detected.
      Data: Bar colors (#009E73) are identical to light render. Active dots remain brand green. Inactive dots shift to dark grey (#3A3A35), visible against the dark background. Set-size bars are light grey (INK_SOFT dark theme). Connecting lines remain brand green.
