  strengths:
  - Three-panel UpSet layout (intersection bars, set bars, dot matrix) implemented
    cleanly with precise CSS positioning of three coordinated Highcharts instances
  - Brand green (#009E73) used correctly for all active data elements; inactive dots
    use theme-adaptive neutral
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, GRID tokens applied throughout
    both renders'
  - Realistic RNA-seq / gene-stressor biological context with plausible set and intersection
    sizes
  - 'All spec features present: sorted intersections, connecting lines, set size bars,
    intersection cardinality bars'
  - KISS structure with no functions/classes, seed(42), clean imports, correct dual
    HTML+PNG output
  weaknesses:
  - Screenshot captures 4800×2561 instead of 4800×2700 — bottom row (Oxidative) is
    right at the edge with no bottom padding; add marginBottom or reduce BOTTOM_H
    to ensure the last matrix row has breathing room
  - Data labels on intersection bars not explicitly configured — Highcharts only shows
    partial labels by default (5/15 bars); add dataLabels:{enabled:true} or disable
    them entirely for a cleaner look
  - 'DE-01/DE-03 below threshold: no visual hierarchy beyond sorted order; consider
    degree-based color gradient on bars (single-set green → multi-set darker), or
    a subtle annotation on the dominant intersection'
