      Background: Warm off-white #FAF8F1 — correct, no pure white
      Chrome: Title "upset-basic · highcharts · anyplot.ai" in dark ink at top, readable. Y-axis label "Intersection Size" (rotated, 24px) and "Set Size" visible. Set-name labels (Hypoxia, Heat Stress, Nutrient Dep., UV Damage, Oxidative) in INK_SOFT, readable. Tick labels in 18-22px range, readable.
      Data: 15 green (#009E73) intersection bars descending from ~98 to ~14 in top-right panel. Five grey horizontal set-size bars on bottom-left. Dot matrix: active dots in brand green, inactive dots in light grey (#D0CFC8). Vertical connecting lines (lineWidth:10) in brand green link co-active sets in same intersection. Alternating row backgrounds in matrix add subtle structure.
      Issues: Screenshot is 4800×2561 (not 4800×2700) — Oxidative row visible but just at the bottom edge with minimal padding. Data labels shown on only first 5 bars (Highcharts default partial labeling).
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

