review:
  strengths:
  - Complete, correct UpSet plot with all three required components properly aligned
    and composed
  - Degree-based color coding (Okabe-Ito order) adds analytical value beyond simple
    set membership display
  - Both light and dark renders are fully theme-adaptive with correct backgrounds,
    readable text, and identical data colors
  - Inactive dots at low opacity (0.18) create excellent visual hierarchy against
    the active colored dots
  - Count labels on intersection bars and tooltips on all elements make the chart
    highly informative
  weaknesses:
  - 'Dead code: set_label chart (lines 276-280) is defined but never included in the
    layout — remove it'
  - Degree legend floats to top-left due to Altair composition overriding orient=bottom-right
    — consider using orient=top-left intentionally
  - Panel borders from configure_view(stroke=INK_SOFT) create a boxy look — stroke=None
    would be cleaner
  - Connector lines use neutral INK_SOFT color rather than matching the degree color
    of the intersection — missed opportunity to reinforce degree encoding
