review:
  strengths:
  - 'Full spec compliance: all three UpSet components (intersection bars, dot matrix,
    set-size bars) present and correctly composed using Altair''s grammar'
  - Degree-based Okabe-Ito coloring on active dots creates meaningful visual hierarchy
    beyond just showing membership
  - Clean, readable code with proper theme-adaptive chrome applied throughout; dark
    render passes all readability checks
  - Connector lines via mark_rule + Y2 encoding is an elegant Altair-idiomatic approach
  weaknesses:
  - Font sizes are explicitly set but systematically below the style-guide minimums
    for pixel-based libraries (title 24 vs 28, axis labels 17-18 vs 22, ticks 14-15
    vs 18) — increase all text sizes
  - Set-size bars use plain gray (INK_SOFT) with no differentiation from the matrix
    inactive dots — consider using BRAND green or a subdued teal to visually link
    them to the intersection bars
  - 'Design Excellence is below the repair threshold — improve visual refinement:
    the gray set-size bars need more polish, add subtle axis spine treatment, and
    use stronger visual emphasis to draw the viewer''s eye to the key insight'
  - Legend overlaps the top-left corner of the intersection bar chart area — consider
    relocating to avoid visual clutter
