review:
  strengths:
  - Correct UpSet plot layout with all three required panels (intersection bar chart,
    dot matrix, set size bars) implemented precisely using ggbunch
  - 'Proper theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, ELEVATED_BG tokens applied
    to all non-data elements in both light and dark renders'
  - 'Okabe-Ito palette used correctly with degree-1 intersections in brand green #009E73,
    then #D55E00 (degree 2), #0072B2 (degree 3)'
  - Intersections sorted by count descending as specified, with top 12 shown — good
    data scope
  - Realistic marketing channel scenario (Email, Social, Search, Referral, Direct)
    with credible probabilities and np.random.seed(42) for reproducibility
  - ggbunch used for precise sub-panel layout — a lets-plot-distinctive feature enabling
    the multi-panel UpSet composition
  - 'Clean code: KISS structure, no functions/classes, frozenset-based intersection
    key is idiomatic and efficient'
  - Connecting lines via geom_segment clearly show which sets form each intersection;
    active/inactive dots use contrast effectively
  weaknesses:
  - Legend text is 14pt — below the 16pt minimum guideline for the large canvas (4800x2700);
    should be raised to at least 16pt
  - 'DE-01 aesthetic sophistication is good but not exceptional: the UpSet layout
    itself is the main visual achievement; no additional typographic polish or refined
    whitespace choices lift it to publication-ready tier'
  - 'Degrees 4 and 5 appear only in the legend color key (pink #CC79A7, yellow #E69F00)
    but not in any visible bars — the top-12 intersections happen to be degree 1-3
    only, so the legend entries for degree 4/5 are phantom items; could use a dataset
    with more degree variation to show full range'
  - No y-axis label on the set size panel — the bars are labeled by set name but 'Set
    Size' is on the x-axis only; the panel title or annotation that makes the relationship
    between set-bar and matrix clear is absent (minor)
