    (#009E73 first), engine order lines correctly muted with INK_MUTED as reference
    lines, critical speeds in semantic red (#AE3030/danger anchor).'
  - Both themes render correctly with full theme-adaptive chrome — warm off-white
    (#FAF8F1) / near-black (#1A1A17) backgrounds, no dark-on-dark failures, all text
    readable in both renders.
  - KISS Julia code with correct CairoMakie idioms, reproducible Random.seed!(42),
    clean imports, and correct output naming.
