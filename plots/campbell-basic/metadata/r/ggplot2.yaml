review:
  strengths:
  - Correct anyplot palette applied in canonical order across all 4 natural frequency
    modes
  - Excellent theme-adaptive chrome — all text, backgrounds, and legend adapt correctly
    to light/dark
  - 'Complete spec coverage: 4 modes, 3 engine order lines, critical speed markers,
    critical speed zones, direct inline labels for 1x/2x/3x'
  - 'Strong visual hierarchy: dashed muted engine order lines vs solid colored natural
    frequency curves, red diamond markers as clear focal points'
  - 'Clean ggplot2 idiom: multiple data sources layered via geom layers, factor levels
    for legend ordering, coord_cartesian for soft axis limits'
  - L-shaped spine (panel.border removed, axis.line retained) with subtle grid (minor
    grid off, major at alpha 0.12) — good visual refinement
  - Deterministic synthetic data with physically correct engine order formula (f =
    n*RPM/60) and realistic gyroscopic speed variation
  - Correct canvas (3200x1800, 8in × 4.5in, dpi=400) and output filename (plot-{THEME}.png)
  weaknesses:
  - Critical speed zone shading at alpha=0.05 is nearly invisible — consider increasing
    to alpha=0.08-0.12 for subtle but perceptible emphasis on the resonance risk zones
  - Engine order lines not represented in the legend — spec calls for a clean legend
    distinguishing natural frequency curves from engine order lines; direct inline
    labels compensate but a legend entry (e.g. 'Engine Orders (1x/2x/3x)') would strengthen
    spec compliance
  - DE-01 aesthetic sophistication is at the well-configured-library-default level
    — critical zone shading could be more visually distinctive (e.g., a slightly deeper
    alpha, a thin vertical dashed rule at each critical speed, or small numeric RPM
    annotations at the critical markers)
