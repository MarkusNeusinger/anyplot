  strengths:
  - Physically correct Campbell diagram with all spec-required elements (mode curves,
    EO lines, critical speed markers, labels, operating range)
  - 'Intelligent visual encoding: filled large diamonds for in-range critical speeds
    vs outlined small diamonds for out-of-range creates immediate danger hierarchy'
  - Direct EO line labeling at right edge avoids cluttering the legend
  - Both themes render correctly with full chrome token adaptation; palette invariance
    confirmed (data colors identical in light/dark)
