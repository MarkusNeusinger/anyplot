review:
  strengths:
  - 'Complete Campbell diagram with all required elements: 5 mode curves, 3 engine
    order lines (1×/2×/3×), red diamond critical speed markers, and operating range
    band'
  - Excellent anyplot palette usage — canonical order for mode curves, semantic red
    (#AE3030) correctly applied to critical speeds, theme-adaptive chrome tokens throughout
  - 'Good data storytelling: annotated 1×/1st Bending critical speed at ~1180 RPM
    with dotted vertical drop line, operating range band with label, consolidated
    EO legend entry'
  - 'Both renders pass theme-readability check: warm off-white (#FAF8F1) light background,
    near-black (#1A1A17) dark background, all text readable in both themes with no
    dark-on-dark failures'
  - Clean, reproducible code with np.random.seed(42), flat script structure, all imports
    used, correct save API
  weaknesses:
  - Full panel border (panel_border=element_rect) kept as a closed box instead of
    removing top and right spines — style guide default is L-shaped frame (remove
    top+right) or no spines; reduces visual refinement
  - 'Annotation text (''Critical: 1180 RPM'', ''Operating Range'') rendered at size=2.8mm
    (~8pt) — very small at thumbnail/mobile-width (~400 px) rendering; increase to
    3.5–4mm or reposition to avoid crowding'
  - 'Operating range band alpha=0.08 with #4467A3 blue is barely perceptible in both
    renders, especially on the dark (#1A1A17) background — alpha=0.12–0.15 would provide
    better visibility without dominating'
  - EO labels ('1×', '2×', '3×') at size=3.0mm sit close to natural frequency curves
    at their placement coordinates, risking visual proximity confusion; minor positional
    adjustment could clarify association
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct theme surface
      Chrome: Bold title "campbell-basic · python · plotnine · anyplot.ai" is clearly readable in dark ink (#1A1A17), spanning ~70% of plot width (expected for the mandated title length). X-axis label "Rotational Speed (RPM)" and Y-axis label "Natural Frequency (Hz)" are readable at 10pt in dark ink. Tick labels readable at 8pt in INK_SOFT (#4A4A44). Bottom legend text readable. Subtle gray grid lines at alpha=0.12.
      Data: Five natural frequency curves in anyplot canonical order — green (#009E73 / 1st Bending), purple (#C475FD / 2nd Bending), blue (#4467A3 / 1st Torsional), ochre (#BD8233 / 2nd Torsional), red (#AE3030 / Axial). Three dashed gray engine order lines (1×, 2×, 3×). Red diamond critical speed markers at all intersections. Light blue operating range band (barely visible at alpha=0.08). Red annotation "Critical: 1180 RPM" with dotted vertical line. EO italic labels (1×, 2×, 3×) visible but small.
      Legibility verdict: PASS — all chrome text readable; minor concern is annotation/EO label size (~2.8–3mm) which is borderline at mobile thumbnail widths

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct dark theme surface
      Chrome: Title bold in light ink (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in light INK/INK_SOFT colors — all readable with no dark-on-dark failures. Legend text light-colored, readable. Grid lines subtle on dark background.
      Data: Identical data colors to light render — green, purple, blue, ochre, red mode curves; gray dashed EO lines; red diamond critical markers. Operating range band barely perceptible at alpha=0.08 on dark surface (even less visible than in light render). "Critical: 1180 RPM" annotation visible in red italic. EO labels visible but small.
      Legibility verdict: PASS — no dark-on-dark failures; all elements technically readable; operating range band is very faint on dark background
