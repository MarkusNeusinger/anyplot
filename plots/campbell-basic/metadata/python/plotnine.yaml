review:
  strengths:
  - 'Correct Campbell diagram with all required components: 5 natural frequency modes,
    3 engine order excitation lines, critical speed intersection diamonds, and operating
    range shading'
  - 'Custom Imprint palette applied in canonical order with first series (1st Bending)
    correctly using #009E73 brand green'
  - 'Thoughtful multi-encoding: color differentiates modes, linetype differentiates
    modes from EO lines, and line weight (1.5 vs 0.8) reinforces the distinction'
  - scale_size_identity() pattern for variable line widths, consolidated EO legend
    entry via breaks/labels, and guide_legend(override_aes) are idiomatic plotnine
    features used well
  - 'Critical speed annotation with dotted guide line and ''Critical: 1180 RPM'' label
    highlights the most operationally significant intersection'
  - 'Theme adaptation is correct in both renders: warm backgrounds (#FAF8F1 / #1A1A17),
    adaptive text colors, and consistent data colors across themes'
  - Realistic turbomachinery data with gyroscopic frequency variation (some modes
    increasing, some decreasing with speed)
  weaknesses:
  - EO labels (1×, 2×, 3×) positioned with +3 Hz offset places them close to or on
    top of natural frequency curves — the '2×' label at (2200, 76.3 Hz) sits essentially
    on the 2nd Torsional line (~77.2 Hz at 2200 RPM), creating overlap; reposition
    labels further from curve crossing zones or use a label offset away from the dense
    curve area
  - 'Critical speed diamond markers use the same #AE3030 color as the Axial mode line;
    red diamonds on the red Axial curve lose visual distinctiveness at those intersections
    — consider using a white fill or contrasting outline for critical markers (e.g.,
    fill=''white'', color=CRITICAL_COLOR, stroke=1.5) to separate them from the Axial
    line'
  - 'Annotation text ''Critical: 1180 RPM'' and EO inline labels use geom_text size=3.5
    (mm) which renders quite small (~10pt equivalent) — slightly harder to read at
    smaller display sizes; increasing to size=4.0–4.5 would improve legibility without
    crowding'
  - 'DE-02 could be further refined: the legend border (INK_SOFT with size=0.3) adds
    a frame that slightly clutters the bottom area; removing or softening it (alpha
    0.3–0.5) would improve visual cleanliness'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 fills the outer plot area; panel area matches. Operating range band (2000–4500 RPM) is a very light blue-grey overlay.
      Chrome: Title "campbell-basic · python · plotnine · anyplot.ai" is bold, centered, clearly readable in dark ink. Axis labels "Rotational Speed (RPM)" and "Natural Frequency (Hz)" are clearly readable. Tick labels (0–6000 RPM / 0–110 Hz) are readable in INK_SOFT grey. Subtle horizontal grid lines do not compete with data. No spines.
      Data: Five natural frequency curves in canonical Imprint palette order — 1st Bending (#009E73 green, lowest curve ~18–27 Hz), 2nd Bending (#C475FD lavender, ~45→33 Hz decreasing), 1st Torsional (#4467A3 blue, ~52→67 Hz increasing), 2nd Torsional (#BD8233 ochre, ~75→82 Hz), Axial (#AE3030 red, ~90 Hz nearly flat). Three dashed grey EO lines from origin (1×, 2×, 3×). Red diamond critical-speed markers at intersections. Italic small "1×", "2×", "3×" labels along EO lines. Dotted red vertical guide to "Critical: 1180 RPM" annotation near x=1180 RPM. "Operating Range" text label in blue inside the band.
      Legibility verdict: PASS — all primary text clearly readable. Minor: annotation and EO inline labels are small (size=3.5 mm) but still legible at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 fills the outer plot area. Operating range band visible as a subtle dark-blue overlay.
      Chrome: Title, axis labels, and tick labels are rendered in light-colored text (INK = #F0EFE8 / INK_SOFT = #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures observed. Grid lines are subtle light lines. Legend box uses elevated dark background #242420 with light text.
      Data: All five mode curves and three EO dashed lines use identical colors to the light render (green, lavender, blue, ochre, red) — only chrome flipped. Red diamond markers at critical intersections remain clearly visible. "Critical: 1180 RPM" annotation in red is readable.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures. Data colors identical between themes.
