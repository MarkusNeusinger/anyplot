review:
  strengths:
  - 'Complete Campbell diagram with all required elements: 5 mode shapes, 3 engine
    order lines (1x/2x/3x), critical speed markers, and direct mode labeling on the
    right edge'
  - Excellent data quality — realistic rotordynamics data with correct physics (engine
    order line slope = order/60, gyroscopic stiffening/softening on individual modes)
  - 'Clear visual hierarchy: single large red critical-speed marker in the operating
    range vs. small muted gray circles outside creates an immediate focal point communicating
    the engineering risk'
  - Amber operating range shading uses the correct semantic anchor (#DDCC77) for caution/warning;
    paired with dashed boundary lines and 'Operating Range' annotation for context
  - Theme-adaptive chrome correctly implemented in both renders — dark render shows
    no dark-on-dark failures; all text, labels, and legend entries remain readable
  - Clean code structure (KISS pattern) with all sizes explicitly set and no fake
    interactivity
  weaknesses:
  - Spec requires 'a clean legend distinguishing natural frequency curves from engine
    order lines' — current legend only covers critical speed status and operating
    range; modes are labeled directly on the right edge and engine order lines are
    labeled inline. The direct labeling is better UX but misses the explicit spec
    requirement.
  - Seaborn's distinctive features (statistical aggregation, built-in CI bands, FacetGrid,
    violin/kde) are not leveraged — seaborn serves primarily as a thin multi-series
    lineplot/scatterplot wrapper over matplotlib; the bulk of visualization elements
    (operating range shading, EO lines, annotations) are pure matplotlib
  - AE3030 (#AE3030) is used for both the '3rd Bending' mode curve and the 'Critical
    (in range)' legend patch, which could cause initial ambiguity between mode identity
    and marker status — consider using a more distinct color (e.g., amber or a bright
    accent) for the in-range critical speed marker
