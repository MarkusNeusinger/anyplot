review:
  strengths:
  - 'Correct and complete Campbell diagram with all spec-required features: 5 mode
    curves, 3 engine order lines with labels, critical speed markers with status encoding,
    operating range shading.'
  - 'Excellent palette compliance: first series is brand green #009E73, canonical
    order for all 5 modes, amber used semantically for caution zone, red for in-range
    danger markers.'
  - Theme adaptation is fully correct in both renders — no dark-on-dark failures,
    proper INK token threading through tick colors, axis labels, and legend text.
  - Direct mode labeling on the right margin avoids legend clutter — professional
    design choice for a multi-series engineering diagram.
  - sns.scatterplot with hue= and size= semantics is idiomatic use of seaborn dual
    visual encoding for the critical marker hierarchy.
  weaknesses:
  - Outside critical-speed markers cluster densely below 1000 RPM — reduce cs_sizes["Outside"]
    from 45 to 30 and add alpha=0.7 to reduce visual noise from overlapping dots.
  - Engine order lines and annotations are done entirely in raw matplotlib with no
    seaborn involvement — slightly reduces distinctive seaborn character of the implementation.
  - Engine order label positions use fixed RPM offsets (eo_label_x dict) — fragile
    if data changes cause labels to overlap mode frequency curves.
