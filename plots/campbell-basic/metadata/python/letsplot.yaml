review:
  strengths:
  - 'Perfect spec compliance: all 5 natural frequency modes, 3 engine order lines,
    critical speed diamonds, resonance risk zones, and direct EO labeling all present'
  - 'Excellent semantic palette use: #AE3030 reserved for critical speed danger markers
    (skipping position 5 in the ordinal series), #009E73 correctly starts the mode
    sequence'
  - 'Theme-adaptive chrome is fully correct: all text, grid, legend, and background
    tokens adapt correctly between light (#FAF8F1) and dark (#1A1A17) surfaces with
    no dark-on-dark failures'
  - 'letsplot-distinctive feature usage: layer_tooltips() with formatted lines (Speed|@{Speed}
    RPM) on both mode lines and critical point markers, plus dual HTML+PNG export'
  - 'Realistic rotordynamic data: physically correct gyroscopic speed-dependence,
    realistic frequency ranges (25–105 Hz), correct engine-order slopes (order×RPM/60),
    honest sign-change critical-speed detection with linear interpolation'
  - 'Strong data storytelling: muted INK_MUTED EO dashed lines contrast clearly with
    prominent mode curves, resonance zones (alpha=0.08) frame all crossings, and the
    highest-risk intersection is annotated'
  weaknesses:
  - EO direct labels (1×, 2×, 3×) are set at geom_text(size=14) mm, far above the
    letsplot-recommended annotation range of ~3–5 mm. At scale=4 export this renders
    them ~4× larger than axis tick labels, creating a dominant visual mass in the
    lower-left that overlaps with the 1st Bending and 1st Torsional mode lines. Reduce
    to size=4–5 to match annotation hierarchy.
  - The ‘3×’ and ‘2×’ EO labels visibly overlap each other in the lower-left corner
    of both renders (confirmed in both light and dark images). At the corrected annotation
    size (~4 mm) the overlap should resolve automatically; if not, adjust the label
    positions slightly.
  - Highest-risk critical speed annotation ‘Axial × 3× (1997 RPM)’ is set at geom_text(size=11)
    mm — also well above the 3–5 mm recommendation. It overlaps with the Axial mode
    line and 2nd Torsional line near 2000 RPM, 100 Hz. Reduce to size=4–5 mm and consider
    nudging the position slightly upward or offset to clear the data lines.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface matching #FAF8F1 — not pure white, correct anyplot light theme.
      Chrome: Bold centered title "campbell-basic · python · letsplot · anyplot.ai" in dark ink (#1A1A17) at size=16 pt — fills ~70% of plot width (expected for the long mandated title). Subtitle in INK_MUTED is readable. Y-axis label "Frequency (Hz)" and X-axis label "Rotational Speed (RPM)" both with units, readable in INK. Tick labels in INK_SOFT, clearly readable. Caption in italic INK_MUTED at bottom. All chrome elements readable against light background.
      Data: Five natural frequency curves in anyplot palette order — green (#009E73, 1st Bending), lavender (#C475FD, 1st Torsional), blue (#4467A3, 2nd Bending), ochre (#BD8233, 2nd Torsional), cyan (#2ABCCD, Axial). Three diagonal engine order dashed/longdash/dot-dash lines in INK_MUTED gray. Red diamond markers (#AE3030) at all critical speed intersections. Subtle light-red resonance risk zones (alpha=0.08) framing each crossing. Annotation "Axial × 3× (1997 RPM)" in red italic in the upper-middle area.
      Issue: EO direct labels (3×, 2×, 1×) at size=14 mm are disproportionately large relative to axis labels; 3× and 2× visibly overlap each other in lower-left corner. Annotation at size=11 mm overlaps the Axial and 2nd Torsional mode lines near 2000 RPM.
      Legibility verdict: PASS overall, but EO label overlap is a visible VQ-02 issue and disproportionate label sizes are a VQ-01 deduction.

    Dark render (plot-dark.png):
      Background: Warm near-black surface matching #1A1A17 — not pure black, correct anyplot dark theme.
      Chrome: Title and subtitle in light INK (#F0EFE8 / INK_MUTED) — clearly readable against dark background. Axis labels in INK, tick labels in INK_SOFT — all light-colored on dark surface. Legend background uses ELEVATED_BG (#242420), legend text in INK_SOFT — readable. No dark-on-dark failure detected anywhere.
      Data: All five mode curve colors are identical to the light render — #009E73, #C475FD, #4467A3, #BD8233, #2ABCCD. Critical speed diamonds remain #AE3030 (matte red), visible against the dark background. EO labels 3×, 2×, 1× appear in a lighter INK_MUTED tone on the dark surface.
      Issue: Same EO label overlap (3× and 2×) and oversized annotation visible in the dark render.
      Legibility verdict: PASS — no dark-on-dark failures; all text elements readable; data colors identical to light render.
