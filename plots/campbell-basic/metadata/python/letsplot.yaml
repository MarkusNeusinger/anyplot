review:
  strengths:
  - 'Semantic palette usage — #AE3030 reserved for critical speed markers (danger/resonance)
    while positions 1-4,6 serve mode curves; elegant skip that preserves palette semantics
    and reinforces the engineering meaning of ''danger'''
  - 'Two-tier visual hierarchy: thick colored mode curves dominate over thin muted
    EO lines over barely-visible risk zones — guides the eye correctly to the most
    important data layer'
  - Complete spec implementation including the optional resonance risk zones, on-chart
    EO line labels AND legend entries, and annotation of the highest-frequency critical
    speed point
  - Physically correct data model — engine order slope = order/60 (RPM→Hz), critical
    speeds found via zero-crossing linear interpolation, realistic gyroscopic speed-dependence
    for each mode
  weaknesses:
  - Annotation text ('Axial × 3×\n(~1950 RPM)') overlaps with mode curves near the
    top of the chart — slightly awkward placement; consider a horizontal offset or
    nudge_x/nudge_y to clear the surrounding lines
  - EO labels ('1×', '2×', '3×') near the origin cluster at low RPM and are small
    (geom_text size=4mm); increasing to size=5 would improve readability at mobile
    widths
  - Resonance risk zones use alpha=0.08 — barely perceptible in both renders; increasing
    to alpha=0.12-0.15 would make them visible while keeping them subtle
  - 'LM-02: layer_tooltips() is used but the tooltip format strings are straightforward;
    more letsplot-distinctive techniques (e.g., geom_crossbar, stat_summary, or the
    Kotlin-style theme composition) could raise library mastery further'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Bold centered title "campbell-basic · python · letsplot · anyplot.ai" in dark #1A1A17 ink, clearly readable. Subtitle in muted gray below. Y-axis label "Frequency (Hz)" and X-axis label "Rotational Speed (RPM)" both dark and readable. Tick labels (0–6,000 RPM / 0–120 Hz) in INK_SOFT, readable. Caption at bottom in italic muted gray. Legend on right with two sections ("Engine Order", "Natural Frequency") clearly legible.
      Data: Five mode curves in anyplot palette — 1st Bending (#009E73 brand green), 1st Torsional (#C475FD lavender), 2nd Bending (#4467A3 blue), 2nd Torsional (#BD8233 ochre), Axial (#2ABCCD cyan). Three EO lines in muted gray with dashed/longdash/dotdash styles. Red diamonds (#AE3030) mark critical speeds. Very faint reddish resonance risk zones surround each critical point. Small italic red annotation near ~1950 RPM/95 Hz. EO labels "1×", "2×", "3×" near origin.
      Legibility verdict: PASS — all text readable; annotation and EO origin labels are small but legible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title, subtitle, axis labels, tick labels all rendered in light ink (#F0EFE8 / #B8B7B0 range) — clearly visible against dark background. No dark-on-dark failures detected. Legend text light-colored and readable. Caption readable.
      Data: Identical data colors to light render — 1st Bending still #009E73, 1st Torsional #C475FD, 2nd Bending #4467A3, 2nd Torsional #BD8233, Axial #2ABCCD. Red critical speed diamonds unchanged. EO lines rendered in lighter muted tone appropriate for dark surface. Resonance zones remain barely perceptible (alpha=0.08).
      Legibility verdict: PASS — all chrome correctly flips to light-on-dark; data colors identical across themes.
