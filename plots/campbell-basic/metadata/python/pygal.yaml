review:
  strengths:
  - Correct anyplot palette across all 9 series (5 mode curves + 3 EO lines + amber
    critical speed anchor)
  - Semantic amber (#DDCC77) for critical speed markers — correctly uses the warning/caution
    semantic anchor outside the categorical pool
  - Solid vs. dashed linestyle hierarchy clearly distinguishes natural frequency curves
    from engine order excitation lines
  - Three distinct dash patterns for the three engine order lines provide additional
    redundant encoding
  - Thick mode lines (width=7) vs. medium EO lines (width=6) reinforce the visual
    hierarchy
  - 'Correct gyroscopic behavior: modes 1, 2, 5 increase with speed; modes 3, 4 decrease
    — physically realistic'
  - Cubic interpolation on mode curves produces smooth, natural-looking frequency
    curves
  - Critical speed intersections computed correctly via sign-change detection with
    linear interpolation
  - Both light and dark themes fully readable — no dark-on-dark or light-on-light
    issues
  - Clean sys.path workaround for the self-import naming conflict (file is named pygal.py)
  weaknesses:
  - Engine order and mode curve labels are tooltip-only in pygal (dict label format)
    — they appear as interactive tooltips in the HTML but are invisible in the PNG;
    direct line labels near each series would improve readability in the static image
  - No optional shading around critical speed zones (mentioned as optional in spec)
    — amber dot markers alone are sufficient but shaded zones would add storytelling
    depth
  - Pygal's default box frame (all four spines) is retained — cannot remove top/right
    spines in pygal without SVG post-processing, so this is a library limitation rather
    than a code deficiency
