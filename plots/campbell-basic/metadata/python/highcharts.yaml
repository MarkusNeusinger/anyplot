review:
  strengths:
  - 'Semantic color use: red (#AE3030) for critical speeds with palette position 5
    correctly skipped for mode curves is the right design decision'
  - Operating zone plotBands with 'Idle' and 'Normal Operating Range' labels add genuine
    engineering context without cluttering
  - Critical speed detection using sign-change interpolation with fractional position
    is correct and produces accurate intersection coordinates
  - Both theme renders use full adaptive tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED, GRID) throughout all chart options
  - EO data label filter with endpoint-only display avoids label clutter while still
    annotating the engine order lines
  weaknesses:
  - X-axis label 'Rotational Speed (RPM)' at 56px sits close to the bottom canvas
    edge — increase marginBottom from 130 to 160 or spacingBottom from 40 to 60 to
    give the label more breathing room
  - Highcharts default full-frame (all four spines) is present; removing top and right
    axis lines would significantly improve visual refinement per style guide
  - The '1x' EO endpoint label (at 6000 RPM, ~100 Hz) may be obscured by or overlap
    with the floating legend box — adjust label_x offset or filter anchor to ensure
    visibility
