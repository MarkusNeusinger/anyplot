      Chrome: Main title rendered in light text (#F0EFE8), clearly visible against dark background. Subplot titles and axis labels also in light ink. Tick labels in softer light (#B8B7B0) for secondary hierarchy. Grid lines subtle, no dark-on-dark failures. No near-black text on near-black background.
      Data: Identical data colors to light render—green Revenue, orange Costs, colored bars, pie segments, green scatter points. Only chrome (background, text, grid tone) differs from light render. Brand green #009E73 remains prominent and readable on dark surface.
      Legibility verdict: PASS - All text readable in light tones, data colors unchanged, grid visible, no theme-adaptation failures detected.
