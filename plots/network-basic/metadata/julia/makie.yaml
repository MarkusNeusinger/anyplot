      Data: 22 module nodes colored by layer (Core=#009E73 green, Data=lavender, API=blue, UI=ochre), sized by degree so hub modules (Auth, Gateway, PaymentAPI) read visibly larger. Auth (top-degree node) additionally carries a dark outer ring for focal emphasis. Gray edges vary in width/opacity by coupling-strength weight, each terminating in a small triangular arrowhead pointing at the depended-upon module, correctly encoding the directed "depends on" relationship.
