review:
  strengths:
  - Deterministic force-directed (Fruchterman-Reingold) layout computed in-code with
    no RNG — reproducible and shows genuine algorithmic implementation rather than
    a canned layout.
  - Clever use of `useXScale`/`useYScale` plus custom SVG marks inside `ChartContainer`
    to build a network/node-link graph — a chart type MUI X has no built-in component
    for — while staying entirely within the community `@mui/x-charts` surface.
  - Node radius encodes degree centrality, node color encodes friend-circle group
    with a matching hand-built legend, and edges are drawn with a subtle low-opacity
    stroke so the 26-edge graph stays readable.
  - Clean removal of axes/chrome (no ticks, gridlines, or axis lines rendered), canonical
    Imprint palette assignment (Family = palette[0]/brand green), and theme tokens
    (`t.ink`, `t.pageBg`, `t.inkSoft`) threaded through consistently across both renders.
  - Canvas is exactly 2400×2400, matching the declared `square` orientation directive.
  weaknesses:
  - The Aisha↔Ruby bridge edge is drawn as a straight line from Aisha's center straight
    down, passing directly through the middle of the 'Aisha' text label (visibly crossing
    the 's'/'h' characters in both renders) — route this bridge edge around the label,
    or nudge the label further down / offset it so no edge segment passes under a
    node when a downward-going edge exists.
  - At the ~400px thumbnail/preview scale, the 13px node labels (20 of them) become
    hard to read given how dense the graph is — consider a slightly larger label font
    or reducing label count at small preview sizes for better mobile/thumbnail legibility.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "network-basic · javascript · muix · anyplot.ai" centered at top in bold dark ink, clearly readable. A hand-built legend in the top-left lists the four groups (Family, College, Work, Neighbors) with matching color swatches and dark ink text. No axes, ticks, or gridlines are rendered (appropriate for a node-link diagram). Node name labels sit below each node in dark ink and are legible at full resolution.
      Data: 20 circular nodes colored by group — Family = brand green (palette[0]), College = lavender/purple (palette[1]), Work = blue (palette[2]), Neighbors = ochre/amber (palette[3]). Node radius scales with degree (more-connected nodes are visibly larger, e.g. hub nodes within each cluster). 26 edges are drawn as thin, semi-transparent gray lines connecting nodes, including 6 "bridge" edges that visibly link the four otherwise-separate friend-circle clusters. Four clusters are clearly visually separated by the force-directed layout, forming a loose diamond arrangement.
      Legibility verdict: PASS overall. One minor overlap: the Aisha↔Ruby bridge edge is drawn straight through the "Aisha" text label, crossing behind the letters — text is still legible but the line visibly cuts through it.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title and legend as the light render, now rendered in light/cream ink against the dark background — fully readable, no dark-on-dark issues. Legend swatches and node labels are equally legible.
      Data: Node and edge colors are pixel-identical to the light render (same four Imprint hues, same edge gray/opacity) — only the chrome (background, text) flipped as expected. Layout, node sizes, and edge routing are identical to the light render (deterministic layout, no re-randomization between themes).
      Legibility verdict: PASS overall. Same minor Aisha-label/edge overlap as the light render (layout-driven, not theme-driven).
