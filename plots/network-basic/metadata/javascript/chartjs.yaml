review:
  strengths:
  - Genuine force-directed (Fruchterman-Reingold) layout implemented from scratch
    with a deterministic seeded LCG, producing natural community clustering by department
    without any external graph library
  - 'Correct Imprint palette usage — Engineering (first series) is brand green #009E73,
    remaining three departments follow canonical order (lavender, blue, ochre), identical
    hues across light and dark renders'
  - Theme-adaptive chrome correctly threaded through ANYPLOT_TOKENS — background,
    title, legend text, and edge stroke color all swap appropriately between light
    and dark
  - Node radius encodes degree (connection count), giving hub nodes visual prominence
    and a clear size hierarchy
  - Tooltip surfaces node name and degree count, a legitimate use of Chart.js interactivity
    that adds value in the HTML detail view without being required in the static PNG
  - Edges rendered via a lightweight custom plugin (beforeDatasetsDraw) at low alpha
    (0.35), keeping connections visible without competing with node markers
  - 'animation: false set correctly and canvas renders at the correct square 2400x2400
    dimensions per the //# anyplot-orientation directive'
  weaknesses:
  - No static node labels are drawn on the canvas — with 20 named individuals, the
    PNG alone (without hovering) can only convey department membership via color,
    not individual identity. Consider labeling at least the highest-degree hub per
    cluster directly on the canvas.
  - The spec's optional edge 'weight' attribute is unused — all edges render at the
    same width/alpha, so intra-department ties and the 6 cross-department bridge edges
    look visually identical. Varying line width or opacity for bridge edges vs intra-cluster
    edges would reinforce the community structure.
  - Data storytelling is entirely implicit (clusters emerge only from the force layout)
    — no annotation or callout highlights the most-connected node or a notable cross-team
    bridge, which would strengthen the visual hierarchy further.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "network-basic · javascript · chartjs · anyplot.ai" is dark ink, centered top, clearly legible. Legend at bottom lists four department swatches (Engineering=green, Design=lavender, Product=blue, Marketing=ochre) with dark text, all readable. No axis lines/ticks are shown, which is correct for a node-link diagram (scales are intentionally hidden).
      Data: 20 circular nodes colored by department (Engineering=brand green #009E73, Design=lavender, Product=blue, Marketing=ochre), sized by connection degree — larger circles are hubs. Nodes have a subtle pageBg-colored stroke that separates overlapping markers. 34 thin, low-alpha gray edges connect nodes, forming four visually distinct clusters (one per department) joined by a handful of sparser cross-department bridge edges. Connections remain individually traceable — the network is not overplotted.
      Legibility verdict: PASS — all title, legend, and structural elements are clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title and legend text render in light ink (near-white), clearly visible against the dark background. Edge lines use a lighter soft-ink tone at the same 0.35 alpha, remaining visible without overpowering the dark surface.
      Data: Node colors are pixel-identical to the light render (green, lavender, blue, ochre) — only the chrome (background, text, edges) flipped, confirming palette consistency across themes. Same four-cluster layout, same node sizing by degree.
      Legibility verdict: PASS — no dark-on-dark failures; all title, legend, and tick-free chrome is clearly legible, and data markers stay distinguishable from the near-black background.
