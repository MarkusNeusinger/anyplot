review:
  strengths:
  - Hub labels (Ivy, Theo, Grace, Mia) added for the highest-degree node per department,
    giving the static PNG individual identity on top of department color — directly
    addresses the prior attempt's SC-02 weakness
  - 'Edge weight is now visually encoded: intra-department ties scale line width/alpha
    with tie-strength while cross-department bridges render thin and faint, making
    the community structure legible at a glance'
  - Genuine from-scratch Fruchterman-Reingold force-directed layout with a deterministic
    seeded LCG produces natural, non-overlapping clustering by department
  - 'Correct Imprint palette usage — Engineering (first series) is brand green #009E73,
    remaining three departments follow canonical palette order, and data hues are
    pixel-identical across light/dark renders'
  - Theme-adaptive chrome threaded correctly through ANYPLOT_TOKENS — background,
    title, legend, edge stroke, and the hub-label callout background all flip appropriately
    between themes
  - Node radius encodes degree, giving hub nodes clear visual hierarchy; tooltip callback
    surfaces node name + connection count as a bonus interactive layer
  - Clean Chart.js plugin usage (beforeDatasetsDraw for edges, afterDatasetsDraw for
    labels) is a distinctive, idiomatic way to build a network graph on top of the
    core scatter type without reaching for an external library
  - 'animation: false set correctly and the canvas renders at the correct square 2400×2400
    dimensions'
  weaknesses:
  - Only 4 of 20 nodes are labeled (one hub per department) — a reasonable clutter-avoidance
    tradeoff, but the other 16 individuals are still only identifiable by department
    color, not by name, in the static PNG
  - Data storytelling still relies mostly on the viewer parsing layout and edge weight
    themselves; no annotation or emphasis explicitly calls out the most-connected
    node or a notable cross-team bridge
  - Hub-label font (15px CSS in the 1200px square mount) is legible but on the smaller
    side relative to the node markers it sits above — could be nudged up slightly
    for extra polish at mobile widths
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "network-basic · javascript · chartjs · anyplot.ai" renders in dark ink, centered top. Legend at the bottom lists four department swatches (Engineering=green, Design=lavender, Product=blue, Marketing=ochre) in dark, readable text. Four hub-node name labels (Ivy, Theo, Grace, Mia) sit above their nodes on a semi-transparent page-bg pill so they stay legible over edges/nodes.
      Data: 20 circular nodes colored by department (first series = brand green #009E73 for Engineering) and sized by connection degree (larger = more connected hub). 34 edges join them into four visually distinct clusters; intra-department edges are heavier/darker (scaled by tie-strength weight), cross-department bridge edges are thin and faint, making the community structure legible. No axis lines/ticks are shown, which is correct for a node-link diagram.
      Legibility verdict: PASS — all text (title, legend, hub labels) is clearly readable against the light background, including at the 400px mobile-scale thumbnail.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title and legend text flip to light ink and remain clearly legible; hub-label pills flip to the dark page background with light ink text; edges use the same soft-ink tone at the same alpha values as light mode.
      Data: Node colors are pixel-identical to the light render (green/lavender/blue/ochre) — confirms only chrome flipped between themes. Same cluster layout, degree-based sizing, and weighted edge treatment.
      Legibility verdict: PASS — no dark-on-dark failures; all text (title, legend, hub labels) stays legible against the near-black surface, including at the 400px mobile-scale thumbnail.
