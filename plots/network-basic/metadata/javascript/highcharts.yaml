review:
  strengths:
  - Custom Fruchterman-Reingold force-directed layout implemented from scratch (fixed-seed
    LCG) in the absence of the networkgraph module — genuinely reveals the three-community
    clustering structure with visible bridge edges between communities
  - 'Correct Imprint palette in canonical order: Work=#009E73 (green), College=#C475FD
    (purple), Family=#4467A3 (blue), identical across both themes'
  - Redundant encoding via community color AND marker shape (diamond/square/triangle)
    — strong colorblind accessibility without relying on hue alone
  - Node size encodes degree (connection count), adding a data-driven visual dimension
    beyond position
  - 'Clean minimalist chrome: axes hidden, no gridlines, balanced margins (~84% width
    / ~78% height utilization), subtle page-bg marker stroke prevents visual merging
    at edge crossings'
  - No clipping and no label overlap in either theme; title, subtitle, and legend
    are correctly theme-adaptive
  weaknesses:
  - Node-degree size range is narrow (marker radius ~9.6-15px for degree 2-5), so
    hub nodes barely stand out from leaf nodes — widen the size mapping (e.g. a steeper
    multiplier or a squared term) for a clearer visual-hierarchy focal point (DE-03)
  - The manual layout is rendered as a generic scatter+line composition that could
    be reproduced identically in any charting library — no Highcharts-distinctive
    feature is leveraged beyond basic series/dataLabels. Consider a Highcharts-specific
    touch (e.g. per-point dataLabel styling tied to hub status, or leveraging marker.symbol
    variety more deliberately) to raise Library Mastery (LM-02)
  - Edge weight (mentioned as optional in the spec's data model) isn't visualized
    — all edges share uniform lineWidth/opacity. Varying edge width or opacity by
    tie strength would add another dimension of feature coverage (DQ-01)
  - Data-label font size (12px) is on the small side relative to the marker sizes
    — bump to ~13-14px for stronger mobile legibility (VQ-01)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches spec — not pure white.
      Chrome: Title "network-basic · javascript · highcharts · anyplot.ai" in bold dark ink, subtitle "Friendship network across three communities — node size = number of connections" in softer gray beneath it, both clearly legible. Legend at the bottom-center reads "Work" (green diamond), "College" (purple square), "Family" (blue triangle), all readable against the light background.
      Data: 20 labeled nodes connected by thin gray edges, arranged via a force-directed layout into three visually distinct clusters (top-right = Work/green diamonds, mid-left = College/purple squares, bottom-right = Family/blue triangles) joined by a few sparse bridge edges (Ava-Leo, Mia-Ruby, Kai-Theo). Node size scales mildly with degree (Ava and Mia, the best-connected Work nodes, render visibly larger than leaf nodes like Zoe or Owen). First categorical series (Work) is #009E73 as required.
      Legibility verdict: PASS — all text (title, subtitle, node labels, legend) is clearly readable against the light surface, no overlap or clipping found (checked right and bottom canvas edges directly).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches spec — not pure black.
      Chrome: Title and subtitle flip to light ink (#F0EFE8 / lighter gray) and remain fully legible; legend text also flips to a light, readable tone. No dark-on-dark text anywhere.
      Data: Identical node/edge structure and identical data colors to the light render — Work green #009E73, College purple #C475FD, Family blue #4467A3 unchanged, confirming only chrome (background/text) flipped between themes, not the categorical data colors.
      Legibility verdict: PASS — all text is clearly readable against the dark surface; no dark-on-dark failures observed.
