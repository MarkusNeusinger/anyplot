review:
  strengths:
  - Custom Fruchterman-Reingold force-directed layout implemented from scratch with
    a fixed-seed LCG, producing a clean, non-overlapping node arrangement — a faithful
    substitute for the unavailable networkgraph module.
  - 'Redundant encoding: community color (Imprint palette positions 1-3, Work/College/Family)
    plus marker shape (diamond/square/triangle) keeps groups distinguishable even
    under color-vision deficiency.'
  - Node radius scales with degree-squared and hub nodes get bold, enlarged data labels
    — creates immediate visual hierarchy that points straight at the structurally
    important nodes (Ava, Leo, Kai, Mia, Ruby).
  - Edges are split into three tiers by tie-strength with varying line width and opacity,
    visually encoding relationship strength without any extra legend clutter.
  - 'Both light and dark renders are fully theme-correct: identical data colors across
    themes, correctly flipped chrome, and no dark-on-dark/light-on-light failures
    anywhere in either render.'
  weaknesses:
  - 'Whitespace is unbalanced across the square canvas: the top-left quadrant is essentially
    empty while the Work/College/Family clusters concentrate along a diagonal band
    from top-right to bottom-right — consider rotating/re-seeding the initial layout
    angles so the network fills the canvas more evenly.'
  - The manual force-directed layout (nested O(n^2) repulsion loop, edge-attraction
    loop, 300-iteration cooling schedule, plus rand()/nodeRadius() helpers) is a large
    departure from the simple Imports -> Data -> Plot -> Save KISS structure — necessary
    given the missing networkgraph module, but still a meaningful complexity cost
    worth a short explanatory comment block if not already present.
  - Node labels are set at 13px/15px (below the library's own 14px tick-label baseline)
    — legible at full resolution but on the small side once the PNG is scaled to a
    ~400px mobile thumbnail, given 20 labeled nodes packed into a 2400x2400 canvas.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: bold dark title "network-basic · javascript · highcharts · anyplot.ai" top-left, grey subtitle explaining the node-size encoding below it, dark node labels above each marker (bold+larger for hub nodes: Ava, Leo, Kai, Mia, Ruby), legend at bottom-center (Work/College/Family with matching swatches) in dark grey text. All chrome elements are clearly readable against the light background.
      Data: 20 nodes across three communities — green diamonds (Work), lavender/purple squares (College), blue triangles (Family) — first series (Work) correctly uses #009E73 brand green. Nodes are connected by grey edge lines whose width/opacity vary with tie strength (thin+faint for weak ties, thick+dark for strong ties). Node marker size scales with degree, creating a handful of visibly larger hub nodes.
      Legibility verdict: PASS — no overlapping text, no clipped elements, all labels and legend text fully legible.

    Dark render (plot-dark.png):
      Background: warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: title and subtitle render in light/off-white text, node labels in light grey/white, legend text light-colored. Layout, node positions, and edge routing are pixel-identical to the light render (only chrome flipped).
      Data: node fill colors are identical to the light render (green/lavender/blue), confirming the categorical palette does not shift between themes. Edge lines render as a lighter grey suited to the dark backdrop, still legible against the near-black surface.
      Legibility verdict: PASS — no dark-on-dark failures detected; every title, subtitle, node label, and legend entry is clearly legible against the dark background.
