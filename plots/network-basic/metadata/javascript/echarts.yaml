review:
  strengths:
  - Custom deterministic Fruchterman-Reingold force-directed layout (fixed-seed LCG)
    keeps both theme renders pixel-identical instead of relying on echarts' live,
    non-reproducible physics simulation.
  - Two-pass label-collision-avoidance system (canvas-edge side flip plus pairwise
    re-check) keeps all 18 node labels legible even in the dense APIGateway hub area.
  - Degree-based node sizing (26-78px) gives immediate visual hierarchy, making the
    API gateway hub instantly recognizable as the most-connected node.
  - Label background chips matched to the page background render 'invisible' except
    where an edge crosses behind the text, keeping labels legible without a heavy
    box style.
  - Correct canonical Imprint palette order across all 4 groups (Frontend/Backend/Data/Infra),
    with theme-correct chrome in both light and dark renders.
  weaknesses:
  - Canvas whitespace is slightly uneven -- the layout is denser toward the lower-left/central
    hub and sparser near the top and far right; rebalancing the rescale-to-fit step
    would even out margins for a small VQ-05 gain.
  - Visual hierarchy relies purely on size/color encodings with no explicit callout
    of the central-hub insight -- not required by the spec, but would push DE-03 from
    'good' to 'excellent'.
  - Opts out of echarts' native layout:'force' in favor of a hand-rolled layout --
    well-justified for determinism/reproducibility, but means the library's built-in
    force simulation isn't demonstrated (LM-01).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 -- not pure white.
      Chrome: Title "Microservice Dependency Graph · network-basic · javascript · echarts · anyplot.ai" centered at top in dark ink, comfortably sized and not clipped. Horizontal legend below the title (Frontend / Backend / Data / Infra) with colored circle swatches, clearly readable. Node labels are dark gray text on small background chips that blend into the page background except where an edge crosses behind them.
      Data: 18 nodes colored by group -- Frontend (#009E73 brand green: WebApp, MobileApp, AdminUI), Backend (#C475FD lavender: APIGateway, AuthService, OrderService, PaymentService, SearchService, UserService), Data (#4467A3 blue: PrimaryDB, CacheStore, SearchIndex, MessageQueue, DataWarehouse), Infra (#BD8233 ochre: LoadBalancer, CDN, ConfigServer, MetricsCollector). Node size scales with degree -- APIGateway (largest) and PrimaryDB read as the central hubs. 30 thin, low-opacity gray edges connect the nodes with no crossings that obscure labels.
      Legibility verdict: PASS -- all title, legend, and node-label text is clearly readable against the light background; no overlap detected anywhere, including the dense APIGateway/AuthService/UserService cluster.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 -- not pure black.
      Chrome: Same title and legend layout, rendered in light ink/text (title and legend text are light gray/white). Node-label chips now blend into the dark background, remaining legible.
      Data: Node and edge colors are pixel-identical to the light render (same green/lavender/blue/ochre group colors, same degree-based sizing, same layout positions) -- only the chrome (background, text, label-chip fill) flips to the dark theme.
      Legibility verdict: PASS -- no dark-on-dark failures observed; all text (title, legend, node labels) is clearly readable against the near-black background, and brand green remains vivid on the dark surface.
