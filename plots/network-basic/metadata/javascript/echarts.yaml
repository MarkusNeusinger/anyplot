review:
  strengths:
  - Precomputed, seeded Fruchterman-Reingold layout (LCG seed 42) keeps node positions
    pixel-identical across light/dark renders instead of relying on echarts' live
    force simulation
  - Node size encodes degree (connections), creating an immediate visual hierarchy
    with APIGateway as the obvious hub
  - Group-colored nodes (Frontend/Backend/Data/Infra) with a matching legend make
    the microservice architecture's clusters easy to read
  - Label position flips to the left for right-side nodes (LABEL_FLIP_X) and label
    chips use a solid page-bg fill so text stays legible where edges cross behind
    it
  - Realistic, neutral dataset (18-node/30-edge microservice dependency graph) sits
    comfortably within the spec's 10-50 node range
  - First categorical color is Imprint brand green (#009E73) with the remaining groups
    following canonical palette order; both themes are fully theme-adaptive with no
    dark-on-dark or light-on-light chrome
  weaknesses:
  - 'PrimaryDB and PaymentService sit close together and both default their label
    to the right side, so their label chips butt directly against each other with
    no gap — reads as one continuous string ''PrimaryDB : PaymentService'' at a glance
    in both themes. Give one of the two nodes (e.g. PaymentService, whose neighbors
    are all further right) a left-side label, or add a second flip rule for nodes
    whose right-side label would collide with an already-placed neighbor label.'
  - 'SC-02: the ''labels legible without overlapping other elements'' requirement
    from the spec notes is not fully met at that one collision point — otherwise labels
    are clean.'
  - 'DE-01: the force layout, degree sizing, and label-flip logic are genuine custom
    work, but the graph still reads as a fairly standard node-link diagram with no
    additional visual device (e.g. edge-width-by-weight, subtle group hulls/backgrounds)
    to push it further past a solid baseline.'
  - 'LM-02: uses graph series with categories, per-node label placement, and a custom
    tooltip formatter, but doesn''t reach for any more distinctive echarts graph features
    (e.g. edgeLabel, categorical legend.selected toggling) that would showcase deeper
    library mastery.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "Microservice Dependency Graph · network-basic · javascript · echarts · anyplot.ai" centered at top in dark ink, clearly legible. Horizontal legend below it (Frontend/Backend/Data/Infra) with circular swatches, dark-ink text, all legible. 18 node labels in medium-gray text on small light-bg chips, mostly clean against the off-white background and against the light-gray edge lines.
      Data: 18 circular nodes colored by group — Frontend nodes green (#009E73), Backend nodes lavender/purple, Data nodes blue, Infra nodes ochre/amber — matching the canonical Imprint categorical order with brand green first. Node size scales with degree (APIGateway, the largest node, is the visual hub). 30 light-gray edges at reduced opacity connect nodes without overwhelming the layout. One legibility issue: the "PrimaryDB" and "PaymentService" node labels sit immediately adjacent with no gap, their background chips touching so the two labels read as one continuous phrase.
      Legibility verdict: PASS overall, with one flagged weak point (PrimaryDB/PaymentService label crowding) that is readable on close inspection but not clean at a glance.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title and legend, now in light/off-white text, clearly legible against the dark background. No dark-on-dark text anywhere; tick-free network view has no axis chrome to check.
      Data: Node colors are pixel-identical to the light render (green/lavender/blue/ochre) — only the background, text, and edge tone flipped to the dark theme, as required. Edge lines remain visible as a soft light-gray against the near-black background. The same PrimaryDB/PaymentService label-crowding issue reproduces identically here.
      Legibility verdict: PASS overall, with the same single flagged weak point as the light render (label crowding, not a dark-on-dark failure).
