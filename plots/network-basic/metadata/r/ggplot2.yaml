review:
  strengths:
  - Correctly avoids the forbidden ggraph dependency by implementing a native Fruchterman-Reingold
    force-directed layout in base R/dplyr, exactly as prompts/library/ggplot2.md requires
    (no fallback to another backend)
  - 'Fully clean layout: axis title/text/ticks and grid are removed via theme(), which
    is the right call for a node-link diagram since the layout coordinates carry no
    semantic meaning'
  - No overlapping labels, nodes, or edges anywhere in either render, even in the
    two dense clusters (Felix/Ivy/Theo/Ruby/Jack cluster and Lily/Lucas/Grace/Ella/Owen/Mason
    cluster)
  - Node size correctly encodes degree (scale_size(range = c(3, 7))), producing clear
    hub nodes (Owen, Mason, Noah, Leo, Nora) that add visual hierarchy
  - 'Palette and theme are fully compliant: nodes are Imprint #009E73 in both renders,
    chrome (PAGE_BG/INK/INK_SOFT) flips correctly between #FAF8F1 light and #1A1A17
    dark, and the data color is identical across themes'
  - Canvas is exactly 2400x2400 (square target, gate passed), title format matches
    'network-basic · r · ggplot2 · anyplot.ai' exactly
  - 'Reproducible (set.seed(42)) and KISS: a single flat script, no unused imports,
    ggsave uses the required ragg::agg_png device'
  weaknesses:
  - No legend or caption explains that node size encodes degree — a first-time viewer
    has no way to know larger circles mean more connections; add a short caption/subtitle
    (e.g. 'Node size = number of friendships') or a small manual size-legend
  - At mobile scale (~400px), the labels on lower-degree nodes (e.g. Zoe, Ella, Lucas)
    become quite small and are the first thing to become hard to read on a phone;
    bump geom_text size slightly (from 2.6 toward ~3.0-3.2) to hold up better when
    scaled down
  - The spec's Applications section calls out identifying 'communities' as a key network-graph
    use case, and the sibling matplotlib/plotly implementations encode a group/department
    attribute with categorical Imprint colors; this version relies only on implicit
    spatial clustering from the force layout with a single flat color, which is valid
    but leaves a real signal (community membership) unencoded — consider adding a
    `group` field to the node data and mapping it to scale_color_manual(values = IMPRINT_PALETTE)
  - Edge weight (mentioned as an optional edge attribute in the spec) is not modeled
    at all — every edge has identical linewidth/alpha regardless of any relationship
    strength, which is a missed opportunity for an additional data dimension
  - 'Aesthetic polish is solid but plain: beyond node-size-by-degree there''s no additional
    refinement (e.g. slightly darker/heavier styling on hub nodes, edge width tied
    to weight) that would push this from ''clean and correct'' to a genuinely opinionated
    custom design'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "network-basic · r · ggplot2 · anyplot.ai" is centered at the top in dark ink,
        clearly legible. No axis titles, tick labels, or grid lines are drawn (intentionally blank
        theme, appropriate since layout coordinates are not meaningful data axes). Node name labels
        (Ava, Liam, Mia, Noah, Zoe, Ethan, Lily, Mason, Grace, Owen, Ella, Lucas, Nora, Jack, Ruby,
        Leo, Ivy, Felix, Maya, Theo) are set in dark ink below each node and are all legible against
        the light background, with no overlap onto other text, nodes, or edges (verified via zoomed
        crops of the two densest clusters).
      Data: 20 nodes rendered as solid Imprint-green (#009E73) circles, sized 3-7pt in proportion to
        each node's degree (larger circles = more connections; hub nodes Owen, Mason, Noah, Leo, and
        Nora are visibly largest). 31 edges are thin, semi-transparent grey (INK_SOFT, alpha 0.45)
        line segments connecting related nodes. Three loosely separated clusters are visible from the
        force-directed layout, implying friend-group structure spatially even though no color encodes
        it explicitly.
      Legibility verdict: PASS — all title and label text is clearly readable against the light
        background; no light-on-light or clipped text found.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Title and all 20 node labels are rendered in light ink (#F0EFE8), clearly legible
        against the dark background. No axis chrome is drawn, matching the light render's intentional
        blank-theme choice. No dark-on-dark text was found anywhere.
      Data: Node fill color is identical Imprint green (#009E73) to the light render, confirming data
        colors do not shift between themes — only the background and text ink flipped, as required.
        Edge color/alpha likewise reads the same relative to its background.
      Legibility verdict: PASS — all title and label text is clearly readable against the dark
        background; no dark-on-dark failures observed.
