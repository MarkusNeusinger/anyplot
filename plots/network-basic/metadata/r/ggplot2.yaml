        to each node's degree (hub nodes Owen, Mason, Noah, Leo, Nora are visibly largest). 31 edges
        are grey (INK_SOFT, alpha 0.45) segments whose thickness now varies with friendship weight -
        the three cross-circle bridge edges read visibly thinner than the dense within-circle ties.
