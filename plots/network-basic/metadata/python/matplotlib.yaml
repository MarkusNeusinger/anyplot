review:
  strengths:
  - 'Dual edge styling: thin grey for internal connections and thick amber for cross-department
    bridges creates excellent visual hierarchy and immediate storytelling impact'
  - FancyArrowPatch with arc3 connectionstyle renders elegant curved edges that are
    idiomatic and aesthetically pleasing in matplotlib
  - Degree-based node sizing encodes connectivity information seamlessly without cluttering
    the graph
  - 'Full theme-adaptive chrome: backgrounds, text, legend frame, and node borders
    all flip correctly between light (#FAF8F1) and dark (#1A1A17) themes'
  - Correct Okabe-Ito palette in canonical order for all 4 department groups
  - Realistic, neutral scenario (company social network with named individuals) with
    plausible departmental bridging
  - No networkx dependency — custom spring layout avoids extra package requirement
  weaknesses:
  - Node labels at 14pt are below the 16pt minimum guideline — increase to 16pt or
    18pt for compliance with style guide text legibility requirements
  - Title format is 'Social Network · network-basic · matplotlib · anyplot.ai' but
    required format is exactly '{spec-id} · {library} · anyplot.ai' (= 'network-basic
    · matplotlib · anyplot.ai') — the extra prefix causes spec compliance deduction
  - The center-right cluster (Bob, Carol, Alice, Frank, Grace, Henry, Ivy, Leo area)
    is visually crowded, with nodes overlapping neighbours and edges cutting through
    labels — spring layout needs stronger repulsion or better initial separation to
    spread these nodes more
  - Spring layout code is ~35 lines of explicit O(n²) iteration that inflates the
    script considerably; using networkx (added as an import dependency) would reduce
    this to a one-line call and improve Library Mastery score
