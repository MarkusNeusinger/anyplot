review:
  strengths:
  - Genuinely creative from-scratch force-directed layout (Fruchterman-Reingold-style,
    run independently per department) produces four clean, spatially distinct clusters
    without relying on networkx
  - 'Correct Imprint palette usage: first series is brand green #009E73, and the 4
    departments use canonical positions 1-4 in order, identical across both themes'
  - 'Theme-adaptive chrome is fully correct and consistent between renders - both
    backgrounds match spec (#FAF8F1 / #1A1A17), legend frame, text, and edge colors
    all flip correctly with no dark-on-dark or light-on-light failures'
  - Cross-department bridge edges are highlighted with matte red (#AE3030, Imprint
    position 5) plus increased linewidth and alpha, giving a redundant (non-color-only)
    encoding that tells a clear structural story
  - Node size correctly encodes degree (connection count) as specified in the spec's
    optional-feature notes
  - Clean, reproducible, single-file KISS script (fixed np.random.seed(42), no functions/classes,
    only used imports, no fake interactivity)
  - Correct mandated title format with a sensible descriptive prefix; canvas dimension
    gate passed and no edge-clipping (AR-09) observed in either render
  weaknesses:
  - 'Systemic text/edge overlap: node labels use a fixed fontsize=13 regardless of
    node radius (which only spans ~15-20pt for s=700-1180), so multi-character names
    spill far outside their node circles in nearly every cluster and frequently cross
    directly through edge lines. Clearest cases: ''Alice'' and ''Mia'' each have a
    red bridge edge cutting straight through the letters, and ''Kate'' has a gray
    edge crossing through the middle of the text. Also visible at ''Bob'', ''Paul'',
    ''Ryan'', and ''Henry'' where lines clip the label''s bounding box. This directly
    violates the spec''s explicit note: ''Labels should be legible without overlapping
    other elements.'''
  - 'Fix direction for repair: either increase scatter marker size substantially so
    the circle actually contains a bold 4-6 character label at the current fontsize,
    reduce label fontsize so the shortest-name node still fully contains longer names
    (or scale fontsize/name length like the title formula), or move labels outside
    the node as external tags with a short leader/offset instead of centering them
    inside a circle sized only for degree encoding.'
  - 'Design Excellence and Layout scores are pulled down by the same root cause: the
    disproportion between fixed-size bold text and variably-sized small node markers
    reads as unrefined despite the otherwise sophisticated layout algorithm and clean
    color system.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 as required - not pure white.
      Chrome: Title "Social Network · network-basic · python · matplotlib · anyplot.ai" in dark ink, fully visible and readable, ~60% of plot width. "Departments" legend box (top center) with 4 color swatches (Engineering/Research/Marketing/Design) in a bordered elevated-surface box, dark gray text, clearly readable, no overlap with the network below it.
      Data: 20 people-nodes in 4 spatially distinct department clusters (upper-left green Engineering, upper-right purple Research, lower-right blue Marketing, lower-left ochre Design), sized by degree, connected by curved gray (intra-department) and red (cross-department bridge) edges. First series (Engineering) is Imprint brand green #009E73; other 3 departments use canonical Imprint positions 2-4 (lavender, blue, ochre); bridge edges use Imprint position 5 (matte red). Bold black node labels are readable against every node color and against the cream background where they overflow, BUT several labels (e.g. "Alice", "Mia", "Kate") have an edge line running directly through the letters because the fixed-size bold text is wider than the small node circles.
      Legibility verdict: FAIL - text is high-contrast and each letter is individually identifiable, but multiple labels are directly overlapped by edge lines (spec explicitly requires labels not to overlap other elements), so this does not pass a strict overlap check.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 as required - not pure black.
      Chrome: Same title, now in light ink (#F0EFE8), fully readable against the dark background. Legend box uses the dark elevated surface (#242420) with light gray swatches and legend text, clearly readable, no dark-on-dark failures.
      Data: Identical layout and identical Imprint data colors to the light render (green/lavender/blue/ochre nodes, matte-red bridge edges) - only the chrome (background, legend frame, text ink) flipped, as required. Bold white/near-white node labels are readable against every node color and the near-black background, confirming no dark-on-dark text. The same overlap issue reproduces here since it is a geometry problem, not a theme-color problem: the same edges cross through the same labels ("Alice", "Mia", "Kate", etc.) in both renders.
      Legibility verdict: FAIL - text itself is legible (good contrast, bold weight), but the same systemic label/edge overlap from the light render is present, so this also fails a strict overlap check.
