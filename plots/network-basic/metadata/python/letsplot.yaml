review:
  strengths:
  - Hand-rolled force-directed layout (spring physics with intra-group repulsion/attraction
    plus a centroid anchor) produces four visually distinct, well-separated community
    clusters instead of relying on a canned layout function — a genuine display of
    algorithmic craft for a static network diagram.
  - Node size is mapped to degree (size = 6 + degree * 1.8), so hub individuals (e.g.
    Carol, Noah, Paul) read as clear visual focal points, giving the chart real data
    storytelling.
  - geom_curve edges with alpha=0.6 read cleanly against both surfaces and make the
    cross-department bridge edges easy to trace without visual clutter.
  - layer_tooltips() is configured with label, department, and connection-count lines
    for the HTML output — a well-configured interactive feature that adds real value
    beyond the static PNG.
  - Imprint categorical palette is applied in canonical order (Research=#009E73 first,
    then Marketing/Engineering/Design) and verified pixel-for-pixel correct against
    each node's actual department in both themes.
  - 'Theme-adaptive chrome (background, ink, legend box) is threaded through correctly
    — both renders are legible with no dark-on-dark or light-on-light failures, and
    the correct #FAF8F1 / #1A1A17 backgrounds are used.'
  - Canvas is exactly 3200x1800 (ggsize(800,450) + scale=4), and no title/legend/label
    content is clipped at the canvas edge in either render.
  weaknesses:
  - 'Confirmed label/node misattribution at the Marketing↔Design cluster boundary:
    Quinn''s node sits at data position (x=0.823, y=0.431), but its text label renders
    at the fixed offset label_y = y + 0.095 = 0.526 — almost exactly on top of Jack''s
    Marketing node at y=0.561 (only 0.035 apart in data space, ~30px in the rendered
    PNG). In both plot-light.png and plot-dark.png the ''Quinn'' text sits directly
    beside/overlapping the purple Jack node one department up, while Quinn''s own
    ochre node sits below, unlabeled-looking. A viewer naturally reads ''Quinn'' as
    belonging to the purple node, misrepresenting which department Quinn is in. Root
    cause: label_y uses a constant +0.095 offset regardless of local node density,
    so it doesn''t account for a neighboring node from an adjacent cluster sitting
    just above. Fix: either shrink/adapt the offset based on distance-to-nearest-other-node
    (skip placing the label above when another node occupies that space, e.g. place
    below or to the side instead), or increase the vertical gap between the Marketing
    and Design group anchors (group_corners) so the two clusters don''t sit only ~0.13
    data-units apart on the y-axis.'
  - The tight vertical gap between the Marketing (top-right) and Design (bottom-right)
    quadrant anchors (0.77 vs 0.23, only partially offset by the two clusters' own
    radii) leaves just ~0.13 data-units of clearance between the closest nodes of
    each cluster — noticeably tighter than the equivalent Research/Engineering gap
    on the left side. This is what causes the Quinn/Jack label collision above; widening
    this specific gap would fix it without disturbing the rest of the layout.
  - 'Design Excellence is solid but not exceptional: the curved-edge community-graph
    look is now a fairly common network-chart convention, so aesthetic sophistication
    and visual refinement land in the ''good, professional'' band rather than the
    top tier.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Bold near-black title "Office Social Network · network-basic · letsplot · anyplot.ai" at top-left, clearly visible. No axis lines, ticks, or grid (correctly blanked for a network diagram). Legend box on the right ("Department": Research/Marketing/Engineering/Design) has a slightly lighter elevated-background fill with a thin ink border and dark-gray swatch labels — fully readable, not clipped at the right canvas edge.
      Data: 20 circular nodes arranged into four clearly separated community clusters (top-left green "Research", top-right purple "Marketing", bottom-left blue "Engineering", bottom-right ochre "Design"), connected by gray curved edges (alpha ~0.6) including several visible cross-department bridge edges. Node size scales with degree, so higher-connectivity nodes (e.g. Carol, Noah, Paul) render visibly larger, creating a clear focal hierarchy. Bold dark-gray name labels sit above each node. First-drawn categorical series (Research) is #009E73 as required, and the remaining three groups follow the Imprint palette in canonical order.
      Legibility verdict: PASS overall, with one confirmed exception — Quinn's label (Design/ochre node) renders almost on top of the neighboring Jack node (Marketing/purple) because the fixed +0.095 label offset isn't large enough to clear the tight gap between the Marketing and Design quadrants. This makes Quinn's label look like it belongs to the purple node instead of its own ochre node.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Title renders in off-white/light ink, clearly legible. Legend box fill switches to the darker elevated background (#242420) with a light-gray border, text switches to light gray — fully readable against the dark surface, no dark-on-dark failures anywhere.
      Data: Identical layout and identical node/edge colors to the light render (Imprint categorical hues are unchanged across themes, as required) — only the chrome (background, legend box, text) flips tone. Edge color also flips to the light-gray theme-adaptive token and remains clearly visible against the near-black background.
      Legibility verdict: PASS overall, with the same Quinn/Jack label-proximity issue reproduced identically (confirmed via pixel-level position calculation — the defect is layout-driven, not theme-driven, so it appears the same way in both renders).
