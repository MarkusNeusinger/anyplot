review:
  strengths:
  - 'Correct node-link network diagram built idiomatically in Altair: edges as a layered
    mark_line using detail+order encoding (no per-edge chart objects), nodes as mark_circle,
    labels as mark_text'
  - Custom force-directed (spring) layout implemented from scratch with repulsive/attractive
    forces and cooling, giving natural, non-overlapping community clusters
  - 'Imprint categorical palette applied correctly and in canonical order to the four
    communities (#009E73, #C475FD, #4467A3, #BD8233), identical data colors across
    light and dark renders'
  - Node size encodes degree, adding a meaningful visual hierarchy (more-connected
    people read as more central)
  - Cross-group bridge edges are explicitly included, satisfying the spec's structural
    intent of showing both intra- and inter-community connections
  - Theme-adaptive PAGE_BG stroke halo around node markers keeps nodes legible where
    edges/labels converge, and stays correct in both themes
  - Clean, reproducible, KISS-structured code (seeded RNG, no functions/classes) with
    correct canvas padding and file-save logic
  weaknesses:
  - 'Label crowding in the dense Group C/D chain: ''Jack''/''Leo'', ''Noah''/''Olivia'',
    and ''Quinn''/''Ryan''/''Sara'' text is tightly packed with minimal gaps between
    adjacent labels — the current label_y offset (which only alternates by node-id
    parity in the y-direction) isn''t sufficient when nodes are also close together
    in x. Add a horizontal (x) component to the anti-collision offset, or nudge labels
    outward radially from the local cluster centroid, for nodes whose pairwise distance
    falls below some threshold.'
  - The configure_view(stroke=INK_SOFT) draws a full rectangular border around the
    entire scene, which reads as a leftover default chart frame rather than an intentional
    design choice for a network graph — remove the view stroke (or set it much more
    subtly) for a cleaner, frame-free look consistent with the minimal-chrome aesthetic
    expected for node-link diagrams.
  - 'The spring layout leaves noticeably unbalanced whitespace: the network traces
    a diagonal band from top-left to bottom-right, leaving large empty triangular
    regions in the top-right and bottom-left of the plot area — tune the layout (e.g.
    adjust the repulsion constant k, or re-center/rescale positions less anisotropically)
    so the network fills the canvas more evenly.'
  - 'Visual refinement is closer to a well-configured default than a fully polished
    piece: edge line weight doesn''t vary with the (unused) edge weight data field,
    and the legend swatch/box styling is plain — small refinements here would lift
    Design Excellence.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "network-basic · python · altair · anyplot.ai" centered at top, clearly readable. A thin rectangular border frames the plot area (INK_SOFT stroke). A "Communities" legend box sits at the top-right with four swatches (Group A–D) in dark text on a light elevated background — fully readable. Node name labels (Alice, Bob, Carol, ... Tom) are bold, dark ink, large, and readable against the cream background throughout.
      Data: 20 circular nodes colored by community — Group A green (#009E73), Group B lavender (#C475FD), Group C blue (#4467A3), Group D ochre (#BD8233) — connected by muted gray-brown edge lines. Node size varies with degree (more-connected nodes are visibly larger). Cross-group "bridge" edges are visible linking the four clusters into one connected network, arranged diagonally from top-left to bottom-right.
      Legibility verdict: PASS — all title, legend, and node-label text is clearly legible against the light background. Minor crowding: in the tightly-packed Group C/D chain (Jack/Leo, Noah/Olivia, Quinn/Ryan/Sara), adjacent labels sit very close together with little breathing room, though every name remains individually readable.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title, legend text, and node labels all render in light ink (near-white), clearly visible against the dark background — no dark-on-dark failures observed. The same thin rectangular border (now light-toned) frames the plot area, and the "Communities" legend box uses a dark elevated fill with light text/border.
      Data: Data colors are identical to the light render — Group A green, Group B lavender, Group C blue, Group D ochre — confirming only chrome (not data hue) flips between themes. Edge lines remain muted and legible against the dark background.
      Legibility verdict: PASS — all text is clearly readable in the dark theme with no dark-on-dark issues. Same minor label-crowding observation as the light render in the dense Group C/D chain region.
