review:
  strengths:
  - Force-directed spring layout implemented from scratch (custom repulsion/attraction
    physics over 200 iterations) rather than a canned networkx layout, producing well-separated,
    naturally spaced clusters
  - Community hulls (translucent per-group ellipses) combined with dashed cross-group
    vs. solid intra-group edge styling clearly separate structure from bridging ties
    — strong data storytelling at a glance
  - Greedy 8-direction label placement picks the offset that maximizes distance from
    every other node/label, avoiding overlaps across a fairly dense 20-node / 31-edge
    graph
  - 'Correct Imprint palette in canonical order (#009E73, #C475FD, #4467A3, #BD8233)
    with theme-correct chrome in both light and dark renders, including a background-colored
    halo ring around each node for separation from overlapping edges'
  - Node size encodes degree/centrality and a HoverTool exposes name + connection
    count — a genuine interactive add rather than a faked one
  weaknesses:
  - Title omits the mandated language segment — should read 'network-basic · python
    · bokeh · anyplot.ai', currently 'network-basic · bokeh · anyplot.ai'
  - The legend column on the right leaves a large block of unused vertical whitespace
    below it; tightening min_border_right or growing the network layout horizontally
    would improve canvas utilization
  - At the ~400px mobile thumbnail scale the 24pt node labels (especially outer names
    like 'Ryan'/'Paul'/'Sara') become quite small and only borderline legible — consider
    bumping label font size slightly
  - Hover tooltips and the manually-built Legend/LegendItem are solid bokeh usage
    but fairly standard patterns rather than a truly distinctive library-specific
    feature
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), not pure white — matches the light-theme spec.
      Chrome: Bold centered title "network-basic · bokeh · anyplot.ai" in dark ink, clearly legible.
        A "Communities" legend box sits on the right with an italic title and four swatches
        (Group A-D), dark-ink title text and softer ink label text on an elevated off-white panel.
      Data: Four translucent community hulls (green, purple, blue, ochre) each containing 5 nodes.
        Nodes are filled circles in the four Imprint colors (green #009E73, purple #C475FD,
        blue #4467A3, ochre #BD8233) with a light halo ring, sized by degree. Intra-group edges
        are solid soft-ink lines; the 7 cross-group bridge edges are dashed and thinner. Bold
        dark-ink name labels sit next to each node without visibly overlapping other text or nodes.
      Legibility verdict: PASS — title, node labels, and legend text are all clearly readable
        against the light background; no light-on-light text found.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), not pure black — matches the dark-theme spec.
      Chrome: Same title, now rendered in light ink, fully legible. Legend panel uses a dark
        elevated background with light-ink title and softer light-ink labels — no dark-on-dark
        text anywhere.
      Data: The four community hulls and node fill colors are visually identical to the light
        render (green #009E73, purple #C475FD, blue #4467A3, ochre #BD8233) — only the chrome
        (background, hull outline alpha, text, halo color) flips for the dark surface. Edge
        styling (solid vs. dashed) is preserved identically.
      Legibility verdict: PASS — all title, label, and legend text is light-colored and clearly
        readable against the near-black background; no dark-on-dark failures observed.
