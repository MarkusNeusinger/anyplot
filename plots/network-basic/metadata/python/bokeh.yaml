review:
  strengths:
  - 'Full theme-adaptive chrome: all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly applied to title, labels, edges, legend, and backgrounds in both renders'
  - 'Correct Okabe-Ito palette starting with #009E73 for Group A; all four colors
    in canonical order'
  - Node degree encoding (size = 45 + degree x 10) adds meaningful visual information
  - Realistic, named social-network scenario with community structure and cross-community
    bridges
  - HoverTool with interactive tooltips (name, connections count) leverages Bokeh's
    interactive strengths
  - Manual spring layout correctly clusters community nodes and positions bridge connections
    naturally
  - Clean flat-script structure with deterministic seed (np.random.seed(42))
  weaknesses:
  - 'Canvas utilization is poor: the network cluster drifts to the left-center, leaving
    the lower-right quadrant empty; the legend floats in that empty space. The network
    should fill more of the 4800x2700 canvas - increase node spread or center the
    composition.'
  - Node label placement uses only y-position for offset direction, causing crowding
    when nodes are horizontally adjacent (e.g., Alice/Carol area, Frank/Grace). A
    smarter label-offset system or smaller font with better collision handling would
    help.
  - 'LM-01 gap: Bokeh''s from_networkx() integration (via networkx) and GraphRenderer
    are the idiomatic way to render network graphs in Bokeh and would enable richer
    edge/node styling. The manual scatter+line approach is correct but misses this
    library-specific pattern.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "network-basic · bokeh · anyplot.ai" in dark ink (#1A1A17), 32pt, centered — clearly readable. No axis labels (appropriate for network graph). Legend "Communities" title and group labels in dark ink, readable.
      Data: Group A (teal #009E73), Group B (orange #D55E00), Group C (blue #0072B2), Group D (pink #CC79A7) — correct Okabe-Ito order. 20 nodes with degree-encoded sizes (45–95px). 31 edges as thin gray lines (alpha 0.4). Node labels in bold dark text, positioned above/below each node.
      Canvas: Network occupies left ~70% of canvas; lower-right quadrant largely empty; legend floats in empty right area.
      Legibility verdict: PASS — all text readable against light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, not pure black.
      Chrome: Title rendered in light off-white (#F0EFE8) — clearly readable against dark surface. Node labels appear in light ink (#F0EFE8), readable. Legend title and labels in light/soft ink, adapted correctly. Edge lines visible as muted gray on dark surface.
      Data: Node fill colors identical to light render — teal, orange, blue, pink — Okabe-Ito positions unchanged across themes. Only chrome (background, text, legend frame) flipped.
      Legibility verdict: PASS — no dark-on-dark failures detected. All labels are light-colored and readable against the dark background. Bokeh toolbar icons appear as tiny squares in upper-right corner (export artifact, does not affect readability).
