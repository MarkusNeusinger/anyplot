review:
  strengths:
  - Custom vectorized Fruchterman-Reingold force-directed layout (no external networkx
    dependency) cleanly separates the 4 communities into a legible node-link diagram
  - 'Node size correctly encodes degree (connection count); community color legend
    uses the canonical Imprint palette order (#009E73, #C475FD, #4467A3, #BD8233)'
  - Automated label-collision-avoidance pass (post-layout bbox measurement + horizontal
    nudge) resolved the label overlaps flagged in the prior review attempt
  - Square 2400x2400 canvas is the correct choice for a layout with no preferred axis;
    theme tokens correctly threaded through nodes, edges, labels, legend, and title
    for both light and dark
  - Reproducible (seeded), clean flat script with no functions/classes, correct output
    naming
  weaknesses:
  - '''Ryan'' and ''Sara'' node labels in the Team D cluster sit almost flush against
    each other (near-zero gap) even after the collision-avoidance pass — increase
    the push margin (e.g. from +0.01 to +0.02 data units) so adjacent labels keep
    visible whitespace between them'
  - Minor edge crossing between Quinn-Sara and Ryan-Tom in the Team D cluster creates
    a slightly untidy X — a few more force-directed iterations or extra repulsion
    in that pocket would reduce it (cosmetic, not blocking)
  - Library mastery leans on custom numpy/matplotlib work (force-directed layout,
    manual label collision resolution) rather than seaborn-specific features, since
    seaborn has no native network-graph API; sns.scatterplot's dual hue/size encoding
    is the main seaborn contribution
