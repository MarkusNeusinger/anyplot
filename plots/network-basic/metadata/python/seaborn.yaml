review:
  strengths:
  - Exact Imprint canonical palette order (#009E73/#C475FD/#4467A3/#BD8233) mapped
    to the four communities, identical data colors in both themes
  - Node size correctly encodes degree (190-400 range) via sns.scatterplot's dual
    hue+size mapping, creating an immediate visual hierarchy toward high-degree bridge
    nodes (Carol, Ivy, Noah)
  - Manually implemented vectorized Fruchterman-Reingold force-directed layout with
    bounding-box centering and uniform scaling, appropriate since seaborn/matplotlib
    has no built-in graph layout
  - 'Clean chrome: axis fully removed, edges drawn beneath nodes at low alpha to avoid
    clutter, legend pruned to only the community entries (automatic size-legend duplicates
    removed)'
  - 'Both themes correctly threaded through PAGE_BG/INK/INK_SOFT tokens, background
    colors match spec (#FAF8F1 / #1A1A17), text fully legible in both renders'
  - Square 2400x2400 canvas is the right choice for a layout with no preferred axis,
    exact dpi/figsize math with no bbox_inches='tight'
  - Reproducible via np.random.seed(42), flat KISS script structure with no functions/classes
  weaknesses:
  - '''Ryan'' and ''Sara'' labels (bottom Team D cluster) are placed directly below
    their nodes with almost no gap between them — the ''n'' of Ryan and ''S'' of Sara
    nearly touch. Nudge one label horizontally or reduce the y-offset asymmetrically
    for adjacent close nodes.'
  - The force-directed layout leaves a visibly empty band in the top-right and bottom-left
    corners of the square canvas (network occupies a diagonal swath from Alice/Bob
    down to Paul/Tom) — a slightly stronger inter-node repulsion (higher k) or a tighter
    xlim/ylim crop would balance canvas usage better.
  - Edge weight is not encoded (line width/opacity is uniform for all edges) — acceptable
    since the spec marks weight optional, but would add another layer of visual information
    for the 'library mastery' feature set.
  - The Quinn-Tom and Ryan-Sara edges cross visually right underneath the 'Quinn'
    label in the Team D cluster, adding minor local clutter in an otherwise clean
    diagram.
