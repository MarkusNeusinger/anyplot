review:
  strengths:
  - Uses Highcharts NetworkGraphSeries with force-directed physics simulation — the
    correct and idiomatic chart type
  - 'Okabe-Ito palette applied correctly: first community is #009E73, remaining communities
    follow canonical order (#D55E00, #0072B2, #CC79A7)'
  - Node sizes scale by degree (radius = 65 + degree × 8), giving hub nodes visual
    prominence
  - Cross-group bridge edges are included, showing realistic inter-community connectivity
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, ELEVATED_BG all tied to ANYPLOT_THEME
    — both light and dark renders are correct'
  - 'Title format matches spec exactly: ''network-basic · highcharts · anyplot.ai'''
  - Legend correctly constructed via dummy ScatterSeries entries for each community
  - Both HTML and PNG artifacts generated for both themes
  - 20-node social network with named people is plausible and neutral real-world data
  - textOutline on node labels (3px PAGE_BG) ensures label readability on both light
    and dark renders
  weaknesses:
  - Canvas utilization is low (~25-30% of the 4800×2700 canvas used by the graph itself);
    the network graph is visually small with large empty space above and below
  - Legend is isolated in the far right margin, separated from the graph by a wide
    empty gap — it reads as disconnected rather than integrated
  - 'Physics simulation (enableSimulation: true) introduces non-determinism — node
    positions vary between runs since there is no random seed; while data is hardcoded,
    the physics result is stochastic'
  - JS string manipulation to inject nodes config (replace on js_literal) is fragile
    and non-idiomatic — highcharts-core's nodes property should be exposed properly
    or the workaround documented
  - 'Code elegance: the centerLabels JS timer cascade (7 setTimeout calls) and string-replace
    injection add significant complexity'
  - 'DE-01/DE-02: Aesthetic polish is functional but not refined — font family is
    browser default, title weight matches well but no additional design hierarchy
    beyond colors and node size'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "network-basic · highcharts · anyplot.ai" in dark ink at top center, clearly visible. No axis labels (appropriate for network graph). Legend on far right shows Community A–D with matching colored circles.
      Data: 20 nodes in 4 communities — green (Community A: Alice, Bob, Carol, David, Eve), orange (Community B: Frank, Grace, Henry, Ivy, Jack), blue (Community C: Kate, Leo, Mia, Noah, Olivia), pink/purple (Community D: Paul, Quinn, Ryan, Sara, Tom). Node names labeled in dark ink with PAGE_BG outline. Edges rendered in INK_SOFT (dark grey). Cross-group bridges visible (Alice–Frank, Eve–Kate, Jack–Paul, Olivia–Tom, Carol–Grace, Ivy–Leo, Noah–Quinn). Hub nodes (e.g., Frank, Ivy, Noah) visibly larger than peripheral nodes.
      Legibility verdict: PASS — all node labels readable, title readable, legend readable. Dark text on warm off-white reads clearly.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title visible as light-colored text on dark background. Legend on far right with light text (INK_SOFT in dark theme = #B8B7B0) on dark elevated background (#242420). All text readable.
      Data: Colors are identical to the light render — same green, orange, blue, pink node colors. Edges rendered in dark-theme INK_SOFT (medium grey on dark). Node labels appear light (white outline via textOutline "3px #1A1A17" which gives a PAGE_BG halo making light label text readable on dark colored circles).
      Legibility verdict: PASS — no dark-on-dark failures. All labels readable. Data colors are theme-invariant (Okabe-Ito positions 1–4 unchanged).
