      Data: All 4 community colors are pixel-identical to the light render (#009E73/#C475FD/#4467A3/#BD8233) — only background and text chrome flipped, as required. Solid vs. dashed edge distinction remains visible against the dark background.
      Legibility verdict: PASS

    Both renders pass the theme-readability check; no dark-on-dark or light-on-light failures found. No edge clipping (AR-09) observed on either render.
