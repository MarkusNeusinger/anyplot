review:
  strengths:
  - 'Correct Imprint palette order (first series #009E73, then #C475FD/#4467A3/#BD8233
    for the 3 remaining communities), identical across both themes'
  - 'Theme-adaptive chrome done thoroughly: value_colors is force-overridden to the
    theme ink token, working around pygal''s default per-series brightness heuristic
    that would otherwise put near-black labels on the near-black dark background'
  - Manually implements a force-directed spring layout (repulsion + attraction + cooling
    schedule over 200 iterations) since pygal has no native graph/network chart type
    — a genuinely sophisticated workaround
  - Node radius encodes node degree (connection count), directly matching the spec's
    optional size-encodes-degree feature
  - Four communities are visually distinct and spatially clustered in both renders,
    with cross-group bridge edges clearly visible, giving the network a legible structure
    at a glance
  - Reproducible (np.random.seed(42)), clean KISS top-to-bottom script structure,
    no unused imports
  weaknesses:
  - Noticeable empty band between the bottom of the node cluster and the legend (roughly
    the bottom quarter of the canvas is blank) — stretch the y-extent of the layout
    (e.g. widen the `positions[:, 1]` target range) or otherwise pull the legend closer
    so the plot fills more of the canvas vertically (VQ-05)
  - A few node labels sit right against or crossed by edge lines (e.g. 'Ivy', 'Leo')
    — nudge label offset/positioning so labels clear the connecting edges (VQ-02)
  - Design excellence is solid but still reads as a fairly literal node-link diagram
    — consider varying edge opacity/width between intra-community and cross-community
    (bridge) edges to visually reinforce the 'communities connected by bridges' story
    (DE-01/DE-03)
  - Community labels ('Community A/B/C/D') are generic placeholders — not a hard requirement,
    but a bit more evocative/neutral group naming would strengthen data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1, not pure white.
      Chrome: Title "network-basic · python · pygal · anyplot.ai" is dark, crisp, and centered at top, comfortably within the canvas width. Node labels (names) are dark and legible against the light background. Legend at bottom ("Community A/B/C/D") uses small colored square swatches with dark text, evenly spaced across 4 columns.
      Data: 20 labeled nodes in 4 color-coded communities (green #009E73 = Community A, purple #C475FD = Community B, blue #4467A3 = Community C, brown/ochre #BD8233 = Community D), connected by gray edge lines. Node circle size varies with degree (higher-connectivity nodes like Carol, Ivy, Noah are visibly larger). Communities are spatially clustered with a handful of longer cross-group "bridge" edges connecting the clusters.
      Legibility verdict: PASS — all title, node label, and legend text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17, not pure black.
      Chrome: Title, node labels, and legend text all render in a light off-white ink color, clearly legible against the dark background — no dark-on-dark text observed anywhere (the implementation explicitly forces value_colors to the theme ink token to avoid pygal's default per-series black/white text heuristic).
      Data: Same four node colors (#009E73/#C475FD/#4467A3/#BD8233) and same gray edge color, confirmed identical to the light render — only the background and text/chrome flipped as expected. Same clustering and bridge structure is visible.
      Legibility verdict: PASS — all text is clearly readable against the dark background, no dark-on-dark or light-on-light failures.
