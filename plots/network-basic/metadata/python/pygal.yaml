      Data: 20 nodes colored by 4 communities — #009E73 (green, Close Friends), #C475FD (lavender, Coworkers), #4467A3 (blue, Neighbors), #BD8233 (ochre, College Friends). Node radius scales visibly with degree (e.g. Carol, Noah, Ivy render larger — higher-degree hubs). Intra-community edges are solid gray lines; cross-community bridge edges are dashed and thinner, visually distinguishing local ties from bridging connections. Graph now fills most of the vertical canvas extent (previous empty band beneath the node cluster is closed).
