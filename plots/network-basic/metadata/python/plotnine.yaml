review:
  strengths:
  - 'Correct Imprint palette: first series is #009E73, remaining 3 communities follow
    canonical order (#C475FD, #4467A3, #BD8233), identical across light and dark renders'
  - 'Theme-adaptive chrome is fully correct in both renders: warm off-white/near-black
    backgrounds, readable title/labels/legend text in both themes, no dark-on-dark
    or light-on-light failures'
  - Self-contained vectorized Fruchterman-Reingold spring layout (no networkx dependency)
    with quadrant-based initialization for clean 4-cluster separation
  - Node size encodes degree via scale_size_area (proportional area, not radius) with
    a correctly anchored limits=(0, max) domain
  - 'Good visual hierarchy: the top hub node is emphasized via a soft halo layer plus
    an italic ''hub'' annotation, drawing the eye to the most-connected node'
  - 'Clean minimal chrome appropriate for a network layout: no grid, no axis ticks/labels/spines
    (position coordinates carry no semantic meaning)'
  - Correct title format and correct plot-{theme}.png output naming
  weaknesses:
  - Noticeable dead whitespace between the right edge of the network layout and the
    legend box (and above/below the legend) — canvas utilization on the right third
    is low; tighten margins, enlarge the layout, or reposition the legend closer to
    the graph.
  - Legend retains a visible box frame/border (legend_background color=INK_SOFT) —
    the style guide's decoration-removal checklist suggests dropping legend box frames
    for a cleaner look when not needed for grouping clarity.
  - Team labels ('Team A'/'Team B'/'Team C'/'Team D') are generic/abstract rather
    than a concrete real-world grouping (e.g. actual department or project-team names)
    — this slightly weakens the realistic-context score even though the individual
    node names (Alice, Bob, ...) are concrete.
  - Library-distinctive usage is solid (scale_size_area, guide_legend override_aes)
    but could go further to showcase plotnine-specific grammar-of-graphics strengths
    beyond what's already used.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "network-basic · plotnine · anyplot.ai" in dark ink, centered top, clearly legible. Node labels (Alice, Bob, Carol, ... Tom) in dark ink above each node, all legible. Legend box (top-right) with "Community" (4 color swatches: Team A-D) and "Degree" (5 size swatches 0-4), both readable with dark text on a slightly elevated cream box with a soft gray border. Italic "hub" annotation below the top hub node (Carol) in muted gray, legible.
      Data: 20 nodes colored by 4 communities — Team A green (#009E73), Team B lavender (#C475FD), Team C blue (#4467A3), Team D ochre (#BD8233) — matching the Imprint canonical order with brand green first. Node sizes vary with degree (larger for well-connected nodes), gray edges (alpha ~0.45) connect nodes, and a soft halo circle surrounds hub nodes.
      Legibility verdict: PASS — all text (title, node labels, legend, annotation) reads clearly against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title in light/off-white ink, clearly legible against the dark background. Node labels in the same light ink, all legible. Legend box uses a dark elevated fill (#242420-like) with light text for both "Community" and "Degree" sections, clearly readable. Italic "hub" annotation in light gray, legible.
      Data: Same 4 community colors as the light render (#009E73, #C475FD, #4467A3, #BD8233) — confirmed identical, only the chrome (background, text, edge-line gray, legend box) flips to the dark scheme. Edge lines appear as a lighter gray, still subtle and legible against the dark background.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title/label/tick/legend text is clearly visible against the near-black background.
