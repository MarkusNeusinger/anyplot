review:
  strengths:
  - 'Correct Imprint palette with canonical order across all four communities (#009E73,
    #C475FD, #4467A3, #BD8233), identical data colors in both light and dark renders'
  - 'Theme-adaptive chrome is fully correct: warm off-white/near-black backgrounds,
    all text legible in both themes, no dark-on-dark or light-on-light failures'
  - Vectorized Fruchterman-Reingold spring layout with quadrant-seeded initialization
    produces a clean, well-separated 4-cluster arrangement with clearly visible cross-community
    bridge edges
  - scale_size_area correctly encodes node degree as area (not radius), with an explicit
    zero-anchored limits=(0, max) so the lowest-degree node stays visible
  - 'Legend is thoughtfully constructed: Community categorical legend plus a separate
    Degree size legend with guide_legend override_aes so swatches don''t inherit the
    data alpha'
  - 'Realistic, neutral data: a 20-person office network across 4 departments with
    plausible internal cliques and cross-department bridges — sensible scale for a
    10-50 node spec'
  - Clean KISS structure, no functions/classes, seeded RNG, only used imports, correct
    plot.save(f'plot-{THEME}.png', ...) output
  weaknesses:
  - 'Hub-halo logic bug: hub_threshold = node_df[''degree''].quantile(0.8) evaluates
    to 3 because 16 of 20 nodes share degree=3 (only David sits at degree=2, and Carol/Ivy/Noah
    at degree=4). The filter node_df[''degree''] >= hub_threshold therefore selects
    19 of 20 nodes instead of the intended top ~20% (the three degree-4 nodes), so
    the halo appears on almost every node in both renders and no longer creates a
    visual hub emphasis. Fix by selecting on rank (e.g. node_df.nlargest(max(1, int(n*0.2)),
    ''degree'')) or using degree == degree.max() instead of a quantile that collapses
    onto the modal value.'
  - Because the halo is applied almost everywhere, the intended two-tier visual hierarchy
    (ordinary node vs. hub) collapses into a single style, slightly diluting the degree-size
    signal and weakening the data-storytelling payoff of the 'hub' annotation, which
    otherwise correctly marks the single highest-degree node (Carol).
  - Canvas whitespace is not perfectly balanced — noticeable empty space bottom-right
    and top-right beyond the legend column in both renders; the graph plus legend
    could be recentered or the plot area padding tightened for a fuller 50-80% canvas
    utilization.
  - Degree range in the sample data is narrow (2-4, with 16/20 nodes tied at exactly
    3), so the degree-size encoding and the (buggy) hub selection have little real
    variation to work with — widening the degree spread (e.g. one or two clearer super-connectors)
    would make both the size scale and the intended hub emphasis more legible.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white, not dark.
      Chrome: Title "network-basic · plotnine · anyplot.ai" centered at top in dark ink, fully visible, not clipped. No axes, ticks, or grid (correctly hidden — layout coordinates are arbitrary for a network diagram). Legend on the right with a "Community" categorical key (Engineering/Design/Sales/Support) and a "Degree" size key, both on a slightly elevated cream panel with dark text.
      Data: 20 labeled nodes (Alice, Bob, Carol, ... Tom) arranged in 4 visually separated clusters by community, connected by thin gray edges including cross-cluster bridges. First series (Engineering) renders in #009E73 green; Design in #C475FD purple; Sales in #4467A3 blue; Support in #BD8233 ochre — matches the canonical Imprint order. Node size varies subtly with degree. Nearly every node also shows a soft gray halo ring (intended only for top-degree "hub" nodes, but the threshold bug makes it appear almost everywhere — see weaknesses). An italic "hub" annotation marks Carol, the highest-degree node.
      Legibility verdict: PASS — all labels, title, and legend text are clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black, not light.
      Chrome: Same title, now in light ink, fully legible against the dark background. Legend panel uses a slightly lighter elevated dark tone with light text, ticks/axes still correctly hidden.
      Data: Same cluster layout and edge structure as the light render. Node colors are pixel-identical to the light render (#009E73/#C475FD/#4467A3/#BD8233) — only the chrome (background, text, legend panel, halo/edge gray) shifted for the dark theme. Same halo over-application bug is present here too.
      Legibility verdict: PASS — no dark-on-dark failures; all node labels, title, and legend text read clearly against the dark background.
