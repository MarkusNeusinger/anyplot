review:
  strengths:
  - 'Excellent theme-adaptive map styling: land/water colors adapt elegantly between
    light (warm sage + soft blue) and dark (deep olive + navy) themes'
  - 'Clean palette assignment: Music=#009E73 as position 1, canonical order maintained
    throughout'
  - Correct static interpretation of an interactive spec — grid-based clustering produces
    a convincing clustered-marker snapshot without fake interactivity
  - scale_size_area ensures perceptually accurate bubble sizing with area proportional
    to venue count
  - 'Perfect code quality: clean KISS structure, set.seed(42) reproducibility, modern
    ggplot2 API (linewidth= not size=)'
  weaknesses:
  - Very small clusters (count=1,2) get near-zero-area bubbles from scale_size_area,
    leaving count labels floating as white text with no visible backing circle — add
    min_size=4 to scale_size_area() so every cluster has a visible marker
  - Slight crowding in Northeast region with 5-6 bubbles close together — could use
    slightly coarser grid_res (4.0 instead of 3.5) to reduce overlap
  - Legend size reference breaks (5, 20, 50) don't cover the actual max cluster size
    (64) — consider adding an 80 break to match data range
