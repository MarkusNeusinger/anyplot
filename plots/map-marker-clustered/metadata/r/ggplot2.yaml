review:
  strengths:
  - Excellent theme-adaptive geographic context — land fill and water colors flip
    correctly between light (#E0EBD5/#CDDFF0) and dark (#263322/#101E2A), creating
    a polished dual-theme map
  - Strong use of scale_size_area() with max_size=18 for proportional bubble encoding
    — cluster count visually intuitive and correctly area-scaled
  - guide_legend(override.aes=...) expertly applied to separate fill and size legends
    with consistent stroke/fill styling
  - 'Perfect palette compliance: Music=#009E73 (brand green first), Sports=#9418DB,
    Arts=#B71D27 in correct anyplot canonical order'
  - coord_fixed(ratio=1.3) with explicit xlim/ylim anchors the map correctly at the
    continental US extent without distortion
  - White bold geom_text count labels inside bubbles provide quantitative detail while
    maintaining readability in both themes
  - 'Data generation is realistic: population-weighted metro area sampling with realistic
    venue density (460 venues, 20 metros)'
  weaknesses:
  - 'Design excellence (DE-01/DE-02) holds the score below 90: the map looks competent
    but not distinctive — consider removing the panel.border for a cleaner open map
    feel, reducing grid line intensity, or adding a subtle vignette/gradient to the
    water area to add sophistication'
  - 'Overlapping clusters in the California/LA metro region produce visual crowding:
    the ''19 37 11 26'' bubbles overlap significantly — consider increasing grid_res
    from 3.0 to 3.5 or 4.0 to spread California clusters more, or reducing max_size
    to 14 so overlapping bubbles are less occlusive'
  - Small clusters with count < 5 receive no label — the spec states 'cluster markers
    should display the count of grouped points', implying all clusters should show
    counts; consider showing all count labels with size adjusted by count (e.g., size
    = ifelse(count >= 5, 2.8, 2.0)) or showing all with consistent size
  - 'library(scales) is imported but no explicit scales:: functions are called in
    the script — remove the unused import for CQ-03 cleanliness'
  - DE-03 storytelling is functional but not maximally effective — the plot shows
    where venues cluster but does not visually highlight the most notable insight
    (e.g., NYC/Chicago corridor with 43+30+40 venues could have a subtle annotation
    or the dominant cluster enlarged slightly to create a focal point)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct. Panel background is #CDDFF0 (light blue for water), land is #E0EBD5 (light green). State borders in muted ink.
      Chrome: Title "Venue Clusters · map-marker-clustered · r · ggplot2 · anyplot.ai" in dark ink, clearly readable. Axis labels "Longitude" (x) and "Latitude" (y) in dark ink at size 10. Tick labels in #4A4A44 at size 8 — all clearly readable. Panel border in INK_SOFT. Legend with elevated #FFFDF6 background shows "Venues" (size) and "Venue Type" (color) sections — both legible.
      Data: Three categories of bubble markers — Music (#009E73 green), Sports (#9418DB purple), Arts (#B71D27 red) — clearly distinguishable. White bold count labels inside larger clusters. Bubble sizes range from small (count=1) to large (count=43). White stroke on bubbles (shape=21) provides definition.
      Legibility verdict: PASS — all text readable against light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct. Panel background flips to #101E2A (dark blue water), land fills to #263322 (dark green). State borders in lighter muted ink.
      Chrome: Title and axis labels render in #F0EFE8 (cream) — clearly readable against dark background. Tick labels in #B8B7B0 — readable. Legend has #242420 elevated background with #B8B7B0 border. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — Music=#009E73, Sports=#9418DB, Arts=#B71D27 — confirming only chrome flips between themes. White count labels inside bubbles remain clearly readable.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures, brand green #009E73 clearly visible.
