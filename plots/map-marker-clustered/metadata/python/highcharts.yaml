review:
  strengths:
  - Correct use of Highcharts marker-clusters module with per-category series clustering
  - Cluster zone-based sizing (5 zones from radius 28 to 60) creates a clear visual
    hierarchy of density
  - Full theme-adaptive chrome — PAGE_BG, ELEVATED_BG, INK, INK_SOFT, MAP_FILL, MAP_BORDER
    all switch correctly between light and dark
  - 'anyplot palette applied in canonical order: Grocery=#009E73 (position 1), Electronics=#9418DB
    (2), Clothing=#B71D27 (3), Home Goods=#16B8F3 (4)'
  - Saves both plot-{THEME}.html and plot-{THEME}.png artifacts as required for interactive
    libraries
  - PIL safety-net pinning ensures exact 3200×1800 canvas dimensions
  - Reproducible synthetic data with np.random.seed(42) and realistic 15-city US retail
    context
  - Subtitle text explains interactivity ('zoom to expand clusters') — good data storytelling
  weaknesses:
  - Cluster data label fontSize is '34px' — below the style-guide recommended '44px'
    for labels; on large cluster circles (radius 48-60) there is room for larger text,
    making counts easier to read at thumbnail sizes
  - Per-category clustering creates 4 overlapping cluster circles per city rather
    than a single merged cluster, producing visual clutter in dense metros (NYC, LA,
    SF) — a single combined series with category-colored individual markers on zoom-in
    would reduce overlap
  - 'Legend symbol uses large symbolRadius: 50 with symbolHeight: 36 / symbolWidth:
    36, creating disproportionate oversized legend swatches relative to the map scale
    — reducing to symbolRadius: 12, symbolHeight: 20, symbolWidth: 20 would look more
    refined'
