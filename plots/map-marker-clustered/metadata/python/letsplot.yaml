    absent and coastal contours are visibly blocky, giving the basemap a sketch-like
    feel compared to a proper GeoJSON boundary
  - Desert Southwest cluster (45) is the smallest bubble and its count label appears
    proportionally cramped — slightly harder to read vs larger clusters
  - Design excellence is functional but not exceptional — no visual embellishments
    (e.g. subtle polygon fill gradient, faint grid overlay for lat/lon reference,
    or cluster outline stroke) that would elevate it beyond a competent baseline
