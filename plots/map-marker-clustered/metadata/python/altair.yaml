review:
  strengths:
  - Correct anyplot palette usage with all three categories in canonical order; both
    light and dark themes fully correct with proper chrome token application
  - Proper canvas sizing (width=620, height=320, scale_factor=4.0) with PIL padding
    to exact 3200x1800 — no canvas gate failure
  - Grid-based clustering without external geo-dependencies (clean implementation
    within constraints)
  - Log-scaled size encoding effectively conveys cluster density across a wide count
    range (3–19)
  - Near-white count labels on colored circles maintain readability across all marker
    colors and both themes
  - Clean KISS code structure with full reproducibility (np.random.seed(42)), idiomatic
    Altair layer composition, and correct HTML export
  weaknesses:
  - 'One stray cluster (purple, count=3) floats in the upper-left outside the US basemap
    boundary because the 1.5-degree std noise on some city coordinates generates lat/lon
    values outside the albersUsa projection area. Fix: clamp generated coordinates
    to US bounding box (lat 24–49, lon -125 to -66) before clustering, or reduce noise
    std to 0.8 degrees.'
  - Dynamic zoom-responsive clustering is not implemented in the HTML output — saved
    HTML provides only zoom/pan of static pre-computed grid clusters. Spec calls for
    clusters that expand/collapse as user zooms. Consider using Altair selection +
    transform_filter to show individual markers when zoom exceeds a threshold.
  - Design Excellence is moderate — the map is clean but lacks standout polish. Consider
    adding opacity variation per cluster size, using a faint graticule background,
    or adding a convex hull overlay for cluster regions in the HTML version.
  - 'DQ-03 minor: lat/lon random noise (std=1.5) is wide enough to push some coordinates
    into the ocean or Canada; tighter noise (std=0.8–1.0) would keep all generated
    stores within a plausible metro area.'
