review:
  strengths:
  - Full theme-adaptive implementation with all chrome tokens correctly mapped for
    both light and dark renders
  - 'Excellent Altair idiomatic usage: alt.topo_feature, albersUsa projection, selection_point
    with mouseover, transform_filter for hover-gating — all distinctively Altair'
  - Logarithmic size scale cleanly communicates cluster density without requiring
    a legend entry
  - Realistic CONUS store location dataset (10 real cities, 3 meaningful categories,
    500 points in valid coordinate bounds)
  - Clean KISS code structure with PIL padding to exact target canvas dimensions —
    no crop, no helper functions
  - HTML output correctly produced alongside PNG for interactive hover experience
  weaknesses:
  - Click-to-zoom cluster expansion (per spec) not implemented — hover-based reveal
    is a reasonable Altair substitute but doesn't match spec exactly
  - In dense regions (NE coast, Pacific NW), overlapping cluster circles make count
    labels compete visually; a slight opacity reduction on overlapping circles or
    nudge to cluster grid_size could improve readability
  - 'DE-03 storytelling: largest cluster concentrations are not visually emphasized
    beyond natural size — a subtle annotation or emphasis on the highest-count cluster
    would elevate the narrative'
