review:
  strengths:
  - 'Full theme adaptation (light + dark) with correct token usage throughout: PAGE_BG,
    ELEVATED_BG, INK, INK_SOFT, INK_MUTED all properly wired to axis labels, ticks,
    legend, and annotation boxes'
  - 'Correct anyplot palette usage: Retail=#009E73 (position 1), Grocery=#9418DB (position
    2), Electronics=#B71D27 (position 3) — canonical order, first series is brand
    green'
  - 'Geographic map built purely from matplotlib primitives: ax.fill() for land polygon,
    ax.plot() for border lines, ocean background via ax.set_facecolor() — distinctive
    use of the library''s low-level drawing API'
  - Logarithmic cluster size scaling (150 + log1p(size)*80) correctly prevents large
    clusters from dominating the canvas and small clusters from being invisible
  - 'Two-level visual hierarchy: semi-transparent individual points (alpha=0.20, s=12)
    as density backdrop + prominent cluster markers as focal elements — clean separation
    of detail and summary'
  - 'Canvas control done correctly: figsize=(8, 4.5) dpi=400 → 3200x1800, no bbox_inches=''tight'',
    explicit fig.subplots_adjust() — follows library rules exactly'
  - 'Realistic European store-location context: 8 major cities, 280 total locations,
    3 plausible retail categories — comprehensible neutral business scenario'
  - np.random.seed(42) ensures reproducibility; zip(..., strict=True) is idiomatic
    Python 3.10+ defensive coding
  - 'Summary annotation (''Total: 280 locations · 27 clusters'') with styled rounded
    box adds useful context without cluttering the map'
  weaknesses:
  - Cluster count labels at fontsize=6 are the smallest text in the image; at mobile
    scale (~400px wide, ~8x downscale) single and double digit numbers inside cluster
    circles become barely distinguishable — raise to fontsize=7 or 8
  - In the Southern Europe region (lon 11–15, lat 40–42) several cluster circles crowd
    together (counts 9, 7, 8, 16 for Rome-area cities) causing partial overlap of
    marker edges; consider reducing cluster grid density or adjusting grid offsets
    to spread them further apart
  - 'DE-01: Design sophistication is strong but the simplified coast polygon has jagged
    inconsistencies (Scandinavian peninsula omitted, Baltic coast missing) that undercut
    the professional look — adding a few more coastline vertices or at minimum extending
    the polygon to include the British Isles visible in the data extent (-10 lon)
    would lift polish'
  - 'DE-03: Data storytelling could be stronger — the visual shows WHERE stores are
    but not WHAT the key insight is; a brief annotation highlighting the densest cluster
    (e.g., ''London: 50 locations — largest hub'') or a visible size legend showing
    what marker size represents would guide the viewer more directly'
  - 'SC-02: The spec mentions showing individual marker labels when ''expanded'' and
    visualizing the two zoom states (clustered view vs. expanded individual view)
    — a small inset or side panel showing a zoomed-in city (e.g., London) with individual
    markers labeled would demonstrate the full clustering concept that the spec describes'
  - 'LM-02: The geographic drawing uses ax.fill() and ax.plot() which are general
    matplotlib primitives; adding a scale bar or north arrow using matplotlib.patches
    (FancyArrowPatch or Rectangle) would showcase more distinctively matplotlib-specific
    cartographic conventions'
  image_description: |-
