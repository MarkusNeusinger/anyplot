review:
  strengths:
  - 'Excellent static adaptation of the interactive clustering concept: grid-based
    clustering with an inset axes showing the zoomed London view is the right solution
    for a static library'
  - Theme-adaptive geographic colors (ocean/land) using the same INK/PAGE_BG token
    system as the rest of the chrome — cohesive design across map and chrome
  - 'Perfect code quality: KISS structure, seed set, clean imports, idiomatic Axes
    methods, correct savefig without bbox_inches=''tight'''
  - Multi-layer information hierarchy (faint backdrop → prominent clusters → inset
    → London annotation) creates clear visual depth and guides the reader
  weaknesses:
  - London annotation box (xytext=(lc_lon+6, lc_lat+0.5)) is positioned too close
    to the inset axes left boundary, causing visual overlap at the inset border —
    shift xytext to avoid overlap with inset
  - Inset tick labels at 4.5pt (approx 25 source px) are borderline-readable at mobile
    scale; increase to at least 5.5pt for both inset title and ticks
  - The dashed zoom box and inset panel could be connected more explicitly (e.g.,
    ax.indicate_inset_zoom() or connector lines from box corners to inset corners)
    to make the spatial relationship immediately obvious and improve LM-02
