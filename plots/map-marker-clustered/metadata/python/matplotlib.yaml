      Data: 27 cluster markers colored by dominant category — green (#009E73 Retail), purple (#9418DB Grocery), red (#B71D27 Electronics) — with white count annotations inside. Individual points shown semi-transparently (alpha=0.20, s=12) as density backdrop in matching category colors. Cluster sizes range from 1 to 40+, with logarithmic size scaling making larger clusters visually prominent. Cities visible: London (23, 31, 19 clusters), Berlin area (1, 2, 3), Paris (40, 6, 7), Madrid/Spain (14, 14, 1), Rome/Italy area (9, 7, 8, 16, 15), Vienna/Prague/Amsterdam.
