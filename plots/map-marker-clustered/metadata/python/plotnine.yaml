review:
  strengths:
  - 'Technically clean implementation: correct theme tokens, proper anyplot palette
    assignment, KISS structure, deterministic seed'
  - Hierarchical clustering with scipy to generate meaningful geographic clusters
    goes well beyond random scatter points
  - Size-encoded bubble markers with white bold count labels inside are effective
    and clear
  - Geographic state outlines + city orientation labels provide genuine map context
    without a heavy basemap dependency
  - Both renders pass theme-readability check; no dark-on-dark or light-on-light issues
  weaknesses:
  - Three of five clusters use the same red (#B71D27 / Service category) — Los Angeles
    and San Diego are visually indistinguishable by color; seed data so each city
    cluster has a clearly distinct dominant category
  - City orientation labels at geom_text size=6.5 are slightly small; increase to
    size=7.5–8 for better mobile readability
  - Empty canvas real estate on the right/east side of the map beyond the state boundaries;
    narrow longitude range or adjust map extent
  - No static convex hull (geom_polygon) showing each cluster's geographic extent
    — feasible and would satisfy a key spec feature
  - Panel border (4-sided element_rect) is slightly boxy for a map; removing top/right
    border would give a cleaner open map style
