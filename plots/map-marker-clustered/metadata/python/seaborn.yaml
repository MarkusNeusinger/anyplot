      Data: 4-color categorical palette (#009E73 Coffee Shop, #9418DB Restaurant, #B71D27 Bookstore, #16B8F3 Gym). Cluster markers sized proportionally (small ~50pt² to large ~500pt²). Background scatter at alpha=0.08 visible. KDE contours in muted gray (INK_MUTED) at alpha=0.35. Geographic water lines at alpha=0.4. Count labels in white inside cluster markers.
