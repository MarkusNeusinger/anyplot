review:
  strengths:
  - 'Excellent multi-layer design: background scatter at alpha=0.08 + KDE density
    contours + sized cluster markers creates genuine depth without visual clutter'
  - 'Geographic context (stylized water boundaries + land fill) adds meaningful real-world
    orientation — theme-adaptive land fill (#f5f5dc light / #2a2a20 dark) shows extra
    care'
  - Cluster markers correctly reflect dominant category color and display count labels
    in white — satisfies both spec requirements (count display + category color) cleanly
  - Hierarchical clustering with AgglomerativeClustering is a correct and idiomatic
    static approximation of dynamic zoom-based clustering for a non-interactive library
  - 'Full palette compliance: #009E73 first for Coffee Shop, canonical order positions
    1-4, both renders on correct backgrounds (#FAF8F1 / #1A1A17)'
  - Dual legends (Business Type + Cluster Size) with computed data-driven size labels
    (e.g., '1–2 pts', '3 pt', '4–7 pts') rather than hardcoded placeholders
  - sns.kdeplot() density overlay is a seaborn-idiomatic distinctive touch that adds
    real analytical value to the map
  - 'All text sizes follow style-guide: title 12pt, axis labels 10pt, tick labels
    and legend 8pt'
  weaknesses:
  - In the densely-clustered central zone (lat ~40.6–40.9, lon ~-74.0 to -73.7), many
    cluster circles overlap and count labels inside small circles (~8pt) can be difficult
    to read — consider increasing count label fontsize to 9pt or limiting labels to
    clusters with count > 2
  - 'DE-01 could be elevated further: the geographic line segments (Hudson River,
    LI Sound, coast) are low-detail and don''t add substantial orientation beyond
    the axis ticks; more recognizable borough boundaries or neighborhood labels would
    improve the basemap'
  - 'LM-02: seaborn KDE contour is a good distinctive feature but only one seaborn-specific
    technique is used; size+hue encoding in scatterplot is also good seaborn usage
    but not uniquely seaborn'
