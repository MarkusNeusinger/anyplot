review:
  strengths:
  - Theme-adaptive map styles (carto-positron light / carto-darkmatter dark) give
    the visualization a polished, professional look in both renders
  - 'Native Plotly clustering (`cluster={"enabled": True, ...}`) correctly displays
    count labels on cluster circles and enables interactive zoom-to-expand in the
    HTML output'
  - Full Imprint palette in canonical order with all theme chrome tokens (INK, INK_SOFT,
    ELEVATED_BG) wired up to title, legend, and annotation
  - Data context annotation (total stores, densest city, interaction hint) guides
    the viewer without cluttering the map
  - go.Scattermap (modern API, not deprecated Scattermapbox) used idiomatically; HTML
    output saved alongside PNG
  weaknesses:
  - 'Cluster color dominance: per-trace clustering causes the last trace (Hardware
    / #16B8F3) to visually dominate all cluster circles regardless of the actual dominant
    category at that location — clusters appear uniformly sky-blue rather than reflecting
    the mixed or dominant category as the spec requires. Fix: either use a single
    trace with a colorscale or post-process cluster marker colors to reflect the dominant
    category per cluster group.'
  - 'Bottom-right annotation box overlaps with the basemap''s CARTO attribution text
    (''© CARTO; © OpenStreetmap contributors''), partially obscuring the attribution.
    Fix: lower the annotation y-position (e.g. y=0.07) or reduce its width so it clears
    the attribution row.'
  - Cluster number label font size is not explicitly set (uses Plotly defaults) —
    minor inconsistency with the rest of the explicitly-sized typography.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) paper background framing a carto-positron basemap (light gray/beige geographic tiles). Correct theme surface.
      Chrome: Title "Retail Store Locations · map-marker-clustered · python · plotly · anyplot.ai" in dark ink, centered at top — fully readable. Legend top-left with white elevated box, dark-ink title "Store Category (n=440)", four category swatches with INK_SOFT labels. Bottom-right annotation box with INK_SOFT text on elevated background, showing total store count, densest city, and interaction hint.
      Data: Five visible cluster circles in mostly sky-blue (#16B8F3 / Hardware), with thin rings of other palette colors on some clusters. Count numbers (7, 17, 13, 4) in white text inside circles. The clustering works correctly but Hardware trace dominates the visual color of all clusters. Individual markers not visible at zoom 3.5 as expected.
      Legibility verdict: PASS — all text readable. Minor: annotation box overlaps the CARTO copyright text at bottom of map tile.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) paper background framing a carto-darkmatter basemap (dark geographic tiles). Correct theme surface.
      Chrome: Title rendered in light (#F0EFE8) ink, clearly readable against dark background. Legend box uses ELEVATED_BG (#242420) fill with INK_SOFT (#B8B7B0) label text — readable. Annotation box similarly styled with light text on elevated dark background — readable.
      Data: Cluster circles and count numbers identical to light render — same palette colors (#009E73 green, #9418DB purple, #B71D27 red, #16B8F3 sky-blue) with sky-blue Hardware still dominating. Data colors are identical to the light render as required.
      Legibility verdict: PASS — no dark-on-dark failures. All chrome elements correctly flip to light values. No issues with text readability in dark theme.
