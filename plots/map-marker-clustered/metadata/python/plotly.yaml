review:
  strengths:
  - Correct use of Plotly's native cluster feature on go.Scattermap — idiomatic library-distinctive
    geographic clustering without external dependencies
  - Theme-adaptive map tile styles (carto-positron for light / carto-darkmatter for
    dark) is a polished and visually effective adaptation
  - Full anyplot palette compliance in canonical order (#009E73 first) with correct
    theme-adaptive chrome throughout both renders
  - Realistic city-weighted data (440 points across 10 US cities with proportional
    store counts) makes the clustering demo convincing
  - 'Perfect code quality: clean KISS structure, reproducible seed (np.random.seed(42)),
    current go.Scattermap API, dual PNG+HTML outputs'
  weaknesses:
  - Large cluster circle (Boston/NE area) is partially cut off at the right canvas
    edge — adjust map.center to lon=-100.0 (shift ~2 degrees west) or reduce zoom
    from 3.5 to 3.2 to keep all clusters within the viewport
  - Per-trace independent clustering means each category clusters separately so cluster
    circles show sky-blue Hardware dominating while other categories appear only as
    thin rings — mitigate by reducing cluster opacity or adding dominant-category
    info to hovertemplate
  - Bottom and side margins are tight (b=20, l=20, r=20) — increase to b=40, l=40,
    r=40 for better breathing room around map edges
  - Design lacks a data storytelling focal point — no annotations or visual hierarchy
    beyond the clustering itself; consider adding a callout on the densest cluster
    or a total count in the legend title
