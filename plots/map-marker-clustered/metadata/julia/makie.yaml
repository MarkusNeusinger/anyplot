review:
  strengths:
  - Thoughtful basemap simulation using CairoMakie primitives (poly! for water, hlines!/vlines!
    for streets, land/water color tokens that adapt per theme)
  - Proportional cluster bubbles with dominant-category color and white count labels
    — clean and informative hierarchy
  - 'Full theme adaptation: all chrome tokens (PAGE_BG, LAND_COLOR, WATER_COLOR, INK,
    INK_SOFT) correctly flip between light and dark; data colors stay identical'
  - 'Perfect spec compliance: all static-feasible clustering features implemented;
    interactive-only features appropriately skipped'
  - 'Perfect code quality: clean linear structure, seeded, all imports used, correct
    Makie 0.22 API'
  weaknesses:
  - Water body labels ('Hudson River', 'East River') are at fontsize=9, which may
    not be legible at mobile scale (~400 px wide); consider bumping to 10-11pt
  - Solo markers at markersize=15 are small relative to the cluster bubbles — increasing
    to 18 would improve visual separation between individual points and empty space
  - No real geographic coastline outline for Manhattan island — the simplified basemap
    works but a Manhattan boundary polygon would significantly improve geographic
    fidelity
  - The '29' (red) and '37' (purple) cluster bubbles in the center of the map are
    visually adjacent; a slight label offset or smaller bubbles would add breathing
    room
