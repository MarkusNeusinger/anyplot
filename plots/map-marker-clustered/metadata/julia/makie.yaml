review:
  strengths:
  - 'Excellent theme adaptation: all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly wired to every text, spine, grid, legend, and background element; both
    renders are clean and readable'
  - Proportional cluster bubble sizing (clamp(npts * 2.8 + 18, 28, 72)) effectively
    encodes point density without the bubbles overwhelming the plot
  - Layered text!() labels on cluster bubbles is an elegant use of Makie's compositional
    rendering
  - 'Correct anyplot palette order with #009E73 as the first (Coffee Shop) series'
  - Grid-based spatial clustering (0.007 degree cells) is a clean, self-contained
    algorithm requiring no external dependencies
  - 'Perfect code quality: seed, clean imports, KISS structure, correct output pattern'
  weaknesses:
  - 'No basemap: the spec explicitly requires a basemap with appropriate geographic
    context (boundaries, streets, or terrain); coordinate-only axes leave the geography
    context implicit'
  - Individual unclustered marker size (markersize=11) is slightly small for sparse-data
    scatter; increasing to markersize=14-16 would improve visibility at mobile scale
  - Cluster count fontsize=12 hardcoded; at 400px mobile width small cluster labels
    (4, 5) can be difficult to read — consider fontsize=13-14
