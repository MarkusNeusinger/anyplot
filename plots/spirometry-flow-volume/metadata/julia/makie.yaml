review:
  strengths:
  - 'Correct flow-volume loop morphology: sharp rise to PEF, roughly linear expiratory
    decline, and a symmetric U-shaped inspiratory limb below the zero-flow line forming
    a closed loop.'
  - All spec-required clinical annotations present — labeled PEF marker, FVC/FEV1/FEV1-FVC/PEF
    values box, and a dashed predicted-normal reference overlay distinct from the
    solid measured loop.
  - 'Brand green #009E73 used for the measured (primary) series; backgrounds are theme-correct
    (#FAF8F1 light / #1A1A17 dark) with the values box on the elevated surface (#FFFDF6
    / #242420).'
  - 'Clean theme-adaptive chrome: title/labels/ticks all readable in both renders
    with no dark-on-dark or light-on-light failures; top/right spines removed, subtle
    12%-alpha grid.'
  - Polished composition — italic limb labels, zero-flow reference rule, elevated
    callout box, and well-placed legend that avoid overlap with the data.
  weaknesses:
  - 'The predicted-normal overlay color is the theme-adaptive `muted` anchor (INK_MUTED),
    so its hue differs between light and dark renders. This is permitted for the muted
    reference role, but a fixed Imprint hue (e.g. ochre #BD8233) would give the reference
    loop a constant identity across themes.'
  - '''PEF'' appears both as a legend entry and as an inline text annotation next
    to the marker — mildly redundant; the inline label alone would suffice.'
  - 'LM-02: usage is solid but conventional (lines!/scatter!/text!/poly!/axislegend/hlines!);
    no distinctive CairoMakie-specific capability is showcased beyond standard primitives.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1); values callout box on elevated #FFFDF6.
      Chrome: dark title "spirometry-flow-volume · julia · makie · anyplot.ai", axis labels "Volume (L)" / "Flow (L/s)", and grey tick labels all clearly readable. Subtle grid + zero-flow rule visible.
      Data: solid brand-green (#009E73) measured loop; dashed grey predicted-normal overlay; green PEF marker with PAGE_BG stroke at ~(0.45, 9.6). First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17); values box on elevated #242420.
      Chrome: light title and axis labels, light-grey tick labels — all readable, no dark-on-dark failures. Grid and zero-flow rule subtle but visible.
      Data: measured loop is identical brand green #009E73; PEF marker identical. Predicted-normal dashed line is the lighter muted anchor (#A8A79F) — theme-adaptive by the muted-role rule, so it reads correctly against the dark surface.
      Legibility verdict: PASS
