review:
  strengths:
  - 'First categorical series is brand green #009E73; predicted-normal overlay uses
    a neutral dashed INK_SOFT line — clean, CVD-safe two-curve contrast that holds
    in both themes.'
  - 'Closed flow-volume loop is anatomically correct: sharp sqrt rise to PEF, near-linear
    expiratory decline, symmetric U-shaped inspiratory limb below the emphasized zero-flow
    line.'
  - Custom afterDatasetsDraw plugin renders a rounded elevated clinical-values card
    (FVC / FEV1 / PEF, Measured vs Predicted) plus a labeled PEF marker — genuine
    Chart.js mastery, not fake interactivity.
  - Zero-flow y=0 gridline is emphasized via a per-tick grid color/width callback,
    reinforcing the expiratory-above / inspiratory-below split.
  - Theme tokens threaded through every chrome element; data colours identical light/dark,
    only background/text/grid flip. Title matches the mandated anyplot format exactly.
  weaknesses:
  - Single buildLoop() helper arrow function is used for data generation — acceptable
    and idiomatic for the closed-loop construction, but slightly above the strict
    KISS no-functions ideal (CQ-01).
  - Title at 22px is long (~57 chars); legible at full size but margins are tight
    when scaled toward ~400px mobile — could verify it does not crowd at small widths
    (VQ-01).
  - Inspiratory limb is a mathematically perfect half-ellipse; clinically plausible
    but slightly idealized versus a real effort-dependent inspiratory curve (minor
    DQ realism).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure-white plot panel.
