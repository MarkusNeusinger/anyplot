review:
  strengths:
  - 'Textbook flow-volume loop: sharp expiratory rise to PEF then near-linear decline,
    symmetric U-shaped inspiratory limb below the zero line, and a properly closed
    loop sharing the (0,0) and (FVC,0) endpoints.'
  - 'First series is brand green #009E73 (measured); predicted-normal reference uses
    the theme-adaptive muted anchor as a dashed overlay — a correct, semantically
    appropriate use of the Imprint anchors.'
  - 'All spec features present: PEF marker with label, clinical callout box (FEV1,
    FVC, PEF, FEV1/FVC), dashed predicted-normal overlay, zero-flow plotLine with
    Expiration/Inspiration annotation, and unit-bearing axis titles.'
  - 'Idiomatic Highcharts: linkedTo '':previous'' pairs each limb into one legend
    entry, chart.renderer.label builds the callout from the core SVGRenderer (no annotations
    module), plotLines draws the zero-flow reference — all within the core bundle.'
  - 'Theme adaptation is clean in both renders: warm off-white #FAF8F1 / warm near-black
    #1A1A17 backgrounds, identical data colors, only chrome flips; all text readable
    in both themes.'
  - Deterministic in-memory data with physiologically plausible normal-adult values
    (FVC 4.8 L, FEV1 3.9 L, FEV1/FVC 81%, PEF 9.4 L/s).
  weaknesses:
  - 'Minor: the ''PEF · 9.4 L/s'' data label sits where the dashed predicted-normal
    curve peaks, so the dashed line grazes the text in both renders. Still readable,
    but nudging the label down/right (or away from the predicted peak) would remove
    the slight collision.'
  - Data-generation is wrapped in two helper functions (expiratoryLimb/inspiratoryLimb);
    idiomatic for curve synthesis but a small deviation from the strict KISS imports→data→plot
    flow.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Correct.
      Chrome: dark title "spirometry-flow-volume · javascript · highcharts · anyplot.ai", grey subtitle, dark-grey axis titles "Volume (L)" / "Flow (L/s)", tick labels and gridlines all clearly readable. Callout box (top-right) has a light elevated fill with dark text. All readable.
      Data: measured loop is brand green #009E73 (solid, ~3.5px); predicted-normal is a muted-grey dashed overlay; PEF point is a green-filled marker with dark ink stroke. First series confirmed #009E73.
      Legibility verdict: PASS (only nit: dashed predicted line grazes the "PEF · 9.4 L/s" label, text still legible).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black. Correct.
      Chrome: light title/labels (#F0EFE8 / #B8B7B0), subtle light gridlines, callout box with dark elevated fill (#242420) and light text — no dark-on-dark anywhere. All readable.
      Data: colors identical to light render — measured #009E73 solid, predicted muted-grey dashed, PEF green marker (lighter ink stroke). Only chrome flipped.
      Legibility verdict: PASS (same minor PEF-label/dashed-line graze as light).
