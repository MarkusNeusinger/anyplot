review:
  strengths:
  - 'Correct closed flow-volume loop: expiratory limb rises sharply to PEF then declines,
    inspiratory limb forms a symmetric U below the zero line — textbook spirometry
    shape.'
  - 'All spec-required clinical annotations present: PEF marked with a green dot +
    leader line, and a clean elevated info panel listing PEF/FEV1/FVC/FEV1-FVC numeric
    values.'
  - Dashed predicted-normal envelope overlaid for comparison with distinct styling
    (solid brand-green measured vs neutral dashed predicted), exactly as the spec
    requests.
  - 'First series is brand green #009E73; backgrounds are correct warm off-white (light)
    and warm near-black (dark); data colours identical across themes with only chrome
    flipping.'
  - 'Idiomatic MUI X community usage: LineChart plus useXScale/useYScale/useDrawingArea
    hooks to render a precise custom SVG overlay (zero-flow line, PEF marker, panel)
    inside the drawing area — a distinctive, correct use of the library.'
  - Realistic clinical context (mild obstructive pattern, FEV1/FVC 76%, scooped descending
    limb) with sensible physiological scales.
  weaknesses:
  - Title fontsize (21px CSS) sits slightly below the ~22px guideline; it reads fine
    at full resolution but could be nudged up marginally for stronger typographic
    hierarchy.
  - Several helper functions (expiratoryLimb, inspiratoryLimb, toPath) are defined
    at module scope — justified and clear in a React/data-gen context, but slightly
    more structure than the flattest possible KISS form.
  - Both horizontal and vertical grid lines are drawn; a y-axis-only grid would be
    marginally cleaner for this line-loop, though the current grid is subtle and does
    not compete with the data.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure white, no painted panel behind chart.
      Chrome: title "spirometry-flow-volume · javascript · muix · anyplot.ai" in dark ink, centered and fully readable. Axis labels "Volume (L)" / "Flow (L/s)" and numeric ticks in dark/soft ink, all clearly legible. "Expiration ▲" / "Inspiration ▼" soft-ink labels readable near the zero line.
      Data: solid brand-green (#009E73) measured loop; neutral grey dashed predicted-normal envelope; green PEF dot with leader line + "PEF" label; elevated legend/clinical panel (PEF 9.5 L/s, FEV1 3.80 L, FVC 5.00 L, FEV1/FVC 76 %) with green solid + grey dashed legend swatches. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black.
      Chrome: title and axis/tick labels render in light ink, all readable against the dark surface — no dark-on-dark failures. Expiration/Inspiration labels readable. Panel frame elevated (#242420) with light text.
      Data: identical to light render — brand-green measured loop, grey dashed predicted envelope, green PEF marker, same clinical values. Data colours unchanged; only chrome flipped.
      Legibility verdict: PASS
