review:
  strengths:
  - Correct flow-volume loop morphology — sharp expiratory rise to PEF then near-linear
    decline, symmetric U-shaped inspiratory limb below the zero-flow line, closed
    into a single shape
  - 'Brand-correct palette: measured loop is #009E73 (palette[0]) solid, predicted-normal
    overlay is palette[2] blue dashed — CVD-safe and distinct in both themes'
  - 'All spec features present: labeled PEF marker, dashed predicted-normal overlay,
    and an elevated clinical callout box listing PEF/FVC/FEV1/FEV1:FVC'
  - 'Excellent theme adaptation — warm off-white #FAF8F1 light and warm near-black
    #1A1A17 dark; data colors identical, only chrome flips; no dark-on-dark or light-on-light
    text'
  - 'Thoughtful design touches: zero-flow reference line separating limbs, italic
    ''Expiration up / Inspiration down'' orientation hints, subtle green area fill,
    rounded legend frame on elevated surface'
  - 'Idiomatic D3: scaleLinear, d3.line with curveCatmullRom smoothing, axisBottom/axisLeft
    with theme-tokened ticks/domain, deterministic LCG seed for reproducibility, sized
    from window.ANYPLOT_SIZE'
  weaknesses:
  - The 'PEF 9.4 L/s' annotation sits very close to the dashed predicted curve at
    the top-left; it remains readable but a few px more clearance would improve breathing
    room
  - Code defines two helper functions (rand, flowVolumeLoop) — reasonable for deterministic
    data generation but a slight deviation from the strict KISS 'no functions' guideline
    (CQ-01)
  - Library mastery is solid but not deeply distinctive — relies on core d3-shape/d3-scale/d3-axis;
    no advanced d3 features (e.g. area generator, clip paths, gradient defs) that
    would showcase unique capability (LM-02)
