review:
  strengths:
  - 'First series is brand green #009E73 with a clean, well-differentiated muted-gray
    dashed predicted-normal overlay — the spec''s solid-vs-dashed distinction is implemented
    exactly.'
  - Correct closed flow-volume loop with sharp rise to PEF, linear-ish expiratory
    decline, and a symmetric U-shaped inspiratory limb below the zero-flow line.
  - PEF marked with a labeled bordered point, plus an idiomatic clinical callout box
    (FVC, FEV1, FEV1/FVC, PEF) using an elevated background — fully satisfies the
    spec annotations.
  - Zero-flow markLine cleanly separates expiratory and inspiratory limbs; subtle
    grid, generous whitespace, readable typography in both themes.
  - Both light (#FAF8F1) and dark (#1A1A17) renders are theme-correct with identical
    data colors; all chrome flips properly and remains legible.
  - 'Idiomatic ECharts: markPoint, markLine, and graphic text box are used naturally;
    deterministic LCG seed makes the jittered measured trace reproducible.'
  weaknesses:
  - Legend swatch for "Predicted normal" renders as the palette[1] purple circle marker
    rather than the muted-gray dashed style actually used for the line — the legend
    icon color does not match the on-canvas line. Set the legend item color (e.g.
    via series-level itemStyle/lineStyle that the legend inherits, or legend textStyle/icon
    override) so the swatch reads gray-dashed.
  - The PEF text label sits very close to the dashed predicted curve near the top-left;
    still readable, but a touch more vertical distance would reduce visual crowding.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), correct light surface — not pure white.
      Chrome: Dark title "spirometry-flow-volume · javascript · echarts · anyplot.ai", axis titles "Volume (L)" / "Flow (L/s)", and tick labels all dark and clearly readable. Grid lines subtle. Legend "Measured" / "Predicted normal" at top, readable. Clinical callout box (FVC, FEV1, FEV1/FVC, PEF) top-right on a light elevated panel with dark text — readable.
      Data: Measured loop is brand green #009E73 (solid, ~3.5px) forming a closed flow-volume loop; predicted-normal overlay is a muted gray dashed loop. PEF marked with a filled green dot + "PEF" label. Zero-flow divider line present. First series is #009E73 — confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), correct dark surface — not pure black.
      Chrome: Light/white title, axis titles, and tick labels all clearly readable against the dark background. No dark-on-dark failures. Grid subtle but visible. Clinical callout box uses a dark elevated panel with light text — readable. Legend readable.
      Data: Colors identical to light render — measured loop is #009E73 green, predicted overlay is muted gray dashed. PEF marker and label present. Brand green reads well on the dark surface.
      Legibility verdict: PASS

    Note: In BOTH renders the legend swatch for "Predicted normal" shows a purple (palette[1]) circle icon rather than the gray-dashed style of the actual line — a legend-vs-line color mismatch (minor VQ-07 inconsistency), not a legibility failure.
