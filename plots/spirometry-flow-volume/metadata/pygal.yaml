    somewhat redundant
  image_description: 'The plot displays a spirometry flow-volume loop on a white background
    with the title "spirometry-flow-volume · pygal · pyplots.ai" at the top. The x-axis
    is labeled "Volume (L)" (0.0–6.0 L) and the y-axis "Flow (L/s)" (−8.0 to 12.0
    L/s). Two measured curves in blue (#306998) form the loop: the expiratory limb
    rises sharply to a peak near 9.4 L/s then declines roughly linearly, while the
    inspiratory limb forms a U-shaped curve reaching about −6 L/s below the zero line.
    Two predicted normal curves are rendered as dashed gray lines, slightly larger
    than the measured loop, providing a reference overlay. A red dot marks the PEF
    point with a bold label "PEF = 9.4 L/s". In the upper-right corner, a rounded-corner
    box displays clinical values: FEV1: 3.8 L (79% FVC), FVC: 4.8 L, PEF: 9.5 L/s.
    The legend at the bottom lists five series: Measured (Expiratory), Measured (Inspiratory),
    Predicted (Expiratory), Predicted (Inspiratory), and PEF.'
