    the y-axis shows "Flow (L/s)" ranging from -8 to 12. Two flow-volume loops are
    shown: a measured loop (solid blue #306998 lines with light blue ribbon fill)
    and a predicted normal loop (dashed gray #9CA3AF lines with light gray ribbon
    fill). The measured expiratory limb rises sharply to PEF at ~8.5 L/s near 0.3
    L volume, then declines roughly linearly to FVC at 4.2 L. The inspiratory limb
    forms a symmetric U-shaped curve reaching about -6 L/s. A red dot marks PEF with
    a red-background label "PEF: 8.5 L/s". A green diamond marks FEV1 with a green-background
    label "FEV1 at 3.1 L". A centered gray box displays "FEV1: 3.1 L | FVC: 4.2 L
