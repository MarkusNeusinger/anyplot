review:
  strengths:
  - 'Spirometry flow-volume loop is anatomically faithful: sharp expiratory rise to
    PEF, near-linear decline, and a symmetric inspiratory U below the zero-flow line,
    all forming a clean closed loop.'
  - 'Excellent palette compliance — measured loop is brand green #009E73 (first series),
    predicted-normal reference uses the muted anchor (#6B6A63 light / #A8A79F dark),
    backgrounds are correct #FAF8F1 / #1A1A17, and data colors are identical across
    both themes with only chrome flipping.'
  - 'All spec features present: PEF marked with a labeled point, FEV1/FVC/PEF clinical
    values in a monospace annotation box, dashed predicted-normal overlay, and unit-bearing
    axis labels.'
  - Both light and dark renders are fully legible — title, axis labels, ticks, annotation
    box, and legend all read clearly with no dark-on-dark or light-on-light failures.
  - 'Idiomatic ggplot2: geom_path for the ordered loop, combined color+linetype aesthetics,
    scale_*_manual, theme-token-driven chrome, and an inside-positioned legend.'
  weaknesses:
  - Legend box at bottom-right (legend.position.inside c(0.99, 0.02)) slightly occludes
    the lower-right tail of the dashed predicted-normal inspiratory curve (~volume
    3.7–5.5). Minor — consider nudging the legend or curve so the reference loop is
    fully visible behind it.
  - A single helper function flow_volume_loop() is used to generate both loops; well-justified
    for DRY but counts as a slight deviation from the strict no-functions KISS preference.
  - FEV1 = 3.55 L is reported only in the text box and is not visually located on
    the curve; acceptable per spec but a small FEV1 tick/marker on the expiratory
    limb would strengthen the clinical storytelling.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1). Correct light surface, not pure white.
      Chrome: dark title "spirometry-flow-volume · r · ggplot2 · anyplot.ai" top-left;
        axis titles "Volume (L)" / "Flow (L/s)" and numeric ticks in soft ink — all clearly
        readable. Subtle dark-on-cream major gridlines (minor grid removed). Zero-flow
        reference line drawn. Clinical annotation box (FVC/FEV1/PEF) in monospace inside an
        elevated off-white card top-right; legend card bottom-right. All readable.
      Data: measured loop solid brand green (#009E73) as first series; predicted-normal loop
        dashed muted gray (#6B6A63); green PEF point + bold "PEF" label near the peak.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17). Correct dark surface, not pure black.
      Chrome: light-ink title, axis titles, and ticks all clearly readable against the dark
        background — no dark-on-dark failures. Gridlines are faint light lines, subtle but
        visible. Annotation and legend cards sit on a slightly elevated near-black (#242420)
        with light text — fully readable.
      Data: identical to light render — measured loop brand green (#009E73), predicted-normal
        dashed; only the muted reference gray lightens to its dark-theme variant (#A8A79F) and
        chrome flips. Data hues are preserved.
      Legibility verdict: PASS
