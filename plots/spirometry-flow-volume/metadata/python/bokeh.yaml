review:
  strengths:
  - 'Both renders are theme-correct: light on #FAF8F1 warm off-white, dark on #1A1A17
    warm near-black, with all chrome (title, axis/tick labels, grid, legend, callout
    box) flipping correctly while data colors stay identical.'
  - 'Full spec coverage: closed flow-volume loop with sharp expiratory rise to PEF
    then decline, symmetric U-shaped inspiratory limb below zero, dashed predicted-normal
    overlay, PEF/FEV1 focal markers, and a clinical callout box listing FVC/FEV1/FEV1-FVC/PEF.'
  - Strong data storytelling — the shaded green diagnostic gap between measured and
    predicted expiratory limbs plus the red PEF and ochre FEV1 focal anchors create
    clear visual hierarchy and convey the reduction-vs-normal insight.
  - 'Correct Imprint palette usage: measured series is brand green #009E73, predicted
    is blue #4467A3, PEF uses matte-red #AE3030 and FEV1 ochre #BD8233 as intentional
    semantic landmark anchors.'
  - 'Idiomatic bokeh: ColumnDataSource, manually-built Legend/LegendItem, Label annotations,
    p.patch for the diagnostic shading, and a HoverTool retained in the interactive
    HTML artifact.'
  - Clean KISS script — linear imports->data->plot->save, deterministic data, explicit
    font sizing (50/42/34pt), spines removed, subtle y-only grid, toolbar disabled
    so PNG hits exactly 3200x1800.
  weaknesses:
  - The PEF and FEV1 annotation labels slightly overlap the predicted dotted curve
    and the measured line respectively; both stay fully readable but a small nudge
    would remove the text-on-data crossing (VQ-02).
  - 'On the dark render the red PEF label (#AE3030 on #1A1A17) is lower-contrast than
    the other chrome; still legible because it is bold, but consider a lighter accent
    or thin halo for the dark theme.'
  - Code comment labels the case 'mildly-obstructed' yet the displayed FEV1/FVC =
    79% sits within the normal range (obstruction is conventionally <70%); the individual
    values are realistic but the obstruction framing is slightly inconsistent.
  - The measured expiratory descending limb is nearly a straight line; a faint scalloped/curved
    decline would read as more physiologically authentic.
  - Some empty canvas in the lower-left quadrant — inherent to the loop geometry,
    not a layout error, but the plot is slightly lopsided.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1, no pure white. Correct.
      Chrome: title "spirometry-flow-volume · python · bokeh · anyplot.ai" in dark ink top-left, fully visible (no top-edge clipping). Axis labels "Volume (L)" / "Flow (L/s)" and 34pt tick labels dark and readable. Subtle y-grid only. Legend (Measured / Predicted Normal) bottom-right in an elevated box; clinical callout box (FVC/FEV1/FEV1-FVC/PEF) top-right, all readable.
      Data: measured loop solid brand green #009E73; predicted-normal loop dashed blue #4467A3; faint green diagnostic shading between the expiratory limbs; red PEF marker (#AE3030) + label; ochre FEV1 marker (#BD8233) + label. First series is #009E73 as required.
      Legibility verdict: PASS — all text readable against the light surface.

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17, no pure black. Correct.
      Chrome: title and axis/tick labels are light (#F0EFE8 / #B8B7B0) and clearly readable; legend and callout box use elevated dark fill #242420 with light text. No dark-on-dark failures.
      Data: identical data colors to the light render — green measured, blue dashed predicted, red PEF, ochre FEV1, green shaded gap. Only chrome flipped. The red PEF label is the lowest-contrast element on near-black but remains legible (bold).
      Legibility verdict: PASS — all text readable against the dark surface.
