review:
  strengths:
  - 'Correct flow-volume loop morphology: sharp expiratory rise to a clearly marked
    PEF, roughly linear decline, and a symmetric U-shaped inspiratory limb below the
    zero line — the loop closes cleanly at both volume extremes.'
  - 'All required clinical annotations present: PEF point highlighted in matte red
    with an inline label, plus a styled Clinical Values callout box (FEV1, FVC, PEF
    with the 79% FEV1/FVC ratio).'
  - Dashed predicted-normal overlay achieved via SVG post-processing gives clear measured-vs-predicted
    differentiation; solid thick measured loop vs thin dashed reference reads instantly.
  - 'Theme adaptation is correct in both renders: warm-cream #FAF8F1 and warm-black
    #1A1A17 surfaces, with identical data colors (brand green measured, muted gray
    predicted, red PEF) flipping only chrome.'
  - 'First series is #009E73 brand green; title matches the mandated ''spirometry-flow-volume
    · python · pygal · anyplot.ai'' format.'
  - 'Distinctive pygal usage: interactive SVG/HTML output with value formatters, plus
    surgical ElementTree post-processing for dashing, PEF emphasis, callout box, and
    a dashed zero-flow reference line.'
  weaknesses:
  - Legend at the bottom carries five entries including two near-identical gray 'Predicted
    Normal (Expiratory/Inspiratory)' swatches — slightly busy; could be consolidated
    to a single 'Predicted Normal' entry for cleaner reading, though no actual overlap
    occurs.
  - Grid chrome relies on pygal defaults (subtle y-guides only); refinement is good
    but not exceptional — visual refinement is solid rather than standout.
  - The SVG ElementTree post-processing (dashing by serie class, PEF circle rewrite,
    manual box/text placement) is effective but adds notable complexity and is somewhat
    fragile to pygal's internal class naming.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "spirometry-flow-volume · python · pygal · anyplot.ai" in dark ink, fully readable; axis titles "Volume (L)" / "Flow (L/s)" and tick labels (0.0–5.0 L, -5.0 to 10.0 L/s) all crisp and dark on the light surface. Subtle gray y-grid visible but not dominant.
      Data: measured loop in brand green #009E73 (thick solid), predicted-normal loop in muted gray dashed, PEF marked by a red #AE3030 dot with "PEF = 9.5 L/s" label. Clinical Values callout box (upper right) on elevated cream with a green accent bar. First series confirmed #009E73.
      Legibility verdict: PASS — all text and data clearly readable.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title, axis titles, and tick labels render in light ink, all clearly readable; no dark-on-dark failures. Grid lines subtle muted tone, visible.
      Data: colors identical to light render — green measured, gray dashed predicted, red PEF dot/label, green accent bar on the callout box (elevated dark #242420 with light/muted text, readable). Only chrome flipped.
      Legibility verdict: PASS — no dark-on-dark issues; brand green visible on the dark surface.
