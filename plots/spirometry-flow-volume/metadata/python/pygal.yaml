review:
  strengths:
  - 'First series uses brand green #009E73; predicted overlay drawn as muted dashed
    gray and PEF emphasised in matte red — a clean, semantically-meaningful Imprint
    palette on the correct #FAF8F1 / #1A1A17 surfaces, identical data colors across
    both themes.'
  - 'Closed flow-volume loop is well-formed: sharp rise to PEF, roughly linear expiratory
    decline, symmetric U-shaped inspiratory limb — physiologically convincing for
    a healthy adult.'
  - 'All spec-required clinical features present: red labeled PEF marker, FEV1/FVC/PEF
    callout box with brand accent bar, dashed predicted-normal overlay, and a dashed
    zero-flow reference line.'
  - 'Polished design: elevated callout card, generous whitespace, subtle theme-adaptive
    grid, clear red focal point — strong visual hierarchy and storytelling.'
  - Leans on pygal's distinctive interactive output (HTML + tooltips, value/x_value
    formatters) while using thoughtful SVG post-processing for dashes and annotations
    pygal can't express natively.
  weaknesses:
  - X-axis has no numeric volume tick labels — only the 'Volume (L)' title is shown.
    For a flow-volume loop the volume scale (e.g. FVC endpoint near 4.8 L) is clinically
    meaningful; enable major x labels so the viewer can read volume off the axis.
  - PEF marker label reads 'PEF = 9.4 L/s' (the noisy measured peak) while the clinical
    callout box and spec input state 9.5 L/s — a small inconsistency. Either label
    the nominal PEF or round both consistently so the two annotations agree.
  - Y-axis shows only two ticks (0.0 and 10.0 L/s); a couple of intermediate ticks
    (e.g. 5.0, -5.0) would aid reading flow magnitudes on both limbs.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — not pure white, correct.
      Chrome: dark title "spirometry-flow-volume · python · pygal · anyplot.ai", dark "Flow (L/s)" / "Volume (L)" axis titles, dark "10.0 L/s" / "0.0 L/s" y-ticks, dark legend text at bottom — all clearly readable. Subtle grid.
      Data: measured loop in brand green #009E73 (solid), predicted-normal loop in muted gray dashed, red PEF dot (#AE3030) with bold "PEF = 9.4 L/s" label, dashed zero-flow reference line, elevated "Clinical Values" callout box with green accent bar (FEV1/FVC/PEF). First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black, correct.
      Chrome: light title, light axis titles, light "10.0 L/s" / "0.0 L/s" y-ticks, light legend text — all clearly readable, no dark-on-dark failures.
      Data: identical to light render — green measured loop, gray dashed predicted loop, red PEF marker, green-accented callout card on elevated dark surface. Only chrome flipped; data colors unchanged.
      Legibility verdict: PASS
