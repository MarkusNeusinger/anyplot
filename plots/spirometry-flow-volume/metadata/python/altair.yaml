review:
  strengths:
  - 'First series is brand green #009E73 (measured loop) and the predicted overlay
    uses the theme-adaptive muted anchor as a dashed reference — textbook Imprint
    palette discipline.'
  - 'Strong data storytelling: red #AE3030 PEF marker is a clear focal point, FEV1
    blue reference line, and a clinical FVC/FEV1/PEF callout block guide clinical
    interpretation.'
  - 'Both renders are fully theme-correct — warm off-white #FAF8F1 / warm near-black
    #1A1A17 backgrounds, all chrome flips cleanly, data colors identical across themes,
    no dark-on-dark text.'
  - 'All spec features present: closed flow-volume loop, sharp rise to PEF then linear
    decline, U-shaped inspiratory limb, dashed predicted overlay, Expiration/Inspiration
    region labels, zero-flow reference line.'
  - 'Distinctive Altair usage: layered composition plus a real interactive nearest-point
    hover (rule + highlighted point + tooltip) exported to HTML — genuine interactivity,
    not faked UI.'
  - Canvas is exactly 3200x1800 via the prescribed render-then-pad approach; KISS
    linear script, seeded RNG, clean imports.
  weaknesses:
  - 'Minor redundancy: ''PEF = 9.5 L/s'' appears twice (focal marker label AND clinical
    callout block). Consider dropping it from one to reduce repetition.'
  - The 'Expiration' region label sits quite close to the top of the rising expiratory
    limb and the PEF marker — readable, but a touch crowded; nudging it left/up would
    add breathing room.
  - Tick labels at 10px and the italic region labels at 13px are on the smaller side
    for ~400px mobile scaling — legible but near the lower bound.
  image_description: |-
