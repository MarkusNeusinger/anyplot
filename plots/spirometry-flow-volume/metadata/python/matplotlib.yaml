      Data: measured loop solid brand green (#009E73), predicted-normal dashed neutral gray, matte-red (#AE3030) low-alpha obstruction-gap fill between the two limbs. PEF marked with a green dot + "PEF = 8.5 L/s" annotation. Directional arrows + EXPIRATION/INSPIRATION labels. First series is brand green as required.
