review:
  strengths:
  - 'Excellent spec coverage: closed flow-volume loop with both expiratory and inspiratory
    limbs, PEF marker + annotation, FVC/FEV1/FEV1:FVC/PEF clinical text box, and a
    dashed predicted-normal overlay.'
  - Strong data storytelling — the matte-red obstruction-gap fill between measured
    and predicted limbs makes the obstruction pattern instantly legible, and the directional
    arrows + EXPIRATION/INSPIRATION labels guide the reader around the loop.
  - 'Clean theme adaptation: data colors (brand green measured, neutral dashed predicted,
    matte-red gap) are identical across light and dark; only chrome (background, ink,
    grid, legend/box frames) flips. Both renders fully readable.'
  - Correct canvas (exactly 3200x1800), correct title format, descriptive axis labels
    with units, brand-green first series, and idiomatic matplotlib (Axes methods,
    FancyArrowPatch, fill_between, transAxes text box, np.interp for the gap).
  weaknesses:
  - 'CQ-01: two small helper functions (expiratory_limb / inspiratory_limb) are used
    for data generation rather than fully inline code — minor deviation from the strict
    KISS no-functions guideline, though justified here for the two-limb symmetry.'
  - 'Cosmetic: in the clinical text box the FEV1/FVC line is right-aligned and its
    = sign does not align with the other three monospace rows, giving a slightly ragged
    look. Consider padding it to match column alignment.'
  - The PEF annotation arc and the green directional arrow near the peak sit close
    together in the upper-left; not overlapping, but slightly busy at small (400px)
    scale.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
