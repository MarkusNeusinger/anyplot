review:
  strengths:
  - 'First measured series is brand green #009E73 and identical across both themes;
    theme-adaptive chrome (#FAF8F1 / #1A1A17 backgrounds) is correctly threaded through
    title, axes, ticks, grid and legend.'
  - 'Closed flow-volume loop is anatomically correct: sharp rise to PEF, roughly linear
    expiratory decline, symmetric U-shaped inspiratory limb below zero, with a zero-flow
    reference line.'
  - All spec clinical annotations present and legible — PEF marker (ochre), FEV1 marker
    (lavender diamond), and a summary box with FEV1 / FVC / PEF / FEV1-FVC ratio.
  - Dashed predicted-normal reference loop overlaid with subtle ribbon fills for both
    measured and predicted interiors, giving a clear measured-vs-normal contrast and
    visual hierarchy.
  - 'Idiomatic lets-plot: grammar-of-graphics layering, merged color+linetype legend,
    interactive layer_tooltips, and dual PNG+HTML export at the correct 3200x1800
    canvas.'
  weaknesses:
  - 'Top region is slightly busy: the clinical summary text box and the legend both
    sit in the upper band near the expiratory peak; consider nudging the summary box
    down/left for more breathing room.'
  - In the dark render the legend key swatches carry a heavy dark fill (ribbon-in-legend
    artifact) that looks marginally less polished than the rest of the chrome.
  - Predicted-normal curve uses theme-muted ink-grey rather than a second Imprint
    categorical color — acceptable as a de-emphasized reference, but it is the one
    data series whose hue shifts between themes.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: bold dark title "spirometry-flow-volume · python · letsplot · anyplot.ai" top-left; axis titles "Volume (L)" / "Flow (L/s)" and numeric ticks all dark and clearly readable; subtle warm-grey horizontal gridlines only; legend top-right (Measured / Predicted normal) with elevated off-white frame.
      Data: measured loop solid brand green #009E73; predicted-normal loop dashed muted grey; ochre PEF dot + "PEF 8.5 L/s" label; lavender FEV1 diamond + "FEV1 at 3.1 L" label; translucent green and grey ribbon fills inside the loops; black-outlined clinical summary box reads "FEV1 3.1 L · FVC 4.2 L · PEF 8.5 L/s · FEV1/FVC 74%".
      Legibility verdict: PASS — every text element is dark-on-light and crisp.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: light/white title and axis text, light ticks, subtle dark-grey gridlines, legend with dark elevated frame and light text — all clearly readable.
      Data: measured loop is the same brand green #009E73; PEF ochre and FEV1 lavender accents identical to the light render; predicted-normal is a light dashed grey (theme-muted ink). Annotation text inside the off-dark label boxes is readable.
      Legibility verdict: PASS — no dark-on-dark text; all chrome flips correctly while the green/ochre/lavender data colors stay constant.
