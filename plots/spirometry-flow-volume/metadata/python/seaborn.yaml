review:
  strengths:
  - 'Closed flow-volume loop is anatomically correct: sharp expiratory rise to PEF
    then linear decline, symmetric U-shaped inspiratory limb below zero, expiratory
    and inspiratory limbs share endpoints to form a clean closed shape.'
  - 'All spec-required clinical annotations present and legible: PEF marked with red
    dot + arrow callout, FEV1 with a green diamond marker, and a monospace clinical
    callout box reporting FVC/FEV1/FEV1-FVC ratio/PEF.'
  - Dashed muted predicted-normal overlay plus a red-shaded 'Flow deficit' region
    between measured and predicted expiratory limbs adds genuine clinical data storytelling.
  - 'Idiomatic seaborn: sns.lineplot with hue+style+dashes drives the solid/dashed
    differentiation natively, sns.scatterplot for the marked points, sns.set_theme
    + sns.despine for theme-adaptive chrome.'
  - 'Both light and dark renders are fully readable: warm off-white #FAF8F1 / warm
    near-black #1A1A17 backgrounds, brand green #009E73 measured loop identical across
    themes, no dark-on-dark or light-on-light text.'
  weaknesses:
  - The predicted-normal overlay uses INK_MUTED (a theme-adaptive chrome token), so
    the reference series color flips between light (#6B6A63) and dark (#A8A79F). It
    reads as an intentional de-emphasized neutral reference, but strictly a data series
    should hold a fixed palette color across themes — consider a fixed muted gray
    if stricter theme-color parity is desired.
  - Tick labels at 8pt are on the small side when the 3200x1800 canvas is scaled down
    to ~400px mobile width; still readable but near the lower bound.
  - 'LM-02: a fair amount of the polish (annotate arrows, fill_between deficit shading,
    text callout box, axhline) is plain matplotlib rather than seaborn-distinctive
    API — appropriate, but limits the seaborn-specific feature showcase.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1, correct light surface.
      Chrome: dark title "spirometry-flow-volume · python · seaborn · anyplot.ai", dark axis labels "Volume (L)" / "Flow (L/s)", dark tick labels, subtle horizontal y-grid, top/right spines removed. All readable.
      Data: measured loop in brand green #009E73 (solid), predicted-normal loop in muted dark-gray dashed, PEF marker red dot with red arrow "PEF = 9.5 L/s", FEV1 green diamond with green "FEV₁ = 3.5 L" callout, pink-shaded flow-deficit region, monospace clinical box (FVC/FEV1/FEV1-FVC/PEF), legend top-right (Measured / Predicted Normal / Flow deficit).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17, correct dark surface.
      Chrome: light title, light axis + tick labels, subtle grid, despined. All readable.
      Data: measured loop green #009E73 identical to light render, predicted overlay light-gray dashed, PEF red dot still clearly visible, FEV1 green diamond, deficit region shaded dark red (visible), clinical callout box with light text on elevated dark panel.
      Legibility verdict: PASS — no dark-on-dark failures; PEF red and brand green both legible on the near-black surface.
