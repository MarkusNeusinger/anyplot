review:
  strengths:
  - 'Correct flow-volume loop: sharp expiratory rise to PEF then linear-ish decline,
    symmetric U-shaped inspiratory limb below zero, closed shape connecting both limbs.'
  - All required clinical annotations present — PEF labeled red focal point, FVC/FEV1/PEF/FEV1-FVC
    ratio text box, dashed predicted-normal overlay for comparison.
  - 'Strong data storytelling: amber ''Deficit vs predicted'' ribbon shades the gap
    between measured and predicted expiratory limbs, giving the chart a clear clinical
    narrative.'
  - 'Theme adaptation is correct in both renders — warm off-white #FAF8F1 / warm near-black
    #1A1A17 backgrounds, data colors identical, only chrome flips. Brand green #009E73
    measured loop reads well on both surfaces.'
  - 'Idiomatic plotnine grammar-of-graphics usage: geom_ribbon, scale_*_manual, merged
    color/linetype legends via guides(), coord_cartesian framing.'
  - Title matches required format exactly; axis labels 'Volume (L)' / 'Flow (L/s)'
    carry units.
  weaknesses:
  - Legend box at top-right is opaque and sits on top of the descending measured and
    predicted expiratory limbs (volume ~2.7-3.6 L), occluding data and part of the
    deficit ribbon. Move the legend to an empty region (e.g. lower-right inside the
    loop) or make it semi-transparent so the curves remain visible behind it.
  - Predicted-normal series uses the theme-adaptive muted gray (INK_MUTED) rather
    than Imprint palette position 2 (#C475FD). Defensible as a muted reference baseline,
    but it is a minor deviation from strict multi-series Imprint ordering — VQ-07
    docked accordingly.
  - Clinical annotation box text (size 4.4) and the 'PEF = 9.5 L/s' label (size 4.6)
    are on the small side; readable at full 3200x1800 but borderline when scaled to
    ~400 px mobile width. Consider a small bump for mobile legibility.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: bold dark title "spirometry-flow-volume · python · plotnine · anyplot.ai" fully visible at top (no clipping). Axis titles "Volume (L)" / "Flow (L/s)" and tick labels are dark (INK_SOFT) and clearly readable. Subtle gray grid. Legend "Curve" top-right on elevated off-white box.
      Data: measured loop solid brand green #009E73; predicted-normal dashed muted gray; red PEF focal point at ~(1.4, 9.5) with red "PEF = 9.5 L/s" label; amber (#DDCC77) "Deficit vs predicted" ribbon between expiratory limbs; bordered clinical text box bottom-left (FVC/FEV1/PEF/ratio). First series is #009E73 — confirmed.
      Legibility verdict: PASS (one occlusion note: opaque legend covers part of the descending limbs, but no text is unreadable).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: light title and axis/tick labels (light INK on dark) all clearly readable; no dark-on-dark failures. Grid subtle but visible. Legend on dark elevated (#242420) box with light text — readable.
      Data: colors identical to light render — green measured solid, gray dashed predicted, red PEF point, olive/amber deficit ribbon, light-bordered clinical box. Brand green #009E73 still clearly visible on dark surface.
      Legibility verdict: PASS (same legend-over-data occlusion as light; no readability failure).
