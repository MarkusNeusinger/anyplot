review:
  strengths:
  - 'Exact spec compliance: closed flow-volume loop with sharp expiratory rise to
    PEF, symmetric U-shaped inspiratory limb, dashed predicted-normal overlay, and
    a clinical callout box with FVC/FEV1/PEF/ratio.'
  - 'First series is brand green #009E73 (measured), predicted normal is Imprint violet
    #C475FD with a redundant dashed linetype — CVD-safe double encoding.'
  - 'Strong plotnine grammar usage: geom_path for the loop, geom_ribbon for the amber
    deficit band, layered geom_point + geom_text for the matte-red PEF focal point,
    guides(override_aes) to merge color+linetype legends.'
  - 'Both themes render correctly — warm #FAF8F1 / #1A1A17 backgrounds, theme-adaptive
    ink, elevated legend and annotation boxes; data colors identical across themes.'
  - 'Clear data storytelling: red PEF marker as focal point and amber deficit ribbon
    visually communicate the measured-vs-predicted impairment.'
  weaknesses:
  - Clinical callout box text (annotate size=5.0) and the PEF label (size=5.2) are
    on the small side — readable at full 3200px but borderline when scaled to ~400px
    mobile width; consider bumping ~10-15%.
  - The fill legend for 'Deficit vs predicted' uses a blank name ' ' which leaves
    a small empty header gap above that swatch — minor cosmetic awkwardness in the
    legend block.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Correct.
