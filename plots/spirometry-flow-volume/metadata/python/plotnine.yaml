      Data: measured loop solid brand green #009E73; predicted-normal loop dashed violet #C475FD; amber #DDCC77 deficit ribbon between expiratory limbs; matte-red #AE3030 PEF point + "PEF = 9.5 L/s" label at apex. First series is #009E73. Correct.
