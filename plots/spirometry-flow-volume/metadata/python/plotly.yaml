review:
  strengths:
  - 'Closed flow-volume loop is anatomically correct: sharp expiratory rise to PEF
    then linear decline (upper limb), symmetric U-shaped inspiratory limb below the
    zero line — exactly what the spec describes.'
  - 'All required clinical landmarks present: blue diamond PEF marker sitting on the
    curve peak with an arrow annotation, FEV1 dash-dot reference line + label, and
    a Spirometry Results box reporting FEV1, FVC, FEV1/FVC (74%), and PEF.'
  - Dashed muted predicted-normal loop overlaid behind the solid green measured loop,
    with the gap rendered as a semantic matte-red (#AE3030) Flow Deficit fill — a
    sophisticated visual that tells the obstruction story.
  - 'First series is brand green #009E73; PEF blue (#4467A3) and deficit red are from
    the Imprint palette; backgrounds are correct #FAF8F1 / #1A1A17 and identical data
    colors carry across both themes (measured/PEF/deficit).'
  - Both renders are fully legible — title, axis labels, ticks, and all annotation
    boxes read clearly with no dark-on-dark or light-on-light failures; canvas dimension
    gate passed.
  - 'Clean KISS plotly graph_objects code: seeded data, only used imports, idiomatic
    add_trace/add_annotation/add_shape/add_hline, hovertemplates, fill=''toself'',
    spline shape, legendrank ordering, scale=4 landscape export with HTML.'
  weaknesses:
  - 'Minor: the Predicted Normal line uses the theme-adaptive INK_MUTED token (dark
    gray #6B6A63 in light, light gray #A8A79F in dark), so its hue flips between themes.
    It reads as a de-emphasized reference rather than a palette series so impact is
    small, but the style guide prefers data-series colors to be identical across themes
    — consider a fixed neutral if strict parity is desired.'
  - 'Minor: in the dark render the Spirometry Results box and FEV1 label backgrounds
    have slightly lower contrast against the near-black surface than in light; still
    readable, but could be nudged for extra punch.'
