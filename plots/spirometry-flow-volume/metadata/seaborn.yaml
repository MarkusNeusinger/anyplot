  strengths:
  - Excellent clinical data storytelling with flow deficit shading between measured
    and predicted expiratory curves
  - Clean PEF and FEV1 annotations with well-styled clinical values text box
  - Proper flow-volume loop shape with distinct solid/dashed styling for measured
    vs predicted
  - Comprehensive explicit font sizing for all text elements
  - Good use of seaborn lineplot with hue-based color grouping and DataFrame structure
  weaknesses:
  - PEF annotation label (9.5 L/s) does not match the actual plotted peak value (~8.7
    L/s) due to mathematical formula producing a lower maximum
  - Post-hoc dash style modification by iterating ax.lines is fragile and non-idiomatic
  - Library mastery limited - heavy reliance on matplotlib for annotations and styling
    beyond basic seaborn calls
  image_description: 'The plot shows a spirometry flow-volume loop on a clean white
    background with subtle grid lines. The x-axis is labeled "Volume (L)" (0 to ~5.2)
    and the y-axis "Flow (L/s)" (-6 to 10). The title reads "spirometry-flow-volume
    · seaborn · pyplots.ai" in medium weight at the top. A solid blue (#306998) "Measured"
    curve forms the flow-volume loop: the expiratory limb rises sharply from origin
    to a peak around 8.5-9 L/s at ~0.3 L volume, then declines roughly linearly to
    zero at ~4.8 L. The inspiratory limb curves below zero in a U-shape reaching about
    -5.5 L/s. A dashed gray "Predicted Normal" loop is overlaid, slightly larger in
    both expiratory peak (~10 L/s) and FVC (~5.2 L). A light red/pink shaded region
    between the measured and predicted expiratory curves highlights the "Flow deficit."
    The PEF point is marked with a red circle (s=300) and annotated "PEF = 9.5 L/s"
    with a red arrow. An FEV1 point is marked with a blue diamond at volume 3.5 L
    and annotated "FEV₁ = 3.5 L". A styled text box in the lower right displays clinical
    values: FVC = 4.8 L, FEV₁ = 3.5 L, FEV₁/FVC = 73%, PEF = 9.5 L/s in monospace
    font. Top and right spines are removed. Legend in upper right shows Measured,
    Predicted Normal, and Flow deficit entries.'
