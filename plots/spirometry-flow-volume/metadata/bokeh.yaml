  image_description: The plot displays a spirometry flow-volume loop on a light gray
    (#fafafa) background. A solid blue (#306998) measured loop shows the expiratory
    limb rising sharply to PEF (~9.5 L/s) at approximately 0.5L volume, then declining
    roughly linearly to FVC at ~4.2L. The inspiratory limb forms a symmetric U-shape
    below the zero-flow line, reaching about -6.5 L/s. A dashed gray (#999999) predicted
    normal loop is overlaid, slightly larger than the measured loop, indicating reduced
    lung function. A red (#e63946) dot marks PEF with the label "PEF = 9.5 L/s" in
    red bold text. A teal (#457b9d) dot marks FEV1 with the label "FEV1 = 3.3 L".
    A clinical values text box in the lower portion reads "FVC = 4.2 L | FEV1 = 3.3
    L | FEV1/FVC = 79% | PEF = 9.5 L/s". A dotted gray zero-flow reference line runs
    horizontally. The legend in the top right distinguishes "Measured" (solid blue)
    from "Predicted Normal" (dashed gray). Title reads "spirometry-flow-volume · bokeh
    · pyplots.ai". Axes are labeled "Volume (L)" and "Flow (L/s)". Grid lines are
    subtle dashed lines at low opacity.
