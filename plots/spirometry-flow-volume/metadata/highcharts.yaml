  image_description: 'The plot displays a spirometry flow-volume loop on a light gray
    (#f8f9fa) background. The title "spirometry-flow-volume · highcharts · pyplots.ai"
    appears at top center in bold, with a subtitle showing "Measured vs Predicted
    Normal · FVC: 4.80 L · FEV1: 3.60 L · PEF: 9.50 L/s". The measured loop is drawn
    as a solid blue (#306998) line — the expiratory limb rises sharply from origin
    to PEF (~9.5 L/s) then declines roughly linearly to FVC (4.8 L), while the inspiratory
    limb forms a symmetric U-shaped curve below zero reaching ~-6 L/s. A dashed gray
    predicted normal loop overlays for comparison, slightly larger. Three annotated
    markers are present: a red circle at PEF labeled "PEF: 9.5 L/s", a blue diamond
    at FEV1 labeled "FEV1: 3.6 L", and a green square at FVC labeled "FVC: 4.80 L".
    The x-axis is "Volume (L)" (0-5.5), y-axis is "Flow (L/s)" (-8 to 12). A legend
    in the top-right shows "Measured" (solid blue) and "Predicted Normal" (dashed
    gray). A subtle "Zero Flow" italic label appears near the right edge of the zero
    line. Grid lines are very subtle.'
