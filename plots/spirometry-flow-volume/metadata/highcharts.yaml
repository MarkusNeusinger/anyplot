    from the origin to a peak near 9.5 L/s at ~0.4 L volume, then declines roughly
    linearly to zero at ~4.8 L. The inspiratory limb curves below the zero line in
    a U-shape reaching approximately -6 L/s. A gray dashed line shows the predicted
    normal loop, which is slightly larger (higher PEF ~10.8, wider FVC ~5.2). A red
    circle marker labels "PEF: 9.5 L/s" at the peak. A blue diamond marker labels
    "FEV1: 3.6 L" on the declining expiratory limb. Grid lines are very subtle. The
    zero-flow horizontal line is visible. The legend at the bottom is not clearly
    visible in the rendered PNG.'
