review:
  strengths:
  - 'Clear focal point: Footwear leader bar rendered in brand green #009E73 with bold
    green value label, matching the spec''s invitation to highlight specific bars.'
  - Idiomatic Chart.js custom plugin (afterDatasetsDraw) draws per-bar value labels
    above each bar, giving readers precise figures without depending on interactive
    tooltips.
  - Theme tokens threaded throughout — title, axis titles, ticks, grid, and tooltip
    all read from window.ANYPLOT_TOKENS so chrome flips cleanly between light and
    dark.
  - 'Minimal-chrome aesthetic: axis borders hidden, x-axis grid removed, y-axis grid
    kept subtle, generous top padding (36px) so the leader value label has breathing
    room.'
  - 'Idiomatic Chart.js details: categoryPercentage/barPercentage tuned for clean
    rhythm, borderRadius:4 softens corners, hoverBackgroundColor + custom tooltip
    callback with formatted currency string.'
  - 'Title format is correct: ''bar-basic · javascript · chartjs · anyplot.ai''. Single-series
    chart correctly disables the legend; axes are descriptive (''Product line'', ''Revenue
    (USD millions)'') with units.'
  weaknesses:
  - 'Non-leader bars use t.inkSoft (a chrome token), so their fill flips between themes:
    dark grey-green in plot-light.png, light cream/grey in plot-dark.png. The Imprint
    rule requires data colors to be identical across themes — only chrome should flip.
    Replace t.inkSoft with a stable palette-based muted color (e.g. a fixed hex like
    ''#9CA3A1'' that reads on both surfaces, or t.palette[0] at alpha ~0.22 via a
    hex with alpha suffix) so the muted bars look the same in both renders.'
  - 'Same root cause for the value-label text on non-leader bars: ctx.fillStyle =
    t.inkSoft means the label color flips with the theme. The leader label correctly
    uses t.palette[0] (constant). Use a constant muted ink for the non-leader labels
    too, or accept that label text is chrome and document the tradeoff — but currently
    the spec treats labels as data-attached annotations, so prefer a constant color.'
  - Title fontsize 22px is on the small side for a 3200×1800 canvas — the title occupies
    only ~25% of plot width. Not a hard fail (no overflow, no squeezing), but bumping
    to ~30–34px would give it more presence and better proportional balance with the
    bars and axis labels.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white around #FAF8F1 — correct.
      Chrome: Title "bar-basic · javascript · chartjs · anyplot.ai" rendered in dark ink, centered, fully visible. Y-axis ticks (0, 10, 20, 30, 40, 50, 60), x-axis category labels (Apparel, Footwear, Accessories, Equipment, Eyewear, Wellness), axis titles "Product line" and "Revenue (USD millions)" — all in dark ink, clearly readable. Horizontal y-grid lines are subtle (light grey). No spines/borders on axes. Per-bar value labels above each bar.
      Data: Footwear (leader) bar in brand green #009E73, value label "51.3" in bold green. Remaining five bars (Apparel 42.8, Accessories 18.9, Equipment 33.7, Eyewear 12.4, Wellness 27.1) in dark grey-green (t.inkSoft, the chrome ink token).
      Legibility verdict: PASS — every element is comfortably readable against the warm off-white.

    Dark render (plot-dark.png):
      Background: warm near-black around #1A1A17 — correct.
      Chrome: Title, axis titles, tick labels, category labels all rendered in light cream ink and readable. Horizontal y-grid lines subtle. No dark-on-dark text failures.
      Data: Footwear leader bar still in brand green #009E73 (identical to light render — good). Value label "51.3" still in bold green. However, the five non-leader bars are now light cream/grey because t.inkSoft flips from dark to light between themes. The non-leader value labels likewise flip color. Brand green is clearly visible on the near-black surface.
      Legibility verdict: PASS for readability, but data colors are NOT identical across the two renders — the non-leader bar/label fill flips with the theme. That violates the Imprint rule that data colors stay constant; only chrome should flip. Flagged in weaknesses with a concrete fix.
