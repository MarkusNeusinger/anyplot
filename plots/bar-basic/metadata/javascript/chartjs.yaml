review:
  strengths:
  - 'Correct Imprint brand green #009E73 on bars; backgrounds are warm off-white /
    warm near-black, identical data color across both themes.'
  - Clean theme-token plumbing — t.ink, t.inkSoft, t.grid, t.pageBg all flow through
    plugin and scale options; both renders pass legibility.
  - Title string matches the mandated bar-basic · javascript · chartjs · anyplot.ai
    format exactly; legend correctly disabled for a single series.
  - 'Idiomatic Chart.js: responsive: true, maintainAspectRatio: false, animation:
    false, no import/require, no width/height attributes on the canvas.'
  - 'Subtle refinement choices: x-grid removed, y-grid kept, borderRadius: 4 on bars,
    padding tuned, beginAtZero: true.'
  weaknesses:
  - No data storytelling — every bar is the same color and there's no emphasis on
    the leader (Footwear) or the laggard (Eyewear). Consider a two-tone treatment
    (top performer in brand green, rest desaturated) or value labels above each bar
    as the spec suggests.
  - 'Visual refinement could go further: the y-axis still draws a left border via
    the spine; hiding it would yield a cleaner Tufte-style look.'
  - Tick fontsize 14pt is marginal on the 400-px mobile thumbnail. Bump tick fontsize
    to 16pt or reduce tick density for mobile clarity.
  - 'Chart.js-distinctive features are underexploited: no custom tooltip config, no
    datalabels plugin, no per-bar emphasis, no hover styling.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white at ~#FAF8F1 — clearly not pure white, matches the Imprint light token.
      Chrome: Title "bar-basic · javascript · chartjs · anyplot.ai" centered top in dark ink; y-axis label "Revenue (USD millions)" rotated on the left; x-axis label "Product line" centered below. Tick labels (0, 10, 20… 60 on y; Apparel/Footwear/Accessories/Equipment/Eyewear/Wellness on x) in slightly softer ink — all clearly readable. Horizontal y-grid hairlines are subtle; x-grid removed.
      Data: Six vertical bars in Imprint brand green (#009E73) with a small borderRadius. First series IS #009E73 — verified.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black at ~#1A1A17 — clearly not pure black, matches the Imprint dark token.
      Chrome: Title, axis titles, and tick labels all render in light ink against the dark surface and are fully visible. No dark-on-dark instances. Grid hairlines remain subtle but visible.
      Data: Six bars are identical in color (#009E73) to the light render — only the chrome tokens flipped, as required.
      Legibility verdict: PASS
