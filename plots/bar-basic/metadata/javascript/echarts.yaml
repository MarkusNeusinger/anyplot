review:
  strengths:
  - 'Theme tokens are wired through cleanly: title/ink uses t.ink, ticks use t.inkSoft,
    grid uses t.grid, and the bars use t.palette[0] so both light and dark renders
    are fully legible with identical data color.'
  - Title follows the mandated format with a descriptive prefix ('Books Borrowed per
    Month · bar-basic · javascript · echarts · anyplot.ai').
  - Both axes have descriptive labels with units ('Month', 'Loans (thousands)'), value
    labels above each bar make precise reading easy, and bar widths are consistent
    at 62% with adequate spacing.
  - Realistic, neutral dataset (12 months of library book loans, 18.4–47.1k) with
    enough variation to make the bar comparison meaningful.
  - 'Clean idiomatic ECharts: animation disabled, no explicit width/height or devicePixelRatio
    passed to init, splitLine only on yAxis, axisTick hidden, backgroundColor transparent
    — follows the library skeleton exactly.'
  - Canvas renders at exactly 3200×1800; no clipping at any edge.
  weaknesses:
  - Design feels safe rather than distinctive — single brand-green fill, no emphasis
    on the peak (Jul=47.1) or off-season trough; could lift DE-03 by de-emphasising
    non-peak bars (e.g. t.palette[0] for peak, t.inkSoft @ low opacity for the rest)
    or highlighting peak/trough only.
  - 'Visual refinement is functional but minimal: x-axis baseline could be styled
    slightly softer (currently inkSoft, fine) and the grid could be even more subtle;
    no annotation/callout draws the eye to the seasonal pattern.'
  - Uses very little ECharts-specific surface area beyond the default bar series —
    no markPoint for max/min, no markLine for an average reference, no gradient/itemStyle
    borderRadius. Adding any one of these would lift LM-02 without overcomplicating
    the chart.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white, not dark.
      Chrome: Title "Books Borrowed per Month · bar-basic · javascript · echarts · anyplot.ai" rendered in dark ink at the top center, clearly readable. X-axis label "Month" below the tick row, Y-axis label "Loans (thousands)" rotated on the left, all in dark ink. Tick labels (Jan–Dec on X; 0/10/20/30/40/50 on Y) in soft dark gray, fully readable. Subtle horizontal split lines on the Y grid — present but not dominant. No tick marks shown (axisTick hidden), consistent with the style guide.
      Data: Twelve vertical bars filled with brand green (#009E73 = t.palette[0]), identical color across all bars. Value labels (18.4, 21.7, 26.2, 31.5, 35.8, 41.3, 47.1, 44.6, 35.9, 29.8, 24.2, 27.6) above each bar in soft ink — clearly readable.
      Legibility verdict: PASS — all chrome and data clearly distinguished from the warm off-white background.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface — not pure black, not light.
      Chrome: Title appears in light ink against the dark background, fully readable. Axis labels "Month" and "Loans (thousands)" in light ink. Tick labels in soft light gray, no dark-on-dark issues. Grid lines remain subtle but visible on the dark surface.
      Data: Bars are the SAME brand green (#009E73) as in the light render — only the chrome (background, ink, grid) flipped, exactly as the palette rules require. Value labels above each bar in soft light gray, clearly readable.
      Legibility verdict: PASS — no dark-on-dark text, no light-on-light text, brand green still reads strongly on near-black.
