review:
  strengths:
  - 'First bar series uses brand green #009E73 with full Imprint palette wired through
    t.palette; both light and dark renders read cleanly with theme-correct chrome.'
  - Intentional visual hierarchy via opacity (peak Jul bar at 1.0, others at 0.55)
    creates a clear focal point without breaking palette compliance.
  - Distinctive ECharts markLine with type 'average' adds analytical context (Avg
    32.0 reference) with idiomatic, declarative configuration.
  - All font sizes explicitly set (title 30, axis names 24, ticks 20, value labels
    16) and proportions are balanced across X and Y; no overlap or overflow in either
    render.
  - 'Title follows the mandated format with a descriptive prefix: ''Books Borrowed
    per Month · bar-basic · javascript · echarts · anyplot.ai''; axis labels include
    units (''Loans (thousands)'').'
  - 'Clean KISS code: no functions/classes, hardcoded deterministic data, animation:false,
    backgroundColor ''transparent'' so page bg shows through, on(''finished'') for
    screenshot readiness.'
  weaknesses:
  - 'DE-01 not yet at publication-tier: aesthetic refinement could go further — e.g.,
    slightly heavier title weight or letter-spacing for premium feel, or a thin ink-color
    stroke (1px) on the faded bars to anchor them against the cream surface (the Imprint
    palette''s known sub-3:1 WCAG cushion).'
  - 'LM-02 leaves distinctive ECharts surface unused: visualMap (piecewise threshold
    coloring keyed off Avg), graphic elements for inline callouts, or a dataset+encode
    mapping would showcase ECharts strengths beyond the markLine reference.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface matching #FAF8F1 — not pure white. The chart's transparent backgroundColor lets the page bg show through correctly.
      Chrome: Title "Books Borrowed per Month · bar-basic · javascript · echarts · anyplot.ai" rendered in dark ink at fontSize 30, centered, fills ~80% of width (expected for the long mandated title). Axis names "Month" and "Loans (thousands)" in dark ink at fontSize 24. Tick labels (Jan..Dec on X; 0/10/20/30/40/50 on Y) in soft gray (#4A4A44 inkSoft) at fontSize 20. Y-axis split lines are subtle at ~15% opacity. Bottom xAxis line visible (L-shaped frame: no top, right, or left axisLine). Value labels (e.g. "47.1", "18.4") in inkSoft fontSize 16 above each bar. Dashed gray markLine labeled "Avg 32.0" at y=32.
      Data: 12 vertical bars in Imprint brand green #009E73. Peak July bar at opacity 1.0; the other 11 bars at opacity 0.55 — creates clear hierarchy without breaking palette compliance. Bars have subtle borderRadius [4,4,0,0]. Bar width ~62% of slot.
      Legibility verdict: PASS — every chrome element and value label is comfortably readable against the warm off-white background; no light-on-light text.

    Dark render (plot-dark.png):
      Background: Warm near-black surface matching #1A1A17 — not pure black.
      Chrome: Title in light ink (#F0EFE8) at the same fontSize 30, identical layout. Axis names in light ink. Tick labels and value labels in soft light gray (#B8B7B0 inkSoft equivalent). Y-axis grid lines subtle at ~15% white opacity. Dashed markLine label "Avg 32.0" in soft light gray, readable.
      Data: Identical to light render — same 12 bars in #009E73 with the same opacity hierarchy (Jul full, others 0.55). Brand green #009E73 reads cleanly on the dark surface (it's selected for cross-theme stability).
      Legibility verdict: PASS — no dark-on-dark failures; title, axis names, tick labels, value labels, and the Avg markLine label are all readable. The faded 0.55-opacity green bars stay visible against the near-black bg.
