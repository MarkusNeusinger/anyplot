review:
  strengths:
  - Conditional color encoding via `alt.condition()` highlights the top performer
    (Electronics) with semantic ochre (#BD8233) — an idiomatic, Altair-specific design
    choice that creates clear visual hierarchy
  - Sorted descending order combined with the 'Top seller — $45.2k' callout annotation
    creates a strong data narrative and clear focal point
  - 'Fully theme-adaptive chrome: backgrounds (#FAF8F1 / #1A1A17), text tokens (INK
    / INK_SOFT), and grid colors all adapt correctly — both renders pass the readability
    check'
  - Layer composition (bars + labels + annotation) demonstrates idiomatic Altair declarative
    grammar; alt.condition() for conditional encoding is distinctly Altair
  - 'Perfect spec compliance: value labels above bars, dollar-formatted axis, sorted
    categorical data within the 3–15 recommended range, correct title format'
  weaknesses:
  - 'Minor crowding above the Electronics bar: the ''$45,200'' value label (dy=-6),
    ''Top seller — $45.2k'' annotation (dy=-22), and the $50,000 dashed gridline all
    converge in the same vertical zone — the annotation text partially overlaps the
    $50k gridline; consider increasing the y-scale domain to ~58000 or shifting annotation
    dy to -35 to give more breathing room'
  - Value labels and annotation use fontSize=10 (40px rendered) which is readable
    at desktop but may strain legibility when the chart is displayed at mobile widths
    (~400px); consider fontSize=11 for the annotation
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "bar-basic · python · altair · anyplot.ai" in bold dark ink, ~55% of canvas width — clearly readable. Y-axis label "Sales ($)" and X-axis label "Product Category" both in INK color, balanced sizes. Tick labels in INK_SOFT (#4A4A44), 10px, rotated -45° for X-axis categories. Dollar-formatted Y-axis ticks ($0–$50,000).
      Data: 7 vertical bars sorted descending. Electronics bar is ochre (#BD8233 = palette position 4, semantic top-performer accent); all other 6 bars are brand green (#009E73 = palette position 1). '$45,200' value label above Electronics bar; all bars have dollar-formatted value labels above them. "Top seller — $45.2k" annotation in ochre above Electronics bar. Subtle dashed Y-axis gridlines at opacity 0.15. L-shaped spine frame (left + bottom only).
      Legibility verdict: PASS — all text clearly readable against the warm off-white background. Minor crowding noted where the annotation, value label, and $50k gridline converge above the Electronics bar, but no text-on-text overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in light ink (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0) — soft gray, readable. No dark-on-dark failures observed.
      Data: Data colors IDENTICAL to light render — Electronics bar in same ochre (#BD8233), all other bars in same brand green (#009E73). Annotation "Top seller — $45.2k" in ochre clearly visible on dark surface. Value labels in #B8B7B0 (INK_SOFT for dark theme) — readable against dark background.
      Legibility verdict: PASS — all text readable against the warm near-black background. Data colors are identical between light and dark renders; only chrome (background, text, grid colors) has flipped.
