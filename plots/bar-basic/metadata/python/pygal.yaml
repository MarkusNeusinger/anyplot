review:
  strengths:
  - 'Effective highlight strategy: brand green (#009E73) for the leader bar (Organic
    Search), muted gray for all others — viewer attention is directed instantly to
    the key insight'
  - 'Strong data storytelling: descriptive two-line title with embedded insight +
    star annotation showing exact value and percentage share creates a self-contained
    narrative'
  - 'Both themes fully adapted: warm off-white (#FAF8F1) light / near-black (#1A1A17)
    dark backgrounds with correct token-driven text and chrome in each render'
  - All seven value labels visible above bars, enabling precise reading alongside
    visual comparison — no overlap or clipping
  - Realistic, neutral dataset (Q4 2025 website traffic by channel, 7 categories)
    fits the spec use-case example perfectly and shows meaningful value range
  weaknesses:
  - Bars are not sorted by value — presenting channels in original insertion order
    rather than descending visit count misses an opportunity to strengthen ranking
    readability and data storytelling
  - Dotted/dashed y-grid lines (pygal default) instead of subtle solid thin lines
    preferred by the style guide
  - Standard pygal border/spine chrome retained — no spine removal; the chart frame
    makes it look slightly less refined than it could be
  - 'DE-01 borderline: beyond the color-highlight choice the visual design stays close
    to pygal defaults (flat bars, standard font weight, no further typographic hierarchy)'
