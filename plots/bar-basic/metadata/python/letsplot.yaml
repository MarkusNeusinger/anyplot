  - Y-axis-only grid (x-axis grid removed) is clean and appropriate
  weaknesses:
  - Average annotation text (size=3) is quite small — barely readable at full resolution
    and will be very hard to read at mobile widths (~400px); increase to size=3.5
    or 4
  - Design Excellence is moderate — the plot is clean and functional but lacks the
    publication-ready polish (e.g. no spine removal is explicitly coded, though letsplot
    may handle it internally)
  - 'DE-01 below exceptional: could benefit from more intentional typographic hierarchy
    (e.g. bolder title weight, slightly larger axis labels relative to tick labels)'
  - 'LM-02: layer_tooltips is used but more distinctive letsplot features could be
    leveraged (e.g. geom_label with custom tooltips format, or more advanced scale
    formatting)'
