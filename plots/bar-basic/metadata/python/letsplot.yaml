  - Value labels above each bar with dollar formatting ($45,200 etc.) add precision
    reading
  - Mean reference line with annotation provides clear context for comparison
  - Bars sorted descending creates natural visual ranking
  - Both light and dark themes fully implemented with adaptive chrome tokens
  - Custom theme correctly sets all chrome elements (background, grid, axis lines,
    text) as theme-adaptive
