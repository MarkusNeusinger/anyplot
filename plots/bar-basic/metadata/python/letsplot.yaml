      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Title "bar-basic · python · letsplot · anyplot.ai" in dark ink at top — readable. Y-axis label "Quarterly Revenue ($)" and x-axis label "Department" in dark INK color — both descriptive with units, readable. X-axis tick labels rotated 30 degrees (Electronics, Clothing, Home & Garden, Sports, Books, Toys & Games) in INK_SOFT — readable. Y-axis tick labels in dollar format ($0 to $50,000) — readable.
      Data: Six vertical bars all in brand green (#009E73). Dollar-formatted value labels in bold dark INK above each bar ($45,200 to $18,900). Dashed horizontal mean reference line in INK_MUTED (~#6B6A63, warm gray) at ~$29,433. Subtle horizontal grid lines in INK_SOFT. Note: the mean line at $29,433 and the y-axis grid line at $30,000 appear very close together and can look like two dashed lines. The '$28,500' label for 'Home & Garden' visually overlaps with the mean line.
      Legibility verdict: PASS — all text readable, but '$28,500' label intersects the mean reference line (VQ-02 issue).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title in light F0EFE8-tone text — readable against dark bg. Axis labels in light text — readable. Tick labels in lighter B8B7B0-tone — readable. No dark-on-dark failures observed.
      Data: Same six green bars (#009E73 — identical to light render). Value labels in white/light INK text above bars — readable. Bars have a subtle white outline visible in dark mode (letsplot default bar rendering). Dashed mean line in lighter INK_MUTED tone (~#A8A79F) visible against dark background. Same '$28,500' label overlap with mean line exists in this render too.
      Legibility verdict: PASS — all text readable in dark theme, data colors identical to light render.
