review:
  strengths:
  - Single-series brand color (#009E73) used correctly and consistently across both
    themes
  - Theme-adaptive chrome implemented correctly — background, text, grid, and legend
    all flip properly between light (#FAF8F1) and dark (#1A1A17)
  - Value labels above bars with dollar formatting ($45,200 style) aid precise reading
  - Mean reference line (geom_hline) adds contextual insight — showing which departments
    are above/below average
  - 'Proper canvas size: ggsize(800,450) × scale=4 = 3200×1800 px'
  - letsplot-native layer_tooltips() enables rich hover experience in HTML output
  - Deterministic hardcoded data — no randomness, no seed needed
  - 'KISS structure: linear imports → constants → data → theme → plot → save'
  - Y-axis formatted with dollar signs and thousands separators using scale_y_continuous
    format string
  weaknesses:
  - 'VQ-02 OVERLAP: The ''$28,500'' value label for ''Home & Garden'' is nudged to
    y=$29,200 but the mean reference line sits at y=$29,433 — only ~$233 apart. The
    geom_text (size=4mm) is tall enough that the dashed mean line visually intersects
    the label in both renders. Fix: increase position_nudge(y=700) to position_nudge(y=1500)
    for bars near the mean, or label the mean line explicitly so it''s a distinct
    visual element.'
  - 'DE missing: Mean reference line has no annotation label — viewers cannot tell
    what the dashed line represents without guessing. Fix: add geom_text or annotate()
    near the right end of the line with ''Avg: $29,433'' in INK_MUTED color.'
  - 'DE-03 LOW: Categories are not sorted by revenue value, which makes the bar chart
    harder to read as a ranking chart. Sorting descending (Electronics → Clothing
    → Sports → Home & Garden → Toys & Games → Books) would immediately convey the
    ranking story. Fix: reorder the `categories` list and `scale_x_discrete(limits=...)`
    accordingly.'
  - 'DE-01: The mean line and the y-axis grid line at $30,000 are visually very close
    in the light render (mean at $29,433, grid at $30,000), which can appear confusing
    as two dashed lines. This is a minor issue but contributes to visual clutter near
    the middle of the chart.'
