      Data: Six vertical bars sorted descending. Electronics bar in brand green (#009E73) — first/highlighted series correct. Remaining bars (Clothing, Home & Garden, Sports, Books, Toys) in INK_MUTED (#6B6A63) muted gray for de-emphasis. Dollar-formatted value labels ($45,200, $31,400, etc.) above each bar in INK (#1A1A17). Italic annotation "▲ 44% ahead of 2nd place" inside Electronics bar at ~82% height in INK (#1A1A17), size=3.0mm (small but readable at full resolution).
      Legibility verdict: PASS — all text readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title in light off-white (#F0EFE8) text, clearly readable. Axis labels and tick labels in light tones (INK_SOFT #B8B7B0 for ticks). All chrome correctly flipped for dark theme. Subtle y-axis grid lines visible. No dark-on-dark failures observed.
