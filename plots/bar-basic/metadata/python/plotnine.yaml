review:
  strengths:
  - Brand green highlight on leading Electronics bar creates an immediately effective
    visual hierarchy — the data story is visible at a glance
  - Descending category sort order (highest to lowest) makes rankings intuitive and
    effortless to scan
  - 'Theme-adaptive chrome implemented correctly: INK_MUTED shifts from #6B6A63 (light)
    to #A8A79F (dark) so non-highlighted bars remain legible in both themes'
  - Quantified insight annotation ('44% ahead of 2nd place') inside the leading bar
    adds real interpretive value beyond just displaying the data
  - 'Excellent visual refinement: all four spines removed, y-axis-only grid at alpha=0.15,
    tick marks eliminated — clean minimal chrome'
  - 'Perfect spec compliance: consistent bar widths, dollar-formatted value labels,
    single-color highlighting pattern, adequate bar spacing'
  - Code is clean, idiomatic plotnine grammar-of-graphics with correct stat='identity',
    scale_fill_manual for highlight aesthetic, pd.Categorical for ordered bars
  - Canvas sizing correct (8×4.5 in at 400 dpi = 3200×1800) and output path 'plot-{THEME}.png'
    correct
  weaknesses:
  - Annotation text inside Electronics bar (size=3.0mm ≈ 8.5pt) is small — at 400px
    mobile width it renders at ~6px and becomes barely readable; increase to size=3.5–4.0mm
    to match value label size
  - Value labels (geom_text size=3.5mm ≈ 10pt) are at the lower bound of mobile readability
    — consider size=4.0mm for better legibility when scaled down
  - DE-01 Aesthetic Sophistication is above defaults but not FiveThirtyEight level
    — the highlighting approach is smart but the overall layout has significant empty
    space on the right half of the canvas (6 bars don't fill the full width) which
    could be addressed with tighter bar spacing or a narrower figure
  - 'LM-02 Distinctive Features: while grammar-of-graphics aesthetic mapping for highlight
    is idiomatic, no feature is truly unique to plotnine vs. ggplot2; pd.Categorical
    ordering could be replaced with a plotnine stat_summary or reorder aes for a more
    plotnine-native pattern'
  image_description: |-
