      Data: 7 vertical bars in brand green #009E73. Dollar value labels above each bar in INK_SOFT (fontsize 8). Annotation "Top: Electronics" in #009E73 bold with arrow pointing to Electronics bar. Annotation "Lowest: Books" in INK_MUTED italic with arrow pointing to Books bar. Subtle y-axis grid (alpha=0.15, set below bars).
      Legibility verdict: PASS — all text clearly readable against #FAF8F1 background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
