review:
  strengths:
  - Full theme-adaptive chrome with all tokens (PAGE_BG, INK, INK_SOFT, INK_MUTED)
    correctly threaded through every element — both light and dark renders pass readability
    checks with zero dark-on-dark failures.
  - 'Idiomatic matplotlib usage throughout: ax.bar_label() for value labels, ticker.StrMethodFormatter
    for dollar tick formatting, ax.set_axisbelow(True) for clean grid-under-bars,
    and fig.subplots_adjust() instead of bbox_inches=''tight'' to preserve exact 3200×1800
    canvas.'
  - Storytelling annotations for top (Electronics) and lowest (Books) performers with
    brand-green and INK_MUTED respectively, creating clear focal points and guiding
    the viewer through the data.
  - 'Complete spec compliance: correct vertical bar chart, all 7 categories within
    the 3–15 recommended range, value labels above each bar, single-color bars in
    brand green, L-shaped spine frame, and correct mandated title format.'
  weaknesses:
  - 'DE-01 (5/8): The design is clean and correct but stops short of publication quality.
    The annotations use the right colors (brand green / INK_MUTED) but lack visual
    weight — adding a semi-transparent ELEVATED_BG box behind annotation text (bbox=dict(facecolor=ELEVATED_BG,
    edgecolor=''none'', alpha=0.75, pad=3)) would give the labels proper legibility
    on any bar background and lift the sophistication level.'
  - 'DE-01 / DE-03: No visual emphasis distinguishes Electronics as the standout bar.
    Consider rendering all bars at reduced opacity (alpha=0.55) and the top bar at
    full opacity (alpha=1.0), or giving the top bar a BRAND fill and all others a
    slightly desaturated tint — this would create a clear focal point that immediately
    communicates the insight without relying solely on the annotation arrow.'
  - 'DE-02 (4/6): The left and bottom spines are retained and colored INK_SOFT, which
    is fine for an L-frame, but the bottom spine has no matching tick-mark gap treatment
    on the x-axis. Removing the x-tick spine entirely (ax.spines[''bottom''].set_visible(False))
    for a fully open x-axis would look more refined alongside the already-removed
    tick marks (length=0).'
  image_description: |-
