review:
  strengths:
  - Focal emphasis via alpha variation (Electronics at full opacity, others at 0.55)
    creates clear visual hierarchy that guides the reader immediately to the top performer
  - Two well-placed annotations identify both the top and lowest performers, adding
    real data storytelling without clutter
  - Top, right, and bottom spines all removed with only the left spine kept — maximally
    clean frame treatment
  - Subtle y-axis-only grid (alpha=0.15) with ax.set_axisbelow(True) keeps grid behind
    bars — idiomatic and correct
  - Dollar formatting via ticker.StrMethodFormatter and ax.bar_label() for automated
    value placement are distinctive matplotlib features used well
  - 'Full theme-adaptive chrome: all tokens (PAGE_BG, INK, INK_SOFT, INK_MUTED, ELEVATED_BG)
    correctly applied to every element in both renders'
  - No bbox_inches='tight' — correct canvas handling per library rules, canvas gate
    passes
  weaknesses:
  - Value labels and annotation text both at fontsize=8; at 400 px mobile width these
    scale to ~1 pt effective — borderline on smallest screens; consider raising value
    labels to 9pt
  - 'DE-01 moderate: alpha emphasis is clever but design could push further — e.g.,
    stronger color contrast between the highlighted bar and muted bars, or a subtle
    background band behind the Electronics bar'
  - 'LM-02 could go further: matplotlib supports grouped/stacked bar variants and
    FancyArrowPatch customization that could show deeper library mastery'
