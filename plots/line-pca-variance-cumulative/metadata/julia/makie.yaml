  strengths:
  - Excellent spec compliance — cumulative line, individual variance bars, elbow detection,
    90%/95% threshold lines with vertical dotted drop-lines all present and correctly
    implemented
  - 'Perfect theme-adaptive chrome: both renders pass legibility checks, warm off-white
    (#FAF8F1) and near-black (#1A1A17) backgrounds with correctly flipped text and
    grid tokens'
  - 'Imprint palette used correctly — primary series #009E73, elbow marker #4467A3
    (Imprint blue), threshold lines #DDCC77 (amber semantic anchor); no unapproved
    custom hexes'
  - Two-panel layout with 70/30 rowsize split and linkxaxes! is idiomatic Makie and
    clearly tells the cumulative vs individual variance story
  - Pure Julia PCA via eigendecomposition of sample covariance (no sklearn) is elegant
    and illustrates the data-prep well
  - Clean KISS structure with all font sizes explicitly set and Random.seed!(42) for
    reproducibility
  weaknesses:
  - Annotation text for elbow label ('PC5 (elbow)') and threshold labels ('90%', '95%')
    is set at fontsize=11, which is small for a 3200×1800 canvas — increase to 13-14pt
    to improve mobile readability
  - 'DE-01/DE-02 design polish: spines and grid are correctly refined, but the overall
    composition could benefit from a subtle horizontal annotation line or shaded region
    between 90% and 95% to create a more deliberate visual target zone'
  - 'DE-03 storytelling: the elbow annotation is good but uses a generic marker —
    a more prominent callout (e.g., a dashed vertical reference line extending into
    the bottom panel with the same elbow color) would create a stronger narrative
    thread between the two panels'
  - The top panel y-axis label 'Cumulative Variance (%)' uses ylabelsize=13 while
    the bottom panel uses ylabelsize=11 — this slight asymmetry between panels is
    noticeable; align both to 12 or 13
