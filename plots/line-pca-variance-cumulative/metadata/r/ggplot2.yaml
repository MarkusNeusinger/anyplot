review:
  strengths:
  - 'Dual-encoding design: faint individual-variance bars + cumulative line elegantly
    shows both individual and cumulative variance in a single panel'
  - Correct 3200x1800 landscape canvas with proper ragg device and dpi=400
  - 'Full theme adaptation: all chrome tokens (PAGE_BG, INK, INK_SOFT, INK_MUTED)
    correctly applied for both light and dark renders — no dark-on-dark or light-on-light
    failures'
  - Realistic synthetic data with 3-factor latent structure producing a natural elbow
    around PC3-4
  - Clean code with set.seed(42), no functions/classes, proper R idioms including
    linewidth= instead of deprecated size=
  weaknesses:
  - Threshold annotation labels ('90%', '95%', 'PC6') at size=2.8 (~8pt equivalent)
    will be marginally readable at mobile scale (~400px width). Consider bumping to
    size=3.2-3.5.
  - The vertical marker line annotates the 90% threshold component (PC6) rather than
    the actual elbow of the cumulative curve. The elbow (maximum curvature) appears
    around PC3-4, which better illustrates the 'diminishing returns' narrative. Consider
    computing the elbow via a knee-detection approach and labeling it separately from
    the threshold marker.
