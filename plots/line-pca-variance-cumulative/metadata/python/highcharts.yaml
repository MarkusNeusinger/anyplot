review:
  strengths:
  - 'Excellent spec compliance: cumulative line, threshold reference lines, discrete
    markers, and optional individual-variance bar overlay all implemented correctly'
  - Highcharts annotations module with callout shapes used idiomatically — a library-distinctive
    feature not replicable in matplotlib
  - Theme adaptation is thorough and correct in both renders; dark mode has zero dark-on-dark
    failures
  - Industrial sensor data with 3 latent factors produces a realistic, well-shaped
    PCA elbow curve
  - Semi-transparent individual variance bars as layered background context is a thoughtful
    design choice showing visual hierarchy
  weaknesses:
  - '95% annotation callout is invisible in both renders — overlaps the 90% annotation
    because both threshold crossings (components 3 and 4) are adjacent on x-axis with
    identical y-offset (y:60). Fix: offset the 95% callout to y:-80, x:40 or verticalAlign:bottom
    so the two callouts separate visually'
  - 'First series added to chart (Individual Variance columns) uses Imprint position
    3 (#4467A3) rather than #009E73, violating the hard first-series rule. Fix: insert
    the cumulative LineSeries first and push the ColumnSeries behind it using explicit
    zIndex values'
  image_description: |-
