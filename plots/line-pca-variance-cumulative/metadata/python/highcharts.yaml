      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title at ~50 px (dynamically scaled for 89-char string), axis labels 56 px, ticks 44 px — all dark (INK=#1A1A17), subtitle in INK_MUTED. All readable against light background.
      Data: Green cumulative line (#009E73) with radius-10 circle markers is the primary visual. Semi-transparent blue columns (#4467A3, alpha=0.25) as background. Amber (#DDCC77) and lavender (#C475FD) dashed threshold lines with inline labels. Diamond markers at components 3 and 4. One annotation callout visible ("Only 3 components explain 90.0% of variance"); 95% callout not visible due to overlap.
