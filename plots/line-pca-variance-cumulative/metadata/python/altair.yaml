review:
  strengths:
  - Real PCA data from sklearn wine dataset (13 features) — deterministic, scientifically
    grounded, neutral context
  - Elbow detection via kneedle algorithm (max orthogonal distance from diagonal)
    automatically annotates the inflection point
  - 'Threshold crossing markers: automatically finds and annotates which component
    counts reach 90%/95% variance thresholds'
  - Altair's distinctive interactive hover via selection_point(nearest=True, on='pointerover')
    + transform_filter + alt.condition — not replicable in static libraries
  - 'Perfect Imprint palette compliance: #009E73 primary line, #4467A3 for 90% threshold,
    #BD8233 for 95% threshold, #AE3030 semantic elbow marker'
  - 'Layered shape encoding: circle=data points, diamond=threshold crossings, triangle=elbow
    — redundant encoding beyond color alone'
  - Theme-adaptive chrome fully implemented through all elements (title, axis labels,
    tick labels, legend, background, grid)
  - Canvas padding approach correctly pads to exact 3200×1800 without cropping, following
    library guide exactly
  weaknesses:
  - Grid uses dashed lines (gridDash=[3,3]) at 12% opacity — style guide recommends
    solid thin lines at 15-25% opacity; switch to solid gridDash=[] at gridOpacity=0.15
    for a cleaner result
  - Area fill opacity 0.05 is nearly imperceptible — increase to 0.08-0.10 to provide
    subtle but visible depth without cluttering the data layer
  - 'DE-02: Altair''s axis domain lines are present on all four sides (no equivalent
    top/right spine removal); using configure_axis(domain=False) for a cleaner L-frame
    look would improve refinement'
  - 'LM-02 partial: interactive selection reuses a standard Altair nearest-hover pattern;
    more distinctive usage (e.g., layered tooltip with all data fields, or linked
    brush) would demonstrate deeper Altair mastery'
