review:
  strengths:
  - Uses real sklearn Wine dataset providing factually accurate PCA statistics
  - Multi-layer composition fully satisfies all spec requirements including optional
    individual variance bar overlay
  - 'Semantic color mapping: amber for 90% caution threshold, matte red for 95% target
    — immediately interpretable without a legend'
  - Leverages lets_plot native layer_tooltips() API for rich interactive hover information
    in HTML output
  - Elbow detection using perpendicular distance from chord is mathematically correct
  - Theme-adaptive chrome works correctly in both renders with no dark-on-dark or
    light-on-light failures
  weaknesses:
  - Individual variance bars are very low-contrast in dark render (muted fill at alpha=0.28
    on near-black background produces near-invisible bars) — increase dark-mode bar
    alpha to ~0.40 or use a slightly lighter fill to maintain visible-but-secondary
    presence
  - The PC 5 elbow annotation label (geom_text size=4) is slightly small at mobile
    viewport scales — consider increasing to size=4.5 or bold for better readability
    when scaled down
