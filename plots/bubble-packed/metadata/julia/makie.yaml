review:
  strengths:
  - 'Perfect Imprint palette compliance: Africa=green(1), Americas=lavender(2), Asia=blue(3),
    Europe=ochre(4); backgrounds and chrome correct in both themes'
  - Area-proportional circle sizing (r proportional to sqrt of value) correctly encodes
    population perception
  - Force-directed physics simulation (6000 iterations) produces clean non-overlapping
    packing
  - Theme-adaptive chrome correctly implemented — title, legend text, stroke colors
    all flip between themes without affecting data colors
  - Perfect spec compliance, data realism, and code quality — all three score full
    marks
  - Julia-native force simulation with poly! and PolyElement shows genuine library
    mastery
  weaknesses:
  - Legend frame (framevisible = true) adds unnecessary visual weight — set framevisible
    = false for cleaner minimal look
  - ~16 of 30 countries have no label (r < 38); lowering the label threshold or using
    a smaller font for additional circles would improve country identification
  - Bubble cluster layout leans lower-left after simulation, leaving upper-right and
    lower-right quadrants notably empty — subtract centroid mean from positions after
    simulation to center the cluster
  - No population value annotations inside top circles — adding formatted values like
    '1.43B' below the country name in the largest circles would elevate data storytelling
  - Medium circle labels (Bangladesh, Nigeria at 10pt) are at the minimum comfortable
    size; slightly larger base font would improve legibility
