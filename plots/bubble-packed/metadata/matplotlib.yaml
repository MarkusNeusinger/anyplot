review:
  strengths:
  - Well-implemented physics simulation for circle packing produces a clean, non-overlapping
    layout
  - Adaptive text sizing and contrast (dark text on yellow, white text on dark backgrounds)
    shows attention to readability
  - Efficient use of PatchCollection for rendering demonstrates matplotlib knowledge
  - Realistic department budget context with meaningful value range ($130K-$950K)
  - Clean, deterministic code that produces identical output every run
  weaknesses:
  - Support (teal) and Compliance (muted green) colors are too similar, hurting colorblind
    accessibility
  - Two smallest circles (Security, Legal) are unlabeled and unidentifiable without
    external reference
  - Groups are colored but not spatially clustered, weakening the group narrative
  - Some group assignments are unrealistic (Sales in Tech, Data Science in Creative)
  - Design lacks a strong data insight or storytelling emphasis beyond relative sizes
