review:
  strengths:
  - Custom greedy circle-packing algorithm produces a clean, non-overlapping layout
    with circles tightly grouped around the center
  - Adaptive label sizing (5–10pt based on bubble radius) is a well-thought-out design
    decision — large bubbles show name + value, small ones show name only
  - Accent rings (thick edge) on sector leaders create a clear focal point and guide
    the viewer's eye to dominant companies per sector
  - 'Correct Imprint palette with Technology (green #009E73) as first series; all
    four sector colors are properly mapped in canonical order'
  - Both light (#FAF8F1) and dark (#1A1A17) themes render cleanly with fully adaptive
    chrome tokens — no dark-on-dark or light-on-light failures
  - Square canvas (2400×2400) is the right choice for a symmetric packed bubble chart
  - Code is deterministic (no random generation), clean, and follows KISS structure
    throughout
  weaknesses:
  - Very small bubbles (Goldman Sachs, Pfizer, Target, Costco) display at 5pt fontsize
    — barely readable at full resolution and essentially invisible when the image
    is scaled to mobile width (~400px). Either omit labels for bubbles below a minimum
    radius threshold or increase the minimum font size to 6–7pt.
  - 'LM-02 low: seaborn contributes sns.scatterplot, sns.set_theme, and sns.move_legend,
    but the core bubble-packing algorithm is all custom numpy/matplotlib. The library''s
    distinctive value is limited to styling and legend management.'
  - 'DE-01 moderate: the accent-ring design is a nice touch, but overall the aesthetic
    is ''well-configured'' rather than publication-ready — could benefit from a size
    legend (mapping bubble radius to market cap value) or a brief subtitle annotation
    to strengthen storytelling.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly not pure white.
      Chrome: Two-line title "Market Capitalization by Sector / bubble-packed · python · seaborn · anyplot.ai" in dark ink, fully readable. No axes (axis off — appropriate). Legend at bottom shows 4 sectors in 4-column horizontal layout with dark text on elevated background, readable.
      Data: 17 company bubbles packed in a circular cluster. Technology (green #009E73): Apple, Microsoft, Google, NVIDIA, Meta. Finance (lavender #C475FD): JPMorgan, Visa, Mastercard, Goldman S. Healthcare (blue #4467A3): UnitedHealth, J&J, Merck, Pfizer. Retail (ochre #BD8233): Amazon, Walmart, Costco, Target. Accent rings (thick INK-colored edge) mark sector leaders: Apple, Visa, UnitedHealth, Amazon. White text labels + dollar values inside larger bubbles; name-only in smaller bubbles; very small bubbles (Pfizer, Goldman S., Target, Costco) have 5pt text that is borderline readable at full resolution.
      Legibility verdict: PASS (all major labels readable; tiny 5pt labels on smallest bubbles are borderline but visible at 2400×2400)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title text appears in light cream (#F0EFE8), clearly readable against the near-black background. Legend "Sector" title and category labels are in #B8B7B0 (INK_SOFT dark), readable. No dark-on-dark failures observed.
      Data: Data colors are IDENTICAL to the light render — same green, lavender, blue, and ochre bubbles in the same positions. White text labels inside bubbles remain readable on the colored bubbles in both themes. Accent rings appear in cream/light color (INK in dark theme = #F0EFE8), still clearly visible.
