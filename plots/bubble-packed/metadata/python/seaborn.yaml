      Data: 17 circles sized by market-cap value (radius=sqrt(value)*4). Technology circles in brand green #009E73 (Apple, Microsoft, Google, NVIDIA, Meta). Finance circles in lavender #C475FD (JPMorgan, Visa, Mastercard, Goldman Sachs). Healthcare circles in blue #4467A3 (UnitedHealth, J&J, Merck, Pfizer). Retail circles in ochre #BD8233 (Amazon, Walmart, Costco, Target). White bold text labels inside circles, size-adaptive (10/8/6/5pt by radius). Larger circles show company name + dollar value; smaller show name only or abbreviated name. Alpha=0.90, thin INK edge (linewidth=0.5).
