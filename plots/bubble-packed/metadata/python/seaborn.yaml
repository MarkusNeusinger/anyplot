review:
  strengths:
  - Greedy closest-to-center packing algorithm is deterministic, correct, and produces
    a visually tight cluster with zero circle overlap
  - Clever use of fig.canvas.draw() + ax.transData.transform() to convert data-unit
    radii to scatter marker sizes in points-squared — pixel-accurate circles at any
    zoom level
  - 'Full Imprint palette compliance: Technology=#009E73 first, Finance=#C475FD, Healthcare=#4467A3,
    Retail=#BD8233 in canonical order; theme-adaptive chrome via all required tokens;
    identical data colors across light/dark renders'
  - Size-adaptive in-bubble label system (name + dollar value for large bubbles, name-only
    or abbreviated for small) avoids clutter without hiding information
  - Square 2400x2400 canvas is the correct format choice for a symmetric packed-bubble
    layout; subplots_adjust reserves clean margins for title and legend
  weaknesses:
  - 'Missing `python` language token in title. Fix: change title string to ''Market
    Capitalization by Sector\nbubble-packed · python · seaborn · anyplot.ai'' — currently
    reads ''bubble-packed · seaborn · anyplot.ai'' which omits the required language
    identifier.'
  - DE-01 limited by absent storytelling focal point. Add a subtle visual accent to
    the largest bubble per sector (e.g. thicker edgecolor ring linewidth=2.5 vs baseline
    0.5 for the top company in each sector) to guide the viewer's eye to the dominant
    insight.
  - 'LM-02: seaborn''s role is narrow — sns.scatterplot does little that ax.scatter
    wouldn''t; the packing algorithm and label placement are pure matplotlib. Consider
    using sns.move_legend() for legend positioning or sns.despine() idioms to demonstrate
    more seaborn-specific patterns.'
