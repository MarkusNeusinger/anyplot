review:
  strengths:
  - 'Perfect Imprint palette compliance: canonical tier order (#009E73 → #C475FD →
    #4467A3 → #BD8233), correct backgrounds, fully theme-adaptive chrome across both
    renders'
  - Force-directed packing algorithm with area-scaled radii implements the spec correctly
    and produces an organic, visually interesting layout
  - Adaptive label sizing by radius bracket (18/14/12/9pt) elegantly handles the full
    circle-size range without overlapping circle boundaries
  - 'Bokeh-distinctive features well-leveraged: HoverTool tooltips, click-policy legend,
    ColumnDataSource per tier, interactive HTML artifact'
  - Hardcoded circle-interior text colors correctly reasoned — fill colors are theme-invariant
    so interior text should not flip with theme
  weaknesses:
  - Smallest bubble value labels (9pt) are borderline at mobile widths; consider using
    10pt as the minimum or omitting value labels for radii below ~80 data-units
  - Data storytelling stops at encoding — no visual emphasis directs the viewer toward
    an insight (e.g., annotation or focal callout for Engineering/R&D dominance)
  - Dense central cluster (Finance, QA, Data Science) has labels that may be tight
    at smaller render sizes
