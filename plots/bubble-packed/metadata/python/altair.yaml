review:
  strengths:
  - 'Two-tier labeling system: large bubbles show name+budget while small bubbles
    show name only — thoughtful adaptation to circle size'
  - Interactive Vega-Lite legend selection (selection_point bind=legend) dims unselected
    groups — genuine Altair interactivity, not fake UI
  - circlify correctly maps ascending-value order back to original indices via np.argsort,
    producing accurate size-proportional packing
  - White PAGE_BG stroke (strokeWidth=2.5) on all circles cleanly separates touching
    bubbles in both themes
  - Subtitle 'Technology division leads at 39% of total budget' creates a clear data
    story focal point
  - 'Full theme-adaptive chrome: title color=INK, subtitleColor=INK_SOFT, legend labelColor/titleColor,
    configure_view fill — all switch correctly between light and dark'
  - Title font size scaled via linear formula (14px) to prevent overflow on the 74-char
    mandated title
  - Canvas padded to exact 2400×2400 target with PAGE_BG fill — no cropping, no clipping
  weaknesses:
  - Small bubble labels (HR, Legal, Security, QA) at fontSize=12 may slightly overflow
    the circle boundary at their small radii — consider reducing to fontSize=10 for
    the smallest tier or adding a radius-proportional font size clamp
  - 'Center cluster crowding: Finance, Data Science, and IT bubbles are tightly packed
    and their labels are close together, creating visual density in the center — acceptable
    but tight'
  - White text on ochre Corporate circles (#BD8233) has borderline WCAG contrast (~3.3:1);
    bold weight compensates but could be improved with a slightly darker or thicker
    text weight
  image_description: |-
