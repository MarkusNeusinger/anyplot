      Data: 15 circles packed without overlap, 5 Imprint palette colors — Technology=#009E73 (green), Revenue=#C475FD (lavender), Operations=#4467A3 (blue), Corporate=#BD8233 (ochre), Product=#AE3030 (red); white PAGE_BG stroke separates touching circles; large circles (Engineering, R&D, Sales, Product, Marketing, Data Science, Finance, IT, Operations) show name+budget in bold white; smaller circles (QA, HR, Support, Legal, Security, Design) show name only
