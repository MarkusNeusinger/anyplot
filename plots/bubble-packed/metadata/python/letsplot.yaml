review:
  strengths:
  - 'Correct packed-bubble execution: custom force-directed collision-resolution loop
    packs 15 circles with no overlap, and circle area (not radius) encodes value via
    radii = sqrt(value/pi) — the most important perceptual rule for this chart type.'
  - 'Idiomatic lets-plot: shape=21 with fill+stroke, scale_size_identity + size_unit=''x''
    for true data-unit circle sizing, coord_fixed, theme_void, and interactive layer_tooltips
    — distinctive high-level grammar usage.'
  - 'Imprint palette in canonical order (Tech=#009E73 brand green, Business=#C475FD,
    Operations=#4467A3); page backgrounds correct (#FAF8F1 light / #1A1A17 dark) with
    only chrome flipping between renders.'
  - 'Clear data storytelling: subtitle ''Tech departments dominate'' plus group clustering
    and the largest bubble (Engineering $85M) give an obvious focal point; in-bubble
    labels show name+value for large circles and fall back to tooltips for small ones.'
  - 'Clean KISS script: seeded (np.random.seed(42)), linear, no functions/classes,
    all imports used, saves both plot-{theme}.png and .html.'
  weaknesses:
  - Force packing is slightly loose/asymmetric — visible gaps between several circles
    and the cluster leans left-of-center, leaving uneven empty margins in the square
    canvas. Tightening collision spacing or adding a centering pass would improve
    canvas fill.
  - Three small circles (Legal $22M, QA $28M, plus Security/Design/Analytics show
    name only) carry no in-bubble value label; values are reachable only via tooltip,
    which is acceptable per spec but reduces at-a-glance completeness in the static
    PNG.
  - 'In-bubble text is a fixed dark #1A1A17 on all fills in both themes — readable
    on the bright green/lavender/blue fills, but contrast on the green fill is only
    moderate; a touch more weight or a subtle halo would harden legibility at 400px
    mobile scale.'
  image_description: "Light render (plot-light.png):\n  Background: warm off-white\
    \ (#FAF8F1), correct — not pure white.\n  Chrome: title \"Department Budget Allocation\
    \ · bubble-packed · python · letsplot · anyplot.ai\" in dark ink, fully visible\
    \ and not clipped; gray subtitle \"Tech departments dominate — 8 of 15 teams control\
    \ 58% of total budget\" centered below; framed bottom legend \"Division: Tech\
    \ / Business / Operations\" with dark text. All readable.\n  Data: 15 packed circles,\
