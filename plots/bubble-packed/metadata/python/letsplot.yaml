    \ blue. Circles stroked with page-bg color for clean separation. In-bubble bold\
    \ dark labels (Engineering $85M, R&D $72M, Product $68M, Marketing $62M, etc.).\
    \ First series Tech is #009E73. \n  Legibility verdict: PASS\n\nDark render (plot-dark.png):\n\
    \  Background: warm near-black (#1A1A17), correct — not pure black.\n  Chrome:\
    \ title in light ink (#F0EFE8) fully visible, no dark-on-dark; subtitle in soft\
    \ gray readable; legend frame with light text readable. No clipping at any edge.\n\
    \  Data: identical circle colors and positions to light render — only chrome flipped.\
    \ Bubbles are bright, so the fixed dark in-bubble labels remain readable on green/lavender/blue\
    \ fills. First series Tech still #009E73.\n  Legibility verdict: PASS"
