review:
  strengths:
  - Correct packedbubble chart type with Highcharts physics simulation and sector
    splitSeries clustering
  - 'Full Imprint palette compliance — #009E73 first (Technology), canonical order
    for remaining sectors'
  - Per-bubble fillOpacity hierarchy (0.65 to 1.0 scaled by value) adds sophisticated
    within-sector visual ranking
  - 'Highcharts-specific features well-leveraged: layoutAlgorithm, parentNodeOptions
    to hide cluster outlines, data-label value filter'
  - Perfect theme adaptation — INK/INK_SOFT/PAGE_BG/ELEVATED_BG all flip correctly
    between light and dark; no dark-on-dark failures
  - Clean KISS code structure with deterministic hardcoded data; correct inline JS
    embed for headless Chrome; PIL safety net for exact 2400×2400 canvas
  - Subtitle Market value by sector ($B) contextualises the metric clearly
  weaknesses:
  - 'Sector grouping is loose — despite splitSeries: True and parentNodeLimit: True,
    same-sector bubbles scatter across the canvas rather than clustering into visually
    distinct group envelopes; consider raising gravitationalConstant to 0.12+ or adding
    visible (semi-transparent) parentNode markers so group boundaries are perceptible'
  - 'Excessive whitespace at the top of the canvas: the bubble cluster drifts downward
    leaving a large blank area between the subtitle and the first bubble; reduce top
    margin or increase gravitationalConstant to pull bubbles up into the available
    space'
  - Many mid-sized items (Semicon., Cybersec., Asset Mgmt, Fintech, Med Devices, Health
    Svcs, Renewables, Utilities, Food & Bev, Entertain.) are unlabelled because the
    filter threshold value > 400 is too aggressive; lower the filter to value > 200
    and reduce dataLabel fontSize to 28px for the smaller bubbles so their names are
    visible
  - 'DE-01: design sophistication would benefit from a descriptive prefix title that
    names the story (e.g., Global Market Capitalization · bubble-packed · python ·
    highcharts · anyplot.ai); the opacity hierarchy, while clever, is too subtle to
    read as intentional design at a glance'
