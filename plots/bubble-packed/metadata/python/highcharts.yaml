      Chrome: Title "Global Market Capitalization · bubble-packed · python · highcharts · anyplot.ai" in dark #1A1A17, clearly readable. Subtitle "Market value by sector ($B)" in INK_SOFT #4A4A44, readable. Legend labels in #4A4A44 with bordered elevated-bg box, readable. No axis labels (correct for packed bubble). Title spans ~88% of canvas width — within acceptable range.
      Data: Twenty bubbles across five sectors. Technology (#009E73 teal-green) — Software (largest), Cloud, Hardware, Semicon., Cybersec. Finance (#C475FD lavender) — Banking (large), Insurance, Asset Mgmt, Fintech. Healthcare (#4467A3 blue) — Pharma (large), Biotech, Med Devices, Health Svcs. Energy (#BD8233 ochre) — Oil & Gas, Renewables, Utilities. Consumer (#AE3030 matte red) — Automotive, Retail, Food & Bev, Entertain. White data labels with 2px dark outline on larger bubbles, clearly readable.
      Legibility verdict: PASS — all text readable; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
