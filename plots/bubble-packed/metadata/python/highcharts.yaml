review:
  strengths:
  - Per-bubble opacity hierarchy (0.65–1.0 based on value/850) adds meaningful visual
    depth within each sector group, going beyond a flat-coloured implementation.
  - 'splitSeries: true with parentNodeOptions creates clear sector clusters while
    keeping all bubbles on one chart — excellent use of a Highcharts-distinctive feature.'
  - CDP setDeviceMetricsOverride + PIL safety-net correctly pins the 2400×2400 canvas
    despite headless Chrome drift.
  - Title font scaling formula (round(66 × 67/len(title))) prevents overflow on the
    long descriptive+canonical title combination.
  - Both themes fully implemented with adaptive chrome; data colours are theme-stable
    across light and dark renders.
  weaknesses:
  - Parent-node boundary ring uses hardcoded rgba(0,0,0,0.25) for both themes — on
    dark mode this renders as a near-invisible dark ring; change to GRID or rgba(240,239,232,0.25)
    in dark theme.
  - Minor label crowding in the central cluster (Fintech, Utilities, Health Svcs,
    Entertain.) — the filter threshold of 200 could be raised to ~280 to reduce label
    density in the crowded zone.
  - 'DQ-03: absolute market cap values are simplified approximations; making the proportions
    slightly more accurate to real-world sector weights would improve factual correctness.'
