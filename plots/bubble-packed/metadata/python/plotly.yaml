  strengths:
  - 'Perfect Imprint palette compliance: four groups mapped to canonical positions
    1-4 in canonical order; both renders fully theme-correct'
  - Luminance-based text contrast inside bubbles ensures label readability against
    all four fill colors in both light and dark themes
  - 'Full spec compliance: sqrt area scaling, force simulation packing, in-bubble
    labels sized proportionally to diameter, color grouping, interactive hover tooltips'
  - Very idiomatic Plotly usage with scaleanchor equal-aspect constraint, per-group
    traces for legend control, and rich customdata hovertemplate
  - Clean reproducible code with np.random.seed(42), no extraneous imports, and dual
    PNG+HTML output
  weaknesses:
  - Smallest bubble annotations (Admin, Legal, QA, Design, HR) use 7px plotly font
    = 28 source px, rendering at ~3.5px effective size at 400px mobile width — raise
    minimum to 9px or suppress labels for bubbles below a diameter threshold
  - Data Science label text overflows its bubble boundary into the adjacent Marketing
    bubble — clip or reduce the label to fit within the bubble radius
  - Bubble cluster is visually offset to the right of the canvas center — use unweighted
    mean centering after the force loop to balance empty space on both sides
  - DE-03 storytelling is passive — add 1-2 annotations or callouts on the largest
    bubbles (Engineering, R&D) to guide the viewer to the key budget insight
