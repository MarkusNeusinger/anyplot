review:
  strengths:
  - Full spec compliance — correct packed bubble chart with force simulation, area-based
    (sqrt) circle sizing, group color coding, and proportional in-bubble labels
  - Sophisticated Plotly usage — scaleanchor/scaleratio for aspect locking, sizemode='diameter'
    for accurate pixel sizing, multi-trace per group for legend, hovertemplate + customdata
    for interactive tooltips
  - Complete theme adaptation — all chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED) correctly threaded through title, bubble edges, legend, and annotation
    callout boxes in both renders
  - Data storytelling via annotation callouts — Engineering and Tech group insights
    highlighted with arrows and branded callout boxes; total budget footer provides
    context
  - Perfect code quality — KISS flat structure, np.random.seed(42), clean imports,
    no fake interactivity
  - 'Correct Imprint palette in canonical order: Technology=#009E73, Revenue=#C475FD,
    Operations=#4467A3, Corporate=#BD8233; data colors identical across light and
    dark renders'
  weaknesses:
  - Annotation callout boxes partially overlap the upper bubble cluster — the 'Largest
    dept' box (ay=-80) sits close to the QA and Data Science bubbles, and the 'Tech
    group' box (ay=-60) crowds the IT bubble area; increase ay offsets to -110 and
    -90 respectively, or shift xref anchors further from the cluster center to give
    callouts more breathing room
  - 'Text contrast on lavender (#C475FD) bubbles is borderline — the luminance threshold
    picks #F0EFE8 (near-white) for Sales/Marketing labels, yielding ~2.4:1 contrast
    ratio against the lavender fill, which is below WCAG 2.1 AA (4.5:1 for small text);
    consider lowering the luminance threshold from 160 to ~140, or using #1A1A17 (dark
    text) on the lavender bubbles where luminance is close to the threshold'
  - DE-01 aesthetic could be elevated — the overall composition is clean but lacks
    a final layer of polish; consider adding subtle group halos (a larger semi-transparent
    circle behind each group cluster) or reducing bubble opacity to 0.82 to let the
    warm background bleed through slightly, creating more visual depth
