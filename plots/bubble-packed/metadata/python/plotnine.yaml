review:
  strengths:
  - Custom vectorized physics simulation (greedy placement + 2000-iteration force
    relaxation) produces genuinely well-packed circles with no overlaps — impressive
    technical sophistication for a static library
  - Three-tier font system (large/medium/small bubbles) with calibrated nudge offsets
    keeps labels readable at every bubble size without overlapping name and value
    text
  - 'Correct Imprint palette: brand green #009E73 as Software (first series), positions
    2–4 for Hardware/Services/Consumer; both renders theme-correct with all chrome
    adapting via INK/INK_SOFT tokens'
  - Subtitle with group revenue totals ($159B / $136B / $90B / $135B) adds quantitative
    context beyond the spec requirements — genuine storytelling bonus
  - Area-based radius scaling (sqrt(value)) ensures accurate visual perception per
    spec requirement; deterministic algorithm is fully reproducible
  weaknesses:
  - Groups are scattered throughout the packed layout (determined by packing physics)
    rather than spatially clustered — visual group membership relies entirely on color;
    spatial clustering with inter-group gaps would significantly improve group-level
    storytelling
  - Some unused corner space in the square canvas (inherent to circle-pack geometry
    but coord_fixed bounds could be tightened slightly to reduce dead space in corners)
