review:
  strengths:
  - Physics-based bubble packing with group-aware clustering correctly implements
    the spec and produces an organic, visually appealing layout
  - WCAG luminance-based text color selection ensures readable labels inside all bubbles
    regardless of the circle's Imprint color
  - 'Correct Imprint palette usage: four organizational groups mapped to canonical
    positions 1–4 in order, with brand green (#009E73) first'
  - Maximum-clearance angle algorithm for external leader lines prevents arrows from
    pointing into neighboring circles
  - 'Theme-adaptive chrome correctly implemented throughout: backgrounds, text, legend
    frame, and annotation colors all flip between light and dark; only data colors
    stay constant'
  - PatchCollection + patheffects.withStroke used idiomatically for efficient batch
    rendering and polished text strokes
  weaknesses:
  - Customer Support and Design bubbles are adjacent and both sit right at the internal-label
    threshold (radii ≈ 0.80 and 0.89 vs. min threshold ≈ 0.77 and 0.84), causing their
    internal text labels to visually crowd and partially overlap in the dense center
    cluster — raise the min_r_for_label multiplier slightly (e.g. 0.022 per char instead
    of 0.018) or lower the per-group same-group gap from 0.06 to 0.04 to pull same-group
    circles slightly tighter and push different-group circles (Customer Support /
    Design) farther apart
  - 'The bubble cluster is noticeably left-heavy: the legend in the lower-right creates
    15–20% extra whitespace on the right half of the square canvas. Moving the legend
    to lower-left, or centering the packed cluster over the full canvas width, would
    improve layout balance'
  - 'DE-01 headroom: the design is solid but not publication-ready. Adding a thin
    PAGE_BG ring gap around each bubble (already present via edgecolors=PAGE_BG) is
    good; adding a very subtle drop-shadow effect or gradient tint on the largest
    bubbles could lift the aesthetic one notch'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "bubble-packed · python · matplotlib · anyplot.ai" at top in dark ink (#1A1A17), clearly readable. No axis labels (intentionally off). Legend in lower-right with theme-correct frame (ELEVATED_BG fill, INK_SOFT border) and dark legend text.
      Data: 15 circles in 4 group colors from the Imprint palette — Engineering group in brand green (#009E73), Business in lavender (#C475FD), Operations in blue (#4467A3), Compliance in ochre (#BD8233). Size varies from large (Engineering $950K) down to small (Legal $130K). Larger circles carry internal text labels split across lines with WCAG-contrast text color; smaller circles (Legal, Security, QA, HR) receive external labels via leader lines. Circles have a PAGE_BG edge stroke creating bubble separation.
      Legibility verdict: PASS overall — text is readable in both circle types. NOTE: Customer Support and Design bubbles are adjacent and their internal labels crowd each other noticeably in the dense center region, causing partial visual overlap of the label text.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title readable in light cream color. Legend frame uses ELEVATED_BG (#242420) fill with lighter INK_SOFT text — no dark-on-dark failure. All chrome correctly flips to light-on-dark.
      Data: All four group colors are identical to the light render (green, purple, blue, ochre) — only chrome flips. Internal circle text uses WCAG-contrast colors (light text on darker circles, dark text on lighter circles). External leader lines use INK_MUTED which renders correctly as a lighter grey on the dark surface.
      Legibility verdict: PASS — no dark-on-dark failures detected. The same Customer Support / Design label crowding is present as in the light render. Brand green #009E73 remains clearly visible on the dark surface.
