review:
  strengths:
  - 'Correct Imprint palette usage: Engineering=green #009E73 (position 1), Business=lavender
    (2), Operations=blue (3), Compliance=ochre (4) in canonical order'
  - Area-proportional sizing via sqrt scaling — circles accurately represent relative
    budget magnitudes
  - Physics-based force simulation produces a genuinely packed layout with no circle
    overlap
  - 'Theme-adaptive chrome is fully wired: PAGE_BG, INK, INK_SOFT, INK_MUTED tokens
    used throughout title, legend, and annotations'
  - Correct square canvas (2400×2400 px via figsize=(6,6), dpi=400) — appropriate
    for symmetric bubble chart
  - PatchCollection batch rendering is idiomatic matplotlib for many circles
  - Contrast-aware text color selection inside bubbles using WCAG luminance calculation
  - Legend correctly styled with ELEVATED_BG frame and INK_SOFT text
  - All 15 department items shown with values; realistic budget data is neutral and
    plausible
  - Correct output filename pattern plot-{THEME}.png with no bbox_inches='tight'
  weaknesses:
  - 'Path effect strokes are too heavy: pe.withStroke(linewidth=3) at dpi=400 produces
    ~17px of stroke outline, making bubble labels look garish and over-rendered in
    both themes. Reduce linewidth to 1.0–1.5 for a subtler, cleaner effect.'
  - 'Visible label overlap in the central cluster: ''Customer Support'' text runs
    into the Design bubble in both renders; ''Finance'' and ''Operations'' labels
    are very crowded and partially overlap; ''HR'' text is cramped against Data Science.
    The physics simulation does not account for label bounding boxes, only circle
    radii.'
  - '8-character hex alpha notation (#00000033, #ffffff33) for path effect foreground
    colors may not be consistently interpreted across matplotlib versions — prefer
    explicit RGBA tuples: foreground=(0,0,0,0.2) and foreground=(1,1,1,0.2).'
  - 'The bubble layout leans left/bottom-heavy: most bubbles cluster in the lower-left
    quadrant, leaving the upper-right and lower-right (except legend) empty. The group-pull
    and center-pull parameters could be tuned for more balanced spatial distribution.'
  - Small circle external label placement uses angle-from-origin for offset direction,
    which can point toward the dense center rather than outward; 'Legal' external
    label overlaps with adjacent bubble boundaries.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, fills the 2400×2400 canvas
      Chrome: Title "bubble-packed · python · matplotlib · anyplot.ai" in dark ink, legible at ~12pt. No axis labels or ticks (ax.axis("off") — appropriate for packed bubble chart). Legend in lower-right with warm elevated-BG frame and INK_SOFT text.
      Data: 15 circles packed together using physics simulation. Engineering group (green #009E73): R&D, Engineering, IT, Data Science. Business group (lavender #C475FD): Product, Marketing, Sales, Design. Operations group (blue #4467A3): Operations, Finance, Customer Support, HR. Compliance group (ochre #BD8233): Security, QA, Legal (tiny). First series correctly uses brand green.
      Label quality: Most large circles have label+value text inside. Path effect strokes (linewidth=3 at 400 DPI) render as ~17px outlines — very heavy, making text appear chunky and over-processed. "Customer Support" label visibly overlaps with the Design bubble. "Finance" and "Operations" labels are crowded. External labels (Legal, Security, QA) have leader lines and appear readable.
      Legibility verdict: PASS (readable overall, but path effects reduce quality noticeably)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title is light-colored text (#F0EFE8) against dark background — readable. Legend frame uses ELEVATED_BG (#242420). Legend text is INK_SOFT (#B8B7B0). All chrome elements correctly flip to dark theme.
      Data: Identical Imprint palette colors to light render — Engineering (green), Business (lavender), Operations (blue), Compliance (ochre). All data colors are unchanged between themes as required.
      Label issues: Same heavy path effect strokes present. "Customer Support" text is partially obscured by the adjacent Design bubble. The dark render shows the same label crowding in the central cluster. External labels (Security, QA, Legal) remain readable with the leader lines using INK_MUTED color.
      Legibility verdict: PASS (no dark-on-dark failures — luminance-based text color selection works correctly; title and legend are readable; data colors are identical to light render)
