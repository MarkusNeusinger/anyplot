review:
  strengths:
  - Creative and correct use of pygal's add_xml_filter to implement a packed bubble
    chart type not natively supported by pygal
  - 'Perfect Imprint palette compliance: Technology=slot 1 (#009E73), Marketing=slot
    2, Operations=slot 3, Sales=slot 4; canonical order maintained'
  - 'Full theme-adaptive chrome: all INK/INK_SOFT/INK_MUTED/PAGE_BG tokens propagated
    correctly; both renders pass legibility checks'
  - Radial gradient fills via SVG defs give polished 3D bubble appearance — clear
    design investment
  - In-bubble text intelligently adapts font size and color (white vs. near-black)
    based on bubble size and fill color
  - Static deterministic data with realistic department budget context (perfectly
    neutral)
  - Dual output (PNG + interactive HTML) correctly implemented
  weaknesses:
  - Smallest two bubbles (AI Research $95K r~92px, Admin $105K r~98px) get minimum
    label font size ~24-25 SVG px; at mobile widths (~400px thumbnail) these labels
    become very difficult to read — raise minimum label font size floor from 24 to
    30 SVG px
  - 'Group label ''Technology: $1,190K'' at bottom of its cluster crowds ''Marketing:
    $700K'' just below it; slightly larger vertical clearance or font size reduction
    from 38px to 32px would reduce visual tension'
  - The pygal.Pie base with empty series as legend scaffolding is functional but carries
    invisible pie geometry in the SVG; a cleaner base canvas would be preferable
