  strengths:
  - Custom muted colorblind-safe palette with intentional color choices
  - Per-bubble opacity variation based on value creates within-group visual hierarchy
  - Data label filtering (value > 320) prevents clutter while highlighting major categories
  - Clean well-structured code with elegant per-bubble enrichment loop
  - Good use of Highcharts-specific packedbubble features (splitSeries, layoutAlgorithm,
    parentNodeOptions)
  - Realistic and neutral business data context
  weaknesses:
