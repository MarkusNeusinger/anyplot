  - Several data labels overlap in the densely packed center area (Cybersecurity,
    Medical Devices, Entertainment, Utilities, Food & Beverage)
  - Generic visual design with no sophistication, storytelling, or focal point
  - Groups are mixed together rather than clustered separately, weakening the grouping
    feature
