review:
  strengths:
  - 'Full spec compliance: correct packed bubble chart with force simulation, area-proportional
    circle sizing, and sector-based color grouping'
  - 'Imprint palette applied correctly — brand green #009E73 as Consumer (first series),
    all 5 sectors mapped to canonical palette positions in order'
  - Excellent real-world dataset (global tech market revenue by segment) with realistic
    proportions across 21 named items in 5 sectors
  - Clean theme_void approach with PAGE_BG-colored bubble borders creating visual
    separation between touching circles — a polished detail
  - 'Both light and dark themes render correctly: backgrounds are #FAF8F1 and #1A1A17
    respectively, legend chrome flips correctly, data colors stay identical'
  weaknesses:
  - 'Canvas utilization ~55-65%: the bubble cluster leaves notable empty space in
    the bottom-right quadrant of the square canvas — coord_equal() constrains auto-limits
    to the data extent; consider manually setting axis limits or scaling the pack
    output to fill more of the 6×6 inch canvas'
  - 'Dark ink labels (INK=#1A1A17) on medium-dark Enterprise blue circles (#4467A3)
    in the light render have ~2.3:1 contrast — below WCAG AA for small text; switching
    to a white or #FFFDF6 label for dark-background bubbles (sectors with luminance
    < 0.1) would improve legibility'
  - pack_circles() function deviates from KISS Imports→Data→Plot→Save structure; using
    the `packcircles` package would simplify packing code and likely improve packing
    quality
  - Bubble labels at geom_text size=2.2mm are at the minimum readable floor; increasing
    to 2.6-2.8mm would improve readability when the PNG is scaled to mobile widths
    (~400px)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "bubble-packed · r · ggplot2 · anyplot.ai" in dark INK (#1A1A17), centered, 12pt — readable. No axis labels (theme_void — appropriate). Legend on right with elevated #FFFDF6 background and soft INK_SOFT border; "Sector" title in dark ink, 5 sector entries in INK_SOFT — all readable.
      Data: 21 circles in 5 Imprint palette colors — Consumer=#009E73 (green), Infrastructure=#C475FD (lavender), Enterprise=#4467A3 (blue), Fintech=#BD8233 (ochre), Emerging=#AE3030 (red). Alpha=0.85 with PAGE_BG-colored borders. Circles packed with sector clustering visible. Labels in dark INK (#1A1A17) on bubbles large enough to hold text (>=0.24 radius). Most labels are readable; dark text on the Enterprise blue bubbles (#4467A3) has limited contrast (~2.3:1) but is still legible due to bold face.
      Layout: Bubble cluster fills center-left of canvas; some empty space in bottom-right (~35-40% of canvas unused). Legend positioned top-right.
      Legibility verdict: PASS — all title/legend text clearly readable; bubble labels readable at full size though dark-on-blue contrast is suboptimal.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title in INK=#F0EFE8 (light cream) — clearly visible. Legend with ELEVATED_BG=#242420 background and INK_SOFT border; legend text in #B8B7B0 — readable against dark background. No dark-on-dark failures detected.
      Data: All 5 sector colors are identical to the light render — Consumer green, Infrastructure lavender, Enterprise blue, Fintech ochre, Emerging red — data palette unchanged. Bubble labels rendered in LABEL_COLOR=#FFFFFF (white) — excellent contrast against all colored bubbles. The Enterprise blue bubbles now show white text with good contrast.
      Legibility verdict: PASS — all text clearly readable, no dark-on-dark failures, white bubble labels are an improvement over the light render's dark-on-blue contrast.
