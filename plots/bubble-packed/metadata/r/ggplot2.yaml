review:
  strengths:
  - Area-proportional circle sizing implemented correctly (radius = sqrt(value)),
    ensuring accurate visual perception of values
  - 'Imprint palette applied perfectly: Consumer sector uses brand green #009E73 as
    first series, all 5 sectors follow canonical Imprint order'
  - 'Full theme-adaptive chrome: title, legend text, backgrounds all flip correctly
    between light (#FAF8F1) and dark (#1A1A17) renders'
  - 'Compelling real-world dataset: 21 tech market segments across 5 sectors with
    plausible revenue figures in $B'
  - Custom force-directed packing algorithm (golden-angle spiral + iterative overlap
    resolution + centroid gravity) implemented from scratch in R
  - Clean theme_void() approach correctly removes all unnecessary chart infrastructure
    for packed bubble chart
  - geom_polygon with 72-point circles plus geom_text for labels is idiomatic ggplot2
    for this non-standard chart type
  - Labels correctly suppressed for bubbles too small to hold text (radius < 0.24
    threshold)
  weaknesses:
  - 'Hardcoded white (#FFFFFF) text for bubble labels causes partial invisibility
    in light render: labels that overflow the circle boundary render as white-on-warm-white
    and become invisible — ''Payments'' shows as ''rayments'', ''Streaming'' shows
    as ''treaming'' in the light render. Fix: use theme-adaptive label color (color
    = INK for light theme, ''#FFFFFF'' for dark), or scale geom_text size so labels
    fit within the circle radius (size proportional to radius), or filter more aggressively
    so only bubbles whose radius can contain the full label string are labeled'
  - 'Force-directed packing leaves visible gaps between circles, producing a scattered
    layout rather than a tight pack. The circles float with spaces between them instead
    of touching neighbors. Fix: increase n_iter to 1500+, increase the gravity coefficient
    from 0.01 to 0.03-0.05, and add a final tightening pass that moves each circle
    toward its nearest neighbor until touching'
  - 'No spatial grouping by sector: all 5 sectors are intermixed randomly in the pack.
    The spec notes optional grouping that clusters related circles with spacing between
    groups. Fix: add a sector-level centroid gravity that gently pulls same-sector
    circles together, creating visible cluster regions that reinforce the color-encoded
    grouping'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "bubble-packed · r · ggplot2 · anyplot.ai" centered at top, dark ink, clearly readable. Legend on right side with framed elevated background, sector labels readable in dark INK_SOFT.
      Data: 21 circles of varying sizes, color-coded by 5 sectors — Consumer (green #009E73), Infrastructure (lavender #C475FD), Enterprise (blue #4467A3), Fintech (ochre #BD8233), Emerging (matte red #AE3030). Circles have PAGE_BG-colored thin polygon borders and 0.85 alpha. White bold text labels inside larger circles.
      Legibility verdict: PARTIAL FAIL — bubble labels use hardcoded white (#FFFFFF). Inside colored circles the white text reads fine. However, several labels overflow circle boundaries: "Payments" (Fintech, ochre bubble) renders as "rayments" because the "P" and first letters fall outside the circle onto the warm-white background where white-on-warm-white is invisible. "Streaming" similarly shows "treaming". Title and legend are fully legible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface
      Chrome: Title in light #F0EFE8 clearly readable. Legend framed with elevated #242420 background, legend text in light INK_SOFT (#B8B7B0).
      Data: Identical circle positions, sizes, and colors to light render — Imprint palette data colors are theme-invariant and match perfectly across both renders.
      Legibility verdict: PASS — all labels fully visible. The same white (#FFFFFF) text that was invisible on the light background is clearly readable against the dark near-black background. "Payments", "Streaming", "E-Commerce" all read fully in the dark render. No dark-on-dark failures detected.
