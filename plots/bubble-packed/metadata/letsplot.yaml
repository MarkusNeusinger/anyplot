  - Color palette, while harmonious, is not purpose-built for colorblind accessibility
  image_description: 'The plot displays a packed bubble chart titled "Department Budget
    Allocation · bubble-packed · letsplot · pyplots.ai". Fifteen circles of varying
    sizes represent different company departments, with circle area proportional to
    budget in millions of dollars. The circles are color-coded by division: Tech in
    golden yellow (#FFD43B) — including Engineering ($85M, the largest), R&D ($72M),
    Product ($68M), IT ($55M), Analytics ($42M), Design ($35M), QA, and Security;
    Business in teal/mint (#4ECDC4) — Marketing ($62M) and Sales ($58M); and Operations
    in dark steel blue (#306998) — Operations ($45M), Finance ($48M), Customer Support
    ($38M), HR ($32M), and Legal ($22M). Each circle has a white border. Larger bubbles
    display department name and budget value in white bold text; medium bubbles show
    only the abbreviated name; the four smallest bubbles have no labels. The circles
    are packed together without overlap, with divisions loosely clustered. A horizontal
    legend at the bottom shows "Division: Tech, Business, Operations" with color swatches.
    The overall layout is clean on a white background with no axes (theme_void), using
    a square 3600x3600 px canvas.'
