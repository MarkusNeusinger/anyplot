review:
  strengths:
  - Creative use of pygal add_xml_filter to implement a chart type pygal does not
    natively support
  - Area-based scaling (sqrt) provides accurate visual perception of values
  - Realistic department budget data with clear labeling and neutral topic
  - White stroke borders and transparency create visual polish
  - Clean well-structured deterministic packing algorithm
  weaknesses:
  - Significant empty space at bottom of canvas between bubble clusters and legend
    (VQ-05)
  - Packing algorithm does not explicitly cluster circles by group
  - Design lacks strong focal point or visual hierarchy beyond size variation (DE-03)
  - Small circle labels are borderline readable
  image_description: 'The plot displays a packed bubble chart titled "bubble-packed
    · pygal · pyplots.ai" on a white background. Sixteen circles of varying sizes
    represent department budget allocations, color-coded into four groups: Technology
    (steel blue — Software $450K, Cloud $280K, Data $180K, Security $120K), Marketing
    (yellow — Digital $350K, Brand $220K, Events $150K, PR $90K), Operations (teal
    — Facilities $280K, HR & Recruiting $200K, Legal $160K, Admin $100K), and Sales
    (coral/pink — Enterprise $380K, SMB $250K, Partners $170K, Support $110K). Circles
    have white stroke borders and 0.85 fill opacity. Larger circles display department
    name and dollar value inside (e.g., "Software $450K"); medium circles show value
    only (e.g., "$90K"); smallest circles have labels but at reduced font sizes. Group
    labels with totals (e.g., "Technology: $1030K") appear near each cluster. A four-entry
    legend at the bottom identifies group colors. The bubble clusters occupy roughly
    the upper two-thirds of the canvas, with notable empty space between the clusters
    and the bottom legend.'
