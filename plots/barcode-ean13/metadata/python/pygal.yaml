review:
  strengths:
  - Clean theme-adaptive monochrome barcode with proper ink-token contrast in both
    light and dark renders
  - 'Complete EAN-13 encoding: start guard (101), left-digit parity encoding, center
    guard (01010), right digits, end guard (101) — 95 modules total'
  - Correct 9-module quiet zones on both sides as required by spec
  - Informative structural x-title annotation breaking down GS1 prefix, manufacturer,
    product, and check digit
  - Deterministic hardcoded barcode (4006381333931 German product) — fully reproducible
  - Explicit font sizes set for all text elements; all readable in both themes
  - Generates both PNG and interactive HTML outputs as required for pygal
  - KISS code structure — no classes or functions, clean linear flow
  weaknesses:
  - 'Missing traditional EAN-13 human-readable digit display: spec requires individual
    digits rendered below the barcode bars with the first digit positioned outside
    the left guard — the x_title structural annotation is informative but does not
    fulfill this requirement visually'
  - Design storytelling limited to structural annotation; no visual hierarchy or emphasis
    elements to guide the viewer through the barcode structure
  - DE-01 aesthetic sophistication is functional but minimal — appropriate for a monochrome
    barcode but leaves little room for design elevation
