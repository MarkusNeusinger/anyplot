  strengths:
  - Elegant use of pygal's per-bar color dict to achieve variable-width bar appearance
    via stroke_width=0 (adjacent bars merge seamlessly)
  - 'Correct full EAN-13 encoding: L/G/R code tables, parity pattern selection, guard
    patterns (start/center/end), check digit handling'
  - Theme-adaptive chrome in both renders — warm backgrounds (#FAF8F1/#1A1A17), ink-adaptive
    text, no legibility failures in either theme
  - Clean deterministic code with no unnecessary complexity; real German product barcode
    (4006381333931) used as data
  - HTML interactive output produced alongside PNG as required for pygal
  weaknesses:
  - 'Quiet zones are too narrow (~3 modules, margin=80px / ~32px per module) versus
    the spec-required minimum of 9 module widths on each side. Fix: prepend and append
    9 explicit white-space bars (value=1, color=PAGE_BG) to bar_data before the start
    guard and after the end guard to guarantee adequate quiet zones.'
  - 'VQ-07 partial: bar colors use ink tokens (#1A1A17 light / #F0EFE8 dark) rather
    than Okabe-Ito #009E73 — justified for barcode semantics but scores as partial
    palette compliance.'
  - Design Excellence limited — no visual annotations explaining barcode structure
    (digit groups, guard pattern labels), which could add storytelling value for an
    educational visualization.
