review:
  strengths:
  - Creative use of sns.heatmap() with a 2-color theme-adaptive colormap to render
    a binary barcode — idiomatic seaborn for 2D array data
  - 'Correct full EAN-13 encoding implementation: L/G/R code tables, first-digit pattern
    table, start/center/end guard bars, and quiet zones all properly encoded'
  - 'Perfect theme adaptation — both renders readable with correct backgrounds (#FAF8F1
    light / #1A1A17 dark), font colors flip cleanly via INK token'
  - Clean, KISS code structure with no functions/classes; encoding tables are necessary
    domain complexity, not over-engineering
  - Deterministic output (hardcoded barcode digit), all font sizes explicitly set,
    correct output filenames
  weaknesses:
  - 'SC-02: First digit not positioned outside/left of the start guard bars. EAN-13
    standard places digit 1 to the left of the guard bars, digits 2-7 below the left
    data section, and digits 8-13 below the right data section. The implementation
    instead displays all digits in a single centered line below the barcode — use
    three separate ax.text() calls at the correct x-positions under each section.'
  - 'VQ-05 / DE-02: Substantial empty canvas below the digit line (~20-25% of canvas
    height unused). Tighten the y-axis limit so the figure bottom is closer to the
    digits, or shift the overall barcode/digit composition upward to utilize the canvas
    more evenly.'
  - 'DE-01: The design is clean but utilitarian — consider adding subtle section separators
    or a faint annotation showing guard bar positions to provide educational context
    about the barcode structure, or adjust font weight / spacing of the digit groups
    for more visual polish.'
  - 'LM-02: The seaborn heatmap is a clever choice but sns.color_palette([...], as_cmap=True)
    is barely leveraging seaborn''s distinctive features beyond matplotlib; no seaborn-specific
    design elements (context scaling, theme integration) are fully exploited.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "barcode-ean13 · python · seaborn · anyplot.ai" rendered in dark ink (#1A1A17), clearly readable. No axis labels, tick labels, or grid lines (appropriate for barcode plot type).
      Data: EAN-13 barcode rendered as dark (#1A1A17) vertical bars on the warm off-white background. Bar widths vary correctly per the L/G/R encoding. Quiet zones visible on both sides. Start guard (101), center guard (01010), and end guard (101) are structurally present in the binary pattern. Human-readable digit string "4  006381  333931" displayed in monospace bold below the barcode.
      Legibility verdict: PASS — title and digit text are both readable at full resolution; no text/chrome issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark-theme surface.
      Chrome: Title in light ink (#F0EFE8), clearly readable against the dark background. Digit string also rendered in light color and fully readable. No dark-on-dark failures observed.
      Data: Barcode correctly inverts — light (#F0EFE8) bars on near-black background; the bars are distinguishable and the pattern matches the light render structurally. The colormap [PAGE_BG, INK] flips correctly so binary 0 = dark background and binary 1 = light bar.
      Legibility verdict: PASS — all text is light-on-dark and readable; the inverted barcode is visually clear.
