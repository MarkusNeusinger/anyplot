review:
  strengths:
  - Correct EAN-13 encoding with guard patterns (start 101, center 01010, end 101),
    quiet zones, and first digit outside left guard
  - Theme-adaptive bar colors (black on light, white on dark) are the only sensible
    approach for a functional barcode
  - 'Full letsplot idiom: ggplot + geom_rect + aes + scale_fill_identity + ggsize(800,450)
    scale=4 gives exact 3200x1800 PNG'
  - layer_tooltips() with column-reference syntax (@section, Module @position) is
    a genuine letsplot-distinctive feature
  - Clean KISS structure — no functions/classes, deterministic hard-coded EAN-13 data,
    all imports used
  - Correct check digit calculation inline; monospace font for digit labels is authentic
    to barcode style
  weaknesses:
  - Bottom of canvas has ~19% empty space below the digit labels (ylim lower bound
    at -20, digits at y=20 — 40 of 215 y-units unused) — tighten ylim lower bound
    to ~5 or raise bar_y_min to reduce dead space
  - Design excellence is limited to a functional barcode diagram — no additional context
    (e.g. country code annotation, manufacturer segment labels) that would lift DE-03
    above the default 2/6
  - 'LM-02 could be stronger: the layer_tooltips usage is correct but minimal — richer
    tooltip content (full digit value, section name, module index) would better showcase
    letsplot interactive HTML capabilities'
