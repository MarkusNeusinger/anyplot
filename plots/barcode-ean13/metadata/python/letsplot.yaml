review:
  strengths:
  - 'Technically correct EAN-13 implementation: L/G/R encoding tables, parity pattern
    lookup, and guard-bar geometry are all accurate'
  - Theme adaptation is well-executed — bar fill inverts correctly between light/dark
    surfaces using BAR_COLOR token (dark bars on light bg, light bars on dark bg)
  - Real German retail barcode data (4006381333931) with authentic GS1-Germany prefix
    — specific and authentic real-world context
  - Canvas is exactly 3200x1800 (ggsize(800,450) + scale=4) — canonical landscape
    size per spec
  - scale_fill_identity() is the correct letsplot idiom for directly-mapped fill aesthetics;
    xlim/ylim and theme_void used idiomatically
  weaknesses:
  - Title font size size=11 produces ~44 source-px at scale=4, filling only ~40% of
    canvas width; style guide expects 70-85% for the long mandated title — increase
    title geom_text size to 14-16
  - Default letsplot canvas border stroke is visible in both renders despite element_rect(color=PAGE_BG)
    — add panel_border=element_blank() to the theme() call to fully suppress the frame
  - 'Bottom digit crowding: ylim(0, guard_y_max+45) leaves zero bottom margin causing
    digit labels at y=20 to appear close to the canvas bottom edge — shift ylim lower
    bound to -15 or -20'
  - Three helper functions (calculate_check_digit, encode_ean13, generate_barcode_bars)
    violate the no-functions KISS structure — inline the encoding logic into the flat
    script flow
  - letsplot HTML output has no interactive features — add tooltips to geom_rect showing
    digit and position info to make the HTML export genuinely distinctive
