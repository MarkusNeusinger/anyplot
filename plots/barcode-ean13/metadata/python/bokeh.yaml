      Data: EAN-13 barcode rendered as solid dark (#1A1A17) vertical bars on the off-white surface. Guard bars (start, center, end) are visibly taller than digit bars — correct EAN-13 structure. Quiet zones clearly present on both sides. Human-readable digits "4  006381  333931" in monospace below the barcode, with "4" correctly placed outside the left guard. Bracket lines and zone annotations above the barcode are clean and legible.
