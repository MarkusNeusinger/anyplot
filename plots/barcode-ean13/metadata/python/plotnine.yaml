review:
  strengths:
  - 'Correct full EAN-13 encoding with all structural components: start guard (101),
    center guard (01010), end guard (101), quiet zones of 9 module widths on each
    side'
  - Guard bars correctly extend lower (ymin=0) than data bars (ymin=5), matching the
    EAN-13 visual standard
  - First digit correctly positioned outside the left guard bars as per EAN-13 convention
  - Both light and dark themes render cleanly — INK token adapts bars and text correctly
    for each surface, no dark-on-dark or light-on-light failures
  - Uses a real German product EAN-13 code (4006381333931) with built-in check digit
    validation logic
  - 'Clean KISS code structure using plotnine grammar idiomatically: geom_rect for
    bars, geom_text for digit labels, theme_void for minimal chrome'
  - Monospace bold font for digit labels is an excellent domain-appropriate choice
    that visually mimics printed barcode labels
  weaknesses:
  - Significant vertical dead space between the title and the barcode body (~25% of
    canvas height is blank) — the barcode is pushed toward the lower half of the canvas;
    tighten ylim or adjust figure margins to center the barcode vertically
  - 'DE-01/DE-02: Design polish is competent but not sophisticated — no visual annotation
    of EAN-13 structure (e.g. subtle region labels for ''Left Guard'', ''Left Data'',
    ''Center Guard'', ''Right Data'', ''Right Guard'' beneath the digit row) that
    would elevate the educational value'
  - 'LM-02: Plotnine''s grammar-of-graphics strengths are used for basic geoms only;
    no distinctive plotnine features such as facet_wrap for multi-barcode comparison
    or scale adjustments'
