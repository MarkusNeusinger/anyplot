    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "barcode-ean13 · python · plotnine · anyplot.ai" centered at top in dark near-black ink, size=12pt — clearly readable. No axis labels or ticks (theme_void); appropriate for a barcode visualization.
      Data: Vertical near-black bars on the cream background forming a standard EAN-13 barcode pattern. Bars vary in width (1–4 module widths via consecutive bits). Start guard (101), center guard (01010), and end guard (101) visibly extend ~5 units lower than the data bars. Quiet zones visible on both sides. Below the barcode, 13 bold monospace digits: "4  0 0 6 3 8 1  3 3 3 9 3 1" — the leading "4" appears to the left of the left guard bars as per EAN-13 convention.
