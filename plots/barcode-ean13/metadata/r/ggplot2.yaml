review:
  strengths:
  - 'Complete and correct EAN-13 implementation: proper L/G/R encoding tables, parity
    selection based on first digit, all three guard patterns with correct descenders'
  - Correct placement of first digit outside the left guard bar (as per EAN-13 spec)
  - 'Both themes work correctly — INK token properly inverts bars and text between
    light and dark; backgrounds are exactly #FAF8F1 / #1A1A17'
  - Real German product barcode ('4006381333931') adds authenticity and context
  - Canvas dimensions correct (3200x1800), gate passed
  weaknesses:
  - 'No visual hierarchy or storytelling: the barcode is displayed but viewers receive
    no guidance about its structure (which digits are country code, manufacturer,
    product, check digit). Adding subtle bracket indicators or a caption subtitle
    below would create context without disrupting the barcode.'
  - Digit size (3.5 ggplot units) is slightly small on the 3200x1800 canvas — increase
    to 4.5-5.0 for better readability when scaled to mobile widths (~400px).
  - ggplot2 used primarily as a drawing canvas (manual geom_rect coordinates) rather
    than leveraging its grammar-of-graphics strengths. Consider using annotate() or
    geom_segment() for region separators or labels that better use ggplot2's layer
    system.
  - Helper functions (ean13_check, build_ean13) slightly violate the KISS flat-structure
    preference; the encoding logic could be inlined or collapsed into a single function.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface.
      Chrome: Title 'barcode-ean13 · r · ggplot2 · anyplot.ai' in dark ink (#1A1A17), centered at top, clearly readable. 13 human-readable digits in dark ink below the barcode: '4' outside left guard, '0 0 6 3 8 1' under left group, '3 3 3 9 3 1' under right group. No axis labels or grid (theme_void — appropriate for barcode).
      Data: Dark (near-black) vertical bars of varying widths on off-white background. Start guard (101), center guard (01010), end guard (101) all visible. Guard bars correctly extend below the regular bar height. Bars are theme INK color (#1A1A17).
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface.
      Chrome: Title in light text (#F0EFE8), clearly readable. All 13 digits in light text below the barcode, readable. No dark-on-dark failures observed.
      Data: Light (off-white #F0EFE8) vertical bars on dark background — the INK token correctly inverts for the dark theme, creating the same high-contrast barcode pattern in reversed color. Data bar colors are correctly theme-adapted (not Okabe-Ito categorical, but INK token as appropriate for binary barcode encoding). Guard bars and descenders identical in structure to light render.
