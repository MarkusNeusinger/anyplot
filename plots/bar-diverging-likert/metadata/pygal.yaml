    inside bar segments where space permits (>=8%). The x-axis is labeled "Response
    Percentage (%)" with tick marks from 60 on the left to 80 on the right. A 5-column
    legend at the bottom shows: Neutral, Disagree, Strongly Disagree, Agree, Strongly
    Agree. The background is clean white with no grid lines.'
