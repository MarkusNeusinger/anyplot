  image_description: The plot displays a horizontal diverging stacked bar chart showing
    employee engagement survey results for 10 questions. Bars diverge from a central
    zero line, with Strongly Disagree (dark red) and Disagree (salmon) extending left,
    Neutral (gray) split evenly across the midpoint, and Agree (light blue) and Strongly
    Agree (dark blue) extending right. The title reads "bar-diverging-likert · plotly
    · pyplots.ai" in bold at the top. Questions are sorted by net agreement — "I have
    the tools I need" (most positive) at top, "I see a clear career path" (most negative)
    at bottom. Percentage labels appear inside bar segments in white text, suppressed
    for narrow segments. The x-axis shows percentages from -60% to 80% with a directional
    label. A dark vertical zeroline anchors the diverging point. A horizontal legend
    at the bottom displays all five categories. The background is clean white with
    very subtle gridlines.
