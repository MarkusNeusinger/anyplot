review:
  strengths:
  - 'Perfect spec compliance: all required features implemented (neutral centering,
    diverging colors, net-agreement sorting, percentage labels inside bars, horizontal
    orientation)'
  - Correct semantic Imprint palette mapping — positive→green (#009E73), negative→red
    (#AE3030), neutral→theme-adaptive muted anchor — valid semantic exception per
    style guide
  - 'Full theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied to both light and dark renders with no dark-on-dark
    failures'
  - Clean flat script with no unnecessary abstractions; loop-based segment rendering
    is concise and correct
  - Descriptive x-axis label with directional arrows ('← Disagree  Response Share
    (%)  Agree →') guides the reader clearly
  weaknesses:
  - 'DE-02: Legend retains a visible border frame (framecolor = INK_SOFT) — removing
    it (framevisible = false or framecolor = :transparent) would improve visual refinement'
  - 'DE-01: No descriptive title prefix (e.g. ''Employee Engagement Survey · bar-diverging-likert
    · julia · makie · anyplot.ai'') which would strengthen storytelling context'
  - 'LM-02 below potential: bar segments are drawn as individual Rect2f polygons via
    poly! rather than using the higher-level barplot! with direction=:x and stack=
    arguments, which is the more idiomatic Makie approach for stacked horizontal bars'
  - 'VQ-05 minor: right-side margin is tight — the longest bars (Team Collaboration:
    SA+A ≈ 77% rightward) leave very little canvas whitespace on the right; adding
    an explicit xlims or padding would help'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, no pure white.
      Chrome: Title "bar-diverging-likert · julia · makie · anyplot.ai" in dark ink, bold, fully readable. Y-axis shows 10 question labels (e.g. "Team Collaboration", "Compensation & Benefits") in dark-soft (#4A4A44). X-axis shows symmetric percentage ticks with the directional label "← Disagree  Response Share (%)  Agree →". All text is clearly readable against the light background.
      Data: Five bar segments per row diverge from a center 0% reference line. Strongly Disagree = matte red (#AE3030), Disagree = ochre (#BD8233), Neutral = muted gray (#6B6A63), Agree = Imprint blue (#4467A3), Strongly Agree = brand green (#009E73). Percentage labels (white text) appear inside segments ≥ 8%. Bars sorted top-to-bottom by descending net agreement (Team Collaboration most positive at top, Compensation & Benefits least positive at bottom). Horizontal legend with framed box at bottom labels all five categories.
      Legibility verdict: PASS — all text readable, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title in near-white (#F0EFE8), clearly visible. Y-axis question labels in lighter ink (#B8B7B0). X-axis ticks and directional label readable against dark background. Legend background darkens to #242420 (ELEVATED_BG), frame in lighter #B8B7B0, labels clearly visible. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — SA green #009E73, A blue #4467A3, D ochre #BD8233, SD red #AE3030 unchanged. Neutral shifts to the dark-mode muted anchor (#A8A79F), appearing as a light beige-gray — correctly theme-adaptive and still clearly distinguishable against the dark background. Brand green #009E73 is clearly visible in both the bar segments and legend swatch.
      Legibility verdict: PASS — all text readable, data colors identical to light render, no chrome inversion failures.
