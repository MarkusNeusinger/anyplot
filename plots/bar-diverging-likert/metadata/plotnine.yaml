  image_description: The plot is a horizontal diverging stacked bar chart showing
    employee engagement survey results for 10 questions. Bars diverge from a central
    vertical line at 0%, with negative responses (Strongly Disagree in dark red, Disagree
    in light pink-red) extending left and positive responses (Agree in light blue,
    Strongly Agree in dark blue) extending right. Neutral responses in gray are split
    evenly across the midpoint. Questions are sorted from most positive (Team Collaboration
    at top) to most negative (Compensation & Benefits at bottom). Bold percentage
    labels appear inside segments that are 10% or wider. The x-axis shows "Percentage
    of Responses" with absolute percentage tick labels (0%, 50%). A legend at the
    bottom displays all five response categories (Strongly Disagree, Disagree, Neutral,
    Agree, Strongly Agree) in a single horizontal row. The title reads "bar-diverging-likert
    · plotnine · pyplots.ai" centered at top. An italic annotation "← Disagree  Agree
    →" appears in the upper-right area. The overall color scheme is a clean red-gray-blue
    diverging palette on a minimal white background with subtle dashed vertical grid
    lines.
