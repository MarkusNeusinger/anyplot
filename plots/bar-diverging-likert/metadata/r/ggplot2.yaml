review:
  strengths:
  - 'Perfect spec compliance — all required diverging Likert features implemented:
    neutral-center split, net-agreement sort, percentage labels with threshold, diverging
    color scheme, horizontal orientation'
  - Sophisticated factor-level ordering in ggplot2 to achieve correct diverging stack
    direction — non-trivial library-specific technique
  - 'Strong data storytelling: sort by net agreement immediately guides the viewer
    to the key comparison'
  - 'Semantic diverging palette using Imprint endpoints (#AE3030 red / #4467A3 blue)
    for negative/positive sentiment — justified semantic exception'
  - 'Clean theme adaptation: all chrome (backgrounds, text, grid, legend box) correctly
    flips between light and dark'
  weaknesses:
  - 'VQ-07 (theme-shifting data colors): colorRampPalette(c("#AE3030", INK_MUTED,
    "#4467A3"))(5) uses INK_MUTED (theme-adaptive token) as midpoint, causing the
    Disagree, Neutral, and Agree colors to differ between light and dark renders.
    Fix: replace INK_MUTED with a fixed neutral hex "#6B6A63" as the midpoint so all
    5 diverging colors are theme-independent.'
  - 'VQ-01 (bar label contrast in dark): Bar label text is hardcoded to color = "#FAF8F1"
    in both themes. In dark mode, lighter neutral segments (#A8A79F) host near-white
    text — contrast is marginal. Consider using INK_SOFT for labels on lighter bar
    segments.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface
      Chrome: Title "Employee Benefits · bar-diverging-likert · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17), centered, 12pt. X-axis label "Percentage of Respondents" in dark ink, 10pt. Y-axis question labels in dark ink (#1A1A17), 9pt, clearly readable. X-axis tick labels in INK_SOFT, 8pt. Legend at bottom with elevated (#FFFDF6) background box and thin INK_SOFT border.
      Data: Diverging stacked bars from matte red (#AE3030, Strongly Disagree) through brownish-gray (Disagree, interpolated), medium gray (#6B6A63, Neutral), slate blue-gray (Agree, interpolated), to solid blue (#4467A3, Strongly Agree). White (#FAF8F1) percentage labels inside segments ≥8%. 10 questions sorted from most positive (Health insurance, top) to least positive (Annual bonus, bottom). Center vertical line in INK_SOFT.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title and all axis labels flip to light text (#F0EFE8 / #B8B7B0) — fully readable against dark background. No dark-on-dark failures. Legend box switches to #242420 fill. Grid lines and center line adapt correctly.
      Data: Strongly Disagree (#AE3030) and Strongly Agree (#4467A3) are identical to light render (endpoints held). However, the 3 middle colors shift: Neutral changes from #6B6A63 (dark gray, light theme) to #A8A79F (light gray, dark theme) because INK_MUTED is theme-adaptive and was used as colorRampPalette midpoint. Disagree and Agree intermediate colors also shift accordingly. White (#FAF8F1) bar labels on lighter neutral segments (#A8A79F) have reduced but still legible contrast.
      Legibility verdict: PASS (with note) — all text readable; bar labels on neutral segments have marginally reduced contrast in dark mode but remain legible
