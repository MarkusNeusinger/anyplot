  image_description: 'The plot displays a horizontal diverging stacked bar chart showing
    employee engagement survey results for 10 questions. Bars diverge from a central
    vertical baseline at zero, with negative responses (Strongly Disagree in dark
    red #C44E52, Disagree in salmon #E8927C) extending left and positive responses
    (Agree in light blue #6BAED6, Strongly Agree in dark blue #306998) extending right.
    Neutral responses (gray #B0B0B0) are split evenly across the center. Questions
    are sorted from highest net agreement at top ("I understand company goals") to
    lowest at bottom ("Meetings are productive"). Percentage labels appear inside
    bar segments with values of 10% or greater. The title reads "bar-diverging-likert
    · bokeh · pyplots.ai". A horizontal legend at the bottom shows all five categories.
    The x-axis is labeled with directional indicators and numeric ticks from -60 to
    80. Grid lines are subtle dashed vertical lines. All spines, axis lines, and tick
    marks are removed for a clean appearance.'
