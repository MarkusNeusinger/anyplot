  strengths:
  - Perfect spec compliance — all diverging chart features implemented correctly with
    centered neutral, proper sorting, and conditional data labels
  - Excellent diverging color palette with thoughtful red-to-blue scheme and muted
    gray neutral
  - 'Smart use of Highcharts features: linkedTo for clean legend, plotLines for center
    axis, conditional per-point data labels'
  - Realistic employee engagement survey data showing excellent variety across 8 questions
  - Clean, well-structured code with elegant neutral-split approach
  weaknesses:
  - Y-axis tick labels show raw stacked numbers without percent units — confusing
    for a percentage chart
  - Neutral percentages are completely hidden — could show at least on wider neutral
    segments
  - Some unused canvas space on the right side (axis extends to 90 but max bar reaches
    ~77)
  image_description: The plot shows a horizontal diverging stacked bar chart titled
    "bar-diverging-likert · highcharts · pyplots.ai" with subtitle "Employee Engagement
    Survey Results". Eight survey questions are listed along the left y-axis, sorted
    from lowest net agreement at top ("Adequate resources") to highest at bottom ("Meaningful
    work"). Bars diverge from a central vertical line at 0. Left-side bars use dark
    red (#C0392B) for Strongly Disagree and lighter pink-red (#E57373) for Disagree.
    Right-side bars use light blue (#64B5F6) for Agree and dark blue (#306998) for
    Strongly Agree. Neutral responses are shown in muted gray (#B0BEC5), split evenly
    across the center. Percentage data labels are displayed inside each segment where
    space permits (hidden for values < 8%). The bottom axis shows numeric values from
    -60 to 90 with the label "← Disagree | Agree →". A legend at the bottom identifies
    all five categories in correct order. The color scheme creates a clean red-to-blue
    diverging palette with a muted neutral center.
