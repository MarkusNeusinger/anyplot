    elements
  - All survey questions skew positive — no question with net negative agreement reducing
    diverging contrast
  - Title is slightly tight on the right canvas edge
  image_description: The plot shows a horizontal diverging stacked bar chart titled
    "Employee Engagement Survey · bar-diverging-likert · seaborn · pyplots.ai". Eight
    employee engagement survey questions are listed on the y-axis, sorted from highest
    net agreement (Team collaboration at top) to lowest (Compensation & benefits at
    bottom). Bars diverge from a central zero line, with negative responses (Strongly
    Disagree in dark red, Disagree in light pink) extending left and positive responses
    (Agree in light blue, Strongly Agree in dark blue) extending right. Neutral responses
    (gray) are split evenly across the center. Percentage labels appear inside bar
    segments where width is 10% or more. The x-axis shows "Percentage" with absolute
    values (0% to 80%) and a thin vertical center line at 0%. Top and right spines
    are removed, subtle x-axis gridlines at low alpha are visible, and a 5-item legend
    sits below the chart. White edge lines separate bar segments. The title is tight
    on the right edge of the canvas.
