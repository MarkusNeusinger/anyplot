review:
  strengths:
  - Perfect spec compliance with all 5 Likert requirements implemented correctly
  - Excellent data storytelling through net-agreement sorting
  - Professional visual polish with custom diverging palette, white edge separation,
    and clean typography
  - Smart percentage label logic showing only where segment width >= 10%
  - Clean maintainable code with appropriate complexity
  weaknesses:
  - Core plotting relies entirely on matplotlib ax.barh() with no seaborn plotting
    functions used
  - Neutral gray and Agree teal could be confusable for some colorblind viewers
  - No additional emphasis techniques to highlight key findings
  image_description: The plot displays a horizontal diverging stacked bar chart for
    an Employee Engagement Survey with 8 questions. Bars diverge from a central vertical
    black line at 0%. The left side extends with Strongly Disagree segments in saturated
    red and Disagree segments in pink; the right side shows Agree in light teal and
    Strongly Agree in darker teal. Neutral responses (gray) are split evenly across
    the center point. Questions are sorted by net agreement from Team collaboration
    (most positive, top) to Compensation & benefits (most negative, bottom). Percentage
    labels appear inside bar segments where values are >= 10%, with white text on
    dark backgrounds and dark text on light backgrounds. The x-axis shows absolute
    percentage values (0% to 80%) with a "Percentage" label. A horizontal legend at
    the bottom identifies all 5 Likert categories. Title reads "Employee Engagement
    Survey · bar-diverging-likert · seaborn · pyplots.ai". Top and right spines are
    removed; subtle x-axis grid lines provide reference. White edge lines separate
    adjacent bar segments cleanly.
