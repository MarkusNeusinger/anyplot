review:
  strengths:
  - Semantic diverging Imprint palette — red→ochre→muted→cyan→green maps perfectly
    to the negative→neutral→positive Likert polarity, with palette-doc justification
    in the code comments
  - Sorted by net agreement with +/- percentage annotations on the right margin, delivering
    immediate insight without needing to read every bar
  - 'Excellent visual refinement: axis lines removed, tick marks removed, x-only dashed
    12%-alpha grid, elevated legend box — minimal chrome that keeps focus on the data'
  - 'Fully theme-adaptive: all chrome tokens (PAGE_BG, INK, INK_SOFT, INK_MUTED, ELEVATED_BG)
    flow correctly in both light and dark renders with no dark-on-dark failures'
  - 'Rich Bokeh-native features: per-renderer HoverTool with descriptive tooltips,
    LabelSet for categorical-axis annotations, Span for the zero-line, Legend click_policy=''hide'',
    and interactive HTML alongside the static PNG'
  weaknesses:
  - 'Title is missing the language token — current: ''bar-diverging-likert · bokeh
    · anyplot.ai''; required format: ''bar-diverging-likert · python · bokeh · anyplot.ai''.
    Fix both the figure title= and the save() title= arguments.'
  - Y-axis tick labels set at 28pt instead of the recommended 34pt for bokeh 3200×1800
    canvas — question labels are readable at full resolution but will be marginally
    small when the image is scaled to 400px mobile width. Increase yaxis.major_label_text_font_size
    to '34pt'.
  - Implementation uses bokeh.io.export_png directly; the library guide explicitly
    forbids this (snap-shim conflict on dev boxes) and specifies the Selenium screenshot
    approach instead. Since images were generated successfully in CI this attempt
    is not penalised heavily, but future repairs should switch to the Selenium pattern
    from prompts/library/bokeh.md.
