review:
  strengths:
  - Correct diverging layout with neutral split evenly at midpoint — spec requirement
    met precisely
  - Semantic color mapping (positive→green, negative→red, neutral→muted) is contextually
    appropriate and follows Imprint polarity semantics
  - Both theme renders pass legibility checks with full theme-adaptive chrome
  - Questions sorted by net agreement with bold emphasis on extreme ends — strong
    storytelling
  - Hardcoded, reproducible data with realistic employee engagement context
  - Dynamic title fontsize calculation prevents overflow for the longer-than-67-char
    title
  - No bbox_inches='tight' — canvas dimensions preserved correctly
  weaknesses:
  - Segment percentage annotations at fontsize=7 are borderline small when image is
    scaled to mobile (~400px width); consider raising to fontsize=8 minimum
  - seaborn's distinctive API features are underutilized relative to what matplotlib
    provides — the overlay technique (6 sequential barplot calls) works but is not
    idiomatic; consider whether a helper that stacks via left= offset would read more
    naturally
  - 'Design polish stops at functional: no typography weight variation beyond bold
    on two labels, no subtle background banding per row, no annotation callout for
    the most/least-agreed items'
