review:
  strengths:
  - 'Complete spec compliance: diverging layout centered on neutral, sorted by net
    agreement, percentage labels in segments where space permits, horizontal orientation
    — every required feature present'
  - Excellent semantic color mapping using only Imprint palette hues (brand green
    for Strongly Agree, lime for Agree, muted anchor for Neutral, ochre for Disagree,
    matte red for Strongly Disagree) with a clear positive→green / negative→red storytelling
    convention
  - Both light (#FAF8F1) and dark (#1A1A17) themes render correctly — theme tokens
    propagate through all chrome elements with no dark-on-dark or light-on-light failures
  - Net agreement callout badges with color-coded text (green for strong positive,
    red for negative) add quantified storytelling value at a glance
  - Correct canvas (3200×1800, no bbox_inches='tight'), deterministic data, clean
    imports, KISS structure — code quality is exemplary
  weaknesses:
  - Net agreement badge fontsize is 7pt — at the lower readable limit; on mobile (400
    px scaled width) these callouts risk becoming unreadable; increase to 8pt minimum
  - 'Library Mastery ceiling: the diverging layout, row banding (axhspan), center-line
    (axvline), and all annotations are matplotlib primitives rather than seaborn-specific
    features — the seaborn contribution is primarily the theme system and barplot
    API'
  - 'Minor: the ''Agree'' bars (lime #99B314) display text labels in INK color; in
    dark mode INK becomes #F0EFE8 (near-white on lime), which is fine, but in light
    mode it is dark text on lime (#99B314) — contrast is adequate but borderline for
    very small 8pt labels'
