review:
  strengths:
  - Neutral split perfectly bisects the midpoint — technically correct implementation
    of the diverging Likert layout.
  - Sorting by net agreement produces excellent at-a-glance comparison across questions.
  - 'Thoughtful label contrast management: white labels on dark endpoints (Strongly
    Disagree/Strongly Agree), INK labels on lighter segments (Disagree/Neutral/Agree).'
  - 'Full dual-theme adaptation: background, INK, INK_SOFT, ELEVATED_BG correctly
    applied to every chrome element.'
  - HTML output enables real tooltip interactivity with all 5 metadata fields.
  - Canvas PAD-only logic with explicit oversize guard — correct altair.md pattern.
  weaknesses:
  - Y-axis question labels (10px) and in-bar segment labels could be slightly larger
    given the 3200x1800 canvas; currently acceptable but toward the minimum readable
    end.
  - The x-axis extends to 100 even though no bar reaches beyond ~88% on the positive
    side — minor whitespace waste on the right margin.
  - No additional storytelling emphasis (e.g., annotating the highest/lowest net-agreement
    items, or a subtle highlight on the most positive/negative question) — missed
    opportunity to elevate DE-03.
