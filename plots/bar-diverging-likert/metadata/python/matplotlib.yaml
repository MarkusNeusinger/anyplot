      Data: Colors are identical to the light render — same red/gray/blue diverging scheme. Bar segment percentage labels: white (non-neutral) and #F0EFE8 INK (neutral on #888880 gray) — both readable. Net column values use same #4467A3/AE3030 as light render, identical data colors.
