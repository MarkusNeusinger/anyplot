review:
  strengths:
  - Diverging stacked bar chart correctly centered on neutral split with all 5 Likert
    categories rendered
  - Sorted by net agreement (ascending) so highest-agreement items appear at chart
    top — excellent design decision
  - Net agreement column on the right with themed +/- coloring adds analytical value
  - Percentage labels inside bar segments (≥7% threshold) provide quantitative precision
    without clutter
  - All spines removed, Y-tick marks hidden, subtle x-axis grid — clean visual refinement
  - 'Theme-adaptive chrome throughout: INK/INK_SOFT/INK_MUTED tokens applied to all
    text and chrome elements'
  - 'Semantic color mapping (red=disagree, blue=agree) using Imprint palette endpoints
    #AE3030 and #4467A3 is clearly intuitive'
  - Mixed coordinate system annotations (xycoords axes fraction + data) for the net
    column is idiomatic advanced matplotlib
  weaknesses:
  - 'VQ-07 partial: The neutral midpoint color #888880 is a custom hex not from the
    Imprint palette. The correct imprint_div definition uses theme-adaptive PAGE_BG
    as midpoint. For a Likert bar chart the neutral category should use the Imprint
    muted anchor (#6B6A63 light / #A8A79F dark) rather than a custom gray — this keeps
    all segment colors traceable to Imprint tokens while still appearing as a midpoint
    neutral.'
  - 'LM-01/LM-02: The mixed-coordinate annotation technique and custom FuncFormatter
    are above defaults but stop short of exploiting the full power of the matplotlib
    Axes API (e.g., no use of inset axes, no container-based bar label helpers available
    in 3.9+, no explicit font family set). A minor polish opportunity.'
