      Data: Red tones (#AE3030 and blended) for Strongly Disagree / Disagree; warm gray (#888880) for Neutral; blue tones (blended and #4467A3) for Agree / Strongly Agree. Percentage labels inside segments ≥7% width in white (non-neutral) or dark INK (neutral). Net agreement column on right in themed blue (+) or red (-). Data ordered from lowest to highest net agreement (Leadership −4 at bottom, Resources +72 at top).
