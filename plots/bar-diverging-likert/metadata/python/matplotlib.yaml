review:
  strengths:
  - 'Perfect spec compliance: diverging stacked bar chart correctly centered on neutral,
    sorted by net agreement, percentage labels inside segments'
  - Net agreement annotation column on the right adds immediate insight not required
    by the spec
  - All data rows sum to 100%; realistic employee engagement scenario with meaningful
    variation across items
  - Clean flat KISS code structure with all theme tokens correctly applied throughout
  - subplots_adjust used correctly instead of bbox_inches=tight; canvas dimensions
    are exact 3200x1800 px
  - ax.annotate with mixed coordinate system (axes fraction + data) is a sophisticated
    and idiomatic matplotlib technique
  weaknesses:
  - 'VQ-07: Intermediate Likert category colors (Disagree, Neutral, Agree) shift between
    light and dark themes because the diverging colormap uses INK_MUTED as its theme-adaptive
    midpoint. Fix: replace INK_MUTED midpoint with a fixed neutral hex (e.g. #888880)
    so div_cmap(0.25) and div_cmap(0.75) produce identical colors in both themes;
    also hardcode the Neutral category to a fixed gray rather than INK_MUTED.'
  - 'DE-01: Intermediate bar colors (Disagree, Agree) are muddy blends that lack visual
    crispness. After fixing the midpoint to a fixed neutral hex the blended colors
    will be more predictable and cleaner.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface.
      Chrome: Title "bar-diverging-likert · python · matplotlib · anyplot.ai" in dark INK at ~12pt — clearly readable. Y-axis question labels in INK_SOFT dark gray at 9pt — readable. X-axis signed-percentage ticks at 8pt — readable. X-axis label "Percentage of Responses" at 10pt — readable. Net annotation column on the right in blue/red — readable.
      Data: Strongly Disagree (#AE3030 matte red), Disagree (brownish-dark blend from imprint_div at 0.25 with dark-gray midpoint), Neutral (#6B6A63 dark gray = INK_MUTED in light), Agree (muted blue-gray blend at 0.75), Strongly Agree (#4467A3 blue). Percentage labels in white inside colored segments, dark INK inside Neutral segments. Center line in INK_SOFT. Grid subtle at alpha=0.15.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface.
      Chrome: Title and all labels flip to light colors (INK #F0EFE8, INK_SOFT #B8B7B0) — all readable. No dark-on-dark issues detected. Net column values in blue/red — readable against dark background.
      Data: Strongly Disagree and Strongly Agree endpoint colors are identical to light render (#AE3030 and #4467A3). However, intermediate colors shift: Disagree goes from brownish-dark to pinkish-rose (div_cmap midpoint changes from #6B6A63 to #A8A79F); Neutral shifts from #6B6A63 to #A8A79F (lighter warm gray); Agree lightens noticeably. These are visible category color changes between themes — a VQ-07 partial compliance issue.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures, but intermediate data category colors are not theme-stable.
