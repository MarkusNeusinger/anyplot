review:
  strengths:
  - Correct horizontal diverging stacked bar chart matching the spec exactly
  - Questions sorted by net agreement creating clear narrative hierarchy
  - Creative SVG post-processing for correct legend ordering (SD→D→N→A→SA)
  - Threshold-based value labels (≥8%) avoid cluttering narrow bar segments
  - Proper theme tokens applied throughout — warm off-white light / near-black dark
    backgrounds
  - All row percentages sum to 100%, realistic employee engagement context
  - Self-import prevention pattern for pygal.py filename conflict handled cleanly
  weaknesses:
  - 'Intermediate Disagree and Agree colors are interpolated using theme-adaptive
    INK_MUTED as one endpoint, making those two data colors subtly different between
    light and dark renders (violates the rule that Imprint data colors must be identical
    in both themes). Fix: pin INK_MUTED to its light value (#6B6A63) for the interpolation
    in both themes, then use the resulting fixed hex in CHART_COLORS regardless of
    theme.'
  - 'Disagree bars (muted brownish-pink) and Neutral bars (gray) are visually close
    in saturation, reducing distinguishability. Fix: consider shifting the Disagree
    interpolation endpoint to the full #AE3030 at t=0.35 (less blending) to create
    more visual separation from the neutral gray.'
  - 'legend_font_size=32 is below the recommended 44 for a 3200×1800 canvas — legend
    text is slightly small. Fix: set legend_font_size=44.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "Employee Engagement Survey · bar-diverging-likert · python · pygal · anyplot.ai" is clear dark text spanning ~80% of canvas width (expected for this long mandated title). Eight question labels on the left Y-axis are dark and fully readable. X-axis tick labels (60%…10%|10%…80%) and X-axis title "Response Percentage (%)" are dark and legible. Legend at bottom reads "Strongly Disagree | Disagree | Neutral | Agree | Strongly Agree" in dark text — readable, though slightly small (legend_font_size=32 below recommended 44).
      Data: Diverging horizontal stacked bars centered on the neutral split-point. Strongly Disagree = matte red (#AE3030), Disagree = desaturated brownish-pink (lerp red→gray), Neutral = muted warm gray (INK_MUTED #6B6A63), Agree = muted steel gray-blue (lerp gray→#4467A3), Strongly Agree = Imprint blue (#4467A3). Value labels shown inside bars where ≥8% — readable at white-on-colored. Questions sorted ascending by net agreement (most positive at top: "Team collaboration is effective", most negative at bottom: "I receive fair compensation").
      Legibility verdict: PASS — all chrome and data labels are readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, question labels, tick labels, X-axis title, and legend labels all render in off-white/light text. Fully legible against the dark background. No dark-on-dark failures observed. Legend color swatches remain visible.
      Data: Bar hue endpoints (Strongly Disagree #AE3030 and Strongly Agree #4467A3) are visually identical to the light render. However, the intermediate Disagree and Agree colors are slightly different because they are interpolated using the theme-adaptive INK_MUTED (#A8A79F in dark vs #6B6A63 in light) as one endpoint — this causes a subtle shift in the middle two data-color shades between themes. Neutral bars also shift (INK_MUTED itself is theme-adaptive). This is a minor palette-consistency violation.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark issues found.
