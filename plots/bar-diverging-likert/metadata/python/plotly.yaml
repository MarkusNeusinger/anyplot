review:
  strengths:
  - 'Full spec compliance: diverging stacked bars with neutral split, sorted by net
    agreement, horizontal orientation, and inside-segment percentage labels all correctly
    implemented'
  - 'Idiomatic Plotly usage: go.Bar with base+widths overlay pattern, customdata+hovertemplate
    for hover, add_annotation for net scores, HTML output alongside PNG'
  - 'Good data storytelling: sorted bars enable ranking at a glance, net score annotations
    call out best (+70) and worst (-10) items, subtitle states the key insight explicitly'
  - 'Complete theme-adaptive chrome: all INK/INK_SOFT/INK_MUTED/GRID tokens applied
    correctly to title, axis labels, tick labels, grid, legend, zero line'
  - 'Correct diverging palette: imprint_div anchors (#AE3030 → midpoint → #4467A3)
    with theme-adaptive intermediate colors; backgrounds exactly #FAF8F1 / #1A1A17'
  - 'Excellent code quality: flat linear structure, deterministic hardcoded data,
    clean imports, title fontsize scaled by length formula'
  weaknesses:
  - 'Dark mode Disagree bar color (#7A3535) has very low contrast (~2.2:1) against
    the #1A1A17 background — segments are barely distinguishable from the canvas and
    the legend swatch is nearly invisible; use a lighter dark-mode disagree color
    such as #A05555 or #B06060 for acceptable contrast'
  - 'DE-02 refinement opportunity: spines are still fully visible (showline not set
    to False); removing top and right spines (or all spines) would reduce visual clutter
    and align with the default-style-guide ''L-shaped frame'' preference'
  - 'LM-01: barmode=''overlay'' with manual position arithmetic is unconventional;
    the more idiomatic Plotly approach for diverging bars uses go.Bar with base= and
    explicit x=widths, which this already does — but the overlay mode can produce
    z-order artifacts on hover; no critical issue'
