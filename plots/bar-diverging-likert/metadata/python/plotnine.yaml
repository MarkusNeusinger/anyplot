      Data: Five-segment diverging bars. Strongly Disagree = dark matte red (#ae3030), Disagree = medium pinkish-brown (#8d4d4a), Neutral = muted dark gray (#6b6a63), Agree = medium slate blue (#586983), Strongly Agree = Imprint blue (#4467a3). Center reference vline at x=0. Percentage labels (≥10%) inside bars in white or near-black depending on segment brightness. "Compensation & benefits" at bottom with dominant red segments clearly shows negative net agreement.
      Legibility verdict: PASS — all text clearly readable against off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface, not pure black.
      Chrome: Title and all axis labels/ticks rendered in light ink (INK = #F0EFE8 / INK_SOFT = #B8B7B0) — visible against dark background. No dark-on-dark text failures observed. Legend box uses elevated dark fill (#242420) with light border.
