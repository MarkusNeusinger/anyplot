review:
  strengths:
  - 'Excellent spec compliance: diverging layout, center-neutral offset, sort by net
    agreement, and in-bar percentage labels all implemented correctly'
  - Sophisticated use of geom_rect with manually computed xmin/xmax for precise diverging
    bar positioning — demonstrates advanced plotnine grammar mastery
  - Full theme-adaptive styling with appropriate semantic colors (matte red for strongly
    disagree, blue for strongly agree, muted neutral) built from Imprint palette anchors
  - 'Clear data story: sorted questions make it immediately obvious which topics have
    the lowest/highest agreement; Compensation & benefits visually stands out as the
    only net-negative question'
  - Code is clean, flat-script, fully deterministic, and all imports are used
  weaknesses:
  - Some bar segment percentage labels (≥10% threshold) appear cramped in narrow segments
    near the center line, particularly Neutral labels whose label_x lands on x=0 where
    the reference vline runs — the overlapping vline and label hurt legibility slightly
  - The directional annotation ← Disagree    Agree → is very small at size=2.8mm (≈8pt),
    sitting at the minimal legibility threshold; increase to 3.5mm for better readability
    when the chart is scaled to mobile widths
  - Top question bars (Team collaboration, Workplace environment) extend close to
    the right edge of the plot area leaving minimal breathing room; a small explicit
    x-axis upper limit or added right margin would improve layout polish
