review:
  strengths:
  - Correct diverging stacked bar chart with precise neutral-centering math (SD +
    D + N/2 offset)
  - 'Custom piecewise-interpolated diverging palette anchored on Imprint colors (#AE3030
    → INK_MUTED → #4467A3) with theme-adaptive neutral midpoint'
  - 'Contrast-aware in-bar label text colors: white on dark fills, near-black on mid-brightness
    fills — correctly distinguishing both themes'
  - Questions sorted by net agreement with 'Compensation & benefits' at bottom providing
    natural narrative arc
  - Direction annotation '← Disagree    Agree →' in italic adds helpful reader orientation
    without visual clutter
  - 'Perfect spec compliance: horizontal orientation, divergence from center, percentage
    labels, sorted questions'
  - 'Fully idiomatic plotnine grammar-of-graphics: geom_rect for manual bar positioning,
    dual scale_fill_manual + scale_color_manual for fill+label color, guide_legend(nrow=1)
    for compact horizontal legend'
  - Clean code with wide-to-long melt, cumsum-based bar positioning, and no unnecessary
    abstractions
  weaknesses:
  - 'Design Excellence ceiling: DE-01 (6/8) and DE-03 (4/6) are good but leave room
    — the chart is polished and functional but not yet exceptional. The sorting and
    annotation are fine; adding a subtle callout or direct labelling of the net-agreement
    delta on each row would push storytelling further.'
  - Legend box frame (element_rect with color=INK_SOFT) is visible — style guide recommends
    considering removal of legend box frames to reduce chrome; a frameless legend
    or legend integrated into the annotation area would be cleaner.
  - 'LM-02 (2/5): Implementation is correct idiomatic plotnine but lacks features
    that are uniquely distinctive to plotnine versus ggplot2/R. Nothing here goes
    beyond what standard geom_rect + theme_minimal would produce in ggplot2.'
  - In-bar label for 'Neutral' is shifted right 60% (label_x = xmin + pct*0.60) to
    avoid vline overlap — could still visually collide when segments are narrow; centering
    at 50% with a small x-nudge of 1-2 units would be more robust.
  image_description: |-
