review:
  strengths:
  - Excellent spec compliance — all six specification requirements implemented correctly
  - Strong data storytelling with annotated gain margin (7.8 dB) and phase margin
    (33°) providing quantitative stability insight
  - Thoughtful semantic color coding (red=critical, purple=gain crossover, orange=phase
    crossover)
  - Idiomatic plotnine usage with unified legend through scale_*_manual mappings
  - Stability region shading and phase margin line add engineering context beyond
    spec requirements
  weaknesses:
  - Crowding near the origin where critical point, gain/phase crossover markers, and
    omega=3 label cluster together
  - Annotation text sizes (10-11pt) are slightly small relative to the axis text
  - Manual nudge values for frequency labels make the code fragile to data changes
  image_description: The plot displays a Nyquist diagram on the complex plane with
    the title "nyquist-basic · plotnine · pyplots.ai" in bold at the top. The x-axis
    is labeled "Real" and the y-axis "Imaginary", with tick values from -3 to 5 and
    -3 to 3 respectively. A solid dark blue curve represents the positive frequency
    response (ω > 0), tracing a large loop from the upper-right (near Real=5 at low
    frequency) down through the lower half-plane and curling back toward the origin.
    A dashed light blue curve shows the negative frequency (ω < 0) mirror. A dashed
    gray unit circle is centered at the origin. A prominent red "X" marks the critical
    point at (-1, 0) with a red label and leader line. A purple circle marks the gain
    crossover point with a dotted purple line from the origin, annotated "Gain crossover
    ω = 2.5 rad/s PM = 33°". An orange filled square marks the phase crossover point,
    annotated "Phase crossover ω = 4.1 rad/s GM = 7.8 dB". Five blue dots along the
    positive-frequency curve are labeled with frequency values (ω=0.1, 0.3, 0.7, 1.5,
    3). Dark arrows indicate the direction of increasing frequency on both curves.
    A subtle gray shaded region fills the unit circle. The background is white with
    a very light panel background and subtle major gridlines. A legend at the bottom
    distinguishes "Positive freq (ω > 0)" and "Negative freq (ω < 0)".
