    elements overlap
  - Annotation text sizes (10-11pt) are small relative to other text elements
  - Some wasted space on the right side of the canvas
  image_description: The plot displays a Nyquist diagram on the complex plane with
    "Real" on the x-axis and "Imaginary" on the y-axis. A solid dark blue curve traces
    the positive frequency response from approximately (5, -0.8) sweeping down to
    (1.5, -3.3) and back up through the origin area. A dashed light blue curve mirrors
    this for negative frequencies above the real axis. A red "X" marks the critical
    point at (-1, 0) with a bold red label and leader line. A gray dashed unit circle
    is centered at the origin with a subtle gray shaded stability region inside it.
    Five frequency annotations (omega=0.1, 0.3, 0.7, 1.5, 3) are placed along the
    curve with small blue dots. A purple circle marks the gain crossover point with
    annotation showing omega=2.5 rad/s and PM=33 degrees. An orange square marks the
    phase crossover with annotation showing omega=4.1 rad/s and GM=7.8 dB. Black direction
    arrows indicate increasing frequency along both curves. The legend at the bottom
    shows "Frequency Response" with both curve types. Title reads "nyquist-basic ·
    plotnine · pyplots.ai". Background is white with a very light blue-gray panel.
