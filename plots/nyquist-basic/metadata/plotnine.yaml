review:
  strengths:
  - Excellent data quality with a realistic 3rd-order control systems transfer function
    showing meaningful gain and phase margins
  - All specification features fully implemented including unit circle, critical point,
    frequency annotations, and direction arrows
  - Strong data storytelling with gain/phase crossover annotations that quantitatively
    convey system stability information
  - Clean, well-structured code with deterministic data generation
  weaknesses:
  - Crowding near the critical point (-1, 0) area where multiple annotations, markers,
    and curves converge
  - Annotation text for gain/phase crossover labels is somewhat small relative to
    the plot size
  - Red and green color pairing for critical point and gain crossover is not ideal
    for colorblind accessibility
  - Could leverage more plotnine-distinctive features
  image_description: 'The plot displays a Nyquist diagram on the complex plane with
    the title "nyquist-basic · plotnine · pyplots.ai" in bold at the top. The main
    Nyquist curve (solid dark blue, #306998) traces the positive-frequency response
    of a 3rd-order transfer function, starting near (5, 0) at low frequency and spiraling
    inward toward the origin. A lighter dashed blue curve shows the negative-frequency
    (conjugate) mirror in the upper half-plane. A dashed gray unit circle is centered
    at the origin. The critical point (-1, 0) is marked with a bold red "X" and labeled
    in red. A green circle marks the gain crossover point with an annotation ("ω=2.5
    rad/s, PM=33°") connected by a leader line. An orange square marks the phase crossover
    point with annotation ("ω=4.1 rad/s, GM=7.8 dB") and leader line. Five frequency
    labels (ω=0.1, 0.3, 0.7, 1.5, 3.0) appear along the curve with small blue dots.
    Dark arrows indicate the direction of increasing frequency on both curves. Axes
    are labeled "Real" and "Imaginary" with tick marks at integer values. The aspect
    ratio is 1:1 and the background is white with a very subtle gray grid.'
