review:
  strengths:
  - 'Perfect spec compliance: all required Nyquist plot features implemented (critical
    point marker, unit circle, frequency annotations, direction arrows, 1:1 aspect
    ratio, real/imaginary axis labels)'
  - 'Excellent data quality: realistic minimum-phase transfer function G(s) = 5/[(s+1)(0.5s+1)(0.2s+1)]
    with meaningful gain and phase margin annotations'
  - 'Full theme-adaptive chrome: all text, grid, background, legend, and annotation
    colors correctly branch on ANYPLOT_THEME for both light (#FAF8F1) and dark (#1A1A17)
    surfaces'
  - 'Idiomatic plotnine: multi-aesthetic manual scales (color, linetype, size, alpha)
    all unified under a single ''Frequency Response'' legend name via guide_legend
    override'
  - 'Semantic color usage: matte red (#AE3030) for the critical danger point (-1,0),
    Imprint green (#009E73) for positive frequency as first series, lavender (#C475FD)
    for conjugate as second'
  - Direction arrows implemented via geom_segment with arrow() — idiomatic ggplot2
    pattern, not a matplotlib workaround
  - Quantitative annotations for both crossovers (PM=33°, GM=7.8 dB) add meaningful
    engineering storytelling
  weaknesses:
  - Annotation text for frequency labels (size=3.0 mm ≈ 8.5 pt) is on the small side
    — at mobile scale (~400 px wide) the ω=0.1/0.3/0.7 labels in the bottom-right
    will be illegible; increase to size=3.5 or 4.0 mm
  - 'Center region around (-1, 0) to (0, 0) is dense: critical point X, gain-crossover
    circle, phase-crossover square, and both Nyquist curves converge there; adding
    a small spatial offset to one of the overlapping markers (or using leader lines)
    would reduce the visual clutter'
  - 'DE-02 Visual Refinement: panel_border shows all four spines (correct for 1:1
    plot with unit circle), but the subplot interior lacks any spine-removal styling
    — top and right panel border edges could be hidden or reduced in weight for a
    cleaner look without breaking the coord_fixed reference frame'
  - Phase margin segment (dotted blue line from origin to gain crossover) is subtle
    (alpha=0.6, size=0.6) and may not be obvious to viewers unfamiliar with its purpose
    — a short annotation label would clarify its meaning
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface, no pure white.
      Chrome: Title "nyquist-basic · python · plotnine · anyplot.ai" in bold dark ink, centered, occupies ~70% of width. Axis labels "Real Axis [dimensionless]" (bottom) and "Imaginary Axis [dimensionless]" (left) in dark ink at 10pt. Tick labels (-3 to 5 x-axis, -3 to 3 y-axis) in INK_SOFT grey at 8pt. Grid lines are very subtle (alpha ≈ 0.15) in both axes. Panel border visible on all four sides — appropriate for a 1:1 aspect ratio complex-plane plot. Legend at bottom with elevated-background box showing "Frequency Response" with both curve line samples.
      Data: Positive-frequency Nyquist curve rendered in solid green (#009E73, IMPRINT[0]) — correct first-series color. Negative-frequency (conjugate) curve in lavender (#C475FD, IMPRINT[1]) dashed. Unit circle in dashed INK_SOFT grey. Stability region inside unit circle as very subtle blue fill (IMPRINT[2] at alpha=0.07). Critical point (-1,0) marked with bold red X (#AE3030, IMPRINT[4]) — semantically appropriate. Gain-crossover marker is blue filled circle (IMPRINT[2]). Phase-crossover marker is ochre filled square (IMPRINT[3]). Direction arrows along both curves in INK_SOFT grey. Five frequency annotations (ω=0.1 through ω=3) in INK_MUTED, small but readable at full resolution. Gain crossover annotation (lower-left) and phase crossover annotation (upper-left) in their respective semantic colors with leader segments.
      Legibility verdict: PASS — all chrome text is clearly dark on warm off-white. Frequency annotation labels (size=3.0mm) are on the small side but readable at 2400px; mobile scale would be borderline.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels flip to light INK (#F0EFE8 / #B8B7B0) — all clearly readable against the dark surface. Grid lines remain subtle. Panel border adapts to lighter INK_SOFT stroke. Legend box uses elevated dark background (#242420) with light text. Unit circle changes from dark-grey dashed to white-grey dashed.
      Data: All Imprint data colors are identical to the light render — green (#009E73) positive curve, lavender (#C475FD) negative curve, red X (#AE3030) critical point, blue circle gain crossover, ochre square phase crossover. Brand green is clearly visible against the dark surface. Frequency annotation labels render in the dark-theme INK_MUTED (#A8A79F) — readable.
      No dark-on-dark failures detected: tick labels, axis titles, and annotation text all render in sufficient contrast against the near-black background.
      Legibility verdict: PASS — both themes read correctly. Chrome flips as expected; data colors are identical across themes.
