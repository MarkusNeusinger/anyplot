review:
  strengths:
  - Correct Nyquist plot type using pygal.XY — real vs imaginary part of open-loop
    frequency response
  - Transfer function G(s)=2/[s(s+1)(s+2)] is a realistic control-engineering example,
    well-suited for pedagogy
  - Critical point (-1,0) prominently marked with semantic red (#AE3030) large dot
    — strong visual cue for stability assessment
  - Unit circle drawn as dashed reference element using muted anchor color — appropriate
    semantic choice
  - Frequency annotation markers at 0.1, 0.5, 1.0, 2.0, 5.0, 10.0 rad/s along positive-frequency
    curve
  - Both positive (solid) and negative (dashed) frequency curves plotted with distinct
    line styles
  - 'Perfect code quality: KISS structure, deterministic data, clean imports, correct
    output filenames'
  - Both PNG and HTML output files saved — leverages pygal's interactive SVG strength
  - Font sizes explicitly set via Style object, all text readable in both themes
  - Title scaled correctly for length using the linear formula
  weaknesses:
  - Missing direction arrows on the Nyquist curve — spec explicitly requires arrows
    showing direction of increasing frequency. Add arrowhead markers (small triangular
    dots at intermediate points) to convey traversal direction from ω=0 to ω=∞.
  - 'Imprint palette not in canonical order for second series: uses #4467A3 (pos 3)
    for the negative-frequency mirror, skipping #C475FD (pos 2 lavender). The negative-frequency
    curve is not semantically ''blue'' — use canonical order or provide a clear semantic
    justification.'
  - 'Design Excellence DE-02 is minimal: pygal default grid styling with no refinement.
    Grid line opacity and style cannot be easily customised in pygal, but consider
    reducing guide density or explicitly controlling foreground_subtle for subtler
    grid.'
  - Direction of curve traversal (ω increasing) is unclear without arrows — this is
    the primary storytelling element in a Nyquist diagram (is the critical point encircled?).
    Adding small directional markers at a few key points would significantly improve
    DE-03 and SC-02.
  - 'The negative-frequency mirror curve is visually subtle — especially in dark theme,
    the dashed dark-blue line can be hard to distinguish from the unit circle. Increase
    stroke width or use a more contrasting color (e.g., keep #4467A3 but widen dash
    gaps).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "nyquist-basic · python · pygal · anyplot.ai" is dark text, centered at top, spans ~65% of canvas width — readable. X-axis label "Real" and Y-axis label "Imaginary" both dark and clearly legible. Tick labels (-2.4, -2, …, 2.4 on both axes) in dark ink, readable. Grid lines are a subtle warm-gray, appropriately quiet.
      Data: Green (#009E73) solid line for G(jω) ω≥0 — prominent, enters from upper-left, curves through center, spirals near origin at high ω. Dashed dark-blue (#4467A3) line for negative-frequency mirror — visible but subtler. Large red circle at (-1, 0) for Critical Point — visually dominant, correct semantic coloring. Dashed muted gray unit circle centered at origin, roughly circular. Six ochre (#BD8233) dot markers for frequency annotation points.
      Legibility verdict: PASS — all text clearly readable against warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, tick labels all appear in light cream (#F0EFE8 range), clearly visible against dark background. Grid lines are subtle off-white rule, quiet. Legend text at bottom is light-colored and readable.
      Data: Green curve (#009E73) identical to light render — prominent on dark background. Dashed blue negative-frequency curve appears darker against the near-black background and less distinguishable from the muted unit circle (both are dashed dark-ish lines). Critical point red dot remains clearly visible. Frequency annotation ochre dots visible. Data colors are identical to light render — only chrome (background, text, grid) has flipped.
      Legibility verdict: PASS — no dark-on-dark failures. All text is light-colored against dark background. Minor concern: the negative-frequency dashed blue line and the unit circle dashed gray line are less visually distinct from each other in the dark theme.
