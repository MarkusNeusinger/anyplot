review:
  strengths:
  - Correct Nyquist XY chart with positive and negative frequency curves using brand
    green and lavender from the Imprint palette
  - Critical point at (-1,0) semantically colored in matte red — the right palette
    member for a stability boundary
  - Unit circle drawn with dashed muted line, correctly framing it as a reference
    element not data
  - Frequency markers at key control-engineering values (0.5, 1, 2, 5, 10 rad/s) give
    useful context
  - Square 2400x2400 canvas enforces 1:1 aspect ratio so unit circle appears circular
    — spec-required
  - All font sizes explicitly set in Style object; readable in both light and dark
    renders
  - Interactive HTML export alongside PNG — leverages pygals key interactive capability
  - Theme-adaptive chrome correctly applied; dark render has white text on near-black
    background with no dark-on-dark failures
  - 'Data is mathematically accurate: G(s)=2/(s(s+1)(s+2)) is a textbook control systems
    third-order plant'
  - Clean KISS code structure with deterministic math-generated data
  weaknesses:
  - Direction arrows on the Nyquist curve are missing — the spec explicitly requires
    arrows showing direction of increasing frequency, a key feature for interpreting
    Nyquist plots
  - The positive-frequency curve exits the bottom of the plot area (around y=-2) and
    the negative-frequency curve exits the top, indicating the axis range [-2,2] clips
    significant portions of both curves; at minimum the curve entry/exit from the
    axis boundary should be more graceful
  - 'DE-02 refinement is moderate: grid lines are default pygal dotted style with
    no additional tuning; spines cannot be removed in pygal but the default framed
    look could be improved with more generous internal margins'
  - No frequency labels or annotations rendered on the plot canvas itself — the ω
    values only appear as interactive tooltips in the HTML; the PNG shows unlabeled
    ochre dots that viewers cannot interpret without the HTML
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme-adaptive surface, not pure white.
      Chrome: Title "nyquist-basic · python · pygal · anyplot.ai" fully visible at top, dark ink against cream background. Y-axis label "Imaginary" and X-axis label "Real" clearly readable. Tick labels (-2.000 to 2.000 on both axes) legible in dark ink. Grid lines are subtle dotted lines — visible but not dominant.
      Data: Primary Nyquist curve in brand green #009E73 (positive frequency, solid stroke) enters plot from upper-left area and exits at the bottom around y=-2. Negative frequency mirror in lavender #C475FD (dashed) enters from the top-left. Critical point at (-1, 0) rendered as a large filled red dot in matte red #AE3030 — clearly distinct. Unit circle drawn as a dashed muted gray line — visible reference element. Five ochre (#BD8233) dots mark ω = 0.5, 1.0, 2.0, 5.0, 10.0 rad/s along the curve.
      Legibility verdict: PASS — all text readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme-adaptive dark surface, not pure black.
      Chrome: Title fully visible in light text against dark background. Axis labels "Real" and "Imaginary" in light ink, readable. Tick labels clearly visible in white/near-white text — no dark-on-dark failures observed. Grid lines visible as subtle dotted lines on dark surface.
      Data: Data colors are identical to the light render — green #009E73 for positive frequency curve, lavender #C475FD for negative frequency mirror, matte red #AE3030 for critical point, muted gray for unit circle, ochre #BD8233 for frequency markers. Only the chrome (background, text, grid tone) has flipped as expected.
      Legibility verdict: PASS — all text readable against the dark background. Chrome correctly flips between themes.
