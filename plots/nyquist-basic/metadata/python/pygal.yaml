review:
  strengths:
  - Critical point (−1, 0) prominently marked with semantic red (#AE3030) — creates
    immediate visual focus on the stability-critical element
  - G(s) = 2/[s(s+1)(s+2)] is a textbook-quality transfer function with realistic
    control engineering context
  - 'All six spec requirements implemented: critical point, unit circle, frequency
    annotations, direction indicators, 1:1 square canvas, correct axis labels'
  - Per-point tooltip labels on every data point leverage pygal native SVG interactivity
    in the HTML output
  - 'Full Code Quality score: deterministic data, clean imports, KISS structure, all
    font sizes explicitly set'
  weaknesses:
  - Direction arrows implemented as 3-dot V-chevron clusters are subtle; in the static
    PNG they are hard to read as directional indicators — larger arrow_scale/arrow_wing
    or a simpler approach would better satisfy the spec requirement
  - Marker crowding near the (−1, 0) to (0.2, 0) corridor where critical point, frequency
    annotation dots, direction arrow clusters, and the curve all overlap — reduce
    dots_size for frequency markers (14→10) and direction arrows (12→8)
  - 'Design refinement limited by pygal API: no spine removal, limited grid alpha
    control'
