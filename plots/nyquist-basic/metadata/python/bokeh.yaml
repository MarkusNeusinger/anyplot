    INK_MUTED, ELEVATED_BG all flip correctly between #FAF8F1 / #1A1A17 surfaces —
    no dark-on-dark or light-on-light failures'
  - 'Idiomatic Bokeh: ColumnDataSource, HoverTool with 4-field tooltip (ω, G(jω) complex,
    |G|, phase), Range1d for forced equal-extent axes, Span for reference axes, Label
    for annotations, and Selenium+PIL crop pipeline for exact 2400×2400 canvas gate
    compliance'
  - 'Analytically computed, domain-accurate data: third-order stable transfer function
    G(s)=50/((s+1)(s+2)(s+5)) with correct pole product, numerically detected gain/phase
    crossover indices, correct complex conjugate mirror arc'
  weaknesses:
