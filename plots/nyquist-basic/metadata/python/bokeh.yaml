    renders the text is technically readable but very tight; adding 0.3–0.5 unit offsets
    to the label x/y coordinates would prevent collision risk and improve VQ-02.'
  - 'Design Excellence held back by limited visual refinement: Bokeh keeps default
    tick marks and all four axis spines visible (no explicit top/right spine removal).
    Adding ''p.xaxis.major_tick_out = 0; p.yaxis.major_tick_out = 0'' and hiding minor
    ticks (already done) would improve DE-02. Top and right axis lines could be set
    to None or INK_SOFT alpha=0 to achieve the L-shaped frame called for by the style
    guide.'
  - 'DQ-01 minor gap: the spec requests annotating ''selected frequency values along
    the curve at key points''. Currently only the gain and phase crossover frequencies
    are annotated; a few additional ω labels at other notable points on the outer
    locus (e.g. ω=0.1, ω=1, ω=10 rad/s) would fully satisfy the spec''s ''selected
    frequency values'' requirement.'
