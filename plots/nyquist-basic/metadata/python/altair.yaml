review:
  strengths:
  - 'Complete spec compliance: all required features implemented (critical point with
    ring+cross, unit circle, direction arrows, frequency annotations at key ω, 1:1
    aspect ratio)'
  - Interactive Altair legend filtering via alt.selection_point lets viewers toggle
    positive/negative frequency branches by clicking the legend
  - Realistic third-order transfer function G(s)=5/((s+1)(0.5s+1)(0.1s+1)) with correctly
    computed positive and negative frequency branches
  - 'Correct Imprint palette: first series #009E73 (positive branch) and second #C475FD
    (negative branch); semantic red #AE3030 for critical point, ochre #BD8233 for
    phase crossover'
  - 'Theme-adaptive chrome fully applied in both renders: background, axis colors,
    legend fill all correctly flip between light/dark; data colors identical across
    both themes'
  weaknesses:
  - 'Label crowding in critical region: critical point cross at (-1,0), phase crossover
    diamond at (~-0.45,0), ''Critical Point (−1,0)'' label, and ''ω ≈ 5.6 (phase ×)''
    label are all tightly clustered in a small area, creating a visually busy center
    where labels nearly overlap — separate them with larger dx/dy offsets or position
    the phase crossover label to the left rather than right'
  - Unit circle reference is very faint (strokeDash=[5,4] + opacity=0.3) and barely
    visible in both renders, especially on dark background — increase opacity to 0.5
    and consider a slightly thicker stroke (~1.5px) so it reads as a visible reference
    circle
  - The ω=2.0 regular annotation marker and the ω≈2.0 (|G|=1) gain crossover marker
    are plotted at nearly identical positions on the curve, creating two overlapping
    dot markers at the same point which adds visual noise without clarity — remove
    the ω=2.0 regular annotation and keep only the more informative gain crossover
    annotation
  - 'Critical point label text color #AE3030 on dark background (#1A1A17) has contrast
    ratio ~2.8:1, just below the 3:1 threshold — either use CRITICAL_COLOR only for
    the marker and render the text label in INK/INK_SOFT token, or boost the label
    to the lighter semantic-red variant'
