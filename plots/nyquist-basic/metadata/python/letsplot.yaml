    interactive tooltips)
  - 'Semantic Imprint palette application: green for main data curve, matte red for
    critical/danger point, blue for phase margin — all semantically justified and
    correctly drawn from palette positions'
  - 'Distinctive letsplot features used well: layer_tooltips() API with format chains,
