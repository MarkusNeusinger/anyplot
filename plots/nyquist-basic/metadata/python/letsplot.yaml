    in dark mode to INK_SOFT (#B8B7B0) or use a lighter-themed approach for the label
    color parameter'
  - Top plot margin creates disproportionately large whitespace (~12% of canvas height)
    above the title on the square canvas; reduce plot_margin top value from 20 to
    10 to better balance the composition
  - Subtitle font size 9pt is small (36 source-px at scale=4); increase plot_subtitle
    size from 9 to 10pt for better mobile readability
