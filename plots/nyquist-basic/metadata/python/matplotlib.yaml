  - 'Perfect spec compliance — all required features implemented: critical point (-1,0)
    with red X marker, unit circle, directional arrows, frequency annotations at ω=0.3/1/2/5/10,
    and 1:1 equal aspect ratio'
  - Excellent data quality — third-order cascaded system G(s)=2/((s+1)(0.5s+1)(0.2s+1))
