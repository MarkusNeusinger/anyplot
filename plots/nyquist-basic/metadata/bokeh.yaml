  image_description: The plot shows a Nyquist diagram on the complex plane with a
    blue solid curve representing positive frequencies (ω > 0) and an orange dashed
    curve for negative frequencies (ω < 0). The title reads "nyquist-basic · bokeh
    · pyplots.ai" in the top-left. Axes are labeled "Real" (x-axis) and "Imaginary"
    (y-axis). A gray dashed unit circle is centered at the origin. A red X marker
    denotes the critical point at (-1, 0). The blue curve sweeps from the right side
    of the real axis (near ω→0 at ~5+0j) downward through the lower half-plane, crossing
    back near the origin. Triangle-shaped direction arrows appear on both curves indicating
    increasing frequency. Key annotations include "ω=2.54 rad/s" (gain crossover,
    blue circle marker) and "Phase crossover ω=4.08" (red diamond marker near the
    negative real axis). Labels "ω→0" and "ω→∞" mark the curve endpoints. The legend
    in the top-right distinguishes ω > 0, ω < 0, and the critical point. Background
    is light gray (#FAFAFA) with a very subtle grid.
