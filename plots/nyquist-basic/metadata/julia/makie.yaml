    noticeable empty space in upper and right regions within the square canvas; tightening
    ylims to (−3.5, 1.5) would improve canvas utilisation
  - Annotation font sizes (11pt → 22px effective) are at the low end for a 2400×2400
    canvas; bumping to 12–13pt would improve mobile readability
