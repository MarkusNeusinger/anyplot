review:
  strengths:
  - 'Perfect spec compliance: all six required features (critical point marker, unit
    circle, frequency annotations, direction arrows, 1:1 aspect ratio, Real/Imaginary
    axis labels) correctly implemented'
  - Elegant 1:1 square inner plot centered in the landscape canvas preserves the unit
    circle geometry as required
  - 'Correct use of Imprint palette: brand green #009E73 for the primary ω>0 curve;
    semantic red #AE3030 for the critical point marker (slot 5 is the correct semantic
    anchor for error/critical markers)'
  - 'Thoughtful visual hierarchy: solid line for ω>0, dashed semi-transparent line
    for ω<0 mirror clearly differentiates the two halves of the Nyquist contour'
  - 'SVG defs used idiomatically: clip-path ensures data stays within the square plot
    area, marker-end arrowheads show frequency direction without additional DOM overhead'
  - Deterministic, in-memory data generation using the exact third-order transfer
    function G(s)=48/((s+1)(s+2)(s+3)) — no fetch, no randomness, fully reproducible
  - 'Theme-adaptive chrome throughout: t.ink, t.inkSoft, t.pageBg tokens applied correctly
    to all non-data elements; both renders pass the readability check'
  - Legend covers all plot elements with correctly matched symbol types (line swatch,
    dashed line, × marker, dot) and includes an italicised transfer function note
  weaknesses:
  - 'Text crowding near the critical region: the ''(−1, 0)'' label (anchored at cpx+18,
    cpy-14) and ''ω = 3.32 (phase crossover)'' label (anchored at xSc(-0.8)+12, ySc(0)+22)
    are spatially adjacent since -1 and -0.8 are only 0.2 data-units apart. Both texts
    land in the same visual cluster, reducing legibility of both annotations. Consider
    offsetting the phase-crossover label down by an additional 12–16px or to the left
    with anchor=''end''.'
  - Helper function gJw(omega) is defined at the top level, which conflicts with the
    KISS/no-functions CQ-01 criterion. The computation is simple enough to be inlined
    at the two call sites (omega → {re, im}) with a single expression, removing the
    function wrapper.
  - First arrow segment (index 40) lands very close to the starting-point dot at approximately
    (8, 0), creating a visually ambiguous 'open circle with arrow' appearance — the
    arrowhead overlaps the filled starter dot. Shift the first arrow index to ~70
    or place the starting-point dot in a separate layer drawn last so it renders on
    top of the arrowhead.
