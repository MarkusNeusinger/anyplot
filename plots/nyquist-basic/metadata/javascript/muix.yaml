review:
  strengths:
  - 'Complete spec compliance: all required features implemented — critical point
    marker, unit circle reference, direction arrows, key frequency annotations, 1:1
    aspect ratio, and correct axis labels'
  - Realistic third-order transfer function G(jω)=1/(jω(1+jω)(1+0.5jω)) with physically
    meaningful frequency range and proper logarithmic spacing
  - SVG overlay with tangent-computed arrowheads showing direction of increasing frequency
    demonstrates library mastery beyond basic MUI X API
  - 'Perfect color usage: Nyquist curve in brand green (palette[0]), semantic red
    (#AE3030) for critical point, theme-adaptive unit circle in inkSoft, lavender
    (palette[1]) for key frequency markers'
  - Both renders theme-correct with warm-cream/warm-near-black backgrounds, and all
    chrome (title, labels, annotations) theme-adaptive via t.ink
  - 'Perfect code quality: deterministic data, clean imports, no functions/classes
    wrapping, skipAnimation set, square orientation directive correct'
  weaknesses:
  - ScatterChart with markerSize=3 renders the Nyquist locus as 600 discrete dots
    rather than a continuous line — the curve reads as a dotted/dashed path rather
    than a smooth trajectory; consider a LineChart if MUI X supports x-y line plotting,
    or increase markerSize slightly for better visual continuity
  - Frequency labels for ω=√2 rad/s and ω=5 rad/s are placed very close together near
    the origin (both at approximately y≈0, x≈-0.5 to 0.3) and slightly overlap in
    the rendered output — adjust label offsets to avoid collision (e.g. dy=-20 for
    ω=√2 vs dy=+15 for ω=5)
  - 'Design refinement is moderate: the chart relies on ThemeProvider defaults for
    spine/axis styling with minimal explicit visual polish beyond the grid opacity
    override — removing top/right axis spines explicitly or adjusting legend frame
    styling would improve DE-02'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — confirmed cream surface, not pure white.
      Chrome: Title "nyquist-basic · javascript · muix · anyplot.ai" at 22px clearly visible in dark ink. Axis labels "Real" (X) and "Imaginary" (Y) clearly visible. Tick labels on both axes readable at -2.0 to 1.4 range. Legend at top with four labeled series all readable.
      Data: Nyquist locus in brand green (#009E73) sweeps from lower-left (high magnitude at low ω) toward the origin (high ω). Three direction-of-increasing-frequency arrows visible on the curve. Unit circle drawn in inkSoft (gray ring visible). Three key frequency markers in lavender (#C475FD) at ω=0.75, ω=√2, ω=5. Critical point at (-1, 0) marked with prominent red (#AE3030) filled circle (size 10). Dashed red reference line at x=-1. SVG frequency annotation labels visible but ω=√2 and ω=5 labels appear very close/slightly overlapping near the real axis crossing.
      Legibility verdict: PASS — all chrome readable, minor label crowding near origin but text distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — confirmed dark surface, not pure black.
      Chrome: Title visible in light ink (#F0EFE8-range) against dark background. Axis labels and tick labels clearly readable in light text. Legend labels readable. SVG annotation text rendered in t.ink (light in dark mode) — all readable against dark background. No dark-on-dark failures observed.
      Data: Nyquist curve brand green (#009E73) — identical to light render. Unit circle now rendered in lighter inkSoft (#B8B7B0-range) against dark background, clearly visible as a white/light gray ring. Key frequency markers lavender (#C475FD) identical. Critical point red (#AE3030) clearly visible. Direction arrows green with arrowheads visible. Reference line dashed red visible.
      Legibility verdict: PASS — all text readable against dark background, data colors identical to light render, only chrome flipped.
