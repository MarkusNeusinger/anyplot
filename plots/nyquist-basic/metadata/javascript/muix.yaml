review:
  strengths:
  - 'Correct transfer function evaluation: G(jω) decomposed into real/imaginary parts
    accurately using G(s) = 1/(s(1+s)(1+0.5s))'
  - Critical point (−1, 0) prominently marked with large matte-red semantic marker
    (#AE3030) — correct semantic color choice
  - Square canvas with 1:1 aspect ratio ensures unit circle appears circular
  - Imprint palette applied correctly in both themes; all theme-adaptive chrome correct
  - 'Hierarchical marker sizing (2.5px / 7px / 10px) creates clear visual priority:
    curve → key frequencies → critical point'
  - 400 log-spaced points from 0.4–25 rad/s correctly captures the curve's key features
  weaknesses:
  - Missing text annotations for key frequency markers — spec requires labeling the
    curve at key points (e.g., "ω=0.75 rad/s", "ω=√2 rad/s", "ω=5 rad/s") with in-chart
    text, not just scatter markers
  - Missing direction-of-increasing-frequency arrows — spec requires arrows on the
    curve showing direction of increasing frequency
  - Scatter-dot rendering of the Nyquist curve creates visible point gaps in the steep
    downward (high-frequency) portion — the curve appears discontinuous in that region
  - gjw() helper function breaks the flat KISS pattern; the computation could be inlined
    into the Array.from callback
