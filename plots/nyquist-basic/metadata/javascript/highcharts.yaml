review:
  strengths:
  - 'Full spec compliance — all required features implemented: critical point (−1,
    0) with red × marker, unit circle, direction arrows on both positive and negative
    curves, frequency annotations at 0.3 / 1 / 2 / ω_pc rad/s, and correct 1:1 aspect
    ratio via square canvas'
  - Sophisticated SVG renderer usage — direction arrows drawn as filled triangles
    via Highcharts.renderer.path() in the render event callback, and the critical
    point × is a custom SVG path; this is non-trivial idiomatic Highcharts
  - Correct mathematics — G(s) = 30/((s+1)(s+2)(s+3)) correctly expanded in polar
    form with the phase crossover at ω = √11 ≈ 3.32 rad/s and G(j√11) = −0.5 confirmed
  - Excellent theme adaptation — both renders are clean; data colors are identical
    between light and dark; chrome (background, grid, text) correctly flips; no dark-on-dark
    failures
  - Elegant solid/dashed distinction — positive-frequency curve is solid green, negative-frequency
    mirror is dashed at 60% opacity, and the unit circle is a grey dashed line; three
    line styles convey role clearly without extra color spend
  - 'Semantic color usage — brand green (#009E73) for the Nyquist curve, matte red
    (palette[4] = #AE3030) for the critical point, blue (palette[2] = #4467A3) for
    frequency markers — all semantically appropriate'
  weaknesses:
  - 'Label crowding near the critical-point region — the ''(−1, 0)'' data label (offset
    x:6, y:−14 from the marker at (−1,0)) and the ''ω_pc ≈ 3.32 rad/s'' data label
    (placed at the phase-crossover scatter point near (−0.5, 0)) render very close
    together and overlap slightly; the ''2 rad/s'' label at (−1.2, −0.65) also crowds
    the region. Increase the y-offset of the ''(−1, 0)'' label (e.g. y: −24) and/or
    disable the dataLabel for the ω_pc point, replacing it with a plotLine annotation
    at x = −0.5 or a separate text renderer call placed further from the critical
    point.'
  - 'Design Excellence ceiling — the chart meets spec cleanly but does not push beyond
    functional; there is no subtitle giving gain margin context, no reference annotation
    for the gain-crossover frequency (ω_gc where |G(jω)| = 1), and the legend is generic.
    Adding a short subtitle (''G(s) = 30/((s+1)(s+2)(s+3))  |  Gain margin: 6 dB  |  Phase
    margin: ~38°'') and annotating the gain-crossover point would raise storytelling
    meaningfully.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct for light theme, not pure white.
      Chrome: Title "nyquist-basic · javascript · highcharts · anyplot.ai" in dark ink at 22px, clearly readable. X-axis label "Real" and Y-axis label "Imaginary" in secondary ink (#4A4A44) at 16px — balanced, appropriate for short labels. Tick labels at 14px, dark and readable. Grid lines are subtle (rgba-based, low opacity).
      Data: Nyquist curve in brand green (#009E73) — positive-frequency curve solid, negative-frequency mirror dashed at 60% opacity. Unit circle as a dashed grey line. Critical point at (−1, 0) marked with a red × (SVG) and a filled red circle (scatter marker). Direction arrows as filled green triangles at ω = 0.5 and 2.0 rad/s on each curve. Frequency markers as blue (#4467A3) circles at 0.3, 1, 2, and ~3.32 rad/s with labels.
      Legibility verdict: PASS — all text is readable. Minor crowding near the critical-point region: the "(−1, 0)" label and "ω_pc ≈ 3.32 rad/s" label are close and slightly overlap, but both remain decipherable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct for dark theme, not pure black.
      Chrome: Title, axis labels, and tick labels flip to light ink (#F0EFE8 / #B8B7B0) — all clearly readable against the dark background. Grid lines remain subtle. No dark-on-dark failures observed.
      Data: Colors are identical to the light render — brand green Nyquist curve, dashed negative mirror, grey unit circle, red critical point ×, blue frequency markers. All elements distinguishable from the near-black background. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS — all text readable, all data elements visible; no dark-on-dark issues.
