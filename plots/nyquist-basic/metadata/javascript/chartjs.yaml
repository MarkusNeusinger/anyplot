    labels all flip correctly; data colors identical'
  - Ochre frequency annotation dots use Imprint palette[3] (#BD8233) — semantic choice
    that complements the green data curve
  - Square orientation correctly chosen for 1:1 aspect ratio requirement
  - Custom Chart.js plugins (bgPlugin, nyquistPlugin) handle theme background and
    custom canvas drawing idiomatically
  weaknesses:
