  - Direction arrows on the positive-frequency curve correctly communicate increasing-frequency
    direction
  - 'All four spec requirements satisfied: unit circle, critical point, frequency
    annotations, direction arrows, 1:1 aspect ratio, Real/Imaginary labels'
