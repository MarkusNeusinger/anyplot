review:
  strengths:
  - 'Full spec compliance: critical point marker, unit circle, frequency annotations,
    direction arrows, and 1:1 aspect ratio all present'
  - Accurate transfer function G(s) = 6/((s+1)(s+2)(s+3)) with correct complex arithmetic
    — DC gain, phase crossover, and gain margin are all correct
  - Custom Chart.js plugins (bgPlugin + nyquistPlugin) correctly use beforeDraw/afterDraw
    lifecycle for background fill and canvas 2D arrow/annotation rendering
  - 'Palette compliant: positive/negative frequency curves use brand green palette[0],
    critical point uses semantic matte red, ochre dots for annotations; both themes
    adapt correctly'
  - 600 log-spaced frequency points (ω from 0.01 to 100 rad/s) produce a smooth, professional
    Nyquist curve with negative-frequency conjugate mirror
  - Square orientation directive correctly ensures 1:1 aspect ratio per the spec requirement
  weaknesses:
  - Frequency annotation labels for ω ≈ 3.32 (φ×) and ω = 2 are spatially crowded
    — both points are near x≈-0.1 to -0.2, y near 0 and -0.16, so their labels overlap
    visually; add a larger vertical offset for the ω = 2 label or reposition to reduce
    crowding
  - Annotation font is hardcoded as 'bold 15px sans-serif' rather than using a token-derived
    font string — this works visually but bypasses the style system; use `${15 * (window.devicePixelRatio
    || 1)}px` or the t token approach for consistency
  - 'DE-02 refinement gap: legend box uses Chart.js default border styling (no explicit
    labels.boxWidth/borderColor tied to the token system); no explicit removal of
    legend border — could set labels.borderColor: ''transparent'' for a cleaner look'
  - Helper functions cmul/cdiv/evalG increase code surface area; could be inlined
    or expressed as a single evalG call with inline arithmetic to satisfy the KISS
    criterion more strictly
