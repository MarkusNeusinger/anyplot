    it to a different position (e.g., position: bottom)'
  - 0.1 rad/s annotation falls off-chart (Im≈-4.9, well below yMin=-1.75) — replace
    it with a more visible frequency such as 0.3 rad/s which lies in the visible arc
  - 'DE-01/DE-02 polish: add explicit top+right axis-line suppression and increase
    axis label weight to push from well-configured-default toward publication-ready;
    consider a stronger font weight for the critical point label'
