review:
  strengths:
  - 'Complete spec compliance: all six required features (critical point, unit circle,
    frequency annotations, direction arrows, 1:1 aspect ratio, correct axis labels)
    implemented correctly'
  - Mathematically correct Nyquist curve for G(s)=1/(s(s+1)(s+2)); gain crossover
    at ω≈√2 verified; stable system correctly shown not encircling (-1,0)
  - 'Excellent Imprint palette discipline: brand green for primary curve, semantic
    matte red (palette[4]) for critical point, Imprint blue (palette[2]) for frequency
    markers'
  - Theme-adaptive chrome throughout both renders using t.ink / t.inkSoft / t.grid
    tokens — dark render fully readable with no dark-on-dark failures
  - symbolRotate callback using tangent vector math for automatic arrow direction
    is an elegant ECharts-specific technique
  weaknesses:
  - Frequency annotation labels for 1, 2, and 5 rad/s are crowded near the real-axis
    crossing — use offset tuning or move 5 rad/s label to a less congested position
  - Direction arrow at arrowIndices[0] (index 60, ω≈0.08 rad/s) is placed off-screen
    (Im≈−6.2) and never visible — replace with index ~100 (ω≈0.17 rad/s) for a fully
    visible third arrow
  - DE-01/DE-03 could be strengthened by a markLine or callout annotation showing
    the gain margin distance from the real-axis crossing (−0.167) to the critical
    point (−1)
