    and dark renders; data colors identical across themes
  weaknesses:
  - 'Label overlap near origin: 2 rad/s and 5 rad/s annotation labels crowd each other
    because both frequencies map to nearly the same complex-plane point (w=2 → Re=-0.075,Im=0.025;
