    as "Critical point (-1, 0)" with a red arrow. A dotted gray unit circle is centered
    at the origin. Five frequency points (ω = 0.1, 0.5, 1.0, 3.0, 10.0 rad/s) are
    marked with filled blue dots and labeled with gray annotation arrows. Three direction
    arrows along the main curve indicate increasing frequency. The title reads "nyquist-basic
