  image_description: The plot displays a Nyquist diagram on the complex plane. A solid
    blue curve represents the positive-frequency response of a third-order transfer
    function G(s) = 10/((s+1)(0.5s+1)(0.2s+1)), starting near (10, 0) at low frequencies
    and spiraling inward toward the origin at high frequencies. A dashed, semi-transparent
    blue curve mirrors the positive-frequency contour for negative frequencies. A
    small dashed gray unit circle is drawn at the origin. The critical point (-1,
    0) is prominently marked with a large red "X" and a red annotation arrow labeled
    "Critical point (-1, 0)". Five frequency markers (w = 0.1, 0.5, 1.0, 3.0, 10.0
    rad/s) are annotated along the curve with small arrows. Three directional arrows
    on the solid curve indicate increasing frequency. Axes are labeled "Real Part
    of G(jw)" and "Imaginary Part of G(jw)". Top and right spines are removed, a subtle
    grid is visible, and thin gray reference lines mark the real and imaginary axes.
    A legend in the bottom-left identifies the three visual elements. Title reads
    "nyquist-basic · seaborn · pyplots.ai".
