    0) is marked with a prominent red X and labeled in bold red text, surrounded by
    a subtle pink circular stability zone. A dotted red gain margin line extends horizontally
    from (-1, 0) toward the curve's real-axis crossing. Four frequency annotations
    (ω=0.01, ω=0.04, ω=0.40, ω=6.39) appear in small label boxes along the curve.
    Blue directional arrows on the main curve indicate increasing frequency. The origin
    is marked with a gray + symbol. The title reads "nyquist-basic · letsplot · pyplots.ai"
    in bold, with an italic subtitle showing the transfer function and stability conclusion.
    Axes are labeled Re{G(jω)} and Im{G(jω)}. Background is light gray with a white
    panel and subtle major gridlines.
