  image_description: The plot displays a Nyquist diagram on the complex plane. A solid
    steel-blue curve (G(jω)) traces the open-loop frequency response from low frequency
    (starting near Real≈8, Imaginary≈0) sweeping down through the lower half-plane
    (reaching approximately Imaginary≈-5) and curving back toward the origin. A dashed,
    lighter blue curve (G(−jω)) mirrors it in the upper half-plane. A dotted gray
    unit circle is centered at the origin. A prominent red "X" marks the critical
    point at (-1, 0). Five frequency annotations (ω=0.3, 1, 2, 5, 10) are placed along
    the curve with small dot markers and connecting offsets. Directional arrows along
    the solid curve indicate increasing frequency. The title reads "nyquist-basic
    · matplotlib · pyplots.ai". Axes are labeled "Real" and "Imaginary". Top and right
    spines are removed, with a subtle grid at low alpha. The aspect ratio is equal,
    making the unit circle appear circular.
