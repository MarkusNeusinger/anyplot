      Data: Bid step area in #009E73 (brand green) with 18% fill opacity (soft mint fill) and solid 2px green outline — forms a descending staircase from left toward the center. Ask step area in #AE3030 (matte red) with 18% fill opacity (soft rose fill) and solid 2px red outline — ascending staircase from center to right. Three bid wall jumps annotated at $59,800, $59,885, $59,945 in green. Three ask wall jumps annotated at $60,045, $60,100, $60,180 in red. Spread gap shaded with a subtle gray rectangle. Dashed vertical mid-price line at $60,000. Y-axis grid lines subtle (t.grid token). L-shaped axis frame (bottom + left only).
      Legibility verdict: PASS — all text clearly readable against the warm off-white background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title and axis labels render in light cream/off-white (t.ink token = #F0EFE8), clearly readable against dark background. Tick labels in lighter secondary ink (t.inkSoft). Mid-price and spread annotations in t.inkSoft, readable. Legend text in t.ink, visible. No dark-on-dark failures observed — all chrome elements flip correctly from dark to light.
      Data: Bid area in #009E73 with 18% fill opacity produces a dark greenish-tinted fill (subtle but present) with a clearly visible solid green outline stroke. Ask area in #AE3030 with 28% fill opacity (dark-mode raise) produces a dark maroon-ish fill with a clearly visible solid red outline stroke. Wall annotations in their respective bid/ask colors remain readable against the dark background. Data colors (green bid, red ask) are identical to the light render — only chrome flips.
      Legibility verdict: PASS — all text is readable, no dark-on-dark failures. The semi-transparent fills are more subtle in dark mode but the solid outline strokes maintain clear visual boundaries. Fill opacity is slightly low (especially for bids at 18%) but outline strokes compensate.
