review:
  strengths:
  - Perfect spec compliance — all required features implemented (cumulative step areas,
    bid-ask spread gap, mid-price dashed line, spread annotation, wall annotations
    at support/resistance levels)
  - Expertly idiomatic D3 usage — curveStepAfter curve interpolator for staircase
    areas, d3.area() + d3.line() combo, data joins with .call() pattern for grouped
    wall annotations, d3.format for currency formatting
  - Deterministic Park-Miller LCG with seed 42 — correctly avoids Math.random() as
    required for D3 browser context
  - Justified semantic color exception — bid=palette[0] (#009E73 green) for buy orders,
    ask=palette[4] (#AE3030 matte red) for sell orders, with code comment explaining
    the semantic reasoning
  - 'Thoughtful dark-mode fix — ASK_FILL_OPACITY raised from 0.18 to 0.28 in dark
    mode, with code comment noting that #AE3030 at 18% on #1A1A17 is nearly invisible'
  - Strong data storytelling — wall annotations (3 bid walls, 3 ask walls) with tick
    lines and price labels call out support/resistance levels; spread gap shaded background
    highlights the center gap; mid-price and spread prominently annotated near the
    dashed line
  weaknesses:
  - Wall annotation font size at 11px CSS (22px native at 2x DPR) is at the lower
    bound — increasing to 13px would improve readability when the chart is displayed
    in smaller contexts
  - Bid area fill-opacity is 18% in both light and dark themes — in dark mode this
    creates a very subtle near-black greenish tint; raising bid fill-opacity to 25%
    in dark mode (matching the pattern used for ask) would improve visual parity between
    light and dark renders
  - Ask area fill at 28% opacity in dark mode still produces a very dark near-black/maroon
    fill — a further increase to 35-40% would make the red fill more perceptible without
    losing the semi-transparent character
