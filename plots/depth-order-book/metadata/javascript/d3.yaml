review:
  strengths:
  - Correct left-continuous staircase implementation using d3.curveStepAfter — a semantically
    precise D3 choice for discrete price-level representation
  - 'Semantic Imprint color exception correctly applied: palette[0]=#009E73 for bids,
    palette[4]=#AE3030 for asks — matches universal finance convention without breaking
    palette rules'
  - 'Full spec implementation: bid-ask spread gap, mid-price dashed line, price+spread
    annotations, support/resistance walls, symmetric x-axis centered on mid price'
  - Deterministic Park-Miller LCG with seed=42 — clean solution to browser reproducibility
    constraint with no Date.now() or Math.random()
  - 'Perfect theme-adaptive chrome: all text, grid, and domain lines routed through
    t.ink / t.inkSoft / t.grid tokens; data colors identical between themes'
  - Custom legend swatch (rect fill + line overlay) accurately reflects the chart
    visual encoding style — above typical legend quality
  weaknesses:
  - 'Ask fill (#AE3030 at fill-opacity=0.18) is nearly invisible on dark background
    (#1A1A17) — ask area in dark mode relies entirely on stroke. Fix: use fill-opacity=0.28
    for dark theme (branch on window.ANYPLOT_THEME) or raise base to 0.22 which works
    in both themes.'
  - 'Design excellence has room to grow: no visual treatment of the bid-ask spread
    gap (could add a narrow shaded rect between x(BEST_BID) and x(BEST_ASK) at t.grid
    opacity 0.25) and no wall-price labels at the three major support/resistance levels.'
  - 'Minor: Math.max() used in two places where d3.max() would be more idiomatic D3
    usage.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface.
      Chrome: Title "depth-order-book · javascript · d3 · anyplot.ai" in dark bold text (t.ink) at 22px — clearly readable. X-axis label "Price (USD)" and Y-axis label "Cumulative Volume (BTC)" in dark ink at 16px — readable. Tick labels in secondary ink (t.inkSoft) at 14px — readable. Mid/Spread annotations in t.inkSoft at 13–14px — readable. Y-axis grid lines subtle and theme-appropriate.
      Data: Bid area uses #009E73 (Imprint palette[0]) with 18% fill opacity and solid 2px stroke — clearly visible green staircase descending from ~80 BTC at $59,750 to near zero at $59,990. Three wall drops visible. Ask area uses #AE3030 (Imprint palette[4]) with 18% fill opacity and solid 2px stroke — clearly visible red staircase ascending from near zero at $60,010 to ~87 BTC at $60,250. Three resistance walls visible. Dashed mid-price line at $60,000 clearly visible in t.inkSoft. Central bid-ask spread gap ($20) visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title in light ink (t.ink = #F0EFE8 in dark theme) — clearly readable. Axis labels and tick labels in appropriate light tokens — readable. No dark-on-dark failures detected. Mid/Spread annotations readable.
      Data: Bid area #009E73 at 18% opacity on dark bg — fill renders as medium-dark green, perceptible. Bid stroke (solid green) clearly visible. Ask area #AE3030 at 18% opacity on dark bg — fill nearly invisible (dark brownish-red). Ask stroke (solid red) clearly visible and carries the area representation. Data colors are identical to light render as required (only chrome flips). Dashed mid-price line visible.
      Legibility verdict: PASS (with note: ask fill barely visible in dark mode — stroke compensates but fill contribution is lost; recommend raising ask fill-opacity to 0.28 in dark theme)
