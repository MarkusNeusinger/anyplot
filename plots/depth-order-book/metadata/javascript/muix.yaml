review:
  strengths:
  - Excellent data quality — deterministic LCG-seeded BTC/USD order book with realistic
    walls, correct cumulative calculation from best price outward, and 50 levels per
    side within spec range
  - 'Correct step-area visualization with `curve: "stepAfter"` on both bid and ask
    series, with semi-transparent fills (35% opacity) and 2px solid outlines'
  - Semantic palette usage is correct — brand green (#009E73, palette[0]) for bids,
    matte red (#AE3030, palette[4]) for asks, a valid semantic exception for the finance
    sell-side role specified by the spec
  - Both themes render correctly with theme-adaptive chrome — the ThemeProvider wires
    ink/inkSoft/grid tokens; title div explicitly uses `t.ink` for correct light/dark
    adaptation
  - 'Good MUI X feature usage — `ChartsReferenceLine` for the mid-price line, `connectNulls:
    false` for the bid-ask spread gap, and `sx` targeting `.MuiAreaElement-series-*`
    for per-series fill opacity'
  - Full canvas utilization — the step areas fill the chart area well with appropriate
    margins (top:20, right:50, bottom:65, left:90)
  weaknesses:
  - Tick labels (11px CSS) and legend labels (13px CSS) are below the recommended
    14–16px CSS for MUI X — at mobile scale (~400px viewport) these would render at
    ~2–3 effective display pixels, potentially unreadable; increase tickLabelStyle
    fontSize to 13–14px and legend labelStyle to 14px
  - 'Missing spread value in mid-price annotation — spec says ''annotate the mid price
    and spread value'' but the `ChartsReferenceLine` label only shows ''Mid: $60,000'';
    add the spread: e.g. ''Mid: $60,000 | Spread: $10'''
  - Title at 19px CSS is slightly below the recommended 22px for MUI X; increase to
    22px to match the style guide default and improve readability at the rendered
    resolution
  - Design refinement could be elevated — the chart uses library defaults for most
    chrome elements; consider removing the top/right axis borders if MUI X `axisHighlight`
    or `sx` exposes them, and applying a very subtle grid opacity to push DE-02 above
    default level
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct theme surface.
      Chrome: Title "BTC/USD Order Book · depth-order-book · javascript · muix · anyplot.ai" in dark text at top, readable. Y-axis label "Cumulative Volume (BTC)" and X-axis label "Price (USD)" both clearly visible. Tick labels ($59,750–$60,250 on X; 0–150 on Y) are small (11px CSS) but legible at full resolution. Legend "Bids" / "Asks" with colored swatches in upper center, readable.
      Data: Bids area fills left half with brand green (#009E73) semi-transparent fill and solid step outline. Asks area fills right half with matte red (#AE3030) semi-transparent fill — appears as pink/salmon on the cream background. Clear step-staircase curves with two distinct "wall" jumps visible on each side. Bid-ask spread gap clearly visible at center between ~$59,995 and ~$60,005. Dashed vertical mid-price reference line at $60,000 with "Mid: $60,000" annotation.
      Legibility verdict: PASS — all text readable at desktop resolution; tick labels at 11px CSS may be borderline at mobile scale (~400px).

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct dark theme surface.
      Chrome: Title visible in light text on dark background, correctly using t.ink token (#F0EFE8). Y-axis and X-axis labels appear in lighter colors (inkSoft token). Tick labels visible in lighter secondary text. Legend "Bids" / "Asks" visible against dark background. Grid lines appear as subtle lighter horizontal lines — appropriate contrast.
      Data: Bids area shows brand green (#009E73) fill — appears as richer green on dark background, identical hue to light render. Asks area shows matte red (#AE3030) — composites as darker/deeper red on the near-black background (expected alpha-blending behavior; the base data color is identical). Step curves, walls, and spread gap all clearly visible. Mid-price dashed line and annotation visible in inkSoft color.
      Legibility verdict: PASS — no dark-on-dark failures detected; all chrome correctly adapts to dark theme; data colors are identical between renders with only expected alpha-composite appearance difference.
