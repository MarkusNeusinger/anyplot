review:
  strengths:
  - 'Perfect spec compliance: step curves, cumulative volumes, dashed mid-price line,
    gradient fills, semantic green/red, bid-ask spread gap — every required feature
    present.'
  - Excellent use of Highcharts-native linearGradient in fillColor for the gradient
    area fills — creates a professional trading-platform aesthetic.
  - Fixed-seed LCG is the correct approach for deterministic in-browser randomness
    (no Math.random()). Seed=42 is canonical.
  - Semantic color assignment (green for bids, red for asks) is the correct financial
    convention and a valid Imprint palette exception.
  - Both themes render cleanly with no dark-on-dark failures.
  weaknesses:
  - 'Rightmost x-axis tick label is truncated (e.g. shows ''$60,2...'' instead of
    full value). Fix: add chart.marginRight: 70 to give the last label enough space.'
  - 'colors: t.palette should be set at the top-level chart options (per library guide
    pattern), even when individual series colors are explicit. Add colors: t.palette
    to the Highcharts.chart options object.'
  - 'The mid-price plotLine label (y: -10) positions the ''Mid $60,000'' annotation
    very close to the subtitle, creating visual crowding at the chart top. Move label
    inside chart area: change y: -10 to y: 30 or similar.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "depth-order-book · javascript · highcharts · anyplot.ai" in dark bold text, clearly readable. Subtitle "BTC/USD · Mid: $60,000 · Spread: $6" in lighter secondary text. Axis labels "Price (USD)" and "Cumulative BTC Volume" readable. Tick labels readable throughout. PlotLine label "Mid $60,000" readable but positioned close to subtitle (tight spacing). Rightmost x-axis tick label truncated by Highcharts (insufficient right margin).
      Data: Green (#009E73) bid step-area on left, red (#AE3030) ask step-area on right. Both use gradient semi-transparent fills fading toward bottom. Step pattern (left-continuous staircase) clearly visible. Bid-ask spread gap visible at center. Dashed vertical reference line at $60,000. Liquidity walls visible as prominent step jumps. Legend shows "Bids (Buy)" and "Asks (Sell)".
      Legibility verdict: PASS (minor: rightmost tick truncated; plotLine label crowds subtitle)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface.
