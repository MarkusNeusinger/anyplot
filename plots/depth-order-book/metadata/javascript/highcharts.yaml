      Data: Green (#009E73) and red (#AE3030) data colors visually identical to light render. Gradient fills emerge from near-black background naturally. Stroke edges of both series clearly define the step pattern.
      Legibility verdict: PASS (same rightmost tick truncation; no dark-on-dark failures)
