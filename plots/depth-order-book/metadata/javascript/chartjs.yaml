    fill — the dashed mid-price line visually intersects the text characters; fix
    by adding an opaque background rect before fillText, or by offsetting the label
    10-12px to the right of the mid line'
  - 'Default Chart.js 4-sided axis border box is not hidden — add border: { display:
    false } to both scales.x and scales.y to produce an L-shaped or borderless frame
    per the style guide'
  - 'CVD concern: green/red area fills have no pattern or texture redundancy beyond
    positional cues and legend text labels; the spec mandates these colors and position
    provides redundancy, but in-chart color is still the primary fill differentiator'
