review:
  strengths:
  - 'Perfect spec compliance: all required features present (step areas, cumulative
    accumulation, bid-ask gap, liquidity walls, mid-price annotation)'
  - 'Excellent data quality: BTC/USD scenario with lognormal order sizes and injected
    walls is realistic'
  - 'Correct Imprint palette with valid semantic exception: green=bids, red=asks matching
    Imprint positions and finance convention'
  - Both theme renders pass all legibility checks; chrome adapts correctly in dark
    mode
  - Subtle grid (adjustcolor alpha=0.12) and appropriate fill transparency (0.22)
    create clean visual layering
  weaknesses:
  - No legend to explicitly label bid (green) and ask (red) sides — add a two-entry
    scale_fill_manual / scale_color_manual legend labelling Bid (Buy) / Ask (Sell)
  - Panel border retains all 4 sides; remove top and right spines per style guide
    default — replace panel.border with axis.line for bottom and left only
  - 'Mid-price annotation (Mid: $60,000 / Spread: $10) uses very small text (size=2.8mm)
    and muted color — increase to 3.5mm and use annotate(label) with elevated background
    box for prominence'
  - Two helper functions (make_step_poly, make_step_path) break the flat KISS structure
    — consider inlining or replacing with geom_ribbon-based approach
  - 'LM-02: Step construction uses manual R loops rather than ggplot2-native constructs
    — using geom_step with custom data shaping would demonstrate more ggplot2 mastery'
