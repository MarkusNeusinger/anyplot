review:
  strengths:
  - Semantically correct Imprint palette assignment (green=bids, red=asks) aligned
    with trading convention and spec requirement
  - 'Full spec compliance: all required features (step curves, fills, spread gap,
    mid-price line, annotation) present and correct'
  - Realistic BTC/USD order book data with plausible liquidity walls that naturally
    create visual focal points
  - Theme-adaptive chrome correctly implemented in both renders — no dark-on-dark
    failures
  - 'Idiomatic ggplot2: grammar-of-graphics layering, guide_legend(override.aes),
    proper expansion() usage'
  weaknesses:
  - 'Fill alpha=0.22 is too low for the dark render — fill areas are nearly invisible
    against #1A1A17; raising to ~0.35–0.45 would make depth areas more readable in
    dark mode without overwhelming the outlines'
  - Red/green semantic pairing is spec-required but adding step-direction labels or
    a note would strengthen CVD accessibility
  - make_step_poly helper function deviates from KISS; the polygon data could be constructed
    inline
  - DE-01 could reach 6/8 with slightly more refined typography (reduced weight grid,
    legend without border box, increased annotation padding)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "BTC/USD Order Book · depth-order-book · r · ggplot2 · anyplot.ai" in bold dark ink (~65% canvas width); axis labels "Price (USD)" / "Cumulative Volume (BTC)" at 10pt; x-tick labels rotated 30° at 8pt; y-tick labels at 8pt; legend text at 8pt. All chrome elements use dark INK tokens — clearly readable.
      Data: Bid step area in #009E73 (Imprint pos 1) descending from left toward mid-price gap, with prominent liquidity wall plateau at ~$59,750. Ask step area in #AE3030 (Imprint pos 5) ascending from mid-price rightward with wall shoulder near $60,100. Fill alpha=0.22 is subtle. Solid step outlines at linewidth=0.85 are sharp. Dashed vertical line at mid price. Annotation box "Mid: $60,000 / Spread: $10" in elevated background box.
