    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title and axis labels flip to light-cream text (#F0EFE8 / #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures detected. Mid-price annotation box uses elevated dark background (#242420) with light text — readable. Legend box uses elevated dark fill with #B8B7B0 text — readable.
      Data: Data colors are identical to light render — #009E73 for bids, #AE3030 for asks (only chrome flips). Fill areas at alpha=0.22 on dark background are very muted and nearly invisible, but the step outline strokes remain sharp and carry the visual information. Grid lines at ~12% alpha faintly visible.
      Legibility verdict: PASS — all text readable; minor weakness is dark-mode fill areas being nearly invisible at alpha=0.22.
