review:
  strengths:
  - 'Perfect spec implementation with all required features: bidirectional staircase
    step curves, cumulative volume accumulation, prominent order walls, visible bid-ask
    spread gap, dashed mid-price line, spread annotation, and labeled legend'
  - 'Correct Imprint palette with semantic exception: brand green (#009E73) for bids
    and matte red (#AE3030) for asks, following universal financial convention explicitly
    required by the spec'
  - 'Excellent code quality: reproducible (Random.seed!(42)), clean KISS linear structure,
    all font sizes explicitly set, full theme-adaptive chrome across all axis elements'
  - 'Strong CairoMakie idioms: poly! for custom polygon fills, external Legend in
    fig[1,2] grid column with Fixed(140) width control, vlines! convenience function,
    RGBAf color type'
  weaknesses:
  - 'Semi-transparent fills (alpha=0.25) produce noticeably darker areas in the dark
    render on the #1A1A17 background, reducing fill visual contribution compared to
    the light render — consider alpha~0.32 in dark mode or a slightly lighter fill
    hex for the dark theme'
  - Design storytelling is primarily driven by spec-required elements; annotating
    the 1-2 largest order walls (the most prominent staircase jumps, e.g. the ~6.5
    BTC bid wall and ~9.0 BTC bid wall) would elevate narrative quality and help readers
    understand support/resistance structure
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "depth-order-book · julia · makie · anyplot.ai" in dark ink at top, clearly readable. X-axis label "Price (USD)" and Y-axis label "Cumulative Volume (BTC)" both dark, readable. Tick labels (59500, 60000, 60500 on x; 0, 50, 100 on y) in dark muted ink, readable. Subtle y-only grid lines at ~12% opacity.
      Data: Green (#009E73) staircase step area on the left (bids), rising from ~0 near the mid price (~60000) to ~108 BTC at the leftmost extent (~59505). Red (#AE3030) staircase on the right (asks), symmetric mirror rising from ~0 at center to ~115 BTC at rightmost extent (~60495). Both areas have semi-transparent fills (alpha~0.25) with solid outline strokes (linewidth=2.5). Prominent wall jumps visible in both staircases. Dashed vertical line at mid price (60000). "Spread: $10" annotation in muted gray centered above mid price.
      Legend: External right-column legend with "Bids (Buy)" (green) and "Asks (Sell)" (red), readable on elevated-background frame.
      Legibility verdict: PASS — all text clearly readable against light background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light off-white text, clearly readable. Axis labels and tick labels in light muted tone (INK_SOFT #B8B7B0), readable. Grid lines subtle against dark background.
      Data: Data colors identical to light render — green (#009E73) bid staircase outline clearly visible, red (#AE3030) ask staircase outline clearly visible. Semi-transparent fills (alpha=0.25) on dark background appear noticeably darker (deep forest green / deep maroon) compared to the crisp fills in light mode — fills are somewhat reduced in visual contribution but outlines compensate. Walls and staircase pattern remain readable. Dashed mid-price line and spread annotation visible.
      Legend: Dark elevated background (#242420) with light text, readable.
      Legibility verdict: PASS — all text clearly readable against dark background, no dark-on-dark failures. Fill areas slightly darker in dark mode but outlines preserve data legibility.
