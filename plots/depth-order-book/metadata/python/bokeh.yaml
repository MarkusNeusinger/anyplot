review:
  strengths:
  - 'Full spec compliance: every required feature (step curves, fills with outlines,
    spread gap, dashed mid-price, annotations, liquidity walls) is implemented correctly.'
  - 'Excellent semantic color use: bid = Imprint green (#009E73), ask = Imprint matte
    red (#AE3030) with direct labeling — no legend needed.'
  - Both themes are fully theme-adaptive with no chrome failures; fill areas read
    correctly on both surfaces.
  - Clean KISS code with correct sys.path guard, seed, and all Bokeh-idiomatic models.
  - NumeralTickFormatter for price labels is a polished Bokeh-specific touch.
  weaknesses:
  - '"Bids" and "Asks" direct labels at 42pt bold match the axis label size (also
    42pt); consider sizing up the series labels slightly (e.g., 48pt) or sizing down
    axis labels to 38pt to reinforce the visual hierarchy distinction between series
    identity labels and axis reference labels.'
  - The $12 spread is slightly wide for a realistic BTC/USD major exchange snapshot
    (typical range $0.50-$2); narrowing to $3-$5 would improve DQ-02 accuracy.
  - 'Liquidity walls at levels 15/30 (bid) and 12/28 (ask) are visible as staircase
    jumps but are not called out; a brief annotation (e.g., ''Wall: 8 BTC'') at the
    largest wall would improve storytelling (DE-03).'
  - Both X and Y grid lines are enabled; for a depth chart, Y-only gridlines are typically
    cleaner since the horizontal price reference is provided by the axis ticks themselves.
