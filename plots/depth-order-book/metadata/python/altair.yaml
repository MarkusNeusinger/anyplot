review:
  strengths:
  - 'Correct semantic color usage: Bid=#009E73 (brand green) for buy pressure, Ask=#AE3030
    (Imprint matte red / semantic sell anchor) for sell — appropriate Imprint semantic
    exception for finance context'
  - 'Perfect spec compliance: both cumulative step areas, bid-ask spread gap, dashed
    mid-price rule, mid-price+spread annotation, y-axis from zero, balanced x-axis
    centering'
  - 'Altair canvas sizing exactly correct: width=620 height=320 scale_factor=4.0 then
    PIL pad to 3200×1800 — canvas gate passed cleanly'
  - Realistic BTC/USD order book snapshot with seeded random quantities, three explicit
    liquidity walls (bid side) and two resistance walls (ask side) — visually demonstrable
    depth features
  - 'Full theme-adaptive chrome: all tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG, ELEVATED_BG)
    applied to every non-data element in both themes'
  - Interactive tooltips (side, price, cumulative volume) leverage Altair distinctive
    feature; HTML export provided alongside PNG
  - 'Excellent code quality: KISS structure, reproducible seed(42), clean imports,
    layer composition idiomatic to Altair grammar'
  weaknesses:
  - Mid-price annotation mark_text uses fontSize=9, which at scale_factor=4 gives
    36 source-px — readable at full resolution but slightly undersized; raise to fontSize=11
    for comfortable readability
  - 'Dark-theme bid/ask fills with fillOpacity=0.35 over #1A1A17 produce very dark
    tonal values (~#11483A for bid, ~#4F2220 for ask), reducing fill vibrancy in dark
    mode; consider raising fillOpacity to 0.45-0.50 for dark theme'
  - Design Excellence slightly limited by grid spanning both axes (X and Y) — consider
    Y-axis grid only to reduce chartjunk (order book depth charts rarely need X-axis
    gridlines)
  - 'Minor: step-after interpolation makes ask side right-continuous and bid side
    right-continuous rather than strictly left-continuous as spec specifies; functionally
    negligible at this price-level density but step-before on bid side would be more
    technically accurate'
