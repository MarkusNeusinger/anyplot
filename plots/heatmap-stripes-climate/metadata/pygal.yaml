  image_description: The plot shows a wide, short canvas (4800x1600, 3:1 ratio) with
    the title "heatmap-stripes-climate · pygal · pyplots.ai" centered at the top in
    dark gray sans-serif text. Below the title, 175 vertical stripes span from approximately
    the top quarter to the bottom quarter of the canvas, one per year from 1850 to
    2024. The leftmost stripes are very pale blue-gray, transitioning through nearly
    white in the center, to increasingly visible pink/salmon/red on the right side
    (roughly the last 20% of stripes show noticeable warm tones). Year labels "1850"
    and "2024" appear at the bottom-left and bottom-right respectively in small gray
    text. There are no axes, gridlines, or tick marks. The overall color saturation
    is very low — early-year blues and mid-century tones are barely distinguishable
    from white, significantly reducing the visual impact of the warming stripes concept.
