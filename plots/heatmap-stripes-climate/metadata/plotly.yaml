  image_description: The plot displays climate warming stripes spanning from 1850
    to 2024. Vertical bars transition from predominantly blues (left/early years)
    through mixed blue-red (middle period) to deep reds (right/recent years), representing
    temperature anomalies. A custom blue-to-white-to-red diverging colorscale is used,
    with deep navy (#08306b) for the coldest anomalies and dark red (#67000d) for
    the hottest. The title "heatmap-stripes-climate · plotly · pyplots.ai" appears
    centered at the top in dark gray text. No axes, tick marks, gridlines, or color
    bar are shown — the visualization is minimalist. There is a noticeable vertical
    gap/seam near the middle of the plot that divides the stripes into two visual
    halves, which is a rendering artifact. The overall layout uses the full width
    with minimal margins on the left and right sides.
