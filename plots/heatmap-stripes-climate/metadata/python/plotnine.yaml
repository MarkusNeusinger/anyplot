review:
  strengths:
  - 'Perfect spec compliance: theme_void() strips all axes/labels/ticks/gridlines
    exactly as warming-stripes spec demands'
  - 'Correct imprint_div diverging colormap with Imprint palette colors (#4467A3 blue
    / #AE3030 red) and theme-adaptive mid-color'
  - 'Fully reproducible: np.random.seed(42) with realistic synthetic HadCRUT-style
    trend (linspace baseline + accelerating post-1980 component)'
  - Title correctly sized via the 67-char scaling formula and is bold and clearly
    readable in both light and dark themes
  - expand=(0,0) on both continuous scales cleanly eliminates all whitespace around
    the stripe block
  - guides(fill=False) correctly suppresses the fill colorbar — consistent with the
    spec's 'no axes, no labels' requirement
  weaknesses:
  - 'Near-zero anomaly stripes have reduced visibility because mid=PAGE_BG means values
    near the 1961-1990 baseline take the background color (#FAF8F1 in light / #1A1A17
    in dark) and partially blend with the canvas. In the light render the transitional
    stripes appear cream-on-cream; in the dark render the same stripes appear near-black-on-near-black.
    Consider using a neutral light-grey (#D8D6CF) as a fixed mid-color that contrasts
    with both backgrounds, or pick a slightly off-neutral colour that reads on both
    surfaces.'
  - plot_margin=0.01 leaves a visible cream/dark margin around the stripe block on
    all four sides, breaking the ideal full-bleed warming-stripes look. Remove or
    reduce plot_margin further (try 0 or a tiny 0.002) so the stripes touch the canvas
    edge on left, right, and bottom.
  - after_stat('1') is unnecessarily complex for a constant y-aesthetic. A simpler
    and more readable idiom is df['y'] = 1 followed by aes(x='year', y='y', fill='anomaly'),
    or aes(x='year', y=1, fill='anomaly') directly — no after_stat import needed.
  - 'Design Excellence could be elevated: the default warming-stripes implementation
    omits any year annotation markers or subtle axis decorations that characterise
    the most polished published versions of this chart (e.g. a small label for the
    baseline period 1961-1990, or decade tick marks beneath the stripe block without
    full axis display). Even one subtle enhancement would raise storytelling score.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly not pure white
      Chrome: Bold title "heatmap-stripes-climate · python · plotnine · anyplot.ai" in dark (#1A1A17) text at top; all readable. No axis labels, no ticks, no grid — correct per spec.
      Data: 175 vertical stripes spanning full canvas height. Left portion (approx. 1850–1940) shows deep blues and medium blues indicating persistent cold anomalies. Central transitional zone (1940s–1990s) transitions through pale/cream stripes near the zero baseline — these near-zero stripes are visibly faint against the cream background (mid=PAGE_BG effect). Right portion (1990s–2024) transitions sharply through salmon pinks to deep reds, clearly communicating accelerating warming. Warming trend unmistakably visible left-to-right.
      Legibility verdict: PASS — title is bold and clearly readable; no other text exists by design.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, clearly not pure black
      Chrome: Bold title in light (#F0EFE8) text — clearly readable against the dark background. No dark-on-dark text failures observed.
      Data: Same stripe pattern as light render. Blues on left, transitioning to reds on right — data colors are identical across both renders (only chrome flips). The transitional near-zero stripes (mid=PAGE_BG=#1A1A17 in dark) appear very dark/nearly invisible in the dark theme, creating a subtle visual gap around the baseline period. Blues and reds remain well-distinguished and the overall warming narrative is clear.
      Legibility verdict: PASS — title is white-on-dark and fully readable. Minor issue: near-zero stripes blend with dark background, slightly reducing visibility of baseline-period years.
