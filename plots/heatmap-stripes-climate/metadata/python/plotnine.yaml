review:
  strengths:
  - Correct climate warming stripes format using geom_tile() with no axes, labels,
    or gridlines — exactly as the spec requires
  - Perfect canvas dimensions (3200×1800) and landscape orientation ideal for the
    wide-and-short warming stripes format
  - 'Excellent data generation: realistic temperature anomaly trend with 1961-1990
    baseline normalization, acceleration curve, and noise matching real climate records'
  - Both themes correctly set background (PAGE_BG) and title text (INK) — readability
    passes in both light and dark renders
  - 'Clean code structure: KISS, seed set, all imports used, title size scaled with
    length formula'
  weaknesses:
  - 'Non-Imprint colormap used: scale_fill_gradientn with 9 custom ColorBrewer-derived
    hex stops (#08306b, #2171b5, #6baed6, #deebf7, #ffffff, #fee0d2, #fc9272, #de2d26,
    #67000d). Style guide mandates imprint_div only for diverging continuous data
    — replace with scale_fill_gradient2(low=''#4467A3'', mid=PAGE_BG, high=''#AE3030'',
    midpoint=0) so cold anomalies map to Imprint blue and warm anomalies map to Imprint
    matte-red, with theme-adaptive neutral midpoint'
  - 'Midpoint is pure #ffffff (pure white) in both themes — the style guide forbids
    pure white; the midpoint must be theme-adaptive: PAGE_BG (#FAF8F1 light / #1A1A17
    dark). With the current #ffffff midpoint, near-zero stripes appear bright white-on-dark
    in the dark render and nearly invisible against the off-white background in the
    light render, creating visual inconsistency between themes'
  - Blue-red colormap is not CVD-optimized — the Imprint palette was engineered for
    max-min ΔE across deuteranopia/protanopia/tritanopia simulations; the custom RdBu-derived
    stops lack this guarantee
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, fills the entire canvas around the stripes and the title area above.
      Chrome: Title "heatmap-stripes-climate · python · plotnine · anyplot.ai" is bold, dark (#1A1A17-equivalent) text centered at top — clearly readable and well-proportioned (~70% of canvas width). No axis labels, no tick marks, no gridlines, no legend — exactly as spec requires.
      Data: 175 vertical colored stripes spanning 1850–2024, progressing from dark navy/deep blues on the left (cold early years) through lighter blues toward mid-frame, through very pale near-white stripes near the 1980–2000 range, then increasingly warm pinks and reds extending to deep crimson on the right (recent hot years). The rightmost stripes are vivid red-orange, making the warming trend immediately obvious. Near-zero anomaly stripes in the transition zone are subtle (~near-white against the off-white background) but still distinguishable.
      Legibility verdict: PASS — title is readable; data stripes are visible throughout, though near-zero stripes in the middle zone are marginally subtle on the light background due to the #ffffff midpoint color being very close to the #FAF8F1 background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, fills the canvas outside the stripe area and the title banner.
      Chrome: Title rendered in bright/near-white light text — clearly readable against the dark background. No axis labels, no tick marks, no gridlines.
      Data: Data stripe colors are identical to the light render — the same dark-navy-to-deep-red progression. However, the near-zero anomaly stripes (which use #ffffff as midpoint) appear as bright white-on-dark in this render, creating a more visually striking contrast in the neutral zone compared to the light render. This makes the two renders look slightly different in feel even though the data hex values are the same.
      Legibility verdict: PASS — title is readable; all data stripes are visible. Note: the #ffffff midpoint stripes appear unnaturally bright (white on dark) in this render, which is a palette compliance issue rather than a readability failure.
