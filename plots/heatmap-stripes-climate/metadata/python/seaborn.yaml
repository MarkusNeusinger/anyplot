  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, non-pure-white surface
      Chrome: Title "heatmap-stripes-climate · python · seaborn · anyplot.ai" in dark #1A1A17 ink, well-centered at top, ~70-75% canvas width. Year markers "1850" (bottom-left) and "2024" (bottom-right) in muted #4A4A44 INK_SOFT at fontsize=8, small but readable.
      Data: Vertical stripes span full width. Left portion (1850s-1890s) shows light-to-medium blue tones (#4467A3-derived), transitioning through very pale near-white/neutral in the middle period (1900s-1960s), then warm pinks and increasingly deep reds (#AE3030-derived) toward 2024. Clear visual warming progression. No colorbar, no axes.
      Legibility verdict: PASS — all text clearly readable against warm off-white background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title in light #F0EFE8 ink, clearly readable. Year markers "1850" and "2024" in #B8B7B0 INK_SOFT, readable. No dark-on-dark text failures.
      Data: Data colors differ in apparent character from light render — near-zero anomaly years (roughly 1910-1960) become nearly invisible as they approach the dark background color (adaptive midpoint = #1A1A17). Left blue zone shows steel-blue tones, right red zone shows vivid deep crimson. The overall warming gradient is still readable but individual neutral-zone stripes are lost to the background.
      Legibility verdict: PASS for chrome (title and year markers readable). Data visibility partially compromised in the neutral zone (1910-1960) due to midpoint = background color design choice.
