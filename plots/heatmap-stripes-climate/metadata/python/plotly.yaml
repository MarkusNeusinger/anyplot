review:
  strengths:
  - 'Perfect spec adherence: no axes, labels, or gridlines as required by the warming
    stripes format'
  - 'Sophisticated theme-adaptive mid-color in colorscale (#E8E4D8 light / #3A3A35
    dark) prevents near-zero bars from clashing with the theme surface'
  - Subtle decade markers (1900, 1950, 2000) add temporal orientation without detracting
    from the minimalist aesthetic
  - Historically accurate volcanic dips with realistic anomaly values give the synthetic
    data scientific credibility
  - Interactive hover tooltip with year, anomaly value, and qualitative label makes
    excellent use of Plotly's native capabilities
  weaknesses:
  - 'Colorscale uses a custom blue-to-red palette (#08306b to #67000d) instead of
    the mandated imprint_div diverging colormap (#AE3030 to midpoint to #4467A3).
    Replace with imprint_div while keeping the theme-adaptive midpoint logic.'
  - 'In the dark render, near-zero anomaly bars use mid-color #3A3A35 which is very
    close to the #1A1A17 background, making the transitional stripes hard to distinguish.
    Increase dark-mode mid-color contrast.'
  - Blue-to-red colorscale raises CVD accessibility concerns for deuteranopia that
    switching to imprint_div would partially resolve.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correctly matches the light theme surface.
      Chrome: Title "heatmap-stripes-climate · python · plotly · anyplot.ai" in dark ink (#1A1A17) at size 16, centered, clearly readable. Year labels "1850" (bottom-left) and "2024" (bottom-right) in muted ink, readable.
      Data: Vertical warming stripes from deep blue (#08306b) on left through medium blues, transitioning through cream/neutral bars in the zero-anomaly zone, then orange-red and deep red (#67000d) on right. Subtle semi-transparent white decade markers at 1900, 1950, 2000.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correctly matches the dark theme surface.
      Chrome: Title and year labels rendered in light off-white (#F0EFE8), clearly readable against dark background. No dark-on-dark failures detected.
      Data: Blues and reds are identical to the light render — data palette unchanged between themes. Near-zero anomaly stripes use theme-adaptive mid-color #3A3A35 which blends subtly with #1A1A17 background — transitional bars are still distinguishable but noticeably more subtle than in light mode. Decade markers appear as darker vertical lines.
      Legibility verdict: PASS for chrome elements. Minor concern: near-zero anomaly stripes (mid-color #3A3A35) are barely distinguishable from the #1A1A17 background in the 1880-1920 transition zone.
