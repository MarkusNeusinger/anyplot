  strengths:
  - Correct imprint_div colorscale with Imprint palette blues (#4467A3) and reds (#AE3030)
    and theme-adaptive neutral midpoint — semantically correct cold=blue/warm=red
    mapping
  - 'Theme-adaptive chrome fully correct: backgrounds #FAF8F1 light / #1A1A17 dark,
    title and year labels readable in both themes'
  - 'Spec strictly followed: no axes, no labels, no tick marks, no gridlines — pure
    color encoding as required'
  - Decade markers (1900, 1950, 2000) as semi-transparent vertical lines add orientation
    without cluttering the minimalist design
  - Interactive HTML output with custom hovertemplate and categorized tooltip labels
    (Strong warming / Warm / Cool / Strong cooling) showcases Plotly interactivity
    effectively
  - 'Realistic synthetic data: 175 years (1850–2024) with volcanic eruption dips (Krakatoa
    1883, Novarupta 1912, Pinatubo 1991) and a realistic warming trend from -0.35
    to +0.85 °C'
  weaknesses:
  - Decade markers in dark mode use rgba(0,0,0,0.40) — black on near-black (#1A1A17)
    produces effectively invisible lines. Change dark-theme decade_color to rgba(255,255,255,0.20)
    for visibility parity with light mode.
  - 'VQ-03 minor: near-zero temperature anomaly bars in the mid-period (approx. 1900–1945)
    blend strongly into both backgrounds — especially in dark mode where the colorscale
    midpoint equals the page surface. This is a deliberate imprint_div design feature
    but slightly reduces the visual distinctness of the transitional era stripes.'
