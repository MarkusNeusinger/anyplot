review:
  strengths:
  - Excellent Ed Hawkins warming stripes aesthetic — custom blue-to-red color interpolation
    with 9-stop color scale correctly implements the iconic scientific visualization
    convention
  - 'Theme-adaptive chrome works perfectly in both renders: dark INK title on warm
    off-white #FAF8F1 background (light), light-colored title on near-black #1A1A17
    background (dark)'
  - Interactive HTML output leverages pygal's distinctive SVG tooltip feature — year/anomaly
    labels on hover add genuine interactivity that distinguishes this library
  - Shared _base config dict avoids duplication between PNG and HTML chart instances
    — clean code pattern
  - 'Correct per-bar color customization using pygal''s dict format {"value": 1, "color":
    bar_colors[i]} — idiomatic library usage'
  - np.random.seed(42) ensures reproducibility; symmetric vmax anchoring around the
    90th percentile prevents outlier-driven color scale distortion
  - 'All required spec features correctly absent: no axes, no gridlines, no tick marks,
    no labels — pure data visualization as specified'
  weaknesses:
  - Thin dark separator lines between bars are more visible in the dark render than
    in the light render — pygal Bar chart retains a minimal inter-bar gap even with
    spacing=0, allowing the dark background (#1A1A17) to show through as thin dark
    lines between each stripe. Spec requires 'no gaps between bars'. Consider using
    stroke=False in Style and investigate if pygal's internal bar margin can be further
    suppressed, or render via SVG manipulation to eliminate remaining gaps
  - Data area aspect ratio is approximately 2:1 rather than the spec-required ~3:1
    (wide and short) — the landscape 3200×1800 canvas with top title space limits
    the stripe area to roughly 2:1. A taller title margin_top (currently 150px) could
    be reduced, or a custom 3200×1067 crop via cairosvg post-processing could achieve
    the 3:1 target
  - Near-neutral anomaly years (color ≈ (245,245,245)) blend into the light background
    (#FAF8F1) in the light render but stand out clearly as light-gray stripes in the
    dark render — this visual inconsistency means some years read as 'invisible' in
    light mode but visible in dark mode
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly the anyplot light surface, not pure white.
      Chrome: Title "heatmap-stripes-climate · python · pygal · anyplot.ai" in dark charcoal text, centered at top. No axis labels, no tick labels, no grid (correct per spec). Title comfortably occupies ~70% of width at calculated fontsize ≈44px.
      Data: 175 vertical stripes (1850–2024) in the Ed Hawkins warming stripes palette. Left section (1850–1920): medium steel blues. Middle section (1920–1980): light to medium blues, transitioning through near-white near the baseline. Right section (1980–2024): peach-orange to deep crimson, with the rightmost stripes in very dark red #67000d. The classic warming trend is immediately apparent.
      Thin inter-bar separators are barely visible against the warm background — very subtle in light mode.
      Legibility verdict: PASS — title text is clearly readable; no other text elements (correct per spec).

    Dark render (plot-dark.png):
      Background: Near-black (code sets #1A1A17 — warm charcoal, not pure black) surrounding the stripe area.
      Chrome: Title in light-colored text on dark background — clearly readable, no dark-on-dark issues.
      Data: Same blue-to-red color progression as light render — data colors are identical between themes (only chrome flips). The near-neutral (≈245,245,245 RGB) stripes near the baseline now appear as distinctive light-gray stripes that contrast more strongly against the dark background compared to the light render.
      Inter-bar separators are more visible in dark mode — thin dark lines (background showing through) between bars are perceptible but do not significantly degrade the warming stripes pattern.
      Legibility verdict: PASS — title readable; no dark-on-dark failures.
