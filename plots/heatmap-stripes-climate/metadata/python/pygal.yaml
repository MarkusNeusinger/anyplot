review:
  strengths:
  - Faithful reproduction of Ed Hawkins warming stripes design with correct blue-to-red
    diverging palette and symmetric scale around zero
  - Excellent minimal chrome — no axes, tick marks, gridlines, or legend as required
    by spec; all suppression settings (show_y_guides, show_x_guides, show_y_labels,
    margin, spacing) explicitly set
  - 'Correct theme adaptation: warm off-white #FAF8F1 background in light render,
    warm near-black #1A1A17 in dark render; title clearly readable in both themes
    with no dark-on-dark issues'
  - Per-bar color interpolation using the 9-stop Ed Hawkins palette with correct linear
    interpolation between stops and clamped normalization
  - Deferred import pattern correctly handles filename conflict (file is named pygal.py);
    cairosvg used properly for SVG-to-PNG conversion
  - Interactive HTML export leverages pygal's distinctive SVG interactivity with per-bar
    year/anomaly tooltip labels and selective decade x-labels
  weaknesses:
  - 'VQ-04 minor: The Ed Hawkins blue-to-red palette is required by spec and documented
    as a semantic exception, but it has red-green CVD accessibility concerns for users
    with deuteranopia/protanopia — inherent trade-off for this well-known climate
    visualization'
  - 'DE-01: pygal''s Bar chart renders the stripes well but some residual inter-bar
    thin lines are visible in both renders, which slightly disrupts the seamless stripe
    effect; finer control over bar gap elimination may require checking pygal stroke/inner-spacing
    parameters'
  - 'DE-02: The minimal chrome is well-executed but the title top margin is tight
    — a slightly larger margin_top (e.g., 140-160 instead of 120) would give the title
    more breathing room above the chart'
  - 'DE-03: No optional storytelling enhancement (e.g., a subtle year annotation at
    1900, 1950, 2000) — spec requires minimal design so this is acceptable, but it
    limits the viewer''s temporal orientation without any reference points'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas, including margins around the chart area. Consistent with the required theme token.
      Chrome: Title "heatmap-stripes-climate · python · pygal · anyplot.ai" appears centered at the top in dark (#1A1A17) sans-serif text, clearly readable against the light background. No axes, tick labels, or gridlines visible (correctly suppressed per spec).
      Data: 175 vertical bars spanning the full width of the chart area. Left portion (1850s–1960s) shows blues ranging from deep navy through medium steel blue to light sky blue, representing cooler anomalies. A near-white/neutral zone is visible where anomalies cross zero (approx. 1975–1985). Right portion (1985–2024) transitions through salmon/coral to deep crimson/dark red, representing strong positive warming anomalies. The color interpolation between the 9 Ed Hawkins palette stops is smooth and visually continuous.
      Legibility verdict: PASS — Title clearly readable; no text overlap; no dark-on-light contrast failure.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the canvas. Slightly warmer than pure black, consistent with the theme token.
      Chrome: Title "heatmap-stripes-climate · python · pygal · anyplot.ai" appears in light (#F0EFE8) text, clearly readable against the dark background. No dark-on-dark text failures. No axes, tick labels, or gridlines.
      Data: Identical blue-to-red stripe sequence as the light render. The data colors (deep navy, steel blue, near-white neutral, salmon, crimson) are indistinguishable from the light render — only the canvas chrome (background color, title text color) has flipped between themes. The contrast of warm reds against the dark background may appear slightly more saturated than on the light background, but the actual hex values are identical.
      Legibility verdict: PASS — Title clearly readable in light text on dark background; no dark-on-dark failures detected.
