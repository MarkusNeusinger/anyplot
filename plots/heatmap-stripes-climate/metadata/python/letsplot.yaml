review:
  strengths:
  - 'Perfect spec compliance: no axes/labels/ticks, symmetric diverging scale, equal-width
    bars, correct title format'
  - 'Excellent data quality: realistic 175-year synthetic climate anomaly with plausible
    three-phase warming trend and seeded reproducibility'
  - layer_tooltips() with formatted anomaly values is a great use of lets-plot's distinctive
    interactive features
  - Clean KISS code structure with proper theme-adaptive chrome tokens for title and
    backgrounds
  weaknesses:
  - 'Non-Imprint diverging colormap: uses #08306b/#f7f7f7/#67000d. Must switch to
    imprint_div: low=''#AE3030'', mid=theme-adaptive (''#FAF8F1'' light / ''#1A1A17''
    dark), high=''#4467A3''. The mid color must be defined as PAGE_BG so it adapts
    to both themes.'
  - 'Visible panel border in both renders: panel_background=element_rect(fill=PAGE_BG)
    is missing color=PAGE_BG, creating a default stroke outline around the data panel.
    Should be panel_background=element_rect(fill=PAGE_BG, color=PAGE_BG) to eliminate
    the frame.'
  - 'Near-white neutral stripes (#f7f7f7) appear jarring in the dark render. Switching
    the mid to PAGE_BG (which is #1A1A17 in dark mode) will make near-zero anomaly
    years blend into the background — the correct dark-theme behavior for this visualization.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "heatmap-stripes-climate · python · letsplot · anyplot.ai" in dark ink at top-left, clearly readable. No axes, labels, ticks, or grid (correct per spec). Thin border frame visible around data panel.
      Data: Vertical stripes progress left-to-right from deep steel-blue (1850s, strong negative anomalies) through pale lavender-white (1900–1950, near-zero anomalies) to deep crimson-red (2000s–2024, strong positive anomalies). Mid color (#f7f7f7) blends reasonably with light background.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in light/white text, clearly readable against dark background. No dark-on-dark failures detected. Thin border frame visible.
      Data: Color progression identical to light render (blue→red, correct — only chrome should flip). Near-zero anomaly stripes rendered in hardcoded #f7f7f7 appear as bright near-white strips against the dark background — jarring and not theme-adaptive. In dark theme, mid should be #1A1A17 (PAGE_BG) so neutral anomalies blend into background.
      Legibility verdict: PASS (chrome readable, but mid-color is not theme-adapted)
