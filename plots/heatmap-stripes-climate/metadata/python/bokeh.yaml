review:
  strengths:
  - 'Correct warming-stripes chart type: vertical image glyph with seamless per-year
    color bands, no axes/ticks/gridlines — perfectly matches the minimalist spec intent'
  - 'Imprint diverging palette correctly applied: #4467A3 (cold/blue) ↔ theme-adaptive
    midpoint ↔ #AE3030 (warm/red), symmetric around zero, both endpoints from the
    Imprint palette'
  - 'Theme-adaptive midpoint (#FAF8F1 light, #3A3A37 dark) keeps near-zero stripes
    visible on dark background instead of blending into #1A1A17 — a pragmatic and
    thoughtful choice'
  - Title text is correctly formatted ('heatmap-stripes-climate · python · bokeh ·
    anyplot.ai'), centered, 50pt font, readable in both themes
  - 'Clean Bokeh usage: p.image() glyph for seamless stripe rendering, LinearColorMapper
    for continuous palette, HoverTool for interactive HTML artifact'
  - Selenium + CDP viewport override produces reliably-sized 3200×1800 PNG screenshots
    — robust against browser chrome inflation
  - Fully reproducible with np.random.seed(42); realistic synthetic anomaly data with
    warming trend (-0.3°C to +1.2°C over 1850–2024)
  weaknesses:
  - 'Dark render: near-zero anomaly stripes (midpoint #3A3A37) are difficult to distinguish
    from the #1A1A17 background — the 23-unit luminosity gap causes the central transition
    zone to appear nearly black, reducing the visible blue-to-red gradient in the
    dark theme; consider using #4A4A3F or a slightly lighter midpoint to increase
    separation'
  - 'Aspect ratio mismatch: spec specifies ~3:1 (wide and short) for warming stripes;
    the 3200×1800 canvas yields a 1.78:1 ratio for the full canvas and ~1.89:1 for
    the stripe area (minus 110px title bar) — adding ~400px of PAGE_BG padding above
    and below the stripe image would create a more authentic 3:1-stripe region within
    the landscape canvas'
  - 'Imprint diverging endpoint saturation: classic warming stripes use very deep
    navy (#08306b) and very deep red (#67000d) for the coldest/warmest bars; the Imprint
    palette endpoints (#4467A3 and #AE3030) are more muted, reducing the visual drama
    of the most extreme years — within palette constraints this is acceptable but
    the lack of saturation at extremes is a storytelling limitation'
  - 'SC-02 minor: the spec notes target aspect ratio ~3:1 is not achieved — the full-canvas
    fill is pragmatic given the fixed 3200×1800 constraint but the stripe proportions
    appear taller than canonical warming-stripes charts'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, fills entire canvas border and title area.
      Chrome: Title "heatmap-stripes-climate · python · bokeh · anyplot.ai" centered at top, dark ink (#1A1A17) on warm off-white. No axes, tick labels, gridlines, or legend — intentionally minimalist per spec.
      Data: 175 vertical stripes (1850–2024) using Imprint diverging palette: muted blue (#4467A3) for cold negative anomalies on the left third, near-white (#FAF8F1) midpoint for near-zero anomalies in the central section, warming to Imprint matte red (#AE3030) for warm positive anomalies on the right. The color transition from blue → cream → red is clear and reads the expected warming progression immediately.
      Legibility verdict: PASS — title is fully readable, all stripe colors clearly distinct from background, no overlap or clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct throughout.
      Chrome: Title in light cream/off-white text (#F0EFE8 equivalent) clearly visible against dark background. No other text elements. No dark-on-dark failure.
      Data: Same 175 vertical stripes with identical Imprint palette endpoints (#4467A3 blue left, #AE3030 red right) — data colors correctly preserved between themes. However, the near-zero midpoint uses #3A3A37 (instead of #1A1A17) to provide some separation between near-zero stripes and the background. In practice the central transition zone appears very dark — blue-grey stripes on the left are visible but less saturated than in light render; the neutral middle area is a dark brownish-grey that is somewhat hard to distinguish from the background; the warm red stripes on the right remain clearly vivid and distinct.
      Legibility verdict: PASS for chrome (title clear, no dark-on-dark text issue). PARTIAL for data visibility — cold and near-zero stripes are discernibly present but with reduced contrast vs. the light render; warm red stripes are fully vivid. Not a failure, but the central region legibility is reduced in dark mode.
