  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, fills the entire canvas
      Chrome: Title "heatmap-stripes-climate · python · highcharts · anyplot.ai" appears at the bottom center in muted gray (INK_SOFT #4A4A44), readable but small (44px); no axes, no tick labels, no legend — all correctly absent per spec
      Data: Vertical warming stripes spanning full canvas height. Left portion (years ~1850–1900) shows steel-blue tones (#4467A3 range). Middle section (~1900–1970) transitions through very pale blue to near-cream, blending gently with the #FAF8F1 background at the neutral midpoint. Right portion (~1970–2024) shows progressive pinkish-red tones building to deep matte-red (#AE3030 range) at the far right.
