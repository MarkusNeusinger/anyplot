    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, fills the entire canvas
      Chrome: Title appears at bottom in muted light gray (INK_SOFT #B8B7B0), readable against dark background; all axes/labels/legend absent
      Data: Data colors are NOT identical to the light render at the midpoint — by design, the neutral midpoint is #1A1A17 (dark background) instead of #FAF8F1, making near-zero anomaly years blend into the dark background. The cold years render as muted dark-blue (#4467A3 range on dark surface) and warm years show clearly as dark-red (#AE3030 range). This is the correct imprint_div behavior with theme-adaptive midpoint per the style guide. No dark-on-dark text failures — title text is in light-muted INK_SOFT.
      Legibility verdict: PASS — all visible text (title only) is readable against dark background; no dark-on-dark failure detected
