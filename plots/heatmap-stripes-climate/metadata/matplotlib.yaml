    (~1940s-1970s), with occasional light pink/coral bars appearing. The right portion
    shows an intensifying gradient from orange to deep red/crimson vertical bars representing
    strong positive anomalies (recent decades, ~1980s-2024). The title "heatmap-stripes-climate
