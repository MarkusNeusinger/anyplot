review:
  strengths:
  - Correct warming stripes implementation using heatmap! with vertical bars, no decorations,
    no axes — exactly as spec requires
  - 'Imprint diverging colormap (imprint_div equivalent) correctly applied with #4467A3
    (cold) and #AE3030 (warm) endpoints, symmetric colorrange around zero'
  - 'Clean code structure: no functions/classes, explicit Random.seed!(42), all imports
    used, correct save pattern'
  - 'Idiomatic Makie usage: hidedecorations!, hidespines!, xlims!/ylims! for edge-to-edge
    fill, rowsize! for layout, cgrad for custom diverging colormap'
  - Title correctly placed as external Label below stripes with INK color that flips
    between themes — no dark-on-dark text failures
  - Volcanic cooling events in data generation add realism to the simulated anomaly
    time series
  - Canvas 3200×1800 confirmed, landscape orientation matches spec's ~3:1 aspect ratio
    requirement perfectly
  weaknesses:
  - 'Dark render visibility failure: div_mid is set to colorant"#1A1A17" (the dark
    background itself), so near-zero anomaly years are rendered in the same color
    as the background and become effectively invisible. The spec requires ''equal
    visual intensity'' for equal-magnitude anomalies — years near 0°C should be distinguishable
    from the background, not identical to it. Fix: use a visible neutral midpoint
    such as colorant"#6B6A63" (muted ink) or a soft warm gray that contrasts against
    #1A1A17, rather than the background color itself. Apply only in dark theme; the
    light theme midpoint (#FAF8F1) is also slightly too close to background but less
    severe.'
  - Title fontsize 20 is on the small side for a 3200×1800 px output with no other
    text elements. The title is the only text in the entire chart and should command
    more visual presence. Increase to fontsize=26 to improve readability especially
    when scaled to mobile widths (~400px).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — confirmed, not pure white.
      Chrome: Title "heatmap-stripes-climate · julia · makie · anyplot.ai" centered below the stripes in dark ink (#1A1A17), clearly readable. No axis labels, ticks, or gridlines (correct per spec).
      Data: 174 vertical stripes spanning the full width. Left portion (early years ~1850–1930) shows clear medium-blue stripes (#4467A3 range). Middle section (~1930–1980) transitions through pale blue to near-cream (close to background, some stripes nearly merge with the off-white surface). Right portion (~1980–2023) shows progressively warmer pinkish-red to matte-red stripes (#AE3030 range). The warming trend is visually clear from left to right. Near-zero anomaly stripes in the transition zone are pale but still somewhat distinguishable from the cream background.
      Legibility verdict: PASS — title readable; near-zero stripes slightly pale but visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — confirmed, not pure black.
      Chrome: Title in light text (#F0EFE8 range), clearly readable against the dark background. No dark-on-dark text issues.
      Data: The dark render reveals a significant visibility failure. Because div_mid = colorant"#1A1A17" (identical to the dark background), near-zero anomaly years render as the same color as the background and become invisible. The left portion shows clear blue stripes against the dark background. The transition zone (~1960–1985 in the data, near-zero anomalies) contains stripes that are indistinguishable from the background — an invisible band. The right portion shows dark red/crimson stripes (#AE3030) that are visible but lower-contrast against #1A1A17 than against the light background. Data colors would be identical to light if visible; the extremes (strong blue, strong red) match the light render, but the near-zero midpoint values vanish entirely. Roughly 15–20% of the 174 data years are near-invisible in dark mode.
      Legibility verdict: FAIL for data visibility — near-zero anomaly stripes are invisible (blend with background); title text is readable.
