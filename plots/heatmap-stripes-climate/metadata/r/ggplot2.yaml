review:
  strengths:
  - Faithful polished implementation of warming stripes concept with no axes, labels,
    or gridlines as specified
  - 'Correct imprint_div colormap using Imprint palette anchors (#4467A3 cold, #AE3030
    warm) with theme-adaptive midpoint per style guide'
  - 'Perfect spec compliance: all required features present (no-chrome, equal-width
    tiles, symmetric diverging colormap, guide hidden)'
  - Clean minimal code using theme_void() — the right ggplot2 approach for this plot
    type
  - Realistic well-modelled synthetic data including the historically accurate post-WWII
    industrial cooling dip
  weaknesses:
  - 'Dark render: near-zero anomaly stripes (~1930s-1970s) are invisible against the
    #1A1A17 background because MID_COLOR = PAGE_BG. For a warming stripes visualization
    where ALL bars should read as part of the continuous time series, consider using
    a fixed mid-gray (e.g., #6B6A63) as the gradient midpoint in the dark theme so
    that neutral-temperature years remain faintly visible.'
  - 'VQ-01 minor: title at size=12pt is the minimum recommended; for a plot with no
    other text elements, bumping to 13-14pt would improve mobile-scale readability.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct cream surface
      Chrome: Title "heatmap-stripes-climate · r · ggplot2 · anyplot.ai" centered in dark ink (#1A1A17), size=12pt, clearly readable. No axis labels, no ticks, no gridlines (theme_void).
      Data: 145 vertical stripes spanning 1880-2024. Left portion (early decades) shows clear Imprint blue (#4467A3 range) for cold anomalies. Middle transitions through pale/near-background neutral. Right portion (post-1980s) shows progressively stronger Imprint red (#AE3030 range) for warm anomalies. All 145 stripes visible with good gradient progression.
      Legibility verdict: PASS — title clearly readable; no other text elements; all stripes visible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title in light off-white (INK token = #F0EFE8), clearly readable against dark background. No dark-on-dark failure detected.
      Data: Same hue range as light render — blues on left, reds on right. Near-zero anomaly stripes (~1930s-1970s) blend nearly completely into the #1A1A17 background because the imprint_div midpoint is set to PAGE_BG (background color). Roughly 20-25% of stripes in the neutral-temperature mid-period are indistinguishable from the background. Blues and reds match the light render's hue identity. Overall warming trend (blue left, red right) still clearly communicates the story.
      Legibility verdict: PASS for chrome — title white-on-dark is fully readable. PARTIAL for data — mid-period neutral stripes are invisible per imprint_div design; hot and cold anomaly stripes are clearly visible.
