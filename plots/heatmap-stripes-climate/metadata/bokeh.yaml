  strengths:
  - Excellent minimalist styling with axes, gridlines, and outline properly hidden
  - Smart use of Bokeh image glyph with 2D array for seamless stripe rendering without
    gaps or banding
  - 256-color interpolated palette via interp_palette creates smooth color transitions
  - 'Dual output: static PNG plus interactive HTML with hover tooltips (Bokeh-distinctive)'
  - Realistic synthetic data with proper trend shape and noise
  weaknesses:
  - 'Color mapping is inverted: cold anomaly years show as red/salmon, warm anomaly
    years show as blue - opposite of warming stripes convention'
  - Inverted colors fundamentally misrepresent the climate data story
  image_description: 'The plot displays climate warming stripes spanning the full
    canvas width. The title "heatmap-stripes-climate · bokeh · pyplots.ai" appears
    centered at the top in a small gray font. The stripes are vertical colored bars
    with no gaps, rendered seamlessly using Bokeh''s image glyph. The left portion
    (early years ~1850-1900) shows warm salmon/coral tones. Moving rightward through
    the middle years (~1920-1970), colors fade through lighter peach tones toward
    near-white. The right portion (recent years ~1990-2024) shows progressively darker
    blue. Axes, gridlines, tick marks, and labels are all hidden, consistent with
    the minimalist warming stripes concept. The background is white. Critical observation:
    The color mapping is inverted — cold anomaly years (early) appear red/warm-toned
    while warm anomaly years (recent) appear blue, which is the opposite of the spec
    requirement and standard warming stripes convention (blue = cold, red = warm).'
