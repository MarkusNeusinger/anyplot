  image_description: The plot displays climate warming stripes as a wide, short (~3:1
    aspect ratio) sequence of vertical colored bars filling the canvas width with
    no gaps between bars. The left portion (~1850s) shows medium-to-dark blue bars
    representing negative temperature anomalies. These gradually transition through
    lighter blues toward the center, with near-white bars around the mid-20th century.
    The right portion shows a clear and dramatic shift to pinks and then intense crimson/deep
    reds (~2020s), representing strong positive warming anomalies. No axes, tick marks,
    labels, or gridlines are present — only the pure color-encoded stripes. The title
    "heatmap-stripes-climate · highcharts · pyplots.ai" is visible at the bottom center
    in gray text. A thin white strip is visible at the very top edge where the negative
    margins don't fully extend.
