  strengths:
  - Excellent interpretation of the warming stripes concept with a smooth blue-white-red
    color gradient
  - Minimalist design correctly strips away all chart chrome per the Ed Hawkins style
  - Realistic synthetic data with proper climate warming phases (early cooling, mid-century
    flat, recent acceleration)
  - Full spec compliance for all required visual features (no gaps, symmetric colormap,
    ~3:1 ratio)
  weaknesses:
  - Title text is not visible in the rendered output — likely a margin/positioning
    issue with the container screenshot
  - No Highcharts-specific features used — colorAxis with stops would be more idiomatic
    than manual per-point coloring
  - Helper function anomaly_to_color breaks flat KISS structure
  image_description: The plot displays climate warming stripes as a sequence of vertical
    colored bars filling the entire canvas width with no gaps. The left portion (~1850s)
    shows medium-to-dark blue bars representing negative temperature anomalies. These
    transition through progressively lighter blues toward the center, passing through
    near-white bars around the mid-20th century. The right portion shows a clear shift
    to pinks and then deep crimson/burgundy reds (~2020s), representing strong positive
    anomalies. No axes, tick marks, labels, or gridlines are visible — only the colored
    stripes. The aspect ratio is approximately 3:1 (wide and short). The title text
    is NOT visible in the rendered image despite being configured in the code — it
    appears to be cut off or positioned outside the screenshot area.
