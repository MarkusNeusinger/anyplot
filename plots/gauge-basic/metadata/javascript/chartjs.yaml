review:
  strengths:
  - Custom Chart.js needle plugin using afterDatasetsDraw hook with correct arc geometry
    calculations (getDatasetMeta, getProps) — idiomatic and impressive
  - 'Semantic color exception correctly applied: matte red (#AE3030) for Poor, amber
    (#DDCC77) for Average, brand green (#009E73) for Good — exactly matching Imprint
    palette anchors'
  - 'Both themes render correctly: t.ink / t.inkSoft / t.pageBg tokens used throughout,
    needle and hub flip to white on dark theme, data arc colors identical across themes'
  - Prominent '72' value display + 'Customer Satisfaction Score' metric label inside
    the gauge opening — strong UX decision that anchors the reading
  - Threshold tick marks extending inside/outside the arc at 30 and 70 boundaries
    add professional polish without clutter
  - 'Square canvas (//# anyplot-orientation: square) correctly chosen for the symmetric
    gauge shape'
  - 'Realistic, neutral data context: Customer Satisfaction Score with value=72 just
    above the 70 ''Good'' threshold — clear storytelling'
  weaknesses:
  - 'VQ-04 (Color Accessibility): Red-green zone combination requires the amber middle
    zone and needle/value redundant encoding to be CVD-safe; consider adding zone
    position labels (0, 100) at the arc endpoints to strengthen non-color-based reading'
  - 'VQ-05 (Layout): Gauge opens to the right (C-shape) rather than the conventional
    bottom-opening (D-shape / speedometer) orientation — slightly non-standard visual
    metaphor for a gauge chart'
  - 'DE-02 (Visual Refinement): ''Customer Satisfaction Score'' metric label inside
    the gauge is sized at outerRadius*0.072 which renders noticeably large and extends
    tightly toward the right arc edge — reducing the proportional factor slightly
    (e.g. 0.055) would improve breathing room'
  - 'CQ-01 (KISS): The arcAngle helper function and needlePlugin object are necessary
    for Chart.js but deviate slightly from the flat KISS structure; well-justified
    given the library constraints'
