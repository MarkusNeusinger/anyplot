review:
  strengths:
  - Correct use of Imprint semantic anchors (matte-red / amber / brand-green) for
    required red/yellow/green zone scheme — valid semantic exception
  - Custom needle plugin using Chart.js afterDatasetsDraw hook and getProps() arc
    geometry API is idiomatic and impressive
  - 'Both themes adapt correctly: needle/hub color flips from dark-ink to light-ink
    via t.ink token'
  - 'Full spec compliance: value, range, thresholds, color zones, needle indicator
    all present'
  - Threshold tick marks with labeled positions (30, 70) at arc boundary points add
    useful context
  weaknesses:
  - 'The metric label "Customer Satisfaction Score" is centered at x and positioned
    at y + innerRadius * 0.60 — at that Y-offset the inner circle horizontal half-width
    is narrower than the full text width, causing the label left characters to overlap
    the yellow arc segment. Fix: move label Y deeper into cutout (y + innerRadius
    * 0.78) or reduce lblSize to fit within the cutout width at the current Y-position.'
  - 'The C-shape arc concentrates visual weight to the left, leaving noticeably more
    empty space on the right side of the square canvas. Fix: shift visual center right
    by increasing layout.padding.left to ~180 and decreasing layout.padding.right
    to ~60.'
  image_description: |-
