    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title in light ink (#F0EFE8) at top, fully readable against dark background. Threshold labels in soft-light ink, readable. Value "72" in bold light ink, very prominent. Metric label in soft-light ink, readable. Legend labels in light ink, readable. No dark-on-dark failures observed.
      Data: Arc zone colors identical to light render — matte-red, amber, brand-green all unchanged (Imprint palette data colors theme-invariant). Needle and hub now rendered in off-white/cream (#F0EFE8, t.ink token in dark theme), clearly visible against dark background. Data colors confirmed identical.
