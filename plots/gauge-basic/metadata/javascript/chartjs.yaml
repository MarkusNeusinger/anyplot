      Data: Three arc zones — matte-red (#AE3030, Poor), amber (#DDCC77, Average), brand-green (#009E73, Good) — all clearly visible. Triangular needle in dark ink (#1A1A17) points to ~72 (just above 70 threshold into Good zone). Hub circle dark ink. Legend at bottom with color swatches.
