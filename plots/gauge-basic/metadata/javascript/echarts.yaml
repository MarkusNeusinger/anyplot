review:
  strengths:
  - 'Correct semi-circular ECharts gauge with three semantic color zones using Imprint
    palette colors (brand green #009E73 for good, amber #DDCC77 for fair, matte red
    #AE3030 for poor)'
  - 'Full theme-adaptive chrome: pointer and anchor colors use t.ink token so needle
    flips appropriately between light and dark'
  - Clean minimalist tick labeling — custom formatter shows only zone boundary values
    (0, 30, 70, 100) avoiding clutter
  - ECharts-idiomatic zone coloring via axisLine.lineStyle.color threshold array —
    auto-colors tick marks to match their zone
  - 'Excellent data choice: NPS (Net Promoter Score) is a real KPI that perfectly
    suits the gauge format with 0-30-70-100 thresholds'
  - All font sizes explicitly set (title 22px, axis labels 14px, detail 60px, gauge
    title 18px)
  - Square canvas correctly chosen for a symmetric gauge
  weaknesses:
  - Bottom whitespace is significant — the semi-circle gauge + value '72' occupy only
    the top ~80% of the 2400×2400 canvas, leaving a large empty band below; move center
    to ~58-60% to reduce bottom gap
  - 'Design Excellence is average for attempt 1: the gauge looks like a well-configured
    ECharts default. Consider adding a subtitle or annotation indicating which zone
    the current value falls in (''Good'' / ''Fair'' / ''Poor''), a progress-band overlay,
    or a distinct pointer shape to lift visual sophistication'
  - 'LM-02 could be stronger: ECharts gauge supports a `progress` bar overlay (show:
    true) that fills the arc up to the current value — this would add a distinctive
    ECharts feature beyond the basic color zones'
  - 'DE-03 storytelling: the needle position plus color zone communicates the story
    but there''s no explicit label saying the score is ''Good'' — a detail subtitle
    like ''✓ Promoter Territory'' or a zone label near the arc would clarify the interpretation
    without adding clutter'
