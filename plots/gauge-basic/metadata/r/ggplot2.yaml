review:
  strengths:
  - 'Perfect spec compliance: semi-circular gauge with colored zones (red/amber/green),
    needle, tick marks, and prominent 72% value display — all required features present'
  - 'Excellent theme adaptation: both light (#FAF8F1 bg, dark text) and dark (#1A1A17
    bg, light text) renders correctly use Imprint semantic colors with fully adaptive
    chrome tokens (INK, INK_SOFT, PAGE_BG)'
  - 'Professional visual hierarchy: the large bold 72% value is the immediate focal
    point, needle position confirms it visually, and semantic zone colors provide
    instant good/caution/bad judgment'
  - 'Clean layout via theme_void(): no chart axes, grid, or frame clutters the gauge
    — zone separators use PAGE_BG color for a seamless flush look'
  weaknesses:
  - library(dplyr) is imported but no dplyr functions are used anywhere in the script
    — remove it to fix CQ-03
  - Tick labels (0, 20, 40, 60, 80, 100) are set at size=3.2mm (~9pt), which may become
    illegible when the 3200×1800 canvas is scaled to ~400px mobile width — increase
    to size=3.8–4.0
  - Red (#AE3030) and green (#009E73) are the outer two zones; for deuteranopia/protanopia
    viewers, these two zones are hard to distinguish without the amber middle anchor
    — consider adding a thin white/ink-color ring outline to each zone polygon to
    add edge contrast
  - 'Design Excellence is moderate: the gauge looks professional but not publication-ready
    — consider adding a thin decorative inner ring or bolder zone-boundary treatment
    to elevate the visual polish to DE-01=6+'
  - LM-02 is low because the implementation is primarily manual polygon/segment construction
    in polar coordinates without leveraging ggplot2's distinctive grammar (aesthetic
    mappings, stat layers, scales) — the result is correct but could be more idiomatic
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface, no pure white
      Chrome: Title "gauge-basic · r · ggplot2 · anyplot.ai" centered at top in dark ink (#1A1A17), clearly readable. Tick labels (0, 20, 40, 60, 80, 100) in muted dark (#4A4A44) arranged radially outside the arc — readable at full resolution but small when scaled. Subtitle "Quarterly Sales Attainment" in muted ink below the value.
      Data: Three annular sector zones — matte red (#AE3030) for 0–30 (bad), amber (#DDCC77) for 30–70 (caution), brand green (#009E73) for 70–100 (good). Needle in dark ink from center toward ~72° position pointing clearly into the green zone. Center pivot dot in dark ink. Large bold "72%" value text centered below the gauge, prominent and immediately visible.
      Legibility verdict: PASS — all text is readable against the warm off-white background. No light-on-light failures. Tick labels are small but legible at 3200×1800; mobile scaling would be marginal.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface, no pure black
      Chrome: Title in light warm cream (#F0EFE8), clearly readable. Tick labels in muted light (#B8B7B0), visible against the dark background. Subtitle in soft light tone, readable.
      Data: Zone colors IDENTICAL to light render — red (#AE3030), amber (#DDCC77), green (#009E73) unchanged between themes as required. Needle is light/white (#F0EFE8 INK token for dark theme), clearly visible against the dark background. Center dot is light. "72%" value in large bold light cream text, immediately catches the eye. No dark-on-dark failures observed.
      Legibility verdict: PASS — all text uses theme-adaptive light tokens and is readable against the near-black background. Chrome correctly flipped. Data colors identical to light render.
