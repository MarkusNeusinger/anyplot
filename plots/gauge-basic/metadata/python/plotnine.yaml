  weaknesses:
  - 'DE-01 (5/8): Design is clean and correct but not yet publication-ready — the
    traffic-light aesthetic is expected for a gauge; consider a subtle radial shadow/glow
    on the needle cap or a thin zone-border highlight to elevate polish above ''well-configured
    default'''
  - 'DE-02 (4/6): Visual refinement is good (theme_void, subtle tick lengths) but
    could be pushed further — zone arc edges could have a faint page-background hairline
