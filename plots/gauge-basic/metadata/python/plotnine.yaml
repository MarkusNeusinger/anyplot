  - 'DE-03 (4/6): Storytelling is solid (needle+number+zone reinforce the same message)
    but could be strengthened with a thin baseline arc behind the gauge showing the
    full 0–100 range for context, making the zone proportions more immediately legible'
  - 'LM-02 (2/5): scale_color_identity and layer composition are good plotnine uses,
    but the gauge is built entirely from manual geometry — no plotnine-idiomatic coordinate
    transform or stat is leveraged; a coord_polar approach or using annotate-style
    features would raise distinctiveness'
