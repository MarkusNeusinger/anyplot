review:
  strengths:
  - Excellent idiomatic Altair layer composition using mark_arc with theta/theta2
    and scale=None for precise angle control
  - Semantic use of Imprint palette (matte red / amber / brand green) for zone colors
    perfectly matches the spec convention
  - Both themes handled correctly — chrome fully adapts (INK token drives needle,
    range/threshold labels, and title) while arc colors stay constant
  - 'Value label colored to match its zone (green #009E73) creates an instant semantic
    connection reinforcing the performance message'
  - 'Complete feature set: arc zones with rounded corners and gaps, needle with two-tone
    hub, threshold labels, range labels, and context label'
  weaknesses:
  - 'VQ-04: Red-green color blindness — the gauge zones rely on red/amber/green hue
    alone to communicate Low/Medium/High without redundant text inside the static
    PNG arcs. Adding small zone text labels ("Low", "Med", "High") inside each arc
    segment or enlarging the threshold label text would improve CVD accessibility
    in the PNG without changing the design.'
  - 'DE-01: Design sophistication is good but not publication-ready — the overall
    composition is clean but lacks hierarchy polish that would elevate it further
    (e.g., a subtle radial tick-mark ring along the arc outer edge, or finer typography
    sizing contrast between the 60px value label and the 16px supporting labels).'
  - 'DE-02: Minor refinement gap — the hub treatment could be refined with a slightly
    higher outer/inner size contrast and the inner highlight color could use the ELEVATED_BG
    token instead of PAGE_BG for subtle dimensionality.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface
      Chrome: Title "gauge-basic · python · altair · anyplot.ai" in dark #1A1A17 ink, clearly readable. Range labels "0" and "100" in #4A4A44 (INK_SOFT) flanking the arc ends. Threshold labels "30" and "70" in #4A4A44 placed at zone boundaries just outside the arc. "Current Sales" context label in muted #6B6A63. All text readable against the warm off-white background.
      Data: Semi-circular gauge with three arc zones — matte red #AE3030 (Low 0-30), Imprint amber #DDCC77 (Medium 30-70), brand green #009E73 (High 70-100). Needle in near-black #1A1A17 pointing to ~72. Two-tone hub: dark outer ring, light inner circle. Value "72" in bold green #009E73 (matching the High zone) displayed prominently below the hub.
      Legibility verdict: PASS — all text readable, threshold labels tight but not overlapping.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title text is light cream #F0EFE8, clearly readable against the dark background. Range labels "0" and "100" in #B8B7B0 (INK_SOFT dark). Threshold labels "30" and "70" in #B8B7B0. "Current Sales" in muted #A8A79F. No dark-on-dark failures detected.
      Data: Arc zone colors are identical to the light render — matte red, Imprint amber, brand green. Needle adapts correctly to cream/white (INK dark token = #F0EFE8), clearly visible against the dark background. Hub: cream outer ring, dark center. Value "72" remains in brand green #009E73.
      Legibility verdict: PASS — all chrome adapts correctly; no dark-on-dark issues; data colors identical across themes.
