review:
  strengths:
  - 'Semantic Imprint palette use: brand green (#009E73) for high/good zone, matte
    red (#AE3030) for low/bad zone, amber (#DDCC77) for warning/caution — exactly
    correct semantic exception application'
  - Excellent multi-layer Altair composition using mark_arc with theta/theta2, mark_rule
    for needle, mark_circle for hub, mark_text for all labels — idiomatic and clean
  - Zone-colored value label (green '72') provides instant visual storytelling — value
    is clearly in the good zone before the reader even looks at the needle
  - 'Full theme adaptation: needle adapts from dark (INK light) to light (INK dark),
    hub_inner uses PAGE_BG for concentric contrast in both themes, all text tokens
    correctly theme-switched'
  - Correct 2400×2400 square canvas with proper raise-on-oversize + pad-to-target
    implementation per library spec
  - Both HTML (interactive) and PNG (static) outputs saved, tooltips on gauge arcs
    provide zone context in interactive render
  weaknesses:
  - Threshold labels '30' and '70' use fontSize=14 — at 4× scale that is 56 source-px,
    which is the smallest text on the canvas; bumping to fontSize=16 would improve
    consistency with range labels and mobile readability at ~400px width
  - Design Excellence is competent but not exceptional — could be elevated with subtle
    radial tick marks at zone boundaries (short white lines at 30/70) or a thin progress-arc
    overlay to show exact % filled, which would make the gauge more informative without
    adding clutter
  image_description: |-
