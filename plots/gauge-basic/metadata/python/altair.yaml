      Chrome: Title "gauge-basic · python · altair · anyplot.ai" in dark near-black text, clearly readable at top center. No axis labels (correctly omitted for gauge). Range labels "0" and "100" in dark muted text below arc ends. Threshold labels "30" and "70" in dark muted text just outside arc zone boundaries.
      Data: Three semi-circular arc zones — matte red (#AE3030) on left (0–30), amber/yellow (#DDCC77) in center (30–70), brand green (#009E73) on right (70–100). Needle in dark/near-black radiating from center hub toward ~72 position (just past 70 threshold into green zone). Two-tone hub: dark outer circle with cream inner circle. Value "72" displayed large and bold in brand green below hub. "Current Sales" in muted gray below value.
