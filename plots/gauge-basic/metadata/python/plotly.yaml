review:
  strengths:
  - 'Perfect spec compliance — all required gauge features present: semi-circular
    shape, three color zones (0–30/30–70/70–100), needle bar + threshold line at value,
    and large prominent value display'
  - 'Correct Imprint palette usage: semantic zone colors use palette anchors (matte
    red #AE3030 for ''At Risk'', amber #DDCC77 for ''On Track'', brand green #009E73
    for ''Exceeds Target'') — the spec''s traffic-light convention is the documented
    semantic exception'
  - Excellent theme adaptation — INK tokens correctly propagate to needle color, gauge
    bordercolor, tick font, annotation text, and gauge background (ELEVATED_BG) in
    both light and dark renders; no dark-on-dark text failures
  - 'Rich data storytelling: delta annotation (+2pp vs. 70% goal), three-chip zone
    legend with color dots, and a callout box (Target Exceeded) create a clear KPI
    narrative beyond the bare gauge'
  - 'Clean code: flat script with no functions/classes, fully deterministic hardcoded
    data, only used imports, and correct write_image + write_html outputs'
  weaknesses:
  - 'Missing Plotly''s built-in delta parameter: mode=''gauge+number+delta'' with
    delta={''reference'': goal, ''valueformat'': ''.0f'', ''suffix'': ''pp''} would
    be more idiomatic than the custom annotation at y=0.22; the custom annotation
    works but bypasses the Indicator''s native delta rendering engine'
  - Red (#AE3030) and green (#009E73) are the sole zone-color distinction; while text
    labels provide some redundancy, direct arc labels or hatching would improve CVD
    accessibility for deuteranopes who cannot distinguish the red and green arcs
  - Annotation texts at fontsize=10–11 (40–44 source px after scale=4) sit at the
    lower bound for mobile readability at 400 px display width; bumping to fontsize=12
    would improve legibility at the srcset '400w' thumbnail
