  strengths:
  - Semantic zone colors are correctly chosen from Imprint palette (ZONE_LOW=#AE3030
    red, ZONE_MID=#DDCC77 amber, ZONE_HIGH=#009E73 brand green) and fully match the
    traffic-light semantic-exception rule
  - 'Excellent data storytelling: delta indicator (+2pp vs. goal), zone legend with
    color bullets, and ''Target Exceeded'' callout box combine to create a clear,
    immediate narrative'
  - 'Both themes handled correctly — all chrome tokens (INK, INK_SOFT, INK_MUTED)
    are theme-adaptive, data zone colors are identical across light and dark renders,
    backgrounds are #FAF8F1 / #1A1A17'
  - All font sizes are explicitly set throughout (number=48, delta=13, title=16, gauge
    ticks=10, annotations=12) and result in well-proportioned text at the 3200×1800
    canvas
  - 'Idiomatic Plotly usage: go.Indicator with mode=''gauge+number+delta'', steps
    array for zone coloring, threshold for arc marker, and HTML annotations — all
    using the proper Plotly high-level API'
  - Deterministic hardcoded data with a realistic sales-target business scenario (72%
    vs. 70% goal) — immediately comprehensible, neutral, with accurate arithmetic
    (+2pp delta)
  weaknesses:
  - Zone legend annotations (x=0.50 and x=0.80) may have very tight spacing — the
    'On Track 30–70%' and '● Exceeds Target 70–100%' items are center-anchored at
    only 0.30 paper-distance apart and the longer 'Exceeds Target' text may overlap
    slightly; consider shifting to x=0.48 and x=0.78 or using xanchor='left' / 'right'
    respectively
  - 'DE-01 moderate gap: the design is polished but falls just short of publication-ready
    — the gauge face could benefit from a subtle radial tick refinement or slightly
    larger inner-chart domain to increase visual impact'
  - 'DE-02 refinement opportunity: the elevated gauge background (ELEVATED_BG) adds
    some depth but the overall composition could be further refined with subtle border-radius
    on the callout annotation or a soft drop-shadow on the gauge face'
