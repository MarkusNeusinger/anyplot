review:
  strengths:
  - Excellent theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders pass
    all readability checks with no dark-on-dark failures
  - 'Correct semantic color choices: #AE3030 (matte red) for Poor, #DDCC77 (amber
    anchor) for Fair, #009E73 (brand green) for Good — all from Imprint palette/anchors'
  - 'Perfect code quality: KISS linear structure, deterministic data, clean imports,
    and idiomatic pygal Style usage'
  - Dynamic title font scaling formula (max(44, round(66*67/max(len(title),67))))
    prevents overflow for the long descriptive title
  - Interactive HTML export with value_formatter lambda is a pygal-distinctive feature
    that enhances the HTML artifact
  weaknesses:
  - Current value (72) is not prominently displayed as a centered label below the
    gauge — the spec explicitly requires 'Display the current value prominently as
    a label, typically centered below the gauge'. The value only appears embedded
    in the legend entry text for the Good zone.
  - No visual indicator (needle, cursor mark, or arc boundary marker) showing exactly
    where 72 sits within the gauge range — the spec states 'The needle or arc indicator
    should clearly point to the current value position'. Viewers can only see which
    zone the value falls in, not its exact position within that zone.
  - Large empty center area of the donut/gauge is wasted canvas space that could host
    the prominent centered value display (e.g., large '72' or '72%' text with 'Good'
    label).
  - 'DE-01 and DE-03: The gauge feels visually sparse without the required centered
    value readout; adding a big bold central value with zone label would elevate both
    aesthetic sophistication and storytelling.'
