    acceptable for radial placement, it creates a slight imbalance vs the 80pt value
    display; bump to 30-32pt for better hierarchy
  - dark render shows a faint thin rectangular outline at the canvas border, visible
    as a slightly lighter edge; investigate setting p.border_fill_color and ensuring
    the HTML page background fully matches PAGE_BG
  - 'Design Excellence could be elevated: consider adding zone labels (Low / Caution
    / Optimal) inside each arc segment — would make the color semantics self-evident
    without a legend'
  - 'LM-02: the gauge is built entirely with low-level primitives (patch, scatter,
    line) rather than leveraging any higher-level Bokeh chart patterns; no hover tooltips
    on zones or value (though the HTML artifact supports this)'
