review:
  strengths:
  - 'Correct semantic color assignment: brand green (#009E73), amber anchor (#DDCC77),
    and matte red (#AE3030) properly applied to good/caution/bad gauge zones'
  - Proper theme-adaptive chrome in both renders; all INK/INK_SOFT tokens correctly
    threaded through needle, hub, tick labels, and text elements
  - HoverTool with zone name and range leverages Bokeh's interactive HTML output distinctively
  - Arc-tangent text rotation for zone labels inside arc segments is a professional
    design touch
  - Clean, deterministic code with no unnecessary abstraction; sys.path fix for self-shadowing
    is well-documented
  weaknesses:
  - Zone arc labels ('Low', 'Optimal') at 22pt with ~90° rotation are slightly small
    and hard to read at a glance; consider increasing to 26–28pt or supplementing
    with a small external legend
  - The 50-tick mark and label at the top-center of the arc have minor visual proximity
    — the tick line and label are close together
