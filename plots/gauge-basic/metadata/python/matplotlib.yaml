review:
  strengths:
  - Semantic Imprint palette use (red/amber/green) with text label redundancy is exactly
    right for a traffic-light gauge
  - Large bold value display in matching zone color (ZONE_GOOD green for 72) is a
    standout storytelling choice
  - Zone labels with tangential rotation inside arcs is a sophisticated typography
    technique
  - Two-tone center cap (INK outer + PAGE_BG inner) adds professional finishing detail
  - Clean normalized coordinate geometry with correct set_aspect equal ensures proportional
    rendering at both themes
  weaknesses:
  - 'Zone label text color uses color=PAGE_BG which in dark mode renders as near-black
    (#1A1A17) on zone backgrounds — contrast on red zone (~2:1) and green zone (~3:1)
    is below WCAG 2.1 AA. Fix: change color=PAGE_BG to color=#F0EFE8 for zone labels
    so dark mode renders light text on all three zone arcs.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "gauge-basic · python · matplotlib · anyplot.ai" in dark ink (#1A1A17), clearly readable. Tick labels (0, 25, 50, 75, 100) in dark gray (INK_SOFT #4A4A44), well-sized. Zone labels "Poor", "Fair", "Good" in near-white (PAGE_BG #FAF8F1) with tangential rotation — all readable on colored zones.
      Data: Three Imprint semantic zones: ZONE_BAD #AE3030 (0-30), ZONE_WARN #DDCC77 (30-70), ZONE_GOOD #009E73 (70-100). First/primary zone uses brand green #009E73 as "Good" (semantic exception: green=good is correct). Needle in black pointing to 72 (in Good zone). Value "72" in #009E73, "Current Sales" in INK_MUTED.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title in near-white (#F0EFE8), fully readable. Tick labels in light gray (INK_SOFT #B8B7B0), readable. "Current Sales" in light muted (#A8A79F), readable. Needle becomes near-white (INK = #F0EFE8 in dark mode). Zone labels use color=PAGE_BG which is #1A1A17 in dark mode — near-black text on colored zones. "Fair" on amber (~10:1 contrast) is excellent; "Good" on green (~3:1) and "Poor" on red (~2:1) have marginal contrast. Labels still discernible due to bold weight but below WCAG AA for red and green zones.
      Data: Zone colors identical to light render — #AE3030, #DDCC77, #009E73 all unchanged. Value "72" in #009E73. Data color consistency confirmed.
      Legibility verdict: PASS (minor weakness: zone label contrast on red/green arcs in dark mode is suboptimal due to color=PAGE_BG being near-black in dark theme)
