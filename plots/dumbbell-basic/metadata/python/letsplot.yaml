review:
  strengths:
  - Correct horizontal dumbbell layout with departments on Y-axis and satisfaction
    scores on X-axis
  - 'Semantic color coding: green segments for improvement, red (#AE3030 semantic
    anchor) for Operations decline — immediately communicates direction'
  - Data sorted ascending by diff so viewer reads most-to-least improved top-to-bottom,
    strong visual hierarchy
  - 'Full theme-adaptive chrome: both renders pass legibility checks with warm off-white
    / near-black backgrounds'
  - layer_tooltips() leverages letsplot interactive HTML output — shows category,
    period, value, and delta
  - 'All Imprint palette positions used correctly: Before=#009E73 (pos 1), After=#C475FD
    (pos 2), decline segment=#AE3030 (semantic anchor)'
  - Title includes descriptive prefix Employee Satisfaction with proper mandated format
  - Deterministic hardcoded data covers both improvement and decline scenarios
  weaknesses:
  - Two separate geom_segment calls (df_improved / df_declined) rather than a single
    geom_segment with a direction color aesthetic — the more idiomatic ggplot/letsplot
    approach would add a direction column and map color=aes(direction) inside one
    layer
  - DE-02 refinement is solid but legend border color is transparent rather than INK_SOFT
    — minor polish gap
  - LM-02 could be elevated by using geom_lollipop or a custom stat if available,
    or annotating the delta value directly on each segment for richer storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "Employee Satisfaction · dumbbell-basic · python · letsplot · anyplot.ai" centered in dark ink (#1A1A17), font scaled to ~15pt for long string, fully visible. Y-axis label "Department" in dark ink, X-axis label "Satisfaction Score" in dark ink — both explicitly sized at 12pt. Y-axis category tick labels (department names) in muted #4A4A44 at 10pt, readable. X-axis numeric tick labels (50–95) in same muted tone, readable. No text-on-text overlap anywhere.
      Data: 10 horizontal dumbbells. Green (#009E73, pos 1) filled circles = Before scores. Lavender (#C475FD, pos 2) filled circles = After scores. Connecting segments green for 9 improved departments, red (#AE3030, semantic anchor) for Operations (declined). Segment alpha=0.65, markers size=5 — both clearly visible. Sorted ascending by diff so Operations (−7) is at bottom, Customer Support (+25) at top. Legend "Period" with Before/After entries positioned bottom-right, does not overlap data.
      Legibility verdict: PASS — all elements fully legible against warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, warm near-black
      Chrome: Title in light #F0EFE8 — clearly readable. "Department" and "Satisfaction Score" axis labels in light ink. Y-axis category labels and X-axis tick labels in #B8B7B0 muted light — all readable. Legend box has elevated #242420 dark background with light text. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — Before dots remain #009E73, After dots remain #C475FD, improved segments green, Operations segment red. All markers and segments clearly distinguishable against the near-black background.
      Legibility verdict: PASS — both theme-adaptive chrome and data elements fully legible.
