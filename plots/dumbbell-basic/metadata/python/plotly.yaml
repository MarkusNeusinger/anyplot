review:
  strengths:
  - 'Perfect Visual Quality (30/30): explicit sizing, no overlaps, appropriate marker
    scale for 9 sparse data points, full Imprint palette and theme-adaptive chrome
    compliance in both renders'
  - 'Strong spec and data coverage: all dumbbell features demonstrated including regression
    case; realistic neutral employee satisfaction scenario; deterministic data'
  - Amber semantic anchor used correctly for regression case — conditional coloring
    on both connecting line and delta label is a thoughtful design decision that adds
    storytelling without annotations
  - 'Ascending-delta sort order creates an implicit visual hierarchy: best improvement
    at top, regression outlier at bottom with amber highlighting'
  weaknesses:
  - Legend box border adds visual weight — set legend.borderwidth=0 or reduce to 0.5
    for a cleaner, Tufte-inspired chrome
  - Plotly axis frame lines are still visible on all four sides — add xaxis_showline=False
    / yaxis_showline=False or mirror=False to achieve an L-shaped or open frame for
    more visual refinement
  - Regression outlier (Legal, -3 pts) sits at the bottom where the eye ends rather
    than begins — an annotation callout or slightly enlarged amber dot would make
    it a more immediate focal point for the viewer
