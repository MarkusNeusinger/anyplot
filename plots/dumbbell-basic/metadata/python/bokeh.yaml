review:
  strengths:
  - 'Correct Imprint palette usage: #009E73 (brand green) for ''Before'' and #C475FD
    (lavender) for ''After'' dots, with semantic red #AE3030 for the Finance regression
    segment'
  - Delta labels above each connecting segment make the story immediately explicit
    — viewer sees +23, +17, etc. without reading data
  - Categories sorted ascending by delta so the largest improvement (R&D +23) sits
    at the top — strong visual hierarchy
  - Color-coded segments (green for improvements, red for regression) add a redundant
    semantic layer that reinforces the direction-of-change narrative
  - 'Full theme-adaptive chrome: backgrounds, text, grid, and legend box all flip
    correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - White dot edges (line_color=PAGE_BG) give clean separation on both surfaces without
    introducing new colors
  - LabelSet for delta annotations and HoverTool for interactive tooltip are idiomatic
    bokeh; HTML artifact is generated as required catalog artifact
  - 8 categories with realistic employee satisfaction data including one regression
    (Finance -6) adds narrative depth
  - min_border_left=280 is correctly generous to accommodate the long 'Research &
    Development' category label without clipping
  weaknesses:
  - 'Legend placement `p.legend.location = ''bottom_left''` places the legend box
    directly over the Finance row (bottom data row after ascending-delta sort), partially
    obscuring the Finance dumbbell dots (before=78, after=72) and the ''-6'' delta
    label. Fix: move legend to ''top_left'' (where there is more empty space above
    the R&D row''s x=65 start dot) or ''bottom_right'' (clear of all dots since all
    data is clustered in x=55-90 range but bottom-right is open), or use explicit
    offset — e.g. `p.legend.location = ''top_left''` which avoids the data region
    entirely.'
  - X-axis label 'Satisfaction Score' is set at 42pt while Y-axis label 'Department'
    is 36pt — the 6pt gap creates a mild imbalance. Per style guide, axis labels should
    be visually similar in size. Align y-axis to 42pt as well (the min_border_left=280
    already reserves room for this).
