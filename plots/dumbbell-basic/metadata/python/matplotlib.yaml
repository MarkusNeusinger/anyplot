review:
  strengths:
  - 'Correct horizontal dumbbell chart with two Imprint palette colors (#009E73 and
    #C475FD) for Before/After series'
  - Variable line width encoding improvement magnitude is a clever data storytelling
    technique
  - Edge halos on scatter dots (edgecolors=PAGE_BG) give depth and improve contrast
  - Data sorted by improvement magnitude — viewer immediately sees HR improved most,
    Sales least
  - Selective annotations on only top and bottom performers focus attention on the
    extremes
  - Both themes render correctly — data colors identical, chrome adapts cleanly (no
    dark-on-dark)
  - 'Perfect spec compliance: horizontal orientation, distinct colors for start/end,
    sorted by difference, connecting lines'
  - Clean KISS code structure with explicit sizing, no functions/classes, idiomatic
    axes-based API
  - Custom legend via empty-data scatter is the canonical matplotlib pattern
  - Explicit subplots_adjust prevents canvas drift without using bbox_inches='tight'
  weaknesses:
  - Annotation text at fontsize=7 is below the readable floor at mobile widths (~400px);
    consider raising to 8pt minimum
  - Scatter dot size s=80 is below the style-guide recommendation of s=200-400 for
    sparse data (<30 points); the connecting lines partially compensate but dots could
    be more prominent — consider s=110-130 with corresponding edge halo adjustment
  - 'DE-01 capped at 6 (strong but not FiveThirtyEight-level): visual hierarchy is
    good but could be elevated further — e.g. a subtle fill between dots encoding
    direction of change, or using a slightly thicker line for the top-performer row
    as a highlight'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct brand surface, not pure white.
      Chrome: Title "dumbbell-basic · python · matplotlib · anyplot.ai" in dark ink, clearly readable. Y-axis label "Department" and X-axis label "Satisfaction Score (0–100)" both dark, 10pt. Tick labels (department names, numeric x-ticks) in INK_SOFT. Subtle vertical grid lines at alpha=0.15. L-shaped spine frame (top+right removed). Legend bottom-right with ELEVATED_BG frame.
      Data: 8 categories sorted by improvement magnitude (HR top, Sales bottom). Before-dots in #009E73 (brand green), After-dots in #C475FD (lavender). Connecting lines gray with variable width encoding magnitude (thicker = bigger improvement). Annotations "+28 pts" (HR, top) and "+6 pts" (Sales, bottom) in INK_MUTED.
      Legibility verdict: PASS — all primary text readable; annotation text at 7pt is small but legible at full canvas resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct brand surface, not pure black.
      Chrome: Title in #F0EFE8 (light ink), clearly readable against dark background. Y-axis and X-axis labels in light ink. Tick labels in B8B7B0 (INK_SOFT dark). Grid lines appropriately faint. Spines in INK_SOFT dark. Legend frame uses ELEVATED_BG (#242420), legend text in INK_SOFT.
      Data: Data colors identical to light render — Before dots remain #009E73, After dots remain #C475FD. No hue shift. Connecting lines slightly more visible against dark surface.
      Legibility verdict: PASS — no dark-on-dark failure. All text is light-colored against the near-black background. Brand green #009E73 reads clearly on the dark surface.
