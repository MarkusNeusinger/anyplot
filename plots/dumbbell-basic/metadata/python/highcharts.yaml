review:
  strengths:
  - Correct use of native Highcharts dumbbell series type (requires highcharts-more
    + dumbbell module) with horizontal inversion — no simulation
  - 'Full theme-adaptive chrome: all six tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED, GRID, CONNECTOR) correctly wired to ANYPLOT_THEME; both renders pass
    the theme-readability check'
  - Data sorted by improvement (descending) adds genuine storytelling value; mix of
    gains and declines demonstrates full feature range of dumbbell charts
  - Clever dummy-scatter series trick to give Before/After legend entries without
    overriding dumbbell series coloring
  - 'CDP Page.captureScreenshot with captureBeyondViewport: true correctly prevents
    bottom clipping at 4800x2700'
  weaknesses:
  - Tooltip pointFormat uses {point.low} as Before and {point.high} as After; for
    declining departments (IT Support, Legal) low is the After score and high is the
    Before score — tooltip labels are inverted; fix by storing explicit before/after
    as custom point properties and referencing {point.before}/{point.after} in pointFormat
  - Data labels at 28px are slightly undersized relative to radius-24 markers; increasing
    to 34-36px would improve scannability at full resolution
  - 'Design excellence stays at default level: no reference line (e.g. zero-change
    vertical), no color differentiation for positive vs. negative changes beyond dot
    position, no annotation highlighting the largest gain or decline'
  image_description: |-
