review:
  strengths:
  - Delta annotations embedded in Y-axis category labels (e.g., '+24', '-3') provide
    at-a-glance insight without cluttering the chart with separate annotation elements
  - Sort by improvement descending creates a clear top-to-bottom narrative; Legal's
    regression naturally falls to the bottom
  - Semantically correct LOSS_COLOR (#AE3030) applied to regression connector, with
    all improvement connectors using theme-adaptive neutral (INK_SOFT)
  - Both PNG and interactive HTML generated, leveraging pygal's core differentiator
  - 'Full theme-adaptive chrome: title, labels, ticks, connectors, and legend all
    flip correctly between light (#FAF8F1) and dark (#1A1A17) surfaces'
  weaknesses:
  - The LOSS_COLOR red connector on the Legal (-3) regression row is ambiguous at
    rendered scale — 5px connector width and muted red may not visually pop against
    neutral connectors; consider wider stroke (width=8) for the regression case
  - No X-axis grid guides (show_x_guides=False) reduces value-reading precision for
    a comparison chart where exact score differences matter — enable show_x_guides=True
    with subtle foreground_subtle color
