review:
  strengths:
  - 'Perfect visual quality across both themes: all font sizes explicitly set, correct
    Okabe-Ito palette, correct backgrounds, readable in both light and dark modes'
  - Excellent use of Altair's layer composition (mark_rule + mark_circle) with the
    idiomatic x/x2 encoding for connecting lines
  - Clean KISS code structure with pd.melt for proper long-form data; dot stroke halos
    add professional polish
  - 'Fully spec-compliant: horizontal orientation, sorted by difference, correct title
    format, distinct colors for Before/After'
  weaknesses:
  - 'DE-03: Sorting reveals the pattern but there is no visual emphasis on the extremes
    — color contrast variation, a size differential on the largest-gain category,
    or a subtle annotation would help the viewer immediately see the story'
  - 'DE-01: The overall design is clean but flat — all categories are presented with
    equal visual weight; a focal point (e.g., slightly larger or brighter dot for
    the max-difference row) would elevate sophistication'
  - 'LM-02: The implementation uses Altair''s correct dumbbell idiom but misses an
    opportunity to use Altair-specific transforms (e.g., calculate transform for diff
    labels) or interactive selection for highlighting individual dumbbells'
