review:
  strengths:
  - Excellent use of Altair layer composition (mark_rule + mark_circle + mark_text)
    for a clean dumbbell without workarounds
  - Data sorted ascending by difference creates an immediately readable narrative
    — Customer Support gains the most, IT the least
  - Per-row difference labels (+N pts) computed via transform_calculate make gains
    quantifiable without reading the x-axis
  - 'Complete and correct theme adaptation: background, text, grid, legend, and dot
    stroke all use adaptive tokens; data colors stay fixed across themes'
  - mark_circle stroke=PAGE_BG gives dots a clean edge against both the background
    and the connecting lines
  weaknesses:
  - Difference label fontSize=9 is very small — at mobile scale (~400 px wide) annotations
    shrink to ~4 px; increase to fontSize=10 or 11 for better accessibility
  - Left Y-axis domain line is still visible (domainColor=INK_SOFT); removing it (domainOpacity=0
    or domainColor=transparent) would improve visual refinement
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Employee Satisfaction · dumbbell-basic · python · altair · anyplot.ai" in dark ink (#1A1A17), clearly readable. Y-axis category labels in muted dark (#4A4A44), X-axis label "Employee Satisfaction Score (%)" in dark ink. Tick labels at 10pt, all readable. Difference labels (+N pts) at fontSize=9 in muted ink — small but legible at desktop scale.
      Data: Before dots in brand green (#009E73), After dots in lavender (#C475FD). Connecting rules in grey at 45% opacity. Dots have PAGE_BG stroke for edge definition. All 10 categories visible and clearly distinguishable.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and axis labels flip to light cream (#F0EFE8), tick labels and difference annotations to #B8B7B0. Legend box uses elevated dark surface (#242420) with muted stroke. No dark-on-dark text failure observed — all labels and tick text are clearly visible against the near-black background.
      Data: Before dots remain #009E73 (brand green), After dots remain #C475FD (lavender) — identical to light render. Connecting lines adapt slightly in perceived contrast but are still subtly visible.
      Legibility verdict: PASS
