  strengths:
  - 'Perfect spec compliance: horizontal dumbbell with Imprint palette colors, sorted
    by reduction, thin subtle connecting lines'
  - 'Excellent theme adaptation: all chrome tokens applied via sns.set_theme rc dict;
    both renders fully readable with no dark-on-dark failures'
  - Realistic and neutral data context (web performance optimization) with factually
    plausible before/after load times
  - Clean, minimal code with no over-engineering; dot edgecolor=PAGE_BG is a polished
    visual detail
  - 'Perfect data quality: covers all dumbbell chart features, sensible scale, non-controversial
    scenario'
  weaknesses:
  - Dot marker size s=90 is below the recommended 200-400 for sparse data (12 points);
    increase to s=130-160 for better visual weight at the dumbbell endpoints on the
    3200x1800 canvas
  - No visual storytelling beyond sort order — add small delta labels (e.g. -4.5s)
    at the right end of each connecting line in INK_MUTED color at 7-8pt to reveal
    magnitude of improvement and create a clear focal point
  - No visual hierarchy distinguishes high-impact vs low-impact pages — optionally
    vary connecting-line linewidth proportional to reduction to encode magnitude redundantly
  - Library Mastery constrained by chart type (no native seaborn dumbbell), but sns.set_context
    or additional seaborn-specific features unexplored
