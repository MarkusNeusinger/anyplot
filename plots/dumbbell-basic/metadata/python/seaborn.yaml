review:
  strengths:
  - 'Correct Imprint palette: brand green (#009E73) for Before, lavender (#C475FD)
    for After with correct canvas dimensions (3200×1800) and no bbox_inches clipping'
  - Variable line widths encoding reduction magnitude adds intentional visual hierarchy
    beyond generic defaults
  - Delta annotations (−X.Xs) positioned precisely right of each Before dot provide
    exact improvement values
  - Data sorted by reduction magnitude reveals the performance story clearly
  - 'Fully theme-adaptive chrome: background, text, grid, legend all correct in both
    light (#FAF8F1) and dark (#1A1A17) renders'
  - 'Spec fully satisfied: horizontal orientation, categories on y-axis, connecting
    lines thin and subtle, distinct colors per endpoint'
  - Clean idiomatic seaborn usage with sns.set_theme RC params, sns.scatterplot for
    dots, sns.despine for spine removal
  weaknesses:
  - Marker size s=150 is below the style-guide recommendation of s=200-400 for sparse
    data (< 30 points); increase to s=200-220 to give dots more visual prominence
    on the 3200x1800 canvas
  - Delta annotation fontsize=7 is very small; consider increasing to fontsize=8-9
    for better readability when scaled to mobile widths (~400 px)
  - LM-02 is modest because the dumbbell connecting lines rely on ax.plot() (matplotlib
    primitive) since seaborn has no native dumbbell geom — consider using a more seaborn-forward
    approach if available
  - 'DE-01 could reach 6/8 with a minor typography upgrade: using fontweight=bold
    on the title and adding subtle category separators or a thin reference line to
    reinforce the ranking story'
