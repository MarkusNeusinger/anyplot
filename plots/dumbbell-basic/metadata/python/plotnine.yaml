review:
  strengths:
  - Fully correct horizontal dumbbell chart using idiomatic geom_segment + geom_point
    composition
  - Sorted by improvement delta — creates an immediately readable narrative showing
    which departments benefited most
  - Per-segment difference annotations (+N) above each connector give viewers direct
    delta reference
  - Both light and dark renders are fully theme-correct with no dark-on-dark or legibility
    failures
  - 'Complete spec compliance: all required features (orientation, distinct colors,
    sorting, subtle connector) implemented'
  - Deterministic hardcoded data with clean pd.Categorical ordering — robust and reproducible
  weaknesses:
  - Difference annotation labels (geom_text size=3.0mm) are small; at mobile display
    sizes (~400px wide) they may become difficult to read — bumping to size=3.5–4.0mm
    would improve legibility without cluttering the chart
  - 'Design sophistication (DE-01) is solid but leaves room: no department is visually
    distinguished as the standout (e.g., HR with +28 could receive a subtle highlight
    or color accent to serve as the focal point)'
