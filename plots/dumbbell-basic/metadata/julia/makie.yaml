review:
  strengths:
  - Horizontal dumbbell chart with correct Imprint palette (green Pre-Program, lavender
    Post-Program)
  - Complete theme-adaptive chrome using all correct tokens for both light and dark
    renders
  - 'Idiomatic Makie usage: linesegments! for segment pairs, axislegend, sortperm,
    RGBAf for grid alpha'
  - Realistic and neutral dataset (employee satisfaction before/after wellness program,
    10 departments)
  - Data sorted ascending by improvement — reveals the gap pattern effectively
  - Clean linear script, no classes/functions, proper Random.seed!(42)
  weaknesses:
  - Design storytelling is competent but minimal — no annotations or highlighted data
    points to draw the reader to a key insight (e.g., annotating the department with
    the largest gain)
  - Sort order is ascending so largest improvement lands at the bottom; most readers
    scan top-to-bottom and expect the most notable item at the top — consider reversing
    to descending sort for stronger narrative
  - 'Minor: no Y-axis label (a brief label like "Department" would complete the axis
    pair, though the category tick labels are self-explanatory)'
