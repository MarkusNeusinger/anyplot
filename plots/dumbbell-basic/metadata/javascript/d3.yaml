review:
  strengths:
  - SVG linearGradient with gradientUnits='userSpaceOnUse' creates a gradient connecting
    line that tracks the data scale precisely — a genuinely D3/SVG-distinctive technique
  - 'Excellent storytelling: sorted by delta, top-2 gains highlighted with bold lavender
    labels + amber callout annotations create immediate visual hierarchy'
  - 'Full theme compliance: pageBg strokes on dots, all chrome tokens (ink, inkSoft,
    grid, amber) correctly applied, data colors identical across both renders'
  - 'Clean minimal design: y-axis domain removed, tick marks removed (tickSize(0)),
    vertical-only subtle grid, generous margins'
  - 'Dynamic title font scaling (title.length > 67 ? Math.round(22 * 67 / title.length)
    : 22) correctly handles the long descriptive title without overflow'
  - d3.format('+d') for signed delta labels and delta labels on the right margin provide
    precise numerical storytelling without cluttering the main chart area
  weaknesses:
  - Callout annotation text is 12px, slightly below the 14px standard for consistency
    at this canvas size — increasing to 13-14px would align it with tick/label sizing
  - Gradient connecting line opacity is 0.65 — increasing to 0.80 would give slightly
    better contrast on dark backgrounds while still looking subtle
  - 'DE-03: The ''Runner-up'' amber annotation placement just below the Engineering
    row''s dumbbell can visually crowd the gap between Engineering and Product rows
    — a small dy offset or reduced font to 11px could help spacing clarity'
