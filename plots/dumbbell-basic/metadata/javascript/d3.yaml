      Data: Green (#009E73) dots for "before" values, lavender (#C475FD) dots for "after" values, gradient connecting lines (green→lavender at 0.65 opacity). Dots at r=10 are prominent. Amber (#DDCC77) callout annotations "▲ Highest gain" and "▲ Runner-up" visible below top 2 rows.
