review:
  strengths:
  - Excellent use of MUI X coordinate hooks (useXScale/useYScale) to render custom
    dumbbell connecting lines — idiomatic and distinctive to MUI X React architecture
  - 'Perfect Imprint palette compliance: brand green #009E73 first, lavender #C475FD
    second, both themes render with correct warm-off-white / warm-near-black backgrounds'
  - Full spec compliance — horizontal orientation, categories on Y-axis, two dots
    per category, subtle connecting lines, sorted by baseline score to reveal pattern
  - 'Both light and dark renders are fully readable: all text adapts correctly to
    the theme, no dark-on-dark or light-on-light failures'
  - Clean, deterministic in-memory data with realistic employee wellness scenario;
    explicit font sizes at all three hierarchy levels (title 22px, axis label 16px,
    ticks 14px)
  weaknesses:
  - 'DE-01/DE-02: Chart uses MUI X''s default 4-sided border frame with no spine removal;
    removing or lightening the top and right axis lines would add visual polish'
  - 'DE-03: No focal point or visual emphasis — all categories are visually identical
    weight; highlighting the top or bottom performer (e.g., largest-gain or lowest-baseline
    department) with a size or color accent would improve storytelling'
  - 'DQ-01: Gap sizes between before/after values are too uniform (1.2–1.5 points
    across all 8 departments); varying the differences more widely (e.g., 0.5 to 2.5
    points), or including one small-gain or regression department, would better showcase
    the dumbbell chart''s utility for comparing differences'
  - 'DE-01: Aesthetic sophistication is at ''well-configured default'' level — consider
    adding a direct value label at each dot or a gap annotation to add information
    density and visual interest'
