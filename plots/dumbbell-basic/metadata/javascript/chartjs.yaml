review:
  strengths:
  - 'Perfect Imprint palette compliance: brand green (#009E73) first, lavender (#C475FD)
    second, correct theme-adaptive backgrounds and chrome across both renders'
  - Clever and idiomatic use of Chart.js beforeDatasetsDraw plugin hook for the dumbbell
    connecting lines — correct library-native approach for a non-native chart type
  - 'Meaningful data storytelling: sorting by improvement delta makes the chart self-explanatory
    without annotations'
  - Deterministic data with a realistic, neutral business scenario covering a good
    range of improvement magnitudes
  - 'Dot border trick (borderColor: t.pageBg) adds subtle visual polish'
  weaknesses:
  - 'Top and right scale borders (spines) are visible on all 4 sides of the chart
    area. Style guide calls for an L-frame (remove top/right). Fix: add border: {
    display: false } to the x-scale options and border: { display: false } to the
    y-scale — or use t.grid as the border color so only the axis-aligned borders show.'
