  - 'Design sophistication is generic (DE-01=4/8): pygal defaults with Okabe-Ito applied,
    no typographic hierarchy, no visual polish beyond basic settings'
  - 'Visual refinement is minimal (DE-02=2/6): no spine removal (pygal doesn''t expose
    this easily), grid is library default, no whitespace tuning'
