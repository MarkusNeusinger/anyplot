    (need 24pt), strip_text=15pt (need 16pt), axis_text=13pt (need 16pt) — tick labels
    look noticeably small in both renders'
  - Axis labels are empty (labs(x='', y='')) — standard diagnostic panels label each
    axis (e.g., 'Fitted values', 'Theoretical Quantiles', 'Leverage', 'Standardized
