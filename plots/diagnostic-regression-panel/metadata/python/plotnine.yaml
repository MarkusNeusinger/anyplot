    and layered DataFrames per geom is textbook grammar-of-graphics'
  - Both light and dark renders are theme-correct — backgrounds, text, and grid lines
    all adapt properly with no dark-on-dark or light-on-light failures
  - Seed set (np.random.seed(42)), clean imports, KISS structure, correct plot-{THEME}.png
    output
  weaknesses:
