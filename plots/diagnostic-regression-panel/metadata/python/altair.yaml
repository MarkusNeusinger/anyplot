review:
  strengths:
  - All four diagnostic subplots correctly implemented with all required elements
    (LOWESS smoothers, Q-Q reference line, Cook's distance contours, point labels
    for top-3 influential observations)
  - 'Perfect spec compliance: title format correct, all required features present,
    consistent point styling across subplots'
  - Clean, idiomatic Altair code using layer composition (+), configure_axis global
    styling, and detail encoding for Cook's contour branches
  - 'Excellent theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders use
    correct backgrounds and all chrome elements properly flip between themes'
  - Realistic housing price prediction scenario with plausible data values and intentional
    influential outliers
  weaknesses:
  - X-axis tick labels on the fitted-values axis (subplots 1 and 3) are too densely
    packed — Altair auto-generates ~12 ticks for the 40K–480K range, and at 16px labels
    each number (e.g. '120,000', 7 chars) nearly fills the per-tick space, causing
    visible overlap at final render resolution; reduce tick count via alt.X(axis=alt.Axis(tickCount=5))
    or similar
  - 'Design Excellence is below 90-threshold level: while the orange/green contrast
    for LOWESS vs data is intentional, the overall aesthetic remains a configured
    default — could push higher with refined whitespace, slightly bolder subplot titles,
    and more deliberate spacing between label annotations and data points'
  - No visual emphasis on influential points — the top-3 Cook's distance observations
    are text-labeled but styled identically to all other points; coloring or sizing
    them differently (e.g., a second mark_circle layer in a contrasting Okabe-Ito
    color) would create clearer visual hierarchy and stronger data storytelling
