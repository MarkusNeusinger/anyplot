review:
  strengths:
  - 'Fully complete spec implementation: all four diagnostic panels (Residuals vs
    Fitted, Normal Q-Q, Scale-Location, Residuals vs Leverage) with all required overlays
    (LOWESS, Q-Q reference line, Cook''s D contours at 0.5 and 1.0) and top-3 influential
    point labels in every panel'
  - Engineered synthetic data that clearly demonstrates multiple regression assumption
    violations — pedagogically effective diagnostic display
  - 'Precise theme-adaptive chrome: all INK/INK_SOFT/PAGE_BG tokens correctly threaded
    through every figure element in both light and dark renders'
  - 'Rigorous statistical implementation: hat matrix computed from first principles,
    studentized residuals, Cook''s distance formula, Q-Q via scipy.stats.probplot'
  - Three-color Okabe-Ito coding (green scatter, orange smoothers, blue Cook's thresholds)
    creates clear visual hierarchy guiding the viewer through each panel
  weaknesses:
  - Subplot titles use 22pt and axis labels 18pt, below the 28pt/22pt full-canvas
    recommendation; tick labels at 15pt are small relative to the 4800px canvas —
    increase subplot titles to 26pt and tick labels to 17-18pt
  - All four panels retain a full box outline (outline_line_color=INK_SOFT) — style
    guide mandates removing top and right spines (L-shaped frame default); set outline_line_color=None
    and use axis line styling
  - No ColumnDataSource used; bokeh library guide explicitly recommends it for flexibility
    — wrap scatter data in ColumnDataSource(data={...}) and use source= parameter
  - No HoverTool despite Bokeh being an interactive library — Cook's distance or residual
    values on hover would be a distinctive Bokeh feature leveraging the interactive
    HTML output
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 across all four panels and the title header area — correct theme surface.
      Chrome: Top header "diagnostic-regression-panel · bokeh · anyplot.ai" in dark #1A1A17 text, clearly readable. Each panel subplot title (22pt bold) and axis labels (18pt) rendered in dark INK tokens. Tick labels in muted INK_SOFT (#4A4A44). All text clearly readable against the light background.
      Data: Scatter points in #009E73 (Okabe-Ito pos 1 teal-green), LOWESS/reference lines in #D55E00 (pos 2 orange), Cook's distance contours in #0072B2 (pos 3 blue). Observation labels "0", "1", "71" visible near influential points in each panel. Panel 4 legend has styled background (ELEVATED_BG #FFFDF6).
      Legibility verdict: PASS — no light-on-light failures, all elements distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 across all panels and header — correct dark theme surface.
      Chrome: Header text rendered in light color (INK token = #F0EFE8 in dark theme), clearly readable. Panel titles, axis labels in light INK tokens. Tick labels in lighter INK_SOFT (#B8B7B0). Legend background uses ELEVATED_BG #242420 with light label text. No dark-on-dark failures detected anywhere in the render.
      Data: Scatter points remain #009E73 (identical to light render), LOWESS/reference lines remain #D55E00, Cook's contours remain #0072B2 — confirming Okabe-Ito positions 1-7 are theme-invariant as required.
      Legibility verdict: PASS — all text readable against dark background, no chrome inversion failures.
