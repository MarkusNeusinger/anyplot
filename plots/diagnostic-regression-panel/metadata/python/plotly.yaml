review:
  strengths:
  - 'Full spec compliance: all four diagnostic subplots (Residuals vs Fitted, Normal
    Q-Q, Scale-Location, Residuals vs Leverage) with LOWESS smoothers, Cook''s distance
    contours at 0.5 and 1.0, and consistent top-3 influential point annotations across
    all panels'
  - 'Robust statistical implementation: OLS via normal equations, hat-matrix leverage
    via einsum, internally studentized residuals, correct Cook''s distance formula
    — no sklearn/statsmodels shortcuts for the core statistics'
  - 'Correct theme adaptation in both renders: PAGE_BG, INK, INK_SOFT, INK_MUTED and
    GRID tokens applied throughout; tick labels, axis titles, subplot annotations,
    and marker edges all switch correctly between light and dark'
  - 'Okabe-Ito palette used properly: #009E73 scatter points, #D55E00 LOWESS lines,
    #CC79A7 Cook''s contours — three distinct categorical roles with correct order'
  - Square 3600×3600 px canvas (scale=3) appropriate for the symmetric 2x2 grid; font
    sizes explicitly set at all levels (title 28px, axis labels 22px, ticks 18px,
    subplot titles 20px)
  weaknesses:
  - 'DE-01/DE-03: Top-3 influential points are labeled with text but look identical
    to all other scatter points — differentiate them visually (e.g., #D55E00 fill,
    larger size, or white outline) so the eye is immediately drawn to the most influential
    observations and the plot tells its story without requiring the viewer to hunt
    for the labels'
  - 'DE-01: LOWESS smoother lines (width=2.5) are thin relative to the canvas size;
    bumping to 3.5–4 would make the trend signal more visually dominant and give the
    panel stronger typographic hierarchy between data layer and smoother layer'
  - 'DE-02: Tick marks are still present; removing them (ticklen=0) while keeping
    tick labels would reduce visual noise. The L-shaped frame is good but could go
    further by removing the bottom spine as well for a floating-axis aesthetic'
  - 'CQ-01: Small cook_contour() helper function present — flatten into inline statements
    (called only twice, trivial lambda) to conform to the no-functions KISS requirement'
  - 'VQ-01: Annotation text at 16px is marginally small for a 3600×3600 px render;
    18px would match the tick label size and be more legible'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, fills the entire 3600x3600 canvas.
      Chrome: Title "diagnostic-regression-panel · plotly · anyplot.ai" in dark ink, clearly readable. Subplot titles ("Residuals vs Fitted", "Normal Q-Q", "Scale-Location", "Residuals vs Leverage") in dark text at ~20px. Axis labels and tick labels all dark and readable against the off-white background. No light-on-light issues.
      Data: Scatter points in #009E73 (green) with 0.70 opacity and faint PAGE_BG edge — consistent across all four panels. LOWESS smoother lines in #D55E00 (orange) visible in subplots 1 and 3. Dashed reference lines in INK_SOFT (dark gray). Cook's distance contours in #CC79A7 (pink-purple dotted) in subplot 4, visible at the right side of the Residuals vs Leverage panel. Annotation labels ("45", "2", "85") appear as plain text next to their respective points.
      Layout: 2x2 grid with adequate horizontal (0.11) and vertical (0.17) spacing. Subplots are well-proportioned. All axis labels and tick marks fit within margins.
      Legibility verdict: PASS — all text is readable against the light background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface. The warm near-black fills the canvas correctly.
