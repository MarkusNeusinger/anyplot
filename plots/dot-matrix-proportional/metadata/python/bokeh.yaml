review:
  strengths:
  - 'Correct Okabe-Ito palette with #009E73 as first series, matching canonical order
    across all 4 categories'
  - Perfect spec compliance — 20×10 grid with 200 dots, left-to-right/top-to-bottom
    fill, legend with counts and percentages
  - Both themes render correctly with warm off-white (#FAF8F1) and near-black (#1A1A17)
    backgrounds; data colors identical across themes
  - Hover tooltips showing category, count, and share percentage are a natural fit
    for this interactive Bokeh chart
  - Fully deterministic data (exercise frequency survey) with realistic proportions
    and neutral topic
  weaknesses:
  - Design Excellence is middling — the chart lacks a focal point or visual emphasis;
    the four categories are presented with equal visual weight so no story is highlighted
    for the viewer
  - Legend panel text (20pt title, 22pt labels) and title (28pt) appear visually small
    against the large 140px dots, creating a typographic imbalance — consider raising
    the title to 36pt and adding a subtitle annotation
  - DE-02 refinement is minimal beyond hiding axes/grid; adding subtle dot-gap whitespace
    or a thin grid behind the dots would add polish
  - No inter-category visual rhythm — a subtle horizontal spacer row between category
    bands would help the viewer group the dots more intuitively
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — matches the required light surface token, not pure white.
      Chrome: Title "dot-matrix-proportional · bokeh · anyplot.ai" visible at top center (dark ink on light bg). No axis labels (axes hidden — correct for dot matrix). Legend panel on right shows "n = 200 respondents" title and four category entries with counts/percentages. All text is readable against the light background; however the 28pt title and 22pt legend labels appear small relative to the large 140px dots — a typographic imbalance but not a legibility failure.
      Data: 200 dots in a 20×10 grid. First band (top 3 rows) is #009E73 brand green (Daily, 52 dots). Second band is #D55E00 vermillion (3–5 times/week, 74 dots). Third band is #0072B2 blue (1–2 times/week, 46 dots). Bottom-right corner is #CC79A7 reddish purple (Rarely/Never, 28 dots). Dots have a thin PAGE_BG border for visual separation. Left-to-right, top-to-bottom fill is correct.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — matches the required dark surface token, not pure black.
      Chrome: Title and legend text flip to light colors correctly. No dark-on-dark failures — all text renders as light ink on the near-black background. Legend box uses the elevated dark token (#242420) with appropriate border.
      Data: All four dot colors (#009E73, #D55E00, #0072B2, #CC79A7) are visually identical to the light render — only the chrome flips. White dot gaps use the PAGE_BG dark token so they blend into the background, maintaining clean dot separation.
      Legibility verdict: PASS
