    25°C. The x-axis is labeled "Time (days)" from 0 to 30. The title reads "Sensor
    Calibration Forecast · band-basic · plotnine · pyplots.ai". Background is white
    with very subtle horizontal grid lines (alpha=0.2). No vertical grid lines. Thin
    dark axis lines on left and bottom edges. Clean, minimal aesthetic.'
