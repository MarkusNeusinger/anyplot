  image_description: The plot displays a band chart showing sensor temperature readings
    over 10 seconds with a 95% confidence interval. A light steel-blue semi-transparent
    band (alpha ~0.2) represents the confidence interval boundaries, widening progressively
    from left to right to illustrate growing uncertainty. A bold rust-orange center
    line (#C75B2E) traces a sinusoidal-plus-linear trend through the band, ranging
    from ~0°C to ~6°C. The x-axis is labeled "Time (s)" ranging from -0.5 to 11, and
    the y-axis is labeled "Temperature (°C)" ranging from -2 to 10. The title "band-basic
    · letsplot · pyplots.ai" appears at the top left. A gray text annotation "Growing
    uncertainty →" appears in the upper-right area. The background uses a minimal
    theme with subtle light-gray major gridlines and no minor gridlines. Overall the
    layout is clean and well-proportioned on a 16:9 canvas.
