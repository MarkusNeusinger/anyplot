review:
  strengths:
  - Soil moisture 95% CI context is realistic and domain-appropriate with a meaningful
    wilting-point reference threshold
  - First series correctly uses Imprint brand green (#009E73); all series use Imprint
    palette in canonical order
  - Correct 3200×1800 canvas with explicit font sizes throughout the Style object
  - Closed-polygon technique cleverly implements a band chart within pygal XY — a
    library-appropriate workaround
  - 'Clean reproducible code: np.random.seed(42), KISS structure, both PNG and HTML
    output'
  weaknesses:
  - Center line (Sensor Mean) has limited visual contrast against the confidence band,
    especially in dark render where lavender on dark-forest-green makes the center
    trace barely distinguishable — increase stroke width or use a higher-contrast
    series position
  - 'stroke_style={"color": ...} in pygal chart.add() does not override series palette
    colors; wilting point renders as blue (palette position 3) instead of the intended
    semantic red (#AE3030) — research using the "color" argument directly in chart.add()
    to assign series colors independently'
  - Y-axis grid lines are dashed/dotted (pygal default) whereas the style guide specifies
    solid thin lines — override with SVG-level CSS if possible
  - js=[] removes pygal.js and disables interactive tooltips in the HTML output —
    omit this flag (or set js to the standard pygal CDN path) so the HTML render preserves
    interactivity
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "band-basic · python · pygal · anyplot.ai" in dark ink, spans ~60% of canvas width; Y-axis label "Soil Moisture (%)" rotated, readable; X-axis label "Time (hours)" prominent; tick labels at 0h–48h visible; Y-axis shows 20.0% and 40.0% labels; dashed horizontal guide lines subtle and unobtrusive
      Data: Mint-green (#009E73 at 25% opacity) confidence band fills most of the canvas; thin lavender (#C475FD, palette position 2) center line (Sensor Mean) traces through the band's center — visible but low-contrast against the mint green; a dashed medium-blue horizontal line (Wilting Point at 25%) crosses the lower portion of the plot; legend at bottom with 3 entries, all readable
      Legibility verdict: PASS — all text elements are readable; center line visible though not prominently so

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title, axis labels, and tick labels all render in light/white ink, clearly readable against the dark surface; legend text readable
      Data: Confidence band appears as a dark forest green (opacity blending of #009E73 at 25% over dark bg = darker, denser look than light render); center lavender line is visible but low-contrast against the dark forest green band — noticeably harder to trace than in light render; wilting point dashed line renders as a light steel-blue/gray, visible but not prominent; data colors are identical to light render (Imprint palette positions 1–3)
      Legibility verdict: PASS — no dark-on-dark failures; all chrome elements are light-colored; center line visibility is functional but suboptimal in dark mode
