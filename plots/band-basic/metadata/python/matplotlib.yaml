review:
  strengths:
  - Gradient confidence band via pcolormesh with Gouraud shading is a sophisticated
    matplotlib-native technique that beautifully communicates probability mass distribution
    across the CI
  - Path effects glow on the center forecast line adds depth and visual hierarchy
    without cluttering
  - 'Full theme-adaptive chrome: both light and dark renders correctly and completely
    styled with no dark-on-dark or light-on-light failures'
  - Asymmetric CI (wider upper tail) adds domain realism and makes the data scientifically
    plausible for extended-range temperature forecasting
  - Threshold annotation provides a clear narrative anchor guiding the viewer to the
    key insight
  - 'Clean code structure: all imports used, seed set, correct canvas size (3200x1800),
    no bbox_inches=''tight'''
  weaknesses:
  - DE-01 is 'strong design' territory (5/8) but not yet publication-ready; the gradient
    technique is impressive yet overall composition could push further toward FiveThirtyEight
    level
  - Annotation at minimum 8pt font may be slightly small at mobile scale (~400px width
    rendering); consider 9pt
  - plt.tight_layout() used instead of fig.tight_layout() — minor idiomaticity concern
