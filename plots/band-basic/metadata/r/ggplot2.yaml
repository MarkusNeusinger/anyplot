review:
  strengths:
  - Correct band plot implementation using idiomatic ggplot2 geom_ribbon + geom_line
    layer composition
  - 'Both light and dark themes render correctly with proper background colors (#FAF8F1
    / #1A1A17) and fully readable chrome'
  - 'Imprint palette correctly applied — brand green #009E73 used for both band fill
    and center line'
  - Realistic temperature forecast dataset with widening 95% CI uncertainty over 60
    months, effectively demonstrating the band plot's primary use case
  - Canvas dimensions correct (3200x1800, landscape), proper ragg device usage, set.seed(42)
    for reproducibility
  - Selective horizontal-only grid (no vertical grid lines) and removed panel border
    show deliberate design choices
  weaknesses:
  - Band fill and center line use the same color (#009E73) — spec says 'contrasting
    color/style'; a different color for the center trend line (e.g. INK or a second
    Imprint palette color) would improve readability and spec fidelity
  - No legend or annotation explaining what the band represents (95% confidence interval
    / forecast uncertainty) — makes the plot harder to interpret for catalog viewers
  - 'Band fill has reduced visual weight in dark render: alpha=0.25 of #009E73 on
    #1A1A17 renders as a very dark greenish fill (~#143B30), making the band less
    visually prominent compared to the light render'
  - Design Excellence is template-level — no visual hierarchy emphasis, no annotation
    callout, no subtitle providing context for the seasonal temperature forecast story
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — PASS
      Chrome: Title "band-basic · r · ggplot2 · anyplot.ai" in dark ink at top-left, clearly readable. Y-axis label "Temperature (°C)" rotated, dark ink, readable. X-axis label "Forecast Horizon" readable. Tick labels ("Year 1"–"Year 5" on x; "5"/"10"/"15"/"20"/"25" on y) rendered in muted dark (#4A4A44), clearly legible. Horizontal grid lines in soft ink, subtle. Axis lines on left and bottom edges.
      Data: Semi-transparent green band (alpha=0.25, #009E73) fills the confidence interval; a solid dark green line (#009E73) traces the central forecast trend. Seasonal oscillation clearly visible over 5 years with widening band amplitude over time. No markers on data points (continuous line/ribbon). First (and only) series correctly uses brand green #009E73.
      Legibility verdict: PASS — all text elements are readable against the off-white background. No "light on light" failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — PASS
      Chrome: Title "band-basic · r · ggplot2 · anyplot.ai" in light text (#F0EFE8), clearly readable. Y-axis and X-axis labels in light text, readable. Tick labels rendered in muted light (#B8B7B0), legible. Horizontal grid lines visible against dark background. No dark-on-dark failures detected.
      Data: Center line (#009E73 full opacity) appears as a vivid/bright teal-green on the dark background, very prominent. Band fill (#009E73 at alpha=0.25) on #1A1A17 background renders as a dark greenish fill (~#143B30) — visually distinguishable from the background but significantly less prominent than in the light render. Data colors are identical between renders (same hex values); only chrome flips.
      Legibility verdict: PASS — all title, axis, and tick labels are readable in light text on dark background. Band is visible but has reduced visual weight in dark mode.
