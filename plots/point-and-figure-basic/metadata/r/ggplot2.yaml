review:
  strengths:
  - Correct P&F algorithm with X/O columns and reversal logic
  - Excellent idiomatic ggplot2 using geom_text with label aesthetic for symbol rendering
  - Perfect theme adaptation — both light and dark renders are fully readable
  - 'Okabe-Ito palette correctly applied: green (#009E73) for X/bullish, orange (#D55E00)
    for O/bearish'
  - Monospace font family for X/O symbols adds authentic P&F visual feel
  - guides() with override.aes elegantly customizes legend to show actual X/O glyphs
  - Realistic fictional stock scenario with plausible price movements and multi-phase
    trends
  weaknesses:
  - Missing 45-degree trend lines (support and resistance) — spec Notes section explicitly
    requires them; they would connect ascending lows (bullish) and descending highs
    (bearish) at 45 degrees across the column grid
  - 'SC-02 penalty: no trend lines means a key P&F feature is absent from the visualization'
  - DE-03 storytelling limited without trend lines — they would highlight the key
    insight of support/resistance levels
  - Right portion of chart (columns 7-9) is sparse which creates visual imbalance,
    though this is data-driven
