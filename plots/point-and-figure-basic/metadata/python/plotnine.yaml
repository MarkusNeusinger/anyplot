review:
  strengths:
  - Correct P&F implementation with proper X/O columns, 3-box reversal logic, and
    price-level Y-axis
  - 'Okabe-Ito palette correctly applied: #009E73 for rising X columns and #D55E00
    for falling O columns'
  - 'Fully theme-adaptive chrome: all background, text, grid, and legend tokens flip
    correctly between light and dark'
  - coord_fixed() ensures correct P&F aspect ratio; guide_legend override_aes cleanly
    generates legend from invisible geom_point trick
