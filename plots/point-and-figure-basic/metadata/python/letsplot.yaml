review:
  strengths:
  - Full theme-adaptive chrome (PAGE_BG, INK, INK_SOFT) applied to all elements, working
    correctly in both light and dark renders.
  - Correct P&F algorithm with 3-box reversal, drop_duplicates guard, and proper column
    indexing ensuring no mixed-symbol columns.
  - layer_tooltips() with formatted .line() chains is a genuine letsplot-specific
    feature that enriches the HTML output with hover data (column, price, signal).
  - Dual 45-degree trend lines via geom_abline with +/- box_size slope correctly implement
    P&F charting convention.
  - Clean code structure with linear flow; algorithm complexity is appropriate and
    unavoidable for this chart type.
  weaknesses:
  - Y-grid lines appear at default tick intervals (~$20 apart) rather than at $2 box-size
    intervals — use scale_y_continuous(breaks=...) with multiples of box_size to align
    grid with P&F boxes.
  - Columns 0-2 are visually crowded because early price oscillations produce short
    columns with overlapping price ranges; consider increasing canvas width or column
    spacing.
  - Ascending support trend line (geom_abline) extends into empty lower-left space
    well below the actual data — replace with geom_segment clipped to the data column
    range to avoid wasted canvas.
  - 'Design lacks publication polish: title is not bold, panel margins are tight,
    and the overall aesthetic is functional but not refined.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "point-and-figure-basic · python · letsplot · anyplot.ai" in dark ink (#1A1A17), filling ~70% of width. Axis labels "Column (Reversal Number)" and "Price ($)" in dark ink. Tick labels in INK_SOFT (#4A4A44). All text clearly readable.
      Data: Green (#009E73) X markers form bullish columns; orange (#D55E00) O markers form bearish columns, stacked vertically by price level across ~22 column indices. Two dashed trend lines in INK_SOFT. Y-only grid, subtle (size=0.2). Price range ~$80–$155.
      Legibility verdict: PASS — all text elements visible and readable against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels in light cream (#F0EFE8); tick labels in #B8B7B0. All text clearly readable against the dark surface. NO dark-on-dark failures observed.
      Data: Colors are identical to light render — green (#009E73) X's and orange (#D55E00) O's are unchanged. Dashed trend lines visible in muted INK_SOFT tone. Horizontal grid lines subtle but perceptible.
      Legibility verdict: PASS — all chrome adapts correctly; no black-text-on-dark-background failures.
