review:
  strengths:
  - 'Perfect theme adaptation: INK/INK_SOFT tokens applied consistently across title,
    labels, ticks, spines, and grid in both light and dark renders'
  - Excellent dual encoding (shape + color) for X vs O markers — CVD-safe and unambiguous
  - 'Correct P&F calculation: 3-box reversal, $2 box size, alternating X/O columns,
    no mixed-direction columns'
  - Box-aligned Y-axis ticks using np.arange with box_size*2 interval is an appropriate
    domain-specific detail
  - Clean code structure with P&F algorithm clearly separated from plotting logic
  weaknesses:
  - 'Missing trend lines: spec explicitly requires support trend lines (45° ascending
    lows) and resistance trend lines (45° descending highs) drawn with dashed lines
    — these are absent'
  - 'No seaborn distinctive features: implementation is effectively matplotlib with
    seaborn scatterplot calls; should use hue+style dual-encoding via sns.scatterplot
    for direction'
  - 'No data storytelling or visual hierarchy: no emphasis on key reversal points,
    trend breakouts, or notable price levels — viewer must interpret raw symbols with
    no analytical guidance'
