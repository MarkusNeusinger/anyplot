  image_description: 'The plot displays a 10x10 heatmap representing an actuarial
    loss development triangle. Rows show accident years (2015-2024) on the y-axis;
    columns show development periods (1-10) on the x-axis positioned at the top. Each
    cell contains a cumulative claims value formatted with thousands separators (e.g.,
    "4,299", "20,967", "40,038"). The color scheme is a sequential blue palette -
    light blue for lower values (~4,000) transitioning to deep navy for higher values
    (~40,000). A colorbar on the right is labeled "Cumulative Claims ($K)". The upper-left
    triangle (actual/observed values) appears at full opacity, while the lower-right
    triangle (projected/IBNR estimates) is rendered at reduced opacity (0.65), creating
    a visible but subtle distinction. White cell borders separate each rectangle.
    Below the heatmap, two text lines show: (1) all nine age-to-age development factors
    (F1-2: 2.500 through F9-10: 1.008), and (2) an opacity legend note. The title
    reads "Actuarial Loss Development Triangle · heatmap-loss-triangle · bokeh · pyplots.ai".'
