review:
  strengths:
  - 'Complete spec compliance: all 8 required features implemented in both themes'
  - Imprint sequential colormap correctly implemented with manual interpolation for
    a library without native cmap support
  - Color-adaptive per-cell text (luminance-based) prevents unreadable text on any
    cell in either theme
  - SVG-native features (linearGradient colorbar, pattern hatching) are distinctive
    to pygal and well-executed
  - Realistic insurance data with authentic development patterns and seed-controlled
    noise
  weaknesses:
  - 'CQ-01: Class with multiple helper methods (_lerp_color, _value_to_color, _ink_for_bg,
    _plot, _compute) departs from KISS flat structure — could be partially flattened'
  - 'VQ-02/legend: Three-part bottom legend cramped within fixed 610px width; Evaluation
    Date text may clip on smaller renders — increase lgw_total or reduce lgf'
  - 'DE-02: Dev factor labels placed at column position j (0-indexed) rather than
    between columns j and j+1 — offset by cw/2 + gap/2 for correct alignment'
