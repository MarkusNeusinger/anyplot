review:
  strengths:
  - 'Excellent spec compliance — all required features implemented: hatching overlay,
    dev factors row, evaluation-date diagonal, SVG gradient colorbar, three-item legend'
  - Sophisticated custom pygal Graph subclass with direct SVG node rendering — correct
    approach for a chart type pygal has no built-in for
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) for continuous sequential data'
  - 'Perfect data quality: realistic actuarial loss triangle with 10 accident years
    × 10 dev periods, seeded noise, weighted chain-ladder dev factors'
  - 'Clean code: np.random.seed(42), only necessary imports, proper output (plot-{THEME}.png
    + plot-{THEME}.html), correct title format'
  weaknesses:
  - 'Dark-mode projected cell text contrast is too low: _ink_for_bg() blends the cell
    color with PAGE_BG (#1A1A17) at opacity=0.52, producing an effective blended luminance
    ~67 (0-255 scale), then returns ELEVATED_BG (#242420 near-black) as the text color.
    Near-black text on a dark teal cell gives ~12% brightness difference — far below
    readable contrast. Fix: when blended luminance < 140 in dark mode, return INK
    (#F0EFE8 light cream) rather than ELEVATED_BG so projected cell values stay legible
    against the dark blended background.'
  - 'Design excellence is utilitarian rather than polished: the legend, dev-factor
    row, and colorbar labels use identical font sizes with no visual weight hierarchy.
    Consider slightly larger colorbar label, bolder dev-factor label, and a subtle
    divider or whitespace increase between the grid and the legend to add breathing
    room.'
  - Colorbar labels are tight against the right canvas edge (lmr=195 px reserved but
    labels start at cbx+cbw+10 ≈ cbx+42 and run up to ~90 px wide for '6,951'). In
    some viewport sizes the rightmost digit may crowd the margin. Consider increasing
    lmr to 220 or adding a small right padding so '6,951' sits comfortably.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct.
      Chrome: Title "heatmap-loss-triangle · python · pygal · anyplot.ai" is clearly visible at top in dark ink. Column headers (1–10) and row labels (2015–2024) are bold and readable. "Development Period (Years)" header above the grid and rotated "Accident Year" Y-axis label are both legible. Dev Factor values and legend text at bottom are small but readable. Colorbar "Cumulative ($k)" label and tick values (6,951 → ~639) are visible on the right.
      Data: Color gradient runs from bright brand green (#009E73) for low cumulative amounts to steel blue (#4467A3) for high amounts — correct imprint_seq. Actual cells (lower-left triangle) are fully opaque with cell values annotated in dark ink. Projected cells (upper-right triangle) use 52% opacity + diagonal hatch pattern + dashed border, clearly distinguishable. Dashed diagonal evaluation-date line visible. Legend correctly shows Actual / Projected / Evaluation Date swatches.
      Legibility verdict: PASS — all text elements readable against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title visible in light cream. Column and row headers visible. Axis labels ("Development Period (Years)", "Accident Year") readable in light ink. Colorbar labels visible.
      Data: Color palette identical to light render (green→blue gradient, same data pattern). Actual cells appear with correct colors. Projected cells rendered with 52% opacity — on the dark background this makes the blended cell color much darker (effective dark teal/green), yet the _ink_for_bg() function returns ELEVATED_BG (#242420 near-black) as the text color because blended luminance (~67 on 0–255 scale) falls below the 140 threshold. This creates near-black text on dark teal cell, giving very low contrast (~12% brightness difference). Projected cell values are noticeably harder to read than actual cell values.
      Legibility verdict: PARTIAL FAIL — actual cell values readable; projected cell values have insufficient contrast in dark mode due to dark-on-dark text color selection in _ink_for_bg(). No other chrome elements are affected.
