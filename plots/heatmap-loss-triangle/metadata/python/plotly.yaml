review:
  strengths:
  - 'Spec coverage is exemplary: all required features implemented (diagonal separator,
    amber IBNR overlay, dev factors row, boundary cell highlighting, cell annotations
    with thousands separator)'
  - Typographic distinction between actual (Arial Black bold) and projected (regular
    Arial) cells is a thoughtful and spec-appropriate design choice
  - Correct use of imprint_seq colorscale and amber semantic anchor for projected
    region
  - Dev-factors row below the x-axis adds analytical depth and directly supports the
    chain-ladder use case
  - Plotly interactive hover with customdata properly surfaces accident year and development
    period on hover
  weaknesses:
  - 'Dark-on-dark: boundary cell annotations use hardcoded font_color "#1A1A17" for
    cells where relative <= 0.5, but bgcolor = ELEVATED_BG is "#242420" in dark mode
    — both near-black. Fix: use INK token instead of hardcoded "#1A1A17" so low-value
    boundary cells get "#F0EFE8" in dark mode'
  - Cell annotation font size (8px) renders as 32 source pixels on the 2400x2400 canvas
    — marginal at mobile-scaled widths. Consider increasing to 9-10px
