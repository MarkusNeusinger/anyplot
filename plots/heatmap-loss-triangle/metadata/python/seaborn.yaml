review:
  strengths:
  - Dual-layer heatmap technique with mask= parameters cleanly separates actual from
    projected cells — idiomatic and effective seaborn approach
  - Adaptive annotation text colors based on cell brightness improves readability
    across the full color gradient
  - Correct imprint_seq colormap and fully theme-adaptive chrome in both renders
  - Realistic actuarial data with decreasing development factors (2.50→1.008) that
    mirror real chain-ladder patterns
  - Dev factors box styled with monospace font and rounded corners adds professional
    polish
  weaknesses:
  - Legend placed inside the heatmap area (loc='lower right') overlaps the projected
    cells in rows 2022–2024 / columns 8–10, obscuring annotations in those cells —
    move legend outside the heatmap (e.g., bbox_to_anchor=(1.18, 0.5), loc='center
    left') or place it above/below
  - Cell annotation format uses K abbreviation (e.g., '11K', '16K') for values ≥ 10,000
    instead of thousands separator as specified — the spec says 'formatted with thousands
    separator', so all annotations should use comma-separated format (e.g., '11,000')
  - Development factors row is placed above the heatmap instead of between/below column
    headers as the spec suggests — consider placing them as a row below x-axis tick
    labels or between the column headers and the heatmap
  - 'Design Excellence ceiling: no explicit visual hierarchy distinguishing the diagonal
    (latest-evaluation boundary) between actual and projected — adding a bold diagonal
    line or annotation would improve storytelling (DE-03)'
  - 'DE-01 could be stronger: the two seaborn heatmap calls producing slight visual
    duplication (same colormap drawn twice) vs a single-call solution with post-hoc
    hatching could reduce complexity while preserving the effect'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "heatmap-loss-triangle · python · seaborn · anyplot.ai" at top in dark ink, fully readable. Y-axis label "Accident Year" and X-axis label "Development Period (Years)" both dark and legible. Year tick labels (2015–2024) and development period tick labels (1–10) clearly visible. Dev factors box above the heatmap in monospace dark text on slightly elevated background.
      Data: imprint_seq colormap (green #009E73 to blue #4467A3) encodes magnitude. Actual cells (upper-left triangle) show solid colors with bold annotations. Projected cells (lower-right triangle) show hatched overlay with italic annotations. Colorbar on right labeled "Cumulative Claims ($K)". Legend in lower-right showing "Actual" (green patch) and "Projected (IBNR)" (blue hatched patch). Legend overlaps bottom-right projected cells slightly.
      Legibility verdict: PASS — all text readable, but legend placement obscures ~3 bottom-right cell annotations.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, tick labels all rendered in light ink — clearly readable against dark background. Dev factors box text is light on dark elevated background. No dark-on-dark text failures detected. Colorbar labels in light ink. Legend text in light ink.
      Data: Data colors are identical to the light render — imprint_seq green-to-blue gradient unchanged between themes. Hatching pattern on projected cells remains visible. Cell annotations remain readable (white for high-value cells, light ink for low-value cells, via adaptive coloring logic).
      Legibility verdict: PASS — both themes render correctly with full readability.
