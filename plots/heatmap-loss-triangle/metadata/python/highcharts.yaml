      Data: Sequential Imprint colormap from brand green (#009E73, low values) to blue (#4467A3, high values); each cell annotated with comma-separated value (e.g., "3,299", "17,739"); actual cells have bold data labels and background-colored borders; projected (IBNR) cells have italic data labels and subtle 5px amber (#DDCC77) borders; amber border faintly visible on lower-right projected triangle; age-to-age factors displayed as boxed annotations below grid
