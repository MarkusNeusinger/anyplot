review:
  strengths:
  - Excellent use of Highcharts chart.renderer SVG API to render age-to-age development
    factor boxes as custom elements below the heatmap grid — technically sophisticated
    and distinctive
  - Dual data-label strategy (bold for actual cells, italic for projected cells) combined
    with theme-adaptive JS callbacks handles both light and dark themes correctly
  - 'Imprint sequential colormap (#009E73 → #4467A3) correctly applied as colorAxis;
    threshold-based contrast logic (light label on dark cells, dark label on light/green
    cells) works in both themes'
  - Theme-adaptive chrome fully implemented — INK and INK_SOFT tokens flip correctly,
    projected-cell amber borders are more visible against the dark background
  - Realistic actuarial data with properly decreasing chain-ladder development factors
    (2.162, 1.446, 1.207, 1.112, …) that converge toward 1.0 at the tail
  weaknesses:
  - The 5px amber border on projected cells is subtle in the light theme and may be
    hard to distinguish at smaller viewing sizes. Consider adding a semi-transparent
    amber overlay tint or a diagonal hatch pattern to projected cells to make the
    actual/projected boundary more immediately obvious, per spec's suggestion of 'different
    background colors or hatching'
  - The bottom section (age-to-age development factor boxes + legend items) is somewhat
    vertically cramped. Increasing marginBottom or adding explicit spacing between
    the factor row and the custom legend would improve readability
