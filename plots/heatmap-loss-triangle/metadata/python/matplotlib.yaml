  strengths:
  - 'Perfect spec compliance: all required actuarial features present (actual/projected
    triangle, hatching, cell annotations, development factors, colorbar, legend)'
  - Dual encoding (color gradient + hatching) for actual vs. projected provides both
    aesthetic distinction and accessibility
  - Brightness-adaptive cell text color logic is conceptually correct and handles
    the imprint_seq range appropriately
  - Correct imprint_seq colormap selection for single-polarity continuous data; both
    theme renders are correct
  - 'Clean code structure: no over-engineering, deterministic seed, explicit font
    sizes throughout'
  - Development factors on twin X-axis enhance data storytelling for the actuarial
    domain
  weaknesses:
  - 'Cell annotation text uses PAGE_BG for all cells (both imprint_seq endpoints have
    brightness < 0.5), resulting in near-black text in dark mode on medium-green/blue
    cells at marginal 3.4-3.7:1 contrast for 7pt text. Fix: use INK (light cream)
    as the dark-cell text color in dark mode.'
  - 'Top of plot is slightly crowded: title pad=30 and twin-axis label (Age-to-Age
    Dev. Factors LDF) compete for vertical space. Fix: reduce title pad or increase
    top subplots margin to 0.92-0.93.'
  - 'Hatching edgecolor=PAGE_BG means near-black hatch lines on medium-colored cells
    in dark mode, reducing hatch visibility. Fix: use INK_SOFT for hatching in dark
    mode or make hatch color theme-adaptive.'
  - 'No focal-point emphasis on the diagonal or IBNR region. Fix: add a subtle alpha
    overlay on projected triangle or thicker border on diagonal cells to direct viewer
    attention.'
