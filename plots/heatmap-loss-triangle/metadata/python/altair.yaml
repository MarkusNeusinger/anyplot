    direct chain-ladder context within the chart canvas — matches spec requirement
  - Smart dual-legend placement (color gradient on right, status legend at bottom)
    avoids crowding and uses available canvas space efficiently
  - 'Cell text contrast adapts to cell luminance via alt.when() conditional encoding:
    dark-background cells get PAGE_BG text, light-background cells get INK text'
  - 'All seven required spec features present and working: triangular structure, actual/projected
    distinction, color-intensity encoding, cell annotations, dev factors, legend,
    dashed IBNR boundary'
  weaknesses:
  - 'In dark mode, cells where Cumulative Amount > 55% of max use PAGE_BG (#1A1A17,
    near-black) as text color on medium-blue (#4467A3) backgrounds — computed contrast
    ~3.1:1, borderline WCAG AA. Consider using a fixed light color (INK = #F0EFE8)
    for all cell text in dark mode, or compute contrast from actual cell hex rather
    than magnitude threshold.'
  - Inner view dimensions (width=360, height=380) are noticeably smaller than the
    altair.md canonical recommendation (width=500, height=460) for square format.
    The canvas gate passed via PIL padding but the chart occupies less of the 2400×2400
    canvas than optimal. Increase inner view to width=480-500, height=440-460 (with
    compensating reduction in padding if needed) so the chart is more impactful.
  - Status legend fixed fill color (symbolFillColor=IMPRINT_SEQ_START=#009E73) represents
    only the low-value end of the sequential colormap, whereas actual cells span the
    full gradient. Minor visual inconsistency — consider using a mid-point color or
    leaving it as-is with a note that it is illustrative.
