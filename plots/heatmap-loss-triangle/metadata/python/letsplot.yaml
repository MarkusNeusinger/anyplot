review:
  strengths:
  - 'Perfect spec compliance: all required features (triangular structure, actual/projected
    differentiation, cell annotations, factor row, legend) correctly implemented.'
  - Semantically correct use of ANYPLOT_AMBER for the projected/IBNR region — matches
    its warning/caution role precisely.
  - Clever text-color contrast split (white vs. INK tokens) across the gradient ensures
    cell annotation readability on both dark and light cells.
  - flavor_darcula() as the dark-theme base layer is a library-exclusive feature used
    appropriately.
  - Factor row with ELEVATED_BG is visually well-differentiated from the data triangle.
  - Both themes render correctly with no dark-on-dark failures.
  weaknesses:
  - 'Cell annotation text (geom_text size=3.5) is too small for mobile readability
    (400px viewport): at that scale each cell is ~20-25px and the text becomes near-illegible.
    Increase to size=4.5-5.0.'
  - Axis titles at size=18 (bold) are oversized relative to the style-guide recommendation
    (12px for scale-based lets-plot). While readable, they dominate the axis slightly.
    Reduce axis_title to size=14, axis_text to size=12.
  - 'Design Excellence lacks a strong focal point: the amber projected-region boundary
    is good structural storytelling, but the plot could guide the viewer more explicitly
    — e.g., a subtle annotation on the latest-diagonal or a brief callout on the highest
    IBNR estimate.'
  - 'No spine/panel border removal: adding panel_border=element_blank() and removing
    axis_line for a clean floating-grid aesthetic would improve DE-02.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "heatmap-loss-triangle · python · letsplot · anyplot.ai" in bold dark ink (INK=#1A1A17); italic subtitle "Chain-Ladder Loss Triangle · Actual (grey border) vs Projected (amber border)"; axis labels "Development Period (Years)" and "Accident / Origin Year" in bold dark ink; tick labels for years/periods in INK_SOFT (#4A4A44). All chrome elements clearly readable.
      Data: 10x10 triangular heatmap with imprint_seq green (#009E73) to blue (#4467A3) gradient encoding cumulative claims. Actual cells have thin grey borders (INK_SOFT); projected IBNR cells have amber/gold borders (ANYPLOT_AMBER=#DDCC77) at alpha=0.75. Each cell annotated with comma-formatted number; white text on high-value cells, dark INK text on low-value cells. Factor row at bottom on elevated cream background (#FFFDF6) with bold factor labels. Legend shows Cumulative Claims ($) colorbar and Cell Region squares (dark for Actual, amber for Projected).
      Legibility verdict: PASS — all text readable; cell annotations are small but legible at full resolution; potential mobile readability concern at 400px scale.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title, subtitle, axis labels, tick labels all rendered in light cream/off-white tones (INK=#F0EFE8, INK_SOFT=#B8B7B0). Legend box elevated to #242420. All chrome adapts correctly to dark theme — no dark-on-dark failures.
      Data: Gradient colors identical to light render (green-to-blue unchanged). Amber borders for projected cells remain clearly visible on the dark background. Factor row elevated background (#242420) still distinguishable from main triangle (#1A1A17). Cell Region legend: grey square (INK_SOFT in dark=#B8B7B0) for Actual, amber square for Projected.
      Legibility verdict: PASS — all text visible and readable; data colors identical to light render; no dark-on-dark failures.
