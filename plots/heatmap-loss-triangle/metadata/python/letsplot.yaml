review:
  strengths:
  - 'Full spec compliance: triangular matrix with actual/projected distinction, amber
    borders, factor row, color-gradient magnitude encoding, and cell annotations all
    implemented correctly.'
  - 'Clever adaptive text contrast: cell annotations split into two layers by gradient
    threshold so white text sits on dark cells and INK on light cells — ensures readability
    across the entire color range.'
  - 'Data storytelling: Peak IBNR callout annotation and factor row provide actuarial
    context and a clear focal point beyond mere data display.'
  - 'Perfect palette compliance: imprint_seq gradient (#009E73→#4467A3) for continuous
    heatmap magnitude, amber borders for projected region distinction, correct warm
    backgrounds (#FAF8F1 / #1A1A17) in both themes.'
  - 'Idiomatic letsplot usage: guide_legend(override_aes={...}) for invisible-point
    legend trick, flavor_darcula() for dark theme, scale_y_discrete(limits=y_order)
    for custom Y-axis ordering — all letsplot/ggplot2-distinctive idioms.'
  weaknesses:
  - 'Peak IBNR callout overlaps the regular cell label on the same (x, y) position:
    geom_text for df_light_text/df_dark_text places ''82,312'' (white) at the peak
    cell center, then df_peak places ''Peak IBNR\n$82,312'' (amber) at the same center
    — both are anchored identically. Fix: filter the peak cell out of df_light_text
    and df_dark_text so only the amber callout appears on that cell, OR use nudge_y
    on df_peak to shift the callout above/below the cell center without removing the
    regular label.'
  - Cell annotation font (size=4.5 mm) is adequate at full 2400×2400 resolution but
    pushes legibility limits when the plot is downscaled to mobile widths (~400 px);
    consider reducing to 3.8–4.0 mm to give more breathing room at small sizes.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "heatmap-loss-triangle · python · letsplot · anyplot.ai" in bold dark INK (#1A1A17), clearly readable. Subtitle in italic INK_SOFT. Y-axis label "Accident / Origin Year" and X-axis label "Development Period (Years)" in bold INK, both well-sized and readable. Axis tick labels (years 2015–2024 and periods 1–10) in INK_SOFT at size 12, legible. Caption "Bottom row: Age-to-Age Development Factors" at bottom in INK_MUTED.
      Data: 10×10 heatmap cells colored by imprint_seq gradient from #009E73 (brand green, low values ~8K) to #4467A3 (blue, high values ~80K). Cell labels formatted with thousands separator. Actual cells have grey/INK_SOFT borders; projected cells have amber (#DDCC77) borders at slightly increased width. Factor row at bottom has elevated #FFFDF6 background with bold INK text showing development factors 2.500→1.008→—. Peak IBNR callout in amber on the max projected cell (2022, period 9, ~82,312). Legends: "Cumulative Claims ($)" colorbar on right; "Cell Region" legend with Actual (grey square) and Projected (amber square).
      Legibility verdict: PASS — all text elements visible and readable against the warm off-white background. Minor note: Peak IBNR callout overlaps the same cell's regular numeric label (both on same (x,y) center). Text is distinguishable by color (white vs amber) but spatially confused at that one cell.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title, axis labels, and tick labels all rendered in light-colored text (INK=#F0EFE8 for primary, INK_SOFT=#B8B7B0 for secondary), clearly readable against dark background. No dark-on-dark failures observed. Legend backgrounds use ELEVATED_BG=#242420 — slightly lighter than page background, ensuring legend box is distinguishable.
      Data: Identical imprint_seq gradient (green to blue) as light render — data colors unchanged as required. Actual cell borders in INK_SOFT (#B8B7B0 in dark), projected borders in amber (#DDCC77). Factor row tiles use #242420 fill with light INK text. Peak IBNR callout in amber remains visible on dark background.
      Legibility verdict: PASS — all text readable against dark background. Data colors identical to light render. Chrome elements (text, borders, legend) correctly flip to theme-appropriate light values. No dark-on-dark failures detected.
