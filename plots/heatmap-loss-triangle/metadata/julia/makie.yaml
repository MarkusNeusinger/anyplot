review:
  strengths:
  - 'Full spec compliance — all required features present: triangular heatmap with
    actual vs projected regions, diagonal step-line boundary, cell annotations, age-to-age
    factors row, and horizontal legend'
  - Two-colormap approach (imprint_seq for actual, ochre-based gradient for projected)
    creates clear visual differentiation as the spec requires
  - 'Makie idiomatic usage: poly! with Point2f for custom cells, PolyElement for legend,
    Makie layout system (rowsize!, GridLayout)'
  - Theme-adaptive chrome correctly implemented — all text and spines use INK/INK_SOFT
    tokens, backgrounds match FAF8F1 / 1A1A17
  - Both renders pass legibility checks — title, axis labels, tick labels, and cell
    annotations all readable in both light and dark themes
  weaknesses:
  - 'ANYPLOT_PROJ gradient (cgrad([PROJ_MID, ochre])) is a third continuous colormap
    not in the approved imprint_seq / imprint_div set — VQ-07 partial. Fix: use imprint_seq
    for actual cells and imprint_div (or a hatching / stroke pattern) for projected,
    or confirm with a second ANYPLOT_SEQ variant anchored at ochre'
  - 'Displayed age-to-age factors fall below 1.0 in later periods (0.998 → 0.991 →
    0.973 → 0.917), which is physically impossible for cumulative paid losses. This
    is caused by column means mixing accident years with different ultimates rather
    than computing link ratios. Fix: compute factors as the weighted average link
    ratio (sum of col k+1 actuals / sum of col k actuals for matching year-pairs)'
  - 'CQ-01: helper functions pct_paid and fmt_val break the KISS linear structure.
    Inline the formatting with a one-liner and unroll pct_paid into the data loop'
  - 'CQ-04: dead code — `noise = THEME == "light" ? 0.0 : 0.0` always evaluates to
    0.0 and is unused; also data generation loop runs twice (first pass values are
    overwritten by second). Consolidate into a single seeded pass'
  - 'DE-01 / DE-03: visual hierarchy is functional but could be elevated — the projected
    region lacks a subtle hatching or stipple overlay to reinforce the actual/projected
    distinction beyond color alone; adding a thin crosshatch pattern on projected
    cells would make the boundary obvious even for colorblind viewers'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct, not pure white
      Chrome: title "Loss Development Triangle · heatmap-loss-triangle · julia · makie · anyplot.ai" in bold dark ink (~85–90% of canvas width, long due to descriptive prefix but no clipping); Y-axis label "Accident Year" and X-axis label "Development Period (Years)" in dark INK; tick labels (1–10, 2015–2024) in INK_SOFT — all clearly readable
      Data: actual cells (upper-left triangle) in green→blue imprint_seq gradient; projected cells (lower-right) in a cream→ochre gradient; cell annotations in white/dark depending on luminance contrast; step-line diagonal clearly delineates boundary; age-to-age factors row and horizontal legend below
      Legibility verdict: PASS — all text elements readable against warm off-white background; cell annotations legible at 9pt (effectively 18px on the 2400×2400 canvas)

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, not pure black
      Chrome: title and axis labels render in light F0EFE8 / B8B7B0 tokens — clearly visible against dark background; tick labels in INK_SOFT (B8B7B0) — readable; no dark-on-dark text failures detected
      Data: actual cell colors (green→blue) are identical to light render — Imprint data colors unchanged; projected cells show the ochre gradient, but the low-value projected cells near the diagonal boundary (e.g. row 2024, dev period 2) render in PROJ_MID = #2E2E28 which is very close to the #1A1A17 background — these cells are the least distinguishable element in the dark render, though white cell text annotations remain readable
      Legibility verdict: PASS with minor concern — all text is readable; the near-background projected low-value cells reduce element visibility slightly but do not render any text illegible
