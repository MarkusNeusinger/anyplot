review:
  strengths:
  - 'Full spec compliance: triangular heatmap with actual vs projected distinction,
    step diagonal, ATA factors row, legend — all implemented correctly'
  - Proper imprint_seq continuous colormap (t.seq[0]→t.seq[1]) for cell fills; correct
    theme chrome in both light and dark renders
  - Excellent theme adaptation — pageBg fills canvas, ink/inkSoft tokens drive all
    text; dark render has no dark-on-dark failures
  - Diagonal hatching on projected cells (globalAlpha=0.13) adds a polished visual
    cue without overwhelming the color signal
  - All font sizes explicitly set via proportional formulas; readable in both themes
    at full canvas and at mobile-scaled widths
  - Deterministic data (no RNG) from hardcoded ultimates/devPct arrays; realistic
    actuarial values with decreasing ATA factors
  - 'Clean code: minimal helpers (lerpColor, cellFill, fmtK), no classes, KISS structure'
  - Clever use of Chart.js scatter type as a transparent canvas scaffold with a custom
    plugin doing all the drawing
  weaknesses:
  - 'Library Mastery is constrained: the implementation bypasses Chart.js''s dataset/scale
    machinery and draws everything manually through the canvas 2D API — the library
    is used only as a lifecycle scaffold, not for its high-level charting features'
  - Legend uses plain solid color swatches; a gradient bar (imprint_seq full range)
    would better communicate the continuous color scale used in the cells
  - 'DE-02 not quite perfect: legend swatches and the ATA row share the same bottom
    strip with tight spacing — a small gap or divider would improve hierarchy'
  - Title fontsize (Math.round(min(w,h)*0.024) ≈ 58px) is slightly below the style-guide
    target of ~67px; acceptable but could be nudged up
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — not pure white, correct.
      Chrome: Title "heatmap-loss-triangle · javascript · chartjs · anyplot.ai" rendered in bold dark ink (#1A1A17), occupying ~70% of canvas width. "Development Period (Years)" x-axis label and rotated "Accident Year" y-axis label in inkSoft (#4A4A44). Column headers (1–10) and row headers (2015–2024) in bold dark ink — all clearly readable.
      Data: 10×10 heatmap grid with cells colored along the imprint_seq gradient (teal #009E73 → blue #4467A3). Actual (upper-left) cells are fully saturated; projected (lower-right) cells are blended toward pageBg (lighter/washed appearance) plus subtle diagonal hatching at globalAlpha=0.13. A bold step diagonal line (~2.5px) marks the actual/projected boundary. Cell values annotated in K-notation (e.g. "6K", "10K", "22K"); text color flips to pageBg on darker cells for contrast. ATA factors row below (1.733 → 1.010). Legend swatches for "Actual (Observed)" and "Projected / IBNR" at bottom.
      Legibility verdict: PASS — all text elements are readable; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — not pure black, correct.
      Chrome: Title and all axis labels render in light ink (#F0EFE8 / #B8B7B0); step diagonal is light-colored (~rgba(240,239,232,0.82)); cell borders use rgba(240,239,232,0.18). No dark-on-dark failures observed.
      Data: Cell fill colors are identical to the light render — imprint_seq teal→blue gradient unchanged; projected cells lighter + hatching with light-colored strokes (#F0EFE8 at 0.13 alpha). ATA factors and legend text both render in inkSoft tokens.
      Legibility verdict: PASS — all text readable against the near-black background; data colors identical to light render; chrome correctly flips.
