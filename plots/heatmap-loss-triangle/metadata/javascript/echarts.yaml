review:
  strengths:
  - Dual heatmap series with visualMap.seriesIndex correctly isolates the Imprint
    colormap to actual cells only — technically sophisticated and spec-correct
  - 'All theme tokens properly wired: both renders are fully theme-adaptive with no
    hardcoded chrome colors'
  - ATA factors computed and displayed inline below X-axis tick labels — adds actuarial
    technical depth without clutter
  - 'Correct //# anyplot-orientation: square directive and animation: false; all ECharts
    idioms followed'
  - Realistic GL insurance data with factually consistent development pattern and
    ultimates
  weaknesses:
  - Projected cells use flat elevatedBg fill with no color-magnitude encoding — spec
    says 'Color intensity should encode the magnitude of cumulative amounts.' Apply
    a desaturated/lower-opacity variant of imprint_seq to projected cells via a second
    visualMap on seriesIndex [1] with reduced-opacity stops, keeping the border outline
    for actual/projected distinction.
  - Cell labels at fontSize 12 (24 physical px) risk being hard to read at mobile
    scale (~400 px) — increase to fontSize 13 or 14.
  - 'No visual focal point or editorial emphasis: annotate IBNR reserve totals per
    accident year at the rightmost projected column, or add a bold diagonal boundary
    stroke to make the evaluation date cutoff a structural landmark.'
  - 'graphic legend uses hardcoded left: 420 pixel offset — use percentage-based or
    centered positioning for layout stability.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white
      Chrome: Title "heatmap-loss-triangle · javascript · echarts · anyplot.ai" at fontSize 22 — fully readable dark text. Subtitle readable. Y-axis label "Accident Year" and X-axis label "Development Period (Years)" both readable. Tick labels (2015–2024, 1–10) and ATA factors (×1.607, ×1.378, etc.) visible and readable. Colorbar labels ($11M, $58M) readable.
      Data: Actual cells use Imprint sequential colormap (teal #009E73 to blue #4467A3) with white bold labels ("$X.XM"). Projected cells use near-white elevatedBg with outlined border and italic inkSoft-colored labels. Bottom legend: "Actual (Observed)" (teal swatch) and "Projected / IBNR" (outlined swatch).
      Legibility verdict: PASS — all text readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black
      Chrome: Title, subtitle, axis labels, tick labels, ATA factors, colorbar labels, and legend all render in light chrome colors (ink/inkSoft tokens). No dark-on-dark failures detected. Projected cell labels use inkSoft (#B8B7B0 light gray) on elevatedBg (#242420 near-black) — readable contrast confirmed.
