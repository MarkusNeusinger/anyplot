review:
  strengths:
  - ATA development factors cleverly embedded in x-axis tick labels using label formatter,
    adding domain insight without cluttering the layout
  - Dual visualMap instances with one shown (colorbar) and one hidden gives independent
    color control over actual vs projected series — demonstrates deep ECharts knowledge
  - ECharts graphic API used for staircase polyline boundary and custom bottom legend
    — genuinely distinctive features of this library
  - 'Perfect spec compliance: every required feature (distinct actual/projected styling,
    cell annotations, ATA factors, legend, color encoding) is present and working'
  - Highly realistic general liability data with authentic development pattern (ATA
    factors tapering from 1.607 to 1.010) and believable dollar magnitudes
  weaknesses:
  - 'Cell labels hardcode color: ''#FFFFFF'' for actual series regardless of theme
    — works fine for darker blue cells but produces borderline contrast on lighter
    green cells (period 1, low-value rows); consider deriving label color from cell
    darkness or using t.ink for near-white cells'
  - ATA factor sub-labels at 13px are tight in the axis; a slightly smaller font (11-12px)
    with increased nameGap would give more breathing room without losing readability
  - 'Colorbar uses standard ECharts styling (default itemWidth/itemHeight proportions);
    a slightly wider bar (itemWidth: 18) would feel more proportional on the square
    canvas'
