  image_description: The plot displays an actuarial loss development triangle as a
    heatmap with a dark Darcula theme. Rows represent accident years 2015–2024, columns
    represent development periods 1–10. Each cell is annotated with cumulative claims
    values formatted with thousands separators. The color gradient runs from light
    blue (low values ~10,000) to dark navy blue (high values ~80,000). Actual observed
    cells have white borders, while projected/estimated cells have gold/orange borders
    with 70% opacity. A "Factor" row at the bottom displays age-to-age development
    factors (2.500 down to 1.008) on a light gray background with bold blue text.
    The title reads "heatmap-loss-triangle · lets-plot · pyplots.ai" with a subtitle
    explaining the actual vs projected distinction. Axis labels are "Development Period
    (Years)" and "Accident / Origin Year". A continuous color legend for "Cumulative
    Claims ($)" appears on the right side.
