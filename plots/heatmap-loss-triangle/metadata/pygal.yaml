review:
  strengths:
  - Excellent use of pygal extensibility by subclassing Graph for custom heatmap
  - Clean professional blue sequential colormap with well-calculated color interpolation
  - Realistic actuarial data with proper chain-ladder development factors
  - Good cell annotation formatting with thousands separators and italic styling for
    projected values
  - Colorbar with labeled scale provides clear magnitude reference
  weaknesses:
  - Hatching pattern for projected cells does not render visibly in PNG output
  - Diagonal latest evaluation date indicator is essentially invisible
  - Cell value font size is small relative to canvas dimensions
  - Development Period Years header crowds the column numbers
  - Empty space at the bottom of the canvas is wasted
  image_description: The plot shows a 10x10 heatmap matrix representing an actuarial
    loss development triangle. The title "heatmap-loss-triangle · pygal · pyplots.ai"
    is centered at the top. The x-axis is labeled "Development Period (Years)" with
    columns 1-10, and the y-axis is labeled "Accident Year" with rows 2015-2024. Each
    cell contains a formatted cumulative amount value with thousands separators. The
    color gradient goes from very light blue (low values ~639) to dark navy blue (high
    values ~6,951). A vertical colorbar on the right is labeled "Cumulative ($k)"
    with scale markers at min, mid, and max. Development factors are displayed in
    a row below the grid (e.g., 2.345, 1.464, ...). A legend at the bottom right distinguishes
    "Actual" (solid blue swatch) and "Projected (IBNR)" (lighter blue with hatching).
    Projected cells show italic text, but the diagonal hatching pattern is barely
    visible in the PNG rendering. The overall layout is clean with a white background
    and subtle white cell gaps.
