  image_description: The plot displays a 10x10 actuarial loss development triangle
    heatmap. Rows represent accident years 2015-2024 (labeled on the left with a rotated
    "Accident Year" title). Columns represent development periods 1-10 (labeled across
    the top with "Development Period (Years)" title). The upper-left triangle uses
    a sequential blue colormap (light blue for lower values ~639 to dark blue for
    higher values ~6,951) representing actual/observed cumulative claims. The lower-right
    triangle uses a warm orange-amber colormap for projected/IBNR values, with dashed
    orange borders and italic text to distinguish them from actuals. A red dashed
    diagonal polyline marks the evaluation date boundary between actual and projected
    regions. Each cell is annotated with the cumulative amount formatted with thousands
    separators. Below the grid, a "Dev Factor" row shows age-to-age development factors
    (2.345, 1.464, 1.256, etc.). A colorbar on the right labeled "Cumulative ($k)"
    shows the value scale from 639 to 6,951. A legend at the bottom distinguishes
    "Actual" (blue swatch), "Projected (IBNR)" (orange swatch), and "Evaluation Date"
    (red dashed line). The title reads "heatmap-loss-triangle · pygal · pyplots.ai".
    White background with clean layout throughout.
