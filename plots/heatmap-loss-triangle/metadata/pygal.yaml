review:
  strengths:
  - Excellent dual-colormap approach (blue actual, orange projected) creates immediate
    visual distinction
  - Comprehensive legend with all three visual elements (actual, projected, evaluation
    date line)
  - Professional actuarial data with realistic chain-ladder development factors
  - Clean cell design with rounded corners, white gaps, and dashed inner borders for
    projected cells
  - Effective use of pygal extensibility by subclassing Graph for a chart type pygal
    does not natively support
  weaknesses:
  - Empty space below the legend wastes canvas area
  - Cell value font sizes could be slightly larger for improved readability
  - Module-level n_years variable referenced from within _plot method couples class
    to module state
  - Development factor label font is quite small relative to the grid
  image_description: The plot displays a 10x10 actuarial loss development triangle
    heatmap. The title "heatmap-loss-triangle · pygal · pyplots.ai" is centered at
    the top. Rows represent accident years 2015-2024, columns represent development
    periods 1-10. The upper-left triangle (actual observed values) uses a sequential
    blue colormap ranging from light blue (~639) to dark navy (~6,951). The lower-right
    triangle (projected/IBNR values) uses an orange/amber colormap with dashed orange
    inner borders and italic text, creating a clear visual distinction from actual
    values. A red dashed diagonal line marks the latest evaluation date boundary between
    actual and projected regions. Each cell contains a formatted cumulative amount
    with thousands separators. A vertical colorbar on the right is labeled "Cumulative
    ($k)" with scale markers. Development factors (2.345, 1.464, 1.256, etc.) appear
    in a row below the grid labeled "Dev Factor". A three-part legend at the bottom
    shows blue swatch for "Actual", orange swatch for "Projected (IBNR)", and a dashed
    red line for "Evaluation Date". The background is clean white with subtle white
    gaps between cells.
