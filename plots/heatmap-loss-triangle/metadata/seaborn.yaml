  image_description: 'The plot displays a 10x10 heatmap representing an actuarial
    loss development triangle. Rows represent accident years (2015-2024) and columns
    represent development periods (1-10). The color gradient runs from pale blue (low
    cumulative values around 4,000) to dark navy (high values around 38K), using a
    custom sequential blue colormap. Each cell is annotated with the cumulative amount
    - values below 10K show comma-formatted numbers (e.g., "4,299"), while larger
    values use "K" notation (e.g., "25K"). Actual (observed) cells are solid-colored
    with bold text, while projected (IBNR) cells have diagonal hatching with italic
    text and a slight white overlay. Development factors (2.500, 1.450, 1.220, 1.120,
    1.070, 1.040, 1.025, 1.015, 1.008) are displayed in a rounded gray box above the
    title. A legend in the lower-right distinguishes "Actual" from "Projected (IBNR)"
    with matching visual styles. A vertical colorbar on the right is labeled "Cumulative
    Claims ($K)". The title follows the correct format: "heatmap-loss-triangle · seaborn
    · pyplots.ai".'
