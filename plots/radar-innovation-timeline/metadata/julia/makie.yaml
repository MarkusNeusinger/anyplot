    for outermost Hold ring items (vs 13 for inner rings) to add subtle emphasis on
    long-horizon bets.'
  - pol2cart utility function is a minor KISS deviation; could be inlined as 'x, y
    = r*cos(θ), r*sin(θ)' at each callsite.
