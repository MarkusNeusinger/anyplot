review:
  strengths:
  - 'Correct Imprint palette in canonical order (green→lavender→blue→ochre) with first
    series #009E73; both themes render with perfectly compliant chrome'
  - 'Excellent data quality: 24 real technologies across 4 sectors and 4 rings with
    plausible ring assignments (Kubernetes/LLM APIs in Adopt, Post-Quantum/Unikernels
    in Hold)'
  - All font sizes explicitly set throughout; sector headers in palette colors create
    clear visual hierarchy; ring outlines and dividers at 0.28 alpha are tastefully
    subtle
  - Clean idiomatic Makie code using Figure grid layout (fig[0,1], fig[1,1], fig[2,1]),
    DataAspect(), poly! wedges, MarkerElement legend handles
  weaknesses:
  - Ring labels (Adopt, Trial, Assess, Hold) at fontsize=9 are too small — increase
    to 11-12 so they remain legible when the 2400px PNG is scaled to mobile (~400px);
    item labels at fontsize=9 also benefit from a bump to 10-11
  - Full 360-degree circle layout used instead of the spec-suggested half-circle (180°)
    or three-quarter (270°) layout; a non-full-circle would leave a dedicated opening
    area for the legend/title and better match the ThoughtWorks Technology Radar form
  - Sector background fills (8% alpha) differentiate sectors visually, but the spec
    explicitly asks for per-ring background fills to separate time horizons — the
    current implementation lacks ring-specific shading, making the Adopt/Trial/Assess/Hold
    bands harder to distinguish at a glance
  - 'Some label crowding near the ring labels in the inner Adopt ring, particularly
    where Adopt/Trial labels are placed at θ≈-0.15 rad (DevEx/AI&ML boundary): Dev
    Containers, GitHub Actions, and LLM APIs labels are close to the ring labels;
    increase ring label radial offset or move them to a less crowded angle'
  - 'DE-01/DE-02: no per-ring shading makes time-horizon bands indistinct; adding
    alternating subtle ring fills (e.g. 0.04-0.06 alpha alternating neutral) would
    lift design quality noticeably'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint surface, not pure white.
      Chrome: Title "radar-innovation-timeline · julia · makie · anyplot.ai" in dark ink at top, clearly readable. Sector headers ("AI & ML", "Cloud & Infra", "Security", "DevEx") in Imprint palette colors just outside the outer ring edge, readable. Ring labels ("Adopt", "Trial", "Assess", "Hold") at fontsize=9 placed at θ≈-0.15 rad — small but readable at full resolution; will be marginal at mobile scale. Item labels (24 technologies) at fontsize=9 in INK_SOFT (#4A4A44) — readable at full resolution but small when scaled down. Legend at bottom in horizontal layout, frameless, with sector color swatches.
      Data: Four sectors with tinted wedge fills (8% alpha Imprint colors); concentric ring outlines at 28% alpha; sector dividers at 28% alpha. Scatter points at markersize=13 with PAGE_BG stroke for definition. AI & ML dots in #009E73 (brand green), Cloud & Infra in #C475FD (lavender), Security in #4467A3 (blue), DevEx in #BD8233 (ochre).
      Legibility verdict: PASS — all text readable at full resolution; ring and item labels marginal at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface, not pure black.
      Chrome: Title in light ink (#F0EFE8) at top, clearly readable. Sector headers in same Imprint palette colors as light render — all readable against the dark background. Item labels in INK_SOFT (#B8B7B0) — clearly readable on dark background, no dark-on-dark failure. Ring labels in INK_MUTED (#A8A79F) — readable on dark background. Legend text in INK_SOFT.
      Data: Data point colors identical to light render — #009E73 green, #C475FD lavender, #4467A3 blue, #BD8233 ochre. Sector fills still subtle at 8% alpha on dark background. Ring outlines and dividers at 28% alpha of #F0EFE8 — subtle and correct.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures; theme adaptation is correct throughout.
