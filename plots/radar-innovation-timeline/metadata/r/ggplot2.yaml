review:
  strengths:
  - Correct polar radar implementation with concentric time-horizon rings and four-sector
    divisions using coord_polar()
  - 'Full Imprint palette compliance — first series is brand green #009E73, subsequent
    series follow canonical order'
  - 'Proper theme-adaptive chrome: background, text, legend box all flip correctly
    between light (#FAF8F1) and dark (#1A1A17)'
  - Well-structured, clean R code with appropriate complexity — helper function for
    ring polygons is justified
  - 'Realistic and relevant technology dataset: 16 named technologies across 4 sectors
    × 4 rings with sensible time-horizon placement'
  - Alternating ring fills (rings 1 and 3) add visual depth without cluttering; subtle
    spoke lines and ring circles reinforce the radar structure
  weaknesses:
  - check_overlap = TRUE silently suppresses 4 out of 16 item labels — dots become
    anonymous. Use ggrepel::geom_text_repel or manual per-ring angular/radial offsets
    to ensure all items are labeled.
  - 'Inner ring crowding: items from all sectors converge at the same stagger angles
    (30/55/38/62°) so the Now and Near-term rings are cluttered regardless of check_overlap.
    Add sector-specific angle offsets (e.g., sector_starts[sector] + c(20,45,65,80)
    per ring) to spread items within each 90° quadrant.'
  - Item label size=2.1mm (~6pt) is marginal on the 2400×2400 canvas — increase to
    2.5mm for better readability at both desktop and mobile widths.
  - 'No visual hierarchy across time horizons: Now and Future items use identical
    point sizes. Vary geom_point size by ring (e.g., size=6.5/5.5/4.5/3.5 for Now/Near/Mid/Future)
    to convey urgency/immediacy through point prominence.'
  - Excess whitespace between title and the radar body — reduce plot.margin top from
    30 to 15 or move chart upward to make better use of canvas space.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct.
      Chrome: Title "radar-innovation-timeline · r · ggplot2 · anyplot.ai" in large dark ink, centered at top, spanning ~85% of width — fully readable. Sector headers ("AI & ML", "Cloud & Infra", "Dev Tools", "Security") in bold dark ink placed along outer ring edges — readable. Ring labels ("Now", "Near-term", "Mid-term", "Future") in smaller muted ink near the 5° spoke — small but legible. Legend at bottom shows "Sector" with four colored swatches on elevated-bg panel.
      Data: 16 points colored: brand green (#009E73) for AI & ML, lavender (#C475FD) for Cloud & Infra, blue (#4467A3) for Security, ochre (#BD8233) for Dev Tools — all Imprint palette, canonical order. Points are size=4.5, clearly visible. 12 of 16 item labels are shown (check_overlap=TRUE suppressed 4 labels: Agentic AI, Edge ML Platforms, AI-Powered SIEM, WebAssembly — their dots appear without annotation).
      Legibility verdict: PASS overall, but 4 unlabeled dots reduce data legibility.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title text is light (#F0EFE8), fully readable against dark background. Sector headers in bold light ink — readable. Ring labels in muted light color — readable. Legend shows light text on elevated dark panel (#242420). Ring boundary circles and spoke lines use INK_SOFT (#B8B7B0 equivalent) at low alpha — subtly visible.
      Data: Data point colors are identical to light render — brand green, lavender, blue, ochre — correct theme independence. 12 of 16 item labels visible (same 4 suppressed by check_overlap). Security sector items (blue #4467A3) are slightly muted on dark background but still distinguishable.
      Legibility verdict: PASS — no dark-on-dark failures. Chrome correctly adapts to dark theme.
