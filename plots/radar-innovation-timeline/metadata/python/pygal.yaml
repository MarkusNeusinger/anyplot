review:
  strengths:
  - 'Theme-adaptive zone fill colors are a thoughtful design choice: pastel tints
    on light, dark tints on dark, ensuring ring bands are subtly visible without overpowering
    data'
  - 'Imprint palette applied correctly in canonical order; first sector = brand green
    #009E73, data colors stable across light/dark renders'
  - Code is well-organized with clear comments explaining the layering order and slot-based
    sector positioning system
  - Both PNG and HTML output generated; HTML provides full item-label interactivity
    compensating partially for missing static labels
  - Realistic and professionally neutral technology radar dataset (24 items across
    Security, DevOps, Cloud, Data Engineering domains)
  weaknesses:
  - 'Missing per-item labels in PNG: show_minor_x_labels=False suppresses all innovation
    labels — users cannot identify which dot is which technology. The spec explicitly
    requires each item to be a labeled point. Enable minor x labels with truncate_label=12
    and value_font_size=32-36 so abbreviated names appear near each spoke position.'
  - '8-item legend is visually noisy: zone fill series (Hold/Assess/Trial/Adopt) add
    4 legend entries alongside 4 sector entries; zone fill swatches use pale/dark
    tints that may render as near-invisible boxes. Remove zone fills from legend or
    increase their swatch opacity.'
  - Ring labels (Adopt/Trial/Assess/Hold) are readable at full resolution but may
    be small at mobile/thumbnail scale — increase label_font_size from 56 to 64+ for
    the ring annotation text.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "radar-innovation-timeline · python · pygal · anyplot.ai" in dark ink — readable. Sector labels (Data Engineering, Cloud Platforms, Security, DevOps) at cardinal points in dark text — readable. Ring labels (Adopt, Trial, Assess, Hold) along top radial spoke in dark muted text — readable but on the smaller side. Legend 8 entries at bottom — readable.
      Data: Brand green #009E73 for Data Engineering dots, lavender #C475FD for Cloud Platforms, blue #4467A3 for Security, ochre #BD8233 for DevOps — correct Imprint canonical order. Zone fills (pastel tints at opacity=0.35) create subtle concentric bands. First series = #009E73 ✓.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface, not pure black
      Chrome: Title, sector labels, ring labels, and legend text flip to light cream (#F0EFE8-derived) — all readable against the dark surface. No dark-on-dark failures detected anywhere in the render.
      Data: Sector dot colors are identical to light render (brand green, lavender, blue, ochre) — only zone fill tints and chrome flip between themes. Zone fills use dark tints (dark green, dark purple, dark blue-gray, near-background charcoal) distinguishable from background.
      Legibility verdict: PASS
