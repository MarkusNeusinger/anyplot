      Background: Warm off-white #FAF8F1 — correct, not pure white. PASS
      Chrome: Title "radar-innovation-timeline · python · pygal · anyplot.ai" is rendered in dark ink at the top and is fully readable. Ring labels (Adopt, Trial, Assess, Hold) on the radial axis are clear. Sector headers (Data Engineering, Cloud Platforms, Security, DevOps) appear around the perimeter as major labels in dark text — readable. Legend at bottom row shows all 4 sectors with colored squares — readable.
      Data: 24 dots plotted at radial distances matching their ring value, grouped by angular sector. Data Engineering dots are brand green #009E73 (top arc), Cloud Platforms dots are lavender #C475FD (left arc), Security dots are blue #4467A3 (bottom arc), DevOps dots are ochre #BD8233 (right arc). Dots are large (dots_size=18) and clearly visible.
      Item labels: Perimeter item labels (e.g., "Apache Iceberg", "dbt Core", "eBPF Monitoring") are small (label_font_size=34) and heavily overlapping, especially in the Data Engineering sector at the top and the DevOps sector at the right. Several label strings are unreadable due to collision with adjacent labels.
      Legibility verdict: PARTIAL PASS — major structural labels (title, ring names, sector headers, legend) are all readable. Per-item perimeter labels suffer from significant overlap and small size.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct. PASS
      Chrome: Title uses light text (#F0EFE8) on the dark background — fully readable. Ring labels and sector headers render in light ink — readable. Legend at bottom is fully legible in light text. No dark-on-dark failures observed. All chrome elements successfully flip to the dark theme.
      Data: Data colors are IDENTICAL to the light render — green, lavender, blue, ochre dots appear at the same positions. Brand green #009E73 remains clearly visible on the dark surface. Grid spoke lines are rendered in a muted light tone, subtle but visible.
      Item labels: Same overlap issue as the light render — perimeter item labels crowd each other in the Data Engineering and DevOps arcs. Legibility is equally limited.
      Legibility verdict: PARTIAL PASS — same issues as light render; no additional dark-mode failures beyond the pre-existing overlap problem.
