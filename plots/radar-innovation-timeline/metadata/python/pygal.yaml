review:
  strengths:
  - 'Correct Imprint palette order: Data Engineering=#009E73 (brand green), Cloud
    Platforms=#C475FD, Security=#4467A3, DevOps=#BD8233'
  - Both light (#FAF8F1) and dark (#1A1A17) themes render correctly with no dark-on-dark
    failures
  - Creative use of pygal.Radar() with stroke=False to show independent dot positions
    per item rather than a connected polygon
  - 'Clean slot-based layout algorithm: each sector gets 8 angular slots (header +
    6 items + gap), enabling sector grouping within a standard radar chart'
  - 'Meaningful technology domain data: 24 real-world innovations across 4 sectors
    and 4 ring levels (Adopt/Trial/Assess/Hold)'
  - 'Perfect code quality: flat structure, deterministic data, clean imports, correct
    output filenames and HTML export'
  weaknesses:
  - 'Perimeter item labels (label_font_size=34) are too small and heavily overlapping
    — in the Data Engineering sector (top arc) labels like ''Apache Iceberg'', ''dbt
    Core'', ''Kafka Streams'', ''Delta Lake'' are stacked on top of each other; in
    the DevOps sector (right arc) ''Platform Engineering'', ''GitOps at Scale'', ''AI
    Code Assistants'' overlap badly. Fix: reduce items per sector to 5-6 max, or increase
    label_font_size to 42-48 and add slight radial spacing, or hide per-spoke labels
    and rely on interactive hover tooltips (pygal HTML supports this natively).'
  - 'No ring background fills to visually separate time horizons — the spec explicitly
    suggests a subtle background fill per ring to distinguish Adopt/Trial/Assess/Hold
    zones. Fix: while pygal Radar doesn''t natively support ring background fills,
    consider alternate visual cues such as opacity shading via series fill or annotations.'
  - 'The radar spoke layout places every item on its own spoke, creating 32 spokes
    for 24 items plus 4 sector headers and 4 gaps. This results in dense label crowding
    at the perimeter. Fix: reduce to 4 major x_labels (sector names only) and rely
    on dots_size and label tooltips — major_label_font_size=44 for sector headers
    is already good, but too many spokes produce the crowding.'
  - Design refinement is minimal — no ring background tints, no sector shading, no
    radial ring emphasis beyond default pygal guides. Adding even subtle fill differences
    between ring bands would meaningfully improve the innovation-radar aesthetic.
