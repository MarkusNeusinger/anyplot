review:
  strengths:
  - Semantic ring fill color gradient (green→yellow→orange→faint red) communicates
    adoption readiness without extra annotation
  - 270-degree arc with ring labels in the gap avoids cluttering the chart area —
    smart structural layout
  - Full theme-adaptive chrome using INK/INK_SOFT/ELEVATED_BG tokens; both renders
    pass legibility checks
  - Label repulsion algorithm substantially reduces worst-case label collisions
  - letsplot-specific layer_tooltips() and dual HTML+PNG export make the implementation
    distinctive
  - 'Complete spec coverage: all 4 rings, 4 sectors, 24 technology items with connectors
    and ring/sector labels'
  weaknesses:
  - Biodegradable PCBs and Fusion Energy labels overlap at the bottom arc — increase
    MIN_Y_SEP from 0.75 to 0.90 and add more repulsion iterations for outer-ring Hold
    items
  - Innovation item labels at size=4.5mm may be borderline small on mobile (~400px
    viewport) — increase to 5.0–5.5mm
  - Lower-arc label density in Sustainability/Infrastructure boundary zone is crowded
    — increase label-radius offset for Assess/Hold outer labels
