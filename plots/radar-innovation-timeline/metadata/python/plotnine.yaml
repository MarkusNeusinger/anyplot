review:
  strengths:
  - Semantic ring fill colors (green=Adopt, amber=Trial, ochre=Assess, red=Hold) create
    an intuitive urgency-to-risk visual narrative that reinforces the time-horizon
    concept
  - Iterative collision-avoidance algorithm for labels is a thoughtful addition that
    reduces overlaps in the radial layout
  - Size and opacity graduation from inner (large/opaque) to outer (small/transparent)
    rings adds a second encoding channel for ring membership beyond color
  - 270° arc with gap at the bottom cleverly creates space for ring labels without
    cluttering the data area
  - Full spec compliance — correct radar chart type, all 4 rings and 4 sectors, 26
    innovations, ring boundaries, sector dividers, sector headers, and legend all
    present
  - Semantic Imprint color assignments (Sustainability=green, AI&ML=blue, Biotech=rose,
    Infrastructure=ochre) match domain color expectations well
  - Both light and dark renders are fully theme-correct — chrome flips properly, data
    colors remain identical
  - Clean code structure — no functions/classes, seeded RNG, all imports used
  weaknesses:
  - 'Label collision in upper-right: ''Atmospheric CO2 Tech'' label (Hold ring, Sustainability
    sector) collides with the ''Sustainability'' sector header at radius 7.8 — the
    collision avoidance algorithm only nudges vertically and does not account for
    the sector header positions at radius 7.8, allowing outer-ring labels to drift
    into them'
  - Multiple label clusters in the AI & ML and Biotech/Infrastructure border zone
    — 'AI Agent Frameworks', 'Causal AI Systems', and adjacent labels are too close;
    the 1D vertical nudge is insufficient for a 2D radial layout
  - Item label font (3.8mm ≈ 10.8pt) becomes very small at mobile-scaled width (~400px)
    where 26 labels will be nearly illegible — consider reducing number of labels
    shown or increasing minimum font size
  - 'DE-02: Legend has a solid background box frame (legend_background with border)
    which slightly clutters the minimal-chrome aesthetic — a frameless or very subtle
    legend would be more refined'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface.
      Chrome: Bold title "radar-innovation-timeline · python · plotnine · anyplot.ai" at 12pt clearly readable in dark ink. Italic subtitle "Inner rings → near-term adoption · Outer rings → future exploration" visible in INK_SOFT. Sector headers "Biotech", "Sustainability", "AI & ML", "Infrastructure" rendered in INK along the outer arc edge. Ring labels "Adopt", "Trial", "Assess", "Hold" rendered in INK_SOFT at the bottom gap — all readable.
      Data: 26 innovation points colored by sector: Sustainability=#009E73 (green), AI&ML=#4467A3 (blue), Biotech=#954477 (rose), Infrastructure=#BD8233 (ochre) — all from Imprint palette. Ring fills use semantic Imprint colors: green for Adopt, amber (#DDCC77) for Trial, ochre for Assess, matte-red for Hold. Point size and opacity decrease from inner (Adopt) to outer (Hold) rings. Item labels colored by sector, placed radially.
      Legibility verdict: PASS — all text readable against light background. Minor label crowding in inner rings and near sector headers, but no dark-on-light failures.
      Overlap note: Data label near "Sustainability" sector header ("Atmospheric CO2 Tech" end visible as "Co Tech") indicates sector-header/label collision in the upper-right zone. Multiple labels cluster tightly in the AI & ML and Biotech/Infrastructure border area.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface.
      Chrome: Title, subtitle, sector headers, and ring labels all rendered in light INK (#F0EFE8) — readable against dark background. Legend background uses #242420 (ELEVATED_BG) with INK_SOFT border. No dark-on-dark failures observed.
      Data: Data colors identical to light render — Sustainability green, AI&ML blue, Biotech rose, Infrastructure ochre. Ring fills are slightly stronger at alpha=0.28 (vs 0.18 light) giving slightly more visual weight, but data identity is preserved.
      Legibility verdict: PASS — all chrome correctly flips to light text; no dark-on-dark failures. Sector and ring labels clearly visible.
