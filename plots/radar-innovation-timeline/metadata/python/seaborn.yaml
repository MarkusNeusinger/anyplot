    or raising item labels to 11-12pt
  - CRISPR Diagnostics and Synthetic Data Gen labels partially obscured by adjacent
    elements — label overlap cascade in the AI & ML / Biotech sector boundary area
  - LM-02 limited by heavy reliance on matplotlib for polar projection, annotation,
    and collision logic — seaborn-specific features (blend_palette, desaturate) used
    well but play a secondary role
