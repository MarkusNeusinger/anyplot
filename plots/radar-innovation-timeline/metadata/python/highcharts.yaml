review:
  strengths:
  - 'Imprint palette used correctly in canonical order: AI & ML (#009E73 brand green
    first), Cloud & DevOps (#C475FD), Security (#4467A3), Data Engineering (#BD8233)
    — all four match palette positions 1–4 in order'
  - Semantic ring label coloring (green=Adopt/go, blue=Trial/explore, ochre=Assess/caution,
    red=Hold/stop) creates an immediately readable adoption-stage narrative without
    a legend
  - Custom SVG renderer (chart.renderer.circle/path/text) draws concentric rings,
    sector dividers, and ring/sector labels entirely in Highcharts' own rendering
    layer — idiomatic and performant
  - Variable marker sizes by ring (Adopt=18, Trial=15, Assess=12, Hold=10) encode
    depth without a second legend entry
  - Text outline trick (3px PAGE_BG around INK-colored labels) ensures data-point
    labels pop on both the warm-cream and near-black surfaces without extra contrast
    tokens
  - 'Theme-adaptive chrome fully wired: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all switch
    with ANYPLOT_THEME; ring fills use theme-aware opacity values; both renders are
    visually correct'
  - 270° layout with a bottom-right opening provides space for the legend without
    wasting canvas area
  - 29 realistic ThoughtWorks-style technology items with plausible adopt/trial/assess/hold
    staging; data is factually credible
  - CDP setDeviceMetricsOverride + PIL pad-to-exact guard together reliably pin output
    to 2400×2400
  weaknesses:
  - Data label font size (30px) is below the 44px guideline for highcharts native-pixel
    labels at 2400×2400 — labels are readable at full resolution but small when the
    PNG is scaled to mobile (~400 px); consider bumping to 34–38px
  - Label crowding in dense ring/sector cells (e.g. AI & ML Trial ring with 3 items,
    Data Engineering Trial ring with 3 items) — alternating above/below offsets help
    but some labels still appear close or nearly touching; a larger vertical-offset
    pool or a slightly wider sector spread would reduce collision risk
  - Sector labels (AI & ML, Cloud & DevOps, Security, Data Engineering) rendered at
    32px by the SVG renderer sit very close to the edge of the 270° arc at radius
    5.1; on some viewport crops the Data Engineering label at the bottom may appear
    tight — a small inward offset or larger chart.spacing[2] (bottom) would give more
    breathing room
  - Ring labels ('Adopt', 'Trial', 'Assess', 'Hold') are rendered at a fixed 48° angle
    which concentrates all four labels in the upper-left quadrant of the chart; readers
    must scan left to find the ring names — spreading labels radially (one per ring
    at its midpoint angle) or at consistent angles within each ring boundary would
    improve discoverability
