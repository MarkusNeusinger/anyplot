    -0.5-0.9i) with light blue lines connecting them to the origin. Six red/coral
    dots mark arbitrary points (2.5+1.5i, -1.8+2.2i, 1.0-2.0i, -0.5-1.5i, 3.0+0i,
    0+2.8i) with light pink vector lines to the origin. A single green dot marks the
    product z1*omega1 at approximately -2.5+1.4i with a dashed green vector. A small
    dark dot marks the origin. Each point is annotated with its complex number in
    a+bi form. A five-item legend sits at the bottom. Subtle gray grid lines and dashed
    guide strokes provide reference.
