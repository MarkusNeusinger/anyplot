  - Text sizes could be larger for better prominence on the 3600x3600 canvas
  - Axis spines still present on all four sides
  image_description: 'The plot displays a complex plane (Argand diagram) on a square
    3600x3600 canvas with a white background. Four categories of complex numbers are
    plotted: 5th Roots of Unity (dark blue, 5 points arranged on the unit circle),
    Arbitrary points (orange, 6 points scattered across all quadrants), a Conjugate
    Pair (teal/cyan, 2 points mirrored across the real axis at 1.5+2i and 1.5-2i),
    and a Product point (magenta/pink, 1 point at approximately -0.35+2.47i). A dashed
    gray unit circle is centered at the origin. Vectors (arrows) extend from the origin
    to each point with varying alpha transparency by category (roots of unity strongest,
    arbitrary faintest). Each point is annotated with its rectangular form (e.g.,
    "1.5+2i", "-1.8+2.2i", "3", "2.8i"). The real and imaginary axes cross at the
    origin, drawn as subtle gray lines. Axis labels read "Real Axis" (horizontal)
    and "Imaginary Axis" (vertical). The title reads "scatter-complex-plane · bokeh
    · pyplots.ai" in the top-left. A legend in the top-left corner lists all five
    categories: Unit Circle, 5th Root of Unity, Arbitrary, Conjugate Pair, and Product.
    Subtle grid lines at very low alpha (0.15) provide reference. The range extends
    from -3.8 to 3.8 on both axes.'
