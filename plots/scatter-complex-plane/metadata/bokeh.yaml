  image_description: The plot displays an Argand diagram on a 3600x3600 white canvas
    with equal aspect ratio. A dashed gray unit circle is centered at the origin.
    Subtle gray axes through the origin divide the complex plane into four quadrants.
    Five dark blue points (5th roots of unity) sit on the unit circle with colored
    vector arrows from the origin. Six orange points (Arbitrary) are spread across
    the plane at positions like 2.5+1.5i, -1.8+2.2i, 3+0i, and 0+2.8i. Two teal points
    form a conjugate pair at 1.5+2i and 1.5-2i. One pink/magenta point shows the product
    at approximately -0.35+2.47i. Each point is labeled with its rectangular form
    (a+bi). Arrows in category-matching colors extend from the origin to each point.
    A legend in the top-left corner lists Unit Circle, 5th Root of Unity, Arbitrary,
    Conjugate Pair, and Product. The title reads "scatter-complex-plane · bokeh ·
    pyplots.ai". Axis labels are "Real Axis" (x) and "Imaginary Axis" (y). The grid
    is very subtle (low alpha). Overall appearance is clean and professional with
    good color contrast.
