  image_description: The plot displays an Argand diagram (complex plane) with the
    real axis on the horizontal and imaginary axis on the vertical. Three dark blue
    diamond markers represent the 3rd roots of unity (ω₀ at 1+0i, ω₁ at -0.5+0.9i,
    ω₂ at -0.5-0.9i). A red X marker shows their sum (Σωₖ) at the origin (0+0i). Seven
    green circle markers represent arbitrary complex numbers scattered across all
    four quadrants. A dashed gray unit circle is centered at the origin. Colored arrows
    (vectors) extend from the origin to each point. Each point is annotated with its
    label and rectangular form (a+bi) in small white-background boxes. All four spines
    are removed, subtle grid lines are present, and light gray axes pass through the
    origin. The legend is in the upper left corner showing all three categories plus
    the unit circle. Title reads "scatter-complex-plane · seaborn · pyplots.ai".
