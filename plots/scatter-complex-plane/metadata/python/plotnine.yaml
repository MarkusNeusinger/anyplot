review:
  strengths:
  - 'Complete spec implementation — all required elements present: axes through origin,
    dashed unit circle, vectors with closed arrowheads, point annotations with rectangular
    form (a+bi), equal aspect ratio (coord_fixed), distinct colors per category'
  - Thoughtful visual hierarchy — halo rings on 6th roots of unity (alpha=0.12 ghost
    layer), size variation between categories (roots 3.5 / arbitrary 4.0 / sum 5.5),
    alpha progression from 0.90 → 1.0 for depth
  - Sophisticated annotation strategy — radial offset with left/right alignment split
    to work around plotnine's ha limitation; geom_label with rounded boxstyle and
    ELEVATED_BG fill renders correctly in both light and dark themes
  - 'Correct Imprint palette: brand green (#009E73) for roots of unity (first series),
    lavender (#C475FD) for arbitrary points, blue (#4467A3) for sum; theme-adaptive
    chrome fully wired through all text and structural elements'
  - Perfect code quality — flat script, deterministic data, all imports used, idiomatic
    plotnine grammar-of-graphics layering
  weaknesses:
  - The '|z| = 1' unit circle annotation (annotate size=3.8, italic, angle=50°) is
    small in both renders and may be difficult to read at thumbnail scale (~400px);
    increase to size=5.0-5.5
  - 'Label crowding in the upper-left quadrant: ''z₂ = −0.90+1.10i'' and ''ω2 = −0.50+0.87i''
    label boxes are close together; the offset radius (label_radius=0.46) is tight
    for this cluster — consider increasing to 0.55-0.60 for ω2 to push labels further
    apart'
  - Design Excellence is functional but not exceptional — DE-02 could be pushed by
    tuning legend box margins and reducing the panel_border_blank visual gap; DE-03
    could benefit from a subtle annotation callout for the sum vector to reinforce
    the parallelogram-law story
  - The '|z| = 1' label uses INK_MUTED (#A8A79F on dark) with a geom_path circle at
    alpha=0.65 — on the dark render the label is somewhat faint; increase to INK_SOFT
    or raise label size
