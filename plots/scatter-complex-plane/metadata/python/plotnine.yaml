review:
  strengths:
  - 'Perfect Imprint palette usage — brand green (#009E73) for roots of unity as first
    series, lavender (#C475FD) and blue (#4467A3) in canonical order; backgrounds
    correctly #FAF8F1 / #1A1A17'
  - 'Full spec compliance: unit circle (dashed), vectors with arrowheads, equal aspect
    ratio (coord_fixed), axes through origin, rectangular-form annotations, distinct
    category colors'
  - Halo ring overlay on roots of unity is a tasteful design choice that visually
    emphasises their symmetry on the unit circle
  - Radial label offset algorithm (label_radius × cos/sin of angle, ha split by sign)
    keeps annotation boxes away from the vectors and avoids most crowding
  - 'Excellent code quality: flat, no functions/classes, all data deterministic (no
    seed needed), clean imports, saves as plot-{THEME}.png'
  - 'Strong plotnine idiom: geom_segment with arrow, coord_fixed, scale_size_identity
    + scale_alpha_identity for per-point aesthetics, split geom_label for ha alignment
    — all distinctively idiomatic'
  weaknesses:
  - Annotation label font size (size=3.2 mm ≈ 9 pt) and the '|z|=1' circle label (size=3.0
    mm) are somewhat small at thumbnail sizes — increase both to ~3.8–4.0 mm for better
    mobile readability
  - 'Mild label crowding in upper-right quadrant: the ''|z|=1'' angled annotation
    (at 0.73, 0.73) sits very close to the ω1 label box; consider nudging the unit-circle
    annotation to (0.62, 0.80) or adjusting its angle to 50° to create breathing room'
  - 'DE-02 gap: top/right spines are not explicitly removed (relies on theme_minimal
    defaults) — adding element_blank() for panel_border would make the L-shaped frame
    explicit and cleaner'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Bold title "scatter-complex-plane · python · plotnine · anyplot.ai" in dark ink, fills ~85% of width — expected for this long mandated title. Axis labels "Re(z)" and "Im(z)" are clear at 10pt. Tick labels at 8pt legible. Grid is a very faint 15%-alpha ink mesh, unobtrusive. Legend at bottom shows three categories with color swatches and bold "Category" header.
      Data: Six 6th-roots-of-unity green (#009E73) dots arranged symmetrically on the unit circle, with subtle halo rings for emphasis. Four lavender (#C475FD) arbitrary points spread across all quadrants. One blue (#4467A3) sum point (z₁+z₂) in the upper quadrant — largest marker, visually prominent. Vector arrows from origin to every point in matching category colors. Dashed gray unit circle as reference. Rounded label boxes for all 11 points showing rectangular form (e.g., "ω0 = 1.00+0.00i"). Small italic "∣z∣ = 1" annotation angled at 45° on the circle.
      Legibility verdict: PASS — all chrome is dark on warm-cream background; annotation boxes are small but readable at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels ("Re(z)", "Im(z)"), and tick labels are rendered in light ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark surface. Legend uses dark elevated background (#242420) with light-ink text. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — brand green, lavender, and blue are all clearly distinguishable against the dark background. The halo rings on roots of unity are still visible. Vectors and dashed unit circle remain visible in the muted ink color.
      Legibility verdict: PASS — all theme-adaptive tokens are correctly threaded; no element has become invisible or illegible in the dark render.
