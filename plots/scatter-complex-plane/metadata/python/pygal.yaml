    quadrant where multiple vectors converge; pygal auto-placement has limited collision
    avoidance'
  - 'Point value labels in dark render use foreground_subtle (INK_MUTED #A8A79F) —
    readable but softer than ideal; primary foreground color for value labels would
    improve dark-mode readability'
  - Unit circle at 40% opacity is very subtle in both renders — increasing to 0.55-0.65
    would improve discoverability of the reference circle without competing with primary
    data vectors
