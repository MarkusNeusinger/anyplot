review:
  strengths:
  - 'Perfect Imprint palette adherence: first series green (#009E73), canonical color
    order, theme-correct chrome in both renders with matching backgrounds (#FAF8F1
    light / #1A1A17 dark).'
  - Idiomatic use of pygal's None-segment-break pattern to draw multiple disconnected
    origin-to-point vectors within each series — a distinctively pygal idiom.
  - Square 2400x2400 canvas with equal x/y ranges (-3.5, 3.5) gives mathematically
    correct equal-aspect-ratio Argand diagram; unit circle renders as a circle.
  - js=[] demonstrates savvy understanding of pygal's render pipeline, stripping CDN
    dependencies for reliable offline PNG export.
  - Clean KISS code structure with no functions/classes; all font sizes explicitly
    set; dual PNG+HTML output correctly implemented; np.random.seed(42) present.
  weaknesses:
  - Static PNG has no visible point labels — a+bi annotations (and polar-form labels)
    only appear as hover-tooltips in the interactive HTML. Use print_values=True with
    a value_formatter returning the rectangular-form string per series (e.g. '2.5+1.0i'),
    applied at the series level to keep unit circle and origin label-free.
  - No arrowheads on vectors — pygal XY cannot natively add arrowheads. Consider post-render
    SVG patching with <marker> elements before PNG conversion, or use endpoint marker
    shapes within a CustomStyle to simulate arrowheads.
  - 'Origin marker (dots_size=8, matte-red #AE3030) is nearly invisible in both renders
    because all other series start at (0, 0) and their larger dots (16-22) stack on
    top. Increase origin dots_size to 18-20 and move the ''Origin'' chart.add() call
    to last so it renders on top of all other series.'
  - Grid lines in the dark render are noticeably bright since pygal cannot control
    grid opacity independently (foreground_subtle governs tone). This is a known library
    limitation — flag if persistent after repair.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "scatter-complex-plane · python · pygal · anyplot.ai" in dark ink, clearly readable. Axis labels "Real Axis" (X) and "Imaginary Axis" (Y) clearly visible. Tick labels -3 to 3 on both axes readable. Bottom legend with 5 entries fully legible.
      Data: Five series — brand green (#009E73) roots-of-unity dots with solid vector lines from origin; lavender (#C475FD) sample-point dots with solid vector lines; blue (#4467A3) vector-sum dot with dashed line; ochre (#BD8233) dashed unit circle reference; small red (#AE3030) origin marker at (0,0). Grid shown as subtle dashed lines. Unit circle appears as a dashed circle centered at origin within the coordinate range.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title, axis labels, and tick labels all render in light cream/off-white text — clearly readable against the dark background. Legend entries at bottom readable. No dark-on-dark failures observed.
      Data: All five series retain identical data colors from the light render — green (#009E73), lavender (#C475FD), blue (#4467A3), ochre (#BD8233), red (#AE3030). Only chrome flips. Grid lines are slightly more prominent in dark theme (pygal limitation — foreground_subtle governs grid tone without separate opacity control) but do not obscure the data.
      Legibility verdict: PASS — all text readable against dark background; data colors identical to light render.
