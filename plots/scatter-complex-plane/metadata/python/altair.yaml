    opacity — genuine Altair interactivity
  - Dynamic angle encoding (alt.Angle) for arrowhead orientation — precise directional
    rendering
  - 'Correct Imprint palette in canonical order: #009E73 (Roots of Unity), #C475FD
    (Arbitrary), #4467A3 (Transformation)'
