    label (z₁ = 2.5+1.5i) to be clipped by the Vega-Lite scale boundary — fix by reducing
    label dx offset or expanding axis_limit by 0.1
  - 'DE-01 headroom: the multi-layer composition is sophisticated but annotation crowding
    in the center detracts from publication-ready polish — improve by tuning label
    offsets to avoid vector lines and reducing the ω0 label which overlaps the horizontal
    axis line'
  - π/4 arc label uses a fixed blue (#4467A3) at fontSize=11 — slightly small and
    color may be low-contrast on dark background; increase to fontSize=12 or use INK_SOFT
    token instead
