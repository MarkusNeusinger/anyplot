review:
  strengths:
  - JointGrid with marginal KDE distributions is a distinctively seaborn feature that
    adds statistical context to the Argand diagram
  - 'Full spec compliance: unit circle, vectors from origin, equal aspect ratio, rectangular-form
    annotations, distinct colors and markers per category'
  - Imprint palette correctly applied (green=Roots, lavender=Sum, blue=Arbitrary),
    theme-adaptive chrome works in both light and dark renders
  - Size encoding of marker magnitude adds a fourth data dimension to hue/shape/position
  - Equilateral triangle connecting roots of unity is a thoughtful geometric addition
    reinforcing the mathematical story
  - All font sizes explicitly set; KISS code structure with clean imports and deterministic
    data
  weaknesses:
  - Annotation boxes are dense in the center-right of the plot — ω₀ at (1.0+0.0i)
    and z₇ at (3.0+0.0i) have annotation boxes close together, and the cluster around
    the origin (Σωₖ, ω₀, z₃) is visually crowded; consider more aggressive offset
    adjustments or smaller annotation fontsizes to create more breathing room
  - Annotation text at 9pt is small — on mobile (400px scaled-down render) this approaches
    the readability floor; increasing to 10pt and reducing the label verbose to just
    the label symbol (not the two-line label+rectform for every point) would improve
    legibility
  - Legend is inside the joint plot area rather than outside; combined with annotation
    crowding this makes the upper-left region cluttered — moving legend outside or
    to the lower-right would open the data field
  - 'DE-02: while spines are removed and grid is subtle, the annotation background
    boxes contribute visual clutter that partially undermines the clean minimal aesthetic'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "scatter-complex-plane · python · seaborn · anyplot.ai" clearly readable in dark ink at top. Axis labels "Re(z)" and "Im(z)" visible at 10pt. Tick labels (−3 to +3) readable at 8pt. Legend in upper-left with four entries (Roots of Unity diamond, Sum of Roots X, Arbitrary Points circle, dashed Unit Circle) — all readable with elevated-bg fill.
      Data: Roots of Unity = green #009E73 filled diamonds (3 points on unit circle arranged 120° apart). Sum of Roots = lavender #C475FD X marker at origin (0+0i). Arbitrary Points = blue #4467A3 circles scattered across all quadrants. Unit circle drawn as dashed gray ring. Arrows from origin to every point. Equilateral triangle connecting roots. Annotation boxes (label + rectangular form) for each point with semi-transparent elevated-bg fill. Top marginal KDE shows green and blue distributions; right marginal shows similar.
      Legibility verdict: PASS — all elements readable, annotation text at 9pt is small but visible; some crowding around origin area but no text is illegible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title clearly visible in light ink (#F0EFE8). Axis labels and tick labels in light color, all readable against the dark background. Legend box uses elevated dark fill (#242420) with light text — readable. No dark-on-dark failures detected.
      Data: All data colors identical to light render — green diamonds, lavender X, blue circles. Unit circle visible as dashed line. Arrow vectors from origin visible at alpha=0.5. Annotation boxes have dark elevated fill with light ink text.
      Legibility verdict: PASS — dark render fully readable, theme-adaptive chrome is correct throughout.
