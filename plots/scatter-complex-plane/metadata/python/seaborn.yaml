review:
  strengths:
  - JointGrid with per-category KDE marginals is a signature seaborn feature used
    expertly — adds statistical distribution context uniquely suited to this library
  - 'Full spec compliance: unit circle, origin vectors (arrows), equal aspect ratio,
    rectangular-form annotations, and distinct markers/colors per category all present'
  - Multi-encoding strategy (hue + marker style + size-by-magnitude) is mathematically
    meaningful and well-justified for the complex plane context
  - Perfect Imprint palette compliance in both themes — green (#009E73) first, lavender
    second, blue third; chrome adapts correctly between light (#FAF8F1) and dark (#1A1A17)
    backgrounds
  - 'Mathematical data is factually correct: 3rd roots of unity computed via e^(2πki/3),
    their sum is correctly 0+0i, arbitrary points span all four quadrants'
  - Annotation offset dictionary carefully tuned per-label to reduce crowding; equilateral
    triangle connecting roots of unity adds elegant mathematical geometry
  weaknesses:
  - Annotation box for z₂ (offset (-95, 18) from data point at -1.8+2.2i) intrudes
    into the upper-left legend area, partially obscuring the 'Arbitrary Points' legend
    entry — move z₂ annotation further from legend (e.g. offset (16, -30) below the
    data point, or (-95, -35) further down)
  - ω₂ annotation (offset (-95, -26) from ~-0.5-0.87i) overlaps with z₄ annotation
    (at -2.5-1.0i with offset (16, -30)) in the lower-left quadrant — adjust z₄ offset
    to (-95, 16) to place it above-left instead, or increase ω₂ offset to (-115, -40)
  - Σωₖ and z₃ annotation boxes are very close in the lower-right quadrant — Σωₖ at
    (0,0) with offset (15,-55) and z₃ at (1.0,-2.0i) with default offset (16,16) nearly
    touch; shift z₃ to (45, 16) to create more separation
