    a narrow angular band and their 24pt labels (radially offset by only 55px screen
    pixels) create tight spacing near the 0.31+0.95i / -0.81+0.59i / 0.31-0.95i /
    -0.81-0.59i quadrant; reduce point label font size to ~18pt or increase base_dist
    to 70px for roots of unity'
  - 'The ''Conjugate pair: symmetric about Re-axis'' annotation box (21pt italic)
    sits at y=0.2 near the real axis in a busy region with multiple arrows converging
    — consider moving it to y=1.0 or y=0.5 offset left, or making it smaller (16pt)
    to reduce interference with the data area'
  - 'LM-02: Bokeh''s distinctive interactive capabilities (HTML artifact with hover)
    are present but the Arrow/vector rendering relies on the add_layout loop rather
    than using Bokeh''s vectorized glyph API (e.g., multi_line or segment for the
    shaft + patches for heads), which would be more performant and more idiomatic
    for many vectors'
