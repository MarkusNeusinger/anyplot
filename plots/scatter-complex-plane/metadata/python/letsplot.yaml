review:
  strengths:
  - Imprint palette applied correctly across all three categories (green/lavender/blue)
    with proper canonical order
  - Interactive tooltips via layer_tooltips() with rich multi-field info (rectangular
    form, polar form, magnitude, angle) leverage lets-plot's distinctive HTML interactivity
  - Equal-aspect coord_fixed() with dashed unit circle and subtle green fill achieves
    the spec's geometric intent cleanly
  - Iterative label repulsion algorithm reduces crowding near the unit circle — goes
    beyond simple offset placement
  - Donut-style markers (shape=21, fill=PAGE_BG) allow vector arrowheads to remain
    visible through the marker body
  - Both light and dark renders pass theme-adaptive chrome checks with correct backgrounds
    and readable text
  weaknesses:
  - 'Label crowding near the unit circle: rect_form annotations (size=3.5) partially
    overlap with vector arrows in the dense center region — consider conditionally
    suppressing rect_form for points within 1.0 units of each other, or increasing
    label_x/y base_offset for tightly packed roots'
  - rect_form text size (3.5 mm ≈ 10pt base, ~17px at 2400px) is small and may be
    unreadable when the image is scaled to mobile widths (~400px); consider raising
    to size=4.5 and limit annotations to less crowded points
  - 'DE-01: Design is functional but not publication-ready — the diagram has visual
    noise from overlapping arrows and labels near origin; thinning arrow alpha further
    (0.4 instead of 0.6) and using a slightly larger base_offset (0.65 instead of
    0.5) would reduce clutter'
  image_description: |-
