review:
  strengths:
  - Full Imprint palette compliance with correct theme-adaptive chrome across both
    renders — all axis properties receive theme tokens
  - Dual-format annotation strategy (symbolic label at fontsize=14 + rectangular form
    at fontsize=10, each at distinct radial offsets) is well-executed and educationally
    valuable
  - arrows! primitive for vector visualisation is idiomatic and distinctive to Makie
    — correct CairoMakie API with origins/directions arrays
  - DataAspect() ensures the unit circle appears circular — critical correctness for
    an Argand diagram
  - Two-category design (5th roots of unity vs arbitrary) with redundant shape encoding
    (circle vs diamond) provides clear visual differentiation
  weaknesses:
  - Rectangular form annotations at fontsize=10 are borderline small at mobile scale
    (~400px); bump to fontsize=11-12 for better legibility
  - Some text annotations (w1 1.5+1.1i and w2 -1.3+0.8i rectangular forms) extend
    slightly beyond axis bounds into canvas margins — reduce radial offsets or add
    axis padding via autolimits
  - Minor label crowding near z2/w2 cluster in the upper-left quadrant where the two
    categories converge spatially
