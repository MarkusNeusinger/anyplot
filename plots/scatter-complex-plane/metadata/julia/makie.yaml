review:
  strengths:
  - Correct Argand diagram with vectors, unit circle, and equal aspect ratio
  - Complete theme-adaptive chrome — all tokens correctly wired for both light and
    dark renders
  - 'Idiomatic Makie: arrows!, DataAspect(), axislegend, hlines!/vlines!, Point2f
    — no workarounds'
  - Imprint palette positions 1 (green) and 2 (lavender) correctly applied; data colors
    identical across themes
  - Intelligent label offset logic that places subscript labels outward from origin
  - 'Perfect code quality: flat KISS structure, deterministic seed, all imports used,
    correct save API'
  weaknesses:
  - Point labels use symbolic subscript names (z₀, z₁, w₁, etc.) rather than rectangular
    form (a+bi) as the spec requires — add secondary text annotations showing e.g.
    "1+0i" or "−0.81+0.59i" beneath/beside each label
  - Arrow linewidth 1.5 (3px rendered) is thin for the 2400×2400 canvas — increase
    to 2.0–2.5 for better visual weight of the vectors
  - Point labels fontsize=13 is readable but slightly small for mobile view — consider
    14–15
  - No visual emphasis between the two categories beyond color — adding distinct marker
    shapes (circle vs diamond) would aid CVD accessibility
  - 'DE-03: data storytelling is functional but lacks emphasis — consider bolding
    or enlarging one root-of-unity arrow or adding a brief annotation explaining the
    geometric significance'
