review:
  strengths:
  - 'Perfect Imprint palette compliance: first series #009E73 (Automated/green), second
    #C475FD (Enhanced/lavender), third #4467A3 (Standard/blue) in canonical order'
  - 'Both renders theme-correct: warm off-white (#FAF8F1) light background, warm near-black
    (#1A1A17) dark background, all chrome (text, grid, legend box) flipping correctly
    with no dark-on-dark failures'
  - 'All font sizes explicitly set with proper hierarchy: title 12pt bold, subtitle
    9pt muted, axis titles 10pt, tick/legend labels 8pt — readable in both themes
    at desktop and mobile'
  - 'Good visual refinement: all border spines removed except bottom x-axis line,
    tick marks removed, subtle y-axis-only grid (alpha=0.10), generous whitespace'
  - Smart site ordering by Standard-method concentration creates a left-to-right trend
    visible across all three methods simultaneously
  - Realistic environmental science scenario (nitrate concentration at water sampling
    sites, three analytical methods) with plausible SE values showing 3-4x wider uncertainty
    for Automated method
  - 'Idiomatic plotnine grammar-of-graphics: geom_crossbar + position_dodge + scale_color/fill_manual
    + scale_x_discrete composed cleanly'
  - Deterministic hardcoded data, clean KISS structure, all imports used — perfect
    code quality
  weaknesses:
  - geom_crossbar renders a rectangular box rather than the canonical point-plus-whisker
    error bar. The spec describes 'bars extending above and below each point' implying
    a visible point marker. Consider geom_point + geom_errorbar or geom_pointrange
    for a more traditional error bar appearance that matches reader expectations.
  - DE-03 (Data Storytelling) is carried primarily by the subtitle text rather than
    visual encoding. The plot itself shows three colored groups without additional
    emphasis (no reference line, no highlighted worst/best group, no size variation
    beyond the natural SE difference). Visual hierarchy improvements could reinforce
    the story without needing to read the subtitle.
  - 'LM-02 (Distinctive Features) limited: geom_crossbar and position_dodge are ggplot2-origin
    features that work identically in ggplot2 R or lets-plot. No plotnine-specific
    feature is exploited (e.g., theme composition pattern, facet_wrap for multi-panel,
    specific scale extensions).'
  - 'DE-01 moderate: the design is above defaults thanks to the Imprint palette and
    refined chrome, but no exceptional design element elevates it to ''strong design''
    — consider a reference line for regulatory limits or emphasizing the highest-uncertainty
    method with a slightly larger crossbar width.'
