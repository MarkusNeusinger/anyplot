review:
  strengths:
  - Clean idiomatic plotnine grammar-of-graphics approach using geom_errorbar + geom_point
    layers with shared position_dodge
  - 'Full theme-adaptive chrome: backgrounds, text, grid, and legend all correctly
    switch between light (#FAF8F1) and dark (#1A1A17) themes'
  - Imprint palette applied correctly — Automated=#009E73 (first series), Enhanced=#C475FD,
    Standard=#4467A3 in canonical order
  - 'Correct axis labels with units: Concentration (mg/L) vs Sampling Site'
  - Sites sorted by Standard-method concentration to create a meaningful left-to-right
    ascending visual pattern
  - Error bars have visible caps (width=0.35) and are clearly distinguishable from
    data points
  - 'Excellent code quality: deterministic data, clean KISS structure, all imports
    used, correct plot-{THEME}.png output'
  weaknesses:
  - Design storytelling is absent — no visual emphasis highlights the key insight
    (Automated has widest uncertainty; all three methods show consistent site-to-site
    ranking); consider annotating the highest-variability series or using visual emphasis
    to guide the viewer
  - DE-01 is at well-configured-default level (4/8) — adding intentional typographic
    hierarchy, refining the legend frame with a subtle border (legend_box_color),
    or using size variation between point and cap stroke could push design to DE-01=6
  - DE-02 partially achieved — the legend lacks a border/frame distinction; adding
    legend_box_color or legend_frame with a thin INK_SOFT rule would improve the detail
    polish
  - 'DQ-03: Dissolved oxygen concentrations of 36–69 mg/L are physically impossible
    in water (real saturated DO ≈ 8–15 mg/L at sea level). Relabel the analyte (e.g.,
    Total Suspended Solids, Nitrate, BOD) or use values in the physically plausible
    range for DO (6–12 mg/L) to pass factual correctness'
  - 'LM-02: Usage is correct but generic — does not leverage any distinctively plotnine
    feature (e.g., stat_summary, facet_wrap for small multiples by method, or geom_crossbar
    instead of bare geom_errorbar for a more information-dense render)'
