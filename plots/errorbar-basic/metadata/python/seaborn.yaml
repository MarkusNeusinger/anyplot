review:
  strengths:
  - Seaborn's native errorbar="sd" API used for automatic within-group SD computation
    — no manual statistics needed
  - Well-chosen clinical dose-response context with realistic, neutral data (Control/Placebo/10mg/25mg/50mg/100mg
    groups, n=30 each)
  - Intelligent two-color Imprint palette strategy (green for all groups, lavender
    for top performer) with explanatory custom legend
  - Subtitle explicitly narrates the data insight, creating clear data storytelling
    hierarchy
  - 'Perfect theme-adaptive chrome: error bar color, grid, text, legend all adapt
    correctly in both light and dark renders'
  - Correct seaborn 0.13+ API patterns (hue parameter for palette, avoiding FutureWarning)
  - No bbox_inches='tight' — correct canvas control with subplots_adjust; exact 3200x1800
    output
