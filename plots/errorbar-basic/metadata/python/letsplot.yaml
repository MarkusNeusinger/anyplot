      Data: Four groups (Control, Treatment A, Treatment B, Treatment C) in brand green (#009E73). Treatment D (focal, highest error) in lavender (#C475FD, Imprint position 2). Center points (size=6) and capped error bars (width=0.3) visible for all five groups. Horizontal Y-grid lines subtle (15% opacity). No X-grid. No legend.
      Legibility verdict: PASS — all text elements readable, no light-on-light issues, good contrast throughout.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
