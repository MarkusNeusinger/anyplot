review:
  strengths:
  - Focal highlighting using Imprint palette positions 1+2 (brand green for base,
    lavender for widest-error group) creates intentional visual hierarchy with a clear
    focal point
  - Subtitle explicitly communicates the key insight, removing the need for a legend
    while telling the data story
  - Y-axis-only grid with subtle opacity (15%), no X-axis grid, and panel border removal
    show solid visual refinement
  - 'Theme-adaptive chrome is fully correct in both renders: warm off-white (#FAF8F1)
    light background, near-black (#1A1A17) dark background, all text readable in both
    themes'
  - Correct 3200×1800 canvas via ggsize(800,450)+scale=4, all font sizes explicitly
    set (title 16pt, axis 12pt, ticks 10pt, subtitle 11pt)
  - 'Clean KISS structure: constants → data → theme → plot → save, with both PNG and
    HTML outputs'
  weaknesses:
  - 'LM-02: lets-plot''s interactive HTML output is exported but no distinctively
    idiomatic lets-plot features (e.g. geom_livemap, sampling, animation, or Kotlin-interop
    patterns) are leveraged — implementation is solid but generic across ggplot2-style
    libraries'
  - 'DE-01: Design is clean and intentional but does not yet reach publication-ready
    level (8/8) — the focal highlight idea is good but the plot would benefit from
    a reference line or annotation mark on Treatment D to further anchor the story'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct light theme surface.
      Chrome: Title "errorbar-basic · python · letsplot · anyplot.ai" in dark ink (#1A1A17) at 16pt, spanning ~60% of canvas width. Subtitle in medium gray (INK_SOFT #4A4A44) at 11pt clearly readable. X-axis label "Experimental Group" and Y-axis label "Measured Value (mg/dL)" both in dark ink at 12pt. Tick labels (category names on x-axis, numeric values 40–65 on y-axis) in INK_SOFT at 10pt. L-shaped axis frame (left + bottom only) in INK_SOFT. Subtle horizontal Y-axis grid lines visible. No top/right spines, no X-axis grid.
      Data: 4 groups (Control, Treatment A, Treatment B, Treatment C) rendered in brand green #009E73 with T-capped error bars and circular center markers (size=6). Treatment D rendered in Imprint palette position 2 lavender #C475FD, visually distinct as the focal group. Error bar caps are clearly visible on all groups. No legend (removed; subtitle explains the highlight).
      Legibility verdict: PASS — all text fully readable, no dark-on-light failure, no crowding.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct dark theme surface.
      Chrome: Title and subtitle now rendered in near-white (#F0EFE8 / #B8B7B0 respectively), clearly legible against the dark background. Axis labels and tick labels switch to light-on-dark as expected. Grid lines remain subtle. Axis lines visible in lighter INK_SOFT dark-mode color (#B8B7B0).
      Data: Data colors are identical to the light render — base series in brand green #009E73, Treatment D in lavender #C475FD. Both read well on the near-black surface. Error bars and center markers retain the same visual weight.
      Legibility verdict: PASS — no dark-on-dark failure observed. All text is light-on-dark and clearly readable. No element is unreadable or invisible.
