review:
  strengths:
  - Excellent error bar implementation for a library without native support -- vertical
    stems and capped ends are clearly visible on all 6 groups
  - Amber callout at 10 mg/kg is a sophisticated focal-point design choice that highlights
    the asymmetric error story
  - Dose-response baseline reference line enables immediate visual comparison at every
    dose
  - Correctly uses the Imprint palette in both themes with no chrome failures in either
    render
  - All code quality criteria met perfectly, including the subtle sys.path workaround
    for the filename conflict
  - Rich per-point tooltip labels in the HTML output provide excellent interactivity
  weaknesses:
  - 'Legend label truncation: the amber callout entry shows as ''Asymmetric at 10
    m...'' -- shorten label to fit within pygal legend width (e.g. ''Asymmetric at
    10 mg/kg (-6.2/+2.8)'')'
  - 'Empty canvas below legend: ~20% of canvas height is unused space making the layout
    bottom-heavy -- adjust margin settings to reclaim this space'
