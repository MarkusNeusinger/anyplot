review:
  strengths:
  - 'Both light and dark themes render correctly with proper Imprint palette colors
    — brand green #009E73 on Control, full palette in canonical order'
  - Asymmetric error bars are elegantly implemented using Bokeh-native Whisker + TeeHead
    models with per-group ColumnDataSource, enabling distinct colors per error bar
  - Font sizes well-calibrated for 3200x1800 canvas (50pt title, 42pt axis labels,
    34pt tick labels) — all text legible in both themes
  - The 'highest variability' annotation on Treatment C provides genuine data storytelling
    with idiomatic Bokeh Label model
  - 'Excellent code quality: seed(42), clean imports, linear structure, no fake UI
    or unnecessary abstractions'
  weaknesses:
  - 'Title is missing the required ''python'' language component — actual: ''errorbar-basic
    · bokeh · anyplot.ai'', required: ''errorbar-basic · python · bokeh · anyplot.ai'''
  - outline_line_color = INK_SOFT creates a full rectangular box border around the
    plot area; the style guide prefers an L-shaped frame (remove top and right spines).
    In Bokeh this means setting p.outline_line_color = None and keeping only left/bottom
    axis lines.
  - Design is competent but not exceptional — the annotation provides some storytelling
    but there is no strong visual hierarchy or emphasis technique beyond color differentiation
