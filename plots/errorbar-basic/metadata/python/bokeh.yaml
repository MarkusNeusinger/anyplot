review:
  strengths:
  - 'Full theme-adaptive chrome: every text, grid, and axis element uses INK/INK_SOFT
    tokens with correct light/dark values'
  - Idiomatic use of Bokeh's Whisker + TeeHead annotation for capped error bars —
    the right tool for this task
  - Asymmetric error bars demonstrated well, showing distributional awareness
  - Perfectly clean code structure with all sizing explicit and above minimums
  weaknesses:
  - Y-axis starts at 0 when data begins at ~23 — set y_range.start to float(min(lower)
    * 0.85) to eliminate the ~40% dead vertical space
  - No design differentiation across the six groups — consider using Okabe-Ito multi-color
    (one per group) to add visual sophistication
  - No visual focal point or storytelling — Treatment D (maximum) and Treatment C
    (highest variability) are not highlighted
