review:
  strengths:
  - Per-group colored Whiskers + TeeHead caps via individual ColumnDataSources — an
    elegant Bokeh-specific pattern enabling per-element color without manual glyph
    hacks
  - 'Full Imprint palette compliance in canonical order (#009E73 first); both theme
    backgrounds correct (#FAF8F1 / #1A1A17); all chrome theme-adaptive with no dark-on-dark
    failures in either render'
  - All text sizes explicitly set with correct hierarchy (50pt title, 42pt axis labels,
    34pt tick labels) — well-proportioned and readable at desktop and mobile widths
    in both themes
  - Asymmetric error bars correctly implemented with distinct lower and upper error
    arrays demonstrating Treatment C high variability
  - '"highest variability" annotation creates a clear focal point and elevates the
    plot above a plain data display, guiding the viewer to the key insight'
  weaknesses:
  - The "highest variability" annotation has no visual connector (arrow or line) to
    the error bar cap it references, which could be ambiguous when the plot is displayed
    at small sizes
  - Design lacks one standout finishing touch to reach 'strong design' tier — an annotation
    arrow or a thin reference line at the Control mean would close the DE-01 gap
