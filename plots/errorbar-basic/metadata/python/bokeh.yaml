      Data: Six groups with scatter points and Whisker error bars (TeeHead caps). Colors: Control=#009E73 (brand green), Treatment A=#C475FD (lavender), Treatment B=#4467A3 (blue), Treatment C=#BD8233 (ochre), Treatment D=#AE3030 (matte red), Treatment E=#2ABCCD (cyan). Scatter markers have page-background edge highlight. Error bar lines are thick (5px) with large caps (size=40). Asymmetric errors visible especially on Treatment C (largest lower extent). "highest variability" annotation in small italic muted text near Treatment C lower cap.
