review:
  strengths:
  - 'Idiomatic Altair layer composition: error bars (mark_rule), caps (mark_tick),
    and central points (mark_circle) are stacked cleanly via alt.layer() with a shared
    base encoding'
  - alt.condition() with alt.datum predicate highlights the peak-response group (Treatment
    D) in ochre — a distinctive Altair-specific technique that creates a clear focal
    point without a legend
  - Asymmetric error bars implemented correctly with separate error_lower/error_upper
    columns, correctly encoding the wider lower bound for Treatment C
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT all flip correctly between
    light (#FAF8F1) and dark (#1A1A17) — both renders pass the readability check'
  - 'Canvas handling follows the canonical Altair pattern: raise on overshoot, pad-only
    on undershoot — AR-09 guard correctly in place'
  - 'Both light and dark renders have clear, readable text with no dark-on-dark or
    light-on-light issues; Imprint brand green #009E73 and ochre #BD8233 are clearly
    distinguishable on both surfaces'
  weaknesses:
  - No visual annotation or text label explaining why Treatment D is accented in ochre
    — a single callout (e.g., 'Peak response') would complete the storytelling intention
    behind the conditional highlight
  - Tick labels at labelFontSize=10 are the minimum allowed; at 400 px mobile width
    the rendered text will be very close to the legibility floor — a small bump to
    11 would add a safety margin
  - gridOpacity=0.10 produces an extremely faint grid (barely perceptible in both
    renders); the style guide permits up to 0.15 and that range provides a cleaner
    reading guide without overpowering the data
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "errorbar-basic · python · altair · anyplot.ai" in bold near-black text at top-left, occupying ~50% of canvas width — readable. Y-axis label "Response Value (units)" in dark ink, rotated — readable. X-axis label "Experimental Group" in bold dark ink — readable. Tick labels for both axes in INK_SOFT grey — all readable. Horizontal grid lines are present but extremely subtle (~10% opacity).
      Data: 6 experimental groups on x-axis (Control, Treatment A–E). Five groups rendered in brand green (#009E73) with mark_rule stems, mark_tick caps, and mark_circle center points. Treatment D accented in ochre (#BD8233) with a larger central circle — the peak response group is clearly the visual focal point. Asymmetric errors visible: Treatment C has a noticeably wider lower error bar than upper.
      Legibility verdict: PASS — all text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light (#F0EFE8) text — readable. Y-axis and X-axis labels in light INK token — readable. Tick labels in INK_SOFT lighter grey — readable. Grid lines in 10% opacity light colour — subtle but present. No dark-on-dark text issues observed anywhere.
      Data: Colors are identical to the light render — brand green #009E73 for five groups, ochre #BD8233 for Treatment D. Both hues remain clearly distinguishable against the dark background. The green is slightly more vivid on dark and the ochre reads well. Error bar stems, caps, and point markers are all clearly visible.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures.
