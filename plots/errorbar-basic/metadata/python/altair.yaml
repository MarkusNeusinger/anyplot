review:
  strengths:
  - Conditional encoding (alt.condition with alt.datum) simultaneously controls color
    and point size for Treatment D — idiomatic Altair creating immediate visual hierarchy
  - Asymmetric error bars (separate error_lower/error_upper columns) correctly implement
    the spec requirement for skewed distribution handling
  - 'Full theme-adaptive chrome: background, axis labels, grid, and spines all switch
    correctly between light and dark renders'
  - PIL-based canvas padding with overflow guard (SystemExit on overshoot) ensures
    exact 3200x1800 target is always hit safely
  - Both HTML and PNG outputs saved correctly per the altair library spec
  weaknesses:
  - Annotation 'Peak response' at fontSize=10 (italic) is the smallest text element
    — at mobile scaling (~400px wide) it may be borderline readable; consider bumping
    to fontSize=11-12
  - No explicit configure_title(color=INK) call — title color set via alt.Title(color=INK)
    which works but differs from the canonical library guide snippet; minor consistency
    issue only
  image_description: |-
