review:
  strengths:
  - Custom ECharts renderItem correctly implements error bar stems with horizontal
    caps — the idiomatic approach for this chart type in ECharts
  - markArea 'Optimal N zone' annotation adds genuine storytelling context beyond
    just displaying data
  - Correct Imprint palette applied (brand green first, lavender second), both light
    and dark themes render with proper chrome
  - 'Clean chrome: axis lines and tick marks removed, only subtle y-axis grid via
    t.grid token'
  - Realistic and scientifically accurate agricultural data (wheat/barley N-response)
    with appropriate error magnitudes and N response curves
  - All font sizes explicitly set and well-proportioned; both renders fully legible
    with no dark-on-dark failures
  weaknesses:
  - Helper functions mkErrData and mkScatData deviate slightly from KISS; they could
    be inlined into the series data arrays
  - 'Y-axis min=0 leaves ~20% of chart height with no data below y≈1.5; setting min:
    0.5 or 1 would tighten proportions and improve canvas utilization'
  - DE-01 could reach the next tier with a heavier title font weight and typographic
    hierarchy differentiating the primary series from secondary
