review:
  strengths:
  - ECharts custom series with renderItem correctly renders error bar stems + top/bottom
    caps with z-layered scatter markers on top — clean ECharts idiom for non-standard
    chart elements
  - 'All theme tokens applied correctly: t.ink for title, t.inkSoft for axis labels/ticks,
    t.grid for gridlines, t.pageBg as marker border — both renders pass the theme-readability
    check'
  - Realistic, scientifically plausible dataset (wheat yield response to nitrogen
    fertilization) with agronomically sensible yield values and growing error magnitudes
  - 'Perfect spec compliance: correct chart type, visible caps, consistent bar widths,
    center-value markers, proper title format'
  - 'White-bordered markers (borderColor: t.pageBg, borderWidth: 2) give clear visual
    definition of center values against the error bars'
  weaknesses:
  - Design storytelling is minimal — no annotation or visual cue highlighting the
    peak yield point at N=200 kg/ha, which is the most informative feature of the
    dose-response curve; adding a short annotation or emphasis marker would raise
    DE-03
  - Only a single series is shown; the spec explicitly notes 'Consider using different
    colors to distinguish between groups when comparing multiple series' — adding
    a second comparison series (e.g., a different crop variety or fertilizer type)
    would improve DQ-01 Feature Coverage and demonstrate the palette
  - DE-01 design sophistication is basic — the plot shows no intentional visual hierarchy
    beyond z-index layering; subtle design improvements (e.g., a reference line at
    the control/zero-dose baseline, or a shaded 'optimal range' band) would elevate
    the chart
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "errorbar-basic · javascript · echarts · anyplot.ai" in dark ink (#1A1A17), centered at top. Y-axis label "Wheat Yield (t/ha)" rotated 90° on left, X-axis label "Nitrogen Dose (kg N/ha)" at bottom — both in muted dark ink, clearly readable. Tick labels (0–7 on Y, 0/50/100/150/200/250/300 on X) in soft dark tone — all readable. Subtle horizontal grid lines only (Y-axis), no vertical gridlines.
      Data: 7 error bars in brand green (#009E73) with vertical stems and visible horizontal caps at both ends. Circular center-value markers in the same brand green with a warm-white border (t.pageBg) for definition. The data pattern shows a clear dose-response curve: yields rise steeply from 0→150 kg N/ha, plateau around 150–200, then decline slightly.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in near-white (t.ink = #F0EFE8), clearly visible. Axis labels and tick labels in light-grey (t.inkSoft = #B8B7B0) — readable against the near-black surface, no dark-on-dark failures. Grid lines appear as very subtle lighter lines on the dark surface.
      Data: Error bars and center markers are identical green (#009E73) to the light render — only chrome flipped. White-bordered markers remain visible with the border adapting to t.pageBg which in dark mode renders as transparent/elevated dark.
      Legibility verdict: PASS — all text is readable against the dark background. No dark-on-dark text failures detected.
