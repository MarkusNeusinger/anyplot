review:
  strengths:
  - 'Idiomatic MUI X composition: ChartContainer + BarPlot + individual axis/grid
    components used correctly'
  - Advanced use of useXScale/useYScale hooks to draw custom SVG error bars in chart
    coordinate space — the correct MUI X approach for custom overlays
  - 'Both light and dark renders are fully legible: error bars use t.ink so they adapt
    automatically (dark whiskers on cream, light whiskers on near-black)'
  - 'Correct single-series Imprint palette: colors={[t.palette[0]]} ensures brand
    green #009E73 throughout'
  - Realistic, neutral plant-stress dataset with meaningful error bars; descriptive
    title prefix 'Seedling Growth Under Stress' aids storytelling
  - No legend added for single series (clean), no top/right spines (MUI X default
    L-frame), horizontal-only grid, rounded bar corners (borderRadius=4)
  weaknesses:
  - 'Design sophistication is baseline: all bars uniform green with no visual emphasis
    — consider annotating the control vs drought contrast or using opacity variation
    to create hierarchy'
  - Error bar caps (14% of bandwidth) are on the small side and could be slightly
    wider (18–20%) to improve readability at mobile scale
  - No visual storytelling beyond the title prefix — no reference line (e.g. control
    mean) or color gradient to guide the viewer's eye through the stress comparison
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "Seedling Growth Under Stress · errorbar-basic · javascript · muix · anyplot.ai" in dark ink, centered, scaled down slightly (~20px) to fit the 77-char string — fully readable. X-axis label "Growth Condition" and Y-axis label "Mean Stem Elongation (cm / week)" both in dark ink at 16px — clearly visible. Tick labels at 14px, readable. Horizontal grid lines are subtle (~15% opacity).
      Data: 7 bars in Imprint brand green (#009E73) for conditions Control through Flood. Error bars rendered as custom SVG using dark ink (t.ink) with visible top and bottom caps. Bars have slight rounded corners.
      Legibility verdict: PASS — all text dark on warm off-white, no contrast failures.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct theme surface, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light ink (MUI ThemeProvider auto-adapts). No dark-on-dark failures observed. Grid lines are light-toned and subtle.
      Data: Bar color (#009E73) is identical to light render — only chrome flips. Error bar whiskers and caps switch from dark to light ink (t.ink) correctly, remaining clearly visible against the dark background.
      Legibility verdict: PASS — all text light on near-black, no dark-on-dark failures.
