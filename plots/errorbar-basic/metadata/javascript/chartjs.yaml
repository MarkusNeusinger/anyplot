review:
  strengths:
  - Correct error bar plot type with visible I-bar caps and symmetric ±1 SD error
    bars
  - Custom Chart.js plugin (`afterDatasetsDraw`) idiomatically uses `getPixelForValue()`
    and `getDatasetMeta()` to draw error bars — real Chart.js API depth
  - 'Both themes render correctly: warm off-white (#FAF8F1) light background and warm
    near-black (#1A1A17) dark background; error bars adapt color via `t.ink` token'
  - All font sizes explicitly set (title 22px, axis titles 15px, ticks 14px, legend
    16px) and balanced between X/Y axes
  - Realistic plant-growth dataset with natural inverted-U pattern (peak at 25°C)
    and varying error magnitudes across conditions
  - 'Imprint palette compliant: first series is #009E73 at 60% opacity with solid
    #009E73 border; data colors identical across themes'
  - Background plugin correctly fills canvas with `t.pageBg` before rendering — prevents
    Chart.js default transparent/white canvas
  - Clean, linear code structure with no functions/classes; deterministic hardcoded
    data
  weaknesses:
  - 'DE-02 LOW: All four Chart.js spines visible (default border); style guide mandates
    removing top and right spines for bar/line charts — add `scales.x.border.display:
    false` / `scales.y.border.display: false` and draw only the bottom/left border,
    or use `Chart.defaults.borderColor` with a transparent top/right trick'
  - 'DE-02 LOW: Grid is visible on both X and Y axes (Chart.js default); style guide
    says Y-axis only grid for bar charts — set `scales.x.grid.display: false` to suppress
    the vertical grid lines'
  - 'DE-03 LOW: All five bars are identically styled with no visual hierarchy; the
    inverted-U peak at 25°C is the story but nothing guides the viewer to it — highlight
    the peak bar with full opacity (remove the 60% alpha there) or use a slightly
    contrasting border color, or add a subtle reference line at the peak value'
  - 'LM-02 PARTIAL: The plugin draws error bars correctly but uses raw `ctx` drawing
    without leveraging Chart.js''s `BarElement` geometry helpers (e.g., `bar.width`
    for cap sizing relative to bar width, rather than a hardcoded 18 CSS-px constant)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "errorbar-basic · javascript · chartjs · anyplot.ai" in dark ink (~22px), centered at top — ~55% of canvas width, readable. X-axis title "Growth Temperature" and Y-axis title "Stem Length (cm)" in dark ink at 15px — balanced and readable. Tick labels in muted dark color at 14px — all readable. Legend "Mean stem length (cm)" with green swatch at top-center.
      Data: Five bars in brand green #009E73 at 60% opacity with solid #009E73 border; I-shaped error bars in dark ink (t.ink) with horizontal caps at both ends, sizes varying from ±1.8 to ±3.4 cm. Bars form a clear inverted-U pattern with peak at 25°C.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light cream color (#F0EFE8) — clearly readable. Axis titles and labels in light colors (t.ink / t.inkSoft) — all readable. Tick labels in muted light gray — readable. Legend text light-colored. No dark-on-dark issues detected.
      Data: Bar colors identical to light render (#009E73 at 60% opacity with solid border) — Imprint palette consistent across themes. Error bars now render in white/light ink (t.ink flips to #F0EFE8 in dark mode) — highly visible against the green bars and dark background.
      Legibility verdict: PASS — all text readable against near-black background; error bars correctly adapt to theme via t.ink token.
