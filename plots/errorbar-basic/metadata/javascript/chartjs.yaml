review:
  strengths:
  - 'Custom Chart.js plugin system: bgPlugin, spinePlugin, and errorBarPlugin demonstrate
    idiomatic use of Chart.js lifecycle hooks (beforeDraw, afterDraw, afterDatasetsDraw)'
  - Data storytelling via opacity emphasis — peak bar at 25°C rendered at full opacity
    while remaining bars use 60%, creating a clear inverted-U focal point
  - Proportional cap width (35% of bar width) and L-shaped spine via spinePlugin show
    polished attention to detail
  - 'Fully theme-adaptive chrome: error bar color uses t.ink, backgrounds use t.pageBg,
    both renders correctly switch chrome without touching data colors'
  - Realistic plant-growth scenario with plausible temperatures (15–35°C) and biologically
    sensible inverted-U peak
  weaknesses:
  - Single-series legend is redundant — the y-axis label already carries the same
    information; removing it would reduce visual noise and save vertical space
  - 'DE-01 ceiling: the composition is clean and intentional but stops short of FiveThirtyEight-level
    sophistication — a subtle annotation marking the 25°C apex or a thin reference
    line for the average would elevate the storytelling'
  - Error bar color uses t.ink (full primary text color) — a slightly softer t.inkSoft
    or t.grid-adjacent tone would let the data bars breathe more while keeping the
    whiskers readable
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "errorbar-basic · javascript · chartjs · anyplot.ai" centered at top, dark ink, occupies ~55% of width — well-proportioned. Y-axis label "Stem Length (cm)" and X-axis label "Growth Temperature" both dark ink, balanced size. Tick labels dark-on-light, clearly readable. L-shaped spine (left + bottom only) via custom plugin. Subtle Y-axis horizontal gridlines only.
      Data: Five bars in brand green #009E73. Peak bar (25°C) at full opacity, remaining four at ~60% opacity — clear visual emphasis on inverted-U apex. I-bar error bars drawn in dark ink with horizontal caps at both ends; caps are proportional to bar width. Legend swatch is green, label "Mean stem length (cm)".
      Legibility verdict: PASS — all text readable, no overlap, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, no pure black.
      Chrome: Title and axis labels flip to light off-white; tick labels similarly light. Error bar whiskers render white/light (t.ink = #F0EFE8 on dark theme), cleanly visible against near-black background. L-spine and gridlines use light-toned adaptive tokens. No dark-on-dark failures detected.
      Data: Bar colors identical to light render — same #009E73 green at identical opacity levels. Peak emphasis preserved. Error bar caps visible in white.
      Legibility verdict: PASS — all chrome correctly adapts; no unreadable elements in dark theme.
