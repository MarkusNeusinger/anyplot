      Background: Warm off-white #FAF8F1 — correct surface for light theme
      Chrome: Title "errorbar-basic · javascript · d3 · anyplot.ai" in bold dark (#1A1A17) text at 22px CSS, clearly prominent. Y-axis label "Crop Yield (t/ha)" and x-axis label "Fertilizer Treatment" in dark ink at 16px CSS, both readable. Y-axis tick labels (2.0–7.0) and x-axis treatment names in soft ink (#4A4A44) at 14px CSS — readable. "★ Top yield" annotation in matte red above NPK upper cap, legible at 13px bold.
      Data: Six vertical error bars with mean circles (r=9) and capped stems. Colors in canonical Imprint order — Control: #009E73 (green), Nitrogen: #C475FD (lavender), Phosphorus: #4467A3 (blue), Potassium: #BD8233 (ochre), NPK: #AE3030 (matte red), Organic: #2ABCCD (cyan). Mean value labels below each circle in matching treatment color. Subtle reddish column highlight behind NPK at 7% opacity.
      Legibility verdict: PASS — all text readable; mean labels at 13px are slightly below the 14px style-guide minimum but remain legible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct surface for dark theme
      Chrome: Title in light (#F0EFE8) text, clearly visible against dark surface. Axis labels ("Fertilizer Treatment", "Crop Yield (t/ha)") in light ink at 16px CSS — visible. Tick labels in soft light (#B8B7B0) at 14px CSS — readable. No dark-on-dark failures detected; all chrome elements use theme-adaptive token values.
      Data: Data colors are identical to light render — green, lavender, blue, ochre, matte red, cyan circles and stems in same Imprint palette positions. Mean value labels in treatment colors all retain adequate contrast on dark surface. NPK column highlight creates a subtle dark-red tint, consistent with the light render's highlight intent. "★ Top yield" annotation in matte red (#AE3030) is visible on near-black background.
      Legibility verdict: PASS — both chrome and data elements remain readable; no dark-on-dark issues.
