review:
  strengths:
  - 'Both themes render flawlessly with correct Imprint palette chrome adaptation;
    brand green #009E73 is identical across light and dark'
  - Realistic, scientifically-credible agricultural field trial data with plausible
    yield values and SDs; perfect spec compliance including visible caps and consistent
    widths
  - Perfectly clean, flat D3 code structure with idiomatic data joins and bandwidth-based
    cap sizing
  - Horizontal-only subtle gridlines, no top/right spines, and pageBg stroke on mean
    circles are thoughtful refinements above defaults
  weaknesses:
  - Y-axis domain starts at 0 while all data ranges from 2.8-6.3, leaving the bottom
    ~40% of the plot area empty — use domain [1.5, 7.0] or [2.0, 7.0] to better fill
    canvas height
  - All six treatments share the same brand green color with no visual differentiation
    — apply d3.scaleOrdinal over t.palette to give each treatment its own Imprint
    color, boosting both aesthetic sophistication and storytelling
  - No visual emphasis on the top-performing NPK treatment — color variation or a
    subtle annotation would guide the viewer immediately to the key insight
