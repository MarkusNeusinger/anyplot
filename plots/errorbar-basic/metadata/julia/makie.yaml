  - 'LM-02 MODERATE (3/5): Primitive layering is Makie-idiomatic but the combination
    errorbars!+lines!+scatter! follows the standard template without using more distinctive
    Makie capabilities (e.g., hidespines!, hidedecorations!, explicit axis margins
    for tighter padding)'
