    output format'
  weaknesses:
  - 'DE-01 LOW (5/8): Design lacks visual emphasis beyond clean defaults — no annotation
    or focal point highlights the growth saturation plateau visible in the data; the
    saturation around 800-1600 lux is the key insight but nothing draws the eye to
    it'
  - 'DE-02 MODERATE (4/6): Visual refinement is good but incomplete — xticklabelsize
