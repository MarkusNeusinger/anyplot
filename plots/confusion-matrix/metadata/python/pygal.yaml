  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - correct and appropriate
      Chrome: Title, axis labels (True Label / Predicted Label), class labels (Positive/Neutral/Negative/Mixed), and all cell values are dark and clearly readable against light background
      Data: Blue sequential colormap from light (#f7fbff) to dark (#08306b); diagonal cells (correct predictions) are highlighted with darker borders (#0072B2); colorbar shows value scale from 5 to 142
      Legibility verdict: PASS - all text is clear and readable

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct and appropriate
      Chrome: Title and axis labels are light-colored and readable. HOWEVER, cell value text is the same light color (#F0EFE8) used for primary text, which creates a critical light-on-light contrast failure in cells with low values and light backgrounds. Values like 12, 5, 8, 18, 15, 22, 7, 9, 11, 14, 28, 18 (12 off-diagonal cells) are barely legible - light cream text on light blue/white cell backgrounds.
      Data: Color gradient is consistent with light render (data colors unchanged, only chrome should adapt)
      Legibility verdict: FAIL - light-on-light text contrast breaks readability in 75% of off-diagonal cells. The implementation failed to properly adapt text color for dark theme on light cell backgrounds.
