review:
  strengths:
  - Correct ternary-to-Cartesian coordinate transformation with proper equilateral
    triangle geometry
  - Triangle interior masking with NA values produces a clean, precise boundary on
    the density raster
  - Perfect theme adaptation — chrome tokens wired through all text, legend, and background
    elements; both renders pass legibility
  - Viridis heatmap + semi-transparent white contour line overlay is an excellent
    visual choice for density visualization
  - Three realistic sediment facies with distinct beta-distributed clustering tells
    a clear geological story
  weaknesses:
  - Legend text at 14pt is below the 16pt minimum recommended for the 3600x3600 canvas;
    legend title at 18pt is fine
  - Subtitle at 15pt is slightly small for the canvas size (recommend 16-18pt)
  - No in-plot facies annotations near each density peak — the subtitle provides context
    but the viewer must infer which peak belongs to which facies
  - Ternary reference grid lines lack percentage labels (20%, 40%, 60%, 80%); viewers
    cannot read component proportions from the plot
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "ternary-density · r · ggplot2 · anyplot.ai" in dark ink, clearly readable. Subtitle in dark secondary ink, readable (slightly small at 15pt). Vertex labels "Sand", "Silt", "Clay" bold, clearly readable. Colorbar title "Density" and tick labels readable.
      Data: Viridis colormap (purple=low, yellow-green=high) fills the triangle interior. Three distinct density peaks near each vertex. White semi-transparent contour lines overlay the heatmap. Faint grid lines at 20/40/60/80% intervals. Triangle border in dark ink.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title, subtitle, and vertex labels switch to light ink (#F0EFE8/#B8B7B0), all clearly readable against dark background. Colorbar text is light and legible. Triangle border visible in light ink. No dark-on-dark failures detected.
      Data: Viridis colormap is pixel-identical to light render — three density peaks at same positions with same colors. Contour lines identical. Data colors unchanged between themes as required.
      Legibility verdict: PASS
