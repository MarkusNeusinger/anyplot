review:
  strengths:
  - 'Full spec compliance: ternary heatmap with KDE, contour lines at 25/50/75% density
    levels, grid lines, and clearly labeled vertices'
  - Impressive manual KDE + marching-squares contour implementation within letsplot's
    grammar-of-graphics framework
  - Theme-adaptive chrome correctly applied across both renders — warm backgrounds,
    INK/INK_SOFT tokens on title, legend, and grid
  - Realistic and neutral sediment-composition (sand/silt/clay) context with three
    distinct Dirichlet-generated clusters
  - Viridis colormap is the correct choice for continuous density data per style guide
  - Clean flat-script structure with np.random.seed(42) for reproducibility; all imports
    are used
  - Both PNG and HTML outputs saved correctly; ggsize(1600, 900) + scale=3 achieves
    4800×2700 px
  weaknesses:
  - Density layer has a mosaic/pixelated appearance due to the polygon-per-cell approach
    — geom_tile would produce a smoother heatmap
  - Plot title font size is 22 instead of the recommended 24 (per style guide for
    DPI-based libs); minor but should be bumped
  - White dashed contour lines are thin relative to the large canvas (size=1.5 at
    scale=3 is only 4.5px); increase to size=2.5–3 for better visibility on the final
    4800×2700 output
  - letsplot-distinctive features are underused — the HTML output has no interactive
    tooltips configured (e.g., geom_point with aes tooltip), which is a signature
    letsplot capability
  - Grid lines (alpha=0.4, size=0.7) are fairly faint; could be slightly more visible
    at the rendered resolution
