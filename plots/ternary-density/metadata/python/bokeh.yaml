      Background: Warm off-white (~#FAF8F1) — correct per style guide
      Chrome: Title "Sediment Composition · ternary-density · python · bokeh · anyplot.ai" appears in dark text at top — readable. Vertex labels Sand/Clay/Silt in dark bold text at corners — clearly readable. Percentage labels (20%/40%/60%/80%) along all three edges in gray — slightly faint but visible.
