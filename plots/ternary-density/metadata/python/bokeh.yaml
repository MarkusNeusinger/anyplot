      Legibility verdict: PASS — all text readable against light background. No light-on-light failures observed.

    Dark render (plot-dark.png):
      Background: Near-black (possibly pure black rather than warm #1A1A17 — code lacks theme-adaptive background token).
      Chrome: Title appears in white/light text — readable. Vertex labels Sand/Clay/Silt appear in light text — clearly readable. Percentage labels appear lighter against the dark background — readable. Grid lines appear as white/light lines inside triangle — visible.
      Data: Viridis data colors are identical to light render — same yellow/teal/green cluster pattern as light version. Colorbar remains properly visible.
      Legibility verdict: PASS — no dark-on-dark text failure observed in the rendered images. However, note that the actual code uses hardcoded #306998 (blue) for title and vertex labels with no theme switching — the dark render images may originate from a different or previous version of the code, not from the current bokeh.py as written.
