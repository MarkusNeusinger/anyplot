review:
  strengths:
  - Viridis256 colormap correctly used for continuous density data, exactly as the
    style guide requires
  - Three-cluster sediment dataset (sandy/silty/clayey) is realistic, geologically
    plausible, and produces a visually interesting density distribution
  - nan_color='rgba(0,0,0,0)' correctly masks the region outside the triangle in the
    density image
  - Grid lines drawn for all three ternary axes at 10% intervals — spec requirement
    fully met
  - KDE using gaussian_kde with Scott's bandwidth is an appropriate auto-selection
    method as recommended by the spec
  weaknesses:
  - 'CRITICAL: export_png is forbidden on this system (snap chromedriver shim). Must
    switch to output_file+save (HTML) + Selenium screenshot, producing plot-{THEME}.png
    and plot-{THEME}.html'
  - 'CRITICAL: No ANYPLOT_THEME environment variable support. Theme tokens (PAGE_BG,
    INK, INK_SOFT, ELEVATED_BG) are completely absent. All chrome colors are hardcoded
    (#306998 for title/labels/grid, #666666 for percentage ticks)'
  - 'CRITICAL: Title in code is ''Sediment Composition · ternary-density · bokeh ·
    pyplots.ai'' — must be ''Sediment Composition · ternary-density · python · bokeh
    · anyplot.ai'''
  - ternary_to_cartesian function should be removed; inline the two-line formula or
    eliminate it (CQ-01 violation)
  - 'Triangle mask built with a 40,000-iteration nested for-loop; replace with vectorized
    NumPy barycentric test: mask = (yy >= 0) & (yy <= np.sqrt(3)*xx + 1e-6) & (yy
    <= np.sqrt(3)*(1-xx) + 1e-6)'
  - Grid line alpha=0.4 is too heavy — should be 0.15-0.25 so it reads as reference
    rather than competing with density data
  - No HTML output file — Bokeh requires plot-{THEME}.html as a catalog artifact;
    also missing interactive HoverTool showing component percentages
  image_description: |-
