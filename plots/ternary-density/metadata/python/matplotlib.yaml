review:
  strengths:
  - Complete ternary diagram built from scratch using only matplotlib primitives (Polygon,
    contourf, contour, text) — no specialized ternary library needed
  - Viridis colormap with overlaid white contour lines creates an elegant, readable
    density surface
  - Three geologically distinct sediment clusters are clearly visible with strong
    focal points
  - All theme tokens properly threaded through colorbar label, ticks, vertex labels,
    and edge annotations — both renders are fully readable
  - Correct ternary-to-Cartesian transformation with three grid families (constant
    Sand/Silt/Clay) at 20/40/60/80% levels
  - Square 12×12 canvas (3600×3600 px at 300 dpi) is the right format choice for a
    symmetric triangular plot
  - Silverman bandwidth selection and 800-point dataset yield smooth, well-resolved
    KDE without over-smoothing
  weaknesses:
  - Edge tick labels (13pt) and axis direction labels (14pt) are somewhat small for
    the large canvas — spec recommends 16pt for tick labels and 20pt for axis labels
    at 3600×3600 px
  - Rotated 'Clay (%)' and 'Silt (%)' direction labels along the left/right edges
    are slightly tight against the tick numbers and could benefit from more offset
    or slightly larger font
  - 'DE-01 could push higher: the overall background composition is clean but the
    colorbar placement slightly breaks the equilateral symmetry of the triangle —
    centering the colorbar vertically relative to the triangle height would improve
    balance'
