review:
  strengths:
  - 'Fully idiomatic Altair linked-view implementation: shared `nearest` selection
    propagates the crosshair across all three panels correctly in the HTML output'
  - Complete theme adaptation — all chrome tokens (INK, INK_SOFT, ELEVATED_BG, PAGE_BG)
    applied through configure_axis, configure_title, configure_legend, and configure_view;
    both renders are clean
  - Realistic, domain-appropriate financial data with meaningful analytical features
    (overbought/oversold reference lines, correlated volume/price volatility)
  - Perfect code structure, reproducibility, and output format
  weaknesses:
  - 'Price chart y-axis starts at 0 while data spans ~80-115: this leaves ~65% of
    the chart height as empty baseline. Add scale=alt.Scale(zero=False) to the price
    Y encoding so the axis zooms into the actual price range and the line variation
    is visible'
  - 'Missing synchronized zoom/pan: the spec requires it for interactive libraries.
    Add a shared alt.selection_interval() bound to all three views, or chain .interactive()
    on the vconcat to enable synchronized brushing/panning across charts'
  - Grid lines active on both axes via configure_axis(grid=True); for time-series
    line/bar charts the style guide prefers y-axis only (horizontal grid lines). Add
    configure_axisX(grid=False) to reduce visual noise
  - 'Data storytelling lacks visual emphasis on the key story: the dramatic momentum
    collapse below the oversold line at the end is the most interesting event but
    the chart does not highlight it. Add a semi-transparent area fill below the oversold
    threshold or an annotation at the crossover point'
