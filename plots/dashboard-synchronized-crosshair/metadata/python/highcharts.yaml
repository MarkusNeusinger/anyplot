review:
  strengths:
  - Full anyplot palette compliance across both renders; all three chrome token families
    (background, ink, grid) correctly theme-adaptive
  - Synchronized crosshair implementation is correct and idiomatic — pointer.normalize()
    + drawCrosshair() + hideCrosshair() is exactly the Highcharts-recommended approach
  - RSI plotBands with colored zone labels (Overbought/Oversold) are an excellent
    use of Highcharts native API that adds meaningful context
  - Code is clean and reproducible; Highcharts.merge() pattern avoids duplication
    across the three chart configs
  - Canvas pinned to exact 3200x1800 with PIL safety net; both HTML and PNG artifacts
    saved correctly
  weaknesses:
  - Synchronized zoom/pan not implemented — wire up afterSetExtremes on each chart
    xAxis to call setExtremes on all other charts, completing the dashboard synchronization
    story
  - RSI data never enters the oversold (<30) zone, making the Oversold band label
    decorative rather than demonstrated — adjust random walk so data dips below 30
    briefly in the first ~20 points
  - Inter-chart gap (10px) is too tight for a dashboard layout — increase to 25-30px
    to give panels more visual breathing room
  - Design storytelling could be elevated with a thin dashed reference line on the
    price chart at the starting price ($100) as a baseline reference annotation
