review:
  strengths:
  - 'Synchronized crosshair implementation is expert-level: uses Highcharts-native
    APIs (pointer.normalize, searchPoint, drawCrosshair, hideCrosshair, afterSetExtremes)
    — exactly how Highcharts docs recommend it'
  - Highcharts.merge(commonOptions, ...) pattern eliminates code duplication cleanly
    across three charts
  - 'Full spec compliance: synchronized zoom/pan via afterSetExtremes, synchronized
    crosshair via mousemove, independent y-axes with shared x-axis datetime'
  - 'RSI plotBands with semantic anyplot-palette colors (#009E73 for oversold, #B71D27
    for overbought) guide the viewer''s eye immediately to the key signal zones'
  - Start-price plotLine with label on Price chart adds meaningful reference context
  - Correct Imprint palette (green → purple → red) in canonical order with identical
    data colors across both themes
  - All font sizes explicitly set at correct highcharts native-pixel values (66px
    title, 54px sub-chart titles, 52px axis labels, 44px ticks)
  - Canvas correctly pinned to 3200×1800 with CDP setDeviceMetricsOverride + PIL safety
    net
  - 'Realistic financial data: stock price (random walk), volume (lognormal with volatility
    scaling), RSI (cumulative walk clipped to 0–100 with early oversold demonstration)'
  - Both HTML and PNG artifacts produced for both themes — correct output artifacts
  weaknesses:
  - 'DE-01 capped at 5/8: dashboard is clean and functional but doesn''t yet reach
    FiveThirtyEight-level polish — consider adding subtle chart-to-chart connecting
    visual cues (e.g., very faint vertical alignment markers, or a shared narrow x-axis
    ruler strip) to make the synchronization more visually obvious even in a static
    render'
  - 'DE-02 at 4/6: top/right spines not removed in the sub-charts (lineColor is set
    but spines are retained) — removing them would sharpen the minimalist dashboard
    look; for chart borders in a multi-chart layout this is acceptable but still deducts
    from refinement'
  - 'LM-01 at 4/5: implementation bypasses the highcharts_core Python SDK entirely,
    building raw HTML/JS instead — for complex synchronized-crosshair interactivity
    this is pragmatically correct, but the Python SDK approach is preferred for simpler
    Highcharts specs'
