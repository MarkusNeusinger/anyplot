  - 'Full synchronized crosshair implemented in HTML/JS: vertical line spans all panels,
    tooltip shows all three series values at hover position'
  - 'Anyplot palette applied correctly: #009E73 price (position 1), #9418DB volume
    (position 2), #B71D27 RSI (position 3)'
