    or light-on-light failures
  - 'Excellent spec compliance: stacked vertical layout, independent y-axes, shared
    x-axis, interactive HTML + static PNG'
  - np.random.seed(42) ensures reproducibility; sys.path guard prevents pygal.py from
    shadowing the installed package
  - 'KISS code structure: linear flow, no functions/classes, all imports used'
  - Filled area on volume chart creates appropriate visual weight distinction from
    the line charts
  weaknesses:
  - 'Font sizes are significantly below the pygal style-guide recommendations: title_font_size=48
    (rec: 66) on price chart and 40 on sub-panels, label_font_size=36 (rec: 56), major_label_font_size=30
    (rec: 44). Text is readable but smaller than ideal at 3200×1800 — increase all
    sizes to the guideline values.'
  - 'Visual refinement is default Pygal: dashed grid pattern is the library default
    and cannot be changed easily, but no attempts to minimize it. No spine removal
    (Pygal limitation). The three-panel layout could use thinner separator styling.'
  - 'DE-03 Data Storytelling: RSI panel missing overbought (70) and oversold (30)
    reference lines — standard in any financial RSI display and would immediately
    show the viewer the ''oversold'' story the data tells. Add horizontal reference
    lines at RSI=30 and RSI=70 using pygal''s secondary_range or annotations.'
  - 'DQ-02: ''Day 1'' through ''Day 200'' x-axis labels are somewhat generic. Using
    a realistic date range (e.g. 2024-01-02 through 2024-10-18) would improve realism
    — the HTML already embeds the data, so reformatting labels as ''Jan 2'', ''Jan
    23'' etc. would read as a real financial chart.'
