review:
  strengths:
  - 'Perfect spec compliance for a static library: synchronized vertical crosshair
    and value annotations across all three panels demonstrates the dashboard pattern
    clearly.'
  - Semantic volume coloring (green=up, red=down) using anyplot palette positions
    1 and 3 is a deliberate and appropriate finance semantic exception.
  - 'Full theme-adaptive chrome: both light and dark renders are correct, all chrome
    tokens applied consistently across three panels.'
  - Clean, reproducible code with linear structure and no over-engineering; correct
    savefig call (no bbox_inches='tight').
  - Area fill under price line adds depth without obscuring data; tight panel spacing
    (hspace=0.08) creates the impression of a unified dashboard.
  weaknesses:
  - Tick label font size (7pt) is below the 8pt style-guide recommendation; increase
    tick labels from 7pt to 8pt in all tick_params calls across all panels.
  - Tick marks are still visible across all panels; add ax.tick_params(length=0) in
    the panel-styling loop to suppress them for a cleaner look.
  - RSI data never clearly breaches the overbought (70) or oversold (30) reference
    zones — force at least one excursion above 70 and one below 30 so the zone annotations
    are actually exercised.
  - DE-01 could be lifted with bolder typography differentiation between panels (e.g.,
    slightly larger y-label for the primary price panel).
