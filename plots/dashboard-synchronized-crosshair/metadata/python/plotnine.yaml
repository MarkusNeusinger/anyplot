review:
  strengths:
  - 'Correct theme-adaptive chrome in both renders: background, text, grid all use
    proper tokens with no dark-on-dark failures'
  - geom_vline propagating across all facets is an elegant plotnine property — the
    synchronized crosshair concept is demonstrated with minimal code
  - 'Full spec compliance: independent y-scales (free_y), stacked layout, value annotations
    at crosshair, realistic stock dashboard data'
  weaknesses:
  - Y-axis tick labels overlap in all three panels due to insufficient panel height
    — reduce y-breaks to 3 per panel via scale_y_continuous(n_breaks=3) or switch
    to a square canvas (6x6 in) to give each panel more vertical space
  - 'Each panel is extremely thin (4.5 inches / 3 panels): data variation is nearly
    imperceptible and panels appear mostly empty — use figure_size=(6,6) or taller
    canvas, or reduce panel_spacing to reclaim vertical space for data areas'
  - Strip background borders (color=INK_SOFT) create a heavy boxy frame around each
    panel header — use element_rect(fill=PAGE_BG, color=NA) to remove the border and
    lighten the visual frame
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "dashboard-synchronized-crosshair · python · plotnine · anyplot.ai" bold, centered, readable. Strip labels "Price ($)", "Volume (M)", "RSI" in bold, readable. X-axis date labels rotated 45°, readable. X-axis title "Date" readable.
      Data: Three green (#009E73) time-series lines spanning Jan–Oct 2024. Red (#B71D27) dashed crosshair vline at ~Jun 2024 across all panels. Red dots at crosshair intersections. Red geom_label boxes showing "$115.20", "1.12M", "RSI: 65.0".
      Y-axis ticks: OVERLAPPING in all three panels — numbers stacked on each other (e.g. "120"/"100" for Price, "1.8"/"1.2" for Volume, "50"/"40" for RSI). Not individually readable.
      Panel proportions: Each panel is very thin; data lines occupy only top 15-20% of panel data area; large empty whitespace below each line.
      Legibility verdict: FAIL — y-axis tick labels overlap in all three panels in both renders.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title white/light, readable. Strip labels white/light, readable. Date tick labels white/light, readable. X-axis "Date" label white/light, readable. No dark-on-dark failure detected.
      Data: Green (#009E73) lines identical to light render — data colors unchanged. Red crosshair, dots, and labels identical. Colors consistent across themes.
      Y-axis ticks: Same overlap issue as light render — stacked numbers not individually readable.
      Panel proportions: Same compressed data-band issue — most of each panel is empty dark space.
      Legibility verdict: FAIL — y-axis tick labels overlap in all three panels (same as light render).
