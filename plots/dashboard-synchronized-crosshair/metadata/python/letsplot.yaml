review:
  strengths:
  - Correctly uses anyplot palette in canonical order across 3 chart panels (green/purple/red)
  - 'Full static+interactive output: PNG crosshair demo and HTML with layer_tooltips'
  - Proper theme-adaptive tokens for both light and dark renders with no dark-on-dark
    failures
  - RSI reference lines at 30/70 add meaningful domain context
  - 2:1:1 height ratio correctly emphasizes price chart over secondary indicators
  - geom_path workaround for crosshair vertical line with scale_color_manual legend
    is idiomatic
  - gggrid composite layout with stacked panels is idiomatic letsplot usage
  weaknesses:
  - 'Crosshair geom_point (size=6) overlaps with geom_text annotation labels in all
    three charts — the dot marker renders at the same (x,y) as the text anchor, causing
    the label to appear split (e.g. $8[dot]5.91). Fix: increase hjust offset to ~0.5-1.0
    or use vjust to shift labels above/below the dot instead of beside it'
  - Three separate redundant Crosshair legends (one per sub-chart) add visual noise
    without information — all three just say Crosshair. Use show_legend=False on scale_color_manual
    in sub-charts and add a single shared legend annotation or remove entirely since
    the pink color and vertical line make the crosshair self-evident
  - Sub-chart common_theme sets axis_title=18 and plot_title=20 while the outer gggrid
    title uses fontsize=16 — this inverts the expected hierarchy (panel titles larger
    than dashboard title). Consider reducing sub-chart title sizes to 14-16pt and
    increasing dashboard title to 18-20pt
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white. ✓
      Chrome: Dashboard title "dashboard-synchronized-crosshair · python · letsplot · anyplot.ai" visible in dark ink at top-left. Sub-chart titles "Price", "Volume", "RSI Indicator" in dark ink. Axis labels "Price ($)", "Volume (M)", "RSI", "Date" clearly readable. Month tick labels on x-axis readable. Y-axis numeric ticks readable on price and volume charts; RSI y-axis is compressed but tick at 0 visible.
      Data: Price line in #009E73 (brand green) — first palette position ✓. Volume bars via geom_segment in #9418DB (purple — second palette position) ✓. RSI line in #B71D27 (red — third palette position) ✓. Pink crosshair (#D359A7, palette position 6) vertical line, dot marker, and annotation label visible in all three panels.
      Issues: geom_point dot marker (size=6) overlaps with geom_text labels at the same (x,y) anchor — visible as e.g. "$8[dot]5.91" in price chart. Three redundant "Crosshair" legends (one per panel). RSI dashed reference lines at 30/70 visible.
      Legibility verdict: PASS — all labels readable, though crosshair annotation/dot overlap is a VQ-02 issue.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface. ✓
      Chrome: Dashboard title rendered in light (#F0EFE8) ink, clearly readable against dark background. Sub-chart titles "Price", "Volume", "RSI Indicator" in light text. Axis labels and tick labels in INK_SOFT (#B8B7B0) — all readable against dark background. No dark-on-dark failures detected. ✓
      Data: Data colors identical to light render — green price line, purple volume bars, red RSI line. Pink crosshair identical. Only backgrounds and text/grid chrome colors flip between themes. ✓
      Issues: Same geom_point/geom_text overlap as light render. Redundant "Crosshair" legends present. Grid lines subtle (GRID_COLOR=#32322F) and not competing with data.
      Legibility verdict: PASS — all text readable on dark background, no dark-on-dark failure.
