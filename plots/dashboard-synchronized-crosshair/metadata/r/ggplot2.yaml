review:
  strengths:
  - 'Correct static interpretation of interactive spec: uses facet_wrap(ncol=1) with
    scales=''free_y'' to produce aligned stacked panels with a shared x-axis, exactly
    matching the spec''s ''demonstrate the layout structure'' guidance for static
    libraries'
  - 'Proper anyplot palette order: Price=green(#009E73), Volume=purple(#9418DB), RSI=red(#B71D27)
    — all three series use canonical palette positions 1–3 in order'
  - 'Theme-adaptive chrome correctly applied: backgrounds #FAF8F1/#1A1A17, INK tokens
    propagated to all text and border elements, data colors identical between light
    and dark renders'
  - Realistic 200-point stock data with proper RSI-14 calculation using stats::filter(),
    making the domain context credible and domain-accurate
  - 'Good faceting idiom: strip.position=''right'' + strip.placement=''outside'' with
    elevated ELEVATED_BG strip background cleanly labels each panel without consuming
    horizontal space'
  weaknesses:
  - tidyr is imported (library(tidyr)) but never used in the script — remove the unused
    import
  - 'DE-02: Panel borders form a full box (all four sides) on each facet; the style
    guide default is L-shaped (left+bottom only). In a multi-panel dashboard context
    this is acceptable but slightly heavy; removing top+right borders per panel would
    sharpen the look'
  - 'DE-01/DE-03: The dashed vertical line at day 120 is positioned at a fixed arbitrary
    index, giving no textual annotation explaining what the event is; a geom_text
    or annotate() label (e.g., ''Event'') would improve storytelling and make the
    static crosshair concept more explicit'
  - linewidth=0.9 for geom_line is slightly thin at 3200×1800 for the busy volume
    series; increasing to 1.1–1.2 would improve VQ-03 on the volume panel where many
    spikes crowd together
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct.
      Three stacked line chart panels produced by facet_wrap, each with a right-side strip label on an elevated (#FFFDF6) background box.
      Top panel — "Price (USD)": green (#009E73) line tracking ~95–115 USD across 200 trading days. Dashed grey vertical reference line at ~mid-June 2024.
      Middle panel — "Volume (M)": purple (#9418DB) spiky line ranging roughly 2.5–25+ with volatile peaks. Same dashed reference line aligned.
      Bottom panel — "RSI (14)": red (#B71D27) oscillator line 20–80. Same aligned reference line.
      X-axis shows date ticks (Feb '24, Apr '24, Jun '24, Aug '24, Oct '24) at the bottom panel only (shared axis via facet).
      Title "dashboard-synchronized-crosshair · r · ggplot2 · anyplot.ai" bold at top, subtitle in muted ink below.
      Chrome: all labels and tick text use dark INK_SOFT tokens; clearly readable against warm off-white background.
      Legibility verdict: PASS — all text readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Same three-panel layout. Strip label backgrounds use elevated dark (#242420).
      Data colors are identical to the light render: green price line, purple volume line, red RSI line — chrome-only flip confirmed.
      Title, subtitle, axis tick labels, and strip text all use light INK tokens (#F0EFE8 / #B8B7B0); clearly visible against the dark surface.
      No dark-on-dark failures observed — tick labels, strip text, and title all readable.
      Grid lines subtle in both renders.
      Legibility verdict: PASS — all text readable.
