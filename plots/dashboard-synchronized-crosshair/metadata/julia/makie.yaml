review:
  strengths:
  - Correct multi-panel dashboard with linkxaxes! delivering genuine axis synchronization
  - Theme tokens applied throughout all three axes — both renders pass legibility
    checks with no dark-on-dark issues
  - RSI computed with proper 14-period rolling formula
  - hidexdecorations! cleanly removes x-axis labels from upper panels while keeping
    tick marks
  - Proportional panel sizing (42/30/28%) correctly weights the primary price panel
  - Crosshair dot markers use strokecolor = PAGE_BG for a polished inset appearance
  weaknesses:
  - 'Palette positions non-canonical: Volume uses palette position 4 (#16B8F3), RSI
    uses position 2 (#9418DB). Fix: swap to canonical order 1→2→3 for price→volume→RSI'
  - 'Crosshair anchored at arbitrary day 120 (RSI≈51.7, price near baseline) with
    no narrative. Fix: move crosshair to RSI overbought peak (>70) around day 30–35
    and add a small annotation to give the viewer a meaningful snapshot'
  - Title fontsize=16 is slightly small for a 3200×1800 canvas; increase titlesize
    to 18–20 for better mobile readability
  - No compact panel titles — add text! labels in each Axis corner to improve scanability
    alongside or replacing the y-axis labels
