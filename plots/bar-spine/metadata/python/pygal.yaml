review:
  strengths:
  - Clever use of pygal.Histogram with x-range tuples (value, x_min, x_max) to implement
    a spine plot — pygal has no native spine type, and this approach correctly encodes
    proportional bar widths and conditional proportions
  - Historically accurate Titanic data with correct survival rates (~62%/~43%/~25%)
    and class counts — factually grounded and naturally compelling dataset
  - 'Perfect palette compliance: brand green (#009E73) first, Okabe-Ito order for
    second series, correct theme-adaptive backgrounds (#FAF8F1 light / #1A1A17 dark)
    in both renders with no dark-on-dark failures'
  - 'Perfect code quality: fully deterministic hardcoded data, clean KISS structure
    with no functions/classes, all imports used'
  weaknesses:
  - Axis label font size (label_font_size=18) and tick label size (major_label_font_size=16)
    are below the 22px/18px guidelines for pixel-based libraries at 4800x2700 — legend
    and y-axis label appear very small in the rendered output
  - X-axis labels are not centered under each variable-width bar as required by the
    spec — instead a single combined label is used at the bottom of the chart
  - Legend positioning (top-left overlay) is cramped and the small text makes it hard
    to identify the two series at a glance
  - Design lacks visual storytelling emphasis — no annotation, size variation, or
    color contrast highlight guides the viewer to the key class-survival disparity;
    y-axis uses raw decimal ticks (0, 0.25, 0.5, 0.75, 1.0) instead of percentage
    format
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Titanic Survival by Passenger Class · bar-spine · pygal · anyplot.ai" in small dark text at top center — readable. Y-axis label "Conditional Proportion" is rotated vertically in very small text. Tick labels (0, 0.25, 0.5, 0.75, 1.0) are small but legible. Legend in top-left corner shows "Survived" and "Not Survived" labels — very small, barely legible at canvas size.
      Data: Three proportional-width spine columns — 1st Class (~25% width), 2nd Class (~21% width), 3rd Class (~54% width). Brand green (#009E73) occupies upper (Survived) segment; Okabe-Ito orange (#D55E00) occupies lower (Not Survived) segment. Survival fractions correctly rendered (~62%, ~43%, ~25%). Subtle dashed horizontal grid lines at 0.25, 0.5, 0.75, 1.0 intervals.
      Legibility verdict: PARTIAL PASS — title readable; legend and y-axis label are undersized for 4800x2700 canvas (label_font_size=18, below 22px guideline)

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title, axis labels, and tick labels all flip to light-colored text and are visible against the dark background. No dark-on-dark failures. Legend shows light text in top-left corner — small but readable. Grid lines appear as subtle light lines.
      Data: Colors are identical to light render — brand green (#009E73) for Survived, orange (#D55E00) for Not Survived. Okabe-Ito positions 1-2 unchanged between themes as required.
      Legibility verdict: PASS — all text visible against dark background, no dark-on-dark failures detected
