  image_description: 'The plot displays a density curve (KDE) of SAT Math scores on
    a white background. The main curve is drawn in dark blue (#306998 / Python Blue)
    with a line width of approximately 3.5, and the area underneath is filled with
    a semi-transparent light blue. The curve clearly shows a bimodal distribution:
    a larger primary peak around 550 and a smaller secondary peak around 670-680.
    Along the bottom at y=0, a rug plot shows individual observations as small vertical
    tick marks in the same blue color with low opacity. The x-axis is labeled "SAT
    Math Score (points)" ranging from 350 to 800, and the y-axis is labeled "Density"
    ranging from 0 to ~0.0045. The title "density-basic · plotly · pyplots.ai" is
    centered at the top. A legend in the upper right corner shows "Density" (line)
    and "Observations" (tick mark) entries with a subtle white background. The y-axis
    has very faint horizontal grid lines; the x-axis has no grid. Overall layout is
    clean and professional.'
