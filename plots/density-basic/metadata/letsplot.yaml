    and outlined with a darker blue (#1e4263). The distribution is right-skewed with
    a main peak around 240 minutes and a visible shoulder around 200 minutes representing
    competitive runners, then a long tail extending to approximately 370 minutes for
    casual runners. The title "density-basic · letsplot · pyplots.ai" appears at the
    top left. The background uses a minimal theme with only subtle horizontal gridlines
    in light gray. No rug plot is present. There is minor text overlap at the bottom-left
    origin where the y-axis "0" collides with the x-axis "150" label.
