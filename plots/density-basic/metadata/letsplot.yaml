  image_description: The plot shows a single density curve of marathon finish times
    filled with semi-transparent Python Blue (#306998) and outlined with a darker
    blue (#1e4263). The x-axis is labeled "Finish Time (minutes)" ranging from 150
    to ~370, and the y-axis is labeled "Density" with breaks at 0.002, 0.004, 0.006,
    0.008, 0.010. The distribution is right-skewed with a shoulder around 200 minutes
    and a dominant peak around 240 minutes, followed by a long tail extending to ~370
    minutes. Three dashed gray vertical reference lines mark group centroids at x=200,
    240, and 300. At the top of the plot, three text annotations read "Competitive
    (~3:20)", "Main Pack (~4:00)", and "Casual (~5:00)". A rug plot of small vertical
    ticks (subtle, low alpha) runs along the x-axis base showing individual observations.
    The title "density-basic · letsplot · pyplots.ai" appears at the top left. The
    background uses a minimal theme with subtle horizontal gridlines only, no vertical
    gridlines, and no axis ticks.
