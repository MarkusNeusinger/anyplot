  image_description: The plot displays a smooth density curve (KDE) of test scores
    on a clean minimal background. The x-axis is labeled "Test Score (points)" ranging
    from 40 to 100, and the y-axis is labeled "Probability Density" ranging from 0.00
    to approximately 0.031. The title reads "density-basic · plotnine · pyplots.ai"
    in large text at the top. The density curve is filled with a semi-transparent
    steel blue (#306998) and outlined with a darker navy stroke (#1a3d5c). The distribution
    is clearly bimodal with a primary peak around 72 and a secondary shoulder/peak
    around 88. A rug plot along the bottom x-axis shows individual observations as
    small vertical blue lines, concentrated more densely in the 65-95 range. The background
    uses theme_minimal with only subtle horizontal y-axis gridlines at very low alpha.
    The layout is well-proportioned on a 16:9 canvas with good use of space, though
    with some empty area on the left between x=40 and x=47 where no data exists.
