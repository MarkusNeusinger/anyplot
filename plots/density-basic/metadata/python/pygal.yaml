review:
  strengths:
  - Full Imprint palette compliance in canonical order with correct background tokens
    for both themes
  - Creative rug plot implementation using pygal's XY zigzag pattern — no native rug
    support in pygal, cleanly worked around
  - Both themes adapt correctly with full chrome switching (title, axis labels, tick
    labels, grid all flip)
  - Bimodal data storytelling with component decomposition (main distribution + lower-scoring
    group) creates a compelling and educational density plot
  - 'Statistically sound: Scott''s rule bandwidth, correct Gaussian KDE normalization'
  weaknesses:
  - Y-axis label 'Density' (one short word at label_font_size=56) appears oversized
    relative to its information content — creates minor axis-label imbalance vs. the
    richer X-axis label
  - Rug plot's 270 ticks at 0.8px width merge into a solid band in the high-density
    score region (40-80), making individual observations indistinguishable there
  - Horizontal grid lines are moderately prominent in both renders; a lower opacity
    CSS override would make them more subtle and let the KDE curves read more cleanly
