review:
  strengths:
  - 'Correct Imprint palette throughout: first series is #009E73 (brand green), second
    is lavender, rug ticks in blue — canonical order followed exactly'
  - 'Theme-adaptive chrome works correctly in both renders: backgrounds flip #FAF8F1
    ↔ #1A1A17, text flips dark ↔ light via foreground/foreground_strong tokens'
  - 'All spec requirements fulfilled: smooth KDE curve computed via Scott''s rule
    bandwidth, filled areas with 60% opacity transparency, rug plot showing individual
    observations'
  - 'Strong data storytelling: bimodal distribution is clearly visible through the
    layered density curves (combined + secondary lower-scoring group), narrative is
    immediately readable'
  - 'Perfect code quality: flat script, np.random.seed(42) for reproducibility, all
    imports used, clean structure'
  - CSS overrides effectively remove x- and y-axis spines, keep y-grid subtle (opacity
    0.15), no x-grid — above-default visual refinement
  - Both PNG and HTML exports saved as required for pygal (interactive library)
  weaknesses:
  - label_font_size=44 matches major_label_font_size=44 — axis titles and tick labels
    are the same size, collapsing the typographic hierarchy. Style guide recommends
    label_font_size=56 for pygal on 3200×1800 canvas so axis titles are visibly larger
    than tick labels.
  - Rug plot stroke_style width=0.8 is very thin for a 3200px canvas. Individual ticks
    merge in the dense region (50–80 score range) and will become near-invisible at
    mobile/thumbnail widths (~400px). Recommend increasing to stroke width 2–3 for
    the rug series.
  - DE-01 and LM-02 are moderate — the implementation does not use any notably distinctive
    pygal feature beyond XY fill and CSS overrides. No interactive hover tooltips
    (a key pygal differentiator) are leveraged in any meaningful chart-layer way.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "density-basic · python · pygal · anyplot.ai" is bold, right-aligned, readable at ~50% canvas width. Y-axis label "Density" is rotated on the left and legible. X-axis label "Test Score (points)" clearly visible below the axis. Tick labels on both axes are readable at 44px.
      Data: First series is brand green (#009E73) — filled KDE curve for the combined distribution, prominent and correctly coloured. Second series is lavender (#C475FD) — filled KDE curve highlighting the lower-scoring bimodal component. Third series is blue (#4467A3) — thin rug ticks at y≈0 showing 100 sampled individual observations. Fill opacity ~60% creates good layering.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white surface.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels flip to light text (near-white) on the dark surface via pygal's foreground/foreground_strong tokens. Tick labels and legend text are rendered in the muted light tone. No dark-on-dark failure observed — all text is clearly readable against the near-black background.
      Data: Data colors are identical to the light render — green first series, lavender second, blue rug ticks — confirming only chrome flipped.
      Legibility verdict: PASS — all text is clearly readable against the dark background. No "dark-on-dark" issues detected.
