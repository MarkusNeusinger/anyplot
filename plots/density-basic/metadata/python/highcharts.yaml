  - Bimodal height data is compelling and realistic — clearly shows female/male distribution
  - Silverman bandwidth implementation is correct and produces smooth KDE
  - Peak plotLines with labels and plotBands together create effective visual storytelling
  - Gradient fill (45% → 3% opacity) adds polish without distracting from the data
    shape
  - Rug plot adds raw data context at the base of the chart
