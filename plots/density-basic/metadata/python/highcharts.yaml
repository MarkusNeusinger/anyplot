    tokens'
  - CDP viewport override + PIL safety-net ensures exact 3200×1800 canvas dimensions
  - HTML artifacts correctly saved as plot-light.html / plot-dark.html
  weaknesses:
  - Peak highlight plotBands use rgba(0,158,115,0.06) opacity — nearly invisible in
    dark render where the dark background absorbs the subtle tint; increase to at
    least 0.10–0.12 in dark theme for comparable emphasis
  - Peak annotation label fontSize (34px) is notably smaller than tick labels (44px);
    bump to 38–40px so they read as intentional secondary labels rather than whisper
    text
  - Rug plot markers (radius 6, 42% opacity, ~167 points) form a dense smear at the
    base; consider radius 5 with 35% opacity and subsampling every 4th point to reduce
    visual crowding while maintaining representativeness
  - DE-03 storytelling partially lost in dark mode because the band highlights disappear
    — the dashed peak lines carry the annotation weight alone in dark theme
