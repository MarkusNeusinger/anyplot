review:
  strengths:
  - Bimodal data (female/male heights) with Silverman bandwidth KDE tells a compelling
    real-world story
  - plotBands + plotLines for peak annotation are idiomatic Highcharts features, well-utilised
  - Gradient fill (45% to 3% opacity) gives elegant visual depth without obscuring
    the curve
  - All theme tokens wired correctly — title, axis labels, tick labels, and legend
    text all flip between INK (#1A1A17/#F0EFE8) and INK_SOFT (#4A4A44/#B8B7B0)
  - Rug plot adds observation-level detail without cluttering the density curve
  - Auto-scaled title fontsize ensures correct proportions; canvas gate passed (3200×1800)
  weaknesses:
  - Rug observations (radius=4, 30% opacity) are nearly invisible at thumbnail sizes
    (~400px) — increase radius to 5-6 or opacity to 0.40-0.50 so individual marks
    register when scaled down
  - Legend is enabled for a single-series density + rug pair — the legend 'Density
    / Observations' is useful context but the 'Observations' swatch (tiny dot) is
    hard to parse; consider a small inline annotation or a clearer swatch symbol
  - 'DE-02: Top/right spine removal is implicit (Highcharts default); explicitly setting
    plotBorderWidth:0 and removing axis line on top/right would make refinement intent
    explicit and prevent theme regressions'
