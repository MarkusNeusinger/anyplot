review:
  strengths:
  - 'Excellent layered density visualization: geom_area (fill) + geom_line (outline)
    for the same KDE stat — classic plotnine grammar-of-graphics pattern executed
    cleanly'
  - Bimodal distribution with annotated vertical reference lines tells a clear, immediate
    story about two student subgroups
  - Rug plot adds data-density context without cluttering the visualization
  - 'Fully theme-adaptive chrome: INK, INK_SOFT, INK_MUTED all switch correctly for
    dark render — annotation text reads light on dark background'
  - 'Correct Imprint palette (brand green #009E73) as single series, correct background
    tokens (#FAF8F1 / #1A1A17)'
  - Title fontsize scaled via the 67/n formula to prevent overflow
  - 'Clean KISS code: imports → data → plot → save, reproducible seed, no functions/classes'
  - Idiomatic after_stat('density') usage and stat='density' in geoms — correct plotnine
    approach to KDE
  weaknesses:
  - Annotation text (size=3.5 mm ≈ 10pt) is slightly small — at 400px mobile width
    the 'Main Group' and 'High Achievers' labels risk being hard to read; consider
    increasing to size=4.0-4.5
  - 'DE-01 could be stronger: fill alpha=0.3 creates a pleasing layered look but the
    overall composition is still one step below publication-ready; a slightly thicker
    density line (size=2.2) or subtle annotation connectors could lift it further'
  - 'LM-02: the after_stat() and geom_rug are distinctive plotnine features, but no
    use of scales or facets that are uniquely expressive in the plotnine grammar'
