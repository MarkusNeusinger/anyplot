review:
  strengths:
  - Both light and dark themes render correctly with fully adaptive chrome — backgrounds,
    text, grid, and annotation boxes all flip properly.
  - Bimodal SAT score data with annotated peaks provides genuine data storytelling
    that explains the density plot's key capability.
  - Rug plot layer adds statistical context without cluttering the chart; density-appropriate
    opacity (0.4) is correct for 500 points.
  - Complete interactive HTML export with spike crosshair and zoom — good demonstration
    of Plotly's interactive strengths.
  - 'Perfect spec compliance: KDE curve, filled area, rug plot, and appropriate bandwidth
    all present.'
  weaknesses:
  - 'Legend is marginally redundant: with only 2 simple traces and annotations already
    labeling the peaks, showlegend=False would reduce chrome noise — or drop the legend
    box border at minimum.'
  - Rug marks in dark render use color=BRAND at opacity=0.4 which produces low-contrast
    dark-green ticks; consider using color=INK_SOFT for the rug in both themes so
    observations are always visually distinct from the density fill.
  - 'DE-02: The legend border frame (bordercolor=INK_SOFT) and annotation bordercolor=INK_SOFT
    both add minor visual weight that slightly clutters an otherwise clean chart.'
