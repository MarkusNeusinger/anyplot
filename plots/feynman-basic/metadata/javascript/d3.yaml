  strengths:
  - Custom wavyPath and gluonPath functions using d3.line() with parametric geometry
    produce physically accurate Feynman line styles — sophisticated D3 path generation
  - 'Correct Imprint palette assignment with intentional physics semantics: green
    for matter (fermions), purple for electromagnetic force (photon), blue for strong
    force (gluon), ochre for scalar bosons'
  - 'Full theme adaptivity: vertex dots, time axis, panel dividers, and all text correctly
    use t.ink / t.inkSoft / t.grid tokens — both renders are crisp and readable'
  - Three distinct quantum processes (QED, QCD, Higgs) in a single composition with
    clear section labels and time axis creates a strong educational narrative
  - Legend built from actual SVG path samples (not colored rectangles) matches the
    diagram lines exactly
  weaknesses:
  - Section labels ('QED · e⁻e⁺ → γ* → μ⁻μ⁺', 'QCD · q q̄ → g', 'Higgs · q q̄ → H')
    at 15px CSS (30px actual at 2×dsr) are slightly small for the 3200px canvas —
    bumping to 17–18px would improve mobile readability
  - Right sub-panels (QCD and Higgs) feel slightly compact relative to the dominant
    QED panel; allocating slightly more horizontal space to the right (e.g., shift
    divider from 62.5% to 58%) would balance the composition
