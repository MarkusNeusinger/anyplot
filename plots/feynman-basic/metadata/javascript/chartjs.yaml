review:
  strengths:
  - 'All four Feynman particle line types implemented with distinct line styles: solid
    with directional arrows for fermions, wavy for photons, curly/looped for gluons,
    dashed for scalar bosons'
  - Full Imprint palette applied semantically — each particle type mapped to a unique
    palette color (#009E73 fermion, lavender photon, blue gluon, ochre boson)
  - Two complete, textbook-accurate QFT processes side by side (e+e- → γ* → μ+μ- and
    H → bb̄g)
  - 'Excellent CVD accessibility through redundant encoding: shape/style AND color
    distinguish particle types'
  - Perfect Chart.js plugin usage with beforeDraw/afterDraw lifecycle hooks and getPixelForValue()
    coordinate mapping
  - Axes completely hidden for clean diagram aesthetic; time-direction arrow provides
    spatial context
  weaknesses:
  - Helper functions (fermionLine, photonLine, gluonLine, bosonLine) add structural
    complexity beyond KISS — acceptable given the bespoke drawing requirements, but
    worth noting
  - Right side of the diagram (H → bb̄g process) is slightly cramped with three particles
    fanning out from V4, causing some labels (b, g) to land close to the right canvas
    edge — consider shifting V3/V4 leftward to give more breathing room
  - The time indicator label is italic 15px which may be very small at 400px mobile
    scale — consider increasing to 17-18px
  - LM-02 score limited because most of the actual drawing uses raw Canvas 2D API
    rather than Chart.js-native constructs
