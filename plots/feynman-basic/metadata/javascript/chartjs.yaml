review:
  strengths:
  - Clever use of Chart.js scatter type with hidden axes as a coordinate backdrop
    for custom canvas drawing — the scale API (getPixelForValue) is used elegantly
    for coordinate mapping
  - 'Correct Imprint palette: fermion lines in brand green (#009E73), virtual photon
    in lavender (#C475FD); colors identical across both themes'
  - 'Both themes fully theme-adaptive: background, title, and chrome correctly use
    ANYPLOT_TOKENS; dark render has light text on near-black background with no dark-on-dark
    issues'
  - Physics scenario is scientifically accurate (QED tree-level e⁺e⁻ → γ* → μ⁺μ⁻ annihilation);
    arrow directions correctly distinguish particle from antiparticle
  - Time indicator at the bottom guides reading direction; vertex dots cleanly mark
    interaction points; particle labels in their respective line colors add clear
    visual hierarchy
  weaknesses:
  - 'Only 2 of the 4 required particle line types are demonstrated: fermion (solid
    with arrow) and photon (wavy). The spec explicitly requires curly/looped lines
    for gluons and dashed lines for scalar bosons. Add a more complete process (e.g.,
    a QCD vertex with a gluon, or a Higgs decay) or expand the diagram to show all
    four line styles, so all spec-required particle types are visualised'
  - 'DQ-01 feature coverage is incomplete: the example hardcodes only the e⁺e⁻ → γ*
    → μ⁺μ⁻ process, missing the gluon and scalar-boson line-style demonstrations called
    out in the spec Notes section'
  - 'CQ-01 deduction: helper functions (toPx, arrowHead, fermionLine, photonLine)
    are present — acceptable for this diagram type, but they add structural complexity
    beyond the flat KISS pattern'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "feynman-basic · javascript · chartjs · anyplot.ai" in dark near-black text, clearly readable. No axis labels or tick labels (axes hidden, appropriate). Time indicator label "time" in soft dark color, readable.
      Data: Two diagonal fermion lines (solid, brand green #009E73) converge at the left vertex dot; a horizontal wavy photon line (lavender #C475FD) connects two solid black vertex dots at center; two diagonal fermion lines (green) diverge from the right vertex. Arrow heads at mid-line on fermion lines indicate particle/antiparticle direction. Particle labels e⁻, e⁺ on the left and μ⁻, μ⁺ on the right in green; γ* label in lavender above the photon line. Dashed arrow with "time" label at the bottom.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface, not pure black.
      Chrome: Title in light off-white text, clearly readable against dark background. Time indicator label "time" in soft light color, readable. Vertex dots render as white/light (using t.ink which is light in dark mode) — theme-consistent.
      Data: Data colors (green fermion lines, lavender photon) are identical to the light render — only chrome flips. Particle labels remain in their respective line colors. All line styles, arrows, and labels clearly visible against dark background.
      Legibility verdict: PASS — all text clearly readable; no dark-on-dark failures observed; the dark render is fully theme-correct.
