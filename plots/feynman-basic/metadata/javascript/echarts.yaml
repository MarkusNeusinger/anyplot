review:
  strengths:
  - Physics-authentic rendering with correct line styles for all four particle types
    (wavy bezier photon, curly bezier gluon, dashed scalar boson, solid+arrow fermion)
    — technically accurate to textbook Feynman conventions
  - Three distinct QFT processes (QED, QCD, EW) with correct antiparticle arrow reversal
    conventions and labeled reaction equations
  - 'Semantically meaningful Imprint palette choices: blue (#4467A3) for EM photon,
    lavender (#C475FD) for QCD gluon, ochre (#BD8233) for Higgs boson — physics-appropriate
    color coding'
  - Polished vertex highlight rings (semi-transparent color glow + solid dot) add
    visual refinement and draw attention to interaction points
  - Complete legend with time-axis arrow and four particle-type samples provides a
    self-contained teaching reference
  weaknesses:
  - 'C_GLUON and C_BOSON declarations carry wrong hex comments (`// #DE8F05 amber`
    and `// #CC4C38 red`) — actual values are t.palette[1]=#C475FD (lavender) and
    t.palette[3]=#BD8233 (ochre); misleading for future readers'
  - Legend text (fontSize 19px) and QED reaction caption (fontSize 19px) are marginally
    small for the canvas size — 22-24px would improve mobile readability
  - Title uses fontSize 30 rather than the ECharts style-guide recommendation of 22;
    acceptable visually but above the canonical value
