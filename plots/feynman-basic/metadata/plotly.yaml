  image_description: 'The plot displays a Feynman diagram for gluon fusion Higgs production
    with diphoton decay (gg → H → γγ) on a white background. Two green curly gluon
    lines enter from the upper-left and lower-left, connecting to a triangular top-quark
    loop formed by three blue straight fermion lines (labeled t, t, t̄) with prominent
    blue direction arrows at midpoints. The right vertex of the triangle connects
    via a purple dashed line (labeled H for Higgs boson) to a decay vertex on the
    right. From that vertex, two red wavy photon lines (labeled γ) exit toward the
    upper-right and lower-right. Four black vertex dots with white borders mark the
    interaction points. A custom legend in the bottom-right area shows all four line
    styles with matching colors: blue "Fermion (straight)", red "Photon (wavy)", green
    "Gluon (curly)", and purple "Boson (dashed)" — using actual wavy/curly line samples.
    A gray "time" arrow with italic label runs along the bottom. The title at top
    reads "gg → H → γγ (Gluon Fusion) · feynman-basic · plotly · pyplots.ai" in serif
    font.'
