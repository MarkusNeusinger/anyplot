  image_description: The plot shows a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → μ⁻μ⁺) on a white background. Two blue straight lines enter from the upper-left
    (e⁻) and lower-left (e⁺), converging at a left vertex marked with a black dot
    with white border. A red wavy line (virtual photon γ, labeled in red) connects
    the left vertex horizontally to the right vertex. Two blue straight lines exit
    the right vertex toward the upper-right (μ⁻) and lower-right (μ⁺). Blue arrows
    on the fermion lines indicate particle flow direction. Particle labels (e⁻, e⁺,
    γ, μ⁻, μ⁺) are placed near the midpoints of each propagator in matching colors.
    A gray "time" arrow runs along the bottom of the diagram. The title reads "e⁻e⁺
    → μ⁻μ⁺ Annihilation · feynman-basic · plotly · pyplots.ai" at the top.
