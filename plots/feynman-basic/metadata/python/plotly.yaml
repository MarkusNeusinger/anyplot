review:
  strengths:
  - Custom sine-wave rendering with amplitude tapering at endpoints produces authentic-looking
    wavy lines for photons and Z bosons
  - Fermion arrows correctly reverse for antiparticles (anti:True flag) using plotly's
    native annotation arrow system
  - Higgs-strahlung process (e+e- → ZH → μ+μ- γγ) is a real, educational particle
    physics scenario demonstrating all 4 required particle types in one diagram
  - Both light and dark themes render correctly — vertex dots flip from black (INK
    light) to white/cream (INK dark), background and title chrome all theme-adapt
    properly
  - Horizontal legend row with miniature rendered line samples (wavy, straight with
    arrow, dashed) is elegantly designed and accurately represents each particle type
  - Time axis arrow with italic 'time' label provides essential physical orientation
    for the left-to-right temporal reading convention
  - Code is clean, deterministic, and correctly saves both plot-{THEME}.png and plot-{THEME}.html
    for interactivity
  - Particle labels in matching Imprint palette colors provide redundant encoding
    beyond line style alone
  weaknesses:
  - 'Palette ordering deviation: the first particle type encountered is ''fermion''
    mapped to blue (#4467A3, 3rd Imprint slot). The canonical rule requires first
    categorical series = #009E73. The semantic exception for physics conventions (blue
    electrons) is plausible but not as universally shared as stock-market red/green
    conventions — this should be either (a) reassigned so fermions use #009E73 and
    Z boson uses #4467A3, or (b) justified explicitly in a comment citing the physics
    convention and confirming it qualifies as a recognized semantic override.'
  - 'Right-side diagram crowding: vertices v3 (0.80,0.72) and v4 (0.80,0.28) produce
    four exit propagators (μ⁻, μ⁺, γ, γ) in a narrow vertical band between y=0.10
    and y=0.90. The two γ photon lines at (1.0,0.46) and (1.0,0.10) are closely spaced
    at the right edge, and their labels are near the μ⁺ area. Widen the decay vertex
    spread — consider placing v3 at (0.82,0.78) and v4 at (0.78,0.22) and letting
    exit lines fan out more aggressively to reduce crowding.'
  - 'VQ-07 palette compliance: first series is not #009E73 — see weakness #1. Deduction
    from 2→1 on VQ-07.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, fills the full canvas.
      Chrome: Title "Higgs-strahlung · feynman-basic · python · plotly · anyplot.ai" in dark ink, centered, readable. No standard axis labels (axes hidden — appropriate for a diagram). Time arrow in muted ink with italic "time" label at bottom.
      Data: Four particle types clearly represented — blue (#4467A3) straight lines with mid-line arrow annotations for fermions (e⁻, e⁺, μ⁻, μ⁺); green (#009E73) sine-wave lines for Z/Z* vector bosons; dark red (#AE3030) higher-frequency sine-wave lines for photons (γ×2); lavender (#C475FD) dashed line for Higgs scalar (H). Black vertex dots with white borders at 4 interaction points. Particle labels in matching colors placed at propagator midpoints. Legend row at bottom with miniature line samples for all 4 types.
      Legibility verdict: PASS — all text readable against the light background. No light-on-light failures observed.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title rendered in light cream ink, clearly readable against the dark surface. Time arrow in muted light tone. Vertex dots correctly flip to white/cream (INK dark = #F0EFE8) with dark borders — theme-adaptive behavior working correctly.
      Data: Data colors are identical to the light render — same blue fermion lines, same green Z-boson wavy lines, same dark red photon lines, same lavender Higgs dashed line. Legend text and particle labels also render in their respective Imprint palette colors which remain legible on the dark surface.
      Legibility verdict: PASS — no dark-on-dark failures. All particle labels and chrome text are clearly readable on the near-black background. Data colors identical to light render as required.
