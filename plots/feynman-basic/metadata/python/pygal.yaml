      Data: Data colours are identical to the light render — e⁻ #009E73, e⁺ #C475FD, μ⁻ #4467A3, μ⁺ #BD8233, γ #AE3030, Z⁰ #2ABCCD — only the chrome (background, title, legend text) has flipped. Vertex dots appear white/light against the dark background (correct: INK token used for vertices flips to #F0EFE8). The γ and Z⁰ labels remain in their respective data colours (#AE3030 and #2ABCCD) which are equally readable on the dark surface.
      Legibility verdict: PASS — all text light-on-dark, all data elements visible, no dark-on-dark issues.
