      Data: e⁻ fermion in #009E73 (brand green) — top-left to centre-right diagonal. e⁺ antifermion in #C475FD (lavender) — bottom-left to centre. μ⁻ fermion in #4467A3 (blue) — centre to top-right. μ⁺ antifermion in #BD8233 (ochre) — centre to bottom-right. Wavy sinusoidal photon propagator in #AE3030 (matte red) connecting the two vertex dots. Dashed horizontal Z⁰ propagator in #2ABCCD (cyan). Two black vertex dots (dots_size=18) at the annihilation and pair-creation points. Large bold γ label (red) and Z⁰ label (cyan) centred on the propagator region — intentional diagrammatic labelling. Arrowheads visible on each fermion line.
