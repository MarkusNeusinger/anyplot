review:
  strengths:
  - Realistic QED+electroweak s-channel annihilation diagram (e⁻e⁺ → γ/Z⁰ → μ⁻μ⁺)
    — a textbook particle physics example
  - 'Imprint palette correctly applied: e⁻ green (#009E73), e⁺ lavender (#C475FD),
    μ⁻ blue (#4467A3), μ⁺ ochre (#BD8233), γ red (#AE3030), Z⁰ cyan (#2ABCCD) in canonical
    order'
  - Theme-adaptive chrome works correctly — both light (#FAF8F1) and dark (#1A1A17)
    renders pass readability checks with proper text contrast
  - SVG post-processing adds propagator labels (γ, Z⁰) directly on the diagram and
    removes arrowhead helper series from the legend — clean legend output
  - 'Physics-correct arrowhead direction convention: particle flows forward in time
    (→), antiparticle flows backward (←)'
  - Wavy sinusoidal photon propagator and dashed Z⁰ boson propagator correctly distinguish
    the two internal lines
  - Mandatory title format with descriptive prefix correctly implemented and font-size
    scaled for long title string
  weaknesses:
  - Gluon curly/looped line style not demonstrated — the spec mentions it as a required
    line type. Consider including a gluon propagator (e.g., QCD vertex) or at least
    showing the curly style variant in a corner annotation
  - Arrowhead calculation repeated verbatim four times for each fermion — extract
    inline or simplify using a vector helper tuple list to reduce CQ-01 penalty
  - The large centred γ and Z⁰ SVG labels visually dominate the diagram and partially
    obscure the photon wavy line — consider reducing font size (~0.7×) or offsetting
    them further above/below the propagator lines
  - legend_font_size=48 renders somewhat small in the 2400×2400 canvas when viewed
    at thumbnail size; style-guide default for pygal square canvas is 48 which is
    acceptable but borderline
  - Z⁰ is a vector boson — using a dashed line is non-canonical (vector bosons conventionally
    use wavy lines). If dashes are kept to distinguish γ vs Z⁰, add a brief code comment
    explaining the stylistic choice
