review:
  strengths:
  - 'patheffects.withStroke used creatively: luminous glow on the photon propagator
    and separating halos on fermion arrows demonstrate advanced matplotlib mastery'
  - 'Semantic Imprint palette: each particle type maps to a distinct canonical palette
    position — aesthetically consistent and physically meaningful'
  - 'Perfect dual-theme adaptation: vertex dots, labels, separator, and legend all
    correctly use theme tokens; data colors remain identical across themes'
  - Dual-process layout (QED + QCD) with process labels, separator, and time arrow
    creates a rich showcase of all four particle types in authentic physics context
  - Fully deterministic hardcoded data with physics-accurate processes (e+e- annihilation,
    Higgs production via gluon fusion) and correct arrow direction conventions for
    particle vs antiparticle
  weaknesses:
  - The two gluon coils entering vertex v3 overlap heavily, creating a visually tangled
    coil mass in the QCD bottom-left — slightly more angular separation between the
    two gluon input lines would make each coil more visually distinct before merging
    at the vertex
  - Visual hierarchy relies entirely on color and path effects; drawing internal propagator
    lines (photon gamma, Higgs H) slightly thicker than external fermion legs (lw=3.5
    vs lw=2.5) would strengthen focal structure and improve DE-03 storytelling depth
