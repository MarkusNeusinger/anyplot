      Data: All four Imprint palette data colors are identical to the light render — #009E73 fermion, #C475FD photon, #4467A3 gluon, #BD8233 boson. Only chrome elements flipped.
      Legibility verdict: PASS — all text elements are light-colored against the near-black background; no dark-on-dark failures.
