review:
  strengths:
  - Exceptional Altair layer composition — 11 declarative layers for a complex physics
    diagram that most implementations would require matplotlib primitives for
  - All four particle types visually distinct via both color (Imprint palette positions
    1-4 in order) and line style (solid with arrows / wavy / curly / dashed) — redundant
    encoding aids CVD accessibility
  - Interactive Altair-native legend selection (selection_point bind='legend') lets
    users isolate each particle type — genuinely distinctive feature
  - Physics-appropriate serif italic notation for particle symbols (t, H, g, γ) and
    process equation, grounding the diagram in domain conventions
  - Vertex shadow + border effects create depth without clutter; elevated background
    panel (ELEVATED_BG) subtly frames the interaction region
  - Theme adaptation is thorough — INK, INK_SOFT, INK_MUTED all thread correctly through
    title, process label, vertex circles, time axis, and legend chrome in both renders
  - Higgs boson production via gluon fusion (g + g → H → γ + γ) is a real, well-known
    LHC process — realistic, neutral, and scientifically accurate context
  - Canvas padded to exact 3200×1800 with PIL fallback; no overflow detected in either
    render
  weaknesses:
  - 'DE-01 minor: title fontWeight=''normal'' — style guide recommends bold or medium
    weight for titles; a bolder weight would improve typographic hierarchy'
  - 'LM-02 minor: gluon curly lines look like a compressed helix rather than distinctly
    looped circles; increasing loop_r or reducing n_loops would make the gluon representation
    more recognisable as physics convention'
  - 'DE-02 minor: diagram panel fills roughly 60-65% of canvas width, leaving the
    right photon waves and γ labels in tight proximity to the right edge — slightly
    more horizontal whitespace would improve breathing room'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct PAGE_BG. An elevated panel (ELEVATED_BG #FFFDF6) with rounded corners and a hairline stroke frames the diagram interaction region.
      Chrome: Title "feynman-basic · python · altair · anyplot.ai" in INK at fontSize=16, centered at top — fully readable. Process equation "g + g → H → γ + γ" in serif italic INK_MUTED above the panel. Time dashed line + arrow + "time" label in INK_MUTED below the panel. Legend box (ELEVATED_BG fill, INK_SOFT stroke) in top-right with "Particle Type" title and four colored swatches. All text clearly readable against the warm off-white surface.
      Data: Four particle types, each with Imprint palette position and matching line style — (1) fermion top-quark triangle in #009E73 green with directional solid arrows, (2) wavy photon lines in #C475FD lavender, (3) curly/helical gluon lines in #4467A3 blue, (4) dashed Higgs boson propagator in #BD8233 ochre. Vertex circles (INK fill, PAGE_BG stroke) with shadow rings at each interaction point. Bold-serif-italic particle labels (t, g, γ, H) colored by particle type.
      Legibility verdict: PASS — all title, label, legend, and annotation text is clearly visible against the #FAF8F1 background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct PAGE_BG. The elevated panel shifts to #242420 (ELEVATED_BG dark). The overall layout is identical to the light render.
