review:
  strengths:
  - Perfect spec compliance — all 4 particle types shown with correct line styles
    (solid+arrow for fermions, wavy for photons, curly for gluons, dashed for scalar
    bosons), directional arrows, vertex dots, and particle labels.
  - 'Excellent Imprint palette usage — canonical order: fermions=#009E73, photons=#C475FD,
    gluons=#4467A3, scalar bosons=#BD8233.'
  - Clean theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders are crisp
    with correct backgrounds and readable chrome. No dark-on-dark issues.
  - Physically correct t-channel Compton scattering topology with proper time axis
    and virtual electron propagator label.
  - Smart reference legend at the bottom shows all 4 particle line-style conventions
    even though the main diagram (Compton scattering) only uses fermions and photons
    — educates the viewer about the full Feynman diagram vocabulary.
  weaknesses:
  - fontsize=7 for reference legend particle-type labels (Fermion, Photon, Gluon,
    Scalar Boson) is marginally small — at mobile scale (~400px wide) these ~5px-tall
    characters become barely legible. Bump to fontsize=8.
  - Library Mastery is limited because seaborn's statistical visualization strengths
    (estimation, distributions, multi-dimensional data) are not naturally applicable
    to a Feynman diagram. The implementation relies heavily on matplotlib primitives
    (annotate, text) with seaborn contributing only lineplot+scatterplot wrappers.
    This is inherent to the diagram type but lowers LM scores.
  - 'Design Excellence could be improved: the reference legend section below the separator
    could have slightly more inter-item spacing or a light background box (ELEVATED_BG)
    to better distinguish it visually from the main diagram area.'
