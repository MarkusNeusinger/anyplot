    points. Particle labels appear in their respective colors (g in red, t in blue,
    H in green, γ in gold) using serif italic font. A process annotation "g + g →
    H → γ + γ" appears near the top in gray italic. A dashed time arrow runs along
    the bottom. The title "feynman-basic · altair · pyplots.ai" is centered at the
    top, and a color-coded legend in the top-right shows all four particle types.
    The background is clean white with no axes.
