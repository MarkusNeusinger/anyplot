  image_description: The plot shows a Feynman diagram for electron-positron annihilation
    into a muon-antimuon pair (e-e+ -> gamma -> mu-mu+). Two blue solid fermion lines
    with arrowheads converge from the upper-left (e-) and lower-left (e+) to a left
    vertex marked with a blue dot. A red wavy line representing the virtual photon
    (gamma) connects the left vertex to a right vertex (also a blue dot). From the
    right vertex, two blue solid fermion lines with arrows diverge to the upper-right
    (mu-) and lower-right (mu+). Particle labels are rendered in LaTeX math notation
    in matching colors (blue for fermions, red for photon). A gray "time" arrow runs
    along the bottom. A legend at the top identifies "Fermion (solid + arrow)" and
    "Photon (wavy)". The title reads "feynman-basic - seaborn - pyplots.ai". The background
    is clean white with axes turned off.
