review:
  strengths:
  - Sophisticated Feynman diagram with all four standard line types (curly gluon,
    wavy photon, solid-arrow fermion, dashed scalar boson)
  - 'Imprint palette applied with physics-semantic reasoning: fermion=green(pos1),
    boson=lavender(pos2), photon=blue(pos3), gluon=ochre(pos4) — canonical order that
    also maps semantically'
  - 'Dual-theme implementation works flawlessly: vertex dots flip from INK dark to
    INK light, all data colors remain identical, backgrounds correct (#FAF8F1 / #1A1A17)'
  - Custom wavy_line() and gluon_line() functions generate sinusoidal paths as tibbles
    fed to geom_path — idiomatic ggplot2 grammar-of-graphics approach for a non-standard
    diagram type
  - 'Physically accurate process: gg→H→γγ is the dominant Higgs production channel
    at the LHC, with correct top-quark loop mediating gg-H coupling'
  - Particle labels colored to match their line type, providing redundant encoding
    beyond color alone
  - Time-direction arrow and subtitle together clearly explain the diagram to a non-physics
    reader
  weaknesses:
  - Two helper functions (wavy_line, gluon_line) break the KISS no-functions rule,
    though they are necessary for the diagram type — consider inlining the data generation
    directly
  - Gluon curly lines use a sinusoidal wave (high frequency) rather than true circular
    loops — in strict Feynman diagram convention, gluon lines have enclosed circular
    bumps above and below the path axis; the sinusoidal approximation is visually
    acceptable but physicists may notice
  - DE-03 storytelling relies primarily on the subtitle text rather than visual hierarchy
    within the diagram — the Higgs propagator (dashed lavender) could be made slightly
    thicker or the decay photons could fan out more dramatically to create a stronger
    visual focal point at the Higgs decay vertex
  - No set.seed(42) call, though acceptable here since all data is fully deterministic
