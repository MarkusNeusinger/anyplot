review:
  strengths:
  - Correct and physically accurate Compton scattering diagram with proper ggplot2
    idioms
  - 'Semantic Imprint palette use: green (#009E73) for fermions (brand), blue (#4467A3)
    for EM photon lines — principled physics-motivated color mapping'
  - Excellent theme_void() choice removes all chart-ink noise appropriate for a diagram
  - Wavy photon line function produces convincing sinusoidal paths perpendicular to
    the line direction
  - 'Theme-adaptive chrome is correctly wired: vertex dots flip black→white, all text
    tokens use INK/INK_SOFT/INK_MUTED'
  - Subtitle 'Compton Scattering — e⁻γ → e⁻γ' provides clear physics context
  - Italic superscript particle labels (e⁻, γ) colored to match their respective line
    types — elegant redundant encoding
  - Time-direction arrow at bottom with muted styling keeps diagram clean and informative
  - scale_color_identity() for mixed-color geom_text is an idiomatic ggplot2 pattern
  weaknesses:
  - Only 2 of 4 spec-required particle types shown (fermion + photon only) — spec
    explicitly requires curly/looped gluon lines and dashed scalar boson lines. Consider
    adding a QCD vertex example or a small inset panel to demonstrate all 4 line styles
  - 'DQ-01 limited by missing particle types: the chosen Compton scattering process
    is physically correct but does not exercise gluon or boson propagators specified
    in the data schema'
  - 'CQ-01 minor: wavy_line() helper function breaks strict KISS — technically necessary
    given no built-in ggplot2 wavy geom, but the criterion flags any function definition'
  - 'VQ-05 minor: empty vertical band above the diagram (between subtitle and top
    e⁻ labels) is about 20% of canvas height; nudging plot upward or adding a second
    example panel would improve canvas utilization'
  - '''time'' annotation at size=3.5 (≈10pt) is on the small side for the 3200×1800
    canvas — consider size=4.0–4.5'
  - 'LM-02 moderate: core wavy-line geometry is hand-coded R arithmetic; using a ggplot2-ecosystem
    extension (e.g. ggforce::geom_arc or a custom stat) would lift library mastery'
