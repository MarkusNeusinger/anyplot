review:
  strengths:
  - Clean professional color scheme with Python Blue fermions and orange photon for
    good visual distinction
  - Well-rendered wavy photon line with smooth sinusoidal oscillation
  - theme_void() is the right choice for a Feynman diagram removing all chart chrome
  - Fully deterministic code with clean structure
  weaknesses:
  - Antiparticle arrows (e+ and mu+) point in the wrong direction - should be reversed
    per Feynman diagram convention
  - Significant empty whitespace in the lower portion of the canvas - poor space utilization
  - Only demonstrates 2 of 4 particle types (fermion, photon) - could include gluon
    or boson
  - No time axis indicator despite spec suggesting it
  - Function definition breaks KISS principle
  image_description: The plot shows a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a white background with no axes (theme_void). Four blue fermion
    lines with arrowheads converge/diverge at two black vertex dots connected by an
    orange wavy photon line. Particle labels (e⁻, e⁺, γ, μ⁻, μ⁺) are displayed in
    matching colors (blue for fermions, orange for photon). The title "feynman-basic
    · plotnine · pyplots.ai" is centered at the top. The diagram occupies the upper-center
    portion of the canvas with significant empty whitespace at the bottom. The wavy
    photon line has approximately 6 oscillations with smooth sinusoidal shape. All
    four fermion arrows point forward in time, which is incorrect for the antiparticles
    e⁺ and μ⁺.
