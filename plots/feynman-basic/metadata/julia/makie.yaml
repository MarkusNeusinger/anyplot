review:
  strengths:
  - Exceptional use of Makie's @recipe system to create composable Feynman propagator
    types (FermionProp, PhotonProp, GluonProp, ScalarProp) — a uniquely Makie-idiomatic
    approach that makes the diagram grammar extensible
  - 'Semantic color assignment aligns with physics conventions: green=fermion (#009E73),
    blue=EM/photon (#4467A3), lavender=QCD/gluon (#C475FD), ochre=scalar (#BD8233)
    — all from Imprint palette'
  - Two-panel educational layout combining QED example diagram with propagator type
    reference is informative and well-proportioned
  - All spines removed, no grid — perfectly minimal chrome that doesn't distract from
    the diagram physics
  - Robust theme-adaptive tokens throughout; both light and dark renders pass all
    readability checks with correct backgrounds and legible text
  weaknesses:
  - Reference panel propagator type labels at fontsize=13 may be marginally small
    at mobile scale (~400px); consider increasing to fontsize=14-15
  - Four @recipe type definitions add structural complexity before the main plot —
    the KISS flat structure is deviated from, though justified for this diagram type
  image_description: |-
