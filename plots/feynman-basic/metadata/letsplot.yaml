  image_description: 'The plot displays a Feynman diagram for electron-positron annihilation
    (e⁻e⁺ → γ → μ⁻μ⁺) on a white background. Two blue solid lines with arrowheads
    represent incoming fermions (e⁻ top-left, e⁺ bottom-left) converging at a black
    vertex dot. A gold wavy line (γ photon propagator) connects this vertex to a second
    black vertex dot on the right. Two outgoing blue fermion lines with arrows (μ⁻
    top-right, μ⁺ bottom-right) emerge from the second vertex. Particle labels in
    dark italic text are positioned near each line endpoint. A "Particle Types" legend
    on the right side shows all four line styles: blue solid with arrow (Fermion),
    gold wavy (Photon), teal curly (Gluon), and purple dashed (Boson). A gray time
    arrow with italic "time" label runs left-to-right at the bottom. Title "feynman-basic
    · letsplot · pyplots.ai" in bold navy at top-left with subtitle "Electron–Positron
    Annihilation: e⁻e⁺ → γ → μ⁻μ⁺" in lighter blue.'
