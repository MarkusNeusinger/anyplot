  strengths:
  - 'Excellent physics content: Higgs-strahlung process showcases all 4 particle types
    naturally'
  - Custom harmonious color palette with good colorblind accessibility
  - Clean rendering of wavy (photon/Z) lines and clear fermion arrows
  - Process equation annotation and time axis provide good context
  - Dual PNG + HTML export leverages Bokeh strengths
  weaknesses:
  - Missing b quark line from H decay (only b-bar and g shown, should have b too)
  - Gluon coil rendering is somewhat messy at the bottom-right
  - Helper functions violate KISS flat-structure principle
  - Legend text and process annotation could be slightly larger for the canvas size
  image_description: 'The plot shows a Feynman diagram for the Higgs-strahlung process
    (e⁻e⁺ → Z* → ZH → μ⁻μ⁺ + bb̄ + g) on a light gray (#f8f8f8) background. The title
    "feynman-basic · bokeh · pyplots.ai" is centered at the top. Four particle types
    are rendered with distinct line styles and colors: solid blue lines with directional
    arrows for fermions (e⁻, e⁺, μ⁻, μ⁺, b̄), gold wavy lines for photon/Z bosons
    (Z*/γ, Z), a purple dashed line for the Higgs scalar boson (H), and green curly/coiled
    lines for the gluon (g). Four vertices are shown as dark dots with white borders
    at the interaction points. A color-coded legend in the top-left identifies each
    particle type. A process equation annotation appears near the top center. A gray
    time arrow runs along the bottom of the canvas. The layout flows left-to-right
    with incoming fermions on the left, the virtual Z*/γ propagator in the middle,
    and decay products on the right.'
