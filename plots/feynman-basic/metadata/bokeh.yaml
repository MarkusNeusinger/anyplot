    The title "feynman-basic · bokeh · pyplots.ai" is centered at the top in large
    font. A process equation annotation appears below the title in italic gray text.
    Four particle types are rendered with distinct line styles and colors: solid blue
    lines with midpoint directional arrows for fermions (e⁻, e⁺ incoming on the left;
    μ⁻, μ⁺ outgoing upper-right; b, b̄ outgoing lower-right), gold wavy lines for
    photon/Z bosons (Z*/γ virtual propagator horizontally, Z going upper-right), a
    purple dashed line for the Higgs scalar boson (H going lower-right), and green
    curly/coiled lines for the gluon (g at bottom-right). Four dark vertices with
    white borders mark interaction points. A color-coded legend in the top-left corner
    identifies each particle type (fermion blue, photon/Z gold, gluon green, scalar
    boson purple). A gray time arrow with "time" label runs along the bottom.'
