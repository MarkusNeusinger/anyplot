review:
  strengths:
  - 'Correct grammar-of-graphics approach for a quiver plot: geom_segment() + arrow(type="closed")
    with coord_fixed(ratio = 1) so directions are not visually distorted'
  - Arrow direction AND magnitude are doubly encoded — length (scaled so the fastest
    vector spans ~80% of grid spacing) and color (imprint_seq gradient) both track
    speed, giving a clear visual focal point (calm eye vs. fast outer ring)
  - 170-arrow 17x10 grid sits squarely in the spec's recommended 100-400 arrow / 10x10-20x20
    range, uniformly spaced with no overlap
  - Theme-adaptive chrome correctly threaded through title/axis/tick/legend colors
    and both plot + legend backgrounds for light and dark renders
  - 'Continuous color scale correctly uses imprint_seq stops (#009E73 -> #4467A3)
    with a proper colorbar legend labeled with units (m/s)'
  - 'Title format matches the mandated pattern exactly: "Cyclonic Wind Field · quiver-basic
    · r · ggplot2 · anyplot.ai"'
  - 'Clean, reproducible, single-pass script: set.seed(42), only used imports (ggplot2,
    dplyr, tidyr, ragg), no functions/classes, correct ragg::agg_png save at the landscape
    canvas size'
  weaknesses:
  - Wind speeds top out around ~2.8 m/s (legend max 2.5+) — that's light-breeze strength,
    not cyclone-force (real cyclonic winds start well above 17 m/s). Labeling this
    a "Cyclonic Wind Field" while showing sub-3 m/s speeds is a minor domain-plausibility
    mismatch; either rename to something less storm-specific (e.g. "Rotational Flow
    Field") or scale the speed values up to a range that reads as genuinely cyclonic.
  - No grid and no axis border (theme_minimal defaults, panel.grid = element_blank(),
    axis.ticks = element_blank()) is a valid minimal look, but with 170 arrows spanning
    the full canvas a very faint y/x reference grid would make it easier to read off
    exact arrow positions — purely optional polish, not a defect.
  - 'Design excellence is solid but not exceptional: aside from the color+length redundant
    encoding there''s no further hierarchy device (e.g. an annotated eye marker or
    radial guide) to make the "calm eye" story pop even more explicitly.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1-class), not pure white, not dark.
      Chrome: Title "Cyclonic Wind Field · quiver-basic · r · ggplot2 · anyplot.ai" in dark ink, comfortably sized and fully within the canvas; x-axis label "Distance east of eye (km)" and y-axis label "Distance north of eye (km)" in dark ink, both similarly sized and clearly legible; tick labels (-5, 0, 5 / -5.0 to 5.0) in a slightly softer gray, all readable; legend "Wind speed (m/s)" with a vertical color-bar and numeric ticks (0.5-2.5), housed in a very subtly elevated off-white box.
      Data: 170 arrows on a 17x10 grid form a clear rotational (cyclonic) pattern — tangential flow circling a calm "eye" near the origin. Arrow color runs from brand green (#009E73, slow, near the eye) to blue (~#4467A3, fast, outer ring), matching the imprint_seq sequential colormap. Arrows are uniformly spaced with no overlap and closed triangular arrowheads.
      Legibility verdict: PASS — all text has strong contrast against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17-class), not pure black, not light.
      Chrome: Same title, axis labels, and tick labels now rendered in light ink (off-white for title/axis titles, softer light gray for tick labels) — fully legible against the dark background, no dark-on-dark failures observed. Legend box uses a barely-lighter dark elevated fill with light text, also legible.
      Data: Same green-to-blue gradient and same arrow geometry/positions as the light render — data colors are identical between themes, confirming only chrome flipped.
      Legibility verdict: PASS — title, axis labels, tick labels, and legend text are all clearly readable against the dark surface; no black-on-black or washed-out text detected.
