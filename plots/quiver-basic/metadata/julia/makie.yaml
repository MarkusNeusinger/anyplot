review:
  strengths:
  - 'Physically-motivated data: a Rankine vortex model (solid-body rotation inside
    the eyewall, 1/r decay outside, v_max=33 m/s pegged to the Category-1 hurricane
    threshold) replaces a toy rotation formula, giving the field genuine real-world
    plausibility.'
  - 'Thoughtful dual encoding: arrow color always maps to the true, unfloored speed
    while displayed arrow length is gently floored near the calm core so the 1-2 slowest
    grid points never shrink to invisible slivers — a well-reasoned, well-commented
    readability tradeoff.'
  - aspect = DataAspect() correctly preserves the vortex's circular symmetry; verified
    by cropping into the core — the rotational flow renders as a true circle, not
    squashed into an ellipse.
  - 'Idiomatic Makie composition: the Colorbar is built directly from the arrows!
    plot object (arrow_plot), and every theme token (PAGE_BG, INK, INK_SOFT) is threaded
    consistently through Figure, Axis, and Colorbar.'
  - 'Correct palette compliance: continuous wind-speed data uses a two-stop Imprint
    sequential colormap (#009E73 → #4467A3), backgrounds match #FAF8F1/#1A1A17 exactly,
    and data colors are pixel-identical between light and dark renders.'
  weaknesses:
  - The dashed eyewall ring at r=3 (intended per the code comment to 'sharpen the
    storytelling') is effectively invisible in both renders — alpha=0.35 with linewidth=1.2
    gets lost among the densely-packed colored arrows. Either raise its contrast/opacity/linewidth
    so it actually reads, or drop it since it isn't earning its keep visually.
  - Displayed arrow length is floored at 0.18*v_max near the calm core, so length
    stops being strictly proportional to magnitude there (color carries that signal
    instead) — a reasonable readability tradeoff, but it's a partial departure from
    the spec's 'length proportional to magnitude' guidance worth being explicit about.
  - 'Design Excellence still has headroom versus a top score: the palette is restricted
    to a 2-stop sequential gradient (a compliance requirement, not a flaw) but no
    other distinctive framing (e.g. a labeled eye/eyewall annotation, a compass or
    scale cue) elevates the storytelling beyond the color+rotation pattern itself.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white, not dark.
      Chrome: Title "quiver-basic · julia · makie · anyplot.ai" in bold dark ink, clearly visible. X-axis "X position (km)" and Y-axis "Y position (km)" labels in dark ink, fully legible. Tick labels (-9..9, -3..3) in a softer gray, clearly readable. Subtle light-gray gridlines at each major tick, visible but non-dominant. Colorbar on the right labeled "Wind speed (m/s)" with readable tick labels (0.50-1.25+).
      Data: 240 arrows arranged on a 20x12 grid forming a clear cyclonic (rotational) flow pattern — arrows curl counter-clockwise around the center, calm/short arrows near the origin, longer/faster arrows in a ring around it, straightening out toward the domain edges. Arrow color runs from teal-green (#009E73, slow) through teal to blue (#4467A3, fast) via the Imprint sequential colormap, correctly encoding the true (unfloored) wind speed. A faint dashed ring intended to mark the eyewall radius is present in code but not perceptible against the arrow field.
      Legibility verdict: PASS — all text (title, axis labels, ticks, colorbar) is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black, not light.
      Chrome: Title, axis labels rendered in light off-white ink, clearly visible against the dark background. Tick labels in a lighter gray, clearly legible — no dark-on-dark issue anywhere. Gridlines are a subtle light gray at low opacity, visible but not distracting. Colorbar labels equally legible in light ink.
      Data: Identical arrow layout, colors, and rotational pattern as the light render — the teal-green-to-blue Imprint sequential colormap is pixel-identical between themes; only the chrome (background, text, grid, spines) has flipped to the dark tokens.
      Legibility verdict: PASS — no dark-on-dark or light-on-light failures observed; all chrome elements are clearly readable against the dark surface.
