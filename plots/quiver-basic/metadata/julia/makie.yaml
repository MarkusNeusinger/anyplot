review:
  strengths:
  - Physically-motivated Rankine vortex data (solid-body rotation core + 1/r decay
    outside) gives the quiver field genuine spatial structure and a clear focal point,
    rather than a generic random flow field
  - 'Correct Imprint sequential colormap (#009E73 -> #4467A3) encodes wind speed magnitude,
    matching the single-polarity nature of the data, with a clearly labeled colorbar'
  - All chrome (title, axis labels, ticks, spines, grid, colorbar) is explicitly theme-tokened
    via THEME/INK/INK_SOFT and reads correctly in both light and dark renders -- no
    dark-on-dark or light-on-light failures
  - 'Canvas well-utilized: DataAspect() plus tuned xlims!/ylims! and colsize! keep
    the vector field large while the colorbar stays proportionate, with balanced margins'
  - Clean KISS code structure (imports -> data -> plot -> save) with explicit font
    sizes throughout, seeded reproducibility, and no fake interactivity
  weaknesses:
  - The 1-2 grid points nearest the vortex core (r approx 0) render as extremely short,
    faint arrows that nearly disappear against the gridlines -- apply a minimum visible
    arrow length (floor the lengthscale input) so no vector visually vanishes, while
    keeping color mapped to the true magnitude
  - Code comment claims the data 'mirrors a real cyclone's wind profile', but plotted
    speeds only reach ~1.5 m/s -- real cyclones sustain >= 17 m/s (tropical storm)
    up to 33+ m/s (hurricane force); the vortex shape is physically correct but the
    numeric scale undersells the claimed real-world phenomenon by 10-20x -- either
    scale magnitudes up to genuine storm-force values or soften the comment to describe
    a local wind eddy
  - Visual refinement matches the standard anyplot style-guide baseline (partial spine
    removal, subtle grid) without additional intentional polish beyond it -- e.g.
    default arrowhead style, no extra emphasis on the high-speed eyewall band -- limiting
    Design Excellence from going higher
  - Data storytelling is solid (color + spiral shape create a focal point) but stops
    at 'good' rather than 'excellent' -- consider one more deliberate emphasis technique
    on the eyewall band to sharpen the insight
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) -- correct surface color, not pure white.
      Chrome: Title "quiver-basic · julia · makie · anyplot.ai" in bold dark text, clearly readable and centered. Axis labels "X position (km)" and "Y position (km)" in dark INK color, readable. Tick labels in a softer dark tone (INK_SOFT), readable. Faint gray gridlines at every 3 km, subtle but visible. Colorbar on the right labeled "Wind speed (m/s)" with readable ticks (0.50, 0.75, 1.00, 1.25).
      Data: A 20x12 grid (240 arrows) of quiver vectors forming a cyclonic (rotational) spiral pattern. Arrows are colored on a continuous green-to-blue scale (#009E73 low speed -> #4467A3 high speed) -- teal-green in the outer, slower region, transitioning to blue in the faster eyewall band that spirals around the low-speed core near the origin. Arrow length and color both encode magnitude consistently. No overlap between arrows; spacing is uniform.
      Legibility verdict: PASS -- all text elements (title, axis labels, ticks, colorbar label/ticks) are clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) -- correct dark surface, not pure black.
      Chrome: Title and axis labels switch to near-white (INK, light color), clearly readable against the dark background. Tick labels in INK_SOFT (light gray), readable. Gridlines remain subtle. Colorbar label and ticks are light-colored and readable. No dark-on-dark failures observed anywhere.
      Data: Same spiral vector field, same green-to-blue color ramp (#009E73 -> #4467A3) -- data colors are identical to the light render; only the chrome (background, text, grid) has flipped as expected.
      Legibility verdict: PASS -- all chrome elements are clearly readable against the dark background; no black-on-black or unreadable text found.
