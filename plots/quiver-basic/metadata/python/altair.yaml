review:
  strengths:
  - 'Correct and creative use of the imprint_seq continuous colormap (#009E73 -> #4467A3)
    to encode magnitude, exactly matching the style guide''s single-polarity continuous
    data rule'
  - Thoughtful arrow-length rescaling (MIN_LEN/MAX_LEN) keeps low-magnitude vectors
    near the origin visible instead of shrinking to imperceptible dots -- solves a
    classic quiver-plot legibility problem
  - Grid size (15x15 = 225 arrows) sits within the spec's recommended 100-400 range,
    and the circular rotation field (u=-y, v=x) matches the spec's own suggested example
    data
  - Theme-adaptive chrome is correctly implemented in both renders -- identical data
    colors, readable text, warm off-white/near-black backgrounds
  - Vectorized shaft + arrowhead construction (pd.concat of three DataFrames) avoids
    per-row Python loops despite Altair having no native quiver mark
  - Canvas dimension gate passed cleanly -- no drift from the 2400x2400 square target
  weaknesses:
  - configure_view(stroke=INK_SOFT) draws a full rectangular box around the plot area
    on all four sides -- the style guide default is an L-shaped frame (left+bottom
    only) or no spines; consider dropping the stroke or setting it much lighter
  - Axis titles 'X Position' / 'Y Position' are descriptive but carry no units since
    the grid is a dimensionless coordinate space -- acceptable given the abstract
    data, but VQ-06 caps at 'descriptive without units'
  - No Altair-distinctive feature is used beyond mark_rule + continuous color encoding
    (e.g. no interactive tooltip encoding magnitude/direction per arrow in the HTML
    export, no selection/zoom) -- since the HTML output already exists, adding tooltip=['magnitude']
    would meaningfully raise Library Mastery
  - Visual hierarchy relies solely on the magnitude color ramp; a callout or subtle
    annotation on the highest-magnitude ring could push Data Storytelling further
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 -- not pure white.
      Chrome: Bold dark title "quiver-basic · altair · anyplot.ai" centered at top, clearly readable. "X Position" / "Y Position" axis titles and numeric tick labels (-2.5 to 2.5) in soft dark grey, all legible. Subtle light grid lines visible but not competing with data. "Magnitude" legend with graduated green-to-blue circle swatches (0.0-2.5) sits at the right, clearly separated from the plot, fully within canvas bounds.
      Data: 225 arrows (15x15 grid) arranged in a circular rotation pattern (u=-y, v=x). Color ramps from brand green (#009E73) near the low-magnitude center to blue (#4467A3) at the high-magnitude edges. Arrow length and stroke width both scale with magnitude; direction is unambiguous at every grid point.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 -- not pure black.
      Chrome: Title, axis titles, and tick labels all flip to light/off-white ink and remain fully readable against the dark surface. Grid lines are faint but visible. Legend swatch fill and text also flip to the dark-theme tokens and stay legible; no dark-on-dark text was found anywhere.
      Data: Identical green-to-blue magnitude ramp and identical arrow geometry as the light render -- only the chrome (background, text, grid, legend box) changed, as required.
      Legibility verdict: PASS
