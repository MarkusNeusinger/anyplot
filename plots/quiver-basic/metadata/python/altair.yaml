review:
  strengths:
  - 'Correctly implements Altair''s vl-convert canvas constraint: sizes the inner
    view small, saves at scale_factor=4.0, then pads (never crops) to the exact 2400x2400
    target'
  - Arrows are built fully vectorized (shaft + two arrowhead segments per point via
    mark_rule) with no Python loops, staying idiomatic for Altair/vega-lite
  - 'Dual-encodes vector magnitude through both color (Imprint sequential #009E73→#4467A3)
    and stroke width, adding a secondary emphasis cue for the strongest vectors'
  - Rescales arrow length into a [0.08, 0.22] range so low-magnitude arrows near the
    origin stay visible instead of collapsing to invisible dots
  - Uses an equal-scale square domain matched to the view aspect ratio so the circular
    rotation field renders as a true circle, not an ellipse
  - Theme tokens (PAGE_BG/INK/INK_SOFT/ELEVATED_BG) are threaded through axis, title,
    and legend consistently; both renders pass the theme-readability check with identical
    data colors
  weaknesses:
  - Axis labels 'X Position' / 'Y Position' are descriptive but carry no units — since
    the field is a dimensionless synthetic coordinate grid this is a minor deduction
    rather than a real omission, but a brief unit or domain hint (e.g. 'X Position
    (m)') would round this out
  - Chart still shows the full Altair default box border (domain lines on all four
    sides) rather than a refined open axis — removing/lightening the top and right
    domain lines would sharpen the visual refinement
  - The mark_rule-built arrows are functionally correct but don't showcase a more
    distinctive vega-lite feature (e.g. layered marks with alt.layer, or a transform_calculate
    step) that would be harder to replicate in another library
  - Title omits the 'python' language segment ('quiver-basic · altair · anyplot.ai'
    vs the canonical '{spec-id} · {language} · {library} · anyplot.ai'); this matches
    the majority existing catalog convention for altair so it is not unique to this
    PR, but flagging for future consistency work across the library
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "quiver-basic · altair · anyplot.ai" in bold dark ink, centered above the plot. X/Y axis titles ("X Position", "Y Position") and tick labels in dark/soft-dark ink, clearly legible. Grid lines are light gray, subtle but visible. Legend "Magnitude" at top right with circular swatches from 0.0 to 2.5, labels dark and readable.
      Data: 15x15 grid of arrows forming a circular rotation flow pattern (u=-y, v=x). Arrow color transitions from teal-green (#009E73, low magnitude near origin) to blue (~#4467A3, high magnitude at the field's edges), with stroke width increasing alongside magnitude. Arrows are clearly distinguishable against the light background.
      Legibility verdict: PASS — all text is dark-on-light and fully readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Title, axis titles, and tick labels rendered in light/off-white ink, clearly legible against the dark background. Grid lines are faint dark-gray, still perceptible. Legend box uses a slightly elevated dark fill with light text and swatches, fully readable.
      Data: Same circular rotation field as the light render — arrow colors are identical (teal-green #009E73 to blue #4467A3), confirming only chrome (not data colors) flipped between themes.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title/axis/tick text is clearly visible against the dark surface.
