review:
  strengths:
  - 'Clever workaround for seaborn''s lack of a native quiver primitive: shafts drawn
    via sns.lineplot with continuous hue mapped to magnitude (units=segment, estimator=None),
    and matching triangular arrowheads built as matplotlib Polygon patches colored
    from the same imprint_seq normalization — a coherent, well-engineered solution.'
  - 'Correct continuous-data palette usage: imprint_seq (#009E73 → #4467A3) for magnitude,
    which is single-polarity data per the style guide; data colors are pixel-identical
    between light and dark renders, only chrome flips.'
  - Square 2400x2400 canvas is the right choice for this symmetric, aspect-equal vector
    field per the seaborn library rules, and the render hits the target exactly (no
    canvas-gate failure).
  - Realistic, neutral domain framing (idealized ocean eddy current field, u=-0.1y,
    v=0.1x) that matches the spec's own suggested rotation-field example, with clearly
    labeled axes (km) and a labeled colorbar (Current Speed, m/s).
  - Arrow length is genuinely proportional to magnitude (arrow_scale derived from
    grid spacing and max magnitude) rather than uniformly normalized, so the plot
    is a true quiver, not a direction-only glyph field.
  - 'Clean theme-adaptive chrome: spines top/right removed, subtle 0.10-alpha grid,
    explicit font sizes matching the seaborn style-guide defaults (title 12pt, axis
    labels 10pt, ticks 8pt), correct title format.'
  weaknesses:
  - 'Arrows near the vortex center (low-magnitude region, roughly the inner third
    of the grid) shrink to short round-capped stubs with no discernible triangular
    arrowhead — they read as dots/dashes rather than directional arrows, since head_length
    = head_ratio * seg_length scales the arrowhead down with the shaft instead of
    keeping a legible minimum size. This is exactly the region where a viewer most
    needs direction cues since the rotation pattern''s center is the visually ambiguous
    part of the field. Fix: clamp head_length to a minimum absolute size (e.g. a few
    px in data units) independent of magnitude, or use a perceptual (sqrt/log) length
    scale so short vectors don''t collapse below arrowhead-legible size.'
  - Peak current speed of ~4.2 m/s for an idealized ocean eddy at this scale (60 km
    across) is on the high side for DQ-03 appropriate-scale — real mesoscale eddies
    of this size typically peak under ~1-2 m/s; consider scaling u/v down (e.g. 0.05x
    coefficient) so the colorbar tops out closer to 2 m/s for a more domain-plausible
    range.
  - np.random.seed(42) is set but np.random is never called anywhere in the script
    (u, v are fully deterministic functions of x, y) — dead code that should be removed
    for CQ-03/CQ-04 cleanliness.
  - No legend/colorbar tick at the very low end (near 0 m/s) despite the vortex center
    vectors approaching zero magnitude — a minor missed opportunity to visually anchor
    the reader to where the arrows disappear.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), consistent across the full canvas, matches the style-guide target.
      Chrome: Title "quiver-basic · python · seaborn · anyplot.ai" in dark ink, centered, ~65% of plot width, not clipped. X-axis "Distance East (km)" and Y-axis "Distance North (km)" labels in dark ink at balanced sizes. Tick labels (-30 to 30, both axes) in soft dark gray, all legible. Subtle gray gridlines at major ticks, visible but not dominant. Colorbar on the right labeled "Current Speed (m/s)" with ticks 0.5-4.0, all text dark and legible against the light background.
      Data: 20x20 grid of arrows forming a clear circular/rotational flow pattern (idealized ocean eddy). Color runs from Imprint green (#009E73) at low magnitude near the center to Imprint blue (#4467A3) at high magnitude toward the edges, matching the sequential imprint_seq colormap. Arrows toward the perimeter have crisp, clearly visible triangular arrowheads showing rotational direction. Arrows near the center (low magnitude, roughly inner third of the grid) shrink to short round-capped stubs/dots with no discernible arrowhead — direction is not conveyed in that region.
      Legibility verdict: PASS (all chrome text readable; the center-arrow issue is a data/element-visibility weakness, not a text-legibility failure).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), consistent across the canvas, matches the style-guide target.
      Chrome: Same title, now in light ink (#F0EFE8), fully legible against the dark background, not clipped. Axis labels and tick labels rendered in light/soft-light ink, all clearly readable — no dark-on-dark failures observed. Gridlines subtle gray, visible without dominating. Colorbar chrome (label + ticks) legible in light text against the dark background.
      Data: Identical rotational arrow pattern and identical green-to-blue color mapping as the light render — confirmed the data colors did not shift between themes (only chrome flipped, as required). Same center-magnitude arrowhead-visibility weakness reproduces here (small dashes/dots near the vortex core, no visible direction).
      Legibility verdict: PASS (no dark-on-dark text; same center-arrow element-visibility weakness as the light render, consistent across themes).
