review:
  strengths:
  - Perfect theme-adaptive chrome in both light and dark renders via sns.set_theme
    rc tokens
  - Viridis colormap correctly applied to continuous magnitude data with a well-styled
    colorbar
  - Equal aspect ratio enforced — essential for a rotation vector field to show circles
    not ellipses
  - '15x15 grid (225 arrows) well-chosen: dense enough to show field structure, sparse
    enough to avoid overlap'
  - 'Title format exactly correct: quiver-basic · seaborn · anyplot.ai'
  weaknesses:
  - Arrow lengths are all normalized to the same value — spec requires length proportional
    to magnitude; fix by using proportional scaling (u * 0.25) instead of normalizing
    by magnitude
  - Design lacks focal point or narrative — add a subtitle or annotation naming the
    field to lift storytelling score
  - 'Library mastery is limited: seaborn is used as a thin matplotlib wrapper; the
    iteration-over-groups arrow-segment loop is complex and non-idiomatic for seaborn'
  - Square-in-landscape canvas wastes lateral space; consider a square canvas (figsize=(12,12))
    to match equal-aspect content
