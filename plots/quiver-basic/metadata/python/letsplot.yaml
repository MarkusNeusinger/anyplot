review:
  strengths:
  - 'Arrow-overlap fix verified: scale_factor=0.08 keeps the longest scaled arrow
    (~0.34 units at the outer ring, magnitude ~4.24) under the ~0.43-unit grid spacing,
    so shafts/heads stay visually separated as the spec requires — the prior review''s
    VQ-02/SC-02 weakness is resolved'
  - 'Correct Imprint sequential colormap (#009E73 -> #4467A3) mapped to vector magnitude
    via scale_color_gradient, matching imprint_seq for single-polarity continuous
    data, identical across both themes'
  - Theme-adaptive chrome fully threaded through (background, ink, ink_soft, legend
    box) - both renders pass the legibility check, no dark-on-dark or light-on-light
    failures
  - 'Code cleanup verified: dead np.random.seed(42) removed and the redundant normalize-then-rescale
    formula simplified to a direct U*scale_factor / V*scale_factor multiply, with
    an explanatory comment on the spacing math'
  - New layer_tooltips() with custom .line() content (Position, u/v components, magnitude)
    is a genuine lets-plot-specific interactive feature addressing the prior review's
    Library Mastery weakness
  - Arrow length correctly proportional to vector magnitude and direction correctly
    represents the u=-y, v=x rotation field; canvas is exactly 3200x1800 with both
    plot-{theme}.png and plot-{theme}.html saved
  weaknesses:
  - Arrows near the origin (magnitude close to 0) remain very small, close to single
    points, which slightly hurts element visibility there — this is an inherent property
    of the rotation field rather than a styling bug, but a slightly larger minimum
    arrow length or a subtle size floor could improve legibility at the center.
  - 'Design Excellence is unchanged from the prior attempt: composition is still a
    standard quiver layout elevated mainly by the magnitude color gradient. A stronger
    focal point (e.g. annotating the calm center vs. fast outer ring, or a title subtitle
    framing the story) would raise DE-01/DE-03 further.'
  - 'Library Mastery: geom_segment + arrow() remains the standard lets-plot workaround
    since there''s no native quiver geom (idiomatic but not distinctive on its own);
    the new tooltip content helps, but further leaning into interactivity (e.g. distinct
    tooltip formatting per magnitude tier) could push LM-02 higher.'
