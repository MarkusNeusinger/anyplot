      Data: 15x15 grid of arrows over x,y in [-3,3] forming a counterclockwise circular/rotational flow pattern (u=-y, v=x). Arrows are colored on a continuous sequential scale from brand green (#009E73, near-zero magnitude at the center) to blue (#4467A3, highest magnitude at the outer ring). Outer-ring arrows are now visibly separated (shaft/head no longer merge into neighbors) after the scale_factor reduction to 0.08; near-center arrows are tiny, correctly reflecting near-zero magnitude there.
