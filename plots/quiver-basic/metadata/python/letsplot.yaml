review:
  strengths:
  - 'Correct Imprint sequential colormap (#009E73 → #4467A3) mapped to vector magnitude
    via scale_color_gradient — matches imprint_seq for single-polarity continuous
    data'
  - Theme-adaptive chrome fully threaded through (background, ink, ink_soft, legend
    box) — both renders pass the legibility check, no dark-on-dark or light-on-light
    failures
  - 'Proper L-shaped spines confirmed by pixel inspection: only left/bottom axis lines
    drawn, top/right corners are clean with no stray border'
  - Arrow length is correctly proportional to vector magnitude and direction correctly
    represents the u=-y, v=x rotation field
  - Canvas is exactly 3200×1800 (landscape gate), and both plot-{theme}.png and plot-{theme}.html
    are saved as required for an interactive library
  weaknesses:
  - Arrows overlap noticeably in the outer/high-magnitude ring — scaled arrow length
    (~1.06 units at max magnitude) exceeds the grid spacing (~0.43 units), so arrowheads
    and shafts touch/merge along the spiral. Reduce scale_factor or widen grid spacing
    so vectors stay visually separated, per the spec's 'sufficient to prevent overlap'
    note.
  - U_scaled/V_scaled normalizes by (magnitude + 0.01) and then re-multiplies by magnitude,
    which is algebraically ~equivalent to U * scale_factor for all but the near-zero
    points — unnecessary complexity; simplify to a direct scale_factor multiply.
  - np.random.seed(42) is set but never used — the data is fully deterministic via
    meshgrid with no random calls anywhere in the script; remove the dead seed line.
  - 'Library mastery is generic: geom_segment + arrow() is the standard lets-plot
    workaround for vector fields (no native quiver geom), which is idiomatic but not
    distinctive — consider leaning into lets-plot-specific interactive tooltip content
    in the HTML export to differentiate from the static PNG.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "quiver-basic · python · letsplot · anyplot.ai" in dark ink top-left, fully visible and not clipped. Axis titles "X Position (m)" / "Y Position (m)" in dark ink. Tick labels (-4..4 on both axes) in a softer gray-brown. Subtle horizontal/vertical gridlines. Legend "Magnitude" at right with a boxed, lightly-bordered elevated-background swatch and tick labels 0-4, all readable.
      Data: 15x15 grid of arrows over x,y in [-3,3] forming a counterclockwise circular/rotational flow pattern (u=-y, v=x). Arrows are colored on a continuous sequential scale from brand green (#009E73, near-zero magnitude at the center) to blue (#4467A3, highest magnitude at the outer ring) — first/only color anchor is the mandated brand green.
      Legibility verdict: PASS — all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, axis titles, tick labels, and legend now rendered in light ink / off-white and soft gray tones, all clearly legible against the dark background. No dark-on-dark failures observed — text does not blend into the background anywhere.
      Data: Arrow colors are identical to the light render (same green-to-blue sequential gradient) — confirms only chrome flipped between themes, not data colors. Grid lines remain subtle but visible.
      Legibility verdict: PASS — all text is clearly readable against the dark background, no dark-on-dark issues.
