  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT tokens applied correctly to
    all elements; both renders are readable with no dark-on-dark failures'
  - All font sizes explicitly set (title=24, axis=20, ticks=16, legend=14/18)
