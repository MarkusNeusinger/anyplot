review:
  strengths:
  - 'Correct Okabe-Ito palette (first series #009E73) with proper theme-adaptive style
    tokens for both light and dark renders'
  - Meaningful meteorological context (counterclockwise wind rotation around low-pressure
    centre) with descriptive axis labels including units
  - Font sizes explicitly set (title=28, labels=22, major_labels=18), producing readable
    text in both themes
  - Smart magnitude-binned coloring with descriptive wind speed labels (Calm, Light,
    Moderate, Fresh, Strong)
  - 'Perfect code quality: linear KISS structure, np.random.seed(42), clean imports,
    and correct plot-{THEME}.png + HTML output'
  weaknesses:
  - 'Core rendering problem: grouping arrows by magnitude bin and connecting them
    in pygal.XY creates sweeping connected band paths rather than discrete individual
    arrows at grid points — the plot does not look like a quiver plot'
  - 'SC-01 failure: the result looks like sweeping flow-line bands rather than arrows
    at discrete grid positions; the circular rotation pattern is not clearly communicated'
  - 'DE-01/DE-03 low: the visual confusion from connected paths undermines both aesthetic
    polish and data storytelling; a viewer cannot easily read the vector field'
  - 'LM-02: the implementation uses pygal generically as an XY line chart and does
    not exploit any pygal-distinctive feature beyond html-export'
  image_description: |-
