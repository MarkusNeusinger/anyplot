      Background: Warm off-white (#FAF8F1) — correct.
      Chrome: Title "quiver-basic · pygal · anyplot.ai" visible at top; X-axis "Longitude (degrees)" and Y-axis "Latitude (degrees)" readable; tick labels small but legible; legend at bottom with 5 colour squares labelled Calm/Light/Moderate/Fresh/Strong.
