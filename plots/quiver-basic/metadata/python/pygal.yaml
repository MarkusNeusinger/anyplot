review:
  strengths:
  - Clever use of allow_interruptions=True to construct real arrow glyphs (shaft +
    open-V head) inside a chart type (pygal.XY) that has no native quiver/vector support
  - Magnitude-encoded 3-bin legend (Calm / Light, Moderate, Fresh / Strong) adds real
    insight beyond a monochrome quiver, and reads correctly in both themes
  - Theme tokens (background, ink, muted ink) and the canonical Imprint palette order
    are threaded correctly through the Style object; both renders pass the theme-readability
    checklist with zero dark-on-dark or light-on-light issues
  - No edge clipping anywhere (checked all four margins on both renders) and no element
    overlap
  - Deterministic (np.random.seed(42) for both the coordinate grid and the arrow-shuffle
    order)
  weaknesses:
  - Title is missing the {language} segment - should read "quiver-basic · python ·
    pygal · anyplot.ai" per the mandated {spec-id} · {language} · {library} · anyplot.ai
    format, not "quiver-basic · pygal · anyplot.ai"
  - Grid is 8×8=64 arrows, below the spec's suggested "typically 10x10 to 20x20 (100-400
    arrows)" density - a denser grid (e.g. 12×12) would better showcase the field
    structure and give the Calm / Light bin near the center more visual presence
  - Design excellence is functional but generic beyond the magnitude-color binning
    - no additional visual hierarchy (e.g. a highlighted or annotated arrow calling
    out the strongest gust) to elevate it further
