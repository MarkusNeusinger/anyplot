review:
  strengths:
  - Correct quiver plot construction using pygal XY line segments with allow_interruptions,
    faithfully simulating arrow shafts and barbs
  - 'Excellent spec compliance: proper title format, descriptive axis labels with
    units (degrees), and magnitude-binned color-coding as an additional data layer'
  - 'Proper theme adaptation with correct #FAF8F1 / #1A1A17 backgrounds and Okabe-Ito
    palette (#009E73 first series)'
  - Wind field scenario (counterclockwise rotation u=-y, v=x) is realistic and the
    three-bin legend (Calm/Light, Moderate, Fresh/Strong) adds meteorological context
  weaknesses:
  - 'DE-01/DE-02: Aesthetic is a functional configured default — dot markers at every
    segment endpoint (dot_size=4) create visual noise on each arrow shaft and barb;
    these should be suppressed (show_dots=False or dot_size=0) so only the clean arrow
    lines are visible'
  - 'VQ-03: Center arrows near the origin (very low magnitude) are extremely tiny
    and barely distinguishable; consider a minimum arrow scale or slightly increase
    arrow_scale to keep the smallest arrows legible'
  - 'DE-02: Both x and y grid guides are enabled creating a full grid; for a vector
    field a subtler approach (y-only guides or no guides) would reduce visual clutter
    and let the arrows stand out'
  - 'VQ-01: Font sizes follow the 28/22/18/16 px guidelines but render small at 4800x2700
    on the full canvas — consider bumping title to 36-40 and labels to 28 for better
    legibility at full resolution'
