review:
  strengths:
  - Hand-built arrow geometry (shaft + triangular head) correctly compensates for
    bokeh's lack of a native quiver glyph, including a minimum-display-length floor
    for near-zero vectors at the vortex centre
  - Double encoding of magnitude via both arrow length and color adds information
    density without clutter
  - Theme-adaptive chrome correctly threaded through title, subtitle, axis labels,
    ticks, grid, colorbar, and annotations — no dark-on-dark or light-on-light failures
    in either render
  - Canvas measured at exactly 3200x1800 with toolbar_location=None and generous min_border_*
    reservations — no clipping anywhere
  weaknesses:
  - Title is missing the required {language} segment — should read 'quiver-basic ·
    python · bokeh · anyplot.ai' per the SC-04 title format
  - Composition is competent but fairly literal (uniform grid + colorbar); consider
    a stronger focal point or emphasis technique to lift Design Excellence
  - '''2.8 km/h'' as the max wind speed reads as unrealistically calm for a field
    explicitly labeled ''Wind Speed'' — either scale the magnitude to a more typical
    wind range or reframe the label/units'
