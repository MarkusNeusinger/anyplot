  strengths:
  - Complete theme-adaptive chrome with no dark-on-dark failures in either render
  - Custom arrowhead geometry using Bokeh patches glyph — well-crafted workaround
    for Bokeh lacking native quiver
  - Viridis magnitude colour encoding adds correct second data dimension (direction
    + magnitude)
  - Perfect spec compliance including optional colour encoding feature
  - Fully deterministic data with canonical rotation field u=-y v=x
  weaknesses:
