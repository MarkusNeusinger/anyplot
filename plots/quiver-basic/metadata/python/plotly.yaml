      Chrome: Title and axis labels in light/white text — clearly readable against dark background. Tick labels in light gray. No dark-on-dark failures observed. Colorbar text is light and readable.
      Data: Identical Viridis-colored magnitude dots to light render (data colors unchanged — correct). Steel-blue arrows slightly brighter on dark background. Same circular rotation pattern visible.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures. However, the code does not implement theme adaptation, so this render quality is pipeline-dependent, not from the implementation itself.
