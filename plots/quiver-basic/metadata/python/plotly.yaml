review:
  strengths:
  - 'Correct plot type: ff.create_quiver renders a true quiver field with direction
    correctly derived from u=-y, v=x (counterclockwise rotation), matching the described
    cyclonic vortex.'
  - 'Theme handling is fully correct in both renders: PAGE_BG, INK, INK_SOFT, and
    GRID all branch on ANYPLOT_THEME and match the required #FAF8F1/#1A1A17 hex values
    with no dark-on-dark or light-on-light failures.'
  - 'Imprint palette compliance: arrows use brand green #009E73, and the magnitude
    overlay correctly uses the sequential imprint_seq colormap (green -> blue) since
    wind speed is single-polarity data, not the diverging scale.'
  - 'Smart redundant encoding: layering a go.Scatter trace colored by magnitude on
    top of the quiver arrows adds a colorbar-driven magnitude read that a plain create_quiver
    call couldn''t provide on its own.'
  - All font sizes are explicitly set (title, axis titles, tick labels, colorbar title/ticks)
    and scale the title fontsize by length via a documented ratio formula, avoiding
    overflow with the long mandated title.
  - 'Clean, KISS-structured code: single top-to-bottom script, no functions/classes,
    deterministic data generation, only necessary imports (numpy, plotly.figure_factory,
    plotly.graph_objects, os).'
  weaknesses:
  - 'Spec violation: the spec explicitly requires arrow ''length proportional to its
    magnitude,'' but the implementation normalizes every vector to the exact same
    length (u_norm = u/magnitude*scale_factor with a fixed scale_factor=0.2). Every
    arrow in both renders is visually the same length regardless of true wind speed,
    so the primary quiver-plot encoding channel (length) carries no information --
    only direction and the separate scatter-marker color show magnitude. Repair should
    scale arrow length by relative magnitude (e.g. u_norm = u * scale_factor / max_magnitude)
    so the radial gradient in speed is visible in the arrows themselves, while still
    keeping near-center arrows visible.'
  - 'DQ-03: the wind-speed values are physically very low for a ''cyclonic wind vortex''
    -- magnitude ranges only 0-2.83 m/s (light-air/light-breeze range on the Beaufort
    scale), not the tens of m/s associated with real cyclonic wind systems. Either
    scale the underlying u/v field (or add a physically-motivated multiplier before
    computing magnitude) so speeds fall in a plausible cyclone range (roughly 5-30
    m/s), or soften the ''cyclonic'' framing in the title/description to match a gentle
    eddy.'
  - 'DE-01/DE-02: styling is solid but still close to a well-configured default --
    the 225-arrow field plus scatter dots is a little visually busy at this density;
    consider a lighter marker size or slightly more transparent arrows so the vortex
    structure reads more clearly as a focal point rather than a uniform grid.'
  - 'VQ-05: the right margin (r=100) reserved for the colorbar makes the plot area
    sit slightly left-of-center within the square canvas; tightening the colorbar
    thickness/margin would rebalance whitespace.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 -- not pure white.
      Chrome: Title "Cyclonic Wind Vortex · quiver-basic · python · plotly · anyplot.ai" is dark ink, centered, fully visible, no clipping or overflow past the canvas. X-axis title "X Position (km)" and Y-axis title "Y Position (km)" are dark ink and readable. Tick labels (-2, -1, 0, 1, 2 on both axes) are a softer dark gray, clearly legible. Colorbar title "Wind Speed (m/s)" and its tick labels (0, 0.5, 1, 1.5, 2, 2.5) are dark ink / soft gray respectively, both readable. Gridlines are faint, subtle, do not compete with data. A darker zero-line marks the x=0 and y=0 axes, which reads as a deliberate reference to the vortex core.
      Data: A 15x15 grid of arrows forms a circular/rotational flow pattern consistent with u=-y, v=x (counterclockwise vortex). All arrows are brand green (#009E73) and rendered at a uniform length -- length does NOT vary with true vector magnitude (see weaknesses). Underlying scatter markers at each arrow base are colored via a green-to-blue sequential gradient (imprint_seq) keyed to wind speed magnitude, growing bluer toward the grid's outer edge and staying green near the calm center.
      Legibility verdict: PASS -- every text element is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 -- not pure black.
      Chrome: Title, axis titles, and colorbar title switch to light ink (#F0EFE8) and are clearly visible. Tick labels and colorbar ticks switch to the lighter soft-gray token (#B8B7B0) and remain legible. Gridlines and the zero-line are visible but subtle against the dark surface. No dark-on-dark text anywhere.
      Data: Arrow color (#009E73) and the scatter marker green-to-blue gradient are pixel-identical to the light render -- only the chrome (background, text, grid) flipped, confirming palette consistency across themes.
      Legibility verdict: PASS -- all text is clearly readable against the dark background; no dark-on-dark failures detected.
