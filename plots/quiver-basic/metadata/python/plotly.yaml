review:
  strengths:
  - 'Both previously-flagged blockers are now genuinely fixed and visible in the fresh
    renders: arrow length grows radially from the calm vortex centre outward (length_frac
    formula), and peak wind speed now reaches ~28.3 m/s (WIND_SPEED_SCALE=10.0), a
    plausible severe-storm range instead of a light breeze.'
  - Direction correctly derived from u=-y, v=x, producing a clean counterclockwise
    cyclonic rotation that matches the spec's example field.
  - 'Smart redundant encoding: a go.Scatter layer colored by true wind-speed magnitude
    (imprint_seq colorscale + colorbar) sits on top of ff.create_quiver, giving a
    second, more precise magnitude read that plain create_quiver can''t provide on
    its own.'
  - 'Theme handling is fully correct in both renders: PAGE_BG/INK/INK_SOFT/GRID all
    branch on ANYPLOT_THEME and match the required #FAF8F1/#1A1A17 hex values with
    no dark-on-dark or light-on-light failures.'
  - 'Imprint palette compliance: arrows use brand green #009E73, and the single-polarity
    magnitude field correctly uses imprint_seq rather than a diverging or forbidden
    colormap.'
  - All font sizes explicitly set (title, axis titles, tick labels, colorbar title/ticks),
    with the title fontsize dynamically scaled by a documented length ratio so the
    long mandated title never clips.
  - Clean, KISS-structured, deterministic script with only the imports actually used.
  weaknesses:
  - np.random.seed(42) is set but never used - all data (grid, u, v) is generated
    deterministically via np.linspace/meshgrid with no calls into np.random. This
    is harmless dead code but misleadingly implies a stochastic data-generation step
    that doesn't exist; remove the seed line or use it if randomness is ever added.
  - 'Design Excellence is solid but not exceptional: the 169-arrow grid plus overlaid
    scatter dots is still fairly close to a well-composed default rather than a distinctively
    art-directed chart. Consider a slightly more restrained marker opacity/size or
    thinner arrow lines near the dense outer rings to let the vortex structure read
    even more cleanly as a focal point.'
  - The colorbar's reserved right-hand margin makes the square plot area sit marginally
    left-of-center; tightening the colorbar thickness/length slightly further would
    perfect the whitespace balance (currently good, not perfect).
  - Outer-ring arrowheads sit close to their neighbors given the grid spacing versus
    max arrow length (~0.32 vs ~0.33 spacing) - not true overlap, but there is little
    breathing room; a slightly lower scale_factor would give more visual air without
    losing the magnitude signal.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 - not pure white, not dark.
      Chrome: Title "Cyclonic Wind Vortex · quiver-basic · python · plotly · anyplot.ai" in dark ink, clearly readable and centered. Axis titles "X Position (km)" / "Y Position (km)" and tick labels are dark/soft-dark ink, all legible. Grid lines are a subtle light gray, visible but not dominant. Colorbar title "Wind Speed (m/s)" and its tick labels (0-25+) are dark ink, fully readable.
      Data: A 13x13 grid of brand-green (#009E73) arrows forms a counterclockwise rotational flow pattern (u=-y, v=x). Arrow length clearly grows from short near the calm vortex centre to long at the outer edge, proportional to true wind-speed magnitude. Scatter markers at each arrow base use the green-to-blue imprint_seq sequential gradient keyed to the same magnitude (0 to ~28.3 m/s), growing bluer toward the edges - first-series green confirmed.
      Legibility verdict: PASS - all text is readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 - not pure black, not light.
      Chrome: Title, axis titles, tick labels, and colorbar title/ticks all switch to light ink / soft light-gray tokens and remain clearly legible. Grid lines flip to a subtle light-on-dark tone, still subtle but visible.
      Data: Arrow color (#009E73) and the green-to-blue scatter gradient are pixel-identical to the light render - only chrome flipped, as required. Same radially-growing arrow length and same 0-28.3 m/s colorbar range as the light render.
      Legibility verdict: PASS - all text is readable against the dark background; no dark-on-dark failures (no black-on-near-black text anywhere).
