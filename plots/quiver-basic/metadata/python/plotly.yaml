  strengths:
  - Uses ff.create_quiver — the correct idiomatic Plotly API for quiver plots, with
    excellent library mastery
  - Magnitude coloring with Viridis on the dot layer creates effective visual storytelling
    about radial flow speed
  - Equal aspect ratio (scaleanchor='x') preserves circular geometry — a thoughtful
    detail
  - All font sizes explicitly set throughout (title 32px, labels 24px, ticks 18px,
    colorbar) giving full VQ-01 score
  - 'Excellent data quality: realistic circular flow field with appropriate 15x15
    grid density, neutral scientific context'
  - Hover tooltips and HTML export leverage Plotly's distinctive interactive features
  weaknesses:
  - 'Arrow color #306998 (Python Blue) is hardcoded — explicitly non-compliant per
    VQ-07; must change to Okabe-Ito #009E73 or INK_SOFT token'
  - No ANYPLOT_THEME environment variable handling — code always uses template='plotly_white'
    regardless of theme, producing wrong background and chrome for dark mode
  - Output files named plot.png/plot.html instead of plot-{THEME}.png/plot-{THEME}.html
    as required by CQ-05
  - 'Background is pure white from plotly_white template instead of warm off-white
    #FAF8F1 (light) / #1A1A17 (dark)'
  - All chrome colors (text, grid, zeroline) hardcoded for light theme only — gridcolor
    rgba(0,0,0,0.1) and zerolinecolor rgba(0,0,0,0.3) are invisible or wrong in dark
    mode
