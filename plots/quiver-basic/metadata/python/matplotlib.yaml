      Data: 17x17 grid (289 arrows) of a Rankine vortex flow field. Arrows near the domain edges/corners are teal (~#009E73, low speed) and point outward/circularly; arrows nearer the center transition to blue (~#4467A3, high speed) tracing a clear rotational spiral. A black reference arrow + "1.2 m/s" label (quiverkey) sits in open space in the upper-right region, not overlapping any grid arrows.
      Legibility verdict: PASS — all text is clearly dark-on-light with no light-on-light instances.

