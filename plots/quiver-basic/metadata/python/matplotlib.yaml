review:
  strengths:
  - Idiomatic ax.quiver() with the Axes API, color array (speed) mapped through the
    Imprint imprint_seq colormap for a real continuous encoding of magnitude
  - quiverkey() reference arrow anchors the eye to an exact speed (1.2 m/s) — a genuinely
    distinctive matplotlib feature that adds quantitative grounding beyond what color/length
    alone convey
  - 'Physically grounded data: a Rankine combined vortex (solid-body core + 1/r decay)
    avoids the common quiver-plot pitfall of a naive u=-y, v=x field vanishing to
    zero exactly at the origin, keeping arrows visible near the eddy center'
  - Correct square 2400x2400 canvas for a symmetric field plot, aspect='equal' preserved,
    no clipping or overlap anywhere across either render
  - 'Theme-adaptive chrome fully threaded through: title, axis labels, ticks, spines,
    grid, quiverkey label, and colorbar all resolve from INK/INK_SOFT/PAGE_BG tokens
    and are correctly readable in both light and dark'
  - Clean save pattern (no bbox_inches='tight'), deterministic (no RNG needed), flat
    KISS script with only used imports
  weaknesses:
  - Outer-ring arrows (far from the vortex core, lowest speed) shrink noticeably and
    read as small teal flecks — consider a modest minimum shaft-length floor so low-magnitude
    vectors stay legible at thumbnail scale, without breaking length-proportionality
    near the core.
  - Title and tick-label fonts are correctly sized for the full 2400px canvas but
    will read small once scaled to a ~400px catalog thumbnail — consider nudging title_fontsize's
    baseline up slightly for better mobile legibility.
  - Design treatment is polished but conventional for the category (custom colormap
    + colorbar + reference arrow); no additional visual emphasis (e.g. a subtle core-radius
    guide or annotation) draws the eye specifically to the vortex core beyond the
    color gradient itself.
  - Only one distinctive matplotlib-specific feature (quiverkey) is used; scope of
    a 'basic' quiver spec limits further differentiation, but e.g. barbs/streamplot
    comparison would have pushed Library Mastery further.
