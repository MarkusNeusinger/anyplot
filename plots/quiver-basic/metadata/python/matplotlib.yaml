      Data: Viridis colormap colors are identical to the light render — data colors unchanged, only chrome flips. HIGH CONCERN: the innermost arrows (very low magnitude, deep purple viridis near 0.0) are very difficult to distinguish from the #1A1A17 background. Direction of innermost vectors is unclear in the dark theme.
