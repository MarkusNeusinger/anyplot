  strengths:
  - Correct quiver/vector field using ax.quiver with full Axes API
  - viridis colormap elegantly encodes magnitude — the right choice for continuous
    data
  - All text sizes explicitly set (title 24pt, labels 20pt, ticks 16pt, colorbar label
    20pt)
  - 'Fully theme-adaptive chrome: backgrounds, spines, grid, colorbar outline, tick/label
    colors all respond to ANYPLOT_THEME'
  - set_aspect(equal) applied correctly — essential for a proper vector field display
  - Arrow geometry explicitly tuned (scale, width, headwidth, headlength, headaxislength)
  - 15×15 grid (225 arrows) falls squarely within the spec’s recommended 100–400 range
  - Perfect spec compliance — title format, data mapping, and all required features
    present
  weaknesses:
  - 'Dark render: innermost arrows (deep viridis purple near 0.0 magnitude) are barely
    distinguishable against the #1A1A17 near-black background — consider a minimum
    arrow visibility boost or using cividis which has lighter low-end colors'
  - 'Design Excellence is limited: the plot is a well-configured default with no distinctive
    design personality (DE-01=4/8). To push above 90, add intentional hierarchy —
    e.g., a subtitle noting the rotational symmetry, or a reference circle overlay
    at r=1'
  - 'No data storytelling (DE-03): color encoding reveals magnitude but the viewer
    is not guided to any insight. An annotation marking the center vortex or concentric
    magnitude rings would raise DE-03'
  - Landscape 16:9 canvas with set_aspect(equal) creates wasted horizontal space on
    both sides of the square quiver field; a 3600×3600 square canvas would be more
    appropriate for this symmetric plot
  - plt.colorbar() is used instead of fig.colorbar() — minor stylistic issue (LM-01);
    both work but fig.colorbar is more idiomatic
  image_description: |-
