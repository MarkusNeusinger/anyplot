      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "quiver-basic · matplotlib · anyplot.ai" in dark #1A1A17 ink at top, clearly readable. Axis labels "X Position" and "Y Position" in dark ink at fontsize=20, legible. Tick labels in secondary #4A4A44 at fontsize=16, clearly visible. Colorbar label "Vector Magnitude" in dark ink, tick labels in secondary ink — all readable.
      Data: 15×15 grid of quiver arrows showing circular rotation pattern (u=−y, v=x). Viridis colormap encodes magnitude: deep purple/indigo at center (low magnitude near 0) transitioning through green to bright yellow at corners (magnitude ~4.2). Arrows clearly directional and well-spaced. Top and right spines removed; subtle gray grid (alpha=0.12) visible.
