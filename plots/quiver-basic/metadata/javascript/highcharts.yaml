review:
  strengths:
  - Correctly uses imprint_seq (brand green -> blue) as a continuous colormap for
    vector magnitude, identical between light and dark renders
  - 'Creative, well-justified workaround for Highcharts'' lack of a native quiver/vector-field
    series: custom SVG arrows drawn via chart.renderer + axis.toPixels() inside chart.events.render,
    clearly commented'
  - Arrow lengths are scaled (ARROW_SCALE) so the longest vector spans ~90% of grid
    spacing, preventing overlap regardless of field strength
  - 'Theme-adaptive chrome is fully correct: title/axis/tick/grid all pull from window.ANYPLOT_TOKENS,
    both renders are legible'
  - Deterministic spiral flow field (12x12 = 144 arrows) clearly shows both rotational
    direction and magnitude growth toward the edges
  weaknesses:
  - Axis titles are the literal single letters 'x' and 'y' — scored as generic per
    VQ-06; consider a slightly more descriptive label such as 'Grid X' / 'Grid Y'
    even though this is an abstract coordinate space
  - 'xAxis and yAxis are given identical explicit min/max in code, but Highcharts''
    default startOnTick/endOnTick auto-extends each axis independently based on its
    pixel length, so the rendered y-axis reaches 8 while x only reaches 7 — this leaves
    mildly unbalanced whitespace above/below vs. left/right of the arrow field inside
    the square canvas. Set startOnTick: false, endOnTick: false (or a matching explicit
    tickInterval) on both axes so the rendered ranges stay symmetric'
  - The data scenario is a generic mathematical spiral/rotation field rather than
    a named real-world phenomenon (e.g. wind, ocean current, gradient descent) — acceptable
    since the spec itself suggests a simple mathematical function, but it scores lower
    on Realistic Context than a labeled physical scenario would
  - No colorbar/scale legend quantifies the magnitude-to-color mapping — the subtitle
    states color encodes magnitude, but a viewer can only compare arrows relatively,
    not read off actual values
  - The custom chart.renderer overlay technique, while idiomatic to Highcharts, doesn't
    showcase a feature that's hard to replicate in other SVG-based chart libraries
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Bold dark title "quiver-basic · javascript · highcharts · anyplot.ai" centered at top, clearly readable. Secondary-weight subtitle "Spiral flow field · arrow color encodes vector magnitude" below it, also readable. Axis titles "x" and "y" (dark grey) and tick labels (-7..7 on x, -8..8 on y) are all legible against the light background. Faint horizontal gridlines are visible but subtle; no vertical gridlines.
      Data: 144 arrows (12x12 grid) arranged in a spiral/rotational pattern. Arrows near the center are short and colored brand green (#009E73-ish); arrows further from the center grow longer and shift toward blue (#4467A3-ish), correctly encoding magnitude via the imprint_seq gradient. Arrowheads are crisp and directions clearly show a rotating flow.
      Legibility verdict: PASS — all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Title and subtitle render in light ink (near-white / soft light grey respectively), fully readable against the dark background. Axis titles, tick labels, and gridlines all use light/soft tones and remain legible; no dark-on-dark text was found anywhere (title, axis titles, tick labels all checked).
      Data: The arrow field is pixel-identical in color to the light render — same green-to-blue magnitude gradient, same spiral pattern, same arrow positions/lengths. Only the chrome (background, text, gridlines) flipped as expected.
      Legibility verdict: PASS — all text and data elements are clearly readable against the dark background; no dark-on-dark failures observed.
