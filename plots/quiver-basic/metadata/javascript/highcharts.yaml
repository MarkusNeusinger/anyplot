review:
  strengths:
  - Registers a custom Highcharts SVGRenderer symbol (`quiverArrowhead`) and rotates
    it per-vector via `rotation`/`rotationOriginX/Y` — a genuinely idiomatic, library-distinctive
    technique for oriented markers, not a generic hand-drawn path
  - Magnitude-to-color continuous encoding correctly uses `imprint_seq` (brand green
    -> blue via `t.seq[0]`/`t.seq[1]`), interpolated per-vector and identical across
    light/dark renders
  - Arrow length is auto-scaled so the longest vector spans ~90% of grid spacing (`ARROW_SCALE`),
    guaranteeing no overlap between neighboring arrows regardless of field strength
  - 'Deterministic vortex/eddy formula (u = -y + 0.2x, v = x + 0.2y) gives full feature
    coverage: circular rotation plus outward drift, near-zero magnitude at the core
    rising to a clear maximum at the edges'
  - Hand-drawn magnitude colorbar (segmented rect gradient + min/max labels + '‖v‖'
    title) is cleanly integrated into the reserved right margin with theme-adaptive
    ink colors
  weaknesses:
  - X-axis has no vertical gridlines while the Y-axis shows horizontal ones (gridLineColor
    set on both axes but only yAxis gridlines are visible in the render) — add matching
    xAxis grid rendering for a balanced, symmetric grid on this scatter-like plot
  - Axis titles 'Grid X' / 'Grid Y' are fairly generic — consider a slightly more
    descriptive label (e.g. referencing spatial position) even though the idealized
    field has no physical units to attach
  - The magnitude colorbar only labels the two endpoints (0 and 8.7) — one or two
    intermediate tick values would make the color-to-magnitude mapping easier to read
    at a glance
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "quiver-basic · javascript · highcharts · anyplot.ai" at top, gray subtitle below it describing the vortex/eddy field and magnitude encoding. "Grid X" / "Grid Y" axis titles and -7..7 tick labels in muted dark gray, all crisp against the light background. Subtle horizontal gridlines from the Y-axis. Magnitude colorbar on the right labeled "‖v‖" with "8.7" (max) and "0" (min) in soft dark gray text.
      Data: 144 arrows (12x12 grid) forming a clear circular vortex with outward drift — arrows point counter-clockwise, near-invisible at the core (magnitude ~0) and largest/fastest at the outer ring. Color runs from teal-green (#009E73-ish, low magnitude) to blue (#4467A3-ish, high magnitude), matching imprint_seq. Custom triangular arrowheads are rotated to match each vector's angle. No arrow overlaps any neighbor.
      Legibility verdict: PASS — all text (title, subtitle, axis labels, tick labels, colorbar labels) is clearly readable against the light background; no light-on-light text found.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title/subtitle now rendered in near-white and light-gray respectively, fully legible. Axis titles and tick labels rendered in a light gray that reads clearly against the dark surface. Gridlines remain subtle and visible. Colorbar labels ("‖v‖", "8.7", "0") are light-colored and legible.
      Data: Identical vortex/eddy pattern and identical arrow colors (teal-green to blue) as the light render — only the chrome (background, text, grid) flipped, confirming data-color consistency across themes.
      Legibility verdict: PASS — no dark-on-dark failures; all title/axis/tick/colorbar text is clearly visible against the near-black background.
