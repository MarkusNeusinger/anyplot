review:
  strengths:
  - 'Solved a real Chart.js limitation cleanly: no native quiver/vector chart type
    exists, so the implementation extends a scatter base with a custom afterDatasetsDraw
    plugin that draws arrow shafts and heads by hand via scale.getPixelForValue —
    exactly the pattern the library rules doc recommends for this case, with no forbidden
    fallback to another library or unpinned plugin'
  - Color meaningfully encodes vector magnitude (current speed) using the Imprint
    imprint_seq scale (t.seq[0] -> t.seq[1]), turning the plot into a legible flow-strength
    map rather than a flat set of same-colored arrows
  - 'Both renders are theme-correct: warm off-white (#FAF8F1) / warm near-black (#1A1A17)
    backgrounds, all title/subtitle/axis/tick text readable and correctly mapped from
    tokens (t.ink, t.inkSoft, t.grid), and the data colors are identical across light
    and dark'
  - Axis limits are deliberately padded beyond the data range (-9..9 vs data -7..7)
    so the longest arrows and their heads never approach the canvas edge, avoiding
    any AR-09 clipping risk
  - Data is a realistic, neutral scenario (circular ocean-current rotation field,
    u=-y, v=x) with correct units (km, km/h) and physically sensible values
  - Deterministic, dependency-free data generation (no RNG) with a tight, readable
    single-file structure and correct animation:false / mount-node handling per the
    JS harness contract
  weaknesses:
  - Vectors near the vortex center (x=0,y=0 and its immediate neighbors) have near-zero
    magnitude, so their arrows shrink to almost nothing and read as plain dots rather
    than vectors -- visually correct but slightly undercuts at-a-glance readability
    of the field structure right where curvature is highest; consider a small minimum
    visual arrow length (decoupled from the color/magnitude encoding) so direction
    stays legible even at low speed
  - The subtitle states color encodes current speed in km/h but there is no colorbar
    or legend tick mapping color to an actual km/h value, so a viewer can see relative
    speed but not read off absolute magnitude -- a compact colorbar or small min/max
    legend would elevate this from good to publication-level
  - Helper functions (hexToRgb, lerpColor) and the plugin object push the file slightly
    past a strict imports->data->plot->save shape; justified here since Chart.js plugins
    are inherently object-with-methods and there is no native arrow primitive to call
    instead, but worth flagging for CQ-01 KISS scoring
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 -- not pure white, not dark.
      Chrome: Title "quiver-basic · javascript · chartjs · anyplot.ai" in bold dark ink at top center; subtitle "Ocean current rotation field — arrow color encodes current speed (km/h)" in softer dark gray beneath it. X-axis title "Eastward distance (km)" and Y-axis title "Northward distance (km)" in dark ink. Tick labels (-9..9 on X, -5..5 on Y) in a slightly lighter ink. Grid lines are thin and pale gray, subtle but visible. All text is clearly legible against the light background -- no light-on-light issues found.
      Data: A 9x15 grid of small dots with arrows radiating from each, forming a clear rotational (vortex) flow pattern around the origin. Arrow color runs from teal-green near the center (low magnitude) to a blue-gray near the edges (high magnitude), consistent with the Imprint imprint_seq scale. Arrows near the very center are extremely short (near-zero velocity), arrows at the corners are longest.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 -- not pure black, not light.
      Chrome: Same title and subtitle, now rendered in white/light gray, clearly readable against the dark background. Axis titles and tick labels are also light-colored and legible. Grid lines are faint but visible dark-gray-on-black.
      Data: Same rotational vortex arrow field. Arrow colors are visually identical to the light render (teal-green near center transitioning to blue-gray at the edges) -- confirms only chrome (background/text/grid) flipped between themes, not data colors.
      Legibility verdict: PASS -- no dark-on-dark failures found; all text remains clearly visible against the near-black surface, and the brand green/teal data color reads well on both surfaces.
