review:
  strengths:
  - Physically accurate Rankine vortex model (solid-body core, inverse-decay outer
    band) with correct counterclockwise rotation for a Northern-Hemisphere low-pressure
    system — a genuinely thoughtful data-generation choice
  - Creative, idiomatic use of MUI X's low-level ChartContainer plus useXScale/useYScale/useDrawingArea
    hooks to render a genuine quiver overlay entirely within the library's coordinate
    system, axes, and scales — the correct sanctioned escape hatch since the community
    package has no native vector-field mark
  - Continuous wind-speed magnitude correctly encoded with imprint_seq (brand green
    to blue), matching the single-polarity nature of the data, with a matching custom
    colorbar legend
  - 'Both renders are fully theme-correct: warm off-white / near-black backgrounds,
    theme-adaptive ink tokens for title/axis/colorbar text, identical data colors
    across themes'
  - No edge clipping — title, axis labels, and the colorbar + rotated axis label all
    sit comfortably inside the 2400x2400 canvas with generous margin
  - Correct mandated title format, explicit font sizing throughout, balanced 15x15
    grid with uniform arrow spacing and no overlap
  weaknesses:
  - No explicit visual callout (annotation or emphasis) marks the calm eye / peak-wind
    band — the story is legible from color and arrow length alone but a labeled annotation
    would push Data Storytelling from good to excellent
  - Colorbar and title are custom-drawn text elements (ChartTitle, Colorbar components)
    rather than using ChartContainer's built-in title/legend slots, which is a reasonable
    but slightly less 'library-default' pattern
  - No grid lines at all (fully removed rather than kept subtle) — a valid stylistic
    choice per the style guide but slightly reduces precise value-reading against
    the axes
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "Cyclonic Wind Field · quiver-basic · javascript · muix · anyplot.ai" centered at top, comfortably within the canvas (~55% width, no clipping). X/Y axis labels "X Position (km)" / "Y Position (km)" with units, dark ink, clearly legible. Tick labels from -7 to 7 on both axes, evenly spaced, dark and readable against the light background. A vertical colorbar sits to the right of the plot with "22" at top, "0" at bottom, and a rotated "Wind Speed (m/s)" label — all fully inside the canvas with clear margin to the right edge.
      Data: 225 arrows (15x15 grid) arranged in a circular flow pattern. Arrows near the center are short and pale green (near-zero speed, the calm "eye"), transitioning to longer, blue arrows at the core radius band (peak speed), then shrinking again toward the domain edge as speed decays outward — a continuous green-to-blue gradient (imprint_seq) encodes magnitude. Rotation is counterclockwise, consistent with a Northern-Hemisphere cyclone.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, now rendered in light/off-white ink, fully legible against the dark background. Axis labels and tick labels are light-colored and clearly readable — no dark-on-dark text anywhere. Colorbar labels ("22", "0", "Wind Speed (m/s)") are light-colored and legible, same position and margins as the light render, no clipping.
      Data: Identical arrow layout, lengths, and green-to-blue color gradient as the light render — confirmed the data colors do not change between themes, only the chrome (background, text) flips as expected.
      Legibility verdict: PASS
