review:
  strengths:
  - 'Creative, realistic framing: arrows show the negative-gradient (steepest-descent)
    direction over a toy 2-parameter loss bowl, with a visible dot marking the exact
    minimum where the gradient vanishes — far more compelling than a generic circular-rotation
    demo field.'
  - Correctly builds a genuine ECharts custom series (renderItem with api.coord/api.visual)
    since ECharts has no native quiver/vector-field type — idiomatic use of the library's
    most advanced rendering API rather than faking arrows with markLine/markPoint
    hacks.
  - Continuous magnitude encoding uses the Imprint imprint_seq colormap (green→blue)
    via visualMap, correctly matching the theme-adaptive chrome (identical data colors,
    only chrome flips between plot-light.png and plot-dark.png).
  - Deterministic, seed-free data generation (closed-form loop over a fixed grid)
    with no imports beyond the echarts global — clean, reproducible, KISS-compliant
    code.
  - Arrow scaling adapts per-vector (shaft + proportionally-capped arrowhead, headLength
    = min(11, length*0.4)) so both short near-minimum vectors and long boundary vectors
    stay legible without clutter.
  weaknesses:
  - Arrows in the low-magnitude band around the minimum (roughly w1∈[0,6], w2∈[-1,3])
    shrink to near-invisible slivers — the vector field's local structure is hard
    to read there. Consider a minimum visual-length floor (e.g. sqrt or log compression
    of magnitude-to-length) so direction stays legible even where the true gradient
    is small.
  - The forced axis padding (xAxis min=-4/max=10 vs data range -3..9, yAxis min=-6/max=6
    vs data range -5..5) makes ECharts auto-place boundary ticks/splitLines at the
    exact min/max in addition to the 'nice' interval ticks, producing uneven tick
    spacing (e.g. x-axis shows -4, -3, 0, 3, 6, 9, 10 — a 1-unit gap at each end but
    3-unit gaps in the middle). Tighten min/max to align with the interval grid (e.g.
    -3/9 or -6/12) for even spacing.
  - splitLine at the axis extents combined with the default axisLine renders a full
    4-sided box around the plot area rather than the style guide's default L-shaped
    (bottom+left only) frame — a minor deviation from the minimal-chrome aesthetic
    guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches the light theme spec — not pure white.
      Chrome: Title "quiver-basic · javascript · echarts · anyplot.ai" in dark ink, centered, clearly readable. Axis titles "Weight w1" / "Weight w2" in dark ink. Tick labels in softer grey-ink, all legible. Grid lines are thin and light-grey, subtle but visible; forms a full box around the plot area rather than an L-shaped frame. A vertical continuous color legend on the right reads "Steep" (top) / "Flat" (bottom).
      Data: A 13x11 grid of arrows spans w1 ∈ [-3,9], w2 ∈ [-5,5], all pointing toward a single convergence point at (3,1) where a small solid dot (brand green #009E73) marks the exact minimum. Arrow color runs from green (flat/near-zero gradient) near the center to blue (steep gradient) toward the corners/edges, using the Imprint imprint_seq sequential colormap. Arrows are longest and boldest at the plot boundary, shrinking smoothly toward the center; a band of arrows immediately around the minimum is quite faint/short.
      Legibility verdict: PASS — all text (title, axis titles, tick labels, legend text) is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches the dark theme spec — not pure black.
      Chrome: Same layout as the light render. Title and axis titles render in light ink (near-white), tick labels in a lighter soft-grey, all clearly legible against the dark background. Grid lines are faint light-grey at ~15% opacity, visible but unobtrusive. Legend text "Steep"/"Flat" renders in light grey, readable.
      Data: Identical arrow positions, directions, and magnitudes to the light render. Data colors are pixel-identical (same green→blue imprint_seq gradient, same brand-green dot at the minimum) — only the chrome (background, text, grid) flipped to the dark palette, exactly as required.
      Legibility verdict: PASS — no dark-on-dark failures; every text element (title, axis titles, tick labels, legend) reads clearly against the near-black background.
