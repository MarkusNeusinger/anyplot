review:
  strengths:
  - Physically motivated rotating-eddy vortex (u = -y·decay, v = x·decay with Gaussian
    decay from the core) reads clearly as counterclockwise rotation with speed peaking
    mid-radius and decaying toward both the core and the far field
  - 'Attempt-1 weaknesses fully addressed: near-core arrows now get a minimum shaft
    length (minShaftLen) so low-magnitude vectors stay legible, a dashed radial guide
    circle marks the eddy core''s decay radius for storytelling, and axis domain lines
    were lightened (stroke-width 0.75, opacity 0.5) for visual refinement'
  - Arrow color correctly encodes current magnitude with the Imprint sequential palette
    (imprint_seq, green→blue), identical between light and dark renders; legend gradient
    stops exactly match the interpolateRgbBasis scale used on the data
  - Square orientation correctly forced via equal x/y pixel scale (side = min(availW,
    availH)) so vector angles render undistorted
  - 225-arrow 15x15 grid with no overlap or crowding at any density level, confirmed
    on close inspection of the eddy core, canvas edges, and corners
  - Clean, deterministic, KISS-structured code with no fake interactivity, correct
    mount-node contract, and no animation
  weaknesses:
  - Magnitude is non-monotonic with radius (peaks around r≈1.73km, decays both toward
    the core and toward the domain edge), so the outer ring reads as 'weak' the same
    way the core does — a subtle nuance a casual viewer could misread without extra
    context; not a required fix but a nice-to-have for a future pass
  - Title occupies roughly 40-45% of the square canvas width — legible and unclipped,
    but there is headroom to grow it slightly for a stronger visual anchor if revisited
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Bold dark-ink title "quiver-basic · javascript · d3 · anyplot.ai" centered at top. Dark axis labels "Distance east of eddy core (km)" / "Distance north of eddy core (km)" with legible tick labels -3..3 on both axes. Subtle light-gray reference grid at each integer tick. A dashed light-gray circle marks the eddy core's characteristic decay radius. All chrome text confirmed fully readable against the light background, no clipping at any edge (verified via close crops of top, bottom, left, and center regions).
      Data: 15x15 grid (225 points) of arrows forming a clear counterclockwise vortex pattern around the origin. Arrows are colored from Imprint brand green (#009E73, low magnitude, near core and far field) to Imprint blue (#4467A3, higher magnitude, mid-radius) via the imprint_seq sequential scale. A gradient legend "Current speed" (0 cm/s – 1.1 cm/s) sits top-right with matching gradient stops. The exact stagnation point at the eddy core is marked with a small green dot; near-zero vectors elsewhere get a minimum shaft length so direction stays readable.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title, axis labels, and tick labels now rendered in light ink — clearly legible, no dark-on-dark issues anywhere (title, axis labels, tick labels, and legend text all confirmed light-colored on the dark surface). Gridlines and the dashed core-radius guide remain subtly visible without competing with the data.
      Data: Arrow colors, positions, lengths, and the gradient legend are pixel-identical to the light render — only chrome (background, text, grid) flips between themes, confirming correct theme-adaptive implementation. The stagnation dot at the core is still the same brand green.
      Legibility verdict: PASS
