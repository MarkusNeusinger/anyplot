review:
  strengths:
  - Physically motivated rotating-eddy vortex (u = -y·decay, v = x·decay with Gaussian
    decay from the core) produces a visually compelling, oceanographically plausible
    flow field
  - Arrow color correctly encodes current magnitude using the Imprint sequential palette
    (imprint_seq), with identical data colors between light and dark renders
  - Square orientation correctly forced via equal x/y pixel scale (side = min(availW,
    availH)) so vector angles render undistorted
  - Arrow length auto-scaled to ~85% of grid cell size, keeping arrows clearly visible
    without overlap across the 15x15 grid
  - Clean gridlines, unit-bearing axis labels, and a labeled magnitude legend (0 cm/s
    to max cm/s) with matching gradient stops
  weaknesses:
  - Near-core arrows (lowest magnitude, around the eddy center) are very short and
    pale green, making their direction hard to read at a glance — consider a small
    minimum arrow length so low-magnitude vectors stay legible
  - Aesthetic treatment is competent but fairly standard for a D3 vector field (default
    axis chrome, straightforward gradient legend) — a bit more visual hierarchy (e.g.
    subtler axis domain lines, thinner grid) would push Design Excellence further
  - Data storytelling relies entirely on color + arrow density to reveal the rotation;
    a light annotation or radial guide at the eddy core could make the pattern even
    more immediately legible
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), consistent across the full canvas, not pure white.
      Chrome: Title "quiver-basic · javascript · d3 · anyplot.ai" in bold dark ink, centered top. Axis labels "Distance east of eddy core (km)" (x) and "Distance north of eddy core (km)" (y, rotated) in dark ink. Tick labels (-3..3 on both axes) dark and legible. Gridlines light gray, subtle but visible. Legend top-right: "Current speed" title, horizontal gradient swatch, "0 cm/s" / "1.1 cm/s" endpoint labels, all dark-on-light and readable.
      Data: 225 arrows (15x15 grid) forming a clear circular rotation pattern (vortex) around the origin, with arrow length growing from the core outward then arrows shrinking again per the Gaussian decay. Color ranges from Imprint green (#009E73-ish, low magnitude near core and far edges) to blue (higher magnitude at mid-radius) via imprint_seq. Arrows are solid lines with filled triangular heads, clearly distinguishable from the background and from each other.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), consistent across the canvas, not pure black.
      Chrome: Same title, axis labels, and tick labels now rendered in light/off-white ink, clearly legible against the dark background. Gridlines remain subtle (light gray-green, low opacity) but visible. Legend text and gradient swatch are legible with light labels on dark background — no dark-on-dark issues found anywhere (title, axis labels, tick labels, legend text all confirmed light-colored).
      Data: Arrow colors are identical to the light render (green-to-blue imprint_seq gradient by magnitude) — only chrome (background, text, grid) flipped as expected. The vortex pattern reads with the same clarity as the light render.
      Legibility verdict: PASS
