    lines mark EC50 positions for both compounds with rotated labels at top. Horizontal
    dotted lines indicate half-maximal response levels, and horizontal long-dash lines
    mark the top and bottom asymptotes with text labels on the left. The title reads
    "curve-dose-response · highcharts · pyplots.ai" with a subtitle showing EC50 values
    (9.9e-08 M and 2.8e-06 M). A floating legend with shadow and rounded border sits
    in the upper right with 5 entries.
