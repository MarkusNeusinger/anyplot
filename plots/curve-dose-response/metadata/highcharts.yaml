    notation (10^-9 to 10^-4) labeled "Concentration (M, log10 scale)". The y-axis
    shows "Response (%)" from -2 to 102. Title reads "curve-dose-response · highcharts
    · pyplots.ai" with a subtitle displaying both EC50 values. A floating legend in
    the top-right corner with shadow lists all series.'
