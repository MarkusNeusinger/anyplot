review:
  strengths:
  - Solid 4PL curve fitting with scipy including proper covariance-based 95% CI band
    via parameter sampling
  - EC50 reference lines with labeled values in the legend are informative and well-executed
  - Good color distinction between compounds with consistent color mapping across
    fits points and reference lines
  - Clean data generation with realistic pharmacological parameters
  weaknesses:
  - Missing top and bottom asymptote horizontal dashed lines as required by spec
  - Error bar implementation is extremely verbose with 48 hidden series polluting
    the chart structure
  - Legend text at bottom is small and hard to read
  - No direct on-chart annotations for EC50 values
  - Design could be elevated with better visual hierarchy and storytelling emphasis
  image_description: The plot displays two sigmoidal dose-response curves on a white
    background. Compound A is shown in blue (#306998) and Compound B in red (#E74C3C).
    The x-axis is labeled "log₁₀ Concentration (M)" ranging from approximately -9
    to -4, and the y-axis is labeled "Response (%)" ranging from 0 to about 95. Compound
    A (blue) has a steeper sigmoid shifting left (more potent, EC50 ~1e-7 M), while
    Compound B (red) shifts right (EC50 ~1e-6 M). Both fitted curves are solid lines
    with data points (filled circles) overlaid with error bars (SEM). Dashed blue
    lines form a 95% CI band around Compound A's fit. EC50 reference lines are shown
    as dashed vertical and horizontal lines for both compounds, intersecting at the
    half-maximal response. The legend is placed at the bottom with 6 labeled entries
    across multiple columns. The title reads "curve-dose-response · pygal · pyplots.ai".
