review:
  strengths:
  - 'Full spec compliance: all 4PL sigmoid features present — EC50 crosshairs, 95%
    CI ribbon, error bars (SEM), top/bottom asymptote dashed lines, and 2-compound
    comparison'
  - 'Excellent theme adaptation: shape=21 hollow circles with fill=PAGE_BG elegantly
    adapt to both light and dark themes while maintaining compound identity'
  - 'Sophisticated statistical implementation: proper nls() nonlinear regression with
    delta-method CI via vcov(), producing mathematically correct confidence bands'
  - Color-coded EC50 annotations in italic at matching compound colors create clear
    pharmacological storytelling — viewer immediately identifies which compound is
    more potent
  - Correct Imprint palette usage with named scale_color_manual vector; data colors
    identical across themes, chrome adapts correctly in both renders
  weaknesses:
  - 'Unused `scales` import: library(scales) is loaded but no scales:: functions are
    called explicitly — all labels are character vectors and scale_x_log10() is a
    ggplot2 native function. Remove to satisfy CQ-03.'
  - Helper functions (f4pl, grad_4pl) break the pure KISS 'Imports → Data → Plot →
    Save' linear structure; while mathematically justified, inlining them or moving
    to a comment would satisfy CQ-01 strictly.
  - 'Design Excellence gap: DE-01 and DE-02 need elevation to push past the 90-point
    threshold. Consider adding a secondary annotation highlighting the EC50 ratio
    between compounds, or using geom_label for the EC50 annotations instead of plain
    annotate text for more visual weight. The grid at INK_MUTED/0.2 linewidth is good
    but the overall aesthetic reads as a well-configured default rather than publication-ready.'
  - The asymptote dashed lines (top ~96%, bottom ~5%) are unlabeled — adding a small
    text annotation like 'Top' / 'Bottom' in INK_MUTED would improve readability for
    viewers unfamiliar with dose-response conventions without cluttering the plot.
