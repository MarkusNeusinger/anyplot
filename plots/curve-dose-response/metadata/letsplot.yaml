  image_description: The plot displays two sigmoidal dose-response curves on a minimal
    white background. The x-axis shows "Concentration (M)" on a logarithmic scale
    from 1e-9 to 1e-4, and the y-axis shows "Response (%)" from 0 to ~100. Compound
    A is rendered in steel blue (#306998) and Compound B in burnt orange (#E07A3A).
    Both compounds show classic sigmoidal 4PL curves — Compound A has a steeper Hill
    slope and lower EC50 (~1e-7 M), while Compound B shifts right with EC50 ~5e-6
    M. Data points are open circles with white fill and colored stroke, overlaid with
    vertical error bars (SEM). Dashed horizontal lines mark the half-maximal response
    for each compound, with dashed vertical lines dropping to the x-axis at their
    respective EC50 values. Dotted gray horizontal lines indicate the top (~97%) and
    bottom (~5%) asymptotes for Compound A. A light blue confidence band (95% CI)
    surrounds the Compound A fitted curve. The legend is positioned in the lower-right
    area. Title reads "curve-dose-response · letsplot · pyplots.ai".
