review:
  strengths:
  - 'Perfect spec compliance: all 7 required features (4PL fit, EC50 crosshairs, SEM
    error bars, 95% CI, asymptotes, 2 compounds, log x-axis) are present and correctly
    implemented.'
  - Stroke-width hierarchy (8/3/2/1.5) creates a clear visual priority system — fitted
    curves dominate, reference lines recede, structural lines are barely-there.
  - EC50 values embedded directly in legend labels make the key pharmacological insight
    immediately accessible without extra annotations.
  - Correct Imprint palette with theme-adaptive chrome in both renders; no dark-on-dark
    or light-on-light failures.
  - Tight, clean code with reproducible seeds and current pygal API throughout.
  weaknesses:
  - 'Grid density is noticeable at full resolution: the horizontal dotted y-guides
    at every 10% interval create a busy background layer alongside the CI dashes and
    asymptote dashes, making the chart feel slightly cluttered — reduce y_labels to
    0/25/50/75/100.'
  - The 95% CI band is two dashed lines rather than a filled region, which is a library
    limitation but visually reads as less distinctive than a shaded band.
  - Design Excellence is limited by pygal's inherent box-frame (no L-spine treatment)
    and the prescribed anyplot theme doing most of the aesthetic work — add a distinctive
    compositional accent (e.g., highlighted EC50 tick labels) to elevate to strong-design
    level.
