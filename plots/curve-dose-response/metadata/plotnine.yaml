  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M) vs Response (%). Compound A is rendered in steel blue
    (#306998) and Compound B in burnt orange (#E0652B). Both curves show characteristic
    S-shaped 4PL logistic fits. Data points are open circles (white fill, colored
    stroke) with vertical SEM error bars overlaid on the fitted curves. Semi-transparent
    95% confidence interval ribbons (blue and peach) surround each fitted curve. Dashed
    vertical and horizontal EC50 reference lines intersect each curve at the half-maximal
    response (~50% for Compound A near 1e-7 M, ~48% for Compound B near 5e-7 M). Faint
    dotted horizontal lines mark top and bottom asymptotes for each compound. Title
    reads "curve-dose-response · plotnine · pyplots.ai" in bold at top. Legend in
    lower-right shows both compounds. Y-axis labeled "Response (%)", x-axis labeled
    "Concentration (M)" with log-scale tick labels (1e-9, 1e-7, 1e-5). Subtle horizontal
    grid lines on y-axis only. Clean minimal theme with axis lines.
