      Data: Compound A (#009E73 brand green) sigmoidal curve with light-green CI band (opacity 0.13, subtle but visible). Compound B (#4467A3 blue, palette index 2 — should be palette index 1) sigmoidal curve. Data points at r=6 with white stroke outline, visible at full resolution. Error bars on all 9 data points per compound, visible. Asymptote dashed lines for both compounds faint but present. EC50 dashed vertical+horizontal reference lines in compound colors.
      Legibility verdict: PASS — all text readable against warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title in light/cream text, clearly visible. Axis labels and tick labels in secondary light token, readable. Legend box has elevated dark background (#242420), correctly elevated. IC₅₀ annotations retain compound colors (#009E73 and #4467A3) — both readable against dark background.
      Data: Colors IDENTICAL to light render — Compound A green (#009E73) and Compound B blue (#4467A3). CI band appears as a darker green area (opacity 0.13 on dark surface — very subtle but distinguishable). Asymptote and EC50 reference lines visible. Error bars present and visible.
      Legibility verdict: PASS — no dark-on-dark failures. All text in light tokens against dark background. Brand green #009E73 remains well-visible on dark surface.
