review:
  strengths:
  - Correct sigmoidal 4PL dose-response curves on log-scale x-axis with all required
    pharmacological features
  - 'Complete spec compliance: EC50/IC50 reference lines, error bars, asymptote dashes,
    95% CI band, 2 compounds, legend'
  - Perfect data quality with realistic pharmacological parameters (EC50 100 nM vs
    500 nM, Hill slopes 1.5 vs 0.9)
  - Deterministic data via hard-coded arrays — no random seed needed
  - 'Idiomatic D3: d3.scaleLog, d3.area for CI band, d3.curveCatmullRom for smooth
    curves, clip-path for data containment'
  - Theme-adaptive chrome throughout — all text and grid tokens applied correctly
    in both light and dark renders
  - IC50 annotations in compound-matched colors reinforce the comparative story clearly
  weaknesses:
  - 'Palette order violation: Compound B uses t.palette[2] (#4467A3 blue) instead
    of the canonical t.palette[1] (#C475FD lavender). With only 2 compounds and no
    semantic color exception (Compound A and B are abstract identifiers), the next
    ordinal position must be used.'
  - CI band opacity at 0.13 is very subtle — it is visible in the full-resolution
    render but may be nearly invisible when the chart is displayed at smaller sizes
    or in print. Raise to 0.18–0.22 for better readability.
  - Error bars are drawn via a forEach loop with individual .append() calls (outside
    the clip-path group) rather than using D3 data-join pattern. The error-bar lines
    should be bound via d3 data binding and added to the clip group to respect the
    plot boundary.
  - Legend uses three separate element types (rect, line, circle) manually assembled
    for each row — a more elegant D3 approach would build legend rows from data using
    a single join.
  image_description: |-
