  strengths:
  - Perfect spec compliance — all required features (4PL sigmoid, log x-axis, error
    bars with SEM, EC50 dashed reference lines, top/bottom asymptotes, 95% CI band,
    multi-compound comparison) present and correctly implemented
  - Custom ECharts renderItem for error bars with caps is genuinely ECharts-idiomatic
    and produces professional-looking error bars with proper cap serifs
  - Deterministic LCG random number generator ensures reproducibility in the browser
    environment where Math.random() cannot be seeded
  - EC50 dashed reference lines (horizontal + vertical intersecting at half-maximal
    response) effectively guide the reader to the key pharmacological potency insight
  - Minor split lines on the log x-axis add sophistication appropriate for the concentration
    scale spanning 5 decades
  - Both light and dark renders adapt correctly — all chrome tokens (ink, inkSoft,
    grid, pageBg) correctly threaded through title, axis labels, gridlines, and legend;
    data colors are identical across themes
  - Kinase inhibitor pharmacology context is realistic, neutral, and scientifically
    accurate (EC50 in nM range, concentrations 1nM–100µM, response in %)
  weaknesses:
  - X-axis tick formatter uses ASCII caret notation '10^-9' instead of proper Unicode
    superscripts (e.g., '10⁻⁹') — visually less polished at publication quality; ECharts
    rich text or Unicode escape sequences can produce proper scientific notation
  - EC50 half-maximal responses for Inhibitor A (midA=49.5%) and Inhibitor B (midB=47%)
    are only 2.5 response units apart, placing the two dashed EC50 horizontal reference
    lines very close together and crowding the 'EC₅₀' labels near the right edge;
    consider adding numeric EC50 values to the markLine labels (e.g., 'EC₅₀ = 80 nM')
    or adjusting label positions to distinguish them
