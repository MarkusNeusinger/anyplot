review:
  strengths:
  - Custom SVG renderer error bars via chart.events.render avoid the banned highcharts-more
    module — technically sophisticated and demonstrates deep Highcharts knowledge
  - Deterministic LCG with fixed seeds (42, 137) provides full reproducibility in
    the browser environment where seeded Math.random() is unavailable
  - 'Complete spec implementation: 4PL sigmoid, 2 compounds with distinct Hill slopes
    and EC50s, 95% CI band, SEM error bars, EC50 reference lines, asymptote lines,
    log x-axis with superscript labels'
  - 'Full Imprint palette compliance — first series #009E73, second #C475FD, transparent
    background, all chrome theme-adaptive via t tokens'
  - Pharmacologically realistic data (concentration range, EC50 values, Hill slopes)
    with informative subtitle explaining visual elements
  weaknesses:
  - 'Bottom asymptote reference line uses t.grid color (rgba(26,26,23,0.15)) — effectively
    invisible in both renders; spec requires a visible dashed line. Fix: change color
    to t.inkSoft with dashStyle LongDash and width 1.5'
  - 'CI lower-bound mask series fills with t.pageBg to hide the area below the lower
    CI, which hides grid lines in that region (visible in both renders, more prominent
    in dark theme). Fix: remove the _ci_mask series entirely — the grid masking artifact
    is worse than having no lower CI boundary'
  - 'Both X and Y grid lines are enabled; for a spline line chart, Y-axis-only grid
    is preferred for cleaner visuals. Fix: set gridLineWidth: 0 on xAxis'
