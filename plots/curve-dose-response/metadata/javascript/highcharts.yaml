review:
  strengths:
  - SVG renderer error bars via chart.events.render is a true Highcharts idiom — draws
    correct caps and tracks re-renders, destroying and redrawing c._errorBars on each
    render call
  - 'Full spec feature set: EC50 crosshair reference lines (vertical + horizontal),
    asymptote lines (top per compound, shared bottom), SEM error bars, CI band, and
    2-compound comparison all present'
  - Deterministic LCG + Box-Muller for reproducible synthetic data in a seed-less
    JS environment — fixed seeds 42 and 137 ensure identical renders
  - linkedTo series properly groups scatter data points with their fitted curves for
    correct legend toggle behavior
  - 'Both themes pass readability: all chrome tokens (ink, inkSoft, grid, pageBg,
    elevatedBg) correctly applied to title, axes, tick labels, and legend box'
  - 'Thoughtful pharmacological narrative: two compounds with meaningfully different
    potency (EC50 = 100 nM vs 500 nM) and cooperativity (Hill slope 1.5 vs 0.8) demonstrate
    the comparison capability'
  weaknesses:
  - 'CI band is not a true symmetric confidence band: uses a single area series from
    curve+CI_W down to axis minimum (threshold: null), shading everything below the
    upper CI bound rather than the region between lower and upper CI bounds. Fix:
    compute ciLowerA = curveA.map(([x,y]) => [x, Math.max(0, y-CI_W)]) and create
    a second area series to bound the CI region from below.'
  - 'KISS violation: 5 helper functions (fourPL, smoothCurve, makeLCG, boxMuller,
    genMeasured) violate the no-functions rule, though mathematically justified in
    a JS environment without numpy.'
  - 'EC50 plot-line labels (y: -6) create visual crowding with the subtitle text —
    the labels sit very close to the subtitle line. Fix: change y: -6 to y: 18 on
    both EC50 A and B plotLine labels to push them below the subtitle zone.'
  - 'Bottom asymptote shown as a single approximate line (value: 3) rather than separate
    lines per compound (Compound A bottom ~2%, Compound B bottom ~5%).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "curve-dose-response · javascript · highcharts · anyplot.ai" in dark ink (~70% width) readable. Subtitle "Shaded band: 95% CI for Compound A | Dashed lines: EC50 and asymptote references" in muted gray, small but readable. X-axis label "Concentration (M)" and Y-axis label "Response (%)" both clearly visible. Tick labels readable on both axes.
      Data: First compound (Compound A) in brand green #009E73 — smooth sigmoid curve with circle scatter markers and SVG-drawn error bars. Second compound (Compound B) in lavender #C475FD — smooth sigmoid curve with square scatter markers and error bars. Green-tinted CI band fills from upper CI bound down to axis minimum (not a true symmetric band). EC50 vertical dashed lines at 10^-7 M (A) and 5x10^-7 M (B). Horizontal dashed lines at 50% (halfA), 45% (halfB), 98% (top A), 85% (top B), ~3% (bottom). Legend box (right, vertical) with background, border, listing Compound A (fit), Compound A 95% CI, Compound B (fit).
      Legibility verdict: PASS — all text readable against light background; minor crowding between EC50 plot-line labels and subtitle text at top

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title and all labels switch to light cream/gray tones (inkSoft tokens). Title clearly readable in light color. Axis labels, tick labels, legend text all readable against dark background. No dark-on-dark failures detected. Grid lines remain subtle on dark surface. Legend box background changes to elevated dark surface (#242420).
      Data: Compound A still renders in #009E73 (identical to light render). Compound B still renders in #C475FD (identical to light render). Data colors unchanged — only chrome flipped. CI band visible as subtle green-tinted region on dark background. EC50 and asymptote reference lines maintain compound-matched colors.
      Legibility verdict: PASS — all text readable against dark background; no elements lost in the dark theme
