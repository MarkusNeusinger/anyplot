    instead of t.palette[1] (#C475FD, lavender) — no semantic exception applies to
    generic ''Compound A / Compound B'' labels; fix by changing palette[2] to palette[1]'
  - EC50 annotation text hardcoded as 'bold 14px sans-serif' rather than using a theme-aware
    size; text is small at the bottom of the chart and may be hard to read when the
    image is scaled to mobile widths (~400 px)
  - 'Design excellence moderate: no explicit spine removal, no custom whitespace treatment
    beyond Chart.js defaults — the visual polish is functional but not exceptional'
