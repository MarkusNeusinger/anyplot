      Data: Compound A (brand green #009E73) sigmoidal curve with 95% CI band (low opacity green fill), 10 data points with SEM error bars. Compound B (lavender #C475FD) sigmoidal curve with 10 data points and error bars. Vertical dashed EC50 reference lines in matching compound colors with labels "EC50-A" and "EC50-B" at top. Horizontal dashed 50% line with "50%" label at right edge.
