review:
  strengths:
  - Excellent use of useXScale/useYScale hooks for CI band and error bar SVG overlays
    — idiomatic MUI X composition
  - Complete 4PL sigmoid implementation with deterministic LCG seeding
  - Color-matched EC₅₀ reference line labels (green/purple per compound), CI band
    with appropriate low opacity, legend includes EC₅₀ values in text
  - 'Both themes pass readability: warm off-white light bg, warm near-black dark bg,
    data colors identical across themes'
  - Clean code structure with necessary-only abstractions (CIBand/ErrorBars as React
    components required for hook access)
  weaknesses:
  - Missing horizontal dashed lines for top and bottom asymptotes — spec explicitly
    requires showing the upper (∼98%/∼85%) and lower (∼2%/∼5%) response asymptotes
    as horizontal reference lines; only the 50% mid-response line is present
  - X-axis tick labels use caret notation (10^-9, 10^-8, …) via valueFormatter; proper
    Unicode superscript (10⁻⁹) or SVG tspan would be more polished
  - CI band fillOpacity=0.13 is on the lower end — visible in light theme but becomes
    very subtle against the dark background; 0.18–0.22 would maintain the intended
    subtlety while improving contrast in dark mode
  - 'DE-02: no explicit spine removal — MUI X default may show all four frame lines;
    removing top/right spines would improve visual refinement'
