review:
  strengths:
  - Custom CIBand using useXScale/useYScale hooks is a sophisticated, idiomatic MUI
    X pattern for rendering custom SVG within the chart coordinate space
  - Reproducible data generation via LCG seed-42 satisfies the browser-harness offline
    constraint elegantly
  - Unicode superscript formatter produces clean pharmacological axis notation (10⁻⁹
    etc.) using only in-memory string ops
  - All theme tokens (t.ink, t.inkSoft, t.palette) applied consistently for full light/dark
    adaptation
  - Seven reference lines (EC50-A, EC50-B, 50%, 98%, 85%, 2%, 5%) cover the spec pharmacological
    annotations without cluttering the chart
  weaknesses:
  - Bottom asymptote labels 2% and 5% are placed at nearly identical y-positions (3%
    apart on the full axis span) and are visually crowded — consider offsetting labelAlign
    or omitting them in favour of y-axis tick labels
  - Missing horizontal reference line for Compound B's EC50 at y=45% (the horizontal
    at 50% is accurate only for Compound A whose midpoint is exactly 50%)
  - Asymptote label fontSize 11 is slightly below the comfortable legibility floor
    at small viewport sizes
