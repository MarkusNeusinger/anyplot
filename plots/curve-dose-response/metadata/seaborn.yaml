review:
  strengths:
  - Full spec compliance with all required features (4PL fit, EC50 lines, error bars,
    asymptotes, CI band, 2 compounds)
  - Excellent data quality with real drug names (Imatinib, Erlotinib) and realistic
    pharmacological parameters
  - Clean visual presentation with despine, subtle grid, and colorblind-safe blue/orange
    palette
  - Proper 95% CI computation using Jacobian-based variance propagation
  weaknesses:
  - No EC50 value annotations to highlight the key pharmacological comparison and
    strengthen data storytelling
  - Marker size (s=120) slightly small for 16 data points — should be 180-200
  - Heavy reliance on matplotlib for error bars, reference lines, and CI band — seaborn
    capabilities underutilized
  - Design is clean but not yet publication-quality — lacks refined typography or
    background treatment
  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M) against Response (%) on the y-axis. Imatinib is shown
    in dark blue (#306998) and Erlotinib in burnt orange (#D4763A). Both compounds
    have fitted 4PL sigmoid curves with data points (filled circles with white edges)
    and vertical error bars overlaid. Imatinib's curve rises steeply around 1e-7 M
    with an EC50 near 3e-7 M, reaching ~95% response. Erlotinib's curve shifts right
    with EC50 near 5e-6 M, reaching ~80% response. Dashed horizontal and vertical
    reference lines in matching colors mark each EC50 intersection. A light blue shaded
    95% confidence band surrounds the Imatinib fit. Faint dashed horizontal lines
    mark top and bottom asymptotes for both compounds. The legend in the upper left
    lists fit lines, data points, and CI band. Title reads "curve-dose-response ·
    seaborn · pyplots.ai". Top and right spines are removed, with a subtle y-axis
    grid at low opacity.
