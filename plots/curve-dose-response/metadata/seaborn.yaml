  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M, ranging from ~3×10⁻¹⁰ to ~3×10⁻⁴) against Response
    (%) on the y-axis (from -5 to 110). Imatinib is shown in deep blue (#306998) with
    circle markers and a solid fitted curve, while Erlotinib is in burnt orange (#D4763A)
    with square markers. Both compounds have SEM error bars at each concentration
    point. A light blue 95% confidence interval band surrounds the Imatinib fitted
    curve. Dashed horizontal and vertical reference lines mark the EC50 intersection
    points for both compounds — Imatinib at ~0.30 µM and Erlotinib at ~5.5 µM. Faint
    horizontal dashed lines indicate the top and bottom asymptotes for each compound.
    The title reads "curve-dose-response · seaborn · pyplots.ai" in medium weight.
    Top and right spines are removed, with a subtle y-axis grid. A clean legend in
    the upper left distinguishes fit lines, data points, and the CI band.
