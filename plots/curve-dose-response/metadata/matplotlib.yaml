  image_description: The plot displays two sigmoidal dose-response curves on a logarithmic
    x-axis (Concentration in M, from 10⁻⁹ to 10⁻⁴). Compound A (blue, circle markers)
    rises steeply from ~5% to ~97% response with a 95% confidence interval band shown
    in light blue shading. Compound B (coral/red, square markers) rises more gradually
    from ~8% to ~80% response. Both compounds have dashed EC50 reference lines (horizontal
    at half-maximal response, vertical dropping to x-axis) in their respective colors.
    Dotted horizontal lines mark top and bottom asymptotes for both compounds. Error
    bars (SEM) are visible on all data points with caps. The y-axis shows "Response
    (%)" from -5 to 110. Top and right spines are removed, with a subtle y-axis grid
    (alpha=0.2). Title reads "curve-dose-response · matplotlib · pyplots.ai" in the
    correct format. Legend in upper left shows 95% CI (Compound A), Compound A (fit),
    and Compound B (fit). The overall layout is clean with good proportions on a 16:9
    canvas.
