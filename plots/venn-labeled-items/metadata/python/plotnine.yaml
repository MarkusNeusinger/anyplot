    item labels with no visible border
  - All 7 interior Venn zones populated with culturally plausible food-trend items;
    triple-intersection items (Sourdough, Matcha) are genuinely appropriate
  - 'Comprehensive theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED
    all flip correctly between light and dark'
  - 'Perfectly flat KISS structure: no functions or classes; data flows top-to-bottom'
  - 'Idiomatic plotnine: uses geom_polygon for circles (no geom_circle in plotnine),
    coord_fixed() for equal aspect, scale_fill_identity() / scale_color_identity()'
  weaknesses:
  - 'Dark render shows label-box overlap: ''Butterfly Pea Tea'' is partially obscured
    by the adjacent ''Cronuts'' label box (shows as ''Butterfly Pea''), and ''Lentil
    Soup'' is partially obscured by the ''Greek Yogurt'' label box (shows as ''til
    Soup''). In the light render the same-color elevated backgrounds mask the overlap
    visually, but in dark mode the dark elevated boxes make the collision obvious.
    Fix: reduce geom_label size from 11 to ~9, and/or adjust item coordinates for
    zone A∩C items (Cronuts to ~-1.05,-0.65 and Dirty Soda to ~-1.05,-1.10) and zone
    B-only items (Lentil Soup to ~2.35,-0.35) to increase spacing.'
  - 'LM-01 (Idiomatic Usage): geom_polygon for circles requires manually computing
    240 theta points per circle, adding ~720 rows of geometry data. A slightly more
    idiomatic approach would use annotate(''path'') or a custom stat, but geom_polygon
    is a reasonable workaround given plotnine lacks geom_circle.'
  - 'DE-03 (Data Storytelling): no visual emphasis distinguishes the triple-intersection
    zone (Sourdough, Matcha) as the most interesting region. Adding a subtle annotation
    arrow or slightly larger labels in the ABC zone would guide the viewer to the
    insight.'
