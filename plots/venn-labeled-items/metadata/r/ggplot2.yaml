review:
  strengths:
  - 'Perfect spec and data quality: all 7 Venn zones populated, 19 items, correct
    title format, semi-transparent fills, category labels outside circles — every
    spec requirement met.'
  - Imprint palette correctly used for all three circles (positions 1-3 in canonical
    order); full theme-adaptive chrome with PAGE_BG/INK/INK_MUTED tokens — both renders
    pass legibility checks.
  - theme_void() with coord_fixed() is the idiomatic ggplot2 approach for this chart
    type; no unnecessary chrome, clean minimal look matching the spec's magazine-print
    directive.
  - Colored bold category labels matching their respective circles give the chart
    an editorial, cohesive look above the generic default.
  weaknesses:
  - Diagram sits slightly high in the square canvas, leaving ~15% dead whitespace
    at the bottom. Widen ylim to c(-6.5, 5.5) in coord_fixed() to vertically centre
    the Venn group.
  - Item labels at size=2.8 mm are small for mobile legibility. Increase geom_text(size=...)
    from 2.8 to 3.2.
  - The spec suggests a Chartgeist editorial font for category labels (serif or display).
    Current default sans-serif is functional but misses that aesthetic — add fontfamily='serif'
    to the bold annotate() calls.
  - make_circle() helper function breaks strict KISS; inline the 3-line circle generation
    if code is revised.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "Tech Trends 2025 · venn-labeled-items · r · ggplot2 · anyplot.ai" in muted INK_MUTED (#6B6A63), centered at top, clearly readable. No axis labels or tick labels (theme_void). Bold category labels outside circles in their respective circle colors (green #009E73, lavender #C475FD, blue #4467A3) — all readable.
      Data: Three semi-transparent circles (alpha=0.13) with outlines. Circle A top (green), B left (lavender), C right (blue). 19 item labels in dark INK (#1A1A17) text placed in correct zones. All labels readable. Diagram sits slightly high; ~15% empty canvas at bottom below category labels.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in muted INK_MUTED (#A8A79F), clearly readable against dark background. Category labels retain their circle colors — all readable at adequate contrast. No dark-on-dark failures observed.
      Data: Data colors identical to light render (Imprint positions 1-3 unchanged). Item labels rendered in cream #F0EFE8 (INK dark token) — all readable. Triple-intersection zone (iPhone, ChatGPT) has very dark blended background from three overlapping fills but cream labels remain legible. "Spotify" label at BC zone boundary has a faint greenish optical cast due to green circle A fill bleeding into that area — not a code defect, just a background blend artifact; label is still readable.
      Legibility verdict: PASS
