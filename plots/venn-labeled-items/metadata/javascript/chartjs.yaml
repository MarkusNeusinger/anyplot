review:
  strengths:
  - Three-circle Venn diagram correctly implements all 7 interior zones with appropriate
    items in each
  - Editorial Georgia serif typography creates a genuine WIRED Chartgeist feel — deliberate
    and consistent
  - Semi-transparent circle fills (alpha 0.21) with separate outline alpha (0.60)
    creates professional depth
  - Title scaling formula (22 * 67 / titleLength) correctly handles the long mandated
    title
  - Witty subtitle "Where does it live — hype, utility, or quiet devotion?" frames
    the editorial narrative
  - Imprint palette positions 1-3 correctly assigned to circles; theme-adaptive chrome
    (pageBg, ink, inkSoft) in both renders
  - Deterministic hardcoded data — no randomness, fully reproducible
  - Chart.js plugin system (afterDraw) used as the correct idiom for extending Chart.js
    with a custom chart type not in the 8 native types
  weaknesses:
  - '"Secretly Beloved" category label center is at y≈886px CSS in a 900px canvas
    with ~37px font — bottom of descenders approach the canvas boundary; reduce `r`
    by 5-8% or shift the C-circle downward to restore safe margin'
  - Triple intersection (ABC) zone is geometrically small and holds 2 items ("The
    Internet", "Coffee") stacked with only 1.65× lineHeight, leaving them visually
    cramped; consider a slightly lower itemFontSize for zones with ≥2 items
  - 'LM-02 improvement opportunity: the implementation uses raw canvas 2D drawing
    inside the plugin rather than composing Chart.js datasets — using Chart.js bubble/scatter
    datasets with plugin-drawn circle arcs would show deeper library mastery'
