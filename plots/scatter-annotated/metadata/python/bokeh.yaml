review:
  strengths:
  - Perfect theme adaptation with no legibility issues in either light or dark render
  - Correct Okabe-Ito palette (#009E73) with identical data colors across themes
  - Well-executed code following Bokeh idioms (ColumnDataSource, LabelSet, segment)
  - Proper theme token implementation for all chrome elements (title, axes, labels,
    grid)
  - Clean data presentation with 15 well-distributed company examples
  - Leader line segments effectively connect points to offset labels
  - All text properly sized for 4800x2700px canvas (28pt title, 22pt axis labels,
    24pt data labels, 18pt ticks)
  - Deterministic data generation with seed(42) for reproducibility
  weaknesses:
  - Design excellence is modest - uses default styling without custom refinements
  - No use of advanced Bokeh interactive features (HoverTool, callbacks) beyond basic
    interactivity
  - Label overlap mitigation relies on manual fixed offsets rather than automatic
    collision detection (adjustText-style approach would improve robustness)
