      Background: Warm off-white (#FAF8F1) with subtle grid lines. Professional and clean.
      Chrome: Title "scatter-annotated · letsplot · anyplot.ai" is bold and clearly visible in dark text. Axis labels "Annual Revenue ($ millions)" and "Profit Margin (%)" are readable in dark gray. Tick labels and company name annotations are all legible against the light background.
      Data: 15 data points in brand green (#009E73) with 0.7 alpha transparency. Company name annotations positioned with slight upward nudge (nudge_y=1.5) to avoid direct point overlap. Each label is readable and identifiable.
      Legibility verdict: PASS - All text elements (title, axis labels, ticks, annotations) are clearly readable with excellent contrast against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) with subtle grid lines visible. Professional dark theme implementation.
      Chrome: Title is now in light text, clearly visible. Axis labels and tick labels are rendered in light gray (INK_SOFT adapted to dark theme #B8B7B0). All text elements maintain excellent contrast against the dark background - no dark-on-dark failures.
      Data: Data point colors are identical to the light render (#009E73 green), confirming proper theme separation between data (constant) and chrome (adaptive). Company name annotations in light gray text are clearly readable.
      Legibility verdict: PASS - All text elements are readable in the dark theme. Chrome (backgrounds, text, grid) has flipped appropriately while data colors remain constant. No dark-on-dark text visibility issues detected.
