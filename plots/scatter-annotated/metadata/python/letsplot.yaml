review:
  strengths:
  - Theme-adaptive styling properly implemented with color tokens that correctly adapt
    backgrounds and text between light and dark modes
  - Clean, readable annotation approach using geom_text with nudge positioning to
    avoid direct point overlap
  - Realistic and neutral business data (company revenue vs profit margins) that effectively
    demonstrates the annotation feature
  - Proper typography hierarchy with correctly scaled fonts (title 24pt, axis labels
    20pt, ticks 16pt, annotations 12pt) for the 4800x2700 canvas
  - Both light and dark renders are equally professional and readable with no theme-specific
    legibility issues
  weaknesses:
  - Minor text label overlap in regions with clustered data (e.g., ByteWorks/SmartScale
    area) - consider using adjustText library for automatic label repositioning
  - Design sophistication is solid but follows conservative defaults without distinctive
    visual emphasis - consider using size/color variation to highlight outliers (NeuraTech,
    MegaSoft)
  - Could enhance data storytelling through visual hierarchy - current implementation
    treats all points equally without emphasis on key insights
  image_description: |-
