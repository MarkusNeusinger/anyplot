    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "skewt-logp-atmospheric · julia · makie · anyplot.ai" in dark ink, clearly readable. Y-axis label "Pressure (hPa)" and X-axis label "Temperature (°C)" both readable with units. Tick labels (pressure levels and temperature degrees) visible in INK_SOFT color.
      Data: Temperature profile in brand green #009E73 (linewidth 3.5, solid) — prominent and clearly visible. Dewpoint profile in #D55E00 orange-vermillion (linewidth 3.5, dashed) — clearly visible. Reference lines (isotherms, dry adiabats, moist adiabats, mixing ratio) rendered at low alpha as background context. Lifted parcel trace in #CC79A7 (linewidth 2.0, dashdotdot). CAPE fill in orange (#E69F00 alpha=0.22) — very subtle, nearly invisible on light background. LCL diamond marker visible near 800 hPa with small "LCL" label.
      Legibility verdict: PASS (all primary text readable; small annotation labels fontsize 8-9 are a minor concern at mobile scale)

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct
