review:
  strengths:
  - Mathematically correct Skew-T coordinate transformation (45° skew + log10 pressure
    y-axis) implemented from first principles
  - 'Complete feature set: dry adiabats, moist adiabats, mixing ratio lines, CAPE
    region, lifted parcel trace, LCL marker — all from thermodynamic equations'
  - 'Theme adaptation is flawless: all chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    isobar_col, reference line colors) flip correctly between light and dark; data
    colors stay identical'
  - 'First series (Temperature) correctly uses Okabe-Ito brand green #009E73; Dewpoint
    uses position 2 (#D55E00)'
  - Reference lines are intentionally alpha-blended to stay subordinate to the main
    data profiles — appropriate visual hierarchy for a complex scientific diagram
  - Uses poly! with Point2f polygon construction for CAPE area — idiomatic Makie for
    filled region
  weaknesses:
  - CAPE fill uses alpha=0.22 with OKABE_ITO[5] (#E69F00 orange) — on the warm off-white
    light background this is nearly invisible; increase alpha to 0.40–0.50 so the
    CAPE region is clearly distinguishable from the background
  - Isotherm axis labels use fontsize=9 and mixing ratio labels use fontsize=8 — too
    small to read when chart is scaled to ~400 px mobile width; increase both to fontsize=10
  - Lifted parcel trace uses linewidth=2.0 which is noticeably thinner than the main
    profiles (3.5) — increase to 2.5 for better visibility in regions where it runs
    close to the environment temperature line
