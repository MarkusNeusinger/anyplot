      Data: Temperature sounding as solid teal (#009E73, OKABE_ITO[1]) line with markersize-7 scatter points. Dewpoint sounding as dashed orange (#D55E00, OKABE_ITO[2]) line with matching scatter points. Reference lines visible as subtle diagonals: gray isotherms (α=0.28), orange-brown dashed dry adiabats (α=0.40), blue dash-dot moist adiabats (α=0.42), green dotted mixing ratio lines (α=0.48). Horizontal isobars at 0.08 alpha serve as grid substitute. Legend in top-right with ELEVATED_BG (#FFFDF6) background showing all 5 series.
      Legibility verdict: PASS — all text readable, no overlap, reference lines subtle and background-appropriate.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black. Unified figure/axis background.
      Chrome: Title, axis labels, and tick labels rendered in light INK (#F0EFE8) / INK_SOFT (#B8B7B0) — fully readable against dark background. No dark-on-dark failures observed. Legend background uses ELEVATED_BG (#242420), slightly lighter than canvas, with light label text. Reference line colors adjusted for dark theme (slightly lighter alphas, higher RGB base values).
      Data: Temperature sounding (#009E73) and dewpoint sounding (#D55E00) colors are identical to the light render — only chrome flips. Both profiles clearly visible against the darker reference line background.
      Legibility verdict: PASS — all text readable in dark theme, no dark-on-dark issues, data colors preserved across themes.
