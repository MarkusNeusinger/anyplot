review:
  strengths:
  - Flawless implementation of all Skew-T thermodynamic reference lines (isotherms,
    dry adiabats, moist adiabats, mixing ratio) with correct Bolton-1980 thermodynamic
    formulas
  - Accurate 45-degree skewed temperature coordinate transform applied consistently
    across all reference lines and sounding profiles
  - 'Perfect spec compliance: logarithmic inverted pressure Y-axis, correct skewed
    isotherms, both temperature and dewpoint sounding profiles with distinct line
    styles'
  - 'Full theme-adaptive chrome: correct #FAF8F1/#1A1A17 backgrounds, INK/INK_SOFT
    token usage throughout, reference line colors adjusted per theme, both renders
    pass readability check'
  - 'Correct Okabe-Ito order: temperature profile as OKABE_ITO[1] (#009E73), dewpoint
    as OKABE_ITO[2] (#D55E00), data colors identical across both renders'
  - Realistic tropical convective radiosonde sounding with meteorologically correct
    temperature values (28.4°C surface to -72.6°C at 100 hPa) and accurate dewpoint
    depression increase with altitude
  weaknesses:
  - Missing explicit xticklabelsize and yticklabelsize — tick labels inherit figure
    fontsize=14, making them the same size as axis labels (both 14pt) rather than
    the recommended smaller 12pt; this reduces typographic hierarchy slightly
  - Helper functions (skew_x, y_p, isotherm_line, dry_adiabat_line, mixing_ratio_line,
    moist_adiabat_line) break the KISS flat-script convention — though justified for
    thermodynamic complexity, the criterion expects no functions/classes
  - 'Design Excellence ceiling: no CAPE/CIN region shading between the lifted parcel
    path and the environmental temperature — this is the single most informative meteorological
    annotation on a Skew-T and would substantially elevate storytelling (DE-03)'
  - No explicit LCL, LFC, or EL level markers or annotations to guide the reader's
    interpretation of atmospheric stability; reference lines alone require expert
    meteorological knowledge to interpret
  - 'LM-02: no distinctively Makie-specific feature used (e.g. Observable-driven parameter,
    custom recipe via @recipe macro, or Colorbar with custom ticks tied to a colormap-mapped
    sounding profile)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. Figure and axis backgrounds unified.
