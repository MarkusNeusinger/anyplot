      Chrome: Title "Tropical Radiosonde Sounding · skewt-logp-atmospheric · r · ggplot2 · anyplot.ai" bold at size 11 — clearly readable in dark ink. Axis labels "Temperature (°C)" and "Pressure (hPa)" at size 10 — readable. Tick labels at size 8 — readable. Legend text at size 8 — readable.
      Data: Temperature profile in solid #009E73 (OKABE_ITO[1]) at linewidth=1.5 — prominent. Dewpoint profile in dashed #D55E00 (OKABE_ITO[2]) at linewidth=1.5 — prominent. Reference lines (isotherms, dry adiabats, moist adiabats, mixing ratios) at alpha=0.55 linewidth~0.28 — faint but visible.
