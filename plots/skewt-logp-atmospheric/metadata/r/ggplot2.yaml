review:
  strengths:
  - Correctly implements the highly specialized Skew-T Log-P coordinate system (logarithmic+inverted
    Y, 45°-skewed X) using ggplot2 standard aesthetics
  - 'Accurate atmospheric physics: Bolton 1980 approximations for saturation vapor
    pressure and pseudo-adiabatic lapse rate, Poisson dry adiabat formula, saturation
    mixing ratio calculation'
  - 'Excellent visual hierarchy: reference lines at alpha=0.55 and linewidth~0.28
    stay subordinate to 1.5-width sounding profiles'
  - Full theme adaptation with all chrome tokens correctly applied in both light and
    dark renders; data colors identical across themes
  - Dual encoding (color + linetype) for temperature vs dewpoint — CVD-safe and unambiguous
  weaknesses:
  - Legend does not label the reference line types (isotherms, dry adiabats, moist
    pseudo-adiabats, saturation mixing ratio lines) — reader unfamiliar with Skew-T
    cannot identify the four reference line families
  - Moist pseudo-adiabats (dotted blue = OKABE_ITO[3]) and saturation mixing ratio
    lines (long-dash sky blue = OKABE_ITO[6]) are difficult to visually distinguish
    due to similar hues at low alpha — consider more differentiated colors or linewidths
  image_description: |-
