review:
  strengths:
  - 'Perfect coordinate transformation: log-pressure Y-axis and 45°-skewed temperature
    X-axis implemented entirely within ggplot2''s standard x/y aesthetics without
    requiring specialized packages'
  - All four required reference line types (isotherms, dry adiabats, moist pseudo-adiabats,
    mixing ratios) computed from real atmospheric physics (Bolton 1980 approximations)
    — scientifically authentic
  - Excellent visual hierarchy through linewidth and alpha contrast (1.5 vs 0.28,
    full vs 0.55 alpha) puts primary data above reference elements — correct meteorological
    design practice
  - Fully theme-adaptive chrome with correct token usage; both light (#FAF8F1) and
    dark (#1A1A17) renders pass all readability checks with no dark-on-dark failures
  - 'Palette compliance: Temperature = brand green #009E73 as first series, Dewpoint
    = OI-2, reference lines follow OI order — data colors identical between themes'
  - Idiomatic ggplot2 with combined color+linetype unified legend, legend.position.inside,
    and guides(override.aes) for refined key sizing
  weaknesses:
  - Moist adiabat (dotted, linewidth=0.28, alpha=0.55) and mixing ratio (longdash,
    same size/alpha) lines are very faint — at smaller display sizes these may be
    hard to distinguish; consider increasing linewidth slightly to 0.35 for moist
    adiabats
  - Legend suppresses the linetype guide (linetype='none') while relying on the color
    guide to implicitly show linetypes — works in-plot but linetype distinction is
    subtle in the legend keys (minor)
  - Wind barbs (optional per spec) not included; omission is spec-compliant but would
    enhance meteorological utility
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 as required.
      Chrome: Title "Tropical Radiosonde Sounding · skewt-logp-atmospheric · r · ggplot2 · anyplot.ai" in bold dark ink, spans ~95% width (expected for long mandated title). Y-axis label "Pressure (hPa)" and X-axis label "Temperature (°C)" in dark ink at 10pt. Tick labels in INK_SOFT at 8pt — all readable. Panel border visible in INK_SOFT. Legend in bottom-right interior with ELEVATED_BG background and INK_SOFT border.
      Data: Temperature profile = thick solid green (#009E73) line. Dewpoint = thick orange-red (#D55E00) dashed line. Isotherms = gray diagonal lines skewed at 45°. Dry Adiabats = amber (#E69F00) thin dashed curves. Moist Adiabats = pink/purple (#CC79A7) thin dotted curves. Mixing Ratios = sky blue (#56B4E9) thin longdash lines (lower troposphere only). Horizontal isobar lines at standard levels.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 as required.
      Chrome: Title, axis labels, tick labels, and legend text all in light ink (#F0EFE8 / #B8B7B0) — clearly readable against dark background. No dark-on-dark failures observed. Panel border and legend frame visible.
      Data: All data colors identical to light render — green Temperature, orange Dewpoint, gray isotherms, amber dry adiabats, pink moist adiabats, sky blue mixing ratios. Only chrome flipped between themes.
