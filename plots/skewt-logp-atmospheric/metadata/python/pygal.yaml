review:
  strengths:
  - 'Correct Skew-T Log-P structure: log pressure axis with proper labels, skewed
    temperature coordinate, and diagonal isotherms all correctly implemented in a
    generic XY chart'
  - All required reference lines included (dry adiabat with proper theta=300K formula,
    mixing ratio with real thermodynamic equation, two isotherms)
  - 'Both PNG and HTML outputs generated; theme-adaptive colors correct for both renders
    with #FAF8F1 / #1A1A17 backgrounds'
  - 'Clean, reproducible flat script; correct Okabe-Ito palette order with #009E73
    as first series (Temperature)'
  - Realistic mid-latitude sounding data with physically plausible temperature/dewpoint
    values across 100-1000 hPa
  weaknesses:
  - 'Yellow (-20°C isotherm, Okabe-Ito position 7 #F0E442) used as a thin dashed line
    — style guide explicitly prohibits position 7 for thin lines or small markers
    on light surfaces due to low luminance; barely visible on #FAF8F1 background.
    Replace with Okabe-Ito position 8 neutral or a higher-contrast color for reference
    isotherms.'
  - Moist adiabat uses a constant 4°C/level decrement (t_current -= 4.0) instead of
    a physically-derived moist adiabatic lapse rate. Replace with the proper Poisson
    formula or standard atmospheric approximation for scientific accuracy.
  - Bottom pressure tick labels (1000, 925, 850 hPa) are cramped together due to log-scale
    compression — consider using fewer Y-axis ticks in the lower troposphere or increasing
    the bottom margin.
  - Large unused whitespace in the right third of the plot (x > 35 region empty) because
    reference lines don't extend there. Extend isotherms and adiabats further rightward
    or narrow xrange to avoid wasted canvas.
  - Legend with 7 entries in upper-left overlaps the data area. Consider placing legend
    outside the plot on the right to free up the data region.
