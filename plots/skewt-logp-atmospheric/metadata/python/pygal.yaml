review:
  strengths:
  - Physics-accurate moist adiabatic lapse rate integration using proper thermodynamic
    constants (MALR, latent heat, gas constants)
  - 'Excellent dual-encoding strategy: both color (Okabe-Ito) and dash patterns distinguish
    all 7 series — critical for CVD accessibility on a crowded Skew-T'
  - 'Perfect palette compliance: brand green first, full Okabe-Ito order, adaptive
    neutral correctly replaces yellow (prohibited for thin lines on light surfaces)'
  - Both light and dark themes render cleanly with no dark-on-dark failures; adaptive
    neutral for series 7 correctly flips between themes
  - Coordinate transformation (log-pressure Y-axis, 45° skew applied to X) is correctly
    implemented and produces a visually accurate Skew-T layout
  weaknesses:
  - Only 1 dry adiabat (θ=300K), 1 moist adiabat, and 1 mixing ratio line — a proper
    Skew-T shows a family of reference lines at regular intervals (e.g., dry adiabats
    every 10K from 270-320K, mixing ratios at 4, 8, 12, 16 g/kg)
  - Only 2 temperature isotherms vs the traditional full isotherm grid — add isotherms
    at every 10°C from -40°C to 30°C to create the hallmark Skew-T diagonal background
    grid
  - No annotations for key meteorological features (LCL level where temperature and
    dewpoint profiles intersect, CAPE region, or tropopause indicator) — viewer must
    self-interpret without guidance
