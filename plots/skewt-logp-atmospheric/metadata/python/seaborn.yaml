review:
  strengths:
  - Correct Skew-T coordinate transformation using tan(45°) slope and log(p0/p) offset,
    applied consistently to sounding data and all reference line sets.
  - All four reference line categories (isotherms, dry adiabats, moist adiabats, mixing
    ratio) implemented with distinct colors, line styles, and alpha levels that preserve
    readability of the primary profiles.
  - Idiomatic use of seaborn `units=` with `estimator=None` for reference line groups
    — avoids explicit loops in the plot call and is the library's intended mechanism
    for this pattern.
  - CAPE region fill_betweenx between temperature and dewpoint adds meteorological
    context and a genuine visual focal point.
  - Flawless theme adaptation in both renders — no dark-on-dark failures, correct
    background tokens, identical data colors.
  weaknesses:
  - 'Design Excellence below potential: no pressure-level annotations (text labels
    at 850, 700, 500 hPa) that would help orient readers unfamiliar with Skew-T diagrams;
    adding these as ax.text() calls on the right edge is low effort and high meteorological
    value.'
  - Moist adiabat formula `(theta_e - 30) * (p/1000)^0.30 - 273.15` is a crude empirical
    approximation; a more physically accurate parameterization (Bolton's equation
    or equivalent) would improve meteorological fidelity.
  - Mixing ratio lines (OKABE_ITO[3] at alpha=0.40, dotted) are borderline-visible
    in both renders, particularly at upper-troposphere pressure levels — reducing
    their alpha to 0.30 or restricting them more aggressively to below 600 hPa would
    reduce visual noise without losing information.
