      Data: Temperature profile in #009E73 (brand green) solid line with circle markers — correct first-series color. Dewpoint in #D55E00 (Okabe-Ito #2) dashed line with square markers. Dry adiabats in #E69F00 (Okabe-Ito #5), moist adiabats in #0072B2 (Okabe-Ito #3) dashed, mixing ratio in #CC79A7 (Okabe-Ito #4) dotted. Isotherms in INK_SOFT (gray). CAPE region shading in #E69F00 at low alpha between profiles. Skewed diagonal pattern of reference lines clearly visible.
