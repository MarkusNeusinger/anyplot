review:
  strengths:
  - 'Correct and complete Skew-T Log-P implementation: inverted log pressure axis,
    45° temperature skew, all four reference-line families (isotherms, dry adiabats,
    moist adiabats, mixing ratio).'
  - 'Flawless theme adaptation: #FAF8F1 / #1A1A17 backgrounds, all chrome tokens (INK,
    INK_SOFT, ELEVATED_BG) applied correctly; no dark-on-dark issues in either render.'
  - 'Perfect spec and code quality — all required features present, clean flat script,
    correct Okabe-Ito palette (temperature #009E73, dewpoint #D55E00).'
  - Correct canvas (2400×2400 square) with no bbox_inches='tight' drift; uses subplots_adjust
    for explicit padding control.
  - ScalarFormatter for clean decimal pressure labels on the log axis is an idiomatic
    and practical matplotlib detail.
  weaknesses:
  - Marker size s=60 is undersized for only 19 data points; style guide recommends
    s=200–400 for <30 points. Increase to s=80–120 minimum to make the pressure-level
    markers more prominent.
  - Reference lines in dark render are nearly invisible at alpha 0.10–0.13 on the
    near-black surface. Apply a slightly higher alpha in dark mode (0.15–0.20) so
    the background reference grid remains scientifically functional.
  - 'No meteorological data storytelling (DE-03=2): the diagram displays data without
    guiding the viewer to any insight. Adding CAPE/CIN shading between the temperature
    and dewpoint profiles via ax.fill_betweenx, or annotating the Lifted Condensation
    Level, would sharply improve scientific utility and visual narrative.'
  - 'Design sophistication at configured-default level (DE-01=4): no exceptional hierarchy
    or focal-point emphasis. Adding visual emphasis on the 500 hPa standard level
    (e.g., a bolder horizontal grid line) would lift the aesthetic toward publication
    quality.'
