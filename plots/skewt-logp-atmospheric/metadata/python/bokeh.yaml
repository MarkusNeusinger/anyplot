review:
  strengths:
  - 'Perfect spec compliance: all required Skew-T elements present (isotherms, dry
    adiabats, moist adiabats, mixing ratio lines, temperature, dewpoint, 0°C isotherm)'
  - Strong three-tier visual hierarchy guides viewer from background context to primary
    data profiles
  - Line style differentiation (solid/dashed/dotdash/dotted) provides semantic encoding
    beyond color
  - In-chart labels for reference line families keep the legend focused on primary
    data series
  - Correct skew transform applied consistently across all reference lines and data
    profiles
  - 'Full Bokeh interactivity: HoverTool shows pressure+temperature on hover, CrosshairTool,
    WheelZoomTool'
  - Both themes fully legible with correct Okabe-Ito palette and theme-adaptive chrome
  weaknesses:
  - '"Mixing Ratio" in-chart label positioned at x=-48 (almost at the left boundary
    of x_range=[-50, 50]) — risk of appearing cut or crowded; shift right slightly
    (e.g. x=-42)'
  - Mixing ratio dotted lines (1.2px, 40% alpha) are hard to distinguish from background
    isotherms in the lower-right portion of the plot — increase alpha to 0.55 and
    line_width to 1.5
  - DE-01 could be lifted toward publication-ready with a subtle warm-tone fill region
    between temperature and dewpoint profiles to encode moisture content visually
  - Moist adiabat approximation uses a very simplified lapse rate formula that doesn't
    match actual pseudoadiabat curves closely — acceptable for demonstration but meteorologically
    simplified
