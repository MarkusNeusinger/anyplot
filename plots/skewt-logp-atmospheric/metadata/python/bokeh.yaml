  - 'Near-perfect spec compliance: correctly implements Skew-T Log-P with logarithmic
    inverted pressure axis, skewed temperature coordinates, and all required reference
    lines (isotherms, dry/moist adiabats, mixing ratio lines)'
  - Excellent data quality with realistic radiosonde sounding profile covering surface
    to upper troposphere (1000–100 hPa) with physically plausible temperature and
    dewpoint lapse rates
  - 'Perfect code quality: clean KISS structure, reproducible seed (np.random.seed(42)),
    idiomatic Bokeh ColumnDataSource pattern used throughout'
  - 'Proper theme adaptation in both renders: correct #FAF8F1/#1A1A17 backgrounds
    with fully adaptive chrome (title, axes, ticks, legend all use INK/INK_SOFT tokens)'
  - 'Good visual hierarchy: prominent sounding profiles (line_width=5, alpha=0.85,
    size=14 markers) vs appropriately subdued reference lines (alpha=0.35–0.45); 0°C
    isotherm highlighted at alpha=0.85 as a meteorologically significant threshold'
  weaknesses:
  - 'Design excellence below publication threshold: Bokeh plot outline remains visible
    (fig.outline_line_color = INK_SOFT creates a visible box frame around the plot);
    removing spines or using None would create a cleaner, more modern aesthetic'
  - 'Reference line categories use similar alpha levels (0.35–0.45) making them harder
    to distinguish visually — vary more aggressively: e.g. isotherms at alpha=0.20,
    dry/moist adiabats at alpha=0.50, mixing ratio at alpha=0.40'
  - Annotation labels ('Dry Adiabats', 'Moist Adiabats', 'Mixing Ratio') at 28pt create
    a noticeable font size gap relative to the 42pt axis labels; increase to 32–34pt
    for better visual proportion
  - 'Library Mastery: HoverTool and HTML export are used but Bokeh''s interactive
    strengths could be pushed further — e.g., adding a BoxZoomTool or PanTool to the
    HTML artifact for better user exploration of the sounding'
