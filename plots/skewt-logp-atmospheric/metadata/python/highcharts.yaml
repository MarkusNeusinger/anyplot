review:
  strengths:
  - 'Complete Skew-T meteorological framework: isotherms, dry adiabats, moist adiabats,
    and mixing ratio lines all correctly computed using standard thermodynamic equations
    (Poisson lapse, Clausius-Clapeyron)'
  - Excellent use of Highcharts linkedTo/id pattern to cleanly group many reference
    line series under single legend entries without cluttering
  - Full, correct theme adaptation across light and dark renders — chrome tokens (background,
    INK, INK_SOFT) applied consistently to every chart element
  - Meteorologically realistic sounding data with physically plausible temperature
    and dewpoint profiles
  - PIL normalization guard ensures exact 3200x1800 output dimensions even if CDP
    rounding occurs
  weaknesses:
  - Font sizes are slightly below the Highcharts recommended values (title 56px vs
    66px recommended, axis labels 48px vs 56px, tick labels 40px vs 44px) — bump each
    up to the recommended sizes for better mobile-scaled readability
  - The temperature isotherms are skewed using x = T - (1-yfrac)*SKEW_FACTOR, which
    produces a left-skew (non-standard) rather than the meteorological convention
    of right-skew (x = T + (1-yfrac)*SKEW_FACTOR). The spec specifies 'skewed to the
    right.' Flip the sign to conform to the standard Skew-T convention
  - Reference line types (dry adiabats in blue, moist adiabats in pink, mixing ratios
    in orange dotted) have opacity values (0.35-0.60) that at render scale cause them
    to appear visually similar to the gray isotherms. Consider slightly higher opacity
    (0.55-0.75) or slightly thicker lineWidth for the colored adiabats/mixing ratios
    to make them more distinguishable from the plain isotherms
  - LineSeries imported from highcharts_core.options.series.area — should be from
    highcharts_core.options.series.line import LineSeries for canonically correct
    import
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme background with elevated plot area (#FFFDF6)
      Chrome: Title "skewt-logp-atmospheric · python · highcharts · anyplot.ai" in dark ink at top — readable. X-axis label "Temperature (°C)" and Y-axis label "Pressure (hPa)" both visible in INK_SOFT (#4A4A44). Tick labels present at standard pressure/temperature intervals. Legend upper-right with all 6 series labeled.
      Data: Temperature profile in #009E73 (first Okabe-Ito, solid thick line with circular markers). Dewpoint profile in #D55E00 (dashed thick with markers). Background reference lines in blue (dry adiabats), pink (moist adiabats), orange dotted (mixing ratios), gray dashed (isotherms) — all semi-transparent.
      Legibility verdict: PASS — all text elements are readable against the warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme background with elevated plot area (#242420)
      Chrome: Title, axis labels, and tick labels rendered in light text (#F0EFE8 / #B8B7B0) — clearly readable against dark background. No dark-on-dark failure detected. Legend background uses #242420 (elevated dark) with visible text.
      Data: Temperature profile #009E73 and dewpoint profile #D55E00 are identical in color to the light render — only chrome has adapted. Reference lines faintly visible against dark elevated background.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark text failure observed
