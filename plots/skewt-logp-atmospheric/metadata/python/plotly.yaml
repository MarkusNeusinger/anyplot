  - 'Fully implements all required Skew-T elements: isotherms, dry adiabats (Poisson-correct
    θ), moist adiabats (numerically integrated SALR), mixing ratio lines, and LCL
    annotation with arrow'
  - Proper theme adaptation across both renders — background, title, axis labels,
    tick labels, legend, and annotation all use correct tokens; data colors are identical
    between light and dark
  - 'Excellent code quality: minimal helper functions justified by the mathematics
