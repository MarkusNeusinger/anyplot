    and creates a clear focal point; reference line opacities are tuned to remain
    background elements without distracting from profiles
  weaknesses:
  - Legend contains 6 entries and is positioned inside the plot area at top-left (x=0.02,
    y=0.98), consuming a large portion of the upper region where high-altitude sounding
    data lives — moving it outside the plot (x=1.01) or reducing item count would
    free visual space
  - 'No explicit spine removal: Plotly default retains all 4 plot borders; removing
    top and right spines (xaxis/yaxis showline settings) would improve visual refinement
    per style guide'
  - Moist adiabat lines (C_MOIST blue dotted) are very subtle in the light render
    and nearly indistinguishable from isotherms without careful inspection — increasing
    opacity slightly (e.g. 0.35 → 0.50 in light) would aid readability
  - Reference line legend entries (Isotherms, Dry Adiabats, Moist Adiabats, Mixing
    Ratio) have thin, faint line indicators in the legend swatch — at small render
    sizes (400 px mobile) these may be illegible; a slightly thicker swatch line or
    increased legend indicator width would help
