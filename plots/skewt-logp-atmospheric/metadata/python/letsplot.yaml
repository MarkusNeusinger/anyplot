review:
  strengths:
  - 'Full spec compliance — all required Skew-T features present: skewed isotherms,
    logarithmic inverted pressure axis, dry adiabats, moist adiabats, mixing ratio
    lines, temperature and dewpoint profiles with correct line styles'
  - Excellent code quality — clean KISS structure, deterministic seed, all imports
    used, no over-engineering
  - 'Proper theme-adaptive chrome — warm #FAF8F1 / #1A1A17 backgrounds, INK/INK_SOFT
    tokens correctly applied throughout, both renders fully readable'
  - Strong visual hierarchy between data profiles (thick size=2.0 lines with size=3.0
    point markers) and background reference lines (thin, semi-transparent alpha=0.5–0.8)
  - Interactive tooltips via layer_tooltips() with pressure and temperature values,
    plus HTML export — idiomatic use of letsplot's distinctive interactive features
  weaknesses:
  - 'Okabe-Ito palette not in canonical 1→N order — positions 4 and 5 are swapped
    (dry adiabat uses position 5 #E69F00, moist adiabat uses position 4 #CC79A7) and
    position 3 (#0072B2 blue) is skipped entirely; should follow 1,2,3,4,5,6 order'
  - Manual legend placed inside plot area at x=95–114 interacts visually with the
    dense diagonal reference lines (isotherms, adiabats) in the upper-right, creating
    some busyness and minor visual noise
  - No CAPE/CIN shading or atmospheric feature annotations (tropopause level, lifting
    condensation level) — the Skew-T diagram is technically complete but tells no
    meteorological story to guide the viewer
  - 'DQ-03: Temperature profile lacks a clear stratospheric temperature inversion
    — values at 200–100 hPa oscillate between -55 and -58 without the expected steady
    increase into the stratosphere'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "skewt-logp-atmospheric · python · letsplot · anyplot.ai" in dark INK text, fully visible at ~75% of plot width. Y-axis label "Pressure (hPa)" and X-axis label "Temperature (°C)" both in dark text with units, readable. Tick labels in INK_SOFT (#4A4A44) at 100–1000 hPa on Y-axis and -100 to 160 on X-axis — all clearly legible.
      Data: Temperature profile in #009E73 (Okabe-Ito position 1) solid thick line with data point markers, running from ~25°C at 1000 hPa up to the left as pressure decreases. Dewpoint profile in #D55E00 dashed thick line with markers, always left of the temperature profile (correct meteorological relationship). Reference lines: isotherms as thin gray diagonal lines skewed ~45° to the upper right; dry adiabats in #E69F00 orange dashed; moist adiabats in #CC79A7 reddish-purple dotdash; mixing ratio lines in #56B4E9 sky-blue dotted. Manual legend in upper-right clearly lists all 5 series with colored line swatches.
      Legibility verdict: PASS — all text readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title and axis labels render in light #F0EFE8 (INK token for dark theme), clearly visible. Tick labels in #B8B7B0 (INK_SOFT dark) — readable against the dark background. No dark-on-dark failures observed. Legend background elevated to #242420 with light text — correctly themed.
      Data: Temperature #009E73 green and Dewpoint #D55E00 vermillion are identical to the light render — only chrome (background, text, legend box) flipped. All five reference line types maintain same colors as light render.
      Legibility verdict: PASS — all text readable against the warm near-black background; no dark-on-dark text issues.
