      Data: Temperature profile — thick solid red (#CC0000) line running from bottom-right (surface ~+25°C) to upper-left (stratosphere ~-55°C). Dewpoint profile — thick dashed blue (#0066CC) line consistently to the left of temperature (lower dewpoint). "T" and "Td" inline annotations in matching colors at ~600 hPa. Reference lines: blue diagonal isotherms (10°C spacing), orange dashed dry adiabats, green dotted moist adiabats, purple dash-dot mixing ratio lines. Horizontal isobars in soft gray. All line types distinguishable. First data series is #CC0000 (NOT #009E73 — palette non-compliant).
