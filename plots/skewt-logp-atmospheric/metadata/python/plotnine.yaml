review:
  strengths:
  - 'Correct Skew-T Log-P structure: inverted log-pressure y-axis, 45-degree skewed
    isotherms, and all required reference lines (dry adiabats, moist adiabats, mixing
    ratios) present'
  - Excellent spec compliance — all 4 reference line types implemented with correct
    thermodynamic formulas
  - 'Strong visual hierarchy: thick profiles (size=2.5) stand out clearly against
    thinner reference lines (size=0.6)'
  - Realistic synthetic atmospheric sounding with proper troposphere lapse rate and
    stratospheric isothermal layer around 200 hPa
  - 'Very idiomatic plotnine usage: unified legend via matching `name` in scale_color_manual
    + scale_linetype_manual, multi-layer composition with inherit_aes=False, log transform
    via trans=''log10'''
  - 'Theme-adaptive chrome correctly applied: backgrounds, text, legend box all switch
    between light (#FAF8F1) and dark (#1A1A17) themes'
  - T and Td inline annotations help orient the viewer to the two profiles without
    cluttering the plot
  weaknesses:
  - 'VQ-07 FAIL: Non-Okabe-Ito categorical palette. Temperature uses #CC0000 (red),
    Dewpoint uses #0066CC (blue) — the first series must be #009E73 (brand green).
    All 6 line types must follow Okabe-Ito order: Temperature=#009E73, Dewpoint=#D55E00,
    Isotherms=#0072B2, Dry Adiabats=#CC79A7, Moist Adiabats=#E69F00, Mixing Ratios=#56B4E9.
    The thick line width still distinguishes profiles from reference lines regardless
    of color choice.'
  - 'CQ-01 minor: skew_transform() helper function defined — the KISS rule discourages
    function definitions. Inline the 2-line formula at call sites or accept the minor
    penalty.'
  - 'DE-02: All 4 panel borders kept — consider removing top and right spines to lighten
    the chart frame, though for a Skew-T the full box is arguably appropriate given
    the data plotted near all edges.'
  - Isotherms have no temperature value labels printed on them — a real Skew-T annotates
    each isotherm at the bottom edge with its temperature value (e.g., -20, -10, 0,
    10°C). Consider adding small text labels at the bottom of each isotherm segment.
  - 'VQ-04: The custom color scheme (red for T, blue for Td) introduces potential
    red-green CVD issues since green moist adiabats and red temperature can be confused.
    Switching to Okabe-Ito resolves this.'
