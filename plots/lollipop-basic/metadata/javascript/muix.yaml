review:
  strengths:
  - 'Correct use of MUI X composable pattern: ChartContainer + ChartsGrid/XAxis/YAxis
    + custom SVG via useXScale/useYScale hooks is the idiomatic way to render custom
    mark types in MUI X'
  - 'Correct Imprint palette usage: brand green (#009E73) as the single data color,
    correct warm backgrounds in both themes'
  - 'Full spec compliance: stems from baseline, circular markers, 12 genres, sorted
    by value, horizontal orientation for long labels'
  - Realistic and neutral dataset (book sales by genre) with plausible values
  - Both light and dark renders are theme-correct with all chrome elements readable
  weaknesses:
  - Missing skipAnimation on ChartContainer — the library guide requires this on every
    chart component to guarantee the final paint is captured in the screenshot
  - No value labels on the lollipop circles — adding them would improve readability
    and eliminate the need for precise grid reading
  - 'No visual storytelling: the top genre (Children''s) or the performance gap between
    top-3 and the rest could be highlighted through opacity variation or a reference
    annotation'
  - Grid opacity not explicitly set — relies on MUI X default; explicit rgba values
    matching the style guide's grid token would be more correct
  image_description: |-
