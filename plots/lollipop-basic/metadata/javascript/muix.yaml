review:
  strengths:
  - Implements lollipop chart correctly using MUI X's low-level ChartContainer + useXScale/useYScale
    hook composition, which is exactly the idiomatic approach for custom chart types
    that lack a native component
  - Opacity-based visual hierarchy (top 3 genres at opacity=1.0, remaining at 0.6)
    creates an effective focal point that immediately draws the viewer's eye to the
    top performers
  - 'Perfect palette compliance: t.palette[0] (#009E73) used throughout, and theme-adaptive
    chrome (t.ink, t.inkSoft) correctly wires title and tick labels to be readable
    in both light and dark renders'
  - Realistic, neutral dataset (annual book sales by genre in millions) with plausible
    values and correct descending sort order across 12 categories
  - All font sizes explicitly set (title 22px, axis label 15px, tick labels 13-14px,
    value labels 12px); proportions are well-balanced and no overflow is present
  - Vertical-only grid lines are a good aesthetic choice for a horizontal lollipop
    — the direction of comparison is horizontal, so only vertical reference lines
    add value
  weaknesses:
  - 'Duplicate header block: the impl-review.yml header-rewrite prepended the new
    quality header (lines 1-4) but the original skeleton header (lines 6-10) after
    the //# directive was not removed, leaving two // comment blocks in sequence —
    cosmetic but messy'
  - Spines (axis border lines) are still present; MUI X doesn't make spine removal
    trivial, but setting the axisLine styles via slotProps or sx selectors to hide
    the top/right frame edges would give a cleaner minimal look
  - Value labels next to dots are fontSize=12 (CSS px), the smallest text element
    in the chart — bumping to 13-14px to match tick label sizing would improve readability
    and hierarchy consistency
  - Grid strokeOpacity is set to 0.5 via sx which is somewhat prominent — a value
    of 0.25-0.35 would be more subtle and let the data elements read more cleanly
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, no pure white
      Chrome: Title "lollipop-basic · javascript · muix · anyplot.ai" in dark text (~22px), clearly centered at top. Y-axis genre labels in dark secondary text (14px), X-axis "Annual Sales (millions of units)" label in dark text (15px), tick numbers in dark secondary text (13px) — all readable against the light surface. No dark-on-light contrast failures.
      Data: Horizontal lollipop stems in #009E73 (brand green), circular markers in #009E73 (r=11 CSS). Top 3 entries (Children's 22.1, Romance 18.7, Thriller 16.3) at full opacity=1.0; remaining 9 genres at opacity=0.6 for visual hierarchy. Small numeric value labels (12px) to the right of each dot. Subtle vertical grid lines across the plot area. 12 categories sorted descending by value, from Children's at top to Literary Fiction at bottom.
      Legibility verdict: PASS — all title, axis labels, tick labels, and value labels are readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct anyplot dark surface, no pure black
      Chrome: Title in light-colored text (clearly readable), Y-axis genre labels in light secondary text, X-axis label and tick numbers in light text — all visible against the dark surface. The MUI X ThemeProvider correctly inverts chrome via ANYPLOT_TOKENS. No dark-on-dark failures observed.
      Data: Lollipop stems and circles in identical #009E73 brand green — matches the light render exactly, as required (data colors are theme-independent). Opacity gradient for top-3 emphasis is preserved. Value labels visible in light text (t.inkSoft).
      Legibility verdict: PASS — all chrome elements (title, axis labels, tick labels, value labels) are light-colored and readable against the near-black background. No dark-on-dark failures.
