review:
  strengths:
  - Correct lollipop chart implemented idiomatically using Highcharts column (stems,
    pointWidth:3) + scatter (dots) combination — the canonical Highcharts approach
  - 'Perfect spec compliance: vertical orientation, thin stems, circular markers,
    ascending sort, 10 categories all present'
  - 'Brand green #009E73 (t.palette[0]) correctly used as the single series color;
    colors array set to t.palette; data colors identical across both themes'
  - 'Intentional visual hierarchy: top performer (Smartphone) has a larger dot (radius:12
    vs 9), creating a clear focal point'
  - All chrome elements properly use theme tokens (t.ink, t.inkSoft, t.grid, t.pageBg)
    — passes both theme-readability checks cleanly
  - Marker outline uses t.pageBg as lineColor, creating a subtle but effective visual
    separation between dot and stem
  - Data labels formatted with 'K' suffix show exact values above each dot; verticalAlign
    and y-offset positioned cleanly above markers
  - Realistic, neutral dataset (Q1 tech product sales) with plausible range 12K–94K;
    sorted ascending improves ranking clarity
  - 'Clean code: no functions/classes, hard-coded deterministic data, animation:false
    on both chart and series, credits disabled'
  weaknesses:
  - Data label fontSize is 11px CSS (22px native) — below the recommended ~14px for
    secondary text elements; slightly hard to read when the chart is scaled to mobile
    width (~400px). Increase to 12–13px.
  - 'DE-01: Design is clean but aesthetic sophistication is modest — the only hierarchical
    device is the single enlarged dot on the top performer. The design could benefit
    from a subtle fill-opacity gradient on stems or a contrasting annotation for the
    max value to strengthen the focal point.'
  - 'DE-02: Minor refinement opportunities remain — the x-axis baseline line (lineColor:
    t.inkSoft) is still rendered; removing it entirely would match the minimal-chrome
    standard. The bottom spine is not harmful but removing it would be more consistent
    with the rest of the clean treatment.'
  - 'DE-03: Data storytelling is present (ascending sort + top-performer emphasis)
    but subtle. A brief subtitle or max-value callout annotation could reinforce the
    narrative for readers who don''t notice the size variation.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct light theme surface, not pure white.
      Chrome: Title "lollipop-basic · javascript · highcharts · anyplot.ai" in dark ink (~22px bold) clearly readable; "Product Category" x-axis label and "Units Sold (thousands)" y-axis label in inkSoft at 16px readable; x-axis tick labels (Smart Watch, Tablet, … Smartphone) in inkSoft at 14px readable; y-axis tick labels (0, 10, 20, … 100) at 14px readable; subtle horizontal grid lines in low-opacity ink. No tick marks on axes (transparent tickColor). Data value labels ("12K", "18K", … "94K") in ink color at 11px CSS — visible but slightly small.
      Data: All 10 lollipops rendered in brand green #009E73. Stems are thin columns (width ~3px CSS), extending from y=0 to each value. Circular scatter dots at each value with a subtle pageBg outline ring. Top performer (Smartphone, 94K) has a visibly larger dot than the rest. Ascending sort left-to-right creates clear ranking narrative.
      Legibility verdict: PASS — all text and data elements clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title, axis labels, and tick labels all flip to near-white/light-ink tones — no dark-on-dark failure observed. Grid lines adapt to low-opacity light rule. Data value labels above dots appear in light ink tone, readable against the dark background.
      Data: Stem color and dot color are identical to the light render (brand green #009E73 — theme-independent Imprint palette correctly applied). Marker outlines adapt because lineColor is t.pageBg, which flips from cream to near-black, making the outline blend in — a minor cosmetic difference between themes but not a defect.
      Legibility verdict: PASS — all text and data elements clearly readable against the warm near-black background. No dark-on-dark failures.
