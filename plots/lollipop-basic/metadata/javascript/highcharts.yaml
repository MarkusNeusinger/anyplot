      Background: Warm off-white surface — matches #FAF8F1 closely. PASS.
      Chrome: Title "lollipop-basic · javascript · highcharts · anyplot.ai" rendered in dark bold text (~22px), clearly readable. Y-axis title "Units Sold (thousands)" visible in secondary dark text. X-axis category tick labels (Smart Watch through Smartphone) clearly legible in muted dark text. Y-axis numeric tick labels (0, 10, 20, … 100) all readable.
      Data: 10 lollipops in brand green (#009E73) with thin 3px-wide column stems and circular scatter dot markers (radius 9). Dot markers have a subtle warm-white outline matching pageBg. Horizontal grid lines are visible but very subtle.
      Layout: Clean, generous spacing (40/30/30/30). No overflow. No clipping. Legend correctly omitted (single series). Data sorted ascending left to right.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background.

