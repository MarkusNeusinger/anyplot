      Data: Brand green (#009E73) markers and stems identical to the light render — data colors unchanged as required. Dot markers have a subtle dark outline matching the dark pageBg. Grid lines are faintly visible against the dark background.
      Legibility verdict: PASS — all text is clearly readable against the dark background. No dark-on-dark issues detected.
