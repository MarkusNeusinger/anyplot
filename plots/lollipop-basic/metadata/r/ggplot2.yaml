review:
  strengths:
  - 'Perfect spec compliance: horizontal lollipop with stems (geom_segment) and circular
    markers (geom_point), sorted descending for clear visual hierarchy'
  - Realistic, neutral data domain (aerobic fitness index by sport discipline) with
    12 categories in the spec-recommended range and plausible score values
  - 'Both renders theme-correct: #FAF8F1 light background and #1A1A17 dark background
    with properly adaptive chrome tokens (INK/INK_SOFT)'
  - All text legible in both themes with explicitly set font sizes (title=12pt, axis.title=10pt,
    tick labels=8pt)
  - 'Clean code: flat script structure, set.seed(42), all imports used, saves as plot-{THEME}.png
    via ragg device'
  - 'Single-series data correctly uses brand green #009E73 as the sole marker color'
  - Horizontal orientation is a sensible choice for 12 categories with multi-word
    labels
  weaknesses:
  - Grid lines use full-opacity INK color (`panel.grid.major.x = element_line(color
    = INK, ...)`) instead of a subtle transparent approximation. In the light theme,
    dark near-black grid lines are visibly prominent, competing with the thin stems.
    Replace with a faint color like `paste0(substr(INK, 1, 7), '26')` or use `alpha
    = 0.15` equivalent (e.g., `colorspace::adjust_transparency(INK, 0.15)` or fixed
    `'#E0DED7'` for light / `'#333330'` for dark). The RULE token in the style guide
    specifies rgba with ~15% opacity.
  - Marker size (size=3.5) is undersized for a 3200×1800 canvas with only 12 sparse
    data points. At high resolution, the dots are visible but smaller than ideal.
    Increase to size=5.0 to make the data focal points more prominent.
  - axis.text.y uses INK (full primary ink color) instead of INK_SOFT for the category
    labels. The canonical template uses INK_SOFT for all axis text elements (`axis.text
    = element_text(color = INK_SOFT)`). The y-axis labels should match the x-axis
    tick label styling.
  - No visual storytelling beyond sorted order — the plot shows the ranking but provides
    no emphasis. Consider annotating the top performer (Triathlon) or the bottom performer
    (Hiking), or using a subtle gradient/size variation to create a focal point without
    requiring interactivity.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "lollipop-basic · r · ggplot2 · anyplot.ai" at 12pt in dark ink, spanning ~42% of canvas width — fully readable and well-proportioned. Y-axis category labels (Triathlon through Hiking) rendered in dark near-black INK color; readable but slightly darker than the canonical INK_SOFT recommendation. X-axis tick labels (60, 70, 80, 90, 100) and "Aerobic Fitness Index" label in dark ink — readable. Vertical grid lines (at 70, 80, 90, 100) use full-opacity INK (#1A1A17) at linewidth=0.2, making them more prominent than the style guide's ~15%-opacity RULE token specifies.
      Data: 12 green (#009E73) circular markers at correct score values, connected by thin gray stems extending from baseline=60. Markers are visible but size=3.5 is on the smaller side for a high-res canvas. Data is sorted descending (Triathlon at top, Hiking at bottom), creating a clear ranking hierarchy.
      Legibility verdict: PASS — all elements readable; no dark-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title visible in light cream (#F0EFE8-equivalent) text. Category labels (y-axis) and tick labels are rendered in light colors — readable against the dark background. "Aerobic Fitness Index" x-axis label is clearly legible. Vertical grid lines appear in light gray/cream (INK in dark theme = #F0EFE8), still somewhat prominent but on a darker background the contrast is less harsh than in the light render. No dark-on-dark text failures observed.
      Data: Green (#009E73) markers are identical to the light render — correct Imprint palette behavior (data colors do not flip between themes). Stems rendered in lighter gray (INK_SOFT in dark = #B8B7B0) — appropriate contrast.
      Legibility verdict: PASS — all text elements readable against dark background; no dark-on-dark failures.
