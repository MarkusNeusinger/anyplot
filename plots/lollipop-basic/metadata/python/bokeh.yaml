review:
  strengths:
  - Brand green (#009E73) used consistently for stems and circular markers
  - White outline ring on scatter markers (line_color=PAGE_BG) adds professional definition
  - Average reference line with dashed style and annotation contextualizes the data
  - Value labels above each marker make values immediately readable without requiring
    axis lookup
  - Data sorted descending creates natural visual hierarchy guiding viewer from highest
    to lowest
  - Theme-adaptive chrome thoroughly applied — all ink tokens set for both light and
    dark renders
  - 'Excellent Bokeh idioms: ColumnDataSource, Span, NumeralTickFormatter, Label models'
  - NumeralTickFormatter for y-axis dollar formatting is a polished library-specific
    touch
  weaknesses:
  - Average reference line label uses INK_MUTED for the reference line annotation
    text which is good, but the label text at 22pt is noticeably smaller than the
    34pt tick labels — consider bumping to 26-28pt for better readability at mobile
    scale
  - Single brand-green color for all lollipops misses an opportunity to emphasize
    outliers (e.g. Compute at $94K could be highlighted via a slightly larger marker
    or bolder stem) — color or size variation would elevate the storytelling
  - X-axis tick labels are rotated at 0.5 radians which creates a slightly awkward
    angled look — consider 0.7-0.8 radians for a steeper slant or π/4 for 45° diagonal
    which reads more cleanly
  - 'DE-02: Minor tick lines are explicitly set to None (good) but major tick lines
    are still the default size — styling major_tick_line_width smaller would further
    refine the chrome'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, clearly not pure white.
      Chrome: Title "lollipop-basic · python · bokeh · anyplot.ai" in bold dark ink, ~60-65% of canvas width, well-proportioned. X-axis label "Cloud Service" and Y-axis label "Monthly Spend (USD)" in dark INK at 42pt — balanced and readable. Tick labels in INK_SOFT at 34pt — legible. X-axis categories rotated ~28° to avoid overlap. Y-axis formatted as "$0"–"$100,000" in dollar notation.
      Data: 10 lollipops all in brand green #009E73 with white outline rings, sorted descending (Compute $94K → Monitoring $6K). Stems as thin vertical lines from baseline. Circular markers prominently visible. Value labels ("$94K", "$67K", etc.) in INK_SOFT above each marker. Dashed average reference line with "Avg: $34.7K" annotation in INK_MUTED. Y-only subtle grid at 10% alpha.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, clearly not pure black.
      Chrome: Title in light #F0EFE8 ink — readable. Axis labels and tick labels in INK_SOFT (#B8B7B0) — clearly legible against the dark surface. No dark-on-dark failures observed.
      Data: Identical brand green #009E73 lollipops with white-ring markers — data colors unchanged from light render as required. Value labels in INK_SOFT (#B8B7B0) remain visible. Average reference line and annotation adapt correctly to dark chrome.
      Legibility verdict: PASS — all text readable against the near-black background. Chrome correctly flips while data colors remain identical to the light render.
