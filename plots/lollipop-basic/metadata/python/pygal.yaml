      Chrome: Title "lollipop-basic · python · pygal · anyplot.ai" appears at top-center in dark text, ~50% canvas width, clearly readable. Y-axis title "Product Category" rotated vertically, dark text, readable. X-axis title "Sales (units)" at bottom, dark text, readable. X-axis tick labels (0–900 in increments of 100) and y-axis category labels (Smartphones through Gaming) are dark and legible. No grid lines (intentional).
      Data: 8 horizontal lollipop stems. Top item "Smartphones" (892 units) has a brand green (#009E73) stem and dot, clearly standing out. All other 7 items have muted gray (#6B6A63) stems and dots, creating a deliberate visual hierarchy. Dots (circles) are clearly visible at each value tip. Data sorted descending by value.
      Legibility verdict: PASS — all text elements are clearly readable against the light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
