      Data: Smartphones lollipop retains brand green (#009E73) — identical to light render. Other 7 items show muted gray (#A8A79F dark variant) stems and dots — distinctly visible against the dark background. Color identity preserved across themes.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures.
