review:
  strengths:
  - Correct lollipop chart with geom_segment stems + geom_point markers + geom_text
    value labels
  - Full theme-adaptive chrome — all text, grid, and background colors adapt correctly
    between light and dark renders
  - Uses layer_tooltips() — a feature distinctive to lets-plot — for rich interactive
    HTML tooltips
  - Data sorted ascending, creating a natural left-to-right visual ranking that communicates
    product category performance
  - 'Comprehensive spec compliance: correct vertical orientation, sorted data, circular
    markers, thin stems, value labels'
  weaknesses:
  - Value labels (geom_text) overlap slightly with the top edge of dot markers for
    shorter lollipops (Beauty, Grocery) — label_y offset of max(values)*0.028 (~1266
    units) is insufficient to clear the large size=10 dots; increase offset to max(values)*0.055
    or size the label_y as value + y_ceiling*0.05
  - Design has no focal point or emphasis on the top performer (Electronics at $45,200)
    — adding a contrasting fill or small annotation for the highest-value bar would
    create visual hierarchy and stronger data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "lollipop-basic · python · letsplot · anyplot.ai" in dark ink (#1A1A17), centered, ~65% of canvas width. Y-axis label "Sales ($)" and X-axis label "Product Category" in dark ink, clearly readable. Tick labels in INK_SOFT (#4A4A44) gray: y-axis ticks show $0–$50,000 in $10,000 increments; x-axis labels show 8 category names rotated 45° (Beauty → Electronics, ascending). Horizontal-only grid lines in muted beige (#D6D3C7), subtle.
      Data: 8 lollipops in brand green (#009E73). Stems are thin vertical segments; markers are large circular dots (size=10) with subtle INK_SOFT edge stroke. Dollar value labels appear near the top of each dot in INK_SOFT gray — for shorter lollipops (Beauty $9,800, Grocery $12,400) the labels visually crowd or slightly overlap the top edge of the large dots.
      Legibility verdict: PASS — all chrome text readable. Minor concern: value labels for shorter lollipops are cramped against dot markers, creating slight visual crowding.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title visible in light cream (#F0EFE8), clearly readable. Y-axis and X-axis labels in light cream, readable. Tick labels in INK_SOFT (#B8B7B0) light gray — all readable against dark background. Grid lines in #3A3A34 (very dark gray), subtle but visible.
      Data: Stems and dot fills are identical brand green (#009E73) as in light render — data colors correctly unchanged. Value labels appear in light gray (#B8B7B0) against the dark background — readable, with same slight crowding near dot tops for shorter bars.
      Legibility verdict: PASS — no dark-on-dark failures. All text is light-colored and readable. Data colors identical to light render (only chrome flipped).
