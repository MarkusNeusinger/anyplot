review:
  strengths:
  - 'Excellent theme-adaptive implementation: both renders fully correct with proper
    chrome token usage throughout (INK, INK_SOFT, INK_MUTED, PAGE_BG)'
  - 'Creative and honest static interpretation of an interactive spec: small-multiples
    approach correctly shows all three hierarchy levels simultaneously'
  - Purple HIGHLIGHT borders on selected tiles immediately draw the eye along the
    drill path — strong visual storytelling device
  - anyplot_seq colormap correctly used for sequential choropleth data; gradient range
    [0.15, 0.95] avoids flat endpoint colors
  - FancyArrowPatch via fig.transFigure between panels is an elegant matplotlib-specific
    technique for inter-panel visual connectors
  - 'Perfect code quality: clean, deterministic, no over-engineering, no fake UI elements'
  weaknesses:
  - Color scale is normalized within each level separately (separate vmin/vmax per
    panel), but the spec requires a consistent color scale across all levels so values
    at different levels can be meaningfully compared — fix by computing a single global
    vmin/vmax across all data and applying it uniformly to all three panels, updating
    the colorbar to show the actual data range
  - Tile-grid representation lacks geographic fidelity — for a spec titled 'Drillable
    Geographic Map,' using an established tile-grid map layout (e.g., the NPR US states
    tile grid with cardinal-direction-aligned positions) would significantly improve
    geographic authenticity while remaining static
  - Level 1 (World Regions) panel has 6 tiles in a sparse 3x3 grid with several empty
    positions, making it visually unbalanced compared to the denser 10-tile panels
    — tighten the xlim/ylim to reduce unused whitespace in that panel
  - Tile value labels at 5.5pt are the smallest text element; bump to 6pt for slightly
    better mobile readability
  image_description: |-
