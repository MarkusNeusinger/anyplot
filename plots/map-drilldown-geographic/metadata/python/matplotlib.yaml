      Data: Tile colors (anyplot_seq gradient) are pixel-identical to light render — same green-to-blue range. Purple highlight borders and arrows unchanged (palette position 2, theme-invariant). White BOX_TEXT on tiles remains same contrast on colored tile backgrounds.
