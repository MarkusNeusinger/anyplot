review:
  strengths:
  - Three-level drill-down hierarchy clearly communicated via side-by-side panels
    with directional arrows
  - Consistent anyplot_seq colormap across all hierarchy levels enables cross-level
    comparison
  - FancyBboxPatch with rounded corners and HIGHLIGHT color (#9418DB) for selected
    regions creates stylistic cohesion
  - Breadcrumb navigation shown as static text at bottom of each panel - accurate
    static adaptation of the interactive spec
  - PatchCollection and FancyArrowPatch with fig.transFigure transform demonstrate
    idiomatic matplotlib usage
  - 'Perfect theme adaptation: warm off-white/near-black backgrounds, all chrome tokens
    correctly applied in both renders'
  - Colorbar with global normalization allows meaningful comparison across all three
    administrative levels
  weaknesses:
  - Box text fontsize=6 for value labels may be challenging to read at mobile widths
    (~400px scaled PNG)
  - 'SC-01 deduction: geographic boxes instead of actual geographic shapes loses the
    map character of the spec'
  - Colorbar tick labels mix units inconsistently ($1.2M at bottom, $157B and $312B
    at top) which may confuse readers
  - 'DQ-03 minor: scale ratio of ~260,000x between Santa Monica ($1.2M) and Asia ($312B)
    is extremely wide and somewhat unrealistic for a single company dataset'
  - 'DE-01 not exceptional: design is polished but not reaching publication-ready
    territory (no geographic visual metaphor)'
  - Panel 1 layout slightly dense - 6 regions spread across 3 columns with some visual
    gaps vs. panels 2-3 which are more compact
  image_description: |-
