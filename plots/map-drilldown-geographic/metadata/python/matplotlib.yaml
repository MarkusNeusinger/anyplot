      Data: Colored boxes using anyplot_seq (green #009E73 at low values → dark azure #003D94 at high values). Box labels (region abbreviations) and values in BOX_TEXT (#F0EFE8) provide good contrast against both green and blue box backgrounds. Purple (#9418DB) highlight borders mark selected regions (N.AM in panel 1, CA in panel 2). Purple arrows connect panels indicating drill-down direction. No axes, all panels use axes-off style appropriate for this layout.
