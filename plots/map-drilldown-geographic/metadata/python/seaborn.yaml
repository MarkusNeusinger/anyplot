review:
  strengths:
  - Clever use of small multiples to represent three drill-down levels in a static
    library — the drill path is communicated clearly
  - Accent-color highlighting of the selected region at each level (Germany in Panel
    1, Bavaria in Panel 2) creates intentional visual focus
  - Shared vmin/vmax norm across all three panels ensures consistent color comparison
  - Dual encoding (rectangle fill color + scatter dot hue+size) adds data richness
    to each panel
  - Full theme-adaptive chrome applied correctly to all text, ticks, axes, badges,
    and colorbar in both themes
  - Panel 3 manual label offsets for Augsburg and Ingolstadt prevent overlap in the
    densest area
  weaknesses:
  - Panel 1 rectangle draw order causes France labels to be obscured by Germany bounding
    box drawn on top — reorder so all Rectangle patches are drawn first, then all
    text annotations in a second pass to float above everything
  - Colorbar Sales Revenue label is virtually at canvas bottom edge — raise bottom
    margin (subplots_adjust bottom=0.28) and move cbar_ax y from 0.10 to 0.12 to give
    the label breathing room
  - Three nearly-identical panel blocks repeat the same patch/scatter/text/axis-styling
    pattern — minor code elegance concern
  - Seaborn usage is thin — the main visualization uses matplotlib Rectangle patches;
    seaborn scatterplot overlays are secondary; consider relying on scatter markers
    as the sole geographic encoding to use seaborn more centrally
