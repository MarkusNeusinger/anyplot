review:
  strengths:
  - Creative static three-panel drill-down design that faithfully communicates the
    hierarchical geographic concept without interactivity
  - Consistent anyplot_seq colormap and ACCENT (#009E73) highlight color applied coherently
    across all three levels
  - 'Excellent code quality: clean, reproducible, no fake UI, correct canvas dimensions,
    proper theme adaptation in both light and dark renders'
  - City panel bubble map with seaborn size+hue encoding is the best showcase of seaborns
    distinctive API
  weaknesses:
  - Colorbar label Sales Revenue placed too close to the bottom canvas edge (cbar_ax
    at y=0.07); raise cbar_ax y to ~0.09-0.10 and increase figure bottom margin to
    ensure label has safe clearance
  - Interior region labels (fontsize=5-5.5) are at the minimum readable size; increase
    to fontsize=6-6.5 across all panels for better legibility at scaled-down display
    sizes
  - seaborn distinctive API only used in city scatter panel; panels 1-2 use near-invisible
    alpha=0.35 gray centroids — strengthen seaborn role by giving centroid scatter
    visible size+hue encoding (sizes=(40,120), hue=value, palette=anyplot_seq, alpha=0.6)
  - Rectangle bounding-box approximation lacks geographic fidelity for selected regions;
    use heavier borders and distinct alpha fills to better distinguish the highlighted
    selected region from siblings
