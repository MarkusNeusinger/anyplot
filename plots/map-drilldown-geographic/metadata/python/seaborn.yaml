      Background: Warm off-white (#FAF8F1) fills the entire figure and all three panel backgrounds — correct.
      Chrome: Title "map-drilldown-geographic · python · seaborn · anyplot.ai" in dark ink, readable at fontsize=12. Panel subtitles "Level 1: Countries", "Level 2: States (Germany)", "Level 3: Cities (Bavaria)" in dark ink at fontsize=10. Axis labels "Longitude (°)" and "Latitude (°)" in dark ink at fontsize=8. Tick labels in INK_SOFT (#4A4A44) at fontsize=7. All text clearly visible against the warm off-white background.
      Data: Three panels show geographic hierarchy. Panel 1: Five colored rectangles representing European countries (Germany teal-blue highlighted with ACCENT border, others ranging green→blue via anyplot_seq). Small scatter dots at centroids encode value via size and hue. Country names and values labeled (€1900M–€4200M). Panel 2: Six German state rectangles (Bavaria highlighted), labeled with state names and values. Panel 3: Six Bavarian cities as scatter bubbles sized by revenue, labeled with city names and values. ACCENT-green (→) arrows between panels. ACCENT-green breadcrumb boxes in each panel. Shared horizontal colorbar at bottom (green→blue, €0–€4200M). Notable overlap in panel 1 (Germany/France/Italy labels crowd each other) and panel 2 (NRW/Hesse/Bavaria text dense).
      Legibility verdict: PASS — all text readable; minor overlap in panels 1 and 2 reduces clarity but text remains distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the entire figure and all panel backgrounds — correct.
      Chrome: Title and axis labels in light cream (#F0EFE8), clearly visible against dark background. Tick labels in INK_SOFT (#B8B7B0). Panel titles in correct light ink. Breadcrumb callout boxes use ELEVATED_BG (#242420) fill with ACCENT-green border — readable. Colorbar labels and ticks in correct light colors. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — anyplot_seq green-to-blue gradient unchanged between themes. Rectangle fills and scatter dot colors match the light version. ACCENT green (#009E73) arrows and breadcrumb borders remain visible on the dark surface.
      Legibility verdict: PASS — full theme adaptation successful; all chrome elements flip correctly to light-on-dark.
