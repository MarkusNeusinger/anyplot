review:
  strengths:
  - 'Expert Altair geographic composition: alt.topo_feature + transform_lookup + AlbersUSA
    projection used idiomatically and correctly'
  - Three-level hierarchy clearly communicated through numbered labels and breadcrumb
    navigation combined with choropleth and bar chart panels
  - 'Full theme-adaptive chrome: all 6 token variables wired through to title, axes,
    legends, and view — both renders are correct'
  - anyplot_seq sequential colormap and anyplot categorical palette applied correctly
    and consistently
  - Pad-only canvas resize implemented correctly with SystemExit on overshoot and
    center-pad on undershoot
  weaknesses:
  - Missing state-level (level 2) drill-down bar panel in sidebar — breadcrumb jumps
    from regions directly to cities, skipping the explicit state step; add a state_bars
    chart for the selected region states labeled as the second hierarchy step
  - HTML drill-down is opacity-only, not data-filtering — wire region_select through
    transform_filter to filter state bars and city bars so clicking a region shows
    only that region data
  - City data covers only 4 states with no visual indicator that other states are
    non-drillable; add a subtitle or fallback note
  - Region legend labelFontSize=9 is borderline small at 400-px mobile scale — increase
    to labelFontSize=11
  - Dead space in lower-left quadrant below choropleth — extend map height or add
    content to fill the imbalance
  image_description: |-
