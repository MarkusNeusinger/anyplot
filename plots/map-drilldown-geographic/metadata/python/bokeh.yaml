review:
  strengths:
  - Full 3-level drill-down hierarchy (World → Country → State → City) implemented
    via TapTool + CustomJS with dynamic x_range/y_range zoom transitions
  - Correct use of anyplot_seq continuous colormap with LinearColorMapper for choropleth
    encoding
  - Differentiated drillable vs leaf-country rendering (solid border + full alpha
    vs dashed + 45% alpha) provides clear UX affordance
  - 'Narrative annotation ★ United States leads — $850M in brand #009E73 creates a
    clear focal point and visual hierarchy'
  - Breadcrumb navigation Title element updates dynamically, and the Back button label
    encodes navigation level for clean state management
  - 'Theme-adaptive chrome fully wired: INK/INK_SOFT/ELEVATED_BG/PAGE_BG tokens applied
    to all text renderers, backgrounds, and borders in both renders'
  - OCEAN_BG background for the map area provides geographic context (ocean vs land)
    as a distinctive design choice
  weaknesses:
  - 'CQ-04 slight repetition: each country level repeats the same ColumnDataSource
    + patches + text renderer pattern 5 times with minor variation — a small shared
    helper or loop would reduce about 120 lines while keeping the code flat'
  - 'VQ-02 minor: overlapping rectangular country patches (Canada/US top boundary,
    US/Mexico bottom boundary) create slight visual noise — consider adding a thin
    INK_SOFT outline with higher z-order or a subtle separation at overlap zones'
  - 'VQ-01 minor: instruction subtitle at 24pt (below) appears noticeably smaller
    relative to the 50pt title and 42pt axis labels; increasing to ~28–30pt would
    improve proportional balance'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) border/margin area; light ocean blue (#D6EAF8) for the geographic map region — a deliberate design choice to represent ocean vs land.
      Chrome: Title "map-drilldown-geographic · python · bokeh · anyplot.ai" in dark INK (#1A1A17) at 50pt, centered — fully visible, ~70% of plot width as expected for the mandated title. Breadcrumb "📍 World" in dark text at top-left. Axis labels "Longitude" and "Latitude" in INK at 42pt, clearly readable. Tick labels in INK_SOFT at 34pt. Instruction subtitle at bottom in INK_SOFT at 24pt, readable. ColorBar on right with "Sales ($M)" label in dark text, clearly legible.
      Data: Five rectangular country patches using anyplot_seq colormap (brand green #009E73 at low values through to dark azure for high values). United States (darkest, $850M), Canada (medium-light, $320M), Brazil (medium, $420M), Mexico (light green, $180M), Argentina (light green/teal, $95M). Country name labels and value labels visible with ELEVATED_BG (#FFFDF6) fill. "United States leads — $850M" annotation in #009E73 with green border. Leaf countries (Mexico, Brazil, Argentina) rendered with dashed borders and 45% opacity, signaling no drill-down. Drillable countries (US, Canada) at 85% opacity with solid borders.
      Legibility verdict: PASS — all text elements are clearly readable against the light background, no light-on-light issues, text labels protected by ELEVATED_BG backgrounds.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) border/margin area; dark ocean (#1C2833) for the geographic map region.
      Chrome: Title in light INK (#F0EFE8), clearly visible against dark background. Breadcrumb "📍 World" in light text. Axis labels and tick labels in INK_SOFT (#B8B7B0), legible on dark surface. Instruction subtitle at bottom in INK_SOFT, readable. ColorBar labels in INK_SOFT, legible.
      Data: Choropleth colors identical to light render — same anyplot_seq green-to-azure progression. Country labels visible with ELEVATED_BG (#242420) dark fill. Annotation "United States leads — $850M" remains in #009E73 (brand green holds on dark surface). Data colors are identical between both renders.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark failures detected; INK/INK_SOFT tokens correctly applied throughout all text renderers.
