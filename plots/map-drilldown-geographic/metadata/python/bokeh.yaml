    but clicking it does nothing; spec requires clickable segments to navigate back
    up the hierarchy (currently only the reset tool returns to world view)'
  - 'SC-02: Non-drillable regions (Mexico, Brazil, Argentina) have no visual indicator
    that they are leaf nodes — spec says to handle these gracefully with a non-clickable
    or visual cue'
  - 'DE-01/DE-02: Geographic regions are represented as simple rectangles rather than
    actual country/state boundaries — limits geographic realism and aesthetic sophistication
    significantly'
  - 'DE-03: No emphasis or annotation highlights a key insight (e.g., US dominance
    at $850M); the choropleth shows the data but does not guide the viewer to a narrative'
