review:
  strengths:
  - Correct anyplot_seq sequential palette (dark azure to brand green) used for choropleth
    — perfect continuous data compliance
  - Full 3-level drill-down hierarchy implemented in HTML (World → State/Province
    → City) with functional breadcrumb navigation
  - Both themes (light/dark) are theme-correct with warm off-white/near-black backgrounds;
    all text is readable with light colors on dark and dark on light
  - All font sizes explicitly set (title_font_size=66, label_font_size=56, legend_font_size=44)
    matching style-guide pygal defaults
  - Code is deterministic, imports clean, KISS structure maintained; sys.path workaround
    properly handles script-vs-package naming conflict
  - pygal_maps_world.World used idiomatically for country-level choropleth; SVG embedding
    in HTML for drill-down is a distinctive pygal capability
  weaknesses:
  - Legend last entry 'United States ($2,100M)' is truncated to '$2,10...' in both
    renders — reduce label length or increase margin_bottom / reduce legend_at_bottom_columns
    to 4 so each slot has more horizontal space
  - No smooth zoom/transition animation when drilling down — the HTML swaps charts
    abruptly; consider a CSS fade transition (opacity 0→1) on chart container swap
  - 'Color scale inconsistency across drill-down levels: world level uses anyplot_seq
    (sequential), but drill-down bar charts use the categorical ANYPLOT_PALETTE —
    for consistency, the bar chart style should also use anyplot_seq or at minimum
    share the same starting brand green'
  - 'Design Excellence is modest: the PNG is a standard world map with custom colors
    but no annotations, no focal-point emphasis, no sub-title callout highlighting
    the highest-sales country — add a data label or annotation on United States ($2,100M)
    to guide the viewer'
  - 'SC-04: the HTML page title and breadcrumb heading also say ''map-drilldown-geographic
    · python · pygal · anyplot.ai'' which is correct, but the static PNG x_title label
    ''World Sales Overview ($M) — Open HTML for Interactive Drill-Down'' is somewhat
    long for what pygal renders as the axis subtitle area — consider shortening to
    ''Sales by Country ($M USD)'''
