review:
  strengths:
  - 'Correct anyplot_seq choropleth colormap (brand green #009E73 → dark azure #003D94)
    applied as hierarchical choropleth scale'
  - Complete interactive HTML with functional drilldown from world to country to state/city
    levels, breadcrumb navigation, back button, CSS fade transitions, and clickable
    SVG regions
  - Dual encoding (tile area + choropleth color) creates immediate visual hierarchy
    — US dominance is instantly apparent
  - 'All theme tokens correctly wired: backgrounds #FAF8F1 (light) / #1A1A17 (dark),
    INK/INK_MUTED for all chrome elements — both renders pass theme-readability check'
  - Realistic, neutral business data with plausible relative sales magnitudes across
    geographically diverse countries, states, and cities
  - Font sizes all explicitly set (title_font_size=66, label_font_size=56, legend_font_size=44)
    per style-guide defaults
  weaknesses:
  - Not a geographic map — treemap used as substitute because pygal_maps_world is
    unavailable; the spec explicitly requires choropleth geographic rendering (country
    shapes on a world map). This is a significant spec deviation (SC-01 = 3/5).
  - No labels inside treemap tiles in the static PNG — print_values=False means sub-regions
    (states) have no text identifiers; a reader cannot tell which inner block corresponds
    to which state without hovering (HTML only). Consider adding abbreviated country
    labels inside the largest tiles at minimum.
  - 'Dark render: the dark-azure end of the sequential colormap (#003D94) has reduced
    contrast against the near-black background (#1A1A17) — the US tile is distinguishable
    (different hue) but with low luminance contrast (~3.3:1). Consider capping the
    dark end of the seq scale at ~#1050B0 so it remains clearly readable on dark surfaces.'
  - Design excellence is moderate — the plot looks like a well-configured pygal treemap
    default. No cell border customization, no typography refinement beyond basic size
    settings, limited visual storytelling beyond the dual size+color encoding.
  - 'CQ-04: HTML template generation via a single large f-string (200+ lines of mixed
    Python/HTML/CSS/JS) is functional but overly verbose — the code structure makes
    it hard to maintain or modify the interactive layer.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "map-drilldown-geographic · python · pygal · anyplot.ai" rendered in dark ink at top — clearly readable. Legend row at bottom shows 5 color swatches with labels "US ($2100M)", "Germany ($580M)", "Japan ($850M)", "Brazil ($520M)", "Australia ($380M)" — all readable in dark ink.
      Data: Treemap with 5 country tiles. US occupies the largest area (~left half) in dark azure (#003D94-ish), Japan takes upper-right in mid-teal, Germany middle-right, Brazil and Australia in lighter greens toward #009E73. Within each country tile, state sub-regions are visible as smaller unlabeled rectangles. Sequential choropleth clearly encodes sales magnitude via area + color.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title same text in light off-white — clearly readable. Legend labels rendered in light ink — readable.
      Data: Same treemap layout. Green tiles (Japan, Germany, Brazil, Australia) are clearly visible and colors are identical to light render. US tile (dark azure #003D94) is distinguishable from background as a clearly different dark navy-blue hue, but contrast is lower (~3.3:1) — the US block is recognizable but the dark-azure end of the sequential scale has reduced visibility on a dark surface.
      Legibility verdict: PASS with minor concern — no dark-on-dark text issues; all text is light-colored on dark background. Data colors are identical to light render (only chrome flipped). Low luminance contrast on US tile is a VQ-03 concern, not a text legibility failure.
