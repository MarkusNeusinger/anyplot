review:
  strengths:
  - 'Excellent code quality: deterministic hardcoded data, clean KISS structure, no
    functions or classes'
  - 'Strong data quality: real geographic hierarchy with accurate arithmetic (parent
    = sum of children), realistic neutral business scenario'
  - 'Correct anyplot palette application: 5 series in canonical order, correct backgrounds
    in both themes (#FAF8F1 light / #1A1A17 dark)'
  - 'Interactive HTML is well-engineered: breadcrumb nav, back button, level-contextual
    hints, reactive CSS, leaf-node awareness'
  - Creative use of pygal render(is_unicode=True) to embed multiple pre-rendered SVG
    charts into a JS-driven drilldown
  weaknesses:
  - 'Dark render dark-on-dark: value labels inside treemap cells render in dark ink
    in both themes. In dark render, values on crimson Japan blocks (#B71D27) and purple
    Germany blocks (#9418DB) are barely legible. Fix: apply theme-adaptive INK token
    (#F0EFE8 in dark theme) to cell value text in pygal Style foreground propagation.'
  - 'Legend truncation: United States ($2... is cut off. Fix: shorten series label
    to US ($2100M) or reduce legend_font_size to fit full text in legend column width.'
  - 'No choropleth / value-based color scale: spec requires color to encode DATA VALUE
    (choropleth-style) not country identity. All blocks across all levels should use
    anyplot_seq sequential scale (#009E73 to #003D94) where color encodes sales magnitude,
    enabling comparison across levels.'
  - 'Geographic map absent: spec core is a geographic/spatial map. Use pygal.maps.world.World
    (pygal_maps_world) for the PNG static view to display actual country shapes with
    choropleth coloring. If pygal_maps_world unavailable, note it explicitly.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "map-drilldown-geographic · python · pygal · anyplot.ai" in dark ink, clearly readable. Legend at bottom shows 5 countries with dollar values — "United States ($2..." is truncated, full $2100M value cut off.
      Data: Treemap with 5 countries: US (brand green #009E73, largest ~40% area), Germany (#9418DB purple), Japan (#B71D27 crimson red), Brazil (#16B8F3 sky blue), Australia (#99B314 lime). Each country block subdivided into state sub-blocks sized by sales value. Value numbers (520, 680, 320, 130, 240, 210, 180, 150, 280, 420, 140, 80, 160, 280, 60) printed in dark near-black ink on colored cells.
      Legibility verdict: PASS — all chrome and data labels readable, minor contrast issue on dark green US cells but generally acceptable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title and legend labels appear in light cream/white text — both fully readable and correctly adapting to dark theme. Legend shows same 5 countries with same truncation ("United States ($2...").
      Data: Same data colors as light render — brand green, purple, crimson red, sky blue, lime. Colors are identical between renders (only chrome flips). VALUE LABELS inside treemap cells appear in the same dark near-black ink as in the light render — NOT adapting to dark theme. Dark text on crimson Japan blocks (#B71D27) and on purple Germany blocks (#9418DB) has poor contrast (dark-on-dark failure). Values 150, 280, 420 on Japan blocks and 130, 240, 210 on Germany blocks are barely legible.
      Legibility verdict: FAIL — value text inside treemap cells uses dark ink in dark theme, causing dark-on-dark contrast failure on crimson and purple blocks. Chrome (title, legend) is fine; in-cell value labels are the failure point.
