review:
  strengths:
  - 'Correct anyplot palette usage — all four palette positions (1-4) applied to the
    four US regions, with West correctly assigned #009E73 as first/brand color'
  - 'Complete theme-adaptive chrome — all text, borders, backgrounds adapt correctly
    between #FAF8F1 light and #1A1A17 dark with no failures in either render'
  - Comprehensive 3-level drilldown hierarchy (Regions → States → Cities) with breadcrumbs,
    tooltips, and event handlers fully coded
  - Realistic and neutral US sales dataset covering all 50 states in 4 regions with
    city-level data for 16 major states
  - Perfect code quality — deterministic data, clean imports, correct dual-artifact
    output (HTML + PNG per theme)
  - 'Strong use of Highcharts-distinctive features: mapChart, drilldown module, breadcrumbs,
    topology data (hc-key)'
  weaknesses:
  - Legend shows only a single US Regions entry with one sky-blue swatch — a 4-color
    categorical map requires 4 legend entries (West=#009E73, Midwest=#B71D27, South=#9418DB,
    Northeast=#16B8F3); fix by splitting into 4 separate map series (one per region)
    so Highcharts auto-generates one legend entry per series
  - Drilldown levels 2 and 3 show column/bar charts instead of geographically zoomed
    maps — spec says revealing progressively more geographic detail on click and smooth
    zoom transitions to maintain spatial context; consider loading state-level topology
    (e.g., us-ca-all.topo.json) for L2 so the drill-down view stays geographic, or
    explicitly note in subtitle that bar-chart drill is the chosen UX
  - Title font size (56px) is below the style guide default of 66px and subtitle (36px)
    is below ~44px; increase both to improve legibility at mobile widths (~400px)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface ✓
      Chrome: Title "map-drilldown-geographic · python · highcharts · anyplot.ai" in bold dark (#1A1A17) at ~56px — clearly readable. Subtitle "US Regional Sales ($M) — Click a region to drill into states, then cities" in secondary gray (#4A4A44). Legend box with border at bottom center shows single entry "US Regions" with sky-blue swatch.
      Data: US map with states colored by 4 anyplot palette positions: West=#009E73 (green), South=#9418DB (purple), Midwest=#B71D27 (red), Northeast=#16B8F3 (sky blue). State borders in warm off-white. Alaska and Hawaii shown as insets.
      Legibility verdict: PASS — all visible text is clearly readable against the #FAF8F1 background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface ✓
      Chrome: Title and subtitle in light cream (#F0EFE8) — clearly readable against dark background. Legend box with border, same "US Regions" single swatch entry in light text.
      Data: Map colors are identical to light render — West=#009E73, South=#9418DB, Midwest=#B71D27, Northeast=#16B8F3. State borders appear as thin dark lines visible against the colored regions.
      Legibility verdict: PASS — all text is light-colored and clearly readable against the near-black background. No dark-on-dark failures observed.
