  strengths:
  - Full 3-level drilldown hierarchy (regions → states → cities) implemented with
    native Highcharts drilldown API
  - Cross-type drilldown (map choropleth → bar chart) is a sophisticated, library-distinctive
    technique
  - Imprint palette applied correctly in canonical order with brand green (#009E73)
    as first series (West)
  - 'Both light and dark themes correctly implemented: backgrounds, text, legend box,
    and data colors all theme-adaptive'
  - Breadcrumb navigation, hover tooltips, and graceful null-data handling all implemented
  - Clean deterministic code structure; all imports used; correct output format
  weaknesses:
  - 'SC-02: Legend shows categorical region names rather than a quantitative value
    scale — the spec asks for a color legend indicating the value range, suggesting
    a choropleth gradient legend for the numeric sales values'
  - 'DE-01: No distinctive design innovation beyond correct palette application —
    could add subtle data labels showing region totals directly on the map, or differentiate
    opacity/saturation by value to reinforce the choropleth intent'
  - 'DE-03: Static view gives all four regions equal visual weight — no visual emphasis
    on the highest-sales region; consider adding a subtle data annotation or saturation
    variation to highlight the top performer'
