review:
  strengths:
  - 'Perfect palette compliance: anyplot_seq applied correctly on both choropleth
    and scatter layers; theme-adaptive geographic chrome (land/lake/ocean) is a thoughtful
    Plotly-specific touch'
  - 'Strong library mastery: dual-layer Choropleth + Scattergeo with updatemenus dropdown
    controlling both trace visibility and geo projection scale is idiomatic and non-trivial'
  - Clean, deterministic data with realistic US city/state geography and plausible
    sales magnitudes
  weaknesses:
  - 'DE-03: No visual emphasis on story — top performers (CA: $2,850K, NY: $1,880K)
    and bottom performers (MI: $1,340K) not highlighted; adding a brief annotation
    or distinct marker/outline on highest-value state would create a focal point'
  - 'DE-01: Geographic design could push further — state borders are uniform weight
    regardless of value; consider slightly thicker borders on 3 highest-value states,
    or a subtle drop-shadow on colorbar to separate it from the map'
  - 'SC-02: Click-on-region drilldown not implemented — users must use the dropdown;
    breadcrumb in title is read-only and doesn''t match the spec''s ''World > United
    States > California'' format exactly'
