      Data: 10 US states colored by total sales via anyplot_seq (#009E73 green at low end → #003D94 dark blue at high end). California and Texas appear in dark blue (high sales), Michigan in green (lowest). Spotlight markers: lime star for "★ Top: CA $2,850K" and "★ 2nd: TX $2,790K"; red triangle for "▼ Low: Mi $1,340K" — all clearly visible.
