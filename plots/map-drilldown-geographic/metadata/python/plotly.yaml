review:
  strengths:
  - 'Correct anyplot_seq colorscale for choropleth and city scatter with #009E73→#003D94
    gradient'
  - 'Proper theme-adaptive chrome: warm off-white (#FAF8F1) light / near-black (#1A1A17)
    dark backgrounds with all INK/INK_SOFT tokens threaded through title, colorbar,
    dropdown, and spotlight labels'
  - 'Clever spotlight annotation layer using a third Scattergeo trace with semantic
    palette colors (#99B314 lime for top performers, #B71D27 red for lowest) — creates
    an immediate data story focal point'
  - 'Interactive drill-down via updatemenus dropdown: trace visibility toggling, geo.center
    + geo.projection.scale for per-state zoom, and title updates mimicking breadcrumb
    context'
  - 'Idiomatic Plotly geo stack: go.Choropleth with locationmode=''USA-states'' +
    go.Scattergeo city overlay + styled colorbar with bordered ELEVATED_BG fill'
  - 'Clean flat code: imports → data → traces → layout → save — no functions or classes'
  - 'Canvas dimensions correct: 3200×1800 via width=800, height=450, scale=4 with
    autosize=False'
  - Both HTML and PNG outputs generated correctly
  weaknesses:
  - 'Breadcrumb navigation (spec requirement): spec asks for clickable breadcrumb
    segments (e.g. ''World > United States > California''). Implementation uses title
    text updates (''United States > {State} | City-Level Sales'') and a dropdown —
    close equivalent, but not true clickable breadcrumbs. A Plotly workaround is to
    add a secondary updatemenus row styled as a breadcrumb bar with ''Back to All
    States'' button.'
  - Spotlight annotation text is small (textfont size=9, 36 source-px at scale=4).
    For a 3200×1800 canvas this is borderline readable. Increasing to size=10 or 11
    would improve legibility without crowding the map.
  - 'DQ-01: only two interactive levels (all-states choropleth → individual state
    with city dots). Spec envisions three levels (world → country → state). Consider
    adding a top-level global choropleth view with US highlighted as the first level
    before the US-states view.'
  - 'DE-01: design is above-average but not publication-quality. The map would benefit
    from a subtle annotation box or summary stat (e.g. total US sales or regional
    percentage) to elevate storytelling beyond the spotlight markers.'
