review:
  strengths:
  - Correct anyplot_seq colormap (green to azure) applied consistently across both
    themes
  - 'Top-3/bottom-3 performer highlights using Imprint palette colors (lime #99B314,
    red #B71D27) create immediate visual storytelling'
  - Breadcrumb annotation World > USA > States elegantly conveys hierarchical context
    without faking interactivity
  - 'Ocean panel background (#D6EAF8 / #1A2A3A) enhances the map aesthetic and theme-adapts
    correctly'
  - All chrome tokens (INK, INK_SOFT, ELEVATED_BG, PAGE_BG) correctly applied in both
    light and dark renders
  - Centroid nudging for crowded northeastern states reduces label overlap
  - 'Perfect code quality: KISS structure, seed, clean imports, idiomatic plotnine
    grammar'
  weaknesses:
  - 'SC-01/SC-02: Drill-down interactivity (click navigation, zoom transitions, hover
    tooltips) cannot be implemented in plotnine — static snapshot only shows one hierarchy
    level'
  - 'DE-01: Design is above default but not publication-quality — outer spines could
    be removed for a cleaner map aesthetic (panel_border=element_blank())'
  - Minor label crowding in the northeastern US cluster (OH/PA at similar latitudes
    ~40.8-40.9N)
  - State polygon shapes are noticeably simplified (Colorado as a perfect rectangle)
    reducing geographic realism
