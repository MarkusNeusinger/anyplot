  strengths:
  - 'Correct anyplot_seq gradient (#009E73 → #003D94) for the choropleth fill'
  - Both light and dark renders are fully readable — theme tokens properly wired to
    all text and chrome elements
  - Top-3 / bottom-3 performer highlighting with lime and red outlines creates a clear
    data storytelling focal point
  - 'Ocean-blue panel background (#D6EAF8 light / #1A2A3A dark) provides intuitive
    geographic context'
  - Breadcrumb annotation ('World > USA > States') adds narrative framing appropriate
    for a static stand-in
  - State abbreviation + value labels (white bold) provide good information density
    on each polygon
  - Clean, idiomatic plotnine code — np.random.seed(42) for reproducibility, no functions/classes,
    correct save API
  weaknesses:
  - Crowded northeast cluster (IL, IN, OH, TN, VA, NC, PA, NY) produces near-overlapping
    or hard-to-read state labels at the current 5pt font size — centroid nudging helps
    some states but TN and VA still fight for space; consider reducing this region's
    label font to 4pt or suppressing labels for the smallest polygons
  - Red (#B71D27) vs lime-green (#99B314) outline colors used as the sole visual signal
    for bottom-3 vs top-3 states — mild CVD concern since this is a red-green distinction;
    add a text-based annotation ('Top 3' / 'Bottom 3') or use shape/pattern to redundantly
    encode the distinction
  - Spec is primarily interactive (drill-down on click, smooth zoom transitions, clickable
    breadcrumb navigation, hover tooltips) — plotnine is static-only so these features
    are absent; a single-level choropleth is the best approximation but SC-01/SC-02
    scores are reduced accordingly
  - State polygon coordinates are rough approximations — Tennessee's simplified shape
    is barely a visible strip in the plot which makes its label look orphaned; Florida's
    shape creates an odd gap between it and Georgia
