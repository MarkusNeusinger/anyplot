review:
  strengths:
  - Elegant three-panel drill-down design shows all three geographic hierarchy levels
    simultaneously — a well-reasoned static alternative to interactive drill-down
    for CairoMakie
  - Highlighted drill path with thick INK ring on selected bubbles (N. America, CA)
    creates clear visual hierarchy communicating which region is currently drilled
    into
  - Breadcrumb navigation strip 'World ▶ N. America ▶ California' effectively communicates
    the current drill state as a static label
  - ANYPLOT_SEQ colormap (green→blue) correctly applied as a continuous sequential
    colormap for choropleth-style bubble coloring across all three levels
  - Theme-adaptive chrome fully implemented — all INK/INK_SOFT/INK_MUTED tokens wired
    through every Axis attribute; dark render shows no dark-on-dark text failures
  - Geographic bounding boxes with subtle semi-transparent fills (alpha=0.06 fill,
    0.22 border) add spatial context without cluttering the map panels
  - 'Clean KISS code structure: Imports → Data → Plot → Save, no functions or classes,
    seed(42) for reproducibility'
  - Shared colorbar spanning all three panels with descriptive label 'Relative Sales
    Volume (within each level)' efficiently unifies the color scale explanation
  weaknesses:
  - California city values sum ($0.03+$0.07+$0.09+$0.19+$0.24 = $0.62B) slightly exceeds
    the parent California state total ($0.60B) — minor data hierarchy inconsistency,
    cities should sum to ≤ state value
  - 'World Regions panel: geographic bounding boxes for Middle East, Africa, and Asia-Pacific
    overlap and create a visually cluttered center zone; consider using lighter stroke
    or removing overlapping boxes'
  - Region bubble labels in World Regions panel use fontsize=8 — very small; 'Africa\n$0.7B'
    and 'Middle East\n$1.1B' may be unreadable at mobile widths (~400px); increase
    to fontsize=9-10 or increase bubble markersize slightly to give more room
  - Panel 2 (US States) Y-axis label is empty (ylabel='') — while Panel 1 has 'Latitude',
    the middle panel's unlabeled Y-axis creates a minor inconsistency; could add 'Latitude'
    for completeness or use linked axes
  - Minor crowding of NY/MA abbreviations in Panel 2 — the pixel offset approach works
    but the labels are close together; small fontsize=9 helps but they remain tight
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Sales Drill-Down · map-drilldown-geographic · julia · makie · anyplot.ai" in dark bold text, fully readable. Breadcrumb "World ▶ N. America ▶ California" in INK_SOFT. All three panel titles (① World Regions, ② N. America → US States, ③ California → Cities) readable in dark text. Axis labels "Longitude", "Latitude", "Sales ($B)" visible. Tick labels in INK_SOFT, readable. Colorbar label "Relative Sales Volume (within each level)" visible at bottom.
      Data: Three-panel layout. Panel 1: six colored bubbles on a schematic world map with semi-transparent geographic bounding boxes; N. America bubble has thick bold ring indicating it is the drilled-into region. Colors range from brand green (#009E73) for low values to deep blue (#003D94) for high values via ANYPLOT_SEQ. Panel 2: eight US state bubbles positioned by geographic coordinates with a polygon outline of the US; CA bubble has thick ring. Panel 3: horizontal bar chart for five California cities with bars colored via ANYPLOT_SEQ from green (Sacramento lowest) to dark blue (San Francisco highest). Value labels ($0.03B–$0.24B) alongside each bar.
      Legibility verdict: PASS — all text readable; minor concern on fontsize=8 world region labels but visible at full resolution

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in light cream text (#F0EFE8 equivalent via INK token), fully readable against dark background. Breadcrumb in INK_SOFT light gray. All panel titles visible in light text. Axis labels and tick labels in light INK_SOFT color. Colorbar label readable. No dark-on-dark failures observed — all chrome elements are light-colored on dark background.
      Data: Data colors are identical to light render — same green-to-blue ANYPLOT_SEQ gradient used for all bubble and bar coloring. Geographic bounding boxes have very subtle dark fills. CA and N. America highlighted bubbles retain thick INK (now light cream) rings.
      Legibility verdict: PASS — all text clearly readable against dark background; data colors identical to light render confirming only chrome flipped
