review:
  strengths:
  - 'Full theme-adaptive chrome: all INK/INK_SOFT tokens correctly applied to every
    axis element in both light and dark renders.'
  - Effective use of Makie's grid layout to create a 3-level drill-down story in a
    single static figure.
  - Consistent anyplot_seq colormap across all three panels enables direct visual
    comparison across levels.
  - Clean code structure with no over-engineering; all font sizes explicitly set.
  weaknesses:
  - Bubble maps show lon/lat scatter points rather than actual choropleth polygon
    fills — geographic shapes (country/state borders) are absent, making the geographic
    map aspect less convincing.
  - No explicit breadcrumb navigation element (e.g., a text label reading 'World >
    N. America > California' somewhere in the figure).
  - NY and MA labels in Panel 2 are crowded (near-identical lat/lon); offset tuning
    or label repositioning would improve clarity.
  - US state values sum to ~$2.92B while the parent N. America node shows $2.80B —
    small factual inconsistency for an aggregation-focused spec.
  - Small bubble text labels (fontsize=8) at world-region level may be challenging
    at mobile viewport scales.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "Sales Drill-Down · map-drilldown-geographic · julia · makie · anyplot.ai" in dark bold text — readable. Panel subtitles (numbered ①②③) in dark INK. Axis labels "Longitude"/"Latitude"/"Sales ($B)" in INK. Tick labels in INK_SOFT. All readable.
      Data: Three-panel layout. Panels 1-2 show bubble scatter maps with circles colored via anyplot_seq (green #009E73 for low → blue #003D94 for high). Panel 3 shows horizontal bars with same sequential colormap. Colorbar at bottom labeled Low/Mid/High.
      Legibility verdict: PASS — all text readable; small 8pt bubble labels borderline at mobile scale but acceptable at canvas size.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and all labels render in light colors (near-white F0EFE8 / soft gray B8B7B0). No dark-on-dark failures. Colorbar correctly themed with light label text.
      Data: Colors identical to light render — same green-to-blue sequential gradient on bubbles and bars. Only chrome (background, text, spines) flipped.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark issues detected.
