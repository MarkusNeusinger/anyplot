  image_description: 'The plot displays a 5×5 risk assessment matrix heatmap. The
    x-axis is labeled "Impact" with categories Negligible, Minor, Moderate, Major,
    and Catastrophic. The y-axis is labeled "Likelihood" with categories Rare, Unlikely,
    Possible, Likely, and Almost Certain. Background cells are color-coded using a
    green→yellow-green→yellow→orange→dark red gradient based on risk score (likelihood
    × impact, ranging 1–25). Each cell contains a semi-transparent watermark number
    showing the risk score. Fifteen risk items are plotted as colored circular markers
    with white borders and bold text labels on semi-transparent white backgrounds
    beneath each marker. Two custom legends on the right side: "Risk Zones" listing
    Low (1-4), Medium (5-9), High (10-16), Critical (20-25) in matching colors; and
    "Categories" showing Technical (dark navy), Financial (dark purple), Operational
    (dark teal), Legal (dark red-orange) with colored dots. The title reads "heatmap-risk-matrix
    · bokeh · pyplots.ai" centered at top. Axis lines, ticks, grid lines, and outline
    are all removed for a clean appearance.'
