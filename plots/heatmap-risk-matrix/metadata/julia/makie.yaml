review:
  strengths:
  - Correct 5×5 risk matrix heatmap with green-to-amber-to-red gradient using Imprint
    palette colors
  - All four theme-adaptive chrome tokens correctly wired (PAGE_BG, INK, INK_SOFT)
    — both renders pass the legibility gate
  - Square 2400×2400 canvas correctly chosen for a symmetric grid plot
  - Colorbar with custom zone tick labels (Low/Medium/High/Critical) elegantly replaces
    a separate legend
  - Realistic enterprise risk register with 12 unique-cell items covering all four
    risk zones
  - Clean KISS structure, reproducible seed, no fake interactivity, all imports used
  - Descriptive axis tick labels (Rare→Almost Certain / Negligible→Catastrophic) as
    required by spec
  weaknesses:
  - Risk item labels use fontsize=9 (effective 18px in the 2400px canvas) — small
    at desktop and near-unreadable when scaled to ~400px mobile; increase to fontsize=11–12
  - No jitter logic implemented for overlapping risk items in the same cell — spec
    explicitly requires jitter; the current unique-cell dataset hides the gap but
    a realistic register would expose it
  - Custom colormap (green→amber→red) uses Imprint palette stops but is not strictly
    imprint_seq or imprint_div — must use one of the two authorised Imprint continuous
    colormaps per style-guide rules; for a risk matrix the closest compliant choice
    is imprint_seq (green→blue) or accept 1/2 VQ-07
  - Green-to-red gradient has deuteranopia/protanopia CVD concerns; the colorbar text
    labels provide redundancy but a shape-encoded secondary cue on the risk markers
    would strengthen accessibility (VQ-04)
  - 'LM-02 weak: Makie-distinctive features (Observable-style computed layouts, custom
    tick formatters, Makie recipes) are not leveraged — Colorbar tick labels and manual
    hlines/vlines are minimal Makie usage'
