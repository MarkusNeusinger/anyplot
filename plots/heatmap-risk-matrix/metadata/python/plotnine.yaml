review:
  strengths:
  - 'Perfect spec compliance: all required features present — 5×5 grid with green→ochre→red
    Imprint-palette gradient, descriptive axis labels with qualitative terms, labeled
    risk markers with smart cell-aware offset logic, zone annotation above the matrix,
    and colorbar legend with meaningful breaks'
  - 'Excellent code quality: clean grammar-of-graphics layering, all font sizes explicitly
    set, reproducible seed, idiomatic plotnine usage with geom_tile + geom_text +
    geom_label + annotate in a single ggplot expression'
  - 'Good theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied in both light and dark renders; risk item labels
    use ELEVATED_BG fill with INK text color — correctly dark-box/light-text in dark
    mode'
  - 'Thoughtful information hierarchy: heatmap cell colors (primary) → labeled risk
    items (secondary) → semi-transparent score numbers (tertiary) → zone annotation
    (contextual) creates four distinct visual layers'
  - 'Realistic, neutral data: 12 plausible project-management risk items (Supply Delay,
    Budget Overrun, Data Breach, etc.) spread across all risk zones, with sensible
    likelihood × impact mappings'
  weaknesses:
  - Zone annotation text (annotate size=2.8 mm ≈ 8 pt source pixels) is very small
    — at mobile display widths (~400 px) this text would be virtually unreadable;
    increase to size=3.5–4.0 for comfortable legibility as secondary context
  - 'Continuous cmap uses a custom 3-stop gradientn([''#009E73'',''#BD8233'',''#AE3030''])
    which does not match the prescribed imprint_seq (#009E73→#4467A3) or imprint_div
    (#AE3030→neutral→#4467A3) colormaps — while all three stops are Imprint palette
    members, the gradient deviates from the brand cmap spec; for risk matrix semantics
    consider using imprint_div (red=high, neutral=mid, green=low) re-ordered so low
    risk maps to #009E73'
  - 'DE-01 limited: design is above defaults (rounded labels, semi-transparent scores)
    but does not reach ''strong design'' level — the visual lacks a bold focal point;
    consider adding a subtle highlighted border or slightly enlarged risk labels for
    the Critical zone cells to make the most dangerous quadrant unmistakably stand
    out'
  - Risk score numbers (alpha=0.38, size=3.2) are intentionally tertiary but are very
    faint at full canvas size; increasing to alpha=0.45 would maintain their secondary
    role while being slightly more readable on the heatmap cells
