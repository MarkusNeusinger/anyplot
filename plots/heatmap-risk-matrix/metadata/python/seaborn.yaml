review:
  strengths:
  - 'Perfect spec compliance: all required features (5×5 grid, descriptive ticks,
    labeled markers with offset positioning, zone legend) fully implemented'
  - Semantic risk colormap built entirely from Imprint palette anchors (brand green
    → amber → ochre → matte red) with strong domain justification (ISO 31000 traffic-light
    convention)
  - Critical emphasis rings on high-risk items create strong visual hierarchy and
    focal point
  - 'Full theme adaptation: both renders pass legibility check with no dark-on-dark
    failures'
  - 'Excellent redundant encoding: 4 distinct marker shapes + Imprint colors for categories
    (CVD-safe)'
  - 'Perfect code quality: clean structure, deterministic seed, no bbox_inches=tight,
    correct canvas size'
  weaknesses:
  - 'Label overlap in crowded cells: with clip_on=False, labels from adjacent cells
    bleed into neighboring cell space; visible as Vendor Failrv Outag string and tafr
    Loss truncation — reduce fontsize to 5pt for cells with ≥2 items, or increase
    label_dy offset to 0.36/-0.40 to reduce cross-cell bleed'
  - Custom risk_imprint 4-stop colormap deviates from imprint_seq/imprint_div-only
    rule for continuous data — even though all stops are Imprint anchors and the semantic
    exception is well-justified for risk matrices
