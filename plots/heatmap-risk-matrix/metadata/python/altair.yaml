  weaknesses:
  - 'Multiple label collisions reduce readability: Currency Risk+Vendor Delay in Possible
    row, Key Staff Loss+Supply Issue in Possible/Major, Server Outage+Data Breach
    in Unlikely/Catastrophic, Req. Gap+Budget Overrun in Likely row — jitter offsets
    too small (0.28) when two items share the same cell and bold labels are 15px wide'
  - Legend at bottom-right occludes heatmap cells in Major/Catastrophic columns for
    rows 4-5 (Likely and Almost Certain); move legend to top-left or outside chart
    area
  - Y-axis has Rare at top and Almost Certain at bottom (reverse=True) — conventional
    risk matrices place highest likelihood at top; atypical orientation
  - Continuous heatmap colormap uses custom traffic-light hex values instead of imprint_seq/imprint_div;
    spec explicitly mandates green-red so not a blocker, but noted for awareness
