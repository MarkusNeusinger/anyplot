review:
  strengths:
  - Five-layer Altair composition (heatmap cells, score watermarks, markers, labels,
    legend carrier) demonstrates deep library mastery of the grammar-of-graphics approach
  - Smart anti-jitter algorithm with diagonal spread (horizontal shift + alternating
    above/below labels) elegantly handles same-cell collisions without overlap
  - Subtle risk score watermarks add a second data layer without cluttering the primary
    visualization
  - Full theme-adaptive chrome with all text, backgrounds, legend box, and borders
    correctly switching between light (#FAF8F1) and dark (#1A1A17) surfaces
  - labelExpr on axes produces clean descriptive tick labels (Rare/Unlikely/Possible/Likely/Almost
    Certain) without requiring ordinal encoding, keeping data as clean numeric coordinates
  weaknesses:
  - Heatmap background uses a custom traffic-light gradient (#4caf50→#c6d93e→#ff9800→#f44336→#b71c1c)
    instead of imprint_seq or imprint_div — technically violates the continuous cmap
    policy even though the spec mandates it
  - Green→red heatmap gradient has red-green CVD issues (deuteranopia/protanopia)
    — standard risk matrix convention but not fully colorblind-safe; risk score watermarks
    partially mitigate
  - Risk item label font size (11pt) may be borderline small on mobile at 400px viewport
    width (~7 source-px effective); consider 12pt to improve mobile legibility
  - Watermark opacity=0.18 is very subtle, making scores on mid-range yellow-orange
    cells (where neither white nor black at low alpha has strong contrast) hard to
    discern; consider 0.22–0.25
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly matches the theme token
      Chrome: Title "heatmap-risk-matrix · python · altair · anyplot.ai" in dark (#1A1A17) bold text at top center. Two subtitle lines in #4A4A44 (INK_SOFT). Axis labels "Impact" (x) and "Likelihood" (y) in dark bold text (fontsize=14). Tick labels in #4A4A44: Negligible/Minor/Moderate/Major/Catastrophic on x; Rare/Unlikely/Possible/Likely/Almost Certain on y (fontsize=11). All text clearly readable.
      Data: 5×5 heatmap grid with green (#4caf50) in low-risk bottom-left transitioning through yellow-green (#c6d93e), orange (#ff9800), red (#f44336), dark red (#b71c1c) in high-risk top-right. Semi-transparent watermark risk scores (opacity=0.18) in each cell. 15 risk item markers: Technical=#009E73 green (Imprint pos 1), Financial=#C475FD lavender (pos 2), Operational=#4467A3 blue (pos 3). Text labels next to each marker. Legend box (elevated bg #FFFDF6) in bottom-left.
      Legibility verdict: PASS — all text readable against light background, no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly matches dark theme token
      Chrome: Title in light cream (#F0EFE8) against dark background — clearly visible. Subtitles in #B8B7B0 (INK_SOFT dark). Axis labels in light cream. Tick labels in #B8B7B0. Legend box uses elevated dark surface (#242420) with light label text. No dark-on-dark text failures observed anywhere.
      Data: Heatmap cell colors identical to light render (data colors are theme-independent). Risk item marker colors (#009E73, #C475FD, #4467A3) confirmed identical to light render — only chrome flipped. Risk item labels in #F0EFE8 (INK dark mode) against the colored cell backgrounds.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures
