review:
  strengths:
  - Semantic Imprint color mapping for zones (green/amber/ochre/red) is correct and
    immediately communicates risk severity
  - Dual encoding (zone fill color + marker size for risk score + marker color for
    category) maximizes information density
  - Semi-transparent score watermarks in cells are a polished design touch that adds
    information without clutter
  - Interactive layer_tooltips() with risk name, category, and computed score is well-crafted
    for the HTML output
  - Theme-adaptive chrome is fully implemented — background, ink colors, legend background
    all flip correctly
  - Correct square canvas (2400x2400) is the right choice for a symmetric 5x5 grid
  weaknesses:
  - 'Heavy label overlap in the high-risk quadrant (impact >= 3, likelihood >= 3):
    alternating label_y stagger is insufficient when 9+ risks cluster in adjacent
    cells — reduce label size from size=9 to size=7 and tighten jitter offsets'
  - 'Top-row labels overflow above axis boundary: risks with label_y near 5.59 push
    labels into the subtitle margin — clamp label_y to max 5.35 or reduce y-nudge
    to ±0.28'
  - 'Zone legend missing numeric ranges per spec: add labels=["Low (1–4)", "Medium
    (5–9)", "High (10–16)", "Critical (20–25)"] to scale_fill_manual()'
  - 'Category color order violates first-series rule: scale_color_manual starts with
    #4467A3 (blue) for Technical; first categorical series must be #009E73 (green)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface.
      Chrome: Title "heatmap-risk-matrix · python · letsplot · anyplot.ai" in bold dark INK (#1A1A17), readable. Subtitle in muted INK_MUTED. Axis labels "Likelihood" (x) and "Impact" (y) in bold dark ink. Tick labels (Rare/Unlikely/Possible/Likely/Almost Certain; Negligible/Minor/Moderate/Major/Catastrophic) in INK_SOFT, all readable. Legend boxes use elevated background #FFFDF6 with INK_SOFT borders.
      Data: 5x5 heatmap with four zone colors: #009E73 green (Low), #DDCC77 amber (Medium), #BD8233 ochre (High), #AE3030 red (Critical). Cell score watermarks are semi-transparent dark rgba(0,0,0,0.20). Risk items plotted as colored circles (Technical=#4467A3 blue, Financial=#C475FD lavender, Operational=#2ABCCD cyan) scaled by risk score. Risk labels in bold #1A1A17 INK.
      Legibility verdict: PASS (chrome fully readable) — but significant label-on-label overlap in the upper-right risk quadrant degrades readability there. "Data Breach" and "Cyber Attack" labels extend above the top axis boundary into the subtitle margin.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title and subtitle in light cream #F0EFE8 (INK token flipped), clearly visible. Axis labels and tick labels in #B8B7B0 (INK_SOFT flipped), readable. No dark-on-dark failure — all text uses light tokens against the dark background. Legend boxes use elevated dark background #242420 with INK_SOFT border and light legend text.
      Data: Zone fill colors (#009E73, #DDCC77, #BD8233, #AE3030) are identical to light render — only chrome flips as required. Risk item labels are in light #F0EFE8, visible against the dark surface. Cell watermarks are rgba(255,255,255,0.28) — correct for dark theme. "Cyber Attack" label bleeds into the right legend box area.
      Legibility verdict: PASS — no dark-on-dark failures. Same label overlap issues persist from light render.
