review:
  strengths:
  - 'Correct imprint_seq colormap (green→blue from #009E73 to #4467A3) applied to
    the continuous risk-score heatmap — palette-compliant and visually smooth'
  - Intelligent marker size hierarchy (22–44 px) scaled by risk score produces an
    immediate visual focal point on the highest-risk items
  - Structured cell-offset system (defaultdict + pre-defined 1–4 item offset tables)
    cleanly handles multiple risks sharing a cell without overlap
  - Watermark risk-score numbers in each cell add depth without competing with the
    data markers
  - 'Theme-adaptive chrome is fully correct: all chrome tokens (PAGE_BG, ELEVATED_BG,
    INK, INK_SOFT, INK_WATERMARK) resolve correctly for both light (#FAF8F1) and dark
    (#1A1A17) renders'
  - 'Idiomatic Bokeh usage throughout: ColumnDataSource for all data, LabelSet with
    background_fill_color for labels, LinearColorMapper + transform() for declarative
    color mapping, major_label_overrides for categorical axis ticks'
  - Interactive HTML artifact saved via output_file/save alongside the PNG screenshots
    — leverages Bokeh's distinctive web-export capability
  - 'All 5 spec requirements met: gradient-colored cells, descriptive axis tick labels,
    labeled markers with jitter, risk-zone legend, and grid cell borders'
  weaknesses:
  - Risk item labels set at 18pt (≈24 source-px) are readable at full resolution but
    become very small (~4px) when the 2400×2400 canvas is scaled to 400px mobile width
    — consider increasing to 22–24pt and relying on the structured offsets (which
    already prevent overlap) to maintain separation
  - Technical category (#009E73 green) markers plotted over the green lower-risk heatmap
    cells have reduced fill-contrast — the dark ink outline (line_color=INK, line_width=2)
    compensates, but the contrast gap is visible for 'Power Failure' (Rare/Major,
    score=4) where the cell background is a similar green hue; a slightly thicker
    outline (line_width=3) or marker size increase would help
  - Zone swatch colors are hardcoded hex values sampled manually from the gradient
    rather than computed dynamically from the same LinearColorMapper used for the
    heatmap — the pre-computed values are accurate but could drift if the gradient
    endpoints change
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, no pure white
      Chrome: Title "heatmap-risk-matrix · python · bokeh · anyplot.ai" in bold dark ink (#1A1A17), centered, ~65% of canvas width — clearly visible. X-axis label "Impact (Consequence Severity)" and Y-axis label "Likelihood (Probability of Occurrence)" in dark ink — both readable. Axis tick labels (Negligible/Minor/Moderate/Major/Catastrophic on X; Rare/Unlikely/Possible/Likely/Almost Certain on Y) in dark secondary ink (#4A4A44) — legible. No axis lines or tick marks (removed for clean look).
      Data: 5x5 heatmap cells use the imprint_seq gradient (green #009E73 → blue #4467A3) driven by risk scores 1–25 — low-risk cells bottom-left are bright green, high-risk cells top-right shift to blue. 15 risk items plotted as circles with category colors: Technical=#009E73 (green), Financial=#C475FD (lavender), Operational=#4467A3 (blue), Legal=#BD8233 (ochre). Markers sized 22–44px by risk score. Labels below each marker with semi-transparent warm-bg fills. Watermark risk scores visible in each cell. Right-side legend shows Risk Zones (with gradient-sampled swatches: Low/Medium/High/Critical) and Categories (with colored circles).
      Legibility verdict: PASS — all text elements readable. Risk item labels at 18pt are the smallest text and would be very small (~4px) scaled to 400px mobile, but all elements are readable at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, no pure black
      Chrome: Title in light cream (#F0EFE8) clearly visible against near-black background. Axis labels in light cream — readable. Tick labels in soft light grey (#B8B7B0) — readable against dark background. No dark-on-dark failures observed; all chrome correctly inverts.
      Data: Heatmap cell gradient colors are IDENTICAL to the light render — the same green-to-blue imprint_seq progression is preserved. Risk item marker colors (Technical=green, Financial=lavender, Operational=blue, Legal=ochre) are identical. Label background fills use the dark ELEVATED_BG (#242420) — labels appear as light text on slightly elevated dark boxes. Legend text in light secondary ink. Zone swatches and category circles use the same data colors as the light render.
      Legibility verdict: PASS — all text readable on dark background. No dark-on-dark failures. Brand green #009E73 is clearly visible against the dark surface. Chrome adaptation is complete and correct.
