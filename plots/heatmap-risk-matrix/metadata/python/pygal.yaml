review:
  strengths:
  - Excellent semantic color gradient (green→amber→orange→red) perfectly matches risk-zone
    conventions; uses Imprint semantic anchors (LOW_COLOR derived from brand green,
    MED_COLOR=#DDCC77 amber, CRIT_COLOR=#AE3030 matte red)
  - 'Full spec compliance: correct 5×5 grid heatmap, descriptive axis tick labels
    (Rare…Almost Certain / Negligible…Catastrophic), 14 realistic risk items with
    jitter, dual legend (Risk Zones + Categories), correct title format'
  - Both themes render correctly — warm off-white (#FAF8F1) light / warm near-black
    (#1A1A17) dark backgrounds; text is fully readable in both renders with no dark-on-dark
    failures
  - 'Comprehensive data quality: 14 diverse risk items across all 4 risk zones and
    all 4 categories, realistic project/enterprise scenario, correctly computed scores
    (likelihood × impact)'
  - Creative pygal implementation using custom Graph subclass with SVG node manipulation,
    coordinate transforms, paint-order stroke/fill technique for marker label halos,
    and native pygal tooltip system
  weaknesses:
  - Excessive blank space above the risk matrix (~17–20% of canvas height between
    title and grid top) — reduce chart margin_top from 130 to ~50–60, and consider
    increasing the inner margin_top from 20 to reclaim vertical space for the grid
  - 'CQ-01 violation: custom class `RiskMatrixHeatmap(Graph)` with 6 methods departs
    significantly from KISS ''no functions/classes'' structure; the complexity is
    partially justified by pygal''s lack of native heatmap, but the _compute/_plot
    split and helper methods add overhead'
  - 'LM-01 low: the implementation relies entirely on internal pygal low-level APIs
    (self.svg.node, self.view, self.nodes) — not idiomatic high-level pygal; the importlib
    workaround to avoid filename collision is a workaround rather than clean architecture'
  - 'DE-02 refinement gap: whitespace distribution is uneven (too much at top, otherwise
    acceptable); the legend area on the right has adequate spacing but top of canvas
    wastes approximately 400px'
  - 'VQ-02 tight labels: risk item labels inside cells (font ≈ cell_size × 0.105)
    are quite small and tight in cells with multiple items (e.g. ''Bgt. Overrun''
    and ''Vendor Delay''); marker labels could be marginally larger for better mobile
    readability'
