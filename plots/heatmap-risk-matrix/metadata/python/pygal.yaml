review:
  strengths:
  - 'Full spec compliance with all 5x5 risk matrix features: zone gradient, zone labels
    in cells, score values, labeled category markers with jitter, and dual legend
    system'
  - Theme-adaptive chrome works correctly in both renders - luminance-aware cell text
    switching (dark/light based on cell background luminance) ensures legibility across
    all zone colors in both themes
  - 14 realistic enterprise risk items across four professional categories provide
    high-quality, neutral domain data
  - The importlib workaround for the filename collision with the pygal package is
    the correct and clean solution
  weaknesses:
  - 'Category marker colors do not start with brand green #009E73 - Technical category
    uses #4467A3 (Imprint position 3) to avoid visual conflict with the Low zone green
    (#4DAF8D). Fix: use #009E73 for Technical and choose a Low zone background with
    enough visual distance from it so brand green category markers are distinguishable
    from their host cells'
  - Risk item marker label font size (marker_font = cell_size x 0.105) renders small
    at mobile scale - increase to cell_size x 0.13 or higher to improve readability
    when the plot is scaled to 400 px
  - Noticeable empty canvas space at the top between the title and the matrix grid
    - reduce margin_top in the custom _plot code or adjust the y0 centering calculation
    to distribute whitespace more evenly
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - correct
      Chrome: Title "heatmap-risk-matrix · python · pygal · anyplot.ai" visible in dark ink at top. Y-axis labels "1. Rare" through "5. Almost Certain" in dark ink. X-axis labels "1. Negligible" through "5. Catastrophic" rotated 35deg in dark ink. "LIKELIHOOD" and "IMPACT" axis titles in bold dark ink. All chrome text is clearly readable.
      Data: 5x5 grid cells colored by zone - green (Low 1-4), amber (Medium 5-9), orange (High 10-16), red (Critical 20-25). Cell text (score number + zone label) adapts color (dark/light) based on cell luminance. Risk markers as colored circles - blue (#4467A3 Technical), purple (#C475FD Financial), brown (#BD8233 Operational), cyan (#2ABCCD External). First categorical series is #4467A3, not brand green #009E73.
      Legibility verdict: PASS - all elements readable, minor concern for small marker labels at mobile scale

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct
      Chrome: Title and all axis labels/titles rendered in light cream tones, clearly readable against the dark background. No dark-on-dark failures. Legend text is legible. Cell text luminance-adaptation still works correctly.
      Data: Cell fill colors identical to light render (zone gradient unchanged). Category marker circle colors identical to light render. No chrome-vs-data color confusion.
      Legibility verdict: PASS - both themes render correctly with no readability failures
