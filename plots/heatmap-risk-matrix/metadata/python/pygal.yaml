      Data: 5×5 color-coded grid cells — Low zone in teal-green (#4DAF8D), Medium in amber-yellow (#DDCC77), High in orange (#CC7830), Critical in deep matte red (#AE3030). Cell scores (1–25) in large bold white/dark text with zone label below at 75% opacity. 14 risk item markers (circles) in category colors: Technical=blue (#4467A3), Financial=lavender (#C475FD), Operational=ochre (#BD8233), External=cyan (#2ABCCD). Marker labels with paint-order halo stroke visible. First categorical series (Technical) uses Imprint blue (pos 3), not green — green excluded intentionally to avoid clash with Low zone color.
