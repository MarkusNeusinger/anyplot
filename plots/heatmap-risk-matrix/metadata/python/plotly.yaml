    Low and an Imprint member at lower opacity for High.'
  - Score annotation fontsize 9px (36 source px at scale=4) is quite small at mobile-scaled
    widths; consider 10-11px.
  - Large top gap between subtitle and plot matrix area could be reduced (lower t
    margin or adjust title y position) to better use canvas space.
