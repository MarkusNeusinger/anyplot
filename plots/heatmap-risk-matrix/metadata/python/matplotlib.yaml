review:
  strengths:
  - 'Full spec compliance: zone labels, jitter, descriptive axis labels (Rare/Unlikely/etc.),
    risk scores in each cell, and zone boundary dashed lines all present'
  - 'Excellent use of matplotlib-specific features: FancyBboxPatch rounded cells,
    patheffects.withStroke for label contrast, custom LinearSegmentedColormap built
    from Imprint palette colors'
  - Proper theme-adaptive chrome throughout — INK, INK_SOFT, INK_MUTED, ELEVATED_BG,
    PAGE_BG tokens applied to title, axis labels, ticks, legend frames, and path effects
  - Marker size variation by risk score (10–18 pt) creates a natural visual hierarchy
    — critical risks are visually larger than low-risk items
  - Smart label_offsets dict prevents overlap for most items in crowded cells; path
    effects ensure legibility on the colored heatmap background
  weaknesses:
  - 'Label crowding in the Possible row (y≈2.5): Key Staff Turnover, Market Shift,
    Server Outage, and Budget Overrun/Supply Chain Disruption in the Likely row all
    compete for label space — some near-overlap remains despite label_offsets (VQ-02)'
  - Risk item label fontsize=7 is small; at mobile width (~400 px display) these labels
    risk becoming illegible — increase to fontsize=8 (VQ-01)
  - Green-to-red risk gradient is a CVD accessibility concern (deuteranopia/protanopia
    confuse these hues); score numbers in cells provide partial mitigation but redundant
    shape encoding (e.g. triangle vs circle per category) would fully address it (VQ-04)
  - Score numbers use alpha=0.58 — borderline too subtle; in dark mode the INK token
    (#F0EFE8) on green cells has less intrinsic contrast before alpha is applied —
    consider alpha=0.70 or dropping to 0.65 minimum (VQ-01/VQ-03)
  - Two stacked legends below the matrix feel vertically tight; leg1 is at bbox_to_anchor
    y=-0.08 and leg2 at y=-0.18 — the gap is narrow and the second legend's bottom
    may be clipped at canvas edge on some renders (VQ-05)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "heatmap-risk-matrix · python · matplotlib · anyplot.ai" fully visible in dark INK text; x-axis label "Impact" and y-axis label "Likelihood" readable at 10pt; tick labels (Negligible/Minor/.../Catastrophic on x, Rare/.../Almost Certain on y) readable at 8pt; "Almost Certain" wraps to two lines cleanly.
      Data: 5×5 grid of rounded-corner cells with green→amber→ochre→red gradient based on risk score; each cell has a subtle score number (alpha=0.58, fontsize=10); 14 risk items plotted as circles with white edges in three Imprint palette colors: Operational=#009E73 (green), Technical=#C475FD (lavender), Financial=#4467A3 (blue); marker sizes vary 10–18pt by risk severity; white dashed zone boundary lines visible; two legends below (Category ncols=3, Risk Level ncols=4).
      Legibility verdict: PASS — all chrome elements readable; risk labels (fontsize=7) small but legible at full resolution; some crowding in the Possible row but no actual text overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, and tick labels rendered in light INK (#F0EFE8) — all clearly readable against dark background. No dark-on-dark failures observed. Legend frames use ELEVATED_BG (#242420) with INK_SOFT (#B8B7B0) edge — correct dark-theme theming. Legend text in INK_SOFT (light gray), legend titles in INK (cream).
      Data: Heatmap cell colors are identical to the light render (Imprint-derived green→amber→ochre→red gradient is theme-independent as required). Risk item marker colors are unchanged (#009E73, #C475FD, #4467A3). Path effects (withStroke foreground=PAGE_BG=#1A1A17) create a dark halo around the light-colored labels — effective contrast on colored cells. Score numbers use INK (#F0EFE8) for scores < 10 and white for ≥ 10.
      Legibility verdict: PASS — all text readable; dark-on-dark failure not present; the dark stroke on light label text provides adequate contrast over colored heatmap cells.
