review:
  strengths:
  - 'Perfect spec compliance: all required features implemented (gradient cells, descriptive
    tick labels, jitter, zone legend, zone boundaries)'
  - Both themes correctly handled with full theme-token propagation (PAGE_BG, INK,
    INK_SOFT, ELEVATED_BG applied to all chrome elements)
  - Variable marker sizes by risk score provide a second encoding of severity beyond
    color
  - FancyBboxPatch with rounded corners and path-effects stroke labels are polished,
    library-appropriate choices
  - Category colors follow Imprint canonical order (positions 1–3); canvas correctly
    square (2400×2400 px)
  - Clean, reproducible flat script with seeded jitter
  weaknesses:
  - Label crowding in the Possible/Likely × Moderate/Major area — 'Key Staff Turnover',
    'Market Shift', 'Scope Creep', and 'Budget Overrun' labels visually overlap; 'Supply
    Chain Disruption' label encroaches on the adjacent Catastrophic column. Consider
    tighter offsets, smaller label fontsize (8→7), or auto-repositioning for markers
    in shared cells.
  - 'Custom hex #7b1f1f used as the darkest stop in the risk colormap — not in the
    Imprint palette or its three anchors. Replace with a stop at #AE3030 (Imprint
    matte red) and drop the extra dark-red stop, or darken by blending #AE3030 toward
    the page background.'
  - Cell score numbers at alpha=0.45 are slightly too faint — consider 0.55–0.60 for
    better readability without competing with the markers.
