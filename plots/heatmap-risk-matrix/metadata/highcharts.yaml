  image_description: 'The plot shows a 5×5 heatmap grid with "Impact" on the x-axis
    (Negligible to Catastrophic) and "Likelihood" on the y-axis (Rare to Almost Certain).
    Each cell displays the risk score (likelihood × impact, ranging from 1 to 25).
    The background gradient transitions from green (low scores, bottom-left) through
    yellow and orange to red (high scores, top-right). Individual risk items are plotted
    as colored circle markers with white outlines: blue for Technical (Server Outage,
    Data Breach, Tech Debt, Minor Bug, Power Failure), purple for Financial (Budget
    Overrun, Currency Risk, Reg. Change, IP Dispute), and teal/cyan for Operational
    (Vendor Delay, Scope Creep, Key Staff Loss, Supply Issue, PR Crisis). Data labels
    appear above markers but some are missing (e.g., Scope Creep at Almost Certain/Moderate,
    Key Staff Loss at Possible/Major) likely suppressed by allowOverlap: false. Title
    reads "heatmap-risk-matrix · highcharts · pyplots.ai" with a subtitle explaining
    the formula. A legend in the bottom-right shows the three categories. The background
    is off-white. No zone labels (Low/Medium/High/Critical) are present.'
