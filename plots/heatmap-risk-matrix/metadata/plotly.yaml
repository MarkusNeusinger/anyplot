  image_description: 'The plot displays a 5x5 risk assessment matrix with "Impact"
    on the x-axis (Negligible, Minor, Moderate, Major, Catastrophic) and "Likelihood"
    on the y-axis (Rare, Unlikely, Possible, Likely, Almost Certain). Cells are color-coded:
    light blue for Low (1-4), yellow for Medium (5-9), light orange for High (10-16),
    and light pink/mauve for Critical (20-25). Risk scores appear as small gray numbers
    in the bottom-right corner of each cell. Twelve risk items are plotted as colored
    circle markers with text labels above them: blue circles for Technical risks (Data
    Breach, System Outage, Cyber Attack, Tech Debt), orange circles for Operational
    risks (Supply Chain, Staff Turnover, Scope Creep, Compliance Gap), and purple
    circles for Financial risks (Budget Overrun, Regulatory, Vendor Failure, Market
    Shift). Markers vary in size — Critical-zone risks like Cyber Attack are larger
    and bolder. A legend on the right shows both category colors and zone colors with
    score ranges. Title reads "heatmap-risk-matrix · plotly · pyplots.ai". White borders
    separate cells clearly.'
