review:
  strengths:
  - Perfect spec compliance — all required features implemented including zone labels,
    jitter, categories, and dual legend
  - Rich hover templates with detailed risk information (name, likelihood, impact,
    score, category) leverage Plotly's interactivity
  - Realistic, well-chosen risk management data with 12 items across 3 categories
    spanning all risk zones
  - Clean code structure with appropriate use of Plotly's shape and annotation APIs
    for the heatmap background
  weaknesses:
  - Text overlap between risk name labels and cell score annotations, particularly
    in the Major/Unlikely area where Regulatory Change and Compliance Gap collide
  - Red-green color gradient for risk zones is not colorblind-safe
  - Risk labels in bold Arial Black at 13pt feel typographically heavy; multi-line
    names add clutter
  - No visual hierarchy to emphasize critical-zone risks over lower-risk items
  image_description: 'The plot displays a 5x5 risk assessment matrix with Impact on
    the x-axis (Negligible, Minor, Moderate, Major, Catastrophic) and Likelihood on
    the y-axis (Rare, Unlikely, Possible, Likely, Almost Certain). Each cell is color-coded
    with a green-yellow-orange-red gradient based on the risk score (likelihood x
    impact), with the score number and zone label (Low/Medium/High/Critical) displayed
    in each cell at reduced opacity. Twelve risk items are plotted as colored circular
    markers with white outlines: blue for Technical (Data Breach, System Outage, Cyber
    Attack, Tech Debt Accumulation), purple for Financial (Budget Overrun, Regulatory
    Change, Vendor Failure, Market Shift), and orange for Operational (Supply Chain
    Disruption, Key Staff Turnover, Scope Creep, Compliance Gap). Risk labels appear
    above each marker in bold text. A legend on the right side shows both category
    colors and risk zone colors. The title reads "heatmap-risk-matrix · plotly · pyplots.ai".
    The background is white with the plotly_white template.'
