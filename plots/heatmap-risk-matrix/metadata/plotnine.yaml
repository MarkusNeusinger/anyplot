review:
  strengths:
  - 'Clean layered composition: geom_tile + geom_point + geom_label creates well-structured
    heatmap with clear visual hierarchy'
  - Dark label boxes (#1a1a2e) with white text provide excellent contrast against
    all background colors
  - Realistic neutral risk management data with good variety across the matrix
  - 'Perfect code quality: flat structure, seeded randomness, clean imports'
  weaknesses:
  - Missing zone labels or legend for risk severity levels (Low/Medium/High/Critical)
    as required by spec
  - Label overlap when multiple risks share the same cell (Market Shift / Compliance
    Gap)
  - Green-to-red gradient is not colorblind-accessible (could add redundant encoding)
  image_description: The plot displays a 5×5 risk assessment matrix heatmap with "Impact"
    on the x-axis (Negligible, Minor, Moderate, Major, Catastrophic) and "Likelihood"
    on the y-axis (Rare, Unlikely, Possible, Likely, Almost Certain). Background cells
    are colored using a green-yellow-orange-red gradient based on risk score (likelihood
    × impact), with a continuous "Risk Score" color bar legend on the right ranging
    from ~1 to 25. Twelve risk items are plotted as dark circular markers with white-on-dark
    (#1a1a2e) label boxes showing risk names (e.g., "Supply Delay", "Budget Overrun",
    "Data Breach"). White borders separate the grid cells. The title reads "heatmap-risk-matrix
    · plotnine · pyplots.ai" in bold at the top center. Labels for "Market Shift"
    and "Compliance Gap" overlap slightly in the Major/Possible cell.
