review:
  strengths:
  - 'Excellent palette compliance: Imprint semantic anchors (#009E73, #DDCC77, #BD8233,
    #AE3030) used correctly for the risk gradient, Imprint categorical palette for
    markers'
  - Three well-structured Chart.js plugins (matrixBg, riskLabels, zoneLegend) make
    the implementation readable and maintainable
  - Pill-shaped label backgrounds with theme-adaptive surfaces ensure risk item labels
    are readable in both light and dark themes
  - 'Perfect data quality: realistic IT security scenario with 12 risks covering all
    four zone types, correct axis mapping'
  - Square canvas orientation is the right choice for a symmetric 5x5 grid
  weaknesses:
  - 'Zone severity legend displays ''Critical (17-25)'' but spec defines Critical
    as ''(20-25)''. Fix: update the zoneLegend entries array — change { label: ''Critical
    (17-25)'', score: 22 } to { label: ''Critical (20-25)'', score: 22 }'
  - 'Axis border spines (border: { color: t.inkSoft, width: 1.5 }) add visual weight
    to the heatmap without benefit — consider removing them to let the cell borders
    do the structural work'
  - Some visual crowding in the high-likelihood rows where pill labels from adjacent
    cells approach each other; minor as no actual overlap occurs
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "heatmap-risk-matrix · javascript · chartjs · anyplot.ai" in dark ink, clearly readable. X-axis label "Impact" and Y-axis label "Likelihood" in dark ink, both readable. Tick labels (Negligible/Minor/Moderate/Major/Catastrophic; Rare/Unlikely/Possible/Likely/Almost Certain) in secondary ink, clearly readable.
      Data: 5x5 heatmap cells graduating green (#009E73) through amber (#DDCC77), ochre (#BD8233) to matte red (#AE3030). Zone labels (LOW, MEDIUM, HIGH, CRITICAL) in white in representative cells. Risk score numbers in cell corners (12px, semi-transparent white). 12 scatter markers: Technical = #009E73, Financial = #C475FD, Operational = #4467A3. Pill-backed risk labels in cream (#FAF8F1) with dark text. Zone severity legend in bottom-right. Category legend at bottom.
