review:
  strengths:
  - Three custom Chart.js plugins (matrixBg, riskLabels, zoneLegend) elegantly solve
    a non-native chart type using only core scatter + canvas API — no forbidden plugins
  - 'Cell color interpolation anchors all four stops to Imprint semantic colors (#009E73
    green, #DDCC77 amber, #BD8233 ochre, #AE3030 red), keeping the gradient on-brand'
  - Category-coded markers (Technical/Financial/Operational) use palette[0/1/2] in
    canonical order with a clean bottom legend
  - 'Risk item label pills use roundRect with theme-adaptive fill (#FAF8F1 / #1A1A17)
    and correct ink text — fully legible in both renders'
  - Zone severity legend box in chart area provides instant Low/Medium/High/Critical
    reference with color swatches
  - 'All spec features implemented: 5×5 grid, descriptive axis tick labels, zone labels
    with score ranges, per-cell risk scores, category grouping'
  weaknesses:
  - 'Dark mode: zone labels (LOW/MEDIUM/HIGH/CRITICAL) use `rgba(0,0,0,0.60)` in dark
    theme. On HIGH/CRITICAL zone cells (dark maroon/near-black after blending with
    #1A1A17 background) this is dark-on-dark — text is nearly invisible. Fix: swap
    to `rgba(255,255,255,0.85)` for ANYPLOT_THEME === ''dark''.'
  - 'Dark mode: per-cell score numbers in bottom-right corner use `rgba(0,0,0,0.50)`
    in dark theme, same dark-on-dark problem on darker cells. Fix: use `rgba(255,255,255,0.65)`
    in dark theme.'
  - 'Zone legend box and cell border colors use hardcoded hex (#FFFDF6, #242420, rgba(255,255,255,0.45))
    rather than the ANYPLOT_TOKENS (t.elevatedBg, t.grid) — these happen to match
    current token values but will drift if tokens change.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct page surface, not pure white.
      Chrome: Title "heatmap-risk-matrix · javascript · chartjs · anyplot.ai" in dark ink, clearly readable at top. Axis labels "Impact" (x) and "Likelihood" (y) in dark ink at 15px, well-proportioned. X-axis tick labels (Negligible, Minor, Moderate, Major, Catastrophic) and y-axis tick labels (Rare, Unlikely, Possible, Likely, Almost Certain) in inkSoft, fully readable. Bottom legend (Technical/Financial/Operational) in dark ink, clear. Zone severity legend box (bottom-right, #FFFDF6 background) with Low/Medium/High/Critical swatches, readable.
      Data: 5×5 colored grid — green (#009E73) for Low (score 1-4), amber/tan for Medium (5-9), ochre-brown for High (10-16), dark red (#AE3030) for Critical (17-25). 12 risk item markers as circles: Technical in palette[0] green, Financial in palette[1] lavender, Operational in palette[2] blue. Each has a white border and a pill label. Zone labels (LOW, MEDIUM, HIGH, CRITICAL) in white text on colored cells — legible. Score numbers in cell corners in semi-transparent white — visible.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title in light cream text, clearly readable. Axis labels in light ink (t.ink = #F0EFE8 in dark mode), readable. Tick labels in t.inkSoft (#B8B7B0), readable. Bottom legend in light ink, clear. Zone severity legend box (#242420 background = correct elevatedBg) with swatches, text in #B8B7B0, readable.
      Data: Imprint palette data colors (green/lavender/blue markers) are IDENTICAL to light render — only chrome flipped. Cell fill colors appear somewhat darker/more muted since they are semi-transparent overlays on the dark background (e.g., the critical-red cells become dark maroon, the low-green cells are a muted sage green). The risk item label pills correctly use rgba(26,26,23,0.92) background with #F0EFE8 text — readable. HOWEVER: zone labels (LOW/MEDIUM/HIGH/CRITICAL) use rgba(0,0,0,0.60) — black 60% opacity on the dark cell backgrounds. In the LOW and MEDIUM zones (lighter cell colors), this is marginally readable. In the HIGH and CRITICAL zones (which blend to dark maroon/near-black), the black zone label text is near-invisible (dark-on-dark failure). Similarly, per-cell score numbers use rgba(0,0,0,0.50) in dark mode — very hard to read in high-risk zone cells.
      Legibility verdict: PARTIAL FAIL — axis/title/legend text fully readable, but zone labels and score numbers inside HIGH and CRITICAL cells have dark-on-dark contrast failure in dark render.
