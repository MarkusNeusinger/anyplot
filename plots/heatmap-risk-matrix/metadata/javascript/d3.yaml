review:
  strengths:
  - 'Perfect spec compliance: correct 5x5 risk heatmap with all required zone colors,
    risk markers, axis labels, and zone legend'
  - 'Excellent semantic color choices: traffic-light risk convention using Imprint
    palette/anchors (#009E73 Low, #DDCC77 Medium, #BD8233 High, #AE3030 Critical)
    with justified semantic exception ordering'
  - All 12 risk items placed in distinct cells with numbered circle markers and a
    clearly organized risk items index — avoids label clutter elegantly
  - Score watermarks in each cell add a subtle informational layer without visual
    noise
  - 'Both themes correctly adapted: t.ink/t.inkSoft/t.pageBg tokens used throughout
    for all chrome elements'
  - Clean, deterministic hard-coded data representing a realistic project management
    risk register
  - Correct square orientation for the symmetric grid layout
  - 'Perfect code quality: flat KISS structure, no fake UI, reproducible data'
  weaknesses:
  - 'LM: Implementation avoids D3''s core idiomatic patterns — grid cells drawn with
    for-loops instead of d3.cross + .data().join(), and axis labels are manual SVG
    text elements instead of d3.scaleBand() + d3.axisBottom()/d3.axisLeft(). Replace
    nested for-loops with: const cells = d3.cross(d3.range(1,6), d3.range(1,6), (l,i)
    => ({l,i,score:l*i})); g.selectAll(''rect.cell'').data(cells).join(''rect'')...
    and add d3.scaleBand() scales for positioning.'
  - 'DE: Low-risk zone cells (#009E73 at 0.32 opacity) are barely distinguishable
    from the dark background (#1A1A17) in the dark render — the dark teal blends with
    the near-black surface. Consider raising low-zone opacity to 0.50-0.55 in dark
    mode to maintain zone readability.'
  - 'DE: Cell borders use t.pageBg as stroke color, which becomes invisible in dark
    mode (dark stroke on dark cell fill). Switch cell stroke to t.inkSoft or a semi-transparent
    ink color so borders are visible in both themes.'
  - 'DE: No visual emphasis or storytelling beyond the mandatory color zones — no
    highlighting of the highest-priority risks or annotation pointing the viewer to
    key insights. Consider slightly enlarging markers in the Critical zone or adding
    a subtle annotation for the most critical risk.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "heatmap-risk-matrix · javascript · d3 · anyplot.ai" in bold dark ink at top, clearly readable. Y-axis labels (Catastrophic, Major, Moderate, Minor, Negligible) in dark secondary ink on the left. X-axis labels (Rare, Unlikely, Possible, Likely, Almost Certain — "Almost Certain" split across two lines) at bottom. "Impact →" rotated Y-axis label and "Likelihood →" X-axis label both readable. Score watermarks (faint numbers) in top-right of each cell at 28% opacity — subtle and intentional.
      Data: 5×5 grid with four color zones: low-risk cells in pale green/teal (#009E73 at 0.32 opacity), medium in muted yellow (#DDCC77 at 0.62), high in golden-ochre (#BD8233 at 0.80), critical in dark red (#AE3030 at 0.90). 12 numbered dark circles (dark fill, white numbers) mark risk items across the grid. Zone legend strip (4 colored boxes with labels) and 3-column risk items index below the grid.
      Legibility verdict: PASS — all text clearly readable against warm off-white background, no dark-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title in light off-white (#F0EFE8), clearly readable. Y-axis and X-axis labels in lighter secondary ink (#B8B7B0), readable. "Impact →" and "Likelihood →" axis titles in primary light ink, visible. Risk zone legend labels and risk item index text in secondary ink — readable though small (12px).
      Data: Same four color zones — however low-risk cells (#009E73 at 0.32 opacity on #1A1A17) appear as very dark teal, only subtly distinguishable from the background. Medium, high, and critical zones remain clearly visible. Risk markers appear as WHITE circles (t.ink = #F0EFE8) with dark numbers (t.pageBg = #1A1A17) — color correctly inverted from light render. Zone legend boxes maintain their zone colors. Critically: the data colors (zone fills) are identical between themes — only chrome (text, backgrounds) has flipped.
      Legibility verdict: PASS overall, with one minor concern — the low-risk zone cells are very dark and barely distinguishable from the page background in dark mode. Cell borders using t.pageBg stroke become invisible (dark-on-dark) in the low-risk zone, making cell boundaries in that region less crisp. No text legibility failures.
