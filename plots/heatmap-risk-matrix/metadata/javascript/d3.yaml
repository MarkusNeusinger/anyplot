review:
  strengths:
  - Semantic traffic-light color zones (green/amber/ochre/red) drawn correctly from
    Imprint palette with semantic exceptions
  - Idiomatic d3.cross() for Cartesian product of 25 grid cells — elegant and D3-native
  - Theme-adaptive chrome throughout (ink/inkSoft for text, pageBg for marker rings)
  - Critical-zone markers (score≥20) rendered at r=17 vs r=14 for intentional visual
    hierarchy
  - Realistic project-management risk data covering all four risk severity zones
  - Numbered marker convention with separate risk-item index — clean and readable
    at scale
  weaknesses:
  - Marker labels are index numbers (1-12) rather than direct risk-name labels on
    the chart — spec says labeled markers; numbering is valid but a small deviation
  - Bottom section margin is tight (~17-21 px before canvas edge) — risk items row
    4 clears the canvas but barely; a slightly larger bottom margin would be safer
  - zoneIdx() helper function deviates from KISS no-functions rule (minor)
  - Risk item and zone-label text at 12px is slightly small for mobile readability
    at 400px width — 13-14px would be safer
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct for light theme
      Chrome: Title "heatmap-risk-matrix · javascript · d3 · anyplot.ai" dark text, centered at top — clearly readable. Y-axis label "Impact →" (rotated, bold) and X-axis label "Likelihood →" both in dark ink, clearly visible. Tick labels "Rare/Unlikely/Possible/Likely/Almost Certain" and "Negligible/Minor/Moderate/Major/Catastrophic" at 14px in inkSoft — readable. "Almost Certain" correctly split into two tspan lines.
      Data: 5×5 grid with color-coded cells — Low zone green (#009E73 with 0.32 opacity), Medium zone amber (#DDCC77 at 0.62 opacity), High zone ochre (#BD8233 at 0.80 opacity), Critical zone red (#AE3030 at 0.90 opacity). Score watermarks in each cell at 0.28 opacity (intentionally subtle). Numbered circles (r=14, r=17 for critical) in dark ink fill with pageBg stroke — clearly visible against all zone backgrounds. Below grid: zone color swatches with labels and 3-column risk item index listing all 12 risks.
      Legibility verdict: PASS — all text elements readable; bottom section tight but no clipping

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct for dark theme
      Chrome: Title and all axis labels render in light-colored text (t.ink / t.inkSoft tokens, approximately #F0EFE8 / #B8B7B0) — clearly readable against dark background. No dark-on-dark failures detected. Grid cell borders at reduced opacity. Tick labels fully readable.
      Data: Zone cell colors remain identical to light render (same hex values, slightly higher opacity for Low zone: 0.50 vs 0.32). Risk markers appear as cream/off-white circles (#F0EFE8 fill = t.ink in dark) with near-black strokes and dark numbers inside — strong contrast and fully readable. Zone swatches and risk item list text readable in muted light tones.
      Legibility verdict: PASS — data colors identical to light render; only chrome flips; no dark-on-dark failures
