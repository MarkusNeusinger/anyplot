review:
  strengths:
  - Perfect spec compliance — all 5 required features (color-coded cells, descriptive
    axis labels, jittered labeled markers, zone legend, grid delineation) implemented
    correctly
  - Realistic IT security risk register data with 12 named risks distributed meaningfully
    across all 4 risk zones (Low through Critical)
  - 'Smart jitter algorithm: circular offset based on sibling count ensures co-located
    risks remain distinguishable without cluttering cells'
  - Excellent use of MUI X's useDrawingArea hook for coordinate-aware custom SVG overlays
    (ZoneBackground, RiskCircles, RiskLabels all positioned correctly in chart space)
  - 'Proper semantic use of Imprint palette: green (#009E73) = Low, amber (#DDCC77)
    = Medium/warning, ochre (#BD8233) = High, matte red (#AE3030) = Critical — all
    semantically justified by the style guide'
  - Both themes render with correct backgrounds and fully readable text; no dark-on-dark
    or light-on-light failures
  - Risk score numbers (likelihood × impact) shown as faint cell annotations — informative
    without competing with the primary risk markers
  - Square canvas orientation chosen correctly for the symmetric 5×5 grid
  weaknesses:
  - Zone fill opacity (fillOpacity=0.38) causes the zone colors to appear as pale
    pastels in the light theme and muted darks in the dark theme — the same hex value
    reads visually differently across themes. Consider using full or near-full opacity
    zone colors and adjusting the hex per theme, or choosing opacity values that produce
    visually consistent perceptual differences.
  - Co-located risks in the Major/Unlikely cell (Cloud Outage + Supply Chain + score
    '8' label) feel slightly crowded despite the jitter — the circular offset radius
    (0.22) is modest relative to the cell size. A larger jitter radius or an alternative
    offset direction would reduce the crowding.
  - 'Dual-mechanism for circle rendering: ScatterPlot with slots={{ scatter: RiskMark
    }} AND a separate RiskCircles overlay. The comment acknowledges the ScatterPlot
    slot may not forward in MUI X v7, so both coexist as a belt-and-suspenders workaround.
    This is functional but adds dead code if the slot approach consistently fails
    — consider removing the ScatterPlot and its slot definition and relying solely
    on RiskCircles + useDrawingArea for cleaner code.'
  - Design Excellence could be raised by visually emphasizing the Critical zone risks
    (e.g., larger markers for Ransomware, or a slight glow/shadow on the critical
    cell fill) to create stronger visual hierarchy and immediate risk-prioritization
    storytelling.
