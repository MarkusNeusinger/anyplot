      Data: 5×5 grid of colored cells at 38% opacity over the warm background. Low zone (top-left diagonal) appears as soft teal-green, Medium zone as pale yellow, High zone as light tan/ochre, Critical zone (top-right corner) as muted rose-pink. Risk score numbers appear as faint ink text centered in each cell. 12 risk items rendered as open circles (elevated-bg fill, ink stroke) with bold labels above — all items legible. Two co-located risks (Cloud Outage + Supply Chain, score 8) appear in the Major/Unlikely cell with circular jitter, slightly crowded but readable.
      Legibility verdict: PASS — all text is readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface, not pure black.
      Chrome: Title, axis labels, tick labels, and legend text all appear in light off-white text against the dark background — no dark-on-dark failures. Zone legend text is clearly readable in light ink.
      Data: Same Imprint palette hex values (#009E73, #DDCC77, #BD8233, #AE3030) at fillOpacity=0.38 interact with the dark background to produce darker visual zones: the Low teal-green appears as a deep forest green, Medium amber as dark olive, High ochre as dark brown, Critical red as dark maroon. The zone identity (green/amber/ochre/red) is still perceptible but the palette appears significantly muted compared to the light render. The open circle markers retain their visibility with an ink-stroke outline. Risk name labels appear as light text above each marker — readable throughout.
      Legibility verdict: PASS — all text is readable against the dark background. No dark-on-dark failures. Note: zone colors appear substantially darker than in the light render due to opacity interaction with the dark background surface; this is a visual consistency concern across themes but does not cause a readability failure.
