review:
  strengths:
  - IT security risk register with 12 realistic risks spanning the full 5×5 matrix
    — Ransomware, Data Breach, Phishing, etc. all plausible with credible likelihood/impact
    ratings
  - 'Perfect spec compliance — all required features implemented: zone coloring (Low/Medium/High/Critical),
    descriptive axis tick labels (Rare→Almost Certain, Negligible→Catastrophic), labeled
    risk markers, jitter for co-located items, cell risk-score numbers, zone legend'
  - 'Imprint palette colours used correctly for zone coding: brand green (#009E73)
    for Low, amber anchor (#DDCC77) for Medium, ochre (#BD8233) for High, matte red
    (#AE3030) for Critical — all valid Imprint members with a semantic exception'
  - 'Clean compositional design: zone cell opacity (38%) lets the warm page background
    show through subtly; risk-score numbers at 32% opacity form a background layer
    without competing with foreground markers'
  - Deterministic hardcoded data with circular jitter algorithm for multiple risks
    in same cell — Supply Chain + Cloud Outage in (2,4) cleanly separated vertically
  - Harness tokens (t.ink, t.inkSoft, t.elevatedBg) used correctly for all chrome
    — text and cell borders are theme-adaptive
  weaknesses:
  - Implementation uses raw SVG instead of MUI X Charts components — the community
    @mui/x-charts library does not include a heatmap chart type (that is MUI X Pro/Premium),
    so the implementer bypassed MUI X entirely rather than returning NOT_FEASIBLE;
    the result works but demonstrates no MUI X library features
  - Risk item labels are 11 px CSS (22 px native) — small at full 2400×2400 resolution
    and nearly unreadable when scaled to mobile widths (~400 px); increase to at least
    13–14 px CSS
  - Cell risk-score numbers at fillOpacity=0.32 are very faint, especially in the
    dark render — consider 0.40–0.45 for better readability without dominating the
    foreground markers
  - In dark mode, circle marker fill is t.elevatedBg (#242420, near-black) against
    dark zone backgrounds — markers rely solely on a 1.5 px light stroke for visibility;
    increase stroke width to 2 px or add a slightly lighter fill (e.g. t.grid opacity)
    to improve contrast
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page background showing through transparent SVG.
      Chrome: Title "heatmap-risk-matrix · javascript · muix · anyplot.ai" at 20 px CSS, medium weight, dark ink — fully readable. Y-axis title "Likelihood" rotated 90°, X-axis title "Impact" both at 15 px — readable. Y-tick labels (Rare, Unlikely, Possible, Likely, Almost Certain — split two lines) and X-tick labels (Negligible, Minor, Moderate, Major, Catastrophic) at 13 px in inkSoft — clearly legible against the off-white background. Cell score numbers (1–25) rendered at 32% opacity — faint but discernible. Risk item labels (11 px) above each marker are readable at full resolution.
      Data: 5×5 grid with four zone colors at 38% opacity — Low cells appear soft teal (brand green #009E73 muted), Medium cells cream/warm yellow (amber #DDCC77 muted), High cells tan/brown (ochre #BD8233 muted), Critical cells dusty rose (matte red #AE3030 muted). 12 risk-item circles (r=10, fill=warm white elevatedBg, dark ink stroke 1.5 px) with name labels above. Jitter separates Supply Chain and Cloud Outage in the (2,4) cell cleanly. Legend at bottom shows four coloured swatches correctly labelled.
      Legibility verdict: PASS — all text elements readable; only caveat is risk labels (11 px) would be marginal at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct page background.
      Chrome: Title, axis titles, and tick labels all render in light ink (#F0EFE8 / #B8B7B0) — fully readable against the dark background. No dark-on-dark failures for text elements. Cell score numbers are very faint (32% opacity of #F0EFE8) but no "dark on dark" text issue — they are light-on-dark at low opacity.
      Data: Zone colours at 38% opacity over #1A1A17 are darker variants — Low cells: dark teal; Medium cells: olive/khaki (amber muted on dark); High cells: dark umber/brown; Critical cells: dark crimson/burgundy. Data colours are distinct from the light render only in the sense that the dark page-surface shows through the 38% opacity; the source hex values are identical. Crucially: circle marker fills use t.elevatedBg (#242420, near-black), making them almost the same colour as the background — they remain visible thanks to the 1.5 px light-stroke border but are less prominent than in the light render.
      Legibility verdict: PASS (marginal) — all text is light-on-dark and readable; circle markers in dark mode rely heavily on the stroke ring for definition.
