review:
  strengths:
  - 'Excellent semantic color choice for risk zones: brand green (#009E73) for Low,
    amber anchor (#DDCC77) for Medium, ochre (#BD8233) for High, matte red (#AE3030)
    for Critical — all Imprint palette members in semantically appropriate roles'
  - Intelligent fixed jitter lookup table prevents marker overlap without randomness,
    ensuring reproducible pixel-identical renders
  - Dual-series ECharts composition (heatmap background + scatter overlay) is sophisticated
    and idiomatic
  - Theme-adaptive chrome tokens correctly applied throughout; piecewise visualMap
    data colors are identical between light and dark renders
  - Realistic IT infrastructure risk dataset (12 risks covering cybersecurity, project,
    HR, compliance domains) — plausible and neutral
  - 'Clean deterministic code structure: no functions/classes, well-organized sections,
    reproducible output'
  weaknesses:
  - 'Risk score labels use hardcoded color: "#F0EFE8" (line 148) rather than a theme
    token — works because cell backgrounds are always colored, but bypasses the token
    system'
  - Jitter pattern table caps at 4 items per cell (Math.min(group.length, 4)) — if
    5+ risks ever share a cell, overflow items stack at [0,0]; acceptable for this
    dataset but fragile
  - 'Score label offset: [0, 50] pushes numbers to cell bottom-left — functional but
    could produce minor visual crowding when a risk marker also occupies the lower
    region of a cell'
  - 'Label boxes with backgroundColor: t.elevatedBg in dark mode produce a very dark
    box (#242420) with light text against near-black background — contrast is sufficient
    but reduces visual pop'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "heatmap-risk-matrix · javascript · echarts · anyplot.ai" in dark bold text, clearly visible. X-axis label "IMPACT" and Y-axis label "LIKELIHOOD" in dark uppercase bold. Tick labels (Negligible/Minor/Moderate/Major/Catastrophic and Rare/Unlikely/Possible/Likely/Almost Certain) in dark secondary text. Piecewise legend (Low 1–4 / Medium 5–9 / High 10–16 / Critical 20–25) at bottom in secondary text.
      Data: Four zone colors — brand green (#009E73) Low, amber (#DDCC77) Medium, ochre (#BD8233) High, matte red (#AE3030) Critical. Risk score integers in light cream with text shadow in cell lower-left. Twelve risk markers as dark dots with elevated-background label boxes.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title, axis labels, tick labels, and legend text flip to light cream/gray tones — all readable against dark surface. Risk item label boxes use dark elevated background (#242420) with light ink text — legible. No dark-on-dark failure detected.
      Data: Zone colors (green/amber/ochre/red) are visually identical to light render — only chrome flips. Score labels use hardcoded #F0EFE8 (light) which works on all colored cell backgrounds.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures
