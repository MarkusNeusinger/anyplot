      Data: 5x5 heatmap with brand green (#009E73) for Low zone, amber (#DDCC77) for Medium, ochre (#BD8233) for High, matte red (#AE3030) for Critical. Risk score integers in near-white (#F0EFE8) with dark text shadow in each cell. 12 risk markers appearing as green circles (unintentional — visualMap scope issue) with elevated cream-background label boxes. "Natural Disaster" appears as hollow circle due to same issue.
