review:
  strengths:
  - 'Perfect spec compliance: 5x5 risk matrix with all required features (zone colors,
    descriptive axis labels, labeled markers with jitter, zone legend, risk score
    display per cell)'
  - 'Full code quality: deterministic hardcoded data, clean KISS structure, correct
    ECharts idioms (animation:false, no explicit devicePixelRatio, correct init pattern)'
  - 'Semantically correct Imprint palette: brand green/amber/ochre/matte-red map directly
    to Low/Medium/High/Critical risk zones — best possible palette choice for this
    spec'
  - 'Theme adaptation correct in both renders: all chrome (title, axis labels, ticks,
    legend, label boxes) flip via t.ink/t.inkSoft/t.elevatedBg tokens with no dark-on-dark
    failures'
  - 'Professional details: elevated label boxes with padding+border-radius, score
    numbers with text shadow for readability on all zone backgrounds, disabled emphasis
    for clean screenshots'
  weaknesses:
  - 'visualMap missing seriesIndex: [0] causes scatter series to inherit zone colors
    (all likelihood indices 1-4 map to Low zone green, overriding intended t.ink marker
    color). Fix: add seriesIndex: [0] to visualMap to restrict color mapping to heatmap
    series only.'
  - '"Natural Disaster" (likelihood=1, idx=0) falls below piece min:1 and renders
    as hollow/transparent circle — consequence of visualMap scope issue. Will be fixed
    by the seriesIndex fix.'
  - Risk-name label font size 12px CSS is on the lower end for mobile readability;
    consider bumping to 13-14px.
  - Double spaces in visualMap piece labels ("Low  1-4", "High  10-16") — minor cosmetic;
    single spaces sufficient.
