review:
  strengths:
  - 'Perfect spec compliance: 5×5 grid with risk-score cell coloring, descriptive
    axis tick labels, labeled markers with jitter, and zone legend in subtitle — all
    spec requirements met'
  - 'Semantically correct Imprint palette use: green (#009E73) for Low, amber (#DDCC77)
    for caution/Medium, ochre (#BD8233) for High, matte red (#AE3030) for Critical
    — four Imprint anchors mapped perfectly to risk zone roles'
  - 'Sophisticated SVG renderer approach: uses Highcharts'' chart.renderer API with
    toPixels() coordinate conversion and render-event callback to draw colored cells
    — the correct Highcharts pattern when the heatmap module is unavailable'
  - Deterministic jitter array eliminates marker overlap when multiple risks share
    the same cell (e.g. Data Breach and Cyber Attack both at lk=3, im=5)
  - 'Theme-adaptive chrome: transparent background, t.ink / t.inkSoft tokens throughout,
    text outline on data labels uses t.pageBg for contrast on colored cells in both
    light and dark renders'
  - Score labels in bottom-right corner of each cell provide a useful reading aid
    at 50% opacity — subtle without competing with the risk markers
  weaknesses:
  - Data Breach and Cyber Attack both land at (lk=3, im=5) and despite jitter their
    data labels are very close (~18px apart vertically) — allowOverlap:true means
    the labels can touch; consider increasing JY spread for this cell or shrinking
    label fontSize from 11px to 10px
  - 'Bottom margin (marginBottom: 120) creates a notably large gap between the matrix
    bottom border and the rotated x-axis tick labels — reducing to 90–100 would tighten
    the layout without clipping ''Almost Certain'''
  - Score label placement uses a fixed 8px offset from the cell bottom-right corner
    (rx + rw - 8, ry + rh - 8); on the rightmost column the '25' and other labels
    may be very close to the cell stroke border — using a slightly larger offset (12px)
    would give breathing room
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "heatmap-risk-matrix · javascript · highcharts · anyplot.ai" in dark ink at 22px — fully readable. Subtitle shows four colored risk-zone squares with labels in their respective Imprint colors. Y-axis label "Impact" and X-axis label "Likelihood" in dark ink at 16px — clear and balanced. Tick labels (Catastrophic/Major/Moderate/Minor/Negligible and Rare/Unlikely/Possible/Likely/Almost Certain) in inkSoft at 13px — all readable. Score numbers in each cell at 12px/50% opacity are subtle but visible.
      Data: 5×5 grid of colored cells — green (#009E73) for Low scores (≤4), amber (#DDCC77) for Medium (5–9), ochre (#BD8233) for High (10–16), matte red (#AE3030) for Critical (≥20). 12 risk markers as dark filled circles with page-background ring; data labels in dark ink with page-background text outline appear above each marker. Jitter applied — Data Breach and Cyber Attack both in (3,5) cell, labels close but legible.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in cream (#F0EFE8) at 22px — fully readable against dark background. Subtitle zone squares appear in their Imprint colors (green/amber/ochre/red). Y-axis and X-axis titles in light ink — readable. Tick labels in inkSoft (~#B8B7B0) — clearly visible. Score numbers in cells at 50% opacity appear as semi-transparent cream text — subtle but readable.
      Data: Cell colors identical to light render — green/amber/ochre/red zones unchanged (Imprint data colors are theme-independent). Risk markers appear as cream-filled circles with near-black ring (fillColor: t.ink = #F0EFE8 in dark), data labels in cream with near-black text outline — readable on colored cells.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures; ink tokens correctly adapt between themes
