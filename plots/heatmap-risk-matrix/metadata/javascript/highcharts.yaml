review:
  strengths:
  - Clever use of Highcharts SVG renderer (chart.renderer.g/rect/text + events.render
    callback) to build a fully custom 5×5 risk grid without the unavailable heatmap
    module
  - Semantic Imprint color mapping for risk zones (green=#009E73 Low, amber=#DDCC77
    Medium, ochre=#BD8233 High, red=#AE3030 Critical) is on-palette and instantly
    readable
  - Deterministic jitter array (JX/JY offsets keyed by cell) prevents overlapping
    risk markers without any RNG
  - Color-coded HTML subtitle serves as a compact, well-styled legend; avoids a separate
    legend box that would clutter the square canvas
  - Risk score labels in each cell bottom-right corner add useful reference density
    without competing with the markers
  - Data labels on scatter markers use textOutline with t.pageBg — ensures readability
    on all four cell colors in both themes
  - 'Full spec compliance: 5×5 grid, descriptive axis tick labels (Rare→Almost Certain,
    Negligible→Catastrophic), labeled jitter markers, and zone legend all present'
  - Realistic IT-security risk register with 12 risks spanning all four zones provides
    good feature coverage
  - Square orientation correctly chosen for symmetric grid; canvas gate passed (2400×2400)
  weaknesses:
  - 'X-axis title ''Likelihood'' is not clearly visible in either render — with rotation:
    -30 on tick labels and marginBottom: 95, the axis title may be pushed to the very
    edge of or outside the visible canvas area; increase marginBottom to 120 or add
    explicit offset to bring the label into view'
  - Data Breach and Cyber Attack share cell (3,5) with only 0.18-unit jitter — their
    name labels ('Cyber Attack' above, 'Data Breach' below) are very close together
    and appear to touch or lightly overlap at 13px font; consider reducing data label
    font to 10px for crowded cells or increasing vertical jitter spacing
  - 'Large empty gap (~90px CSS) between subtitle legend row and top of the colored
    grid — the subtitle ends around 60px from the top but marginTop: 90 pushes the
    plot area further down; reduce marginTop to 65 to tighten the composition on the
    square canvas'
  - 'Scatter marker fillColor uses t.ink (theme-adaptive: dark in light theme, white
    in dark theme) — the markers change appearance between themes; for a single-series
    data indicator consider using a fixed palette color like t.palette[0] (#009E73)
    or a semi-transparent t.inkSoft to keep the data layer visually stable across
    themes'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. PASS.
      Chrome: Bold title "heatmap-risk-matrix · javascript · highcharts · anyplot.ai" in dark ink, clearly readable. Subtitle row shows color-coded zone labels (Low/Medium/High/Critical) in Imprint colors, readable. Y-axis title "Impact" visible in dark bold text. Y-axis tick labels (Catastrophic, Major, Moderate, Minor, Negligible) readable. X-axis tick labels (Rare, Unlikely, Possible, Likely, Almost Certain) rotated -30° and readable. X-axis title "Likelihood" is NOT clearly visible in the render — the bottom canvas margin appears to push it out of or to the very edge of the viewable area. Score labels in cell corners are semi-transparent dark text, readable.
      Data: 5×5 grid cells colored by risk zone — #009E73 green (Low ≤4), #DDCC77 amber (Medium 5–9), #BD8233 ochre (High 10–16), #AE3030 red (Critical 20–25). 12 risk markers as solid dark circles with white ring outline, placed with deterministic jitter; risk name data labels in dark ink with cream text-outline are readable on all cell backgrounds. Data Breach and Cyber Attack in cell (3,5) are close but marginally distinguishable.
      Legibility verdict: PASS (with caveat: "Likelihood" x-axis title not clearly visible)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black. PASS.
      Chrome: Title in light ink (#F0EFE8) clearly readable against dark background. Subtitle zone labels retain their Imprint colors and are readable. Y-axis title "Impact" visible in light bold text. Tick labels (both axes) in light inkSoft color, readable against dark background — NO dark-on-dark failures detected. Cell score labels appear as faded light text in corner, readable. Same "Likelihood" x-axis title visibility issue as light render.
      Data: Cell colors are IDENTICAL to light render — same green/amber/ochre/red zones confirm Imprint palette consistency. Risk markers flip to white circles with dark outlines (t.ink = #F0EFE8 in dark theme), visible against all cell backgrounds. Data labels use light ink with dark page-background text outline — readable on colored cells.
      Legibility verdict: PASS (with same caveat: "Likelihood" x-axis title not clearly visible; no dark-on-dark failures)
