review:
  strengths:
  - 'Perfect spec compliance: all required features (5x5 grid, color zones, labeled
    markers with jitter, zone legend, descriptive axis labels) are present and correct.'
  - Semantic color mapping using Imprint palette positions (green=Low, amber=Medium,
    ochre=High, red=Critical) with legitimate traffic-light semantic exception.
  - Hollow circle markers with PAGE_BG fill adapt cleanly between light and dark themes;
    INK border remains visible on all tile colors.
  - Correct square canvas (2400x2400 px) for the symmetric grid; extra y-axis headroom
    (limit up to 5.88) prevents top-row label clipping.
  - 'Full theme-adaptive chrome: all text, legend, and background tokens flip correctly
    in both renders.'
  - Reproducible jitter via set.seed(42). Cell score reference numbers in INK_MUTED
    provide useful context without competing with data.
  weaknesses:
  - library(scales) is imported but unused — remove this line (CQ-03).
  - Risk item labels are too small at mobile scale (geom_text size=2.4 mm ~6.8pt);
    increase to size=2.8-3.0 to improve readability when the 2400 px canvas is scaled
    down to ~400 px.
  - 'Jitter of +-0.15 units causes label crowding: ''Data\nBreach'' and ''Ransomware''
    nearly touch in the Catastrophic row; ''Scope Creep'' at Almost Certain/Moderate
    encroaches on ''Vendor Delay'' at Likely/Moderate. Increase jitter range to +-0.22
    or use smarter per-cell vertical stacking.'
  - Data storytelling (DE-03) is passive — the red zone draws the eye via color alone,
    but no annotation highlights the top critical risks. Consider adding annotate('rect')
    with a bold border around the Critical zone cells (xmin=3.5, xmax=5.5, ymin=3.5,
    ymax=5.5, fill=NA, color='#AE3030', linewidth=1.5).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface.
      Chrome: Title "heatmap-risk-matrix · r · ggplot2 · anyplot.ai" in bold dark ink (#1A1A17), clearly readable. Axis titles "Likelihood" and "Impact" in dark ink, well-sized at 10pt. Tick labels (Rare→Almost Certain; Negligible→Catastrophic) in INK_SOFT (#4A4A44), readable. Legend title "Risk Level" in dark ink; legend labels in INK_SOFT.
      Data: 5x5 grid with teal-green (#009E73) for Low (1-4), sandy amber (#DDCC77) for Medium (5-9), ochre-brown (#BD8233) for High (10-16), matte red (#AE3030) for Critical (20-25). Hollow circle markers (white fill, dark border) for 12 risk items. Two-line text labels above each marker. Cell score numbers in muted gray.
      Legibility verdict: PASS — all text readable at full resolution; risk labels (size=2.4mm) and score numbers small but intentional; marginal at 400px mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title and axis labels in light cream (#F0EFE8), clearly visible against dark background. Tick labels in medium gray (#B8B7B0), readable. Legend box uses dark elevated fill (#242420). All chrome correctly flipped to dark-theme tokens.
      Data: All four zone colors (green/amber/ochre/red) are identical to the light render — Imprint data palette unchanged between themes as required. Risk markers now show near-black fill (PAGE_BG=#1A1A17) with light cream border (INK=#F0EFE8), visible against colored tiles. Risk item labels in light cream, readable on all tile backgrounds. Score numbers in #A8A79F provide adequate contrast on colored tiles.
      No dark-on-dark failures detected.
      Legibility verdict: PASS — all text readable; no unreadable elements in the dark render.
