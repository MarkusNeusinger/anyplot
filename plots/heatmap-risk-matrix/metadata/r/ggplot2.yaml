review:
  strengths:
  - Perfect spec compliance — all five required features implemented (zone-colored
    cells, descriptive axis labels, labeled markers with jitter, risk-level legend,
    cell delineation via tile borders)
  - 'Semantically correct Imprint palette mapping: #009E73 (brand green) for Low,
    #DDCC77 (amber anchor) for Medium caution, #BD8233 (ochre) for High, #AE3030 (matte
    red) for Critical — all from the authorised palette'
  - Critical zone emphasized with an annotate('rect') red border outline, adding immediate
    visual emphasis to the highest-risk cells
  - 'Realistic software project risk register: 12 plausible risks (Budget Overrun,
    Data Breach, Ransomware, etc.) with sensible likelihood/impact ratings'
  - Both themes adapt correctly — all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) wired through to every non-data element
  - Risk score reference labels (small muted numbers) in each cell corner add useful
    context without visual clutter
  weaknesses:
  - 'Top-row label clipping: risks at impact=5 (Data Breach, Ransomware, Critical
    Dependency) have their text labels placed above markers with vjust=-0.55, but
    the y-limit of 5.88 leaves insufficient headroom — ''Ransomware'' label is visibly
    truncated at the panel top boundary in both renders. Fix: expand y upper limit
    to ~6.3 or reduce vjust to -0.35 so labels stay within the panel.'
  - 'Critical zone border slight mismatch: annotate(''rect'', xmin=3.5, xmax=5.5,
    ymin=3.5, ymax=5.5) encloses cell (likelihood=4, impact=4) whose score=16 is High
    (not Critical). The border should start at likelihood=3.5+1=4.5 to xmax=5.5 and
    from ymin=4.5 to ymax=5.5 to strictly include only the 3 Critical cells — or accept
    the rectangle as a visual convention but note it in a comment.'
  - 'Moderate label crowding at impact=3 (Moderate row): Scope Creep (likelihood=5)
    and Vendor Delay (likelihood=4) are adjacent and their text labels nearly touch.
    Minor — jitter helps but labels are still close.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface.
      Chrome: Title "heatmap-risk-matrix · r · ggplot2 · anyplot.ai" rendered bold in dark ink (#1A1A17), clearly readable. Axis labels "Likelihood" (x) and "Impact" (y) in dark ink, appropriately sized. Tick labels use descriptive text (Rare/Unlikely/Possible/Likely/Almost Certain on x; Negligible/Minor/Moderate/Major/Catastrophic on y) in INK_SOFT (#4A4A44), readable. Legend "Risk Level" with four swatches (Critical at top, Low at bottom) styled with elevated background and soft border.
      Data: 5×5 grid of colored tiles — green (Low 1-4), amber/yellow (Medium 5-9), ochre/brown (High 10-16), matte red (Critical 20-25). 12 white-filled circle markers with dark borders overlay the matrix, each labeled with the risk name in dark text above. Small muted score numbers in cell bottom-left corners. Red rectangle border outlines the critical zone (xmin=3.5–xmax=5.5, ymin=3.5–ymax=5.5).
      Issue: "Ransomware" label at impact=5 (Catastrophic) row is visibly clipped at the panel top boundary — "Ransomwa..." is all that renders. Adjacent labels (Data Breach, Critical Dependency) are crowded in the same top row.
      Legibility verdict: PASS with caveats — most text is readable but "Ransomware" label is panel-clipped.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface.
      Chrome: Title, axis labels, tick labels, and legend text all rendered in light tokens (INK=#F0EFE8 or INK_SOFT=#B8B7B0). No dark-on-dark failures observed. Legend background uses ELEVATED_BG (#242420) with INK_SOFT border — correctly elevated.
      Data: Zone colors are identical to light render (#009E73 / #DDCC77 / #BD8233 / #AE3030) — only chrome flips. Marker fill switches to dark PAGE_BG (#1A1A17) with INK border (#F0EFE8), making markers lighter-rimmed on the dark surface. Risk labels appear in near-white ink. Muted score numbers are soft gray (#A8A79F) — still legible against the colored tiles. Red critical zone border (#AE3030) remains visible.
      Issue: Same "Ransomware" panel-boundary clipping present as in light render.
      Legibility verdict: PASS with same caveat — no dark-on-dark failures, chrome adapts correctly.
