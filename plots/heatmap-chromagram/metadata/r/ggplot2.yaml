review:
  strengths:
  - Secondary x-axis with bold chord labels (C, Am, F, G) provides immediate musical
    context without cluttering the heatmap.
  - 'Imprint sequential colormap correctly applied for continuous energy data (green
    to blue, #009E73 to #4467A3).'
  - 'Both themes fully theme-adaptive: all chrome tokens (INK, INK_SOFT, PAGE_BG,
    ELEVATED_BG) correctly flip without touching data colors.'
  - coord_fixed(ratio = n_frames / 12) elegantly constrains the heatmap to fill the
    square canvas perfectly.
  - I-vi-IV-V chord progression is highly realistic and directly illustrates the spec
    harmonic analysis use case.
  weaknesses:
  - 'VQ-01 minor: At 400px mobile scaling, 8pt tick labels (axis.text) may become
    marginal; could be raised to 9pt for safer mobile legibility.'
  - 'DE-01: Legend box lacks a visible border — legend.background has no color argument
    set, so the elevated bg blends into the canvas slightly; adding color = INK_SOFT
    would add subtle framing.'
  - 'LM-02: geom_vline chord boundary dashes are at times partially obscured by tile
    colors; raising linewidth from 0.4 to 0.55 would make boundaries crisper.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "heatmap-chromagram · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17), clearly readable. Axis labels "Time (seconds)" and "Pitch Class" at 10pt dark ink. Tick labels at 8pt INK_SOFT (#4A4A44), readable. Secondary x-axis chord labels (C, Am, F, G) bold at 9pt. Colorbar "Energy" label and value ticks all readable.
      Data: Imprint sequential colormap — low-energy tiles are brand-green (#009E73), high-energy tiles shift to blue (#4467A3). Chord patterns clearly visible: C-major pitches (C, E, G) activate in first region; A-minor (A, C, E) in second; F-major (F, A, C) in third; G-major (G, B, D) in fourth. Dashed chord boundary separators visible at 2s, 4s, 6s.
