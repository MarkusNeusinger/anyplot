    delineation more prominent'
  - 'Colorbar ''bgcolor'' is set to ELEVATED_BG (#FFFDF6 / #242420) but this creates
    a slightly different-colored background slab behind the colorbar ticks that is
    visible in both renders — removing the bgcolor key or setting it to PAGE_BG would
    integrate the colorbar more cleanly'
  - 'Library Mastery: Plotly''s interactive strength is only partially used — the
    hovertemplate is good, but adding a rangeslider on the x-axis or a custom modebar
    config (e.g. modeBarButtonsToRemove) would better showcase Plotly-specific capabilities'
