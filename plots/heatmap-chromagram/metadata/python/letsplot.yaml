review:
  strengths:
  - 'Theme-adaptive sequential colormap: starts at PAGE_BG → #009E73 → #4467A3, so
    near-zero energy cells blend seamlessly into the background in both themes'
  - 'Perfect spec compliance: all 12 pitch classes labeled (C–B), colorbar with energy
    scale, time axis in seconds, realistic chord progression data'
  - 'Clean minimal chrome: no grid (panel_grid=element_blank), no spines/ticks (element_blank)
    — ideal for a dense heatmap'
  - 'Musically authentic synthetic data: C→G→Am→F with root/third/fifth per chord,
    convolution smoothing for temporal realism'
  - 'Excellent code quality: np.random.seed(42), flat KISS structure, all imports
    used, saves both PNG and HTML'
  - layer_tooltips with custom .format() and .line() syntax is a distinctive letsplot
    feature used correctly for the interactive HTML version
  weaknesses:
  - 'Dark render: letsplot''s PNG export adds a white outer canvas margin outside
    the plot_background element''s coverage area. In dark mode (INK=''#F0EFE8'' =
    near-white), title text that falls over this white margin becomes invisible —
    specifically ''· anyplot.ai'' at the right side of the title is effectively unreadable.
    Fix: after ggsave, use Pillow to open the PNG and composite it onto a PAGE_BG-filled
    canvas of the same dimensions; OR use theme_minimal() as a base theme before custom
    theme application; OR shrink the right plot_margin so the title stays within the
    guaranteed dark plot_background area.'
  - Colorbar slightly oversized (guide_colorbar(barwidth=14, barheight=260)) relative
    to the plot panel height — reduce barheight to ~160–180 for better visual balance.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) covering the full canvas — correct.
      Chrome: Bold title "heatmap-chromagram · python · letsplot · anyplot.ai" in dark ink, fully visible. Italic subtitle "Chord progression: C maj → G maj → A min → F maj" in INK_SOFT. All 12 pitch class labels (C–B) on Y-axis in bold dark text. X-axis tick labels (0–9 seconds) in INK_SOFT. Colorbar "Energy" legend on right with labels 0.2–1.0.
      Data: Three-stop sequential gradient (PAGE_BG → #009E73 → #4467A3). Four distinct chord blocks clearly visible: C/E/G prominent in first quarter, G/B/D in second, A/C/E in third, F/A/C in fourth. Low-energy cells blend smoothly into the warm off-white background.
      Legibility verdict: PASS — all text clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Plot panel is near-black (#1A1A17) as expected. However, the outer canvas area to the right of the colorbar legend appears significantly lighter (white/off-white) — this is the letsplot export adding a white margin outside the plot_background element's coverage area.
      Chrome: Y-axis labels and X-axis tick labels are rendered in light text (#B8B7B0 INK_SOFT) and are readable inside the dark panel area. The title "heatmap-chromagram · python · letsplot" is visible in near-white (#F0EFE8 INK) against the dark canvas. However, "· anyplot.ai" — the rightmost portion of the title — falls over the white outer margin area, making the near-white text invisible against the white background. This is the classic letsplot dark-mode export failure.
      Data: Data colors are identical to the light render (same green→blue gradient, same chord block patterns). The heatmap content is visually correct and matches the spec.
      Legibility verdict: FAIL — title's "· anyplot.ai" suffix is unreadable (near-white text on white outer canvas margin). The VQ-07 background rule also fails: the outer canvas area is white, not #1A1A17.
