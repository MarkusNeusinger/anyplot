review:
  strengths:
  - All 12 pitch classes labeled C–B with correct chord progression patterns (C→G→Am→F)
    clearly visible as distinct teal/blue energy bands
  - 'Imprint sequential gradient (PAGE_BG → #009E73 → #4467A3) correctly applied for
    single-polarity energy continuous data'
  - Fully theme-adaptive chrome with explicit INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens
    applied to every text and background element
  - letsplot-native layer_tooltips() enables rich interactive hover in HTML export
    — a library-distinctive feature not available in ggplot2/plotnine
  - 'Clean minimal design: panel_grid, axis_ticks, axis_line all removed; subtitle
    adds chord progression storytelling context'
  weaknesses:
  - 'Light render outer canvas is pure black (#000000) instead of #FAF8F1: _fix_canvas_margin
    only flood-fills near-white corners (all c>=245), but letsplot headless export
    renders outer canvas bands as black so the threshold never fires. Fix: add `or
    all(c <= 10 for c in img.getpixel(corner))` to also replace pure-black corners.'
  - Inner plot content occupies approximately 55% of canvas width with lopsided black
    outer bands (left wider than right) in the light render, creating an unbalanced
    visual appearance.
  image_description: |-
    Light render (plot-light.png):
      Background: Inner plot area is warm cream (#FAF8F1) — CORRECT. Outer canvas has large pure-black (#000000) bands on left (~25% width) and right (~20% width) — WRONG for light theme. The _fix_canvas_margin function fails to replace them because letsplot renders the outer margins as black (not near-white).
      Chrome: Title "heatmap-chromagram · python · letsplot · anyplot.ai" in bold dark INK text, readable. "· anyplot.ai" appears slightly lighter at right edge near outer black canvas boundary. Italic subtitle in INK_SOFT. Axis labels (Time (seconds), Pitch Class) and tick labels all readable in appropriate dark colors.
      Data: Imprint sequential gradient (PAGE_BG cream → #009E73 teal → #4467A3 blue) for energy. 12 pitch classes C–B visible. Chord segments (C major 0–2.5s, G major 2.5–5s, A minor 5–7.5s, F major 7.5–10s) clearly visible as bright teal/blue bands. Colorbar (Energy 0–1) on right side.
      Legibility verdict: PASS for inner plot content; FAIL for outer canvas chrome (pure black instead of warm cream).

    Dark render (plot-dark.png):
      Background: Entire canvas is uniformly very dark/near-black. Inner panel background is dark, outer canvas bands are also black (#000000) which is cosmetically acceptable since it's close to the expected #1A1A17.
      Chrome: Title in bold light/white text, fully and clearly readable against dark background. No dark-on-dark failures. Axis labels and tick labels in warm light muted (INK_SOFT equivalent) colors, all readable. Colorbar labels (0.2, 0.4, 0.6, 0.8, 1) in light text.
      Data: Same Imprint gradient data colors as light render — #009E73 teal → #4467A3 blue. Identical chord patterns visible. Low-energy cells blend into dark background (by design — fade from background effect).
      Legibility verdict: PASS — all text readable against dark background.
