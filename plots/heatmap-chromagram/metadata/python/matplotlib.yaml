review:
  strengths:
  - Correct use of imprint_seq for single-polarity continuous heatmap data, with green-to-blue
    gradient that is both brand-aligned and CVD-safe
  - PowerNorm (gamma=0.6) provides superior perceptual contrast without distorting
    the energy scale
  - Chord region annotations (labels and dashed dividers) elevate the plot from a
    raw chromagram to a musically-narrated visualization
  - 'Complete theme adaptation: all chrome elements (backgrounds, text, colorbar labels,
    divider lines) correctly adapt between light and dark; data colors remain constant'
  - Monospace font for pitch class labels is a thoughtful typographic choice that
    visually aligns the labels like musical notation
  - Square 2400x2400 canvas is the correct choice for this symmetric heatmap
  - pcolormesh with explicit mesh edges correctly handles cell boundaries for the
    pitch axis
  weaknesses:
  - Chord annotation labels use fontsize=7, which renders at approximately 6.5 px
    at a 400 px mobile viewport — consider increasing to 8-9 pt to maintain readability
    when the image is displayed at small sizes
