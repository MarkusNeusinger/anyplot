review:
  strengths:
  - Custom ChromagramHeatmap class correctly extends pygal Graph base class to implement
    a native heatmap type not built into pygal
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) for single-polarity energy data
    — no forbidden cmaps'
  - Chord section annotations (region bands, italic labels, dashed separators) meaningfully
    enhance data storytelling
  - Perfect theme adaptation in both light and dark renders — backgrounds, text, and
    chrome all flip correctly
  - All 12 pitch classes labeled C→B with C at bottom; colorbar with Energy label
    and 0/0.5/1.0 scale values is clean and well-positioned
  - Interactive SVG tooltips via <title> elements on each heatmap cell leverage pygal
    distinctive feature
  - Realistic I–V–vi–IV chord progression with time-smoothed transitions and np.random.seed(42)
    ensures reproducibility
  weaknesses:
  - 'CQ-01 KISS violation: ChromagramHeatmap class (~200 lines) departs significantly
    from the Imports→Data→Plot→Save flat structure; direct SVG rendering via the pygal
    node API outside a subclass would reduce structural complexity'
  - 'CQ-04 minor inelegance: sys.path.remove / sys.path.insert(0, _cwd) hack used
    to avoid pygal module-name collision — consider a direct absolute import path
    or a try/except import strategy instead'
  - 'DE-01 design ceiling: chord region background bands are very faint (opacity 0.05–0.09)
    and barely perceptible in both renders; increasing to 0.12–0.18 would make section
    boundaries more legible without overpowering the data'
  - 'DE-02 refinement gap: heatmap border uses a flat stroke in ink color without
    opacity, which slightly competes with the pitch-row separator lines — using INK_MUTED
    with opacity 0.5 would unify the fine chrome'
  - 'VQ-01 minor: chord region labels (38px italic) and subtitle (34px italic) are
    noticeably smaller than pitch row labels (44px bold) — consider raising to 42px
    italic to tighten the typographic hierarchy'
