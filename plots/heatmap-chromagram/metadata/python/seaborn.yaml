  strengths:
  - Correct imprint_seq colormap applied — green→blue gradient is brand-consistent
    and correctly maps low-to-high energy
  - All 12 pitch classes labeled and clearly visible on y-axis
  - Chord transition annotations (dashed lines + chord name labels) effectively tell
