    placing white text directly over variable-color heatmap cells — contrast is inconsistent
    depending on whether the underlying tile is green or blue; consider positioning
    labels at y='C' row (top) or outside the heatmap panel entirely for guaranteed
    legibility
  - 'DE-01 below 6/8: design is competent but not distinguished — consider increasing
    plot_margin from 0.02 to 0.05, adding a thin panel border (element_rect), and
    refining legend_key_height/width for better visual separation between the chart
    body and legend'
  - 'DE-02 below 4/6: plot_margin=0.02 produces very tight margins; generous whitespace
    (recommended ~0.04-0.06) would improve professional polish; also the warm panel_background
    behind the heatmap tiles is slightly visible at the plot edges — ensure expand=(0,0)
    fully eliminates the gap or remove panel_background from behind the tile layer'
