review:
  strengths:
  - Full Imprint palette compliance — sequential colormap uses correct anyplot stops
    (#009E73→#4467A3) for single-polarity energy data
  - Chord annotations (geom_text + geom_vline) elevate the plot from a plain heatmap
    to a musically-annotated visualization, directly serving the spec music information
    retrieval use case
  - Both themes render correctly — no dark-on-dark failures, all chrome tokens properly
    theme-adaptive
  - Spec compliance is perfect — all 12 pitch classes, colorbar, time axis, realistic
    harmonic simulation
  - Clean code structure with np.random.seed for reproducibility
  weaknesses:
  - Colorbar legend bottom (0.00 tick) appears cut off or missing — legend_key_height=40
    with 5 breaks (0.00–1.00) may exceed the allocated legend height; increase figure
    height margin or reduce legend_key_height to ~32 to fit all 5 breaks
  - geom_text annotation size=4.5mm is slightly above the 2.5–4mm recommended range
    for annotations per the plotnine guide; reducing to 4.0mm would be more conservative
    while remaining readable
  - Green→blue gradient provides moderate perceptual contrast for mid-range energies;
    using a wider imprint_seq range or ensuring the low anchor is visually distinct
    from the field could improve energy legibility
