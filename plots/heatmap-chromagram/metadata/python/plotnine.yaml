      Data: Heatmap tiles use imprint_seq gradient (#009E73 green for low energy → #4467A3 blue for high energy). Chord regions clearly visible: C major (0-2s) shows high energy on C, E, G rows; G major (2-4s) on G, B, D; A minor (4-6s) on A, C, E; F major (6-8s) on F, A, C. Dashed white vertical lines at t≈2, 4, 6s mark chord boundaries. White bold chord labels "C maj", "G maj", "A min", "F maj" appear in the lower B-row area.
