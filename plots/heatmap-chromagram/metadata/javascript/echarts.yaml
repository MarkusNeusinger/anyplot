    subtle vertical lines or section labels (C, G, Am, F) at frame boundaries 20/40/60
    (= 1.0s/2.0s/3.0s) would help non-specialist viewers interpret the harmonic narrative
    without needing musical knowledge'
  - 'VQ-01 minor: visualMap colorbar text at 13px CSS (26 source px) is slightly below
    other secondary text sizes (14px tick labels) — bump visualMap.textStyle.fontSize
    from 13 to 14 for consistency'
  - 'DE-01 minor: The two-stop green-to-blue imprint_seq gradient is functionally
    correct but creates limited color differentiation between subtle mid-range energy
    levels — a three-stop configuration would improve granularity'
