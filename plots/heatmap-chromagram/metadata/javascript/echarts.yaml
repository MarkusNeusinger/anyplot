  strengths:
  - 'Full spec compliance: all 12 pitch classes labeled, sequential imprint_seq colormap,
    colorbar, time axis in seconds, fine resolution capturing chord transitions'
  - Chord progression narrative with section labels (C, G, Am, F) and dashed boundary
    lines is genuine data storytelling above defaults
  - Theme-adaptive chrome flawlessly applied in both renders — no dark-on-dark failures,
    identical data colors across themes
