  - ECharts graphic component overlay is an idiomatic, distinctly ECharts approach
    to section annotations
  weaknesses:
  - Chord annotation font size (12px CSS) is slightly smaller than axis labels (13-14px
    CSS); at 400px mobile scaling these annotations approach the readability floor
    — consider bumping to 14px
  - Cell border color using t.pageBg inverts visual weight between themes (cream borders
    in light, near-invisible borders in dark); t.grid would be more consistent
  - 'DE could push further: a background highlight or subtle fill behind each chord
    section (e.g. alternating very-low-alpha tint) would reinforce section boundaries
    more prominently than dashed lines alone'
