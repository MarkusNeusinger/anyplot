review:
  strengths:
  - Perfect use of imprint_seq (t.seq[0] → t.seq[1]) for continuous energy data with
    correct sequential semantics
  - Chord section labels ('C maj', 'G maj', 'Am', 'F maj') with dashed dividers add
    genuine musical storytelling without dominating the visual
  - Deterministic LCG PRNG with seed 42 ensures fully reproducible output
  - Creative use of Highcharts SVG renderer to implement a custom heatmap when the
    heatmap module is unavailable in the core bundle
  - I-V-vi-IV chord progression (C-G-Am-F) is a highly realistic, recognizable, and
    neutral musical example
  - Attack/decay envelopes at chord boundaries add musical realism to the synthetic
    data
  weaknesses:
  - Chord annotation labels (13px) are 1px below tick label size (14px) — minor visual
    inconsistency; consider aligning to 14px for uniform typography hierarchy
  - DE-02 could be elevated with more polished colorbar details (e.g., intermediate
    tick marks between 0.0-0.5-1.0 labels)
