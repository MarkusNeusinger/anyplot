review:
  strengths:
  - Custom Chart.js afterDraw plugin for canvas-level heatmap rendering is technically
    sophisticated and idiomatic to the library's plugin API
  - Full Imprint sequential colormap compliance using t.seq tokens interpolated via
    LCG-seeded deterministic data
  - Chord section labels (C maj, G maj, A min, F maj) above the heatmap provide genuine
    data storytelling about the harmonic progression
  - All 12 pitch classes correctly labeled C through B, time axis in seconds, and
    colorbar with gradient + tick labels all match spec requirements
  - 'Perfectly theme-adaptive: all chrome elements (title, axis labels, row separators,
    chord markers, colorbar outlines) use t.ink/t.inkSoft/t.pageBg tokens so both
    renders are fully readable'
  weaknesses:
  - Colorbar width is only 16 CSS px — at 2x devicePixelRatio the rendered gradient
    column is 32 native pixels, which is fairly narrow; increasing to 20-22px would
    make the gradient and tick alignment more legible at mobile scaling
  - 'LM-01 deduction: using an empty-dataset scatter chart purely as a coordinate-system
    substrate for custom canvas drawing is unconventional — the chart has no actual
    data points, making the scatter type a dummy; future implementations could explore
    whether a purely-plugin-based approach avoids the empty dataset antipattern'
  - The Imprint sequential green→blue colormap (both hues are mid-saturation) produces
    lower luminance contrast between low-energy (~0.05, near-green) and high-energy
    (~0.90, near-blue) cells compared to a luminance-ramping cmap — patterns are readable
    but not maximally vivid; this is a palette-rule constraint, not a code flaw, but
    it limits how striking the result looks
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, clearly not pure white
      Chrome: Title "heatmap-chromagram · javascript · chartjs · anyplot.ai" in dark ink, ~65% canvas width — well proportioned. Y-axis label "Pitch Class" and X-axis label "Time (seconds)" in dark ink. Tick labels (0.0s–8.0s and C–B) in slightly lighter inkSoft. All text is clearly readable against the light background.
      Data: Heatmap grid of 12 pitch classes × 80 time frames. Low-energy cells render as brand green (#009E73); high-energy cells (chord tones) render as blue (#4467A3). The imprint_seq gradient is visible on the colorbar (green bottom, blue top, labeled 0.00–1.00 with "Energy" rotated label). Chord labels "C maj", "G maj", "A min", "F maj" appear in dark ink above the respective heatmap sections. Vertical chord-change separators at 2.0s/4.0s/6.0s are subtle (alpha=0.55, page-bg color). Row separators between pitch classes are thin and subtle.
      Legibility verdict: PASS — all text readable, no dark-on-dark issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, clearly not pure black
      Chrome: Title in light cream text, fully readable against the dark background. Y-axis "Pitch Class" and X-axis "Time (seconds)" in light ink. Tick labels (pitch classes and time) in light inkSoft. Chord section labels (C maj, G maj, A min, F maj) appear in light ink above the heatmap sections — readable. Colorbar tick labels (0.00–1.00) and rotated "Energy" label in light inkSoft — readable. No dark-on-dark failures detected.
      Data: Identical heatmap pattern to light render — same imprint_seq green→blue gradient, same chord structure patterns visible. Data colors are unchanged between themes; only the background and chrome flipped.
      Legibility verdict: PASS — all text readable in both themes, no dark-on-dark issues
