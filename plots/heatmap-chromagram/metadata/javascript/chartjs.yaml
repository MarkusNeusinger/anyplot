review:
  strengths:
  - Correct Imprint sequential colormap (imprint_seq via t.seq tokens, green→blue)
    for energy data — exactly right for single-polarity continuous data
  - 'Perfect spec compliance: all 12 pitch classes labeled, colorbar with Energy axis,
    time in seconds, 80 frames of deterministic I-V-vi-IV chord progression data'
  - Theme-adaptive chrome throughout — title, axis labels, tick labels, colorbar labels,
    and row separators all use t.ink / t.inkSoft / t.pageBg tokens correctly; both
    renders pass legibility check
  - Chord change markers at 2s/4s/6s (vertical lines) are excellent storytelling elements
    that show harmonic transitions without annotations
  - Deterministic LCG with seed=42 ensures perfect reproducibility; realistic chord
    energy profiles (C major, G major, A minor, F major) with subtle noise create
    authentic-looking chroma features
  weaknesses:
  - 'DE-01 (5/8): Design lacks final publication-ready polish — the heatmap is correct
    but visually plain. Consider adding chord section label annotations (e.g. ''C
    maj'', ''G maj'', ''A min'', ''F maj'') above each section using ctx.fillText
    in the afterDraw plugin, or a subtle gradient vignette at the chord boundaries
    to add depth.'
  - 'DE-02 (4/6): Visual refinement is above default but not complete — the x-axis
    grid lines (t.grid) show through the heatmap cells and compete slightly with the
    data. Suppress x-axis grid (grid: { display: false }) to let the chord change
    markers carry that structural role. Also consider explicitly removing all four
    chart borders/spines for a cleaner frame.'
  - 'CQ-01 (2/3): Three standalone helper functions (lcg, hexToRgb, energyToColor)
    plus the plugin object break the KISS Imports→Data→Plot structure. The LCG could
    be replaced with a pre-computed noise array; hexToRgb and energyToColor could
    be inlined or collapsed into one helper to reduce the function count.'
  - 'LM-02 (3/5): The plugin uses Canvas 2D drawing for cells — this is necessary
    but not maximally Chart.js-idiomatic. The afterBuildTicks approach for custom
    Y tick labels is a strong Chart.js-specific technique and should be highlighted;
    consider also using Chart.js annotation plugin patterns where possible.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "heatmap-chromagram · javascript · chartjs · anyplot.ai" in bold dark text at top (~50% width), well-proportioned. Y-axis label "Pitch Class" and X-axis label "Time (seconds)" in dark text, both clearly readable. Y-axis tick labels (B, A#, A, G#, G, F#, F, E, D#, D, C#, C) and X-axis tick labels (0.0s, 1.0s, ..., 8.0s) in inkSoft color, all legible. Colorbar on right shows gradient from green (#009E73) to blue (#4467A3) with tick labels 0.00, 0.25, 0.50, 0.75, 1.00 and rotated "Energy" label.
      Data: Heatmap showing 4 chord sections across 80 frames / 8 seconds. Green-teal cells indicate low energy (~0.05), blue-tinted cells indicate high energy (~0.7-0.9). C major section (0-2s): C/E/G rows show blue; G major section (2-4s): G/B/D rows active; A minor section (4-6s): A/C/E rows active; F major section (6-8s): F/A/C rows active. Chord change markers (thin vertical lines) at 2s, 4s, 6s clearly visible. Row separators in page background color are subtle but add clarity. First series uses #009E73 (brand green) as the low-energy base — correct.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and all axis labels/ticks appear in light text (cream/off-white) against the dark background. All text elements are clearly readable with no dark-on-dark failure. The "Energy" colorbar label and tick values remain legible.
      Data: Identical chord pattern to light render — same green-to-blue gradient with same chord sections (C major, G major, A minor, F major). Data colors (#009E73 → #4467A3) are identical to light render; only chrome (background, text, row separator colors) has flipped theme. Chord change markers and row separators adapt correctly using t.pageBg token.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures detected.
