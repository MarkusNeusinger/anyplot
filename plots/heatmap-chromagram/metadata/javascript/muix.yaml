review:
  strengths:
  - Creative use of MUI X context hooks (useDrawingArea, useXScale) to build a heatmap
    — a non-native chart type — using SVG children inside ChartContainer
  - 'Perfect Imprint sequential colormap application: seqColor() correctly interpolates
    between t.seq[0] (#009E73) and t.seq[1] (#4467A3) from window tokens'
  - 'Excellent data storytelling: chord section labels and semi-transparent dividers
    immediately guide the viewer through the C-G-Am-F progression'
  - Fully deterministic LCG (seed=42) for reproducible data generation — correct approach
    for the offline browser context
  - 'Full theme adaptation in both renders: divColor, chord labels, and colorbar labels
    all use theme-adaptive tokens'
  weaknesses:
  - useYScale is imported from @mui/x-charts/hooks but never called — remove the unused
    import (CQ-03)
  - MUI X axis tick labels and axis label font sizes not explicitly set via tickLabelStyle
    or slotProps — rely on ThemeProvider defaults; consider adding explicit sizing
    (~14px tick labels, ~16px axis label) to fully satisfy VQ-01
  - Chord annotation labels (fontSize=13 CSS px) and colorbar min/max labels (13px)
    are slightly small; bumping to 14-15px would improve legibility at mobile widths
