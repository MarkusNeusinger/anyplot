review:
  strengths:
  - 'Flawless spec compliance: all 12 pitch classes, colorbar with energy scale, time
    axis in seconds, 80-frame resolution, realistic chord progression data'
  - Correct Imprint sequential colormap (green to blue) applied to continuous energy
    data; colors identical in both themes
  - 'Perfect theme adaptation: pageBg and ink/inkSoft tokens correctly applied to
    background and all chrome elements'
  - Four-chord section labels and white dividers add meaningful visual narrative beyond
    the minimum spec
  - Deterministic LCG ensures reproducibility; clean KISS code with minimal helpers
  - Generous margins and well-proportioned layout in landscape format
  weaknesses:
  - Implementation uses no @mui/x-charts components — it is pure React + SVG. The
    muix.md rule says to return NOT_FEASIBLE when the community chart surface cannot
    express the spec type (heatmap is Pro-only in MUI X); SVG fallback bypasses this
    rule and earns near-minimum LM scores
  - Chord-change dividers use stroke={t.pageBg} — in the dark theme this produces
    near-invisible black lines on the heatmap; a semi-transparent ink stroke (e.g.,
    rgba(240,239,232,0.4) in dark / rgba(26,26,23,0.4) in light) would be more visible
    and theme-consistent
  - Colorbar min/max labels at fontSize={11} are at the lower legibility limit when
    viewed at smaller display sizes; 12-13px would improve mobile readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface
      Chrome: Title "heatmap-chromagram · javascript · muix · anyplot.ai" in dark ink (#1A1A17), ~65% of plot width. Chord section labels ("C major", "G major", "A minor", "F major") in secondary ink above grid. Y-axis pitch class labels (C–B) in inkSoft. X-axis tick labels (0.0s–4.0s) in inkSoft. Axis labels "Pitch Class" and "Time (seconds)" in inkSoft. Colorbar labels "1.0", "0.0", "Energy" in inkSoft. All readable.
      Data: Imprint sequential colormap green (#009E73) → blue (#4467A3). Active chord-tone pitch classes appear in warm green; inactive pitch classes in cooler blue. Chord sections clearly separated by white dividers. Pattern clearly shows C/E/G active in C-major region, B/D/G in G-major, A/C/E in A-minor, F/A/C in F-major.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct Imprint dark surface
      Chrome: Title and all labels appear in cream/off-white ink, clearly legible against the dark background. No dark-on-dark failures. Chord dividers render as near-black lines (pageBg token) — subtly visible but functional.
      Data: Identical green→blue Imprint sequential colormap — same hue, same chord-pattern visibility as light render. Only chrome flips.
      Legibility verdict: PASS
