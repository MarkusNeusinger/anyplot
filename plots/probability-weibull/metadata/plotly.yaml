  - Beta and eta parameters only shown in legend; an on-plot annotation would improve
    data storytelling
  - No hover templates configured for the interactive HTML version
  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue life data on a white background. The x-axis is logarithmic, labeled "Time
    to Failure (hours)" ranging from approximately 500 to 10,000. The y-axis shows
    "Cumulative Failure Probability" on a linear 0-100% scale. A smooth S-shaped blue
    curve (#306998) represents the Weibull fit, with the legend showing β=2.44 and
    η=4625h. Twenty-five filled blue circle markers represent failures, and five hollow
    orange-red circle markers represent censored/suspended observations. A dashed
