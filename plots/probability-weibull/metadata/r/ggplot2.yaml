review:
  strengths:
  - 'Correct Weibull probability paper setup: log x-axis with properly linearized
    Weibull CDF y-axis expressed as intuitive percentage labels — technically sound
    and rare to get right.'
  - 'Palette compliance is excellent: semantic use of matte red for censored/suspended
    aligns with the Imprint palette''s semantic anchor rule; shape+color redundancy
    ensures CVD safety.'
  - Both light and dark themes render cleanly with proper chrome token application
    throughout — no dark-on-dark failures.
  - Parameter annotation box (beta, eta) and 63.2% characteristic life reference with
    vertical eta drop create genuine data storytelling.
  - Dynamic title size calculation avoids overflow on the long mandated title.
  weaknesses:
  - library(dplyr) is imported but unused — remove it; all data manipulation uses
    base R functions (data.frame, pmin, order, which, seq_along).
  - Censored point y-placement at median(weibull_y) is an informal approximation;
    conventionally, right-censored points on a Weibull plot are either not plotted
    at a CDF position or shown with a special indicator. This can mislead readers
    into thinking the censored observation has a defined failure probability at ~50%.
  - Parameter annotation text (size=3.0 geom units) is slightly small for the 3200x1800
    canvas; consider increasing to size=3.5.
  - Minor point clustering in the upper-right (6-8 overlapping failures near 63-82%
    probability at 5000-8000 h) — slight alpha or size reduction could help differentiation
    there.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Bold dark title "probability-weibull · r · ggplot2 · anyplot.ai" at ~60-65% canvas width, fully readable. Y-axis "Cumulative Failure Probability" and X-axis "Time to Failure (hours)" labels in dark ink, readable. Tick labels in INK_SOFT (#4A4A44) at 8pt — readable. Parameter annotation box (beta=2.07, eta=6730 h) with elevated-bg fill clearly legible. Legend at bottom with elevated background, text readable.
      Data: Filled green circles (#009E73) for ~37 failure points on log-scale x, linearized Weibull y. Single hollow red circle (#AE3030) for censored observation near 10,000 h. Solid blue (#4467A3) fitted Weibull line. Dashed grey horizontal 63.2% reference line with label. Dashed vertical eta indicator.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, tick labels all use light chrome tokens (#F0EFE8 / #B8B7B0) — fully readable against dark background. No dark-on-dark failures detected. Annotation box uses elevated dark fill (#242420) with light text — legible. Legend box uses same elevated dark fill — legible.
      Data: Identical data colors to light render — green failure points (#009E73), red hollow censored circle (#AE3030), blue fitted line (#4467A3). All data elements clearly distinguishable from the dark background. Brand green #009E73 reads well on dark surface.
      Legibility verdict: PASS — all text clearly readable against warm near-black background; no dark-on-dark issues.
