review:
  strengths:
  - 'Correct Weibull probability paper implementation: log x-axis, linearized CDF
    y-axis with proper probability labels (1%–99%), and straight-line Weibull fit'
  - 'All required spec features present: beta/eta parameter annotation box, 63.2%
    horizontal reference line with vertical drop to x-axis (characteristic life guide),
    and clear failure vs censored distinction'
  - 'Statistically rigorous: Benard''s median rank approximation using n_total in
    denominator (correct for censored data), OLS fit on linearized Weibull coordinates'
  - 'Full Imprint palette compliance with semantic exceptions: #009E73 (failures),
    #AE3030 matte red (censored/suspended — semantically justified), #4467A3 blue
    (fitted line)'
  - 'Perfect theme-adaptive chrome: both renders pass readability checks; light (#FAF8F1)
    and dark (#1A1A17) backgrounds correct; all text tokens (INK/INK_SOFT/INK_MUTED)
    properly applied'
  - 'Idiomatic ggplot2 usage: grammar-of-graphics layering, scale_x_log10(), scale_color_manual()
    + scale_shape_manual() for dual-encoding legend, annotate() for labels'
  - 'Clean KISS code: flat structure, set.seed(42), all imports used, dynamic title
    font size calculated from title length'
  weaknesses:
  - 'VQ-01 minor: y-axis has 11 probability tick labels (1%, 5%, 10%, 20%, 30%, 50%,
    63.2%, 80%, 90%, 95%, 99%) at size=8pt — slightly dense at mobile scale (~400px);
    consider dropping 1–2 intermediate labels (e.g. 30%, 80%) to give more breathing
    room'
  - 'DE-01/DE-02: All four spines kept via panel.border — for a Weibull probability
    plot this is defensible (enclosed paper analogy), but removing top/right spines
    would better align with the style guide''s default aesthetic; could be improved
    by using panel.border = element_blank() and explicit element_line on left/bottom
    axes instead'
  - 'LM-02: The Weibull y-axis is constructed via manual breaks/labels on scale_y_continuous
    rather than a formal ggplot2 trans object (e.g. custom scales::trans_new(''weibull'',
    ...)) — a missed opportunity to use ggplot2''s scale transformation system more
    idiomatically'
  - Censored point y-placement at median(weibull_y) is a statistical simplification
    (all censored obs at same rank) — visually acceptable but could be improved by
    using Johnson's adjusted rank method to assign individual positions
