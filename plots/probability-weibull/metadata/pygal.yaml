  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue-life data on a white background. The x-axis shows "Time to Failure (hours,
    log scale)" with logarithmic tick marks at 1,000 through 15,000. The y-axis shows
    "Cumulative Failure Probability" with Weibull-linearized scale from 1% to 99%,
    including a 63.2% tick. A blue-gray diagonal fitted line runs from lower-left
    to upper-right. Red circular markers represent 18 failure data points scattered
    along the fitted line. Dark goldenrod/yellow markers show 5 censored (suspended)
    observations placed on the fitted line at their respective times. A dashed horizontal
    gray line marks the 63.2% characteristic life level. A large teal/dark-blue dot
    marks B10 = 2,640h at approximately 10% probability. An orange-red marker indicates
    η = 7,772h at the 63.2% intersection. The title reads "Turbine Blade Fatigue Life
    · probability-weibull · pygal · pyplots.ai". A bottom legend with 3 columns shows
    all 6 series entries. Grid lines are subtle dashed gray. Overall layout is clean
    with good use of canvas space.
