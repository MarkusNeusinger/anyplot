  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue life data. The x-axis shows "Time to Failure (hours, log scale)" with
    tick labels from 1,000 to 15,000. The y-axis shows "Cumulative Failure Probability"
    with Weibull-linearized tick labels at 1%, 5%, 10%, 20%, 50%, 63.2%, 80%, 90%,
    95%, and 99%. A blue-gray fitted line runs diagonally from lower-left to upper-right.
    Red dots (18 failures) are scattered along the fitted line showing the observed
    data. Dark goldenrod/yellow dots (5 censored observations) are placed on the fitted
    line at their respective time values. A dashed gray horizontal line marks the
    63.2% characteristic life level. A large blue dot marks the B10 life at ~2,640h,
    and an orange dot marks the η (characteristic life) at the 63.2% intersection
    (~7,772h). The legend at bottom displays 6 entries across 2 rows. The background
    is white with a light gray (#f8f8f8) plot area and subtle dashed grid lines.
