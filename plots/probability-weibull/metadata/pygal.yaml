    B10 life)
  - Strong data quality with realistic turbine blade fatigue-life scenario and proper
    Weibull parameter estimation
  - Clean well-structured code with proper statistical computation (median rank, linear
    regression on linearized data)
  - Good use of pygal-specific features (per-point tooltips, custom formatters, dict-based
    labels, HTML export)
  - Thoughtful visual design with custom Style, subtle grid, and clear focal points
  weaknesses:
  - Legend has 6 items making the bottom legend area dense
