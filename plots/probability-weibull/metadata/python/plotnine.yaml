review:
  strengths:
  - 'Correct Weibull probability paper: log x-axis via scale_x_log10 + linearized
    ln(-ln(1-F)) y-axis with probability-percent labels — spec satisfied fully'
  - Red diamond focal point at characteristic life (η) with dashed guide lines and
    annotation creates a clear, professional visual story
  - 95% prediction band (geom_ribbon) quantifies regression uncertainty — adds real
    analytical value beyond a bare fit line
  - 'Full Imprint palette compliance: green failures (first series), lavender censored,
    blue fit line, matte-red focal marker; both backgrounds correct (#FAF8F1 / #1A1A17)'
  - 'CVD-safe: shape redundant encoding (circle vs triangle) distinguishes failures
    from censored regardless of color'
  - Correct median rank formula (i−0.3)/(n+0.4) applied only to actual failures; censored
    observations handled as right-censored (no false probability assigned)
  - 'Comprehensive parameter display: β, η, R² annotated directly on the chart'
  - Both light and dark renders are fully theme-adaptive — all chrome elements flip
    correctly, data colors stay constant
  weaknesses:
  - Annotation text (size=3.0 mm, ~8.5 pt) for 'η = 4,663 hrs (63.2%)' and the parameter
    summary is small relative to the canvas; at mobile width (~400 px) the annotations
    become difficult to read — increase annotate size to 3.5–4.0 mm
  - Censored triangles all placed at a fixed y-position (weibull_ticks[0] + 0.18)
    near the bottom — while a common engineering convention, the spec does not mandate
    this; consider rendering them at or near their actual time on the x-axis with
    a tick / arrowhead to indicate right-censoring rather than an arbitrary probability
    level
  - 'DE-01: Design sophistication is above average but the base theme (theme_minimal)
    supplies most of the refinement automatically; no hand-crafted spine removal or
    custom-scoped legend clean-up beyond what the theme provides'
  - 'DE-03: The eta annotation label overlaps the eta connector line in the upper-right
    area — slight crowding between the ''η = 4,663 hrs'' text and the nearby data
    scatter; reposition label to avoid congestion with high-probability data points'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct.
      Chrome: Title "probability-weibull · plotnine · anyplot.ai" in bold dark ink, ~60% plot width. Y-axis label "Cumulative Failure Probability" and X-axis label "Time to Failure (hours)" both dark, readable at 10pt. Tick labels (probability percentages on Y; log-spaced hour values on X) in INK_SOFT, clearly readable. Caption in italic muted ink at bottom.
      Data: 25 green (#009E73) filled circles for failures, 7 lavender (#C475FD) triangles for censored observations. Blue (#4467A3) fitted line with light-blue confidence ribbon. Red (#AE3030) diamond at characteristic life (η=4,663 hrs at 63.2%). Dashed gray guide lines connect eta to axes. Annotations: red italic "η = 4,663 hrs (63.2%)" with thin connector; blue "β = 2.74 · η = 4,663 hrs · R² = 0.978" in upper left.
      Legibility verdict: PASS — all text readable against light background. Annotation text is small (size=3.0 mm) but legible at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title and all axis/tick labels flip to light ink (#F0EFE8 / #B8B7B0) — no dark-on-dark failures. Legend background elevated to #242420. Grid lines remain subtle.
      Data: Data colors are identical to light render: green failures, lavender censored triangles, blue fit line, red diamond — only chrome changes.
      Legibility verdict: PASS — no dark-on-dark text failures. All text elements including annotations are readable against the dark surface.
