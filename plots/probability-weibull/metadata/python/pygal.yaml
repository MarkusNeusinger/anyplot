review:
  strengths:
  - Correct Weibull linearization with custom axis labels showing meaningful probability
    percentages
  - Multiple series with thoughtful color and size choices — brand green fit line,
    blue failures, lavender censored, ochre η marker, red B10 marker
  - Both β and η parameters plus R² annotated in legend with full Weibull fit context
  - B10 and η special markers rendered as large prominent dots with value labels guiding
    the viewer directly to key engineering metrics
  - Both themes render well with appropriate chrome adaptation and readable text in
    light and dark
  - Correct median rank calculation (i-0.3)/(n+0.4) implemented accurately
  weaknesses:
  - Censored points use smaller solid dots (dots_size=9) instead of hollow markers
    as specified — spec says to distinguish with hollow vs filled markers; consider
    using dots_size=12 with a light stroke or a different visual encoding
  - Palette positions 2 and 3 are swapped without semantic justification — canonical
    Imprint order should be green, lavender, blue but code places blue (pos 3) at
    series 2 and lavender (pos 2) at series 3; while the visual logic is sound, canonical
    order should be followed unless a semantic exception applies
  - 63.2% reference dashed line is quite subtle in the light render — muted gray on
    warm off-white makes it blend; consider making the dash stroke slightly thicker
    (width=6) to improve visibility
  - Legend first-entry label appears very close to the right edge of the first column
    — the long Weibull Fit label with β/η/R² values may truncate on narrow renderings;
    verify truncate_legend=-1 preserves the full string
  - Design Excellence is constrained to default pygal chrome — no spine removal (pygal
    limitation), no direct chart annotations for β/η beyond the legend; adding text
    annotations directly onto the plot body would significantly improve storytelling
