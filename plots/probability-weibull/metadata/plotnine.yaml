review:
  strengths:
  - 'Excellent spec compliance: all required features implemented correctly including
    median rank formula, censored point distinction, and characteristic life reference'
  - Strong data storytelling with the red diamond highlight at the characteristic
    life intersection and parameter annotations
  - Clean confidence band implementation using geom_ribbon adds statistical depth
  - Well-structured code with clear linear flow and proper reproducibility
  weaknesses:
  - The 63.2% annotation text slightly crowds nearby data points in the upper-middle
    area
  - Censored points placed at fixed arbitrary y-position could benefit from clearer
    visual separation
  - 'Visual refinement could be pushed further: panel border removal, grid line opacity
    adjustments'
  - 'Design not yet publication-level: needs more sophisticated typography hierarchy
    and marker styling refinements'
  image_description: The plot displays a Weibull probability plot with the title "probability-weibull
    · plotnine · pyplots.ai" in bold at the top. The x-axis shows "Time to Failure
    (hours)" with log-scaled tick marks at 1000, 2000, 3000, 5000, 7000, and 10000.
    The y-axis shows "Cumulative Failure Probability" with Weibull-linearized ticks
    at 1%, 5%, 10%, 20%, 40%, 63.2%, 80%, 90%, and 99%. Blue filled circles represent
    failure data points aligned along a blue fitted regression line, accompanied by
    a light blue confidence band (ribbon). Orange triangles mark censored observations
    placed at a fixed low y-position near the bottom. A dotted horizontal reference
    line at 63.2% and a dotted vertical line at the characteristic life (~4663 hrs)
    intersect at a red diamond marker. Annotations display "63.2% → η = 4663 hrs"
    in red near the diamond and "β = 2.74  η = 4663 hrs  R² = 0.978" in blue near
    the upper-left. A legend on the right distinguishes "Failure" (blue circle) and
    "Censored" (orange triangle). The background is subtly off-white with only horizontal
    y-axis grid lines in light gray.
