  image_description: The plot displays a Weibull probability plot for turbine blade
    fatigue life. The x-axis shows "Time to Failure (hours)" with logarithmically-spaced
    tick labels from 1,000 to 18,000. The y-axis shows "Cumulative Failure Probability"
    with Weibull-linearized probability tick labels from 1.0% to 99.0%. Blue filled
    circles represent failure data points (~25 points), and orange hollow diamond
    markers represent censored/suspended observations (~7 points). A red dashed line
    shows the Weibull fit. A gray dotted horizontal reference line marks 63.2% (characteristic
    life) with a text label. A white annotation box in the bottom-right displays beta
    = 2.16 (shape), eta = 9133 h (scale), and R-squared = 0.9548 in monospace font.
    Top and right spines are removed, with a subtle grid (alpha=0.15). The legend
    in the upper-left shows "Failure", "Censored (suspended)", and "Weibull fit".
    The title reads "Turbine Blade Fatigue Life · probability-weibull · seaborn ·
    pyplots.ai".
