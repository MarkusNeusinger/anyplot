  image_description: The plot shows a Weibull probability plot for turbine blade fatigue
    life data. The x-axis displays "Time to Failure (hours)" on an effective logarithmic
    scale with custom tick labels at 1,000 to 18,000. The y-axis shows "Cumulative
    Failure Probability" on a linearized Weibull scale with probability tick labels
    from 1.0% to 99.0%. Blue filled circles represent failure data points (25 observations),
    and orange hollow diamond markers represent censored/suspended observations (7
    points). A red dashed line shows the Weibull fit traversing the data from lower-left
    to upper-right. A horizontal dotted gray line marks the 63.2% characteristic life
    threshold with a text label. A parameter annotation box in the bottom-right corner
    displays beta = 2.16 (shape), eta = 9133 h (scale), and R-squared = 0.9548 in
    monospace font with a rounded border. The legend in the upper-left lists Failure,
    Censored (suspended), and Weibull fit. Title reads "Turbine Blade Fatigue Life
    · probability-weibull · seaborn · pyplots.ai". Top and right spines are removed,
    grid is very subtle at alpha=0.15.
