  image_description: 'The plot displays a Weibull probability plot for turbine blade
    fatigue life data. The x-axis shows "Time to Failure (hours)" with logarithmic
    tick values at 1000, 2000, 3000, 5000, 7000, and 10000. The y-axis shows "Cumulative
    Failure Probability" with Weibull-linearized probability levels at 1.0%, 5.0%,
    10.0%, 20.0%, 50.0%, 63.2%, 90.0%, and 99.0%. Filled dark blue circles represent
    25 failure data points, while hollow blue circles represent 5 censored (suspended)
    observations. A dark blue fitted line passes through the data from lower-left
    to upper-right. A dashed orange horizontal reference line marks the 63.2% characteristic
    life level, labeled in orange italic text. The upper-left corner displays parameter
    annotations: β = 2.21 (shape), η = 5428 h (scale), R² = 0.9590 in bold dark blue
    text. A legend in the bottom-right shows "Weibull Fit", "Failures", and "Censored".
    The background is a light blue-gray, with subtle dashed grid lines. The title
    reads "Turbine Blade Fatigue Life · probability-weibull · bokeh · pyplots.ai".'
