review:
  strengths:
  - 'Comprehensive Weibull implementation: log x-axis, linearized Weibull y-axis with
    custom percentage formatter, fitted line via OLS regression on log10(time), median
    rank positions, hollow circles for censored vs filled for failures, and 63.2%
    reference line — all spec requirements met perfectly'
  - 'Excellent data design: hydraulic pump service-life scenario with 14 failures
    and 6 right-censored observations produces a realistic, technically valid Weibull
    plot; β=3.20 and η=4,881h are plausible values for wear-out failures'
  - 'Idiomatic ECharts usage: log-type axis with minorSplitLine for decade subdivisions,
    graphic overlay for parameter annotation with elevatedBg theme token, custom y-axis
    formatter back-converting Weibull scale to probability percentages'
  - 'Full theme compliance: brand green #009E73 on failure points, palette[2] blue
    for the analytical fit line, palette[3] ochre for the reference line; chrome flips
    correctly across both light (#FAF8F1) and dark (#1A1A17) themes with all tokens
    applied'
  - All font sizes explicitly set (title 22px, axis names 16px, tick labels 13px,
    legend 14px) and well-proportioned; both renders are fully legible with no dark-on-dark
    or light-on-light failures
  weaknesses:
  - 'Design Excellence could be elevated: consider removing all four axis spines (pure
    borderless look suits a probability plot), adding a subtle text annotation at
    the 63.2% reference line intercept with the fit (''η = 4,881 h'' directly on the
    plot), and using a slightly smaller symbolSize for censored points to reinforce
    their secondary status'
  - 'LM-02: the visualization does not use any ECharts interaction or chart-specific
    distinctive feature beyond log axis and graphic overlay; tooltip configuration
    (even non-interactive for static screenshot) or a markLine/markPoint built-in
    could be more ECharts-native than the manual graphic group'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — matches the required light surface exactly, not pure white.
      Chrome: Title "probability-weibull · javascript · echarts · anyplot.ai" in dark ink at top center, spanning ~60% of canvas width. Y-axis label "Cumulative Failure Probability" rotated 90° on the left in inkSoft. X-axis label "Time to Failure (hours)" centered below the plot. Both axis names at fontSize 16, visually balanced. Tick labels on y-axis show probability percentages ("3%", "8%", "20%", "45%", "81%", "99%") in inkSoft at fontSize 13 — ECharts auto-generated ticks at ~0.5 Weibull-y intervals, all clearly readable. X-axis ticks "350", "1k", "10k", "22k" in inkSoft, readable.
      Data: 14 filled green circles (#009E73 = palette[0]) for failure observations, placed at median-rank Weibull positions. 6 hollow circles with inkSoft border for censored (suspended) observations, projected onto the fitted line. Blue fit line (palette[2] = #4467A3, width 3) traverses the data with a good OLS fit. Dashed ochre reference line (palette[3] = #BD8233) at 63.2% probability level (y=0 in Weibull coordinates). Parameter annotation box (elevatedBg #FFFDF6, dark ink text) in the upper-right quadrant showing β (shape) = 3.20 and η (char. life) = 4,881 h.
      Legibility verdict: PASS — all text readable, no overflow, no overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title, axis labels, tick labels all render in light ink (#F0EFE8 / inkSoft #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures detected. Annotation box uses elevatedBg #242420 (slightly lighter than page bg) with light-colored text — fully readable. Grid lines are subtle, appropriate opacity.
      Data: Data colors are identical to the light render — green failure circles (#009E73), hollow censored circles with inkSoft border (lighter gray on dark), blue fit line (#4467A3), ochre reference line (#BD8233). The borderColor of failure markers uses t.pageBg which flips to #1A1A17 — the white-border effect on light becomes a dark-border effect on dark, maintaining marker definition.
      Legibility verdict: PASS — all text readable in dark theme, no dark-on-dark issues.
