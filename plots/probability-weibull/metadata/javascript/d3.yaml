  strengths:
  - 'Perfect spec compliance: all required Weibull probability plot elements (log
    X-axis, linearized Y-axis, fitted line, β/η annotations, median rank plotting
    positions, censored point markers, 63.2% reference) are correctly implemented'
  - 'Semantically correct use of Imprint tokens: amber for the characteristic-life
    reference line, elevated background for info boxes, green for failures — deliberate
    and appropriate'
  - Turbine blade fatigue data with β=2.00 (wear-out mode) and η≈4000 h is factually
    grounded and scientifically credible
  - Fully deterministic, clean flat code with correct D3 clip-path boundary handling
  weaknesses:
  - 'DE-01 (5/8): Aesthetic sophistication is above plain defaults but not yet at
    ''strong design''. The parameter box and legend are functional but visually similar;
    adding subtle shadow, refined border color, or slightly more whitespace inside
    the boxes would lift the polish'
  - 'DE-02 (4/6): Axis area has no visual refinement beyond structure — consider differentiating
    grid lines by weight (major vs minor probability ticks) to mimic real Weibull
    probability paper texture; remove redundant domain line in favour of pure grid-based
    framing'
  - 'VQ-01 minor: Secondary annotation labels (''63.2% — Characteristic Life'', ''η
    = 3,999 h'') at 13 px are marginally small for important informational labels
    — 14–15 px would be safer at mobile scale'
  - 'LM-01 (4/5): X-axis uses a manual tick loop rather than d3.axisBottom().tickValues().tickFormat()
    which is the more idiomatic D3 pattern for custom tick sets'
