review:
  strengths:
  - 'Mathematically correct Weibull probability plot: proper ln(-ln(1-F)) transform,
    OLS fit, median rank formula, and 63.2% characteristic-life reference all implemented
    accurately.'
  - Custom Chart.js spine plugin delivers clean L-shaped axes — a sophisticated Chart.js-specific
    technique that materially improves aesthetics.
  - afterBuildTicks hook enables precisely correct Weibull probability labels (1%,
    5%, ..., 63.2%, ..., 99%) — idiomatic and accurate.
  - Redundant encoding (color + marker shape) makes failures vs. suspensions distinguishable
    under all color-vision-deficiency types.
  - Legend labels carry computed beta and eta values, turning the legend into a mini
    reliability report.
  - Fully deterministic implementation with realistic turbine blade engineering data.
  weaknesses:
  - Y-axis probability tick labels at font size 12px are borderline at mobile-scaled
    (400px) widths; consider bumping to 13-14px.
  - No direct chart annotation pointing to the eta crossing on the 63.2% reference
    line — adding a small callout at the intersection would elevate the storytelling
    from good to excellent.
  - DE-01 could reach 6/8 with a slightly more distinctive visual treatment (e.g.,
    a subtle confidence band around the fit line or shading between 10%-90% probability
    zone).
