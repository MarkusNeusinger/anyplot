  image_description: 'The plot displays a Gantt chart for a software development project
    with four phase groups (Requirements, Design, Development, Testing) arranged top-to-bottom.
    Each group has a dark navy aggregate bar with a bold label on the right, and individual
    task bars below colored by phase: blue (#4878A8) for Requirements, orange (#D4913B)
    for Design, teal (#45A5A5) for Development, and purple (#8B6BAD) for Testing.
    Task names appear left-aligned beside each bar. Dependency arrows connect tasks
    in three colors: orange for finish-to-start, light blue for start-to-start, and
    muted purple for finish-to-finish — all with closed arrowheads. Alternating light
    gray/white background bands separate the groups. A compact dependency-type legend
    sits at bottom-right. The x-axis shows weekly dates from approximately Dec 11
    to Apr 01 with rotated labels and a "Timeline" label. The title "gantt-dependencies
    · letsplot · pyplots.ai" is displayed in bold dark navy at the top-left.'
