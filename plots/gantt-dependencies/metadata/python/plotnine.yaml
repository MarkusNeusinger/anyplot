    a cleaner, more minimal appearance consistent with the style guide
  - 'DE-02: minor grid is removed but panel border remains and axis lines are visible
    on all four sides; removing top+right axis_line and spine would improve visual
    refinement'
  - 'LM-02: the visualization relies on standard geom_rect / geom_segment combination;
    no use of plotnine-specific advanced features like stat_* or annotate layers that
    would distinguish it from a generic ggplot2 port'
