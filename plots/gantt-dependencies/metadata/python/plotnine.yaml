review:
  strengths:
  - Perfect spec compliance — all required features implemented (dependency arrows,
    group aggregates, hierarchical Y-axis, phase color coding)
  - Sophisticated critical-path highlighting with differentiated bar weights and connector
    styles creates genuine analytical value
  - 'Excellent theme adaptation: INK/INK_SOFT tokens correctly applied to all chrome
    elements in both light and dark renders; data colors identical across themes'
  - Correct Imprint palette in canonical order with semantic milestone anchor (#AE3030)
    for phase-handoff diamonds
  - Milestone diamonds at phase-handoffs add focal punctuation that enhances data
    storytelling
  - Clean, readable code with logical separation of data construction, connector geometry,
    and plotting
  - Subtitle as inline legend key for the critical-path encoding is elegant UX
  weaknesses:
  - Task-name tick labels and subtitle are at 7pt, which may be marginal when the
    chart is scaled to mobile widths (~400 px); consider bumping tick labels to 8pt
    and subtitle to 8pt
  - Connector vertical segments occasionally pass through adjacent task bars at Feb
    07–Feb 28 (Backend API / Integration connector cluster is visually busy); routing
    arrows with a small horizontal offset from the bar endpoint would reduce crossing
  - geom_segment used for task bars rather than geom_rect — using geom_rect (ymin=y-0.3,
    ymax=y+0.3) would give bars proper rectangular weight and is more idiomatic plotnine
    for interval data
