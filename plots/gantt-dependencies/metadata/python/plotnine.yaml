    plotnine for Gantt layout
  weaknesses:
  - Y-axis task labels are 8pt in a 4.5-inch-tall figure with 16 rows — readable at
    full resolution but borderline on mobile scaling; consider 9pt or reducing to
    fewer displayed rows
