      Chrome: Title and subtitle in light off-white (#F0EFE8 / INK in dark mode) — fully readable against dark background. Tick labels and x-axis title in #B8B7B0 (INK_SOFT dark) — readable. Group header bars now rendered as bright off-white (INK = #F0EFE8 in dark mode) which provides strong contrast. No dark-on-dark failures observed.
      Data: Task bar colors identical to light render — brand green, lavender, blue, ochre. Dependency arrow colors identical. Data colors confirmed theme-invariant. Legend text in INK_SOFT light color, readable on dark background.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures. Data colors identical between renders confirming Imprint palette is theme-invariant.
