review:
  strengths:
  - 'Correct Gantt chart with all required features: group headers, task bars, three
    dependency types (finish-to-start, start-to-start, finish-to-finish), and a dependency
    legend'
  - 'Excellent data quality: realistic software development lifecycle with plausible
    task names, durations, and inter-phase dependencies'
  - Imprint palette correctly applied — brand green for Requirements group, positions
    1–4 for the four phases, positions 5–7 for dependency arrow types; both light
    and dark renders pass readability checks
  - 'Theme-adaptive chrome works correctly: group bars flip from black (light) to
    off-white (dark) via INK token; all text colors adapt via INK/INK_SOFT tokens'
  - Alternating background bands for group separation add visual polish and hierarchy
  - 'Perfect code quality: deterministic, KISS structure, clean imports, correct plot-{THEME}.png
    output with HTML export'
  - layer_tooltips() leveraged for interactive hover info — a letsplot-distinctive
    feature
  weaknesses:
  - 'Title is missing the language component: shows "gantt-dependencies · letsplot
    · anyplot.ai" but should be "gantt-dependencies · python · letsplot · anyplot.ai"
    — add "python ·" between spec-id and library name in the labs() title argument'
  - Arrow clutter in the Jan 29–Feb 05 zone where multiple finish-to-start (red) arrows
    converge — the red arrows overlap each other and cross through task bars making
    the dependency lines hard to follow; consider routing arrows with slight y-offsets
    or reducing arrow length=8 to length=6 so arrowheads are less prominent
  - 'Design could use one more refinement pass: the panel border (outer rectangle
    of the plot area) is somewhat prominent and could be removed via panel_border=element_blank()
    to achieve a cleaner, less box-like composition'
