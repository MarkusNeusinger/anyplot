      Data: Group header bars rendered in thick black (INK) — Requirements, Design, Development, Testing. Task bars in Imprint palette positions 1–4: brand green (#009E73) for Requirements tasks, lavender (#C475FD) for Design tasks, blue (#4467A3) for Development tasks, ochre (#BD8233) for Testing tasks. Dependency arrows in positions 5–7: matte red (#AE3030) for finish-to-start, cyan (#2ABCCD) for start-to-start, rose (#954477) for finish-to-finish. All visible and distinguishable. Legend for dependency types visible at lower right.
