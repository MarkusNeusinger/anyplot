    and cross through bar fills, creating mid-chart noise; add a small y-offset (±0.3)
    to arrow endpoints so arrows pass above/below bar centers rather than through
    them
  - Task labels at size=4mm are at the lower limit of readability at mobile widths
    — consider bumping to size=4.5mm
