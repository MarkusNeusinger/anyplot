review:
  strengths:
  - Excellent critical path calculation and visualization with dark outlines highlighting
    critical tasks
  - Full spec compliance — dependency arrows with arrowhead patches, group aggregate
    span bars, indented task hierarchy, and legend explaining dependency/critical-path
    line styles
  - Theme-adaptive chrome throughout — title, axis labels, LabelSet task labels, legend,
    and arrow colors all correctly use INK/INK_SOFT tokens in both themes
  - Correct Imprint palette in canonical order for all 4 phases; group colors are
    consistent between group headers and task bars
  - Alternating row band BoxAnnotations significantly improve row scanability on a
    dense 12-task chart
  - Well-implemented Selenium/CDP viewport override produces the exact 3200×1800 canvas
    (gate passed)
  weaknesses:
  - Non-critical dependency arrow opacity (0.65) and line_width (2.5) vs critical
    (0.9, 4.0) is a good distinction but in the dark render the normal arrows are
    somewhat hard to trace at a glance — slight increase in line_width or alpha for
    normal arrows would help
  - Task label font size (22pt) is meaningfully smaller than x-axis tick labels (34pt)
    — while the hierarchy is intentional, the gap is wide enough that task names become
    the hardest element to read; 26-28pt would better balance the hierarchy
  - min_border_left=50 is well below the guide-recommended 180 — acceptable here because
    y-axis is hidden and labels are LabelSet-positioned within the x range, but it
    limits future adjustability
  - LM-02 could showcase more distinctively Bokeh features — e.g. a TapTool to highlight
    a task+its dependency chain, or a RangeTool for timeline zoom
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "gantt-dependencies · python · bokeh · anyplot.ai" bold at top in near-black #1A1A17 — clearly readable. X-axis label "Timeline (Weeks)" in italics, readable. X-axis tick labels (Jan 01 2026 / Jan 15 / Feb 01 / Feb 15 / Mar 01) readable in INK_SOFT dark gray. Task labels on left side: group headers (Requirements, Design, Development, Testing) in bold 30pt INK, individual task names in 22pt INK_SOFT — all readable. Legend top-right with elevated background, 6 items: Requirements, Design, Development, Testing, Dependency, Critical Path — all legible.
      Data: Four phase colors from Imprint palette in canonical order — Requirements #009E73 (brand green), Design #C475FD (lavender), Development #4467A3 (blue), Testing #BD8233 (ochre). Group aggregate span bars semi-transparent. Dependency arrows in INK_SOFT gray with triangular arrowheads. Critical path tasks (Stakeholder Review → Requirements Sign-off → System Architecture → Database Design → Backend Core → API Integration → Integration Testing → User Acceptance) highlighted with dark border outlines.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title and axis labels render in near-white #F0EFE8 (INK for dark theme) — clearly readable. Tick labels and task labels in #B8B7B0 (INK_SOFT dark theme) — readable against dark background. Legend has elevated #242420 background with INK_SOFT border. No dark-on-dark issues: all text is light-on-dark with sufficient contrast.
      Data: Data colors are IDENTICAL to light render — same brand green, lavender, blue, ochre. Dependency arrows shift to INK_SOFT (#B8B7B0) and critical path arrows to INK (#F0EFE8) — both visible against dark background. Alternating row bands (subtle INK tint at 4% alpha) remain gently visible.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome elements correctly adapt to dark theme.
