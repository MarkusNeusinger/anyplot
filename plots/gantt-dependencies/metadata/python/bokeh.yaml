review:
  strengths:
  - 'Perfect spec compliance: all required Gantt features implemented — group headers,
    aggregate span bars, dependency arrows with arrowheads, critical path, legend,
    hierarchy'
  - Sophisticated CPM (critical path method) forward/backward pass algorithm — goes
    well beyond a basic Gantt render
  - 'Correct Imprint palette mapping: 4 phases mapped to positions 1–4 in canonical
    order; perfect theme-adaptive chrome in both renders'
  - 'Elegant y-axis approach: hides native yaxis, uses right-aligned LabelSet labels
    within the data area — avoids left-margin clipping issues'
  - 'Bokeh''s interactive strength fully used: HoverTool with rich task metadata (name,
    phase, dates, duration, dependencies, critical status) plus HTML artifact'
  weaknesses:
  - Legend swatches for phase groups are rendered from the semi-transparent group-span
    hbar (alpha=0.2), making them appear very faint — use the opaque task-bar renderers
    as legend references instead so swatches show full-saturation phase colors
  - Critical path visual treatment (dark outline on critical task bars) is subtle
    at line_width=3 — increase to 5px or change outline color to a higher-contrast
    accent to make critical-path tasks immediately obvious without close inspection
  - Dependency arrowheads sized at 1.5 days appear small relative to the canvas, especially
    on short tasks — increase to 3–4 days or use a fixed pixel offset scaled to canvas
    dimensions
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Bold title "gantt-dependencies · python · bokeh · anyplot.ai" in dark ink, fully readable. Group headers (Requirements, Design, Development, Testing) in bold 30pt dark ink. Task labels in 22pt INK_SOFT, clearly readable. X-axis ticks in 34pt INK_SOFT. "Timeline (Weeks)" x-label in 42pt INK. Legend in top-right with INK_SOFT text.
      Data: Requirements bars = #009E73 (brand green), Design = #C475FD (lavender), Development = #4467A3 (blue), Testing = #BD8233 (ochre). Imprint positions 1–4 in canonical order. Dependency arrows in dark ink with arrowheads. Critical path tasks have dark border outlines. Group span bars are semi-transparent (alpha=0.2). Alternating row bands add subtle texture.
      Legibility verdict: PASS — all text clearly readable against light background, no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface
      Chrome: Title in light #F0EFE8 ink, fully readable. Group headers in bold light ink. Task labels in #B8B7B0 (INK_SOFT dark), readable against dark background. X-axis ticks in INK_SOFT token. Legend text in INK_SOFT. No dark-on-dark failures detected.
      Data: Colors identical to light render — Requirements #009E73, Design #C475FD, Development #4467A3, Testing #BD8233. Only chrome (background, text, grid lines) flipped between themes; data colors unchanged. Dependency arrows appear as lighter lines, clearly visible against dark background.
