review:
  strengths:
  - Excellent critical path computation and highlighting — red arrows + higher-opacity
    bars with border make the critical path immediately obvious
  - Clean group/task hierarchy using ▼ group headers with wider bars and indented
    task names with narrower semi-transparent bars
  - Correct Imprint palette in canonical order across all 5 phases (green→lavender→blue→ochre→red)
  - Full theme-adaptive chrome — both light and dark renders are readable with no
    dark-on-dark failures
  - 'Idiomatic plotly approach: go.Bar overlay with orientation=''h'', legendgroup,
    categoryorder=''array'', and proper write_html HTML output'
  - Informative hover tooltips with phase, dates, duration, and critical path indicator
    per task
  - Bottom-right dependency legend clearly explains arrow styles for critical path
    vs. regular dependencies
  weaknesses:
  - Dependency arrows in dense transition zones (Design→Development) visibly overlap
    task bars — the arrows converge on the same target y-positions and cross over
    bars in ways the spec asks to avoid where possible
  - Y-axis tick labels (task names) are at size=10 which is correct per guide, but
    with 23 rows the labels feel slightly compressed — acceptable but worth noting
  - 'DE-02: Legend has a visible border frame which adds minor visual weight; removing
    or softening it would increase refinement'
