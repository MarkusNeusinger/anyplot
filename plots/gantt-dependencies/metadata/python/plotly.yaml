review:
  strengths:
  - Complete critical-path computation using backward traversal, with red arrow highlighting
    and opacity differentiation — adds significant analytical value beyond a basic
    Gantt
  - Dual-width bar approach (group headers at width=0.7, task bars at width=0.45)
    creates clear visual hierarchy without extra chart elements
  - All 5 Imprint palette colors used in canonical order for 5 project phases; both
    themes pass legibility checks without any dark-on-dark issues
  - Rich hover tooltips with task name, phase, start/end, duration, and critical-path
    flag
  - 'Fully spec-compliant: arrows go from predecessor end to successor start, group
    headers span full phase range, dependency legend is present'
  weaknesses:
  - Straight Plotly annotation arrows cross task bars in the Development/Testing section
    (multiple arrows converging on 'Integration' create visual clutter); non-critical
    arrows could be set to lower opacity (e.g. 0.35-0.4) to reduce visual noise
  - Y-axis tick font size is 9px (36px rendered), slightly below the recommended 10px
    for scale-based libraries at 3200x1800 — raise to 10px
