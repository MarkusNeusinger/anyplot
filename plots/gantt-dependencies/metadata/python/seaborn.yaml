review:
  strengths:
  - 'Perfect spec compliance: all five required Gantt-dependencies features present
    (task bars, group aggregates, dependency arrows, milestone markers, legend)'
  - Idiomatic seaborn usage via sns.lineplot with units parameter for per-task bar
    rendering
  - 'Strong theme adaptation: both renders pass the readability check with all chrome
    tokens correctly wired'
  - 'Thoughtful visual hierarchy: bold group headers vs lighter task labels, higher
    alpha task bars vs lower alpha aggregates'
  - Differentiated arc radii (same-phase 0.15 vs cross-phase 0.3) shows careful arrow
    design
  weaknesses:
  - 'Bottom margin tight: bottom=0.17 leaves the x-axis label barely clear of the
    canvas edge — increase bottom to ~0.19 for more breathing room'
  - Subtitle annotation at xycoords=axes fraction position (0.5, 1.02) sits very close
    to the main title in the compressed top margin — hard to distinguish at normal
    viewing distance
  - Arrow routing in the Development to Testing transition zone produces a cluster
    of crossing arcs that adds visual noise; adjusting arc angles or adding minor
    vertical offsets could reduce clutter
  - Critical path not highlighted — viewers must trace the longest dependency chain
    manually; a subtle visual emphasis on the critical path would improve data storytelling
