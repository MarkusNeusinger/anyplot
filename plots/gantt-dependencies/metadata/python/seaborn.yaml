      Data: 4 phase bars via sns.lineplot with units — Requirements (#009E73 green), Design (#C475FD lavender), Development (#4467A3 blue), Testing (#BD8233 ochre). Phase aggregate bars shown as semi-transparent spans in matching colors. Diamond milestone markers at each phase end. Curved dependency arrows in dark gray (INK_SOFT) connecting task bars. Legend in upper-right shows all four phases plus Dependency arrow symbol.
