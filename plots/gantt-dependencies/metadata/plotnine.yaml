  image_description: 'The plot displays a Gantt chart for a software development project
    spanning from late December 2023 to late March 2024. Tasks are organized into
    four color-coded phases: Requirements (deep blue), Design (teal), Development
    (amber), and Testing (purple). Each phase has a thick aggregate bar at the group
    header level (marked with a triangle) spanning the full duration of its child
    tasks. Individual task bars are indented below their group headers. Critical path
    tasks (Gather Requirements through User Acceptance) are rendered with thicker,
    fully opaque bars, while non-critical tasks (UI/UX Mockups, Frontend Components,
    Unit Testing) appear thinner and semi-transparent. L-shaped dependency arrows
    connect predecessor end-dates to successor start-dates — dark for critical path
    dependencies, gray for non-critical. Arrowheads are rendered as V-shaped line
    segments pointing right. Red diamond milestone markers appear at key handoff points:
    Design Start, Dev Start, Testing Start, and Launch. The title reads "gantt-dependencies
    · plotnine · pyplots.ai" in bold, with subtitle explaining the critical path visual
    encoding. X-axis shows weekly dates labeled "Date (2024)", rotated 45 degrees.
    Legend "Project Phase" appears on the right with all four phase colors. Panel
    background is subtle off-white with faint vertical gridlines.'
