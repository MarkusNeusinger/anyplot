review:
  strengths:
  - 'Excellent spec compliance — all Gantt features implemented: dependency arrows,
    group header aggregate bars, hierarchical task/group visual distinction'
  - Realistic home construction dataset with 5 phases, 14 tasks, 15 logically correct
    finish-to-start dependencies
  - Phase background bands (6% alpha tints) add elegant contextual grouping without
    visual noise
  - Proper Imprint palette usage — correctly skips matte-red slot 5 with semantic
    justification, using positions 1,2,3,4,6
  - Full theme adaptation — both renders readable with correct chrome flipping and
    identical data colors
  - Clean, idiomatic Makie code using poly!/Rect2f for custom bar shapes, lines! for
    connectors, scatter! for arrowheads
  - L-shaped dependency connectors clearly encode finish-to-start relationships with
    triangular arrowheads
  weaknesses:
  - Dependency arrowheads (markersize=8) are small — increase to 10–12 for better
    visibility especially at mobile scale
  - No phase legend explaining the 5 color-coded phases — a small legend box mapping
    phase name to color would aid comprehension for first-time viewers
  - No critical path or milestone emphasis — consider slightly thicker bars or a highlight
    color for the longest dependency chain (Foundation Pour → Framing → Roofing →
    Electrical → HVAC → Insulation → Drywall → Painting → Flooring → Final Inspection)
  - Group header bars (height=0.26) and task bars (height=0.50) share the same color
    family; the thin outline-only style on groups is easy to miss — consider a hatched
    fill or a diamond-end decoration to make group aggregates more visually distinct
  - Y-tick labels at yticklabelsize=11 are slightly smaller than x-tick labels (12)
    — a unified 12pt across both axes would balance the typography better
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color, not pure white
      Chrome: Title "Home Construction · gantt-dependencies · julia · makie · anyplot.ai" in dark ink, fully readable. Y-axis task labels in INK_SOFT (#4A4A44) with UPPERCASE phase headers and indented child tasks — all readable. X-axis "Project Day" label and tick labels (0, 10 … 80) readable.
      Data: 5 phases in Imprint palette — green (#009E73) for Foundation, lavender (#C475FD) for Structure, blue (#4467A3) for Systems, ochre (#BD8233) for Finishing, cyan (#2ABCCD) for Completion. Subtle 6%-alpha phase background bands tint each phase region. Group header bars are thin with colored stroke; task bars are solid at 85% opacity. L-shaped dependency connectors in INK_MUTED with small right-triangle arrowheads.
      Legibility verdict: PASS — all text readable against warm-off-white background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color, not pure black
      Chrome: Title, axis labels, tick labels all in light-colored text (F0EFE8 / B8B7B0) — clearly readable against dark surface. No dark-on-dark failures observed. Grid lines subtle on dark background.
      Data: Phase colors are identical to light render — green, lavender, blue, ochre, cyan. Phase background bands slightly less visible on dark surface but present. Dependency connectors render in lighter muted ink.
      Legibility verdict: PASS — all text readable, data colors identical to light render, chrome correctly inverted
