review:
  strengths:
  - Native Highcharts waterfall series with isSum:true for the prediction bar — idiomatic
    and correct
  - Semantic Okabe-Ito color assignment (green = anchor bars, orange = positive SHAP,
    blue = negative SHAP) clearly communicates the plot meaning
  - Fully theme-adaptive chrome — all text, grid, and background tokens flip correctly
    between light and dark without any dark-on-dark failures
  - Realistic credit-scoring domain with internally consistent SHAP values that sum
    to the correct prediction
  - CDP screenshot technique delivers precise 4800x2700 PNG without window-size tricks
  weaknesses:
  - Title format must be shap-waterfall · highcharts · anyplot.ai — remove the Credit
    Default Risk · prefix
  - download_js() helper function violates KISS; inline the CDN download logic directly
  - 'X-axis has 52 tick marks at 0.01 intervals — replace with tickInterval: 0.05
    to reduce density'
  - 'Y-axis max: 0.50 wastes ~30% of canvas width; reduce to ~0.42'
  - Reference line annotation font size is 16px; raise to 18px
  - No subtitle or contextual framing for non-expert viewers
