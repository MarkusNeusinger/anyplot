review:
  strengths:
  - Native Highcharts waterfall chart type with isSum flag correctly models the cumulative
    SHAP attribution chain from baseline to final prediction
  - Semantic Okabe-Ito color assignment (orange = positive/risk-up, blue = negative/risk-down,
    green = anchors) creates an immediate, intuitive visual narrative that needs no
    legend
  - 'Complete theme-adaptive chrome: all INK, INK_SOFT, GRID, and PAGE_BG tokens applied
    to every axis, label, and background element in both renders'
  - Multi-CDN fallback download logic with retry ensures robust CI execution even
    when a CDN is unreachable
  - Dual plotLines (baseline dashed, prediction dotted) with branded label styling
    fulfil the spec's labeled reference lines requirement
  weaknesses:
  - Title prefix 'Credit Default Risk · ' is non-standard; must be exactly 'shap-waterfall
    · highcharts · anyplot.ai'
  - 'yAxis.max: 0.50 wastes ~30% of canvas width to the right of the Baseline 0.35
    line; trim to ~0.40-0.42'
  - Data label fontSize 18px is slightly small for a 4800x2700 canvas; 20-22px would
    improve legibility
  - download_js() helper function violates KISS; inline the CDN logic or simplify
    to a single URL
  - Raw JSON construction bypasses highcharts_core Python API; LM-01 capped at 3/5
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title visible as dark ink at top-left; y-axis feature labels (Credit Score, Debt-to-Income, etc.) readable as dark text; x-axis tick labels (0.00, 0.05, ... 0.45) readable; axis titles ("Probability of Default", "Feature") clear; reference line labels ("Baseline 0.35", "Prediction 0.20") legible
      Data: Baseline bar in brand green #009E73 spanning ~0 to 0.35; feature bars in orange #D55E00 (positive SHAP) and blue #0072B2 (negative SHAP); prediction bar in green #009E73 spanning ~0 to 0.20; SHAP value labels (+0.150, -0.180, etc.) shown beside each bar
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title appears as light-colored text against dark background; y-axis feature labels readable as light gray #B8B7B0; x-axis tick labels visible as light gray; axis titles in light #F0EFE8; grid lines very subtle; reference line labels legible ("Prediction 0.20" in green, "Baseline 0.35" in soft gray); no dark-on-dark text failures detected
      Data: Bar colors identical to light render — green #009E73 for baseline/prediction, orange #D55E00 for positive SHAP, blue #0072B2 for negative SHAP; all bars clearly distinguishable against dark background
      Legibility verdict: PASS
