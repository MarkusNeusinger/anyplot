    Index (i)" (x-axis) and "Time Index (j)" (y-axis). The main diagonal is clearly
    visible as a continuous dark navy line. Off-diagonal structures include parallel
    diagonal lines indicating deterministic dynamics, scattered lighter blue points
    for weaker recurrences, and notable dark block structures around time indices
    ~125 and ~220 revealing laminar/periodic windows. A vertical color bar on the
    right maps "Recurrence Strength" from 0.0 (light lavender) to 1.0 (deep navy).
    Thin orange/salmon plotLines appear at approximately t=218 and t=285 with small
    labels referencing "Laminar state" — the rightmost label is partially cut off
    at the edge. Grid lines are removed and axis lines are styled in dark navy.
