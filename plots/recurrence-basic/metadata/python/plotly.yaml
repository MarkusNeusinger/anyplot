review:
  strengths:
  - 'Excellent scientific methodology: time-delay embedding (Takens'' theorem) with
    embedding_dim=3 and delay=5 produces a proper phase-space reconstruction of the
    Lorenz attractor'
  - Elegant two-panel layout (15% time series + 85% recurrence matrix) that tells
    a coherent data story — temporal context above, structural analysis below
  - Binary colorscale that maps non-recurrent cells to the background color (PAGE_BG)
    makes recurrence structure visually clear and theme-adaptive
  - Serif font family (Palatino/Georgia) gives an academic publication feel well-suited
    to a nonlinear dynamics visualization
  - 'Expert use of plotly-specific features: scaleanchor/scaleratio for square axes,
    make_subplots with shared_xaxes and row_heights, fill=''tozeroy'' with rgba fill,
    custom hovertemplate on both panels'
  - 'Perfect spec compliance: binary threshold, Euclidean distance, symmetric matrix,
    reversed y-axis (standard matrix convention), main diagonal present'
  - Informative subtitle 'Lorenz attractor recurrence plot — diagonal lines reveal
    deterministic chaotic dynamics' guides viewer interpretation
  weaknesses:
  - 'Title placement too close to canvas top: title.y=0.99 with yanchor=''top'' places
    the title anchor only ~24 source pixels (6 logical units) from the top edge, leaving
    essentially no breathing room above the text. Fix: change title y from 0.99 to
    0.975 and increase margin.t from 100 to 130 to give the title proper visual padding.'
  - 'Dark render VQ-03 contrast: The binary recurrence colorscale maps 0→#1A1A17 (background)
    and 1→#4467A3 (Imprint blue). The blue-on-near-black contrast ratio (~1.5:1) is
    too low for sparse scattered recurrence points — faint diagonal structures and
    isolated points are harder to read in dark mode. Fix: for THEME==''dark'', use
    a slightly brighter colorscale endpoint such as ''#6688CC'' (lightened Imprint
    blue) to improve legibility of sparse points while keeping the same hue family.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct. Entire canvas and both subplot panels use the warm cream background.
      Chrome: Title "recurrence-basic · python · plotly · anyplot.ai" in dark INK (#1A1A17) at top, with subtitle "Lorenz attractor recurrence plot — diagonal lines reveal deterministic chaotic dynamics" in softer INK_SOFT below. Both are readable. Title is placed extremely close to the top edge (y=0.99, yanchor=top) — essentially 1% of figure height separates the title top from the canvas edge. Letter shapes appear complete (no pixels visibly chopped), but breathing room above title is near-zero. Axis labels "x(t)" / "Time Index (i)" / "Time Index (j)" all clear in INK. Tick labels in INK_SOFT are readable throughout.
      Data: Top panel (15%): Lorenz x(t) time series in brand green #009E73 with a semi-transparent rgba(0,158,115,0.12) fill-to-zero — chaotic oscillations clearly visible. Bottom panel (85%): recurrence matrix in Imprint blue #4467A3 against the cream background — excellent contrast. Block patterns (laminar regimes), diagonal line structures (deterministic dynamics), and the main diagonal are all clearly visible. The binary heatmap structure is crisp (xgap=0, ygap=0).
      Legibility verdict: PASS — all text readable; data structure clearly visible. Minor concern: near-zero top margin above title.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct. Not pure black; warm dark tone.
      Chrome: Title and subtitle in light #F0EFE8 (INK for dark theme) — fully readable. Axis labels and tick labels in #B8B7B0 (INK_SOFT for dark theme) — readable against the dark background. No dark-on-dark text failures. Title is the same placement as light render (y=0.99) — same tight margin concern applies.
      Data: Time series in #009E73 (identical to light render) — brand green reads well on dark background. Recurrence matrix: blue #4467A3 on near-black #1A1A17 background — the colorscale maps 0→#1A1A17 (background) and 1→#4467A3 (blue). Dense block patterns and major diagonal structures are clearly visible. However, the blue-on-dark contrast (~1.5:1) is too low for sparse, isolated recurrence points — faint off-diagonal structures that are clearly visible in the light render are harder to discern in the dark render. Data colors are IDENTICAL between renders (green and blue unchanged — only chrome flips).
      Legibility verdict: PASS for overall readability, but NOTE: sparse recurrence points in dark mode have lower contrast; dense clusters still clearly visible.
