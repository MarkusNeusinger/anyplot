review:
  strengths:
  - Layered two-pass seaborn heatmap (distance background at alpha=0.18 + binary recurrence
    overlay with mask) is sophisticated and exploits seaborn's matrix visualization
    capabilities idiomatically
  - 'Full spec compliance: time-delay embedding (Takens), Euclidean distance, binary
    threshold, main diagonal filled, square axes — all present and correctly implemented'
  - Both themes render correctly with fully theme-adaptive chrome and identical data
    colors (#009E73 brand green constant across light and dark)
  - Meaningful annotations guide viewer to key structural features (determinism diagonal,
    chaotic transition region)
  - Inset recurrence rate lineplot with filled area adds quantitative context without
    cluttering the main visualization
  - 'Perfect data quality: canonical Lorenz system (sigma=10, rho=28, beta=8/3) with
    appropriate embedding parameters, fully deterministic and reproducible'
  weaknesses:
  - Footnote at fig.text(y=0.015) overlaps/crowds the X-axis label due to tight bottom
    margin — increase fig.subplots_adjust(bottom=0.11) or move footnote y from 0.015
    to 0.005, or reduce footnote fontsize to 7pt to create separation
  - Title fontsize 10pt is slightly below the 12pt style-guide default for the 2400x2400
    square canvas — raise to 12pt for better prominence
  - ax.collections[-1].set_alpha(0.18) is a fragile index-based hack — prefer assigning
    the QuadMesh to a variable during the first sns.heatmap call and calling .set_alpha()
    on it directly
