review:
  strengths:
  - 'Excellent use of imprint_seq colormap (#009E73 → #4467A3) to display distance
    bins — continuous distance information is preserved rather than collapsing to
    binary recurrence'
  - Proper time-delay embedding (Takens theorem) with emb_dim=3, emb_delay=5 using
    Lorenz attractor — scientifically correct and produces rich visual patterns
  - 'Perfect spec compliance: square 2400×2400 canvas, both axes labeled Time Index,
    main diagonal visible, ~15% recurrence rate threshold, 220 embedded points'
  - 'Theme-adaptive chrome fully implemented: background, foreground, and text tokens
    all branch on ANYPLOT_THEME; dark render shows clean light text on near-black
    surface'
  - 'Complete pygal output: both PNG and HTML interactive files saved for both themes'
  - Reproducible with np.random.seed(42); KISS structure with no functions or classes
  weaknesses:
  - Legend positioned in the upper-left corner overlaps with recurrence data points
    — pygal places the legend inside the plot area by default; consider using legend_at_bottom=True
    or legend_at_bottom_columns to move it below the chart
  - 'DE-02 Visual Refinement: pygal''s default chart renders with all four box-frame
    spines and visible inner borders; no attempt to minimise chrome via available
    Style properties'
  - 'DE-03 Data Storytelling: distance bin labels (''Distance bin 1'' through ''Distance
    bin 5'') are generic — labeling them with their distance ranges (e.g., ''0–20%'',
    ''20–40%'') would communicate the gradient structure more informatively'
