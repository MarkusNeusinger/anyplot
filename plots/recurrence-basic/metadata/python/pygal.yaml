review:
  strengths:
  - Correct recurrence plot with time-delay embedding (Takens' theorem, dim=3, tau=5)
    and Lorenz attractor data — a canonical, technically rigorous example
  - 'Imprint sequential colormap (#009E73 to #4467A3) correctly applied across 5 distance
    bins — extends the binary plot to a continuous-distance variant as the spec allows'
  - 'Full chrome token compliance in both themes: warm off-white/near-black backgrounds,
    all text flips correctly, no dark-on-dark or light-on-light failures'
  - Clean, flat code with seed for reproducibility; correct PNG + HTML output
  weaknesses:
  - No legend or colorbar explains the green-to-blue colour gradient — viewers cannot
    determine that colour encodes distance proximity (nearest=green, farthest=blue).
    Add show_legend=True or a manual colorbar annotation to make the enhancement interpretable.
  - ~140 embedded time steps is below the spec-recommended 200 minimum — increase
    x_series to ~220 points (change stride denominator from 150 to 110 and take [:220])
    so n_pts >= 200 after embedding.
  - dots_size=7 causes heavy dot merging in dense cluster regions (e.g., upper-left
    block, index ~40-55 block) — reduce to dots_size=4 or 5 to preserve individual-dot
    legibility and show internal block structure.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "recurrence-basic · python · pygal · anyplot.ai" in dark ink, clearly readable. Both "Time Index" axis labels in dark ink, readable. Numeric tick labels (0, 10, 20, ... 130) on both axes in dark ink, readable.
      Data: 5-bin scatter dots coloured from brand green (#009E73, nearest-recurrent pairs) through teal to blue (#4467A3, farthest pairs). Main diagonal runs top-left to bottom-right as a dense green line. Block structures visible in upper-left (~0-25) and middle (~40-55) regions. Diagonal line fragments visible indicating determinism. dots_size=7 causes merging in dense cluster regions.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title and axis labels rendered in light text (off-white), clearly readable against dark background. Tick labels in light grey, all visible. No dark-on-dark failures detected. Grid lines subtle but visible.
      Data: Data dot colours are identical to light render (green to blue Imprint seq gradient) — only chrome flipped. Main diagonal clearly visible as green stripe. Block structures and diagonal fragments clearly distinguishable.
      Legibility verdict: PASS
