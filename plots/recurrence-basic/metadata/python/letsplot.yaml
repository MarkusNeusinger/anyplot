review:
  strengths:
  - 'Full spec compliance: binary recurrence plot with time-delay embedding (Takens''
    theorem), correct percentile threshold, symmetric matrix with main diagonal correctly
    filled'
  - 'Both renders theme-adapt flawlessly — backgrounds (#FAF8F1 / #1A1A17), chrome,
    and text all flip correctly; data color (brand green #009E73) stays constant'
  - Thoughtful Line of Identity annotation using ELEVATED_BG creates a subtle but
    visible reference diagonal without competing with the recurrence data
  - Interactive letsplot features leveraged — layer_tooltips on geom_tile and HTML
    export showcase the library's interactive capabilities
  - Correct square canvas (ggsize(600,600) + scale=4 = 2400×2400 px) appropriate for
    symmetric recurrence matrix, with coord_fixed(ratio=1.0) enforcing equal axis
    scales
  weaknesses:
  - Design excellence is functional but modest — no typographic hierarchy beyond standard
    defaults, no annotation pointing to characteristic recurrence structures (diagonal
    lines indicating determinism, block structures signaling regime changes)
  - Grid lines are fully removed which is correct, but the plot margins are somewhat
    tight; adding explicit coord_cartesian expand or plot margin padding would give
    the recurrence matrix slightly more breathing room
  - The LoI (Line of Identity) geom_abline in ELEVATED_BG is subtle and nearly invisible
    within the dense green tile pattern — a contrasting color (e.g., INK_SOFT with
    alpha=0.5) would make the diagonal reference line more visually meaningful
