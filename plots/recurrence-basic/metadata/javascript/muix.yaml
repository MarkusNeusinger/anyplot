review:
  strengths:
  - Correctly implements time-delay embedding (Takens' theorem, tau=5) before computing
    distances — mathematically faithful to the spec
  - Uses the Imprint brand green (#009E73) via t.palette[0] for the single data series
    — palette compliant
  - 'Square canvas (//# anyplot-orientation: square) correctly chosen for the symmetric
    matrix visualization'
  - Both light and dark themes render correctly — background, text, and data colors
    all theme-adaptive via ANYPLOT_TOKENS
  - 'All spec requirements met: binary threshold, Euclidean distance, symmetric matrix,
    labeled axes as time indices'
  - Scientifically accurate data — logistic map at r=3.95 is genuinely in the chaotic
    regime (r > 3.57), producing authentic recurrence structure
  - Fully deterministic data generation (fixed-point seed 0.4, deterministic logistic
    map) — no RNG needed
  - Single-series legend correctly hidden via sx prop — removes redundant chrome
  - Clean, readable code with appropriate complexity — no over-engineering
  weaknesses:
  - 'DE-01 (4/8): Plot is functionally correct but lacks aesthetic sophistication
    — the default MUI X ScatterChart appearance with no spine customization or visual
    hierarchy reads as a configured default rather than a polished visualization'
  - 'DE-02 (3/6): No explicit grid styling or axis customization beyond hiding the
    legend — MUI X defaults for spines, grid opacity, and chart frame are left unchanged'
  - 'DE-03 (2/6): No visual storytelling — the main diagonal (the most structurally
    important feature of a recurrence plot) is not emphasized, and no annotations
    or visual cues guide the viewer to the deterministic structures or chaotic patterns'
  - 'LM-02 (2/5): ScatterChart is used generically without leveraging any MUI X-distinctive
    features — reference lines, custom marks, or composed chart elements could add
    distinctiveness'
  - Title fontSize (18px CSS) is slightly below the recommended 22px for a square
    canvas, making the title appear moderately small relative to the 1200px CSS canvas
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct page surface for light theme.
      Chrome: Title "recurrence-basic · javascript · muix · anyplot.ai" visible at top (~65% of canvas width) in dark ink. X-axis label "Time Index i" readable at bottom. Y-axis label "Time Index j" readable (rotated, left side). Tick labels (0–290 on both axes) visible and correctly spaced. All text readable against the light background.
      Data: Dense scatter of small brand-green (#009E73) dots forming the symmetric recurrence matrix. Main diagonal clearly visible running bottom-left to top-right. Scattered chaotic structure visible across the matrix, with some short diagonal segments indicating brief deterministic episodes in the logistic map dynamics.
      Legibility verdict: PASS — all text elements readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct page surface for dark theme.
      Chrome: Title in light text visible at top, both axis labels readable, tick labels visible. The ThemeProvider handles chrome adaptation correctly — all text elements are light-colored against the dark background. No dark-on-dark failures detected.
      Data: Same brand-green (#009E73) dots as light render — data colors are identical between themes, only chrome flips. The recurrence structure (diagonal, scattered chaotic patterns) is equally visible against the dark background.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures, brand green remains clearly visible.
