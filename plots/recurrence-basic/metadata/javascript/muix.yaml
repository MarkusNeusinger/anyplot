review:
  strengths:
  - 'Correct square orientation with //# anyplot-orientation: square directive for
    symmetric matrix visualization'
  - Implements time-delay embedding (Takens theorem, tau=5) correctly before computing
    recurrence pairs
  - Amber dashed identity diagonal (i=j) with label adds meaningful storytelling context
    and guides the viewer
  - useDrawingArea hook demonstrates MUI X-specific React composition API for custom
    SVG overlays inside chart coordinate space
  - Deterministic logistic map (r=3.95) provides a scientifically grounded chaotic
    time series at an educationally appropriate near-chaos regime
  - Theme-adaptive tokens (t.pageBg, t.ink, t.grid, t.amber) correctly applied — chrome
    adapts across both renders
  - Legend correctly hidden for a single-series plot; axis lines removed for clean
    minimal look
  weaknesses:
  - Tick labels at 11px CSS are slightly small — 12-13px would improve mobile readability
  - 'No alpha blending on scatter series: dense recurrence regions could benefit from
    opacity ~0.7 to better convey point density and give visual depth'
  - Design excellence is functional but limited — beyond the identity-line annotation
    there is no further visual hierarchy or emphasis guiding the viewer to the key
    structural features (diagonal line segments, block structures)
  - markerSize=2 is appropriate for density but the absence of any alpha means highly
    recurrent regions appear as solid patches rather than conveying individual point
    accumulation
