review:
  strengths:
  - 'Perfect spec compliance: binary threshold recurrence plot with time-delay embedding
    (Takens), Euclidean distance, square canvas, correct axis labeling'
  - Deterministic Lorenz attractor data generation with burn-in and standard parameters
    (σ=10, ρ=28, β=8/3) — scientifically correct and realistic
  - 'Full Imprint palette compliance: first series uses #009E73, transparent background
    surfaces theme-adaptive pageBg, all chrome tokens wired correctly'
  - All font sizes explicitly set (title 22px, axis names 16px, tick labels 13px)
    — readable in both themes with no clipping or overlap
  - 'Clean KISS code structure: linear flow, well-placed scientific comments (Takens
    theorem, Lorenz params), no extraneous abstraction'
  - 'Theme adaptation is correct: t.ink for title, t.inkSoft for axis labels/ticks
    — no dark-on-dark failures in dark render'
  weaknesses:
  - 'DE-01 DEFAULT (4/8): The plot looks like a well-configured ECharts heatmap with
    no exceptional design choices beyond the mandatory palette. Consider whether the
    axis lines themselves should be removed entirely (leaving only the data matrix)
    or whether a subtle outer border could frame the matrix more elegantly'
  - 'DE-03 LOW (2/6): No visual hierarchy or data storytelling. The spec explicitly
    mentions the main diagonal indicates determinism and block structures signal regime
    changes — these insights should be made visible. Consider: (a) lowering epsilon
    from 12% to 8-9% of maxDist so the main diagonal stands out as a distinct line
    rather than merging into large blobs, OR (b) drawing a contrasting overlay line
    along i==j after the heatmap, OR (c) adding a brief annotation naming the large
    central recurrence cluster as the ''chaotic attractor nucleus'''
  - 'DQ-01 SUBTLE (5/6): The main diagonal (i==j, always recurrent) is mathematically
    present in the data but visually blends into the large central blob around time
    140-160. A real recurrence plot should show a clear continuous diagonal line from
    (0,0) to (N,N). Reduce epsilon to ~8% of maxDist to sharpen the diagonal and make
    shorter-time diagonal lines more distinct'
  - 'LM-02 MODERATE (2/5): The implementation uses progressive:0 and emphasis.disabled
    but does not leverage ECharts'' more distinctive capabilities. Consider using
    a visualMap component to show continuous normalized distances (instead of binary),
    which would use the imprint_seq colormap (t.seq) and produce a richer, more informative
    recurrence distance matrix'
