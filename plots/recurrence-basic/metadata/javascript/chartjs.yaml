review:
  strengths:
  - Excellent use of the Chart.js plugin system (beforeDatasetsDraw) to render a custom
    bitmap recurrence matrix not natively supported by the library
  - 'Perfect spec compliance: binary recurrence matrix with symmetric layout, square
    canvas orientation, correctly labeled time-index axes'
  - Fully deterministic data generation using the logistic map with fixed parameters
    (r=3.9, N=200, epsilon=0.12, x0=0.4) — no RNG dependency
  - 'Both light and dark renders pass all theme checks: data colors (#009E73) identical
    across themes, all chrome (background, text, grid) correctly adapts'
  - Scientific data choice (logistic map at r=3.9 chaotic regime) produces rich authentic
    nonlinear dynamics structure including visible diagonal lines, block structures,
    and the laminar intermittency window at t≈150
  weaknesses:
  - 'DE-01/DE-03: No annotation or visual emphasis highlights the most striking feature
    — the laminar window (blank column/row at t≈150); an annotation callout would
    elevate storytelling significantly'
  - 'DE-03: No subtitle or parameter note (e.g., ''Logistic map r=3.9, N=200, ε=0.12'')
    — viewer must already know what they are looking at to interpret the structure'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "recurrence-basic · javascript · chartjs · anyplot.ai" fully visible in dark ink at top (~65% width). X-axis label "Time index i" and Y-axis label "Time index j" in dark ink, clearly readable. Tick labels (0, 50, 100, 150, 200) on both axes in dark inkSoft, all crisp. Subtle grid lines present but unobtrusive.
      Data: Recurrence cells filled in #009E73 (Imprint brand green) on warm cream background. Binary matrix 200×200. Visible structural features: main diagonal (self-recurrence), diagonal line segments (periodic orbits), block clustering, and a striking blank column/row at approximately t=150 (laminar intermittency window).
      Legibility verdict: PASS — all text elements clearly readable against light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light ink (#F0EFE8 / #B8B7B0 range), clearly readable against dark background. Subtle grid lines adapt to dark surface. No dark-on-dark failures observed.
      Data: Recurrence cells identically #009E73 brand green — same hue as light render, no color shift. Non-recurrent cells show the dark background. Same structural patterns (main diagonal, blocks, laminar window at t≈150) clearly visible.
      Legibility verdict: PASS — all text elements readable against dark background. Brand green #009E73 remains highly visible on near-black surface.
