review:
  strengths:
  - 'Perfect spec compliance: binary recurrence plot correctly implemented with time-delay
    embedding (Takens theorem, d=2 tau=1), Euclidean distance computation, and threshold-based
    binary classification'
  - Deterministic data generation using logistic map (r=3.82, x0=0.4) explicitly mentioned
    in spec as an example; visually exposes chaotic block structure, diagonal determinism
    lines, and laminar regions
  - Square orientation correctly selected for the symmetric matrix visualization
  - 'Palette compliance: single series uses t.palette[0] (#009E73 brand green), transparent
    background adapts correctly to both themes, all chrome tokens properly mapped
    (t.ink, t.inkSoft, t.grid)'
  - 'Performance-optimized: turboThreshold: 100000 handles the large dataset, tooltip
    and hover states explicitly disabled for a clean static render'
  - Clean flat code structure with no functions or classes; all font sizes explicitly
    set per guidelines (22px title, 16px axis titles, 14px tick labels)
  weaknesses:
  - 'DE-01 LOW (4/8): Design is a well-configured default scatter — visually correct
    but not sophisticated. No visual hierarchy, no emphasis on the diagonal or block
    structure. Consider upgrading to a distance-based continuous colorAxis variant
    (imprint_seq stops) or adding a styled reference line along the main diagonal
    to anchor the viewer.'
  - 'DE-03 LOW (3/6): The recurrence pattern is visible but the viewer gets no guidance
    on what to look for. The spec explicitly notes that diagonal lines indicate determinism,
    block structures signal regime changes — a subtitle or annotation highlighting
    one of these structural features would lift storytelling significantly.'
  - 'LM-02 LOW (2/5): The implementation uses Highcharts scatter with turboThreshold
    and disabled hover, but does not leverage any truly distinctive Highcharts capability.
    A colorAxis with the imprint_seq gradient would turn this into a distance-based
    recurrence plot (spec allows it as ''acceptable enhancement'') and would showcase
    Highcharts'' continuous colorAxis — a feature unique to the library.'
  - 'VQ-01 minor (7/8): The title is fully readable but the Y-axis label ''Time Index
    j'' appears slightly under-spaced on the left margin (spacing: [20, 20, 20, 10]
    gives only 10px left padding). Consider spacing: [20, 20, 20, 20] for balanced
    breathing room.'
