review:
  strengths:
  - Amber diagonal line overlay using Highcharts SVG renderer is a creative, spec-correct
    highlight of self-recurrence that creates a clear focal point
  - 'Perfect spec compliance: time-delay embedding (d=2, tau=1), Euclidean distance
    binary threshold, square format, both axes labeled as time indices'
  - Full Imprint palette compliance with t.palette[0]=#009E73 and theme-adaptive chrome
    tokens throughout
  - Informative subtitle explicitly guides the viewer to the key visual patterns (determinism,
    regime changes)
  - 'Deterministic logistic map data at r=3.82 (chaotic regime) demonstrates all canonical
    recurrence plot features: diagonal lines, block structures, and off-diagonal recurrent
    pairs'
  - turboThreshold set to 100000 for performance with the large scatter dataset; hover
    states disabled for cleaner static render
  - 'Clean KISS code structure: data generation → matrix construction → chart → SVG
    overlay, no functions or classes'
  weaknesses:
  - Subtitle font size (13px) is slightly below the recommended 14px tick-label baseline
    for the CSS mount; consider bumping to 14px for consistent mobile legibility
  - Marker radius=2 is functional but on the small side for the density; slightly
    larger radius (2.5-3) with a fractional opacity (0.7-0.8) would give each recurrent
    point slightly more visual weight without losing structure
  - 'DE-01/DE-02 could be pushed higher: consider removing the default plotBorderColor,
    setting explicit gridLineWidth values, and adding a very subtle gridLineColor
    opacity to further differentiate from the library defaults'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "recurrence-basic · javascript · highcharts · anyplot.ai" at 22px in dark ink, fully visible and occupying ~70% of the plot width. Subtitle at 13px in muted ink below the title, readable. X-axis label "Time Index i" and Y-axis label "Time Index j" at 16px in inkSoft, both clearly visible. Tick labels at 14px on both axes, legible with good contrast against the off-white background.
      Data: Dense grid of small square markers in Imprint brand green (#009E73), forming a symmetric recurrence matrix with visible block structures (large filled rectangles of recurrent points) and diagonal line patterns. An amber (#DDCC77) diagonal line overlays the main diagonal from (0,0) to (198,198), clearly emphasizing self-recurrence. Subtle grid lines visible in both axes.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in light ink (#F0EFE8) at 22px, fully visible against the dark background. Subtitle in soft light ink, readable. Axis titles "Time Index i" and "Time Index j" in inkSoft (light variant), both clearly visible. Tick labels in light-toned inkSoft, legible with no dark-on-dark issues.
      Data: Recurrent point markers in identical Imprint brand green (#009E73) — same color as light render, data colors unchanged. The amber diagonal line remains clearly visible as a bright warm gold against the near-black background. Block structures and diagonal patterns in the recurrence matrix are equally readable. Grid lines subtle against the dark background.
      Legibility verdict: PASS — all text is light-colored against the dark background. No dark-on-dark failures detected. Brand green #009E73 is clearly visible on the dark surface.
