  image_description: The plot displays a square recurrence matrix of the Lorenz attractor's
    x-component after time-delay embedding. Both axes show "Time Index (i)" and "Time
    Index (j)" ranging from 0 to approximately 490. Recurrent points are rendered
    as blue (#306998) dots on a white background. The main diagonal is present throughout.
    A large dense blue block appears in the upper-left corner (indices 0-150), indicating
    a sustained laminar regime. Diagonal line structures are clearly visible throughout
    the matrix, revealing deterministic chaotic dynamics. Block and cross-shaped patterns
    appear at various locations (around indices 200, 350-400), indicating recurring
    regime visits. The title reads "Lorenz Attractor · recurrence-basic · plotly ·
    pyplots.ai" with a subtitle explaining that diagonal lines indicate chaotic but
    recurrent dynamics. The y-axis is reversed so the origin is at the top-left. No
    colorbar is shown as this is a binary recurrence plot. The layout uses a square
    1:1 aspect ratio appropriate for a symmetric distance matrix.
