review:
  strengths:
  - 'Perfect spec compliance: correctly implements time-delay embedding (Takens theorem),
    binary threshold via 5th-percentile quantile, square coord_fixed, and visible
    main diagonal'
  - 'Excellent dual-theme rendering: non-recurrent cells use PAGE_BG so the matrix
    background blends seamlessly with the page background in both light and dark themes'
  - 'Three-layer storytelling: subtitle explains the chaotic regime context, diagonal
    reference line highlights the Line of Identity, arrow annotation guides the eye
    to off-diagonal band structure'
  - geom_raster (not geom_tile) is the correct idiomatic ggplot2 choice for dense
    equal-cell rasters — demonstrates genuine library knowledge
  - 'Clean KISS code: logistic map generation, 2D time-delay embedding, and distance
    thresholding written inline with no abstraction overhead; set.seed(42) ensures
    reproducibility'
  weaknesses:
  - Annotation text placed at y = n_pts * 0.98 (98% of plot range) is very close to
    the top border and overlaps slightly with green recurrence dots in the upper-left
    region — move annotation to y = n_pts * 0.88 or add a filled rect behind the text
    to separate it from data
  - Annotation text size = 2.7 (geom scale, approx 7.7pt) is borderline small for
    mobile viewports at ~400px — increase to size = 3.0-3.2 for better readability
    at small sizes
  - 'Design Excellence has room to grow: the aesthetic is clean and intentional but
    not publication-ready; consider slightly bolder diagonal line (linewidth = 0.7),
    or a subtle ELEVATED_BG fill box behind the annotation text to give it visual
    separation from the dot field'
