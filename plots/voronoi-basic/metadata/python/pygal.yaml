    theme tokens, and injecting Voronoi polygons into pygal's rendered SVG
  - Seed-point circles are too small (r=12 inner / r=16 outer in a 4800px canvas);
    increase to r=22 inner / r=32 outer for better visibility at full resolution
  - Title font-weight is light (font-weight='500'); change to font-weight='bold' to
    improve typographic hierarchy
  - Data storytelling is minimal — consider adding subtle region labels (e.g., region
    number) at each cell centroid to help viewers understand the partitioning concept
