review:
  strengths:
  - 'Excellent code quality: clean, linear, idiomatic pygal with all required PNG
    and HTML outputs'
  - Correct Okabe-Ito palette and fully theme-adaptive chrome in both light and dark
    renders
  - Smart use of x_title as the breadcrumb display within the chart itself
  - Well-structured hierarchical data with realistic budget values that sum correctly
    at every level (sub-teams → divisions → company)
  - xlink on bars is a genuinely distinctive pygal feature, correctly applied for
    click-to-drilldown
  - Value labels with currency formatter ($X,XXXK) are precise and readable in both
    themes
  weaknesses:
  - Grid lines are dashed (pygal default); style guide requires solid thin lines —
    override or suppress and redraw
  - Dark render value labels are rendered in the muted foreground token instead of
    primary INK; add explicit value_label_font_color in Style for dark theme
  - HTML drilldown uses alert() instead of re-rendering the chart; replace with a
    real SVG swap using pre-rendered level SVGs embedded as JSON
  - No back/drill-up navigation in HTML; add a clickable breadcrumb trail or Back
    button that re-renders the parent level
  - No visual emphasis within the bar chart — the highest-value category (Technology)
    is indistinguishable in color/emphasis; vary opacity or use highlight color for
    the dominant bar
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "bar-drilldown · python · pygal · anyplot.ai" in dark ink, fully readable. Y-axis label "Budget (thousands $)" and X-axis label "Breadcrumb: Company" both dark and readable. Tick labels ($0K–$4,000K) clear and legible.
      Data: Three bars in brand green #009E73 — Technology ($4,200K), Sales ($3,100K), Operations ($2,400K). Value labels above each bar in dark text. Horizontal dashed grid lines are subtle.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface
      Chrome: Title, axis labels, and tick labels all render in light/near-white color — correctly theme-adapted and fully readable. No dark-on-dark failures on primary chrome elements. Value labels above bars appear slightly dimmer than primary text (using foreground_subtle/INK_MUTED token rather than primary INK), but still readable.
      Data: Bars remain #009E73 — identical to light render (only chrome flips, data colors stay constant). Dashed grid lines visible and subtle.
      Legibility verdict: PASS (minor: value labels slightly muted in dark render due to foreground token used)
