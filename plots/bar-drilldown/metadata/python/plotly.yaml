review:
  strengths:
  - Correct use of Plotly animation frames + dropdown updatemenus — the idiomatic
    approach for drilldown in a standalone script
  - 'Full theme-adaptive chrome: all tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG,
    GRID) applied consistently to dropdown, axis labels, tick labels, value text,
    and bar edges'
  - Smooth transitions (400ms frame, 250ms ease) give the chart a polished interactive
    feel in the HTML output
  - 'Okabe-Ito palette in correct order; first series correctly #009E73; frame-level
    titles follow the required format'
  weaknesses:
  - Q1 and Q2 have no monthly drill-down frames; clicking them in the dropdown just
    shows the annual view — add go.Frame(name="q1", ...) and go.Frame(name="q2", ...)
    with January/February/March and April/May/June monthly breakdowns
  - 'No visual storytelling emphasis: Q4 is the holiday-season peak ($2.38M) but nothing
    draws the eye to it — consider a subtle annotation or slightly distinct opacity
    for the highest bar'
  - Three bar_kwargs_* dicts repeat identical keys; refactor into a shared base dict
    merged with per-level overrides
  - '# noqa: E402 lint-suppression comment violates project style rules — restructure
    import block so the noqa is unnecessary'
  - Bottom margin (margin.b=110) creates excess whitespace below the footer annotation
    — reduce to ~70-80 to tighten the canvas
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "2024 Retail Sales · bar-drilldown · python · plotly · anyplot.ai" centered, dark ink (#1A1A17); axis labels "Quarter" and "Revenue ($K)" in dark ink; tick labels in INK_SOFT (#4A4A44); dropdown control with FFFDF6 fill and dark border/text — all readable
      Data: 4 bars in Okabe-Ito order: Q1 #009E73 (green), Q2 #D55E00 (orange), Q3 #0072B2 (blue), Q4 #CC79A7 (pink); value labels $1.24M/$1.68M/$2.14M/$2.38M above bars in dark ink; subtle y-axis grid lines; footer annotation in INK_SOFT
