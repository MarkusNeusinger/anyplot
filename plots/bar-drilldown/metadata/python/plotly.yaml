review:
  strengths:
  - Full theme-adaptive chrome throughout both renders — backgrounds, text, grid,
    dropdown all flip correctly between light (#FAF8F1) and dark (#1A1A17)
  - 'Opacity storytelling: Q1–Q3 bars muted at 0.75 opacity, Q4 at 1.0, paired with
    a Holiday Peak annotation — creates a clear visual focal point without annotations
    on every bar'
  - 'Frame-based drilldown via go.Frame + updatemenus animate method: title and breadcrumb
    path update per frame, demonstrating Plotly-distinctive animation API'
  - 'Internally consistent hierarchical data: monthly values sum exactly to quarterly
    totals (Q1: 390+420+430=1240, Q2: 520+570+590=1680, Q3: 680+750+710=2140, Q4:
    740+940+700=2380)'
  - All font sizes explicitly set (title=16, axis=12, ticks=10, bar labels=12) and
    proportional in both renders
  weaknesses:
  - 'SC-02: Drilldown is triggered by dropdown menu, not by clicking directly on a
    bar column — spec says ''Click on a column to drill into its sub-level breakdown''.
    The dropdown is a valid Plotly-native fallback (click callbacks without Dash require
    raw JS), but the spec intent is not fully met'
  - 'Color identity not maintained across drill levels: all monthly detail views reuse
    OKABE_ITO[:3], so January and April both render as #009E73 green, losing the cross-level
    identity that the spec requests (''maintain consistent color mapping across drill
    levels when possible'')'
  - 'CQ-04: Five nearly-identical bar_kwargs_qX dicts and five frames are verbose;
    a short loop building these would cut ~60 lines without sacrificing the flat KISS
    structure'
  - 'DE-01/DE-02: Design is above defaults (opacity differential, styled dropdown,
    bar edges) but could push further — e.g., stronger typographic hierarchy between
    title and axis labels, or a more prominent visual entry cue on the dropdown'
