review:
  strengths:
  - Builds a complete Schmidt lower-hemisphere equal-area stereonet from scratch on
    a hidden cartesian2d grid using ECharts custom-series renderItem — equal-area
    net (meridians + small circles every 10 deg), primitive circle, perimeter ticks,
    cardinal N/E/S/W labels and a North arrow, all idiomatic ECharts.
  - 'Covers every spec feature: poles to planes as scatter colored by feature_type
    with a legend, mean great circles per feature, and Kamb-style Gaussian KDE density
    contours rendered via marching squares.'
  - 'Correct palette discipline: Bedding=#009E73 (brand green first), Joint sets use
    canonical lavender/blue, Fault uses the semantic matte-red anchor (#AE3030) for
    a hazard role, and density contours use imprint_seq (green->blue) — no disallowed
    colormaps.'
  - 'Theme chrome is correct in both renders: warm off-white #FAF8F1 (light) and warm
    near-black #1A1A17 (dark); data colors identical across themes, only chrome flips.
    All text (title, subtitle, legend, cardinals) is readable in both.'
  - Deterministic LCG+Box-Muller data generation with realistic structural-geology
    context (bedding, two joint sets, fault) and plausible strike/dip distributions;
    correct square 2400x2400 canvas.
  weaknesses:
  - The imprint_seq density-contour colors (green->blue) partially collide perceptually
    with the categorical Bedding green and Joint-set-2 blue, and with the green/blue
    mean great circles — in dense regions a reader could momentarily confuse a contour
    ring with a series element. Consider rendering the contours in a single muted
    neutral, or reducing their opacity, to keep poles vs density vs great-circles
    cleanly separated.
  - The legend only identifies the four feature_type point series; it does not explain
    the concentric density contours or the colored mean great-circle arcs. The subtitle
    mentions them, but a small annotation or secondary legend entry would make the
    encoding fully self-explanatory.
  - Several geometry/math helper functions are defined (vecToXY, poleVec, greatCircleArc,
    etc.); these are genuinely needed for a from-scratch projection so it is justified,
    but it is a mild departure from the KISS no-functions guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface, not pure white.
      Chrome: bold dark title "stereonet-equal-area · javascript · echarts · anyplot.ai" with a gray subtitle; top-left vertical legend (Bedding=green, Joint set 1=lavender, Joint set 2=blue, Fault=red) all readable; cardinal N/E/S/W labels (N bold with a north arrow) and subtle gray equal-area net grid with 10-deg perimeter ticks. All text clearly readable against the light background.
      Data: scatter poles colored by feature type (Bedding #009E73 green, Joint set 1 lavender, Joint set 2 blue, Fault matte-red), concentric Kamb density contours in green->blue (imprint_seq) over each cluster, and colored mean great-circle arcs. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface, not pure black.
      Chrome: light title/subtitle, same legend with light text, N/E/S/W and north arrow visible, subtle net grid. No dark-on-dark issues — all text legible.
      Data: identical data colors to the light render (only chrome flipped). Density contours, poles, and great circles in the same Imprint hues.
      Legibility verdict: PASS
