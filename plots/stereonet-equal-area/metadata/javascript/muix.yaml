review:
  strengths:
  - Genuine lower-hemisphere Lambert equal-area (Schmidt) projection built from scratch
    — poles to planes, mean great circles, and a full meridian/small-circle graticule,
    exactly matching the spec's structural-geology requirements.
  - Kamb-style density field computed via exponential smoothing of pole axes and rendered
    as marching-squares iso-contours using the Imprint sequential ramp — highlights
    preferred orientations as required.
  - 'Sophisticated idiomatic MUI X usage: ChartContainer with composable children
    plus useXScale/useYScale hooks to overlay fully custom SVG (net, contours, great
    circles, perimeter chrome) on top of the native ScatterPlot.'
  - 'Imprint palette compliance is exact — Bedding is brand green t.palette[0], remaining
    features follow canonical order; both renders share identical data colors with
    only chrome flipping; backgrounds are correct #FAF8F1 / #1A1A17.'
  - 'Complete perimeter chrome: 10-degree tick marks (major/minor), 30-degree degree
    labels, N/E/S/W cardinals, North at top — all readable in both themes.'
  - Deterministic in-memory data via fixed-seed LCG; realistic geological field-campaign
    context (bedding, joint set, foliation, fault) with plausible dip/dip-direction
    clustering.
  weaknesses:
  - All four density-contour rings are drawn in the green Imprint sequential ramp,
    so the contours around the non-green clusters (purple Joint set, blue Foliation,
    orange Fault) introduce a second green color that slightly competes with the green
    Bedding cluster and its green great circle — consider a lower-chroma/neutral contour
    treatment so density reads as chrome rather than a fifth category.
  - Perimeter degree labels (30 degrees, 60 degrees, ...) are set at fontSize 13 (CSS
    px); they are readable but on the small side relative to the 24px cardinal labels
    — a small bump (to ~14-15px) would improve mobile legibility when scaled to ~400px.
  - The implementation relies on many module-level helper functions (projectVec, greatCirclePath,
    smallCirclePath, marchingSquares, hexLerp, etc.); this is justified by the genuine
    geometric complexity, but it sits outside the strict KISS 'no functions' guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — not pure white, not dark. Correct.
      Chrome: dark title "stereonet-equal-area · javascript · muix · anyplot.ai" and grey subtitle, both readable. Primitive circle drawn in dark ink; subtle grey net graticule (meridians + small circles). Perimeter degree labels (30°/60°/120°/.../330°), 10° tick marks, and bold N/E/S/W cardinals all clearly visible. Bottom legend with colored dots + labels readable. Footnote about Imprint sequential ramp readable.
      Data: four pole clusters — Bedding green (#009E73, palette[0]), Joint set purple, Foliation blue, Fault orange — each with a matching mean great circle and green sequential density contours. First series is brand green. Markers clearly distinguishable.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black, not light. Correct.
      Chrome: light title and subtitle readable; primitive circle now drawn in light ink (chrome flipped correctly); net graticule subtle but visible; degree labels, tick marks, and N/E/S/W cardinals all readable as light text — no dark-on-dark failures. Legend and footnote readable.
      Data: cluster colors are IDENTICAL to the light render (green/purple/blue/orange), great circles and green density contours unchanged — only chrome flipped. Markers clearly distinguishable against the dark surface.
      Legibility verdict: PASS
