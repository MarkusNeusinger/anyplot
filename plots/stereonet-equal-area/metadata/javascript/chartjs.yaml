review:
  strengths:
  - 'Genuine lower-hemisphere equal-area (Schmidt) projection: poles plotted as the
    plane normal (90deg to plane), great circles drawn for each plane, and a full
    equatorial reference net every 10deg - mathematically correct, not faked.'
  - Kamb density contours computed via marching-squares over a 64x64 sigma field highlight
    the three preferred orientations exactly as the spec requests.
  - 'Imprint palette used correctly: Bedding=#009E73 (brand, first series), Joint
    set=#C475FD, Fault=#4467A3 in canonical order; data colors identical across light/dark,
    only chrome flips.'
  - 'Theme-adaptive chrome is clean in both renders - warm off-white #FAF8F1 / near-black
    #1A1A17 surfaces, an elevated net card, readable title/subtitle/legend, and a
    subtle grid that never competes with the data.'
  - 'Strong visual hierarchy: faint feature-colored great circles (alpha 0.22) recede
    so the solid poles and density contours stay the focal point; perimeter degree
    ticks (major every 30deg) and a North arrow orient the reader.'
  - Idiomatic Chart.js plugin (afterDatasetsDraw) plus generateLabels custom legend
    - extends the library through its supported API rather than reaching for another
    library.
  weaknesses:
  - Perimeter degree labels (15px) and the subtitle (14px) are on the small side and
    would be hard to read when the PNG is scaled to ~400px mobile width - consider
    bumping perimeter labels to ~17-18px.
  - The faint great-circle bundle near the 120-150 perimeter is geologically inherent
    (steeply dipping planes) but reads as slight clutter at the lower-right edge;
    a touch lower alpha or thinner stroke there would tidy it.
  - Implementation is a long custom-canvas plugin with several geometry helpers -
    necessary for a stereonet, but it leans on raw canvas drawing rather than Chart.js's
    own chart types (datasets is empty).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) page surface with a slightly lighter elevated card (#FFFDF6) filling the net circle.
      Chrome: title "stereonet-equal-area · javascript · chartjs · anyplot.ai" in dark ink, subtitle below it, perimeter degree labels (030..330) and "N" arrow in soft ink, bottom legend (Bedding / Joint set / Fault) - all clearly readable against the light surface.
      Data: three pole clusters - green (#009E73) Bedding at center, lavender (#C475FD) Joint set upper-right, blue (#4467A3) Fault lower-left; faint feature-colored great circles; gray Kamb density contours ringing each cluster; subtle equal-area net grid. First series renders #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) page surface with elevated near-black card (#242420) for the net.
      Chrome: title, subtitle, degree labels, "N" arrow, and legend all in light ink - fully readable, no dark-on-dark failures.
      Data: identical pole colors to the light render (green/lavender/blue), identical contours and net; only chrome flipped. Brand green stays visible.
      Legibility verdict: PASS
