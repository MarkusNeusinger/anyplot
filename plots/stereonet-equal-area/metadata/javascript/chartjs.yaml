review:
  strengths:
  - Fully custom-drawn Schmidt equal-area net rendered through an idiomatic Chart.js
    plugin (afterDatasetsDraw) — meridians, parallels, primitive circle, elevated
    net card, perimeter degree ticks (major/minor) and a North arrow
  - 'Correct geology: lower-hemisphere equal-area projection, poles plotted at 90
    degrees to each plane (plane normal), great circles drawn per plane, North at
    top'
  - 'First categorical series is brand green #009E73 (Bedding), then canonical Imprint
    order (Joint set #C475FD, Fault #4467A3); data colours identical across light/dark
    with only chrome flipping'
  - 'Deterministic LCG + Box-Muller clusters mimic a realistic field campaign with
    preferred orientations; both renders pass theme-readability with correct #FAF8F1
    / #1A1A17 backgrounds'
  - Alpha-faded great circles (0.32) vs solid bordered pole markers create a clean
    visual hierarchy that keeps the primary data legible
  weaknesses:
  - Kamb density contours from the spec Notes ('Overlay Kamb density contours on pole
    data to highlight preferred orientations') are not implemented — clustering is
    conveyed only by raw pole positions, costing SC-02 and DQ-01 feature coverage
  - In the dark render the green (Bedding) great circles bunch densely in the lower-right
    quadrant and read slightly heavy against the near-black surface; consider lowering
    great-circle alpha or thinning per-plane curves so they don't compete with the
    poles
  - Perimeter degree labels at 13px are readable but on the small side when the square
    canvas is scaled toward ~400px mobile width — a slightly larger tick-label font
    would improve mobile legibility
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) page with a faintly elevated circular net card.
      Chrome: dark title "stereonet-equal-area · javascript · chartjs · anyplot.ai", grey subtitle, perimeter azimuth labels (030, 060 ... 330), North arrow + "N" at top, bottom legend (Bedding/Joint set/Fault) — all clearly readable.
      Data: three pole clusters — green #009E73 (Bedding, centre-left), purple #C475FD (Joint set, upper), blue #4467A3 (Fault, lower-left); thin alpha-faded great circles colour-matched per feature; first series is #009E73. Subtle grey equal-area net grid.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) page with a slightly lighter grey net card.
      Chrome: light title/subtitle, light-grey azimuth labels and ticks, white North arrow + "N", bottom legend — all readable, no dark-on-dark failures.
      Data: identical pole colours and positions to the light render (green/purple/blue) — only chrome flipped; great circles slightly more prominent (green set dense in lower-right) but poles remain clearly distinguishable.
      Legibility verdict: PASS
