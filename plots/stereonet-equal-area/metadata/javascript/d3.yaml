review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt) projection implemented from first
    principles — vector math (trend/plunge, poles to planes, great/small circles)
    is geologically sound and the area-preserving r = R·√2·sin(φ/2) mapping is exactly
    right.
  - 'Complete spec coverage: subtle equal-area net grid, primitive circle, 10° perimeter
    ticks with 30°/90° emphasis, North arrow + N/E/S/W cardinals, great circles for
    each set''s mean plane, poles as colored points, and Kamb-style density contours.'
  - 'Imprint palette used correctly — first series Bedding is #009E73, Joint set 1
    #C475FD, Joint set 2 #4467A3; data colors are identical across light/dark and
    only chrome flips.'
  - Density contours use graduated neutral fill-opacity so the three preferred-orientation
    clusters read as clear focal points without clutter — strong data storytelling.
  - 'Idiomatic D3: d3.contourDensity + d3.geoPath, d3.line().defined() to break curves
    at the hemisphere boundary, clipPath for the primitive, and data-join (.data().join())
    throughout.'
  - 'Both themes are fully legible — title, legend, cardinals, and contour strokes
    all read cleanly on #FAF8F1 and #1A1A17.'
  weaknesses:
  - Several geometry helper functions (vecTP, cross, norm, poleVec, project, greatCircle,
    smallCircle) push the code beyond strict KISS — justified by the projection math,
    but it is the one place the implementation departs from a flat Imports→Data→Plot
    structure.
  - Small text (18px legend labels, perimeter tick marks) gets tight when the PNG
    is scaled to ~400px mobile width; still readable but near the lower bound.
  - Density contours are computed over all poles combined rather than per feature_type,
    so the Kamb overlay is monochrome neutral rather than tinted per set — acceptable
    and arguably cleaner, but a per-set density option could strengthen the link between
    contours and clusters.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no pure-white rect painted over the mount.
      Chrome: title "stereonet-equal-area · javascript · d3 · anyplot.ai" in dark ink, centered and fully visible at top. N/E/S/W cardinal labels and the North arrow are crisp dark glyphs. Perimeter degree ticks (every 10°, longer at 30°/90°) and the subtle gray equal-area net grid are all clearly visible. Legend panel (top-left, elevated off-white card) lists Bedding, Joint set 1, Joint set 2, Pole density (Kamb). All text readable.
      Data: Bedding poles/great circle in #009E73 green, Joint set 1 in #C475FD purple, Joint set 2 in #4467A3 blue. Pole points (r=6) carry a thin page-bg stroke so they separate from the contours. Three neutral-gray Kamb density blobs sit under the clusters. First series confirmed #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black.
      Chrome: title and cardinals now light-colored and clearly readable; net grid and ticks render as subtle light-gray lines; legend card is the dark elevated surface with light label text. No dark-on-dark failures.
      Data: identical green/purple/blue data colors to the light render — only chrome flipped. Density contour strokes are light-gray and visible against the dark surface.
      Legibility verdict: PASS
