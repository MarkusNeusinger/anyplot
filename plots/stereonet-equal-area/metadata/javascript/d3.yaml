review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt) projection built from first principles
    — poles plotted at 90 degrees to each plane, great circles for the three mean
    planes, and a subtle equal-area net grid (meridians + parallels) exactly as the
    spec requires.
  - 'Canonical Imprint palette: Bedding #009E73 (brand green, first series), Joint
    set 1 #C475FD, Joint set 2 #4467A3 — data colors are pixel-identical between light
    and dark renders, only chrome flips.'
  - 'Full structural-geology feature set present: primitive circle, degree tick marks
    every 10 degrees with a tiered length hierarchy (90/30/10), North arrow + N/E/S/W
    cardinal labels, Kamb-style pole-density contours, and a clean elevated legend
    panel.'
  - 'Idiomatic D3: d3.contourDensity for the density overlay, d3.geoPath for contour
    rendering, d3.line with .defined() to break polylines where curves leave the net,
    and a clipPath to mask the primitive circle.'
  - Deterministic LCG (seed 42) + Box-Muller Gaussian scatter — reproducible, offline,
    self-contained, no network loads.
  weaknesses:
  - Density contours are very faint (inkSoft stroke at opacity 0.4) — in the light
    render they barely register; nudging opacity or stroke-width up slightly would
    make the 'preferred orientation' story read more strongly without crowding.
  - Legend body text is 16px on the 1200px CSS mount; when the square plot is scaled
    down to a ~400px mobile thumbnail the legend labels get small — a marginally larger
    legend font would improve mobile legibility.
  - Perimeter degree ticks are drawn as marks only, with no numeric azimuth labels;
    this is acceptable but adding a few cardinal-degree numbers would aid orientation
    reading.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white, not dark.
      Chrome: title "stereonet-equal-area · javascript · d3 · anyplot.ai" centered in dark ink, fully readable. Legend panel (top-left) on a lighter elevated card with dark labels: Bedding, Joint set 1, Joint set 2, Pole density (Kamb) — all readable. N/E/S/W cardinal labels and North arrow in dark ink, readable. Equal-area net grid is subtle light gray. Perimeter degree ticks visible.
      Data: Bedding poles = brand green #009E73 (central cluster), Joint set 1 = purple #C475FD (upper-right cluster), Joint set 2 = blue #4467A3 (lower-left cluster). Three great circles in matching colors arc across the net. First series confirmed #009E73. Pole markers have a page-bg stroke ring for separation. Density contours present but faint gray.
      Legibility verdict: PASS

