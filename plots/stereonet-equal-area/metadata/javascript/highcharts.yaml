review:
  strengths:
  - Faithful Schmidt equal-area lower-hemisphere projection — equal-area radius r
    = sqrt(2)*sin(rho/2) is correct, poles plotted at 90 degrees to each plane, great
    circles swept in-plane.
  - Genuine Kamb (1959) density contours computed via marching squares over an equal-area
    grid — real statistical density analysis, not a decorative overlay.
  - 'Correct Imprint palette: first series brand green #009E73, then lavender and
    blue, with redundant marker shapes (circle/triangle/diamond) for CVD safety.'
  - 'Both themes render correctly — data colors identical, only chrome flips; warm
    off-white #FAF8F1 and warm near-black #1A1A17 backgrounds.'
  - Square canvas yields a perfectly round net via symmetric plot-box margins; subtle
    graticule, N/E/S/W cardinals, and perimeter tick marks every 10 degrees all present
    per spec.
  - Deterministic fixed-seed LCG + Box-Muller data generation; realistic structural-geology
    values (bedding 24/118, joint set 74/212, fault 60/47).
  weaknesses:
  - The ~23 great-circle arcs create visual clutter — they cross the pole clusters
    and each other, slightly competing with the Kamb density story. Consider drawing
    fewer representative great circles per feature (e.g. 3-4) or lowering their opacity
    below 0.7.
  - 'Duplicate header block at the top of the file: two ''// anyplot.ai'' header stanzas
    are present (a header-rewrite artifact). The second stanza carries the required
    License line; the first is stale (''Quality: 86/100''). Collapse to a single header
    retaining the License line.'
  - Kamb density contours use t.inkSoft, the same color as the primitive circle —
    the contours can read ambiguously as structural chrome rather than data. A slightly
    distinct subtle tone (or thinner weight) would separate density from the net frame.
  - Several geometry helper functions (projLine, projVec, greatCircle, kambContours,
    marching-squares table) deviate from strict KISS, though they are well justified
    by the genuine complexity of the equal-area + density math.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: title "stereonet-equal-area · javascript · highcharts · anyplot.ai" in dark ink, fully readable; gray subtitle "Lower-hemisphere Schmidt net — poles, great circles & Kamb density contours" readable; N/E/S/W cardinal labels in dark ink just outside the primitive; perimeter tick marks every 10 degrees; bottom legend (Bedding / Joint set / Fault / Kamb density) readable. No light-on-light failures.
      Data: brand green #009E73 Bedding poles (circle) clustered at net centre; lavender #C475FD Joint-set poles (triangle) upper-right; blue #4467A3 Fault poles (diamond) lower-left. Matching-color great-circle arcs sweep the net. Gray nested Kamb contours wrap each cluster. First series is #009E73 — confirmed.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: title in light ink (~#F0EFE8) readable; subtitle, cardinals, tick marks, and legend all light-on-dark and readable. No dark-on-dark failures.
      Data: identical hues to light render — green/lavender/blue poles in the same clusters, same great circles, same gray Kamb contours. Only chrome flipped. Brand green #009E73 clearly visible on the dark surface.
      Legibility verdict: PASS.
