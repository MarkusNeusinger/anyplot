review:
  strengths:
  - Genuine equal-area (Schmidt, lower-hemisphere) projection implemented from first
    principles — poles and great circles are mathematically correct and stay within
    the primitive circle.
  - 'First series Bedding renders in brand green #009E73; Joint set #C475FD and Fault
    #4467A3 follow Imprint canonical order, identical across light and dark renders.'
  - 'Redundant encoding: each feature_type uses a distinct marker shape (circle /
    triangle / diamond) in addition to color — CVD-safe.'
  - Subtle gray net graticule and primitive circle sit beneath the data with 10-degree
    perimeter tick marks and N/E/S/W cardinal labels, exactly as the spec requests.
  - 'Clean theme-adaptive chrome: warm off-white #FAF8F1 / warm near-black #1A1A17
    backgrounds, transparent chart, credits disabled, animation disabled.'
  - 'Idiomatic Highcharts: linkedTo ties each great-circle line series to its pole
    scatter series, zIndex layering, dataLabels for cardinal annotations.'
  weaknesses:
  - Kamb density contours over the pole data are missing — the spec Notes explicitly
    require them to highlight preferred orientations. Pole clustering conveys this
    visually, but the named feature is absent (drives SC-02 to 2/4). If core Highcharts
    cannot draw contours (no heatmap/contour module loaded), approximate with concentric
    tinted bands or a polygon hull around the densest pole cluster, or note the constraint.
  - The bedding pole cluster is very dense and markers overlap heavily; the pageBg
    edge stroke helps but individual poles are hard to separate in the cluster centre.
    Slightly smaller radius or lower marker opacity in dense regions would read cleaner.
  - Net graticule lines are quite faint on the dark render — verify the t.grid token
    still reads as a visible-but-subtle line at mobile scale.
  - Great circles use opacity 0.55 with lineWidth 1.6 — on the dark surface the bedding/fault
    arcs are faint; a touch more lineWidth or opacity would strengthen the planar-feature
    story.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "stereonet-equal-area · javascript · highcharts · anyplot.ai" in dark ink, bold, fully visible at top. Subtitle "Lower-hemisphere Schmidt net — poles (points) and great circles (planes)" in soft ink. N/E/S/W cardinal labels dark and crisp just outside the primitive circle. 10-degree perimeter tick marks visible. Bottom legend: Bedding (green circle), Joint set (purple triangle), Fault (blue diamond) — all readable. No clipping at any edge.
      Data: Bedding poles render in brand green #009E73 (clustered centre-left), Joint set poles in lavender #C475FD (clustered NE), Fault poles in blue #4467A3 (clustered SW); distinct marker shapes. Great circles in matching colors arc across the net. Subtle gray net graticule + primitive circle beneath the data.
      Legibility verdict: PASS — all text clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and subtitle in light ink, fully visible. N/E/S/W labels light and readable. Legend at bottom readable. No dark-on-dark text. No clipping.
      Data: colors identical to light render — Bedding #009E73 green, Joint set #C475FD lavender, Fault #4467A3 blue; same marker shapes and positions. Only chrome flipped. Net graticule is faint but present.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures. Net grid lines are subtle (borderline faint) but data is clearly distinguishable.
