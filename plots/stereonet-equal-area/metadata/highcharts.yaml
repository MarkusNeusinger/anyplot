  strengths:
  - Complete stereonet implementation with all spec features (great circles, poles,
    density contours, grid, tick marks, cardinal labels)
  - Realistic geological data with three distinct structural domains showing clear
    clustering patterns
  - Good visual hierarchy with subtle dotted grid, visible poles with white borders,
    and green density contours
  - Interactive HTML export alongside static PNG is a nice Highcharts-specific addition
  weaknesses:
  - Does not use highcharts_core Python API; builds raw JSON config instead of using
    the library Python classes
  - Legend with 7 items in a single horizontal row is cramped and hard to read
  - Python 2-style except syntax (except AttributeError, TypeError:) on lines 239
    and 260 is a code bug
  - Color palette is decent but could be more colorblind-optimized
  image_description: 'The plot shows a lower-hemisphere equal-area (Schmidt net) stereonet
    projection on a white background. A bold dark circle forms the primitive circle
    with tick marks every 10 degrees around the perimeter. Cardinal directions (N,
    E, S, W) and degree labels (30, 60, 120, 150, 210, 240, 300, 330) are placed outside
    the circle. Inside, subtle dotted concentric circles and radial lines form the
    stereonet grid. Three types of structural data are plotted: blue great circle
    arcs and poles (Bedding), orange great circle arcs and poles (Joints), and red/pink
    great circle arcs and poles (Faults). Bedding poles cluster in the SE quadrant,
    Joints poles cluster in the NE quadrant, and Fault poles are scattered on the
    E side. Green density contours overlay the pole data highlighting preferred orientations.
    A horizontal legend at the bottom lists all 7 series. Title reads "stereonet-equal-area
    · highcharts · pyplots.ai" with subtitle "Lower Hemisphere Equal-Area (Schmidt)
    Projection".'
