review:
  strengths:
  - Correct Schmidt equal-area lower-hemisphere projection with mathematically sound
    pole and great-circle computation (sqrt(2)*sin(theta/2) radial mapping, 3-D plane
    geometry rotated through rake).
  - 'All spec features present: great circles per plane, poles to planes, Kamb (1959)
    counting-circle density contours via contourpy, primitive circle, 10-degree perimeter
    ticks (longer at 30-degree marks), N/E/S/W cardinal labels, equal-area net grid,
    and feature_type color legend.'
  - 'Imprint palette used correctly: Bedding=#009E73 (brand first), Fault=#C475FD,
    Joint=#4467A3 in canonical order; density contours use imprint_seq (green->blue);
    backgrounds #FAF8F1 / #1A1A17 with full theme-adaptive chrome.'
  - Data colors are identical between light and dark renders; only chrome (background,
    primitive circle, ticks, text, legend frame) flips, exactly as required.
  - 'Distinctive Altair usage: layered composition of 10 marks, interactive legend
    selection (selection_point bound to legend) with opacity highlighting, and per-pole
    tooltips (strike/dip) in the HTML output.'
  - Title is exactly 'stereonet-equal-area · python · altair · anyplot.ai' with a
    descriptive subtitle; title fontsize scaled by the length formula. Clean KISS
    code with seed=42 and only used imports.
  - Square 2400x2400 canvas with pad-only (never crop) finalization; canvas gate passed.
  weaknesses:
  - Density-contour colors (imprint_seq green->blue) are visually similar to the Bedding
    (green) and Joint (blue) pole markers, creating mild ambiguity about whether a
    green/blue ring is a contour or a feature. Consider a single neutral contour hue
    or an explicit contour-level cue so contours read as a distinct layer from the
    categorical features.
  - Drawing great circles for all 65 measurements produces some 'spaghetti' of faint
    crossing lines in the upper quadrants; opacity=0.32 mitigates it but the upper-left
    is busy. Acceptable given the spec requires great circles, but a slightly lower
    opacity or thinner stroke for non-focal planes would reduce clutter.
  - The mean-orientation labels (mu 312°/69°, mu 43°/33°, mu 90°/80°) at fontSize=11
    sit close to dense pole clusters and contour lines; they remain readable but have
    little breathing room. Slightly larger leader offset would improve separation.
  - No legend/colorbar explains the density-contour color levels, so a reader cannot
    quantify the sigma levels the green->blue gradient encodes (minor; a static caption
    or single contour color would suffice).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page and view fill, not pure white. Correct.
      Chrome: Title "stereonet-equal-area · python · altair · anyplot.ai" in dark ink, bold, fully readable; subtitle "Lower-Hemisphere Equal-Area (Schmidt) Projection" in soft gray. N/E/S/W cardinal labels dark and clear. Primitive circle dark, 10-deg perimeter ticks (longer every 30 deg) visible. Legend box (Feature Type: Bedding/Fault/Joint) top-right on elevated #FFFDF6 fill with readable dark/soft text. All text readable against the light background.
      Data: Bedding poles = brand green #009E73 (center-right cluster), Fault = lavender #C475FD (upper-right cluster), Joint = blue #4467A3 (lower cluster near S). Filled circle markers (size 130) with page-bg stroke. Faint great-circle arcs per feature color. Kamb density contours as nested rings (green->blue imprint_seq) around the bedding and fault clusters. Cross markers + mu labels mark mean orientations. First series confirmed #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), not pure black. Correct.
      Chrome: Title and subtitle in light ink (#F0EFE8 / #B8B7B0), fully readable. Primitive circle, ticks, and N/E/S/W labels rendered light against the dark surface. Legend on elevated #242420 fill with light text. No dark-on-dark issues — all chrome flipped correctly.
      Data: Pole colors identical to light render (Bedding green #009E73, Fault lavender #C475FD, Joint blue #4467A3); great circles, density contours (green->blue), cross markers and mu labels all match the light render. Only chrome flipped. Brand green clearly visible on the dark surface.
      Legibility verdict: PASS
