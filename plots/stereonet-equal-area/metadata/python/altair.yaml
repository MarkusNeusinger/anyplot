review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt) projection — poles plotted at sqrt(2)*sin((90-plunge)/2)
    and great circles traced from plane normals, geometrically sound
  - 'Complete stereonet furniture: heavy primitive circle, 10-degree perimeter ticks
    (longer at 30-degree marks), N/E/S/W cardinal labels, and subtle 30/60-degree
    net grid circles with N-S/E-W cross lines'
  - 'Imprint palette used correctly: first series Bedding = #009E73, Fault = #C475FD,
    Joint = #4467A3 in canonical order; density contours use the imprint_seq green-to-blue
    gradient; both renders are theme-correct (#FAF8F1 / #1A1A17 backgrounds)'
  - Continuous density field rendered as smooth connected contour polylines via contourpy
    (proper iso-path engine) rather than disconnected per-cell segments
  - 'Genuine altair interactivity (no faked UI): legend-bound selection_point dims
    non-selected feature types, plus pole tooltips showing strike/dip — appropriate
    distinctive use of the interactive library'
  - Per-feature mean-orientation cross markers with radially-offset labels (μ strike/dip)
    add useful data storytelling
  - Theme-adaptive chrome threaded through every non-data element; both light and
    dark renders are fully legible
  - Reproducible (np.random.seed(42)), KISS top-level structure with no functions/classes,
    clean imports
  weaknesses:
  - Spec asks specifically for Kamb density contours; the implementation uses a fixed-bandwidth
    Gaussian KDE approximation instead of the Kamb counting-circle statistic. The
    visual effect (contours highlighting preferred orientations) is achieved, but
    it is not the named method.
  - Density contours render quite faintly (strokeWidth 1.4, opacity 0.6, imprint_seq)
    and are easy to miss against the great-circle arcs — consider increasing their
    visual weight so the preferred-orientation story reads more clearly.
  - With ~65 great circles drawn at opacity 0.5 in the static (no-selection) state,
    the net is visually busy/spaghetti-like; the poles still read clearly on top,
    but the great-circle layer slightly muddies the focal clusters. Consider lowering
    the default great-circle opacity or thinning them.
  - Mean-orientation labels (e.g. 'μ 312°/69°') sit very close to / lightly overlap
    their cross markers and adjacent poles — minor text-on-data crowding, still readable
    but not perfectly clean.
  - dip_direction is listed in the spec data fields (as an alternative to strike)
    but is not represented; acceptable since it is explicitly an alternative encoding,
    noted for completeness.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface — not pure white.
      Chrome: bold dark title "stereonet-equal-area · python · altair · anyplot.ai" with grey subtitle
        "Lower-Hemisphere Equal-Area (Schmidt) Projection". Heavy dark primitive circle, dark
        perimeter tick marks every 10°, bold N/E/S/W cardinal labels. Top-right legend "Feature Type"
        on an elevated cream frame with Bedding/Fault/Joint swatches. All text clearly readable.
      Data: green (#009E73) Bedding cluster centre-right, purple (#C475FD) Fault cluster upper area,
        blue (#4467A3) Joint cluster near S. Poles are filled points with page-bg edge stroke; great
        circles drawn as colored arcs; faint green→blue imprint_seq density contour rings around
        clusters; per-feature mean cross markers with "μ s°/d°" labels. First series = #009E73 confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface — not pure black.
      Chrome: light (#F0EFE8) title and softer subtitle, white primitive circle and ticks, light
        cardinal labels, legend on dark elevated (#242420) frame with light labels. No dark-on-dark
        issues — every text element is clearly visible against the near-black background.
      Data: identical data colors to the light render (green/purple/blue Imprint positions 1–3,
        imprint_seq contours) — only chrome flipped. Poles, great circles, mean markers all present.
      Legibility verdict: PASS
