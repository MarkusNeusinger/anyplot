      Background: warm off-white (#FAF8F1) — not pure white, correct.
      Chrome: dark title "stereonet-equal-area · python · matplotlib · anyplot.ai" across the top, readable. Perimeter degree ticks every 10 deg with labels at 30 deg (30°, 60°, 120°, 150°, 240°, 300°, 330°) in soft ink; bold dark cardinal labels N (top), E (right), S (bottom), W (left). Subtle gray equal-area net grid. Black primitive circle. Legend bottom-left (Bedding poles / Joint poles / Fault poles) on elevated cream fill, readable.
      Data: green filled circles (Bedding, #009E73) clustered bottom-center; lavender squares (Joint, #C475FD) clustered top-right; blue triangles (Fault, #4467A3) clustered left. Green imprint_seq density tints behind each cluster. Great-circle arcs in matching colors. First series is brand green — confirmed.
      Note: several green/lavender great-circle arcs extend beyond the primitive circle in the lower-right (SE) area (upper-hemisphere portion not clipped).
      Legibility verdict: PASS (all text readable on light background).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black, correct.
