review:
  strengths:
  - Correct equal-area (Schmidt) lower-hemisphere math — poles via r = sqrt(2)*sin(dip/2)
    and equal-area density grid via colatitude back-transform; this is the right projection
    for area-preserving density analysis
  - 'Strong redundant encoding: each feature type gets a distinct Imprint color AND
    a distinct marker shape (Bedding=green circle, Joint=lavender square, Fault=blue
    triangle), making the plot CVD-safe beyond color alone'
  - Clear visual hierarchy and storytelling — Bedding (primary) uses larger markers
    and bolder great circles, and imprint_seq density contours highlight the three
    preferred-orientation clusters
  - 'Palette is fully compliant: first series is brand green #009E73, canonical Imprint
    order, density uses the allowed imprint_seq colormap, and both backgrounds are
    theme-correct (#FAF8F1 / #1A1A17)'
  - 'Polished chrome: degree ticks every 10 deg with bold cardinal N/E/S/W labels,
    path-effect strokes for marker/label definition, subtle grid (alpha 0.15), and
    a primitive circle drawn cleanly'
  - Both light and dark renders are fully legible with identical data colors and only
    chrome flipping; canvas is exactly 2400x2400 (square, correct for a symmetric
    stereonet)
  - 'Clean KISS code: flat script, seeded RNG (np.random.seed(42)), only used imports,
    vectorised great-circle math with no helper functions, correct save without bbox_inches=''tight'''
  weaknesses:
  - Great circles spill OUTSIDE the primitive circle in the lower-right (SE) quadrant
    of both renders. The great-circle sweep uses t_param from 0 to pi (the full circle)
    and r_gc = sqrt(2)*sin((pi/2 - plunge)/2); where plunge < 0 (the upper-hemisphere
    arc) r_gc exceeds 1, so those segments render beyond the unit disk. For a lower-hemisphere
    Schmidt net the great circles must stay within the primitive circle — mask/clip
    points where r_gc > 1 (or plunge < 0) before plotting so each plane's arc is confined
    to the lower hemisphere.
  - The bold mean-plane great circles per feature are visually heavy and a few overlap
    near the SE perimeter, slightly competing with the spilled arcs; once clipped,
    consider thinning or reducing the representative-plane count so the great-circle
    layer reads cleaner against the pole clusters.
