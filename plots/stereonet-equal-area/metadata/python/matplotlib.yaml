      Data: identical data colors to the light render (green circles, lavender squares, blue triangles, green density tint) — only chrome flipped. No dark-on-dark text.
      Note: same great-circle spill outside the primitive circle in the SE quadrant as the light render.
      Legibility verdict: PASS (no dark-on-dark failures; all text clearly visible on dark background).
