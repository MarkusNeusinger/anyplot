review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt) projection with North at top, primitive
    circle emphasised, and degree ticks every 10° with N/E/S/W cardinals — all spec
    requirements met
  - 'Strong visual hierarchy: Bedding is the brand green (#009E73) primary series
    with larger markers and bolder great circles; Joint (#C475FD) and Fault (#4467A3)
    follow Imprint canonical order with distinct marker shapes (o/s/^) as redundant
    CVD-safe encoding'
  - Kamb-style spherical Gaussian density contours rendered with the Imprint sequential
    colormap (imprint_seq, green→blue) — correct continuous-data cmap, subtle alpha
    so the net stays clean
  - Theme-adaptive chrome threaded through every element; data colors identical between
    light and dark renders, only background/text/grid flip as required
  - 'Clean KISS script: seeded RNG, vectorised projection math, no functions/classes,
    all imports used, saves plot-{THEME}.png'
  weaknesses:
  - Great circles for Joint and Fault are rendered at alpha=0.28 and are nearly imperceptible
    in both renders — the spec asks for great circles to be 'drawn for planes', so
    consider lifting secondary great-circle alpha slightly (e.g. 0.35-0.40) so the
    planar features are at least faintly traceable without breaking the Bedding-primary
    hierarchy
  - Pole clusters are quite congested (≈25-30 overlapping markers per cluster); the
    white path-effect strokes give definition but individual measurements are hard
    to count — acceptable for clustered structural data but borderline
  - Density contours are computed over the pooled poles of all three feature types
    rather than per-feature-type; this still highlights every cluster correctly but
    slightly conflates the populations
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white — PASS.
      Chrome: title "stereonet-equal-area · python · matplotlib · anyplot.ai" centered at top in dark ink, fully readable. Bold N/E/S/W cardinals and grey 30°/60°/.../330° degree labels around the perimeter, all clear. Legend lower-left on an elevated cream frame ("Bedding poles", "Joint poles", "Fault poles") readable. All text PASS.
      Data: three pole clusters — green circles (Bedding, #009E73) lower-centre, lavender squares (Joint, #C475FD) upper-right, blue triangles (Fault, #4467A3) left. Translucent green→blue density contour blobs sit under each cluster. Bold green great-circle arcs sweep through the SE; faint purple/blue great circles barely visible. First series is brand green. Primitive circle is a crisp dark ring.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black — PASS.
      Chrome: title in light ink (#F0EFE8) readable at top; cardinals light/bold, degree labels in soft grey legible; legend on dark elevated (#242420) frame with light text — no dark-on-dark failures. All text PASS.
      Data: identical pole colors to the light render (green/lavender/blue), identical marker shapes and cluster positions; density contours render darker green over the near-black surface, bold green great circles prominent in SE. Only chrome flipped. Primitive circle is a light ring.
      Legibility verdict: PASS
