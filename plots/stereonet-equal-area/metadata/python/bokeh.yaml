review:
  strengths:
  - 'Correct lower-hemisphere equal-area (Schmidt) projection: poles plotted at 90°
    to each plane, great circles drawn for planar features, primitive circle with
    North at top and 10° perimeter tick marks — all core spec requirements met.'
  - 'Imprint palette applied correctly: Bedding=#009E73 (first series), Joints=#C475FD,
    Faults=#4467A3 in canonical order; KDE density overlay built from imprint_seq
    (green→blue) with a matching inset colorbar.'
  - Theme adaptation is clean — data colors are identical between light and dark renders,
    only chrome (background, ink, legend/colorbar frames) flips; no dark-on-dark or
    light-on-light failures.
  - 'Strong bokeh-distinctive feature usage: image_rgba raster density overlay, HoverTool
    on poles, and interactive click-to-hide Legend — genuine library mastery, not
    generic glyph plotting.'
  - 'Polished layout: 2400×2400 square canvas correct for a circular plot, colorbar
    inset into the empty bottom-left corner, balanced legend top-right, descriptive
    subtitle, and self-import guard for the bokeh.py shadowing problem.'
  weaknesses:
  - Great circles are rendered very faint (line_alpha=0.22, line_width=1.6) and form
    a slightly noisy web of arcs across the upper-right of the net — the planar features
    (a spec-required element) are barely distinguishable and read as background texture
    rather than meaningful structure. Consider raising alpha slightly or per-feature-type
    emphasis so planes are legible without overwhelming the poles.
  - Spec asks for Kamb density contours; the implementation uses a filled KDE heatmap
    instead. The density information is conveyed well, but discrete contour lines
    (the geological convention) are absent — a minor deviation from the literal spec.
  - Subtitle and 30°-interval degree labels become quite small when scaled to the
    ~400px mobile preview; still readable but at the lower bound.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "stereonet-equal-area · bokeh · anyplot.ai" in dark ink, centered and readable. Bold N/E/S/W cardinal labels and 30°/60°/120°/150°/210°/240°/300°/330° degree labels readable in soft ink. Subtitle (italic, muted) readable at bottom. Legend top-right (Bedding/Joints/Faults) and "Pole density" colorbar bottom-left both readable.
      Data: Bedding poles green (#009E73) clustered top, Joints poles lavender (#C475FD) lower-right, Faults poles blue (#4467A3) lower-left. KDE density blobs use imprint_seq green→blue. First series is #009E73. Faint great-circle arcs sweep across the net.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and cardinal/degree labels in light ink, clearly visible. Legend and colorbar frames flip to elevated dark surface with light text. No dark-on-dark failures.
      Data: pole colors and density gradient identical to the light render — only chrome flipped. Density blobs and poles clearly distinguishable against the dark surface.
      Legibility verdict: PASS
