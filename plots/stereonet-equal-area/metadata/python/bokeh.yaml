review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt) projection with primitive circle,
    10° perimeter tick marks, degree labels every 30°, and cardinal N/E/S/W labels
    — every spec feature is present.
  - Great circles for planes plus poles-to-planes points, color-coded by feature_type
    (Bedding/Joints/Faults) with an interactive click-to-hide legend.
  - Kamb-style KDE pole-density overlay rendered as a distinctive Bokeh image_rgba
    raster, ramped with imprint_seq (brand green → blue) and paired with an inset
    Pole density colorbar.
  - 'Imprint palette used in canonical order (first series = #009E73); data colors
    are identical between light and dark renders, only chrome flips — fully theme-correct
    (#FAF8F1 / #1A1A17).'
  - 'Strong Bokeh distinctive features: HoverTool on poles, interactive legend, image_rgba
    overlay, custom ColorBar. Exact 2400×2400 square canvas for the circular plot.'
  - 'Clean KISS script: seeded RNG (42), flat top-level code, no unused imports, theme-adaptive
    tokens threaded through every element.'
  weaknesses:
  - Great-circle multi_line traces are visually noisy — at line_alpha=0.38 they spray
    densely across the whole net (especially toward the E side), competing with the
    pole clusters for attention and slightly muddying the focal point. Consider lowering
    alpha further (~0.20-0.25) or thinning to a representative subset of planes to
    let the density clusters read as the primary story.
  - The italic subtitle and the colorbar's numeric tick labels are small relative
    to the 2400px canvas; when scaled to ~400px (mobile catalog thumbnail) they become
    hard to read. Bumping subtitle/colorbar label sizes a few pt would improve mobile
    legibility.
  - 'DE could improve: a clearer visual hierarchy emphasizing the three pole clusters
    over the dense great-circle web would raise the storytelling impact.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white, not dark.
      Chrome: title "stereonet-equal-area · bokeh · anyplot.ai" in dark ink, bold and centered, fully readable. Degree labels (30°/60°/120°/150°/210°/240°/300°/330°) and cardinal N/E/S/W labels in soft dark gray around the perimeter, all legible. Italic subtitle "Lower-hemisphere equal-area (Schmidt) projection · Click legend to toggle" in muted gray at the bottom — readable but small. Inset "Pole density" colorbar bottom-left with 0–1 ticks.
      Data: poles as filled points — Bedding green (#009E73) cluster top-center, Faults blue (#4467A3) cluster lower-left, Joints lavender (#C475FD) cluster lower-center. First categorical series is #009E73. Great-circle multi_lines in matching colors spray across the net (somewhat busy on the E side). Green→blue imprint_seq density blobs highlight the clusters. Primitive circle is a solid dark ring with tick marks every 10°.
      Legibility verdict: PASS — all text readable against the light background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black, not light.
      Chrome: title in light ink, fully readable. Degree and cardinal labels in light gray (INK_SOFT #B8B7B0), clearly visible against the dark surface — no dark-on-dark failure. Subtitle in muted light gray, readable. Primitive circle and tick marks render in light ink. Inset colorbar legible with elevated-surface background.
      Data: pole colors identical to the light render (green Bedding, blue Faults, lavender Joints); only the chrome flipped. Green→blue density overlay and great circles unchanged. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS — all text readable against the dark background, no dark-on-dark issues.
