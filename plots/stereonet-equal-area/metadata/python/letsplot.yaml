review:
  strengths:
  - Genuinely sophisticated custom Schmidt equal-area (Lambert) projection built from
    scratch — lower-hemisphere poles, great circles for every plane, primitive circle,
    10° perimeter ticks, and N/E/S/W cardinal labels all present and geometrically
    correct.
  - 'Imprint palette used perfectly in canonical order: Bedding=#009E73 (brand green,
    first series), Joint=#C475FD, Fault=#4467A3, Foliation=#BD8233. Data colors are
    identical across light and dark renders; only chrome flips.'
  - 'Theme-adaptive chrome is fully threaded: backgrounds #FAF8F1/#1A1A17, ink/ink-soft
    tokens applied to primitive circle, ticks, cardinal labels, mean-pole diamonds,
    and annotations — all readable in both themes with no dark-on-dark failures.'
  - 'Strong data storytelling: KDE density contours, per-cluster confidence ellipses,
    and black diamond mean-pole markers with italic strike/dip annotations create
    clear focal points for each of the four feature clusters.'
  - Excellent spec/data quality — four distinct structural-geology feature types with
    realistic, well-separated strike/dip distributions; reproducible (seed=42); clean
    linear KISS script with no unused imports.
  weaknesses:
  - 'TITLE BRAND ERROR (SC-04): title reads ''stereonet-equal-area · letsplot · pyplots.ai''
    — wrong domain (must be ''anyplot.ai'', not ''pyplots.ai'') AND missing the ''{language}''
    segment. Correct it to ''stereonet-equal-area · python · letsplot · anyplot.ai''
    (line 286). The module docstring on line 1 also says ''pyplots.ai'' — fix to ''anyplot.ai''
    for consistency.'
  - 'Great-circle spaghetti: with all 70 planes drawn as great circles at alpha=0.28,
    the net is visually busy and the faint paths crisscross the mean-pole annotation
    labels, slightly reducing refinement and readability. Consider lowering alpha
    further (~0.18), thinning size, or drawing great circles only for cluster means
    to reduce clutter while keeping the planar-feature representation.'
  - Italic mean-pole annotation labels (size=7 mm) are small and sit directly inside
    the dense pole clusters; legible but crowded against the points and faint great
    circles — minor overlap.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), correct. Title bar fully visible at top, not clipped.
      Chrome: Bold dark title "stereonet-equal-area · letsplot · pyplots.ai" (NOTE: wrong domain — should read "python · letsplot · anyplot.ai"). Black primitive circle with 10° perimeter tick marks, dark N/E/S/W cardinal labels, dashed gray N-S/E-W reference cross. Black diamond mean-pole markers with italic strike/dip labels (Foliation 268/28, Joint 356/78, Bedding 43/33, Fault 151/55). Legend "Feature Type" boxed bottom-right on elevated cream fill. All text readable against the light background.
      Data: Lower-hemisphere poles color-coded — Bedding=#009E73 green (first series ✓), Joint=#C475FD lavender, Fault=#4467A3 blue, Foliation=#BD8233 ochre. Faint same-colored great circles cross the net; subtle gray KDE density contours and 1-sigma confidence ellipses surround each cluster.
      Legibility verdict: PASS (great-circle clutter is busy but text remains readable).

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), correct.
      Chrome: Light (#F0EFE8) title, primitive circle, ticks, cardinal labels, and white diamond mean markers — all clearly visible. Legend frame on dark elevated (#242420) fill with light text. No dark-on-dark failures. Brand green #009E73 reads well on the dark surface.
      Data: Pole colors identical to the light render (green/lavender/blue/ochre) — only chrome flipped. Density contours rendered in light gray, subtle and visible.
      Legibility verdict: PASS.
