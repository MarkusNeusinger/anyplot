review:
  strengths:
  - Correct lower-hemisphere equal-area (Schmidt/Lambert) projection with proper pole-to-plane
    geometry, great circles, primitive circle, and 10° perimeter ticks (longer every
    30°)
  - 'Imprint palette used in canonical order (green/lavender/blue/ochre), first series
    #009E73; data colors identical across light and dark, only chrome flips'
  - 'Rich, geologically plausible data: four feature clusters (Bedding/Joint/Fault/Foliation)
    with realistic strike/dip distributions and circular-mean strike handling'
  - 'Strong storytelling layers: KDE density contours, per-cluster confidence ellipses,
    diamond mean-pole markers with italic strike/dip annotations placed via smart
    outward nudging'
  - Clean theme-adaptive chrome via Imprint design tokens; both renders fully legible
    with no dark-on-dark or light-on-light failures
  - KISS script-style code, seeded RNG (42), clean imports, saves plot-{THEME}.png
    + .html, interactive tooltips on poles
  weaknesses:
  - Great circles are rendered at alpha=0.18, size=0.35 — so faint they are nearly
    imperceptible in both renders. The spec lists great circles as a primary feature
    for planar data; raise alpha to ~0.30-0.40 (or size ~0.5) so they read without
    overwhelming the poles.
  - Legend box (lower-right, [0.86,0.16]) slightly overlaps the SE perimeter tick
    marks of the primitive circle in both renders — nudge the legend further out or
    shrink it so it clears the circle boundary.
  - Density contours are gaussian KDE (geom_density2d) rather than true Kamb contours
    the spec names; acceptable proxy but not the exact statistical method requested.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: title "stereonet-equal-area · python · letsplot · anyplot.ai" in dark bold, centered and readable; black primitive circle with 10° ticks; bold dark cardinal labels N/E/S/W; italic dark mean-orientation annotations (e.g. "Bedding 43/33", "Joint 356/78"); legend "Feature Type" lower-right with light frame. All text clearly readable. Legibility verdict: PASS.
      Data: four pole clusters — Bedding green (#009E73), Joint lavender (#C475FD), Fault blue (#4467A3), Foliation ochre (#BD8233); black diamond mean markers; subtle gray density contours and confidence ellipses; very faint colored great-circle arcs. First series confirmed #009E73.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title and cardinal labels in light ink, readable; primitive circle and ticks render light; mean-pole diamonds flip to near-white; italic annotations light and readable; legend frame light on elevated dark surface. No dark-on-dark failures. Legibility verdict: PASS.
      Data: identical hues to light render (green/lavender/blue/ochre) — only chrome flipped. Great-circle arcs equally faint here.
