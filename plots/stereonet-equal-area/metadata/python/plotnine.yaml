review:
  strengths:
  - 'Correct Schmidt equal-area lower-hemisphere projection with full net: primitive
    circle, 30-degree small-circle and radial grid, perimeter degree ticks every 10
    degrees, and N/E/S/W cardinal labels with North at top.'
  - 'All required structural-geology elements present: poles to planes as points,
    great circles for representative planes, and KDE density contours highlighting
    clustered orientations.'
  - Canonical Imprint palette with Bedding=#009E73 (brand green) first, Fault=#C475FD,
    Joint=#4467A3, reinforced with distinct shapes (circle/diamond/square) so the
    encoding is CVD-safe.
  - 'Theme-adaptive chrome threaded correctly through all elements: backgrounds #FAF8F1/#1A1A17,
    white-on-dark and dark-on-light text, subtle grid, and a properly dark legend
    box in dark mode (no dark-on-dark).'
  - 'Idiomatic layered grammar of graphics: after_stat(''level'') drives contour alpha,
    scale_shape_manual + scale_color_manual, coord_fixed(ratio=1) keeps the net circular,
    and mean strike/dip annotations add geological context.'
  - Clean reproducible KISS script (seed=42, no functions/classes, no unused imports),
    exact 2400x2400 square canvas, correct plot-{THEME}.png output, and exact mandated
    title format.
  weaknesses:
  - Spec asks specifically for Kamb density contours; the implementation uses geom_density_2d
    (Gaussian KDE) which approximates concentration but is not the Kamb method with
    its expected-count significance contours.
  - Per-cluster mean strike/dip annotations (e.g. '279/75') are placed at cluster
    center minus a small y-offset and visually overlap the dense pole markers, slightly
    reducing legibility of both the text and the underlying points.
  - Perimeter degree labels (30/60/...) at geom_text size 3.6 are quite small; readable
    at full 2400px but near the lower bound when scaled to ~400px mobile width.
  - Great circles and density contours cross the whole net and partly overlap each
    other and the radial grid, which is geologically expected but adds some visual
    busyness in the net interior.
