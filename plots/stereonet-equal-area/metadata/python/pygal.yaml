review:
  strengths:
  - Builds a complete Schmidt equal-area (lower-hemisphere) stereonet in pygal — a
    library with no native polar/contour primitives — using pygal.XY with correct
    equal-area projection math (r = sqrt(2)·sin((90-plunge)/2)) for great circles
    and poles.
  - Pole-density contours implemented from scratch via a Gaussian density field +
    marching-squares iso-line extraction, then strung together with pygal's allow_interruptions
    — a genuinely distinctive use of the library.
  - 'Clear visual hierarchy: bedding primary (thickest stroke / largest poles), faults
    secondary, joints tertiary, with the Imprint palette (brand green #009E73 first)
    carried correctly through both light and dark themes.'
  - 'All spec features present: great circles for planes, poles at 90 deg to planes,
    density contours, primitive circle, 10-degree perimeter ticks, N/E/S/W cardinal
    labels, subtle dotted net grid, and a clean 4-key legend.'
  - 'Square 2400x2400 canvas (gate passed), correct theme backgrounds (#FAF8F1 / #1A1A17),
    correct title format, deterministic data (np.random.seed(42)), and clean imports.'
  weaknesses:
  - 'Great-circle density is high: 60 planes drawn as overlapping arcs create a busy
    web (especially the green bedding band sweeping the lower-right) that partially
    competes with the pole clusters, which are the analytical focal point. Consider
    thinning the great-circle stroke widths further or lowering their opacity so poles
    + density contours read as the clear focus.'
  - The N/E/S/W cardinal letters are drawn as thin polyline strokes (width 2.6) and
    appear faint relative to the title — legible at full size but nearly lost at 400px
    mobile scale. A slightly heavier stroke or larger letter size (s>0.05) would firm
    them up.
  - At 400px the dense arc overlay degrades into a faint haze; the focal clusters
    survive but the great circles add little legibility at thumbnail scale.
  - Pole markers and great-circle arcs of the same feature overlap in places, so individual
    poles within a cluster are slightly harder to count against the arc lines passing
    through them.
