      Data: First series Bedding = brand green #009E73 (great circles + central pole cluster), Faults = lavender #C475FD (lower-left cluster), Joints = blue #4467A3 (right cluster), Pole density contours = matte red #AE3030 ellipses around the clusters. Net grid subtle dotted. Pole markers prominent.
      Legibility verdict: PASS (cardinal letters faint but readable; title/legend clear).

