review:
  strengths:
  - 'Correct lower-hemisphere equal-area (Schmidt net) projection: primitive circle,
    North at top, equal-area pole conversion (r = sqrt(2)*sin((90-plunge)/2)) all
    mathematically sound.'
  - 'All four required structural-geology elements present: poles as shape-coded points,
    representative great circles per feature type, density contours, and a subtle
    dashed equal-area net grid (small circles + N-S/E-W great circles).'
  - 'First categorical series (Bedding) is exactly #009E73; full set uses Imprint
    canonical order 1->4 with redundant marker-shape encoding (circle/square/diamond/triangle)
    for CVD safety.'
  - 'Theme adaptation is flawless: warm off-white #FAF8F1 vs warm near-black #1A1A17,
    elevated inner surface (#FFFDF6 / #242420) lifts the net, and every chrome element
    (title, cardinals, degree labels, legend, annotation) reads cleanly in both renders
    with no dark-on-dark.'
  - 'Refined design touches: outer glow rings for depth, graduated tick lengths (longer
    at cardinals/30deg), marker size scaled by dip angle, clipped contours to the
    primitive circle.'
  - 'Idiomatic seaborn usage: sns.set_theme, kdeplot with hue for per-feature density,
    scatterplot with style+size encoding, sns.desaturate for contour fills, sns.despine.'
  - 'Clean KISS code: deterministic seed, no functions/classes, only used imports,
    exact 2400x2400 square canvas with no bbox_inches=''tight''.'
  weaknesses:
  - Density contours are computed via seaborn kdeplot (Gaussian KDE) rather than true
    Kamb contours named in the spec. The KDE approximation correctly highlights preferred
    orientations so it satisfies the density-analysis intent, but it is not the literal
    Kamb method - acceptable for a static seaborn plot.
  - Degree labels around the perimeter are at fontsize=9 (~50 source-px), the smallest
    text in the plot; still legible at full size but close to the floor for mobile
    (~400 px) scaling - could be bumped to ~10-11pt.
  - Twelve colored great circles (3 per feature type) sweep across the net and add
    some visual busyness where they cross the pole clusters; alpha=0.6 keeps it readable
    but reducing to 2 per type would calm the composition.
  - Much of the plot is hand-rolled matplotlib (great circles, ticks, grid) by necessity
    for a stereonet, so seaborn's high-level API carries only the poles and density
    layers - inherent to the chart type, not a defect.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) page with a slightly lighter elevated disk (#FFFDF6) inside the primitive circle.
      Chrome: dark title "stereonet-equal-area · python · seaborn · anyplot.ai" centered on top; bold dark N/E/S/W cardinals; muted degree labels (30°,60°,120°,150°,210°,240°,300°,330°) around the rim; dashed subtle gray net grid; legend "Feature Type" top-left on elevated fill; italic "n = 110 measurements" bottom-right. All text clearly readable against the light background.
      Data: Bedding green #009E73 (circles), Joint Set 1 lavender #C475FD (squares), Joint Set 2 blue #4467A3 (diamonds), Fault ochre #BD8233 (triangles). Pole point clusters, desaturated KDE density fills/contours, and colored great circles. First series is #009E73 as required.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) page with a slightly lighter elevated disk (#242420) inside a white primitive circle.
      Chrome: light-colored title, bold white N/E/S/W cardinals, light-gray degree labels, white primitive circle, legend on dark elevated fill with light text, light-muted annotation. No dark-on-dark failures - every label is clearly visible.
      Data: identical Imprint colors to the light render (Bedding green, Joint Set 1 lavender, Joint Set 2 blue, Fault ochre); only the chrome flipped. Marker shapes, density contours, and great circles match the light render.
      Legibility verdict: PASS
