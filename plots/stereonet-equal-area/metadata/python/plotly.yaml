review:
  strengths:
  - 'Builds a correct lower-hemisphere equal-area (Schmidt) stereonet entirely from
    scratch in plotly: primitive circle, dotted small-circle/diameter grid, 10° perimeter
    tick marks, N/E/S/W cardinals and 30° degree labels'
  - Full spec coverage — poles to planes, representative great circles colored by
    feature type, and Kamb-style KDE density contours that highlight the dominant
    cluster
  - 'Imprint palette used in canonical order (Bedding=#009E73 brand green, then #C475FD/#4467A3/#BD8233);
    density contour uses imprint_seq (green→blue) with rising alpha — fully palette-compliant'
  - Theme-adaptive chrome threaded through every element — both light (#FAF8F1) and
    dark (#1A1A17) renders are fully readable with identical data colors
  - 'Distinctive plotly mastery: interactive density toggle buttons (updatemenus),
    per-pole hovertemplate with strike/dip/dip-direction customdata, legendgroups
    linking great circles to pole markers, and HTML export'
  - Geologically realistic synthetic data (bedding + two joint sets + faults with
    plausible strike/dip distributions), seeded for reproducibility, clean KISS linear
    structure
  weaknesses:
  - 30° perimeter degree labels are set at font size 10 — readable at full 2400px
    size but borderline small when the chart is scaled down to ~400px mobile width;
    consider ~12pt
  - The 'Dominant NE-striking bedding fabric' annotation box sits close to the bedding
    cluster and the 120° perimeter label, creating mild crowding in the lower-right;
    nudging it slightly would give more breathing room
  - Central overlap of density-contour fill + great circles + pole markers makes the
    middle of the net slightly busy; density fill alpha is well-judged but the great-circle
    bundle near center competes with the contours
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) on both paper and plot area. PASS.
      Chrome: title "stereonet-equal-area · python · plotly · anyplot.ai" in dark ink with a muted "Lower Hemisphere, Equal-Area (Schmidt) Projection" subtitle; N/E/S/W cardinals bold and dark; 30° degree labels in muted gray; "Feature Type" legend top-right on an elevated off-white panel with a thin border. All text clearly readable against the light background.
      Data: dark primitive circle; dotted subtle grid; poles as filled markers — Bedding green (#009E73), Joint Set 1 purple (#C475FD), Joint Set 2 blue (#4467A3), Fault bronze (#BD8233), each with a page-colored halo edge; great circles in matching colors; green→blue KDE density fill concentrated on the bedding cluster; arrow annotation to the dominant bedding fabric. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) on paper and plot. PASS.
      Chrome: title and subtitle in light ink; cardinals bright; degree labels light-gray; legend on a dark elevated panel — no dark-on-dark failures, all chrome readable. (Minor: the static export shows the inactive "Show Density" button faintly, an artifact of rendering an interactive control to PNG; not a legibility problem.)
      Data: identical data colors to the light render — green/purple/blue/bronze poles and great circles, green→blue density fill; only the chrome (backgrounds, text, grid, primitive circle) flipped. Markers retain a near-black halo that separates overlapping poles.
      Legibility verdict: PASS
