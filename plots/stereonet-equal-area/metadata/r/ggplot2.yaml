review:
  strengths:
  - Genuinely sophisticated, hand-built Schmidt equal-area projection — correct lower-hemisphere
    math for great circles (geom_path over orthogonal strike/dip vectors) and poles
    (plunge = 90-dip toward strike+270), all native ggplot2 with no backend shortcuts.
  - 'Complete spec coverage: faint equal-area net grid, primitive circle, 10-degree
    perimeter ticks with emphasized cardinal ticks, bold N + E/S/W labels, colored
    great circles, colored poles, and Kamb-style pole-density contours.'
  - 'Imprint palette applied correctly — Bedding is brand green #009E73 as the first
    series, followed by lavender/blue/ochre in canonical order; data colors identical
    across both themes with only chrome flipping.'
  - theme_void + coord_fixed(clip='off') produces a clean, chrome-free canvas with
    generous whitespace; net grid and great circles use low alpha so the poles and
    density rings remain the focal point.
  - Both light (#FAF8F1) and dark (#1A1A17) renders are fully legible with correct
    warm backgrounds; N/E/S/W, title, subtitle, and legend all readable on both surfaces.
  weaknesses:
  - Great circles converge densely through the centre of the net, producing mild visual
    clutter where many low-alpha arcs overlap — acceptable for the plot type but slightly
    busy. Could nudge great-circle alpha down to ~0.22 or thin linewidth to 0.4 to
    further calm the centre.
  - Density contours read as faint concentric rings around each cluster but are not
    labeled or filled, so the 'preferred orientation' signal is subtle; a light fill
    ramp (imprint_seq) or a single emphasized contour level would strengthen the density
    storytelling.
  - Several projection helper functions (project_line, project_vec, great_circle,
    make_set) push against the KISS-no-functions preference, though they are genuinely
    warranted by the spherical-projection math.
  image_description: "Light render (plot-light.png):\n  Background: warm off-white\
    \ (#FAF8F1) across full square canvas.\n  Chrome: title \"stereonet-equal-area\
    \ · r · ggplot2 · anyplot.ai\" and subtitle in dark/soft ink, both crisp; bold\
