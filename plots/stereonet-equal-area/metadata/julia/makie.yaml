review:
  strengths:
  - 'Complete spec coverage: equal-area Schmidt (Lambert azimuthal) projection, mean
    great circles per fabric element, poles to planes (plunge = 90 - dip), Kamb-style
    density contours, primitive circle, 10-degree perimeter ticks with 30-degree majors,
    N arrow + cardinal/azimuth labels, and a feature_type legend.'
  - 'Repair feedback fully addressed: Kamb density contours now render in a single
    neutral INK_SOFT-derived colormap (alpha varying by level), so the density layer
    reads as visually distinct from the green/lavender/blue categorical poles instead
    of competing with them.'
  - Mathematically genuine projection and density field - real inverse equal-area
    back-projection per grid node with an exponential counting-cone kernel summed
    over all pole vectors; nothing faked.
  - 'Fully palette-compliant: Bedding #009E73 (brand green) first, then lavender #C475FD
    and blue #4467A3 in canonical Imprint order; density uses a neutral ink ramp,
    not a categorical hue.'
  - Both themes render cleanly with identical data colors and only chrome flipped;
    all text readable, no dark-on-dark failures, brand green legible on both surfaces.
  - 'Strong polish: elevated disk surface (ELEVATED_BG), subtle low-alpha graticule
    (meridians + parallels every 10 degrees), hidden spines, white-stroked pole markers,
    framed legend, square 2400x2400 canvas suited to a radially symmetric plot.'
  weaknesses:
  - 'DE-03 / DE-01: still room to push data storytelling further - the three clusters
    are clear but there is no explicit hierarchy emphasizing a primary fabric element;
    all three sets carry equal visual weight. Optional, not required.'
  - Bottom-right legend sits fairly close to the primitive circle and the 150-degree
    azimuth label; fully visible with adequate margin now, but a touch more separation
    would be cleaner (minor VQ-05).
  - Small projection helper functions (proj_x, proj_y, line_vec, great_circle) diverge
    slightly from the KISS no-functions preference - justified by the genuine projection
    math but costs a point on CQ-01.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1; stereonet disk on a slightly lighter elevated surface (#FFFDF6).
      Chrome: title "stereonet-equal-area · julia · makie · anyplot.ai" in dark ink; bold N/E/S/W cardinals and grey azimuth numbers (30/60/120/150/210/240/300/330) ringing the perimeter with 10-degree degree ticks; solid dark north arrow above N; framed legend "Lower-hemisphere equal area" bottom-right. All readable.
      Data: three pole clusters as white-stroked scatter points - Bedding #009E73 green (top-center), Joint set 1 lavender #C475FD (right/E), Joint set 2 blue #4467A3 (bottom/S) - with matching colored mean great circles arcing across the disk. Kamb density contours now render as neutral grey rings (INK_SOFT-derived, alpha by level), clearly distinct from the colored poles. Subtle low-alpha graticule visible. First series confirmed #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17; disk on #242420.
      Chrome: title and cardinals in light ink #F0EFE8; azimuth/degree labels and primitive circle in soft light grey #B8B7B0 - all clearly legible, no dark-on-dark failures; north arrow rendered as a light/outlined triangle above N.
      Data: identical to light render - green/lavender/blue poles and great circles unchanged; density contours grey and distinct. Only chrome flipped.
      Legibility verdict: PASS
