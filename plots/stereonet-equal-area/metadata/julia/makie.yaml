review:
  strengths:
  - 'Complete spec coverage: equal-area (Schmidt) projection, great circles per fabric
    element, poles to planes, Kamb-style density contours, primitive circle, 10° perimeter
    ticks, N arrow + cardinal/azimuth labels, and a feature_type legend'
  - Mathematically correct Lambert azimuthal equal-area projection with proper lower-hemisphere
    pole computation (plunge = 90 - dip) and a real density field rather than a faked
    overlay
  - 'Palette is fully compliant — Bedding = #009E73 brand green, then lavender #C475FD
    and blue #4467A3 in canonical Imprint order; continuous density contours use the
    imprint_seq green-to-blue cgrad'
  - 'Both themes render cleanly: warm off-white #FAF8F1 and warm near-black #1A1A17
    backgrounds, data colors identical across themes, all chrome (title, cardinal
    labels, degree ticks, legend) readable in both'
  - 'Strong design polish: subtle low-alpha net graticule, elevated disk surface for
    figure-ground separation, spines hidden, north arrow, and a framed legend with
    sensible hierarchy'
  weaknesses:
  - Density contours use the green-to-blue imprint_seq colormap, which visually collides
    with the categorical green (Bedding) and blue (Joint set 2) series — the contour
    rings around each cluster can read as the same hue as the nearby poles, slightly
    reducing the separation between 'density' and 'feature' encodings
  - The legend sits in the bottom-right corner close to the primitive circle and the
    150° azimuth label; it is fully visible but margins are tight — nudging it slightly
    outward or shrinking its footprint would give more breathing room (minor VQ-05)
  - Small projection helper functions (proj_x/proj_y/line_vec/great_circle) are used;
    they are genuinely justified by the projection math but mildly diverge from the
    KISS no-functions preference (CQ-01)
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1; the stereonet disk sits on a slightly lighter elevated surface (#FFFDF6) for figure-ground separation.
      Chrome: title "stereonet-equal-area · julia · makie · anyplot.ai" in dark ink at top; bold N/E/S/W cardinal labels and grey azimuth labels (30,60,120,150,210,240,300,330) around the perimeter; 10° degree ticks on the primitive circle; framed legend "Lower-hemisphere equal area" bottom-right. All text crisp and readable against the light background.
      Data: three pole clusters scattered as points — Bedding #009E73 green (W/left), Joint set 1 lavender #C475FD (E/right), Joint set 2 blue #4467A3 (S/bottom); three mean great circles in matching colors arc across the disk; Kamb density contours (green-blue sequential) ring each cluster; subtle low-alpha net graticule visible. First series confirmed #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17; elevated disk a touch lighter (#242420).
      Chrome: title and N/E/S/W labels in light ink (#F0EFE8); azimuth/degree labels and primitive circle in soft light grey (#B8B7B0) — all clearly readable, no dark-on-dark failures. Legend frame and labels legible on the elevated dark surface.
      Data: identical colors to the light render — green/lavender/blue poles, great circles, and green-blue density contours all unchanged; only chrome flipped. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS
