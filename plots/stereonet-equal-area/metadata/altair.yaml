  image_description: 'The plot displays a lower-hemisphere equal-area (Schmidt net)
    stereonet projection within a black primitive circle. Cardinal directions N, E,
    S, W are labeled in bold around the perimeter with tick marks every 10 degrees.
    Three geological feature types are plotted: Bedding (steel blue, #306998), Fault
    (coral red, #C1432E), and Joint (teal green, #2A9D8F). Poles to planes appear
    as filled circles with white stroke, and great circles are drawn as curved lines
    color-coded by feature type. Subtle gray grid circles at 30 and 60 degree dip
    and N-S/E-W cross lines provide reference. Mean orientation cross markers with
    labels (mu 312/69 for Fault, mu 43/35 for Bedding, mu 90/80 for Joint) annotate
    each cluster. Density contours are present but extremely faint (gray, 0.35 opacity).
    A legend in the top-right corner shows Feature Type with three entries. The title
    reads stereonet-equal-area altair pyplots.ai with subtitle Lower-Hemisphere Equal-Area
    (Schmidt) Projection.'
