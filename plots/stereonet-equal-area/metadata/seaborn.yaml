  image_description: 'The plot shows a Schmidt equal-area (lower-hemisphere) stereonet
    projection rendered as a circular plot on a square canvas. Four geological feature
    types are displayed as colored scatter points (poles to planes): Bedding (blue,
    ~40 points clustered in the west-central area), Joint Set 1 (orange, ~30 points
    clustered in the southwest), Joint Set 2 (green, ~25 points clustered in the north-northeast),
    and Fault (red/pink, ~15 points clustered in the east). Great circles are drawn
    in matching colors for representative planes of each type. Subtle gray density
    contours (KDE-based) highlight the clustering of poles. The stereonet has a black
    primitive circle, tick marks every 10 degrees (longer ticks every 30 degrees),
    cardinal direction labels (N, S, E, W) in bold, and degree labels (30, 60, 120,
    etc.) in gray. A subtle equal-area grid of small circles and great circle arcs
    is drawn in light gray. The legend in the upper left shows Feature Type with all
    four categories. Title reads "stereonet-equal-area · seaborn · pyplots.ai" at
    the top.'
