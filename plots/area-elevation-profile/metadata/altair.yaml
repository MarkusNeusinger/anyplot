    876 m. Landmark points use different shapes and colors by type — brown triangles
    for summits, blue diamonds for lakes, crosses for passes, green squares for plateaus,
    gray circles for towns. The title reads "Bernese Oberland Trail · area-elevation-profile
    · altair · pyplots.ai" with a subtitle noting the 120 km transect and vertical
    exaggeration ~10×. There is a large black empty area below the plot canvas.'
