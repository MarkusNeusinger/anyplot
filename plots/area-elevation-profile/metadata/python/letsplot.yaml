review:
  strengths:
  - Excellent semantic color application — slope steepness uses precisely the right
    Imprint palette anchors (green=gentle, amber=moderate, red=steep), making the
    story immediately readable
  - Comprehensive landmark system with two-tier staggered labels, dotted connector
    lines, and dashed vertical drop lines — effectively handles 8 annotations without
    overwhelming the plot
  - Full theme adaptation with all chrome tokens (background, text, grid, legend)
    correctly switching between light and dark renders
  - Perfect spec coverage — area fill, slope color gradient, 8 annotated landmarks,
    start/end labels, vertical exaggeration stated in subtitle
  - Clean, linear KISS code structure with explicit sizing throughout; rolling-window
    slope smoothing prevents erratic color switching
  weaknesses:
  - 'Area fill alpha=0.12 is too subtle — the terrain silhouette effect that is central
    to the spec is barely perceptible in the dark render (#4467A3 at 12% over #1A1A17
    yields ~#1F2330, essentially invisible). Increase alpha to 0.30–0.40 so the silhouette
    reads clearly on both surfaces.'
  - 'Landmark label clustering in the 38–65 km corridor: ''Grünsee Lake'' (label_x≈42,
    lower row) and ''Hochwand Summit'' (label_x≈45, upper row) are very close horizontally
    — staggering helps but leaves these two uncomfortably crowded. Consider widening
    the x-nudge for Grünsee Lake by an additional 6–8 km.'
  - Y-axis upper space is generous (limit extends to y_max+600) which adds breathing
    room for labels but leaves ~25% of canvas height as empty terrain-free space above
    the highest peak — tighten to y_max+400 to improve canvas utilization.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, no pure white
      Chrome: title bold dark text fully visible; subtitle dark-muted text readable; axis labels "Distance (km)" / "Elevation (m)" in dark ink; tick labels (0–120 km, 1200–2800 m) in dark-soft ink; all readable
      Data: terrain silhouette filled with very light blue-grey (#4467A3 alpha=0.12) — visible but quite subtle; profile line color-coded by slope (green #009E73 for Flat/Gentle, amber #DDCC77 for Moderate, matte-red #AE3030 for Steep); 8 landmark points (green circle with page-bg fill); bold black landmark labels with dotted connectors; dashed grey vertical drop lines
      Legend at bottom: "Slope Steepness" with three colored line swatches; all labels readable
      Legibility verdict: PASS — all text clearly readable against #FAF8F1 background

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, no pure black
      Chrome: title and subtitle rendered in light text (#F0EFE8) — fully readable; axis labels and tick labels in light-muted (#B8B7B0) — clearly visible; no dark-on-dark failures observed; legend box has slightly elevated dark fill (#242420)
      Data: profile line colors identical to light render (green / amber / red) — confirmed same Imprint semantic colors; terrain area fill (#4467A3 alpha=0.12 over #1A1A17) yields approximately #1F2330 — nearly invisible against the dark background; landmark markers and connector lines visible; landmark labels rendered in light ink (#F0EFE8) and clearly readable
      Legibility verdict: PASS for chrome/text elements; PARTIAL FAIL for terrain silhouette — the area fill is effectively invisible in dark mode, undermining the spec's terrain silhouette requirement on the dark surface
