review:
  strengths:
  - Excellent gradient terrain fill using Plotly's native fillgradient — a library-specific
    feature that creates a compelling area silhouette effect
  - Semantic slope coloring (green=gentle, ochre=moderate, red=steep) uses Imprint
    semantic palette correctly and tells the terrain difficulty story at a glance
  - Perfect spec compliance — area fill, landmark annotations with vertical reference
    lines, slope gradient coloring, vertical exaggeration note all implemented
  - Theme-adaptive landmark annotation system with fill-opacity and arrow-color branching
    on ANYPLOT_THEME is polished
  - Real Bernese Oberland geography with authentic place names and elevations makes
    the data immediately credible and neutral
  - Both renders pass theme-readability — all text is clearly readable in light and
    dark themes; no dark-on-dark failures
  weaknesses:
  - 'Box frame visible on all 4 sides of the plot area — style guide default is L-shaped
    (left + bottom only); remove top and right spines by adding xaxis={''showline'':
    False, ''mirror'': False} equivalent or setting template props to hide them'
  - Annotation text at 11px font size (44px effective on 3200px canvas) may be tight
    at mobile display widths — consider increasing to 12-13px for better mobile readability
    at the 400w srcset breakpoint
  - Slope legend uses HTML character entity (█ block + HTML spans) in an annotation
    — fragile if Plotly HTML rendering is ever disabled; functional currently but
    worth noting
