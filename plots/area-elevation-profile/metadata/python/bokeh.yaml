      Background: warm off-white #FAF8F1 — correct, not pure white
      Chrome: title "Alpine Trail Profile · area-elevation-profile · python · bokeh · anyplot.ai" is large and bold (~75% canvas width, expected for long format); axis labels "Distance (km)" and "Elevation (m)" clearly readable; tick labels visible; annotation notes (vertical exaggeration, colour encoding) in muted italic at top-left
      Data: dual varea fills — brand green #009E73 (main terrain fill, alpha=0.18) and blue #4467A3 (depth shadow fill, alpha=0.12); slope-coloured multi_line transitioning green→blue via Imprint sequential; 7 landmark dots in #4467A3 (size=22) with dashed vertical Span lines; bold name+elevation labels at each landmark
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, not pure black
      Chrome: title and axis labels switch to near-white (#F0EFE8), tick labels to #B8B7B0 — all clearly readable; annotation notes visible in muted grey (#A8A79F); no dark-on-dark failures observed; landmark labels render in light colour, readable
      Data: terrain fills are visually identical to light render (Imprint palette data colours unchanged as required); slope-coloured line retains green→blue encoding; landmark dots retain #4467A3
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark issues detected
