review:
  strengths:
  - Visually polished dual-fill terrain silhouette (green surface + blue depth shadow)
    goes well beyond a basic line+fill chart.
  - Slope-coloured multi_line using the Imprint sequential colormap is technically
    elegant and communicates steepness without an extra axis.
  - Fully theme-adaptive chrome — both light and dark renders are clean and legible
    with no dark-on-dark issues.
  - Landmark annotation system (Span + Label + scatter) is well-implemented and makes
    the profile readable as a journey narrative.
  - 'Exemplary Bokeh idiom: ColumnDataSource for all layers, HoverTool with vline
    mode, HTML + Selenium screenshot pipeline.'
  weaknesses:
  - Synthetic elevation values assigned to real Swiss locations are factually incorrect
    (Schilthorn shown at 863 m instead of ~2970 m; Männlichen at 1043 m instead of
    ~2230 m; Lauterbrunnen at 1730 m instead of ~796 m). Either use realistic elevation
    values for these locations, or use fictional place names to avoid the factual
    mismatch.
  - Design storytelling could be pushed slightly further — e.g., a subtle callout
    or emphasis marking the highest point (the Kleine Scheidegg peak) as the climactic
    moment of the trail, helping the viewer immediately identify the key insight.
  - _lerp_hex helper function technically violates the KISS 'no functions' structure;
    could be inlined as a list comprehension for the 256-stop ramp.
  image_description: |-
