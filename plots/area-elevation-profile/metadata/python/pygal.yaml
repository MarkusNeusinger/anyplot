  - The legend shows Landmarks as a single lavender swatch rather than reflecting
    the multi-color landmark type encoding — consider removing the Landmarks legend
    entry or adding a custom legend explaining the color-type mapping
  - 'LM-02: the SVG post-processing bypasses pygals native API — leveraging pygal-native
    features more directly (e.g. using add() metadata more idiomatically) would improve
    library mastery'
  - Minor label crowding around Blüemlisalp Hut and Hohtürli Pass — their stagger
    offsets bring them close to the data surface
