  strengths:
  - Two-layer geom_ribbon (main fill + narrow shadow band) creates convincing terrain
    depth with zero extra dependencies
  - 'PAGE_BG-colored halo line behind the INK profile line adapts correctly: provides
    contrast against the green fill in light mode, disappears naturally in dark mode
    where the white INK line already stands out'
  - Summit vs valley landmark distinction (red AE3030 larger markers vs INK smaller
    markers) delivers clear visual hierarchy and immediately signals high-point drama
  - Dynamic title_fontsize calculation ensures the mandated anyplot title never overflows
    at any character length
  - 'Theme adaptation is thorough: every chrome element (background, text, grid, axis
    lines, ticks) routes through INK/INK_SOFT/INK_MUTED tokens — dark render is fully
    readable with no dark-on-dark failures'
  - 'spec requirements fully met: start/end labeled, 8 annotated landmarks with dotted
    vertical guides, vertical exaggeration noted in subtitle'
  weaknesses:
  - 'LM-01 (4/5): Three separate geom_text calls filtered by ha value is functional
    but could be unified into one call with ha mapped as a data column via aes() if
    plotnine supports it — minor but noteworthy as it inflates line count'
  - 'DE-03 (4/6): Story is clear but the plot stops at ''labeled terrain'' — adding
    a brief annotation at the highest summit (e.g., a subtle fill-colour change or
    an annotation band for the hardest climb section) would elevate storytelling from
    good to excellent'
  - 'VQ-01 (7/8): Landmark text at geom_text size=3.5 mm (≈10 pt) is readable but
    on the small side for dense clusters like Talboden/Felsalp at km 50–62; bumping
    to 3.8–4 mm would improve mobile readability without crowding'
