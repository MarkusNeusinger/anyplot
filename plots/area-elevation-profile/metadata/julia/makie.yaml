  - 'Dark render terrain fill (28% alpha green over #1A1A17) is quite dim — the silhouette
    effect loses impact in dark mode. Use theme-conditional alpha: ~0.28 light, ~0.42
    dark.'
  - Summit Peak has no additional visual emphasis over other landmarks despite being
    the highest point — consider a larger marker (size 12 vs 9) or distinct styling
    to create focal hierarchy.
