  strengths:
  - Excellent realistic data using real Swiss Alpine locations with plausible elevations
  - Gradient fill with elevation zone plotBands creates an appealing terrain visualization
  - Landmark annotations with vertical dotted lines guide the viewer through the route
  - Title format correct, subtitle provides rich context including vertical exaggeration
    note
  - Strong use of Highcharts-specific features (plotBands, plotLines, crosshair, linearGradient)
  weaknesses:
  - Minor label crowding at bottom-left (Grindelwald label near y-axis) and slight
    right-edge clipping of Lauterbrunnen label
  - Could push aesthetic sophistication further with custom font families or more
    refined color palette
  image_description: 'The plot displays a terrain elevation profile as a filled area
    chart on a white background. The title "area-elevation-profile · highcharts ·
    pyplots.ai" appears in bold at the top, with a subtitle "Alpine Trail Bernese
    Oberland — 120 km Hiking Route · Grindelwald to Lauterbrunnen · Vertical Exaggeration
    ~10×" in gray below. The x-axis shows "Distance (km)" from 0 to 120 km with 10
    km intervals, and the y-axis shows "Elevation (m)" from 1000 to 3200 m. The terrain
    profile is drawn with a thick blue (#306998) line and filled with a blue gradient
    that fades from semi-transparent at the top to nearly transparent at the bottom.
    Three subtle horizontal plotBands mark elevation zones: "Valley" (1000-1500m,
    green tint), "Alpine" (1500-2500m, yellow tint), and "High Alpine" (2500-3200m,
    blue tint). Seven landmarks are annotated with dotted vertical lines and bold
    labels at the bottom: Grindelwald (Start) at ~1432m, Faulhorn Summit at ~2543m,
    Schynige Platte at ~1942m, Jungfraujoch Pass at ~2897m (the highest point), Kleine
    Scheidegg at ~1735m, Männlichen Peak at ~2447m, and Lauterbrunnen (End) at ~1311m.
    The terrain shows three major peaks with valleys between them, creating a realistic
    alpine hiking profile.'
