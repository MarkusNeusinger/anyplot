  strengths:
  - Excellent realistic data using real Swiss Alpine locations with plausible elevations
  - Good gradient fill creating an appealing terrain silhouette effect
  - Landmark annotations with vertical dotted lines effectively convey the hiking
    route
  - Subtitle with route description and vertical exaggeration note adds context
  - Clean, well-structured code with Gaussian peak terrain generation
  weaknesses:
  - Y-axis extends far below the data range (~600m vs data starting ~1200m), wasting
    vertical space
  - Title prepends extra text before the required format — consider moving descriptive
    text entirely to subtitle
  - Landmark labels at 24px are on the small side; increasing size or repositioning
    near the data points would improve readability
  - Could push design further with elevation-based color zones or slope-dependent
    coloring to reach publication quality
  image_description: 'The plot displays a terrain elevation profile as a filled area
    chart. The x-axis shows distance from 0 to 120 km, the y-axis shows elevation
    from ~600 to 3200 m. The terrain profile is rendered with a dark blue (#306998)
    outline (thick line) and a blue gradient fill that fades from semi-transparent
    blue at the top to nearly transparent at the bottom. The title reads "Alpine Trail
    Bernese Oberland · area-elevation-profile · highcharts · pyplots.ai" in bold,
    with a subtitle "120 km Alpine Hiking Route — Grindelwald to Lauterbrunnen · Bernese
    Oberland · Vertical Exaggeration ~10×". Seven landmarks are annotated with dotted
    vertical lines and rotated labels at the bottom: Grindelwald (Start) (~1432 m),
    Faulhorn Summit (~2543 m), Schynige Platte (~1942 m), Jungfraujoch Pass (~2897
    m), Kleine Scheidegg (~1726 m), Männlichen Peak (~2447 m), and Lauterbrunnen (End)
    (~1311 m). The terrain shows three major peaks with valleys between them. Grid
    lines are very subtle. Background is white.'
