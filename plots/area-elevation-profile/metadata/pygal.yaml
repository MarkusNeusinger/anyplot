  image_description: The plot displays a filled area chart depicting the Bernese Oberland
    Traverse elevation profile over 120 km. The x-axis shows "Distance (km)" from
    0 to 120, and the y-axis shows "Elevation (m)" from 600 to 2,200. The terrain
    profile is rendered as a steel blue filled area with cubic interpolation creating
    a smooth silhouette. Seven orange dots mark landmark positions along the trail
    (at approximately 0, 22, 38, 55, 72, 85, and 120 km). The title reads "Bernese
    Oberland Traverse · area-elevation-profile · pygal · pyplots.ai" at the top. A
    legend at the bottom identifies "Elevation Profile" (blue square) and "Landmarks"
    (orange square). Dashed horizontal grid lines appear at 200m intervals on a white
    background. The terrain shows multiple peaks and valleys, with the highest point
    around 2000m near km 55 (Mürren Summit Viewpoint area). The profile descends to
    its lowest points around km 38 (Lauterbrunnen Valley, ~770m) and at the end near
    km 120 (Kandersteg, ~880m).
