review:
  strengths:
  - Terrain silhouette with geom_ribbon + semi-transparent fill creates an immediately
    recognizable elevation profile
  - Theme tokens are properly applied to ALL chrome elements; dark render has no dark-on-dark
    failures
  - Landmark dashed vertical lines with open-circle markers and angled labels create
    clear, uncluttered annotation
  - Vertical exaggeration is noted in the subtitle — transparent and professional
  - Canvas dimensions are exactly correct (3200×1800); both themes pass readability
    checks
  weaknesses:
  - library(dplyr) is imported but not used — remove it (all data operations use base
    R)
  - Landmark labels show only names without elevation values; spec requests labeling
    start/end points with both name and elevation (e.g. Valley Start (820m), High
    Summit (2,980m))
  - Landmark label text size (size=2.6 mm ~7.4pt) is slightly below the recommended
    size for the 3200x1800 canvas — increase to size=3.0 or 3.2 for better mobile
    readability
  - Thin green band at the canvas bottom (fill from y=700 to y=800, below first tick
    at 800m) — either raise ymin in geom_ribbon to match valley floor or make the
    base layer more intentional
  - 'DE-01 could be elevated: the terrain fill uses a single flat green; a gradient
    from brighter #009E73 at top to more muted #006B4F at bottom would add sophistication'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "area-elevation-profile · r · ggplot2 · anyplot.ai" centered in dark ink, clearly readable. Subtitle "Alpine Traverse · 120 km · ~10× vertical exaggeration" in INK_SOFT, readable. Axis labels "Distance (km)" and "Elevation (m)" in INK at 10pt, readable. Tick labels in INK_SOFT at 8pt, readable. Dashed landmark vertical lines in INK_SOFT, subtle.
      Data: Single series in #009E73 (Imprint position 1). Area fill at 50% alpha. Profile line at linewidth=1.0. 7 landmark open-circle dots with page-bg fill. 45°-angled text labels for each landmark.
      Legibility verdict: PASS — all text elements clearly readable against warm off-white background; no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface
