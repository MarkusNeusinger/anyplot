review:
  strengths:
  - Elegant gradient fill creates a compelling terrain silhouette effect specific
    to this spec type
  - Seeded LCG for deterministic terrain noise is a well-engineered reproducibility
    solution
  - plotLines with styled landmark labels is idiomatic, clean Highcharts annotation
    approach
  - Correct title format, both themes render correctly with proper token application
  - Cosine interpolation produces naturalistic terrain transitions between waypoints
  - Subtitle provides useful context (trail distance and vertical exaggeration factor)
  weaknesses:
  - Missing elevation values at landmark positions — spec explicitly requires 'label
    start and end points with location names and elevations' and the landmark_elevation
    field is unused; add elevation annotations to at least Trailhead and Journey's
    End labels (and optionally Summit Peak)
  - Gradient fill bottom alpha (0.06) makes the lower terrain area nearly invisible
    in the dark render — increase the minimum alpha to 0.12–0.15, or make the alpha
    conditional on theme
  - Landmark labels at 12px are at the minimum readable size — consider 13px to improve
    mobile readability
  - 'Right-side landmark crowding: Valley Camp (km 105) and Journey''s End (km 120)
    are only 15 km apart with right-aligned labels that nearly overlap — stagger vertically
    or reduce one label''s horizontal offset'
  image_description: |-
