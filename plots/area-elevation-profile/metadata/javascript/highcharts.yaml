      Data: Profile line in brand green #009E73 at 2.5px. Gradient fill from rgba(#009E73, 0.55) at top to rgba(#009E73, 0.06) at base. Eight dashed vertical landmark lines with labels.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface
