review:
  strengths:
  - Gradient fill with rgba alpha stops creates a beautiful terrain silhouette that
    matches the spec's area fill requirement
  - Seeded LCG (makeLCG(42)) ensures fully deterministic, reproducible data generation
    in the offline JS environment
  - Cosine interpolation between waypoints produces smooth, realistic terrain transitions
  - plotLines with HTML labels elegantly annotate all 8 landmarks including start/end
    elevations and summit height
  - Theme tokens (t.ink, t.inkSoft, t.grid, t.palette) are wired throughout — chrome
    flips correctly between light and dark renders
  - Single-series legend correctly omitted; subtitle provides route context and vertical
    exaggeration note
  - 'Correct idiomatic Highcharts usage: animation:false in both chart and plotOptions.series,
    credits disabled, transparent background'
  weaknesses:
  - 'Landmark labels at the top of the plot area are slightly crowded (13px, 8 labels
    in ~120px width) — consider alternating y-offsets (y: 16 vs y: 32) to stagger
    labels and reduce crowding'
  - 'Top and right chart spines are still present — explicitly remove them via chart.plotBorderWidth:
    0 or xAxis.lineWidth: 0 for the top/yAxis right side to achieve a cleaner L-shaped
    frame'
  - 'DE-02: No marker removal is set globally but gridLineWidth: 0 on xAxis is good
    — further visual refinement could include softer yAxis line (lineWidth: 0) and
    keeping only y-grid for the minimal look'
  - 4 utility functions (rgba, cosineInterp, getElevation, makeLCG) break the ideal
    flat KISS structure — not critical but worth noting for code style
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface — correct, not pure white.
      Chrome: Title "area-elevation-profile · javascript · highcharts · anyplot.ai" in dark ink at 22px — clearly readable. Subtitle "Alpine Trail Transect — 120 km · Vertical exaggeration ≈10×" in softer ink at 14px — readable. Y-axis label "Elevation (m)" and X-axis label "Distance (km)" both explicitly set at 16px — readable. Tick labels at 14px — readable. Landmark labels at 13px — slightly small but legible.
      Data: Area chart filled with brand green (#009E73) with a top-to-bottom alpha gradient (0.55 → 0.13), creating a terrain silhouette. 8 dashed vertical plotLines mark landmarks: Trailhead (892 m), River Crossing, Falcon Pass, Alpine Hut, Summit Peak (2847 m), Glacier View, Valley Camp, Journey's End (1005 m). Y-axis range 600–3200 m, X-axis 0–120 km. First (only) series correctly uses palette[0] = #009E73.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 surface — correct, not pure black.
