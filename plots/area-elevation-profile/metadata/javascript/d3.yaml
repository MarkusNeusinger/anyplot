review:
  strengths:
  - Gradient terrain fill using SVG linearGradient creates a beautiful, polished silhouette
    effect (opacity 0.6 to 0.05)
  - CatmullRom alpha=0.5 curve interpolation gives natural-looking smooth terrain
  - Computed vertical exaggeration (veActual) derived from actual scale domains is
    a clever professional touch
  - Complete landmark annotation system with dashed lines, dots, connector lines,
    and two-line labels (name + elevation)
  - Perfect theme adaptation across both renders — data colors identical, chrome correctly
    flips
  - 'Excellent D3 idioms: datum(), d3.area() + d3.line() combination for fill+stroke,
    d3.extent, .call() pattern'
  - 'All spec requirements met: area fill, start/end labels, landmark annotations
    with vertical marker lines, vertical exaggeration noted, units on both axes'
  weaknesses:
  - Landmark elevation sub-labels at 11px CSS (22px in PNG) are below the d3.md-recommended
    14px floor — at mobile scale (~400px display width) these are unreadable. Raise
    to at least 13–14px CSS.
  - Helper function elevAt() technically violates KISS structure (no functions rule).
    Minor issue — inline or refactor to single expression if possible.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "area-elevation-profile · javascript · d3 · anyplot.ai" in dark bold text at ~65% width, fully readable. Y-axis label "Elevation (m)" rotated, readable. X-axis label "Distance (km)" readable. Tick labels (14px CSS → 28px PNG) in dark inkSoft color, clear. "Vertical exaggeration: 25×" italic note in top-right, readable at full res.
      Data: #009E73 (brand green) used for both the fill gradient (0.6→0.05 opacity) and the profile stroke (2.5px). Beautiful terrain silhouette with three distinct peaks: Pine Ridge Pass (2029m), Eagle Summit (2265m), North Peak (1878m). Seven landmark annotations with dashed vertical lines, dots, and two-line labels. Y-grid lines subtle.
      Legibility verdict: PASS — all text readable, no light-on-light issues. Minor: 11px CSS elevation sub-labels (e.g. "2029 m") are below d3.md 14px floor and may not read at 400px mobile scale.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light color against the dark background — no dark-on-dark failures. The "Vertical exaggeration: 25×" note is light-colored and readable. Grid lines are subtle light rules.
      Data: #009E73 (brand green) fill and stroke are identical to the light render — data colors unchanged, only chrome flips. Gradient fill appears deeper green on dark background but the terrain silhouette is clearly visible. Landmark dots use t.pageBg stroke creating a white-halo effect on dark background — looks clean. Dashed landmark lines visible.
      Legibility verdict: PASS — all chrome adapts correctly, no dark-on-dark failures detected.
