review:
  strengths:
  - Beautiful gradient area fill using Chart.js backgroundColor function with chartArea
    reference — idiomatic and visually polished terrain silhouette
  - 'Custom landmarkPlugin using afterDraw with canvas 2D API: hollow dots, dashed
    vertical guides, and themed rounded-corner label boxes demonstrate deep Chart.js
    expertise'
  - Cubic Hermite spline interpolation over 13 hard-coded control points produces
    a smooth, realistic Alpine terrain profile without any external dependency
  - 'Full theme adaptation throughout: pageBg, elevatedBg, ink, inkSoft, grid tokens
    all applied correctly — both renders are visually correct and readable'
  - Label clamping logic (Math.max/min on boxLeft) prevents landmark boxes from clipping
    at chart edges; flip-below logic handles summit-level labels near the chart top
  - Vertical exaggeration noted via subtitle; single-series legend correctly hidden;
    x-axis gridlines hidden keeping the chart clean
  weaknesses:
  - 'DE-01: Design is professional and above defaults, but lacks a strong visual signature
    — the optional slope-based gradient coloring (green flat → red steep) mentioned
    in the spec would add a distinctive second data dimension to the fill and elevate
    the chart to publication-ready level'
  - 'DE-02: Axis border lines (border: { color: t.inkSoft }) on both x and y scales
    create a subtle box frame around the data area; removing the top and right equivalent
    borders (or using borderColor: ''transparent'' on the right/top sides) would align
    with the style guide''s L-shaped spine preference and improve refinement'
  - 'DE-03: Visual storytelling focuses on landmark labels but misses a climactic
    emphasis on the Summit Peak — making the summit label box slightly larger, adding
    a distinct color accent (e.g. palette[1] border on the box), or a summit annotation
    arrow would guide the viewer''s eye to the narrative high point'
  - 'VQ-02: Landmark label boxes for First Pass (20 km) and Summit Peak (33 km) are
    horizontally close (~13 km apart); if landmark names were longer they would crowd
    — adding a minimum horizontal separation check in the plugin would future-proof
    this'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, clearly not pure white
      Chrome: Title "area-elevation-profile · javascript · chartjs · anyplot.ai" in dark ink at top (~55% canvas width), subtitle "Vertical exaggeration ≈ 10×" in secondary ink below. X-axis label "Distance (km)" and Y-axis label "Elevation (m)" both in dark ink, visually balanced at 16px CSS. Tick labels in inkSoft (muted dark) at 14px CSS; Y-axis shows 400m–2800m at 400m intervals, X-axis shows 0–80km at 10km intervals. Subtle Y-axis grid lines; no X-axis grid — clean visual floor.
      Data: Single terrain profile series in #009E73 (brand green) with gradient area fill from ~73% opacity at top to ~9% at the x-axis baseline — creates a rich terrain silhouette effect. Six landmark annotations (Trailhead, First Pass, Summit Peak, Mountain Hut, Second Pass, Trail End) with hollow circle dots on the terrain line, dashed vertical guides to the x-axis, and elevated-background rounded-corner label boxes showing name (bold) and elevation.
      Legibility verdict: PASS — all title, axis, tick, and landmark label text is clearly readable against the warm off-white background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title and subtitle in light ink (#F0EFE8 equivalent); axis labels and tick labels in light secondary ink (#B8B7B0 equivalent) — all text is light-on-dark and fully readable. Y-axis grid lines are subtly visible as faint light rules. Landmark label boxes use elevatedBg (#242420) creating a barely perceptible lift from the background, with ink text readable within.
      Data: Terrain profile and gradient fill are identical to light render — #009E73 brand green line and fill with same gradient stops. Data color identity confirmed across both themes; only chrome (background, text, grid) flips.
      Legibility verdict: PASS — no dark-on-dark failures detected; brand green #009E73 remains clearly visible on the dark surface; all text elements readable in both landmark boxes and axis chrome
