review:
  strengths:
  - Gradient area fill with opaque-to-transparent fade creates an authentic terrain
    silhouette effect
  - Custom Chart.js afterDraw plugin for landmark annotations with precise coordinate
    conversion (getPixelForValue) is idiomatic and sophisticated
  - Hermite spline interpolation produces a smooth, realistic elevation profile from
    sparse control points
  - Horizontal clamping logic for label boxes prevents any annotation from spilling
    outside the chart area
  - 'Perfect dual-theme adaptation: warm off-white light bg, near-black dark bg, elevated-bg
    label boxes switch correctly, all chrome tokens wired through'
  weaknesses:
  - 'Spec requires noting a vertical exaggeration factor on the plot (e.g., ''VE:
    ~10×'') — the implementation does not annotate or acknowledge the exaggeration,
    which the spec explicitly calls for'
  - Landmark label font sizes are fixed at 13 px/12 px CSS (26/24 px at 2× scale),
    which is adequate but on the smaller end for a 3200 px canvas; increasing to 15
    px/14 px would improve readability when the chart is embedded at gallery size
  - Both x and y grid lines are displayed (full grid), which adds some visual clutter;
    the style guide prefers y-axis-only grid for line/area charts — removing the x
    grid would reduce noise
  - No top/right spine removal — Chart.js border is still visible on all four sides;
    setting borderColor to transparent for the top/right sides (or the outer chart
    border) would give a cleaner L-shaped frame look
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface; not pure white.
      Chrome: Title "area-elevation-profile · javascript · chartjs · anyplot.ai" in dark ink, clearly readable. X-axis label "Distance (km)" and Y-axis label "Elevation (m)" both dark ink, clearly readable. Tick labels ("0 km"–"80 km" and "400 m"–"2800 m") in soft-dark ink, all readable at full resolution.
      Data: Single green area (#009E73) with gradient fill — opaque at the profile line, fading to near-transparent at the base. The terrain silhouette reads clearly. Six landmark annotations: hollow ring dots at each peak/pass/trailhead, dashed vertical guide lines, and small label boxes (warm off-white elevated background with dark ink "name bold + elevation regular" typography). Layout: Trailhead (0 km, 940 m), First Pass (20 km, 2100 m), Summit Peak (33 km, 2450 m), Mountain Hut (47 km, 1700 m), Second Pass (56 km, 2300 m), Trail End (80 km, 880 m).
      Legibility verdict: PASS — all title, axis, and annotation text is clearly legible against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface; not pure black.
      Chrome: Title text is light/cream-colored on the dark background — clearly readable. Axis labels and tick labels use the light inkSoft token — all readable. No dark-on-dark failures observed.
      Data: Same brand-green (#009E73) area fill with gradient — identical data color to light render; only chrome flips. Landmark label boxes switch to the elevated dark background (#242420) with light ink text, maintaining excellent readability on the dark surface. Hollow dot outlines (in t.ink = cream) contrast well against the near-black background.
      Legibility verdict: PASS — all text is clearly legible against the dark background; no dark-on-dark failures.
