review:
  strengths:
  - Deterministic data generation using linear interpolation between hard-coded Alpine
    control points plus superimposed sinusoidal terrain texture — elegant and fully
    reproducible
  - Gradient area fill (brand green 0.55 → transparent 0.04) creates a convincing
    terrain silhouette that immediately conveys the mountain profile character
  - ECharts markLine with explicit coordinate pairs draws vertical dashed lines precisely
    from y=420 to just below the terrain line — idiomatic and accurate
  - Title fontsize correctly scaled by formula (Math.max(13, round(22*67/titleLen)))
    so the long descriptive prefix fits without overflow
  - ~16× vertical exaggeration is noted in the subtitle, and the actual ratio is correctly
    computed (~15.2× actual from grid dimensions)
  - Theme-adaptive chrome uses all correct tokens (t.ink, t.inkSoft, t.grid, t.palette[0])
    throughout — both renders pass the readability check
  - Start and end landmarks (Trailhead 780 m / Mountain Town 650 m) clearly labeled
    with position:'right' / position:'left', fulfilling spec requirement
  weaknesses:
  - Landmark scatter dots use symbolSize:5 (5 CSS px = 10 native px at 2× DPR) — very
    small at full resolution and barely visible at mobile scale (~400 px); increase
    to symbolSize:9 or 10 for better visibility
  - 'Some label crowding between adjacent landmarks: Valley Village (dist=21) and
    Northern Pass (dist=13) labels are horizontally close on a descent segment; consider
    staggering label vertical offsets to prevent near-collision in dense sections'
  - Plateau Hut and surrounding labels appear within the green silhouette fill on
    the ascending eastern slope (elevation ~2190 m, fill opacity 0.45–0.55 at that
    height); the dark ink text remains readable but visually noisy — place dots higher
    (+120 m offset instead of +80 m) to clear the silhouette top
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "Alpine Mountain Traverse · area-elevation-profile · javascript · echarts · anyplot.ai" at scaled fontSize ~17px is fully visible and fits comfortably (~80% width). Subtitle "~16× vertical exaggeration" readable below title. Y-axis label "Elevation (m)" and X-axis label "Distance (km)" both visible in inkSoft color. Tick labels ("0 km"…"80 km", "500 m"…"3,000 m") clearly readable. All text is dark-on-light — no legibility failures.
      Data: Brand green (#009E73) fills the terrain silhouette from the profile line down to y=400 m with a gradient (0.55 opacity at top → 0.04 at bottom), creating a convincing Alpine terrain silhouette. Six landmark dashed vertical lines and labels (Northern Pass · 2280 m, Valley Village · 1320 m, Main Summit · 2840 m, Plateau Hut · 2490 m, Eastern Pass · 2560 m, River Crossing · 900 m) are visible above the profile. Start (Trailhead · 780 m) and end (Mountain Town · 650 m) markers are green dots with dark borders and legible inline labels.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, subtitle, axis labels, and tick labels all rendered in light ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark surface. No dark-on-dark failures observed. Grid lines subtle but visible. Brand green profile line and fill are identical in hue to the light render (data colors are theme-independent as required).
      Data: Same brand green terrain silhouette; fill slightly more visible against the dark background, creating a strong visual effect. All landmark labels and endpoint labels retain correct ink color and are fully legible. No "dark-on-dark" text detected.
      Legibility verdict: PASS
