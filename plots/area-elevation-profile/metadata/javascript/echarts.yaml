review:
  strengths:
  - Beautiful gradient terrain silhouette fill using Imprint green (#009E73) — fades
    from 55% to 4% opacity, creating genuine depth without obscuring the profile line
  - Professional landmark annotations with dashed vertical markLines + scatter dots
    + positioned text labels; vertical lines stop just below the dot for visual clarity
  - 'Full theme-adaptive chrome: all text (title, axis labels, tick labels, landmark
    labels) uses t.ink / t.inkSoft tokens — no dark-on-dark or light-on-light failures
    in either render'
  - 'Idiomatic ECharts feature usage: smooth line series, markLine with paired coord
    arrays, z-layer ordering, ECharts linearGradient object for areaStyle'
  - Deterministic data generation via superimposed sinusoids on linearly-interpolated
    control points — realistic micro-terrain texture, no RNG needed
  - Title fontsize correctly scaled down via the 22 * 67 / len(title) formula to fit
    the long descriptive prefix without overflow
  weaknesses:
  - Landmark labels at fontSize 11 are too small for mobile readability — the 400px
    thumbnail shows them as essentially unreadable; raise to at least 13px
  - Missing vertical exaggeration notation — the spec explicitly requires noting the
    VE factor on the plot (e.g., a subtitle or footnote '~6× vertical exaggeration');
    the implementation omits this entirely
  - elevAt() helper function could be inlined for stricter KISS compliance — it is
    called 8 times but is a 1-liner that does not add abstraction value
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, visually confirmed.
      Chrome: Title "Alpine Mountain Traverse · area-elevation-profile · javascript · echarts · anyplot.ai" in dark ink, centered, font scaled to ~17px (formula applied correctly). Y-axis label "Elevation (m)" and X-axis label "Distance (km)" in dark-soft ink, 14px. Tick labels (e.g., "400 m", "1,000 m", "0 km", "20 km") in dark-soft ink, 13px. All readable against the light background.
      Data: Single line series with gradient green area fill (#009E73 at 0.55 → 0.04 opacity). Profile runs 0–80 km with elevations from ~650 m to ~2840 m. Six landmark vertical dashed lines and labeled dots (Northern Pass, Valley Village, Main Summit, Plateau Hut, Eastern Pass, River Crossing). Trailhead and Mountain Town endpoints marked with green circle markers (symbolSize 12, border in ink). Landmark annotation labels at fontSize 11 — readable at full resolution but very small at 400px mobile.
      Legibility verdict: PASS at full resolution. MARGINAL at 400px — landmark labels at 11px become unreadable on mobile.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, visually confirmed.
      Chrome: Same title, axis labels, and tick labels now rendered in light/soft tones (t.ink = #F0EFE8, t.inkSoft = #B8B7B0) — all clearly readable against the dark background. No dark-on-dark failures observed. Grid lines are subtle and visible.
      Data: Area fill and line color are identical to the light render — #009E73 gradient fill unchanged. Landmark labels appear in t.ink (light text) on dark background — readable. Start/end markers retain green fill with ink-colored border.
      Legibility verdict: PASS — chrome adapts fully and all text is visible. No dark-on-dark issues.
