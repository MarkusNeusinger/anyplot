      Data: D1 root decision node (green square, #009E73) at left. Two bezier paths diverge: "Launch Product" (green, solid, 6px) leads to C1 chance node (lavender circle, #C475FD) upper area; "Keep Current" (dashed, muted, 3px) leads to C2 chance node lower area, with double-strike prune mark. C1 → T1 ($800K, upper right), C1 → D2 decision node ($200K EMV) → T4 ($200K, optimal) and T5 (−$100K, pruned with double-strike). Terminal triangle markers appear at bezier curve endpoints but are small and less visually prominent than the circle/square nodes. Pruned paths use dashed gray lines with reduced opacity (0.4) and red double-strike marks.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

