review:
  strengths:
  - 'Semantic Imprint palette assignments are conceptually coherent: green=decision
    agency, lavender=chance uncertainty, blue=positive payoff, red=negative payoff'
  - Opacity hierarchy (active 100% / pruned 30%) with dashed lines and red X marks
    creates immediately readable visual stratification between optimal and pruned
    paths
  - EMV rollback calculations are mathematically correct (C1=130K, C2=80K, D1=130K)
    and clearly labeled inside each non-terminal node
  - Creative use of seaborn units= aesthetic for multi-segment branch drawing, combining
    all four seaborn aesthetics (hue, style, size, units) in one lineplot call
  - Both light and dark themes render correctly with proper chrome adaptation — no
    dark-on-dark failures, no pure-white/black backgrounds
  - Title font dynamically scales with string length per style guide rules
  - No bbox_inches='tight'; canvas dimensions correct at 3200x1800
  weaknesses:
  - 'Legend uses uniform colored rectangles only — the actual node shapes (square/circle/triangle)
    are not shown in the legend swatches, missing an opportunity to reinforce the
    shape encoding central to reading the diagram. Fix: use Line2D with marker styles
    (marker=''s'', marker=''o'', marker=''>'') for Decision/Chance/Terminal handles'
  - 'Pruned branch labels rendered at alpha=0.30 are slightly below legibility comfort
    zone at thumbnail sizes. Fix: raise pruned label alpha from 0.30 to 0.45–0.50
    to better balance legibility with visual de-emphasis'
