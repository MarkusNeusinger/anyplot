  - EMV-scaled node sizes provide meaningful data encoding and visual sophistication
    beyond basic tree diagrams
  - Pruned branch treatment (dashed lines + 0.5 opacity + double-strike marks) is
    fully spec-compliant and visually clear
  - Rich interactive hover via plotly HTML export with distinct hoverlabel colors
    per node type
