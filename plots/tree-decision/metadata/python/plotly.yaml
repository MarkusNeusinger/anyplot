    inside nodes
  - Semantic color assignment for node types (green=decision/action, blue=chance/uncertainty,
    ochre=terminal/value) is intuitive and palette-compliant
  weaknesses:
  - 'EMV label text color uses PAGE_BG (#1A1A17 in dark mode) on the blue chance node
    (#4467A3), achieving only ~3.1:1 contrast. Fix: change emv_text_color = PAGE_BG
    to emv_text_color = INK (white/cream in dark mode) for labels inside colored nodes.'
  - 'Label crowding near C1: High Demand (p=0.6) and Low Demand (p=0.4) branch labels
    are stacked very close at fontSize=14. Fix: reduce branch label font to 11-12px
    or increase yshift separation.'
  - 'Do Nothing terminal (T5) positioned at x=0.35 (same column as chance nodes) looks
    like a sibling chance node. Fix: move T5 to x=0.60-0.65 to align it visually with
    other terminal outcomes.'
