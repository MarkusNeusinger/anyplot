  weaknesses:
  - Edge and node text is fontsize=9 (18px rendered); at 400px mobile width these
    labels scale to ~2px and become illegible — increase branch labels and node names
    to fontsize=10–11
  - 'Tree layout is unbalanced: the upper-right quadrant is dense (Competition, Scale-Up,
    and four terminal nodes) while the lower-left contains only the pruned Abandon
    branch, leaving large empty areas — consider adjusting y-coordinates to distribute
    nodes more evenly'
  - The 'Maintain' edge label (D2→T4, pruned branch) is placed near the double-slash
    pruning marks on the same edge, risking visual collision — offset the label further
    perpendicularly
  - 'Chance nodes use Imprint[3] (blue #4467A3) while skipping Imprint[2] (lavender),
    without a documented semantic reason — the canonical rule is positions 1→N unless
    a semantic exception applies; ''chance'' and ''uncertainty'' do map loosely to
    blue, but this skip should be explicit'
