    node with "EMV: $184K" splitting into "Accepted (p=0.70)" at $250K and "Rejected
    (p=0.30)" at $30K, both also pruned. A star Optimal annotation in blue italic
    sits near the top-left. The legend at the bottom shows Chance (orange circle),
    Decision (blue square), Terminal (green triangle).'
