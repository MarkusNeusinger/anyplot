  image_description: 'The plot shows a decision tree diagram on a white background
    with the title "tree-decision · highcharts · pyplots.ai" and subtitle "Product
    Launch Decision Analysis — Expected Monetary Value Rollback". The tree flows left-to-right
    with bezier curve connections. The root decision node (blue square, left side)
    shows "EMV: $560K". Two paths branch out: "Launch Product" (solid blue) leads
    to an orange circle chance node (EMV: $560K), and "Keep Current" (dashed grey,
    pruned with red double-strike) leads to a grey circle chance node (EMV: $325K).
    From the top chance node, "High Demand (0.6)" leads to a teal terminal triangle
    ($800K) and "Low Demand (0.4)" leads to a second blue decision node (EMV: $200K).
    That decision node branches to "Discount" (teal terminal, $200K) and "Withdraw"
    (grey pruned terminal, -$100K). The bottom grey chance node branches to pruned
    grey terminals for $400K and $250K. A legend on the right identifies Decision
    Node (blue square), Chance Node (orange circle), Terminal Optimal (teal triangle),
    Terminal Pruned (grey triangle), Optimal Path (solid blue), and Pruned Branch
    (dashed grey).'
