review:
  strengths:
  - Correct spectrogram implementation using scipy.signal.spectrogram with real FFT
    computation and dB scale
  - Viridis colormap (via explicit stops) is perceptually uniform and colorblind-safe
    — matches spec requirement
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT, ELEVATED_BG, GRID tokens
    all correctly wired to ANYPLOT_THEME for both light and dark renders'
  - Realistic chirp signal data (10-200 Hz sweep, 1000 Hz sample rate, 2 s duration
    with noise) makes the spectrogram concept immediately comprehensible
  - Title format is exact ('spectrogram-basic · highcharts · anyplot.ai'), subtitle
    adds useful context
  - 'Correct output: saves plot-THEME.png and plot-THEME.html with proper naming'
  weaknesses:
  - 'Y-axis category axis is not constrained: Highcharts auto-extends the category
    range below index 0, generating spurious negative labels (-3, -9, -15, …, -99
    dB shown as Hz labels) in the lower portion of the chart. Fix: add ''min'': 0,
    ''max'': len(frequencies_ds)-1 to the y_axis options to clamp the category axis
    to valid range. This causes ~60% of the canvas to be wasted empty space.'
  - 'HTTP server + CDN approach is over-engineered and fragile: the library guide
    recommends downloading Highcharts JS and embedding it inline to avoid CDN dependency.
    The current approach requires a local HTTP server, threading, and CDN availability.
    Replace with urllib.request.urlopen to download highcharts.js and heatmap.js inline.'
  - 'Design Excellence is generic: no spine removal, no intentional whitespace hierarchy,
    legend box is a heavy bordered box. Refine by removing the legend border or reducing
    its visual weight.'
  - 'CQ-01: class definition (QuietHTTPRequestHandler) and threading add unnecessary
    structural complexity for what should be a linear script.'
  image_description: |-
