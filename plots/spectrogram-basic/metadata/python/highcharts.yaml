      Data: Heatmap rendered with viridis colormap (deep purple → blue → teal → green → yellow). Clear diagonal yellow-green stripe rising from bottom-left to upper-right showing the chirp signal's frequency sweep from 10 Hz to 200 Hz. The colorbar on the right shows the viridis gradient labeled in dB.
      LAYOUT BUG: The heatmap area occupies only the top ~37% of the canvas height. The bottom ~60% shows empty background with spurious y-axis labels (-3, -9, -15, -21, -27, -33, -39, -45, -51, -57, -63, -69, -75, -81, -87, -93, -99) — these are Highcharts auto-generating tick positions below category index 0 (no min constraint set on y-axis). Canvas utilization approximately 33-37%.
      Legibility verdict: PASS for text readability; FAIL for layout (severe wasted space).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface. PASS.
      Chrome: Title and subtitle visible in light text. Y-axis label "Frequency (Hz)" visible in light color. X-axis label "Time (seconds)" visible in light color. Tick labels in light color (INK_SOFT token applied). Colorbar labels light. No dark-on-dark failures detected. PASS.
      Data: Heatmap colors are identical to light render (viridis: purple→yellow, same stops). The chirp diagonal stripe is equally clear. Data colors confirmed identical to light render — only background and chrome flipped. PASS.
