review:
  strengths:
  - Correct Walter-Lieth 1:2 scaling convention (10°C = 20mm, precip/2 on shared axis)
  - 'Semantic color mapping from Imprint palette: temperature→red (#AE3030), precipitation→blue
    (#4467A3), frost→cyan (#2ABCCD)'
  - Color-coded axis titles (left Y in red, right Y in blue) — professional, self-documenting
    design
  - Smooth interpolated ribbons via approx() produce accurate crossings between temp
    and precip curves
  - Frost month indicator (January) correctly rendered below the 0°C dashed reference
    line
  - Station metadata elegantly placed in subtitle (elevation, annual mean T, annual
    ΣP)
  - Both light and dark themes fully functional with correct theme-adaptive chrome
    tokens
  weaknesses:
  - Fills use solid alpha transparency (alpha=0.30) instead of the spec-prescribed
    hatching (humid period) and dotting (arid period) patterns — reduces accessibility
    and diverges from canonical Walter-Lieth convention
  - dplyr is imported but not used — all data manipulation is base R; remove the unused
    import
  - 'SC-02: No hatching/dotting patterns as explicitly stated in spec ("blue/hatched"
    for humid, "red/dotted" for arid) — solid fills are functional but deviate from
    the specification'
  - 'LM-02: Could leverage ggplot2-specific annotation_custom() or geom_polygon()
    with pattern fills (ggpattern) for the hatching convention'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface.
      Chrome: Title "Ankara, Turkey · climograph-walter-lieth · r · ggplot2 · anyplot.ai" bold, dark ink, clearly readable (~70% plot width). Subtitle "891 m a.s.l. · T = 11.8°C · ΣP = 352 mm" in INK_SOFT, readable. Left Y-axis label "Temperature (°C)" in matte red, right Y-axis label "Precipitation (mm)" in blue — color-coded to match their data series. Tick labels on all axes in INK_SOFT, small but readable.
      Data: Red temperature curve (#AE3030) rises from near 0°C in January to ~23.5°C peak in July-August, then drops back. Blue precipitation curve (#4467A3, scaled precip/2) shows inverse pattern with a spring peak (~21°C equivalent) and summer trough (~6-8°C equivalent). Blue semi-transparent fill covers the humid period (Nov–May) where precipitation > temperature. Red semi-transparent fill covers the arid period (June–September) where temperature > precipitation. Cyan (#2ABCCD) frost-indicator rectangle sits in the January position just below the dashed 0°C reference line, clearly visible.
      Legibility verdict: PASS — all titles, axis labels, tick marks, and data elements clearly readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface.
      Chrome: Title and subtitle rendered in near-white (#F0EFE8 / #B8B7B0), clearly readable against the dark background. Left Y-axis label stays red, right stays blue — both remain readable in dark mode. Tick labels in INK_SOFT (lighter tone), visible. Dashed 0°C reference line visible as a lighter dashed line.
      Data: Temperature and precipitation curves retain their identical data colors (#AE3030 and #4467A3) from the light render — only chrome flips. Blue humid fill reads as a darker navy against the near-black background (still distinguishable). Red arid fill renders as a dark brownish-red in summer months — clearly demarcated by the curves even if somewhat low-contrast on its own. Cyan frost indicator for January is clearly visible. No dark-on-dark failures detected.
      Legibility verdict: PASS — all text elements readable; data colors consistent with light render; no chrome leakage into data elements.
