review:
  strengths:
  - Technically sophisticated hatching (diagonal lines via geom_segment) and arid
    stipple dots (geom_point on filtered grid) — achieving Walter-Lieth fill conventions
    in pure ggplot2 without native pattern-fill support is non-trivial and well-executed
  - 'Semantic Imprint palette application is correct and well-justified: temperature→red
    (#AE3030), precipitation→blue (#4467A3), frost→cyan (#2ABCCD) follows the style
    guide''s domain-convention exception and is labelled in a comment'
  - Dual y-axis with exact 1:2 Walter-Lieth scaling (sec_axis(~ . * 2)) is correctly
    wired and the colored axis titles (temp label in red, precip label in blue) serve
    as an implicit legend — elegant design choice
  - 'Theme adaptation is flawless: both light and dark renders pass the readability
    check with no dark-on-dark or light-on-light failures; all chrome tokens correctly
    flip while data colors stay identical'
  - Realistic station data for Ankara, Turkey (1991–2020 reference period) with authentic
    climate normals and full metadata in subtitle (elevation, annual mean T, annual
    ΣP)
  weaknesses:
  - Right y-axis ticks stop at 60 mm — the spec explicitly requires ticks at 0, 20,
    40, 60, 100 mm on the precipitation axis. Even though Ankara's precip never exceeds
    43 mm, the canonical Walter-Lieth layout includes the 100 mm reference tick. Add
    breaks = c(0, 20, 40, 60, 100) and extend y limits so the right axis reaches 100
    mm (left axis would need to reach 50°C as well, or the 100 mm label can sit at
    the scale boundary)
  - No legend or annotation explains the fill conventions (hatching = humid period,
    stipple dots = arid period) — experienced climatologists know the convention but
    general audiences do not. A small annotate() or geom_text() label ('Humid' near
    a hatched region, 'Arid' near the dotted region) would improve accessibility
  - Hatching line density in dark render is slightly reduced compared to light render
    because the blue lines (alpha=0.65) on the near-black background have less contrast.
    Increasing alpha to 0.80–0.85 for the hatch segments in the dark theme would improve
    dark-mode readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, no pure white.
      Chrome: Bold dark title "Ankara, Turkey · climograph-walter-lieth · r · ggplot2 · anyplot.ai" clearly readable. Muted subtitle "891 m a.s.l. · T = 11.8°C · ΣP = 352 mm" readable. Left axis title "Temperature (°C)" in red, right axis title "Precipitation (mm)" in blue — both clearly visible. Tick labels on both axes legible at 8pt.
      Data: Red temperature line (#AE3030) rises from -0.5°C (Jan) to 23.5°C (Jul–Aug) and falls back. Blue precipitation line (#4467A3) shows inverse pattern with winter highs (~38mm Jan) and summer trough (~12mm Aug). Blue diagonal hatching fills humid periods (winter and autumn). Red stipple dots fill the arid summer period (Jun–Sep). Cyan/teal frost band visible below 0°C baseline for January. Dashed horizontal reference at 0°C.
      Legibility verdict: PASS — all text readable, no light-on-light failures, data elements clearly distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, no pure black.
      Chrome: Title switches to light text on dark background — fully readable with no dark-on-dark failure. Subtitle in muted light text (#B8B7B0) — readable. Left axis "Temperature (°C)" in red (#AE3030) and right axis "Precipitation (mm)" in blue (#4467A3) — both readable. Tick labels in #B8B7B0 — visible against dark background. No instances of dark text on dark background.
      Data: Temperature and precipitation lines identical colors to light render. Blue hatching slightly less vivid due to lower contrast on dark bg (alpha 0.65) but still clearly visible. Arid region stipple dots (#AE3030 at alpha 0.70) visible. Frost band (cyan #2ABCCD, alpha 0.40) clearly visible against dark bg. Data colors are identical between both themes — only chrome flips.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures detected.
