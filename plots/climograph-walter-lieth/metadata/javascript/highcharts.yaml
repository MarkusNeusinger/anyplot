review:
  strengths:
  - 'Correct Walter-Lieth dual-axis scaling: left 0–40°C, right 0–80mm, preserving
    the canonical 10°C=20mm ratio'
  - Smart title auto-scaling formula (22 * 67 / titleText.length) correctly handles
    the long mandatory title
  - 'Semantic color assignment justified and correct: Imprint matte-red (#AE3030)
    for temperature, Imprint blue (#4467A3) for precipitation — universally expected
    in meteorology'
  - 'Real climate data for Seville Airport (1991–2020 normals): station name, elevation,
    annual mean temp and total precipitation all factually accurate'
  - 'Full token-based theming: both renders use correct backgrounds (#FAF8F1 light
    / #1A1A17 dark), all chrome adapts cleanly with no dark-on-dark failure'
  - 'Clean flat code structure: no functions/classes, animation disabled, credits
    disabled, deterministic data'
  - Right-axis grid disabled to reduce clutter while retaining left-axis gridlines
    for temperature reference
  weaknesses:
  - 'CRITICAL — Missing humid/arid fills between the temperature curve and precipitation
    bars. The spec explicitly calls this ''the diagram''s defining visual feature'':
    blue fill (or hatching) where precipitation > temperature×2 (humid period), red
    fill (or dotting) where temperature×2 > precipitation (arid period). Without these
    fills the chart is a generic dual-axis bar+line chart, not a Walter-Lieth climograph.
    Implement using pre-computed SVG polygon fills on the Highcharts SVG layer, or
    by splitting each month''s column into ''humid-portion'' and ''arid-portion''
    sub-segments using stacked columns with two color bands.'
  - Missing frost-period indicators along the x-axis baseline. For Seville no months
    have mean temp < 0°C so the frost band is empty, but the code must include the
    logic and render nothing rather than omitting it entirely — the spec requires
    the structure to exist.
  - 'First series (precipitation, palette[2] = #4467A3) is not brand green (#009E73).
    The semantic exception is well-justified (blue=precipitation, red=temperature
    are universal meteorological conventions) but palette compliance scoring still
    deducts for the absence of brand green as first series.'
  - Design storytelling is limited without the fills. The arid vs humid contrast is
    visible from bar height vs line position, but the chart lacks the distinctive
    visual cue that makes Walter-Lieth diagrams instantly recognizable to climatologists.
    Adding the fills and optionally labeling the 'Arid period' zone would significantly
    raise DE-03.
  - No plot-border removal or refined spine treatment — the default Highcharts chart
    frame is retained, adding minor visual noise.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white
      Chrome: Title "Seville Climate · climograph-walter-lieth · javascript · highcharts · anyplot.ai" in dark ink, bold, left-aligned — readable. Subtitle "Seville (Aeropuerto) · 34 m a.s.l. · T̄: 18.9°C · P: 511 mm/yr" in secondary muted ink — readable. Left-axis title "Temperature (°C)" in matte-red, right-axis title "Precipitation (mm)" in blue, both readable and color-coded to match their series. Tick labels on both axes in appropriately smaller text — all readable.
      Data: Blue (#4467A3) column bars for precipitation rising high in winter months (Oct–Jan ~66–72mm) and nearly disappearing in summer (Jul: 1mm). Dark-red (#AE3030) spline line for temperature peaks at Jul–Aug (~28°C) and dips to Jan (~10°C). Dual-axis Walter-Lieth scaling (0–40°C / 0–80mm) correctly reflects the 1:2 ratio. Summer drought pattern (Jun–Sep) is visually evident from low bar heights vs high temperature line. Legend in upper-right with elevated background, two entries: Precipitation (blue dot) and Temperature (red line+dot).
      Legibility verdict: PASS — all text elements readable on light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title and subtitle render in light/white text against dark background — fully readable. Left-axis labels (temperature, °C) in matte-red remain visible on dark background. Right-axis labels (precipitation, mm) in blue remain visible on dark background. X-axis month labels in light muted text — readable. Legend text in light color on dark elevated background (#242420) — readable. Grid lines subtle and visible. No dark-on-dark failure detected.
      Data: Precipitation bars and temperature spline appear in identical colors to the light render (#4467A3 blue bars, #AE3030 red spline) — data colors are unchanged between themes as required. Visual pattern (summer drought) identical to light render.
      Legibility verdict: PASS — all text elements readable on dark background; chrome adapts cleanly; no dark-on-dark failure.
