review:
  strengths:
  - Correct Walter-Lieth dual-axis setup with 2:1 temperature/precipitation scaling
    (10°C ≡ 20mm) implemented accurately
  - 'Semantic color choices are fully justified by meteorological convention: Imprint
    blue (#4467A3) for precipitation, Imprint matte-red (#AE3030) for temperature
    — valid palette-compliant semantic exceptions'
  - Arid period SVG overlay fills (red semi-transparent rectangles between temperature
    spline and precipitation bar tops) are drawn correctly and cleanly via Highcharts
    renderer API
  - Stacked column design elegantly splits precipitation into 'base' (up to T×2) at
    0.85 opacity and 'humid excess' (above T×2) at 0.42 opacity, providing visual
    distinction without requiring an area chart
  - Station metadata (name, elevation, annual mean T, annual total P) surfaced as
    subtitle in the canonical WL header position
  - Frost-month indicator code is present and structurally complete; Seville has no
    sub-0°C months so nothing renders — this is correct
  - 'Highly idiomatic Highcharts: dual yAxis, stacking, spline, linkedTo, renderer.g/path/rect,
    events.render, animation:false in both locations, credits disabled, transparent
    background'
  - Custom SVG renderer usage (chart.renderer.path, chart.renderer.g with zIndex)
    for arid fills and frost bands is a genuinely advanced Highcharts technique that
    redraw-safe via events.render
  - Title uses optional descriptive prefix ('Seville Climate · ') plus the required
    anyplot format; font size scaled via formula to avoid overflow
  - Chrome correctly adapts between themes via t.ink / t.inkSoft / t.grid / t.elevatedBg
    tokens; no dark-on-dark text failures for chrome elements
  weaknesses:
  - 'Explicit humid-period fill is absent: the spec requires ''Fill the area between
    the curves: blue/hatched where precipitation > temperature curve (humid period)''.
    The implementation shows humid excess only via the lighter stacked bar segment;
    there is no blue fill drawn between the temperature spline and the top of the
    precipitation bars in humid months. Fix: in drawOverlays(), add a renderer.path()
    SVG fill (using PRECIP_COLOR with ~0.3 opacity) that spans from the temperature
    Y-pixel down to the bar-top Y-pixel for each month where precipitation[i] > temperature[i]
    * 2.'
  - 'Dark-mode arid fill has very poor visibility: fill-opacity 0.28 applied to #AE3030
    on the #1A1A17 background produces approximately #43201E — a very dark brownish-maroon
    that is barely distinguishable from the near-black background. The arid period
    is the defining visual feature of a Walter-Lieth diagram; it must be clearly visible
    in both themes. Fix: increase fill-opacity to at least 0.5 (or ideally 0.6-0.65)
    in dark mode. Branch on window.ANYPLOT_THEME: const ARID_OPACITY = window.ANYPLOT_THEME
    === ''dark'' ? 0.55 : 0.28.'
  - Axis line colors (temperature axis line in TEMP_COLOR red, precipitation axis
    line in PRECIP_COLOR blue) are aesthetically purposeful but the matte-red (#AE3030)
    left axis and tick labels have marginal contrast in dark mode against the near-black
    background. Not a hard failure, but consider using t.inkSoft for tick labels with
    only the axis title styled in the series color.
  - 'Missing perhumid (>100 mm) scale compression and solid blue band: the spec explicitly
    calls for compressed 10:1 scale above 100 mm and a solid blue fill in that band.
    Seville''s max is 72 mm so it doesn''t trigger here, but the structure is entirely
    absent. This limits reuse with wetter stations. Fix: if any precipitation value
    exceeds 100 mm, switch the right-axis max to accommodate and fill the perhumid
    band.'
  - 'DE-01/DE-02: Visual refinement is competent but not highly polished — no spine
    removal equivalent (Highcharts still shows the full plot-area box), and the arid
    fill opacity difference between themes reveals that the overlays were not explicitly
    designed for dark-mode contrast.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), correct theme surface. Clean and bright.
      Chrome: Title "Seville Climate · climograph-walter-lieth · javascript · highcharts · anyplot.ai" in bold dark text (#1A1A17), clearly readable. Subtitle "Seville (Aeropuerto) · 34 m a.s.l. · T̄: 18.9°C · P: 511 mm/yr" in smaller secondary text, readable. Left y-axis "Temperature (°C)" label in matte-red; right y-axis "Precipitation (mm)" label in Imprint blue; both readable against the cream background. Month tick labels (Jan–Dec) along x-axis in soft ink color, all readable. Legend box (upper right, framed with elevated background) shows blue dot for Precipitation and red line+dot for Temperature, clearly legible.
      Data: Stacked blue (#4467A3) bars for precipitation — darker base segment (up to T×2) and lighter blue top segment (humid excess above T×2). Red (#AE3030) spline with circular markers for temperature. In summer months (May–Sep), a pinkish-red semi-transparent SVG fill is clearly visible between the temperature spline (above) and the short precipitation bar tops (below), showing the arid period. In winter months, bars tower above the temperature line, correctly indicating humid periods. The arid fill color is distinctly visible against the cream background.
      First series color: Imprint blue (#4467A3) for precipitation — semantic exception justified by universal meteorological convention (water/rain → blue). Temperature uses Imprint matte-red (#AE3030). Both are valid Imprint palette members.
      Legibility verdict: PASS — all title, axis label, tick label, and legend text is clearly readable. No dark-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correct dark theme surface.
      Chrome: Title in light ink (#F0EFE8) clearly readable against near-black background. Subtitle in secondary light text, readable. Left y-axis labels (matte-red, #AE3030) and right y-axis labels (Imprint blue, #4467A3) remain visible against the dark background — marginal contrast for these semantic-color axis labels but not a legibility failure. Month tick labels and numeric tick labels are all in the soft-ink light token and readable.
      Data: Blue bars for precipitation are clearly visible against the dark background. The temperature red spline is visible. HOWEVER, the arid fills (rendered as SVG rectangles with fill-opacity: 0.28 of #AE3030 on #1A1A17) result in approximately #43201E — a very dark brownish-maroon that is barely distinguishable from the near-black background. The arid period is still detectable on close inspection but significantly less prominent than in the light render. Data colors (blue bars, red spline) are identical to the light render as required; only chrome adapts.
      Legibility verdict: PASS for text/chrome elements (no dark-on-dark text failures). FAIL for the arid fill visual feature — the fill is near-invisible against the dark background due to insufficient opacity, undermining the chart's primary storytelling element in dark mode.
