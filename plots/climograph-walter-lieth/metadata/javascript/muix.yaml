review:
  strengths:
  - Correct Walter-Lieth 2:1 dual-axis scaling with right-axis formatter producing
    accurate 0–100mm ticks aligned to the temperature axis
  - Expert use of MUI X composable hooks (useDrawingArea, useXScale, useYScale) to
    inject coordinate-aware SVG polygon fills — genuinely idiomatic and distinctive
    MUI X pattern
  - 'Valid semantic colour exception: temperature=#AE3030 (red) and precipitation=#4467A3
    (blue) follow the universally recognised climate-science convention documented
    in the Imprint palette guide'
  - Linear interpolation at curve-crossing points produces mathematically correct
    fill boundaries between humid and arid periods
  - Custom 4-item legend elegantly distinguishes line symbols from fill-patch symbols
  - 'Both theme renders pass the theme-readability check: ThemeProvider correctly
    adapts chrome across light and dark, data colours are identical'
  - Right spine suppressed via sx selector and disableLine, giving L-shaped axis frame
  - 'Fill opacity raised to 0.38 (from 0.28 in attempt 1): fills are now visually
    prominent in both light and dark renders'
  - Frost month indicator implemented in WalterLiethFill (architecturally complete,
    just not triggered by Lisbon's mild data)
  - Real, factually accurate Lisbon 1991–2020 climate normals; annual mean 17.5°C
    and total 567mm are correct
  weaknesses:
  - Traditional Walter-Lieth hatching/dotting patterns are absent — spec describes
    blue/hatched (humid) and red/dotted (arid) fills as 'the diagram's defining visual
    feature'; current implementation uses solid semi-transparent fills only
  - Tick label font size (13px CSS / 26px native) sits slightly below the muix style-guide
    recommendation of 14–16px; readability at mobile widths (~400px) is marginal
  - 'FROST_COLOR (#2B4B8C) is a custom hex not in the Imprint palette — if frost months
    were ever rendered, this would be a VQ-07 violation; should use #4467A3 (Imprint
    blue) for the frost band instead'
  - 'Design sophistication is good but not publication-level: no explicit spine-removal
    for top border (MUI X default), and the fills could benefit from hatching texture
    for classical fidelity'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — correct for light theme.
      Chrome: Station header "Lisbon, Portugal — 77 m a.s.l." in bold dark ink (fontSize=20) is fully readable. Subtitle "Annual mean 17.5 °C · Annual total 567 mm · 1991–2020 climate normals" in inkSoft (fontSize=13) is readable. Left Y-axis label "Temperature (°C)" and right Y-axis label "Precipitation (mm)" are clearly visible (fontSize=14). Month tick labels (Jan–Dec) and temperature/precipitation tick labels are legible. Custom legend shows red line, blue line, blue fill patch, red fill patch. Plot title at bottom is readable.
      Data: Matte-red (#AE3030) temperature line rises from ~11°C (Jan) to peak ~24.5°C (Aug), then falls. Blue (#4467A3) precipitation line starts high (~38.5 scaled, Jan), falls sharply to ~2 (Jul), recovers to ~45.5 (Nov). Semi-transparent blue fills (opacity 0.38) cover humid winter/autumn periods (Oct–May). Semi-transparent red fills (opacity 0.38) cover the arid summer period (Jun–Sep). Curve crossings handled correctly with interpolated intersection points. Horizontal grid lines are subtle. No overlap, no overflow.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — correct for dark theme.
      Chrome: Station header and subtitle text render in light cream/off-white (ThemeProvider inverts ink tokens). Axis labels "Temperature (°C)" and "Precipitation (mm)" are light-coloured and readable. Tick labels are light against the dark background. No dark-on-dark failures detected.
      Data: Temperature line remains #AE3030 (identical to light render). Precipitation line remains #4467A3 (identical). Fills appear as deeper navy (humid) and deep wine-red (arid) due to the semi-transparent layers on the dark surface — both are distinguishable from the background and from each other. Data colours are identical between themes; only chrome flips.
      Legibility verdict: PASS — all text readable against the warm near-black background; no dark-on-dark issues.
