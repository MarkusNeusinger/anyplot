review:
  strengths:
  - Correct Walter-Lieth 2:1 dual-axis scaling with right-axis formatter producing
    accurate 0-100mm ticks
  - Excellent use of MUI X useDrawingArea/useXScale/useYScale hooks for coordinate-aware
    SVG polygon fills - a genuinely idiomatic and distinctive MUI X pattern
  - Semantically correct colour assignment (temperature=red, water=blue) using Imprint
    palette members with documented semantic exception
  - Real, factually accurate Lisbon 1991-2020 climate data with correct annual means
  - Custom 4-item legend elegantly distinguishing line symbols from fill symbols
  - Both theme renders pass the theme-readability check with appropriate chrome inversion
    via ThemeProvider
  - Linear interpolation at curve crossing points produces mathematically correct
    fill boundaries
  weaknesses:
  - 'Design Excellence is the main gap: removing top/right chart spines would improve
    visual refinement (DE-02); explicit spine suppression achievable via sx on ChartContainer
    or axisHighlight suppression'
  - The semi-transparent fills (fillOpacity=0.28) are visually less distinct in the
    dark render - increasing to 0.35-0.40 would preserve readability in both themes
    without over-saturating the light render
  - Frost month indicator band is absent (architecturally); even if Lisbon data shows
    nothing, implementing the feature to draw blocks below x-axis for months < 0C
    would make the implementation spec-complete
  - The anyplot title at the bottom uses t.inkSoft (secondary text color); font size
    could be slightly larger for better mobile readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Bold station header "Lisbon, Portugal — 77 m a.s.l." in dark ink at top-center. Subtitle "Annual mean 17.5 °C · Annual total 567 mm · 1991–2020 climate normals" in inkSoft. Axis labels "Temperature (°C)" (left) and "Precipitation (mm)" (right) at 14px CSS. Tick labels at 13px CSS on both axes. Custom 4-item legend below chart. Bottom anyplot title at dynamic 22px. All text readable.
      Data: Red temperature line (#AE3030) rising Jan~11°C to Aug~24.5°C then falling. Blue precipitation line (#4467A3) starting high (~38.5 scaled) in Jan, dipping to ~2 in Jul, recovering to ~46.5 in Nov. Semi-transparent blue fills (fillOpacity=0.28) in humid periods (Oct–May), red fills in arid period (Jun–Sep). First series uses semantic exception (temperature=red, not brand green) — valid domain convention.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Station header and subtitle render in light-colored text (MUI ThemeProvider correctly maps ink tokens). Axis labels and tick labels in light-gray. Grid lines visible as subtle light-on-dark rules. All chrome elements are light-on-dark — no dark-on-dark failures detected.
      Data: Temperature line (#AE3030) and precipitation line (#4467A3) are identical to light render — data colours unchanged. Humid fills appear as dark navy blue areas; arid fill appears as dark maroon. At fillOpacity=0.28 over the near-black surface, fills are more saturated/darker than in light render but remain distinguishable from the background.
      Legibility verdict: PASS — all text readable in dark render. No dark-on-dark failures.
