review:
  strengths:
  - Custom Chart.js plugin correctly implements Walter-Lieth humid/arid fill zones
    with pixel-space crossover detection — technically sophisticated and visually
    accurate
  - Dual-axis configuration preserves the canonical 1:2 Walter-Lieth scaling (TEMP_MIN*2=PRCP_MIN,
    TEMP_MAX*2=PRCP_MAX) maintaining direct curve comparability
  - Semantic color convention (red=temperature, blue=precipitation) aligns with domain
    expectation; axis labels colored to match their series for immediate readability
  - Station metadata subtitle (name, elevation, period, annual means) correctly positioned
    in the conventional Walter-Lieth header location
  - 'Both renders fully theme-adaptive: data colors identical, all chrome (text, grid,
    frost bands, reference line) correctly follows ANYPLOT_TOKENS'
  weaknesses:
  - Perhumid (>100 mm precipitation) scale compression not implemented — the canonical
    Walter-Lieth diagram compresses the precipitation axis to 10:1 above 100 mm and
    fills that band solid blue; the implementation omits this feature even as a dormant
    capability
  - Precipitation axis maximum is 80 mm (TEMP_MAX * 2 = 80) instead of the conventional
    100 mm upper tick; spec specifies right-axis ticks at '0, 20, 40, 60, 100 mm'
  - All four chart borders/spines retained; removing top and right borders would give
    a cleaner L-frame aesthetic consistent with the style guide
