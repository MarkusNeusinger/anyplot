      Data: Temperature line in #AE3030 (matte red), precipitation line in #4467A3 (blue). Blue semi-transparent fill for humid period (Jan–May, Sep–Dec). Red/rose fill for summer arid period (Jun–Sep). Crossover correctly detected. Dashed 0°C reference line visible. Dark gray frost bands at bottom for January (T=-3°C) and February (T=-1°C).
