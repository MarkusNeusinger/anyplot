review:
  strengths:
  - Technically sophisticated SVG pattern + mask approach for arid/humid fill areas
    — a distinctly D3/SVG technique not easily replicated in higher-level libraries
  - Perfect Walter-Lieth scaling convention (10°C ↔ 20mm) with perhumid compression
    coded and the 2:1 axis ratio visually exact
  - 'Excellent data choice: Palermo, Sicily shows a textbook Mediterranean climate
    with clearly visible arid summer and humid winter periods'
  - Complete spec compliance — dual axes, hatched/dotted pattern fills, header with
    station metadata, color-coded annual statistics, correct tick values
  - Theme-adaptive chrome properly implemented using Imprint tokens (t.ink, t.inkSoft,
    t.grid) in both light and dark renders
  - Semantic color choice (red=temperature, blue=precipitation) correctly uses Imprint
    palette positions 5 and 3 per the scientific convention
  weaknesses:
  - Vertical month dividers add minor visual clutter — they are not part of the standard
    Walter-Lieth form; removing them or reducing opacity to 0.2 would clean up the
    plot
  - Legend font size (13px) is slightly smaller than the 14px tick labels; raise to
    14px for consistent sizing
  - Station name 'Palermo' (26px bold) is visually larger than the mandated anyplot
    title (20px) — inverted typographic hierarchy; either raise the title to 22px
    or reduce station name to 22px
  - Frost month indicator logic is absent from the code — while Palermo has no frost
    months, future reuse or adaptation of the snippet would silently omit this required
    feature; add a conditional rendering block even if it produces no visual output
    for this data
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct, not pure white.
      Chrome: Mandated title "climograph-walter-lieth · javascript · d3 · anyplot.ai" in dark text at ~20px, centered, occupying ~55% of width. Header below shows "Palermo" in large bold dark text (26px), location subtitle "Sicily, Italy | 15 m a.s.l. | 1991–2020" in secondary text. Annual mean temperature "18.3 °C" in red (#AE3030) and "551 mm/yr" in blue (#4467A3) on the right side of the header. A thin separator line divides the header from the plot area. Left axis ticks (0–50°C) and right axis ticks (0–100mm) with labels in dark secondary text. Month labels (Jan–Dec) along the bottom. Legend in upper-right of plot area with "Arid (T > P/2)" and "Humid (P > 2T)" entries.
      Data: Temperature line in #AE3030 (Imprint red, position 5), precipitation line in #4467A3 (Imprint blue, position 3). Arid period (May–Sep) filled with semi-transparent red dots on light red ground. Humid periods (Jan–Apr, Oct–Dec) filled with diagonal hatching on light blue ground. Data curves are crisp at 2.5px stroke-width.
