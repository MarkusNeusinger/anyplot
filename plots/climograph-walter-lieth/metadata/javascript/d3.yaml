    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct, not pure black.
      Chrome: All text adapts to light color correctly. Title in near-white, station name "Palermo" and subtitle in light text. Annual stats retain semantic colors (red/blue). Axis tick labels and axis labels in light secondary color — no dark-on-dark failures detected. Separator line in theme-adaptive grid color, subtle but visible.
      Data: Temperature line still #AE3030 and precipitation line still #4467A3 — identical to light render as required. Arid dotted fill adapts to dark surface (pattern now shows as dark-red dots visible against the near-black background). Humid hatched fill remains distinguishable. Both fills rendered correctly in dark context.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark failures; data colors identical to light render; only chrome flipped.
