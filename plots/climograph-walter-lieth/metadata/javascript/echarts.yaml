review:
  strengths:
  - Correct Walter-Lieth 1:2 axis-scaling convention (10°C ↔ 20 mm) implemented cleanly
    with dual Y-axis and precipitation formatter dividing real values by 2
  - 'Semantically correct color choice: temperature=matte-red (#AE3030), precipitation=blue
    (#4467A3) — both Imprint palette members, documented as semantic exception for
    domain convention'
  - Station metadata header executed natively with ECharts graphic layer (Barcelona,
    5 m a.s.l., 16.3°C, 625 mm yr⁻¹)
  - Stacked area series technique for humid/arid fill regions is idiomatic ECharts
    — clean and correct
  - Zero-degree markLine with dashed style provides a useful frost-reference baseline
  - 'Theme-adaptive chrome throughout: t.ink, t.inkSoft, t.grid tokens correctly applied;
    axis line colors match series colors (red left axis, blue right axis)'
  - Real, factually accurate Barcelona 1991–2020 climate data clearly demonstrates
    a Mediterranean summer-drought pattern
  - Code is flat, deterministic, and well-commented — CQ scores full marks
  weaknesses:
  - 'Arid fill nearly invisible in dark render: rgba(174,48,48,0.25) at 25% opacity
    on #1A1A17 background blends into the near-black surface — the summer drought
    zone (the diagram''s defining visual feature) is barely distinguishable. Fix:
    increase opacity to ~0.55 for dark theme, or branch on window.ANYPLOT_THEME and
    use ''rgba(174,48,48,0.55)'' in dark mode vs ''rgba(174,48,48,0.28)'' in light
    mode'
  - 'Frost indicator feature absent: the spec requires colored band/blocks beneath
    the x-axis for months with mean temperature < 0°C (and lighter band for absolute
    minima < 0°C). Barcelona has no frost months, so visually nothing is missing,
    but the mechanism (markArea below x-axis, or custom graphic element) is not present
    at all — a proper implementation should include the logic even if it renders nothing
    for this dataset'
  - 'Perhumid zone (>100 mm) handling missing: the spec states that above 100 mm the
    precipitation scale is conventionally compressed 10:1 with a solid blue fill.
    Barcelona''s peak (91 mm) is just below the threshold, so it doesn''t trigger,
    but the implementation has no mechanism for this and would render incorrectly
    for a wetter station'
  - 'Humid fill in dark render is also darker than ideal: rgba(68,103,163,0.28) at
    28% opacity over #1A1A17 results in a dim steel-blue that loses contrast. Consider
    ~0.45 opacity in dark mode for the humid fill as well'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct.
      Chrome: Title "climograph-walter-lieth · javascript · echarts · anyplot.ai" is bold, dark, centered at top — fully readable. Station header "Barcelona" in bold dark text + subtitle "5 m a.s.l. · 16.3 °C · 625 mm yr⁻¹" in softer dark text — both readable. Left Y-axis label "Temperature (°C)" in matte-red and right Y-axis label "Precipitation (mm)" in blue — both readable. Tick labels -10° to 50° on left (red), 0–100 mm on right (blue) — clear. Month labels Jan–Dec on X-axis — readable. Legend (Temperature / Precipitation with colored swatches) at upper-right — readable.
      Data: Temperature line in #AE3030 (matte-red) with circle markers, precipitation line in #4467A3 (blue) with circle markers — both 3px width, clearly visible. Blue semi-transparent fill covers most of the year (humid period where precipitation > temperature). Pinkish-red fill in summer months Jun–Aug (arid period) is visible. Dashed 0°C reference line present.
      Legibility verdict: PASS — all text fully readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title text is light-colored and clearly readable against the dark background. Station header "Barcelona" is bold and light — readable. Axis labels are light-colored — readable. Tick labels use semantic colors (red for temperature, blue for precipitation) which both remain distinguishable on dark background. Month labels are light — readable. Legend text is light — readable.
      Data: Temperature line (#AE3030) and precipitation line (#4467A3) remain identical to light render — data colors unchanged as required. Blue humid fill is visible as a dark blue region but reduced in contrast compared to light. The arid (summer drought) fill is rgba(174,48,48,0.25) = a very dark brownish-maroon on the #1A1A17 background that is nearly indistinguishable from the background — the defining visual feature of the Walter-Lieth diagram (summer drought period) is severely undercontrasted in dark mode.
      Legibility verdict: PASS for text elements; FAIL for arid fill visibility — the summer drought fill blends into the dark background at 25% opacity.
