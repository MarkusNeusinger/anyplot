review:
  strengths:
  - Correct Walter-Lieth 1:2 scaling convention with proper perhumid zone compression
    above 100 mm — the precipNorm transform is exact
  - 'Dual-axis implementation with domain-appropriate semantic color coding (matte-red
    #AE3030 for temperature, blue #4467A3 for precipitation) — both are Imprint palette
    members and match the classic climograph convention'
  - Station header (Barcelona, elevation, annual means) cleanly rendered via ECharts
    graphic overlay, following traditional Walter-Lieth conventions
  - Stacked-line fill approach for humid/arid band detection is idiomatic ECharts
    — the base+fill stack pairs correctly isolate each zone between the two curves
  - 'Theme-adaptive fill opacities (HUMID_OPACITY/ARID_OPACITY raised in dark mode)
    compensate for the lower contrast of translucent fills on #1A1A17'
  - 'Realistic Barcelona 1991-2020 climate normals produce a textbook Mediterranean
    signature: summer arid dip (Jun-Jul) and autumn rainfall peak (Oct) visible at
    a glance'
  weaknesses:
  - 'Color-coded axis labels and ticks (temperature #AE3030 on #1A1A17 dark background)
    have sub-3:1 contrast ratio (~2.76:1) — domain convention requires colored axes
    but a slightly brighter shade (e.g. #CF4444) in dark mode only would pass WCAG
    3:1 without breaking the semantic'
  - 'Precipitation axis labels (#4467A3 on #1A1A17) are borderline at ~3.1:1 contrast
    in dark mode — just passing, but a brighter blue (e.g. #5580CC) for dark mode
    would give comfortable margin'
  - Frost indicator mechanism is correctly coded but produces no visual output for
    Barcelona (all months above 0°C); adding a station with at least one frost month
    (e.g. Madrid or Zaragoza) would demonstrate the full feature set including the
    colored frost band
  - 'Legend placed top-right overlaps slightly with the right y-axis labels area —
    bumping right: ''10%'' and using a slightly smaller legend fontSize (12) would
    clean up that corner'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, no pure white
      Chrome: Title "climograph-walter-lieth · javascript · echarts · anyplot.ai" centered at top in dark ink, well-proportioned (~55% width). Station header "Barcelona / 5 m a.s.l. · 16.3 °C · 625 mm yr⁻¹" at top-left in dark ink and inkSoft. Left y-axis spine and labels in matte-red (#AE3030), right y-axis spine and labels in blue (#4467A3). Month labels (Jan–Dec) along x-axis in inkSoft. Legend (Temperature/Precipitation) at top-right in dark ink. Subtle horizontal grid lines.
      Data: Temperature line in matte-red (#AE3030), precipitation line in blue (#4467A3). Blue semi-transparent fill in humid periods (winter/spring and autumn — where precipitation > temperature). Pink/red semi-transparent fill in arid period (Jun–Aug — where temperature > precipitation). No perhumid fill visible (Barcelona peaks at 91 mm, below 100 mm threshold). 0°C dashed reference line across the chart.
      Legibility verdict: PASS — all text clearly readable. Color-coded axis labels readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, no pure black
      Chrome: Title in light text (#F0EFE8) clearly visible against dark background. Station header "Barcelona" and metadata in light ink/inkSoft. Left axis (temperature) remains matte-red, right axis (precipitation) remains blue — both readable but marginal contrast on dark background (~2.76:1 and ~3.1:1 respectively). Month tick labels in inkSoft (#B8B7B0). Legend text in light ink. No dark-on-dark text failures.
      Data: Temperature line still #AE3030 — identical to light render. Precipitation line still #4467A3 — identical. Blue humid fills and red/pink arid fills are identically colored, with slightly higher opacity (0.45/0.55 vs 0.28/0.28) to compensate for dark surface. Grid lines adapt to the light-on-dark grid token.
      Legibility verdict: PASS — all text readable. The color-coded axis labels (red and blue on near-black) are readable though borderline on WCAG contrast for the temperature red. No dark-on-dark failures.
