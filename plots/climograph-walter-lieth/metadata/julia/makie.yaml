review:
  strengths:
  - Correct Walter-Lieth 2:1 axis scaling with Makie GridLayout dual-axis overlay
    — two axes at fig[1,1] with linkxaxes! and correctly scaled ylims (Y_BOT*2 / Y_TOP*2
    for right axis)
  - 'Semantic color exception correctly applied: temperature uses Imprint matte red
    (#AE3030) and precipitation uses Imprint blue (#4467A3), both canonical Imprint
    palette members with explicit domain justification comment'
  - 'Expert Makie usage: band! for fills, custom LineElement/PolyElement legend elements,
    colsize! layout control, and poly! with Point2f for frost indicators'
  - 'Data deliberately showcases all three Walter-Lieth features: clear summer arid
    period (Jun-Sep), winter humid period, and one frost month (January) with realistic
    Anatolian continental climate normals'
  - 'Perfect code quality: deterministic hardcoded data, clean KISS structure, only
    used imports (CairoMakie, Colors, Statistics), no over-engineering'
  - Both themes correctly adapted — INK/INK_SOFT tokens applied to all chrome elements;
    legend has ELEVATED_BG background and INK labelcolor
  weaknesses:
  - Spec calls for hatched/dotted fill patterns (blue/hatched humid, red/dotted arid)
    but implementation uses plain alpha fills instead — the humid fill at 40% alpha
    on off-white (#FAF8F1) is quite subtle and the arid fill at 30% alpha on the dark
    background (#1A1A17) renders as very dark maroon, reducing visual distinctiveness
  - Large dead zone from 0°C dashed line down to the frost band (~11°C of empty vertical
    space between the 0°C reference and the frost block at -11 to -13) — reducing
    Y_BOT to around -5 and FRO_BOT to -4 would remove this wasted space while keeping
    the frost indicator
  - No perhumid band implementation (>100mm precipitation → compressed 10:1 scale
    + solid blue fill) — the spec explicitly mentions this, and while the current
    data doesn't exceed 100mm, the feature is absent
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly not pure white
      Chrome: Title "climograph-walter-lieth · julia · makie · anyplot.ai" is dark-on-light, fully readable. Station name "Anatolian Station (894 m a.s.l.)" and climate stats "Mean T = 12.6 °C · Annual P = 382 mm (1991–2020)" visible in upper left. Left axis label "Temperature (°C)" and right axis label "Precipitation (mm)" are clear. Tick labels (-10, 0, 10, 20, 30 on left; 0, 20, 40, 60 on right) are dark (#4A4A44 tone) and readable. Month labels (J-D) along x-axis are clear.
      Data: Temperature line in matte red (#AE3030), precipitation line in Imprint blue (#4467A3). Blue humid fill (40% alpha) covers Jan-May and Sep-Dec. Rosy-pink arid fill (30% alpha) covers Jun-Sep. Both fills visible though the blue is quite subtle. Frost indicator block (solid #4467A3) below x-axis for January. Dashed 0°C reference line visible.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, tick labels, and legend text all appear in light (#F0EFE8/#B8B7B0 tone) — clearly readable against the dark background. No "dark-on-dark" failures. Legend box has elevated dark background (#242420) with subtle frame. Station header text in INK_SOFT (#B8B7B0) is readable.
      Data: Temperature line color identical to light render (matte red #AE3030). Precipitation line identical blue (#4467A3). The blue humid fill at 40% alpha on near-black reads as a darker, steelier blue — still visually distinct. The arid fill at 30% alpha renders as dark maroon on the dark background, which is notably darker/more opaque than the pink of the light render. Frost block remains the same blue. Data colors are consistent with the light render as required.
      Legibility verdict: PASS — all text readable. The arid fill appears more opaque in dark mode (dark maroon vs pink), which slightly reduces clarity of the arid/humid distinction, but this is a design quality issue rather than a legibility failure.
