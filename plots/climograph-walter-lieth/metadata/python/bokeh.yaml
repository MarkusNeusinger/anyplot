    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title in light cream (#F0EFE8) — clearly readable against dark background. Left Y-axis "Temperature (°C)" in matte red — readable (red is visible on dark). Right Y-axis "Precipitation (mm)" in blue — readable. X-axis "Month" in light ink, tick labels in INK_SOFT (#B8B7B0) — readable. Station metadata box on #242420 elevated background with light text — readable. "humid" and "arid" labels in respective data colors — readable. Legend on elevated dark background with light label text — readable. No dark-on-dark text failures.
      Data: Data line colors identical to light render — blue precipitation line, red temperature line, same Imprint palette colors as required. Blue humid fill at 20% alpha on dark background: appears as very dark steel-blue tint, still distinguishable but lower contrast than light mode. Red arid fill at 20% alpha on dark background: appears as very dark maroon (~#381E1C), which is barely distinguishable from the near-black background — this is the most notable visual weakness in dark mode.
      Legibility verdict: PASS — all text and axis labels readable, no dark-on-dark failures. Minor concern: arid fill has very low contrast (red 20% alpha on #1A1A17 produces near-black maroon), reducing fill region visibility in dark theme.
