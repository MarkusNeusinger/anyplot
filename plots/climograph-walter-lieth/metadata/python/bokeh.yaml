review:
  strengths:
  - Correct Walter-Lieth dual-axis implementation with 1:2 temperature-to-precipitation
    scaling
  - 'Semantic color assignments using Imprint palette: red (#AE3030) for temperature,
    blue (#4467A3) for precipitation — matches domain convention explicitly'
  - 'Theme-adaptive chrome with correct #FAF8F1/#1A1A17 backgrounds; dark-mode alpha
    boost (0.32/0.38 vs 0.20) compensates for fill contrast'
  - Station metadata header (name, elevation, annual T/P, period) rendered with elevated
    background box
  - Fine-grained interpolation (1200 points) for smooth crossing-point fills
  - CustomJSTickFormatter for month labels is a distinctive Bokeh feature
  weaknesses:
  - Perhumid zone (>100 mm precipitation) not implemented — Walter-Lieth convention
    compresses the scale 10:1 above 100 mm and fills it solid blue; even though current
    data stays at 72 mm, the feature should be in the code for completeness
  - Right axis tick range stops at 80 mm; spec specifies 0/20/40/60/100 mm ticks to
    mark the perhumid transition point
  - Traditional Walter-Lieth diagrams use hatching/dotting patterns inside humid/arid
    fills (blue hatching = humid, red dotting = arid) — solid alpha fills are a simpler
    but less distinctive treatment
  image_description: |-
