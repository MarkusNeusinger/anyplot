    Light render (plot-light.png):
      Background: Warm cream #FAF8F1 — correct theme surface, no pure white.
      Chrome: Bold dark title "climograph-walter-lieth · python · bokeh · anyplot.ai" at top, ~65% of plot width, fully readable. Left Y-axis labeled "Temperature (°C)" in matte red (#AE3030) with red ticks at 0, 10, 20, 30, 40 — clearly readable. Right Y-axis labeled "Precipitation (mm)" in blue (#4467A3) with blue ticks at 0, 20, 40, 60, 80 — clearly readable. X-axis "Month" in dark ink with gray tick labels (Jan–Dec) — readable. Station metadata annotation box (top-left of plot area): "Valora · 85 m a.s.l. · T = 17.4°C · P = 467 mm/yr · 1991-2020" on elevated cream background with subtle border — readable. "humid" (blue, italic) and "arid" (red, italic) period labels below zero line — visible. Legend (top-right): "Precipitation (mm)" in blue, "Temperature (°C)" in red — readable.
      Data: Blue precipitation line starts high (Jan ~31 on temp axis = 62mm), drops to near-zero (Jun–Jul, ~1.5–2 = 3–5mm), rises back (Oct–Dec). Red temperature line starts low (Jan 9.2°C), peaks summer (Jul–Aug ~26–27°C). Blue shaded humid fill (Jan–Apr where precipitation curve is above temp line). Red shaded arid fill (May–Sep where temp line is above precipitation). Month dots visible on both lines. Dashed zero-degree reference line. First series (precipitation) uses Imprint blue (#4467A3) as justified semantic exception.
