  strengths:
  - Perfect spec compliance — all Walter-Lieth features correctly implemented including
    1:2 axis scaling, humid/arid fills, dual colored axes, station metadata box, zero-degree
    reference, and period labels
  - Justified semantic color mapping — temperature uses Imprint matte red (#AE3030),
    precipitation uses Imprint blue (#4467A3), both from the Imprint palette per domain
    convention
  - Clean idiomatic Bokeh implementation — extra_y_ranges dual-axis, varea fills,
    Span reference line, Label annotations, CustomJSTickFormatter for month labels,
    interactive HTML output alongside PNG
  - Fine interpolation (np.interp) for smooth varea polygon fills that correctly handle
    curve crossing points
  - Complete data quality — climatologically plausible Mediterranean station data
    with correct climate signature (wet winters, dry summers)
  weaknesses:
  - Arid fill (#AE3030 at 20% alpha) has low contrast on dark background (#1A1A17)
    — the mixed color is very dark maroon (~#381E1C) and barely distinguishable from
    the near-black background; consider increasing alpha to 0.30–0.35 for dark theme
  - Full plot border/outline visible (outline_line_color = INK_SOFT) — style guide
    prefers removing top and right spines for cleaner look; set outline_line_color=None
    and selectively draw only left/bottom borders if desired
  - Design Excellence potential not fully realized — colored axes and metadata box
    are good but no spine removal or additional refinement applied
