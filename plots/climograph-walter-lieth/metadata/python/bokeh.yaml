      Chrome: Title "climograph-walter-lieth · python · bokeh · anyplot.ai" bold dark text, fills ~60-65% of plot width — well-proportioned. Left axis label "Temperature (°C)" in red, right axis label "Precipitation (mm)" in blue, x-axis label "Month" in dark ink — all with units, all readable. Tick labels (34pt) clearly visible in INK_SOFT (#4A4A44). Station metadata box (upper left) with semi-transparent elevated background and border — all text readable. Legend upper-right with "Precipitation (mm)" and "Temperature (°C)" entries. "humid" and "arid" italic labels at bottom of chart.
      Data: Temperature line (#AE3030 matte red), precipitation line (#4467A3 blue) — both thick (width=5), with dot markers (size=16). Filled humid zone (blue, Jan–May) and arid zone (red, Jun–Sep) clearly visible with alpha=0.20. Zero-degree dashed reference line visible.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark surface, not pure black
      Chrome: Title in light cream text (#F0EFE8 equivalent) on dark background — clearly readable. Left/right axis labels maintain their semantic colors (red/blue). Tick labels in INK_SOFT (#B8B7B0) — light gray on near-black, readable. Legend text in light gray. Station metadata box uses elevated dark background (#242420) with border.
      Data: Temperature line (#AE3030) and precipitation line (#4467A3) — same colors as light render, consistent identity. Fills are more saturated in dark mode (alpha boosted to 0.32 for humid, 0.38 for arid) to compensate for dark background contrast. Zero-degree reference line visible.
      Legibility verdict: PASS — no dark-on-dark failures; all text is light-colored against the dark surface; data lines and fills are clearly distinguishable
