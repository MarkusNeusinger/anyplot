review:
  strengths:
  - Correct 1:2 Walter-Lieth scaling convention (precip/2 on temperature axis) — core
    climograph requirement met
  - Semantic color override well justified (temperature=#AE3030 red, precipitation=#4467A3
    blue) with both being valid Imprint palette colors for their domains
  - Manual right-side precipitation axis elegantly implemented using geom_segment/geom_text
    with spec-mandated ticks at 0/20/40/60/100 mm
  - 'Station metadata header (subtitle) contains all required fields: station name,
    elevation, annual mean temperature, annual total precipitation, and climate normal
    period'
  - Theme-adaptive chrome correctly implemented; dark render remains readable with
    adaptive fill alpha (0.60 dark vs 0.35 light)
  - Clean flat code structure with no functions or classes; hardcoded Athens climate
    normals are realistic and reproducible
  weaknesses:
  - Missing hatched/dotted fill patterns — spec explicitly calls for 'blue/hatched'
    humid fills and 'red/dotted' arid fills; solid semi-transparent ribbons used instead.
    Consider using matplotlib hatch patterns via geom_ribbon draw_params or overlaying
    a geom_ribbon with a hatched pattern using matplotlib's patch hatch property accessible
    via the plotnine after_plot hook
  - Frost month indicator feature is architecturally absent — the code has no logic
    to draw colored baseline bands for months with mean temperature < 0°C. Athens
    data has no frost months (min Jan = 9.9°C) so this doesn't appear visually, but
    the feature would be missing if the station were changed. Add conditional frost
    band segments even if they render empty for this data
  - Legend ordering places 'Precipitation (mm)' first then 'Temperature (°C)' — minor
    inconsistency since temperature is the primary variable and is defined first in
    df_lines, yet appears second in the bottom legend
