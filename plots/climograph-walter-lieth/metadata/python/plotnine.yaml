      Data: Red line (#AE3030) traces the temperature curve peaking in Jul–Aug (~29–30°C) and dipping in Jan (~10°C). Blue line (#4467A3) traces the scaled precipitation curve, peaking in Dec (~35 on temperature scale = 71 mm). Semi-transparent blue ribbon fills humid winter/spring/autumn periods; semi-transparent red ribbon fills the arid summer period (Jun–Sep). Dashed horizontal line at 0°C provides frost reference.
      Legibility verdict: PASS — all text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17), the correct anyplot dark surface — not pure black.
      Chrome: Title and subtitle render in light (#F0EFE8 / #B8B7B0) text against the dark surface, fully legible. Axis labels, tick labels, and right-side precipitation axis labels are all readable with appropriate INK_SOFT token (#B8B7B0). No dark-on-dark text failures detected.
      Data: Imprint palette colors (red #AE3030 and blue #4467A3) are identical to the light render as required — only chrome flips. Fill alpha is higher in dark mode (0.60 vs 0.35) making the humid (blue) and arid (red) ribbons more prominent against the near-black surface. The dashed 0°C reference line remains subtle but visible. Bottom legend with blue/red line swatches is readable.
      Legibility verdict: PASS — all text elements are clearly readable against the dark background; no dark-on-dark failures.
