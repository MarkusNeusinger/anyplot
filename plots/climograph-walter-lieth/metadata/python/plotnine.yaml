review:
  strengths:
  - Correct Walter-Lieth 1:2 scaling convention (10°C ≡ 20mm) implemented accurately
  - Dual humid/arid fill regions using geom_ribbon faithfully reproduce the defining
    visual feature of a climograph
  - 'Semantic color override (temperature=red #AE3030, precipitation=blue #4467A3)
    correctly uses Imprint palette members and follows established climatological
    convention'
  - Creative manual right-side precipitation axis via geom_segment and geom_text —
    appropriate plotnine-native workaround for lack of dual-axis support
  - Station metadata subtitle (station name, elevation, annual mean T, total P, period)
    matches the spec header requirements
  - 0°C dashed reference line provides frost context
  - 'Full theme-adaptive chrome: both renders pass legibility checks — no dark-on-dark
    issues in dark render'
  - Hardcoded Athens 1991–2020 climate normals are climatologically realistic and
    represent a textbook Mediterranean drought pattern
  weaknesses:
  - No legend identifying which curve is temperature vs. precipitation — a reader
    unfamiliar with Walter-Lieth conventions cannot identify the two lines without
    labels
  - 'Fill regions use solid translucent alpha (alpha=0.28) rather than the conventional
    hatching (humid: hatched blue) and dotting (arid: dotted red) described in the
    spec — the alpha fills overlap and produce a muddy brownish-maroon region in the
    dark render where both fills blend'
  - Right precipitation axis ticks stop at 80 mm (p_y_ticks=[0,10,20,30,40] × 2 =
    [0,20,40,60,80]) instead of the spec-mandated 0/20/40/60/100 mm — the 100 mm tick
    is missing
  - 'In the dark render the overlapping arid/humid fill regions (both at alpha=0.28
    on #1A1A17 background) merge into a near-black/dark-maroon zone that loses the
    color distinction between the two periods'
  - Right-axis 'Precipitation (mm)' rotated label (annotate size=3.5, ≈10pt) and tick
    labels (geom_text size=2.8, ≈8pt) are small and will be barely readable at mobile
    thumbnail scale (~400px wide)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface.
      Chrome: Bold title "Athens · climograph-walter-lieth · python · plotnine · anyplot.ai" at 12pt fully readable. Subtitle "Athens, Greece · 107 m a.s.l. · T̅ = 19.2 °C · ΣP = 390 mm · 1991–2020" at 8pt readable. Left Y-axis label "Temperature (°C)" and X-axis label "Month" at 10pt both readable. Left axis tick labels (0, 10, 20, 30, 40) at 8pt readable. Month labels (J, F, M, A, M, J, J, A, S, O, N, D) readable. Right-side precipitation tick labels (0, 20, 40, 60, 80) in geom_text and "Precipitation (mm)" rotated annotation are small but readable at full resolution.
      Data: Red line (#AE3030) shows temperature curve peaking at ~29.5°C in July/August and dropping to ~10°C in January. Blue line (#4467A3) shows precipitation curve starting high (~28.5 on scaled axis = 57mm) in January, dropping to very low (~3-4) in summer, then rising sharply to ~35.5 in December (71mm). Translucent blue fill (alpha=0.28) covers humid winter/autumn periods where precipitation scaled value exceeds temperature. Translucent red fill (alpha=0.28) covers arid summer period (April–September) where temperature exceeds scaled precipitation. Dashed 0°C reference line runs horizontally. The Mediterranean drought signature is clearly visible — large red arid fill in summer, blue humid fills in winter.
      Legibility verdict: PASS — all text clearly readable on the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title, subtitle, axis labels, and tick labels all render in light/white tones (#F0EFE8 / #B8B7B0) and are clearly readable against the dark background. Right-axis precipitation labels and "Precipitation (mm)" rotated text remain readable. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — red (#AE3030) temperature line and blue (#4467A3) precipitation line clearly visible. However, the fill regions show a notable issue: at alpha=0.28 on #1A1A17 background, the arid red fill renders as very dark maroon and the humid blue fill renders as very dark navy. In the central overlap area (where both fills occupy neighboring data regions), the blended colors merge into a nearly black/very dark brownish-maroon zone, reducing the ability to visually distinguish between the humid and arid fill regions compared to the light render.
      Legibility verdict: PASS for text; PARTIAL PASS for data fills — the two fill regions are harder to distinguish in dark mode due to low alpha on a near-black background.
