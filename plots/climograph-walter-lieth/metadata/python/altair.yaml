  strengths:
  - Correct Walter-Lieth dual-axis convention with 1:2 temperature-to-precipitation
    scaling enforced via resolve_scale(y=independent) and carefully calibrated domains
  - 'Appropriate semantic color use from the Imprint palette: matte red (#AE3030)
    for temperature, blue (#4467A3) for precipitation, cyan (#2ABCCD) for frost —
    well-established domain conventions matched to correct Imprint members'
  - Fill zones (arid red, humid blue, perhumid solid blue) correctly implemented and
    visually communicative — the defining feature of the climograph is well-rendered
    in both themes
  - Real Ankara climate normals with accurate and ecologically interesting data (continental
    climate, summer drought, January frost month)
  - 'Solid code structure: flat, deterministic, clean imports, correct dual-file output,
    proper padding to 3200x1800 canvas'
  weaknesses:
  - Right precipitation axis ticks only go to 80mm; the spec requires 0, 20, 40, 60,
    100 mm to mark the perhumid threshold on the right axis — set right_axis values=[0,
    20, 40, 60, 100] and extend precip_scale domain to [-20, 100] and PRECIP_MAX=100
  - Subtitle fontsize=10 is at the lower edge of readability at canvas scale — bumping
    to 11 or 12 would improve mobile legibility
  - 'Humid fill opacity in dark mode (40%) is too muted over the near-black background
    — consider increasing HUMID_OPACITY for dark mode to 0.50-0.55 so humid zones
    stand out clearly against #1A1A17'
