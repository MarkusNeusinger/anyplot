review:
  strengths:
  - Perfect spec compliance for Athens dataset — all Walter-Lieth conventions implemented
    including 1:2 scaling (precip_scaled = precip_mm / 2)
  - 'Semantic color exception correctly applied with Imprint palette members: matte
    red (#AE3030) for temperature and blue (#4467A3) for precipitation, matching domain
    convention explicitly supported by the style guide'
  - Dynamic title font-size scaling (max(11, round(16 * 67 / len(title)))) prevents
    overflow on the long mandated title
  - 'Well-organized subtitle with complete station metadata: elevation, Tmean, annual
    precipitation, and climate normal period (1991-2020)'
  - Clean code structure with elegant ribbon fill precomputation (humid_top = max(temp,
    precip_scaled), arid_bottom = min(temp, precip_scaled)) and well-documented manual
    dual-axis workaround for lets-plot 4.x missing sec_axis
  - Correct canvas size (3200x1800) via ggsize(800, 450) + ggsave scale=4; both PNG
    and HTML output files generated
  weaknesses:
  - 'Ribbon fills nearly invisible in dark mode: alpha=0.28 on #1A1A17 background
    renders the arid fill as very dark maroon and the humid fill as very dark navy,
    both blending into the near-black background. Fix: use ANYPLOT_THEME-conditional
    alpha — ribbon_alpha = 0.28 if THEME == ''light'' else 0.50 — and apply to both
    geom_ribbon calls'
  - 'All four panel borders (spines) visible; style guide default is to remove top
    and right spines. Fix: add spine removal in the lets-plot theme configuration'
  - 'CVD accessibility gap: the red-blue temperature/precipitation pair lacks redundant
    encoding. Fix: add linetype aesthetic mapping to geom_line (solid for temperature,
    dashed for precipitation) to help CVD users distinguish the two curves independently
    of color'
  - Spec specifies hatched/dotted fill patterns to distinguish humid (blue/hatched)
    from arid (red/dotted) regions; solid fills lose this visual distinction — a lets-plot
    limitation but worth noting
  - Right-axis ticks reach 80mm max; Walter-Lieth convention calls for 0, 20, 40,
    60, 100mm labels — add 100mm tick entry even if current Athens data stays below
    it
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "Athens, Greece · climograph-walter-lieth · python · letsplot · anyplot.ai" in dark ink, spans ~80-85% of canvas width; subtitle "107 m a.s.l. │ Tmean = 18.5°C │ P = 383 mm yr⁻¹ │ 1991–2020 normals" in secondary ink below; left y-axis label "Temperature (°C)" in dark ink; month tick labels (Jan–Dec) in secondary ink; right-axis tick labels (0, 20, 40, 60, 80) and "Precipitation (mm)" in blue (#4467A3) — all clearly readable
      Data: Red line (#AE3030) with circular markers traces temperature (9–29°C); blue line (#4467A3) with circular markers traces scaled precipitation; blue-shaded ribbons fill humid periods (Jan–Mar, Oct–Dec); red-shaded ribbons fill arid summer period (Apr–Sep); dashed horizontal line at y=0; legend at bottom shows Temperature (red) and Precipitation (blue)
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and subtitle in light-colored text (#F0EFE8), clearly readable against dark background; axis labels and tick labels in secondary light color (#B8B7B0), readable; right-axis tick labels and "Precipitation (mm)" title in blue (#4467A3) — visible but at marginally lower contrast on dark bg; no dark-on-dark text failures detected
      Data: Temperature line (matte red, #AE3030) and precipitation line (blue, #4467A3) both retain full-opacity colors — identical to light render and clearly visible; HOWEVER the arid ribbon fill (alpha=0.28 on #1A1A17) renders as very dark maroon nearly invisible against the background; humid ribbon fill (alpha=0.28 on #1A1A17) renders as very dark navy, also significantly muted — both fills nearly disappear in dark mode
      Legibility verdict: PASS for text; PARTIAL FAIL for ribbon fill visibility (arid and humid fills nearly invisible on near-black background)
