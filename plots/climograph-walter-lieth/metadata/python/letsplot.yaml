  - Grid lines are shown on both X and Y axes; for a dual-line climograph with 12
    data points, a Y-only grid (panel_grid_major_x=element_blank()) would reduce visual
    noise and let the ribbon fills breathe more
  - Design Excellence is constrained by the conventional scientific climograph format
    — the semantic color choice and ribbon fills are the primary design decisions;
    no exceptional typography hierarchy or additional polish beyond the required conventions
