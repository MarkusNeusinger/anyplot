review:
  strengths:
  - 3-layer fill stacking trick elegantly simulates Walter-Lieth differential fills
    within pygal's single-axis Line chart constraints
  - Semantic color exception (blue for precipitation/water, red for temperature/heat)
    is correct, Imprint-compliant, and domain-standard
  - Real Athens climate data (1991-2020 normals) produces a textbook Mediterranean
    Csa signature — effective DQ across all three criteria
  - Both themes render correctly with no dark-on-dark failures; all chrome tokens
    properly threaded through the Style object
  - Station metadata surfaced in x-axis title position with annual mean temperature
    and precipitation total
  weaknesses:
  - Right Y-axis with precipitation scale (0, 20, 40, 60, 100 mm) is absent — only
    a single combined Y-axis shows temperature-scale ticks (0, 10, 20, 30); this is
    the conventional Walter-Lieth dual-axis feature; while pygal's Line chart does
    not natively support twin axes, text annotations along the right edge could simulate
    it
  - Station metadata is positioned as an x-axis title at the bottom rather than in
    the conventional Walter-Lieth header position at the top of the panel
  - Default chart border spines are present; removing or hiding the top and right
    chart borders would improve visual refinement
