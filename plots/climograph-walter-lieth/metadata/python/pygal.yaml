review:
  strengths:
  - Correct Walter-Lieth 1:2 axis scaling (precipitation ÷ 2) is applied, so 10°C
    aligns with 20 mm on the shared y-axis
  - Real Mediterranean climate data (Athens, Greece, 1991–2020 normals) with realistic
    values and correct annual stats (T=18.4°C, P=343 mm)
  - 'Valid semantic color exception: blue (#4467A3) for precipitation (water) and
    red (#AE3030) for temperature (heat) — both from the Imprint palette, widely expected
    domain conventions in climatology'
  - Station metadata (station name, elevation, mean temperature, annual precipitation)
    is correctly displayed in the x_title below the chart
  - Cubic interpolation produces smooth, natural-looking seasonal curves appropriate
    for monthly climate normals
  - Both PNG and HTML outputs are produced — correct for pygal (interactive library)
  - Canvas is exactly 3200×1800 px — passes the dimension gate
  - 'Both light and dark themes render with correct background tokens (#FAF8F1 / #1A1A17)
    and all text adapts properly (dark ink on light, light ink on dark)'
  - Title format is exactly 'climograph-walter-lieth · python · pygal · anyplot.ai'
    — correct per SC-04
  - Code is flat, clean, and deterministic — no functions/classes, all imports used
  weaknesses:
  - 'Missing differential fill between curves — the defining visual feature of Walter-Lieth
    diagrams: (a) blue/hatched fill between the precipitation-line and temperature-line
    where precip/2 > temp (humid season), and (b) red/dotted fill where temp > precip/2
    (arid season). The current implementation fills from y=0 up to the precipitation
    line (solid blue area), which does not show the crossover between the two series.
    Repair must compute the crossover month-by-month and fill accordingly — e.g. split
    each monthly interval at the intersection point and fill two separate colored
    regions. This is the core of what makes a Walter-Lieth different from a plain
    dual-line chart.'
  - Station metadata used as x_title results in an unusually large caption (rendered
    at label_font_size=56) that dominates the bottom of the chart. The station info
    should be displayed as a subtitle annotation or text element inside/above the
    plot area (conventional Walter-Lieth header), not as the axis title, to keep proportions
    balanced and to match the canonical diagram layout.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, visible in outer margins and inner chart area
      Chrome: title "climograph-walter-lieth · python · pygal · anyplot.ai" renders in dark ink at top, spanning ~75% of canvas width; y-axis label "Temperature (°C) / Precipitation ÷ 2 (mm)" rotated vertically on left side; x-axis month labels (Jan–Dec) in dark ink below chart; y-axis ticks at 0, 10, 20, 30; legend at bottom showing blue (Precipitation) and red (Temperature) swatches; station metadata "Athens, Greece (107 m a.s.l.) T = 18.4 C P = 343 mm" displayed as oversized x_title below x-axis — all clearly readable
      Data: solid blue filled area (#4467A3) from y=0 up to precipitation/2 line, large in winter (Jan ~24, Dec ~28) and small in summer (Jun ~3, Jul ~3); red line (#AE3030) tracing monthly mean temperature, rising smoothly from ~9°C in January to peak ~29°C in July, drawn with dots at each month and cubic interpolation for smooth curves; subtle dashed horizontal grid lines at y=10, 20, 30; no fill between the curves showing arid/humid differentiation
      Legibility verdict: PASS — all text is readable; first series is blue (#4467A3) via semantic exception (not green), which is valid for this domain

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — outer margins and inner chart area both near-black, as expected for this hex which is rgb(26,26,23) — essentially very dark grey
      Chrome: title renders in light off-white text at top, clearly visible; y-axis label in light text on left; month labels and tick labels (0, 10, 20, 30) in light/white text; station metadata in light large text below chart; legend at bottom with light text — all elements are light-on-dark and clearly readable; no dark-on-dark failures detected
      Data: blue filled area (#4467A3) clearly visible against dark background in winter months, much smaller in summer; red temperature line (#AE3030) clearly visible on dark background; data colors are identical to light render — only chrome (text, background) changed; grid lines visible as subtle lighter dashed lines
      Legibility verdict: PASS — all text is readable against dark background; no dark-on-dark failures; brand green is not used as first series (valid semantic exception applies)
