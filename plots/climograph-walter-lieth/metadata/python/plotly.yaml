review:
  strengths:
  - 'Full spec compliance — all Walter-Lieth features correctly implemented: dual
    axes with exact 2:1 (10°C=20mm) scaling, three fill regions (humid/perhumid/arid),
    0°C zero line, 100mm dotted threshold line, station metadata annotation, frost
    month handler (correctly empty for Naples), PCHIP smooth interpolation'
  - Semantic Imprint palette usage — temperature=red (#AE3030, pos 5) and precipitation=blue
    (#4467A3, pos 3) follows universal climograph convention; semantic exception is
    clearly justified by domain labels
  - Sophisticated Plotly dual-axis setup — ghost trace to anchor right y-axis, customdata+hovertemplate
    showing original mm values despite transformed y-axis coordinates, yaxis2 with
    overlaying='y' pattern
  - Well-calibrated fill opacities — humid (0.28), perhumid (0.78), arid (0.22) create
    readable visual hierarchy without overwhelming the curves
  - Both themes correctly implemented — all chrome tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT, INK_MUTED, GRID) applied throughout; station annotation box uses elevated
    bg per style guide
  - Naples 1991-2020 climate normals — realistic, geographically grounded data showing
    a clear Mediterranean (Cfsa) signature with summer drought and autumn/winter surplus
  weaknesses:
  - Both X and Y grid lines are showing simultaneously, which is visually cluttered
    for a fill-heavy climograph. Consider Y-axis-only grid (set showgrid=False on
    xaxis) to reduce visual noise behind the fill regions.
  - 'Colored axis label titles (red ''#AE3030'' for Temperature, blue ''#4467A3''
    for Precipitation) have borderline contrast on dark theme (~3.1:1 and ~3.4:1 respectively
    against #1A1A17). Consider using INK (primary) color for axis title text and relying
    on tick colors or axis line colors for the semantic association.'
  - Three helper functions (p_to_y, extract_segs, closed_poly) deviate from the KISS
    no-functions principle. The polygon logic could be inlined or the functions collapsed
    into a single utility for cleaner structure.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — matches style-guide light surface exactly.
      Chrome: Title "Naples, Italy · climograph-walter-lieth · python · plotly · anyplot.ai" in dark #1A1A17, centered, approximately 70-75% of plot width — well-proportioned. Left Y-axis label "Temperature (°C)" in matte red (#AE3030), right Y-axis label "Precipitation (mm)" in blue (#4467A3), X-axis label "Month" in dark INK. Tick labels in #4A4A44 (INK_SOFT) at 10px, clearly readable. Station annotation box upper-left with "Naples, Italy / 17 m a.s.l. / T = 17.4°C · P = 902 mm" in dark text on #FFFDF6 elevated background. Legend top-right with 5 entries.
      Data: Temperature curve in matte red (#AE3030) with matching red markers, shows smooth bell shape peaking in Jul-Aug (~27°C). Precipitation curve in blue (#4467A3) with matching blue markers, starts high in Jan (~97mm mapped to ~48.5 temp units), drops to minimum in Jul (~7 temp units = 14mm), rises steeply in Oct-Nov. Humid period fill in semi-transparent blue (rgba(68,103,163,0.28)) covers Jan-May and Sep-Dec. Perhumid solid blue (rgba(68,103,163,0.78)) visible in Oct-Nov-Dec where precipitation exceeds 100mm. Arid period fill in semi-transparent light red (rgba(174,48,48,0.22)) visible Jun-Aug where temperature exceeds precipitation. Dotted horizontal line at 100mm threshold. Zero reference line at 0°C.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title in light #F0EFE8, clearly readable. Left Y-axis label in matte red (same #AE3030 — borderline contrast ~3.1:1 against dark bg, readable at effective large size), right Y-axis label in blue (#4467A3, ~3.4:1 contrast, readable at large size). Tick labels in #B8B7B0 (INK_SOFT dark) — clearly readable against dark background. Station annotation box in dark elevated #242420 with light #F0EFE8 text — readable. Legend uses dark elevated background with light text.
      Data: Identical Imprint palette colors — temperature red and precipitation blue are the same as light render. Humid fill appears as a muted dark blue (semi-transparent on near-black), still distinguishable. Perhumid fill is a visibly darker/denser blue. Arid fill appears as dark brownish-red — still visible but more muted than in light render, which is expected for rgba(174,48,48,0.22) on a dark background. Curves and markers retain their respective red and blue colors.
      Legibility verdict: PASS — no dark-on-dark failures. All tick labels, title, axis labels, and legend entries are light-colored against the dark background. Minor: colored axis title labels (red, blue) have borderline contrast but remain readable at effective ~48px size.
