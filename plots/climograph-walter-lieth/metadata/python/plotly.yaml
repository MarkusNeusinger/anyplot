review:
  strengths:
  - Correct Walter-Lieth 1:2 scaling convention implemented (p_to_y with 10:1 compression
    above 100mm)
  - 'All three fill regions rendered correctly: humid (light blue), perhumid (solid
    blue above 100mm), arid (light red)'
  - PCHIP smooth interpolation produces clean, professional curves that match the
    refined climograph aesthetic
  - Ghost trace technique for anchoring yaxis2 is an advanced, idiomatic plotly pattern
  - 'Semantic palette exception correctly applied: red (#AE3030) for temperature heat,
    blue (#4467A3) for precipitation water — both Imprint palette members'
  - Station metadata annotation box in upper-left is well-styled with border and elevated
    background
  - 'Both themes render correctly: warm off-white (#FAF8F1) for light, near-black
    (#1A1A17) for dark — all chrome tokens properly applied'
  - Real Naples 1991–2020 climate normals make compelling Mediterranean example showing
    classic summer drought
  - Title scaling formula correctly shrinks font for the long prefixed title string
  - HTML output generated alongside PNG for interactive exploration
  weaknesses:
  - Helper functions p_to_y() and extract_segs() defined in script body — minor KISS
    structure violation; ideally inline the transform or reduce abstraction level
  - 'No explicit spine removal: Plotly''s default axis lines remain on all four sides
    — removing top and right linecolor would refine the L-shaped frame aesthetic'
  - Arid fill at rgba(174,48,48,0.22) is noticeably lighter in dark mode (muted maroon
    on near-black) — increasing opacity slightly to ~0.35 in dark mode would improve
    visibility without changing the data color
  - Station metadata text at 10px is the smallest element; at mobile scale (~400px
    wide) this may become borderline small — consider 11px
  - 'LM-02: The PCHIP interpolation relies on scipy, not plotly-native features; leveraging
    plotly''s native spline line shape (line.shape=''spline'') would be more idiomatic
    for the smooth-curve effect'
