review:
  strengths:
  - Semantically correct dual-axis 1:2 scaling (10°C↔20mm) implemented correctly
  - fill_between with where+interpolate=True produces smooth humid/arid region fills
    at curve crossings
  - Station metadata header is styled nicely with adaptive ELEVATED_BG and rounded
    bbox
  - Color-coded axis labels (Temperature in red, Precipitation in blue) reinforce
    the dual-axis structure
  - 'Full theme-adaptive chrome: INK/INK_SOFT tokens applied to ticks, spines, legend
    text, and annotation box'
  - Code is clean and deterministic — no random state, KISS structure throughout
  - Realistic Ankara 1991-2020 climate normals with correct factual values
  weaknesses:
  - Frost months filled within the plot area (fill_between below 0°C) rather than
    as a colored band/blocks beneath the x-axis as specified
  - Spec calls for hatched blue (humid) and dotted/stippled red (arid) fills; implementation
    uses solid alpha fills which, while acceptable, deviates from the conventional
    Walter-Lieth rendering
  - The frost area is extremely small (only January at -0.8°C) making the frost indicator
    barely perceptible — a station with more pronounced frost (e.g. 2-3 months below
    0°C) would better showcase this feature
  - DE-01 limited by restrained aesthetic — fill alpha=0.25 is very subtle; raising
    to 0.35-0.40 and adding hatching would increase visual richness
  - Left axis ticks start at -10°C rather than the conventional 0°C anchor; the spec
    notes "Left axis ticks conventionally at 0, 10, 20, 30°C"
  - 'Right axis ticks at [0,20,40,60,80,100] include 80mm which is not in the Walter-Lieth
    conventional tick set (spec: 0,20,40,60,100)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct; not pure white.
      Chrome: Title "climograph-walter-lieth · python · matplotlib · anyplot.ai" in dark INK color spans ~75% of canvas width, clearly readable. X-axis label "Month" in INK. Y-axis left "Temperature (°C)" rendered in TEMP_COLOR #AE3030 (red), Y-axis right "Precipitation (mm)" in PRECIP_COLOR #4467A3 (blue) — semantic color-coding of axis labels is a nice design touch. Tick labels in INK_SOFT (#4A4A44), well-readable. Station metadata box (Ankara, 39°57'N, 891 m a.s.l., Mean T=11.6°C, Total P=357mm, 1991-2020) in upper-left with ELEVATED_BG fill and rounded border.
      Data: Red line (#AE3030) = temperature, peaks ~23-24°C in July-August, dips to -0.8°C in January. Blue line (#4467A3) = precipitation-scaled curve, peaks in spring/autumn (~15-25°C equivalent), troughs in summer (~4-6°C equivalent). Blue semi-transparent fill (alpha=0.25) for humid periods (Jan-May, Oct-Dec) where precipitation > temperature curve. Red semi-transparent fill (alpha=0.25) for arid summer period (Jun-Sep). Very small dark fill near January baseline for frost zone (-0.8°C). Dashed 0°C reference line. Legend at bottom with three items: humid (blue), arid (red), frost months (dark gray).
      Legibility verdict: PASS — all text clearly readable against warm off-white background. First data series (#AE3030 red temperature line) uses Imprint semantic color correctly.

    Dark render (plot-dark.png):
      Background: Dark near-black (#1A1A17) — correct; not pure black.
      Chrome: Title, tick labels, and axis labels all render in appropriate light INK tokens. Temperature axis label retains #AE3030 red (readable against dark bg). Precipitation axis label retains #4467A3 blue (readable). Tick labels in INK_SOFT (#B8B7B0 in dark) appear as light gray — fully readable. Station header box uses ELEVATED_BG #242420 (dark elevated) with light text. Legend text set via plt.setp to INK_SOFT, appears as readable light gray text.
      Data: Data colors identical to light render — red temperature line (#AE3030) and blue precipitation line (#4467A3) unchanged. Humid fill (alpha=0.25 blue) appears darker against dark bg but still visible as a dark-blue region. Arid fill (alpha=0.25 red) appears as a dark-maroon region in summer. Frost fill uses INK (#F0EFE8 in dark) at alpha=0.55 producing a visible cream-toned patch for the January frost dip.
      Legibility verdict: PASS — no dark-on-dark failures detected. All text elements use light-theme tokens appropriately flipped. Chrome is correctly inverted; data colors are identical to light render.
