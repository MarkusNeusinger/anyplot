review:
  strengths:
  - Correct Walter-Lieth 1:2 scaling convention (10°C ↔ 20mm) implemented accurately
    with compressed scale logic for >100mm
  - 'Semantic color exception correctly applied: #AE3030 (matte red) for temperature,
    #4467A3 (blue) for precipitation — both are Imprint palette members used for their
    real-world meaning'
  - Hatched fills (/// for humid, ... for arid) provide redundant encoding that aids
    CVD users
  - Dual twinx() axes with proper right-spine-only configuration and precipitation
    axis range (-30 to 100mm) perfectly aligned to temperature axis
  - Station metadata header box (Erzurum, WMO 17096, 1991–2020) uses real climate
    normals with all four Walter-Lieth diagnostic zones (frost, arid, humid transitions)
  - 'Frost month indicator bars using INK token are theme-adaptive: dark in light
    render, near-white in dark render — both clearly visible'
  - Custom legend built with mpatches.Patch handles placed outside the plot area via
    bbox_to_anchor — clean and unobtrusive
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all correctly
    applied to backgrounds, text, spines, legend frame, and annotation box'
  - No bbox_inches='tight' on savefig — canvas dimensions preserved correctly at 3200×1800
    px
  weaknesses:
  - Station metadata header text (fontsize=8) and legend text (fontsize=8, ncol=3)
    may be marginally tight at mobile widths (~400px) — consider bumping legend to
    fontsize=9 or ncol=1 for better mobile readability
  - 'DE-01: Design is domain-appropriate but not publication-exceptional — the header
    box rounded corners and spine treatment are good, but there is room for additional
    polish (e.g., slightly more generous inner padding on the header box, or a thin
    colored rule below the title area)'
  - 'DE-02: Grid is subtle (alpha=0.12) which is good, but the horizontal separator
    line above the frost band (alpha=0.25) creates a faint extra element that could
    be removed without loss of clarity'
  - 'LM-02: fill_between with hatch and interpolate=True is the strongest matplotlib-distinctive
    feature used; the implementation could further leverage matplotlib''s PathPatch
    or BrokenBarHCollection for the frost indicators instead of ax.bar()'
