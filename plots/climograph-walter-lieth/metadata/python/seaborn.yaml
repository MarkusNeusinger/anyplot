review:
  strengths:
  - 'Correct Walter-Lieth dual-axis convention implemented: precipitation divided
    by 2 to overlay on temperature axis with synchronized right axis showing actual
    mm values'
  - 'Semantic Imprint palette exception correctly applied: #AE3030 (slot 5) for temperature
    heat, #4467A3 (slot 3) for precipitation water — both valid domain conventions
    in climatology'
  - Fill-between for humid (blue) and arid (red/pink) periods accurately represents
    the diagram's core visual language using interpolate=True for smooth crossovers
  - Station header box with name, elevation, period, annual T mean, and P total correctly
    positioned and styled with elevated background in both themes
  - Canvas exactly 3200×1800 px (figsize=(8,4.5), dpi=400); no bbox_inches='tight';
    subplots_adjust controls padding precisely
  - 'Both themes fully functional: all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    applied consistently to axes, legend, annotations, and tick params'
  - Frost indicator code present (fill_between below 0°C) — correctly implemented
    even though Mediterranean data doesn't trigger it
  - Zero-degree reference dashed line adds correct climate-interpretation context
  - Clean flat-script structure, deterministic hardcoded data, all imports used —
    perfect code quality score
  weaknesses:
  - 'Missing perhumid (>100 mm) scale compression: Walter-Lieth convention requires
    a compressed 10:1 scale above 100 mm with solid blue fill to mark perhumid periods
    — neither the scale break nor the solid blue band is implemented, so the chart
    cannot correctly render any station with P > 100 mm/month'
  - Right precipitation axis ticks reach only 80 mm instead of the spec-mandated 0,
    20, 40, 60, 100 mm — the 100 mm tick is conventionally required because it marks
    the transition to the compressed scale
  - 'Arid fill (TEMP_COLOR at alpha=0.20) is nearly invisible on dark background (#1A1A17):
    effective blended color is dark brownish-red (~rgb(56,30,27)), barely distinguishable
    from the near-black surface — the arid fill is the diagram''s defining visual
    element; increase alpha to 0.45+ or composite against ELEVATED_BG for the fill
    in dark theme'
  - Humid fill (PRECIP_COLOR at alpha=0.25) also muted on dark background but more
    visible than the arid fill; consider raising alpha to 0.4 in dark mode to match
    light render legibility
  - 'Seaborn''s distinctive features are underutilized: sns.lineplot and sns.set_theme
    are used but most of the chart complexity is handled via matplotlib directly;
    the seaborn contribution is minimal beyond theme setup'
