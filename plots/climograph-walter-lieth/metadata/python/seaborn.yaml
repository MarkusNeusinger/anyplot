      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "climograph-walter-lieth · python · seaborn · anyplot.ai" in dark INK (#1A1A17) at 12pt — clearly readable. Left axis label "Temperature (°C)" in matte red; right axis label "Precipitation (mm)" in blue — both readable. Tick labels at 8pt in red/blue respectively, readable at full resolution.
      Data: Temperature line (matte red #AE3030, linewidth=2.5) rises Jan ~10.5°C → Aug ~29°C. Precipitation line (blue #4467A3, linewidth=2.5) falls from ~29mm equivalent (58mm actual) in Jan to ~2mm (4mm actual) in Jul. Blue fill covers humid winter/autumn period (Jan–Apr, Oct–Dec) where precipitation > temperature. Soft pink fill covers Mediterranean arid summer period (Apr–Sep). Zero reference dashed line at 0°C. Station header box centered at top: "Porto Vell · 88 m · 1991–2020 T = 19.0 °C · P = 445 mm". Legend in upper-left with Temperature/Precipitation lines and Humid/Arid patches.
      Legibility verdict: PASS — all text readable; fills clearly distinguishable from background

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface
      Chrome: Title in light #F0EFE8 on dark background — clearly readable. Axis labels retain red/blue colors, both readable against dark background. Tick labels in red/blue readable. Station header box uses ELEVATED_BG (#242420) with light INK text — readable. Legend box uses elevated background with light text — readable. No dark-on-dark text issues.
      Data: Temperature and precipitation lines retain identical red/blue colors — PASS (data colors unchanged between themes). Humid fill (blue at alpha=0.25 on #1A1A17) visible as darkened blue region in winter months. Arid fill (red #AE3030 at alpha=0.20 on #1A1A17) becomes dark brownish-red (~rgb(56,30,27)) — significantly less vivid than in light render; identifiable but notably muted. This is the diagram's defining visual element and its low contrast on dark background is the primary weakness.
      Legibility verdict: PASS for text; PARTIAL FAIL for arid fill visibility — fill contrast inadequate at alpha=0.20 on near-black surface
