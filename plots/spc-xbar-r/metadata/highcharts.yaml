review:
  strengths:
  - Excellent data generation using proper SPC constants (A2, D3, D4, d2) for subgroup
    size 5
  - Clean dual-chart layout with well-differentiated control limit line styles
  - Realistic CNC manufacturing context with appropriate scale and variation
  - OOC points prominently highlighted with color and size differentiation
  - Good use of Highcharts plotLines for control limits with right-aligned labels
  weaknesses:
  - 'Off-by-one bug: data uses 1-based x-values but Highcharts categories are 0-indexed,
    causing sample numbers to display starting at 2'
  - Right-edge control limit labels are cramped/clipped by the chart boundary
  - Uses raw JS string construction instead of highcharts-core Python API
  - Legend is small and not prominent enough
  image_description: The plot displays two vertically stacked Highcharts line charts
    for SPC monitoring of CNC shaft diameter measurements. The top chart shows X-bar
    (Sample Mean) values in blue (#306998) with connected markers, plotted against
    a solid blue center line (CL = 24.9999), red dashed UCL (25.0133) and LCL (24.9868)
    lines, and orange dotted UWL/LWL warning limits. Three out-of-control points are
    highlighted as larger red (#D32F2F) filled circles at approximately samples 9,
    19, and 25. The bottom chart shows R (Sample Range) values with the same blue
    line style, with a blue CL (0.0232), red dashed UCL (0.0491), and orange dotted
    UWL. No R-chart OOC points are visible. The title reads "CNC Shaft Diameter Monitoring
    · spc-xbar-r · highcharts · pyplots.ai". Y-axes include units (mm). X-axis shows
    "Sample Number" but labels start at "2" instead of "1" due to an off-by-one category
    index bug. Right-side control limit labels are slightly cramped near the chart
    edge. Background is clean white with very subtle gridlines.
