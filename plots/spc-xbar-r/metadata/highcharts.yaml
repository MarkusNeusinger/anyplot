  image_description: The plot displays two vertically stacked Highcharts charts for
    CNC shaft diameter monitoring. The top chart is the X-bar (sample mean) chart
    and the bottom is the R (sample range) chart, sharing a common x-axis of sample
    numbers (1-30). The X-bar chart shows a blue line with circular markers connecting
    sample means around 25.000 mm, with a solid blue center line (CL = 24.9999), red
    dashed UCL (25.0133) and LCL (24.9865), and orange dotted warning limits (UWL/LWL).
    Three out-of-control points are highlighted as larger red circles (samples ~8,
    ~19, ~25), with sample 25 being the most extreme at ~25.028. The R chart below
    shows sample ranges with a blue center line (CL = 0.0232), red dashed UCL (0.0491),
    and orange UWL. No R chart points exceed the UCL. The title reads "CNC Shaft Diameter
    Monitoring · spc-xbar-r · highcharts · pyplots.ai". The background is white with
    very subtle gridlines. X-axis sample number labels at the bottom are barely visible/cut
    off.
