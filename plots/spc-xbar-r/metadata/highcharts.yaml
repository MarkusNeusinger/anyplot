  image_description: The plot displays a vertically stacked pair of SPC charts for
    CNC shaft diameter monitoring at 4800x2700px. The top chart is the X-bar (sample
    mean) chart showing 30 samples plotted as a blue line with circular markers around
    25.000 mm. Red dashed UCL (~25.013) and LCL (~24.987) lines are labeled on the
    right side. Orange dotted warning lines (UWL/LWL) are labeled on the left. A solid
    blue center line (CL = 24.9999) runs through the middle. Three out-of-control
    points are highlighted as larger red circles at approximately samples 9 (high),
    19 (low), and 25 (high). The bottom chart is the R (sample range) chart showing
    ranges as a blue line with markers. It has a red dashed UCL (~0.049), orange UWL
    warning line, and blue center line (CL = 0.0232). No R-chart points exceed control
    limits. The shared x-axis shows Sample Number 1-30. Y-axes are labeled X-bar (Sample
    Mean, mm) and R (Sample Range, mm). Title reads CNC Shaft Diameter Monitoring
    · spc-xbar-r · highcharts · pyplots.ai. Legend displays X-bar (Sample Mean), Out
    of Control, and R (Sample Range).
