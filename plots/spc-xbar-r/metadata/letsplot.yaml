  image_description: The plot displays two vertically stacked SPC charts for CNC shaft
    diameter measurements. The top chart (X-bar) shows sample means in mm (y-axis
    ~24.8–25.15) plotted against sample numbers 1–30 on the x-axis. A blue line with
    open circle markers connects in-control points, while three out-of-control points
    (samples ~8, ~19, ~25) are highlighted as solid red filled circles. Horizontal
    reference lines include dashed gray UCL and LCL, dotted lighter gray UWL and LWL,
    and a solid gray center line (CL), all labeled on the right margin. The bottom
    chart (R) shows sample ranges (0–0.25 mm) with the same blue line-and-marker styling.
    Dashed gray UCL and LCL lines appear with a dotted UWL line; the center line is
    labeled R-bar. No out-of-control points appear in the R chart. The title reads
    "spc-xbar-r · letsplot · pyplots.ai" in bold at the top. Background is clean white
    with subtle horizontal gridlines on y-axes only.
