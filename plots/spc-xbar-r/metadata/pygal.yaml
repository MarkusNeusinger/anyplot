    users
  - X-axis labels show all 30 numbers creating visual density
  image_description: The plot displays two vertically stacked pygal XY charts composited
    into a single PNG image. The top chart is the X-bar chart titled "spc-xbar-r ·
    pygal · pyplots.ai" with Y-axis labeled "X̄ (mm)" ranging from ~24.9600 to ~25.0400.
    A blue line with dots traces 30 sample means. One red dot at sample 8 marks an
    out-of-control point above the UCL. Red dashed horizontal lines mark UCL (~25.0275)
    and LCL (~24.9740), orange dashed lines mark ±2σ warning limits, and a dark solid
    center line sits at ~25.0007. The bottom chart shows the R chart with Y-axis "R
    (mm)" ranging from 0 to ~0.1200. A blue line traces sample ranges with no out-of-control
    points. Dark dashed UCL at ~0.0981, red dashed warning limit at ~0.0810, red LCL
    at 0, and center line at ~0.0464 are shown. Both charts have light beige plot
    backgrounds (#F4F3EE) with subtle grid lines. Legends appear at the bottom of
    each chart in 4-column layout. The X-bar legend's second row (LCL, warning limits)
    is partially obscured by the R chart below it. The x-axis shows "Sample Number"
    with labels 1-30.
