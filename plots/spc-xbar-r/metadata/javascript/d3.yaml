review:
  strengths:
  - Perfect spec compliance — both X̄ and R panels implemented with UCL/LCL/CL and
    ±2σ warning limits, all properly labeled with right-side annotations
  - Semantically correct Imprint palette — brand green (#009E73) for in-control data,
    matte red (#AE3030) for out-of-control (error semantic anchor used correctly)
  - Proper SPC constants (A2=0.577, D4=2.114 for n=5) with realistic shaft diameter
    domain (~25mm) and sensible within-sample variation
  - Park-Miller LCG seeded at 42 ensures 100% deterministic, reproducible renders
    with no reliance on browser RNG
  - 'Idiomatic D3 throughout: d3.scalePoint() for ordinal point positioning, d3.line()
    generator with .datum(), d3.format(''.4f''), selective .tickValues() for sparse
    x-axis'
  - Full theme-adaptive chrome via window.ANYPLOT_TOKENS in both renders — data colors
    identical, only chrome flips between light and dark
  - Three OOC signals (samples 8, 19, 25) use dual redundancy (size r=7.5 vs r=5 AND
    color red vs green) reducing red-green CVD accessibility concern
  weaknesses:
  - Panel header 'X̄ Chart' is at y=-12 within the panel group (SVG y≈78) while the
    legend row sits at legY=70 — only 8px separation; increase margin.top from 90
    to 108 or lower legY to 62 to give proper breathing room between the legend and
    the panel header
  - Right-side annotation labels for ±2σ at font-size 11px fall below the D3 style-guide
    minimum of 14px CSS px; bump to 12-13px for consistency with the 13px tick labels
  - drawPanel() function adds a layer of abstraction that reduces CQ-01 (KISS) score;
    the pattern is justified for dual-panel SPC charts but noted for the criterion
  - 'Design Excellence is functional but not polished: no background box behind the
    horizontal legend (t.elevatedBg), center line uses opacity 0.55 which makes it
    appear faint in the dark render relative to the data line'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "spc-xbar-r · javascript · d3 · anyplot.ai" at top in dark ink (#1A1A17), bold 22px, centered and fully readable. Horizontal legend row below the title contains 5 items (In-control, Out-of-control, Center line, Control limits ±3σ, Warning limits ±2σ), all text in inkSoft color, clearly readable. Panel headers "X̄ Chart" and "R Chart" at top-left of each panel in inkSoft, readable. Y-axis labels "X̄ (mm)" and "R (mm)" rotated on the left, readable at 14px. X-axis "Sample Number" label at bottom, readable. Tick labels at 13px in inkSoft — all readable.
      Data: X̄ panel: green (#009E73) line connecting 30 sample points, 28 in-control green circles (r=5), 2 out-of-control red (#AE3030) circles (r=7.5) at samples 8 (above UCL) and 19 (below LCL). Blue (#4467A3) dashed UCL and LCL lines clearly visible. Ochre (#BD8233) dashed warning limits subtly visible. R panel: same green line, 1 out-of-control red circle at sample 25 (above UCL). Right-side labels UCL, +2σ, CL, −2σ, LCL visible within the right margin.
      Legibility verdict: PASS — all text elements readable; all data series clearly distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in light ink (#F0EFE8), clearly visible on dark background. Legend row text in inkSoft (#B8B7B0), readable. Panel headers, Y-axis labels, X-axis label, and all tick labels rendered in light inkSoft color — fully readable. No dark-on-dark failures detected. Grid lines are subtle and appropriate.
      Data: Data colors are identical to the light render — brand green (#009E73) for in-control, matte red (#AE3030) for out-of-control. Blue dashed control limits and ochre dashed warning limits visually consistent with the light render. Center line appears as semi-transparent ink-colored line, visible but subtler on dark surface.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark text failures found.
