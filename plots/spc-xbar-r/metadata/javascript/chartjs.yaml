review:
  strengths:
  - 'Perfect spec compliance: dual X-bar/R panel layout, all control limits (UCL/LCL,
    ±2σ warning, center line), three OOC points correctly injected and highlighted'
  - 'Excellent data quality: realistic CNC shaft diameter context (50mm ±0.3mm) with
    standard A2/D3/D4 constants for n=5 subgroups'
  - Clever legend deduplication using '_' prefix filter to hide paired UCL/LCL lower-boundary
    datasets from legend display
  - 'Semantically correct color assignment: #009E73 for primary X-bar series, #AE3030
    (matte red) for OOC points as error semantic anchor, #BD8233 ochre for warning
    limits'
  - Deterministic LCG RNG with seed=42 ensures fully reproducible output without Math.random()
  - 'Per-point color and radius arrays create visual hierarchy: OOC points are larger
    (r=8 vs r=5) AND red, providing redundant encoding that is CVD-safe'
  - 'Both themes render correctly: warm off-white (#FAF8F1) light bg, warm near-black
    (#1A1A17) dark bg, all chrome tokens properly applied'
  weaknesses:
  - 'Design refinement (DE-02): Top chart unnecessarily shows ''Sample Number'' x-axis
    label — in a stacked dual-panel SPC chart, only the bottom panel should carry
    the shared x-axis label; remove the x-axis title from the top (X-bar) chart'
  - 'Design refinement (DE-02): Both panels share a full x-axis with tick labels —
    standard SPC layout suppresses top-panel x-tick labels to reduce redundancy; consider
    hiding x-axis ticks on the top panel (ticks.display: false on topCanvas)'
  - 'Aesthetic sophistication (DE-01): Spines/borders not reduced — adding borderWidth:0
    to axis borders and removing chart box border would create a cleaner open-frame
    look consistent with the style guide''s L-frame or no-frame preference'
  - 'Element visibility (VQ-03): Normal point radius=5 (10 native px) is on the small
    side for 25 sparse data points on a 3200px wide canvas; increasing to pointRadius:7
    and OOC to pointRadius:11 would improve readability without cluttering'
  - 'Code structure (CQ-01): Implementation defines five helper functions (rand, randNorm,
    addPanel, makeOpts, refLine) which departs from KISS flat structure; the refLine
    and makeOpts helpers could be inlined or reduced'
