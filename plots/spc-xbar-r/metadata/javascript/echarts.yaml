review:
  strengths:
  - 'Perfect spec compliance — all SPC features implemented: dual X-bar/R panel layout,
    UCL/LCL as dashed red lines with values, solid center line, ±2σ warning lines,
    out-of-control scatter overlays with larger red markers, and correct SPC constants
    (A2=0.577, D3=0, D4=2.115 for n=5)'
  - Excellent use of ECharts multi-grid system with linked xAxisIndex/yAxisIndex routing
    — idiomatic dual-panel chart without any axis synchronization hacks
  - 'Semantically correct Imprint palette use: brand green (#009E73) for data series,
    matte red (#AE3030) for control limits and OOC points (semantic error anchor),
    blue (#4467A3) for warning lines — all with appropriate opacity layering'
  - Realistic, technically accurate CNC shaft diameter context with correct SPC statistics
    and 25 subgroups of n=5; three out-of-control events clearly visible (samples
    12 and 22 in X-bar, sample 13 in R chart)
  - 'Clean, flat, reproducible code structure with deterministic hard-coded data and
    correct ECharts API usage (animation: false, no devicePixelRatio, no explicit
    sizing)'
  weaknesses:
  - markLine end-labels are at fontSize=11 (CSS px), which renders at ~22 source pixels
    — readable but at the lower bound; consider raising to 12–13px for better legibility
    at mobile-scaled widths
  - R chart does not show ±2σ warning lines — X-bar chart has both upper and lower
    warning limits but R chart only has UCL; adding R-chart warning limit (UCL_r ×
    2/3 ratio) would improve feature symmetry, though the spec marks warnings as optional
  - No legend is shown — the markLine labels on the right serve as reference but a
    small legend identifying 'In-control' vs 'Out-of-control' series would improve
    interpretability for readers unfamiliar with SPC charts
