review:
  strengths:
  - Correct dual-panel SPC layout with X-bar on top and R chart on bottom sharing
    a single x-axis
  - Accurate control chart constants (A2=0.577, D3=0, D4=2.115 for n=5) with textbook-correct
    formula application
  - 'Excellent semantic color mapping: brand green (#009E73) for center line (process
    target), Imprint red (#AE3030) for OOC/control limits, Imprint amber (#DDCC77)
    for warning limits'
  - Per-point marker overrides in Highcharts elegantly highlight OOC events with size
    + color dual-encoding (radius 8 red vs. radius 4 blue)
  - Deterministic LCG + Box-Muller RNG gives reproducibility where JavaScript has
    no seeded Math.random()
  - 'Both themes (light #FAF8F1 / dark #1A1A17) render correctly with all chrome elements
    readable'
  - Realistic CNC machining context with engineered cluster drift (samples 10–12)
    and isolated spike (sample 20) demonstrating distinct detection patterns
  - 'Full spec feature coverage: center line, UCL/LCL dashed, warning limits dashed
    lighter, OOC highlighting, subtitle with process context'
  weaknesses:
  - Gap between X-bar and R chart panels is ~9% of canvas height dead space (top panel
    ends at 48%, bottom panel starts at 57%) — tighten by setting R panel top to ~51%
    and increasing both panel heights slightly
  - X-axis category labels at 11px and tick labels at 12px are below the Highcharts
    guideline of 14px — raise to 13–14px for better mobile readability when scaled
    to ~400px width
  - R chart has no out-of-control points — while the X-bar chart demonstrates detection
    well, engineering at least one OOC range event (e.g. a sample with unusually high
    variability exceeding rUCL) would give the R chart panel its own story
  - 'Design polish is functional but not refined: grid lines visible on both axes
    could be y-axis-only for the X-bar panel per SPC convention; center line could
    be slightly thicker (3px) to reinforce its role as the process mean anchor'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "spc-xbar-r · javascript · highcharts · anyplot.ai" in dark text at 22px — clearly readable. Subtitle "Shaft Diameter (mm) — CNC Machining Process | 28 Subgroups, n=5" in softer dark text. Y-axis labels "X-bar (mm)" and "Range (mm)" with units, in dark secondary text. X-axis label "Sample Number" visible. Tick labels (3-decimal formatted) readable though slightly small (12px). X-axis category labels (S1, S3, S5... every other shown) at 11px — small but legible at canvas resolution.
      Data: X-bar panel — blue (#4467A3) line with radius-4 circle markers; green (#009E73) solid center line; red (#AE3030) dashed UCL/LCL; amber (#DDCC77) lighter dashed warning limits. Four OOC points clearly highlighted with large radius-8 red filled circles (samples 10–12 cluster and sample 20 spike). R chart panel — same color scheme, no OOC points visible (all ranges within rUCL). Legend at bottom: X-bar, Center (X̄), UCL / LCL (±3σ), Warning (±2σ).
      Legibility verdict: PASS — all text readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and subtitle in light text, clearly visible against dark background. Axis labels, tick labels, legend text all in light secondary color (B8B7B0-range). Grid lines subtle but visible. No dark-on-dark failures detected.
      Data: Colors identical to light render — blue data line, green center line, red OOC markers and UCL/LCL, amber warning limits. The OOC red circles stand out clearly on the dark background. Brand green (#009E73) for center line remains well-visible on dark surface.
      Legibility verdict: PASS — all text readable in dark theme. Data colors unchanged between themes as required.
