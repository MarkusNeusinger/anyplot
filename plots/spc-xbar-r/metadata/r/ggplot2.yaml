review:
  strengths:
  - Correct and complete SPC chart with all required statistical elements (CL, UCL,
    LCL, ±2σ) and proper control chart constants (A2, D3, D4 for n=5)
  - 'Excellent semantic color mapping: green=stable, red=alarm, blue=control limits,
    ochre=warnings — immediately legible to SPC practitioners'
  - OOC detection with redundant encoding (color + shape + size) is CVD-safe
  - 'Strong data storytelling: callout labels (n=8, n=27, n=22) immediately identify
    problematic subgroups across both panels'
  - Clean idiomatic ggplot2 code using long-format data with facet_wrap for dual-panel
    SPC
  - Correct theme-adaptive chrome in both renders; no dark-on-dark failures
  weaknesses:
  - OOC callout label text (geom_text size=2.5mm ≈ 7pt) is borderline small for mobile
    viewports (~400px); increase to size=3.0
  - Vertical major grid lines (panel.grid.major.x) add noise to a time-series SPC
    chart — consider removing with panel.grid.major.x = element_blank()
  - Right-side annotation margin is tight (X_LIM_MAX = n_samples + 8L) with 4 stacked
    labels in the X-bar panel; consider increasing to n_samples + 10L
