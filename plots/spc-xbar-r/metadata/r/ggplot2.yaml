review:
  strengths:
  - 'Perfect spec compliance: dual-panel SPC chart with all required features (UCL/LCL
    dashed, CL solid, warning limits dotted, OOC highlighted with redundant shape+color+size
    encoding)'
  - 'Semantically meaningful Imprint palette: green for in-control, red (matte red
    position 5) for out-of-control, ochre for warning zone — textbook semantic color
    mapping'
  - 'Idiomatic ggplot2: long-format data + facet_wrap(scales=''free_y'') + facet-filtered
    geom_hline is exactly the right pattern for this dual-panel SPC chart'
  - Realistic CNC machining data with correct SPC constants (A2=0.577, D3=0, D4=2.114
    for n=5) and 3 injected OOC events demonstrating detection capability
  - 'Full theme adaptation: center line, text, and grid all correctly flip between
    light and dark using adaptive INK tokens'
  - Clean, flat script with excellent reproducibility (set.seed(42)) and idiomatic
    geom_hline(data=ref_lines[...]) facet filtering
  weaknesses:
  - Right-side annotation labels (geom_text(size = 2.4)) are small (~6.8 pt equivalent)
    and may be difficult to read at mobile widths (~400 px); increasing to size =
    2.8-3.0 would improve mobile legibility
  - scale_x_continuous(limits = c(1, 40)) extends the axis 10 sample-widths beyond
    the data (samples end at 30) solely to reserve space for annotations, leaving
    ~25% of horizontal canvas empty — consider using coord_cartesian(xlim = c(1, 34))
    to reduce wasted space
  - Warning limit lines (+/-2 sigma) are not labeled in the right-side annotations
    or legend, which may confuse readers unfamiliar with SPC notation; adding brief
    annotation text (e.g. '+2sigma' / '-2sigma') would aid comprehension
  - No callout annotations marking specific out-of-control events with sample numbers
    — adding geom_text labels near OOC diamonds would strengthen data storytelling
    (DE-03)
