  strengths:
  - Perfect spec compliance with all required SPC features (control limits, warning
    limits, OOC highlighting, standard constants)
  - Excellent realistic data context (CNC shaft diameter measurements)
  - Clean, well-structured code with good KISS adherence
  - Effective data storytelling through OOC point highlighting with contrasting color
    and marker shape
  - Zone bands provide excellent visual context for control chart interpretation
  weaknesses:
  - Missing HoverTool — Bokeh signature interactive feature would add significant
    value to SPC charts
  - No explicit BoxAnnotation for zone fills
  - Annotation label font size (16pt) could be slightly larger for better readability
  - R chart lacks out-of-control points, limiting feature demonstration
  image_description: The plot displays two vertically stacked SPC control charts sharing
    the same x-axis (Sample Number 1-30). The top chart is the X-bar chart with y-axis
    "X̄ (Sample Mean, mm)" centered around 25.0mm, and the bottom chart is the R chart
    with y-axis "R (Sample Range, mm)". Both charts feature colored zone bands — light
    green/teal for the normal zone (between center line and ±2σ) and light peach/orange
    for the warning zones (between ±2σ and UCL/LCL). The title "spc-xbar-r · bokeh
    · pyplots.ai" appears at the top left. Data points are shown as blue circles connected
    by blue lines. Three out-of-control points in the X-bar chart are highlighted
    with red diamond markers at approximately samples 9 (above UCL), 18 (below LCL),
    and 25 (above UCL). Red dashed UCL/LCL lines, a solid dark center line, and orange
    dotted ±2σ warning lines are labeled on the left side of each chart. The R chart
    shows range variation around ~0.12mm with no out-of-control points. Subtle grid
    lines and clean styling with removed outlines give the chart a professional appearance.
