    Both charts feature a light gray (#FAFBFC) background with subtle dashed gridlines.
    Zone bands are visible: green (Zone C, around center line) and orange (Zone B,
    between warning and control limits). Control limits are shown as red dashed lines
    (UCL/LCL), the center line as a solid black line, and ±2σ warning limits as orange
    dotted lines. Normal data points are blue circles connected by a blue line, while
    out-of-control points appear as larger red diamonds. In the X-bar chart, samples
    9 and 25 exceed the UCL, and sample 18 falls below the LCL. In the R chart, sample
    13 shows an abnormally high range exceeding the UCL. Right-side labels identify
    UCL, LCL, X-bar, R-bar, +2σ, and −2σ. Axis labels include units (mm).'
