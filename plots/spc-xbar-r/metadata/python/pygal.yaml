review:
  strengths:
  - 'Perfect Imprint palette semantic mapping: brand green for in-control data, matte
    red (semantic anchor) for out-of-control, blue (Imprint pos. 3) for statistical
    control limits, amber (semantic anchor) for warning limits — exactly the right
    color vocabulary for the domain'
  - Correct SPC implementation with standard A2/D3/D4 constants, realistic CNC scenario,
    and three distinct OOC injection scenarios that demonstrate the chart's detection
    capability
  - Pygal per-point dict syntax used masterfully to give OOC points both a different
    color and larger size (redundant encoding), maximizing accessibility
  - Full theme adaptation via pygal Style object — foreground/foreground_strong/foreground_subtle
    correctly set for both light and dark surfaces; center line uses INK token so
    it adapts to the surface
  - HTML output with two interactive pygal SVGs stacked vertically, leveraging pygal's
    native interactivity for the web gallery
  weaknesses:
  - Amber warning limits (#DDCC77) against cream background (#FAF8F1) have inherently
    low contrast (known Imprint tradeoff); consider adding a thin INK-colored stroke
    around the warning limit lines to improve visibility on the light surface
  - The R chart's empty OOC series (no ranges exceed UCL in synthetic data) creates
    a legend entry with a red swatch but no corresponding data points in the chart
    — not incorrect but slightly confusing; could suppress the legend entry when ooc_r_pts
    is empty
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface
      Chrome: Title "spc-xbar-r · python · pygal · anyplot.ai" in dark ink, clearly readable. Axis labels "X̄ (mm)", "R (mm)", "Sample Number" in dark INK, clearly readable. Tick labels (1-30 on x-axis, numeric mm values on y-axis) in dark INK_MUTED, readable. Legend entries with colored swatches and dark text labels, readable.
      Data: Brand green #009E73 line for sample means (top) and ranges (bottom). Three OOC points in matte red #AE3030 at larger size (samples 8, 19, 25 in X-bar chart). Dashed blue #4467A3 UCL/LCL lines. Solid near-black center line. Dashed amber #DDCC77 warning limits (slightly low contrast on cream bg, but visible).
      Legibility verdict: PASS — all text elements readable; amber limits slightly subtle but within acceptable range

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface
      Chrome: Title renders in light cream #F0EFE8 via foreground_strong=INK — clearly legible against dark background. Axis labels adapt to light foreground — readable. Tick labels rendered in muted-light #A8A79F via foreground_subtle=INK_MUTED — visible against dark background. No dark-on-dark text failures observed. Legend entries in light ink — readable.
      Data: Data colors identical to light render — brand green #009E73 line, matte red #AE3030 OOC points, blue #4467A3 control limit lines, amber #DDCC77 warning limits. Center line correctly uses INK=#F0EFE8 in dark mode (cream/near-white) — distinguishable from dark background.
      Legibility verdict: PASS — theme adaptation correctly implemented via pygal Style tokens; all major text elements readable against dark surface
