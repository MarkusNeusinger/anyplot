review:
  strengths:
  - Imprint palette with semantic role assignments (green=in-control, red=OOC, amber=warning,
    neutral=center-line) is perfectly correct and intentional
  - Zone shading (±1σ and ±2σ bands) adds professional SPC context that guides the
    reader before they even look at the points
  - Diamond marker shape for OOC points provides redundant encoding beyond color alone
    — excellent CVD-safety and clear visual emphasis
  - Inline control limit labels (UCL, +2σ, CL, −2σ, LCL) eliminate the need for a
    legend — cleaner and more readable than a legend box
  - Standard Shewhart constants A2/D3/D4 for n=5 used correctly — the data and statistical
    methodology are accurate
  - Title fontsize dynamically scaled to title length — a thoughtful detail that prevents
    overflow
  weaknesses:
  - 'Inline control limit labels in the X-bar chart are crowded: UCL and +2σ labels,
    and −2σ and LCL labels, are positioned with only ~27px vertical separation at
    output scale while each label height is ~52px — resulting in minor overlap. Consider
    increasing the Y-axis range slightly or using a different label placement strategy
    (e.g., anchored to the right side of the chart, or placed at sample=n_samples-1
    with align=right)'
  - R chart has no out-of-control points (all range values stay within UCL) — the
    spec says to generate at least 2-3 OOC points to demonstrate detection; adding
    one OOC range observation would better demonstrate the R chart detection capability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "CNC Shaft Diameter Monitoring · spc-xbar-r · python · altair · anyplot.ai" is bold, centered, and clearly readable in dark ink. Axis labels "X̄ (mm)", "Range R (mm)", and "Sample Number" readable with correct INK color. Tick labels clearly visible in INK_SOFT.
      Data: Two stacked panels. X-bar chart (top): green (#009E73) line connecting 30 sample means, green filled circles for in-control points, red (#AE3030) diamond markers at samples 8, 17, 24 (out-of-control). Dashed red UCL/LCL lines, dashed amber warning limit lines, solid black center line. Blue zone shading bands (±1σ and ±2σ). Inline labels UCL, +2σ, CL, −2σ, LCL on the left at sample 2. R chart (bottom): same green line for ranges, no OOC points visible in range, UCL/LCL/warning/center lines similarly drawn. Both charts clearly show control structure.
      Legibility verdict: PASS — all text is readable. Minor crowding of inline limit labels in X-bar chart (UCL/+2σ and −2σ/LCL labels close together due to tight scale), but color coding (red/amber/dark) keeps them distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title, axis labels, and tick labels all render in light cream/off-white (#F0EFE8 / #B8B7B0) — clearly readable against dark background. Grid lines are subtle dashed white at low opacity. No dark-on-dark failures detected. Center line (CL) renders white in dark mode (INK adaptive token working correctly).
      Data: Data colors are identical to light render — green line/points for in-control data, red diamonds for OOC (samples 8, 17, 24 in X-bar). Zone shading bands visible as subtle blue regions on dark surface. Amber warning lines and red limit lines clearly visible. Brand green #009E73 reads well on dark surface.
      Legibility verdict: PASS — all text is readable in dark theme. Chrome correctly flips from dark-on-light to light-on-dark. Data palette colors are identical across themes.
