review:
  strengths:
  - Idiomatic FacetGrid usage with shared x-axis is the ideal seaborn pattern for
    dual-panel SPC charts
  - Semantic color scheme (green data, blue CL, red alarms, amber warnings) is both
    Imprint-compliant and instantly interpretable
  - Diamond OOC markers use redundant shape+color encoding — excellent accessibility
    practice
  - Legend with exact numerical limit values (e.g., UCL = 3.2087) is highly informative
    for a process-control audience
  - Theme-adaptive chrome is correctly implemented with full INK/INK_SOFT token threading;
    no dark-on-dark failures
  weaknesses:
  - 'Warning-zone fill (fill_between at alpha=0.11 of #009E73) is nearly invisible
    on the dark (#1A1A17) background — increase alpha to ~0.18-0.22 for dark render,
    or make it theme-adaptive: alpha=0.11 if THEME == ''light'' else 0.20'
  - X-axis starts at 0 instead of 1 — for a control chart where samples are numbered
    1-30, the axis should ideally start at 1 to avoid a visual gap at the left edge;
    add ax.set_xlim(0.5, n_samples + 0.5) in the panels loop
  - DE score capped by generic dual-panel layout — adding an in-chart annotation like
    '3 OOC signals' or a shaded background strip on OOC sample columns would meaningfully
    improve data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "spc-xbar-r · python · seaborn · anyplot.ai" at 12pt centered — readable; Y-axis labels "Sample Mean (mm)" / "Sample Range (mm)" at 10pt — readable; X-axis label "Sample Number" at 10pt — readable; tick labels at 8pt — readable; panel labels "X̄ Chart" / "R Chart" bold 10pt — readable
      Data: Brand green #009E73 data line with circle markers; three OOC points at samples 9, 17, 26 as red #AE3030 diamonds; solid blue #4467A3 center line; dashed red UCL/LCL lines; dotted amber #DDCC77 warning limits; subtle green fill between warning zone
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
