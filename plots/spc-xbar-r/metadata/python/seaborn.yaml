      Data: Data colors identical to light render — green line #009E73, red OOC diamonds #AE3030, blue CL #4467A3, amber warning dotted lines #DDCC77; warning-zone fill (alpha=0.11 of #009E73 on #1A1A17) is nearly invisible in dark mode — functional but very faint
      Legibility verdict: PASS (fill invisibility noted as weakness, not a legibility failure)
