    rc params
  - Realistic industrial context (CNC injection molding at 3.200mm target) with plausible
    process std
  weaknesses:
  - LM-02 — Most visualization elements (axhline, scatter, fill_between, ax.text)
    are matplotlib primitives rather than seaborn-idiomatic APIs; future implementations
