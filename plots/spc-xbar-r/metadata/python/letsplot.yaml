review:
  strengths:
  - Correct stacked X-bar/R SPC layout with proper panel proportions — X-bar on top,
    R on bottom sharing the same x-axis
  - Accurate use of SPC constants (A2=0.577, D3=0.0, D4=2.114) for n=5 subgroups;
    UCL/LCL/warning limits computed correctly
  - Out-of-control points use filled solid red (#AE3030 semantic anchor) vs hollow
    green open circles — redundant encoding via fill and color that aids CVD users
  - Three distinct limit-line styles (solid CL, dashed UCL/LCL, dotted warning limits)
    create clear visual hierarchy without a legend
  - Inline text annotations (UCL, CL, LCL, R̄) instead of legend — clean and space-efficient
  - 'Theme-adaptive chrome fully implemented: backgrounds, text, axis lines all flip
    correctly between light (#FAF8F1) and dark (#1A1A17) modes'
  - 'Distinctive lets-plot features used well: layer_tooltips() for interactive HTML
    export, gggrid() for panel composition, plot_margin array tuning'
  - Y-axis-only grid with minor grid removed — clean, minimal chart chrome
  - Realistic CNC shaft diameter dataset with np.random.seed(42) for reproducibility
  - 'Correct output: both plot-{THEME}.png (scale=4 → 3200×1800) and plot-{THEME}.html
    produced'
  weaknesses:
  - Panel border/frame not removed — the default lets-plot panel outline is visible
    as a box around each chart. Add panel_border=element_blank() (or equivalent) to
    both theme_top and theme_bottom to achieve the cleaner L-shaped or borderless
    spine style the style guide prefers.
  - Annotation text labels (UCL, CL, LCL, R̄) use geom_text(size=4mm) which renders
    somewhat small at the canvas edge. Consider bumping to size=5-6 for better legibility
    on small viewports.
  - 'Third X-bar OOC point (sample 25, shift=0.12mm) does not breach the UCL — only
    2 X-bar OOC points are visible. Minor: the 1 R-chart OOC point brings the total
    to 3 across both charts, which satisfies the spec, but a slightly larger shift
    at sample 25 would more clearly demonstrate the detection capability stated in
    the spec.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — NOT pure white, correct Imprint light surface across both panels and the surrounding plot area.
      Chrome: Bold title "spc-xbar-r · python · letsplot · anyplot.ai" in dark (#1A1A17) at size 16 — clearly readable, spans ~70% of canvas width. Y-axis labels "X̄ (Sample Mean, mm)" and "R (Sample Range, mm)" in dark ink, readable. Bottom x-axis label "Sample Number" readable. Tick labels in INK_SOFT (#4A4A44) at size 10, readable. UCL/CL/LCL inline annotations in INK_SOFT, small but legible.
      Data: Two-panel stacked chart. Top (X-bar): brand green (#009E73) line with hollow open-circle markers for in-control points; 2 filled solid red (#AE3030) circles at samples ~8 and ~19 that breached UCL and LCL respectively. Dashed gray UCL/LCL lines, dotted gray warning lines, solid black center line. Bottom (R chart): same green line/hollow circles for in-control; 1 filled red OOC at sample ~12. UCL=0.27 visible, R̄~0.12 center line, LCL at 0.
      Legibility verdict: PASS — all text readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — NOT pure black, correct Imprint dark surface across both panels and surrounding area.
      Chrome: Title text and axis labels rendered in light cream (#F0EFE8/INK for dark theme) — clearly visible against the dark background. Tick labels in light secondary color (#B8B7B0/INK_SOFT for dark) — readable. No dark-on-dark issues detected. Center line flips to near-white (INK = #F0EFE8 in dark mode). Limit lines are lighter gray dashes, visible against dark background.
      Data: Data colors (brand green #009E73 and matte red #AE3030 OOC points) are IDENTICAL to the light render — both are Imprint categorical/semantic colors that stay constant across themes. The hollow green markers and filled red OOC points are clearly distinguishable against the dark background.
      Legibility verdict: PASS — all text readable against the warm near-black background; no dark-on-dark failures.
