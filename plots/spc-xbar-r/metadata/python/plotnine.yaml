review:
  strengths:
  - 'Perfect spec compliance: X-bar and R charts stacked vertically via facet_wrap
    with correct UCL/LCL/CL/warning limits and out-of-control highlighting'
  - 'Semantically correct Imprint palette: green (#009E73) for in-control, matte red
    (#AE3030) for OOC/limits, blue (#4467A3) for center line, amber (#DDCC77) for
    warning lines'
  - Shape and size redundancy for OOC points (diamond marker + larger size=4.0) provides
    CVD-safe dual encoding
  - Authentic SPC implementation using correct control chart constants (A2=0.577,
    D3=0, D4=2.114 for n=5)
  - Right-edge label de-overlap logic prevents label crowding on the control limit
    annotations
  - 'Fully theme-adaptive chrome: all text/background/grid tokens flip correctly between
    light and dark renders'
  - 'Clean, idiomatic plotnine code: facet_wrap for dual-panel layout, scale_*_identity()
    for direct aesthetic mapping, layered geoms for line-type differentiation'
  - 'Perfect code quality: KISS structure, np.random.seed(42), all imports used, correct
    output filenames'
  weaknesses:
  - Right-edge labels in the R chart panel are somewhat crowded — the de-overlap min_gap
    of 30% of chart_range may displace labels significantly from their actual control
    lines; UWL and LWL labels in the R chart appear close together
  - In-control data points (geom_point size=2.5) are on the minimum end for a sparse
    30-point dataset — the density heuristic recommends larger, prominent markers
    for < 50 points; slightly increasing to size=3.0 would improve visibility
  - geom_label size=3 (mm, ~8.5pt) for control limit annotations is small relative
    to the canvas; increasing to size=3.5 or 4 would improve legibility of UCL/CL/LCL/UWL/LWL
    labels at mobile scale
  - panel_spacing_y=0.05 makes the two panels very tightly packed — a slightly larger
    spacing (0.10–0.15) would give the facet headers more breathing room
