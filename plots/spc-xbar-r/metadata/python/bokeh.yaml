review:
  strengths:
  - Accurate SPC X-bar/R implementation using correct constants (A2=0.577, D3=0, D4=2.114
    for n=5) with properly computed UCL/LCL at ±3σ and warning limits at ±2σ
  - 'Semantically excellent color coding: #009E73 (green=in-control), #AE3030 (red=OOC),
    #DDCC77 (amber=warning) — all Imprint palette or anchor values with obvious semantic
    roles'
  - Zone fills via BoxAnnotation provide immediate visual context for process zones
    (green=safe, amber=warning), substantially elevating the chart above a plain line
    plot
  - 'OOC points use redundant encoding: larger size (24 vs 16), diamond vs circle
    marker shape, AND color — fully CVD-safe'
  - 'Complete theme adaptation throughout: background, axis labels, tick labels, grid,
    legend box, and text annotations all adapt correctly between #FAF8F1 light and
    #1A1A17 dark surfaces'
  - Shared x_range between the two panels keeps them perfectly synchronized — idiomatic
    Bokeh
  - CDP setDeviceMetricsOverride ensures exact 3200×1800 pixel output regardless of
    Chrome viewport chrome
  - 'Elevated background fills on ±2σ callout labels (#FFFDF6 / #242420) improve readability
    of amber text in both themes'
  weaknesses:
  - R chart lower warning limit label (−2σ at y≈0.041) is placed below the visible
    y-axis range (visible range starts ~0.05), so the label is either invisible or
    rendered outside the plot area — adjust the R chart's y_range start to include
    lwl_r, or omit the −2σ label when it falls below the axis range
  - Right-side annotations on X-bar chart span a narrow mm range (UCL=25.073 to LCL=24.930
    = 0.143mm), placing UCL, +2σ, X̄̄, −2σ, and LCL labels in tight proximity — reduce
    label font size from 24pt to 18pt or add small y-offsets (±0.003) to improve separation
  - Legend is duplicated in both panels (identical In Control / Out of Control entries)
    — consider keeping legend only in the top panel and adding a brief text note in
    the bottom panel instead
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, clearly not pure white.
      Chrome: Bold black title "spc-xbar-r · python · bokeh · anyplot.ai" at top. Y-axis labels "X̄ (Sample Mean, mm)" and "R (Sample Range, mm)" in dark ink, clearly readable. Tick labels in INK_SOFT (#4A4A44). Grid lines present on y-axis only with subtle alpha (~0.12), x-grid hidden.
      X-bar chart: Green (#009E73) line with green circle markers for in-control points. Red (#AE3030) larger diamond markers at samples ~9, ~18, and ~25 (out-of-control). Dashed red UCL and LCL horizontal lines, solid dark center line. Dotted amber ±2σ warning lines. Subtle green zone fill for ±2σ region, amber zone fills for ±2σ–±3σ outer zones. Right-side annotations: UCL=25.073, +2σ, X̄̄=25.002, −2σ, LCL=24.930 — labels are close together given narrow data range.
      R chart: Same green line/dots for ranges, single red diamond at sample 13 (range spike 3.5×). UCL=0.263 and R̄=0.124 labels visible on right; +2σ label visible; −2σ label at y≈0.041 appears below or at the boundary of the visible y-axis range.
      Data: First series #009E73 confirmed. OOC points in #AE3030 confirmed. Warning lines in #DDCC77 confirmed.
      Legibility verdict: PASS — all title, axis, and tick text readable. Minor concern: right-side annotation labels close together at narrow y-range.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, clearly not pure black.
      Chrome: Title visible in light cream color (#F0EFE8 / INK on dark). Axis labels in #F0EFE8, tick labels in INK_SOFT (#B8B7B0) — all readable against dark surface. Grid remains subtle.
      X-bar chart: Same layout as light render. Green line and markers identical to light render (#009E73). Red diamond OOC points identical. Control limit lines, zone fills all visible. Right-side UCL/LCL/X̄̄ labels visible; amber ±2σ labels readable with elevated dark background (#242420).
      R chart: Same green line. Red diamond at sample 13. UCL=0.263 and R̄=0.124 visible. The −2σ label issue persists in dark render as well (near or below visible axis range).
      Data colors: Identical to light render — green #009E73 for in-control, red #AE3030 for OOC, amber #DDCC77 for warnings. Only chrome flips.
      No dark-on-dark failures detected: all text uses theme-adapted INK/INK_SOFT tokens.
      Legibility verdict: PASS — both themes render correctly and readably.
