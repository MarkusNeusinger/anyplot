review:
  strengths:
  - 'Complete dual-panel SPC chart (X-bar + R) with all required elements: UCL/LCL
    (red dashed), warning limits (ochre dashed), center lines (solid), and highlighted
    OOC points'
  - 'Excellent redundant OOC encoding: color (red) + shape (diamond) + size (14 vs
    10) + stroke make violations immediately obvious'
  - Both themes correctly implemented with adaptive chrome tokens; no dark-on-dark
    failures in dark render
  - linkxaxes!() for shared x-axis is the correct idiomatic Makie pattern for multi-panel
    charts
  - Realistic CNC machining context with properly calculated SPC constants (A2=0.577,
    D4=2.115, d2=2.326) and injected OOC signals covering both mean shift and range
    excursion
  - Right-edge limit labels (UCL, X-bar-bar, LCL, R-bar) follow professional SPC chart
    conventions and eliminate the need for a legend box
  weaknesses:
  - 'Warning limits (±2σ) use ochre #BD8233 (categorical palette slot 4) instead of
    the amber semantic anchor #DDCC77 (warning/caution per style guide); replace IMPRINT_PALETTE[4]
    with colorant"#DDCC77" for warning limit lines in both X-bar and R panels'
  - Axis labels (ylabelsize/xlabelsize=13pt) and tick labels (xticklabelsize/yticklabelsize=11pt)
    are one step below Makie library guide defaults (14pt and 12pt respectively);
    increase to match recommendations
