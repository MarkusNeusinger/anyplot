  image_description: The plot displays a P-P (Probability-Probability) plot on a square
    12x12 canvas. Scatter points are plotted with Theoretical Cumulative Probability
    on the x-axis and Empirical Cumulative Probability on the y-axis, both ranging
    from 0.0 to 1.0. Points are colored using the "flare" colormap (light orange for
    small deviations, dark purple for larger deviations) and sized proportionally
    to their absolute deviation from the diagonal. A dashed red-orange reference line
    runs from (0,0) to (1,1) representing perfect distributional fit. A light blue
    ±0.02 tolerance band surrounds the diagonal. A colorbar on the right shows "Absolute
    Deviation from Perfect Fit" ranging from ~0.003 to ~0.037. The legend in the lower
    right identifies "Perfect fit" and "±0.02 tolerance band". Points generally follow
    the diagonal with visible S-shaped deviation in the 0.4-0.7 range, consistent
    with the slightly skewed data mixture. Top and right spines are removed, grid
    is subtle. Title reads "pp-basic · seaborn · pyplots.ai".
