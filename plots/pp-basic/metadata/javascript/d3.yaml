review:
  strengths:
  - Deviation band (d3.area with curveMonotoneX) elegantly visualises the departure
    region between empirical and theoretical CDFs — immediately communicates the S-curve
    story
  - Max departure highlight (circle ring + dynamic callout annotation) creates a clear
    focal point and pulls the viewer's eye to the key diagnostic insight
  - Custom deterministic LCG (seed=42) and in-code Abramowitz & Stegun erf approximation
    achieve full reproducibility without browser Math.random()
  - Correct square orientation with generous margins for the symmetric 0–1 × 0–1 P-P
    space; clip path keeps band and points cleanly inside plot bounds
  - Theme-adaptive chrome fully wired through ANYPLOT_TOKENS (pageBg, ink, inkSoft,
    grid) — both renders pass with no dark-on-dark or light-on-light failures
  - Hazen plotting position (i+0.5)/N and fitted normal parameters satisfy the spec's
    CDF requirements precisely
  - Tick lines removed, grid uses t.grid token at low weight — visual refinement that
    keeps the chart clean without sacrificing orientation cues
  weaknesses:
  - 'Typography hierarchy is compressed: tick labels at 16px CSS vs axis labels at
    18px CSS is only a 2-px gap — widening to ~12px ticks / 18px axis labels would
    give a cleaner visual hierarchy'
  - The max departure annotation uses a plain two-line text callout; adding a small
    background rect (fill=t.elevatedBg, rx=4) would make it read as a proper callout
    box and improve legibility on busy regions of the chart
  - 'Deviation band fill-opacity 0.13 is very subtle in dark mode (palette[0] on #1A1A17
    → near-invisible dark teal fill); bumping to 0.20–0.25 in dark mode would preserve
    the storytelling element across both themes'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "pp-basic · javascript · d3 · anyplot.ai" in dark ink, bold, centered at top — clearly readable. X-axis label "Theoretical Normal Probability" and Y-axis label "Empirical Probability" in dark ink, similar sizes, readable. Tick labels 0.0–1.0 on both axes in dark secondary text — readable. Annotation callout "max departure / Δ = 16.5 pp" in dark ink — readable.
      Data: 200 scatter points in #009E73 (brand green) at opacity 0.65, r=4.5px CSS — clearly visible. A light green fill band (palette[0] at 0.13 fill-opacity) between the empirical curve and the 45-degree diagonal shows the departure region. A dashed gray reference diagonal marks perfect fit. A highlight ring (stroke palette[0]) marks the maximum departure point.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, tick labels, and annotation all rendered in light text — clearly readable against the dark background. No dark-on-dark failures. Grid lines are subtle and visible.
      Data: Data point colors are identical to the light render — #009E73 green markers at same positions and opacity. The deviation band fill is very subtle on the dark background (dark teal near-invisible), but the primary data points and reference diagonal remain clearly visible. Highlight ring still readable.
      Legibility verdict: PASS — all chrome text is light-colored and readable; no dark-on-dark failures. Minor note: deviation band fill is less impactful in dark mode due to very low opacity against dark background.
