review:
  strengths:
  - Perfect spec compliance — all P-P plot requirements met (square canvas, i/(n+1)
    plotting position, 45° reference line, 0–1 axes, fitted MLE parameters).
  - Technically solid token-based theming — transparent background, all chrome via
    ANYPLOT_TOKENS, data color identical across themes.
  - Clean deterministic data generation via LCG + Box-Muller, with accurate Abramowitz
    & Stegun normal CDF approximation.
  - Correct square canvas orientation per spec requirement.
  weaknesses:
  - 'DE-03 LOW: No visual storytelling — the S-shaped deviation from the diagonal
    is the key insight but nothing draws the viewer''s attention to it. Add a descriptive
    title prefix and consider annotating or shading the deviation region around 0.4–0.6.'
  - 'DE-01 MEDIUM: Design sophistication at baseline — standard scatter + line with
    no distinctive visual hierarchy or focal point.'
  - 'DQ-02 LOW: Generic context — series name ''Observed vs Normal'' conveys comparison
    type but no real-world domain. Change to a specific scenario, e.g., ''Manufacturing
    process cycle times (n=200) vs Normal''.'
  - 'CQ-01 MINOR: Three standalone math functions (lcgRand, stdNormal, normalCDF)
    deviate from the strict KISS pattern; acceptable given browser constraints but
    noted.'
  image_description: |-
