      Background: Warm off-white (~#FAF8F1) — correct, not pure white
      Chrome: Title "pp-basic · javascript · highcharts · anyplot.ai" at 22px CSS — dark text, fully readable. X-axis label "Theoretical Probability" and Y-axis label "Empirical Probability" at 16px CSS — readable. Tick labels 0.00/0.25/0.50/0.75/1.00 on both axes at 14px CSS — readable. Legend top-right with "Observed vs Normal" and "Perfect Fit" entries at 14px CSS — readable. Grid lines subtle (token color t.grid).
      Data: 200 green scatter points (#009E73, brand green) along the diagonal with a visible S-shaped deviation around 0.50. Dashed dark-gray reference line (t.inkSoft = #4A4A44) from [0,0] to [1,1] beneath scatter layer.
