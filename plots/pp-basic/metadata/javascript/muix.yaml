    S-curve region cluster without transparency; add opacity: 0.7–0.8 to the series
    config to communicate density visually'
  - Default MUI X four-sided chart border visible; remove top and right borders via
    sx prop for style-guide-compliant L-shaped frame
  - Annotation font sizes at 12–13px CSS are slightly small in the square canvas;
    increasing to 14px would improve legibility at mobile widths
