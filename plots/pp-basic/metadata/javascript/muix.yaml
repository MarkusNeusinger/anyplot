review:
  strengths:
  - 'Correct P-P plot implementation with all required spec features: 45° dashed diagonal
    reference line, square aspect ratio, Weibull plotting positions i/(N+1), and MLE-fitted
    normal CDF using Abramowitz & Stegun approximation'
  - 'Expert idiomatic MUI X usage: useDrawingArea hook for custom SVG positioning
    is the recommended React-first pattern for overlaying reference lines and annotations
    within the chart coordinate system'
  - 'Correct Imprint palette usage with brand green #009E73 as the single data series;
    ThemeProvider correctly handles all chrome tokens so data colors are identical
    across light and dark renders'
  - 'Realistic, neutral statistical context: log-normal vs. normal reference creates
    a visually clear S-shaped deviation that immediately demonstrates the diagnostic
    value of a P-P plot'
  - Deterministic data generation with seeded LCG (lcgRng(42)) satisfies the browser
    harness reproducibility requirement where Math.random() is unavailable
  weaknesses:
  - The 'Perfect fit' annotation (fontSize=12, positioned at top+16 near the diagonal's
    (1,1) endpoint) may be partially obscured by scatter points with empirical CDF
    values in the 0.98–0.99 range, which land at approximately the same SVG y-coordinate
    as the label text. Reposition the label further below the diagonal endpoint (e.g.,
    y={top + 32}) or shift it left with a connector line to avoid the data cluster.
  - Marker size markerSize=4 CSS px is on the small side for 200 data points; increase
    to 5–6 CSS px to improve visibility, especially at mobile scale (~400 px display
    width).
  - 'Design refinement is minimal — MUI X default spines and axis styling are used
    without customization. Remove the top and right axis lines (MUI X: set axisHighlight
    or use sx overrides on axis components) and reduce grid line opacity to ~15% for
    a cleaner look.'
  - 'Aesthetic sophistication could be raised by adding typography hierarchy: increase
    the legend label weight to 500 and use a slightly larger font for the axis labels
    (15–16 px) to create a clearer visual hierarchy between title, axis labels, and
    tick labels.'
  - DE-03 storytelling is limited to the 'Perfect fit' label; consider adding a brief
    text annotation identifying the S-shaped curve deviation region (e.g., at mid-chart
    near 0.4–0.6 theoretical CDF) to guide the reader toward the diagnostic insight.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct, not pure white.
      Chrome: Title "pp-basic · javascript · muix · anyplot.ai" in dark ink at the top (fontSize=18), clearly readable. X-axis label "Theoretical CDF (Normal)" and Y-axis label "Empirical CDF" in dark text at 14px, balanced and readable. Tick labels from 0.00 to 1.00 in 0.05 increments at 12px — small but readable. Legend "Observed (log-normal)" at bottom center in 12px text. The "Perfect fit" annotation at the top-right of the diagonal is 12px and small — readable in isolation but may be partially obscured by upper-right scatter point cluster.
      Data: Brand green (#009E73) scatter markers (markerSize=4) forming a clear S-shaped curve bowing above the diagonal for theoretical CDF < 0.7 and returning toward it at higher values. Dashed reference diagonal in soft-ink (t.inkSoft) from (0,0) to (1,1). First and only series uses Imprint color position 1.
      Legibility verdict: PASS — all chrome text is readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, tick labels, and legend all render in light cream/off-white text via MUI X ThemeProvider (mapping ANYPLOT_TOKENS to MUI palette). All text is clearly readable against the dark background. No dark-on-dark failures observed. Dashed diagonal line is visible in a lighter soft-ink tone against the dark surface.
      Data: Brand green (#009E73) scatter markers are IDENTICAL to the light render — same color, same positions, same S-shaped deviation pattern. Only chrome (background, text, axis lines) flips between themes.
      Legibility verdict: PASS — all chrome text is readable against the dark background; no dark-on-dark failures.
