review:
  strengths:
  - Technically correct P-P plot with proper Weibull plotting positions and Abramowitz
    & Stegun normal CDF approximation
  - Deterministic LCG ensures reproducibility in the browser context without seeded
    Math.random
  - Square orientation correctly chosen for the diagnostic plot type
  - All chrome fully theme-adaptive; data colors identical across light and dark renders
  - Density-appropriate opacity (0.75) and subtle marker border for 200-point scatter
  weaknesses:
  - 'Top and right spines are kept visible (axisLine: show: true on both axes) — for
    a diagnostic scatter plot the style guide recommends removing top/right spines;
    keeping the full rectangular frame is defensible but misses the minimalism default'
  - Real-world context (process measurements / quality control) visible only in code
    comment, not in the chart title or axis labels — a brief descriptive prefix in
    the title would strengthen DQ-02
  - 'LM-02 limited: no use of ECharts-distinctive capabilities beyond the scatter+line
    mix (e.g., visualMap for highlighting deviation zones, or markArea to shade the
    acceptable band)'
