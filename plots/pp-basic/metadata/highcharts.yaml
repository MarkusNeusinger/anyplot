    Normal + Exponential vs. Normal Reference — KS Statistic = 0.064 (p = 0.3729)".
    The x-axis is labeled "Theoretical CDF (Normal)" and the y-axis "Empirical CDF",
    both ranging from 0 to 1 with tick intervals of 0.2. A green dashed diagonal line
    represents the perfect fit (y=x). 200 scatter points are plotted with a deviation-based
    color gradient: points near the diagonal are steel blue/gray with lower opacity,
    while points farther from the diagonal transition to red with higher opacity.
    A diamond-shaped marker in red highlights the maximum deviation point near (0.55,
