review:
  strengths:
  - Deviation-based color gradient from steel blue to red creates intuitive visual
    storytelling
  - Max deviation point highlighted with diamond marker and data label is an excellent
    focal point
  - KS test statistic in subtitle adds statistical rigor and analytical value
  - 'Comprehensive Highcharts feature usage: plotBands, zoom/pan, per-point styling,
    rich tooltips'
  - Clean well-structured code with proper reproducibility seed
  - Square aspect ratio correctly chosen per spec requirements
  weaknesses:
  - Green reference line + red deviation points may challenge red-green colorblind
    viewers
  - Central Region plotBand lacks clear statistical justification
  - Some point clustering in center region reduces individual point distinguishability
  image_description: 'The plot displays a P-P (Probability-Probability) plot on a
