    the diagonal''s meaning.'
  - 'Strong data storytelling: heavier-right-tail points highlighted as red #AE3030
    diamonds, a 45-degree neutral reference line, a 95% KS confidence band, and an
    annotation explaining the detected process drift.'
  - 'Perfect Imprint palette + theme chrome: brand green #009E73 for in-range points,
    semantic matte-red #AE3030 for deviations, theme-adaptive neutral reference line
    and muted band; both #FAF8F1 (light) and #1A1A17 (dark) renders are correct with
    all text legible.'
