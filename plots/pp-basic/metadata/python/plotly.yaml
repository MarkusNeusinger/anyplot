review:
  strengths:
  - 'Correct P-P plot semantics: empirical CDF via i/(n+1) on Y, fitted-normal theoretical
    CDF on X, both axes pinned to 0-1, square aspect locked with scaleanchor/scaleratio,
    and a dashed 45-degree reference line for perfect fit.'
  - 'Strong, accurate use of the Imprint palette: first series is brand green #009E73,
    deviation points use the matte-red semantic anchor #AE3030 (bad/error role), reference
    line uses the theme-adaptive neutral, and the confidence band uses a muted fill.'
  - 'Theme adaptation is fully correct in both renders — backgrounds #FAF8F1 / #1A1A17,
    all chrome (title, axis titles, ticks, legend, annotation box) flips via INK/INK_SOFT
    tokens, while data colors stay identical. No dark-on-dark or light-on-light failures.'
  - 'Redundant encoding beyond color: within-range points are circles, deviations
    are diamonds and slightly larger — keeps the chart CVD-safe and readable.'
  - 'Clear data storytelling: a 95% KS confidence band, red deviation markers, and
    an arrow annotation (''Heavier right tail -> process drift detected'') give the
    viewer an obvious focal point.'
  - 'Idiomatic plotly with genuine interactivity: hovertemplate + customdata expose
    value/deviation per point, fill=''toself'' builds the band, and an interactive
    HTML companion is exported alongside the PNG.'
  weaknesses:
  - 'Marker overplotting along the diagonal: 200 within-range circles at size=9 pile
    into a thick caterpillar where individual points are indistinct in the dense stretches.
    Consider reducing within-range marker size to ~6-7 and/or lowering opacity to
    ~0.6 so the ribbon stays legible while preserving the S-curve shape (VQ-03).'
  - 'Storytelling vs. data slight mismatch: a large block of ''Tail deviation'' diamonds
    clusters in the distribution body (theoretical ~0.45-0.70), not the tails, while
    the annotation reads ''Heavier right tail''. The 85th-percentile threshold flags
    body points too — either tighten the deviant definition to genuine tail regions
    or soften the annotation wording so the red label matches where the diamonds actually
    sit (DE-03).'
  - Confidence band is very wide (KS band ~1.36/sqrt(200) ≈ 0.096) so every point
    sits comfortably inside it, which slightly weakens its diagnostic value as a storytelling
    device — acceptable but could be tightened or annotated.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white — correct.
      Chrome: title "pp-basic · python · plotly · anyplot.ai" centered in dark ink, fully readable and not clipped. Axis titles "Theoretical CDF (Normal)" (x) and "Empirical CDF" (y) in dark ink. Tick labels 0–1 at 0.2 steps in soft ink, readable. Legend (top-left) on elevated #FFFDF6 fill with thin border, four entries readable. Red-bordered annotation box near top-right fully visible. All text PASS.
      Data: within-range markers are brand green #009E73 circles with light edges; tail-deviation markers are matte-red #AE3030 diamonds; dashed reference line in neutral ink; muted grey 95% KS confidence band behind the points. First series is #009E73 — confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black — correct.
      Chrome: title and axis titles in light ink (#F0EFE8), tick labels in light soft ink — all clearly readable against the dark surface, no dark-on-dark failures. Reference line dashes flip to light. Legend on elevated #242420 fill with light text. Annotation box on #242420 fill with red border and light text, readable.
      Data: marker colors identical to the light render — green #009E73 circles and red #AE3030 diamonds unchanged; only chrome and the band/reference-line neutrals flipped. Confirmed.
      Legibility verdict: PASS
