review:
  strengths:
  - 'Sophisticated P-P plot: points colored by signed deviation (Empirical − Theoretical)
    using the theme-adaptive Imprint diverging colormap, making over/under-fit regions
    read at a glance'
  - Kolmogorov-Smirnov 95% confidence band (clipped to [0,1]) adds a meaningful structural
    layer behind the data without competing for attention
  - Square 2400×2400 canvas preserves the diagonal's visual meaning, exactly as the
    spec requires; dashed 45-degree reference line present
  - Theme tokens threaded through every chrome element — both light (#FAF8F1) and
    dark (#1A1A17) renders are fully legible; data colors identical across themes,
    only chrome flips
  - 'Genuine Bokeh-distinctive usage: HoverTool with formatted tooltips in the HTML
    artifact, ColorBar legend, Band layout, and transform()-driven continuous color
    mapping'
  - Clean flat KISS script, seeded (np.random.seed(42)), descriptive axis labels with
    units, correct mandated title
  weaknesses:
  - Near-zero-deviation points fade toward the background in both themes (near-white
    in light, near-black in dark); the MUTED ring keeps them legible but they are
    the lowest-contrast elements — acceptable but worth monitoring
  - Colorbar diverging midpoint is theme-colored, so the central band of the colorbar
    blends into its own background in dark mode — the gradient endpoints still read
    clearly, minor only
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), confirmed — not pure white, not dark.
      Chrome: title "pp-basic · python · bokeh · anyplot.ai" in dark ink top-left; italic axis labels "Theoretical Cumulative Probability (Normal Fit)" (x) and "Empirical Cumulative Probability" (y) in dark ink; tick labels 0–1 on both axes in soft ink; subtle low-alpha grid. All readable.
      Data: ~200 points along the diagonal colored by signed deviation via the Imprint diverging ramp (matte-red #AE3030 below the line, blue #4467A3 above), each with a soft MUTED ring; muted-gray KS confidence band behind the points; dashed dark 45-degree reference line; vertical colorbar at right titled "Empirical − Theoretical" (−0.03…0.03). Continuous encoding uses imprint_div, no categorical series so #009E73 N/A.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), confirmed — not pure black, not light.
      Chrome: same title/labels/ticks in light ink (#F0EFE8 / soft), clearly visible against the dark surface; grid subtle but present. No dark-on-dark failures detected.
      Data: identical point colors and positions to the light render (red-below / blue-above diverging ramp); confidence band now a subtle lighter-than-background gray; dashed light reference line; colorbar with theme-flipped near-black midpoint. Only chrome flipped, data colors preserved.
      Legibility verdict: PASS
