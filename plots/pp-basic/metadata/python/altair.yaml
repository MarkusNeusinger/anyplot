review:
  strengths:
  - 'Correct, well-executed P-P plot: empirical CDF (i/(n+1)) on Y vs theoretical
    normal CDF on X, both axes locked to [0,1] with a square 2400x2400 canvas that
    preserves the meaning of the 45-degree diagonal.'
  - 'Strong design hierarchy: points colored along the imprint_seq (green->blue) continuous
    colormap by absolute deviation, with the maximum-deviation point highlighted by
    a matte-red ring + bold label as a clear focal point.'
  - 'Thoughtful extra context without clutter: a subtle Kolmogorov-Smirnov confidence
    band (+-1.36/sqrt(n)) around the diagonal frames where points should fall.'
  - 'Theme adaptation is flawless: light render on warm #FAF8F1 and dark render on
    warm #1A1A17, identical data colors across both, all chrome readable (no dark-on-dark),
    legend frame uses the elevated surface token.'
  - 'Idiomatic, distinctive Altair: layered composition (band + reference line + points
    + ring + label), pointerover selection that grows/opacifies the nearest point,
    gradient colorbar legend, and an interactive HTML export alongside the PNG.'
  - 'Clean KISS script: seeded (np.random.seed(42)), linear top-to-bottom, no functions/classes,
    only used imports.'
  weaknesses:
  - Deviation is double-encoded by both color AND marker size (size range 55-200),
    but the size channel has no legend (legend=None) — a reader sees markers of varying
    size with no key explaining what size means. Either drop the size encoding (color
    already conveys deviation) or expose a size legend.
  - 'Heavy overplotting along the diagonal: ~200 points with sizes up to 200 px form
    a thick overlapping ''caterpillar'' on the 45-degree line, so individual points
    blur together in the dense central region. alpha=0.7 helps but consider slightly
    smaller base markers or lower max size to reduce the pile-up.'
  - The 45-degree reference line uses INK_SOFT rather than the dedicated `neutral`
    anchor (INK) that the style guide reserves for reference/baseline rules; minor,
    but the neutral token would tie it more clearly to the structural layer.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), no pure white — correct.
      Chrome: bold dark title "pp-basic · python · altair · anyplot.ai" with a soft-gray subtitle "Blood pressure normality check — points colored by deviation from perfect fit". Axis titles "Theoretical CDF (Normal)" (x) and "Empirical CDF" (y), tick labels 0.0–1.0 on both axes, all dark and clearly readable. Subtle 15%-opacity grid. Legend box ("Deviation" gradient 0.00→0.04) sits in the empty bottom-right triangle with an elevated #FFFDF6 fill. All text readable. PASS.
      Data: points form a chain along the diagonal, colored on the imprint_seq green→blue continuous scale by deviation (low=green near #009E73, high=blue near #4467A3). Dashed gray 45° reference line, light-gray KS confidence band, matte-red ring + "Max deviation: 0.045" label near the center.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), no pure black — correct.
      Chrome: title now light/near-white, subtitle light gray, axis titles and 0.0–1.0 tick labels light and clearly readable, grid faint light at 15%. Legend frame uses elevated dark #242420 with light label text. No dark-on-dark failures. PASS.
      Data: identical green→blue point coloring to the light render (only chrome flipped), same dashed 45° reference line (light gray), same darker-gray KS band, same matte-red max-deviation ring + label. Brand-adjacent green still clearly visible on the dark surface.
      Legibility verdict: PASS
