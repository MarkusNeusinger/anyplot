review:
  strengths:
  - 'Correct P-P plot semantics: empirical CDF via i/(n+1) plotting position on the
    y-axis vs. standardized theoretical normal CDF on the x-axis, with a square equal-aspect
    canvas that preserves the meaning of the 45-degree diagonal.'
  - 'Theme adaptation is fully correct in both renders — warm off-white #FAF8F1 /
    near-black #1A1A17 backgrounds, the reference diagonal flips ink color (black
    in light, near-white in dark), and the Imprint brand green #009E73 sample markers
    stay identical across themes.'
  - 'Thoughtful extra: a 95% confidence band derived from the order-statistic variance
    of cumulative probabilities adds genuine diagnostic value and a clear visual envelope
    around the diagonal.'
  - Realistic, neutral data narrative (bolt tensile-strength QC with a secondary-supplier
    batch producing the classic S-shaped tail departure) that actually exercises the
    P-P plot's purpose.
  - 'Clean KISS script: seeded RNG for reproducibility, no functions/classes, only
    used imports, Axes-method API, spines trimmed top/right, subtle grid, marker edge-stroke
    for separation.'
  weaknesses:
  - 'VQ-03/DE: with 200 markers at s=90 the points overlap into a thick ''string of
    pearls'' along the diagonal; the deviation is still readable but a slightly smaller
    marker (s=55-70) would reduce the crowding and let the underlying density read
    more cleanly.'
  - DE-03 storytelling is moderate — the plot shows the S-shape departure but does
    not call attention to it; a light annotation near the upper tail (e.g. 'heavier
    upper tail') would sharpen the focal point without adding chrome.
  - 'LM-02: the matplotlib usage is solid but not especially distinctive — fill_between
    + set_aspect(''equal'') + MultipleLocator are standard; nothing leverages a uniquely
    matplotlib capability.'
  image_description: |-
