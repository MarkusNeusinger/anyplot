review:
  strengths:
  - Excellent semantic three-tier color hierarchy (green = good fit, amber = mild
    deviation, matte red = strong deviation) drawn from Imprint anchors — CVD-safe
    and reinforced with graduated dot sizes (9/13/18) so severity reads even in grayscale.
  - Correct square 2400x2400 canvas preserving the visual meaning of the 45-degree
    diagonal, exactly as the spec requires.
  - 'Flawless theme adaptation: data colors are identical across light and dark renders,
    only chrome flips — including the theme-adaptive neutral reference line (dark
    on light, light on dark).'
  - 'Strong spec compliance: empirical CDF via i/(n+1) plotting position, theoretical
    CDF via fitted Normal (Phi), both axes locked to 0-1, dashed 45-degree reference
    line drawn underneath the data.'
  - 'Leverages pygal''s distinctive interactivity: per-point fancy tooltips with observed
    MPa value and signed delta, plus interactive HTML export alongside the static
    PNG.'
  - Plausible, neutral quality-control narrative (steel-rod tensile strength) that
    naturally produces the S-shaped departure the spec describes.
  weaknesses:
  - Mid-range points overlap heavily (200 pts, opacity .78); the dense 'good fit'
    green cluster along the diagonal could use a slightly smaller dot size or lower
    opacity for that tier to reduce clutter without losing the focal red points.
  - The legend has four fairly verbose entries with inline delta math (e.g. 'Mild
    deviation 0.01 < |delta| <= 0.025 (79 pts)') that may compress toward the lower
    readability bound when the image is scaled to ~400 px mobile width.
  - The 45-degree reference diagonal is quite thin/subtle in both renders; a marginally
    heavier stroke would make the 'perfect fit' baseline read more clearly behind
    the dense point band.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across both page and plot area. Correct.
      Chrome: title "pp-basic · python · pygal · anyplot.ai" in dark ink, centered, ~50% width — readable. X label "Theoretical CDF (fitted Normal)" and Y label "Empirical CDF (steel-rod tensile strength)" in dark ink, balanced sizes, readable. Tick labels 0/0.2/0.4/0.6/0.8/1 on both axes, dark, readable. Subtle dotted grid. Four-entry legend at the bottom, dark text, fully visible (not clipped).
      Data: first categorical series "Good fit" = brand green (#009E73); "Mild deviation" = amber (#DDCC77); "Strong deviation" = matte red (#AE3030); reference diagonal = neutral dark line (dashed). Graduated dot sizes by severity. Points follow the diagonal with the expected S-shaped departure.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) across page and plot area. Correct.
      Chrome: title, axis labels, and tick labels rendered in light ink (#F0EFE8 / muted) — all clearly readable against the dark surface, no dark-on-dark failures. Grid subtle but visible. Legend at bottom in light text, fully visible.
      Data: green / amber / red data colors are IDENTICAL to the light render — only chrome flipped. The neutral reference diagonal correctly flips to a light gray line so it stays visible on dark.
      Legibility verdict: PASS
