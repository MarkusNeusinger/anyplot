review:
  strengths:
  - 'Correct P-P plot construction: theoretical CDF (fitted Normal via erf) on X,
    empirical CDF i/(n+1) on Y, both axes locked to 0-1 on a square 2400x2400 canvas
    that preserves the 45-degree diagonal''s meaning'
  - Three-tier severity hierarchy (good/mild/strong deviation) encoded redundantly
    by Imprint semantic colors AND graduated dot sizes (7/13/18px), creating a clear
    focal point on the red strong-deviation clusters without relying on color alone
  - Dashed neutral 45-degree reference line drawn first so data points sit on top;
    theme-adaptive so it reads on both surfaces
  - 'Flawless theme adaptation: warm off-white #FAF8F1 / near-black #1A1A17 backgrounds,
    identical data colors across renders, all chrome legible in both themes with no
    dark-on-dark or light-on-light failures'
  - 'Distinctive pygal usage: interactive HTML export, fancy tooltips with per-point
    Delta labels, legend_at_bottom, all driven through a single themed Style object'
  - Realistic, neutral QC scenario (steel-rod tensile strength, compliant normal batch
    + heat-treatment exponential drift) that genuinely produces visible S-shaped departures
    from the diagonal
  - 'Clean KISS script: seeded (np.random.seed(42)), no functions/classes, only used
    imports, correct plot-{THEME}.png + .html output'
  weaknesses:
  - Axis tick labels (0, 0.2 ... 1.0) sit on the smaller side relative to the title/axis
    labels; when scaled to ~400px for mobile they remain legible but bumping major_label_font_size
    slightly would improve the safety margin
  - Severity tiers lean on a green-to-red progression; the amber mid-tier and graduated
    dot sizes mitigate CVD risk well, but the green good-fit and red strong-dev series
    are the primary color contrast a deuteranope must resolve
  - The 45-degree reference line is quite thin in the light render and can be momentarily
    lost under the dense good-fit band near the lower-left; a touch more stroke weight
    or contrast would keep it readable end-to-end
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), plot and page consistent.
      Chrome: dark title "pp-basic · python · pygal · anyplot.ai" centered top; axis titles "Theoretical CDF (fitted Normal)" (X) and "Empirical CDF (steel-rod tensile strength)" (Y) clearly readable; tick labels 0–1 on both axes readable; subtle muted grid; bottom legend with 4 entries all legible.
      Data: first data series (good fit) is brand green #009E73; mild dev amber #DDCC77; strong dev matte red #AE3030; neutral dark dashed 45-degree reference line. Points trace an S-shaped departure from the diagonal with red clusters at ~0.4 and ~0.7.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17).
      Chrome: light title and axis labels, light tick labels, subtle grid, bottom legend — all clearly readable; no dark-on-dark failures. Reference line flips to a light neutral stroke.
      Data: data colors identical to the light render (green/amber/red unchanged); only chrome flipped. Same S-shaped deviation pattern.
      Legibility verdict: PASS
