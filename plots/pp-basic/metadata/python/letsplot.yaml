review:
  strengths:
  - 'Textbook P-P plot: empirical CDF (i/(n+1)) on Y vs normal theoretical CDF on
    X, square coord_fixed canvas, dashed 45-degree reference line — every spec note
    honored'
  - 'Sophisticated deviation encoding: points colored by signed deviation via imprint_div
    (matte-red -> page-bg -> blue, midpoint 0) and sized by absolute deviation, turning
    a plain diagnostic into a clear QC story'
  - 'Excellent style-guide adherence: reference line uses the neutral ink anchor,
    the 95% Kolmogorov confidence band uses the muted anchor as a soft fill, continuous
    color uses imprint_div with the theme-adaptive midpoint'
  - 'Strong lets-plot distinctive usage: layer_tooltips with formatted weight/deviation/region
    lines plus interactive HTML export — features that couldn''t be replicated in
    static plotnine/ggplot2'
  - 'Theme chrome is correct and readable in both renders; backgrounds are #FAF8F1
    / #1A1A17, all text uses theme-adaptive ink tokens'
  - 'Realistic, neutral data: pharmaceutical tablet-weight QC (target 500mg with occasional
    overfill skew) checked against a fitted normal — plausible scale and a meaningful
    mild S-deviation'
  weaknesses:
  - 'Dark render: near-fit points have fill = midpoint = PAGE_BG (#1A1A17) by design,
    so the smallest/lowest-deviation markers along the diagonal rely almost entirely
    on their INK_SOFT stroke for visibility — they read faintly. Visible but slightly
    weak; consider a touch more stroke contrast or a minimum fill lightness for the
    central band in dark mode.'
  - 'Visual refinement is good but conventional for the grammar: both-axis grid plus
    L-shaped axis lines are retained — fine for a scatter, but there is little beyond
    a well-configured theme_minimal.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white. Correct.
      Chrome: bold dark title "pp-basic · python · letsplot · anyplot.ai" with grey subtitle
        "QC Check: Tablet Weight Distribution vs. Normal Reference (n=200)". Axis titles
        "Theoretical CDF (Normal)" (x) and "Empirical CDF" (y), tick labels 0–1, all dark and
        clearly readable. Subtle grey gridlines, both axes. Right-side gradient legend
        "Deviation (Empirical − Theoretical)". Italic annotation "Max deviation: +0.052" sits in
        the empty lower-right triangle. All text readable.
      Data: ~200 circles hugging the dashed black 45° reference line, colored by signed deviation
        on the imprint_div scale (matte-red below, near-neutral at fit, blue above) and sized by
        |deviation|. A pale grey 95% Kolmogorov confidence band runs around the diagonal. This is
        continuous-color data (no categorical first series), so the #009E73-first rule is N/A;
        the diverging cmap stops are correct.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black. Correct.
      Chrome: title/subtitle now light, axis titles and 0–1 ticks in light grey, gridlines subtle
        dark-grey, legend frame on an elevated near-black panel, annotation light grey. No
        dark-on-dark failures — all text readable.
      Data: identical encoding to the light render — same red/blue diverging colors, same diagonal,
        same band. The dashed reference line flips to light ink. The only differences are chrome and
        the diverging midpoint (page background), so near-fit points have near-black fill and depend
        on their light-grey stroke to stay visible — they read faintly but are still distinguishable.
      Legibility verdict: PASS (minor: central near-fit markers are low-contrast in dark mode)
