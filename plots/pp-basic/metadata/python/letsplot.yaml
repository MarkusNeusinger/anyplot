review:
  strengths:
  - 'Correct P-P plot: empirical CDF vs theoretical normal CDF on a clean 0-1 square
    canvas (coord_fixed) with a dashed 45-degree reference line, exactly as the spec
    requires.'
  - 'Strong data storytelling - signed deviation drives an imprint_div diverging fill
    (matte-red below / blue above the diagonal) and marker size encodes |deviation|,
    while a 95% Kolmogorov band and a ''Max deviation: +0.052'' annotation add diagnostic
    context.'
  - 'Correct continuous palette: scale_fill_gradient2(low #AE3030, mid PAGE_BG, high
    #4467A3) is exactly imprint_div, the right choice for signed-deviation data; backgrounds
    are #FAF8F1 / #1A1A17 and both renders are theme-correct.'
  - Realistic, neutral data context (pharmaceutical tablet-weight QC, n=200) with
    a reproducible seed; theoretical CDF computed inline via math.erf with no heavy
    dependencies.
  - 'Idiomatic lets-plot: layered geoms (ribbon + line + point + text), layer_tooltips
    with formatted fields, and interactive HTML export alongside the PNG.'
  weaknesses:
  - 'Heavy point-on-point overplotting: the 200 shape-21 circles (size range 3-7)
    pile into a thick ''caterpillar'' band along the diagonal, so individual markers
    and their deviation colors merge in the dense center - consider smaller markers
    or lower alpha to reduce the rope effect.'
  - panel_grid_major uses solid INK at size 0.3 (full-contrast) rather than the style
    guide's subtle 15-25% opacity; gridlines read a touch prominent in the light render.
    A lighter/lower-alpha grid would be more refined.
  - In the dark render the near-zero deviation points are filled with the page background
    (#1A1A17 midpoint) so they nearly vanish into the surface, relying only on the
    INK_SOFT stroke for definition - acceptable but slightly muted.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) on both panel and plot surfaces - correct, not pure white.
      Chrome: bold dark title "pp-basic · python · letsplot · anyplot.ai" and gray subtitle "QC Check: Tablet Weight Distribution vs. Normal Reference (n=200)"; axis titles "Theoretical CDF (Normal)" / "Empirical CDF" and 0-1 tick labels all clearly readable. Gridlines are medium-gray, slightly prominent but not dominant. Legend "Deviation (Empirical − Theoretical)" with diverging colorbar on the right. Italic "Max deviation: +0.052" annotation in the empty lower-right triangle, no overlap. All text readable.
      Data: points form an S-shaped band hugging the dashed diagonal reference line, colored by imprint_div diverging scale (matte-red #AE3030 below, blue #4467A3 above, neutral mid); a soft gray Kolmogorov band fills the diagonal corridor. First/primary encoding is the continuous diverging fill (appropriate for signed deviation - brand green not expected here).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) - correct, not pure black.
      Chrome: light title/subtitle, light axis titles and tick labels, subtle light gridlines - all clearly readable, NO dark-on-dark failures. Dashed reference line flips to light. Legend frame and text readable on elevated dark fill.
      Data: identical diverging red↔blue deviation colors and marker sizes as the light render; only chrome flipped. Near-zero-deviation points fill toward the dark page color so they read mainly via their light stroke, but remain visible.
      Legibility verdict: PASS
