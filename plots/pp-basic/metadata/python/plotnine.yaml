review:
  strengths:
  - 'Layered grammar-of-graphics composition: KS 95% confidence ribbon behind the
    data, dashed 45-degree reference line, and deviation-colored points read as a
    clear visual hierarchy.'
  - 'Correct P-P plot semantics: both axes 0-1, square canvas with coord_fixed(ratio=1)
    preserving the diagonal''s meaning, empirical CDF i/(n+1) vs fitted normal CDF.'
  - 'Continuous color encoded with the Imprint sequential ramp (#009E73 brand green
    -> #4467A3 blue) on deviation magnitude - palette-compliant and CVD-safe.'
  - 'Strong theme adaptation: warm off-white (#FAF8F1) and warm near-black (#1A1A17)
    backgrounds, all chrome legible in both renders, data colors identical across
    themes.'
  - Effective data storytelling - the S-curve departure is highlighted with an arrow
    annotation and the manufacturing batch-variation context, guiding the reader to
    the focal point.
  - 'Clean KISS script: flat top-level code, np.random.seed(42), no unused imports,
    saves plot-{THEME}.png.'
  weaknesses:
  - The colorbar legend frame (INK_SOFT border) reads slightly heavy as a box, especially
    in the light render - a thinner or borderless frame would feel more refined.
  - Annotation text sizes are on the small side (the '95% KS confidence band' label
    at size=2.9mm is faint, particularly on the dark surface) - bumping to ~3.2-3.5mm
    would improve mobile legibility.
  - The '<- S-curve reveals batch variation' annotation sits close to the data band
    near x=0.6; verify it never collides with points at smaller render widths.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), not pure white. Correct.
      Chrome: bold dark title "pp-basic · python · plotnine · anyplot.ai" fully visible above the panel; dark axis titles "Theoretical Cumulative Probability (Normal CDF)" and "Empirical Cumulative Probability"; dark tick labels 0.0-1.0 on both axes; subtle low-opacity grid. All readable. Colorbar legend (lower-right) has elevated #FFFDF6 fill with a soft gray border, green->blue gradient swatch and tick labels 0.01-0.05.
      Data: ~200 points along the diagonal, colored by |emp - theo| deviation using the Imprint sequential ramp (brand green #009E73 near zero -> blue #4467A3 for larger departures). Dashed muted-gray 45-degree reference line; muted-gray KS confidence ribbon behind points. Italic context note top-left and bold S-curve arrow annotation mid-plot.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black. Correct.
      Chrome: light/off-white title, axis titles, and tick labels all clearly readable against the dark surface - no dark-on-dark failures. Grid is subtle light lines. Colorbar legend uses elevated #242420 fill with soft border; legend title and ticks light and readable.
      Data: identical data colors to the light render (green->blue sequential ramp), confirming only chrome flipped. Dashed light-gray reference line and darker-gray KS ribbon. Annotations remain readable (the faint "95% KS confidence band" label is the dimmest element but still legible).
      Legibility verdict: PASS
