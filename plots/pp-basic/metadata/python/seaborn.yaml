review:
  strengths:
  - 'Correct P-P plot: empirical CDF (i/(n+1) plotting position) vs fitted-normal
    theoretical CDF, both axes 0-1, dashed 45-degree reference line, enforced square
    aspect (ax.set_aspect(''equal'')) — preserves the diagonal''s visual meaning exactly
    as the spec requires.'
  - 'Deviation encoding adds genuine storytelling: points are coloured by absolute
    deviation from the normal fit via the imprint_seq sequential colormap (correct
    choice for single-polarity magnitude), with a matching colorbar — the elevated-deviation
    blue cluster around the 0.5-0.6 S-curve bend is an immediate focal point.'
  - 'Clean theme adaptation: light render on #FAF8F1, dark render on #1A1A17, data
    colours identical across both, only chrome flips. All title/axis/tick/colorbar
    text fully readable in both themes.'
  - Neutral, plausible domain (steel-bolt tensile strength QC) with a deliberately
    skewed hardened-bolt tail that makes the P-P deviation meaningful and pedagogically
    clear.
  - KISS, reproducible (np.random.seed(42)), clean imports, idiomatic seaborn (sns.set_theme
    rc tokens, sns.scatterplot hue mapping, sns.despine), exact 2400x2400 canvas with
    default bbox_inches.
  weaknesses:
  - 'DE-02 (Visual Refinement): grid is drawn on both axes via ax.grid(True); for
    a P-P plot a slightly lighter/subtler grid would keep the diagonal and points
    more dominant. Minor — grid.alpha=0.15 already keeps it restrained.'
  - 'LM-02 (Distinctive Features): seaborn usage is fairly thin — scatterplot with
    hue is the only seaborn-specific call and the colorbar is built manually in matplotlib
    (legend=False on the scatter). A seaborn-idiomatic touch (e.g. jointplot marginals
    to show the CDF distributions, or sns.relplot at square aspect) would lean harder
    into the library''s strengths.'
  - 'DE-03: the diagonal reference line at alpha=0.7 dashed INK_SOFT reads slightly
    faintly in the dark render where it competes with the deviation colours near centre;
    nudging its contrast would sharpen the ''perfect fit'' baseline. Cosmetic only.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), confirmed — not pure white, not dark.
      Chrome: title "pp-basic · python · seaborn · anyplot.ai" in dark ink, centered, ~55% width, fully visible and not clipped. Axis labels "Theoretical cumulative probability (normal)" (x) and "Empirical cumulative probability" (y) in dark ink, readable. Tick labels 0.0-1.0 on both axes in soft ink, readable. Colorbar on the right labelled "Absolute deviation from normal fit" with ticks 0.01-0.05, vertical label fully visible (not clipped at right edge). Subtle grid visible but restrained.
      Data: P-P scatter (200 points) running tightly along the dashed 45-degree reference line, coloured by deviation via imprint_seq — most points brand green (#009E73, low deviation), a small cluster near the 0.5-0.6 bend shifts toward blue (#4467A3) where the S-shaped departure occurs. First/dominant series colour is the brand green. Reference line is a grey dashed diagonal.
      Legibility verdict: PASS — all text dark-on-light and clearly readable.

