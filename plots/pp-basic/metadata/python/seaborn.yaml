review:
  strengths:
  - 'Correct P-P plot: empirical CDF (plotting position i/(n+1)) on Y vs fitted-normal
    theoretical CDF on X, with a 45-degree dashed reference line and a true square
    (2400x2400) equal-aspect canvas that preserves the diagonal''s meaning'
  - Deviation-encoded color adds genuine data storytelling — points are coloured by
    absolute deviation from the fitted normal, so the blue cluster near the centre
    instantly highlights where the fit is worst (the S-shaped center deviation P-P
    plots are designed to reveal)
  - 'Theme adaptation is fully threaded: light render on #FAF8F1 and dark render on
    #1A1A17, with INK/INK_SOFT tokens applied to title, axis labels, ticks, colorbar
    label/ticks and outline — no dark-on-dark or light-on-light failures in either
    render'
  - Uses the Imprint continuous colormap (imprint_seq green->blue) for the deviation
    scale — no forbidden cmap; data colors identical across both themes
  - Realistic, neutral context (steel-bolt tensile strengths in MPa for manufacturing
    QC) with a deliberate over-hardened skewed tail that produces a visible center
    deviation
  - 'Clean KISS script: flat top-level code, np.random.seed(42) for reproducibility,
    only used imports, idiomatic sns.set_theme + sns.scatterplot + sns.despine'
  weaknesses:
  - 'Marker density is slightly heavy: 200 points at s=70 pile up into a thick overlapping
    ''string-of-beads'' band along the diagonal. The PAGE_BG edge keeps individual
    points distinguishable, but a smaller marker (s~40-50) would reduce overplotting
    and let the deviation colour gradient read more cleanly.'
  - 'Library distinctiveness is moderate (LM-02): the colorbar is built manually via
    matplotlib ScalarMappable rather than a seaborn-native mechanism, and the core
    plot is a single sns.scatterplot — solid but not showcasing features unique to
    seaborn.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), not pure white — correct.
      Chrome: Title "pp-basic · python · seaborn · anyplot.ai" in dark ink, centered above the axes, ~55% width — fully readable. X label "Theoretical cumulative probability (normal)" and Y label "Empirical cumulative probability" in dark ink, balanced sizes. Tick labels (0.0–1.0 both axes) in soft grey, readable. Subtle grid at low alpha. Colorbar on the right labelled "Absolute deviation from normal fit" with grey numeric ticks (0.01–0.05). All chrome readable.
      Data: Dense band of points hugging the 45-degree dashed grey reference diagonal, coloured by deviation via imprint_seq (teal-green for low deviation, blue for the higher-deviation cluster near the centre at ~0.55–0.6). First/low-deviation colour is brand green #009E73. Square equal-aspect canvas.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), not pure black — correct.
      Chrome: Same title, axis labels and colorbar label rendered in light ink (#F0EFE8), tick labels in light-grey (#B8B7B0) — all clearly readable, no dark-on-dark. Grid subtle and visible. Colorbar outline light.
      Data: Identical point positions and identical data colors to the light render (green->blue imprint_seq, brand green at the low end) — only the chrome flipped. Dashed reference diagonal in soft grey, visible.
      Legibility verdict: PASS
