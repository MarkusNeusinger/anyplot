review:
  strengths:
  - 'Perfect spec compliance (15/15): all required features correctly implemented
    — square aspect ratio, reference diagonal, Hazen plotting positions, fitted normal
    CDF, 0–1 axes'
  - 'Full Imprint palette and theme-adaptive chrome: correct in both renders, backgrounds
    and all chrome elements flip correctly between light and dark themes'
  - Self-contained Abramowitz & Stegun normal CDF approximation eliminates external
    statistics package dependency — elegant Julia code
  - Uses current Makie API (size= not deprecated resolution=); all font sizes explicitly
    set with correct Makie parameter names
  - Well-chosen real-world dataset (coating thickness QC) with meaningful S-curve
    deviation demonstrating distributional departure
  weaknesses:
  - 'Font sizes are below style-guide targets: titlesize=20 (effective 40px) and xlabelsize/ylabelsize=15
    (effective 30px) on 2400x2400 canvas — style guide targets ~67px for title, ~53px
    for axis labels. Increase to titlesize=28, xlabelsize=20, ylabelsize=20, xticklabelsize=16,
    yticklabelsize=16.'
  - 'No visual hierarchy or storytelling (DE-03=2): the S-curve deviation is the key
    insight but there is no visual guidance. Color the scatter points by absolute
    deviation from the reference diagonal using imprint_seq cmap (dev = abs.(empirical_cdf
    .- theoretical_cdf)), add a Colorbar labeled ''Deviation from Reference'', and
    optionally a band! for 95% KS confidence envelope (+-1.36/sqrt(n)) to define the
    acceptance region.'
  - 'Design is well-configured but not sophisticated (DE-01=4): combine deviation
    coloring with a Colorbar, increase marker size to 11-12, and add more Figure padding
    whitespace to elevate from ''configured default'' to ''strong design''.'
  - 'Limited Makie-distinctive features (LM-02=2): scatter+lines combination is replicable
    in any library. Use Makie''s band! for confidence envelope, Colorbar for deviation
    magnitude scale, and potentially explicit Figure padding via resize_to_layout!().'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "pp-basic · julia · makie · anyplot.ai" in dark ink, readable. X-axis label "Theoretical Cumulative Probability" and Y-axis label "Empirical Cumulative Probability" in dark INK color, clear. Tick labels 0.0/0.5/1.0 on both axes in muted dark gray (INK_SOFT), readable. Top/right spines removed; left/bottom spines in muted gray.
      Data: Brand green #009E73 scatter points (200 total) with white stroke outlines. Dashed gray reference diagonal from (0,0) to (1,1). Characteristic S-shaped deviation from diagonal visible — points bowing above in lower-center, tracking closely in upper portion — consistent with right-skewed data vs. normal reference.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title, axis labels, and tick labels all render in light off-white/muted-light tones (F0EFE8/B8B7B0 range), fully readable against dark background. Grid lines subtle. Left/bottom spines in muted light gray. No dark-on-dark failures detected anywhere.
      Data: Same brand green #009E73 scatter points — identical to light render, confirming data colors are theme-independent. Dashed reference diagonal visible in muted light gray.
      Legibility verdict: PASS
