review:
  strengths:
  - 'Statistically rigorous: implements custom Abramowitz & Stegun normal CDF approximation
    — no external distribution packages needed, clean and portable'
  - Deviation-coloring via imprint_seq directly encodes the S-curve diagnostic narrative
    — continuous color encoding reinforces where and how the distribution departs
    from normality
  - KS 95% confidence band adds professional statistical context, clearly scoping
    the acceptance region around the reference diagonal
  - 'Perfect theme adaptation: all chrome tokens (INK, INK_SOFT, PAGE_BG) correctly
    flipped between light and dark; data colors stay constant'
  - Square aspect ratio enforced via AxisAspect(1) — spec-correct and visually accurate
    for equal 0-1 probability axes
  - Realistic manufacturing quality-control data context (coating thickness) with
    right-skewed distribution that produces a clear, instructive S-curve departure
  weaknesses:
  - KS confidence band at alpha=0.07 is nearly invisible in both renders — the acceptance
    region adds statistical value but the fill blends into the background; increasing
    to alpha=0.12-0.15 would make it meaningfully visible without competing with data
  - Axis label sizes (xlabelsize=20, ylabelsize=20) are notably larger than the makie.md
    recommended 14pt; while readable, they are disproportionately large relative to
    the rest of the typography hierarchy — consider aligning closer to 14-16pt
  - Scatter markers use no explicit alpha; for 200 points along a narrow S-curve path,
    some clustering occurs in the lower-left region — adding alpha=0.75 would reduce
    overlap without losing the pattern
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — matches the light theme surface exactly, never pure white
      Chrome: Title "pp-basic · julia · makie · anyplot.ai" at top — dark near-black text clearly readable against off-white background. Y-axis label "Empirical Cumulative Probability" rotated, clearly readable in dark ink. X-axis label "Theoretical Cumulative Probability" at bottom, clearly readable. Tick labels (0.0, 0.5, 1.0) in INK_SOFT (#4A4A44) — readable. Top and right spines absent (L-shape frame). Grid lines subtle at alpha=0.12.
      Data: Scatter points in teal/green-to-blue gradient (imprint_seq: #009E73 → #4467A3) colored by deviation magnitude. Most points near the diagonal are rendered in #009E73 (brand green). Dashed gray reference diagonal clearly visible. KS confidence band present as a very faint fill region around the diagonal (alpha=0.07 — barely visible). S-curve deviation visible: points bow above the diagonal in the lower half and below in the upper half, consistent with right-skewed data. No colorbar visible at full rendered scale — it appears to be a narrow strip at the right canvas edge.
      Legibility verdict: PASS — all title, axis, and tick labels clearly readable against the light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — matches the dark theme surface, not pure black; has a subtle warm brownish tint
      Chrome: Title "pp-basic · julia · makie · anyplot.ai" rendered in near-white (#F0EFE8 = INK in dark mode) — clearly readable against the dark background. Y-axis label "Empirical Cumulative Probability" and X-axis label "Theoretical Cumulative Probability" in light text, clearly readable. Tick labels in INK_SOFT (#B8B7B0) — light gray, readable against near-black. Reference diagonal visible as a light dashed line. Grid lines subtle.
      Data: Identical teal/green-to-blue scatter points — data colors are indistinguishable between light and dark renders (only chrome flipped). S-curve pattern identical to light render.
      Legibility verdict: PASS — no dark-on-dark issues detected; all text is appropriately light-colored against the dark background; brand green #009E73 remains clearly visible on the dark surface
