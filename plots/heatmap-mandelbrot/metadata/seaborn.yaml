  strengths:
  - Perfect Mandelbrot set computation with well-implemented smooth coloring algorithm
    (avoids discrete banding)
  - 'All specification requirements met: cardioid, period-2 bulb, proper axis labeling,
    black interior, preserved aspect ratio'
  - Clean, deterministic code with vectorized numpy operations and no unnecessary
    complexity
  - Explicitly set font sizes for all text elements ensuring legibility at output
    resolution
  - Thoughtful use of seaborn mask parameter for interior points
  weaknesses:
  - Library Mastery is limited — seaborn adds relatively little beyond what matplotlib
    imshow could provide
  - Design Excellence has room for improvement — aesthetics are good but not publication-exceptional
  - Horizontal artifact visible near the real axis extending leftward from computation
    at the boundary
  - Colorbar integration could be more polished
  image_description: The plot displays a Mandelbrot set fractal visualization rendered
    as a heatmap. The background of the plot area is black, representing interior
    points of the set that never escape. The fractal boundary is colored using the
    inferno colormap, transitioning from dark purple/indigo for low escape iterations,
    through magenta and orange, to bright yellow for high escape iterations near 100.
    The characteristic cardioid (main body, centered around -0.25+0i) and the period-2
    bulb (large circle centered around -1+0i) are clearly visible as solid black regions.
    Smaller satellite bulbs are visible at the top and bottom of the cardioid. The
    x-axis is labeled Real Axis ranging from -2.5 to 1.0, and the y-axis is labeled
    Imaginary Axis ranging from -1.25 to 1.25. A vertical colorbar on the right shows
    Escape Iterations from 0 to 100. The title reads heatmap-mandelbrot · seaborn
    · pyplots.ai. All text is clearly readable. The fractal boundary shows fine detail
    with self-similar filaments radiating outward. There is a visible horizontal artifact
    near the imaginary=0 axis extending to the left.
