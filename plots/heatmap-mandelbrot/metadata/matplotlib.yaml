  strengths:
  - Excellent smooth coloring implementation using log2(log2(|z|)) formula eliminates
    discrete banding beautifully
  - Cohesive dark theme design with intentional color choices (inferno on black)
  - Perfect spec compliance with all required features implemented correctly
  - Clean efficient vectorized numpy computation with boolean masking
  - Deterministic output with no randomness dependencies
  weaknesses:
  - Colorbar text sizes slightly below recommended thresholds (label 18pt vs 20pt,
