  - Axis labels lack mathematical notation that would add precision
  - All four spines visible reducing visual refinement
  - Generic library usage could leverage more distinctive matplotlib features
  image_description: The plot displays the Mandelbrot set fractal on a black background.
    The characteristic main cardioid and period-2 bulb are prominently visible in
    the center-right of the image. The x-axis is labeled "Real Axis" ranging from
    -2.5 to 1.0, and the y-axis is labeled "Imaginary Axis" ranging from approximately
    -1.25 to 1.25. The title reads "heatmap-mandelbrot · matplotlib · pyplots.ai"
    in white text at the top. A vertical colorbar on the right side shows "Escape
    Iterations" with values from ~25 to ~175+. The "inferno" colormap is used — the
    interior of the set is solid black, while boundary regions transition through
    deep purple, magenta/pink, orange, and bright yellow based on escape iteration
    count. Bilinear interpolation creates smooth color gradients. Smaller satellite
    bulbs and intricate filament structures are visible along the boundary. The overall
    aesthetic is a dramatic dark-themed scientific visualization.
