review:
  strengths:
  - Correct Imprint sequential colormap (green→blue) applied with proper colorrange;
    theme-adaptive chrome (backgrounds, text, ticks, spines) verified correct in both
    renders
  - Smooth coloring with log2(log2(|z|)) normalization correctly implemented per spec;
    interior pixels routed to near-black via nan_color
  - DataAspect() correctly preserves the mathematical proportions of the complex plane
    — aspect ratio is exactly right
  - 'Uses modern Makie API: size= (not deprecated resolution=), idiomatic Figure/Axis/Colorbar
    grid layout'
  - 'Spec range exactly matches default spec values (x: -2.5..1.0, y: -1.25..1.25,
    MAX_ITER=256 > spec minimum of 100)'
  - 'Excellent code quality: KISS linear structure, fully deterministic computation,
    clean two-import file'
  - Both themes fully legible — no dark-on-dark failures; colorbar ticks and label
    flip correctly between themes
  weaknesses:
  - 'Escape speed gradient nearly invisible — almost the entire exterior renders as
    flat #009E73 green. The normalization clamp(smooth / MAX_ITER, 0.0, 1.0) with
    MAX_ITER=256 maps most exterior pixels to values near 0.0 (they escape in a few
    iterations), consuming only the bottom of the green→blue ramp. Fix: replace with
    a power or log transform, e.g. clamp((smooth / MAX_ITER)^0.3, 0.0, 1.0), to spread
    escape values across the full colormap range.'
  - 'The ''escape speed'' data story is not communicated visually: the exterior looks
    like a solid-color mask rather than a gradient heatmap showing iteration dynamics.
    The colorbar exists but the data never reaches the blue end. Same root cause as
    weakness 1 — fixing the normalization resolves this.'
  - 'DE-01 aesthetic impact is limited by the flat-color exterior: the image reads
    as a two-tone illustration (green + black) rather than the richly banded fractal
    that smooth coloring is meant to produce. Again, the normalization fix is the
    single lever that unlocks visual sophistication here.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "heatmap-mandelbrot · julia · makie · anyplot.ai" in dark ink, centered at top — fully readable. Axis labels Re(c) and Im(c) in dark ink — readable. Tick labels in slightly softer dark (#4A4A44) — readable. Colorbar on the right with label "Escape speed" and ticks 0.0–1.0 in dark ink — readable. Top and right spines removed; no grid.
      Data: The Mandelbrot set renders as a solid black shape (near-black #0A0A0A for interior/NaN pixels) against an almost entirely flat #009E73 green exterior. The colorbar shows a green-to-blue gradient but the heatmap exterior uses only the green end — almost no blue is visible anywhere. Near the fractal boundary there is the faintest hint of lighter green, but the majority of the exterior is a uniform single color, making this look like a two-tone image rather than a smooth gradient heatmap.
      Legibility verdict: PASS — all text readable, no overflow, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light cream (#F0EFE8) — fully readable against dark background. Axis labels in light ink — readable. Tick labels in lighter soft (#B8B7B0) — readable. Colorbar ticks and label in light colors — readable. No dark-on-dark failures detected.
      Data: Fractal colors are identical to the light render — same flat green exterior, same black interior. The chrome (background, text, axis elements) correctly flipped to light-on-dark; data colors unchanged. The gradient compression issue (flat green exterior) is equally present in this render.
