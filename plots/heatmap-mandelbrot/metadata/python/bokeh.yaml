review:
  strengths:
  - Perfect spec compliance — all required fractal features implemented correctly
    (smooth coloring, NaN→black interior, real/imaginary axis labels, correct x-range)
  - Correct imprint_seq colormap (#009E73→#4467A3) for continuous escape-time data
    per style guide
  - Theme-adaptive chrome fully implemented with INK/INK_SOFT tokens for both light
    and dark renders
  - 5th-percentile clipping on iteration count spreads the colormap across the visible
    gradient range
  - Idiomatic Bokeh p.image() + LinearColorMapper pattern with nan_color for set interior
  - Clean deterministic code — no randomness, KISS structure, all font sizes explicitly
    set
  weaknesses:
  - Exterior gradient is visually compressed — most escaping pixels map to a narrow
    green range near the low end of the colormap, making the exterior look nearly
    flat. Consider applying log or power normalization to the iteration counts before
    mapping (e.g. np.log1p(iteration_count)) to spread the gradient more evenly and
    reveal fractal detail in the exterior regions.
  - Design storytelling is limited — the near-uniform green exterior reduces visual
    richness. Stretching the color range via a histogram-equalization or log-scaled
    normalization would better utilize the full green→blue gradient and make the fractal
    boundary transition more visually striking.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly not pure white.
      Chrome: Title "heatmap-mandelbrot · python · bokeh · anyplot.ai" in dark #1A1A17 ink, clearly visible at top. X-axis label "Re(c)" and Y-axis label "Im(c)" in dark ink, fully readable. Tick labels (-2.5 to 1.0 on x, -1.5 to 1.5 on y) in INK_SOFT, all legible. Colorbar on right with title "Escape Iterations" (rotated vertically) and numeric tick labels 20–180, all readable.
      Data: Mandelbrot set interior rendered solid black via nan_color="#000000". Exterior colored using imprint_seq (#009E73 green → #4467A3 blue). Most escaping exterior pixels map to the green end of the gradient, making the exterior appear nearly uniform bright green. Color variation (green→blue) is more visible near the set boundary. The characteristic cardioid, period-2 bulb, and satellite bulbs are clearly rendered in black.
      Legibility verdict: PASS — all text elements readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title text rendered in light #F0EFE8 ink — readable against the dark border background. Axis labels "Re(c)" and "Im(c)" in light INK color, visible. Tick labels in INK_SOFT (#B8B7B0), legible against dark background. Colorbar title and tick labels in corresponding light/mid tones. No dark-on-dark text failures detected.
      Data: Identical data colors to light render — same green (#009E73) exterior and black interior. Data palette (positions 1–8 of Imprint) correctly stays constant across themes; only chrome flips. Colorbar gradient identical in both renders.
      Legibility verdict: PASS — all text elements readable against warm near-black background. No dark-on-dark failures observed.
