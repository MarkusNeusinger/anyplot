review:
  strengths:
  - 'Perfect spec compliance: all required Mandelbrot features (smooth coloring, correct
    x-range, interior black, labeled axes) correctly implemented'
  - 'Correct continuous-data palette: imprint_seq (#009E73→#4467A3) via ANYPLOT_SEQ256,
    no forbidden cmaps like viridis'
  - LogColorMapper is the right tool for escape-count data with high dynamic range
    — spreads boundary detail correctly
  - Smooth coloring formula (i + 1 - log2(log2(|z|))) eliminates discrete color banding
    at the fractal boundary
  - 'Full theme-adaptive chrome: INK/INK_SOFT tokens applied to all text elements;
    both renders pass legibility check with no dark-on-dark failures'
  - Canvas dimensions correct (2400×2400 square, gate passed). Vectorized numpy Mandelbrot
    loop is clean and efficient; self-import fix correctly handles file naming collision
  weaknesses:
  - Color bar title font size (30pt) is below tick label size (34pt), creating a minor
    typographic hierarchy inversion — raise title_text_font_size to '34pt'
  - Outer escape region is visually flat (fast-escaping points all map to near-identical
    greens); consider LinearColorMapper with low set to the 5th-percentile escape
    count to spread the gradient more evenly across the visible range
