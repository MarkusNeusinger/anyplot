review:
  strengths:
  - Smooth coloring algorithm with log2/gamma normalization (0.3) effectively distributes
    color across the escape-time gradient
  - Custom colorscale correctly uses imprint_seq (green→blue) with a sharp near-black
    interior breakpoint at z=0.019→0.020
  - Educational annotations (Period-2 bulb, Main cardioid) with well-styled arrows
    guide viewers to key mathematical features
  - Semantic colorbar tick labels (Interior / Mid / Boundary) add interpretive context
    beyond raw escape counts
  - 'Perfect theme-adaptive chrome: all text, axes, and colorbar use INK/INK_SOFT/INK_MUTED
    tokens in both renders'
  - Square canvas (2400×2400) is the correct format choice for the symmetric Mandelbrot
    set
  - Deterministic computation with no randomness ensures perfect reproducibility
  - Interactive hovertemplate showing Re/Im coordinates exploits plotly's native interactivity
    distinctively
  weaknesses:
  - The exterior region appears visually flat — most escaped pixels escape at low
    iterations so their z_data clusters near 0.02 (green), leaving very little of
    the blue end visible. The spec calls for 'smooth, perceptually uniform colormap'
    but the current result reads as a black silhouette on a near-uniform teal background.
    Consider a cyclic/repetitive normalization (e.g. np.sin(smooth_value * pi) re-mapped
    to [0.02, 1.0]) to cycle through the green→blue gradient multiple times and reveal
    more fractal structure in the exterior bands
  - Annotation font size of 10px (40px rendered) is borderline for mobile readability
    at the 400w srcset width — consider raising to 11–12px for both annotation text
    and the colorbar title/tick labels
  - The Period-2 bulb annotation arrow points to (-1.25, 0) but the text anchor is
    positioned to the right, placing the label near the boundary between interior
    and exterior — a slightly longer arrow (ax=70, ay=-55) would move the text comfortably
    into the green exterior and away from the noisy boundary region
