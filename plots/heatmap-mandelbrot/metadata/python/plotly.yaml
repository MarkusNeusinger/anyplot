review:
  strengths:
  - Correct Mandelbrot set algorithm with smooth coloring (log-normalized iteration
    count) that avoids discrete banding
  - 'Uses imprint_seq colorscale (#009E73 → #4467A3) correctly for single-polarity
    continuous data'
  - Square 2400×2400 canvas is the right format for the symmetric complex-plane domain
  - 'Both themes fully functional: warm off-white and near-black backgrounds applied
    correctly, all chrome tokens threaded through'
  - Near-black interior (#0D0D0A) clearly distinguishes the set interior from the
    exterior as required by the spec
  - Y-axis range expanded symmetrically to ±1.75 to match x-axis span of 3.5 — produces
    true 1:1 aspect ratio on the square canvas
  - All text sizes explicitly set following style-guide defaults (title=16px, axis=12px,
    ticks=10px)
  - Interactive hover with real/imaginary coordinate display and HTML export leverages
    Plotly strengths
  - Deterministic computation — no random seed needed; perfectly reproducible output
  - 'Clean KISS structure: flat script, only used imports (os, numpy, plotly.graph_objects)'
  weaknesses:
  - 'Exterior color variation is visually limited: the log normalization compresses
    most escaped pixels toward the green end of the imprint_seq colorscale, making
    the outer region appear nearly uniformly bright green with only a faint blue tinge
    near the boundary. Consider a linear or square-root normalization on the smooth
    values to better spread colors across the full green→blue range.'
  - No colorbar (showscale=False) means the escape count scale is uninterpretable.
    For a scientific/mathematical visualization, a thin colorbar (thickness=12, len=0.85)
    would aid interpretation without cluttering the clean layout.
  - 'Design Excellence is limited by the flat-looking exterior: with only two palette
    stops (green and blue), the escape region lacks perceptual depth. The imprint_seq
    is required, but adjusting the normalization strategy would reveal more color
    variation across the exterior bands — improve DE-01 from well-configured-default
    to above-average aesthetic.'
  - Visual storytelling (DE-03) could be enhanced by adding a subtle annotation marking
    the main cardioid boundary or the period-2 bulb (e.g., small text annotation at
    (-1.25, 0) for the period-2 bulb center), making the mathematical structure more
    accessible to non-expert viewers.
