      Data: The Mandelbrot set interior is near-black (#0D0D0A), clearly contrasting the exterior. The exterior region is predominantly teal-green (#009E73) — the imprint_seq colormap starting color — with very little blue (#4467A3) visible except in the narrow near-boundary band. The characteristic cardioid and period-2 bulb black shapes are clearly visible. Two arrows with annotations ("Period-2 bulb" pointing to x≈-1.25 and "Main cardioid" pointing to x≈-0.15, y≈0.65) are legible in INK_MUTED gray.
      Legibility verdict: PASS — all text elements readable in this theme.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
