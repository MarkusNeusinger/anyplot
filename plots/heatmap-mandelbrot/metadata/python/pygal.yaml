      Data: Data colors IDENTICAL to light render — same green (#009E73) → blue (#4467A3) exterior gradient, same black interior. Only chrome flips. Minor issue: "In set" legend swatch is filled #000000 — nearly invisible against the #1A1A17 background; the INK_SOFT stroke outline provides minimal visual separation. Text label "In set" remains readable.
      Legibility verdict: PASS with minor note — all primary text readable; "In set" swatch has very low contrast in dark mode but text is still visible.
