  - 'Perfectly compliant Imprint sequential colormap (#009E73 to #4467A3) applied
    to continuous escape-time data — no banding, no forbidden cmaps'
  - Smooth coloring formula with log normalization eliminates discrete iteration banding
    and reveals fine fractal boundary detail
  - 'Full spec compliance: all required features present and working in both renders
    (smooth coloring, cardioid and period-2 bulb, black interior, axis labels)'
  - Theme-adaptive chrome is flawless in both light and dark renders — no dark-on-dark
    or light-on-light failures
  - Mathematical italic serif subtitle adds elegance and educational value without
    cluttering
  - High-resolution computation (1400x1000 grid, 200 max iterations) exceeds spec
    minimums
  weaknesses:
  - 'CQ-01 deduction: class definition (MandelbrotHeatmap(Graph)) breaks the KISS
    flat-script structure; refactor to module-level function if pygal internals allow'
  - 'LM-01 deduction: the high-level pygal API is largely bypassed in favour of raw
    SVG node generation; leverage more of pygal''s built-in axes/label machinery where
    possible'
  - Subtitle font size (36px) is noticeably smaller than axis titles (44px); increase
    to ~42-44px for better typographic hierarchy consistency
  - 'DE-01 could reach 8 with one more design push: add a focused annotation marking
    a notable fractal feature (e.g., hairline at Im=0 with label, or an indicator
    to the period-2 bulb boundary)'
