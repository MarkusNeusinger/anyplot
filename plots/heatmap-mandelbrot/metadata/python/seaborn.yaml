    labeled complex-plane axes, and grid resolution exceeding minimums
  - Clean deterministic code with proper canvas (3200×1800, no bbox_inches=tight)
    and correct plt.savefig call
  weaknesses:
  - 'Colormap direction deviates from canonical imprint_seq definition (canonical:
    green→blue, implementation: blue→green). While the comment explains the aesthetic
    intent, repair should verify this reversal is intentional and document it clearly.'
  - The vast exterior region renders as uniform flat blue (#4467A3), since vmax=40
    clips anything escaping in <40 iterations to the same color. A logarithmic vmax
    rescaling or capped at a lower value (e.g. vmax=25) would reveal more tonal variation
    in the exterior.
  - LM-02 could be strengthened — seaborn-distinctive features used (mask, cbar_kws)
    are entry-level; could leverage xticklabels/yticklabels with fmt or additional
    heatmap API args for more distinctive usage.
