review:
  strengths:
  - Correct Imprint sequential palette (low=#009E73, high=#4467A3) applied to continuous
    escape-time data — no forbidden colormaps used
  - Log-transform of escape time prevents flat-green exterior collapse and spreads
    colour gradient across the boundary region
  - Smooth escape-time formula (normalized iteration count minus log2(log2|z|)) correctly
    avoids discrete banding
  - 'Both themes fully wired: PAGE_BG, INK, INK_SOFT all propagate to title, axes,
    tick labels, legend, and plot background'
  - geom_raster(interpolate=True) + coord_fixed(ratio=1.0) is the idiomatic plotnine
    combination for a correctly-proportioned continuous raster
  - na_value=INTERIOR_COLOR in scale_fill_gradient cleanly handles the interior (never-escaping)
    pixels as a distinct solid near-black
  - Annotations ('Cardioid', 'Period-2 Bulb') placed on the dark interior with near-white
    italic text at alpha=0.65 provide context without cluttering
  weaknesses:
  - Annotation size values (size=8 and size=7) exceed the plotnine library guide recommendation
    of ~2.5–4 for annotate/geom_text (which uses mm, not pt) — at this scale the text
    appears acceptable in the render but is technically above the recommended range;
    reduce to size=4–5 for future-proofing
  - 'Design excellence is moderate: no spine removal beyond theme_minimal defaults,
    and the exterior gradient appears visually flat on the green side (most exterior
    pixels escape in 1–5 iterations, clustering near 0 on the log-scale), which limits
    boundary contrast between fast-escaping regions'
  - LM-02 Distinctive Features is modest — could leverage more plotnine-specific strengths
    (e.g. facet_wrap for zoom panel, stat_* transformations)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, visible in margins around the plot panel and behind the legend.
      Chrome: Title "heatmap-mandelbrot · python · plotnine · anyplot.ai" in bold dark ink, centred, clearly readable. Axis label "Re(c)" on x-axis and "Im(c)" on y-axis in dark ink, size 10pt, readable. Tick labels (-2, -1, 0, 1 and -1.0…1.0) in INK_SOFT dark-grey, size 8pt, all readable. Colorbar titled "Escape Iterations" with tick marks at 0, 9, and 100.
      Data: Exterior pixels (fast escape) render as Imprint brand green #009E73 fading toward Imprint blue #4467A3 near the set boundary. Interior (never-escaping) pixels are near-black #0D0D0A. Annotations "Cardioid" and "Period-2 Bulb" appear in near-white italic text at alpha=0.65 on the dark interior, legible. Characteristic cardioid and period-2 bulb shapes are clearly identifiable.
      Legibility verdict: PASS — all chrome text is dark on warm-off-white; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, visible in margins and behind the legend frame.
      Chrome: Title in light F0EFE8 ink, centred, clearly readable against the dark background. Axis labels "Re(c)" / "Im(c)" and tick labels in light INK_SOFT B8B7B0, all readable — no dark-on-dark failures observed. Colorbar "Escape Iterations" label and tick values also light and readable. Legend frame uses elevated dark bg #242420.
      Data: Identical data colours to the light render — green #009E73 exterior, blue #4467A3 near boundary, near-black interior. Annotations remain in near-white at alpha=0.65, legible against the dark interior region.
      Legibility verdict: PASS — no dark-on-dark failures; all text is light-coloured on the near-black surface.
