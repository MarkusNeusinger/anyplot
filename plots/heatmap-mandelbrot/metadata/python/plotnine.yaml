      Data: Green (#009E73) to cyan (#2ABCCD) to blue (#4467A3) gradient exterior; near-black (#0D0D0A) interior. Fractal boundary clearly visible. Italic near-white annotations "Cardioid" and "Period-2 Bulb" inside black interior regions at alpha=0.65.
