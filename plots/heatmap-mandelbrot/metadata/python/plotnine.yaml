review:
  strengths:
  - Mathematically accurate Mandelbrot computation with correct smooth escape-time
    coloring (log-transform + normalized iteration count) that correctly reveals boundary
    detail
  - 'All Imprint palette rules followed for continuous data — only Imprint hex values
    (#009E73, #2ABCCD, #4467A3) used in the gradient'
  - Complete theme-adaptive chrome with correct token usage (INK, INK_SOFT, ELEVATED_BG,
    PAGE_BG) producing correct renders in both light and dark themes
  - Custom colorbar break labels mapping log-space positions back to original iteration
    counts — accurate and informative
  - Perfect canvas dimensions (3200x1800), mathematical aspect ratio preserved via
    coord_fixed(1.0)
  - 'All spec requirements met: coordinate ranges, grid resolution, interior near-black
    coloring, annotations for named features (Cardioid, Period-2 Bulb)'
  weaknesses:
  - Annotations ('Cardioid', 'Period-2 Bulb') use size=4mm and alpha=0.65, which makes
    them subtle and potentially hard to read at small sizes — increase size to 5 or
    alpha to 0.8 for better readability without disrupting the aesthetic
  - DE-03 storytelling is limited by the dominant uniform-green exterior; the most
    visually interesting region (the fractal boundary) lacks emphasis — consider a
    slight color stretch or adding a subtle annotation pointing to the boundary complexity
