review:
  strengths:
  - Excellent Mandelbrot computation with smooth coloring (fractional escape count
    eliminates discrete banding) — the key mathematical feature the spec requires
  - PowerNorm(gamma=0.4) is a sophisticated choice that compresses the high-iteration
    tail, revealing far more boundary detail than linear normalization
  - Contour overlay (alpha=0.15) adds depth at the escape boundaries without cluttering
    the fractal — subtle and well-executed
  - Correct square canvas (2400×2400 px) and proper aspect='equal' preserve the mathematical
    proportions of the complex plane
  - 'Full theme-adaptive chrome: all text, colorbar labels, and outline correctly
    use INK/INK_SOFT tokens for both light and dark renders'
  - Flat, readable code — no unnecessary abstractions, clear comments on non-obvious
    choices (smooth coloring formula, PowerNorm rationale)
  - High-resolution 1200×860 computation grid with bilinear interpolation produces
    sharp, clean fractal edges
  - NaN-masking interior points and cmap.set_bad() is the idiomatic matplotlib approach
    for the set interior
  weaknesses:
  - 'Palette violation (VQ-07): uses plt.cm.plasma — a non-Imprint colormap. Only
    imprint_seq (green→blue, single-polarity) or imprint_div (red↔neutral↔blue, diverging)
    are permitted for continuous data. Replace with imprint_seq built from LinearSegmentedColormap.from_list(''imprint_seq'',
    [''#009E73'', ''#4467A3'']). The escape-iteration data is single-polarity so imprint_seq
    is the correct choice. cmap.set_bad() should keep ''#1A1A17'' (dark interior)
    unchanged.'
  - 'cmap.set_bad is hardcoded to ''#1A1A17'' regardless of theme — in dark mode the
    interior blends more with the dark background. Consider setting cmap.set_bad dynamically:
    cmap.set_bad(color=''#050504'') for better contrast in both themes, or keep ''#1A1A17''
    but accept this minor visual tradeoff.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "heatmap-mandelbrot · python · matplotlib · anyplot.ai" in dark ink, fully readable. Axis labels Re(c) and Im(c) in dark ink at fontsize 10, clearly legible. Tick labels on both axes at fontsize 8, readable. Colorbar "Escape Iterations" label and tick values (0, 25, 50, 75, 100, 125, 150, 175) in INK_SOFT gray — all readable.
      Data: Mandelbrot set interior colored black/dark, outer region colored with plasma colormap ranging from deep purple (low escape iterations) through pink/orange at the boundary to yellow (high iteration counts, outer edge). The characteristic main cardioid and period-2 bulb are clearly visible. Smooth coloring eliminates banding artifacts. Subtle contour lines visible at escape boundaries. Colorbar on right side well-positioned.
      Legibility verdict: PASS — all text readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface
      Chrome: Title in light off-white text, clearly readable. Axis labels Re(c) and Im(c) in light ink. Tick labels and colorbar text in INK_SOFT #B8B7B0 — clearly readable against dark background. No dark-on-dark text failures detected.
      Data: Data colors identical to light render — same plasma colormap (deep purple through pink/orange to yellow). Interior of Mandelbrot set appears as a very dark region, slightly darker than the surrounding deep-purple escape iterations near the boundary; the set shape remains distinguishable. Contour lines at alpha=0.15 are faint but add subtle depth.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures observed
