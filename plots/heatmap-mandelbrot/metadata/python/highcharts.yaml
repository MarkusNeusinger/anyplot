review:
  strengths:
  - 'Correct imprint_seq gradient (#009E73 → #4467A3) applied to continuous escape-time
    data — palette-compliant and visually effective'
  - Log-scale transformation of smooth iteration counts produces well-distributed
    colors across the fractal boundary without banding
  - All font sizes explicitly set per style-guide defaults (66px title, 56px axis
    labels, 44px tick labels, 36px colorbar labels)
  - Both light and dark renders are fully theme-adaptive — background, text, tick
    labels, legend box and border all flip correctly
  - 'Interior set points colored #0a0a0a creating strong contrast against the gradient
    exterior, clearly showing the cardioid and period-2 bulb'
  - Custom JavaScript tooltip formatter displays complex plane coordinates (a + bi
    notation) and human-readable iteration count via inverse log
  - 'turboThreshold: 0 correctly disables the 1000-point limit, allowing the full
    480,000-point heatmap dataset to render'
  - Canonical complex-plane ranges [-2.5, 1.0] × [-1.25, 1.25] show the complete Mandelbrot
    set per spec defaults
  - PIL size normalization ensures exact 3200×1800 output even when Selenium rounding
    produces 1-2 px drift
  weaknesses:
  - 'DE-01 moderate: design is correct but not exceptional — the colorAxis uses only
    2 stops (green → blue) which produces a visually functional but flat gradient;
    a 3-stop version adding a midpoint (e.g. [0, ''#009E73''], [0.5, ''#2A7D8E''],
    [1, ''#4467A3'']) would add depth'
  - 'DE-02 refinement opportunity: the axis spine lines (lineColor: INK_SOFT) are
    visible but could be removed entirely for a cleaner frameless heatmap look — heatmaps
    benefit from removing all 4 spines'
  - 'LM-01 partial: implementation bypasses the highcharts_core Python SDK entirely
    (uses raw dict/JSON), which works but misses the idiomatic Python API — the library
    guide recommends using Chart and HighchartsOptions objects'
