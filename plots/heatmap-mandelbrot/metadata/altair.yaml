  image_description: 'The plot displays a Mandelbrot set fractal visualization rendered
    as a heatmap using Altair''s mark_rect. The title "heatmap-mandelbrot · altair
    · pyplots.ai" appears in the top-left in large font. The x-axis is labeled "Real"
    ranging from -2.5 to ~0.9, and the y-axis is labeled "Imaginary" ranging from
    -1.2 to 1.2. The fractal uses the plasma colormap: deep dark blue/indigo for regions
    that escape quickly (low iterations), transitioning through purple, pink, and
    magenta to bright yellow for regions that escape slowly (high iterations near
    100). The interior of the Mandelbrot set — the classic cardioid body and period-2
    bulb — is rendered in solid black, providing strong contrast against the colorful
    exterior. Smaller satellite bulbs and the antenna along the negative real axis
    are visible. The boundary shows smooth color gradients from the normalized iteration
    count. A vertical gradient legend on the right labeled "Escape Iterations" shows
    the scale from ~10 to 100. The overall layout is clean with no grid lines and
    no view border.'
