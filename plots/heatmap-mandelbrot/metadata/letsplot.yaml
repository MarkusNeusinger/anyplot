review:
  strengths:
  - Excellent smooth coloring implementation using normalized iteration count formula
    (avoids banding)
  - Custom 5-color palette creates a visually striking classic Mandelbrot aesthetic
  - Perfect data quality — deterministic computation, correct ranges, all fractal
    features visible
  - Clean well-structured code with proper numpy vectorization
  - All font sizes explicitly set ensuring readability at target resolution
  weaknesses:
  - Custom palette is not perceptually uniform as the spec requests — most exterior
    detail compressed into deep blue
  - Limited use of lets-plot distinctive features beyond basic ggplot2 grammar
  - Axis styling could be further refined (tick styling, axis line customization)
  image_description: The plot displays a Mandelbrot set fractal visualization rendered
    as a heatmap using geom_raster. The background is a deep dark blue (#000764),
    with fractal boundary regions transitioning through lighter blue, white/cyan,
    then orange/yellow before returning to dark. The interior of the Mandelbrot set
    (non-escaping points) is rendered in solid black. The characteristic cardioid
    (main body) and period-2 bulb are clearly visible, along with smaller satellite
    bulbs along the boundary. The title "heatmap-mandelbrot · letsplot · pyplots.ai"
    appears at the top in bold dark text. Axes are labeled "Real Axis" (x, range -2.5
    to 1.0) and "Imaginary Axis" (y, range -1.2 to 1.2). A vertical colorbar on the
    right labeled "Iterations" shows the scale from approximately 10 to 80+. The smooth
    coloring technique eliminates discrete banding at the boundary.
