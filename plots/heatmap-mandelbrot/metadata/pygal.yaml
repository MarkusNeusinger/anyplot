  image_description: 'The plot displays a Mandelbrot set fractal visualization on
    a clean white background. The title "heatmap-mandelbrot · pygal · pyplots.ai"
    is prominently rendered at the top in large dark text. Below the title, a mathematical
    subtitle reads "zₙ₊₁ = zₙ² + c · Escape time with smooth iteration count" in medium
    gray at 36px. The main heatmap shows the full Mandelbrot set on the complex plane
    with the Real Axis (Re) ranging from -2.5 to 1.0 on the x-axis and the Imaginary
    Axis (Im) from -1.0i to +1.0i on the y-axis. The set interior (non-escaping points)
    is solid black, clearly displaying the characteristic cardioid, period-2 bulb,
    and smaller satellite bulbs. Exterior points use a viridis-inspired colormap —
    deep purple for low iteration counts, transitioning through teal/blue-green to
    bright yellow for high iteration counts near the boundary. The color gradients
    are smooth with no visible banding, indicating successful smooth iteration count
    coloring. A vertical colorbar on the right is labeled "Iterations" and displays
    clean round tick values: 5, 10, 25, 50, 100, and 200. Below the colorbar, a small
    black square with "In set" label explains the interior coloring. The plot border
    is a thin clean line. The heatmap resolution at 800×600 produces excellent detail
    in the fractal boundary regions. Overall layout is professional with well-balanced
    margins.'
