review:
  strengths:
  - Excellent spec compliance — all required features faithfully implemented
  - Thoughtful viridis-inspired colormap with manual LUT interpolation and log-normalized
    mapping
  - Clean visual design with mathematical subtitle, proper colorbar, and In set legend
  - Deterministic computation with smooth iteration count algorithm
  - Good data storytelling through the fractal structure itself
  weaknesses:
  - pygal is not used at all — the implementation constructs raw SVG manually without
    importing pygal
  - Grid resolution of 200x143 creates noticeable pixelation/blockiness
  - No attempt to use pygal chart classes, Style system, or rendering pipeline
  image_description: The plot displays a Mandelbrot set fractal visualization on a
    white background. The title "heatmap-mandelbrot · pygal · pyplots.ai" appears
    at the top, with a subtitle showing the iteration formula "z_{n+1} = z_n² + c
    · Escape time with smooth iteration count". The main plot area shows the complex
    plane with Real Axis (Re) ranging from -2.5 to 1.0 on the x-axis and Imaginary
    Axis (Im) ranging from -1.0i to +1.0i on the y-axis. The Mandelbrot set interior
    (non-escaping points) is rendered in black, clearly showing the characteristic
    cardioid and period-2 bulb. Exterior points are colored using a viridis-inspired
    colormap ranging from dark purple (low iteration counts) through teal/green to
    bright yellow (high iteration counts). A vertical colorbar on the right shows
    "Iterations" with tick values from ~4 to 189. Below the colorbar, a small black
    square legend reads "In set". The cells are noticeably blocky/pixelated due to
    the 200x143 grid resolution, visible as discrete colored rectangles rather than
    smooth gradients.
