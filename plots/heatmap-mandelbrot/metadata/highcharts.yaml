  strengths:
  - Striking dark theme with well-chosen Plasma-like color palette creating a visually
    compelling fractal visualization
  - Smooth coloring algorithm with log-scale normalization avoids discrete color banding
    and emphasizes boundary detail
  - All text sizes explicitly set with appropriate hierarchy (title, axis labels,
    ticks, legend)
  - 'Excellent data quality: mathematically correct computation with standard parameters'
  - Clean linear code structure with efficient vectorized computation
  - Interactive HTML export with custom tooltip showing complex number notation
  weaknesses:
  - Grid resolution (350x250) is below the spec minimum of 800x600, resulting in visible
    pixelation at the fractal boundary
  - 'Faint horizontal grid lines still visible despite gridLineWidth: 0 setting'
  - Color bar legend is relatively small and positioned far from the plot area
  - Y-axis title appears slightly cramped when rotated
  image_description: 'The plot displays a Mandelbrot set fractal visualization on
    a dark (#0a0a1a) background. The characteristic cardioid (main body) and period-2
    bulb (left circle) are rendered in solid black, representing points inside the
    set that never escape. The exterior is colored using a Plasma-like gradient: deep
    blue/purple for quickly escaping points (low iteration count), transitioning through
    magenta and pink to bright yellow near the fractal boundary (high iteration count).
    The title "heatmap-mandelbrot · highcharts · pyplots.ai" appears at the top in
    light text. The x-axis is labeled "Real Axis (Re)" ranging from -2.5 to 1.0, and
    the y-axis is labeled "Imaginary Axis (Im)" ranging from -1i to 1i with the "i"
    suffix on tick labels. A vertical color bar on the right is labeled "Escape Iterations"
    with non-linear tick values (0, 5, 10, 20, 50, 100). Faint horizontal grid lines
    are slightly visible across the plot area. The fractal boundary shows smooth color
    transitions thanks to the smooth iteration count algorithm, though the 350x250
    grid resolution produces some visible pixelation in the fine boundary structures.'
