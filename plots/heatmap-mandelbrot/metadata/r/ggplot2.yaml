review:
  strengths:
  - Smooth coloring via log2 normalization and sqrt scale correctly eliminates discrete
    iteration banding
  - Vectorized Mandelbrot iteration with shrinking active-index set is computationally
    efficient R
  - 'Correct ggplot2 idioms: geom_raster(interpolate=TRUE), coord_fixed(ratio=1),
    guide_colorbar()'
  - 'Imprint sequential cmap correctly built from palette endpoints (#009E73 to #4467A3)'
  - Square canvas (2400x2400) correctly chosen for this symmetric mathematical plot
  - All text elements explicitly sized and readable in both themes
  weaknesses:
  - 'Grid resolution below spec minimum: NX=400, NY=286 used but spec requires 800x600
    or higher — increase to at least NX=800, NY=572'
  - 'Dark mode wrong-theme panel background: panel.background = element_rect(fill
    = INK) resolves to cream (#F0EFE8) in dark mode — fix by using PAGE_BG for panel.background'
  - 'Dark mode wrong-theme interior color: na.value = INK resolves to cream/white
    in dark mode making the Mandelbrot set body appear white — fix with a fixed dark
    color like #050503 independent of theme so interior stays consistently dark across
    both renders'
  - Color gradient severely compressed — most exterior appears uniformly green; consider
    MAX_ITER >= 200 and higher resolution to spread gradient detail across a wider
    exterior region
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct
      Chrome: Title "heatmap-mandelbrot · r · ggplot2 · anyplot.ai" in bold dark ink, readable; axis labels "Real axis" / "Imaginary axis" in dark ink (10pt); tick labels in INK_SOFT (8pt), all readable
      Data: Mandelbrot set interior = black (#1A1A17 via na.value=INK in light mode); exterior = brand green #009E73 (Imprint seq low) grading toward blue #4467A3 (Imprint seq high) near fast-escaping regions; colorbar shows sqrt-scaled escape count 2.5-10.0; panel background = dark (#1A1A17) creating a black frame around raster due to coord_fixed padding; color gradient is very compressed — exterior mostly uniform green
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct for outer plot background
      Chrome: Title and axis labels rendered in light text (#F0EFE8 / #B8B7B0), readable; tick labels readable; ISSUE: panel.background = element_rect(fill = INK) resolves to INK=#F0EFE8 (cream) in dark mode — panel area has a cream/white background creating a visible light inner frame inside the dark render; this is wrong-theme chrome
      Data: Exterior escape region colors identical to light render (#009E73 green → #4467A3 blue) ✓; ISSUE: na.value = INK = #F0EFE8 (cream) in dark mode → Mandelbrot set interior appears white/cream instead of dark, producing an inverted appearance vs. the light render; data colors are identical but interior semantic coloring is wrong
      Legibility verdict: PASS for text chrome; FAIL for panel.background and na.value theme-correctness (cream panel frame + white Mandelbrot interior in dark mode)
