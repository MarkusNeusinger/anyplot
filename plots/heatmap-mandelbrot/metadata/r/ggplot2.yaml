review:
  strengths:
  - Correct Mandelbrot iteration with vectorized shrinking-index optimization for
    efficiency
  - Smooth coloring formula (escape + 1 - log2(log2(|z|))) eliminates integer banding
    at iteration boundaries
  - sqrt(escape_smooth) normalization spreads boundary detail, revealing fractal structure
  - 'Properly uses imprint_seq (green #009E73 → blue #4467A3) for continuous escape
    data'
  - coord_fixed(ratio=1) preserves mathematical proportions of the complex plane
  - geom_raster with interpolate=TRUE is the optimal ggplot2 geom for pixel raster
    data
  - Fixed near-black interior (#050503) independent of theme — correctly representing
    the bounded set
  - Both light and dark themes fully functional with correct adaptive tokens
  - Canvas size (2400×2400 square) is the right choice for a symmetric fractal
  - Clean, linear code with no functions/classes and deterministic output
  weaknesses:
  - The exterior gradient is visually flat — most of the complex plane renders as
    a nearly uniform green (#009E73) with only a narrow blue-tinted fringe near the
    boundary. Consider using a cyclic or higher-contrast color mapping (e.g. mapping
    escape_vis through a wider brightness range) to make more of the exterior variation
    visible while staying within imprint_seq
  - 'DE-01/DE-03: The visualization lacks visual drama beyond the inherent math structure.
    A subtle circular/radial annotation marking known bulb boundaries, or a slightly
    logarithmic escape mapping, could add design sophistication without violating
    spec or palette rules'
  - Legend colorbar is narrow (barwidth=0.7) and its 3-line title ('Escape\ncount\n(√)')
    plus tick values '5' and '10' feel compressed — consider barwidth=1.0 and a shorter
    legend title like 'Escape (√)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as required — never pure white.
      Chrome: Title "heatmap-mandelbrot · r · ggplot2 · anyplot.ai" in bold dark ink, spanning ~70% of canvas width; "Real axis" and "Imaginary axis" labels in dark ink at 10pt; tick labels (-2, -1, 0, 1 on x; -1.0, -0.5, 0.0, 0.5, 1.0 on y) in INK_SOFT at 8pt. All text clearly readable.
      Data: The Mandelbrot set interior is rendered as near-black (#050503). The exterior is colored by smooth escape count using imprint_seq (green #009E73 → blue #4467A3). Most of the exterior region renders as near-uniform brand green with a subtle blue-tinged fringe visible near the fractal boundary. The characteristic cardioid, period-2 bulb, and smaller satellite bulbs are clearly visible. Colorbar on the right with tick values ~5 and ~10.
      Legibility verdict: PASS — all text elements are fully readable against the off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as required — never pure black.
      Chrome: Title in light #F0EFE8, axis labels in light ink, tick labels in #B8B7B0 (INK_SOFT for dark theme). Legend box uses elevated dark background (#242420) with subtle border. All text clearly readable against dark background; no dark-on-dark failures observed.
      Data: Identical data colors to light render — imprint_seq green→blue gradient unchanged; black Mandelbrot interior unchanged. Imprint palette data colors are theme-invariant as required.
      Legibility verdict: PASS — all chrome elements flip correctly; text is light on dark in all cases.
