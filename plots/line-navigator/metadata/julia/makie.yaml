      Data: Brand green #009E73 line identical to light render — data colors are consistent across themes. Navigator selection box appears as a darker green rectangle (lower contrast on dark bg) but still distinguishable via the solid vertical edge lines.
      Legibility verdict: PASS — all text is light-colored and readable against the dark background; no dark-on-dark failures.
