review:
  strengths:
  - Clean two-panel layout with proportional row sizing (78%/22%) perfectly matches
    the spec requirement for a mini navigator pane
  - 'Correct theme-adaptive chrome throughout: INK, INK_SOFT, INK_MUTED tokens applied
    to all axis elements, both renders pass readability check'
  - 'Appropriate data density handling: detail view uses linewidth=2.5 for 90 points,
    navigator uses linewidth=0.9 + alpha=0.65 for 1095 points'
  - Selection window represented cleanly with filled polygon (alpha=0.22) + vertical
    edge lines — idiomatic static alternative to interactive handles
  - All font sizes explicitly set; no canvas gate failure; correct 3200×1800 output
  weaknesses:
  - Annotation text fontsize=10 is too small — at mobile scale (~400 px) 'Days 450-540
    of 1095' becomes hard to read; increase to at least 12-13pt
  - Main detail chart has no x-axis label (ax_main has no xlabel parameter) — the
    day-number tick labels are clear but the axis is unlabeled; add xlabel='Day' with
    xlabelsize matching the navigator (11)
  - 'DE-01 design polish gap: the two-panel navigator layout is correct but lacks
    finishing touches — consider adding a subtle background-color distinction between
    the selection highlight and the full navigator line to create stronger visual
    depth'
  - 'DE-02 visual refinement: the navigator panel background is the same as the main
    chart; a very slightly elevated background (ELEVATED_BG token) on the navigator
    or a thin divider between panels would improve visual hierarchy'
  - 'DE-03 storytelling: the annotation provides range context but the selected range
    (summer temperature rise) has no additional emphasis — could use a brief subtitle
    or stronger annotation to make the insight more immediate to the reader'
  image_description: |-
