review:
  strengths:
  - Excellent two-panel navigator concept implemented cleanly with gggrid — the right
    approach for this spec
  - Theme-adaptive chrome is complete and correct in both light and dark renders —
    no chrome failures
  - 'Date-range annotation (''Selected: Jul 04, 2025 – Dec 30, 2025'') is a meaningful
    storytelling addition'
  - Appropriate line/area sizing for the 1095-point dense dataset; area fill at alpha=0.15
    adds context without obscuring
  - Fully idiomatic lets-plot usage with gggrid and layer_tooltips — two genuine lets-plot-only
    features
  - 'Perfect code quality: reproducible seed, flat KISS structure, all imports used,
    HTML output included'
  weaknesses:
  - Navigator x-axis tick labels show many repeated '2023' labels — reduce tick density
    with explicit yearly break points using scale_x_datetime with pd.date_range breaks
  - Selection rectangle lacks visual resize-handle indicators at its edges — add two
    vertical marker lines at the left/right edges of the selection rect to communicate
    that the range can be adjusted
  - 'DE-01 below 6/8: the chart is visually clean but could be elevated — e.g. add
    a light separator line between main chart and navigator, or slightly elevate the
    navigator panel background'
  - Date-range annotation text (geom_text size=3.5mm) reads small relative to the
    chart at mobile widths — raise to size=4.5 or 5
