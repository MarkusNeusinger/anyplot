review:
  strengths:
  - Single-series line chart with correct brand green (#009E73) in both themes
  - Full theme-adaptive chrome with all tokens correctly applied — warm off-white/near-black
    backgrounds, no dark-on-dark failures
  - Navigator pane correctly sized at 20% height with all feasible static features
    (selection window, edge handles, shaded non-selected regions, date range annotation)
  - Clean flat script with seed=42 for reproducibility, no bbox_inches=tight, correct
    figsize/dpi for 3200×1800 output
  - Realistic CPU utilization data with trend, weekly cycle, seasonal variation, and
    spikes — justifies navigator need
  weaknesses:
  - 'DE-01: Design is competent but not exceptional — the two-panel layout is functional,
    but typography, color hierarchy, and focal emphasis stay at the configured-default
    level. To push past 6/8, add at least one intentional design choice: e.g. a subtle
    reference line marking the dataset mean, a soft gradient fill under the main line,
    or stronger visual differentiation between the detail view and the overview.'
  - 'DE-03: The CPU utilization story is not told — viewer sees the wiggle but cannot
    identify the interesting event in the selected window. Annotate at least one feature
    (peak CPU day, trend direction, or weekly pattern label) to create a focal point.'
  - 'LM-02: The navigator visualization relies entirely on matplotlib primitives (axvspan,
    axvline, gridspec). Seaborn contributes only sns.lineplot and sns.set_theme. Consider
    using seaborn-specific conveniences (sns.despine, sns.set_context) and emphasise
    the lineplot confidence interval or statistical layer to differentiate from raw
    matplotlib.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "line-navigator · python · seaborn · anyplot.ai" at 12pt, dark ink, clearly readable. Y-axis label "CPU Usage (%)" at 10pt, readable. X-axis label "Date" on navigator at 10pt, readable. Tick labels on main chart at 8pt (Apr 2024, May 2024, Jun 2024, Jul 2024 and 25–50%) — all legible. Navigator year ticks (2023, 2024, 2025) at 7pt — small but readable at canvas resolution. Date range annotation "Mar 2024 – Jun 2024" in muted ink top-right.
      Data: Main chart shows a green (#009E73) line of CPU utilization from ~Mar 2024 to Jul 2024 with realistic weekly oscillation (25–52%). Navigator shows the full 2-year overview in the same green but thinner (linewidth=0.8, alpha=0.6). Non-selected regions shaded with semi-transparent gray overlays. Selection window has a very faint green fill (alpha=0.08, barely visible). Two ochre (#BD8233) vertical lines mark selection edges. Subtle Y-axis grid lines in main chart (alpha=0.15).
