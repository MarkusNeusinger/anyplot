    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
      Chrome: Title and all labels rendered in light ink (#F0EFE8) — clearly readable. Tick labels in lighter secondary ink (#B8B7B0). Date annotation in tertiary ink (#A8A79F). Grid lines subtle against dark background. Top/right spines removed; remaining spines in INK_SOFT. No dark-on-dark failures observed.
      Data: Data series color is identical to light render — #009E73 brand green in both charts, same line widths and alphas. Selection handles (ochre) and shaded regions appear with the same relative contrast against the dark surface. The very faint selection window fill (alpha=0.08) is marginally less distinguishable in dark but acceptable since the orange handles define the boundary clearly.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures.
