review:
  strengths:
  - Fully theme-adaptive chrome with correct PAGE_BG, INK, and INK_SOFT tokens on
    both light and dark renders
  - Idiomatic plotnine patchwork composition (p_detail / p_navigator) with proper
    proportional sizing (navigator ~18% of main chart height as specified)
  - 'Correct brand green #009E73 for all data elements, identical between light and
    dark renders'
  - Well-structured shared_theme with per-plot overrides keeps code DRY while allowing
    navigator-specific adjustments
  - 'Appropriate data-density adaptation: line size=1.0 for 4-month detail view, size=0.5
    + alpha=0.7 for full 1100-point overview'
  weaknesses:
  - The `Selected` annotation text in the navigator (size=2.5 mm ≈ 7pt) is quite small
    and barely readable at scaled-down sizes — increase to size=3.5–4 or add the actual
    date range as a text string
  - Temperature values peak above 60°C which is physically unusual for ambient temperature
    sensor readings — consider framing as industrial sensor data or adjusting the
    range to 10–35°C for more realistic context
  - Navigator overall text (axis_text at 7pt, plot_title at 8pt) is slightly undersized
    for the small panel height — consider 8–9pt for navigator axis_text
  - Top/right spine removal is delegated to theme_minimal() which is fine, but explicitly
    setting panel_border=element_blank() would be cleaner and more explicit
