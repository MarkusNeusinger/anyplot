    as larger dark blue dots clustered near the top and close to the pooled effect
    line. Low-precision studies appear as smaller orange dots scattered lower in the
    plot, showing a rightward asymmetry toward less negative values — suggesting publication
    bias. A legend at the bottom lists all five series across three columns.
