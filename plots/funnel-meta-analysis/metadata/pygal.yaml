  - Clean, well-structured code following KISS principles
  - Good use of pygal inverse_y_axis for proper funnel plot orientation
  - Proper funnel shape with 95% CI boundaries and both pooled/null effect reference
    lines
  weaknesses:
  - Left and right CI boundaries are different colors (blue vs orange) because right
    boundary uses None as series name which gets next palette color
  - Design could be more polished - CI color mismatch makes the funnel asymmetric
    visually
  - No visual emphasis or hierarchy to guide viewer attention to the publication bias
    asymmetry
  - Legend is incomplete - right CI boundary has no legend entry
  image_description: 'The plot displays a funnel plot with the title "funnel-meta-analysis
    · pygal · pyplots.ai" centered at the top. The X-axis is labeled "Log Odds Ratio
    (Effect Size)" ranging from about -1.0 to 0.1, and the Y-axis is labeled "Standard
    Error" with an inverted scale (0 at top, 0.3 at bottom). A blue dashed diagonal
    line represents the left boundary of the 95% Pseudo CI, while an orange dashed
    diagonal line represents the right boundary — these should be the same color but
    are not, due to the None series receiving the next color in the palette. A grey
    vertical line marks the Pooled Effect at LOR = -0.47, and another grey/orange
    dashed vertical line marks the Null Effect at LOR = 0. Fifteen dark study points
    are scattered within and around the funnel, showing slight rightward asymmetry
    (toward smaller negative effects) among lower-precision studies, suggesting possible
    publication bias. The legend at the bottom lists four entries: "95% Pseudo CI",
    "Pooled Effect (LOR = -0.47)", "Null Effect (LOR = 0)", and "Studies".'
