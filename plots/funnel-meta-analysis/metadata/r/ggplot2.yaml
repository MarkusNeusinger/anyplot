review:
  strengths:
  - 'Correct funnel plot mechanics: inverted Y-axis via scale_y_reverse(), pseudo
    95% CI funnel shape (geom_polygon + geom_line), pooled effect line, null reference
    line — all structurally sound'
  - 'Imprint palette correctly applied: #009E73 (position 1) for study points, #4467A3
    (position 3) for funnel region; no palette violations'
  - 'Full theme-adaptive chrome: all INK/INK_SOFT/INK_MUTED tokens correctly flip
    between light and dark; pooled effect line in dark render turns near-white through
    INK token'
  - 'Realistic, neutral scientific data: antihypertensive RCT meta-analysis with plausible
    log OR and SE values; funnel asymmetry appropriately suggests publication bias'
  - 'Clean, minimal code: KISS structure, set.seed(42), only required ggplot2 and
    ragg imports'
  weaknesses:
  - 'DE-01 capped at ''well-configured default'': shaded funnel region and Imprint
    palette are good but no exceptional design element (intentional typographic hierarchy,
    bold focal annotation) pushes to 6-8/8'
  - 'DE-03 storytelling limited: subtitle explains context in words but no visual
    emphasis highlights the key insight (asymmetric cluster of studies outside funnel
    suggesting bias); annotate() arrow or label on asymmetric cluster would sharpen
    the narrative'
  - Funnel fill at alpha=0.09 is very subtle and nearly invisible in both renders;
    slightly increasing to 0.12-0.15 would maintain subtlety while making the funnel
    region more structurally visible
