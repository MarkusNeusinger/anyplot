review:
  strengths:
  - Correct funnel plot type with inverted Y-axis (SE=0 at top), precise study points,
    dashed pseudo 95% CI boundaries, and solid pooled effect line — all required features
    present
  - 'Perfect spec compliance: null effect dotted line at x=0, funnel polygon fill,
    pooled effect vertical line, 20 RCTs with realistic antihypertensive trial data'
  - 'Imprint palette correctly applied: brand green #009E73 for study points, #4467A3
    (blue) for funnel region — data colors identical across both themes'
  - 'Complete code quality: set.seed(42), KISS structure, only used imports (ggplot2,
    ragg), clean R code'
  - 'Good ggplot2 idiom: layered geom_polygon + geom_line + geom_vline + geom_point
    composition, scale_y_reverse() for correct funnel orientation'
  - 'Realistic medical context: 20 RCTs on antihypertensive treatment vs. placebo
    with plausible log OR values and slight publication bias'
  weaknesses:
  - 'Grid lines too prominent in both themes: major grid uses full INK color (#1A1A17
    light / #F0EFE8 dark) at 100% opacity making dark render grid appear as bright
    white lines — use INK_MUTED or lighter intermediate for major grid (e.g. #6B6A63
    light / #A8A79F dark) and remove minor grid lines entirely'
  - Minor grid lines (linewidth=0.2) at nearly the same visual weight as major grid
    (linewidth=0.3) — these should either be removed or reduced to barely-visible;
    the 0.1 linewidth delta is insufficient differentiation
  - 'DE-01 gap: typography lacks intentional hierarchy — title at base_size-derived
    weight with no bold, could add font weight contrast (bold title) and a subtitle
    or descriptive suffix to distinguish the title from axis labels more strongly'
  - Study points near funnel apex (SE~0.1–0.15) have minor spatial overlap — size=3.0
    is fine but slight jitter or size=3.5 would help the 3–4 closely clustered precision
    studies at the top to remain individually distinguishable
