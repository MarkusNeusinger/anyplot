review:
  strengths:
  - Perfect spec compliance with all required funnel plot elements (pooled effect
    line, 95% CI funnel, null reference, inverted Y-axis)
  - Clean, well-structured code with proper inverse-variance weighting for the pooled
    effect
  - Shaded funnel region adds visual interest beyond just boundary lines
  - Realistic medical meta-analysis scenario with plausible data
  weaknesses:
  - Design excellence is average — single blue color with no visual hierarchy or emphasis
  - No study labels or annotations to identify individual points
  - All effect sizes are positive; including some negative values would better showcase
    funnel plot capabilities
  - Does not leverage lets-plot distinctive features (e.g., interactive tooltips,
    custom themes)
  image_description: The plot displays a meta-analysis funnel plot with an inverted
    Y-axis showing Standard Error (more precise studies at top). The X-axis shows
    Log Odds Ratio. A solid dark blue vertical line marks the pooled effect estimate
    (~0.37), and a dashed gray vertical line marks the null effect at 0. Two dashed
    blue diagonal lines form the inverted funnel shape representing pseudo 95% confidence
    limits, with a very light blue shaded region between them. Fifteen studies are
    plotted as open blue circles (white fill, blue stroke) scattered within and around
    the funnel. The title reads "funnel-meta-analysis · letsplot · pyplots.ai". The
    plot uses a minimal theme with subtle gray major grid lines and no minor grid.
    There is some rightward asymmetry in the study distribution, suggesting potential
    publication bias.
