review:
  strengths:
  - Clean funnel shape with inverted Y-axis, summary effect line, null reference line,
    and pseudo 95% CI region all correctly implemented
  - Realistic meta-analysis data with intentional publication bias asymmetry visible
    in small studies
  - Correct title format and descriptive axis labels
  - Well-structured code with seed for reproducibility and inverse-variance weighted
    summary calculation
  - Idiomatic Bokeh usage with ColumnDataSource, Span, Label, and patch
  weaknesses:
  - Funnel region fill is extremely faint (alpha=0.08) making boundaries hard to distinguish
  - Study point markers are small for only 15 data points on a 4800x2700 canvas
  - Overall washed-out appearance lacks visual impact - everything is the same faint
    blue
  - Labels at the bottom (Null and Summary) are positioned at y=0.56 which places
    them at the very edge of the visible area
  - No visual differentiation between studies - all same color and size, missing opportunity
    to show weight or precision
  image_description: 'The plot displays a meta-analysis funnel plot with the title
    "funnel-meta-analysis · bokeh · pyplots.ai" centered at the top. The X-axis is
    labeled "Log Odds Ratio" (ranging from about -0.5 to 1.2) and the Y-axis is labeled
    "Standard Error" (inverted, ranging from 0 at top to ~0.55 at bottom). A very
    light blue shaded triangular region represents the pseudo 95% confidence interval
    funnel, with dashed blue boundaries. A solid vertical blue line marks the summary
    effect at approximately 0.26, and a dashed gray vertical line marks the null effect
    at 0. Fifteen blue circular markers represent individual studies scattered within
    and around the funnel. More precise studies (low SE) cluster near the top around
    the summary effect, while less precise studies (high SE) at the bottom show rightward
    asymmetry suggesting publication bias. Two small text labels appear near the bottom:
    "Null (0)" near x=0 and "Summary: 0.26" near the summary line. The overall color
    palette is monochromatic blue (#306998) with very faint fills and subtle grid
    lines, giving the plot a clean but somewhat washed-out appearance.'
