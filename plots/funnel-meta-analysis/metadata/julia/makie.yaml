  strengths:
  - Perfect spec compliance — all required funnel plot elements (inverted SE axis,
    pooled effect line, null reference line, 95% CI funnel, study scatter) implemented
    correctly
  - Excellent data realism — antihypertensive RCT meta-analysis with plausible OR
    and SE ranges and deliberate small-study asymmetry demonstrating publication bias
  - Both themes render cleanly with full Imprint palette compliance and correct chrome
    token threading throughout
  - Idiomatic Makie code with poly! polygon funnel fill and MarkerElement/LineElement
    custom legend
  weaknesses:
  - Annotation text at fontsize=11 is small at mobile widths — consider increasing
    to 12 or 13
  - Legend frame slightly heavy relative to the spare spine-minimal design — could
    reduce frame opacity
  - 'Asymmetry storytelling could be stronger: consider highlighting study points
    that fall outside the funnel boundary with a different stroke colour (e.g. amber
    #DDCC77) to make the publication-bias pattern more immediately visible'
