review:
  strengths:
  - Perfect spec compliance — all funnel plot elements present (inverted y-axis, funnel
    boundaries, pooled effect line, null reference, weighted study points)
  - Semantic color assignment (green=inside/good, red=outside/bias) is appropriate
    and well-executed
  - Realistic meta-analysis scenario with correctly applied publication bias simulation
  - Clean grammar-of-graphics layer composition idiomatic to plotnine
  - Complete theme-adaptive chrome — both renders correct and fully legible
  weaknesses:
  - Asymmetry suggests publication bias annotation (at x≈0.63, y=0.50) overlaps with
    two small study points at SE≈0.45-0.47. Reposition to x=summary_effect+0.45, y=0.54
    or upper-right area (x=0.7, y=0.08) to avoid data overlap.
  - 'No shape-based redundant encoding for the green/red CVD dichotomy — add aes(shape=region)
    + scale_shape_manual(values={Inside funnel: o, Outside funnel: ^}) so the inside/outside
    distinction is accessible without relying on color alone.'
  - Grid lines on both axes add visual noise; funnel boundary lines already provide
    structural guidance. Remove panel_grid_major_x (element_blank()) and keep only
    y-axis major grid.
