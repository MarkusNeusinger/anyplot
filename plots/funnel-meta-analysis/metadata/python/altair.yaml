review:
  strengths:
  - Correct funnel plot structure with area fill, dashed confidence bounds, summary
    effect line, and null reference line — all required features present except Y-axis
    inversion
  - 'Semantic color assignment: brand green (#009E73) for ''Within funnel'' (safe)
    and matte red (#AE3030) for ''Outside funnel'' (error/risk) — exactly the right
    palette choice for this chart type'
  - Weight-sized study points (inverse-variance weights) add a genuine data dimension
    and match the spec's optional sizing requirement
  - White stroke on points (stroke='white', strokeWidth=1.5) keeps markers crisp and
    distinguishable even when clustered
  - Informative subtitle 'Asymmetry suggests publication bias — red points fall outside
    the 95% pseudo-confidence funnel' tells the story directly
  - 'Theme-adaptive chrome is fully wired: title, axis labels, tick labels, legend,
    background, and grid all adapt correctly between light and dark renders'
  - 'Idiomatic Altair usage: transform_fold for funnel area, alt.layer() composition,
    alt.Title() with subtitle, configure_axis/configure_legend — shows library mastery'
  - HTML output saved alongside PNG, providing interactive tooltips with study name,
    Log OR, SE, and region
  weaknesses:
  - 'Y-axis is NOT inverted — spec explicitly requires ''inverted so that larger/more
    precise studies appear at the top'' (SE=0 at top, SE=max at bottom). The code
    has a double-reversal bug: alt.Scale(reverse=True, domain=[se_max, 0]) uses domain=[0.30,
    0] (already a reversed domain) AND reverse=True, which cancel each other out,
    leaving SE=0 at the bottom. Fix: use either alt.Scale(reverse=True) alone (with
    default domain) OR alt.Scale(domain=[se_max, 0]) alone — not both.'
  - Dashed X-axis grid lines (configure_axisX gridDash=[4,4]) visually compete with
    the dashed funnel confidence bounds (strokeDash=[6,3] blue lines), creating chart
    noise. Remove the X-axis grid entirely or switch to a solid, very subtle grid
    to avoid pattern collision with the funnel structural lines.
  - Green/red as the sole color distinction for Within/Outside funnel is a CVD concern
    (deuteranopia/protanopia). The funnel boundary position provides structural context,
    but adding a redundant marker shape (e.g., filled circle vs outlined diamond)
    would make the distinction robust for all viewers.
  - Several green points in the SE=0.09–0.16 range cluster tightly near the apex of
    the funnel (studies with similar SEs and effect sizes). With opacity=0.9 and no
    jitter, some points partially overlap — slightly reducing individual study readability
    at that cluster.
