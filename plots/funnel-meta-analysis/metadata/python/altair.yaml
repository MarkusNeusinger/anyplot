      Data: Y-axis runs from 0.00 (bottom) to 0.30 (top) — NOTE: axis is NOT inverted as spec requires (SE=0 should be at top). Blue area fill (#4467A3, opacity=0.07) marks the funnel interior. Dashed blue funnel bounds clearly visible. Solid blue vertical line = summary effect (~-0.44). Dashed gray vertical line = null effect (x=0). Green (#009E73) circles = 12 studies within funnel, red (#AE3030) circles = 3 studies outside funnel (at approx SE=0.28, 0.24, 0.21 and SE=0.10). Points sized by inverse-variance weight. White stroke on all points aids definition. Several green points cluster near SE=0.09–0.15 near the funnel apex. Dashed gray X-axis grid lines visually compete with the funnel's dashed bounds.
      Legibility verdict: PASS — all text elements readable; minor visual noise from X grid dashes

