review:
  strengths:
  - Correct inverted-Y funnel plot with all required elements (summary effect line,
    null reference line, pseudo-95% CI funnel lines, shaded region)
  - 'Perfect Imprint palette usage: High precision = #009E73 (brand green, semantic
    quality encoding), Moderate = #C475FD, Low = #4467A3 in canonical order'
  - Seaborn rugplot for marginal effect size distribution — a distinctive seaborn
    feature not trivially available in matplotlib
  - Size encoding by study weight adds a meaningful data dimension with appropriate
    size range
  - Outlier study annotations (Lee 2019, Martinez 2020) highlight potential publication
    bias candidates
  - Flawless theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders are
    clean and fully readable
  - 'Perfect code quality: seed set, no functions/classes, all imports used, correct
    savefig usage (no bbox_inches)'
  - Proportional text sizing with explicit fontsize on all elements
  weaknesses:
  - Minimum marker size (s=60) is below the recommended 200–400 for sparse data (<30
    points). While size encodes study weight, the smallest low-precision markers are
    noticeably small at canvas size and may be hard to see at mobile scale (~400 px).
    Raise the minimum to sizes=(120, 280) or similar to keep the encoding while ensuring
    minimum visibility.
  - 'VQ-03 concern: the 7pt annotation text ("Circle size ∝ study weight", "WM = -0.39")
    is at the lower end of legibility when the 3200×1800 PNG is scaled to mobile width
    — consider raising to 8pt or using the INK_MUTED token for consistency.'
  - 'LM-02 opportunity: the implementation uses rugplot and scatterplot size encoding
    effectively, but a KDE ridge or additional seaborn-specific feature (e.g. sns.kdeplot
    on the x-axis distribution, or a regplot confidence band) would push the library-distinctive
    score higher.'
