review:
  strengths:
  - 'Excellent spec compliance — all required funnel plot elements present: inverted
    y-axis, summary line, null reference line, pseudo-95% CI funnel, weight-proportional
    marker sizing, and inside/outside funnel classification'
  - Semantic color and shape redundancy (green circles for inside, red diamonds for
    outside) provides strong CVD accessibility
  - Proper theme-adaptive chrome with all font sizes explicitly set at correct bokeh
    pt values
  - ColumnDataSource with per-glyph visual properties (marker type, size, color from
    data columns) is idiomatic bokeh usage
  - HoverTool with per-study tooltip data demonstrates interactive HTML artifact quality
  - Realistic meta-analysis scenario with plausible log-odds ratios and simulated
    publication bias
  - Clean KISS code structure with no over-engineering
  weaknesses:
  - Funnel fill nearly invisible in dark render (fill_alpha=0.05) — the defining visual
    element of a funnel plot is effectively invisible in dark mode; consider raising
    to 0.08-0.10 for dark to retain funnel shape without the green-on-green wash
  - Summary label uses BLUE (#4467A3) color — on dark backgrounds this medium-dark
    blue has borderline contrast; consider using INK (fully light) or ELEVATED_BG
    with border for better readability in dark mode
  - Legend implemented as manually placed Label annotations rather than a proper legend
    widget — functional but less polished and harder to maintain
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "funnel-meta-analysis · python · bokeh · anyplot.ai" in dark INK, clearly readable; Y-axis "Standard Error" and X-axis "Log Odds Ratio" in dark INK, well-proportioned at 42pt; tick labels in INK_SOFT (#4A4A44), readable; "Summary: 0.26" annotation in blue (#4467A3), clearly visible; "Null (0)" label in INK_SOFT, readable
      Data: Green (#009E73) circles for 12 inside-funnel studies, red (#AE3030) diamonds for 3 outside-funnel studies; funnel filled with semi-transparent green (#009E73 at 0.15 alpha) forming clear inverted triangle; blue solid vertical line at ~0.26 (summary effect); gray dashed vertical line at x=0 (null effect); marker sizes vary by weight (14–36px), clearly distinguishable
      Legibility verdict: PASS — all text readable, no light-on-light issues, good contrast throughout

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title in light INK (#F0EFE8), clearly readable; axis labels and tick labels in appropriate light colors (INK and INK_SOFT for dark theme); "Summary: 0.26" in blue (#4467A3) — visible but borderline contrast on dark background; "Null (0)" in INK_SOFT (#B8B7B0), readable; legend annotations ("Inside funnel" in green, "Outside funnel" in red) both readable
      Data: Data colors identical to light render (#009E73 green circles, #AE3030 red diamonds) — correct; summary line and null line same colors; CRITICAL WEAKNESS: funnel fill essentially invisible (alpha=0.05 is too low for dark mode — the triangular funnel shape that defines this chart type is nearly gone); funnel outline visible as faint dashed green lines, partially salvaging the shape
      Legibility verdict: PASS with weakness — all text is readable (no dark-on-dark failures), but funnel fill at 0.05 alpha is too low for dark mode, significantly degrading the key visual element
