review:
  strengths:
  - 'Perfect spec compliance: all required elements present — inverted SE y-axis,
    funnel confidence region as shaded patch, summary effect line, null line (dashed),
    weight-proportional marker sizing, inside/outside funnel color coding'
  - 'Excellent data quality: realistic drug-vs-placebo RCT meta-analysis scenario
    with appropriately seeded publication bias simulation; inverse-variance weighting
    computed correctly'
  - 'Clean, reproducible code: KISS structure with np.random.seed(42), all imports
    used, proper ColumnDataSource pattern, Selenium/CDP viewport override for exact
    canvas sizing'
  - 'Strong Bokeh idioms: Span for reference lines, Label for annotations, HoverTool
    for interactive HTML artifact, CDP setDeviceMetricsOverride for pixel-accurate
    screenshots'
  - 'Semantic color use: BRAND green (#009E73) for inside-funnel studies, semantic
    RED (#AE3030) for outside-funnel outliers — correct semantic exception (good/bad
    encoding), matches Imprint palette rules'
  - 'Theme-adaptive chrome correctly applied: both renders use proper backgrounds
    (#FAF8F1 light / #1A1A17 dark), INK and INK_SOFT tokens thread through title,
    axis labels, tick labels, grid'
  weaknesses:
  - 'Dark mode funnel fill creates green-on-green contrast issue: fill_color=BRAND
    (#009E73) at fill_alpha=0.10 over #1A1A17 produces a composite ≈#172723 (dark
    teal) background inside the funnel; the inside-funnel markers (also BRAND at fill_alpha=0.80)
    read as ≈#058663 against #172723 — contrast is reduced vs. the light render where
    the mint-tinted funnel clearly contrasts with the markers. Fix: make the funnel
    fill_alpha theme-adaptive (e.g., 0.15 in light, 0.05 in dark), or use a different
    fill color in dark mode that contrasts better with BRAND green markers.'
  - 'Minor data marker crowding in the high-precision cluster (y≈0.05–0.25, x≈0.10–0.35):
    6–7 studies pack together with marker sizes 22–52 screen pixels; several marker
    edges touch. Fix: reduce marker size range to 14–36 px to give breathing room
    in the dense precision zone while still conveying weight variation.'
  - 'Red-green as sole hue signal for inside/outside funnel status with no redundant
    shape encoding — CVD users relying on hue alone may struggle to distinguish the
    two groups. Fix: add `marker=''diamond''` (or `marker=''triangle''`) for outside-funnel
    studies so hue and shape together encode the classification.'
  - 'Legend annotation font sizes at 26pt (≈34.6 source px) fall below the 34pt tick-label
    recommendation and appear slightly small relative to the rest of the chart''s
    typography hierarchy. Fix: increase legend Label text_font_size from 26pt to 30pt
    to tighten the hierarchy gap.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface. Border and outer padding match.
      Chrome: Bold centered title "funnel-meta-analysis · python · bokeh · anyplot.ai" fully visible ~75% plot width. X-axis label "Log Odds Ratio" in italic, Y-axis label "Standard Error" in italic — both dark (#1A1A17), clearly readable. Tick labels in INK_SOFT (#4A4A44), fully readable. Dashed grey null line labeled "Null (0)" and solid blue summary line labeled "Summary: 0.26" both readable near the top. Inline legend annotations "● Inside funnel (12 studies)" in green and "● Outside funnel (3 studies)" in red in lower left — readable but slightly small.
      Data: Inverted Y-axis (0 at top, 0.55 at bottom) correctly places high-precision studies near the top. BRAND green (#009E73) markers for inside-funnel studies with variable sizes proportional to inverse-variance weights — the heaviest study is a prominent large circle at the top. RED (#AE3030) markers for 3 outside-funnel studies clearly visible. Light mint funnel confidence region (BRAND fill, alpha=0.10) clearly contrasts against off-white background, with dashed green border. Blue vertical summary line (#4467A3) and dashed gray null line at x=0 well-differentiated. Subtle grid lines visible but unobtrusive.
      Legibility verdict: PASS — all text readable, no dark-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface.
      Chrome: Title in INK (#F0EFE8) — light, clearly readable against dark background. Axis labels and tick labels use INK/INK_SOFT tokens — light-colored, readable. "Summary: 0.26" in blue (#4467A3) and "Null (0)" in INK_SOFT (#B8B7B0) — both readable. Legend annotations readable.
      Data: BRAND green (#009E73) and RED (#AE3030) marker colors identical to light render (data colors stay constant across themes — correct). Funnel fill at fill_alpha=0.10 over dark background creates a darker composite teal (≈#172723) inside the funnel region, noticeably darker than the surrounding background. Inside-funnel markers (BRAND at alpha=0.80) render as ≈#058663 against the ≈#172723 funnel background — visually distinguishable but with reduced contrast compared to the light render. All 15 markers remain identifiable.
      Legibility verdict: PASS for chrome (no dark-on-dark text failures). Minor concern: reduced contrast between inside-funnel BRAND markers and the dark teal funnel fill area — markers are visible but the green-on-green effect weakens element visibility in dark mode.
