review:
  strengths:
  - 'Complete spec compliance: all required funnel plot elements present and correctly
    implemented (inverted Y, pooled line, null line, 95% confidence funnel with polygon
    fill, weight-sized points)'
  - 'Strong data storytelling: outliers highlighted with bold red labels, pooled OR
    annotated, point sizing encodes study importance'
  - 'Excellent theme-adaptive implementation: all chrome tokens flip correctly; data
    colors are invariant across themes as required'
  - 'Semantic color application: green (#009E73) for inside-funnel / red (#AE3030)
    for outside-funnel is a textbook semantic exception aligned with Imprint palette
    intent'
  - Native lets-plot tooltips with structured study-level details (effect, SE, n,
    status) add genuine interactivity through the HTML output
  weaknesses:
  - 'In the dark render, geom_polygon renders a visible white/light solid border around
    the funnel triangle (the default color aesthetic inherits a light ink token),
    obscuring the dashed green boundary lines. Fix: add color=PAGE_BG to the geom_polygon
    call to suppress its border.'
  - Inside-funnel study labels (Ito 2019, Evans 2017, Garcia 2018) at size=2.8mm are
    slightly small and cluster near the funnel apex/pooled OR annotation. Increase
    to size=3.2mm and adjust nudge values to spread them apart.
  - 'DE-01 moderate: no explicit top/right spine removal beyond theme_minimal; annotation
    box styling is functional but not polished.'
  - 'LM-02 partial: add geom_smooth(method=lm) as an Egger test regression line for
    a genuinely distinctive analytical layer.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title bold dark (#1A1A17) — readable. Axis labels size 12 dark — readable. Tick labels size 10 soft-dark (#4A4A44) — readable. Legend with elevated-bg box (#FFFDF6) and INK_SOFT border.
      Data: Teal green (#009E73) circles for inside-funnel studies (13), matte red (#AE3030) circles for outside-funnel studies (2: Klein 2020, Jensen 2020). Sizes vary by inverse-variance weight — Ito 2019 is prominently largest. Semi-transparent teal polygon fill for 95% confidence region with dashed green boundary lines. Solid black pooled effect line, dashed gray null reference line. Pooled OR = 1.40 annotation box. Bold red geom_label boxes for outliers; smaller gray text for top-weight inside-funnel studies (Ito 2019, Evans 2017, Garcia 2018).
      Legibility verdict: PASS — all text readable; minor crowding near funnel apex but no actual overlap.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title and axis labels in light cream (#F0EFE8) — readable. Tick labels in soft-light (#B8B7B0) — readable. Legend with elevated dark background (#242420). Pooled OR annotation in elevated dark box. No dark-on-dark failures observed.
      Data: Data colors identical to light render — teal green (#009E73) inside-funnel points and matte red (#AE3030) outside-funnel points unchanged as required. Notable: geom_polygon default border renders as white/light solid outline around the funnel triangle (inheriting light ink token in dark theme), which visually dominates over the intended dashed green boundary lines from geom_line. The funnel shape is still clearly legible.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures; data colors correctly invariant.
