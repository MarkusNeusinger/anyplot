review:
  strengths:
  - 'Semantically meaningful color assignment: brand green (#009E73) for inside-funnel
    studies and matte red (#AE3030) for outside-funnel studies correctly leverages
    the Imprint palette semantic anchor for bad/error — making the publication-bias
    signal immediately readable'
  - 'Redundant encoding: circles for inside-funnel vs diamonds for outside-funnel
    provides CVD-safe distinguishability even without hue differentiation'
  - Weight-proportional marker sizing (80–520 area range based on inverse-variance
    weights) adds an informative data dimension following standard meta-analysis conventions
  - Targeted annotation with curved arrow points directly to the most prominent outlier,
    transforming raw data into an explicit narrative about publication bias
  - 'Excellent theme adaptation: all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly flip between light and dark renders with no dark-on-dark failures'
  - Path effects on the summary line (halo stroke) and title create visual depth and
    hierarchy without chartjunk
  - No bbox_inches='tight' on savefig preserves exact canvas dimensions — correct
    per library rules
  weaknesses:
  - 'DE-01 (6/8): While clearly above defaults, the design does not quite reach FiveThirtyEight-level
    publication polish — could benefit from more refined typography hierarchy (e.g.,
    slightly bolder axis labels relative to tick labels) and tighter visual identity'
  - 'DE-02 (5/6): Minor: the annotation background uses path_effects with PAGE_BG
    stroke rather than a proper bbox with ELEVATED_BG fill — a small inconsistency
    with the style guide''s callout convention (ax.annotate with bbox=dict(facecolor=ELEVATED_BG))'
  - 'LM-02 (3/5): Uses patheffects.Stroke which is distinctly matplotlib, but does
    not demonstrate any truly unique matplotlib feature that would be hard to replicate
    elsewhere (e.g., custom transforms, blended transforms, or figure-level artists)'
