review:
  strengths:
  - 'Complete spec implementation with all required funnel plot elements: inverted
    Y-axis, pseudo 95% CI funnel region, summary effect line, null effect reference,
    classified study scatter'
  - 'Excellent semantic design: green circles (inside funnel) vs red diamonds (outside
    funnel) with redundant shape encoding — CVD-safe and immediately interpretable'
  - 'Advanced matplotlib patheffects used skillfully: Stroke+Normal on summary line
    for visual depth, withStroke on annotation text for readability over data'
  - Full theme adaptation — all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly wired in both renders; no dark-on-dark or light-on-light failure
  - 'Data storytelling: annotation arrow points to the most prominent publication-bias
    outlier with explanatory text, creating a clear focal point'
  weaknesses:
  - Annotation text at fontsize=8 is at the minimum; 9-10pt would improve readability
    when scaled to mobile width (~400 px)
  - plt.tight_layout() is called before save — the library guide recommends fig.subplots_adjust()
    for precise margin control; tight_layout() can behave inconsistently across environments
    (canvas gate passed this time)
  - No weight-proportional marker sizing (s=weight_array where weight=1/SE^2) — optional
    per the spec but standard publication-quality enhancement for funnel plots that
    would raise DE-01 and LM-02
