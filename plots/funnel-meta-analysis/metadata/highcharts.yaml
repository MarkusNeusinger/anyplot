  strengths:
  - Full spec compliance with all required funnel plot features including pooled effect,
    null effect, and 95% CI boundaries
  - Excellent realistic meta-analysis data with appropriate asymmetry demonstrating
    publication bias
  - Clean professional visual design with well-sized explicit font settings and subtle
    grid styling
  - Good data storytelling through deliberate funnel asymmetry and interpretive reference
    lines
  weaknesses:
  - Uses ScatterSeries with type=line for funnel boundaries instead of LineSeries
    (non-idiomatic)
  - Fixed marker size rather than varying by study precision/weight
  - Does not leverage Highcharts-distinctive features like AreaRangeSeries for funnel
    shading or custom tooltip formatters
  image_description: The plot displays a funnel plot for meta-analysis of 15 RCTs
    comparing drug vs placebo. The x-axis shows "Log Odds Ratio" ranging from -1.0
    to 0.4, and the y-axis shows "Standard Error" inverted from 0 at the top to 0.4
    at the bottom. Blue circular markers (#306998) represent individual studies scattered
    across the plot. A solid blue vertical line marks the pooled effect at approximately
    -0.37, labeled "Pooled Effect (-0.37)" at the top. A dashed gray vertical line
    marks the null effect at 0, labeled "Null Effect (0)". Two diagonal dashed lines
    form the funnel shape representing pseudo 95% confidence intervals, with a light
    beige/tan shaded region between them. The title reads "funnel-meta-analysis ·
    highcharts · pyplots.ai" with a subtitle. More precise studies (lower SE) cluster
    near the top, while less precise studies spread wider at the bottom. The scatter
    shows slight asymmetry suggesting publication bias — fewer small studies with
    positive/null effects.
