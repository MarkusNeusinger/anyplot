  image_description: The plot displays a meta-analysis funnel plot with "Log Odds
    Ratio" on the x-axis and "Standard Error" on the y-axis (reversed, with 0 at top
    and 0.6 at bottom). Fifteen blue circular markers (#306998) represent individual
    studies scattered across the plot. A solid blue vertical line marks the summary
    effect at approximately 0.3, and a dotted gray vertical line marks the null effect
    at 0. Two dashed gray diagonal lines form the inverted funnel shape representing
    pseudo 95% confidence limits. The plot uses a minimal theme with subtle major
    gridlines. Studies with lower standard error (more precise) cluster near the top
    around the summary effect, while less precise studies with higher SE scatter more
    widely at the bottom, showing visible rightward asymmetry suggesting publication
    bias. The title reads "funnel-meta-analysis · plotnine · pyplots.ai" in bold at
    the top.
