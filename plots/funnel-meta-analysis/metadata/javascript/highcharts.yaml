review:
  strengths:
  - Correct funnel plot implementation with inverted y-axis (SE=0 at top, larger SE
    at bottom) matching meta-analysis convention
  - 'All required spec features present: study scatter points, pseudo 95% CI funnel
    lines, solid pooled effect line, dashed null reference line'
  - Good use of mixed Highcharts series types (scatter + line) to build the funnel
    from first principles
  - 'Imprint palette correctly applied — brand green #009E73 for study points, both
    renders theme-correct with transparent background and token-based chrome'
  - 'Scientifically realistic data: antidepressant vs placebo RCTs with plausible
    log-ORs (-0.10 to 0.78) and SEs (0.12–0.60), pooled OR 1.49 is credible'
  - 'Idiomatic Highcharts usage: plotLines for reference lines, yAxis.reversed for
    inverted SE axis, showInLegend:false for duplicate CI series'
  - Deterministic hard-coded data, animation disabled in both chart and series — ready
    for headless screenshot
  weaknesses:
  - 'plotLine labels (''Null (OR = 1)'' and ''Pooled OR = 1.49'') render as rotated
    vertical text at the funnel apex — fix by adding rotation: 0 to each label''s
    style block, and adjust y offset to keep horizontal labels clear of the apex'
  - 'All four chart borders visible (Highcharts default full-frame) — add chart.plotBorderWidth:
    0 to remove the border box, leaving only axis lines for a cleaner look'
  - Solid pooled effect line weight (2px) not visually distinguished from null dashed
    line — increase pooled line width to 2.5–3px and/or use t.ink at full opacity
    to reinforce visual hierarchy
  - 'Design refinement is at library defaults: no spine/frame removal, grid on both
    axes with default weight — optionally hide xAxis gridLines or reduce gridLineWidth
    to 0.5 for subtlety'
  - DE-03 storytelling could be improved by marking the pooled effect line more prominently
    (e.g. wider lineWidth) so the viewer's eye is drawn first to the focal summary
    statistic
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface consistent with #FAF8F1 — correct theme background.
      Chrome: Title "funnel-meta-analysis · javascript · highcharts · anyplot.ai" is bold, dark, clearly readable at ~65% of plot width. Subtitle "Antidepressant vs Placebo · 18 Randomized Controlled Trials" in muted tone, readable. X-axis label "Log Odds Ratio" and Y-axis label "Standard Error (SE)" are clearly visible. Tick labels on both axes are legible at appropriate sizes. All four chart borders are visible (Highcharts default frame). Grid lines are subtle on both axes.
      Data: 18 scatter points in brand green #009E73 with white/pageBg edge stroke — well-sized (radius 7) for 18-point sparse dataset. Inverted y-axis correctly places SE=0 (high precision) at top and SE=0.70 at bottom. Two dashed diagonal lines form the pseudo 95% CI funnel shape. Solid vertical line at x=0.40 (pooled effect), short-dashed vertical line at x=0 (null). PlotLine labels "Null (OR = 1)" and "Pooled OR = 1.49" appear as small (12px) rotated vertical text at the funnel apex — legible with effort but not ideal.
      Legibility verdict: PASS (all primary text readable; rotated plotLine labels at apex are a minor weakness)

    Dark render (plot-dark.png):
      Background: Near-black warm surface consistent with #1A1A17 — correct dark theme background.
      Chrome: Title rendered in light text clearly visible against dark background. Subtitle and axis labels also appear in appropriately lightened token colors (inkSoft). Tick labels appear light-on-dark — readable. No dark-on-dark failures observed.
      Data: 18 scatter points retain brand green #009E73 — identical data colors to light render as required. Dashed CI funnel lines rendered in lighter tone (inkSoft on dark theme). Solid pooled effect line visible in light ink color. Funnel shape clearly visible against dark background.
      Legibility verdict: PASS (data and chrome both readable; same rotated plotLine label issue at apex as in light render)
