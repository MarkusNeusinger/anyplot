review:
  strengths:
  - Perfect spec compliance — inverted SE y-axis, pseudo 95% CI funnel diagonals,
    pooled effect solid line, null reference dashed line, and 18 study scatter points
    all present and correctly positioned
  - 'Visual hierarchy is intentional and effective: lineWidth=3 solid pooled line,
    lineWidth=1.5 dashed CI limits, lineWidth=1.5 shortdash null reference — three
    distinct visual weights guide the eye'
  - Data labels on the pooled OR and null reference line at y=0 cleanly annotate the
    two key reference values ('Pooled OR = 1.49' and 'Null (OR = 1)') without crowding
    the plot
  - 'Both light and dark renders are fully theme-correct: transparent background maps
    to page bg, all chrome uses t.ink/t.inkSoft tokens, data colors identical across
    themes'
  - 'Idiomatic Highcharts usage: mixed scatter+line series, showInLegend:false on
    the duplicate CI funnel arm, enableMouseTracking:false on reference lines, zIndex
    for precise layering'
  - 'Realistic meta-analysis data: antidepressant vs placebo with plausible log ORs
    (-0.10 to 0.78) and SEs (0.12-0.60); one negative study present to avoid artificial
    positive-only clustering'
  weaknesses:
  - 'DE-01 moderate: design is clean and intentional but stops at well-configured
    defaults — no distinctive typographic treatment or emphasis beyond correct token
    usage'
  - 'DE-03 moderate: the funnel asymmetry (possible publication bias signal) is visible
    in the data but not explicitly highlighted — a subtle annotation or shading of
    the asymmetric gap would push storytelling above 4/6'
