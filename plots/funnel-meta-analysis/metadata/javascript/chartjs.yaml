review:
  strengths:
  - 'Perfect spec compliance: all funnel plot elements correctly implemented — inverted
    Y-axis, study scatter, 95% CI funnel lines, pooled effect line with computed value,
    null effect reference'
  - Elegant _-prefix legend filter pattern to suppress the duplicate right funnel
    boundary from the legend without clutter
  - 'Excellent code quality: inverse-variance weighted pooled effect computed correctly;
    all data hardcoded for determinism'
  - Both themes render correctly with fully readable chrome and identical data colors
  - 'White ring on study dots (borderColor: t.pageBg) adds visual definition — nice
    theme-adaptive touch'
  weaknesses:
  - 'Duplicate Y-axis tick at 0.5: Setting max: maxSE (~0.5175) causes Chart.js to
    render both the regular 0.5 tick and a boundary tick that also displays as 0.5,
    creating two visually identical labels at the bottom. Fix: set max: Math.ceil(maxSE
    * 10) / 10 to round up to 0.6.'
  - 'Spines not removed: all four chart borders remain visible. Remove top/right borders
    via scales.x.border.display: false and scales.y.border.display: false (Chart.js
    4.x) to improve visual refinement.'
  - 'Palette order deviation: CI lines use palette[2] (#4467A3, blue) but skip palette[1]
    (#C475FD, lavender). Blue is semantically appropriate for CI boundaries, but canonical
    palette order is not followed.'
  - 'DE-01 improvement opportunity: Consider adding a subtle semi-transparent fill
    polygon between the two funnel CI boundary lines to better visualize the confidence
    region and lift aesthetic sophistication.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme surface
      Chrome: Title "funnel-meta-analysis · javascript · chartjs · anyplot.ai" in dark ink, clearly readable. X-axis label "Log Odds Ratio" and Y-axis label "Standard Error" in dark ink, readable. Tick labels in dark-soft color, readable. Legend at bottom with four items. Minor: duplicate "0.5" tick label at Y-axis bottom due to max: maxSE=0.5175 causing Chart.js to render both the 0.5 regular tick and a boundary tick.
      Data: 15 study scatter points in brand green (#009E73 with ~80% alpha) with white rings. Dashed blue (#4467A3) diagonal funnel lines forming inverted triangle. Solid green (#009E73) vertical pooled effect line at x=0.43. Dashed near-black vertical null effect reference at x=0. First series (studies) is #009E73 brand green.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct dark theme surface
      Chrome: Title and all axis labels/ticks rendered in light colors against dark background. No dark-on-dark failures observed. Legend text is light and readable. Grid lines are subtle but visible in theme-adaptive color.
      Data: All data colors identical to light render — brand green study dots, blue-dashed CI funnel lines, teal pooled effect line. Brand green #009E73 clearly visible on dark background. Same duplicate "0.5" tick issue present.
      Legibility verdict: PASS
