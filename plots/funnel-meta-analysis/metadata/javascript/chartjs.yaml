review:
  strengths:
  - Complete spec compliance — all five required funnel elements present (study scatter,
    pooled effect line, funnel CI boundaries, null reference line, inverted y-axis)
  - 'Elegant use of Chart.js fill: "+1" to fill confidence region between two line
    datasets'
  - Legend filter to hide helper _funnel_right dataset is a polished production touch
  - Inverse-variance weighting computed correctly with pooled value shown in legend
    label
  - Theme tokens correctly applied; data colors identical between light and dark renders
  weaknesses:
  - No marker size variation by study weight — all study points uniformly sized despite
    the spec mentioning optional sizing by weight or sample size; adding pointRadius
    proportional to inverse-variance weight would improve both design sophistication
    and storytelling
  - No annotations or visual emphasis on asymmetric outlier studies (e.g., logOR ≈
    −0.05 outside the funnel on the left) to sharpen the publication-bias narrative
  - 'Top/right border of the chart area still faintly visible — border: { display:
    false } removes the axis line but the outer chart frame could be suppressed more
    aggressively for cleaner visual refinement'
