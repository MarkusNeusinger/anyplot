    -0.38 (inverse-variance weighted mean). A dashed gray vertical line marks the
    null effect at 0. Two dashed blue diagonal lines emanate from the top of the summary
    effect line, forming the characteristic inverted funnel shape (pseudo 95% confidence
    limits). The x-axis is labeled "Log Odds Ratio" ranging from -1.20 to 0.40. The
    title reads "funnel-meta-analysis · altair · pyplots.ai" in large font. The studies
    show visible asymmetry — more points cluster to the left of the summary line,
    especially at higher standard errors, suggesting possible publication bias. The
    background is clean white with subtle dashed gridlines on the x-axis only.
