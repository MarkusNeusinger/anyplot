review:
  strengths:
  - Clean and professional crossword grid using theme_void() — all chart chrome removed,
    no unnecessary axes or grid lines competing with the puzzle structure
  - Correct 180-degree rotational symmetry in black cell placement follows traditional
    newspaper-style conventions
  - Clue numbering algorithm correctly identifies across/down word starts in reading
    order — 53 entries over a 13×13 grid is plausible
  - Outer border annotate('rect') framed with INK token that flips between themes
    — adds visual definition without hardcoding
  - coord_fixed(ratio=1) ensures perfect square cells as required by spec
  - Canvas is 6×6 in at 400 dpi (2400×2400 px) — correct square format for a grid-based
    visualization
  - Chrome (title, subtitle, border) adapts correctly to both light and dark themes
    via INK/INK_SOFT tokens
  weaknesses:
  - 'DE-01 moderate: Design is clean but constrained by the monochrome format — no
    opportunity to apply Okabe-Ito palette; could increase sophistication slightly
    with a very subtle warm tint in the outer padding or a thicker/bolder outer border
    frame for more visual presence'
  - 'DE-02 partial: Grid lines (linewidth=0.3) and outer border (linewidth=0.7) are
    good, but there is no further refinement such as slightly rounded or more prominent
    outer frame to make it feel less raw; whitespace could be marginally more generous'
  - 'DE-03 limited: The symmetric black cell pattern is the main visual story but
    it is implicit — a brief note in the subtitle about the symmetry already exists
    (''American-style'') which is good, but the overall storytelling is minimal'
  - 'LM-02 generic: Uses geom_tile + geom_text + annotate which are all standard ggplot2
    tools; no distinctly ggplot2-exclusive feature exploited beyond the correct grammar-of-graphics
    approach'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, non-pure-white surface
      Chrome: Title "crossword-basic · r · ggplot2 · anyplot.ai" in dark ink, centered, clearly readable. Subtitle "13×13 American-style crossword · 53 entries" in INK_SOFT gray, readable.
      Data: 13×13 grid with hard black blocking cells and white entry cells. Clue numbers 1–53 positioned in top-left corners of word-start cells in black text. Outer border rectangle in INK color frames the grid. Grid separator lines in #333333 are visible and clean.
      Legibility verdict: PASS — all title, subtitle, and clue number text is readable. Numbers at size=2.0 are appropriately small for cell-corner placement and remain legible at canvas size.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct warm near-black surface
      Chrome: Title in light #F0EFE8 cream, clearly readable against dark background. Subtitle in #B8B7B0 light gray, readable. Outer border rectangle uses INK (light cream) and is visible.
      Data: Grid cells remain fixed black/white (semantically required for crossword — spec mandates monochrome design). Clue numbers are hardcoded black but appear only in white entry cells (never on black blocking cells), so black-on-white remains readable in dark theme. Data colors identical to light render.
      Legibility verdict: PASS — no dark-on-dark failures. The fixed black/white cell design is spec-mandated (monochrome crossword); chrome elements correctly flip to light-on-dark.
