review:
  strengths:
  - 'Perfect spec compliance: all required crossword features implemented (white entry
    cells, black blocking cells, numbered word-start positions, 180° rotational symmetry,
    1:1 cell aspect ratio, uniform grid lines)'
  - 'Theme-adaptive chrome is correctly implemented: backgrounds #FAF8F1 (light) /
    #1A1A17 (dark), title color uses INK token, clue numbers use INK_SOFT token in
    both renders'
  - Idiomatic Bokeh usage with ColumnDataSource for all cell types, LabelSet for batch
    clue-number rendering, and HoverTool for interactive clue lookup in the HTML artifact
  - 'Clean, well-structured code following KISS: separate ColumnDataSource objects
    for white cells, numbered cells, and black cells enable efficient batch rendering'
  - Thick perimeter border adds professional polish and clearly delineates the puzzle
    boundary; warm entry-cell fill (#FFFDF6) complements the off-white page surface
  weaknesses:
  - Clue numbers are set at 20pt (~27 source-px at 2400×2400) which is small at mobile
    widths (~400px → ~4px per number); consider increasing to 24-26pt to improve mobile
    readability without overcrowding cells
  - 'Dark-theme entry cells use pure #FFFFFF instead of the elevated-bg token #242420
    or a warm white that matches the light theme''s #FFFDF6 — pure white creates a
    starker contrast than the warm off-white used in light mode'
  - Bottom and right canvas margins are tight (min_border_bottom=80, min_border_right=50)
    causing the grid to sit very close to the canvas edge; increase to at least min_border_bottom=100,
    min_border_right=80 for breathing room
  - Design excellence is constrained by the monochrome spec but the hover-tooltip
    label ('Clue N') could be enriched with across/down direction info to add more
    storytelling value to the interactive artifact
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct theme surface.
      Chrome: Title "crossword-basic · python · bokeh · anyplot.ai" in bold dark ink (#1A1A17) is clearly readable against the light background. No axis labels (correct for this plot type). Thick dark perimeter border frames the puzzle neatly.
      Data: 15×15 crossword grid with warm off-white entry cells (#FFFDF6) separated by subtle gray (#4A4A44) grid lines, and near-black (#111110) blocking cells distributed symmetrically. Clue numbers (1–67) appear in gray (#4A4A44) in the top-left corner of word-starting cells — visible at full resolution.
      Legibility verdict: PASS — all text (title + clue numbers) is readable against the light background. Clue numbers are small (20pt) but appropriate for the crossword format.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the canvas — correct dark-theme surface.
      Chrome: Title "crossword-basic · python · bokeh · anyplot.ai" renders in light text (#F0EFE8) against the dark background — clearly readable, no dark-on-dark issues. No axis labels.
      Data: Entry cells are pure white (#FFFFFF) — providing strong contrast against the dark border/background. Blocking cells (#111110) blend slightly with the dark canvas border but remain clearly delineated by the outer perimeter border and adjacent white cells. Clue numbers appear in medium gray (#B8B7B0 = INK_SOFT for dark mode) on the white cells — readable gray-on-white contrast.
      Data colors: The monochrome crossword uses no Okabe-Ito palette colors (correct — spec calls for monochrome design). Data colors (black cells, white cells) are identical between light and dark renders as expected.
      Legibility verdict: PASS — title and clue numbers are both readable in the dark render. No dark-on-dark failures detected.
