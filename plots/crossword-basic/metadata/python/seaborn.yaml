  - 'Perfect spec compliance: all required features present — white entry cells, black
    blocking cells, numbered positions, 180-degree rotational symmetry, square cells,
    and clean grid lines'
  - 'Both themes render cleanly: correct backgrounds (#FAF8F1 light / #1A1A17 dark),
    text chrome adapts properly, no dark-on-dark failures'
  - Creative and idiomatic use of sns.heatmap with custom two-color palette for binary
    grid encoding — linewidths and linecolor produce clean uniform grid lines
  - Clean, concise code with deterministic data construction and proper ANYPLOT_THEME
    environment variable handling
  - Square canvas (6×6 at 400dpi = 2400×2400px) correctly chosen for a symmetric grid-based
    plot
  weaknesses:
  - Cell number fontsize=7pt is borderline small for mobile-scaled views (~400px width);
    consider increasing to 8pt or 9pt for better mobile legibility
  - 'In dark mode, blocked cells (#1A1A17) share the same color as the page background
    (#1A1A17) — they remain distinguishable only through grid lines, not fill color;
    a slightly darker blocked cell (e.g., #0D0D0B or pure #000000) would make the
    dark render more visually faithful to the crossword monochrome convention'
  - Design Excellence is limited by the nature of the monochrome spec — no color hierarchy,
    no size variation, no visual focal point; numbers could use a slightly larger/bolder
    treatment to create more visual hierarchy between high-numbered and low-numbered
    regions
