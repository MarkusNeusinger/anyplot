review:
  strengths:
  - 'Perfect spec compliance: all required features present (white/black cells, 180°
    symmetry, numbered positions, 15×15 size, square cells)'
  - Correct design decision to keep cell colors fixed regardless of theme — the black/white
    contrast IS the data for a crossword
  - scaleanchor/scaleratio ensures pixel-perfect square cells (idiomatic Plotly feature)
  - 'Both themes render cleanly: warm backgrounds, theme-adaptive title/chrome, clue
    numbers readable on white cells in both light and dark'
  - Clean flat code structure with no unnecessary abstraction
  - Correct 2400×2400 square canvas, HTML export, deterministic output
  weaknesses:
  - Outer border is the same weight (1.5px) as inner cell separators — traditional
    crosswords use a visibly thicker outer frame (2.5–3px) to contain the grid. Add
    a separate border rect at x0=-0.05, y0=-0.05, x1=grid_size+0.05, y1=grid_size+0.05
    with line width 3.
  - No visual differentiation between the outer frame and interior grid lines reduces
    aesthetic sophistication (DE-01, DE-02). A heavier outer border would create the
    contained, publication-ready look of real newspaper crosswords.
  - Clue number font color hardcoded to '#1A1A17' rather than using the INK token
    — while functionally fine (numbers appear on white cells), using INK would be
    semantically cleaner and more maintainable.
  - 'DE-03 is limited: no visual emphasis or hierarchy beyond the raw numbered grid
    — consider slightly tinting numbered entry cells vs unnumbered ones (e.g., pure
    white #FFFFFF for numbered, slightly warm #FAFAFA for unnumbered) to create subtle
    reading guidance.'
  - np.random.seed(42) is set but no np.random calls follow — the seed is unnecessary
    (grid is fully deterministic via hardcoded black_cells). Minor code clarity issue.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — visually matches the spec, clearly not pure white.
      Chrome: Title "crossword-basic · python · plotly · anyplot.ai" in dark near-black text, centered, clearly readable. No axis labels or tick labels (correct for this plot type).
      Data: 15×15 crossword grid with pure white (#FFFFFF) entry cells and pure black (#1A1A17) blocking cells. Black cells placed with 180-degree rotational symmetry — the pattern is immediately recognizable as newspaper-style. Clue numbers (1–78) appear in dark (#1A1A17) text in the top-left corner of word-start cells; all numbers are legible at this resolution. Cell borders are rendered in a medium-gray (INK_SOFT #4A4A44) 1.5px line — functional but the outer frame is the same weight as interior separators.
      Legibility verdict: PASS — title and all 78 clue numbers are clearly readable against their respective backgrounds.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correctly applied, not pure black.
      Chrome: Title rendered in light (#F0EFE8) text, clearly visible against the dark background. No tick labels or axis labels.
      Data: Entry cells remain pure white (#FFFFFF) on the dark background — this is intentional and correct per spec ("white cells for letter entry"). Blocking cells are #1A1A17, which blends into the dark background, creating a different visual texture from the light render (only the white cells are visible, not the black cells as distinct shapes). Clue numbers (#1A1A17 hardcoded) on white cells are dark-on-white — fully readable ✓. No dark-on-dark failures.
      Legibility verdict: PASS — all text readable. Data colors are structurally the same (white/black cells), only the page background flipped. No "dark-on-dark" failure detected.
