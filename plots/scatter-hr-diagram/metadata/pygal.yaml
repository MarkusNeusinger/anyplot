review:
  strengths:
  - Excellent astrophysical color palette matching standard spectral type convention
    (blue O/B through red M)
  - Correct reversed x-axis convention for HR diagrams
  - Good data generation with realistic stellar populations across all four regions
  - Sun reference point clearly marked as distinct larger black dot
  - Clean code structure with proper seeding
  weaknesses:
  - Region labels (Main Sequence, Red Giants, Supergiants, White Dwarfs) are NOT visible
    in the rendered PNG - the print_labels + dots_size=1 approach does not produce
    readable text in PNG output
  - Data is overly compressed on the right side (cool stars) - K, M, F/G stars cluster
    together making individual points hard to distinguish
  - Lavender (A stars) is too similar to the blue (O/B stars) at small dot sizes
  image_description: 'The plot shows a Hertzsprung-Russell diagram as an XY scatter
    plot with the x-axis reversed (40,000 K on the left to 4,000 K on the right) and
    log10 luminosity on the y-axis ranging from -5 to 7. Stars are color-coded by
    spectral type: blue dots for O/B stars, light lavender for A stars, golden yellow
    for F/G stars, orange for K stars, and red for M stars. The Sun is marked as a
    distinct larger black dot near coordinates (~5,778 K, 0.0). The main sequence
    diagonal band is clearly visible running from upper-left (hot, bright) to lower-right
    (cool, dim). White dwarfs are visible as scattered blue dots in the lower-center
    region. Red giants cluster in the upper-right. Supergiants populate the top of
    the diagram. The background is light gray (#fafafa) with subtle grid lines. A
    legend at the bottom shows 6 entries (5 spectral types + Sun). The title reads
    "scatter-hr-diagram · pygal · pyplots.ai". However, the four required region labels
    (Main Sequence, Red Giants, Supergiants, White Dwarfs) are NOT visible as text
    annotations in the rendered PNG output.'
