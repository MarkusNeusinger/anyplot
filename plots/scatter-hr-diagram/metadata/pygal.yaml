    approximately (5,778 K, 0.0). The main sequence is clearly visible as a diagonal
    band from upper-left (hot, bright) to lower-right (cool, dim). White dwarfs appear
    as scattered blue points in the lower-center region. Red giants cluster in the
    upper-right (cool, luminous). Supergiants span the top of the diagram. The legend
    is placed at the bottom in a single row with 6 entries. Subtle gray grid lines
    are visible. The cool-star region (right side) shows significant point clustering
    with overlap among K, M, and F/G stars.'
