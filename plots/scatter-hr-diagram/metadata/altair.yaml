    to ~2k on the right) and Luminosity (L/L☉) on the y-axis (logarithmic, from 1e-5
    to 1e+7). Stars are color-coded by spectral type: O (dark blue), B (medium blue),
    A (very pale blue), F (light yellow), G (golden yellow), K (orange), M (red-brown).
    Four stellar regions are labeled in italic gray text: Supergiants (upper center),
    Red Giants (right-center), Main Sequence (lower-center), and White Dwarfs (lower-left).
    The Sun is marked with a gold cross marker near the center-right with the label
    "Sun ☉". A legend on the right shows spectral types O through M. The background
    is white with very subtle gridlines, no view border, and no tick marks. Title
    reads "scatter-hr-diagram · altair · pyplots.ai" in the top-left.'
