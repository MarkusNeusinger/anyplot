    light gray. The y-axis shows Luminosity (L☉) on a logarithmic scale from 0.0001
    to 2M. The title "scatter-hr-diagram · highcharts · pyplots.ai" appears in white
    at the top center, with a gray subtitle. Spectral class letters (O, B, A, F, G,
    K, M) are displayed in their respective colors along the top of the plot area.
    Stars are color-coded: blue for O/B types, pale white/blue for A, pale yellow
    for F, yellow for G, orange for K, and red-orange for M. Main sequence stars form
    a clear diagonal band from upper-left (hot, luminous) to lower-right (cool, dim).
    Supergiants appear as large gold markers at the top. Red giants are large red-orange
    markers on the upper-right. White dwarfs are small gray-blue dots at the lower-center/left.
    The Sun is prominently marked with a large yellow circle and "Sun ☉" label near
    5778K, 1 L☉. Region labels (SUPERGIANTS, MAIN SEQUENCE, RED GIANTS, WHITE DWARFS)
    appear in semi-transparent text. A vertical legend on the right lists all series.
    Subtle dashed vertical lines mark spectral class boundaries.'
