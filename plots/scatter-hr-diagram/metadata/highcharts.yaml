  image_description: 'The plot displays a Hertzsprung-Russell diagram on a dark (#0d1117)
    background evoking a cosmic/astronomical feel. The x-axis shows "Surface Temperature
    (K)" reversed from ~50k on the left to ~2k on the right with logarithmic scaling.
    The y-axis shows "Luminosity (L☉)" on a logarithmic scale from 0.0001 to 2M. Scatter
    points are color-coded by spectral type: blue tones for O/B stars (upper left),
    white/pale for A stars, yellow for F/G stars, orange for K stars, and red-salmon
    for M stars. The main sequence runs as a clear diagonal band from upper-left to
    lower-right. Supergiants appear as large gold circles at top center with high
    luminosity. Red giants cluster at the right side with moderate-to-high luminosity.
    White dwarfs sit at the bottom center as small pale blue dots. The Sun is marked
    with a prominent yellow circle labeled "Sun ☉" near the middle of the main sequence.
    Four region labels (SUPERGIANTS, MAIN SEQUENCE, RED GIANTS, WHITE DWARFS) are
    rendered in semi-transparent text. A vertical legend on the right lists all 11
    series. Title reads "scatter-hr-diagram · highcharts · pyplots.ai" with a subtitle
    below.'
