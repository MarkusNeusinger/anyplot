review:
  strengths:
  - Excellent spectral convention with documented semantic exception — all 7 spectral
    type colors map to Imprint palette members (O→#4467A3 blue, B→#2ABCCD cyan, A→#F0EFE8
    near-white, F→#99B314 lime, G→#DDCC77 amber, K→#BD8233 ochre, M→#AE3030 matte
    red), matching astrophysical expectations.
  - KDE density contours overlay via sns.kdeplot(log_scale=True) beautifully highlights
    main sequence concentration — a seaborn-distinctive feature that other libraries
    cannot replicate as elegantly.
  - Secondary spectral class x-axis (ax.twiny()) with manual tick positions adds genuine
    astrophysical context beyond the base spec requirement.
  - 'Perfect spec compliance: reversed x-axis, log y-scale, 7 spectral types color-coded,
    4 stellar regions labeled, Sun marked, secondary spectral class axis all present.'
  - Robust theme adaptation — both renders fully readable with correct INK/INK_SOFT/INK_MUTED
    tokens, PAGE_BG and ELEVATED_BG backgrounds, and path effects on annotations preventing
    dark-on-dark or light-on-light failures.
  - Dual encoding (hue + marker shape) correctly handles the 7-category challenge,
    adding redundant shape encoding as recommended by the style guide for n≥5 series.
  - Sun hexagon marker (s=280) at exact astrophysical coordinates (5778 K, 1 L☉) with
    bold path-effect annotation is a polished reference anchor.
  - figsize=(8,4.5) at dpi=400 → exactly 3200×1800 px; savefig without bbox_inches
    — canvas preserved correctly.
  weaknesses:
  - Region text labels (fontsize=8, italic) positioned inside data clusters — 'Red
    Giants' at (3600, 600) overlaps diamond markers; path effects mitigate but don't
    eliminate the visual conflict. Consider repositioning to cluster margins or adding
    leader lines.
  - Small italic region labels (fontsize=8) and rotated 'Main Sequence' diagonal label
    may challenge readability at mobile width (~400 px thumbnail scale).
  - Both-axis grid (x and y) at alpha=0.12 — style guide recommends y-axis-only grid
    for scatter plots; the horizontal grid lines add minor noise for this log-scale
    diagram.
  - 'A-type color #F0EFE8 is the theme-adaptive INK anchor (used for text/chrome in
    dark theme), not a dedicated categorical slot — a visually distinct Imprint color
    would better separate A-type from chrome elements, though the spectral convention
    justifies near-white here.'
