review:
  strengths:
  - Dual-encoded scatter (hue + shape) cleanly separates 7 spectral types from 4 stellar
    populations, providing maximum information with no visual ambiguity
  - KDE density contour overlay on the main sequence is a distinctively seaborn technique
    that reveals the stellar population structure beyond what a scatter alone shows
  - 'Astrophysical conventions fully implemented: reversed log x-axis, log luminosity
    y-axis, secondary spectral-class axis, and Sun hexagon reference marker'
  - Theme-adaptive chrome (backgrounds, text, spines, grid, legend boxes) works correctly
    in both light and dark renders with zero dark-on-dark failures
  - Path-effects halos on region and Sun annotation labels prevent overlap with data
    markers even in dense areas
  - Code is clean KISS structure with deterministic np.random.seed(42), explicit canvas
    sizing (8×4.5 at dpi=400), and no bbox_inches='tight' drift
  weaknesses:
  - 'VQ-07 partial: Spectral type colors use fully custom hexes (#5B7FFF, #8EAAFF,
    #C4D4FF, #E8E8D0, #E6C84B, #D98030, #C94420) rather than Imprint palette members.
    The semantic exception is valid (astrophysical convention is extremely strong),
    but the fix is to map spectral types to the closest Imprint members where possible
    — O/B→#4467A3 (Imprint blue), M→#AE3030 (Imprint matte red), K→#BD8233 (Imprint
    ochre), G→#DDCC77 (amber anchor for sun-yellow), F→#99B314 (Imprint lime for warm-white),
    A→#F0EFE8 (INK dark-theme value, near-white) — then justify any remaining custom
    hex in a code comment. The first categorical series must also be #009E73 or have
    a documented exception.'
  - 'VQ-01 minor: Legend text is 7pt and legend title is 8pt — both are below the
    8pt/9pt recommendations from the style guide. At 400px mobile viewport these characters
    drop to ~5 source pixels and become unreadable. Increase both: fontsize=8, title_fontsize=9.'
  - 'VQ-05 tight margin: The secondary spectral-class x-axis (ax2) with its ''Spectral
    Class'' label (labelpad=8) stacks above the main plot, pushing the figure title
    very close to the top canvas edge. Add fig.subplots_adjust(top=0.86) to open up
    breathing room between the title and the top border. This prevents any risk of
    the title touching or slightly clipping the top edge.'
  - 'DE-01 moderate: The overall composition is well-structured but not yet publication-ready.
    Consider increasing the KDE contour linewidth to 1.0 (from 0.6) and the KDE alpha
    to 0.45 (from 0.30) to make the main sequence structure more visually prominent.
    Also consider making the Sun hexagon slightly larger (s=280 from s=220) so it
    anchors the viewer''s eye more strongly — it is the intended focal point.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — clearly not pure white, correct anyplot surface.
      Chrome: Title "scatter-hr-diagram · python · seaborn · anyplot.ai" at top in dark ink (#1A1A17), readable but very close to the canvas top edge due to the secondary spectral-class axis consuming vertical space below it. Secondary x-axis "Spectral Class" with O B A F G K M tick labels sits just below the title. X-axis label "Surface Temperature (K)" and Y-axis label "Luminosity (L☉)" both in 10pt dark ink, readable. Tick labels in 8pt muted dark ink (#4A4A44), readable. Two legends (Spectral Type lower-left, Region upper-right) have elevated backgrounds (#FFFDF6) with muted ink legend text (7pt — slightly small). All text is readable against the warm off-white background; no light-on-light failures.
      Data: Scatter plot with 330 stars across 4 stellar populations (circles=Main Sequence, diamonds=Red Giants, squares=Supergiants, down-triangles=White Dwarfs). Spectral type colors run from blue (#5B7FFF O-type upper-left) through lighter blues (B), near-white (A, mid-diagonal), yellow (#E6C84B G-type near Sun), orange (#D98030 K-type), to deep red (#C94420 M-type lower-right). KDE contour overlay in Imprint blue (#4467A3) traces the main-sequence density. Sun hexagon in gold (#E6C84B) clearly marked at 5778K / 1 L☉ with "Sun" annotation using path_effects halo. Region labels ("Supergiants", "Red Giants", "White Dwarfs", "Main Sequence" rotated diagonal) use 8pt italic muted ink with halos, well-positioned in sparse zones.
      Legibility verdict: PASS — all elements readable at full resolution; legend 7pt text is a minor mobile concern.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title text flips to light cream (#F0EFE8), clearly visible against near-black background. Secondary x-axis tick labels and "Spectral Class" label in lighter muted tone (#B8B7B0), readable. Axis labels and tick labels in appropriate light tones. Both legend boxes show elevated dark background (#242420) with light text — no dark-on-dark failures. Grid lines are subtle. Spines (left, bottom, top via secondary axis) in muted light color.
      Data: Data colors are identical to the light render — spectral type blues/whites/yellows/reds unchanged (Imprint palette positions stay constant across themes as required). KDE contour in #4467A3 still visible against dark background. Sun hexagon in gold (#E6C84B) remains clearly visible — brand green #009E73 visibility is not a concern here since spectral exception colors are used, but the gold sun marker reads well on the dark surface.
      Legibility verdict: PASS — all text readable against near-black background; no dark-on-dark failures identified.
