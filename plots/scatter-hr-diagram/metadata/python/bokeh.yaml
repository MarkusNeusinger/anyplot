review:
  strengths:
  - 'Outstanding spec compliance: all required features (reversed X-axis, logarithmic
    axes, spectral type colors, four region labels, Sun reference, spectral class
    letters along top) implemented correctly'
  - 'Theme-adaptive implementation is exemplary: separate darkened label colors for
    light theme, white marker edges for dark theme, correct PAGE_BG and ELEVATED_BG
    tokens throughout both renders'
  - Redundant marker shape encoding (7 distinct marker types per spectral class) is
    excellent CVD mitigation for the 7-series chart
  - Real Bokeh interactivity (HoverTool with formatted tooltips, click_policy='hide'
    on legend) leverages the library's strength in HTML output
  - 'Perfect code quality: np.random.seed(42), all imports used, linear KISS structure,
    proper output naming for both HTML and PNG artifacts'
  weaknesses:
  - A-type (#CCD8FF) and F-type (#FFF4C8) spectral fill colors are nearly invisible
    on the light cream (#FAF8F1) background — these very light fills rely entirely
    on dark outlines for visibility, making these stellar populations hard to distinguish
    in the light render; increase marker size for these types (e.g., size=18-20) or
    use slightly more saturated fills
  - 'Custom spectral hex colors (#5588FF, #88AAFF, #CCD8FF, #FFF4C8, #FFD700, #FF8C00,
    #FF3300) are not Imprint palette members; semantic exception for astronomical
    domain is valid but rule requires mapping to closest Imprint palette members (O/B→#4467A3,
    M→#AE3030, etc.) not arbitrary custom hexes'
  - Top and right spines are visible via full box outline (p.outline_line_color =
    INK_SOFT); remove or set to None to achieve the recommended L-shaped spine style
    per the style guide
  - '"Main Sequence" label at position (8500, 8) sits within the dense scatter cloud
    overlapping many data markers; reposition to data-sparse area e.g., (12000, 50)
    above the main sequence band'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "scatter-hr-diagram · python · bokeh · anyplot.ai" in bold dark ink, spans ~65-70% of canvas width (expected for mandated format). X-axis label "Surface Temperature (K)" and Y-axis "Luminosity (L☉)" in dark INK color. Tick labels in medium gray INK_SOFT. Spectral class letters (O, B, A, F, G, K, M) along top edge in darkened theme-adaptive colors. Region annotations (Supergiants, Red Giants, Main Sequence, White Dwarfs) visible. Legend on right with "Spectral Type" header and 7 type entries.
      Data: Seven spectral types plotted with distinct marker shapes (circle=O, diamond=B, hex=A, inverted_triangle=F, circle=G, triangle=K, square=M). O/B types in blue shades, G in yellow, K in orange, M in red-brick. A-type (#CCD8FF very light periwinkle) and F-type (#FFF4C8 near-cream yellow) fills are nearly invisible against cream background — visible only via dark-ink outlines. Sun marked as gold star at T=5778K, L=1.0 L☉ with "☀ Sun" label. First series (O-type) uses #5588FF — NOT Imprint #009E73 (valid semantic exception for astronomy but custom hex).
      Legibility verdict: PASS with minor concerns — all text readable; A/F type fill contrast is borderline on cream background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in light F0EFE8-range text, clearly visible. Axis labels and tick labels in light B8B7B0-range text. No dark-on-dark failures observed. Legend background in elevated dark #242420. Spectral class letters and region annotations readable in appropriate colors.
      Data: All data colors identical to light render — spectral type colors unchanged (only chrome flipped). A-type (#CCD8FF) and F-type (#FFF4C8) fills, which were nearly invisible in light render, are now clearly distinguishable against the dark background. Marker edges switched to white (#FFFFFF) in dark theme for better definition. Sun star still prominent. Main sequence diagonal clearly visible. Data color constancy confirmed.
      Legibility verdict: PASS — dark render is actually cleaner for A/F type visibility than light render; no dark-on-dark failures
