review:
  strengths:
  - Dual redundant encoding (color + distinct marker shape per spectral type) handles
    both aesthetics and CVD accessibility simultaneously
  - 'Theme-adaptive label colors (SPECTRAL_LABEL_COLORS) darken label text for the
    light theme — preventing washed-out labels from #2ABCCD and #C475FD on the cream
    surface'
  - 'Star-shaped amber Sun reference marker at T=5778 K, L=1 L☉ uses the correct #DDCC77
    semantic anchor and provides crucial educational scale'
  - Spectral class letters (O-M) along the top row, color-coded and bold, serve as
    an implicit secondary axis reference
  - CDP setDeviceMetricsOverride + PIL canvas-pin is a robust workaround for Chrome
    headless height-drift
  weaknesses:
  - F stars assigned lime (#99B314) instead of a yellow/ochre color; the spec explicitly
    says F/G stars should be yellow, and lime green creates a misleading association
    that breaks the hot-blue/cool-red gradient story
  - A stars assigned lavender (#C475FD) instead of a white/blue-white color; A-type
    stars are spectrally white with slight blue tinge — lavender introduces purple
    hue that readers associate with neither white nor blue
  - Region label 'Main Sequence' has no background fill, making it overlap visually
    with the dense G/K scatter zone — add background_fill_color=ELEVATED_BG, background_fill_alpha=0.85
    consistent with the Sun label
  - No visual emphasis on the main sequence itself (e.g. a faint diagonal guide or
    slightly larger main-sequence markers) to make it the clear focal point
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Bold dark title "scatter-hr-diagram · python · bokeh · anyplot.ai" fully visible at top (~75% width, expected for title length). X-axis label "Surface Temperature (K)" and Y-axis label "Luminosity (L☉)" in dark INK color, readable. Tick labels in INK_SOFT (#4A4A44), readable. Spectral class letters O-M in darkened spectral label colors across top — readable.
      Data: 7 spectral types with Imprint palette colors and distinct marker shapes: O=blue circles, B=cyan diamonds, A=lavender hexagons, F=lime inverted-triangles, G=ochre circles, K=matte-red triangles, M=rose squares. Sun marker = amber star (#DDCC77) at (5778K, 1 L☉). Region labels (Main Sequence, Red Giants, Supergiants, White Dwarfs) positioned in data space. Alpha=0.85.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title, axis labels, tick labels all in light tones (INK=#F0EFE8, INK_SOFT=#B8B7B0) — fully readable against dark background. No dark-on-dark failures. Grid lines visible at alpha=0.12. Legend on right with light label text.
      Data: Colors identical to light render — O blue, B cyan, A lavender, F lime, G ochre, K matte-red, M rose. Sun amber star visible. Region labels readable with appropriate light color values.
      Legibility verdict: PASS
