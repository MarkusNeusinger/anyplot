review:
  strengths:
  - Correct HR diagram structure with reversed x-axis (astrophysical convention),
    log-scale luminosity, and dual axes showing Spectral Class on top
  - 'Thoughtful semantic color exception: Main Sequence green (#009E73), Red Giants
    matte-red (#AE3030), Supergiants lavender (#C475FD), White Dwarfs blue (#4467A3)
    — all from Imprint palette with justified real-world color mappings'
  - Distinctive amber diamond Sun marker at (5778 K, 1.0 L_sun) creates a clear focal
    reference point with matching amber label text
  - Four stellar region text annotations (MAIN SEQUENCE angled, RED GIANTS, SUPERGIANTS,
    WHITE DWARFS) guide the viewer through each population
  - Subtle dual-linewidth grid (major 0.18, minor 0.09) and full theme-adaptive chrome
    — both light and dark renders read cleanly
  - 'Excellent code quality: KISS structure, set.seed(42), all imports used, idiomatic
    ggplot2 with sec.axis for secondary axis and math_format for log tick labels'
  - 'Physically motivated synthetic data: main sequence follows Stefan-Boltzmann T^4
    relationship, populations placed at astrophysically correct temperature/luminosity
    ranges'
  weaknesses:
  - 'Spec requires color-coding by spectral type (O, B, A, F, G, K, M) with conventional
    stellar colors, but implementation colors by region instead. The spectral_type
    column is not used at all. Fix: add spectral_type assignment to the dataframe
    and use it as either a secondary aesthetic (shape or a second legend) or replace
    region coloring — the spec explicitly lists spectral_type as a required data dimension.'
  - 'X-axis tick labels crowd at the cool (right) end: breaks c(30000, 20000, 10000,
    7500, 5000, 3500) with limits down to 2700 K cause ''10,000'', ''7,500'', ''5,000'',
    ''3,500'' to overlap at the right side. Fix: drop one intermediate break (e.g.
    remove 7500) or use fewer breaks in the 3500–10000 K range.'
  - 'Design could be elevated: the full four-sided panel.border adds visual weight.
    The secondary x-axis (Spectral Class) on top justifies keeping the top border,
    but removing the right spine would lighten the frame while preserving the dual-axis
    look.'
  - 'DQ-01: the spec also lists star_name as a data dimension for labeling notable
    stars beyond just the Sun. Adding 2-3 named stars (e.g., Betelgeuse, Sirius, Rigel)
    would improve feature coverage.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "scatter-hr-diagram · r · ggplot2 · anyplot.ai" centered in dark ink, ~65% of canvas width — readable. Y-axis label "Luminosity (solar units)" and X-axis label "Surface Temperature (K)" in dark ink at 10pt — clear. Top axis "Spectral Class" with O, B, A, F, G, K, M tick labels — readable. Tick labels on both axes in INK_SOFT (#4A4A44) at 8pt — legible. Grid lines subtle in INK_MUTED. Right-edge x-axis ticks (10,000 / 7,500 / 5,000 / 3,500) are visibly tight/crowded.
      Data: Four populations well-separated: Main Sequence (#009E73 green) shows clear diagonal band; Red Giants (#AE3030 matte-red) clustered at cool-moderate luminosity; Supergiants (#C475FD lavender) scattered at top; White Dwarfs (#4467A3 blue) at bottom. Amber diamond Sun marker at ~5778 K, 1.0 L_sun with matching amber "Sun" label — clearly visible. Region labels in italic muted ink positioned within each population zone.
      Legibility verdict: PASS — all elements readable; minor concern is crowded x-axis ticks at cool end.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8 text — readable. Axis labels and tick labels in #B8B7B0 — clearly visible against dark background. No dark-on-dark failures observed. Grid lines subtle on dark surface. Legend box in #242420 elevated background with light text.
      Data: All four data colors identical to light render — Main Sequence green, Red Giants red, Supergiants lavender, White Dwarfs blue. Amber Sun diamond marker stands out well on dark surface. Brand green #009E73 reads well against near-black background.
