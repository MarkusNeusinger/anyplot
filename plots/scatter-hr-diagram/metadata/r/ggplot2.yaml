review:
  strengths:
  - Full spec compliance including the optional secondary spectral-class axis on top
  - All 7 spectral-type colors drawn from the Imprint palette with a well-justified
    semantic exception (conventional stellar colors)
  - Physics-based synthetic data generation using Stefan-Boltzmann luminosity-temperature
    relationship
  - 'Excellent data storytelling: Sun reference marker, 3 named stars with labels,
    4 region annotations'
  - 'Expert idiomatic ggplot2 usage: sec_axis, scale_x_reverse, scale_y_log10 with
    trans_format, inherit.aes=FALSE, annotate with angle'
  weaknesses:
  - MAIN SEQUENCE annotation placed at (9500, 24) with angle=-20 sits directly in
    the densest part of the main-sequence scatter, causing visible text-on-data overlap;
    reposition to a lower-density gap e.g. around 4500K luminosity ~0.08 to eliminate
    the overlap
  - 7 spectral types use color alone without redundant shape encoding; at 7 series
    CVD discrimination is at the floor — consider mapping shape to stellar region
    (circle=main sequence, triangle-up=red giants, diamond=supergiants, triangle-down=white
    dwarfs) as secondary redundant encoding
