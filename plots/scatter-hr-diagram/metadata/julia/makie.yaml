review:
  strengths:
  - Accurate stellar population data generation with physically realistic temperature/luminosity
    ranges and power-law main sequence scaling
  - 'Full spec compliance: reversed x-axis (astrophysical convention), log-log scales,
    all four stellar regions labeled, Sun reference point with star5 marker'
  - 'Perfect code quality: KISS flat structure, Random.seed!(42), clean imports, correct
    theme-adaptive chrome tokens throughout'
  - 'Imprint palette with well-justified semantic assignments: brand green for main
    sequence (first series), amber for Sun, blue for hot white dwarfs'
  - Both themes render correctly — INK/INK_SOFT tokens applied to all text elements
    with no dark-on-dark or light-on-light failures
  - Thoughtful marker size variation encoding stellar class prominence (markersize
    6→7→13→16 from white dwarfs to supergiants)
  weaknesses:
  - Region label "Main Sequence" placed at (9000K, 6 L☉) sits within the data scatter
    band — move to clearer whitespace e.g. (7000K, 30 L☉) where the band is sparser
  - White dwarf markers (28 sparse points) are markersize=6, too small for this population
    density — increase to 8-9 for better visibility
  - Spec explicitly requests coloring by spectral type (O, B, A, F, G, K, M) with
    conventional colors, but implementation uses region-based coloring only — spectral_type
    dimension from spec data is omitted
  - Data storytelling is functional but lacks a strong visual focal point — consider
    a faint main-sequence spine line or slightly higher alpha for supergiants to emphasize
    the luminosity hierarchy
  - Both x and y grids are shown; for a scatter plot a y-grid-only approach would
    reduce visual noise and improve readability of the diagonal main sequence band
  - 'LM-02: Makie-specific features like custom tick formatters work well but more
    distinctive Makie capabilities (e.g. secondary top axis for spectral class labels,
    Colorbar integration) were not leveraged'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly set, not pure white.
      Chrome: Title "scatter-hr-diagram · julia · makie · anyplot.ai" in dark ink (#1A1A17), centered, clearly readable. X-axis label "Surface Temperature (K)" and Y-axis label "Luminosity (L☉)" in dark ink, proportional sizing. Tick labels in INK_SOFT (soft dark gray), readable. Custom human-readable x-ticks ("3k","5k","10k","20k","40k") — nice detail.
      Data: Main sequence in brand green (#009E73, 200 pts, alpha=0.65) forms the expected diagonal from upper-left (hot/bright) to lower-right (cool/dim). Red giants in matte red (#AE3030, 45 pts, markersize=13) cluster in the upper-right. Supergiants in lavender (#C475FD, 18 pts, markersize=16) scatter at very high luminosities. White dwarfs in blue (#4467A3, 28 pts, markersize=6) at lower-left. Sun in amber (#DDCC77) as star5 marker at 5778K, L=1 — prominently visible.
      Region labels "Main Sequence", "Red Giants", "Supergiants", "White Dwarfs" in INK_SOFT — readable but "Main Sequence" is placed within the scatter band near (9000K, 6 L☉).
      Legend bottom-right with ELEVATED_BG (#FFFDF6) frame, all 5 categories visible.
      Legibility verdict: PASS — all text readable against the light background.

