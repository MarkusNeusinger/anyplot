      Data: All data colors are identical to the light render — brand green main sequence, matte red giants, lavender supergiants, blue white dwarfs, amber Sun star. Imprint palette is correctly theme-independent.
      Legibility verdict: PASS — all text readable against the dark background. No dark-on-dark text failures observed.
