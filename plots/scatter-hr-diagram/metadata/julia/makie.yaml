review:
  strengths:
  - 'Excellent semantic color mapping: G-type leads with brand green (#009E73), K-type
    uses ochre, M-type uses matte red — approximates astronomical convention while
    maintaining Imprint palette compliance'
  - Dashed main-sequence reference spine is a standout editorial choice that guides
    the viewer along the expected stellar evolution pathway
  - Sun reference point (gold star5 with outline at T=5778K, L=1) provides an immediately
    recognizable scale anchor for non-experts
  - Full theme adaptation (light/dark) with correct chrome token hierarchy throughout
    all elements
  - 'Physically accurate synthetic data: L proportional to T^3.5 main sequence relationship,
    correct spectral type temperature boundaries, realistic stellar population ratios'
  - Clean y-only grid at 12% opacity — appropriate for scatter, reduces chart noise
  weaknesses:
  - Region annotation labels (Main Sequence, Red Giants) placed within or adjacent
    to dense star clusters cause partial overlap with data points — consider offset
    placement or arrows to nearby whitespace
  - G-type (solar) stars use brand green (#009E73) rather than conventional stellar
    yellow/gold — spec explicitly requests yellow for F/G types; current mapping is
    an intentional palette-compliance trade-off but diverges from spec
  - Optional secondary x-axis with spectral class labels (O, B, A, F, G, K, M) not
    implemented — would strengthen the astronomical context
  - spectral_type(T) helper function slightly violates KISS structure principle
