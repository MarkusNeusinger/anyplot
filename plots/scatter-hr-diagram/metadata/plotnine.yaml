  image_description: 'The plot displays a Hertzsprung-Russell diagram as a scatter
    plot on a 16:9 canvas. The x-axis shows "Surface Temperature (K)" reversed from
    ~35000K on the left to ~3000K on the right. The y-axis shows "Luminosity (L☉)"
    on a logarithmic scale from ~10^-4 to ~10^5. Stars are color-coded by spectral
    type: dark navy (O), medium blue (B), light blue (A), yellow-green (F), golden
    yellow (G), orange (K), and red (M). The main sequence forms a clear diagonal
    band from upper-left (hot, luminous) to lower-right (cool, dim). Red Giants cluster
    in the upper-right (cool, luminous), Supergiants span the top, and White Dwarfs
    scatter across the lower portion. The Sun is marked with a black star symbol near
    the middle-right of the main sequence. Four region labels in gray italic text
    identify the stellar populations. The legend on the right shows all seven spectral
    types. The title reads "scatter-hr-diagram · plotnine · pyplots.ai" in bold. The
    background is clean with subtle gray gridlines.'
