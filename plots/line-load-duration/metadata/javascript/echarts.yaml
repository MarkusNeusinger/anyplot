review:
  strengths:
  - Excellent idiomatic use of ECharts markArea and markLine features for semantic
    region shading and capacity tier reference lines
  - 'Full spec compliance: all required features implemented including three load
    regions, capacity tier dashed lines, direct region labels, and total energy annotation'
  - Correct Imprint palette usage with semantic color assignments — matte red (palette[4])
    for peak load, ochre (palette[3]) for intermediate, blue (palette[2]) for base
    load
  - Clean theme adaptation with all chrome tokens (t.ink, t.inkSoft, t.grid, t.elevatedBg)
    properly applied in both light and dark renders
  - Deterministic LCG seeded RNG for reproducible synthetic load data in the browser
    context where Math.random() cannot be seeded
  - 'All text elements explicitly sized with proper typographic hierarchy: title 22px,
    axis names 16px, tick/annotation labels 13-14px'
  weaknesses:
  - Two helper functions (hexAlpha, rnd) break strict KISS structure; hexAlpha conversion
    could be inlined or precomputed as top-level variables rather than a function
  - Tick and annotation labels at 13px are slightly below the recommended 14px from
    the echarts style guide, marginally reducing mobile readability at 400px viewport
    width
