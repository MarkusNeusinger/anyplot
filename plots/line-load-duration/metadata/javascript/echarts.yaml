review:
  strengths:
  - Deterministic data generation via LCG seed provides perfectly reproducible results
    with realistic seasonal+daily load shape
  - Excellent use of ECharts-native markLine, markArea, and graphic primitives to
    implement all spec requirements idiomatically without workarounds
  - Theme tokens correctly applied throughout chrome (ink, inkSoft, elevatedBg, grid)
    with only the data line using the palette — theme adaptation is properly scoped
  - Y-axis-only grid lines is the right choice for a duration curve (horizontal reference
    lines, no vertical clutter)
  - The Intermediate cap / Base cap mark line labels with elevated-background padding
    are a clean engineering-style detail
  weaknesses:
  - 'Region fills in dark mode: the three markArea fills use hardcoded low-opacity
    RGBA (rgba(174,48,48,0.12), rgba(189,130,51,0.11), rgba(68,103,163,0.13)) which
    become nearly indistinguishable in dark mode since a 12% overlay on #1A1A17 produces
    very little contrast between regions. Use higher opacity in dark mode (0.18-0.22)
    or derive region colors from t.palette members (palette[4] for peak/red, palette[3]
    for intermediate/ochre, palette[2] for base/blue) at appropriate opacity to ensure
    region differentiation survives both themes.'
  - Mark line label text at fontSize 12 is the smallest element on the canvas; consider
    bumping to 13-14 to match the axis tick label size for visual consistency
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "line-load-duration · javascript · echarts · anyplot.ai" centered at top, clearly readable in dark ink. Y-axis label "Load (MW)" and X-axis label "Duration (hours per year)" both legible. Tick labels at fontSize 13 are readable. Mark line labels "Intermediate cap: 900 MW" and "Base cap: 600 MW" on right margin with elevated-background chips are legible.
      Data: Brand green (#009E73) line traces monotonically decreasing load from ~1,200 MW to ~380 MW. Three translucent region fills: soft rose/red (peak, left), warm amber (intermediate, middle), muted blue (base, right). Region labels directly on chart in thematic colors. Total energy annotation "Total annual energy: 6.93 TWh" centered on chart.
      Legibility verdict: PASS — all text elements fully readable against light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title and axis labels correctly switch to light-colored text via t.ink/t.inkSoft tokens. Tick labels readable. Mark line labels readable with elevated background treatment (t.elevatedBg). Region labels in hardcoded RGBA colors remain readable (red, amber, blue on dark background).
      Data: Brand green (#009E73) line identical to light render — clearly visible against dark surface. Region fills use same hardcoded RGBA values as light render; at 12-13% opacity on dark background, the three regions become barely distinguishable from each other (all appear as slightly different dark muted tones). The functional data (line) is unaffected.
      Legibility verdict: PASS for all text elements; region shading differentiation reduced in dark mode due to low-opacity hardcoded RGBA fills. No dark-on-dark text failures.
