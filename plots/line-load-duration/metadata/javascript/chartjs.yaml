review:
  strengths:
  - Correct core load duration curve with three colored fill regions
  - Both themes render correctly with full theme-adaptive chrome (no dark-on-dark
    failures)
  - Well-structured Chart.js code using fill, spanGaps, afterDraw plugin, and legend
    filter callback
  - 'Semantic color reasoning: red (#AE3030) for peak, green (#009E73) for base load
    — appropriate and intuitive'
  - Total Annual Energy annotation (5,643 GWh) correctly implemented with styled box
    in upper-right
  - Horizontal dashed capacity-tier lines at 520 MW and 900 MW clearly shown with
    legend labels
  weaknesses:
  - 'Critical annotation positioning bug: xScale.getPixelForValue() called with hour
    values (440, 3070, 7000) but x-axis is a category scale where getPixelForValue
    takes indices (0-875). Fix: use Math.round(dataX/10) as the index — PEAK: index
    44, INTERMEDIATE: index 307, BASE LOAD: index 700. Currently only PEAK is visible
    (at wrong ~50% position in intermediate zone) while INTERMEDIATE and BASE LOAD
    are clipped off-chart.'
  - Legend omits region fill labels (filtered out by datasetIndex >= 3), relying entirely
    on the broken on-plot annotations for region identification. Either restore fills
    to legend or ensure on-plot annotations work after the positioning fix.
