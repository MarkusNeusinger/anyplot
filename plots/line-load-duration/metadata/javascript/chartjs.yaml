review:
  strengths:
  - 'Perfect spec compliance: all four required features (region fills, capacity dashed
    lines, region labels, energy annotation) fully implemented'
  - Custom afterDraw plugin with coordinate mapping, clipping, and rounded pill annotations
    — well above basic Chart.js usage
  - 'Intelligent legend filtering: hides fill-only datasets, exposes only the three
    meaningful legend items'
  - Semantic color assignment with documented rationale (green=base/stable, blue=intermediate,
    red=peak/critical)
  - Fully deterministic data generation producing a realistic, engineering-plausible
    load duration curve
  - All chrome (text, grid, annotation backgrounds) correctly uses theme tokens, giving
    correct adaptation in both renders
  weaknesses:
  - 'Chart area box border not removed — Chart.js default rectangular frame around
    the plot area is visible in both renders; setting borderColor: ''transparent''
    on the scales or chart border config would align with the style guide''s ''remove
    top/right spines'' principle'
  - Energy annotation text (13px) and tick labels (13px) are on the small end for
    mobile-scaled views; bumping to 14px for both would improve readability at 400px
    width
  - Region fill datasets (Base Load, Intermediate Load, Peak Load) are correctly omitted
    from the legend but their colors are never formally explained in the legend —
    relying entirely on the pill labels; adding a brief legend entry or keeping the
    fills with a unified label could improve standalone readability
