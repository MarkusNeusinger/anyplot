review:
  strengths:
  - Excellent semantic color assignment — green for base (always-on), ochre for intermediate,
    red for peak (critical) — with stacked area that visually maps load composition
    to capacity thresholds
  - Well-implemented plotBands and plotLines with labeled capacity tiers, region boundary
    dividers, and color-matched region labels directly on the chart
  - Total annual energy consumption (6.99 TWh) in the subtitle provides a clean quantitative
    summary of the area under the curve
  - 'Deterministic LCG (seed=42) generates reproducible 8760-point load profile; turboThreshold:
    0 prevents Highcharts from downsampling the dense dataset'
  - Both light and dark themes render correctly — transparent chart background, theme-adaptive
    ink/inkSoft tokens on all chrome elements, data colors identical between themes
  weaknesses:
  - Missing peak capacity horizontal dashed line — spec explicitly lists 'peak capacity'
    as a third capacity tier alongside base and intermediate; add a plotLine at the
    99th-percentile or maximum load (~1200 MW) labeled 'Peak capacity — ~1200 MW'
  - Annotation font sizes too small for mobile readability — capacity line labels
    are 12px CSS and region labels are 13px CSS; at 3200×1800 native resolution these
    render at 24px and 26px native pixels, which at mobile scale (400px wide) shrink
    below 3px; increase to at least 13px for capacity labels and 14px for region labels
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — PASS
      Chrome: Title "line-load-duration · javascript · highcharts · anyplot.ai" in bold dark ink at 22px, clearly readable. Subtitle "Total annual energy consumption: 6.99 TWh" in inkSoft at 14px, clearly readable. X-axis title "Hours of the Year (sorted by descending demand)" and Y-axis title "Power Demand (MW)" at 16px, readable. Tick labels at 14px, readable. Capacity line labels ("Base capacity — 600 MW", "Intermediate capacity — 900 MW") at 12px on the right side — small but legible at full resolution, borderline at mobile scale. Region labels "Peak Load" (red, 13px), "Intermediate Load" (ochre, 13px), "Base Load" (green, 13px) positioned within their respective bands.
      Data: Three stacked area bands fill the chart smoothly — base load in brand green (#009E73) at the bottom, intermediate load in ochre (#BD8233) in the middle, peak load in matte red (#AE3030) at the upper left. A near-black outline line (ink token) overlays the full load duration curve at lineWidth 1.5. Two horizontal dashed capacity lines at 600 MW (green) and 900 MW (ochre) with right-aligned labels. Two vertical dashed gray dividers at interHour (~2500) and baseHour (~7500). Legend at bottom shows three swatch entries.
      Legibility verdict: PASS — all main text elements are readable against the light background; annotation labels at 12-13px CSS are legible at full resolution but too small for mobile.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — PASS
      Chrome: Title and subtitle in light ink (#F0EFE8 equivalent), clearly readable against the dark background. Axis titles and tick labels in inkSoft tone, readable. No dark-on-dark failures on title, axis labels, or tick labels. Region labels use the same data colors as light render (red, ochre, green); the ochre "Intermediate Load" label appears slightly muted on dark but at 13px bold is still legible. No black-on-black issues.
      Data: All three stacked area colors are identical to the light render — green, ochre, red (Imprint palette, positions 1, 4, 5). The ink-colored outline line adapts correctly to near-white in dark mode. Capacity dashed lines remain in their respective data colors (green, ochre). Chrome-only elements (background, text, grid) correctly flip; data colors do not.
      Legibility verdict: PASS — both renders are readable; no dark-on-dark failures; data colors are identical between themes.
