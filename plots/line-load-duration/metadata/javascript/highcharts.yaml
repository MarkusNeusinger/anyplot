review:
  strengths:
  - 'All spec requirements implemented correctly: monotonically decreasing curve,
    shaded base/intermediate/peak regions, capacity tier markers with labels, region
    labels directly on plot, and total energy annotation in subtitle'
  - Semantic Imprint palette assignment (green=base/safe, red=peak/critical) is principled
    and follows real-world energy engineering color conventions — valid semantic exception
  - Deterministic LCG (seed=42) produces realistic load profile with seasonal variation,
    morning peak (9am), and evening peak (7pm) patterns across 8760 hours
  - 'Highcharts-specific features (plotBands with region labels, plotLines with dashStyle
    and inline labels, mixed area+line series types, turboThreshold: 0 for 8760 points)
    used idiomatically and effectively'
  - Stacked area + overlay load duration curve combination shows both region decomposition
    and total load shape simultaneously — strong compositional choice for engineering
    context
  weaknesses:
  - Region labels use same color as their respective area fills — 'Peak Load' (red
    text on red peak-load area), 'Intermediate Load' (ochre on ochre area), 'Base
    Load' (green on green area) — creating poor contrast when the label y-position
    coincides with the colored fill. Add textOutline/halo to label styles or reposition
    labels to empty space above the data curve.
  - 'The ''Intermediate Load'' label uses a hardcoded x: -260 pixel offset to shift
    it left of center — fragile magic number that may misalign if chart dimensions
    or intermediate zone width change. Prefer verticalAlign: ''middle'' or a data-relative
    anchor.'
  - 'Highcharts default axis spine lines still visible on all four sides. Removing
    top and right axis lines (xAxis.lineWidth: 0) would give a cleaner engineering-report
    aesthetic consistent with the style guide''s L-shaped frame recommendation.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white.
      Chrome: Title "line-load-duration · javascript · highcharts · anyplot.ai" in bold dark ink (22px), ~70% of chart width — readable. Subtitle "Total annual energy consumption: 6.99 TWh" in secondary ink. Y-axis label "Power Demand (MW)" in inkSoft. X-axis label "Hours of the Year (sorted by descending demand)" in inkSoft. Tick labels at 14px in inkSoft. All chrome text clearly readable against light background. Region labels (Peak Load in red, Intermediate Load in ochre, Base Load in green) are positioned on or near their respective colored fill areas, causing same-color contrast issue — visible but reduced contrast.
      Data: First series (base load) is brand green #009E73. Intermediate load is ochre #BD8233 (palette[3]). Peak load is matte red #AE3030 (palette[4]). Semantic exception valid for energy domain. Capacity tier dashed lines in matching semantic colors. Thin dark ink overlay shows the full load duration curve.
      Legibility verdict: PASS — all chrome text readable; region label same-color contrast is a design weakness (not a legibility failure).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title and all axis/tick labels rendered in light ink tokens (#F0EFE8 / #B8B7B0). No dark-on-dark text failures. All text clearly readable against dark background. Capacity line labels in their semantic colors (green/ochre/red) remain readable on dark background.
      Data: Colors IDENTICAL to light render — same brand green (#009E73), ochre (#BD8233), matte red (#AE3030). t.ink token adapts correctly (now light-colored for the overlay curve line). No theme-induced color changes to data series.
      Legibility verdict: PASS — all chrome fully readable in dark theme; same region-label contrast weakness as light render (red text on red fill, etc.) but no additional dark-mode specific failures.
