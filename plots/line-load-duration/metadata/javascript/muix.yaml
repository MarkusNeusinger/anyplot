  strengths:
  - Correct Imprint palette with brand green as base load, lavender as intermediate,
    blue as peak — canonical order maintained across both themes
  - Stacked area approach elegantly decomposes the LDC into three bands with ChartsReferenceLine
    capacity annotations
  - Deterministic power-law formula produces a realistic LDC shape; total energy footer
    annotation is a nice contextual touch
  - 'Clean code: no RNG, KISS structure, all imports used, explicit title sizing,
    correct theme tokens'
  weaknesses:
  - Three load regions labeled only via legend — spec requires labeling the regions
    directly on the plot (text annotations placed inside each area band)
  - Axis label and tick label font sizes not explicitly set — relying on MUI X ThemeProvider
    defaults instead of tickLabelStyle / labelStyle on the axes
  - No visual refinement beyond area opacity (0.85) — grid opacity and spine handling
    are left at defaults; no explicit grid customization
  - 'LM-02 under-utilized: ChartsReferenceLine and stacked areas are used but the
    implementation does not leverage MUI X slotProps for axis tick styling or custom
    mark slots that would truly differentiate from generic area charts'
