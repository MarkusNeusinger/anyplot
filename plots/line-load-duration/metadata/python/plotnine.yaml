review:
  strengths:
  - 'Semantic Imprint palette assignment is well-motivated and correctly executed:
    base load green = sustainable, intermediate ochre = earth/commodity, peak red
    = critical demand — matches domain conventions.'
  - 'Full theme-adaptive chrome: INK tokens used throughout (line color, axis labels,
    title, tick labels, annotation fills) so both renders look professional.'
  - geom_ribbon layering with long-format DataFrame is the idiomatic plotnine approach
    — avoids manual boundary management.
  - pd.Categorical with ordered=True ensures legend and fill ordering matches load
    hierarchy (Peak at top, Base Load at bottom).
  - 'All required spec features present: region shading, capacity tier lines with
    labeled boxes, direct region labels, total energy annotation.'
  weaknesses:
  - 'Region label text colors in dark mode have slightly reduced contrast: ''Base
    Load'' in #009E73 rendered on the dark-blended (~#0D4F45) ribbon surface, and
    ''Intermediate'' in #BD8233 on dark blended ochre (~#6B4A25) — both are low-contrast
    pairings. Consider adding a subtle text shadow, a very light/dark halo via annotate
    fill, or slightly increasing the text size for better legibility on dark fills.'
  - Annotation label sizes (size=3.0mm for capacity labels) are borderline at mobile
    scale (~400px wide). Consider bumping to 3.5mm to match the region label size
    (3.5mm) for consistency and better small-screen readability.
  - Legend retains a visible rectangular border (legend_background with color=INK_SOFT)
    — the style guide recommends considering removal of legend box frames. Removing
    the border or using a very subtle border would improve visual cleanliness.
