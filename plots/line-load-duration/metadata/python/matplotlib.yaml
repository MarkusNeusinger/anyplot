      Background: Warm off-white #FAF8F1 — correct.
      Chrome: Title "line-load-duration · python · matplotlib · anyplot.ai" at 12pt, clearly readable at ~65% canvas width. X-axis label "Hours of Year (ranked by load)" and Y-axis label "Power Demand (MW)" both at 10pt with units — readable. Tick labels at 8pt; x-axis formatted as "1k/2k/…/8k", y-axis as comma-formatted MW values. Legend (upper right) with three coloured patches for Peak/Intermediate/Base Load — readable. All text clearly visible against light background.
      Data: Main curve in INK (#1A1A17) at linewidth=2.5 — prominent monotonically-decreasing line. Three shaded fill regions: peak (pink-red, alpha=0.18), intermediate (pale amber, alpha=0.22), base (pale blue, alpha=0.18). Capacity dashed lines at 950/600/400 MW with labels. Direct region labels (PEAK LOAD, INTERMEDIATE LOAD, BASE LOAD) in respective colors with path-effect stroke haloes. Annotated "Total Energy 6,052 GWh/year" box with curved arrow. "Peak: 1,200 MW" callout in red.
      Legibility verdict: PASS — all text readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title, axis labels, tick labels rendered in light INK (#F0EFE8 / #B8B7B0 / #A8A79F) — all text readable against the dark background. No dark-on-dark failures observed; path_effects halo on labels maintains readability. Legend box uses ELEVATED_BG (#242420) with INK_SOFT edge and INK_SOFT label text — readable.
      Data: Main curve rendered in #F0EFE8 (near-white) — very prominent against the dark background. Data colors (Imprint palette) are identical to light render (COLOR_PEAK, COLOR_INTER, COLOR_BASE unchanged). However, fill regions at alpha=0.18-0.22 on the dark background appear very dark and desaturated: peak region is dark brownish-maroon, intermediate is dull olive-brown, base load is dark slate-navy. The region fills are distinguishable but lack visual punch — this is the main design weakness in the dark theme.
      Legibility verdict: PASS for text readability. Weakness: fill region visibility significantly degraded in dark theme.
