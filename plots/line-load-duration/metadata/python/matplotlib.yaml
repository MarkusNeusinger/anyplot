review:
  strengths:
  - 'Semantically correct Imprint palette use: matte-red for peak (critical), amber
    for intermediate (caution), blue for base (stable) — exactly matching the semantic-exception
    rule for real-world color expectations'
  - matplotlib.patheffects.withStroke applied to every label prevents readability
    failures where text crosses the curve or fill regions
  - 'All spec-required features present: monotonically decreasing curve, three shaded
    regions, capacity tier dashed lines with labels, direct region labels, total energy
    annotation, and peak callout'
  - Staggered x-positions for capacity tier labels cleanly avoids crowding along the
    y-axis
  - Title fontsize correctly computed from title length, canvas is exactly 3200×1800
    (no bbox_inches='tight'), all font sizes explicitly set
  weaknesses:
  - 'Dark theme fill regions lose visual impact: alpha=0.18 on COLOR_PEAK (#AE3030)
    and alpha=0.18 on COLOR_BASE (#4467A3) on the #1A1A17 background produces very
    dark, near-invisible desaturated fills. The intermediate amber (#DDCC77) at alpha=0.22
    turns into a dull dark olive. Increase alpha to ~0.30–0.35 in dark theme, or add
    a theme branch to boost fill alpha when THEME == ''dark''.'
  - BASE LOAD region label (x~6630h, y~520 MW) sits on or very near the descending
    curve at that position — the stroke path_effect masks it but the label still visually
    competes with the main line. Shift the label lower (y~460 MW) and slightly right
    to clear the curve.
  - Tier labels at fontsize=7 are the smallest text on the canvas; they are functional
    with the stroke effect but borderline on mobile-scaled views. Raise to fontsize=8
    to match other annotation text.
