    filled from 0 upward so they stack/overlap; the peak region (green) is barely
    visible in the leftmost slice and the transition boundaries are ambiguous — consider
    clipping each fill to its own [0,peak_end], [peak_end,base_start], [base_start,8760]
    horizontal range or use a single filled curve with background colour zones'
  - 'DE-01/DE-02: adequate but not sophisticated — no spine removal (pygal limitation),
    capacity lines blend into the filled background, chart frame is fully visible,
    overall look is a competent pygal default rather than a polished engineering chart'
