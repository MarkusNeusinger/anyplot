  - No ANYPLOT_THEME environment variable reading — no theme adaptation at all
  - 'Background hardcoded to pure white #ffffff instead of theme-adaptive #FAF8F1/#1A1A17'
  - Output saved as plot.png/plot.html instead of plot-{THEME}.png/plot-{THEME}.html
  - Title string contains pyplots.ai instead of anyplot.ai
  - Some data label crowding on the left side where values cluster in 60-120 range
