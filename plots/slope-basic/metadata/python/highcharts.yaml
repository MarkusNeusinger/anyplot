  - Direction-coded coloring (increase vs decrease) aids data storytelling
  - Realistic neutral product sales scenario with good feature coverage (both rising
    and falling trajectories)
  - Clean KISS code structure with idiomatic Highcharts-core API usage
  weaknesses:
