review:
  strengths:
  - 'Complete spec compliance - all required features implemented: histogram with
    density normalization, normal distribution overlay, tail region highlighting (orange
    bars beyond ±2σ), stats text box with mean/std/skewness/kurtosis, dashed ±2σ boundary
    lines'
  - Excellent tail highlighting using per-bar recoloring loop (single histplot call
    preserves density normalization integrity — comment correctly explains why two-call
    approach is avoided)
  - Proper dual-overlay with seaborn-native kdeplot + scipy normal fit curve, clearly
    distinguishable via dotted vs solid linestyle
  - 'Perfect theme-adaptive chrome in both renders: correct PAGE_BG/INK/INK_SOFT tokens
    threaded through all axes, legend, and stats box elements'
  - 'Clean code: seed=42, no functions/classes, only used imports, consistent dpi=400
    without bbox_inches=tight'
  weaknesses:
  - Stats annotation text at fontsize=7 is below the recommended minimum 8pt (tick
    label baseline); at mobile display width (~400px) the stats box text becomes borderline
    unreadable — raise to fontsize=8
  - Legend handles list in code is [center_patch, tail_patch, kde_line, normal_line]
    but the rendered legend shows KDE/Normal-fit lines first, then bar patches — the
    displayed order does not match the specified handles order, likely a seaborn rc
    interaction; reorder handles to put the primary data patches (Returns ±2σ, Tail
    regions) first so the legend reads top-to-bottom in data-importance order
  - Legend frameon=False is overridden by the sns.set_theme rc params (legend.facecolor
    / legend.edgecolor), causing a visible frame to appear despite the explicit call
    — either remove the legend.facecolor/edgecolor from rc or use ax.get_legend().get_frame().set_visible(False)
    after the legend call to enforce the intent
