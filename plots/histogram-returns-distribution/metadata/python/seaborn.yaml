review:
  strengths:
  - Correct Okabe-Ito color order with brand green (#009E73) as the first histogram
    series and orange (#D55E00) for tail regions
  - Both light and dark themes fully implemented with all chrome tokens (backgrounds,
    ink, ink_soft, elevated_bg) — zero dark-on-dark or light-on-light legibility failures
  - Multi-layer composition (histogram + empirical KDE + fitted normal curve + reference
    lines + stats callout) satisfies all spec requirements in a single clean plot
  - Empirical KDE via sns.kdeplot is a genuine seaborn-native addition that adds analytical
    value beyond the spec
  - Reproducible with np.random.seed(42) and correct canvas dimensions (3200x1800
    px, no bbox_inches drift)
  weaknesses:
  - 'Independent stat=''density'' normalization for center and tail histplot subsets
    makes densities non-comparable: ~14 tail observations normalized to their own
    density produce spikes reaching ~0.78 while the ~490 center observations peak
    at ~0.30 — the tail appears 2.5x denser than it actually is relative to the full
    distribution. Fix: use a single sns.histplot call with a hue array so both groups
    share one density normalization.'
  - Legend ordering lists 'Empirical KDE' and 'Normal fit' before 'Returns (±2σ)'
    and 'Tail regions (>2σ)' — primary data (the histogram bars) should lead the legend
    for clearer reading order.
  - Design is functional but not particularly polished — the stats box uses INK for
    all text rather than a hierarchy (header in INK, values in INK_SOFT), and the
    legend box frame could be removed for a cleaner look with frameon=False.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface
      Chrome: Title "histogram-returns-distribution · python · seaborn · anyplot.ai" in dark ink, clearly readable. Axis labels "Daily Returns (%)" and "Density" in dark ink at 10pt. Tick labels at 8pt, all readable. Stats box upper right with rounded corners and elevated background (#FFFDF6) — legible. Legend at lower left with frame and elevated background.
      Data: First histogram series (center, ±2σ) in #009E73 (teal green); tail bars in #D55E00 (orange); empirical KDE dotted line in #009E73; normal fit solid line in #0072B2 (blue). Dashed vertical lines at ±2σ boundaries in INK_SOFT.
      Visual note: Two independent histplot calls with stat='density' cause tail bars (from ~14 obs) to normalize separately, producing orange spikes reaching ~0.78 density while center bars peak at ~0.30 — disproportionately tall and misleading relative to actual distribution proportions.
      Legibility verdict: PASS — all text readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title, axis labels, tick labels rendered in light ink (#F0EFE8 / #B8B7B0) — all clearly readable against dark background. Stats box uses elevated dark background (#242420) with light text. Legend uses elevated dark background. No dark-on-dark failures detected.
      Data: Data colors are identical to light render — #009E73 (teal green), #D55E00 (orange), #0072B2 (blue). Only chrome (backgrounds, text, grid) flips between themes. Okabe-Ito positions 1-3 unchanged.
      Legibility verdict: PASS — all text readable against warm near-black background; brand green #009E73 visible and distinct
