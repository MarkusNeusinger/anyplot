review:
  strengths:
  - 'Correct two-color histogram with tail highlighting (#009E73 normal, #D55E00 tail)
    using Okabe-Ito palette in canonical order'
  - BoxAnnotation tail shading clearly delineates ±2σ regions and reinforces the tail
    narrative
  - Normal distribution overlay (#0072B2, line_width=5) is thick and clearly visible
    against the histogram
  - Stats label (mean, std dev, skewness, kurtosis) is well-styled with elevated background
    and border
  - HoverTool provides bin-range and density on hover — genuine bokeh interactivity
  - 'Full theme-adaptive chrome: backgrounds, text, grid, legend all adapt correctly
    in both renders'
  - All font sizes explicitly set (50pt title, 42pt axis labels, 34pt ticks/legend)
    at correct proportions
  - Reproducible with np.random.seed(42); 252 observations is realistic daily-return
    sample
  - Correct Selenium+HTML output pattern per bokeh.md; both .html and .png artifacts
    produced
  weaknesses:
  - Stats label (x=90, y=90, screen units, lower-left) overlaps with the orange tail
    bars in that corner — shift it to top-left or upper portion of the plot where
    density is low
  - X-axis grid lines (xgrid) are unnecessary for a histogram and add visual noise
    — remove xgrid or set xgrid.grid_line_color=None; keep only ygrid
  - All four plot spines remain (outline_line_color = INK_SOFT draws a full box) —
    remove top and right spines to get an L-shaped frame more consistent with the
    style guide
  - 'DE-01 opportunity: the legend frame uses a border box (style guide recommends
    removing legend box frames for cleaner look); removing border_line_color would
    add polish'
