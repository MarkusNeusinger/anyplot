review:
  strengths:
  - Correct Okabe-Ito palette with green body (#009E73), orange tails (#D55E00), blue
    curve (#0072B2) in canonical order
  - Tail highlighting beyond ±2σ clearly communicates extreme events risk
  - Stats displayed in subtitle (mean, std, skewness, kurtosis) provide immediate
    quantitative context
  - Both themes fully readable — light and dark chrome adapts correctly
  - Clean KISS code structure with proper random seed and font sizes explicitly set
  - Dual output (HTML + PNG) leverages pygal interactive capability
  weaknesses:
  - Use pygal.Histogram() chart type instead of pygal.XY() with box-polygon simulation
    — pygal.Histogram(data=[(value, x_min, x_max)]) is the idiomatic API for histograms
    and avoids stroke artifacts between adjacent bars
  - 'Bar outlines (stroke=True on XY chart) create visible dark separator lines between
    adjacent bars in the dark render — switch to pygal.Histogram() or set stroke=False
    and stroke_style={"width": 0} on bar series'
  - 'DE-01: Polish needed — remove top/right spine lines (pygal uses border options),
    soften grid further, add more intentional whitespace; the current styling is well-configured
    but still looks like a default'
  - 'DE-02: Dashed grid lines are somewhat prominent; the y-guides could be more subtle;
    consider show_y_guides=False or style opacity adjustments'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Two-line title ("histogram-returns-distribution · python · pygal · anyplot.ai" + stats row) in dark ink, both lines fully readable. Y-axis label "Probability Density" in dark ink, readable. X-axis label "Returns (%)" in dark ink with percent unit, readable. Tick labels on both axes in INK_MUTED tone, all digits visible with no clipping. Bottom legend (3 columns) fully legible.
      Data: Main histogram bars in #009E73 (brand green) for returns within 2σ. Tail bars in #D55E00 (orange/vermillion) at both extreme ends. Normal distribution overlay in #0072B2 (blue) as thin curve. Dashed horizontal y-guides visible but not dominant. Bar stroke separators visible between adjacent bars.
      Legibility verdict: PASS — all text readable on warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface.
      Chrome: Same two-line title in light/near-white text, fully readable. Y-axis and X-axis labels in light text, readable. Tick labels in light tone on all axes, all digits visible. Bottom legend text in light color, readable. No dark-on-dark failures observed.
      Data: Colors identical to light render — green body bars (#009E73), orange tail bars (#D55E00), blue normal curve (#0072B2). Bar stroke separators create slightly more visible dark lines between adjacent green bars in dark mode due to the XY box-polygon approach, but bars remain clearly distinguishable.
      Legibility verdict: PASS — all text readable on near-black background; data colors unchanged from light render.
