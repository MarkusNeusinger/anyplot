review:
  strengths:
  - Correct use of pygal.Histogram native (value, xmin, xmax) tuple API for all three
    series
  - Two-tone histogram (green within 2σ, orange tails) creates immediate visual storytelling
    about tail risk
  - Normal distribution overlay cleverly approximated via 300 thin adjacent bins,
    rendering as a smooth bell curve
  - All style-guide font sizes explicitly set (title=66, label=56, major_label=44,
    legend=44)
  - Full theme-adaptive chrome — background, ink, and muted tokens all correctly derived
    from ANYPLOT_THEME
  - HTML + PNG dual output as required for pygal (interactive library)
  - Seed set for reproducibility; clean KISS structure with no functions or classes
  - Statistics (mean, std, skew, kurtosis) surfaced in subtitle for quick interpretation
  weaknesses:
  - Statistics displayed in title subtitle rather than a dedicated on-chart text box
    as the spec requires — pygal limitation but spec compliance is partial
  - Normal distribution curve rendered as 300 thin histogram bins may show faint stair-step
    artifacts at high zoom; a true line overlay would be more precise, though the
    visual result is acceptable
  - Grid completely absent — a subtle y-axis-only grid would aid density readability
    without competing with data
  - Design Excellence ceiling limited by pygal built-in chrome (chart frame cannot
    be removed); no distinctive typography hierarchy beyond the style-guide defaults
