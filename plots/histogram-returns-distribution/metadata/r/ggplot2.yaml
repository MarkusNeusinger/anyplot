review:
  strengths:
  - Per-bin tail coloring via pre-computed histogram data frame is the correct and
    sophisticated approach in ggplot2
  - 'Complete spec compliance: all six required features present (normal curve, stats
    box, tail highlighting, ±2σ lines, density normalization, percentage x-axis)'
  - 'Excellent data quality: 504-point diversified equity dataset with realistic volatility
    parameters and explicit fat-tail simulation'
  - Both themes render correctly with proper chrome adaptation — no dark-on-dark failures
  weaknesses:
  - library(scales) is imported but never used; remove it
  - Stats annotation text size=3.2 is slightly small; increase to 3.8–4.0 for better
    mobile readability
  - Legend box border (INK_SOFT) adds minor visual noise; consider removing the border
    with legend.background = element_rect(fill = ELEVATED_BG, color = NA, linewidth
    = 0)
  - DE-01 limited by default theme_minimal aesthetics; removing the legend border
    and adding typographic weight to the title would push closer to publication quality
