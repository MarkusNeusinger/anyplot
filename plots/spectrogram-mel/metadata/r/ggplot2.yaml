review:
  strengths:
  - Full STFT and mel filterbank implemented in pure R without librosa — impressive
    DSP fidelity with no external audio dependencies
  - 'imprint_seq colormap (#009E73 → #4467A3) correctly applied to continuous intensity
    data per style guide rules'
  - Complete theme-adaptive chrome with all tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) properly flipped between themes
  - Meaningful annotations (1 kHz boundary with region labels Fundamentals/Overtones,
    note onset markers) guide interpretation
  - 'Perfect spec compliance: dB scale, mel filterbank, colorbar labeled in dB, Hz-labeled
    y-axis, time x-axis'
  - Clean reproducible code with set.seed(42), no classes or unnecessary wrappers,
    modern linewidth= API
  weaknesses:
  - 'Annotation text at size=2.3 mm is slightly small; ''Fundamentals'' in light render
    has marginal contrast against teal tiles (#6B6A63 on #009E73 background) — raise
    to size=2.8–3.0 and use INK_SOFT instead of INK_MUTED for annotations overlaying
    colored tiles'
  - Spectrogram dynamic range dominated by narrow energy band; data storytelling limited
    — consider tightening colorbar floor from -80 dB to -60 dB to enhance contrast
    in the meaningful energy region, or add a second annotated frequency boundary
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "spectrogram-mel · r · ggplot2 · anyplot.ai" bold dark ink, ~70% plot width. Subtitle readable. Axis labels "Time (s)" and "Frequency (Hz)" in dark ink. Tick labels (100 Hz–8k Hz, 0–3 s) in INK_SOFT (#4A4A44). All readable.
      Data: imprint_seq colormap (green #009E73 low → blue #4467A3 high) fills heatmap tiles. Dashed 1 kHz boundary line and dotted onset markers visible. "Fundamentals" and "Overtones" annotations present but subtle (INK_MUTED #6B6A63 on teal tiles). "1 kHz" label near right edge readable.
