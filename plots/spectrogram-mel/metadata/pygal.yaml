review:
  strengths:
  - Perfect spec compliance with all mel-spectrogram requirements including dB scale,
    mel-scaled Hz labels, colorbar, and correct STFT parameters
  - Excellent data quality with C-major arpeggio showing fundamentals, harmonics,
    and exponential decay envelopes
  - Note annotations with circle markers and text shadows provide effective data storytelling
  - Custom inferno colormap with 19-color interpolation and excellent colorblind accessibility
  - Manual mel filterbank computation avoids external librosa dependency
  - 'Improved from previous attempts: helper functions inlined, annotation size increased'
  weaknesses:
  - sys.path manipulation hack for import collision remains fragile and inelegant
  - Custom class structure necessary but breaks KISS principle
  - Manual SVG rendering is verbose though functional for pygal extensibility model
  - Margins could be slightly tightened for better canvas utilization
  image_description: The plot displays a mel-spectrogram of a synthesized C-major
    arpeggio (C4→E4→G4→C5→G4→E4) over 3 seconds using the inferno colormap, ranging
    from dark black/purple (low power, -80 dB) through orange to bright yellow (high
    power, 0 dB). The title "spectrogram-mel · pygal · pyplots.ai" is centered at
    the top in a clean sans-serif font. The x-axis is labeled "Time (s)" from 0.0
    to 3.0 with evenly spaced tick marks. The y-axis is labeled "Frequency (Hz)" with
    mel-scaled tick marks at 100, 200, 500, 1.0k, 2.0k, 4.0k, and 8.0k Hz. Six distinct
    note segments are visible as bright horizontal bands at their fundamental frequencies
    and 2nd/3rd harmonics, each with exponential decay envelopes. White circle markers
    with text shadow labels (C4, E4, G4, C5, G4, E4) annotate each note onset near
    its fundamental frequency. A vertical colorbar on the right labeled "dB" shows
    the scale from 0 to -80. The background noise floor is visible as a consistent
    purple layer. The overall layout is clean with a dark border around the spectrogram
    area, white background, and good use of canvas space.
