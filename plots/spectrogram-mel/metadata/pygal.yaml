  - Annotation text labels could be slightly larger for better visibility
  - Some wasted vertical space above 4kHz where signal energy is minimal
  image_description: The plot displays a mel-spectrogram of a synthesized C-major
    arpeggio (C4→E4→G4→C5→G4→E4) over 3 seconds. The inferno colormap ranges from
    dark black/purple (low power, -80 dB) through orange to bright yellow (high power,
    0 dB). The x-axis shows "Time (s)" from 0.0 to 3.0, and the y-axis shows "Frequency
    (Hz)" with mel-scaled labels at 100, 200, 500, 1.0k, 2.0k, 4.0k, and 8.0k Hz.
    Six note segments are clearly visible with bright horizontal bands at fundamental
    frequencies and their 2nd/3rd harmonics, each decaying exponentially. Circle markers
    with white text labels (C4, E4, G4, C5, G4, E4) annotate each note onset. A colorbar
    on the right labeled "dB" shows the scale from -80 to 0. The title reads "spectrogram-mel
    · pygal · pyplots.ai". The background noise floor is visible as a consistent purple
    layer. Overall layout is clean with good proportions.
