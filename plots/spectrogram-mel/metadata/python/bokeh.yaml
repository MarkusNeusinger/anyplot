review:
  strengths:
  - Mel filterbank computed from scratch (triangular filters) without librosa dependency,
    demonstrating deep signal processing knowledge
  - Correct imprint_seq colormap applied to continuous power data, with theme-adaptive
    chrome throughout both renders
  - 'Annotations narrate the C major arpeggio story: BoxAnnotation region, italic
    labels, C4/C5 Span guides, and Hz ticks at perceptually meaningful frequencies'
  - HoverTool provides time/dB readout in the HTML artifact, a genuine Bokeh interactive
    advantage
  - CDP-based Selenium screenshot + PIL canvas-pinning ensures exact 3200x1800 output
    dimensions
  weaknesses:
  - Colorbar tick labels (22pt) and inner annotation labels (22pt) are below the canonical
    34pt tick size; at mobile widths these may be harder to read — raise colorbar
    major_label_text_font_size to 28pt and annotation text_font_size to 26pt
  - 'The imprint_seq green-to-blue direction maps low energy to bright green and high
    energy to darker blue, which is counter-intuitive for spectrograms (traditional:
    dark=silence, bright=signal); consider reversing the palette stops so the silence
    floor is dark blue and active notes are bright green'
  - DE-02 could be elevated by adding a subtle separation between the colorbar and
    the spectrogram edge
