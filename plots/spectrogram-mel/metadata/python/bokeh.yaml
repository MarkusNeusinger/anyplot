review:
  strengths:
  - 'Excellent spec compliance: mel filterbank computed from scratch, correct STFT
    parameters (n_fft=2048, hop_length=512, n_mels=128), dB scale, all required Hz
    tick labels at mel band edges, colorbar labeled in dB'
  - 'Strong data storytelling: arpeggio annotations, dashed section separator, C4/C5
    horizontal reference lines create a clear musical narrative with immediate readability'
  - 'Expert Bokeh library usage: HoverTool with spectrogram pixel value readout (@image
    dB format), major_label_overrides for Hz axis labels, BoxAnnotation and Span for
    annotations — idiomatic and distinctive'
  - Correct canvas sizing (3200x1800) with proper min_border reservations and CDP
    setDeviceMetricsOverride for exact PNG dimensions
  - 'Realistic, correctly-parameterized synthesized audio: correct musical note frequencies
    (C4=261.63 Hz, E4=329.63 Hz, etc.), harmonic overtones with attack/release envelopes,
    background noise'
  weaknesses:
  - 'Non-Imprint continuous colormap: Magma256 (a Bokeh named palette) is used instead
    of the required imprint_seq. The bokeh.md guide and style guide explicitly forbid
    all Bokeh named palettes for continuous data. Replace with: ANYPLOT_SEQ256 = [_lerp_hex(''#009E73'',
    ''#4467A3'', t/255.0) for t in range(256)] and pass to LinearColorMapper(palette=ANYPLOT_SEQ256,
    low=vmin, high=vmax)'
  - 'ColorBar background not theme-adaptive: color_bar.background_fill_color was not
    set, defaulting to white in the dark render — creates a jarring white rectangle
    on the dark background. Fix: add background_fill_color=PAGE_BG and background_fill_alpha=1.0
    to the ColorBar constructor'
  - 'Colorbar tick label contrast in dark mode: INK_SOFT (#B8B7B0) on white colorbar
    background gives very low contrast for the dB tick values. Once background is
    fixed to PAGE_BG (#1A1A17), contrast will be correct'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) border with dark spectrogram interior (#000004 matching Magma minimum)
      Chrome: Title "spectrogram-mel · python · bokeh · anyplot.ai" bold dark ink, clearly readable. Y-axis label "Frequency (Hz)" and X-axis label "Time (seconds)" in dark ink, readable. Tick labels (50 Hz to 8000 Hz on Y; 0-4s on X) in INK_SOFT, readable. Colorbar "Power (dB)" title and tick values (-20 to -60 dB) readable against light colorbar background.
      Data: Magma colormap from dark purple (low power) through orange-red to bright yellow (high power). Harmonic bands of C-major melody visible as horizontal bright streaks. White italic annotations label arpeggio and descending sections. Dashed vertical separator at ~2.5s. Dotted C4/C5 reference lines.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) border with dark spectrogram interior (#000004)
      Chrome: Title and axis labels appear in light-colored text against dark border — readable. Main plot tick labels readable. CRITICAL FAILURE: The ColorBar widget background_fill_color was not set to PAGE_BG, defaulting to white — the colorbar area on the right side has a white background against the dark page. Colorbar tick labels are INK_SOFT (#B8B7B0, light gray) on this white background — very low contrast, barely readable.
      Data: Spectrogram colors identical to light render (Magma colormap unchanged — this is correct for data colors even though the colormap itself is non-compliant with Imprint rules).
      Legibility verdict: FAIL — colorbar tick labels (-20 to -60 dB) have very low contrast (light gray on white background) due to missing color_bar.background_fill_color = PAGE_BG setting
