review:
  strengths:
  - Clean vectorized mel filterbank implementation without librosa dependency — all
    DSP computed from scratch using scipy.signal.stft and numpy matrix ops
  - 'Multi-layer grammar-of-graphics composition: geom_raster heatmap + ochre spectral
    peak trajectory + cyan F₀ reference line, each with correctly isolated inherit_aes=False'
  - 'Theme-adaptive Imprint colormap (PAGE_BG → #009E73 → #4467A3) gives seamless
    silence-to-energy gradient that adapts correctly to both light and dark surfaces'
  - 'Full spec compliance: dB scale, mel y-axis with Hz labels, colorbar labeled in
    dB, synthesized realistic audio with harmonics and percussion bursts, all parameters
    at recommended values'
  weaknesses:
  - Spectral peak trajectory (ochre line, size=0.9, alpha=0.65) is thin and partially
    translucent against the green-blue heatmap; increase to size=1.2 and alpha=0.8
    so it reads more clearly, especially at mobile scale
  - F₀ annotation geom_text size=3.5mm (≈10pt) is on the small side for a 3200×1800
    canvas viewed on mobile; increase to size=4.0 for better readability
  - Colorbar bottom in dark render (−1A1A17 stop) blends with the near-black legend
    background, making the −60 dB tick visually ambiguous; consider adding a subtle
    legend_background=element_rect(fill=ELEVATED_BG) to give the colorbar swatch contrast
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface, not pure white.
      Chrome: Title "spectrogram-mel · python · plotnine · anyplot.ai" in dark ink, bold, centred — fully readable. Y-axis label "Frequency (Hz)" and X-axis label "Time (s)" in dark ink, clear. Tick labels (128–8000 Hz, 0–3 s) in INK_SOFT dark-grey, clearly legible. Colorbar legend title "Power (dB)" and tick values (0, −20, −40, −60) visible on the right.
      Data: Mel-spectrogram rendered as a teal-green-to-blue heatmap from PAGE_BG (silence) through #009E73 (brand green, mid-energy) to #4467A3 (blue, peak energy). Six rhythmic burst events visible as vertical brightening columns at ~0.3 s intervals. Ochre (#BD8233) spectral peak trajectory line overlaid near the 256–512 Hz band, showing spikes at burst events. Cyan (#2ABCCD) dashed F₀ reference line horizontal at ~330 Hz band. Small "F₀ = 330 Hz" annotation in INK_SOFT just above the reference line.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface, not pure black.
      Chrome: Title in light cream (#F0EFE8), clearly visible against dark background. Axis labels and tick labels in INK_SOFT light grey (#B8B7B0) — all readable. Colorbar title and ticks visible in light text. No dark-on-dark text failures observed.
      Data: Heatmap data colors are identical to light render — same green-blue gradient emerges from the dark surface. The #1A1A17 start of the colormap seamlessly blends silence with the background (intentional design choice). Ochre peak trajectory and cyan F₀ reference line identically positioned and colored as in the light render.
      Legibility verdict: PASS — all text readable against the near-black background with theme-adaptive INK_SOFT tokens correctly applied. The lowest colorbar swatch (−60 dB = #1A1A17) blends slightly with the dark legend area — minor visual ambiguity but not a legibility failure.
