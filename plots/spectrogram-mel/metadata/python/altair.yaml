  strengths:
  - Manual STFT and mel filterbank implementation without librosa dependency — demonstrates
    genuine DSP knowledge and makes the code fully self-contained
  - 'Correct Imprint sequential colormap (#009E73 → #4467A3) applied to continuous
    dB data as required by style guide'
  - 'Perfect spec compliance: all required parameters (n_fft=2048, hop_length=512,
    n_mels=128), log frequency axis, dB-normalized colorbar, Hz tick labels at key
    mel band edges'
  - Theme-adaptive chrome properly applied to all axis, title, legend, and view elements
    using INK/INK_SOFT/PAGE_BG tokens
  - Three annotation features (Harmonic Sweep, Chirp Burst, 440 Hz Tone) guide the
    viewer through distinct spectral events
  - Canvas padding logic (PIL) ensures exact 3200×1800 output regardless of vl-convert
    minor variation
  - 'Idiomatic Altair: mark_rect with x/x2/y/y2 encoding for tiles, alt.layer composition,
    labelExpr for custom k-notation tick formatting, HTML export with tooltips'
  weaknesses:
  - 'Annotation label colors are hardcoded (#ffffff for text, #1a1a2e for stroke)
    rather than using theme-adaptive INK/INK_SOFT tokens — violates the style guide
    rule that every non-data element must use adaptive tokens; in practice both renders
    are readable because annotations sit on teal data, but a theme-change could break
    this'
  - 'VQ-03 (Element Visibility): The spectrogram is dominated by a uniform teal/cyan
    mid-range color; the dynamic range from -80 to 0 dB compresses most content into
    the -40 to -20 dB region, making the lower-power noise floor and the higher-power
    harmonics harder to distinguish — consider clamping the domain to a tighter range
    (e.g., -60 to 0) to increase visible contrast'
  - 'DE-01: The overall aesthetic is clean and functional but not publication-ready
    — the chart lacks any focal-point emphasis beyond the annotation labels; consider
    adding a very subtle horizontal reference line at 440 Hz or boosting the annotation
    triangle marker size for stronger visual anchoring'
  - 'LM-02: The implementation uses standard Altair patterns (mark_rect, layer, configure_*);
    labelExpr is the most distinctive Altair-specific feature used — deeper Vega-Lite
    features (selection-based brushing, resolve, transform_fold) could lift library
    mastery higher in a future attempt'
