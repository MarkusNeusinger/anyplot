      Data: Mel-spectrogram as tiled rectangles. Three annotated spectral events visible: diagonal descending bands from the harmonic frequency sweep (~1200–300 Hz), a short-duration high-frequency burst at 1.5–2.5 s (Chirp Burst), and a subtle pulsed feature near 440 Hz. Annotation triangle markers and labels (white text, dark stroke) are positioned correctly and readable against the teal data background.
