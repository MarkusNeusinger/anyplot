review:
  strengths:
  - Sophisticated three-panel layout (waveform + mel-spectrogram + KDE) tells a coherent
    audio analysis story
  - Fully vectorized mel filterbank implementation with numpy broadcasting — no nested
    Python loops
  - Scientifically rigorous IPA vowel synthesis with realistic formant frequencies
  - Correct theme-adaptive chrome (INK, INK_SOFT, PAGE_BG tokens) applied throughout
    all panels and colorbar
  - Idiomatic seaborn usage across all three panel types (lineplot, heatmap, kdeplot)
  - Harmonic annotations (F0/2F0/3F0) on the spectrogram add genuine scientific insight
  - Custom Imprint-derived colormap correctly used for the spectrogram intensity scale
  weaknesses:
  - 'KDE panel: /o/ (#BD8233 ochre) and /u/ (#AE3030 red) distributions are barely
    visible — both have similar amplitude profiles to /a/ and are masked by the dominant
    green distribution; increase linewidth or reduce fill alpha to improve differentiation'
  - imprint_seq colormap is reversed from the canonical definition (blue→green instead
    of green→blue); while intuitive for a spectrogram, it deviates from the style-guide
    spec
  - Waveform IPA vowel labels and harmonic annotations (F0/2F0/3F0) use 7pt fontsize
    — borderline small for a 3200×1800 canvas and may be nearly illegible when scaled
    to mobile (~400px width)
  - 'DE-01/DE-02: Colorbar placement pushes slightly into the right margin; consider
    tighter integration with the spectrogram panel for cleaner layout'
