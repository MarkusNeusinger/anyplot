review:
  strengths:
  - 'Exemplary spec compliance: all required features present including manual mel
    filterbank, dB conversion, Hz-labeled frequency axis, and synthesized audio'
  - Strong dual-panel design with waveform + spectrogram connected by segment boundary
    lines and IPA vowel labels — tells a clear acoustic story
  - 'Perfect palette compliance: imprint_seq correctly used for continuous spectrogram
    data, full theme-adaptive chrome in both renders'
  - Scientifically accurate IPA vowel formant frequencies produce realistic spectral
    patterns that differentiate vowels clearly
  - Harmonic annotations (F0/2F0/3F0) add meaningful acoustic interpretation
  weaknesses:
  - Waveform panel tick labels (6pt) and y-label (8pt) are on the small side; increase
    waveform tick labels to 7-8pt and Amp. label to 9-10pt for better mobile readability
  - imprint_seq (green to blue) has limited luminance variation, reducing perceptual
    contrast in the spectrogram; consider reversing colormap direction (blue to green
    so high energy = green) or tuning vmin/vmax to spread the color range more dynamically
    within -60 to 0 dB
  - Mel filterbank loops are nested Python loops (O(n_mels x n_fft)); replace with
    numpy vectorized operations using np.arange broadcasting or np.linspace slicing
    instead of the double for-loop over bins
  - The implementation does not leverage seaborn statistical differentiation — consider
    adding a kde or violin subplot showing the amplitude distribution per vowel to
    showcase seaborn unique capabilities
