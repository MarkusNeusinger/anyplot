      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "spectrogram-mel · python · seaborn · anyplot.ai" clearly readable in dark ink. Axis labels "Frequency (Hz)" and "Time (s)" readable at 10pt. Tick labels (100, 200, 500, 1k, 2k, 4k, 8k Hz; 0.0–4.0 s) readable at 8pt. Colorbar "Power (dB)" label readable. KDE axis labels ("Amplitude", "Density") readable at 9pt. Legend text at 7pt is small but legible.
      Data: Spectrogram shows blue (#4467A3) for low-energy regions transitioning to brand green (#009E73) for high-energy formant bands. Six distinct horizontal formant bands visible across the 4-second vowel sequence. Waveform in brand green with subtle fill. KDE /a/ (green) dominant; /e/ (purple) partially visible; /i/ (blue) partially visible; /o/ (ochre) and /u/ (red) barely distinguishable.
      Legibility verdict: PASS — all primary text readable; minor concern with 7pt annotation labels

