review:
  strengths:
  - Mel filter bank implemented entirely in numpy without scipy/librosa -- clean,
    dependency-free signal processing
  - 'Full spec compliance: all required parameters (n_fft=2048, hop_length=512, n_mels=128),
    dB scale, Hz labels at key band edges'
  - Musical note annotations (C4/E4/G4/C5) add genuine data storytelling -- viewer
    immediately understands the melody structure
  - 'Correct imprint_seq colormap (#009E73 to #4467A3) for sequential power data'
  - Theme-adaptive chrome correctly threads all six tokens through every visual element
    in both renders
  weaknesses:
  - Colorbar tick label rendering at small display sizes is slightly compact -- legend_text
    size=10 is at the minimum; size=11 would improve readability at mobile widths
  - Axis spines still visible; for a heatmap/spectrogram, removing all four spines
    (axis_line=element_blank()) would be cleaner and more refined
  - 'LM-02 has room to grow: could leverage letsplot-native features more (e.g. theme
    flavor presets, custom legend key sizing)'
