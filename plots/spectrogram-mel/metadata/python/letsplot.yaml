review:
  strengths:
  - Perfect spec compliance — mel-spectrogram with correct n_fft=2048, hop_length=512,
    n_mels=128, dB conversion, mel-scale y-axis with Hz tick labels, and a labeled
    dB colorbar, all implemented via pure numpy without external audio libraries
  - Excellent synthesized data quality — C major arpeggio (C4, E4, G4, C5) with vibrato,
    harmonics, and bell-shaped amplitude envelope produces a musically realistic mel
    spectrogram that clearly shows the harmonic series structure
  - Theme-adaptive chrome fully correct — both light (#FAF8F1) and dark (#1A1A17)
    backgrounds implemented, all text tokens (INK, INK_SOFT) thread through title,
    axis labels, tick labels, and legend; no dark-on-dark or light-on-light failures
  - 'Palette compliance — imprint_seq gradient (#009E73 → #4467A3) correctly applied
    to the single-polarity continuous dB data; this is the prescribed approach for
    heatmaps'
  - Note annotations (C4, E4, G4, C5) add meaningful musical context and create a
    clear focal point guiding the viewer through the arpeggio sequence
  - Interactive letsplot features well-leveraged — layer_tooltips with formatted time/frequency/power
    display and HTML export are genuinely distinctive to lets-plot
  - Clean code — KISS structure, seed set (np.random.seed(42)), all imports used,
    no over-engineering
  weaknesses:
  - 'DE-01/DE-03 moderate: The upper ~55% of the frequency axis (roughly 2k–10k Hz)
    is an almost uniform teal noise floor with very little musical content, making
    roughly half the canvas visually monotonous. Consider clamping the displayed y-range
    to 0–4000 Hz (or 0–5000 Hz) so the interesting harmonic detail fills the full
    canvas height, dramatically improving visual sophistication and storytelling.'
  - 'DE-02 minor: Grid lines (panel_grid_major) are visible through the spectrogram
    tiles and slightly clutter the color data. For a heatmap/spectrogram, grid lines
    add noise rather than aiding reading — set panel_grid_major=element_blank() and
    panel_grid_minor=element_blank() for a cleaner result.'
  - 'VQ-01 minor: Note annotation font (geom_text size=4 mm ≈ 11pt) is on the small
    side at the canvas resolution; consider size=5 to make note labels (C4, E4, G4,
    C5) more prominent without overlapping.'
