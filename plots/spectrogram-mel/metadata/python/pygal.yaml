review:
  strengths:
  - Creative and correct use of pygal's Graph extension mechanism to implement a heatmap-style
    mel-spectrogram — the only viable approach given pygal's chart type limitations
  - Note annotations (C4, E4, G4, C5, G4, E4) with dual-ring markers and text shadows
    create effective data storytelling and guide the viewer through the arpeggio
  - 'Fully spec-compliant: dB scale, colorbar, mel-scaled frequency y-axis with Hz
    labels, correct STFT parameters (n_fft=2048, hop_length=512, n_mels=128)'
  - Both light and dark renders pass readability checks with correct Imprint palette
    backgrounds and theme-adaptive chrome
  weaknesses:
  - 'CQ-01: Defines both a helper function (interpolate_color) and a class (MelSpectrogramChart)
    — violates the flat-script no-functions/classes rule; the interpolation logic
    could be inlined and the class replaced with top-level procedural code'
  - 'Two-stop colormap (#4467A3 → #009E73) reduces perceptual dynamic range; adding
    intermediate stops would reveal more spectral texture'
  - Blue-to-teal/green endpoint pair has limited luminance contrast, making low-vs-high
    dB differences harder to perceive for CVD users; a darker blue start point or
    additional stops would improve accessibility
  - Bottom margin is slightly tight between x-axis tick labels and the canvas edge
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "spectrogram-mel · python · pygal · anyplot.ai" in dark text, clearly readable. Y-axis label "Frequency (Hz)" and X-axis label "Time (s)" in dark bold text. Tick labels (100, 200, 500, 1.0k, 2.0k, 4.0k, 8.0k Hz; 0.0–3.0 s) in INK_SOFT. Colorbar title "dB" and tick labels (0, -16, -32, -48, -64, -80) readable.
      Data: Spectrogram filled with colormap from #4467A3 (low dB) to #009E73 (high dB). Horizontal harmonic bands visible below ~1 kHz corresponding to C-major arpeggio notes. Six note annotations with dual-ring circle markers and white text (C4, E4, G4, C5, G4, E4) placed at note onsets. Colorbar on right side shows gradient from blue to teal-green.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title, axis labels, and tick labels appear in light text (#F0EFE8 / #B8B7B0 tokens) — all readable against dark background. Colorbar labels and title readable. No dark-on-dark failures observed.
      Data: Spectrogram data colors (blue #4467A3 → teal-green #009E73 gradient) visually identical to light render — only page background and chrome colors have flipped. Note annotation circles (white ring, white text) remain clearly visible over the spectrogram.
      Legibility verdict: PASS
