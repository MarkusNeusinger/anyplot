review:
  strengths:
  - Full dual-theme implementation with correct Imprint sequential colorscale (imprint_seq
    green→blue) applied to dB intensity
  - Manual STFT and mel filterbank construction without external audio libraries —
    demonstrates deep signal processing knowledge
  - Four thematic annotations with arrow indicators (Harmonics A4, Decaying tone,
    Chirp sweep, Noise floor) guide viewer through spectral features
  - Reference lines at perceptually meaningful frequencies (440 Hz = A4, 1 kHz, 4
    kHz) add musicological storytelling context
  - All chrome tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT) correctly applied to colorbar,
    annotation boxes, axis labels, and reference lines in both themes
  - Synthesized signal combines four distinct audio phenomena (steady harmonics, chirp
    sweep, decaying tone, noise floor) for pedagogically rich demo
  - Interactive hovertemplate with time/frequency/power on hover plus write_html output
    — full use of Plotly's interactive strengths
  - Canvas correctly set to 3200×1800 via width=800, height=450, scale=4 with autosize=False
  weaknesses:
  - 'imprint_seq (green #009E73 → blue #4467A3) spans a narrow luminance range compared
    to spectral colormaps — the dynamic range across -80 dB to 0 dB is subtler than
    ideal; the difference between -60 dB and -10 dB regions can be hard to distinguish
    at a glance. This is a required constraint of the Imprint colorscale, but note
    it limits perceptual clarity on the spectrogram.'
  - Left-side annotations ('Harmonics A4' and 'Noise floor') are positioned closely
    in x-space with ax offsets pushing both boxes toward the left edge of the plot;
    while not overlapping in the current render, the positioning is slightly crowded
    and could become an issue at different zoom levels.
  - DE-02 could be elevated by removing spines (all four sides) for a fully open heatmap
    aesthetic — the L-shaped spine default adds unnecessary frame lines around a heatmap
    that is better served by a borderless presentation.
