review:
  strengths:
  - Manual numpy STFT + mel filterbank implementation — no external audio library
    needed, demonstrates deep DSP understanding
  - Gouraud shading on pcolormesh creates smooth color interpolation appropriate for
    spectral data
  - speech band and harmonic region reference lines with annotated labels are excellent
    data storytelling additions
  - 'Theme-adaptive chrome fully wired: all text, colorbar labels/outline, annotation
    boxes use the correct token per theme'
  - rasterized=True on the dense mesh shows awareness of matplotlib rendering performance
  - Synthesized audio with multiple distinct features (melody sweeps, percussive bursts,
    rising tone) makes the mel-spectrogram visually rich and educational
  weaknesses:
  - imprint_seq colormap is constructed with reversed stop order (["#4467A3", "#009E73"])
    vs. the canonical definition (green to blue). While the intent is sound (high
    energy maps to brand green), it deviates from the style-guide definition. Consider
    using imprint_seq.reversed() or flipping the norm direction instead, so the colormap
    object matches the canonical name.
  - 'DE-02 could be elevated: a subtle horizontal grid or secondary y-axis showing
    mel-band count would not add clutter but would aid reading exact frequency positions.'
  - 'LM-02: STFT and mel filterbank implemented from scratch with numpy loops where
    scipy.signal.stft + vectorized filterbank would be more idiomatic for production-quality
    code.'
