  strengths:
  - Excellent dark theme with inferno-like custom colormap that suits the audio/spectrogram
    domain perfectly
  - Rich, musically accurate synthesized data with four distinct temporal sections,
    harmonics, and percussive transients
  - All spec requirements fully met including proper mel filterbank, dB conversion,
    and parameter choices
  - Clean, well-structured code with clear section organization
  - Full marks on Spec Compliance, Data Quality, and Code Quality
  weaknesses:
  - Plot bands for section labels (G3 phrase, E4 peak) are effectively invisible at
    0.02 opacity and 22px font size
  - Upper ~40% of frequency axis shows mostly empty dark space, underutilizing the
    canvas
  - Heatmap cells have noticeably blocky/discrete appearance from downsampling
  image_description: The plot displays a mel-spectrogram on a dark navy background
    (#1a1a2e) using an inferno/magma-inspired colormap ranging from deep black/purple
    (low power) through orange to bright yellow (high power). The title "spectrogram-mel
    · highcharts · pyplots.ai" appears at the top in light gray, with a subtitle "Mel-scaled
    power spectrum — ascending melodic phrase G3→C4→E4→C4 with percussive transients"
    below it. The x-axis shows "Time (s)" from ~0.05 to ~3.76 with evenly spaced tick
    labels. The y-axis shows "Frequency (Hz, mel-scaled)" from 15 Hz at the bottom
    to 9144 Hz at the top. A vertical colorbar on the right is labeled "Power (dB)"
    ranging from 0 dB to -80 dB. The lower frequency range (15–700 Hz) shows strong
    bright yellow/orange energy with clear temporal evolution matching the melodic
    phrase. Percussive transients appear as bright spots around 3408 Hz at several
    time points. The upper frequency range (above ~4000 Hz) is mostly dark purple
    with faint transient energy. The heatmap cells have a slightly blocky/discrete
    appearance due to downsampling.
