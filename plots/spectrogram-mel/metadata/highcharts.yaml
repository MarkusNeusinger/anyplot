  strengths:
  - Excellent spec compliance with all required features implemented correctly (mel
    scale, dB conversion, colorbar, correct parameters)
  - Professional dark theme with hand-crafted inferno colormap stops creates strong
    visual identity
  - Clean well-structured code with manual mel filterbank avoiding external audio
    library dependencies
  - Good interactive tooltips showing time frequency and power values
  - Proper font sizing throughout with explicit size settings
  weaknesses:
  - 3200 Hz percussive transient bursts appear as a nearly continuous bright horizontal
    band instead of showing distinct onset events
  - Data storytelling could be improved with more visual hierarchy or emphasis on
    key spectral features
  - Colorbar/legend positioning is slightly far from the main plot area
  - Does not use highcharts-core Python library - builds raw dict config instead
  image_description: The plot displays a mel-spectrogram on a dark navy background
    (#1a1a2e) using an inferno/magma-like sequential colormap ranging from black/dark
    purple (-80 dB) through magenta/orange to bright yellow (0 dB). The title "spectrogram-mel
    · highcharts · pyplots.ai" appears at the top in light gray, with a subtitle "Mel-scaled
    power spectrum of synthesized audio (dB)". The x-axis shows "Time (s)" from ~0.05
    to ~3.76, and the y-axis shows "Frequency (Hz, mel-scaled)" with mel-band edge
    labels at 15, 190, 407, 677, 1014, 1433, 1953, 2602, 3408, 4411, 5659, 7212, and
    9144 Hz. A vertical colorbar on the right is labeled "Power (dB)" with ticks from
    -80 dB to 0 dB. The spectrogram shows strong harmonic energy in the lower frequencies
    (below ~700 Hz) with visible temporal modulation patterns from the vibrato and
    envelope-shaped harmonics. A very bright continuous horizontal band appears near
    3408 Hz (the 3200 Hz percussive transient component). The upper frequencies (above
    ~4500 Hz) are mostly quiet dark purple. The overall visual appearance is professional
    with good color contrast.
