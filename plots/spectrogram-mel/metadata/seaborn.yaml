  image_description: The plot displays a mel-spectrogram using the magma colormap
    on a 16:9 canvas. The x-axis shows "Time (s)" from 0.0 to 4.0 seconds, and the
    y-axis shows "Frequency (mel scale)" with Hz labels at 100 Hz, 200 Hz, 500 Hz,
    1k Hz, 2k Hz, 4k Hz, and 8k Hz. A colorbar on the right is labeled "Power (dB)"
    ranging from -80 to 0. The title reads "spectrogram-mel · seaborn · pyplots.ai".
    The spectrogram clearly shows 8 distinct note segments of a synthesized melody,
    each with visible fundamental frequency and harmonics (2nd and 3rd) appearing
    as bright horizontal bands. The notes step through different pitches — ascending
    then descending — and each note exhibits an exponential decay envelope (bright
    at onset, fading). The upper frequency range (above ~4k Hz) shows mostly quiet
    background noise in dark purple/magma tones. The mel scaling compresses higher
    frequencies as expected.
