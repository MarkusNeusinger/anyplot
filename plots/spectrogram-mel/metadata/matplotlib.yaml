  image_description: The plot displays a mel-spectrogram using the magma colormap
    on a dark background. The x-axis shows "Time (s)" from 0.0 to ~3.8s, the y-axis
    shows "Frequency (Hz)" with mel-scaled tick labels at 64, 128, 256, 512, 1k, 2k,
    4k, and 8k Hz. A colorbar on the right indicates "Power (dB)" from -80 to 0. The
    spectrogram reveals a melodic pattern with clearly visible fundamental and harmonic
    curves sweeping in the lower frequency range, periodic vertical percussive bursts
    every 0.5 seconds, and a rising diagonal tone from ~500 Hz to ~2000 Hz appearing
    in the second half. The title reads "spectrogram-mel · matplotlib · pyplots.ai".
    Top and right spines are removed. Gouraud shading provides smooth color transitions.
