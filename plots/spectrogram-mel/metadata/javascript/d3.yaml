review:
  strengths:
  - Correct mel-scale frequency axis with custom Hz tick marks at perceptually meaningful
    breakpoints (100Hz, 250Hz, 500Hz, 1kHz, 2kHz, 4kHz, 8kHz)
  - Deterministic harmonic synthesis producing a recognizable musical arc pattern
    (C major ascending/descending)
  - Custom SVG linearGradient colorbar — a D3-idiomatic approach to the colorbar requirement
  - 'Perfect spec compliance: all required features present and correctly implemented'
  - Clean D3 code with proper data binding patterns and theme token usage
  weaknesses:
  - 'Color scale visual inversion: imprint_seq maps the noise floor (-80 dB) to bright
    brand-green (#009E73), making it the visually dominant element, while harmonics
    (near 0 dB) appear as darker blue. Apply a non-linear (power/gamma) domain compression
    to widen the perceptual gap so signal stands out from noise floor.'
  - 'Cell resolution is visibly blocky: 80 mel bins (vs spec-recommended 128) x 150
    frames produces large rectangular cells. Increase to n_mels=128 and n_frames=200
    for a smoother appearance.'
  - 'Design lacks visual hierarchy: no emphasis on the musical arc, no reference lines
    at key frequency bands, block-grid appearance reduces perceptual smoothness of
    the spectrogram.'
