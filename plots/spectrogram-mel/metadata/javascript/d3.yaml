review:
  strengths:
  - Gamma-compressed colorscale (dbGamma=2.2) is a sophisticated real-world technique
    that improves visual dynamic range by pushing noise floor dark and keeping harmonic
    peaks vivid green
  - Synthesized C major scale with physically accurate note frequencies, 10 harmonics
    per note, and realistic attack/sustain/decay envelopes produces a genuinely instructive
    mel-spectrogram
  - 'All spec requirements satisfied: mel scale, decibel conversion, colorbar labeled
    in dB, time axis, Hz labels at key mel band edges'
  - Correct Imprint sequential tokens (t.seq) used for continuous color mapping; theme-adaptive
    chrome correctly adapts across light and dark renders
  - SVG linearGradient + d3.axisRight colorbar is idiomatic and elegant D3 implementation
  weaknesses:
  - Colorbar 'Power (dB)' rotated label and tick labels at 14px CSS are at the lower
    end of the recommended range — increasing to 15-16px would improve legibility
    when scaled down
  - 'DE-02: Axis domain lines rendered as solid inkSoft strokes rather than de-emphasized;
    colorbar has no visual frame refinement beyond the gradient rect'
  - 'LM-02: Color scale uses d3.interpolateRgb(t.seq[1], t.seq[0]) rather than the
    more D3-idiomatic d3.scaleSequential(d3.interpolateRgbBasis(t.seq)) — minor API
    refinement opportunity'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) in canvas margins (title area, axis areas, colorbar region). The heatmap plot area is filled with mel-spectrogram data cells.
      Chrome: Title "spectrogram-mel · javascript · d3 · anyplot.ai" in dark ink at 22px, clearly readable. X-axis tick labels 0.0s-4.0s at 15px and Y-axis tick labels 100Hz-8kHz at 15px are readable. Axis labels "Time (s)" and "Frequency (Hz)" at 18px are clear. Colorbar "Power (dB)" label and tick labels at 14px are readable.
      Data: Blue-slate noise floor (Imprint seq[1] ~#4467A3) with bright brand-green (#009E73) harmonic bands showing C major scale ascending then descending. Colorbar transitions from blue-slate (-80 dB, bottom) to green (0 dB, top). Dashed reference lines at 100/250/500/1k/2k/4k/8kHz are subtly visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) in canvas margins. The heatmap data colors are identical to light render.
      Chrome: Title and all axis text render in light inkSoft token, clearly visible against the dark background. Colorbar tick labels are light-colored and readable. No dark-on-dark failures detected — all chrome elements adapted via ANYPLOT_TOKENS.
      Data: Identical data colors to light render — same blue-slate noise floor and same brand-green harmonics. C major arc pattern reads with same clarity.
      Legibility verdict: PASS
