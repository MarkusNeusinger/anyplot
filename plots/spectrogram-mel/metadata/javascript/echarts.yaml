review:
  strengths:
  - 'Complete DSP pipeline implemented from scratch in pure JS: Hann window, radix-2
    Cooley-Tukey FFT, triangular mel filterbank, and dB normalization — no external
    audio library needed'
  - Correct Imprint sequential colormap (t.seq, green→blue) applied via visualMap,
    satisfying both the spec's sequential colormap requirement and palette compliance
    rules
  - 'Scientifically accurate synthesis: correct C4-A4 note frequencies (261.63–440
    Hz), realistic harmonic amplitudes (0.55, 0.30, 0.17, 0.10, 0.05), and standard
    audio parameters (SR=22050, DB_MIN=−80)'
  - 'All font sizes explicitly set with proper hierarchy: title (22px auto-scaled),
    axis names (18px), x-axis ticks (14px), y-axis ticks (13px), colorbar text (14px)'
  - 'Both light and dark renders are fully theme-correct: transparent background inherits
    pageBg, all chrome uses t.ink / t.inkSoft tokens, data colors identical across
    themes'
  - Clean layout with no grid lines or ticks (appropriate for a heatmap), colorbar
    properly labeled in dB, title includes descriptive prefix 'C Major Scale'
  - 'Title length scaling formula applied correctly: `Math.max(15, Math.round(22 *
    Math.min(1, 67 / titleText.length)))`'
  weaknesses:
  - 'Design could be further elevated: the green→blue gradient is correct but both
    endpoints have similar luminance, reducing perceptual pop for the spectrogram
    — consider adding a brief note on the colorbar about energy levels or adjusting
    visual map text to ''Peak energy (0 dB)'' / ''Noise floor (−80 dB)'' for more
    informative labeling'
  - The upper-frequency region (>2 kHz) is nearly uniformly saturated green, reducing
    visual richness — while this is inherent to the harmonic signal content, it could
    be improved by slightly narrowing F_MAX or adjusting the mel bin count to spread
    energy more visually
  - 'LM-02 could leverage more ECharts-specific features: e.g., emphasis highlighting
    on hover bands, tooltip with time/frequency readout, or ECharts visualMap pieces
    mode — though these don''t render in static PNG'
