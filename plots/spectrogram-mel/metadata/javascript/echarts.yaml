      Data: Heatmap cells use Imprint sequential colormap (brand green #009E73 for high energy → Imprint blue #4467A3 for low energy). Six distinct horizontal staircase bands are clearly visible as the C-major scale progresses from 0 to 2 seconds. Upper frequencies (>2 kHz) are saturated green (high energy from harmonics). Lower frequencies show blue/dark-blue bands with green stripes at fundamental and harmonic frequencies.
