review:
  strengths:
  - Correct mel-spectrogram implementation with proper mel scale frequency mapping
    and Hz tick callbacks that convert mel bands to Hz at key positions
  - 'Imprint imprint_seq colormap correctly built as pageBg → #009E73 → #4467A3 with
    bilinear interpolation for smooth pixel rendering'
  - Realistic speech-like data synthesis using voiced/unvoiced segments with formant
    resonances (F1/F2) and harmonic overtones — data tells a plausible audio ML story
  - Deterministic LCG PRNG (seed=42) ensures reproducible renders
  - 'Complete spec compliance: dB colorbar with tick marks and labels, time axis in
    seconds, mel-scaled frequency axis, synthesized data, n_mels=64'
  - Theme-adaptive chrome fully wired via ANYPLOT_TOKENS — identical spectrogram data
    colors in both renders, only pageBg/ink flip
  weaknesses:
  - 'DE-01: Design sophistication is technically impressive but not publication-ready
    — the spectrogram area border is a single thin line using inkSoft; a more prominent
    chart boundary (e.g., thicker border or subtle inner shadow) would lift the visual
    weight. Consider adding a subtle background fill to the colorbar area using t.elevatedBg
    to separate it visually from the plot.'
  - 'DE-02: Visual refinement is good but could go further — the x/y grid lines show
    through the spectrogram data which competes with the color signal; consider disabling
    or heavily reducing the grid opacity so the spectrogram reads without grid interference.'
  - 'CQ-01: Code has 7+ standalone helper functions (melToHz, hzToMelBand, makeLcg,
    generateSpec, hexToRgb, lerp, dbToColor) plus a plugin object — beyond KISS ideal.
    Could inline lerp/hexToRgb into dbToColor to reduce function count.'
  - 'VQ-01: Title at 22px CSS fills approximately 45-50% of canvas width — slightly
    below the 50-70% target. Increasing title font size to 26px CSS would better utilize
    the canvas width without overflow.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface. Spectrogram fills the central chart area.
      Chrome: Title "spectrogram-mel · javascript · chartjs · anyplot.ai" in dark ink, slightly small (~45% canvas width). X-axis label "Time (s)" and Y-axis label "Frequency (Hz, mel scale)" both in dark ink with units. Tick labels in inkSoft — Y ticks show "20", "1k", "3.5k", "9.0k", "11k" Hz values; X ticks show "0.0s" through "5.0s". Colorbar on the right with dB labels 0, -20, -40, -60, -80 and "Power (dB)" rotated label. All text is clearly readable against the light background.
      Data: The spectrogram uses the imprint_seq colormap (pageBg → #009E73 green → #4467A3 blue). Low-energy regions (-80 dB) appear as the background warm off-white, medium-energy voiced segments appear teal-green, and high-energy areas shift toward blue. Alternating voiced segments (showing horizontal formant bands at ~F1/F2 mel positions) and unvoiced segments (broader high-frequency energy) are clearly visible. 5 voiced and 4 unvoiced segments across the 5-second window.
      Legibility verdict: PASS — all text readable, no light-on-light issues, grid subtle and non-interfering.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title in light ink (#F0EFE8 equivalent), clearly readable. Axis labels and tick labels in light inkSoft — fully legible against the dark background. Colorbar dB labels and "Power (dB)" rotated label in light text. No dark-on-dark failures observed — all chrome adapts correctly to the dark theme via ANYPLOT_TOKENS.
      Data: Spectrogram colors are identical to the light render — #009E73 and #4467A3 data colors unchanged, only pageBg flips to #1A1A17 which makes the low-energy areas dark. The voiced/unvoiced pattern and formant structure are equally visible in the dark theme. The teal-green voiced bands and dark low-energy areas contrast well on the dark surface.
      Legibility verdict: PASS — all text readable in light-on-dark configuration, no dark-on-dark failures.
