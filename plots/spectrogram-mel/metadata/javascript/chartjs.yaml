review:
  strengths:
  - Custom Chart.js plugin (afterDraw hook) renders a pixel-perfect spectrogram via
    Canvas 2D with bilinear interpolation — smooth and visually sharp
  - Speech-like data synthesis with voiced/unvoiced alternation, harmonic series,
    and F1/F2 formant resonances gives the spectrogram a realistic and instructive
    structure
  - Deterministic LCG PRNG (seed 42) ensures full reproducibility without browser
    Math.random()
  - 'imprint_seq colormap correctly implemented: background → seq[0] (#009E73) → seq[1]
    (#4467A3), with theme-adaptive base color so silence fades into the page surface
    on both themes'
  - Colorbar fully labeled ('Power (dB)', dB tick marks) with elevated background
    separating it from the plot area — professional visual grouping
  - Mel-to-Hz tick callback on Y-axis correctly converts mel band indices back to
    Hz for human-readable frequency labels (20, 1k, 3.5k, 7k, 11k)
  weaknesses:
  - hzToMelBand() is defined (lines 23-27) but never called — unused dead code should
    be removed
  - 'CQ-01: Several helper functions (melToHz, hzToMelBand, makeLcg, generateSpec,
    dbToColor) push past the KISS flat-script ideal; acceptable for this complexity
    but worth noting'
  - 'DE-03: No annotations or labeled regions to guide the viewer''s interpretation
    — e.g., marking a voiced vs. unvoiced segment with a subtle bracket or text callout
    would improve storytelling'
  - 'DE-02: The 2px box border around the chart area adds visual weight but the overall
    whitespace is tight (top/bottom padding=10 is minimal for a 3200x1800 canvas)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page surface, not pure white.
      Chrome: Title "spectrogram-mel · javascript · chartjs · anyplot.ai" clearly readable in dark ink at top center. Y-axis title "Frequency (Hz, mel scale)" readable (sideways, left). X-axis title "Time (s)" readable at bottom center. Tick labels on both axes (Y: 20, 1k, 3.5k, 7k, 11k Hz; X: 0.0s–5.0s) readable in medium-dark text. Colorbar on right with dB labels (0, -20, -40, -60, -80) in medium text, "Power (dB)" rotated label present.
      Data: Spectrogram fills the main area — warm teal/green (#009E73) for high-energy voiced regions (alternating bright rectangles), fading to warm off-white for near-silence, with blue (#4467A3) for peak energy near top. Voiced vs. unvoiced alternation is visually striking.
      Legibility verdict: PASS — all text readable, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark page surface, not pure black.
      Chrome: Title, axis labels, and tick labels are all light-colored and clearly readable against the dark background. No dark-on-dark failures detected. Colorbar dB labels and "Power (dB)" label are light-colored and visible.
      Data: Spectrogram data colors are identical to the light render — same teal/green (#009E73) and blue (#4467A3) for high-energy regions. The darkest (near-silence) areas now fade to near-black (#1A1A17) rather than off-white, which correctly uses the dark pageBg as the base of the colormap. The voiced/unvoiced pattern is equally clear on the dark surface.
      Legibility verdict: PASS — all text readable, chrome correctly adapts to dark theme.
