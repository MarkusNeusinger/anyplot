  strengths:
  - Perfect spec compliance — all required features implemented correctly
  - Excellent synthesized audio data with rich, varied frequency content showing multiple
    audio phenomena
  - Strong colormap choice (inferno) with proper dB scaling and colorbar
  - All font sizes explicitly set and clearly readable
  - Clean code that avoids external audio dependencies by implementing STFT and mel
    filterbank from scratch
  weaknesses:
  - Low-frequency mel bins appear as coarse blocks due to subsampling, reducing visual
    fidelity
  - No visual hierarchy or emphasis mechanism — all audio features compete equally
    for attention
  - Could benefit from more design refinement (e.g., frequency band annotations, refined
    tick formatting)
  image_description: 'The plot displays a mel-spectrogram using the inferno colormap
    on a dark-to-bright (black/purple to yellow/white) scale. The X-axis shows "Time
    (s)" from 0.0 to 4.0, and the Y-axis shows "Frequency (Hz)" on a logarithmic scale
    with tick marks at 50, 100, 200, 500, 1000, 2000, 5000, and 10000 Hz. A vertical
    colorbar on the right is labeled "Power (dB)" ranging from -80 to 0. The title
    reads "spectrogram-mel · altair · pyplots.ai" with a subtitle describing the synthesized
    signal. Several distinct features are visible: a descending frequency sweep with
    harmonics appearing as bright diagonal lines from upper-left to lower-right, a
    persistent bright horizontal band around 400-500 Hz from the pulsed 440 Hz tone,
    a chirp burst between 1.5-2.5s visible in the 2000-5000 Hz range, and a subtle
    noise floor at the lowest frequencies. The lower mel bins appear as visibly larger
    rectangular blocks due to mel-scale compression.'
