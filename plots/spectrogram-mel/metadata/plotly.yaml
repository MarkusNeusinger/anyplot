review:
  strengths:
  - Excellent mel-spectrogram computation from scratch without librosa dependency
    — clean STFT and mel filterbank implementation
  - Rich multi-component synthesized audio signal showcasing diverse spectrogram features
    (harmonics, chirp, decay, noise)
  - Perfect spec compliance with all required parameters and features
  - Interactive hover tooltips with custom formatting showing time, frequency, and
    power values
  - Full marks on visual quality with all font sizes explicitly set
  weaknesses:
  - Design could be elevated with subtle frequency band annotations or reference lines
    at key frequencies
  - No visual hierarchy guiding the viewer to notable spectral features
  - Could benefit from more Plotly-specific refinement (e.g., custom hover styling,
    range slider)
  image_description: The plot displays a mel-spectrogram with the Inferno colormap
    on a plotly_white background. The x-axis shows "Time (s)" from 0 to ~3.9s, and
    the y-axis shows "Frequency (Hz)" on a log scale with custom tick labels at 50,
    100, 200, 500, 1k, 2k, 4k, and 8k Hz. A vertical colorbar on the right is labeled
    "dB" with a range from -80 to 0. Several bright horizontal bands are visible at
    fixed frequencies (~440 Hz, ~880 Hz, ~1320 Hz), representing harmonics. A prominent
    ascending chirp sweeps from ~200 Hz upward across time. A decaying component around
    3000 Hz fades over time. The lowest frequency region shows broadband noise. The
    amplitude envelope is visible — there's a brief attack at the start and a gradual
    fade-out in the last ~0.3s. The title reads "spectrogram-mel · plotly · pyplots.ai"
    centered at the top.
