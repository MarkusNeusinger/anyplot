  strengths:
  - Perfect spec compliance — all required features present including mel scale, dB
    conversion, colorbar, and correct parameters
  - Rich, realistic synthesized audio data with harmonics, chirp sweep, and amplitude
    decay telling a clear audio analysis story
  - Thoughtful color design with custom inferno gradient and dark panel background
    matching the colormap
  - Clean grammar-of-graphics composition with explicit font sizing throughout
  weaknesses:
  - The mel filterbank construction uses nested Python for loops — should be vectorized
    with numpy broadcasting for cleaner, more elegant code
  - The colorbar could be taller and more prominent to better match the plot height
  - Lower frequency tiles appear somewhat blocky; tile spacing could be refined for
    smoother visual appearance
  image_description: The plot displays a mel-spectrogram with time (0-3 seconds) on
    the x-axis and mel-scaled frequency (64-8000 Hz) on the y-axis, using a log-frequency
    scale. The color scheme is an inferno-like palette ranging from deep purple/black
    (low power, ~-60 dB) through magenta and orange to bright yellow (high power,
    ~0 dB). The title reads "spectrogram-mel · plotnine · pyplots.ai" in bold centered
    text. A colorbar labeled "Power (dB)" sits on the right side. Bright horizontal
    bands are clearly visible at the harmonic frequencies (220, 440, 880 Hz) showing
    the synthesized tonal components. A prominent diagonal chirp sweep is visible
    from ~500 Hz at t=0.8s curving up to ~4000 Hz at t=2.0s. The signal amplitude
    decays over time, with the lower frequencies fading in the 2-3 second range. The
    panel background is dark (#000004) which blends well with the spectrogram's low-energy
    regions. The plot background is light gray providing good contrast framing.
