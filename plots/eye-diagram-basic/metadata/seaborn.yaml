    0.0 to 2.0, Y-axis is labeled "Voltage (V)" ranging from approximately -0.2 to
    1.2. Top and right spines are removed; bottom and left spines are subtle gray.
    Dashed reference lines at 0V and 1V mark the nominal signal levels.
