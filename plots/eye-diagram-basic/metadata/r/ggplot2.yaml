review:
  strengths:
  - 'Correct imprint_seq colormap (#009E73 to #4467A3) applied to continuous density
    data with proper na.value=PAGE_BG revealing the eye opening'
  - Complete theme-adaptive chrome in both renders with no dark-on-dark or light-on-light
    failures
  - Informative eye-height annotation with computed 746 mV measurement provides immediate
    quantitative insight
  - Efficient vectorized NRZ simulation using outer()/findInterval/tabulate — no per-sample
    R loop
  - geom_raster(interpolate=TRUE) with manual 2D density grid is a distinctive ggplot2
    technique
  weaknesses:
  - 'LM-02/DE-01 minor: Manual 2D density pre-computation (findInterval/tabulate/raster_df)
    bypasses ggplot2 native stat pipeline — stat_density_2d(geom="raster", aes(fill=after_stat(density)),
    interpolate=TRUE, n=c(200,150)) on eye_df would be more idiomatic and remove ~20
    lines'
  - 'DE-01 minor: Top and right spines could optionally be removed for a more contemporary
    aesthetic (current 4-sided panel.border is justified for a scientific heatmap
    but less distinctive)'
