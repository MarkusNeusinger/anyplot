review:
  strengths:
  - 'Complete dual-theme support: all chrome tokens (title, axis labels, ticks, grid,
    legend) correctly adapt between #FAF8F1 and #1A1A17 surfaces with zero dark-on-dark
    failures'
  - 'Imprint sequential colormap (#009E73 → #4467A3) with trans=sqrt is an excellent
    choice — the square-root scale gives perceptual weight to sparse-but-important
    transition regions'
  - Vectorized waveform generation via outer() is efficient, clean, and numerically
    correct; the jitter and sigmoid bandwidth-limiting produce a realistic NRZ eye
    pattern
  - Canvas dimensions exactly 3200×1800, all font sizes follow the ggplot2 library
    guide, no clipping or overflow in either render
  weaknesses:
  - geom_bin_2d(bins=100) produces a blocky pixelated appearance at sparse-data boundaries
    — consider pre-computing a 2D count matrix and using geom_raster for smoother,
    publication-quality density rendering
  - The Density colorbar legend in the light render shows the green (#009E73) end
    as nearly invisible/washed-out against the cream legend background; the low end
    of the legend key could be misleading about the actual color range
  - No eye height/eye width annotations — while optional per spec, adding reference
    lines and text markers at the optimal sampling point would significantly improve
    data storytelling (DE-03) and feature coverage (DQ-01)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color, not pure white
      Chrome: Title "eye-diagram-basic · r · ggplot2 · anyplot.ai" in dark ink at 12pt — readable, ~55% of plot width. Axis labels "Voltage (V)" (Y) and "Time (UI)" (X) in dark ink at 10pt — balanced, readable. Tick labels in INK_SOFT (#4A4A44) at 8pt — small but legible. Grid lines extremely subtle (INK_MUTED, linewidth=0.15). Legend box has cream elevated background (#FFFDF6) with thin border; legend title "Density" and values (20/40/60/80) readable. No light-on-light text issues.
      Data: Imprint sequential palette — brand green (#009E73) at low-density edges, blue (#4467A3) at high-density band centres. sqrt transform applied. Eye diagram shows two dense horizontal bands (V≈0 and V≈1) with transition arcs and clear eye openings filled by the page background.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface color, not pure black
      Chrome: Title in light cream (#F0EFE8) at 12pt — clearly readable against dark background. Axis labels in INK light variant — fully legible. Tick labels in INK_SOFT dark variant (#B8B7B0) — readable, no dark-on-dark failure observed. Grid lines subtle. Legend box has dark elevated background (#242420) with border; legend text is light and readable.
      Data: Green→blue gradient is IDENTICAL to light render — same Imprint seq palette, same density distribution. Eye openings filled by near-black background, creating strong contrast with colored data bands — particularly striking effect in dark mode.
      Legibility verdict: PASS
