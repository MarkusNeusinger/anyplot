  image_description: The plot displays a density heatmap eye diagram on a dark navy-black
    background (#0a0a1a). The inferno colormap (dark purple to orange to bright yellow)
    represents trace density, with the brightest yellow/white regions at the top (~1V)
    and bottom (~0V) signal levels where traces concentrate. The characteristic eye
    opening is clearly visible in the center, formed by transitions between high and
    low signal states. Cyan dashed annotation lines mark the eye height (vertical,
    ~0.800 V) and eye width (horizontal, ~0.92 UI). The title reads "eye-diagram-basic
    · altair · pyplots.ai" in light gray, with a subtitle "NRZ signal eye diagram
    — 300 traces with 5% noise and 3% jitter". X-axis is labeled "Time (UI)" spanning
    0 to 2, Y-axis is labeled "Voltage (V)" spanning roughly -0.15 to 1.15.
