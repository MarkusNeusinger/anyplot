review:
  strengths:
  - Excellent oscilloscope-themed design with dark background and viridis palette
    — thematically perfect for signal integrity visualization
  - Density-based heatmap approach effectively communicates trace concentration patterns
  - Clean data generation pipeline with realistic NRZ signal parameters
  - Interactive HTML export leverages pygal native SVG tooltips with per-point density
    labels
  - Comprehensive Style customization with consistent monospace typography
  weaknesses:
  - Dot grid pattern is slightly coarse — higher resolution or dot overlap could create
    smoother density gradients
  - sys.path manipulation for import workaround is hacky though necessary for filename
    collision
  - Most computation is numpy-based with pygal as final renderer limiting library
    mastery score
  image_description: The plot shows an eye diagram on a dark navy/indigo background
    (oscilloscope-style) using monospace typography throughout. The title "eye-diagram-basic
    · pygal · pyplots.ai" appears at the top in light text. The X-axis is labeled
    "Time (UI)" ranging from 0 to 2, and the Y-axis is labeled "Voltage (V)" ranging
    from -0.2 to 1.2. The eye pattern is rendered as a grid of colored dots using
    a viridis-inspired palette — dark purple for low density through cyan/green to
    bright yellow for peak density. Two clear eye openings are visible centered around
    0.5 UI and 1.5 UI, with high-density yellow/green regions at the 0V and 1V signal
    levels (flat portions) and lower-density purple/blue at the transition edges.
    A legend at the bottom displays 8 density bands (Very Low through Peak) in a single
    row. The overall aesthetic is professional and thematic, resembling an oscilloscope
    display.
