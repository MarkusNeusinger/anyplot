review:
  strengths:
  - Dark plot background brilliantly mimics real oscilloscope displays, creating an
    authentic eye diagram aesthetic
  - Viridis-inspired colorblind-safe palette with 6 density bands effectively conveys
    trace density
  - Solid signal simulation with realistic NRZ parameters (noise, jitter, sigmoid
    transitions)
  - HTML export with native pygal interactive SVG is a nice library-specific addition
  - Clean data pipeline from signal generation through density binning to visualization
  weaknesses:
  - Dot size (dots_size=12) is too large, making the eye pattern look coarse/pixelated
  - Legend text at bottom is barely legible at the rendered size
  - XY scatter approach produces a dot-matrix look rather than smooth density
  - Library mastery could be improved by leveraging more pygal-specific features
  image_description: 'The plot displays a signal integrity eye diagram on a dark navy
    (#0a0a28) plot background with a white outer frame. Colored dots represent density-binned
    signal trace data spanning 2 unit intervals (UI) on the x-axis (labeled "Time
    (UI)", 0 to 2) and voltage on the y-axis (labeled "Voltage (V)", approximately
    -0.1 to 1.1). Two eye-shaped openings are clearly visible — dark voids where few
    traces pass. The density is color-coded using a viridis-inspired palette: dark
    purple (Very Low), blue (Low), teal (Medium), green (High), yellow-green (Very
    High), and bright yellow (Peak). High-density yellow/green concentrations appear
    at the 0V and 1V signal levels, with transition regions in lower-density purple/blue.
    A legend at the bottom shows all 6 density bands. The title reads "eye-diagram-basic
    · pygal · pyplots.ai".'
