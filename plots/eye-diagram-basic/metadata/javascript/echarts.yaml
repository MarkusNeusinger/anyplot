review:
  strengths:
  - Correct eye diagram as 2D density heatmap with Imprint sequential colormap, background-blending
    for zero-density areas creates clean visual
  - NRZ reference lines at 0 V and 1 V annotated with dashed lines, amber bidirectional
    arrows for eye height (0.70 V) and eye width (0.80 UI)
  - Deterministic data generation using seeded LCG + Box-Muller Gaussian + sigmoid
    bandwidth limiting — complete and realistic NRZ simulation
  - Sqrt-normalization of density for improved perceptual dynamic range — good technique
    for heatmap density display
  - 'Full spec compliance: time axis in UI, voltage axis in V, 400 overlaid traces,
    jitter and noise within spec parameters, optional eye measurements included'
  - Spines, axis lines, and split lines all removed for clean heatmap look; category
    axes used to achieve precise bin alignment
  weaknesses:
  - 'Amber annotation labels (''H: 0.70 V'', ''W: 0.80 UI'') use t.amber (#DDCC77)
    for text on the light-mode background (#FAF8F1) — contrast ratio ~1.5:1, nearly
    invisible in plot-light.png. Switch annotation label color to t.ink for light
    mode or use t.inkSoft; reserve t.amber for the arrow lines only, or increase the
    label fontsize to ≥13px.'
  - Amber eye-measurement arrows also barely visible in light mode — the thin 2px
    amber lines blend into the warm off-white surface. Consider adding a subtle shadow/outline
    or using t.ink for the arrows in light mode.
  - Helper functions lcg(), gauss(), sig() break strict KISS structure — acceptable
    for complex signal simulation but noted as minor CQ-01 deduction.
  - DE-03 storytelling is impaired by low annotation visibility in light mode — the
    key insight (eye height and width measurements) is only clearly communicated in
    the dark render.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface. No pure white.
      Chrome: Title "eye-diagram-basic · javascript · echarts · anyplot.ai" in dark ink, clearly readable. Y-axis label "Voltage (V)" and X-axis label "Time (UI)" both readable in inkSoft. Tick labels (0.0/0.5/1.0/1.5/2.0 on X; -0.5/0.0/0.5/1.0/1.5 on Y) clearly legible. Colorbar legend "Dense"/"Sparse" legible. NRZ reference lines at ~0 V and ~1 V visible as dashed marks.
      Data: Heatmap uses Imprint sequential (pageBg → t.seq[0] → t.seq[1]) — sparse areas fade into background, dense areas show teal-to-blue. Eye opening clearly visible as two rectangular white-ish regions at UI=0.5 and UI=1.5. Amber crosshair arrows present but VERY faint — #DDCC77 on #FAF8F1 has ~1.5:1 contrast ratio, labels "H: 0.70 V" and "W: 0.80 UI" barely discernible.
      Legibility verdict: PASS for axes/title/ticks; MARGINAL FAIL for amber annotation labels (poor contrast on light surface).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface. No pure black.
      Chrome: Title in light ink, clearly readable. Axis labels and tick labels in light inkSoft, clearly readable. Colorbar "Dense"/"Sparse" labels readable. No dark-on-dark issues anywhere. NRZ dashed reference lines visible.
      Data: Same heatmap colors — teal/green to blue gradient, identical to light render. Amber arrows ("H: 0.70 V", "W: 0.80 UI") are CLEARLY visible against dark background — excellent contrast. The eye openings are dramatic and immediately recognizable.
      Legibility verdict: PASS — all elements clearly readable, data colors identical to light render, chrome correctly flipped.
