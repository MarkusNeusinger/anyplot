review:
  strengths:
  - Realistic NRZ signal simulation with correct noise (5% sigma) and jitter (3% UI)
    parameters — produces authentic-looking eye diagram
  - Sqrt density normalization improves perceptual dynamic range and makes trace-crossing
    regions clearly visible
  - Browser-compatible LCG with seed 42 provides fully deterministic data generation
  - Correct Imprint palette usage for continuous data via t.seq stops in visualMap
    inRange.color
  - 'All required spec features implemented: density heatmap, correct axis units (UI
    and V), bandwidth-limited sigmoid transitions, 400 overlaid traces'
  - Clean minimal code structure with appropriately justified helper functions (LCG,
    gauss, sigmoid) for browser environment
  - Perfect canvas gate pass and both themes render correctly with theme-adaptive
    chrome
  weaknesses:
  - 'DE-01 4/8: Aesthetic sophistication is at well-configured default level. Lacks
    the extra design choices to reach publication quality — remove top/right axis
    lines (axisLine: { show: false } on both axes + axisTick: { show: false }), add
    a subtle horizontal markLine at y=0 and y=1 to visually anchor the NRZ logic levels,
    or add an optional descriptive title prefix like ''NRZ Signal Integrity · '' to
    provide domain context.'
  - 'DE-02 4/6: Axis tick marks and axis lines are still showing. Removing them would
    greatly clean up the chrome. The visualMap text ''Dense''/''Sparse'' could be
    styled with a slightly larger fontSize (e.g. 14) to improve balance with the plot
    title.'
  - 'LM-02 3/5: The heatmap + visualMap approach is standard ECharts but lacks a feature
    that really shows ECharts mastery. Consider adding ECharts markLine to annotate
    the eye height (vertical span of open eye at t=1 UI) and eye width (horizontal
    span at the 0.5V midpoint) — the spec explicitly mentions this as an optional
    enhancement and it would be distinctive to ECharts'' built-in markLine/markArea
    capabilities.'
  - 'VQ-01 7/8: Minor imbalance — in the dark render the namegap values work well
    but the overall label hierarchy could be slightly sharper. Consider adding a descriptive
    subtitle or pushing title fontsize to 24 for better proportion against the large
    canvas.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme-adaptive background, not pure white.
      Chrome: Title "eye-diagram-basic · javascript · echarts · anyplot.ai" in bold dark text (~65% canvas width), clearly readable. Y-axis label "Voltage (V)" vertical on left, X-axis label "Time (UI)" horizontal at bottom — both readable with appropriate sizing. Tick labels at 0.0/0.5/1.0/1.5/2.0 (time) and -0.5/0.0/0.5/1.0/1.5 (voltage) in inkSoft dark text. visualMap legend ("Dense"/"Sparse") on right with vertical color bar.
      Data: Density heatmap from background (#FAF8F1) through teal (#009E73) to blue (#4467A3). Two prominent horizontal dense bands at ~0V and ~1V NRZ logic levels. Clear open "eye" regions at ~0.5V mid-voltage, most visible between t≈0.1–0.9 UI and t≈1.1–1.9 UI. Transition crossing regions at t≈0 and t≈1 show denser teal/blue patterns. Sqrt normalization makes fine structure visible.
      Legibility verdict: PASS — all text clearly readable against warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme-adaptive background, not pure black.
      Chrome: Title in light/white text at top, clearly readable against dark background. Axis labels and tick labels appear in lighter color (inkSoft dark-theme token), all clearly visible. visualMap "Dense"/"Sparse" labels in light text. No dark-on-dark failures detected.
      Data: Identical teal-to-blue data colors as light render — dense bands at 0V and 1V are the same teal/blue palette, confirming data color identity between themes. Sparse areas fade to the dark background instead of the light background, creating a dramatically different but equally clear visual. Eye openings appear as clear dark voids between the signal bands.
      Legibility verdict: PASS — all text clearly readable against near-black background. Chrome flipped correctly; data colors identical to light render.
