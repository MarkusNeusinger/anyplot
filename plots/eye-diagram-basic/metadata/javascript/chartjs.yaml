review:
  strengths:
  - Excellent eye diagram with characteristic double-eye pattern clearly visible in
    both renders; two eye openings at t≈0.5 and t≈1.5 UI are immediately legible.
  - 'Sophisticated deterministic data pipeline: LCG seeded at 42 → Box-Muller Gaussian
    → sigmoid bandwidth-limited transitions — exactly matching the spec''s signal
    model.'
  - Clever alpha-stacking approach (t.palette[0]+"0f" at ~6% opacity) creates an effective
    density visualization from Chart.js's multi-dataset line architecture.
  - 'Perfect spec compliance: trace count (300), noise sigma (5%), jitter sigma (3%
    UI), axis units (UI, V), and NRZ model all match the specification precisely.'
  - Theme-adaptive chrome fully implemented; dark render shows identical data colors
    with correctly flipped backgrounds, text, and grid tokens — no dark-on-dark failures.
  - 'Performance optimization with parsing: false is appropriate for the 302-dataset
    payload.'
  weaknesses:
  - 'DE-01: A true density-to-color ramp using t.seq (e.g., transitioning traces from
    t.palette[0] toward t.seq[1] as they stack) would fulfill the spec''s "hot colors
    indicating high trace density" note and elevate aesthetic sophistication.'
  - 'CQ-01: Minor — utility functions rand/randn/sigmoid/refLine add ~15 lines of
    abstraction that could be inlined; acceptable trade-off for readability.'
  - 'VQ-03: Alpha-stacking alone does not produce a warm/cool hue shift at dense regions;
    the densest areas appear as solid green rather than a shifted color. Not a disqualifying
    flaw given palette constraints, but noted for a potential improvement.'
