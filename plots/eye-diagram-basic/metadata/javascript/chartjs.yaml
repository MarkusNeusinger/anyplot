review:
  strengths:
  - Density-based color accumulation (green sparse → blue dense) is the right technique
    for eye diagrams — executed correctly with 300 overlaid traces using physically
    motivated alpha values.
  - Deterministic LCG + Box-Muller + sigmoid rise/fall produces a technically accurate,
    fully reproducible NRZ simulation matching real high-speed serial link eye diagrams.
  - Custom afterDraw plugin for bracket-style eye height annotations at both UI sampling
    points is a sophisticated and idiomatic use of the Chart.js plugin API.
  - Both light and dark themes pass readability with no dark-on-dark failures; chrome
    is fully theme-adaptive via t.ink / t.inkSoft throughout.
  - 'Full spec compliance: all required features implemented including noise (σ=5%),
    jitter (σ=3% UI), bandwidth-limited sigmoid transitions, correct axis units, and
    correct title format.'
  weaknesses:
  - Eye annotation label set at 12px CSS (ctx.font = '500 12px sans-serif') — at mobile
    scale (~400px width) this renders at ~3px and is effectively unreadable; raise
    to at least 14px to match tick label sizing.
  - refLine() convenience function is called exactly twice and adds minor unnecessary
    layering — optionally inline as two dataset literals for a flatter KISS structure.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "eye-diagram-basic · javascript · chartjs · anyplot.ai" at 22px — clearly readable dark text. Y-axis label "Voltage (V)" at 16px readable. X-axis label "Time (UI)" at 16px readable. Tick labels at 14px readable. Eye annotation "Eye H ≈ 0.63 V" at 12px — readable at full size but marginal at mobile scale.
      Data: Green (#009E73) traces for transition/sparse regions at very low alpha (3.5–5.5%); blue (#4467A3) for dense stable-rail regions at 12.5% alpha. 300 accumulated traces form two NRZ eye openings spanning 0–2 UI. Dashed reference lines at 0 V and 1 V in t.inkSoft. Bracket annotations with vertical span and crossbars at t=0.5 and t=1.5 UI.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title readable in light cream (t.ink = #F0EFE8 equivalent). Axis labels and tick labels rendered in light color — fully readable against dark background. Eye annotation "Eye H ≈ 0.63 V" uses t.ink — appears light/cream, readable. No dark-on-dark failures detected.
      Data: Green and blue trace colors identical to light render — only chrome flips. Eye openings, rail density, and bracket annotations all visible and clear.
      Legibility verdict: PASS
