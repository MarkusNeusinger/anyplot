review:
  strengths:
  - Sophisticated density-heatmap-style eye diagram using 160 semi-transparent overlapping
    NRZ traces with brand green at opacity 0.09 — density builds naturally through
    additive blending
  - Deterministic LCG RNG with seed 42 ensures reproducible synthetic NRZ signal with
    realistic PCIe-style parameters (jitter_sigma=3% UI, noise_sigma=4% amplitude)
  - All font sizes explicitly set (title 22px, axis 16px, ticks 14px), both renders
    fully readable with proper theme-adaptive chrome tokens
  - Decision level plotLine annotation at 0.5V with label — adds meaningful signal
    interpretation context to the eye diagram
  - 'Excellent Highcharts idioms: turboThreshold:0 for large datasets, states.inactive.opacity:1
    prevents greying, enableMouseTracking:false for performance, marker:disabled for
    clean lines'
  weaknesses:
  - Trace count is 160 (8 patterns × 20 each) which falls below the spec minimum of
    200 overlaid traces; sample density is 50 samples/UI (100 samples over 2 UI) vs
    spec-required 100-200 samples/UI — both are below spec minimums though the visual
    result is still effective
  - The spec calls for hot-color density heatmap coloring (warm colors for high density)
    but the implementation uses single-color opacity blending — the core Highcharts
    bundle lacks a heatmap module but a sequential color ramp via colorAxis could
    partially address this
  - Decision level label uses align:right with x:-8 which places it very close to
    the right plot boundary; on narrow canvases this could be tight, though it passes
    in both renders
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "eye-diagram-basic · javascript · highcharts · anyplot.ai" in dark ink, clearly readable (~55% plot width). X-axis label "Time (UI)" and Y-axis label "Voltage (V)" readable in inkSoft. Tick labels at 0, 0.5, 1.0, 1.5, 2.0 (time) and -0.25 to 1.25 (voltage) clearly readable. Dashed decision-level plotLine at 0.5V with "Decision level" label visible at right edge.
      Data: All 160 traces rendered in brand green #009E73 at opacity 0.09 — additive blending builds density, forming the characteristic eye pattern with a clear eye opening centered around 0.5–1.5 UI.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light text.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels render in light inkSoft tokens against dark background — clearly readable. Tick labels visible in appropriate light color. Grid lines subtle. Decision level plotLine and label visible.
      Data: Colors are identical to light render — same brand green #009E73 at same opacity. Eye diagram shape is the same. The dark surface makes the green traces appear slightly more vibrant, which is expected and not a color shift.
      Legibility verdict: PASS — all chrome correctly theme-adaptive; no dark-on-dark failures detected. Brand green #009E73 reads well on the dark surface.
