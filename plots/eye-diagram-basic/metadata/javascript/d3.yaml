review:
  strengths:
  - Sophisticated hybrid canvas+SVG architecture with per-pixel bilinear interpolation
    between histogram bins — eliminates banding and pixelation in the density heatmap
  - Deterministic LCG RNG with fixed seed 42 produces a fully reproducible, self-contained
    implementation with no network requests
  - Correct Imprint seq colormap (tok.pageBg → tok.seq[0] → tok.seq[1]) maps zero-density
    regions to the page background for seamless blending in both themes
  - Well-chosen dashed reference lines at 0 V and 1 V signal levels plus a center
    line at 1 UI mark the optimal sampling instant without cluttering the plot
  - 'Theme-adaptive chrome is complete: tok.ink for title and axis labels, tok.inkSoft
    for tick text and domain lines — no dark-on-dark failures in the dark render'
  weaknesses:
  - 'SC-02 minor: spec requires 100–200 samples per UI, but 160 samples over the 2
    UI window yields only 80 samples/UI per trace — increase SAMPLES to at least 200
    (100/UI) for spec compliance'
  - 'DE-01/DE-02 ceiling: the plot reads as a well-configured density chart but lacks
    the extra narrative polish (e.g. a short subtitle, an eye-height annotation callout,
    or a colorbar/legend for the density scale) that would push it to publication-ready
    tier'
  - Canvas element is sized in CSS px (iw × ih) without devicePixelRatio compensation
    — at DPR=2 the canvas backing store is 2× upscaled, which is mitigated by bilinear
    interpolation but could be sharper with explicit pixel-density handling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct theme surface.
      Chrome: Title "eye-diagram-basic · javascript · d3 · anyplot.ai" in dark ink at 22px is
        clearly readable, spanning ~65% of canvas width. Y-axis label "Voltage (V)" rotated
        -90° on the left side is fully visible. X-axis label "Time (UI)" centred below the
        plot is clearly readable. Tick labels ("-0.2 V" through "1.2 V" on Y; "0 UI" through
        "2 UI" on X) at 14px are fully legible — all dark text on the cream background with
        no crowding or clipping.
      Data: The density heatmap transitions from the warm cream background (zero density) through
        brand green (#009E73 — tok.seq[0]) to a bright cyan-teal (midpoint overshoot of the
        B-spline interpolator between seq[0]=#009E73 and seq[1]=#4467A3) for high density.
        The characteristic eye-shaped opening is clearly visible in the centre of the 2 UI
        window. Horizontal dashed reference lines at 0 V and 1 V mark the NRZ signal levels.
        A vertical dashed line at 1 UI marks the optimal sampling instant.
      Legibility verdict: PASS — all text is dark on cream, no crowding, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark-theme surface, not pure black.
      Chrome: Title, axis labels, and tick labels all render in light ink (tok.ink / tok.inkSoft)
        against the dark background — no dark-on-dark failure. Every text element is clearly
        readable. The dashed reference lines use tok.inkSoft with opacity, remaining visible
        without overwhelming the heatmap.
      Data: The density heatmap now transitions from the dark page background through the same
        seq color stops. The high-density signal rails and transition zones render as the same
        bright cyan-teal colour seen in the light render — data colour identity confirmed.
        The eye opening appears as the dark background, creating a visually striking contrast
        that is arguably more dramatic than the light render. Horizontal and vertical reference
        lines remain visible.
      Legibility verdict: PASS — all text is light on dark, no dark-on-dark issues detected.
