review:
  strengths:
  - 'Perfect spec compliance: all required eye diagram features implemented correctly
    (density heatmap, NRZ simulation, sigmoid BW-limiting, reference lines, 400 traces,
    2-UI window)'
  - Deterministic LCG RNG ensures reproducibility without browser Math.random()
  - Correct Imprint sequential colormap via tok.seq tokens; full theme-adaptive chrome
    in both renders
  - 'Highly idiomatic D3: direct Int32Array to SVG rect data binding for density heatmap;
    d3.interpolateRgbBasis for multi-stop color interpolation'
  - 'Strong data storytelling: eye opening, density hot-spots at bit levels, dashed
    crosshair reference lines all contribute to signal integrity narrative'
  - 'Perfect data quality: realistic SerDes parameters (noise sigma=5%, jitter sigma=3%
    UI), appropriate NRZ voltage levels'
  weaknesses:
  - 'Vertical banding/striping artifacts throughout the entire heatmap: The 200-bin
    grid over approximately 1420px CSS inner width yields non-integer cell width (approximately
    7.1px per bin). SVG sub-pixel rendering creates regular gaps/overlaps that appear
    as dark vertical stripes — a venetian-blind pattern visible in both renders. Fix:
    replace the SVG rect grid with an HTML5 canvas element for the heatmap layer.
    Draw histogram data to ImageData at pixel level for smooth, artifact-free density
    rendering. Keep all SVG axis/label/reference-line code unchanged.'
  - 'Pixelated/blocky cell texture: At 200x120 bins over a 1420x730px plot area each
    cell is approximately 7x6px, producing a clearly pixelated texture. The canvas-based
    approach resolves this by enabling per-pixel color mapping for a smooth, publication-quality
    heatmap appearance appropriate for an eye diagram.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct theme surface
      Chrome: Title "eye-diagram-basic · javascript · d3 · anyplot.ai" in dark ink at top, clearly visible. Axis labels "Time (UI)" and "Voltage (V)" in dark ink, readable. Tick labels (-0.2V to 1.2V, 0 UI to 2 UI) in secondary dark ink, readable at 14px. Dashed reference lines at 0V, 1V, and 1 UI in secondary ink color. All chrome elements are dark on light — legible.
      Data: Green-to-blue Imprint sequential gradient (tok.pageBg → tok.seq[0] → tok.seq[1]). Signal density regions rendered in teal/green (low density) to blue-green (high density). Eye opening (zero-trace region) appears as the background cream color. Characteristic NRZ eye shape clearly visible with X-shaped crossing at center and open aperture. First series starts from brand green #009E73 (tok.seq[0]).
      Artifact: Prominent vertical banding (venetian-blind striping) throughout entire heatmap from non-integer SVG cell widths (1420px / 200 bins ≈ 7.1px).
      Legibility verdict: PASS — all text readable; eye shape unambiguous; artifact is visual quality issue only

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct dark theme surface
      Chrome: Title and all axis labels/ticks render in light ink (tok.ink / tok.inkSoft) — fully readable against dark background. No dark-on-dark failures observed. Dashed reference lines are light-colored and visible.
      Data: Colors identical to light render — same Imprint sequential green-to-blue gradient. Eye opening now appears as the dark background color, creating effective negative-space eye shape. Hot-spots at 0V and 1V stable bit levels clearly visible as bright green-blue regions.
      Artifact: Same vertical banding pattern as light render, slightly more pronounced on dark background.
      Legibility verdict: PASS — all text readable; data colors identical to light render; no chrome failures
