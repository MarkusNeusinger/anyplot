review:
  strengths:
  - Correct imprint_seq colormap (t.seq[0]→t.seq[1]) applied to z-axis density encoding
    — exactly right for single-polarity continuous data
  - Seeded LCG (_s=42) solves browser's lack of seeded Math.random and produces fully
    deterministic eye diagrams
  - 2D density grid (60×36 Int32Array) + log-density mapping creates recognizable
    eye opening with minimal computation overhead
  - 'NRZ simulation parameters match spec precisely: noise σ=5%, jitter σ=3%, sigmoid
    transitions'
  - Theme-adaptive chrome throughout (t.pageBg, t.ink, t.inkSoft) — both renders pass
    readability check
  weaknesses:
  - 'markerSize: 9 produces dots that nearly fill each 25×20-px density cell, causing
    inter-cell bleed and blurring density gradient — reduce to markerSize 5–6'
  - Grid resolution (TB=60, VB=36) is coarse; increasing to TB=80, VB=48 would yield
    a smoother eye diagram
  - Optional eye height/width annotations absent — even simple reference lines at
    crossing voltages with labels would lift storytelling
