review:
  strengths:
  - Domain-appropriate dark theme with oscilloscope-inspired hot color palette creates
    professional, authentic look
  - Correct and complete NRZ signal simulation with realistic noise, jitter, and bandwidth-limited
    transitions
  - Perfect spec compliance — all required features implemented with proper units
    and title format
  - Clean, well-structured code with proper reproducibility seed
  weaknesses:
  - Vertical banding artifacts in high-density horizontal regions from histogram bin
    aliasing reduce visual polish
  - Custom color palette is not perceptually-uniform (viridis family would be safer
    for accessibility)
  - Heavy reliance on numpy for data processing rather than leveraging plotnine statistical
    capabilities
  - Grid lines could be more subtle or removed to further enhance the dark-theme aesthetic
  image_description: The plot displays an eye diagram on a dark navy/purple background
    (#0d0221). The x-axis is labeled "Time (UI)" ranging from 0.0 to 2.0, and the
    y-axis is labeled "Voltage (V)" with ticks at 0.0, 0.5, and 1.0. The title "eye-diagram-basic
    · plotnine · pyplots.ai" appears in bold white/light text at the top. A density
    heatmap rendered via geom_tile shows trace concentration using a custom hot color
    palette progressing from dark purple (low density) through magenta, red, orange,
    to bright yellow/white (high density). Two characteristic eye openings are visible
    — one per unit interval — with high-density horizontal bands at 0V and 1V levels
    and sigmoid-shaped transitions forming the eye boundaries. A "Trace Density" legend
    on the right maps colors to density values (~50–450). Subtle dark purple grid
    lines are visible on the panel background.
