review:
  strengths:
  - Excellent domain-appropriate dark theme evoking oscilloscope displays
  - Inferno colormap creates clear density visualization with intuitive hot/cold mapping
  - Clean well-structured code with thoughtful signal generation including per-sample
    dither
  - Perfect spec compliance with all required features and correct parameters
  - All font sizes explicitly set for high-resolution output
  weaknesses:
  - Missing eye height/width annotations that would enhance data storytelling
  - Grid lines could be removed entirely for cleaner oscilloscope aesthetic
  - No use of advanced plotnine features like annotate or custom stat layers
  image_description: The plot displays a signal integrity eye diagram on a deep dark
    purple-blue background (#0d0221). Two complete eye-shaped openings span the 2
    unit interval (UI) window on the x-axis (labeled "Time (UI)" with ticks at 0.0,
    0.5, 1.0, 1.5, 2.0). The y-axis shows "Voltage (V)" with ticks at 0.0, 0.5, and
    1.0. The inferno colormap renders trace density — bright yellow/white at the high-density
    0V and 1V stable levels, orange-pink at transitions, fading to dark purple/black
    in the open eye regions. The characteristic eye openings are well-defined with
    clear transitions between bit levels. A "Trace Density" colorbar legend on the
    right shows values from ~25 to ~200+. The title "eye-diagram-basic · plotnine
    · pyplots.ai" appears in bold white at the top. Subtle dark grid lines are visible
    against the dark background.
