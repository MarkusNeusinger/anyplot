      Data: Density colormap #000004 → #009E73 → #C475FD → #F0EFE8. Two eye openings clearly visible. Cyan (#2ABCCD) measurement segments and labels (Eye Height: 0.68 V, Eye Width: 0.79 UI). Colorbar legend on right with elevated #FFFDF6 background.
