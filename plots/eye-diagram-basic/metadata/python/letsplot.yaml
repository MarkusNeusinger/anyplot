review:
  strengths:
  - Domain-appropriate oscilloscope aesthetic (scope-black panel inside warm chrome
    page) is a sophisticated, intentional design choice that elevates the plot beyond
    generic defaults.
  - 'Uses Imprint palette members (#009E73, #C475FD) as colormap anchors and Imprint
    cyan (#2ABCCD) for annotations — palette-aware even in continuous context.'
  - 'Perfect spec compliance: all required features (density heatmap, NRZ simulation
    with noise+jitter, sigmoid transitions, UI-labeled axes, measurement annotations)
    are implemented correctly.'
  - Realistic signal simulation with calibrated noise (5% amplitude) and jitter (3%
    UI) parameters; 7-bit window with interior extraction avoids boundary artifacts.
  - Clean KISS code with correct reproducibility seed; layer_tooltips() with custom
    line/format chains showcases lets-plot's distinctive interactive feature.
  weaknesses:
  - 'VQ-07: Density colormap ["#000004", "#009E73", "#C475FD", "#F0EFE8"] is a custom
    4-stop gradient — does not match the mandated imprint_seq (green->blue) or imprint_div.
    Replace with colors=["#000004", "#009E73", "#4467A3"] to stay Imprint-compliant
    while preserving oscilloscope aesthetic.'
  - 'VQ-01/VQ-02: Annotation text (geom_text(size=4)) is small and the Eye Height
    label is crowded near the crosshair junction. Increase to size=5 and shift height
    label further right (height_x + 0.08) for breathing room.'
  - 'DE-03: No nominal voltage reference lines (0 V = LOW, 1 V = HIGH). Adding two
    geom_hline dashed lines at y=0 and y=1 in INK_SOFT color with low alpha would
    reinforce the signal-integrity story.'
  image_description: |-
