review:
  strengths:
  - 2D density heatmap via sns.histplot with 2D binning is the optimal seaborn technique
    for eye diagram — shows eye opening shape and trace concentration simultaneously
  - imprint_seq colormap correctly selected for single-polarity density data; amber
    anchor correctly used for engineering annotations
  - 'Comprehensive NRZ simulation: Gaussian bandwidth-limited transitions, additive
    noise (sigma=5%), random jitter (sigma=3%), and 400 overlaid traces'
  - Theme-adaptive chrome applied to all elements including colorbar ticks, colorbar
    label, spine colors, and annotation colors
  - Correct savefig call without bbox_inches=tight — canvas dimensions preserved at
    3200x1800
  weaknesses:
  - 'Eye annotation elements are too thin/small: amber dashed rectangle at linewidth=0.9
    and arrows at linewidth=1.0 are barely visible especially in light render; H:
    / W: text at fontsize=6.5 and Logic 0/Logic 1 labels at fontsize=7 are very small
    — increase to at least 9pt and linewidths to 1.5-2.0'
  - Binned heatmap has a somewhat pixelated appearance due to discrete 300x180 bins
    showing gaps between cells; consider using kde=True or overlaying a kdeplot for
    smoother density rendering
