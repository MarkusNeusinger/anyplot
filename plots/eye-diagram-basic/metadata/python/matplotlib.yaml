  strengths:
  - Correct density heatmap technique using 2D histogram + Gaussian smoothing -- the
    right approach for eye diagrams
  - Imprint sequential colormap (imprint_seq) applied correctly to single-polarity
    density data
  - 'Perfect theme adaptation: both light and dark renders are fully readable with
    no chrome failures'
  - Eye height and eye width annotations directly on the diagram provide concrete
    signal quality metrics
  - Full spec compliance including sigmoid transition model and NRZ noise/jitter simulation
