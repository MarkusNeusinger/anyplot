  weaknesses:
  - No colorbar for the density axis -- readers cannot map color to trace count, reducing
    quantitative value of the heatmap
  - Missing subtle horizontal reference lines at 0 V and 1 V nominal signal levels
    -- would help readers interpret voltage offsets without cluttering the heatmap
  - Eye H annotation positioned very close to the right axis edge (x=1.745) -- consider
    shifting slightly left or moving the label inside the eye opening to reduce crowding
  - 'No grid at all: even a very faint y-axis-only grid (alpha=0.1) would help readers
    estimate voltage deviation without competing with the heatmap'
