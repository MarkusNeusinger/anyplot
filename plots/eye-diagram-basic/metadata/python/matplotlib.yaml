  strengths:
  - 3-stop Imprint sequential colormap (green→cyan→blue) produces richer heatmap depth
    than the basic 2-stop version while staying within palette constraints
  - Log-scaled histogram with Gaussian smoothing and masked low-density background
    delivers a crisp, professional eye diagram with clean eye openings
  - Eye height and width annotations are well-placed in the second eye opening without
    crowding the visualization
  - 'Perfect spec compliance: all required features (noise, jitter, sigmoid transitions,
    measurements) correctly implemented'
  - Reproducible seed, clean imports, correct canvas dimensions, theme-adaptive chrome
    in both renders
  weaknesses:
  - Annotation text at 7pt may be too small for mobile-scaled views (~400 px); consider
    raising to 8–9pt
  - Y-axis grid alpha at 0.10 falls below the style guide target of 15–25%; marginally
    too faint on both renders
