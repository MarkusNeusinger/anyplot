      Data: Density heatmap rendered as scatter dots in Imprint sequential palette from #009E73 (brand green, lowest density) to #4467A3 (blue, highest density). Two eye-shaped openings are clearly visible at ~0.5 UI and ~1.5 UI center positions. The eye apertures show the warm off-white background through them, confirming correct empty-region rendering. Two amber (#DDCC77) annotation dots visible at the eye height measurement positions (~0.5 UI on the V axis) — small but distinguishable.
