review:
  strengths:
  - 'Excellent spec compliance: NRZ signal simulation with sigmoid transitions, Gaussian
    noise, and jitter; density heatmap via Imprint sequential (#009E73→#4467A3); eye
    height/width annotations using amber anchor — all required features delivered'
  - 'Correct palette application: Imprint sequential for continuous density data,
    amber (#DDCC77) for annotation markers — proper semantic anchor usage with no
    custom hexes'
  - 'Theme-adaptive chrome via pygal Style object is correct in both renders: #FAF8F1
    light background, #1A1A17 dark background, foreground tokens for text — both legibility
    checks pass'
  - Clean code with seed=42 reproducibility, 4-pass box-filter density smoothing,
    and both PNG + HTML outputs; KISS structure with no functions or classes
  - Monospace font ('Courier New') is a well-considered choice for a signal integrity
    / telco engineering chart — reinforces the technical domain
  weaknesses:
  - Scatter-dot density approach (dots_size=5 over 240×140 bins) creates a slightly
    pixelated appearance — at 3200px wide, each bin is ~13px but the dot diameter
    is only 5px, leaving gaps in sparse zones; increase dots_size to ~12 or reduce
    bin count to n_xbins=120, n_ybins=70 so each cell is fully covered
  - interpolate='hermite' is set on the XY chart but has no visual effect because
    stroke=False globally — hermite interpolation only applies when connecting dots
    with lines; remove this dead parameter to keep the code clean
  - 'Design storytelling is limited to two amber annotation dots: the eye opening
    itself could be highlighted further with a subtle fill or border around the eye
    aperture region to make the ''open eye'' the clear focal point'
