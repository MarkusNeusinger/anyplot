review:
  strengths:
  - Correct eye diagram chart type using geom_bin2d density heatmap — idiomatic plotnine
    approach for dense overlapping traces
  - Imprint imprint_seq gradient correctly applied (green low-density → blue high-density)
    matching palette rules for continuous data
  - Both eye height and eye width annotations with color-coded lavender and ochre
    indicators as spec requires
  - 'Full theme-adaptive chrome: backgrounds, title, axis, tick, legend colors all
    flip correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Reproducible with np.random.seed(42), flat KISS script, all imports used
  - Smooth transitions via moving-average kernel, realistic NRZ signal simulation
    with per-bit jitter and Gaussian noise
  weaknesses:
  - Annotation text (size=4mm ≈ 11pt) is on the small side for the large canvas —
    positioned in the eye opening where contrast against near-white/near-black background
    is limited; consider size=5-6 and adding a semi-transparent background rect
  - geom_bin2d with high bin count (250×150) produces a noticeably blocky pixelated
    edge at the transitions; a smoother imprint_seq density could be achieved with
    finer bins or stat_density_2d, though bin2d is idiomatic
  - No explicit alpha on the bin2d geom — for extreme density areas, a slight alpha
    < 1 could soften the hard-edge saturation at the rail peaks
  - Title fontsize adaptive formula applied but 12pt base with 67-char scaling is
    fine; could consider slightly bolder or larger for visual hierarchy at small viewports
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, visible throughout margins and in the two eye openings
      Chrome: Title "eye-diagram-basic · python · plotnine · anyplot.ai" in bold dark (#1A1A17) text, well-proportioned (~70% width). Y-axis label "Voltage (V)" and X-axis label "Time (UI)" in dark INK, clearly readable. Tick labels (0.0, 0.5, 1.0, 1.5, 2.0 on X; 0.0, 0.5, 1.0 on Y) in INK_SOFT, visible. Legend "Trace Density" with 50-200 scale visible at right.
      Data: imprint_seq gradient green (#009E73, low density) → blue (#4467A3, high density). Two eye openings clearly visible at ~0–1 UI and ~1–2 UI windows. The "1" and "0" rails show high blue density; transitions show green; eye openings show the PAGE_BG off-white. Lavender (#C475FD) dashed vertical line with "Eye Height 0.87 V" annotation; ochre (#BD8233) dashed horizontal line with "Eye Width 0.86 UI" annotation — both in the first eye opening.
      Legibility verdict: PASS — all major text elements readable; annotation text (lavender/ochre in white eye opening) is small but distinguishable

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, fills margins and eye openings
      Chrome: Title and axis labels flip to light (#F0EFE8 / #B8B7B0) — all clearly readable against dark background. No dark-on-dark failures detected. Tick labels, legend text all light-colored and visible.
      Data: Density colors identical to light render — same green-to-blue gradient, same eye shape. Eye openings show near-black panel background correctly. Lavender and ochre annotations unchanged, visible against the dark background.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome elements read well on #1A1A17 surface
