review:
  strengths:
  - 'Correct and idiomatic plotnine approach: geom_bin2d with after_stat(''count'')
    elegantly encodes trace density as a 2D histogram, perfectly suited for an eye
    diagram visualization'
  - 'Full spec compliance: all required features implemented including density heatmap
    coloring, UI time axis, signal levels on voltage axis, NRZ simulation with realistic
    noise and jitter, and optional eye height/width annotations'
  - 'Excellent data storytelling: quantitative annotations for eye height (0.87 V)
    and eye width (0.86 UI) with color-coded dashed lines guide the reader directly
    to key signal quality metrics'
  - 'Proper Imprint palette compliance: imprint_seq gradient (brand green #009E73
    → blue #4467A3) for the continuous density heatmap, all theme-adaptive chrome
    tokens correctly set for both light and dark renders'
  - 'Perfect code quality: KISS structure with np.random.seed(42), clean imports,
    no functions or classes, correct output filenames'
  - 'Clean visual style: theme_void() removes all spines and grid for an uncluttered
    engineering visualization, generous whitespace, explicit font sizes throughout'
  weaknesses:
  - 'Blocky/pixelated heatmap edges: geom_bin2d with bins=(160, 100) produces jagged,
    staircase-like boundaries at the eye opening edges. Increasing to bins=(240, 150)
    or bins=(300, 200) would yield smoother density boundaries and improve visual
    sophistication (DE-01, DE-02)'
  - 'Eye opening contrast in dark render: The empty eye opening areas render as near-black
    (#1A1A17) background on the dark theme. While still distinguishable from the surrounding
    teal/green density data, the contrast is lower than the striking white opening
    in the light render. Adding a faint panel_grid or a very subtle inner border around
    the plot area would help in dark mode'
  - 'Data extends slightly beyond 2.0 UI: Jitter pushes some time values past the
    nominal 2 UI window, causing the heatmap to extend to ~2.1 UI. Clipping the DataFrame
    to [0, 2] before plotting with `df = df[(df[''time''] >= 0) & (df[''time''] <=
    2)]` would contain the data within the expected range (VQ-05)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Bold dark title "eye-diagram-basic · python · plotnine · anyplot.ai" fully visible at top, spanning ~65% of canvas width. Y-axis label "Voltage (V)" and X-axis label "Time (UI)" in dark ink, clearly readable. Tick labels (0.0, 0.5, 1.0, 1.5, 2.0 on x; 0.0, 0.5, 1.0 on y) all readable in darker secondary-ink color. Legend "Trace Density" with gradient color bar on the right — clearly labeled.
      Data: 2D density heatmap rendered with imprint_seq gradient (brand green #009E73 for low-density regions at the outer perimeter, transitioning through teal to blue #4467A3 for high-density regions near bit-transition boundaries). Two clear eye openings visible as large white rectangular spaces in the left half and right half of the 2 UI window. Lavender (#C475FD) dashed vertical line marks Eye Height (0.87 V) at t=0.5 UI with annotation text. Ochre (#BD8233) dashed horizontal line marks Eye Width (0.86 UI) at V=0.5 with annotation text. Data extends very slightly beyond x=2.0 UI due to jitter.
      Legibility verdict: PASS — all text readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in bold near-white text, fully visible. Axis labels and tick labels rendered in light secondary-ink color (#B8B7B0), all readable against the dark background. Legend "Trace Density" box rendered in elevated dark fill (#242420) with light text — readable. No dark-on-dark text failures observed.
      Data: Density heatmap uses identical imprint_seq colors as the light render (green → blue gradient) — data colors are unchanged between themes, only chrome flips. Eye openings appear as near-black (#1A1A17) voids surrounded by the green/teal density data, with slightly lower contrast than the white openings in the light render but still clearly distinguishable. Lavender and ochre annotation lines and text remain identically colored and visible on the dark background.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures; brand green #009E73 visible in both renders
