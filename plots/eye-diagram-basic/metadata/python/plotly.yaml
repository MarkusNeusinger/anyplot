    but the overall aesthetic lacks additional polish such as a descriptive title
    prefix (e.g. Signal Integrity Eye Diagram ·) or a faint horizontal reference line
    at the 0 V and 1 V logic levels to anchor the voltage axis visually'
  - Colorbar title uses HTML line-break (Trace<br>Density) which renders correctly
    in HTML export but may not render in all static contexts — prefer a plain-space
    label or vertical orientation
