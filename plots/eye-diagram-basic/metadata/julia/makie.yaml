review:
  strengths:
  - Correct density heatmap eye diagram with clear two-eye openings and meaningful
    green-to-blue (imprint_seq) density gradient
  - All font sizes explicitly set with full theme-adaptive chrome — titlecolor, xlabelcolor,
    ylabelcolor, tick colors all properly wired to INK/INK_SOFT tokens in both themes
  - 'Perfect spec compliance: 500 NRZ traces, 150 samples/UI, noise_sigma=5%, jitter_sigma=3%,
    sigmoid (raised-cosine-like) transitions, log-scale density'
  - 'Clean KISS code structure: theme tokens → simulation → 2D histogram → heatmap
    → save; reproducible with Random.seed!(42)'
  - NaN cells rendered as PAGE_BG (theme-adaptive) gives clean eye openings that blend
    with the canvas surface — intentional and correct
  weaknesses:
  - Heatmap bin resolution (160x120) produces visible blocky pixelation at eye opening
    boundaries — increase N_BINS_T to at least 300 and N_BINS_V to at least 200 for
    smoother density rendering on the 3200x1800 canvas
  - 'No data storytelling layer: the eye diagram is clear but passive — the viewer
    must self-interpret the open eye pattern; consider adding optional eye-height
    annotation (dashed horizontal lines at 20% and 80% voltage) and eye-width annotation
    (dashed vertical lines at 0.5 and 1.5 UI) as referenced in the spec''s ''Optionally
    annotate'' note'
  - DE-03 limited by absence of visual hierarchy markers — a brief subtitle or reference
    lines would contextualize the clean eye opening as evidence of good signal integrity
