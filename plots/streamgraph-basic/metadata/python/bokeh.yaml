review:
  strengths:
  - 'Complete spec compliance: symmetric baseline streamgraph with smooth flowing
    curves and all required features'
  - 'Correct Okabe-Ito palette in canonical order with brand green #009E73 as first
    series (Pop)'
  - 'Full theme adaptation: background, borders, text, and legend correctly token-mapped
    for both light and dark renders'
  - Interactive HoverTool displaying genre name on hover — showcases Bokeh distinctive
    interactivity
  - HTML + PNG dual output following bokeh library requirements with proper headless
    Chrome screenshot via Selenium
  - Clean reproducible code with np.random.seed(42), no functions/classes, all imports
    used
  weaknesses:
  - Polynomial fitting (degree 10 with np.polyfit/np.polyval) used for smoothing rather
    than spline interpolation — high-degree polynomials can cause edge artifacts (Runge
    phenomenon) at the leftmost and rightmost time points
  - Streaming bands extend close to the top and bottom edges of the plot viewport
    with minimal visual breathing room
  - No visual hierarchy or focal-point emphasis — no annotation callout for the most
    prominent trend, no emphasis on the largest category
