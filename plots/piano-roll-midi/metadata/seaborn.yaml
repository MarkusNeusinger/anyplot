  image_description: The plot displays a MIDI piano roll heatmap visualization with
    pitch names (E3 to G#5) on the y-axis and measure labels (M1-M8) on the x-axis.
    Notes are rendered as colored rectangular cells at sixteenth-note resolution using
    a custom blue-to-purple-to-red sequential colormap mapping velocity from ~40 (dark
    blue, soft) to 127 (bright red, loud). Long sustained chord tones appear as wide
    horizontal blue/dark-purple bands in the lower register (C4, E4, G4, A3, F3, etc.),
    while shorter, louder melody notes appear as narrower warm pink/red cells in the
    upper register (D5-G5). Background rows alternate between white and light gray
    to distinguish black keys from white keys. Vertical grid lines mark beats (thin,
    subtle) with thicker lines at measure boundaries. A colorbar on the right shows
    "Velocity (MIDI 0-127)" ranging from 40 to 127. All spines are removed. The title
    reads "piano-roll-midi · seaborn · pyplots.ai". The custom colormap successfully
    eliminates the white midpoint issue from the previous attempt, making all velocity
    levels clearly distinguishable from the background.
