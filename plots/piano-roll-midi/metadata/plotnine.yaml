  image_description: 'The plot displays a MIDI piano roll visualization on a 16:9
    canvas. The background features alternating horizontal bands in light lavender
    (#f8f7fc) for white keys and slightly darker purple (#e6e4ef) for black keys.
    Horizontal note rectangles are positioned by pitch (y-axis, labeled with note
    names like C3, E3, G3, C4, etc.) and time (x-axis, labeled in beats 0-16). Note
    color maps velocity using the inferno colormap: dark purple/black for soft notes
    (~60), through red/orange for medium, to bright yellow for loud notes (~115).
    Vertical dotted lines mark beats, solid lines mark measure boundaries (0, 4, 8,
    12, 16). Chord labels (I (C), IV (F), V (G), I (C)) appear at the top in italic
    gray text. Dynamic markings (mf, ff, dim., p) are shown below the piano roll.
    A red italic "← climax" annotation marks the C5 note at beat 6-7.5. Dashed horizontal
    lines separate octave boundaries. The velocity colorbar legend on the right shows
    "Velocity (MIDI 0-127)" with range 60-120. The title reads "piano-roll-midi ·
    plotnine · pyplots.ai" in bold dark text.'
