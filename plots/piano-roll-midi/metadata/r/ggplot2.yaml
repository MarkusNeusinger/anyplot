review:
  strengths:
  - 'Perfect spec compliance: all required piano roll features (keyboard background,
    note names, two-weight grid, velocity colormap, auto-fitted pitch range) are present
    and correct'
  - Musical dynamics labels (pp/p/mf/f/ff) on the velocity colorbar — domain-appropriate
    and reader-friendly
  - Correct Imprint seq colormap (#009E73→#4467A3) for velocity; both renders are
    fully theme-adaptive with no chrome failures
  - Rich, realistic musical data with a clear dynamic arc (mf→ff→p) that creates natural
    visual hierarchy through color
  - Clean idiomatic ggplot2 grammar-of-graphics composition with properly weighted
    beat/measure grid lines
  weaknesses:
  - 'DE-03 below potential: the dynamic climax at m6–m7 is visible in color but not
    accented — add a subtle translucent highlight or annotation near the climax measure
    to guide the viewer to the dynamic peak'
  - Y-axis tick labels at size 7 are at the minimum acceptable threshold; increase
    axis.text.y from 7 to 8 for better mobile readability
  - Two helper functions (midi_to_name, is_black_key) deviate from strict KISS — could
    be inlined as named vectors/logical masks
  image_description: |-
