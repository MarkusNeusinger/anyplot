review:
  strengths:
  - 'Perfect spec compliance: all four required features (note names, black/white
    key rows, beat+measure grid differentiation, velocity colormap) correctly implemented'
  - Musically authentic data with realistic C-major progression, proper MIDI note
    numbers, and convincing dynamic arc (mf→ff climax→p resolution)
  - 'Effective storytelling: climax highlight overlay + ff annotation create a clear
    narrative focal point'
  - Correct Imprint sequential palette (green→blue) for continuous velocity data;
    full theme-adaptive chrome with no dark-on-dark or light-on-light failures
  weaknesses:
  - 'Piano keyboard row contrast is low in both themes (light: #EBE7DC vs #D3CDB8;
    dark: #222220 vs #1D1D1B) — spec asks for white and dark alternation but rows
    look nearly identical; increase contrast (e.g., light theme KEY_BLACK → #C8C2AE)
    for better piano keyboard readability'
  - ff annotation at size=2.5 (~7pt on 3200×1800 canvas) is small — bump to size=3.5–4
    for better catalog-scale visibility
  - Beat subdivision lines (alpha=0.35, linewidth=0.12) may be imperceptible on some
    displays — raise alpha to 0.5 or linewidth to 0.18
