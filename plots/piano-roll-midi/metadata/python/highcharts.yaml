    label visually collides with 'C – Am – F – G...' — fix by moving chord labels
    to y=168 or increasing marginTop to 180 and setting chord labels at y=172
  - 'Continuous velocity colormap uses a custom teal→amber→crimson gradient instead
    of the required imprint_seq or imprint_div — spec explicitly asks for ''blue for
    piano/soft to red for forte/loud'' which maps naturally to reversed imprint_div
    (#4467A3 at velocity=60, #FAF8F1/#1A1A17 at midpoint, #AE3030 at velocity=127);
    swap the custom gradient for reversed imprint_div stops to satisfy both spec semantics
    and palette policy'
  - 'Categorical legend colors (#d94040 for Melody, #2a7a8a for Bass, #c0a030 for
    Harmony) do not follow the Imprint palette — first series (Melody) must use #009E73;
    assign Imprint palette positions 1–3 (#009E73, #C475FD, #4467A3) as the series
    legend colors'
