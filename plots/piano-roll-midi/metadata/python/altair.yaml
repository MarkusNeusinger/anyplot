review:
  strengths:
  - 'Excellent spec compliance — all required features present: piano roll layout,
    note names on Y-axis, alternating piano key row shading, dashed beat grid + solid
    measure boundary lines, and Imprint sequential velocity colormap'
  - Five-layer Altair composition (background rows, beat grid, measure grid, note
    bars, layer labels) is idiomatic and sophisticated
  - Musical layer labels ('Bass', 'Chords', 'Melody') at right margin add strong data
    storytelling and visual hierarchy
  - Interactive legend selection (layer_selection) and HTML brush export demonstrate
    full use of Altair's distinctive interactivity features
  - Theme-adaptive chrome correctly threaded through all elements — both light (#FAF8F1)
    and dark (#1A1A17) renders are fully readable with appropriate text colors
  - Measure labels (M1–M9) using labelExpr is a thoughtful UX detail that makes beat
    positions immediately interpretable
  - Canvas correctly padded to 3200×1800 with PIL; fail-loud logic if vl-convert overshoots
    is a production-quality guard
  weaknesses:
  - Y-axis tick label fontsize=9 is on the small side for a 40-row piano roll; with
    4× scale_factor this is ~36 source pixels — readable on desktop but tight on mobile
    at 400px width; consider raising to fontSize=10 to match the X-axis tick labels
  - 'Black key / white key row contrast is very subtle in the dark render (#1A1A17
    vs #242420 differ by only ~14 luminance units); the piano keyboard metaphor could
    be clearer with a slightly stronger delta — consider #2A2A26 for white-key rows
    in dark mode'
  - The velocity colormap direction (green=soft, blue=loud) is counterintuitive relative
    to most DAW conventions (warm=loud, cool=soft); while Imprint sequential is correct,
    a note or a reversed domain could better serve musical semantics
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "piano-roll-midi · python · altair · anyplot.ai" in bold dark text, centered, clearly readable. Y-axis label "Pitch" and X-axis label "Measure" in dark ink, readable. Y-axis tick labels (G#2 through G#5 note names) at fontSize=9 — small but readable. Measure labels M1–M9 at fontSize=10 — clearly readable. Velocity colorbar with "Velocity" title and labels "127"/"40" in dark text — all visible.
      Data: Note bars rendered in Imprint sequential colormap — green (#009E73) for low velocity (~40) to blue (#4467A3) for high velocity (~127). Alternating row shading: white-key rows at #F0EDE6, black-key rows at #D8D4CC — subtle but visible piano keyboard layout. Dashed beat grid lines at opacity=0.25 and solid measure boundary lines at opacity=0.5 both clearly rendered. Layer labels "Melody", "Chords", "Bass" in italic bold at right margin — readable.
      Legibility verdict: PASS — all text readable in light theme, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light text (#F0EFE8) clearly visible against dark background. Y-axis label "Pitch" and X-axis label "Measure" in light ink — readable. Y-axis tick labels in light gray (#B8B7B0) — readable. Measure labels in light gray — readable. Velocity colorbar legend text in light tones — readable. Layer labels "Melody", "Chords", "Bass" in italic, readable. No dark-on-dark text failures detected.
      Data: Note bar colors are identical to light render — same green-to-blue gradient confirming only chrome flips between themes. Alternating row shading (white-key rows #242420 vs black-key rows #1A1A17) is very subtle in dark mode — distinguishable on close inspection but less prominent than the light render.
      Legibility verdict: PASS — all text readable in dark theme, no dark-on-dark failures.
