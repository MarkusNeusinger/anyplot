review:
  strengths:
  - Piano-key alternating backgrounds with correct theme adaptation (WHITE_KEY_BG/BLACK_KEY_BG
    tokens) — genuinely distinctive domain-aware design
  - Three-tier grid hierarchy (dotted beat lines, solid measure boundaries, dashed
    octave lines) creates elegant visual structure
  - Chord progression labels (I, IV, V, I) and dynamic markings (mf, ff, dim., p)
    provide real musical narrative context
  - 'Imprint sequential colormap (#009E73 soft → #4467A3 loud) applied correctly for
    velocity encoding — proper imprint_seq use'
  - 'Complete spec compliance: note names on Y-axis, velocity colorbar, beat/measure
    grid, pitch range auto-fitted, all required features present'
  - Flat KISS code structure with all font sizes explicitly set via element_text —
    no functions or classes, fully reproducible with hardcoded data
  - Climax annotation (#AE3030 italic) correctly highlights the musical peak at C5
    in measure 2
  - Both themes render correctly with no dark-on-dark or light-on-light failures —
    all chrome tokens thread through properly
  weaknesses:
  - 'In dark render, black-key rows (#0D0D0B) against the #1A1A17 background provide
    very little contrast — the piano key distinction is barely perceptible in dark
    mode, making the chromatic structure hard to read. Consider boosting BLACK_KEY_BG
    dark value slightly (e.g. #151510) while keeping it below #1A1A17.'
  - 'LM-02: The plotnine implementation uses the grammar of graphics well but a piano
    roll of this type can be replicated in matplotlib with similar effort — no distinctively
    plotnine-only feature (e.g. stat_* transforms, facet_grid, position adjustments)
    is leveraged.'
  - 'DE-03: The data storytelling through chord labels and dynamic markings is good
    but the visual hierarchy between the melody notes (higher pitch, high velocity)
    and accompaniment chords (lower pitch, lower velocity) is implicit rather than
    visually reinforced — e.g., a subtle size or alpha difference between melody and
    bass notes would strengthen the focal point.'
