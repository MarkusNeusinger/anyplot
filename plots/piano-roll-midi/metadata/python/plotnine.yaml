      Background: Warm near-black #1A1A17 — correct. Row alternation is present: white-key rows (#272720) are subtly lighter than the background, black-key rows (#0D0D0B) are darker — nearly invisible at #0D0D0B. The piano key distinction is much more subtle in dark mode than light mode.
