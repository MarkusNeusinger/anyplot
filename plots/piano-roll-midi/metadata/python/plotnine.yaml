    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct. The piano roll rows alternate between two subtle warm grays: lighter (#EDE9DE) for white keys and slightly darker (#D8D4C8) for black keys. The contrast between these two shading values is clearly visible and creates the piano-keyboard-style visual structure.
      Chrome: Bold title "piano-roll-midi · python · plotnine · anyplot.ai" is readable in dark #1A1A17 ink. Y-axis tick labels (C3, G3, C4, G4, C5) and X-axis tick labels (0, 4, 8, 12, 16) are clearly readable in #4A4A44 (INK_SOFT). X-axis label "Time (beats)" and Y-axis label "Pitch" are readable in #1A1A17. Chord labels (I (C), IV (F), V (G), I (C)) and dynamic markings (mf, ff, dim., p) are visible in muted ink tones. Velocity colorbar labeled "Velocity" with 60/80/100/120 ticks is readable.
      Data: Note rectangles rendered from #009E73 (green, low velocity ~60) to #4467A3 (blue, high velocity ~115). The C5 "climax" note at beat 6–7.5 is deep blue (velocity 115), clearly the peak. Bass notes (C3, E3, G3) are rendered in mid-green. Melody notes show the crescendo to climax and subsequent diminuendo. "← climax" annotation in #AE3030 italic marks the peak. Measure lines (solid), beat lines (dotted), octave lines (dashed) provide clear structural grid.
      Legibility verdict: PASS — all text readable, correct theme colors throughout.

