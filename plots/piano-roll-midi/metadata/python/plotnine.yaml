      Data: Note rectangle colors are identical to light render (#009E73 to #4467A3 gradient) — Imprint data colors are theme-independent, confirmed. The "← climax" annotation in #AE3030 is visible against the dark background. Measure and beat grid lines are visible as slightly lighter/darker lines.
      Legibility verdict: PASS — all text readable with appropriate light-on-dark chrome. Minor note: black-key row distinction (#0D0D0B vs #1A1A17 background) is barely perceptible in dark mode.
