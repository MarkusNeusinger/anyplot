review:
  strengths:
  - SVG post-processing for alternating black-key row shading is technically impressive
    and uniquely leverages pygal's SVG-first architecture
  - Musically authentic D-minor jazz ii-V-I-vi dataset with three-layer texture (bass,
    chords, melody) covering all spec-required aspects
  - Semantic-exception velocity coloring (cool=soft to warm=loud) correctly applies
    Imprint palette in a musically meaningful order as the spec requests
  - 'Both light and dark themes adapt correctly: title, labels, tick marks, and background
    switch while data colors stay identical across themes'
  - 'Perfect Code Quality: deterministic, no unnecessary abstractions, graceful SVG
    degradation, correct output files (PNG + HTML)'
  weaknesses:
  - 'Missing per-beat grid lines within measures: spec requires beat-level (quarter-note)
    vertical grid divisions with stronger lines at measure boundaries; currently only
    measure-level lines are drawn (x_labels every 4 beats). Add beat ticks at every
    1-beat interval with a thinner/muted stroke and keep the 4-beat measure lines
    more prominent.'
  - 'Design Excellence is limited: DE-02 retains default pygal spines and lacks clear
    typographic hierarchy. DE-03 misses opportunity to emphasize dynamic climax (measures
    3-4 G7 dominant tension with ff notes) through visual emphasis such as stroke-width
    variation per velocity band.'
  - Dense Y-axis (33 pitch rows) reduces mobile legibility at ~400px; consider showing
    only natural-note labels (C4, D4, E4...) by default and using subtler markers
    for sharps/flats.
  image_description: |-
