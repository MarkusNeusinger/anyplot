review:
  strengths:
  - Piano roll aesthetic is well-executed using pygal.XY with thick stroke (stroke_width=38)
    to simulate horizontal note bars — creative workaround for a library without native
    gantt/bar-over-pitch support
  - SVG post-processing injects black-key row shading, beat subdivision lines, and
    measure boundary lines that faithfully mirror DAW piano roll conventions
  - G7 dominant climax highlight (subtle amber wash over beats 8-16) is a polished
    data-storytelling touch that guides the viewer to the harmonic tension peak
  - Velocity color scheme (cool blue→warm red across 5 Imprint palette members) follows
    the spec's explicit blue=soft / red=loud convention and uses only canonical palette
    hexes
  - Full 3-layer jazz arrangement (bass/chord/melody) across an 8-measure ii-V-I-vi
    progression demonstrates realistic, musically correct data
  - 'Both themes render correctly: warm off-white (#FAF8F1) in light, near-black (#1A1A17)
    in dark; all chrome tokens flip; data colors stay identical across themes'
  - 'Perfect spec compliance: note names on Y-axis, alternating black-key row shading,
    beat/measure grid lines, velocity-to-color mapping, pitch range auto-fit to data'
  weaknesses:
  - Y-axis has 33 pitch labels for the full A2-E5 range — at major_label_font_size=44
    they are densely packed; consider thinning to white-key pitches only (C, D, E,
    F, G, A, B) to reduce crowding without losing context
  - 'CQ-04: SVG regex post-processing (~80 lines) adds significant maintenance complexity;
    the graceful-degradation try/except masks errors silently — if the inject logic
    breaks, no visual indication is given'
  - 'VQ-01: Y-axis tick labels in both renders are legible but noticeably small relative
    to the chart area; increasing major_label_font_size from 44 to ~52 would improve
    mobile readability'
  - The SVG row-shading uses x='0' anchoring rather than the actual plot-area left
    edge extracted from v_guides — on charts with wider left margins this could misalign
    the shading rectangles
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. Plot area matches the page surface.
      Chrome: Title "piano-roll-midi · python · pygal · anyplot.ai" is clearly readable in dark ink at the top. Y-axis label "Pitch" and X-axis label "Time (beats)" are readable in dark ink. X-axis tick labels (0, 4, 8, 12, 16, 20, 24, 28, 32) are clear. Y-axis pitch-name labels (A2 through E5) are small but legible — densely packed due to 33 MIDI pitches in range.
      Data: Five velocity bands rendered as thick horizontal line-segments (acting as filled bars): pp (65-74) in Imprint blue #4467A3, p (75-84) in cyan #2ABCCD, mp (85-94) in brand green #009E73, f (95-104) in ochre #BD8233, ff (105-115) in matte red #AE3030. Row shading (subtle warm tan) marks black-key rows. Beat subdivision dashed lines and solid measure boundary lines create a DAW-style grid. A very subtle amber wash covers the G7 dominant measures (beats 8-16).
      Legibility verdict: PASS — all text elements are readable against the warm off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black. Plot area matches the dark page surface.
      Chrome: Title readable in light cream text. Y-axis "Pitch" and X-axis "Time (beats)" labels visible in light color. X-axis tick numbers and Y-axis note-name labels are visible against the dark background — no dark-on-dark failure observed. Black-key row shading shows as slightly darker bands on the near-black background (subtle but present).
      Data: Data colors are visually identical to the light render (Imprint palette positions stay constant): blue pp bars, cyan p bars, green mp bars, ochre f bars, red ff bars. Legend at bottom is readable in light text. The amber climax wash is even more subtle in dark mode (rgba opacity reduced to 0.07 vs 0.10 in light).
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures detected.
