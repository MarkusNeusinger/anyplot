      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "piano-roll-midi · python · pygal · anyplot.ai" in dark ink — readable. Y-axis labels (A2–F5, 33 pitch rows) in dark ink — dense but legible at full resolution. X-axis "Time (beats)" label and tick labels (0,4,8,...32) — readable.
      Data: 5 velocity bands as thick colored horizontal segments — pp (65-74) in #4467A3 steel blue, p (75-84) in #2ABCCD cyan, mp (85-94) in #009E73 brand green, f (95-104) in #BD8233 ochre, ff (105-115) in #AE3030 matte red. Alternating beige row shading marks piano black-key positions.
