review:
  strengths:
  - Sophisticated custom Chart.js plugin using beforeDraw/afterDraw with canvas2D
    coordinate mapping via scale.getPixelForValue — a non-trivial technique that correctly
    implements a chart type not natively supported by Chart.js
  - Imprint sequential palette (green→blue via t.seq) correctly applied to continuous
    velocity data; both themes render with theme-adaptive chrome and identical data
    colors
  - 'Musically accurate 8-measure classical phrase in C major with full feature coverage:
    whole/half/quarter/eighth/16th note durations, simultaneous chords, bass+melody
    layers, authentic MIDI velocity ranges'
  - Beat vs. measure line strength distinction (0.5px vs 1.5px) shows musical understanding;
    black key alternating row shading uses theme-correct opacity tokens
  - Velocity colorbar with ppp/fff dynamic labels provides intuitive legend for the
    continuous color encoding; alpha blending (0.60–1.00) adds depth to the note rectangles
  - 'All spec requirements met: note names on Y-axis (white keys only, musically correct),
    auto-fitted pitch range, velocity-to-color mapping using imprint_seq'
  - Deterministic hard-coded data, animation:false, no imports — clean idiomatic Chart.js
    structure
  weaknesses:
  - Velocity colorbar font set to '12px sans-serif' in canvas2D context — at Chart.js
    devicePixelRatio=2 this renders as ~24px physical on a 3200px canvas, which is
    smaller than the 14px tick labels and may be illegible when scaled to mobile widths;
    increase to at least 14px CSS
  - 'Note border color in dark theme uses ''rgba(0,0,0,0.55)'' (always black) — on
    the near-black #1A1A17 background, black borders on dark note fills reduce note
    edge definition; use ''rgba(240,239,232,0.35)'' for dark theme to match other
    theme-adaptive strokes'
  - 'Bottom layout padding (65px) is tight for the colorbar area: cbTop = chart.height
    - 52 positions the gradient bar very close to the canvas edge, leaving minimal
    room for the label row; increase bottom padding to at least 80px or adjust cbTop
    offset'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "piano-roll-midi · javascript · chartjs · anyplot.ai" in dark text (~22px) occupies ~65% of width, fully readable. Y-axis shows pitch names (F5 down to E2, white keys only) in dark secondary text at 13px. X-axis shows measure labels M1–M8 in dark secondary text at 14px. Axis titles "Pitch" and "Time (Measures, 4/4)" in dark primary text at 16px. Velocity colorbar labels "ppp", "Velocity (dynamics)", "fff" in secondary dark text at 12px — small but readable at full resolution.
      Data: Note rectangles using imprint_seq gradient (green #009E73 for low velocity, transitioning through teal to blue #4467A3 for high velocity). Black key rows shaded with subtle warm-dark rgba(26,26,23,0.07) strips. Beat lines (0.5px) and measure lines (1.5px) in warm-dark stroke. Gradient colorbar across full plot width.
      Legibility verdict: PASS — all text readable; minor concern about colorbar 12px label size at mobile scaling.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct theme surface, not pure black.
      Chrome: Title in light cream text — clearly readable on dark background. Y-axis pitch labels and X-axis measure labels in secondary light text — readable, no dark-on-dark issues. Axis titles in light primary text. Velocity colorbar labels in light secondary text.
      Data: Note rectangle colors are IDENTICAL to light render — same green-to-blue gradient (imprint_seq). Black key row shading uses rgba(240,239,232,0.07) — very subtle lighter bands against the near-black background, visible but appropriately understated. Note borders use rgba(0,0,0,0.55) — dark border on dark theme is slightly less effective but note fills are bright enough to be visible.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures detected.
