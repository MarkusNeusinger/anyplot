review:
  strengths:
  - Sophisticated custom Chart.js plugin using beforeDraw/afterDraw hooks to draw
    piano key row shading, beat/measure grid lines, and velocity-colored note rectangles
    — this is genuinely beyond basic Chart.js usage
  - Correct use of imprint_seq (t.seq[0]→t.seq[1]) for continuous velocity mapping,
    with both light and dark themes rendering with proper warm backgrounds and readable
    chrome
  - Hard-coded MIDI data for a full 8-measure classical phrase with realistic pitch,
    velocity, and duration values; pitch range auto-fits to data range with margin
  - Y-axis tick callback correctly converts MIDI numbers to note names (C4, D4, etc.);
    X-axis tick callback shows measure markers (M1–M8); both axes use theme-adaptive
    t.ink/t.inkSoft tokens
  - Invisible anchor dataset trick to force Chart.js scale initialization is an idiomatic
    Chart.js pattern for custom-drawn visualizations
  - 'animation: false, responsive: true, maintainAspectRatio: false all correctly
    set per library rules; no canvas.width/height overrides'
  weaknesses:
  - No velocity colorbar or legend — the color encoding (green=low velocity/quiet,
    blue=high velocity/loud) is present in the notes but invisible to a viewer who
    has no reference. A compact horizontal colorbar below the plot (e.g., drawn via
    afterDraw with a linear gradient from t.seq[0] to t.seq[1], labeled 'ppp' to 'fff'
    or '0–127') would make the dynamics dimension legible. The spec explicitly calls
    out 'color indicating velocity (dynamics)' and 'Color scale for velocity should
    use a sequential or diverging colormap' — the colorbar is the natural completion
    of that feature.
  - 'Y-axis tick font size is 11px CSS (22 source px at 2×) for ~40 chromatic pitch
    labels stacked across the full chart height — this is tight and will compress
    further at thumbnail/mobile sizes. Increasing to 12–13px (or using autoSkip: true
    with a minTicksLimit to show only natural notes C/D/E/F/G/A/B and skip accidentals)
    would improve readability without losing musical structure.'
  - 'Design Excellence is restrained — while the custom plugin logic is technically
    impressive, the visual output lacks hierarchy: all notes render in the same size,
    the bass (whole-note) bars and melodic lines are equally weighted, and there is
    no focal-point callout. Adding a subtle opacity gradient (e.g., reducing alpha
    on very low-velocity notes) or slight note-height scaling by velocity (taller
    rect = louder) would create richer data storytelling at minimal code cost.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — no pure white, correct Imprint chrome.
      Chrome: Title "piano-roll-midi · javascript · chartjs · anyplot.ai" is bold dark text, clearly readable at top. X-axis shows "Time (Measures, 4/4)" label and M1–M8 tick labels in dark ink. Y-axis shows "Pitch" label and 40+ chromatic note names (D#2 through F#5) in a smaller font — readable at full size but tight. All text is dark-on-light with no legibility failures.
      Data: Notes rendered as horizontal rectangles spanning the correct beat range. Color gradient visible from teal-green (#009E73 range) for lower-velocity bass notes to medium-blue (#4467A3 range) for higher-velocity melodic notes. Alternating row shading for black keys (subtle grey tint) is present and legible. Vertical beat lines (light) and measure boundary lines (slightly darker) are both visible without dominating. No colorbar legend explaining the velocity→color mapping.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — no pure black, correct dark Imprint chrome.
      Chrome: Title and axis labels appear in light ink (#F0EFE8 range), clearly readable against the dark background. Tick labels on both axes are lighter-muted, readable. No "dark-on-dark" failures — all text elements use theme-adaptive t.ink/t.inkSoft tokens correctly.
      Data: Note rectangle colors appear visually more vivid/saturated on the dark surface but use the same hex values as light render (t.seq[0]→t.seq[1] interpolation is theme-independent). Bass notes read as teal/cyan, melodic high-velocity notes read as blue — identical data encoding as light render. Black key row shading flips to a subtle lighter overlay (rgba(240,239,232,0.07)) which is just barely perceptible but present. Measure boundary lines and beat lines are visible in lighter tone.
      Legibility verdict: PASS
