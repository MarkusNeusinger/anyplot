review:
  strengths:
  - Alternating black/white key row shading is an authentic piano-roll design touch
    that shows real domain knowledge
  - Bold + slightly-larger C-note tick labels (C4, C5) provide excellent octave orientation
    with no extra visual weight
  - Dynamic markers (pp / mf / ff) alongside the colorbar add genuine musical context
    not in the spec — a thoughtful addition
  - Monospace font for note names mimics DAW aesthetics and makes pitch reading easy
  - Two-level x-axis (beat ticks below + centred measure labels above) cleanly separates
    metric hierarchy
  - Velocity colormap correctly uses Imprint div tokens reversed (blue→neutral→red)
    matching the spec's soft/loud convention
  - Correct clip-path on note rectangles prevents any overdraw outside the plot area
  - 'Full spec compliance: auto-fit pitch range, alternating key rows, beat/measure
    grid lines, note width = duration, color = velocity'
  - Deterministic data (hard-coded notes array) is fully reproducible; no seed required
  - Perfect code quality — no functions/classes, clean D3 data-join idioms throughout
  weaknesses:
  - Y-axis tick labels set to 12px and beat sub-numbers to 10px — both below the D3
    library guide's 14px minimum for a 3200px canvas; raise y-axis ticks to 14px and
    beat numbers to 12px
  - Dynamic markers (pp / mf / ff) at 11px font-size are also below minimum — raise
    to 13px
  - Y-axis 'Pitch' label positioned at x=18 CSS (only 36 source-pixels from left canvas
    edge) is uncomfortably close to the border; move to x=28 or adjust left margin
  - Short 0.25-beat notes in measure 3 render as narrow slivers (~37 source-px wide)
    — slightly harder to read at mobile widths; a minimum rendered width of 6–8 CSS
    px (before scale) would help
  - 'DE-02: no explicit spine removal — top and right borders of the plot area remain
    drawn; for a piano-roll, removing the top and right domain lines would reduce
    chrome noise'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) covering the full canvas. The plot area rows alternate between transparent (white keys) and a subtle warm-grey tint (black keys), clearly reflecting piano keyboard layout.
      Chrome: Title "piano-roll-midi · javascript · d3 · anyplot.ai" is bold dark text at top-centre — fully readable. Y-axis shows note names B3–C#5 in monospace with C4 and C5 bolded and slightly larger; tick labels are readable but at 12px are somewhat small for 3200px. X-axis has beat tick marks and "Measure 1"–"Measure 4" labels in soft dark text at 14px; beat sub-numbers at 10px are small but distinguishable. "Pitch" rotated label at far-left edge is fully visible. "Time (Beats)" label at bottom-centre is clear. Vertical measure grid lines are dark (t.inkSoft), beat lines are very faint. Colorbar on right with "Velocity" label and pp/mf/ff markers at 11px — readable but small.
      Data: Note rectangles are coloured from blue (#4467A3) at low velocity to muted midpoint to matte-red (#AE3030) at high velocity. Ascending scale in measure 1 shows cool→warm progression; measure 4 chord cluster shows saturated red. Short 0.25-beat notes in measure 3 appear as narrow slivers but are still identifiable.
      Legibility verdict: PASS — all text readable, no "light on light" issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17). Row alternation (black key shading) is slightly darker than background, subtle but present.
      Chrome: Title and all axis text switch to light-coloured tokens (t.ink / t.inkSoft) — fully readable against the dark surface. No dark-on-dark issues observed. Grid lines remain subtle. Colorbar ticks are light-coloured and legible. "Pitch" and "Time (Beats)" axis labels are clearly visible.
      Data: Note rectangle colours are identical to the light render — blue at low velocity, red at high velocity. Warm background makes the cooler blue notes slightly harder to distinguish from the warm-dark row tint, but all notes remain identifiable. The bright red high-velocity notes contrast strongly.
      Legibility verdict: PASS — no dark-on-dark failures; all text readable against dark background.
