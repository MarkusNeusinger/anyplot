review:
  strengths:
  - 'Domain-authentic piano keyboard design: correct MIDI black-key pattern for alternating
    rows, C-note bold emphasis for octave markers, monospace font for note labels
    — shows musical literacy in the implementation.'
  - Velocity colorbar with musical dynamic markers (pp, mf, ff) at semantically correct
    velocity fractions — makes the chart immediately comprehensible to a musician.
  - 'Beat/measure X-axis hierarchy: centered measure labels, varying-weight beat tick
    marks, sub-beat numbers at reduced opacity — well-structured time representation
    that mirrors DAW conventions.'
  - 'Perfect spec compliance: all required features implemented correctly and idiomatically
    (pitch rows, velocity color, note rectangles, alternating piano rows, beat/measure
    grid).'
  weaknesses:
  - Colorbar numeric ticks and beat sub-labels at 12 px CSS (24 px output) are the
    smallest text in the chart — consider bumping to 13–14 px CSS to match the other
    secondary text elements.
  - Measure boundary gridlines use t.inkSoft (full secondary text color) which reads
    somewhat prominent in the light theme; a lower-opacity version or t.grid with
    stroke-width 1.2 would maintain the measure/beat hierarchy while reducing visual
    noise.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "piano-roll-midi · javascript · d3 · anyplot.ai" in bold dark ink at top. Y-axis labeled "Pitch" in dark ink; tick labels are note names (B3, C4, D4, ... C5, C#5) in monospace font with C notes bolded. X-axis labeled "Time (Beats)"; measure labels ("Measure 1–4") in medium weight; beat sub-labels (2, 3, 4) at reduced opacity. Colorbar on right labeled "Velocity" with pp/mf/ff italic markers. All text clearly readable against light background.
      Data: Note rectangles range from blue (velocity ~62, low/soft) through neutral purple to red (velocity ~112, loud). Ascending Measure 1 notes fade cool→warm. Measure 4 beat 12 chord (C4+E4+G4) is vivid red — clear focal point. First series is velocity-mapped (not categorical), using Imprint div tokens reversed for blue-to-red effect.
