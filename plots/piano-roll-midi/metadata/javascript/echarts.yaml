review:
  strengths:
  - Idiomatic ECharts custom series with dual-layer rendering (background black-key
    shading + foreground note bars) faithfully replicates a professional DAW piano-roll
    layout
  - 'Correct imprint_seq colormap applied to velocity: green (#009E73) for soft notes,
    blue (#4467A3) for loud notes, with a hand-crafted right-margin legend'
  - 'Musical data is genuine and musically correct: C major melody in mm.1-2, D-minor
    and C-major block chords in mm.3, descending cadence in mm.4; all MIDI pitch values
    and note names accurate'
  - ECharts minor tick and minorSplitLine used for beat subdivisions with stronger
    lines at measure boundaries — exactly what the spec requires
  - Both light and dark renders are fully readable with theme-adaptive chrome (t.ink
    / t.inkSoft / t.grid tokens applied to every chrome element)
  - Auto-fit pitch range (minPitch-1 to maxPitch+1) ensures only the relevant octave
    is shown, not all 128 MIDI notes
  weaknesses:
  - Velocity gradient bar is only 14 CSS-px wide (rendered ~28 source-px), which is
    quite narrow for a 3200×1800 canvas; a wider or visualMap-based legend would be
    more readable at smaller display sizes
  - 'Helper function count (6 functions: noteName, isBlackKey, hexRgb, velColor, renderBgItem,
    renderNoteItem) is above the KISS ideal, though renderItem callbacks are a hard
    ECharts API requirement'
  - Black-key row shading (rgba opacity ~0.07–0.08) is very subtle in the light render;
    slightly higher contrast (0.10–0.12) would make the keyboard layout more immediately
    obvious
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "piano-roll-midi · javascript · echarts · anyplot.ai" in bold dark ink, centered, clearly readable. Y-axis label "Pitch" and X-axis label "Measure" in inkSoft. Tick labels (B3, C4, D4, E4, F4, G4, A4, B4, C5, D5, E5, F5 for white keys only; black-key rows unlabeled) in inkSoft at fontSize 11. Measure labels M1–M5 along the bottom. Velocity legend ("Velocity", "ff", gradient bar, "pp") in top-right margin in inkSoft — legible but small.
      Data: Note bars in a teal→blue range (imprint_seq from #009E73 to #4467A3). Alternating gray bands for black-key rows (very subtle, rgba 0.08). Measure-boundary grid lines slightly heavier than beat sub-divisions.
      Legibility verdict: PASS — all text clearly readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title, axis labels, tick labels, and velocity legend labels all render in light-colored ink (t.ink / t.inkSoft tokens). No dark-on-dark failures detected — all chrome elements visibly contrast against the dark background.
      Data: Same teal→blue imprint_seq colors as light render; they appear more vivid against the dark background (expected perceptual contrast effect, not an actual palette change). Black-key alternating bands slightly lighter (rgba 0.07 on dark surface).
      Legibility verdict: PASS — all text clearly readable against dark background; no dark-on-dark failures.
