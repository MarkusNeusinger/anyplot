review:
  strengths:
  - 'Complete spec implementation: all five required features (note names, keyboard
    row shading, beat/measure grid, velocity colormap, auto-fit pitch range) present
    and working'
  - 'Domain-appropriate data: realistic C-major phrase with melody + chord accompaniment,
    varying note durations, and a musically meaningful velocity arc (climax at C5
    in Measure 2)'
  - 'Excellent theme adaptation: both renders fully readable; chrome tokens thread
    correctly to every element including the colorbar'
  - Custom beat-grid styling (differentiated opacity/width for beat vs. measure lines)
    is the right design call for a piano roll
  - Piano keyboard row-shading implemented correctly using music-theory pitch class
    arithmetic
  weaknesses:
  - 'VQ-07 (1pt): Velocity colormap uses reversed imprint_seq — cgrad([colorant"#4467A3",
    colorant"#009E73"]) (blue→green) instead of canonical cgrad([colorant"#009E73",
    colorant"#4467A3"]) (green→blue). Fix: define VEL_CMAP as canonical imprint_seq
    and use 1.0 - v/127.0 for the velocity lookup to preserve musically-correct blue=soft
    direction.'
  - 'CQ-01 (1pt): Two helper functions (is_black_key, midi_to_name) violate KISS no-functions
    rule. Fix: inline is_black_key as a one-liner at the call site; replace midi_to_name
    with an inline array lookup at the ytick assignment.'
