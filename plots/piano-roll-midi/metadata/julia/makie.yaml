review:
  strengths:
  - 'Full spec compliance: alternating piano-keyboard row backgrounds, note names
    on Y-axis, beat/measure grid lines, velocity-mapped color, and velocity colorbar
    all present and correct'
  - 'Imprint sequential colormap (green #009E73 → blue #4467A3) correctly applied
    to velocity data with inverted mapping (high velocity = brighter green)'
  - 'Excellent data quality: 48-note C major phrase across 4 measures with realistic
    melody + chord accompaniment, clear ascending-climax-descent-resolution arc'
  - 'Complete theme-adaptive chrome: PAGE_BG, INK, INK_SOFT tokens applied to every
    axis element, both renders fully readable'
  - 'Clean Julia/Makie idioms: single poly! call with Rect2f slice for all note rectangles,
    Colorbar widget, colsize! for layout — efficient and idiomatic'
  - 'Perfect code quality: KISS structure, explicit font sizes, Random.seed!(42),
    only used imports'
  weaknesses:
  - 'Design Excellence held at mid-range: the implementation is polished and musically
    accurate but the visual identity is primarily driven by the piano-keyboard row
    shading and Imprint colormap rather than additional typographic hierarchy or compositional
    emphasis that would push it to publication-ready'
  - 'DE-02 refinement: grid is handled via vlines! (good), but the note stroke (strokewidth=0.7f0,
    alpha=0.55f0) is subtle to the point where at mobile-scaled widths the note outlines
    disappear — a slightly thicker stroke (1.0–1.2f0) would preserve definition across
    scales'
  - 'LM-02: the implementation uses poly! with Rect2f correctly, but does not leverage
    any more distinctive Makie feature (e.g. recipe system, Observable-free layout,
    linkaxes) that would clearly differentiate it from a generic polygon-drawing approach
    in any other library'
