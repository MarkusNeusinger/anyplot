  image_description: The plot displays a piano roll visualization of a 4-measure chord
    progression (I-V-vi-IV in C major) with melody. The y-axis shows pitch as MIDI
    note names (A2 at bottom to G5 at top), with only white-key notes labeled to reduce
    clutter. The x-axis shows beat positions labeled as Measure.Beat (M1.1 through
    M5.1). Each note is a horizontal rectangle whose length represents duration. Notes
    are colored using the Plasma colorscale — dark purple/blue for low velocity (~70)
    through pink/orange to yellow for high velocity (~120). A vertical colorbar on
    the right is labeled "Velocity (MIDI 0-127)". Alternating light gray horizontal
    bands distinguish black-key rows from white-key rows. Solid vertical lines mark
    measure boundaries while dotted lines mark individual beats. Melody notes (highest
    pitch per onset) appear slightly taller and more opaque than accompaniment, creating
    a clear visual hierarchy. The title reads "piano-roll-midi · plotly · pyplots.ai"
    centered at the top. Background is clean white (plotly_white template).
