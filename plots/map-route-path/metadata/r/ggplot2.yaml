      Data: Viridis colormap path (purple/blue at ~3100m to yellow-green at ~3700m). Green filled circle (Okabe-Ito #009E73) at Start; orange filled square (Okabe-Ito #D55E00) at End. End marker sits very close to colorbar legend border.
