review:
  strengths:
  - coord_fixed(ratio=1.31) shows geographic awareness and correct latitude correction
    for Colorado — a non-trivial ggplot2 distinction
  - Elevation color gradient with viridis is a meaningful added data dimension that
    enriches the route visualization beyond a simple line map
  - 'Full theme-adaptive chrome: all ink tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG,
    GRID_COLOR) correctly applied; dark render has no dark-on-dark failures'
  - geom_path() correctly chosen over geom_line() — preserves waypoint sequence order,
    critical for route maps
  - Dual shape+fill mapping for endpoints creates a clear, accessible start/end distinction
  weaknesses:
  - End marker (orange square) is positioned very close to the colorbar legend box
    — increase right plot margin or shift the colorbar guide slightly lower to give
    breathing room (e.g., plot.margin = margin(10, 30, 10, 10, unit='pt') or guide
    offset)
  - No direction arrows or visual cue showing travel direction along the route; spec
    marks these as optional but they would improve the visualization at low additional
    complexity
  - Geographic basemap absent — accepted as ggplot2 limitation (sf/ggmap out of scope)
    but noted as a spec gap
  image_description: |-
