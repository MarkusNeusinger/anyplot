review:
  strengths:
  - Correct use of geom_path for ordered route visualization with elevation-based
    viridis color gradient
  - 'Perfect theme-adaptive chrome: all tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly flip between light and dark themes, resulting in fully readable plots
    in both modes'
  - Realistic Colorado Rockies GPS track with appropriate coordinate range (~0.09
    degrees) and realistic elevation profile (3100-3700 m)
  - 'Idiomatic ggplot2 usage: coord_fixed for geographic aspect ratio, separate endpoint
    data frame, guide_colorbar with custom dimensions, OKABE_ITO endpoint colors with
    PAGE_BG stroke'
  - 'Perfect code quality: flat script, set.seed(42), clean imports, correct ggsave
    with ragg device'
  weaknesses:
  - No geographic basemap — the plot shows bare coordinate axes without spatial context
    (expected ggplot2 limitation without sf/ggmap, but meaningfully reduces the map
    feel)
  - Full 4-sided panel border (panel.border = element_rect) instead of the L-frame
    style recommended by the style guide; while defensible for a coordinate map, it
    adds visual weight
  - No direction arrows along the path to indicate travel direction (spec notes as
    optional but would add storytelling value)
  - Grid lines in dark mode use INK_SOFT (#B8B7B0) which produces fairly prominent
    white-ish horizontal and vertical lines; slightly more muted color or lower linewidth
    would improve the dark render
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color, not pure white.
      Chrome: Title "Rocky Mountain Trail · map-route-path · r · ggplot2 · anyplot.ai" in dark ink, clearly readable. Axis labels "Longitude" and "Latitude" in dark ink at 10pt, tick labels in INK_SOFT at 8pt — all legible. Legend box uses elevated background (#FFFDF6) with INK_SOFT border.
      Data: Route path colored with viridis (purple→blue→teal→green→yellow-green→yellow) encoding elevation. Start marker is green circle (#009E73, OKABE_ITO[1]) at lower-left, End marker is orange square (#D55E00, OKABE_ITO[2]) at right side. Colorbar "Elevation (m)" shows scale 3100–3800. Grid lines are very subtle (0.15 linewidth).
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title in light ink (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0), readable. Legend box uses elevated dark background (#242420) with border. Grid lines appear slightly more visible than in light mode (INK_SOFT on dark background creates more contrast than intended) but remain non-dominant.
      Data: Viridis route colors are identical to light render — purple to yellow gradient unchanged. Start and End marker colors identical (#009E73 and #D55E00). No dark-on-dark issues.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures.
