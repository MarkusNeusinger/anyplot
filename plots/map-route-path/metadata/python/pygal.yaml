review:
  strengths:
  - Variable stroke widths (5/6/8/6/5 px bell curve) create a sophisticated visual
    suggestion of pace variation — goes beyond basic line drawing
  - 5 time-segmented route segments with descriptive labels (0-9 min etc.) provide
    clear temporal narrative
  - START marker (#009E73, Okabe-Ito pos 1) and FINISH (vermillion, pos 2) follow
    exact palette order
  - GPS noise simulation (np.random.normal) makes the route look like real-world GPS
    track data
  - 'Proper theme adaptation: correct #FAF8F1 light / #1A1A17 dark backgrounds with
    full INK token threading'
  - Interactive HTML export with value_formatter providing coordinate tooltips on
    hover
  weaknesses:
  - 'FINISH marker (vermillion, dots_size=14) is invisible in both renders — closed-loop
    trail places start and end at nearly identical coordinates (t=0 and t=2pi converge);
    START dot (22px) completely covers FINISH. Fix: offset FINISH with a small coordinate
    nudge (~0.0015 deg lat) or replace with an annotated label/arrow.'
  - 'Yellow (#F0E442) 36-45 min segment is a thin line on light surface (#FAF8F1)
    — style guide warns Okabe-Ito position 7 should not be used for thin lines on
    light backgrounds due to low luminance contrast. Fix: cap to 4 segments (drop
    position 7) or swap to a stronger color.'
  - 'X-axis tick labels display 8-decimal coordinate precision (e.g., -73.98630798)
    — unnecessarily verbose for geographic readability. Fix: format as 3-decimal degrees
    (e.g., -73.986) for cleaner display.'
