review:
  strengths:
  - Correct Okabe-Ito palette with brand green (#009E73) as first series (START marker),
    full Okabe-Ito positions 1-7 used across time segments
  - 'Both light and dark themes correctly adapted: backgrounds #FAF8F1 / #1A1A17,
    all chrome tokens flipped, data colors identical between renders'
  - Interactive HTML output generated alongside PNG — properly exploits pygal's distinguishing
    capability
  - Per-point tooltip labels with coordinates and timestamps are idiomatic pygal and
    add real value to the interactive version
  - Realistic Central Park GPS data with proper noise, accurate coordinates (-73.97,
    40.77), and plausible 45-minute hike duration
  - 'Clean, readable flat script: seed set for reproducibility, no unnecessary abstractions,
    all imports used'
  weaknesses:
  - 'X-axis tick labels are truncated to ''-73...'' by pygal — full longitude values
    are not displayed. Fix: use explicit chart.x_labels with ~6-8 sparse formatted
    values (e.g. f''{v:.3f}'') to reduce density and allow full label rendering without
    truncation'
  - No shape differentiation for START vs FINISH markers — both are circles of similar
    size. Pygal XY does not natively support per-series marker shapes, but distinct
    dots_size values (e.g. START=22, FINISH=16) or an additional annotation could
    improve visual distinction
  - No direction arrows along the path — the spec lists these as optional but they
    would improve storytelling. Consider adding a midpoint annotation with an arrow-like
    symbol to indicate travel direction
