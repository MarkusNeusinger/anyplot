      Data: Park polygon in light green (#C8E6C9 fill, #4CAF50 border, alpha=0.7) occupies most of the plot area. Lake ellipse in light blue (#81D4FA fill, #0288D1 border, alpha=0.8) visible in the park interior. Trail path colored with viridis colormap (dark purple at 0% → teal/cyan mid → yellow-green at 100%), size=2.5, alpha=0.85. End marker: red square (#EF5350 fill, #C62828 border) at approximately (-121.63, 47.80) — clearly visible. Start marker: green circle (#4CAF50 fill, #2E7D32 border) is nearly co-located with the end marker (the trail is a closed loop) and is partially obscured.
      Legibility verdict: PASS — all text readable; first series color is viridis (continuous, correct); background is #FAF8F1.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black. PASS.
