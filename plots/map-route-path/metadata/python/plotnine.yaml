      Data: Large light-green polygon (park boundary, alpha=0.7) fills most of the plot area. Small blue oval (lake, alpha=0.8) near plot center. Trail path rendered as a looping curve using a blue (#306998) to yellow (#FFD43B) custom gradient — 0% is blue (start), 100% is yellow (end). Green circle and red square markers co-located at approximately (-121.6, 47.82) marking start and end of the closed loop.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title, axis labels, tick labels, and legend text all rendered in light ink (#F0EFE8 / #B8B7B0 respectively), clearly readable against the dark background. No dark-on-dark failure observed. Legend box uses elevated dark background (#242420). Panel border uses INK_SOFT for subtle framing.
      Data: Park polygon now dark green (#1B3A1F fill, #388E3C border), lake now dark blue (#0D3B52 fill, #01579B border). Trail path gradient colors (blue to yellow) are IDENTICAL to the light render — only chrome flips between themes, data colors are preserved. Start/end markers retain their green/red colors and remain visible against the dark background.
      Legibility verdict: PASS — all text elements readable on dark surface. No "dark on dark" failures found.
