review:
  strengths:
  - Fully theme-adaptive chrome — all INK/INK_SOFT/PAGE_BG tokens correctly threaded
    to title, axis labels, tick labels, and legend in both light and dark renders
  - Geographic context (park polygon, lake ellipse) with theme-adaptive fill/border
    colors adds meaningful spatial realism
  - viridis colormap for trail progress is perceptually uniform, CVD-safe, and creates
    a clear visual narrative of route progression
  - coord_fixed(ratio=1.3) preserves geographic proportions; rolling-window smoothing
    mimics real GPS post-processing
  - 'Correct plotnine grammar-of-graphics layering: geom_polygon → geom_path → geom_point
    with appropriate alpha on each layer'
  - 'Perfect spec compliance: connected waypoints in sequence order, distinct start/end
    markers, color gradient along path, line smoothing all present'
  weaknesses:
  - Start (green circle) and end (red square) markers are nearly co-located because
    the trail is a closed loop (t=0..2π), causing the start marker to be visually
    occluded by the red square and the overlapping dark-purple trail segment — consider
    offsetting markers slightly or increasing their size to make both visible
  - 'Red/green color pair for start/end markers is the classic CVD problematic combination;
    even though shapes differ (circle vs. square), the markers are small (size=5)
    making shape discrimination unreliable for low-vision users — use Okabe-Ito safe
    colors such as #009E73 (green) and #D55E00 (vermillion) instead of pure red'
  - Park polygon fill (#1B3A1F) in dark mode is nearly indistinguishable from the
    page background (#1A1A17) — the polygon border (#388E3C) provides marginal definition
    but the fill area blends in; increase alpha or lighten the dark-mode fill slightly
  - panel_border retained (all four spines visible as a box frame) — for a map visualization,
    removing the border or using an L-shaped spine frame would give a cleaner look
  - 'Design excellence is moderate: no annotations on notable waypoints, no elevation
    or speed context to enrich storytelling; the park/lake polygons are simple shapes
    rather than realistic geography'
  image_description: |-
