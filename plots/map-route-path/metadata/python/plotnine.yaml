review:
  strengths:
  - Theme-adaptive chrome works correctly across both light and dark renders — all
    text colors, backgrounds, grid lines, and legend elements adapt properly via INK/INK_SOFT
    tokens.
  - 'Strong spec compliance: geom_path connects waypoints sequentially, rolling-window
    smoothing applied, distinct start (green circle) and end (red square) markers
    used, and color gradient shows trail progress effectively.'
  - Geographic context created with theme-adaptive park (polygon) and lake (oval)
    features, providing spatial reference within plotnine's static constraints.
  - Realistic Pacific Northwest hiking trail data with appropriate coordinate range
    and proper coordinate-fixed aspect ratio via coord_fixed().
  - Clean, idiomatic plotnine grammar-of-graphics composition with multiple geom layers
    (geom_polygon × 2, geom_path, geom_point × 2).
  weaknesses:
  - Continuous colormap uses a custom gradient (low="#306998", high="#FFD43B") instead
    of the style-guide-mandated viridis, cividis, or BrBG — replace scale_color_gradient()
    with scale_color_cmap(cmap_name='viridis') or scale_color_cmap(cmap_name='cividis')
    for compliance.
  - Start point (green circle) and end point (red square) occupy the same pixel location
    because the trail is a closed loop — the start marker is partially obscured. Consider
    offsetting the markers slightly or adding a legend entry to clarify the loop design.
  - 'DQ-01: Implementation uses only a single looping trail shape; adding a second
    or third route segment or waypoint annotations (e.g., distance markers) would
    improve feature coverage.'
  - 'DE-01: While park/lake context features are a nice touch, design sophistication
    is moderate — no annotations, no directional arrows, and the geometric shapes
    are coarse approximations of geographic features.'
