review:
  strengths:
  - Terrain-themed panel background adds geographic context and is thematically appropriate
    for a route map plot
  - coord_fixed(ratio=1.0) correctly preserves geographic proportions without distortion
  - layer_tooltips() with formatted lat/lon/progress output is idiomatic letsplot
    and genuinely useful
  - Viridis colormap for progress encoding is perceptually correct and communicates
    travel direction intuitively
  - Start/End markers use Okabe-Ito positions 1 and 2 with white stroke — clean, accessible,
    and brand-consistent
  - 'Full theme-adaptive chrome: all tokens correctly map INK, INK_SOFT, PAGE_BG,
    ELEVATED_BG, TERRAIN_BG to both themes'
  - Both renders pass theme-readability check with no dark-on-dark or light-on-light
    issues
  weaknesses:
  - No geographic basemap (tile layer) — letsplot provides geom_livemap() which would
    add real streets/terrain background, the most distinctive letsplot feature for
    geographic data
  - Route line size=1.5 is slightly thin for the canvas scale; increasing to size=2.0-2.5
    would make the path more prominent
  - No directional arrows, elevation annotations, or speed/segment overlays to elevate
    design beyond a standard colored path
