review:
  strengths:
  - Bokeh tile map integration via add_tile() with theme-appropriate CartoDB Positron
    (light) and Dark Matter (dark) basemaps — a genuinely distinctive bokeh geo feature
  - Correct Web Mercator projection conversion (lat/lon → x/y) enabling accurate basemap
    alignment
  - Full theme-adaptive chrome with all text, tick, grid, and legend elements mapped
    to INK/INK_SOFT tokens — both renders are clean
  - Good use of ColumnDataSource with explicit color arrays, proper min_border reservations
    preventing label clipping
  - Viridis gradient on waypoints combined with green route line and distinct Okabe-Ito
    start/end markers creates visual interest
  - CaptureScreenshot with captureBeyondViewport:true correctly handles the Selenium
    viewport gap for this canvas size
  weaknesses:
  - Viridis waypoint gradient has no colorbar — viewers cannot decode what purple-to-yellow
    encodes (distance? time? elevation?). Add a ColorBar mapped to waypoint index
    or timestamp.
  - Simulated route self-intersects multiple times due to np.sin(10*pi*t) and np.sin(7*pi*t)
    creating Lissajous-like loops — no real GPS hiking trail crosses its own path
    3+ times. Use a monotonically-offset meander (e.g. sin amplitude decays or use
    a single-frequency meander that stays within a corridor).
  - 'DE-03 storytelling is incomplete without the colorbar: the gradient tells no
    decipherable story and viewers must guess the progression direction beyond the
    Start/End labels.'
  - Grid alpha=0.06 is very low for a basemap overlay — slightly increasing to 0.08-0.10
    for the dark theme would improve grid visibility on the near-black tile.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) visible at the canvas borders; CartoDB Positron basemap (light teal/mint) fills the chart area with muted road and terrain detail.
      Chrome: Title "Rocky Mountain Trail · map-route-path · python · bokeh · anyplot.ai" renders in near-black (INK) and spans ~85% of the plot width — expected for the long mandated format. X-axis label "Longitude" and Y-axis label "Latitude" are clearly visible in dark INK. Tick labels (geographic coordinates ~−105.7 to ~−105.63 on X; ~40.345 to ~40.37 on Y) render in INK_SOFT and are readable. Legend in top-right corner shows "Start" (green circle) and "End" (orange square) with small but legible text.
      Data: Green (#009E73) route line (5px width) traces the full 200-waypoint path. Viridis256-colored waypoint dots (size=12) overlay the line, progressing purple→teal→green→yellow from start to end. Large green circle marks the trail start (lower-left); large orange square marks the end (upper-right). Route exhibits multiple self-intersecting loops due to the oscillating meander function.
      Legibility verdict: PASS — all chrome and data elements are readable against the light background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) at the canvas borders; CartoDB Dark Matter basemap (very dark, almost pure black) fills the chart area with faint gray road/terrain lines.
      Chrome: Title renders in light (#F0EFE8) text — clearly readable. Axis labels "Longitude" and "Latitude" appear in light INK. Tick labels appear in INK_SOFT (#B8B7B0 gray) — readable against the dark background. No dark-on-dark text failures detected. Legend renders with ELEVATED_BG (#242420) fill and INK_SOFT label text — legible.
      Data: Route line, waypoint dots, and start/end markers are visually identical in color to the light render (#009E73 green, Viridis256 gradient, #D55E00 orange square). The darker basemap provides better contrast for the bright yellow/green viridis portion of the gradient.
      Legibility verdict: PASS — both themes render all elements legibly with no dark-on-dark failures.
