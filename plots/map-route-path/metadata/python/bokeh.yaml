review:
  strengths:
  - Theme-aware CartoDB basemap switching (Positron for light, Dark Matter for dark)
    is elegant and fully automatic based on ANYPLOT_THEME
  - Dual encoding — green route line for connectivity + viridis gradient dots for
    progression — is intentional and effective
  - 'Full chrome token coverage: title, axis labels, ticks, legend, colorbar all use
    INK/INK_SOFT tokens throughout both themes'
  - Geographically accurate RMNP coordinates with plausible trail meander and realistic
    scale
  - 'captureBeyondViewport: True CDP approach correctly captures the full 3200x1800
    canvas'
  weaknesses:
  - Colorbar major labels at 28pt are slightly smaller than the main tick labels at
    34pt — a minor chrome hierarchy inconsistency; unify to 34pt for perfect balance
  - The green route line (#009E73) is visually overridden by the viridis dots stacked
    on top; consider drawing the dots first (or reducing dot alpha slightly) so the
    green line remains visible as a separate layer
  - 'DE-01 held back (5/8): no directional arrows along the trail path and no distance
    markers — adding even optional direction glyphs would elevate the storytelling'
