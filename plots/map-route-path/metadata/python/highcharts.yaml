review:
  strengths:
  - 'Perfect spec compliance — all required features implemented: basemap, route path,
    start/end markers, color gradient for time, direction arrows, waypoint markers,
    and interactive HTML export'
  - 'Excellent data realism: Swiss Alps Zermatt region GPS track with realistic Alpine
    coordinates, elevation profile (1600–2800m), GPS noise, switchbacks, and 6-hour
    timestamp encoding'
  - 'Full Okabe-Ito usage for all point markers: Start=#009E73 (brand green), End=#D55E00
    (vermillion), waypoints=#E69F00 (orange), direction arrows=#0072B2 (blue)'
  - 'Strong library mastery: uses Highmaps with Switzerland topology, WebMercator
    projection, fitToGeometry viewport, mapline/mappoint series, colorAxis, and both
    static PNG + interactive HTML outputs'
  - 'Perfect theme adaptation in both renders — correct backgrounds (#FAF8F1 light
    / #1A1A17 dark), all text uses adaptive tokens, no dark-on-dark failures'
  - 'Clean code: seed set, flat KISS structure, all imports used, no fake UI elements'
  weaknesses:
  - Canvas utilization — the map occupies only the upper ~55% of the 3200×1800 canvas,
    leaving the lower ~40% as empty space. The colorAxis ('Time elapsed') was intended
    at verticalAlign:'bottom' but appears to have rendered displaced into the legend
    area rather than below the map. Expand the mapView bounding box, reduce spacingBottom,
    or set the chart height to better fit the geographic content, so the map fills
    more of the available canvas
  - Route color gradient uses a custom blue-to-red diverging palette (#1a4f9c→#b2182b)
    for a sequential time variable (0–6 hours). Per the style guide, sequential continuous
    data should use viridis or cividis. Replace the 10-segment gradient with a viridis/plasma
    colorAxis so the encoding is perceptually uniform and monotonic
  - 'Middle segments of the route (~hours 2–4) render in very light colors (#d1e5f0,
    #fddbc7) that have low contrast against both the light map basemap and the light
    page background — data elements nearly wash out at the midpoint of the trail.
    Using a perceptually-uniform sequential colormap (viridis) would fix this automatically'
  - 'Design excellence: DE-01 and DE-02 are at library-default level. To improve:
    add a thin elevation sparkline or annotation callout at peak elevation point,
    increase visual hierarchy by making the route line thicker (lineWidth 16–18 for
    the PNG), and add a subtle text annotation noting total distance or elevation
    gain to give the chart a clear focal point'
