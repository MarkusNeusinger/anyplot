review:
  strengths:
  - 'Full spec compliance — all required features implemented: viridis gradient encoding
    time, start/end markers (green circle + vermillion square) with labels, direction
    arrows at 4 waypoints, Switzerland geographic basemap, 150 GPS waypoints, and
    interactive HTML with zoom/pan enabled'
  - Excellent palette compliance — viridis gradient correctly used for continuous
    time encoding (not Okabe-Ito), while categorical markers (start, end, arrows,
    waypoints) all use Okabe-Ito positions in correct order
  - 'Complete dual-theme support — all chrome elements (title, subtitle, legend text/border/background,
    basemap land/border colors) adapt correctly between #FAF8F1 light and #1A1A17
    dark; data colors are identical across both renders'
  - Realistic and evocative data — Swiss Alps hiking trail in the Zermatt region with
    GPS-like noise via cumulative random walk, switchback pattern via sine wave, and
    realistic Alpine elevation (1600–2800 m over 6 hours)
  - Perfect code structure — KISS layout (no functions/classes), reproducible with
    np.random.seed(42), clean imports, PIL safety-net for canvas rounding, and correct
    dual-artifact output (plot-{THEME}.png + plot-{THEME}.html)
  weaknesses:
  - Map view distribution is unbalanced — bounding box extends 3× the lat range northward
    (max_lat = max(lats) + _lat_range * 3.0), pushing the route into the bottom ~35%
    of the map area. The upper ~65% shows empty Switzerland basemap territory above
    the trail. Reduce the multiplier to 1.0–1.5 to vertically center the route better
    within the canvas while retaining geographic context.
  - Legend item font size (40px) is slightly below the recommended highcharts baseline
    of 44px, and subtitle (38px) is below 40px. Raise legend itemStyle fontSize to
    '44px' and subtitle style fontSize to '44px' for better proportional balance at
    3200px canvas.
  - 'Waypoint marker radius (8px) is somewhat small for 3200px canvas — at full resolution
    the orange dots are visible but not prominent. Raise to radius: 11–12 for better
    density-appropriate visibility (150 points is medium density, defaults should
    be slightly larger).'
  - 'LM-01: Implementation bypasses highcharts_core Python SDK in favor of raw JS/HTML.
    While necessary for Highmaps geographic features (and correctly documented in
    the code comment), it reduces idiomatic Python usage score.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface. Switzerland basemap rendered in warm beige (#E8E4DC land, #B8B4A8 borders), fitting well with the light surface.
      Chrome: Title "map-route-path · python · highcharts · anyplot.ai" in dark #1A1A17, bold, 66px — clearly readable. Subtitle "Alpine Hiking Trail · Swiss Alps, Zermatt region · 150 GPS waypoints over 6 hours · route color = time elapsed" in lighter #4A4A44, 38px — readable. Legend upper-right with warm off-white background and warm border, "Markers" title in dark ink, items (Route 0h, Route 6h, Start 0 hrs, End 6 hrs) in #4A4A44 at 40px — readable.
      Data: Route line runs east→west across southern Switzerland with viridis gradient from dark purple (#440154 at start/east) to bright yellow (#fde725 at end/west). Orange waypoint dots (#E69F00, 8px radius) visible along the route. Blue triangle direction arrows (#0072B2, 14px radius) at 4 intermediate points. Green circle START marker (#009E73, 22px radius) at the east end with "START" label in matching green. Vermillion square END marker (#D55E00, 18px radius) at the west end with "END" label in matching vermillion.
      Layout: Route occupies bottom ~35% of the map area; upper ~65% is Switzerland basemap above the trail — notable empty space. Canvas 3200×1800 confirmed.
      Legibility verdict: PASS — all text clearly readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface. Switzerland basemap rendered in dark warm tones (#2A2A25 land, #4A4A42 borders), maintaining warmth against the near-black surface.
      Chrome: Title appears in light #F0EFE8 against dark background — clearly readable. Subtitle in light gray #B8B7B0 — readable. Legend with dark elevated background (#242420) and dark border, items in #B8B7B0 — readable against the legend background. No dark-on-dark text issues detected.
      Data: Route viridis gradient colors are IDENTICAL to the light render — dark purple to bright yellow progression unchanged. Orange waypoints, blue arrows, green START circle, vermillion END square all render in identical Okabe-Ito colors as the light render. Only chrome (background, basemap, text) has flipped.
      Legibility verdict: PASS — all text clearly readable against dark background; no dark-on-dark failures detected. Data colors consistent across themes.
