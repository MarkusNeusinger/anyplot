review:
  strengths:
  - LineCollection + viridis gradient elegantly encodes trail progression — idiomatic
    matplotlib approach for gradient-colored paths
  - 'Full theme-adaptive chrome: backgrounds, text, grid, spines, legend, colorbar,
    and direction arrows all flip correctly between light and dark'
  - Start/end markers use Okabe-Ito positions 1 and 2 with distinct shapes (circle
    vs. square) providing CVD-safe differentiation
  - np.cumsum noise on GPS coordinates produces a realistic, naturally winding route
  - Direction arrows with annotate provide explicit travel-direction cues
  weaknesses:
  - 'Layout dead space: ax.set_aspect("equal") on a landscape 8x4.5 figure compresses
    the SF route into the right ~40% of the canvas, leaving the left ~55% as empty
    background — remove ax.set_aspect("equal") or switch to square canvas (6x6, dpi=400)'
  - 'Missing geographic basemap: spec requires basemap for spatial context — add contextily
    (ctx.add_basemap) after scatter calls'
  - 'Direction arrows low contrast in light render: INK_SOFT arrows blend with viridis
    route mid-tones — increase arrowstyle linewidth to 2.0 or use INK token for arrowhead
    color'
