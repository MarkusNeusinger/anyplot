review:
  strengths:
  - Route 66 Chicago→LA with real city coordinates and plausible elevation data is
    an ideal narrative for a route map
  - Multi-layer geographic composition using albersUsa projection + CDN topojson (no
    extra geo packages) — idiomatic and elegant
  - Viridis colormap correctly applied to continuous elevation data; start/end markers
    use Okabe-Ito positions 1 and 2 with shape differentiation for CVD safety
  - 'Complete theme-adaptive implementation: map fill/stroke colors, legend, title,
    and city labels all flip correctly between light and dark'
  - Canvas sizing correct (620x320 inner view, scale=4, padded to 3200x1800) — no
    clipping, no overflow
  - HTML + PNG output with interactive tooltips on route and elevation dots
  weaknesses:
  - City labels at fontSize=9-10 (->36-40px final) are at minimum legible size; increasing
    to 11-12pt would improve readability on 400px mobile renderings
  - Elevation dots (size=55, every 3rd point) appear slightly undersized in the compressed
    eastern segment of the route — size=70-80 would make individual points more distinguishable
