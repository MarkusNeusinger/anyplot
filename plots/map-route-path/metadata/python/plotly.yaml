review:
  strengths:
  - Theme-aware basemap selection (open-street-map for light, carto-darkmatter for
    dark) maintains visual coherence in both renders
  - Multi-layer trace architecture cleanly separates path connectivity, time-progression
    gradient, and categorical start/end/checkpoint markers
  - Colorbar uses explicit human-readable time labels (07:30-13:30) directly connecting
    data to the hiking narrative
  - Full spec compliance with correct Okabe-Ito categorical colors and viridis for
    continuous time data
  weaknesses:
  - Synthetic GPS path has unrealistic spiral-loop patterns from high-amplitude sinusoidal
    drift — reduce amplitudes to <=0.006 deg and frequencies to 3pi-4pi for naturalistic
    trail undulations
  - Route connectivity line (width=2, opacity=0.5) is hard to follow through dense
    spiral sections — increase to width=2.5-3, opacity=0.6-0.7
  - Waypoint markers (size=6) slightly small for 300 points at this canvas scale —
    increase to size=7-8
