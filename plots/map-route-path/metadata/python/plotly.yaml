review:
  strengths:
  - 'Full spec compliance: connected route path with viridis gradient, distinct start/end
    markers (Okabe-Ito positions 1 and 2), intermediate waypoints, and OSM geographic
    basemap all implemented.'
  - 'Correct palette usage: Start=#009E73 (OI-1), End=#D55E00 (OI-2), Waypoints=#0072B2
    (OI-3); viridis used for continuous time-progression gradient — both appropriate
    choices.'
  - 'Theme-adaptive chrome: paper_bgcolor, title font color, legend background/border,
    and legend text all switch correctly between light (#FAF8F1) and dark (#1A1A17)
    renders.'
  - 'Rich interactive features: custom hovertemplate on start, end, and waypoints;
    HTML export with CDN; zoom/pan enabled — exploits Plotly''s interactive strengths.'
  - 'Realistic geographic context: Appalachian Trail through Great Smoky Mountains,
    named waypoints (Newfound Gap, Mt. Kephart), realistic 6-hour hiking timestamps
    at 72-second intervals.'
  - 'Correct canvas: width=800, height=450, scale=4 → 3200×1800 px landscape; autosize=False
    explicitly set.'
  weaknesses:
  - No colorbar for the viridis path gradient — the color encoding of time progression
    is visually present but its scale is unexplained. A colorbar (or dummy scatter
    trace with showscale=True) would make the time axis legible and raise DE-01, DE-02,
    and DE-03 simultaneously.
  - 'Helper function viridis_color() breaks the KISS (Imports → Data → Plot → Save,
    no functions) guideline. Consider using a built-in colorscale approach: add a
    go.Scattermap with mode=''markers'', marker.color=t_values, marker.colorscale=''Viridis'',
    and marker.showscale=True to get both the colorbar and proper gradient with a
    single trace, eliminating the 299-segment loop.'
  - 'Dark mode map tiles remain light (open-street-map is always a light tile set).
    For dark theme, prefer map style ''carto-darkmatter'' which renders dark tiles
    without a Mapbox token. This would make the dark render visually cohesive instead
    of having light OSM tiles inside a #1A1A17 border.'
  - The synthetic route has unrealistic looping/backtracking patterns caused by np.cumsum
    random noise — a real GPS track would generally move net-forward without tight
    spirals. Reduce random noise amplitude (e.g., * 0.0002 instead of * 0.0007) or
    add a forward-bias to keep the path more trail-like.
