      Data: Route path rendered as 299 individual segments with viridis gradient from dark navy-purple at the start (bottom-left) through teal/green midpoint to yellow-green at the end (top-right). Start marker: large green circle (#009E73, size 18) with "Start" label at bottom-left. End marker: large orange circle (#D55E00, size 18) with "End" label near top-right. Two intermediate blue waypoint markers (#0072B2, size 10). Route has looping/spiraling sections near the start area due to cumulative noise.
      Legibility verdict: PASS — all text readable, no dark-on-dark issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) border area visible at top and edges. Map tiles remain light OpenStreetMap (terrain — not dark-mode tiles), creating a mild contrast mismatch between the dark outer border and the light map content inside.
      Chrome: Title "map-route-path · python · plotly · anyplot.ai" in light (#F0EFE8) text — clearly readable against dark border. Legend box has dark elevated background (#242420) with light-border; legend text in light-soft (#B8B7B0) color — readable.
      Data: Viridis gradient colors on route segments are identical to the light render (dark purple → teal → yellow-green). Start (#009E73), End (#D55E00), and waypoint (#0072B2) marker colors are identical to light render. All data elements are distinguishable against the (light) map tiles.
      Legibility verdict: PASS — chrome correctly adapts; no dark-on-dark failures. Note: OSM map tiles remain light in dark render, which is a visual inconsistency (see weaknesses).
