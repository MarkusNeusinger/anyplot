review:
  strengths:
  - Thoughtful dual-panel layout (route map + elevation profile) adds strong data
    storytelling — the journey is shown geographically AND topographically
  - Viridis colormap on waypoints effectively encodes time progression as a continuous
    perceptual gradient — correct choice for sequential data
  - 'Okabe-Ito palette correctly used: BRAND green (#009E73) for Start, vermillion
    (#D55E00) for End, with shape differentiation (circle vs square) for color-blind
    safety'
  - Direction arrows at 4 equidistant intervals clearly indicate travel direction
    without cluttering the route
  - 'Full theme-adaptive chrome: both light (#FAF8F1) and dark (#1A1A17) renders are
    readable, backgrounds correct, no dark-on-dark failures'
  - sns.despine() applied to both axes, subtle y-axis-only grid on elevation panel
    — clean visual hierarchy
  - Clean reproducible code with np.random.seed(42) and realistic Crested Butte, Colorado
    coordinates and elevation values
  weaknesses:
  - Missing geographic basemap (streets or terrain layer) — without it the route floats
    on a blank coordinate plane, undermining the 'map' in map-route-path; consider
    contextily.add_basemap() or a subtle grid of lat/lon reference lines as a lightweight
    alternative
  - Elevation profile tick labels at fontsize=7 are borderline-small for mobile readability
    — increase to 8pt to match the map panel tick size
  - Route line uses ax.scatter() (matplotlib) with sort=False override rather than
    seaborn's native scatter API — LM-01 deduction; for the viridis colormap use case,
    matplotlib.scatter is pragmatically correct but worth noting
  - No explicit seaborn-idiomatic feature (e.g. relplot, FacetGrid) used — the layout
    is built entirely with plt.subplots; acceptable but reduces library distinctiveness
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct. Both subplot panels share the background.
      Chrome: Title "Colorado Mountain Bike Trail · map-route-path · python · seaborn · anyplot.ai" in dark ink, readable at fontsize=11. Axis labels ("Longitude (°)", "Latitude (°)", "Elapsed Time (min)", "Elevation (m)") in dark ink at fontsize=9-10, all readable. Tick labels at fontsize=7-8, slightly small but legible. Colorbar label "Elapsed Time (min)" readable in dark ink (vertical).
      Data: Route path rendered with a light gray line (INK_SOFT) beneath viridis-colored scatter waypoints. Purple cluster at lower-left = early in ride, transitions through blue/teal/green to yellow-green at upper-right. Large green circle (BRAND #009E73) marks Start at lower-left; large orange square (#D55E00) marks End at upper-right. Four black direction arrows visible along route. Elevation profile below: BRAND green line with light green fill (alpha=0.15), showing the climb peaking around 2950m near minute 60-70.
      Legibility verdict: PASS — all chrome elements are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct. Both panels share the dark background.
      Chrome: Title text is light (#F0EFE8), clearly readable. Axis labels in light ink, readable. Tick labels in light-gray (INK_SOFT = #B8B7B0 in dark mode), readable. Colorbar label readable in light ink. Legend box has elevated dark bg (#242420) with light text. No dark-on-dark failures detected.
      Data: Viridis colors (purple → teal → yellow-green) appear identical to light render — correct, only chrome flips. Start green circle and End orange square are identical. Direction arrows appear as subtle light-gray arrowheads (INK_SOFT), visible against near-black. Elevation profile green line and fill are clearly visible against dark background.
      Legibility verdict: PASS — theme adaptation complete; all text is readable against the near-black background, no dark-on-dark issues.
