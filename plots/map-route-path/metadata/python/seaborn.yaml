review:
  strengths:
  - Dual-panel layout (route map + elevation profile) creates a coherent journey narrative
  - viridis colormap for time-progression encoding is perceptually uniform and CVD-safe
  - Distinct Okabe-Ito start (#009E73) and end (#D55E00) markers with correct zorder
    layering
  - Direction arrows at evenly spaced intervals clearly communicate travel direction
  - Comprehensive theme adaptation — all chrome elements (title, labels, ticks, colorbar,
    legend) use correct INK/INK_SOFT tokens in both renders
  - Proper canvas (3200×1800) with no bbox_inches=tight — correct savefig API usage
  - fill_between elevation profile with alpha=0.15 adds depth without overpowering
    the line
  - Reproducible data with np.random.seed(42) and realistic Crested Butte, Colorado
    coordinates
  weaknesses:
  - Colorbar tick labels at fontsize=7 are very small and may be hard to read at smaller
    display sizes — raise to fontsize=8 to match other small labels in the figure
  - Geographic basemap absent — the spec notes this as important for spatial context;
    consider using contextily or a static background image layer even though seaborn
    is static
  - 'Library mastery is limited: core visualization relies heavily on matplotlib primitives
    (ax.scatter, ax.annotate, ax.fill_between) rather than seaborn high-level APIs
    — the seaborn contribution is primarily theming (set_theme, despine) and lineplot;
    this is inherent to the route-map domain but limits LM scores'
  - End marker (orange square, size=300) is placed in a visually dense cluster of
    viridis-colored waypoints at the upper-right of the route — while zorder=5 ensures
    it renders on top, its orange color may be hard to distinguish against the dense
    yellow-green viridis points at that time range
