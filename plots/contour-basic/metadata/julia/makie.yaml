review:
  strengths:
  - Correct imprint_div diverging colormap with theme-adaptive midpoint — textbook
    implementation of the anyplot continuous colormap spec
  - Meaningful climate-science dataset (temperature anomaly) with appropriate real-world
    units and axis labels (Longitude °E / Latitude °N / Temperature Anomaly °C)
  - Both filled contours (contourf!) and overlay contour lines (contour!) combine
    cleanly; 0.35 alpha on lines prevents them from overpowering the fills
  - 'Full Makie layout integration: fig[1, 1] + fig[1, 2] with colorbar linked to
    the contourf plot object via the cf handle'
  - 'Complete theme-adaptive chrome: all text elements (title, labels, ticks, colorbar)
    use INK/INK_SOFT tokens; backgrounds correct (#FAF8F1 light / #1A1A17 dark)'
  weaknesses:
  - xtickcolor and ytickcolor not set in the Axis constructor — these are in the canonical
    Makie chrome template (makie.md) and should be included for complete theme-adaptive
    coverage of tick marks
  - Colorbar tick range (ticks = -2:1:2) does not cover the full contour level range
    (±2.5); consider -2.5:0.5:2.5 or adding limits to ensure full alignment with data
    range
  - No inline contour level labels — spec notes 'Label key contour levels when practical';
    adding them would increase feature coverage and DQ-01 score
  image_description: |-
