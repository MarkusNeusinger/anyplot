      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "contour-basic · julia · makie · anyplot.ai" bold dark text, clearly readable. Axis labels "Longitude (°E)" and "Latitude (°N)" in dark INK color, readable. Tick labels in INK_SOFT (#4A4A44), readable. Colorbar label "Temperature Anomaly (°C)" rotated on right side, readable.
      Data: Diverging colormap (matte red #AE3030 ↔ warm off-white ↔ blue #4467A3). Warm positive pole (~+2°C) lower-left in deep red. Cool negative pole (~-2°C) upper-right in deep blue. Near-zero regions in very light warm tones blending toward background. Contour lines overlaid at 0.35 alpha providing level structure. 11 contour levels visible.
      Legibility verdict: PASS — all text clearly readable, data well-distinguished from background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title light-colored text on dark background, clearly readable. Axis labels and tick labels in INK_SOFT (#B8B7B0 for dark), clearly readable. Colorbar label visible. Left/bottom spines visible as subtle light lines. No dark-on-dark failures.
      Data: Data colors identical to light render — warm red pole lower-left, cool blue pole upper-right unchanged. Near-zero contour regions blend with dark background (intentional: theme-adaptive midpoint = #1A1A17 for dark). This emphasises the anomaly extremes but makes mid-range contour boundaries less distinct.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures observed
