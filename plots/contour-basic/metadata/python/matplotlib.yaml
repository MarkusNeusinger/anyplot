review:
  strengths:
  - Correct use of imprint_seq colormap for single-polarity continuous elevation data
  - Three-layer contour approach (fine minor lines + bolder major lines + clabel inline
    labels) creates excellent visual hierarchy
  - Theme-adaptive chrome works correctly in both renders — all text readable in light
    and dark modes
  - 'Perfect spec compliance: filled contours, contour lines, labeled isolines, colorbar
    all present'
  - Clean deterministic code with no random elements, idiomatic ax.* API usage throughout
  weaknesses:
  - 600 m contour label on the northeast summit is very close to the top axis boundary
    (y≈9.4 in a y=[0,10] plot) — consider reducing the grid extent slightly or adjusting
    pad so clabel has more room
  - Fine minor contour lines at linewidth=0.25 and alpha=0.20 are nearly invisible
    at reduced display sizes — slightly heavier (0.4 pt) or alpha=0.30 would preserve
    the subtle texture while remaining discernible
  - No design choices beyond expected contour plot defaults — no summit annotations,
    no peak labels, no emphasis on the elevation differential between the two peaks
