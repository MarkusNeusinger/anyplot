  weaknesses:
  - Inline contour labels at 7pt and annotation text at 6.5pt are borderline small
    for mobile readability (~5 px at 400 px viewport); increasing clabel to 8pt and
    annotation fontsize to 7.5pt would improve legibility at small sizes
  - DE-01 limited by the heavy green-dominant lower fill — lower elevation regions
    (200-500 m) fill a large fraction of the plot in uniform near-#009E73 green; applying
    PowerNorm(gamma=0.6) or lowering the elevation floor would reveal more gradient
    detail and improve aesthetic sophistication
