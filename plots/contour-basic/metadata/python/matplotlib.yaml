  - Dual-summit topographic narrative with labeled elevation annotations creates a
    clear focal point and data story
  - Correct application of imprint_seq colormap for single-polarity continuous data,
    with perfectly theme-adaptive chrome in both renders
  - Alpha-differentiated contour lines (0.30 minor / 0.65 major) add sophisticated
    depth cue without cluttering the plot
