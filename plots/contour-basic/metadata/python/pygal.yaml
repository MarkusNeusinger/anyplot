review:
  strengths:
  - Implements marching squares contour extraction from scratch — a genuinely sophisticated
    algorithm producing accurate isolines without scipy or matplotlib
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) applied as a filled contour
    surface via SVG rect cells with per-cell bilinear color interpolation'
  - Strategic label placement algorithm using placed_positions repulsion buffer to
    minimize crowding near dense peak zones
  - L-shaped frame (left + bottom only), no inner grid lines, generous whitespace
    — all style guide correct
  - 'Both renders use correct theme backgrounds (#FAF8F1 light / #1A1A17 dark) with
    full chrome adaptation; no dark-on-dark or light-on-light failures'
  - 'All spec requirements met: colorbar with ''Elevation (m)'' label, both filled
    regions and contour lines, labeled key contour levels (major every 200 m), sufficient
    80×80 grid resolution'
  - Realistic topographic context (10 km × 10 km mountain region, ~320–1220 m elevation)
    with plausible two-peak terrain
  - All font sizes explicitly set across title, axis labels, tick labels, colorbar
    labels, and contour annotations
  - Major vs minor contour line differentiation (3 px / 70% opacity vs 1.5 px / 35%
    opacity) adds visual depth
  - Native pygal HTML interactive tooltips preserved for peak markers via chart.add()
    label dicts
  weaknesses:
  - 'VQ-07 PARTIAL: Peak marker series use ochre (#BD8233) as first color rather than
    brand green (#009E73). The visual constraint is understood (green-on-green would
    be invisible), but the correct fix is to use the ''neutral'' semantic anchor (theme-adaptive
    INK color) for peak markers as structural-layer annotations rather than treating
    them as categorical data series. Alternatively, use a theme-adaptive cross/diamond
    shape in INK with a contrasting halo stroke so the first categorical slot returns
    to #009E73.'
  - 'VQ-01 MINOR: Contour level labels at 32 px are noticeably smaller than tick labels
    (38 px) and colorbar labels (38 px). At mobile viewport scaling (~400 px wide),
    these 32 px labels may become marginal. Raise to 36–38 px to match the tick label
    size and improve mobile readability.'
  - 'VQ-02 MINOR: Some crowding of ''1200 m'' and ''1000 m'' labels near the dense
    primary peak (top-right region). The placed_positions algorithm partially mitigates
    this but the concentric contours remain tight. Consider increasing the exclusion
    radius for major labels already placed in the same high-density zone.'
  - 'VQ-03 MINOR: Peak marker dots at dots_size=15 appear quite small on the 3200×1800
    canvas. Increase to dots_size=22–28 so the peak locations are clearly visible
    without needing to zoom.'
  - 'DE-01 OPPORTUNITY: The implementation is technically sophisticated but the visual
    result reads as functional rather than editorial. A short descriptive prefix in
    the title (e.g., ''Mountain Ridge Terrain · contour-basic · python · pygal · anyplot.ai'')
    would add context. Consider slightly warming the Imprint sequential gradient endpoints
    or adding a subtle vignette shadow around the plot area to lift polish.'
  - 'LM-01 NOTE: The core contour visualization is entirely hand-rolled SVG, effectively
    bypassing pygal''s chart rendering. While this is necessary because pygal has
    no native contour type, the solution relies more on SVG geometry than on pygal''s
    API. If feasible, consider using pygal''s HorizontalBar or other native chart
    type to encode any secondary data element natively to increase library utilization.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "contour-basic · python · pygal · anyplot.ai" at 66px dark (#1A1A17) text, clearly readable. X-axis label "Distance East (km)" and Y-axis label "Distance North (km)" at 44px, dark text, readable. Tick labels (0–10) at 38px, dark secondary ink (#4A4A44). Colorbar numeric labels (322–1221) at 38px, readable on the right side. Contour level labels ("400 m", "600 m", "800 m", "1000 m", "1200 m") at 32px with background halo stroke — readable but slightly smaller than tick labels.
      Data: Filled contour uses imprint_seq (#009E73 green at low elevation → #4467A3 blue at high elevation). Two distinct peaks visible — top-right primary peak (ochre dot, higher elevation showing denser blue concentric rings) and lower-left secondary peak (lavender dot, mid-elevation with greenish rings). Major contour lines at 200 m intervals in white/light stroke (70% opacity), minor at 50 m intervals (35% opacity). Colorbar on right matches the surface gradient, labeled "Elevation (m)" rotated 90°. L-shaped frame (left + bottom only).
