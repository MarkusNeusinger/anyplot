review:
  strengths:
  - 'Excellent use of Imprint sequential colormap (green #009E73 → blue #4467A3) for
    the continuous pressure field — correct cmap choice and correct stop order.'
  - Clever use of contourpy to generate isoline paths, cleanly compensating for plotnine's
    missing native geom_contour; the generator + pd.concat approach is idiomatic.
  - Multi-layer composition (geom_raster + geom_path + geom_text) creates a professional
    meteorological-map aesthetic that clearly communicates the two-anticyclone + trough
    structure.
  - 'Theme-adaptive chrome is correctly threaded: PAGE_BG, INK, INK_SOFT applied to
    panel/plot background, axis_title, axis_text, legend — both renders are visually
    correct.'
  - Realistic atmospheric pressure data (1010–1025 hPa, two anticyclones + low-pressure
    trough) with credible domain values and proper np.random.seed(42) reproducibility.
  - Correct canvas dimensions (8×4.5 in @ 400 dpi → 3200×1800 px) with matching figure_size
    and save arguments — no canvas drift.
  weaknesses:
  - Contour line color is hardcoded to '#FFFDF6' (light-theme elevated background)
    regardless of ANYPLOT_THEME. Should be theme-adaptive (e.g. a near-white neutral
    color like '#F0EFE8' on dark or keep '#FFFDF6' only on light). Currently works
    visually in both renders because the lines sit on the raster rather than the plot
    background, but it is not properly theme-adaptive.
  - Contour lines are thin (size=0.5) and semi-transparent (alpha=0.65). At mobile-scaled
    widths (~400 px) they may become barely visible. Increasing to size=0.7–0.8 and
    alpha=0.75–0.8 would improve legibility without dominating the filled background.
  - H/L pressure-centre labels use geom_text(size=5) (5 mm ≈ 14 pt), which is on the
    small side for annotation labels at 3200×1800. Increasing to size=6–7 would make
    them more prominent and readable when scaled down.
  - The spec requests labelling key contour levels — the H/L markers identify pressure-centre
    types but carry no numeric values. Adding a pressure value below each marker (e.g.
    '1025 hPa' beneath the primary H) would satisfy the spec more completely.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct. The raster fill covers the entire plot area with the Imprint sequential colormap running from green (#009E73) at lower pressure values to blue (#4467A3) at higher values.
      Chrome: Title "contour-basic · python · plotnine · anyplot.ai" in dark ink, clearly readable at top. Axis labels "Longitude (°E)" and "Latitude (°N)" in dark ink at appropriate 10pt. Tick labels in INK_SOFT at 8pt — readable. Colorbar legend "Pressure (hPa)" visible to the right.
      Data: Three pressure systems shown — two anticyclones (H labels at lon=3/lat=2 and lon=-5/lat=-3) and a trough (L label at lon=1/lat=-5). White/cream contour isolines visible as concentric rings. Colorbar shows ~1010–1025 hPa range. First (and only) data series uses #009E73 as the low-pressure anchor.
      Legibility verdict: PASS — all text readable against the warm off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct. The raster gradient colours are identical to the light render (same green-to-blue Imprint sequential scale).
      Chrome: Title in light ink (#F0EFE8), clearly readable. Axis labels and tick labels in INK_SOFT (#B8B7B0) — appropriately lighter than primary text. Legend box uses elevated background (#242420) with light text. No dark-on-dark failures observed.
      Data: Contour lines visible as near-white rings on the green-blue raster. H/L labels rendered in light INK (#F0EFE8) and clearly visible. Data colours are identical to the light render — only chrome flipped.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark failures; brand green #009E73 remains clearly visible.
