      Data: Filled contour using imprint_seq (#009E73 brand green → #4467A3 blue). Two mountain peaks visible — smaller at ~(2.5, 3), dominant at ~(7, 7). White contour lines at 100 m intervals; major lines at 200 m intervals drawn thicker (2.2 px, 90% opacity) vs minor (1.2 px, 35%). Elevation labels 400 m–1200 m in dark INK clustered near main peak centre. First data color is #009E73 ✓.
