review:
  strengths:
  - 'Correct Imprint sequential colormap (#009E73 → #4467A3) applied to continuous
    elevation data; both renders theme-correct with identical data colors and properly
    flipped chrome tokens.'
  - 'Full spec compliance: filled contour layer + minor/major contour isolines + colorbar
    + elevation labels at key levels — all required features present.'
  - Sophisticated marching squares implementation (custom cell-case bitmasking) producing
    correct contour line geometry in a library with no native contour support.
  - 'Perfect code quality: flat KISS structure, deterministic data, clean imports,
    correct PAD-only canvas handling, HTML output alongside PNG.'
  - Minor/major contour line distinction (1.2 px@35% vs 2.2 px@90%) creates clear
    visual hierarchy between guidance lines and reference lines.
  weaknesses:
  - The "nearest to centre" label placement stacks all five elevation labels (400
    m–1200 m) in a tight vertical cluster around the main peak; spread them radially
    along each contour band or offset each to a distinct angular position to avoid
    crowding.
  - mark_rect() with maxbins=80 produces a pixelated raster fill with visible bin
    edges; consider tightening bins (maxbins=160 or step=0.125) if pixel budget allows.
  - The chart view is relatively small within the 3200×1800 padded canvas; increasing
    height= slightly (e.g. 360) would better utilize the canvas height.
