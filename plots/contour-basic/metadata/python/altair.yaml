review:
  strengths:
  - 'Correctly applies imprint_seq (#009E73 → #4467A3) for sequential elevation data
    — single-polarity continuous cmap rule satisfied'
  - 'Both themes fully adaptive: INK/INK_SOFT/ELEVATED_BG/PAGE_BG tokens wired through
    title, axis, legend, and elevation labels — no dark-on-dark or light-on-light
    failures'
  - Layered Altair composition (mark_rect fill + minor mark_rule lines + major mark_rule
    lines + mark_text labels) is idiomatic and showcases the library well
  - Manual marching-squares contour line extraction is technically sound and a necessary
    workaround for Altairʼs lack of a native contour mark
  - Radial label-spread algorithm places major-level labels (every 200 m) at distinct
    angular directions from the main peak, reducing clustering
  - 'Spec fully satisfied: filled contour regions + isolines + colorbar + labeled
    key levels, 80×80 grid within the 20-100 spec range'
  - Perfect spec and data quality scores — topographic mountain terrain context is
    plausible, neutral, and at realistic scale
  weaknesses:
  - 1000 m and 1200 m elevation labels render very close together near the peak center
    in both renders — spread angle targets (216° vs 288°) are not far enough apart
    at this proximity to avoid near-overlap; consider adding a minimum-distance filter
    or choosing wider angular spread for the innermost labels
  - mark_rect binning at step=0.125 creates visible rectangular cell structure in
    the filled contour — the pixelation is apparent at full canvas resolution; a finer
    step (0.0625) or alternative approach (e.g., binStep on a higher-resolution flatten)
    would smooth the fill without significantly increasing data volume
  - DE-01/DE-02 are above-default but not exceptional — no spine configuration (Altairʼs
    view has an implicit frame), and the label placement algorithm, while clever,
    serves correctness rather than pure aesthetic elevation
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white.
      Chrome: Title "Mountain Terrain · contour-basic · python · altair · anyplot.ai" at fontSize=16 rendered in dark ink, clearly readable. Axis labels "Distance East (km)" and "Distance North (km)" in dark INK, both readable. Tick labels in INK_SOFT, clearly legible. Colorbar "Elevation (m)" legend in elevated-bg fill, readable.
      Data: Filled contour uses imprint_seq (#009E73 teal-green at low elevation → #4467A3 blue at high elevation). Two mountain peaks clearly visible — large peak in upper-right quadrant (~7,7), smaller peak in lower-left (~2.5,3). White minor contour lines at 35% opacity and thicker major contour lines at 90% opacity visible throughout. Elevation labels (400 m, 600 m, 800 m, 1000 m, 1200 m) in dark INK, spread across the field.
      Label issue: "1000 m" and "1200 m" labels are placed very close together near the center of the right peak — near-overlap visible.
      Legibility verdict: PASS — all chrome elements readable. Minor concern: 1000/1200 m label proximity.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black.
      Chrome: Title in light INK (#F0EFE8), clearly readable against dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0) — light-colored, fully readable. No dark-on-dark failures detected. Colorbar legend in ELEVATED_BG (#242420) fill with light label text.
      Data: Filled contour colors are IDENTICAL to light render — same teal-green to blue gradient for elevation. White contour lines visible against the colored fill. Elevation labels rendered in light INK (#F0EFE8), readable against the colored fill background.
      Legibility verdict: PASS — both themes correctly themed, no dark-on-dark issues. Same label proximity issue as light render.
