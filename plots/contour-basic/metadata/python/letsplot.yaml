review:
  strengths:
  - Theme-adaptive diverging midpoint (mid=PAGE_BG) elegantly blends zero-crossing
    regions into the background surface
  - 'Excellent layer composition: geom_contourf + geom_contour + bold dashed zero-crossing
    boundary + geom_text peak annotations'
  - letsplot-distinctive interactive tooltips via layer_tooltips() — a genuine differentiating
    feature
  - HTML export alongside PNG
  - 'Full code quality: clean imports, seed set, KISS structure, correct output filenames'
  - 'Perfect palette compliance: imprint_div colors (#AE3030 / PAGE_BG / #4467A3)
    and theme-adaptive chrome throughout'
  weaknesses:
  - 'Near-zero filled contour bands blend into the dark (#1A1A17) background making
    the transition regions visually ambiguous in the dark render — consider setting
    mid to a slightly lighter neutral (e.g. #2E2E2A) rather than the full PAGE_BG
    to retain fill visibility at zero'
  - Peak A annotation text (geom_text size=4mm) is hard to read in the dense contour
    region at (1, 1.3) — increase to size=5 and add color=INK_SOFT or use a contrasting
    background
  - 'Spec requires labeling key contour levels: only peak names and the zero boundary
    are identified, but no numeric iso-value labels appear on the contour lines —
    add geom_text annotations or contour_label breaks for 3–4 representative levels
    (e.g. 0.25, 0.5, 0.75)'
