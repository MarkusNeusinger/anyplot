  strengths:
  - 'Perfect spec compliance: filled KDE + isoline overlay + labeled levels + colorbar
    all implemented correctly'
  - 'Excellent palette compliance: imprint_seq is exactly right for continuous density
    data, and both theme backgrounds are correct (#FAF8F1 light / #1A1A17 dark)'
  - Creative dual-layer approach (seaborn kdeplot fill + scipy contour overlay) is
    architecturally sound despite requiring a workaround for labeled isolines
  - 'Full theme adaptation: all chrome elements (title, labels, ticks, colorbar, axes)
    use theme-adaptive tokens correctly — dark render passes the dark-on-dark check
    completely'
  - Clean, idiomatic seaborn code with reproducible seed (np.random.seed(42)) and
    correct canvas size (figsize=(8,4.5), dpi=400, no bbox_inches='tight')
  weaknesses:
  - Mode annotations ('Cold Front', 'Warm Front') at fontsize=8 and INK_SOFT color
    have limited contrast against the dense blue-core fill in the light render — increase
    fontsize to 9-10 and use INK (primary text color) for better legibility on the
    fill
  - Dotted reference line at 1017 hPa (alpha=0.5, linewidth=0.8) is nearly imperceptible
    in both renders — either increase prominence (linewidth=1.2, alpha=0.7) or remove
    it if it serves no measurable purpose
  - X-axis extent shows negative wind speeds (~-2 m/s) due to multivariate normal
    sampling — wind speed is non-negative meteorologically; clip data after sampling
    or use a distribution that stays positive
  - 'LM-02 limited: labeled isolines require a scipy/matplotlib workaround (gaussian_kde
    + ax.contour + ax.clabel) because seaborn''s kdeplot cannot return a labeled ContourSet
    natively'
