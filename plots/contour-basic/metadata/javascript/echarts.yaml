review:
  strengths:
  - 'Excellent theme adaptation: all chrome tokens (t.ink, t.inkSoft, t.seq) correctly
    mapped; dark render fully readable with no dark-on-dark failures.'
  - Correct imprint_seq colormap (t.seq) for continuous data — palette compliant.
  - Square orientation is appropriate for the symmetric 2D grid.
  - Fully deterministic data (mathematical bivariate Gaussian, no RNG); ideal for
    reproducibility.
  - 'Clean, idiomatic ECharts heatmap with animation: false, no explicit size/dpr,
    emphasis: { disabled: true }.'
  weaknesses:
  - 'The implementation is a heatmap, not a contour plot. The spec''s defining feature
    — isolines (level curves) connecting points of equal value — is completely absent.
    ECharts has no native contour series, but isolines can be approximated: compute
    contour level thresholds (e.g., 10 evenly-spaced values between minVal and maxVal),
    then for each threshold draw polyline segments along cell boundaries where the
    density crosses that value. Overlay them as a lines series on top of the heatmap
    with a semi-transparent ink-color stroke and optional text labels.'
  - No labeled contour levels. Even without full isolines, adding text annotations
    for a few key density values (e.g., the peak value and a mid-range level) would
    improve informativeness.
  - 'Minor: colorbar bar width is narrow; consider increasing the visualMap itemWidth
    to 20-25 for better visibility at small display sizes.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface
      Chrome: Title "contour-basic · javascript · echarts · anyplot.ai" in bold dark ink, clearly readable. Axis labels "X" (bottom) and "Y" (left) in ink-soft token, readable. Tick labels -3.0 to 3.0 on both axes in ink-soft, readable. Colorbar "High"/"Low" labels visible and readable.
      Data: Smooth color-gradient heatmap from brand green #009E73 (low density) to muted blue-purple (high density peaks), consistent with imprint_seq. Two distinct Gaussian density peaks visible. Colorbar vertical on right side.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title flips to near-white light ink, clearly visible. Tick labels (-3.0 to 3.0) rendered in light ink-soft token, clearly readable against dark background. Axis name labels "X" and "Y" in light ink-soft, readable. Colorbar "High"/"Low" text in light ink-soft, readable. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — same green-to-blue gradient for density peaks. Only chrome elements (background, text colors) flip for the dark theme.
      Legibility verdict: PASS
