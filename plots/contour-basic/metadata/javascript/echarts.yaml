review:
  strengths:
  - Dual-layer visualization (heatmap fill + marching squares isolines) correctly
    implements the spec's suggestion to use both filled regions and contour lines
  - Custom series with renderItem group elements for the isoline labels is sophisticated
    idiomatic ECharts usage
  - Contour label background boxes (pageBg fill at 0.78 opacity) prevent text legibility
    issues over the colored heatmap surface in both themes
  - Full Imprint sequential palette compliance (t.seq = green to blue) for the continuous
    colormap
  - Saddle-point disambiguation in marching squares (center-value heuristic for 4-crossing
    cells) is technically correct
  weaknesses:
  - Contour labels 0.22-0.78 all cluster in the saddle region between the two peaks;
    the label-placement algorithm selects segments nearest to grid center, which concentrates
    all middle-value labels in the same small area — a better heuristic would spread
    labels along the longest segment or around the peak perimeters
  - Contour isolines at opacity 0.5 are slightly faint over the vibrant heatmap background;
    increase to 0.75-0.85 for better isoline legibility
  - Axis labels 'X' and 'Y' are minimal; more descriptive labels like 'X Coordinate'
    and 'Y Coordinate' would improve clarity
  - Contour lines appear angular/octagonal due to the 61-point grid step (0.1); a
    finer grid (step 0.05, ~120 points) would produce smoother isolines
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "contour-basic · javascript · echarts · anyplot.ai" bold centered in dark ink, fully readable. X-axis label "X" and Y-axis label "Y" in inkSoft color, readable. Axis tick labels (-3.0 to 3.0 at interval 9) in inkSoft at 14px, readable. Colorbar text "High"/"Low" in inkSoft, readable.
      Data: Heatmap using Imprint sequential colormap (t.seq: green #009E73 at min → blue #4467A3 at max). Two Gaussian peaks visible — primary in upper-right (~1.3, 1.0), secondary in lower-left (~-1.0, -1.0). Eight contour isolines overlaid via marching squares in dark ink at 0.5 opacity, each with a small label box. Six labels cluster in the saddle region between peaks.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title in light-colored ink (t.ink dark mode ≈ #F0EFE8), fully readable. Axis labels and tick labels in inkSoft dark mode (≈ #B8B7B0), readable. Colorbar "High"/"Low" labels readable. No dark-on-dark failures observed.
      Data: Heatmap data colors identical to light render — same Imprint sequential green-to-blue gradient, same two-peak structure. Contour isolines are lighter (t.ink in dark mode) making them more visible against the dark heatmap. Label background boxes use t.pageBg (dark surface ≈ #1A1A17), text fill in t.ink (light), correct dark-mode appearance.
