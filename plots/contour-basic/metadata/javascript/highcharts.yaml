review:
  strengths:
  - Marching-squares algorithm implemented in pure JS within the Highcharts SVG renderer
    — the correct approach for a plot type with no native core series
  - Imprint seq (#009E73→#4467A3) correctly used as single-polarity continuous gradient;
    data colors identical in both themes; all chrome theme-adaptive
  - 'Full spec compliance: contour isolines, colorscale legend, labeled key levels,
    correct title, descriptive axis labels with units'
  - Spines fully removed (lineWidth:0, tickWidth:0) and grid subtle — clean professional
    look
  - Elevation labels with pill backgrounds at spread-out zones add readability without
    cluttering
  weaknesses:
  - Contour labels at 11px CSS (22px native) slightly below the 14px CSS guideline
    — increase to 12–13px CSS for better mobile readability
  - 'No filled contour regions: adding filled bands between isolines would significantly
    increase visual richness, matching the spec suggestion to use both contour lines
    and filled regions'
  - Terrain topology still primarily Gaussian-peak based; a true depression/valley
    would demonstrate the full range of contour features including closed inner contours
    at minimum
  image_description: |-
