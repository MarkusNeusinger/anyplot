      Data: 10 contour isolines in Imprint seq gradient from #009E73 (green, low elevation) to #4467A3 (blue, high elevation); three-peak topology with oval outer contour and two interior peak regions; elevation pill-background labels at 5 spread zones (e.g. ~356m, ~582m, ~780m); vertical legend right-middle listing 153m–1070m levels
