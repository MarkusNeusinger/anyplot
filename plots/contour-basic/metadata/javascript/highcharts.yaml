review:
  strengths:
  - Correctly implements marching-squares contour algorithm in pure JS within the
    Highcharts SVG renderer — a clever approach for a plot type with no native Highcharts
    core series.
  - Imprint seq palette (#009E73→#4467A3) correctly applied as continuous color gradient;
    both themes render with identical data colors and theme-adaptive chrome.
  - 'Full spec compliance: correct contour chart type, 10 well-spaced levels, descriptive
    axis labels with units, exact required title format, and plausible topographic
    data context.'
  - 'Advanced Highcharts API usage: clipRect, renderer.g(), toPixels() — properly
    clips SVG paths to the plot area.'
  weaknesses:
  - 'Design refinement is minimal: axis lines and tick strokes are visible with no
    suppression; set xAxis.lineWidth: 0, yAxis.lineWidth: 0, xAxis.tickWidth: 0, yAxis.tickWidth:
    0 to remove spines for a cleaner look.'
  - 'No filled contour regions: the spec suggests combining filled areas and isolines;
    filled regions would significantly improve visual richness and data storytelling.'
  - 'Contour lines are unlabeled: adding elevation value labels directly on key contour
    lines would improve storytelling and reduce reliance on the side legend for reading
    values.'
  - Legend font at 13px is below the 14px guideline; increase to 14px.
  - Data topology limited to two smooth Gaussian peaks; a saddle point or valley would
    demonstrate the full range of contour plot features.
