review:
  strengths:
  - 'Idiomatic D3 contour pipeline: d3.contours() + d3.geoTransform + geoPath correctly
    projects grid-space geometries into plot-space'
  - Imprint diverging colormap (t.div via d3.interpolateRgbBasis) with theme-adaptive
    midpoint — red/blue hues identical across themes, only the midpoint neutral flips
  - Custom SVG linearGradient colorbar with styled axis using d3.axisRight — matches
    plot tokens throughout
  - Correct clipPath usage keeps contour fills contained within the plot border
  - Deterministic mathematical peaks function (80×80 grid, Float64Array) — no randomness,
    fully reproducible
  - 'All theme-adaptive chrome correctly threaded: t.ink, t.inkSoft, t.grid applied
    to every text, tick, and domain element'
  weaknesses:
  - Contour isolines at stroke-width 0.7 and stroke-opacity 0.2 are nearly invisible
    in the light render — increase stroke-opacity to ~0.35 and stroke-width to 1.0
    so isolines add the clarity the spec intends
  - No contour level labeling at key thresholds — the spec suggests labeling key levels
    when practical; with a colorbar already present, at minimum the zero-crossing
    isoline could be slightly thicker/more prominent to help locate the positive/negative
    boundary
  - 'DE-01/DE-03: No data narrative — the peaks function is mathematically complete
    but lacks any callout or emphasis on the global maximum/minimum regions that would
    guide the viewer to the most interesting features'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page surface, not pure white.
      Chrome: Title "contour-basic · javascript · d3 · anyplot.ai" in bold dark ink, fully readable. X-axis label "x" and y-axis label "y" in dark ink at 16px, readable. Tick labels in inkSoft (#4A4A44) at 14px, clearly visible from -3 to 3 on both axes. Colorbar ticks at 12px with "z (field value)" rotated label — readable at full resolution.
      Data: Diverging colormap from Imprint t.div — red (negative) through near-cream neutral midpoint to blue (positive). Four distinct features visible: large blue peak at upper-center (~y=1.5, x=0), deep red trough at lower-center (~y=-1.5, x=0), a secondary red region at left (~x=-1, y=0.3), and a smaller blue region at right (~x=1.1, y=0). 18 filled contour bands with very faint semi-transparent isolines overlaid. Custom gradient colorbar spanning full plot height on the right.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title in light cream ink, clearly readable against dark background. Axis labels and tick labels in light inkSoft (#B8B7B0) — readable, no dark-on-dark issue. Colorbar axis ticks and "z (field value)" label are in light color, readable.
      Data: Same diverging colormap — the Imprint div midpoint adapts to dark (#1A1A17), so mid-range values appear as near-black rather than cream. Red negative regions and blue positive peaks remain fully visible and identical in hue to the light render. Isolines are slightly more visible in dark mode as thin light-gray lines.
      Legibility verdict: PASS — no dark-on-dark failures detected.
