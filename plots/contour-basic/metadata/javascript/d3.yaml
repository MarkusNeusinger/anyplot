review:
  strengths:
  - Excellent use of d3.contours() with d3.geoTransform()/d3.geoPath() coordinate
    projection — idiomatic and distinctive D3 approach
  - Imprint diverging colormap (t.div) correctly chosen for zero-centered data with
    both positive and negative values
  - Focal-point annotations (global max/min dashed circles) create immediate visual
    hierarchy and guide the viewer
  - Zero-crossing isoline emphasis is a subtle but effective storytelling choice
  - 'Full theme-adaptivity: both light and dark renders are correct with no dark-on-dark
    failures'
  - Perfectly linear, reproducible deterministic code structure
  weaknesses:
  - Axis labels x and y are single characters with no descriptive context; a real-world
    framing with meaningful axis labels would improve DQ-02 and VQ-06
  - Focal-point annotation text is 11px CSS (22px in PNG) — readable at desktop but
    slightly small at 400px mobile width; consider 12-13px
  - DE-01 could be elevated with a subtle horizontal grid (y-axis only, opacity ~0.1)
    to aid reading z-values off the colorbar
