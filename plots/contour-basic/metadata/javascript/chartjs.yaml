review:
  strengths:
  - Creative use of Chart.js scatter type to simulate filled contour bands — 28 z-level
    datasets create a convincing diverging fill across the grid
  - Marching squares algorithm implemented within the Chart.js afterDraw plugin hook,
    producing proper interpolated isolines for every other level
  - 'Custom colorbar drawn directly on canvas: gradient from t.div[0]→t.div[1]→t.div[2],
    tick marks at min/0/max, zero-line marker, and ''z'' label'
  - Correct use of imprint_div diverging colormap via t.div tokens — data colors identical
    across both themes, only chrome adapts
  - 'Fully deterministic: mathematical peaks function on a 70×70 grid with no randomness;
    both themes rendered correctly with proper ANYPLOT_TOKENS chrome'
  - 'Correct Chart.js boilerplate: responsive, maintainAspectRatio: false, animation:
    false, single canvas appended to #container, square orientation directive'
  weaknesses:
  - Axis labels are generic 'X' and 'Y' — for a mathematical peaks function, 'x coordinate'
    and 'y coordinate' would be more descriptive and score VQ-06
  - Scatter-based contour fill creates slight pixelation at band boundaries — visible
    as rounded dot edges where adjacent z-bands meet; higher grid density (N=90+)
    or smaller pointRadius (6–8) could reduce the artifact
  - 'A spurious cross/× marker artifact appears at the highest-z peak region in both
    renders (white × in light, dark × in dark) — likely the Chart.js default scatter
    pointStyle showing through where the top z-band has very few data points; adding
    pointStyle: ''circle'' to each dataset config would suppress this'
  - 'DE-01 and DE-02 have room to grow: spines are still fully visible (all four axis
    borders), grid is present but could be y-only for a cleaner look, and the colorbar
    ''z'' label font size (15px) is slightly small compared to the axis title font
    size (16px)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, no pure white
      Chrome: Title "contour-basic · javascript · chartjs · anyplot.ai" in dark ink at top — fully visible and readable. Y-axis label 'Y' in dark ink (left). X-axis label 'X' in dark ink (bottom). Tick labels -3 to 3 on both axes in secondary ink color — all readable. Colorbar on right with 'z' label, gradient from red at bottom (-6.5) through near-neutral midpoint to blue at top (+8.1), tick marks at min/0/max.
      Data: Diverging contour fill from reddish-coral (negative regions) through near-cream (zero crossings) to medium blue (positive peak). Three main regions: a large positive blue peak (upper-center), a negative red region (left), and a strong negative red peak (lower-center). Subtle isolines drawn at every-other level via marching squares. Small white '×' artifact visible at the center of the highest-z blue peak region.
      Legibility verdict: PASS — all chrome text readable, warm background correct.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black
      Chrome: Title in light/cream text — fully readable against dark background. Y-axis label 'Y' and X-axis label 'X' in light ink — visible. Tick labels in secondary light color — readable. Colorbar gradient same structure (red→dark-midpoint→blue), with light-colored tick labels.
      Data: Same contour structure as light render — the imprint_div data colors (red, near-neutral-dark, blue) are identical to the light render. The diverging midpoint adapts to the dark surface color (t.div[1]), making the zero-crossing bands blend into the near-black background, creating a dramatic contrast between the colored peaks/valleys. Isolines visible as subtle lighter strokes. Same '×' artifact visible as a dark cross at the peak location.
      Legibility verdict: PASS — no dark-on-dark text failures; all labels readable; brand adaptation correct. Data colors identical between themes as required.
