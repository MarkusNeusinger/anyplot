review:
  strengths:
  - Custom colorbar plugin using Chart.js afterDraw hook and Canvas2D API — genuinely
    idiomatic use of Chart.js's plugin system
  - Correct application of Imprint diverging palette (t.div tokens) for continuous
    data with a meaningful zero-crossing midpoint
  - 'Theme-adaptive chrome: all text, grid, and colorbar elements read from ANYPLOT_TOKENS
    — both renders correctly adapt'
  - Zero-line annotation inside the colorbar elegantly marks the valley/peak boundary
    at z=0
  - 'Fully deterministic: peaks function is a classic, widely-recognized mathematical
    surface with no RNG'
  - Square orientation chosen correctly for a symmetric 2D spatial field
  - 'Clean plugin separation: colorbar logic isolated to its own plugin object, chart
    config stays concise'
  - 'Correct Chart.js flags: responsive:true, maintainAspectRatio:false, animation:false
    all set per library rules'
  weaknesses:
  - 'Scatter-dot approach creates a pixelated/blocky appearance at band boundaries
    — using larger overlapping point radius to smooth transitions would improve visual
    quality (e.g. pointRadius: 12-14 with slight alpha blending between adjacent bands)'
  - No contour isolines overlaid on the filled bands — the spec explicitly mentions
    'Consider using both contour lines and filled regions for clarity'; even simple
    white-outline dots along iso-value boundaries would approximate this
  - Colorbar tick font size (13px) is slightly small for the 2400×2400 canvas — increase
    to 15px to match the 'z' label size and improve mobile readability
  - Axis labels 'X' and 'Y' are minimal but acceptable; could be more descriptive
    for a mathematical context (e.g. 'x coordinate' / 'y coordinate') though not a
    strict violation
  - The staircase edges between z-bands are visible where adjacent color regions meet
    — NUM_LEVELS could be increased from 16 to 24-32 to reduce the visible stepping
    artifact
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, matches the anyplot light surface token.
      Chrome: Title "contour-basic · javascript · chartjs · anyplot.ai" in dark ink, clearly readable. X-axis label "X" and Y-axis label "Y" in dark ink. Tick labels (-3 to +3 on both axes) in secondary ink (#4A4A44). Colorbar to the right with "z" label, tick marks at +8.1, 0, and -6.5.
      Data: Diverging red-to-blue Imprint colormap (t.div tokens). Blue region upper-center represents the dominant positive peak (+8.1). Two red/rose regions at left-center and lower-center represent the negative valleys (-6.5). A smaller blue band at right-center shows a secondary positive region. 16 z-bands rendered as scatter dots create a blocky filled-contour effect. Grid lines subtle but visible against the off-white background.
      Legibility verdict: PASS — all text readable, no light-on-light failures, colorbar labels clear.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, matches the anyplot dark surface token.
      Chrome: Title in light ink (#F0EFE8), clearly readable. Axis labels in light ink. Tick labels in secondary light ink. Colorbar gradient and labels visible. Grid lines faint but appropriately subtle against the dark background.
      Data: Colors are identical to the light render — blue peak and red valleys in the same positions. The diverging colormap appears slightly more saturated against the dark background, which is expected. No dark-on-dark text failure detected.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures, data colors unchanged between themes.
