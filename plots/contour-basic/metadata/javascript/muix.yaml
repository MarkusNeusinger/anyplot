review:
  strengths:
  - Correct Imprint sequential colormap usage (t.seq[0]→t.seq[1]) for continuous elevation
    data
  - Creative multi-band ScatterChart approach produces a recognizable filled-contour
    visual within MUI X community constraints
  - Fully deterministic two-Gaussian-peak topology is realistic and creates a compelling
    data story
  - 'Both themes handled correctly: t.pageBg, t.ink, t.inkSoft throughout; data colors
    identical across both renders'
  - Clean, elegant code with proper MUI X harness contract (skipAnimation, tooltip
    disabled, export default)
  weaknesses:
  - No actual contour isolines (level curves) — spec requires isolines connecting
    points of equal value; implementation only shows filled bands via scatter simulation
  - Jagged/serrated pixel edges where scatter circles meet the plot border reduce
    visual polish
  - At mobile scale (~400px viewport), tick labels approach readability limit; slightly
    larger tick labels (14-15px) would improve safety margin
