review:
  strengths:
  - Excellent color accessibility with viridis colormap (CVD-safe)
  - Clear spatial pattern visualization (temperature gradient from lower-left to upper-right)
  - Proper theme adaptation in rendered output with readable text in both light and
    dark surfaces
  - Appropriate marker size (4pt) for 150-point scatter with adequate color visibility
  - Clean data and realistic context (sensor grid temperature measurements)
  weaknesses:
  - Code does not read ANYPLOT_THEME environment variable or implement theme-adaptive
    colors in theme() call
  - Output filename hardcoded to 'plot.png' instead of f'plot-{THEME}.png' (violates
    CQ-05 spec)
  - Title in code shows 'pyplots.ai' but images show correct 'anyplot.ai' (code/output
    mismatch)
  - No explicit theme-adaptive color configuration (PAGE_BG, INK, INK_SOFT tokens)
    in theme() despite images appearing properly themed
  - Generic design with default minimal theme; no custom refinement beyond viridis
    colormap
