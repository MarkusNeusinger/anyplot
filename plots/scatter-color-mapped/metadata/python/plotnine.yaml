      Data: Colors identical to light render (viridis gradient unchanged) — only chrome adapted between themes, confirming proper theme separation.
      Grid: Subtle light gray gridlines properly visible on dark surface.
      Legibility verdict: PASS — no readability issues; text contrasts well; grid visible but subtle.

    Both renders meet theme-readiness criteria: backgrounds are correct colors (warm off-white / warm near-black, never pure white/black), all text maintains legibility in its respective theme, chrome chrome elements properly flipped while data colors remain constant.
