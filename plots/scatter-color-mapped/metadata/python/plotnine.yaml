    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface color
      Chrome: Title "scatter-color-mapped · plotnine · anyplot.ai" in dark text; axis labels "X Position (m)" and "Y Position (m)" in dark text; tick labels (0, 25, 50, 75, 100) in dark gray; colorbar label "Temperature (°C)" dark text; all clearly readable on light surface.
