review:
  strengths:
  - Correct use of stat_ecdf() with pad=FALSE — idiomatic ggplot2 ECDF implementation
  - 'Excellent redundant encoding: both color (Imprint palette) and linetype (solid/dashed)
    distinguish cohorts, improving CVD accessibility'
  - 'Smart legend merge: scale_color_manual and scale_linetype_manual share the same
    name, producing a clean unified legend entry'
  - Proper theme-adaptive chrome across both light and dark renders — all token values
    correct
  - Y-axis formatted as percentages using percent_format() from scales — shows clean
    domain awareness
  - 'Perfect spec compliance: step function, Y-axis 0–100%, grid lines for percentile
    reading, two-group comparison'
  weaknesses:
  - 'DE-01 (5/8): No descriptive title prefix to set context — adding e.g. "Exam Score
    Distribution by Curriculum Type · ecdf-basic · r · ggplot2 · anyplot.ai" would
    raise aesthetic sophistication'
  - 'DE-03 (3/6): No visual emphasis or storytelling annotations — consider adding
    geom_segment reference lines at median (50th percentile) for each cohort, or annotate()
    callouts noting the median gap between Class A and Class B'
  - 'LM-02 (3/5): Merged legend technique is a nice touch but the implementation stops
    short of leveraging ggplot2 distinctive features fully — e.g., annotate() with
    geom_vline for reference percentiles, or ggtext::element_markdown for richer title
    formatting would elevate the plot'
