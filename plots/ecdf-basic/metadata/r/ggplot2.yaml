review:
  strengths:
  - Two-cohort ECDF comparison with stat_ecdf() and dual redundant encoding (color
    + linetype) is CVD-safe and visually clear
  - 'Thoughtful median annotation design: vertical droplines + intersection markers
    + horizontal 50% reference creates a strong focal point and explicit data story'
  - Informative subtitle states the key insight quantitatively (8-pt gap at the 50th
    percentile)
  - Perfect Imprint palette compliance with full theme-adaptive chrome — both renders
    look correct
  - Clean idiomatic ggplot2 code with combined legend pattern and correct title scaling
    for long title
  weaknesses:
  - Title font (10pt) is the same size as axis labels (10pt), reducing typographic
    hierarchy — plot.title could be 11-12pt and axis.title dropped to 9pt to create
    clearer hierarchy without overflowing
  - 'DE-01 ceiling: the median annotation design is good but the overall visual polish
    stays just above default — consider adding geom_rug() under the x-axis to show
    individual data point density alongside the ECDF curve'
  - 'LM-02: The implementation does not exploit distinctive ggplot2 features beyond
    stat_ecdf and the combined-legend trick — geom_rug(), facet_wrap(), or after_stat()
    would demonstrate deeper grammar-of-graphics mastery'
