  - Correct ECDF step function using Plotly's idiomatic line shape='hv' with proper
    1/n cumulative proportion calculation
  - Clean, reproducible code with seed(42), no functions/classes, and well-structured
    KISS flow
  - Realistic marathon finishing times data (mean=240min, std=32min) — neutrally scoped
    and domain-appropriate
  - 'Excellent interactive layer: x-unified hovertemplate with percentage-formatted
    tooltip and custom modeBar config'
  - 'All font sizes explicitly set: title=28px, axis labels=22px, tick labels=18px'
  weaknesses:
  - No visual storytelling — missing percentile reference lines (Q1/median/Q3) that
    would guide the viewer to key statistical moments of the distribution
  - Design lacks a focal point — the ECDF curve is plotted raw with no emphasis on
    the central region of highest density (the S-curve inflection around the median)
  - Grid appears on both axes; for ECDF reads (vertical look-up), y-axis-only grid
    or a lighter opacity would reduce visual noise without losing utility
  - No area fill under the ECDF curve — a semi-transparent fill would add aesthetic
    depth and better convey the cumulative nature of the statistic
