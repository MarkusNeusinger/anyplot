review:
  strengths:
  - Lognormal distribution for HTTP latency is a technically accurate data choice
    that produces a realistic and instructive ECDF shape
  - P50/P90/P99 annotated crosshairs transform a basic ECDF into an actionable performance
    analysis tool — directly reads SLA thresholds
  - Full theme-adaptive chrome using all correct tokens (INK, INK_SOFT, GRID, PAGE_BG,
    ELEVATED_BG); dark render passes the dark-on-dark readability check cleanly
  - sys.path manipulation is a legitimate and well-commented fix for the plotly.py
    filename-shadowing issue
  - Compact, well-structured code with no unnecessary abstraction
  weaknesses:
  - P50 annotation ("P50 125 ms") placement at xanchor=left/yanchor=bottom at the
    50% intersection point sits very close to the ECDF step line, causing minor visual
    crowding — consider increasing yshift to 8-12 or xshift to 12-15 so the label
    clears the step line
  - Design excellence is solid but not at the top tier — adding a subtle shaded region
    (e.g., fill between 0 and the ECDF line, or a shaded p90-p99 tail zone) could
    elevate the storytelling and aesthetic sophistication further
