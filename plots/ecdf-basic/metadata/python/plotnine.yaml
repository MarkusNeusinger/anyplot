      Data: Brand green #009E73 ECDF step line clearly visible at size=1.1 — traces the cumulative distribution from 0 to 1 across test score range ~0–100. IQR shaded rectangle between Q1≈39.4 and Q3≈63.1 in brand green fill at alpha=0.06 — perceptible as a faint teal tint but very subtle. Six dotted reference lines (3 horizontal at y=0.25/0.50/0.75; 3 vertical at Q1/median/Q3) in INK_SOFT. Annotation labels: "Q1: 39.4" at (41, 0.16), "Median: 49.9" at (51.5, 0.08), "Q3: 63.1" at (64.6, 0.80) — small but readable.
