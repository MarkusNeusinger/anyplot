review:
  strengths:
  - stat_ecdf correctly computes the ECDF via plotnine's native stat layer — no manual
    ECDF calculation needed, maximally idiomatic ggplot2 grammar
  - 'Quartile storytelling is effective: IQR shaded band + dotted Q1/median/Q3 crosshairs
    + value annotations guide the viewer to extract percentile information directly
    from the step function'
  - Theme adaptation is flawless — all chrome tokens (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    correctly flip between warm-off-white light and near-black dark themes with no
    dark-on-dark failures
  - 'Perfect spec compliance: stat_ecdf step function, Y-axis 0–1, descriptive axis
    labels with units, correct title format, realistic neutral test-score dataset
    of 200 observations'
  weaknesses:
  - IQR shaded band uses alpha=0.06 — nearly invisible in both renders; increase to
    alpha=0.12–0.15 so the interquartile region has meaningful visual weight without
    overpowering the step line
  - Six dotted reference lines (3 horizontal at Q1/0.50/Q3 + 3 vertical at Q1/median/Q3)
    layered on top of 10 major Y-axis grid lines creates visual clutter; consider
    removing the panel Y-axis grid when quartile reference lines are present, or reduce
    opacity of reference lines further
  - Quartile annotation labels at annotate size=3.5 mm are small at mobile scale;
    increase to size=4.5–5.0 mm for better readability across screen sizes
