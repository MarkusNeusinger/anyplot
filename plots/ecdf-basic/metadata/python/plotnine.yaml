review:
  strengths:
  - Correct idiomatic use of stat_ecdf — plotnine's statistical transformation layer
    handles ECDF computation natively without any manual sort/rank/cumsum code
  - Median crosshair (dotted hline + vline + annotation) creates a clear focal point
    and demonstrates how to read specific percentiles from the ECDF
  - 'Full theme-adaptive chrome: all text and non-data elements (title, axis labels,
    tick labels, grid, annotation) use the correct INK/INK_SOFT/INK_MUTED tokens for
    both light and dark renders'
  - Y-axis properly scaled 0–1 with 0.1 breaks, enabling direct percentile reading
    — matches the spec requirement exactly
  - Canvas at 3200×1800 (8in × 4.5in @ 400dpi) meets the hard plotnine canvas rule;
    ggsave called with matching width/height
  weaknesses:
  - 'Median annotation text (size=3.5mm, INK_MUTED color) is quite small and low-contrast
    — in the dark render #A8A79F on #1A1A17 is faint; consider increasing to size=4
    and using INK_SOFT instead of INK_MUTED'
  - Design is clean but relatively simple — the implementation does not push into
    higher aesthetic territory (no visual hierarchy beyond the median callout, no
    emphasis on the S-curve shape or interesting region of the distribution)
