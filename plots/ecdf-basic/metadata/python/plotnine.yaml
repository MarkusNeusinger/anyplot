      Data: ECDF step line in brand green #009E73 (Imprint palette position 1). Dotted crosshair reference lines (geom_hline at y=0.5, geom_vline at x≈50) in INK_SOFT. Annotation "Median: 49.9" in INK_MUTED, small but readable.
