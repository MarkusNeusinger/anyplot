review:
  strengths:
  - Uses matplotlib's native ax.ecdf() function (3.8+ API) — not available in other
    libraries without manual ECDF computation
  - Bimodal IoT sensor temperature data with mode markers ('Server rooms' / 'Offices')
    creates an immediately legible narrative
  - Quartile reference guides (Q1/Q2/Q3 dotted lines + annotations) directly support
    the spec requirement for percentile readability
  - Subtle fill-under-curve (step='post', alpha=0.10) adds visual depth without distracting
    from the ECDF line
  - 'Perfect theme-adaptive chrome: both light (#FAF8F1) and dark (#1A1A17) renders
    fully readable with no dark-on-dark failures'
  - All font sizes explicitly set with proportional scaling (title_fs computed from
    title length); canvas matches required 3200×1800 px exactly
  weaknesses:
  - Q-annotations use only xytext=(5, 5) offset points from the data intersection
    — very small clearance that places annotation text close to the ECDF curve; a
    larger offset (e.g. (8, 8) or (10, 10)) or a small callout line would improve
    separation
  - Fill-under-curve alpha=0.10 renders nearly invisible in the dark theme; increasing
    to alpha=0.13–0.15 would make the fill readable in both themes without looking
    heavy
  - LM-02 could be raised by explicitly leveraging ax.ecdf()'s complementary=False/True
    parameter or the 'data' kwarg — minor missed opportunity to showcase the full
    API
  image_description: |-
