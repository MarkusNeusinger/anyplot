      Data: Single-series ECDF step line in brand green #009E73, linewidth=2.5, clearly visible. Subtle fill under curve in same green at alpha=0.10 — very light. Dashed vertical mode markers at 18.5°C ("Server rooms") and 22.0°C ("Offices") in INK_MUTED, appropriately subtle. Quartile dotted-line guides (Q1 18.8°C, Q2 20.7°C, Q3 22.4°C) with annotations in INK_MUTED. Y-axis horizontal grid at alpha=0.15.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correctly not pure black.
      Chrome: Title in light #F0EFE8 ink — fully readable. Axis labels in same light ink, tick labels in #B8B7B0 (INK_SOFT), all visible against the dark surface. Spines in INK_SOFT. Subtle Y-axis grid visible.
      Data: ECDF line remains #009E73 — identical to light render. Fill-under-curve nearly invisible at alpha=0.10 but the ECDF line itself is fully visible. Mode markers and quartile guides in #A8A79F (INK_MUTED) — readable.
