  - Percentile reference lines with labeled ms values (P25/P50/P75) and amber inflection
    marker create effective visual storytelling beyond raw data display
  - layer_tooltips() with formatted tooltip spec string (@column{format}) is idiomatic
    letsplot usage and a genuine distinctive feature
