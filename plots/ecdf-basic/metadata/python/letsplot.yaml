    chrome all correctly implemented'
  weaknesses:
  - Full panel border (panel_border=element_rect) plus both X and Y major gridlines
    makes the chrome busier than the minimal Imprint aesthetic — remove panel_border
    and keep only Y-axis major grid lines to reduce visual noise competing with the
    ECDF data
  - 'Minor percentile annotation overlap: labels at P25/P50/P75 sit right at the ECDF
    step with vjust=-0.5 — increase vjust to -0.8 or add nudge_y=0.02 for more breathing
    room'
  - P25 annotation at x=17ms is close to the left panel area; the leading P character
    merges slightly with the green step — consider hjust=-0.1 or repositioning
