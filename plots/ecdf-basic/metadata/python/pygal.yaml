review:
  strengths:
  - 'Perfect spec compliance: correct ECDF step construction (1/n jumps), y-axis 0-1,
    grid for percentile reading, quartile reference markers'
  - 'Excellent domain: food delivery times with realistic gamma distribution; realistic,
    neutral, and statistically sound'
  - 'Clean code: flat KISS structure, seeded for reproducibility, proper theme-adaptive
    tokens in both themes, no imports unused'
  - 'Proper two-theme rendering: backgrounds, chrome, and text all flip correctly;
    data colors remain constant (green + lavender)'
  - 'Pygal idioms well used: per-series dot control, HTML output, formatter APIs,
    js=[], truncate_legend=-1'
  weaknesses:
  - stroke_width=10 is 4x the recommended pygal default (2.5); blurs fine staircase
    steps for 120-point ECDF — reduce to 2.5-4 for cleaner step visibility
  - 'Design excellence at defaults: no spine/frame removal, no visual hierarchy beyond
    displaying data, no emphasis guiding viewer to key insight (right-skewed delivery
    time distribution)'
  - colors=(BRAND, ACCENT) passes only 2 hex values instead of the full IMPRINT_PALETTE
    tuple — functionally equivalent for 2 series but not following library guide convention
  - 'Quartile story could be stronger: add direct value labels on the three quartile
    dots plotted as chart annotations so viewer reads percentiles without hunting
    the legend'
