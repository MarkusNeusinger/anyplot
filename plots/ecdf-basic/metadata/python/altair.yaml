review:
  strengths:
  - Correct step-after interpolation using native Altair mark_line API — exactly the
    idiomatic Vega-Lite approach for ECDF
  - 'Theme-adaptive chrome fully and correctly implemented: PAGE_BG, INK, INK_SOFT,
    INK_MUTED all wired through configure_axis/configure_title/configure_view'
  - Quartile crosshairs (horizontal + vertical dashed rules) with focal green markers
    enable direct percentile reading without hover
  - Real-world API latency data context is compelling and appropriately scaled (normal
    120ms mean, 35ms std, 250 observations)
  - Canvas pad-only pattern correctly implemented with PIL; raises loudly on overshoot
  - Interactive HTML output with dual-tooltip (line + marker) for both latency and
    proportion values
  weaknesses:
  - Quartile focal markers lack text annotations showing actual values (e.g. '~97ms',
    '~122ms', '~140ms') — tooltips require hover, losing the at-a-glance reading advantage
  - 'LM-02 gap: ECDF computed manually in numpy; Altair''s window transform (transform_window
    with sort + count(), then transform_calculate for proportion) would compute it
    declaratively in Vega-Lite, showcasing the library''s data transformation capabilities'
  - Grid opacity 0.10 is at the low end of the 10-15% style guide range; increasing
    to 0.13-0.15 would make horizontal guides marginally more useful for reading exact
    proportions
