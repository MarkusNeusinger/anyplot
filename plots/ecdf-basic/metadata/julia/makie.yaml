  strengths:
  - Correct Imprint palette (positions 1-3) with full theme-adaptive chrome in both
    renders
  - P50 median annotations and drop lines add genuine analytical value to the ECDF
  - Y-only subtle gridlines and frame-free legend give clean, professional appearance
  - Realistic web-server scenario with well-differentiated distributions (σ=0.20/0.30/0.60)
