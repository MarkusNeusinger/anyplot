      Data: Two ECDF step lines — green (#009E73, first series = brand green) for Express Shipping and lavender (#C475FD) for Standard Shipping. Both lines are clearly visible at stroke-width 3. Three horizontal grid lines at 25%, 50%, 75% are subtle against the light background. Express shipping ECDF is shifted left (faster) with steeper rise (less variable). Standard shipping ECDF spans a wider x-range.
      Legibility verdict: PASS — all text elements clearly readable against warm off-white background. No light-on-light issues.

