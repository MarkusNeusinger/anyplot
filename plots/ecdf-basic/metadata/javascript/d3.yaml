review:
  strengths:
  - Correct ECDF step function using d3.curveStepAfter — semantically exact (step
    up AT each observed value, not between)
  - Deterministic LCG + Box-Muller for reproducible normal samples — smart solution
    to browser's lack of seeded RNG
  - Meaningful two-group comparison (Express vs Standard shipping) that directly demonstrates
    ECDF's key use case
  - 'Proper Imprint palette: palette[0]=#009E73 for first series, palette[1]=#C475FD
    for second'
  - 'Full theme-adaptive chrome: t.ink for title, t.inkSoft for axes/ticks/legend,
    t.grid for grid lines — both themes pass'
  - Quartile-only horizontal grid (25%, 50%, 75%) — purposeful design that aids percentile
    reading without clutter
  - Y-axis formatted as percentages (d3.format('.0%')) with explicit tickValues —
    professional and readable
  - 'Idiomatic D3: d3.line with datum() for single-path binding, d3.scaleLinear for
    both axes, custom tickValues and format'
  weaknesses:
  - 'Design Excellence ceiling: no annotation or reference line highlighting the key
    insight (e.g., median delta ~1.6 days between groups) — adding even a subtle median
    marker or text callout would raise DE-03 significantly'
  - DE-01 is above default but doesn't reach 'strong design' tier — consider adding
    a subtle descriptive subtitle or repositioning the legend outside the plot area
    with a frame for a more polished look
  - 'LM-02 could be pushed further: D3 supports advanced ECDF features like confidence
    bands (via d3.area with step curves) or rug marks along the x-axis that would
    showcase library depth'
