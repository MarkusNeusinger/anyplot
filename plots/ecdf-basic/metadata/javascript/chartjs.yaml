review:
  strengths:
  - Two-series ECDF step chart with proper stepped:before interpolation and 200-point
    LCG-seeded deterministic data
  - Median reference line plugin with per-group callout dots, minute labels, and vertical
    drop lines adds real storytelling value
  - 'Perfect palette compliance — green #009E73 for Novice (palette[0]), lavender
    #C475FD for Experienced (palette[1]), identical data colors across both themes'
  - Full theme-adaptive chrome via ANYPLOT_TOKENS; pageBg background plugin correctly
    paints the canvas before rendering
  - Redundant encoding (solid vs. dashed line) makes the two series distinguishable
    without relying on color alone
  - '100% spec compliance: Y-axis 0–1, step increments of 1/n, Y-axis grid for percentile
    reading, axis labels with units'
  weaknesses:
  - Median callout labels ("224 min" / "268 min") are drawn at 12px CSS — at 2× DPR
    this is 24px native, which is noticeably smaller than axis labels (28px native)
    and can feel cramped next to the dense step function; consider bumping to 13–14px
  - The "median" label at the left edge is also 12px CSS — consistent with callouts
    but could be slightly larger for balance
  - Design is clean but functional rather than refined — no spine removal (Chart.js
    border:false is used but x/y borders could both be hidden via borderColor:transparent
    for a sharper L-frame look), and the Y-axis grid lacks explicit opacity tuning
    (relies on t.grid token default)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface
      Chrome: Title "ecdf-basic · javascript · chartjs · anyplot.ai" in dark ink at ~22px CSS, fully readable. Y-axis label "Cumulative Proportion" and X-axis label "Finish Time (minutes)" both at 16px CSS, dark ink, balanced and readable. Tick labels at 14px CSS in inkSoft (#4A4A44). Subtle horizontal grid lines on Y-axis only.
      Data: Two ECDF step curves — Novice Runners in solid green (#009E73, palette[0]), Experienced Runners in dashed lavender (#C475FD, palette[1]). 200 points each. Median reference line at y=0.5 (dashed, inkSoft) with "224 min" callout (lavender) and "268 min" callout (green) above respective crossing dots, plus subtle vertical drop lines at 40% alpha.
      Legibility verdict: PASS — all text readable; minor note that callout labels at 12px CSS are the smallest element on the chart.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface
      Chrome: Title, axis labels, and tick labels all rendered in light ink tokens (F0EFE8 / B8B7B0) — clearly readable against the dark background. No dark-on-dark failures observed. "median" annotation uses t.inkSoft (#B8B7B0) — visible. Grid lines use t.grid token — subtle on dark, appropriate.
      Data: Data colors identical to light render — green #009E73 (Novice, solid) and lavender #C475FD (Experienced, dashed) — confirmed same data colors. Median callout labels use palette colors, remaining visible on dark background.
      Legibility verdict: PASS — both series and all chrome elements clearly legible; no dark-on-dark issues.
