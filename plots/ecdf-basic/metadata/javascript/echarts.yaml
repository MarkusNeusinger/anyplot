review:
  strengths:
  - 'Perfect spec compliance: correct ECDF step function (step: ''end''), Y-axis 0–1,
    grid lines for percentile reading, and two-group comparison'
  - 'Excellent use of ECharts-distinctive features: markLine for median reference
    lines with labels, areaStyle fills, and redundant line encoding (solid vs dashed)
    for CVD accessibility'
  - Deterministic LCG + Box-Muller data generation is idiomatic for browser-only JS
    with no seeded Math.random()
  - 'Both renders fully theme-adaptive: background transparent (falls through to pageBg),
    all chrome uses t.ink/t.inkSoft/t.grid/t.elevatedBg tokens, data colors identical
    across themes'
  - 'Strong data storytelling: median reference lines (76 vs 62.3) create clear focal
    points revealing the tutoring effect, area fills make the distribution comparison
    intuitive'
  weaknesses:
  - 'DE-01 moderate: design is polished but not yet publication-level — the area fills
    and median lines are good but typography hierarchy could be further refined (e.g.,
    bolder title weight differentiation, slightly larger median line label font ≥14px)'
  - 'DE-02: tick marks already removed (good), but grid is shown on both axes simultaneously;
    for a line chart an X-axis-only or Y-axis-only grid would reduce visual noise
    and improve refinement'
  - 'CQ-01: three helper functions (lcg, normalSamples, toECDF) deviate from KISS
    flat structure; in JS the LCG is necessary for reproducibility but toECDF could
    be inlined'
