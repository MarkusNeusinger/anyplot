review:
  strengths:
  - 'Perfect spec compliance: correct ECDF step function using ECharts step:''end'',
    correct y-range 0-1, both axes labeled with descriptive names, grid lines present
    for percentile reading.'
  - 'Flawless Imprint palette and theme compliance: #009E73 first series, transparent
    background inheriting correct page surface (#FAF8F1 light / #1A1A17 dark), all
    chrome via t.ink / t.inkSoft / t.grid tokens in both renders.'
  - 'Strong data quality: two-group university exam comparison (tutoring vs self-study,
    n=200 each) with plausible means (75 vs 63) and standard deviations (12 vs 15);
    deterministic LCG seeded at 42 ensures reproducibility.'
  - Clean ECharts option structure with animation:false, explicit font sizes on all
    elements (title 22, axis labels 16, tick labels 14, legend 16), and showSymbol:false
    for clean step curves.
  weaknesses:
  - Title uses fontWeight:'normal' — style guide recommends bold or medium weight
    for title to establish visual hierarchy; change to fontWeight:'bold'.
  - 'No visual storytelling: no markLine reference lines at median/quartile values
    to highlight the score gap between tutoring (median ~75) and self-study (median
    ~63) groups.'
  - 'DE-01 limited to 4/8: chart is a correctly-configured default with no distinctive
    visual choices — no fill between curves, no dashed vs solid line style redundancy
    for added accessibility, no font weight hierarchy.'
  - 'LM-02 limited to 2/5: ECharts distinctive features unused — add tooltip.formatter
    showing cumulative percentage for ECDF readout, and markLine for percentile reference
    lines.'
  - Three helper functions (lcg, normalSamples, ecdf) inflate structure vs KISS ideal;
    consider inlining or hardcoding sorted data arrays.
  - Axis tick marks still present (axisTick not hidden); legend has no custom background
    styling (elevatedBg, borderRadius).
