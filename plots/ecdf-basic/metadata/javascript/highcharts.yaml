      Data: Two step-function ECDF lines — green (#009E73, palette[0]) for Standard Nutrients, lavender (#C475FD, palette[1]) for Enhanced Nutrients. Both rise from 0% to 100% as step functions. Standard curve sits noticeably left/lower (shorter plants), Enhanced curve shifted right (taller plants). Lines at lineWidth=2.5, clearly visible against the light background.
