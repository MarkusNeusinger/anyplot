      Background: Warm off-white surface, clearly #FAF8F1 — matches the required light theme.
      Chrome: Title "Plant Heights · ecdf-basic · javascript · highcharts · anyplot.ai" in bold dark text at ~22px, spanning ~65% of width — well-proportioned. Subtitle "Enhanced nutrients shift median height from 15.3 cm to 18.3 cm" in secondary gray (#4A4A44). X-axis label "Plant Height (cm)" and Y-axis label "Cumulative Proportion" are both in secondary gray at 16px. Tick labels in secondary gray at 14px, Y-axis formatted as percentages (0%, 25%, 50%, 75%, 100%). Legend at bottom shows "Standard Nutrients" (green) and "Enhanced Nutrients" (lavender) at 14px.
      Data: Two ECDF step curves with area fills. Standard Nutrients in #009E73 (brand green), Enhanced Nutrients in #C475FD (Imprint lavender/position 2). Area fills at fillOpacity 0.08 — very subtle. Two dashed vertical plotlines mark each group's median (15.3 cm and 18.3 cm) with small colored labels. A dashed horizontal line marks the 50th percentile with a "50th percentile" label at the right edge.
      Legibility verdict: PASS — all title, axis labels, tick labels, legend, and annotations are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
