review:
  strengths:
  - 'Perfect Visual Quality (30/30): all text sizes explicitly set, no overlap, step
    lines clearly visible at 2.5px, Imprint palette correctly applied with #009E73
    as first series, both themes render with correct warm backgrounds and readable
    chrome'
  - 'Perfect Spec Compliance (15/15): correct right-continuous ECDF step function
    using Highcharts step:''right'', y-axis 0-1 with percentage formatter, grid lines
    for percentile reading, descriptive title with optional prefix and correct format'
  - 'Perfect Data Quality (15/15): plant height comparison under two nutrient conditions
    is a realistic, neutral biological scenario; 100 observations per group is ideal
    for ECDF; distribution separation is pronounced and immediately informative'
  - 'Deterministic reproducibility: LCG with fixed seeds + Box-Muller transform produces
    identical output every run — correct for a browser environment where Math.random()
    cannot be seeded'
  - 'Idiomatic Highcharts usage: correct chart() call, animation:false in both required
    locations, credits disabled, transparent background, tokens wired throughout all
    chrome elements'
  weaknesses:
  - 'DE-03 LOW (2/6): The ECDF comparison tells a natural story (enhanced nutrients
    shift the distribution right by ~3.5 cm) but there is no explicit visual storytelling
    layer — no shaded region between the two curves, no median reference lines, no
    annotation marking the distribution shift. Adding a shaded fill between the step
    curves or a pair of vertical dashed median lines would immediately guide the viewer
    to the key insight.'
  - 'DE-01 LOW (4/8): Design is well-configured and correct but does not rise above
    a clean library default. To reach publication-ready level, consider: (a) adding
    a semi-transparent fill under each ECDF curve (fillOpacity ~0.08) for visual weight,
    (b) using slightly different lineWidth between the two series (e.g. 3.0 for Enhanced
    vs 2.5 for Standard) to create emphasis, or (c) adding a subtle subtitle with
    the insight (''Enhanced nutrients shift median height from 15 cm to 18.5 cm'').'
  - 'DE-02 MINOR (4/6): No exceptional visual refinement beyond the correct baseline.
    A subtle plotBands background or a light horizontal band at the 50th percentile
    (y=0.5) would add both utility and polish without visual noise.'
  - 'CQ-01 MINOR: Three top-level helper functions (lcg, normalSamples, ecdfSeries)
    deviate from the KISS flat-script pattern; in a JS browser context these are practically
    necessary but could be inlined or reduced to keep the code flatter.'
