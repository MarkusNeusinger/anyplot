review:
  strengths:
  - Correct right-continuous ECDF step function using Highcharts step:right — exactly
    the right built-in approach
  - 'Two-series distribution comparison with clearly distinct Imprint palette colors
    (green #009E73 + lavender #C475FD)'
  - Informative subtitle with computed median values provides immediate analytical
    context
  - Median plotlines on X-axis and 50th-percentile reference on Y-axis create a genuinely
    useful reading guide
  - Very low fill opacity (0.08) adds depth without visual clutter or misleading overlap
  - Deterministic data generation via LCG + Box-Muller transform — fully reproducible
    without browser RNG
  - All theme tokens correctly applied; both light and dark renders are clean and
    legible
  - 'Axis labels carry units: Plant Height (cm) / Cumulative Proportion displayed
    as % formatter'
  weaknesses:
  - Helper functions (lcg, normalSamples, ecdfSeries) technically violate the KISS
    no-functions guideline; for a future repair consider inlining ecdfSeries or at
    least the simpler lcg call
  - Plotline annotation labels are set at fontSize:11px CSS (22 actual px) — slightly
    small at mobile widths; raising to 12px would improve mobile readability without
    crowding
  - Area fill overlap in the distribution crossing zone (~x=12–18) blends the two
    fill colors slightly; this is cosmetically harmless at opacity 0.08 but could
    be eliminated by using chart type line instead of area
