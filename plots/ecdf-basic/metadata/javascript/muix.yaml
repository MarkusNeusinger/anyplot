  strengths:
  - Correct ECDF step function using curve:stepAfter with accurate 1/n increments
  - Realistic two-group comparison (teaching methods) tells a clear educational story
  - ChartsReferenceLine for median annotation adds genuine analytical value
  - Proper Imprint palette usage (t.palette[0] and t.palette[1]) with correct theme-adaptive
    chrome in both renders
  - Deterministic seeded LCG is the correct browser-compatible approach for reproducible
    data
  - Explicit font sizing for tick labels (14px) and axis labels (16px) ensures consistent
    rendering
  weaknesses:
  - Legend text font size is not explicitly set — relies on MUI X defaults; set fontSize
    in slotProps.legend to match the axis sizing
  - Helper functions (rand, randn, normalSorted, computeEcdf) increase structural
    complexity beyond flat KISS; consider inlining the LCG into a single normalSorted
    call or pre-generating hard-coded sorted arrays
  - Title is rendered as an external HTML div rather than using MUI X chart title
    slot — minor inconsistency with idiomatic MUI X patterns
