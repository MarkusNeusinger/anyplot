review:
  strengths:
  - Creative candlestick implementation using XY chart with differentiated stroke
    widths for bodies and wicks — impressive given pygal lacks native candlestick
    support
  - Colorblind-safe blue/orange palette with good contrast against light gray background
  - 5-day moving average adds trend context and data storytelling
  - Perfect spec compliance and data quality — realistic stock data with weekend-skipping
    dates
  - Both interactive HTML and static PNG output leveraging pygal dual-format capability
  weaknesses:
  - Regex SVG post-processing for cairosvg stroke compatibility adds code complexity
    and fragility
  - Color list construction (61 separate colors for wicks, MA, and bodies) is hard
    to follow
  - Some wasted vertical whitespace below the data range
  - Legend font size could be larger for better readability at full resolution
  image_description: 'The plot displays a candlestick chart of 30 trading days of
    stock price data. Blue candlesticks represent bullish (up) days and orange candlesticks
    represent bearish (down) days. Each candlestick has a thick body showing the open-close
    range and thinner wicks showing the high-low range. A gray 5-day moving average
    line runs through the candlesticks, smoothing the trend. The price starts around
    $150, rises to approximately $170 in the first two weeks (Jan 2-15), then declines
    steadily to around $130 by mid-February. The title reads "candlestick-basic ·
    pygal · pyplots.ai" at the top. The y-axis is labeled "Price ($)" with dollar-formatted
    tick labels ($130-$170), and the x-axis is labeled "Date" with formatted dates
    (Jan 02 through Feb 12). A legend in the top-left shows three entries: "5-Day
    MA", "Bullish (Up)", and "Bearish (Down)". The plot has a light gray (#f8f8f8)
    background with subtle horizontal dotted grid lines, set against a white canvas.'
