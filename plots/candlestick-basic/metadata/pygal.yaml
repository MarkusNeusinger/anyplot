review:
  strengths:
  - Creative candlestick construction using pygal XY with allow_interruptions and
    stroke_style width differentiation (bodies=72, wicks=20)
  - 'Strong data storytelling: 5-day MA trend line, peak/trough markers with exact
    prices, data showing clear rise-and-fall narrative'
  - Excellent colorblind-safe primary palette (blue/orange) with professional color
    harmony
  - 'Perfect spec compliance: all required features present, correct title format,
    descriptive legend'
  - 'Realistic financial data: 30 weekday-only trading days, plausible price range
    and volatility'
  - Dual output (PNG + interactive HTML) leveraging pygal SVG-native nature
  weaknesses:
  - Peak/low markers use green/red colors suboptimal for colorblind users — should
    use shapes or blue/orange palette instead
  - SVG regex post-processing for cairosvg stroke-style compatibility is fragile and
    adds code complexity
  - Some smaller candlesticks in the late downtrend phase have narrow bodies that
    are slightly less prominent
  - Design not quite publication-ready — could benefit from further typographic refinement
    and whitespace polish
  image_description: 'The plot displays a candlestick chart titled "candlestick-basic
    · pygal · pyplots.ai" with 30 trading days of OHLC stock data. Blue (#2271B3)
    candlesticks represent bullish (up) days and orange (#D66B27) candlesticks represent
    bearish (down) days. Candle bodies are visibly thicker than wicks, clearly distinguishing
    open-close ranges from high-low ranges. A gray 5-day moving average line traces
    the trend across the chart. A green dot marks the peak price ($170.71) near day
    14, and a red dot marks the low ($127.61) at the far right. The Y-axis is labeled
    "Price ($)" with values from ~$128 to ~$170, and the X-axis is labeled "Date"
    with formatted labels (Jan 02, Jan 08, Jan 15, Jan 22, Jan 29, Feb 05, Feb 12).
    The plot background is light gray (#f5f5f5) against a white outer background.
    Subtle horizontal grid lines aid price-level reading. The legend in the upper-left
    lists: 5-Day MA, Bullish (Up), Bearish (Down), Peak $170.71, Low $127.61. The
    data shows a clear uptrend from ~$150 to ~$171 followed by a sustained downtrend
    to ~$128.'
