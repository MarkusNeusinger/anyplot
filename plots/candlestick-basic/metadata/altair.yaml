  image_description: The plot displays a candlestick chart titled "candlestick-basic
    · altair · pyplots.ai" on a clean white background. The x-axis shows "Date" with
    business-day labels from Jan 01 through Feb 08 formatted as "Mon DD". The y-axis
    shows "Price ($)" ranging from approximately 84 to 112. Candlestick bodies are
    colored teal (#26A69A) for bullish (close >= open) days and warm orange (#FF8F00)
    for bearish days. Thin wicks extend above and below each body to mark the high
    and low prices. A legend in the upper-right corner labeled "Direction" shows teal
    for Bullish and orange for Bearish. The data shows a price rising from ~$100 to
    a peak around $110 in mid-January, then declining to ~$89 by early February. Both
    bullish and bearish candles are well represented throughout. The grid is extremely
    subtle (barely visible), and there are no border strokes around the chart area.
    All text is clearly readable at large font sizes.
