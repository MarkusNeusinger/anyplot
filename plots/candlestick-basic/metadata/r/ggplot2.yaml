review:
  strengths:
  - Correct candlestick construction using ggplot2 grammar — geom_segment for wicks
    layered under geom_rect for bodies, with coordinated scale_color_manual/scale_fill_manual
    controlling both geom styles simultaneously
  - 'Semantically correct Imprint palette: #009E73 (brand green) for bullish, #AE3030
    (matte red) for bearish — both palette positions chosen for their finance-domain
    meaning, not ordinal position'
  - Trend line overlay (dashed, semi-transparent) computed with lm() and plotted in
    INK_SOFT provides meaningful data storytelling without cluttering the chart
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all flip correctly
    between light and dark — legend box, axis text, title, and grid all render correctly
    in both themes'
  - 'Perfect canvas spec compliance: 8x4.5 in @ 400 DPI = 3200x1800 px, correct device
    (ragg::agg_png)'
  - 'Idiomatic ggplot2: layered grammar of graphics, expansion() for axis padding,
    label_dollar() for currency formatting, show.legend = FALSE on wicks to avoid
    duplicate legend entries'
  - Descriptive title prefix 'NovaTech Corp (NVTK)' followed by the mandatory spec-id
    format — adds context without omitting required fields
  weaknesses:
  - 'VQ-04: Red-green is the sole in-chart visual signal distinguishing bullish and
    bearish candles — each candle body has no shape or pattern redundancy beyond color.
    Legend text labels (''Bullish''/''Bearish'') partially compensate but a color-blind
    user scanning the chart body itself cannot distinguish candles without referring
    to the legend. Consider adding a subtle fill pattern (e.g., hatching for bearish)
    or upward/downward triangle markers on the wicks as redundant encoding.'
  - 'DE-01: Aesthetic sophistication is solid but could be pushed further — for example,
    adding a subtle annotation marking a notable event (e.g., highest closing price)
    or shading the uptrend period would elevate storytelling beyond the trend line
    alone.'
  image_description: |-
