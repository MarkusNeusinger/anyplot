      Data: Green (#009E73) bullish candles, red (#AE3030) bearish candles. Wicks thinner than bodies. Dashed gray trend line (INK_SOFT, alpha=0.55) visible rising left-to-right showing uptrend. 40 candles, Jan 02 – ~Feb 27 2024, prices $148–$165.
      Legibility verdict: PASS — all elements clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8 (INK for dark theme), clearly visible. Y-axis label in same light ink. Tick labels in INK_SOFT (#B8B7B0), clearly readable against dark background — no dark-on-dark failures. Legend with ELEVATED_BG (#242420) fill and INK_SOFT border, text light and readable. Y-grid lines visible as thin lighter lines against dark background.
      Data: Same green (#009E73) bullish candles and red (#AE3030) bearish candles — identical data colors to light render. Dashed trend line still visible. No color drift between themes.
