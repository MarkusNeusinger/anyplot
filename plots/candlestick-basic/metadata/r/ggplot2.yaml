review:
  strengths:
  - 'Correct semantic color mapping using Imprint palette positions 1 (bullish #009E73)
    and 5 (bearish #AE3030) — precisely the financial semantic exception'
  - 'Full theme-adaptive chrome: both renders pass legibility checks with correct
    #FAF8F1/#1A1A17 backgrounds and properly flipped text/grid tokens'
  - 'Realistic NovaTech Corp data: weekday-filtered trading dates, plausible OHLC
    simulation with set.seed(42), shows both bull and bear candles'
  - Clever integer x-axis with manual date labels avoids weekend/holiday gaps that
    a Date axis would produce in ggplot2
  - Correct canvas dimensions (3200x1800 px), no edge clipping, good canvas utilization
  weaknesses:
  - library(dplyr) imported but no dplyr functions used — remove this unused import
  - Legend order shows Bearish before Bullish (alphabetical default); finance convention
    leads with bullish/green — reorder by setting breaks = c("up", "down") in scale_fill_manual
  - 'Design lacks visual storytelling emphasis: the upward trend from ~$149 to $165
    is visible but unannounced — a subtle price-return annotation or thin trendline
    would lift DE-03 without cluttering'
  - 'Grid uses solid INK_SOFT hex (#4A4A44 / #B8B7B0) rather than a lower-opacity
    approach; slightly more prominent than the style guide 15% opacity recommendation'
