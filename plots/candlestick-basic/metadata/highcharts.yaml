  strengths:
  - Perfect spec compliance with all OHLC features, correct title format, and appropriate
    date axis
  - Excellent data generation with realistic stock price patterns, weekend-skipping,
    and good mix of bullish/bearish candles
  - Strong visual quality with explicitly set font sizes and well-proportioned canvas
    layout
  - Clean well-organized code following KISS principles with deterministic seed
  - Thoughtful blue/orange color choice avoiding red-green accessibility trap
  weaknesses:
  - No visual hierarchy or data storytelling — chart displays price data without guiding
    viewer to insight
  - Does not use Python highcharts_core library API, builds raw JSON/JS configuration
    manually
  - Bearish wick color (red) inconsistent with orange body color scheme for accessibility
  image_description: 'The plot displays a candlestick chart titled "Stock Price Movement
    · candlestick-basic · highcharts · pyplots.ai" on a white background. The x-axis
    shows dates from Oct 01 through Nov 08 with labels every other trading day. The
    y-axis shows "Price (USD)" ranging from $140 to above $150 with $2 tick intervals
    and dollar formatting. Blue (dark teal, #306998) candlestick bodies represent
    bullish (up) days, while orange (#E67E22) bodies represent bearish (down) days.
    Wicks extend above and below each body in dark blue and red respectively. The
    data tells a story of a stock declining from ~$150 down to the $142-143 range
    over mid-October, then stabilizing with a slight recovery toward Nov 08. Subtle
    semi-transparent horizontal grid lines aid price-level reading. The chart fills
    the canvas well with generous margins. No legend is displayed (appropriate for
    a single-series chart). Credits, navigator, scrollbar, and range selector are
    all disabled for a clean appearance.'
