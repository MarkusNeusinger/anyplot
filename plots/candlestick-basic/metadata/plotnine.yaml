review:
  strengths:
  - Excellent data quality with realistic stock prices showing both bullish and bearish
    candles, clear trend, and appropriate scale
  - Clean code structure with proper seed, all imports used, and elegant plotnine
    grammar of graphics chain
  - Colorblind-safe blue/amber palette with darker edge colors for candle body definition
  - Good text legibility with all font sizes explicitly set to appropriate values
  - Subtle horizontal grid with alpha=0.4 and no vertical grid is a good design choice
    for price reading
  weaknesses:
  - No legend explaining that blue=bullish and amber=bearish color coding
  - Wick color is uniform grey rather than matching candle direction colors, reducing
    visual coherence
  - Design could be elevated with stronger typographic hierarchy (bold title, weight
    variation)
  - Library mastery could be improved by leveraging more plotnine-distinctive features
    like annotate()
  image_description: The plot displays a candlestick chart titled "candlestick-basic
    · plotnine · pyplots.ai" showing 30 trading days of simulated stock price data
    from Jan 02 to Feb 10, 2024. Bullish (up) candles are rendered in blue (#2196F3)
    and bearish (down) candles in amber/orange (#FF6F00), each with darker edge colors
    for definition. Thin grey wicks extend vertically from each candle body showing
    the high-low range. The y-axis is labeled "Price ($)" with dollar-formatted values
    ranging from $130 to $155. The x-axis shows date labels every 5 trading days (Jan
    02, Jan 09, Jan 16, Jan 23, Jan 30, Feb 06). The overall trend is downward from
    ~$150 to ~$135. The background is clean white with subtle horizontal grid lines
    and no vertical grid lines. The layout uses a 16:9 aspect ratio with balanced
    margins.
