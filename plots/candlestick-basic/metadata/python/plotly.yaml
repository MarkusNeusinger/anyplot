review:
  strengths:
  - 'Semantic color mapping follows Imprint finance convention (bull→green #009E73,
    bear→red #AE3030) correctly'
  - Market phase vrect shading (Rally/Pullback/Recovery) provides excellent visual
    structure for data storytelling
  - rangebreaks correctly skips weekends to avoid gaps in the time axis — a distinctive
    Plotly feature used idiomatically
  - Custom OHLC hovertemplate with formatted price fields and date
  - Length-scaled title fontsize prevents overflow on the longer descriptive title
  - Full theme-adaptive chrome with all six tokens (PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    GRID) correctly applied to every element including annotation boxes and phase
    labels
  weaknesses:
  - Annotation callout boxes use font size 10px — at 3200×1800 canvas this renders
    legibly but is on the small side; increasing to 11–12px would improve the visual
    hierarchy of the key price callouts
  - 'DE-03: Recovery phase ends without a closing annotation or price reference —
    adding a small label for the final price would complete the narrative arc'
  - 'LM-02: The rangeslider is disabled (correct for a clean final chart) but the
    implementation misses an opportunity to showcase plotly''s candlestick-specific
    rangeslider or range-selector buttons as a distinctive library feature in the
    HTML output'
