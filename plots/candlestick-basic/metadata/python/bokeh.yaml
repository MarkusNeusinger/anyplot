review:
  strengths:
  - Correct Imprint palette with semantic exception (green=bullish, red=bearish) —
    intentional finance convention using positions 1 and 5
  - Both light and dark themes render correctly with proper chrome adaptation — INK/INK_SOFT
    tokens applied to all text elements
  - 'Idiomatic Bokeh: separate ColumnDataSources for bull/bear allows HoverTool to
    deliver OHLC tooltips on each body type'
  - NumeralTickFormatter for dollar-formatted Y-axis tick labels is a polished touch
    specific to Bokeh
  - Canvas exactly 3200×1800 with toolbar_location=None and min_border_* reservations
    — follows the library guide precisely
  - sys.path patch prevents the local bokeh.py from shadowing the installed package
    — necessary and correct workaround
  - Clean three-phase synthetic data (uptrend → sharp reversal → consolidation) reads
    as a believable 30-day trading narrative
  weaknesses:
  - No legend for bullish/bearish distinction — add a small two-entry legend (e.g.
    p.add_layout(...) or manual Patch glyphs) so first-time candlestick viewers know
    green=Bullish, red=Bearish without needing prior finance knowledge
  - 'VQ-04 gap: red/green is the sole signal distinguishing bull from bear candles,
    with no redundant encoding for CVD viewers — consider hollow body for bearish
    candles (fill_color=PAGE_BG, line_color=COLOR_BEAR) so colorblind viewers can
    distinguish direction from fill vs outline'
  - 'DE-03 low: three-phase market story (uptrend → sharp reversal → consolidation)
    is embedded in the data but not editorially emphasised — consider a subtle shaded
    region or horizontal reference line to mark the pivot area around Jan 22, guiding
    the viewer to the key insight'
  - 'Minor: VQ-04 deduction because green+red without any secondary encoding (hollow
    vs filled, or hatch) is inaccessible to red-green CVD viewers even though the
    Imprint semantic exception is correctly applied'
