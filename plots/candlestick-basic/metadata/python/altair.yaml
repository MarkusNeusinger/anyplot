  strengths:
  - 'Correct semantic exception: #009E73 (brand green) for bullish and #AE3030 (matte
    red) for bearish — matches finance convention and Imprint palette positions 1
    and 5'
  - 'Full spec compliance: OHLC bodies, wicks correctly thinner than bodies, color
    coding, date formatting (%b %d), subtle y-only grid, and SMA overlay as bonus
    analytical feature'
  - 'Perfect code quality: reproducible seed (42), clean imports, KISS flat structure,
    proper canvas PAD-only logic with no cropping'
  - 'Idiomatic Altair: layer composition with alt.layer(), y2 encoding for open-close
    and high-low ranges, resolve_scale(color=''independent''), proper encoding types
    (T, Q, N), alt.value() for SMA color'
  - Both themes render correctly with theme-adaptive chrome — title, axis labels,
    tick labels, legend, and view background all use the correct tokens for light
    (#FAF8F1) and dark (#1A1A17)
  weaknesses:
  - The '5-day MA' annotation label at sma_df.iloc[[2]] (around Jan 09) sits very
    close to or slightly overlaps the bearish candle body in that area — reposition
    with dy=-18 or shift the label to a less congested index (e.g. iloc[[4]]) to avoid
    the candle
  - Design Excellence is functional but not visually striking — the chart is clean
    and professional but lacks any accent or emphasis element that would create a
    clear focal point (e.g. a reference line at the peak price, a shaded trend region,
    or a subtle price-range annotation)
  - Wick lines carry bullish/bearish color but have no redundant encoding — candle
    bodies have ink stroke outline for CVD users but wicks are color-only; a dashed/solid
    linestyle distinction or sticking to shape only is not easily added in Altair,
    but this is a known limitation for the candlestick chart type
