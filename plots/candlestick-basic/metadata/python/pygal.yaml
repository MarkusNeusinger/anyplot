review:
  strengths:
  - Semantic Imprint palette assignment for finance context (green=bullish, red=bearish)
    correctly invokes the style-guide semantic exception and stays within palette
  - Multi-layer chart architecture (wicks behind bodies, MA reference overlay, peak/low
    accent markers) gives analytical depth beyond a bare OHLC display
  - Theme-adaptive chrome correctly implemented in both renders — no dark-on-dark
    failures in the dark version
  - Perfect spec compliance including all required features plus bonus MA overlay
    and price extreme markers
  - Realistic business-day OHLC data with plausible price dynamics and weekday-filtered
    dates
  weaknesses:
  - Green (#009E73) and matte red (#AE3030) are the sole hue signal for bullish vs.
    bearish — CVD users (deuteranopia/protanopia) may struggle to distinguish them;
    add redundant marker-shape encoding (triangle-up vs. triangle-down) or equivalent.
  - Grid lines use the pygal dashed default style — switch to solid thin lines at
    lower opacity for improved visual refinement.
  - Full four-sided border frame is retained in both renders — remove top and right
    frame lines to align with style-guide L-shaped spine preference.
  - SVG regex post-processing for stroke inlining adds code complexity to CQ-01; if
    cairosvg has evolved or an alternative approach exists, simplify this block.
