review:
  strengths:
  - 'Excellent semantic color exception: green/red for bullish/bearish follows finance
    convention and aligns with Imprint palette positions 1 and 5'
  - Creative use of pygal.XY with allow_interruptions=True and None break-markers
    to simulate candlestick geometry — no native candlestick type in pygal
  - SVG post-processing pipeline correctly fixes cairosvg compatibility (inline stroke
    widths) and applies L-spine removal and solid grid lines
  - 5-Day Moving Average overlay provides trend narrative context; peak/trough accent
    markers create clear visual hierarchy
  - CVD redundant encoding via positional direction markers (dots at wick extremes)
    ensures colorblind accessibility beyond palette compliance
  - 'Perfect spec compliance: all four OHLC fields present, body wider than wick,
    date-formatted x-axis, subtle y-grid'
  - All font sizes explicitly set (title_font_size=66, label_font_size=56, major_label_font_size=44,
    legend_font_size=44) — proportional and readable in both themes
  - Both light (#FAF8F1) and dark (#1A1A17) renders pass theme-readability check with
    no dark-on-dark failures
  weaknesses:
  - CVD direction markers (dots_size=7) are very small at 3200x1800 resolution — at
    full canvas scale they serve the accessibility purpose but are barely distinguishable
    from wicks; consider raising to dots_size=10 for better visibility
  - 'DE-01: The design is strong but not quite at publication-ready level — the overall
    look is polished but the storytelling accent markers (Peak / Low dots) are too
    subtle to fully anchor the narrative; consider slightly larger or annotated peak/trough
    markers'
  - 'DE-02: Grid lines visible but look slightly prominent relative to data density
    — the solid-grid override is correct but the opacity is controlled by foreground_subtle
    which may render at moderate weight; fine-tuning acceptable'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "candlestick-basic · python · pygal · anyplot.ai" in dark ink at top, occupies ~62% of width — well-proportioned. Y-axis label "Price ($)" and x-axis label "Date" both clearly visible in dark ink. Tick labels ($170.00–$127.00 on y; Jan 02–Feb 12 on x) readable in muted dark tone.
      Data: Green (#009E73 Imprint pos 1) candle bodies for bullish periods, matte-red (#AE3030 Imprint pos 5) for bearish. Thin wicks clearly narrower than bodies. Muted gray MA curve follows the trend. Small lavender (#C475FD) peak dot visible at ~Jan 15 / $170.71. Small blue (#4467A3) low dot at ~Feb 12 / $127.61. L-shaped spine (left + bottom only). Solid y-axis grid lines. Bottom legend shows 5 items in two rows, clean.
      Legibility verdict: PASS — all text clearly readable against light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and axis labels rendered in light ink (#F0EFE8), clearly visible against dark surface. Tick labels also light-colored and fully legible. No dark-on-dark failures observed.
      Data: Green (#009E73) and matte-red (#AE3030) candlestick colors are identical to light render — only chrome flips. MA curve appears in lighter muted gray (#A8A79F theme-adaptive). Lavender peak and blue low dots remain the same hues. L-spine and grid lines rendered in lighter muted tone appropriate for dark surface.
      Legibility verdict: PASS — all text readable against dark background, correct theme-adaptive chrome throughout.
