review:
  strengths:
  - 'Technically flawless QR code implementation with all ISO-mandated features: quiet
    zone (4 modules per ISO/IEC 18004), finder patterns in three corners, medium error
    correction (15%), and a proper QR encoding library (QRCoders.jl)'
  - 'Smart dual-surface design: maintains scanner-reliable QR contrast (dark modules
    on warm-white inner background) while correctly adapting all page chrome to both
    light and dark themes'
  - Informative xlabel repurposed as a caption line providing URL and error correction
    context without cluttering the visualization
  - Clean, minimal code with zero unnecessary complexity — linear structure, deterministic,
    all imports used
  weaknesses:
  - 'DE-03 limited by format: QR code visualisations have a low ceiling for data storytelling;
    the current title/caption approach is good but leaves little room for additional
    visual hierarchy'
  - 'LM-02: xlabel is repurposed as a caption — technically functional but not idiomatic
    Makie layout; a Label(fig[2,1], ...; tellwidth=false) below the axis would be
    more canonical'
