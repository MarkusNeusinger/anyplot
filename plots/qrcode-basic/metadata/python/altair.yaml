review:
  strengths:
  - 'Creative educational approach: uses Imprint palette to color-code QR structural
    regions (Finder, Timing, Data), transforming a binary image into an annotated
    diagram'
  - 'Full palette compliance: first data color is brand green, ordinal positions 1-3
    used correctly, theme-adaptive chrome perfectly implemented in both renders'
  - 'Code follows canonical altair canvas pattern exactly: inner view dims appropriate
    for square format, pad-to-target guard with loud SystemExit on overshoot, no cropping'
  - 'Excellent data authenticity: real URL (https://anyplot.ai), proper QR library
    used, correct error correction level M, proper 4-cell quiet zone'
  - 'Perfect code quality: KISS structure, deterministic, clean imports, saves both
    PNG and HTML outputs'
  weaknesses:
  - Spec recommends 'high contrast black on white for maximum readability' for scannability
    — colored module rendering is educational but deviates from this guidance; the
    binary matrix is correctly encoded by the qrcode library so scannability is preserved,
    but a clarifying note would help
  - Subtitle fontsize (10px x scale 4 = 40px native) is slightly conservative for
    a 2400x2400 canvas — bumping to 11-12px would improve readability at medium zoom
    levels
  - Subtle inter-cell spacing visible between QR modules in light render (Altair ordinal
    padding artifact) — could be addressed with padding=0 on x/y encoding or band_size
    adjustment to make modules flush
