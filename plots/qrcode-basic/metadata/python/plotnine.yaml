review:
  strengths:
  - Correct use of qrcode library (primary spec recommendation) with ERROR_CORRECT_M
    as spec-recommended default
  - Theme-adaptive module colors — dark-on-light in light theme, light-on-dark in
    dark theme — both high-contrast and visually coherent
  - Excellent choice of theme_void() which removes all axis clutter, appropriate for
    a matrix barcode visualization
  - coord_fixed() ensures pixel-perfect square aspect ratio
  - width=1.02 height=1.02 on geom_tile prevents hairline gaps between QR modules
  - Title format correct and clearly readable in both renders
  - Square canvas (2400×2400) is the right format choice for a symmetric matrix visualization
  - Code is clean, linear, and fully reproducible (QR generation is deterministic
    for a fixed URL)
  - sys.path guard prevents accidental shadowing of the qrcode package by local files
    — good defensive practice
  weaknesses:
  - Dark-theme render is an inverted QR code (light modules on dark background) —
    spec says "Use high contrast black on white for maximum readability"; most modern
    readers handle inverted QR codes, but it deviates from spec intent
  - Title sits very close to the top canvas edge with minimal top-margin breathing
    room
  - 'DQ-01: The encoded URL (anyplot.ai) is shown only in the title — a subtitle or
    annotation showing the encoded content would add informational value'
  - 'DE-03: No visual hierarchy or storytelling beyond the raw QR matrix — a URL label
    or brief annotation would ground the visualization'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "qrcode-basic · python · plotnine · anyplot.ai" in dark near-black ink at top center, clearly readable; no axis labels, ticks, or grid lines (theme_void — appropriate for QR visualization)
      Data: QR code rendered as near-black (#1A1A17) modules on the off-white background — high contrast binary representation; all three finder patterns (square corner markers) clearly visible; quiet zone (4-module border) present; data area fills roughly 70% of canvas height centered
      Legibility verdict: PASS — title fully readable, QR modules crisp, no element overlap or clipping; title sits tight to top edge but all pixels visible

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title "qrcode-basic · python · plotnine · anyplot.ai" in light off-white (#F0EFE8) ink at top center, clearly readable against dark background — NO dark-on-dark failure
      Data: QR code inverted — off-white (#F0EFE8) modules on near-black background; module color changes between themes (light↔dark) but contrast remains high; all three finder patterns visible; quiet zone matches the dark background
      Note: Data colors (module on/off) flip between themes (theme-adaptive neutral anchor) — this differs from the Imprint categorical palette rule (positions 1-8 stay constant) but is correct for a binary QR visualization that requires high contrast in both themes; the inverted dark-render QR is scannable by modern readers
      Legibility verdict: PASS — title readable with correct light-on-dark contrast; no dark-on-dark failures observed
