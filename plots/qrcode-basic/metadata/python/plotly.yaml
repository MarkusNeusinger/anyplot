review:
  strengths:
  - Theme-adaptive QR module colors using proper INK/PAGE_BG tokens — dark modules
    in light theme, light modules in dark theme, maintaining high contrast in both
  - 'Brand green accent (#009E73) used elegantly across three coordinated elements:
    accent border rectangle, dotted divider, and encoded URL annotation'
  - Perfect spec compliance — uses qrcode library with Error Correction M (15%), border=4
    quiet zone, and proper QR version auto-detection
  - 1:1 aspect ratio correctly maintained via scaleanchor='y' + scaleratio=1 with
    autorange='reversed' for proper QR matrix orientation
  - Rich metadata annotations (error correction level, version, module count) add
    educational value below the code
  - 'Complete chrome removal: no ticks, no grid, no spines — xgap=0.4 and ygap=0.4
    add subtle refinement to module spacing'
  - 'Plotly-specific features leveraged: custom hovertemplate showing module coordinates,
    write_html with CDN for interactive output, paper-space shape overlays'
  weaknesses:
  - 'Excess blank space at bottom of canvas: margin b=180 is overly generous — the
    two annotations (y=-0.08 and y=-0.24 in paper space) leave a large empty band
    below the metadata text. Reduce b to ~120 or move annotations lower (y=-0.15 for
    URL, y=-0.30 for metadata) to fill the compositional space better.'
  - Metadata annotation fontsize=10 is at the lower readable limit for a 2400×2400
    canvas — at mobile widths (~400 px) this scales to ~7 px which is borderline.
    Increase to fontsize=11 or 12 for better mobile readability.
  - Dark theme inverted QR code (light modules on dark background) may not be scannable
    by all QR code readers — while most modern readers support inverted QR, some older
    hardware/software cannot. Consider noting this limitation or adding a note that
    the light render is the scannable version.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "qrcode-basic · python · plotly · anyplot.ai" in dark near-black text, centered at top — clearly readable. No axis labels, ticks, or grid (appropriate for QR code). Accent green (#009E73) rectangular border frames the QR code area with reduced opacity. Dotted accent green divider below the code. URL "https://pyplots.ai" displayed in bold accent green below divider. Metadata "Error Correction: M (15%) · Version 2 · 33×33 modules" in soft gray (#4A4A44 INK_SOFT) — small but readable at full res.
      Data: QR code rendered as dark near-black (#1A1A17 INK) modules on off-white background — three finder patterns visible in top-left, top-right, and bottom-left corners as expected. High contrast, well-formed matrix.
      Legibility verdict: PASS. All text is readable. Minor note: metadata fontsize=10 is small, borderline at mobile widths.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title in light cream text (#F0EFE8 INK) — clearly readable against dark background. Accent green (#009E73) border and divider carry over identically. URL in bold accent green — visible. Metadata in soft gray (#B8B7B0 INK_SOFT) — readable.
      Data: QR code inverted — light cream (#F0EFE8) modules on near-black background. Data colors identical to light render in the sense that the accent #009E73 is unchanged; the QR module colors flip from INK→PAGE_BG (theme-adaptive, as coded). No dark-on-dark failures detected — all text is light-colored against the dark background.
      Legibility verdict: PASS. No dark-on-dark issues. Note: inverted QR (light-on-dark) is aesthetically consistent but may not be scannable by all QR readers.
