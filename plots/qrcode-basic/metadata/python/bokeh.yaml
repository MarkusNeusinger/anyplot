review:
  strengths:
  - 'Creative use of Imprint palette to color-code QR structural regions (finder=green
    #009E73, timing=blue #4467A3, alignment=lavender #C475FD) — makes the visualization
    educational and visually distinctive'
  - Interactive HoverTool showing region type on hover leverages Bokeh's unique interactive
    advantage effectively
  - Proper qrcode library with deterministic encoding of real URL (https://anyplot.ai)
    — scannable output
  - Clean code with elegant set-based region classification for O(1) lookup per module
  - Correct 2400x2400 square canvas, well-suited for symmetric QR code layout
  - All font sizes explicitly set; title scaling formula handles long titles correctly
  weaknesses:
  - 'Dark theme footer text contrast failure: footer Label elements use INK_SOFT=#B8B7B0
    (dark-theme light gray) but render on the white inner plot background (#FFFFFF),
    producing ~1.9:1 contrast ratio — well below the readable threshold. Fix: use
    a dark-on-white color for footer labels regardless of theme, e.g. hard-code #4A4A44
    or #6B6A63 since the inner QR background is always white.'
  - 'Inner plot background is hardcoded to pure #FFFFFF for both light and dark themes
    — justified for QR scannability but the dark render shows a jarring bright-white
    square inside the near-black border. Consider using a very-near-white (#F5F5F5
    or the light theme PAGE_BG #FAF8F1) in the QR area to soften the contrast while
    keeping scannability.'
  - Lavender alignment pattern (#C475FD) has relatively low luminance contrast against
    white background compared to the other structural elements; this is also the lightest
    Imprint hue and may affect QR scanner grayscale recognition of the alignment pattern.
  - 'SC-02 minor: the spec states QR code MUST be scannable — colored finder/timing/alignment
    modules (especially lavender) could reduce scanner reliability. Consider using
    a legend to clarify these are display-only colorings on top of the required black-module
    structure.'
  image_description: |-
    Light render (plot-light.png):
      Background: Outer border is warm off-white (#FAF8F1) correct; inner plot area is pure white (#FFFFFF) intentionally for QR scannability.
      Chrome: Title "qrcode-basic · python · bokeh · anyplot.ai" in dark near-black ink (#1A1A17), clearly readable at the top. Footer labels "Encoded: https://anyplot.ai" and version info in soft dark gray (#4A4A44), readable on white.
      Data: QR code with finder patterns in brand green (#009E73) at three corners, timing cells in blue (#4467A3), alignment pattern (center-right) in lavender (#C475FD), data modules in near-black (#1A1A17). QR modules are clearly visible on the white background.
      Legibility verdict: PASS — all text is readable on the light surface. Footer text has adequate contrast on white inner area in light theme.

    Dark render (plot-dark.png):
      Background: Outer border is warm near-black (#1A1A17) correct; inner QR area remains pure white (#FFFFFF) — a jarring bright square within the dark frame.
      Chrome: Title is light cream text (#F0EFE8) on near-black outer border — clearly readable. Footer labels use INK_SOFT=#B8B7B0 (dark-theme light gray) but appear ON the white inner background, producing very low contrast (~1.9:1) — the text is faint but barely readable.
      Data: QR module colors are identical to light render (finder green, timing blue, alignment lavender, data near-black) — data colors correct across themes. No dark-on-dark failure for the QR modules themselves since they're on white. But the footer text is a light gray on white (wrong combination for dark theme).
      Legibility verdict: FAIL — footer label text (INK_SOFT #B8B7B0 on #FFFFFF white) has ~1.9:1 contrast ratio, failing readability. Title is fine (light text on dark outer border). The footer is the specific failure point.
