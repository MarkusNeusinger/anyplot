review:
  strengths:
  - Theme-adaptive QR modules (dark ↔ light flipping) correctly adapts to both surfaces
  - Brand-green (#009E73) quiet-zone frame is a tasteful branded design choice
  - All font sizes explicitly set via pygal Style; title and x_title readable in both
    renders
  - Per-datapoint color customization using pygal StackedBar is creative and technically
    correct
  - 'Complete spec compliance: quiet zone, EC:M, proper qrcode library, high contrast'
  weaknesses:
  - Design space for a QR code is inherently constrained — aesthetic sophistication
    ceiling is lower than for a data chart, limiting DE-01 headroom
  - sys.path manipulation to avoid pygal.py filename collision is functional but slightly
    brittle — a rename of the output file would eliminate the concern entirely
  - The segmented/striped green frame (cell boundaries visible as thin lines) is an
    artifact of StackedBar rendering; CrispEdges CSS partially mitigates but does
    not fully close
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct light surface
      Chrome: Title "qrcode-basic · python · pygal · anyplot.ai" in dark ink at top, clearly readable. Bottom x_title "https://anyplot.ai · EC: M · 25×25" in dark bold text, readable. No axes, ticks, legend, or grid (all intentionally hidden).
      Data: QR code modules rendered in near-black (#1A1A17) on warm off-white background — classic high-contrast QR appearance. Brand-green (#009E73) decorative frame surrounds the QR with quiet zone. Frame shows subtle segmentation from StackedBar cell rendering, slightly textured rather than solid.
      Legibility verdict: PASS — all text elements fully readable against light background.

    Dark render (plot-dark.png):
      Background: Near-black (~#1A1A17) — correct dark surface
      Chrome: Title in warm off-white/cream light text at top, clearly readable. Bottom x_title also in light text, readable. No dark-on-dark failures observed.
      Data: QR code modules rendered in warm off-white (#F0EFE8) on near-black background — inverted for dark theme, maintaining high contrast. Brand-green (#009E73) frame is identical to light render — vibrant and clearly visible.
      Legibility verdict: PASS — all text readable against dark background. Data colors (brand green frame) are identical to light render; only the QR module colors and backgrounds flip with theme.
