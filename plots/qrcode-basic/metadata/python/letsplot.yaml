review:
  strengths:
  - Correct use of qrcode library producing a valid, scannable QR code with proper
    finder patterns and quiet zone
  - 'Excellent theme adaptation — #FAF8F1/#1A1A17 backgrounds with all chrome tokens
    (INK, INK_SOFT, INK_MUTED) applied to title, subtitle, and caption'
  - Elegant geom_raster() + scale_fill_identity() + coord_fixed() approach for pixel-accurate
    QR rendering — idiomatic letsplot
  - 'Brand green #009E73 border accent ties the plot to the Imprint palette without
    intruding on the QR data'
  - Informative subtitle (encoded content + ECC level) and caption (version, module
    count, ECC) provide layered metadata
  - Correct square canvas ggsize(600,600) × scale=4 = 2400×2400 px; saves both PNG
    and HTML as required
  weaknesses:
  - Caption font size 8px is on the small side — bump to 9px for better mobile readability
    when plot is scaled to ~400px width
  - In dark mode the QR modules invert to cream-on-near-black; while visually coherent,
    the spec notes high-contrast black-on-white for maximum scannability — consider
    always using INK (#1A1A17 light / hard-coded dark) for dark modules and PAGE_BG
    for quiet-zone cells, or at minimum document the inversion in a comment
  - DE-01/DE-02 are near defaults — the QR format constrains design options, but a
    subtle annotation (e.g., an arrow pointing to a finder pattern with a label) could
    add educational storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correctly matches the Imprint light surface. A green border frame (#009E73) outlines the entire canvas.
      Chrome: Title "qrcode-basic · python · letsplot · anyplot.ai" in bold dark (#1A1A17) at size 16, centred — clearly readable. Subtitle "Encoded: https://pyplots.ai | Error Correction: M (15%)" in #4A4A44 at size 10 — readable. Caption "Version 2 · 33×33 modules · ECC Level M (15%)" in #6B6A63 at size 8 — small but readable.
      Data: QR code rendered as dark (#1A1A17) modules on cream (#FAF8F1) background. All three finder patterns clearly visible in top-left, top-right, and bottom-left corners. Quiet zone (border=4) visible. Classic high-contrast black-on-cream QR.
      Legibility verdict: PASS — all text readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correctly matches the Imprint dark surface. Same green border frame (#009E73).
      Chrome: Title in light cream (#F0EFE8) — clearly readable against dark background. Subtitle in #B8B7B0 — readable. Caption in #A8A79F — readable (small but not invisible).
      Data: QR code inverted vs. light render — cream (#F0EFE8) modules on near-black (#1A1A17) background. Data colors (module hues) differ from light render because the module fill is driven by INK/PAGE_BG chrome tokens rather than fixed data colors — this is intentional theme adaptation, though technically an inverted QR. Finder patterns still clearly visible. High contrast maintained.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark issues detected.
