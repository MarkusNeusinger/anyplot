  strengths:
  - Uses real qrcode library for scannable QR code generation
  - Creative color-coding of QR regions (finder, timing, alignment, data) adds educational
    value
  - Dual output (PNG + interactive HTML with hover tooltips) leverages Bokeh interactive
    strengths
  - Clean layout with hidden axes and informative footer text
