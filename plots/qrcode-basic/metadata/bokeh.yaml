review:
  strengths:
  - Real scannable QR code using the qrcode library as spec requires
  - Color-coded region classification (finder, timing, alignment, data) adds educational
    value and visual interest
  - HoverTool for interactive HTML exploration is an excellent use of Bokeh distinctive
    features
  - Clean minimal design with hidden axes/grid appropriate for QR code visualization
  - Correct title format and informative footer with encoded content and version details
  weaknesses:
  - Contains a helper function (classify_module) violating the KISS flat structure
    requirement
  - Some excess whitespace between QR code and footer labels
  - The classify_module function has deeply nested conditionals that could be simplified
  image_description: 'The plot displays a QR code on a white background in square
    format (3600x3600). The title "qrcode-basic · bokeh · pyplots.ai" appears at the
    top in blue (#306998) at 36pt. The QR code itself uses color-coding to distinguish
    functional regions: three finder patterns (top-left, top-right, bottom-left) are
    rendered in medium blue (#306998), timing patterns and the alignment pattern (lower-right
    area) appear in a lighter blue (#4A8BBE), and data/error correction modules are
    near-black (#1a1a1a). A quiet zone of white space surrounds the QR code. Below
    the code, footer text reads "Encoded: https://pyplots.ai" in gray monospace (22pt),
    and beneath that "Version 2 (25x25) · Error Correction Level M (15%)" in smaller
    gray text (18pt). The overall appearance is clean and professional.'
