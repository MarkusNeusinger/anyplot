review:
  strengths:
  - Clean, correct QR code matrix with proper finder patterns in all three corners
    and 4-module quiet zone
  - 'Theme-adaptive chrome: title uses t.ink, URL uses t.inkSoft — both flip correctly
    between light and dark'
  - Dark render adds a subtle rounded-corner border on the QR card for visual separation
    without obscuring scannability
  - 'Correct square canvas orientation (//# anyplot-orientation: square) appropriate
    for a symmetric QR code'
  - Fully deterministic hardcoded matrix — reproducible and self-contained as required
    by the offline harness
  - 'High-contrast module colors (#1A1A17 on #FAF8F1) fixed correctly across both
    themes for scanner readability'
  - Explicit font sizes set (22px title, 18px URL label) — both readable at canvas
    resolution
  weaknesses:
  - 'Library Mastery — the QR matrix is rendered via nested plain-JS forEach loops
    instead of D3''s idiomatic data binding: flatten QR_MATRIX to a single array of
    {row, col} objects and use d3.select(''#container svg'').selectAll(''rect.module'').data(cells).join(''rect'')
    to set attributes declaratively'
  - Library Mastery — no D3-distinctive features are demonstrated (no scales, no data-driven
    transforms, no enter/update/exit pattern); the visualization is essentially plain
    SVG and could be reproduced with vanilla JS
  - Design Excellence — the visual presentation is clean but minimal; consider adding
    a branded header band or subtle vignette treatment outside the QR card to elevate
    aesthetic sophistication while keeping the QR zone itself scanner-safe
  - Design Excellence — data storytelling is limited to the URL label; a short caption
    or context line (e.g. 'Scan to visit anyplot.ai') would raise DE-03 without cluttering
    the code
  - The QR matrix is hardcoded; while necessary for the offline D3 harness, scannability
    cannot be verified programmatically — the structure looks correct (25×25 modules,
    3 finder patterns) but the data payload should be independently validated
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire canvas — correct, not pure white.
      Chrome: Title "qrcode-basic · javascript · d3 · anyplot.ai" in dark near-black text at the top (~y=52 CSS px), readable. URL label "https://anyplot.ai" in slightly softer dark text below the QR card, readable. No axis labels or legend (appropriate for QR code).
      Data: 25×25 QR matrix rendered as near-black (#1A1A17) rectangles on a warm-white (#FAF8F1) rounded-corner card. Three finder patterns clearly visible in top-left, top-right, and bottom-left corners. Quiet zone of 4 modules surrounds the data matrix. High contrast black-on-cream throughout the QR zone. QR card fills approximately 85% of the canvas width and height, centered.
      Legibility verdict: PASS — all text elements are clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the canvas — correct, not pure black.
      Chrome: Title renders in light/near-white text (t.ink = #F0EFE8 in dark theme) against the near-black background — clearly readable. URL label renders in soft light text (t.inkSoft = #B8B7B0 in dark theme) — readable. A subtle rounded-corner border (stroke-opacity: 0.25) appears around the QR card for visual separation.
      Data: QR module colors are identical to the light render (#1A1A17 dark modules on #FAF8F1 warm-white card) — only chrome flips, the QR data zone stays fixed as required for scanner readability. The white QR card pops visually against the dark background, providing strong contrast.
      Legibility verdict: PASS — no dark-on-dark failures; the title and URL are both readable; the QR card is visually distinct from the dark canvas.
