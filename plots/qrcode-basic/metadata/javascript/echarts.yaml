review:
  strengths:
  - Correct square orientation for QR code visualization
  - 'High-contrast QR rendering adapts correctly across themes: t.ink/t.pageBg swap
    produces near-black-on-cream (light) and near-white-on-near-black (dark) — both
    scannable'
  - Educational graphic annotations label the three Finder Pattern locations and explain
    QR structure in the footer
  - 'All required QR spec elements present: 4-module quiet zone, three finder patterns,
    Version 2 (25×25), Error Correction Level M'
  - Fully deterministic hardcoded matrix is appropriate for ECharts (no external QR
    library available in the harness)
  - Axes cleanly hidden with piecewise visualMap for binary 0/1 coloring — idiomatic
    ECharts heatmap approach
  - Chrome (title, subtitle, FP labels, footer) correctly uses t.ink / t.inkSoft tokens
    for theme adaptation
  weaknesses:
  - 'FP callout labels use fontSize: 10 (CSS px) and footer annotation uses fontSize:
    12 — these render at 20px and 24px source pixels respectively, which may be hard
    to read at 400px mobile scale; increase FP labels to 13–14px CSS and footer to
    13px CSS'
  - QR matrix scannability cannot be verified from image alone — the hardcoded matrix
    is claimed to be generated by qrcode library encoding 'https://anyplot.ai'; if
    there is any doubt, this should be validated by scanning the output PNG
  - 'Minor vertical imbalance: there is slightly more empty canvas space between the
    footer annotation and the bottom of the frame than between the title and the top
    of the QR frame — tighten GRID_BOTTOM or shift GRID_TOP slightly'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white.
      Chrome: Title "qrcode-basic · javascript · echarts · anyplot.ai" in dark near-black (#1A1A17) at 22px CSS, clearly readable. Subtitle "Scan to visit: https://anyplot.ai · QR Version 2 · Error Correction Level M" in muted ink at 14px, readable. "FP" callout labels at 10px above the top-left, top-right, and below the bottom-left finder patterns — small but legible at full resolution. Footer annotation at 12px CSS reads clearly. Thin themed border around the QR frame (opacity 0.35) is a subtle design touch.
      Data: QR code modules are near-black (#1A1A17 via t.ink) on the warm cream background, producing strong WCAG-passing contrast. All three finder patterns are clearly visible in the top-left, top-right, and bottom-left corners. The 4-module quiet zone is present as required. Data-module pattern is structured correctly for a Version 2 QR code.
      Legibility verdict: PASS — all text readable, QR modules high contrast, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title in near-white (#F0EFE8 via t.ink) — clearly readable against dark background. Subtitle in softer light tone (#B8B7B0 via t.inkSoft) — visible and legible. "FP" callout labels and footer annotation in muted light text (#A8A79F via t.inkSoft) — readable against dark background. No dark-on-dark failures detected.
      Data: QR module colors invert as intended — MODULE_DARK = t.ink = #F0EFE8 (near-white), MODULE_LIGHT = t.pageBg = #1A1A17 (near-black). Result is a light-modules-on-dark-background QR code with identical structural pattern to the light render. High contrast maintained. Finder patterns remain clearly identifiable.
      Legibility verdict: PASS — data colors are the same QR matrix (identical pattern, inverted chrome), all text readable, no dark-on-dark issues.
