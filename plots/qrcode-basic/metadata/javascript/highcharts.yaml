review:
  strengths:
  - 'QR code structure is verifiably correct: all three 7x7 finder patterns and horizontal/vertical
    timing strips match the QR standard, and Version 2 (25x25) is correct for the
    encoded URL'
  - Theme adaptation is elegant — uses t.ink / t.pageBg so both light and dark renders
    maintain maximum QR contrast while following anyplot theming
  - Square orientation correctly chosen; title font-size scaling formula handles the
    long mandated title string gracefully
  - Fully deterministic, clean KISS code with appropriate use of Highcharts SVG renderer
    for custom graphics
  weaknesses:
  - 'Visible sub-pixel grid lines between adjacent QR modules in both renders — individual
    chart.renderer.rect() calls produce SVG anti-aliasing seams where dark modules
    should form solid continuous blocks. Fix: add .attr({ ''shape-rendering'': ''crispEdges''
    }) to each module rect call, or slightly inflate each rect by 0.5px (cellSize
    + 0.5) to eliminate the gaps.'
  - 'Bottom whitespace is ~22% of canvas height vs ~12% for the header area — a noticeable
    vertical imbalance. Fix: reduce chart margin bottom from 70 to ~30 (change margin:
    [90, 60, 70, 60] to margin: [90, 60, 30, 60]).'
  - 'Subtitle font-size 13px is one pixel below the 14px style-guide default for labels.
    Fix: change subtitle fontSize to ''14px''.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "qrcode-basic · javascript · highcharts · anyplot.ai" in dark ink, clearly readable. Subtitle "Encodes: https://anyplot.ai | Version 2 · ECC Level M" in softer gray, also readable.
      Data: 25x25 QR matrix centered in the canvas. Dark (#1A1A17) ink-colored modules on cream (#FAF8F1) quiet zone background. All three finder patterns visible in corners. Timing patterns correct.
      Legibility verdict: PASS — all text readable; minor: visible sub-pixel seams between adjacent QR module rects (rendering artifact)

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct anyplot dark surface
      Chrome: Title text flips to near-white (#F0EFE8), clearly readable. Subtitle in soft light gray (#B8B7B0), readable. No dark-on-dark failures.
      Data: QR module colors invert — near-white (#F0EFE8) modules on dark (#1A1A17) background. Same module positions as light render (only ink/background colors swap). Pattern is identical to light render in structure.
      Legibility verdict: PASS — all text readable against dark background; same sub-pixel seam artifact as light render
