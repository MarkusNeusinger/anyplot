review:
  strengths:
  - Perfect theme adaptation — t.ink and t.pageBg correctly flip the QR module and
    quiet zone colors between light and dark themes
  - 'Structurally valid QR code matrix with all required elements: three finder patterns,
    alternating timing patterns, proper separators, and 4-module quiet zone'
  - Idiomatic Highcharts SVG renderer usage with crispEdges for pixel-perfect module
    rendering — elegant for a non-standard chart type
  - Square canvas (2400×2400) is the correct format for this symmetric visualization
  - Descriptive subtitle provides useful metadata (encoded URL, QR version, ECC level)
    above bare-minimum default
  - All chrome tokens correctly applied — transparent chart background, t.ink/t.inkSoft
    for title and subtitle, animation disabled, credits disabled
  weaknesses:
  - Dark mode quiet zone uses t.pageBg (#1A1A17) which is identical to the page background
    — the quiet zone rectangle is invisible in the dark render, making the QR boundary
    less defined; use t.elevatedBg (#242420) instead so the quiet zone has a subtle
    but visible separation from the page background in dark mode
  - QR matrix is hardcoded rather than generated by a QR library — scannability cannot
    be mechanically verified in the review; if a scanning test is added to the pipeline,
    a mismatch would trigger a regeneration
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct for light theme
      Chrome: Title "qrcode-basic · javascript · highcharts · anyplot.ai" in dark ink at top-center, clearly legible; subtitle "Encodes: https://anyplot.ai | Version 2 · ECC Level M" in muted ink below it, also readable
      Data: QR code rendered in dark near-black (#1A1A17) modules on a warm off-white (#FAF8F1) quiet zone rectangle; finder patterns visible in three corners (top-left, top-right, bottom-left); QR code fills the majority of the canvas with balanced margins
      Legibility verdict: PASS — all text readable, QR modules high-contrast against background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct for dark theme
      Chrome: Title in light cream color at top-center, clearly legible against the dark background; subtitle in muted light color, readable; no dark-on-dark failures
      Data: QR code rendered in light (#F0EFE8) modules on a dark quiet zone rectangle — however, the quiet zone (#1A1A17) is invisible against the identical page background (#1A1A17), so the QR code appears to float without a visible border; the modules themselves are still clearly distinguishable; data pattern is identical to light render (structural modules in same positions, only contrast is inverted)
      Legibility verdict: PASS — text readable, QR modules visible; minor: quiet zone boundary not visually distinct from page background in dark mode
