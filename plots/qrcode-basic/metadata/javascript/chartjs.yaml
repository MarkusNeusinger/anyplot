review:
  strengths:
  - Technically impressive custom ISO 18004 QR encoder implemented in pure JS (~280
    lines) — correct GF(256) arithmetic, Reed-Solomon EC (16 codewords), zigzag placement,
    and format information BCH coding
  - 'Both themes handled correctly: page background is #FAF8F1 (light) / #1A1A17 (dark)
    and all chrome tokens (t.ink, t.inkSoft, t.grid) are wired up properly'
  - 'QR code visual is clean and professional: centered square canvas, 4-module quiet
    zone, high-contrast black-on-white card, finder/timing/alignment patterns all
    present'
  - 'Excellent data choice: encodes ''https://anyplot.ai'', the platform''s own URL
    — contextually appropriate and demonstrates real-world QR utility'
  - Deterministic output (hardcoded URL, fixed MASK_IDX=0), correct title format,
    URL label and EC-level annotation add informational depth
  weaknesses:
  - 'Critical LM penalty: the implementation never calls `new Chart()` or any Chart.js
    API — `window.Chart` is loaded by the harness but unused; the entire render is
    done via raw Canvas 2D API. Repair must route the QR rendering through Chart.js''s
    plugin system: `Chart.register({ id: ''qrcode'', afterDraw(chart) { /* draw modules
    on chart.ctx */ } })` then `new Chart(canvas, { type: ''scatter'', data: {datasets:[]},
    plugins: [...], options: { animation: false, responsive: true, maintainAspectRatio:
    false, plugins: { title: { ... } } } })` — this correctly invokes the Chart.js
    API while still drawing the QR via the plugin hook'
  - 'DE-01 is plain: the visualization is a bare white QR card on a themed background
    with no Imprint palette accent. Add a thin `#009E73` (t.palette[0]) decorative
    border or title underline to tie the visual into the brand palette and lift aesthetic
    sophistication'
  - 'SC-02 minor: spec explicitly warns ''use a proper QR encoding library instead
    of manually constructing the QR matrix'' — manual implementation is unavoidable
    in browser-only JS but acknowledged as deviation from guidance'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct page surface, not pure white
      Chrome: Title "qrcode-basic · javascript · chartjs · anyplot.ai" in dark ink at top — fully readable; URL "https://anyplot.ai" in muted soft tone below QR; "Version 2 · Error Correction M (15%)" in smaller soft text — all readable
      Data: QR code rendered on a pure white (#FFFFFF) card with pure black (#000000) modules — mandatory for scannability, not a palette compliance issue; three finder patterns (top-left, top-right, bottom-left), timing patterns, alignment pattern, and 4-module quiet zone all visible; thin grid-color border around the QR card
      Legibility verdict: PASS — all text readable, no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title in light ink (#F0EFE8 equivalent from t.ink token) — clearly readable; URL and version note in lighter soft tone — readable; no dark-on-dark failures anywhere
      Data: QR code modules identical to light render (black-on-white card is constant by functional requirement); white QR card creates sharp contrast against the near-black page background — the dark render actually looks more dramatic and polished
      Legibility verdict: PASS — all text readable against dark background, data colors unchanged from light render
