quality_score: 87
review:
  strengths:
  - 'Technically exceptional: implements a complete, spec-correct QR encoder from
    scratch in browser JavaScript (GF(256) arithmetic, Reed-Solomon, BCH format info,
    all 8 masks defined) because no offline QR library exists in the browser harness.'
  - 'Perfect spec compliance: quiet zone (4 modules), finder patterns in all three
    corners, EC level M (15%), Version 2 — all match spec requirements.'
  - 'Elegant brand integration: thin #009E73 accent border frames the white QR card
    without interfering with scannability.'
  - 'Correct theme adaptation: white QR card preserved in both themes for scannability;
    only chrome (background, text) flips.'
  - 'Clean Chart.js integration: plugin hooks (beforeDraw/afterDraw), canvas sizing,
    square orientation directive, and responsive settings all correctly applied.'
  weaknesses:
  - Sub-labels ('https://anyplot.ai' at 16px, version note at 14px) are slightly small
    for a 2400x2400 canvas — consider increasing to 18px and 16px respectively.
  - Mask index is hardcoded to 0 (MASK_IDX = 0) rather than evaluating all 8 mask
    patterns and selecting the lowest-penalty one per ISO 18004. A fixed mask produces
    a valid QR code but may reduce scan reliability with some readers.
  - Multiple helper functions (GF arithmetic, RS encoder, matrix builder) needed to
    implement QR from scratch add complexity beyond the KISS ideal, though they were
    unavoidable given no browser-available QR library.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "qrcode-basic · javascript · chartjs · anyplot.ai" in bold dark ink (~65% canvas width), clearly readable. No axis labels or ticks (axes hidden). URL label "https://anyplot.ai" in muted secondary ink below QR; "Version 2 · Error Correction M (15%)" in smaller sans-serif below that — both readable.
      Data: QR code rendered as black modules on a white card, centered in the canvas. Three finder patterns in top-left, top-right, bottom-left corners. Thin #009E73 (brand green) accent border frames the white QR card. Quiet zone of 4 modules surrounds the matrix. First (only) data color is #009E73.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title switches to light cream text — clearly readable against dark background. URL and version labels use light muted text — readable. No dark-on-dark issues detected.
      Data: QR code card retains its white background (required for QR scannability) — white card on dark background is correct tradeoff. Black QR modules identical to light render. #009E73 green border equally visible on dark surface. Data colors (green border, black modules) are identical across both renders; only chrome flips.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures.
