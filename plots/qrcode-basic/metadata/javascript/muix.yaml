review:
  strengths:
  - Brand green (#009E73) modules on theme-adaptive pageBg create an elegant, on-brand
    QR visualisation that integrates naturally with both light and dark surfaces.
  - All font sizes explicitly set with a clear typographic hierarchy (title > URL
    > caption).
  - 'Deterministic, fully self-contained implementation: no network calls, no RNG.'
  - Perfect Code Quality score — KISS structure, clean imports, elegant SVG rendering.
  - Canvas dimensions and theme-readability pass in both renders; no edge clipping.
  weaknesses:
  - QR matrix is manually hardcoded (25x25 array) contrary to spec guidance to use
    a proper QR encoding library; scannability cannot be verified from code review
    alone and any single bit error would corrupt the code silently.
  - Dark render produces an inverted QR pattern (brand green on near-black background);
    non-standard contrast direction may prevent scanning on older readers.
  - MUI X chart-specific features are not exercised beyond ChartContainer as an SVG
    shell; both LM scores are held back.
  - Caption at fontsize 14 px CSS may be marginally small on mobile viewports.
