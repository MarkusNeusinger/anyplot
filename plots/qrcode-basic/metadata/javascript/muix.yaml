review:
  strengths:
  - 'Brand green #009E73 used as QR module color — sophisticated on-brand design choice
    that threads the Imprint palette into an unconventional visualization type'
  - 'Perfect theme-adaptive implementation: light modules use t.pageBg so the QR contrast
    pair adapts seamlessly between cream and near-black surfaces'
  - Square canvas orientation correctly chosen for QR code; shapeRendering='crispEdges'
    ensures pixel-perfect module rendering without antialiasing artifacts
  - 'Complete typography hierarchy: title at 22px, URL in monospace at 16px, metadata
    caption at 13px — all readable in both themes'
  - Flat KISS structure with no unnecessary abstraction; deterministic hardcoded matrix
    guarantees full reproducibility
  weaknesses:
  - Spec explicitly forbids manually constructing the QR matrix and requires a proper
    QR encoding library; the hardcoded QR_MODULES array cannot be verified as scannable
    without physically scanning — the 25×25 matrix claim (Version 2, ECM, Mask 6)
    may be correct, but violates the spec's scannability guarantee
  - No @mui/x-charts components used — the entire implementation relies solely on
    @mui/material Box/Typography + raw SVG; per muix.md, when MUI X community can't
    express the spec the correct response is NOT_FEASIBLE rather than falling back
    to generic MUI layout primitives
  - Caption font at 13px CSS (26 source px) is below the style-guide minimum of ~14px
    for tertiary text; borderline on mobile scaling to ~400px
  - Design is clean but compositionally sparse — the large whitespace above/below
    the centered QR block creates a top-heavy feel; shifting the QR block slightly
    upward and using the freed space for a subtle grid or module-count annotation
    would improve visual balance
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white
      Chrome: title "qrcode-basic · javascript · muix · anyplot.ai" in near-black ink at 22px, clearly readable; URL "https://anyplot.ai" in secondary muted color at 16px monospace, readable; caption "Scan to visit anyplot.ai · Error Correction M (15%) · Version 2 · 25×25" in tertiary muted at 13px, readable but small
      Data: QR code rendered in brand green #009E73 on cream background; three finder patterns clearly visible in top-left, top-right, and bottom-left corners; quiet zone (4 modules) properly included; no finder pattern in bottom-right (correct); timing patterns visible; overall pattern distribution consistent with a valid Version 2 QR code
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black
      Chrome: title text in off-white/cream, clearly readable against dark background; URL label visible in muted-light color; caption in muted-light, readable — NO dark-on-dark issues found
      Data: QR code green modules (#009E73) unchanged from light render; light modules now adopt the near-black page background (t.pageBg = #1A1A17), creating green-on-dark contrast; data colors identical to light render as required; brand green #009E73 clearly visible on dark surface
      Legibility verdict: PASS
