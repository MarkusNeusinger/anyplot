review:
  strengths:
  - Creative use of pygal StackedBar with per-value color dictionaries to render QR
    code matrix
  - Uses real qrcode library ensuring scannable output as spec requires
  - Clean purposeful minimalist design with proper quiet zone around the code
  - Informative subtitle displaying encoded URL, error correction level, and matrix
    dimensions
  - Perfect spec compliance with all required features present
  weaknesses:
  - Thin gaps between stacked bar rows reduce crisp grid appearance and may affect
    scannability
  - Library mastery limited — StackedBar is creative workaround but not pygal strength
    for grid rendering
  - Some vertical whitespace could be better utilized
  image_description: 'The plot displays a QR code rendered on a white 3600×3600 square
    canvas using pygal''s StackedBar chart. The title "qrcode-basic · pygal · pyplots.ai"
    appears at the top in dark text. The QR code itself is a 25×25 module grid of
    black and white squares with the characteristic three finder patterns (large concentric
    squares) in the top-left, top-right, and bottom-left corners. A white quiet zone
    surrounds the QR code. Below the code, informative text reads "https://pyplots.ai
    · Error Correction: M (15%) · 25×25 modules". There are thin visible gaps/lines
    between some module rows due to the StackedBar rendering approach, slightly reducing
    the crispness of the grid.'
