review:
  strengths:
  - Creative use of pygal StackedBar as a pixel grid to render QR code — inventive
    approach for a non-standard chart type
  - Multi-color structural element highlighting (finder/timing/alignment) adds educational
    value and visual sophistication
  - Proper use of qrcode library ensures valid, scannable output
  - CSS injection to eliminate bar strokes is a clever pygal-specific technique
  - Complete metadata subtitle with color legend aids understanding
  weaknesses:
  - The is_finder() helper function breaks KISS structure — could be inlined
  - sys.path manipulation for filename collision adds code complexity
  - Canvas utilization could be tighter — excess whitespace between title and QR code
  - Design excellence stopped short of publication quality — could benefit from a
    subtle border frame or more refined typography
  image_description: 'The plot displays a QR code on a white 3600×3600 square canvas.
    The title "qrcode-basic · pygal · pyplots.ai" appears at the top in dark gray
    sans-serif text. The QR code occupies the central area with a 4-module white quiet
    zone border. Three finder patterns (7×7 squares in top-left, top-right, and bottom-left
    corners) are rendered in deep indigo, while data modules are black on white. Timing
    strips are highlighted in purple and the alignment pattern in teal, creating visual
    distinction between QR structural elements. Below the QR code, a two-line subtitle
    reads: "https://pyplots.ai · Error Correction: M (15%) · 25×25 modules" and "Finder
    patterns (indigo) · Timing strips (purple) · Alignment (teal)". No axes, gridlines,
    or legend are visible. The overall layout is clean with generous margins.'
