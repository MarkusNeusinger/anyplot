review:
  strengths:
  - 'Perfect spec compliance: all three required features (mirrored KDE, IQR box with
    quartiles, median line) correctly implemented'
  - Imprint palette positions 1-4 used with thoughtful darker IQR box variants that
    create intentional color depth within each violin
  - Both light and dark themes fully readable — correct background tokens, properly
    flipped chrome, no dark-on-dark failures
  - Interactive HTML export leverages pygal's primary capability; custom tooltip lambdas
    provide meaningful statistical summaries (median, Q1, Q3, bimodal note) on hover
  - Advanced violin's extra width (0.46 vs 0.38) is a purposeful design decision to
    visually flag the bimodal distribution — good data storytelling without needing
    annotations
  - np.random.seed(42) and fully deterministic data generation
  weaknesses:
  - 'DE-02 could be improved: default pygal SVG chrome (transition animations, tooltip_fancy_mode)
    adds unused complexity; removing these would clean up the style definition'
  - The bimodal waist in the Advanced violin is visible but subtle; a slightly more
    pronounced width differential (e.g., 0.52 vs 0.38) would make the two sub-populations
    clearer at thumbnail scale
  - 'DE-01 falls short of publication-ready: no explicit typographic hierarchy treatment
    (e.g., title weight differentiation) beyond font size differences'
