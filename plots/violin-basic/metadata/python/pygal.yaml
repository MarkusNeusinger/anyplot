review:
  strengths:
  - Correct violin implementation with mirrored KDE, IQR box, and median line for
    all 4 categories
  - Three-tier color hierarchy (violin fill, darker IQR, warm-white median) shows
    intentional design sophistication
  - Both light and dark themes render correctly — proper theme-adaptive chrome, identical
    data colors across renders
  - Advanced category correctly shows bimodal distribution shape highlighting two
    sub-populations
  - 'Full spec compliance: quartile markers, mirrored density, median line all present'
  - Clean flat code with manual Silverman KDE — appropriate since pygal has no native
    violin chart type
  - Correct canvas size (3200×1800), correct palette (Imprint positions 1-4), correct
    backgrounds
  weaknesses:
  - IQR boxes in dark render are somewhat hard to distinguish as the darker Imprint
    variants blend more into the warm-black background — a lighter stroke around IQR
    boxes would improve contrast in dark theme
  - x_labels_major_count=4 assignment partially works but the x-axis tick labels at
    0 and 5 (the padding positions) leave a minor labeling ambiguity; suppressing
    them via empty strings works but is fragile
  - No explicit annotations or callout highlighting the bimodal Advanced distribution
    — a note would strengthen the data storytelling
