      Data: Four violins — Control (#009E73 green), Tutorial (#C475FD lavender), Self-Study (#4467A3 blue), Intensive (#BD8233 ochre). Gradient fills from translucent edges to opaque center. White median line stripes visible. Small IQR boxes inside each violin. Dashed mean reference line visible.
