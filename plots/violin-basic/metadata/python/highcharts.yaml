review:
  strengths:
  - Creative use of Highcharts PolygonSeries with KDE-derived violin shapes — non-trivial
    implementation that leverages a distinctive library feature
  - Gradient fills (rgba 0.12→0.65→0.12) give the violin bodies a polished dimensional
    look
  - Four distinct distribution shapes (normal, bimodal, symmetric, exponential) tell
    a clear statistical story
  - Overall mean reference dashed line with label adds useful comparative context
    across all groups
  - 'Perfect Imprint palette compliance in correct canonical order (#009E73, #C475FD,
    #4467A3, #BD8233)'
  - Theme-adaptive chrome fully wired — background, text, grid, legend all adapt correctly
    between light and dark
  - 'Correct canvas handling: CDP viewport override + PIL safety net ensures exact
    3200×1800 output'
  - Clean KISS code structure with np.random.seed(42) for reproducibility
  - Interactive HTML artifact saved alongside PNG — correct pattern for Highcharts
  weaknesses:
  - 'Median line color uses PAGE_BG (#1A1A17 in dark mode = near-black), making it
    nearly invisible against the dark background showing through the semi-transparent
    violin bodies in the dark render. Fix: use theme-adaptive contrasting color —
    e.g. `med_line.color = PAGE_BG if THEME == ''light'' else INK` (INK = #F0EFE8
    in dark, which is off-white and visible against colored violins over dark background)'
  - 'IQR boxes (rgba(color, 0.85)) are barely distinguishable within the violin body
    since the violin center fill is already at 0.65 opacity of the same color family.
    Fix: use PAGE_BG fill with a colored border (e.g. `box_series.fill_color = f''rgba({v["rgb"]},0.3)''`
    and keep the colored border stroke at lineWidth=4) so the box reads as a distinct
    region rather than blending into the violin'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, no pure white
      Chrome: Bold dark title "violin-basic · python · highcharts · anyplot.ai" fully visible at ~70% width; subtitle "Distribution of scores across 200 students per study group" in secondary dark color; Y-axis label "Test Score (points)" and X-axis label "Study Group" both dark and clear; tick labels in dark secondary color; dashed overall mean line at ~51 with italic label "Overall Mean (51)" at right edge; legend in top-right with colored swatches and readable text
      Data: Four violin shapes — Control (#009E73 green), Tutorial (#C475FD lavender), Self-Study (#4467A3 blue), Intensive (#BD8233 ochre) — Imprint palette in canonical order; gradient fills (0.12→0.65→0.12 opacity) give dimensional look; white/off-white median lines clearly contrast against colored violin bodies; IQR boxes visible as slightly more opaque rectangles inside each violin (subtle but present); bimodal distribution of Tutorial clearly shows two humps; Intensive shows right-skewed exponential shape
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title in light off-white text readable against dark background; subtitle in lighter secondary color visible; axis labels and tick labels in light-colored tokens — all readable; dashed overall mean line visible; legend readable with light text
      Data: Data colors are identical to light render — same #009E73, #C475FD, #4467A3, #BD8233 (correct: Imprint palette is theme-invariant); violin shapes rendered correctly; ISSUE: median lines use PAGE_BG (#1A1A17 = near-black) which is nearly invisible against the dark background showing through the semi-transparent violin fills — lines are detectable but very faint compared to the white lines in light mode; IQR boxes similarly subtle; no dark-on-dark text failures for chrome elements
      Legibility verdict: PASS for chrome text (all axis labels, title, ticks are readable in light-on-dark); PARTIAL FAIL for data elements — median lines barely visible in dark render due to near-black line color on dark background through semi-transparent violin fills
