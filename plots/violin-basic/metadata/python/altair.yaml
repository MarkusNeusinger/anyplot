  strengths:
  - 'Excellent spec compliance: all three required features (mirrored KDE violin,
    IQR quartile bar, median line) implemented correctly using Altair-idiomatic transforms'
  - 'Outstanding data choice: bimodal Sales distribution (base salary + commission
    earners) deliberately demonstrates the violin plot''s advantage over box plots'
  - 'Idiomatic Altair layer-composition: transform_density + stack=''center'' for
    mirrored violin is precisely how Vega-Lite''s grammar solves this problem'
  - 'Correct Imprint palette in canonical order (green, lavender, blue, ochre) with
    first series #009E73'
  - 'Both themes fully readable: theme-adaptive INK/INK_SOFT tokens correctly threaded
    through configure_axis, configure_title, facet headers'
  - 'Perfect canvas handling: pad-only to 3200x1800 target, no cropping, correct error
    gate'
  - resolve_scale(x='independent') correctly allows each violin facet to have its
    own density scale
  - Realistic salary-by-department scenario with plausible values (Support ~$55K through
    Engineering ~$92K)
  weaknesses:
  - Median line color uses PAGE_BG (#1A1A17 in dark mode) — creates a near-black horizontal
    stripe on the colored violin fills in dark mode, reducing median visibility compared
    to light mode. A more robust choice would be ELEVATED_BG or a fixed contrast color
    that maintains high contrast on both Imprint palette fills in both themes
  - 'VQ-01 minor imbalance: facet labelFontSize=16 is noticeably larger than Y-axis
    titleFontSize=12, creating slight label size imbalance in the faceted layout;
    both are readable but the hierarchy could be tightened (facet label to 13-14 or
    axis title to 13-14)'
  - 'DE-02: horizontal grid lines span all four violin panels — for a violin plot
    a no-grid or left-axis-only reference line approach would be cleaner and reduce
    chart noise'
  - 'LM-02: the layer-composition approach is correct but could further showcase Altair''s
    declarative grammar by using shorthand transform chaining more concisely'
