review:
  strengths:
  - 'Perfect implementation of all three spec requirements: mirrored KDE, inner box
    (quartiles + median), 2–6 categories'
  - Imprint palette applied in canonical order with saturation=1.0 override — full
    brand fidelity
  - Bimodal East distribution with annotation turns the chart into a story, not just
    a display
  - violinplot+stripplot combination is the idiomatic seaborn way to show density
    + individual points simultaneously
  - All theme chrome correctly token-driven; dark render passes readability check
    without any dark-on-dark failure
  - inner=box + cut=0 shows seaborn expertise beyond basic usage
  weaknesses:
  - 'DE-01: The annotation callout could use a rounded bbox with ELEVATED_BG background
    for a more polished look (e.g., bbox=dict(boxstyle=''round,pad=0.3'', fc=ELEVATED_BG,
    ec=INK_SOFT, lw=0.8))'
  - 'DE-02: The annotation arrowprops uses a plain ''-|>'' arrowstyle with no bbox;
    adding a callout box to the annotation text would increase visual refinement'
  - 'LM-02: The annotation is matplotlib-level; a more distinctive seaborn touch (e.g.,
    sns.despine() call or using seaborn''s color system programmatically) would lift
    LM-02 from 3 to 5'
