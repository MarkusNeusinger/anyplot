      Data: Violin colors identical to light render — Engineering green, Design lavender, Marketing blue, Sales ochre. Boxplot box fills adapt to dark background (fill=#1A1A17), borders light (INK=#F0EFE8). Small light-colored circular median marker visible in Sales violin at ~$97k — letsplot internal rendering, minor quirk.
