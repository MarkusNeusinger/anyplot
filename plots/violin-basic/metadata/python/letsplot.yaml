review:
  strengths:
  - 'Spec-perfect implementation: all required violin features (mirrored KDE, quartile
    markers, median line) present and correct'
  - 'Deliberate data design: bimodal Engineering distribution is the ideal showcase
    for why violin plots beat box plots — shows the junior/senior salary split that
    a box plot would hide'
  - Imprint palette correctly applied in canonical order; both theme renders are accurate
    with proper chrome token usage
  - Dollar-formatted Y-axis (scale_y_continuous format parameter) adds immediate data
    context without extra code
  - Clean, reproducible code with random seed; all imports used; no dead code
  weaknesses:
  - Boxplot overlay (width=0.07) is very narrow — the IQR box appears as a thin sliver,
    making Q1/Q3 boundaries hard to read precisely; widening to 0.10–0.12 would improve
    quartile readability without dominating the violin shape
  - Design violin KDE extends significantly below $20k (to ~$10k) due to trim=False
    with a normal distribution clipped at $30k; either set explicit Y limits (e.g.,
    scale_y_continuous(limits=[20000, 180000])) or use trim=True to stop at data boundaries
    — the long tail adds visual noise
  - HTML output is generated but has no interactive tooltip configuration; adding
    geom_tooltip or similar would leverage letsplot's primary advantage over ggplot2
  - Light-colored median marker visible in dark render Sales violin (letsplot internal
    boxplot rendering) — minor visual quirk, not a blocking issue
