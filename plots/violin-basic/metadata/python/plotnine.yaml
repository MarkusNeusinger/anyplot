  - 'Full spec compliance: geom_violin with draw_quantiles=[0.25, 0.5, 0.75] covers
    quartile markers + median line; trim=False shows full distribution tails'
  - 'Excellent synthetic data with meaningfully distinct distribution shapes: bimodal
    Design (junior/senior split), tight Marketing, right-skewed Engineering, wide
    Sales commission spread'
  - Correct Imprint palette positions 1–4 in canonical order (green, lavender, blue,
    ochre) with theme-adaptive chrome throughout both renders
  - 'Both themes render correctly: #FAF8F1 light background and #1A1A17 dark background
    with all text and grid lines adapting via INK/INK_SOFT tokens'
  - 'Clean code: seed set, no functions/classes, all imports used, outputs to plot-{THEME}.png
    per convention'
  - Y-only horizontal grid (panel_grid_major_x removed) with alpha=0.15 opacity is
    a tasteful, non-distracting choice for this plot type
  weaknesses:
  - 'VQ-01 minor: base text=7pt is slightly small as the global fallback — bump to
    9pt so any unlabeled elements have a better floor'
  - 'DE-01/DE-02: No explicit axis_line or panel_border suppression — theme_minimal
    handles it but the library guide recommends explicitly setting axis_line=element_line(color=INK_SOFT)
    for theme consistency; also no ELEVATED_BG token assigned (unused here but good
    defensive practice)'
  - 'DE-03: No visual emphasis or annotation to highlight a key insight (e.g., a subtle
    annotation calling out the bimodal Design distribution or the Engineering senior-pay
    cluster) — would elevate storytelling'
  - 'LM-02: The implementation uses geom_violin idiomatically but does not leverage
    any additional plotnine-specific ggplot2 features such as coord_flip, facet_wrap,
    or stat_summary to augment the violin'
