review:
  strengths:
  - 'Correct Imprint palette in canonical order (#009E73, #C475FD, #4467A3, #BD8233)
    — all four class violins use the right colors'
  - Differential alpha (0.88 vs 0.62) highlights the bimodal Class B, creating intentional
    visual hierarchy and storytelling
  - draw_quantiles = c(0.25, 0.5, 0.75) fulfills all three spec requirements (quartile
    markers, median line) with a single idiomatic parameter
  - Italic 'bimodal' annotation at y=104 adds narrative value without clutter
  - 'Theme-adaptive chrome is correctly wired throughout: INK, INK_SOFT, PAGE_BG all
    flip between themes and every text element uses the right token'
  - adjustcolor(INK_SOFT, alpha.f = 0.25) produces properly subtle y-axis grid lines
    in both themes
  - Four richly varied distribution shapes (symmetric, bimodal, high-performing, right-skewed)
    maximise feature coverage of the violin plot type
  - Scale = 3200x1800 (8in x 4.5in @ 400 dpi) — correct landscape canvas, passes the
    dimension gate
  weaknesses:
  - 'Quantile lines near-invisible in dark mode for the two darkest violins: `color
    = PAGE_BG` sets quantile line color to #1A1A17 (near-black), which has very low
    contrast against the dark-green Class A fill and dark-blue Class C fill in dark
    mode. Fix: replace `color = PAGE_BG` with a theme-adaptive contrasting color —
    e.g., `color = if (THEME == ''light'') PAGE_BG else ''#FFFFFF''` or `color = INK`
    so that lines are always visible against the saturated fills.'
  - 'DQ-02 minor: ''Class A/B/C/D'' labels are generic letter-codes. Giving classes
    descriptive names (e.g. ''Beginner'', ''Intermediate'', ''Advanced'', ''Struggling'')
    would raise the realistic context score slightly without changing anything else.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white
      Chrome: title "violin-basic · r · ggplot2 · anyplot.ai" in dark ink, clearly readable; x-axis label "Class Group" and y-axis label "Test Score" in dark ink (INK), tick labels (50–100, Class A–D) in slightly softer INK_SOFT; italic "bimodal" annotation above Class B in INK_SOFT — all legible
      Data: four violin shapes — Class A in #009E73 (brand green), Class B in #C475FD (lavender), Class C in #4467A3 (blue), Class D in #BD8233 (ochre). Quantile lines (PAGE_BG = #FAF8F1 / off-white) visible as clean white stripes at Q1/median/Q3 inside each violin. Distinct distribution shapes clearly visible: symmetric (A), bimodal pinch (B), compact high (C), right-skewed spire (D).
      Legibility verdict: PASS — all text, all quantile lines clearly readable

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black
      Chrome: title in light #F0EFE8 (INK token), axis labels in the same light ink, tick labels in #B8B7B0 (INK_SOFT) — all readable against the dark background. "bimodal" annotation readable in light INK_SOFT. No dark-on-dark text failures.
      Data: same four Imprint palette colors, identical to light render — data colors unchanged, only chrome flips. However, quantile lines use `color = PAGE_BG = #1A1A17` (near-black), creating very low contrast against the dark-green Class A fill and the dark-blue Class C fill. Lines are clearly visible for Class B (lavender) and Class D (ochre), but faint/barely visible for Class A and Class C in dark mode. This is the primary weakness.
      Legibility verdict: PASS for text; PARTIAL PASS for quantile line visibility (two of four violins affected in dark mode)
