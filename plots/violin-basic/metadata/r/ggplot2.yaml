review:
  strengths:
  - 'Correct Imprint palette (green/lavender/blue/ochre in order), backgrounds #FAF8F1
    and #1A1A17 match theme spec exactly'
  - 'Excellent data: four distinct distribution shapes (symmetric, bimodal, compact-high-performing,
    right-skewed) clearly showcase violin plot advantages over box plots'
  - All font sizes explicitly set (title=12pt, axis.title=10pt, axis.text=8pt) — well-proportioned
    in both themes
  - 'Idiomatic ggplot2: grammar-of-graphics pipeline, draw_quantiles parameter, coord_cartesian
    for clipping behavior — all library-native patterns'
  - Theme-adaptive chrome correctly uses INK/INK_SOFT tokens; dark render shows light
    text on near-black background with no dark-on-dark failures
  weaknesses:
  - 'Two unused imports: dplyr and tidyr are loaded but no functions from either package
    are called — remove both for clean imports'
  - 'Violin tail clipping visible at y=40 lower boundary: with trim=FALSE the KDE
    extends below 40 but coord_cartesian clips it, leaving Class A and B with abruptly
    cut lower tails rather than tapering to zero — either use trim=TRUE or lower ylim
    to ~25'
  - Quantile lines are very subtle due to colour=NA on geom_violin — with no contrast
    colour set the draw_quantiles segments blend into the violin fill rather than
    providing clear visual markers; add explicit colour (e.g. white or PAGE_BG) to
    make them readable
  - 'Design lacks visual hierarchy: all four violins are given equal visual weight,
    with no emphasis on the notably interesting bimodal Class B distribution — consider
    a slightly lighter alpha on the other violins, or add a subtle annotation callout
    to Class B'
  - 'Grid lines use INK_SOFT solid colour rather than the style-guide recommended
    ~15% opacity rule: at linewidth=0.25 they are acceptably subtle but still bolder
    than ideal, especially in the light render where #4A4A44 on #FAF8F1 is visible
    at full opacity'
