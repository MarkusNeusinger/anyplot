review:
  strengths:
  - 'Excellent semantic color mapping for 5-level Likert scale: Strongly Agree→#009E73
    (brand green), Agree→#99B314 (lime, positive family), Neutral→INK_MUTED (muted
    anchor), Disagree→#BD8233 (ochre, cautionary), Strongly Disagree→#AE3030 (matte
    red, negative) — creates a natural visual gradient from positive to negative that
    aids interpretation immediately'
  - Per-link RGBA opacity encoding (stable flows=0.7, opinion-change flows=0.28) directly
    implements the spec requirement to visually distinguish stable respondents from
    changers — this is both idiomatic Highcharts and a sophisticated design decision
  - Narrative annotation box with specific statistic ('48% → 53% Q1→Q4') and branded
    green border (#009E73) creates a clear focal point and tells the data story explicitly
  - 'Both themes correctly implemented — all chrome tokens (INK, INK_SOFT, PAGE_BG,
    ELEVATED_BG) are theme-adaptive, data colors identical across themes, backgrounds
    correct (#FAF8F1 light, #1A1A17 dark)'
  - Local cache + CDN fallback pattern for JS modules (highcharts.js + sankey.js +
    annotations.js) is a robust production pattern
  - Georgia serif font for title and wave headers adds editorial polish above library
    defaults
  - Node totals shown in node labels (e.g. 'Strongly Agree (180)') directly fulfils
    spec requirement
  weaknesses:
  - Node dataLabels font size 26px is significantly below the recommended 44px for
    highcharts at 3200×1800 canvas. At mobile scale (~400px wide), node labels scale
    to ~3px and are completely unreadable. Increase to at least 36-40px.
  - Custom HTML legend font-size is 22px, below recommended 44px. At mobile scale,
    legend becomes ~2.75px — effectively invisible. Increase to at least 36px.
  - Wave header annotations (y=165 in SVG) create visual crowding at the top of the
    Q1 column where 'Q1 2024' text overlaps or closely crowds the top-most 'Strongly
    Agree (180)' node label. Consider increasing marginTop further (to ~320px) and
    adjusting annotation y to ~185 to give more separation.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Title "Employee Training Satisfaction · alluvial-opinion-flow · python · highcharts · anyplot.ai" in bold Georgia serif, dark #1A1A17 ink, readable. Subtitle in smaller dark-soft text, readable. Wave column headers (Q1 2024–Q4 2024) in bold serif, readable. Node labels ("Strongly Agree (180)", "Agree (250)", etc.) visible but at 26px — smaller than recommended 44px.
      Data: Five Likert categories using semantic Imprint color mapping — Strongly Agree=#009E73 (brand green), Agree=#99B314 (lime), Neutral=INK_MUTED (adaptive gray), Disagree=#BD8233 (ochre), Strongly Disagree=#AE3030 (matte red). Stable flows at 0.7 opacity; opinion-change flows at 0.28 opacity. Flows clearly visible and distinguishable. Narrative annotation box with #009E73 green border at right side. Custom HTML legend at bottom with 22px font — smaller than recommended 44px but legible at full canvas.
      Legibility verdict: PASS at full canvas (3200×1800). FAIL at mobile scale (node labels ~3px, legend ~2.75px).

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title and wave headers flip to light #F0EFE8 ink — readable against dark background. Node labels use dark-mode INK (#F0EFE8) with dark PAGE_BG text outline — readable. No dark-on-dark failures detected. Subtitle in INK_SOFT (#B8B7B0) — readable. HTML legend uses theme-adaptive INK color — readable.
      Data: Colors identical to light render — Strongly Agree green, Agree lime, Neutral muted gray, Disagree ochre, Strongly Disagree matte red. Flow opacity differentiation preserved. Narrative annotation uses dark ELEVATED_BG (#242420) fill with #009E73 green border — readable.
      Legibility verdict: PASS at full canvas. Same mobile-scale concern as light render (node labels and legend too small).
