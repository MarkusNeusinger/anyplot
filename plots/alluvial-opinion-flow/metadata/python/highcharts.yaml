review:
  strengths:
  - Semantic Imprint palette mapping (green=positive, muted=neutral, ochre=cautionary,
    red=negative) — excellent use of the semantic-exception rule
  - Per-link opacity differentiation (stable=0.7, changing=0.15) implements the spec's
    visualization intent elegantly
  - Custom HTML legend correctly explains both category colors and the opacity narrative
    key (stable vs. changed opinion)
  - Deterministic employee satisfaction survey data with a believable positive-trend
    arc across four quarters
  - Title fontsize correctly scaled via the linear formula for the longer-than-67-char
    title string
  - 'Perfect theme adaptation: correct backgrounds (#FAF8F1 light / #1A1A17 dark),
    correct text token assignments, identical data palette in both renders'
  - Clean KISS code structure with local/CDN fallback for JS loading
  weaknesses:
  - 'Faint cross-category flows (alpha=0.15) become nearly invisible in the dark render
    against #1A1A17 — increase minimum alpha to 0.25–0.30 to maintain the stable/changing
    distinction across both themes'
  - Wave column annotation headers (y=250 inside the green Strongly Agree band) overlap
    or crowd the adjacent node labels for Q2 and Q3 columns — reposition to above
    the chart area (y≈65) or increase marginTop to create dedicated header space
  - Node data labels at 22px are slightly small for thumbnail/mobile readability —
    consider 26–28px
  - 'No narrative focal point: the key insight (positive sentiment grows Q1→Q4) is
    not visually emphasized — consider a brief annotation or highlighted net-change
    stat to guide the viewer'
  - 'LM-02: Could exploit more Highcharts-specific capabilities (e.g., plotOptions.series.states
    for flow emphasis, gradient link fills via built-in color gradient API)'
