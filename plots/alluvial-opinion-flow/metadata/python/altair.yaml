review:
  strengths:
  - 'Semantic Imprint palette mapping: positive sentiment→green, negative→red, neutral→muted
    anchor — a textbook application of the style guide semantic exception'
  - Opacity encoding distinguishes stable respondents from changers elegantly across
    all wave transitions
  - Right-side delta labels (+123, +5, -45, -68, -15) provide quantitative polarization
    story at a glance
  - Trend annotation at the top explicitly narrates the insight without cluttering
    the data area
  - Wave column background bands subtly anchor each time period without distracting
    from flows
  - Both light and dark renders are fully readable with correct theme-adaptive chrome
    throughout
  - Altair-idiomatic layer composition with transform_filter, transform_calculate,
    and reactive selection_point for hover interactivity
  weaknesses:
  - Bottom ~25% of canvas is empty due to the vl-convert padding approach — chart
    content ends at ~75% canvas height, leaving a noticeable unused strip below the
    wave column headers
  - The legend (Sentiment) is rendered at a small scale at the bottom of the Altair
    view and may be hard to read at mobile widths — the left-side category labels
    effectively duplicate its function; consider removing the legend to reduce clutter
    since left labels already identify each category
  - 'BAND_COLOR uses custom hexes (#DDE5EE light / #1C2B36 dark) outside the Imprint
    palette — structural column bands should use INK_MUTED with low opacity (e.g.
    0.08) to stay within the palette system'
  - The flow density between Q1/Q2 and Q2/Q3 nodes creates visual complexity where
    individual flow paths are hard to follow; increasing the change-flow opacity slightly
    (0.35 → 0.40) and reducing stable-flow opacity differential would improve readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "alluvial-opinion-flow · python · altair · anyplot.ai" bold and clearly readable in dark (#1A1A17) ink. Subtitle "Employee Engagement Survey — 1,000 Staff Quarterly Sentiment Tracking" in muted INK_MUTED tone. Left-side category labels ("Strongly Disagree (150)" through "Strongly Agree (180)") and right-side delta labels ("(273) +123" through "(165) -15") in INK_SOFT — all readable. Wave headers Q1–Q4 2025 in bold INK at bottom of chart. Trend annotation in italic INK_MUTED at top of node area.
      Data: Five categories: Strongly Agree (#009E73 green), Agree (#99B314 lime), Neutral (INK_MUTED gray), Disagree (#BD8233 ochre), Strongly Disagree (#AE3030 red). Node heights proportional to respondent counts. Stable flows at 55% opacity, change flows at 30% opacity. Count labels in white (#FFFFFF) inside each node. Wave column bands in light blue-gray. No axes or grid — clean alluvial layout.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title in light (#F0EFE8) ink — fully readable. Subtitle and trend annotation in light INK_MUTED (#A8A79F) — readable. Category labels and delta labels in INK_SOFT (#B8B7B0) — readable. Wave headers in light INK. No dark-on-dark failures. Column bands in dark blue-gray (#1C2B36) — visible but subtle.
      Data: Colors IDENTICAL to light render — Strongly Agree still #009E73, Agree #99B314, Neutral gray, Disagree #BD8233, Strongly Disagree #AE3030. White count labels remain readable on dark node fills. Flow opacity pattern unchanged.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures observed.
