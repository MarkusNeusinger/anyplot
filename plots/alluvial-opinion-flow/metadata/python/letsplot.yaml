review:
  strengths:
  - 'Semantic Imprint palette mapping: Strongly Agree→green, Agree→blue, Neutral→muted,
    Disagree→ochre, Strongly Disagree→red — intuitive, well-justified sentiment scale
    coloring'
  - Differential opacity distinguishes stable respondents (alpha=0.6) from changers
    (alpha=0.35) — directly satisfies spec requirement with minimal visual noise
  - 'Strong data storytelling: subtitle encodes the key insight, right-side change
    indicators (+85, -158, etc.) make net flows immediately readable'
  - Smooth hermite s-curve interpolation for ribbon flows looks professional; manual
    layout arithmetic for proportional node heights
  - 'Full spec compliance — all alluvial requirements met: proportional flow widths,
    per-wave node counts, chronological ordering, transparency for overlapping flows'
  - Native letsplot layer_tooltips() used for interactive HTML output — idiomatic
    library feature, not simulated
  weaknesses:
  - '"Neutral" category uses the adaptive INK_MUTED token (#6B6A63 light / #A8A79F
    dark), causing the neutral band to appear different in the two renders. The design
    system allows this for semantic muted anchors, but it means the same category
    has a different visual identity per theme — consider a fixed Imprint-adjacent
    gray that reads well on both surfaces'
  - Left-side category labels are vertically tight; for the middle three categories
    (Agree, Neutral, Disagree) the label stacking is close and could collide if nodes
    were slightly smaller — the layout currently works but has little vertical slack
  - 'In the dark render, the thin cross-category changed-flow ribbons (alpha=0.35
    on the dark #1A1A17 background) are faint enough to be near-invisible for small
    flows like Strongly Agree→Neutral; increased alpha (0.45–0.50) would improve dark-mode
    readability without cluttering the light render'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "alluvial-opinion-flow · python · letsplot · anyplot.ai" bold dark (#1A1A17), fully readable. Subtitle in INK_SOFT, readable. Wave headers Q1–Q4 2025 in bold dark ink. Left/right category labels in INK_SOFT — all clearly legible against the cream background.
      Data: Four waves with 5 colored node bands per wave. Strongly Agree (green #009E73) at bottom, Agree (blue #4467A3), Neutral (medium gray #6B6A63), Disagree (ochre #BD8233), Strongly Disagree (matte red #AE3030) at top. Stable flows at alpha=0.6, changed flows at alpha=0.35. White count labels inside Q2/Q3 nodes.
      Legibility verdict: PASS — all text readable, no light-on-light failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title and subtitle in light #F0EFE8 text — clearly readable. Wave headers bold light. Left/right category labels in INK_SOFT (#B8B7B0) — all legible. No dark-on-dark failures observed.
      Data: Colors are identical to light render for the 4 Imprint palette hues (green, blue, ochre, red). Neutral band uses adaptive INK_MUTED (#A8A79F in dark mode) — lighter gray compared to light render's #6B6A63, so the neutral band changes visual weight slightly between themes. Changed flows (alpha=0.35) on dark bg are fainter than in light render; very small flows approach near-invisible.
      Legibility verdict: PASS — all chrome text readable, brand green visible. Minor: thin changed-flow ribbons are faint in dark mode at alpha=0.35.
