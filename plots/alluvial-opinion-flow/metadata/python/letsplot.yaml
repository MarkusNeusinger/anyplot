review:
  strengths:
  - Semantically-driven Imprint palette assignment (green=agree, red=disagree) creates
    immediate interpretive clarity without a legend
  - Alpha differentiation (stable=0.6, changed=0.45) adds a meaningful second visual
    dimension distinguishing flow types
  - Subtitle explicitly states the polarization insight; right-side net-change labels
    (+85, -158, -12) quantify the story
  - Smooth Hermite/smoothstep interpolation produces clean, professional-looking ribbon
    curves
  - All text elements use theme-adaptive tokens — both renders pass the readability
    check
  - Idiomatic layer_tooltips() usage per geom layer with contextual field formatting
  - Internally balanced flow matrices (outflows = inflows per wave) with correct totals
  weaknesses:
  - 'Neutral category uses custom hex #7A7A72 (fixed, theme-invariant) instead of
    the muted semantic anchor (#6B6A63 light / #A8A79F dark). Replace with the theme-adaptive
    INK_MUTED token already defined in the file.'
  - 'No explicit net-flow highlighting: spec requires highlighting net flows to reveal
    polarization trends. Consider adding annotation or thicker ribbons for dominant
    cross-category flows (e.g., Neutral→Strongly Agree, Neutral→Strongly Disagree).'
  - Side category labels at size=3.6 mm are slightly small relative to wave headers
    (5.5 mm). A slight increase to 4.0–4.2 mm would improve mobile readability.
  image_description: |-
