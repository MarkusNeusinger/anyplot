      Background: Warm off-white #FAF8F1 — correct surface color, not pure white.
      Chrome: Title "alluvial-opinion-flow · python · letsplot · anyplot.ai" at 16pt in dark INK (#1A1A17) — clearly readable. Subtitle "Survey trend: neutral stance declines 280→122 as opinions polarize" in INK_SOFT (#4A4A44) — readable. Wave headers (Q1–Q4 2025) in bold dark ink — readable. Left/right category labels in INK_SOFT at size=3.6 mm — readable but small. White node count labels inside colored bars — readable.
      Data: Five categories — green (#009E73 Strongly Agree), blue (#4467A3 Agree), mid-gray (#7A7A72 Neutral), ochre (#BD8233 Disagree), matte-red (#AE3030 Strongly Disagree). Stable flows at alpha=0.60, changed flows at alpha=0.45. First series is correctly #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark surface, not pure black.
      Chrome: Title and subtitle render in light off-white/cream (INK=#F0EFE8 in dark mode) — clearly readable. Wave column headers in light text — readable. Category labels on both sides in INK_SOFT (#B8B7B0 in dark mode) — readable. No dark-on-dark failures detected. White node count labels remain clearly visible inside colored bars.
      Data: All five category colors identical to light render — green, blue, gray, ochre, red. Colors are theme-invariant as required (only chrome flips). Flows and nodes are clearly distinguishable from the near-black background.
