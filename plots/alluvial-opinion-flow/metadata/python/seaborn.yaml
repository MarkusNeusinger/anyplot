review:
  strengths:
  - 'Perfect spec compliance: all required features implemented (stable-vs-changer
    distinction, proportional flows, per-wave node counts, net-change sidebar, chronological
    layout, opacity for overlap)'
  - 'Excellent semantic colour mapping using Imprint palette correctly: green=support,
    red=oppose, grey/muted=neutral with appropriate semantic exception'
  - sns.desaturate for changer flow colours is a clever seaborn-native design choice
  - Dual-panel layout (alluvial + net-shift sidebar) communicates both flow pattern
    and headline story simultaneously
  - 'Fully theme-adaptive: both renders pass readability check with no dark-on-dark
    or light-on-light failures'
  - 'Perfect code quality: flat, deterministic, clean imports, correct canvas + save
    API'
  weaknesses:
  - Left-side two-line labels for smallest node (Strongly Support n=80) are tightly
    packed against adjacent labels — consider increasing vertical spacing or reducing
    to single-line format for nodes shorter than ~8% of total height
  - Matte-red (#AE3030) as label colour on dark surface is weakest contrast pair;
    consider bumping to lighter red or using INK_SOFT for right-side n= label on that
    category in dark mode
  - Design Excellence ceiling limited by many overlapping cross-category changer flows
    creating visual noise; reducing alpha on changer flows to 0.25 and lightening
    desaturated colours further would reduce clutter
