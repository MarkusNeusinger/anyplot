review:
  strengths:
  - Semantically mapped Imprint palette to diverging opinion scale (green→support,
    cyan→mild support, muted→neutral, ochre→oppose, red→strongly oppose) with clear
    visual logic
  - Bezier flows with alpha differentiation (0.55 stable, 0.22 changers) elegantly
    distinguishes stable respondents from opinion-changers as the spec requires
  - Mathematically consistent flow matrices — row and column sums correctly balance
    across all 3 wave transitions
  - FancyBboxPatch rounded nodes with shadow effects (patheffects.withSimplePatchShadow)
    give professional polish beyond default rectangles
  - 'Compelling data story: subtitle, wave headers, and right-side trend annotations
    collectively quantify the polarization trend'
  - 'All spec requirements satisfied: proportional flow widths, node count labels,
    stability encoding, chronological column layout, transparency for overlap'
  weaknesses:
  - Node and legend font sizes (7pt) are small at mobile scale (~400px) — consider
    increasing to at least 8pt for node labels and 8pt for legend text
  - 'DE-02 refinement: legend edgecolor should use INK_SOFT (not ''none'') to provide
    a subtle frame on the ELEVATED_BG surface, consistent with the library style guide
    chrome mapping'
  - 'LM-01: np.random.seed(42) is imported but data is entirely hardcoded — numpy
    usage is minimal; if seed is not needed, remove the import to keep code clean'
