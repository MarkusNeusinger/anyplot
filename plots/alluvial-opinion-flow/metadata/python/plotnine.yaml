review:
  strengths:
  - Semantic Imprint palette mapping (positive=green, neutral=muted-gray, negative=red)
    is principled and visually cohesive for a Likert opinion scale
  - Three-level alpha differentiation (stable=0.55, dominant-change=0.40, minor-change=0.22)
    encodes opinion stability as a visual dimension
  - 'Full spec compliance: flow width proportionality, node totals, stable/changer
    distinction, net-flow highlighting, and transparent overlapping flows all implemented
    correctly'
  - 'Expert idiomatic plotnine usage: geom_ribbon + cubic interpolation creates smooth
    S-curves; scale_alpha_identity() enables per-ribbon opacity without extra geom
    layers'
  - Deterministic data with internally consistent 1,000-respondent totals per wave;
    polarization narrative is coherent and compelling
  weaknesses:
  - Delta change labels at size=2.6mm are too small to be effective storytelling anchors
    — increase to 3.2-3.5mm and add bold weight for better legibility at mobile widths
  - Legend sits isolated from the main diagram with a noticeable whitespace gap on
    the right; adjust legend_position or xlim to better integrate it with the diagram
  - plot_margin=0.02 is very tight; increasing to 0.04-0.06 would give the diagram
    more breathing room, especially for the title and subtitle
  - Data story on polarization is present but muted due to small delta labels; make
    them more prominent to strengthen the narrative emphasis on Neutral's erosion
