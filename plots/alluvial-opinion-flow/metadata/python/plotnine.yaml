review:
  strengths:
  - Correct alluvial/Sankey structure with smooth cubic-interpolated ribbon flows
    using geom_ribbon, fully matching the spec's plot type
  - Semantic Imprint palette mapping (green=strongly agree, blue=agree, muted-gray=neutral,
    ochre=disagree, red=strongly disagree) is semantically meaningful and CVD-safe
  - Alpha differentiation between stable flows (0.55) and transitioning flows (0.22-0.40)
    with dominant-direction highlighting is a sophisticated storytelling device
  - Delta change labels (+19, +35, +55, +31, etc.) with ELEVATED_BG fill clearly highlight
    significant wave-over-wave category shifts
  - Fully theme-adaptive chrome — title, subtitle, wave headers, category labels,
    legend all flip correctly between light (#FAF8F1) and dark (#1A1A17) surfaces
  - 'All spec requirements implemented: proportional flow widths, node count labels,
    stable-vs-changer opacity, net-flow highlighting, left-to-right wave order'
  - Clean plotnine grammar using scale_alpha_identity, guide_legend(override_aes),
    coord_cartesian, and multiple composed geom layers idiomatically
  weaknesses:
  - 'Neutral category uses fixed hex #6B6A63 (light-theme muted token) regardless
    of theme — in dark mode this warm-gray on near-black (#1A1A17) yields marginal
    contrast (~3:1) for the node fills; the white node border (color=''white'') partially
    compensates but the Neutral flow ribbons at alpha=0.22-0.55 are nearly invisible
    against the dark background'
  - Count labels inside nodes (geom_text size=3.0 mm ≈ 8.5pt) and category labels
    on flanks (annotate size=3.2 mm ≈ 9pt) are at the lower edge of legibility when
    the 3200px canvas is displayed at mobile width (~400px)
  - Transitioning flows at alpha=0.22 are very faint in the dark render, making individual
    cross-category movements hard to follow visually; consider raising the minimum
    transitioning alpha to 0.30
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface
      Chrome: Bold title "alluvial-opinion-flow · python · plotnine · anyplot.ai" in dark ink (#1A1A17), centered and fully readable. Subtitle in INK_SOFT gray, readable. Wave headers (Wave 1–4) in dark bold above each column. Category labels ("Strongly Agree" through "Strongly Disagree") flanking left of Wave 1 and right of Wave 4 in dark ink — small (size 3.2 mm) but legible at full resolution.
      Data: Five colored node rectangles per wave column — green (Strongly Agree), blue (Agree), warm gray (Neutral), ochre (Disagree), matte red (Strongly Disagree). Flow ribbons connect nodes with cubic smoothstep curves; stable flows at alpha=0.55 are clearly visible, transitioning flows at alpha=0.22–0.40 are subtle but distinguishable. White count labels centered in each node. Delta labels (+19, +35, +55, etc.) with elevated-bg fill mark significant shifts. Legend on right with correct Imprint colors at full opacity.
      Legibility verdict: PASS — all text readable; no light-on-light issues; first series is #009E73.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface
      Chrome: Title, subtitle, wave headers, and category labels all render in light ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark surface. Legend background correctly uses #242420 (ELEVATED_BG dark), legend text in INK_SOFT light. No dark-on-dark text failures observed.
      Data: Data colors are identical to the light render (all five Imprint positions unchanged). However, the Neutral node (#6B6A63 warm-gray on #1A1A17) has marginal contrast (~3:1) — the node fills are distinguishable primarily due to white borders; the flow ribbons for Neutral at low alpha are nearly invisible in the dark render. All other categories (green, blue, ochre, red) remain clearly visible with good contrast.
      Legibility verdict: PASS overall — all chrome text readable with no dark-on-dark failures. Minor concern: Neutral node fills and their flow ribbons have reduced visibility in dark mode due to using a fixed light-theme muted hex rather than a theme-adaptive value.
