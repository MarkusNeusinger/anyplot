    L-to-R ordering, proportional flow widths, transparency for overlapping flows'
  - Clean deterministic data showing realistic polarization trend (Neutral shrinking,
    extremes growing) across 4 quarters
  - 'Idiomatic Plotly usage: go.Sankey with arrangement=''snap'', custom x/y node
    positions, multi-field customdata hovertemplate, invisible scatter traces for
    legend'
