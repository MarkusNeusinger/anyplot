    top margin area — roughly 25% of canvas height is unused white space in the top
    region due to t=180 margin combined with annotations near y=1
  - Green-red as primary color pairing for Strongly Agree / Strongly Disagree without
    additional redundant encoding beyond position — mildly CVD-unfriendly for deuteranopes
