review:
  strengths:
  - 'Full spec compliance: all required features implemented — consistent colors per
    category, proportional flow widths, node count labels, opacity-based stable-vs-changer
    distinction, net-flow highlighting, chronological column layout with headers,
    and transparency on overlapping flows'
  - 'Semantic Imprint palette exception correctly applied: sentiment scale maps green
    (Strongly Agree) → lime (Agree) → muted-gray (Neutral) → ochre (Disagree) → matte-red
    (Strongly Disagree) — a category set where color-meaning alignment is obvious'
  - 'Strong data storytelling: polarization trend annotation explicitly narrates the
    insight, opacity encoding note educates the reader on the visual grammar, and
    the separate rendering order (changers behind, stable on top) makes the visual
    hierarchy clear'
  - 'Genuine Bokeh-idiomatic implementation: ColumnDataSource for both flow patches
    and nodes, HoverTool with rich transition tooltips, TapTool with selection/nonselection
    glyphs for interactive highlighting, HTML artifact alongside PNG — proper use
    of Bokeh''s interactive strengths'
  - Deterministic, no-randomness data with realistic remote-work-policy context (1000
    employees, 4 quarterly waves, Likert scale categories, plausible polarization
    trend)
  - Correct 3200×1800 canvas with toolbar_location=None, Selenium screenshot with
    crop, theme-adaptive chrome tokens applied throughout (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT, INK_MUTED)
  weaknesses:
  - Bottom annotation text (opacity encoding note and polarization trend, 16pt) is
    small relative to the 3200×1800 canvas — at the style-guide spec 16pt Bokeh ≈
    ~21px tall which is marginal for readability; consider increasing to 20pt to match
    the subtitle
  - 'Bottom area is visually cramped: wave column headers (y=-20, 24pt), opacity note
    (y=-50, 16pt), and polarization trend (y=-68, 16pt) are packed tightly — the y_range
    bottom is -80, leaving barely one row of breathing room below the trend annotation;
    push y_range down to (-100, ...) and spread the three rows further apart'
  - Legend is placed with add_layout(legend, 'right') which pushes it outside the
    main plot area and relies on min_border_right=80 for allocation — the legend text
    (20pt) and title (16pt) are somewhat small for the canvas scale; legend label
    text should be 34pt per the bokeh.md guide (currently 20pt)
  - 'Middle-column count labels use INK_SOFT color (text_color=INK_SOFT) which is
    #4A4A44 in light mode — at 20pt on the colored node backgrounds this is readable
    but slightly low contrast against the colored fills; consider using the PAGE_BG
    color or white for labels that sit directly on the node rectangles'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "alluvial-opinion-flow · python · bokeh · anyplot.ai" bold dark text at top, clearly readable. Italic subtitle "Remote Work Policy Survey — 1,000 Employees Across 4 Quarters" in INK_SOFT below. Wave column headers Q1-Q4 2024 bold dark text at bottom. Opacity encoding note and polarization trend annotation in small 16pt text at bottom — readable at full resolution but tight. Legend "Opinion Categories" on right side with colored swatches and dark text on elevated-background frame.
      Data: Five opinion bands flow left-to-right across four quarterly waves. Strongly Agree (#009E73 teal) at top, Agree (#99B314 lime) second, Neutral (gray/muted) middle, Disagree (#BD8233 ochre) fourth, Strongly Disagree (#AE3030 red) at bottom. Stable flows rendered at alpha=0.6 (solid), changed-opinion flows at alpha=0.30 (faded), highlighted net-shift flows at alpha=0.45 with thicker stroke. Bezier ribbon shapes clearly show respondent count proportionality. Node count labels on left (Q1 values) and right (Q4 values) edges; middle columns show count numbers only.
      Legibility verdict: PASS — all primary text (title, wave labels, node labels) clearly readable; bottom annotation 16pt text is small but legible at full canvas size; no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in F0EFE8 near-white text — clearly readable against dark background. Subtitle and wave labels use theme-adaptive INK_SOFT/INK_MUTED tokens — light gray on dark, readable. Legend on right uses #242420 elevated dark background with light-gray label text — no dark-on-dark failure. Bottom annotations use INK_MUTED (#A8A79F) — legible on dark surface.
      Data: Identical data colors to light render — #009E73 teal for Strongly Agree, #99B314 lime for Agree, muted gray for Neutral, #BD8233 ochre for Disagree, #AE3030 red for Strongly Disagree. All five category colors are clearly distinguishable against the near-black background. Opacity encoding (stable/changed/highlighted) behaves identically to light render.
      Legibility verdict: PASS — title and primary labels clearly visible in light-on-dark; no dark-on-dark failures detected; theme token application is complete and correct
