    standard baseline) are in overlapping y-ranges; the long centered annotation text
    crosses the same horizontal positions as the four wave headers, causing crowding
    or overlap in the bottom strip
  - min_border_bottom=80 is too small for three rows of bottom text (wave headers
    + opacity note + trend annotation at 20-24pt); bottom strip feels compressed —
    increase to 130, extend y_range bottom to -155, reposition rows to y=-38/-88/-128
  - Legend uses phantom transparent quads (fill_alpha=0, line_alpha=0) as legend renderers;
    depending on Bokeh legend alpha handling this may produce invisible swatches —
    verify or switch to fill_alpha=0.9 on phantom renderers
