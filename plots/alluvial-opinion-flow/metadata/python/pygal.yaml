      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "alluvial-opinion-flow · python · pygal · anyplot.ai" in dark INK (#1A1A17), clearly visible. X-axis wave labels (Q1-Q4 2024) readable. X-axis title "Renewable Energy Policy Survey · 1,000 Respondents Tracked Quarterly" readable. Subtitle annotation "Solid = stable opinion · Faded = changed · Polarization: Neutral 280→150" at y=92 is tight against title baseline but visible. Legend at bottom with 5 categories readable.
      Data: Imprint palette in semantic order — green (#009E73) Strongly Favor, lavender (#C475FD) Favor, blue (#4467A3) Neutral, ochre (#BD8233) Oppose, matte red (#AE3030) Strongly Oppose. Bezier flow bands connect columns. Node bars narrowed to 130px. Pill labels (40, 45, 40, 50) on major cross-category flows. Value labels inside bars.
