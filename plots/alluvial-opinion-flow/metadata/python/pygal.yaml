review:
  strengths:
  - 'Ingenious implementation: StackedBar + SVG post-processing creates genuine alluvial/Sankey
    flows in a library that has no native alluvial chart type.'
  - Full Imprint palette compliance with semantically appropriate color anchoring
    (green=favorable, red=opposed).
  - 'All spec-required features implemented: proportional flows, opacity-encoded stability,
    wave column headers, pill labels on major transitions, subtitle annotation with
    key insight.'
  - Perfect spec compliance (15/15) and code quality (10/10).
  - 'Theme-adaptive chrome is correctly wired: both renders have readable text with
    appropriate INK/INK_MUTED tokens.'
  weaknesses:
  - Subtitle annotation placed at y=92 is too close to the title (title baseline ~y=70-80
    at title_font_size=66) — creates crowding at the top margin. Move annotation to
    ~y=1760 (near bottom of chart, above x-axis title) or increase to y=125 to give
    the title more breathing room.
  - The Neutral category (#4467A3 blue) can blend slightly with the dark background
    on the flow bands — the bar nodes are fine but the flow bands for Neutral category
    at opacity 0.35-0.45 are somewhat hard to follow in the dark render.
