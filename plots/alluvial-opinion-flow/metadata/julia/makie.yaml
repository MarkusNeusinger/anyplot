review:
  strengths:
  - Correct alluvial/Sankey plot type with elegant S-curve bezier flows
  - 'Thoughtful semantic color mapping: green (positive), red (negative), muted grey
    (neutral) creates intuitive viewer reading'
  - All Imprint palette colors used correctly with valid semantic exception for opinion
    polarity
  - Full theme-adaptive chrome in both light and dark renders — no dark-on-dark failures
  - Node count labels with white text inside colored rectangles clearly show respondent
    totals
  - All spines, ticks, and grid removed — appropriate minimal chrome for this diagram
    type
  - Semi-transparent flows (alpha=0.32) prevent overlap confusion in dense areas
  - Custom bezier_strip function is idiomatic Makie low-level drawing — correctly
    uses poly! for flow polygons and nodes
  - Realistic public health policy survey data with plausible transition matrices
    showing diagonal dominance
  weaknesses:
  - 'MISSING spec differentiator: spec explicitly states the variant must visually
    distinguish stable respondents (same category across waves) from changers using
    opacity or color intensity — all flows currently use uniform alpha=0.32 regardless
    of whether src==dst. Diagonal (stable) flows should use higher opacity (~0.65)
    while off-diagonal (changer) flows keep 0.25-0.30.'
  - 'MISSING net flow highlight: spec requires highlighting net flows between categories
    to reveal polarization trends — a simple approach is to compute net(A→B) = f_AB
    - f_BA and draw an extra semi-transparent colored band on top of the dominant
    direction, or annotate with net delta arrows between nodes.'
  - 'DE-03 limited by missing storytelling: the plot displays data correctly but does
    not guide the viewer to the insight (e.g., which categories are growing or shrinking).
    Adding subtle text annotations at the right margin noting net change (+/- respondents)
    per category between Wave 1 and Wave 3 would substantially raise DE-03.'
  - 'VQ-01 minor: node count labels use fontsize=12 at px_per_unit=2, which renders
    to effective 24px labels. For the smaller nodes (e.g., Strongly Oppose: 105, 102,
    96) the node height is ~105 units while label height is ~12 units, making labels
    tight. Consider fontsize=10 for improved breathing room or auto-sizing to node
    height.'
  - 'VQ-05 minor: legend is positioned at legend_x = WAVE_XS[end] + 0.55 = 6.55 with
    xlims=(0.3, 7.7). The longest label text (Strongly Oppose) at fontsize=12 extends
    to approximately x≈7.5 — functionally OK but tight against the right xlim. Add
    0.2-0.3 to xlims upper bound for better breathing room.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot surface color, not pure white.
      Chrome: Title "alluvial-opinion-flow · julia · makie · anyplot.ai" rendered in dark ink (#1A1A17), legible at top. Wave headers "Wave 1 (January)", "Wave 2 (April)", "Wave 3 (July)" in bold dark ink above each column. No axis labels or tick labels (appropriate for flow diagram). Legend on the right with color swatches and labels in INK_SOFT (#4A4A44).
      Data: Five stacked nodes per wave rendered as solid colored rectangles — brand green (#009E73) for Strongly Support, cyan (#2ABCCD) for Support, grey-muted (#6B6A63) for Neutral, ochre (#BD8233) for Oppose, matte red (#AE3030) for Strongly Oppose. S-curve bezier flow bands connect corresponding nodes across waves with alpha=0.32. White/cream respondent counts inside each node.
      Legibility verdict: PASS — all text clearly readable. Node count labels (e.g. 200, 305) visible inside colored nodes. Legend labels distinct and sized appropriately.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title text flips to near-white (#F0EFE8), clearly visible against dark background. Wave headers rendered in INK token (light cream on dark). Legend labels in INK_SOFT (#B8B7B0 on dark). No dark-on-dark failures detected.
      Data: Data colors (green, cyan, ochre, matte red) are identical to light render — palette positions unchanged as required. Neutral category nodes appear lighter grey (#A8A79F) vs darker grey in light mode — this is by design as INK_MUTED is a theme-adaptive semantic anchor. White/cream (#FFFDF6) node count labels remain readable on all colored node backgrounds in both themes.
      Legibility verdict: PASS — all chrome text is light-colored on dark background. No elements appear dark-on-dark. Brand green #009E73 is clearly visible on the dark surface.
