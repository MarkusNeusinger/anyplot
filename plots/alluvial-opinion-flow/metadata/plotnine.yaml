review:
  strengths:
  - Excellent spec compliance — all required features implemented including stable/changer
    distinction, proportional flows, respondent counts, and net flow highlighting
  - Strong data storytelling through subtitle framing, net change annotations, and
    alpha-based visual hierarchy
  - Clean, professional visual design with meaningful diverging color palette and
    polished typography
  - Fully deterministic, well-organized code with no unnecessary abstractions
  - 'Consistent data: 1000 respondents perfectly maintained across all 4 waves with
    realistic transition matrices'
  weaknesses:
  - 'Minor text sizing: node counts (12pt) and category labels (13pt) slightly below
    optimal thresholds for 4800x2700 output'
  - Disagree (#D4883A) and Strongly Disagree (#C0392B) could have wider hue separation
    for accessibility
  - Some minor changer flows at 0.23 alpha are very faint and hard to trace visually
  - Library mastery limited by plotnine lacking a native alluvial/sankey geom
  image_description: 'The plot displays an alluvial/Sankey-style opinion flow diagram
    with the bold centered title "alluvial-opinion-flow · plotnine · pyplots.ai" and
    a gray subtitle "Tracking 1,000 respondents across 4 waves — Neutral erodes as
    opinions polarize toward extremes." Four wave columns (Wave 1–4) are arranged
    left to right with bold black headers. Five opinion categories are stacked vertically
    at each wave: Strongly Agree (dark steel blue #306998), Agree (light sky blue
    #6BAED6), Neutral (medium gray #969696), Disagree (warm orange-brown #D4883A),
    and Strongly Disagree (dark red #C0392B). Solid-color rectangular nodes at each
    wave display white bold respondent counts (e.g., Wave 1: 180, 250, 190, 200, 180
    totaling 1000). White borders separate adjacent nodes cleanly. Curved flow ribbons
    connect categories across waves — stable flows (same category) render at ~0.55
    opacity while changer flows use lower opacity (~0.23–0.35), with dominant net-flow
    directions receiving slightly higher alpha. Net change annotations (+16, -26,
    -35, -16, -42, +31, +55) appear in small white-background label boxes between
    waves for categories with ≥15 respondent change. Category labels appear in bold
    on the left of Wave 1 and right of Wave 4. A legend titled "Opinion" on the right
    shows all five categories with full opacity swatches. The background is clean
    white with no grid, axes, or spines.'
