  image_description: 'The plot displays an alluvial/Sankey-style opinion flow diagram
    with the title "alluvial-opinion-flow · plotnine · pyplots.ai" in bold at top,
    and a subtitle reading "Tracking 1,000 respondents across 4 waves — Neutral erodes
    as opinions polarize toward extremes." Four wave columns (Wave 1–4) are arranged
    left to right with bold column headers. Five opinion categories are stacked vertically
    at each wave: Strongly Agree (dark blue #306998), Agree (light blue #6BAED6),
    Neutral (gray #969696), Disagree (orange #E8915A), and Strongly Disagree (red
    #C0392B). Colored rectangular nodes at each wave display white respondent counts
    (e.g., Wave 1: 180, 250, 190, 200, 180). Curved flow bands connect categories
    across waves with alpha differentiation — stable flows at 0.55 opacity, dominant
    changers at 0.35, minor changers at 0.23. Net change annotations (+16, -26, -35,
    -16, -42, +31, +55) appear between waves for categories with >=15 respondent change.
    Category labels appear on both left (Wave 1) and right (Wave 4) sides. A legend
    titled "Opinion" on the right shows all five categories. The overall layout is
    clean with no axes, grid, or spines — just the alluvial structure on a white background.'
