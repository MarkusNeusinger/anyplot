review:
  strengths:
  - Correct alluvial/Sankey diagram built entirely from ggplot2 primitives (geom_polygon,
    geom_rect, geom_text) without any external alluvial package
  - Custom bezier ribbon computation produces smooth S-curve flows between waves
  - 'Semantic Imprint palette mapping is well-justified: green=strongly agree (positive),
    red=strongly disagree (negative)'
  - 'Theme-adaptive chrome correctly flips between light and dark renders — data colors
    identical, backgrounds correct (#FAF8F1 / #1A1A17)'
  - Category labels colored to match data series provide redundant encoding without
    a legend
  - coord_cartesian(clip = off) correctly allows left/right labels to extend outside
    plot area
  - theme_void() is the right minimal-chrome choice for an alluvial diagram
  weaknesses:
  - dplyr is imported (library(dplyr)) but no dplyr verbs are used anywhere in the
    code — remove the import
  - 'Spec requires visually distinguishing stable respondents (same category across
    waves) from changers using opacity or color intensity: all ribbons use uniform
    alpha=0.30 — diagonal (stable) ribbons should use higher alpha or a distinct tint
    vs. cross-category flows'
  - Spec requires highlighting net flows to reveal polarization trends (Neutral declining,
    Strongly Disagree growing) — no annotation, color gradient, or emphasis applied
    to show this storyline
  - Category label text size=2.6 mm (~7pt) and Wave 2 count size=2.4 mm (~6pt) are
    on the small end at 3200px canvas — increase to 3.0 and 2.8 respectively for better
    mobile readability
  - Ribbons at alpha=0.30 become visually muddy when multiple overlapping flows cross
    — consider distinguishing major flows (high count) from minor with a slightly
    higher alpha on large-count ribbons
