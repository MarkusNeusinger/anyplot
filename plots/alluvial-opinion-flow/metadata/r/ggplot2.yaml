      Data: 5 categories stacked bottom-to-top: Strongly Agree (#009E73 green, bottom), Agree (#4467A3 blue), Neutral (#BD8233 ochre), Disagree (#C475FD lavender), Strongly Disagree (#AE3030 red). Bezier ribbon flows connect all three wave columns with alpha=0.30 transparency. Node rectangles are fully saturated at each wave. Flow widths reflect count proportions. The polarization trend (Neutral shrinking, Strongly Disagree growing from 40→65) is visible in the node sizes.
