  image_description: 'The plot shows an alluvial/Sankey-style diagram titled "alluvial-opinion-flow
    · bokeh · pyplots.ai" with subtitle "Remote Work Policy Survey — 1,000 Employees
    Across 4 Quarters". Four columns (Q1 2024 through Q4 2024) are arranged left to
    right, each containing 5 stacked rectangular nodes for opinion categories: Strongly
    Agree (dark blue #306998), Agree (light blue #6BAED6), Neutral (gray #A0A0A0),
    Disagree (orange #E8915A), and Strongly Disagree (dark magenta #8B2252). Smooth
    bezier-curve flow ribbons connect nodes between consecutive waves. Stable flows
    (same-category) have higher opacity (0.6), changed flows are faded (0.2), and
    the largest net shifts appear at medium opacity (0.45) with thicker borders (2px).
    Left-side labels show "Category (count)" (e.g., "Strongly Agree (120)"), right-side
    labels show final counts (e.g., "Strongly Agree (183)"), and middle columns show
    just numeric counts (e.g., "130", "215"). Wave headers appear below in bold 24pt.
    A color-matched legend sits in the top-right corner with white background and
    border. A bottom note reads "Solid flows = stable opinion · Faded flows = opinion
    changed · Bold flows = largest net shifts". The data clearly shows a polarization
    trend: extreme opinions grow while Neutral shrinks over time.'
