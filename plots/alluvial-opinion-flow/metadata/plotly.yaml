review:
  strengths:
  - Thoughtful diverging color palette (blue-gray-orange) semantically maps to agreement
    spectrum
  - Data tells a clear polarization story with Neutral shrinking and extremes growing
    over 4 waves
  - Excellent use of Plotly native go.Sankey with custom hovertemplate, snap arrangement,
    and HTML export
  - Node labels display both category names and respondent counts as specified
  - Deterministic well-structured data with realistic neutral survey context (public
    transit)
  - 'Perfect code quality: clean KISS structure, no unnecessary imports, current API'
  weaknesses:
  - Q4 2025 column is compressed against the right edge, making node labels cramped
    and partially truncated
  - Change flows at 0.18 opacity are too faint to trace where respondents shifted
  - Wave column headers overlap slightly with the tops of Strongly Agree nodes
  - No explicit net flow highlighting between categories (spec requirement)
  image_description: 'The plot shows a Sankey/alluvial diagram with 4 columns representing
    quarterly survey waves (Q1 2025 through Q4 2025). Each column contains 5 vertically
    stacked nodes for opinion categories: "Strongly Agree" (dark blue, #306998), "Agree"
    (light blue, #72B7D4), "Neutral" (gray, #888888), "Disagree" (orange, #E8853D),
    and "Strongly Disagree" (red, #C44E52). Each node displays the category name and
    respondent count (e.g., "Neutral 300" at Q1). Flows between consecutive waves
    connect categories, with stable flows (same category) rendered at higher opacity
    (~0.55) and change flows at very low opacity (~0.18). The title reads "Opinion
    Polarization on Public Transit · alluvial-opinion-flow · plotly · pyplots.ai"
    centered at the top. Wave column headers in bold appear above each column. A horizontal
    legend at the bottom shows all 5 categories with colored squares. The data shows
    gradual polarization: Neutral shrinks from 300 to 195, Strongly Disagree grows
    from 100 to 210, while Strongly Agree grows from 150 to 185. The Q4 2025 column
    is compressed against the right edge with cramped node labels. Change flows are
    very faint and hard to trace.'
