review:
  strengths:
  - Excellent diverging blue-gray-red color palette that semantically maps to the
    opinion spectrum
  - Clear visual distinction between stable flows (higher opacity) and changing flows
    (lower opacity)
  - Well-structured data showing a compelling polarization narrative across 4 waves
  - Interactive tooltips and HTML export leverage Altair interactive capabilities
  - Clean typography hierarchy with explicitly set font sizes
  weaknesses:
  - Changing flows at 0.22 opacity are too faint - minor transitions are nearly invisible
  - Side labels (15pt) and count labels (13pt) are below recommended size thresholds
  - No formal color legend - middle waves lack direct category identification
  - Political opinion survey framing should use a neutral topic like brand perception
    or employee satisfaction
  - Net flow highlighting between categories (spec requirement) is missing
  - Wave headers appear below the diagram rather than directly above their columns
  image_description: 'The plot displays a 4-column alluvial/Sankey diagram tracking
    opinion flow across Wave 1 through Wave 4. Five opinion categories are stacked
    vertically at each wave: Strongly Disagree (dark red, top), Disagree (orange),
    Neutral (gray), Agree (light blue), and Strongly Agree (dark teal, bottom). Colored
    rectangular nodes at each wave show respondent counts in bold white text (e.g.,
    180, 250, 200, 220, 150 at Wave 1). Curved flows connect categories between waves
    — stable flows (same category) appear at higher opacity (~0.55) while changing
    flows are more transparent (~0.22), all colored by source category. Side labels
    on the left and right edges show category names with totals (e.g., "Strongly Agree
    (180)" on the left, "Strongly Agree (165)" on the right). Wave column headers
    appear below the chart. The title "alluvial-opinion-flow · altair · pyplots.ai"
    is centered at the top. A clear polarization trend is visible: Strongly Disagree
    grows from 150 to 273 while Agree and Neutral shrink, and the extreme categories
    accumulate respondents over time.'
