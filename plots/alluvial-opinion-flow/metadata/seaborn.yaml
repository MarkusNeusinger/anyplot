review:
  strengths:
  - Excellent data storytelling with a clear polarization narrative supported by the
    net-change sidebar
  - Custom seaborn diverging palette (blue to gray to brown) is colorblind-safe and
    semantically meaningful
  - Well-executed bezier curve flows with opacity distinction between stable and changing
    respondents
  - Clean, fully deterministic code with smart draw-order sorting for visual layering
  - Complete spec compliance with all 7 required features implemented
  weaknesses:
  - Some annotation text sizes (12-13pt) are slightly small for optimal legibility
    at full resolution
  - Changing flows at alpha=0.28 are quite subtle — some thinner cross-category transitions
    are hard to follow
  - Limited seaborn library usage for core visualization (constrained by lack of native
    alluvial support)
  image_description: 'The plot displays an alluvial/Sankey-style diagram tracking
    opinion shifts on a "Renewable Energy Survey" across 4 quarterly waves (Q1-Q4
    2025) with 1,000 respondents. Five opinion categories are stacked vertically:
    Strongly Disagree (dark rust/brown, top), Disagree (medium brown), Neutral (light
    beige/gray), Agree (light steel blue), and Strongly Agree (dark teal, bottom).
    Curved bezier flow bands connect categories between consecutive waves — stable
    flows (same category) are rendered at higher opacity (~0.60) while changing flows
    use lower opacity (~0.28). Node rectangles have white edge separators. Category
    labels with respondent counts appear on the left for Q1 and on the right for Q4,
    with counts inside middle wave bars. A supplementary sidebar on the right shows
    "Net Shift Q1→Q4" as horizontal bars colored by category: +90 (Strongly Agree),
    -50 (Agree), -140 (Neutral), +20 (Disagree), +80 (Strongly Disagree). Title reads
    "alluvial-opinion-flow · seaborn · pyplots.ai". An italic subtitle at bottom provides
    context. Background is white throughout.'
