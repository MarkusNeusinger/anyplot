  weaknesses:
  - No explicit department boundary separators or group-label annotations to make
    block structure more prominent — a thin white/ink rule at department boundaries
    would greatly strengthen the storytelling
  - gridLineColor not explicitly set in xAxis/yAxis — relies on Highcharts default,
    misses opportunity to style grid subtly
  - Uses raw JSON dict + inline HTML instead of highcharts_core Python SDK (Chart/HighchartsOptions
    pattern) as recommended in the library guide
  - fetch_js helper function violates KISS flat-script structure; CDN fallback logic
    adds complexity
