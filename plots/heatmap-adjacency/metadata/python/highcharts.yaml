    ordering all present'
  - Realistic scientific collaboration network with plausible within-department vs
    cross-department weight distributions
  - Correct viridis color stops for continuous heatmap data; distinct empty-cell color
    that flips with theme
  - Complete theme adaptation — INK/INK_SOFT/ELEVATED_BG tokens applied to every chrome
    element in both renders
