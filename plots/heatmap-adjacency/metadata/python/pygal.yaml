  weaknesses:
  - 'Zero pygal API usage: the implementation does not import pygal at all — it manually
    constructs SVG and calls cairosvg.svg2png() directly. While pygal lacks a built-in
    heatmap type, the code should at minimum use pygal''s SVG rendering infrastructure
    or Style object rather than bypassing the library entirely.'
  - The sys.path manipulation and importlib dance in _get_viridis() is a necessary
    but complex workaround; a cleaner approach would be a standalone helper module
    or using the matplotlib import after adjusting path only when needed.
  - Column labels (rotated 90°) are slightly harder to read than the row labels due
    to rotation; a small increase in font-size or a different rotation approach would
    improve legibility.
