review:
  strengths:
  - 'Excellent visual quality: viridis colormap correctly applied for continuous edge-weight
    data, both renders are clear and readable'
  - 'Perfect spec compliance: 24-node symmetric adjacency matrix with block-diagonal
    community structure, colorbar with tick marks, absent-edge distinction, department
    boundary lines'
  - 'Strong data storytelling: three research communities are visually obvious in
    the block-diagonal structure, cross-department sparse connections stand out clearly'
  - 'Theme-adaptive chrome throughout: backgrounds, text, absent-cell colors all switch
    correctly between light (#FAF8F1) and dark (#1A1A17) themes'
  - Square canvas (3600x3600) is an ideal choice for a symmetric matrix, generous
    margins throughout
  weaknesses:
  - Implementation does not use the pygal library at all — no `import pygal`, no pygal
    chart objects, no pygal Style. It constructs raw SVG strings and renders via cairosvg
    directly. While pygal lacks native heatmap support, the approach completely bypasses
    the library's API, severely hurting Library Mastery scores.
  - 'Absent cells in the dark render (#2E2E2A on #1A1A17 background) are only subtly
    distinguishable from the background — the spec requires a ''distinct background''
    for absent edges; the contrast could be stronger in dark mode.'
  - Helper functions _get_viridis() and to_hex() violate KISS (no functions/classes
    preference), though _get_viridis() is a necessary workaround for import shadowing
    with the sibling matplotlib.py file.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — correct for light theme.
      Chrome: Title "heatmap-adjacency · pygal · anyplot.ai" in bold dark ink, clearly readable. Subtitle "Research Collaboration Network · 24 Researchers · 3 Departments" in muted ink, readable. Row labels (A1–A8, B1–B8, C1–C8) in monospace on the left, column labels rotated 90° at the bottom — all clearly visible. Colorbar on the right with "Strength" label and tick marks at 0.00, 0.25, 0.50, 0.75, 1.00 — all readable.
      Data: Viridis colormap applied correctly — yellow-green for high-weight edges (~1.0), teal/cyan for mid-range (~0.5–0.7), dark purple/navy for low-weight cross-department edges (~0.1–0.4). Absent edges shown as #DEDBD4 light gray, clearly distinct from colored cells. Three 8×8 block-diagonal clusters (departments A, B, C) are visually obvious. Department boundary lines at opacity 0.5 cleanly delineate clusters.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — correct for dark theme.
      Chrome: Title and subtitle in light ink, clearly readable against the dark background. Row and column labels in lighter tone, visible. Colorbar "Strength" label and tick labels in muted light ink — readable. No dark-on-dark failures.
      Data: Viridis data colors are identical to the light render — same yellow-green for high weights, teal for mid-range, dark purple/navy for low weights. Absent edges shown as #2E2E2A — slightly darker than background, distinguishable but with notably lower contrast than the light render (subtle difference between #2E2E2A and #1A1A17). Department boundary lines remain visible.
      Legibility verdict: PASS — text is readable throughout. Minor note: absent-cell contrast in dark mode is subtler than light mode; the spec calls for "distinct background" for absent edges, which is marginally met.
