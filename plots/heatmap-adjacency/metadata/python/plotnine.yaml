  - Viridis colormap is correctly chosen for continuous weight data, providing perceptual
    uniformity and CVD safety
  - 'Custom per-theme absent-cell background colors (#E0DED7 light / #2A2A25 dark)
    cleanly distinguish empty cells without using pure white or black'
  - Dashed community separators (geom_vline/geom_hline) effectively highlight block-diagonal
    cluster structure
  - 'All theme tokens correctly wired: plot_background, panel_background, axis_title,
    axis_text, legend_background all adapt between light/dark'
  - 'Perfect spec compliance: undirected graph fills both triangles, node ordering
    exposes community blocks, colorbar legend included'
  - Flat, reproducible script with seed(42) and clean imports — idiomatic plotnine
    grammar throughout
  weaknesses:
  - X-axis tick labels with 30 node names are tight even at 45-degree rotation — consider
    reducing font size slightly or using abbreviated labels for large matrices
  - 'DE-01 moderate: design is clean and functional but the default panel aspect-ratio
    and uniform tile sizing leave room for a stronger focal-point emphasis on the
    densest clusters'
  - axis_line not explicitly set in theme(), relies on plotnine defaults — for strict
    dark-theme compliance the axis line color should be set to INK_SOFT
