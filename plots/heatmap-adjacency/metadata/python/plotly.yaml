  - Absent edges render as viridis dark purple rather than the spec-preferred white/near-white
    background; consider a colorscale with white at 0 or a sequential single-hue scale
    starting from near-white
  - 'Design excellence could be elevated: domain group labels as annotations along
    axes would improve storytelling'
