review:
  strengths:
  - Linear gradient fill (green→blue) on arcs elevates the aesthetic and visually
    encodes directionality
  - Port marker radii scale with total flow volume — hubs are visually prominent
  - growTowards + markerEnd arrows clearly communicate flow direction alongside arc
    widths
  - 'Perfect spec compliance: curved arcs, proportional widths, transparency, basemap,
    tooltips, directional arrows all present'
  - Both themes correctly implemented with theme-adaptive chrome; no dark-on-dark
    or light-on-light issues
  weaknesses:
  - 'East Asia label cluster (Busan/Shanghai/Hong Kong) is congested — increase label_offsets
    for Hong Kong (y: +25) and Busan (y: -45), or reduce dataLabels fontSize to 36px
    for dense clusters'
  - Legend floats in upper-right with notable empty whitespace between it and the
    map body — pull closer with x offset or reduce right spacing from 60 to 40
  - Lower-volume routes (120–160 units, e.g., Sydney→Singapore) render as thin lines
    that may be hard to trace at reduced display sizes — bump minWidth from 2 to 3
