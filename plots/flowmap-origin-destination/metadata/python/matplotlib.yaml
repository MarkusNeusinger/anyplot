  strengths:
  - Custom geographic basemap with theme-adaptive ocean and land colors (OCEAN_COLOR/LAND_COLOR
    tokens flip correctly between light and dark)
  - Triple-encoding of flow magnitude (arc width + color intensity + opacity) makes
    volume differences immediately legible
  - Custom legend using mlines.Line2D handles accurately mirrors the arc visual encoding
    rather than using placeholder symbols
  - Quadratic Bezier curves implemented cleanly with perpendicular control-point offset,
    producing natural-looking arc curvature
  - Label offset dictionary prevents the most severe overlap, and explicit per-port
    offsets show careful geographic awareness
  - 'Perfect spec compliance: 15 realistic trade flows, all required features (arcs,
    basemap, width-encoding, transparency, labels), correct title format'
  - 'Perfect data quality: real-world port names, geographically accurate coordinates,
    realistic TEU volumes (1.9–8.5 M TEUs)'
  - Clean, idiomatic matplotlib code with no functions/classes — straight top-level
    flow
  weaknesses:
  - 'Font sizes are below style-guide recommendations: title fontsize=8 (guide: 12pt),
    axis labels fontsize=8 (guide: 10pt), tick labels fontsize=6 (guide: 8pt) — increase
    all to recommended sizes for better mobile readability'
  - 'Port markers use #0072B2 (Okabe-Ito position 3) instead of the required first-position
    brand green #009E73; for a single-category location series the brand color rule
    applies'
  - Label crowding in the Hamburg/Rotterdam cluster and the Busan/Shanghai/Hong Kong
    right-side cluster — consider larger offset magnitudes or a different offset strategy
    to give labels more breathing room
  - 'DE-01 aesthetic sophistication is limited: all arcs share the same Blues colormap
    direction and the basemap continents are rough polygons; adding directional arrowheads
    or a more polished land fill would elevate the design'
  - 'DE-02 visual refinement: the legend in the bottom-left overlaps slightly with
