    inside a less prominent area or using a colorbar-style size legend'
  - 'DE-03 data storytelling: the dominant Shanghai→Los Angeles corridor is visually
    prominent but no annotation or emphasis calls it out explicitly; a subtle annotation
    for the top-2 flows would add narrative clarity'
