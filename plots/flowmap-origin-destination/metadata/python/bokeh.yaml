      Background: Warm off-white (#FAF8F1) with CartoDB light_all basemap showing country borders and coastlines
      Chrome: Title "flowmap-origin-destination · python · bokeh · anyplot.ai" in dark ink (#1A1A17) — readable. Axis labels "Longitude"/"Latitude" at 42pt in dark ink — readable. Tick labels (coordinate values) in INK_SOFT (#4A4A44) — readable. Colorbar labels in INK_SOFT — readable. Legend "Ports" box on elevated warm-white fill — readable.
      Data: 18 curved Bezier arcs colored Viridis256 (dark blue-purple for low TEU ~260, yellow-green for high TEU ~850) with line widths 3–17px proportional to flow. Port markers in #009E73 (Okabe-Ito position 1). All arcs clearly visible with transparency 0.65.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) with CartoDB dark_all basemap tiles
      Chrome: Title, axis labels, tick labels, legend text, and colorbar labels all rendered in light cream/gray (#F0EFE8/#B8B7B0) — all clearly readable against the near-black background. No dark-on-dark text failures detected.
      Data: Viridis arc colors are identical to the light render — only chrome flips. Port markers remain #009E73. Data colors unchanged between themes as required.
      Legibility verdict: PASS
