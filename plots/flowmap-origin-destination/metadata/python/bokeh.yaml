review:
  strengths:
  - 'Dual encoding: both line width AND viridis color map to flow magnitude, creating
    clear visual hierarchy where the thickest/brightest arcs (Shanghai → LA, Shanghai
    → Rotterdam) dominate visually'
  - Theme-adaptive CartoDB basemaps (light_all vs dark_all) are a polished detail
    that makes both renders feel native to their respective surfaces
  - All style-guide text sizing explicitly applied (50pt/42pt/34pt) and both themes
    are fully readable with no dark-on-dark failures
  - Multi-renderer HoverTool setup (separate tooltips for arcs vs. port markers) is
    idiomatic Bokeh and delivers good interactivity
  - Real-world maritime trade data with accurate port coordinates and geographically
    plausible volume relationships
  weaknesses:
  - Missing ColorBar / LinearColorMapper for the viridis arc encoding — viewers can
    see relative differences but cannot quantify what dark blue vs. yellow arcs mean
    in TEU without hovering each one individually
  - 'DE-03 limited by absent colorbar: the dual visual hierarchy is present but interpretation
    is incomplete without a scale legend; the story (Shanghai is the dominant hub)
    is implied but not fully communicated'
  - Small canvas space issue at bottom of the map (southern hemisphere is mostly ocean
    for these northern-hemisphere ports) — minor VQ-05 deduction
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 on the border/chrome area; CartoDB Light basemap tiles inside the plot area
      Chrome: Title "flowmap-origin-destination · python · bokeh · anyplot.ai" in dark ink — clearly readable; "Latitude" y-axis label and "Longitude" x-axis label visible at 42pt; tick labels at 34pt readable; small "Ports" legend in top-left of map area
      Data: 18 Bezier-curved flow arcs in Viridis colormap (dark blue/teal for low-volume ~260 TEU through bright yellow for high-volume ~850 TEU); arc widths 3–17 px proportional to flow; port markers in brand green #009E73 at size=20
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 on the border/chrome area; CartoDB Dark basemap tiles inside the plot area
      Chrome: Title in light near-white (#F0EFE8) — clearly readable against dark background; axis labels and tick labels in #B8B7B0 (INK_SOFT for dark theme) — readable; no dark-on-dark failures; all chrome correctly uses theme-adaptive INK/INK_SOFT tokens
      Data: Viridis arc colors visually identical to light render (dark blue/teal through yellow) — data colors unchanged as expected; port markers remain #009E73
      Legibility verdict: PASS — all text readable against dark background; theme inversion correctly implemented
