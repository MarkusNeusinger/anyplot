review:
  strengths:
  - Theme-adaptive basemap with CartoDB light/dark tiles is a professional and Bokeh-distinctive
    design choice
  - Dual HoverTool instances (arcs + port markers) with meaningful tooltip content
  - Full chrome theming with all 12 color tokens correctly applied across both themes
  - Proportional arc widths + Viridis gradient create layered, readable information
    encoding
  - Flat code structure with all Bezier and Mercator math inlined per style guide
  weaknesses:
  - Arc directionality not indicated — all arcs bow upward; adding arrowheads or small
    triangular markers at destinations would improve clarity
  - East Asian port cluster creates a dense bundle of overlapping arcs near the origin
    region; varying control point offset per route would help
  - Grid lines over the basemap add noise (basemap already provides structural reference);
    remove xgrid/ygrid lines for cleaner geo presentation
  - Port marker size=20 is on the small side for sparse geographic markers at 3200px;
    increase to 24-28 for better mobile readability
  image_description: |-
