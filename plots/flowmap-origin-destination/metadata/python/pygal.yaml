review:
  strengths:
  - Semantically separates non-data coastlines (INK_SOFT) from data series (Okabe-Ito)
    — shows design intent
  - Creative CSS injection workaround for pygal missing opacity API — idiomatic problem-solving
  - 3-tier magnitude classification creates clear visual hierarchy without continuous
    scale complexity
  - Both light and dark themes fully functional with correct background and text tokens
  - 'Complete spec compliance: bezier curves, width encoding, transparency, geographic
    context, interactive HTML'
  weaknesses:
  - Helper function make_bezier_curves breaks KISS structure; could be inlined with
    a loop to stay flat
  - Arc width differentiation (6/14/28 px) is slightly subtle at mid-range; widening
    the gap (e.g., 4/16/36) would make magnitude hierarchy more immediately apparent
  - Box frame (all 4 spines) persists as default pygal XY chrome; for a map-like visualization,
    removing or suppressing top/right frame would improve refinement
