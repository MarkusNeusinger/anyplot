    imports used
  - Realistic European migration context with accurate real-world city coordinates
    and plausible flow volumes
  weaknesses:
  - 'City label overlap in the dense EU cluster: London, Amsterdam, Brussels, and
    Paris dots are packed within ~2-3 degrees of each other, and the uniform dy=-14
    offset causes label collisions — add per-city dx offsets (e.g. London dx=-10,
    Amsterdam dx=10, Brussels dx=12, Paris dx=-8) to spread labels apart'
  - 'VQ-02 hit: label crowding in the core cluster is the primary scoring deduction;
    fixing per-city offsets is the highest-priority repair'
  - Outer canvas has notable empty space (Scandinavia above, North Africa below, Eastern
    Europe/Russia to the right) — consider tightening the projection clipExtent or
    increasing the map scale slightly to bring the flow network closer to filling
    the canvas, improving VQ-05
  - 'DE-01 moderate: design is above defaults but not yet publication-ready — small
    refinements like a slightly more opaque arc overlay, or explicitly styling the
    colorbar gradient to align with brand colors, would elevate polish'
