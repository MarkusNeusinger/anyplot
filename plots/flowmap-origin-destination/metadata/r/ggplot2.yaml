review:
  strengths:
  - 'Correct Okabe-Ito palette applied with Americas (green #009E73) as first series,
    Europe as #D55E00, Middle East as #0072B2, and Asia Pacific as #CC79A7 — all in
    canonical order'
  - 'Fully theme-adaptive chrome: INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens applied
    to title, axis labels, tick labels, legend, and grid throughout — dark render
    passes all legibility checks'
  - Thoughtful manual nudge offsets (nudge_x/nudge_y per airport) to spread the dense
    European cluster of LHR, AMS, CDG, FRA labels
  - Flow direction encoded with arrowheads and magnitude encoded with scale_linewidth_continuous
    — both spec-required encodings present
  - 'Realistic, neutral data: real IATA codes, plausible intercontinental routes,
    flow values in the correct ballpark for major hub-to-hub routes (e.g. LHR-DXB
    at 6.5M pax/yr)'
  weaknesses:
  - 'Missing basemap (country borders/coastlines): the spec explicitly requires geographic
    context beyond raw lat/lon axes; add borders_world() or geom_sf() with rnaturalearth
    data, or at minimum draw a simple world outline so flows are grounded in a recognizable
    map'
  - European airport cluster (LHR, AMS, CDG, FRA) remains visually crowded even with
    nudging — LHR/AMS labels are still very close and arcs overlap heavily; widen
    spacing or reduce label size for that cluster
  - Title font size is 9pt vs. the style-guide recommended 12pt — at 400 dpi this
    yields ~50 source-px which is readable but visually smaller than expected; increase
    to 12pt
  - 'library(scales) is imported but no scales:: functions are explicitly called —
    remove the unused import'
  - 'DE-01/DE-03 need uplift: no geographic basemap and no storytelling emphasis (e.g.
    highlighting the busiest corridor, adding a subtitle noting the dominant route)
    — adds context and visual hierarchy'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — PASS
      Chrome: Title "Global Air Passenger Flows · flowmap-origin-destination · r · ggplot2 · anyplot.ai" in dark bold text, clearly readable. Axis labels "Longitude" and "Latitude" in dark secondary text, readable. Tick labels small but visible. Legend box has a light elevated background with subtle border.
      Data: Four origin-region colors — Americas arcs in #009E73 (green), Europe arcs in #D55E00 (orange-brown), Middle East arcs in #0072B2 (blue), Asia Pacific arcs in #CC79A7 (pink-purple). Arc widths vary proportionally with flow (thin for ~2.3M, thick for ~6.5M). Arrow heads indicate flow direction. Airport dots use the same region fill with a PAGE_BG outline stroke. IATA labels (NYC, LHR, AMS, CDG, FRA, DXB, TYO, HKG, SIN, SYD) in dark bold text. European cluster is crowded but generally legible. No basemap — flows plotted directly on lon/lat coordinates against the off-white background.
      Legibility verdict: PASS — all text elements are readable against the light background. No white-on-white issues.

    Dark render (plot-dark.png):
      Background: Near-black consistent with #1A1A17 — PASS
      Chrome: Title in near-white text (#F0EFE8), clearly readable. Axis labels and tick labels in light secondary text (#B8B7B0), readable. Legend box uses elevated dark background (#242420) with a subtle border; legend text is light and readable. The Flow (M pax/yr) legend line samples are grey-ish but distinguishable against the dark elevated background.
      Data: Arc colors are identical to light render — same #009E73 green, #D55E00 orange-brown, #0072B2 blue, #CC79A7 pink-purple. IATA code labels are white/near-white bold text, clearly visible against the dark background. Airport dots retain the same region colors with a dark PAGE_BG outline stroke that is less visible on dark (expected behavior).
      Legibility verdict: PASS — no dark-on-dark failures. All text elements flip correctly to light colors in dark mode. Data colors are identical to the light render.
