review:
  strengths:
  - Correct Arrhenius linearisation using 1000/T convention with accurate Ea extraction
    and R2 reporting
  - 'Full theme-adaptive chrome: all text, grid, spines, legend, and background tokens
    correctly flip between light and dark'
  - 'Clean code: linear structure, proper seed, all imports used, correct output API'
  - Scientific annotation box (Ea, -Ea/R, R2) adds real interpretive value beyond
    raw data display
  - White stroke on scatter markers provides clean definition against both backgrounds
  weaknesses:
  - 'Layout asymmetry: axis area is pushed ~30% from the left canvas edge, leaving
    a large empty left margin while the right margin is only ~5%. Fix: add resize_to_layout!(fig)
    before saving, or adjust Makie Figure/Axis padding explicitly.'
  - 'X-axis tick labels appear crowded / touching at the current axis width. Fix:
    reduce tick density (e.g., 4 ticks instead of 6) or set explicit tick positions.'
  - 'Temperature reference labels are floating text annotations inside the axis headroom
    rather than a true secondary x-axis as specified. Fix: add a second overlapping
    Axis with topspinevisible=true and custom xticks mapping 1000/T positions to temperature
    strings.'
  - 'Design lacks a clear visual focal point. Fix: add a shaded confidence band using
    band! around the regression line to highlight the fit quality.'
  - 'LM-02 is minimal - no Makie-distinctive features used. Fix: leverage band! for
    confidence interval or Colorbar to showcase Makie capabilities.'
