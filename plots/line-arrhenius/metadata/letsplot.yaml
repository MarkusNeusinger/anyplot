    through the points. The x-axis is labeled "1/T (K⁻¹)" with scientific notation
    tick labels, and the y-axis is labeled "ln(k)" ranging from about -4 to 16. A
    secondary temperature axis at the top shows "Temperature (K)" in italic with tick
    marks at 600K, 500K, 450K, 400K, 350K, 300K. An annotation in the lower-right
    area displays "Slope = −Ea/R = -8983 K", "Ea = 74.7 kJ/mol", and "R² = 0.9995".
