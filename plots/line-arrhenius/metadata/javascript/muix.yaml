review:
  strengths:
  - 'Fully implements all spec requirements: dual x-axes (1000/T bottom, Temperature
    K top), ln(k) y-axis, linear regression line, R² and activation energy annotation'
  - Deterministic LCG data generation with fixed seed avoids banned Math.random()
    — correct browser-harness pattern
  - 'Both renders are fully theme-adaptive: title, tick labels, annotation box, and
    grid all use ANYPLOT_TOKENS ink/inkSoft/elevatedBg correctly'
  - Annotation box cleanly communicates the key scientific output (R², Ea/R in K,
    Ea in kJ/mol) with monospace font — excellent data storytelling
  - Dual-axis MUI X configuration (topAxis/bottomAxis, xAxisKey per series) is a sophisticated
    use of library-specific features
  - skipAnimation and export default pattern correctly follow the MUI X harness contract
  - 'Realistic scientific data: NO₂ thermal decomposition at 310–510 K with literature-accurate
    Ea ≈ 111 kJ/mol'
  weaknesses:
  - 'Palette non-canonical: colors={[t.palette[0], t.palette[2]]} skips position 1
    (lavender #C475FD) and uses position 2 (blue #4467A3) for the regression series.
    The Imprint rule is use positions 1→N in order; cherry-picking for aesthetic reasons
    is not permitted. Fix: use t.palette[1] for the regression line, or use a theme-adaptive
    neutral (t.inkSoft) to style it as a structural/reference element distinct from
    the categorical data series.'
  - 'Right spine visible with no data element requiring it — the style guide default
    is L-shaped (left + bottom only). With a top x-axis present the top spine is justified;
    the right spine should be removed for cleaner presentation. MUI X: add rightAxis={null}
    or remove the right axis line via sx styling.'
  - Y-axis label 'ln(k)' appears proportionally small relative to the x-axis labels
    at fontSize=16 — the string is very short and rotated, making it easy to miss
    at smaller display sizes. Consider increasing to 18px or adding a longer label
    'ln(k) — natural log of rate constant' for readability.
