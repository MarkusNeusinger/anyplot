review:
  strengths:
  - 'Clever dual-line x-axis tick labels using Highcharts useHTML: true — simultaneously
    shows 1/T (K⁻¹) and temperature in K, elegantly satisfying the secondary-axis
    spec requirement without a separate axis'
  - 'Subtitle serves as an information-dense annotation layer: Ea/R = 9,716 K, Ea
    ≈ 80.8 kJ/mol, R² = 0.999 give the reader the key kinetic insight immediately'
  - Correct zIndex layering ensures scatter data points render on top of the regression
    line, preserving visual hierarchy
  - 'Scatter marker edge highlighting (lineColor: t.pageBg, lineWidth: 1.5) gives
    crisp definition against both light and dark backgrounds — correctly uses the
    theme background as the edge color'
  - 'Both renders pass theme-readability: warm off-white (#FAF8F1) light background
    and warm near-black (#1A1A17) dark background; all text uses theme-adaptive tokens;
    no dark-on-dark failures'
  - In-memory hardcoded data makes the implementation fully deterministic and reproducible
    — no seeded RNG needed
  weaknesses:
  - 'Slope annotation missing: spec says ''Annotate the slope with an Ea/R label showing
    the extracted activation energy'' — this information appears only in the subtitle,
    not as an on-chart annotation near the regression line. In Highcharts core (without
    the annotations module), use chart.renderer.text() to add an SVG text label positioned
    near the midpoint of the fit line. Example: chart.renderer.text(''Ea/R = 9716
    K'', x, y).attr({align: ''left''}).css({color: t.inkSoft, fontSize: ''13px''}).add()'
  - 'First series palette order violation (VQ-07): the Arrhenius fit line is first
    in the series array but uses t.palette[2] (#4467A3 blue) instead of t.palette[0]
    (#009E73 brand green). Fix: swap the series order — put scatter (Measured k) first
    with t.palette[0], and the Arrhenius fit line second with t.palette[1] or t.palette[2].
    This ensures the brand green belongs to the first-in-array series while keeping
    the semantic assignment logical'
  - R² = 0.999 is unrealistically clean for 'experimental' kinetics data — the spec
    explicitly calls for 'realistic lab scatter'. Adjust the lnK values to introduce
    more scatter (e.g., ±0.3–0.5 random deviations) so R² lands around 0.97–0.98,
    which is more representative of real measurement noise
  - 'KISS structure: the linReg() helper function is a mild violation of the ''no
    functions/classes'' code pattern. Inline the 5 variables (n, sx, sy, sxy, sxx,
    m, b, r2) directly into the script body to match the expected flat structure'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — PASS. Correctly matches the anyplot light surface.
      Chrome: Title "line-arrhenius · javascript · highcharts · anyplot.ai" in dark ink, clearly readable at the top. Subtitle "Linear fit — Ea/R = 9,716 K | Ea ≈ 80.8 kJ/mol | R² = 0.999" in medium gray (inkSoft), readable. X-axis label "1/T (K⁻¹)" and Y-axis label "ln(k)" in dark gray, clearly readable. All tick labels use theme-adaptive colors and are legible.
      Data: X-axis displays dual-line tick labels showing both the 1/T value (e.g. "0.0016") and the corresponding temperature in K (e.g. "625 K") below it — a distinctive Highcharts HTML-label feature that satisfies the secondary-axis spec requirement. Y-axis shows ln(k) from -12 to 10. Regression line rendered in #4467A3 (Imprint blue, palette[2]). Scatter markers for 11 measured data points rendered in #009E73 (brand green, palette[0]), radius 7, with white edge for definition. Markers are clearly above the regression line in z-order. Both series appear in the bottom legend.
      Legibility verdict: PASS — all text readable at full resolution and at thumbnail scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — PASS. Correctly matches the anyplot dark surface.
      Chrome: Title, subtitle, and all axis/tick labels flip to light-colored text (inkSoft / ink tokens) against the dark background. Title clearly readable in near-white text. Subtitle legible. Axis labels and both lines of the dual-format x-axis ticks are visible in light gray. No dark-on-dark text failures detected.
      Data: Data colors are IDENTICAL to the light render — scatter markers remain #009E73 (brand green) and the regression line remains #4467A3 (blue). Grid lines appear as subtle lighter lines on the dark surface. White marker edges adapt correctly (using t.pageBg which is #1A1A17 dark), making the edges near-invisible on the dark background — the markers still read clearly against the dark canvas due to the green fill.
      Legibility verdict: PASS — all text readable. No dark-on-dark failures. Data colors unchanged from light render.
