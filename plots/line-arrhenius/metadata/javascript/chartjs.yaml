    and responsive:true properly set'
  weaknesses:
  - 'Annotation text overlaps with topmost data point (T=550K): the Ea/R label is
    placed at ca.top+46 and the top scatter marker (radius 9) extends to ca.top+36
    — roughly 3-5px of overlap. Move annotations to ca.bottom-80 / ca.bottom-54 (bottom-left)
    or shift right to ca.left+160 to clear the dense top-left region where regression
    line, top scatter point, and annotation converge.'
  - 'Full chart border frame retained (Chart.js default): all four scale borders are
    visible, creating a closed box instead of the preferred L-shaped frame. Remove
    the top and right border lines: on scales.x add `border: { display: false }` to
    remove the top-of-plot-area line from x2 axis, and on scales.y add `border: {
    display: false }` to remove the right border. Keep scales.x and scales.y2 borders
    for the bottom and left reference lines.'
  - 'Design could be more visually polished to clear the first-attempt 90-point threshold:
    consider slightly thicker regression line (borderWidth 3.0-3.5), a subtle filled
    annotation box behind the Ea/R and R² text (using t.elevatedBg with low alpha)
    to separate the annotation from the data, and removing the right/top border lines
    for a cleaner open chart style.'
