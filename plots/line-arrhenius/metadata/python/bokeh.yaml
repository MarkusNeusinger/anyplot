review:
  strengths:
  - 'Full spec compliance: regression line, R² annotation, Ea/R extraction, and secondary
    temperature axis all implemented correctly'
  - 95% confidence interval band (varea) is a professional scientific addition demonstrating
    statistical rigor
  - 'Excellent use of Bokeh-distinctive features: HoverTool, varea(), FixedTicker,
    NumeralTickFormatter, secondary LinearAxis'
  - Both renders correctly invert all chrome tokens while preserving identical Imprint
    data colors
  - Physics-realistic synthetic data (75 kJ/mol, 300–600 K) from proper Arrhenius
    model with reproducible noise seed (seed=42)
  - Flat, readable code with correct sys.path guard preventing bokeh.py module shadowing
  weaknesses:
  - 'Regression line uses Imprint palette position 3 (#4467A3 / blue) instead of canonical
    position 2 (#C475FD / lavender) — skips ordinal order for a 2-series chart; fix
    by changing LINE_COLOR to #C475FD or adding a semantic-exception justification'
  - Annotation box anchor (x=inv_T[8], y=ln_k[6]+3.5) places the box in mild proximity
    to the regression line; shifting the anchor slightly higher or right would increase
    visual separation
  - Top-axis temperature tick labels are implemented via a hidden LinearAxis (font
    size 0pt) plus separate Label annotations — redundant approach; use FixedTicker
    labels dict or CustomJSTickFormatter to render temperature values natively on
    the axis
