review:
  strengths:
  - Uses Altair-native transform_regression for built-in linear regression — no manual
    array math needed in the chart layer
  - 'All spec requirements met: regression line, R² annotation, Ea/R slope annotation,
    and secondary temperature reference labels'
  - Excellent theme adaptation — both light and dark renders are fully readable with
    proper chrome tokens applied throughout
  - Interactive hover highlighting via alt.selection_point with conditional size encoding
    adds genuine Altair-distinctive value
  - Realistic chemistry data (75 kJ/mol activation energy, 300-600 K range) with proper
    Arrhenius equation generation and noise model
  - Layer composition with alt.layer() is clean and well-structured; no unnecessary
    complexity
  weaknesses:
  - Design Excellence is functional but not exceptional — consider adding a subtle
    Y-axis-only grid (opacity ~0.15) to help readers trace ln(k) values; the current
    gridless design makes precise reading harder for the dense tick axis
  - The Ea and R² are combined on a single annotation line with space as separator,
    which slightly reduces readability — a separator like a bullet (·) or putting
    them on separate lines would improve clarity
  - DE-02 refinement is moderate — no spine removal is explicitly coded (Altair hides
    them by default via domain=False, which is fine, but the overall polish is good
    without being exemplary)
