  - 'Perfect spec compliance: all required Arrhenius features implemented (1/T axis,
    ln(k) axis, regression line, R², Ea/R annotation, secondary K axis, visible markers
    above regression line)'
  - Scientifically accurate enzyme kinetics data with realistic Ea (~58 kJ/mol), experimental
