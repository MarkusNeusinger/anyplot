review:
  strengths:
  - 'Full spec compliance: all required Arrhenius features implemented correctly —
    regression line, R², Ea annotation, dual x-axis with inverse-transform, prominent
    data points'
  - 'Excellent ggplot2 library mastery: idiomatic use of sec_axis() with transform
    function, geom_smooth with SE confidence band, plotmath parsing in annotate(),
    and the ggplot2 ≥ 3.5 inside-legend API'
  - 'Proper theme-adaptive chrome throughout: all INK/INK_SOFT/ELEVATED_BG tokens
    correctly applied, producing readable renders in both light and dark themes without
    dark-on-dark failures'
  - Realistic, scientifically grounded dataset (H₂O₂ decomposition, Ea ≈ 75 kJ/mol)
    with physically correct parameter values and appropriate noise level
  weaknesses:
  - 'DE-01 headroom: equal visual weight between regression line and data points reduces
    hierarchy — enlarging markers to size=4.5–5 or increasing regression linewidth
    to 1.4–1.6 would create clearer primary/secondary distinction between observations
    and model'
  - 'DE-03 headroom: annotations tell the story effectively but a slope indicator
    arrow or rise/run annotation directly on the line would make the slope=-Ea/R relationship
    physically tangible'
  - 'LM-02 opportunity: replace manual annotate() stat labels with ggpmisc::stat_poly_eq()
    or stat_regline_equation() for more idiomatic R/ggplot2 ecosystem annotation'
