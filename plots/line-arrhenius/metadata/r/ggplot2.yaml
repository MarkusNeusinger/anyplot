review:
  strengths:
  - 'Correct Imprint palette: brand green (#009E73) for measured data points and lavender
    (#C475FD) for the regression line, in canonical order'
  - 'Full spec compliance: regression line, R² annotation, Ea annotation, and secondary
    temperature axis all implemented correctly'
  - 'Theme-adaptive chrome: all background, text, grid, and legend elements properly
    flip between light (#FAF8F1) and dark (#1A1A17) themes with zero dark-on-dark
    or light-on-light failures'
  - Effective use of ggplot2 sec_axis() for the secondary x-axis showing temperature
    in K
  - Well-placed annotations using annotate(label) with R plotmath expressions for
    Ea and R² — positioned in upper right without overlapping any data
  - Clean linear code structure with set.seed(42) for reproducibility and ragg device
    for correct PNG output
  - 'Idiomatic ggplot2: scale_color_manual(), expression() for mathematical axis labels,
    and layered theme() overrides follow library best practices'
  weaknesses:
  - Design excellence is functional but not artful — annotation boxes and secondary
    axis are correct, but no visual hierarchy technique (e.g. subtle confidence band
    around the regression line, or visual emphasis on the extrapolated fit region)
    elevates the chart above a technical illustration
  - 'DE-02: minor grid is disabled but major grid uses full INK_MUTED color rather
    than a more subtle opacity-like approach; top and bottom axis lines are both drawn
    (necessary for dual x-axis) but the overall chrome could be lighter'
  - 'LM-01: the regression line is computed manually (lm + geom_line on df_fit) rather
    than using ggplot2s native stat_smooth(method=lm) — correct but not maximally
    idiomatic'
  - Secondary x-axis break at 420 K misses the actual data maximum of 433 K; adding
    433 K or 440 K as a break would better align axis tick coverage with actual data
    range
