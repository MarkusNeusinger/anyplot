review:
  strengths:
  - Perfect spec compliance with all required property lines, comfort zone, and HVAC
    process path
  - Excellent data quality with ASHRAE-based psychrometric calculations at standard
    atmosphere
  - Good color differentiation between property types (blue RH, orange wet-bulb, brown
    enthalpy, green specific volume)
  - Comfort zone correctly follows RH curves rather than being a simple rectangle
  - HVAC process path with custom arrowhead creates an effective narrative element
  weaknesses:
  - Low RH curves (10%, 20%) nearly invisible due to very light colors against light
    background
  - Label overlapping in dense areas (enthalpy labels at top, RH labels in upper right)
  - On-chart labels too small (10-12pt) for 4800x2700 canvas
  - No use of ColumnDataSource or HoverTool — misses bokeh core interactive strengths
  - Helper functions violate KISS flat-script structure
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg) on the y-axis (0 to 30).
    Blue curved lines represent relative humidity from 10% to 100%, with the 100%
    saturation curve drawn thicker. Orange dashed diagonal lines show wet-bulb temperatures
    (0°C to 35°C). Brown dotted diagonal lines indicate enthalpy values (10 to 100
    kJ/kg). Green dash-dot lines represent specific volume (0.78 to 0.92 m³/kg). A
    light blue shaded polygon marks the "Comfort Zone" (~20-26°C, 30-60% RH). A red
    arrow traces an HVAC cooling/dehumidification process from "Outdoor Air (35°C,
    60% RH)" to "Supply Air (15°C, 90% RH)" with red dot markers at each state point.
    The background is light gray (#fafafa) with subtle grid lines. Title reads "psychrometric-basic
    · bokeh · pyplots.ai" at top left.
