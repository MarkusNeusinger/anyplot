  image_description: 'The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg dry air) on
    the y-axis ranging from 0 to 30. The saturation curve (100% RH) is drawn as a
    thick dark blue line forming the upper boundary. Relative humidity curves from
    10% to 90% are shown as thinner blue lines with percentage labels placed along
    the curves. Wet-bulb temperature lines (0°C to 30°C in 5°C steps) are drawn as
    teal dashed diagonals with degree labels. Enthalpy lines (10 to 110 kJ/kg) appear
    as orange-red dash-dot diagonals with numeric labels. Specific volume lines (0.78
    to 0.94 m³/kg) are shown as light purple dotted diagonals with decimal labels
    at the right edge. A shaded blue comfort zone rectangle spans approximately 20-26°C
    and the corresponding 30-60% RH humidity ratios, labeled "Comfort Zone" in bold
    blue text. A red HVAC process path with arrows connects three numbered state points:
    point 1 (35°C, ~17.5 g/kg), point 2 (13°C, ~9 g/kg), and point 3 (24°C, ~9.5 g/kg),
    with italic red text "Cool + Dehumidify → Reheat". The legend in the upper-left
    identifies all five line types. Top and right spines are removed, and subtle gridlines
    appear on both axes.'
