review:
  strengths:
  - 'Complete spec coverage: prominent saturation curve, 10-100% RH curves, diagonal
    wet-bulb and oblique enthalpy lines, specific-volume lines, a highlighted cooling+dehumidification
    process path with numbered state points and arrow, and a shaded comfort zone polygon'
  - 'Thoughtful visual hierarchy via per-property-family encoding: thick solid green
    saturation/RH, dashed blue wet-bulb, dotted ochre enthalpy, dash-dot cyan specific
    volume, with reduced alpha on secondary families so the saturation boundary reads
    cleanly'
  - Property lines are labeled directly on the chart (RH %, enthalpy, wet-bulb, specific
    volume) per spec, not just in the legend; NaN-masking clips every family to the
    saturation curve so no line spills into the impossible region
  - 'Physically grounded data: ASHRAE/Magnus relations at sea-level 101.325 kPa, sensible
    -10..50 C / 0..30 g/kg ranges, realistic HVAC process (30 C/50% return -> 14 C/90%
    supply)'
  - 'Correct theme adaptation: warm off-white #FAF8F1 light and warm near-black #1A1A17
    dark backgrounds, identical data colors across themes, elevated legend frame;
    first series is brand green #009E73'
  - 'Idiomatic CairoMakie: Figure/Axis tokens, lines!/poly!/scatter!/arrows!/text!/axislegend,
    yaxisposition=:right mirroring a real psychrometric chart, exact 3200x1800 canvas'
  weaknesses:
  - 'Minor overlap in the dense central region: the rose process line and the ''②
    supply air'' label cross the saturation curve and a wet-bulb dashed line; readable
    but slightly busy where the process path enters the saturated zone'
  - Direct property labels are small (11-12pt source) and the secondary line families
    (wet-bulb/enthalpy/specific-volume) run at low alpha (0.45-0.6) — readable at
    full 3200px but the faint labels/lines lose some legibility when scaled to ~400px
    mobile width
  - Specific-volume labels (e.g. 0.86) and the 60% RH label sit close to other crossing
    lines in the upper region; a touch more label offset would improve separation
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct — not pure white.
      Chrome: bold dark title "psychrometric-basic · julia · makie · anyplot.ai" centered at top, fully visible (not clipped). X-axis label "Dry-Bulb Temperature (°C)" bottom, Y-axis label "Humidity Ratio (g water / kg dry air)" rotated on the RIGHT edge (humidity reads right, as on real psychrometric charts), both fully visible. Tick labels (-10..50 x, 0..30 y) in soft ink, readable. Subtle grid at ~12% opacity.
      Data: thick solid green (#009E73) saturation curve forms the prominent upper boundary; thinner green RH curves below it labeled 20/40/60/80/100%; dashed blue wet-bulb lines; dotted ochre enthalpy lines; dash-dot cyan specific-volume lines; lavender (#C475FD) shaded comfort-zone polygon labeled "Comfort zone"; rose (#954477) process line with arrow and two state points "① return air" / "② supply air". First series is #009E73.
      Legibility verdict: PASS — all chrome and labels readable against the light surface.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct — not pure black.
      Chrome: title, axis labels, and tick labels render in light ink (#F0EFE8 / #B8B7B0), all clearly readable; no dark-on-dark failures. Legend uses elevated #242420 frame with light text. Grid subtle and visible.
      Data: colors are identical to the light render — same green saturation/RH, lavender comfort zone, blue wet-bulb, ochre enthalpy, cyan specific volume, rose process path. Only chrome flipped.
      Legibility verdict: PASS — all text readable; brand green visible on the dark surface.
