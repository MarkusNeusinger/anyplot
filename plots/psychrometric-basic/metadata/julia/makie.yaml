review:
  strengths:
  - 'Genuinely rigorous psychrometric model: Magnus saturation pressure, saturation
    humidity ratio, and ASHRAE-style wet-bulb/enthalpy/specific-volume relations at
    sea-level pressure (101.325 kPa) — physically faithful, not faked.'
  - Every property family gets a distinct Imprint hue AND a distinct linestyle (saturation/RH
    solid green, wet-bulb blue dash, enthalpy ochre dot, specific volume cyan dash-dot)
    — redundant encoding that stays CVD-safe and legible.
  - Saturation curve (100% RH) is visually prominent at linewidth 3.4 and forms the
    upper boundary exactly as the spec requires; NaN-masking cleanly bounds every
    property line to the valid region under the saturation curve.
  - 'All required spec features present: comfort-zone polygon (20-26 C, 30-60% RH),
    the cooling+dehumidification process path with arrow and labelled state points,
    and direct on-chart labels for every property family (not legend-only).'
  - 'Polished theme-adaptive chrome: y-axis on the right per real psychrometric-chart
    convention, framed legend on elevated background, both light/dark renders correct
    with identical data colors.'
  - 'Clean idiomatic CairoMakie: linear KISS script, deterministic (formula-driven,
    no RNG), only used imports, exact 3200x1800 canvas.'
  weaknesses:
  - The 20% relative-humidity direct label lands at the far right (x=50 C, where its
    curve never reaches the W=16 reading line) and is pushed against the right spine
    so the '%' glyph collides with the axis line — clamp the label x to a few degrees
    inside the right bound, or anchor it where the 20% curve actually exits the plot.
    Not a canvas-edge clip (pixels stay within the wide right margin), so a layout
    nit rather than AR-09.
  - 'Minor label-on-line overlap: the ''(2) supply air'' annotation crosses the green
    saturation curve and a wet-bulb line; nudge it slightly left into clearer space.'
  - The chart is inherently dense — cyan specific-volume dash-dot lines and green
    RH curves overlap heavily in the upper-right; this is acceptable for a psychrometric
    chart but is near the ceiling of visual busyness. Consider trimming the number
    of specific-volume lines or lowering their alpha further to let the RH/saturation
    hierarchy read more cleanly.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct. Outer page and axis background match.
      Chrome: title "psychrometric-basic · julia · makie · anyplot.ai" in dark ink, fully visible (not clipped at top). X-axis label "Dry-Bulb Temperature (°C)" bottom, Y-axis label "Humidity Ratio (g water / kg dry air)" rotated on the RIGHT edge (psychrometric convention), both readable. Tick labels (-10..50 x, 0..30 y) in soft ink. Framed legend lower-right on elevated #FFFDF6 background with all 6 entries readable. PASS.
      Data: saturation/RH curves green #009E73 (saturation prominent thick), wet-bulb blue #4467A3 dashed, enthalpy ochre #BD8233 dotted, specific volume cyan #2ABCCD dash-dot, comfort zone lavender #C475FD fill, process path rose #954477 with arrow and two state-point markers. First series is brand green. Direct labels in matching colors (100%/80%/60%/40% RH green, enthalpy ochre numbers, wet-bulb blue, specific-volume cyan).
      Legibility verdict: PASS (one minor nit: the 20% RH label sits on the right spine with its '%' partly obscured by the axis line — within canvas, not chopped).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title, axis labels, tick labels all light ink (#F0EFE8 / #B8B7B0) clearly readable against the dark surface — no dark-on-dark failures. "Comfort zone" text light gray on the dark lavender fill is readable. Legend on elevated #242420 background readable.
      Data: identical Imprint colors to the light render — green saturation, blue wet-bulb, ochre enthalpy, cyan specific volume, lavender comfort zone, rose process path. Only chrome flipped, data colors constant.
      Legibility verdict: PASS.
