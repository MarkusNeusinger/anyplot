  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg dry air) on the y-axis
    (0 to 30). The saturation curve (100% RH) is drawn as a thick dark blue line forming
    the upper boundary. Relative humidity curves from 10% to 90% are shown as thinner
    semi-transparent blue curves, each labeled with percentage values directly on
    the chart. Green diagonal lines represent wet-bulb temperature (0°C to 30°C),
    orange/red diagonal lines show enthalpy values (10 to 110 kJ/kg), and purple diagonal
    lines indicate specific volume (0.78 to 0.94 m³/kg). A light blue shaded rectangle
    marks the comfort zone (~20-26°C). A red line with large circular markers shows
    a cooling & dehumidification process path from 32°C/60% RH to 24°C/50% RH, with
    state points annotated. A legend in the upper-left identifies comfort zone, process
    path, and property line types. The title reads "psychrometric-basic · plotly ·
    pyplots.ai". The plotly_white template provides a clean white background with
    subtle gridlines.
