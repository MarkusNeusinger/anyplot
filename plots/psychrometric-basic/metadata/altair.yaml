review:
  strengths:
  - Comprehensive psychrometric data from proper ASHRAE formulas at standard atmosphere
  - 'All spec features present: RH curves, wet-bulb, enthalpy, specific volume, comfort
    zone, HVAC process path'
  - Excellent visual hierarchy with prominent saturation curve, subtle secondary lines,
    and bold process path
  - Good use of direct labeling throughout the chart instead of a legend
  - Effective opacity layering to manage visual complexity
  weaknesses:
  - Red-green color pairing for wet-bulb and enthalpy lines is not colorblind-safe
  - Label overlap in dense areas where wet-bulb and enthalpy labels converge near
    saturation curve
  - Does not leverage Altair interactive capabilities (tooltips, selections)
  - Repetitive ASHRAE saturation pressure formula duplicated ~6 times
  image_description: The plot displays a psychrometric chart with "psychrometric-basic
    · altair · pyplots.ai" as the title and "Standard Atmosphere (101.325 kPa) · HVAC
    Air Properties" as the subtitle. The x-axis shows "Dry-Bulb Temperature (°C)"
    from -10 to 50, and the y-axis shows "Humidity Ratio (g/kg)" from 0 to 30. Blue
    curves represent relative humidity lines from 10% to 100%, with the saturation
    curve (100% RH) drawn as a thick dark blue line forming the upper boundary. RH
    percentage labels appear in blue along the right side of curves. Red dashed lines
    show wet-bulb temperature (0°C to 30°C) running diagonally with red labels at
    the saturation curve. Green dashed lines represent enthalpy with labels along
    the left edge. Purple dashed lines show specific volume with labels near the bottom-right.
    A green shaded rectangle marks the "Comfort Zone" (approximately 20-26°C). A bold
    red line with red dots connects "Outdoor Air (35°C, 50% RH)" to "Supply Air (13°C,
    100% RH)" showing an HVAC cooling/dehumidification process path. The grid is very
    subtle with 0.15 opacity, and the view border is removed.
