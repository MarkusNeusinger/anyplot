review:
  strengths:
  - 'Complete spec coverage: saturation curve (prominent brand-green, 100% RH), constant-RH
    curves (10-100%), diagonal wet-bulb (cyan dotted), oblique enthalpy (ochre dashed),
    specific-volume (lavender dashed), comfort zone, and an example cooling+dehumidification
    process path — every required property family is present and computed from genuine
    ASHRAE psychrometric formulas at 101.325 kPa.'
  - All property lines are labelled directly on the chart via endLabel/markArea, not
    just in the legend — exactly as the spec requires; RH labels are thinned to every-20%
    to avoid clutter.
  - 'Strong data storytelling: the cooling/dehumidification process path is drawn
    as a bold matte-red arrow between two annotated state points (A 30C/60%, B 14C/95%),
    and the comfort zone is a soft green shaded rectangle — clear focal hierarchy.'
  - 'Idiomatic, distinctive ECharts usage: markArea for the comfort polygon, endLabel
    for direct line labelling, dual symbol arrowheads on the process line, and z-ordering
    to layer saturation above the property grid.'
  - 'Palette is fully Imprint-compliant — saturation = brand green #009E73 (palette[0]),
    property families use distinct palette hues, backgrounds are #FAF8F1 (light) /
    #1A1A17 (dark), data colors identical across themes with only chrome flipping.'
  - Fully deterministic — all curves derived from closed-form psychrometric equations,
    no RNG; right-side y-axis is the domain-correct convention for psychrometric charts.
  weaknesses:
  - 'Label congestion in the upper-left region: several inline numeric labels (enthalpy
    80/100, wet-bulb 15/20/25) sit close to the prominent saturation curve and to
    each other, producing minor crowding — consider nudging label distance or thinning
    wet-bulb/enthalpy label density.'
  - The smallest inline numeric labels (specific-volume 0.78-0.94 and wet-bulb values
    at 12px CSS) are legible at full resolution but become marginal when the chart
    is scaled down to ~400px mobile width, given the information density of the chart.
  - Numerous small arrow-function helpers (pws, wFromPw, wSat, wAtRH, sample, rhCurve,
    enthalpyCurve, volumeCurve, wetBulbCurve) — justified for the psychrometric math,
    but they push slightly against the KISS 'no functions' preference.
  image_description: "Light render (plot-light.png):\n  Background: warm off-white\
    \ (#FAF8F1), correct light surface — not pure white.\n  Chrome: bold dark title\
    \ \"psychrometric-basic · javascript · echarts · anyplot.ai\" centered and fully\
    \ readable; horizontal legend below it (7 entries) in dark-soft ink, readable;\
    \ x-axis \"Dry-bulb temperature (°C)\" -10..50 and right-side y-axis \"Humidity\
    \ ratio (g/kg dry air)\" 0..30, both with readable dark tick labels; subtle grid.\
    \ All chrome readable.\n  Data: brand-green saturation curve (#009E73) forms the\
    \ prominent upper boundary; blue constant-RH curves with direct % labels (20/40/60/80/100%);\
    \ ochre dashed enthalpy lines (20-100); cyan dotted wet-bulb lines (5-25); lavender\
    \ dashed specific-volume lines (0.78-0.94); pale-green shaded comfort zone labelled\
    \ \"Comfort zone\"; bold matte-red process arrow from A (30°C/60%) to B (14°C/95%).\
    \ First series is #009E73. \n  Legibility verdict: PASS — all text readable; minor\
    \ crowding of small labels near saturation curve but each is legible.\n\nDark\
    \ render (plot-dark.png):\n  Background: warm near-black (#1A1A17), correct dark\
    \ surface — not pure black.\n  Chrome: title, legend, axis names and tick labels\
    \ render in light ink (#F0EFE8 / #B8B7B0), all clearly readable against the dark\
    \ surface; no dark-on-dark failures. \"Comfort zone\" label and the A/B state-point\
    \ labels use ink that flips to light and remains readable.\n  Data: identical\
    \ data colors to the light render — same green saturation, blue RH, ochre enthalpy,\
    \ cyan wet-bulb, lavender specific-volume, matte-red process arrow, green comfort\
    \ fill. Only chrome flipped. Brand green is clearly visible on the dark surface.\n\
    \  Legibility verdict: PASS — all text readable; no dark-on-dark issues."
