review:
  strengths:
  - 'Exceptionally complete spec coverage: saturation curve (prominent brand-green),
    10–90% RH curves, wet-bulb/enthalpy/specific-volume diagonal families, comfort
    zone polygon, and a labelled cooling-&-dehumidification process arrow are all
    present and physically derived from ASHRAE/Alduchov–Eskridge psychrometric formulas
    at 101.325 kPa.'
  - Property families are distinguished by both colour and stroke style (solid sat,
    solid RH, dashed wet-bulb, dash-dot enthalpy, dotted volume) and labelled directly
    on-chart, not just in the compact colour key — exactly as the spec demands.
  - Humidity ratio is placed on the right-hand y-axis, the standard psychrometric-chart
    convention — an idiomatic, domain-aware choice.
  - 'Advanced, idiomatic MUI X community usage: custom SVG Overlay rendered inside
    LineChart driven by useXScale/useYScale/useDrawingArea hooks, per-series stroke
    styling via sx class targeting, slotProps to hide the default legend.'
  - 'Imprint palette fully respected — first series (#009E73) on the saturation curve,
    all other families from palette positions, theme-correct chrome on both #FAF8F1
    and #1A1A17 surfaces with identical data colours.'
  - Fully deterministic (formula-derived, no RNG, no network).
  weaknesses:
  - 'The upper-left wedge is visually busy: the 5-line colour key, the green ''Saturation
    · 100% RH'' caption, and the ochre enthalpy values (40/60/80) all crowd near the
    saturation curve and the dense RH curve fan — readable but cluttered (VQ-02).'
  - Some on-chart labels are small (comfort sub-label 11.5px, key text 13.5px, property
    labels 13–14px CSS) — fine at full resolution but they shrink hard when the 3200px
    PNG is scaled to a mobile width (VQ-01).
  - Horizontal + vertical grid plus the many property-line families make the chart
    feel dense; a lighter grid would let the labelled curves breathe (DE-02).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), no white panel painted behind the SVG.
      Chrome: dark title "psychrometric-basic · javascript · muix · anyplot.ai" centred at top, readable. X-axis "Dry-Bulb Temperature (°C)" (-10..50, ticks every 5) at bottom; right-side y-axis "Humidity Ratio (g water / kg dry air)" (0..30). Subtle grid. All chrome clearly legible.
      Data: brand-green (#009E73) saturation curve forms the prominent upper boundary; blue RH curves (10–90%) fan beneath it with 80/60/40/20% direct labels; cyan dashed wet-bulb lines, ochre dash-dot enthalpy lines (40/60/80), lavender dotted specific-volume lines (0.85/0.90/0.95). Green-shaded comfort-zone polygon labelled "Comfort · 20–26 °C · 30–60% RH"; red process arrow (points 1→2) labelled "Cooling & dehumidification". Compact colour key in upper-left wedge.
      Legibility verdict: PASS (busy upper-left but all text readable; first series is #009E73).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17).
      Chrome: light title, axis labels and tick labels all clearly readable against the dark surface; no dark-on-dark text. Grid subtle but visible.
      Data: colours identical to the light render — green saturation, blue RH, cyan wet-bulb, ochre enthalpy, lavender volume, red process path, green comfort polygon. Brand green remains crisp. Comfort/key text uses ink/ink-soft tokens so it stays light on dark.
      Legibility verdict: PASS (no dark-on-dark failures; data colours match light render, only chrome flipped).
