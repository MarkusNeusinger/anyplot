review:
  strengths:
  - Genuine ASHRAE psychrometric computation (saturation vapor pressure + humidity-ratio
    formulas at 101.325 kPa) — data is physically correct, not faked
  - Saturation curve is the bold green hero series (#009E73), exactly as the spec
    requires for the upper boundary; RH family in blue, enthalpy family in dashed
    ochre — semantic Imprint palette roles
  - Comfort zone polygon and process arrowhead drawn at exact data coordinates via
    Highcharts' SVG renderer (this.renderer + axis.toPixels) — a distinctive library
    feature
  - All property lines labeled directly on the chart with ink-halo text outlines that
    stay legible over crossing curves; no legend needed
  - Process path (cooling & dehumidification, State 1 → State 2) with arrowhead provides
    a clear focal point and HVAC storytelling
  - 'Theme chrome is perfect in both renders — warm off-white #FAF8F1 / near-black
    #1A1A17, data colors identical, all text readable, no edge clipping'
  - Title exact-format and both axes labeled with units; deterministic, import-free,
    idiomatic Highcharts
  weaknesses:
  - 'Two property-line families explicitly listed in the spec are missing: constant
    wet-bulb temperature lines and constant specific-volume lines. The spec Data section
    lists wet_bulb_temp and specific_volume, and Notes say ''Wet-bulb and enthalpy
    lines run diagonally'' and ''Specific volume lines run at a slightly different
    diagonal angle''. Only enthalpy diagonals are drawn. Add wet-bulb lines (and ideally
    specific-volume lines) — keep them visually distinct from enthalpy by color/weight
    and lightly drawn to avoid clutter.'
  - 'Minor label crowding near the State 1 point: the blue ''60%'' RH label nearly
    touches the black ''State 1 · 32 °C, 60% RH'' label. Nudge the State-1 dataLabel
    right/down a few px so the two don''t abut.'
  - Chart is dense; at ~400px mobile width the 13px direct labels and many crossing
    curves become hard to parse. Consider slightly heavier hero/label weighting or
    fewer intermediate RH curves to preserve mobile legibility.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (confirmed, not pure white).
      Chrome: dark title "psychrometric-basic · javascript · highcharts · anyplot.ai" fully visible at top, subtitle "Moist-air properties at 101.325 kPa (sea level)" beneath; x-axis "Dry-bulb Temperature (°C)" with ticks -10..50; y-axis "Humidity Ratio (g water / kg dry air)" on the RIGHT side, ticks 0..30. Subtle grid. All chrome readable.
      Data: bold green (#009E73) saturation curve = upper boundary; blue (#4467A3) relative-humidity curves 10–90% labeled 20/40/60/80%; dashed ochre (#BD8233) constant-enthalpy diagonals labeled 20/40/60/80/100 with "Constant enthalpy (kJ/kg)" note upper-left; red (#AE3030) process path with arrowhead and State 1 / State 2 markers; lavender (#C475FD) shaded comfort-zone polygon labeled "Comfort Zone". First/hero series is green #009E73.
      Legibility verdict: PASS (one minor crowding spot where blue "60%" abuts the black "State 1" label).

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (confirmed, not pure black).
      Chrome: light title and axis/tick labels, all clearly readable — no dark-on-dark failures.
      Data: colors identical to light render — green saturation, blue RH curves, ochre dashed enthalpy, red process path, lavender comfort zone. Only chrome flipped. Brand green clearly visible.
      Legibility verdict: PASS.
