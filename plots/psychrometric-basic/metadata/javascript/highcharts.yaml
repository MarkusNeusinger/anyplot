review:
  strengths:
  - 'Comprehensive feature coverage: saturation curve (bold green hero), RH curves
    10-100%, constant-enthalpy, wet-bulb, and specific-volume families all present,
    plus a highlighted cooling-and-dehumidification process path with arrowhead and
    a shaded comfort-zone polygon'
  - Physically grounded data from ASHRAE RP-1485 saturation-pressure formula at sea-level
    pressure (101.325 kPa) over -10 to 50 C, giving a realistic, neutral domain
  - Direct on-chart labeling of every property family with PAGE_BG text-outline halos
    so labels stay legible over crossing lines, exactly as the spec demands (not a
    legend)
  - 'Distinctive Highcharts mastery: chart.events.load uses this.renderer + axis.toPixels
    to draw the comfort polygon, arrowhead, and rotated upper-left property key at
    exact data coordinates'
  - 'Strong theme adaptation: data colors identical across light/dark, chrome flips
    correctly, backgrounds are warm off-white / near-black; line families separated
    by color AND dash style (CVD-friendly)'
  - Canvas exactly 3200x1800; title matches the mandated format
  weaknesses:
  - 'Duplicated header comment block: lines 1-4 (rewritten quality header) and lines
    6-10 (original header) both ship, leaving a redundant ''anyplot.ai / psychrometric-basic
    / Library:'' block. Harmless (all comments) but sloppy - collapse to one header
    above the //# anyplot-orientation directive.'
  - 'Information density hurts mobile (400px) readability: the many small 13px diagonal-line
    labels and tick labels are illegible when scaled down, though the macro structure
    (saturation curve, process path, comfort zone) stays clear. Inherent to psychrometric
    charts but worth noting.'
  - Minor label crowding where enthalpy/wet-bulb/specific-volume diagonals cross in
    the mid-chart; halos keep them readable but a few endpoint labels sit close to
    crossing lines.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct - not pure white.
      Chrome: title "psychrometric-basic · javascript · highcharts · anyplot.ai" and subtitle dark and readable; x-axis "Dry-bulb Temperature (°C)" bottom, y-axis "Humidity Ratio (g water / kg dry air)" on the right (opposite), all tick labels dark and crisp. Subtle grid.
      Data: saturation curve bold green (#009E73 = palette[0], hero); RH curves blue; constant-enthalpy ochre dashed; wet-bulb cyan dotted; specific-volume rose long-dashed; red process path (State 1 -> State 2) with circular markers and arrowhead; lavender shaded comfort zone with "Comfort Zone" label. Upper-left rotated property-family key in matching colors.
      Legibility verdict: PASS - all text readable at full size; halos keep direct labels clear over lines.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct - not pure black.
      Chrome: title, subtitle, axis titles, and tick labels all light/readable against dark; no dark-on-dark failures. Grid subtle but visible.
      Data: colors identical to light render (green saturation, blue RH, ochre enthalpy, cyan wet-bulb, rose specific volume, red process path, lavender comfort zone) - only chrome flipped. White State 1/State 2 and "Comfort Zone" labels readable. Rose "Specific volume (m³/kg)" key label verified readable on dark.
      Legibility verdict: PASS - brand green and all property families visible; no dark-on-dark text.
