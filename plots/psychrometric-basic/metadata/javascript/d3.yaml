review:
  strengths:
  - 'Complete spec coverage: prominent saturation curve, RH curves 10–100%, diagonal
    wet-bulb and enthalpy families, steeper specific-volume dotted lines, shaded comfort
    zone, and a labeled cool+dehumidify process arrow between two state points'
  - All property families directly labeled on their curves (not just in a legend)
    using halo (paint-order) outlines and tangent-rotated text so labels follow each
    line — a textbook psychrometric-chart presentation
  - 'Idiomatic, distinctive D3: d3.line with curveMonotoneX, clipPath trimming lines
    to the moist-air region below saturation, SVG defs marker for the process arrow,
    and per-family dash patterns as redundant CVD-safe encoding'
  - 'Imprint palette used correctly with strong semantics — RH = brand green #009E73
    (first series), wet-bulb = blue (water/cooling), enthalpy = red (energy/heat),
    specific volume = ochre, comfort = lavender, process = neutral ink; data colors
    identical across light/dark with only chrome flipping'
  - Fully deterministic analytic data from ASHRAE/Tetens closed-form relations at
    sea-level pressure (101.325 kPa); no network/disk access; canvas exact at 3200×1800
  weaknesses:
  - Specific-volume dotted ochre lines (opacity 0.7, 1.1px dotted) are faint and can
    be hard to trace against the dense curve field, especially on the dark surface
    — slightly increasing weight or opacity would improve element visibility
  - Inline curve labels are ~12px in mount space (~24 source px); they are legible
    but on the small side, and in the lower-right corner the enthalpy/specific-volume/wet-bulb
    labels cluster near one another (halos keep them readable, but spacing is tight)
  - Wet-bulb and enthalpy numeric labels are bare integers (e.g. '30', '60') without
    inline units on the curve; clear from the legend but a stray unit hint on the
    first label of each family would aid a cold read
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct light surface.
      Chrome: title "psychrometric-basic · javascript · d3 · anyplot.ai" and subtitle in dark ink, both clearly readable; bottom x-axis "Dry-Bulb Temperature (°C)" and right y-axis "Humidity Ratio (g water / kg dry air)" with integer ticks (-10..50, 0..30) in soft ink — all legible. Subtle grid visible but not dominant. Legend sits in the empty upper-left (above-saturation) region with line/dash/swatch/arrow keys, all readable.
      Data: brand green #009E73 saturation curve prominent (thick), green RH curves below it, blue wet-bulb diagonals, red dashed enthalpy diagonals, ochre dotted specific-volume lines (steeper diagonal), lavender shaded comfort zone, black process arrow between points 1 and 2. First series is #009E73. Direct curve labels colored per family with off-white halos.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct dark surface.
      Chrome: title/subtitle in light ink, axis titles, tick labels and legend text all clearly readable against the dark background — no dark-on-dark failures. Grid subtle but visible.
      Data: colors identical to the light render (green saturation/RH, blue wet-bulb, red enthalpy, ochre specific-volume, lavender comfort) — only chrome flipped. Process arrow now light/neutral ink. Brand green clearly visible.
      Legibility verdict: PASS
