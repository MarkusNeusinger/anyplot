review:
  strengths:
  - 'Complete spec coverage: saturation curve (prominent 4px boundary), RH curves
    10-100%, wet-bulb, enthalpy, and specific-volume line families, all computed from
    ASHRAE psychrometric formulas at 101.325 kPa'
  - Every property family is direct-labeled on the chart via a custom afterDatasetsDraw
    plugin (not just a legend), and each family uses a distinct dash pattern + Imprint
    color so lines stay separable where they cross
  - 'Clear data storytelling: the red cooling+dehumidification process path with A/B
    state points and a hand-drawn arrowhead is the unmistakable focal point, with
    the comfort zone highlighted separately'
  - 'Idiomatic Chart.js: scatter+showLine with a custom plugin using scales.getPixelForValue
    for canvas annotation and generateLabels for a per-family legend; data colors
    identical across themes, only chrome flips'
  - 'Both light and dark renders are fully readable with correct warm backgrounds
    (#FAF8F1 / #1A1A17) and no edge clipping'
  weaknesses:
  - The italic 'cooling + dehumidification' label sits directly on top of the red
    process line in both renders — readable but slightly muddied; nudging it ~14px
    further off the line would clean it up (minor VQ-02).
  - The comfort-zone region reads more as two vertical green edge lines than a filled
    rectangle — the rgba(0,158,115,0.2) fill is very faint and the polygon is a thin
    curved sliver between the 30%/60% RH curves. The spec asks for a highlighted shaded
    region; consider a stronger fill alpha (~0.3-0.35) so the zone reads as a clear
    block.
  - The chart is inherently dense (many crossing line families); RH percent labels
    near the top edge sit close to the saturation/RH curves. Legible but tight — no
    action strictly required.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white.
      Chrome: dark title "psychrometric-basic · javascript · chartjs · anyplot.ai" centered; X-axis "Dry-Bulb Temperature (°C)" bottom, Y-axis "Humidity Ratio (g water / kg dry air)" on the right (conventional for psychrometric charts); soft-ink ticks (-10..50, 0..30) all readable. 6-entry legend across the top. All chrome readable. PASS.
      Data: blue RH/saturation curves (saturation prominent, thick), lavender dashed wet-bulb lines, ochre dotted enthalpy lines, cyan dash-dot specific-volume lines, green comfort zone, red process path A->B with arrowhead. First legend series (Comfort zone) is brand green #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface — not pure black.
      Chrome: light title/labels/ticks all clearly visible against dark bg; no dark-on-dark failures (tick labels, axis titles, and on-canvas annotations all use light ink tokens). Legend text light and readable. PASS.
      Data: identical colors to the light render — blue curves, lavender wet-bulb, ochre enthalpy, cyan volume, green comfort zone, red process path. Brand green #009E73 reads well on the dark surface. Only chrome flipped between themes.
      Legibility verdict: PASS
