review:
  strengths:
  - 'Complete psychrometric chart: saturation curve (hero, prominent green linewidth
    1.5), RH curves 10-100%, diagonal wet-bulb lines, oblique enthalpy lines, specific-volume
    lines, comfort zone, and an example cooling/dehumidification process arrow — every
    spec requirement is present.'
  - 'Physically grounded data: ASHRAE-style saturation-pressure, humidity-ratio, wet-bulb,
    enthalpy, and specific-volume relations computed at sea-level 101.325 kPa over
    -10 to 50 C, all clipped to the valid sub-saturation region.'
  - 'Idiomatic ggplot2 grammar: layered geom_line/geom_path/geom_polygon/geom_segment
    with a right-positioned y-axis (true psychrometric convention), arrow-tipped process
    path, and direct on-chart labeling instead of a legend — exactly as the spec asks.'
  - 'Strong data storytelling and palette discipline: green saturation as the hero
    series, red process path as the focal emphasis, shaded comfort zone, and a color-keyed
    descriptor block top-left mapping each Imprint hue to its property family.'
  - 'Theme adaptation is correct in both renders: backgrounds #FAF8F1 light / #1A1A17
    dark, INK/INK_SOFT chrome tokens flip while the data hues stay identical.'
  weaknesses:
  - Several numeric property-line labels are very small (enthalpy at geom_text size
    2.3, specific-volume at size 2.2, wet-bulb at size 2.4 — roughly 6.3-6.8pt). They
    are legible at full 3200px resolution but will be hard to read at the 400px mobile
    srcset. Consider bumping these to ~2.6-2.8.
  - The lavender enthalpy lines/labels (#C475FD, linewidth 0.4) and the blue dotted
    specific-volume lines (#4467A3, linewidth 0.4) are quite faint against the cream
    light background — they read but sit close to the visibility floor. A slightly
    higher linewidth (~0.5) would help the secondary families register.
  - The relative-humidity percentage labels (90% 80% 70% 60% 50%...) crowd together
    near the top edge of the panel where the curves converge, producing minor label-on-label
    tightness in both renders. Not severe, but staggering their placement would clean
    it up.
  - 'Minor: the implementation defines four helper functions (p_ws, W_of, W_sat, clip_region).
    They are well-justified for reusing the psychrometric math, but slightly deviate
    from the strict KISS ''no functions'' preference.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) confirmed — not pure white, not dark.
      Chrome: Title "psychrometric-basic · r · ggplot2 · anyplot.ai" in bold dark ink, fully visible and not clipped. Subtitle "Moist-air properties at sea level (101.325 kPa)" in soft ink. X-axis "Dry-bulb temperature (°C)" with ticks -10..50; Y-axis on the RIGHT (psychrometric convention) "Humidity ratio (g water / kg dry air)" with ticks 0..30. Subtle grid. All chrome readable (dark text on light).
      Data: Green (#009E73) saturation curve is the prominent hero boundary, thinner green RH curves below it; cyan (#2ABCCD) wet-bulb diagonals; lavender (#C475FD) enthalpy lines; blue (#4467A3) dotted specific-volume lines; grey shaded comfort zone with dashed outline; red (#AE3030) arrowed process path A→B labelled "Cooling & dehumidification". First/hero series is #009E73 as required. Color-keyed descriptor legend top-left.
      Legibility verdict: PASS (small enthalpy/spec-vol numeric labels are near the lower size bound but readable at full resolution).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) confirmed — not pure black.
      Chrome: Title and axis labels in light ink (#F0EFE8), tick labels in #B8B7B0 — all clearly visible, NO dark-on-dark failures. "Comfort zone" annotation flips to light ink and is readable on the dark surface.
      Data: Data colors are IDENTICAL to the light render (green saturation/RH, cyan wet-bulb, lavender enthalpy, blue specific-volume, red process path). Only chrome flipped. Brand green #009E73 reads well on the dark surface. Red process path is visible.
      Legibility verdict: PASS (same minor small-label caveat as light; top RH% labels are slightly crowded).
