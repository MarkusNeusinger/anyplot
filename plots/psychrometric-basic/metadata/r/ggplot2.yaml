review:
  strengths:
  - 'Saturation curve (100% RH) rendered as the visual hero at linewidth 1.5 in brand
    green #009E73 — exactly the prominence the spec asks for'
  - Every property family (RH, wet-bulb, enthalpy, specific volume) is directly labeled
    on the chart and colour-keyed with a matching upper-left descriptor block, fulfilling
    the 'label lines directly, not just in a legend' requirement
  - 'Physically grounded data: ASHRAE saturation-pressure and wet-bulb/enthalpy/specific-volume
    formulas at sea-level 101.325 kPa, clipped to the physical sub-saturation region'
  - Clear data storytelling — shaded comfort zone, plus a red emphasised cooling-&-dehumidification
    process arrow between two labelled state points A and B
  - Distinct linetypes per family (dotted volume, dashed enthalpy, longdash wet-bulb,
    solid RH) keep the dense overlay readable and CVD-safe
  - Data colours are identical across both themes; only chrome (background, ink, grid)
    flips — palette compliance is clean
  weaknesses:
  - Top-left region is crowded in both renders where high-RH labels (80–95%), wet-bulb
    numbers and the rotated 'Saturation (100% RH)' label converge near the saturation
    curve — no hard collisions but the density costs a little legibility headroom
  - 'On the dark render the blue dotted specific-volume lines and their right-edge
    labels (0.92, 0.94) read slightly faint against #1A1A17 — could nudge linewidth
    or brightness a touch for parity with the light render'
  - Several small domain helper functions (p_ws, W_of, W_sat, clip_region) push against
    the KISS 'no functions' preference; they are justified for psychrometric math
    but keep CQ-01 short of full marks
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: bold dark title "psychrometric-basic · r · ggplot2 · anyplot.ai", grey subtitle, dark axis titles ("Dry-bulb temperature (°C)" bottom, "Humidity ratio (g water / kg dry air)" on the RIGHT y-axis), dark-grey tick labels. Subtle dark grid. All readable. PASS.
      Data: green saturation curve (#009E73) is the prominent upper boundary; thinner green RH curves below it; cyan longdash wet-bulb lines; lavender dashed enthalpy lines; blue dotted specific-volume lines; grey shaded comfort zone with dashed outline and "Comfort zone" label; red arrow A->B with "Cooling & dehumidification" annotation. First/hero series is #009E73. Colour-keyed family descriptor block top-left.
      Legibility verdict: PASS (top-left is dense but every label is legible, nothing clipped).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: light title and subtitle, light axis titles and tick labels, faint light grid — all clearly readable, no dark-on-dark text. PASS.
      Data: identical data colours to the light render (green saturation hero + RH curves, cyan wet-bulb, lavender enthalpy, blue specific-volume, red process arrow, grey comfort zone). Only chrome flipped. Blue dotted volume lines/labels read a touch faint but remain visible.
      Legibility verdict: PASS.
