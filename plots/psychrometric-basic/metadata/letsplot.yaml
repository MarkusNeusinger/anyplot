  strengths:
  - Complete psychrometric chart with all required property families computed from
    ASHRAE equations
  - Excellent colorblind-safe palette with intuitive grayscale gradient for RH curves
  - Strong data storytelling through comfort zone highlight and HVAC process path
    with arrow
  - Perfect spec compliance — every required feature is present and correctly implemented
  - Professional color hierarchy that differentiates property families clearly
  weaknesses:
  - Label overlap in the central region (15-25°C) where RH%, wet-bulb, and enthalpy
    labels compete for space
  - On-chart labels at size 7 are at the lower bound of legibility
  - Helper functions add structural complexity (though justified by domain math)
  - Enthalpy and volume lines are somewhat faint at alpha 0.45
  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg) on the y-axis (0 to 30).
    Relative humidity curves from 10% to 100% are drawn as smooth curves in a grayscale
    gradient, with the 100% saturation curve prominently rendered in dark blue (#306998).
    Wet-bulb temperature lines (0°C to 35°C) appear in blue running diagonally from
    upper-left to lower-right. Enthalpy lines (10 to 110 kJ/kg) in vermillion/orange
    run diagonally, labeled on the left edge with units. Specific volume lines (0.78
    to 0.94 m³/kg) in purple run at a slightly different diagonal angle, labeled on
    the right edge. A comfort zone is highlighted as a light blue shaded polygon (approximately
    20-26°C, 30-60% RH) with a dashed border and bold "Comfort Zone" label. An HVAC
    process path is shown as a thick orange arrow from ~32°C/50%RH to ~24°C/50%RH
    with orange state points and a bold "Cooling & Dehumidification" label connected
    by an annotation line. The title reads "psychrometric-basic · letsplot · pyplots.ai"
    in bold at the top. The background is white with a light gray (#fafafa) panel
    and subtle gridlines.
