  strengths:
  - Accurate ASHRAE-based psychrometric equations producing physically correct curves
  - Effective visual hierarchy with orange process path as clear focal point and blue
    comfort zone
  - Custom grayscale gradient for RH curves creates visual depth
  - Proper use of ggplot layer composition for complex multi-layer technical chart
  - 'All major spec features present: RH curves, wet-bulb, enthalpy, specific volume,
    comfort zone, process path'
  weaknesses:
  - Red (#d62728) enthalpy and green (#2ca02c) wet-bulb lines remain colorblind-unsafe
    — flagged in attempt 1 but not fixed
  - Text overlap between Cooling & Dehumidification label and RH% labels, and wet-bulb
    labels near saturation curve
  - 'Dead code: df_enth_labels, df_vol_labels, enthalpy_value(), specific_volume_value()
    defined but unused in plot'
  - Enthalpy and volume labels lack units (kJ/kg, m³/kg)
  image_description: The plot displays a psychrometric chart on a white background
    with dry-bulb temperature (°C) on the x-axis (-10 to 50) and humidity ratio (g/kg)
    on the y-axis (0 to 30). Relative humidity curves (10%–100%) are rendered using
    a grayscale gradient from light gray (10%) to dark gray (90%), with the 100% saturation
    curve highlighted in blue (#306998). Wet-bulb temperature lines (0°C to 30°C)
    run diagonally in green with labels near the saturation curve. Enthalpy lines
    run diagonally in red/orange with labels on the left edge (10–60 kJ/kg visible).
    Specific volume lines run at a different diagonal in purple/lavender with labels
    near the bottom (0.78–0.90). A light blue dashed-border polygon marks the Comfort
    Zone (~20–26°C, ~4–9 g/kg) with bold blue label. An orange arrow shows an HVAC
    cooling & dehumidification process path from ~(32°C, 15 g/kg) to ~(24°C, 9 g/kg)
    with bold orange label. Title reads "psychrometric-basic · letsplot · pyplots.ai"
    in bold. Subtle gray major gridlines, no minor gridlines.
