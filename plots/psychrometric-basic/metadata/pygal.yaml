  image_description: The plot displays a psychrometric chart with dry-bulb temperature
    (°C) on the x-axis ranging from -10 to 50, and humidity ratio (g/kg) on the y-axis
    from 0 to 30. Blue curved lines represent relative humidity from 10% to 100%,
    with the saturation curve (100%) being the thickest. Orange dashed diagonal lines
    show wet-bulb temperatures (Tw 0°C through Tw 30°C). Purple dotted lines indicate
    specific volume values (0.80, 0.84, 0.88, 0.92). Teal dash-dot diagonal lines
    represent enthalpy values (h=10 through h=90). A large green filled polygon marks
    the comfort zone (approximately 20-26°C, 30-60% RH) with a "Comfort Zone" label.
    A red line with dots connects State A (35°C, 60% RH) to State B (24°C, 50% RH)
    showing an HVAC cooling/dehumidification process. The title reads "psychrometric-basic
    · pygal · pyplots.ai". All curve types are labeled directly on the chart. The
    plot background is slightly off-white with subtle grid lines. Some labels on the
    right edge are truncated (Tw 30°, Tw 25°, Tw 20° partially cut off), and there
    is label crowding near the bottom x-axis area.
