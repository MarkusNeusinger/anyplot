review:
  strengths:
  - 'Genuinely sophisticated, publication-grade psychrometric chart: saturation curve
    (#009E73, width 5) reads as the prominent upper boundary, with RH, wet-bulb, enthalpy
    and specific-volume families each given a distinct Imprint hue + dash style (solid/dash/dot/dashdot)
    so they stay separable even under CVD.'
  - 'All spec features present: 10-90% RH curves, diagonal wet-bulb and enthalpy lines,
    specific-volume lines, shaded ASHRAE comfort zone polygon, and a labeled cooling-and-dehumidification
    process path drawn as a red arrow between two state points (32 C/60% to 24 C/50%).'
  - 'Physically correct data: ASHRAE 2017 saturation-pressure formulas at sea-level
    101.325 kPa, fully deterministic (no RNG), realistic value ranges.'
  - Property lines are labeled directly on the chart (per spec) rather than only in
    a legend; graduated RH opacity and translucent label backgrounds are thoughtful
    refinements.
  - 'Strong plotly idiom + distinctive features: rich per-trace hovertemplates carrying
    enthalpy via customdata, fill=toself comfort polygon, interactive HTML export
    alongside the PNG.'
  - Theme-adaptive chrome is correct in both renders; data colors are identical across
    light/dark, only chrome flips. Title format and axis labels (with units) are exactly
    right.
  weaknesses:
  - 'Property-line label collisions near the saturation curve: the wet-bulb labels
    (cyan) and enthalpy labels (ochre) both anchor at the saturation end and overlap
    — "5"/"20", "20"/"60", "25 deg"/"80", "15 deg"/"40" sit on top of each other in
    both renders. Stagger the wet-bulb vs enthalpy label anchor points (e.g. shift
    enthalpy labels further up-left or wet-bulb labels down) so each curve label is
    clearly separated.'
  - 'Bottom-center cluster overlap: the "60%" RH label overlaps the "0.84" specific-volume
    label, and the "40%" RH label sits directly against the red "24 C, 50% RH" state-point
    annotation. Nudge these labels apart.'
  - 'Dark render: the RH percentage labels in blue #4467A3 are somewhat low-contrast
    against the near-black surface even with the translucent label background. Consider
    lifting the label background opacity or brightening the RH label color in the
    dark theme so they read as crisply as the cyan/ochre labels.'
  - When the PNG is scaled to ~400 px mobile width, the dense 11-12px property labels
    become hard to parse given how many lines cross the lower-left region; the overlaps
    above compound this.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), confirmed — not pure white.
      Chrome: title "psychrometric-basic · python · plotly · anyplot.ai" centered in dark ink, fully readable.
        Axis titles "Dry-Bulb Temperature (°C)" and "Humidity Ratio (g/kg dry air)" and the 5-unit tick labels
        are clear dark-on-light. Subtle grey grid. Legend box (top-left) on elevated #FFFDF6 with crisp entries.
      Data: saturation curve in brand green #009E73 (thick, prominent upper boundary) — confirmed first series.
        RH curves blue #4467A3, wet-bulb cyan #2ABCCD dashed, enthalpy ochre #BD8233 dotted, specific-volume
        lavender #C475FD dash-dot, comfort-zone neutral polygon, red #AE3030 process arrow with two state points.
      Legibility verdict: PASS for all major chrome/annotations. Minor: several property-line labels collide near
        the saturation curve (wet-bulb vs enthalpy) and in the bottom-center cluster (60%/0.84, 40%/red annotation).

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), confirmed — not pure black.
      Chrome: title and axis labels in light ink (#F0EFE8), tick labels in soft light grey — all clearly readable,
        NO dark-on-dark failures. Grid is a subtle light translucent. Legend box on #242420 reads well.
      Data: colors are IDENTICAL to the light render (green saturation, blue RH, cyan WB, ochre enthalpy,
        lavender volume, red process) — only chrome flipped. Confirmed.
      Legibility verdict: PASS overall. Caveat: the blue #4467A3 RH percentage labels are a bit low-contrast on
        the near-black surface (still readable, but less crisp than the cyan/ochre labels). Same label-overlap
        crowding as the light render near the saturation curve and bottom-center.
