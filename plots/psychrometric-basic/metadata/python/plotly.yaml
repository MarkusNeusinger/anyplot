review:
  strengths:
  - 'Complete spec coverage: prominent green saturation curve, RH curves (10-90%),
    dashed cyan wet-bulb lines, dotted ochre enthalpy lines, dash-dot lavender specific-volume
    lines, shaded comfort zone, and a highlighted red cooling-and-dehumidification
    process path with labeled state points (32 C/60% RH to 24 C/50% RH).'
  - Each psychrometric property family gets a distinct Imprint hue AND a distinct
    dash style (solid/dash/dot/dash-dot), giving robust redundant encoding that holds
    up under CVD and in both themes.
  - Property lines are labeled directly on the chart (per spec) using small theme-adaptive
    background boxes, with deliberate label-offset logic documented in comments to
    avoid collisions in the dense central region.
  - 'Physically accurate: ASHRAE 2017 saturation-pressure formulas at 101.325 kPa,
    graduated RH-curve opacity, and a precomputed saturation grid reused via np.interp.'
  - 'Strong plotly idiom: graph_objects with per-trace hovertemplate + customdata
    for rich interactive tooltips, rotated annotations (textangle), arrow annotations
    for the process path, and HTML export.'
  - 'Both renders are theme-correct (#FAF8F1 / #1A1A17), canvas is exactly 3200x1800,
    and the title follows the mandated descriptive-prefix format.'
  weaknesses:
  - 'The central region (~20-26 C, 8-13 g/kg) is crowded: the ''Comfort Zone'' label,
    the ''24 C, 50% RH'' state-point label, the red process arrow, and the 15 deg/20
    deg wet-bulb labels cluster together. They remain legible thanks to background
    boxes, but the area is visually busy (VQ-02). Consider nudging the wet-bulb labels
    or the state-point callouts slightly further apart.'
  - Some property labels (wet-bulb, specific-volume, enthalpy) sit at ~11px (44 source-px)
    which is on the small side for the densest zones; readable at full resolution
    but tight when scaled toward mobile width (VQ-01).
  - The red double-headed process arrow and the diagonal red process line both occupy
    the same central space and read as slightly redundant; a single clearer directional
    cue would sharpen the storytelling focal point (DE-03).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: centered title "psychrometric-basic · python · plotly · anyplot.ai" in dark ink, fully visible. X-axis "Dry-Bulb Temperature (°C)" (-10..50) and Y-axis "Humidity Ratio (g/kg dry air)" (0..30) labels and gray tick labels all readable. Subtle grid. Top-left legend frame with all six entries readable.
      Data: prominent thick green (#009E73) saturation curve as upper boundary; blue RH curves labeled 10/20/40/60/80%; cyan dashed wet-bulb lines labeled 0/5/15/20/25/30 deg; ochre dotted enthalpy lines labeled 20/40/60/80/100 (rotated); lavender dash-dot specific-volume lines (0.82, 0.84...) at right; gray-dashed shaded comfort-zone polygon with "Comfort Zone" label; red process path with two state-point callouts. First series is #009E73.
      Legibility verdict: PASS (central region busy but every label has a background box and stays readable).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: title, axis labels, and tick labels in light ink (#F0EFE8 / #B8B7B0) all clearly readable; no dark-on-dark failures. Legend frame uses elevated dark fill, text readable.
      Data: identical data colors to the light render (green saturation, blue RH, cyan wet-bulb, ochre enthalpy, lavender volume, red process, muted comfort zone). RH labels use a slightly brighter blue variant for legibility on dark while the curve color itself is unchanged. Only chrome flipped.
      Legibility verdict: PASS (brand green and all property hues read well on the near-black surface).
