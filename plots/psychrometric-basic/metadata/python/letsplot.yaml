review:
  strengths:
  - Genuine ASHRAE psychrometric equations (saturation pressure, humidity ratio, wet-bulb,
    enthalpy, specific volume) — physically accurate, not faked
  - 'Complete spec coverage: saturation curve, RH family, wet-bulb diagonals, enthalpy/volume
    obliques, comfort-zone polygon, and a highlighted cooling+dehumidification process
    path with arrowhead'
  - All property families directly labelled on-chart (RH %, wet-bulb, kJ/kg, m³/kg)
    instead of relying on a legend — exactly as the spec demands
  - 'Strong color hierarchy: brand green #009E73 for the prominent saturation curve,
    distinct Imprint hues per property family, red focal process path'
  - Theme-adaptive chrome threaded correctly — both light (#FAF8F1) and dark (#1A1A17)
    renders are fully readable with identical data colors
  - Canvas exactly 3200×1800 (gate passed); deterministic/no-RNG so fully reproducible
  weaknesses:
  - Upper-left convergence zone is dense — RH%, wet-bulb, enthalpy labels are staggered
    to mitigate this but still crowd slightly; a touch more separation would help
  - '''Cooling & dehumidification'' label at upper-right sits close to the specific-volume
    lines/labels — minor visual competition near the right margin'
  - Geom_text annotation sizes (4.2–4.6 mm) are on the small side; readable at full
    3200px but tighter when scaled to ~400px mobile width
  - Implementation defines helper functions for the psychrometric math (justified
    for the domain, but slightly off the strict KISS 'no functions' ideal)
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: bold dark title "psychrometric-basic · python · letsplot · anyplot.ai" top-left, dark axis titles "Dry-bulb temperature (°C)" / "Humidity ratio (g/kg)", soft-gray tick labels. All readable.
      Data: green saturation curve (#009E73) prominent as upper boundary; muted-gray inner RH curves with % labels; blue wet-bulb diagonals; ochre enthalpy lines labelled on left edge (kJ/kg); lavender specific-volume lines labelled on right edge (m³/kg); cyan comfort-zone polygon with bold "Comfort zone" label; red process arrow (cooling & dehumidification) with bold red caption and endpoint markers. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: light title and axis titles, soft light-gray ticks. All readable; no dark-on-dark issues.
      Data: identical data colors to light render — green saturation curve, blue wet-bulb, ochre enthalpy, lavender volume, cyan comfort zone, red process path. Only chrome flipped. Inner RH curves use a lighter muted gray so they stay visible on the dark surface.
      Legibility verdict: PASS
