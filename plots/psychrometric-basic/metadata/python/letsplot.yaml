review:
  strengths:
  - 'Complete spec coverage: prominent green saturation curve, inner RH curves, diagonal
    wet-bulb lines, oblique enthalpy lines, specific-volume lines, shaded comfort
    zone, and a labelled cooling+dehumidification process path with arrowhead — all
    computed from ASHRAE formulas at 101.325 kPa.'
  - 'Sophisticated design system: one Imprint hue per property family (green saturation,
    blue wet-bulb, ochre enthalpy, lavender volume, cyan comfort, red process) with
    subtle grey reference RH curves, creating clear visual hierarchy and a red focal
    point.'
  - Direct on-chart labelling of every property family (RH %, wet-bulb, enthalpy,
    volume) rather than relying on a legend, exactly as the spec requires.
  - 'Perfect theme adaptation: data colors identical across light/dark, chrome flips
    correctly, backgrounds are #FAF8F1 / #1A1A17, all text readable in both renders.'
  - Canvas is exactly 3200x1800; deterministic (no RNG); clean imports; correct PNG+HTML
    output.
  weaknesses:
  - The dense upper-left convergence zone packs many small labels (wet-bulb '0/10/20/30
    C wb', RH percentages) close to the saturation curve; at full resolution they
    are legible but become crowded and hard to read when scaled to ~400px mobile width
    — consider thinning labels further or nudging them apart.
  - In the dark render the red 'Cooling & dehumidification' annotation in the upper-right
    sits close to lavender specific-volume lines and a '30%' RH label, creating minor
    text-on-line crowding (readable, not overlapping severely).
  - Inner RH curves use the theme-adaptive INK_MUTED grey rather than a fixed Imprint
    data color, so that family changes color between light/dark; defensible as de-emphasized
    reference lines but worth noting against the 'data colors constant across themes'
    guideline.
  - Three domain helper functions (saturation_pressure, humidity_ratio, wet_bulb_line)
    deviate from the flat-script KISS preference — justified by the psychrometric
    math, but a minor CQ-01 deduction.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct.
      Chrome: dark bold title "psychrometric-basic · python · letsplot · anyplot.ai" top-left, dark axis titles "Dry-bulb temperature (°C)" / "Humidity ratio (g/kg)", grey tick labels (-10..50 x, 0..30 y), subtle grey grid — all clearly readable.
      Data: prominent thick green (#009E73) saturation curve forms the upper boundary (first series = brand green); grey inner RH curves labelled 10%-90%; blue (#4467A3) wet-bulb diagonals labelled "0/10/20/30 °C wb"; ochre (#BD8233) enthalpy lines labelled 10-60 kJ/kg on left edge; lavender (#C475FD) specific-volume lines labelled on right edge; cyan (#2ABCCD) comfort-zone polygon with "Comfort zone" label; red (#AE3030) process path with arrowhead and white-filled state points plus "Cooling & dehumidification" label.
      Legibility verdict: PASS (dense upper-left labels are small but readable at full size).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct.
      Chrome: light title and axis titles, light-grey tick labels, dark-grey subtle grid — all clearly readable, no dark-on-dark.
      Data: identical data colors to the light render (green saturation curve, blue wet-bulb, ochre enthalpy, lavender volume, cyan comfort, red process) — only chrome flipped. Brand green and red focal path both read well on the near-black surface.
      Legibility verdict: PASS (minor crowding of the red process label near lavender volume lines, still readable).
