review:
  strengths:
  - 'Exceptionally complete psychrometric chart: prominent thick saturation curve
    (100% RH), the full 10-100% RH family, diagonal wet-bulb and enthalpy lines, dotted
    specific-volume lines, a shaded comfort zone, and a highlighted cooling+dehumidification
    process path with state-point markers — every spec requirement is present.'
  - Thoughtful Imprint palette mapping where each moist-air property family gets one
    canonical hue (green RH/saturation as first series, lavender wet-bulb, blue enthalpy,
    ochre volume) and the matte-red process path is a deliberate semantic-emphasis
    focal point.
  - 'Strong visual hierarchy: faint dashed/dotted property grids recede while the
    bold green saturation boundary and red process path advance — the eye is guided
    immediately to the HVAC process story.'
  - All property lines labelled directly on the chart (not just a legend), satisfying
    the spec, with staggered RH-label placement to reduce convergence crowding near
    saturation.
  - Physically grounded data computed from ASHRAE 2017 saturation-pressure formulas
    at standard 101.325 kPa — fully deterministic and reproducible, no random seed
    needed.
  - Clean, flat KISS script; correct theme-adaptive chrome tokens; both light (#FAF8F1)
    and dark (#1A1A17) renders produced with identical data colors and only chrome
    flipped.
  weaknesses:
  - The red 'Outdoor Air' state-point marker (the filled dot at ~35°C) sits directly
    on top of the lavender '25°C WB' wet-bulb label in BOTH renders, partially obscuring
    the text (reads as '25°C \B'). Nudge the 25°C WB label offset (dx/dy) or the marker
    so they no longer collide — VQ-02.
  - 'Top-right label cluster is crowded: the green RH labels (100%, 80%, 60%, 50%)
    sit close to the ''0.94 m³/kg'' ochre label and ''30°C WB'' lavender label near
    the saturation apex. Labels stay distinguishable by color but the density is tight;
    consider thinning labelled RH curves or spreading anchor temperatures further.'
  - With 20+ small (10-11px) direct labels packed across a dense grid, readability
    degrades noticeably at the 400px mobile srcset width — inherent to a psychrometric
    chart, but worth a slightly larger size for the most important labels (RH %, saturation).
  - In the dark render the matte-red process-path labels ('Outdoor Air', 'Supply Air')
    are lower-contrast against the near-black background than the other chrome; still
    readable, but they are the least legible elements on dark.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: title "psychrometric-basic · python · altair · anyplot.ai" in dark ink, bold, fully readable; subtitle "Standard Atmosphere (101.325 kPa) · Moist-Air Properties for HVAC" in soft grey, readable. X-axis "Dry-Bulb Temperature (°C)" (-10..50) and Y-axis "Humidity Ratio (g/kg)" (0..30) labels and ticks dark/soft and clearly visible. Grid lines subtle (~15% opacity).
      Data: brand green #009E73 saturation curve (thick) + RH family; lavender dashed wet-bulb lines; blue dashed enthalpy lines; ochre dotted specific-volume lines; cyan shaded comfort zone with "Comfort Zone" label; matte-red process path with two state-point dots labelled "Outdoor Air (35°C, 50% RH)" and "Supply Air (13°C, 100% RH)". First series is #009E73 as required.
      Legibility verdict: PASS — minor: the red Outdoor-Air marker overlaps the "25°C WB" label, partially covering it (VQ-02), and the top-right label cluster is tight, but all text is otherwise readable.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and subtitle in light ink, fully readable; axis titles, tick labels and grid all light/soft and clearly visible against the dark surface — no dark-on-dark failures.
      Data: colors are identical to the light render (green, lavender, blue, ochre, cyan, matte red) — only chrome flipped. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS — same "25°C WB" marker overlap as light. The matte-red process labels are the lowest-contrast elements on dark but remain readable.
