review:
  strengths:
  - Exceptionally complete psychrometric chart — prominent thick saturation curve,
    full 10-100% RH family, lavender wet-bulb lines, blue enthalpy lines, ochre specific-volume
    lines, cyan shaded comfort zone, and a matte-red HVAC process path with two state-point
    markers, all directly labelled on the chart.
  - 'Thoughtful Imprint palette mapping: one canonical hue per moist-air property
    family with the matte-red cooling/dehumidification path as a deliberate semantic
    focal point; first series is brand green #009E73.'
  - Physically grounded ASHRAE-2017 saturation-pressure formulas over the standard
    atmosphere (101.325 kPa); fully deterministic, no RNG.
  - 'Correct theme-adaptive chrome — data colors identical across light/dark, only
    chrome flips; backgrounds are #FAF8F1 / #1A1A17 and canvas is exactly 3200x1800
    (gate passed).'
  - 'Idiomatic Altair: alt.layer composition ordered faint-grid-first/focal-last,
    detail grouping for multi-line families, declarative scales, plus interactive
    HTML tooltips.'
  weaknesses:
  - 'REGRESSION from attempt 1: the repair moved the ''25°C WB'' label to ~29°C where
    it now collides with the red ''Outdoor Air (35°C, 50% RH)'' focal annotation.
    In the DARK render the bright lavender ''25°C WB'' sits directly on top of ''50%
    RH'', making that part of the focal state-point label illegible (in light it is
    partially obscured but readable). Fix: push the red ''Outdoor Air'' text label
    clearly above the 25°C WB line (increase the negative dy, e.g. dy=-30), and/or
    move the ''25°C WB'' wet-bulb label down/left so the two no longer share the same
    screen region.'
  - Top-right label cluster (RH 100/80/60/50%, 0.94 m³/kg, 100 kJ/kg, 30°C WB) remains
    tight near the saturation apex; the green saturation curve passes through the
    '100%' glyphs. Distinguishable by color but crowded.
  - 20+ small (10-12px) direct labels degrade at the 400px mobile srcset width; the
    key RH/saturation labels could be bumped 1-2px.
  - Dark-render matte-red process labels are the lowest-contrast chrome elements;
    readable but the weakest on the near-black surface.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (correct), view fill matches page.
      Chrome: bold dark title "psychrometric-basic · python · altair · anyplot.ai" + soft-grey subtitle "Standard Atmosphere (101.325 kPa) · Moist-Air Properties for HVAC"; X-axis "Dry-Bulb Temperature (°C)" (-10..50), Y-axis "Humidity Ratio (g/kg)" (0..30) titles/ticks dark/soft, grid subtle ~15%. All chrome readable.
      Data: brand green #009E73 thick saturation curve + 10-90% RH family, lavender #C475FD dashed wet-bulb, blue #4467A3 dashed enthalpy, ochre #BD8233 dotted specific-volume, cyan #2ABCCD shaded comfort zone, matte-red #AE3030 process path with two state-point dots. First series is #009E73.
      Legibility verdict: FAIL (localized) — the lavender "25°C WB" label overlaps the red "Outdoor Air (35°C, 50% RH)" text; "50% RH" is partially obscured but still mostly readable here.

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (correct).
      Chrome: title, subtitle, axis titles, ticks and grid all flip to light/soft ink and are clearly readable — no dark-on-dark chrome failures. Brand green reads well on dark.
      Data: colors identical to the light render (only chrome flipped).
      Legibility verdict: FAIL — the bright lavender "25°C WB" label sits directly on top of the red "Outdoor Air (35°C, 50% RH)" focal annotation, rendering the "50% RH" portion illegible (the two text labels merge). A focal state-point label is broken on dark mode.
