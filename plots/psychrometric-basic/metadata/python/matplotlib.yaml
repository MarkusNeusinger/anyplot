review:
  strengths:
  - 'Complete spec coverage: saturation curve prominent, RH 10-100% family, wet-bulb/enthalpy/specific-volume
    line families, a numbered cool+dehumidify→reheat HVAC process path with arrows,
    and a shaded comfort zone — every required feature present'
  - 'Excellent legibility engineering: theme-adaptive path-effect halos behind every
    inline label keep text readable where curves cross, with line-style redundant
    encoding (solid RH / dashed WB / dash-dot enthalpy / dotted volume) aiding CVD
    users'
  - Direct on-chart labeling of all property lines (not just a legend) as the spec
    demands, with rotated labels following each curve's local angle via transform_rotates_text
  - 'Correct Imprint palette discipline: first family is brand green #009E73, plus
    blue/ochre/lavender/red all from the palette; backgrounds are exactly #FAF8F1
    / #1A1A17 and only chrome flips between themes'
  - Physically grounded data from ASHRAE/Buck formulas at 101.325 kPa over -10..50
    °C — deterministic and realistic
  - Clean flat KISS script, all imports used, idiomatic Axes-method usage with FancyArrowPatch,
    Polygon, and Line2D legend proxies
  weaknesses:
  - The chart is inherently information-dense; at a ~400px mobile thumbnail the 7.5pt
    inline rotated labels (RH %, enthalpy/volume numbers near the top) become hard
    to read — acceptable for a psychrometric chart but the upper-region label congestion
    is the main legibility limit
  - Minor crowding in the upper-left where the 100%/90%/80% RH labels meet the high
    enthalpy lines, and the 'Cool + dehumidify → reheat' annotation crosses several
    property lines (halos keep it readable, but it adds visual busyness)
  - On the dark render the wet-bulb blue (#4467A3) dashed lines sit slightly dim against
    the near-black surface compared with the other families — still visible but the
    lowest-contrast element; consider nudging brightness for dark theme
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — not pure white, not dark. PASS.
      Chrome: dark title "psychrometric-basic · python · matplotlib · anyplot.ai" centered and readable; dark axis labels "Dry-Bulb Temperature (°C)" and "Humidity Ratio (g/kg dry air)"; subtle grid; legend top-left with elevated cream frame, all five entries readable. All chrome readable.
      Data: brand green (#009E73) RH family with a prominent thick saturation curve forming the upper boundary; blue dashed wet-bulb lines; ochre dash-dot enthalpy lines; lavender dotted specific-volume lines; matte-red HVAC process path with numbered points 1→2→3 and arrows; gray shaded "Comfort zone" rectangle. First series is #009E73. Inline labels carry off-white halos.
      Legibility verdict: PASS — dense but every element readable at full size; thumbnail-scale inline labels get small (inherent to the chart type).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black, not light. PASS.
      Chrome: light title and axis labels clearly visible; light tick labels; subtle light grid; legend with dark elevated frame and light text. No dark-on-dark failures.
      Data: identical data colors to the light render (green RH, blue WB, ochre enthalpy, lavender volume, red process, gray comfort zone) — only chrome flipped. Brand green very visible. Wet-bulb blue is the dimmest family on the dark surface but still legible.
      Legibility verdict: PASS — all text readable against the dark background; no dark-on-dark text.
