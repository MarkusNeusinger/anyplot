review:
  strengths:
  - 'Complete spec coverage: saturation curve, 10-100% RH curves, wet-bulb, enthalpy
    and specific-volume lines, comfort zone band, and a cooling/dehumidification process
    arrow with state points and Δh annotation — all property families labeled directly
    on the chart.'
  - 'Physically grounded data: real ASHRAE saturation-pressure coefficients and standard
    sea-level pressure (101.325 kPa), giving authentic, neutral, domain-correct curve
    shapes.'
  - 'Strong visual hierarchy: prominent thick green saturation boundary (#009E73,
    first series) vs. thinner, alpha-reduced secondary families, with redundant linestyle
    encoding (solid/dashed/dotted/dashdot) reinforcing color.'
  - 'Imprint palette used correctly and identically across both themes; only chrome
    flips. Backgrounds are correct (#FAF8F1 / #1A1A17).'
  - 'Idiomatic bokeh: ColumnDataSource, Band, Arrow/VeeHead, Label/Title models, headless-Chrome
    CDP capture with captureBeyondViewport to hit the exact 3200x1800 canvas.'
  weaknesses:
  - 'Upper-right saturation corner is crowded: RH labels (50-90%), wet-bulb labels
    (20-25°C wb) and curves cluster tightly; readable at full resolution but near-overlapping
    and likely illegible when scaled to ~400px mobile width.'
  - 'On the dark render the wet-bulb blue (#4467A3) lines/labels and the matte-red
    (#AE3030) process path are low-contrast against #1A1A17 — visible but the weakest
    elements; an optional thin ink/lighter stroke on the process arrow + state-point
    labels would lift contrast without changing palette identity.'
  - The 'Cooling & dehumidification Δh = 41.2 kJ/kg' callout overlaps several background
    property lines; its ELEVATED_BG box is nearly transparent (alpha 0.85 but blends),
    so the text sits over line clutter — bump background_fill_alpha for cleaner separation.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct — not pure white.
      Chrome: bold dark title "psychrometric-basic · python · bokeh · anyplot.ai" plus italic INK_SOFT subtitle "Standard atmosphere (101.325 kPa) · ASHRAE psychrometric properties"; axis titles "Dry-Bulb Temperature (°C)" and "Humidity Ratio (g water / kg dry air)" with dark ticks. All chrome clearly readable. Full box outline present (appropriate for this technical chart).
      Data: thick green saturation curve (#009E73) with 10-100% RH curves in same green; blue dashed wet-bulb lines; lavender dotted enthalpy lines; ochre dash-dot specific-volume lines; cyan shaded "Comfort Zone" band; red process arrow from "Outdoor Air (33°C, 55% RH)" to "Supply Air (14°C, 90% RH)" with red state markers and Δh label. First series green confirmed.
      Legibility verdict: PASS (upper-right label cluster is dense but readable at full res).

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct — not pure black.
      Chrome: title and subtitle in light ink, axis/tick labels light and readable. No dark-on-dark failures.
      Data: identical data colors to the light render (green RH/saturation, blue wet-bulb, lavender enthalpy, ochre specific-volume, cyan comfort band, red process path) — only chrome flipped. Blue wet-bulb lines and the matte-red process path are the lowest-contrast elements on the dark surface but remain visible.
      Legibility verdict: PASS (minor: blue wet-bulb + red process path are low-contrast on dark, but legible).
