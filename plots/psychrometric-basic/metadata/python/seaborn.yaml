review:
  strengths:
  - 'Complete spec coverage: saturation curve (prominent at lw=2.6), RH curves 10-100%,
    wet-bulb isotherms, constant-enthalpy and specific-volume lines, comfort-zone
    polygon, and a multi-segment HVAC process path with labelled state points A/B/C'
  - 'Imprint palette used correctly: most-prominent family (relative humidity) is
    brand green #009E73; secondary families use canonical Imprint colours; both light
    (#FAF8F1) and dark (#1A1A17) chrome render correctly'
  - 'Colourblind-safe encoding: each property family pairs a distinct hue with a distinct
    linestyle (solid/dashed/dash-dot/dotted), so families remain distinguishable without
    colour'
  - 'Idiomatic seaborn: each property family drawn as a single sns.lineplot with units=+estimator=None
    to render one polyline per level; sns.set_theme threads theme tokens; sns.despine
    cleans spines'
  - Direct on-chart labelling of every property family (per spec) plus a clean upper-left
    legend placed in the physically-unreachable cold+humid empty zone
  - Clean, flat, reproducible script (seed set, no functions/classes, only used imports),
    correct canvas (8x4.5@400 -> 3200x1800), no bbox_inches='tight'
  weaknesses:
  - 'Label crowding near the top of the chart: the high-RH percentage labels (100%/90%/80%/70%)
    converge as the curves approach the saturation line and sit close to each other
    and to nearby enthalpy/specific-volume labels — readable but visually busy. Consider
    nudging high-RH labels apart or anchoring them at a lower y so they fan out.'
  - Property-line labels are small (6.5-7pt); at full 3200px they are legible but
    would be hard to read when the image is scaled to ~400px on mobile. Slightly larger
    labels or fewer intermediate labels would improve mobile legibility.
  - The 'Comfort zone' caption sits very close to the 'C - room 24C/50%' state-point
    label and the lavender process path; they remain distinct but the cluster is tight
    — a small offset would give more breathing room.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across figure and axes. PASS.
      Chrome: dark title "psychrometric-basic · python · seaborn · anyplot.ai", dark axis labels ("Dry-bulb temperature (°C)", "Humidity ratio (g/kg dry air)"), soft-ink tick labels — all clearly readable. Subtle grid. Legend (upper-left) on elevated #FFFDF6 panel with ink-soft text, readable.
      Data: relative-humidity curves in brand green #009E73 with a thick saturation boundary; wet-bulb blue dashed (#4467A3); enthalpy red dash-dot (#AE3030); specific volume ochre dotted (#BD8233); comfort-zone cyan shaded rectangle (#2ABCCD); lavender (#C475FD) process-path arrows with state points A/B/C. First/most-prominent series is #009E73. PASS.
      Legibility verdict: PASS — all chrome readable; only minor crowding of small property labels near the top.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17). PASS.
      Chrome: light title and axis labels (#F0EFE8), light-soft tick labels — all clearly readable, no dark-on-dark. Legend on dark elevated panel (#242420) readable. PASS.
      Data: identical data colours to the light render (green RH, blue wet-bulb, red enthalpy, ochre specific volume, cyan comfort zone, lavender process path) — only chrome flipped. Brand green and all families remain clearly visible on the dark surface. PASS.
      Legibility verdict: PASS — no dark-on-dark failures; same minor top-region label crowding as light.
