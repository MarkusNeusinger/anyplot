review:
  strengths:
  - 'Complete psychrometric chart: saturation curve (prominent thick brand green),
    10-90% RH curves, wet-bulb, enthalpy (lavender dashed), and specific-volume (ochre
    dotted) families all present and color/linetype-coded for instant distinction.'
  - Strong data storytelling — a red HVAC cooling+dehumidification process arrow runs
    from state A (35°C) down into the cyan-shaded comfort zone at state B (24°C),
    creating a clear focal point.
  - Properties are labeled directly on the chart (RH %, kJ/kg, °C wb, m³/kg) per the
    spec, not just in a legend; legend is disabled.
  - Physically grounded data from Magnus/ASHRAE formulas at 101.325 kPa over -10 to
    50°C — realistic, neutral HVAC context.
  - 'Excellent theme adaptation: data colors identical across light/dark, only chrome
    flips; backgrounds are correct #FAF8F1 / #1A1A17 and all text stays readable in
    both.'
  - 'Idiomatic grammar-of-graphics: layered geoms with geom_ribbon for the comfort
    band, geom_segment with a closed arrow for the process path, and a clean linear
    KISS script with deterministic data.'
  weaknesses:
  - 'Label collision in the lower-right corner: the wet-bulb label ''10°C wb'' overlaps
    the specific-volume label ''0.86 m³/kg'' (renders as ''10°C w0.86 m³/kg''). Nudge
    one label''s t/w offset or drop one to clear the overlap (VQ-02).'
  - Direct property labels are small (geom_text size=3.0 mm ≈ 8.5 pt) on a dense chart;
    legible at full 3200×1800 but borderline when scaled to a ~400 px thumbnail. Consider
    size~3.4-3.8 for the most important labels (RH %) to improve mobile legibility
    (VQ-01).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: black bold title "psychrometric-basic · python · plotnine · anyplot.ai" centered and fully visible; axis titles "Dry-Bulb Temperature (°C)" / "Humidity Ratio (g/kg dry air)" and grey tick labels (-10..50, 0..30) all clearly readable; grid subtle and visible.
      Data: thick brand-green (#009E73) saturation curve forms the prominent upper boundary, lighter green RH curves below it; blue (#4467A3) wet-bulb lines, lavender (#C475FD) dashed enthalpy lines, ochre (#BD8233) dotted specific-volume lines; cyan (#2ABCCD) shaded comfort-zone polygon; red (#AE3030) process arrow A->B with state points. First series is #009E73.
      Legibility verdict: PASS (one minor label overlap at lower-right: "10°C wb" vs "0.86 m³/kg").

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: off-white bold title and light tick/axis labels clearly readable against the dark surface; no dark-on-dark failures; grid subtle and visible.
      Data: colors identical to the light render (only chrome flipped) — brand-green saturation curve still prominent and readable on dark, all property families and the red process arrow distinct.
      Legibility verdict: PASS (same minor lower-right label overlap as light).
