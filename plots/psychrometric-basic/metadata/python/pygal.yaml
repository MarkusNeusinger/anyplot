review:
  strengths:
  - 'Complete psychrometric feature set: saturation curve emphasized (stroke width
    6.0), RH curves 10-100%, dashed wet-bulb, dash-dot enthalpy, dotted specific-volume,
    comfort-zone polygon, and a red cooling+dehumidification process path with A/B
    state markers.'
  - ASHRAE 2017 saturation-pressure formulas with correct sea-level pressure (101.325
    kPa) produce physically accurate, neutral, real-world HVAC data.
  - Direct on-chart labels rotated to each line's local slope, with a page-background
    halo (paint-order stroke) keeping them legible where they cross dense line families.
  - Distinct hue family per property type (blue RH, cyan wet-bulb, lavender specific-volume,
    ochre enthalpy, green comfort, red process) plus differing dash patterns give
    strong CVD-safe separation.
  - 'Correct title format, theme-adaptive chrome (#FAF8F1 / #1A1A17), data colors
    identical across both themes, and exact 3200x1800 canvas.'
  - Clean KISS linear script, deterministic, only-used imports; clever but well-commented
    SVG post-processing to achieve direct labels pygal cannot natively place.
  weaknesses:
  - 'Central region is crowded: ''Comfort Zone'', ''B - 24°C, 50% RH'', the 40%/60%
    RH labels and ''Tw 15°C'' cluster tightly near the comfort polygon. Halo strokes
    keep each individually readable but the band is busy — consider nudging the comfort-zone
    and B-state labels apart or lowering the comfort label further.'
  - In-chart property labels are small (30-36 source px); at the ~400 px mobile thumbnail
    they become hard to read. Axis/title text scales fine, but the dense in-chart
    annotations are the weak point when downscaled.
  - Specific-volume (lavender) labels sit low-left in a tight area; v lines and labels
    are the least visually prominent family.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: title "psychrometric-basic · python · pygal · anyplot.ai" in dark ink, x-title "Dry-Bulb Temperature (°C)", y-title "Humidity Ratio (g/kg)", tick labels -10..50 and 0..30 all clearly readable; grid subtle and visible.
      Data: blue RH curves (saturation/100% thickest), cyan dashed wet-bulb (Tw), ochre dash-dot enthalpy (h), lavender dotted specific-volume (v), green comfort-zone polygon (first series = #009E73), red A→B cooling/dehumidification path with state dots. All families distinguishable.
      Legibility verdict: PASS — all text readable; central labels crowded but legible via halo strokes.

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: title and axis/tick labels in light ink, clearly readable; grid subtle and visible. No dark-on-dark failures.
      Data: identical data colors to the light render — only chrome flipped. Brand green still visible; red/cyan/lavender/ochre/blue all hold on the dark surface.
      Legibility verdict: PASS — all text readable; same mild central crowding as light render.
