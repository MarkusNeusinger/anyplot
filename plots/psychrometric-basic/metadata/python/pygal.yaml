review:
  strengths:
  - Genuine psychrometric chart computed from ASHRAE 2017 saturation-vapour formulas
    (split branches above/below 0 °C) — not a fake/approximate plot, so every property
    family is thermodynamically correct
  - 'All five property families present and visually differentiated by both hue and
    dash pattern: solid blue RH curves, dashed cyan wet-bulb, dotted lavender specific-volume,
    dash-dot ochre enthalpy, plus the 100% saturation curve drawn thickest (width
    6) as the prominent upper boundary'
  - 'Spec extras fully covered: shaded green comfort zone (20–26 °C, 30–60% RH) as
    a true RH-bounded polygon, plus a highlighted red cooling & dehumidification process
    path with A/B state-point markers'
  - Direct on-chart labels for every family (RH %, Tw, h, v, Comfort Zone, state points),
    rotated to follow each diagonal line slope, each with a page-background halo stroke
    (paint-order:stroke) so they stay readable over the dense line web — satisfies
    the spec requirement to label lines directly, not just in a legend
  - 'Flawless theme adaptation: chrome flips correctly between #FAF8F1 and #1A1A17
    while the Imprint data colors stay identical; comfort zone first series = brand
    green #009E73; no dark-on-dark or light-on-light failures'
  - Canvas exactly 3200×1800 (gate passed); title in the exact mandated format; deterministic
    (formula-driven, no RNG); clean imports all used
  weaknesses:
  - Central comfort-zone region is information-dense — B/60%/40%/Comfort Zone/h=40/Tw
    15°C/v=0.84 labels sit close together; legible at full size thanks to the halo
    strokes but would compress when the chart is scaled to ~400 px mobile width
  - Specific-volume lines use a very sparse dotted dasharray (2,9) making them faint
    and easy to miss compared to the other families — consider a slightly denser dash
    or marginally higher stroke width
  - Library mastery is partly carried by hand-authored SVG post-processing (string
    .replace to inject rotated <text> and tweak fill-opacity) rather than native pygal
    APIs — necessary because pygal lacks rotated direct labels, but it leans outside
    idiomatic pygal usage
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1, correct light surface.
      Chrome: title "psychrometric-basic · python · pygal · anyplot.ai" in dark ink, centered and fully visible; axis titles "Dry-Bulb Temperature (°C)" (x) and "Humidity Ratio (g/kg)" (y) readable; tick labels -10..50 and 0..30 dark and crisp; subtle grid guides. All readable.
      Data: solid blue (#4467A3) relative-humidity curves with the 100% saturation line thickest as the upper boundary; dashed cyan (#2ABCCD) constant wet-bulb lines; dotted lavender (#C475FD) specific-volume lines; dash-dot ochre (#BD8233) constant-enthalpy lines; green (#009E73) shaded comfort-zone polygon (first series = brand green); bold red (#AE3030) cooling & dehumidification process path from A (35°C,60%RH) to B (24°C,50%RH) with round state markers. Direct rotated labels with off-white halo strokes ride each family.
      Legibility verdict: PASS — halo strokes keep all on-chart labels legible over the dense line network.

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17, correct dark surface.
      Chrome: same title/axis titles/ticks now in light ink (#F0EFE8 / muted), all clearly visible; grid guides subtle but present. No dark-on-dark text anywhere.
      Data: data colors are IDENTICAL to the light render (blue RH, cyan wet-bulb, lavender specific-volume, ochre enthalpy, green comfort zone, red process path) — only chrome flipped. Brand green #009E73 reads well on the dark surface. Label halos are page-background near-black, still keeping colored labels legible.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome and data labels readable.
