review:
  strengths:
  - 'Title matches mandated format exactly: ''line-basic · javascript · echarts ·
    anyplot.ai'''
  - 'Brand green #009E73 used for the single data series; chrome flips correctly between
    light (#FAF8F1) and dark (#1A1A17) while data color stays identical'
  - Clean theme-adaptive chrome via t.ink / t.inkSoft / t.grid tokens — no white-on-white
    or dark-on-dark failures
  - 'Idiomatic ECharts: animation: false, transparent background, top-level color
    from palette, splitLine for subtle grid, axisLine hidden on Y-axis for a minimal
    frame'
  - Deterministic data generation with a fixed-seed LCG plus weekly seasonality on
    top of a trend — realistic 'daily unique visitors' signal
  - Canvas renders exactly at 3200×1800 (landscape gate passes)
  weaknesses:
  - Y-axis starts at 0 while all data sits between ~1800 and ~3300, leaving the bottom
    ~50% of the plot area empty and visually flattening the trend. Consider setting
    yAxis.min to a value like 1500 (or omitting min so ECharts auto-scales) so the
    line uses more vertical space and the weekly seasonality reads more clearly.
  - 'Series uses smooth: 0.25 even though the spec describes ''straight lines''. For
    a basic line plot, either set smooth: false (or drop the property) to keep the
    line literal, or commit to a stronger smoothing only if the design rationale is
    clear.'
  - Design lacks a focal point or storytelling emphasis (DE-03) — for example, marking
    the latest value, highlighting the peak, or adding a faint trend annotation could
    lift the design from 'clean default' to 'distinctive'.
  - 'LM-02: implementation only lightly touches ECharts-specific features (smooth,
    emphasis.focus, finished event). Could showcase more distinctive ECharts capabilities
    such as markPoint/markLine for peak/min, a visualMap for value-based color, or
    an area-style fill for emphasis.'
