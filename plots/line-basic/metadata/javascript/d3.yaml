review:
  strengths:
  - 'Brand-correct: line stroke and area-fill gradient both anchored to Imprint palette[0]
    (#009E73); data colors identical in light and dark renders, only chrome flips.'
  - Theme-adaptive chrome is flawless — warm off-white (#FAF8F1) light surface and
    warm near-black (#1A1A17) dark surface, with title, axis labels, ticks, and gridlines
    all reading clearly in both renders (no dark-on-dark or light-on-light failures).
  - 'Refined chrome: top/right spines absent, bottom domain removed, only the y-axis
    spine kept; gridlines are subtle horizontals at ~15% contrast — minimal-chartjunk
    discipline.'
  - Descriptive title prefix 'Spring Warming Trend · ' adds narrative context beyond
    the mandated suffix, and the emphasized endpoint marker + '19.1°' annotation creates
    a visible focal point.
  - 'Idiomatic D3: scaleTime + scaleLinear, axisBottom/axisLeft with d3.timeWeek tick
    generator and d3.timeFormat, d3.area + d3.line with curveMonotoneX, defs+linearGradient
    for the fill — all high-level D3 patterns, no manual SVG arithmetic.'
  - Deterministic data via inline LCG (seed=42) — no fetch/csv/json, fully self-contained
    snippet honoring the no-network rule.
  - Canvas exactly 3200×1800 with svg sized from window.ANYPLOT_SIZE; orientation
    directive on its own line so the header-rewrite preserves it.
  weaknesses:
  - 'Storytelling focal point is slightly off-message: the emphasized endpoint at
    19.1° is not the data peak (the line crests near 22° around Mar 25 and dips back
    at month-end), so labelling the final point as the trend anchor under-sells the
    ''Spring Warming Trend'' framing. Consider annotating the peak instead, or adding
    a thin trend/regression guideline to make the upward direction the focal point
    rather than a single endpoint value.'
  - 'DE-01 polish ceiling: the chart is clean and on-brand but stops at a conventional
    area-under-line treatment. Small touches like a faint baseline rule at 0° (or
    the monthly mean), a date-aligned annotation for the warmest day, or marker shape
    de-emphasis on interior points would push aesthetic sophistication higher without
    adding chartjunk.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — confirmed, not pure white, not dark.
      Chrome: Title "Spring Warming Trend · line-basic · javascript · d3 · anyplot.ai" rendered in dark ink, centred, ~70% of canvas width. Y-axis tick labels 6° through 24° in soft ink; x-axis tick labels Mar 01 through Mar 29 in soft ink. Axis labels "Date (March 2026)" (bottom) and "Daily high temperature (°C)" (left, rotated) in primary ink. Horizontal gridlines subtle at ~15% contrast. Y-axis spine retained; top/right/bottom spines absent. All chrome clearly readable against the cream surface.
      Data: Single line in brand green #009E73 (Imprint palette[0]) with a vertical gradient area fill (22% → 2% green) from line to baseline. Interior markers as small green dots with cream stroke. Emphasized endpoint marker at right edge (radius 9) with adjacent "19.1°" label in primary ink. Line uses curveMonotoneX for a smooth, monotonic spring-warming trajectory rising from ~9° on Mar 01 to a ~22° crest around Mar 25 then settling at 19.1° on Mar 31.
      Legibility verdict: PASS — every text element (title, axis labels, tick labels, endpoint annotation) is fully legible against the warm cream background; no clipping, no overflow.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — confirmed, not pure black, not light.
      Chrome: Same title, axis labels, and tick labels as the light render but in light ink tokens — title in primary light, ticks in soft light. Gridlines are subtle light horizontals at ~15% contrast — visible but not dominant. Y-axis spine in soft light. No dark-on-dark elements detected; all text reads cleanly against the warm near-black surface.
      Data: Brand green #009E73 line is IDENTICAL to the light render — same hue, same opacity, same stroke width, same curveMonotoneX trajectory, same interior markers, same emphasized endpoint at 19.1°. Only the area-fill gradient and marker stroke colour adapt to the dark page background. The Imprint brand green continues to read with strong contrast against the warm near-black surface.
      Legibility verdict: PASS — title, axis labels, tick labels, and the endpoint "19.1°" annotation are all clearly readable in light ink; no dark-on-dark failures, no clipping.
