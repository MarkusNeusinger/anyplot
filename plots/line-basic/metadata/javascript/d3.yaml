review:
  strengths:
  - 'Imprint palette + theme tokens wired correctly: t.palette[0] for the line, t.ink/t.inkSoft
    for title vs ticks, t.grid for gridlines, t.pageBg for marker punch-out — both
    renders pass the dark/light legibility check cleanly'
  - 'Idiomatic D3: scaleTime + scaleLinear, monotone-curve d3.line, axis-call gridline
    pattern (d3.axisLeft(y).tickSize(-iw).tickFormat('''')), .selectAll().data().join()
    for markers'
  - Reproducible data with a tiny inline LCG (seed=42), in-memory generation with
    sensible trend + wobble — no fetches, no CDN, fully offline-safe
  - Canvas sized from window.ANYPLOT_SIZE (3200x1800 exact); title format conforms
    to {Descriptive Title} · {spec-id} · {language} · {library} · anyplot.ai
  weaknesses:
  - 'No data storytelling: a single brand-green line with no annotation, callout,
    or visual emphasis on the warming inflection around Mar 15 — costs DE-03. Fix
    by adding an annotation at the Mar 15->22 rise or a labeled endpoint marker at
    March 31.'
  - 'Aesthetic polish is functional rather than distinctive: domain spines and tick
    lines still drawn (thin but present), no faint area fill under the line, no endpoint
    emphasis. Consider dropping the bottom axis .domain or adding a 15% opacity area
    fill in t.palette[0] under the line to give it presence without ink-heaviness.'
  - 'Distinctive D3 affordances are underused: no defs/linearGradient (a cool->warm
    stroke gradient would be semantically meaningful for a warming-temperature dataset),
    no curveBasis variant, no emphasized endpoint with value label. Costs LM-02.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface around #FAF8F1 — not pure white, not dark; matches the Imprint light token.
      Chrome: Bold dark-ink title "Spring Warming Trend · line-basic · javascript · d3 · anyplot.ai" centered at top; soft-ink Y-axis tick labels (6° to 24° in 2° steps) and X-axis ticks (Mar 01, 08, 15, 22, 29); darker-ink axis titles "Daily high temperature (°C)" (rotated, left) and "Date (March 2026)" (centered, bottom); subtle horizontal y-gridlines. All text clearly readable against the off-white background.
      Data: Smooth monotone curve in Imprint brand green #009E73 (palette[0]), ~3.5px stroke, with small circle markers (radius 4) stroked in pageBg for a punched-out look. Trend rises ~9°C -> 22°C across the month with a noticeable inflection around Mar 15.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black surface around #1A1A17 — not pure black, not light; matches the Imprint dark token.
      Chrome: Title is rendered in near-white bold ink; axis titles in near-white; tick labels in soft slate ink; gridlines subtle but visible. No dark-on-dark failures — every text element is clearly legible against the dark surface.
      Data: Identical Imprint brand green #009E73 line + markers as the light render — only chrome flipped. Marker stroke uses pageBg (now dark) so markers read as filled green dots on the dark surface. Brand green still has strong contrast on the near-black surface.
      Legibility verdict: PASS
