review:
  strengths:
  - Title format matches the mandated `{spec-id} · {language} · {library} · anyplot.ai`
    exactly and is legible in both themes.
  - Single series uses `t.palette[0]` (#009E73 brand green) — Imprint palette compliance
    is correct and data colour is identical between light and dark renders.
  - 'Theme-adaptive chrome is wired through cleanly: `t.ink` for title/axis-titles,
    `t.inkSoft` for ticks and axis borders, `t.grid` for grid lines. No dark-on-dark
    or light-on-light failures.'
  - Deterministic LCG (seed=42) gives reproducible monthly noise across renders —
    no `Math.random()`.
  - Two full seasonal cycles (24 months) make the temperature trend immediately readable;
    data is realistic, neutral, and well-scaled for Berlin (≈ -3°C to 23°C).
  - Y-tick callback appends `°C` per tick — units are visible without bloating the
    axis title.
  - Markers are appropriately prominent (pointRadius=5, borderWidth=3.5) for sparse
    data (24 points), and the white/page-bg point border gives clean separation.
  - 'Canvas directive is `//# anyplot-orientation: landscape` and renders at exactly
    3200×1800 — passes the canvas dimension gate.'
  - 'Mandatory Chart.js rules respected: `responsive: true`, `maintainAspectRatio:
    false`, `animation: false`.'
  weaknesses:
  - 'Visual refinement is minimal — both renders still show the Chart.js default left
    and bottom axis border, and no top/right spines are explicitly suppressed. Setting
    `scales.x.border.display: false` / `scales.y.border.display: false` (or styling
    the borders more subtly) would lift DE-02.'
  - Y-axis title 'Berlin mean temperature' could be slightly more descriptive — consider
    'Mean monthly temperature, Berlin' or similar. Units already appear on ticks (°C),
    so adding a redundant '(°C)' is not required, but the phrasing is slightly truncated.
  - 'Library mastery is on the floor: this is a straight-down-the-middle Chart.js
    line chart with no distinctive features (no smoothed/stepped variant, no fill
    area below the line, no annotation plugin, no point styling per season). LM-02
    stays at the default 1/5.'
  - No visual storytelling beyond the data itself — no emphasis on summer peaks or
    winter troughs (e.g. colour-coded markers for max/min, subtle annotation of the
    seasonal peak). DE-03 stays low.
  - X-axis label 'Month' is a single short word at fontsize=22pt — proportional but
    borderline oversized for the information content. Could drop to ~18pt to match
    the visual weight of the data it labels.
