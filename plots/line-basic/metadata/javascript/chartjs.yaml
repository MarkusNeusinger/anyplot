review:
  strengths:
  - 'Brand green #009E73 used correctly as first (and only) series via t.palette[0],
    identical across light and dark.'
  - 'Focal-point storytelling: pointRadius/pointBorderWidth arrays enlarge markers
    at the per-cycle summer peak and winter trough, giving the line a clear narrative
    without annotations.'
  - 'Subtle low-alpha fill (rgba(0,158,115,0.12)) below the line reinforces brand
    color while staying readable against both #FAF8F1 and #1A1A17 backgrounds.'
  - Theme tokens (t.ink / t.inkSoft / t.grid / t.pageBg) are threaded through to title,
    axis titles, ticks, grid, and point borders — chrome flips correctly between themes
    while data colors stay constant.
  - 'L-shaped frame achieved by removing axis borders (border: { display: false })
    and the x-axis grid (grid: { display: false }) — only the subtle y-axis grid remains,
    matching the style-guide preference for line charts.'
  - Deterministic LCG (seed = 42) reproduces noise across renders; 24 monthly points
    span two full seasonal cycles, giving enough detail to read the trend without
    clutter.
  - Realistic, neutral context (Berlin monthly mean temperature) with plausible -2
    to 23 C range; tick callback adds the C unit on the y-axis so the axis title doesn't
    have to repeat it.
  - 'animation: false and the canvas-mount contract are honored exactly per the chartjs
    library prompt — no canvas sizing, no width/height overrides, no fetches.'
  weaknesses:
  - 'Axis-title fontsize asymmetry: y-axis title is set to 22pt while x-axis title
    is 18pt. The y-axis title ''Mean monthly temperature, Berlin'' visually outweighs
    the x-axis title ''Month'' — bring them to a matching size (e.g. both 18pt) so
    the two axis titles read as a balanced pair.'
  - 'Title weight is explicit ''normal''; the style guide calls for bold or medium
    weight on titles to anchor the typographic hierarchy. Consider font: { size: 32,
    weight: ''600'' } (or ''bold'') so the title sits clearly above axis titles in
    the hierarchy.'
  - 'LM-02 distinctive-features room to grow: per-point pointRadius/pointBorderWidth
    arrays are already a Chart.js-distinctive technique, but a small touch like segment.borderColor
    (to color the descending vs ascending segments) or a custom afterDraw plugin labeling
    the peak/trough values would push library mastery higher without losing the minimalist
    look.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white at #FAF8F1 (not pure white).
      Chrome: title 'line-basic · javascript · chartjs · anyplot.ai' rendered in dark ink at the top center; x-axis title 'Month' (18pt) and y-axis title 'Mean monthly temperature, Berlin' (22pt) both rendered in dark ink; tick labels in medium-grey inkSoft (Jan '24 - Nov '25 along x; -5 C to 25 C in 5 C steps along y, with the C unit appended via a tick callback); subtle horizontal y-axis grid in the rule color; no x-axis grid; no axis borders. All chrome readable against the off-white background.
      Data: single brand-green line (#009E73) with tension 0.3 tracing two full seasonal cycles (Jan '24 - Dec '25); subtle low-alpha green fill ('rgba(0,158,115,0.12)') below the line down to the y=0 origin; circular markers at every month in brand green with white-equivalent (pageBg-colored) borders; markers at the two summer peaks (Jul '24, Jul '25) and the two winter troughs (around Jan '25 and Dec '24) are visibly enlarged (radius 8 vs 5) with a thicker border.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black at #1A1A17 (not pure black).
      Chrome: title rendered in light ink ('#F0EFE8') at the top; both axis titles in light ink; tick labels in light inkSoft; y-axis grid in the dark-theme rule color (light at low alpha); no x-axis grid; no borders. All chrome reads cleanly — no dark-on-dark failures, no near-black text on near-black background.
      Data: identical brand-green line (#009E73) — colors are unchanged from the light render, only chrome has flipped; the subtle green fill below the line is still visible as a faint area against the warm near-black surface; marker borders use the dark theme pageBg (#1A1A17) so the brand-green dots read as filled disks with a thin dark halo, matching the light render structurally.
      Legibility verdict: PASS.
