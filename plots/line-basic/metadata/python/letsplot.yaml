review:
  strengths:
  - 'Correct Imprint palette with brand green #009E73 as sole series; theme-adaptive
    chrome (INK/INK_SOFT tokens) correctly threads through title, axis labels, and
    tick labels in both light and dark renders'
  - Area fill (geom_area, alpha=0.15) adds tasteful depth to the basic line chart
    without cluttering the data layer
  - Peak temperature point highlighted with a larger marker (size=7 vs size=4 for
    regular points) — creates a clear focal point and elevates the storytelling above
    a plain line
  - 'Perfect spec compliance: correct canvas (ggsize 800×450, scale=4 → 3200×1800),
    all required features present, title format exact'
  - 'Clean idiomatic letsplot code: grammar-of-graphics layering, layer_tooltips()
    for native interactive tooltips, HTML export alongside PNG — KISS structure with
    seed for reproducibility'
  weaknesses:
  - 'LM-02 (Library Distinctive Features) is underutilised: layer_tooltips() shows
    awareness of letsplot interactivity but the tooltip template is minimal (two plain
    .line() calls). Consider richer tooltip formatting (e.g., .format() for the temperature,
    a header line) or using a letsplot-specific feature such as geom_smooth() or annotation_loess
    for trend emphasis — something that truly could not be replicated line-for-line
    in plotnine'
  - 'DE-01/DE-03: the peak-point emphasis is a good start but the storytelling could
    be stronger. Adding a short geom_text label (''Jul: 29.3°C'') directly on the
    peak marker would make the data narrative explicit and push DE-01 from a ''well-configured
    default'' toward a truly polished design. For a line-basic chart this is an accessible
    addition that requires no extra dependencies'
  - 'DE-02: the area fill colour in the dark render is a very dark semi-transparent
    teal (alpha=0.15 green on #1A1A17) — barely distinguishable from the background.
    Consider using a slightly higher alpha for dark mode (e.g. 0.20) or conditioning
    the alpha on THEME, so the area fill reads clearly in both renders without being
    heavy in the light theme'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "line-basic · python · letsplot · anyplot.ai" renders in dark near-black INK at 16pt, spanning ~42-45% of canvas width (title is 44 chars, shorter than the typical 67-char form so this is expected). Y-axis label "Temperature (°C)" and X-axis label "Month" are dark, size 12, clearly readable. Tick labels (months 1-12; temperature 0,5,10,…,30) are in INK_SOFT (#4A4A44), size 10, all fully legible. Subtle horizontal grid lines at each Y tick (rgba with 15% opacity). Spines removed top/right (via theme_minimal).
      Data: Brand green #009E73 line connecting 12 monthly data points. Circular markers at size=4, alpha=0.9. A mint-green filled area (BRAND, alpha=0.15) spans below the line to y=0 — clearly visible as a light mint region. The peak point at month 7 (~29.3°C) is rendered with a larger marker (size=7), creating a distinct focal point.
      Legibility verdict: PASS — all text is readable; no light-on-light failures; data clearly visible against the warm cream background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, and tick labels all render in light/cream-coloured text (INK = #F0EFE8, INK_SOFT = #B8B7B0 for ticks). No dark-on-dark failures observed. Grid lines are subtly visible (rgba(240,239,232,0.15) on dark background).
      Data: Data colours are identical to the light render — brand green #009E73 line and markers. The area fill (BRAND alpha=0.15 on #1A1A17 background) appears as a very dark, barely visible teal region — the low alpha makes it nearly invisible in dark mode (this is a minor weakness, not a legibility failure).
      Legibility verdict: PASS — all chrome text is clearly light against the dark background; no dark-on-dark failures; the line and markers are clearly visible; area fill is subtle but the line provides clear readability.
