review:
  strengths:
  - Proper theme-adaptive chrome using all INK tokens — both renders pass legibility
    check with no dark-on-dark or light-on-light failures
  - 'Excellent spec compliance: both vertical and horizontal spans, dashed boundary
    lines, inline text labels within spans, semi-transparent fills at different opacity
    levels (0.25 vertical, 0.20 horizontal)'
  - 'Strong data storytelling: 2007–2009 financial crisis recession narrative with
    dual-span approach showing temporal period and value threshold simultaneously'
  - Idiomatic Altair layer composition with 10 constituent charts, correct encoding
    types (T, Q, N), proper alt.X2/Y2 rect encoding for spans, mark_rule with strokeDash
    for boundaries
  - 'Full Okabe-Ito compliance: brand green #009E73 for data line, Okabe-Ito positions
    2 and 5 for span colors; continuous/categorical use correct'
  weaknesses:
  - 'Y-axis domain not applied in layer context: scale=alt.Scale(domain=[60, 130])
    on the line layer is overridden by Altair''s shared scale resolution across all
    layers, causing y-axis to extend from 0–130 instead of 60–130 and wasting ~55%
    of vertical canvas — fix by applying the same domain constraint to every layer
    that encodes y (line, points, horizontal span rect, threshold edges)'
  - 'X-axis tick crowding: monthly data over 36 months produces 36 tick labels that
    run together at this canvas size — fix by using tickCount=''quarter'' and format=''%b
    %Y'' on the x-axis encoding'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "span-basic · altair · anyplot.ai" in dark ink, clearly visible. Axis labels "Date" and "Stock Price ($)" in dark text at 22px. Tick labels in INK_SOFT dark gray at 18px, readable but crowded on x-axis. "Recession Period" and "Warning Zone" span labels in Okabe-Ito data colors at 18px/16px respectively.
      Data: Green #009E73 line showing stock price 2007–2009. Amber #E69F00 (25% opacity) vertical span covering Jan 2008–Dec 2009 recession period with dashed boundary rules. Orange-red #D55E00 (20% opacity) horizontal span covering 85–95 warning zone with dashed rules. Points in brand green. Both span types visible and distinct.
      Key issue: Y-axis extends from 0 to 130 instead of 60–130; data occupies upper 45% of chart, lower 55% is empty (domain=[60,130] on line layer not propagated through layer composition).
      Legibility verdict: PASS — all text readable on light surface, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct, not pure black
      Chrome: Title in INK #F0EFE8 (near-white) — clearly readable. Axis labels in INK #F0EFE8 at 22px. Tick labels in INK_SOFT #B8B7B0 (light gray) at 18px — readable. No dark-on-dark failures found — all chrome elements adapt correctly to dark theme.
      Data: Green #009E73 line identical to light render — Okabe-Ito data colors unchanged as required. Amber #E69F00 vertical span appears dark golden-brown on near-black surface (expected at 25% opacity). Orange-red #D55E00 horizontal span appears dark brownish-red (expected at 20% opacity). Span labels remain in their Okabe-Ito colors and are visible against both the dark background and the span fills.
      Same y-axis domain issue from light render applies here.
      Legibility verdict: PASS — all text readable on dark surface, no dark-on-dark failures
