review:
  strengths:
  - 'Faithful clinical 12-lead layout: standard 3x4 grid (I/aVR/V1/V4, II/aVL/V2/V5,
    III/aVF/V3/V6) plus a full-length Lead II rhythm strip across the bottom — immediately
    recognizable to clinicians.'
  - Authentic ECG-paper styling using Imprint matte red (#AE3030) Span ruling at 1mm
    fine / 5mm bold intervals over the brand surface, instead of an off-palette pink
    fill — keeps palette compliance while reading as real ECG paper.
  - Brand green (#009E73) used as the single trace color across all leads; 1mV calibration
    pulses drawn in the leftmost column; scale annotations (25 mm/s, 10 mm/mV, NSR,
    72 BPM) in the title band.
  - Exact 3200x1800 canvas with toolbar disabled; CDP Emulation.setDeviceMetricsOverride
    forces the viewport so the headless-Chrome screenshot lands at the precise canvas
    size.
  - 'Clean theme adaptation: data colors (red grid, green trace) are identical between
    light and dark; only the background and ink tokens flip and all text stays readable
    in both.'
  weaknesses:
  - Lead labels (24pt) and the subtitle (26pt) become small when the 3200px canvas
    is scaled to ~400px thumbnails; legible at full size but near the lower bound
    on mobile. Could nudge lead labels to ~28pt for margin.
  - Code uses several helper functions (synth_beat, add_ecg_grid, style_ecg_panel,
    draw_trace) which deviates from the strict KISS no-functions guideline — justified
    here for DRY across 13 panels, but a minor stylistic deduction.
  - Individual lead panels have axes hidden (clinical convention), so there are no
    per-axis numeric labels; the scale is conveyed only via the calibration pulse
    and title text. Acceptable for ECG but means VQ-06 relies on conventions rather
    than explicit axis titles.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) page surface, overlaid with light red ECG-paper ruling (fine 1mm + bold 5mm lines in #AE3030).
      Chrome: title "ecg-twelve-lead · python · bokeh · anyplot.ai" in dark ink centered at top, subtitle "25 mm/s · 10 mm/mV · Normal Sinus Rhythm · 72 BPM" below it; lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, "II (Rhythm)") in bold dark ink at upper-left of each panel — all readable.
      Data: green (#009E73) ECG traces showing realistic P-QRS-T complexes in all 12 panels plus the rhythm strip; thin vertical 1mV calibration pulses at the left edge of the I/II/III column. First (and only) trace series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) page surface, with the same red ECG-paper ruling (slightly higher alpha) clearly visible.
      Chrome: title, subtitle, and all lead labels rendered in light ink (#F0EFE8 / soft variants) — clearly readable against the dark background, no dark-on-dark failures.
      Data: green traces and red grid are identical to the light render; only the background/ink chrome flipped. Calibration pulses still visible.
      Legibility verdict: PASS
