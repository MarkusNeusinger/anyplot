review:
  strengths:
  - 'Authentic clinical fidelity: standard 3x4 lead layout in the correct column order
    (I/aVR/V1/V4, II/aVL/V2/V5, III/aVF/V3/V6) plus a full-length Lead II rhythm strip,
    a 1 mV calibration pulse, and a 25 mm/s / 10 mm/mV scale footer — all the hallmarks
    a clinician expects.'
  - 'Distinctive seaborn objects API (so.Plot) usage: native faceting (.facet(col,
    wrap=4)) onto subfigures with .share()/.on(), which is genuinely idiomatic modern
    seaborn rather than a thin matplotlib wrapper.'
  - Realistic synthetic ECG via a Gaussian P-Q-R-S-T wave model with per-lead morphology
    (e.g. inverted aVR, deep S in V1), seeded for reproducibility.
  - 'Imprint-correct color use: single data series is brand green #009E73, and the
    iconic ECG paper grid uses the Imprint matte-red #AE3030 as a justified medical/blood
    semantic anchor; both backgrounds theme-correct.'
  - Clean theme adaptation — lead labels carry a PAGE_BG bbox so they stay readable
    on both surfaces; chrome flips while data color stays identical.
  weaknesses:
  - 'Dark render: the red ECG grid at alpha 0.55 on #1A1A17 reads somewhat dim — real
    ECG paper is light, so the ''paper'' effect is less convincing on dark. Consider
    nudging grid_major_alpha slightly higher (~0.6) or a marginally lighter red for
    the dark theme to keep the paper texture legible.'
  - The '1 mV' calibration label (fontsize 7.5) and the '25 mm/s · 10 mm/mV' footer
    (fontsize 8) are quite small; readable at full 3200x1800 but borderline when scaled
    to ~400 px mobile width.
  - Two helper functions (synth_ecg, style_ecg_grid) are well-justified for DRY across
    12 leads + rhythm strip, but technically deviate from the strict KISS 'no functions'
    guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across figure, subfigures, and all panels — not pure white.
      Chrome: title "ecg-twelve-lead · python · seaborn · anyplot.ai" in dark medium ink, fully visible above the grid, not clipped. Bold black lead labels (I, aVR, V1, V4, II, ...) sit in the top-left of each panel inside a subtle off-white bbox. "1 mV" calibration text and "25 mm/s · 10 mm/mV" footer in muted ink, both readable. No axis tick labels (ECG convention — units conveyed by grid + footer).
      Data: ECG traces are brand green #009E73, clearly distinguishable. Grid is light matte-red ECG paper (#AE3030) with major (0.5mm-equivalent) and minor lines. Calibration pulse drawn as a dark step in panel I lower-left.
      Legibility verdict: PASS — all text legible against the light surface; no light-on-light.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — not pure black.
      Chrome: title and lead labels in light ink (#F0EFE8), labels sit on off-dark bbox, fully readable. Footer in muted light ink, legible. Title not clipped.
      Data: traces are the SAME brand green #009E73 as the light render (data color identical; only chrome flipped). Grid is a darker red — visible and reads as ECG paper but slightly dim.
      Legibility verdict: PASS — no dark-on-dark; all titles/labels/footer readable against the near-black background. Brand green visible on both surfaces.
