review:
  strengths:
  - 'Highly convincing clinical replication: standard 3x4 lead layout (I/aVR/V1/V4,
    II/aVL/V2/V5, III/aVF/V3/V6) plus a full-width Lead II rhythm strip, exactly as
    a real 12-lead ECG printout.'
  - Authentic ECG-paper grid using the Imprint matte-red (#AE3030) as a semantic anchor
    with major/minor lines, framed panels, and ticks removed for a true paper look.
  - Brand green (#009E73) single trace is crisp and identical across both themes;
    the green-on-monitor cardiac look is a strong thematic fit.
  - Realistic Gaussian P-QRS-T morphology with lead-specific gains (inverted aVR,
    deep S in V1, progressive R-wave) and a 1 mV calibration pulse — clinically plausible
    normal sinus rhythm.
  - Exact 3200x1800 canvas, no bbox_inches trimming; scale footer '25 mm/s · 10 mm/mV'
    and seed-based reproducibility.
  weaknesses:
  - The '1 mV' caption sits very close to the calibration-pulse bracket in the first
    panel — readable but slightly cramped; nudge it a touch right or down for cleaner
    separation (VQ-01/VQ-02 minor).
  - 'seaborn''s contribution is thin: the figure is largely matplotlib (GridSpec,
    ticker, manual grid/spines) with seaborn used only for sns.lineplot + sns.set_theme
    — limited distinctive-library showcase (LM-02).'
  - Two helper functions (synth_ecg, style_ecg_grid) deviate slightly from the strict
    KISS 'no functions' guideline, though they are well-justified given the 13 repeated
    panels (CQ-01 minor).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface — not pure white.
      Chrome: dark title "ecg-twelve-lead · python · seaborn · anyplot.ai" centered and fully readable; bold dark lead labels (I, aVR, V1, V4, ... II rhythm strip) in subtle off-white boxes, all readable; footer "25 mm/s · 10 mm/mV" in muted dark, readable; "1 mV" calibration caption readable.
      Data: ECG traces in brand green #009E73; ECG-paper grid in matte red #AE3030 (major/minor). First/only series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface — not pure black.
      Chrome: light/white title and bold white lead labels, all clearly readable against the dark surface; no dark-on-dark text anywhere; footer in soft light grey, readable.
      Data: identical green #009E73 traces and red #AE3030 grid as the light render — only chrome flipped, data colors unchanged.
      Legibility verdict: PASS
