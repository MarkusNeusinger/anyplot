review:
  strengths:
  - 'Faithful clinical replication: standard 3x4 lead layout (I/aVR/V1/V4 · II/aVL/V2/V5
    · III/aVF/V3/V6) plus a full-width Lead II rhythm strip, on authentic ECG-paper
    grid with 5:1 bold/light spacing.'
  - 'Correct medical conventions: 1 mV calibration pulse at the start of each row
    and a ''25 mm/s · 10 mm/mV · 1 mV cal'' scale annotation.'
  - 'Palette compliant in both themes: limb leads are brand green #009E73 (first data
    series), precordial leads Imprint blue #4467A3, and the universally-red ECG grid
    #AE3030 is a legitimate semantic exception. Data colors identical across light/dark;
    only chrome flips.'
  - Exact 3200x1800 canvas; both renders fully readable with no clipping or overlap.
  - Realistic synthetic P-QRS-T morphology with lead-specific amplitudes (inverted
    aVR, R-wave progression V1->V4) and seeded reproducibility (seed=42).
  weaknesses:
  - 'Precordial blue #4467A3 reads slightly dim against the near-black dark-theme
    grid; nudging stroke weight or lightness would lift contrast (minor VQ-03/VQ-04).'
  - No legend/key explains the green=limb vs blue=precordial color encoding; a small
    inline note would aid first-time readers (minor storytelling gap).
  - Lead/title/scale labels are injected by raw SVG string replacement after chart.render()
    rather than via pygal-native text placement — clever but slightly non-idiomatic
    and coupled to the manual affine transform.
  - One helper function (to_px) is present; otherwise the script is flat (minor CQ-01
    KISS note).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 overlaid with a light red/pink ECG-paper grid (light 1mm lines, bold 5mm lines) — correct medical styling, not pure white.
      Chrome: bold dark monospace title "ecg-twelve-lead · python · pygal · anyplot.ai" centered at top; bold dark lead labels (I, aVR, V1, V4, ...) above each panel; "II · rhythm" label at lower-left; muted "25 mm/s · 10 mm/mV · 1 mV cal" annotation bottom-right. All text clearly readable against the light background.
      Data: limb leads (I, II, III, aVR, aVL, aVF) drawn in brand green #009E73; precordial leads (V1-V6) in Imprint blue #4467A3; 1mV calibration pulse rectangles at each row's left margin; full-width Lead II rhythm strip in green across the bottom. First data series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 with a dark-red ECG grid — not pure black, grid still visible.
      Chrome: light monospace title, lead labels, and scale annotation all clearly readable; no dark-on-dark failures.
      Data: identical color mapping to the light render — limb leads green #009E73, precordial leads blue #4467A3, rhythm strip green. Only the page/grid chrome flipped; data colors unchanged. Brand green remains clearly visible.
      Legibility verdict: PASS (precordial blue is slightly dim on near-black but waveforms remain distinguishable)
