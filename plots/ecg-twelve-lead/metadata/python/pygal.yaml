      Data: ECG paper grid in light matte-red. Limb leads (I,II,III,aVR,aVL,aVF) green #009E73; precordial leads (V1-V6) blue #4467A3; full-width Lead II rhythm strip in green. 1mV calibration step at left of each row in ink. First series = #009E73 confirmed.
      Legibility verdict: PASS

