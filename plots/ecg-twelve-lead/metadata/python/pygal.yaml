review:
  strengths:
  - 'Clinically authentic 12-lead layout: correct 3x4 column ordering (I/aVR/V1/V4,
    II/aVL/V2/V5, III/aVF/V3/V6) plus a full-width Lead II rhythm strip, exactly matching
    the spec''s standard clinical arrangement'
  - 'Medical-standard ECG paper grid rendered with major (0.5mV/0.2s) and minor (0.1mV/0.04s)
    lines in semantic matte red #AE3030, tuned per-theme so it reads on both #FAF8F1
    cream and #1A1A17 near-black'
  - 1mV calibration pulse drawn at the left margin of every row and a clinical scale
    annotation '25 mm/s · 10 mm/mV · 1 mV cal' bottom-right
  - 'Realistic lead-specific P-QRS-T morphology via a Gaussian-pulse model: aVR correctly
    inverted, V1->V6 R-wave progression, plausible mV amplitudes within normal ranges'
  - 'Imprint palette compliant: limb leads use brand green #009E73 (first series),
    precordial leads use Imprint blue #4467A3; data colors identical across both themes
    with only chrome flipping'
  - Canvas is exactly 3200x1800 (gate passed); waveforms, labels and grid are cleanly
    placed with no overlap or clipping in either render
  weaknesses:
  - 'SC-04 title is wrong on two counts: it renders ''ecg-twelve-lead · pygal · pyplots.ai''
    but the mandated format is ''{spec-id} · {language} · {library} · anyplot.ai''
    = ''ecg-twelve-lead · python · pygal · anyplot.ai''. It is (a) missing the ''python''
    language segment and (b) using the stale ''pyplots.ai'' domain instead of ''anyplot.ai''.
    Fix the injected <text> title string (line ~222) and the module docstring (line
    1). The sibling matplotlib.py already uses the correct form.'
  - 'LM-02: pygal usage is competent but the chart leans heavily on manual SVG <text>
    injection for every label/title because pygal lacks native per-point annotations
    — distinctive pygal-specific features are limited beyond the XY + None-separated
    multi-segment grid trick.'
  - 'CQ-01: a small helper function (to_px) is defined; acceptable for the affine
    label transform but slightly off the strict flat-script ideal.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 across full canvas and plot area. PASS.
