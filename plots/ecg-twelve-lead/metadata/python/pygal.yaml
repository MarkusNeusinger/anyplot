      Data: red ECG grid (slightly intensified for dark surface) reads clearly; limb leads green #009E73 and precordial leads blue #4467A3 are IDENTICAL to the light render — only chrome flipped. Brand green remains visible. Calibration pulses visible.
      Legibility verdict: PASS
