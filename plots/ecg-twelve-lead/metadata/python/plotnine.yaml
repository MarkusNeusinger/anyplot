review:
  strengths:
  - 'Authentic clinical 12-lead ECG: standard 3x4 grid order (I/aVR/V1/V4, II/aVL/V2/V5,
    III/aVF/V3/V6) rendered via facet_wrap, immediately recognizable to clinicians.'
  - 'Faithful ECG-paper grid with dual-resolution lines (major 0.2 s / 0.5 mV, minor
    0.04 s / 0.1 mV) in the iconic light-red convention, kept theme-adaptive so both
    #FAF8F1 and #1A1A17 surfaces stay compliant.'
  - 1 mV calibration pulse drawn in Lead I plus per-lead morphology differences (aVR
    inverted, V1-V6 R-wave progression) make it a genuine teaching-grade display.
  - 'Trace in Imprint brand green #009E73 (palette position 1), which doubles as the
    classic bedside-monitor colour — brand-first rule and domain align.'
  - Canvas exactly 3200x1800; deterministic (np.random.seed(42)); clean imports; title
    matches the mandated format exactly.
  weaknesses:
  - Lead labels (geom_text size=5) and the 'mV' calibration label (size=3) are on
    the small side; readable at full resolution but the calibration label is faint
    when scaled to ~400 px.
  - In the dark render the calibration pulse renders as a bright near-solid white
    box rather than a crisp open-topped step, slightly obscuring its read as a calibration
    marker.
  - Two small helper functions (_gauss, _ecg_beat) are defined, a minor deviation
    from the strict KISS 'no functions' guideline (justified here by the ECG signal
    model).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 across plot and all 12 panels. PASS.
      Chrome: bold dark title "ecg-twelve-lead · python · plotnine · anyplot.ai" centered at top; axis titles "Time (s)" (bottom) and "Voltage (mV)" (left) clearly readable; y ticks -1.5..1.5, x ticks 0.0..2.5; bold dark lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6) top-left of each facet. All text readable. PASS.
      Data: green #009E73 ECG traces with realistic P-QRS-T complexes; light-red ECG-paper grid (major + minor lines); black 1 mV calibration step + "mV" label in Lead I. First series is #009E73. PASS.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 across plot and panels. PASS.
      Chrome: light/off-white title, axis titles, ticks and lead labels all clearly visible against the dark surface; no dark-on-dark text. PASS.
      Data: identical green #009E73 traces (data colour unchanged); grid flips to darker muted red tones (chrome only); calibration pulse renders as a bright white box with light "mV" label. Data colours identical to light render. PASS.
      Legibility verdict: PASS.
