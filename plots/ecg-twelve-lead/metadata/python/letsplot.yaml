review:
  strengths:
  - Authentic clinical 3x4 ECG layout (I/aVR/V1/V4, II/aVL/V2/V5, III/aVF/V3/V6) plus
    a full-length Lead II rhythm strip across the bottom — exactly matching the spec's
    standard hospital format
  - 'Faithful ECG-paper grid: theme-adaptive red minor (1mm/0.04s) and major (5mm/0.2s)
    ruling plus thicker column separators, recreating the iconic medical look on both
    warm-cream and warm-black surfaces'
  - 1mV calibration pulses rendered at the left margin of every row and the rhythm
    strip, with a clear '25 mm/s | 10 mm/mV' scale annotation — all spec calibration
    requirements met
  - Realistic P-QRS-T morphology via a Gaussian component model with per-lead amplitudes
    (incl. correct aVR inversion and V1-V6 R-wave progression); amplitudes sit in
    clinically plausible mV ranges
  - 'ECG trace uses Imprint brand green #009E73 (a genuine patient-monitor convention),
    identical across light and dark renders with only chrome flipping — fully palette-compliant'
  - 'Idiomatic lets-plot: layered grammar of graphics with geom_rect paper regions,
    interactive layer_tooltips, and HTML export alongside the PNG'
  weaknesses:
  - The '25 mm/s | 10 mm/mV' scale annotation (geom_text size=6) is on the small side
    relative to the lead labels; nudging it up slightly would improve at-a-glance
    legibility when the figure is scaled down to ~400px
  - ECG trace line width (size=0.7) is thin; on the dense red grid it reads fine at
    full resolution but verges on faint in the small (400px) variant — a marginally
    thicker trace would strengthen element visibility on mobile
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) page with classic ECG light-red/pink paper grid (minor + bolder major ruling) and thicker column separators.
      Chrome: bold dark title "ecg-twelve-lead · python · letsplot · anyplot.ai" and muted subtitle "Normal sinus rhythm · 72 bpm · standard 12-lead with continuous Lead II rhythm strip" — both fully readable. Bold dark lead labels (I, aVR, V1, V4, ... II rhythm) sit clearly above each trace. Bottom-right scale annotation "25 mm/s | 10 mm/mV" readable. Black 1mV calibration pulses at the left margin of each row.
      Data: ECG traces in Imprint green (#009E73) showing clean P-QRS-T complexes in a 3x4 grid plus a full-width Lead II rhythm strip. First/only series is #009E73.
      Legibility verdict: PASS — all text and traces clearly visible against the light background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) with darker maroon ECG grid ruling, preserving the medical paper look without glare.
      Chrome: light-ink title and muted subtitle readable; light lead labels and scale annotation clearly legible — no dark-on-dark failures. Calibration pulses rendered in light ink, visible against the dark surface.
      Data: traces are the identical Imprint green (#009E73) as the light render; only the chrome (page background, grid tint, ink) flips. Layout/morphology unchanged.
      Legibility verdict: PASS — all text and traces clearly readable against the dark background.
