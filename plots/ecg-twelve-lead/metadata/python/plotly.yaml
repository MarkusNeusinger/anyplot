review:
  strengths:
  - Authentic clinical 3x4 lead layout (I/aVR/V1/V4, II/aVL/V2/V5, III/aVF/V3/V6)
    plus a full-length Lead II rhythm strip via colspan — exactly the hospital-standard
    arrangement the spec requests.
  - 'Medical-standard ECG paper grid faithfully reproduced: salmon/red minor (1mm)
    and bold major (5mm) gridlines using plotly''s native minor-tick API, on warm
    ECG-paper fill in light and a cardiac-monitor surface in dark.'
  - 'First (and only) data series is the brand green #009E73, which doubles convincingly
    as the classic green cardiac-monitor trace — on-brand and domain-authentic at
    once.'
  - Realistic synthetic P-QRS-T morphology with correct lead-specific transforms (aVR
    inverted, V1-V2 rS with deep S-waves) and clinically plausible amplitudes (R~1.2mV,
    P~0.15mV, T~0.3mV) at HR 75 bpm / 0.8s RR.
  - 'Clean KISS code: seeded (np.random.seed(42)), no helper functions/classes, only
    used imports, exact title format, and both PNG + interactive HTML outputs with
    hovertemplates.'
  - 1mV calibration pulse rendered at the left margin of every panel and a clinical
    context strip (HR 75 bpm · Normal Sinus Rhythm · 25 mm/s, 10 mm/mV).
  weaknesses:
  - Tick labels are set at 9px on the dense 12-panel grid; readable at full 3200x1800
    resolution but become quite small when the catalog scales the image down to ~400px
    mobile width. Lead labels (14px Arial Black) stay legible, so this is minor.
  - 'Light-theme plot_bgcolor is the pinkish ECG-paper fill (#FFF5F0) rather than
    the canonical #FAF8F1. This is an intentional, spec-mandated medical-paper styling
    exception (the spec explicitly requires light red/pink/orange paper) and the page
    background (paper_bgcolor) is the correct #FAF8F1 — noted only for transparency,
    not penalized.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white page (#FAF8F1); each ECG panel uses a warm pinkish ECG-recording-paper fill (#FFF5F0) — spec-mandated medical paper styling, not pure white.
      Chrome: title "ecg-twelve-lead · python · plotly · anyplot.ai" in dark ink, centered; clinical context strip "HR 75 bpm · Normal Sinus Rhythm · 25 mm/s, 10 mm/mV" below it; bold dark lead labels (I, aVR, V1, V4, ...) above each panel; "mV" y-axis titles on reference panels; "Time (s)" x-axis with dark tick labels along the bottom rhythm strip. All text clearly readable against the light surface.
      Data: single green ECG trace (#009E73) in every panel; salmon/red 1mm minor + bold 5mm major medical grid; 1mV calibration step at the left margin of each panel. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black page (#1A1A17) with dark cardiac-monitor panel surfaces; the salmon/red medical grid is rendered at lower opacity so it reads as a bedside monitor.
      Chrome: title, clinical strip, lead labels, "mV"/"Time (s)" axis titles and tick labels all in light ink (#F0EFE8 / soft variants), clearly visible against the dark background. No dark-on-dark failures.
      Data: identical green trace (#009E73) and calibration pulses — only the chrome/grid opacity flips between themes, data colors are unchanged.
      Legibility verdict: PASS
