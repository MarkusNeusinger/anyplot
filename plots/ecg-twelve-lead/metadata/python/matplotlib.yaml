review:
  strengths:
  - 'Faithful clinical replication: standard 3x4 lead layout with correct column ordering
    (I,aVR,V1,V4 / II,aVL,V2,V5 / III,aVF,V3,V6) plus a full-width Lead II rhythm
    strip'
  - Authentic ECG paper grid built with matplotlib's native major/minor MultipleLocator
    system (5mm major / 1mm minor red ruling) — idiomatic and domain-correct
  - 'Imprint brand green #009E73 used for all traces; theme-correct backgrounds (#FAF8F1
    light / #1A1A17 dark) with the domain-mandated red grid as a justified semantic
    exception'
  - Realistic P-QRS-T morphology with physiologically plausible amplitudes, lead-specific
    scaling/inversion (e.g. aVR inverted), 1mV calibration pulse, 25mm/s·10mm/mV scale
    metadata and HR annotation
  - Both renders fully readable — no dark-on-dark or light-on-light failures; data
    colors identical across themes with only chrome flipping
  weaknesses:
  - 'The ''HR: ~75 bpm'', scale-metadata, and ''1 mV'' annotations are set at 9pt
    — borderline small when the canvas is scaled to ~400px for mobile thumbnails;
    consider 10pt for these secondary labels.'
  - The '1 mV' calibration label and pulse glyph sit very close to the left canvas
    edge on the rhythm strip, looking slightly cramped (all pixels visible, no clipping
    — minor VQ-05 polish only).
  - Two helper functions (build_signal, setup_ecg_grid) are used; reasonable for DRY
    across 12 panels but a slight deviation from the KISS 'no functions' guideline.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct light surface.
      Chrome: title "ecg-twelve-lead · python · matplotlib · anyplot.ai" top-left in dark ink, fully readable; right-aligned "25 mm/s · 10 mm/mV · Normal Sinus Rhythm" metadata readable and not clipped; bold black lead labels (I, aVR, V1, V4, ...) on subtle pale boxes; "1 mV", "HR: ~75 bpm" annotations readable. All text legible.
      Data: 12-lead grid + full-width rhythm strip; traces in Imprint brand green #009E73 over a light red/pink ECG ruling (1mm minor / 5mm major). Calibration pulse drawn in dark ink at bottom-left. First/only data series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct dark surface.
      Chrome: title and metadata in light ink, fully readable; lead labels in white bold on dark boxes; annotations light and readable. No dark-on-dark failures. Calibration pulse drawn in light ink (theme-flipped). All text legible.
      Data: identical green #009E73 traces; ECG grid rendered as muted dark-red ruling appropriate to the dark surface. Data colors identical to light render; only chrome flipped.
      Legibility verdict: PASS
