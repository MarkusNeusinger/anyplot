review:
  strengths:
  - 'Authentic clinical 12-lead layout: correct 3x4 column ordering (I/aVR/V1/V4,
    II/aVL/V2/V5, III/aVF/V3/V6) plus a full-length Lead II rhythm strip across the
    bottom — exactly matches the spec''s standard hospital format.'
  - 'Medical-grade detail: light pink/red ECG paper grid (fine ~1mm + bold ~5mm rules),
    a 1 mV calibration pulse at the rhythm-strip margin, and italic P/R/T wave-morphology
    annotations in Imprint matte red.'
  - Realistic synthetic data — Gaussian P-QRS-T model with lead-specific polarity
    (aVR inverted, V1/V2 deep S waves) and precordial R-wave progression; amplitudes
    sit in the spec's normal ranges (P~0.15, QRS~1.0, T~0.3 mV).
  - 'Brand green #009E73 trace on theme-correct surfaces (#FAF8F1 light / #1A1A17
    dark); ECG paper, grid, and annotation colors all flip per theme while the green
    data trace stays constant.'
  - Canvas is exactly 3200x1800 in both themes; idiomatic altair layered hconcat/vconcat
    composition with reusable mark_rule grid layers; clean deterministic code (np.random.seed).
  weaknesses:
  - Twelve small panels in a 3x4 grid plus rhythm strip mean each panel's traces and
    fine grid get dense; at ~400px mobile width the per-panel detail and the small
    'Time (s)' tick labels on the bottom row compress toward illegibility. Acceptable
    for this plot type but worth noting for the mobile srcset.
  - Only the bottom panel row and rhythm strip carry a 'Time (s)' axis; there is no
    explicit mV y-axis label on any panel — defensible by ECG convention (the calibration
    pulse conveys vertical scale) but a reader unfamiliar with ECG paper gets no voltage
    axis cue.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 page; each lead panel is light-pink ECG paper (#FFF0EC) with fine pink and bold red grid rules — authentic clinical printout look.
      Chrome: bold dark title "ecg-twelve-lead · python · altair · anyplot.ai" with grey subtitle "Normal Sinus Rhythm · 72 BPM · 12-Lead ECG / 25 mm/s · 10 mm/mV"; black bold lead labels (I, aVR, V1, V4 ...); "Time (s)" axis on bottom row + rhythm strip; "1 mV" calibration label and italic red P/R/T annotations — all readable.
      Data: green #009E73 ECG traces, single series; aVR inverted, V1/V2 deep S, precordial R progression visible. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 page; lead panels are dark red-tinted paper (#2B1A18) with muted red grid rules.
      Chrome: light off-white title and grey subtitle; light lead labels (white) clearly visible on dark paper; "1 mV" and P/R/T annotations in lighter red (#E68B82) — no dark-on-dark failures.
      Data: identical green #009E73 traces (data color unchanged from light render); only chrome/paper flipped.
      Legibility verdict: PASS
