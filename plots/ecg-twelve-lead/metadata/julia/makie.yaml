review:
  strengths:
  - 'Authentic clinical 12-lead ECG replication: standard 3x4 grid (I/aVR/V1/V4, II/aVL/V2/V5,
    III/aVF/V3/V6) plus a full-length Lead II rhythm strip across the bottom — immediately
    recognizable to clinicians.'
  - Realistic P-QRS-T morphology built from a sum-of-Gaussians model with correct
    per-lead polarities, precordial R/S progression (deep S in V1/V2 to tall R in
    V4-V6), and inverted aVR.
  - Medical-standard ECG paper grid using Imprint matte red (#AE3030) with 1mm minor
    + 5mm bold lines and DataAspect() for true 25mm/s x 10mm/mV proportions; 1mV calibration
    pulses on every row.
  - 'Brand green #009E73 trace, correct theme backgrounds (#FAF8F1 / #1A1A17), and
    chrome that flips cleanly between light and dark while data colors stay identical.'
  - Title exactly matches the mandated ecg-twelve-lead · julia · makie · anyplot.ai
    format; scale reference annotation documents 25 mm/s · 10 mm/mV · 1 mV calibration.
  weaknesses:
  - ECG traces are drawn at linewidth=1.2 — clinically realistic but thin; on the
    ~400px mobile thumbnail the fine deflections lose some definition. A slight bump
    (~1.4-1.6) would improve small-scale legibility without losing the paper aesthetic.
  - 'Minor: the small per-strip data structure relies on helper functions (gauss/beat/ecg_signal)
    which is justified for the ECG model but is a slight deviation from the strict
    no-functions KISS preference.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) ECG-paper surface — not pure white, not dark. Correct.
      Chrome: Title "ecg-twelve-lead · julia · makie · anyplot.ai" in dark ink, clearly readable centered at top. Bold lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, plus the rhythm-strip II) in dark ink, all readable. Scale reference "25 mm/s · 10 mm/mV · 1 mV calibration" in soft ink, bottom-right, readable. ECG grid in light red/pink with 1mm minor + 5mm bold lines — subtle but clearly visible.
      Data: Green (#009E73) ECG traces across all 12 leads in the standard 3x4 clinical layout plus a full-length Lead II rhythm strip; 1mV green calibration pulses at the start of each row. First/only series is brand green. Correct.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — not pure black, not light. Correct.
      Chrome: Title and all lead labels in light ink (#F0EFE8), clearly visible against the dark surface — no dark-on-dark failure. Scale reference in soft light ink, readable. Grid red lines use slightly higher alpha (0.24/0.50) so they remain visible on the dark surface.
      Data: Green (#009E73) traces and calibration pulses identical to the light render — only the chrome (background, text, grid alpha) flipped. Correct.
