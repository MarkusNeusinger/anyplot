review:
  strengths:
  - Excellent domain-specific design mimicking real ECG paper with custom colors and
    grid styling
  - Clinically accurate 3x4 lead arrangement with physiologically realistic waveform
    morphology
  - Clean use of plotnine facet_wrap for multi-panel layout with custom in-panel labels
  - Calibration pulse adds clinical authenticity
  - Perfect data quality with realistic amplitudes and heart rate
  weaknesses:
  - Helper functions deviate from KISS structure (though justified by ECG math complexity)
  - Grid intervals do not precisely match standard ECG paper (0.04s/0.2s at 25mm/s)
    - uses 0.1s/0.5s instead
  - Could push design excellence further with reduced y-axis label clutter across
    facets
  image_description: 'The plot displays a 3x4 grid of 12 standard ECG leads arranged
    in clinical format: Row 1 (I, aVR, V1, V4), Row 2 (II, aVL, V2, V5), Row 3 (III,
    aVF, V3, V6). Each panel has a light peach/seashell ECG paper background (#FFF5EE)
    with pink-red major grid lines (0.5s intervals) and lighter minor grid lines (0.1s
    intervals). The ECG signal is drawn in dark navy (#1a1a2e). Each lead is labeled
    in bold black text at the top-left of its panel. Lead I contains a 1mV calibration
    pulse (vertical step from 0 to 1mV) with a "1 mV" label below it. The title "ecg-twelve-lead
    · plotnine · pyplots.ai" appears centered at the top in bold 24pt text. X-axis
    shows "Time (s)" from 0.0 to 2.5, Y-axis shows "Voltage (mV)" from -1.5 to 1.5.
    Each lead displays distinct P-QRS-T morphology: Lead II shows the tallest R-waves,
    aVR is inverted as expected, aVL shows minimal amplitude, and precordial leads
    show appropriate R-wave progression from V1 to V4. The layout fills the 16:9 canvas
    well with balanced spacing.'
