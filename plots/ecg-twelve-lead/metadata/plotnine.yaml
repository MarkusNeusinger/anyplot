  image_description: 'The plot shows a 4x3 grid of 12 ECG lead waveforms on a salmon/pink
    ECG paper background. Each panel has major grid lines in darker salmon and minor
    grid lines in lighter salmon. The signal is drawn in dark navy with clearly visible
