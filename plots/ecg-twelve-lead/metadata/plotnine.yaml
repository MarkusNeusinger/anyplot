  strengths:
  - Excellent clinical ECG paper styling with custom pink grid colors at two levels
    (major/minor)
  - Correct standard 3x4 clinical lead arrangement with realistic lead-specific morphology
  - Clean use of facet_wrap with pd.Categorical ordering for grid layout
  - Calibration pulse implementation adds clinical authenticity
  - Good font sizing with explicitly set sizes throughout
  weaknesses:
  - Lead labels (geom_text size=13) could be larger for better readability
  - Y-axis tick labels are dense (7 ticks from -1.5 to 1.5) in small facet panels
  - Calibration 1mV label at size=9 is too small
  - Low-amplitude leads appear as nearly flat lines due to fixed y-limits
  image_description: 'The plot displays a 12-lead ECG arranged in the standard clinical
    3x4 grid layout. The background uses a warm pink/salmon ECG paper color (#FFF5EE)
    with visible major grid lines in darker pink (#E8A090) and minor grid lines in
    lighter pink (#F0C8BC). Dark near-black signal traces (#1a1a2e) show P-QRS-T complexes
    across all 12 leads. The layout is: Row 1 (I, aVR, V1, V4), Row 2 (II, aVL, V2,
    V5), Row 3 (III, aVF, V3, V6). Each facet has bold lead labels in the upper-left
    corner. A 1mV calibration pulse is visible in Lead I with a small "mV" label below
    it. The title "ecg-twelve-lead · plotnine · pyplots.ai" appears at the top in
    bold. X-axis is labeled "Time (s)" and Y-axis "Voltage (mV)". Lead morphologies
    vary realistically: aVR is inverted, V1 shows dominant S-wave, and there is progressive
    R-wave increase through V3-V6.'
