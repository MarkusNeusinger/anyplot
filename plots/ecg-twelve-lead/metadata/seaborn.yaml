  image_description: The plot displays a 12-lead ECG arranged in the standard clinical
    3x4 grid layout on a light pink/salmon ECG paper background. The top three rows
    show leads I, aVR, V1, V4 (row 1), II, aVL, V2, V5 (row 2), and III, aVF, V3,
