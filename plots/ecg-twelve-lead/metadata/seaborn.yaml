    in the upper-left panel. The title "ecg-twelve-lead · seaborn · pyplots.ai" is
    centered at the top. A footer reads "25 mm/s | 10 mm/mV" in the lower-right. R-wave
    progression is visible across precordial leads (V1 deep S-wave transitioning to
    tall R-waves in V4-V5). Lead aVR shows expected inverted morphology.'
