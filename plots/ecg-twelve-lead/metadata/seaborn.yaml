  image_description: 'The plot displays a 12-lead ECG waveform on a warm pinkish-peach
    ECG paper background (#FFF5F0). The layout is a 4x4 grid: the top three rows show
    the standard 12 leads arranged in clinical 3x4 format (I, aVR, V1, V4 / II, aVL,
    V2, V5 / III, aVF, V3, V6), and the bottom row shows a continuous Lead II rhythm
