    mimicking standard ECG paper. The signal traces are dark navy/black with clearly
    visible P-QRS-T complexes repeating at approximately 72 bpm. A 1mV calibration
    pulse appears in the Lead I panel. The title "ecg-twelve-lead · seaborn · pyplots.ai"
    is centered at the top. Scale notation "25 mm/s | 10 mm/mV" appears at the bottom
    right. Lead morphologies are realistic with aVR inverted, V1 showing deep S-wave,
    and precordial leads showing appropriate R-wave progression.
