review:
  strengths:
  - Authentic clinical 3x4 lead layout (I/aVR/V1/V4 · II/aVL/V2/V5 · III/aVF/V3/V6)
    plus a full-width Lead II rhythm strip, exactly matching the standard hospital
    ECG format from the spec.
  - 'Medically accurate synthetic waveforms: Gaussian P-Q-R-S-T model with per-lead
    coefficients reproducing textbook morphology (inverted aVR, rS-to-tall-R precordial
    progression) within normal amplitude ranges.'
  - 'Realistic ECG-paper grid: continuous 1mm/5mm pink-red (#AE3030) minor/major lines
    at physically correct pxPerMm scale (25 mm/s, 10 mm/mV), a justified semantic-exception
    color for ECG paper.'
  - 1 mV calibration pulse rendered in the left gutter of every row, and a scale footnote
    (25 mm/s · 10 mm/mV · 1 mV calibration) documenting clinical units.
  - Brand-green (#009E73) traces are identical across both themes; only chrome flips
    — clean theme adaptation with both renders fully legible.
  - 'First categorical color is the Imprint brand green and backgrounds are theme-correct
    (#FAF8F1 light, #1A1A17 dark).'
  weaknesses:
  - The bottom-right scale footnote is set at 15px — readable at full size but small
    when the image is scaled to ~400px mobile width; bumping to ~18px would improve
    legibility.
  - Several small arrow-function helpers (ecg, sample, traceLine, calPulse, drawCal,
    drawTrace) add a light layer of abstraction beyond strict KISS, though they are
    idiomatic and well-justified for D3.
  - Lead cells have no per-cell baseline tick or amplitude reference beyond the shared
    calibration pulse; an optional faint baseline could aid interpretation but is
    not required by the spec.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) covered by an authentic ECG-paper grid of fine pink-red (#AE3030) minor lines at 1mm and bolder major lines at 5mm intervals.
      Chrome: centered dark title "Normal Sinus Rhythm · ecg-twelve-lead · javascript · d3 · anyplot.ai"; bold dark lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, plus II rhythm strip); small dark-grey footnote bottom-right. All text clearly readable against the light grid.
      Data: green (#009E73) ECG traces with realistic P-QRS-T complexes; green calibration step pulses in the left gutter of each row. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17) with the same ECG grid drawn in muted dark red, slightly higher opacity so it remains visible.
      Chrome: light/near-white title, lead labels, and footnote — all clearly readable against the dark background. No dark-on-dark failures.
      Data: identical green (#009E73) traces and calibration pulses, matching the light render exactly; only chrome flipped.
      Legibility verdict: PASS
