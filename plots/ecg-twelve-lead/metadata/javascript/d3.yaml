review:
  strengths:
  - 'Authentic clinical 12-lead presentation: correct 3x4 column order (I/aVR/V1/V4
    · II/aVL/V2/V5 · III/aVF/V3/V6) plus a full-length Lead II rhythm strip, exactly
    as the spec requests.'
  - 'Medically faithful waveform morphology from a compact Gaussian P-Q-R-S-T model:
    inverted complexes in aVR, rS pattern in V1 progressing to tall R in V5/V6, and
    amplitudes inside textbook normal ranges (P ~0.1-0.25 mV, QRS ~0.5-1.5 mV, T ~0.1-0.5
    mV).'
  - 'Real ECG-paper grid: minor 1 mm and bold 5 mm lines in a domain-appropriate matte-red
    (#AE3030), with a 1 mV calibration pulse opening every row and a ''25 mm/s · 10
    mm/mV'' scale footnote — physically correct calibration.'
  - 'Perfect theme adaptation: data colour (brand green #009E73) is identical across
    light and dark, only chrome (background, text ink, grid opacity) flips. Both renders
    are fully legible.'
  - Exact canvas (3200x1800), clean idiomatic D3 (single SVG, d3.line, concatenated
    path strings for the grid), and fully deterministic synthetic data with no RNG.
  weaknesses:
  - Lead labels (18px in the 1600-wide CSS mount) and the 13px scale footnote become
    small when the figure is scaled to ~400px mobile width; the chart is inherently
    dense, but slightly larger lead labels would improve small-screen legibility.
  - Coordinates are computed directly in pixels rather than via d3.scaleLinear; justified
    for a fixed physical-scale medical plot, but it means the implementation leans
    less on D3's scale/axis idioms than a typical D3 chart would.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) ECG-paper surface.
      Chrome: title "Normal Sinus Rhythm · ecg-twelve-lead · javascript · d3 · anyplot.ai" in dark ink, centered and fully readable. Lead labels (I, aVR, V1, V4 / II, aVL, V2, V5 / III, aVF, V3, V6 + rhythm II) in bold dark ink, all readable. Pink/red ECG grid (minor 1mm + bold 5mm) subtle but visible. Bottom-right footnote "25 mm/s · 10 mm/mV · 1 mV calibration" readable.
      Data: green traces (#009E73) for all leads and the calibration pulses. Correct morphology — inverted aVR, rS in V1, tall R in V4/V5/V6, full-length Lead II rhythm strip at bottom.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) surface.
      Chrome: title in light ink, fully readable. Lead labels in light/white ink, all readable (no dark-on-dark). Red ECG grid subtle but visible at higher opacity. Footnote in soft ink, readable.
      Data: identical green traces (#009E73) and calibration pulses — only chrome flipped, data colours unchanged from light render.
      Legibility verdict: PASS
