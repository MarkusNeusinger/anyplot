review:
  strengths:
  - Authentic clinical 3x4 ECG layout (I/aVR/V1/V4 · II/aVL/V2/V5 · III/aVF/V3/V6)
    plus a full-length Lead II rhythm strip — instantly recognizable to clinicians.
  - Per-lead morphology profiles give each of the 12 leads its characteristic P-QRS-T
    shape (aVR fully inverted, V1 rS with inverted T, V4-V6 dominant R), not just
    12 copies of one beat.
  - Faithful ECG-paper grid via dual repeating-linear-gradients (1mm minor + 5mm major)
    in Imprint matte-red — a defensible semantic-exception palette choice for clinical
    paper.
  - 'Brand green #009E73 trace, correct pageBg surfaces, and data colors identical
    across light/dark with only chrome flipping — fully theme-correct.'
  - 1mV square calibration pulse at the start of every strip and the 25mm/s · 10mm/mV
    scale noted in the subtitle; deterministic in-memory synthesis, no network.
  - 'Idiomatic MUI X: leftAxis/bottomAxis suppressed, shared voltage window across
    all panels, skipAnimation everywhere, sized from window.ANYPLOT_SIZE.'
  weaknesses:
  - 'Minor cosmetic: the file carries a duplicated header block (a header-rewrite
    block on lines 1-4 followed by the original skeleton header on lines 6-10), and
    the //# anyplot-orientation directive sits on line 5 rather than the very top.
    Harmless (landscape is the default and the directive line survives the rewrite)
    but the leading comment block is messy — collapse to a single header with the
    directive on line 1.'
  - 'Library Mastery is bounded by the medium: the clinical grid and panel layout
    are achieved with CSS/HTML (repeating-linear-gradients, flex/grid), and MUI X''s
    role is reduced to drawing 13 individual LineCharts. That is the right call for
    this spec, but it means few MUI-X-distinctive features are exercised beyond axis
    suppression and per-series color.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) showing through the transparent charts, overlaid with a salmon/pink ECG-paper grid (fine 1mm squares + bold 5mm squares) in Imprint matte-red at low alpha.
      Chrome: title "ecg-twelve-lead · javascript · muix · anyplot.ai" in bold dark ink top-left; subtitle "Normal sinus rhythm · 25 mm/s · 10 mm/mV · 1 mV calibration" in soft dark gray top-right; each panel labeled (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, and "II · rhythm") in dark bold text on a faint cream backing box. All text clearly readable.
      Data: green (#009E73) ECG traces with a leading square 1mV calibration step, distinct P-QRS-T morphology per lead, aVR inverted; full-length Lead II rhythm strip across the bottom.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) with the same ECG-paper grid rendered in a higher-alpha matte-red so the fine/bold squares stay visible on the dark surface.
      Chrome: title and panel labels now in light ink; label backing boxes flip to a faint near-black; subtitle in soft light gray. No dark-on-dark anywhere — all text crisply readable.
      Data: identical green (#009E73) traces, identical calibration pulses and per-lead morphology, identical rhythm strip — only the chrome (page background, grid alpha, text/label-box colors) flipped, exactly as required.
      Legibility verdict: PASS
