review:
  strengths:
  - Authentic clinical 3x4 lead layout (I/aVR/V1/V4, II/aVL/V2/V5, III/aVF/V3/V6)
    plus a full-length Lead II rhythm strip, exactly matching the spec's standard
    ECG arrangement.
  - Per-lead morphology profiles capture real ECG character — aVR fully inverted,
    V1 with inverted T-wave, progressive R-wave growth across V4-V6 — built from a
    deterministic sum-of-Gaussians P-QRS-T model.
  - 'Recognisable ECG-paper grid rendered with CSS repeating-linear-gradients: subtle
    1mm minor squares and bolder 5mm major squares in Imprint matte-red, on the correct
    warm pageBg for both themes.'
  - 1 mV square calibration pulse at the start of every strip and a clear scale annotation
    (25 mm/s, 10 mm/mV) — domain-correct touches that read as a genuine clinical display.
  - Brand green (#009E73) trace as the single data series, fully theme-adaptive chrome,
    exact 3200x1800 canvas, and the precise mandated title format.
  - Deterministic pure-math signal generation (no RNG), clean single import, and idiomatic
    React/MUI-X small-multiples composition of LineCharts.
  weaknesses:
  - 'Dark-theme grid uses rgba(217,90,90) (#D95A5A) rather than the Imprint position-5
    matte-red (#AE3030) used in light — a brightened custom red for visibility. Acceptable
    as theme-adaptive chrome, but ideally derive the dark grid from the same #AE3030
    anchor at higher alpha to stay strictly on-palette.'
  - Trace stroke (1.6px in mount space) is thin; low-amplitude leads (III, aVL) read
    faintly against the grid at mobile scale — a slightly heavier stroke (~2px) would
    improve element visibility.
  - Right-aligned subtitle (Normal sinus rhythm | 25 mm/s | 10 mm/mV | 1 mV calibration)
    at 14px becomes small when scaled to ~400px width; consider a touch larger or
    moving secondary meta below the title.
  - Lead-label badges sit over the top-left of each panel with a semi-transparent
    backing; on the rhythm strip and some panels the badge slightly overlaps the trace
    onset — minor, but a hair more top margin would avoid any overlap.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) overlaid with a classic ECG-paper grid — pale pink/red 1mm minor squares and slightly bolder 5mm major lines (Imprint matte-red at low alpha).
      Chrome: black title "ecg-twelve-lead · javascript · muix · anyplot.ai" top-left, secondary grey subtitle top-right (25 mm/s · 10 mm/mV · 1 mV calibration), all readable. Lead labels (I, aVR, V1, V4, ... II · rhythm) sit in semi-transparent badges in each panel's top-left, clearly legible.
      Data: single brand-green (#009E73) ECG trace per panel; each strip begins with a square 1 mV calibration pulse followed by repeating P-QRS-T complexes. Per-lead morphology visible — aVR inverted, V1 deep S with inverted T, dominant R waves in V4-V6. Full-length Lead II rhythm strip spans the bottom.
      Legibility verdict: PASS — all text dark-on-light and clearly readable; subtitle is small but legible at full resolution.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) with the same ECG-paper grid in a brightened dark-red (rgba(217,90,90)) so the grid stays visible against the dark surface.
      Chrome: light/near-white title and grey subtitle, both clearly readable; lead-label badges use a dark translucent backing with light text — no dark-on-dark failures.
      Data: identical brand-green (#009E73) trace and identical waveform morphology to the light render — only the chrome/grid flips with the theme, exactly as required. Calibration pulses and rhythm strip identical.
      Legibility verdict: PASS — all text light-on-dark and clearly readable; green trace reads well on the near-black surface.
