review:
  strengths:
  - 'Authentic clinical 12-lead ECG reproduction: correct 3x4 layout (I/aVR/V1/V4,
    II/aVL/V2/V5, III/aVF/V3/V6) plus a full-length Lead II rhythm strip across the
    bottom, exactly like a printed hospital ECG'
  - Domain-faithful red ECG-paper grid using a two-level ruling (bold 5mm major +
    light 1mm minor via ECharts splitLine/minorSplitLine), tuned per theme for contrast
    on cream and near-black surfaces
  - Single brand-green trace (#009E73, palette[0]) is identical across both themes;
    only the chrome (background, grid tone, labels) flips — perfect theme adaptation
  - 'Clinically accurate waveform morphology: globally inverted aVR, textbook R-wave
    progression V1(deep rS)->V6(tall qR), realistic P-QRS-T amplitudes (P 0.1-0.25mV,
    QRS 0.5-2.0mV, T 0.1-0.5mV) at 75bpm'
  - 'All required spec features present: 1mV calibration pulse in each row margin,
    per-lead labels, and the standard ''25 mm/s  10 mm/mV  1 mV cal'' scale annotation'
  - Exact title format and exact 3200x1800 canvas; deterministic Gaussian-sum ECG
    model (no RNG), clean self-contained code
  weaknesses:
  - The ECG-paper grid red (rgba(199,68,68,...)) is a justified domain-convention
    semantic exception rather than the exact Imprint matte-red anchor (#AE3030); acceptable
    for ECG paper but worth noting it is a slightly brighter custom red
  - The bottom-left scale annotation is set at 13px CSS, which is on the small side
    relative to the canvas and could be marginal when scaled to ~400px mobile width
    — consider ~15-16px for safety
  - Code uses small helper functions (gauss, ecgBeat, leadTrace, calPulse) rather
    than strict imports->data->plot flow; appropriate for the math model but a slight
    deviation from the KISS no-functions guideline
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (correct, not pure white).
      Chrome: centered bold dark title "ecg-twelve-lead · javascript · echarts · anyplot.ai" fully readable; lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, and rhythm-strip II) in bold dark text, all clearly readable; bottom-left scale annotation "25 mm/s  10 mm/mV  1 mV cal" in soft ink, readable. Red ECG-paper grid (bold 5mm + faint 1mm) is the domain convention, subtle but visible.
      Data: single brand-green (#009E73) waveform trace across all 12 leads + rhythm strip; 1mV calibration pulses at left margin of each row. Trace clearly distinguishable from grid.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (correct, not pure black).
      Chrome: title and all lead labels rendered in light/near-white text, fully readable against the dark surface — no dark-on-dark failures. Scale annotation legible in muted light ink. Grid is a muted red, subtle but visible.
      Data: identical brand-green (#009E73) trace to the light render — only chrome flipped. Calibration pulses present. Green reads well on the dark surface.
      Legibility verdict: PASS
