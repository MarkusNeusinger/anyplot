review:
  strengths:
  - 'Authentic clinical 12-lead layout: 3x4 grid arranged so rows read I/aVR/V1/V4,
    II/aVL/V2/V5, III/aVF/V3/V6, plus a full-length Lead II rhythm strip across the
    bottom — exactly the standard hospital format.'
  - ECG paper is rendered natively from Highcharts major/minor gridlines (5 mm bold
    / 1 mm fine red ruling) with grid squares kept truly square via margin-aware aspect-ratio
    math — a creative, idiomatic use of the library's axis system.
  - 'Realistic synthetic P-QRS-T morphology with correct clinical detail: aVR inverted,
    R-wave progression across V1->V4->V6, ~71 bpm, faint deterministic baseline noise
    via a fixed-seed LCG.'
  - 1 mV / 10 mm calibration pulse drawn at the left margin of every band, and scale
    (25 mm/s, 10 mm/mV) documented in the subtitle — spec calibration requirements
    fully met.
  - 'First data series is brand green #009E73; ECG paper red ruling is derived from
    the Imprint matte-red anchor (#AE3030), so the spec-mandated paper color stays
    inside the palette. Page chrome flips correctly between #FAF8F1 and #1A1A17.'
  - Title matches the exact mandated format; lead labels are clear, bold, and theme-adaptive
    in both renders.
  weaknesses:
  - Trace lineWidth is 1.2 CSS px (~2.4 native); authentic for ECG but the green traces
    read slightly faint on the dark monitor surface — a touch more weight (e.g. 1.4-1.5)
    would lift element visibility without losing the clinical look.
  - Subtitle (14px) and lead labels (15px) are on the small side for a 3200px canvas;
    they survive mobile down-scaling because the labels are bold, but bumping the
    subtitle a couple px would improve legibility headroom.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white page (#FAF8F1) with a pale pink ECG-paper plot area (#FBEFEC) — spec-mandated medical paper color, not pure white.
      Chrome: title "ecg-twelve-lead · javascript · highcharts · anyplot.ai" in dark ink, subtitle "Normal sinus rhythm · 25 mm/s · 10 mm/mV · 1 mV calibration" below it, both clearly readable. Lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, II) in bold dark text at the top-left of each cell — all readable. Red 1 mm/5 mm ruling subtle but visible.
      Data: ECG traces in brand green #009E73; dark-ink 1 mV calibration pulses at the left of every band. P-QRS-T complexes clearly formed, aVR inverted, R-wave progression visible across precordial leads.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black page (#1A1A17) with a warm monitor-black plot area (#201A1A) — not pure black.
      Chrome: title and subtitle in light ink (#F0EFE8 / inkSoft), fully readable. Lead labels and calibration pulses flip to light ink — readable, NO dark-on-dark failure. Red ruling slightly muted but visible.
      Data: traces are the SAME brand green #009E73 as the light render — only the chrome flipped. Waveform morphology identical.
      Legibility verdict: PASS
