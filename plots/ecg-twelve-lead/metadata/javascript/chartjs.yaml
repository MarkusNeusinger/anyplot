review:
  strengths:
  - 'Authentic medical-standard ECG paper: theme-adaptive light-red/pink grid with
    1mm minor + 5mm bold lines drawn via a custom Chart.js plugin (beforeDatasetsDraw),
    squares kept square at 16:9'
  - 'Spec-complete clinical layout: standard 3x4 lead grid (I/aVR/V1/V4, II/aVL/V2/V5,
    III/aVF/V3/V6) plus a full-length Lead II rhythm strip and a 1 mV calibration
    pulse at the left margin of every row'
  - 'Physiologically realistic synthetic signal: per-lead Gaussian P-Q-R-S-T amplitudes
    encode the normal cardiac axis (aVR inverted, V1 rS to V6 qR progression) at 75
    bpm, amplitudes within the spec normal ranges'
  - Single brand-green trace (#009E73 = palette[0]) identical across both themes;
    only chrome (title, labels, footnote, grid tint) flips — backgrounds are the warm
    Imprint surfaces
  - Canvas exactly 3200x1800; scale footnote documents 25 mm/s / 10 mm/mV / 1 mV calibration
    — clinically correct standards
  - 'Idiomatic Chart.js mastery: linear scales with parsing:false {x,y} data, custom
    plugin using getPixelForValue for mm-space coordinate mapping, animation:false,
    deterministic fixed-seed LCG noise'
  weaknesses:
  - Footnote scale annotation is small (13px); at ~400px mobile scale it becomes hard
    to read, though title (22px) and lead labels (17px) remain legible
  - The V1 lead label sits vertically close to the centered title above it — no collision,
    but slightly cramped breathing room in the top band
  - Signal model relies on several helper functions (gauss, voltage, cellTrace, noise,
    calPulse) rather than a flat script — justified by the ECG math but a mild deviation
    from the KISS no-functions guideline
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white Imprint surface (#FAF8F1). No pure-white plot area is painted.
      Chrome: Centered title "ecg-twelve-lead · javascript · chartjs · anyplot.ai" in bold dark ink, fully visible in the reserved top band. Lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6) and "II · rhythm strip" rendered in bold dark ink, all readable. Bottom-right grey footnote "synthetic normal sinus rhythm, 75 bpm · 25 mm/s · 10 mm/mV · 1 mV calibration pulse" readable. ECG paper grid is light-red/pink (minor 1mm + bold 5mm), spec-mandated.
      Data: Single crisp green trace (#009E73) showing P-QRS-T complexes across all 12 leads + the full-width Lead II rhythm strip; a square 1 mV calibration pulse appears at the left margin of every row. First (only) series confirmed #009E73.
      Legibility verdict: PASS — all primary text dark-on-light and clearly readable; only the 13px footnote is small but legible at full size.

    Dark render (plot-dark.png):
      Background: Warm near-black Imprint surface (#1A1A17). Not pure black.
      Chrome: Same title now in light ink, fully visible. Lead labels and "II · rhythm strip" in light ink — all clearly readable, NO dark-on-dark failures. Footnote in soft-grey, readable. ECG paper grid flips to a slightly brighter red/pink tint appropriate for the dark surface.
      Data: Identical green trace (#009E73) and identical waveform geometry / calibration pulses as the light render — only chrome flipped. Confirmed data colors unchanged between themes.
      Legibility verdict: PASS — light-on-dark text throughout; green trace and red grid both remain clearly visible on the warm near-black surface.
