review:
  strengths:
  - Authentic clinical 3x4 lead layout (I/aVR/V1/V4, II/aVL/V2/V5, III/aVF/V3/V6)
    plus a full-length Lead II rhythm strip at the bottom — exactly the standard hospital
    format the spec asks for.
  - coord_fixed(ratio=1) over a manually drawn 1mm/5mm minor/major grid reproduces
    genuine square ECG-paper boxes — a distinctive, idiomatic ggplot2 technique.
  - 'Per-lead P-QRS-T morphology is medically realistic: rS pattern in V1-V2, tall
    R in V4-V6, fully inverted aVR, sensible mV amplitudes at ~72 bpm.'
  - 1 mV calibration pulses on the left margin of every row and the 25 mm/s / 10 mm/mV
    scale called out in the subtitle.
  - 'Perfect theme adaptation — brand-green #009E73 trace identical across both renders,
    only chrome (page background, grid red, labels) flips; both pass readability.'
  weaknesses:
  - ECG traces are thin (linewidth 0.42) and the subtitle (8.5pt) is small; both remain
    readable at full size but lose some clarity when scaled to ~400px mobile width
    — could nudge trace linewidth up slightly.
  - Design polish is high but data storytelling is inherently uniform across the 12
    leads — no single focal lead is emphasized (acceptable for a faithful clinical
    replica, not a deduction beyond default headroom).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), correct.
      Chrome: centered bold dark title "ecg-twelve-lead · r · ggplot2 · anyplot.ai" and grey subtitle ("Synthetic normal sinus rhythm (~72 bpm) · 25 mm/s · 10 mm/mV · 1 mV calibration"), both clearly readable. Lead labels (I, aVR, V1, V4, II, aVL, V2, V5, III, aVF, V3, V6, plus bottom II) are bold dark ink, readable. Classic ECG red/pink grid with subtle minor lines and bolder major lines.
      Data: green ECG traces (first/only series = #009E73) with realistic P-QRS-T complexes; black calibration step pulses at the left of each row.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), correct.
      Chrome: title and subtitle now light, fully readable. Lead labels rendered in light ink — no dark-on-dark failure. Grid uses a lighter red/pink (#D98C8C) so it stays visible on the dark surface.
      Data: identical green #009E73 traces — data color unchanged from light render, only chrome flipped. Calibration pulses light.
      Legibility verdict: PASS
