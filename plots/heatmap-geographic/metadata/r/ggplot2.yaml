review:
  strengths:
  - Correct geographic heatmap with KDE (MASS::kde2d) producing smooth density surface
    over the eastern US
  - Inferno colormap — explicitly cited in the spec as an example — creates visually
    striking hotspots with perceptually-uniform sequential gradient
  - 'All theme tokens correctly applied: PAGE_BG, INK, INK_SOFT, ELEVATED_BG flip
    correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Conditional maps package integration adds country + state borders via native geom_polygon(),
    giving geographic context without fake interactivity
  - Low-density threshold (15th-percentile NA) removes noisy tails and sharpens the
    visual focus on true storm clusters
  - Fully explicit font sizes (axis.title=20, axis.text=16, plot.title=22, legend.title=18,
    legend.text=16) — readable at 4800×2700 canvas
  - 'Clean KISS code structure: no functions or classes, set.seed(42) for reproducibility,
    ragg::agg_png device used correctly'
  weaknesses:
  - Title is clipped in both renders — "anyplot.ai" is cut off at the right canvas
    edge; reduce plot.title size from 22 to 18 or enable title wrapping via plot.title
    = element_text(..., margin = margin(b=12), hjust=0).
  - plot.title size (22pt) is slightly below the 24pt guideline for 4800×2700 canvas;
    nudge to 24pt after fixing the truncation.
  - 'DE-01 ceiling: the plot is visually striking but stays in the "well-configured
    default" tier (score 5/8) — adding a subtitle with the geographic scope ("Eastern
    United States, 2000–2023") or a brief caption would push it closer to publication-ready.'
  - 'VQ-05 minor: the title truncation means the canvas is not perfectly utilised
    — fixing the title size + wrapping resolves this.'
  - 'LM-02 opportunity: geom_raster(interpolate=TRUE) is a distinctive ggplot2 feature
    already in use; adding stat_contour() or geom_density2d() as an overlay would
    further leverage ggplot2-specific layering capabilities.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct theme surface, no pure white.
      Chrome: Title "Convective Storm Event Density · heatmap-geographic · r · ggplot2 · anyplot.ai" rendered in dark ink at top — legible but the right end ("anyplot.ai") is clipped at the canvas edge. Axis labels "Longitude" and "Latitude" are clearly dark and readable. Tick labels (25°N–50°N, 105°W–65°W) appear in INK_SOFT dark grey — all readable against the light background. Legend title "Storm Density" and numeric scale (0.0025–0.0100) are clearly visible. Subtle dotted grid lines are present but non-intrusive.
      Data: Inferno colormap from dark purple (low density, ~0.0025) to bright yellow-white (peak density, ~0.0100). Four distinct hotspot clusters visible: Gulf Coast (~30°N 90°W), Great Plains/Tornado Alley (~38°N 97°W), Appalachians (~40°N 79°W), and Florida Peninsula (~27°N 82°W). US state and country boundaries drawn as light-grey polygons. Low-density regions below the 15th-percentile threshold are transparent, revealing the warm background and sharpening focus on storm clusters.
      Legibility verdict: PASS — all chrome elements readable against light background. One issue: title clipped at right edge.

    Dark render (plot-dark.png):
      Background: Near-black consistent with #1A1A17 — correct dark theme surface, warm not pure black.
      Chrome: Title text appears in light cream (#F0EFE8 / INK token) — clearly readable on the dark surface. Axis labels "Longitude" and "Latitude" in light ink — readable. Tick labels in lighter grey (INK_SOFT #B8B7B0 equivalent) — clearly legible, no dark-on-dark failure. Legend box uses ELEVATED_BG (#242420) with a subtle INK_SOFT border — text within is light and readable. Grid dots are faint and non-competing. Geographic labels ("Tornado Alley", "Gulf Coast", "Florida") are visible as light italic text on the dark surface in the dark render — these may be from a previous render iteration as the current code does not contain geom_text/annotate calls.
      Data: Inferno colormap colors are IDENTICAL to the light render — dark purple through orange to bright yellow-white hotspots. Only chrome (background, text, legend box) has flipped between themes. The four storm clusters remain equally vivid.
      Legibility verdict: PASS — all text clearly readable on dark background. No dark-on-dark failures detected. Title truncation issue persists as in light render.
