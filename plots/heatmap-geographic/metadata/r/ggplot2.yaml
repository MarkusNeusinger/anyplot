review:
  strengths:
  - 'Perfect spec compliance: KDE, inferno colormap, colorbar, geographic borders,
    and bandwidth parameter all present and correct'
  - Theme-adaptive chrome is fully correct in both renders — all INK/INK_SOFT/PAGE_BG/ELEVATED_BG
    tokens wired through to every element
  - 'Clean code: set.seed(42), KISS structure, MASS::kde2d via namespace without cluttering
    imports'
  - Realistic multi-cluster storm data over genuinely storm-prone US regions (Tornado
    Alley, Gulf Coast, Florida, Appalachians)
  - geom_raster(interpolate=TRUE) produces smooth continuous density surface — visually
    clean rendering
  weaknesses:
  - 'Plot title is 22pt; minimum is 24pt — fix: change size=22 to size=24 in plot.title
    element_text()'
  - 'No geographic aspect ratio correction: replace coord_cartesian() with coord_fixed(ratio=1/cos(37.5*pi/180),
    xlim=lon_range, ylim=lat_range, expand=FALSE)'
  - No region annotations — add annotate('text', ...) labels for Tornado Alley (~-96,~41),
    Gulf Coast (~-90,~32), Florida (~-82,~28) using INK_SOFT color and italic fontface
  - Axis ticks show raw decimal degrees without symbol — add scale_x_continuous(labels=function(x)
    paste0(abs(x), 'W')) and scale_y_continuous(labels=function(y) paste0(y, 'N'))
  - Dark render transition from dark raster to dark background is less visually distinct
    than light render
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 visible outside the KDE raster extent; bulk of panel covered by dark inferno colormap (low-density purple-black)
      Chrome: Title "Convective Storm Event Density · heatmap-geographic · r · ggplot2 · anyplot.ai" in dark INK (#1A1A17) at 22pt — readable. Axis labels "Longitude"/"Latitude" in dark INK at 20pt — readable. Tick labels in INK_SOFT (#4A4A44) at 16pt — readable. Legend title "Storm Density" and value labels readable.
      Data: Four bright yellow-orange hotspot clusters (Gulf Coast ~-90/30, Great Plains ~-96/37, Appalachians ~-79/40, Florida ~-82/27) against dark purple-black inferno base. US state and country borders visible as subtle dotted lines in INK_SOFT. Colorbar uses inferno scale from near-black (low) to yellow (high).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17; panel covered by same dark inferno raster (transition from raster to background less distinct than in light render)
      Chrome: Title in light #F0EFE8 — readable. Axis labels in light INK (#F0EFE8) — readable. Tick labels in INK_SOFT (#B8B7B0) — readable. Legend background shifted to ELEVATED_BG (#242420). No dark-on-dark failures observed.
      Data: Inferno hotspot colors identical to light render — same four cluster positions and intensity. Geographic borders in #B8B7B0 (INK_SOFT dark).
      Legibility verdict: PASS
