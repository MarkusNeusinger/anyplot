review:
  strengths:
  - 'Perfect spec compliance: KDE density estimation, continent outlines, colorbar,
    and transparency all correctly implemented'
  - 'Excellent data quality: seismic zones (Japan, Indonesia, Chile, California, Mediterranean)
    are geographically accurate and tell a coherent Ring of Fire story'
  - Clean, idiomatic plotnine layer composition (geom_tile + geom_polygon) with proper
    coord_fixed for geographic aspect ratio
  - 'Full theme adaptation: both light (#FAF8F1 ocean blue) and dark (#1A1A17 dark
    blue ocean) renders are correctly themed with no dark-on-dark failures'
  - 'Good typography hierarchy: title 24pt, axis labels 20pt, tick labels 16pt all
    explicitly set'
  - Reproducible data generation with np.random.seed(42) and realistic geographic
    coordinate clusters
  weaknesses:
  - 'VQ-07 non-compliant colormap: uses custom FFFFCC→BD0026 gradient (YlOrRd) instead
    of recommended viridis/cividis for sequential heatmaps; YlOrRd is not perceptually
    uniform and is less CVD-safe than viridis'
  - 'Blocky tile appearance: 120×70 grid with geom_tile at width=3.1/height=2.1 produces
    a coarse, pixelated heatmap — increase grid resolution to 240×120 or higher and
    reduce tile sizes accordingly for a smoother continuous appearance'
  - 'Crude continent outlines: the hardcoded polygon coordinates are very simplified
    and angular, making continents look schematic rather than realistic — use finer
    polygon data or smooth with more intermediate points'
  - Legend text at 14pt is below the 16pt minimum guideline — increase legend_text
    size to 16pt
  - 'LM-02 low: grammar-of-graphics layer composition (geom_tile + geom_polygon) is
    idiomatic but not distinctive vs ggplot2 — consider using plotnine-specific scale
    transformations or stat functions to differentiate'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 as outer plot background, with a light blue ocean panel (#D4E8F7) filling the map area — correct and visually appropriate.
      Chrome: Title "Seismic Activity Density · heatmap-geographic · python · plotnine · anyplot.ai" is bold, dark, and clearly readable at the top. Axis labels "Longitude (°)" and "Latitude (°)" are dark and well-sized. Tick labels (-100, 0, 100 on x; -40, 0, 40, 80 on y) are dark gray — all readable against the warm background.
      Data: Heatmap tiles using FFFFCC (yellow) → BD0026 (deep red) gradient show seismic density hotspots. Clear red hotspots appear over Japan/Asia (east, ~140°E), Indonesia (~115°E), a large cluster over the Pacific/Philippines, Chile (~-72°W), and California (~-120°W). Continent outlines are drawn in dark gray lines but the polygon shapes are very simplified/angular. Density legend "Density" appears on the right with the color gradient. The tiles are somewhat blocky/square at this resolution. Alpha=0.90 provides slight transparency.
      Legibility verdict: PASS — all text is readable against the light background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 as outer background, with a dark ocean blue (#1A2A3A) filling the map panel — correct and atmospheric.
      Chrome: Title text is white/light cream and clearly readable against the dark background. Axis labels are light-colored (INK = #F0EFE8 in dark mode). Tick labels appear in #B8B7B0 (INK_SOFT) — light gray, clearly readable. No dark-on-dark failures observed. Legend text is light against the elevated-dark legend background.
      Data: Heatmap density colors are identical to the light render — same yellow-to-red gradient with the same hotspot pattern. Continent outlines are drawn in lighter gray (#A0A09A) which contrasts well against the dark ocean. The blocky tile appearance is more prominent against the dark background.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures.
