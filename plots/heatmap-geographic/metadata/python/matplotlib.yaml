  - Grid uses linestyle='--' (dashed) which deviates from the style guide preference
    for solid subtle grid lines
  - 'Sensor dots use c=''#0072B2'' (Okabe-Ito position 3, blue) — single categorical
    series should use first Okabe-Ito position #009E73 (brand green), unless blue
    was intentionally chosen to contrast with warm heatmap colors'
  - Images in plot_images/ appear to be from a previous code version (show viridis
    colormap and city annotations for Sacramento, San Francisco, Los Angeles) that
    are absent from the current code — the current code would render differently
