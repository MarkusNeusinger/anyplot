    the chart configuration, and all text sizes are explicitly set at appropriate
    scales (52px title, 44px subtitle, 42px legend title, 32px labels)
  - Transparency gradient on the density overlay (0.1–0.9 alpha steps) is an intentional,
    well-executed design choice that allows the basemap to show through at low-intensity
    areas
  weaknesses:
  - 'Colormap uses a custom YlOrRd-like palette (yellow→orange→dark red stops) instead
    of the recommended viridis/cividis sequential colormap — update colorAxis stops
    to use viridis color values (#440154 → #21908C → #FDE725)'
  - 'Dark mode basemap mismatch: the OSM Standard (light) tile provider is hardcoded
    and does not adapt to dark theme — in the dark render, the OSM tiles appear as
    a light map inside a dark #1A1A17 page. Use a dark tile provider for THEME==dark
    (e.g., CartoDB DarkMatter via ''provider'': {''type'': ''OpenStreetMap'', ''theme'':
    ''Night''} or a CartoDB provider)'
  - Map navigation (zoom/pan) is disabled in both the PNG and the interactive HTML
    file — the spec explicitly asks interactive libraries to enable zoom. Enable mapNavigation
    for the HTML artifact while keeping it disabled for the screenshot
  - 'Design sophistication could be elevated: the chart is functional but reads as
    a standard Highcharts Maps heatmap. Consider a more polished title layout, refined
    legend positioning, or subtle design details that lift it above ''well-configured
    default'''
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page background — correct. The map occupies almost the full canvas with a small title area at top.
      Chrome: Title "Activity Density in SF Bay Area · heatmap-geographic · python · highcharts · anyplot.ai" in dark (#1A1A17) text — readable. Subtitle "Spatial density visualization using kernel smoothing" in dark softer text — readable. Intensity legend with vertical colorbar on the right, "Intensity" label and 0.0–1.0 tick values — all readable.
      Data: Heatmap overlay using yellow (low, ~0.1 opacity) → orange → dark red (high, ~0.9 opacity) colormap. Four distinct hotspots visible: Downtown SF, Oakland, Berkeley, and SFO corridor. OSM Standard basemap visible underneath the transparent overlay. First series uses YlOrRd-like gradient (NOT viridis/cividis as recommended).
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Dark (#1A1A17) page background — correct. The map border is dark.
      Chrome: Title in light (#F0EFE8-like) text — readable against dark background. Subtitle also in lighter tone — readable. Legend box has dark semi-transparent background (rgba(36,36,32,0.95)) with light text labels — readable. Intensity label and tick values appear in light (#B8B7B0-like) color — readable.
      Data: Heatmap data colors are IDENTICAL to light render (same YlOrRd-like gradient — yellow to dark red). ISSUE: The OSM Standard basemap tiles remain LIGHT-colored in the dark render. The map shows light beige/green/white OSM tiles inside a dark #1A1A17 page container. This creates a visual inconsistency — the basemap is not theme-adapted for dark mode.
      Legibility verdict: PASS for chrome text elements (title, labels, legend all readable). PARTIAL FAIL for basemap adaptation — OSM Standard tiles are light on a dark page, creating a mismatch.
