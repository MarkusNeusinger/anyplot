  strengths:
  - Excellent data quality — four distinct SF Bay Area hotspots (Downtown SF, Oakland,
    Berkeley, SFO corridor) with realistic GPS coordinates and Gaussian smoothing
    create a compelling narrative
  - 'Perfect code quality: KISS structure, seed set, clean imports, correct output
