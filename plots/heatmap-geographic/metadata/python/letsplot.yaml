review:
  strengths:
  - 'Excellent multi-layer geographic composition: geom_contourf + geom_path + geom_point
    + geom_text integrate cleanly'
  - Correct viridis colorscale for continuous density data with fully adaptive chrome
    in both themes
  - Interactive tooltips via layer_tooltips() and HTML output leverage letsplot's
    distinctive capabilities
  - coord_fixed() preserves correct geographic proportions
  - Synthetic California seismic data with realistic fault-zone clustering is compelling
    and neutral
  weaknesses:
  - 'Scatter overlay uses #0072B2 (stroke) and #E69F00 (fill) — single-series categorical
    should start with #009E73 (Okabe-Ito position 1)'
  - Simplified 11-point California coastline produces a jagged diagonal shape rather
    than a recognizable coastline; even a slightly more detailed polygon (30-50 points)
    would significantly improve geographic realism
  - 'DE-01 headroom: the focal hierarchy could be sharpened (e.g., increase alpha
    on the density layer in high-density zones or add a subtle annotation callout
    at the peak hotspot)'
