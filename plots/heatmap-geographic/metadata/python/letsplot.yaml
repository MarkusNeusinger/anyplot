review:
  strengths:
  - Correct geographic heatmap using KDE (scipy gaussian_kde) over a synthetic California
    seismic dataset
  - 'Clean multi-layer composition: contourf density + coastline path + magnitude-scaled
    scatter points'
  - 'Full theme-adaptive chrome: background, text, legend, and coastline correctly
    flip between light and dark renders'
  - Excellent code quality — KISS structure, seed set, all imports used, clean letsplot
    grammar-of-graphics idiom
  - 'Realistic and scientifically grounded data: geographically correct cluster centroids
    (SF, LA), exponential magnitude distribution'
  - Interactive HTML export with layer_tooltips showing lat/lon/magnitude on hover
    — distinctive letsplot feature leveraged
  weaknesses:
  - 'Continuous colormap does not follow the style guide: scale_fill_gradient2 with
    custom warm hex values (FFFFD9→FD8D3C→D73027) instead of viridis/cividis or Reds/Blues
    (VQ-07 partial)'
  - Legend text is 14pt instead of the required 16pt minimum (VQ-01 minor deduction)
  - Basemap is a synthetic/simplified 11-point polyline — letsplot has geom_livemap()
    for real tile-based map backgrounds, which was not used (SC-02, LM-01, LM-02)
  - Design lacks city/fault-line annotations to contextualise the two hotspots; viewer
    needs California geography knowledge to read the plot (DE-03)
  - Panel grid lines use INK_SOFT solid colour at size=0.3 — could be even more subtle
    via low-opacity RULE token to reduce visual competition with the heatmap (DE-02)
  image_description: |-
