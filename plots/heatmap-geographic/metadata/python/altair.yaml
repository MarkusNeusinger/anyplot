review:
  strengths:
  - 'Excellent theme-adaptive implementation: basemap colors, legend fill, and text
    colors all flip correctly between light and dark renders'
  - Dual encoding (size + color) for density creates clear visual hierarchy — large
    bright circles immediately convey hotspots
  - Correct use of viridis colormap for continuous data with proper colorbar legend
    labeled with units
  - 'Perfect code quality: KISS structure, np.random.seed(42) set, clean imports,
    idiomatic Altair layer composition'
  - Idiomatic Altair geographic visualization using alt.topo_feature() for TopoJSON
    loading and .project(type='mercator') — distinctly Altair features
  weaknesses:
  - 'Not a true continuous geographic heatmap: spec requires KDE/interpolation for
    a smooth surface; circles produce a bubble-map effect rather than a continuous
    density field — use mark_rect with 0.5-degree grid bins and summed value aggregation
    instead'
  - Legend label font size is 14px, below the recommended 16px minimum for pixel-based
    libraries
  - 'Data storytelling lacks focal point: no city labels or annotations to anchor
    viewer attention — adding mark_text labels for top 5 cities (London, Paris, Berlin,
    Madrid, Rome) would significantly improve DE-03'
