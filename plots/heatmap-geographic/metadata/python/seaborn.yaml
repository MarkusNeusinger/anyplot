review:
  strengths:
  - Clean geographic KDE visualization with district labels (Shinjuku, Shibuya, Ginza,
    Akihabara) providing excellent real-world geographic context and density narrative
  - Fully theme-adaptive implementation — background, text, axis labels, spines, grid,
    and colorbar all read the ANYPLOT_THEME token and flip correctly between light
    (#FAF8F1) and dark (#1A1A17) renders
  - Scatter overlay (s=12, alpha=0.25) layered on top of the KDE fill adds depth by
    showing individual check-in points alongside the continuous density estimate
  - High-quality reproducible synthetic data representing four real Tokyo districts
    with plausible density differentials (Shinjuku 280 > Shibuya 220 > Ginza 180 >
    Akihabara 140) plus scattered background noise
  weaknesses:
  - Code specifies cmap='YlOrRd' but rendered images display a viridis-like colormap
    — inconsistency between code and output; style guide requires viridis or cividis
    for sequential density data, not YlOrRd
  - 'No basemap layer: spec explicitly requires ''country boundaries, coastlines,
    or street maps as a basemap''; implementation uses only text labels as geographic
    context, missing the spatial reference layer'
  - Scatter dot size s=12 is below the recommended minimum of s=20-50 for 1000+ points
    at 4800x2700px canvas resolution; dots are visible but undersize reduces the overlay's
    communicative value
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, non-pure-white.
      Chrome: Title "Tokyo Check-ins · heatmap-geographic · python · seaborn · anyplot.ai" in dark ink, clearly readable. Axis labels "Longitude (°E)" and "Latitude (°N)" readable in dark ink. Tick labels in dark-ink-soft, all legible. Colorbar label "Check-in Density" and tick values (7.6–222.4) readable in dark ink. Subtle grid lines (alpha ~0.10) visible but not intrusive.
      Data: KDE heatmap rendered with a viridis-like colormap (dark purple outer → teal mid → bright yellow-green at peak density). Four distinct hotspot clusters correspond to Shinjuku, Shibuya, Ginza, and Akihabara district labels. Semi-transparent scatter dots (small, grayish) overlay the KDE. A geographic boundary and "Tokyo Bay" label visible on the right side. Colorbar positioned to the right of the axes.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, non-pure-black.
      Chrome: Title, axis labels, and tick labels rendered in light cream/off-white ink, clearly readable against the dark surface. Colorbar tick labels and axis label are light-colored. Grid lines very subtle. No dark-on-dark text failures observed.
      Data: KDE colormap colors are identical to the light render (purple → teal → yellow-green) — only chrome elements flipped. District labels (Shinjuku, Shibuya, Ginza, Akihabara) appear in light/white text on the dark background, readable. Scatter dots visible as lighter-toned points.
      Legibility verdict: PASS — all text readable against the near-black background; no dark-on-dark failures.
