review:
  strengths:
  - Custom GeoHeatmap class extending pygal's Graph base is an idiomatic and technically
    correct approach for custom chart types in pygal
  - Gaussian smoothing (manual convolution) creates smooth density appearance from
    histogram data
  - Colorbar with gradient segments and labeled tick values is well-designed
  - Variable opacity (0.4-0.85) based on density value allows underlying geographic
    context to show through
  - California PM2.5 monitoring scenario is realistic and data values are plausible
  - Both light and dark renders display with correct background themes and readable
    text
  weaknesses:
  - Colormap should be viridis or cividis (or Reds/Blues for polarity-semantic heatmaps)
    — YlOrRd is not in the approved list per the style guide
  - 'Title separators use '' - '' (hyphen) instead of '' · '' (middle dot); fix: ''PM2.5
    Air Quality · heatmap-geographic · python · pygal · anyplot.ai'''
  - 'No ANYPLOT_THEME env var handling: background, plot_background, and all SVG fill
    attributes are hardcoded — must read os.getenv(''ANYPLOT_THEME'', ''light'') and
    derive PAGE_BG/INK tokens'
  - 'Plot background uses #e8f4f8 (blue-gray) instead of the required #FAF8F1 (light)
    / #1A1A17 (dark)'
  - Output file saved as plot.png instead of f'plot-{THEME}.png'
  - The rendered coordinate display (European range ~44-60°N) does not match California
    data description — data coordinates may be getting incorrectly mapped through
    pygal's coordinate system
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1; plot area is light blue-gray (#e8f4f8)
      Chrome: Title "PM2.5 Air Quality - heatmap-geographic - python - pygal - anyplot.ai" in dark text — readable. Axis labels "Longitude (°)" and "Latitude (°)" in dark bold text — readable. Tick labels dark and well-spaced — readable. Colorbar "Density" label and tick values (77.2, 57.9, 38.6, 19.3, 0.0) in dark text — readable.
      Data: Three density hotspot clusters shown via YlOrRd gradient (yellow=low, red=high). Teal-blue station scatter dots overlaid. Dark gray coastline polyline. Colorbar gradient on right side.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black approximately #1A1A17; plot area also very dark (near-black)
      Chrome: Title appears in white/light text — readable. Axis labels appear in light text — readable. Tick labels appear in light-colored text — readable. Colorbar labels appear in light text — readable. No dark-on-dark text failures detected.
      Data: Same YlOrRd density gradient colors as light render — hotspot reds and yellows identical, confirming data colors are theme-independent. Teal-green station dots visible. Coastline appears as light gray polyline.
      Legibility verdict: PASS
