review:
  strengths:
  - Creative custom GeoHeatmap(Graph) subclass that properly extends pygal's internal
    rendering pipeline via _plot() and _compute()
  - Smooth density gradient with variable-opacity cells creates a visually clean heatmap
    in light mode
  - 'All spec-required features present: KDE-equivalent smoothing, colormap with transparency,
    colorbar legend, coastline overlay, scatter point overlay'
  - Good data storytelling -- three distinct hotspots with geographic context are
    immediately readable
  - np.random.seed(42) ensures reproducibility
  weaknesses:
  - 'CRITICAL -- code/image mismatch: Code saves to plot.png not plot-{THEME}.png;
    no ANYPLOT_THEME env-var read; background=''white'' (not theme-adaptive); all
    text fill hardcoded to #333333 (black on dark background). Geographic data uses
    California extent (lat 32.5-42, lon -125 to -114) but images show European extent
    -- code cannot reproduce the shown images'
  - 'Title wrong in code: ''heatmap-geographic - pygal - pyplots.ai'' -- missing python,
    domain should be anyplot.ai; correct format: ''PM2.5 Air Quality - heatmap-geographic
    - python - pygal - anyplot.ai'''
  - 'Missing HTML output: Pygal''s distinctive feature is interactive SVG/HTML; chart.render()
    written to plot-{THEME}.html is required'
  - 'Dark-mode basemap: Inner plot rectangle uses hardcoded fill=#e8f4f8 -- in dark
    mode this light-blue rect blends with the dark background to produce an olive/khaki
    wash; should use the theme-adaptive background color'
  - 'Colormap dark-end issue: Lowest-value cells use #ffffb2 (pale yellow) with partial
    opacity; on dark background this creates the olive artifact -- consider making
    near-zero cells fully transparent'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) -- correct theme surface
      Chrome: Title "PM2.5 Air Quality - heatmap-geographic - python - pygal - anyplot.ai" readable in dark text. Axis labels "Latitude (N)" and "Longitude (E)" with units are clearly readable. Tick labels (44/47/50/54/57/60 on Y; -8/-2/+4/+10/+16/+22 on X) are legible. Colorbar labels (0-159) readable.
      Data: Three hotspot clusters visible with YlOrRd gradient (pale yellow -> orange -> deep red for high density). Teal/green station dots overlay the clusters. Dark-gray coastlines provide geographic context. Variable-opacity cells fade to transparent for low-density areas, allowing warm background to show through cleanly.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) -- correct dark theme surface
      Chrome: Title, axis labels, and tick labels appear in light text and are readable against the dark background. Colorbar labels visible. No dark-on-dark failures for text elements.
      Data: Colors are the same YlOrRd gradient as light render -- data colors are identical (positions 1-7 unchanged). However, the low-density heatmap cells (pale yellow #ffffb2 at partial opacity) blend with the dark background to produce an olive/khaki wash over the map area. This is caused by the hardcoded #e8f4f8 background rectangle inside the plot area interacting with the dark theme. The three hotspot clusters (orange-red) remain clearly distinguishable. Station dots (teal-green) are visible.
      Legibility verdict: PASS for text; DEGRADED for map basemap area due to olive color wash from non-theme-adaptive background rect
