  strengths:
  - Excellent biological context - EGFR oncogene with realistic variant IDs, regulatory
    elements, and expression data
  - Colorblind-safe palette (improved from attempt 1) - purple/blue/yellow regulatory
    colors work well
  - All 4 spec-required tracks implemented with appropriate visualization types
