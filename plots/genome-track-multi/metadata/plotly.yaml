  - Rangeslider added for genomic navigation, leveraging Plotly interactive capabilities
  - Clean code structure with well-organized data generation
  weaknesses:
  - Rangeslider shows miniaturized regulatory elements in the static PNG, adding visual
    clutter below the main plot
  - Design polish is close but not quite at publication level - needs a final push
    on typography and visual hierarchy
  - Dense exon cluster in the middle region could benefit from slight visual differentiation
  image_description: The plot displays a 4-track genome browser view of the EGFR locus
    on chromosome 7 (positions ~55,086,000 to ~55,280,000). The title "EGFR Locus
    (chr7) · genome-track-multi · plotly · pyplots.ai" is centered at the top in a
    large font. Track 1 (Genes) shows the EGFR gene structure with dark blue rectangles
    for exons connected by a thin light-blue intron line, with small directional arrows
    indicating the + strand. "EGFR (+)" label appears above in blue. Light blue background
    shading. Track 2 (Coverage) is a filled area chart in semi-transparent blue showing
    RNA-seq read depth (0-60x range), with peaks corresponding to exon positions and
    a notable spike near the 3' end. Subtle horizontal gridlines on this track only.
    Track 3 (Variants) shows lollipop markers — orange circles for SNPs and purple
    diamonds for Indels — with stem height encoding quality scores (0-100 range).
    Light blue background shading. Track 4 (Regulatory) shows colored rectangles for
    Promoters (purple), Enhancers (blue), and CTCF binding sites (yellow/orange).
    A Plotly rangeslider at the bottom shows a miniature overview. A horizontal legend
    at the bottom labels SNP, Indel, Promoter, Enhancer, and CTCF. "Genomic Position
    (bp)" x-axis label with comma-formatted coordinates.
