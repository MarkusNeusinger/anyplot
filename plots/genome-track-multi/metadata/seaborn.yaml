  image_description: 'The plot displays a multi-track genome browser view for chr7
    (55kb-105kb region) with four vertically stacked tracks sharing a common x-axis
    of genomic position in kilobases. The top track ("Genes") shows two genes: GENEA
    (+) on the lower row with 4 blue exon rectangles connected by thin intron lines
    and a rightward strand arrow, and GENEB (-) on the upper row with 3 exon rectangles
    and a leftward arrow. The second track ("Coverage") is a filled area chart in
    blue with semi-transparent fill on a light gray background, showing peaks of ~60-75
    reads at exon positions and baseline ~20-25 reads elsewhere. The third track ("Variants")
    displays lollipop markers — orange circles for SNPs and purple diamonds for indels
    — with stems proportional to quality scores (range ~42-95). A legend in the upper
    right identifies SNP and Indel markers. The bottom track ("Regulatory") shows
    colored rectangles: red for promoters and green for enhancers, with a corresponding
    legend. The title reads "genome-track-multi · seaborn · pyplots.ai" at the top.
    Alternating tracks have subtle gray background shading.'
