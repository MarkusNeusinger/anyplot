  image_description: |-
    The plot displays a multi-track genome browser view of the EGFR gene region on chromosome 7 (chr7:55,086,000-55,280,000). Four horizontal tracks are stacked vertically with alternating light gray (#f5f5f5) and white backgrounds, separated by thin gray lines:

    1. Genes track - Blue (#4477AA) exon rectangles of varying widths connected by a thin blue horizontal intron line. Small chevron arrows along the intron line indicate + strand direction. The gene name "EGFR" appears in blue italic above the exons.

    2. Coverage track - A smooth filled area plot in light cyan (#66CCEE) with a blue stroke (#2277BB), rendered via pygal.XY with hermite interpolation. Coverage peaks at exon positions. Y-axis ticks on the left show 0, ~43, and ~87 in light gray text.

    3. Variants track - Scatter dots: pink/red circles (#EE6677) for SNPs and purple circles (#AA3377) for indels, positioned by quality score on the y-axis. A small legend in the top-right corner distinguishes SNP vs Indel.

    4. Regulatory track - Colored rectangles: yellow (#CCBB44) for Promoter, green (#228833) for Enhancer, and salmon (#EE8866) for CTCF. Each rectangle is labeled with its type above. A legend in the top-right shows all three categories.

    The x-axis at the bottom shows genomic positions in Mb (55.10-55.27 Mb) with subtle dashed vertical guide lines spanning all tracks. The axis label reads "Genomic Position (chr7)". The title reads "EGFR Gene Region (chr7) · genome-track-multi · pygal · pyplots.ai" in bold sans-serif at the top. Track labels (Genes, Coverage, Variants, Regulatory) appear in bold on the left side.
