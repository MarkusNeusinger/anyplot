  weaknesses:
  - 'Library mastery is very low: pygal is used only as an SVG container, not as a
    charting library — the entire visualization is raw SVG injection'
  - Promoter label overlaps or crowds the Regulatory track label
  - Some exons appear as very thin vertical bars rather than readable rectangles
  - Red-green color combination across tracks is suboptimal for colorblind accessibility
  - Helper functions and sys.path manipulation add code complexity
  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    gene region on chromosome 7 (chr7:55,086,000-55,280,000). Four horizontal tracks
    are stacked vertically with alternating light gray and white backgrounds. Track
    1 (Genes): Green exon rectangles of varying widths connected by a thin green horizontal
    intron line, with arrow chevrons indicating + strand direction and "EGFR" in green
    italic above. Track 2 (Coverage): A filled area plot in light blue with blue outline
    showing read depth, with higher peaks at exon positions and y-axis ticks (0, ~43,
    ~87). Track 3 (Variants): Lollipop markers with red circles for SNPs and small
    yellow/orange squares for indels, height encoding quality score, with SNP/Indel
    legend top-right. Track 4 (Regulatory): Colored rectangles — purple for Promoter,
    yellow for Enhancer, orange for CTCF — each labeled, with legend top-right. The
    x-axis shows genomic positions in Mb (55.10 to 55.27 Mb) with subtle dashed vertical
    grid lines and label "Genomic Position (chr7)". Title: "EGFR Gene Region (chr7)
    · genome-track-multi · pygal · pyplots.ai". Bold track labels on the left side
    with thin gray separator lines between tracks.'
