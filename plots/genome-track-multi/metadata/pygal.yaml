    colored regulatory elements)'
  - 'Outstanding data quality: real EGFR gene locus with biologically plausible coordinates,
    coverage patterns, and variant data'
  - 'Good visual design: custom color palette, alternating track backgrounds, subtle
    grid lines, italic gene name, and coherent visual hierarchy'
