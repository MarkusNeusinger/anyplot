review:
  strengths:
  - Excellent real-world data context using the TP53 cancer gene with realistic coordinates
    and actual dbSNP IDs
  - Cross-track exon plotbands create visual integration across all four tracks, enabling
    quick pattern recognition
  - Lollipop markers for variants with quality-score encoding are an effective and
    visually clear design choice
  - Gradient-filled coverage track with subtle grid and exonic peaks tells a compelling
    biological story
  - All font sizes explicitly set at appropriate scales for 4800x2700 canvas
  weaknesses:
  - Variant track has no inline legend or labels to distinguish SNP (orange circle)
    vs Indel (purple diamond) in the static PNG
  - Regulatory track uses green vs red which is problematic for red-green colorblind
    viewers
  image_description: The plot displays a multi-track genome browser view of the TP53
    locus on chromosome 17 (7,570,000-7,592,000, GRCh38). Four horizontal tracks are
    stacked vertically sharing a common x-axis of genomic position in Mb. The Genes
    track (top) shows dark blue (#306998) rectangular exons of varying widths connected
    by thin chevron-patterned intron lines indicating strand direction, with a "TP53
    ◀" label above. The Coverage track shows an areaspline of read depth (0x-~95x)
    with a blue-to-transparent gradient fill; coverage peaks clearly align with exon
    positions (~70-90x) versus baseline intronic coverage (~30-35x). The Variants
    track displays lollipop markers — orange circles for SNPs and purple diamonds
    for Indels — positioned by quality score (y-axis 0-120), with thin grey stems
    to baseline. The Regulatory track (bottom) shows green rectangles for Enhancers
    and red/pink rectangles for Promoters, with colored inline labels identifying
    each type. Subtle light-blue vertical bands highlight exon regions across all
    tracks. Dashed grey separator lines divide the tracks. The title reads "TP53 Locus
    (chr17) · genome-track-multi · highcharts · pyplots.ai" with a subtitle of the
    coordinate range.
