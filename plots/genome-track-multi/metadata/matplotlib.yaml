  image_description: 'The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chromosome 7 (chr7:27.20-27.28 Mb). Four horizontal tracks are
    stacked vertically sharing a common genomic x-axis with positions formatted in
    Mb. Track 1 (Genes): Shows four genes (HOXA1, HOXA2, HOXA3, HOXA4) with dark blue
    rounded rectangles for exons connected by thin blue lines for introns, with triangle
    arrows indicating strand direction (right-pointing for +, left-pointing for -
    on HOXA3). The track has a light gray background. Track 2 (Coverage): A filled
    area plot in light blue showing RNA-seq read depth, with clear peaks corresponding
    to exon positions and low baseline coverage in intergenic regions. Y-axis shows
    values 0-125. Track 3 (Variants): Lollipop markers showing 15 variants — orange
    circles for SNPs and brown diamonds for indels — with stem height encoding quality
    scores (0-100). A legend in the upper right distinguishes SNP from Indel. Track
    4 (Regulatory): Colored rounded rectangles representing regulatory elements —
    green for Promoters, orange/amber for Enhancers, and purple for Insulators. A
    three-column legend identifies the types. The title reads "genome-track-multi
    · matplotlib · pyplots.ai" at the top.'
