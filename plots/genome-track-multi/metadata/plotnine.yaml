review:
  strengths:
  - Excellent spec compliance with all 4 required tracks using correct visual encodings
    (rectangles, area, lollipops, colored blocks)
  - Strong biological realism with EGFR locus, plausible coordinates, and coverage
    peaks aligning with exons
  - Colorblind-safe palette choices (Okabe-Ito for variants, Dark2 for regulatory)
  - Clean grammar-of-graphics composition with native plotnine legends
  - Good visual separation between tracks with alternating backgrounds and dashed
    separators
  weaknesses:
  - Axis tick text at 14pt is slightly below the recommended 16pt minimum for optimal
    legibility
  - Track labels at size=11 are somewhat small — increasing to 13-14 would improve
    readability
  - Chevron strand indicators at alpha=0.55 are slightly faint
  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    locus on chr7 (~55kb region, 55,086,000-55,141,000). Four tracks are stacked vertically
    with a shared x-axis showing formatted genomic coordinates. Genes track (top):
    dark blue rectangular exons connected by thin intron lines, with chevron arrows
    indicating the + strand direction, and an italic bold "EGFR (+)" label. Coverage
    track: a filled blue area plot (semi-transparent steel blue) showing read depth
    that peaks near exon positions. Variants track: lollipop markers with grey stems
    - blue circles for SNPs and orange circles for Indels, heights encoding variant
    quality. Regulatory track (bottom): colored rectangles - teal for Promoters, orange
    for Enhancers, purple for Insulators. Alternating light grey/white backgrounds
    separate tracks, with dashed grey separator lines. Two legends on the right identify
    Variant Type and Regulatory element colors. The title reads "genome-track-multi
    · plotnine · pyplots.ai" in large bold text.'
