review:
  strengths:
  - Excellent spec compliance with all 4 required tracks fully implemented
  - Outstanding data quality using real EGFR gene with biologically realistic coverage
    patterns
  - Clean well-organized code with clear section separation per track
  - Thoughtful design with alternating background shading dashed separators and manual
    legends
  - Coverage correlating with exon positions adds genuine scientific storytelling
  weaknesses:
  - Track labels and legend text relatively small (7-9pt)
  - Strand direction chevrons very subtle at alpha=0.35
  - Red/orange SNP/Indel color choice not ideal for colorblind accessibility
  - Does not leverage plotnine-distinctive features like faceting or brewer scales
  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    locus on chromosome 7 (~55kb region from 55,086,000 to 55,141,000 bp). Four horizontally
    stacked tracks share a common x-axis showing genomic position. Genes track (top):
    dark blue rectangles represent 13 exons connected by thin intron lines, with subtle
    chevron arrows indicating the + strand direction. The gene is labeled "EGFR (+)"
    in bold italic. Coverage track: a blue filled area plot showing read depth that
    peaks near exon positions, with realistic variation. Variants track: lollipop
    markers with grey stems — red circles for SNPs and orange circles for Indels,
    with stem height encoding quality score. A manual legend in the upper right identifies
    SNP vs Indel. Regulatory track (bottom): colored rectangles for Promoter (green),
    Enhancer (purple), and Insulator (grey-blue), with a manual legend. Tracks are
    separated by dashed grey lines and alternating light grey/white backgrounds. Title
    reads "genome-track-multi · plotnine · pyplots.ai". X-axis labeled "Genomic Position
    (chr7)" with comma-formatted coordinates.'
