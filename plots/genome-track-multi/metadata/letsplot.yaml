review:
  strengths:
  - Excellent biological realism with the HOXA gene cluster as a well-known real-world
    locus
  - Strong use of lets-plot interactive tooltips on all four tracks providing rich
    hover information
  - Refined visual design with custom color palette, track background shading, and
    dashed dividers
  - Good data storytelling with highlight region and peak coverage annotation
  - Complete spec compliance with all four track types and required features
  weaknesses:
  - Code verbosity in manual coordinate arithmetic for track positioning
  - Left margin slightly generous reducing effective plot area
  - Low-quality variant lollipops have very short stems reducing visual distinction
  - X-axis tick labels could include kb suffix for clearer unit display
  image_description: 'The plot displays a multi-track genome browser view of the HOXA
    gene cluster on chr7 (27,200-27,280 kb). Four horizontal tracks are stacked vertically
    sharing a common x-axis of genomic position in kilobases. The top "Genes" track
    shows five genes (HOXA1-HOXA5) as dark steel-blue exon rectangles connected by
    thin intron lines, with italic gene names above and strand-direction triangles
    below. The "Coverage" track shows a light blue filled area plot (RNA-seq read
    depth) with peaks corresponding to exonic regions and a "Peak: 120x" annotation.
    The "Variants" track displays lollipop markers - orange circles for SNPs and red
    circles for Indels - with stem height encoding quality scores. The bottom "Regulatory"
    track shows green rectangles for Promoters and purple rectangles for Enhancers.
    A subtle yellow highlight column marks a variant-rich region in HOXA3. Track labels
    appear in bold on the left side. Dashed divider lines separate tracks. Light gray
    background bands shade each track. Two legends at bottom identify Variant Type
    (SNP/Indel) and Regulatory (Promoter/Enhancer). The title reads "genome-track-multi
    · letsplot · pyplots.ai" with a subtitle describing the HOXA cluster and highlight
    region.'
