review:
  strengths:
  - Excellent multi-track layout using ggplot2's facet_grid with free_y scales — idiomatic,
    clean, and perfectly suited to the genome browser pattern
  - 'Biologically realistic data: chr12 coordinates, real gene names (RAPH1, KRAS2),
    coverage peaks elevated over exonic regions reflecting actual RNA-seq signal'
  - Imprint palette applied with semantic awareness across 7 categories (genes, coverage,
    2 variant types, 2 regulatory types) — no palette violations
  - 'Both light and dark themes work correctly with full theme-adaptive chrome: backgrounds,
    text, strip labels, legend boxes all flip properly'
  - Sophisticated use of geom_blank() anchors to lock the shared x-range across all
    four facets — a non-obvious ggplot2 idiom used correctly
  - 'Perfect code quality: KISS structure, set.seed(42), clean imports (only ggplot2
    + ragg), idiomatic R throughout'
  weaknesses:
  - Strand direction encoded only in gene name labels ('RAPH1 (+)', 'KRAS2 (-)') —
    spec requires arrows or chevrons on exon/intron elements to indicate strand direction
    visually
  - Track strip labels appear on the right side (ggplot2 facet_grid row default) rather
    than the left side as the spec specifies — move strips to left using strip.placement
    and switch argument in facet_grid
  - Regulatory element text labels use geom_text size=2.2 mm (~6.25 pt) which is quite
    small and may be barely legible at mobile widths (~400 px); consider size=2.8–3.0
    mm
