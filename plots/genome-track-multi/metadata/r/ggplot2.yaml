review:
  strengths:
  - 'Full spec compliance: all 4 required track types (Genes, Coverage, Variants,
    Regulatory) implemented with correct geom choices per track — exon rectangles
    + intron lines, filled area, lollipop markers, colored regulatory boxes'
  - 'Correct Imprint palette usage throughout: RAPH1(+) = #009E73 (brand green first),
    KRAS2(-) = #C475FD (lavender second), coverage blue, variant ochre/red, regulatory
    red/cyan — all from Imprint positions 1-6'
  - 'Perfect theme adaptation: light (#FAF8F1) and dark (#1A1A17) backgrounds correct,
    all chrome text/grid/legend elements flip correctly between themes — no dark-on-dark
    or light-on-light failures'
  - Clever geom_blank() anchor technique ensures all 4 facets share identical genomic
    x-axis range across free_y scales — idiomatic ggplot2 pattern
  - 'Biologically realistic data: exon-elevated coverage peaks correctly correlate
    with gene structure, variant quality heights encode real biological signal, chr12
    coordinates and gene names are plausible'
  - 'All font sizes explicitly set: title=12, axis.title.x=10, axis.text.x=8, strip.text=9,
    legend text=8 — proportions correct in both themes'
  weaknesses:
  - 'Unused imports: library(dplyr) and library(scales) are loaded but never called
    — all data uses base R data.frame() and the x-axis formatter uses a custom sprintf
    function. Remove both imports to clean CQ-03.'
  - 'Design storytelling could be stronger: the variant quality heights encode quality,
    but the most interesting biological feature — coverage peaks aligning with exon
    positions — is not highlighted. Consider adding a subtle annotation or reference
    line emphasizing the exon-coverage correlation, or highlight the highest-quality
    variant (quality=95 at position 1,084,500) with a distinct marker or label.'
  - Legend floats beside only the Coverage track facet due to facet_grid + legend.position='right',
    creating slight visual imbalance — the legend items span all track types but visually
    anchor only to one facet. Consider legend.position='bottom' or adjusting spacing
    to reduce this asymmetry.
  - IMPRINT_PALETTE[5] (#AE3030) is assigned to both 'Indel' (color scale) and 'Promoter'
    (fill scale), creating a color collision in the combined legend where two unrelated
    categories share the same red swatch. Use IMPRINT_PALETTE[7] (#954477 rose) for
    Indel or IMPRINT_PALETTE[5] only for one semantic role.
