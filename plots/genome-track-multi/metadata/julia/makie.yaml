review:
  strengths:
  - 'Excellent Makie layout system usage: linkxaxes!, rowsize!(Relative/Fixed), hidexdecorations!
    and rowgap! are all used idiomatically to build the multi-track browser'
  - 'Deliberate semantic color choices: brand green (#009E73) for exons, blue (#4467A3)
    for sequencing coverage, matte red (#AE3030) for variants — all domain-appropriate
    bioinformatics conventions'
  - 'Proper theme-adaptive chrome across all four axes: INK, INK_SOFT, INK_MUTED tokens
    wired through every label, tick, and spine in both themes'
  - Realistic CFTR locus genomic data with correlated coverage peaks over exon positions,
    telling a clear biological story
  - Lollipop variant track using height-encoded quality scores is more informative
    than a simple scatter; band!+lines! combination for coverage is idiomatic CairoMakie
  weaknesses:
  - 'Gene name labels ''CFTR-A (+)'' and ''CFTR-B (-)'' are positioned just outside
    the y-axis limits (y=1.27 vs limit=1.2; y=-1.18 vs limit=-1.1), causing them to
    be clipped by the axis viewport and appear only partially (lower strokes of characters
    visible). Fix: either expand ylimits to (-1.3, 1.4) or reposition labels to y=ga_y+0.60
    / y=gb_y-0.60.'
  - 'Missing subtle background shading to visually separate adjacent tracks, as explicitly
    required by spec notes (''Consider using subtle background shading to visually
    separate adjacent tracks''). Fix: alternate the axis backgroundcolor between PAGE_BG
    and ELEVATED_BG for odd/even tracks.'
  - Coverage track uses IMPRINT_PALETTE[3] (blue, position 3) rather than IMPRINT_PALETTE[2]
    (lavender, position 2), skipping the canonical second slot without explicit semantic
    justification in the code.
  - '''Quality score'' annotation text in the Variants track is fontsize=10 — borderline
    readable when PNG is scaled to ~400 px mobile width. Fix: increase to fontsize=11
    or 12.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white.
      Chrome: Title "CFTR Locus · genome-track-multi · julia · makie · anyplot.ai" in bold dark (#1A1A17) at top — fully readable. Y-axis labels (Genes, Read Depth, Variants, Regulatory) in dark text — all readable. X-axis label "chr7 position (bp)" at bottom — readable. Tick labels in INK_SOFT muted dark tone — readable. Gene name labels "CFTR-A (+)" and "CFTR-B (-)" appear partially clipped at axis y-limits (center positioned ~0.07 units outside limit). All other chrome elements legible.
      Data: Gene track shows 5 brand-green (#009E73) exon rectangles for CFTR-A on a thin intron backbone with right-pointing triangle strand markers; 4 green exon blocks for CFTR-B with left-pointing strand markers. Coverage track shows a semi-transparent blue (#4467A3, alpha 0.30) filled area with a solid blue line on top — peaks clearly aligned with exon positions. Variant track shows 13 red (#AE3030) lollipop markers with dark stems at varying quality-score heights. Regulatory track shows 4 labeled colored rectangles: green Promoter, 2 blue Enhancers, ochre CTCF — each with inline labels.
      Legibility verdict: PASS — all primary text elements are readable against the light background; gene name labels near axis boundary are the only minor concern.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title in light (#F0EFE8-equivalent) bold text on dark background — clearly readable, no dark-on-dark issues. Y-axis labels and track labels render in light tones — readable. X-axis ticks and labels use muted light (INK_SOFT dark-mode) — readable. No instances of dark text on dark background detected in any track.
      Data: All data colors are identical to the light render — gene exons remain #009E73 green, coverage fill remains blue, variant markers remain #AE3030 red, regulatory rectangles retain their green/blue/ochre palette colors. Chrome correctly flipped while data colors held constant.
      Legibility verdict: PASS — all text is readable against the dark background; the same minor gene-label clipping applies as in the light render.
