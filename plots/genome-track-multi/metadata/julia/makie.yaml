review:
  strengths:
  - Excellent multi-track genome browser with four track types fully implemented (gene
    annotations with exon rectangles, intron backbone, strand arrows; filled area
    coverage; lollipop variant quality scores; regulatory element rectangles)
  - 'Semantic color use: matte red for variants (mutations), brand green for gene
    exons, Imprint blue for coverage — all palette-correct'
  - Idiomatic CairoMakie layout using linkxaxes!, rowsize! with Relative sizing, and
    rowgap! for track spacing
  - Alternating track backgrounds (PAGE_BG / ELEVATED_BG) provide clean visual separation
    between all four tracks
  - Full theme-adaptive chrome with all text tokens set on every axis — both renders
    are clean and readable
  - Realistic CFTR locus data with biologically accurate coverage peaks aligned over
    exon positions
  - Title formula is correct with optional descriptive prefix and automatic fontsize
    scaling
  weaknesses:
  - Strand direction arrow markers are somewhat small (markersize=7, rendered as 14px
    on 3200x1800) — slightly hard to see at thumbnail size; consider increasing to
    markersize=9-10
  - 'DE-01/DE-03: No focal-point emphasis or annotation highlighting a key biological
    insight (e.g., which exon region has the highest coverage, or an arrow indicating
    the CFTR promoter connection to coverage) — the data is displayed correctly but
    viewer must find the story unaided'
  - 'DE-02: Coverage y-grid (subtle) is the only grid; consider adding a faint horizontal
    rule to separate the gene track from the coverage track more cleanly since the
    alternating background contrast is quite subtle on light render'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 for gene and variant tracks; slightly lighter #FFFDF6 elevated background for coverage and regulatory tracks — alternating backgrounds cleanly separate the four panels.
      Chrome: Title "CFTR Locus · genome-track-multi · julia · makie · anyplot.ai" in bold dark text, clearly readable at the top. Track Y-axis labels ("Genes", "Read Depth", "Variants", "Regulatory") in dark INK_SOFT, all legible. X-axis tick labels and "chr7 position (bp)" label in INK_SOFT, readable. "Quality score" annotation and gene name labels ("CFTR-A (+)", "CFTR-B (−)") are visible.
      Data: Gene exon rectangles in #009E73 brand green. Coverage band in #4467A3 blue with 30% alpha fill and solid blue outline line. Variant lollipop circles in #AE3030 matte red (semantic: mutations). Regulatory elements in #009E73 (Promoter), #4467A3 (Enhancer), #BD8233 (CTCF). Strand direction arrows as small right/left triangles in INK_MUTED.
      Legibility verdict: PASS — all text is clearly readable against the light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 for gene and variant tracks; slightly lighter #242420 for coverage and regulatory tracks — the same alternating pattern.
      Chrome: Title in light #F0EFE8 on dark background, clearly readable. Track labels in #B8B7B0 (INK_SOFT dark), all legible. X-axis tick labels and bottom axis label visible in INK_SOFT token. Gene name labels and "Quality score" annotation in theme-correct light colors.
      Data: Gene exon rectangles remain #009E73 (identical to light render). Coverage band remains #4467A3 blue. Variant circles remain #AE3030 red. Regulatory elements retain identical palette colors. Data colors are identical between themes — only chrome flips.
      Legibility verdict: PASS — no dark-on-dark failures. All text elements use correctly themed tokens.
