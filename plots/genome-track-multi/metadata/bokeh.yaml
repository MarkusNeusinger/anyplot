  image_description: 'The plot displays a multi-track genome browser view of the EGFR
    gene locus on chromosome 7 (~55,086,000–55,212,000 bp), with four vertically stacked
    tracks sharing a common x-axis. Track 1 (Genes): Shows the EGFR gene with dark
    blue rectangular exons connected by a lighter blue intron line. Small triangular
    markers indicate the (+) strand direction. The gene name "EGFR (+)" is labeled
    above in italic. Thinner UTR rectangles appear at the 5'' and 3'' ends. Track
    2 (Coverage): A filled area plot in semi-transparent blue with a darker blue outline
    showing read depth (0–60+). Peaks align with exon positions, simulating RNA-seq-like
    coverage. Background is light gray. Track 3 (Variants): Lollipop markers with
    orange circles for SNPs and purple diamonds for Indels, heights encoding quality
    scores (0–100). A legend in the top-right distinguishes SNP and Indel types. Track
    4 (Regulatory): Colored rectangles for regulatory elements — green (Promoter),
    gold (Enhancer), pink (CTCF Binding) — with a horizontal legend in the top-right.
    The x-axis shows formatted genomic positions with the label "Genomic Position
    (chr7)". Tracks alternate between white and light gray backgrounds. Title reads
    "genome-track-multi · bokeh · pyplots.ai".'
