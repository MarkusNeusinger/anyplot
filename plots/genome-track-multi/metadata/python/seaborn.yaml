review:
  strengths:
  - 'Perfect multi-track genome browser layout: 4 stacked tracks (genes, coverage,
    variants, regulatory) with tight inter-track spacing (hspace=0.06) and a shared
    x-axis'
  - 'Excellent data storytelling: RNA-seq coverage peaks visually correlate with exon
    positions in the gene track above, immediately communicating the expression-structure
    relationship'
  - Seaborn scatterplot uses hue+style+size simultaneously for variant encoding —
    redundant channel coding (color + shape + lollipop height) is both a distinctive
    seaborn feature and a CVD-accessibility best practice
  - Alternating track backgrounds (PAGE_BG / ELEVATED_BG) create visual separation
    between tracks without heavy gridlines, a sophisticated design choice
  - 'Perfect palette compliance: Imprint palette used throughout, first series #009E73,
    theme-adaptive chrome correct in both renders'
  - All font sizes explicitly set with the title scaling formula applied; all text
    readable in both light and dark themes
  - Fully realistic genomic context (chr7 kinase cluster, RNA-seq coverage, GATK quality
    scores, ChIP-seq regulatory elements) — biologically plausible and neutral
  weaknesses:
  - 'DE-01 (Aesthetic Sophistication): Design is strong but not yet publication-ready
    (score 5/8). The alternating track backgrounds are a nice touch, but the overall
    composition still reads as a well-configured default rather than a considered
    editorial piece. Adding strand-direction chevrons within the intron lines (rather
    than just a single external arrow) and slightly bolder gene-track exon labels
    would push toward 6+.'
  - 'DE-02 (Visual Refinement): While spines are selectively removed and grid is subtle,
    the regulatory track has only horizontal baseline extent with no axis border —
    a thin rule or visual anchor at the top of that track would complete the polished
    look.'
  - 'LM-02 (Distinctive Features, 3/5): The multi-dimensional scatterplot encoding
    (hue+style+size) is a genuine seaborn distinctive. Could be further leveraged
    by using seaborn''s FacetGrid or lineplot CI bands for the coverage track to show
    biological replicate variability.'
