    area using negative x coordinates with hjust=1
  - Strand-direction arrows (size=3.5 mm) are quite small and may be hard to see on
    mobile-scaled renders — consider increasing to size=4.5 or adding a small legend
    entry
  - LM-02 could be stronger by using a lets_plot-specific feature more prominently
    (e.g., more sophisticated tooltip formatting with custom HTML)
