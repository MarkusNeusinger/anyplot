review:
  strengths:
  - Complete, biologically accurate genome browser with all four required track types
    (Genes, Coverage, Variants, Regulatory) fully realized
  - 'Excellent theme-adaptive chrome: both light and dark renders pass readability
    checks with no dark-on-dark or light-on-light failures'
  - Thoughtful semantic color assignments using the Imprint palette (brand green for
    coverage, semantic red for Indels, amber for the highlight region)
  - 'Strong data storytelling: amber highlight + Peak: 120x annotation create a clear
    focal point; track order follows standard genomics browser convention'
  - Interactive HTML output with contextual layer_tooltips() on all major data layers
    — a distinctive letsplot strength
  weaknesses:
  - 'Track labels (Genes, Coverage, Variants, Regulatory) placed at x = x_start +
    0.8 (800 bp into the 80 kb region) overlap with leftmost data elements — Genes
    label sits on the HOXA1 intron line, Coverage label overlaps the green coverage
    fill. Fix: increase x-offset to x_start + 3 or x_start + 4 to clear the data.'
  - 'panel_grid_major_x uses color=INK (full-saturation ink) instead of a low-opacity
    value; vertical gridlines are slightly too prominent on dark render. Fix: use
    element_line(color=INK_SOFT, size=0.15).'
  - 'Two separate bottom legends (Variant Type + Regulatory) waste vertical space.
    Fix: place them side-by-side or stack into one horizontal row.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "genome-track-multi · python · letsplot · anyplot.ai" bold dark (#1A1A17); subtitle in INK_SOFT; x-axis label "Genomic Position (chr7)" dark; tick labels ("27200 kb" etc.) in INK_SOFT; track labels ("Genes", "Coverage", "Variants", "Regulatory") in bold INK — all readable
      Data: Coverage fill in brand green #009E73 (IMPRINT[0]); gene exons in #4467A3 blue; SNP lollipops in #C475FD lavender; Indel lollipops in #AE3030 matte red; Promoter rectangles in #BD8233 ochre; Enhancer rectangles in #2ABCCD cyan. Amber (#DDCC77) highlight border near HOXA3.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title in #F0EFE8 (INK in dark mode) clearly visible; subtitle in #B8B7B0; tick labels in #B8B7B0; track labels in #F0EFE8 bold — all readable. No dark-on-dark failures detected.
      Data: Colors are identical to light render — same brand green coverage, same blue exons, same lavender SNPs, same red Indels, same ochre Promoters, same cyan Enhancers. Amber highlight border still visible.
      Legibility verdict: PASS
