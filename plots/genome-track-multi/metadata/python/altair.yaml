review:
  strengths:
  - Excellent 4-track genome browser with all spec-required components implemented
    correctly (exon/intron/strand gene track, coverage area, variant scatter with
    quality, regulatory bars)
  - Perfect theme-adaptive chrome in both renders — all INK/INK_SOFT/INK_MUTED tokens
    correctly applied; no dark-on-dark or light-on-light failures
  - Authentic, realistic genomics context (chr7 EGFR/VOPP1) with biologically plausible
    data patterns (coverage peaks over exons, realistic variant/quality distributions)
  - 'Idiomatic Altair mastery: angle encoding for strand arrows, resolve_scale(color=''independent''),
    layer composition, and vconcat for a coordinated multi-track view'
  - Clean KISS code with reproducible seed and correct PAD-only canvas logic
  weaknesses:
  - 'No subtle background shading between tracks: the spec notes recommend alternating
    track background tints to visually separate adjacent tracks — this would meaningfully
    improve DE-02'
  - Track header labels use fontSize=11 which may be slightly small at mobile (~400
    px) thumbnail size — consider 12–13 px for the track title marks
  - Minor variant circle clustering around 55,165,000–55,170,000 reduces readability
    slightly; could use opacity=0.75 (already 0.85) or slightly smaller size for the
    dense SNP cluster
