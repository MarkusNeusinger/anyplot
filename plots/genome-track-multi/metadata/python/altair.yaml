review:
  strengths:
  - Biologically realistic chr7/EGFR locus data with meaningful coverage peaks over
    exons
  - Excellent multi-track layout using Altair vconcat with independent color scales
    per track
  - Idiomatic Altair layer composition — intron lines + exon bars + strand marks combined
    with + operator
  - 'Full Imprint palette compliance: brand green #009E73 for coverage (primary series)
    and SNP, correct palette positions for gene/regulatory tracks'
  - Theme-adaptive chrome works correctly in both light and dark renders
  - 'Proper canvas handling: raise on overshoot, pad-only to 3200×1800 target'
  - Strand direction encoded with angle-rotated triangle markers — a sophisticated
    genomic convention
  weaknesses:
  - Regulatory bars are quite narrow/short — y_pos fixed at 0 with height=38 makes
    them appear as short flat markers; increasing bar height or y-domain range would
    improve prominence
  - The gene track inner-height (58px) leaves very little vertical room — the two
    gene bodies at y_pos=0 and y_pos=1 are stacked very tightly; slightly more vertical
    space would improve readability
  - Repeated alt.Scale(domain=x_domain) in every encoding could be simplified using
    shared scale or per-track resolve_scale; minor code elegance issue
  - The variant track uses plain circles rather than lollipop/stick markers as suggested
    by spec — functionally equivalent but the lollipop form would better communicate
    variant position clarity
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — PASS. Even-numbered tracks (Coverage, Regulatory) have a slightly elevated #FFFDF6 tint that cleanly separates them from the page surface.
      Chrome: Main title "genome-track-multi · python · altair · anyplot.ai" is dark, centered, clearly readable. Track sub-titles (Genes, Coverage, Variants, Regulatory) are muted INK_MUTED colored at fontSize=12 and anchor-left within each track — all readable. X-axis label "Genomic Position (chr7)" at bottom is visible. Y-axis labels "Read Depth" (Coverage) and "Quality" (Variants) are readable at titleFontSize=12. X-axis tick labels formatted as "55,140,000" style numbers are readable at labelFontSize=10.
      Data: Coverage area filled with brand green #009E73 with opacity 0.55 + line stroke — peaks over exon regions are clearly higher, telling a biological story. Exon bars in blue (#4467A3), intron lines in the same blue, strand direction triangles in cyan (#2ABCCD). Variant circles: SNP in green (#009E73), Indel in lavender (#C475FD) at opacity 0.75. Regulatory bars: Promoter in matte red (#AE3030), Enhancer in ochre (#BD8233). Gene names EGFR and VOPP1 are bold text labels anchored to their gene bodies.
      Legibility verdict: PASS — all text clearly readable against warm off-white background, no "light on light" failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — PASS. Elevated track backgrounds flip to #242420 as expected.
      Chrome: Title text flips to light (#F0EFE8) and is clearly readable against the dark background. Track labels, axis labels, tick labels all use light INK_SOFT tokens — all readable. No dark-on-dark failures observed. Legend box backgrounds flip to #242420 with light text for SNP/Indel and Promoter/Enhancer entries.
      Data: Coverage green #009E73 is identical to light render — PASS. Exon blue #4467A3, strand cyan #2ABCCD, variant green/lavender, regulatory red/ochre — all visually identical to light render (only chrome flipped). Brand green #009E73 reads clearly on both the dark near-black background and the slightly elevated #242420 coverage track background.
      Legibility verdict: PASS — all text readable against near-black background, data colors identical to light render, theme inversion correct.
