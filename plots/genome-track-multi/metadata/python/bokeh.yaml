  strengths:
  - Shared x-range (linked panning) across 4 tracks is a distinctive, showcase-worthy
    Bokeh feature
  - 'Biologically accurate data: EGFR gene on chr7 with realistic exon positions,
    coverage peaks over exons, GATK-scale variant quality scores'
  - Semantic Imprint palette assignments are well-reasoned (promoter→red, coverage→brand-green,
    exons→blue)
  - 'Full spec compliance: all four required track types with correct visualisation
    idioms (lollipop, area, exon blocks)'
  - Perfect theme adaptation — both renders pass legibility checks with no dark-on-dark
    or light-on-light failures
  - 'Excellent code quality: reproducible, KISS structure, all Bokeh idioms used correctly'
  weaknesses:
  - 'Font sizes significantly below style-guide recommendations for a 3200-px canvas.
    Title 36pt (rec. 50pt) renders at ~35% of canvas width, well under the 70-85%
    target for this long mandated title. Y-axis labels 22pt (rec. 42pt), tick labels
    18-20pt (rec. 34pt). Increase: title to 44-48pt, axis labels to 30-36pt, tick
    labels to 24-28pt. Adjust min_border_* accordingly.'
  - 'DE-03 storytelling is implicit: coverage-exon alignment story requires viewer
    inference. Consider adding subtle vertical shading bands over exon positions in
    the coverage and variant tracks (fill_alpha~0.06) to visually tie expression peaks
    to gene structure.'
  - No subtle track-background alternation (spec mentions subtle background shading
    to visually separate adjacent tracks). Alternating ELEVATED_BG for even-numbered
    tracks would improve visual rhythm.
