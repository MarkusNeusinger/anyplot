review:
  strengths:
  - Shared x_range (Range1d) across all 4 figures enables synchronized genomic navigation
    — a hallmark Bokeh feature used correctly
  - Subtle exon-position shading (6% alpha) in coverage and variant panels creates
    cross-track visual linkage to gene structure
  - Biologically realistic EGFR locus data with exon-enriched coverage peaks, strand
    direction arrows, and proper chr7:55Mb coordinates
  - Redundant encoding in Variants track (SNP=circle, Indel=diamond) aids colorblind
    accessibility
  - Correct HoverTool integration with vline mode on coverage and point tooltips on
    variants — legitimate interactive features for the HTML artifact
  - 'Full Imprint palette compliance: brand green for primary data series, canonical
    colors for exon/UTR/regulatory elements, correct theme-adaptive chrome in both
    renders'
  - NumeralTickFormatter for human-readable base-pair positions (55,100,000 format)
  weaknesses:
  - Axis label font sizes (32pt) and tick label font sizes (26pt) are below style-guide
    recommendations (42pt / 34pt). At 3200x1800 this makes labels noticeably smaller
    than intended — reduce further only if the multi-track layout truly forces it,
    otherwise target the canonical sizes.
  - 'Gene track is quite sparse visually (thin exon rectangles at a small height=380px
    panel) — the intron backbone and strand arrows are somewhat hard to see in the
    thumbnail. Minor: no structural fix needed but note for future repair if score
    is marginal.'
  - min_border_bottom=200 on the regulatory panel creates a noticeable amount of empty
    canvas below the x-axis label in both renders — consider reducing to 120-140px.
