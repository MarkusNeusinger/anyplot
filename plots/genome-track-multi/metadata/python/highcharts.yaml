review:
  strengths:
  - Excellent multi-track genome browser with 4 correctly stacked tracks (genes, coverage,
    variants, regulatory) all sharing a common x-axis
  - 'Expert Highcharts multi-yAxis usage with mixed series types: arearange (exons/regulatory),
    areaspline (coverage), scatter (labels/legends), columnrange (lollipop stems)'
  - 'Correct Imprint palette application with biologically-informed semantic color
    assignments: brand green for genes, blue for coverage, lavender for SNPs, matte
    red for indels, cyan for enhancers, ochre for promoters'
  - 'Full theme adaptation: all chrome (backgrounds, text, grid, separators) adapts
    correctly between light (#FAF8F1) and dark (#1A1A17) renders; data colors identical
    across both themes'
  - 'Real scientific data: genuine TP53 locus (chr17, GRCh38), actual rs-number variant
    IDs, biologically realistic coverage pattern with elevated reads at exons'
  - 'Rich domain-specific detail: intron chevron patterns for strand direction, cross-track
    exon plotBands for alignment shading, dashed separators between tracks via chart
    load event, gradient fill for coverage, lollipop markers with PHRED-quality height
    encoding'
  weaknesses:
  - Last x-axis tick label truncated to '7.592 …' at the right canvas edge — Highcharts
    replaced 'Mb' with ellipsis because spacingRight=50 is too tight; increase spacingRight
    to at least 100 (or clamp the xAxis max to a position where the last tick renders
    cleanly)
  - Intron chevron lines are 3px lineWidth — visually thin at full resolution and
    may be hard to distinguish at smaller preview widths; increase to 4-5px for better
    visibility
  - Regulatory inline legend ('■ Enhancer' and '■ Promoter') both positioned at x
    = region_start+400 in the left margin of the track — at y=0.28 and y=0.72 they
    are readable but risk overlapping with the first enhancer rectangle; shifting
    x to region_start+100 and stacking vertically would give more breathing room
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title 'TP53 Locus (chr17) · genome-track-multi · python · highcharts · anyplot.ai' in dark (#1A1A17) text spans ~78% of canvas width — proportionate and readable. Subtitle 'chr17:7,570,000–7,592,000 (GRCh38)' clearly visible. Track labels 'Genes', 'Coverage', 'Variants', 'Regulatory' in bold, color-coded text (green, blue, dark, dark respectively) are all readable. X-axis title 'Genomic Position (chr17)' fully visible at bottom. Tick labels ('7.570 Mb', '7.572 Mb', etc.) readable except the last tick which shows '7.592 …' — ellipsis truncation due to tight spacingRight=50. Y-axis coverage ticks ('100x', '80x', etc.) and variant ticks ('125', '100', etc.) readable.
      Data: Gene track shows green (#009E73) filled exon rectangles with intron chevron lines. Coverage track shows blue (#4467A3) areaspline with gradient fill. Variant track shows lavender (#C475FD) circle SNPs and matte-red (#AE3030) diamond indels as lollipop markers. Regulatory track shows cyan (#2ABCCD) enhancer and ochre (#BD8233) promoter rectangles. Subtle green cross-track exon plot bands unify the tracks vertically.
      Legibility verdict: PASS — all text readable against light background. Minor ellipsis on last x-axis tick is a layout issue, not a legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface. NOT pure black.
      Chrome: Title in light (#F0EFE8) text — clearly readable. Track labels visible: 'Genes' in green (#009E73), 'Coverage' in blue (#4467A3), 'Variants' and 'Regulatory' in off-white INK (#F0EFE8). Axis tick labels ('7.570 Mb', etc.) in INK_SOFT (#B8B7B0) — readable light-on-dark. Coverage tick labels ('100x', '80x', etc.) and variant tick labels readable in light gray. X-axis title fully visible. NO dark-on-dark failures detected.
      Data: Gene/coverage/variant/regulatory data colors are IDENTICAL to light render — brand green #009E73, blue #4467A3, lavender #C475FD, matte-red #AE3030, cyan #2ABCCD, ochre #BD8233. Coverage gradient adapts naturally on dark background. Same '7.592 …' truncation visible.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark failures. Brand green and all Imprint palette colors remain clearly visible on dark surface.
