review:
  strengths:
  - Semantic Imprint palette assignments (exons=brand green, coverage=blue, SNP=ochre,
    Indel=red, Promoter=lavender, Enhancer=cyan, CTCF=lime) are biologically intuitive
    and palette-compliant
  - 'Real biological data: EGFR locus with factually accurate chromosomal coordinates,
    real dbSNP IDs, and 28-exon gene structure'
  - Left-edge accent strips in track-specific colors are an elegant design touch that
    reinforces track identity
  - Coverage fill opacity adapted per theme (0.35 light / 0.5 dark) demonstrates thoughtful
    theme-aware design
  - Interactive HTML with rangeslider enables genomic region navigation — a distinctive
    Plotly feature
  - Dynamic title fontsize calculation correctly handles the long mandated title without
    overflow
  weaknesses:
  - All four subplot borders remain visible — top and right spines not removed; removing
    them would match the style guide L-shape default
  - Regulatory element text labels absent; spec lists label as optional but adding
    small labels would enhance storytelling
  - Lollipop variants use 2 Scatter traces per variant (line + head) producing 26
    traces for 13 variants — could be consolidated with None-separated single Scatter
    for stems
