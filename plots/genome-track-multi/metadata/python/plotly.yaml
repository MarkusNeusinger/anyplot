review:
  strengths:
  - 'Excellent genomic data: real EGFR locus (chr7) with biologically accurate 28
    exons, real rs-ID variant labels, and coverage depth that realistically aligns
    with exon positions'
  - Sophisticated multi-track layout using make_subplots with shared x-axes; correct
    row_heights=[0.2, 0.35, 0.2, 0.2] allocation based on information density
  - 'Strong lollipop variant track encoding: SNPs vs indels distinguished by both
    color (ochre/matte-red) AND shape (circle/diamond) — textbook CVD accessibility'
  - 'Polished design details: colored left-edge accent strips per track, alternating
    track shading, and a clean divider system'
  - 'Correct Imprint palette applied with semantic reasoning: brand green for gene
    exons, blue for coverage, ochre/matte-red for variants, and lavender/cyan/lime
    for regulatory types'
  - HTML output with rangeslider for interactive genomic navigation is a genuine Plotly
    strength and adds real usability
  - Title font-size formula (round(16 × 67 / len(title))) correctly handles the 70-char
    title; all chrome tokens (INK, INK_SOFT, PAGE_BG) are theme-adaptive
  weaknesses:
  - 'Regulatory elements render as bone/hourglass shapes instead of clean rectangles:
    go.Scatter with fill=''toself'' and no explicit mode=''lines'' causes plotly to
    render the closed polygon with visual distortion. Fix: add mode=''lines'' to each
    regulatory go.Scatter trace, or replace with add_shape(type=''rect'') calls for
    each element.'
  - 'Dark-mode vertical grid lines bleed through all four tracks: x-axis update for
    rows 1-3 does not set showgrid=False or gridcolor=GRID, so the plotly default
    template gridcolor appears as visible vertical white lines crossing the Gene,
    Coverage, and Variant tracks in plot-dark.png. Fix: add showgrid=False (or gridcolor=GRID)
    to the update_xaxes call for rows 1-3.'
  - 'Minor: some empty vertical space below the legend in both renders — reducing
    margin bottom from 150 to ~100 and adjusting legend y to -0.12 would tighten the
    canvas utilization.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct.
      Chrome: Title "EGFR Locus (chr7) · genome-track-multi · python · plotly · anyplot.ai" at ~15px, spanning ~80% of canvas width — expected for the long mandated format. Subtitle "Multi-track genome browser — chr7:55,086,000–55,280,000" visible in muted INK_MUTED tone. Y-axis track labels (Genes, Coverage, Variants/Quality, Regulatory) in bold INK color — all clearly readable against the warm off-white background. X-axis tick labels with genomic coordinates and "Genomic Position (bp)" axis title readable.
      Data: Four tracks from top to bottom: (1) Gene track — #009E73 green exon rectangles with gray (INK_SOFT) arrows indicating + strand direction on intron backbone; "EGFR (+)" annotation in green above. (2) Coverage track — #4467A3 blue filled area with rgba(68,103,163,0.35) fill, clearly showing read-depth variation correlated with exon positions. (3) Variants track — lollipop chart with ochre circles (SNP, #BD8233) and dark-red diamonds (Indel, #AE3030), height encoding quality score (0–100). (4) Regulatory track — colored closed-polygon shapes: Promoter in #C475FD lavender, Enhancer in #2ABCCD cyan, CTCF in #99B314 lime. ISSUE: Regulatory elements render as bone/hourglass shapes rather than clean rectangles — visible artifact in all regulatory elements. Bottom legend shows SNP, Indel, Promoter, Enhancer, CTCF correctly.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title and subtitle rendered in near-white (INK=#F0EFE8) — clearly readable. Track y-axis labels in INK (#F0EFE8) are readable. X-axis tick labels in INK_SOFT (#B8B7B0) readable. No dark-on-dark failures for text. ISSUE: Prominent vertical white lines cross all four tracks at x-axis major tick positions — these are the default plotly template gridlines showing through shared x-axes for rows 1-3 because showgrid=False was not set, creating a distracting crosshatch pattern over the Gene and Regulatory tracks.
      Data: All Imprint palette colors are identical to the light render — brand green exons, blue coverage, ochre SNPs, matte-red indels, lavender/cyan/lime regulatory. Coverage fill uses slightly higher opacity (0.5 in dark vs 0.35 in light) — appropriate. Regulatory bone/hourglass artifact present here too.
      Legibility verdict: PASS for text (all chrome tokens flip correctly). However, the vertical grid lines in the dark render are a visual quality issue.
