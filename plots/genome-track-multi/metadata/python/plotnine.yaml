review:
  strengths:
  - Strong multi-track genome browser layout with four distinct visualization types
    (gene exons/introns/chevrons, coverage ribbon, lollipop variants, regulatory rectangles)
  - 'Correct Imprint palette assignments: brand green for SNPs, canonical palette
    order maintained, theme-adaptive chrome working correctly in both renders'
  - Real EGFR gene with realistic genomic coordinates, biologically plausible coverage
    peaks above exons, appropriate SNP/Indel ratio
  - Clean flat KISS structure, np.random.seed(42) set, all imports used, theme-adaptive
    token system correctly applied
  - Subtle X-only grid, track separator dashed lines, elevated backgrounds on regulatory/coverage
    tracks add professional polish
  weaknesses:
  - 'Title missing language component — "genome-track-multi · plotnine · anyplot.ai"
    should be "genome-track-multi · python · plotnine · anyplot.ai" (fix: add " ·
    python" between spec-id and library in labs(title=…))'
  - 'Design Excellence below threshold: track spacing is uneven (gene track occupies
    very limited vertical height relative to coverage track), and no explicit visual
    hierarchy or emphasis guides the viewer to a specific insight within the EGFR
    region'
  - Track labels (geom_text size=3.5mm ≈ 10pt, bold) are readable but slightly small
    — increasing to size=4.0 would improve mobile legibility
  - Exons and Promoter regulatory elements share the same blue (#4467A3) across different
    tracks — minor semantic confusion risk, consider using the exon geom with a border
    outline to differentiate
  image_description: |-
