review:
  strengths:
  - Complete multi-track genome browser with all 4 required track types (genes with
    exons/introns/chevrons, filled-area coverage, lollipop variants, colored regulatory
    elements)
  - Biologically realistic data using real EGFR locus at chr7:55,086,000-55,141,000
    with accurate 13-exon structure and coverage peaks at exon positions
  - Perfect Imprint palette compliance with brand green for the first categorical
    series (SNP), canonical-order subsequent colors, and full theme-adaptive chrome
    in both renders
  - Clean plotnine grammar-of-graphics layer composition — ggplot() without global
    data, per-layer data pattern, guided legend ordering, and categorical Pandas types
    with ordered categories
  weaknesses:
  - Track labels (geom_text size=3.5mm ≈ 9.9pt) and EGFR gene label are borderline
    small at mobile scale (~400px width); consider size=4–4.5mm for better mobile
    readability
  - Regulatory element rectangles (reg_half=0.25 → 0.5 unit tall) are quite narrow
    relative to the plot; increasing to reg_half=0.3–0.35 would improve visibility
    without crowding the track
  - DE-03 data storytelling is functional but not maximized — the biological insight
    that coverage spikes align with exon positions is implicit; a subtle annotation
    or reference line connecting the gene track exons to the coverage peaks would
    elevate narrative clarity
