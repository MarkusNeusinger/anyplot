      Data: SNP lollipop heads #009E73 (brand green, first series) ✓; Indel heads #C475FD (lavender, pos 2) ✓; Coverage ribbon #2ABCCD (cyan, pos 6); Exon rectangles #4467A3 (blue, pos 3); Promoters #4467A3 (blue), Enhancers #BD8233 (ochre), Insulators #AE3030 (red). All data elements clearly distinguishable.
