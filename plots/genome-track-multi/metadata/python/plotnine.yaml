      Background: Warm off-white (#FAF8F1) — correct Imprint light surface; the two shaded track backgrounds (coverage and regulatory bands) use the slightly elevated #FFFDF6 tone, cleanly separating them from the gene and variant track areas.
      Chrome: Title "genome-track-multi · python · plotnine · anyplot.ai" in dark bold text, clearly readable. X-axis label "Genomic Position (chr7)" in dark ink, readable. Tick labels formatted with comma separators (55,090,000 … 55,140,000) in INK_SOFT dark grey, readable. Track labels ("Genes", "Coverage", "Variants", "Regulatory") in bold INK_SOFT at top-left of each band — small but legible at full resolution.
      Data: Genes track shows 13 blue (#4467A3) exon rectangles connected by thin intron lines with V-shaped chevron strand markers in mid-grey; "EGFR (+)" label in italic bold. Coverage track shows a cyan (#2ABCCD) filled ribbon area with peaks visible over exon positions. Variants track shows 18 lollipop markers — SNPs in brand green (#009E73), Indels in lavender (#C475FD). Regulatory track shows Promoter (blue), Enhancer (ochre), Insulator (red) colored rectangles. Legend on right shows both Variant Type and Regulatory categories.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface; shaded track backgrounds use the slightly elevated #242420 tone.
      Chrome: Title in light (#F0EFE8) text against dark background — clearly readable. Axis labels and tick labels rendered in INK_SOFT light grey (#B8B7B0) — clearly visible. Track labels in INK_SOFT light grey — readable. Dashed separator lines visible in muted INK_MUTED grey. Legend box uses elevated dark background (#242420) with light text — readable.
      Data: Data colors (green SNP, lavender Indel, cyan coverage, blue exons, ochre/blue/red regulatory) are visually identical to the light render — only chrome has flipped. No dark-on-dark failures detected; all text elements use light-colored tokens against the dark surface.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures observed.
