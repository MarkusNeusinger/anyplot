      Background: Warm near-black #1A1A17 — correct Imprint dark surface. Elevated backgrounds #242420 on coverage and regulatory tracks.
      Chrome: Title in light cream #F0EFE8 on dark bg — readable. Axis labels and ticks in INK_SOFT (#B8B7B0) — clearly readable. Track labels in INK_SOFT. Legend text in light tones. Dashed separator lines in INK_MUTED. No dark-on-dark failures — all chrome elements correctly flipped to light tokens.
