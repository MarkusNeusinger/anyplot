      Data: 4 tracks top to bottom. (1) Genes: 4 HOXA genes with green (#009E73) exon rectangles, thin intron lines, and chevron strand indicators. (2) Coverage: blue (#4467A3) filled area plot with RNA-seq depth peaks correlating with exon positions. (3) Variants: purple (#C475FD) circles for SNPs and ochre (#BD8233) diamonds for indels as lollipop markers, with variant quality legend. (4) Regulatory: matte-red (#AE3030) Promoter, cyan (#2ABCCD) Enhancer, and rose (#954477) Insulator rectangles with legend. Subtle green-tinted exon guide bands span all tracks vertically.
