review:
  strengths:
  - Excellent multi-track genome browser layout with 4 biologically appropriate tracks
    (genes, coverage, variants, regulatory) stacked vertically with shared x-axis
  - Clever exon guide bands (subtle green shading across all tracks) visually connect
    gene structure to coverage peaks, variant positions, and regulatory element placement
    — a distinctive data storytelling device
  - Correct Imprint palette application across all 7 color slots with semantically
    motivated assignments (brand green for gene exons, blue for sequencing coverage,
    lavender for SNPs, red for promoters)
  - 'Expert matplotlib usage: LineCollection for efficient batch lollipop stem rendering,
    FancyBboxPatch with rounded corners for genomic features, PathEffects withStroke
    for gene label readability'
  - 'Full theme adaptation — both light and dark renders are legible with correct
    backgrounds (#FAF8F1 / #1A1A17), adaptive chrome tokens, and identical data colors
    across themes'
  - Real biological data (HOXA gene cluster on chr7) with accurate genomic coordinates,
    realistic coverage depth, and biologically plausible regulatory element placement
  weaknesses:
  - Inter-track spacing is very tight (hspace=0.08) — the 4 tracks feel cramped vertically;
    consider increasing to hspace=0.12-0.15 to give each track more breathing room
  - Variant track has minor element density in some regions — the last enhancer element
    near the 27.28 Mb right edge may partially overlap the regulatory legend box;
    consider adjusting legend positioning or padding
  - 'VQ-01 minor: with 4 stacked tracks at different heights, the ''Regulatory'' y-axis
    label in the bottom (shortest) track appears slightly tight — track height ratio
    could be increased for that track'
