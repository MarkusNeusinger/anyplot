      Data: Gene track: blue (#4467A3) exon rectangles connected by thin intron line with left-pointing chevrons (minus strand), BRCA1 italic label, "(−)" strand indicator — all clearly visible. Coverage track: smooth hermite-interpolated green (#009E73) filled area with darker green stroke; peaks visible over exon positions. Variants track: red (#AE3030) circles for SNPs and lavender (#C475FD) circles for Indels scattered across track, manual legend "• SNP □ Indel" in upper right. Regulatory track: ochre (#BD8233) Promoter bars, cyan (#2ABCCD) Enhancer bars, rose (#954477) CTCF bar; type labels above each element; color legend at bottom right.
      Defect noted: Leftmost "Promoter" label appears as "romoter" — "P" clipped by plotArea clip-path.
