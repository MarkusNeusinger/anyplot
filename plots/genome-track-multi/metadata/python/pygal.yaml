review:
  strengths:
  - Real BRCA1 genomic data with accurate hg38-like coordinates — biologically authentic,
    not fabricated
  - 'Impressive multi-track composite: 3 embedded pygal charts (XY coverage, XY scatter,
    Histogram) stitched into a hand-built SVG frame'
  - Hermite interpolation on the coverage track produces a smooth, publication-quality
    filled area chart — a distinctive pygal capability
  - 'Perfect dual-theme adaptation: background, ink, and chrome tokens all switch
    correctly between #FAF8F1 and #1A1A17; data colors are identical across renders'
  - 'Semantically justified color assignments: #009E73 for coverage (first series),
    #AE3030 for SNPs (mutation/error semantic), all remaining colors from the Imprint
    palette'
  - 'Full spec compliance: gene track with exons, intron chevrons, strand indicator,
    coverage fill, variant scatter with quality encoding, regulatory interval bars'
  - 'Biological storytelling: subtitle, strand direction (−), exon labels, and coverage
    peaks over exons clearly convey the BRCA1 gene structure story'
  - Clean, reproducible code with np.random.seed(42) and a single well-justified utility
    function (embed_pygal_svg)
  weaknesses:
  - 'Leftmost Regulatory track label ''Promoter'' is partially clipped by the clip-path
    (plotArea at x=240): the Promoter element starts at region_start=41150000 (x=0
    normalized), so the label center falls at ~x=267 in canvas coords, but the text
    extends to ~x=227, which is inside the margin region that gets clipped — shows
    as ''romoter'' in both renders. Fix: skip the label (or right-align it at rx2+4)
    when an element starts at or within ~40 canvas-px of the plot left edge.'
  - 'Possible partial clipping of the rightmost SNP scatter marker in the Variants
    track at the embedded SVG right boundary: pygal auto-scales the XY x-axis to the
    data range [0.294, 0.795], placing the rightmost data point near the right edge
    of the internal chart area; with dots_size=10 (radius=5) the dot may extend past
    the embedded SVG boundary at x=3120. Fix: set explicit x_range=(0, 1) on var_chart
    to prevent auto-scaling pushing the last marker to the chart edge.'
  - 'Variants track has large empty vertical space: quality scores span 55–97 but
    the y-range is (0, 105), leaving ~50% of the track blank below the lowest marker.
    Fix: set range=(50, 100) or tighten the y-range to (40, 105) to better use track
    height.'
  - 'No visual focal point or annotation: the plot is informative but doesn''t guide
    the viewer to the most biologically interesting feature (e.g., the highest-coverage
    exon peak, or a pathogenic variant). Consider a brief callout annotation on the
    most prominent coverage peak.'
