review:
  strengths:
  - 'Full spec compliance: all 4 track types (gene annotations, coverage area, variant
    scatter, regulatory rectangles) implemented with strand direction chevrons, hermite-interpolated
    coverage, and quality-encoded variant markers'
  - Biologically accurate BRCA1 data with real hg38 exon coordinates adds authenticity
    — coverage peaks correctly elevated at exon positions
  - 'Sophisticated multi-track composite SVG: alternating track backgrounds, color
    accent strips, gradient header decoration, and subtle dashed vertical grid lines
    create professional genome-browser aesthetic'
  - 'Creative pygal usage: hermite interpolation for smooth coverage curve, Histogram
    chart type for regulatory interval bars, XY scatter for variants with transparency
    — all via transparent pygal sub-charts composited into a single SVG'
  - 'Perfect dual-theme adaptation: background #FAF8F1 / #1A1A17, all chrome tokens
    correctly applied, data colors identical between light and dark renders'
  - HTML output with interactive pygal tooltips provides bonus interactivity beyond
    the static PNG requirement
  weaknesses:
  - 'Manually placed SVG text is too small for a 3200px canvas: track labels use font-size=25px,
    x-axis ticks 19px, x-axis title 24px, regulatory element labels 17px, and legend
    text 18-19px — all well below the recommended 44-56px. At the 400px mobile render,
    tick labels and legend text are illegible (render to ~2-4px). Increase all manual
    SVG text: track labels to 44-48px, x-axis ticks to 36-40px, x-axis title to 48-52px,
    legend text to 36-40px, regulatory labels to 30-34px.'
  - 'Partial red circle clipped at the right boundary of the Variants sub-chart: a
    SNP marker appears cut off at x≈3120 (MARGIN_LEFT+PLOT_W) in both light and dark
    renders. This is a viewBox/padding alignment issue. Fix by setting x_range=(-0.01,
    1.01) on the variant chart to give dots at x=1.0 enough room, or by widening MARGIN_RIGHT
    from 80 to 120px.'
  - 'Tight bottom margin: ''Genomic Position (chr17)'' label is placed at y=1761 on
    a 1800px canvas, leaving only 39px below it. Increase MARGIN_BOTTOM from 120 to
    160px to prevent future overlap and give the bottom axis room to breathe.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface
      Chrome: Title "BRCA1 Gene Region (chr17) · genome-track-multi · python · pygal · anyplot.ai" bold and clearly visible at ~59px. Italic subtitle "Breast Cancer Susceptibility Gene 1 — 23 exons, ~83 kb" readable. Track labels (Genes, Coverage, Variants, Regulatory) visible at left in dark ink. X-axis tick labels ("41.16 Mb" ... "41.30 Mb") and axis title "Genomic Position (chr17)" visible but small. Coverage y-axis ticks (0x, 77x) very small. Variant legend (SNP/Indel) and regulatory legend (Promoter/Enhancer/CTCF) visible but small.
      Data: Gene track shows blue (#4467A3) exon rectangles on intron line with left-pointing chevrons for minus strand; BRCA1 label in italic. Coverage track filled with brand green (#009E73) with darker green stroke — coverage peaks clearly elevated at exon positions. Variant scatter shows red (#AE3030) circles for SNPs and lavender (#C475FD) for indels with quality-score y-axis. Regulatory track shows ochre (#BD8233) Promoter bars, cyan (#2ABCCD) Enhancer bars, rose (#954477) CTCF bar. Partial red circle visible at right edge of Variants sub-chart (data-point clipping artifact). Alternating track backgrounds with color accent strips on left. Dashed vertical grid lines across all tracks.
      Legibility verdict: PASS for full-size; FAIL at 400px mobile scale — tick labels (19px), legend text (18-19px), and regulatory labels (17px) render to ~2-3px at 400px width and are illegible.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface
      Chrome: Title and subtitle use light ink (#F0EFE8) — clearly readable against dark background. Track labels use INK_SOFT (#B8B7B0) token — correctly light-colored on dark background. X-axis ticks and axis title use light ink. Coverage ticks (0x, 77x) in light ink. Variant and regulatory legends in light ink. No dark-on-dark failures observed — all chrome correctly inverted.
      Data: Data colors are identical to light render — brand green coverage, blue gene exons, red SNPs, lavender indels, ochre promoters, cyan enhancers, rose CTCF. Same partial red circle at right edge of Variants track. CTCF bar near right edge of Regulatory track is slightly tight but fully visible.
      Legibility verdict: PASS for full-size; FAIL at 400px mobile scale — same small font sizes (17-25px manually placed SVG text) are illegible at mobile scale, identical to light render.
