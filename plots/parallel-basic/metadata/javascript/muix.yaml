review:
  strengths:
  - Hand-built a genuine parallel-coordinates chart on top of MUI X's low-level primitives
    (useXScale, useDrawingArea) since the community package has no native parallel-coordinates
    component — exactly the documented escape hatch, and executed cleanly.
  - Each dimension keeps its own independent min/max scale with correctly labeled
    tick values (min/mid/max) per axis, which is the whole point of the chart type
    and easy to get wrong.
  - Imprint palette applied in canonical order (CNN=#009E73 brand green, RNN=lavender,
    Transformer=blue) and is pixel-identical between light and dark renders; only
    chrome flips.
  - Alpha-blended lines (0.55) appropriately handle 30 overlapping observations per
    the spec's transparency guidance, and the three architecture clusters are visually
    distinguishable.
  - Deterministic in-memory data generation via a tiny fixed-seed LCG, per-architecture
    fractional centers plus jitter — realistic ML hyperparameter/performance data
    across 5 natively-scaled dimensions (batch size, layers, dropout %, accuracy %,
    train time).
  - 'Clean React component: default-exported, skipAnimation set, no manual mount/ReactDOM
    code, only imports what''s used.'
  weaknesses:
  - With 30 lines crossing 5 axes, the middle sections (Hidden Layers -> Dropout ->
    Val Accuracy) get visually busy where all three clusters converge near the axis
    crossing points; consider slightly lower alpha (e.g. 0.4-0.45) or thinner strokeWidth
    for the RNN/CNN overlap band to ease the crowding.
  - No explicit visual callout (annotation, highlighted line, or reference band) draws
    attention to a specific standout pattern (e.g. the Transformer cluster's higher
    accuracy/higher cost trade-off) — the chart relies entirely on the viewer to infer
    the story from color clustering alone.
  - Legend swatches and axis-label text share the same ~15px size band with no size
    differentiation to signal hierarchy (e.g. title vs. axis label vs. legend) beyond
    weight/color.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1-consistent), no pure white.
      Chrome: Title "parallel-basic · javascript · muix · anyplot.ai" top-left in bold dark ink; legend (CNN/RNN/Transformer swatches + labels) top-right; five vertical dimension axes (Batch Size, Hidden Layers, Dropout (%), Val Accuracy (%), Train Time (min)) each with min/mid/max tick labels in soft grey-ink, axis titles bold dark ink above each axis. All text is clearly legible against the light background — no light-on-light issues.
      Data: 30 polylines colored by architecture — CNN green (#009E73, first series, correct), RNN lavender/purple, Transformer blue — alpha-blended (~0.55) so overlapping lines remain distinguishable. Clear cluster separation is visible: Transformer runs sit high on Hidden Layers/Val Accuracy/Train Time, RNN runs sit lower on Batch Size with mid-range Dropout, CNN runs cluster centrally.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17-consistent), no pure black.
      Chrome: Same title/legend/axis layout, now rendered in light ink (near-white) against the dark background. Tick labels and axis titles are all clearly visible with no dark-on-dark occurrences.
      Data: Same three architecture colors at the same alpha, pixel-identical to the light render — only the chrome (text, axis lines) flipped to light-on-dark. Cluster patterns read identically to the light version.
      Legibility verdict: PASS
