review:
  strengths:
  - 'Repair directly addresses the prior review''s DE weaknesses: a bold (borderWidth
    4) mean-profile line per species is now layered on top of the faint (alpha 0.35,
    borderWidth 1.25) individual traces, giving all three species a clear focal line
    instead of only Setosa standing out.'
  - Individual-trace alpha was reduced from 0.5 to 0.35, measurably de-cluttering
    the Sepal Length -> Sepal Width -> Petal Length crossing region while keeping
    Setosa's separation crisp.
  - Chart.js has no native parallel-coordinates type; the category-axis + per-observation
    line-dataset workaround remains a clean, idiomatic core-API solution rather than
    reaching for a plugin.
  - Custom legend via generateLabels still correctly collapses the 63 total datasets
    (60 individual + 3 mean) into 3 species entries with matching colors, and onClick
    is disabled so a legend click can't silently toggle a single representative dataset.
  - Min-max normalization is applied per-dimension and explicitly documented in both
    code comments and the y-axis title, directly following the spec's normalization
    guidance.
  - Data is realistic and iris-inspired (per-species mean/sd matches real iris proportions)
    and fully reproducible via a fixed-seed LCG + Box-Muller normal generator, since
    the browser has no seeded RNG.
  - 'Theme-adaptive chrome remains correctly wired: title/legend/axis text use t.ink/t.inkSoft,
    the parallel-axis vertical grid lines use t.ink (flips light/dark correctly),
    and y-axis gridlines stay disabled to avoid clutter.'
  weaknesses:
  - The Sepal Length -> Sepal Width crossing region is still visually dense for Versicolor
    vs Virginica individual traces (their faint lines overlap heavily there); the
    new bold mean lines mitigate this but the raw trace tangle itself is unchanged
    in that segment.
  - Because each axis is independently min-max normalized, the original units/values
    (e.g. actual cm for sepal/petal measurements) are still not visible anywhere on
    the chart, only the 0-1 normalized scale — small min/max value annotations near
    each axis endpoint (or a tooltip surfacing raw values) would restore that context.
  - Typography and color are otherwise standard Chart.js defaults applied via explicit
    sizes; beyond the new mean-line emphasis there is limited additional aesthetic
    customization (e.g. no subtle background banding or per-axis value ticks) that
    would push this toward a publication-ready look.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches spec — not pure white.
      Chrome: Title "parallel-basic · javascript · chartjs · anyplot.ai" in bold dark ink at top, fully visible, not clipped (verified via edge crop). Legend row below title shows three swatches: Setosa (green), Versicolor (violet/lavender), Virginica (blue-gray) — all readable. Y-axis ticks (0, 0.3, 0.5, 0.8, 1.0) and rotated y-axis title "Normalized Value (min-max scaled per dimension)" are dark and legible, fully within the left canvas margin. Four x-axis category labels (Sepal Length, Sepal Width, Petal Length, Petal Width) are dark, legible, and sit fully within the canvas at both edges (verified via edge crop — "Petal Width" is not truncated on the right).
      Data: First series (Setosa) is Imprint brand green #009E73; Versicolor uses lavender/purple #C475FD; Virginica uses blue #4467A3 — matches canonical Imprint palette order. 60 faint (alpha ~0.35) individual-observation lines connect each species across the four axes, with one bold mean-profile line per species drawn on top. Setosa's mean line and cluster clearly separate into a distinct low band on Petal Length/Petal Width; Versicolor and Virginica's mean lines are now clearly distinguishable from each other even though their faint individual traces still overlap in the Sepal Length/Sepal Width region.
      Legibility verdict: PASS — all text is clearly readable against the light background, no dark-on-dark or light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches spec — not pure black.
      Chrome: Title, legend text, y-axis ticks/title, and x-axis category labels are all rendered in light/off-white ink, clearly legible against the dark background (verified via edge crop, no clipping at top/left/right). The four vertical parallel-axis lines are now light/white (chrome token flipped correctly from dark ink in the light render), consistent with theme-adaptive grid coloring.
      Data: Data colors are pixel-identical to the light render — same green/lavender/blue hues for Setosa/Versicolor/Virginica, same bold mean lines over faint individual traces — confirming only chrome (background, text, grid) flipped between themes, not the data palette.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title, legend, tick, and axis-title text is clearly visible against the dark background.
