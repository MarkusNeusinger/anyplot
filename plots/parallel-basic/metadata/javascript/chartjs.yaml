review:
  strengths:
  - Chart.js has no native parallel-coordinates type; the implementation solves this
    with a clean, idiomatic core-API workaround (category x-axis of dimension names
    + one line dataset per observation on a shared 0-1 y-axis) rather than reaching
    for a plugin, matching the library's NOT_FEASIBLE-vs-workaround guidance.
  - Custom legend via generateLabels correctly collapses 60 per-observation datasets
    into 3 species entries with matching colors, and onClick is disabled so a legend
    click can't silently break the visual by toggling a single representative dataset.
  - Min-max normalization is applied per-dimension and explicitly documented in code
    comments and the y-axis title ('Normalized Value (min-max scaled per dimension)'),
    directly following the spec's normalization note.
  - Setosa's separation on the Petal Length/Petal Width axes is clearly visible as
    a distinct low-value band, giving the chart a genuine data-storytelling payoff
    (the classic iris-species-separation insight).
  - Data is realistic and iris-inspired (per-species mean/sd matches real iris proportions),
    fully reproducible via a fixed-seed LCG + Box-Muller normal generator since the
    browser has no seeded RNG.
  - 'Theme-adaptive chrome is correctly wired: title/legend/axis text use t.ink/t.inkSoft,
    the parallel-axis vertical grid lines use t.ink (dark in light theme, light in
    dark theme), and y-axis gridlines are disabled to avoid clutter.'
  weaknesses:
  - Design Excellence is largely default Chart.js line styling (uniform 1.75px stroke,
    flat alpha=0.5) with no additional visual hierarchy beyond color — consider a
    subtle emphasis technique (e.g. a slightly bolder mean-per-species line drawn
    on top of the faint individual traces) to strengthen the focal point.
  - The Sepal Length -> Sepal Width -> Petal Length crossing region is heavily tangled
    for Versicolor vs Virginica (their lines overlap almost completely in color and
    position), making it hard to visually separate those two species outside of the
    petal dimensions; a lower alpha (~0.35) or slightly thinner strokes for the 60-line
    density would reduce clutter without losing Setosa's clear separation.
  - Because each axis is independently min-max normalized, the original units/values
    (e.g. actual cm for sepal/petal measurements) are not visible anywhere on the
    chart — only the 0-1 normalized scale. Adding small min/max value annotations
    near the top/bottom of each dimension axis (or a hover tooltip surfacing the raw
    value) would restore context that is otherwise lost to normalization.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches spec — not pure white.
      Chrome: Title "parallel-basic · javascript · chartjs · anyplot.ai" in bold dark ink at top, fully visible, not clipped. Legend row below title shows three swatches: Setosa (green), Versicolor (violet/lavender), Virginica (blue-gray) — all readable. Y-axis ticks (0, 0.3, 0.5, 0.8, 1.0) and rotated y-axis title "Normalized Value (min-max scaled per dimension)" are dark and legible. Four x-axis category labels (Sepal Length, Sepal Width, Petal Length, Petal Width) are dark, legible, and sit fully within the canvas at both edges. Four bold dark vertical lines mark each dimension's parallel axis.
      Data: First series (Setosa) is the Imprint brand green #009E73; Versicolor uses lavender/purple; Virginica uses a blue-gray — matches canonical Imprint palette order. 60 semi-transparent lines connect each observation across the four axes; Setosa clearly separates into a distinct low band on Petal Length/Petal Width, while Versicolor and Virginica overlap more in the middle dimensions.
      Legibility verdict: PASS — all text is clearly readable against the light background, no dark-on-dark or light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches spec — not pure black.
      Chrome: Title, legend text, y-axis ticks/title, and x-axis category labels are all rendered in light/off-white ink, clearly legible against the dark background. The four vertical parallel-axis lines are now light/white (chrome token flipped correctly from dark ink in the light render), consistent with theme-adaptive grid coloring.
      Data: Data colors are pixel-identical to the light render — same green/lavender/blue-gray hues for Setosa/Versicolor/Virginica — confirming only chrome (background, text, grid) flipped between themes, not the data palette.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title, legend, tick, and axis-title text is clearly visible against the dark background.
