review:
  strengths:
  - 'Correct plot type: idiomatic ECharts parallel-coordinate system built from a
    `dim`-mapped `parallelAxis` array with a matching `parallel` series'
  - Learning Rate axis correctly uses a log scale with a custom exponential tick formatter
    (`v.toExponential(0)`) — appropriate for a 1e-4..1e-1 range
  - Deterministic, seeded data generation (fixed-seed LCG(42)) satisfies reproducibility
    with no numpy/Math.random dependency
  - 'Correct Imprint palette order and identity: Adam=#009E73 (brand green, always-first),
    RMSprop=lavender, SGD=blue, identical across both themes'
  - Theme-adaptive chrome is threaded correctly through `window.ANYPLOT_TOKENS` for
    title, legend, axis names, tick labels, axis lines, and tooltip — both renders
    are legible with no dark-on-dark or light-on-light failures
  - Realistic, neutral, plausible ML hyperparameter-search dataset (learning rate,
    batch size, dropout, hidden units, validation accuracy) matching the spec's own
    suggested application
  - Title format exactly matches the mandated `parallel-basic · javascript · echarts
    · anyplot.ai` pattern
  - 'Uses line opacity (`lineStyle.opacity: 0.55`) explicitly to handle overlapping
    lines, directly satisfying the spec''s transparency recommendation'
  - '`animation: false` set, no explicit width/height or devicePixelRatio passed to
    `echarts.init` — correct mount-node contract'
  weaknesses:
  - 'Overplotting: 90 lines (30 runs x 3 optimizers) crossing 5 axes turn the Batch
    Size -> Dropout Rate -> Hidden Units region into a dense mesh where individual
    trajectories can''t be traced. Lower lineStyle.opacity further (~0.35-0.4) and/or
    reduce RUNS_PER_OPTIMIZER to ~15-18 so the underlying per-optimizer pattern (e.g.
    Adam''s accuracy edge) reads clearly instead of being buried in visual noise.'
  - 'Hidden Units axis has crowded tick labels at the top: the auto-injected boundary
    tick ''512'' sits almost flush against the next regular tick ''500'', unlike the
    even spacing on the other axes. Round the axis max to a clean value (e.g. 520)
    or hide the boundary tick so labels stay evenly spaced.'
  - 'Design Excellence is at library-default level: the plot uses the Imprint palette
    and hides split lines but has no additional customization (e.g. emphasis/highlight
    state pre-rendered, per-axis background banding, or a deliberate line-ordering)
    to lift it above a well-configured default.'
  - The intended story (Adam achieving higher validation accuracy than SGD) is only
    faintly visible on the rightmost axis due to overplotting. Consider drawing Adam's
    series last (on top) or adding a stronger opacity/width contrast between series
    to make the comparison pop.
