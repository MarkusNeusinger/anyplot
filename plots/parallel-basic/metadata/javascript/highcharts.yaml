review:
  strengths:
  - Correctly sidesteps the forbidden parallel-coordinates add-on module by building
    a genuine multi-axis parallel coordinates chart from the core line series and
    categorical xAxis
  - Legend is deduplicated to one entry per segment (not per line), and a custom tooltip
    formatter shows real denormalized values with per-dimension formatting
  - Both themes are fully legible with correctly flipped chrome and identical data
    colors; canonical Imprint palette order used (green/lavender/blue)
  - Deterministic fixed-seed data generation with realistic, clearly segmented product
    data that tells a coherent story
  weaknesses:
  - Only 4 of the spec's recommended 4-10 dimensions are used - adding 1-2 more dimensions
    would better showcase the technique's multi-variable strength
  - The middle of the chart (Rating to Monthly Sales) is very visually busy with crossing
    lines; consider slightly lower opacity or thinner lines given 60 overlapping observations
  - Distinctive Highcharts-specific interaction features (e.g. hover-highlight-series
    via states.hover) are unused
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1.
      Chrome: Bold dark title "parallel-basic · javascript · highcharts · anyplot.ai" at top, gray subtitle below, four vertical category axes (Price, Rating, Monthly Sales, Inventory) shown as bold vertical gridlines, shared "Normalized Value" y-axis (0-1, ticks every 0.25) on the left, three-entry legend below chart. All text clearly readable.
      Data: ~60 semi-transparent lines colored by segment - brand green (Budget), lavender (Mid-Range), blue (Premium), matching canonical Imprint order. First series is #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17.
