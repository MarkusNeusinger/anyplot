review:
  strengths:
  - 'Directly addressed both attempt-1 weaknesses: non-focal families dropped to stroke-opacity
    0.48 (within the requested 0.45-0.5 range) noticeably reducing hairball clutter,
    while GPU Accelerated got a bolder/more opaque stroke (3.25 / 0.85) and a bold
    legend label to sharpen the focal point'
  - Added a serif (Georgia) title font, a small but real typographic differentiator
    from the sans-serif default
  - Correct Imprint palette in canonical order, theme-correct chrome in both renders,
    data colors pixel-identical across themes
  - 'Idiomatic D3 parallel-coordinates construction: d3.scalePoint for axis positions,
    one independent d3.scaleLinear().nice() per dimension, proper .data().join() pattern'
  - Realistic, neutral cloud-instance dataset with clear per-family separation and
    cross-axis rank changes
  weaknesses:
  - The three non-focal families still cross and overlap heavily in the low-value
    band of most axes (vCPU 0-30, Storage 0-500, Price $0-2) - improved but not eliminated
  - Within each instance family the tiers still scale almost perfectly linearly across
    all 5 dimensions, giving little natural real-world texture
  - Design customization is still confined to typography + emphasis touches rather
    than a more structural distinctive treatment
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1, not pure white.
      Chrome: Serif (Georgia) title centered at top, fully visible, not clipped. Bold dark dimension labels above each of the 5 axes (vCPUs, Memory (GB), Storage (GB), Price ($/hr), Network (Gbps)). Soft-gray tick labels with units readable down each axis. Right-side "Instance Family" legend with 4 swatches, GPU Accelerated label in bold. All chrome text clearly readable against the light background.
      Data: First categorical series (General Purpose) is #009E73 green, matching Imprint order; Compute Optimized (lavender), Memory Optimized (blue), GPU Accelerated (ochre, focal). GPU Accelerated lines are thicker (stroke-width 3.25) and more opaque (0.85) than the other three families (stroke-width 2, opacity 0.48), making it read as the clear focal outlier across every axis. The other 3 families still cluster/cross in the low-value band but are noticeably easier to trace than before the opacity rebalance.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17, not pure black.
      Chrome: Same serif title, dimension labels, tick labels, and legend, all recolored to light ink / soft-gray tones. No dark-on-dark text anywhere; axis domain strokes flip to a subtle light stroke.
      Data: All 4 family colors are pixel-identical to the light render (only chrome flipped). GPU Accelerated emphasis (thicker/bolder stroke + bold legend label) carries over correctly. Brand green still clearly visible on the dark surface.
      Legibility verdict: PASS
