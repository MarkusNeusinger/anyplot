review:
  strengths:
  - Correct Imprint palette in canonical order (green/lavender/blue/ochre for the
    4 instance families), theme-correct chrome (background, ink, grid) in both light
    and dark renders
  - 'Idiomatic D3 parallel-coordinates construction: d3.scalePoint for axis positions,
    one independent d3.scaleLinear().nice() per dimension, d3.line() over a proper
    .data().join() pattern'
  - Realistic, neutral cloud-instance dataset (vCPU/memory/storage/price/network across
    4 families) with clear per-family separation and cross-axis rank changes that
    reveal correlations, matching the spec's notes
  - Clean, deterministic, single-pass code (no functions/classes, hard-coded data,
    no imports beyond the d3 global) with a title fontsize that is dynamically scaled
    to the mandated title's length to avoid overflow
  weaknesses:
  - Dense line overlap in the low-value band of most axes (General Purpose / Compute
    Optimized / Memory Optimized instances cluster together around vCPU 0-30, Storage
    0-500, Price $0-2) makes individual instance lines hard to trace there — consider
    a slightly lower stroke-opacity (e.g. 0.45-0.5) for the non-GPU families or thinner
    strokes to reduce the hairball effect
  - 'Design still reads as a well-executed default: no font-family customization and
    no highlighting of a specific family (e.g. dimming the 3 clustered families to
    let GPU Accelerated read as the focal outlier) — a deliberate emphasis technique
    would push Design Excellence further'
  - Within each instance family the tiers scale almost perfectly linearly across all
    5 dimensions, so the dataset shows the intended pattern clearly but with little
    natural real-world texture (e.g. no family whose price scales sub/super-linearly
    relative to its resources)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "Cloud Instance Specs · parallel-basic · javascript · d3 · anyplot.ai" in bold dark ink, centered at the top with generous clearance above the five vertical axes (vCPUs, Memory (GB), Storage (GB), Price ($/hr), Network (Gbps)). Bold dark axis-dimension labels sit above each axis; smaller soft-gray tick labels run along each axis; a right-side "Instance Family" legend lists 4 swatches (General Purpose, Compute Optimized, Memory Optimized, GPU Accelerated). All chrome text is clearly legible against the light background.
      Data: 24 colored polylines, one per cloud instance, colored by family — General Purpose in Imprint brand green (#009E73), Compute Optimized in lavender, Memory Optimized in blue, GPU Accelerated in ochre. The GPU Accelerated (ochre) lines sit clearly above the rest on most axes and are easy to trace; the other three families cluster and overlap heavily in the lower band of each axis, making individual lines harder to distinguish there.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, axis-dimension labels, tick labels, and legend as the light render, all recolored to light ink/soft-gray tones so they read clearly against the dark background — no dark-on-dark text anywhere. Axis domain lines and gridlines flip to a light, low-opacity stroke that stays subtle.
      Data: Same 4 family colors as the light render (green/lavender/blue/ochre are pixel-identical to light) — only the chrome (background, text, axis strokes, legend) flipped, exactly as required. The same low-value clustering/overlap among the 3 non-GPU families persists here too.
      Legibility verdict: PASS
