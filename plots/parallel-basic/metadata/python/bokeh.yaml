review:
  strengths:
  - 'Correct parallel coordinates implementation: each variable gets a vertical axis,
    each observation is a line connecting values across all dimensions'
  - Normalization to [0,1] enables fair cross-dimension comparison with original scale
    ranges shown in x-axis tick labels
  - Realistic iris-like dataset with three biologically distinct species, seed set
    for reproducibility
  - Alpha blending (0.5) handles 150 overlapping lines without obscuring species-level
    patterns
  - Font sizes correctly set for 4800×2700 canvas (title 28pt, axis labels 22pt, tick
    labels 18pt)
  - Custom legend via LegendItem and major_label_overrides show Bokeh-specific API
    usage
  weaknesses:
  - 'Non-Okabe-Ito palette: uses Python-logo colors (#306998, #FFD43B, #4CAF50) —
    first series must be #009E73 (brand green); #306998 is specifically listed as
    non-compliant in VQ-07 criteria'
  - 'Missing ANYPLOT_THEME handling: no os.getenv(''ANYPLOT_THEME'') — backgrounds,
    text colors, grid colors not theme-adaptive; code must set p.background_fill_color,
    p.title.text_color, etc. from theme tokens'
  - 'Wrong output filenames: exports to ''plot.png'' instead of ''plot-{THEME}.png'';
    Bokeh as an interactive library must also save ''plot-{THEME}.html'''
  - Title in source code says 'pyplots.ai' instead of 'anyplot.ai' (lines 67 and 126)
    — even though rendered images appear correct, the code would regenerate with wrong
    domain
  - 'Missing HoverTool: Bokeh''s most distinctive feature (interactive tooltips) unused
    — missed opportunity for library mastery; showing species name and dimension values
    on hover would be natural here'
  - 'No ColumnDataSource pattern: Bokeh''s idiomatic data container not used; iterating
    df.iterrows() and calling p.line() per row is correct but not the recommended
    Bokeh approach'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1) — correct theme surface, not pure white
      Chrome: title "parallel-basic · bokeh · anyplot.ai" readable at top-left (dark text); y-axis label "Normalized Value" and x-axis label "Dimension" clearly visible; tick labels show dimension names with original measurement ranges (e.g., "Sepal Length / (3.1-8.1 cm)") — all dark text readable against light background; legend at top-right with "Species / Setosa / Versicolor / Virginica" readable
      Data: Three species rendered as parallel coordinate lines — setosa in blue (#306998), versicolor in gold/yellow (#FFD43B), virginica in green (#4CAF50); all with alpha=0.5; the setosa cluster distinctly drops at petal dimensions (x=2,3) while versicolor and virginica stay at higher normalized values; 150 lines visible but dense
      Legibility verdict: PASS — all text readable; however none of the colors match Okabe-Ito palette; first series (setosa) is #306998 (Python Blue) not #009E73 (brand green)

    Dark render (plot-dark.png):
      Background: dark near-black (~#1A1A17) — correct dark theme surface, not pure black
      Chrome: title readable with light-colored text on dark background; axis labels, tick labels, and legend all appear light-colored and readable; no dark-on-dark failures detected
      Data: Same colors as light render (setosa blue, versicolor gold, virginica green) — data colors are identical between themes as required; same patterns visible with setosa dropping at petal dimensions
      Legibility verdict: PASS — text readable in dark mode; however the code does not contain ANYPLOT_THEME handling, raising questions about how these themed images were generated (likely from a previous code version or the pipeline renames plot.png output)
