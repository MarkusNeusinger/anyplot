review:
  strengths:
  - Correct, idiomatic bokeh parallel-coordinates implementation via multi_line +
    ColumnDataSource, with a real HoverTool (not faked) showing the species per line
  - Imprint palette applied in canonical order (Setosa=#009E73, Versicolor=#C475FD,
    Virginica=#4467A3) and identical across both themes; backgrounds and chrome are
    theme-correct in both renders
  - Custom x-axis tick labels embed the real-world min/max cm range per dimension,
    adding context beyond bare 0-1 normalized ticks
  - Explicit, well-proportioned font sizes throughout; both renders are fully readable
    with no dark-on-dark/light-on-light issues and no edge clipping
  - Realistic Iris dataset with factually correct measurement ranges and a clear species-separation
    story (Setosa isolates sharply on petal dimensions)
  - Clean KISS-structured, reproducible code (np.random.seed(42)), no unused imports
  weaknesses:
  - Legend keeps a visible border box (border_line_color=INK_SOFT) — the style guide's
    decoration-removal checklist calls for dropping box frames around legends for
    a more refined look
  - Each dimension axis is marked only by the faint 0.15-alpha xgrid line shared with
    the rest of the grid, not a distinct vertical axis line — a slightly bolder per-dimension
    axis line (matching the y-axis line weight/color) would anchor each dimension
    more clearly, especially at mobile scale
  - Typography relies on bokeh's default font family with no custom font choice, keeping
    the overall look at 'well-configured default' rather than publication-grade polish
  - With 150 overlapping polylines at line_alpha=0.5, the busiest crossover region
    (Sepal Width) is visually dense — a touch more transparency (~0.35-0.4) would
    ease parsing without losing the crossing pattern that is the point of the chart
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "parallel-basic · python · bokeh · anyplot.ai" in bold dark ink top-left; x-axis "Dimension" and y-axis "Normalized Value" labels in italic dark ink; four dimension tick labels (Sepal Length, Sepal Width, Petal Length, Petal Width) each with their real cm range printed below in a softer gray; y-axis 0-1 tick labels in the same soft gray; legend box top-right titled "Species" listing Setosa/Versicolor/Virginica with a light elevated-cream fill and thin border. All chrome text is clearly legible against the light background.
      Data: 150 polylines (one per iris observation), each a species-colored path across the four normalized dimension axes. Setosa lines are brand green (#009E73) and separate sharply toward the bottom on Petal Length/Petal Width. Versicolor lines are lavender (#C475FD) and Virginica lines are blue (#4467A3), overlapping each other in the middle but staying visually distinguishable via color and a subtle vertical grid line at each dimension position.
      Legibility verdict: PASS — all text is dark-on-light and fully readable; no clipping at any canvas edge.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title/axis-label/tick-label layout, now rendered in light ink (#F0EFE8 primary, #B8B7B0 secondary) against the dark surface; legend box uses the dark elevated fill (#242420) with a soft border, text light-colored throughout.
      Data: Same three data colors as the light render (#009E73 / #C475FD / #4467A3) — confirmed identical, only the chrome (background, text, grid, legend fill) flips with the theme.
      Legibility verdict: PASS — no dark-on-dark failures observed; every title/label/tick is clearly visible against the dark background, and the brand green remains vivid.
