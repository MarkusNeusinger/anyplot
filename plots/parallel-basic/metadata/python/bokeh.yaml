      Background: Warm off-white (#FAF8F1), matches spec target.
      Chrome: Bold dark title top-left, italic "Dimension"/"Normalized Value" axis labels, four dimension tick labels each annotated with real cm ranges, frameless "Species" legend top-right (border box from attempt 1 removed). All clearly readable, nothing clipped.
      Data: 150 species-colored polylines, line_alpha=0.4 (eased from 0.5). Setosa=#009E73 (green), Versicolor=#C475FD (lavender), Virginica=#4467A3 (blue) - canonical Imprint order. New bolder per-dimension Span anchor lines (alpha 0.6) distinct from the shared faint grid.
