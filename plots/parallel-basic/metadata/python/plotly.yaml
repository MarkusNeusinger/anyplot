review:
  strengths:
  - 'Correct chart type: go.Parcoords with 4 numeric dimensions (sepal length/width,
    petal length/width) and category-coded species, matching the spec''s dimension/category
    requirements'
  - 'Clever idiomatic workaround for Parcoords'' lack of a native categorical legend:
    a hand-built 3-stop discrete colorscale plus a colorbar with custom tickvals/ticktext
    (''Setosa'', ''Versicolor'', ''Virginica'') stands in for a real legend'
  - Descriptive subtitle ('Setosa (green) clusters tightly at low petal dimensions...')
    gives the plot a clear analytical focal point instead of a bare title
  - Explicit per-axis ranges (e.g. [4,8] for sepal length) keep all data visible without
    clipping, and axis labels carry units (cm)
  - 'Clean, minimal KISS script: single seed (np.random.seed(42)), no unused imports,
    correct write_image/write_html calls at the exact 800x450 scale=4 canvas target'
  - Title fits comfortably within the canvas in both themes with no clipping or overflow
    (verified via edge crops)
  weaknesses:
  - 'Data colors are NOT identical between light and dark renders, violating the hard
    palette rule. Pixel-sampled the legend swatches: Virginica renders as rgb(114,140,183)
    in light vs rgb(60,86,130) in dark; Setosa renders as rgb(64,181,147) in light
    vs rgb(9,127,94) in dark. Root cause: line.color uses rgba(hex, 0.75) via the
    rgba() helper, so the 0.75 alpha composites the categorical hue with PAGE_BG (cream
    in light, near-black in dark) instead of staying constant — the same bug affects
    every polyline, not just the colorbar swatch. Fix: keep the Imprint hues at full
    opacity (or blend against a fixed neutral, not the theme background) so #009E73/#C475FD/#4467A3
    read as the same color in both themes; use a separate mechanism (e.g. slightly
    thinner lines, or alpha only in the trace itself without it depending on backdrop)
    to manage overplotting density instead of tying transparency to a theme-varying
    background.'
  - Colorbar-as-legend trick is effective but the resulting swatches look visibly
    washed out on the light render compared to the more saturated dark render, which
    is a direct symptom of the alpha/background compositing issue above rather than
    a good-faith stylistic choice.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white, not dark.
      Chrome: Title "parallel-basic · python · plotly · anyplot.ai" and subtitle in dark ink, fully legible, comfortably centered and not clipped at any edge (verified via pixel crop of top and left/bottom margins). Four vertical parallel-coordinate axes labeled "Sepal Length (cm)", "Sepal Width (cm)", "Petal Length (cm)", "Petal Width (cm)" with dark-ink titles and soft-gray tick numbers, all readable. A bordered legend box on the right reads "Species" with a stacked color swatch and labels "Virginica" / "Versicolor" / "Setosa" in soft-ink text — fully readable, not clipped by the canvas edge.
      Data: 150 translucent polylines in three hues — green (Setosa), lavender (Versicolor), blue (Virginica) — clustering visibly by species, especially on the Petal Length/Petal Width axes. First series (Setosa) is the brand green as required.
      Legibility verdict: PASS (all title/axis/tick/legend text clearly readable against the light background; no dark-on-dark or light-on-light issues).

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black, not light.
      Chrome: Title and subtitle render in light ink, fully legible against the near-black surface. Axis titles in light ink, tick numbers in soft light-gray, all readable. Legend box borders and "Species"/species-name text render in light ink against the dark box fill — no dark-on-dark failures.
      Data: Same three-hue line structure (green/lavender/blue), same clustering pattern as the light render.
      Legibility verdict: PASS for text — however, pixel-sampling the legend swatches shows the DATA COLORS THEMSELVES are not theme-invariant: Virginica swatch is rgb(114,140,183) in light vs rgb(60,86,130) in dark; Setosa swatch is rgb(64,181,147) in light vs rgb(9,127,94) in dark. This is because line/marker color is built as rgba(hex, 0.75), so the translucent color composites with the theme background (cream vs near-black) instead of staying fixed. This violates the "Imprint palette data colors (positions 1-7) must be identical between light and dark" rule — flagged under VQ-07 and in Weaknesses.
