review:
  strengths:
  - 'Fixed the attempt-1 theme-color bug: all three Imprint hues (#009E73 Setosa,
    #C475FD Versicolor, #4467A3 Virginica) are now pixel-identical between light and
    dark renders (verified by pixel-sampling the legend swatches) because the discrete
    colorscale is kept fully opaque instead of alpha-blended against the theme-varying
    PAGE_BG'
  - 'Correct chart type: go.Parcoords with 4 numeric dimensions and species color-coding,
    matching the spec'
  - 'Clever idiomatic workaround for Parcoords'' lack of a native categorical legend:
    a hand-built 3-stop discrete colorscale plus a colorbar with custom tickvals/ticktext
    stands in for a real legend, and now renders correctly in both themes'
  - Descriptive subtitle narrates the Setosa-separation finding, giving the plot a
    clear analytical focal point
  - Explicit per-axis ranges keep all data visible without clipping; axis labels carry
    units (cm)
  - 'Clean, minimal KISS script: fixed seed, only used imports, no leftover alpha/rgba
    helper function, correct canvas-target write_image/write_html calls'
  - 'Canvas at correct 3200x1800 target; backgrounds verified as #FAF8F1 (light) /
    #1A1A17 (dark)'
  weaknesses:
  - 'DQ-01: Uses only the spec''s minimum recommended 4 dimensions (sepal/petal length/width);
    adding 1-2 more dimensions (e.g. a derived petal_area or an extra measurement)
    would better demonstrate feature coverage for high-dimensional parallel-coordinates
    data'
  - 'DE-02: Styling beyond the legend box is fairly plain/default — could add subtle
    refinements (e.g. lighter per-axis background banding) typical of a more polished
    publication-ready parcoords chart'
  - 'VQ-03: With 150 fully opaque overlapping lines, the densest crossing region (between
    the Sepal Length and Sepal Width axes) gets visually busy; a slight, theme-independent
    opacity reduction (blended against a fixed neutral rather than PAGE_BG) or thinner
    lines could reduce clutter there without reintroducing the theme-color bug'
