review:
  strengths:
  - Elegant grammar-of-graphics workaround for parallel coordinates (lets-plot has
    no native geom for it) — manually constructed axis frame from geom_segment + geom_line
    + geom_text, cleanly composed
  - 'Clear data storytelling: Setosa drawn heavier, more opaque, and on top as the
    visual focal point, revealing that Setosa cleanly separates from Versicolor/Virginica
    on the petal dimensions'
  - Correct Imprint palette in canonical order with brand green first, and fully theme-correct
    chrome in both light and dark renders — no dark-on-dark or light-on-light failures
  - Min/max tick reference labels placed at each normalized axis restore interpretability
    of the 0-1 scale back to real units (cm)
  - Deterministic, realistic Iris dataset (30 obs, 3 species, 4 dimensions) with properly
    unit-labeled axes
  weaknesses:
  - 'Noticeable dead space on the right side of the panel: after the ''Petal Width''
    axis, roughly 15-20% of the plot panel width is blank grid before the legend starts.
    Tighten scale_x_continuous limits (e.g. closer to (-0.4, len(dimensions)-0.6))
    or reduce the reserved right margin so the last axis sits nearer the legend.'
  - panel_grid_major draws thin vertical grid lines that don't align with the 4 meaningful
    dimension axes, creating a phantom-column effect beyond the manually-drawn thick
    axis bars — this adds clutter and could momentarily read as more than 4 dimensions.
    Disable the x-component of the major grid (or only enable horizontal/y grid) so
    the grid doesn't compete with the manual axis lines.
  - Title renders noticeably smaller than the style guide's expectation for the mandated
    ~67-char title (fills only ~35% of canvas width vs. the ~70-85% guideline), reducing
    its prominence as the largest/first-seen element. Consider raising plot_title
    size from 14 to ~16-18pt.
  - 'Library Mastery is generic: the manual axis-and-line construction (geom_segment
    + geom_line + geom_text) is a general grammar-of-graphics technique equally replicable
    in plotnine/ggplot2, not something distinctive to lets-plot specifically — consider
    leveraging a lets-plot-specific strength (e.g. richer HTML/tooltip interactivity)
    in a future iteration.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white, not dark.
      Chrome: Title "parallel-basic · python · letsplot · anyplot.ai" in dark ink top-left, clearly readable. Four bold dark-grey vertical axis bars labeled "Sepal Length (cm)", "Sepal Width (cm)", "Petal Length (cm)", "Petal Width (cm)" at the bottom, with min/max value labels (4.4/7.6, 2.3/3.9, 1.3/6.6, 0.1/2.5) at the top and bottom of each axis. "Species" legend at the right with three swatches. All chrome text reads dark-on-light and is fully legible.
      Data: 30 lines connect the four axes, one per iris observation. Setosa lines are brand green (#009E73), thicker and more opaque, drawn on top; Versicolor lines are lavender-purple, thinner/more transparent; Virginica lines are steel blue, also thinner/more transparent. First series is confirmed #009E73.
      Legibility verdict: PASS — no light-on-light text anywhere.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black, not light.
      Chrome: Same title, axis labels, tick values, and legend now rendered in light ink (#F0EFE8 primary / #B8B7B0 secondary) against the dark background — all clearly legible, no dark-on-dark failures. Legend box background switches to the elevated dark tone.
      Data: Colors are identical to the light render — Setosa green #009E73, Versicolor lavender, Virginica blue — confirming the data palette does not shift between themes; only chrome flips.
      Legibility verdict: PASS — no dark-on-dark text anywhere.
