      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "parallel-basic · plotnine · anyplot.ai" in dark ink, centered top, fully visible, no clipping. Axis titles "Dimension" (X) and "Normalized Value (0-1)" (Y) in dark ink. Four two-line tick labels ("Sepal Length (cm)", "Sepal Width (cm)", "Petal Length (cm)", "Petal Width (cm)") in softer grey, all fully readable, each anchored by a thin vertical guide line. Legend "Iris Species" boxed on the right with Setosa/Versicolor/Virginica entries, readable dark text on a slightly elevated cream panel, well clear of the canvas edge.
      Data: Three color-coded line families — green Setosa (#009E73), magenta Versicolor (#C475FD), blue-grey Virginica (#4467A3) — connecting each observation's four normalized values via alpha-blended lines/points. Italic green annotation "Setosa separates cleanly on petal dimensions" sits in open space between the Petal Length and Petal Width axes, matching the Setosa line color.
      Legibility verdict: PASS — all text is clearly readable, first series is #009E73, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, axis titles, and tick labels now rendered in light ink/off-white, fully legible against the dark background. Legend panel uses a slightly elevated dark background with light text and a visible border. Gridlines and vertical guide lines remain subtle but visible against the dark surface.
      Data: Same three data colors (green #009E73, magenta #C475FD, blue-grey #4467A3) as the light render — confirmed identical, only chrome (background/text/grid/legend) flipped. Annotation text remains the same green, clearly visible against the dark background.
      Legibility verdict: PASS — no dark-on-dark failures; all text (title, axis labels, tick labels, legend, annotation) is clearly visible against the near-black background.
