review:
  strengths:
  - 'Correct idiomatic workaround for parallel coordinates in seaborn (no native API):
    per-group sns.lineplot with units=/estimator=None produces a genuine spaghetti-plot,
    not a faked chart type.'
  - 'Effective visual-hierarchy technique: Adam is drawn last with higher alpha (0.65
    vs 0.25) and linewidth (2.0 vs 1.2) over the dimmed background series, correctly
    foregrounding the real insight instead of overplotting everything equally.'
  - Clean min-max normalization per dimension, with the original human-readable numeric
    range embedded directly in each axis label so readers don't lose the real-world
    scale.
  - Correct Imprint palette application in canonical order (Adam=#009E73, RMSprop=#C475FD,
    SGD=#4467A3), correct theme-adaptive chrome in both renders, exact 3200x1800 canvas,
    and spec-compliant title.
  - Non-faked annotation callout (ax.annotate with a real arrow) highlighting the
    key finding (Adam configs cluster toward higher accuracy) without simulating interactivity.
  weaknesses:
  - 'Dense overplotting on the first three axes (Learning Rate, Batch Size, Dropout):
    all 90 runs are drawn, and even at alpha=0.25 the RMSprop/SGD lines tangle heavily,
    making it hard to trace individual runs or spot cross-axis patterns for those
    two series.'
  - Axis order follows raw column order rather than being arranged to reveal correlations
    between adjacent dimensions (the spec Notes explicitly suggest this) — e.g. ordering
    hyperparameters by their individual correlation to Val. Accuracy would strengthen
    the story.
  - The quartile tick-ruler marks drawn on each vertical axis are a nice touch but
    are undocumented — no legend/caption clarifies their meaning, so a first-time
    reader may mistake them for data points.
  - The numeric range text embedded in each x-axis label (e.g. '5.7e-04 - 8.9e-02')
    is legible at full resolution but becomes illegible at the 400px mobile thumbnail
    preview.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), matches spec.
      Chrome: Title "parallel-basic · python · seaborn · anyplot.ai" is dark, centered, fully visible, not clipped. Five x-axis category labels (Learning Rate, Batch Size, Dropout, Weight Decay, Val. Accuracy) each carry a two-line sub-label with the real-world numeric range, rendered in a soft dark-gray, all readable at full resolution. Y-axis label "Normalized Value" and "Min"/"Max" side annotations are dark/legible. Legend ("Optimizer": Adam, RMSprop, SGD) sits top-right with a light elevated-panel background and readable dark-gray text.
      Data: Adam lines are brand green (#009E73) with alpha 0.65 and heavier linewidth, clearly foregrounded. RMSprop is lavender (#C475FD) and SGD is blue (#4467A3), both dimmed (alpha 0.25) to recede into context. First series correctly uses #009E73. Vertical axis rules with quartile tick marks are visible at each dimension.
      Legibility verdict: PASS (all text readable; no light-on-light issues; the only caveat is the small axis-range sub-labels shrinking to illegibility at thumbnail/mobile scale, not a light/dark issue).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), matches spec.
      Chrome: Title, axis labels, tick labels, and the annotation callout box all render in light ink (#F0EFE8 / soft light gray) and are clearly legible against the dark background — no dark-on-dark failures observed. Legend uses a dark elevated panel with light text, readable.
      Data: Data colors are pixel-identical to the light render — Adam green #009E73, RMSprop lavender #C475FD, SGD blue #4467A3 — confirming only chrome flipped between themes, not data colors.
      Legibility verdict: PASS (no dark-on-dark text; grid and axis rules subtle but visible; brand green remains vivid on the dark surface).
