      Data: 45 iris lines colored by species — Setosa = brand green #009E73, Versicolor = lavender #C475FD, Virginica = slate blue #4467A3 (canonical Imprint order, first series is brand green as required). Thick mean lines per species sit above a fan of thinner, semi-transparent individual observation lines. Legend at bottom shows all three species with matching color swatches.
      Legibility verdict: PASS overall, with one flagged FAIL-adjacent overlap (0-tick vs. "Sepal Length" label) — see weaknesses.

