      Background: Warm off-white (#FAF8F1-consistent), not pure white.
      Chrome: Title "parallel-basic · python · pygal · anyplot.ai" in dark ink, centered, ~55% of canvas width. X-axis title "Dimensions" and Y-axis title "Normalized Value (0-1)" both dark, descriptive, similarly sized. Y-axis ticks (0, 0.1, ..., 1) and x-axis category labels ("Sepal Length (cm)", "Sepal Width (cm)", "Petal Length (cm)", "Petal Width (cm)", rotated ~30°) are dark and legible, EXCEPT the y-axis "0" tick label visually overlaps the "L" of "Length" in the first rotated x-axis category label — a clear, localized text collision. Legend at bottom ("Setosa", "Versicolor", "Virginica") with colored swatches, well spaced, clearly readable. Subtle dashed horizontal + vertical guide lines.
      Data: Three species, each with a thick mean-line and a bundle of thinner, semi-transparent individual-observation lines. Setosa = brand green #009E73 (correct first-series color), Versicolor = lavender #C475FD, Virginica = blue-gray #4467A3 — matches canonical Imprint order. Lines converge/cross heavily around Sepal Length/Width (expected overlap for Iris) and separate cleanly by Petal Length/Width, correctly showing species clustering.
      Legibility verdict: PASS overall, with one flagged FAIL-adjacent detail (the "0"/"Length" overlap) — everything else reads clearly against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17-consistent), not pure black.
      Chrome: Same title, axis titles, tick labels, legend layout as the light render, all re-colored to light ink (white/off-white) and clearly legible against the dark background. No dark-on-dark text found. Same "0" tick / "Length" label overlap reproduces identically here (it is a geometry issue, not a color issue, so it persists in both themes as expected).
      Data: Data colors are identical hex values to the light render (#009E73 / #C475FD / #4467A3) — only the chrome (background, text, grid) flipped, exactly per spec. The lines read with good contrast against the dark surface.
      Legibility verdict: PASS overall, with the same localized "0"/"Length" collision as the light render — no dark-on-dark or unreadable elements otherwise.
