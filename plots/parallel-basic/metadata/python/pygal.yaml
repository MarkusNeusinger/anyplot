review:
  strengths:
  - 'Correct palette compliance: first series (Setosa) is brand green #009E73, and
    Versicolor/Virginica follow the canonical Imprint order (#C475FD, #4467A3) — identical
    across light/dark renders'
  - 'Thoughtful visual hierarchy: thick mean-value lines per species (stroke width
    7) layered over thin individual observation lines (stroke width 3, opacity 0.5)
    makes species separation and within-group spread both readable at once'
  - 'Idiomatic, distinctive pygal usage: per-point tooltip dicts with the actual (non-normalized)
    measurement and opacity_hover for genuine interactive hover feedback in the HTML
    export — not faked'
  - Canonical Iris dataset (45 observations, 4 dimensions) matches the spec's own
    recommended example and sits comfortably within the 20-200 obs / 4-10 dim guidance
  - 'Clean KISS script: no functions/classes, deterministic (hardcoded data, no seed
    needed), only necessary imports, correct plot-{THEME}.png + .html output contract'
  - Explicit min-max normalization to a shared 0-1 scale makes the four differently-scaled
    measurements (cm) fairly comparable across axes, exactly as the spec's Notes section
    asks
  weaknesses:
  - 'VQ-02 overlap (both themes): the y-axis ''0'' baseline tick label sits directly
    on top of the ''L'' in the ''Sepal Length (cm)'' x-axis category label at the
    plot origin — visible ink collision, not just crowding. Fix by nudging the x-axis
    label row down (increase bottom margin slightly) or shifting the y-axis 0-tick
    label left so it clears the category label baseline.'
  - 'VQ-05 layout imbalance: roughly a quarter of the 1800px canvas height (below
    y≈1339 of 1800) is empty whitespace beneath the legend row, giving the chart a
    bottom-heavy dead zone. Reduce overall margin/height allocation below the legend,
    or increase the plot-area height so the chart fills the canvas more evenly.'
  - 'DE-02 refinement: the generous-but-unbalanced whitespace below the legend reads
    as leftover margin rather than deliberate breathing room — tightening it would
    also improve perceived polish.'
  image_description: |-
