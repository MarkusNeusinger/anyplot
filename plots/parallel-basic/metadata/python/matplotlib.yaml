review:
  strengths:
  - 'Correct parallel coordinates construction: 4 dimensions normalized to [0, 1]
    with lines connecting all axes per observation.'
  - Factually accurate Iris measurement ranges matching the real dataset (sepal length
    4.3-7.9 cm, sepal width 2.0-4.4 cm, petal length ~1.3-6.6 cm, petal width 0.1-2.5
    cm), annotated directly on the x-axis tick labels.
  - Imprint palette applied correctly in canonical order (Setosa=#009E73 brand green,
    Versicolor=#C475FD, Virginica=#4467A3), identical across both themes.
  - Theme-adaptive chrome correctly implemented - both light and dark renders are
    fully readable with correct backgrounds and no dark-on-dark or light-on-light
    failures.
  - Clean KISS code structure, reproducible via np.random.seed(42), correct 3200x1800
    canvas, and savefig without bbox_inches='tight'.
  - 'Genuine analytical value: Setosa clearly separates from Versicolor/Virginica
    in the petal dimensions, which is exactly the kind of pattern parallel coordinates
    plots are meant to reveal.'
  weaknesses:
  - No vertical axis reference lines are drawn at each dimension position (x=0,1,2,3)
    - the core visual metaphor of parallel coordinates ('each variable as a vertical
    axis') is only implied by tick labels, not drawn. Add e.g. ax.axvline(xi, color=INK_SOFT,
    alpha=0.3, linewidth=0.8, zorder=0) for each of the 4 dimension positions to visually
    anchor the axes - this is standard for parallel coordinate plots and would materially
    improve Design Excellence and Layout scoring.
  - The 150 overlapping semi-transparent lines (alpha=0.5) create a cluttered 'hairball'
    in the Sepal Length / Sepal Width region, obscuring individual patterns - consider
    a slightly lower alpha (~0.35-0.4) to better separate overlapping strands while
    keeping category-level color blocks legible.
  - 'The ''for _, row in df_norm.iterrows(): ax.plot(...)'' loop is non-idiomatic
    and inefficient for matplotlib - a matplotlib.collections.LineCollection would
    be the vectorized, idiomatic pattern for many-line plots like this, and would
    also unlock Library Mastery (distinctive-feature) credit.'
  - No distinctive matplotlib-specific technique is leveraged (e.g., LineCollection,
    custom transforms) - the implementation is generic enough that it could be ported
    to nearly any plotting library with only minor syntax changes.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 - not pure white, not dark.
      Chrome: Title "parallel-basic · python · matplotlib · anyplot.ai" in dark ink, clearly visible and centered above the plot. Y-axis label "Normalized Value" in dark ink, rotated, fully legible. X-axis tick labels are two-line labels ("Sepal Length" / "(4.3-7.9 cm)" etc.) in a softer dark gray, all readable with no clipping. Y-axis tick labels (0.0-1.0) in soft dark gray. Faint horizontal grid lines only, subtle. Legend box (upper right) has a light elevated fill with a soft gray border and gray text labels "Setosa", "Versicolor", "Virginica" - all legible against the box.
      Data: Three color groups of ~50 lines each - green (Setosa, #009E73), lavender/purple (Versicolor, #C475FD), and blue (Virginica, #4467A3). Lines converge/cross heavily between Sepal Length and Sepal Width (dense woven region) but separate cleanly at Petal Length/Petal Width, where the green Setosa cluster drops to near 0 while purple and blue overlap more in the mid-to-upper range. First series is confirmed #009E73 green.
      Legibility verdict: PASS - all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 - not pure black, not light.
      Chrome: Title, y-axis label, x-axis tick labels, and y-axis tick labels all render in light off-white / light gray tones, clearly visible against the dark background. No dark-on-dark failures observed - every text element (title, both axis labels, both tick label sets, legend text) is legible. Legend box has a dark elevated fill with a lighter gray border and light gray text, readable against the dark background. Grid lines are faint and subtle, matching the dark theme.
      Data: Same three color groups as the light render - green #009E73, lavender #C475FD, blue #4467A3 - confirmed identical hues to the light render; only the chrome (background, text, grid, legend frame) flipped to the dark theme tokens.
      Legibility verdict: PASS - all text is clearly readable against the dark background, no dark-on-dark failures detected.
