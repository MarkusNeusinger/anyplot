      Chrome: Bold dark title "parallel-basic · altair · anyplot.ai" centered at top, gray subtitle below it ("Setosa separates cleanly on petal traits, while Versicolor and Virginica overlap on sepal traits"). Y-axis titled "Normalized Value" (0.0-1.0) in bold dark text with dark tick labels. X-axis shows 4 dimension labels (Sepal Length (cm), Sepal Width (cm), Petal Length (cm), Petal Width (cm)) in dark text, evenly spaced. Legend box top-right titled "Species" with three swatches/labels. Subtle horizontal gridlines at 0.2 increments.
      Data: ~150 semi-transparent lines in three colors - green (Setosa, #009E73), lavender (Versicolor, #C475FD), blue (Virginica, #4467A3) - connecting the 4 vertical axes in the classic parallel-coordinates pattern. Green lines drop sharply and cluster near 0 at Petal Length/Petal Width, visually confirming the subtitle's claim of clean separation on petal traits, while purple and blue overlap heavily on the sepal axes.
      Legibility verdict: PASS - all title, subtitle, axis, tick, and legend text is clearly readable against the light background; no light-on-light text found.

    Dark render (plot-dark.png):
