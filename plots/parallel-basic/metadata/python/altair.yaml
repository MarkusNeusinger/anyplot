    legend - both renders pass the light/dark legibility check, no edge clipping on
    either render
  - 'Genuine altair-native interactivity: legend-bound selection_point to highlight/dim
    a species, plus tooltips retaining original (denormalized) measurement values
    for all 6 dimensions'
  - Reproducible (fixed seed), clean KISS top-level script, no unused imports
  weaknesses:
  - Overplotting is improved but still present in the densest crossing regions (e.g.
    the Virginica band near the top of Sepal Length / Petal Length) - with ~150 lines
    at opacity 0.40, individual paths still blur into solid bands; consider pushing
    base opacity a bit lower still (~0.25-0.30)
  - Composition remains fairly standard for a vega-lite line chart - DE-01 stays capped
    without an extra distinctive touch (e.g. per-axis background shading, a highlighted
    mean/median reference line, or curve interpolation)
  - 6 dimensions sit in the lower-middle of the spec's recommended 4-10 range; 1-2
    more would lean further into showcasing high-dimensional comparison
