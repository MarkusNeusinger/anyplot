review:
  strengths:
  - Correct Imprint palette order (green/lavender/blue = positions 1-3) applied consistently,
    identical hex values across light and dark renders
  - Theme-adaptive chrome fully threaded through background, axes, grid, title, and
    legend - both renders pass the light/dark legibility check with no dark-on-dark
    or light-on-light issues
  - 'Genuine altair-native interactivity: selection_point bound to the legend lets
    users click a species to highlight/dim it, plus tooltips retain original (denormalized)
    measurement values - a real distinctive feature, not faked'
  - Subtitle explicitly narrates the key insight (Setosa separates on petal traits,
    Versicolor/Virginica overlap on sepal traits), giving the chart a clear focal
    point
  - Values are min-max normalized to 0-1 per axis for fair cross-dimension comparison,
    exactly as the spec notes recommend, while tooltips still expose the original
    units
  - Reproducible (fixed np.random.seed), clean KISS top-level script with no unused
    imports
  weaknesses:
  - Title omits the required language segment - currently 'parallel-basic · altair
    · anyplot.ai', should be 'parallel-basic · python · altair · anyplot.ai' per SC-04
  - With ~150 overlapping lines drawn at a fixed opacity=0.60, dense clusters (e.g.
    the Virginica band near the top of Sepal Length/Petal Length) merge into solid
    color blobs that obscure individual line paths - lower the base opacity (e.g.
    ~0.35-0.45) to better combat overplotting per the data-density heuristic
  - Only 4 dimensions are used, the low end of the spec's recommended 4-10 range -
    adding 1-2 derived dimensions (e.g. petal area, sepal aspect ratio) would better
    showcase the multivariate strength of a parallel-coordinates plot
  - Legend box border (strokeColor=INK_SOFT) is fairly prominent for an otherwise
    minimal-chrome design - a softer/thinner border or removing it would refine the
    look further
  image_description: |-
