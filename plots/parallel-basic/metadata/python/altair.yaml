      Data: Same three hex colors as the light render (green #009E73, lavender #C475FD, blue #4467A3) - confirmed identical data colors, only chrome (background/text/grid/legend) flips between themes. Same separation pattern is visible (green clusters low on petal axes).
      Legibility verdict: PASS - all title, subtitle, axis, tick, and legend text is clearly readable against the near-black background; no dark-on-dark failures observed; brand green remains vivid on the dark surface.
