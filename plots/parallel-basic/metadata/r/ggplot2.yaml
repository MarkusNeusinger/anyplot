review:
  strengths:
  - 'Idiomatic ggplot2 parallel-coordinates construction: pivot_longer to long format,
    geom_line grouped by id, geom_point overlay — the correct grammar-of-graphics
    approach since ggplot2 has no dedicated parcoord geom.'
  - 'Distinctive touch: real-scale min/max value labels (with unit-aware sprintf formatting
    — $, ×, ★, %) placed at each axis endpoint via geom_text + coord_cartesian(clip
    = "off"), giving readers the original scale even though the lines are min-max
    normalized.'
  - 'Correct canvas (3200×1800, landscape via ggsave width=8/height=4.5 @ dpi=400),
    correct Imprint palette (first series #009E73, canonical order for the 3 segments),
    and fully theme-adaptive chrome — no clipping, dark-on-dark, or light-on-light
    issues in either render.'
  - 'Clean, minimal theme: hidden y-axis ticks/text (redundant given the endpoint
    labels), no panel grid, subtle geom_vline axis guides, generous margins — avoids
    chartjunk.'
  - Realistic, well-scaled synthetic data (90 observations × 6 dimensions across 3
    market segments) with deterministic set.seed(42), reproducible KISS-structured
    script.
  weaknesses:
  - No explicit storytelling focal point beyond the color-by-segment encoding — e.g.
    an annotation calling out the Budget/Premium separation gap on Customer Satisfaction
    or Market Share would push Data Storytelling further.
  - On the Sales Volume and Inventory Turnover axes the 90 crossing lines create moderate
    visual clutter where Budget (green) and Mid-range (lavender) bands overlap heavily;
    a touch more transparency (alpha ~0.35 instead of 0.45) or slightly thinner lines
    would ease mid-density readability without hurting sparser regions.
  - Points sharing the same normalized value on an axis stack exactly on top of each
    other (no jitter), so the true observation density at crowded axis positions (e.g.
    the Budget cluster on Sales Volume) is a bit harder to gauge from the point layer
    alone.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 target, not pure white.
      Chrome: Title "parallel-basic · r · ggplot2 · anyplot.ai" in dark ink, fully visible with clean margin above/below, not clipped. Six vertical axes labeled "Price", "Rating", "Sales Volume", "Inventory Turnover", "Customer Satisfaction", "Market Share" in dark secondary-ink text below the plot; real-scale min/max value labels (e.g. "$10"/"$516", "2.6★"/"5.0★", "60%"/"100%") in soft ink above and below each axis. Legend box (top-right) titled "Segment" with three swatches (Budget/Mid-range/Premium) has a visible ink-colored border and readable text.
      Data: 90 lines/points across 3 segments, colored green (#009E73, Budget), lavender (#C475FD, Mid-range), blue (#4467A3, Premium) — first series is the mandated brand green. Lines clearly readable against the light background with alpha blending to manage overlap.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 target, not pure black.
      Chrome: Same title, axis labels, and endpoint value labels now rendered in light ink (#F0EFE8 for title, #B8B7B0 for secondary text) — all clearly legible against the dark background, no dark-on-dark failures observed. Legend box border and text flipped to light tones correctly.
      Data: Same three segment colors (green/lavender/blue) as the light render — confirmed identical data-color hex values, only chrome (background, text, legend frame) flipped between themes.
      Legibility verdict: PASS
