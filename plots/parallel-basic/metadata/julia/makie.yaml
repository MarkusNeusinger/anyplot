review:
  strengths:
  - Idiomatic native construction of a parallel-coordinates plot from Makie primitives
    (vlines! for reference axes, lines! for observations, text! for annotations) since
    Makie has no built-in recipe for this plot type
  - 'Distinctive touch: original min/max value labels annotated at the top/bottom
    of every normalized axis, so the reader recovers real units (Price $, hrs, g,
    GB, MP) even though the vertical scale itself is 0-1 normalized'
  - 'Clean, minimal chrome: all four spines hidden and replaced by thin vlines as
    axis frames, no grid, borderless legend title ''Tier'''
  - 'Correct Imprint palette usage — Budget tier (first series) is brand green #009E73,
    Mid-range and Premium follow canonical positions 2 and 3'
  - Theme-adaptive chrome is fully correct and consistent between renders — only background/text/vline
    colors flip, data colors identical
  - All six axis dimension labels are descriptive and carry units (Price ($), Rating
    (1-5), Battery (hrs), Weight (g), Storage (GB), Camera (MP))
  - Reproducible (Random.seed!(42)), clean imports (CairoMakie, Colors, Random all
    used), single-file script with no fake interactivity, correct plot-$(THEME).png
    output naming
  weaknesses:
  - With 60 lines across 3 tiers, the middle dimensions (Rating -> Battery -> Weight)
    get visually dense with heavy crossing, making individual observations harder
    to trace at a glance; consider a slightly lower alpha (e.g. 0.35) or thinner linewidth
    (e.g. 1.4) to ease the busiest crossing region
  - The min/max value annotation labels (fontsize=11) are noticeably smaller than
    the rest of the chrome (axis names at 13, title at 20) and sit close to the legibility
    floor when scaled to mobile widths; bumping to ~12-13 would improve balance without
    crowding
  - Battery life is modeled as decreasing with price tier (Budget mean 20hrs vs Premium
    mean 12hrs) while weight increases with price tier (Budget 190g vs Premium 200g)
    - both are defensible real-world patterns but counter-intuitive at first glance;
    a reader unfamiliar with the phone market may need a moment to parse the story
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1 as required), not pure white, not dark. Matches spec.
      Chrome: Bold dark title "parallel-basic · julia · makie · anyplot.ai" centered at top, clearly readable. Six vertical reference axes labeled at bottom with descriptive, unit-bearing names (Price ($), Rating (1-5), Battery (hrs), Weight (g), Storage (GB), Camera (MP)) in medium-grey ink. Each axis has small tertiary-grey min/max value labels at its top and bottom ends recovering the real-world scale despite the shared 0-1 normalized vertical axis. A borderless legend titled "Tier" sits at the right with three color swatches (Budget, Mid-range, Premium). All spines are hidden; thin light-grey vertical lines act as the axis frames instead. No grid lines.
      Data: 60 connecting lines (20 per tier) drawn with alpha ~0.45. Budget lines are brand green (#009E73), Mid-range lavender, Premium blue — consistent with canonical Imprint palette order 1/2/3. Clear color banding is visible on most axes (e.g. Price, Rating, Storage, Camera), with Budget clustering low-price/high-storage-inverse etc., though the crossing pattern in the middle axes (Rating→Battery→Weight) is visually dense.
      Legibility verdict: PASS — all text (title, axis names, tick/value labels, legend) is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17 as required), not pure black, not light. Matches spec.
      Chrome: Same layout as light render with all chrome tokens flipped — title and axis names render in light off-white ink, min/max value labels in a lighter muted grey, legend text in a light soft-grey. Vertical reference axis lines render in a light grey tone, clearly visible against the dark background. No grid lines, no spines.
      Data: Same three data colors as the light render (brand green, lavender, blue) — confirmed identical hex values, only chrome inverted as required.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title, axis label, tick/value-label, and legend text is clearly legible against the near-black surface. Brand green remains vivid and distinguishable on the dark surface.
