  image_description: The plot shows a dual-panel Bode plot. The top panel displays
    magnitude (dB) vs frequency (Hz) on a logarithmic x-axis, with a blue line (#306998)
    decreasing from ~45 dB at 0.1 Hz down to about -110 dB at 1000 Hz. A dashed gray
    0 dB reference line is present. Red (#E85D3A) dots and a dotted vertical line
    mark the gain margin (GM = 10.7 dB) at the phase crossover frequency (~20 Hz).
    A green (#2CA02C) dot marks the gain crossover frequency (~5 Hz) at 0 dB. The
    bottom panel shows phase (°) vs frequency, with a blue line decreasing from about
    -90° to about -270°. A dashed gray -180° reference line is present. Green dots
    with a dotted vertical segment show the phase margin (PM ≈ 22.5°). Red dots mark
    the phase crossover point at -180°. Title reads "bode-basic · bokeh · pyplots.ai".
    Background is white with very subtle grid lines. The red-green color pairing for
    GM vs PM is a significant colorblind accessibility issue.
