    from ~40 dB to ~-130 dB. A dashed gray reference line at 0 dB is present. An orange
    dotted vertical segment marks the gain margin (GM = 10.7 dB) between the magnitude
    at phase crossover and 0 dB, with orange circle markers at both endpoints and
    an orange label. A green circle marker sits at the gain crossover frequency on
    the 0 dB line. The bottom panel shows phase (degrees) vs frequency (Hz) with the
    same shared log x-axis. The blue line decreases from about -90 degrees to about
    -270 degrees. A dashed gray reference line at -180 degrees is drawn. Green dotted
    vertical segment marks the phase margin (PM = 23.5 degrees) between the phase
    at gain crossover and -180 degrees, with green circle markers and a green label.
    An orange marker sits at the phase crossover point on -180 degrees. Title reads
    "bode-basic · bokeh · pyplots.ai" in the top-left. Both annotation labels render
    with semi-transparent background rectangles that create visual clutter.
