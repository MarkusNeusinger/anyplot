  image_description: The plot displays a Bode diagram with two vertically stacked
    panels sharing a logarithmic frequency axis (0.1–1000 Hz). The top panel shows
    magnitude in dB, with a blue (#306998) curve starting at ~43 dB and rolling off.
    A dashed gray 0 dB reference line is present. The gain crossover point (~7 Hz)
    is marked with a blue dot, and the gain margin (GM = 10.7 dB) is annotated in
    orange with a dotted vertical segment connecting two orange dots at the phase
    crossover frequency (~20 Hz). The bottom panel shows phase in degrees, with the
    blue curve declining from ~-90° to ~-270°. A dashed -180° reference line is visible.
    The phase margin (PM = 22.4°) is annotated in green with a dotted vertical segment
    and green dots at the gain crossover frequency. Orange dots mark the phase crossover
    at -180°. Title reads "bode-basic · bokeh · pyplots.ai". White background, subtle
    grids, clean styling with no outlines or tick marks.
