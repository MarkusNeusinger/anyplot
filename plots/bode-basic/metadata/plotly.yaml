review:
  strengths:
  - Perfect spec compliance with all required features including gain/phase margin
    annotations and reference lines
  - Clean deterministic code with good KISS structure and linear flow
  - Effective data storytelling through margin annotations that immediately communicate
    system stability
  - Good use of plotly make_subplots, add_hline, and HTML export capabilities
  weaknesses:
  - Orange vs green margin indicators may be difficult for deuteranopic viewers -
    consider blue vs orange or add dash patterns
  - Crossover region visually dense with overlapping markers from both margins
  - Margin annotations rely on legend rather than direct text labels on plot
  - Third-order system with all real poles does not demonstrate resonance peak
  image_description: The plot displays a Bode diagram with two vertically-stacked
    panels sharing a logarithmic frequency axis (0.1 Hz to 10 kHz). The top panel
    shows Magnitude (dB) with a blue line (#306998) starting at ~30 dB, flat through
    low frequencies, then rolling off steeply past 1 Hz with -60 dB/decade slope at
    high frequencies. A dashed gray reference line marks 0 dB. The bottom panel shows
    Phase (degrees), starting near 0° and decreasing to approximately -270° at 10
    kHz, with a dashed gray reference at -180°. Orange diamond markers (#E8590C) indicate
    the gain margin (7.5 dB) with a vertical line between the magnitude curve and
    0 dB at the phase crossover frequency (~30 Hz). Green diamond markers (#2B8A3E)
    mark the phase margin (17.0°) with a vertical line between the phase curve and
    -180° at the gain crossover frequency (~20 Hz). The legend in the upper-right
    of the magnitude panel labels both margins. Title reads "bode-basic · plotly ·
    pyplots.ai". The plotly_white template provides a clean white background with
    very subtle gridlines.
