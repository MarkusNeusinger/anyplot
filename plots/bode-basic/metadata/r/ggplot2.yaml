review:
  strengths:
  - 'Perfect spec implementation: dual-panel Bode plot with magnitude (top) and phase
    (bottom), logarithmic x-axis, 0 dB and -180° reference lines, gain and phase margin
    annotations — all present and correct'
  - Analytically correct frequency response for G(s) = 10/(s(s+1)(s+5)) with proper
    interpolated gain margin (~9.5 dB) and phase margin (~25.4°) calculations using
    approx()
  - Both light and dark themes correctly implemented — all chrome tokens (INK, INK_SOFT,
    INK_MUTED, PAGE_BG, ELEVATED_BG) applied consistently; data colors identical between
    themes
  - 'Idiomatic ggplot2: geom_hline(data = ref_df, aes(yintercept = yint)) for per-facet
    reference lines is the correct grammar-of-graphics pattern; scale_x_log10 with
    outer() for minor breaks is R-idiomatic'
  - 'Semantically meaningful crossover markers: blue (#4467A3) for gain crossover,
    red (#AE3030) for phase crossover — both from Imprint palette and visually distinguishable'
  weaknesses:
  - Panel borders use full box frame (panel.border = element_rect(color = INK_SOFT,
    fill = NA)) — style guide default is to remove top and right spines for a more
    refined L-shaped frame; replace panel.border with axis.line = element_line(color
    = INK_SOFT) and remove the boxed border
  - 'Design not yet publication-ready: no spine removal, no additional visual emphasis
    beyond annotations — to reach DE-01 ≥ 6, add a shaded or colored region indicating
    the stable operating zone (between crossover frequencies or below 0 dB), or use
    stronger font hierarchy for the margin annotation values'
  - Annotation labels at geom size=2.8 (~8 pt) are at the minimum readable threshold;
    increase to size=3.5 to improve mobile readability
  - 'library(dplyr) is imported but no explicit dplyr functions are called (tibble::tibble()
    uses the :: namespace directly) — remove unused import or replace tibble::tibble()
    with a plain data.frame()'
