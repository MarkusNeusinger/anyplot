      Data: Main Bode curve in Imprint green (#009E73) — clearly visible in both panels. GM annotation box (ochre #BD8233 border) with "GM = 10.8 dB" text; PM annotation box (lavender #C475FD border) with "PM = 24.1°" text. Both annotation boxes use ELEVATED_BG (#FFFDF6) fill. Cross-panel diamond and square markers visible. 0 dB reference line appears solid (not dashed) due to y-axis zeroline overlay. -180° dashed reference line correctly rendered.
      Legibility verdict: PASS — all text clearly readable against warm off-white background. No light-on-light contrast failures.

