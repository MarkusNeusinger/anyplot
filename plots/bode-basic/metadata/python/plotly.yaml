review:
  strengths:
  - Correct dual-panel Bode layout with shared logarithmic x-axis and accurate stability
    margin calculations (GM=10.8 dB, PM=24.1°)
  - Cross-panel markers visually link the magnitude and phase panels at crossover
    frequencies — effective data storytelling
  - Full theme-adaptive chrome with correct Imprint palette tokens (PAGE_BG, ELEVATED_BG,
    INK, INK_SOFT, GRID) applied to all axes and annotation boxes
  - 'Clean idiomatic Plotly usage: make_subplots, add_hline, add_shape, add_annotation,
    update_xaxes/yaxes, write_image + write_html'
  - Minor gridlines (opacity 7%) alongside major gridlines (15%) make it easy to read
    margin values on both panels
  - Shaded fill rectangles (opacity=0.12) for both margin regions are visually informative
    without cluttering
  weaknesses:
  - 'Palette ordering violation: gain margin uses Imprint position 4 (ochre #BD8233)
    while phase margin uses position 2 (lavender #C475FD) — canonical rule requires
    positions assigned in order 2→3 for the second and third distinct annotation colours'
  - 'Resonance peak is not visibly present in the magnitude trace: with K=40, p1=1
    Hz, p2=10 Hz, wn=100 Hz, ζ=0.3, the two lower poles attenuate the signal before
    the complex-pair resonance can produce a visible bump — the spec explicitly calls
    for a resonance peak; consider reducing p1/p2 or using a second-order-only system'
  - 0 dB reference line renders solid (zerolinecolor from update_yaxes overlays the
    intended dashed add_hline) — suppress the y-axis zeroline (zeroline=False in update_yaxes
    row=1) so only the dashed hline shows
  - All four frame spines remain visible (Plotly default); style guide prefers removing
    top and right spines — set showline=False on top/right axis borders or use mirror=False
  image_description: |-
