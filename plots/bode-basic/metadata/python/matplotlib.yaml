review:
  strengths:
  - Clean dual-panel Bode layout with magnitude top and phase bottom sharing a logarithmic
    x-axis
  - 'Correct Imprint palette usage: brand green #009E73 for data lines, blue #4467A3
    for gain margin, ochre #BD8233 for phase margin'
  - Gain margin and phase margin annotations with arrows, colored markers, and reference
    lines at 0 dB and -180°
  - Full theme-adaptive chrome — all text, spines, and grid correctly flip between
    light and dark; data colors unchanged
  - 'Idiomatic matplotlib: semilogx, sharex=True, gridspec_kw, annotate with arrowprops,
    subplots_adjust without bbox_inches tight'
  - Deterministic synthetic transfer function with correct complex arithmetic and
    unwrapped phase
  - Manual yticks on phase panel (0, -45, -90, ..., -270) aid reading of stability
    margins
  weaknesses:
  - The gain margin vline + annotation uses xy at the midpoint of the span rather
    than the annotated marker point (phase_crossover_freq, gain_at_pc) — the arrow
    visually points mid-span rather than to the dot; consider setting xy to the marker
    position and adjusting xytext offset accordingly
  - 'Blue annotation color #4467A3 on the dark (#1A1A17) background has moderate but
    adequate contrast — the annotation is readable but the arrow/text could be slightly
    brighter for dark-theme polish (e.g., use the lighter cyan #2ABCCD or keep #4467A3
    but accept the slight muting)'
  - The top panel title-to-axes gap is tight; the title sits close to the magnitude
    data curve near the top — a slightly taller top margin (top=0.93 or 0.94) would
    improve breathing room without changing layout
