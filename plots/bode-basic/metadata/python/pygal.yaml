    thresholds, blue for margin indicators) and prominent annotation boxes with rounded
    corners convey engineering insight immediately'
  - Realistic 3rd-order transfer function data with clear resonance peak at 5 Hz and
    stability margins in the engineering-typical range (GM=12.2 dB, PM=26°)
  - Full theme adaptation — all chrome tokens correctly adapt between light (#FAF8F1)
    and dark (#1A1A17) surfaces; data colors identical across both renders
