    3200×1800 canvas — at ~400px mobile width these become ~3px and are unreadable.
    Increase font_reg to at least 48px and font_bold to 56px, and expand annotation
    box height accordingly.
  - Magnitude and phase chart setup code is repetitive (nearly identical kwargs for
    pygal.XY and add() calls) — minor code elegance issue; could be extracted into
    a helper dict.
  - 'DE-02: pygal''s default chart frame cannot be removed but whitespace could be
    slightly more generous — the 140px left margin is correctly sized but the top
    margins (40px for magnitude, 10px for phase) are quite tight.'
