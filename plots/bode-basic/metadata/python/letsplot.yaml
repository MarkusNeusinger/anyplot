review:
  strengths:
  - 'Perfect spec compliance: dual-panel Bode plot with all required features (margins,
    reference lines, log frequency axis) correctly implemented'
  - Intentional color coding from Imprint palette — green for data, ochre for GM,
    blue for PM — creates a coherent visual language that guides interpretation of
    stability margins
  - 'Excellent data quality: 3rd-order transfer function with resonance peak and instructively
    marginal stability (GM=5.4 dB, PM=15.8°) in a neutral engineering domain'
  - 'Strong use of letsplot-distinctive features: ggbunch() for multi-panel composition
    and layer_tooltips() for native HTML interactivity'
  - Deterministic, clean code with proper KISS structure; scipy.signal usage is robust
    and produces physically accurate results
  weaknesses:
  - 'ggbunch container background defaults to white (#FFFFFF) in dark mode — the inter-panel
    gap (~72px at 1800px canvas) renders as a bright white horizontal strip instead
    of the required #1A1A17. Investigate letsplot ggbunch API for a background/fill
    parameter, or try appending a theme override (plot_background=element_rect(fill=PAGE_BG))
    to the ggbunch result.'
  - 'panel_grid_major uses INK_SOFT color (#B8B7B0 in dark) which is too visible —
    replace with a low-opacity rgba color (~15% opacity: ''rgba(26,26,23,0.15)'' for
    light and ''rgba(240,239,232,0.15)'' for dark) to make grid lines more subtle
    per the style guide.'
