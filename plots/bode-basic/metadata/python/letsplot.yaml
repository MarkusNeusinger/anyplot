review:
  strengths:
  - Complete dual-panel Bode plot with correct magnitude and phase panels sharing
    a logarithmic frequency axis
  - 'Well-implemented stability margin annotations: GM (ochre, #BD8233) with bidirectional
    arrow and PM (blue, #4467A3) with bidirectional arrow — exact values labeled clearly
    in rounded annotation boxes'
  - Correct 0 dB reference line in magnitude panel and -180° reference line in phase
    panel using theme-adaptive dashed lines
  - Full Imprint palette compliance and theme adaptation — warm off-white (#FAF8F1)
    light background, warm near-black (#1A1A17) dark background, all chrome tokens
    correctly applied
  - Effective use of ggbunch for dual-panel composition, layer_tooltips() for interactive
    HTML output, and dual PNG+HTML export — distinctive letsplot features
  weaknesses:
  - Panel axis lines appear on all four sides creating a full box frame rather than
    the preferred L-shaped (left+bottom only) frame — panel_border=element_blank()
    may not be suppressing the top/right axis lines in letsplot; consider also setting
    axis_line_x/axis_line_y separately or using theme_minimal() as a base (DE-02 impact)
  - Y-axis tick labels are slightly small and densely spaced (every 2 dB in the magnitude
    panel shows many tick marks); at mobile width (~400 px) these could become hard
    to read — consider reducing tick density with scale_y_continuous(breaks=seq(-30,10,10))
    and increasing axis_text size to 11 (VQ-01 minor impact)
  - Phase margin bidirectional arrow is very short (only 15.8° span between phase_at_gc
    and -180°), making the arrow itself nearly invisible at the scale of the phase
    panel — consider enlarging the arrowhead or adding a horizontal leader line to
    make the PM marker more visually prominent
