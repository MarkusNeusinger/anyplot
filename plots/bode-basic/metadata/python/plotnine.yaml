review:
  strengths:
  - 'Semantically motivated color choices: red (#AE3030) for gain margin (instability
    risk), blue (#4467A3) for phase margin — both from Imprint palette with clear
    semantic rationale'
  - Redundant encoding via marker shapes (circle=gain crossover, square=phase crossover)
    adds accessibility beyond color alone
  - Vertical crossover guides spanning both panels help the reader trace relationships
    between magnitude and phase panels
  - 'Full theme-adaptive chrome: all tokens correctly branch on ANYPLOT_THEME; dark
    render has no dark-on-dark issues'
  - Idiomatic plotnine faceting with CategoricalDtype for panel order control is a
    genuinely plotnine-specific pattern
  weaknesses:
  - Annotation labels (GM = 8.0 dB and PM = 33 degrees) are slightly crowded against
    the adjacent crossover markers due to log-scale compression in the 0.5-1 Hz region;
    placing labels with a larger x-offset (e.g., freq * 2.5-3.0) would improve readability,
    especially at mobile scale
  - 'DE-01 does not reach strong design tier: consider adding a descriptive title
    prefix to add context and further differentiate the strip frame background'
