review:
  strengths:
  - Complete bode plot with dual-panel layout (magnitude + phase), logarithmic x-axis,
    gain/phase margins annotated, and reference lines — all spec requirements met
  - 'Semantic color assignment: matte red (#AE3030) for gain margin (instability distance),
    blue (#4467A3) for phase margin, green (#009E73) for the main TF curve — intentional
    and meaningful'
  - Distinct crossover markers (square for phase crossover, circle for gain crossover)
    plus vertical dotted guides in both panels — aids cross-panel tracing
  - Third-order physically accurate transfer function G(s)=5/[(s+1)(0.5s+1)(0.2s+1)]
    with realistic stability margins (GM=8 dB, PM=33°)
  - 'Idiomatic plotnine: facet_wrap with scales=''free_y'', CategoricalDtype for panel
    ordering, data-frame-per-geom pattern for annotations'
  - Perfect palette compliance and theme adaptation — both light (#FAF8F1) and dark
    (#1A1A17) renders pass readability checks with no dark-on-dark or light-on-light
    failures
  weaknesses:
  - 'Excessive vertical gap between the two facet panels: panel_spacing_y=0.15 creates
    a gap roughly 25-30% of the canvas height on a 4.5-inch figure — the panels look
    separated and each curve appears vertically compressed. Reduce panel_spacing_y
    to ~0.05 or 0.06.'
  - geom_text annotation size=12 is in mm units (≈34pt), which is 3-5x the recommended
    2.5-4mm range for plotnine annotation text. The 'GM = 8.0 dB' and 'PM = 33°' labels
    appear disproportionately large relative to the panel height. Reduce to size=4
    (≈11pt, well-readable at 3200×1800 without dominating the panels).
