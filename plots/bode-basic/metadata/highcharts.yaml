  image_description: 'The plot displays a dual-panel Bode plot for the transfer function
    G(s) = 10 / [(s+1)(s/5+1)(s/20+1)]. The top panel shows magnitude in dB (blue
    line, #306998) ranging from ~20 dB down to ~-130 dB, with a dashed 0 dB reference
    line labeled "0 dB". The bottom panel shows phase in degrees (orange line, #e67e22)
    rolling off from 0 degrees to approximately -270 degrees, with a dashed -180 degree
    reference line labeled "-180°". Both panels share a logarithmic frequency axis
    (Hz) from ~0.003 to ~160 Hz. Key markers include: a blue diamond at the gain crossover
    frequency (~0.96 Hz, 0 dB), a purple diamond showing the phase margin (~32.4 degrees
    above -180 degrees), an orange circle at the gain margin point (~9.9 dB below
    0 dB at phase crossover), and an orange circle at the phase crossover on the -180
    degree line (~1.77 Hz). Text annotations "GM = 9.9 dB" and "PM = 32.4°" are displayed
    near their respective markers. The title reads "bode-basic · highcharts · pyplots.ai"
    with subtitle showing the transfer function. A legend in the top-right lists all
    six series. The background is white with subtle gray grid lines.'
