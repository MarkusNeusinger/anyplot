  image_description: 'The plot displays a dual-panel Bode plot for frequency response
    analysis. The top panel shows magnitude in dB (blue line, #306998) starting at
    ~20 dB and rolling off smoothly past -120 dB. The bottom panel shows phase in
    degrees (orange line, #e67e22) starting near 0° and decreasing past -270°. Both
    panels share a logarithmic frequency axis from ~0.003 to ~100 Hz. Reference lines
    are drawn at 0 dB (top panel) and -180° (bottom panel) as gray dashed lines. Blue
    diamond markers indicate the gain crossover point (~0.8 Hz, 0 dB). An orange circle
    marker shows the phase crossover point (~1.6 Hz) with a "GM = 9.9 dB" label. A
    purple diamond marker on the phase plot marks the phase margin point with "PM
    = 32.4°" label. Dashed connector lines illustrate both margins. The background
    is light gray (#fafbfc) with white plot areas. Title reads "bode-basic · highcharts
    · pyplots.ai" with an italic subtitle showing the transfer function. Legend in
    top-right shows Magnitude, Phase, PM = 32.4°, and GM = 9.9 dB.'
