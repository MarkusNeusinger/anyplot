review:
  strengths:
  - Full spec compliance with all required Bode plot features (dual panel, GM/PM,
    reference lines, log scale)
  - 'Excellent color coding system: Python Blue for response curve, orange for gain
    margin, purple for phase margin'
  - Strong text legibility with all font sizes explicitly set
  - Clean, deterministic code with realistic transfer function data
  - Good use of plotnine faceting for dual-panel layout
  weaknesses:
  - Magnitude clipped at -30 dB creates an artificial flat line at bottom of top panel
  - Square figure format (12x12) does not optimally serve the logarithmic frequency
    axis
  - 'Visual refinement good but not fully polished (DE-02: 4/6)'
  image_description: The plot displays a dual-panel Bode plot with "bode-basic · plotnine
    · pyplots.ai" as the title in dark navy bold text. The top panel is labeled "Magnitude
    (dB)" with a light indigo strip background, showing a blue frequency response
    curve starting at ~14 dB at 0.03 Hz, rolling off through 0 dB and flattening at
    -30 dB (clipped). The bottom panel is labeled "Phase (degrees)" with the same
    strip styling, showing phase rolling from ~-40° down past -250°. Both panels share
    a logarithmic frequency axis labeled "Frequency (Hz)" with ticks at 0.1, 1, and
    10. A dashed gray reference line marks 0 dB in the magnitude panel and -180° in
    the phase panel. Dotted vertical guide lines mark the gain and phase crossover
    frequencies. An orange vertical segment shows the gain margin (~8 dB) with a bold
    orange "GM = 8.0 dB" label. A purple vertical segment shows the phase margin (~33°)
    with a bold purple "PM = 33°" label. Purple circles mark gain crossover points,
    orange squares mark phase crossover points. The background is light gray (#FAFAFA)
    with white panel interiors and subtle two-level grid lines.
