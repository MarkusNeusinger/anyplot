review:
  strengths:
  - Full spec compliance with all required Bode plot features (dual panels, margins,
    reference lines, log scale)
  - Effective color-coded annotation system distinguishing gain margin (orange) and
    phase margin (purple)
  - Deterministic analytical data from a realistic third-order transfer function
  - Idiomatic plotnine usage with facet_wrap for dual-panel layout
  - Explicit font sizing for all text elements
  weaknesses:
  - Gain margin and phase margin vertical segments are barely visible as margin indicators
  - Magnitude panel has excessive unused vertical space below the curve
  - Transfer function does not show resonance peak mentioned in spec
  - Many small DataFrames for annotations add code verbosity
  image_description: The plot displays a two-panel Bode diagram for a third-order
    transfer function. The top panel shows Magnitude (dB) vs Frequency (Hz) on a logarithmic
    x-axis, with the blue response curve starting at ~14 dB and rolling off to about
    -175 dB. The bottom panel shows Phase (degrees) vs Frequency (Hz), with the phase
    starting near 0° and decreasing to approximately -270°. Dashed gray reference
    lines are drawn at 0 dB and -180°. Orange square markers indicate the phase crossover
    point, and purple circle markers indicate the gain crossover point. Annotations
    read "GM = 8.1 dB" in orange and "PM = 32°" in purple. The title reads "bode-basic
    · plotnine · pyplots.ai" centered at the top. The background is white with subtle
    light gray major grid lines. The facet strip labels "Magnitude (dB)" and "Phase
    (degrees)" have a light gray background.
