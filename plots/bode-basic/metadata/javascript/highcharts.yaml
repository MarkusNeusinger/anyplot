review:
  strengths:
  - 'Mathematically rigorous: computes gain/phase crossover frequencies via log-linear
    interpolation, not hard-coded values.'
  - Semantic color assignment for crossover markers (ochre for gain crossover = PM,
    matte red for phase crossover = GM).
  - 'Perfect spec compliance: dual-panel, log x-axis, 0 dB and -180 deg reference
    lines, both stability margins annotated.'
  - Idiomatic Highcharts dual-panel via yAxis.top/height — correct library technique
    for this chart type.
  - Both theme renders fully correct with no dark-on-dark or light-on-light failures.
  weaknesses:
  - Phase series uses t.palette[2] (#4467A3 blue), skipping palette[1] (#C475FD lavender)
    — change to t.palette[1] to follow canonical Imprint order.
  - 'Crossover line labels (PM, GM) appear in the inter-panel gap due to verticalAlign:
    middle — reposition into their contextually relevant panels (PM into magnitude
    panel, GM into phase panel) using verticalAlign: top/bottom with y offset.'
