review:
  strengths:
  - 'Mathematically rigorous implementation: correct complex arithmetic for transfer
    function, phase unwrapping algorithm handles continuous phase tracking past ±180°'
  - 'Color-coded stability margin annotations: blue (#4467A3) for phase margin, ochre
    (#BD8233) for gain margin — visually linking crossover markers across both panels'
  - Bracket visualizations in both magnitude and phase panels graphically represent
    PM and GM spans, guiding the engineer's eye to stability margins
  - Professional subtitle showing system parameters (ωn, ζ, ω₁) adds domain context
    beyond the title
  - Shared logarithmic frequency axis with custom tick formatting (k suffix for kHz)
    is clean and idiomatic
  - 'Both themes fully adaptive: data colors identical, chrome tokens correctly applied
    to text, grid, and domain lines'
  weaknesses:
  - Subtitle font-size is 13px CSS — just below the 14px minimum recommended in the
    library prompt; increase to 14px for safer mobile readability
  - 'The phase panel PM bracket label shows only ''PM'' without the numeric value
    (contrast: magnitude panel shows ''PM = 21.9°''); adding the value to the phase
    panel bracket would improve self-contained readability'
  - DE-01 capped at 6/8 — design is clean and above defaults but not publication-quality
    (FiveThirtyEight-level); could be pushed to 8 with finer typographic polish (e.g.
    slightly heavier axis label weight, breathing room between panels)
