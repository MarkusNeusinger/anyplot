      Data: Brand green (#009E73) primary curves for both magnitude and phase. Lavender (#C475FD) dashed vertical at phase-margin crossover with "PM = 46.7°" annotation in both panels. Blue (#4467A3) dashed vertical at gain-margin crossover with "GM = 21.0 dB" (magnitude panel) and "GM freq" (phase panel). Dashed reference lines at 0 dB and -180°.
