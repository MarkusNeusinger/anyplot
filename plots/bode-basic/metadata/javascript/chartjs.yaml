review:
  strengths:
  - Correct and idiomatic Chart.js dual-panel layout using flex CSS and two independent
    chart instances
  - Custom afterDraw plugin correctly uses xScale.getPixelForValue() / yScale.getPixelForValue()
    for precise annotation placement
  - scatter + showLine correctly handles the logarithmic axis (line type does not
    support log axes in Chart.js)
  - 'Perfectly deterministic data: third-order transfer function with analytically
    computed gain/phase crossover frequencies'
  - Full Imprint palette compliance with theme-adaptive chrome; both renders are legible
    with no dark-on-dark failures
  - 'All mandatory spec features present: 0 dB and -180° reference lines, margin annotations
    in both panels'
  weaknesses:
  - GM freq annotation in phase panel is uninformative — labels frequency marker only;
    replace with quantitative label showing phase-crossover frequency (e.g. omega_pc
    = 10 rad/s)
  - Annotation canvas font is 13 px CSS (26 px source), slightly smaller than tick
    labels (14 px); increase to 14-15 px for better mobile readability
  - Transfer function uses only real poles — monotonically decreasing magnitude with
    no resonance peak; spec example calls for resonance; use second-order underdamped
    factor (zeta < 1) to show peak
  - Chart.js default box frame (all four borders) retained around both panels; remove
    top/right borders for style-guide L-frame
  image_description: |-
