review:
  strengths:
  - Mathematically correct transfer function with resonance peak and full stability
    margin calculation (PM=49.4°, GM=16.6 dB)
  - Custom afterDraw plugins for L-frame spine removal and color-coded margin annotations
    using Chart.js scale API (getPixelForValue)
  - Custom logarithmic tick callback producing clean powers-of-10 labels (0.01, 0.1,
    1, 10, 100, 1000)
  - 'Full Imprint palette compliance — #009E73 first series, correct lavender/blue
    for crossover markers, theme-adaptive chrome (background, text, grid) flips correctly'
  - 'Complete spec compliance: dual-panel layout, shared log frequency axis (top hides
    ticks), 0 dB and -180° reference lines, PM and GM annotations with vertical markers,
    grid lines for reading margin values'
  weaknesses:
  - Annotation labels (PM, GM, ω_pc) rendered at 14px bold — functional but slightly
    small given they carry the key insight values; consider 16–18px for these labels
    to give them more visual prominence relative to the axis tick labels
  - 'Design quality is functional/professional but not publication-beautiful: the
    log scale''s dense vertical gridlines make the chart slightly busy; the DE score
    is pulled by the utilitarian look vs. a truly polished engineering visualization'
  - Factory functions (makeMarginPlugin, makeLFramePlugin, addPanel) deviate from
    strict KISS — justified by Chart.js plugin patterns but adds code volume
