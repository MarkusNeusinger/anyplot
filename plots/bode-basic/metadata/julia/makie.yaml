  strengths:
  - Correct dual-panel Bode plot with magnitude (dB) on top and phase (degrees) on
    bottom sharing a linked log-scale x-axis
  - 'All spec requirements implemented: gain margin and phase margin annotated with
    values, 0 dB and -180 degree reference lines, log-spaced 600-point frequency data
    from 0.01 to 10000 Hz'
  - 'Thoughtful color coding: blue (Imprint position 3) for gain margin, matte red
    (Imprint position 5) for phase margin — semantic use of Imprint palette anchors'
  - Minor x-grid (xminorgridvisible) is an excellent touch for log-scale Bode plots,
    aiding frequency reading between decades
  - axis_style named tuple spread for shared axis attributes is idiomatic and DRY
  - Perfect spec, data, and code quality scores — deterministic transfer function
    data, clean imports, correct save path pattern
  - Both light and dark themes render correctly with no dark-on-dark failures
  weaknesses:
  - Annotation font size (13pt) is on the small side for the 3200x1800 canvas — at
    mobile widths (400px) the GM and PM labels may be hard to read; consider raising
    to 15pt
  - rowgap!(fig.layout, 1, 10) sets the gap at index 1 (between title row 0 and magnitude
    row 1), leaving the inter-panel gap at the Makie default — verify the gap between
    magnitude and phase panels is not too large
  - DE-01 Aesthetic Sophistication is at 5/8 — the color-coded margin annotations
    show design intent but overall styling is clean-minimal without exceptional touches
    like custom legend frames or typographic hierarchy
