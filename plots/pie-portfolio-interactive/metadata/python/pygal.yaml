review:
  strengths:
  - Full anyplot theme-adaptive tokens applied correctly across both light and dark
    renders — foreground, foreground_strong, foreground_subtle all set.
  - Generates both HTML (interactive) and PNG, correctly leveraging pygal's primary
    strength.
  - Per-slice label dicts with holding name + formatted weight enable rich interactive
    tooltips in the HTML version.
  - Realistic and well-balanced portfolio data with correct 100% allocation; clearly
    neutral financial context.
  - Font sizes all explicitly set with correct proportional formula for title length.
  weaknesses:
  - inner_radius=0.35 produces a shallow donut hole — widen to 0.55–0.65 for a more
    modern donut and to open space for a center annotation (e.g. '100% · 10 Holdings'
    or the dominant category name).
  - Legend labels show only category names ('Equities') — adding the category total
    percentage ('Equities · 55.0%') in the legend would improve data storytelling
    without cluttering the chart.
  - No visual emphasis on the dominant category — the Equities slice at 55% is not
    highlighted; consider a slight slice explosion or a text callout to draw attention
    to the dominant allocation.
  - Small Alternatives slices (three 5.0%/7.0% slices) cluster tightly at the top
    — consider reducing value_font_size on small slices or using a wider inner_radius
    to improve slice label separation.
