review:
  strengths:
  - Semantic color mapping with documented justification (green=equities/growth, blue=fixed
    income/stability, ochre=alternatives, muted=cash)
  - 'Fully interactive: hover tooltips showing Asset, Category, Weight%, Value$ plus
    click drill-down with dismissable info panel and Back to Overview button'
  - Clean donut design with center portfolio total value label showing $1,000,000
  - 'Correct theme adaptation in both renders — backgrounds #FAF8F1 light and #1A1A17
    dark with all chrome tokens properly applied'
  - Realistic 10-holding portfolio with named assets, weights summing to 100%, and
    plausible USD values
  weaknesses:
  - Outer ring asset labels set at 21pt (~28 source-px) — significantly below the
    recommended 34pt (~45 source-px) for bokeh at 2400x2400 canvas; labels will be
    unreadable when scaled to mobile (~400px width)
  - Uses bokeh.io.export_png() against the explicit library guide rule ("Do NOT use
    bokeh.io.export_png"); should use driver.save_screenshot() via the Selenium approach;
    also missing --window-size={W},{H} Chrome flag
  - Large empty canvas area in lower-right quadrant (especially visible in dark render)
    — donut radius could be increased or padding adjusted to fill the 2400x2400 canvas
    more efficiently
  - Click drill-down shows a per-holding info panel but does not implement the two-level
    asset class → sub-holdings hierarchy the spec requests; no asset-class overview
    step before individual holdings
  - Legend label font at 28pt is below the recommended 34pt for bokeh at this canvas
    size
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "pie-portfolio-interactive · python · bokeh · anyplot.ai" bold dark text at top, clearly readable. No axis labels (correct for donut). Asset name labels placed around the outer ring in dark INK color — readable at full resolution but noticeably smaller than recommended (21pt vs 34pt guide). Center labels "Total Portfolio" (INK_SOFT) and "$1,000,000" (INK bold) inside the donut hole are clearly readable.
      Data: Donut wedges: Equities = #009E73 (brand green, dominant ~55% of ring), Fixed Income = #4467A3 (blue), Alternatives = #BD8233 (ochre), Cash = muted gray. Legend panel on right with elevated #FFFDF6 background listing 4 categories with square swatches. Large empty whitespace in lower-right quadrant of the 2400x2400 canvas.
      Legibility verdict: PASS — all text readable at full res; mobile scale concern for 21pt ring labels

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct anyplot dark surface
      Chrome: Title in light (#F0EFE8) text, clearly readable against dark background. Asset ring labels in light INK color, readable. Center "Total Portfolio" and "$1,000,000" labels use light text tokens — no dark-on-dark issues. Legend on right has elevated #242420 dark background with light INK_SOFT label text — clearly readable.
      Data: Data colors identical to light render (#009E73 green, #4467A3 blue, #BD8233 ochre, muted gray for Cash) — only chrome flipped. Large empty area lower-right more prominent on dark background.
      Legibility verdict: PASS — all text readable; no dark-on-dark failures observed
