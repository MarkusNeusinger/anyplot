review:
  strengths:
  - Semantic ESG color mapping (green for Sustainable Equities, blue for Technology,
    lavender for Green Fixed Income, ochre for Real Assets) creates meaningful visual
    communication beyond arbitrary ordering
  - Clean donut with bold center annotation immediately communicating fund identity
  - Real Plotly updatemenus toggle buttons — genuine interactivity, not fake UI
  - Rich hovertemplate with customdata surfaces asset name, weight, and category on
    hover
  - Custom category legend using ghost go.Scatter traces shows total weights per asset
    class
  - Correct theme-adaptive chrome in both renders with all fonts explicitly set
  - Deterministic ESG data using real company names (Ørsted, NextEra, Vestas) summing
    to exactly 100%
  weaknesses:
  - Spec calls for click-on-segment drill-down into sub-holdings (e.g., clicking Technology
    reveals only Microsoft/Alphabet/Schneider Electric); implementation uses toggle
    buttons for all-holdings vs. all-categories views — functional but misses the
    specified interaction model
  - Legend box border could be removed for cleaner minimalist appearance per anyplot
    style guide
  - 'DE-01 could improve: within-donut visual hierarchy is flat — differentiated outer-ring
    arc labels by category or proportionally varied pull values would guide the eye
    more deliberately'
