review:
  strengths:
  - 'Excellent dual-panel donut design: main portfolio allocation + equities drill-down
    with connecting dashed arrow creates a compelling static narrative of the interactive
    concept'
  - 'Perfect anyplot palette compliance — Equities #009E73 (brand green), Fixed Income
    #4467A3 (blue/stability), Alternatives #C475FD (lavender), Cash #BD8233 (ochre)
    — all semantic assignments are defensible and from the palette'
  - 'Both light (#FAF8F1) and dark (#1A1A17) themes render correctly with full theme-adaptive
    chrome: title, section labels, center labels, and legend text all use INK/INK_SOFT
    tokens'
  - Both percentage and dollar-value labels are shown on each segment, meeting the
    spec requirement to display both types of data
  - 'Perfect code quality: KISS structure, np.random.seed(42), all imports used, no
    functions/classes'
  weaknesses:
  - Detail donut percentage labels show portfolio-level weights (18%, 12%, 10%, 5%)
    while the donut proportions visualize equities sub-allocation (40%, 27%, 22%,
    11%) — the labels are inconsistent with what the donut visually encodes, which
    can mislead viewers about how Equities is split internally
  - Legend text (size=2.8 mm ≈ 8pt) and small-slice USD labels (size=2.8–3.0 mm) are
    on the small side and may become hard to read at mobile width (~400px scaled);
    increase legend text to size=3.2 and USD labels to size=3.2
  - 'Library Mastery limited: plotnine has no native pie/donut geom, so the implementation
    hand-crafts polygon arcs — idiomatic score is bounded by this inherent library
    limitation'
  - Small horizontal whitespace on left/right canvas edges (slices don't extend close
    to the scale boundaries); could narrow x-limits slightly to center both donuts
    more tightly and reduce empty margin
