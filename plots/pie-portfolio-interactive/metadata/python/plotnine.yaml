    seed, idiomatic plotnine layering'
  weaknesses:
  - 'DE-01 (5/8): Design lacks final premium polish — consider adding subtle shadows
    or refined typographic hierarchy between section titles and data labels to push
    beyond a functional dual-donut toward publication quality'
  - 'DE-02 (4/6): The manually built legend (polygon boxes + geom_text) looks functional
    but slightly utilitarian; refine by aligning legend items more tightly and ensuring
    consistent spacing at scale'
  - 'SC-02 (3/4): Spec asks for both percentage AND absolute values per holding; the
    equities drill-down only shows sub-percentages (18%, 12%, etc.) without corresponding
    dollar amounts — add ~$810K, ~$540K labels to the detail donut segments or center
    area'
  - 'VQ-01 (7/8): Center hole labels (size=3.2mm ≈ 9pt) are readable but slightly
    small relative to the overall layout; bumping to size=3.8 would improve legibility
    at mobile widths'
  - 'VQ-05 (3/4): Notable empty whitespace in the upper canvas corners and between
    the legend and the bottom edge; tightening the scale_y_continuous limits or adding
    a data annotation could use that space more intentionally'
