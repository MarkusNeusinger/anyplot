review:
  strengths:
  - Dual-ring concentric donut correctly implements the hierarchical portfolio concept
    as a static visualization without any fake interactivity
  - Imprint palette applied in canonical order with correct first-series brand green;
    full theme adaptation with correct dark/light chrome tokens
  - Hierarchical legend with both percentage and dollar value context adds real investment
    utility
  - Deterministic hardcoded data that sums to exactly 100%; realistic balanced fund
    composition with plausible asset class breakdown
  weaknesses:
  - Outer ring pct labels at 7pt may be marginal at mobile scale; consider bumping
    outer ring autopct fontsize to 8pt for consistency
  - No visual emphasis on the dominant segment (48% Equities) — could use a subtle
    pull-out or slightly increased radius on the largest inner wedge to create a focal
    point without faking interactivity
  - The ax.pie() approach is idiomatic but there is an opportunity to use matplotlib
    wedge properties more creatively (e.g. wedge explode for the largest segment)
