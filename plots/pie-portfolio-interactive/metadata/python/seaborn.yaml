review:
  strengths:
  - Semantic color assignments (equity=green, bonds=blue, alternatives=ochre) align
    with real-world color expectations
  - Dual-ring donut design solves drill-down requirement in a static format — inner
    ring = category overview, outer ring = holdings detail
  - Seaborn palette blending (blend_palette, light_palette, dark_palette) creates
    gradient shading within categories — a seaborn-distinctive technique
  - Fully theme-adaptive chrome with no dark-on-dark or light-on-light failures in
    either render
  - Realistic neutral portfolio data with correct proportionality ($1M portfolio,
    weights summing to 100%)
  weaknesses:
  - Annotation and legend text at 6pt is marginally small; raise annotation fontsize
    to 7-8pt and legend fontsize to 7-8pt to improve mobile readability
  - Gradient shading within categories creates minimal visual differentiation on small
    wedges (Gold 4%, Municipal Bonds 5%, REITs 6%) — consider wider blend range or
    stronger contrast between min/max shades
  - Inner-ring color generation code (lines 79-88) uses an over-complex index lookup;
    simplify with enumerate or a position counter variable
  - Small amount of wasted space below the bottom legend — reduce subplots_adjust(bottom)
    or tighten ylim to improve canvas utilization
