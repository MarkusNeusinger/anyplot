      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "pie-portfolio-interactive · python · seaborn · anyplot.ai" readable in dark #1A1A17 ink. No axis labels (appropriate for pie). Annotation callout text in INK (#1A1A17) on ELEVATED_BG (#FFFDF6) boxes. Legend text in INK_SOFT (#4A4A44) on elevated background.
