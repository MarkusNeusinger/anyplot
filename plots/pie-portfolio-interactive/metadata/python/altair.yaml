review:
  strengths:
  - Excellent interactive Altair implementation using selection_point + transform_filter
    for true click-to-drill-down on the outer category ring
  - 'Perfect anyplot palette compliance: Equities=#009E73 (brand first), Fixed Income=#C475FD,
    Alternatives=#4467A3 in canonical order'
  - Full theme adaptation across light (#FAF8F1) and dark (#1A1A17) renders with INK/INK_SOFT
    tokens correctly threaded to legend, title, subtitle, and center text
  - 'Clean dual-ring donut architecture: outer ring shows category totals, inner ring
    filters to individual holdings on selection — correct spec interpretation'
  - Saves both plot-{THEME}.png and plot-{THEME}.html; canvas padded to exact 2400×2400
    target with proper raise-on-overshoot guard
  - 'Realistic financial dataset: 10 real-world holdings (Apple, Microsoft, US Treasury
    10Y, etc.) across 3 asset classes summing to exactly 100%'
  - Idiomatic use of alt.condition() for opacity-based selection feedback (25% for
    unselected), center mark_text summary, and al.Tooltip with format strings
  weaknesses:
  - 'DE-01 (5/8): Design is well-structured but not yet publication-ready. The legend,
    rings, and center text all use correct tokens but the overall aesthetic lacks
    differentiation — the font is the browser default, the ring widths are uniform,
    and there is no typographic hierarchy between the ''100%'' and ''10 Holdings''
    lines in the center. Add a larger primary number (e.g. fontSize=28 for ''100%''
    vs fontSize=16 for ''10 Holdings''), consider slightly varying ring widths, and
    set a clean sans-serif via configure_text.'
  - 'DE-02 (3/6): Visual refinement is present but minimal. The legend has a styled
    box (ELEVATED_BG fill, INK_SOFT border) which is correct, but configure_legend()
    is not called globally — some Altair-default legend padding and symbol sizing
    remains. Explicitly set configure_legend(padding=12, cornerRadius=6, symbolStrokeWidth=0)
    and configure_view(stroke=None) to eliminate the default view border and tighten
    the legend box appearance.'
  - 'DE-03 (3/6): The dual-ring structure provides hierarchical storytelling but no
    focal point draws the eye. Add a subtle emphasis: use opacity=1.0 for the dominant
    segment (Equities at 45%) in the default (unselected) state rather than treating
    all segments equally, or add a thin arc annotation line marking the largest category
    boundary. This immediately surfaces the insight that nearly half the portfolio
    is in equities.'
  - 'VQ-01 (7/8): subtitle at subtitleFontSize=11 is slightly small; at scale_factor=4
    this renders at 44px which is readable but tight at mobile widths. Increase to
    subtitleFontSize=12 for a safer mobile footprint.'
  - 'VQ-03 (5/6): ring boundary stroke=PAGE_BG (#1A1A17 in dark mode) is nearly invisible
    against dark arc segments, making the inner/outer ring border subtle in the dark
    render. Use a slightly lighter stroke in dark mode, e.g. INK_SOFT (#B8B7B0), or
    increase the gap between innerRadius=190 and outerRadius=195 to at least 8px.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white, fills the full 2400×2400 canvas
      Chrome: Title "pie-portfolio-interactive · python · altair · anyplot.ai" in dark ink at top center, clearly readable. Subtitle "Click outer ring to drill into category holdings · click again to reset" in INK_SOFT, readable. Legend box (right side) with "Asset Class" header and three swatches (Equities/green, Fixed Income/purple, Alternatives/blue) on an elevated FFFDF6 background with INK_SOFT border — all labels readable.
      Data: Dual-ring donut. Outer ring (category level): green ~45% (Equities), purple ~35% (Fixed Income), blue ~20% (Alternatives). Inner ring (individual holdings, 10 segments): same three colors subdivided. Center circle in PAGE_BG with bold dark text "100% / 10 Holdings". White/PAGE_BG strokes separate all segments.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, fills full canvas. NOT pure black.
      Chrome: Title in near-white F0EFE8, clearly readable against dark background. Subtitle in B8B7B0 (INK_SOFT), readable. Legend box with elevated #242420 fill and INK_SOFT border — "Asset Class" in light text, swatch labels readable.
      Data: Same three arc colors (#009E73 green, #C475FD lavender, #4467A3 blue) are IDENTICAL to light render — only chrome flipped. Center circle is near-black #1A1A17 with bold white text "100% / 10 Holdings" — readable. Minor observation: ring boundary strokes (stroke=PAGE_BG = #1A1A17 in dark mode) blend into dark arc colors, making the inner/outer ring boundary subtly less defined than in light mode.
      No dark-on-dark text failures observed — all labels, title, subtitle, legend text are light-colored.
      Legibility verdict: PASS — all text elements are clearly readable against the dark background.
