review:
  strengths:
  - Excellent interactive hover tooltips via layer_tooltips() with category name,
    allocation %, holdings count, and holdings preview — rich multi-line tooltip design
    distinctive to lets-plot
  - Semantic color mapping (green=equities/growth, blue=conservative/fixed income)
    shows design thinking documented in code comments
  - Clean donut with center Portfolio 100% label provides portfolio-total context
    at a glance
  - Correct and complete theme adaptation — PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens
    applied throughout both renders
  - Creative use of ggbunch() to deliver overview + 4 drill-down panels in a single
    interactive HTML file
  - Realistic institutional portfolio data with named assets and realistic allocation
    proportions summing to 100%
  - Perfect Code Quality and near-perfect Library Mastery
  weaknesses:
  - Canvas underutilized — donut ring occupies ~55-60% of 2400x2400 square with notable
    empty whitespace above and below; increase geom_pie(size=38) to approximately
    45 to expand the donut and fill the canvas better
  - The 4% Cash slice is a very narrow sliver with a cramped 4.0% label; consider
    a callout label or suppressing labels below a threshold (e.g. weight < 5%)
  - True click-to-drill-down navigation not achievable — HTML layout shows all 4 drill-down
    panels simultaneously via ggbunch rather than click-based navigation; SC-02 partial
    miss
  - Design Excellence ceiling not reached — add a bold annotation calling out the
    dominant Fixed Income 38% allocation to create visual focal point and push DE-03
    to 6
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface, not pure white
      Chrome: Bold title "pie-portfolio-interactive · python · letsplot · anyplot.ai" in dark ink, clearly readable. Subtitle "Hover for details · Drill-down panels in HTML" in INK_SOFT. Legend "Asset Class" with elevated (#FFFDF6) background box and dark text — all readable. Center "Portfolio 100%" label in dark ink on elevated box.
      Data: Equities 37% (#009E73 brand green), Fixed Income 38% (#4467A3 blue), Alternatives 21% (#C475FD lavender), Cash 4% (#BD8233 ochre). Slice percentage labels in white/light color on each segment. 4% Cash slice is a narrow sliver.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title and subtitle in light (#F0EFE8) ink, clearly readable. Legend background switches to elevated dark (#242420) with light text. Center "Portfolio 100%" shows white text on dark-elevated box. No dark-on-dark failures detected.
      Data: Colors identical to light render — Equities #009E73, Fixed Income #4467A3, Alternatives #C475FD, Cash #BD8233. White slice percentage labels remain legible against segment colors. Brand green #009E73 clearly visible on dark surface.
      Legibility verdict: PASS
