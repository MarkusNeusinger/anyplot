review:
  strengths:
  - Semantic color assignment (Equities=green, Fixed Income=blue, Alternatives=purple,
    Cash=ochre) is well-reasoned and documented in code comments, aligning with strong
    financial color conventions
  - ggbunch() composite layout is an excellent use of a letsplot-specific feature
    for the drill-down HTML panels
  - layer_tooltips() with multi-line formatted content (category name, weight%, holdings
    count, holdings preview) provides rich interactive information per slice
  - Suppressing labels below 5% (pct_label logic) prevents cramped text on the tiny
    Cash slice — thoughtful UX decision
  - Caption directly calls out the dominant insight in brand blue (#4467A3), elevating
    data storytelling above default
  - theme_void() combined with custom chart_theme tokens produces a very clean pie
    presentation with no unnecessary chrome
  weaknesses:
  - Spec requests 'display both percentage and absolute values where applicable' —
    only percentages are shown; no portfolio dollar value context (e.g. '$380K of
    $1M') in tooltips or labels
  - Click-to-drill-down navigation is not implemented; instead all panels are shown
    simultaneously via ggbunch — the navigational interactivity described in the spec
    is absent (subtitle is honest about this limitation)
  - Slice labels (size=7mm) may be slightly small when the chart is scaled to mobile
    thumbnails (~400px)
