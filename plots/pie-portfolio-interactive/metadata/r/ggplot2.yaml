review:
  strengths:
  - Double-donut design using coord_polar with nested x-positions is idiomatic and
    visually clean
  - Anyplot palette applied correctly — Equities=brand green, Fixed Income=lavender,
    Alternatives=blue, Cash=ochre in canonical order
  - Theme-adaptive chrome works perfectly in both renders — warm backgrounds, light/dark
    INK tokens, no dark-on-dark failures
  - Realistic $1M model portfolio data with 10 holdings and 4 asset classes, weights
    sum exactly to 100
  - Inner ring labels (asset class) + outer ring labels (holding name, %, $) give
    both macro and micro context
  - 'KISS code structure: flat, no functions, deterministic data, clean imports'
  - Title fontsize scales dynamically with string length — no overflow at the 2400×2400
    canvas
  weaknesses:
  - Inner ring label for Alternatives (10% slice) is tight — white text is cramped
    in the narrow wedge; consider dropping to weight >= 12 threshold or reducing to
    single-line label
  - Outer ring floating labels at size=2.6 are readable at full resolution but may
    be marginal at mobile thumbnail scale (~400px) — consider bumping to size=3.0
  - DE-01 design is correct but not exceptional — still reads as a well-configured
    library default rather than FiveThirtyEight-level polish
  - Bottom label cluster (US Treasuries + Emerging Mkts) sit close together at similar
    angular positions — minimal risk of crowding
