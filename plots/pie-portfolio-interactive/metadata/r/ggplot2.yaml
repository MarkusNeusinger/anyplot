review:
  strengths:
  - Correct double-donut using nested geom_col layers at different polar x positions
    (x=2.0 inner, x=3.2 outer) — idiomatic and non-trivial ggplot2 technique
  - Anyplot palette applied in canonical order with semantically appropriate mapping
    (green=#009E73 for Equities as primary asset class)
  - Both themes correctly implemented with proper chrome token usage (PAGE_BG, INK,
    INK_SOFT, INK_MUTED, ELEVATED_BG)
  - Square 2400x2400 canvas — correct orientation for a pie/donut chart
  - 'Smart label filtering (inner ring: segments >=8% labeled; outer ring: prominent
    segments only) to avoid crowding'
  - Realistic, professionally plausible portfolio data — 10 holdings, 4 asset classes,
    weights summing to 100%
  - 'Perfect code quality: clean, reproducible, no fake interactivity'
  - title_size scaling formula handles the long mandated title gracefully
  weaknesses:
  - 'Light render label readability failure: color = ''white'' is hardcoded for outer
    ring geom_text labels. At the ~1:45 o''clock position (Intl Developed segment
    at 104 degrees polar), the label ''Intl Developed\n18%'' has its first word ''Intl
    '' extending outside the green segment into the off-white #FAF8F1 background,
    making white text on white background invisible. Fix: place labels at x=4.0 (outside
    the outer ring entirely) using INK as the text color so labels always fall on
    the background surface and are readable in both themes.'
  - 'Absolute values missing: Spec says ''Display both percentage and absolute values
    where applicable'' but implementation shows only percentages. Add dollar-value
    scale to largest holding labels (e.g. assuming $1M portfolio: 20% = $200K).'
  - 'Inner ring label crowding: ''Fixed\nIncome\n30%'' in the 108-degree inner ring
    wedge is small and slightly cramped. Consider increasing minimum weight threshold
    from 8% to 10% or reducing lineheight for better fit.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "pie-portfolio-interactive · r · ggplot2 · anyplot.ai" bold dark text, readable. Subtitle "Model Portfolio · 10 Holdings · Inner ring: asset class | Outer ring: individual holding" in muted INK_MUTED color, readable. Legend "Asset Class" title and 4 category labels (Equities, Fixed Income, Alternatives, Cash) with color swatches — readable.
      Data: Inner ring (x=2.0): Equities green (#009E73) 55%, Fixed Income lavender (#C475FD) 30%, Alternatives blue (#4467A3) 10%, Cash ochre (#BD8233) 5%. Outer ring (x=3.2): 10 individual holdings in same category colors. White segment dividers. Labels "20%", "12%", "10%" in white on segments — readable. "Fixed\nIncome\n30%", "Equities\n55%", "Alternatives\n10%" inner ring labels in white — readable.
      FAILURE: "Intl Developed\n18%" outer ring label has hardcoded color="white". At ~104 degrees polar (1:45 o'clock position), the first word "Intl " extends outside the green outer ring segment into the #FAF8F1 off-white background — white text on white background is invisible. Only "Develop..." and "18%" visible.
      Legibility verdict: FAIL — "Intl " prefix invisible (white on white), all other text readable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title in light #F0EFE8 text — clearly readable. Subtitle in INK_MUTED light text — readable. Legend with light-colored text on elevated dark background (#242420) — readable. No dark-on-dark failures found.
      Data: Colors identical to light render — Equities #009E73, Fixed Income #C475FD, Alternatives #4467A3, Cash #BD8233. At the same ~104 degrees polar position, "Intl Developed\n18%" is now fully visible — white text readable on dark background (#1A1A17) where it extends outside the green segment. All other labels also readable.
      Legibility verdict: PASS — all text readable in dark render, including the "Intl Developed" label that failed in light render.
