review:
  strengths:
  - Double-donut design elegantly represents two portfolio hierarchy levels (asset
    class inner ring + individual holdings outer ring) in a single static chart, maximizing
    information density for an interactive spec
  - Perfect data quality — realistic model portfolio with 10 holdings across 4 asset
    classes, weights summing to 100%, and sensible proportions
  - 'Correct anyplot palette (green=Equities, lavender=Fixed Income, blue=Alternatives,
    ochre=Cash), correct theme backgrounds (#FAF8F1 light / #1A1A17 dark), chrome
    flips correctly between themes'
  - 'Flawless code quality: KISS structure, deterministic data, clean imports, no
    fake interactivity, correct plot-{THEME}.png output naming'
  - Idiomatic ggplot2 polar coordinate usage with two geom_col layers at different
    radii (x=2.0 inner, x=3.2 outer) plus coord_polar — demonstrates good grammar-of-graphics
    understanding
  weaknesses:
  - Inner ring geom_text labels use size=2.3 (≈6.5pt) which renders at ~36px on the
    2400px canvas — readable at full size but would fall below 6px at 400px mobile
    width; increase to size=3.5-4.0 for mobile legibility
  - Outer ring percentage labels use size=2.6 (≈7.4pt) — same mobile readability concern;
    increase to size=3.5-4.0
  - Segment border color=PAGE_BG means dark (#1A1A17) separators in dark theme on
    brightly colored segments — works visually but is less crisp than using a fixed
    white or semi-transparent white (e.g., color='white' or color='#FFFFFF99') to
    keep separators visible in both themes
  - 'DE-01 and DE-02 below threshold — the design is clean but could be elevated:
    consider adding holding names (not just percentages) to the largest outer ring
    segments, or a subtle center annotation showing total AUM or portfolio name to
    make it more publication-ready'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Bold title "pie-portfolio-interactive · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17), centered, ~75% of canvas width at size~12. Subtitle "Model Portfolio · 10 Holdings · Inner ring: asset class | Outer ring: individual holding" in muted dark text, smaller size 7. Bottom legend shows "Asset Class" title with four colored swatches: green (Equities), lavender (Fixed Income), blue (Alternatives), ochre (Cash) — legend on elevated off-white background with thin border.
      Data: Double-donut chart centered on the canvas. Inner ring (x=2.0) shows four asset class segments: Equities ~55% (teal-green #009E73, large arc), Fixed Income ~30% (lavender #C475FD, medium arc), Alternatives ~10% (blue #4467A3, small arc), Cash ~5% (ochre #BD8233, tiny arc). Inner ring has white segment dividers. Text labels inside inner ring: "Equities 55%", "Fixed\nIncome\n30%", "Alternatives\n10%" — all in white bold text, small but readable at full 2400px. Outer ring (x=3.2) shows individual holdings in matching category colors. Outer ring percentage labels in white: "20%", "18%", "12%", "12%", "10%" for holdings with weight≥10%.
      Legibility verdict: PASS — all text clearly visible against light background. Minor concern: inner ring geom_text labels (size=2.3, ~36px at 2400px) would be marginal at 400px mobile width.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title and subtitle text are light-colored (INK=#F0EFE8 and INK_MUTED=#A8A79F respectively), clearly readable against the dark background. Legend uses ELEVATED_BG=#242420 fill with light-colored text (INK_SOFT=#B8B7B0 for labels, INK=#F0EFE8 for title) — all readable against dark background. No dark-on-dark failures.
      Data: Segment colors identical to light render — Equities green (#009E73), Fixed Income lavender (#C475FD), Alternatives blue (#4467A3), Cash ochre (#BD8233). The segment border color switches to PAGE_BG=#1A1A17 (near-black) creating dark dividers; on brightly colored segments these remain visible as thin dark lines. The gap between inner and outer rings is now a dark channel rather than white, which slightly reduces ring separation clarity but both rings remain clearly distinguishable.
      Legibility verdict: PASS — all text readable against dark background. Data colors identical to light render (chrome-only flip). No dark-on-dark failures detected.
