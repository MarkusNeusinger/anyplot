review:
  strengths:
  - 'Correct anyplot palette order — Equities mapped to brand green #009E73, palette
    positions 1-4 in canonical order'
  - Theme-adaptive chrome properly threaded through all elements — title, center labels,
    legend text, and slice separators all flip correctly between light and dark
  - Manual arc construction using poly! and trigonometry is idiomatic CairoMakie for
    custom donut geometry — no AR-08 fake interactivity
  - Center hole labels ('Portfolio' + '$100M AUM') give the chart context and fill
    the donut hole purposefully
  - Clean horizontal legend below the chart with no frame, correct labelcolor token,
    and concise category+percent labels
  weaknesses:
  - Missing per-category absolute dollar values — spec says 'display both percentage
    and absolute values where applicable'; the implementation shows percentages and
    the total AUM but not per-slice values like '$40M', '$30M', '$20M', '$10M'
  - Donut fills roughly 55-60% of the canvas area, leaving large empty corners — tighten
    xlims/ylims from ±1.58 to ±1.42 to better use the square canvas
  - No visual emphasis distinguishing the dominant 40% Equities slice — all slices
    have equal visual weight; a slight radial offset or bold percentage label on the
    largest slice would improve data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white
      Chrome: Title "pie-portfolio-interactive · julia · makie · anyplot.ai" in dark ink (#1A1A17), clearly legible. No axis decorations (donut chart, decorations hidden). Percentage labels (40%, 30%, 20%, 10%) placed radially outside the ring in INK color, readable. Legend at bottom in INK / INK_SOFT tokens, readable.
      Data: Donut chart with 4 segments — Equities in #009E73 (brand green, largest at 40%), Fixed Income in #C475FD (lavender, 30%), Alternatives in #4467A3 (blue, 20%), Cash in #BD8233 (ochre, 10%). Slice separators in PAGE_BG give clean boundaries. Center hole contains "Portfolio" (INK) and "$100M AUM" (INK_SOFT).
      Legibility verdict: PASS — all text clearly readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black
      Chrome: Title in light (#F0EFE8) clearly visible. Percentage labels in INK token (light on dark) all readable. Center "Portfolio" label light and legible; "$100M AUM" in INK_SOFT readable as secondary. Legend labels in INK token, readable.
      Data: Donut segment colors are identical to light render — #009E73, #C475FD, #4467A3, #BD8233 — only chrome flips. The center hole renders as elevated dark (#242420 is the elevated bg, though implementation uses PAGE_BG — appears as a dark circle against the near-black background, which still reads correctly). No dark-on-dark failures observed.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures.
