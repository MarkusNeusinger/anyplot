review:
  strengths:
  - Dual encoding of passenger volume (line width + sequential colormap) creates strong
    visual hierarchy
  - Mathematically correct great circle arc interpolation via spherical linear interpolation
    (SLERP)
  - NaN-break technique for anti-meridian crossing handled correctly
  - All theme tokens properly threaded through every visual element — perfect dark
    mode adaptation
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) for continuous single-polarity
    data'
  - Clean Makie layout system usage with Fixed(90) colorbar column sizing
  - Airport label offsets carefully chosen to minimize overlap in dense European cluster
  weaknesses:
  - 'Missing base map (coastlines/country borders): The spec explicitly requires geographic
    context. Without coastlines or country borders, viewers cannot identify ocean
    vs land or geographic regions. Add coastlines using GeoMakie.jl if available in
    CI, or draw simplified outlines using poly! with a natural earth dataset.'
  - 'Arc transparency outside spec range: alpha=0.75f0 is above the spec''s recommended
    0.3-0.6. Reduce to 0.5f0 to better handle overlapping routes.'
  - 'Empty southern hemisphere: No routes south of Singapore (except Sydney). The
    lower ~40% of the canvas is empty. Consider cropping latitude limits to roughly
    -50 to 75° to make better use of canvas.'
  - Airport label font size at fontsize=10 is small — increase to 11-12 for better
    mobile readability.
