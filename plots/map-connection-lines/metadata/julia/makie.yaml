review:
  strengths:
  - Implements true great-circle arcs via SLERP — geodesically correct and clearly
    curved on the world map
  - Dual-encoding of passenger volume through both line color (sequential green→blue
    colormap) and linewidth gives redundant, CVD-friendly encoding
  - Manually-crafted continent polygon data and theme-adaptive land fills produce
    a convincing base map without any external geo library
  - 'Full spec compliance: great-circle paths, alpha transparency, endpoint markers
    with INK strokes, colorbar with units, manual label offsets to reduce clutter'
  - 'Perfect code quality: flat procedural script, Random.seed!(42), no unused imports,
    saves plot-$(THEME).png with px_per_unit=2'
  weaknesses:
  - Airport labels in the Western Europe cluster (London/Paris/Frankfurt) are noticeably
    crowded; all three markers land within ~10° of each other and even with manual
    offsets the labels compete for space — consider bumping label fontsize to 11 or
    thinning the cluster by merging Frankfurt into a nearby label group
  - Base figure fontsize is 12 rather than the recommended 14; individual element
    sizes override it, but the slight downward shift leaves tick labels (10pt) marginally
    small at mobile width (~400px)
  - 'VQ-02 minor: arc lines in the North-Atlantic corridor pile up (London↔NewYork,
    Paris↔NewYork, Frankfurt↔NewYork all share the same visual corridor) — a slightly
    lower alpha (0.35–0.40) would improve layering legibility'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface.
      Chrome: Title "Global Air Routes · map-connection-lines · julia · makie · anyplot.ai" at ~19pt is fully readable and spans ~70% of the canvas width. "Longitude" / "Latitude" axis labels are clearly visible (13pt). Tick labels (-180, -120, … 180 / -30, 0, 30, 60) are readable at 10pt. Colorbar label "Passengers (M / year)" is clear. All chrome is dark ink on the warm-cream surface.
      Data: Connection arcs colored from brand green (#009E73, low volume) to blue (#4467A3, high volume); line widths scale from 1pt (low) to ~4.5pt (high), giving a visually clear volume hierarchy. Airport endpoints are green dots (#009E73) with dark strokes. Continent polygons are rendered in a warm beige fill with subtle tan coastlines. Very faint graticule lines at 30° intervals provide geographic reference without competing with data. Colorbar on the right side shows the ~3.4M–12.5M range.
      Legibility verdict: PASS — all title, axis, tick, and label text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title, axis labels, and tick labels all appear in light (#F0EFE8 / #B8B7B0) tones against the dark background — no dark-on-dark failures observed. Colorbar label and tick values are visible.
      Data: Arc colors are identical to the light render (green→blue sequential scale unchanged); continent fills switch to a darker gray matching the dark theme; coastline strokes shift to a slightly lighter muted gray. Airport markers remain the same brand green (#009E73), clearly visible on the dark surface. Graticule lines are slightly more visible (higher alpha token in dark mode) but remain subtle.
      Legibility verdict: PASS — all text elements are clearly readable against the dark background; no dark-on-dark failures detected.
