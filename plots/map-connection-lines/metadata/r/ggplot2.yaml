review:
  strengths:
  - Mathematically correct great circle arc implementation using spherical linear
    interpolation (SLERP) — routes follow true geodesic paths
  - Antimeridian splitting prevents horizontal line artifacts across the dateline
  - 'Dual encoding: both line color and line width scale with passenger volume, creating
    natural visual hierarchy'
  - Correct anyplot imprint_seq continuous colormap (#009E73→#4467A3) applied to arcs
  - Airport markers use brand green (#009E73) with page-background stroke — polished
    detail
  - 'Perfect theme adaptation: both light and dark renders are fully readable with
    zero chrome failures'
  - Correct canvas (3200×1800) and output format
  weaknesses:
  - 'Missing base map: spec explicitly requires country borders or coastlines for
    geographic context. Use geom_polygon(data = map_data("world"), aes(x = long, y
    = lat, group = group), fill = INK_MUTED, color = NA, alpha = 0.15) placed before
    the arc layers — no sf/ggmap needed'
  - 'London and Frankfurt city labels overlap (both use vjust=1.5, placed above markers).
    Fix: change Frankfurt vjust from 1.5 to -0.5 so it sits below its marker'
  - City label size (geom_text size=2.0, ≈5.7 pt) is small at mobile scale; increase
    to 2.4
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface
      Chrome: Title "Global Flight Routes · map-connection-lines · r · ggplot2 · anyplot.ai" centered in dark ink, clearly readable. Axis ticks show °N/°S/°W/°E in muted dark text, clearly readable. City labels in muted dark, mostly readable. Legend "Passengers (millions)" in dark ink, clearly readable.
      Data: 15 great circle arcs colored #009E73 (low ~1.1M passengers) to #4467A3 (high ~5.1M). Line width also scales with passengers. Airport markers are hollow circles with #009E73 fill. First series is #009E73 (brand green). Continuous gradient is correct imprint_seq.
      Legibility verdict: PASS — all text readable, minor London/Frankfurt label overlap

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface
      Chrome: Title, tick labels, city labels all render in light-colored ink contrasting well against the dark surface. Legend text is light. No dark-on-dark failures observed.
      Data: Arc colors identical to light render — same #009E73→#4467A3 gradient. Airport markers same brand green. Only chrome (background, text, legend box) flips between themes.
      Legibility verdict: PASS — all text readable against dark background, data colors unchanged
