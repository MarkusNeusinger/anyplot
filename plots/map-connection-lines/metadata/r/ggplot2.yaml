review:
  strengths:
  - Custom great-circle arc computation with antimeridian splitting produces geographically
    accurate curved routes without artifacts
  - Dual encoding of passenger volume via both color (imprint_seq gradient) and line
    thickness creates clear visual hierarchy
  - Full theme-adaptive token system with correct PAGE_BG, ELEVATED_BG, INK, INK_SOFT,
    INK_MUTED applied to all chrome elements
  - Hollow airport markers with PAGE_BG stroke provide clean definition against both
    light and dark backgrounds
  - Well-placed city labels with per-airport hjust/vjust nudges reduce label-point
    overlap on the map
  - Antimeridian wrapping handled correctly — no horizontal artifacts crossing the
    dateline
  weaknesses:
  - Frankfurt and London labels overlap in the European hub region — Frankfurt hjust=1.1
    pushes text leftward onto London's label; adjust hjust/vjust or offset Frankfurt
    differently to separate them
  - No geographic projection applied — spec explicitly mentions Robinson or Natural
    Earth projection for world maps; using raw lat/lon yields equirectangular distortion
    that distorts high-latitude routes
  - Helper function great_circle_arc defined at top level breaks KISS structure; inline
    the arc computation or flatten into a single pipeline
  - City label size (geom_text size=2.4, ~6.8pt equivalent) will be unreadable at
    400px mobile thumbnail width — increase to at least size=2.8
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "Global Flight Routes · map-connection-lines · r · ggplot2 · anyplot.ai" rendered in dark ink, centered, readable. Axis tick labels show cardinal lat/lon coordinates (60°N, 30°N, 0°, 30°S, 60°S and 120°W, 60°W, 0°, 60°E, 120°E) in INK_SOFT — all legible. No axis title labels (correct for geographic map). Legend title "Passengers (millions)" and tick values 2–5 readable in INK/INK_SOFT.
      Data: 15 flight route arcs rendered as great-circle curves colored via imprint_seq gradient (#009E73 green for low-volume → #4467A3 blue for high-volume). Line thickness also scales with volume (0.5–2.6 linewidth). Alpha=0.60. World map base layer rendered in muted grey fill at 15% alpha. Subtle graticule lines at 25% alpha. Hollow airport markers in brand green #009E73 with warm off-white stroke at 12 city locations. City label text in INK_SOFT.
      Frankfurt and London labels are positioned in close proximity in central Europe and appear to nearly overlap.
      Legibility verdict: PASS — all chrome text readable; minor concern on Frankfurt/London label proximity.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface
      Chrome: Title and all axis tick labels rendered in light text (#F0EFE8 / #B8B7B0), clearly visible against the dark background. Legend text light-colored. No dark-on-dark issues detected.
      Data: Arc colors identical to light render — same green-to-blue imprint_seq gradient. Data colors are theme-invariant as required. Airport markers retain brand green #009E73 fill. World map base layer appears in muted near-black fill, providing sufficient contrast against the slightly lighter dark background. Graticule lines subtle.
      Legibility verdict: PASS — all text legible on dark background; no dark-on-dark failures.
