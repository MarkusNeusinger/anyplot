    44px tick-label floor for 3200×1800 canvas. At mobile scale (~400px wide) these
    3-letter codes become marginal. Consider bumping to 28–32px with allowOverlap:
    false still active'
  - European hub cluster (LHR/CDG/FRA) remains visually crowded despite label offsets
    — the three green dots and three code labels are still tightly packed in the top-center.
    Increasing the offset distances or using a leader-line approach would help
  - No legend or colorbar for the thickness-to-passengers encoding — the subtitle
    explains it in words but a visual scale (thin→thick line swatch) would significantly
    aid interpretation and strengthen data storytelling (DE-03)
  - 'DE-01 headroom: the gradient fill is a nice touch but the overall composition
    lacks a clear focal point. Highlighting the two or three busiest routes (e.g.
    LHR-JFK and LHR-DXB) with a slightly warmer/brighter color or a bolder stroke
    would elevate the design from ''correct'' to ''publication-ready'''
