review:
  strengths:
  - Correct Imprint palette with brand green (#009E73) as first series (Routes < 2M),
    semantic ordering through palette positions 1-3 for route volume tiers
  - Variable line widths (3/5/8px) elegantly encode passenger volume — thin light
    routes give way to thick prominent high-volume connections
  - 'Ocean-blue plot_background (#E8F3F9 light / #0C1822 dark) provides excellent
    geographic context without custom non-palette colors for data'
  - All 14 airports and 28 international routes positioned with accurate real-world
    coordinates; passenger volumes (1100K–4200K) are realistic
  - Bezier curves correctly approximate geodesic arcs, and the Pacific-crossing flip
    logic handles routes crossing the antimeridian
  - 'Both renders fully theme-adaptive: INK airport markers flip from black dots to
    white dots, all text flips correctly, no dark-on-dark failures'
  - HTML interactive output (plot-{THEME}.html) leverages pygal's signature feature
    alongside PNG output
  weaknesses:
  - Helper function build_bezier_curves() deviates from KISS 'no functions/classes'
    convention — the three add() calls could inline the curve generation loop to keep
    the flat Imports→Data→Plot→Save structure
  - Route density in the Europe/Middle East cluster (LHR, CDG, FRA, DXB all interconnected)
    creates some visual overlap in the central plot area; slightly higher per-tier
    opacity differentiation or z-ordering could improve readability in that region
  - Coastline geometry is a manually approximated polyline set — country borders are
    absent, limiting geographic context to rough continent outlines rather than recognizable
    landmasses
