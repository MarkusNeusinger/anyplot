review:
  strengths:
  - 'Excellent real-world data: 14 real airports with accurate IATA codes and coordinates,
    realistic passenger volumes (1,100K-4,200K/year)'
  - 'Strong multivariate encoding: both color AND line width encode volume categories,
    improving readability for CVD users'
  - 'Correct theme adaptation: ocean background, chrome colors, and airport markers
    all switch correctly between light and dark themes'
  - Creative use of pygal.XY for geographic visualization — the best feasible approach
    given pygal's lack of native map support
  - Interactive HTML output correctly generated with per-route tooltips showing origin-destination
    and passenger volume
  weaknesses:
  - 'First series added (Coastlines) occupies color position 0 (INK_MUTED), displacing
    #009E73 from the first slot — fix by reordering the colors tuple so Routes < 2M
    is color-0 and Coastlines is color-4, and moving coastlines to the last chart.add()
    call with lower opacity (~0.25) so it reads as background'
  - Bezier curve calculation block is copy-pasted three times for low/medium/high
    routes — consolidate into a single loop over a list of (routes, label, stroke_style)
    tuples
  - Pacific-crossing routes (LAX-HND, LAX-SYD, SYD-SIN) produce flat planar curves
    that don't approximate the polar great-circle path — for abs(dest_lon - origin_lon)
    > 150deg, flip the perpendicular offset direction to arc northward over the pole
  - Coastlines are visually crude (short polyline segments) — more segment points
    or smoother sampling would improve geographic fidelity
