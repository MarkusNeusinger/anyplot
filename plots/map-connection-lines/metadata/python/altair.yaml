  weaknesses:
  - Aesthetic sophistication (DE-01) is functional but not yet strong — the dual encoding
    is effective but the map feels visually flat; airport markers are uniform regardless
    of hub connectivity degree
  - Storytelling (DE-03) is implicit — the hub structure (LHR, DXB as major nodes)
    emerges but the viewer must discover it; consider directly labeling 2-3 key hubs
    on the map
  - StrokeWidth range (0.4–1.2) is too narrow — the difference between thin low-volume
    and thick high-volume routes is barely perceptible at canvas scale; a range of
    0.3–2.5 would make volume differences visually impactful
  - Legend uses point symbols (Altair default for continuous color scale on mark_line)
    rather than line symbols — visually inconsistent with the actual data representation
    as connection lines
