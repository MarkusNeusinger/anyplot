  strengths:
  - Mathematically correct SLERP great-circle arc computation — routes follow true
    geodesic paths
  - Dual encoding (color + strokeWidth) for passenger volume reinforces the key variable
    through redundant visual channels
  - Hub connectivity encoded in marker size via runtime Counter computation — adds
    a third data dimension without extra data
  - 'Complete theme adaptation: map land fill, border stroke, hub label ink, legend
    box, and title all correctly switch between #FAF8F1 and #1A1A17 themes'
  - 'Full use of Altair geographic capabilities: topo_feature, projection, geo encodings,
    detail/order arc path mechanism, and four-layer alt.layer() composition'
  weaknesses:
  - Hub labels (LHR, NRT, DXB) at fontSize=9 are borderline at desktop and effectively
    invisible at mobile viewport widths (~400px); increasing to fontSize=11-12 would
    improve mobile readability without cluttering the map
