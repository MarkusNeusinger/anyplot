  strengths:
  - 'Perfect spec compliance: curved Bezier arc connection lines, variable-width encoding
    of cargo volume, port markers at endpoints, simplified base map with geographic
    context, and transparency for overlapping routes — all spec requirements met.'
  - 'Excellent data quality: real-world maritime shipping routes between actual major
    ports (Shanghai, Rotterdam, Busan, Singapore, etc.) with realistic cargo volumes
    (3.5M–13.2M TEUs), neutral business context.'
  - 'Excellent code quality: clean linear KISS structure, reproducible seed set, all
    imports used, clean Bezier/antimeridian split logic is appropriately complex without
    over-engineering.'
  - 'Full visual quality: all font sizes explicitly set (title=12pt, axis=10pt, ticks=8pt,
    city labels=8pt bold, legend=8pt), both themes pass readability checks with zero
    dark-on-dark failures, correct anyplot palette usage (#009E73 routes, #4467A3
    ports), canvas gate passed.'
  - 'Theme-adaptive land polygons: LAND_COLOR and LAND_EDGE flip correctly between
    #D8D3C4 (light) and #2D2D26 (dark), giving the map a coherent warm feel in both
    renders.'
  weaknesses:
  - 'Library mastery is limited: seaborn contributes only sns.scatterplot() for port
    markers and sns.set_theme() for chrome; the entire connection-line visualization
    is standard matplotlib — this reflects the chart type''s limits but still scores
    low on LM-02.'
  - 'Design excellence moderate: the hand-crafted continent polygons are highly simplified
    (Africa is roughly pentagonal, Scandinavia is absent, island nations omitted)
    — they provide geographic context but look noticeably rough at 3200×1800 px; consider
    using a higher-fidelity simplified outline or adding a brief note that this is
    a schematic base map.'
  - 'No clear visual focal point or storytelling emphasis: the varying line widths
    convey cargo scale but there is no annotation or highlighted route pointing the
    viewer to the key insight (e.g., ''Shanghai → Los Angeles is the world''s busiest
    lane at 13.2M TEU''); a single strategic callout annotation would lift DE-03 significantly.'
  - Grid lines span both axes (both x and y grid visible); style guide prefers y-axis
    only or a very subtle both-axis grid — the current both-axis grid at alpha=0.12
    competes slightly with the geographic data.
