review:
  strengths:
  - Antimeridian handling correctly splits arcs that cross the ±180° boundary, preventing
    visual artifacts on Pacific routes
  - Variable-width Bézier arcs elegantly encode cargo volume with a normalized 1.2–6.2
    pt range
  - Storytelling annotation with styled callout box pointing to the busiest shipping
    lane
  - 'Full theme adaptation: continent colors, annotation box fill, text colors, and
    grid all flip correctly between light and dark'
  - Axis labels include degree units appropriate for geographic coordinates
  weaknesses:
  - Annotation fontsize 7.5pt is marginally small; at mobile-scaled sizes the text
    may be hard to read — consider bumping to 8–8.5pt
  - East Asia label cluster (Busan/Shanghai/Dubai/Singapore within ~30° longitude)
    creates slight crowding when multiple thick routes converge in that region
  - LM-02 inherently limited for geographic maps in seaborn — plot-type constraint,
    not a code quality issue
