  strengths:
  - Excellent dual encoding of passenger volume via imprint_seq color gradient AND
    line width — the most effective technique for this chart type
  - 'Sophisticated theme-adaptive geographic color scheme: custom land, ocean, coastline,
    and country border colors for both light and dark, resulting in a cohesive aesthetic
    in both renders'
  - Idiomatic plotly geo trace usage with go.Scattergeo producing proper great-circle
    geodesic arcs as the spec requires
  - Interactive hover tooltips with rich city-name and formatted passenger-volume
    text
  - Ochre airport markers (#BD8233) create clear visual contrast against the green-blue
    route palette, reinforcing hub identification
  weaknesses:
  - 'European airport cluster (LHR/CDG/FRA routes) is visually congested: multiple
    routes converge in a small screen area and airport labels are tightly packed;
    consider adjusting label positions or reducing textfont size for European airports'
  - Margins are narrower than recommended (l=20, r=20 vs l=80, r=40 from the style
    guide); while no clipping is visible here, this reduces buffer for different datasets
  - DE-03 storytelling could be strengthened with a callout annotation highlighting
    the busiest route (e.g., JFK→LHR at 4.2M/yr) to create a clear focal point
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) paper background; ocean rendered as soft muted blue-grey, land as light warm grey-beige — both custom theme-adaptive geographic colors
