      Data: 15 flight routes as geodesic arcs with imprint_seq gradient from brand green (#009E73, low volume) to blue (#4467A3, high volume); line widths scale 2–9px by passenger count; opacity 0.45–0.80. Airport markers are ochre (#BD8233) filled circles with dark ink borders, size 12.
