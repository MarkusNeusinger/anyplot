      Data: Route arc colors are identical to light render (imprint_seq green→blue) confirming palette consistency across themes. Ochre airport markers unchanged. Opacity and width encoding unchanged.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark issues; brand green routes remain visible and distinctive
