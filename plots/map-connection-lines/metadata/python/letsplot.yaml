review:
  strengths:
  - Correct imprint_seq gradient (low=#009E73, high=#4467A3) applied to connection
    lines — palette compliant
  - 'Theme-adaptive chrome fully implemented: PAGE_BG, INK, INK_SOFT, ELEVATED_BG
    all correctly branched'
  - Both PNG and HTML outputs generated for light and dark themes
  - geom_curve with curvature=-0.3 and alpha=0.5 produces clean, readable arc connections
  - Airport markers use shape=21 (filled circle with border) — green fill with theme-matching
    border is visually distinct
  - 'KISS code structure: no functions/classes, deterministic seed, all imports used'
  - ggsize(800,450) + scale=4 produces exactly 3200×1800 px — canvas rule followed
  weaknesses:
  - London and Paris city labels overlap — both cities share nearly the same longitude
    (~0-2°) and nudge_y=5 gives only ~2.5° of vertical separation between them; use
    different nudge directions (nudge_x left for Paris, nudge_x right for London)
    or increase nudge_y selectively
  - Two separate legends with the same title 'Passengers (millions)' appear on the
    right side — one for color gradient, one for line thickness; this is visually
    redundant and cluttered; use guides(color=guide_colorbar(...), size=guide_legend(...))
    to give them distinct names or consolidate
  - World polygon map is extremely simplified and distorted — continents are barely
    recognizable shapes (Europe/Africa merged, North America is an amorphous blob);
    consider using a better set of polygon coordinates or switching to a proper map
    background
  - DE-03 storytelling is weak — the routes are displayed but there is no visual emphasis
    on the highest-volume route (JFK-LHR at 4.2M); consider adding a text annotation
    or visual callout to the busiest route to guide the viewer
  - DE-01 design sophistication is mid-level — the crude map background detracts from
    an otherwise well-styled plot; improving map quality would significantly raise
    visual polish
