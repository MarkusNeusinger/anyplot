review:
  strengths:
  - Dual-encoding (line width + alpha) for volume creates clear visual hierarchy
  - Manual legend with actual line samples at three widths is more informative than
    color swatches
  - Correctly uses toolbar_location=None + min_border_* per bokeh library guide —
    no canvas drift
  - CDP setDeviceMetricsOverride ensures exact 3200×1800 viewport
  - Full theme-adaptive chrome in both light and dark renders
  - Interactive HTML artifact with route/passenger tooltips
  weaknesses:
  - Airport labels for LHR, AMS, CDG, FRA overlap each other — apply per-airport x_offset/y_offset
    corrections to push labels into open space
  - Thinnest routes (0.9–1.2M pax, alpha≈0.4, width≈4) are visually faint — raise
    minimum alpha to 0.5 or minimum width to 5
