  - Palette position 3 (#4467A3 blue) used for airport markers, skipping position
    2 (#C475FD lavender) — while geographically intuitive, canonical order prefers
    sequential assignment; if semantic exception is claimed for blue as navigation,
    document it
  - DE-01 aesthetic polish is functional but not distinctive — could benefit from
    subtle radial glow on arcs or a gradient line color fading from origin to destination
  - LM-02 underutilizes Bokeh-specific features — linked selections or a color-mapped
    scatter for passenger intensity would showcase library strengths more
