review:
  strengths:
  - Correct great-circle arc computation using the Slerp formula with 50 intermediate
    points per route
  - Dual encoding of passenger volume (color gradient + line width) is both spec-compliant
    and visually effective
  - Theme-adaptive land fill colors (LAND_FILL/LAND_BORDER tokens) correctly flip
    between light and dark themes
  - Dynamic title font-size scaling (max(8, round(12 * 67 / n))) prevents overflow
    for the long mandated title
  - 'Perfect palette compliance: imprint_seq gradient stops (#009E73 to #4467A3),
    correct background tokens, all chrome adaptive'
  - '15/15 on data quality: real IATA airport codes, realistic passenger volumes,
    comprehensive 6-continent coverage'
  weaknesses:
  - Continent polygon outlines are very coarse hand-crafted approximations (simple
    convex polygons) — minimal geographic context and reduced map polish; use a proper
    world geometry dataset if feasible within plotnine-only constraints
  - Flight arcs at the low end of the size range (0.5) may be hard to distinguish
    from grid lines at smaller viewing sizes; minimum line size should be raised to
    0.8
  - 'LM-02 limited: geographic computation is entirely in numpy/pandas; no plotnine-specific
    statistical transforms or distinctive features beyond standard geom layering'
