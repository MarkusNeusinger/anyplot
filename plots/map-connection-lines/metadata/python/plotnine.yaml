review:
  strengths:
  - Mathematically correct great-circle arc computation (SLERP) — geodesic paths are
    genuine, not just straight lines
  - Full theme adaptation including land fill/border colors adapting to light/dark
    — thoughtful geographic theming
  - 'Correct imprint_seq continuous colormap (#009E73 → #4467A3) with appropriate
    palette token usage'
  - 'Perfect spec compliance: all required features present (arcs, markers, basemap,
    transparency, color encoding)'
  - Realistic real-world data with accurate airport coordinates and plausible passenger
    volumes
  - Clean idiomatic plotnine usage with geom_path group aesthetic for arc paths
  weaknesses:
  - Arc lines (size=0.85) are slightly thin for 3200×1800 canvas — increase to 1.2–1.4
    for better mobile-scale visibility
  - 'Single-channel volume encoding (color only): encode arc thickness by volume alongside
    color using scale_size_continuous for stronger visual hierarchy and data storytelling'
  - Enclosed panel_border (all 4 spines) gives a boxed rigidity — use panel_border=element_blank()
    for a cleaner frameless map look
