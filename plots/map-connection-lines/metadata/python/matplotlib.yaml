review:
  strengths:
  - Correct great-circle arc computation using spherical trigonometry — geodesic routes
    visually match real transatlantic/transpacific curvature
  - 'Theme-adaptive geographic chrome: ocean and land colors both flip between light
    (#C8DCE8/#DDD9CF) and dark (#1A2830/#28271F) renders, maintaining legibility on
    both surfaces'
  - Variable line thickness AND alpha jointly encode passenger volume — creates intuitive
    visual hierarchy where busiest routes (NYC-London) dominate
  - Date-line crossing detection and line splitting handles Pacific routes correctly
    without visual artifacts
  - 'Perfect spec compliance: curved great-circle arcs, endpoint markers with edge
    highlight, base map context, transparency, and volume encoding all present'
  - Real-world airport coordinates with plausible route volumes in the correct order
    of magnitude (1.5–4.2M pax/year for major international routes)
  - Clean code with no external geospatial dependencies — great-circle math implemented
    entirely with numpy
  weaknesses:
  - Middle-East/Asia cluster (Dubai 25°N/55°E, Hong Kong 22°N/114°E, Singapore 1°N/104°E)
    produces a visually busy node where routes converge tightly — slightly harder
    to read individual route connections at mobile scale
  - Airport annotation labels (8pt bold) may be marginally small for mobile viewports
    (~400px) especially in the dense Europe cluster where labels are close together
  - Continent polygons are simplified axis-aligned rectangles rather than true coastlines
    — gives a blocky appearance compared to actual geographic shapes, limiting the
    geographic aesthetic quality
