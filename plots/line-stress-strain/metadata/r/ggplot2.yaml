review:
  strengths:
  - 'Excellent physics accuracy: Luders plateau for steel, smooth nonlinear response
    for aluminum — both curves are textbook-quality'
  - All seven spec-required features implemented (regions, critical points, 0.2% offset
    method, Young's modulus, multi-material overlay)
  - 'Imprint palette applied correctly with #009E73 as first series'
  - Open-circle critical point markers (fill=PAGE_BG) are an elegant ggplot2 detail
    that adapts to both themes
  - Inside legend placement is clean and space-efficient
  weaknesses:
  - Young's modulus slope segment (0,0)->(0.001,200) spans only 0.27% of the x-axis
    width and appears as a near-vertical dash at the y-axis — conveys no meaningful
    slope information; should be drawn 5-10x longer (e.g., to strain~0.005-0.01) with
    a label explaining the slope represents E
  - 'Annotation crowding in upper-left: YS=250 MPa (green) and 0.2% YS=276 MPa (lavender)
    are only ~12 MPa apart vertically and both left-aligned near x~0.005-0.010 — increase
    vertical separation or use offset arrows/leaders to prevent visual collision'
  - 0.2% offset line annotation label at size=2.8 is the smallest text element and
    may be illegible at mobile scale — increase to size=3.2 minimum
  - library(dplyr) is imported but never used — remove
