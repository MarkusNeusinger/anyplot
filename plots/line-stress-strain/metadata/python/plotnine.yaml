      Data: The three region bands produce notably heavier fills on dark — the elastic zone becomes a dark olive-blue tint, strain hardening becomes a dark olive-tan, and necking becomes a dark brownish-red. These fills are more saturated than in the light render. The green curve (#009E73) remains clearly visible as it contrasts well against all three dark band fills. The three matte-red markers remain identifiable. The "Yield Point (0.2% offset)" label appears in light cream (INK token), readable. "0.2% offset" italic red text at the bottom-left is marginally legible against the dark olive background — the matte red (#AE3030) has adequate but not generous contrast on #1A1A17. Data colors (green curve, red markers, colored bands) are identical to the light render — only chrome flips.
      Legibility verdict: PASS (marginal) — all primary text is readable; "0.2% offset" italic annotation is the weakest legibility element on dark due to small size and matte red on dark background.
