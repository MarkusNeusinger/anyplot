review:
  strengths:
  - Physically accurate dual-material stress-strain dataset with correct ASTM A36
    and 6061-T6 aluminum parameters (E, yield, UTS)
  - 'Excellent data quality: covers elastic, Luders plateau, strain hardening, and
    necking regions for both materials'
  - 'Perfect code quality: KISS structure, reproducible (seed=42), clean imports,
    saves PNG + HTML correctly'
  - 'Correct use of Imprint palette in canonical order -- first series is #009E73,
    theme-adaptive chrome in both renders'
  - 'Both renders are fully readable: no dark-on-dark in dark theme, no light-on-light
    in light theme'
  - Idiomatic pygal.XY usage with per-point tooltip label dicts and stroke_style for
    dashed offset line
  weaknesses:
  - 'Missing visible region labels on the PNG: the spec requires labeling key curve
    regions (elastic, plastic/strain hardening, necking) directly on the chart --
    these are absent in the static render (tooltip-only labels do not appear in the
    PNG)'
  - 'Missing visible critical-point markers in PNG: yield point, UTS, and fracture
    point are only accessible via pygal hover tooltips (HTML) -- the spec requires
    them to be marked in the static output'
  - 'Missing elastic modulus slope annotation: the spec explicitly requires annotating
    Young''s modulus as a slope line or text annotation in the elastic region -- this
    is entirely absent'
  - The 0.2% offset line is too thin (stroke width=2 vs data series width=3.5) and
    barely distinguishable, especially in the dark render -- increase to width=4 and
    consider a more distinct dasharray
  - Design is a well-configured library default with no visual refinement beyond the
    style object -- all spines present, no emphasis elements, chart reads as functional
    rather than polished
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) -- correct, not pure white
      Chrome: Title "line-stress-strain · python · pygal · anyplot.ai" in dark ink spans ~65% of width, clearly readable. Y-axis label "Engineering Stress (MPa)" rotated vertically, readable. X-axis label "Engineering Strain (dimensionless)" clearly readable. Tick labels (0, 0.02, 0.04...0.26 on X; 0, 100, 200...400 on Y) all readable in dark ink.
      Data: Green (#009E73) curve for ASTM A36 Mild Steel shows clear Luders plateau and strain hardening to UTS ~450 MPa at strain ~0.21, then necking to fracture at ~0.27. Lavender (#C475FD) curve for 6061-T6 Aluminum shows smooth hardening to UTS ~310 MPa at ~0.095 strain then necking to fracture at ~0.12. Thin dashed blue (#4467A3) offset line visible but thin near x=0.002-0.007. No visible point markers or region labels in the PNG -- these are tooltip-only.
      Legibility verdict: PASS -- all chrome readable on light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) -- correct, not pure black
      Chrome: Title, axis labels, and tick labels all render in light-colored text (#F0EFE8 range), clearly readable against dark background. No dark-on-dark failures observed. Legend at bottom shows light text for all three series labels.
      Data: Data colors IDENTICAL to light render -- green (#009E73) steel curve, lavender (#C475FD) aluminum curve, thin dashed blue (#4467A3) offset line. Curves are clearly distinguishable against the dark background. No tooltip/annotation markers visible in static PNG.
      Legibility verdict: PASS -- all chrome readable on dark background, no dark-on-dark failures
