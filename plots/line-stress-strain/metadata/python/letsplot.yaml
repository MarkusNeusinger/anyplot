review:
  strengths:
  - 'Perfect spec compliance: all four deformation regions labeled, all three critical
    points (yield, UTS, fracture) marked with semantic Imprint palette colors, 0.2%
    offset line drawn, Young''s modulus annotated'
  - 'Excellent data quality: realistic mild steel mechanical properties (E=210 GPa,
    yield=250 MPa, UTS=400 MPa, elongation=35%) with physically accurate stress-strain
    curve shape including yield plateau'
  - 'Strong data storytelling: color-coded background regions with italic labels,
    connector lines from markers to annotations, and semantic color choices (red for
    UTS/failure, ochre for fracture) guide viewer through the engineering narrative'
  - 'Clean code structure: KISS pattern, np.random.seed(42) for reproducibility, all
    imports used, appropriate complexity for the multi-layered visualization'
  - 'Correct use of letsplot-distinctive features: layer_tooltips() for interactive
    hover info on both curve and key points, HTML export alongside PNG'
  - 'Theme-adaptive chrome correct in both renders: backgrounds, text, grid all adapt
    properly; data colors (Imprint palette) stay identical across light and dark themes'
  - 'Full Imprint palette compliance: main curve #009E73, offset line #C475FD, yield
    #4467A3, fracture #BD8233, UTS #AE3030 — all semantic assignments from the palette'
  weaknesses:
  - 'Elastic region annotation crowding: the elastic zone spans only ~4% of the x-axis
    width (0 to 0.015 strain), but contains 4+ text annotations (''Elastic'' label
    at y=350, ''E = 210 GPa'' at y=130, ''0.2% offset'' at y=60, ''Yield Point\n(250
    MPa)'' at x≈0.015), the yield point marker, and the dashed offset line — all compressed
    together causing near-overlap and readability issues. Fix: increase elastic region
    label fontsizes are small enough to not overlap, or reposition the ''Yield Point''
    annotation further right (x≈0.025) and the ''E = GPa'' label higher (y≈180), or
    spread annotations more carefully.'
  - 'Region fills visually too heavy: the strain hardening background (large blue
    rectangle covering 60%+ of plot area) and necking background (pink/rose) dominate
    the visual hierarchy, competing with the main data curve. Fix: reduce region fill
    alpha to 0.15–0.25 (from the current opaque fill) so the curve and annotations
    read more clearly against the subtler background.'
  - 'Four-sided box frame from region rectangles: geom_rect with ymax=460 (above the
    y-axis max of 450) creates visible borders at all four sides of the plot area,
    including top and right — contradicting the preferred L-shaped or minimal spine
    look. Fix: set region ymax to match the y-axis limit (e.g., 455), and consider
    adding alpha to region fills to soften the framing effect.'
  - 'VQ-02 elastic zone crowding: ''Elastic'' italic text at (x=0.008, y=350) appears
    to nearly overlap the elastic/strain-hardening boundary vertical edge, and ''Yield
    Point\n(250 MPa)'' at (x=0.015+0.012, y=265) is very close to the transition and
    the main curve — in narrow regions the text density causes partial overlap.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface. Three color-coded background regions visible: light mint-green for elastic zone (very narrow, 0–0.015 strain), light blue for strain hardening zone (dominant, 0.015–0.22), light pink/rose for necking zone (0.22–0.35).
      Chrome: Title "line-stress-strain · python · letsplot · anyplot.ai" in dark ink at top — clearly readable. Y-axis label "Engineering Stress (MPa)" and X-axis label "Engineering Strain" both in dark ink — readable. Tick labels in dark secondary ink — readable. Y-axis-only grid, very subtle.
      Data: Main stress-strain curve in brand green (#009E73). Yield point marker in blue (#4467A3). UTS marker in matte red (#AE3030). Fracture marker in ochre (#BD8233). Lavender dashed 0.2% offset line in narrow elastic zone. Annotations for all key points and regions. All elements visible.
      Notable issue: The elastic region (0–0.015 strain) is very narrow relative to the full x-axis, causing significant crowding: the lavender offset line, the "Elastic" italic label, "E = 210 GPa", "0.2% offset" annotations, yield point marker, and "Yield Point (250 MPa)" annotation are all compressed into ~4% of the x-axis width. "Elastic" label and yield-point text appear to overlap in this zone.
      Legibility verdict: PASS overall, but CROWDED in elastic region.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct surface. Region fills adapt to dark theme: dark forest-green (elastic), dark navy (strain hardening), dark maroon (necking).
      Chrome: Title in light cream — readable. Axis labels in light ink — readable. Tick labels in light secondary ink — readable. Grid lines subtle. All chrome correctly adapts to dark surface. No dark-on-dark failures observed.
      Data: Main curve remains brand green (#009E73) — identical to light render. Key point markers retain their colors (blue/red/ochre) — identical to light render. Imprint data colors are unchanged between themes as required.
      Legibility verdict: PASS — all text readable against dark background. Theme adaptation correct.
