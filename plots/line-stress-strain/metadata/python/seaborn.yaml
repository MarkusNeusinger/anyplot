review:
  strengths:
  - Seaborn's statistical aggregation (errorbar='sd', err_style='band') used idiomatically
    to show specimen-to-specimen material variability — the library's defining feature
    deployed perfectly
  - 'Perfect spec compliance: all required features (elastic modulus slope annotation,
    0.2% offset line, yield point, UTS, fracture markers, region labels) present and
    accurate'
  - Factually accurate 6061-T6 aluminum properties with physically realistic noise
    model (increasing variability through elastic→hardening→necking)
  - Semantic Imprint palette assignment (green=elastic stability, blue=hardening transition,
    matte red=failure/necking) with justified semantic exceptions
  - Full theme adaptation across both renders — no dark-on-dark failures; chrome tokens
    correctly applied to annotations, tick params, and legend
  weaknesses:
  - Region shading at alpha=0.05 is so subtle it barely registers visually — alpha=0.07-0.08
    would improve spatial zone delineation without adding visual noise
  - The narrow elastic zone (x=0-0.004, ~2.7% of x-range) creates visual density with
    the elastic curve, dashed offset line, 'Elastic' label, and E=69 GPa annotation
    arrow all packed into a tight horizontal strip
  - DE-01 ceiling at 6/8 — four arrow annotations + three inline italic region labels
    creates some visual complexity/busyness in the elastic zone
