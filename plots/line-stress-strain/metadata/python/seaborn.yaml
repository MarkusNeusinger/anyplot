review:
  strengths:
  - Physically accurate 6061-T6 Aluminum simulation with real material constants (E=69
    GPa, yield=276 MPa, UTS=310 MPa)
  - 'Semantic Imprint palette usage: green=elastic stability, blue=hardening, red=failure/necking
    — immediately intuitive for material scientists'
  - 'All four spec requirements implemented correctly: region labels, critical point
    annotations, elastic modulus slope, and 0.2% offset line'
  - Theme adaptation is flawless — INK token used for fracture marker correctly flips
    between themes; all text readable in both light and dark renders with no dark-on-dark
    failures
  - Region shading (alpha=0.05) adds depth without distracting from data; clean despined
    layout with y-axis-only grid
  weaknesses:
  - 'Annotation cluster near the elastic region (x≈0–0.006): ''Yield Point (0.2% offset)'',
    ''E = 69 GPa'', and ''Elastic'' inline labels converge in a narrow horizontal
    band — spread vertically or reposition the ''Elastic'' label higher to reduce
    density'
  - Elastic region occupies only ~3% of x-axis width, making the steep slope visually
    compressed relative to its engineering importance — consider a matplotlib inset
    axes to zoom into the elastic region (strain 0–0.006)
  - LM-02 score limited by matplotlib-heavy implementation; seaborn FacetGrid or more
    central lineplot grouping idioms would better showcase seaborn-distinctive features
