review:
  strengths:
  - Correct title format matching spec-id · python · letsplot · anyplot.ai
  - Both treemap and sunburst views implemented with accurate proportional layout
    (area and angle match data values)
  - Okabe-Ito positions 1-4 used for the four top-level departments in canonical order,
    with semantically meaningful lighter tints for children to reinforce parent-child
    hierarchy
  - Correct warm-off-white (#FAF8F1) and near-black (#1A1A17) backgrounds; full theme-adaptive
    chrome (INK/INK_SOFT tokens propagated to title, subtitle, department labels)
  - HTML file includes a real toggle button with active state, correct Canvas rendering
    of both treemap and sunburst, and department legend with percentage labels
  - gggrid side-by-side layout is idiomatic lets-plot; semi-transparent parent overlays
    over opaque children give clear visual hierarchy within each department column
  weaknesses:
  - Department header labels for 'Marketing' and 'Operations' overlap visibly in the
    treemap header row — both renders show 'MarketO' + 'peration' because the columns
    are narrow and the label positions are fixed at column centres without collision
    detection or text truncation
  - HTML toggle provides instant view switching but no animated transition — spec
    explicitly says 'smooth animated transitions between layouts enhance user experience'
  - 'Child ring labels in the sunburst use hardcoded color=''white'' in the PNG layer
    but INK token in the outer ring; near-white text on the lighter child tints (#B3E6D0
    DevOps, #E8C0D3 Logistics) has reduced contrast on the dark render'
  - 'Child colors are custom tints (#4DC4A0, #80D5B8, etc.) rather than Okabe-Ito
    positions — the style guide says avoid custom hexes when the palette covers the
    need; for a hierarchical chart using lightness variations of parent hues is defensible
    but deviates from the strict rule'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "hierarchy-toggle-view · python · letsplot · anyplot.ai" and subtitle "Company Budget Allocation · Toggle between views in the HTML version" are rendered in dark INK (#1A1A17), clearly readable. Sub-titles "Treemap View" and "Sunburst View" are bold dark text, readable.
      Treemap (left panel): Four department columns — Engineering (green #009E73), Sales (orange-red #D55E00), Marketing (blue #0072B2), Operations (pink #CC79A7). Department header labels at y=95 use dark INK. Child cells are opaque tint colors with white bold labels and percentage annotations. ISSUE: "Marketing" and "Operations" header labels at the top of the treemap overlap due to narrow column widths — renders as "MarketO" / "peration" in both images.
      Sunburst (right panel): Inner ring shows four departments in Okabe-Ito colors with white department name labels. Outer ring shows children in lighter tints with dark INK labels for segments large enough to label. Circular layout is correct with proportional arc angles.
      Legibility verdict: PASS overall. One legibility failure: "Marketing"/"Operations" treemap header overlap reduces readability of those two labels.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and subtitle use INK (#F0EFE8) — near-white, clearly readable against dark background. "Treemap View" and "Sunburst View" subtitles use INK, readable.
      Treemap: Department columns render with semi-transparent (alpha=0.35) fills over dark background, giving darkened but distinctly colored regions. Department labels use INK (#F0EFE8) — light cream, readable against the dark-ish dept backgrounds. Child cells are nearly-opaque (alpha=0.92) tint fills with hardcoded white label text — readable. Same header overlap issue present.
      Sunburst: Inner ring department labels use hardcoded "white" — readable against saturated Okabe-Ito fills. Outer ring child labels use INK (#F0EFE8), which is near-white on the lighter child tints. On segments like DevOps (#B3E6D0, light teal) and Logistics (#E8C0D3, light pink), white-on-light has reduced contrast but remains legible at this resolution.
      Data colors are identical between light and dark renders — only chrome (background, text) flips. No dark-on-dark failures found.
      Legibility verdict: PASS. Minor concern: outer sunburst ring labels on lightest child segments have reduced contrast in dark mode.
