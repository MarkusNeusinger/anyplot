review:
  strengths:
  - Creative dual-view implementation showing treemap and sunburst side-by-side, requiring
    manual computation of rectangle and wedge geometry entirely within plotnine's
    grammar
  - Consistent color mapping between both views aids cross-view comparison; center
    'Total $1370K' annotation creates a clear focal point on the sunburst
  - Realistic and neutral research budget domain with plausible value distribution;
    all 15 hierarchy nodes correctly represented
  weaknesses:
  - 'No theme-adaptive logic: Code does not read ANYPLOT_THEME env var. Hardcoded
    dark text colors (#333333, #555555, #666666) produce dark-on-dark text failures
    in the dark render. Must add PAGE_BG, INK, INK_SOFT tokens and apply to all annotate()
    color arguments.'
  - 'Wrong output filename: plot.save(''plot.png'') should be plot.save(f''plot-{THEME}.png'',
    dpi=300). Without this the pipeline cannot produce themed artifacts.'
  - 'Non-Okabe-Ito palette: Colors (#306998, #FFD43B, #2E8B57, #E07B39) violate the
    mandatory Okabe-Ito rule. Use #009E73, #D55E00, #0072B2, #CC79A7 for the four
    groups.'
  - 'Wrong title: Code has ''hierarchy-toggle-view · plotnine · pyplots.ai'' — must
    be ''hierarchy-toggle-view · python · plotnine · anyplot.ai''.'
  - 'Sunburst outer-ring label crowding: Smaller segments (Inorganic $80K, Analytic
    $70K) have overlapping labels. Raise child_sweep threshold from 0.2 to 0.3.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "hierarchy-toggle-view · python · plotnine · anyplot.ai" in blue (#306998) readable; subtitle "Research Department Budget Allocation" in dark gray readable on light bg; "Treemap View"/"Sunburst View" section headers readable
      Data: Treemap with 4 color groups (bio=#306998 blue, chem=#FFD43B yellow, phys=#2E8B57 sea-green, comp=#E07B39 orange); sunburst with 2 concentric rings; center "Total/$1370K" annotation; white segment borders for definition; first series is NOT #009E73 (Okabe-Ito violation)
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Dark near-black (#1A1A17) — correct dark theme surface
      Chrome: Section headers "Treemap View"/"Sunburst View" use hardcoded color="#333333" (very dark gray) — DARK-ON-DARK failure on near-black background. Subtitle uses "#666666" — marginal contrast. Center "$1370K" uses "#555555" — near-invisible. Title in #306998 blue is readable. Code has no ANYPLOT_THEME logic.
      Data: Colors are identical to light render (Okabe-Ito independence maintained — data colors don't flip, only chrome should)
      Legibility verdict: FAIL — section headers and subtitle are dark-on-dark due to hardcoded color values without theme adaptation
