review:
  strengths:
  - Dual treemap+sunburst side-by-side is a creative, appropriate static alternative
    to the interactive toggle spec — clearly communicates both chart types
  - 'Geometry computation is accurate: treemap columns proportional by budget, sunburst
    inner/outer ring angles proportional to values'
  - White center circle with 'Total $1370K' anchor is a polished focal point that
    adds context
  - Research department budget data is neutral, realistic, and well-structured with
    good size variation across departments
  - Idiomatic plotnine ggplot grammar used throughout — scale_fill_identity(), theme_void(),
    layered geoms
  weaknesses:
  - 'No theme adaptation: code never reads os.getenv(''ANYPLOT_THEME''). All structural
    text colors (#333333, #666666, #555555) are dark and unreadable on dark background
    — must use INK/INK_SOFT tokens and set PAGE_BG via theme(plot_background=element_rect(...))'
  - 'Wrong color palette: uses Python-branded hex values (#306998, #FFD43B, #2E8B57,
    #E07B39) instead of Okabe-Ito. Must use #009E73 (bio), #D55E00 (chem), #0072B2
    (phys), #CC79A7 (comp)'
  - 'Wrong output filename: plot.save(''plot.png'') must be plot.save(f''plot-{THEME}.png'',
    dpi=300)'
  - 'Wrong title at line 267: ''hierarchy-toggle-view · plotnine · pyplots.ai'' must
    be ''hierarchy-toggle-view · python · plotnine · anyplot.ai'''
  - Sunburst outer ring label crowding in bottom segment area (Organic/Inorganic/Analytic/Quantum)
    — labels are tight and close to overlapping
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme surface
      Chrome: Main title in blue (#306998) readable. Section headers 'Treemap View' and 'Sunburst View' in dark gray (#333333) — readable on light background. Subtitle 'Research Department Budget Allocation' in #666666 — readable. All structural text is clearly visible.
      Data: Left panel = treemap with 4 columns (Biology teal, Chemistry orange/yellow, Physics blue, Computing pink/purple), white borders between cells, each labeled with name + dollar budget. Right panel = sunburst with inner ring (4 departments) and outer ring (sub-departments), white center circle showing 'Total $1370K'. Data colors: bio=#306998, chem=#FFD43B, phys=#2E8B57, comp=#E07B39 (NOT Okabe-Ito — first series should be #009E73).
      Legibility verdict: PASS for light render

    Dark render (plot-dark.png):
      Background: Dark near-black (~#1A1A17) — correct theme surface
      Chrome: FAIL — code has NO theme adaptation (no os.getenv('ANYPLOT_THEME')). 'Treemap View' and 'Sunburst View' headers remain hardcoded at color='#333333' — dark gray (#333333) on near-black (#1A1A17) background gives contrast ratio ~1.4:1, essentially unreadable (dark-on-dark failure). Subtitle in #666666 gives ~3.1:1 contrast — below WCAG AA, borderline unreadable. Main title in #306998 (blue) is marginally readable. Data labels inside colored segments (white text on colored cells) are fine.
      Data: Colors are identical to light render — correct (data colors should not flip between themes).
      Legibility verdict: FAIL — dark-on-dark for section headers (#333333 on #1A1A17) and low contrast subtitle (#666666 on #1A1A17); no theme-adaptive tokens used for any chrome elements
