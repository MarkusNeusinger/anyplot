review:
  strengths:
  - 'Correct Okabe-Ito palette with #009E73 as first series (Engineering) and canonical
    ordering (#D55E00, #0072B2, #CC79A7)'
  - Genuinely interactive toggle via Altair binding_select — both treemap and sunburst
    chart types implemented with consistent department colors
  - 'Excellent code quality: clean KISS structure, appropriate complexity for the
    manual binary-split treemap layout, no fake UI elements'
  - Canvas utilization is excellent — treemap fills the full 1600x900 area with well-proportioned
    tiles
  - Realistic neutral TechCorp organizational data with authentic department and team
    naming (Frontend/Backend/DevOps etc.)
  - Variable label font sizes scaled to headcount values via alt.Size — adds intentional
    visual hierarchy to tile labels
  weaknesses:
  - 'Dark mode tile borders invisible: mark_rect(stroke=PAGE_BG) in dark mode sets
    stroke to #1A1A17 — same as background — making adjacent same-department tiles
    (e.g., Backend/Frontend green, HR/Legal pink) visually merge. Fix: use INK_SOFT
    or a neutral rgba stroke color visible in both themes.'
  - 'Design storytelling lacks focal point: treemap displays data correctly but has
    no emphasis on key insight. No visual emphasis on the largest team (Backend 62),
    no annotation or color intensity variation to guide the viewer.'
  - 'DE-01 below publication threshold: clean design but not refined enough. Needs
    stronger visual hierarchy, more intentional spacing, and possible weight variation
    in tile label typography.'
  - 'Sunburst text labels missing: the sunburst view (HTML) has no text labels on
    arcs, only tooltips. Adding mark_text radial labels for at least department ring
    would improve readability in sunburst mode.'
  - No animated transitions between treemap and sunburst views — toggle is an instant
    opacity switch with no animation.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct theme surface, not pure white.
      Chrome: Title "hierarchy-toggle-view · python · altair · anyplot.ai" in 28px dark ink (#1A1A17) — clearly readable. Subtitle in muted dark gray (#4A4A44) — readable. Legend on right with white/cream elevated box, dark department label text, 4 color swatches.
      Data: Treemap with 11 leaf nodes in 4 departments. Engineering (#009E73 green): DevOps, Data Sci, Backend, Frontend, QA. Sales (#D55E00 orange): SMB, Enterprise, Partners. Marketing (#0072B2 blue): Events, Content, Digital. Operations (#CC79A7 pink): Legal, HR, Finance. First series correctly #009E73. White bold labels centered in tiles; font sizes scale with headcount value (14–24px base, readable at 3x export). Tile areas proportional to headcount values.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title in light off-white (#F0EFE8 INK token) — readable against dark background. Subtitle in medium gray (#B8B7B0 INK_SOFT) — readable. Legend box in elevated dark surface (#242420) with light label text — readable. No dark-on-dark text failures for title/subtitle/legend.
      Data: Same department colors as light render — Engineering #009E73, Sales #D55E00, Marketing #0072B2, Operations #CC79A7 — identical to light render (only chrome flipped). White bold tile labels remain readable on colored tile backgrounds. ISSUE: tile stroke set to PAGE_BG (#1A1A17 in dark mode) — borders between same-department adjacent tiles are invisible, causing Backend/Frontend (green) and HR/Legal (pink) pairs to appear visually merged without clear separation.
      Legibility verdict: PASS — all text elements readable; tile border merging is a visibility issue not a legibility failure.
