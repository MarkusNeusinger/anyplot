review:
  strengths:
  - Excellent interactive HTML output with real toggle buttons and animated fade transitions
    between treemap and sunburst views
  - Hierarchical color tinting (parent Okabe-Ito base to lighter tints for children)
    is a thoughtful design choice for multi-level hierarchy
  - PIL-assembled 4800x2700 canvas cleanly integrates both views with proper title
    and explanatory subtitle
  - Theme-adaptive chrome correctly implemented — background, text, and accent colors
    all respond to ANYPLOT_THEME
  - File system storage scenario is a natural, realistic fit for this chart type
  - Title format, legend, and output filenames are all correct
  weaknesses:
  - Sunburst view is a flat donut chart (pygal.Pie with inner_radius) showing only
    leaf nodes — does not show concentric rings for parent-child hierarchy depth;
    repair should composite two Pie renders via PIL to approximate a 2-level sunburst
  - 'Custom tint hex values (#4DBB9D, #99D7C7, #E28B4D, etc.) deviate from Okabe-Ito
    rule; use only positions 1-4 for parent categories and derive child tints programmatically'
  - Treemap panel appears visually smaller than sunburst panel in side-by-side layout
    — equalize panel widths for balance
  - Storytelling is weak — no highlighted insight or callout identifying the dominant
    storage category
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "Disk Storage · hierarchy-toggle-view · python · pygal · anyplot.ai" in brand green (#009E73) via PIL at ~72px — clearly readable. Subtitle in muted ink (#6B6A63) at 40px readable. Pygal chart titles "Treemap View" and "Sunburst View" in dark ink — readable. Legend text at bottom of each chart readable.
      Data: Treemap shows 4 parent categories (Media=teal #009E73, Documents=orange #D55E00, Applications=blue #0072B2, System=purple #CC79A7) subdivided into 12 child rectangles with custom tint hex values. Donut chart (inner_radius=0.35) shows same 12 sub-folders as proportional segments. Value labels (GB) inside cells are small but legible.
      Legibility verdict: PASS — all primary text readable; small value labels in tiny cells (6 GB, 10 GB) are borderline but acceptable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface
      Chrome: Title remains in #009E73 — clearly visible on dark background. Subtitle visible in muted lighter tone. "Treemap View" and "Sunburst View" section titles appear in light-colored text — readable. Legend items at bottom of charts legible. No dark-on-dark failures for primary chrome elements. Minor: sunburst center hole appears very dark (near pure black) rather than #1A1A17 warm near-black.
      Data: Colors identical to light render — Okabe-Ito positions 1-4 and their tints remain consistent across themes. Value labels inside treemap cells are dark on the colored cell backgrounds (not on the dark page), which remains readable since cells themselves are chromatic.
      Legibility verdict: PASS — no critical dark-on-dark failures; value labels in small treemap cells are small but on chromatic (not dark) backgrounds.
