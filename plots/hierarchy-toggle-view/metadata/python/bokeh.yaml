review:
  strengths:
  - Full treemap + sunburst side-by-side static view with working interactive HTML
    toggle using Bokeh Button+CustomJS — a genuinely Bokeh-native interactive pattern
  - Custom squarify algorithm correctly implemented from scratch with proper aspect-ratio
    optimization
  - Hierarchical color scheme coherently derived from Okabe-Ito base colors for departments,
    with tinted variants for sub-departments preserving family relationships
  - 'Both themes correctly adapted: backgrounds, chrome, and text all use proper token
    values; data colors identical between light and dark'
  - Budget hierarchy is an excellent realistic, neutral domain that naturally motivates
    both view types
  weaknesses:
  - 'SC-02 gap: No animated transition between treemap and sunburst — currently just
    a hard visibility swap; a CSS transition or Bokeh animation would better fulfill
    the spec''s UX note'
  - 'CQ-04 duplication: The static figure and HTML figure share almost identical setup
    code (title, background, legend, data sources) duplicated verbatim rather than
    shared; extracting common configuration would reduce ~100 lines of repetition'
  - Legend is dense with 17 items at 14pt — the legend text renders small relative
    to the full canvas; increasing to 16pt or reducing spacing slightly would improve
    legibility at display size
