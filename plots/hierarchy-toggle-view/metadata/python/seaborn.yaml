review:
  strengths:
  - Dual-view layout (treemap + sunburst side-by-side) is a compelling static alternative
    to the interactive toggle spec
  - Alpha-layered parent/child hierarchy (0.35 parent, 0.9 child) creates clear visual
    depth and hierarchy without additional annotation
  - FancyBboxPatch rounded corners and consistent Okabe-Ito color mapping across both
    views elevate aesthetics above defaults
  - Conditional text display in treemap (suppresses labels when cell too small) shows
    thoughtful label management
  - 'Perfect theme compliance: all chrome tokens correctly adaptive, no dark-on-dark
    or pure-white failures'
  weaknesses:
  - Data label font sizes (11-13pt) remain below the 16pt minimum guideline for the
    4800x2700 canvas — treemap child cell labels and bottom category labels need bumping
    to 15-16pt
  - Sunburst outer ring label suppression threshold (c_sweep > 12) is too low — cramped/rotated
    labels appear for narrow segments; threshold should be raised to ~18-20
  - Seaborn is used only for sns.set_theme() theme setup; no seaborn-native plotting
    function is called, limiting LM-02 score — add sns.set_context or a seaborn API
    call
