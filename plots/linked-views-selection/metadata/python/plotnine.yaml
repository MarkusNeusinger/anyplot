review:
  strengths:
  - Three coordinated scatter views with consistent selection encoding via facet_wrap
    — best possible static approximation of linked views for a static library
  - 'Dual encoding (color + alpha) clearly communicates selection state: selected
    Setosa visually pops, unselected recedes without disappearing'
  - Selection count displayed in subtitle satisfies the 'summary statistics' requirement
    from the spec
  - Perfect canvas dimensions (8x4.5 @ dpi=400 = 3200x1800 px); both themes render
    with correct backgrounds and readable chrome
  - 'Clean idiomatic plotnine code: scale_alpha_manual + guides(alpha=False) combo
    is idiomatic; pd.Categorical for ordered facets is correct'
  weaknesses:
  - Axes both labeled 'Measurement (cm)' — generic labels due to data reshaping; per-panel
    specific labels (e.g. 'Sepal Length (cm)' / 'Sepal Width (cm)') are not achievable
    with facet_wrap on reshaped x/y data
  - All three coordinated views are scatter plots; the spec suggests including a histogram
    or bar chart view for categorical distribution — adding geom_histogram with fill='selection'
    would broaden feature coverage
  - Panel borders use 4-sided box frames per facet rather than L-shaped spines — acceptable
    for faceted layout but slightly heavier than the minimal style guide default
