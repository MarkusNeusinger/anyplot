review:
  strengths:
  - Excellent use of the Iris dataset — real, factually correct, neutral scientific
    dataset that clearly demonstrates multi-view linked selection
  - 'Creative SVG export pattern: capturing raw SVG bytes and exploiting pygal''s
    .serie-N CSS classes for JavaScript-driven cross-chart selection sync is a genuinely
    distinctive pygal technique'
  - 'Perfect palette compliance in both themes — first series is #009E73, canonical
    order maintained, backgrounds #FAF8F1/#1A1A17 correct, identical data colors across
    light/dark'
  - Complete interactive HTML with species filter buttons, reset button, and selection
    count display
  - Clean KISS code structure with no functions or classes; all 10 code quality points
    earned
  weaknesses:
  - Sub-chart font sizes (title=44, label=32, major_label=26) are below the pygal
    style-guide recommendation (66/56/44); raise to at least title=54, label=44, major_label=36
    in sub-charts so text is more prominent in the composite view
  - Linked selection is via external species buttons, not within-chart brushing or
    clicking — the spec requires selection FROM within a view to propagate to others;
    make legend items or series elements clickable via injected JavaScript onClick
    handlers that sync active selection across all three charts
  - Box chart y-axis starts at 0 but sepal lengths start at ~4.3; reduce y_range_min
    to ~3.5 so data occupies at least 70% of the chart area vertically
  - Dashed grid lines present on all charts; disable grid on bar and box charts (show_x_guides=False,
    show_y_guides=False) and keep grid only on scatter chart where it aids readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "linked-views-selection · python · pygal · anyplot.ai" in box chart — dark text, readable. Scatter sub-title "Petal Length vs Petal Width" and bar sub-title "Mean Petal Length by Species" both readable in dark text. Axis labels "Petal Length (cm)", "Petal Width (cm)", "Sepal Length (cm)" readable in dark text. Tick labels readable but small (major_label_font_size=26). Legend entries (setosa, versicolor, virginica) readable in each sub-chart.
      Data: First series setosa in #009E73 (teal) — correct. Second series versicolor in #9418DB (purple). Third series virginica in #B71D27 (red). All scatter dots visible, bar heights clearly distinct, box plots well-separated.
      Legibility verdict: PASS — all text readable against light background; font sizes below style-guide recommendation but still legible

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct anyplot dark surface
      Chrome: All text renders in light/off-white tones against dark background. Title, axis labels, tick labels, and legend labels all clearly readable. No dark-on-dark failures detected. Grid lines adapt to muted light tone via INK_MUTED token.
      Data: Colors identical to light render — setosa #009E73, versicolor #9418DB, virginica #B71D27. Only chrome elements (backgrounds, text, grid) have flipped themes.
      Legibility verdict: PASS — no dark-on-dark failures; all text clearly readable against dark background
