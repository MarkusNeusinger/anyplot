review:
  strengths:
  - Full theme adaptation in both light and dark renders with all chrome tokens correctly
    applied
  - Consistent Imprint palette across all three coordinated panels creates immediate
    visual coherence
  - Correct canvas dimensions (3200x1800) with no bbox_inches drift; subplots_adjust
    used properly
  - frameon=False shared legend avoids box clutter across three panels
  - Bar chart with standard deviation error bars adds genuine statistical depth
  weaknesses:
  - Interactive selection/brushing (the primary spec feature) is entirely absent —
    seaborn is static so this is a fundamental constraint, leaving the implementation
    as a multi-panel display rather than a true linked-views system
  - histplot multiple="layer" creates overlapping bars that are harder to read than
    stack for three-species distributions — switch to multiple="stack" for unambiguous
    species contributions
  - FacetGrid or PairGrid would be more idiomatic seaborn pattern for coordinated
    multi-panel plots
  - Panel subtitles at 9pt are slightly small for a 3200x1800 canvas; 10-11pt would
    improve glanceability
