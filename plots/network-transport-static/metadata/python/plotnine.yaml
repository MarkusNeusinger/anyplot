    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — matches spec requirement
      Chrome: Title, station names, and edge labels now rendered in light colors. All text remains clearly visible against dark surface.
      Data: Identical network structure and colors to light render. Route types show same hue assignments (blue for RE, orange for RB, vermillion for AE, green for S). Station nodes now appear as white circles with subtle outline. All arrows and route labels fully visible.
      Legibility verdict: PASS — no dark-on-dark failures; brand green (#009E73) clearly visible on S routes; all text readable; proper theme adaptation applied to text elements only, with data colors held constant.

