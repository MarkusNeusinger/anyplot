review:
  strengths:
  - Clean network layout with proper node-edge structure and clear directional arrows
  - Intelligent offset handling for multiple routes between same station pairs (perpendicular
    offset + edge shortening)
  - Excellent theme adaptation—both light and dark renders fully readable with proper
    token usage (PAGE_BG, INK, INK_SOFT)
  - Well-staggered edge labels (0.4/0.6 positions) to minimize text overlap
  - 'Realistic data: 12-station regional rail network with plausible departure/arrival
    times and 4 service types'
  - Correct figure sizing (16:9 at 300 DPI = 4800×2700px)
  - All text legible in both themes; proper contrast maintained
  weaknesses:
  - 'Color palette cherry-picks Okabe-Ito positions instead of using 1→N in order:
    limits=[''RE'',''RB'',''AE'',''S''] but colors are [#0072B2 (pos 3), #E69F00 (pos
    5), #D55E00 (pos 2), #009E73 (pos 1)]—should be [pos 1, pos 2, pos 3, pos 4] in
    canonical order or reorder route types to put primary/first series first'
  - 'Design refinement moderate: while arrow styling and legend background are nice,
    network diagram inherently has limited refinement opportunities—could consider
    emphasizing central hub visually or adjusting node/edge sizing hierarchy'
  - 'Library mastery competent but not distinctive: solid geom-based plotting and
    theme management, but could demonstrate more plotnine-specific advanced patterns
    (e.g., faceting for different route types, or custom stat layers)'
