review:
  strengths:
  - Asymmetric error bars with clear visual caps showing downside/upside asymmetry
  - Realistic financial forecasting scenario with proper context (10th-90th percentile)
  - Good layout and canvas utilization with appropriate margins
  - Readable in both light and dark themes with clear visual hierarchy
  - Correct data mapping with all 6 quarters visible and legend explaining percentile
    bounds
  weaknesses:
  - 'Using #FFD43B (yellow) and #306998 (Python blue) instead of Okabe-Ito palette
    - must use #009E73 for primary series'
  - Missing theme-adaptive color implementation - code hardcodes backgrounds and text
    colors instead of reading ANYPLOT_THEME environment variable
  - Violates bokeh.md export guidance - uses export_png() instead of Selenium with
    headless Chrome
  - Output format incorrect - saves as plot.png instead of plot-light.png and plot-dark.png
    with theme handling
  - Title contains pyplots.ai instead of anyplot.ai in source code
  - No visual storytelling or emphasis - data shown clearly but missing design hierarchy
    to highlight asymmetry insight
