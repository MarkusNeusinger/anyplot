review:
  strengths:
  - Correct use of plotly's asymmetric error bar API (symmetric=False, array/arrayminus)
    — idiomatic and concise
  - All font sizes explicitly set well above minimum thresholds; markers and error
    bars clearly visible at full resolution
  - Annotation explaining the 10th-90th percentile interpretation adds meaningful
    context to the error bars
  - Realistic quarterly product sales scenario with varied asymmetry ratios demonstrating
    the full asymmetric concept
  - HTML export included alongside PNG for interactivity
  weaknesses:
  - No ANYPLOT_THEME environment variable logic — os.getenv('ANYPLOT_THEME', 'light')
    missing entirely; implementation cannot produce theme-adaptive renders
  - 'Code uses #306998 (Python Blue) instead of #009E73 (Okabe-Ito first series);
    plot_bgcolor=''white'' (pure white, forbidden by style guide)'
  - Output filenames are plot.png / plot.html — must be plot-{THEME}.png / plot-{THEME}.html
    (two files each, one per theme)
  - Title in code says 'pyplots.ai' — must be 'anyplot.ai'
  - Legend bgcolor='rgba(255,255,255,0.8)' and annotation color '#666666' are hardcoded
    and produce wrong-chrome on dark render (white boxes on dark background)
  - Full four-sided frame visible — top and right spines should be removed for cleaner
    L-shaped layout
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, not dark. PASS.
      Chrome: Title "errorbar-asymmetric · plotly · anyplot.ai" in dark ink, centered, clearly readable. X-axis label "Product Category" and Y-axis label "Quarterly Sales (thousands USD)" in dark text, fully legible. Tick labels (Product A–F, 0–140) in dark secondary ink, readable. Legend box at bottom center with white background border, dark text "Median Sales (10th–90th percentile)" readable. Annotation "Error bars show 10th–90th percentile range" in medium gray (#666666) at lower right, readable.
      Data: Six teal-green (#009E73) filled circular markers with white edges and asymmetric error bars in same green. Caps clearly visible. Error bars are visibly asymmetric — upper extents larger than lower for most products (notably Product E: upper +35, lower −18; Product C: upper +10, lower −15).
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Very dark, consistent with #1A1A17 near-black. PASS.
      Chrome: Title and axis labels render in white/light text — clearly readable against dark surface. Tick labels (x and y) appear in light color, readable. HOWEVER: legend box at bottom center retains a white/light background (hardcoded bgcolor="rgba(255,255,255,0.8)") — jarring white box on dark canvas, wrong-theme chrome. Annotation box at lower right also appears with a light/white background (plotly_white template default, no dark override) — same issue. Annotation text color #666666 (medium gray) is not theme-adaptive but appears marginally readable in the dark context.
      Data: Same #009E73 teal-green markers and error bars — identical to light render. PASS for data color consistency.
      Legibility verdict: PARTIAL FAIL — primary title/axis/tick text is readable (light on dark); white legend and annotation boxes are wrong-theme chrome and should use #242420 elevated background with INK_SOFT text.
