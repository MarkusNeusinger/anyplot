review:
  strengths:
  - All five Ichimoku components correctly computed with proper period shifts (Senkou
    forward 26, Chikou back 26)
  - Creative SVG polygon injection to render Kumo cloud fill where pygal has no native
    fill-between
  - Good font sizing with explicitly set values for all text elements
  - Thoughtful color palette with distinct hues for each series
  - Clean data generation with proper weekday filtering and OHLC construction
  weaknesses:
  - Candlestick colors use blue/orange instead of spec-required conventional green/red
  - Extensive SVG regex post-processing is fragile and complex (~80 lines of string
    manipulation)
  - Cloud fill uses red/green which is problematic for colorblind accessibility
  - Design could be more polished with refined grid styling and whitespace
  image_description: 'The plot displays an Ichimoku Cloud Technical Indicator chart
    rendered with pygal. The title reads "indicator-ichimoku · pygal · pyplots.ai"
    at the top. The x-axis shows dates from Mar 26 through Aug 13, labeled "Date".
    The y-axis shows "Price ($)" ranging from approximately $132 to $168. Candlesticks
    are rendered as vertical bars — blue for bullish (close >= open) and orange for
    bearish (close < open). Five Ichimoku lines are overlaid: Tenkan-sen (9) in orange-red,
    Kijun-sen (26) in dark blue, Senkou A in green, Senkou B in red/pink, and Chikou
    Span as a dashed purple line. The Kumo cloud is filled between Senkou A and B
    — red/pink shading for bearish regions and green shading for bullish regions.
    The cloud is prominent in the left portion (bearish, large red fill) and transitions
    to a smaller green fill on the right. A legend at the bottom lists all seven series.'
