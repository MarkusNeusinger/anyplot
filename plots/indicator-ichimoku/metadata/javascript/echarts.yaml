review:
  strengths:
  - 'Correct full Ichimoku implementation: all five components present (Tenkan-sen,
    Kijun-sen, Chikou Span, Senkou Span A/B via cloud) with proper 9/26/52 parameters
    and correct temporal displacements'
  - Clever differential stacking technique for the Kumo cloud fill — transparent base
    series + colored diff series stacked on top is the idiomatic ECharts approach
    for banded area fills between two lines
  - 'Semantic color choices are correct for a financial chart: green (#009E73) for
    bullish candles and bull cloud, red (#AE3030) for bearish candles and bear cloud,
    following the Imprint semantic-exception rule'
  - Deterministic LCG RNG with seed 42 ensures reproducible data generation without
    any external dependencies
  - 'Proper theme adaptation via window.ANYPLOT_TOKENS: pageBg, ink, inkSoft, and
    grid tokens are all wired through correctly; data colors are identical across
    both themes'
  - Multiple line styles (solid for Tenkan, dashed for Kijun, dotted for Chikou) provide
    redundant encoding beyond color alone for the Ichimoku lines
  - 'Z-ordering is correctly assigned: cloud (z=1) behind candlesticks (z=3) behind
    indicator lines (z=4)'
  weaknesses:
  - 'Legend icon color mismatch for Kumo series: the _cb_base/_cb_base2 helper series
    consume palette[0] and palette[2] in the ECharts cycle, so ''Kumo (Bull)'' is
    auto-assigned palette[1]=#C475FD (lavender) and ''Kumo (Bear)'' gets palette[3]=#BD8233
    (ochre) as their legend swatch colors — but the actual cloud fills are green/red.
    Fix: add explicit itemStyle to the legend data entries, e.g. { name: ''Kumo (Bull)'',
    icon: ''rect'', itemStyle: { color: ''rgba(0,158,115,0.4)'' } } and { name: ''Kumo
    (Bear)'', icon: ''rect'', itemStyle: { color: ''rgba(174,48,48,0.4)'' } }'
  - 'Dead code: spanALine and spanBLine are computed (lines 104-105) but never added
    to the series array. Remove these unused variables.'
  - 'Design Excellence is limited: no visual hierarchy emphasis, no callout annotations
    for key signals (e.g. bullish cloud crossover), and the chart looks functional
    rather than polished. Consider annotating the cloud color-transition point.'
  - 'CQ-04: Minor elegance issue due to the dead code (spanALine/spanBLine computed
    but unused).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "indicator-ichimoku · javascript · echarts · anyplot.ai" is centered at top in dark ink, fully readable. X-axis tick labels are date strings rotated 30°, dark on light background, readable. Y-axis tick labels show price levels 140–190, readable. Legend row below title shows all six entries with text in inkSoft color, readable at full resolution.
      Data: 200 trading-day candlestick chart rising from ~145 to ~185. Bullish candles are #009E73 (brand green), bearish candles are #AE3030 (matte red). Tenkan-sen is a rose/purple solid line (#954477). Kijun-sen is a blue dashed line (#4467A3). Chikou Span is an ochre dotted line (#BD8233) visible in the mid-to-later portion trailing 26 periods behind. The Kumo cloud: a prominent green-tinted bullish cloud fills the right ~40% of the chart (future projection visible extending beyond the last candle), with a small red-tinted bearish cloud visible in the early-mid period (~March–May 2023). Cloud color transition from bearish to bullish is clearly visible.
      Legibility verdict: PASS — all text readable, no dark-on-light failures. Minor: legend icon swatches for 'Kumo (Bull)' and 'Kumo (Bear)' show lavender and ochre respectively (ECharts palette-cycle mismatch) rather than green and red — confusing but not a legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title, axis tick labels, and legend text all appear in light ink (#F0EFE8 / #B8B7B0 range), clearly readable against the dark background. No dark-on-dark failures detected. Grid lines are subtle light-on-dark horizontal lines.
      Data: Data colors are identical to the light render — candlesticks same green/red, Tenkan-sen same rose, Kijun-sen same blue dashed, Chikou Span same ochre dotted. The green bullish cloud and small red bearish cloud are both clearly distinguishable against the dark background (the semi-transparent fills are slightly more visible on dark due to higher contrast with the near-black background). Brand green #009E73 is fully readable on the dark surface.
      Legibility verdict: PASS — all text and data elements are readable. The same legend icon color mismatch (lavender/ochre for Kumo series) persists but does not affect readability.
