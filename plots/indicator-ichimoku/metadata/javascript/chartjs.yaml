review:
  strengths:
  - Correct implementation of all five Ichimoku components (Tenkan-sen, Kijun-sen,
    Senkou Span A/B, Chikou Span) with proper period offsets (26 forward, 26 back)
  - Clever candlestick simulation via Chart.js floating bars (wicks + bodies), elegantly
    filtered from legend
  - Dynamic Kumo cloud coloring using Chart.js fill target with above/below alpha
    — bullish green when Span A > Span B, bearish red when reversed
  - Seeded LCG ensures fully deterministic, reproducible data generation without server-side
    RNG
  - All Imprint palette colors, theme-adaptive chrome (ink, inkSoft, grid, pageBg
    tokens wired to every visual element), correct backgrounds in both renders
  - 'Expert use of dataset `order` for z-layering: cloud at order 10 (behind), signal
    lines at order 1 (in front)'
  - bgFill plugin correctly paints the pageBg surface so the chart background matches
    the theme token, not a white default
  weaknesses:
  - 'Palette canonical order partially violated: first dataset in the array is Senkou
    Span B (palette[3] ochre) rather than palette[0] brand green — Tenkan-sen is added
    later in the dataset list. Reorder datasets so Tenkan-sen (palette[0]) is the
    first non-background dataset, or restructure to ensure the legend-first visible
    series uses #009E73.'
  - Candlestick body barThickness:5 becomes visually thin on the right side of the
    chart where price drops occur and bars cluster — consider increasing to 6-7 px
    for better body legibility at high density.
  - 'DE-01/DE-02: Design is strong but not quite publication-ready — consider removing
    top/right axis borders explicitly (border: {display: false} is set on scale border,
    but Chart.js default still shows bounding box lines on some versions); add a subtle
    padding increase to let the cloud breathe more from the price action.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, clearly not pure white
      Chrome: Title "indicator-ichimoku · javascript · chartjs · anyplot.ai" at ~22px, dark text, fills ~65% of width — readable and well-proportioned. Axis labels "Trading Date" (x) and "Price (USD)" (y) dark and clear. Tick labels in inkSoft token ($110–$170 on y; Jan 3–Jul 20 on x) — all readable.
      Data: Candlestick OHLC chart (Jan–Jul 2023) showing a general downtrend from ~$155 to ~$120. Tenkan-sen (#009E73 teal green, solid), Kijun-sen (#C475FD lavender, solid), Chikou Span (#2ABCCD cyan, dashed). Kumo cloud visible with green bullish fill (Span A > Span B) in Mar-Apr region and pink/red bearish fill (Span B > Span A) in May-Jul region — cloud color transition clearly visible. Senkou Span B (#BD8233 ochre dashed) and Span A (#99B314 lime dashed) visible as cloud boundaries. Bullish candles in green, bearish in muted red.
      Legibility verdict: PASS — all text elements clearly readable against the light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, clearly not pure black
      Chrome: Title and all axis labels render in light text (#F0EFE8 range) — clearly readable against the dark surface. Tick labels in inkSoft token (lighter gray) — readable. Grid lines visible as subtle lighter lines. Legend entries all legible.
      Data: All data colors (Tenkan-sen teal green, Kijun-sen lavender, Chikou Span cyan, cloud fills, candlestick green/red) are visually identical to the light render — only chrome (background, text, grid) has flipped. No dark-on-dark failures detected. Brand green #009E73 remains clearly visible on the dark surface.
      Legibility verdict: PASS — both themes fully readable with correct theme-adaptive chrome; no dark-on-dark failures.
