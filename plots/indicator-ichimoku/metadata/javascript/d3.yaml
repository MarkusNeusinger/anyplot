review:
  strengths:
  - Complete spec compliance — all five Ichimoku lines (Tenkan-sen, Kijun-sen, Chikou
    Span, Senkou Span A/B) correctly computed and plotted with standard 9/26/52 parameters
  - Sophisticated cloud segmentation with fractional crossover interpolation producing
    accurate bullish/bearish cloud color transitions at segment boundaries
  - 'Semantic Imprint palette usage: brand green for bullish candles (canonical pos
    1), semantic red for bearish, Imprint positions 2–4 for the three indicator lines
    — justified and readable'
  - Deterministic LCG with seed=42 produces realistic momentum-driven OHLC price action
    across 252 raw periods
  - 'Idiomatic D3: d3.area() for cloud fills, d3.line() for indicator paths, SVG clip
    path to contain candles, data joins for candlestick wicks/bodies — fully correct
    D3 patterns'
  - Forecast boundary dashed line with 'Forecast →' annotation clearly delineates
    historical data from the projected cloud region
  - Both light and dark renders are fully theme-adaptive with ANYPLOT_TOKENS for all
    chrome elements (ink, inkSoft, grid, pageBg)
  weaknesses:
  - Tick labels (13px) and legend text (13px) are one pixel below the D3 guide's recommended
    14px minimum for the 3200px canvas — increase both to 14px for full compliance
  - With 200 candles the individual candle bodies are at the density limit (~3–4 CSS
    px wide before 2× scaling) — acceptable for a financial chart but worth noting
  - Design could be elevated with a subtle callout or annotation marking the most
    prominent cloud crossover (bullish-to-bearish transition), giving the viewer an
    immediate focal point
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, no harshness.
      Chrome: Title "indicator-ichimoku · javascript · d3 · anyplot.ai" at 22px bold, dark ink, spans ~60% of plot width. Axis labels "Trading Period" and "Price ($)" at 15px in inkSoft (medium-dark gray). Tick labels at 13px in inkSoft clearly readable. Legend to the right with 9 items, 13px text in inkSoft, all entries readable.
      Data: 200 candlesticks with bullish candles in #009E73 (brand green) and bearish in #AE3030 (matte red) — classic financial coloring. Tenkan-sen in #C475FD (lavender), Kijun-sen in #4467A3 (blue), Chikou Span in #BD8233 (ochre). Bullish cloud region filled with #009E73 at 0.22 opacity, bearish region with #AE3030 at 0.22 opacity. Cloud clearly transitions from bullish (green) to bearish (red) mid-chart. Span A/B dashed boundary lines visible. Forecast boundary dashed vertical line at period 200 with "Forecast →" annotation. Future cloud projects 26 periods ahead.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — not pure black.
      Chrome: Title, axis labels, and tick labels are all rendered in light-colored text (ANYPLOT_TOKENS ink/inkSoft) and clearly visible against the dark background. Legend text is light, fully readable. "Forecast →" annotation is light on dark. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — #009E73 bullish candles/cloud, #AE3030 bearish candles/cloud, #C475FD Tenkan-sen, #4467A3 Kijun-sen, #BD8233 Chikou Span. The 0.22-opacity cloud fills are slightly more prominent on the dark background (cloud colors pop more against the dark surface) but remain accurate and non-dominant. All five indicator lines clearly distinguishable.
      Legibility verdict: PASS — all text is clearly readable against the dark background. Chrome correctly flips from dark to light while data colors remain identical.
