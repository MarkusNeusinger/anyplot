  image_description: 'The plot displays an Ichimoku Cloud Technical Indicator overlaid
    on a candlestick chart of 200 simulated trading days (Jan 2024 – Nov 2024). Candlesticks
    use teal (#2E8B87) for bullish and coral (#D94F6B) for bearish days, with prices
    ranging from ~$173 to ~$205. Five Ichimoku lines are visible: Tenkan-sen (blue
    solid line), Kijun-sen (orange solid line), Senkou Span A (teal dotted), Senkou
    Span B (coral dotted), and Chikou Span (purple dashed, shifted back). The Kumo
    cloud is filled between Senkou Span A and B — light teal for bullish regions and
    light pink for bearish regions. Small square-pin flags mark Tenkan/Kijun crossover
    signals. The background is light gray (#FAFBFC) with subtle dotted y-axis gridlines.
    Title reads "indicator-ichimoku · highcharts · pyplots.ai" with a descriptive
    subtitle. Legend is positioned at top-right with all series labeled. Y-axis shows
    "Price (USD)" with dollar formatting, x-axis shows "Date" with month-year labels.'
