  image_description: 'The plot displays an Ichimoku Cloud Technical Indicator overlaid
    on a candlestick chart spanning approximately 200 simulated trading days (Jan
    2024 – Nov 2024). Candlesticks use teal (#2E8B87) for bullish days and coral (#D94F6B)
    for bearish days, with prices ranging from approximately $173 to $205. Five Ichimoku
    lines are clearly visible: Tenkan-sen (blue solid line), Kijun-sen (orange solid
    line), Senkou Span A (teal short-dotted), Senkou Span B (coral short-dotted),
    and Chikou Span (purple dashed, shifted 26 periods back). The Kumo cloud is filled
    between Senkou Span A and B — light teal shading for bullish regions and light
    pink shading for bearish regions, with visible transitions between the two. Small
    square-pin flag markers indicate Tenkan/Kijun crossover signals at several points
    along the price series. The background is a light gray (#FAFBFC) with subtle dotted
    y-axis gridlines at 0.10 opacity. The title reads "indicator-ichimoku · highcharts
    · pyplots.ai" in bold 60px text, with a descriptive subtitle below. The legend
    is positioned at the top-right showing all series. The y-axis shows "Price (USD)"
    with dollar-formatted labels, and the x-axis shows "Date" with month-year formatted
    labels.'
