review:
  strengths:
  - Excellent use of seaborn palette tools (dark_palette, light_palette, blend_palette)
    for cohesive, colorblind-safe color scheme
  - Thoughtful colorblind accessibility with filled vs hollow candlestick differentiation
    beyond just color
  - TK crossover annotation adds data storytelling dimension
  - 'Clean visual refinement: despined, subtle grid, custom background, tick marks
    removed'
  - Strong seaborn identity through rugplot, hue-based lineplot, and palette generation
    tools
  - Well-structured linear code with appropriate complexity
  weaknesses:
  - Legend overlaps some price data in the upper left corner
  - Cloud and candlestick colors deviate from spec's conventional green/red requirement
    (blue/orange used for colorblind safety)
  - Some candlestick bodies in the Aug-Sep period are very thin
  image_description: The plot displays an Ichimoku Cloud chart overlaid on candlestick
    price data spanning approximately Apr 23 to Sep 17. The title reads "indicator-ichimoku
    · seaborn · pyplots.ai" in a clean sans-serif font. The y-axis shows "Price ($)"
    from ~140 to ~190, and the x-axis shows "Date" with rotated date labels. Bullish
    candlesticks are rendered as filled dark blue (#306998) rectangles, and bearish
    candlesticks are hollow with orange (#d4820e) edges — providing both color and
    shape differentiation for colorblind safety. The Tenkan-sen (blue) and Kijun-sen
    (orange) indicator lines are drawn over the price action. The Chikou Span appears
    as a pink/light purple line lagging behind price. The Kumo (cloud) is filled between
    Senkou Span A and B, with a soft blue tint for bullish regions and a soft peach/orange
    tint for bearish regions. The cloud transitions from bullish to bearish as the
    price trends down. Green circle markers indicate bullish TK crossovers and red
    X markers indicate bearish crossovers, with one annotation "Bullish TK Cross"
    pointing to an early crossover. A subtle rug plot on the y-axis shows price density.
    The legend in the upper left uses a 2-column layout with all seven entries. The
    background is a light gray (#f8f9fa) with subtle y-axis grid lines. Top and right
    spines are removed.
