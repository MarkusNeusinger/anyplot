review:
  strengths:
  - 'All five Ichimoku components correctly implemented: Tenkan-sen, Kijun-sen, Chikou
    Span (−26), Senkou Span A and B (cloud boundaries), with proper displacement offsets'
  - NaN-masking technique to split the Kumo band into bullish (green) and bearish
    (red) regions is idiomatic and visually effective
  - Candlestick bodies rendered as vectorized Rect2f collection with poly! — efficient
    and idiomatic Makie approach
  - 'Semantic palette exception correctly applied: green (#009E73) for bullish / red
    (#AE3030) for bearish per finance convention, both Imprint palette members'
  - 'Theme tokens fully threaded: background, title, labels, ticks, grid, legend frame
    all adapt between light and dark renders'
  - 'Perfect spec compliance: all required features present, correct data mapping,
    title format and legend labels correct'
  - Clean KISS code structure with seed, all font sizes explicitly set, no functions
    or classes
  weaknesses:
  - Axis labels lack units — 'Period' should be 'Period (days)' and 'Price' should
    be 'Price (USD)' or 'Price (arbitrary units)' to meet the descriptive-with-units
    standard for VQ-06
  - 'Design Excellence (12/20) is below first-attempt approval threshold — chart is
    a well-configured default but lacks publication-ready polish: no visual emphasis
    on key signals (e.g., Tenkan/Kijun crossover, cloud color transition), no storytelling
    element guiding the viewer to the main insight'
  - 'DE-02 refinement gap: y-grid opacity at 0.12 is appropriate but tick marks could
    be removed; legend box frame adds visual weight without necessity — consider frameless
    legend or reduced padding'
  - 'DE-03 weak data storytelling: the data shows a clear bull-to-bear transition
    around period 120, but nothing draws the viewer''s eye there — consider a subtle
    vertical rule or background shade at the transition, or at minimum ensure the
    cloud color change is visually prominent without annotation'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface.
