    when Span A > Span B (bullish) and pink/red when Span B > Span A (bearish). A
    diamond-shaped "TK Cross" annotation marks a bullish crossover near the left side.
    The legend is positioned in the upper right with a white background and border.
    Y-axis shows "Price ($)" from ~126 to 180, X-axis shows "Date" with monthly ticks.
    The chart extends forward 26 periods beyond the last candle to display the leading
    Senkou spans, and the Chikou Span is properly shifted 26 periods back.'
