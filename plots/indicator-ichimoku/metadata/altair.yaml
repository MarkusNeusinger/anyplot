review:
  strengths:
  - All five Ichimoku components correctly computed and rendered with proper temporal
    shifts
  - Clean layer composition pattern with each component as a separate Altair layer
  - Excellent data generation with distinct trending phases that showcase the indicator
  - Proper forward/backward shifting of Senkou and Chikou spans
  - Subtle grid and clean canvas configuration
  weaknesses:
  - No legend mapping colors to Ichimoku components — readers cannot identify lines
    without prior knowledge
  - Bearish candle color (#FF8F00) nearly identical to Kijun-sen (#FF6F00) causing
    confusion
  - X-axis has duplicate Mar 24 labels creating visual clutter
  - Missing visual emphasis on key Ichimoku signals (TK cross, cloud breakout)
  image_description: The plot displays an Ichimoku Cloud technical indicator overlaid
    on a candlestick chart. The title reads "indicator-ichimoku · altair · pyplots.ai"
    with a subtitle "Ichimoku Kinko Hyo (9, 26, 52) — Tenkan/Kijun/Kumo/Chikou". The
    x-axis shows dates from Mar '24 to Nov '24 with angled labels, and the y-axis
    shows Price ($) from ~126 to ~178. Candlesticks are colored teal/green (bullish)
    and orange (bearish). The Kumo cloud is rendered with semi-transparent green fills
    (bullish regions where Span A > Span B) and pink/red fills (bearish regions).
    A dark blue solid line represents the Tenkan-sen, an orange dashed line represents
    the Kijun-sen, and a purple dashed line represents the Chikou Span. The cloud
    extends into the future beyond the last candlestick, as required. The chart shows
    clear trending periods — an uptrend, a downtrend, and a recovery — making the
    Ichimoku signals visible.
