    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "indicator-ichimoku · python · highcharts · anyplot.ai" in bold dark ink, fills ~70% of width — expected and not a violation. Subtitle "Ichimoku Cloud on 200 simulated trading days — Tenkan/Kijun crossover signals marked" visible in muted ink below title. X-axis label "Date" and Y-axis label "Price (USD)" clearly readable; Y-axis positioned on right (Highstock financial convention). Tick labels ($172–$204 on Y, Feb '24–Nov '24 on X) all readable in INK_SOFT. Legend row at bottom shows all seven series items without overlap.
      Data: Candlesticks use #009E73 (bullish/up) and #AE3030 (bearish/down) — semantic exception correctly applied for financial charts. Tenkan-sen is lavender #C475FD (solid), Kijun-sen is blue #4467A3 (solid), Chikou Span is ochre #BD8233 (dashed). Senkou Span A and B are thin dot-dot lines. Bullish Kumo is a light green semi-transparent fill growing from July to October; bearish Kumo is a faint pink fill visible around May. Small crossover signal flags (▲/▼) mark Tenkan/Kijun crossovers. First Imprint data series (#009E73) used for bullish candles and Senkou Span A — correct semantic assignment.
