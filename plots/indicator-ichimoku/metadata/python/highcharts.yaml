review:
  strengths:
  - Complete Ichimoku indicator implementation with all five lines (Tenkan-sen, Kijun-sen,
    Senkou Span A/B, Chikou Span) plus cloud fills
  - Semantic Imprint palette usage with correct financial conventions (green=bullish,
    red=bearish)
  - 'Uses Highstock-specific series types: candlestick, arearange for cloud zones,
    flags for crossover signals'
  - Theme-adaptive chrome works correctly in both light and dark renders — all text
    readable
  - Crossover signal detection with annotated flags adds analytical depth beyond the
    spec minimum
  - Near-perfect font sizing hierarchy (title 66px, axis 56px, ticks 44px, legend
    40px) and clean layout
  - Correct Ichimoku computation (9/26/52 params) with forward/backward displacement
    applied accurately
  weaknesses:
  - 'Flags series has no explicit color assigned — Highcharts auto-assigns a non-Imprint
    default color (appears cyan) for the Signals legend swatch; fix by adding color:
    INK_SOFT to the flags series config'
  - Bearish cloud (Kumo) uses rgba(174,48,48,0.20) fill — correct semantically but
    the fill is quite faint in the light render; consider rgba(174,48,48,0.25) for
    better visibility of bearish zones
  - 'DE-01: design is polished but stays close to Highstock financial defaults; adding
    a subtle horizontal reference line at a key price level or directional annotation
    would elevate storytelling to publication level'
