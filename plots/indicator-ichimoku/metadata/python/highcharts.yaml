      Data: Candlestick colors identical to light render (#009E73 bullish, #AE3030 bearish). Tenkan-sen lavender, Kijun-sen blue, Chikou Span ochre — all identical to light render. The bullish Kumo fill appears as a deeper teal-green against the dark background (same rgba 0.20 fill, darker surface makes it more vivid), bearish cloud is a dark crimson. Data colors are identical across themes — only chrome (bg, text, grid) flips. Legend readable at bottom.
      Legibility verdict: PASS — all text clearly readable against warm near-black background, no dark-on-dark text failures.
