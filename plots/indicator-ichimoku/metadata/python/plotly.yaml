review:
  strengths:
  - All five Ichimoku lines (Tenkan-sen, Kijun-sen, Senkou Span A/B, Chikou Span)
    implemented with correct temporal shifts and standard 9/26/52 parameters
  - Segmented cloud fill algorithm correctly switches green/red when Span A/B relationship
    inverts — the `while` loop approach produces clean segment boundaries at crossover
    points
  - Plotly-native go.Candlestick with increasing/decreasing color tokens, rangebreaks
    for weekend gaps, and per-trace hovertemplate is idiomatic and elegant
  - 'Full Imprint palette compliance: BULL_COLOR=#009E73 (brand green), BEAR_COLOR=#AE3030
    (matte red) as semantic exception for bull/bear, indicator lines use Imprint positions
    2–4 in order'
  - Theme-adaptive chrome is thorough — INK, INK_SOFT, GRID, ELEVATED_BG tokens propagate
    correctly through title, axis labels, tick labels, legend, hover labels, and annotation
    backgrounds
  - Bullish TK Cross annotation provides concrete storytelling — arrows to the exact
    crossover event with styled callout box
  - Dynamic title fontsize scaling formula (max(11, round(16×67/len)) prevents overflow
    at the long mandated title length
  weaknesses:
  - Horizontal legend with 6 entries is cramped — the legend items fit on one row
    but at the smallest allowed fontsize. Consider switching to vertical orientation
    (orientation='v') placed top-left or top-right to give each label more breathing
    room.
  - Kijun-sen (26) and Tenkan-sen (9) lines partially overlap each other and the candlestick
    wicks in the dense December 2023–January 2024 region, making it slightly hard
    to distinguish which line is which in that segment. A subtle increase in line
    width (2.5–3) or dashed style for one would improve separation.
  - Cloud opacity in dark theme is visually dominant — the bullish cloud nearly obscures
    the candlestick price action in the dark render. Reduce CLOUD_BULL opacity in
    dark mode to 0.15 (from 0.20) to give candlesticks more prominence against the
    dense teal fill.
  image_description: |-
