      Background: Warm off-white #FAF8F1 — correct, clearly not pure white, gives the saturated palette colors room to breathe.
      Chrome: Title "Ichimoku Cloud Overlay · indicator-ichimoku · python · plotly · anyplot.ai" is centered, readable dark text (~16px dynamic size). Axis labels "Date" (bottom) and "Price (USD)" (left) are clearly visible. Tick labels in INK_SOFT muted tone — "Oct 2023" through "Mar 2024" on x-axis and "$160"–"$190" on y-axis — all readable. Horizontal legend positioned top-left inside the plot with 6 items (Senkou Span A, Senkou Span B, OHLC, Tenkan-sen (9), Kijun-sen (26), Chikou Span) — tight but legible. "Bullish TK Cross" annotation with green arrow appears clearly labeled.
      Data: Large green bullish Kumo cloud visible in lower-middle region with correct low opacity. Small red bearish segment at far right. Green/red candlesticks clearly distinguished. Purple Tenkan-sen and blue Kijun-sen lines overlay candlesticks. Dashed ochre Chikou Span appears shifted 26 periods into the past. Green dotted Senkou Span A and red dotted Senkou Span B outline the cloud boundaries.
      Legibility verdict: PASS — all text elements are clearly readable against the warm off-white background. No "light-on-light" issues detected.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, clearly not pure black.
      Chrome: Title, axis labels, tick labels, and legend text render in F0EFE8/B8B7B0 light tones — all clearly readable against the dark surface. The "Bullish TK Cross" annotation uses ELEVATED_BG (#242420) with green border — clearly visible. No dark-on-dark text failure detected.
      Data: Green bullish cloud is more visually dense on the dark background (teal-green fill appears slightly more dominant than in light mode). Candlestick green/red coloring is identical to light render. Indicator line colors (purple, blue, ochre, brand-green, matte-red) are visually identical to light render — only the background and chrome text flipped. Dashed ochre Chikou Span clearly distinguishable.
      Legibility verdict: PASS — all elements readable. Data colors are consistent with the light render (only chrome adapted). No text accessibility failures found.
