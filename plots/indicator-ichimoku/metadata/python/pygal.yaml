      Data: Bullish candles in #009E73 (Imprint pos 1), bearish in #AE3030 (semantic red); Tenkan-sen purple (#C475FD), Kijun-sen blue (#4467A3), Senkou Span A lime (#99B314), Span B ochre (#BD8233), Chikou Span cyan dashed (#2ABCCD); large bearish Kumo cloud (red fill, 0.25 opacity) dominates Mar-May, smaller green cloud regions visible later; cloud projected ~26 periods beyond last candle.
      Legibility verdict: PASS — all text readable, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Title, axis labels, tick labels all render in light text (#F0EFE8 equivalent) and remain clearly readable against the dark background. No dark-on-dark failures observed. Legend text is light and readable.
      Data: Colors are visually identical to the light render — Kumo cloud retains red/green pattern, all Ichimoku lines retain their Imprint palette colors, bullish candles remain #009E73 (brand green clearly visible on dark surface), bearish candles remain #AE3030.
