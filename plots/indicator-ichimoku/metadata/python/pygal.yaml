review:
  strengths:
  - 'Complete Ichimoku specification compliance: all 5 indicator lines, correct period
    shifts (Chikou -26, Span A/B +26), standard parameters (9/26/52), and Kumo cloud
    with dynamic color switching between bullish green and bearish red.'
  - 'Excellent data quality: realistic synthetic OHLC with trading-calendar weekday
    filtering, both bullish and bearish periods visible, and cloud color changes observable
    across the chart window.'
  - Correct Imprint palette application with well-reasoned semantic exception for
    bullish/bearish financial coloring convention (green for up, red for down).
  - 'Clever SVG pipeline approach: polygon injection for Kumo fill and regex stroke-width
    post-processing solve pygal''s rendering limitations without introducing fake
    UI elements.'
  - 'Perfect theme adaptation: both light and dark renders are fully readable with
    no chrome leakage; data colors are identical across both themes.'
  - Interactive HTML export leverages pygal's SVG-native interactivity, adding value
    beyond static PNG output.
  weaknesses:
  - 'Senkou Span A (lime, #99B314) and Span B (ochre, #BD8233) lines are rendered
    at stroke_style width=3 — too thin to stand out within the Kumo cloud area; increase
    to 5-6 to match the indicator''s visual importance relative to Tenkan/Kijun.'
  - Candlestick wicks (WICK_W=12) are relatively thick compared to industry convention,
    making the chart appear slightly blocky; reducing to 6-8 would improve visual
    fidelity while keeping candles readable.
  - The large bearish Kumo cloud (early portion) visually dominates the chart but
    the Span A/B boundary lines forming the cloud edges are almost invisible within
    the filled area — higher stroke opacity or weight on these boundary lines would
    help viewers trace the cloud structure.
  - Legend at bottom consumes significant vertical space for 8 series across 2 rows,
    compressing the chart area slightly.
  - Data storytelling is average — chart displays all indicator data correctly but
    lacks a clear visual focal point or narrative emphasis beyond the accidental prominence
    of the initial bearish cloud.
  image_description: |-
