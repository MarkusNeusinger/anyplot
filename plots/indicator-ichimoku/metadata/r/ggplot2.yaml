review:
  strengths:
  - Complete Ichimoku implementation with all 5 lines (Tenkan-sen, Kijun-sen, Chikou
    Span, Senkou Span A, Senkou Span B) and correctly-colored Kumo cloud
  - 'Semantic color mapping: green (#009E73) for bullish/up candles and Senkou Span
    A, red (#AE3030) for bearish/down candles and Senkou Span B — aligns perfectly
    with finance conventions'
  - 'Idiomatic ggplot2 scale trick: combined color+linetype into single Lines legend
    using matching scale names and breaks= to suppress candle entries from legend
    display'
  - Both theme renders fully readable — all chrome tokens correctly flipped (INK,
    INK_SOFT, PAGE_BG, ELEVATED_BG) and data palette stays identical across themes
  - Kumo twist annotation with arrow adds genuine analytical value, highlighting a
    key trend-change signal
  weaknesses:
  - Tenkan-sen and Senkou Span A share the same color (#009E73) — while distinguishable
    by line style and weight, assigning a different Imprint slot (e.g. IMPRINT_PALETTE[2])
    to Span A would better separate the cloud boundary from the momentum conversion
    line visually
  - Chikou Span dots (ochre, dotted, linewidth=1.0) are hard to track through the
    dense 160-bar candlestick forest; a slightly thicker line (linewidth=1.3) or larger
    dot size would improve traceability
  - Bullish cloud in the dark render is somewhat muted at alpha=0.25 against the near-black
    background; bumping to 0.30 in dark theme would improve cloud readability without
    overwhelming the chart
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "Nikkei 225 · indicator-ichimoku · r · ggplot2 · anyplot.ai" in bold dark ink, clearly readable. Y-axis label "Price (USD)" in dark ink. X-axis date tick labels ("Jan 2023", "Feb 2023", ...) rotated 30°, readable. Y-axis dollar tick labels readable. Two separate legends (Cloud, Lines) on the right with elevated-bg boxes and dark text.
      Data: Candlesticks green (#009E73) for up-days and red (#AE3030) for down-days. Tenkan-sen: thick green solid line. Kijun-sen: thick blue (#4467A3) solid line. Chikou Span: ochre (#BD8233) dotted line weaving through candlestick area. Senkou Span A: thin green dashed line. Senkou Span B: thin red dashed line. Bullish cloud (Span A > Span B): semi-transparent green fill. Bearish cloud (Span B > Span A): semi-transparent red fill. "Kumo twist" annotation with arrow marks the first cloud color flip.
      Legibility verdict: PASS — all text is clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title in light ink (#F0EFE8), clearly readable on dark bg. Y-axis label in light ink. X-axis and Y-axis tick labels in secondary light ink (#B8B7B0), readable against dark bg. Legend boxes use elevated dark bg (#242420) with light text. No dark-on-dark failures detected.
      Data: All data colors are identical to light render — Tenkan-sen green, Kijun-sen blue, Chikou Span ochre, Senkou spans green/red dashed, candlesticks green/red. Cloud fills same hues, appear slightly more muted at alpha=0.25 against the dark background but remain visible.
      Legibility verdict: PASS — all text is readable against the dark background; chrome adapts correctly.
