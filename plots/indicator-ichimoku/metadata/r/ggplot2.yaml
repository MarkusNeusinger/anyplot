review:
  strengths:
  - Correctly implements all five Ichimoku lines with proper 9/26/52 parameters and
    time shifts
  - Cloud (Kumo) correctly changes color between bullish (green) and bearish (red)
    segments using geom_ribbon split
  - Full Imprint palette applied semantically — green for bullish, matte red for bearish,
    matching finance conventions
  - Both theme tokens wired correctly; no dark-on-dark failure in dark render
  - 'Clean ggplot2 grammar: geom_segment for wicks, geom_rect for candle bodies, geom_ribbon
    for cloud — idiomatic layer composition'
  - Canvas matches 3200×1800 exactly; ragg device used correctly
  weaknesses:
  - No legend present — a 7-element chart (Tenkan-sen, Kijun-sen, Chikou Span, Senkou
    Span A, Senkou Span B, bullish cloud, bearish cloud) is unreadable without one;
    add a manual legend identifying all Ichimoku components
  - Chikou Span (dotted ochre) is visually lost in the mid-chart candlestick forest;
    consider slightly thicker linewidth (1.0) or a distinct linetype
  - 'Dark render: bullish cloud fill appears darker/heavier than intended — alpha=0.25
    over #1A1A17 produces a muted forest-green; increase alpha to 0.30 for dark theme
    or adjust cloud fill to be more visually distinct'
  - Design could benefit from a minimal annotation pointing out the cloud flip (bullish→bearish)
    as the key signal
  - 'DE-03 low: no visual hierarchy or annotations guide the viewer through the Ichimoku
    story'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "Nikkei 225 · indicator-ichimoku · r · ggplot2 · anyplot.ai" in bold dark ink, clearly readable. Y-axis label "Price (USD)" in dark ink. X-axis tick labels (Jan 2023 through Jul 2023) rotated 30° — all legible. Grid lines subtle at low linewidth. No top/right spines.
      Data: Green (#009E73) up-candlesticks and matte-red (#AE3030) down-candlesticks. Tenkan-sen = solid green line (prominent). Kijun-sen = solid blue (#4467A3) line. Chikou Span = dotted ochre (#BD8233) line shifted 26 periods back. Senkou Span A/B as dashed cloud boundary lines. Bullish cloud: light green semi-transparent fill. Bearish cloud: light red/pink semi-transparent fill visible in mid-chart ~May 2023 and future cloud visible right portion. No legend present.
      Legibility verdict: PASS — all text readable; data elements distinguishable

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title text renders in near-white (#F0EFE8 range) — clearly readable against dark background. Y-axis label and tick labels are light-colored — no dark-on-dark failures observed. Grid lines visible at subtle contrast. INK_SOFT tokens correctly applied to axis elements.
      Data: Same Imprint palette data colors as light render (green candlesticks, red candlesticks, green Tenkan-sen, blue Kijun-sen, ochre dotted Chikou, dashed cloud boundaries). Bullish cloud fill appears darker/more saturated in dark mode (alpha=0.25 over near-black creates heavy forest green); bearish cloud appears as a dark brownish-red region. Data colors are identical to light render — only chrome adapts. Brand green #009E73 remains visible.
      Legibility verdict: PASS — all text legible; mild concern about cloud fill appearing heavy in dark mode but not a failure
