review:
  strengths:
  - Perfect code quality and data quality — both score maximum points
  - Dual encoding (color=event age, size=magnitude) adds meaningful information density
    to each panel
  - Cumulative rendering approach correctly shows aftershock growth dynamics across
    the temporal sequence
  - Fully theme-adaptive chrome with all tokens correctly applied to both renders
    — dark render passes all legibility checks with no dark-on-dark failures
  - Shared colorbar with descriptive label cleanly replaces per-panel legends
  - Geophysically realistic synthetic data (Omori-law-like decay, realistic magnitudes
    and spatial spread)
  - Edge-only tick/label visibility idiomatically avoids clutter in a 12-panel grid
  weaknesses:
  - 'Missing basemap: the spec explicitly requires a basemap with geographic context
    (country boundaries, coastlines, or terrain). The implementation shows only bare
    lat/lon coordinate axes. Use GeoMakie''s GeoAxis for geographic projection and
    coastlines, or add a simplified Japan/region outline using polygon data.'
  - 'Minor colorbar/scatter data range mismatch: scatter color uses normalized 0-1
    fractions (time_frac) while the colorbar limits are set to (1, 12). Fix by passing
    days_cum directly as the scatter color values (1-12 range) so colorbar tick labels
    precisely match the data colors.'
  - 'Small text in dense grid: axis label sizes of 8pt (effective 16pt) and panel
    titles of 11pt (effective 22pt) are borderline small for the 12-panel layout,
    especially when scaled to mobile width.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Bold centered title "map-animated-temporal · julia · makie · anyplot.ai" in dark ink clearly visible. Subplot titles "Day N" in small dark text readable. Axis labels "Longitude" and "Latitude" on bottom row / left column respectively. Colorbar label and tick labels in dark ink readable.
      Data: Green-to-blue sequential gradient (ANYPLOT_SEQ: #009E73 -> #4467A3) encoding event age. Point size encodes magnitude (2-11pt). Red star (#AE3030) marks mainshock epicenter in each panel. 12 cumulative panels showing aftershock growth.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and all labels flip to light text (#F0EFE8 / #B8B7B0). Grid lines faintly visible in light tone. All tick labels, axis labels, subplot titles, and colorbar labels are clearly readable in light text on dark background. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — same green-to-blue gradient with same magnitude sizing. Red star epicenter with light stroke remains visible. No color drift between themes.
      Legibility verdict: PASS — all text clearly readable against warm near-black background; theme adaptation complete
