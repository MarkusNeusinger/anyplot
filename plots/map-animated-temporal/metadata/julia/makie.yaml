review:
  strengths:
  - Correctly uses small multiples as per Makie library rules (CairoMakie is static-only)
  - 'Dual encoding: color encodes time progression (green=early, blue=late), size
    encodes magnitude — information-dense'
  - Red star5 marker for mainshock epicenter creates a clear, distinct focal point
  - Complete theme adaptation — all chrome elements (title, ticks, spines, grid, background)
    flip correctly in both renders
  - Clean grid layout with shared tick labels (only on bottom/left edges) — efficient
    and professional
  - Correct ANYPLOT_SEQ colormap (imprint_seq equivalent) for single-polarity continuous
    temporal data
  - Reproducible data generation with Random.seed!(42)
  weaknesses:
  - Missing basemap with geographic context (coastlines, country borders) — spec explicitly
    requires it; CairoMakie lacks native basemap support but the implementation should
    note this limitation
  - No explicit latitude/longitude axis labels on any panel — add ylabel=Latitude
    and xlabel=Longitude on shared edges (row==N_ROWS for x, col==1 for y)
  - Tick labels at 7pt and colorbar ticks at 9pt are slightly small — bump to 8pt
    tick labels and 10pt colorbar ticks for better mobile readability
  - Dense scatter in later panels (Day 9–12, 200–300+ cumulative events) without alpha
    blending causes overplotting — add alpha=0.65–0.75 to scatter! call
