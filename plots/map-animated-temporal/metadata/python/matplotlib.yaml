review:
  strengths:
  - Custom ocean/land theme-adaptive colors that adapt correctly across both light
    and dark renders
  - Dual-encoding (diverging colormap + variable marker size) effectively communicates
    both anomaly direction and magnitude, providing redundant CVD-safe encoding
  - ScalarMappable with shared Normalize for cross-panel colorbar is idiomatic and
    sophisticated matplotlib usage
  - Correctly uses imprint_div with theme-adaptive midpoint matching the page background,
    with documented climate-convention pole reversal
  - 'Clean KISS structure: linear imports → data → plot → save, with np.random.seed(42)
    for full reproducibility'
  - Temporal warming narrative is clearly visible across the 6-panel sequence with
    peak annotation in the final frame drawing viewer attention
  weaknesses:
  - Annotation text at fontsize=5.5pt (~31px at 400dpi) is very small and likely unreadable
    when the image is scaled to mobile width (~400px) - increase annotation fontsize
    to at least 6.5-7pt
  - Minimum scatter marker size of s=60 is below the recommended 200-400 for sparse
    data (<30 points per panel) - near-zero anomaly stations have small, less prominent
    markers; consider a minimum of s=80-100 and wider size range
  - DE scores slightly limited by standard small-multiples approach - consider adding
    visual emphasis elements like a thin highlight ring on the most anomalous station
    per frame to further guide the viewer's eye
  - 'LM-02: Polygon-based coastline is a rough approximation with some irregular shapes
    that may not clearly convey European geography to unfamiliar viewers - the technique
    is distinctive but the result is visually rough'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) page background — correct.
      Layout: 2×3 grid of small map panels covering Europe (lon -15 to 35, lat 33 to 72). Ocean areas rendered in light blue (#C8DDF0), land polygons in warm beige (#E8E4D8). A shared vertical colorbar sits on the right edge labeled "Temp. Anomaly (°C)".
      Chrome: Title "map-animated-temporal · python · matplotlib · anyplot.ai" at the top in dark ink, clearly readable. "Latitude (°)" and "Longitude (°)" axis labels on the left column and bottom row in dark ink. Tick labels at 6pt — small but readable at full resolution; borderline for mobile. Month labels (bold, semi-transparent box) in each panel's top-left corner (Jan 2025, Mar 2025, May 2025, Jul 2025, Sep 2025, Nov 2025) — readable. Nov panel has a "+3.6°C / [station name]" annotation with an arrow — text at 5.5pt is very small.
      Data: Scatter points colored with imprint_div (blue=cold, red=warm) and size-encoded by anomaly magnitude. January shows mostly neutral-to-slightly-warm stations; by November most stations appear distinctly red with larger markers. First series uses #009E73 — N/A (continuous colormap data). Brand green not applicable here; imprint_div used correctly for diverging data.
      Legibility verdict: PASS — all text readable at full resolution; minor concern about 5.5pt annotation and 6pt ticks at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) page background — correct.
      Layout: Same 2×3 grid. Ocean areas in dark teal-blue (#1E3A4A), land polygons in dark warm-grey (#2E2E28). Colorbar remains on right side.
      Chrome: Title, axis labels, and tick labels all appear in light-colored text (INK token #F0EFE8 for primary, INK_SOFT #B8B7B0 for ticks) — clearly readable against the near-black background. Month labels in semi-transparent elevated boxes (#242420) with INK text — readable. Annotation in Nov panel uses INK color on elevated background — consistent with dark theme. Spine colors use INK_SOFT. Dotted graticule lines visible but subtle.
      Data: Scatter colors are identical to the light render — same blue-to-red diverging palette with size encoding. The midpoint (#1A1A17) of imprint_div matches the dark page background, making near-zero anomaly markers blend slightly with the background, but edge colors (INK) provide visible outlines. Warming progression still clearly visible across panels.
      No "dark-on-dark" failures observed — all chrome correctly uses light tokens on the dark background.
      Legibility verdict: PASS — all text readable; near-zero anomaly markers have slightly reduced fill contrast against dark background (midpoint=page_bg) but edge outlines preserve visibility.
