review:
  strengths:
  - Correct Imprint palette with semantic matte-red epicenter marker (#AE3030) — semantically
    appropriate for hazard/focal point
  - 'Full spec compliance: play/pause button, time slider, Day-label overlay, tooltip,
    and cumulative alpha-faded trail all present and working'
  - Bokeh-idiomatic CustomJS callbacks enable true client-side animation without a
    Python server — all frames pre-embedded in ColumnDataSource
  - Earthquake aftershock scenario is realistic, neutral, and geo-accurate (lat 35,
    lon 140 is a plausible Japan epicenter)
  - Proper theme-adaptive chrome with ELEVATED_BG callout boxes for legend and day
    label; both renders pass legibility check
  - Title fontsize scaled with length formula — no overflow
  - Code is clean KISS structure with seed set, all imports used
  weaknesses:
  - Static Day-0 PNG shows only 25 sparse aftershock points; at size=magnitude×4 (~20
    px for M5) markers are small on the 3200 px canvas — for sparse data (<30 points),
    markers should be ~40–50 px minimum to be prominently visible at scale
  - Coastline is a 15-segment manual approximation rather than actual geographic line
    data; leaves most of the 130–150 lon, 28–42 lat region featureless, limiting geographic
    context
  - Aftershocks are clustered in a small area around lon 140 while the map extends
    to 130–150 (20° range), creating a large empty ocean area to the left — a tighter
    geographic extent (e.g. 136–146) would make the data more prominent
