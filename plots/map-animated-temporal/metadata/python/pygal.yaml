review:
  strengths:
  - 'Correct imprint_seq colormap (green #009E73 → blue #4467A3) for seismic intensity
    ordinal data — exactly as the style guide specifies'
  - 'Creative PIL composition: 6 pygal World map panels assembled into a unified 3200×1800
    small-multiples grid with a shared bottom legend — ideal fallback for a static
    library'
  - 'Dual output: PNG small-multiples + HTML interactive choropleth (T6 state with
    tooltips and toggleable legend) — maximizes what pygal offers'
  - Both light (#FAF8F1) and dark (#1A1A17) renders use correct theme-adaptive backgrounds
    with fully readable chrome in both modes
  weaknesses:
  - Panel subheading font size (44 in pygal SVG at 1066×780 cells) renders noticeably
    small on the composited 3200×1800 canvas — increase to ~60-70 to stay readable
    when the image is scaled down to mobile widths
  - HTML output shows only the T6 (+72h) final state instead of a multi-step interactive
    view; exposing all 6 time steps with tab or slider navigation would better serve
    the temporal-animation intent for the interactive version
  - 'PIL main title font at 52pt is slightly below the style-guide recommendation
    of 66 native pixels for this canvas size — consider 62-66pt to match the spec
    (accounting for title length of ~70 chars: 66 × 67/70 ≈ 63)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Main title "Seismic Activity · map-animated-temporal · python · pygal · anyplot.ai" rendered in bold dark ink (#1A1A17) via PIL at 52pt — spans ~55% of canvas width, readable. Six panel subheadings (T1: Initial … T6: +72h) visible in dark text within each pygal SVG cell. Bottom legend shows 6 colour swatches + labels ("Minimal (<20)" through "Extreme (80+)") in INK_SOFT (#4A4A44) — all readable.
      Data: World maps show Pacific Ring-of-Fire countries coloured with imprint_seq gradient from #009E73 (minimal activity) through intermediate blue-greens to #4467A3 (extreme activity). Early frames (T1-T3) show mostly Japan and small neighbouring countries lit; later frames (T4-T6) expand to Indonesia, Australia, New Zealand, Chile, Peru, Mexico. All filled regions clearly distinguishable from the warm-white map background.
      Legibility verdict: PASS — all title, subheadings, and legend text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Main title rendered in light ink (#F0EFE8) — clearly visible against dark background. Panel subheadings (T1-T6) appear in light text within the pygal SVGs — readable. Bottom legend text in INK_SOFT (#B8B7B0) — readable. Coastlines and country outlines render as light-grey strokes in pygal's dark theme, providing geographic context.
      Data: Data fill colours are identical to the light render — same imprint_seq green-to-blue gradient; no colour shift between themes (only chrome flips). Country fills clearly stand out against the near-black world-map background.
      Legibility verdict: PASS — no dark-on-dark failures; title, subheadings, and legend fully readable on dark surface; brand green #009E73 clearly visible in the "Minimal" bin swatch and early-frame filled countries.
