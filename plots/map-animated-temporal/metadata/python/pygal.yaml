review:
  strengths:
  - Correct use of pygal_maps_world World choropleth chart with binned series — idiomatic
    to this library ecosystem
  - 'imprint_seq colormap (#009E73 → #4467A3) correctly interpolated and applied to
    intensity bins'
  - 'Both theme variants correctly handled: PAGE_BG, INK, INK_SOFT, INK_MUTED all
    derived from ANYPLOT_THEME token'
  - 'Title format correct: ''Seismic Activity · map-animated-temporal · python · pygal
    · anyplot.ai'''
  - Single shared legend at bottom (instead of 6 redundant per-panel legends) — clear
    design choice
  - Interactive HTML delivers tab navigation and time slider as required by spec
  - 'Realistic, neutral scenario: seismic activity spreading across Pacific Ring of
    Fire over 72 hours'
  - Countries selected are all geographically accurate members of the Ring of Fire
  - Deterministic hardcoded data (fully reproducible with no random seed needed)
  weaknesses:
  - HTML animation is tab/slider navigation only — no auto-play (setInterval) button.
    Spec explicitly asks for prominently visible play/pause controls. Add an auto-play
    toggle that cycles frames every ~1.2 s.
  - HTML frame transitions are instantaneous show/hide — no CSS transition or cross-fade.
    Spec calls for smooth transitions between frames. Add a CSS opacity or fade transition
    on .frame elements.
  - Binning loop is duplicated verbatim for PNG render and HTML render (lines 113-118
    and 200-206). Extract to a shared pre-computed dict to DRY the code.
  - 'DE-01 / DE-02: Design could benefit from stronger visual hierarchy — e.g., a
    subtle grid overlay in the empty ocean area, or a brief explanatory subtitle,
    to elevate beyond a configured default.'
  - 'SC-02: HTML lacks auto-play functionality. The .tab-btn set is a workaround for
    the missing animation — the implementation should add a Play button with JavaScript
    setInterval.'
