review:
  strengths:
  - 'Excellent dual encoding: magnitude mapped to both hue (imprint_seq colormap)
    and marker size simultaneously, maximizing data density without clutter'
  - KDE density contours (sns.kdeplot) are a seaborn-distinctive feature used effectively
    to show cumulative aftershock clustering across panels
  - Ghost trail pattern (faded prior-period scatter points) elegantly communicates
    temporal history without adding noise
  - 'Full anyplot theme compliance: correct background tokens (#FAF8F1/#1A1A17), imprint_seq
    colormap, INK/INK_SOFT tokens throughout, no bbox_inches=''tight'''
  - 'Semantic use of #AE3030 for the epicenter marker is contextually appropriate
    — danger/alert role matches the anyplot semantic anchor rules'
  - Ocean tint adds meaningful geographic context without requiring an external mapping
    library
  - np.random.seed(42) ensures reproducibility; KISS flat-script structure with no
    functions/classes
  weaknesses:
  - Tick labels and n= count annotations are set at fontsize=6.5pt — readable at full
    3200×1800 resolution but borderline at mobile scale (~400px); nudge to 7-7.5pt
    to improve mobile legibility
  - Ghost trail scatter uses ax.scatter(s=3) directly; at 3pt² the trail points are
    nearly invisible in the rendered image — increase to s=5-6 to make the temporal
    history more legible
  - Small multiples are created with matplotlib plt.subplots() rather than seaborn's
    FacetGrid — slightly misses the seaborn-idiomatic approach for faceted layouts
  - The synthetic coastline is defined by only 10 hand-typed lat/lon points, producing
    a visibly coarse approximation; a slightly denser set of waypoints (~20-30) would
    improve geographic fidelity
