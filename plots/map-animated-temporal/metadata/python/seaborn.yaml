review:
  strengths:
  - Correct small multiples approach for seaborn (static library) per library rules
    — 6 panels clearly show temporal spread of aftershocks
  - Dual magnitude encoding (hue + size via imprint_seq) is idiomatic seaborn and
    adds data depth
  - Realistic, neutral scientific dataset (Tohoku aftershock sequence) with geographically
    plausible coordinates and magnitude ranges
  - Proper theme-adaptive chrome with full SNS set_theme configuration — dark render
    has no dark-on-dark failures
  - 'Perfect code quality: seed, clean imports, no functions/classes, correct savefig
    without bbox_inches=tight'
  - Ocean tint and simplified coastline provide geographic context within seaborn/matplotlib
    constraints
  - Shared colorbar and custom legend handles are well-placed and informative
  weaknesses:
  - Panel text sizes are very small throughout (panel titles 7.5pt, axis labels 6pt,
    tick labels 5pt, colorbar/legend 5-6pt) — functional at full 3200×1800 but likely
    unreadable on mobile (~400 px). Increase panel title to ~9pt, axis labels to ~8pt,
    tick labels to ~6pt
  - Layout is somewhat cramped — wspace=0.32, hspace=0.42 with small panels leaves
    limited breathing room; consider slightly wider subplots_adjust right margin or
    reducing to a 2×3 with more padding
  - No cumulative trail overlay showing aftershock history across days — spec explicitly
    mentions optional point trails; even a semi-transparent cumulative background
    scatter would strengthen the temporal narrative
  - 'DE design is functional but below excellence threshold: no descriptive title
    prefix, no period-count annotation per panel, no visual cue distinguishing temporal
    progression beyond panel order'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) as required — NOT pure white.
      Chrome: Title "map-animated-temporal · python · seaborn · anyplot.ai" at 12pt is clearly readable in dark ink. Panel titles "Day 1"–"Day 6" at 7.5pt bold are legible at full resolution. Y-axis label "Lat (°N)" and X-axis label "Lon (°E)" at 6pt are small but visible. Tick labels at 5pt are at the readability floor — functional at 3200×1800 but would be very difficult at mobile scale (~400 px).
      Data: Scatter points use imprint_seq (teal #009E73 to blue #4467A3) with size dual-encoding for magnitude (range 10–110). Spread increases from Day 1 (tightly clustered ~3°) to Day 6 (dispersed ~7°). Red star epicenter marker uses ANYPLOT_PALETTE[4] (#AE3030) as semantic anchor — clearly visible. Ocean tint (light blue) highlights the offshore area; simplified Sanriku coastline in INK_SOFT gray provides geographic orientation. Shared colorbar on right shows magnitude 2.5–5.8 scale.
      Legibility verdict: PASS — all elements readable at full resolution. Mobile readability concern for 5-6pt text.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as required — NOT pure black.
      Chrome: Title in light (#F0EFE8) ink is clearly readable against the dark surface. Panel titles, axis labels, and tick labels all render in appropriate light tones — no dark-on-dark failures detected. Colorbar label and tick values readable. Legend box uses elevated dark background (#242420) with lighter text.
      Data: Scatter point colors are identical to light render — imprint_seq teal-to-blue range unchanged, only chrome (background, text, grid) flips. Epicenter red star equally prominent. Ocean tint adapts to dark (#192830). Grid lines subtly visible.
      Legibility verdict: PASS — theme adaptation is fully correct in both renders.
