review:
  strengths:
  - Correct use of the spec's small-multiples fallback with a well-structured 4-panel
    cumulative temporal view
  - Dual encoding (color + size) for earthquake magnitude with correct imprint_seq
    gradient (#009E73→#4467A3)
  - 'Complete theme-adaptive chrome: all INK/INK_SOFT/INK_MUTED/PAGE_BG tokens correctly
    wired in both light and dark renders'
  - Realistic and neutral scientific dataset (aftershock sequence) with geographically
    accurate California region coordinates
  - 'Perfect code quality: flat structure, seed, clean imports, correct canvas (3200×1800
    via ggsize(800,450)×scale=4), both PNG and HTML outputs'
  weaknesses:
  - 'Design lacks focal-point element: no epicenter marker or annotation at (-119.5,
    36.0) to anchor the radial spread narrative — add geom_point cross/star marker
    + geom_text label ''Epicenter'' to elevate DE-03'
  - Two separate legends (color bar + size guide) for the same Magnitude variable
    create visual clutter — merge via guides() with matching breaks into a single
    combined legend
  - 'Panel borders not explicitly themed: appear bright white in dark render against
    near-black background — add panel_border=element_rect(color=INK_SOFT, size=0.3)
    to theme() call'
  - Does not use letsplot's distinctive geom_livemap() tile-based basemap — replacing
    the hand-coded California polygon with geom_livemap using carto tiles would demonstrate
    the library's most unique geographic feature and significantly boost LM-02
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface
      Chrome: Title "Seismic Activity Spread · map-animated-temporal · python · letsplot · anyplot.ai" in bold dark ink — readable. Axis labels "Longitude" and "Latitude" in INK_SOFT color — readable. Tick labels (-122 to -117, 34 to 38) in INK_MUTED at size=8 — small but readable. Strip headers "Week 1/2/4/6" bold in INK. Caption in muted tone. Legend with gradient color bar and size guide on right side.
      Data: Points colored with imprint_seq gradient from #009E73 (M2) to #4467A3 (M6), sized by magnitude range [2,9], alpha=0.75. California polygon in #E0DDD5 fill with #B0ADA5 border.
      Legibility verdict: PASS — all text readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct dark theme surface
      Chrome: Title in cream/off-white (#F0EFE8 = INK for dark theme) — readable. Axis labels in INK_SOFT (#B8B7B0) — readable. Tick labels in INK_MUTED (#A8A79F) — readable. Strip headers in cream tone. Legend text in theme-correct light tones. Panel borders appear as bright white lines against dark background (not explicitly themed — minor visual issue, not a readability failure).
      Data: Colors identical to light render — green-to-blue gradient unchanged, confirming only chrome flips. California polygon in #2A2A26 fill with #4A4A44 border. Legend backgrounds use elevated dark (#242420).
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures detected
