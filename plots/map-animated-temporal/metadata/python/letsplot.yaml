review:
  strengths:
  - Custom California polygon basemap provides clean geographic context without external
    dependencies
  - 'Correct imprint_seq gradient (green #009E73 → blue #4467A3) for continuous magnitude
    data'
  - 'Dual output: PNG as small-multiples facet grid + HTML with geom_livemap tile
    basemap (CARTO_POSITRON/MIDNIGHT_COMMANDER) — distinctively letsplot'
  - Cumulative data approach across 4 panels naturally shows the spreading aftershock
    sequence
  - Merged color+size legend with shared breaks (mag_breaks=[2,3,4,5,6]) avoids redundant
    legend entries
  - 'Full theme-adaptive chrome: all text, backgrounds, and borders adapt correctly
    to both light (#FAF8F1) and dark (#1A1A17) themes'
  - Dynamic title fontsize scaling for the long mandated title string
  - 'Realistic seismic dataset: Central California epicenter, exponential spread,
    plausible magnitude decay'
  weaknesses:
  - '''Epicenter'' text label overlaps data points in dense Week 4 and Week 6 panels
    — increase nudge_y from 0.22 to ~0.35 degrees lat, or add a semi-transparent background
    to the label'
  - Small multiples show only 4 snapshots (Week 1/2/4/6) — the HTML geom_livemap version
    still uses facet_wrap rather than any interactive time control; a tooltip showing
    timestamp/magnitude on hover would improve the HTML experience
  - 'DE-01: Design is above defaults but not publication-ready — the polygon basemap
    could be styled with a more subtle fill, and panel spacing could be more generous'
  - 'DE-03: The story of spreading aftershocks is clear from the cumulative data,
    but no annotation highlights the maximum spread or key transition between panels'
