review:
  strengths:
  - 'Full theme adaptation: all chrome tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied across light and dark renders — no dark-on-dark
    or light-on-light failures'
  - Correct anyplot imprint_seq colormap (low=#009E73, high=#4467A3) for continuous
    magnitude encoding
  - 'Idiomatic plotnine usage: coord_fixed for geographic proportions, ordered Categorical
    for deterministic facet order, geom_path with inherit_aes=False for the coastline
    layer'
  - Realistic and neutral dataset (California earthquake aftershocks) with plausible
    geographic coordinates and magnitude values
  - Title proportional scaling formula (12 × 67/len(title)) keeps the long title from
    overflowing
  weaknesses:
  - Only 6 timesteps; spec recommends 10–50 — increase to 12 for a richer temporal
    narrative
  - axis_text size=6 and axis_title size=8 are below style-guide recommended values
    (8pt ticks, 10pt axis labels) — increase to improve mobile legibility
  - Full panel_border on all 4 sides adds visual weight; consider removing top/right
    panel borders per style-guide spine convention
  - No epicenter marker in panels — adding a fixed reference point (geom_point for
    the M5.5 epicenter) would strengthen the storytelling and help viewers track the
    spreading pattern
