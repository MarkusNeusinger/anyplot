review:
  strengths:
  - Correct handling of animation limitation via small multiples — exactly the right
    plotnine approach per library rules
  - All theme-adaptive chrome correctly applied across both renders; no dark-on-dark
    failures in the dark render
  - 'imprint_seq continuous colormap (#009E73 → #4467A3) correctly used for magnitude
    encoding'
  - Ordered categorical ensures temporal facets appear in the correct sequence
  - coord_fixed(ratio=1.0) preserves geographic proportions — important for map-like
    visualizations
  - Multi-layer composition (coastline path + aftershock points + epicenter star)
    adds meaningful geographic context
  weaknesses:
  - Magnitude colorbar range extends to ~10+, which is physically impossible for aftershocks
    of an M5.5 main event — cap magnitude values below M5.5 using min(5.0, max(1.0,
    5.5 - i * 0.15 + np.random.exponential(0.8))) to yield a realistic 1–5 range
  - Facet strip labels at size=6 are very small and serve as the primary timestamp
    display required by the spec — increase strip_text size to 7 for better readability
