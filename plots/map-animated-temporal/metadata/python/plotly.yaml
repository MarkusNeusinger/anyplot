review:
  strengths:
  - 'Sophisticated theme-adaptive geographic styling: six separate color variables
    for land, ocean, borders, lakes, grid, and page background — all flip correctly
    between light and dark'
  - Compelling earthquake aftershock dataset with geophysically realistic spreading,
    decay, and exponential magnitude distribution
  - Double magnitude encoding (size + color) creates clear visual hierarchy that guides
    the viewer attention
  - Ghost trail effect (previous 2 days at 0.2 opacity) adds temporal depth without
    cluttering the map
  - Dynamic title font scaling prevents overflow for the long mandated title string
  - Correct use of imprint_seq for continuous magnitude data with properly bounded
    cmin/cmax
  weaknesses:
  - 'Slider tick labels font size not explicitly set — only color is specified in
    sliders[0].font, size defaults to Plotly global default. Fix: add size=10 to font=dict(color=INK_SOFT)'
  - 'Slight horizontal gap between map right edge and colorbar creates mild compositional
    imbalance. Fix: adjust colorbar.x or right margin to tighten spacing'
