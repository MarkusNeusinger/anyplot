review:
  strengths:
  - Correct use of facet_wrap small-multiples as the static animation fallback for
    ggplot2
  - Realistic earthquake aftershock data with Omori law decay — credible and narratively
    compelling
  - Dual encoding of magnitude via both color and size adds robustness
  - 'Correct imprint_seq colormap (#009E73 → #4467A3) for the continuous magnitude
    variable'
  - 'Full theme-adaptive chrome: all text and backgrounds flip correctly between light
    and dark renders'
  - Epicenter cross marker adds geographic reference context
  - Factor-ordered facet levels ensure correct Day 1 → Day 9 ordering
  - Code is clean, reproducible (set.seed(42)), and properly saves both themes
  weaknesses:
  - Tick label size (axis.text = 5pt) and strip label size (6.5pt) are below the 8pt
    recommended minimum; at mobile widths (~400px) these will be barely legible —
    raise to at least 7–8pt
  - No basemap or geographic background context (coastlines, country boundaries);
    the ggplot2 library guide notes sf/ggmap are out of scope, so this is an accepted
    library limitation, but still reduces spec completeness
  - Sparse later panels (Days 7–9 with 9–11 points) use a max point size of 3.2 —
    slightly small for very sparse scatter; could raise to ~4–5 for the lowest-density
    panels
  - Panel arrangement is 3×3 but the last row only has 3 panels while the spec recommends
    10–50 time steps; 9 days is at the lower bound — not a blocking issue but noted
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "map-animated-temporal · r · ggplot2 · anyplot.ai" in dark ink, centered, size 12pt, fully visible. Axis labels "Longitude" and "Latitude" in dark INK (#1A1A17). Tick labels (36°N–40°N, 140°E–144°E) in INK_SOFT (#4A4A44), rotated 45°, readable but small. Strip labels "Day N (n=XX)" in bold dark ink.
      Data: 3×3 facet grid showing earthquake aftershock scatter. Points colored via imprint_seq gradient (green #009E73 low magnitude → blue #4467A3 high magnitude), size proportional to magnitude. Epicenter cross (+) marked in dark ink in each panel. Colorbar legend titled "Mag" with scale 3–7.
      Legibility verdict: PASS — all text readable against light background; tick labels at 5pt are small but legible at full resolution; marginal at mobile width.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title in light #F0EFE8, fully readable. Axis labels in INK light (#F0EFE8). Tick labels in INK_SOFT (#B8B7B0), readable. Strip labels in light text on #242420 elevated background panels. Epicenter cross is white/light — correctly adapted from dark INK in light theme.
      Data: Identical data colors to light render — imprint_seq green-to-blue gradient unchanged. Points same size. No color drift. Legend same values, light text.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome correctly flipped; data colors identical to light render.
