review:
  strengths:
  - 'Complete clinical audiogram specification fulfilled: log x-axis, inverted y-axis,
    O/X markers with correct colors, per-ear connecting lines (solid/dashed), severity
    bands with labels, and speech range reference.'
  - 'Theme adaptation is thorough: severity band fills switch to dark-appropriate
    tints, all chrome tokens applied correctly throughout — both renders are fully
    readable.'
  - 'Semantic color exception correctly applied: #AE3030 (right/red) and #4467A3 (left/blue)
    are Imprint palette members used per clinical audiometric convention.'
  - Data storytelling via severity bands and speech range band immediately communicates
    clinical significance without annotations.
  - Code is clean, deterministic, and idiomatically plotnine throughout.
  weaknesses:
  - Speech range label (size=2.5 mm ≈ 7 pt) is quite small relative to severity band
    labels (3.5 mm); consider raising to 3.0 mm for proportional consistency.
  - Legend box with visible frame/border is slightly prominent; removing legend border
    via color=None in legend_background would improve visual refinement.
  - 'LM-02 limited: multi-scale merging and geom_rect bands are standard ggplot patterns;
    a more distinctively plotnine feature would further differentiate.'
  - Marker size=3.5 with 7 data points is adequate but not optimally prominent for
    sparse density; size=4.5–5.0 would better exploit the 2400×2400 canvas.
