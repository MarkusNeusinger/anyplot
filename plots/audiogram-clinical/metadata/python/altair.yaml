      Data: Six horizontal severity bands in Imprint palette at 15% opacity (green=Normal, lavender=Mild, blue=Moderate, ochre=Mod.Severe, red=Severe, cyan=Profound), distinguishable without obscuring markers. Right ear: matte-red (#AE3030) circles with solid line showing 4kHz notch at 65 dB. Left ear: blue (#4467A3) crosses with solid line showing 4kHz notch at 70 dB. All markers large (size=200) and clearly visible against bands. Band severity labels in italic INK_MUTED at right edge — legible but small.
      Legibility verdict: PASS — all text clearly readable against warm off-white background. Band labels slightly tight (9px) but not problematic at canvas size.

