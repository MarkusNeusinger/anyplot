      Data: First series (right ear) = #AE3030 (Imprint position 5, semantic red for right ear clinical convention). Second series (left ear) = #4467A3 (Imprint position 3, blue). Six severity bands use Imprint palette at 15% opacity. Classic 4 kHz noise-induced notch clearly visible. Unfilled circle markers (right) and cross markers (left) at size=200, strokeWidth=2.5.
