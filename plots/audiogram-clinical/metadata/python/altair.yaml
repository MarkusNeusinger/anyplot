review:
  strengths:
  - Semantic Imprint color exception correctly applied — red for right ear (#AE3030),
    blue for left ear (#4467A3) follows universally recognized audiology convention
    using actual Imprint palette members
  - Interactive legend selection with opacity condition is idiomatic Altair and adds
    genuine clinical utility (focus on one ear at a time)
  - Six severity bands at 15% opacity layer gracefully under data without obscuring
    markers; italic muted labels are appropriately unobtrusive
  - 'Perfect spec compliance: all clinical conventions met (inverted Y, log X, O/X
    symbols, severity zones, per-ear connection, kHz tick labels)'
  - Realistic noise-induced hearing loss pattern (4 kHz notch) tells a clear clinical
    story with severity bands providing immediate interpretation context
  weaknesses:
  - Right and left ear markers at 125 Hz and 250 Hz are only 5 dB HL apart, causing
    slight visual crowding at the low-frequency end where the data traces run close
    together
  - Severity band labels at fontSize=10 italic are at the low end of readability when
    the chart is viewed at mobile scale (~400 px); consider fontSize=11 or regular
    weight
  - LM-02 could be strengthened with a more Altair-distinctive technique such as a
    Vega-Lite calculate transform or a brush selection for frequency range highlighting
