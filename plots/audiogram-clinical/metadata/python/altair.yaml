review:
  strengths:
  - 'Clinically accurate audiogram with all required features: inverted Y-axis, logarithmic
    frequency scale, O/X symbols for right/left ears, and six severity bands'
  - Valid semantic exception for ear colors (red=right, blue=left) is universally
    recognized in audiology and properly documented in code
  - Severity bands use the Imprint palette at 15% opacity — visible without obscuring
    markers, and green=Normal/red=Severe provides intuitive gradient
  - 'Both themes render correctly: warm #FAF8F1 background on light, warm #1A1A17
    on dark, all chrome tokens properly adaptive'
  - 'Idiomatic Altair: layer composition, resolve_scale(color=independent), detail
    encoding for per-ear lines, labelExpr for kHz tick formatting, HTML + PNG dual
    output'
  - 'Perfect spec compliance: all seven required features present, correct data mapping,
    correct title and legend format'
  - Data depicts a realistic bilateral noise-induced hearing loss notch at 4 kHz with
    partial recovery at 8 kHz — clinically accurate and educational
  weaknesses:
  - Severity band label at x=7000 Hz places Mod. Severe text (~y=62.5 dB) very close
    to the left ear connecting line at that x-position — move labels to a fixed right-margin
    position using a text mark outside the chart x-domain, or shift x_label to 9000
    and clip=False, to avoid visual crowding with the 4k-8k data segment
  - 'Design aesthetics are functional but lack visual sophistication: the 4-sided
    view border (stroke around the full chart) makes it feel like a generic chart
    frame — consider removing the view stroke and relying on axis domain lines alone,
    or styling it as a subtle dashed border'
  - 'DE-01 needs lift: no explicit spine removal, no whitespace tuning beyond defaults,
    typography hierarchy is flat — remove top/right axis domain lines (configure_axis(domainOpacity=0)
    on top/right, or use configure_view(stroke=None)) to open up the chart visually'
  - 'LM-02 could use more Altair-distinctive features: consider adding an alt.selection_point()
    for ear hover highlighting, or use alt.condition() for emphasizing the notch region
    dynamically in the HTML output'
  - Band label font size of 9px is the smallest in the chart — at scale_factor=4 this
    renders at 36 source-px which is readable but tight; consider 10px to match tick
    label size
