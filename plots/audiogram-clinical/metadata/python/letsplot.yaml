review:
  strengths:
  - 'Perfect spec compliance — all required audiogram features present: inverted Y-axis
    (0 dB HL at top), logarithmic X-axis (125–8 kHz), clinical O/X marker shapes,
    six severity bands with labels, legend, and correctly-unitised axis titles.'
  - 'Clinically realistic data: noise-induced high-frequency sensorineural notch is
    a medically representative pattern, illustrated across both ears with slight asymmetry.'
  - Valid semantic color exception applied correctly — red (#AE3030, Imprint position
    5) for right ear, blue (#4467A3, Imprint position 3) for left ear follows universal
    audiometric convention; redundant shape encoding (O vs X) further aids CVD safety.
  - Both light and dark renders are theme-adaptive with all chrome tokens correctly
    applied; no dark-on-dark or light-on-light failures.
  - Clean, idiomatic lets-plot grammar-of-graphics code with proper KISS structure;
    uses scale_x_log10, scale_y_reverse, scale_fill_identity, and scale_alpha_identity
    idiomatically.
  weaknesses:
  - Severity band labels (geom_text size=3mm ≈ 8.5 pt) are small; at mobile widths
    (~400 px) they may be difficult to read — consider increasing to size=3.5–4mm
    for better mobile legibility.
  - 'Design excellence ceiling: the plot follows clinical convention faithfully but
    lacks a focal-point device (e.g., a subtle shaded region or annotation highlighting
    the 4k notch). A light call-out around the notch would elevate storytelling from
    ''displays data'' to ''tells the clinical story''.'
  - 'LM-02: the implementation uses grammar-of-graphics patterns available identically
    in plotnine or ggplot2; the lets-plot HTML export is used but no lets-plot-specific
    features (e.g., custom tooltip text showing ear/frequency/threshold) are exploited.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — confirmed, not pure white.
      Chrome: Title "audiogram-clinical · python · letsplot · anyplot.ai" in dark ink at top, clearly readable. Y-axis label "Hearing Level (dB HL)" and X-axis label "Frequency (Hz)" in dark text with appropriate sizes. Y-axis tick labels (-10 through 120 in 10 dB steps) and X-axis tick labels (125, 250, 500, 1k, 2k, 4k, 8k) are clearly readable in dark gray. Grid lines are subtle. Band labels ("Normal", "Mild", "Moderate", "Mod. Severe", "Severe", "Profound") on the right side of the plot area are small but legible. Legend box ("Right Ear", "Left Ear") on right side is readable.
      Data: Six horizontal severity bands from top to bottom: light green tint (Normal, -10–25 dB), light yellow-green (Mild, 25–40 dB), light orange (Moderate, 40–55 dB and Mod. Severe, 55–70 dB), light red (Severe, 70–90 dB), deeper red (Profound, 90–120 dB). Right ear: red (#AE3030) circle (O) markers connected by red solid line, showing normal hearing at low frequencies degrading to 70–75 dB at 4k–8k Hz. Left ear: blue (#4467A3) X markers connected by blue line, similar but slightly better at high frequencies. First data color is not #009E73 (valid semantic exception for clinical audiogram convention).
      Legibility verdict: PASS — all text fully readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — confirmed, not pure black.
      Chrome: Title in light/near-white text, clearly readable at top. Axis labels and tick labels in light gray tone, all readable against the dark background. Grid lines are subtle gray. Band labels ("Normal", "Mild", etc.) appear in muted light-gray tone, readable. Legend text "Right Ear" and "Left Ear" are readable in the legend box. No dark-on-dark failures detected — all chrome elements use light-colored tokens.
      Data: Severity band fill colors appear darker/more muted against the near-black background but retain their hue identity (green→olive at top, yellow-green, orange-browns in middle, dark red at bottom). Data series colors are identical to light render: right ear in red (#AE3030) circle markers, left ear in blue (#4467A3) X markers. The audiometric pattern (high-frequency loss) is clearly visible.
