review:
  strengths:
  - 'Perfect spec compliance: all clinical audiogram conventions (O/X symbols, inverted
    y-axis, log x-axis, kHz shorthand, severity bands) implemented exactly as specified'
  - Valid semantic exception for clinical ear colors (red=right, blue=left) using
    Imprint palette members (positions 5 and 3)
  - Hollow open-circle for right ear matches real audiological convention
  - 'Clean Bokeh idioms: BoxAnnotation for severity bands, Label for band text, FixedTicker
    with label overrides — no workarounds'
  - Full theme-adaptive chrome correctly wired through all elements
  - Data represents clinically recognizable high-frequency sensorineural notch pattern;
    neutral and realistic
  weaknesses:
  - 'In dark mode, the ''Profound'' severity band (#AE3030 at 13% alpha on #1A1A17
    background) is nearly invisible — matte-red at low alpha has insufficient contrast
    against near-black; increase dark-mode alpha to ~0.18-0.22 for Profound band'
  - In dark mode, the lavender 'Severe' band (#C475FD at 13% alpha) is disproportionately
    prominent relative to other bands, creating visual imbalance in the severity gradient;
    consider per-band alpha values based on each color's luminance on dark background
