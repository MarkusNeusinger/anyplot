    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "audiogram-clinical · python · bokeh · anyplot.ai" in dark ink, clearly readable. Axis labels "Frequency (Hz)" and "Hearing Level (dB HL)" in dark ink. Tick labels (−10 to 120 dB; 125/250/500/1k/2k/4k/8k Hz) in INK_SOFT, readable. Band labels (Normal, Mild, Moderate, Mod. Severe, Severe, Profound) in INK_MUTED on right margin, readable.
      Data: Right ear — red (#AE3030) hollow circles on solid line; Left ear — blue (#4467A3) × markers on dashed line. Both clearly distinguishable. Six severity bands with very subtle fills (9% alpha): green (Normal, top), lime (Mild), ochre (Moderate), amber (Mod. Severe), lavender (Severe), dark-red (Profound, bottom). Data first series is #AE3030 (semantic exception: clinical red for right ear).
