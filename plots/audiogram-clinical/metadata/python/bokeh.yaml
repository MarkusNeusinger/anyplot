review:
  strengths:
  - 'Correct clinical audiogram format: inverted Y-axis, logarithmic X-axis, O/X marker
    convention, solid/dashed line distinction between ears — all spec requirements
    met.'
  - 'Semantic color exception correctly applied (red=right, blue=left is mandatory
    clinical convention; both colors are Imprint palette members #AE3030 and #4467A3).'
  - Severity bands with right-margin labels provide immediate clinical interpretation
    context spanning Normal through Profound.
  - Theme adaptation is thorough — all chrome elements (title, axis labels, ticks,
    grid, legend) correctly switch between INK and INK_SOFT tokens in both light and
    dark renders.
  - 'Clean code: severity band loop avoids repetition; sys.path guard prevents bokeh.py
    self-import; PIL crop approach gives precise 2400x2400 output.'
  weaknesses:
  - '"Severe" band label (y=80 dB, x=9200 data units, right-aligned) overlaps the
    8k right-ear data marker at 80 dB in both renders. Fix: offset label y by +3-5
    dB, reduce font to 22pt, or set x=9800 with clip=False.'
  - Right margin (min_border_right=80) is tight for the 26pt severity band labels.
    Consider increasing to 120 to ensure no clipping at smaller viewport widths.
  - 'Severity band fills at fill_alpha=0.09 become very subtle on the dark background.
    Consider theme-adaptive alpha: 0.09 for light, 0.13 for dark to maintain distinguishability
    of bands.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface.
      Chrome: Title "audiogram-clinical · python · bokeh · anyplot.ai" in bold dark (#1A1A17) text, ~65% canvas width. Y-axis label "Hearing Level (dB HL)" and X-axis label "Frequency (Hz)" in dark ink. Tick labels in INK_SOFT gray. Grid lines at 15% alpha — subtle and unobtrusive. Legend top-right with ELEVATED_BG fill.
      Data: Six horizontal severity bands (green Normal, lime Mild, ochre Moderate, amber Mod. Severe, lavender Severe, red Profound) at 9% alpha. Right ear: red (#AE3030) open circle markers connected by solid line. Left ear: blue (#4467A3) X markers connected by dashed line. High-frequency sensorineural notch clearly visible (both ears drop sharply from 2k to 8k). Band labels on right margin in INK_MUTED gray. Minor overlap: "Severe" label collides with 8k right-ear marker at 80 dB.
      Legibility verdict: PASS — all text readable against light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title and all axis labels in light cream (#F0EFE8). Tick labels in INK_SOFT (#B8B7B0). Grid lines subtle on dark surface. Legend uses elevated dark fill (#242420). All chrome elements correctly adapted to dark theme — no dark-on-dark failures.
      Data: Severity band fills appear as subtle dark-tinted horizontal regions (same hex colors at 9% alpha, slightly harder to distinguish on dark background but positions and labels remain clear). Data series colors identical to light render: red circles for right ear, blue X markers for left ear. Band labels in muted gray (#A8A79F) readable against dark background.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark issues observed.
