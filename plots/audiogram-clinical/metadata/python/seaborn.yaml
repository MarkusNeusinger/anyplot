review:
  strengths:
  - 'Perfect clinical audiogram spec compliance: inverted y-axis, log x-axis, O/X
    markers, solid/dashed lines, severity bands with right-margin labels all correctly
    implemented'
  - Triple redundant encoding (color + shape + linestyle) is excellent for accessibility
    and CVD safety
  - Theme-adaptive severity band alpha (0.09 light / 0.16 dark) shows careful dual-theme
    design
  - Hollow open-circle markers via markerfacecolor=PAGE_BG elegantly follows clinical
    convention
  - blended_transform_factory for right-margin band labels is a sophisticated matplotlib
    technique
  - Full spec compliance with realistic medically-accurate audiometric data showing
    noise-induced sensorineural notch
  weaknesses:
  - Seaborn plot API unused -- ax.plot() (matplotlib) used instead of sns.lineplot().
    Replace both ax.plot() calls with sns.lineplot(x=..., y=..., color=..., linewidth=...,
    linestyle=..., marker=..., markersize=..., markerfacecolor=..., markeredgecolor=...,
    markeredgewidth=..., label=..., ax=ax) to be idiomatic seaborn and boost LM-01/LM-02.
  - Large empty canvas area from ~75-120 dB (Severe + Profound bands) where no data
    falls creates visual imbalance. Consider trimming ax.set_ylim to 90 or 95 dB HL,
    or adding a brief annotation about the audiometric pattern in the empty region.
  - Replace manual ax.spines[...].set_visible(False) spine calls with seaborn idiomatic
    sns.despine(ax=ax).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 -- correct light surface
      Chrome: Title "audiogram-clinical · python · seaborn · anyplot.ai" in dark ink at 12pt, clearly readable. Axis labels "Frequency (Hz)" and "Hearing Level (dB HL)" in dark ink at 10pt. Tick labels at 8pt (x: 125, 250, 500, 1k, 2k, 4k, 8k; y: -10 to 120 in 10 dB steps). Band labels "Normal", "Mild", "Moderate", "Mod. Severe", "Severe", "Profound" in italic muted ink at 7pt in right margin. Legend at lower left with cream elevated background.
      Data: Dark red (#AE3030) solid line with hollow open-circle (O) markers for right ear; blue (#4467A3) dashed line with X markers for left ear. Six horizontal severity band fills using Imprint palette colors at alpha=0.09. Both series show high-frequency sensorineural notch pattern (thresholds normal at 125-500 Hz, rising steeply at 2k-8k Hz).
      Legibility verdict: PASS -- all text clearly readable against light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 -- correct dark surface
      Chrome: Title and axis labels in light cream (#F0EFE8) text, clearly readable. Tick labels in lighter ink (#B8B7B0). Band labels visible in muted light italic text. Legend box uses dark elevated background (#242420). Grid lines subtle.
      Data: Colors identical to light render -- dark red (#AE3030) right ear, blue (#4467A3) left ear. Severity band fills appear darker (alpha=0.16 over dark surface) but distinctly different zones are still visible: deep teal (Normal), dark khaki (Mild), muddy brown (Moderate), dark amber (Mod. Severe), dark maroon (Severe), dark rose (Profound).
      Legibility verdict: PASS -- no dark-on-dark failures. All chrome uses light tokens correctly against the dark background.
