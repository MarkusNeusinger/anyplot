review:
  strengths:
  - 'Perfect semantic color application: Imprint palette positions 3 and 5 correctly
    match the universal audiogram convention (red-right, blue-left) with full style
    guide compliance.'
  - xref=paper severity band pattern elegantly spans full plot width independent of
    data range; right-margin annotation placement at x=1.01 is an advanced plotly
    idiom.
  - Triple redundant encoding (color + marker symbol + line style) makes the two-ear
    distinction CVD-safe and unambiguous.
  - 'Realistic noise-induced 4 kHz notch data tells the full clinical story: normal
    low-frequency hearing to progressive high-frequency loss to peak at 4 kHz to partial
    recovery at 8 kHz.'
  - Full theme-adaptive chrome with all INK/INK_SOFT/INK_MUTED/GRID tokens properly
    threaded through every element; both renders fully legible.
  weaknesses:
  - 'DE-01 falls short of strong design: title lacks bold weight and the typographic
    hierarchy is standard — a bolder title (weight=bold, fontsize=18) would push the
    sophistication score higher.'
  - 'LM-02: The interactive HTML output does not use hovertemplate to display exact
    dB HL thresholds on hover — a natural plotly-distinctive feature for a clinical
    tool where precision matters.'
  - Severity band annotation size at 10px is at the minimum; increasing to 11px would
    improve mobile readability without crowding the right margin.
