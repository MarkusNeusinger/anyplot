review:
  strengths:
  - Y-axis inversion implemented correctly using data negation with absolute-value
    y_label dicts — a clean solution within pygal's constraints.
  - Semantic exception for audiology color convention (red/blue per ear) correctly
    applied and documented in code comments.
  - 'Full dual-theme support: background, ink, muted tokens all correctly flipped
    in both renders with no dark-on-dark failures.'
  - Sensorineural 4 kHz notch data is clinically authentic and realistic.
  - Square 2400x2400 canvas correctly chosen for audiogram's square aspect requirement.
  - Both .png and .html outputs saved, providing interactive output.
  - Deterministic hardcoded data, clean flat code structure.
  weaknesses:
  - 'X-axis is categorical (equal spacing) rather than logarithmic as explicitly required.
    Spec defines log-frequency axis as a defining audiogram feature. Fix: use pygal.XY()
    with log-scaled numeric x-positions and custom x-tick labels mapping to 125, 250,
    500, 1k, 2k, 4k, 8k.'
  - 'Severity bands are dashed boundary lines only — spec requires shaded horizontal
    fill bands labeled Normal/Mild/Moderate/Severe/Profound across the full plot width.
    Fix: use filled pygal.Line series between band boundaries with alpha-transparent
    INK_MUTED fills.'
  - 'Left ear markers are circular dots identical to right ear — spec requires cross
    (X) marker shape for left ear. Fix: add text-label annotations at each left-ear
    point with x characters or explore pygal.XY node styling.'
  - 'Legend severity labels are truncated (''Normal / Mild (25 …'') causing information
    loss. Fix: shorten labels to ''Normal (<=25)'', ''Mild (26-40)'', etc., or label
    bands directly on the plot.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "audiogram-clinical · python · pygal · anyplot.ai" in dark text, ~70-75% canvas width, readable. Y-axis label "Hearing Level (dB HL)" and X-axis label "Frequency (Hz)" both dark and readable. Tick labels (0–120 on Y; 125–8k on X) all visible and readable. Legend at bottom shows Right Ear (O) and Left Ear (X) plus truncated severity labels.
      Data: Red line (#AE3030) for right ear, blue line (#4467A3) for left ear — both showing circular dot markers. High-frequency sensorineural notch at 4k Hz clearly visible. Five dashed muted gray severity boundary lines at 25, 40, 55, 70, and 90 dB HL.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface.
