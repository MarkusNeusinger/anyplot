review:
  strengths:
  - Stacked fill technique for severity bands is clever and idiomatic — using fill=True
    with layered series from deepest-to-shallowest correctly exposes each band in
    its own color range
  - 'Dual-theme adaptation is fully implemented: PAGE_BG, INK, INK_MUTED all correctly
    flip, and dark-variant band fill colors prevent white-on-dark issues'
  - Negated y-axis technique is a clean workaround for pygal's lack of a native inverted-axis
    option, and the custom y_label_items correctly display absolute dB HL values
  - Semantic color exception for clinical convention (red right ear / blue left ear)
    is valid and well-documented in the code
  - Data represents a realistic bilateral 4kHz noise-induced sensorineural notch;
    clinically plausible thresholds in both ears
  - All 6 severity bands are present with correct dB HL boundaries and labeled in
    the bottom legend
  - 'Code quality is excellent: deterministic data, clean imports, no unnecessary
    abstractions, both PNG and HTML outputs saved correctly'
  weaknesses:
  - Left ear uses circular dot markers identical to the right ear — the spec explicitly
    requires cross (X) markers for the left ear as part of the standardized audiogram
    convention; even if pygal's native dot is a circle, the left ear series should
    use a different visible shape (pygal supports custom dot_size and stroke_style
    but not native X shapes — consider rendering 'x' SVG symbols via custom value_formatter
    or adding a separate annotation layer)
  - 'Severity band colors in dark mode (#2A1818 through #182A22) are extremely low-contrast
    against the #1A1A17 background — the bands are nearly invisible in the dark render,
    making the clinical severity zones unreadable on dark theme; the dark palette
    needs higher-contrast muted fills'
  - 'Band fill colors use fully custom hex values (e.g. #E8C8C8, #EDD6C0) not drawn
    from the Imprint palette or semantic anchors — this violates the ''no custom hexes''
    palette rule; consider using alpha-blended versions of Imprint palette members
    or the muted/neutral anchors for background zones'
  - legend_font_size=36 is below the style-guide recommended 44 for pygal; the bottom
    legend entries read small at thumbnail size — increase to 44
  - Y-axis range starts at 0 dB HL but the spec recommends -10 dB HL as the top value
    so that better-than-average hearing can be shown; extend the range to (-120, 10)
    and add a -10 label
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct; matches spec
      Chrome: Title "audiogram-clinical · python · pygal · anyplot.ai" in dark ink, clearly readable; y-axis title "Hearing Level (dB HL)" and x-axis title "Frequency (Hz)" in dark ink, both readable; y-axis tick labels (0, 10, 20 ... 120) and x-axis tick labels (125, 250, 500, 1k, 2k, 4k, 8k) in muted ink, clearly legible
      Data: Six horizontal severity bands visible — green/teal at top (Normal), warming through mild/moderate tones to pink/red at bottom (Profound); red line (Right Ear) starts at ~10 dB HL and shows a characteristic 4kHz notch reaching ~65 dB HL; blue line (Left Ear) mirrors the pattern shifted slightly lower (~55 dB HL at 4kHz); both lines have small circular dot markers; bottom legend shows all 6 bands and two ear series with color swatches
      Legibility verdict: PASS — all text is clearly readable against warm off-white background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct; matches spec
      Chrome: Title in light/cream ink, clearly readable; axis labels and tick labels in light muted ink, readable; legend text at bottom readable but small
      Data: Ear line colors (red for right, blue for left) are IDENTICAL to light render — correct; the 4kHz notch pattern is still clearly visible in both lines; HOWEVER the severity band fills in dark mode are extremely low-contrast (#2A1818 through #182A22 against #1A1A17 background) — the band transitions are barely distinguishable from the near-black background, making the clinical severity zones effectively invisible in dark theme
      Legibility verdict: PASS for chrome text (no dark-on-dark failures); PARTIAL FAIL for severity bands — they are nearly invisible in dark mode, undermining the clinical interpretability of the chart in dark theme
