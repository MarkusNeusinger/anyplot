review:
  strengths:
  - Perfect spec compliance — inverted y-axis, logarithmic x-axis, correct audiometric
    symbols (O/X), severity bands with labels, all required clinical conventions respected
  - 'Semantic palette exception correctly applied and documented — red/blue ear convention
    is the international clinical standard; uses Imprint #AE3030 and #4467A3 rather
    than custom hexes'
  - Excellent ggplot2 idiomatic usage — unified multi-scale legend, coord_cartesian
    for OOB safety, shape_manual for clinical symbols, correct scale_y_reverse + coord_cartesian
    combination
  - Dual-theme adaptation is clean — both renders readable; chrome tokens correctly
    threaded through all elements including panel border, legend frame, and severity
    band labels
  weaknesses:
  - library(dplyr) imported but unused — only base R functions are used in the data
    construction; remove to satisfy CQ-03
  - Severity band annotation labels at size=3.0 are at the lower legibility boundary
    when the 2400x2400 canvas is scaled to mobile widths (~400px) — consider increasing
    to size=3.5
  - The data shows monotone high-frequency sloping loss (thresholds worsen from 4k
    to 8k) rather than a true 4 kHz notch with partial recovery at 8k; the code comment
    says 'notch at 4 kHz' — minor discrepancy between comment and data pattern
  image_description: |-
