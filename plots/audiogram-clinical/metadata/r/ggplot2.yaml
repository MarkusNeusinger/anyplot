      Data: Right ear — matte red #AE3030 open circle (O) markers, solid line. Left ear — blue #4467A3 cross (X) markers, dashed line. Data colors are Imprint palette with documented semantic exception for clinical convention. Severity bands: green (#009E73) for Normal, amber (#DDCC77) for Mild, ochre (#BD8233) for Moderate/Mod. Severe, red (#AE3030) for Severe/Profound — all at BAND_ALPHA=0.12 fill opacity.
