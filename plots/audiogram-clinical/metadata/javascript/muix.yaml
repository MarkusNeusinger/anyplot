review:
  strengths:
  - 'Excellent spec compliance: inverted y-axis, log x-axis, custom O/X marks, severity
    bands, legend, and solid/dashed line distinction all correctly implemented'
  - 'Expert MUI X usage: custom marks via the slots API and SVG overlays using useDrawingArea
    + useYScale hooks from @mui/x-charts/hooks — genuinely distinctive library features'
  - 'Valid semantic exception for clinical red/blue convention using Imprint palette
    colors (#AE3030 matte red for right ear, #4467A3 blue for left ear) with additional
    redundant encoding (shape + linestyle) for CVD safety'
  - Severity bands correctly drawn with ASHA grading regions (Normal/Mild/Moderate/Mod.
    Severe/Severe/Profound) at appropriate alpha values that don't obscure data
  - Realistic occupational health scenario (noise-induced high-frequency sensorineural
    notch) with audiometrically correct threshold values and standard frequency range
  weaknesses:
  - 'Minor overlap: ''Severe'' band label positioned at right edge (~80 dB HL y-position)
    overlaps with the 8k Hz data markers for both ears (right=80 dB, left=75 dB) —
    consider shifting label to a slightly higher y or using a wider right margin'
  - All 4 axis spines remain visible (MUI X default); removing the top and right spines
    via sx would improve visual refinement (DE-02)
  - Severity band labels at fontSize=11 CSS px are the smallest text in the chart
    — bumping to 12-13 px would improve legibility at mobile-scaled widths (VQ-01)
  - Duplicate header block in file (lines 1-4 new header + line 5 directive + lines
    6-10 old header) — CI artifact from the directive not being on line 1 of the original
    file; functionally harmless but messy
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — never pure white.
      Chrome: Title "audiogram-clinical · javascript · muix · anyplot.ai" in dark ink, centered above the drawing area. Y-axis label "Hearing Level (dB HL)" rotated on the left in dark ink. X-axis label "Frequency (Hz)" at the bottom in dark ink. Tick labels (−10 to 120 on y-axis, 125/250/500/1k/2k/4k/8k on x-axis) in inkSoft color. All text is clearly readable against the light background.
      Data: Right ear (red #AE3030) solid line with open circle markers (O); left ear (blue #4467A3) dashed line with X markers. Six horizontal severity bands from top to bottom: Normal (green tint), Mild (blue tint), Moderate (ochre tint), Mod. Severe (ochre tint, denser), Severe (red tint), Profound (red tint, denser). Band labels on right edge at 11 CSS px. Legend in top-right corner: "Right Ear (O)" and "Left Ear (X)" with color swatches. Both series show a typical high-frequency sensorineural notch with thresholds worsening from 500 Hz onward.
      Legibility verdict: PASS — all text readable. Minor proximity between "Severe" label and 8k Hz data markers at the right edge.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — never pure black.
      Chrome: Same title, axis labels, and tick labels now rendered in light ink (F0EFE8 / B8B7B0 adaptive tokens). All text is clearly readable against the dark background. No dark-on-dark failures observed — the implementation correctly threads t.ink and t.inkSoft tokens through to all text elements.
      Data: Data colors are IDENTICAL to the light render — right ear #AE3030 (solid + circles) and left ear #4467A3 (dashed + X marks) are unchanged. Severity bands retain the same hex colors at the same alpha values; they appear slightly more vibrant against the dark background. Legend and title remain clearly legible.
      Legibility verdict: PASS — all text readable in dark theme. The ThemeProvider correctly handles chrome adaptation; no dark-on-dark issues detected.
