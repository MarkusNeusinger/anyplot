review:
  strengths:
  - Custom SVG O/X clinical markers via MUI X slots.mark API — idiomatic and visually
    accurate to clinical audiogram convention
  - Severity bands rendered via useDrawingArea + useYScale hooks — advanced MUI X
    composition keeping everything in the chart coordinate system
  - 'Clinical color convention (red right, blue left) correctly applied using Imprint
    palette members (#AE3030, #4467A3) with explicit semantic justification'
  - Dashed left-ear line provides redundant encoding beyond color for CVD accessibility
  - Theme-adaptive band labels using t.inkSoft token adapt correctly to both light
    and dark renders
  weaknesses:
  - 'X-axis uses scaleType: point (equal frequency spacing) instead of logarithmic.
    The spec requires a logarithmic frequency axis. MUI X LineChart supports scaleType:
    log — replace scaleType: point with scaleType: log and restructure series data
    as x/y pairs.'
  - Severity band label Severe is spatially crowded with the 8k Hz data markers on
    the right edge. Reducing band label font to 11px or adding right offset to data
    would reduce crowding.
  - 'No spine removal — all four borders visible. Optional but recommended: remove
    top/right spines via sx prop for improved visual refinement.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "audiogram-clinical · javascript · muix · anyplot.ai" centered at ~22px, readable. X-axis label "Frequency (Hz)" and Y-axis label "Hearing Level (dB HL)" at 16px, both clearly visible. Tick labels at 14px, readable. Severity band labels at 13px on right edge, small but readable.
      Data: Right ear matte-red (#AE3030) solid line with open circle (O) markers. Left ear Imprint-blue (#4467A3) dashed line with X markers. Six severity bands (Normal=green tint, Mild=blue tint, Moderate=ochre tint, Mod.Severe=deeper ochre, Severe=red tint, Profound=stronger red) as low-alpha filled rectangles.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title and axis labels render in light ink (theme-adaptive via ThemeProvider), clearly readable. Tick labels and band labels use inkSoft which adapts to dark theme. No dark-on-dark failures observed.
      Data: Colors identical to light render — matte red for right ear, Imprint blue for left ear. Severity bands visible with slightly more subdued appearance on dark surface but still distinguishable.
      Legibility verdict: PASS — all text readable against dark background. No dark-on-dark issues detected.
