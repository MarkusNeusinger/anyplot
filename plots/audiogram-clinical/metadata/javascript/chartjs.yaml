review:
  strengths:
  - Full spec compliance — inverted y-axis, logarithmic x-axis, O/X markers, severity
    bands, and correct legend all correctly implemented
  - 'Excellent semantic color exception: Imprint palette members #AE3030 (right ear)
    and #4467A3 (left ear) correctly match the universal audiological red/blue convention,
    documented clearly in code'
  - 'Advanced Chart.js usage: custom severity band plugin (beforeDraw/afterDatasetsDraw),
    afterBuildTicks for forced audiometric tick positions, and log scale with Hz→kHz
    label callbacks'
  - 'Right ear circles rendered hollow via pointBackgroundColor: t.pageBg — correctly
    emulates the clinical O symbol in both light and dark themes'
  - 'Full theme adaptivity: all chrome (title, axis labels, ticks, grid, severity
    band text) uses t.ink / t.inkSoft / t.pageBg tokens; data colors are identical
    across themes'
  weaknesses:
  - 'DE-01 moderate (5/8): design is clinically appropriate but not publication-exceptional
    — the chart area border (Chart.js default) is retained; removing or muting it
    would add polish'
  - 'DE-02 moderate (4/6): subtle refinements missing — chart area border still visible;
    consider borderColor: ''transparent'' or a very faint border matching t.grid'
  - 'Severity band fills in dark mode appear somewhat muddy: the amber/ochre bands
    (Mild, Moderate, Mod. Severe) blend with the dark background making them hard
    to distinguish from each other; slightly higher opacity or dark-mode-specific
    fills would help legibility in that range'
  - 'DE-03 moderate (4/6): the data storytelling is effective but relies entirely
    on the severity bands; adding a brief annotation calling out the ''notch'' pattern
    (e.g., a callout at 4k Hz) would elevate it to publication quality'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct.
      Chrome: Title "audiogram-clinical · javascript · chartjs · anyplot.ai" visible in dark ink at top, spanning ~60% of width. Axis titles "Frequency (Hz)" (x) and "Hearing Level (dB HL)" (y) clearly readable in dark text at fontsize 16. Tick labels (125, 250, 500, 1k, 2k, 4k, 8k on x; -10 to 120 in steps of 10 on y) readable at fontsize 14. Severity band labels (Normal, Mild, Moderate, Mod. Severe, Severe, Profound) rendered in right margin using inkSoft — all readable. Legend shows "Right Ear (O)" with circle/red and "Left Ear (X)" with crossRot/blue, both clearly readable.
      Data: Right ear plotted with red (#AE3030) solid line with hollow circle markers (pointBackgroundColor = pageBg), sloping from ~15 dB HL at 125 Hz down to 80 dB HL at 8k Hz. Left ear plotted with blue (#4467A3) dashed line with X (crossRot) markers, sloping from ~10 dB HL down to 70 dB HL — parallel pattern, slightly less severe than right ear. Severity bands: teal/green (Normal, -10–25), amber (Mild, 25–40), ochre (Moderate, 40–55), darker ochre (Mod. Severe, 55–70), light red (Severe, 70–90), deeper red (Profound, 90–120). Band fills are translucent and do not obscure markers. Grid lines subtle (t.grid token). Y-axis inverted (0 at top, 120 at bottom). X-axis logarithmic.
      Legibility verdict: PASS — all text fully readable against light background; no "light on light" failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct.
      Chrome: Title in light ink clearly visible. Axis titles and tick labels in inkSoft (lighter grey) — all readable against dark background. Severity band labels in right margin rendered in inkSoft (light grey) — readable. Legend labels in light ink — readable. No dark-on-dark failures observed.
      Data: Data colors are identical to light render — right ear #AE3030 (red), left ear #4467A3 (blue). Hollow circle effect on right ear correctly adapts since pointBackgroundColor = t.pageBg which becomes #1A1A17 in dark mode. Severity band fills rendered correctly; the teal normal band and red severe/profound bands are clearly distinguishable; the amber/ochre middle bands (Mild, Moderate, Mod. Severe) appear somewhat muddy/similar in the dark render due to low-opacity fills blending with the dark background — still distinguishable but less crisp than light render.
      Legibility verdict: PASS — all text readable; data colors identical to light render; no dark-on-dark failures.
