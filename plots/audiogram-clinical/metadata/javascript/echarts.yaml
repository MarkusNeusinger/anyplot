review:
  strengths:
  - 'Full spec compliance: every required audiogram feature correctly implemented
    (inverted y-axis, audiometric frequency categories, O/X markers, six severity
    bands with labels, legend, axis titles)'
  - Clinically correct and well-documented semantic color exception (Imprint palette[4]
    red / palette[2] blue) with code comment explaining the reasoning
  - Effective use of ECharts markArea for severity band region shading with integrated
    inline band labels — idiomatic and avoids a separate annotation pass
  - Custom SVG path:// for the X marker adds visual distinctiveness within ECharts'
    symbol system
  - 'Perfect code quality: flat script, hard-coded deterministic data, clean constant
    naming, no unnecessary abstractions'
  weaknesses:
  - Severity band labels use fontSize 11 (22 source-px), the smallest text in the
    chart; may become difficult to read when scaled to mobile width (~400 px) — increase
    to fontSize 12–13
  - All four plot-area spines visible; removing top and right spines would improve
    visual refinement in line with anyplot style
  - 'The concave-polygon crossPath (4-pointed star shape) approximates a clinical
    X but would read more precisely as an X cross using a simpler path: "path://M-8,-8
    L8,8 M8,-8 L-8,8" with a thicker stroke — more faithful to clinical O/X convention'
  - 'Bottom margin (grid.bottom: 120) accommodates axis name and legend but feels
    tight; increasing to 140 would add breathing room between the x-axis name and
    legend items'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "audiogram-clinical · javascript · echarts · anyplot.ai" bold and centered — readable. Y-axis name "Hearing Level (dB HL)" and x-axis name "Frequency (Hz)" in t.ink color — readable. Tick labels in t.inkSoft — readable. Severity band labels at 11 CSS px (22 source-px) at upper-right of each band — readable but small.
      Data: Red (#AE3030) solid line with hollow circle (O) markers for right ear; blue (#4467A3) dashed line with 4-pointed star (X approximation) markers for left ear. Six severity band fills: Normal (green tint), Mild (ochre tint), Moderate (yellow tint), Mod.Severe (lavender tint), Severe (red tint), Profound (blue-gray tint). First series uses Imprint #AE3030 as semantic exception (clinical convention: right=red).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface
      Chrome: Title in near-white (t.ink for dark theme) — readable. Axis names and tick labels in light gray (t.inkSoft for dark theme) — readable. Severity band labels in light gray — readable. No dark-on-dark failures detected.
      Data: Red and blue data colors are identical to the light render (only chrome flips). Severity band rgba fills overlay on dark background and remain distinguishable by hue. Legend items clearly visible.
      Legibility verdict: PASS
