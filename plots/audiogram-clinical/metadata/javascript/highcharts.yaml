review:
  strengths:
  - Custom xcross SVG symbol registration via Highcharts.SVGRenderer.prototype.symbols
    correctly implements the clinical X marker convention — a deep Highcharts API
    feature requiring specialized knowledge
  - 'Semantic color exception cleanly justified and correctly executed: #AE3030 (Imprint
    slot 5) and #4467A3 (slot 3) match clinical audiogram conventions mandated by
    the spec'
  - Triple redundant encoding (hue + marker shape + line style) achieves excellent
    CVD accessibility without sacrificing visual clarity
  - Theme-adaptive band alpha (0.07 dark vs 0.09 light) prevents severity bands from
    overwhelming the near-black background
  - Medically accurate NIHL pattern with both ears reaching different severity zones
    provides a complete, informative clinical example
  weaknesses:
  - 'Design Excellence ceiling: aesthetic is correct but could reach publication polish
    with slightly more intentional typography hierarchy and a refined legend layout
    — fine-tune spacing between severity band labels and right margin'
  - 'LM-02 opportunity: xcross symbol and plotBands are good; adding plotLines at
    the normal-hearing boundary (25 dB HL) or a responsive.rules block would push
    into distinctively-Highcharts territory'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface
      Chrome: Title "audiogram-clinical · javascript · highcharts · anyplot.ai" in dark bold text, clearly readable. Y-axis labels (-10 to 120 dB HL) in #4A4A44, readable. X-axis tick labels (125, 250, 500, 1k, 2k, 4k, 8k) at 14px CSS, readable. Axis titles "Frequency (Hz)" and "Hearing Level (dB HL)" at 16px, readable. Severity band labels (Normal, Mild, Moderate, Mod. Severe, Severe, Profound) in italic 13px on the right side, readable. Legend at bottom shows Right Ear (O) and Left Ear (X).
      Data: Right ear solid red (#AE3030) line with open circle markers; left ear dashed blue (#4467A3) line with X-shaped markers. Six severity bands from Normal (light green) to Profound (deep red). High-frequency sensorineural notch pattern descending sharply at 4-8 kHz. First series is #AE3030 (semantic exception valid: clinical standard mandates red for right ear).
      Legibility verdict: PASS — all text readable against the warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface
      Chrome: Title, axis labels, tick labels, band labels, and legend all flip to light text (#F0EFE8 / #B8B7B0). All readable against dark background. No dark-on-dark failures observed. Severity band labels on right side remain readable.
      Data: Data colors are identical to the light render — Right Ear in #AE3030 (matte red), Left Ear in #4467A3 (blue). The custom xcross markers and open circles remain fully visible. Severity bands use lower alpha (0.07 vs 0.09 in light) making them more subtle on the dark surface while still distinguishable (Normal = dark teal, Mild/Moderate = dark ochre, Severe/Profound = dark red).
      Legibility verdict: PASS — all text readable against the near-black background; no dark-on-dark failures
