review:
  strengths:
  - Perfect spec compliance — inverted Y axis, logarithmic X axis, conventional O/circle
    marker for right ear and custom xcross SVG symbol for left ear, all 6 severity
    bands with inline labels, dashed line for left ear, correct axis titles — every
    required feature implemented correctly
  - Excellent Highcharts library mastery — custom SVGRenderer.prototype.symbols.xcross
    to render a true X-shaped marker, yAxis.plotBands with inline band labels, type:'logarithmic'
    xAxis, yAxis.reversed, and tick formatter producing kHz shorthand (1k, 2k, 4k,
    8k)
  - 'Semantic color exception correctly applied — Imprint palette members used (matte
    red #AE3030 for right ear, blue #4467A3 for left ear) respecting the universal
    clinical audiology convention, not arbitrary custom hexes'
  - Redundant triple encoding — shape (circle vs X), color (red vs blue), and line
    style (solid vs dashed) all distinguish the two ears simultaneously, maximizing
    accessibility and clarity
  - Deterministic, clinically realistic data showing a typical high-frequency SNHL
    notch; animation and tooltip both disabled for clean static rendering
  weaknesses:
  - Band labels (11px italic) are small relative to the 2400x2400 canvas — 11 CSS
    px × DPR2 = 22 native px, which becomes marginal when the image is displayed at
    reduced sizes; increase to 13–14px for safer readability at thumbnail scale
  - No spine removal — Highcharts renders a 4-sided box border around the plot area;
    remove with chart.plotBorderWidth:0 and drop xAxis.lineColor/yAxis.lineColor to
    form an L-shaped frame per the style guide default
  - Dark-mode severity bands are visually heavy — Profound band at alpha=0.30 and
    Severe at alpha=0.22 create saturated dark-red areas on the near-black background;
    reduce maximum dark-mode alpha by ~0.06 to keep bands subtle and non-distracting
  - Data thresholds do not enter the Profound zone (>90 dB) — one of the six shaded
    bands has no data passing through it; extending at least one series to 95–100
    dB at 8 kHz would demonstrate all severity bands with actual threshold data
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct surface.
      Chrome: Title "audiogram-clinical · javascript · highcharts · anyplot.ai" at 22px bold is clearly readable in near-black ink. Y-axis label "Hearing Level (dB HL)" and X-axis label "Frequency (Hz)" at 16px are readable. Tick labels at 14px (125, 250, 500, 1k, 2k, 4k, 8k on X; -10 to 120 in steps of 10 on Y) are all legible. Band labels (Normal, Mild, Moderate, Mod. Severe, Severe, Profound) at 11px italic on the right side are readable at full resolution but are the smallest text element. Legend at bottom ("Right Ear (O)", "Left Ear (X)") is clearly readable. Full 4-sided border visible around the plot area.
      Data: Right Ear in matte red (#AE3030) with solid line and open circle markers (radius 8). Left Ear in blue (#4467A3) with dashed line and X-shaped cross markers. Six horizontal severity bands from top to bottom: Normal (light teal green), Mild (pale amber), Moderate (light ochre), Mod. Severe (medium ochre), Severe (light rose-red), Profound (stronger rose-red). The high-frequency SNHL notch pattern is clearly visible — both ears show good hearing at low frequencies (10–15 dB HL at 125–500 Hz) and progressively worse hearing at high frequencies (65–80 dB HL at 4–8 kHz). Both series remain within Severe range; Profound band contains no data.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title visible in light cream text, clearly readable. Axis labels and tick labels use inkSoft (#B8B7B0 for dark theme) and are readable against the dark background. Band labels on the right in same inkSoft color are readable. Legend at bottom is readable. No dark-on-dark text failures detected.
      Data: Series colors are identical to the light render — matte red for Right Ear, blue for Left Ear. Severity bands use the same rgba palette colors but appear more pronounced on the dark background: Normal zone is a dark teal overlay, Mild is olive/khaki, Moderate and Mod. Severe are darker brownish tones, Severe and Profound are dark red. The bands are visually heavier than in the light render (especially Profound at alpha=0.30). Data lines and markers remain clearly distinguishable from the banded background. No chrome/data confusion.
      Legibility verdict: PASS — all text readable against near-black background; band fills are heavier than ideal in dark mode but do not obstruct readability.
