review:
  strengths:
  - 'Perfect spec compliance: all clinical audiogram conventions (inverted axis, log
    frequency, O/X markers, solid/dashed lines, severity bands, clinical colors) faithfully
    implemented'
  - Excellent semantic color choice — Imprint matte red and blue correctly applied
    as clinical convention exceptions for right/left ear
  - Redundant encoding (shape + color) for CVD accessibility is exemplary — fully
    CVD-safe
  - Clinically realistic sensorineural notch data with appropriate ear asymmetry
  - Clean, linear D3 code structure using idiomatic patterns (scaleLog, d3.line, tickValues,
    tickFormat)
  weaknesses:
  - Severity band labels set at 12px CSS — too small for 2400px canvas; bump to 13–14px
  - 'Dark mode severity bands too heavy: 2× opacity multiplier creates muddy oversaturated
    fills; reduce to ~1.5× for lighter elegant bands'
  - Right ear circle markers in dark mode use t.pageBg (near-black fill) which blends
    with dark severity band backgrounds — use t.elevatedBg (#242420) instead for contrast
  - 'LM-01: X markers via raw SVG line pairs; use d3.symbol().type(d3.symbolCross)
    for more idiomatic D3'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "audiogram-clinical · javascript · d3 · anyplot.ai" bold at top (~62% width); axis labels "Frequency (Hz)" and "Hearing Level (dB HL)" at 16px with units; tick labels at 14px; legend at 14px — all clearly readable against light background
