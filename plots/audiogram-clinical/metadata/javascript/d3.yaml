review:
  strengths:
  - 'Perfect spec implementation: log frequency axis, inverted dB HL axis, O/X clinical
    markers, severity bands, four-sided border — textbook audiogram format'
  - 'Excellent semantic palette exception: Imprint red (#AE3030) and blue (#4467A3)
    used for right/left ear clinical convention; justification is unambiguous (ISO
    8253 mandate, spec-explicit)'
  - 'Thoughtful dark-theme handling: 1.5x opacity lift for severity bands keeps them
    visible on dark surface; elevatedBg fill for open circles prevents blending into
    band colors'
  - Clinically realistic noise-induced sensorineural loss data with natural left/right
    asymmetry; viewer immediately recognises the 4 kHz notch pattern
  - Clean flat D3 code with all font sizes explicitly set; proper ANYPLOT_TOKENS and
    ANYPLOT_SIZE contract observed; no code smell
  weaknesses:
  - Dark-theme severity bands are slightly heavy when all stacked together — the cumulative
    effect of six rgba overlays on a dark surface creates a more visually busy texture
    than the light render; the Profound band at 0.39 opacity creates a heavy red block
    at the bottom; reducing all dark-mode opacity factors slightly would improve the
    dark aesthetic
  - 'LM-02 could go deeper: good use of D3 symbol generator and log scale, but missing
    a distinctly D3 technique such as a clipPath group wrapping the data layers (lines
    + markers) to geometrically clip data to the inner plot rectangle'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "audiogram-clinical · javascript · d3 · anyplot.ai" bold 22px, dark ink, centered — readable. Axis labels "Frequency (Hz)" and "Hearing Level (dB HL)" at 16px dark ink — readable. Tick labels 14px dark — readable. Severity band labels in right margin 14px dark — readable.
      Data: Right ear in Imprint matte red #AE3030 (open circles r=9 + solid line); left ear in Imprint blue #4467A3 (cross markers + dashed line). Six severity bands spanning full width with subtle rgba fills (green/yellow-green/ochre/amber/muted-red/deeper-red). First series red is a justified semantic exception (ISO 8253 clinical convention mandated by spec).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct
      Chrome: Title, axis labels, tick labels, band labels all render in light ink (theme-adaptive tokens) — fully readable against dark background. No dark-on-dark failures detected.
      Data: Data colors identical to light render (red right ear, blue left ear) — only chrome flips. Severity bands more visible due to 1.5x opacity lift; slightly heavy cumulative effect but functional. Open circles use elevatedBg (#242420) fill to prevent blending.
      Legibility verdict: PASS
