review:
  strengths:
  - 'Excellent semantic exception palette usage — right/left ear colors (#AE3030 and
    #4467A3) drawn from Imprint positions 5 and 3, matching audiological convention
    while staying within palette rules'
  - 'All required clinical audiogram features implemented: inverted y-axis, log x-axis,
    O/X marker conventions, severity bands with labels, two-ear legend'
  - 'Strong data storytelling: 4 kHz sensorineural notch highlighted with annotation;
    data progression across severity zones tells the clinical story clearly'
  - Perfect spec compliance and data quality — realistic noise-induced hearing loss
    pattern with clinically appropriate scales
  - 'Clean idiomatic Makie: hspan! for bands, MarkerElement/LineElement for custom
    legend, native axis transforms (yreversed, xscale=log10)'
  weaknesses:
  - Severity band alpha multipliers (1.4x, 1.5x, 2.0x) cause dark render to have heavily
    saturated opaque zones — cap all dark-mode band alphas at band_alpha (0.14) without
    multipliers, so all bands are equally subtle tints distinguished by color not
    stacked opacity
  - Band labels at fontsize=12 in INK_MUTED have limited contrast against saturated
    band backgrounds in dark mode — use INK_SOFT or increase to 13pt for better legibility
  - 4 kHz notch annotation at fontsize=10 is at the legibility floor for mobile display
    — increase to 11pt
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct theme surface
      Chrome: title "audiogram-clinical · julia · makie · anyplot.ai" in dark ink, clearly readable; "Frequency (Hz)" x-label and "Hearing Level (dB HL)" y-label in dark INK; tick labels (125, 250, 500, 1k, 2k, 4k, 8k on x; -10 to 120 by 10 on y) in INK_SOFT (#4A4A44) — all clearly readable; severity band labels ("Normal", "Mild", "Moderate", "Mod. Severe", "Severe", "Profound") in INK_MUTED gray, readable but subtle
      Data: Right ear — solid red (#AE3030) line with filled circle markers; Left ear — dashed blue (#4467A3) line with × markers. Severity bands as light semi-transparent tints (green Normal, ochre Mild/Moderate, red shades Severe/Profound). "4 kHz notch" annotation visible in small gray text.
      Legibility verdict: PASS — all text clearly readable against light background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: near-black #1A1A17 — correct dark theme surface
      Chrome: title in light #F0EFE8 text, clearly readable against dark background; axis labels and tick labels in #B8B7B0 (INK_SOFT dark variant) — all readable; band labels in #A8A79F (INK_MUTED dark variant) readable but with reduced contrast against the saturated band backgrounds; no dark-on-dark failures
      Data: Red (#AE3030) circle markers and blue (#4467A3) × markers — identical colors to light render as required. Severity bands appear significantly more saturated/opaque in dark mode (stacked alpha multipliers 1.4x–2.0x create heavy colored zones): Normal band = dark forest teal, Mild/Moderate = dark ochre/brown, Severe/Profound = deep dark burgundy. Data lines and markers remain clearly visible above the colored bands.
      Legibility verdict: PASS — all text readable, no dark-on-dark issues; band labels legible though contrast against saturated dark bands is reduced
