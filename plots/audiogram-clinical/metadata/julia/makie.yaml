review:
  strengths:
  - 'Full spec compliance: inverted Y-axis, logarithmic X-axis, conventional O/X markers,
    solid/dashed lines, all six severity bands correctly bounded and labeled'
  - Semantic color exception correctly applied and documented — Imprint position 5
    (#AE3030) for right ear, position 3 (#4467A3) for left ear matching audiological
    convention
  - Theme-adaptive chrome fully threaded through all axis properties (title, labels,
    ticks, spines, grid) using proper INK / INK_SOFT / INK_MUTED tokens
  - 'Triple redundant encoding for ear discrimination: color + marker shape (circle
    vs xcross) + linestyle (solid vs dashed)'
  - 'Distinctive Makie features used well: hspan!, MarkerElement+LineElement legend,
    RGBAf for grid alpha, xscale=log10, yreversed=true'
  - Realistic noise-induced sensorineural notch data (4 kHz dip) — medically plausible
    and clinically instructive
  - Square canvas (2400×2400) is the correct format for audiograms
  weaknesses:
  - 'Severity band fills in dark render look heavy and saturated: the Normal band
    renders as vivid teal, and the Profound band reaches ~44% alpha making it quite
    dark maroon — the bands are more visually dominant on dark background than on
    light'
  - Band label fontsize=10 (effective 20px at px_per_unit=2) is on the small side
    for the 2400px canvas; could be raised to 11-12 to improve readability at mobile
    widths
  - No focal-point emphasis on the clinically significant 4 kHz notch — a subtle annotation
    or visual callout would strengthen the data storytelling without violating clinical
    conventions
  - 'Band fill colors for Moderate/Mod. Severe/Profound are not exact Imprint palette
    members (e.g., orange #E58C19 for Moderate, #7F1E1E for Profound) — deriving them
    from Imprint positions 4, 5 with alpha would be cleaner'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "audiogram-clinical · julia · makie · anyplot.ai" in dark ink, clearly visible; Y-axis label "Hearing Level (dB HL)" and X-axis label "Frequency (Hz)" in INK color, well-proportioned; tick labels (125, 250, 500, 1k, 2k, 4k, 8k on X; -10 to 120 in 10dB steps on Y) in INK_SOFT — all readable
      Data: Red solid line with circle markers (right ear); blue dashed line with xcross markers (left ear); six horizontal severity bands in soft pastel fills (green Normal at top, through ochre-Mild, orange-Moderate, reddish Mod.Severe, deeper red Severe, dark red Profound at bottom); band labels in muted gray text centered at 1 kHz; legend at bottom-right with framed elevated background
      Legibility verdict: PASS — all elements clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct
      Chrome: Title and axis labels render in light text (INK = #F0EFE8); tick labels in INK_SOFT (#B8B7B0); band labels in INK_MUTED (#A8A79F) — all readable against dark background. No dark-on-dark failures detected.
      Data: Data line colors identical to light render (same red #AE3030 and blue #4467A3) — Imprint palette held constant across themes as required. Severity band fills appear more saturated and visually heavy in dark mode (band_alpha raised to 0.20 base, Profound reaching ~0.44 alpha) — the Normal band renders as vivid teal-green and the red bands as quite dark maroon, making the dark render feel more oppressive than the light render
      Legibility verdict: PASS — all text is readable, no dark-on-dark failures; the heavy band fills are an aesthetic issue rather than a readability failure
