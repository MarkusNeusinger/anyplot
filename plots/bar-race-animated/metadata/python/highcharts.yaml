review:
  strengths:
  - 'Perfect spec compliance: small multiples correctly implements the bar-race spec
    fallback with all required features (sorted bars, entity labels, time indicator,
    consistent colors).'
  - 'Flawless code quality: clean KISS structure, seed set, correct output files (plot-light/dark.png
    and .html).'
  - 'Excellent palette and theme compliance: Okabe-Ito in canonical order with adaptive
    neutral for position 8; correct background tokens in both themes with no dark-on-dark
    failures.'
  - Per-point Highcharts color assignment enables per-entity color tracking across
    panels — core bar-race mechanic correctly implemented.
  weaknesses:
  - 'Design Excellence gap (DE-03): no emphasis or annotation highlights the most
    dramatic rank changes — DigiWave''s crash from ~125B (2020) to ~10B (2022) is
    the key story and goes unannounced. Add rank number labels (#1, #2...) next to
    bars or a callout on the most dramatic mover.'
  - 'DE-01 moderate: elevated panel backgrounds are a nice touch but the overall look
    remains a clean default grid — no typographic hierarchy beyond year labels. Bold
    or larger data labels for top-ranked bars would raise this.'
  - 'LM-02 minor: Highcharts multi-chart assembly is functional but doesn''t leverage
    synchronized crosshair, shared tooltip, or rank-based plotBands/annotations that
    are distinctive Highcharts features.'
