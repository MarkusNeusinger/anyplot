review:
  strengths:
  - Small multiples grid with sorted bars at each snapshot cleanly satisfies the animated
    spec for a static library
  - Consistent entity colors across all panels enable visual tracking of platform
    trajectories
  - Good use of letsplot gggrid() for panel composition — idiomatic and distinctive
  - Value labels at bar ends add quantitative readability
  - Grid lines removed, legend omitted — clean visual refinement
  weaknesses:
  - 'Palette is non-compliant: custom hexes including #306998 (Python Blue) must be
    replaced with Okabe-Ito (#009E73, #D55E00, #0072B2, #CC79A7, #E69F00, #56B4E9)
    — first platform must get #009E73'
  - 'Title string in code is wrong: bar-race-animated · letsplot · pyplots.ai must
    be bar-race-animated · python · letsplot · anyplot.ai'
  - No ANYPLOT_THEME detection; output filenames must be plot-{THEME}.png and plot-{THEME}.html
  - 2023 subscriber values are unrealistically high (696M peak); reduce max to ~300M
    to stay plausible
