review:
  strengths:
  - Consistent Okabe-Ito color mapping across all 4 panels makes entity tracking easy
    and spec-compliant
  - Within-bar platform labels and right-side value labels provide all needed information
    without cluttering the axes
  - Flat seed-controlled script with clean Bokeh idioms; Selenium screenshot follows
    bokeh.md exactly
  - 4-snapshot progression clearly communicates rank reversals (CineCloud ascending
    from last to first is striking in 2023)
  weaknesses:
  - 'Gridplot gap region not themed: in dark mode the spacing between the 4 panels
    renders as a bright white cross-separator; set the gridplot outer background to
    #1A1A17'
  - CineCloud 28M bar in 2016 is too short for its label causing overflow and overlap
    with the value label; conditionally place labels outside bars when bar width is
    less than text width
  - 'No animation or interactive timeline: Bokeh supports CustomJS-based slider animation
    that would satisfy the spec''s interactive-version guidance'
  - X-axis range is padded uniformly across all panels leaving 85% empty space in
    early-year panels; per-panel dynamic range or a tighter shared max would improve
    layout
