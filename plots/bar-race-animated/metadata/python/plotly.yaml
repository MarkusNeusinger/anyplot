review:
  strengths:
  - 'Full Plotly animation implemented: go.Figure with frames, updatemenus (play/pause),
    and year slider — correct idiomatic usage of Plotly''s animation API'
  - 'Correct Okabe-Ito palette applied in canonical order; USA (first entity) gets
    #009E73; all 7 Okabe-Ito colors used for 7 countries'
  - 'Theme adaptation works correctly: PAGE_BG, INK, INK_SOFT, GRID all flip between
    light (#FAF8F1) and dark (#1A1A17); no dark-on-dark text failures'
  - Explicit font sizes throughout (title 28px, axis labels 22px, tick labels 18-20px,
    bar value labels 18px)
  - HTML output includes play/pause buttons and year scrubber slider — satisfies all
    interactive spec requirements
  - Flat procedural code with np.random.seed(42) — clean, reproducible, no functions/classes
  - Data scenario (country GDP 1995-2023) is realistic and neutral; correct output
    files (plot-{THEME}.png + plot-{THEME}.html)
  weaknesses:
  - 'Design lacks visual polish: no spine removal on the static PNG axes, grid at
    25% opacity (style guide specifies 10-15%)'
  - 'DE-03 storytelling is absent in the PNG: static snapshot shows final rankings
    without emphasizing the interesting story (China''s rise from ~5th to 2nd, Germany
    overtaking Japan in late period) — consider rank number labels (#1, #2...) or
    a subtitle annotation'
  - 'DQ-03 data accuracy: Japan (7.7T) and Germany (7.2T) are 60-80% above their real
    2023 nominal GDP (~4.2T and ~4.5T respectively); the simulation''s growth rates
    are too high for these economies; also Germany surpassed Japan in 2023 making
    the Japan>Germany ordering historically incorrect'
  - 'Right-side canvas whitespace: USA bar reaches only ~85% of x-axis width, leaving
    significant empty space; right margin could be tighter or value labels placed
    inside bars to improve canvas utilization'
  - 'No rank labels (#1, #2, etc.) on bars to reinforce the racing/ranking narrative
    of the chart type'
