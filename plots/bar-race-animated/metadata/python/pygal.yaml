    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct for light theme, both the outer composite canvas and the individual pygal cell backgrounds match.
      Chrome: Composite title "GDP Country Rankings · bar-race-animated · python · pygal · anyplot.ai" drawn in dark INK (#1A1A17) is clearly readable at 72px. Year labels (2000–2023) within each cell rendered in dark INK via pygal Style foreground_strong — readable. Country names on y-axis appear in muted INK_MUTED (#6B6A63) — readable. GDP (Trillion USD) axis labels are visible. X-axis tick labels ($0.0T, $5.0T, $10.0T, $20.0T) appear in muted color — readable. Legend at bottom shows country names in dark INK — clearly readable.
      Data: 7 horizontal bars per cell sorted in ascending order (largest bar = USA at bottom). USA = #009E73 (brand green, correct first), China = #D55E00 (vermillion), Japan = #0072B2 (blue), Germany = #CC79A7 (reddish purple), UK = #E69F00 (orange), India = #56B4E9 (sky blue), France = #F0E442 (yellow). Bars are clearly visible. Value labels ($X.XT format) inside bars at print_values_position="middle" are small but legible for most bars; very short bars (India 2000 at $0.5T) have tight labels.
      Legibility verdict: PASS — all primary text elements are readable; minor concern on value labels inside very short bars.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct for dark theme; both the outer composite canvas and individual cell backgrounds are dark.
      Chrome: Composite title renders in #F0EFE8 (light INK) via PIL draw.text(fill=INK) — clearly readable on dark background. Year labels inside cells rendered in light color via pygal foreground_strong=INK (#F0EFE8) — readable. Country names on y-axis appear in muted light gray (#A8A79F = INK_MUTED for dark) — readable. Axis labels appear in light color. Tick labels appear muted-light. Legend country names drawn in #F0EFE8 — readable. No dark-on-dark failures detected.
      Data: Bar colors are identical to light render — #009E73 for USA, #D55E00 for China, #0072B2 for Japan, etc. Confirms Okabe-Ito positions 1–7 are theme-independent. Bars are clearly visible against dark background. Value labels inside bars appear slightly harder to read due to small size at composite scale, but not a critical failure.
      Legibility verdict: PASS — all primary text elements are readable against the dark background; no dark-on-dark failures; minor concern on small value label size at composite scale.
