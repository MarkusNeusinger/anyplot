    density are visually noisy; spacing parameters could be further tuned'
  - 'DE-03 moderate (4/6): small multiples layout communicates ranking changes well,
    but no deliberate emphasis technique (e.g., annotating China''s dramatic rise,
    or highlighting the leading bar per frame) to create a focal point'
  - 'VQ-01 partial (6/8): value labels (value_font_size=28 on 1500px cells) appear
    very small at the composite scale, especially for short bars in 2000 frame — consider
    increasing to 34-40 or moving labels outside bars'
