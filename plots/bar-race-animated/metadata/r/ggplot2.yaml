review:
  strengths:
  - Uses real gapminder data for historically accurate, meaningful GDP per capita
    rankings
  - Correctly implements small-multiples (facet_wrap) as the static alternative to
    animation, per library spec
  - 'Idiomatic ggplot2: facet_wrap with free scales, coord_flip, reorder() trick with
    ''___'' separator for per-facet sorted bars'
  - Correct Okabe-Ito palette mapping (Africa=#009E73 as first categorical series)
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT tokens applied correctly to
    both light and dark renders'
  - 'Perfect title format: ''GDP per Capita Rankings · bar-race-animated · r · ggplot2
    · anyplot.ai'''
  - 'Clean code: no functions/classes, deterministic data, all imports used'
  weaknesses:
  - Tick label and country name font sizes (axis.text.x=11, axis.text.y=12) are significantly
    below the 16pt recommendation for a 4800x2700 canvas — country names in smaller
    facets may be hard to read at full resolution
  - Plot title font size (20pt) is below the 24pt recommendation; axis title is 18pt
    vs recommended 20pt
  - Missing set.seed(42) — required by library guide even when data is deterministic
  - No value annotations on bars (e.g. dollar values at bar ends) which would add
    clarity in a bar-race context
  - Design is clean but lacks a focal point or storytelling emphasis — no highlighted
    country trajectory, no annotation of notable events
