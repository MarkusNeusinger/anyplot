review:
  strengths:
  - Uses imprint_seq gradient (green→blue) perfectly matched to density data — correct
    continuous cmap choice
  - Three-cluster GPS dataset tells a clear urban-mobility story with annotated region
    labels
  - All font sizes explicitly set with adaptive title-fontsize formula
  - 'Theme-adaptive chrome: grid opacity via #RRGGBBAA hex alpha, no tick marks, no
    border, only major grid'
  - Clean flat script with proper KISS structure and reproducible set.seed(42)
  - guide_colorbar() with unit() sizing is idiomatic ggplot2 — compact vertical bar
    well-placed
  weaknesses:
  - Log scale not applied to colorbar despite density range of ~1–100 (2 orders of
    magnitude) — spec suggests considering it; trans="log10" in scale_fill_gradient
    would reveal low-density periphery detail better
  - annotation text at size=2.8 mm (~8pt) blends into the dense hex area at mobile
    widths; nudging Transit Hub label slightly away from the peak-density cell or
    using INK rather than INK_SOFT would improve contrast
  - 'LM-02: could use coord_fixed() to preserve geographic aspect ratio (easting vs
    northing should have equal-distance axes)'
