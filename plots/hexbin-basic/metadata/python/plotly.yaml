review:
  strengths:
  - Manual hexbin using hexagon2 markers is the correct Plotly approach with no hacks
    needed
  - Both themes correctly adapted with all chrome tokens (backgrounds, text, borders,
    arrows all flip correctly)
  - Equal aspect ratio (scaleanchor/scaleratio=1) is the right choice for spatial
    data
  - Three named cluster annotations (Downtown/Airport/University) create a genuine
    spatial narrative
  - Proper Imprint sequential colorscale (green to blue) for density data, both visually
    and technically correct
  - HTML export with interactive hover tooltips included showing ride-share context
    per hex bin
  - 'Clean code: flat structure, seed set, minimal imports, marker sizes calibrated
    to canvas'
  weaknesses:
  - Log-scale color option not explored despite spec recommendation to consider it
    for wide density variation
  - Annotation boxes borderpad=4 is tight at full 3200x1800 resolution
