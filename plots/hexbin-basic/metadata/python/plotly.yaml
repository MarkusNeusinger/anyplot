  strengths:
  - Strong Imprint sequential colorscale (imprint_seq) correctly applied for continuous
    density data
  - Log-scale color mapping effectively reveals wide density range
  - Three named cluster annotations (Downtown, Airport, University) create clear spatial
    narrative
  - 'Perfect theme-adaptive chrome: backgrounds, text, and annotation boxes all flip
    correctly between light and dark'
  - Axis units included (km), scaleanchor=x enforces spatial accuracy
  - Interactive HTML export with CDN plotlyjs included
  - Custom hover template with raw count values while using log-scale for color is
    a nice UX touch
  - np.random.seed(42) ensures reproducibility
  weaknesses:
  - Minor hex tessellation gaps visible at cluster boundary edges — a known limitation
    of plotly hexagon2 marker sizing calibration; could reduce marker_size multiplier
    slightly or increase gridsize to improve coverage
  - Colorbar top two tick labels (261 and 200) are slightly crowded — could deduplicate
    by removing the max-count tick if within 15% of the next tick
  - 'DE-01: Design is strong but not quite publication-ready; lacks the final layer
    of polish (e.g. colorbar axis label could be vertical/rotated, annotation font
    could be slightly bolder)'
  - 'LM-02: The hexagon2 scatter approach is the correct plotly workaround but some
    deeper plotly-specific features (e.g. subplot annotations, rangeslider) remain
    unused'
