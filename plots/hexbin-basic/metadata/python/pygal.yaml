review:
  strengths:
  - Creative SVG post-processing converts pygal circles to genuine hexagonal polygons,
    implementing hexbin where the library has no native support
  - Custom clip-path injection prevents hexagon bleed beyond the data area — a technically
    non-trivial SVG manipulation
  - Log-spaced density thresholds with 6 named tiers (Sparse→Hotspot) accurately reveal
    density variation and guide the viewer
  - 'Imprint sequential colormap correctly applied: brand green #009E73 → Imprint
    blue #4467A3 per the imprint_seq definition'
  - 'Correct theme-adaptive chrome in both renders: #FAF8F1 light / #1A1A17 dark backgrounds
    with proper INK/INK_MUTED text tokens'
  - Realistic urban air quality sensor dataset with three distinct pollution hotspots
    creates a compelling narrative context
  - Legend organized in 3 columns with count ranges (e.g. 'Sparse (1–2)') functions
    as an effective categorical colorbar substitute for pygal
  weaknesses:
  - 'SC-02: No continuous colorbar — spec explicitly requests one; pygal lacks native
    colorbar support so the implementation substitutes a categorical legend with count
    ranges, which is adequate but less precise than a true gradient scale'
  - 'CQ-01: Complex import workaround using importlib.util at the top adds ~12 lines
    of boilerplate to resolve the self-naming conflict (file is named pygal.py); the
    workaround is necessary but increases apparent code complexity'
  - 'DE-01: The three pollution hotspot clusters (urban core, industrial zone, highway)
    are visible through density alone but no annotations or callouts name them, missing
    an opportunity to strengthen data storytelling'
  - X-axis tick labels render as plain integers ('-4', '-3', '1', '3', '5') while
    Y-axis tick labels include units ('4.0 km', '2.0 km'); minor unit-formatting inconsistency
    between axes
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — clearly not pure white, correct Imprint surface
      Chrome: Title "hexbin-basic · python · pygal · anyplot.ai" in dark ink, readable. Y-axis label "Sensor Grid Y (km)" and X-axis label "Sensor Grid X (km)" in dark ink. Y-axis tick labels show "4.0 km", "2.0 km", "1.0 km", "0.0 km", "-1.0 km", "-2.0 km" in dark ink. X-axis tick labels show plain integers "-4", "-3", "-1", "1", "3", "5" (no km suffix — minor inconsistency vs Y-axis). Legend at bottom in 3 columns with 6 density tier labels.
      Data: Hexagonal polygons fill the plot area with clear color gradient from brand green #009E73 (Sparse tier) through intermediate green-blue intermediates to Imprint blue #4467A3 (Dense/Hotspot tiers). Three visible density concentrations: upper-center cluster (urban core), lower-left cluster (industrial), and right-side sparse column (highway). Hexagons are well-sized and cleanly tessellated with slight gaps between them.
      Legibility verdict: PASS — all text readable against the warm off-white background; no light-on-light issues detected.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — clearly not pure black, correct Imprint dark surface
      Chrome: Title and axis labels rendered in light cream ink (#F0EFE8), clearly readable against the dark background. Tick labels in light muted tone, readable. Legend labels in light text, readable. No dark-on-dark failure detected.
      Data: Hexagonal polygon colors are identical to the light render — brand green #009E73 through blue #4467A3 gradient — confirming only chrome (background, text) flipped while data colors remain constant across themes.
      Legibility verdict: PASS — all text readable against the warm near-black background; brand green #009E73 remains clearly visible; no dark-on-dark failures.
