review:
  strengths:
  - Custom vectorized hexagonal binning using geom_polygon correctly handles the absence
    of a native hexbin geom in plotnine, with a clever 1.08 oversize factor to minimize
    inter-hex gaps
  - 'Correct Imprint sequential palette (#009E73 → #4467A3) for single-polarity continuous
    density data — exactly matching the imprint_seq spec'
  - Full theme-adaptive chrome with all required tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT) applied consistently to every text and background element in both renders
  - coord_fixed(ratio=1) for geographic data ensures accurate latitude/longitude proportions
    without distortion
  - Seismic event density context with multi-cluster Eastern Mediterranean data is
    realistic, scientific, and neutral
  - Title fontsize dynamically scaled (max(8, round(12 * 67 / len(title)))) to prevent
    overflow with the long mandated title string
  - Grid lines completely removed (element_blank) for a clean, focused hexbin visualization
  - np.random.seed(42) ensures full reproducibility
  - 'Clean KISS code structure: Imports → Tokens → Data → Binning → Plot → Save —
    no functions or classes'
  weaknesses:
  - Annotation text (annotate('text', size=3)) renders at ~47px on the 3200×1800 canvas
    — barely visible as tiny labels in practice; increase to size=4–5 for better readability
    without crowding the plot area
  - Isolated edge hexagons at the sparse perimeter of the distribution create a slightly
    ragged visual boundary; applying a minimum-count filter (e.g. counts[counts['count']
    >= 2]) would produce a cleaner convex hull-like boundary
  - 'DE-03: Although two annotations name the main clusters, the visual hierarchy
    relies entirely on the color gradient; adding a subtle focal indicator (e.g. a
    thin INK_SOFT circle outline around the densest bin or a slight increase in hex
    edge alpha for high-count bins) would strengthen the data story'
  - 'DE-01: The design is competent and above defaults but stops short of ''strong
    design'' — the hex geometry and annotations carry the weight; richer typographic
    hierarchy (bolder axis titles, slightly larger legend title) would elevate polish'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Seismic Event Density · hexbin-basic · python · plotnine · anyplot.ai" in dark ink, clearly readable. Axis labels "Longitude (°E)" and "Latitude (°N)" in dark ink at appropriate size. Tick labels (32–40 on x, 36–40 on y) in INK_SOFT — all readable. Legend title "Event Count" and tick values (10–50) visible. Two small annotations ("Primary\nFault Zone →" lower-left, "← Aftershock\n   Region" upper-right) present but very small.
      Data: Hexagonal tiles cover the plot area, gradient from brand green #009E73 (low density, ~1–10 events) through teal/cyan mid-range to deep blue #4467A3 (high density, 50+ events). Dense blue cluster centered around Lon 35–36°E, Lat 37°N corresponds to the primary fault zone. A secondary blue cluster at Lon 37°E, Lat 38°N is the aftershock region. Sparse green hexagons scatter at the distribution edges. White inter-hex gaps (PAGE_BG) at edges of sparse region. Colorbar on the right with continuous green-to-blue gradient.
      Legibility verdict: PASS — all primary chrome elements are clearly readable; annotations are small but functional at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title readable in light INK (#F0EFE8) text against dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0) — clearly visible, no dark-on-dark failure. Legend title and colorbar labels readable. Annotations rendered in INK (#F0EFE8) — light text on dark background, correctly theme-adapted.
      Data: Hex colors identical to light render — same green-to-blue gradient, same two dense blue clusters at same geographic positions. Inter-hex gaps are now near-black (PAGE_BG = #1A1A17), creating darker separation lines. Colorbar gradient unchanged. Data color identity between themes confirmed.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures detected.
