review:
  strengths:
  - 'Imprint sequential cmap (#009E73 → #4467A3) correctly applied for continuous
    density data; both themes fully palette-compliant'
  - Theme-adaptive chrome implemented correctly with all 4 token levels (INK, INK_SOFT,
    PAGE_BG, ELEVATED_BG)
  - Seismic epicenter dataset is realistic, neutral, and demonstrates hexbin across
    multiple density levels
  - coord_fixed(ratio=1) preserves geographic aspect ratio — appropriate and idiomatic
    for spatial data
  - Title fontsize scaled dynamically with title length to prevent overflow
  - Vectorized numpy implementation avoids Python loops for hexbin computation
  weaknesses:
  - 'Gap artifacts between hexagons in sparse outer regions: the 1.05x polygon oversize
    reduces but does not fully eliminate cosmetic gaps, especially at the boundary.
    Consider increasing the oversize factor to 1.08-1.10 or clipping the hex grid
    to the data bounding box.'
  - 'DE-01 (Aesthetic Sophistication, 5/8): The visualization is functional and palette-compliant
    but lacks a distinctive typographic or visual hierarchy feature that elevates
    it to publication level. Consider adding a subtle annotation highlighting the
    primary fault zone, or using alpha variation across density levels to amplify
    the depth effect.'
  - 'DE-02 (Visual Refinement, 4/6): The discrete-appearing colorbar steps and visible
    polygon gaps slightly reduce polish. A higher nbin or explicitly requesting a
    smooth gradient legend, plus eliminating gaps, would improve refinement.'
  - 'CQ-01 (2/3): Manual hexagonal binning code is significantly more complex than
    spec complexity warrants; this is inherent to plotnine''s limitations but still
    notable.'
