review:
  strengths:
  - 'Perfect spec compliance: colorbar, imprint_seq colormap, symlog scale, and hex
    resolution control all present.'
  - 'Excellent realistic dataset: Seattle GPS traffic density with named geographic
    zones gives the chart genuine real-world context.'
  - Proper Imprint palette usage for continuous density (imprint_seq, green to blue),
    correctly applied in both themes.
  - 'Theme-adaptive chrome thoroughly implemented: INK/INK_SOFT tokens applied to
    title, axis labels, ticks, grid, legend — no dark-on-dark failures.'
  - Background-colored text halo technique (bg+fg text layers) for annotation readability
    is a polished Altair idiom.
  - type=symlog on the color scale correctly handles wide-range density data as the
    spec recommends.
  weaknesses:
  - 'Visible white cross intersection marks at each hexagon vertex junction in both
    renders — artifact of mark_point(shape=custom_svg, stroke=PAGE_BG, strokeWidth=0.4)
    with scale_factor=4: at the 6-way meeting points of adjacent hexagons, the background-colored
    strokes visually converge into cross patterns. Fix: reduce strokeWidth to alt.value(0.2)
    (non-hover) or switch to a pure hexbin approach using mark_rect with explicit
    hex pixel sizing and no inter-hex stroke.'
  - 'Shopping District annotation label positioned close to the colorbar area on the
    right edge — small risk of crowding. Fix: shift the annotation anchor slightly
    left or reduce annotation font size to 9px.'
  - DE-01/DE-02 held below 6 by the hex vertex artifacts — resolving the stroke-crossing
    issue would immediately lift visual polish to a strong design level.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface.
      Chrome: Title "hexbin-basic · python · altair · anyplot.ai" in dark INK (#1A1A17), clearly readable. Subtitle in INK_SOFT. Axis labels "Longitude (°W)" and "Latitude (°N)" in dark INK with units. Tick labels at 10px legible. Grid lines very subtle at opacity 0.12. Legend box with ELEVATED_BG fill and INK_SOFT border.
      Data: Hexagonal bins colored with imprint_seq gradient (green #009E73 at low density → blue #4467A3 at high density). Three geographic clusters visible: Downtown Core (lower center, highest density — most blue), Shopping District (right, medium density), Industrial Zone (upper left, medium-low). Annotation labels with background halo for readability. Colorbar "Vehicle Count" 1–130. Small white cross marks visible at hexagon vertex junctions (stroke artifact).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface.
      Chrome: Title, subtitle, axis labels, tick labels all rendered in light INK (#F0EFE8) — clearly visible against dark background. No dark-on-dark failures. Legend with dark ELEVATED_BG (#242420) fill and light label text. Grid lines subtle.
      Data: Hexagonal density gradient colors are identical to the light render (green → blue imprint_seq unchanged). Only chrome elements flipped. The hex vertex cross marks are less prominent on dark background. Annotation zone labels still readable.
      Legibility verdict: PASS
