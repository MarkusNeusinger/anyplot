review:
  strengths:
  - 'Perfect spec compliance: correct hexbin plot type with color bar, Imprint sequential
    colormap (green→blue), sqrt-scaled density transform, and coord_fixed() for isotropy'
  - 'Excellent data quality: realistic GPS metro-area density scenario with three
    distinct spatial clusters (downtown corridor, university campus, transit hub)
    and sparse residential background noise'
  - Proper Imprint sequential colormap implementation using scale_fill_gradient(low='#009E73',
    high='#4467A3') with sqrt transform — both colors are Imprint palette anchors
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens applied
    to all elements including legend background, correctly flipping between light
    (#FAF8F1) and dark (#1A1A17)'
  - 'All font sizes explicitly set via theme(): title=16/bold, subtitle=11, axis_title=12,
    axis_text=10, legend_title=12/bold, legend_text=10 — proportions look well-balanced
    in both renders'
  - Idiomatic letsplot usage with layer_tooltips() showing computed aesthetics @..count..
    and @..density.. with .format() formatting — a distinctive letsplot-only feature;
    HTML export included
  weaknesses:
  - 'White hex edges (color=''#FFFFFF'') create subtle visual inconsistency between
    themes: on the light (#FAF8F1) background the edges are barely visible and look
    polished, but on the dark (#1A1A17) background they become prominent bright grid
    lines that add visual noise — consider using color=INK_SOFT or a semi-transparent
    edge so the border weight feels consistent across both renders'
  - Grid is entirely removed (panel_grid_major=element_blank()) — for a spatial hexbin
    where readers need to locate density clusters by km coordinates, subtle Y-only
    or both-axis grid lines at 15% opacity would aid position reading without competing
    with the data
  - 'DE-01 not exceptional: design is clean and correct but lacks a standout design
    element that would push it to publication-ready level — e.g. a descriptive title
    prefix (e.g. ''Metro Density Hotspots · ''), direct cluster annotations, or a
    refined subtitle that names the visible clusters rather than describing the colormap'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface matching #FAF8F1 — not pure white, correct anyplot light surface.
      Chrome: Title "hexbin-basic · python · letsplot · anyplot.ai" in bold dark ink at ~70% plot width. Subtitle "GPS ping density — sqrt-scaled Imprint sequential colormap" in softer dark ink below. X-axis label "East–West (km from center)" and Y-axis label "North–South (km from center)" both readable with units. Tick labels in muted dark ink, all legible. Legend titled "Ping Count" with color ramp from green to blue and labels 4/16/36/64/100/144.
      Data: Hexagonal bins covering roughly −8 to 12 km east, −6 to 8 km north. Low-density bins render in Imprint brand green (#009E73); high-density bins transition to Imprint blue (#4467A3). White hex edges add definition. Three density clusters visible: dense blue-shifted cluster in upper-right (downtown corridor ~4 km east), moderate cluster left of center (campus ~−3 km east), and tight cluster in lower-center (transit hub ~0.5 km east, −3.5 km north). Sparse green outer bins represent residential background noise.
