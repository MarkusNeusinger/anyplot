    Dark render (plot-dark.png):
      Background: Warm near-black surface matching #1A1A17 — not pure black, correct anyplot dark surface.
      Chrome: Title, subtitle, axis labels, and tick labels all render in light cream/off-white tones (INK → #F0EFE8, INK_SOFT → #B8B7B0 in dark mode). Legend box has slightly elevated dark background (#242420). All chrome elements flip correctly from the light render.
      Data: Hex bin colors are identical to the light render — same green (#009E73) for low density, same blue (#4467A3) for high density — only chrome flips. White hex edges (#FFFFFF) are more visually prominent on the dark background, creating a brighter grid-line effect compared to the subtle appearance on light. The three density cluster patterns remain clearly visible.
