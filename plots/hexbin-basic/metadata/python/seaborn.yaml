review:
  strengths:
  - JointGrid with hexbin + marginal KDE distributions is the ideal seaborn-specific
    approach — showcases library's distinctive joint distribution API
  - Correct use of imprint_seq (green-to-blue) sequential colormap for continuous
    density data, with LogNorm that reveals both sparse and dense regions simultaneously
  - 'Full theme-adaptive chrome: background, ink, tick colors, and colorbar outline
    all switch correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Realistic NYC GPS coordinate data with three meaningful clusters (downtown, airport,
    shopping) illustrating real urban traffic hotspot use case
  - Colorbar placement via figure.add_axes avoids clipping the right marginal KDE
    — deliberate layout care
  - No bbox_inches='tight' on savefig — preserves exact 2400×2400 canvas as specified
  weaknesses:
  - The imprint_seq colormap (green→blue) produces very similar teal tones at mid-density,
    making the 10^1 range visually close to the low-density edge; a slight gamma/brightness
    stretch on the colormap could improve perceptual separation across the mid range
  - Marginal KDE fill (alpha=0.35) over the dark background renders slightly darker
    than over the light background — minor aesthetic inconsistency but not a legibility
    failure
  - Grid styling uses both INK color (dark ink) for grid.color in the sns.set_theme
    rc dict at alpha=0.15, then overrides with ax_joint.grid(..., color=INK) — the
    redundancy is harmless but slightly inconsistent (rc dict alpha=0.15 is ignored
    when the explicit call sets its own alpha)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — confirmed, no pure white.
      Chrome: Title "hexbin-basic · python · seaborn · anyplot.ai" in dark ink ~12pt, fully readable and centered. X-axis label "Longitude (°W)" and Y-axis label "Latitude (°N)" in dark ink 10pt — balanced and proportional. Tick labels at 8pt in dark muted ink — legible. Colorbar label "Point Count (log scale)" at 10pt in dark ink, readable. Log-scale tick values (10^0, 10^1, 10^2) at 8pt — readable.
      Data: Hexbin plot showing two main clusters. Left cluster (downtown/Manhattan area, ~-74.0°W, ~40.74–40.80°N) is large and dense. Right cluster (airport area, ~-73.875°W, ~40.775°N) is smaller. Color gradient runs from #009E73 green (low density) to #4467A3 blue (high density) via imprint_seq with log normalization. Marginal KDE distributions in #009E73 with alpha=0.35 fill show bimodal X-distribution and unimodal Y-distribution. Subtle grid lines (alpha~0.15) visible in joint plot area. Top/right spines removed.
      Legibility verdict: PASS — all text readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — confirmed, not pure black.
      Chrome: Title, axis labels, tick labels all render in light cream/off-white ink (#F0EFE8) — clearly readable. Colorbar label and tick values render in light ink. No dark-on-dark failures observed. Marginal axes background correctly set to #1A1A17. Colorbar outline in muted light tone (INK_SOFT = #B8B7B0).
      Data: Hexbin data colors are identical to light render — same green-to-blue gradient, same two-cluster structure. The imprint_seq palette is theme-independent as required. KDE fills in #009E73 render slightly differently against dark background (darker perceived fill) but remain clearly visible. Grid lines visible at low opacity against near-black background.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures.
