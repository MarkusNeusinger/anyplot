review:
  strengths:
  - 'Full spec compliance: hexbin plot with colorbar, perceptually uniform colormap,
    and log colorscale all present'
  - Theme-adaptive chrome correctly implemented — all INK/INK_SOFT/PAGE_BG tokens
    applied to every axis and colorbar element, dark mode renders without any dark-on-dark
    failures
  - Realistic multi-cluster GPS dataset with named hotspot areas adds narrative context
  - Log10 colorscale is the right call for data where density spans multiple orders
    of magnitude
  - 'Clean code structure: flat script, reproducible seed, no unnecessary complexity'
  - colsize! and Relative() used correctly for proportional colorbar sizing
  weaknesses:
  - Colorbar tick labels show auto-generated linear values (~50, 100, 150, 200) instead
    of the custom log-landmark ticks ([1, 5, 20, 80, 250] with string labels). The
    custom ticks specification likely conflicts with colorscale=log10 — positions
    need to be in log10-transformed space (e.g. [log10(1), log10(5), log10(20), log10(80),
    log10(250)]) rather than raw count values
  - City center annotation text at (0.5, 0.1) with color=INK has low contrast against
    the green hexbin tiles in light mode; the annotation would benefit from a white
    or ELEVATED_BG text halo/background to ensure readability in both themes
  - Design Excellence limited by default styling choices — removing bottom/left spines
    entirely for a cleaner hexbin look, and ensuring the annotation visually pops,
    would elevate the plot further
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "hexbin-basic · julia · makie · anyplot.ai" in bold dark #1A1A17 text — clearly readable. Axis labels "Longitude (relative km)" and "Latitude (relative km)" in dark ink — readable. Tick labels in #4A4A44 (INK_SOFT) — readable. Colorbar label "Point Count" and tick labels readable. Colorbar shows auto-generated linear tick values (~50, 100, 150, 200) instead of custom log-landmark ticks.
      Data: Hexagonal bins coloured with Imprint sequential cmap (brand green #009E73 to blue #4467A3) via log10 colorscale. 4 density clusters visible: city center at (0,0) in deep blue (highest density), northern district at (-2, 2.2), eastern zone at (2.4, 0.6), southern hub at (0.4, -2.5) all in green/teal (lower density). Annotation circle at (0,0) and text "City Center (peak density)" at (0.5, 0.1) — present but with limited contrast against green hexbin tiles in light mode.
      Legibility verdict: PASS — all structural chrome text fully readable; annotation text marginal but visible

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface
      Chrome: Title in light #F0EFE8 text — clearly readable against dark background. Axis labels and tick labels in light/soft tones (#F0EFE8 / #B8B7B0) — all readable. No dark-on-dark failures detected. Colorbar chrome correctly adapts with light-coloured labels.
      Data: Hexbin data colours are visually identical to the light render — same green→blue Imprint sequential gradient, same 4 cluster pattern. Only surrounding chrome changes. Annotation text is more readable in dark mode since light INK (#F0EFE8) contrasts better over the dark hexbin area.
      Legibility verdict: PASS — all text elements clearly readable against dark background
