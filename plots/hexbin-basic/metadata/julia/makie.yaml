review:
  strengths:
  - Correct hexbin implementation using Makie's native hexbin! recipe with all spec
    features
  - Full theme-adaptive chrome across light and dark renders — all tokens (INK, INK_SOFT,
    PAGE_BG) wired to every axis and colorbar element
  - Realistic multi-cluster urban GPS dataset with varied cluster densities and plausible
    named districts
  - 'Clean, idiomatic Makie layout system usage: colsize!, colgap!, and proportional
    Relative() sizing'
  - 'Perfect spec compliance: colorbar, Imprint sequential colormap, bins parameter,
    axis labels with units'
  weaknesses:
  - Design sophistication is at the configured-default level (DE-01=4/8) — no focal-point
    emphasis, no annotation calling out the highest-density city center cluster to
    guide the viewer
  - 'Data storytelling is minimal (DE-03=3/6): the four clusters are well-chosen but
    nothing visually directs the reader to the key insight; consider using a text
    annotation or a differently-sized marker/ring to highlight the peak density hex'
  - LM-02 scores low (2/5) — the implementation uses hexbin! and the layout system
    but does not leverage other Makie-distinctive capabilities such as Colorbar.ticks
    customization, a custom logarithmic colorscale (colorscale = log10), or CairoMakie-specific
    rendering options that would showcase deeper library mastery
  - 'Minor verbosity: Float32(INK.r) casts are unnecessary since Colors.jl already
    returns Float32 channel values from colorant literals — use RGBAf(INK.r, INK.g,
    INK.b, 0.12f0) directly'
  - 'No log scale on the colorbar: with density ranging from ~1 to 250+, a log scale
    would better surface the mid-density clusters and prevent the low-density periphery
    from washing out'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, covers both the Figure background and Axis interior.
      Chrome: Title "hexbin-basic · julia · makie · anyplot.ai" in bold near-black, centered above the plot — clearly readable. X-axis label "Longitude (relative km)" and Y-axis label "Latitude (relative km)" in dark ink, appropriately sized. Tick labels in softer dark ink (#4A4A44) at 12pt — readable. Bottom and left spines visible in INK_SOFT; top and right spines removed (L-shaped frame). Grid lines present on both axes at ~12% opacity — subtle and non-intrusive. Colorbar on the right with label "Point Count" and tick marks at 50, 100, 150, 200 — all readable.
      Data: Four distinct hexbin clusters representing urban GPS hotspots. City center cluster (highest density, ~200+ points/bin) rendered in deep blue (#4467A3); peripheral clusters (eastern, northern, southern) rendered in mid-to-light green (#009E73 region). Imprint sequential colormap (green → blue) correctly applied. Hexagonal bins well-sized at bins=50; sparse singleton hexagons visible at cluster peripheries.
