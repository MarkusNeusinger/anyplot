      Background: Warm near-black #1A1A17 — correct for dark theme. Axis interior also correctly set to PAGE_BG.
      Chrome: Title in light cream text (#F0EFE8) — clearly readable against dark background. Axis labels and tick labels in INK_SOFT light (#B8B7B0) — visible. Colorbar "Point Count" label and tick marks (50/100/150/200) in light ink — all readable. Left and bottom spines in INK_SOFT light; grid lines subtle. No dark-on-dark failures detected.
      Data: Data colors are identical to light render — same green-to-blue Imprint sequential gradient, same four clusters, same density distribution. The deep-blue city center and green peripheral clusters read correctly on the dark surface. Colorbar gradient unchanged.
      Legibility verdict: PASS — all text readable against warm near-black background; no dark-on-dark failures observed.
