review:
  strengths:
  - Implements Fruchterman-Reingold force-directed layout algorithm from scratch —
    no NetworkLayout.jl dependency, correct physics, proper cooling schedule
  - 'Full Imprint palette compliance: 4 departments mapped to first 4 palette slots
    in order, correct theme backgrounds (#FAF8F1 light / #1A1A17 dark), data colors
    identical between themes'
  - 'Complete spec compliance: degree-based node sizing, cross-department bridges,
    realistic academic collaboration domain (ML/Networks/Databases/Systems)'
  - All theme-adaptive chrome tokens wired correctly — INK, INK_SOFT, ELEVATED_BG
    all set in legend and title; dark render has no dark-on-dark failure
  - Code is flat, reproducible (Random.seed!(42)), clean section structure, and uses
    idiomatic Makie APIs (MarkerElement legend, colsize! layout control)
  weaknesses:
  - Node degree-based sizing is visually present but unexplained — no legend entry
    or annotation tells readers that node size encodes connection count; a short subtitle
    or a supplementary size legend entry would complete the storytelling
  - Community clusters overlap visually despite the force-directed layout — the lavender
    (Networks) and blue (Databases) communities interleave in the upper half, reducing
    perceptual clarity of department separation; increasing intra-department edge
    weight relative to cross-department bridges would tighten cluster cohesion
  - Title fontsize=20 at px_per_unit=2 is on the modest side — the title is readable
    but could be bumped to titlesize=22 for better legibility at thumbnail widths
