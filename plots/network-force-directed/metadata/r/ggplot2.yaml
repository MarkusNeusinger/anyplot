review:
  strengths:
  - Correctly implements Fruchterman-Reingold layout in pure R without any external
    graph packages — creative use of geom_segment + geom_point
  - 'Full Imprint palette compliance: #009E73 for Genomics first, correct positions
    1–5, both themes correct'
  - 'Excellent idiomatic ggplot2: theme_void, coord_fixed(ratio=1), scale_size_identity
    for degree-scaled nodes, guides() override.aes'
  - Degree-scaled node sizes correctly communicate hub researchers visually
  - Theme-adaptive chrome fully correct — no dark-on-dark failures in either render,
    legend elevated BG correct
  weaknesses:
  - 'FR layout produces linear node arrangements (top row: Neuroscience, right column:
    Genomics, bottom row: Pharmacology) rather than tight organic community clusters
    — the main value proposition of force-directed graphs is community revelation,
    which the current layout fails to deliver clearly. Increase temperature, adjust
    k constant, or run more iterations to pull groups into tight blobs.'
  - Edges at 0.18 alpha in dark render are very faint — trace visibility of network
    structure is poor on dark theme. Increase dark-theme edge alpha to at least 0.30.
  - Function fr_layout() present — CQ-01 KISS violation (minor).
  - 'VQ-05: Many nodes push to the plot area boundaries (nodes hugging top, right,
    and bottom walls) due to boundary clamping at 0.04/0.96 — the plot area boundary
    is visible through the node arrangement rather than the force equilibrium. Loosen
    boundary clamp or add a frame margin parameter to allow groups more interior space.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "network-force-directed · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17), centered, ~75% of canvas width, clearly readable. No axis labels (theme_void — correct for network). Legend titled "Research Area" with 5 entries, all readable with light background.
      Data: 5 research groups — Genomics (#009E73 brand green, rightmost vertical column), Neuroscience (#C475FD lavender, top horizontal row), Immunology (#4467A3 blue, upper-left), Bioinformatics (#BD8233 ochre, lower-left and center), Pharmacology (#AE3030 red, bottom row). Edges rendered as thin light-gray segments. Hub nodes visibly larger (degree scaling). Edges visible but subtle (alpha=0.28).
      Layout issue: Nodes arrange in linear patterns along plot boundaries (top row, right column, bottom row) rather than tight organic community blobs — community structure not clearly revealed.
      Legibility verdict: PASS — all text clearly readable

    Dark render (plot-dark.png):
