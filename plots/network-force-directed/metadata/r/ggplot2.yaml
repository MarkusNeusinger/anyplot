      Data: Identical data colors to light render — Genomics green, Neuroscience lavender, Immunology blue, Bioinformatics ochre, Pharmacology red. Edges in light gray but at 0.18 alpha appear quite faint on dark background — network structure harder to trace than in light render.
      Legibility verdict: PASS — all text readable, though edges are notably faint
