review:
  strengths:
  - Perfect spec compliance — force-directed Fruchterman-Reingold layout with community
    structure, degree-scaled nodes, hub identification, and cross-community bridge
    edge highlighting
  - Amber glow ring around the top hub and dashed amber bridge edges create strong
    visual storytelling that guides the viewer from hub nodes → bridge connections
    → community clusters
  - Excellent code quality — clean reproducible implementation with np.random.seed(42),
    ColumnDataSource per community for scoped HoverTool, CDP viewport for precise
    PNG dimensions
  - 'Correct Imprint palette usage: Engineering=#009E73 (first series), Marketing=#C475FD,
    Sales=#4467A3, amber anchor for bridge edges — both light and dark themes correct'
  - No axes or grid lines (appropriate for network graph), node outlines using page
    background color for clean visual separation
  weaknesses:
  - Hub labels set at 24pt, which is below the recommended 34pt minimum for 3200x1800
    bokeh canvas — may be hard to read when scaled to mobile widths; increase hub
    label text_font_size to 32-34pt to match the standard
  - Two adjacent Hub labels in the Engineering (green) cluster appear close together;
    slightly increase the y-offset from 0.045 to 0.065 to improve separation and reduce
    risk of overlap with node markers
  - Canvas utilization slightly uneven — the force-directed layout clusters the network
    in the left-center and right portions with some wasted empty space on the bottom-left
    quadrant; consider tuning layout parameters or normalization bounds to use more
    of the vertical canvas
