review:
  strengths:
  - Perfect spec compliance and data quality — 50-node 3-community organisational
    network with realistic intra/inter-community edge density is an excellent showcase
  - 'Distinctively Altair: detail=''edge_id:N'' + order=''order:O'' for edge segments
    is a clever idiomatic pattern for rendering graph edges in Vega-Lite'
  - 'Theme adaptation is complete — both renders correctly flip chrome while preserving
    all three Imprint data colors (Engineering #009E73, Marketing #C475FD, Sales #4467A3)'
  - 'Canvas management correctly implemented: pad-to-3200x1800, raise SystemExit on
    overflow, saves both .png and .html'
  - Clean Fruchterman-Reingold implementation inline without networkx dependency;
    np.random.seed(42) for reproducibility
  weaknesses:
  - Hub labels for Hub 0, Hub 10, Hub 14 are densely packed in the Engineering cluster
    — increase dy offset from -12 to -16 or -18, or add per-label x offsets to fan
    them away from each other and reduce proximity to node circles
  - 'Canvas utilization: the bottom-right quadrant below the Engineering cluster is
    noticeably empty — increase chart height (e.g., height=360) or adjust FR layout
    normalization to spread nodes more evenly'
  - The degree-based node sizing is not reflected in the legend, leaving the visual
    encoding unexplained — add a size legend (alt.Size with legend=alt.Legend showing
    degree range) or an annotation
  - Edge strokeWidth=1.0 at mobile scale can be hard to trace — increase to 1.2–1.5
    and slightly reduce opacity to compensate
  - Bridge nodes (those with inter-community connections) are not visually distinguished
    — consider a different stroke color or thicker stroke to highlight cross-community
    connectors and reinforce the storytelling
