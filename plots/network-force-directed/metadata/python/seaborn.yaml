review:
  strengths:
  - Custom Fruchterman-Reingold force-directed layout implemented inline with 150
    iterations and proper normalization — realistic organic community structure
  - Three-way seaborn encoding (hue=department, size=degree, style=node_type) in a
    single scatterplot call — leverages seaborn's multi-encoding strength cleanly
  - 'Imprint palette applied correctly in canonical order (#009E73 Engineering, #C475FD
    Marketing, #4467A3 Sales) with full theme-adaptive chrome'
  - Edge weight encoded in line thickness and edge alpha (0.22) keeps the graph readable
    without clutter
  - Selective hub labeling (top-4 by degree only) prevents label clutter while highlighting
    key nodes
  - Network statistics annotation (nodes, edges, avg degree, bridge count) provides
    immediate quantitative context
  - All font sizes explicitly set throughout (title=12, axes=10, annotations=8, stats=7,
    legend=8/9)
  - Both light (#FAF8F1) and dark (#1A1A17) renders are fully legible with no dark-on-dark
    failures
  weaknesses:
  - Stats annotation at fontsize=7 may be too small (~5 px) when the 3200px PNG is
    scaled to ~400px mobile width — increase to 8pt to match hub label size
  - Hub labels 'Node 3' and 'Node 1' are positionally close in the dense Engineering
    cluster center; if random seed produces a tighter cluster on re-run the labels
    risk overlap — consider adding a minimum separation check or reducing from 4 to
    3 hub labels
  - 'Design could be elevated: edge color could vary by cross-community vs within-community
    (e.g. muted grey for within, INK_SOFT for bridge edges) to reinforce the structural
    story'
  - 'LM-01 gap: legend is constructed manually via matplotlib scatter handles rather
    than using seaborn''s legend API — the `legend=False` + manual handle loop is
    less idiomatic than using seaborn''s built-in legend with `hue_order` and then
    appending the bridge-node handle'
