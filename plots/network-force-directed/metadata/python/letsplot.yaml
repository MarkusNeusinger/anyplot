review:
  strengths:
  - Custom Fruchterman-Reingold implementation correctly reveals 3 distinct community
    clusters without networkx dependency
  - 'Multi-encoding design: community color + degree node size + weight edge thickness/opacity
    redundantly encodes network properties'
  - Correct Imprint palette in canonical order (Engineering=green, Marketing=lavender,
    Sales=blue)
  - Complete axis removal (correct for network graph type) with theme-adaptive legend
    box
  - layer_tooltips() provides genuine letsplot interactive hover for HTML output
  - 50-node social network with realistic team structure, intra/inter-community edge
    density, and bridge edges
  weaknesses:
  - 'Dark render background coverage failure: right ~25% of canvas shows pure white
    (#FFFFFF) instead of the dark theme background (#1A1A17). The plot_background
    styling does not extend to fill the full canvas width when coord_fixed(ratio=1)
    constrains the panel to a square within the 16:9 landscape — the outer canvas
    area beyond the panel defaults to the SVG/HTML export white background. Fix: switch
    to square canvas (ggsize(600, 600) + scale=4 -> 2400x2400) to eliminate the coord_fixed
    + landscape mismatch, or remove coord_fixed and let positions stretch to fill
    the panel.'
  - 'Network layout not well-centered: force-directed algorithm settled in right-center
    portion of canvas, leaving left ~40% mostly empty. Position normalization to [0.05,
    0.95] does not guarantee canvas-centered layout. Square canvas format would better
    utilize the plot area for a symmetric network layout.'
  - Engineering cluster is very densely packed (all 18 nodes overlapping in upper-right
    area), making individual node boundaries and degree differences hard to see within
    the cluster.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the entire 3200x1800 canvas correctly.
      Chrome: Title "network-force-directed · python · letsplot · anyplot.ai" is bold, dark (#1A1A17), and fully readable with adequate top margin. Legend box "Team" in upper-left with INK_SOFT border; all three category labels (Engineering, Marketing, Sales) clearly readable. No axis labels or tick labels (appropriate for network graph type).
      Data: Three distinct force-directed community clusters: Engineering (brand green #009E73, upper-right, ~18 densely packed nodes), Marketing (lavender #C475FD, lower-right, ~17 nodes), Sales (blue #4467A3, center-left, ~15 nodes). Node sizes visibly scale with degree — hub nodes are distinctly larger. Edge segments vary in thickness and opacity by weight. First series is #009E73 (Engineering).
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Dark near-black (#1A1A17) covers approximately the left 75% of the 3200x1800 canvas. FAIL: right ~25% of canvas shows pure white (#FFFFFF) background instead of the expected dark background — the plot_background element does not extend to fill the full canvas width when coord_fixed(ratio=1) constrains the panel to a square within the 16:9 landscape canvas.
      Chrome: Title text is light-colored and readable against the dark portion. Legend background is elevated dark (#242420). Legend text readable (INK_SOFT = #B8B7B0 on #1A1A17 provides good contrast). No dark-on-dark failures in the data area. White strip on right is the primary chrome failure.
      Data: Node and edge colors identical to light render (Engineering=green, Marketing=lavender, Sales=blue). Data colors unchanged between themes as required.
      Legibility verdict: FAIL — dark render background does not cover full canvas (right 25% is white/non-dark). Text in the data area is readable, but the incomplete background coverage is a visible defect.
