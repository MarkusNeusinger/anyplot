review:
  strengths:
  - 'Perfect spec compliance: Fruchterman-Reingold physics (200 iterations) produces
    stable layout revealing 3 distinct communities'
  - Degree-scaled nodes and weight-scaled edges with variable opacity create excellent
    visual hierarchy
  - Imprint palette applied in canonical order (green/lavender/blue) with brand green
    correctly assigned to first series
  - Full theme adaptation — background, title, legend fill, legend text, and edge
    color all flip correctly between light and dark
  - 'Idiomatic letsplot usage: layer_tooltips() for genuine interactivity, scale_size_identity/scale_alpha_identity
    for direct mapping, coord_fixed() to preserve layout aspect ratio'
  weaknesses:
  - Dense intra-community clusters (Engineering top-right, Marketing bottom-right)
    have heavy node overlap — nodes stack on top of each other, making individual
    members indistinguishable within each community. Increasing the repulsion constant
    k (e.g. from 0.5 to 0.8-1.0) or scaling proportional to sqrt(n) would spread clusters
    further apart.
  - 'DE-01 limited by cluster crowding: the visual hierarchy between hub nodes and
    peripheral nodes is partially lost inside the overlapping clusters. More aggressive
    degree scaling (e.g. size = 8 + degree * 2.0) would make high-degree hub nodes
    stand out even when clusters overlap.'
