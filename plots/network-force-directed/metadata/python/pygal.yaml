review:
  strengths:
  - 'Correct Imprint palette: Metabolism=#009E73 (brand green) first, followed by
    lavender and blue for the other modules'
  - Degree-based node sizing elegantly encodes hub proteins — nodes with more connections
    appear visibly larger
  - Visual distinction between intra-module edges (muted gray) and cross-module bridge
    edges (amber dashed) effectively tells the crosstalk story
  - 'Theme adaptation is correct: backgrounds (#FAF8F1 light / #1A1A17 dark), text
    colors, and data colors all adapt properly'
  - Protein-protein interaction domain with functional modules (Metabolism, Signaling,
    Gene Regulation) is a realistic and informative context
  - 'Full output set: SVG + PNG + HTML for interactive hover tooltips via pygal'
  - Fruchterman-Reingold force-directed algorithm implemented correctly with cooling
    schedule and repulsion/attraction forces
  weaknesses:
  - 'Layout imbalance: a single Gene Regulation node (node 28 or similar) is isolated
    in the upper-left corner of the canvas — far from the main cluster — while the
    rest of the network is concentrated in the lower-right half. This leaves ~50-60%
    of the canvas as empty white/dark space and creates a visually confusing composition.
    Add a centripetal/gravity force (pulling all nodes toward canvas center) to prevent
    outlier nodes from drifting far from the main graph.'
  - 'No gravitational centering term in the force-directed algorithm: without a weak
    attractive force toward the canvas center, isolated or lightly-connected nodes
    get pushed to canvas extremes by repulsion. Add `displacement[i] -= alpha * positions[i]`
    with a small alpha (~0.01) on each iteration to keep all nodes anchored near center.'
  - 'Design refinement limited: the pygal XY chart retains a visible frame/border
    around the plot area (top and right borders visible) which adds visual noise for
    a network graph. Consider hiding the chart border with `no_data_text` overrides
    or style tweaks for a cleaner look.'
  image_description: |-
