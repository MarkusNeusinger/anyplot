      Data: Node colors identical to light render — Engineering (#009E73 teal), Marketing (#D55E00 orange), Sales (#0072B2 blue). Edge lines rendered as darker muted gray (#5A5852), subtler on dark background but still visible. Community cluster separation is clearly maintained. Brand green #009E73 remains visible on the dark surface.
