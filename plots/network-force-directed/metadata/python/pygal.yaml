review:
  strengths:
  - Correct Fruchterman-Reingold force-directed layout with cooling schedule — community
    structure clearly separates three modules
  - Degree-based node sizing properly encodes hub proteins (larger nodes = more interactions)
  - 'Imprint palette used correctly: Metabolism=#009E73 (first series), Signaling=#C475FD,
    Gene Regulation=#4467A3, edges use theme-adaptive INK_MUTED'
  - Full theme adaptation — both light (#FAF8F1) and dark (#1A1A17) backgrounds with
    matching chrome tokens
  - Realistic protein-protein interaction domain with biologically motivated module
    names (Metabolism, Signaling, Gene Regulation) and bridge edges for cross-pathway
    crosstalk
  - 'Correct pygal idiom: series-level stroke control (stroke=False for nodes, stroke=True
    for edges), variable node radius via node={''r'': ...}, HTML export'
  - All axes/grid lines disabled — appropriate clean presentation for network graph
    layout
  - np.random.seed(42) ensures reproducibility; all output files correctly named plot-{THEME}.png/html
  weaknesses:
  - Canvas usage is suboptimal — the three clusters spread toward canvas edges (Signaling
    nodes push to the right edge, Gene Regulation nodes to the bottom-left) leaving
    a large empty region in the center-lower portion; tighten position normalization
    to reserve ~10-15% margins and keep layout centred
  - Dense Metabolism cluster has visible node-on-node overlap in the upper-center
    area — reduce within-module edge probability slightly (from 0.35 to ~0.25) or
    increase k parameter to achieve better separation
  - Edge stroke width (1.5px in stroke_style) is thin and barely readable when the
    image is scaled to thumbnail sizes; increase to at least 2.0-2.5px for better
    visibility at ~400px mobile width
  - 'DE-02: No visual refinement beyond minimal defaults — the chart would benefit
    from subtle opacity difference between intra-module edges (slightly more opaque)
    and cross-module bridge edges (different stroke style or colour) to improve data
    storytelling'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct.
      Chrome: Title "network-force-directed · python · pygal · anyplot.ai" in dark ink, spanning ~70% of canvas width, clearly readable. No axis labels or tick labels (axes hidden — correct for network graph). Legend at bottom in 4 columns: Metabolism (green swatch), Signaling (lavender swatch), Gene Regulation (blue swatch), Interactions (gray swatch). Legend text is readable.
      Data: Three node clusters — Metabolism (top-center, ~15 green nodes #009E73, sizes vary with hub nodes clearly larger), Signaling (right side, ~13 lavender nodes #C475FD), Gene Regulation (bottom-left, ~10 blue nodes #4467A3). Edge lines are muted gray (INK_MUTED #6B6A63), thin but visible. Hub nodes are notably larger than peripheral nodes. Node overlap present in dense Metabolism cluster.
      Legibility verdict: PASS — all text is readable, data colors visible against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct.
      Chrome: Title text renders in light/cream color, clearly readable against dark background. Legend text is light-colored and readable. No dark-on-dark failures detected anywhere.
      Data: Identical layout and data colors to light render — Metabolism green, Signaling lavender, Gene Regulation blue are identical. Edge lines appear slightly lighter gray (INK_MUTED #A8A79F on dark) providing slightly more contrast than light render. Brand green #009E73 is clearly visible on the dark background.
      Legibility verdict: PASS — all text readable, no chrome inversion failures, data colors consistent with light render.
