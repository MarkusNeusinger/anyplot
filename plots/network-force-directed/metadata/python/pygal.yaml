      Chrome: Title text is light-colored and clearly readable against dark background. Legend text is light and readable. No dark-on-dark failures observed.
      Data: Colors are identical to light render — same green, lavender, blue nodes, muted gray intra-edges, amber dashed bridge edges. Same layout imbalance as light render (isolated node top-left, cluster bottom-right). Brand green #009E73 remains clearly visible on the dark surface.
      Legibility verdict: PASS — all text is readable against dark background; no dark-on-dark failures.
