review:
  strengths:
  - Force-directed layout using Fruchterman-Reingold algorithm with proper cooling,
    resulting in well-separated community clusters
  - Theme-adaptive styling correctly applied in both light and dark renders with correct
    background colors (#FAF8F1/#1A1A17)
  - Interactive pygal tooltips with node degree and hub status information fully leveraged
  - Clean Okabe-Ito community colors (Engineering=#009E73, Marketing=#D55E00, Sales=#0072B2)
    with muted edge styling
  - Reproducible with np.random.seed(42) and correct output files (PNG + SVG + HTML)
  weaknesses:
  - 'First chart series is the edge/Connections series using muted gray rather than
    #009E73 — technically violates first-series=green rule (minor, edges as structural
    element is the correct design choice)'
  - Some node overlap in dense cluster areas (Engineering right cluster, Sales top-left
    cluster) due to uniform node sizing
  - Node size does not scale by degree — degree information is only available via
    tooltip, missing a visual encoding opportunity
  - DE-02 visual refinement is functional but not exceptional — legend box styling
    and overall polish could be higher
