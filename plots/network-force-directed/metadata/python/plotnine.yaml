review:
  strengths:
  - Custom Fruchterman-Reingold layout with simulated annealing cooling — no external
    graph library needed
  - Three simultaneous visual encodings (color by department, node size by degree,
    edge thickness+linetype by connection type) all working harmoniously
  - Perfect theme adaptation in both renders — no dark-on-dark failures, correct backgrounds
  - Spatial legend ordering by centroid x-position is an elegant plotnine-idiomatic
    touch
  - Informative caption annotation that decodes all visual encodings for the reader
  weaknesses:
  - annotate() size=8 exceeds the plotnine-guide recommended 2.5-4mm range; while
    the rendered text looks acceptable, aligning to the guide (size=3-4) would ensure
    consistency
  - 'DE-01 and DE-02 have room for improvement: hub nodes (highest degree) could be
    more dramatically enlarged to create a stronger focal point; edge colors could
    vary slightly with weight rather than only thickness'
  - 'LM-02 below max: core distinctiveness comes from numpy physics engine, not plotnine
    idioms — further plotnine-specific features could raise this'
