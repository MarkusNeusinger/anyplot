review:
  strengths:
  - Correct D3 force-directed implementation using the full force module (link, charge,
    center, x/y, collide) with synchronous tick loop for static rendering
  - Node size scales with degree — Python, JavaScript, and PostgreSQL visually emerge
    as hub nodes, telling the centrality story immediately
  - Selective labeling (only hub nodes with degree ≥ 4) avoids clutter while retaining
    useful identity for the most connected nodes
  - 'Imprint palette used correctly in canonical order for 5 tech-ecosystem groups;
    first series (Languages) is #009E73'
  - 'Theme-adaptive chrome: edges use t.inkSoft, nodes use t.pageBg as stroke for
    clean separation on both surfaces'
  - 'Excellent data scenario (tech ecosystem dependencies): factually accurate relationships
    (Python→Django/FastAPI/NumPy/PyTorch, Go→Docker/Kubernetes) are immediately recognizable'
  - 'Full spec compliance: 35 nodes, 51 edges, 5 communities, degree-scaled sizing,
    sufficient force iterations (300), collision avoidance'
  - Clean idiomatic D3 code with no helper functions/classes; degree computation is
    elegant and correctly done before simulation mutates links
  weaknesses:
  - Node label font size is 12px and legend labels are 11–13px — both below the D3
    harness guideline minimum of 14px; the 'Node size ∝ degree' annotation at 11px
    is barely readable at canvas size and would be invisible at mobile widths (~400px)
  - Slight label crowding potential in the dense Python-cluster area (Django / FastAPI
    / PostgreSQL labels sit close together); adding a small dy offset per-label or
    a label-collision nudge would help
  - 'Canvas utilization: the lower-left quadrant of the canvas is largely empty because
    the force layout settled without filling it; increasing the centering forces (forceX/forceY
    strength from 0.05 to 0.08–0.12) or adjusting charge strength would spread nodes
    more evenly'
  - 'DE-01 (aesthetic sophistication): the design is competent but doesn''t reach
    ''strong design'' level — consider adding a subtle radial gradient or glow to
    the largest hub nodes (Python, JavaScript), or using stroke-width proportional
    to edge weight to add visual depth'
  - 'DE-02 (visual refinement): the right-side legend area has significant unused
    space between the last legend item and the bottom; compressing the margin or adding
    a small subtitle/annotation there would polish the layout'
