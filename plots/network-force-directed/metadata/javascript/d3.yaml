  - Semi-transparent edges (opacity 0.35) with pageBg stroke on nodes add polish
  - Perfect spec compliance — correct chart type, all required features, accurate
    tech-ecosystem data
  - Synchronous tick loop (300 iterations) with sim.stop() is the correct D3 static-render
    pattern
  - 'Idiomatic D3: d3.forceLink id-based resolution, forceCollide for node separation,
    all forces well-tuned'
  - Theme-adaptive chrome throughout — t.ink, t.inkSoft, t.pageBg used correctly in
    both renders
  weaknesses:
  - 'Central cluster label crowding: Django, Python, PostgreSQL, FastAPI labels are
    densely packed and partially overlap — use a label collision detection pass or
    widen the force layout (increase charge strength or link distance for the Databases-Frameworks
    cluster)'
  - 'Force simulation initial positions are non-deterministic (no fixed-seed LCG)
    — D3 uses Math.random() for initial node placement, so layout can vary between
    renders. Add a tiny LCG: e.g. let seed=42; const lcg = () => (seed = (seed * 1664525
    + 1013904223) >>> 0) / 2**32; then assign n.x=lcg()*iw, n.y=lcg()*ih before sim.stop()'
  - Bottom of canvas is noticeably empty (~20-25% of canvas height unused below the
    network cluster) — increase forceY strength slightly or use a slightly larger
    charge strength to spread nodes more vertically
