review:
  strengths:
  - Full Fruchterman-Reingold force-directed layout implemented from scratch with
    deterministic LCG seeding — produces authentic physics-based community clustering
  - 'Degree-based node sizing creates clear visual hierarchy: hub nodes (Machine Learning,
    Algorithms, Cloud Computing) stand out naturally'
  - Custom Chart.js plugin API (beforeDatasetsDraw/afterDatasetsDraw) used idiomatically
    for edge drawing and label pill rendering
  - Node label pill backgrounds (semi-transparent elevatedBg fill) ensure legibility
    regardless of underlying node or edge color
  - Imprint palette applied correctly in canonical order across 5 communities; data
    colors identical in both themes; only chrome flips
  - 'Axes hidden cleanly (display: false) — appropriate for a network graph where
    cartesian context is meaningless'
  weaknesses:
  - 'Canvas utilization imbalanced: force-directed layout clusters in the upper ~65%
    of the square canvas, leaving ~30-35% empty space at the bottom. Increase the
    `span` divisor (currently 1.8) to 1.3 or tighten the y-scale min/max from ±1.35
    to ±1.05 to push nodes closer to filling the full canvas.'
  - Comp. Vision and Deep Learning node labels are crowded/overlapping in the AI/ML
    cluster — both land at nearly the same y position with pill boxes touching. Add
    a vertical offset to the pill baseline (e.g., check y-proximity and nudge conflicting
    labels ±20px) or increase labelPlugin font to 13px and check for collisions before
    rendering.
  - Node label font at 12px CSS (24 source-px at dpr=2) scales to ~4px on 400px mobile
    viewport — borderline unreadable. Increase to 13-14px CSS to maintain legibility
    at small display sizes.
  - 'DE-02 refinement: the substantial bottom dead space makes the layout feel unfinished.
    After fixing canvas utilization, add bottom padding reduction to bring the network
    lower in the frame for a more centered, balanced composition.'
