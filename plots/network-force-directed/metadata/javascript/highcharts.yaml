review:
  strengths:
  - Full Fruchterman-Reingold force-directed layout implemented from scratch in pure
    JS — deterministic (seeded LCG, 500 iterations), no external physics library needed
  - 'Correct Imprint palette applied: Frontend=#009E73 (brand green) as first series,
    communities 2-5 use palette[1]-[4] in canonical order'
  - 'Node sizing by degree (radius 4+min(degree,9)) creates an effective visual hierarchy:
    hub nodes (api, deploy, analytics, ui-kit) are immediately prominent'
  - Selective labeling strategy (only nodes with degree≥4 shown) avoids label clutter
    while keeping key hubs named
  - 'Theme-adaptive chrome is correct in both renders: t.ink/t.inkSoft/t.pageBg tokens
    used throughout; edge color adapts via ANYPLOT_THEME check'
  - Null-separated line segments for edges is the idiomatic Highcharts technique for
    multi-segment polylines in a single series
  - textOutline on data labels (2px pageBg) ensures legibility regardless of node
    color overlap — small but important detail
  - 'Perfect spec compliance: 26 nodes, 52 edges, 5 communities, degree-based sizing,
    cross-community connections all present'
  weaknesses:
  - Data label fontSize is 11px CSS — below the 14px minimum recommended in the style
    guide. At mobile scale (~400px from 3200px source) these labels become effectively
    unreadable. Increase to 13-14px CSS.
  - Smallest peripheral nodes (degree 1-2) have radius=5-6 CSS px which is quite small.
    Consider a minimum radius of 6-7 CSS px to ensure all nodes are clearly visible.
  - rand() function defined at top level technically violates the KISS/no-functions
    structure rule — acceptable here since a seeded LCG is the only way to achieve
    reproducibility in the browser, but note the deviation.
  - Right and left chart margins are only 32px CSS (64px in the rendered PNG), which
    places some nodes relatively close to canvas edges. Increasing to 48px on all
    sides would give more breathing room.
  - Edge weight is listed as optional in the spec but could be visualised via lineWidth
    variation — currently all edges use uniform lineWidth=1.5
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, clearly not pure white.
      Chrome: Title "network-force-directed · javascript · highcharts · anyplot.ai" in bold dark (#1A1A17) text at 22px CSS, centered, spanning ~65% of canvas width — fully readable. No x/y axis labels or tick labels (axes are hidden — appropriate for a network graph). Horizontal legend at bottom: "Frontend ● Backend ● Data ● Infra ● Shared" in dark secondary ink (~14px) — readable.
      Data: 26 nodes across 5 communities. Frontend nodes in brand green (#009E73), Backend in lavender (#C475FD), Data in blue (#4467A3), Infra in ochre (#BD8233), Shared in matte red (#AE3030). Hub nodes (api=largest purple, deploy=large ochre, analytics=medium blue, ui-kit=medium green) visually prominent via degree-scaled radius. 52 edges rendered as thin semi-transparent warm-gray lines. Node labels (data-lake, analytics, config, utils, deploy, db, auth, ui-kit, state, forms, logging) appear in small (~11px CSS) dark secondary text above each labeled node — readable at full resolution, borderline at mobile.
      Legibility verdict: PASS — all elements readable at full resolution; node labels are small (11px) but sufficient.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title same text in light (#F0EFE8) ink — clearly readable against the dark background. No axis labels or ticks. Legend text appears in light secondary gray (#B8B7B0) — readable. No dark-on-dark failures detected.
      Data: Node colors are identical to the light render (Imprint palette data colors unchanged — only chrome flips). Edge color shifts to rgba(184,183,176,0.28) for the dark theme — appropriate lighter semi-transparent tone. Data labels use t.inkSoft (#B8B7B0) with 2px #1A1A17 textOutline — readable against both dark backgrounds and saturated node colors.
      Legibility verdict: PASS — all text readable against the dark background; data colors identical to light render; no dark-on-dark issues.
