review:
  strengths:
  - Realistic software module dependency dataset with meaningful 4-community structure
    (Frontend, Backend, Data Layer, Infrastructure) — clear real-world use case for
    force-directed graphs
  - Degree-based node sizing clearly identifies the API hub as the central connector
    across all communities
  - Cross-community edges are visually distinguished (wider, higher opacity) to guide
    the eye to inter-layer connections
  - 'Imprint palette applied in canonical order — first series (Frontend) correctly
    uses brand green #009E73'
  - 'ECharts-idiomatic patterns: `categories` array for community coloring, `labelLayout:
    { hideOverlap: true }` to prevent label clutter, `lineStyle.color: ''source''`
    for organic edge colors'
  - Theme-adaptive chrome correctly uses `t.ink` / `t.inkSoft` / `t.pageBg` tokens
    — title, legend, and node labels flip correctly between light and dark themes
  weaknesses:
  - 'Non-deterministic force layout: ECharts force layout has no seed parameter, so
    light and dark renders produce different node topologies (confirmed by visual
    inspection). Fix: pre-compute deterministic x/y positions using a seeded LCG before
    the force phase, or hard-code initial node coordinates, ensuring both renders
    converge to the same layout'
  - 'Canvas underutilization: the network occupies roughly 60% of the 2400x2400 canvas
    with empty whitespace in the lower portions. Fix: increase `edgeLength` range
    to [120, 280] and `repulsion` to 600-700 to spread nodes further across the canvas'
  - 'Node labels at fontSize: 12 CSS px (~24 source px) are borderline small for mobile
    readability at ~400px width. Fix: increase to fontSize: 14'
  - 'Design storytelling is limited to community coloring — no annotations or callouts
    highlight the API hub''s central role. Fix: add a subtitle like ''API module is
    the central integration point'' or a text annotation near the API node listing
    its connection count'
  image_description: |-
