      Background: Warm off-white #FAF8F1 — correct anyplot surface color, not pure white.
      Chrome: Title "network-force-directed · javascript · echarts · anyplot.ai" centered at top in bold dark text (#1A1A17 via t.ink) — clearly readable. Horizontal legend below title shows 4 community labels (Frontend, Backend, Data Layer, Infrastructure) with colored circle icons in t.inkSoft (#4A4A44) — all readable.
      Data: Force-directed network with 30 nodes in 4 communities. Frontend nodes: brand green #009E73 (correct first series). Backend nodes: lavender #C475FD. Data Layer: blue #4467A3. Infrastructure: ochre #BD8233. API hub node is largest (9 connections) with thick dark border for emphasis. Node labels positioned to the right, in t.inkSoft, with hideOverlap active. Edges are semi-transparent (opacity: 0.55) and inherit source node color. Cross-community edges are slightly wider/more opaque.
      Legibility verdict: PASS — all text readable against warm off-white background. No light-on-light issues. Network graph is clear and well-structured.
      Canvas note: Graph occupies roughly 60% of the 2400x2400 canvas; lower portions have significant empty whitespace.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title in light text (#F0EFE8 via t.ink) — clearly readable against dark background. Legend labels in t.inkSoft (#B8B7B0) — visible. Node labels also use t.inkSoft (light gray) — readable on dark background. No dark-on-dark failures observed.
      Data: Same 4 community colors as light render — #009E73, #C475FD, #4467A3, #BD8233 — confirmed identical categorical palette. Node border color switches to pageBg (#1A1A17 in dark) making standard nodes borderless, while API hub border uses t.ink (#F0EFE8) — correctly flipped.
      Legibility verdict: PASS — all text readable against near-black background. No dark-on-dark issues.
      Layout note: Force layout settled at different node positions than light render (non-seeded — different topology). Both layouts are reasonable but differ, which is a reproducibility concern.
