review:
  strengths:
  - Imprint palette applied correctly across all 4 community categories (Frontend=#009E73,
    Backend=#C475FD, Data Layer=#4467A3, Infrastructure=#BD8233)
  - Node size proportional to degree effectively highlights the API hub as the most
    connected node
  - labelLayout hideOverlap cleanly prevents label collisions in the dense network
  - Idiomatic ECharts graph/force layout with categories system, emphasis control,
    and force physics parameters
  - Realistic software module dependency scenario with 30 nodes across 4 meaningful
    communities
  - All chrome tokens (t.ink, t.inkSoft, t.pageBg) correctly applied — both themes
    pass readability checks
  - edge borderColor:t.pageBg with borderWidth:2 creates clean visual separation between
    overlapping nodes
  weaknesses:
  - 'Poor canvas utilization: the force-directed graph cluster occupies roughly 14%
    of the 2400x2400 canvas. In the light render, the graph spans x=330-780 (~41%
    width) and y=330-720 (~36% height), leaving ~35% of canvas height empty below
    the graph and ~30% empty on the right. Increase force.repulsion from 180 to 400-600,
    widen force.edgeLength from [50,120] to [80,200], and consider a center gravity
    of 0.25+ so the layout expands to fill 50%+ of the canvas.'
  - 'Design excellence is adequate but not distinguished. The visualization reads
    as a well-configured library default: no visual accent on the highest-degree node,
    no edge-weight differentiation, no annotation highlighting the API hub as the
    system''s central dependency. Consider: (1) making the highest-degree node (API)
    use a slightly brighter or outlined appearance, (2) varying edge opacity or width
    by cross-community vs intra-community to guide the eye to key bridging connections.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. PASS.
      Chrome: Bold title "network-force-directed · javascript · echarts · anyplot.ai" at top center in dark ink — clearly readable. Legend below title shows 4 colored circles (Frontend, Backend, Data Layer, Infrastructure) with inkSoft text — readable. All chrome uses theme tokens correctly.
      Data: Force-directed graph with 30 nodes, 4 color-coded communities. Frontend nodes = #009E73 (brand green, correct first palette slot). Backend = lavender/purple. Data Layer = blue. Infrastructure = ochre. Edges are semi-transparent (opacity 0.55), straight, colored by source node. Node sizes vary by degree — API node is clearly the largest. Labels placed to the right of nodes, hidden where they would overlap. Graph occupies the center-left portion of the canvas; large empty space at bottom (~35% of canvas height) and right side (~30% of canvas width).
      Legibility verdict: PASS — all visible text is readable. hideOverlap correctly suppresses crowded labels.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct, not pure black. PASS.
      Chrome: Title in light/white text — clearly readable against dark background. Legend text in light inkSoft color — readable. No dark-on-dark failures detected.
      Data: Same 4-community color scheme as light render — data colors are identical (Frontend=#009E73, Backend=lavender, Data Layer=blue, Infrastructure=ochre). Graph layout differs slightly from light render (expected for force-directed non-deterministic simulation). Node borders use t.pageBg for visual separation. Canvas utilization issue persists — graph fills a compact cluster with significant empty space around it.
      Legibility verdict: PASS — all visible text readable on dark background. No dark-on-dark issues found.
