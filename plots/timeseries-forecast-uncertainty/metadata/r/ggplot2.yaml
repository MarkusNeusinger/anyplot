    0.2-0.4) — raise ALPHA_95 to ~0.18-0.22 in light mode and ALPHA_80 to ~0.28-0.30
  - Axis title size 12pt slightly above 10pt guideline; plot title 14pt above 12pt
    guideline — reduce to axis.title size=10, plot.title size=12
  - Legend CI keys look nearly identical (same hue, only alpha differs) — consider
    legend.key.size adjustment to improve 95% vs 80% CI differentiation
