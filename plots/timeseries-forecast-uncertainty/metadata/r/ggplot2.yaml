  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
      Chrome: Title "timeseries-forecast-uncertainty · r · ggplot2 · anyplot.ai" in dark ink, clearly readable, ~65% canvas width. Axis labels "Date" and "Monthly Sales" in dark ink (size 20). Tick labels "$55K"–"$75K" and date labels ("Apr '22" … "Apr '25") in INK_SOFT, all readable. Legend at top with four entries: Historical (green line), Forecast (orange dashed line), 95% CI (fill swatch), 80% CI (fill swatch). Both CI swatches show same orange color in legend.
