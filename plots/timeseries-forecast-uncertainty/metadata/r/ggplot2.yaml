review:
  strengths:
  - 'Correct Okabe-Ito palette with #009E73 as first series throughout both renders'
  - 'Intelligent theme-adaptive alpha: higher values in dark mode to prevent muddy
    band colors — rare attention to per-theme visual quality'
  - 'Statistically correct forecast uncertainty: widening at sqrt(horizon) mimics
    real ARIMA/Prophet behavior'
  - 'Clean grammar-of-graphics construction: separate color/fill scales produce a
    single ordered legend without manual patches'
  - Explicit font sizing hierarchy (14/12/10/10) gives well-proportioned text at all
    sizes
  weaknesses:
  - 'DE-01 could reach 6/8 with minor polish: add generous plot.margin, a subtle panel.border
    using INK_SOFT, or slightly bold title weight (face = bold)'
  - LM-02 is solid but not distinctive — using geom_ribbon is expected for ggplot2
    confidence intervals; a more distinctive feature (e.g., after_stat(), custom StatBin,
    or ggforce for advanced annotation) would elevate the score
