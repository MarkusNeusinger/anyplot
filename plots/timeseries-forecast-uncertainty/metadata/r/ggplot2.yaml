      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title in near-white light ink, clearly readable. Axis labels and tick labels in light INK_SOFT — no dark-on-dark failure. Legend text in light ink. All chrome is correctly inverted for dark theme.
      Data: Historical line is same #009E73 green — identical to light render (data colors unchanged). Forecast line is same #D55E00 orange. HOWEVER, the CI bands — which were light peach fills in the light render — now appear as dark brownish-red opaque regions due to alpha blending on dark background. At alpha 0.15 and 0.25, #D55E00 on #1A1A17 yields near-solid dark fills with very little differentiation between 80% and 95% CI bands. The forecast line is still legible against the dark CI region.
      Grid: Grid lines appear as subtle lighter lines on dark background — acceptable visibility.
      Legibility verdict: PASS for chrome legibility (title, labels, ticks all readable). PARTIAL FAIL for CI band visual differentiation — the 80% vs 95% distinction is lost in the dark theme due to insufficient contrast between the two alpha levels on dark background.
