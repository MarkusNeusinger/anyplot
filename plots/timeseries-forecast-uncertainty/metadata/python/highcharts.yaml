    ticks/legend)
  - Seed set for reproducibility, clean KISS code structure, CDN fallback logic is
    well-organized
  - Realistic monthly product demand scenario with widening uncertainty over the forecast
    horizon
  weaknesses:
  - Both horizontal and vertical grid lines are present — for a time series, vertical
