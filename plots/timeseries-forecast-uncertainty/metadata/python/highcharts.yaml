    space between legend and canvas edge; could be reduced to ~160'
  - Design Excellence is above median but not publication-ready — no spine removal
    (L-shaped axes are correct but the overall chart still reads as 'configured Highcharts
    default')
  - 'LM-02: AreaRangeSeries and plotLines are used well but the implementation could
    leverage Highcharts-specific interactive features like shared crosshair or band
    zone fills for stronger library differentiation'
