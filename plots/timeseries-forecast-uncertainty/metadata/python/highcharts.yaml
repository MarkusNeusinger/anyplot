review:
  strengths:
  - plotLines for forecast start marker is an elegant Highcharts-native solution —
    the dashed vertical line with label is precisely what this feature is designed
    for
  - 'Theme adaptation is thorough: all INK/INK_SOFT/GRID/PAGE_BG tokens applied to
    every chrome element; both renders are correct'
  - Data storytelling above average — the widening CI band fan visually encodes growing
    uncertainty without any annotations
  - 36-point historical + 12-point forecast is well-proportioned and representative
    of a real ARIMA/Prophet-style output
  - CDN fallback with retry logic ensures robust JS download in restricted environments
  - AreaRangeSeries + LineSeries combination is idiomatic Highcharts usage for this
    chart type
  - shared tooltip and zIndex layer ordering use Highcharts-native capabilities well
  weaknesses:
  - _download_js helper function breaks KISS structure (CQ-01 -1) — inline the retry
    loop directly
  - CI bands are slightly less visually distinct in dark mode (both render as layered
    dark-steel blues) — increase fill_opacity slightly for dark theme (e.g. 0.35 dark
    vs 0.25 light)
  - Legend at bottom edge — increase spacingBottom from 100 to 130px to ensure legend
    is never clipped at full canvas size
  - CI band colors use non-sequential Okabe-Ito positions (outer 95% CI uses position
    6, inner 80% CI uses position 3) — reordering is reasonable but departs from canonical
    sequential assignment
