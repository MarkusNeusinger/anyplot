      Data: Historical green and forecast orange colors identical to light render. However, outer 95% CI band at alpha=0.15 of #D55E00 on #1A1A17 background produces a very dark brownish-orange that is barely distinguishable from the background surface in some areas — effective contrast is low. Inner 80% band at alpha=0.30 is noticeably more visible.
