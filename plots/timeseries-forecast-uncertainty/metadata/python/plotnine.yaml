      Chrome: Title "timeseries-forecast-uncertainty · python · plotnine · anyplot.ai" at size=12pt spans ~75% of width (expected for long mandated title). Subtitle readable in muted color. Legend at top shows "series" header (unpolished — should be suppressed) with Historical and Forecast entries. X-axis rotated date labels and Y-axis "Electricity Demand (GWh)" clearly readable. "Forecast period" annotation visible but dashed vline passes slightly through text characters.
