review:
  strengths:
  - Solid Okabe-Ito palette with correct first-series green (#009E73) and full theme-adaptive
    chrome in both renders.
  - Nested 80%/95% CI bands with differentiated alpha (0.30 inner / 0.15 outer) correctly
    visualize expanding forecast uncertainty.
  - 'Historical/forecast visual distinction is excellent: solid vs. dashed linestyle
    + distinct color + vertical dashed divider + annotation — multiple redundant cues.'
  - All font sizes explicitly set; perfectly proportioned at both desktop and mobile
    scale.
  - Realistic electricity demand scenario with natural trend + seasonality; CI widths
    follow sqrt(t) expansion matching statistical forecasting conventions.
  weaknesses:
  - CI bands missing from legend — spec explicitly requires legend identifying confidence
    levels; add scale_fill_manual with named ribbon levels for 80% CI and 95% CI.
  - '"series" header showing in legend — replace name="" with name=None in scale_color_manual
    to suppress the column name header.'
  - 'Outer 95% CI band nearly invisible in dark mode — increase alpha from 0.15 to
    0.20-0.22 so the outer bound is clearly distinguishable against the #1A1A17 surface.'
  - Annotation/vline cosmetic overlap — shift Forecast period annotation x to forecast_start
    + DateOffset(months=1) with ha="left" so text clears the vertical line.
