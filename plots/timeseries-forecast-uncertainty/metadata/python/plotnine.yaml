review:
  strengths:
  - 'Correct Okabe-Ito palette throughout: Historical = #009E73 (position 1), Forecast
    = #D55E00 (position 2)'
  - Nested confidence bands with clear alpha differentiation (0.15 outer / 0.30 inner)
    communicate expanding uncertainty naturally
  - Vertical dashed separator + 'Forecast period' annotation creates a clean forecast-start
    marker with good storytelling
  - 'Full theme adaptation: all chrome elements (title, axis labels, ticks, legend,
    grid) flip correctly between light and dark renders'
  - Clean, reproducible flat code structure (imports → tokens → data → plot → save)
    with np.random.seed(42)
  - Realistic electricity demand scenario with plausible seasonality, trend, and widening
    confidence intervals over forecast horizon
  weaknesses:
  - panel_border=element_rect(color=INK_SOFT, fill=None, size=0.5) draws a four-sided
    box frame; replace with panel_border=element_blank() and keep axis_line for L-shaped
    spine per style guide
  - Legend title displays 'series' (the dataframe column name) instead of being suppressed;
    fix by adding legend_title=element_blank() inside theme() — name='' in scale_color_manual
    alone is insufficient in plotnine
  - Confidence interval band levels (80% and 95%) are not labeled in the legend or
    via annotation; spec explicitly asks for a legend identifying confidence levels
    — add annotate('text') labels near the right edge of each band
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "timeseries-forecast-uncertainty · python · plotnine · anyplot.ai" in dark ink (~75% width, expected for long mandated format). Subtitle in muted ink below. Legend at top shows "series" header (column name visible — bug) with green solid line for "Historical" and orange dashed line for "Forecast". Y-axis label "Electricity Demand (GWh)" and x-axis label "Date" in dark ink. Tick labels in INK_SOFT color, rotated 45° on x-axis. All text clearly readable.
      Data: Green (#009E73) solid line for historical period Jan 2022–Jan 2025. Orange (#D55E00) dashed line for forecast Jan 2025–Jan 2026. Two nested shaded orange bands: lighter outer (95% CI, alpha=0.15) and darker inner (80% CI, alpha=0.30). Dashed vertical line at forecast start with "Forecast period" annotation above. Thin panel border box visible on all four sides.
      Legibility verdict: PASS — all text readable against light background, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title, subtitle, axis labels, and tick labels all rendered in light/cream colors (#F0EFE8 / #B8B7B0 range). "Forecast period" annotation text visible in muted light color. All text clearly readable against dark background. No dark-on-dark failures observed.
      Data: Historical line remains #009E73 (identical to light render — correct). Forecast confidence bands appear as darker, more saturated brown-amber tones on the dark background (alpha blending on dark surface creates heavier appearance but both bands remain clearly distinguished). Dashed forecast line and vertical separator visible. Data colors consistent with light render.
      Legibility verdict: PASS — all text readable against dark background, no chrome inversion failures
