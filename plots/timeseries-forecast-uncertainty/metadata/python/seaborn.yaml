      Data: Historical green (#009E73) and forecast orange (#D55E00) lines identical to light render. CI bands behave differently on dark surface: 80% band (alpha=0.28) appears as saturated bright orange; 95% band (alpha=0.15) blends into dark brownish-orange — distinguishable but considerably less prominent than in light render.
      Legibility verdict: PASS — text readable, but 95% CI outer band loses visual prominence on dark surface.
