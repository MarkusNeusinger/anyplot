  - Color semantics (green=history, orange=forecast) create an immediately readable
    narrative without requiring annotations
  - 'Full spec compliance: all required CI bands, boundary marker, and legend elements
    correctly implemented'
  - 'Statistically sound data: sqrt-horizon uncertainty growth, business-day date
    range, realistic stock prices'
  - All theme-adaptive chrome tokens correctly threaded throughout (title, labels,
    ticks, spines, grid, legend)
  - Widening CI bands create a natural focal point and visual hierarchy that guides
    the viewer toward the forecast region
  weaknesses:
  - 'CI bands are nearly invisible in dark mode: alpha=0.15 for the 95% band blends
    orange with #1A1A17 to ~#362414 (dark brownish), essentially indistinguishable
    from the background; alpha=0.28 for the 80% band is visible but muddy. Use theme-adaptive
    alpha values: ALPHA_95 = 0.15 if THEME == ''light'' else 0.35, ALPHA_80 = 0.28
    if THEME == ''light'' else 0.50'
  - 'Canvas size deviation: figsize=(16, 9) at dpi=300 produces 4800x2700 px — the
    style guide and library spec call for figsize=(8, 4.5) at dpi=400 for the canonical
    3200x1800 output'
  - 'Design excellence ceiling: no focal-point annotation (e.g., a small label for
    the forecast boundary date), no subtitle or secondary descriptive element that
    would elevate from ''strong default'' to ''publication-ready'''
