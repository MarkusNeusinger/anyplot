  - 'Perfect spec compliance: all required features (history, forecast, boundary marker,
    nested 80%+95% CI bands) present and correctly implemented.'
  - 'Excellent data storytelling arc: green solid history → dotted boundary → dashed
    orange forecast with widening bands naturally guides viewer past→future.'
  - 'Full Okabe-Ito palette compliance, correct theme-adaptive chrome in both renders,
    correct backgrounds (#FAF8F1 / #1A1A17).'
