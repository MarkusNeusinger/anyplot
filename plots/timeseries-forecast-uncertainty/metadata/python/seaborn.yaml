  - 'Perfect spec compliance: historical line, forecast dashed line, nested 80%/95%
    CI bands, vertical boundary marker, and Forecast annotation all present'
  - Excellent theme-adaptation with thoughtful alpha adjustments per theme (higher
    alpha in dark mode prevents CI bands from disappearing on the near-black surface)
  - 'Idiomatic seaborn usage: long-form data with hue/style/palette/dashes dict mapping
    — distinctly seaborn API'
