  weaknesses:
  - 'DE-01/DE-02: In dark mode the CI bands at higher alpha (0.42/0.30) become visually
    heavy and saturated, slightly reducing refinement. A narrower alpha range or a
    subtle edge stroke on the bands would improve dark-mode polish'
  - 'LM-02: The implementation does not leverage any distinctively seaborn-only statistical
    feature (e.g., built-in estimator/errorbar, FacetGrid); most CI band work is done
    via matplotlib fill_between'
