    differentiation elegantly.
  weaknesses:
  - The 95% CI outer band (alpha=0.15) on dark background (#1A1A17) blends into a
    dark brownish tone — considerably less visible than on light render. Raise alpha
    to ~0.20 for the outer band.
  - No descriptive title prefix (e.g. "Stock Price Forecast · timeseries-forecast-uncertainty
    · python · seaborn · anyplot.ai") — missed opportunity for storytelling context.
  - Forecast boundary vertical line has no label or annotation — add a small text
    marker ("Forecast →") near the dividing line to sharpen data story.
  - figsize=(16,9) dpi=300 produces 4800×2700 px instead of the standard 3200×1800
    (figsize=(8,4.5) dpi=400).
