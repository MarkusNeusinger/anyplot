    functionally imperceptible in both renders.
  - Legend is very small (legend_font_size=16 at 4800px canvas) and cramped in the
    top-left corner with items likely truncated.
  - Canvas size is 4800x2700 instead of the standard 3200x1800 — deviates from spec
    without clear benefit.
