      Data: Historical green line (#009E73) is clear and prominent spanning the full historical period. In the upper-right (forecast region), a semi-transparent orange CI band is visible. 80% CI shows as dashed dark boundary lines within the band. Forecast dashed line (orange) is barely visible against the orange fill. Legend at bottom shows 4 items (95% CI, 80% CI, Historical (observed), Forecast (projected)) in readable text.
      Legibility verdict: PASS overall, but x-axis tick label truncation ("J...") renders the date information unreadable — a significant usability failure.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface.
      Chrome: Title in light text, readable. Y-axis label "Sales ($)" and X-axis label "Month" in light text, readable. Y-axis tick labels readable (light-colored). X-axis tick labels still truncated to "J..." — same issue as light. Grid lines are light-colored subtle dashes. Legend text is light-colored and readable.
      Data: Historical green line (#009E73) is identical color to light render — correct Okabe-Ito position 1 consistency across themes. In the forecast region, the CI band appears as a dark brownish-orange (rgba orange on dark background creates expected composite color). The 80% CI boundary lines are now white (INK flips in dark theme) and clearly visible. The forecast dashed orange line is visible but still competes with the brownish CI band. No dark-on-dark failures — all text is light on dark.
      Legibility verdict: PASS overall. No dark-on-dark failures. Same x-axis truncation issue as light render.
