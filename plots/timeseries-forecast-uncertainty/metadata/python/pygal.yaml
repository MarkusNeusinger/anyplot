review:
  strengths:
  - Clever background-erase technique effectively renders 95% CI band within pygal's
    fill-from-axis-only constraint
  - SVG post-processing correctly fixes pygal's hardcoded black guide lines for dark-theme
    compatibility
  - 'Theme-adaptive coloring is thorough: INK/INK_MUTED/PAGE_BG tokens applied consistently
    in both renders'
  - Realistic monthly sales scenario with seasonal sinusoidal pattern and upward trend
  - 'Perfect code quality: reproducible seed, clean KISS structure, correct dual-file
    output (PNG + HTML)'
  - 'Historical line uses brand green #009E73 and forecast line uses Okabe-Ito position
    2 #D55E00'
  weaknesses:
  - X-axis tick labels truncated to 'J...' — all displayed dates (Jan 22, Jul 22,
    Jan 23, etc.) start with J and are indistinguishable; use a shorter format like
    '%b\u2019%y' or '%m/%y' so labels are at least partially readable
  - 80% CI not shaded — spec explicitly requires nested shaded bands (darker 80%,
    lighter 95%); the current implementation shows 80% CI only as dashed boundary
    lines with no fill, missing the nested-band visual
  - Forecast dashed orange line barely visible within the orange 95% CI fill band
    — consider a contrasting color for the forecast line or increase its stroke-width
    so it stands out from the CI background
  - Forecast vertical separator not visually prominent — the x_labels_major Jan 25
    major guide line is too subtle; the forecast start boundary is hard to see
  - 'VQ-07 partial: first series color is orange CI fill (rgba(213,94,0,…)), not brand
    green #009E73; historical line is green but is series index 4 not 0'
  - Forecast region only occupies ~14% of x-axis width (6 of 42 months), making the
    CI band detail very cramped in the upper-right corner
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface.
