      Data: Brand-green (#009E73) solid line for 36 months of historical data; orange (#D55E00) dashed line for forecast from Jan 25; semi-transparent orange fill (rgba(213,94,0,0.20)) for 95% CI band; muted dashed lines for 80% CI bounds; vertical dashed guide at Jan 25 forecast boundary
