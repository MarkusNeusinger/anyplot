review:
  strengths:
  - Creative background-erase technique to simulate fill-between CI bands within pygal's
    fill=True API limitations
  - SVG post-processing correctly fixes pygal's hardcoded black guide line colors
    for dark-theme compatibility
  - Correct theme tokens throughout (PAGE_BG, INK, INK_MUTED) with proper light/dark
    adaptation
  - Realistic monthly sales dataset with seasonality, trend, and appropriate forecast
    CI widths
  - 'Correct output: both .png and .html for both themes'
  - Data colors (Okabe-Ito) are identical between light and dark renders — only chrome
    flips
  weaknesses:
  - X-axis tick labels render as '...' instead of actual date strings ('Jan 22', 'Jul
    22', etc.) in both renders — the time axis is effectively unreadable
  - 'Font sizes below style-guide recommendations: title_font_size=56 (should be 66),
    label_font_size=42 (should be 56), major_label_font_size=36 (should be 44), legend_font_size=36
    (should be 44)'
  - Forecast boundary marker (Jan 25 vertical guide line) lacks visual weight — not
    clearly perceptible as a historical/forecast divider
  - Forecast dashed line is nearly invisible inside the CI band (gets lost in the
    orange fill + INK boundary lines)
  - BRAND (#009E73) is the 5th series added rather than the first, technically violating
    palette ordering
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "timeseries-forecast-uncertainty · python · pygal · anyplot.ai" clearly readable in dark ink. Y-axis label "Sales ($)" and X-axis label "Month" visible. However, X-axis tick labels display "..." (ellipsis) instead of actual month names (e.g., "Jan 22", "Jul 22") — significant readability failure. Y-axis numeric tick labels (1200, 1400, 1600...) are readable.
      Data: Historical green line (#009E73) is prominent across the full chart. Semi-transparent orange 95% CI band in the top-right forecast region. Thin dashed INK-colored 80% CI boundary lines inside the band. Forecast dashed line barely distinguishable inside the CI band. Subtle dashed Y-axis grid at y=2000.
      Legibility verdict: PARTIAL FAIL — X-axis tick labels unreadable ("..." truncation); all other text passes.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: Title readable in light text (#F0EFE8). Y-axis and X-axis axis labels visible in light ink. X-axis tick labels again show "..." instead of actual date strings — same failure as light render. Y-axis numeric tick labels readable in light color (no dark-on-dark failure). Legend at bottom readable against dark background.
      Data: Historical green line (#009E73) identical in color to the light render — Okabe-Ito data colors unchanged. CI band more visually prominent in dark (alpha=0.25 vs 0.20 in light), appearing as dense dark orange in forecast region. 80% CI boundary lines visible in light INK.
      Legibility verdict: PARTIAL FAIL — same X-axis tick truncation as light render; no dark-on-dark failures detected for any other element.
