  weaknesses:
  - 'Background-erase CI technique fails: the orange semi-transparent CI_95_FILL bleeds
    across the entire historical period (Jan 22–Jan 25), giving the whole historical
    background a salmon/orange tint instead of the clean PAGE_BG. Both renders affected.'
  - 'Forecast line (FORECAST_COLOR #D55E00) is effectively invisible: it is orange
    plotted against the orange 95% CI fill of the same hue, so there is no visual
    distinction between the forecast central estimate and the CI band.'
  - '80% CI shows only dashed boundary lines (no fill): the spec requires nested shaded
    bands; an 80% fill band is missing, which means the two-tier uncertainty representation
    is incomplete.'
  - 'Jan 25 forecast boundary marker is barely distinguishable: the SVG-patched guide
    line is too faint to clearly separate historical and forecast regions visually.'
