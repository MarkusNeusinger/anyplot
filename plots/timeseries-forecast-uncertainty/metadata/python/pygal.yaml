review:
  strengths:
  - Background-erase CI fill technique (fill stacking with PAGE_BG) is a creative
    pygal/SVG-specific solution for rendering shaded uncertainty bands
  - 'Coherent color story: BRAND green for historical data, Okabe-Ito orange for forecast
    and CI — semantically connected and CVD-safe'
  - SVG string replacement correctly patches pygal hardcoded black guide-line strokes,
    fixing dark-mode rendering
  - x_labels_major cleverly marks the Jan 25 forecast boundary with a vertical dashed
    rule without extra drawing code
  - 'Perfect code quality: KISS structure, seed set, clean imports, well-commented
    non-obvious techniques'
  - Sparse x-axis label strategy (every 6 months) prevents tick-label overlap on a
    42-point time axis
  weaknesses:
  - 80% CI is shown as dashed boundary lines rather than a filled inner band — spec
    requires nested shaded bands (darker 80% inside lighter 95%); implement a background-erase
    approach for the 80% CI fill as well
  - CI widths are constant (±100/±150) regardless of forecast horizon — realistic
    forecast uncertainty should widen multiplicatively with distance from split_idx
    (e.g., scale by sqrt of steps ahead)
  - '80% CI dashed lines use INK (theme text color) as a data-series color — assign
    explicit Okabe-Ito #0072B2 (position 3) to CI boundary lines instead'
  image_description: |-
