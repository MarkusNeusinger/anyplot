review:
  strengths:
  - 'Perfect spec compliance: all required features present (historical line, dashed
    forecast, vertical separator, nested 80%+95% CI bands, connection line).'
  - Proper theme adaptation throughout — backgrounds, text, grid, legend use correct
    tokens for both light and dark renders with no dark-on-dark failures.
  - 'Idiomatic Bokeh usage: Span, ColumnDataSource, HoverTool with CI data, and Legend
    via add_layout() are library-correct patterns.'
  - Clean reproducible code with np.random.seed(42) and linear KISS structure.
  - 'Excellent data quality: realistic sales scenario with trend, seasonality, and
    growing uncertainty.'
  weaknesses:
  - 'CI bands use #CC79A7 (Okabe-Ito pos 4, purple) while forecast line uses #D55E00
    (orange) — color-family mismatch breaks visual grouping of forecast+uncertainty.
    Fix: change CI band fill_color to OKABE_ITO_2 (#D55E00) with fill_alpha=0.25 (80%
    CI) and fill_alpha=0.12 (95% CI).'
  - 95% CI outer band at fill_alpha=0.15 is too faint especially in dark theme. With
    orange color fix, use 0.25 inner and 0.12 outer.
  - y_range.end=175 leaves ~10-15 units of empty space above forecast peak — reduce
    to 170 or let Bokeh auto-range.
  - Missing p.xaxis.major_tick_line_color = INK_SOFT and p.yaxis.major_tick_line_color
    = INK_SOFT — tick marks may default to black in dark theme.
