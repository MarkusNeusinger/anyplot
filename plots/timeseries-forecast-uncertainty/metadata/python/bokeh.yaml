review:
  strengths:
  - 'Perfect spec compliance — every required feature implemented: nested CI bands
    (80% and 95%), forecast separator, dashed forecast style, growing uncertainty,
    and a connection line from last historical to first forecast point'
  - 'Excellent data storytelling: clear historical/forecast visual separation via
    vertical Span, nested uncertainty bands communicate widening forecast risk, and
    ''Forecast ▶'' annotation reinforces the narrative'
  - 'Highly idiomatic Bokeh: multiple HoverTools with mode=vline and datetime formatters,
    Span for vertical line, Label with timestamp positioning, Range1d for x-range
    control, separate ColumnDataSources for different interaction contexts'
  - 'Perfect code quality: flat script with no functions/classes, seeded RNG for reproducibility,
    clean imports, correct output filenames (plot-{THEME}.html + plot-{THEME}.png)'
  - Both themes fully readable — no dark-on-dark or light-on-light failures; INK/INK_SOFT
    tokens correctly applied throughout title, axis labels, tick labels, and legend
  weaknesses:
  - CI band color renders as steel-blue in output images despite code specifying OKABE_ITO_4
    (#CC79A7, reddish-purple) — use Bokeh's native Band model from bokeh.models instead
    of patch glyph for CI bands; Band is more idiomatic and avoids potential color-encoding
    issues
  - 'Okabe-Ito ordering violation: CI bands use position 4 (#CC79A7), skipping position
    3 (#0072B2) — style guide requires positions 1→N in order; switching to Band model
    with #0072B2 (Okabe-Ito position 3) fixes both issues simultaneously'
  - Axis labels render in Bokeh's default italic style — add p.xaxis.axis_label_text_font_style
    = 'normal' and p.yaxis.axis_label_text_font_style = 'normal' for cleaner upright
    typography
  - Forecast dashed line loses contrast inside the CI bands — increase line_width
    from 3 to 4-5 or consider a lighter-weight approach to maintain visibility through
    the shaded uncertainty region
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "timeseries-forecast-uncertainty · python · bokeh · anyplot.ai" in bold dark (#1A1A17) text, spans ~75% of width — expected for mandated title length. Y-axis label "Sales (thousands)" in Bokeh default italic, dark (#1A1A17). X-axis label "Date" in italic. Tick labels (Jan 2022–Jan 2026) in dark gray (#4A4A44 range). "Forecast ▶" annotation in gray, top-right. All text clearly readable against off-white background.
      Data: Historical line in #009E73 (bluish green, Okabe-Ito position 1) — solid. Forecast in #D55E00 (vermillion, Okabe-Ito position 2) — dashed. CI bands appear as steel-blue shades (lighter for 95%, darker for 80%) — legend swatches confirm blue rendering, inconsistent with code's #CC79A7 (reddish-purple). Vertical dashed separator at forecast start (Jan 2025). Nested bands show growing uncertainty toward Jan 2026.
      Legibility verdict: PASS — all text readable; potential color mismatch on CI bands noted

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title in light (#F0EFE8 range) — clearly readable against dark surface. Y-axis label "Sales (thousands)" and X-axis label "Date" in light text. Tick labels in light gray (#B8B7B0 range). "Forecast ▶" annotation in light gray. Legend text in light gray on dark elevated background (#242420). No dark-on-dark failure observed — all chrome elements are light and clearly visible.
      Data: Historical green line (#009E73) and dashed orange forecast (#D55E00) are identical in color to light render — only chrome flips. CI bands render as darker navy-blue (same steel-blue family as light render, not reddish-purple). Brand green #009E73 clearly visible against dark background.
      Legibility verdict: PASS — all text readable; CI band color mismatch persists in dark render as well
