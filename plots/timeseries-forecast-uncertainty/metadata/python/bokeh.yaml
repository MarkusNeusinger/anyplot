      Background: Warm off-white consistent with #FAF8F1 — correct light theme surface
      Chrome: Title "timeseries-forecast-uncertainty · python · bokeh · anyplot.ai" bold and readable (~70% width). Y-axis labels (80, 100, 120, 140, 160) visible. X-axis date tick labels NOT visible — cut off at bottom due to font sizes being 3x too small (12pt vs recommended 36pt). "Date" axis label also missing/cut off.
      Data: Historical line in #009E73 (correct first series), forecast dashed line in #D55E00 (Okabe-Ito position 2), CI bands in #CC79A7 (position 4) with alpha 0.30/0.15 for 80%/95% respectively. Vertical dashed Span marks forecast start.
