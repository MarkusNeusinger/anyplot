review:
  strengths:
  - 'Perfect spec compliance: all required elements present (historical line, dashed
    forecast, vertical divider, nested 80%+95% CI bands, semi-transparent fills, legend)'
  - Correct Okabe-Ito palette with theme-adaptive chrome — both renders use correct
    backgrounds (#FAF8F1/#1A1A17) and chrome colors
  - Growing uncertainty bands effectively communicate forecast risk — good data storytelling
    through visual hierarchy
  - Clean Y-only grid at 10% alpha, L-shaped frame (outline_line_color=None), custom
    legend padding/spacing/glyph sizing
  - HoverTool with datetime formatters and confidence interval data in tooltips is
    excellent Bokeh-distinctive interactive feature
  weaknesses:
  - 'Critical: Font sizes are ~3x too small for Bokeh native-pixel rendering. Should
    be: title=56pt, axis labels=42pt, tick labels=36pt, legend=36pt (per bokeh.md
    spec). Current values (18pt/14pt/12pt/12pt) cause x-axis date labels and ''Date''
    axis label to be invisible/cut off in both renders.'
  - 'Minor: major_tick_line_color not explicitly set — should be INK_SOFT to ensure
    tick marks adapt to theme'
  image_description: |-
