      Chrome: Title visible in white/light color. Y-axis tick labels visible in secondary light color (~#B8B7B0). X-axis date tick labels again NOT visible — same cut-off/font-size issue. No dark-on-dark failures for visible elements. Legend box uses elevated dark fill (#242420) with readable light labels.
      Data: Colors identical to light render — #009E73 historical line, #D55E00 forecast, #CC79A7 CI bands. CI bands in dark mode appear as dark mauve/purple against near-black, nested bands distinguishable by alpha.
      Legibility verdict: FAIL — same x-axis visibility failure as light render. All other visible chrome elements pass dark theme readability.
