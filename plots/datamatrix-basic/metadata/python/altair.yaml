  strengths:
  - 'Perfect spec compliance: L-shaped finder pattern, alternating timing pattern,
    quiet zone, and data cells all correctly rendered'
  - 'Excellent data quality: realistic ''SERIAL:12345678'' content with all four Data
    Matrix structural regions correctly labeled in interactive tooltips'
  - 'Flawless code quality: linear KISS structure, deterministic via zlib.crc32, clean
    imports, saves both PNG and HTML'
  - 'Theme-adaptive outer background (#FAF8F1 light / #1A1A17 dark) while keeping
    barcode inner area white — correct domain-specific design choice'
