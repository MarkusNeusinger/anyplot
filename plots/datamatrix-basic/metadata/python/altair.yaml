    to eliminate cell gaps, configure_view for independent inner background'
  weaknesses:
  - 'DE-03 LOW (2/6): No static visual hierarchy for structural regions — viewer must
    hover to discover that the left column is ''Finder Pattern'' and top row is ''Timing
    Pattern''. Adding static region labels (e.g., small text annotations outside the
    quiet zone) or subtle color differentiation for non-data structural cells would
    elevate storytelling significantly.'
  - 'DE-01 (5/8): Design is professional but not exceptional — the barcode renders
    correctly but has no additional visual sophistication such as a subtle legend
    explaining the four cell types statically, or a callout showing what encoded content
    is.'
  - 'DE-02 (4/6): Sub-pixel gap artifacts visible between barcode cells — faint horizontal
    separator lines appear in the rendered PNG due to ordinal scale rounding at 18
    cells across 600px (33.3px/cell). Fix: use a different total size (e.g., 20 cells
    at 600px = 30px/cell) or increase canvas to 720px so cell size is an integer.'
  - 'LM-02 (3/5): Interactive tooltips leverage Altair well but the visualization
    could use more of Altair''s distinctive grammar — e.g., layering a text annotation
    or using a selection highlight to identify barcode regions interactively beyond
    simple tooltips.'
