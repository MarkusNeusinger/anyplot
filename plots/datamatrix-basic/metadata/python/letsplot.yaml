  strengths:
  - 'Perfect spec compliance: all ISO/IEC 16022 structural elements (L-shaped finder,
    alternating timing, quiet zone) correctly implemented'
  - 'Deterministic encoding: np.random.seed(data_hash) ties the visual output to the
    encoded content — reproducible and contextually meaningful'
  - Excellent use of layer_tooltips() to expose structural annotation (Finder Pattern
    vs. Timing Pattern vs. Data Region) — showcases a distinctive lets-plot feature
    while adding educational value
  - Medical serial number context directly references the spec's stated use case;
    realistic and neutral
  - theme_void + coord_fixed is the ideal approach for barcode visualization — removes
    all non-data chrome while preserving cell proportions
  - 'Perfect code quality: KISS structure, clean imports, deterministic, correct output
    file naming'
  weaknesses:
  - Subtitle size=11 is slightly below the style-guide secondary-text recommendation;
    increase to 12 for better visual balance with the title
  - In dark mode, the white quiet-zone tiles (#FFFFFF) create a stark bright-white
    panel against the dark page background; could soften by using a near-white (#F8F8F5
    or similar) for the quiet zone tiles while keeping the data matrix black/white,
    maintaining scan contrast while reducing the jarring inset effect
