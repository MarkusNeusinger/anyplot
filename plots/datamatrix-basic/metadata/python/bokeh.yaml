review:
  strengths:
  - Full GF(256) Reed-Solomon ECC 200 implementation is technically accurate and impressive
    for inline script code
  - Educational zone color overlays (Okabe-Ito colors matching labels) create a coherent
    structural anatomy view
  - HoverTool with per-module type/row/col information is a genuinely useful Bokeh
    feature for barcode inspection
  - 'Both themes work correctly: warm off-white / near-black backgrounds, theme-adaptive
    text, no dark-on-dark failures'
  - Square 2400x2400 canvas is the correct choice for a symmetric barcode
  weaknesses:
  - Zone annotation labels (L-finder, Timing, Data) are 18pt — too small for the 2400x2400
    canvas; at mobile widths (~400px) they would be ~4px and invisible. Increase to
    at least 28-34pt.
  - 'Okabe-Ito colors for zone overlays are not in canonical order: L-finder uses
    blue (#0072B2 = position 3) before green (#009E73 = position 1). Swap so the data
    region overlay uses #009E73 first.'
