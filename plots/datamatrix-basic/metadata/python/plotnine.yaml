      Data: High-contrast black (#000000) and white (#FFFFFF) cells forming a 16x16 Data Matrix with 2-module quiet zone. L-shaped finder pattern (solid black left column and bottom row) is visible. Alternating clock pattern on top and right edges is visible. Internal data area shows binary pattern simulating SERIAL:12345678 encoding.
      Legibility verdict: PASS - all text is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) across the full canvas - correct.
      Chrome: Title in light cream (#F0EFE8), clearly readable against dark background. Subtitle in muted light (#B8B7B0), readable. Caption in muted light, readable. No dark-on-dark text failures observed.
      Data: Same black/white binary cells as light render - colors are identical (correct: data colors must not flip). The quiet zone appears as a distinct white rectangular panel against the dark background, which is required for barcode functionality (spec mandates white quiet zone for reliable scanning).
      Legibility verdict: PASS - all text is readable. White barcode panel on dark background is intentional and spec-required.
