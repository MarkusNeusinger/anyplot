review:
  strengths:
  - Correct Data Matrix structure with L-shaped finder pattern and alternating clock
    pattern
  - Proper quiet zone (2-module white border) as required by spec
  - theme_void is the perfect choice for barcode visualization - removes all axis
    clutter
  - Square 6x6 canvas format is appropriate for a symmetric barcode
  - All chrome elements (title, subtitle, caption) correctly adapt to light/dark theme
    via INK/INK_SOFT tokens
  - Informative subtitle (16x16 ECC 200 symbol, 25% error correction) and caption
    (encoded content) add context
  - All font sizes explicitly set (12pt title, 9pt subtitle/caption)
  - Clean KISS code structure with reproducible seed and correct plot-{THEME}.png
    output
  weaknesses:
  - Top-left corner cell [0,0] is set to white by the clock pattern (i=0 gives 0%2=0),
    overriding the L-shaped finder which should keep it black - minor deviation from
    Data Matrix standard
  - Data encoding is a simplified bit-extraction simulation rather than actual ECC
    200 Reed-Solomon encoding, slightly reducing factual correctness
  - DE-01 and DE-02 are constrained by the binary domain but the layout could include
    a subtle border or shadow around the barcode panel to visually separate it from
    the dark background in dark mode
  - 'LM-02: No distinctively plotnine-specific features used beyond geom_tile + coord_fixed
    - faceting or annotation layers could showcase more library capability'
