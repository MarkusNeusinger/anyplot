review:
  strengths:
  - 'Perfect barcode structure: L-shaped finder pattern, alternating timing patterns,
    and quiet zone all correctly implemented per ISO/IEC 16022'
  - Theme-adaptive chrome with constant barcode data colors — the correct design decision
    for a binary symbol that must remain black/white regardless of page theme
  - Square canvas (2400x2400) with 24pt margins gives the barcode ideal proportions;
    theme_void removes all unnecessary chart chrome
  - Realistic medical device serial number content with informative subtitle providing
    encoding metadata
  - 'Exemplary code quality: clean R idioms, deterministic seed, correct ragg device,
    single-file dual-theme pattern'
  weaknesses:
  - 'DE-03 (3/6): No visual hierarchy beyond the raw barcode — consider annotating
    structural regions (e.g., a small label or bracket pointing to the finder pattern,
    quiet zone annotation) to guide viewers unfamiliar with Data Matrix structure'
  - 'LM-02 (2/5): Implementation uses only basic geom_tile + theme_void — no ggplot2-distinctive
    features such as faceting to show multiple encoded payloads at different matrix
    sizes, or annotation layers to highlight barcode regions'
