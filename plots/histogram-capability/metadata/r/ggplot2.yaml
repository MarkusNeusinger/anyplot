review:
  strengths:
  - 'Semantic color assignment is excellent: matte red (#AE3030) for spec limits communicates
    danger zones naturally, while keeping data in brand green for a within-spec visual
    story.'
  - Full theme adaptation with ELEVATED_BG annotation box handled correctly for both
    light and dark renders — annotation box fill and text color both flip appropriately.
  - after_stat(density) and stat_function(fun=dnorm) are exactly the right modern
    ggplot2 patterns; the code demonstrates genuine ggplot2 expertise.
  - Data parameters (N=200, sigma=0.012mm, slightly off-center mu) create a realistic,
    non-trivial process capability scenario with Cp > Cpk showing genuine process
    drift.
  - All required capability elements (histogram, normal fit, LSL, USL, target, Cp,
    Cpk) are correctly implemented and clearly visible.
  weaknesses:
  - Normal fit label (size=3.2, italic blue on dark background) is at the lower end
    of contrast in the dark render; consider increasing to size=3.5 or switching to
    INK_SOFT token for label color in dark theme.
  - DE-01 could be elevated by adding a subtle shaded rectangle (annotate rect) between
    LSL and USL to visually reinforce the specification window — fill=brand green
    at alpha~0.04.
  - 'DE-03 data storytelling could be enhanced with a subtitle or caption stating
    the capability verdict directly, e.g. subtitle = ''Process capable: Cp=1.43, Cpk=1.15
    — slightly off-center'' in INK_SOFT.'
