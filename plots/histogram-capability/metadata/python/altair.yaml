    in-spec vs out-of-spec regions
  - 'Semantic color use: #AE3030 for danger/out-of-spec, #4467A3 for nominal target
    — immediately interpretable'
  - CAPABLE status annotation gives at-a-glance process judgment, elevating data storytelling
