      Chrome: Title "histogram-capability · python · plotnine · anyplot.ai" in dark INK, clearly readable. X-axis label "Shaft Diameter (mm)" and Y-axis label "Density" in dark INK. Tick labels in INK_SOFT (#4A4A44), fully legible. Subtle horizontal grid lines at alpha=0.15.
