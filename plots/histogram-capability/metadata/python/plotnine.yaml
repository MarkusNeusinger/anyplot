review:
  strengths:
  - 'Semantic Imprint palette application: green histogram, red spec limits, blue
    target, neutral curve — each color choice has clear justification'
  - stat_function for the normal PDF overlay is idiomatic plotnine grammar-of-graphics
    rather than a manual geom workaround
  - Spec zone translucent shading (geom_rect with alpha=0.07) adds visual context
    without cluttering; ymax=peak_density*3.0 + coord_cartesian clipping elegantly
    avoids abrupt upper boundary artifact
  - Full theme-adaptive chrome with all relevant tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT) applied to both renders correctly
  - Intentional mean offset (10.008 vs target 10.00) creates a realistic data narrative
    where Cp!=Cpk, illustrating the real-world distinction between process spread
    and process centering
  weaknesses:
  - Annotation text for LSL, USL, Target labels and stats box values (size=4.0 plotnine
    mm) is somewhat small; consider increasing to 4.5-5.0 for better mobile readability
    at thumbnail sizes
  - Design excellence ceiling limited by purely functional chart nature; a subtle
    amber (#DDCC77) annotated reference at Cpk=1.33 (standard capable-process threshold)
    would add meaningful data storytelling for quality engineers
  image_description: |-
