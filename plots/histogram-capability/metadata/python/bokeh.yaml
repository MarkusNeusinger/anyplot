review:
  strengths:
  - 'Excellent semantic color mapping: histogram bars in brand green (#009E73), LSL/USL
    in matte red (#AE3030 — out-of-spec semantic), target in amber (#DDCC77 — caution/nominal
    semantic), mean in theme-adaptive INK_SOFT — all by-the-book Imprint palette rule
    applications'
  - 'Canonical Bokeh patterns throughout: ColumnDataSource with custom tooltip fields,
    HoverTool, Span for reference lines, manually constructed Legend with LegendItems,
    off-screen renderers to surface Span objects in the legend — idiomatic and correct'
  - 'Full spec compliance: histogram + fitted normal curve + LSL/USL dashed lines
    + target line + Cp/Cpk annotation + sample size (N=200) all present and correct'
  - Theme-adaptive chrome properly threaded through all non-data elements (title,
    axis labels, tick labels, grid, legend frame, legend text, annotation) — dark
    render is clean with no dark-on-dark failures
  - 'Realistic manufacturing context: shaft diameter (mm), LSL=9.950/USL=10.050/target=10.000,
    Cp≈1.18/Cpk≈1.15 — a plausible barely-capable production process'
  - CDP captureScreenshot with captureBeyondViewport=True ensures the full 3200×1800
    canvas is captured correctly — advanced Bokeh-specific screenshot technique avoiding
    the toolbar-shrinkage bug
  weaknesses:
  - 'DE-02: Full 4-sided box outline is kept (outline_line_color=INK_SOFT) — the style
    guide default is to remove top and right spines for a cleaner L-shaped frame.
    In Bokeh this requires setting p.outline_line_alpha=0 or p.outline_line_color=None
    and then manually adding bottom/left axis lines, or using a theme that suppresses
    the outline'
  - 'DE-01/DE-02: No spine suppression on the plot area means the chart looks slightly
    boxy compared to the preferred minimal-chrome aesthetic'
  - 'LM-02: The implementation does not exploit any Bokeh-specific interactive capabilities
    beyond HoverTool (e.g. Slider widgets, Select callbacks, or TapTool for bar selection)
    — these are optional for a static catalog render but would demonstrate deeper
    library mastery'
  - 'VQ-01 minor: The capability annotation font size (30pt) is slightly smaller than
    the tick labels (34pt) for what is arguably the most important data element on
    the plot — bumping it to 34-36pt bold would give it more visual weight appropriate
    to its role'
