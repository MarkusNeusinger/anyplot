review:
  strengths:
  - 'Perfect spec compliance: histogram, normal curve, LSL/USL, target, mean, Cp/Cpk
    all present and correctly computed'
  - Excellent semantic color mapping — red for danger/spec limits, green for measurements,
    blue for target — using correct Imprint palette members
  - Cp/Cpk embedded in the title is a smart data-storytelling choice giving the viewer
    the key metric at a glance
  - sys.path.pop(0) workaround for the script-name collision with the pygal package
    is correctly handled and documented
  - Both light and dark themes fully theme-adaptive with no dark-on-dark failures
  - Dynamic title font scaling (66 * 67 / len(title)) prevents long title overflow
  weaknesses:
  - Target (10.000) and Mean (10.002) reference lines are nearly-identical thin histogram
    bars at essentially the same X position — they visually overlap and are indistinguishable
    on the chart; only the legend differentiates them. Widen one bar relative to the
    other (e.g., line_width=0.002 for Target, line_width=0.0004 for Mean) to make
    them separable at a glance.
  - 'LSL/USL spec limit bars are wide solid-filled red rectangles spanning the full
    plot height, giving them heavy visual weight that dominates the chart. Reduce
    fill opacity (e.g., add CSS fill-opacity: 0.55 to the LSL/USL series) or narrow
    the bars to make them read as reference lines rather than data.'
  - Right canvas margin (margin_right=80) is tight for the rightmost x-axis tick label
    near x=10.050 — increase to at least 120 to prevent label crowding at the right
    edge.
  - With 6 series in the legend, the bottom legend area is visually crowded; consider
    increasing margin_bottom from 40 to 60 and reducing legend_box_size from 28 to
    22 for better spacing.
