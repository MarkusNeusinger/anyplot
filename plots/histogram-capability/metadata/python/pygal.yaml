review:
  strengths:
  - Correct Imprint palette with justified semantic exception (red for spec limit
    danger boundaries)
  - Cp/Cpk values embedded directly in title — clever integration of annotation requirement
    without needing separate text elements
  - 'All required spec features present: histogram, normal fit, LSL, USL, Target,
    Mean'
  - Realistic shaft-diameter scenario with plausible Cp/Cpk values (1.49/1.45)
  - 'Perfect code quality: flat script, seeded RNG, clean imports, idiomatic pygal
    with CSS customization'
  - Both light and dark renders fully theme-correct — chrome flips, data colors stay
    constant
  weaknesses:
  - LSL and USL reference lines render as visually wide solid bars rather than thin
    dashed vertical lines as specified — the spec_lw=0.0008 value does not produce
    hair-thin lines in pygal.Histogram; they appear as prominent colored columns spanning
    the full height
  - Target (10.00) and Mean (10.002) lines are extremely narrow (target_lw=0.0020
    / mean_lw=0.0005) and nearly indistinguishable from each other near x≈10.000;
    the two thin vertical strips overlap and are hard to read individually
  - Tick labels and legend text are slightly small relative to the 3200×1800 canvas
    — major_label_font_size=44 and legend_font_size=44 feel under-scaled for confident
    mobile readability
  - 'Design excellence is modest: no shading of out-of-spec regions, no annotation
    boxes within the plot area for Cp/Cpk (title inclusion is pragmatic but the spec
    asks for plot annotations), minimal visual storytelling beyond color coding'
