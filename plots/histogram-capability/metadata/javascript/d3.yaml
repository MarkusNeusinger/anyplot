review:
  strengths:
  - 'Full spec compliance: histogram, normal overlay, LSL/USL lines, Target line,
    and Cp/Cpk annotation box all implemented correctly'
  - Deterministic LCG + Box-Muller random number generation with seed=42 for reproducible
    output across runs
  - 'Intentional semantic color mapping: green for measurements, blue for normal fit,
    red for spec limits, ochre for target — tells the engineering story'
  - 12%-opacity in-spec zone fill under the PDF between LSL and USL adds meaningful
    visual context highlighting the acceptable region
  - Cp/Cpk annotation box with elevated background, rounded corners, and bold text
    is cleanly integrated in upper right
  - Both light and dark renders pass readability checks with no dark-on-dark or light-on-light
    failures
  - 'Idiomatic D3 usage: d3.area() with curveBasis, d3.bin(), proper data joins, d3.format
    for axis ticks'
  weaknesses:
  - 'Density calibration bug: `const binWidth = bins[0].x1 - bins[0].x0` captures
    the boundary bin width (~0.003 mm) rather than interior bin width (~0.005 mm).
    d3.bin with thresholds(22) and domain [9.932, 10.068] picks step=0.005 mm so bins[0]
    spans only [9.932, 9.935] = 0.003 mm. All interior bars are normalized using 0.003
    instead of their actual 0.005 mm width, inflating density by 1.67x. PDF curve
    peaks at ~38-40 on y-axis while bars reach ~65 — a visible and misleading gap.
    Fix: use center bin width: `const binWidth = bins[Math.floor(bins.length / 2)].x1
    - bins[Math.floor(bins.length / 2)].x0`'
  - 'Minor: axis label font-size of 16px CSS is slightly large for the short labels
    ''Density'' (7 chars); 14px would improve hierarchy differentiation from the 22px
    title'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "histogram-capability · javascript · d3 · anyplot.ai" at 22px clearly readable in dark ink. Axis labels "Shaft Diameter (mm)" and "Density" at 16px readable. Tick labels at 14px readable. Legend text readable. Cp/Cpk annotation box text readable.
      Data: Green bars (#009E73, opacity 0.65) for measurements — first series correctly uses brand green. Blue curve (#4467A3) for normal fit. Red dashed lines (#AE3030) for LSL/USL. Ochre dashed line (#BD8233) for Target. Subtle 12%-opacity green fill between LSL and USL under the PDF (in-spec zone). First series is #009E73 (confirmed).
      Density mismatch: histogram bars peak at ~65 on y-axis (0-80 scale), fitted PDF curve peaks at ~38-40. ~1.7x gap due to binWidth taken from narrow boundary bin (0.003mm) instead of interior bins (0.005mm).
      Legibility verdict: PASS (all text readable), but density calibration mismatch is a meaningful weakness.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
      Chrome: Title visible in light (#F0EFE8) ink. Axis labels and tick labels appear in inkSoft (#B8B7B0) — clearly readable against dark background. Annotation box uses elevated-bg (#242420) with light ink text. No dark-on-dark failures detected.
      Data: All data colors identical to light render — green bars (#009E73), blue curve (#4467A3), red dashed LSL/USL (#AE3030), ochre Target (#BD8233). Palette colors unchanged between themes (only chrome flips). Same density calibration mismatch visible.
      Legibility verdict: PASS — no dark-on-dark text, no readability failures.
