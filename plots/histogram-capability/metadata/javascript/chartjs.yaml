review:
  strengths:
  - In-spec region background shading is a high-quality design touch that immediately
    communicates the tolerance band
  - Custom specPlugin using Chart.js plugin lifecycle hooks (beforeDatasetsDraw/afterDatasetsDraw)
    is idiomatic and elegant
  - Deterministic LCG + Box-Muller RNG handles JS lack of seeded random correctly
  - All spec requirements fully covered including Cp/Cpk calculated from sample statistics
  - Theme adaptation is thorough — annotation box, all text, grid, and backgrounds
    properly use t. tokens
  weaknesses:
  - Spec-line labels (LSL, USL, Target) rendered at 15px bold are marginally smaller
    than axis titles at 16px — consider bumping to 16–17px for visual balance
  - Both axes have grid lines active; style guide prefers y-axis grid only for bar/histogram
    charts — consider removing x-axis grid
  - Legend order shows Normal fit before Frequency due to order property; canonical
    order (histogram bars first) would be more intuitive
