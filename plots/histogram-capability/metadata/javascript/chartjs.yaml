review:
  strengths:
  - Perfect spec compliance — histogram, fitted normal curve, LSL/USL dashed lines,
    target line, and Cp/Cpk annotation box all present and correctly computed from
    data
  - Excellent reproducibility via LCG + Box-Muller (seed=42), satisfying Chart.js's
    lack of a seeded RNG without any network calls
  - Custom afterDatasetsDraw plugin is idiomatic Chart.js — draws spec lines and elevated
    Cp/Cpk callout box using the canvas 2D context, cleanly theme-adaptive via ANYPLOT_TOKENS
  - 'Both renders pass legibility: warm #FAF8F1 light bg with dark chrome; near-black
    #1A1A17 dark bg with light chrome; no dark-on-dark failures anywhere'
  - Realistic engineering context (shaft diameter, ±0.05 mm tolerance) with plausible
    Cp=1.43, Cpk=1.27 — immediately recognisable to quality engineers
  - Mixed bar+line chart type used idiomatically for histogram overlay; barPercentage:1
    + categoryPercentage:1 produces correct touching histogram bars
  - Alpha-blended histogram bars (palette[0]+'bb') let the normal curve show through
    without visual confusion
  weaknesses:
  - 'Palette order violation: normal fit curve uses t.palette[2] (#4467A3 blue), skipping
    t.palette[1] (#C475FD lavender). The second categorical series must be palette[1]
    per Imprint canonical order; there is no semantic exception that justifies jumping
    to slot 3 for a ''Normal fit'' label.'
  - 'Design Excellence ceiling: top/right axis borders are retained (no explicit spine
    removal via Chart.js borderWidth:0 on scales). Removing the top/right scale borders
    would push DE-02 refinement closer to the maximum.'
  - DE-03 storytelling is functional but not exceptional — the Cp/Cpk box is well-placed
    but the chart lacks a visual emphasis cue (e.g. shading the 'in-spec' region between
    LSL and USL) that would immediately direct the viewer's eye to the key message.
