      Chrome: Title, axis labels, tick labels, and annotation panel all rendered in light ink — fully readable against dark background. "Marginally Capable" in amber remains visible. No dark-on-dark failures observed anywhere.
      Data: Colors are identical to light render — #009E73 bars, #4467A3 curve, #AE3030 dashed limits, #009E73 dashed target. All data colors consistent across themes as required by Imprint palette rules.
