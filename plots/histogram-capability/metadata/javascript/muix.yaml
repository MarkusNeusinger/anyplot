review:
  strengths:
  - Custom SVG histogram bars using useDrawingArea — exactly the right MUI X idiom
    when a native BarChart can't compose with a line series in the same drawing area
  - Right-margin annotation panel combines Cp/Cpk data table + capability verdict
    + legend in one compact, readable block — strong UX design choice
  - 'Semantic color assignment throughout: red (#AE3030) for specification limits,
    brand green (#009E73) for target and bars, amber for ''Marginally Capable'' status
    — every color communicates meaning'
  - Deterministic LCG + Box-Muller with seed=42 ensures identical renders across runs
  - Perfect spec compliance — all five required features (histogram, normal fit, LSL/USL,
    target, Cp/Cpk annotation) implemented correctly
  weaknesses:
  - Empty x-axis real estate from 10.05 to 10.11 (~30% of x range) beyond the USL
    line stretches the chart unnecessarily — tighten X_MAX to ~10.075 to improve data
    density without losing specification context
  - 'DE-02 refinement is limited: annotation panel could benefit from heavier weight
    distinction between the ''CAPABILITY'' header and the Cp/Cpk values, and a subtle
    elevated background (t.elevatedBg) behind the panel would visually separate it
    from the chart area'
  - X-axis decimal tick labels (9.930, 9.950…) at fontSize=13 CSS px are marginal
    for mobile readability — nudge to 14px and consider reducing tick density from
    every-other-bin to every 4th bin
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "histogram-capability · javascript · muix · anyplot.ai" in dark ink at ~28px — fully readable. X-axis label "Shaft Diameter (mm)" and Y-axis label "Count" in dark ink at 15px — readable. Decimal tick labels (9.930–10.110 on x, 0–55 on y) in inkSoft at 13px — readable but small. Annotation panel: "CAPABILITY" header, "Cp = 1.190"/"Cpk = 1.051" in monospace, "Marginally Capable" in amber, legend entries — all clearly readable.
      Data: Brand green (#009E73) histogram bars with fillOpacity=0.82 as first series. Blue (#4467A3) normal distribution fit curve. Red (#AE3030) dashed lines for LSL/USL. Green (#009E73) dashed line for Target. All data elements clearly visible and distinguishable.
