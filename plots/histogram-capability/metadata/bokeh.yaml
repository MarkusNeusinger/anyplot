review:
  strengths:
  - Full spec compliance with all required features (histogram, normal curve, LSL/USL,
    target, Cp/Cpk)
  - Excellent use of Bokeh-specific features (HoverTool, interactive hover highlighting,
    dual HTML+PNG export)
  - Clean, well-structured code with appropriate complexity
  - Realistic manufacturing data context with correct capability calculations
  - Good visual refinement (subtle grid, clean frame, intentional typography)
  weaknesses:
  - Red and green used together for LSL/USL and Target lines — not colorblind-safe
  - Target (10.00) and Mean (10.0015) lines nearly overlap, hard to distinguish
  - Background has a gray-blue tint instead of clean white
  - Color palette uses 4+ distinct hues without cohesion — could be more harmonious
  image_description: The plot shows a process capability histogram with steel blue
    bars representing 200 shaft diameter measurements (mm) on the x-axis ranging from
    approximately 9.94 to 10.06. The y-axis shows frequency from 0 to 35. An orange
    normal distribution curve is overlaid on the histogram. Red dashed vertical lines
    mark LSL (9.95) and USL (10.05) at the edges of the data range. A blue dashed
    vertical line marks the Target (10.00), and a purple dotted line marks the Mean
    (10.0015) — these two lines are extremely close together near the center. The
    annotation "Cp = 1.49 | Cpk = 1.45 | N = 200" appears in the upper left area.
    A legend in the upper right identifies all line types with their values. The background
    has a light gray-blue tint rather than pure white. The data distribution is roughly
    bell-shaped, centered near the target value, and well within the specification
    limits, indicating a capable process.
