review:
  strengths:
  - Perfect spec compliance — all required elements (histogram, fitted normal curve,
    LSL/USL lines, target line, Cp/Cpk annotations) implemented correctly and displayed
    clearly.
  - Semantic Imprint palette usage — matte red for spec limits/reject zones (error
    role), ochre for target, brand green for measurements, blue for fitted curve —
    each color carries meaning.
  - Reject zone shading (vspan!) provides immediate visual context for out-of-spec
    risk without needing a legend entry.
  - Off-center process data (mean≈10.012 vs target=10.00) creates a realistic and
    instructive Cpk < Cp demonstration.
  - 'Perfect code quality: KISS structure, reproducible seed, clean imports, idiomatic
    Makie primitives.'
  weaknesses:
  - No formal Legend identifying the green bars as 'Measurements' and the blue curve
    as 'Normal Fit' — readers must infer these from context; adding a two-entry Legend
    would eliminate any ambiguity.
  - 'LM-02 is modest: vspan! is used well but the implementation does not leverage
    Makie''s more distinctive features (Legend, Layout grid, Colorbar, or multi-panel
    composition).'
  - Cp/Cpk annotation fontsize=14 is the smallest text element on the canvas; marginally
    readable — consider fontsize=15–16 for this annotation to match axis label scale.
  image_description: |-
