  strengths:
  - 'Perfect spec compliance: all required elements (histogram, fitted normal curve,
    LSL/USL/Target lines, Cp/Cpk annotation) correctly implemented and well-placed'
  - 'Semantic color reasoning: matte red (#AE3030) for specification limits and ochre
    (#BD8233) for target are intuitive and appropriate for a quality control chart'
  - 'Realistic, meaningful capability data: Cp=1.13 / Cpk=0.87 split communicates
    a real SPC insight about a capable but off-centered process'
  - 'Clean code structure: KISS, explicit sizing, correct theme adaptation in both
    renders, fully reproducible'
  weaknesses:
  - Y-axis ceiling multiplier of 1.8x creates excessive vertical whitespace (~40%
    of plot height above data peak). Reduce to 1.35-1.45x (y_ceil = maximum(pdf_scaled)
    * 1.4) to better fill the canvas while retaining room for reference labels.
  - 'DE-01 and LM-02 gaps: missing shaded spec zones using Makie''s vspan! primitive
    would boost both design sophistication and library distinctiveness simultaneously.
    Add vspan! for reject zones outside LSL/USL with color=(IMPRINT_PALETTE[5], 0.08f0).'
  - 'LM-02=2/5: implementation does not showcase Makie-distinctive features. Replace
    manual text labels with a Legend object using LineElement entries, or use vspan!/hspan!
    for shaded regions to leverage Makie beyond basic primitives.'
  - Annotation fontsize=13 is slightly smaller than axis labels (14pt); bump to 14pt
    for consistency.
