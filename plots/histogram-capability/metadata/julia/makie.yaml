      Data: Brand green (#009E73) histogram bars with white edges; blue (#4467A3) normal distribution curve overlaid; red (#AE3030) dashed LSL/USL vertical lines with "LSL"/"USL" labels; ochre (#BD8233) dashed target line with "Target" label; subtle red-tinted reject zone shading on left/right flanks; Cp=1.13 / Cpk=0.87 annotation in dark ink upper-right.
