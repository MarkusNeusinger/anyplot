review:
  strengths:
  - Both light and dark renders are visually readable with excellent text legibility
    in their respective themes
  - Clean scatter plot layout with proper spacing and no overlapping elements
  - Effective legend placement and category color distinction
  - Good use of interactive features (hover tooltips configured)
  - Realistic data generation with three distinct groups showing clear clustering
    patterns
  weaknesses:
  - 'CRITICAL: Uses forbidden export_png method. bokeh.md explicitly requires Selenium-based
    screenshot via webdriver.Chrome(). export_png fails on snap-shim systems.'
  - 'CRITICAL: Color palette violates Okabe-Ito requirement. Code uses hardcoded colors
    (#306998, #FFD43B, #E74C3C) instead of canonical palette where first series MUST
    be #009E73.'
  - 'CRITICAL: No theme support. Implementation doesn''t read ANYPLOT_THEME environment
    variable and doesn''t implement theme-adaptive chrome colors (PAGE_BG, INK, INK_SOFT
    tokens).'
  - 'CRITICAL: Wrong output filenames. Saves to ''plot.png'' and ''plot.html'' instead
    of theme-keyed ''plot-light.png'', ''plot-dark.png'', etc.'
  - 'Title has incorrect domain: ''pyplots.ai'' should be ''anyplot.ai'''
  - 'Background color hardcoded to #fafafa instead of using theme-dependent values
    (#FAF8F1 light / #1A1A17 dark)'
  - 'No legend background color adaptation for theme - should use ELEVATED_BG token
    (#FFFDF6 light / #242420 dark)'
  - Text colors not using INK/INK_SOFT tokens for proper theme adaptation
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface around #FAF8F1 - correct theme color
      Chrome: Title, axis labels, and tick labels are all clearly readable in dark text against the light background - PASS
      Data: Three categories displayed - Product A (green/teal), Product B (orange), Product C (blue). Colors appear consistent and distinct. Legend clearly shows all three categories.
      Layout: Clean scatter plot with subtle dashed grid lines, proper spacing, no overlapping text.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black surface around #1A1A17 - correct theme color
      Chrome: Title, axis labels, and tick labels are all clearly readable in light text against the dark background - PASS (no dark-on-dark failures detected)
      Data: Same three category colors as light render (Product A green, Product B orange, Product C blue) - colors remain identical, only chrome has flipped - PASS
      Layout: Clean scatter plot with subtle grid lines visible against dark background, proper spacing
      Legibility verdict: PASS

    Both renders are visually readable and show proper theme adaptation for chrome colors only. However, the CODE that generated these images has critical violations of bokeh.md requirements (see weaknesses below).
