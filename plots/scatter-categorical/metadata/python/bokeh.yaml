      Colors: Custom palette (#306998, #FFD43B, #E74C3C) instead of Okabe-Ito. First series should be #009E73, not #306998.
      Legibility verdict: PASS on readability, but FAIL on color specification compliance

    Dark render (plot-dark.png):
