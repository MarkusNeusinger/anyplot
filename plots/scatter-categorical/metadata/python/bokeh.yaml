review:
  strengths:
  - Clear visual separation of three categorical groups with distinct clusters
  - Excellent data scenario choice (products, marketing, engagement) with realistic
    values
  - Explicitly set font sizes (48pt title, 36pt labels, 28pt ticks) ensure legibility
    across both themes
  - Proper use of ColumnDataSource and scatter() API with hover tooltips
  - Clean, simple code structure with deterministic seed for reproducibility
  weaknesses:
  - 'Custom color palette (#306998, #FFD43B, #E74C3C) instead of Okabe-Ito standard
    - first series must be #009E73'
  - No theme-adaptive styling - code hardcodes background without reading ANYPLOT_THEME
    environment variable
  - Missing INK, INK_SOFT color tokens for theme-aware chrome elements
  - Output filename is plot.png instead of plot-light.png / plot-dark.png
  - Title says pyplots.ai instead of anyplot.ai
  - Uses export_png() which bokeh library guide forbids - should use Selenium with
    headless Chrome
  image_description: |-
