review:
  strengths:
  - 'Correct stem plot construction for Highcharts: individual LineSeries per stem
    + ScatterSeries for markers is the right idiomatic approach (no native stem type
    in Highcharts).'
  - 'White edge on markers (lineColor: ''#ffffff'') adds visual definition and separation
    from background.'
  - enable_mouse_tracking=False and states.hover.enabled=False on stem series prevents
    unwanted hover effects — shows library knowledge.
  - np.random.seed(42) ensures reproducibility.
  - Damped oscillation data is a realistic, neutral, scientifically appropriate example
    showing both positive and negative stem values.
  weaknesses:
  - 'Critical: Color is #306998 (Python Blue) — must be #009E73 (Okabe-Ito first position)
    for stems and markers.'
  - 'Critical: No ANYPLOT_THEME environment variable reading; backgroundColor hardcoded
    as #ffffff (pure white) and all text/grid colors are hardcoded for light only
    — dark theme produces non-functional output.'
  - 'Critical: Title reads ''stem-basic · highcharts · pyplots.ai'' — must be ''stem-basic
    · highcharts · anyplot.ai''.'
  - 'Critical: Output files saved as plot.png/plot.html — must be plot-light.png/plot-dark.png/plot-light.html/plot-dark.html.'
  - 'Axis labels lack units: ''Sample Index'' should be ''Sample Index (n)'', ''Amplitude''
    should be ''Amplitude (a.u.)''.'
  - Marker radius=10 is below recommended 3-4x default for 4800x2700 canvas; increase
    to 14-16.
