  weaknesses:
  - Cell annotation text uses fixed color = INK for all cells — on deep-blue/deep-red
    saturated cells in the light render, dark text on medium-blue background has reduced
    contrast; consider adapting annotation color based on cell value magnitude (white
    for |r| > 0.5, dark for near-zero)
  - Near-zero cells in dark render are visually indistinct from background (midpoint
    = background by design); slightly increasing cell edge line opacity (0.20 to 0.30)
    would better delineate the zero-region cells
