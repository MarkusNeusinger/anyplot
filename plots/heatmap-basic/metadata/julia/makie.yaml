  strengths:
  - 'Correct use of ANYPLOT_DIV diverging colormap with theme-adaptive midpoint (#FAF8F1
    light / #1A1A17 dark) — exactly right for correlation data'
  - All spines removed, tick marks set to 0, no grid — clean professional heatmap
    appearance
  - Batch text! call with Point2f array is idiomatic Makie usage
  - All font sizes explicitly set (titlesize=20, tick labels=13, cell annotations=11,
    colorbar labels=12/13)
  - Realistic climate variables correlation matrix with physically plausible relationships
    (Temp↔Dewpoint strong positive, Temp↔Pressure weak negative)
  - Square 2400×2400 canvas correctly chosen for symmetric heatmap
  - Theme-adaptive INK color for cell annotations ensures readability in both themes
  - Colorbar correctly linked to heatmap plot object, labeled 'Pearson r'
  weaknesses:
  - Cell annotation fontsize=11 is small on the 2400×2400 canvas — at mobile widths
    (~400px) the 64-cell grid renders annotations at ~3-4pt effective size; consider
    bumping to fontsize=12-13 for better mobile legibility
  - 'Near-zero correlation cells in dark render blend almost completely into the #1A1A17
    background (intended by theme-adaptive midpoint design, but the cell structure
    is invisible in those regions — consider a subtle 0.5pt cell border or use colorrange
    clipping to avoid full saturation at ±0.0)'
  - 'DE-01 held at 5/8: design is clean but could achieve higher polish — consider
    adding a subtle colorbar tick grid, a brief subtitle noting the dataset, or a
    thin inner border on the heatmap cells to improve cell delineation'
  - 'DE-03 held at 4/6: the data tells a natural story (Temp/Dewpoint/Humidity cluster
    vs. UV/Clouds inverse) but no visual emphasis guides the reader''s eye; consider
    adding a light annotation box or marker on the strongest correlation cluster'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, clearly not pure white
      Chrome: Title "heatmap-basic · julia · makie · anyplot.ai" in dark ink, bold, ~55% canvas width — readable. Y-axis tick labels (Temp, Humidity, Wind, Pressure, Precip, Dewpoint, UV Index, Clouds) in INK_SOFT dark gray, clear. X-axis labels rotated ~45°, well-spaced, no overlap. Colorbar label "Pearson r" vertical on right, readable at fontsize=13.
