review:
  strengths:
  - 'Idiomatic Chart.js plugin pattern: a scatter base provides axis layout while
    `heatmap-painter` paints cells, per-cell values, focal stroke, and the colorbar
    in `beforeDatasetsDraw`/`afterDatasetsDraw` — a clean way to extend Chart.js with
    a non-native chart type without reaching for a sibling library.'
  - 1 px `t.grid` hairline grid between cells now preserves the matrix structure in
    dark mode even where `imprint_div` fades into `pageBg` near the midpoint — directly
    addresses the attempt 1 VQ-03 dark-fade weakness.
  - Focal `t.ink` stroke around the two cells of the strongest off-diagonal pair (Cons.
    Conf.×Unemploy. = -0.81) creates a clear data-storytelling anchor — addresses
    the attempt 1 DE-03 'no focal point' feedback.
  - Imprint `imprint_div` tokens are interpolated piecewise (lo→mid, mid→hi) so the
    diverging palette is theme-aware and the midpoint matches the page background
    in both renders.
  - 'Cell value text color adapts to cell saturation (`|v| > 0.55 → #FAF8F1`, else
    `t.ink`) — keeps every annotation readable across the full -1..+1 range in both
    themes.'
  - Title format exactly matches `{Descriptive} · {spec-id} · {language} · {library}
    · anyplot.ai`, and the colorbar carries a rotated 'Pearson correlation (r)' axis
    title.
  - 'Square canvas correctly opted into via `//# anyplot-orientation: square` — canvas
    gate file absent, dimensions pass.'
  - 'Full spec checklist met: diverging colormap for ±values, in-cell value annotations,
    colorbar legend, logical category ordering.'
  weaknesses:
  - 'DE-01 (Aesthetic Sophistication): The focal stroke at lineWidth=2.5 reads slightly
    heavy in the dark render where the bright `t.ink` (near-white) sits against the
    saturated red — could be tuned to ~1.5–2 px or use a slightly softer ink to feel
    less stark while still anchoring the eye.'
  - 'LM-02 (Distinctive Features): the heatmap painting itself is generic 2D-canvas
    work and doesn''t really showcase Chart.js-specific features beyond the plugin
    lifecycle hooks and using a scatter base for axis layout. Inherent to Chart.js
    not shipping a matrix chart natively, but it caps how high LM-02 can reasonably
    score.'
  - Colorbar title rotation uses +π/2 (clockwise) so 'Pearson correlation (r)' reads
    top-to-bottom — slightly non-standard versus the matplotlib/seaborn convention
    of -π/2 (counter-clockwise, reads bottom-to-top). Minor visual nit, both work;
    only mention if a future repair pass is already touching the colorbar.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white near #FAF8F1 — correct light page background.
      Chrome: Title "Macro Indicator Correlations · heatmap-basic · javascript · chartjs · anyplot.ai" sits centered at the top in dark ink, fully readable. Ten column labels (GDP, Unemploy., Inflation, Interest, Stocks, Housing, Cons. Conf., Exports, Imports, Wages) sit above the matrix rotated ~35° in soft ink; the same labels run down the left side, also fully readable. The colorbar's rotated "Pearson correlation (r)" title and the 1.0 / 0.5 / 0 / -0.5 / -1.0 ticks all sit inside the canvas (no clipping). All chrome text is comfortably readable against the warm off-white.
      Data: A 10×10 matrix painted with the Imprint `imprint_div` gradient — saturated red (#AE3030 pole) for strong negatives (Cons. Conf.×Unemploy. = -0.81), deep blue (#4467A3 pole) for strong positives (Cons. Conf.×Stocks = 0.79, Stocks×GDP = 0.74), and an off-white midpoint matching the page background for near-zero values. Each cell carries its correlation value as text: white on saturated cells (|r| > 0.55), dark ink on lighter cells, so every value is readable. A new 1 px `t.grid` hairline between cells preserves the matrix structure. A heavier dark stroke (lineWidth 2.5) anchors the two cells of the strongest off-diagonal pair (Cons. Conf.×Unemploy. = -0.81) — a clear focal point.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black around #1A1A17 — correct dark page background, NOT pure black.
      Chrome: Title and axis tick labels render in light ink — fully readable, no dark-on-dark failures. Tick labels visible at 15 px in `t.inkSoft`; the rotated colorbar title in `t.ink` is bright and clear. No "near-black-on-near-black" text anywhere.
      Data: The poles (#AE3030 red, #4467A3 blue) are identical to the light render — only the diverging midpoint flips to follow `t.pageBg`, which is the documented `imprint_div` contract (not a palette-identity violation). The new 1 px `t.grid` hairlines now make the cell boundaries visible even where `|r| < 0.15` cells fade into the dark page background — this directly resolves the attempt 1 VQ-03 dark-fade concern. Per-cell value text remains readable everywhere (white on saturated, light `t.ink` on near-midpoint dark cells). The focal stroke flips to bright `t.ink` (near-white) at lineWidth 2.5 around the -0.81 cells — visually loud but unmistakably the focal anchor.
      Legibility verdict: PASS
