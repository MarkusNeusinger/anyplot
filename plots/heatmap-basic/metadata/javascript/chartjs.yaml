review:
  strengths:
  - 'Idiomatic Chart.js plugin pattern: a scatter base is used purely for axis layout
    while a `heatmap-painter` plugin draws cells, per-cell values, and a vertical
    colorbar in beforeDatasetsDraw/afterDatasetsDraw — a clean way to extend Chart.js
    with a non-native chart type without reaching for a sibling library.'
  - Imprint imprint_div tokens (t.div) are interpolated piecewise (lo→mid, mid→hi)
    so the diverging palette is theme-aware and the midpoint matches the page background
    in both renders.
  - 'Cell value text color adapts to cell saturation: |v|>0.55 uses #FAF8F1, otherwise
    t.ink — keeps every annotation readable across the full -1..+1 range in both themes.'
  - Title format exactly matches the mandated `{Descriptive} · {spec-id} · {language}
    · {library} · anyplot.ai` pattern, and the colorbar carries a rotated 'Pearson
    correlation (r)' axis title.
  - 'Square canvas is correctly opted into via the `//# anyplot-orientation: square`
    directive — saved PNGs are exactly 2400×2400, passing the canvas gate.'
  - 'Spec checklist is fully met: diverging colormap for ±values, in-cell value annotations,
    colorbar legend, and a logical category grouping (real-economy → labor → prices
    → markets → trade → wages).'
  weaknesses:
  - 'DE-03 (Data Storytelling): the heatmap shows interesting structure (Cons. Conf.
    ↔ Unemploy. at -0.81, Stocks ↔ Cons. Conf. at +0.79, Exports ↔ Imports at +0.73)
    but no annotation, highlight stroke, or emphasis directs the viewer to a focal
    point — the chart presents data without a story. Consider stroking the most extreme
    off-diagonal cell(s) with a thin t.ink border, or adding a single subtle annotation
    near the strongest correlation.'
  - 'DE-01 (Aesthetic Sophistication): solid baseline but no extra polish beyond chrome
    — e.g., no thin separator between header/labels and cell grid, no rounded cells,
    no inter-cell gutter to suggest a matrix structure. A 1–2 px gutter in t.pageBg
    between cells would also reduce the ''big slab of color'' feel on the saturated
    quadrants and improve cell discrimination in the dark render.'
  - 'VQ-03 (Element Visibility, dark render): because imprint_div''s midpoint is t.pageBg
    by design, cells with |r| < ~0.15 (Inflation×GDP=0.18, Stocks×Inflation=-0.07,
    Interest×Exports=0.07, etc.) lose almost all chrome against the warm-near-black
    background — the cell boundary visually disappears and only the value text remains.
    This is the intended Imprint behaviour, but a 1 px t.grid inter-cell hairline
    (or a faint cell stroke) would preserve the grid structure without breaking the
    diverging color story.'
  - 'LM-02 (Distinctive Features): the implementation leans on a hand-rolled canvas
    painter rather than on Chart.js-specific affordances — Chart.js scales and chartArea
    are used, but the actual heatmap painting is generic 2D canvas work that doesn''t
    really showcase library features. This is inherent to Chart.js not shipping a
    matrix chart natively, but it caps how high LM-02 can reasonably score.'
  - 'CQ-01 (KISS): the implementation defines four helper functions (hexToRgb, lerp,
    divColor, the plugin object). All are needed, but consider inlining `lerp` into
    `divColor` to shave one helper — minor.'
  image_description: |-
    Light render (plot-light.png, 2400×2400):
      Background: warm off-white at ~#FAF8F1 across the whole canvas — not pure white. PASS.
      Chrome: title "Macro Indicator Correlations · heatmap-basic · javascript · chartjs · anyplot.ai" sits centered at the top in dark ink at ~18 px (CSS), comfortably contained well within the canvas. Ten column labels (GDP, Unemploy., Inflation, Interest, Stocks, Housing, Cons. Conf., Exports, Imports, Wages) sit above the matrix rotated ~35° in t.inkSoft. Row labels in the same softened ink run down the left side. Colorbar tick labels (1.0, 0.5, 0, -0.5, -1.0) on the right are readable in t.inkSoft, and the rotated colorbar title "Pearson correlation (r)" sits against the right canvas edge in t.ink — every glyph is fully inside the saved frame, no clipping. All chrome is comfortably readable against the warm off-white background.
      Data: 10×10 matrix painted with imprint_div (red ↔ off-white midpoint ↔ blue). Saturated cells (|r|>0.55) carry #FAF8F1 value text; lighter cells carry dark ink — every "1.00", "-0.62", "0.18" … "1.00" is readable. Strong negatives (Unemploy. row, Cons. Conf.×Unemploy. = -0.81) read deep red; strong positives (Stocks×GDP=0.74, Cons. Conf.×Stocks=0.79, Exports×Imports=0.73) read deep blue. Diagonal of 1.00 is consistently deep blue. First categorical series rule (#009E73) is N/A for a diverging continuous colormap.
      Legibility verdict: PASS.

    Dark render (plot-dark.png, 2400×2400):
      Background: warm near-black around #1A1A17 — not pure black. PASS.
      Chrome: identical title in light ink, fully readable. Column and row labels in t.inkSoft sit cleanly against the dark surface — no dark-on-dark failures. Colorbar gradient and tick labels (1.0…-1.0) are readable in t.inkSoft. The rotated "Pearson correlation (r)" title against the right edge is in light t.ink, fully visible, no clipping.
      Data: cell colors are identical to the light render — same imprint_div poles (#AE3030 red, #4467A3 blue) — only the midpoint flips to follow the page background. Strong-correlation cells render the same red and blue saturation as the light version. Near-zero cells (|r| < ~0.2: Stocks×Inflation=-0.07, Interest×Exports=0.07, Wages×Unemploy.=-0.07, Inflation×GDP=0.18) fade almost completely into the dark page background, so the matrix grid visually breaks up in those quadrants — this is the intended imprint_div theme-adaptive midpoint, but it does cost some cell-boundary clarity. Per-cell value text remains readable everywhere: saturated cells keep #FAF8F1 text, near-midpoint cells use light t.ink against the dark page-tinted cell.
      Legibility verdict: PASS (with the noted imprint_div midpoint-fade caveat captured under VQ-03).
