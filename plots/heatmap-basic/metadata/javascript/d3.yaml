review:
  strengths:
  - Uses the Imprint diverging colormap via d3.scaleSequential(d3.interpolateRgbBasis(t.div))
    with the correct [-1, 1] domain — perfect VQ-07 compliance and the theme-adaptive
    midpoint flips automatically with light/dark
  - Per-cell value text color is picked dynamically by WCAG contrast ratio against
    the actual cell fill, so annotations stay readable across saturated blues, saturated
    reds, and near-midpoint cells in both themes — no dark-on-dark or light-on-light
    failures
  - 'Storytelling touches that go beyond a raw matrix: 1.6 px ink-color stroke on
    the diagonal (visual backbone), font-weight bump to 700 for |r| > 0.5 (equity
    cluster and treasury anti-correlation block read as figures), and asset-class-ordered
    rows/columns clustering risk assets together'
  - 'Square 2400×2400 orientation declared via the //# anyplot-orientation: square
    directive — appropriate for a symmetric correlation matrix and the canvas gate
    passes'
  - Realistic asset-class correlation matrix (post-2020 regime) — equity cluster ~0.6–0.8,
    treasuries anti-correlate with risk assets, gold near zero. Symmetric with diagonal
    = 1.0. Realistic context (DQ-02) and factual proportions (DQ-03)
  - 'Idiomatic D3: scaleBand for both axes, scaleSequential + interpolateRgbBasis
    for the cmap, axisTop/axisLeft for labels, axisRight on a scaleLinear for the
    colorbar, linearGradient defs for the smooth colorbar gradient'
  - Pearson r colorbar with explicit tick values [-1, -0.5, 0, 0.5, 1] and +.1f format
    — units/legend are unambiguous
  weaknesses:
  - 'CQ-01 (KISS Structure): three helper functions (relLum, contrast, textOn) at
    module scope deviate from the strict imports → data → plot → save flow. They are
    well-scoped and necessary for the per-cell contrast pick, but they cost a small
    KISS deduction. If inline-able as a one-liner without losing clarity, prefer that;
    otherwise leave as is'
  - 'DE-01 (Aesthetic Sophistication): strong but not yet Nature-tier. The diagonal
    stroke and weight bump are good moves; consider also slightly de-emphasising near-zero
    cells (e.g., lower font opacity for |r| < 0.15) so the eye lands on the structurally
    meaningful blocks even faster'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white around #FAF8F1 — correct, not pure white.
      Chrome: title "heatmap-basic · javascript · d3 · anyplot.ai" in dark ink (#1A1A17) at the top, centered, readable. Row labels (left) and rotated -38° column labels (top) in INK_SOFT (#4A4A44) — all 10 asset names readable, no overlap with adjacent labels or the matrix. Colorbar axis ticks ("+1.0", "+0.5", "+0.0", "-0.5", "-1.0") on the right in INK_SOFT, and the "Pearson r" caption sits above the gradient bar.
      Data: 10×10 correlation matrix using the Imprint diverging colormap (matte-red #AE3030 → near-neutral midpoint #FAF8F1 → blue #4467A3). Equity cluster (rows 0–4) is visibly blue-positive; Treasuries row dips into red against equities; Gold row near-neutral. Diagonal cells have a thin ink stroke and read "1.00". Value labels per cell are dark on light cells and light on saturated blue cells (dynamic WCAG contrast pick), with weight 700 on |r| > 0.5.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black around #1A1A17 — correct, not pure black.
      Chrome: title in light ink (#F0EFE8), row/column labels in INK_SOFT (#B8B7B0). All chrome legible against the dark surface. Colorbar ticks and "Pearson r" caption in light INK_SOFT, no dark-on-dark failures anywhere.
      Data: identical hue/saturation to the light render — the matte-red ↔ blue diverging gradient is preserved (only the midpoint chrome flips from light-cream to near-black). The dynamic textOn picker keeps cell value labels readable: saturated cells (|r| → 1) get light text, mid-saturation cells get dark text. Equity cluster still reads as the obvious positive block, treasury row as the negative band.
      Legibility verdict: PASS.
