review:
  strengths:
  - 'Idiomatic D3: uses d3.scaleBand for both axes, d3.scaleSequential(d3.interpolateRgbBasis(t.div))
    for the Imprint diverging colormap, and a real <linearGradient> def for the colorbar
    strip — the canonical D3 way to build a continuous legend.'
  - 'Strong theme adaptation: chrome (title, ticks, gridless cell gaps, colorbar axis,
    caption) is driven by t.ink/t.inkSoft/t.grid; data colors are identical in both
    renders and only the surrounding chrome flips, exactly as the style guide requires.'
  - 'Clever legibility trick on the cells: value annotations switch from t.ink to
    t.pageBg when |r| > 0.55, so the numbers stay readable on saturated cells in both
    themes without hard-coding colors.'
  - 'Square 2400x2400 canvas is correct for a symmetric correlation matrix and the
    //# anyplot-orientation: square directive is on its own line so the impl-review
    header rewrite won''t clobber it.'
  - 'Spec compliance is full: diverging colormap, in-cell value annotations, a labelled
    colorbar (''Pearson r'', -1.0 to +1.0), and a logical asset-class ordering that
    surfaces the equity cluster vs. treasuries/USD anti-correlation block.'
  weaknesses:
  - 'Saturated-cell value text on the dark render has slightly reduced contrast: when
    |r| > 0.55 the annotation switches to t.pageBg (warm near-black) and sits on the
    still-relatively-saturated diverging blue/red. It is readable but visibly dimmer
    than the t.ink-coloured values on the lighter cells. Consider only swapping to
    pageBg when the underlying cell luminance is high enough, or tightening the threshold
    (e.g. |r| > 0.7) so only the brightest mid-tone cells get the dark text.'
  - 'No explicit data-storytelling emphasis: every cell is rendered with the same
    border/weight, so the eye gets no help locating the most informative blocks (equity
    cluster, treasuries-vs-risk anti-correlation, gold neutrality). A subtle stroke
    on the diagonal, or a slightly heavier annotation weight on |r| > 0.5, would lift
    DE-03.'
  - 'Column labels are rotated -38 degrees with text-anchor: start, which works but
    the anchor and rotation together make the top-of-matrix gutter (margin.top = 150)
    feel slightly tight relative to the longest label (''US Equities''); consider
    either rotating to -45 with end anchor or nudging margin.top up by ~10-20 px for
    a touch more breathing room above the matrix.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: title "heatmap-basic · javascript · d3 · anyplot.ai" centered at top in dark ink, fully readable. Row labels (asset names) at left in soft ink, column labels rotated -38° above the matrix, also soft ink and readable. Vertical colorbar at right with tick labels -1.0/-0.5/+0.0/+0.5/+1.0 and caption "Pearson r" above it — all readable. Cell gaps act as subtle grid via the warm off-white showing through.
      Data: 10×10 correlation heatmap on Imprint diverging colormap. First-categorical brand colour is not applicable for a heatmap; the diverging Imprint stops (red-negative → neutral → blue/teal-positive) are used as required. Cell values rendered with t.ink on lighter cells and t.pageBg on saturated cells for legibility — all 100 annotations readable.
      Legibility verdict: PASS — every text element (title, row/column labels, cell values, colorbar ticks, caption) is clearly visible against the off-white background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: title in light ink, fully readable against the dark surface. Row and column labels in soft light ink — readable. Colorbar tick labels and "Pearson r" caption in soft ink — readable. No dark-on-dark chrome failures.
      Data: identical diverging colour mapping to the light render — only the midpoint of the Imprint diverging stops flips with the theme. Cell value annotations: lighter cells (low |r|) use t.ink (light) and read well; saturated cells (high |r|) use t.pageBg (dark near-black) on the diverging blue/red, which works but is visibly dimmer than the values on light cells — mild contrast hit, still readable.
      Legibility verdict: PASS — all elements readable; flagged the slightly reduced contrast of saturated-cell value text in the weaknesses for repair to consider tightening the threshold.
