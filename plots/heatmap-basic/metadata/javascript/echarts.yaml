review:
  strengths:
  - Correct 2400x2400 square canvas (orientation directive set, canvas gate passed).
  - Imprint diverging palette used via t.div with theme-adaptive midpoint; data colors
    identical between light and dark renders.
  - Cell-value labels stay readable across all cell colors and in both themes thanks
    to textBorderColor=t.pageBg with a 3px halo.
  - Semantic feature grouping (demographics, engagement, friction, outcomes) produces
    visible block structure - genuine data storytelling rather than alphabetical filler.
  - 'All four specification notes addressed: diverging colormap, in-cell value annotations,
    vertical colorbar (visualMap), logical row/column ordering.'
  - Title exactly matches required format 'heatmap-basic · javascript · echarts ·
    anyplot.ai'.
  - Theme-adaptive chrome correctly threads t.ink / t.inkSoft / t.pageBg through title,
    axis labels, ticks, and colorbar text.
  - 'Idiomatic ECharts usage: visualMap for colorbar, inverse y-axis, animation:false,
    init with no explicit size, no devicePixelRatio.'
  - 12x12 matrix with symmetric values and diagonal=1.0 is statistically plausible
    and within the spec's 5-50 size range.
  weaknesses:
  - 'VisualMap shows mildly redundant range labels: the explicit text [''+1'',''−1'']
    sits next to the calculable handle''s ''1.0''/''-1.0'' position labels, creating
    visual noise on the right edge - either drop the explicit text array or set calculable:false.'
  - calculable:true visualMap renders decorative arrow handles that have no function
    in the static PNG screenshot; set calculable:false to clean up the colorbar.
  - Cell-value text on the most saturated diagonal cells (dark-blue '1.00') shows
    a slight halo from the 3px textBorderWidth that reads as chunky at full resolution
    - reduce textBorderWidth to 1-2 for tighter typography.
  - Implementation uses standard ECharts heatmap pattern but does not explore distinctive
    ECharts features beyond visualMap (e.g. markArea to visually highlight the semantic
    feature blocks, or itemStyle borderRadius for softened cells).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1, transparent ECharts canvas over the page background. PASS.
      Chrome: title "heatmap-basic · javascript · echarts · anyplot.ai" centered at top in dark ink (fontSize 26, normal weight), clearly readable. X-axis tick labels (feature names) rotated 35 degrees in inkSoft, all readable. Y-axis tick labels horizontal in inkSoft, all readable. Vertical colorbar on the right edge with "1.0" / "-1.0" position labels and "+1" / "−1" range text in inkSoft, fully readable.
      Data: 12x12 correlation matrix on Imprint diverging scale - deep blue for strong positive (~+1.0), warm cream-ish midpoint near 0, matte red for strong negative (~-0.7). Diagonal cells uniformly deep blue (1.00). First categorical signal (the diverging palette) starts from t.div which is the spec-mandated continuous scale. Cell-value numbers rendered in dark ink with a 3px light off-white text-border for halo readability across all cell colors. Cells separated by 2px borders in pageBg.
      Legibility verdict: PASS. No "light on light" text. Cell numbers on the darkest blue/red cells are slightly chunky from the wide textBorder halo but still clearly readable.

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17, transparent ECharts canvas over the page background. PASS.
      Chrome: title in light ink at top, clearly readable against the dark background. Axis tick labels in light inkSoft, all readable. Colorbar text in light inkSoft, readable.
      Data: SAME 12x12 matrix with SAME data colors as light render - the Imprint div palette is identical between themes (verified visually: same blues, same reds, same midpoint band). Only chrome flipped. Cell-value numbers now rendered in light ink with a dark pageBg text-border, mirroring the light-render approach.
      Legibility verdict: PASS. No "dark on dark" text - the implementation correctly threads t.ink (light in dark theme) through both the title and the in-cell labels, and t.inkSoft through axis ticks and colorbar text. Brand green is not used (continuous data, not categorical), but the diverging palette remains visible in both themes.
