review:
  strengths:
  - Correct imprint_div diverging colormap (matte-red → theme-adaptive midpoint →
    blue) for signed growth-rate data
  - Sophisticated scale_color_identity + computed text_color column for per-cell adaptive
    annotation contrast — idiomatic plotnine pattern
  - 'Full theme-adaptive chrome: PAGE_BG, ELEVATED_BG, INK, INK_SOFT tokens applied
    consistently across all non-data elements in both renders'
  - Realistic, narrative-rich dataset with deliberate extreme anchor points (HR -32.5,
    Sales +38.2, Research +33.7) that make the heatmap visually interesting
  - Square 2400×2400 canvas appropriate for symmetric matrix; canvas gate passed
  - Subtitle adds contextual information without cluttering the title
  - pd.Categorical with ordered=True for correct row/column ordering in plotnine's
    discrete scales
  weaknesses:
  - scale_x_discrete(expand=(0, 0.5)) and scale_y_discrete(expand=(0, 0.5)) create
    a half-tile gap between the outer cells and the panel border — use expand=(0,
    0) so tiles flush against the border for a cleaner enclosed heatmap look
  - Cell annotation text size=3 (plotnine mm ≈ 8.5pt) is readable but on the small
    side for a 2400px canvas; bumping to size=3.5 would improve legibility at thumbnail
    scale
  - 'Dark render: mid-range near-zero cells fill with #1A1A17 (the page background),
    making cell boundaries in the 0%-band hard to distinguish without close inspection
    — the cell borders (INK_SOFT #B8B7B0) help but a slightly thicker border (size=0.8)
    would reinforce cell definition in dark mode'
  - No explicit callout or annotation highlighting the narrative extremes (HR Q1'23
    = -32.5%, Sales Q4'24 = +38.2%) — a simple annotate() note on the two extremes
    would strengthen the data story
  - 'Design Excellence is functional but unremarkable: no focal point emphasis, no
    spine customisation beyond panel_border, plot_margin=0.02 is quite tight and compresses
    the whitespace'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correctly matches the light surface token. Panel border present (four-sided, appropriate for enclosed heatmap grid).
      Chrome: Title "heatmap-basic · python · plotnine · anyplot.ai" in bold dark ink, centered, spanning ~70% of canvas width. Subtitle "Year-over-year growth rate (%) · Q1 2023 – Q4 2024" in INK_SOFT below. Y-axis label "Department" and X-axis label "Quarter" in dark ink at 10pt. Tick labels at 8pt in INK_SOFT; x-axis tick labels rotated 45° for readability.
      Data: 8×8 heatmap (8 departments × 8 quarters). Diverging colormap from matte-red #AE3030 (negative growth) through near-white midpoint to blue #4467A3 (positive growth). Strongly negative cells (e.g. HR Q1'23 = -32.5) are deep red; strongly positive cells (e.g. Sales Q4'24 = +38.2) are deep blue; near-zero cells are near-white. Cell annotations show +/- numeric values; white text on extreme cells, INK on mid-range cells — adaptive contrast is clearly working. Colorbar legend labelled "Growth (%)" on the right with a properly styled elevated background.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light failures. Minor: small gap between outer tiles and panel border due to expand=0.5.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correctly matches the dark surface token.
      Chrome: Title and subtitle in light #F0EFE8 (INK in dark mode) — clearly readable against dark background. Axis labels and tick labels rendered in theme-adaptive tokens (INK / INK_SOFT dark variants) — all readable. No dark-on-dark text failures observed.
      Data: Data colors (matte-red / blue ends of diverging scale) are identical to the light render — only the midpoint and chrome flip. Mid-range near-zero cells fill with #1A1A17 (page background), making them visually merge with the background; cell borders in INK_SOFT (#B8B7B0) provide the main boundary definition in this zone. Cell annotation labels rendered in light cream (#F0EFE8) on all cells — readable even on the dark mid-range cells. Extreme cells (strongly red or blue) also show light cream text with adequate contrast.
      Legibility verdict: PASS — all titles, labels, and annotations readable. Note: mid-range cells blend with dark background by design (imprint_div midpoint = page bg), but border lines maintain grid structure.
