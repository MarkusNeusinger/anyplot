  strengths:
  - 'Correct imprint_div diverging colormap with properly theme-adaptive midpoint
    (#FAF8F1 light / #1A1A17 dark)'
  - Per-cell theme-adaptive text contrast logic (white on dark extremes, INK on mid-range
    in light, uniform cream in dark)
  - Interesting synthetic data with clear department narratives (HR crisis, Sales/Research
    recovery surge)
  - 'Idiomatic plotnine grammar: scale_color_identity + aes(color=...) for per-cell
    text is an elegant pattern'
  - 'Perfect spec compliance: all required features (heatmap type, diverging cmap,
    cell annotations, colorbar, logical ordering)'
  weaknesses:
  - 'Dark mode: near-zero cells fill with #1A1A17 (same as background) AND cell borders
    are also color=PAGE_BG=#1A1A17 — heatmap grid loses definition in the ±~10% band
    (Engineering Q4 23 at -0.8, Marketing Q2 23 at -0.1, Finance Q1 24 at -0.5). Fix:
    change geom_tile color=PAGE_BG to color=INK_SOFT so cell borders are visible in
    dark mode, or use a slightly offset dark midpoint (~#27251F) so near-zero tiles
    remain distinguishable from the #1A1A17 background'
  - 'Colorbar legend cramped: 8 breaks (-30,-20,-10,0,10,20,30,40) at legend_key_height=12
    pack tick labels too tightly in both renders. Fix: reduce to 5 breaks (breaks=[-30,-15,0,15,30])
    or increase legend_key_height to 22+'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "heatmap-basic · python · plotnine · anyplot.ai" bold 12pt dark ink, clearly readable. Subtitle "Year-over-year growth rate (%) · Q1 2023 – Q4 2024" in 8pt secondary tone. Axis labels "Quarter" and "Department" at 10pt dark ink, readable. Tick labels (quarter names, department names) at 8pt in #4A4A44, readable. Colorbar legend on right with "Growth (%)" title — 8 break labels (-30 to 40) are cramped within legend_key_height=12.
      Data: imprint_div colormap — matte-red (#AE3030) for negative cells, warm cream midpoint, blue (#4467A3) for positive cells. All 64 cells visible with clear color gradients. Cell annotations show signed % values in white (on dark extremes) or INK (on mid-range). HR Q1'23 (-32.5) renders as deep red; Sales Q4'24 (+38.2) and Research Q3'24 (+33.7) as deep blue.
      Legibility verdict: PASS (minor: colorbar tick labels slightly cramped)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface
      Chrome: Title and all axis labels/ticks use cream/light tokens (#F0EFE8 / #B8B7B0) — readable against dark background. No dark-on-dark text failures for chrome elements. Colorbar legend has dark elevated background (#242420) with light text.
      Data: Data colors identical to light render (imprint_div stays constant across themes — correct). ISSUE: Near-zero cells (Engineering Q4'23 -0.8, Marketing Q2'23 -0.1, Finance Q1'24 -0.5, etc.) fill with #1A1A17 (theme-adaptive midpoint = background color). Cell borders also use PAGE_BG=#1A1A17 so they are invisible. The heatmap grid structure is lost for the central band of values. Cell annotation text (cream #F0EFE8) over near-black cells remains readable. Extreme cells (red/blue) are clearly visible.
      Legibility verdict: PASS for chrome text; FAIL for grid structure in near-zero band (cells merge with background in dark mode)
