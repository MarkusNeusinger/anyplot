review:
  strengths:
  - Uses imprint_div diverging colormap correctly — red↔neutral↔blue with theme-adaptive
    midpoint, centered at performance midpoint (50)
  - Employs seaborn clustermap with row hierarchical clustering — visually groups
    similar departments and adds analytical value beyond a plain heatmap
  - All theme-adaptive chrome tokens properly threaded (INK, INK_SOFT, PAGE_BG, ELEVATED_BG)
    across heatmap, dendrogram, and colorbar axes
  - 'Excellent data storytelling through clustering: Finance steady-high, Sales first-half
    surge, Engineering ramp, HR mid-year dip, Support year-end slump are all immediately
    readable'
  - 'Full spec compliance: diverging colormap, cell annotations, colorbar, logical
    ordering — all present'
  - Reproducible with np.random.seed(42) and realistic clipped domain (5–95)
  - Clean KISS structure — no functions/classes, linear flow
  weaknesses:
  - 'Colorbar ylabel "Performance Score" is off-canvas: `g.cax.yaxis.set_label_position("left")`
    with `cbar_pos=(0.02, ...)` places the label ~56 px to the left of x=48 px — completely
    outside the 2400 px canvas. Fix: remove `set_label_position("left")` so the label
    stays on the default right side, or move the colorbar right to e.g. `cbar_pos=(0.05,
    0.15, 0.03, 0.6)` and keep left positioning.'
  - 'Annotation text color is a fixed dark INK (#1A1A17) in light theme, which produces
    only ~3.6:1 contrast on deep blue cells (#4467A3 at high performance values 85–95).
    Fix: use a single white annotation color (`annot_kws={"color": "white"}`) that
    works well on both the red and blue ends across themes, or implement adaptive
    logic: light-cream text on cells above luminance threshold, dark text below.'
  - 'DE-01 elevation opportunity: the clustermap is a strong foundation but the colorbar
    is tiny and its label is missing — fixing the label and making the colorbar slightly
    wider (e.g. width=0.04) would notably improve the professional finish.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "heatmap-basic · python · seaborn · anyplot.ai" at fontsize=12pt fully readable in dark ink, horizontally centered. X-axis label "Month" and month tick labels (Jan–Dec) readable at bottom. Department names on the right (Sales, Finance, Marketing, Support, HR, Engineering, Operations) readable in dark ink. Colorbar tick labels (100, 75, 50, 25, 0) visible to the right of the colorbar strip — readable. No "Performance Score" colorbar ylabel visible anywhere; it appears to be off-canvas to the left due to set_label_position("left") with cbar_pos x=0.02.
      Data: Diverging colormap red↔warm-neutral↔blue, centered at 50. High-value cells (Finance, Sales early months) render as medium-to-deep blue. Low-value cells (Marketing, Support late months) render as medium-to-deep red/rose. Mid-range cells near-neutral off-white. Cell annotations (numeric, 5–95 range) visible in dark ink (#1A1A17). Note: annotation text on deep-blue cells (value 85–95, e.g. Apr=95, Finance months) has ~3.6:1 contrast — below WCAG AA but contextually readable at this canvas size. Row dendrogram on left groups similar departments.
      Legibility verdict: PASS overall — all primary labels readable; annotation contrast on deep-blue cells is suboptimal but not a hard failure. Colorbar ylabel is MISSING (off-canvas).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title fully readable in light cream text against dark background. Axis labels ("Month"), tick labels (month names, department names) readable in INK_SOFT (#B8B7B0). Colorbar tick labels visible. No "Performance Score" colorbar ylabel visible — same off-canvas issue as light render.
      Data: Diverging colormap colors are identical to the light render — high-value cells blue, low-value cells red. Annotation text is light cream (#F0EFE8) per dark-theme INK token — readable on both red and blue cells. Cells near the midpoint (~value 50) render as the background color (#1A1A17) by design (theme-adaptive midpoint in imprint_div) — these cells blend with the background; the white annotation numbers remain readable and the cell grid lines provide separation. Data colors are identical across light and dark renders (only chrome flips). No dark-on-dark failures for labeled elements.
      Legibility verdict: PASS — all text readable against dark background. Midpoint cell blending is the prescribed imprint_div behavior, not a failure.
