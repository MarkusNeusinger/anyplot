review:
  strengths:
  - Excellent use of sns.clustermap — seaborn's hierarchical clustering API that automatically
    groups similar departments by performance pattern
  - 'Imprint diverging colormap with theme-adaptive midpoint (#FAF8F1 light / #1A1A17
    dark) — correct choice for performance data diverging around 50'
  - 'Full theme adaptation across all sub-axes: heatmap, row dendrogram, colorbar,
    and spines all receive INK/INK_SOFT tokens'
  - All font sizes explicitly set (title 12pt, annotations 10pt, axis labels 10pt,
    ticks 8pt, colorbar ticks 7pt) and readable in both renders
  - Intentional data patterns in synthetic data (Sales H1 surge, Engineering H2 ramp,
    Finance steady high, HR mid-year dip) demonstrate the heatmap's storytelling capacity
  weaknesses:
  - 'Cell annotation color is fixed to the INK token (#1A1A17 light / #F0EFE8 dark)
    regardless of cell background luminance — on deep-red or deep-blue cells the contrast
    is marginal; adaptive annotation color (auto-detect cell luminance, switch to
    white/dark accordingly) would improve readability on extreme-value cells'
  - 'DE-01 limited by framework-mandated palette: the Imprint colormap and clustermap
    are well-chosen but don''t constitute creative design beyond spec compliance —
    additional typographic polish (e.g., subtle title/colorbar label weight hierarchy)
    could push toward strong-design territory'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct light surface.
      Chrome: Title "heatmap-basic · python · seaborn · anyplot.ai" at top in dark ink, clearly readable. X-axis label "Month" readable. Colorbar label "Performance Score" on left side readable. Row department labels (Sales, Finance, Marketing, Support, HR, Engineering, Operations) on right edge, all readable. Month tick labels (Jan–Dec) on bottom, readable. Colorbar tick labels (0, 25, 50, 75, 100) visible at 7pt — small but readable.
      Data: Diverging colormap red (#AE3030) → near-white (#FAF8F1) → blue (#4467A3). Mid-range values (~50) blend into the cream background. High-performance cells (e.g., Finance row, Engineering H2) render in deep blue. Low-performance cells (Mar=5 Operations, Aug=10 Operations) in deep red. Cell separating lines in INK_SOFT are visible. Numeric annotations in each cell are readable in dark ink.
      Row dendrogram visible on left with lines in INK_SOFT on PAGE_BG background. Col cluster disabled (months stay Jan–Dec order).
      Legibility verdict: PASS — all chrome and data text readable against warm light background.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct dark surface.
      Chrome: Title readable in light ink (#F0EFE8). Axis labels, tick labels, and row department names all in light ink — no dark-on-dark failures. Colorbar label "Performance Score" readable. Colorbar tick labels visible.
      Data: Data colors are identical to light render — same red-blue diverging scale. The key difference is the midpoint color flips to #1A1A17, so neutral-performance cells (~50) become near-invisible against the dark background — only distinguishable by the cell separator lines and numeric annotations. Deep-blue and deep-red extreme cells remain clearly visible. Annotations use INK (#F0EFE8) — light text on the dark midpoint cells is readable; light text on deep-blue/red extreme cells is marginally readable.
      Row dendrogram lines visible (INK_SOFT = #B8B7B0 on dark background).
      Legibility verdict: PASS — all chrome and annotations readable. Minor note: neutral-value cells (~50) blend strongly with the dark background, which is an expected and intentional consequence of the theme-adaptive midpoint in imprint_div.
