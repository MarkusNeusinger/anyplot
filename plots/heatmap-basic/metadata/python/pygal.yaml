      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "heatmap-basic · python · pygal · anyplot.ai" in dark ink at top (~60% canvas width), clearly readable. Subtitle "Monthly website traffic (thousands of visits) by content category" in INK_SOFT below title. Month column headers (Jan–Dec) rendered in dark bold 32px text just above the grid. Y-axis label "Content Category" rotated 90°, bold, readable. X-axis label "Month" bold at bottom. Row labels (Finance, Tech, Health, Food, Travel, Science, Sports, Culture) in default INK rendered by pygal, clearly legible. Colorbar to the right with "Visits (k)" header and tick labels (170, 112, 54) in INK_SOFT.
      Data: Heatmap grid of 8 categories × 12 months. Color gradient runs from #009E73 (brand green, low values ~54k) to #4467A3 (blue, high values ~173k) — imprint_seq sequential colormap. Each cell shows the actual traffic value (54–173) in white or dark text adapted to background brightness. Finance row shows the darkest blues (highest traffic), Culture/Sports rows show greener shades (lower traffic). Amber (▼ Year-end peak, ▼ Summer peak) annotations mark Finance-Dec and Travel-Aug cells.
