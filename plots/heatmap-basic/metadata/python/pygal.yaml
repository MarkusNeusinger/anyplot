review:
  strengths:
  - Creative heatmap implementation using HorizontalStackedBar with per-cell color
    dicts — clever pygal workaround for a chart type the library lacks natively
  - Sophisticated SVG post-processing adds colorbar, month column headers, subtitle,
    and peak annotations all within the SVG layer
  - 'Brightness-adaptive cell text colors (white vs dark) ensure readability across
    the full #009E73→#4467A3 gradient'
  - Categorical data sorted by average traffic creates natural visual hierarchy with
    Finance at top
  - Amber peak annotations (▼ Year-end peak, ▼ Summer peak) guide the viewer to the
    most informative seasonal patterns
  - Both themes correctly adapt chrome while preserving identical data colors
  weaknesses:
  - Colorbar tick labels are at font-size 28px — slightly small relative to the 2400×2400
    canvas; increasing to 32–34px would improve readability at mobile widths
  - SVG post-processing section is 110+ lines of regex/string injection, making the
    code harder to follow than necessary for its functional purpose
