review:
  strengths:
  - Creative HorizontalStackedBar-as-heatmap approach correctly works around pygal
    lack of native heatmap type
  - Brightness-adaptive annotation text (white on dark cells, dark on light cells)
    is a sophisticated implementation detail
  - 'imprint_seq (#009E73 to #4467A3) correctly applied for single-polarity continuous
    data'
  - Complete theme adaptation — both renders are correct and visually consistent
  - Peak annotations with amber (#DDCC77) add genuine data storytelling
  - Reproducible with np.random.seed(42)
  - Saves both PNG and HTML artifacts
  weaknesses:
  - Dec column header and Visits (k) colorbar label overlap in the top-right corner
    — increase margin_right or shift colorbar further right
  - Year-end peak annotation (col_j=11, center of Dec column) extends rightward into
    the colorbar strip — shorten text, left-align, or shift x position left by ~0.5
    cell widths
  - Cell value annotations use value_font_size=26 SVG units; increase to 36 (library
    guide default) for better legibility at 2400x2400
  - Row ordering is neither alphabetical nor sorted by magnitude — sort categories
    descending by mean traffic so the visual pattern is easier to read
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "heatmap-basic · python · pygal · anyplot.ai" in dark ink — clearly readable. "Content Category" rotated y-axis label in dark ink, "Month" bold x-axis label, month headers (Jan–Dec) above grid — all readable. Subtitle in muted ink below title. Minor: "Dec" header and "Visits (k)" colorbar label collide in top-right corner.
      Data: imprint_seq gradient (#009E73 green → #4467A3 blue); low traffic = teal, high traffic = blue-purple. First palette anchor #009E73 used as low-end. Cell value annotations in brightness-adaptive white/dark text. Colorbar on right with 60-stop gradient. Amber (#DDCC77) peak annotations.
      Legibility verdict: PASS (minor Dec/colorbar label overlap noted)

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct dark theme surface
      Chrome: All text flips to light ink (#F0EFE8/B8B7B0). Title, row labels, month headers, axis labels, colorbar labels all clearly readable in white/light text. No dark-on-dark failures detected. Same "Dec"/"Visits (k)" proximity issue persists but no canvas clipping.
      Data: imprint_seq gradient colors are identical to the light render — only chrome elements flipped. Cell value annotations still brightness-adaptive and readable. Colorbar gradient unchanged. Amber annotations still visible.
      Legibility verdict: PASS
