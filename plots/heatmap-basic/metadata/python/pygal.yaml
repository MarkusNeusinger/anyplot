      Data: Heatmap cell colors are identical to the light render — the #009E73→#4467A3 gradient is unchanged; only the background and chrome flip. Cell value annotations maintain their brightness-adaptive colors (white or near-black depending on cell luminance). Amber peak annotations (▼ Year-end peak, ▼ Summer peak) retain their #DDCC77 color, clearly visible on the dark surface.
      Legibility verdict: PASS — all text clearly readable on the warm near-black background; no dark-on-dark issues detected.
