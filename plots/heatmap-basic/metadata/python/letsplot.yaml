review:
  strengths:
  - 'Correct Imprint sequential colormap (#009E73 → #4467A3) for single-polarity energy
    data — imprint_seq applied exactly as required'
  - Adaptive text color in cells (dark on green low-value cells, light on blue high-value
    cells) is smart design thinking that improves readability across the whole heatmap
  - All chrome tokens correctly applied in both themes — title, axis labels, tick
    labels, legend text, and panel background all flip cleanly between light (#FAF8F1)
    and dark (#1A1A17)
  - Realistic neutral building energy scenario with seasonal variation and zone-specific
    baselines — Server Room dominance and winter peaks emerge naturally from the data
  - layer_tooltips() leverages letsplot's distinctive interactive tooltip feature,
    and HTML output is saved alongside PNG — correct for an interactive library
  - Clean KISS structure with np.random.seed(42), explicit font sizes throughout,
    and all imports used
  weaknesses:
  - 'Design storytelling gap: the plot displays data correctly but misses an opportunity
    to highlight the main insight — a subtle annotation on the peak cell (Server Room,
    January, 699 kWh) or a brief title prefix like ''Server Room Dominates Year-Round
    · '' would elevate DE-03 from 3 to 5+'
  - 'DE-02 could go higher: the cell gaps from width=0.92/height=0.92 create slight
    visual separation but the overall chrome is still the minimal theme default —
    consider removing the outer panel border/spines for a cleaner enclosed-heatmap
    look (style guide: ''Remove all spines for very clean looks (heatmaps)'')'
  - 'LM-02 has room to grow: layer_tooltips() is good, but letsplot''s geom_tile +
    facet_wrap or theme customisation options are not explored — a more distinctive
    use of letsplot-specific features (e.g., custom tooltip format with HTML styling)
    would push Library Mastery higher'
  image_description: |-
