review:
  strengths:
  - 'Full spec compliance: diverging colormap, cell annotations, colorbar with units,
    and logical month/city ordering all correctly implemented'
  - 'Idiomatic Bokeh usage: linear_cmap transform, construct_color_bar() from renderer,
    LabelSet for annotations, HoverTool for interactive HTML'
  - 'Smart adaptive cell text color: dark text on near-zero cream cells in light mode,
    always-light text in dark mode — prevents dark-on-dark readability failures'
  - 'Clean visual refinement: all spines, grid lines, and tick marks removed, leaving
    a minimal yet legible grid with white cell borders'
  - 'Imprint div palette implemented correctly with theme-adaptive midpoint (#FAF8F1
    light / #1A1A17 dark), temperature anomaly data is realistic and neutral'
  - 'Perfect code quality: deterministic seed, clean imports, correct output filenames,
    idiomatic Selenium CDP screenshot approach'
  weaknesses:
  - Cell annotation text set to 22pt — at 2400x2400 that yields ~29 source-px per
    character; visible at full resolution but borderline small when the image is scaled
    to mobile width (~400px). Raising to 26–28pt would improve mobile legibility without
    crowding the cells.
  - 'Dark mode near-zero cells merge visually with the #1A1A17 background (by Imprint-div
    design), which slightly reduces the perceptual utility of the color scale near
    zero — white cell borders compensate but do not fully replace the lost color information.
    This is per-spec but worth noting for future heatmaps.'
  - Design storytelling could be enhanced by adding a subtle annotation or callout
    highlighting the most extreme anomaly cell (e.g. Berlin Feb -2.7°C), which would
    create a focal point and guide viewer attention.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light surface.
      Chrome: Title "heatmap-basic · python · bokeh · anyplot.ai" in bold dark ink, centered, occupies ~75% of canvas width — expected for the mandated title length. X-axis label "Month (2024)" and Y-axis label "City" in dark ink, clearly readable. Month and city tick labels in slightly softer dark ink (#4A4A44), readable and well-sized. Colorbar on the right with title "Anomaly (°C)" and tick labels — all clearly readable.
      Data: 7×12 heatmap grid (Oslo, Berlin, Madrid, Cairo, Mumbai, Tokyo, Sydney × Jan–Dec). Imprint diverging colormap with matte-red (#AE3030) for negative anomalies, cream midpoint (#FAF8F1) for near-zero, Imprint blue (#4467A3) for positive anomalies. Cell annotations show signed values (e.g. +2.1, -2.7) with adaptive text: dark text on near-zero cream cells, light text on deep-colored cells. White 2px cell borders cleanly separate cells. Color signal is clear: Oslo/Berlin winter months deeply red (cold anomaly), summer months blue (warm anomaly); Sydney shows inverted seasonal pattern.
      Legibility verdict: PASS — all text readable, no light-on-light issues, adaptive cell text prevents readability failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark surface.
      Chrome: Title in bold off-white (#F0EFE8), clearly readable against dark background. X-axis and Y-axis labels in off-white, readable. Tick labels in soft off-white (#B8B7B0), readable. Colorbar labels in INK_SOFT color, readable. No dark-on-dark failures in the chrome layer.
      Data: Same Imprint diverging palette with theme-adaptive midpoint #1A1A17 — near-zero cells appear very dark (nearly matching the background), visually distinguishable only via white cell borders. Deep negative cells (Berlin Feb -2.7) appear deep red-brown; deep positive cells (Oslo Jul +2.1, Madrid Aug +2.3) appear bright blue. Cell annotations are all rendered in #F0EFE8 (light) in dark mode, providing good contrast on all cell colors including the near-black near-zero cells. Data colors are identical to the light render (only chrome flips).
      Legibility verdict: PASS — all chrome text readable, all cell annotation text readable (light on dark). Near-zero cells blending with background is Imprint-div-by-design behavior; white borders preserve grid structure.
