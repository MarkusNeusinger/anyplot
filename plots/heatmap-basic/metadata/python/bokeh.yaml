review:
  strengths:
  - Theme-adaptive cell annotation text colors (dark text on near-zero cream cells,
    light text on deep red/blue cells) — sophisticated per-cell logic that goes well
    beyond defaults
  - 'Correct imprint_div 256-stop diverging palette with theme-adaptive midpoint (#FAF8F1
    light / #1A1A17 dark) — follows brand spec exactly'
  - 'Storytelling callout: most extreme anomaly cell is highlighted with a bold INK-colored
    border that flips correctly between themes'
  - 'Idiomatic Bokeh: uses linear_cmap transform, r.construct_color_bar() from renderer,
    LabelSet for cell labels, figure with categorical x/y ranges, and HoverTool'
  - Colorbar properly titled 'Anomaly (°C)' with both a descriptive label and units
  - Cities ordered north-to-south (Oslo → Sydney), providing geographic insight into
    latitudinal temperature patterns
  - 'All chrome fully theme-adaptive: title, axis labels, tick labels, colorbar —
    no dark-on-dark or light-on-light failures in either render'
  - Square 2400×2400 canvas — correct format for symmetric heatmap grid; canvas gate
    passed
  weaknesses:
  - 'In dark mode, near-zero anomaly cells fill with the background color (#1A1A17
    midpoint) making them visually indistinguishable from the surrounding border area
    — only the white cell borders (line_color=''white'') define them. Consider a slightly
    offset midpoint for dark mode (e.g. #2A2A24) to keep near-zero cells faintly visible
    as distinct fills.'
  - 'White cell borders (line_color=''white'', line_width=2) are stark against the
    dark background in the dark render — a softer #B8B7B0 (INK_SOFT) border in dark
    mode would reduce visual harshness without losing grid definition.'
  - Cell annotation font size 26pt may be slightly on the small side for the 7×12
    grid at 2400×2400; 28–30pt would improve readability at thumbnail scale without
    overflowing cells.
  - 'Data storytelling is limited to one highlighted extreme-value cell; a brief annotation
    (e.g. ''Coldest anomaly: Berlin Feb'') would communicate the callout''s meaning
    without requiring the viewer to inspect the colorbar.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct surface color, clearly NOT pure white.
      Chrome: Title "heatmap-basic · python · bokeh · anyplot.ai" in dark INK (#1A1A17), large and centered; "Month (2024)" x-axis label and "City" y-axis label both in dark INK, proportional; tick labels (month abbreviations, city names) in INK_SOFT (#4A4A44), readable. Colorbar labeled "Anomaly (°C)" with tick labels from -2.5 to +2.5.
      Data: 7 cities × 12 months heatmap with imprint_div diverging palette (matte red #AE3030 → cream midpoint → steel blue #4467A3). Near-zero cells are cream-toned, warm-season positive anomalies are blue, cool-season negative anomalies are red. Per-cell +/-.X annotations use dark text on near-zero cells and light text on deep-color cells. A thick black border highlights the most extreme cell (Berlin Feb, -2.7°C). Colorbar on right side.
      Legibility verdict: PASS — all title, axis labels, tick labels, cell annotations, and colorbar labels clearly readable against light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct surface color, clearly NOT pure black.
      Chrome: Title, axis labels, and tick labels flip to light INK (#F0EFE8 / #B8B7B0), all readable against dark background. Colorbar tick labels and title also in light tones.
      Data: Data colors (red/blue extremes) are identical to light render — Imprint palette positions are theme-invariant. Near-zero cells fill with #1A1A17 (the dark-mode midpoint), making them visually merge with the background (only white cell borders distinguish them). The extreme-value highlight border is now cream/light (#F0EFE8), correctly adapting to dark INK token. All cell annotations are light (#F0EFE8) in dark mode.
      Legibility verdict: PASS — no dark-on-dark failures observed; all text is readable. Minor note: near-zero cells are hard to distinguish from background fill (design consequence of theme-adaptive midpoint), but cell borders keep the grid legible.
