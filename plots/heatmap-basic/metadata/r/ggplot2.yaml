review:
  strengths:
  - Hierarchical clustering (hclust + as.dist) orders variables to reveal meaningful
    clusters — analytical value beyond mere display
  - Theme-adaptive imprint_div midpoint (DIV_MID = PAGE_BG) makes near-zero correlation
    tiles seamlessly blend with the background in both themes
  - Strong correlation border highlighting (|r| > 0.7) creates clear visual hierarchy
    without annotations
  - Lower triangle masking eliminates redundancy; diagonal text uses INK_SOFT for
    subtle de-emphasis
  - Real mtcars data with an insight-naming subtitle elevates storytelling
  - Both themes render correctly with full chrome token adaptation throughout
  weaknesses:
  - Cell annotation text (geom_text size=3.0 approx 8.5pt) is slightly small for a
    2400x2400 canvas — increasing to 3.5-4.0 would improve mobile readability without
    crowding the tiles
  - LM-02 could be elevated with a dendrogram sidebar (ggdendro) to make the hierarchical
    clustering ordering self-explanatory
