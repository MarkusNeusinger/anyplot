review:
  strengths:
  - Perfect Imprint diverging palette compliance with theme-adaptive DIV_MID — zero-correlation
    cells blend naturally with both light and dark backgrounds.
  - 'Complete spec compliance: colorbar, cell annotations, diverging scale, logical
    variable ordering.'
  - 'Excellent code quality: deterministic, KISS structure, clean imports, modern
    ggplot2 API throughout.'
  - coord_fixed() correctly enforces square cells on the 2400x2400 canvas.
  - Theme-adaptive chrome tokens applied consistently to all non-data elements (INK,
    INK_SOFT, ELEVATED_BG, PAGE_BG).
  weaknesses:
  - 'DE-01 LOW: No design differentiation beyond correct palette/token usage — missing
    variable reordering by correlation similarity (e.g., reorder axes using hclust),
    no upper/lower triangle masking to reduce visual redundancy, and no diagonal treatment
    to distinguish self-correlations.'
  - 'DE-03 LOW: No visual storytelling — the MPG cluster (strong negative correlations
    with Weight/Displacement/Cylinders/HP) is a compelling narrative that receives
    no visual emphasis. Consider a subtitle or differentiating strong correlations
    (|r| > 0.7) via alpha or border contrast.'
  - 'LM-02 PARTIAL: Does not exploit ggplot2-distinctive hierarchical reordering of
    axes (using hclust + reorder() to surface correlation clusters) or upper-triangle
    masking, which would elevate the implementation.'
