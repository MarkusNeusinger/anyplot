review:
  strengths:
  - Creative 3D surface simulation using painter's algorithm and 2D projection — impressive
    given letsplot's lack of native 3D support, and the visual result is convincing
    in both themes
  - Imprint diverging colormap (`imprint_div`) correctly applied with theme-adaptive
    midpoint (off-white in light, near-black in dark), producing the correct surface
    appearance in both renders
  - 'Full theme-adaptive chrome: all six chrome tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT, DIV_MID) correctly branched on ANYPLOT_THEME, with zero dark-on-dark
    or light-on-light failures'
  - Peak and valley annotations add guided data storytelling — viewer immediately
    locates z≈+1 and z≈−1 extrema without searching
  - All font sizes explicitly set (plot_title=16, axis_title=12, axis_text=10, legend_text=10,
    legend_title=12, geom_text size=3.5mm) with well-proportioned result at 3200×1800
    px
  - Clean, linear code structure with no functions or classes; painter's algorithm
    implementation is well-organized with clear comments; zip(strict=True) is a nice
    Pythonic safety touch
  weaknesses:
  - Annotation text (geom_text size=3.5mm) resolves to ~53px in the 3200×1800 export
    — readable but slightly small for annotations that carry key insight (peak z≈+1,
    valley z≈−1); increase to size=4.5 or 5 for better prominence
  - '3D rotation not supported: letsplot outputs a fixed-angle 2D projection; the
    spec asks interactive libraries to ''enable rotation to explore the surface from
    different angles'' — the HTML file has hover tooltips but no rotation (inherent
    letsplot limitation; acceptable but worth noting)'
  - 'DE-01 ceiling: the aesthetic is clean and above defaults but not yet FiveThirtyEight-level;
    could benefit from a subtle shading layer or vignette on the projection edges
    to strengthen perceived depth, or a brief subtitle note explaining the math function'
  - LM-02 distinctive features are present (layer_tooltips with custom .line() format,
    HTML export) but the core rendering technique (geom_polygon + painter's algorithm)
    is transferable to plotnine without modification — a more letsplot-native approach
    would push LM-02 higher
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — clearly visible as a cream surface, not pure white.
      Chrome: Title "surface-basic · python · letsplot · anyplot.ai" at top-left in dark ink (#1A1A17), occupying ~65% of plot width. Y-axis label "Z (height)" in dark ink, X-axis label "X (projected)" in dark ink. Tick labels in secondary ink (#4A4A44), ranging -1.5 to 1.5 on Y, -4 to 4 on X. All text readable against light background. Legend titled "Z Value" with color gradient strip on right side, legible.
      Data: 3D surface simulation of sin(x)*cos(y) via painter's algorithm. Blue (#4467A3) at peaks (z≈+1, upper-right), transitioning through off-white midpoint to matte-red (#AE3030) at valleys (z≈−1, front-left). Polygon edges rendered in #4A4A44 at size=0.15, providing subtle depth grid. Annotations "peak  z ≈ +1" and "valley  z ≈ −1" visible in dark ink.
      Legibility verdict: PASS — all text clearly readable; no light-on-light failures detected.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — clearly visible as a dark warm surface, not pure black.
      Chrome: Title in light cream (#F0EFE8), axis labels in light cream, tick labels in secondary light (#B8B7B0). Legend box styled with #242420 fill and #B8B7B0 border. Polygon edges rendered in #B8B7B0 (light in dark mode), providing visible depth grid. All chrome elements readable against dark background; no dark-on-dark text failures detected.
      Data: Identical data colors to light render — blue (#4467A3) at peaks, matte-red (#AE3030) at valleys. The theme-adaptive diverging midpoint shifts to #1A1A17, so mid-value polygons blend smoothly with the dark background (expected and correct imprint_div behavior). Annotations "peak  z ≈ +1" and "valley  z ≈ −1" visible in light cream ink.
      Legibility verdict: PASS — all text clearly readable; no dark-on-dark failures; data colors identical to light render.
