review:
  strengths:
  - Sophisticated manual isometric projection with painter's algorithm (back-to-front
    quad sort) — overcomes bokeh's lack of native 3D and produces a convincing terrain
    surface
  - Correct Imprint sequential colormap (green->blue) for single-polarity elevation;
    height AND color dual-encode elevation for strong depth perception
  - 'Exact 3200x1800 canvas in both themes; backgrounds (#FAF8F1 / #1A1A17) and all
    chrome tokens theme-correct, data colors identical across light/dark'
  - 'Clean frameless composition: axes hidden, no grid, subtle INK_SOFT mesh edges
    (line_alpha 0.22) that aid the read without competing with the fill'
  - Title exactly matches required format; colorbar with descriptive 'Elevation (m)'
    scale; floating x/y/z axis labels with units
  weaknesses:
  - '''Elevation (m)'' is labelled twice — once as the floating vertical axis label
    on the left and again as the colorbar title on the right — minor redundancy; consider
    relabelling the floating one or dropping the colorbar title'
  - No numeric tick values on the projected easting/northing axes, so absolute x/y
    positions can't be read from the surface (only the direction labels). Inherent
    to the manual projection; corner labels (e.g. 0 / 10 km) could add the scale
  - Floating axis-label positions are hardcoded relative to the projected data bounds
    — works correctly here but is fragile to data-range changes
  image_description: |-
