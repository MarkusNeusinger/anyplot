review:
  strengths:
  - Perfect spec compliance — all required features implemented correctly (two curves,
    color gradient, start/end markers, equal aspect ratio)
  - Viridis color gradient effectively conveys parameter progression and direction
    of traversal
  - Thoughtful marker design with distinct shapes (circle for start, diamond for end)
    and contrasting colors
  - Descriptive axis labels showing the actual parametric equations
  weaknesses:
  - Shared color scale compresses the Lissajous gradient to only the dark end of the
    viridis spectrum, losing color differentiation
  - Code duplication between the two curve sections (start/end marker + label construction
    repeated nearly identically)
  - Axis spines still visible — removing top/right spines would improve visual refinement
  - Legend title Parameter t slightly cut off at the edge
  image_description: The plot displays two parametric curves side by side using Altair's
    hconcat layout. The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a self-intersecting figure-eight-like shape filling the [-1, 1] range in both
    axes. The right panel shows an Archimedean spiral (x = t·cos(t), y = t·sin(t))
    spiraling outward from the origin. Both curves use a viridis color gradient mapped
    to the parameter t, with a shared color legend ("Parameter t") on the right side
    ranging from 0 to ~18. Start points are marked with blue filled circles labeled
    "t = 0" and end points with red diamonds labeled "t = 2π" / "t = 6π". Axis labels
    show the parametric equations (e.g., "x(t) = sin(3t)"). The main title reads "line-parametric
    · altair · pyplots.ai" in large font. Grid lines are very subtle (opacity 0.2),
    and view borders are removed. Because the color scale is shared, the Lissajous
    curve (t range 0–6.28) only uses the dark purple-blue portion of the viridis spectrum,
    reducing its color differentiation compared to the spiral (t range 0–18.85).
