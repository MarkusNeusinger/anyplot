review:
  strengths:
  - Full spec compliance - all required features present including equal aspect ratio,
    color gradient, two curve types, and start/end markers
  - Good use of Altair declarative composition (hconcat, layer composition, shared
    color scale)
  - Viridis colormap is an excellent choice for showing parameter progression
  - Start/end markers with different shapes (circle vs diamond) and distinct colors
    provide clear traversal direction
  - Deterministic, well-normalized data with appropriate mathematical examples
  weaknesses:
  - Curves appear dotted/stippled rather than smooth due to mark_circle rendering
    - mark_trail or mark_line would produce smoother curves
  - Start/end labels overlap with markers especially near the origin on the Lissajous
    figure
  - Code duplication between the two curve sections for start/end marker creation
  - Axis labels x(t)/y(t) are generic
  - Grid and axis styling could be further refined
  image_description: The plot displays two parametric curves side by side. The left
    panel shows a Lissajous figure (x = sin(3t), y = sin(2t)) rendered as small circular
    markers colored along the viridis gradient from dark purple (t=0) to yellow (t=2π).
    The classic self-intersecting figure-eight-like pattern is clearly visible spanning
    [-1, 1] on both axes. A blue circle marks t=0 near the origin and a red diamond
    marks t=2π, both with text labels. The right panel shows an Archimedean spiral
    (x = t·cos(t), y = t·sin(t)) with the same viridis color mapping from purple center
    (t=0) to yellow outer ring (t=6π). The spiral expands outward in approximately
    3 revolutions. Start/end markers are similarly placed. The overall title reads
    "line-parametric · altair · pyplots.ai" at the top. Both panels share a single
    color legend on the right labeled "Parameter t". Axes are labeled x(t) and y(t).
    Grid lines are very subtle. The curves appear as dotted rather than smooth lines
    due to the mark_circle rendering.
