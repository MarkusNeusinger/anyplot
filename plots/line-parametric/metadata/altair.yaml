  strengths:
  - 'Full spec compliance: both required curves, color gradient direction, start/end
    markers, equal aspect ratio'
  - Excellent use of Altair declarative grammar with layered composition and interactive
    selections
  - Viridis colormap provides strong colorblind-safe color encoding
  - Independent color scales per panel ensure full gradient range for each curve
  - All font sizes explicitly set for consistent readability
  weaknesses:
  - Function definition violates KISS flat-script structure
  - Interactive selection/highlight logic adds complexity with no benefit for PNG
    output
  - 'Design could be more polished: domain lines could be removed, spacing between
    panels optimized'
  image_description: The plot displays two side-by-side panels on a white background.
    The left panel shows a Lissajous figure (x=sin(3t), y=sin(2t)) — a complex self-intersecting
    curve with loops reaching ±1 on both axes. The right panel shows an Archimedean
    spiral (x=t·cos(t), y=t·sin(t)) expanding outward from the center. Both curves
    use the viridis colormap (dark purple → teal → yellow) to indicate the parameter
    t progression. Start points are marked with filled blue circles labeled "t = 0",
    end points with red diamonds labeled "t = 2π" and "t = 6π" respectively. Each
    panel has its own "Parameter t" color legend. The main title reads "line-parametric
    · altair · pyplots.ai" in large text at top. Axes are labeled "x(t)" and "y(t)"
    with subtle grid lines. Equal aspect ratio is maintained in both panels.
