review:
  strengths:
  - Creative per-point color gradient encoding traversal direction using Imprint palette
    colors (green to blue for Lissajous, lavender to ochre for spiral)
  - 'Both required curve types implemented: Lissajous 3:2 and Archimedean spiral'
  - Proper square canvas orientation for equal-aspect parametric curves
  - Full theme-adaptive chrome — background transparent, all labels use tok.ink/inkSoft
    tokens, identical data colors in light and dark
  - 'turboThreshold: 0 and enableMouseTracking: false show good Highcharts idiomatic
    awareness for dense data'
  - Descriptive subtitle explains gradient encoding; start and end markers annotate
    traversal direction
  - Clean deterministic code — pure trigonometric math, no randomness
  weaknesses:
  - Scatter dots (radius 3) with 900 points create a dotted/grainy curve appearance
    instead of smooth lines; the spec calls for smooth curves — consider increasing
    point density to 2000+ or reducing marker radius to 2 so dots pack more tightly
    and the visual reads as a continuous curve
  - 'The ''t = 4pi'' end-label at (1.0, 0) with x offset +5 sits very close to the
    right chart edge given the 40px CSS right margin; nudge the label left (x: -5,
    y: -18) or increase right margin to 60px to eliminate clipping risk'
  - Legend item names are very long ('Lissajous 3:2   x = sin(3t),  y = sin(2t)')
    and may wrap at small display widths — consider shortening to 'Lissajous (3:2)'
    and 'Archimedean Spiral'
  - Lissajous is a closed curve that ends at the same origin as t=0; adding a distinct
    end marker at t=2pi on the Lissajous (offset slightly) would fully satisfy the
    spec's 'label start and end points' for both curves
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — NOT pure white, correct.
      Chrome: Title "line-parametric · javascript · highcharts · anyplot.ai" in dark ink, clearly readable. Subtitle in softer dark tone, readable. Axis titles "x(t)" and "y(t)" in tok.inkSoft, readable. Tick labels at 14px, readable. Legend at bottom with two long series names, readable though tight. Data labels "t = 0" and "t = 4pi" visible.
      Data: Lissajous 3:2 rendered as scatter dots with a smooth green-to-blue gradient (brand green #009E73 at t=0 transitioning to blue #4467A3 at t=2pi). Archimedean spiral rendered similarly with lavender-to-ochre gradient. Both curves form recognizable shapes. Dotted reference lines at x=0 and y=0 (Dot dashStyle). Start marker (gray circle) at origin labeled "t = 0"; diamond end marker at (1.0, 0) labeled "t = 4pi".
      Legibility verdict: PASS — all text is readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — NOT pure black, correct.
      Chrome: Title in light ink (#F0EFE8 equivalent), clearly readable against dark background. Subtitle in lighter secondary color, readable. Axis titles and tick labels adapted to light-on-dark tokens — no dark-on-dark failures detected. Legend text readable.
      Data: Colors are IDENTICAL to the light render — same green-to-blue gradient on Lissajous, same lavender-to-ochre gradient on spiral. Brand green #009E73 clearly visible as start of Lissajous gradient. Markers and labels adapted correctly.
      Legibility verdict: PASS — all text readable against warm near-black background, no dark-on-dark failures.
