review:
  strengths:
  - 'Uses ECharts visualMap component with per-point dimension encoding (dimension:
    2) for a t-direction gradient — idiomatic and sophisticated'
  - Two-panel multi-grid layout shows Lissajous and Archimedean spiral side by side,
    each with correct equal aspect ratio
  - Imprint sequential colormap (t.seq) correctly applied for continuous direction
    encoding — data colors identical between light and dark
  - Mathematical formula annotations as subtitle components provide excellent context
    for each curve
  - Start/end markers using circle vs. diamond symbols clearly show traversal direction;
    caption explains the encoding
  - Deterministic in-memory data generation using pure math functions — no random
    state
  - 'All ANYPLOT_TOKENS used correctly: ink, inkSoft, grid, seq, palette; background
    transparent to inherit page background'
  weaknesses:
  - 'DE-02: Grid could be removed or further reduced — the smooth parametric curves
    are sufficiently prominent without a full X+Y grid on both panels; removing grid
    would add visual clarity'
  - 'VQ-02: The ''t = 0, 2π'' label at the Lissajous origin sits in the densest crossing
    area where multiple curve segments overlap — mild text-on-data overlap; consider
    positioning the label outside the curve at an offset'
  - 'DE-01: Annotation marker labels (t=0, t=4π) could be styled with a subtle background
    fill (elevatedBg token) for better legibility against dense curve data'
  - 'VQ-05: The header area (155px of 900px CSS height) is slightly generous — tightening
    top offsets would allow larger plot panels'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Title "line-parametric · javascript · echarts · anyplot.ai" bold dark (#1A1A17) centered at top (fontSize 22). Panel subtitles "Lissajous Figure / x = sin(3t) y = sin(2t)" and "Archimedean Spiral / x = t·cos(t) y = t·sin(t)" in inkSoft at fontSize 14 — clearly readable. Caption "Color encodes direction of increasing t" centered at fontSize 12 — readable. Axis labels x(t)/y(t) in inkSoft at fontSize 14. Tick labels at fontSize 12. All text reads well against the light background.
      Data: Left panel — Lissajous figure rendered as 1200 scatter points colored by Imprint sequential gradient (green #009E73 → blue #4467A3) encoding direction of increasing t. Green circle with dark border marks origin (start/end at t=0,2π). Right panel — Archimedean spiral with same gradient; green circle at origin (t=0), blue diamond at endpoint (t=4π). Both curves are smooth and well-defined. Grid lines subtle using t.grid color.
      Legibility verdict: PASS — all text clearly readable, no light-on-light issues, gradient direction encoding clearly visible

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface
      Chrome: Title, axis labels, panel subtitles, and caption all rendered in light colors and clearly readable against the dark background. No dark-on-dark failures. Grid lines adapt to the lighter theme-grid token and remain subtle but visible. Axis lines and tick-label colors use inkSoft token correctly.
      Data: Data colors are identical to the light render — the green-to-blue Imprint sequential gradient is theme-independent as required. Both Lissajous and spiral curves show the same color progression. Start and end markers retain their colors. No color drift between themes.
      Legibility verdict: PASS — all text readable on dark background, no dark-on-dark failures, data colors correctly theme-invariant
