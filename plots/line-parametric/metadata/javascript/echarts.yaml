review:
  strengths:
  - Dual-panel ECharts layout with independent multi-grid and axis pairs is architecturally
    clean and demonstrates strong library mastery
  - Gradient color encoding (cool to warm along t) satisfies the spec direction requirement
    and is visually effective in both themes
  - Start and end markers with inline labels precisely communicate closed-curve and
    traversal properties for both curves
  - Both panels achieve equal aspect ratio via matching grid dimensions and axis ranges
    (-1.2 to 1.2 and -14 to 14)
  - Deterministic data generation with no external dependencies; all ECharts API usage
    is correct and idiomatic
  - Dark theme adaptation is complete and correct with no dark-on-dark text failures
  weaknesses:
  - Scatter series with symbolSize 4 creates a dotted/perforated curve appearance
    rather than a smooth continuous parametric line; consider line series with visualMap
    using t.seq, or increase symbolSize to 6-8 and reduce point count to 400-600 for
    tighter spacing
  - 'Gradient coloring built via custom lerpHex() interpolation between categorical
    palette members instead of using t.seq from ANYPLOT_TOKENS; replace with visualMap
    using inRange: { color: t.seq } on a line series'
  - 'No gradient-direction annotation or legend explaining that color encodes direction
    of increasing t (e.g., subtitle line: Color encodes direction: cool to warm as
    t increases)'
  - Subtitle text at 13px CSS and tick labels at 11px CSS are slightly small; increase
    to fontSize 14 and 12 respectively for better readability at canvas scale
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface
      Chrome: Title "line-parametric · javascript · echarts · anyplot.ai" in bold dark text, centered at top — fully readable. Subtitle labels for each panel ("Lissajous Figure / x=sin(3t) y=sin(2t)" and "Archimedean Spiral / x=t·cos(t) y=t·sin(t)") in secondary ink color — readable. Axis labels x(t) and y(t) in soft ink color on both panels — readable. Tick labels (−1.2 to 1.2, −14 to 14) in soft ink — readable though slightly small at 11px CSS.
      Data: Left panel — Lissajous figure with gradient from brand green #009E73 (t=0, cool) to ochre #BD8233 (t=2π, warm), 1200 scatter points creating a dotted curve appearance. Right panel — Archimedean spiral with gradient from blue #4467A3 (t=0) to lavender #C475FD (t=4π). Start markers (circles) and end markers (diamond for spiral) with inline text labels clearly visible.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black warm dark #1A1A17 — correct dark surface, not pure black.
      Chrome: Title and panel subtitles render in light cream text — clearly readable against dark background. Axis labels and tick labels use the soft cream token (inkSoft in dark mode) — all readable. Grid lines are subtle low-opacity light lines. No dark-on-dark failures observed.
      Data: Gradient colors identical to light render — brand green→ochre for Lissajous, blue→lavender for spiral. The gradient colors pop strongly against the dark background, providing excellent contrast. Start/end markers with labels remain fully visible.
      Legibility verdict: PASS — all text readable against dark background; chrome correctly flips to light; data colors unchanged between themes.
