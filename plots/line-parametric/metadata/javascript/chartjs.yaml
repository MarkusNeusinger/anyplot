review:
  strengths:
  - Per-segment color gradient using Chart.js 4.x segment callback — a sophisticated
    and idiomatic use of the Chart.js API for continuous direction encoding
  - Custom lShapePlugin removes top/right spines cleanly via canvas overdraw — idiomatic
    Chart.js plugin extension pattern
  - Imprint sequential palette (t.seq[0]→t.seq[1]) applied correctly for continuous
    color encoding; theme-adaptive chrome flips perfectly in both renders
  - Both Lissajous and Archimedean spiral are implemented with correct math, 600-point
    density, and proper parameter ranges
  - Direction encoding is explained clearly in the custom DOM-based legend (gradient
    swatch + t=0/t=T dot markers)
  - All font sizes explicitly set across all layers (outer title 22px, panel title
    16px, axis labels 14px, ticks 13px, legend 14px) with good visual proportions
  weaknesses:
  - True equal aspect ratio is not precisely enforced — Chart.js lacks a native aspect-ratio-lock
    option; using a 700×700px container + equal axis ranges approximates it, but axis
    label/tick regions consume differing widths/heights causing slight pixel-level
    distortion of the geometric curves
  - Design storytelling (DE-03) could be elevated by adding one or two mathematical
    annotations, e.g., annotating the 3:2 frequency ratio relationship on the Lissajous
    panel or labelling specific revolutions on the spiral
  - 'DE-02 visual refinement is good but not fully polished: the Chart.js layout padding
    (12px) plus the 40px horizontal container padding produce non-symmetric effective
    whitespace between the two panels and the outer edge'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) filling the entire canvas — correct light theme surface.
      Chrome: Main title "line-parametric · javascript · chartjs · anyplot.ai" rendered in dark ink at 22px bold across ~50% of the canvas width — clearly readable. Each panel has a subtitle title ("Lissajous — x = sin(3t + π/4), y = sin(2t)" and "Archimedean Spiral — 3 revolutions") in dark ink at 16px. Axis labels "x(t)" and "y(t)" in dark ink at 14px. Tick labels at 13px in secondary ink (#4A4A44 equivalent). Grid lines are subtle. Bottom legend shows a teal-to-blue gradient swatch with t=0 (teal dot) and t=T (blue dot) labels in secondary ink.
      Data: Two panels side by side. Left panel: Lissajous figure with a colour gradient from teal/green (#009E73) at t=0 to blue (#4467A3) at t=T, with a teal dot marking the start and a blue dot marking the end. Right panel: Archimedean spiral with the same directional gradient; 3 concentric revolutions visible with the blue end point at approximately (1, 0). L-shaped axes (top/right spines removed via plugin).
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background; no "light on light" issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) filling the entire canvas — correct dark theme surface.
      Chrome: Main title and panel subtitles rendered in light cream text — clearly readable against the dark background. Tick labels and axis labels in secondary light ink. Bottom legend text in secondary light ink. Grid lines are subtle (lighter semi-transparent strokes). No dark-on-dark failures observed.
      Data: Identical teal-to-blue gradient on both curves — data colors match the light render exactly (only chrome flipped). The teal (#009E73) start dots and blue (#4467A3) end dots are clearly visible on the dark surface. L-shaped axes maintained. The overall chart is readable and visually consistent with the light render.
      Legibility verdict: PASS — all text uses theme-adaptive light tokens; no "dark on dark" failures; brand green #009E73 is distinctly visible on the dark background.
