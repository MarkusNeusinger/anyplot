      Data: gradient from #009E73 (brand green, t=0 start) to #4467A3 (Imprint blue, t=T end) along both curves; Lissajous left panel shows classic self-intersecting figure-8 shape; spiral right panel shows 3 expanding revolutions; start dot (green) and end dot (blue) mark traversal endpoints; rectangular chart borders visible on all four sides of both panels
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light failures

