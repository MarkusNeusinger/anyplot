review:
  strengths:
  - Per-segment gradient coloring along parametric curves using Chart.js 4's `segment.borderColor`
    callback elegantly encodes the direction of parameter traversal
  - 'Perfect spec compliance: two required curves (Lissajous figure + Archimedean
    spiral), gradient direction encoding, start/end markers, and sufficient point
    density (600 pts)'
  - Custom HTML direction legend with gradient bar and color-coded start/end dots
    clearly communicates what the gradient encodes
  - Both themes correctly implemented — theme-adaptive chrome via t.ink, t.inkSoft,
    t.grid, t.pageBg tokens; data colors (imprint_seq green→blue) are identical across
    themes
  - Equal axis ranges on both panels enforce equal aspect ratio, preventing geometric
    distortion of the parametric curves as required by spec
  weaknesses:
  - 'Both chart panels have visible rectangular borders on all four sides (Chart.js
    scatter default). Style guide requires removing top and right spines to produce
    an L-shaped frame. Fix: set `border: { color: ''transparent'' }` on top/right
    scale borders or `drawBorder: false` where supported, to remove the rectangular
    box look from both panels.'
  - 'Four helper functions defined (hexToRgb, lerpColor, makeCurve, buildPanel) violate
    KISS structure. The gradient color interpolation and dual-panel construction add
    code complexity. Fix: inline the curve generation arrays directly; if lerpColor
    is retained, merge hexToRgb into it as a one-liner.'
  - Panel subtitle font size (15px CSS) is slightly small relative to the 3200×1800
    output canvas — increase to 16-17px for better readability at full resolution
    and when scaled to mobile widths.
  - Design sophistication is limited by the conventional two-panel layout with visible
    chart borders; removing the chart area box frames would elevate DE-02 from 3 to
    4-5.
  image_description: |-
