review:
  strengths:
  - 'Excellent spec compliance: all required features (two curves, direction gradient,
    start/end dots, direction chevrons, color legend) present and working.'
  - Intelligent use of Imprint sequential colormap (tok.seq) for direction encoding
    — green-to-blue gradient elegantly communicates traversal direction.
  - Both themes render correctly with zero legibility failures; all chrome is properly
    theme-adaptive using ANYPLOT_TOKENS.
  - Square two-panel layout respects equal aspect ratio requirement and provides clear
    visual comparison between curve types.
  - Formula subtitles add mathematical context without cluttering the panels.
  weaknesses:
  - Axis labels are generic "x" and "y" — change to "x(t)" and "y(t)" to score VQ-06
    >= 1 (currently 0/2 per scoring rubric).
  - Legend and direction text at 12px is slightly small; increase to 13-14px for mobile
    readability.
  - Curve drawn as 800 individual <line> SVG elements — refactor to use d3.line()
    path generator with one path element per segment via data binding for idiomatic
    D3 (improves LM-01).
  - drawPanel() helper function departs from the KISS flat-structure criteria — consider
    inlining or restructuring.
  - 'Typography hierarchy could be more intentional: formula subtitle competes visually
    with panel title in weight; use lighter weight or italic style for better hierarchy
    (DE-01 push toward 6).'
  image_description: |-
