review:
  strengths:
  - Two-panel layout with equal aspect-ratio panels cleanly isolates Lissajous and
    Archimedean spiral for easy comparison
  - Imprint sequential colormap (tok.seq via d3.interpolateRgbBasis) correctly encodes
    t-direction along each curve — color is identical between light and dark themes
  - Direction chevron at ~30% traversal plus start/end dot markers satisfy the spec's
    direction-labeling requirement with elegant SVG primitives
  - Smart end-dot suppression (distSE > 8 check) avoids drawing a redundant dot on
    the closed Lissajous curve
  - 'Full theme-adaptive chrome: tok.ink for title, tok.inkSoft for labels/ticks/formulas,
    tok.grid for gridlines, tok.pageBg for dot stroke — both renders pass the readability
    check'
  - Gradient legend bar built from SVG defs linearGradient is genuinely D3-idiomatic;
    d3.pairs() for per-segment coloring is a characteristic D3 pattern not easily
    replicated in other libraries
  weaknesses:
  - Axis label and tick text set to 13px; the D3 style guide recommends 14px for ticks
    and axis labels on the 1600×900 CSS mount — increase to 14px for both
  - drawPanel() helper function deviates from the KISS no-functions guideline; consider
    inlining the two panel draws or accepting the minor CQ-01 deduction
  - 'DE-01: the design is clean but relies largely on spec-mandated elements (gradient
    color, two panels) rather than original aesthetic choices — consider a thin outer
    panel border or subtle background tint to add polished framing'
  - 'DE-02: axis domain lines are kept at full ink-soft opacity on both panels; softening
    them slightly (lower opacity, or removing the horizontal domain on the y-axis)
    would add refinement'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface.
      Chrome: Main title "line-parametric · javascript · d3 · anyplot.ai" at top in dark ink, clearly readable. Panel titles "Lissajous Figure" and "Archimedean Spiral" in bold dark ink above each panel, with italic formula subtitles in inkSoft below them. Tick labels and axis labels "x(t)" / "y(t)" in inkSoft — all legible. Subtle gridlines in both panels.
      Data: Left panel shows a Lissajous figure (x=sin(3t), y=sin(2t)) tracing a figure-eight-like closed curve; right panel shows an Archimedean spiral expanding outward. Both curves use the Imprint sequential colormap (tok.seq: green #009E73 at t=0 → blue #4467A3 at t=max). Direction chevron visible at ~30% along each curve. Start dot (green) visible at curve origin; end dot (blue) visible at spiral endpoint only (Lissajous is closed — correct suppression). Gradient legend bar at bottom with "t = 0 (start)" / "t = max (end)" labels.
      Legibility verdict: PASS — all text readable, no overlap, no clipping.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title, panel titles, formula subtitles, axis labels, tick labels, and legend text all render in light ink / inkSoft tones — clearly readable against the dark background. No dark-on-dark failures observed. Grid lines visible but subtle.
      Data: Curve colors are identical to the light render — same green-to-blue Imprint sequential gradient. Start/end dots and direction chevrons are unchanged. Legend gradient bar is identical.
      Legibility verdict: PASS — both themes render correctly with full theme-adaptive chrome. No readability failures.
