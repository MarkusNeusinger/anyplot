      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white.
      Chrome: Main title "line-parametric · javascript · d3 · anyplot.ai" at 22px bold — dark text, clearly readable. Panel titles "Lissajous Figure" and "Archimedean Spiral" at 17px bold — readable. Formula subtitles at 13px — readable. Tick labels at 13px — readable. Axis labels "x" and "y" at 13px — readable but generic. Legend text at 12px — slightly small but readable.
      Data: Curves use Imprint sequential colormap (tok.seq: green #009E73 → blue #4467A3) encoding direction of parameter t. Color gradient is visually distinct and smooth across 800 segments. Start dot (green #009E73) clearly visible; end dot (blue) visible on spiral only (Lissajous is closed). Direction chevron arrows visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface, not pure black.
      Chrome: Title, panel titles, formula subtitles, tick labels, axis labels, and legend text all render in light colors (tok.ink = #F0EFE8, tok.inkSoft = #B8B7B0) — no dark-on-dark failures. Grid lines are subtle on dark background.
      Data: Curve colors (green-to-blue gradient) are visually identical to the light render — only chrome has adapted to dark mode. Start/end dots retain their color-mapped fills with tok.pageBg (#1A1A17) borders that adapt correctly. Gradient legend bar identical to light render.
