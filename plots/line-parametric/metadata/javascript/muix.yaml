review:
  strengths:
  - 'Imprint sequential palette (#009E73 → #4467A3) correctly applied as a traversal-direction
    gradient — matches imprint_seq spec exactly'
  - Both Lissajous figure and Archimedean spiral implemented with correct mathematical
    formulas and 800 points each
  - Explanatory caption 'Color encodes direction of traversal — green (t = start)
    → blue (t = end)' clearly communicates the encoding
  - Fully deterministic, all font sizes explicitly set via token variables, ThemeProvider
    correctly handles theme-adaptive chrome
  - Clean two-panel layout with informative per-panel subtitles including equations
  - skipAnimation correctly set, all imports used, MUI X community surface only —
    no Pro/Premium imports
  weaknesses:
  - Spiral subtitle says 't ∈ [0, 4π]' but code computes t = (i / (N-1)) * 4 * PI2
    where PI2 = 2π, giving t ∈ [0, 8π ≈ 25.1] — fix by changing 4 * PI2 to 2 * PI2
    to match the label, or update the subtitle to say 't ∈ [0, 8π]'
  - Equal aspect ratio not enforced on the Lissajous panel — spec explicitly requires
    'equal aspect ratio to prevent geometric distortion of the curves'; MUI X ScatterChart
    supports this via the xAxis/yAxis configuration or by forcing equal pixel height/width
    on the container
  - Subtitle text (fontSize 12px CSS) and bottom caption (fontSize 11px CSS) are below
    the style-guide recommendation of ~14px for secondary text — increase subtitle
    to 13–14px and caption to 12–13px for better mobile legibility
  - Outer arms of the spiral have visibly wider dot spacing due to the spiral expanding
    — consider either increasing point density to N=1200–1500 or reducing marker size
    in the inner dense region to smooth the visual gap in outer rings
  - 'DE-02: grid lines are default MUI X (no customization); consider reducing grid
    opacity further or limiting to x=0/y=0 reference lines only for a cleaner parametric
    curve display'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correctly applied.
      Chrome: Title "line-parametric · javascript · muix · anyplot.ai" at center top in dark ink, readable. Per-panel subtitles with equations in inkSoft gray, legible but small (12px CSS). Axis labels x(t)/y(t) in dark ink, tick labels in gray — all readable. Bottom caption in small gray text, just readable at full resolution.
      Data: Left panel (Lissajous figure) shows closely-spaced scatter dots forming a figure-8 curve, gradient from brand green (#009E73) at t=0 through teal to blue (#4467A3) at t=2π. Right panel (Archimedean spiral) shows same green→blue gradient with outer arms showing wider dot spacing.
      Legibility verdict: PASS — all text readable against light background; minor concern for subtitle/caption at mobile scale.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly applied.
      Chrome: Title, axis labels, and tick labels all render in light colors (ink tokens flip correctly via ThemeProvider). No dark-on-dark text issues observed. Grid lines are subtle against the dark surface.
      Data: Colors are identical to light render — green→blue gradient unchanged (Imprint data colors are theme-independent). Both curves clearly distinguishable against the dark background.
      Legibility verdict: PASS — all text readable against dark background; ThemeProvider handles chrome adaptation correctly.
