review:
  strengths:
  - 'Full spec compliance: both required curves, equal aspect, color gradients, start/end
    markers all present'
  - Good color choices with viridis and plasma colormaps — colorblind-safe and visually
    distinct between panels
  - Clean code structure with explicit font sizes and thoughtful styling (despine,
    reduced grid alpha, white edgecolor on markers)
  - Deterministic data generation with sufficient point density (1000 points)
  weaknesses:
  - Scatter-based curve rendering creates visible beading at intersections and curve
    extremes — a line-based approach would produce smoother curves
  - Spiral end marker crowds the colorbar on the right panel — needs padding or repositioning
  - Code duplication in marker plotting (6 near-identical scatterplot calls for start/end
    markers across two panels)
  - Axis labels x(t)/y(t) are minimal — could be more descriptive
  - 'Library mastery could be stronger: using scatterplot for continuous curves is
    not idiomatic'
  image_description: 'The plot displays two side-by-side parametric curves with the
    suptitle "line-parametric · seaborn · pyplots.ai" centered at the top. Left panel:
    A Lissajous figure (x = sin(3t), y = sin(2t)) rendered as a scatter-based curve
    colored by the viridis colormap, transitioning from dark purple (t=0) through
    teal/green to yellow (t≈2π). A blue circle marks the start point at the origin
    and a red square marks the end point. A vertical colorbar labeled "Parameter t"
    (range 0–~6.3) sits to the right. Axes labeled x(t) and y(t), equal aspect ratio,
    top/right spines removed, subtle grid. Right panel: An Archimedean spiral (x =
    t·cos(t), y = t·sin(t)) colored by the plasma colormap from dark purple through
    pink/orange to yellow. The spiral expands outward; blue circle at the origin (start),
    red square at the far right edge near (12.6, 0) (end). Colorbar labeled "Parameter
    t" (range 0–~12.6). The end marker appears very close to the colorbar, creating
    slight visual congestion. Both panels have legends identifying start/end markers.'
