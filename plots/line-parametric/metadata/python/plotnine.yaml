      Data: Gradient colors are identical to the light render — brand green → teal → blue along the parametric path; the two-color transition is equally visible on the dark surface. Start/End markers identical in color (green circle, red diamond). Colorbar still clearly readable.
      Legibility verdict: PASS — both chrome and data are readable in the dark render. Brand green #009E73 visible on dark background. No dark-on-dark failures.
