review:
  strengths:
  - Imprint sequential colormap (green→blue) mapped to normalized parameter t creates
    an elegant, mathematically meaningful direction cue along the path
  - Dual-marker system (circle=Start, diamond=End) with redundant shape+color encoding
    provides clear traversal direction beyond just the gradient
  - facet_wrap with equations in panel titles ('x = sin(3t), y = sin(2t)') adds educational
    value and immediately communicates the mathematical context
  - coord_equal() correctly prevents geometric distortion of the closed Lissajous
    figure and the expanding spiral
  - theme_void() base plus manually re-added subtle grid (alpha=0.15) achieves a clean
    look without losing spatial reference
  - 'Theme-adaptive chrome is correctly implemented in both renders: INK / INK_SOFT
    tokens thread through all text, strips, legend, and backgrounds'
  - Code is clean, linear KISS structure — no functions or classes, fully deterministic
    (linspace only), idiomatic plotnine grammar composition
  - guide_colorbar(nbin=200) produces a smooth color bar rather than a banded one,
    matching the continuous nature of the gradient
  weaknesses:
  - In the Lissajous panel, the Start (t=0) and End (t=tmax) markers both land at
    (0,0) since the Lissajous figure is a closed curve — the two markers stack on
    each other, making the direction cue at that panel slightly ambiguous (the gradient
    colorbar compensates, but the marker overlap is visually inelegant)
  - 'DE-01 moderate: design is strong and clearly above library defaults, but stops
    short of publication-ready polish — lacks any emphasis element (annotation, highlighted
    feature curve, or reference line) that would give a viewer a clear focal point
    beyond ''here are two parametric curves'''
  - 'LM-02 moderate: uses faceting, coord_equal, and guide ordering (all good plotnine
    features), but the visualization could demonstrate a more distinctively grammar-of-graphics
    technique such as stat_function for curve generation or aes(group=) without explicit
    faceting for overlay comparison'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "line-parametric · python · plotnine · anyplot.ai" in bold dark ink, clearly readable at ~70% canvas width. Axis titles "Horizontal Position x(t)" and "Vertical Position y(t)" in dark ink at appropriate 10pt. Tick labels (-1.0, -0.5, 0.0, 0.5, 1.0) in slightly softer dark ink. Strip labels ("Lissajous · x = sin(3t), y = sin(2t)" and "Spiral · x = t·cos(t), y = t·sin(t)") in bold dark ink on slightly elevated warm-white strip background. All text clearly readable.
      Data: Two facet panels — left shows a Lissajous (3:2) figure (figure-8 with two inner loops), right shows an Archimedean spiral expanding outward. Both curves colored with the imprint_seq gradient (brand green #009E73 at t=0 → medium teal → slate blue #4467A3 at tmax). Green circle markers for Start (t=0) and red diamond markers for End (t=tmax). In the Lissajous panel both markers land at (0,0) and overlap. In the spiral panel, the green circle is near the spiral origin and the red diamond marks the outer endpoint at approximately (1.0, 0). Colorbar on the right with labels 0, ¼, ½, ¾, tmax. Subtle grid lines visible.
      Legibility verdict: PASS — all text, tick labels, legend, and data clearly readable against light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
