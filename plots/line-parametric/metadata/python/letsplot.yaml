    imports, correct plot-{THEME}.png + .html output'
  - 'Strong data storytelling: gradient color shows parameter direction, shape-differentiated
    markers (circle=start, triangle=end), descriptive subplot subtitles (closed vs
    expanding outward)'
  - 'Both renders pass theme-readability: warm off-white #FAF8F1 background in light,
