review:
  strengths:
  - Correct Imprint palette in full canonical order across all 8 series; perfect theme-adaptive
    chrome in both renders.
  - Creative use of 4-colour-segment encoding to show the direction of parametric
    traversal — a genuine storytelling technique.
  - 'Perfect code quality: deterministic, KISS structure, clean imports, correct output
    filenames.'
  - Square canvas chosen correctly for a symmetric parametric plot; balanced margins
    and readable legend layout.
  weaknesses:
  - Missing the spiral curve required by spec (x = t·cos(t), y = t·sin(t)). Replace
    the rose curve with the spiral, or add it as a third curve. Normalise spiral coordinates
    to [-1,1] by dividing by (2π) so it fits the same axis range.
  - No explicit start/end point markers for traversal direction. Add a filled dot
    marker at t=0 (start) and a different marker or small arrow annotation at t=2π
    (end) for each curve.
  - '8 colour-only series at CVD discrimination floor — add secondary encoding: use
    dashed lines (stroke_style={"dasharray": "10, 5"}) for one curve family to provide
    non-colour disambiguation.'
  image_description: |-
