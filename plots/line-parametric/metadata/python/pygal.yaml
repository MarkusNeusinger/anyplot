review:
  strengths:
  - 'Imprint palette applied correctly in canonical order across all 8 series with
    #009E73 as first series'
  - Clever traversal-direction encoding via color-coded segments (4 colours per curve,
    cool-to-warm progression)
  - Solid vs. dashed line styles provide redundant encoding to disambiguate the two
    curve families
  - Both light (#FAF8F1) and dark (#1A1A17) backgrounds are theme-correct and all
    chrome is fully theme-adaptive
  - All font sizes are explicitly set to style-guide values (title=66, labels=56,
    ticks=44, legend=44)
  - Code is clean KISS structure with idiomatic pygal XY usage and proper themed output
    files
  - Start/end traversal markers add directional context beyond colour alone
  - Deterministic mathematical data requires no random seed
  weaknesses:
  - Asymmetric margins (margin_top=60, margin_bottom=440, margin_left=80, margin_right=60)
    on a square canvas cause the plot area to be non-square (~2260×1900 px), distorting
    the parametric curves — the Lissajous and spiral both appear slightly squished
    vertically. Equal aspect ratio requires equal pixel extent in x and y; fix by
    either (a) reducing margin_bottom closer to the space actually needed by the legend,
    (b) computing legend height and adjusting top margin to compensate, or (c) accepting
    a landscape canvas (3200×1800) and using more of the horizontal space
  - Start/end traversal markers (the ● and ◆ series) render as the default pygal dot
    size which is quite small relative to the thick curve lines (stroke_width=10).
    They are technically visible but lack emphasis — consider using a larger explicit
    dot size or separate annotation to make them stand out as directional anchors
  - 'DE-02 visual refinement is limited by pygal defaults: the box frame (4 spines)
    and dot-grid pattern are stock pygal chrome. Consider reducing the grid to horizontal
    lines only (show_x_guides=False, show_y_guides=True) or tweaking foreground_subtle
    opacity to make the grid more subtle'
  - 'VQ-04 concern: with 8 categorical colours all visible simultaneously on one chart,
    CVD discrimination is near its floor (ΔE_CVD ≈ 8.81 at n=8). The solid/dashed
    family distinction helps, but within each 4-segment family colour is the only
    discriminator. A legend note or direct label would reduce CVD reliance'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "line-parametric · python · pygal · anyplot.ai" in dark ink at top — readable, occupies ~55% of width at the correct fontsize=66. Y-axis label "Vertical Position y(t)" and X-axis label "Horizontal Position x(t)" are clearly visible in dark ink. Tick labels (-1.2 to 1.2 on both axes) are legible at major_label_font_size=44. Grid is a subtle dot-grid pattern on warm-off-white.
      Data: Two parametric curves plotted. First Lissajous segment is brand green (#009E73) — correct. Remaining Lissajous segments progress through lavender (#C475FD), blue (#4467A3), ochre (#BD8233). Spiral segments use red (#AE3030), cyan (#2ABCCD), rose (#954477), lime (#99B314). Lissajous uses solid lines; spiral uses dashed lines — good redundant encoding. Small dot markers visible near origin (Start) and at ~(1,0) (Spiral end). Legend at bottom in 2-column layout, all labels readable.
      Legibility verdict: PASS — all text readable against light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and axis labels rendered in light ink (#F0EFE8) — clearly visible on dark background. Tick labels are light-coloured and readable. Grid lines are subtly visible. Legend text is light on dark — readable.
      Data: All 8 data colours are identical to the light render — green, lavender, blue, ochre (Lissajous), red, cyan, rose, lime (spiral). Solid vs dashed distinction is maintained. No dark-on-dark text issues observed; all labels flip correctly to light chrome.
      Legibility verdict: PASS — all text is readable against the dark background; brand green #009E73 remains clearly visible; no dark-on-dark failures detected.
