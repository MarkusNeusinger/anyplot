      Data: Two parametric curves — Lissajous (3,2) in 4 segments using Imprint palette positions 1-4 (brand green #009E73, lavender, blue, ochre); four-petal rose curve in 4 segments using positions 5-8 (matte red, cyan, rose, lime). First series is #009E73 ✓. Subtle grid lines on warm background. Stroke width clearly visible.
