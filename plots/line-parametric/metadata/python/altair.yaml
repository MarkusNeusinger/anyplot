review:
  strengths:
  - Correct parametric curve plot type with both a Lissajous figure and an Archimedean
    spiral, satisfying all spec requirements
  - Green-to-blue Imprint sequential gradient (imprint_seq) elegantly encodes traversal
    direction as the spec mandates
  - Distinctive start (ochre circle) and end (red triangle) markers with color-coded
    labels clearly annotate direction
  - 'Both themes render correctly: warm off-white (#FAF8F1) light background, warm
    near-black (#1A1A17) dark background with properly adaptive chrome'
  - 'Clever Altair-specific technique: invisible dummy chart carries the gradient
    legend while layered mark_line segments simulate continuous gradient'
  - 'Subtitle ''Color gradient encodes traversal direction: start (green) → end (blue)''
    aids data storytelling'
  - resolve_scale(color='independent') correctly gives each panel its own color domain
  - Fully deterministic data (mathematical functions), all imports used, correct output
    files (light/dark PNG + HTML)
  weaknesses:
  - 'Segment-break artifact: 30 segments is too few — visible gaps between segment
    endpoints make the curves appear dashed rather than solid. Increase N_SEG to 80–120
    to close the gaps without changing the gradient approach.'
  - 'CQ-01 complexity: the panel_configs dict + outer loop + inner N_SEG loop nests
    three levels of iteration. Consider flattening or simplifying the panel config
    structure.'
  - 'DE-01: segment artifact prevents publication-ready status. Increasing N_SEG is
    the primary fix; the rest of the aesthetic design is strong.'
  - Dashed grid (gridDash=[3,3]) visually overlaps with the segment-break dashes on
    the curves, creating confusing similarity between grid lines and data lines. Switch
    to solid grid lines (remove gridDash) at gridOpacity=0.10 to distinguish them
    from the gradient curve segments.
