review:
  strengths:
  - Creative 100-segment gradient workaround for Vega-Lite path gradient limitation
    with smooth rendering
  - Both themes render correctly with full chrome token adaptation — no dark-on-dark
    or light-on-light failures
  - Invisible dummy chart for gradient legend binding is an elegant Altair-specific
    pattern
  - Start/end markers use semantically appropriate Imprint palette colors (ochre=start,
    matte red=end)
  - Two contrasting curve types (closed Lissajous + open spiral) with equation annotations
    in panel titles
  weaknesses:
  - Panel aspect ratio is not 1:1 — width=270 vs height=300 produces ~11% vertical
    elongation; set width=300 to match height=300 for equal aspect ratio as required
    by spec
  - Helper function build_gradient_segments technically violates no-functions KISS
    rule; could be inlined as a list comprehension
  - Only two curve types shown; spec mentions cardioids/cycloids/epicycloids as potential
    additional examples
  - Start/end annotation labels at (0,0) on Lissajous panel are tightly stacked —
    increase dy offsets to ±25 for better readability at smaller sizes
