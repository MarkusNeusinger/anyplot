review:
  strengths:
  - Excellent use of Bokeh's multi_line with per-segment gradient coloring — beautifully
    visualizes parameter direction of traversal along both curves
  - Both spec-required curve types present (Lissajous figure and Archimedean spiral)
    in a clean gridplot dual-panel layout
  - 'Imprint sequential colormap (green #009E73 → blue #4467A3) correctly applied
    to continuous parameter t data with matching ColorBar'
  - Fully theme-adaptive chrome — light and dark renders both look professional with
    no dark-on-dark or light-on-light failures
  - Clear start/end markers (circle at t=0, square at t end) with legend and colorbars
    provide full quantitative context
  - Equal aspect ratio (match_aspect=True) correctly applied to prevent geometric
    distortion of both curve types
  weaknesses:
  - Helper functions _lerp_hex and make_segment_source deviate from KISS no-functions
    guideline; the lerp logic could be inlined and make_segment_source unrolled for
    the two panels
  - Font sizes are below style guide defaults (title 36pt vs 50pt, axis labels 32pt
    vs 42pt, tick labels 26pt vs 34pt) — while partially justified by the dual-panel
    layout, the sizes are still noticeably small
  - 'DE-02: Axis lines (spines) are still rendered on all four sides rather than an
    L-shape; removing top and right axis lines would improve visual refinement'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white ~#FAF8F1 — correct, not pure white
      Chrome: Title "line-parametric · python · bokeh · anyplot.ai" visible in dark ink at top of left panel; "Archimedean Spiral · line-parametric · python · bokeh · anyplot.ai" at top of right panel — both readable. Axis labels in italic dark ink (x(t)=sin(3t), y(t)=sin(2t), x(t)=t·cos(t), y(t)=t·sin(t)) clearly readable. Tick labels in soft dark color (#4A4A44) readable. Colorbars with "t (rad)" label present on right side of each panel.
      Data: Lissajous figure in left panel with green-to-blue gradient along the 1000-segment curve; Archimedean spiral in right panel with same gradient. Green circle (#009E73) at start, blue square (#4467A3) at end. Line width 9 makes gradient clearly visible.
      Legibility verdict: PASS — all text elements readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black ~#1A1A17 — correct, not pure black
      Chrome: Title and axis labels in light cream (#F0EFE8) clearly visible against dark background. Tick labels in soft light color (#B8B7B0) readable. No dark-on-dark text failures. Legend and colorbar frames properly themed.
      Data: Gradient curve colors are identical to light render (green #009E73 → blue #4467A3) — only chrome flipped. Curves clearly distinguishable against dark background.
      Legibility verdict: PASS — all text elements readable against warm near-black background
