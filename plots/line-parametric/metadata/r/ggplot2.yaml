review:
  strengths:
  - Uses geom_path() (not geom_line) — the critical ggplot2 distinction for parametric
    curves where drawing order must follow the parameter, not sorted x values
  - imprint_seq gradient (green→blue) is perfectly applied as scale_color_gradient
    for continuous parameter visualization
  - start/end markers with distinct shapes (circle vs square) plus a caption legend
    elegantly communicate traversal direction without annotations
  - facet_wrap(~curve, scales='free') + aspect.ratio=1 correctly gives each curve
    its own square coordinate space
  - adjustcolor(INK, alpha.f=0.12) for grid lines is an idiomatic R approach to subtle,
    theme-adaptive grids
  - Theme tokens fully wired — all chrome (background, text, grid, legend, strip)
    adapts correctly between light and dark renders
  - Both curve types (closed Lissajous + open spiral) strongly contrast each other,
    covering the full specification requirement
  weaknesses:
  - linewidth=0.9 is marginally below the canonical 1.0 starting value — curves are
    clear but could carry slightly more visual weight on a 3200×1800 canvas
  - 'DE-01: Design polish is good but not exceptional — the gradient and markers are
    effective, but typographic hierarchy and overall layout could be pushed further
    toward publication quality'
  - 'DE-02: Minor grid removal and subtle alpha=0.12 grid are well done, but whitespace
    margins could be slightly more generous to give the facets more breathing room'
  - 'LM-02: geom_path and facet_wrap are strong ggplot2 idioms, but no truly distinctive
    ggplot2-only feature (e.g. coord_fixed, stat_function, or custom coord transformation)
    is leveraged'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct, clearly not pure white
      Chrome: title "line-parametric · r · ggplot2 · anyplot.ai" in dark ink at top-left, readable; facet labels "Lissajous (3:2)" and "Archimedean Spiral" in bold dark ink above each panel; axis labels "x(t)" / "y(t)" in dark ink at appropriate size; tick labels in INK_SOFT dark gray; caption "● start (t=0) ■ end (t=max)" at bottom-left in INK_SOFT; all chrome clearly readable against the warm off-white background
      Data: Left panel shows Lissajous (3:2) as a closed symmetric figure-eight variant, gradient from brand green #009E73 (t=0) through teal to blue #4467A3 (t=1); Right panel shows Archimedean spiral outward from origin, same green→blue gradient; start points are filled circles in brand green, end points are filled squares in blue; colorbar legend "t (0 to 1)" on right side shows the full gradient
      Legibility verdict: PASS — all text readable, no overflow, no light-on-light failures

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, not pure black
