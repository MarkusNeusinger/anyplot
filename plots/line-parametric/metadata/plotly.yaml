review:
  strengths:
  - Full spec compliance with all required features (two curves, color gradient, start/end
    markers, equal aspect ratio)
  - Custom colorscale with professional blue-to-coral progression creates visual appeal
  - Excellent use of Plotly-specific features (hovertemplate, updatemenus, HTML export,
    HTML-formatted text)
  - Clean, well-structured code with effective loop to reduce duplication
  - Thoughtful data storytelling through contrasting curve types with descriptive
    subtitles
  weaknesses:
  - Colorbar between subplots (x=0.42) creates slight visual crowding in the center
  - Marker-based gradient approach produces a slightly chunky appearance rather than
    a smooth line
  - Axis labels x(t)/y(t) could be more descriptive
  image_description: The plot displays two side-by-side subplots on a light blue-gray
    background (plotly_white template). The left subplot shows a Lissajous figure
    (x = sin(3t), y = sin(2t)) — a closed, self-intersecting curve with three horizontal
    lobes and two vertical lobes. The right subplot shows an Archimedean spiral (x
    = t·cos(t), y = t·sin(t)) — an open, expanding spiral making about two full turns.
    Both curves use a continuous color gradient mapped to parameter t, transitioning
    from deep blue (t=0) through teal and olive to coral/red (t=max). Each subplot
    has a vertical colorbar on the right showing the parameter t scale with tick labels
    in π notation. Start points are marked with blue circles and "Start (t = 0)" annotations
    with arrow connectors; end points are marked with coral/red squares and corresponding
    "End" annotations. The main title reads "line-parametric · plotly · pyplots.ai"
    centered at the top. Each subplot has a bold subtitle with the curve name and
    an italic line showing the parametric equation and a brief description. Axes are
    labeled x(t) and y(t). A "Reset View" button appears at the bottom center. The
    grid is very subtle, with visible zero lines.
