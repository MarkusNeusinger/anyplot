  - Design excellence could be elevated with stronger visual hierarchy between panels
  - Right colorbar title slightly cramped against canvas edge
  image_description: The plot displays two side-by-side parametric curves on a white
    background. The main title reads "line-parametric · plotly · pyplots.ai" centered
    at the top. The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a classic self-intersecting closed curve with looping figure-eight-like shape.
    The right panel shows an Archimedean Spiral (x = t·cos(t), y = t·sin(t)) expanding
    outward from the origin. Both curves use a custom color gradient transitioning
    from deep Python Blue (t=0) to coral/red (t=max), with vertical colorbars labeled
    "Parameter t" showing π-based tick values. Start markers (blue circles) and end
    markers (red/coral squares) are labeled on each curve. Axes are labeled "x(t)
    — horizontal position" and "y(t) — vertical position" with subtle gray gridlines
    and zero lines. Equal aspect ratios are maintained for both panels.
