    detail
  - Clean, well-structured code with deterministic data and proper output format
  - Interactive features (hover tooltips with parameter values, HTML export) leverage
    Plotly strengths
  weaknesses:
  - Start/end labels on Lissajous are crowded near origin since both points coincide
