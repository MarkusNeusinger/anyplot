  image_description: The plot displays two side-by-side parametric curve panels on
    a white background with light gray (#fafafa) panel areas. The left panel shows
    a Lissajous figure (x=sin(3t), y=sin(2t)) — a closed, self-intersecting curve
    with a color gradient transitioning from dark blue (t≈0) to purple (t≈2π). The
    right panel shows an Archimedean spiral (x=t·cos(t), y=t·sin(t)) expanding outward
    with the same blue-to-purple gradient (t from 0 to ~12.6). Both panels have dark
    blue circle markers at the start point and orange triangle markers at the end
    point. Each panel has its own "t (rad)" color bar legend on the right. Axis labels
    display the parametric equations. Subplot titles describe curve characteristics
    ("closed, self-intersecting" and "expanding outward"). The main title "line-parametric
    · letsplot · pyplots.ai" appears at the top left. Grid lines are subtle gray,
    spines are removed, and ticks are hidden.
