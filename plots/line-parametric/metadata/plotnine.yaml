review:
  strengths:
  - 'All spec requirements fully met: two parametric curves, color gradient, start/end
    markers, equal aspect ratio'
  - 'Excellent code quality: clean, deterministic, idiomatic plotnine'
  - Custom color gradient palette (blue to yellow to red) effectively shows parameter
    progression
  - Smart use of facet_wrap to separate curves with descriptive strip labels
  weaknesses:
  - Large gap between panels wastes canvas space due to coord_equal + facet_wrap interaction
  - Visual refinement is moderate — grid lines and all spines still visible
  - No annotations or visual emphasis to guide viewer toward specific insights
  - Axis labels x(t) and y(t) are generic mathematical notation
  image_description: The plot displays two faceted panels side by side on a light
    gray minimal grid. The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a self-intersecting curve with characteristic lobes, colored with a gradient
    from dark blue (t=0) through light blue, yellow-green, to red (t≈6.28). The right
    panel shows a spiral (x = t·cos(t), y = t·sin(t)) that loops outward from the
    center, colored from dark blue at the origin to red at the outer edge (t≈12.6).
    Both panels have blue circle markers at the start and red square markers at the
    end. The title "line-parametric · plotnine · pyplots.ai" is displayed in bold
    at the top. A color bar on the right shows "Parameter t" ranging from 0.0 to 12.5.
    Axis labels are "x(t)" and "y(t)". Equal aspect ratio is maintained via coord_equal().
    There is a notable gap between the two panels.
