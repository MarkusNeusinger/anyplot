review:
  strengths:
  - Excellent color gradient implementation using segmented series with programmatic
    HSL-based palette generation
  - Both required parametric curves (Lissajous + spiral) present with correct mathematical
    formulas
  - 'Good visual refinement: subtle dotted grid, styled legend, custom typography,
    removed tick marks'
  - Start/end point markers with data labels provide direction-of-traversal information
  - Equal aspect ratio maintained with square canvas
  weaknesses:
  - Helper functions gradient_colors and build_segments violate KISS principle — should
    be inline code
  - Label overlap near origin where Lissajous t=0,2π and Spiral start compete for
    space
  - Rainbow-like color progression on Lissajous is visually noisy — a smoother two-color
    gradient would be more elegant
  - 60 total series (30 segments x 2 curves) is heavy; could reduce segment count
  - ScatterSeries used for line rendering instead of more idiomatic LineSeries
  image_description: The plot displays two parametric curves on a square canvas (3600x3600)
    with a light gray (#fafafa) background. A Lissajous figure (sin(3t), sin(2t))
    is rendered as a multi-segment line with a color gradient transitioning from blue
    through cyan, green, yellow to orange, representing the progression of parameter
    t. An Archimedean spiral (t·cos(t), t·sin(t)) is rendered with a gradient from
    purple through magenta to pink. The title "line-parametric · highcharts · pyplots.ai"
    appears in bold at the top with a descriptive subtitle explaining both formulas.
    Axes are labeled "x(t) — horizontal position" and "y(t) — vertical position" with
    subtle dotted grid lines. Marker points are placed near the origin for "Lissajous
    t=0,2π" (blue circle) and "Spiral start" (purple circle), and a red diamond for
    "Spiral end" at the outer edge. A horizontal legend with rounded border sits at
    the bottom of the chart. The two curves overlap and intersect in several places,
    with the Lissajous forming its characteristic figure-eight-like pattern and the
    spiral expanding outward from the center.
