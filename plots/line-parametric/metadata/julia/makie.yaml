review:
  strengths:
  - 'Complete spec compliance: both required curves (Lissajous figure and Archimedean
    spiral) implemented correctly with DataAspect() for geometric accuracy'
  - ANYPLOT_SEQ gradient (green→blue) correctly encodes direction of parameter t,
    satisfying the spec's color-gradient requirement idiomatically
  - Start and end markers with distinct shapes (circle vs. diamond) plus the 't =
    2π →' annotation create clear directional context on the spiral
  - Fully theme-adaptive chrome in both renders — INK/INK_SOFT tokens applied to every
    text, spine, and grid element; no dark-on-dark or light-on-light failures
  - 1000-point curve density with linewidth=2.5 produces perfectly smooth rendering
    near self-intersections (Lissajous) and near the origin (spiral)
  - Clean, idiomatic CairoMakie code — Colorbar in the figure grid, DataAspect(),
    cgrad(), RGBAf() all used correctly; deterministic data requires no seed
  - All font sizes explicitly set throughout the Axis definitions; tick and label
    colors correctly derived from INK/INK_SOFT tokens
  weaknesses:
  - Colorbar label and tick sizes not explicitly set — the Colorbar object inherits
    the figure base fontsize=14 (28px effective) which renders the 'direction of t
    →' label and 'start'/'end' ticks noticeably smaller than the axis labels; add
    labelsize=13, ticklabelsize=11 to the Colorbar constructor to match the rest of
    the typography
  - Panel sizes are asymmetric due to DataAspect() applied to columns with very different
    data ranges (Lissajous [-1,1]×[-1,1] vs spiral [-12,12]×[-12,5]); the left panel
    dominates the layout slightly — consider using colsize!(fig.layout, 1, Relative(0.45))
    and colsize!(fig.layout, 2, Relative(0.45)) to balance the panels
  - Design Excellence is in the 'good but not exceptional' range — the gradient colormap
    is the correct and obvious choice for parametric curves; a higher tier would require
    more typographic hierarchy (e.g., bolder main title weight, size contrast between
    main title and panel sub-titles)
