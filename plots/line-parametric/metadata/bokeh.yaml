review:
  strengths:
  - Full spec compliance with all required features (equal aspect, gradient, two curves,
    start/end markers)
  - Effective use of Bokeh multi_line for per-segment color gradient — a distinctive
    Bokeh technique
  - Good visual refinement with subtle grids, custom background, and styled legends
  - Color gradient effectively communicates the direction of parameter traversal
  - Clean, deterministic code with explicit font sizing
  weaknesses:
  - Lissajous start/end markers overlap at origin since both map to (0,0)
  - Manual RGB palette construction is verbose — Bokeh has built-in palettes and color
    mappers
  - Main title positioned above left panel only, not centered over the full layout
  - Canvas height 2500px is non-standard (should be 2700 for 16:9)
  - Could use Bokeh linear_cmap or palette modules for cleaner color mapping
  image_description: The plot shows two side-by-side parametric curves rendered with
    Bokeh's gridplot layout. The left panel displays a Lissajous figure (x = sin(3t),
    y = sin(2t)) with a color gradient transitioning from dark blue through teal to
    amber/orange along the curve, showing the direction of increasing t. The right
    panel shows a spiral curve (x = t·cos(t), y = t·sin(t)) with the same color gradient.
    Both plots have circular start markers (blue) and square end markers (amber) with
    white borders. The main title "line-parametric · bokeh · pyplots.ai" appears in
    bold above the left panel. Each subplot has its own title, x(t)/y(t) axis labels,
    and a legend identifying start/end points. The background is light gray (#fafafa)
    with subtle grid lines. The Lissajous curve shows the characteristic self-intersecting
    figure-eight-like pattern, while the spiral expands outward from the center.
