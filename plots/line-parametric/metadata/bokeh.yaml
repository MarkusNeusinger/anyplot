review:
  strengths:
  - Excellent color gradient using Turbo256 with per-segment multi_line coloring effectively
    communicates parameter direction
  - Full spec compliance with both required curve types, equal aspect ratio, start/end
    markers, and sufficient point density
  - Good visual refinement with subtle dashed grid, custom background, and styled
    typography
  - Dual PNG and HTML export leverages Bokeh capabilities
  weaknesses:
  - build_segments() function violates KISS structure requirement - inline the segment-building
    logic
  - Turbo256 palette is not colorblind-safe - use Viridis256 or Cividis256
  - Axis lines/spines fully visible on all sides - remove top/right spines for visual
    refinement
  - Annotations too subtle to serve as effective storytelling anchors - increase font
    size and use darker color
  image_description: The plot displays two side-by-side panels on a light gray background
    (#f8f9fa). The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a self-intersecting figure-eight-like curve spanning [-1, 1] on both axes. The
    right panel shows an Archimedean spiral (x = t·cos(t), y = t·sin(t)) expanding
    outward to approximately ±12 on both axes. Both curves use a continuous color
    gradient from the Turbo256 palette — transitioning from cyan/blue through green
    and yellow to orange/red — to indicate the direction of increasing parameter t.
    Start points are marked with filled circles (blue/cyan) and end points with filled
    squares (orange/red), each with white borders. Small gray annotations "t = π"
    and "t = 2π" appear at the midpoints of each curve. Legends in the top-right of
    each panel label "Start" and "End" markers. Axis labels read "x(t)" and "y(t)".
    Subplot titles are in italic gray. The main title "line-parametric · bokeh · pyplots.ai"
    appears at the top of the canvas. Grid lines are subtle dashed lines at low opacity.
