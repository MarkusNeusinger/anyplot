review:
  strengths:
  - Full spec compliance with all required features (equal aspect, color gradient,
    two curves, start/end markers, high point density)
  - Effective use of Bokeh multi_line for per-segment color gradient — a technique
    distinctive to Bokeh
  - Good visual refinement with subtle dashed grid, cleaned axis styling, and well-styled
    legends
  - Color gradient effectively tells the story of parameter progression along each
    curve
  - Dual PNG/HTML output leverages Bokeh web-native strengths
  weaknesses:
  - Turbo palette is not the most colorblind-safe choice; viridis or cividis would
    score higher on accessibility
  - Helper function breaks strict KISS structure
  - Could use a more publication-ready color palette and typography choices to push
    design excellence higher
  image_description: The plot displays two side-by-side panels on a light gray background
    (#f8f9fa). The left panel shows a Lissajous figure (x = sin(3t), y = sin(2t))
    — a self-intersecting, looping curve rendered with a color gradient progressing
    from dark blue/purple through teal and green to yellow, representing the parameter
    t from 0 to 2π. A circular start marker (dark blue) and square end marker (yellow)
    are visible, along with a "t = π" annotation at the midpoint. The right panel
    shows an Archimedean spiral (x = t·cos(t), y = t·sin(t)) with the same color gradient
    scheme, expanding outward from the origin. A start circle is near center, an end
    square at the outer edge, and a "t = 2π" annotation at the midpoint. Both panels
    have italic subtitles, x(t)/y(t) axis labels, subtle dashed grid lines (alpha
    0.15), styled legends with Start/End entries, and no toolbar. The main title "line-parametric
    · bokeh · pyplots.ai" appears as bold text above the grid.
