review:
  strengths:
  - 'Perfect data quality: realistic stock simulation, two meaningful EMA periods
    (12 & 26), plus crossover event highlighting that directly addresses the spec''s
    crossover signal use case'
  - Proper Okabe-Ito palette applied in order with explicit per-series color assignment;
    both themes adapt correctly with no dark-on-dark or light-on-light failures
  - Robust CDN fallback chain (jsdelivr → unpkg → code.highcharts.com) prevents silent
    failures in restricted network environments
  - z_index ordering ensures crossover scatter markers render on top of lines, and
    price line renders above EMA lines
  weaknesses:
  - 'Legend visibility is uncertain in the output images — spacingBottom: 100 may
    not leave enough room once x-axis title and tick labels are accounted for; consider
    increasing to 150 or setting an explicit legend.y offset'
  - LineSeries imported from highcharts_core.options.series.area instead of the correct
    highcharts_core.options.series.line module — works by coincidence of inheritance
    but is non-idiomatic
  - 'Plot border / frame not explicitly removed — Highcharts draws a thin border around
    the plot area by default; consider plotBorderWidth: 0 for cleaner look'
