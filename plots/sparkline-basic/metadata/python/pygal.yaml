review:
  strengths:
  - 'Faithful, minimalist sparkline: no axes, ticks, gridlines or legend — exactly
    the chrome-free ''pure visualization'' the spec demands.'
  - Implements every optional feature — min/max highlight dots, soft area fill under
    the line, thin clean cubic-interpolated stroke.
  - 'Perfect palette + theme compliance: trend line is brand green #009E73, peak dot
    Imprint blue #4467A3, trough dot semantic matte-red #AE3030; backgrounds are #FAF8F1
    (light) / #1A1A17 (dark) and data colors are identical across both renders.'
  - Title 'sparkline-basic · python · pygal · anyplot.ai' is exact, legible in both
    themes, well-proportioned (~55% width).
  - Clean KISS code, deterministic hardcoded data, idiomatic pygal Style usage and
    a neat None-padded overlay-series trick to place single extrema dots.
  weaknesses:
  - Large top/bottom whitespace is intrinsic to fitting a ~4.5:1 sparkline inside
    the mandated 16:9 canvas — acceptable here, but the band could optionally be slightly
    taller to use a touch more vertical space.
  - Realistic context ('daily sales trend') lives only in a code comment; sparklines
    carry no visible labels so the scenario is not conveyed to the viewer (inherent
    to the form).
  image_description: |-
