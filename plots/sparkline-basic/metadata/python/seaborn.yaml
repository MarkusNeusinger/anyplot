review:
  strengths:
  - 'Faithful sparkline aesthetic: every cell strips axes, ticks, gridlines and all
    four spines, leaving pure data — exactly the spec''s defining ''extreme minimalism''.'
  - 'Implements the spec''s optional features comprehensively: min point (semantic
    red), max point (brand green), enlarged current-value dot, and a subtle 12%-alpha
    area fill under each trace.'
  - Small-multiples KPI dashboard is a directly listed spec application and is executed
    cleanly across a 3x2 grid with consistent spacing.
  - 'Perfect theme adaptation: chrome (background, label/value text) flips between
    light #FAF8F1 and dark #1A1A17 while the green/red data colors stay identical
    and fully readable on both surfaces.'
  - Direction is double-encoded (coloured value plus a unicode arrow), so up/down
    reads correctly under colour-vision deficiency rather than relying on red/green
    alone.
  - 'Clean, KISS code: seeded rng(42), no functions/classes, only used imports, correct
    plot-{THEME}.png output.'
  weaknesses:
  - 'Library mastery is modest: the small-multiples layout is built with a manual
    plt.subplots loop, whereas the idiomatic seaborn route for small multiples is
    FacetGrid / relplot(col=...). Only sns.lineplot and sns.set_theme are seaborn-specific;
    the dots, fill, and text are all raw matplotlib (LM-01/LM-02).'
  - The delta annotation at fontsize=7.5pt is the smallest text on the canvas; it
    is legible at full 3200px resolution but sits close to the lower bound when scaled
    to ~400px mobile width (minor VQ-01).
  - Design hierarchy is good but per-cell uniform — no single hero KPI is emphasised
    over the others, so the six panels read with equal weight (minor DE-03).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across the whole canvas — not pure white. PASS.
      Chrome: centered grey suptitle "sparkline-basic · python · seaborn · anyplot.ai"; each cell has a bold dark metric label (Revenue, Active Users, Conversion, Avg Session, Churn, NPS), a bold dark current value ($125.1K, 47.8K, 3.0%, 178.6s, 2.5%, 49.6), and a coloured delta with an up/down arrow. All text crisp and clearly readable against the light background.
      Data: brand green (#009E73) sparkline traces with a faint green area fill; minimum point marked with a matte-red dot (#AE3030), maximum with a green dot, last value with a larger green dot. First/primary series is brand green as required.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) across the whole canvas — not pure black. PASS.
      Chrome: same suptitle in soft grey; metric labels and current values render in light ink (#F0EFE8 / #B8B7B0) and are fully readable. Delta arrows keep their green/red colour. No dark-on-dark text anywhere.
      Data: identical green traces, green/red highlight dots and area fill — data colours match the light render exactly; only the chrome flipped. Brand green remains clearly visible on the dark surface.
      Legibility verdict: PASS
