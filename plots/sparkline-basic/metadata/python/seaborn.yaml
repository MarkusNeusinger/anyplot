review:
  strengths:
  - Refactored to idiomatic seaborn small-multiples via sns.relplot(col='metric',
    col_wrap=2, kind='line') with facet_kws despine — directly addressing the Attempt-1
    Library-Mastery feedback that flagged the prior manual subplots loop.
  - 'True minimalist sparklines: no axes, ticks, spines or gridlines; brand-green
    (#009E73) trace with subtle 0.12-alpha area fill and edge-stroked focal dots (min
    in semantic red #AE3030, max + current in brand green).'
  - Perfect theme adaptation — data colors (green trace, red/green dots, fill) are
    pixel-identical between light and dark; only chrome (PAGE_BG, INK, INK_SOFT) flips.
    No dark-on-dark or light-on-light text in either render.
  - Direction is double-encoded with unicode ▲/▼ arrows plus color, so the trend signal
    is CVD-safe and not color-alone.
  - Exact 3200×1800 canvas (figsize 8×4.5 @ dpi 400), title in mandated '{spec-id}
    · python · seaborn · anyplot.ai' format, deterministic data via np.random.default_rng(42).
  - Neutral, realistic SaaS KPI dashboard context (Revenue, Active Users, Conversion,
    Avg Session, Churn, NPS) with bold current-value labels and percent deltas vs.
    start.
  weaknesses:
  - 'VQ-01 (minor): with six facets in a 2×3 grid, the per-facet metric label (9pt)
    and delta (8.5pt) become small when the full figure is scaled to ~400 px mobile
    width — inherent to small-multiples sparklines, but the delta text sits near the
    mobile-legibility floor.'
  - 'DE-03 (minor): all six KPIs receive equal visual weight; no single hero metric
    is emphasised, so the layout informs evenly rather than guiding the eye to one
    focal story.'
  - 'LM (minor): relplot builds the grid idiomatically, but the sparkline detailing
    (fill_between, scatter dots, value/delta text) is necessarily raw matplotlib inside
    the g.axes.flat loop — acceptable for sparklines, but not pure high-level seaborn.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (~#FAF8F1), not pure white. Confirmed.
      Chrome: centered grey (INK_SOFT) suptitle "sparkline-basic · python · seaborn · anyplot.ai" reads clearly. Six bold dark metric labels (Revenue, Active Users, Conversion, Avg Session, Churn, NPS) top-left of each cell; bold dark current values ($125.1K, 47.8K, 3.0%, 178.6s, 2.5%, 49.6) top-right; green/red delta arrows below. No axes, ticks, spines or gridlines. All text crisp and readable.
      Data: brand-green (#009E73) trace with faint green area fill; matte-red (#AE3030) dot at minimum, green dot at maximum, larger green dot at current value. First/only series is #009E73. Confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (~#1A1A17), not pure black. Confirmed.
      Chrome: identical 2×3 layout; suptitle, metric labels and values render in light ink (INK/INK_SOFT) and remain fully readable. No dark-on-dark text. Delta arrows keep green/red.
      Data: green traces, red/green highlight dots and area fill are identical to the light render — only chrome flipped. Brand green stays clearly visible on the dark surface.
      Legibility verdict: PASS
