review:
  strengths:
  - 'Filled-area variant of the sparkline — explicitly mentioned in the spec as ''Optional:
    fill under line for area effect'' — rendered with a subtle translucent green that
    doesn''t overwhelm the line'
  - Stock-closing-prices scenario is one of the spec's listed applications and plausibly
    tuned (mid-cap range, realistic daily volatility, plausible earnings-pullback
    magnitude)
  - Data shape clearly tells a story — climb, sharp drawdown, recovery, settle — readable
    purely from the line geometry without annotations
  - Theme-adaptive chrome with identical Okabe-Ito data colors across both themes;
    only background + title color flip
  - 'Idiomatic highcharts_core composition: AreaSeries + two ScatterSeries on shared
    axes via plot_options'
  - Explicit y-axis bounds tied to the data range so the line variation occupies most
    of the canvas height instead of getting lost in autoscale padding
  weaknesses:
  - Line stroke (4px) is a touch thin against the soft area fill on a 4800px-wide
    canvas — could read better at 6px
  - 'Distinctive-library-features ceiling: the to_js_literal + headless-Chrome screenshot
    pipeline is the standard Python workflow for highcharts but isn''t a deeply highcharts-unique
    visual feature; same effect achievable in plotly/bokeh'
  - Storytelling capped by the basic-variant rule — annotations, drawdown-percent
    callouts, or a value axis would lift DE-03 but are forbidden by spec
  image_description: 'A wide ~6:1 area-sparkline rendering 30 trading days of a hypothetical
    mid-cap stock''s daily closing prices in Okabe-Ito green (#009E73) with a soft
    translucent green fill beneath the line. The series climbs gradually through the
    first third, plunges into a sharp earnings-week pullback around days 12–16 (highlighted
    by a vermillion #D55E00 dot at the trough), then mounts a recovery rally that
    peaks near day 25 (blue #0072B2 dot at the high), before settling slightly. No
    axes, ticks, gridlines, or legend — pure data shape. The title ''sparkline-basic
    · highcharts · anyplot.ai'' sits centered above in 30px bold. Light render uses
    the cream #FAF8F1 background; dark uses #1A1A17. Data colors and the line/fill
    geometry are identical across themes — only the page background and title color
    flip.'
