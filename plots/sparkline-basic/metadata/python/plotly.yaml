review:
  strengths:
  - 'True-to-spec minimalism: no axes, gridlines, ticks, or legend — pure data shape
    compressed into a wide, short band via the yaxis `domain=[0.36,0.72]` trick, an
    idiomatic plotly technique.'
  - Brand-green (#009E73) line with a soft brand-tinted area fill, plus semantic anchor
    markers — blue peak (#4467A3), red trough (#AE3030), and an emphasized green current
    endpoint carrying a '$151' value label — give clear visual hierarchy and storytelling.
  - Markers use a page-background outline ring (3px) so they read crisply against
    both the line and the fill in both themes.
  - 'Theme chrome is perfect: warm off-white #FAF8F1 / warm near-black #1A1A17 backgrounds,
    title in INK token, data colors identical across light and dark renders.'
  - 'Clean KISS code: seeded RNG, only-used imports, current write_image/write_html
    API, correct canvas (3200x1800).'
  weaknesses:
  - 'VQ-05: the sparkline band sits in the upper-middle of the 16:9 canvas, leaving
    a large unused empty band across the bottom third — vertically centering the band
    (e.g. domain ~[0.42,0.66]) would balance the whitespace better. This is the defining
    wide-short sparkline tradeoff so it is only a minor deduction.'
  - Line width=4 with spline smoothing reads as a clean moderate line rather than
    the strictly 'thin' line the spec note suggests; acceptable at this canvas size
    but slightly heavier than a classic sparkline.
