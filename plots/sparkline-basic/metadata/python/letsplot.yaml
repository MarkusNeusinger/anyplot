review:
  strengths:
  - Small-multiples KPI dashboard is one of the spec's named applications, executed
    cleanly with theme_void for pure sparkline chrome (no axes, ticks, or gridlines).
  - 'Palette compliance is exact: brand green #009E73 line, semantic dots (matte red
    #AE3030 = minimum, blue #4467A3 = maximum, green = latest), warm theme-adaptive
    backgrounds — identical data colors across light and dark.'
  - Distinct synthetic trend shape per metric (revenue, users, conversion, churn,
    session, NPS) so each sparkline tells its own story; realistic and neutral KPI
    context.
  - 'All optional spec features present: min/max highlight dots, last-point reference
    dot, subtle area fill anchored to each panel floor (alpha 0.10), and a thin 1.3
    line for clarity at small size.'
  - A single mapped geom_point layer drives a real legend key (minimum/maximum/latest),
    an idiomatic lets-plot way to label the dots without a manual legend.
  - 'Clean KISS code: seeded (np.random.seed(42)), no functions/classes, all imports
    used, saves plot-{THEME}.png + .html.'
  weaknesses:
  - 'Facet order is not honored: the code builds an ordered Categorical (Monthly Revenue
    first) but facet_wrap renders the panels alphabetically (Active Users, Avg Session,
    Churn Rate, ...). Cosmetic only, but the intended ordering is silently dropped
    — consider a numeric prefix or accept alphabetical.'
  - Six-panel small multiples gets tight at ~400 px mobile width; strip labels (13pt)
    and the bottom legend (12pt) are borderline-small when the full canvas is scaled
    down. Still readable, but the least-legible aspect.
  - Design is restrained-but-conventional small multiples; storytelling relies on
    the dots rather than any cross-panel emphasis or focal hierarchy.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across plot and all six facet panels — not pure white.
      Chrome: centered title "sparkline-basic · python · letsplot · anyplot.ai" in dark ink, fully readable. Per-panel strip titles (Active Users (K), Avg Session (min), Churn Rate (%), Conversion Rate (%), Monthly Revenue ($K), NPS Score) in soft grey, readable. Bottom legend "minimum / maximum / latest" with colored swatches, readable. No axes/ticks/gridlines (sparkline by design).
      Data: each panel a thin brand-green (#009E73) line with a faint green area fill; dots = red minimum (#AE3030), blue maximum (#4467A3), green latest (#009E73). First/only line series is #009E73. PASS.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) across plot and panels — not pure black.
      Chrome: title in light ink (#F0EFE8) readable; strip titles in light-grey (#B8B7B0) readable, no dark-on-dark; legend text light-grey readable. No dark-on-dark failures.
      Data: identical colors to light render — green lines, faint green fill, red/blue/green dots. Only chrome (bg, text) flipped. PASS.
      Legibility verdict: PASS
