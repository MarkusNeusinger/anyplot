review:
  strengths:
  - 'Genuine small-multiples KPI dashboard: six distinct trend shapes (rising users,
    declining churn, volatile sessions) make every sparkline tell its own story.'
  - Exceeds the spec's optional features cleanly - subtle area fill anchored to each
    panel floor, plus semantic min (matte red), max (blue) and last-value (brand green)
    highlight dots.
  - 'Correct theme handling: warm off-white #FAF8F1 / warm near-black #1A1A17 backgrounds,
    INK/INK_SOFT chrome tokens flip per theme while data colors stay identical.'
  - 'First series is the mandated brand green #009E73; min/max use semantically appropriate
    Imprint red/blue.'
  - 'Idiomatic lets-plot: facet_wrap(ncol=3, scales=''free_y'') + theme_void() + layered
    ribbon/line/point, with both PNG and interactive HTML exports.'
  - 'Clean KISS code: no functions/classes, np.random.seed(42) for reproducibility,
    all imports used, canvas exactly 3200x1800.'
  weaknesses:
  - The facet strip labels are wrapped in bordered rectangles (theme_void default
    strip frame). For a 'pure minimalism' sparkline spec the box outlines read as
    mild chartjunk - in dark mode the light box borders are slightly heavy. Consider
    strip_background=element_blank() so only the label text remains.
  - Each panel shows a faint dark horizontal baseline (the ribbon floor line) which
    reads like an axis; the spec calls for 'no axes'. It works as the area baseline
    but could be softened or dropped for a cleaner look.
  - No legend/key explains that red=minimum, blue=maximum, green=last value. Min/max
    highlighting is a sparkline convention, but a tiny caption or first-panel annotation
    would remove ambiguity for new readers.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), correct - not pure white.
      Chrome: centered title "sparkline-basic · python · letsplot · anyplot.ai" in dark ink, fully readable. Six facet strip labels (Active Users (K), Avg Session (min), Churn Rate (%), Conversion Rate (%), Monthly Revenue ($K), NPS Score) in dark-soft gray inside thin bordered boxes - all readable.
      Data: brand green (#009E73) thin trend lines with a pale green area fill anchored to each panel's floor; matte-red dot marks each minimum, blue dot each maximum, green dot the last value. First series color is #009E73. PASS.
      Legibility verdict: PASS - all title, strip-label and dot elements clearly visible against the light surface.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), correct - not pure black.
      Chrome: same title in light ink (#F0EFE8), fully readable. Strip labels in light-soft gray (#B8B7B0) inside light-bordered boxes - readable, though the box outlines are a touch heavy on the dark surface. No dark-on-dark text failures.
      Data: identical to light render - same brand-green lines, green area fill, and red/blue/green highlight dots in the same positions. Colors match the light render exactly; only chrome flipped. PASS.
      Legibility verdict: PASS - all text readable against the dark surface, brand green still vivid.
