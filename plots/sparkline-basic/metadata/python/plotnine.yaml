review:
  strengths:
  - 'Textbook sparkline minimalism: all axes, ticks, gridlines, and spines stripped
    via element_blank() for a pure-data aesthetic exactly as the spec demands.'
  - Thin brand-green line (#009E73, size 1.3) over a subtle 12% area-fill ribbon reads
    clean and uncluttered at small sizes.
  - 'All four optional spec features implemented: min highlighted matte-red (#AE3030),
    max blue (#4467A3), and both endpoints in theme-adaptive muted ink — a clear semantic
    color story.'
  - 'Theme-adaptive chrome is correct in both renders: warm off-white #FAF8F1 / warm
    near-black #1A1A17 backgrounds, title flips ink color, data hues stay identical.'
  - 'Idiomatic plotnine: layered geoms (geom_ribbon + geom_line + geom_point), a separate
    highlight dataframe mapped through scale_color_manual, declarative theme() chrome
    control.'
  - 'Clean KISS script: linear flow, np.random.seed(42) for reproducibility, no unused
    imports, well-commented intent.'
  weaknesses:
  - 'Aspect-ratio tension: the spec calls for a compact 4:1–8:1 sparkline, but the
    hard canvas rule forces 16:9 and the chart stretches to fill the entire canvas,
    so it reads more like a full area chart than an inline sparkline. A centered narrow
    band or small-multiples layout would better evoke the compact sparkline form (spec
    explicitly lists small multiples as an option). Reasonable tradeoff given the
    canvas constraint, but the defining compact aspect ratio is lost.'
  - Endpoint markers near the left/right canvas edges sit close to the frame (all
    pixels visible, not clipped) — slightly tight margins; a touch more horizontal
    padding would breathe better.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1), no panel frame or grid — correct.
      Chrome: only the title "sparkline-basic · python · plotnine · anyplot.ai" in dark ink, centered, fully readable. No axes/ticks/labels by design.
      Data: thin brand-green line (#009E73) over a pale green area-fill ribbon. Min point matte-red (#AE3030), max point blue (#4467A3), both endpoints dark muted-ink dots. First series is #009E73 as required.
      Legibility verdict: PASS — title clearly legible on light surface, line and markers well distinguished from background.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17), no frame/grid — correct.
      Chrome: title in light ink, centered, fully readable. No dark-on-dark issues.
      Data: identical brand-green line and ribbon; min red, max blue identical to light render; endpoints flip to light muted-ink (theme-adaptive neutral) and remain visible. Data hues match the light render — only chrome flipped.
      Legibility verdict: PASS — all text and data clearly readable on the dark surface.
