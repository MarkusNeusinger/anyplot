review:
  strengths:
  - 'Textbook minimal sparkline: all chart chrome (axes, ticks, gridlines, spines)
    stripped via element_blank for the pure inline-trend aesthetic the spec demands.'
  - 'First/only data series is brand green #009E73; min/max/endpoint highlights use
    Imprint palette + muted anchor (matte-red #AE3030 low, blue #4467A3 high, muted
    gray endpoints) — palette-compliant and intuitive low/high reading.'
  - Both light (#FAF8F1) and dark (#1A1A17) renders are theme-correct; data colors
    identical across themes, only chrome flips. Title fully legible in both.
  - Implements every optional spec feature (min/max highlight dots, first/last endpoint
    dots, thin clean line) without cluttering the minimalist look.
  - 'Clean KISS script: seeded data (np.random.seed(42)), no functions/classes, all
    imports used, correct plot-{THEME}.png output.'
  weaknesses:
  - Aspect ratio is the mandated 16:9 canvas (3200x1800), not the 4:1-8:1 'wide and
    short' ratio the spec describes for true inline sparklines — this is an unavoidable
    consequence of the hard canvas rule, not a code defect, but the render reads as
    a full-size line chart rather than a compact inline element.
  - Muted-gray endpoint dots are low-contrast against the warm-cream light background;
    they read clearly but are the dimmest highlight — consider whether endpoints need
    to be that subtle.
  - min->red / max->blue is defensible but not self-evident without context; a reader
    cannot tell which extreme is which from color alone (acceptable for a sparkline,
    noted only for completeness).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: centered title "sparkline-basic · python · plotnine · anyplot.ai" in dark ink, fully readable. No axes, ticks, gridlines, or spines by design (sparkline). Legibility verdict: PASS.
      Data: single brand-green line (#009E73, thin), with highlight dots — matte-red dot at the global minimum (bottom center), blue dot at the global maximum (top center), muted-gray dots at the first (left) and last (right) endpoints. First series is #009E73 as required.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct, not pure black.
      Chrome: same centered title in light ink (#F0EFE8), fully readable against the dark surface — no dark-on-dark failure. Legibility verdict: PASS.
      Data: identical green line and highlight dots; min red, max blue, endpoints light-gray. Data colors match the light render exactly — only chrome flipped. Brand green clearly visible.
      Legibility verdict: PASS.
