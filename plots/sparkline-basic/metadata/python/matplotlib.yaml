review:
  strengths:
  - Textbook small-multiples sparkline dashboard — six chrome-free KPI rows exactly
    matching the spec's 'inline dashboard cell' use case
  - 'All optional spec features implemented: faint area fill, thin clean line (lw=1.6),
    min/max highlight dots, and an emphasized current/last value'
  - Flawless theme adaptation — identical Imprint data colors (brand green line, matte-red
    min, blue max) across both renders with only chrome flipping; backgrounds are
    correct warm off-white / near-black
  - 'Strong typographic hierarchy: muted metric name on the left, bold current value
    on the right in table-cell style'
  - Clean KISS code — single loop over a metrics list, seeded RNG, all imports used,
    exact 3200x1800 canvas with no bbox_inches
  weaknesses:
  - Min markers use the semantic-red anchor (#AE3030, reserved for bad/loss/error)
    purely to mark each series minimum; a minimum is not inherently 'bad'. The red/blue
    min/max convention is acceptable and reads clearly, but consider that red can
    imply a negative value-judgement on a neutral extremum.
  - Metric name labels (9pt) and value labels (10pt) are on the smaller side; readable
    at full resolution but borderline when scaled to ~400px mobile width. A slightly
    larger value label would reinforce the dashboard focal point.
  image_description: |-
