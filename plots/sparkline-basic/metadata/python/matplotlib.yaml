      Background: warm off-white (#FAF8F1), confirmed — not pure white.
      Chrome: title "sparkline-basic · python · matplotlib · anyplot.ai" centered in dark ink, fully readable. Six metric names (Website Visitors, Daily Revenue, Conversion Rate, Active Users, Avg. Session, Newsletter Signups) in soft ink on the left; bold current values (2,292 / $73.5k / 3.69% / 1,176 / 5.8 min / 88) on the right. All text crisp and legible. No axes/ticks/gridlines by design.
      Data: each row is a thin brand-green (#009E73) sparkline with a faint green area fill. Minimum marked with a matte-red dot (#AE3030), maximum with a blue dot (#4467A3), latest point with a filled green dot. First/primary series color is #009E73. Confirmed.
