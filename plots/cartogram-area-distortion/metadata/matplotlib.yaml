  - Not a contiguous cartogram - uses Dorling circle approach
  - Font sizes slightly below recommended thresholds for some elements
  - No visual emphasis or annotation drawing attention to key data insights
  image_description: The plot displays a Dorling cartogram of US states (continental)
    where each state is represented as a circle positioned at its approximate geographic
    centroid. Circle area is proportional to state population — California, Texas,
    Florida, and New York are the largest circles. Color encodes GDP per capita using
    a YlGnBu sequential colormap ranging from ~38,000 (yellow-green) to ~82,000 (dark
    blue). States with population >5M are labeled with two-letter abbreviations in
    bold dark text. A manual size legend on the right shows reference circles for
    1M, 10M, and 30M populations. A vertical colorbar on the far right shows the GDP
    per Capita (USD) scale. The title reads "US States by Population · cartogram-area-distortion
    · matplotlib · pyplots.ai". All spines and axes are hidden, giving a clean map-like
    appearance. The northeast region is quite crowded with overlapping circles (NY,
    PA, NJ, MD, MA, CT area).
