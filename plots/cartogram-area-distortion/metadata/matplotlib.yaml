review:
  strengths:
  - Excellent data storytelling with three strategic annotations highlighting key
    insights (largest population, highest/lowest GDP per capita)
  - Custom sequential colormap with refined color progression from cream through teal
    to navy
  - Collision avoidance algorithm prevents circle overlap in crowded regions
  - Reference inset map provides geographic context for comparison
  - Clean spine-free layout with subtle background and white circle edges
  - Dual-encoding (size + color) effectively communicates two data dimensions
  weaknesses:
  - Pale cream/yellow circles for low-GDP states are somewhat washed out against the
    light background
  - NE corridor remains moderately crowded despite collision avoidance
  - US outline inset uses verbose hard-coded coordinate lists
  - Dorling cartogram approach rather than contiguous polygon distortion (acceptable
    matplotlib limitation)
  image_description: The plot displays a Dorling cartogram of US states (contiguous
    48) where each state is represented as a circle positioned at approximate geographic
    centroids. Circle area is proportional to state population, with California and
    Texas being the largest circles. Color encodes GDP per capita using a custom sequential
    colormap from pale cream/yellow ($38K, lowest) through teal to dark navy blue
    ($82K, highest). The background is a very light gray (#fafbfc). State abbreviations
    are labeled in bold dark text with white stroke effects for states with population
    >2.5M. Three annotation callouts highlight California (39.5M people), New York
    ($82K GDP/cap), and Mississippi ($38K GDP/cap, lowest). A size legend on the right
    shows reference circles for 1M, 10M, and 30M population. A vertical colorbar on
    the far right shows the GDP per capita scale with $K formatting. A small inset
    map in the bottom-left corner shows a simplified US outline labeled "Actual Geography"
    for reference. The title reads "US States by Population" with subtitle "cartogram-area-distortion
    · matplotlib · pyplots.ai" and a bottom caption explains the dual encoding.
