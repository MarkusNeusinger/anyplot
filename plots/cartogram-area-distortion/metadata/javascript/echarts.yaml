review:
  strengths:
  - Dual encoding (circle area proportional to GDP + color proportional to GDP per
    capita) is immediately readable and informative
  - Reference inset with equal-area grey dots is a thoughtful and spec-compliant geographic
    context layer
  - Hand-crafted size legend with three reference circles ($500B / $2T / $4.5T) clearly
    communicates the area encoding
  - Full imprint_seq continuous colormap applied correctly via t.seq — green for lower,
    blue for higher GDP per capita
  - Both themes render correctly with proper token usage throughout; no dark-on-dark
    failures in either render
  - Realistic, neutral European 2023 GDP data with accurate factual proportions
  weaknesses:
  - Dorling circles don't preserve country shapes or adjacency — spec specifically
    mentions contiguous cartograms; consider adding a subtitle note clarifying this
    is a Dorling (non-contiguous) approximation
  - Large empty space in upper-right of chart (latitude 56-72 degrees, longitude 25-38
    degrees) reduces canvas utilization — could tighten axis bounds or add more Eastern
    European/Baltic countries
  - Bottom section (reference inset + size legend) is compressed with hardcoded pixel
    coordinates; legBaseY=828 in a 900px CSS container leaves very little breathing
    room near the bottom edge
  - Country codes inside small circles (FI, SE, GR, PT) are 11px CSS (22px at 2x)
    — borderline readable at mobile scale (~400px width); consider increasing to 12-13px
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1) — correct theme surface
      Chrome: Title "cartogram-area-distortion · javascript · echarts · anyplot.ai" in dark ink at center-top, clearly readable. Subtitle in dark-soft tone readable. Axis labels "Latitude" (left, rotated) and "Longitude" (bottom) in dark-soft. Tick labels (lat: 34°–72°, lon: -15°–38°) in dark-soft at 11px — all readable. Colorbar labels "$108k" and "$20k" readable. Size legend labels "$500B", "$2T", "$4.5T" readable. Reference inset italic label readable.
      Data: 18 Dorling bubbles sized by GDP (Germany largest ~80px CSS, small countries ~16px). Color gradient teal-green (#009E73) to blue (#4467A3) via imprint_seq — Ireland/Switzerland/Norway in blue (high GDP per capita $100k+), Poland/Portugal/Greece in teal-green (lower ~$20-25k). Country code labels (2-letter) in white bold inside circles. Reference inset shows small grey dots at geographic positions. Colorbar on right side.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17) — correct dark theme surface
      Chrome: Title renders in light cream/off-white, clearly readable against dark background. Subtitle in muted light tone readable. Axis tick labels and axis name labels appear in light muted color (inkSoft token) — all readable. Colorbar text labels in light tone readable. Size legend labels and reference inset label in light muted tone readable. No dark-on-dark failures observed anywhere.
      Data: Circle colors (teal/blue gradient) are visually identical to the light render — data colors unchanged, only chrome flipped. Brand green/teal circles (lower GDP per capita countries) clearly visible against dark background. Blue circles (higher GDP per capita) visible. White country code labels inside circles readable.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures detected; data colors identical to light render confirming correct theme-adaptive token usage.
