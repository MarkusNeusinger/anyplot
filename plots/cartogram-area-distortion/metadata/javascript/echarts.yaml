review:
  strengths:
  - 'Excellent dual encoding: circle area encodes total GDP, sequential Imprint color
    encodes GDP per capita — immediately communicates both economic scale and per-capita
    wealth'
  - Correct use of t.seq (Imprint sequential colormap) for continuous data; all chrome
    tokens properly applied in both themes with no dark-on-dark failures
  - Clean flat code structure with deterministic hardcoded data; dynamic title fontsize
    scaling is a well-implemented detail
  - 'visualMap.dimension: 3 binding to a non-positional column is idiomatic and distinctive
    ECharts usage'
  - Informative subtitle provides clear encoding context; tooltip configured with
    themed background for interactive use
  weaknesses:
  - 'No size legend: circle area encodes total GDP but there is no reference-circle
    legend showing what area represents. Add a custom ECharts graphic element showing
    2-3 reference circles (e.g., $500B, $2000B, $4500B) with labels.'
  - 'No reference map inset: spec notes require original outlines or a comparison
    view. Consider a small inset with fixed uniform-size dots at true geographic positions
    for comparison.'
  - Very small circles for low-GDP countries (Portugal 255B, Greece 222B) — apply
    a minimum symbolSize floor (Math.max(12, ...)) so smallest circles remain more
    legible.
  - 'Circle labels use hardcoded color: #ffffff — works visually on teal/blue circles
    but should use a token or computed contrast color.'
  - 'Axis lines visible on all sides with only 0.3 opacity; set axisLine: { show:
    false } on both axes for a cleaner look.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title "cartogram-area-distortion · javascript · echarts · anyplot.ai" in dark ink, centered, clearly readable. Subtitle in t.inkSoft readable. Axis labels "Longitude" and "Latitude" in t.inkSoft. Tick labels (degree values) in t.inkSoft. Colorbar text "$108k"/"$20k" readable. All chrome readable.
      Data: 18 European country circles sized by total GDP (Germany largest). Sequential Imprint colormap (t.seq: teal/green=#009E73 end → blue=#4467A3 end) used for GDP per capita. Ireland, Switzerland, Norway deepest blue. White country-code labels inside circles.
