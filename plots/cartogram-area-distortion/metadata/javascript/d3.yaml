review:
  strengths:
  - Exemplary use of d3.forceSimulation + d3.geoAlbersUsa() — the Dorling cartogram
    is implemented idiomatically with attract-X/Y anchors keeping circles near their
    geographic centroids while forceCollide prevents overlap
  - Imprint sequential colormap correctly applied via d3.interpolateRgbBasis(t.seq)
    for continuous GDP-per-capita data; all chrome tokens (t.ink, t.inkSoft, t.pageBg,
    t.grid, t.elevatedBg) used throughout
  - 'Both renders are fully theme-correct: warm off-white (#FAF8F1) light bg and near-black
    (#1A1A17) dark bg; all text readable in both themes'
  - 'Title format is correct: ''US Population Cartogram · cartogram-area-distortion
    · javascript · d3 · anyplot.ai'''
  - d3.scaleSqrt() for perceptually correct area-proportional circle sizing is the
    right D3 idiom
  - Geographic reference inset (equal-size dots at geographic positions) satisfies
    the spec requirement for comparison context
  - Dynamic title fontsize scaling via Math.round(22 * Math.min(1, 67/titleStr.length))
    handles the long title string correctly
  - Real-world, factually accurate US state population and GDP data with appropriate
    scale (CA 39M, TX 30M, etc.)
  - Size legend with dashed outline circles and tick marks is an elegant, library-native
    design choice
  weaknesses:
  - Subtitle text ('Circle area ∝ population...') at y=96 overlaps with the bottom
    of the Washington (WA) circle (center ~y=79, r≈31px, extending down to y≈110 CSS).
    Move subtitle to y=112 or increase top margin to y=145 to clear the WA bubble.
  - 'Abbreviation labels use fill=t.pageBg, which on dark theme resolves to #1A1A17
    (near-black) inside the green circles — low WCAG contrast (~3.3:1). On dark theme
    use t.pageBg or t.ink inverted: consider fill = (window.ANYPLOT_THEME===''dark''
    ? ''#F0EFE8'' : t.pageBg) for label text.'
  - Dorling cartogram (circles) does not preserve region adjacency as specified ('Regions
    should remain contiguous'); the geographic reference inset partially mitigates
    this but the spec expects distorted polygonal shapes. For D3, this is a known
    constraint — acceptable as the only feasible approach without TopoJSON data.
  - 'Color differentiation is limited: most US states cluster in the green-to-mid-teal
    range for GDP per capita; only DC and a few high-per-capita states visibly shift
    toward blue, making the color story hard to read for the bulk of states.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface. PASS.
      Chrome: Title "US Population Cartogram · cartogram-area-distortion · javascript · d3 · anyplot.ai" rendered in dark #1A1A17 ink, centered, ~18px — clearly readable. Subtitle "Circle area ∝ population (2023, millions) · Color = GDP per capita (USD, 2022)" at top-left in #4A4A44 (inkSoft), 14px — readable but partially overlapping with the WA state bubble (WA circle center ~y=79 CSS, r≈31px; subtitle baseline at y=96 CSS, text top ~y=82 — overlap of ~14px). Right-side GDP/capita color legend and Population size legend use inkSoft tokens correctly.
      Data: Dorling cartogram of 51 US states/DC. Circles sized by population (scaleSqrt), colored by GDP per capita using the Imprint sequential colormap (green #009E73 → blue #4467A3 via t.seq). CA is the largest circle (left), TX and FL also prominent. Most circles appear in mid-green range; only DC (near MD, visibly purple-blue) stands out distinctly on the color scale. State abbreviation labels are cream (#FAF8F1) inside circles — readable for all labeled states. Geographic reference inset visible in bottom-right of chart area, showing equal-size dots at geographic positions. Population size legend (dashed circles: 1M, 10M, 30M) on right.
      Legibility verdict: PASS — all text readable; minor overlap issue with WA circle and subtitle.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct Imprint dark surface. PASS.
      Chrome: Title in light (#F0EFE8) ink, subtitle in #B8B7B0 (inkSoft) — both clearly readable against dark bg. Legend text correctly light-colored. Same WA/subtitle overlap is present. The inset box uses elevatedBg (#242420) on dark — correctly theme-adaptive.
      Data: All data colors identical to light render — green (#009E73) dominant tones with DC showing blue. Data colors are theme-independent (correct). State abbreviation labels use fill=t.pageBg which resolves to #1A1A17 (near-black) on dark theme — labels appear as dark text on green circles, contrast ~3.3:1. Large circles (CA, TX, FL, NY) remain readable due to bold weight; smaller circles may be marginally low-contrast.
      Legibility verdict: PASS (with minor concern) — no dark-on-dark failure; data is readable; abbreviation labels have reduced contrast on dark theme but remain legible at the rendered sizes.
