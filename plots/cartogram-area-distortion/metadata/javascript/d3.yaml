review:
  strengths:
  - Excellent use of D3's geoAlbersUsa() composite projection (handles AK/HI insets
    automatically) combined with forceSimulation for authentic Dorling cartogram positioning
  - Dual encoding (circle area = population, color = GDP per capita) tells a coherent
    economic story at a glance; DC stands out as a tiny blue outlier signaling high
    GDP per capita
  - Gradient colorbar legend (using defs/linearGradient) and size-reference bubble
    legend are both well-constructed and informative
  - Force simulation with attract-x/attract-y + forceCollide uses scaleSqrt correctly
    — circles stay near geographic centroids while repelling overlaps
  - 'Theme-adaptive chrome is correctly wired through ANYPLOT_TOKENS: ink/inkSoft/pageBg
    used throughout; data colors identical between light and dark renders'
  - Code is clean, deterministic, and self-contained — no fetch(), no randomness,
    all 51 regions hard-coded
  weaknesses:
  - Subtitle font-size 13px and color-legend tick labels 12px fall below the D3 minimum
    of 14px; increase both to at least 14px (subtitle) and 13px (legend ticks) — at
    3200 px canvas these look small
  - 'WA circle (radius ~31px) extends ~17px above the subtitle line (subtitle at SVG
    y=76, circle top ~y=58): increase margin.top from 90 to 110 OR move subtitle to
    y=96+ to eliminate the circle-text overlap'
  - Spec requires 'Include original region outlines or a reference map inset for comparison'
    — add a miniature topographic-style inset (can be drawn as lightweight state boundary
    rectangles or proportional-area tiles) so viewers can see the original vs. distorted
    geography side-by-side
  - State abbreviation labels use hardcoded fill '#FAF8F1' instead of t.pageBg or
    t.ink — while readable on circles in both themes, use the theme token for correctness
  - Alaska appears as an unlabeled 2px dot at lower-left (AlbersUSA inset position,
    pop 0.74M → r≈9.3px, just below the 10px label threshold) — slightly enlarge the
    threshold or add a direct label for AK specifically
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "US Population Cartogram · cartogram-area-distortion · javascript · d3 · anyplot.ai" in dark ink at ~17px, clearly readable. Subtitle "Circle area ∝ population (2023, millions) · Color = GDP per capita (USD, 2022)" at 13px in inkSoft — readable but slightly small. Color legend axis labels ($50k–$200k) at 12px — small. "GDP / capita" and "Population" legend headers at 13px bold — readable. State abbreviation labels inside circles in #FAF8F1 (warm off-white) on green/blue circles — readable.
      Data: 51 circles (50 states + DC) sized by population and colored via Imprint sequential scale (green → blue); brand green #009E73 dominates at low GDP/capita values; blue #4467A3 appears for high-GDP/capita states (CT, MA, NY, DC). CA is the largest circle (pop 39M); TX and FL are the next largest. DC appears as a tiny blue-purple circle near MD, signaling high GDP per capita. Force layout preserves rough US geographic pattern.
      Overlap note: WA circle top (~SVG y=58) extends above the subtitle text (SVG y=76) — minor overlap; subtitle is still readable but the circle is partially occluded.
      Legibility verdict: PASS (minor subtitle-overlap and small legend text noted but all text remains readable)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black.
      Chrome: Title and subtitle visible in light (off-white) text against the dark background — no dark-on-dark failures. Legend labels ($50k, $100k, etc.) visible in light inkSoft tone. "GDP / capita" and "Population" headers readable in light ink. State abbreviations inside circles still use #FAF8F1 which reads well on the colored circles.
      Data: Circle colors are IDENTICAL to the light render — brand green and blue scale preserved exactly; only page background and chrome text colors flipped to light values.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures observed.
