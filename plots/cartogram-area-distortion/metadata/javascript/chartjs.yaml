review:
  strengths:
  - Correct imprint_seq (green→blue) colormap for continuous population data — palette
    compliance is perfect
  - 'Full theme-adaptive chrome: both light (#FAF8F1) and dark (#1A1A17) renders are
    correct and all text is readable'
  - Custom gradient legend with size reference circles elegantly communicates both
    color and area encoding simultaneously
  - Axes/grid/borders completely hidden — very clean, appropriate minimalism for a
    geographic cartogram
  - State abbreviation labels drawn inside bubbles using Chart.js plugin API — idiomatic
    and effective
  - Dual encoding (size + color both ∝ population) reinforces the key insight; large
    states immediately stand out
  - Real 2023 US state population data with accurate proportions — DQ is strong
  weaknesses:
  - Dorling bubble approach does not preserve contiguous borders between states —
    spec requires regions to remain adjacent after distortion. A layout algorithm
    that reduces bubble overlap while maintaining approximate neighbor relationships
    (e.g. sorting/shifting to reduce overlaps) would better fulfill the contiguous
    adjacency requirement.
  - Missing reference map inset showing original state outlines for comparison — spec
    explicitly requires 'Include original region outlines or a reference map inset
    for comparison'. A small inset in a corner with uniform-size state outlines would
    satisfy this.
  - Northeast US states (NJ, CT, DE, MD, RI, NH, VT) show significant bubble overlap
    due to geographic density — consider nudging overlapping bubbles slightly apart
    or adding a size-floor increase for readability in this region.
  - hexToRgba() and seqColor() helper functions at file top add structural complexity
    — inline the color calculation or collapse to fewer helpers to better meet KISS
    structure expectations.
  - 'CQ-01: two plugin objects (labelPlugin, gradientLegendPlugin) plus two helper
    functions deviate from the expected flat Imports→Data→Plot→Save structure; these
    are necessary for Chart.js but worth noting for repair.'
