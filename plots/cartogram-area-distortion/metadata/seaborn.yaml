  image_description: 'The plot displays a tile-based cartogram of US states where
    each state is represented by a square marker positioned in a grid approximating
    US geography. Tile size is proportional to state population, creating a striking
    visual contrast between large states (CA as a very large blue square labeled "39M",
    TX as a large green square labeled "30M", FL at "22M", NY at "20M" in orange)
    and small states (WY, VT, ND as tiny squares). States are colored by region: blue
    for West, orange/gold for Midwest, teal/green for South, and orange-red for Northeast
    using seaborn''s colorblind palette. The title reads "US States by Population
    / cartogram-area-distortion · seaborn · pyplots.ai" in bold black text. A region
    legend sits in the lower left. An equal-area reference tile map is shown on the
    right side for comparison, with all tiles the same small size. State abbreviations
    are displayed in white bold text on each tile, with population values shown for
    states >=5M. An italic annotation reads "Tile area proportional to state population"
    in the bottom right. The background is a subtle light gray.'
