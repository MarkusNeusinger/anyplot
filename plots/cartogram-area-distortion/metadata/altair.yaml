  strengths:
  - Excellent use of Altair geographic projection and topo_feature for reference map
    background
  - Well-chosen colorblind-safe palette with white circle strokes for visual separation
  - Clean idiomatic Altair code with declarative layer composition
  - Real US population data provides meaningful and neutral context
  - Smart labeling strategy (only states >= 4M) prevents text clutter
  weaknesses:
  - Northeast region has moderate circle overlap due to small densely packed states
  - State labels at 15pt could be slightly larger for better legibility
  - Dorling cartogram circles do not preserve region shape or contiguity as spec ideally
    describes
  image_description: 'The plot displays a Dorling cartogram of US states by population
    on an AlbersUsa projection. A faint grey reference map of the continental US (plus
    Alaska and Hawaii insets) provides geographic context. Colored circles are placed
    at approximate state centroid locations, with circle area proportional to population.
    Four US regions are color-coded: Northeast (steel blue), Midwest (golden yellow),
    South (orange-brown), and West (green). State abbreviation labels in bold white
    text appear on circles for states with population >= 4M. California and Texas
    have the largest circles, clearly dominating. Two legends appear: Region (bottom-left)
    and Population size in millions (bottom-right). The title reads "US States by
    Population · cartogram-area-distortion · altair · pyplots.ai" with a subtitle
    explaining the circle sizing.'
