  image_description: 'The plot displays a Dorling cartogram of the United States where
    each state is represented by a circle positioned at its approximate geographic
    centroid, overlaid on a faint light-gray reference map of US state boundaries.
    Circle area is proportional to state population (2023 estimates). States are colored
    by region: blue (Northeast), gold/yellow (Midwest), orange (South), and green
    (West). White bold state abbreviations label circles for states with population
    >= 4M. California is the largest green circle on the west coast; Texas is a large
    orange circle in the south-center; Florida is a large blue-gray circle in the
    southeast. A size legend in the bottom-right shows population scale (10M, 20M,
    30M, 40M). A color legend in the bottom-left identifies the four regions. The
    title reads "US States by Population · cartogram-area-distortion · altair · pyplots.ai"
    with subtitle "Circle area proportional to state population (2023 estimates)."
    The Northeast corridor is noticeably crowded with overlapping circles.'
