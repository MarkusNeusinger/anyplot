review:
  strengths:
  - Excellent use of real census data with accurate population figures for all 50
    states
  - Dual encoding (bubble size + color gradient) effectively communicates population
    magnitude
  - Clean professional blue color palette with intentional gradient stops
  - Code is well-structured deterministic and produces both interactive HTML and static
    PNG
  - Good use of Highcharts Maps features (topology mapbubble colorAxis joinBy)
  weaknesses:
  - Not a true cartogram - uses proportional symbol map (bubbles) instead of distorting
    region shapes
  - Northeastern states have significant bubble overlap reducing readability
  - Small-state labels (WY VT ND SD) are barely legible inside tiny bubbles
  - Alaska and Hawaii are partially cut off at the canvas edge
  image_description: The plot displays a US map with circular bubbles overlaid on
    each state, sized proportionally to state population (2020 Census). California
    and Texas have the largest bubbles, clearly dominating visually. The base map
    is shown in subtle light gray with state outlines. A blue sequential color gradient
    (light blue to dark navy) encodes population, reinforcing the size encoding. State
    abbreviation labels appear in white bold text inside each bubble. A vertical color
    legend on the right reads "Population (thousands)" with scale from 0 to 40k. The
    title reads "US Population Cartogram · cartogram-area-distortion · highcharts
    · pyplots.ai" with subtitle "Bubble area proportional to state population — 2020
    Census (thousands)". The northeastern states show some bubble overlap due to geographic
    density. Alaska and Hawaii are partially visible at the bottom-left edge.
