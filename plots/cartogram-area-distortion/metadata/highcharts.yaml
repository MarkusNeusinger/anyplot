  strengths:
  - Excellent Dorling cartogram approach with geographic positioning and proportional
    circle areas
  - Strong design with custom regional color palette, white bubble borders, and faint
    US outline reference
  - Adaptive data label sizing based on population creates visual hierarchy
  - Real US Census 2020 data with accurate population values
  - Clean well-structured code with both PNG and interactive HTML output
  - Annotation box clearly explains the area encoding with min/max reference
  weaknesses:
  - Smallest state bubbles (WY, VT, ND) are very tiny and hard to distinguish
  - Northeast cluster has some label crowding despite geographic spreading
  - Spec mentions contiguous cartograms but implementation uses non-contiguous circles
  - No secondary variable encoded via color intensity (only categorical region coloring)
  image_description: 'The plot displays a Dorling cartogram of US states where circle
    area is proportional to 2020 Census population (in thousands). States are positioned
    roughly according to their geographic coordinates. Four US Census regions are
    color-coded: Northeast (muted blue #3A6DB5), South (warm orange #D97941), Midwest
    (sage green #49873A), and West (muted purple #7B57A0). The title reads "cartogram-area-distortion
    · highcharts · pyplots.ai" with a descriptive subtitle. A faint dotted line traces
    the continental US outline as geographic reference. California is the largest
    circle (southwest), followed by Texas, Florida, and New York. The smallest circles
    (Wyoming, Vermont) are barely visible. State abbreviations are displayed as white
    bold data labels with dark text outline. An annotation box in the lower right
    explains "Circle area = Population" with min/max values. A horizontal legend at
    the bottom identifies the four regions. The background is a light gray (#fafbfc)
    with white bubble borders giving a clean, modern appearance.'
