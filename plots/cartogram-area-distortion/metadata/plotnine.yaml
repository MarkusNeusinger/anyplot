review:
  strengths:
  - Effective dual encoding with size for population and color for GDP per capita
    creates a rich, informative visualization
  - Reference outlines (dashed) provide excellent comparison context against original
    geographic boundaries
  - Clean, well-structured code with appropriate comments and logical data organization
  - Viridis colormap is excellent for colorblind accessibility and perceptual uniformity
  - Informative subtitle and bottom annotation guide viewer interpretation
  weaknesses:
  - Smallest country labels (PT, BE, DK, CH) are too small at 7-8pt and hard to read
  - Central Europe cluster is somewhat crowded with small polygons and labels close
    together
  - Could improve library mastery by leveraging more plotnine-specific features
  - Some wasted vertical canvas space above and below the map area
  image_description: The plot displays a non-contiguous cartogram of 16 European countries
    on a light blue-grey panel background (#f0f3f7). Each country is represented as
    a polygon scaled proportional to its population, with dashed grey outlines showing
    the original geographic boundaries for comparison. Polygons are filled using the
    viridis colormap encoding GDP per capita (thousand USD), ranging from dark purple
    (Romania ~16k) through teal (France, Germany ~44-51k) to yellow-green (Switzerland
    ~93k, Norway ~83k). Countries are labeled with bold 2-letter abbreviations (FR,
    DE, ES, IT, PL, UK, SE, NO, FI, AT, NL, BE, CH, PT, DK, RO). Germany and UK are
    the largest polygons reflecting their high populations, while Norway and Finland
    are small. The title reads "cartogram-area-distortion · plotnine · pyplots.ai"
    in bold 24pt, with a subtitle "Area ∝ Population — 469M total across 16 countries
    | Dashed outlines = original borders". A color legend for GDP per Capita is on
    the right. An italic annotation at bottom-left reads "Larger polygon = larger
    population".
