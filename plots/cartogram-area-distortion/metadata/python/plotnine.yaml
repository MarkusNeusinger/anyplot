review:
  strengths:
  - Creative hexagonal cartogram construction using plotnine polygon layers — builds
    area-distorted hexagons from scratch with sqrt(pop/median_pop) radius scaling
  - 'Dual encoding: polygon area encodes population, fill color encodes urbanization
    rate — clear visual hierarchy shows Nigeria dominance immediately'
  - Reference dashed outlines (alpha=0.45) elegantly show original territory size,
    enabling distortion comparison at a glance
  - 'Both renders pass theme-readability check — dark mode uses correct #1A1A17 background
    with fully adaptive chrome (title, labels, legend all light-colored)'
  - 'Correct imprint_seq gradient (#009E73 → #4467A3) for single-polarity continuous
    data with guide_colorbar(nbin=100) for smooth rendering'
  weaknesses:
  - Bottom annotation text (size=3.1mm ≈ 8.8pt italic) is small enough to be borderline
    at mobile scale (~400px) — consider increasing to 3.5mm
  - Country abbreviation label size=3.3mm is acceptable but on the small side for
    the smallest hexagons (ZM, ML, NE at 20-23M pop); could be raised to 3.8mm
  - 'CQ-01: hex_poly() helper function technically violates KISS — could be inlined
    as a list comprehension or numpy vectorized call'
  - Geographic schematic layout leaves some empty canvas in upper-left corner area;
    tightening coord_fixed xlim slightly could improve canvas utilization
