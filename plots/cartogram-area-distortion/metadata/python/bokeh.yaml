      Data: Circles sized by population (min=22, max=92 px diameter) colored green (#009E73) for small populations through blue (#4467A3) for large. Reference dashed outline circles (size=32, uniform) visible in INK_SOFT. Bold dark stroke on CA, TX, FL, NY, PA for focal emphasis. State abbreviation labels for states >6M population.
      Legibility verdict: PASS — all text readable, no light-on-light failures

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
