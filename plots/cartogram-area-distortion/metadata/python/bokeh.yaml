    outlines all flip correctly between light (#FAF8F1) and dark (#1A1A17) renders
  - All font sizes explicitly set (title 50pt, axis labels 42pt, tick labels 34pt)
    following bokeh style-guide defaults
  - 'Idiomatic Bokeh: ColumnDataSource, transform(), add_layout(), ColorBar, tooltips,
    HTML+PNG dual output all correctly used'
  - State labels for high-population states (pop > 6M) with custom offsets and NJ/MA
    skipped to avoid northeast crowding
  weaknesses:
  - 'SC-01 LOW (3/5): Implementation is a Dorling-style proportional symbol map (circles
    at centroids), not a true contiguous area-distortion cartogram. The spec states
    ''regions should remain contiguous (sharing borders) after distortion'' and uses
    polygon geometry. Consider using geopandas with a simplified US states shapefile
    and scaling polygon areas (e.g. via Dorling cartogram algorithm or scaled polygon
    centroids with actual shape patches) to better match the spec''s intent'
  - 'SC-02 PARTIAL (3/4): ''Original region outlines or reference map inset for comparison''
    is required by the spec. The dashed reference circles approximate this, but actual
    geographic outlines (or a small inset map) would fully satisfy the requirement'
  - 'DE-01 MODERATE (5/8): While above default, the design could reach 6-7 by increasing
    circle fill contrast or adding a more pronounced focal emphasis on the top-5 most
    populated states (e.g. bold stroke on CA, TX, FL, NY, PA circles)'
  - 'DE-02 MODERATE (4/6): The outer plot outline (outline_line_color=INK_SOFT) keeps
    a box frame around the map area. Removing it (outline_line_color=None) would give
    a cleaner, more open cartographic feel more appropriate for a geographic viz'
  - 'Minor: AK and HI placed in the lower-left as fake-coordinate insets — their label
    text (''AK'', ''HI'') at 22pt is smaller than the main state labels (24pt bold).
    Consider making them the same size for consistency'
