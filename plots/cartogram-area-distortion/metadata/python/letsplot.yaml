review:
  strengths:
  - Multi-layer geographic composition (coastline + country outlines + bubble cartogram)
    provides rich spatial context
  - Three-tier label hierarchy (bold large, medium, small by population threshold)
    guides the eye to major countries first
  - Highlighted 'small but wealthy' nations via bold borders + star markers + annotation
    creates clear focal story
  - 'Perfect Imprint palette compliance: sequential imprint_seq gradient (#009E73
    → #4467A3) and theme-adaptive chrome tokens throughout both renders'
  - Dual encoding (bubble size = population, fill color = GDP per capita) with fully
    labeled legends and descriptive subtitle
  - Fully deterministic data — hardcoded realistic European statistics make the plot
    perfectly reproducible
  - Layer_tooltips() used idiomatically for the interactive HTML export alongside
    the PNG output
  weaknesses:
  - 'Bubble/Dorling cartogram approximation rather than true contiguous cartogram:
    the spec describes area-distorted polygons that preserve adjacency, but the implementation
    uses proportional circles overlaid on geographic outlines. True contiguous cartogram
    requires polygon-level distortion algorithms.'
  - Central European cluster (NL, BE, AT, HU, CZ) has crowded overlapping labels and
    bubbles — small countries are hard to distinguish individually; consider nudging
    label offsets or using geom_label with repulsion
  - 'SC-02 gap: contiguity of regions is not preserved after ''distortion'' as the
    spec specifies — bubbles can visually overlap/separate from their outline footprints,
    breaking the adjacency requirement'
  - Stars (shape=8) placed at lat+1.8° are correct in concept but appear very close
    to the surrounding bubble text labels in crowded areas (DK, NL), occasionally
    creating minor visual noise
