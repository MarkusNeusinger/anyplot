review:
  strengths:
  - 'Correct Imprint sequential colormap (#009E73→#4467A3) applied to continuous GDP
    data with correct theme backgrounds (#FAF8F1 light / #1A1A17 dark)'
  - Three-tier label hierarchy (bold large, regular medium, INK_SOFT small) guides
    the eye naturally from major to minor countries
  - Storytelling annotation 'Small nations, highest wealth' with star-marker + thick-border
    redundant encoding for highlighted nations
  - layer_tooltips() used idiomatically for genuine lets-plot interactivity with custom
    title/line formatting
  - Dynamic title font scaling formula (max(11, round(16 × 67 / n))) correctly handles
    the long mandated title without overflow
  - All theme tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG, ELEVATED_BG) wired through
    every theme element — both renders are theme-correct with no dark-on-dark failures
  - Clean KISS code with no functions or classes; deterministic hardcoded data; both
    PNG + HTML outputs saved correctly
  weaknesses:
  - 'Star markers (geom_point shape=8) placed directly on top of country abbreviation
    labels inside highlighted bubbles — SE, NO, DK, FI, AT, CH, IE, BE labels are
    all partially obscured by the star overlay, reducing VQ-01 and VQ-02. Fix: offset
    the star geom vertically (e.g. nudge_y = +2 or place stars slightly above the
    centroid) so the ★ sits above the text rather than on it'
  - 'NL/BE bubbles and their abbreviations are very close in the Central European
    cluster (NL at lon=3.8 and BE at lon=2.8, both near lat=50-52) creating crowded
    label overlap. Fix: spread BE south or NL east by 1-2 degrees to create visual
    separation'
  - 'Not a true contiguous cartogram — bubbles are circles at geographic centroids
    rather than distorted region polygons sharing borders as the spec requires. The
    simplified coastline polygon lacks individual country borders, reducing spec compliance.
    Fix: use geopandas to load actual country polygons and scale them by population
    (Dorling cartogram), or at minimum include country border outlines from a static
    GeoJSON'
  - 'Annotation ''Small nations, highest wealth'' at (-14.5, 65.5) floats visually
    disconnected in the upper left with no arrow or leader line pointing to the highlighted
    bubbles. Fix: move annotation closer to the highlighted cluster (e.g. near Ireland/UK
    at lon=-10, lat=56) or add a simple line/arrow connecting it to the nearest highlighted
    bubble'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface. No axis ticks or grid lines (appropriately removed for a map).
      Chrome: Bold title "European Population Cartogram · cartogram-area-distortion · python · letsplot · anyplot.ai" in dark ink (#1A1A17) — scaled to fit on one line, fully readable. Subtitle "Bubble size = population | Color = GDP per capita | ★ = small but wealthy" in muted ink — readable. Two legends to the right: "GDP/capita (USD K)" colorbar (green→blue) and "Population (M)" size legend — both readable. Annotation "Small nations, highest wealth" in italic muted text, upper left.
      Data: 20 European country bubbles sized by population (5–83M) and filled by GDP per capita (15–100K) using green (#009E73) → blue (#4467A3) Imprint sequential colormap. Simplified European coastline polygon in light outline provides geographic reference. Highlighted small-wealthy nations (BE, SE, AT, CH, NO, DK, FI, IE) have thick dark borders and overlaid star (★) markers.
      Legibility verdict: PASS — all text readable against the light background. Minor issue: star markers overlap with country abbreviations on highlighted bubbles (SE, NO, etc.), reducing label clarity.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title and subtitle appear in light text (#F0EFE8 / #B8B7B0 range) — readable against the dark background. Legends visible with elevated dark box (#242420). Country abbreviations appear in light INK color on the dark surface — readable. No dark-on-dark text failures detected.
      Data: Bubble colors are visually identical to the light render — green→blue gradient unchanged as required. Data colors (Imprint palette) consistent across themes. Europe outline visible as a light gray polygon.
      Legibility verdict: PASS — all text elements readable against the dark background. Same star-overlap issue with highlighted country labels as in light render, but not a theme failure.
