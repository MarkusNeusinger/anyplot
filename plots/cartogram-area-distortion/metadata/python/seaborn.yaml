review:
  strengths:
  - 'Creative Demers tile-grid cartogram: square tile area scales with state population,
    the clearest seaborn-feasible interpretation of an area-distortion cartogram'
  - Equal-area reference inset (top-right) lets the viewer directly compare distorted
    vs. undistorted layout — exactly the spec's 'reference map for comparison' requirement
  - Regional totals bar panel adds a second analytical layer and reinforces the size
    encoding
  - 'Perfect Imprint palette in canonical order (West #009E73, Midwest #C475FD, South
    #4467A3, Northeast #BD8233); first series is brand green'
  - Flawless theme adaptation — both light (#FAF8F1) and dark (#1A1A17) renders fully
    readable, data colors identical, only chrome flips
  - Exact 3200x1800 canvas, despined map, subtle panel divider, population callouts
    on the four largest states — publication-grade multi-panel composition
  - Neutral, factually-correct US Census population data (CA 39M, TX 30M, FL 22M,
    NY 20M) — avoids the political framing the spec's election example could have
    invited
  weaknesses:
  - Large adjacent tiles slightly overlap (CA/AZ, NY/PA) — the PAGE_BG edge stroke
    separates them but the overlap is a minor cartogram artifact; consider a small
    inter-tile gap or scaling down size_max a touch
  - Smallest state abbreviations (WY, VT, ND at ~4.5pt) are legible at full resolution
    but become marginal when the PNG is scaled to ~400px mobile width — raise the
    lower font bound slightly
  - This is a tile-grid (Demers) cartogram rather than the true contiguous shape-preserving
    cartogram the spec emphasises; tiles do not strictly share borders after rescaling.
    This is the right tradeoff for seaborn (no geometry support) but is a partial
    match to SC-02's 'remain contiguous, sharing borders' note
  - numpy is imported and np.random.seed(42) is set, but the data is fully hardcoded
    so the seed is inert — harmless but slightly misleading
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) across all panels — not pure white. Correct.
      Chrome: Title "cartogram-area-distortion · python · seaborn · anyplot.ai" in dark ink, ~63% width, fully readable. Italic muted subtitle "Tile area ∝ state population (millions)". Bar-panel axis "Total population (M)" with ticks 0/50/100/150. Legend box "Region" with ELEVATED_BG fill. All chrome readable.
      Data: US states as square tiles sized by population, colored by Census region — West green #009E73, Midwest lavender #C475FD, South blue #4467A3, Northeast ochre #BD8233. First series is brand green. CA/TX/FL/NY carry population callouts. White state abbreviations with dark stroke. Equal-area reference inset top-right; regional totals bars (78/69/126/58M) bottom-right.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) across all panels — not pure black. Correct.
      Chrome: Title and panel titles in light ink (#F0EFE8), tick/legend text in soft light grey — all clearly readable, no dark-on-dark. Legend frame uses dark ELEVATED_BG (#242420).
      Data: identical region colors to the light render (green/lavender/blue/ochre unchanged); only chrome flipped. White state labels still legible on tiles.
      Legibility verdict: PASS
