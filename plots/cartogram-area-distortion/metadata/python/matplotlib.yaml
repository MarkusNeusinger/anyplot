review:
  strengths:
  - Sophisticated Dorling cartogram using PatchCollection for efficient circle rendering
    with collision avoidance algorithm
  - 'Correct imprint_seq colormap applied to continuous GDP data; theme-adaptive backgrounds
    (#FAF8F1 / #1A1A17) fully implemented'
  - PathEffects.withStroke for state label legibility over variable-colored circles;
    drop shadows on large circles
  - 'All spec features present: size legend, colorbar, reference inset map, region
    abbreviations, and three targeted annotations'
  - Code is clean, sequential, seeded, and uses idiomatic matplotlib — fig.add_axes
    for precise multi-panel layout, ScalarMappable for colorbar
  weaknesses:
  - Dorling cartogram (floating circles) does not preserve contiguity/adjacency as
    described in the spec — true contiguous cartograms maintain shared borders after
    area scaling; a note clarifying the Dorling interpretation would help
  - Northeast corridor (NY, NJ, CT, RI, MA, VT, NH, ME, DE, MD, PA) is visually crowded
    — many small circles packed tightly, making individual state boundaries and positions
    difficult to distinguish despite collision avoidance
  - 'DE-01: Design sophistication is solid but not exceptional — could be elevated
    with a subtle background lat-long graticule or faint US outline overlay to anchor
    the floating circles geographically'
