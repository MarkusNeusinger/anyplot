review:
  strengths:
  - Imprint palette perfectly applied to 4 US Census regions in canonical order; both
    themes render with correct chrome (background, text, legend box colors all flip
    correctly)
  - 'Strong data storytelling: bold outlines for top-5 states, population labels inside
    major circles, subtitle explaining encoding, annotation with aggregate insight'
  - 'Excellent use of Altair geographic features: topo_feature background, AlbersUSA
    projection, lon/lat encodings, layer composition'
  - Hardcoded 2023 census data is factually accurate and neutral; spans a wide population
    range (0.6M–38.9M) showing good variation
  - PAD-only canvas strategy correctly implemented; HTML output included for interactivity
  weaknesses:
  - Dorling cartogram (circles at centroids) does not implement the contiguous polygon
    distortion described in the spec — consider using cartopy + a precomputed Gastner–Newman
    or Dougenik–Chrisman–Niemeyer cartogram to generate distorted GeoJSON polygons
    that can be rendered as Altair geoshape marks
  - NE cluster (NY/PA/NJ/MA) has significant circle overlap due to close geographic
    centroids with large circle radii — reduce the max size of the range (e.g., range=[40,
    2000]) or add a force-directed adjustment to separate overlapping centroids
  - circles_main and circles_top5 duplicate most encoding properties — merge into
    a single layer using alt.condition on a predicate to differentiate stroke for
    top-5 states in a single mark_circle() layer
