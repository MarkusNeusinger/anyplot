      Data: Region data colors identical to light render (#009E73, #C475FD, #4467A3, #BD8233) — palette positions constant across themes as required. Reference map uses dark muted fill (#252521) and dark stroke (#3A3A36). Only chrome elements flip; data colors unchanged.
