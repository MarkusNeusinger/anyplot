  - Tile labels on small cells (S. Korea, Vietnam, Australia strip) are very small
    at full resolution and effectively invisible at mobile/thumbnail widths — increase
    value_font_size or use abbreviated 2-letter codes for small tiles
  - 'DE-03: The static PNG gives no indication of the distortion ratio concept without
    interacting with the HTML tooltip; consider adding a subtitle or annotation below
    the title'
