      Data: All 5 continent tile colours are identical to the light render (green / lavender / blue / ochre / matte-red) — correct, only chrome flips. Tile interior labels appear as light text on coloured tile backgrounds — legible for larger tiles.
      Legibility verdict: PASS — no dark-on-dark failures; title and legend readable; data colours constant between themes.
