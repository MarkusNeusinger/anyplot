review:
  strengths:
  - Theme-adaptive chrome correctly implemented with all pygal Style tokens (background,
    foreground, foreground_strong, foreground_subtle)
  - 'Imprint palette applied in canonical order; brand green #009E73 correctly leads
    as Asia (first series)'
  - Per-node formatter lambda is a genuine pygal distinctive feature, providing distortion
    ratio narrative in hover tooltips
  - SHORT_LABELS abbreviation system for small tiles and ABBREV_THRESHOLD logic is
    thoughtful UX design
  - Reproducible deterministic data (2024 population estimates hardcoded)
  - 'Perfect code quality: clean imports, KISS structure, correct output filenames'
  weaknesses:
  - 'SC-02: Spec requires a colour scale encoding a secondary variable (e.g., population
    density, GDP per capita) — currently colour only encodes continent grouping (categorical).
    Add a secondary continuous colour dimension within tiles if the chart type allows,
    or use tile-border intensity.'
  - 'SC-02: Spec requires original region outlines or a reference map inset for geographic
    comparison — completely absent from both static renders.'
  - 'SC-01: Treemap does not preserve geographic contiguity or adjacency — accepted
    limitation of pygal, but should be noted in a subtitle/caption to educate viewers.'
  - 'VQ-01/VQ-03: Tile labels on small countries (Bangladesh, Vietnam/VN, S.Korea/KR,
    Colombia/CO, Kenya/KE, Oceania strip) are extremely small. Consider increasing
    value_font_size slightly or using a minimum tile-size threshold for label visibility.'
  - 'DE-02: The Oceania tile (Australia only) is reduced to an impractically narrow
    strip on the far right edge. Could be improved by placing Oceania as a combined
    group note in the legend only, or aggregating with a placeholder.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface
      Chrome: Two-line title/subtitle in dark ink (#1A1A17), spanning ~90% of canvas width. Both lines readable. No axis labels (treemap). Bottom legend shows 5 continent swatches with text — clearly readable.
