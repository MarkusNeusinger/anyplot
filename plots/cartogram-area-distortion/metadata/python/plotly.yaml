review:
  strengths:
  - Correct canvas dimensions (3200×1800 landscape) with autosize=False
  - Full theme-adaptive chrome — PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED all
    switched via ANYPLOT_THEME; geo land/lake/boundary colors also adapt
  - 'Imprint sequential colorscale (imprint_seq: #009E73→#4467A3) correctly applied
    to continuous density variable'
  - Two-layer plotly geo approach — Choropleth reference outlines provide geographic
    context while Scattergeo bubbles encode the cartogram data
  - Comprehensive 50-state dataset with real 2023 Census population, area, and derived
    density values
  - NE state coordinate offsets intelligently reduce clutter in the dense northeast
    cluster
  - State abbreviation labels scale with bubble size using a formula, appearing only
    on states with ≥2M population
  - Dual encoding (size=population, color=density) clearly communicated via annotation
    and colorbar
  - Data-storytelling annotation highlights the California vs NJ contrast — a genuinely
    insightful comparison
  - Clean linear code structure, deterministic data, correct write_image + write_html
    output pattern
  weaknesses:
  - Bubble (Dorling) cartogram rather than a contiguous cartogram — spec primarily
    describes contiguous cartograms where actual region boundaries are distorted;
    bubbles at centroids do not preserve adjacency/contiguous borders. For the next
    attempt consider a true contiguous or rectangular cartogram if a library supports
    it, otherwise clearly note the Dorling approach is a deliberate simplification.
  - Northeast region remains cluttered despite coordinate offsets — NJ, CT, MA, RI,
    DE bubbles visually overlap in both renders, making individual state boundaries
    hard to distinguish. Consider increasing the offset magnitudes or adding a small
    inset zoom panel for the NE region.
  - State abbreviation labels use a hardcoded light colour (#F0EFE8) that works against
    the coloured bubbles but is slightly redundant with the light theme's INK_SOFT
    token — minor consistency issue, not impactful.
  - The insight annotation box at x=0.02, y=0.27 sits in the southwest quadrant where
    several state bubbles also appear, creating a visually crowded area. Repositioning
    to x=0.02, y=0.08 (just above the bottom subtitle annotation) would give it more
    breathing room.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) covering the full canvas — PASS, not pure white.
      Chrome: Title "U.S. States Population Cartogram · cartogram-area-distortion · python · plotly · anyplot.ai" rendered in dark ink (#1A1A17) at ~12px, centred, fully readable. Colorbar title "Population Density (per sq mi)" and tick labels (10, 50, 100, 500, 1k, 5k) use INK/INK_SOFT tokens and are clearly legible. Bottom annotation "Area proportional to population · Color proportional to density" uses INK_MUTED and is readable. Insight annotation box (ELEVATED_BG fill) in lower left is readable. All text passes on the light surface.
      Data: Bubble sizes proportional to population via sqrt scaling — California and Texas dominate, small states have minimum-clipped circles. Bubbles coloured with imprint_seq (#009E73 green at low density → #4467A3 blue at high density). State abbreviations in white (#F0EFE8) on the larger bubbles are visible. Faint state boundary outlines (Choropleth reference layer) provide geographic context.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) covering the full canvas — PASS, not pure black.
      Chrome: Title and all annotation text rendered in light ink (#F0EFE8) against the dark background — all clearly readable, no dark-on-dark failures detected. Colorbar labels switch to INK_SOFT (#B8B7B0) and remain legible. Map land colour switches to #242420 (ELEVATED_BG dark), lake colour to #2A2A26 — both visually correct. Boundary lines use lighter rgba for dark theme.
      Data: Bubble fill colours are visually identical to the light render (imprint_seq green→blue). State labels remain white (#F0EFE8) — still contrasts well against the coloured bubbles on the dark surface. Brand green (#009E73) is clearly visible at the low-density end of the colorscale.
      Legibility verdict: PASS
