review:
  strengths:
  - Real 2023 US Census data with accurate population and area values; logarithmic
    density colorscale handles the wide dynamic range elegantly
  - NE state fan-offset strategy prevents dense overlap in the crowded northeast corridor
    — thoughtful geographic layout decision
  - Dual-encoding (bubble size = population, color = density) clearly distinguishes
    two independent variables on a single map
  - Faint choropleth reference layer preserves geographic context while Dorling bubbles
    encode the cartogram distortion
  - Data-driven insight annotation ('California 39M... yet NJ 4× denser') actively
    guides the viewer to a specific comparison
  - 'Full theme-adaptive chrome: all tokens (INK, INK_SOFT, ELEVATED_BG, geo backgrounds)
    correctly flip between light and dark'
  - imprint_seq colorscale correctly applied to continuous single-polarity density
    data
  - Interactive HTML alongside PNG; colorbar tick labels rendered at human-readable
    scale (10, 50, 100, 500, 1k, 5k)
  weaknesses:
  - Title fontsize floors at 11px (minimum = 11 from formula) — at scale=4 renders
    to 44 source pixels, noticeably smaller than the 64px standard; consider raising
    the floor to 12 or using a slightly shorter descriptive prefix
  - Dorling cartogram doesn't preserve contiguous adjacency as specified ('regions
    should remain contiguous, sharing borders after distortion'); a true contiguous
    cartogram would more fully satisfy the spec's stated requirement
  - No dedicated reference map inset showing geographic boundaries at true area; the
    faint choropleth outlines provide partial context but the spec explicitly calls
    for a 'reference map inset for comparison'
  - Some small states (RI, DE, CT) appear as tiny unlabeled dots with minimal visual
    differentiation; min bubble size of 12px is correct but a size-legend callout
    would help readers calibrate area-to-population mapping
  image_description: |-
