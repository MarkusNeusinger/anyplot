      Data: Bubbles colored green (#009E73) at low density to blue (#4467A3) at high density via imprint_seq. CA, TX, FL largest bubbles (highest population). State abbreviation labels in cream (#F0EFE8) on larger bubbles. Faint state boundary outlines as reference layer.
      Legibility verdict: PASS — all text readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, no pure black
      Chrome: Title in light ink (#F0EFE8), clearly visible. Colorbar text in light-muted color, readable. Footer and callout annotations visible. Geo land color flips to #242420, lake color to #2A2A26.
      Data: Bubble colors identical to light render (imprint_seq green→blue unchanged). State labels still cream-white on bubbles — same color as light render, still contrasts well against the colored bubbles. Boundary lines subtly visible.
      Legibility verdict: PASS — no dark-on-dark failures detected; all chrome correctly inverted
