review:
  strengths:
  - Custom diverging color palette with smooth interpolation creates visual identity
  - All 50 states with realistic census-approximate population data
  - Reference circles provide a clever equal-area baseline comparison
  - Bokeh-specific interactive features (hover tooltips, HTML export) demonstrate
    library value
  - 'Well-refined visual styling: subtle grid, warm background, removed minor ticks,
    outline removed'
  weaknesses:
  - Helper functions for palette interpolation break KISS; built-in Bokeh palettes
    would be simpler
  - Mid-range brown/amber circles have low contrast against the warm cream background
  - No explicit size legend mapping circle area to population values
  - Not a contiguous cartogram as described in the spec (Dorling circles vs. distorted
    polygons)
  image_description: The plot displays a Dorling-style cartogram of all 50 US states,
    where each state is represented as a circle positioned at its approximate geographic
    coordinates (longitude on x-axis, latitude on y-axis). Circle area is proportional
    to state population using sqrt scaling, ranging from tiny circles for Wyoming
    (0.6M) to large circles for California (39M). A custom diverging color palette
    maps population from light cream (low) through warm amber and deep brown (mid-range)
    to dark slate and ocean teal (high). Major states (pop > 7M) are labeled with
    bold abbreviations — CA, TX, FL, NY, PA, IL, OH, etc. — with manual offsets applied
    in the crowded northeast. Small dotted reference circles show an equal-area baseline
    for comparison, annotated in the upper-left. A vertical color bar on the right
    indicates population in millions. The background is a warm off-white (#f5f3ef)
    with very subtle grid lines. Alaska and Hawaii are placed in inset positions in
    the lower-left corner with labels.
