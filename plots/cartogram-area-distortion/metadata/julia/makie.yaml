      Data: US states as proportional circles. CA (ochre, large ~37 px) dominates western region. TX (lavender, large) and FL (lavender, medium) prominent in the south. NY (green, large) and NJ/PA/MA (green, medium) form the dense northeast cluster. Midwest states (OH, IL, MI) in blue. Grid lines are subtle at 15% opacity. State abbreviations labeled inside/near each circle in INK (dark). Northeast cluster shows label crowding with MA, NJ, CT, RI, VT, NH abbreviations overlapping.
      Reference map: Top-right inset with small equal-size dots in same census-region colors. Legend panel shows four Imprint colors correctly labeled.
      Legibility verdict: PASS — all chrome text is readable. Minor label crowding in NE cluster degrades readability of individual state abbreviations but is not a legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface.
