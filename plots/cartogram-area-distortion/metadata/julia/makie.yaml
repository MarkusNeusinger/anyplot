review:
  strengths:
  - Excellent Imprint palette usage — positions 1–4 for four census regions with brand
    green correctly anchoring the Northeast
  - Perfect theme-adaptive chrome — all tokens (INK, INK_SOFT, INK_MUTED, PAGE_BG,
    ELEVATED_BG) correctly applied in both renders; no dark-on-dark failure
  - Real 2020 US Census population data for all 50 states, genuinely informative and
    neutral context
  - Idiomatic CairoMakie code — layout grid, RGBAf grid colors, MarkerElement legend,
    explicit font sizing throughout
  - Informative caption explains the Dorling cartogram encoding and AK/HI repositioning
  weaknesses:
  - No Dorling layout optimization — circles placed at true geographic coordinates
    cause significant overlap in the dense Northeast region (CT, RI, VT, NH, MA, NJ
    circles and labels collide); consider jittering or manually offsetting the most
    crowded states, or reducing circle sizes by ~15% across the board
  - AK circle is nearly invisible (very small population results in a tiny circle);
    enforce a minimum circle size (e.g., max(sqrt(p) * size_scale, 8.0)) so all states
    have at least a visible dot
  - Missing reference map inset as described in the spec Notes — a small thumbnail
    of the actual US map in one corner would help readers orient the distortion
