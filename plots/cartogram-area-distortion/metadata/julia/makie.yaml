review:
  strengths:
  - Correct Imprint palette in canonical region order (Northeast=green, South=lavender,
    Midwest=blue, West=ochre)
  - Reference map inset provides excellent side-by-side comparison with equal-size
    geographic layout
  - Leader lines for the dense Northeast cluster elegantly resolve label overlap
  - Full theme-adaptive chrome with all chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG,
    PAGE_BG) correctly applied in both renders
  - KISS code structure with deterministic hardcoded census data and clean import
    set
  - Accurate 2020 US Census population data for all 50 states with correct relative
    proportions
  weaknesses:
  - Continuous color scale for a secondary variable is absent — spec recommends encoding
    a secondary numeric variable via color gradient (imprint_seq); the current categorical
    region coloring is valid but a continuous fill for e.g. population density or
    per-capita GDP would better satisfy the spec
  - Reference map dots are small (6px circles at geographic positions) but no actual
    state boundary outlines are shown — adding thin polygon outlines would fulfill
    the spec more literally
  - State abbreviation labels at fontsize=10 (20px in output) become quite small at
    mobile scale (~400px width) — consider increasing to 11-12pt or limiting labels
    to the most populous states
  - Some visual crowding in the Midwest cluster (OH, IN, IL, MO at similar latitudes)
    where medium-sized circles and labels are densely packed without leader-line relief
  - Right-panel vertical space is inefficiently used — the legend floats in the lower
    portion of a 78% column leaving noticeable empty space between legend and bottom
    margin
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface — correct anyplot light theme background
      Chrome: Title "cartogram-area-distortion · julia · makie · anyplot.ai" at fontsize 20 in dark ink (#1A1A17), clearly readable and fills ~60% of the main panel width. Axis labels "Longitude" and "Latitude" in dark ink, tick labels in INK_SOFT — all legible. Bottom caption in INK_MUTED at fontsize 10 (very small but readable at full resolution). Grid lines are subtle (15% opacity), top/right spines removed.
      Data: 50 circles (US states) sized proportionally to population. CA (39.54M, ochre) dominates the West; TX (29.15M, lavender/purple) and FL (21.54M, purple) are the largest South circles; NY (20.20M, green) is the largest Northeast circle; IL/OH/MI (blue) anchor the Midwest. Small states (WY, VT, AK) appear as minimum-size dots. Leader lines in semi-transparent INK_MUTED connect NE cluster circles to offset labels (VT, NH, RI, CT, MA, NJ, DE). Reference map inset top-right shows equal-size dots at geographic centers for comparison. Census region legend (4 entries) is on the right side.
      Legibility verdict: PASS — all text readable against light background; no light-on-light failures detected.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark theme background
      Chrome: Title in light ink (#F0EFE8), axis labels in light ink, tick labels in INK_SOFT (#B8B7B0) — all clearly readable against dark background. Grid lines subtle (15% opacity from INK light token). Legend background uses ELEVATED_BG (#242420). No dark-on-dark failures detected.
