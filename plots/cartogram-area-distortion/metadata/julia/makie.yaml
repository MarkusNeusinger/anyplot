review:
  strengths:
  - 'Correct Imprint palette (positions 1–4: brand green / lavender / blue / ochre)
    applied to four census regions with Northeast always first'
  - Well-structured two-panel layout — Dorling cartogram + reference map inset + census
    region legend in a single figure
  - 'Thorough theme adaptation: all axis properties (titlecolor, xlabelcolor, ylabelcolor,
    xticklabelcolor, yticklabelcolor, spinecolor, gridcolor) threaded through INK/INK_SOFT
    tokens'
  - Reference map inset provides meaningful visual comparison between equal-area and
    population-scaled layouts
  - Caption at bottom provides clear data provenance and methodology note
  weaknesses:
  - 'Northeast cluster overlap: MA, NJ, CT, RI, NH, VT abbreviation labels overlap
    each other and with surrounding circle edges — jitter dict only displaces 5 states,
    several still collide. Consider expanding jitter offsets or using a leader-line
    annotation style for the dense northeast cluster.'
  - Dorling cartogram (proportional circles at geographic centroids) does not preserve
    contiguity or adjacency as the spec explicitly requires ("Regions should remain
    contiguous (sharing borders) after distortion"). A true contiguous cartogram distorts
    polygon shapes rather than using uniform circles.
  - Large unused whitespace in bottom-left quadrant (AK/HI repositioning + Pacific
    gap) reduces layout efficiency — consider scaling the x-axis extent or placing
    AK/HI within a bracketed inset region to tighten the main cartogram view.
  - Reference map panel (Fixed(140) height) is quite small and its internal dots are
    ~3 px — hard to see individual state positions for comparison. Consider a slightly
    taller panel or larger dot size in the ref map.
