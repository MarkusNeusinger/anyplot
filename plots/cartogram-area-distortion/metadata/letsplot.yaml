  strengths:
  - 'Excellent data choice: real European countries with plausible population and
    GDP values'
  - Perfect code quality with clean KISS structure and deterministic data
  - Good dual encoding concept (size + color) for a cartogram visualization
  - Nice geographic context with the faint European coastline outline
  - Correct title format and descriptive legend labels with units
  weaknesses:
  - Small country bubbles (CH, AT, NO, DK, FI, IE, HU) are nearly invisible — minimum
    bubble size too small
  - Missing labels for 7 countries makes it hard to identify smaller nations
  - Spec calls for contiguous cartogram preserving region shapes but implementation
    uses Dorling bubble approach
  - No original region borders or reference inset map for comparison as spec requests
  - Color gradient could use a perceptually-uniform colormap instead of custom yellow-blue
  image_description: The plot displays a Dorling-style bubble cartogram of 20 European
    countries placed at their approximate geographic coordinates over a faint gray
    European coastline outline polygon. Circles are sized proportionally to population
    (millions) and colored by GDP per capita (thousands USD) using a yellow-to-dark-blue
    gradient. Large, labeled circles for Germany (DE), France (FR), UK, Italy (IT),
    Spain (ES), and Poland (PL) dominate the map. Medium countries (NL, BE, CZ, RO,
    SE, GR, PT) have smaller circles with smaller gray labels. Several small countries
    (Switzerland, Austria, Norway, Denmark, Finland, Ireland, Hungary) appear as tiny
    dots that are barely visible. The title reads "European Population Cartogram ·
    cartogram-area-distortion · letsplot · pyplots.ai" in bold at the top. Axes, grid,
    and spines are all removed. Two legends on the right show the population size
    scale and the GDP per capita color gradient.
