  image_description: 'The plot displays a Dorling-style bubble cartogram of 20 European
    countries on a faint European coastline outline. Bubble size is proportional to
    population (Germany largest, small Nordic/Western nations smallest). Color encodes
    GDP per capita using a viridis scale ranging from dark purple (~15K USD) to yellow
    (~100K USD). Large countries (DE, UK, FR, IT, ES, PL) have bold large labels;
    medium countries (RO, NL, CZ, etc.) have medium labels; small countries have small
    labels. Highlighted small-but-wealthy nations (IE, CH, NO, SE, DK, AT, NL, BE,
    FI) have darker strokes and star markers. An annotation block in the top-left
    reads "Small nations, highest GDP/capita" with a separator line and abbreviation
    list. Title: "European Population Cartogram · cartogram-area-distortion · letsplot
    · pyplots.ai". Two legends on the right: GDP per Capita color scale and Population
    size scale. White background, no axes/grid.'
