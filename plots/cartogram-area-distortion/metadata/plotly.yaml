review:
  strengths:
  - Dual encoding (size=population, color=density) creates meaningful visual contrast
    and storytelling
  - Real US state data with accurate population figures and geographic positions
  - Clean code structure with excellent reproducibility
  - Good use of Plotly Scattergeo for native map projection and interactive features
  - Viridis colorscale with well-configured colorbar including log-scale tick labels
  weaknesses:
  - Dorling bubble cartogram does not preserve region shapes as spec describes for
    contiguous cartograms
  - Missing reference map inset or original state boundary outlines for comparison
  - Northeast states have overlapping bubbles due to geographic density
  - State abbreviation labels at size 9 are too small on smaller bubbles
  - Footer annotation should mention both size and color encodings
  image_description: The plot shows a Dorling bubble cartogram of the contiguous US
    plus Alaska and Hawaii. Each state is represented by a circle placed at its approximate
    geographic centroid on a light gray US map outline. Circle size is proportional
    to state population — California, Texas, Florida, and New York have the largest
    bubbles. Color encodes population density using the Viridis colorscale, ranging
    from dark purple (low density, ~10/sq mi for states like Alaska and Montana) to
    yellow-green (high density, ~5k/sq mi for New Jersey). State abbreviations appear
    as white text on each bubble. A colorbar on the right shows "Pop. Density (per
    sq mi)" with tick labels from 10 to 5k. The title reads "US States by Population"
    with subtitle "cartogram-area-distortion · plotly · pyplots.ai". A footer annotation
    reads "Circle area is proportional to state population". The US coastline is shown
    in light gray, with white lakes and a clean white background.
