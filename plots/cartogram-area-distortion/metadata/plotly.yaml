review:
  strengths:
  - Excellent dual encoding (size=population, color=density) provides two dimensions
    of information
  - Viridis colorscale with log-transformed density is a smart analytical choice
  - Clean design with subtle background map, white bubble outlines, and explanatory
    subtitle
  - Perfect code quality with deterministic data and clean structure
  - Good use of Plotly Scattergeo capabilities with HTML interactive output
  weaknesses:
  - Northeast region has significant bubble overlap making labels unreadable
  - State labels at font size 9 are too small for smallest bubbles
  - Dorling bubble approach does not fully match the contiguous cartogram described
    in spec
  - Smallest states are barely visible, need minimum size or alternative handling
  image_description: The plot displays a Dorling-style bubble cartogram of US states
    overlaid on a light gray US map with the Albers USA projection. Each state is
    represented by a circle placed at its approximate centroid, with circle area proportional
    to population. Circles are colored using a Viridis colorscale encoding population
    density (per sq mi) on a log scale, ranging from dark purple (~10/sq mi) through
    teal/green (~100/sq mi) to bright yellow (~5k/sq mi). California and Texas are
    the largest bubbles (dark green/teal), while NJ appears bright yellow (highest
    density). State abbreviations are rendered in white Arial Black text inside the
    bubbles. A colorbar on the right shows density values. The title reads "US States
    by Population · cartogram-area-distortion · plotly · pyplots.ai" and a subtitle
    at the bottom states "Circle area is proportional to state population." The northeast
    region is crowded with many overlapping bubbles.
