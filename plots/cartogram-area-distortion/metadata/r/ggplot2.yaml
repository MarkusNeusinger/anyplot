review:
  strengths:
  - Reference inset (equal-area dots) elegantly illustrates the cartogram distortion
  - Dual encoding (size=population, color=GDP per capita) adds genuine data depth
    without visual clutter
  - Dynamic title-length-aware font scaling prevents overflow on the long mandated
    anyplot title
  - Full theme-adaptive chrome with all tokens consistently threaded through to every
    plot element
  - scale_size_area correctly encodes area proportional to data — perceptually accurate
    bubble sizing
  weaknesses:
  - Dorling cartogram (circles at centroids) does not distort geographic shapes; spec
    describes contiguous cartograms that preserve adjacency while rescaling polygon
    shapes — minor stylistic gap
  - Small-population states (WY, VT, ND, SD < 1M) render as very small unlabeled dots,
    making them hard to locate
  - Northeast cluster (NY, NJ, CT, MA, RI, DE) creates unavoidable circle overlap
    with some label crowding at NJ; slight alpha/stroke tuning could partially mitigate
  image_description: |-
