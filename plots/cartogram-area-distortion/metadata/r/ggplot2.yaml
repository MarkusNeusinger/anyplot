      Data: Circles at geographic centroids; area proportional to population; fill uses Imprint sequential gradient #009E73 (low GDP) -> #4467A3 (high GDP); first/lowest series is brand green #009E73; bold white abbreviation labels on ~24 major states; reference inset in lower-left with gray dots on elevated background
