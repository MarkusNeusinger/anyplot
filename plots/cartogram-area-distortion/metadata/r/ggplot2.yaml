review:
  strengths:
  - Dorling cartogram approach using geom_point with scale_size_area() — the correct
    ggplot2-idiomatic way to achieve proportional-area encoding
  - 'Imprint sequential colormap (brand green #009E73 → blue #4467A3) applied correctly
    to GDP per capita continuous variable'
  - Dynamic title font-size scaling formula prevents overflow for the long mandated
    title
  - Clean theme tokens with full light/dark chrome adaptation — background, text,
    grid, legend box all flip correctly
  - shape=21 with color=PAGE_BG stroke gives crisp circle definition; alpha=0.88 preserves
    some background through overlapping circles
  - coord_fixed(ratio=1.3) preserves approximate geographic proportions of the contiguous
    US
  - Two-legend layout (size + color) clearly communicates both encoded dimensions;
    legend titles include units
  - 'Perfect code quality: KISS structure, set.seed(42), clean imports, ragg device,
    correct output naming'
  weaknesses:
  - Missing reference map inset showing original geographic outlines — the spec explicitly
    requires 'original region outlines or a reference map inset for comparison'; this
    omission significantly reduces the cartogram's educational value
  - Dorling (non-contiguous) cartogram approach means regions do not share borders
    after distortion — the spec states 'regions should remain contiguous'; the implementation
    places circles at centroids with no adjacency preservation
  - Northeast US cluster (NY, NJ, PA, MA, CT, RI, DE) produces heavy circle overlap
    — NJ and NY circles are nearly fully overlapping, making the geographic relationship
    harder to read; consider applying a slight position jitter or reducing max_size
    to 18-20 to reduce crowding
  - Only 13 states labeled (population >= 7.5M) — states like WA, CO, MN, AZ, TN,
    SC are unlabeled despite being moderately prominent circles; consider lowering
    the threshold to ~4M or ~5M to label ~20 states for better geographic reference
  - 'Legend size key renders with circles in light/dark both using outline-only style
    against the legend background — in the dark render the size legend circles (outline
    only, no fill) are barely visible against the #242420 elevated background; consider
    explicitly setting legend key color or fill'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Bold dark title "US States by Population · cartogram-area-distortion · r · ggplot2 · anyplot.ai" readable at ~80% width; axis labels "Longitude" (x) and "Latitude" (y) in dark ink, size 10pt; tick labels in softer dark ink, size 8pt; all text clearly readable against warm off-white surface
      Data: Dorling cartogram with proportional circles at US state centroids; fill color encodes GDP per capita via imprint_seq gradient (brand green #009E73 for low ~47k to blue #4467A3 for high ~95k); circle area encodes population; white state abbreviations labeled inside 13 most populous circles; two legend boxes (Population in millions, GDP per capita in USD thousands) with subtle elevated background and border on right side
      Legibility verdict: PASS — all chrome elements readable; some crowding in the northeast (NY/NJ overlap) but text remains identifiable

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title readable in light cream text against dark surface; axis labels and tick labels render in lighter tones (INK = #F0EFE8, INK_SOFT = #B8B7B0) — all text clearly visible, no dark-on-dark failures; grid lines subtle and visible; legend boxes use #242420 elevated background with light-toned legend text; legend size key circles (outline-only) are marginally less visible against the dark elevated background but still readable
      Data: Data colors are identical to the light render — same green-to-blue gradient for GDP per capita; population sizing unchanged; white state abbreviation labels remain readable against colored circles in both themes
      Legibility verdict: PASS — no dark-on-dark failures observed; legend key circles in size legend are slightly harder to read on dark background but within acceptable bounds
