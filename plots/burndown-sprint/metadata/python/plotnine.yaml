  weaknesses:
  - Annotation text 'Scope\n+8 pts' uses size=3.8 (geom mm ≈ 10.8 pt) and ANYPLOT_AMBER
    color on light background (#FAF8F1); amber has relatively low contrast on cream
    — consider raising to size=4.5 or adding a subtle dark stroke, and ensure it remains
    readable at mobile scale (~400 px wide)
  - geom_ribbon fill alpha=0.12 makes the behind/ahead-of-schedule zone barely perceptible
    in dark render; consider raising to alpha=0.18–0.22 so the storytelling element
    is visible on both surfaces without dominating
  - 'panel_grid_major_y uses element_line(color=INK, size=0.3, alpha=0.12) — plotnine''s
    element_line does not natively support alpha; the alpha kwarg may be silently
    ignored, leaving the grid at full opacity #1A1A17 in light mode (though thin size=0.3
    keeps it subtle). Safer: encode alpha into the hex color string (e.g. ''#1A1A1726''
    for ~15% opacity) rather than relying on element_line alpha'
