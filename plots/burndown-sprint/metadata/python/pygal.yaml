    by default; SVG post-processing could remove the top and right border elements
    to match anyplot's L-shaped-spine standard
  - Weekend shading opacity (7%) is very subtle and may be imperceptible on high-gamma
    displays; 12-15% fill-opacity would retain subtlety while ensuring visibility
  - DE-02 limited by pygal defaults — with no spine removal and moderate grid customization
