review:
  strengths:
  - 'Complete spec coverage: step series, ideal burndown reference line, weekend shading,
    scope change marker with annotation, and legend all implemented correctly'
  - 'Idiomatic Bokeh usage: ColumnDataSource, BoxAnnotation, Span, Label, and p.step()
    mode=''after'' all used appropriately for this chart type'
  - 'Semantic Imprint color mapping: green (#009E73) for actual remaining, blue (#4467A3)
    for reference/ideal, red (#AE3030) for scope change — semantically correct and
    consistent with palette rules'
  - 'Dual encoding on actual vs ideal: color (green vs blue) plus line style (solid
    step vs dashed line) makes them immediately distinguishable even under CVD'
  - 'Both themes correctly implemented: PAGE_BG, ELEVATED_BG, INK, INK_SOFT all theme-adaptive;
    Imprint data colors identical across themes'
  - 'Data storytelling: weekend context explains flat burndown segments; scope annotation
    pinpoints the risk event; visual hierarchy (thick green step > dashed blue ideal)
    guides eye correctly'
  - 'Correct title format with descriptive prefix: ''Sprint Burndown · burndown-sprint
    · python · bokeh · anyplot.ai'''
  - HTML + PNG dual output following bokeh.md conventions; Selenium screenshot with
    PIL crop for exact 3200×1800 canvas
  weaknesses:
  - 'Full box outline retained (outline_line_color = INK_SOFT creates visible 4-sided
    border); style guide recommends L-shaped frame (remove top/right spines). Fix:
    set p.outline_line_color = None to remove the rectangular border.'
  - 'Scope annotation color #AE3030 on dark background #1A1A17 has contrast ratio
    ~2.76:1, below WCAG large-text threshold of 3:1. Fix: on dark theme, consider
    using a slightly lighter red or adding a subtle text shadow to bring contrast
    above 3:1.'
  - Weekend shading at fill_alpha=0.07 is very subtle in dark mode (INK fill on near-identical
    background). Raising to alpha=0.10–0.12 would maintain subtlety while improving
    perception in both themes.
  - One helper function to_ms() present — technically violates KISS 'no functions'
    guideline, though the use is minor and justified for repeated date conversion.
  - Annotation font size 28pt is notably larger than tick labels (34pt) — while legible,
    it draws slightly more visual weight than intended for a secondary annotation;
    22–24pt would better match the tick label hierarchy.
