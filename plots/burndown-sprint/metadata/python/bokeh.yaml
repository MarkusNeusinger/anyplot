    ideal (structural reference), red (#AE3030) for scope change (bad/risk)'
  weaknesses:
  - Scope change annotation text at 22pt is undersized relative to the chart hierarchy
    (tick labels are 34pt, axis labels 42pt) — consider 28-30pt for clearer event
    marking
  - Scope change Span line uses SCOPE_CLR (#AE3030) in both themes; the dark-theme
    lighter variant (#D06060) was applied only to the Label text but not to the Span
    line — the line can be harder to distinguish from the weekend box right-edge in
    the dark render
  - The spec requires 'keep the ahead/behind-schedule reading obvious through color
    or annotation' — the chart relies on implicit visual comparison without a legend
    note or subtitle clarifying which direction is ahead vs behind
