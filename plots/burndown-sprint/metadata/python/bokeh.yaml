      Data: Actual remaining step series in #009E73 (brand green) with circular markers (size 18). Ideal burndown as dashed #4467A3 (blue) straight line from 40→0. Weekend shading (Jun 6–7) as very subtle gray band (alpha=0.07). Red dotdash vertical span at Jun 8 for scope change with italic "+8 pts scope added" annotation in #AE3030.
      Legibility verdict: PASS — all chrome and data labels clearly readable on light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface.
      Chrome: Title in near-white (#F0EFE8) — readable. Axis labels in light ink — readable. Tick labels in #B8B7B0 (INK_SOFT dark) — readable against near-black background. Legend box uses elevated dark (#242420) fill — readable. No dark-on-dark failures for primary chrome elements.
      Data: Data colors identical to light render — brand green #009E73 step series, dashed blue #4467A3 ideal line. Weekend shading subtly lighter than background. Scope annotation "+8 pts scope added" in #AE3030 (matte red) — visible but contrast against #1A1A17 is approximately 2.76:1, below WCAG large-text threshold of 3:1. Borderline readable at 28pt but is a mild accessibility concern.
      Legibility verdict: PASS (with caveat) — all primary chrome is legible; scope annotation color #AE3030 on dark background has borderline contrast (~2.76:1 vs 3:1 WCAG large text minimum).
