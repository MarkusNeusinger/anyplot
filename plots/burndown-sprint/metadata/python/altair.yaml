  - 'Proper Imprint palette usage: brand green #009E73 for actual remaining (first
    series), INK_SOFT semantic neutral for ideal burndown reference line, ANYPLOT_AMBER
    for scope change warning'
  - Full theme adaptation — all chrome (background, grid, axis labels, legend, title)
