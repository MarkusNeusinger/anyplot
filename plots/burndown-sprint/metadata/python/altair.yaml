    df_actual, scope_df) — idiomatic Altair approach
  weaknesses:
  - 'Full X+Y crosshatch grid for a line/step chart — configure_axis gridColor/gridOpacity
    applies to both axes simultaneously, creating visible vertical gridlines the style
    guide reserves for scatter plots (style guide: ''Y-axis grid only for bar/line
    charts''). Split configuration to disable x-axis grid while keeping y-axis grid
    subtle.'
  - No explicit 'ahead / behind schedule' visual cue — spec says 'keep that reading
    obvious through color or annotation'. The crossing of actual vs ideal is visible
    but not highlighted; consider a subtle green-fill region when actual < ideal or
    a small annotation at the crossing point.
  - scope_label positioned at alt.value(12) (fixed px from top) places the '+8 pts'
    text very close to the y=46 scale ceiling in the light render, crowding the top-of-chart
    area. A y=alt.value(30) or a dynamic offset to just above the scope-change step
    would give more breathing room.
