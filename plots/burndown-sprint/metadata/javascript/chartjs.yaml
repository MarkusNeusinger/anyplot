    bottom of the weekend band; could be slightly larger or less transparent for better
    readability on mobile-scaled thumbnails'
  - Y-axis grid extends to both axes (full grid) rather than y-axis-only, which is
    slightly cluttered for a line chart; y-only grid would look cleaner
  - 'LM-02: stepping line and conditional fill are solid Chart.js features, but the
    custom plugin pattern could demonstrate more advanced use (e.g., drawing a custom
    arrow rather than plain text for the scope change annotation)'
