    visible in both renders; consider adding slotProps to reduce grid opacity for
    a more refined look (DE-02)
  - 'Ideal burndown area fill is very subtle (fillOpacity: 0.07) — the ''below ideal
    = ahead of schedule'' reading could be communicated more clearly with slightly
    higher opacity (0.10–0.12) (DE-03)'
