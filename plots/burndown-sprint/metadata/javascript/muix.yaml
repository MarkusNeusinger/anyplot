review:
  strengths:
  - 'Step curve (curve: "step") correctly captures discrete task-completion behavior
    — each data point is a visible circle on the staircase descent, making progress
    increments clear.'
  - ChartsReferenceLine with ochre color and 'Scope +8 pts' label is a strong use
    of MUI X's reference-line API to annotate the mid-sprint scope change — semantically
    well-chosen color from the Imprint palette.
  - 'Both light and dark renders are fully readable with proper theme-adaptive chrome:
    title uses t.ink, tick labels use t.inkSoft, and the ideal burndown uses t.inkSoft
    for a visually subordinate reference line.'
  - 'Brand green #009E73 (t.palette[0]) is correctly used as the first and only categorical
    series (Actual Remaining), fully palette-compliant.'
  - sx CSS-selector overrides (.MuiLineElement-series-ideal, .MuiMarkElement-series-actual)
    are idiomatic MUI X patterns for per-series styling without prop drilling.
  - Realistic 10-day sprint scenario with authentic velocity (40 sp initial, +8 scope
    on day 4, finishing at 2 sp) — plausible and illustrative without being artificial.
  - 'Code is exceptionally clean: flat, deterministic, no unnecessary abstractions,
    both imports are used.'
  weaknesses:
  - Weekend shading is missing — the spec explicitly requires 'shade weekends (non-working
    days) with a light background band.' The x-axis only shows working days so weekends
    are absent from the data entirely; background bands for Sat/Sun should be rendered
    using ChartsReferenceArea or SVG rect overlays to explain the discontinuity between
    Fri/Mon data points.
  - The 'Scope +8 pts' label (rendered at ~y=25 story points at the Thu 4 x-position)
    is positioned very close to the dashed ideal burndown line which passes through
    approximately y=24 at that column — the two elements nearly overlap, reducing
    legibility of both the annotation and the reference line in that zone. Consider
    repositioning the label above y=40 or using a labelAlign prop to move it to the
    top of the reference line.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct anyplot surface color.
      Chrome: Title "burndown-sprint · javascript · muix · anyplot.ai" appears in dark ink at top-left (~fontSize 22 CSS px), fully readable. Y-axis label "Story Points Remaining" is dark and clearly legible on the left. X-axis tick labels (Start, Mon 1, Tue 2 … Fri 12) and Y-axis tick labels (0, 5, 10 … 45) are rendered in inkSoft (dark gray) — all readable against the cream background.
      Data: Actual Remaining series in brand green (#009E73) drawn as a staircase (step curve) with open circle markers at each day endpoint. Ideal Burndown line in gray-brown inkSoft rendered as a dashed diagonal from (Start,40) to (Fri 12,0), visually subordinate. A vertical dashed ochre line at "Thu 4" with label "Scope +8 pts" marks the scope change. Legend at top shows green line swatch for "Actual Remaining" and gray swatch for "Ideal Burndown."
      Legibility verdict: PASS — all text readable. Minor: "Scope +8 pts" ochre label has slightly lower contrast against cream background but is still legible. Label position overlaps slightly with the dashed ideal line at ~y=25.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct anyplot dark surface.
      Chrome: Title appears in light cream text (t.ink = #F0EFE8) against the dark background — fully readable. Y-axis label "Story Points Remaining" visible in light ink. X-axis and Y-axis tick labels rendered in light inkSoft (#B8B7B0) — clearly legible against the dark background. No dark-on-dark failures found.
      Data: Data colors are identical to the light render — brand green (#009E73) for Actual Remaining, gray dashed line for Ideal Burndown, ochre dashed vertical for scope change. The green step curve is vibrant and clearly distinguishable on the dark surface. The ochre label "Scope +8 pts" has improved contrast on the dark background.
      Legibility verdict: PASS — all text readable in dark mode. Theme adaptation is correct: chrome flips, data colors remain constant.
