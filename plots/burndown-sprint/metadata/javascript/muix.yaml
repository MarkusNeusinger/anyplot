  - 'Excellent spec compliance — all required features present: step burndown, ideal
    reference line, weekend shading, scope change marker with annotation, and legend'
  - WeekendBand component using useXScale and useDrawingArea MUI X hooks is idiomatic
    and demonstrates deep library knowledge — impossible to replicate in non-React
    charting libraries
  - 'Proper Imprint palette usage: first series in #009E73, ideal reference line in
    muted chrome token (inkSoft), scope marker in palette[3] ochre for visual distinction'
