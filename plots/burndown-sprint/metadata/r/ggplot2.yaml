    legend, and grid
  - Dynamic title font-size scaling formula prevents overflow for the mandated long
    title string
  - legend.position.inside (ggplot2 3.5+ API) cleanly places legend inside plot area
    without margin waste
  weaknesses:
  - weekend annotation text (size=2.2, angle=90) is very small and may be hard to
    read at mobile widths — increase to size~2.8 or remove rotation and anchor to
    a bottom note
  - Scope-change annotation at y=54 is close to the step jump at y=56 (day 5) — adds
    visual crowding in a dense area; consider nudging y to 58 or placing text above
    60
  - 'DE-02: grid lines use INK_SOFT (#4A4A44 in light, solid) — ggplot2 cannot apply
    grid alpha natively, but the 0.2 linewidth makes them slightly more prominent
    than the style-guide 15%-opacity target; consider theme_minimal()s implicit lighter
    gray instead of INK_SOFT directly'
