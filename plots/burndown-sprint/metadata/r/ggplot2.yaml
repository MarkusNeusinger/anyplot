  - Step-series burndown using geom_step() natively — correct discrete-completion
    representation
  - Semantic use of amber (#DDCC77) for scope-change warning matches the Imprint anchor
    intent exactly
  - Dual color+linetype legend combined cleanly via guide_legend(override.aes) + guide_none()
    — idiomatic ggplot2
  - 'All Imprint palette compliance correct: #009E73 for actual, #4467A3 for ideal,
    #FAF8F1/#1A1A17 backgrounds'
