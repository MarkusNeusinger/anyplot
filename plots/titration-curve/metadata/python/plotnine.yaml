review:
  strengths:
  - 'Perfect spec compliance: all required features present (S-curve, equivalence
    marker with dashed line + annotation, derivative overlay, transition shading).'
  - 'Idiomatic plotnine grammar-of-graphics: long-format DataFrame + scale_color_manual
    + multi-geom layering executed cleanly.'
  - 'Fully theme-adaptive: all chrome tokens (background, text, grid, legend, annotations)
    adapt correctly between light and dark themes — no dark-on-dark failures.'
  - 'Analytically accurate data: vectorized strong acid/base calculation with denser
    sampling around equivalence point for smooth rendering.'
  - geom_ribbon for transition zone shading is the right plotnine idiom (not patched
    on as a matplotlib workaround).
  weaknesses:
  - 'Legend order is reversed: dpH/dV (scaled) appears before pH in the legend due
    to alphabetical sorting. Fix by setting pd.Categorical on the series column: df["series"]
    = pd.Categorical(df["series"], categories=["pH", "dpH/dV (scaled)"], ordered=True).'
  - Equivalence point annotation font is small (geom_text size=3mm ≈ 8.5pt italic)
    — marginally readable on mobile. Bump to size=3.5–4 to match the Peak dpH/dV label.
  - The derivative area fill at alpha=0.18 and the flat near-zero portions are barely
    distinguishable from the baseline. A slightly higher alpha (0.25) or more prominent
    fill color would improve storytelling impact.
