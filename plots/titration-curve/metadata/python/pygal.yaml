review:
  strengths:
  - 'Perfect Imprint palette application: green main curve, lavender derivative, semantic
    red for equivalence threshold, muted for reference — intentional semantic color
    roles throughout'
  - Correct dual-axis setup using pygal's secondary=True API, including secondary_range
    configuration
  - 'Theme adaptation is complete in both renders: warm off-white / near-black backgrounds
    with correct ink tokens'
  - All font sizes explicitly set following style guide defaults for pygal (title
    66, labels 56, ticks 44)
  - Factually correct titration chemistry — HCl+NaOH at 0.1M, equivalence at pH 7,
    500 data points for smooth curve
  - Simultaneous PNG + interactive HTML export leverages pygal's core strength
  weaknesses:
  - 'secondary_range=(0.0, 0.7) clips the normalized derivative peak (peak=1.0 exceeds
    range; top of spike is cut off within chart area). Fix: use secondary_range=(0.0,
    1.1) to display the full spike with 10% headroom.'
  - 'Annotation dot is very small (dots_size=10 with value_font_size=36 produces barely-visible
    label at (27.5, 9.0)). The spec requires a clear text annotation at the equivalence
    point. Fix: increase dots_size to 20-30 and consider placing the annotation at
    a less crowded position (e.g., (30, 5) below the equivalence line).'
  - 'At x=25 mL, derivative spike and equivalence vertical line visually overlap at
    the steepest region of the pH curve, making them harder to distinguish at reduced
    scale. Fix: widen the equivalence dasharray gaps or use a slightly different x
    offset for the annotation.'
