review:
  strengths:
  - Scientifically accurate chemistry with correct pH calculations for strong acid/base
    titration using proper equilibrium equations
  - 'Excellent use of Imprint semantic colors: brand green for pH curve, matte red
    for equivalence point, blue for buffer/basic region — all semantically justified'
  - 'Multi-layered visual storytelling: acidic/basic background regions, buffer shading,
    equivalence annotation, derivative overlay, and region labels create an immediately
    readable narrative'
  - Perfect palette and theme compliance in both renders — no dark-on-dark or wrong-theme
    failures across light and dark modes
  - Interactive layer_tooltips() with formatted hover information on the pH curve,
    demonstrating letsplot's distinctive interactive capability
  - Deterministic, reproducible data generation with exact chemical equilibrium equations
    — no random data needed
  weaknesses:
  - Full 4-sided plot border visible despite panel_border=element_blank() — suppress
    top and right axis lines or use a base theme that removes the panel box to achieve
    the L-shaped or no-border style required by the style guide
  - Legend box has a visible INK_SOFT color border — remove the color parameter from
    legend_background=element_rect(...) to drop the legend frame per the decoration
    removal checklist
  - Derivative curve is on the primary pH axis (scaled) rather than a true secondary
    y-axis as specified in the spec — use scale_y_continuous(sec_axis=...) if available
    in letsplot, or document the scaling workaround more prominently
  - Axis title font at size=15 bold and plot title at size=20 are slightly above style-guide
    starting values (12px and 16px for scale-based libs) — consider reducing to 12/16
    to tighten proportions and align with style guide
