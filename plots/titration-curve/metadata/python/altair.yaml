review:
  strengths:
  - Dual y-axis implemented correctly with Altair's resolve_scale(y="independent")
    — technically demanding in a declarative grammar and executed cleanly
  - 'Imprint palette applied correctly: #009E73 for primary pH curve, #C475FD (position
    2) for derivative, #AE3030 (position 5) used semantically for equivalence point
    annotation'
  - 'Complete theme adaptation: PAGE_BG, INK, INK_SOFT tokens threaded through every
    axis, legend, and title element in both renders — dark render is fully readable
    with no dark-on-dark failures'
  - 'Scientific accuracy: HCl + NaOH 0.1 M system with correct equivalence point at
    pH 7 / 25 mL; derivative computed via np.gradient and clipped at 25 pH/mL to expose
    regional gradients'
  - Equivalence point marked with three redundant cues (vertical dashed line, diamond
    marker, text annotation) plus a pH 7 horizontal reference line — excellent focal
    point for data storytelling
  - 'Color-coded right axis (label and ticks in #C475FD) connects derivative axis
    to its curve — a polished UX touch'
  - Legend uses a clever Altair-specific ghost-line workaround (ph=-100 invisible
    lines) to create mark_line legend swatches — idiomatic for this library
  - Code is clean KISS structure with sys.path fix for the filename-shadowing issue
    handled unobtrusively at the top
  weaknesses:
  - 'DE-01 capped at 6/8: design is clearly above defaults (subtitle, color-coded
    axes, styled legend) but hasn''t reached publication-ready / FiveThirtyEight polish
    — the inner chart area is somewhat plain white space between the S-curve and the
    derivative spike'
  - 'DE-02: horizontal grid uses gridOpacity=0.15 with INK color — in the dark render
    this produces faint but visible white stripes; the overall refinement is good
    but not ''every detail polished'' territory'
  - 'DE-03: visual hierarchy is effective (thick green primary vs thin dashed purple
    secondary) but the data storytelling could be stronger — the buffer region is
    absent (defensible for HCl/NaOH system) but an annotation noting the absence or
    explaining the steep jump would add narrative value'
