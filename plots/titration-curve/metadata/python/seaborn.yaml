review:
  strengths:
  - 'Perfect spec compliance: equivalence point marker, annotation, derivative dpH/dV
    overlay on secondary y-axis, and transition zone shading all implemented correctly'
  - Chemically accurate strong acid/strong base (HCl/NaOH) titration — equivalence
    point at pH 7, full pH 0-14 scale, realistic 0.1 M concentrations
  - All font sizes explicitly set (title 12pt, axis labels 10pt, ticks 8pt, legend
    8pt) — readable in both themes at desktop and mobile scale
  - 'Correct Imprint palette: brand green #009E73 for pH curve (first series), lavender
    #C475FD for derivative (second series); backgrounds #FAF8F1 / #1A1A17'
  - Theme-adaptive chrome correctly implemented via sns.set_theme() rc params — no
    dark-on-dark or light-on-light issues
  - Color-coded right spine matching the derivative (#C475FD) is a thoughtful refinement
    detail
  - Clean KISS structure with no functions or classes; deterministic (no random elements)
  weaknesses:
  - 'Derivative dpH/dV curve is visually faint: the dotted linewidth=1.5 line is essentially
    flat at zero across most of the volume range and its spike at 25 mL is hard to
    distinguish from the dashed equivalence-point marker — the two vertical features
    overlap, undermining the derivative''s stated purpose of ''precisely locating''
    the equivalence point. Consider making the derivative more prominent (thicker
    line, higher alpha, or fill-under the spike) so its peak is clearly visible as
    a separate feature'
  - 'Design Excellence is below publication-ready: the plot is clean and functional
    but not visually sophisticated. To push past the 90-point first-attempt threshold,
    add more visual storytelling — e.g., mark the half-equivalence point, add a pH
    indicator range band, or emphasize the inflection region with stronger visual
    hierarchy beyond the current 7% opacity transition zone'
  - 'Seaborn library mastery is limited: only sns.lineplot() and sns.set_theme() are
    used — the derivative, annotations, twin axes, and fills are all pure matplotlib.
    Consider using sns.lineplot() with seaborn''s built-in confidence band (errorbar)
    to show titration uncertainty, or sns.set_context() for scale control, to demonstrate
    more distinctive seaborn usage'
  - 'DQ-01 minor: the derivative spike''s limited visual prominence reduces the feature
    coverage story — a reader viewing the plot at thumbnail size would not clearly
    perceive the derivative as a second data series'
