  image_description: The plot displays an acid-base titration curve for HCl (0.1 M,
    25 mL) titrated with NaOH (0.1 M). The main curve is a solid blue line (#306998)
    showing the characteristic S-shaped sigmoidal pH response, starting at pH ~1 and
    rising steeply around 25 mL to reach pH ~12.5. A vertical dashed purple (#7B2D8E)
    line marks the equivalence point at 25 mL, with a purple diamond marker at pH
    7.0. An annotation in purple reads "Equivalence Point / 25 mL, pH 7.0" near the
    marker. An orange (#E8833A) dashed line shows the scaled derivative (dpH/dV),
    which hugs the x-axis for most of the range and spikes sharply at the equivalence
    point. A faint horizontal dashed gray line at pH 7 provides a reference. The x-axis
    is labeled "Volume of NaOH added (mL)" (0-50) and y-axis "pH" (0-14). Title reads
    "titration-curve · altair · pyplots.ai" with subtitle "HCl (0.1 M, 25 mL) titrated
    with NaOH (0.1 M) · Strong Acid / Strong Base". Background is light gray (#FAFBFC)
    with white outer padding.
