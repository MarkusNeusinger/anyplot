  - No formal legend identifying the two line types (main curve vs derivative)
  - Minor dead code issue with the invisible geom_area layer
  image_description: The plot displays a strong acid/strong base titration curve (HCl
    + NaOH). A solid blue S-shaped line shows pH (y-axis, 0-14) versus volume of NaOH
    added in mL (x-axis, 0-50). The characteristic sigmoidal shape is clearly visible,
    starting near pH 1, rising steeply around 25 mL, and leveling off near pH 13.
    An orange dashed derivative curve (dpH/dV, scaled) is overlaid, showing a sharp
    spike at 25 mL corresponding to the equivalence point. A red dashed vertical line
    marks the equivalence point at 25 mL. A red diamond marker sits at the intersection
    (25 mL, pH 7.0), with a pink-filled label box reading "Equivalence Point / 25
    mL, pH 7.0" nudged to the right. An italic orange text label "dpH/dV (scaled)"
    appears at the lower right. The title reads "titration-curve · letsplot · pyplots.ai"
    centered at the top. The background is clean white with subtle horizontal grid
    lines on the y-axis only. Overall layout is well-proportioned with generous margins.
