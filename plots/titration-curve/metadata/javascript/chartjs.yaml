      Data: Green pH curve (#009E73) identical color to light render; lavender derivative curve identical; buffer zone shading appears as a subtly visible mid-green tinted rectangle against the near-black background; dashed vertical line in light inkSoft; annotation text in light ink, clearly readable. All Imprint palette data colors are identical to the light render — only chrome (background, text, grid) has flipped.
