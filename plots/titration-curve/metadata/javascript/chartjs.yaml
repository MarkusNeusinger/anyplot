    shading, full pH scale 0-14)'
  - Chemically accurate pH calculation (proper strong acid/base formula, clamped to
    [0,14], central-difference derivative)
  - Idiomatic Chart.js plugin pattern (beforeDraw/afterDraw canvas lifecycle hooks)
    — correct approach for custom canvas drawing
