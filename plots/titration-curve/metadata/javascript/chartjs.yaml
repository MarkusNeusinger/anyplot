    (#C475FD lavender) — Imprint palette must be used in sequential order; change
    borderColor of derivative dataset from t.palette[2] to t.palette[1] and update
    y2 axis title/tick colors accordingly
  - 'No chart border/spine removal — default Chart.js frame borders surround all axes;
    add border: { display: false } to scales x, y, and y2 for a cleaner L-axis appearance
    (DE-02 deduction)'
  - Right y-axis tick labels and title set to t.palette[2] (#4467A3) on dark background
    gives ~3.1:1 contrast — borderline for dark mode; use t.inkSoft for y2 tick colors
    to improve readability while keeping series line color in the palette
  - Annotation canvas text uses 14px CSS (28 source px) — increase to 16px for better
    proportional sizing and mobile readability
