review:
  strengths:
  - Mathematically correct titration curve computed from first principles (HCl + NaOH
    equilibrium)
  - Dual Y-axis with color-coordinated secondary axis — right axis title, ticks, labels,
    and dpH/dV series all use palette[1] lavender, a genuinely thoughtful design choice
  - Proper Highcharts-native plotLines (dashed equivalence line with annotation) and
    plotBands (transition zone shading) — idiomatic use of library-specific features
  - 'Imprint palette correctly applied: first series #009E73, second series #C475FD;
    transparent background threads page token through both themes'
  - Full theme support via ANYPLOT_TOKENS — all chrome (title, axis labels, ticks,
    grid, legend) adapts correctly between light and dark renders
  - 'Right Y-axis grid suppressed (gridLineColor: transparent) to avoid double-grid
    clutter — deliberate refinement'
  - Horizontal dotted reference line at pH=7 anchors the equivalence point visually
    on the primary axis
  weaknesses:
  - Transition zone plotBand has no descriptive label — viewers cannot tell what the
    shaded region 20-30 mL represents without prior chemistry knowledge; add a short
    plotBand label such as 'Equivalence Zone'
  - Band color rgba(0,158,115,0.07) is a hardcoded hex with very low opacity — on
    the dark background (#1A1A17) it is nearly imperceptible; increase opacity to
    ~0.12-0.15 or use a theme-adaptive alpha
  - 'LM-02 gap: the implementation uses plotLines/plotBands well but could push further
    into Highcharts-distinctive territory (e.g. using ''zones'' on the spline series
    to color the curve differently in the acid/base/equivalence segments)'
