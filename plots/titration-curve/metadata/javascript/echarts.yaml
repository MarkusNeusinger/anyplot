review:
  strengths:
  - Full Imprint palette compliance with correct theme-adaptive chrome in both light
    and dark renders — data colors identical, only chrome flips
  - 'Precise titration chemistry: central-difference derivative calculation, dense
    0.1 mL sampling around the equivalence point, and correct pH formula for both
    acid and base excess regions produce a smooth, chemically accurate curve'
  - Color-coded y-axis lines (axisLine colors matching t.palette[0] and t.palette[1])
    elegantly communicates the dual-axis assignment without requiring extra labels
  - Idiomatic use of ECharts markLine, markPoint, and areaStyle to annotate the equivalence
    point and highlight the derivative peak
  weaknesses:
  - Buffer region shading is absent — the spec explicitly requests a semi-transparent
    fill for the buffer/transition zone; for this strong acid/strong base system,
    the steep transition region (e.g. 22–28 mL) should be shaded with a low-opacity
    markArea; the existing dpH/dV areaStyle at 8% opacity is too faint and covers
    only the spike geometry
  - Named function calcPH(v) helper violates the KISS 'no functions' structure criterion;
    could be restructured as an inline arrow function within the .map() call
  - ECharts frame borders remain on all four sides — top and right axis borders/spines
    are not removed, leaving a full box border around the chart; removing the top
    border would improve visual refinement
