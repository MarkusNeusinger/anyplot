review:
  strengths:
  - Correct Imprint palette — brand green for pH line, lavender for dpH/dV — both
    identical across light and dark renders
  - Dual Y-axis implementation using MUI X yAxisId pattern is idiomatic and clean
  - ChartsReferenceLine with dashed styling cleanly marks the equivalence point with
    text annotation
  - Deterministic, mathematically exact titration data with 201 points gives a smooth
    S-curve
  - All font sizes explicitly set; title, axis labels, and tick labels are well-proportioned
    and readable in both themes
  - skipAnimation set correctly; canvas sized to window.ANYPLOT_SIZE; t.pageBg used
    for background
  weaknesses:
  - Buffer region shading absent — the spec requests semi-transparent fill for the
    buffer zone; even for a strong acid/base system a narrow symmetric band around
    the equivalence region could illustrate the concept
  - dpH/dV derivative curve spike is physically correct but very narrow (near-delta-function
    for strong acid/base); a slightly thicker strokeWidth or filled area-under-spike
    would improve visibility at small display sizes
  - Grid styling is not explicitly customized — grid opacity/color follow MUI X ThemeProvider
    defaults; explicit grid line tuning would improve visual refinement score
  - No visual storytelling emphasis beyond the equivalence-point annotation — e.g.
    shading or a callout box around the steep jump region would guide the viewer more
    forcefully to the key insight
  - 'DE-02: No explicit axis-line or grid opacity tuning; the chart relies on MUI
    X default chrome without further refinement'
