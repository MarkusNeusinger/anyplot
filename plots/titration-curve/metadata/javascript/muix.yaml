review:
  strengths:
  - Custom BufferZone component using MUI X's useDrawingArea + useXScale hooks — idiomatic
    library extension pattern demonstrating genuine library mastery
  - 'All spec-required features implemented: S-curve sigmoid, derivative dpH/dV overlay
    on right Y-axis, buffer zone shading, equivalence point annotation with dashed
    reference line'
  - Scientifically accurate pH computation for strong acid/base titration; central-difference
    derivative correctly spikes at equivalence point (pH 7, 25 mL)
  - Complete theme-adaptive styling via ANYPLOT_TOKENS throughout all chart elements;
    no hard-coded hex color values
  - Deterministic, self-contained data generation from mathematical formulas with
    no external dependencies or RNG
  weaknesses:
  - 'Right Y-axis (dpH/dV scale) tick labels and axis label ''dpH/dV (mL⁻¹)'' are
    not clearly visible in either render — the legend at position {vertical:''top'',
    horizontal:''right''} conflicts with the 120px right margin reserved for the secondary
    axis. Fix: increase margin.right to 180–200px and/or change legend position to
    {vertical:''bottom'', horizontal:''right''} to give the right axis labels unobstructed
    space.'
  - Buffer zone shading at fillOpacity=0.1 (10%) is very subtle — nearly invisible
    at thumbnail size in the light render. Increase to fillOpacity=0.18–0.22 for better
    readability without overwhelming the main sigmoid curve.
  - Annotation label 'Equivalence Point — 25 mL, pH 7' with labelAlign='start' extends
    rightward from the dashed line at the top of the chart, potentially competing
    visually with the legend. Consider labelAlign='end' (left of line) or repositioning
    to avoid the crowded top-right area.
