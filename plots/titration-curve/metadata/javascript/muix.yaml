      Data: Data colors are identical to the light render — brand green pH line and lavender dpH/dV line with the same spike profile. Dashed equivalence line annotation visible in muted soft tone.
      Legibility verdict: PASS — all text clearly readable against the dark background; no dark-on-dark failures detected.
