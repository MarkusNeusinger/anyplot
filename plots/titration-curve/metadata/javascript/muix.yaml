    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, correct.
      Chrome: Title "titration-curve · javascript · muix · anyplot.ai" at top in dark ink, fully visible, occupies ~60% of canvas width. Left Y-axis label "pH" and right Y-axis label "dpH/dV (mL⁻¹)" both dark and readable. X-axis label "Volume of NaOH added (mL)" readable at the bottom. Tick labels (0–14 on left, 0/2/4/6... on right, 0–50 on bottom) are all clearly visible in dark ink. Subtle light-gray horizontal grid lines visible but not dominant. Legend in top-right shows "pH" (green line) and "dpH/dV" (lavender line) — fully readable.
      Data: Two lines — brand green (#009E73) for the pH S-curve sweeping from ~pH 1 up through the sharp jump at 25 mL to ~pH 12.5; lavender (#C475FD) for the dpH/dV derivative showing a very sharp narrow spike at 25 mL, flat (~0) elsewhere. Vertical dashed line at 25 mL annotated "Equivalence Point — 25 mL, pH 7" in soft ink.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
