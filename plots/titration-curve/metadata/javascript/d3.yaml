review:
  strengths:
  - Excellent dual-axis layout with derivative curve correctly implemented using d3.axisRight
    and a secondary y-scale
  - Perfect data quality — 501-point mathematically correct HCl+NaOH titration with
    accurate pH values, equivalence at pH 7
  - All font sizes explicitly set and theme tokens correctly threaded through all
    DOM elements (title, ticks, axis labels, legend, annotation)
  - 'Clean D3 idiom: d3.line() with curveMonotoneX and curveCatmullRom.alpha(0.5),
    proper datum() / join() usage, no hard-coded canvas sizes'
  - Code quality is perfect — deterministic mathematical data generation, no fake
    interactivity, KISS structure
  weaknesses:
  - 'SC-02 partial miss: spec asks to shade the buffer region (pH = pKa ± 1) but the
    implementation shades a steep transition zone (23–27 mL) which is a different
    concept — for a strong acid/strong base system there is no pKa, so a chemically
    accurate alternative (half-equivalence region annotation or omission of buffer
    zone) should be considered'
  - 'DE-01 / DE-02 headroom: the design is clean but not yet publication-ready — removing
    the remaining tick-mark lines (ax.select(.domain) removed but tick lines on xAx
    and yAxL still use t.inkSoft instead of t.grid), and reducing the Steep transition
    zone label from 11 px to something even subtler or omitting it would lift polish'
  - 'VQ-01 minor: Steep transition zone label at 11 px CSS is the smallest text in
    the chart — at 22 px native on a 3200 px canvas it is borderline; removing or
    increasing to 12 px would improve legibility at mobile widths'
