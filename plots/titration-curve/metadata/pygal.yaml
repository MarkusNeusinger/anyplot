  strengths:
  - Chemically accurate titration data with correct equivalence point calculation
  - Two-panel layout effectively shows both pH curve and derivative
  - Custom annotation box with rounded corners adds professional touch
  - Interactive HTML output leverages pygal SVG capabilities
  - Thoughtful color palette with good contrast and accessibility
  weaknesses:
  - Derivative shown in separate panel rather than as secondary y-axis overlay (pygal
    limitation)
  - Pixel-coordinate annotation overlay is fragile and hardcoded
  - Design could be further refined - pygal limitations prevent spine removal and
    fine grid control
  - Lower panel proportionally compressed relative to upper panel
  image_description: 'The plot displays a two-panel stacked layout on a soft blue-gray
    background. The upper panel shows the classic S-shaped titration curve: pH (y-axis,
    0-14) vs Volume of NaOH added in mL (x-axis, 0-50). The curve starts at ~pH 1
    and remains flat until ~20 mL, then rises steeply through the equivalence point
    at 25 mL (pH 7), leveling off around pH 12-13. A vertical dashed red line marks
    the equivalence point. A semi-transparent blue shaded region (~20-30 mL) highlights
    the transition zone with a text label. A white rounded-rectangle annotation box
    in the upper-right states "Equivalence: 25.0 mL, pH 7.0" with "25 mL of 0.1 M
    HCl titrated with 0.1 M NaOH" below it. A faint gray dashed pH 7 reference line
    is also visible. The title reads "titration-curve · pygal · pyplots.ai." The lower
    panel shows the derivative dpH/dV vs Volume, with a sharp orange spike at 25 mL
    confirming the equivalence point, and a matching red dashed vertical line. Legends
    appear at the bottom of each panel. The color palette uses blue for pH curve,
    orange for derivative, and red for equivalence markers.'
