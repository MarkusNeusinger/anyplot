review:
  strengths:
  - Implements correct S-shaped titration curve with accurate chemistry for strong
    acid/strong base (HCl + NaOH)
  - Derivative overlay (dpH/dV) on secondary y-axis with color-coded axis label —
    distinctive and informative
  - Equivalence point clearly marked with dashed vertical line, filled dot, and text
    annotation
  - 'Imprint palette used correctly: green (#009E73) for main curve, lavender (#C475FD)
    for derivative; redundant linetype encoding adds CVD safety'
  - Full theme-adaptive chrome — both light (#FAF8F1) and dark (#1A1A17) renders are
    clean and readable
  - All font sizes explicitly set; inside legend with elevated background adds polish
  - 'Idiomatic ggplot2: grammar-of-graphics layering, sec_axis(), guide_legend() override,
    annotate() for geometric elements'
  - Deterministic data generation (pure mathematics, no random seed needed)
  - Clean KISS structure and minimal imports
  weaknesses:
  - 'SC-02 partial: spec notes buffer region shading for weak acid/base titrations;
    implementation adapts to strong acid/strong base by shading pH 4–10 as a ‘Transition
    zone’ — reasonable but not exactly what the spec requested'
  - 'VQ-03 minor: derivative curve (dpH/dV) is near-zero for most of the x-range (0–20
    mL and 30–50 mL), making the dotted lavender line barely distinguishable from
    the x-axis baseline except at the equivalence spike'
  - 'DE-01 ceiling: overall aesthetic is polished and well above defaults, but not
    yet at FiveThirtyEight/publication-ready level — could benefit from slightly more
    whitespace above the plateau region or a descriptive subtitle'
  - 'LM-02 ceiling: sec_axis and guide_legend override are distinctive ggplot2 features,
    but could further showcase ggplot2 uniqueness (e.g. coord_cartesian clip control,
    plot.margin fine-tuning)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint light surface.
      Chrome: Title "titration-curve · r · ggplot2 · anyplot.ai" bold dark (~60% width, well-proportioned). Left y-axis label "pH" and x-axis label "Volume of NaOH added (mL)" in dark INK, clearly readable. Right y-axis label "dpH/dV (pH/mL)" in lavender (#C475FD) matching the derivative series color — nice design touch. Tick labels in dark INK_SOFT, clearly readable. Subtle horizontal y-only gridlines; x-grid removed.
      Data: Main titration curve in #009E73 (solid, linewidth=1.5) tracing the classic S-shape from pH≈1 to pH≈13. Derivative (dpH/dV) in #C475FD (dotted, linewidth=1.0) mostly at y≈0 except for a clear spike at the equivalence point. Transition zone (pH 4–10) shaded very subtly in blue with alpha=0.07. Equivalence point at (25 mL, pH 7) marked with a filled green dot, gray dashed vertical line, and text annotation "EP: 25 mL / pH = 7" at lower right. Inside legend in upper left with border.
      Legibility verdict: PASS — all text clearly readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint dark surface.
      Chrome: Title in light #F0EFE8 against dark background — readable. Axis labels and tick labels in appropriate light-colored tokens (INK_SOFT = #B8B7B0 in dark theme). Right y-axis label in lavender — still clearly visible on dark background. Gridlines subtle, appropriate for dark theme. Legend box uses elevated dark background #242420 with border.
      Data: Titration curve and derivative colors are identical to light render — #009E73 and #C475FD respectively. Transition zone shading still subtly visible. Equivalence point dot and annotation clearly visible.
      Legibility verdict: PASS — no dark-on-dark text failures. All text elements are light-colored on the dark background. Brand green #009E73 reads well on the dark surface.
