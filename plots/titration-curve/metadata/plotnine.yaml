  image_description: The plot displays a strong acid-base titration curve (HCl + NaOH)
    on a white background with subtle horizontal grid lines. A blue sigmoidal pH curve
    rises from approximately 1 at 0 mL to approximately 13 at 50 mL, with the steep
    transition centered at 25 mL. An orange derivative curve (dpH/dV, scaled) shows
    a sharp spike reaching 12 at the equivalence point, remaining flat near zero elsewhere.
    A red diamond marker sits at the equivalence point (25 mL, pH 7) with an italic
    annotation reading "Equivalence Point (25 mL, pH 7)". A light blue semi-transparent
    ribbon shades the transition region (23-27 mL) around the pH curve. The title
    reads "titration-curve · plotnine · pyplots.ai" in bold at the top. X-axis labeled
    "Volume of NaOH added (mL)" ranges from 0 to 50, Y-axis labeled "pH / dpH/dV (scaled)"
    ranges from 0 to 14. Legend in upper-left shows "dpH/dV (scaled)" in orange and
    "pH" in blue with a white background. An orange bold annotation at right reads
    "Peak dpH/dV = 57.5 at 25 mL".
