    text, the right y-axis shows dpH/dV (0-5) in orange. The legend is positioned
    in the upper right with entries for pH, dpH/dV, and Equivalence (25.0 mL). Grid
    lines are very subtle. X-axis labeled "Volume of NaOH Added (mL)".
