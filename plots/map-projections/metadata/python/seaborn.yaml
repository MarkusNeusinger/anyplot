      Data: Ocean panels are light blue (#D4E8F7), land masses in muted sage green (#C4D5B0) with darker green edges. City dots in brand green #009E73 visible (but small — s=20). Graticule lines in light gray, subtle and appropriate. 2×2 grid layout with Orthographic (globe circle with horizon ring), Aitoff, Hammer (both elliptical), and Lambert Cylindrical (strongly squashed) panels.
      Legibility verdict: PASS — all chrome elements readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) as required — not pure black.
      Chrome: Title in light cream text (#F0EFE8), clearly readable against dark background. Panel subtitles in same light text — readable. No dark-on-dark failure observed.
      Data: Ocean panels shift to dark navy (#192837), land masses to dark olive green (#2A3D26) — both theme-adapted. City dots in #009E73 remain the same green (palette position 1, theme-independent) and are visible. Graticule lines in dark gray (#4A4A4A), subtle. Data colors are identical to light render as required.
