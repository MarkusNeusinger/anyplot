review:
  strengths:
  - Four clearly distinct projection types shown side-by-side (Orthographic, Aitoff,
    Hammer, Lambert Cylindrical), providing good educational comparison
  - Custom geographic semantic color scheme (ocean/land/grid) is theme-adaptive and
    visually coherent in both light and dark renders
  - Graticule (meridians + parallels every 30°) implemented correctly for all four
    projections, including the tricky orthographic hemisphere clipping
  - Horizon circle on orthographic panel is a polished cartographic touch
  - Both renders pass theme-readability check — no dark-on-dark text failures; all
    panel subtitles and title readable in both themes
  - Canvas is exactly 3200×1800 px (no bbox_inches='tight'), ANYPLOT_THEME token properly
    threaded through all chrome elements
  - 'All code quality criteria met: flat structure, deterministic data, clean imports,
    no fake interactivity'
  weaknesses:
  - Country borders are completely absent — the implementation uses simplified 6-polygon
    continent blobs instead of the spec-required world country boundaries (~200 countries).
    Country borders are explicitly required by the spec.
  - City reference dots use s=20 which is far too small for a 3200×1800 canvas with
    only 6 data points. Per the data-density heuristic (< 50 points → large prominent
    markers), these should be s=60–100+.
  - seaborn is only used for the city scatter layer; the rest is raw matplotlib. This
    is acceptable given the library's limits but reduces Library Mastery score.
  image_description: |-
