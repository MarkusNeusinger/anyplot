review:
  strengths:
  - Theme-adaptive geographic color tokens (OCEAN/LAND/LAND_EDGE differ between light
    and dark) produce a polished, publication-aware map in both themes
  - Four-projection 2x2 comparison with consistent city reference dots is a genuine
    data storytelling choice that communicates projection distortion visually
  - Custom projection math (orthographic, aitoff, hammer, lambert cylindrical) implemented
    correctly in pure numpy; real Natural Earth boundary data fetched and rendered
    at 177 countries
  - Orthographic horizon circle is a clean detail that distinguishes the globe-view
    panel from the flat-world panels
  - 'Palette compliance is strong: #009E73 city dots, correct backgrounds, fully theme-adaptive
    chrome'
  weaknesses:
  - Panel subtitle fontsize=8pt is slightly small for a 3200x1800 canvas — consider
    9pt or 10pt to improve mobile readability
  - Seaborn's role is minimal (scatter layer + theme setup); the map rendering is
    entirely matplotlib. The implementation reads more as a matplotlib map with seaborn
    styling than a seaborn visualization
  - 'DE-03: No visual hierarchy between projections — consider making one panel slightly
    larger or adding a brief caption explaining what each projection preserves (area,
    shape, etc.)'
  - 'CQ-01: The project() function, while pragmatic, technically violates the KISS
    no-functions structure'
