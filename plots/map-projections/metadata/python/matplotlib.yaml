      Data: Land rendered in warm beige (#E8E4D9), ocean in light blue (#A8D5E5). Tissot indicatrices in red (#B71D27, anyplot palette pos 3) are clearly visible as semi-transparent filled ellipses/circles, demonstrating projection distortion correctly. Country borders and coastlines visible.
