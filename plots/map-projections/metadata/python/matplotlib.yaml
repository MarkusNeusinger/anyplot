review:
  strengths:
  - Four-projection side-by-side layout (Mercator, Robinson, Mollweide, Orthographic)
    effectively demonstrates projection diversity
  - Tissot indicatrices implemented correctly to visualize projection distortion —
    excellent cartographic storytelling
  - Theme-adaptive map colors (land, ocean) for both light and dark renders
  - Correct canvas size (3200×1800) with no bbox_inches manipulation
  - 'Full spec compliance: graticule at 30° intervals, country borders, coastlines,
    all required map features'
  - Clean iteration pattern over projections list — concise and readable
  - 'cartopy-idiomatic usage: tissot(), gridlines(), add_feature(), set_global()'
  - Correct title format and correct output file naming
  weaknesses:
  - Subplot titles ("Mollweide", "Orthographic") overlap with graticule labels from
    the row above — hspace=0.12 is insufficient; increase to ~0.25–0.30 or use fig.subplots_adjust(hspace=0.30)
    to separate the rows
  - Graticule label font size 5.5pt is below the recommended 8pt tick label size;
    while readable at full resolution it is marginal at mobile widths — increase to
    6.5–7pt
  - Tissot indicatrices appear less filled in dark render due to alpha=0.35 over dark
    ocean (#1A3348); consider raising alpha slightly (0.45) or brightening the fill
    color for dark theme to keep visual parity
