review:
  strengths:
  - Correct implementation of four projection math formulas including the iterative
    Mollweide and Robinson lookup table — no shortcuts or approximations in the projection
    math
  - Semantic land color (#009E73) is an appropriate use of the anyplot palette's first
    position, correctly justified by real-world color associations (land = green)
  - 'Full theme adaptation: ocean background (#D0E8F5 light / #0F1F2D dark), strip
    background, and all chrome elements switch correctly between light and dark'
  - Clean suppression of all axis elements (text, ticks, titles) appropriate for a
    cartographic context
  - Graticule (30-degree meridians and parallels) rendered with appropriate subtlety
    (size=0.3, alpha=0.35) in all four panels
  - Good use of facet_wrap with ordered pd.Categorical to control panel arrangement;
    coord_fixed() enforces equal aspect ratio for maps
  weaknesses:
  - Country borders absent — specification explicitly requires 'country borders with
    appropriate styling'; implementation only has rough continent outlines lacking
    any country-level detail
  - Continent outlines are simplified hand-crafted approximations that do not accurately
    represent real geography (North America appears as an irregular blob; Europe is
    unrecognizable as a distinct shape)
  - Four-projection data preparation code is repetitive (copy + transform + label
    pattern repeated four times); DRY refactoring would reduce duplication
  - Missing Tissot indicatrices (optional per spec but would greatly enhance educational
    value about projection distortion)
  - No annotations indicating the key characteristic of each projection (e.g., 'conformal/shape-preserving'
    for Mercator, 'equal-area' for Mollweide) — limits data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface
      Chrome: Title "map-projections · python · plotnine · anyplot.ai" bold dark ink, clearly readable. Subtitle in smaller dark-soft ink, readable. Facet strip labels bold dark ink on elevated-bg (#FFFDF6) — all readable. No axis text (correctly hidden for maps).
      Data: Land masses in #009E73 (anyplot palette pos 1, semantic land color) on light-blue ocean (#D0E8F5). Graticule lines in INK_SOFT at alpha=0.35, subtle but visible. Four panels: Equirectangular (rectangular grid), Mercator (rectangular grid with massive Antarctic distortion), Robinson (curved parallels), Mollweide (elliptical boundary). Continent shapes present but simplified.
      Legibility verdict: PASS — all text readable against light background, no light-on-light failures.

    Dark render (plot-dark.png):
      Background: Near-black (#1A1A17) — correct anyplot dark surface
      Chrome: Title and subtitle in light ink (#F0EFE8), clearly readable against near-black. Facet strip labels in light ink on elevated-dark (#242420) — no dark-on-dark failure. All text elements pass readability check.
      Data: Land masses retain identical #009E73 — chrome-only flip confirmed. Ocean background shifts to dark navy (#0F1F2D). Graticule lines subtle but visible.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures detected.
