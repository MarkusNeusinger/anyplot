review:
  strengths:
  - Implements all 4 projections (Equirectangular, Mercator, Robinson, Mollweide)
    with mathematically correct formulae — including Robinson lookup-table interpolation
    and Mollweide Newton-Raphson iteration — entirely without GIS libraries
  - 'Theme-adaptive ocean color (#D0E8F5 light / #0F1F2D dark) creates beautiful cartographic
    distinction between land and sea in both renders'
  - Correct use of facet_wrap(scales=free) + coord_fixed(ratio=1.0) for comparing
    projections with proper aspect ratios
  - 'Comprehensive geographic detail: continent outlines, major country borders as
    separate path layers, and graticule at 30° intervals with carefully tuned alpha
    (0.3 for graticule, 0.65 for borders, 0.85 for land)'
  - 'Perfect spec compliance: all required features present, correct title format,
    no legend needed'
  weaknesses:
  - 'VQ-01: Subtitle at size=8pt (≈44 source px) is borderline on mobile — increase
    to 9–10pt for reliable readability when the PNG is scaled to ~400 px width'
  - 'CQ-01: Helper function _project() violates the KISS flat-structure rule (Imports
    → Data → Plot → Save, no functions/classes); inline the projection math into the
    loop or use a dict of lambdas'
  - 'DE-02: Visual refinement could go further — consider adding a thin outer frame
    or consistent inter-panel spacing to better distinguish the 4 projection panels
    at a glance'
  - 'DE-03: No emphasis mechanism to highlight the key distortion story — even a one-line
    per-panel annotation (e.g. Mercator: conformal, area-distorting) would lift storytelling
    meaningfully'
  image_description: |-
