review:
  strengths:
  - Well-structured 2×2 facet layout comparing four distinct projections (Equirectangular,
    Mercator, Robinson, Mollweide) side-by-side, immediately communicating the educational
    value of the spec
  - 'Scientifically correct projection implementations: Mercator correctly inflates
    Antarctica, Mollweide shows the characteristic oval graticule boundary, Robinson
    shows balanced compromise distortion'
  - Custom projection mathematics built from scratch (Robinson lookup table, Mollweide
    Newton's method, Mercator log-tan formula) — the only viable approach given plotnine's
    lack of native geographic support
  - Graticule grid lines at 30-degree intervals applied consistently across all four
    projections, meeting the spec requirement exactly
  - Country border lines added as a second geom_path layer, giving geographic context
    beyond just coastlines
  - Per-panel descriptive annotations ('equidistant cylindrical', 'conformal · area-distorting',
    'compromise · balanced', 'equal-area pseudocylindrical') that guide the viewer
    to understand what each projection does
  - 'Theme-adaptive ocean panel backgrounds (#D0E8F5 light / #0F1F2D dark) cleanly
    differentiate the ocean surface from land across both themes'
  - 'Brand green #009E73 used for land masses, correct anyplot palette position 1,
    identical across both light and dark renders'
  weaknesses:
  - Annotation text inside each panel (projection descriptions, size=7 at dpi=400
    ≈ 39 source-px) is quite small — increase to size=8 or 9 to improve readability,
    especially at sub-desktop viewport widths
  - The `_mollweide` helper function deviates from the KISS no-functions guideline;
    acceptable given mathematical necessity but worth noting for code purity
  - 'DE-01 could be improved: adding a subtle pole-region highlight or opacity variation
    on the Mercator panel would visually emphasize the area distortion that the annotation
    describes, strengthening storytelling'
