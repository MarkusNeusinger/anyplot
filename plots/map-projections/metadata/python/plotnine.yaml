      Data: Land masses rendered in brand green #009E73 (alpha 0.85). Ocean panels in light blue #D0E8F5. Graticule lines (30° lat/lon grid) in INK_SOFT at alpha 0.3 — subtle and correct. Major country border lines in INK at alpha 0.65. The 4 panels show correctly distinct shapes: Equirectangular (rectangular grid), Mercator (polar distortion with massive Antarctica band), Robinson (balanced oval), Mollweide (equal-area oval).
