review:
  strengths:
  - Correct anyplot_seq palette (brand green to dark azure) with brand green as the
    first/lowest zone
  - 'Both light and dark themes render correctly with no chrome failures — backgrounds
    #FAF8F1 and #1A1A17, text correctly adaptive'
  - Creative and educationally valid use of Mercator distortion zones as choropleth
    data — effective substitute given pygal's single-projection constraint
  - Accurate geographic data with realistic distortion factors derived from sec²(latitude);
    Greenland 14.3× is a memorable focal point
  - Expert sys.path workaround prevents naming collision between pygal.py script and
    installed pygal package
  - Clean, flat code with deterministic data; all output files (plot-light.png, plot-dark.png,
    plot-light.html, plot-dark.html) generated correctly
  - Title and legend text correctly formatted and readable in both themes; legend
    zone labels are descriptive with degree ranges and distortion multipliers
  weaknesses:
  - 'Missing graticule (latitude/longitude grid lines at regular intervals): the spec
    explicitly requires these in the Notes section — pygal_maps_world has no graticule
    API, but even a subtitle or text annotation indicating zone latitude boundaries
    would partially address this gap'
  - 'Single projection only (Mercator): the spec''s primary intent is to compare multiple
    projections; while the single-projection path is explicitly allowed, a more spec-faithful
    approach would incorporate Cartopy or basemap for alternative projection panels
    alongside the pygal world map'
