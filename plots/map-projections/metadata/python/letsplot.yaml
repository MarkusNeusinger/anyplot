review:
  strengths:
  - Tissot indicatrices effectively communicate Mercator distortion — the growing
    circles toward the poles are immediately readable as the story
  - 'Caption explicitly names the educational takeaway: ''equal-area circles grow
    toward the poles in Mercator projection'''
  - Correct Imprint palette usage (land=#009E73 first, Tissot=#9418DB second) with
    perfect theme-adaptive chrome in both renders
  - PIL transparent-margin compositing is a clean, correct fix for letsplot's export
    behavior
  - Graticule implemented as dashed semi-transparent paths — appropriate cartographic
    styling
  weaknesses:
  - Only one map projection shown; the spec's core educational value ('world map with
    different projections') calls for at least 2-3 projections compared — consider
    facet_wrap over a projection column
  - Continent boundaries are coarse hand-drawn polygons; Africa, South America, and
    Asia shapes deviate significantly from real geography
  - Inline legend (geom_point + geom_text inside data area at lat=-43/-51) is awkward
    — placed where Tissot circles also appear; a dedicated legend position outside
    the map frame would be cleaner
  - Legend text size=8 and caption size=9 are on the small side; bumping to size=10
    for both would improve mobile readability
