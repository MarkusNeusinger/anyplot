review:
  strengths:
  - Brand green (#009E73) correctly used as the first categorical series for land
    masses
  - Tissot indicatrices correctly implemented as circles that visibly grow toward
    the poles, demonstrating Mercator distortion
  - All font sizes explicitly set (title=16, axis=12, ticks=10, caption=9)
  - Both themes correctly implemented — warm off-white (#FAF8F1) light and near-black
    (#1A1A17) dark backgrounds with theme-adaptive text
  - Caption clearly explains the cartographic concept, adding educational value
  - Clean KISS code structure with deterministic data generation and full code quality
  - coord_map() idiomatic usage for letsplot map projection
  - Graticule rendered appropriately as dashed lines (not solid grid), correct for
    a map
  weaknesses:
  - Legend positioned at lat=-60/-73 overlaps significantly with Tissot indicatrices
    at lat=-60 (the large circles at that latitude partially obscure the 'Land Masses'
    legend item) and 'Tissot Indicatrices' text overlaps Antarctica shape — move legend
    to an ocean area away from lat=-60 Tissot circles, such as around lon=-170 lat=-45
    or use a bottom-center position outside the map area
  - 'Tissot color uses palette position 3 (#B71D27 red) instead of canonical position
    2 (#9418DB purple), skipping the canonical palette order — the semantic-exception
    rationale (red = distortion) is plausible but not as universally recognized as
    ''blood→red'' or ''error→red'' level; consider using #9418DB for the second series
    or strengthen the justification'
  - Single Mercator projection only — the spec title is 'World Map with Different
    Projections' and while a single projection is permitted per the notes, showing
    two projections side-by-side (e.g., Mercator and Robinson) in facets would better
    match spec intent and raise both SC-01 and DE-01
  - In dark mode, the Tissot indicatrices (#B71D27 red) blended with the dark background
    produce a very dark maroon that is less visually distinct than in light mode —
    consider slightly increasing alpha or adding a light-colored stroke
  - Continent shapes are very simplified hand-coded polygons that produce rough, inaccurate
    outlines — particularly Europe/Asia which looks like a single irregular blob;
    using more coordinate points or a known dataset would improve DQ-03 and DE-01
