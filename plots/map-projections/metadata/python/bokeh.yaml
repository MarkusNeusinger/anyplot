review:
  strengths:
  - Implements all four map projections (Equirectangular, Mercator, Sinusoidal, Mollweide)
    with mathematically correct custom projection code — no GIS library dependency
  - Real Natural Earth 110m country boundary data with local caching for reproducibility
  - Tissot indicatrices implemented correctly with per-panel legend annotations that
    contextualise each projection property (grows poleward, equal-area)
  - Complete theme adaptation for both light and dark surfaces — all chrome tokens
    (INK, INK_SOFT, PAGE_BG, ELEVATED_BG) applied consistently across all four panels
  - NaN-separated graticule line segments and custom lat/lon text annotations are
    an idiomatic Bokeh technique for multi-segment paths
  - Bokeh gridplot + column layout is clean and idiomatic; Div HTML title with embedded
    subtitle shows library-native composition
  weaknesses:
  - 'DE-01 / DE-02 design ceiling: panel borders (outline_line_color with line_width=2)
    create a rigid grid-of-boxes look — removing or softening borders to a hairline
    would improve visual refinement'
  - 'LM-02 ceiling: gridplot and NaN-separated lines are good Bokeh techniques but
    interactive features (HoverTool on Tissot circles, custom JS tooltip with projection
    name) are absent — adding hover context would showcase Bokeh distinctiveness'
  - Subtitle text at 20pt (≈27 source px) is below the style-guide tertiary minimum
    — raise to 26–28pt for better mobile readability at the 400px srcset size
  - Panel titles at 30pt are slightly above proportional for a half-canvas panel;
    24–26pt would stay readable while giving more breathing room to the map area
  - lat/lon annotation labels at 22pt extend beyond the sinusoidal map boundary on
    the left edge — text_align right at the leftmost map edge forces bokeh to expand
    x_range left, leaving an uneven whitespace strip
  image_description: |-
