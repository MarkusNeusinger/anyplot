      Data: Tissot indicatrices remain the same brand green #009E73 — identical to light render, data colors unchanged. Country outlines appear in a lighter tone against the dark background (INK_SOFT adapts correctly). Graticule lines visible and subtle.
      Legibility verdict: PASS — all text readable against dark background; theme-adaptive chrome applied correctly; no dark-on-dark failures.
