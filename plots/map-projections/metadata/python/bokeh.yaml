review:
  strengths:
  - Four-panel 2×2 gridplot layout elegantly demonstrates side-by-side projection
    comparison with consistent styling across all panels
  - Tissot indicatrices correctly implemented with accurate projection math (Newton's
    method for Mollweide auxiliary angle) and brand green (#009E73) highlight
  - Per-panel contextual legends (e.g., 'grows poleward' for Mercator, 'equal-area'
    for Mollweide/Sinusoidal) and informative subtitle narrate the distortion story
    effectively
  - 'Full theme-adaptive chrome: background, panel borders, legend boxes, panel titles
    all correctly flip between #FAF8F1/INK (light) and #1A1A17/INK_SOFT (dark)'
  - 'Idiomatic bokeh: Div with inline HTML/CSS for the main title, gridplot for multi-panel
    layout, manually constructed Legend/LegendItem — plus interactive HTML + Selenium
    PNG export'
  - Hidden bokeh axes and grid replaced by manual graticule lines keeps the map projection
    area clean and uncluttered
  weaknesses:
  - Missing country borders and coastlines — the spec requires world country boundary
    polygons (GeoJSON/Natural Earth) rendered on top of or instead of the bare projection
    grid. Currently only the mathematical graticule and Tissot indicatrices are shown;
    there are no land masses, no coastlines, and no country outlines. Add geographic
    polygon data using bokeh's `patches` or `multi_polygons` glyphs (e.g., Natural
    Earth 110m countries GeoJSON) with a neutral fill color matching INK_SOFT at low
    alpha and a thin INK_SOFT border stroke.
  - Lat/lon annotation text at 16pt (≈21 CSS-px) inside half-canvas panels (each ~1595
    px wide) is significantly below the recommended 34pt for tick-equivalent reference
    labels. Increase in-panel lat/lon text to at least 22–24pt so they remain readable
    at the 3200×1800 output resolution.
  - Legend label font size at 18pt is below the 34pt recommendation for bokeh legend
    text. Increase to 24–28pt to match the scale of the panel titles (30pt) and maintain
    readable hierarchy.
  - The Mercator and Equirectangular panels include lon labels (90°W, 0°, 90°E) but
    Sinusoidal and Mollweide panels omit them entirely — inconsistent graticule annotation
    across panels. Add lon labels to all four panels for uniformity.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 filling the full 3200×1800 canvas and all four panel borders — correct.
      Chrome: Bold black main title "map-projections · python · bokeh · anyplot.ai" (40pt) clearly visible at top; smaller subtitle (20pt, charcoal #4A4A44) about Tissot distortion readable beneath it. Four panel titles ("Equirectangular (Plate Carrée)", "Mercator", "Sinusoidal", "Mollweide") at 30pt in INK black, bold, centered — legible. Lat/lon annotation labels (16pt, muted gray) appear small but readable at full resolution. Bottom-right legends in each panel use ELEVATED_BG boxes with INK_SOFT text; text is readable.
      Data: Graticule lines in muted gray (INK_SOFT at alpha 0.5), thin and non-dominant. Tissot indicatrices (circles/ellipses) rendered in brand green #009E73 with 2.5pt line width — clearly stand out against the light background. No land masses or country borders present — only mathematical projection grids.
      Legibility verdict: PASS — all text elements readable against the light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 filling full canvas and all panel areas — correct.
      Chrome: Title in #F0EFE8 (INK dark-mode) clearly visible. Subtitle in #B8B7B0 (INK_SOFT dark-mode) readable. Panel titles in INK light color against near-black — legible. Lat/lon labels in INK_SOFT gray on dark background — readable. Panel borders in INK_SOFT. Legend boxes use #242420 (ELEVATED_BG dark) with INK_SOFT text — legible.
      Data: Graticule lines in muted gray at alpha 0.5, same visual weight as light render. Tissot indicatrices in identical brand green #009E73 — data colors unchanged from light render, only chrome flips. No dark-on-dark failures observed.
      Legibility verdict: PASS — all text clearly readable against the dark background. Chrome correctly theme-adapted.
