      Data: Country outlines and fills in INK_SOFT at alpha=0.15/0.6 — subtle neutral grey. Tissot indicatrices in brand green #009E73 at line_width=2.5 — clearly visible against both background and land fills. Graticule lines in INK_SOFT at alpha=0.5 — visible but not dominant.
