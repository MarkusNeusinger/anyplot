review:
  strengths:
  - Correct use of alt.sphere(), alt.graticule(), alt.topo_feature() and mark_geoshape()
    — idiomatic Altair geographic API
  - 'Theme-adaptive chrome correctly wired: INK/INK_SOFT tokens applied to panel title
    and subtitle colors for both light and dark renders'
  - 'Brand green #009E73 used for land fill — correct anyplot palette compliance'
  - Informative panel subtitles ('conformal · distorts area near poles', 'equal-area
    · preserves relative country sizes') add educational context
  - Graticule at 30-degree intervals with subtle opacity (0.35) and thin strokeWidth
    (0.3) — clean and non-distracting
  - All font sizes explicitly set (main title 16, panel title 12, subtitle 10)
  - Canvas padding to exact 3200x1800 target correctly implemented with PIL
  - Both PNG and HTML outputs saved
  weaknesses:
  - 'Large vertical dead-zone: ~25% of canvas height is empty between the panel subtitles
    and the tops of the map panels — the hconcat chart should be centred better or
    the panel heights reduced/redistributed so the maps fill the canvas more evenly'
  - 'Panel size imbalance: Mercator and Equal Earth are given the same width=290,
    height=375 but the Mercator projection renders tall and rectangular while Equal
    Earth renders as a compact ellipse, making Mercator appear roughly 2x the visual
    size — consider balancing the inner view heights (e.g. Mercator height=260, Equal
    Earth height=200) or using different widths to create more visually even panels'
  - 'Only 2 projections shown: the spec lists Mercator, Robinson, Mollweide, Orthographic,
    Equal Earth, Lambert Cylindrical as options and implies comparison of multiple
    projections — showing 3 or 4 panels (e.g. add Robinson and Orthographic) would
    improve feature coverage (DQ-01) and canvas utilisation'
  - 'Design lacks focal hierarchy: both panels share the same green fill with no visual
    emphasis to guide the viewer — adding an optional choropleth value layer or Tissot
    indicatrices on one panel would create contrast and storytelling depth'
  - 'No configure_view fill on individual panels: the elevated background (#FFFDF6
    / #242420) is applied via alt.sphere() marks but not via configure_view(fill=...),
    which means the rectangular padding around the sphere boundary shows PAGE_BG instead
    of ELEVATED_BG — minor inconsistency with the style-guide intent'
  image_description: |-
