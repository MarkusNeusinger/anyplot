review:
  strengths:
  - Mathematically rigorous Mollweide projection implemented from scratch (Newton-Raphson
    solver for theta), entirely within ggplot2 drawing primitives
  - 'Excellent dual-theme adaptation: custom OCEAN_BG tokens (#C4DCF0 light / #152030
    dark) are semantically appropriate and both themes are visually coherent'
  - Brand green (#009E73) correctly used for Tissot indicatrices as the first (and
    only) data series
  - 'Clean visual hierarchy: faint graticule (alpha=0.45) < bolder equator/prime meridian
    (alpha=0.70) < prominent green Tissot ellipses — guides the viewer''s eye correctly'
  - 'Tissot indicatrices correctly demonstrate the equal-area property of Mollweide:
    same surface area at every lat/lon position, with correct latitude cosine correction
    applied'
  - theme_void() + coord_fixed() is idiomatic ggplot2 for cartographic use — no unnecessary
    axis chrome
  weaknesses:
  - 'Missing land masses and country borders: the spec explicitly requires ''world
    country boundaries'' and ''clean coastlines and country borders.'' The entire
    plot is ocean-filled with no land polygons visible. Fix: add `library(maps)` and
    use `map_data(''world'')` to get lon/lat country boundary coordinates, then project
    them through the `mollweide()` function and render with `geom_polygon()` (land
    fill) + `geom_path()` (borders) — this avoids `sf` and stays in base ggplot2'
  - dplyr is imported (`library(dplyr)`) but never used anywhere in the code — remove
    it to satisfy CQ-03 clean imports
  - Subtitle at 8.5pt may be hard to read when the image is scaled to mobile widths
    (~400px). Consider either raising to 9.5pt or shortening the subtitle text
  - Helper functions `solve_theta()` and `mollweide()` break the KISS (no-functions)
    code structure. Consider inlining the math or wrapping in a single anonymous call
    chain to keep the flat script style
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Title "map-projections · r · ggplot2 · anyplot.ai" in dark ink (#1A1A17) at 12pt, centered — clearly readable. Subtitle in INK_SOFT gray at 8.5pt, also centered — readable at full resolution but small. No axis labels or tick labels (theme_void — appropriate for a map).
      Data: A Mollweide ellipse filled with light blue ocean (#C4DCF0). Thin, subtle gray graticule lines at 30° intervals (alpha=0.45, linewidth=0.18). Slightly bolder equator and prime meridian lines (alpha=0.70). 30 green (#009E73) Tissot indicatrix ellipses distributed across 5 latitude bands × 6 longitude positions. No land masses or country borders are visible.
      Legibility verdict: PASS — all text readable; no light-on-light failures.

    Dark render (plot-dark.png):
