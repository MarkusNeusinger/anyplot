review:
  strengths:
  - Implements Mollweide projection from scratch using Newton-Raphson iteration —
    correctly bypasses sf/ggmap (out of scope) without sacrificing accuracy
  - 'Theme-adaptive ocean and land colors (not just grey fill): #C4DCF0/#152030 ocean,
    #D4C9A8/#2A3020 land — thoughtfully chosen for both surfaces'
  - Tissot indicatrices correctly demonstrate the equal-area property; subtitle explains
    the visual insight ('every circle covers identical surface')
  - 'Perfect palette compliance: brand green #009E73 for Tissot circles, correct backgrounds
    in both themes (#FAF8F1 light / #1A1A17 dark)'
  - 'Visual hierarchy: equator and prime meridian are bolder than regular graticule
    — reads naturally'
  - 'Perfect code quality: deterministic, clean imports, idiomatic ggplot2 grammar,
    correct canvas size (3200x1800)'
  weaknesses:
  - Subtitle is ~90 characters long at 9.5pt, causing it to span ~90% of the canvas
    width and appear nearly edge-to-edge — reduce subtitle length or reduce font size
    to ~8pt to restore visual breathing room
  - Only Mollweide projection is shown; the spec description emphasizes demonstrating
    multiple projections (Mercator, Robinson, Mollweide, etc.) for comparison — consider
    a 2x2 faceted layout showing 4 projections side-by-side to fully satisfy the educational
    intent
  - Tissot indicatrices are limited to ±60° latitude; including a row at ±75° or near-polar
    positions would better illustrate the extreme distortion in those regions
