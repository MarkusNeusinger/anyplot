      Chrome: Title and subtitle in light ink (#F0EFE8 / #B8B7B0) — clearly readable against the dark background. No dark-on-dark failures anywhere.
      Data: Ocean changes to dark navy (#152030), which is semantically appropriate and visually distinct. Graticule lines appear as subtle off-white paths. Tissot indicatrices remain exactly #009E73 — identical to the light render (only chrome flipped, data colors unchanged). Ellipse outline visible as a lighter border.
      Legibility verdict: PASS — all text readable; chrome correctly flips; data colors identical to light render.
