  strengths:
  - Correct theme-adaptive chrome in both renders with proper background colors and
    INK tokens
  - 'Accurate projection mathematics from scratch: Mercator, Mollweide (Newton-Raphson),
    Orthographic (hemisphere clipping), Equal Earth'
  - NaN-aware graticule line splitter handles projection discontinuities correctly
  - Tissot indicatrices with semi-transparent brand green clearly show projection
    distortion patterns
  - Canvas exactly 3200×1800 px; idiomatic CairoMakie layout system for 2×2 multi-panel
  weaknesses:
