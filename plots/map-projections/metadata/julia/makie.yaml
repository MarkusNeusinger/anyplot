    explicitly requires these. Embed simplified continent outline polygons as hardcoded
    Vector{Point2f} arrays; render with poly! in ELEVATED_BG fill + INK_SOFT stroke
    after graticule but before Tissot ellipses. Even ~100-300 point approximations
    of Africa, Eurasia, Americas, Australia, Antarctica are sufficient.'
  - Graticule alpha=0.55 is slightly faint on dark background — make theme-adaptive
    (0.55 light / 0.70 dark) or increase to 0.65 uniformly.
  - Sub-panel titlesize=14 is slightly small for 4-panel layout at mobile widths —
    increase to 15-16.
