review:
  strengths:
  - All four map projections implemented from scratch in pure Julia math — no geo
    library required
  - Tissot indicatrices correctly computed per-projection with NaN culling for Orthographic
    back-hemisphere
  - 'Full spec compliance: all required projections, graticule, coastlines, and Tissot
    all present'
  - Projection boundary shapes match each projection geometry (rectangle, ellipse,
    custom Equal Earth outline)
  - Perfect code quality — clean helper functions, seed, correct save pattern, all
    imports used
  - Theme adaptation is complete and correct; no dark-on-dark failures in the dark
    render
  weaknesses:
  - 'Continent fill (ELEVATED_BG: #FFFDF6 light / #242420 dark) is nearly indistinguishable
    from the map background (PAGE_BG: #FAF8F1 light / #1A1A17 dark) — land masses
    are barely visible; a world map must have clear land/sea contrast. Fix: use a
    visibly distinct fill, e.g., a warm neutral tint such as RGBAf(INK_SOFT with 0.12
    alpha) or a dedicated land color constant'
  - Tissot indicatrices have 0.20 alpha fill — too faint, especially in light theme.
    Increase to 0.30-0.40 so the distortion circles are clearly legible without overwhelming
    the map
  - Graticule lines and Tissot circles both use the same BRAND green (#009E73), making
    them compete visually. Consider using INK_SOFT with low alpha (0.30-0.35) for
    graticule so Tissot circles read as the primary data layer
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct light theme surface
      Chrome: Main title "map-projections · julia · makie · anyplot.ai" in dark #1A1A17-derived ink — clearly readable. Four subplot titles ("Mercator — Conformal", "Mollweide — Equal-Area", "Orthographic — Perspective", "Equal Earth — Equal-Area") in dark text — all readable at fontsize=16 (doubled). No axis tick labels (appropriate for map projections).
      Data: Brand green #009E73 graticule lines at ~55% alpha and green Tissot indicatrix ellipses at 20% alpha fill / 85% alpha stroke. Continent fills use ELEVATED_BG (#FFFDF6) against PAGE_BG (#FAF8F1) — extremely low contrast, land masses barely distinguishable from ocean.
      Legibility verdict: PASS (text), WEAK (land/sea contrast)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct dark theme surface
      Chrome: Main title and subplot titles in light #F0EFE8-derived text — clearly readable. No dark-on-dark text failures observed.
      Data: Brand green #009E73 graticule and Tissot circles are identical to light render — data colors unchanged between themes. Continent fills use ELEVATED_BG (#242420) against PAGE_BG (#1A1A17) — still very low contrast (~5 lightness units), land masses nearly indistinguishable.
      Legibility verdict: PASS (text), WEAK (land/sea contrast)
