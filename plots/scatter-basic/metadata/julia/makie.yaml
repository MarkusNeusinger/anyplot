review:
  strengths:
  - Thorough theme adaptation — every chrome token (INK, INK_SOFT, PAGE_BG, grid alpha)
    correctly flips between light/dark; data colours stay constant
  - Regression line + r-value subtitle creates a self-contained analytical narrative
    that immediately communicates the correlation
  - Uses Makie compositional fig[0,1] layout slot for the subtitle — idiomatic and
    elegant, no manual coordinate hacks
  - Realistic domain-appropriate synthetic data with sensible anthropometric ranges
    (height ~145-195 cm, weight ~53-85 kg)
  - White marker strokes (strokewidth=1, strokecolor=PAGE_BG) provide clean point
    separation even at alpha=0.7
  weaknesses:
  - Subtitle Label(fig[0,1],...) sits very close to the canvas top edge with minimal
    top padding — add rowgap!(fig.layout, 0, 8) or increase Figure top padding to
    give ~10-15 px clearance
  - Regression line has no confidence band; a shaded 95% CI band would elevate DE-03
    storytelling score
  - No Legend widget for the regression line — a Legend labelling the dashed line
    as OLS fit would be more idiomatic Makie
