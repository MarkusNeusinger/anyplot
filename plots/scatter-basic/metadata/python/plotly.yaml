quality_score: 89
review:
  strengths:
  - Density-adaptive alpha via gaussian_kde elegantly reveals data distribution —
    sparse outliers stay prominent while dense clusters show overlap through transparency
  - Regression trendline turns the scatter into a correlation story rather than just
    a point cloud
  - 'Full theme-adaptive chrome: all INK/INK_SOFT/GRID/PAGE_BG/ELEVATED_BG tokens
    correctly wired for both renders — neither theme has any readability failure'
  - Rich interactive hover with percentile ranking via customdata is a genuinely Plotly-native
    feature
  - Study hours vs exam scores is a relatable, pedagogically neutral domain with appropriate
    correlation and scale
  weaknesses:
  - Axis lines (showline=True) create a visible L-frame that prevents publication-level
    minimalism — set showline=False on both axes and rely on the 15%-opacity grid
    for spatial reference
  - 'Trendline lacks analytical support: add a 95% CI confidence band (go.Scatter
    fill=toself, BRAND color at 10% opacity) to give the correlation finding visual
    weight and communicate uncertainty'
  - Marker edge line.color=PAGE_BG means a near-black ring on near-black background
    in dark mode, losing the overlap-separation benefit — use ELEVATED_BG instead
    so the ring is visible in both themes
  image_description: |-
