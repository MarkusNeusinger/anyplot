review:
  strengths:
  - 'Clean grammar-of-graphics layer composition: geom_smooth behind geom_point creates
    a polished, informative scatter with trendline'
  - fill/color duality on geom_point (fill=BRAND, color=PAGE_BG) produces a crisp
    outlined marker effect that is distinctively plotnine/ggplot2
  - 'Full theme-adaptive chrome: INK, INK_SOFT, and PAGE_BG all flip correctly between
    light and dark, with the trend line going from black to white — zero dark-on-dark
    failures'
  - 'Correct Imprint palette: first (and only) series is #009E73 brand green, backgrounds
    are #FAF8F1 / #1A1A17'
  - 'Substantial visual refinement: ticks removed, left/top/right spines removed,
    horizontal-only grid at 15% opacity, minimal panel chrome'
  - Explicit font size hierarchy (12 / 10 / 8 / 7 pt) — all sizes set deliberately,
    result is well-proportioned in both renders
  - Realistic educational scenario (study hours vs exam scores) with plausible r≈0.7
    positive correlation and appropriate data range
  - 'Canvas gate passed: figure_size=(8, 4.5) + width=8, height=4.5 + dpi=400 produces
    exact 3200×1800'
  weaknesses:
  - Confidence interval band (se=True, fill=INK, alpha=0.08) is nearly invisible in
    both renders — if the CI is intentional, alpha should be raised to ~0.12–0.15;
    if it adds no value, se=False is cleaner
  - Only the bottom x-axis spine is retained (axis_line_y=element_blank removes the
    left spine). This departs from the recommended L-shaped frame — adding axis_line_y=element_line(color=INK_SOFT,
    size=0.6) would ground the y-axis labels better
  - 'DE-01 ceiling at 5/8: design is clean but not publication-landmark level — a
    subtle annotation highlighting the correlation coefficient (e.g. r=0.71) via geom_label
    would elevate storytelling without complicating the code'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "scatter-basic · python · plotnine · anyplot.ai" at 12pt, left-aligned, dark #1A1A17 — fully readable, spans ~60–70% of plot width. X-axis label "Study Hours (per week)" and Y-axis label "Exam Score (points)" both at 10pt, dark ink, well-balanced. Tick labels at 8pt in INK_SOFT #4A4A44 — readable. Subtle horizontal grid lines at ~15% opacity. No ticks, no top/right/left spines, only bottom x-axis line.
      Data: 220 green (#009E73) filled circles with page-background stroke, size=3.0, alpha=0.65 — clearly visible with good density management. Dark trend line (INK=#1A1A17) with extremely subtle CI band (barely perceptible at alpha=0.08). Positive correlation clearly visible.
