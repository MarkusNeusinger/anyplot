    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title, axis labels, and tick labels all flip to light colors (#F0EFE8 / #B8B7B0) — fully readable against dark background. Zero dark-on-dark failures observed. Subtle horizontal grid lines at ~15% opacity. Bottom x-axis line appears as a faint light rule.
      Data: Green (#009E73) scatter points are identical in color to the light render — correct, data colors do not flip. Trend line changes from black to white/light (INK=#F0EFE8 in dark mode) — appropriate semantic neutral. CI band nearly invisible (alpha=0.08 on light fill over dark bg).
      Legibility verdict: PASS — all text clearly readable, brand green visible on dark surface, no dark-on-dark issues.
