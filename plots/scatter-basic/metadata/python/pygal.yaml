review:
  strengths:
  - 'Semantic Imprint palette use: brand green (#009E73) for Passing and matte red
    (#AE3030) for Below 70% is a valid pass/fail semantic exception that immediately
    communicates the story'
  - All font sizes explicitly set (title_font_size=66, label_font_size=56, major_label_font_size=44,
    legend_font_size=44) — well-proportioned in both renders
  - 'Both themes render correctly: warm off-white (#FAF8F1) in light, warm near-black
    (#1A1A17) in dark; all chrome is theme-adaptive'
  - 'Intentional data storytelling: the 70% passing threshold split creates clear
    visual hierarchy — viewer immediately grasps the study-hours → outcome narrative'
  - 'Thorough pygal API usage: value_formatter, x_value_formatter, legend_at_bottom_columns,
    range/xrange, js=[] optimization, plus interactive HTML alongside PNG'
  - Reproducible (np.random.seed(42)) with realistic study-hours vs exam-scores domain
    and np.clip for valid score bounds
  - Clean KISS structure with documented sys.path workaround for package-name shadowing
  weaknesses:
  - Red-green is the sole hue-based distinguishing signal between the two series;
    while spatial clustering provides some redundancy, deuteranopes cannot rely on
    the color cue alone — consider adding a thin ink-color stroke on markers (stroke_width=1.5)
    or distinct marker shapes if pygal supports them, to provide a non-hue redundant
    encoding
  - DE-02 is constrained by pygal's box-frame default (the full border around the
    chart area cannot easily be removed); within that limit the layout is clean but
    visual refinement is moderate
  - Dots_size=12 produces somewhat large markers for 180 data points at 3200px canvas
    — slight overplotting is visible in the 4–8 study-hour range; reducing to dots_size=9-10
    would sharpen the middle-range scatter
