review:
  strengths:
  - Deterministic LCG data generation (seed=42) producing realistic health study data
    — height/weight with r≈0.7 correlation
  - ECharts markLine with rich-text label renders the regression line and 'r ≈ 0.7'
    annotation idiomatically — this is an ECharts-distinctive feature not easily replicated
    in other libraries
  - emphasis/blur interaction states (scale:1.4, opacity changes) make the scatter
    chart genuinely interactive in the HTML output
  - Theme-adaptive chrome correctly maps t.ink, t.inkSoft, t.grid, t.pageBg tokens
    — both light and dark renders pass readability checks
  - 'Perfect spec compliance: scatter type, transparency (opacity 0.65), axis labels
    with units, grid lines, and appropriate point count (120)'
  - Amber trend line (t.amber) creates strong visual contrast with the brand-green
    data points, creating clear visual hierarchy
  - borderWidth:0 on grid removes the default ECharts bounding box, leaving a clean
    L-shaped axis impression
  weaknesses:
  - Marker opacity is 0.65 — slightly below the recommended 0.7 minimum for 120 points;
    a small increase to 0.70 would sharpen edge definition without losing transparency
    effect
  - t.amber is semantically defined as 'warning/caution' in the Imprint palette anchors;
    using it for a regression trend line is a minor semantic misuse — t.inkSoft or
    t.palette[3] (ochre) would be more neutral choices for an annotation/reference
    line
  - 'DE-02 could be improved by explicitly suppressing axis ticks (axisTick: { show:
    false }) to give the axes a cleaner look matching the style guide''s ''tick marks:
    remove where possible'' guidance'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Bold title "scatter-basic · javascript · echarts · anyplot.ai" at fontSize=30, centered; Y-axis label "Weight (kg)" rotated at fontSize=20; X-axis label "Height (cm)" at fontSize=20; tick labels at fontSize=16 — all clearly readable in dark ink against the warm background. Subtle grid lines on both axes in light gray.
      Data: 120 scatter points in brand green (#009E73) at opacity 0.65 with pageBg-colored border stroke. Amber/gold linear regression trend line spans full x-range. Rich-text annotation "r ≈ 0.7" (italic r, bold 0.7) visible in upper-right of the plot area near the trend line end.
      Legibility verdict: PASS — all text clearly readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and axis labels render in light ink color (t.ink = #F0EFE8 in dark mode), tick labels in t.inkSoft (#B8B7B0) — all clearly visible against the dark background. Grid lines subtle in dark-theme grid token. No dark-on-dark failures detected.
      Data: Scatter points identical brand green (#009E73) — same as light render, confirming data colors are theme-independent. Amber trend line also identical. "r ≈ 0.7" annotation visible in upper-right, slightly small but readable.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark issues
