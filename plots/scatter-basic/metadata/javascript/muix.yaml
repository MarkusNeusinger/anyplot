review:
  strengths:
  - Brand green (#009E73) at 72% opacity correctly satisfies both palette rule (first
    series always brand green) and spec requirement (alpha ~0.7)
  - Deterministic LCG with seed=42 produces reproducible data without Math.random()
  - Compositional MUI X API (ChartContainer + sub-components) is the correct idiomatic
    pattern for fine-grained chart customisation
  - Realistic, neutral data scenario (creative hours vs innovation score in tech employees)
    with credible r≈0.72 correlation
  - 'Both renders fully theme-adaptive: correct warm off-white/near-black backgrounds,
    no dark-on-dark failures, identical data colors across themes'
  - L-frame visual refinement (top/right axis suppression via pageBg overlay lines)
    applied thoughtfully
  weaknesses:
  - Tick labels at 14px CSS are at the lower end of the recommended range — nudging
    to 15-16px would improve readability at smaller display widths
  - L-frame implemented by painting pageBg-colored SVG lines over axes — works but
    is fragile if margin values drift; prop-based axis-side disabling would be more
    robust
  - No trend line or visual annotation to emphasise the positive correlation — a ChartsReferenceLine
    (community tier) would significantly lift storytelling (DE-03)
  - 'Misses MUI X-distinctive community features: ChartsReferenceLine and custom ChartsTooltip
    slot are unused — would better differentiate this implementation (LM-02)'
