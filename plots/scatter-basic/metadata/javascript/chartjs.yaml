  strengths:
  - Correct scatter chart type with idiomatic Chart.js scatter configuration
  - 'Full Imprint palette compliance: brand green #009E73 as first series, correct
    pageBg for both themes'
  - Deterministic LCG seeded data (seed=42) with 150 realistic agricultural data points
    (rainfall vs wheat yield)
  - Custom canvasBg beforeDraw plugin correctly fills canvas with t.pageBg — dark
    theme background renders correctly
  - 'All required font sizes explicitly set: title at 32pt, axis labels at 22pt, ticks
    at 18pt — readable in both themes'
  - 'Descriptive axis labels with units: Annual Rainfall (mm) and Wheat Yield (t/ha)'
  - 'Mandatory animation: false, responsive: true, maintainAspectRatio: false all
    present'
  - 'Edge highlighting (borderColor: t.pageBg) adds professional polish to scatter
    markers'
  weaknesses:
  - 'Design Excellence is below first-attempt approval threshold — lacks visual storytelling
    and refinement: no trend/regression line to highlight the r≈0.7 correlation, and
    having both horizontal AND vertical grid lines is less refined than Y-axis-only
    grid'
  - 'DE-01 (Aesthetic Sophistication): implementation looks like a well-configured
    library default (score 5/8) — no focal point, no data-driven emphasis, no annotation
    to surface the key insight'
  - 'DE-02 (Visual Refinement): both X and Y grid lines are shown — anyplot best practice
    is Y-axis-only grid for scatter to reduce visual noise without losing value-estimation
    utility'
  - 'DE-03 (Data Storytelling): 150 points with a clear positive correlation are displayed
    but the viewer must find the story themselves — a regression/trend line or at
    least a subtitle hinting at the correlation would elevate this significantly'
