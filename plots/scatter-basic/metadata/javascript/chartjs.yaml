    typographic gap between secondary annotation and axis metadata — subtitle could
    be 16px or ticks could be 16px to restore hierarchy
  - At 150 points, radius 6 with 70% opacity causes mild overplotting in the 600–900
    mm rainfall band; slightly smaller radius (5) or lower alpha (60%) would better
    reveal the distribution density in that region
