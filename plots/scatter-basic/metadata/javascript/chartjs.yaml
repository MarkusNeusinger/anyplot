  strengths:
  - bgPlugin correctly fills t.pageBg on every render cycle, ensuring both themes
    display the warm off-white / near-black background correctly
  - OLS trend line computed in-memory and overlaid as a Chart.js line dataset — turns
    a plain scatter into a correlation story
  - All font sizes explicitly set with a clear hierarchy (title 32 → axis title 22
    → ticks 18); both themes fully legible
  - Fixed-seed LCG ensures deterministic renders without external dependencies
  - 'Agricultural rainfall/yield domain: neutral, realistic, and immediately comprehensible'
  weaknesses:
  - 'DE-01 and DE-02 have room to grow: consider adding generous layout.padding (e.g.
    top/bottom 32, left/right 64) for more breathing room, and explore whether a minimal
    legend or direct data labels could replace the subtitle for the trend line'
  - LM-02 could be elevated by using Chart.js tooltip callbacks or annotation-style
    labels (e.g. labelling the r-value directly on the trend line), though the subtitle
    currently compensates
  - Subtitle font size (16px CSS) is slightly small for mobile readability — consider
    bumping to 18–20px CSS
