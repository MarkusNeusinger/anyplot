  strengths:
  - 'Perfect Visual Quality (30/30): explicit font sizing, balanced axis labels, theme-adaptive
    chrome, Imprint palette compliance, and marker density all exactly right.'
  - Real-world neutral dataset (marketing spend vs sales revenue) with plausible value
    ranges and authentic ~r=0.7 correlation.
  - 'Excellent code quality: idiomatic D3 two-pass grid technique, deterministic LCG
    seed, clean chaining throughout.'
  - 'Full spec compliance: transparency, both-axis grid, axis labels with units, correct
    title format, 100 points in spec range.'
  weaknesses:
  - 'DE-03 at minimum (2/6): the correlation pattern is implicit but nothing actively
    tells the story. A D3-rendered OLS trend line would directly lift this — compute
    slope/intercept from the data array and draw with d3.line(), styled as a stroke
    in t.palette[0] or t.inkSoft at ~0.5 opacity.'
  - 'DE-01 could advance from 5 to 6+/8 with: (a) removing both axis .domain lines
    (.select(".domain").remove()) for a floating-grid look, or (b) a compact correlation
    annotation (e.g. r ≈ 0.70) in the upper margin using t.inkSoft at ~16px.'
