review:
  strengths:
  - Deterministic LCG (seed=42) ensures reproducible synthetic data — correct JS reproducibility
    pattern
  - OLS trend line + 95% CI band computed analytically in-browser — adds meaningful
    statistical depth beyond the basic spec
  - Uses d3.area() with y0/y1 accessors for CI band — genuinely idiomatic D3 technique
  - Floating-grid approach (domain lines removed, separate gridline pass) produces
    a clean, open layout
  - Marker stroke uses t.pageBg — crisp visual definition that adapts correctly to
    both themes
  - 'Theme-adaptive chrome throughout: t.ink for title, t.inkSoft for labels/ticks,
    t.grid for gridlines'
  - Correlation coefficient annotation (r ≈ 0.81) and CI label contextualize the trend
    analytically
  - 'Perfect spec compliance: alpha=0.7, grid lines both axes, descriptive axis labels
    with units, 100 points in recommended range'
  - 'Both renders pass theme-readability: no dark-on-dark or light-on-light failures'
  weaknesses:
  - 'VQ-01 minor: Annotation text (r label at 16px, ''95% confidence band'' at 14px)
    is the smallest text in the chart — at 14px CSS (28 source-px on 3200px canvas)
    it is readable but on the lower edge; consider 15-16px minimum for secondary annotation
    lines'
  - 'VQ-02 minor: Some moderate marker overlap in the 40–60K spend region and the
    right-hand dense region; at r=8 with 100 points the overlap is visible — slightly
    smaller radius (r=6–7) with same opacity would reduce occlusion while keeping
    markers prominent'
  - 'VQ-03 minor: OLS trend line at stroke-opacity=0.5 appears somewhat faint, especially
    in the dark render where it blends into the CI band fill — increase stroke-opacity
    to 0.75-0.85 or stroke-width to 3 for better visual prominence'
  - 'DE-01: Design is well-executed but stops short of top tier — no secondary aesthetic
    layer (e.g. subtle marginal rug marks, reference annotation for key threshold,
    or axis baseline highlight) that would elevate from solid to polished'
  - 'DE-02: Top and right axis domain lines are removed (good), but there are no explicit
    spines cleaned — the outer frame of the SVG can make it look boxed; confirm the
    four corners don''t show residual domain lines in edge cases'
