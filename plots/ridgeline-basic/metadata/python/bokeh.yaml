review:
  strengths:
  - Both light and dark themes render correctly with proper background colors and
    fully adaptive chrome
  - Manual Silverman KDE correctly implemented, producing smooth realistic density
    curves
  - Seasonal color gradient concept is semantically meaningful (cold blues for winter,
    warm yellows for summer)
  - Clean flat reproducible code that saves all required output files
  - Temperature data context is realistic and neutral with plausible distributions
  weaknesses:
  - No ridge overlap - ridge_height=0.65 keeps each curve within its own band; spec
    requires 50-70% overlap which is the defining visual feature of ridgeline/Joy
    plots
  - Wrong color palette - custom hex values violate both Okabe-Ito rules and continuous
    colormap rules; use Viridis12 or Cividis sampled to 12 for CVD-safe sequential
    colormap
  - Full four-sided border outline retained via outline_line_color - prefer removing
    top/right spines for cleaner look
  image_description: |-
