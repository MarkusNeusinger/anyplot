      Data: 12 monthly density ridgelines with custom seasonal color gradient — cold blues (#306998) for Jan/Dec, transitioning through teals/greens for spring/fall months, warm yellow (#FFD43B) for July, orange (#FFAA33) for August. Fill alpha 0.85. Visible but modest overlap between ridges (~15% of band-width, less than spec's 50-70%). Jan ridge peak slightly clips at top boundary. Four-sided outline border visible.
      Legibility verdict: PASS — all text readable against light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black
      Chrome: Title and axis labels render in light-colored text (#F0EFE8 equivalent), clearly readable against dark background. Month tick labels and x-axis values visible in INK_SOFT light token. No dark-on-dark failures observed. Grid lines remain subtle (alpha 0.10/0.05). Four-sided border also visible in dark mode.
      Data: Data colors are identical to light render — same seasonal gradient preserved. All 12 ridges visible against dark background with good contrast. Ridge overlap same as light render (~15%).
      Legibility verdict: PASS — all text readable against dark background, chrome correctly adapted, no dark-on-dark issues
