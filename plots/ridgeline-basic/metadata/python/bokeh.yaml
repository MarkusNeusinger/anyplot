      Chrome: Title "ridgeline-basic · bokeh · anyplot.ai" top-left in dark ink, readable. X-axis label "Temperature (°C)" and y-axis label "Month" visible. Month tick labels small but legible. X-axis tick values readable.
      Data: 12 monthly density curves with seasonal color gradient — cold blues (#306998) for Jan/Feb/Dec, transitioning through teals/greens for spring, warm yellows (#FFD43B) for July, oranges (#FFAA33) for August, pinkish-rose (#DB8C7D) for October. Fill alpha 0.85. NO overlap between ridges — each curve contained within its own categorical row band.
      Legibility verdict: PASS — all text readable against light background

