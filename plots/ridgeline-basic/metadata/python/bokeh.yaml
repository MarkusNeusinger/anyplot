review:
  strengths:
  - 'Both light and dark themes render with correct backgrounds (#FAF8F1 / #1A1A17)
    and fully adaptive chrome — no dark-on-dark failures'
  - Manual Silverman bandwidth KDE is cleanly and correctly implemented producing
    smooth, realistic density curves
  - Seasonal temperature gradient concept (blues to yellows to back to blue) is semantically
    meaningful and creates effective data storytelling
  - 'Perfect code quality: flat reproducible script, all required output files, clean
    imports, deterministic seed'
  - Categorical offset coordinate system (month, float) is genuinely idiomatic Bokeh
    usage
  weaknesses:
  - 'Palette violation: Custom hex gradient (#306998 as first series) violates both
    Okabe-Ito and approved continuous colormap rules — use Bokeh''s Viridis256 or
    Cividis256 sampled to 12 colors for a CVD-safe sequential gradient'
  - 'Insufficient ridge overlap: ridge_height=0.65 creates ~15% overlap; spec requires
    50-70% — increase ridge_height to 1.0-1.5 to achieve proper Joy Division-style
    stacking'
  - 'Outline border retained: p.outline_line_color = INK_SOFT keeps a four-sided box;
    set to None to remove the top and right sides for cleaner visual refinement'
  - Jan ridge peak clips at the top of the plot boundary — add top padding by extending
    y_range or adjusting margins
