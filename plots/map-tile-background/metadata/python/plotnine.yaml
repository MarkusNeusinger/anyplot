review:
  strengths:
  - 'Full theme-adaptive implementation: backgrounds, text, terrain colors, and label
    fills all respond correctly to ANYPLOT_THEME in both renders'
  - Clever use of plotnine grammar-of-graphics primitives (geom_rect + geom_polygon)
    to approximate a tile-style map within a library with no native map support
  - Dual encoding (color=category, size=visitors) with correct Imprint palette assignment;
    brand green correctly assigned to first alphabetical category
  - Clean code with no functions/classes, proper seed, all imports used, correct output
    API
  weaknesses:
  - 8 categories pushes the Imprint palette to its limit (style guide requires redundant
    marker-shape encoding at n=7-8); add shape=category to aes() and scale_shape_manual()
    to improve CVD accessibility
  - Attribution text at size=2.5mm is very small and will be unreadable at mobile
    widths; increase to 3.0-3.5mm
  - Smallest data points (visitors~500, geom_point size=2 ggplot units) barely visible
    in dense central cluster; raise scale_size_continuous range from (2,10) to (3,12)
  - Union Square label nudge_x=0.025 lands very close to right coord boundary (lon=-122.38
    vs lon_max=-122.36); reduce to nudge_x=0.01 or nudge downward to give breathing
    room
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface — correct anyplot light theme background
      Chrome: Title "map-tile-background · python · plotnine · anyplot.ai" bold dark text, readable; axis labels "Longitude (°)" and "Latitude (°)" in dark INK color; tick labels in INK_SOFT; legend text readable
      Data: Simulated tile grid (beige land, light-blue water), brown coastline polygon, 15 landmark circles color-coded by 8 Imprint palette categories with size proportional to visitor count; first category "Cultural" correctly gets brand green #009E73; box labels on top-3 landmarks
