review:
  strengths:
  - Genuinely fetches and stitches live OpenStreetMap tiles with a hand-rolled Web
    Mercator projection, then auto-fits the data bounds and expands them to the exact
    16:9 canvas — a real tile-background map, not a faked basemap.
  - Required OSM attribution is present and styled in a theme-adaptive box, satisfying
    the tile-provider license terms called out in the spec.
  - Temperature is double-encoded via the Imprint diverging cmap (cold-blue → neutral
    → hot-red) plus marker size, producing a clear coast-to-inland microclimate story
    with Livermore as a natural focal point.
  - Chrome (title banner, label callouts, colorbar panel, attribution) flips correctly
    between light/dark themes while the colormap endpoints stay identical; theme-adaptive
    midpoint follows the documented imprint_div pattern.
  - Station labels use hand-tuned per-point offsets and translucent callout boxes,
    keeping all 12 labels legible and clear of their markers in both renders.
  weaknesses:
  - 'Mid-temperature markers (e.g. Fremont, Hayward ~20-21°C) take the theme-adaptive
    midpoint color: off-white in light, near-black in dark. The white edge keeps them
    visible, but the light-render mid markers are slightly low-contrast against the
    pale OSM tiles — consider a faint outer ring or a touch more edge contrast.'
  - OSM tiles stay light in the dark render (no dark tile endpoint is fetched), so
    the dark mode is chrome-only adaptation. This is the only sensible approach for
    a tile-background map, but the map surface itself does not darken.
  - Module-level gx()/gy() projection helpers technically depart from the strict no-functions
    KISS preference; they are tiny and necessary for the .map() projection, so impact
    is minimal.
  - Only OpenStreetMap is used; the spec mentions supporting multiple tile providers
    (Stamen/CartoDB/satellite). A single provider per implementation is reasonable,
    but provider variety is not demonstrated.
  image_description: |-
    Light render (plot-light.png):
      Background: Full-bleed OpenStreetMap tile mosaic of the SF Bay Area — warm beige roads, green parks, pale-blue Pacific water. There is no separate plot background; the map fills the 3200×1800 canvas by design.
      Chrome: Top title banner "Bay Area Weather Stations · map-tile-background · seaborn · anyplot.ai" in a cream (#FFFDF6) rounded box with dark text and a soft border — clearly readable. Station labels sit in light callout boxes with bold dark text. Bottom-left translucent panel holds the "Temperature (°C)" colorbar (16–26) with small dark tick labels. Bottom-right "© OpenStreetMap contributors" attribution in a light box. All chrome text readable.
      Data: 12 station markers on the imprint_div diverging scale — cold-blue (#4467A3) for coastal stations (Richmond, SF Downtown, Half Moon Bay ~15-17°C), through near-white at the midpoint (Fremont/Hayward ~20-21°C), to hot-red (#AE3030) inland (Livermore, Concord ~25-26°C). Markers sized by temperature, white edge outline, alpha ~0.92. No #009E73 first-series (continuous data, N/A).
      Legibility verdict: PASS (mid-temp light markers are slightly low-contrast on pale tiles but remain visible via the white edge and large size).

    Dark render (plot-dark.png):
      Background: Same light OpenStreetMap tile mosaic (standard OSM tiles cannot be themed dark; this is inherent to a tile-background map).
      Chrome: Title banner, label callouts, colorbar panel, and attribution box all flip to dark surfaces (#242420) with light text (#F0EFE8) — no dark-on-dark failures; every label and tick is readable.
      Data: Marker colormap endpoints identical to the light render (blue #4467A3 coastal, red #AE3030 inland). Only the diverging midpoint flips to near-black (#1A1A17) per the documented theme-adaptive imprint_div pattern, so mid-temp markers read as dark dots with a white edge — clearly visible against the light tiles.
      Legibility verdict: PASS.
