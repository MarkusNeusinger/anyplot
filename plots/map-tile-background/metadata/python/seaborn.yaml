review:
  strengths:
  - Genuinely fetches and stitches real OpenStreetMap tiles, projects lon/lat through
    proper Web Mercator math, and crops to an exact 16:9 window so the basemap fills
    the full-bleed canvas without distortion
  - 'Theme-adaptive chrome threaded correctly: title banner, callout label boxes,
    colorbar panel, and attribution all flip between light/dark while data colors
    hold; both renders are fully readable'
  - Continuous temperature encoded with the Imprint diverging cmap (cold-blue -> theme
    midpoint -> hot-red) plus a dual ring/white-edge outline that guarantees marker
    contrast against pale tiles
  - Hand-tuned per-station label offsets keep all 12 callouts clear of their markers
    and neighbours; required OSM attribution included per license
  - Exact 3200x1800 canvas, KISS flat structure with no helper functions, clean imports,
    deterministic
  weaknesses:
  - Only one tile provider (OpenStreetMap) is used; the spec mentions supporting multiple
    providers (Stamen, CartoDB, satellite) and marker clustering for dense distributions
    - neither is exercised, though both are reasonable to omit for a static 12-point
    render
  - The diverging colormap midpoint is theme-adaptive, so a near-midpoint station
    (Fremont ~21 C) renders off-white in light mode and near-black in dark mode -
    sensible for tile contrast but means that single value's fill is not identical
    across themes
  - Implementation is ~80% matplotlib composition (imshow, annotate, inset_axes, colorbar);
    seaborn only draws the scatter layer, limiting distinctive seaborn-specific feature
    usage
  - Station labels at fontsize 8.5pt become tight when the render is scaled to ~400px
    mobile width, and the bottom-left Palo Alto / Half Moon Bay callouts sit close
    together
  image_description: |-
    Light render (plot-light.png):
      Background: Real OpenStreetMap tiles (warm beige roads, green parks, light-blue Pacific) filling the full-bleed 16:9 frame; the #FAF8F1 page background is only the savefig facecolor behind the opaque tile mosaic.
      Chrome: Title banner "Bay Area Weather Stations · map-tile-background · seaborn · anyplot.ai" in a light elevated box with dark ink text, top-center, fully visible/not clipped. Station callout labels in pale rounded boxes with dark text. Colorbar panel bottom-left ("Temperature (°C)", 16–26 ticks) and "© OpenStreetMap contributors" bottom-right both readable. All chrome readable against the map.
      Data: 12 weather-station markers sized + colored by temperature via the Imprint diverging cmap — coastal stations cool blue (#4467A3 end), inland Livermore/Concord hot red (#AE3030 end), Fremont near off-white midpoint. Each marker has a faint dark ring + white edge for separation.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Identical OSM tile mosaic (tiles do not theme-flip, by design — they are the geographic context). #1A1A17 page background only behind the opaque tiles.
      Chrome: Title banner now in a dark elevated box (#242420) with light ink text — readable, no dark-on-dark. Callout label boxes dark with light text; colorbar panel and attribution dark/translucent with light text. All chrome readable; no dark-on-dark failures.
      Data: Marker hues identical at the blue and red extremes; only the diverging-cmap midpoint adapts (Fremont renders near-black instead of off-white) to stay visible on the light tiles. Sizes and positions identical to the light render.
      Legibility verdict: PASS
