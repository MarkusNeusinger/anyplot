review:
  strengths:
  - Real OSM tile fetching with proper Web Mercator projection math — asinh/atan formulas
    correctly used for coordinate conversion
  - Dual encoding (color + size) for temperature shows both spatial distribution and
    magnitude, with imprint_seq correctly applied to continuous data
  - Per-station anti-collision label offsets prevent overlap in the dense southern
    peninsula cluster
  - Theme-adaptive tokens correctly applied in both renders — ELEVATED_BG for label
    boxes prevents dark-on-dark in dark theme
  - OSM attribution included as required by tile provider license
  - Canvas dimensions correct (3200×1800, no bbox_inches='tight'), saving exactly
    as plot-{THEME}.png
  weaknesses:
  - Southern cluster (Mountain View / Sunnyvale / Santa Clara / San Jose) still has
    tight label boxes with marginal overlap — consider larger offsets or leader-line
    annotations for that subgroup
  - Only OSM tile provider used; spec requests awareness of multiple providers (CartoDB,
    Stamen) — at minimum, document or parameterise the tile URL so a provider can
    be swapped
  - seaborn's contribution is limited to sns.scatterplot — the heavy lifting (tile
    fetch, Web Mercator projection, PIL stitching) is pure PIL + matplotlib; LM-02
    penalised accordingly
  - np.random.seed(42) called but no random data generated — all station data is hardcoded;
    seed call is dead code
  - 'DE-02: whitespace around the map edges is tighter than ideal; adding modest fig.subplots_adjust()
    padding on all sides would improve breathing room'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 fills the canvas — correct theme surface.
      Chrome: Title "Bay Area Weather Stations · map-tile-background · python · seaborn · anyplot.ai" rendered in dark ink (#1A1A17) at fontsize=10, spanning ~70% of the canvas width — readable and well-proportioned. Colorbar label "Temperature (°C)" and tick values in INK/INK_SOFT — fully legible. OSM attribution in small (6pt) text at bottom-right inside a rounded ELEVATED_BG box.
      Data: 15 weather station dots encoded with dual imprint_seq color (green #009E73 at cool end → blue #4467A3 at warm end) and size (150–600 pts²). White marker edges contrast well against the OSM tile background. Station name labels appear in dark ink inside rounded ELEVATED_BG (#FFFDF6) boxes with no visible border. OSM tile background shows San Francisco Bay Area street/terrain detail clearly.
      Legibility verdict: PASS — all text readable; minor crowding in the southern cluster (Mountain View / Sunnyvale / Santa Clara / San Jose) but labels are mostly distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 fills the canvas outside the map tile area — correct dark-theme surface.
      Chrome: Title and all text rendered in #F0EFE8 (INK token for dark theme) against the near-black background — fully legible. Station label boxes use ELEVATED_BG (#242420) which contrasts from the dark canvas background and prevents dark-on-dark failure. Colorbar ticks use INK_SOFT (#B8B7B0) — readable against dark side panel. OSM attribution box uses ELEVATED_BG fill.
      Data: Data point colors (imprint_seq gradient: #009E73→#4467A3) are identical to the light render — only the canvas chrome has flipped, confirming correct theme-adaptive implementation.
      Legibility verdict: PASS — no dark-on-dark failures detected; all label boxes visually distinct from the dark background; colorbar readable.
