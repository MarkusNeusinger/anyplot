review:
  strengths:
  - Theme-adaptive tile provider selection (OSM light / CARTO dark) is a sophisticated
    design decision that goes beyond the spec requirement
  - Dual encoding (size + color) for visitor count creates strong visual hierarchy
    with the Colosseum and Vatican immediately prominent
  - Full theme-adaptive chrome with INK token cascade correctly applied to colorbar,
    attribution box, annotation labels, spines, and tick params in both renders
  - No bbox_inches=tight — canvas is exactly 3200x1800 px as required
  - imprint_seq colormap correctly chosen for single-polarity continuous visitor data
  weaknesses:
  - Attraction name labels at fontsize=5 are borderline small at mobile widths (~400
    px); increase to fontsize=6 and adjust xytext offsets to maintain map readability
  - Label crowding in the dense Vatican/Castel Sant Angelo/St. Peters cluster — several
    labels sit too close; use per-attraction directional xytext offsets to spread
    labels and reduce near-overlap
  - Daily visitor counts are ~3x lower than actual figures (Colosseum is ~20,000+/day,
    not 7,200); update values to better reflect real-world scale while preserving
    correct relative ordering
  - 'DE-02 headroom: colorbar styling and annotation label placement could be more
    intentional to push visual refinement further'
