review:
  strengths:
  - 'Perfect spec compliance: geom_livemap with real tile providers for interactive
    HTML + creative static tile simulation using geom_rect/geom_polygon'
  - 'Excellent theme adaptation: tile colors, land polygon colors, and chrome all
    independently adapt between light (#FAF8F1) and dark (#1A1A17) surfaces'
  - 'Distinctive letsplot features used idiomatically: tilesets.CARTO_POSITRON/LETS_PLOT_DARK,
    layer_tooltips() with formatted lines, geom_livemap location/zoom params'
  - 'Perfect data quality: real European cities with plausible visitor counts, 20-point
    dataset with meaningful geographic and magnitude variation'
  - Clean theme_void() approach removes all axis noise, appropriate for a geographic
    map visualization
  - White stroke (color=PAGE_BG) on bubbles provides contrast against both tile backgrounds
  weaknesses:
  - Land polygon approximations are very crude (35–19 polygon-vertex outlines) — the
    resulting shapes look geometric rather than geographic; repair should use geopandas
    with Natural Earth data (ne_110m_admin_0_countries) or at minimum a higher-vertex
    approximation to get recognizable country outlines
  - layer_tooltips() is attached to geom_point in the static PNG version — tooltips
    have no effect in static raster exports and constitute dead code; remove from
    the static plot or note it is intentional for when users adapt the code to interactive
  - Caption font size=8 renders at 32pt-equivalent in the output image but drops to
    ~4pt when scaled to mobile 400px width — tertiary text but still consider increasing
    to 10pt
  - 'Design could be more polished: the static tile grid (geom_rect 5-degree cells)
    creates visible coarse squares that look unfinished compared to a real tile background;
    reducing tile_size to 2-3 degrees would create a finer, more convincing grid'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fills the outer canvas. The map area has a light gray tile grid created by geom_rect cells (~5-degree squares) in #E8E8E6 with subtle #D0D0CE borders.
      Chrome: Title "map-tile-background · python · letsplot · anyplot.ai" in dark INK (#1A1A17), approx 50% canvas width at size=16. Caption in muted dark text at bottom-right. Legend "Visitors (thousands)" with three reference bubbles (10K, 20K, 30K) placed to the right, clearly readable.
      Data: European land polygons in beige/tan (#D5D1C8 fill, #B5B1A4 border) — crude but recognizable mainland, Scandinavia, Britain, Ireland, Italy, Balkans outlines. 20 green (#009E73) bubble markers sized by visitor count, white (#FAF8F1) stroke at stroke=2 for contrast. Paris bubble is largest (~38K), London second.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) fills the outer canvas. Map area uses dark olive-gray tile cells (#2A2A27 fill, #3A3A37 border), creating a convincing dark map aesthetic.
      Chrome: Title in light cream (#F0EFE8/INK_DARK), clearly readable. Caption in lighter muted text at bottom. Legend text in #B8B7B0 (INK_SOFT_DARK) on #242420 elevated background with subtle border — fully readable.
      Data: Land polygons in dark olive (#38382F fill, #4A4A40 border) clearly distinguishable from the tile background. Green data bubbles (#009E73) are IDENTICAL to light render — only chrome flips. White stroke on bubbles replaced by dark (#1A1A17) background-colored stroke, maintaining visual clarity.
      Legibility verdict: PASS — all text readable against the dark surface; no dark-on-dark issues; brand green #009E73 clearly visible.
