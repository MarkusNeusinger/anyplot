review:
  strengths:
  - Correct Web Mercator projection implemented manually from lat/lon to pixel coordinates
  - Proper OpenStreetMap tile grid construction using mark_image for authentic tile-based
    background
  - Theme-adaptive chrome (title, subtitle, legend colors, page background) correctly
    applied using INK/INK_SOFT/PAGE_BG/ELEVATED_BG tokens
  - 'Anyplot categorical palette correctly applied to 5 landmark categories with Monument
    as brand green #009E73'
  - Interactive HTML output with zoom/pan via .interactive()
  - Required OSM attribution included as a dedicated text layer
  - PIL canvas-padding to exact 3200x1800 target without cropping
  - Selective labeling threshold (≥10M visitors) avoids label clutter while identifying
    standout landmarks
  weaknesses:
  - Only one tile provider (OSM) implemented — spec requires multiple providers (OpenStreetMap,
    Stamen Terrain/Toner, CartoDB, satellite). Add a second provider or at minimum
    demonstrate the pattern with a provider switch for dark mode.
  - 'Dark mode uses the same light-colored OSM tiles on a #1A1A17 near-black background,
    creating a visual mismatch — light map island on dark chrome. For proper dark-mode
    map, switch to a dark tile provider such as CartoDB Dark Matter (https://basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png)
    when THEME==dark.'
  - labels_layer and attribution_layer are missing axis=None on their x/y encodings
    — only tile_layer and points_layer suppress axes. While the merged Vega-Lite spec
    resolves this correctly in practice, the intent should be explicit on every layer
    to prevent axis ticks leaking if layer order changes.
  - 'DE-01/DE-02: The overall composition feels like a well-configured default rather
    than a deliberately styled piece — the busy OSM color scheme competes with the
    anyplot categorical palette. Consider using a muted/greyscale tile style (e.g.,
    CartoDB Positron) in light mode to let the anyplot data colors pop more clearly.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 as page background, surrounding the map tile area — correct.
      Chrome: Title "map-tile-background · python · altair · anyplot.ai" in dark near-black INK color, clearly readable. Subtitle "European Landmarks by Annual Visitors" in INK_SOFT, also readable. No axis tick labels (appropriate for a map). Two legends at bottom corners with elevated #FFFDF6 box fill and INK_SOFT border — both readable.
      Data: 20 European landmark circles sized by annual visitors (0.5M–37M), colored by category: Monument=#009E73 (green), Historical=#C475FD (lavender), Museum=#4467A3 (blue), Religious=#BD8233 (ochre), Street=#AE3030 (red). White stroke on all circles for definition. Two landmark text labels ("La Rambla", "Notre-Dame") in bold dark INK text. OSM tile background fills the inner chart area with colorful street-level map of Europe.
      Legibility verdict: PASS — all title, subtitle, and legend text is clearly readable against the off-white background; data circles with white strokes are well-defined against the map tiles.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 as page background — correct.
      Chrome: Title and subtitle text appear in light #F0EFE8 (INK in dark theme), clearly readable against the dark background. Legend boxes use elevated #242420 background with #B8B7B0 stroke; legend text (labels and titles) is light-colored and readable. No dark-on-dark text failures observed in chrome elements.
      Data: Categorical circle colors are identical to the light render — same #009E73, #C475FD, #4467A3, #BD8233, #AE3030 as expected. The OSM tiles remain light-colored (external provider, no dark tile variant), creating a visual contrast with the dark chrome border. Landmark labels use INK=#F0EFE8 (near-white) which shows up against the darker map tile areas but could be marginally less readable on lighter tile zones.
      Legibility verdict: PASS for chrome elements; mild concern that near-white landmark labels on light OSM tiles have reduced contrast compared to the light render, but text remains distinguishable.
