review:
  strengths:
  - Creative map tile simulation using two-tone ocean/land background colors (ocean
    blue + warm beige in light, navy + near-black in dark) — a smart workaround for
    pygal's lack of real tile-map support
  - 'Justified semantic color exception: Cool→blue (#4467A3), Mild→green (#009E73),
    Warm→red (#AE3030) maps directly to universally understood cold/mild/hot temperature
    associations'
  - Realistic, neutral dataset of 25 US weather monitoring stations with plausible
    annual mean temperatures; geographic positioning is accurate
  - Per-point hover labels in the pygal XY data dictionaries (city name + temperature)
    exploit pygal's native interactivity, saved as both PNG and HTML
  - Clean flat script with well-commented import workaround (avoiding self-import
    for a file named pygal.py); correct font size scaling formula applied
  weaknesses:
  - Leftmost x-axis tick label (-128°) is positioned at the very left edge of the
    data range (xrange starts at -128), causing the label to sit crowded against the
    plot border and partially overlap with the y-axis tick-label area in both renders
    — increase margin_left or shift xrange to (-132, -58) to give the first label
    breathing room
  - 'Outer page background deviates from the standard #FAF8F1 (light) / #1A1A17 (dark):
    light uses ocean blue #b8d4e8, dark uses navy #1c2e40 — while this evokes map
    tile context, it means the plot doesn''t visually integrate into the anyplot website
    surface; consider keeping the page background standard and confining the tile-simulation
    color to plot_background only'
  - Design Excellence is limited to the two-tone background choice; pygal's SVG rendering
    lacks spine-removal controls and more refined aesthetic treatment — the chart
    reads as functional but not visually polished
  - 'SC-01: no actual tile imagery (OSM/Stamen/satellite) is rendered — pygal cannot
    load raster tiles, so this is a simulated approximation rather than a true tile-background
    map; the spec''s primary requirement goes partially unmet'
  image_description: |-
    Light render (plot-light.png):
      Background: Outer canvas is ocean blue (#b8d4e8); inner plot area is warm beige (#eae6df) simulating land. These deliberately deviate from the standard #FAF8F1 to suggest a map tile context.
      Chrome: Title "map-tile-background · python · pygal · anyplot.ai" rendered in dark ink, well-proportioned (~70% plot width). Y-axis label "Latitude (°)" and X-axis label "Longitude (°)" in dark ink, balanced and readable. Y-axis tick labels (24°, 29°, 34°, 39°, 44°, 49°) readable. X-axis tick labels (-128°, -118°, -108°, -98°, -88°, -78°) readable, though the leftmost (-128°) label sits crowded against the left plot border, partially overlapping the y-axis tick area.
      Data: Blue dots (#4467A3) for Cool (<12°C) stations clustered in the northwest (Seattle, Portland, Minneapolis, Chicago area). Green dots (#009E73) for Mild (12-22°C) stations spread across the middle US. Red dots (#AE3030) for Warm (>22°C) stations in the southeast and desert southwest. Dots are appropriately sized (16-24 units) for the 25-point sparse dataset. Legend at bottom shows all three categories clearly. Dashed grid lines visible but subtle.
      Legibility verdict: PASS — all text readable against the beige/blue background. Minor crowding at leftmost x-axis tick label but not a complete failure.

    Dark render (plot-dark.png):
      Background: Outer canvas is dark navy (#1c2e40); inner plot area is near-black (#1A1A17) — the inner plot background correctly matches the standard dark surface.
      Chrome: Title in light cream text, clearly readable against dark navy. Axis labels "Latitude (°)" and "Longitude (°)" in light text, readable. Y-axis tick labels and x-axis tick labels rendered in light text. Same leftmost x-axis tick label (-128°) crowding observed as in light render. Legend at bottom with light text on dark background, all three categories legible.
      Data: Colors are IDENTICAL to the light render — blue (#4467A3) for Cool, green (#009E73) for Mild, red (#AE3030) for Warm — correct theme-independence for data colors. Dots are clearly visible against the dark background.
      Legibility verdict: PASS — no dark-on-dark text failures. All title, axis labels, tick labels, and legend text are clearly readable against the dark surfaces. Brand green #009E73 (Mild series) is visible on the dark background.
