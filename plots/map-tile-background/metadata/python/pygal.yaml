review:
  strengths:
  - Theme adaptation is excellent — both light (#FAF8F1 page bg + warm LAND_BG) and
    dark (#1A1A17) renders are clearly readable with fully theme-adaptive chrome
  - 'Semantic color exception for temperature correctly applied: cool→blue (#4467A3),
    mild→green (#009E73), warm→red (#AE3030) — a reader would immediately expect these
    mappings'
  - Redundant size encoding (cooler=16px, mild=20px, warm=24px dots) reinforces the
    color gradient and aids CVD accessibility
  - Interactive HTML export generated alongside PNG — pygal's key differentiator from
    static libraries, enabling tooltip hover with city name and temperature
  - Title font size correctly scaled with the length formula, keeping the mandated
    title within the plot without overflow
  - 'Data is realistic and accurate: real US cities with plausible annual mean temperatures
    (Seattle 11°C, Miami 27°C, Phoenix 28.5°C)'
  weaknesses:
  - 'plot_background uses custom #eae6df (LAND_BG) for the light render instead of
    the mandated #FAF8F1 — the map-metaphor intent is clear but deviates from the
    VQ-07 palette compliance rule for plot backgrounds'
  - No actual tile background layer — spec requires OpenStreetMap/Stamen/CartoDB tile
    imagery; pygal is an SVG chart library with no tile-map capability, so the implementation
    is a coordinate scatter only
  - Tile provider attribution omitted — spec requires attribution for tile provider
    terms of use; while no actual tiles are loaded, a note explaining the library
    limitation would improve transparency
  - DQ-01 feature coverage limited by the absence of tile layers, zoom-level auto-fit,
    and clustering for dense points — the visualization demonstrates geographic scatter
    but not the full tile-map interaction model the spec describes
  image_description: |-
    Light render (plot-light.png):
      Background: Outer page area is warm off-white #FAF8F1; plot area uses LAND_BG #eae6df (slightly darker warm beige simulating geographic land surface). NOT pure white.
      Chrome: Title "map-tile-background · python · pygal · anyplot.ai" clearly visible in dark ink at top, spanning ~70% of plot width. X-axis label "Longitude (°)" and Y-axis label "Latitude (°)" readable in dark text. Tick labels (-128° to -68° on X, 24° to 49° on Y) are readable in muted dark tone. Legend at bottom shows three categories with clear dark text.
      Data: 25 scatter dots grouped in three categories — blue (#4467A3) for Cool (<12°C), green (#009E73) for Mild (12–22°C), red (#AE3030) for Warm (>22°C). Dot sizes vary by category (16/20/24px). Geographic clustering clearly shows warm cities in the south (red, Florida/Texas coast) and cool cities in the north (blue, Pacific Northwest/Upper Midwest).
      Legibility verdict: PASS — all text clearly readable against the warm light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 throughout (page bg and plot bg are identical in dark mode as LAND_BG=#1A1A17=PAGE_BG). NOT pure black.
      Chrome: Title clearly visible in light (#F0EFE8) text. Axis labels "Longitude (°)" and "Latitude (°)" readable in light text. Tick labels readable in muted light tone. Legend at bottom readable with light text. No dark-on-dark failures detected.
      Data: Blue/green/red dot colors are identical to the light render — only chrome (background, text, grid) flipped to dark theme. The three temperature categories remain clearly distinguishable.
      Legibility verdict: PASS — all text clearly readable against the near-black background. Data colors unchanged from light render as required.
