      Data: Same city circles with identical imprint_seq colors — brand green (#009E73) at the low end, #4467A3 at the high end. Colors are visually identical to the light render confirming data-color theme-independence. White outlines remain effective against the dark map tiles.
      Legibility verdict: PASS — all text is light-on-dark, no dark-on-dark failures. Brand green #009E73 is visible at the low end of the colorbar range. No "dark text on near-black background" issue.
