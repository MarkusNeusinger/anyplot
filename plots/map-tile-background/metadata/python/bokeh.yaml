    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) fill behind and around the map — correct theme surface.
      Tiles: CartoDB Positron (light gray/white street map), providing geographic context for Western Europe from Portugal to Poland and the Baltics.
