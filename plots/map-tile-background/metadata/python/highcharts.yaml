review:
  strengths:
  - Excellent tiledwebmap + mappoint layer composition using Highcharts Maps-specific
    API — layers the tile background under proportional data bubbles idiomatically
  - Dark mode tile inversion via CSS filter (invert(1) hue-rotate(200deg) brightness(0.75)
    saturate(0.85)) is a clever and effective technique for dark-theme tile maps
  - Auto-computed map center and zoom derived from data bounds — view adapts automatically
    if data changes, showing good design thinking
  - Proportional bubble sizing (radius 8–30px based on visitor count) creates immediate
    visual hierarchy — Paris dominates, Warsaw at the tail
  - 'All theme-adaptive chrome tokens correctly applied: PAGE_BG, INK, INK_SOFT used
    for title, subtitle, credits, marker outline, and data label color + outline'
  - Realistic European tourism data with accurate city coordinates and plausible ~2023
    visitor counts
  - Title fontsize correctly scaled with title length via linear formula; text outline
    on data labels (3px PAGE_BG) ensures readability on diverse tile textures
  - Proper tile attribution in credits as required by OpenStreetMap terms of service
  weaknesses:
  - Data labels at fontSize 34px are below the style-guide-recommended 44px for highcharts
    data labels; at mobile widths (~400px) city names may become borderline readable
    — increase to 40–44px
  - Implementation bypasses highcharts_core Python SDK entirely and builds raw JSON
    config; while valid for tiledwebmap (Maps module), it skips the typed Python API
    — LM-01 deduction
  - 'Minor label crowding in the central European cluster: Prague (50.08°N), Vienna
    (48.21°N), and Budapest (47.50°N) labels placed at y:-18 may visually crowd each
    other; consider adding a small offset for conflicting labels'
  - mapNavigation zoom buttons rendered in default Highcharts styling without explicit
    theme adaptation — in the dark render the buttons appear with default (white/light)
    chrome which may stand out slightly against the dark panel
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 visible in the title/subtitle band at top and bottom strip; the map area is occupied by OpenStreetMap tile imagery (green land, blue water, roads, labels).
      Chrome: Title "European Tourism · map-tile-background · python · highcharts · anyplot.ai" in dark #1A1A17 text — clearly readable. Subtitle "Annual international arrivals — bubble size proportional to visitor volume" in lighter INK_SOFT text below. Credits "Tiles © OpenStreetMap contributors" in bottom-right at small but readable size.
      Data: 15 green (#009E73) circles of proportionally varying radii overlaid on the map tiles. Paris carries the largest bubble (~30px radius), Warsaw the smallest. City name data labels appear in dark text with a 3px #FAF8F1 outline providing contrast against the tile background. All city names (Paris, London, Rome, Madrid, Berlin, Barcelona, Amsterdam, Vienna, Prague, Budapest, Lisbon, Athens, Copenhagen, Stockholm, Warsaw) are readable.
      Legibility verdict: PASS — all title, subtitle, and city label text is clearly readable against the light OSM tiles and off-white frame areas.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 visible in the title/subtitle and bottom frame band. OSM tiles are CSS-inverted (invert(1) hue-rotate(200deg) brightness(0.75) saturate(0.85)), producing a dark greenish map aesthetic — land areas are dark teal/olive, water is dark teal-blue.
      Chrome: Title and subtitle rendered in light #F0EFE8 text — clearly readable against the #1A1A17 dark background. Credits in INK_SOFT (#B8B7B0) at bottom-right, readable.
      Data: Green (#009E73) circles identical in color and size to the light render — data palette is unchanged. City labels rendered in #F0EFE8 (INK in dark theme) with 3px #1A1A17 dark outline — visible against the dark-tinted tiles. No dark-on-dark failures observed; all labels are readable.
      Legibility verdict: PASS — no dark-on-dark text failures; all chrome is theme-correct; data colors are identical to the light render.
