review:
  strengths:
  - tiledwebmap series with OpenStreetMap tiles is exactly right for this spec — native
    Highcharts Maps approach
  - Bubble size encoding (radius 8–30) clearly communicates visitor volume hierarchy;
    Paris and London visually dominate as expected
  - Dark mode via CSS invert + hue-rotate filter on tile image elements is a sophisticated,
    standard browser technique that produces a readable dark map
  - Real, plausible European city tourism data with accurate geographic coordinates
    and credible visitor counts
  - Descriptive title prefix 'European Tourism ·' plus an informative subtitle explaining
    the size encoding
  - Proper tile attribution ('Tiles © OpenStreetMap contributors') meets the spec's
    ToS requirement
  - 'Canvas management is correct: CDP setDeviceMetricsOverride, chart width/height,
    div dimensions, and PIL normalization all in sync'
  - Both HTML artifacts saved alongside PNGs — interactive tooltips work in HTML even
    though PNG is static
  - Theme tokens (PAGE_BG, INK, INK_SOFT) consistently applied to all chrome elements
  weaknesses:
  - 'mapNavigation is explicitly disabled (`''enabled'': False`) — spec says ''For
    interactive libraries, enable zoom and pan to explore data at different scales.''
    The HTML output must have navigation enabled; set `''mapNavigation'': {''enabled'':
    True, ''enableButtons'': True}`.'
  - Only OpenStreetMap tiles are used; spec says 'Support multiple tile providers
    (OpenStreetMap, Stamen Terrain/Toner, CartoDB, satellite).' At minimum, pick a
    second distinctive provider (e.g. CartoDB Positron or a satellite provider) and
    either show a comment with the alternative config or use it as the default — demonstrating
    the multi-provider capability that defines this spec.
  - 'City data labels are 26px — below the 44px minimum recommended for tick-equivalent
    text at 3200×1800. On a 3200px canvas, 26px labels are quite small and hard to
    read when the image is scaled down. Increase to at least 32–36px (map context
    allows slightly smaller than axis labels, but not this small). The `y: -14` offset
    may need adjusting when label size increases.'
  - 'Zoom level is hardcoded (`''zoom'': 6`) rather than auto-fitted to the data bounding
    box. Calculate bounds from the city lat/lon values and derive an appropriate zoom/center
    via Highcharts'' `mapView.fitToGeometry` or compute bounds explicitly so the view
    adapts if data changes.'
  - 'cursor set to ''default'' on the mappoint series suppresses the interactive pointer
    affordance in the HTML, making points look non-interactive even though tooltips
    are defined. Remove `''cursor'': ''default''` or change to `''pointer''`.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 for the title/subtitle strip at top and narrow margins; the map body is covered by OpenStreetMap tiles showing street-level European terrain (light beige/gray land, blue water, labeled roads and borders).
      Chrome: Title "European Tourism · map-tile-background · python · highcharts · anyplot.ai" in dark ink, readable at top. Subtitle "Annual international arrivals — bubble size proportional to visitor volume" in lighter gray below it. Attribution "Tiles © OpenStreetMap contributors" small but visible at bottom-right.
      Data: 15 green (#009E73) circles of varying radius (Paris and London largest, Warsaw and Lisbon smallest), each with a white PAGE_BG outline and city name label above. Bubble sizes clearly communicate the visitor volume hierarchy. All cities within the European map extent are visible.
      Legibility verdict: PASS — all title/subtitle/credit text is readable against the light background; city labels are somewhat small (26px) but identifiable; no dark-on-light failure.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 for the non-map margins; map tiles are inverted via CSS filter (invert+hue-rotate+brightness+saturate), producing a dark map with light road labels and green vegetation areas, similar to a "dark mode" tile set.
      Chrome: Title and subtitle text are rendered in light ink (#F0EFE8) — clearly readable against the #1A1A17 margins. Attribution is in INK_SOFT (#B8B7B0), visible in the bottom-right corner.
      Data: Same green (#009E73) circles — data colors are identical to the light render as required. The PAGE_BG outline on markers is now #1A1A17 (dark), which is appropriate against the dark tile background. City labels appear in light color (INK = #F0EFE8) with a dark text-outline against the dark tiles, readable.
      Legibility verdict: PASS — no dark-on-dark failure detected. Title, subtitle, and city labels are all readable in the dark theme. The tile inversion approach produces a visually coherent dark map without any chrome becoming invisible.
