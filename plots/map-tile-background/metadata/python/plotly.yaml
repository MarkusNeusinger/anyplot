review:
  strengths:
  - Excellent use of Plotly tile map capabilities with theme-adaptive map styles (open-street-map
    for light, carto-darkmatter for dark)
  - 'Clean dual encoding: both marker size and color encode visitor count, creating
    natural visual hierarchy with prominent top attractions'
  - 'Correct anyplot imprint_seq colorscale (#009E73 → #4467A3) applied to continuous
    visitor count data'
  - Custom colorbar styling with theme-adaptive bgcolor, bordercolor, and proper tickformat
  - Both PNG and interactive HTML outputs generated; hover tooltips with well-formatted
    template
  - Correct canvas dimensions (3200×1800) using width=800, height=450, scale=4
  - Realistic and relatable dataset (European landmarks with plausible visitor counts)
  - 'Full spec compliance: tile background, auto-fit zoom, attribution visible, interactive
    map features'
  weaknesses:
  - Two Prague landmarks (Charles Bridge lat=50.0865/lon=14.4114 and Old Town Square
    lat=50.0870/lon=14.4208) are geographically nearly identical — at zoom 3.5 their
    markers and text labels stack directly on top of each other causing clear overlap.
    Replace one Prague landmark with a different city or spread them across different
    Czech/Slovak cities.
  - Western Europe cluster (Big Ben, Anne Frank House, Manneken Pis, Eiffel Tower)
    causes label crowding at zoom 3.5 — consider using textposition='bottom center'
    alternation or offsetting overlapping labels, or reduce the label font size to
    11px to reduce crowding.
  - 'Design Excellence is below the bar for approval: no visual annotation highlighting
    the top attraction (Eiffel Tower at 7M or Colosseum at 7.4M), no subtitle storytelling
    cue. Add a brief annotation or callout for the most-visited landmark to create
    a clear focal point and improve DE-03.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) paper background framing the OpenStreetMap tile layer, which provides the standard OSM street/terrain rendering over Europe.
      Chrome: Title "European Landmarks by Visitor Count" in dark ink at 16px is clearly readable. Subtitle "map-tile-background · python · plotly · anyplot.ai" at 12px via HTML span is readable. Colorbar on the right shows "Annual Visitors" label (12px dark ink) with tick labels at 10px (INK_SOFT) formatted with commas — all readable against the FFFDF6 elevated background.
      Data: 15 bubble markers across Europe sized (15–50px diameter) and colored using imprint_seq (#009E73 → #4467A3); low-visitor landmarks appear green, high-visitor appear blue. Eiffel Tower and Colosseum have the largest/bluest markers. Landmark name labels in dark ink (14px, textposition top center) are legible individually. OSM attribution "© OpenStreetMap contributors" is visible bottom-right.
      Legibility verdict: PASS — all chrome text is readable. Minor label crowding in the Netherlands/Belgium/France cluster (Big Ben, Anne Frank House, Manneken Pis, Eiffel Tower). The two Prague landmarks (Charles Bridge, Old Town Square) overlap significantly due to near-identical coordinates.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) paper background framing the CartoDB Dark Matter tile layer, which shows a dark stylized map of Europe.
      Chrome: Title and subtitle text are rendered in #F0EFE8 (light ink) and are clearly readable against the dark paper background. Colorbar title "Annual Visitors" and tick labels are in theme-correct light colors on the #242420 elevated colorbar background — all readable.
      Data: Marker colors are identical to the light render — imprint_seq from #009E73 (green, low visitors) to #4467A3 (blue, high visitors) — data color identity is preserved across themes. Landmark name labels are in #F0EFE8 (light) against the dark map — readable throughout.
      No dark-on-dark failures detected: text is light-on-dark throughout.
      Legibility verdict: PASS — all text readable against dark background. Same Prague label overlap issue present. CARTO attribution visible bottom-right.
