review:
  strengths:
  - Theme-adaptive map tile providers (OpenStreetMap for light, Carto Dark Matter
    for dark) is a distinctly sophisticated choice that ensures both renders feel
    native to their theme
  - Double encoding of visitor count via marker size AND continuous imprint_seq colorscale
    creates strong visual hierarchy — the largest/darkest circles immediately draw
    the eye to top attractions
  - 'The ''★ Top attraction'' annotation callout with themed border specifically highlights
    the Colosseum as #1, excellent data storytelling'
  - Real European landmarks with accurate GPS coordinates and plausible visitor counts
    demonstrate careful domain knowledge
  - 'Full spec compliance: tile background, size/color encoding, attribution, interactive
    hover tooltips, HTML export, and auto-fit zoom level'
  weaknesses:
  - Label font size (11px at scale=4 = 44 source px) is slightly small — the NW Europe
    cluster (Big Ben, Manneken Pis, Anne Frank House) shows minor crowding; increasing
    to 12-13px and/or reducing the zoom area to show more spacing would improve legibility
  - The _select() helper function slightly violates KISS structure — inline list comprehensions
    or direct array slicing would keep the code flat
  - Two-trace approach (top_idx / bottom_idx) creates duplicated marker dict definitions
    — a single trace with a mixed textposition list would be cleaner and more idiomatic
    Plotly
  - 'DE-02: map-type plots still benefit from styling the colorbar more prominently
    and potentially adding a subtle outline/stroke to markers for better contrast
    against busy map tile areas'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) paper_bgcolor surrounds the OpenStreetMap tile area; map tiles show street-level Europe detail in muted beige/green/grey.
      Chrome: Two-line title "European Landmarks by Visitor Count" (16px, dark ink) + subtitle "map-tile-background · python · plotly · anyplot.ai" (12px) both clearly readable at top. Colorbar right-side with "Annual Visitors" label and tick labels in INK/INK_SOFT (dark) — fully readable. Annotation box "★ Top attraction / Colosseum · 7.4M visitors/yr" with green (#009E73) border and ELEVATED_BG (#FFFDF6) fill sits cleanly in lower-center.
      Data: 15 circular markers sized 15–50px proportional to visitor count, colored via imprint_seq (#009E73 green for low-visitor to #4467A3 blue for high-visitor). Landmark text labels in dark INK at 11px; alternating top/bottom positioning mitigates crowding. Colosseum and Eiffel Tower show largest/darkest markers. Attribution "© OpenStreetMap contributors" visible bottom-right.
      Legibility verdict: PASS — all text readable; mild label density in NW Europe cluster but no actual occlusion of critical information.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) paper_bgcolor surrounding Carto Dark Matter map tiles; dark grey/black tile aesthetic with light geographic labels.
      Chrome: Title and subtitle in light (#F0EFE8) INK — clearly readable against dark background. Colorbar title "Annual Visitors" and tick labels in light INK_SOFT (#B8B7B0) — fully readable. Annotation box with green border and ELEVATED_BG (#242420) fill — good contrast. Landmark text labels in light INK (#F0EFE8) at 11px — readable against dark map.
      Data: Identical marker colors to light render — imprint_seq green-to-blue gradient unchanged across themes. Marker sizes identical. Attribution "© CARTO, © OpenStreetMap contributors" visible bottom-right.
      Legibility verdict: PASS — no dark-on-dark failures; all chrome correctly adapts to dark theme; data colors identical to light render as required.
