review:
  strengths:
  - Theme-adaptive chrome correctly implemented — all ink, background, and elevated
    colors flip cleanly between light and dark renders with no dark-on-dark failures
  - Dual encoding (continuous color gradient + proportional size) clearly differentiates
    city tourism volumes; New York and Paris stand out immediately
  - 'Palette compliant — scale_fill_gradient uses exact imprint_seq stops (#009E73
    → #4467A3); backgrounds are correct warm off-white / near-black'
  - Clean, flat code structure with explicit font sizes, correct canvas (3200×1800),
    and reproducible set.seed(42)
  - Semantic land/ocean colors (beige land, blue ocean) provide strong geographic
    context without using external mapping packages
  weaknesses:
  - library(dplyr) is imported but never used — all data operations are base R (rbind,
    data.frame). Remove this unused import.
  - Design storytelling is absent — no city name labels, no annotation for the highest-value
    destination, no visual emphasis guiding the viewer. Adding geom_text labels for
    the top 3–4 cities would raise DE-03 significantly.
  - Continent polygon shapes are highly simplified (Scandinavia absent, Europe outline
    lacks Baltic states, Africa/South America have few vertices). Replacing with ggplot2::map_data('world')
    (ships with ggplot2, no extra packages) would improve geographic accuracy and
    raise SC-01 to 5/5.
  - DE-01 limited by lack of typographic hierarchy and visual focal point — the plot
    reads as a competent default rather than a designed artifact.
