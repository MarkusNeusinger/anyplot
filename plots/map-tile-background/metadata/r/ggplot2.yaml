review:
  strengths:
  - Theme-adaptive ocean/land colors (OCEAN_BG, LAND_FILL, LAND_BORDER) create convincing
    geographic context per theme without external map packages
  - Dual size+color encoding for visitor count with scale_size_continuous hidden from
    legend — elegant ggplot2 technique
  - Dynamic title font scaling formula prevents overflow on the long mandated title
    format
  - Hand-tuned nudge offsets with per-city hjust achieve clean label placement for
    the 6 labeled cities
  - Subtitle anchors the data story explicitly ('New York leads at 66.6M visitors/yr')
  - Full theme-adaptive chrome with correct tokens throughout both renders — no dark-on-dark
    failures
  weaknesses:
  - Smaller city markers (Sydney, Mumbai, Sao Paulo, Toronto, Cairo, Mexico City)
    use size ~3 in ggplot2 units — slightly small for a 12-point sparse dataset; increase
    scale_size_continuous range minimum from 3 to 4-5
  - NYC visitor count of 66.6M is slightly high versus typical reported figures (~50-60M);
    adjusting to ~56M would improve factual accuracy
  - City label text size (geom_text size=2.6 mm) is at the lower end of legibility;
    bumping to 2.8-3.0 would improve mobile readability
