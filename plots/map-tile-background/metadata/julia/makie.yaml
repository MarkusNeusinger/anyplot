review:
  strengths:
  - Theme-adaptive tile providers (OSM for light, CARTO dark for dark) is a best-in-class
    design decision
  - Correct Web Mercator projection implemented from scratch with mathematically accurate
    lat/lon to Mercator transforms
  - Tile stitching with proper pixel layout using permutedims handles Julia array
    orientation correctly
  - Top-8 city labeling strategy balances information density with readability
  - 'All spec requirements met: attribution, multiple tile providers, auto-fit bounds,
    markers on tiles'
  - Clean error handling for tile download failures with @warn
  weaknesses:
  - Colorbar width=16 is quite thin — increase to width=20 or width=24 for better
    readability
  - City label fontsize=10 is small; bumping to fontsize=11 would improve mobile readability
    without causing crowding
  - Attribution text at fontsize=9 may be hard to read on mobile scale — 10 is the
    practical floor
  image_description: |-
