review:
  strengths:
  - 'Correct theme-adaptive chrome: both light (#FAF8F1) and dark (#1A1A17) backgrounds
    implemented properly with all text tokens (INK, INK_SOFT) wired through to title,
    axis labels, tick labels, spines, and colorbar'
  - 'Proper imprint_seq continuous colormap (cgrad([#009E73, #4467A3])) applied to
    visitor count data — correct choice for single-polarity continuous encoding'
  - 'Dual size-and-color encoding of visitor count creates clear visual hierarchy:
    Paris and London dominate as large blue circles, smaller cities render as small
    teal dots'
  - City labels on top 8 most-visited cities with offset placement prevents marker
    overlap and guides the viewer to key data points
  - Clean, flat KISS code structure (theme tokens → data → plot → save) with no functions,
    classes, or over-engineering
  - Colorbar positioned in fig[1,2] with full theme theming (labelcolor, tickcolor,
    ticklabelcolor) — idiomatic Makie layout
  weaknesses:
  - 'CRITICAL — Tile background entirely absent: the spec is ''Map with Tile Background''
    and the defining feature is geographic tile imagery (OpenStreetMap, Stamen, CartoDB,
    satellite). The implementation renders a plain coordinate-system scatter plot
    on the anyplot canvas surface with zero tile pixels. Without the tile layer, this
    is simply a geographic scatter plot, not the specified plot type. Repair must
    either: (a) implement tile fetching via HTTP requests to a tile CDN (e.g., tile.openstreetmap.org/{z}/{x}/{y}.png),
    stitch tiles into a raster background and render with image!() or heatmap!() underneath
    the scatter, OR (b) if CairoMakie genuinely cannot support tiles, mark the file
    as NOT_FEASIBLE'
  - 'Tile provider attribution missing: the spec explicitly requires ''proper attribution
    for tile providers as required by their terms of use'' — OpenStreetMap requires
    ''© OpenStreetMap contributors'', CartoDB requires attribution. This must appear
    as a small annotation on the plot once tiles are added'
  - 'No auto-fit zoom to data extent: the spec says ''Set appropriate initial zoom
    level based on data extent (auto-fit to data bounds)''. The current axis range
    is global (-100 to 180 lon, -40 to 65 lat) which is wider than needed and leaves
    large empty regions. For a geographic scatter, axis limits should pad the data
    bounding box by ~10-15%, not extend to the full globe'
  - 'European cluster label crowding: London (''51.51 lat, -0.12 lon'') and Paris
    (''48.85 lat, 2.35 lon'') labels are very close together and compete for space.
    Amsterdam, Vienna, Budapest, Prague, Stockholm, Copenhagen are all unlabeled dots
    in the same tight cluster. Consider adjusting label offsets or using a leader-line
    annotation for the denser cluster'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct anyplot light surface. No tile imagery present; the plot background is the plain canvas color.
      Chrome: Title "map-tile-background · julia · makie · anyplot.ai" rendered in dark ink at fontsize=20, clearly readable. X-axis label "Longitude" and Y-axis label "Latitude" in dark ink at fontsize=14. Tick labels in INK_SOFT at fontsize=12. Colorbar label "Annual Visitors (millions)" rotated on right side, readable. Top and right spines removed; left and bottom spines in INK_SOFT.
      Data: 20 city markers as circles. Colors range from teal (#009E73 end) for low-visitor cities to dark blue (#4467A3 end) for high-visitor cities via imprint_seq gradient. Marker sizes range from ~10px (low visitors) to ~38px (Paris, London — highest visitors). Paris and London are the two largest, most saturated-blue circles, clustered around longitude 0-2 / latitude 48-52. Eight city labels: New York, London, Paris, Istanbul, Dubai, Bangkok, Singapore, Tokyo. Subtle grid lines visible. Large empty area in lower half (southern hemisphere) and in central-eastern longitudes.
      Legibility verdict: PASS — all text is readable against the warm off-white background. No light-on-light failure.

    Dark render (plot-dark.png):
      Background: Warm near-black approximately #1A1A17 — correct anyplot dark surface. No tile imagery present.
      Chrome: Title, axis labels, tick labels, and colorbar label all rendered in light (#F0EFE8 / #B8B7B0) tones against the dark background. All text clearly readable. No dark-on-dark failure observed. Grid lines subtle and barely visible against dark background.
      Data: Data colors are identical to the light render — same teal-to-blue gradient (imprint_seq), same marker sizes. The colormap positions (#009E73 → #4467A3) are visually confirmed identical between both renders. City labels in light color against dark background.
      Legibility verdict: PASS — all text is readable against the near-black background. No dark-on-dark failure. Brand green #009E73 is still visible at the teal/green end of the colorbar.
