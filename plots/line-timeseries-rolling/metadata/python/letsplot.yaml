  - 'Missing theme-adaptive implementation: code hardcodes plot.png/html instead of
    reading ANYPLOT_THEME environment variable'
  - 'No theme-adaptive chrome: background, text, and grid colors are not explicitly
    mapped to theme tokens (PAGE_BG, INK, INK_SOFT)'
  - 'Not using Okabe-Ito palette object: should define and use the canonical OKABE_ITO
    list'
