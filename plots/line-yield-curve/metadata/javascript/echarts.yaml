review:
  strengths:
  - Historically accurate U.S. Treasury yield data captures all three curve shapes
    (normal/flattening/inverted) with no abstract placeholder labels
  - Log-scale x-axis correctly reflects true term-structure spacing — a financially
    sophisticated choice
  - markArea inversion zone annotation is idiomatic ECharts and creates a clear visual
    focal point
  - Dynamic title font scaling (22 x 67 / len) prevents overflow on the long mandatory
    title string
  - 'Full theme-adaptive chrome: every non-data element wired to t.ink / t.inkSoft
    / t.grid / t.elevatedBg tokens; both renders pass readability'
  - Custom tooltip formatter maps hover x-value back to nearest maturity label — effective
    interactive UX
  weaknesses:
  - 'Top and right chart borders visible on both renders — ECharts defaults to full
    enclosing frame. Fix: set grid: { borderWidth: 0 } to remove the top/right borders.'
  - 'Inversion zone opacity (0.08) is too subtle in the dark render. Fix: raise markArea
    itemStyle opacity to 0.14 so shading is clearly visible in both themes.'
  - 'X-axis only labels 3 log-decade ticks (1M, 1Y, 10Y); the 30Y end is unlabelled.
    Fix: extend the axis formatter to return ''30Y'' when val is near 30.'
  - Bottom legend requires eye-travel to trace colours; consider adding ECharts series.label
    at position 'right' for direct end-of-line curve labels to strengthen storytelling.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface.
      Chrome: Title "U.S. Treasury Yield Curves · line-yield-curve · javascript · echarts · anyplot.ai" in dark bold text (~18 px dynamically scaled), clearly readable. Y-axis label "Yield (%)" and x-axis label "Maturity" in dark secondary text (16 px). Tick labels 0%-6% and 1M/1Y/10Y in secondary dark text (14 px). All readable.
      Data: Three lines — Jan 2021 in brand green (#009E73) near bottom (0-2% yields), Jul 2022 in lavender (#C475FD) in middle (1.87-3.32%), Mar 2023 in blue (#4467A3) at top (3.96-5.02%). Circle markers size 10 visible. Inversion zone shaded from 1Y to 10Y with "Inversion Zone" italic label.
