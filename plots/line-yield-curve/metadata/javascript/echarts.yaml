    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: All text flips to light colours. Title in off-white bold text clearly readable. Axis labels and tick labels in light secondary text. Legend labels readable. Grid lines subtle against dark background.
      Data: Identical colours to light render — Jan 2021 green, Jul 2022 lavender, Mar 2023 blue. Data identity preserved across themes as required. Inversion zone shading faintly visible (blue at opacity 0.08 on dark bg is subtle but present).
      Legibility verdict: PASS — no dark-on-dark failures detected.
