review:
  strengths:
  - Historically plausible U.S. Treasury yield data across three distinct snapshots
    (2021 normal, 2022 flat, 2023 inverted) — excellent real-world context
  - Log-scale x-axis with custom valueFormatter correctly spaces maturities and maps
    numeric years to readable labels (1M, 3M … 30Y)
  - 'Semantic color choice: brand green for the normal curve, blue for flat, and matte
    red (#AE3030) for the inverted/recession-signal curve — justified semantic exception'
  - ChartsReferenceLine at 1Y with direction arrow annotation adds clear narrative
    without fake interactivity
  - All Imprint palette values (t.palette) and theme-adaptive tokens (t.ink) used
    correctly; both renders pass theme check
  - skipAnimation, window.ANYPLOT_SIZE sizing, and community-only imports all correct
  - Legend positioned at bottom with descriptive labels identifying each curve's macroeconomic
    interpretation
  weaknesses:
  - Y-axis label 'Yield (%)' overlaps with the '3.5%' tick label in both light and
    dark renders — increase left margin or reduce y-axis label font size (currently
    16px) to ~13px to prevent collision
  - 'Palette ordering skips position 1 (lavender #C475FD) to use position 2 (blue
    #4467A3) for the Oct 2022 curve — no semantic justification for the skip; canonical
    order should be palette[0], palette[1], palette[2] with palette[4] (matte red)
    reserved for the semantic inverted series via a discrete override'
  - Spec requests shading or annotation to highlight the inversion region; only a
    reference line annotation is provided — adding a subtle filled region (alpha ~0.06)
    between the Jul 2023 curve and a baseline would better satisfy the spec
  - 3M tick label (maturity 0.25 years) is dropped on the log-scale x-axis due to
    crowding — consider using a smaller tick font or adjusting the label step to retain
    3M since it is listed in the spec's data definition
