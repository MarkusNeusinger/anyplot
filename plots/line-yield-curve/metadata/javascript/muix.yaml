  strengths:
  - Three yield curve shapes (normal, flat, inverted) with accurate U.S. Treasury
    data provide excellent educational and financial coverage
  - Semantic color assignment — matte red (#AE3030) for the inverted/recession curve
    — reinforces the story with minimal annotation
  - ChartsReferenceLine at 1Y maturity with directional label effectively marks the
    inversion point, a distinctive MUI X feature
  - Log-scale x-axis with custom valueFormatter correctly represents non-linear maturity
    spacing per spec requirement
  - CatmullRom curve interpolation gives smooth, professional financial-publication
    appearance
  weaknesses:
  - 'DE-02: Grid lines are MUI X defaults (visible horizontal lines) — reduce grid
    opacity via sx (e.g., `& .MuiChartsGrid-line: { opacity: 0.15 }`) or remove for
    the clean minimal-gridline look the spec calls for in a financial context'
  - 'DE-01: Good financial styling but short of publication-quality — consider adding
    semi-transparent area fill (areaSeriesType or area chart mode) under each yield
    curve to add visual weight and better separate the three curve profiles'
  - 'VQ-01: Slight asymmetry between x-axis label (16px) and y-axis label (13px) font
    sizes — aligning both to ~14-15px would improve axis label balance'
  - The 3M maturity tick label is auto-hidden by MUI X log scale rendering; explicitly
    specify tick positions via tickMinStep or a custom ticks array to ensure all 11
    maturity labels appear as the spec intends
