review:
  strengths:
  - Custom Chart.js plugin (inversionZone) draws a theme-adaptive filled rectangle
    using beforeDraw + getPixelForValue — impressive use of the plugin API
  - Logarithmic x-axis with afterBuildTicks override correctly spaces maturities proportionally
    (0.083 to 30 years) and applies nearest-neighbour matLabel matching for robust
    tick labels
  - 'Semantic color assignment: matte red (palette[4]) for the Nov-2022 inverted curve
    is an intentional semantic exception — the category''s recessionary role calls
    for it'
  - Three historically accurate U.S. Treasury yield snapshots (ZIRP 2021, flattening
    2022, deeply inverted Nov 2022) cover the full spectrum of yield curve shapes
  - Subtitle, legend labels ('Jan 2021 — Normal', 'Jan 2022 — Flattening', 'Nov 2022
    — Inverted'), and shaded band together produce a strong data-storytelling narrative
  - All chrome tokens (t.ink, t.inkSoft, t.grid, t.pageBg) correctly threaded through
    title, labels, ticks, grid, and point borders — both themes render cleanly with
    identical data colors
  - pointBorderColor set to t.pageBg creates a subtle halo around each marker that
    separates overlapping points from the background without adding visual noise
  weaknesses:
  - 'DE-01: Design is strong (6/8) but not yet publication-ready — the chart area
    still has the default Chart.js border box (all four sides visible), removing or
    softening it would lift the financial-publication feel'
  - 'LM-02: The custom plugin and afterBuildTicks are distinctive but the logarithmic
    scale leaves the left portion of the chart (before 3M) with very compressed curves
    — a domain clip starting at exactly 0.083 (1M) with tighter min padding would
    improve x-axis utilisation'
  - 'DE-02: Grid is functionally subtle via t.grid token but both axes show grid lines;
    a y-axis-only grid (removing x-axis vertical gridlines) would better match the
    financial chart convention requested in the spec (''minimal gridlines'')'
  image_description: |-
