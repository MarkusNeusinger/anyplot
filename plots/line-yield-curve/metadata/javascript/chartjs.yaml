      Background: Warm off-white (#FAF8F1) — correct light surface.
      Chrome: Title "line-yield-curve · javascript · chartjs · anyplot.ai" at font-size 22 in dark ink — fully readable. Italic subtitle "U.S. Treasury yields — shaded band marks the 3M–10Y inversion zone (Nov 2022)" in secondary ink, clearly legible. Legend at top with three oval markers (green, lavender, matte red) in dark ink at font-size 16 — readable. Y-axis title "Yield (%)" and X-axis title "Maturity" in dark ink at font-size 16. Tick labels at font-size 14 in inkSoft — all 11 maturity labels (1M–30Y) and percentage labels (0.00%–5.00%) fully visible without overlap.
      Data: Three lines — brand green (#009E73, Jan 2021 Normal), lavender (#C475FD, Jan 2022 Flattening), matte red (#AE3030, Nov 2022 Inverted). Inversion zone shaded in very subtle pink (rgba 174,48,48,0.07) from 3M to 10Y. Each point has a white halo border. Lines have smooth tension=0.3 curves.
      Legibility verdict: PASS — all text readable against the warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface.
      Chrome: Title in light cream text — clearly readable against the dark background. Subtitle in secondary light ink — readable. Legend labels in light ink — readable. Axis titles and tick labels in appropriate light tones via inkSoft — all fully legible. No dark-on-dark failures observed.
