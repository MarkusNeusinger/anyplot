review:
  strengths:
  - Semantic color assignments (green=Normal/growth, matte-red=Inverted/recession
    signal) add financial meaning without needing explanation
  - Log-scale x-axis correctly compresses clustered short-end maturities to reflect
    real term structure spacing — domain knowledge applied
  - Inversion zone shading via d3.area() with independent y0/y1 baselines creates
    immediate visual emphasis on the key economic phenomenon
  - 'Historically accurate U.S. Treasury data at real dates showing genuinely distinct
    curve shapes: near-zero Jan 2022, transitional Jan 2023, peak inversion Jul 2023'
  - 'Idiomatic D3 throughout: curveCatmullRom.alpha(0.5) for smooth financial curves,
    d3.bisectLeft for data-driven annotation placement, custom tick format mapping
    maturity years to labels'
  - 'Full spec compliance: multi-curve comparison, inversion region shaded, log scale,
    maturity tick labels, legend with date and shape descriptors'
  weaknesses:
  - Annotation text ('Inverted', '10Y', '3.96%') at 11px CSS is below the recommended
    14px minimum and will be very small at mobile widths (~400px); raise to 13-14px
  - Right-side reference labels ('10Y' / '3.96%') placed at iw+6 from the inner group
    sit just outside the plot area boundary; increase margin.right from 60 to 80-100px
    so they have proper breathing room and don't risk canvas edge clipping
