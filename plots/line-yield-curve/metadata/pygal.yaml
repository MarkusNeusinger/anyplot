    maturities to ~1.87% at 30Y; Dec 2018 (Flat) in yellow/gold, hovering relatively
    flat around 2.4-3.0%; and Mar 2023 (Inverted) in red, peaking at ~5.09% at 3M-6M
    and declining to ~3.70% at 30Y. A fourth series "2Y-10Y Inversion (-102 bps)"
    is shown as a dashed red line connecting the 2Y (4.60%) and 10Y (3.58%) points
    on the inverted curve, with enlarged markers at both endpoints. The x-axis is
    labeled "Maturity (Years)" with major tick labels at 1M, 1Y, 2Y, 5Y, 10Y, 20Y,
    30Y using proper numeric spacing. The y-axis is labeled "Yield (%)" ranging from
    0 to 5.5. The legend is positioned at the bottom with all four series entries
    clearly readable. Overall layout is clean and professional with good use of white
    space.'
