review:
  strengths:
  - 'Perfect spec compliance and data quality: historically accurate U.S. Treasury
    data covering all canonical yield curve shapes (normal, inverted, normalizing)'
  - 'Strong Imprint palette application: brand green for Jan 2021, canonical order
    for subsequent curves, correct theme-adaptive chrome in both renders'
  - Log scale x-axis is the financially appropriate choice and uses ggplot2 scale_x_log10
    with custom break labels elegantly
  - Shaded inversion zone and annotation adds genuine interpretive value; visual contrast
    between near-zero 2021 curve and 2023-2024 curves tells the monetary cycle story
    immediately
  - 'Clean code: KISS structure, fully deterministic, all imports used'
  weaknesses:
  - 'DE-01/DE-02: Tick marks remain visible on both axes — removing them (axis.ticks
    = element_blank()) would give the chart the cleaner financial-publication look
    it is aiming for'
  - 'DE-01: Legend is functional but could be more integrated — consider direct line
    labels at the right edge of each curve instead of a boxed legend, or reduce legend.key.width'
  - 'LM-02: The inversion shading uses a fixed annotate rect spanning a manually chosen
    x range — a more distinctive approach would use geom_ribbon() between curves to
    shade where 2023/2024 curves exceed the 2021 curve, making the inversion region
    data-driven'
  - 'VQ-03: Jan 2021 near-zero points (0.05-0.09% for first 4 maturities) are nearly
    invisible against the x-axis baseline — increase geom_point size to 3.5 or add
    a subtle white stroke'
