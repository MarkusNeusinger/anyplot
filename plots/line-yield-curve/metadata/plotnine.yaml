review:
  strengths:
  - Excellent data quality with realistic U.S. Treasury yield data showing all three
    curve shapes (normal, flat, inverted)
  - Full spec compliance with all required features including inversion zone highlighting
  - Professional color palette with Python Blue as primary and muted tones
  - Clean well-structured code following KISS principle
  - Good data storytelling with inversion zone annotation creating clear focal point
  weaknesses:
  - Inversion zone shading spans full plot width making it visually heavy and imprecise
  - Tick labels 1M and 1Y are cramped on the left due to compressed short-maturity
    range
  - Gray curve color is somewhat close to blue and could be harder to distinguish
    for colorblind viewers
  - Title font size is 22pt instead of recommended 24pt
  image_description: 'The plot displays three U.S. Treasury yield curves on a clean
    white background with a 16:9 aspect ratio. The bold title reads "U.S. Treasury
    Yield Curves · line-yield-curve · plotnine · pyplots.ai" at the top. The x-axis
    shows "Maturity" with labels (1M, 1Y, 2Y, 5Y, 7Y, 10Y, 20Y, 30Y) positioned according
    to actual years-to-maturity, and the y-axis shows "Yield (%)". Three curves are
    plotted: a blue curve (2021-06-15, Normal) starting low at ~1.55% and rising steeply
    to ~3.8%; a muted gray curve (2023-01-10, Flat) hovering around 4-4.2%; and a
    red curve (2024-07-01, Inverted) starting high at ~5.5% and declining. A light
    red shaded rectangle spans the full plot width labeled "Inversion zone" in italic
    red text at the top. The legend is positioned in the lower-left area of the plot.
    Only subtle horizontal gridlines are shown, with no vertical gridlines and a clean
    x-axis line.'
