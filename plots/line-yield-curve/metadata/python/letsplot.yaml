review:
  strengths:
  - Excellent spec compliance — all required features present including inversion
    region highlight and annotation
  - Historically accurate U.S. Treasury yield curve data for three meaningful dates
    that tell a clear story
  - Correct Imprint palette usage with full theme-adaptive chrome in both light and
    dark renders
  - layer_tooltips() leverages letsplot's native interactive tooltip API distinctively
  - Inversion ribbon + annotation creates a genuine visual focal point and data story
  weaknesses:
  - 6M and 1Y x-axis tick labels are close (potentially touching) due to linear-scale
    compression — consider log-scale x-axis (scale_x_log10) which naturally spreads
    short maturities, or rotate short-end labels
  - Inversion ribbon at alpha=0.18 is subtle; on dark background it is quite faint
    — consider raising to alpha=0.22–0.25 for better dark-theme visibility
  - Line width size=1.0 is conservative for a sparse 11-point dataset; increase to
    1.4–1.6 for more visual weight
