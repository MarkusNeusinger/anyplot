review:
  strengths:
  - Three distinct yield curve shapes (normal Jan 2021, flat Dec 2018, inverted Mar
    2023) clearly demonstrate real macroeconomic scenarios with historically accurate
    data
  - Cubic interpolation (`interpolate='cubic'`) produces smooth, professional-looking
    curves appropriate for financial publications
  - Inversion annotation (2Y–10Y spread, −102 bps) adds quantitative storytelling
    depth; oversized ochre dots at 2Y and 10Y create a clear visual focal point
  - 'Full Imprint palette compliance: first series #009E73 (brand green), followed
    by lavender, blue, ochre in canonical order — data colors identical across both
    themes'
  - 'Both theme renders pass: warm off-white #FAF8F1 (light) and warm near-black #1A1A17
    (dark) backgrounds with correct INK/INK_MUTED chrome tokens'
  - All font sizes explicitly set in the Style object (title=66, label=56, major_label=44,
    legend=44) — well-proportioned at canvas size
  - y-axis-only dashed grid (`show_y_guides=True`, `show_x_guides=False`) is a thoughtful
    refinement for financial charts
  - x_value_formatter and y_value_formatter provide clean, domain-specific tick labels
    ('1Y', '1M', '3.58%')
  - Code is clean, linear, and deterministic — no functions/classes, no randomness
  weaknesses:
  - 'Design Excellence is above-average but below publication quality: no inversion
    region shading (the spec explicitly mentions shading as an option, which would
    elevate the storytelling above two-dot annotation)'
  - 'DE-02: Pygal''s default border/frame is still visible around the plot area —
    removing the plot border or reducing its prominence would add visual refinement'
  - 'LM-02: Distinctive feature usage is moderate — cubic interpolation and stroke_dasharray
    are used but more pygal-specific features (e.g., `print_values`, `show_x_guides`
    interplay, secondary_range for dual-axis annotation) are left unused'
  - The short-term maturities (1M through 2Y) are compressed at the far left due to
    linear x-axis — the spec mentions log scale as an option which would better reveal
    term-structure dynamics at the short end
