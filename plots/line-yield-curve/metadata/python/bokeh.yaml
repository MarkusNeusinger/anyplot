review:
  strengths:
  - 'Correct Imprint palette applied in canonical order (green→lavender→blue) with
    brand green #009E73 as first series'
  - Log-scale x-axis correctly spaces maturities by time rather than label position
    — domain-appropriate choice
  - 'All font sizes explicitly set following style guide: title 50pt, axis labels
    42pt, tick labels 34pt, legend 34pt'
  - Inversion zone shading + annotation together communicate the key macroeconomic
    insight clearly
  - Dashed line style for the inverted curve provides redundant encoding beyond color,
    aiding CVD accessibility
  - White-bordered scatter markers improve definition against both light and dark
    backgrounds
  - 'Theme-adaptive chrome is complete: background, text, legend, grid, axis lines
    all flip correctly between themes'
  - CDP-based screenshot captures exact 3200×1800 canvas dimensions correctly
  weaknesses:
  - Inversion zone shading spans a very large portion of the left half of the plot
    (1M through 10Y maturities all shade because yields_inverted > 30Y yield of 4.03%).
    A more targeted shading — e.g., only where 2Y exceeds 10Y, or a narrower region
    around the peak inversion — would reduce visual heaviness and make the annotation
    more precise.
  - Inversion annotation text at y=3.87 uses the blue data color (#4467A3) which has
    marginal contrast on the dark background. Consider using INK_MUTED or INK_SOFT
    token instead so the annotation stays readable across both themes without relying
    on hue alone.
  - 'DE-01: No strong typography hierarchy beyond the mandated title/subtitle distinction.
    The subtitle (28pt) and inversion annotation (28pt) are the same size despite
    carrying different information weights — differentiate by color contrast or weight.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white.
      Chrome: Title "line-yield-curve · python · bokeh · anyplot.ai" in bold black text at top left, fully readable. Subtitle "U.S. Treasury Yield Curves — normal, flat, and inverted term structures" in muted gray just below the title, readable. X-axis label "Maturity" (italic) and Y-axis label "Yield (%)" (italic) in dark ink, both clearly legible. Tick labels (1M 3M 6M 1Y 2Y 3Y 5Y 7Y 10Y 20Y 30Y on x, 4.0–5.5 on y) in mid-gray, readable. Legend in bottom right with elevated-bg (#FFFDF6) shows three entries with correct line styles (solid for Normal/Flat, dashed for Inverted) and circle markers. Inversion zone annotation at bottom center in blue italic, readable.
      Data: Three curves — (1) brand green #009E73 solid line+markers for Jan 2024 Normal curve, showing normal upward slope from ~5.5% at short end down to ~4.3% at long end; (2) lavender #C475FD solid line+markers for Jun 2024 Flat curve, nearly flat around 4.3–5.5% range; (3) blue #4467A3 dashed line+markers for Jul 2023 Inverted curve, humped at 6M (5.56%) declining to 4.03% at 30Y. Light blue-gray varea shading covers the inversion zone from 1M to 10Y maturities.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — not pure black.
      Chrome: Title in light off-white (#F0EFE8), clearly readable against dark background. Subtitle in muted gray (#A8A79F), readable. Axis labels in light ink, readable. Tick labels in secondary gray (#B8B7B0), readable — no dark-on-dark failures. Legend has dark elevated background (#242420), label text in #B8B7B0 clearly readable. Inversion annotation in #4467A3 blue — marginally lower contrast on dark bg but still readable.
      Data: All three data series are identical colors to light render (#009E73, #C475FD, #4467A3) — palette is theme-invariant as required. Inversion shading visible as subtle dark-teal fill. Brand green #009E73 clearly visible against dark surface.
