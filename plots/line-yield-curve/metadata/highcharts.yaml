review:
  strengths:
  - Excellent data choice showing three distinct yield curve regimes (normal, inverted,
    normalizing) with realistic values
  - Clean professional financial aesthetic with muted colors and subtle grid
  - Good use of numeric x-axis spacing (maturity_years) with custom tick formatter
    for labels
  - Distinct marker symbols per series aid visual differentiation
  weaknesses:
  - 'Missing inversion region highlight (spec requirement: shading or annotation where
    short-term yields exceed long-term)'
  - Y-axis starting at 0 wastes ~40% of the vertical space and compresses curve differences
  - Does not use highcharts_core Python API as recommended by library guidelines
  - Title format has extra prefix text before the required spec-id format
  - 'Dead code: tooltip headerFormatter placeholder created then immediately removed'
  image_description: 'The plot displays three U.S. Treasury yield curves on a clean
    white background. The title reads "U.S. Treasury Yield Curves · line-yield-curve
    · highcharts · pyplots.ai" with a subtitle "Term structure across three market
    regimes." Three colored lines are plotted: a blue line labeled "Jan 2022 (Normal)"
    starting near 0.1% at 1M maturity and rising steeply to ~2.3% at 20-30Y; a red
    line labeled "Oct 2023 (Inverted)" starting high at ~5.5% and declining to ~4.9%;
    and a green line labeled "Jan 2025 (Normalizing)" relatively flat around 4.2-4.8%.
    The x-axis is labeled "Maturity" with tick labels (1M, 6M, 1Y, 2Y, 3Y, 5Y, 7Y,
    10Y, 20Y, 30Y) using proper numeric spacing. The y-axis is labeled "Yield (%)"
    ranging from 0% to 6%. A floating legend box with subtle border sits in the top-right
    corner. Lines are thick with visible circle/diamond/triangle markers. Dashed grid
    lines on the y-axis. Significant empty vertical space between the blue curve (0-2.3%)
    and the red/green curves (4.2-5.5%) due to y-axis starting at 0.'
