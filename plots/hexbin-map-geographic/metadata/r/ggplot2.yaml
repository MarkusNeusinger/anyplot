review:
  strengths:
  - 'Correct imprint_seq colormap (#009E73 to #4467A3) applied to continuous density
    data — full palette compliance.'
  - 'Full theme-adaptive chrome: all map colors (land, water, border), text, backgrounds,
    and legend box flip cleanly between light and dark themes.'
  - Smart ggplot2-native geographic base map using geom_polygon with hand-digitized
    NYC outlines — avoids sf/ggmap dependency while staying within ggplot2 grammar.
  - coord_fixed(ratio=1) correctly maintains geographic aspect ratio for the lat/lon
    coordinate space.
  - Midtown hotspot annotation with directional arrow adds genuine data storytelling.
  - 'Full spec compliance: hexagonal binning, geographic context, color scale, transparency,
    and count aggregation all present.'
  weaknesses:
  - Midtown hotspot annotation text (size=2.7 mm ~7.7pt) is slightly small on the
    3200x1800 canvas — at mobile scale (~400px thumbnail) the text becomes borderline
    legible. Consider size=3.5-4.0 for better robustness at small sizes.
  - Hand-digitized geographic outlines produce rough/simplified coastlines. Hexagonal
    bins near geographic boundaries create jagged edges where hexagons extend over
    water. This limits visual polish.
  image_description: |-
