review:
  strengths:
  - Correct hexbin implementation using ggplot2's native geom_hex() with 38 bins over
    NYC taxi pickup data
  - Proper anyplot imprint_seq colormap (low=#009E73, high=#4467A3) applied to the
    continuous density scale
  - 'Both themes render correctly: warm off-white (#FAF8F1) light background and near-black
    (#1A1A17) dark background with theme-adaptive chrome tokens'
  - Geographic coordinate tick formatting with degree symbols (74.10°W, 40.65°N) adds
    professional polish
  - Realistic NYC taxi pickup data with geographically accurate cluster centers (Midtown,
    Chelsea, Brooklyn, JFK, LGA, Jersey City)
  - 'All font sizes explicitly set via theme(): axis.title=10, axis.text=8, legend.text=8,
    legend.title=9, and title scaled by the 67-char formula'
  - Clean KISS code structure with set.seed(42) for reproducibility, no functions
    or classes
  - Legend styled with ELEVATED_BG fill and INK_SOFT border — consistent with anyplot
    callout box convention
  weaknesses:
  - 'Missing geographic base map overlay: spec explicitly requires ''Overlay hexagons
    on a base map showing geographic context (coastlines, country boundaries, or street
    map)''. The implementation shows hexbins on blank coordinate axes only. For ggplot2,
    use the `sf` package with Natural Earth data or the `rnaturalearth` package to
    add country/coast outlines as a geom_sf() layer underneath the hexbin layer.'
  - 'Design storytelling is minimal: no focal-point emphasis distinguishing high-density
    from low-density areas beyond the color gradient. Consider adding a text annotation
    highlighting the Midtown cluster as the primary hotspot.'
  - 'Grid lines use INK_SOFT (#4A4A44 light / #B8B7B0 dark) at linewidth=0.15 — these
    are slightly more prominent than the recommended 15% opacity approach. Use a faint
    color or reduce linewidth further to 0.10 for more subtle grid.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface. No pure white.
      Chrome: Title "hexbin-map-geographic · r · ggplot2 · anyplot.ai" in bold dark (#1A1A17) text, clearly readable at full size and proportionally sized (~60% plot width). Axis labels "Longitude" and "Latitude" in dark text at 10pt. Tick labels formatted as "74.10°W" / "40.65°N" in secondary dark (#4A4A44) at 8pt — all readable. Legend titled "Pickup Count" with values 100/200/300 labeled, box styled with ELEVATED_BG fill and INK_SOFT border.
      Data: Hexagonal bins colored on the imprint_seq gradient — low-count hexes in brand green (#009E73) transitioning to dense-count hexes in blue (#4467A3). Multiple NYC-area clusters visible: large Midtown-area blob (center-left) with high-density blue core, UWS cluster (upper-left), Midtown East (upper-center-right), Brooklyn (lower-right), JFK/LGA adjacent clusters (right side). Alpha=0.88 provides slight transparency.
      Legibility verdict: PASS — all text readable against warm off-white background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface. No pure black.
      Chrome: Title in light (#F0EFE8) text, clearly visible against dark background. Axis labels ("Longitude", "Latitude") and tick labels in secondary light (#B8B7B0) — all readable. Legend box uses ELEVATED_BG (#242420) fill with INK_SOFT (#B8B7B0) border. No dark-on-dark text issues found.
      Data: Hexagonal bin colors are identical to the light render — same green (#009E73) to blue (#4467A3) gradient. Same cluster pattern clearly visible. The dark background provides good contrast for the colored hexbins.
      Legibility verdict: PASS — all chrome elements are light-colored on near-black background. Brand green #009E73 clearly visible. No dark-on-dark failures.
