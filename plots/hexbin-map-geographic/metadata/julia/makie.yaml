    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "SF Bike-Share · hexbin-map-geographic · julia · makie · anyplot.ai" is bold, dark ink (#1A1A17), clearly readable. Axis labels "Longitude" and "Latitude" are dark and proportionate (14pt). Tick labels (-122.40 to -122.50, 37.70 to 37.80) are mid-gray INK_SOFT, readable. Left and bottom spines visible, top/right removed. Subtle grid lines visible. Colorbar on right with "Ride Count" label in INK and tick labels in INK_SOFT — all readable.
      Data: Hexagonal bins covering SF geographic area (~-122.51 to -122.36 lon, 37.70 to 37.84 lat). Colormap transitions from brand green #009E73 (low density, ~50–100 rides) to blue #4467A3 (high density, ~350–430 rides) — correct ANYPLOT_SEQ. Dense core visible slightly right-of-center (Union Square / Downtown area). Water polygon fills (SF Bay east, Pacific west) are very subtly rendered in light blue — barely visible, particularly where hexbins overlap the area.
      Legibility verdict: PASS — all text is readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title and axis labels rendered in near-white (#F0EFE8 INK), clearly readable against dark background. Tick labels in #B8B7B0 (INK_SOFT) — readable, no dark-on-dark failure. Colorbar "Ride Count" label white, tick values readable. Spines and grid lines appear correctly light-on-dark.
      Data: Hexbin colors are identical to light render — same green (#009E73) to blue (#4467A3) gradient, confirming data palette is theme-independent. Water polygons slightly more visible on dark background (light blue against near-black) but still subtle.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark text failures detected.
