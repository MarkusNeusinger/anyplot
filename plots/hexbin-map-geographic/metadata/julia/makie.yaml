review:
  strengths:
  - Correct hexbin! native recipe with proper ANYPLOT_SEQ sequential colormap (green→blue)
  - Well-implemented dual-theme (light/dark) with correct anyplot palette tokens applied
    throughout
  - 'Clean KISS structure with idiomatic Makie patterns: hexbin!, poly!, Colorbar,
    colgap!, limits!'
  - Correct title format with descriptive prefix (SF Bike-Share) plus mandatory spec-id
    format
  - Geographic polygon base map (SF Bay + Pacific) drawn with poly! — creative use
    of Makie primitives
  - RGBAf alpha control for water fill and coast line is precise and theme-adaptive
  weaknesses:
  - Hexbins lack transparency (no alpha= parameter) — spec requires hexagon transparency
    so base map features show through under the data area; currently base map is only
    visible where there are no hexbins
  - Water fill polygons have very low opacity (~0.32 light, 0.45 dark) making the
    geographic base map barely perceptible; the SF Bay and Pacific coastlines are
    hard to distinguish even in the empty map margins
  - 'DE-03: The density gradient story is clear (high-density downtown core) but no
    neighborhood labels or annotations to anchor viewer geographically — without a
    readable base map the viewer cannot identify which city district they are looking
    at'
