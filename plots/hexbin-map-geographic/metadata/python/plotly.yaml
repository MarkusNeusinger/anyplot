review:
  strengths:
  - Custom GeoJSON hexagonal binning without external geo libraries — vectorized numpy
    construction is elegant
  - Theme-adaptive CARTO basemap (carto-positron light / carto-darkmatter dark) looks
    polished in both renders
  - 'Full spec compliance: count + sum + mean aggregation, configurable hex size,
    transparency, hover tooltips, colorbar with units'
  - Uses imprint_seq correctly for continuous fare data; all chrome (colorbar bgcolor,
    border, text) is fully theme-adaptive
  - Interactive HTML output with properly formatted hover tooltips ($-prefixed fares,
    comma-separated counts)
  weaknesses:
  - 'DE-03 moderate: data storytelling is passive — no annotation or color emphasis
    highlights the high-fare zones (e.g. Manhattan CBD vs outer areas); adding a brief
    annotation to the hottest hexbin cluster would immediately guide the viewer to
    the main insight'
  - 'DE-02 refinement gap: margins are somewhat tight (l=20 is narrow) and the colorbar
    placement is close to the canvas edge; increasing l to 40 and checking colorbar
    xpad would improve breathing room'
  - 'LM-02 gap: the custom GeoJSON hex construction is impressive but the hover_data
    format strings could leverage Plotly''s customdata + hovertemplate for richer,
    more distinctly Plotly-style tooltip formatting'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) paper_bgcolor wraps the carto-positron base map showing NYC streets and borough labels in muted grays.
      Chrome: Title "NYC Taxi Fares · hexbin-map-geographic · python · plotly · anyplot.ai" at top center in dark ink — clearly readable. Colorbar on the right labeled "Avg Fare ($)" with tick labels $20/$40/$60 in dark ink on an elevated warm-white box with a subtle border.
      Data: Hexagonal cells cover the NYC metropolitan area in the imprint_seq palette (green #009E73 → blue #4467A3). Most hexbins show mid-range teal/green, with a few darker (higher fare) cells in the core and lighter (lower) on periphery. Opacity 0.75 lets basemap place names show through. Cell borders in dark rgba provide definition.
      Legibility verdict: PASS — all text readable, no clipping, no dark-on-light failure.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) paper_bgcolor with the carto-darkmatter base map showing white/light road labels and outlines on a dark surface.
      Chrome: Same title in light (#F0EFE8) ink at top — clearly visible against the dark surface. Colorbar uses elevated-dark (#242420) background with INK_SOFT (#B8B7B0) tick text, properly readable.
      Data: Hexagonal cells display identical imprint_seq colors to the light render — the green-to-blue gradient is consistent. Borders changed to lighter rgba to maintain definition on dark background.
      Legibility verdict: PASS — no dark-on-dark failures found; all chrome tokens flip correctly between themes.
