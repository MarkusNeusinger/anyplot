review:
  strengths:
  - Correct imprint_seq colormap (low=#009E73, high=#4467A3) for density data
  - Full dual-theme support with custom water/land colors for both light and dark
    renders
  - Geographic context via manually-constructed coastline polygon adds meaningful
    spatial reference
  - All text sizes explicitly set (title=12, axis_title=10, axis_text=8) and well-proportioned
  - Hexagonal transparency (alpha=0.88) correctly allows base map to show through
  - coord_fixed(ratio=1.0) maintains correct geographic aspect ratio
  - Reproducible with np.random.seed(42), clean KISS structure, correct output filename
  - NYC taxi-pickup scenario is a classic, neutral, comprehensible hexbin map example
  weaknesses:
  - 'DE-03: No visual storytelling — density clusters are passively visible but the
    viewer is not guided to hotspots; consider labeling the two main clusters (e.g.,
    ''Midtown'' and ''JFK Airport'') directly on the map to create emphasis and tell
    the spatial story'
  - 'DE-01: Below publication-ready polish — the overall composition is correct but
    lacks the final refinements (e.g., more dramatic count distribution so the color
    gradient range is fully utilized, tighter overall visual hierarchy)'
  - 'LM-02: Hexagonal binning is fully manual (NumPy loops) rather than leveraging
    any plotnine-distinctive pattern; the grammar-of-graphics layering is used correctly
    but there is no showcase of a plotnine capability that would be hard to replicate
    in another library'
  - 'SC-02: Only count aggregation is shown; the spec also requires sum/mean support;
    even in a static plot an optional `value` variable could be used as the fill metric
    to demonstrate non-count aggregation'
  - 'DQ-01: The count distribution is heavily skewed to low values with only a few
    high-count cells, so most hexagons appear the same uniform green and the gradient
    scale is under-utilized; consider increasing point density in the hotspot clusters
    to spread the color range more evenly across the map'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct. Panel background is light blue (#C5D9EF) representing water.
      Chrome: Title "hexbin-map-geographic · python · plotnine · anyplot.ai" is dark, clearly readable, occupies ~75% of plot width (expected for long mandated title). Axis labels "Longitude (°)" and "Latitude (°)" are dark, readable at 10pt. Tick labels are dark gray, readable at 8pt. Legend box has elevated-bg fill (#FFFDF6) with "Pickups" label and gradient swatch clearly visible.
      Data: Hexagonal bins rendered in imprint_seq gradient (low=#009E73 green to high=#4467A3 blue). A cluster of blue (high-count ~300) hexagons visible around lat 40.75-40.80 / lon -73.97 to -74.02 (midtown/downtown cluster). Smaller blue cluster around lat 40.65 / lon -73.79 (airport cluster). Surrounding hexagons are green (low count). Gray-tan land polygon provides geographic coastline context. Hexagon edges are white/PAGE_BG color, providing clear cell separation.
      Legibility verdict: PASS — all text fully readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Near-black #1A1A17 — correct. Panel background is dark blue (#1A2535) representing water.
      Chrome: Title is light (#F0EFE8), clearly readable against near-black background. Axis labels and tick labels are light gray (#B8B7B0), readable against dark background. Legend box has dark elevated-bg (#242420) with light text — readable. Panel border is light gray, visible.
      Data: Hexagonal bin colors are identical to light render — same green-to-blue imprint_seq gradient with identical density clusters. Land polygon appears as very dark shape (#2C2C27) against the slightly lighter dark-blue water. No dark-on-dark text failures observed.
      Legibility verdict: PASS — all text clearly readable against the near-black background. Data colors are identical to light render (only chrome flipped as required).
