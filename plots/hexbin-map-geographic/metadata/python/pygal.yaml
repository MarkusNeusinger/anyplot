review:
  strengths:
  - Correct hexagonal binning computation using percentile-based bin edges for balanced
    density distribution
  - Dual encoding (color + size) effectively communicates density — size progression
    from 26→66 reinforces the color gradient
  - Proper imprint_seq sequential colormap (#009E73→#4467A3) correctly applied to
    continuous density data
  - Geographic outlines (Manhattan island, Hudson River, East River) add meaningful
    spatial context
  - 'Theme-adaptive chrome with correct backgrounds (#FAF8F1 light / #1A1A17 dark)
    and no dark-on-dark failures'
  - Interactive HTML output with descriptive per-point tooltips showing count, total
    fares, mean fare, and coordinates
  - Correct font sizing following pygal style guide (66 title, 56 label, 44 major/legend,
    36 value)
  weaknesses:
  - Hex bin cells rendered as circular dot markers rather than hexagonal polygon shapes
    — the defining visual of hexbin maps is missing; compute hex vertices and plot
    as XY polygons or use a fill approach to produce actual hexagonal shapes
  - 'Legend labels truncated in rendering: ''Med-Low (2–4 pickup...'' and ''Med-High
    (7–13 pick...'' are cut off — shorten labels (e.g. ''Low (1-2)'', ''Med-Low (3-4)'',
    ''Medium (5-7)'', ''Med-High (8-13)'', ''High (14+)'') or reduce legend_at_bottom_columns
    to 4'
  - Dense central cluster shows significant dot overlap making individual bin counts
    hard to read — consider reducing dots_size values or increasing transparency in
    high-density bins
  - Base map is minimal hand-crafted coordinate outlines — geographic context is present
    but crude; no recognizable street grid or neighborhood boundaries
  image_description: |-
