review:
  strengths:
  - 'Perfect theme-adaptive implementation: all chrome tokens correctly flip between
    light and dark, data colors remain constant — both renders pass legibility check.'
  - 'Correct use of imprint_seq colormap (#009E73 → #4467A3) for single-polarity continuous
    density data.'
  - Elegant hexagonal binning implementation in pure Python with correct offset-grid
    geometry, producing a visually accurate pointy-top hex grid.
  - Highcharts formatter JS functions for geographic coordinate conversion in tick
    labels and tooltips — clever use of Highcharts' JS evaluation context.
  - Realistic and specific geographic dataset (Yellowstone wildlife sightings) with
    plausible coordinates, counts, and multi-zone density variation.
  - Title fontsize correctly scaled via the 67/len(TITLE) formula to prevent overflow
    on the 80-char title string.
  - PIL canvas-pinning ensures exact 3200×1800 output; both HTML and PNG artifacts
    saved.
  weaknesses:
  - 'Missing base map overlay: the spec explicitly requires ''Overlay hexagons on
    a base map showing geographic context (coastlines, country boundaries, or street
    map).'' The chart shows hexagons on a plain background with no underlying geographic
    layer. Add a Highcharts Maps background using a GeoJSON boundary for the US or
    western states, or use a Stamen/OpenStreetMap tile layer as the chart background.'
  - Axis label and tick label fontsizes are slightly below style-guide recommendations
    (52px vs 56px for axis labels, 40px vs 44px for tick labels). Bump to 56px and
    44px respectively to better match the style guide and improve mobile readability.
  - 'Design excellence limited: no spine/plot-border removal attempted; chart uses
    standard Highcharts frame without additional visual refinement beyond grid opacity
    and color theming. Consider setting chart.plotBorderWidth: 0 and removing tick
    marks for a cleaner look.'
