review:
  strengths:
  - Exemplary theme adaptation — every chrome element (annotation boxes, colorbar,
    spines, ticks, title) correctly flips between light and dark using INK/INK_SOFT/ELEVATED_BG
    tokens
  - 'Correct continuous colormap selection: imprint_seq (green→blue, single-polarity)
    for density/value data — no forbidden cmaps used'
  - mincnt=1 prevents empty hexbins from cluttering the geographic map
  - Custom degree-formatted tick labels (°W / °N) add professional cartographic polish
  - fig.subplots_adjust used instead of bbox_inches='tight' — preserves exact 3200×1800
    canvas per library rules
  - NYC taxi scenario is realistic, domain-appropriate, and politically neutral —
    canonical hexbin use case
  weaknesses:
  - Colorbar tick labels at 8pt may compress below legibility when scaled to ~400
    px mobile width — consider 9–10pt for colorbar ticks
  - Base map is a simplified single-color land rectangle covering the entire axes
    extent; the water color is only marginally visible at the plot edges. The spec
    requests coastlines/country boundaries — a simplified NYC borough polygon outline
    (matplotlib Polygon patches) would improve geographic accuracy and DE-01 without
    adding dependencies
