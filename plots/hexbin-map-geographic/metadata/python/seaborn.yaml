review:
  strengths:
  - Correct use of seaborn's jointplot(kind='hex') with marginal histograms — showcases
    a seaborn-distinctive feature not easily replicated in other libraries
  - imprint_seq colormap applied correctly and consistently for density/richness continuous
    data
  - Full theme-adaptive chrome — both light and dark renders pass legibility checks
    with no dark-on-dark or light-on-light failures
  - Geographic reference layer (coastline, US-Canada border, WA-OR border, state labels)
    adds meaningful spatial context for a geographic hexbin plot
  - City label boxes with ELEVATED_BG fill and no edge border are a polished readability
    solution over hexbins
  - Perfect spec compliance — all required features present (hexbins, sequential cmap,
    colorbar, geographic context, transparency, mean aggregation)
  - Clean reproducible code with seed; no bbox_inches='tight' canvas drift
  weaknesses:
  - Canada annotation uses fontsize=7 which is at the lower legibility floor — increase
    to 8pt to match city labels
  - Colorbar placed with ax=ax (joint axis) and shrink=0.65, resulting in tight right-side
    layout where colorbar and marginal-y histogram compete for horizontal space; consider
    fig.subplots_adjust(right=0.82) or a dedicated cax
  - 'DQ-01 minor gap: the spec advertises count, sum, and mean aggregation — only
    mean is live-demonstrated; implementation could default to count and document
    the switch'
