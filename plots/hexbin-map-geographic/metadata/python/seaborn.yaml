  - 'Perfect idiomatic seaborn usage: sns.jointplot(kind=''hex'') with marginal_kws/joint_kws
    is the canonical approach for hexbin + marginal distributions'
  - Correct imprint_seq colormap applied to hexbin density (green sparse → blue dense)
