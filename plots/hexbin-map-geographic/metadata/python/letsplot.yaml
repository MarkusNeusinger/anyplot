review:
  strengths:
  - 'Faithful spec compliance: hexbin aggregation, sequential #009E73->#4467A3 gradient
    with log10-scaled color legend, borough basemap overlay with transparency, and
    hover tooltips for the interactive HTML export'
  - Theme adaptation is correct in both renders — warm off-white (#FAF8F1) and warm
    near-black (#1A1A17) chrome flips cleanly while the green-to-blue data gradient
    stays identical; no dark-on-dark or light-on-light failures
  - Realistic, neutral NYC taxi-pickup context with plausible clusters (Manhattan/Midtown/JFK/LGA)
    anchored inside hand-traced borough outlines for geographic context
  - 'Clean KISS script: seeded data (np.random.seed(42)), no functions/classes, only
    used imports, correct plot-{THEME}.png + .html dual export at the mandated 3200x1800
    canvas'
  - 'Idiomatic lets-plot grammar-of-graphics: geom_hex + geom_polygon layering, coord_fixed,
    layer_tooltips, scale_fill_gradient with trans=log10'
  weaknesses:
  - Title fontsize is scaled down quite small (title_size ~= 11 base) so the title,
    while readable, sits a touch small relative to the panel — could nudge up slightly
    without overflowing.
  - Only the default 'count' aggregation is demonstrated; the spec also lists sum
    and mean methods, so DQ-01 feature coverage of the plot type's full range is partial.
  - Borough basemap polygons are fairly abstract/crude gray outlines — they convey
    context but are visually plain; richer geographic styling would lift DE-01.
  - Interactive tooltip only surfaces Pickups|count; the spec suggests showing count/sum/mean/coordinates
    for fuller cell statistics.
