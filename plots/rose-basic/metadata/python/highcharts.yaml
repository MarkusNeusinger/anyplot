review:
  strengths:
  - Correct rose/coxcomb chart implementation using Highcharts polar column — startAngle=0
    correctly places Jan at 12 o'clock
  - 'Full theme-adaptive chrome: all color tokens (PAGE_BG, INK, INK_SOFT, ELEVATED_BG,
    GRID) properly applied to background, title, axis labels, grid, tooltip, and legend
    in both renders'
  - Appropriate download of both highcharts.js AND highcharts-more.js (required for
    polar charts)
  - 'Polygon grid interpolation (gridLineInterpolation: ''polygon'') creates a web/spoke
    pattern well-suited to rose charts'
  - Realistic and factually accurate monthly rainfall data showing clear seasonal
    cycle (high Nov–Jan, low Jun–Jul)
  - 'Perfect spec compliance: all 12 months, radius proportional to value, radial
    gridlines, consistent single-color scheme with brand green #009E73'
  - Clean KISS code structure with no functions/classes, explicit font sizes throughout
  weaknesses:
  - Canvas format (4800x2700 landscape) is suboptimal for a circular rose chart —
    the style guide recommends 3600x3600 square format for symmetric plots; the circle
    occupies ~32% of the landscape canvas area, leaving large empty bands on left
    and right
  - Legend is redundant for a single-series chart (subtitle already says 'Monthly
    Rainfall (mm)' and y-axis is labeled 'Rainfall (mm)') — should be disabled
  - Design lacks visual emphasis on key insights — all 12 segments use identical solid
    brand green with no differentiation to draw attention to the high (Dec 92mm) or
    low (Jul 18mm) months
  - Data labels at 20px are at the minimum threshold for a 4800x2700 render; labels
    on the smallest segments (Jun 25, Jul 18, Aug 22) appear very small and may be
    difficult to read at full resolution
  - 'Library mastery underutilizes Highcharts distinctives: no colorByPoint with value-proportional
    colors, no zones, no custom tooltip.formatter, no drilldown or other Highcharts-exclusive
    features'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "rose-basic · highcharts · anyplot.ai" in bold dark ink — clearly readable. Subtitle "Monthly Rainfall (mm)" in INK_SOFT — readable. Month labels (Jan–Dec) arranged around the circle perimeter in INK_SOFT at 28px — all readable. Radial y-axis labels ("95 mm", "90 mm", …, "0 mm") arranged vertically toward the top of the chart in INK_SOFT — readable, somewhat dense but not overlapping.
      Data: All 12 segments rendered in #009E73 (brand green, Okabe-Ito position 1). Segment sizes correctly vary by rainfall value — large wedges for Dec (92mm) and Nov (85mm), small wedges for Jul (18mm) and Jun (25mm). White/PAGE_BG borders between segments provide clean separation. Data labels on each segment show numeric values. Polygon-style radial gridlines visible.
      Layout note: Chart is positioned in upper-center area; the circular pane in a 16:9 canvas leaves significant empty space on left and right sides. Legend ("Rainfall") visible at bottom edge.
      Legibility verdict: PASS — all text elements are readable against the light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and subtitle in light #F0EFE8 — clearly readable against dark background. Month labels in #B8B7B0 — readable. Radial y-axis labels clearly visible as light text against the dark background (no dark-on-dark issues observed). Grid lines subtle in rgba(240,239,232,0.10).
      Data: Segment colors identical to light render — all in #009E73 brand green. Green-on-dark background provides excellent contrast. Data labels visible on segments. Border color adapts to PAGE_BG (#1A1A17) creating subtle dark separation lines between segments.
      Legibility verdict: PASS — all text elements are readable against the dark background. No dark-on-dark failures detected.
