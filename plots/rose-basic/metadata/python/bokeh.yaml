review:
  strengths:
  - Correct rose chart using Bokeh wedge primitives with monthly rainfall data showing
    clear seasonal pattern
  - 'Effective alpha-variation encoding: winter months rendered deep green, summer
    months light/transparent — viewer immediately reads the wet/dry cycle'
  - All theme tokens correctly applied in both renders (backgrounds, ink colors)
  - Radial gridlines with mm scale labels integrated cleanly
  - 'Full data quality: realistic meteorological data, wide value range (15–90 mm)
    creates compelling shape'
  - 'Perfect code quality: KISS structure, deterministic data, all imports used, saves
    PNG + HTML'
  weaknesses:
  - Scale labels at 15pt are below the recommended 18pt for pixel-based libraries
    at 4800px — bump to 18pt
  - 'Title format deviates from required spec-id-first pattern: should be ''rose-basic
    · bokeh · anyplot.ai'' (or ''Monthly Rainfall | rose-basic · bokeh · anyplot.ai'')
    not ''Monthly Rainfall · rose-basic · bokeh · anyplot.ai'' where the descriptive
    prefix appears in place of the attribution prefix'
  - January is positioned right-of-top rather than at 12 o'clock — spec says start
    position typically at top for time data; rotating i=0 (Jan) to the 12 o'clock
    position is the convention
  - HTML export does not add HoverTool — a key Bokeh distinctive feature that would
    show exact mm values on hover; the PNG render is static but the HTML could be
    interactive
  - 'DE-01 could be pushed to publication-ready: consider adding a subtle radial value
    annotation inside the largest petal or a compact data label on the peak month'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white.
      Chrome: Title "Monthly Rainfall · rose-basic · bokeh · anyplot.ai" at top-center in dark ink, clearly readable. Month labels (Jan–Dec) positioned around the perimeter in dark ink, all readable. Radial scale labels ("90 mm", "68 mm", "45 mm", "23 mm") on the right at 15pt — slightly small but readable.
      Data: 12 equal-angle wedges all in brand green (#009E73) with alpha varying 0.35–1.0 based on rainfall magnitude. Dec/Jan/Nov at top have deep opaque green; Jun/Jul at bottom are very pale. Dashed concentric circles serve as radial gridlines. Thin light-colored dividers separate wedges.
      Legibility verdict: PASS — all text readable; scale labels a touch small (15pt vs 18pt guideline) but not illegible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct.
      Chrome: Title, month labels, and scale labels all render in light ink (#F0EFE8 / #B8B7B0), clearly readable against the dark background. No dark-on-dark failures detected. Radial gridlines subtle but visible.
      Data: Brand green (#009E73) with identical alpha gradient to the light render — data colors are visually identical, only chrome (background, text) has flipped.
      Legibility verdict: PASS — all text readable in dark theme; no dark-on-dark issues.
