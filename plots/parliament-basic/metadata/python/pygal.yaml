  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - CORRECT
      Chrome: Title "parliament-basic · pygal · anyplot.ai" is clear and readable in dark text. Legend on left shows 6 parties with seat counts. Axis ticks are visible and readable.
      Data: Six curved lines representing the six parties, arranged in a semicircular pattern. Colors appear to follow Okabe-Ito palette but first series does not appear to be the required brand green (#009E73).
      Issues: The visualization shows line segments connecting points, NOT individual seat dots. This fundamentally fails the specification requirement for "individual seats rendered as dots or small segments."
      Legibility verdict: FAIL - wrong visualization type entirely

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - CORRECT
      Chrome: Title is readable in light text against dark background. Legend text is readable. Axis ticks are visible in light color.
      Data: Identical line structure to light render. Data colors are identical to light render (only chrome/background should flip, which is correct).
      Issues: Same fundamental failure - lines instead of individual seat dots. The dark theme adaptation is technically correct, but the underlying visualization is wrong.
      Legibility verdict: FAIL - wrong visualization type entirely

    Both renders fail the specification requirement for a parliament seat chart. A parliament chart should display individual seats (dots) arranged in concentric semicircular arcs by party, with each dot colored by party affiliation. Instead, this implementation renders line segments connecting positional data points, which does not convey the intended parliament composition visualization.
