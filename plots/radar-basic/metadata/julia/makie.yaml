review:
  strengths:
  - 'Correct Imprint palette: Player A uses #009E73 (brand green, first series), Player
    B uses #C475FD (palette position 2); data colors are identical between light and
    dark renders, only chrome tokens flip'
  - Fully custom-built radar chart from Makie primitives — concentric gridline polygons
    at 20/40/60/80/100, radial spokes, hidden default decorations/spines, and outer-edge
    category labels are all cleanly implemented since Makie has no native radar recipe
  - 'Realistic, neutral data: two soccer players with genuinely contrasting skill
    profiles (Player A leads Speed/Shooting, Player B leads Passing/Defense/Stamina/Vision)
    creates a real comparison rather than near-identical polygons'
  - 'Spec requirements met precisely: filled polygons with alpha=0.25, closed back
    to the first point, gridlines at the requested 20/40/60/80/100 intervals, distinct
    colors with a legend'
  - All font sizes explicitly set (titlesize=20, category labels=15, gridline labels=11,
    legend labelsize=14) with a well-proportioned square canvas layout
  weaknesses:
  - Gridline value labels (20/40/60/80/100) are set at fontsize=11, the smallest text
    on the chart — at a ~400px mobile thumbnail this will be the first thing to become
    illegible; bump to ~13-14pt or add a subtle bold weight so the scale reference
    survives downscaling.
  - 'Design Excellence is solid but not yet publication-tier: consider adding a small
    data-story cue (e.g. a subtle annotation or emphasis on the axis where the gap
    between Player A and Player B is largest) to give the chart a clearer focal point
    rather than two evenly-weighted polygons.'
  - Library Mastery is generic — poly!/lines!/text! polar math could be replicated
    in matplotlib with little change; lean into a Makie-distinctive touch (e.g. `band!`
    for a shaded confidence ring, or `Legend` layout composition) to differentiate
    the implementation.
  - There is a noticeably large empty band between the bottom vertex of the hexagon
    and the legend/canvas edge relative to the tighter margin at the top — tightening
    that vertical whitespace (or nudging the axis up slightly) would improve canvas
    balance.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "radar-basic · julia · makie · anyplot.ai" is bold dark text, fully visible at top with no clipping. Six category labels (Speed, Passing, Shooting, Defense, Stamina, Vision) sit at the outer edge of the hexagonal grid in dark ink, clearly readable. Small gridline value labels (20, 40, 60, 80, 100) run up the top spoke in a soft gray. Concentric hexagonal gridlines and radial spokes are subtle light-gray lines, visible but not competing with the data.
      Data: Two overlapping filled hexagonal polygons — Player A in brand green (#009E73) with a solid stroke and circular markers at each vertex, Player B in lavender/purple (#C475FD) similarly stroked and marked. The overlap region blends into a muted blue-gray, and both series remain individually distinguishable. Legend at bottom-left shows "Player A" (green swatch) and "Player B" (lavender swatch) in dark text, no frame.
      Legibility verdict: PASS — all title, category labels, gridline numbers, and legend text are clearly readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title, category labels, and legend text have flipped to light/off-white ink, fully legible against the dark surface. Gridline value labels are a lighter soft gray, still readable. Gridlines and spokes remain subtle, low-alpha light lines against the dark background.
      Data: Player A polygon is the same #009E73 green, Player B polygon is the same #C475FD lavender — confirmed identical to the light render; only the chrome (background, text, grid) has flipped. The overlap region reads as a muted violet-gray, still distinguishable from each pure series color.
      Legibility verdict: PASS — no dark-on-dark failures observed; all text and data elements read clearly against the near-black background.
