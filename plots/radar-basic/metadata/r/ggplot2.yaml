review:
  strengths:
  - Custom coord_radar() ggproto correctly produces straight-edge polygon spokes instead
    of ggplot2's default curved polar arcs -- a genuinely distinctive, well-executed
    use of ggplot2's extension system (LM-02).
  - 'Palette and theme chrome are fully compliant: first series #009E73, second #C475FD
    in canonical Imprint order, and both renders are theme-correct with identical
    data colors and correctly flipped chrome.'
  - 'Data tells a clear story -- two employees with contrasting strength/weakness
    profiles (Alice: communication/teamwork; Marcus: leadership/technical skills)
    is visible through color and fill overlap without needing annotations.'
  - 'All mandated spec features present: alpha-filled polygons (0.25), regular gridlines
    at 20-unit intervals, distinct series colors with legend, and the polygon closed
    correctly via a duplicated first point.'
  weaknesses:
  - The 'Problem Solving' axis label renders with a corrupted/incomplete leading 'P'
    glyph in BOTH light and dark renders (reads as '?roblem Solving' -- only the top-right
    curve of the P survives). This is NOT canvas-edge clipping -- there is ~150-200px
    of background margin before the text starts on the 2400px canvas -- so it looks
    like a clipping-viewport or hjust/vjust computation quirk specific to the custom
    coord_radar()'s axis-label placement at that label's angle (~240 deg, the 5th
    of 6 axes). Investigate the CoordRadar ggproto's axis-label rendering path for
    this specific label (try rendering with ggplot_build()/ggplot_gtable() to inspect
    the text grob's clip region), or fall back to a manual geom_text()-based label
    layer if the coord's built-in axis-text rendering cannot be fixed directly.
  - The radial value axis (0-100 scores) has no descriptive label indicating what
    the scale represents -- axis.title is fully blanked. A subtle radial axis caption
    (e.g. 'Score') or restoring a minimal axis title would improve VQ-06.
  - Design Excellence is solid but not yet publication-level -- the composition still
    reads as a well-configured radar template rather than something highly bespoke.
    Consider strengthening visual hierarchy (e.g. slightly heavier line for emphasis,
    refined tick-label styling) to push aesthetic sophistication and data storytelling
    further.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 -- not pure white.
      Chrome: Title "radar-basic · r · ggplot2 · anyplot.ai" in dark ink, centered above the chart, fully legible. Six category axis labels (Communication, Technical Skills, Teamwork, Leadership, Problem Solving, Adaptability) placed at the outer edge; five of six are crisp and fully legible, but "Problem Solving" has a corrupted leading "P" glyph (missing its vertical stroke/bowl), reading as "?roblem Solving". Radial tick labels (0/20/40/60/80/100) in soft grey, legible. Grid lines subtle (alpha ~0.15), visible without competing with data. Legend sits below the chart in an elevated cream box, both entries ("Alice Chen", "Marcus Webb") clearly readable.
      Data: Two overlapping filled hexagon-ish polygons -- Alice Chen in brand green (#009E73), Marcus Webb in lavender (#C475FD) -- both with matching-color line strokes and point markers, alpha ~0.25 fill lets the overlap region read as a blended blue-grey.
      Legibility verdict: FAIL for the single "Problem Solving" label (broken glyph); all other text PASSes.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 -- not pure black.
      Chrome: Title, axis category labels, and legend text all correctly flipped to light ink/white, all legible against the dark surface -- no dark-on-dark failures observed. Radial tick labels in light grey, legible. Grid lines subtle and visible. Legend box uses the dark elevated surface (#242420) with light text, fully readable. Same "Problem Solving" glyph corruption reproduces identically in this render (same missing "P" stroke), confirming it is a rendering-logic bug rather than a one-off raster artifact.
      Data: Same green (#009E73) and lavender (#C475FD) data colors as the light render -- confirmed identical across themes, only chrome flipped.
      Legibility verdict: FAIL for the single "Problem Solving" label (broken glyph, identical to light render); all other text PASSes, no dark-on-dark issues.
