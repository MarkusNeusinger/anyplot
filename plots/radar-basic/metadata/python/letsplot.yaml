review:
  strengths:
  - Correct radar/spider chart geometry built from scratch via polar-to-cartesian
    conversion (lets-plot has no native coord_polar), including concentric gridline
    circles, radial spokes, and outer-edge axis labels
  - Filled polygons at alpha=0.25 with an outlined path on top match the spec's overlap-visibility
    requirement precisely, and the polygon is correctly closed by repeating the first
    vertex
  - 'Imprint palette applied correctly: Alice = #009E73 (brand green, always-first
    rule respected), Bob = #C475FD (palette position 2), identical data colors across
    light and dark renders'
  - Theme-adaptive chrome is threaded through consistently — background, ink, and
    soft-ink tokens all branch on ANYPLOT_THEME and are legible in both themes
  - Clean, fully deterministic, single-pass procedural script (no functions/classes,
    no randomness, only used imports) with clear section comments explaining the polar-chart
    workaround
  weaknesses:
  - Grid value labels (20/40/60/80/100) are placed on the Technical spoke (offset
    only +8 units on a 0-150 radius scale), which also carries data — Alice's Technical
    value (85) sits only 5 units from the '80' gridline, so the '80' label visually
    touches/overlaps the green marker and its connecting line in both renders. Move
    the value-label spoke to bisect two category axes (e.g. angle offset by half a
    step) instead of reusing a data-bearing spoke, or increase the label's radial/tangential
    offset so it clears the polygon.
  - The rectangular panel border (default lets-plot panel frame) sits awkwardly around
    an otherwise circular/polar radar chart — remove it (panel_border=element_blank()
    or theme_void-style chrome) for a cleaner, more polished radar aesthetic
  - Bob's series color (#C475FD lavender) has a contrast ratio of ~2.70:1 against
    the light background (#FAF8F1), below the WCAG 3:1 threshold noted in the style
    guide for this exact hue; a thin ink-color stroke on the line/markers would fix
    this per the style guide's optional-outline guidance since the affected series
    is a primary comparison series, not decorative
  - Mandated title (with descriptive prefix) renders at ~90% of plot width, right
    at the upper edge of the 50-70% comfortable / ~90% overflow guidance — a slightly
    smaller scaling factor in the title_fontsize formula would give a touch more breathing
    room
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "Employee Skills Comparison · radar-basic · python · letsplot · anyplot.ai" reads clearly in dark ink across the top, spanning close to the full canvas width. Six category axis labels (Creativity, Leadership, Communication, Technical, Problem Solving, Teamwork) sit legibly at the outer edge in dark ink. A "Employee" legend with green/lavender swatches for Alice/Bob sits at the right in an elevated cream box with soft border. Concentric gridline circles and spokes are subtle light-gray at low alpha. Scale labels (20/40/60/80/100) run down the bottom (Technical) spoke in soft ink.
      Data: Alice = solid brand green (#009E73) outline/markers with green fill at alpha 0.25; Bob = lavender (#C475FD) outline/markers with lavender fill at alpha 0.25. Where the two filled polygons overlap, the fills blend into a soft blue-gray tone. All text is readable against the light background, with one caveat: the "80" scale label on the bottom spoke sits immediately against/overlapping Alice's green marker and connecting line at the Technical axis (value 85 is very close to the 80 gridline).
      Legibility verdict: PASS (with the "80"/marker overlap as a noted defect, not a full illegibility failure — the digits remain distinguishable).

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title, axis labels, legend, and scale-label layout as the light render, all re-colored to light ink (#F0EFE8 primary / #B8B7B0 secondary) and clearly legible against the dark surface — no dark-on-dark text anywhere.
      Data: Same brand green (#009E73) and lavender (#C475FD) data colors as the light render — confirmed identical across themes, only the chrome flipped. The overlapping fill region again reads as a muted blue-gray blend, appropriate for the dark surface.
      Legibility verdict: PASS (same "80"/marker overlap caveat as the light render — it is a layout issue independent of theme, present identically in both).
