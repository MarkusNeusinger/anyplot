review:
  strengths:
  - 'Correct engineering choice: builds the radar chart via manual polar-to-cartesian
    projection rather than plotnine''s coord_polar, which would bend the straight
    polygon edges into arcs and break the radar shape - shows real understanding of
    the library''s limitations.'
  - 'All spec-mandated features present: filled polygons with alpha=0.25, concentric
    gridlines at 20/40/60/80/100, spokes per axis, category labels at the outer edge,
    closed polygons, and a legend distinguishing the two series.'
  - 'Palette compliance is clean: first series is #009E73, second is #C475FD, identical
    between light and dark renders; theme-adaptive chrome (background, grid, spokes,
    text, legend) is correctly threaded through via the THEME env var.'
  - Deterministic, minimal, KISS-structured code with no fake interactivity and only
    the imports it actually uses.
  weaknesses:
  - 'Title is ''radar-basic · plotnine · anyplot.ai'' but the required format is ''{spec-id}
    · {language} · {library} · anyplot.ai'' - missing the ''python'' language segment.
    Fix: labs(title="radar-basic · python · plotnine · anyplot.ai", ...).'
  - Legend title 'Employee' nearly fills the legend box width and sits close to the
    box's top border in both renders (tight but not clipped) - increase legend box
    padding or reduce legend_title fontsize slightly for breathing room.
  - Noticeable unused whitespace above and below the radar hexagon relative to the
    square canvas - the chart could be scaled up slightly (e.g. tighten scale_x_continuous/scale_y_continuous
    limits or increase figure_size fill) to use the available canvas space more fully.
  - Data storytelling relies solely on the overlapping filled polygons for comparison
    - no additional emphasis (e.g. highlighting the leading employee per axis, or
    a brief subtitle) to sharpen the takeaway.
