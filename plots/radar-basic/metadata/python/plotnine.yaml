    hues/alpha/markers between light and dark renders; theme-adaptive chrome (background,
    grid, spokes, text, legend) correctly threaded through the THEME env var.'
  - Deterministic, minimal, KISS-structured code with no fake interactivity and only
    the imports it actually uses.
  weaknesses:
