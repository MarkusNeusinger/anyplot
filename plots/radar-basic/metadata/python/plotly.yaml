review:
  strengths:
  - Radial-axis tick labels are angle-offset into the gap between the Technical Skills
    and Teamwork spokes so the tick values never collide with a category label or
    data point
  - Filled polygons at alpha=0.25 give clear overlap visibility between the two series
    while translucent fill colors are derived programmatically from the Imprint hexes
    (no hardcoded rgba)
  - 'First series is brand green #009E73, second is Imprint position 2 (#C475FD),
    correct canonical order with distinct line widths (3.5 vs 2.5) giving the primary
    series visual priority'
  - Correct 2400x2400 square canvas per style guide for a symmetric polar chart, correct
    mandated title format, and correct theme-adaptive chrome (background, ink, grid)
    threaded through every layout token
  - Polygon closing (categories + [categories[0]]) is done correctly and cleanly for
    both series
  - hovertemplate gives clean per-point interactive detail in the HTML output
  weaknesses:
  - Design storytelling relies only on line-width contrast (3.5 vs 2.5) to signal
    the primary series - no annotation or emphasis calls out the one interesting reversal
    in the data (Junior Developer scores higher than Senior on Teamwork), a missed
    opportunity for a stronger focal point
  - Library usage is solid but fairly standard go.Scatterpolar - no distinctive plotly-only
    flourish beyond the hover template (e.g. no angularaxis/radialaxis interaction
    affordances, no per-point annotations)
  - The lavender series (#C475FD) falls below the style guide's 3:1 WCAG contrast
    note on the cream background; an optional thin ink-color stroke on the markers/line
    would improve accessibility at small/thumbnail sizes without adding visual noise
    given only 2 series are present
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), not pure white, not dark - matches the required light plot surface.
      Chrome: Title "radar-basic · python · plotly · anyplot.ai" is dark ink, centered, fully visible and not clipped. The six category labels (Communication, Technical Skills, Teamwork, Problem Solving, Leadership, Creativity) sit at the outer edge of the polar grid in dark ink and are clearly readable. Radial tick labels (20, 40, 60, 80, 100) are soft-gray, placed horizontally in the gap between the Technical Skills and Teamwork spokes, and don't collide with any data point or category label. Grid lines (concentric hexagons + spokes) are subtle, light gray, clearly present but not competing with the data. Legend box at the bottom has a light elevated background with a thin border and dark text.
      Data: Senior Developer polygon (brand green #009E73, thicker line, larger markers) is the outer/dominant shape across 5 of 6 axes; Junior Developer polygon (lavender/purple #C475FD, thinner line) is nested inside except on the Teamwork axis where it slightly exceeds Senior. Both polygons are filled with ~25% alpha so the overlap region reads as a blended blue-gray, and both are closed correctly (first point repeated).
      Legibility verdict: PASS - all text is clearly readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), not pure black, not light - matches the required dark plot surface.
      Chrome: Title and category labels have switched to light ink and are clearly legible against the dark background. Radial tick labels are light gray, same position as the light render, still readable and non-colliding. Grid lines are subtle light-gray strokes on the dark background, visible without dominating. Legend box background is the dark elevated tone with a light border and light text, clearly legible.
      Data: Confirmed identical data colors to the light render - Senior Developer is the same brand green #009E73 and Junior Developer is the same lavender #C475FD, both with the same fill and line-width treatment. Only the chrome (background, text, grid, legend frame) has flipped to the dark tokens.
      Legibility verdict: PASS - all text is clearly readable against the dark background; no dark-on-dark failures observed (tick labels, category labels, and title all use the light INK/INK_SOFT tokens, not accidentally left dark).
