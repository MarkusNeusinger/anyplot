review:
  strengths:
  - Manual polar-coordinate radar layout (trig-based x/y transform) is a genuinely
    sophisticated technique to work around Vega-Lite's lack of a native radar/polar
    mark.
  - 'Palette fully compliant: Alice = Imprint #009E73 (first series), Bob = canonical
    position 2 #C475FD, identical across both themes.'
  - Filled polygons at fillOpacity=0.25 for overlap readability, per spec's explicit
    recommendation.
  - Interactive click-to-select highlighting via `selection_point` + `alt.condition`
    on opacity is a real, Altair-native interactive feature (not a static fake) that
    adds value in the HTML output.
  - Grid rings at 20/40/60/80/100 with subtle gridlines/spokes and clean outer category
    labels match the spec's layout requirements exactly; closed polygons via to_xy_closed().
  - Both themes render correctly (background, text, grid all theme-adaptive); zoomed-crop
    check confirmed the '100' and '80' ring labels do NOT overlap despite tight vertical
    spacing.
  - Realistic, neutral employee-performance-review scenario with genuinely varied
    per-axis values for both series (not a flat/identical profile).
  weaknesses:
  - 'SC-04: Title text is ''radar-basic · altair · anyplot.ai'' — missing the required
    {language} segment. Should be ''radar-basic · python · altair · anyplot.ai''.'
  - 'CQ-01: Two small helper functions (to_xy, to_xy_closed) deviate from the strict
    KISS ''no functions/classes'' pattern — consider inlining the trig transform directly
    in the data-construction loops.'
  - 'VQ-05/DE-02: Noticeably more empty whitespace below the ''Communication'' label
    at the bottom of the canvas than at the top/sides — the view is slightly vertically
    off-center within the square canvas; consider adjusting vertical centering or
    padding to balance margins.'
  - 'VQ-01: Ring value labels (20/40/60/80/100) and category labels rely on good-but-not-maximal
    font sizing — verify legibility holds at ~400px mobile width, particularly for
    the smaller ring labels (fontSize=19).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (not pure white).
      Chrome: Title "radar-basic · altair · anyplot.ai" in bold dark text at top-left; six bold dark category
        labels (Communication, Technical Skills, Teamwork, Problem Solving, Leadership, Creativity) around the
        hexagonal grid; muted grey ring-value labels (20/40/60/80/100) along the top spoke; legend box top-right
        with "Employee" title and Alice/Bob swatches, light elevated fill with a thin border. All chrome text is
        clearly readable against the light background.
      Data: Hexagonal grid rings and spokes in soft grey, two overlapping filled polygons — Alice in brand green
        (#009E73) and Bob in lavender/purple (#C475FD) — each with translucent fill (~alpha 0.25) and large
        filled vertex markers matching series color. First series is confirmed brand green as required.
      Legibility verdict: PASS. Zoomed crop of the "100"/"80" ring labels confirmed no pixel overlap despite
        tight vertical spacing.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (not pure black).
      Chrome: Same title, category labels, and ring-value labels now rendered in light cream / muted light-grey
        tones against the dark background; legend box uses a darker elevated fill with light text and a visible
        border. No dark-on-dark or light-on-light failures observed anywhere.
      Data: Alice (#009E73) and Bob (#C475FD) fills and vertex markers are pixel-identical in hue to the light
        render — only the chrome (background, text, grid, legend box) flipped, as required.
      Legibility verdict: PASS. All title/axis/tick/legend text reads clearly against the dark surface; ring
        labels remain legible and non-overlapping in this render too.
