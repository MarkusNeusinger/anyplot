  strengths:
  - Correct polygon closure, alpha=0.25 fills, and 20/40/60/80/100 gridlines exactly
    as the spec requests
  - Imprint palette used correctly (positions 1 & 2), and every chrome element correctly
    threads ANYPLOT_THEME tokens with no dark-on-dark or light-on-light failures
  - Alternating radial band shading is a thoughtful design touch that adds depth without
    competing with the data
  - Clean, minimal, KISS-compliant code with correct canvas size (2400x2400) and save
    pattern
  weaknesses:
  - 'CRITICAL: at the "Technical Skills" axis, the Senior Developer marker+line sits
    directly on top of the axis label text; at the "Teamwork" axis, the Team Lead
    marker+line does the same - reproduces identically in both light and dark renders
    because both series reach values (94-96) very close to the r=100 outer ring where
    category labels are anchored. Fix by increasing tick_params pad for the theta
    axis, or extending ax.set_ylim(0, 110) while keeping gridlines/ticks capped at
    100, so labels clear the r=100 data ring with margin.'
  - '"Technical Skills" label sits only ~16px from the right canvas edge (2400px wide)
    - not clipped, but tight; widen the right margin via fig.subplots_adjust(right=...)
    or trim the label pad slightly.'
  - Design Excellence is solid but not sophisticated - consider a subtle focal-point
    emphasis on the axis where the two series diverge most to lift DE-03.
