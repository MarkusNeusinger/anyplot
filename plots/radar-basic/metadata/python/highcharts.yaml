  - Correct Okabe-Ito palette with brand green as first series in both themes
  - Full theme-adaptive chrome (background, text, grid) correctly implemented for
    light and dark
  - Realistic, neutral employee performance data with contrasting profiles that tell
    a clear comparison story
  - Idiomatic Highcharts polar chart with polygon grid interpolation and proper highcharts-more.js
    inclusion
