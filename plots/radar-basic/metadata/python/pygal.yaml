    styling) that would separate it from a well-configured default
  - The hero-series emphasis (stroke width 5.5 vs 3.5, dots_size 9 vs 6) is a nice
    storytelling touch but fairly subtle at a glance — consider sharpening the contrast
    further (e.g. slightly higher stroke_opacity or dimming the non-hero series a
    touch more) so the focal point reads immediately
  - dots_size (6-9) and stroke width (3.5-5.5) are on the modest side for only 6 categories
    / 18 total data points — sparse radar data like this can support slightly larger
    markers per the data-density heuristic without crowding
  - pygal exposes distinctive features not used here (e.g. `print_values=True` for
    on-chart value labels near dots) that could push Library Mastery beyond generic
    idiomatic usage
