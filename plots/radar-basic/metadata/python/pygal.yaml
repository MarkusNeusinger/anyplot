review:
  strengths:
  - Two-tier radial gridline treatment (faint dotted minor rings at 20/60, slightly
    firmer dashed major rings at 40/80/100) is a genuine custom design detail beyond
    the mandated style-guide baseline, visually confirmed in both renders
  - 'Hero-vs-supporting series contrast now reads immediately: Employee A (hero, highest
    average) uses a solid 7.5px stroke with 11px dots, while both other series use
    a dashed 3px stroke (dasharray 14,6) with 5px dots — verified by pixel-level crop
    inspection'
  - 'Correct Imprint categorical palette in canonical order (#009E73 / #C475FD / #4467A3),
    identical data colors between light and dark renders, fully theme-adaptive chrome
    with no dark-on-dark or light-on-light failures'
  - Canvas is exactly 2400x2400 (square target, no canvas-gate flag raised); no edge
    clipping of title, axis labels, or legend in either render
  - Clean, deterministic KISS code structure with hardcoded literal data and the importlib
    guard against the file shadowing the installed pygal package
  - Realistic, neutral employee-competency-review scenario with genuinely differentiated
    per-axis profiles (technical expert vs. team leader vs. creative visionary), matching
    a spec-suggested application
  - Title and legend both match the mandated format and the series data exactly
  weaknesses:
  - 'LM-02: still no use of pygal''s more distinctive display features (e.g. print_values=True
    for on-chart value labels, custom value_formatter) — the dash-pattern differentiation
    is a nice touch but the overall feature set used remains fairly conventional idiomatic
    pygal.Radar usage'
  - Non-hero dots (dots_size=5) are now a touch small in absolute terms on the 2400x2400
    canvas — legible but could be nudged up 1-2px without giving up the hero/non-hero
    size gap
  - Value ranges (68-95) stay fairly compressed across all three employees — a slightly
    wider spread on 1-2 axes would sharpen the multi-series comparison further
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "radar-basic · python · pygal · anyplot.ai" at top in dark ink, clearly legible. Six axis category labels (Communication, Creativity, Leadership, Problem Solving, Teamwork, Technical Skills) sit at the outer edge of each spoke in dark, readable text of similar size. Radial scale labels (0/20/40/60/80/100) run down the top (Communication) spoke in a slightly smaller, muted dark tone. Gridlines now use a two-tier treatment: faint dotted minor rings (20, 60) and slightly firmer dashed major rings (40, 80, 100) — a subtler rhythm than a flat default grid. Legend sits below the chart in a single column with three entries and small color swatches, fully readable with generous spacing from the chart, not clipped.
      Data: Three overlapping filled polygons with ~22% opacity fill. Employee A — Technical Expert (hero series, highest average score) is brand green #009E73 with a solid, bold 7.5px stroke and large 11px dots. Employee B — Team Leader (#C475FD, lavender) and Employee C — Creative Visionary (#4467A3, blue) both use a thinner dashed 3px stroke and smaller 5px dots, visually receding behind the hero series. All three are clearly distinguishable from each other and from the background; verified at pixel level that the hero solid line contrasts with the two dashed non-hero lines.
      Legibility verdict: PASS — all text is readable against the light background, no overlap between text elements or with data, no clipping at canvas edges.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, axis category labels, radial scale labels, and two-tier gridline treatment as the light render, flipped to light/off-white ink — clearly legible against the dark background, no dark-on-dark failures observed anywhere (title, category labels, tick labels, legend text all light-colored).
      Data: Identical colors and stroke/dot treatment to the light render — brand green #009E73 hero series (solid, bold), lavender #C475FD and blue #4467A3 non-hero series (dashed, smaller dots) — confirming only chrome flipped between themes, not data colors or styling.
      Legibility verdict: PASS — all text is readable against the dark background, no dark-on-dark issues, data colors and hero/non-hero styling match the light render exactly, no clipping at canvas edges.
