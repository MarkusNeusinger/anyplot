    in that gap - nudge further into the gap or reduce label opacity slightly to fully
    clear the line
  - Markers (s=60) could be sized slightly larger (e.g. 70-80) given the generous
    square canvas and only 6 points per series
  - Companion bar chart repeats the same six category labels already shown on the
    radar spokes - a reasonable trade-off for numeric-ranking clarity, but adds some
    label redundancy
