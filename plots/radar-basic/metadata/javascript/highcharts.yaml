review:
  strengths:
  - Clean hand-built polar geometry (angleOf/pointAt helpers) produces a well-proportioned
    hexagonal radar with balanced margins and no text overlap or edge clipping in
    either theme.
  - 'Correct Imprint palette usage — first series #009E73 (brand green), second series
    #C475FD (canonical position 2) — identical across light and dark renders; theme-adaptive
    chrome (ink, inkSoft, grid, pageBg) correctly threads through every drawn element.'
  - 'Realistic, well-differentiated data: Q3-to-Q4 employee review scores rise in
    most competencies but dip slightly in Adaptability, giving the two overlapping
    polygons genuine comparative meaning rather than one series simply dominating.'
  - Ring scale labels (20/40/60/80/100), spokes, and outer category labels are all
    legible and non-overlapping in both themes, including at the crowded top-spoke
    intersection near the highest-value data points.
  weaknesses:
  - 'The chart renders zero real Highcharts series (series: []) — every visual element
    (grid rings, spokes, polygons, markers, legend, even axis labels) is drawn via
    chart.renderer primitives, sidestepping Highcharts'' data-binding/series model
    entirely. This is the main reason Library Mastery scores low: it''s a generic
    SVG-drawing exercise achievable in almost any renderer-capable library, not a
    showcase of Highcharts-specific charting strengths.'
  - 'Because there is no real series or tooltip, the interactive HTML output (plot-light.html
    / plot-dark.html) has no hover functionality at all — for an interactive library
    the static PNG and the HTML view are identical. Add an actual scatter series at
    the same pixel-projected points with tooltip.enabled: true and a formatter showing
    category + value, so the HTML deliverable provides real interactive value on top
    of the renderer-drawn visual, and so LM-01 credits genuine series usage instead
    of only the renderer overlay.'
  - Design Excellence is solid but not exceptional — the two overlapping polygons
    rely entirely on default fill/stroke to convey the Q3-to-Q4 comparison; a small
    numeric delta callout or highlighting the strongest single-axis change (e.g. Leadership
    +10) would sharpen the storytelling (DE-03).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "radar-basic · javascript · highcharts · anyplot.ai" in bold dark ink, clearly readable. Six bold dark-ink category labels (Communication, Technical Skills, Teamwork, Leadership, Problem Solving, Adaptability) at the outer edge of each axis. Thin gray spokes and pentagon-style grid rings at 20/40/60/80/100 with small gray ring-scale numbers along the top spoke. Legend at bottom center with two rounded color chips ("Q3 Review" green, "Q4 Review" purple) in dark text.
      Data: Two overlapping filled hexagonal polygons — Q3 Review in brand green (#009E73) and Q4 Review in lavender/purple (#C475FD) — each with ~22% fill opacity so the overlap region reads as a blended blue-gray, and circular markers with light-colored strokes at each vertex. First series is correctly the Imprint brand green.
      Legibility verdict: PASS. All text (title, axis category labels, ring scale numbers, legend) is clearly readable against the light background; no dark-on-light or "light-on-light" failures observed, and no overlapping/clipped text.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title now in light/cream text, clearly readable. Category labels are light-colored and legible. Grid rings and spokes render as light thin lines at reduced opacity. Ring-scale numbers (20/40/60/80/100) are a soft light-gray, legible against the dark background. Legend text is light-colored and readable.
      Data: Same brand green (#009E73) and lavender (#C475FD) polygons — confirmed identical hex values to the light render — with the overlap region rendering as a muted dark-purple blend appropriate for the dark surface. Markers use dark-colored strokes for contrast against the light fills.
      Legibility verdict: PASS. No dark-on-dark failures — all title, axis label, tick/ring label, and legend text is light-colored and clearly visible against the near-black background. Data colors are confirmed identical to the light render; only chrome (background, text, grid) flipped as expected.
