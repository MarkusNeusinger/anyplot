review:
  strengths:
  - 'Both renders are theme-correct: warm off-white (#FAF8F1) / warm near-black (#1A1A17)
    backgrounds, all chrome (title, axis labels, ticks, legend) uses readable theme-adaptive
    ink colors with zero dark-on-dark or light-on-light failures'
  - 'Imprint palette applied correctly and identically across themes: series 1 = brand
    green #009E73, series 2 = #C475FD (canonical position 2), no custom hexes'
  - 'All required spec features present: filled polygons at alpha 0.25, concentric
    gridlines at 20/40/60/80/100, polygon closed via d3.curveLinearClosed, axis labels
    at the outer edge with smart anchor logic (start/end/middle based on cosine of
    the angle) so no label collides with the polygon'
  - 'Clean square-canvas layout: chart occupies roughly 70% of the mount width, generous
    balanced margins, legend sits directly beneath the plot (not isolated), zero clipping
    at any canvas edge'
  - 'Deterministic, realistic, neutral data (employee competency review: Software
    Engineer vs Team Average) with a believable dip on Leadership for both series'
  - 'KISS, reproducible, dependency-clean code with no fake interactivity; correctly
    follows the d3 mount-node contract (reads window.ANYPLOT_SIZE, appends a single
    svg to #container, no fetch/csv/network calls)'
  weaknesses:
  - 'Not idiomatic D3: every mark (grid polygons, spokes, tick labels, category labels,
    data polygons, point circles, legend swatches) is drawn with an imperative forEach
    + svg.append() loop instead of D3''s data-join pattern (selection.data(...).join(...)).
    Rewrite the grid/spoke/label/point rendering as selectAll(...).data(...).join(...)
    calls to use D3 idiomatically — this is the main Library Mastery (LM-01) deduction.'
  - 'Design Excellence is only baseline: colors and layout are correct but there is
    no distinctive polish beyond the spec minimum — e.g. no subtle radial-axis emphasis,
    no highlighted focal point calling out the largest gap between the two series
    (Technical Skills: 92 vs 75), no refined grid treatment (concentric webs are plain
    1px lines at a single opacity/level with no visual hierarchy between minor/major
    rings).'
  - Radial scale reference (the 20/40/60/80/100 tick labels) is only rendered along
    the Communication (top) spoke; a reader following any other axis has to visually
    trace back to the top to read values — consider a lighter repeated tick label
    near each spoke or a small radial axis at multiple angles.
  - 'LM-02 usage is generic for D3''s capability set: the implementation only uses
    scaleLinear + a line generator with curveLinearClosed — no distinctive D3 feature
    (e.g. d3-interpolate for a subtle area transition, d3.arc, or a custom shape generator)
    that would be hard to replicate as easily in another charting library.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 target — not pure white.
      Chrome: Title "radar-basic · javascript · d3 · anyplot.ai" centered top in bold dark ink, fully readable. Six category axis labels (Communication, Technical Skills, Teamwork, Leadership, Problem Solving, Adaptability) in dark ink at the outer edge of the radar, each with correct text-anchor so none collides with the polygon or grid. Radial scale ticks (20/40/60/80/100) in soft gray along the top (Communication) spoke, small but legible. Legend ("Software Engineer" green swatch, "Team Average" purple swatch) centered below the plot, clearly separated from the chart.
      Data: Two overlapping filled radar polygons at alpha ~0.25 — "Software Engineer" in brand green #009E73 (outer, higher values on most axes) and "Team Average" in lavender #C475FD (inner, generally lower, converging with green near Leadership). Point markers are filled circles with a light page-background stroke for contrast against the fill.
      Legibility verdict: PASS — no text is too light against the light background, no overlap detected at any axis label, tick label, or legend text.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 target — not pure black.
      Chrome: Same title, axis labels, and tick labels now rendered in light ink (near-white for primary text, light gray for tick labels) — fully readable against the dark background, no dark-on-dark failures anywhere. Legend text also correctly flipped to light ink.
      Data: Series colors are pixel-identical to the light render — brand green #009E73 and lavender #C475FD — confirming only chrome (not data color) flips between themes. Grid lines and spokes are still visible but subdued (theme-adaptive gray), providing structure without competing with the data polygons.
      Legibility verdict: PASS — all title/axis/tick/legend text is clearly readable in light-on-dark, no dark-on-dark or unreadable elements found; brand green remains vivid on the dark surface.
