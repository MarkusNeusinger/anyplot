review:
  strengths:
  - Correct Imprint palette order (green → lavender → blue) with fully theme-adaptive
    chrome — both light and dark renders are legible and correctly styled
  - 'Data tells a clear story: three phone models show complementary trade-offs (Aurora
    X dominant except Price Value, Vega Lite the inverse) — visible at a glance through
    the overlapping polygons'
  - Semi-transparent area fills (opacity 0.25) correctly implement the spec's overlap-visibility
    requirement for all three series simultaneously
  - All text explicitly sized (title 22px, legend 16px, axis names 15px) and legible
    in both themes
  weaknesses:
  - Radar gridlines have no numeric value labels (20/40/60/80/100) — indicator/radar
    axisLabel is not shown, so readers can't tell what value each concentric ring
    represents; the spec explicitly calls for gridlines at regular, legible intervals.
    Enable radar.axisLabel with a readable color/fontSize on one axis.
  - Aesthetic sophistication reads as a well-configured library default rather than
    an exceptional publication-ready design — consider subtle refinements (e.g. per-axis
    emphasis on hover, refined split-area treatment) to lift DE-01.
  - No ECharts-distinctive feature used beyond the basic radar type (LM-02) — consider
    emphasis/highlight styling (emphasis.lineStyle, areaStyle.shadowBlur) to leverage
    ECharts-specific capabilities.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (not pure white).
      Chrome: Bold dark title "radar-basic · javascript · echarts · anyplot.ai" centered at top, clearly readable. Six axis category labels (Battery Life, Build Quality, Price Value, Display, Performance, Camera) in medium-gray text at the outer edge of the hexagonal grid, all readable. Legend at bottom center with three color swatches ("Aurora X", "Nimbus S", "Vega Lite") in dark text, readable. Concentric hexagonal gridlines are thin and subtle (5 splits), visible but not competing with the data.
      Data: Three overlapping filled polygons with ~25% opacity — Aurora X in brand green (#009E73), Nimbus S in lavender/purple, Vega Lite in blue — with circular markers and 3px-wide outlines. First series is confirmed brand green. The three polygons clearly diverge (Aurora X dominates Camera/Performance/Build Quality/Display but is weakest on Price Value; Vega Lite is strongest on Price Value/Battery but weakest on Camera/Performance), so the overlap pattern communicates real trade-offs.
      Legibility verdict: PASS — all title, axis-category, and legend text is clearly readable against the light background; no dark-on-light or light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (not pure black).
      Chrome: Title renders in light/near-white text, clearly legible. Axis category labels render in light gray, readable against the dark surface. Legend text is light-colored and readable. Gridlines are subtle light-gray hexagons, visible without dominating.
      Data: Same three colors as the light render — brand green, lavender, blue — confirming data-color identity is preserved across themes; only chrome (background, text, grid) flipped as required.
      Legibility verdict: PASS — no dark-on-dark failures observed; all title/label/legend text is clearly visible against the near-black background.
