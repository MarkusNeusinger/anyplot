review:
  strengths:
  - Radar gridlines now carry numeric value labels (20/40/60/80/100) at regular intervals
    — directly addresses the attempt-1 SC-02/VQ-06 gap
  - Correct Imprint palette order (green → lavender → blue) with fully theme-adaptive
    chrome — both renders legible and correctly styled
  - 'Data tells a clear story: three phone models show complementary trade-offs (Aurora
    X dominant except Price Value, Vega Lite the inverse), visible through the overlapping
    polygons'
  - Semi-transparent area fills (opacity 0.25) plus a soft shadowBlur glow correctly
    implement the spec's overlap-visibility requirement while adding a distinctive
    visual touch
  - emphasis hover states (thicker line, higher area opacity) leverage an ECharts-specific
    interactive feature appropriately for a static-preview + HTML-detail library
  weaknesses:
  - Aesthetic sophistication is improved but still reads closer to a well-configured
    library default than an exceptional publication-ready design — consider a more
    deliberate color treatment or asymmetric layout emphasis to lift DE-01 further
  - Library mastery is still fairly light — consider one more ECharts-distinctive
    touch (e.g., per-axis nameGap/custom label rotation, or a radar-specific tooltip
    formatter surfaced in the HTML view) to push LM-01/LM-02 further
  - No explicit annotation or callout highlighting the single most interesting trade-off
    (e.g., Price Value inversion) — would sharpen DE-03's storytelling beyond what
    color alone conveys
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 (not pure white).
      Chrome: Bold dark title "radar-basic · javascript · echarts · anyplot.ai" centered at top, clearly readable. Six axis category labels (Battery Life, Build Quality, Price Value, Display, Performance, Camera) in medium-gray at the outer edge, all readable. Radial gridlines now carry numeric value labels (20/40/60/80/100) at regular intervals — fixed from attempt 1. Subtle alternating splitArea bands add faint concentric depth without competing with data. Legend at bottom center ("Aurora X", "Nimbus S", "Vega Lite") in dark, readable text.
      Data: Three overlapping filled polygons at ~25% opacity with a soft shadowBlur glow around each fill; circular markers, 3px outlines. First series confirmed brand green #009E73, second lavender/purple, third blue. Polygons clearly diverge, communicating real trade-offs between the three phone models.
      Legibility verdict: PASS — all title, axis-category, tick, and legend text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 (not pure black).
      Chrome: Title renders in near-white text, clearly legible. Axis category labels in light gray, readable. Numeric gridline labels (20/40/60/80/100) visible and readable. Legend text light-colored and readable. Same subtle alternating splitArea bands.
      Data: Same three colors as light render — brand green, lavender, blue — confirming data-color identity preserved across themes; only chrome flipped as required. shadowBlur glow is even more visible against the dark surface (soft green halo around the Aurora X fill).
      Legibility verdict: PASS — no dark-on-dark failures; all title/label/tick/legend text clearly visible against the near-black background.
