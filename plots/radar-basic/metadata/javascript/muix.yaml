review:
  strengths:
  - 'First series is brand green #009E73 and the second is Imprint palette[1] violet
    — data colours are pixel-identical across light and dark, only the chrome flips,
    exactly per the theme contract.'
  - 'Genuine MUI X composition: with no community RadarChart in v7, it builds the
    radar on ChartContainer''s sized SVG surface and reads the plot rect via the useDrawingArea()
    hook rather than faking anything or reaching for Pro/Recharts.'
  - Clean radar craft — translucent 0.25 fills for overlap visibility, solid 3px outlines,
    page-bg-ringed vertex markers, concentric grid rings at 20/40/60/80/100, outer
    axis labels with angle-aware text-anchor/baseline, and a closed polygon.
  - 'Both renders are fully legible: title, category labels, radial tick labels and
    legend all read clearly against the #FAF8F1 and #1A1A17 surfaces with no dark-on-dark
    failure.'
  - Deterministic in-memory data, skipAnimation set, default-exported component with
    no manual mount — correct harness contract.
  weaknesses:
  - Radial tick labels (20/40/60/80/100) at fontSize 13 CSS px sit right against the
    vertical top spoke and are a touch small at final resolution — nudging to ~15px
    and adding a hair of horizontal offset would improve their standalone readability.
  - The nested concentric hexagon rings plus radial spokes create a faint 'cube' optical
    illusion at the centre; slightly lighter inner-ring stroke weight would keep the
    grid subtle and reduce that busyness.
  - 'Library mastery is inherently limited by the approach: MUI X only supplies the
    canvas and the drawing-area hook here — the geometry is hand-drawn SVG, so this
    showcases the surface more than any distinctive MUI X chart primitive (a reasonable
    and honest tradeoff given v7''s community limits).'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white ~#FAF8F1 (not pure white, not dark). PASS.
