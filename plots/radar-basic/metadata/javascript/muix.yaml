review:
  strengths:
  - 'First series is brand green #009E73 and second is Imprint lavender #C475FD —
    palette-compliant and CVD-safe, identical across both themes.'
  - 'Backgrounds are theme-correct (#FAF8F1 light / #1A1A17 dark); all chrome (title,
    axis labels, tick labels, legend) is fully readable in both renders with no dark-on-dark
    or light-on-light failures.'
  - 'All spec features present: translucent filled polygons (fillOpacity 0.25), concentric
    grid rings at 20/40/60/80/100, per-axis outer labels, closed polygons with vertex
    markers, distinct colors + legend.'
  - 'Idiomatic v7-community workaround: composes the radar on ChartContainer''s ChartsSurface
    using the useDrawingArea() hook (v7 has no RadarChart), mapping polar geometry
    onto the real drawing rect — no faked chrome, everything drawn to scale.'
  - 'Realistic, neutral data (basketball scouting: Guard vs Forward across six skill
    axes on a 0-100 scale) with clear multi-series comparison and good visual hierarchy.'
  - 'Refined details: subtle nested grid (outer ring solid, inner rings lighter/thinner),
    vertex markers stroked with the page background for definition, generous whitespace,
    minimal chrome.'
  weaknesses:
  - 'Stale duplicate header block: lines 6-10 repeat an older header (`Library: MUI
    X Charts | React | Node 22`, `Quality: pending`) beneath the rewritten block,
    and the `//# anyplot-orientation: square` directive sits on line 5 between the
    two blocks rather than on its very first line. Remove the duplicate block and
    keep the orientation directive at the top — cosmetic, cost CQ-04 one point.'
  - The chart is essentially hand-rolled SVG inside an empty-series ChartContainer;
    MUI X supplies only the sized surface and drawing-area hook. Legend, ticks, and
    marks are custom rather than MUI X primitives (ChartsLegend, mark/tooltip system),
    so no MUI X hover tooltips appear in the interactive HTML output. Defensible for
    v7 (no RadarChart), but it limits library-distinctive value (LM-02).
