      Data: Guard polygon in brand green #009E73, Forward polygon in Imprint violet (palette[1]); translucent fills, solid outlines, filled vertex markers with off-white rings. First series is #009E73. Confirmed.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black ~#1A1A17 (not pure black, not light). PASS.
      Chrome: title and all six axis labels in light ink, clearly readable against the dark surface — no dark-on-dark. Radial tick labels in light grey, readable. Grid rings subtle light-on-dark, visible. Legend text light, readable.
      Data: identical Guard green #009E73 and Forward violet as the light render — only chrome flipped. Confirmed identical data colours.
      Legibility verdict: PASS
