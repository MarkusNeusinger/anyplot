      Data: two filled polygons — Guard is brand green #009E73, Forward is Imprint lavender #C475FD — with ~0.25 fill opacity, solid outlines, and circular vertex markers stroked in the page background. First series confirmed #009E73.
      Legibility verdict: PASS

