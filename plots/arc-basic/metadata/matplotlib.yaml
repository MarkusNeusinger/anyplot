  image_description: The plot displays a basic arc diagram with 10 character nodes
    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along
    a horizontal baseline. Curved arcs connect pairs of characters above the baseline,
    with arc height proportional to the distance between connected nodes. Arcs use
    a blue sequential colormap (Blues) where darker, thicker arcs represent stronger
    connections (weight 3) and lighter, thinner arcs represent weaker connections
    (weight 1). Yellow circular nodes (#FFD43B) with blue outlines (#306998) mark
    each character position. A vertical colorbar on the right side shows "Connection
    Strength" ranging from 1 to 3. The title reads "Character Interactions · arc-basic
    · matplotlib · pyplots.ai" at the top. Axes are turned off for a clean appearance,
    with a subtle thin baseline connecting the nodes.
