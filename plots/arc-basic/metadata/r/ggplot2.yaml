review:
  strengths:
  - 'Perfect spec compliance and data quality: all arc diagram features implemented
    correctly with a rich literary dataset (Hamlet characters, 4 relationship types)'
  - Correct Imprint palette positions 1-4 with fully theme-adaptive chrome in both
    light and dark renders — no dark-on-dark failures
  - Excellent choice of theme_void() for arc diagrams, avoiding unnecessary axis chrome
  - Sophisticated rowwise() + list-column + unnest() tidyverse pattern for per-row
    arc coordinate computation
  - Semi-transparent arcs (alpha=0.60) handle visual overlap gracefully across 17
    edges
  - Custom node styling (shape=21 with PAGE_BG stroke) adapts correctly between light
    and dark themes
  weaknesses:
  - coord_cartesian(ylim = c(-2.0, 2.8)) extends 1.5 units below the data (which only
    reaches ~y=-0.5 at the bottom of rotated labels), leaving the bottom ~35% of the
    canvas as empty space with the legend floating in isolation — reduce lower ylim
    bound to ~-0.8 to eliminate the empty zone
  - Node label size=2.5 (mm, ~7pt equivalent) is slightly small for the 3200x1800
    canvas — increase to size=3.0 or 3.2 for better readability at mobile scale
  - Helper function arc_points() breaks the flat KISS structure (Imports -> Data ->
    Plot -> Save, no functions) — inline the ellipse computation directly into the
    rowwise mutate call
  - 'DE-01/DE-02 improvement opportunity: mapping linewidth to edge multiplicity or
    node size to degree centrality would add a weight dimension and make Hamlet''s
    hub role visually explicit, raising design sophistication'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 surface — confirmed, not pure white
      Chrome: Bold centered title "arc-basic · r · ggplot2 · anyplot.ai" in near-black (#1A1A17), clearly readable. No axis labels (theme_void). Rotated node labels in secondary ink (#4A4A44). Legend at bottom with "Relationship" bold title in primary ink and category labels in secondary ink — all readable.
      Data: 10 nodes as solid black circles on a horizontal baseline. 17 semi-elliptical arcs in 4 Imprint colors: Family=#009E73 (brand green), Friendship=#C475FD (lavender), Political=#4467A3 (blue), Romantic=#BD8233 (ochre). Arc heights scale with node distance. Alpha=0.60 creates a layered transparent effect.
      Legibility verdict: PASS — all text readable; minor note: node labels (size=2.5mm) are on the small side
      Layout note: Large empty space in bottom ~35% of canvas due to ylim lower bound of -2.0 when data only extends to ~-0.5

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 surface — confirmed, not pure black
      Chrome: Title in near-white (#F0EFE8), clearly readable against dark background. Node labels in secondary dark-theme ink (#B8B7B0), readable. Legend text in same secondary ink. No dark-on-dark failures detected.
      Data: Arc colors identical to light render — green, lavender, blue, ochre arcs at same hue/alpha. Nodes switch to white-filled circles with dark-background stroke, adapting correctly.
      Legibility verdict: PASS — all text readable in dark theme; brand green #009E73 visible against dark background
