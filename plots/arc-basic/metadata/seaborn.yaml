  image_description: The plot displays a basic arc diagram with 12 character nodes
    (Alice, Bob, Carol, Dave, Eve, Frank, Grace, Henry, Ivy, Jack, Kate, Leo) arranged
    along a horizontal baseline as dark blue (#306998) circles. Connections between
    characters are drawn as curved arcs above the baseline using the "flare" colormap
    — arcs range from light salmon/orange (weight 1) to deep purple (weight 5). Arc
    thickness also scales with weight. Arc height is proportional to the distance
    between connected nodes, making the Alice–Leo long-range arc the tallest and most
    prominent. A colorbar on the right edge displays "Interaction Strength" from 1
    to 5. The title "arc-basic · seaborn · pyplots.ai" appears at the top. All spines
    are removed, axes are hidden, and a subtle semi-transparent horizontal baseline
    anchors the nodes. Node labels appear below the baseline in Python Blue with medium
    font weight.
