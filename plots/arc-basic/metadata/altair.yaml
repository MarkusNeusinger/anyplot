    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along
    a horizontal baseline at the bottom. Curved semicircular arcs connect nodes above
    the baseline, with arc height proportional to the distance between connected nodes
    — the tallest arc spans from Alice to Jack across the entire width. Arcs are rendered
    in steel blue (#306998) with varying thickness and opacity based on interaction
    strength: thicker, more opaque arcs indicate stronger connections (weight 3),
    while thinner, more transparent arcs indicate weaker ones (weight 1). Nodes are
    yellow circles (#FFD43B) with blue borders, sized proportionally to total connection
    weight — Alice and David appear largest as the most connected characters. Bold
    blue labels appear below each node. The title "Character Interactions · arc-basic
