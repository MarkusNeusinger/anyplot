    adding a baseline axis line under nodes and more distinct node stroke contrast'
  - 'LM-01: Creating a separate ColumnDataSource per arc is slightly non-idiomatic
    — a single concatenated CDSwith nan-separated paths would be more efficient for
    larger graphs'
