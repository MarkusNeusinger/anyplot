review:
  strengths:
  - Correct arc diagram implementation using pygal.XY with semi-circle approximation
    — arcs curve above baseline with height proportional to node distance
  - Three-tier weight encoding via both color (Imprint palette positions 1–3) and
    stroke width (5/14/26) clearly differentiates rare/moderate/frequent connections
  - Amber (#DDCC77) semantic anchor used for nodes is appropriate — keeps nodes outside
    the categorical color pool so arcs remain the data layer
  - 'Perfect spec compliance: all 10 nodes, all 13 edges, opacity=0.85 for semi-transparent
    overlapping arcs, node labels readable'
  - 'Full pygal theme-adaptive chrome: background, INK, INK_MUTED properly derived
    from ANYPLOT_THEME; dark render correctly flips chrome while keeping data colors
    constant'
  - Both PNG and HTML outputs saved (correct for pygal as interactive library)
  - CSS injection cleanly hides axis lines and limits legend to 3 entries — shows
    advanced pygal knowledge
  - Clean KISS code structure with np.random.seed(42) for reproducibility
  weaknesses:
  - 'Large empty space in bottom ~20–25% of canvas (below the legend): the chart plus
    legend only occupies ~60–65% of canvas height. Reduce y_range max or increase
    arc height_scale, or use square canvas (2400×2400) to better fill the space.'
  - No visual hierarchy or data storytelling — all nodes and all connections are treated
    equally. The peripheral 'review' node (only 1 connection) and the highly-connected
    hub nodes ('data', 'science', 'analysis') are not visually distinguished. Consider
    scaling node dot_size by connection degree, or using a stronger green on the most
    frequent arcs.
  - Design Excellence is limited — the implementation renders correctly but doesn't
    push visual sophistication beyond well-configured defaults. Consider adding degree-based
    node sizing, or directional thickness variations that create a focal point.
  - Node label spacing is tight for the middle cluster (study / analysis / result
    / method) — these four labels crowd the central region at the default x-spacing.
    Consider increasing node spacing or rotating labels 30–45° to reduce crowding.
  - 'LM-02 (Distinctive Features): the implementation uses pygal.XY with manual arc
    points but doesn''t leverage pygal''s interactive tooltip system (point labels
    are set but not visible in PNG). The HTML render could expose the per-edge tooltip
    — this is the library''s main differentiator and it''s partially present but not
    highlighted in the design.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white approximately #FAF8F1 — correct theme surface.
      Chrome: Title "Word Co-occurrences · arc-basic · python · pygal · anyplot.ai" in dark ink, clearly readable at top (~65-70% of canvas width). Node labels (science, data, research, study, analysis, result, method, evidence, theory, review) in dark text below the baseline — readable but the central cluster (study/analysis/result/method) is tightly spaced. Legend text (Frequent co-occurrence, Moderate co-occurrence, Rare co-occurrence) is clearly readable.
      Data: Ten amber/gold (#DDCC77) nodes with dark (#1A1A17) outline rings arranged along a horizontal baseline. Arcs above: green (#009E73) for Frequent arcs — 3 arcs with thick stroke (26px); lavender (#C475FD) for Moderate — 7 arcs with medium stroke (14px); blue (#4467A3) for Rare — 3 thin arcs (5px). Arc heights scale with node distance — the long-range science↔review arc rises highest. Significant empty space in the lower ~25% of the canvas below the legend.
      Legibility verdict: PASS — all text readable, no light-on-light failures. Empty lower canvas is a layout concern, not a legibility one.

    Dark render (plot-dark.png):
      Background: Warm near-black approximately #1A1A17 — correct theme surface.
      Chrome: Title and all labels rendered in light cream text — clearly readable against the dark background. Legend text is light-colored. No dark-on-dark failures observed.
      Data: Data colors are identical to the light render — amber nodes, green/lavender/blue arcs. The amber nodes read slightly less distinctly against the dark background compared to light, but remain visible with the INK outline ring.
      Legibility verdict: PASS — all text readable in both themes, chrome correctly adapts.
