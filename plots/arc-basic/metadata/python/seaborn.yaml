      Data: 12 blue (#4467A3) node circles along the horizontal baseline, with degree-based sizing (larger for high-degree nodes). 18 arcs drawn above the baseline via sns.lineplot with units=edge_id; arc color runs from teal-green (#009E73 region) at weight=1 through mid-blue to deep blue (#4467A3 region) at weight=5. Alpha=0.75 provides semi-transparency on overlapping arcs. Arc height scales with node distance. Two annotation arrows point to the long-range weak arc (Alice–Leo) and the dense short-range intense-weight region.
