review:
  strengths:
  - Correct arc diagram layout with nodes on a horizontal baseline and arcs curving
    above — arc height proportional to node distance as specified
  - 'Imprint palette used correctly: sequential gradient from #009E73 (brand green)
    to #4467A3 (blue) for arc weight encoding — matches imprint_seq pattern'
  - 'Theme-adaptive chrome fully implemented: INK, INK_SOFT, INK_MUTED, PAGE_BG, ELEVATED_BG
    all switch correctly between light and dark'
  - Degree-proportional node sizing adds meaningful visual encoding beyond the spec
    minimum
  - Weight-based alpha (0.72–0.92) and thickness (1.45–2.35) create clear visual hierarchy
    among connections
  - Callout annotation highlights the longest-range arc (Alice–Jack) providing data
    storytelling
  - Clean theme_void with no unnecessary elements — spines, grid, and axes all removed
    appropriately for this plot type
  - 'Title format correct: ''Character Interactions · arc-basic · python · plotnine
    · anyplot.ai'' with descriptive prefix'
  - Deterministic data — no random seed needed since edge list is hardcoded
  - geom_path with group aesthetic plus scale_size_identity/scale_alpha_identity is
    idiomatic plotnine for multi-path arc rendering
  weaknesses:
  - Callout annotation (geom_text size=3.5 mm ≈ 10pt) renders at ~7px at 400px mobile
    width — below the readability floor; increase to size=4.5–5 mm
  - Legend text (element_text size=7pt) renders at ~5px at mobile width — increase
    to size=8pt to match the style-guide minimum
  - Subtitle (element_text size=8pt) renders at ~6px at mobile width — marginal; could
    be bumped to 9pt for safety
  - Design excellence is functional rather than distinctive — upper canvas area above
    the large Alice–Jack arc is empty; consider a subtle secondary annotation or tightening
    ylim to reduce wasted whitespace
  - 'LM-02: the implementation does not fully exploit plotnine-specific features beyond
    geom_path/group and identity scales — could showcase annotate_lolli, stat_*, or
    other plotnine-distinctive geoms if applicable'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface
