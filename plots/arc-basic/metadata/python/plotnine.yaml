review:
  strengths:
  - 'Perfect spec compliance: arc diagram correctly implements all required features
    — arcs above horizontal axis, height proportional to node distance, semi-transparent
    overlapping arcs, and weight-encoded thickness'
  - 'Imprint sequential gradient (#009E73 → #4467A3) correctly applied via scale_color_gradient
    for continuous weight encoding; both endpoints match the canonical imprint_seq
    colormap'
  - 'Clean theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders correctly
    flip all chrome tokens (INK, INK_SOFT, INK_MUTED, ELEVATED_BG) while keeping data
    colors identical'
  - Stays within plotnine's grammar-of-graphics without any matplotlib workarounds,
    using geom_path for arcs, geom_point for nodes, geom_text for labels, all layered
    correctly
  - Dual encoding of edge weight (color gradient + line thickness via scale_size_identity)
    makes the weight dimension redundantly legible, improving accessibility
  - Deterministic data (hardcoded character names and edges) — no random seed required;
    fully reproducible
  weaknesses:
  - geom_text(size=10) for node labels is well above the library guide's recommended
    ~2.5–4 mm range; while the visual result is acceptable, the labels render at ~28pt
    equivalent which is disproportionately large relative to the title (12pt) — reduce
    to size=5–6 for better typographic balance
  - 'Design is functional but not exceptional: node markers are plain open circles
    with no size variation to encode degree/centrality (Alice has 4 connections and
    looks identical to Eve with 1); consider sizing nodes proportional to their connection
    count for richer storytelling'
  - 'DE-03 weak: the subtitle describes what to look for but the plot itself doesn''t
    visually highlight the most important connection (Alice–Jack longest-range arc);
    a subtle callout annotation or distinct color treatment for the longest arc would
    create a clear focal point'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct Imprint light surface, clearly visible
      Chrome: Bold centered title "Character Interactions · arc-basic · python · plotnine · anyplot.ai" in dark ink (#1A1A17), readable. Subtitle in INK_SOFT, readable. No axis labels (theme_void). Node labels ("Alice" through "Jack") in bold dark ink below the baseline — clearly readable.
      Data: 15 arcs curve above a horizontal baseline connecting 10 named nodes. Arc color encodes weight via green (#009E73, weak) to blue (#4467A3, strong) gradient. Arc thickness also scales with weight (subtle but visible). Alice-Bob and Carol-David arcs are visually prominent blue (weight=3). Long-range arcs (Alice-Jack, Alice-Henry) arch high across the full diagram width. Node circles are open (white fill matching PAGE_BG, dark stroke). Right-side legend "Interaction Strength" shows colorbar with Strong/Medium/Weak labels.
      Legibility verdict: PASS — all text readable against light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct Imprint dark surface.
      Chrome: Title and subtitle switch to light text (#F0EFE8 / #B8B7B0 equivalent), clearly visible against dark background. Node labels appear in light/white text — readable. Legend text switches to light colors. No dark-on-dark issues detected.
      Data: Arc colors are identical to the light render — same green-to-blue gradient, same arc positions and weights. Node circles show with white stroke clearly visible against the dark background. Legend colorbar preserves the same color gradient.
