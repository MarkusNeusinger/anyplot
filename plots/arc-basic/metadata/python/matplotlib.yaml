review:
  strengths:
  - Excellent matplotlib-idiomatic arc rendering using mpath.Path with CURVE4 control
    points and mpatches.PathPatch — the canonical matplotlib pattern for custom cubic
    Bézier curves
  - 'Perfect palette compliance: imprint_seq colormap for continuous edge weights,
    brand green #009E73 for Alice (protagonist), theme-adaptive chrome throughout
    both renders'
  - 'Strong data storytelling: Alice highlighted with brand green and heavy font weight,
    node size proportional to weighted degree, arc height encoding connection distance
    — visual hierarchy is clear'
  - Full spec compliance — arc height proportional to distance, weight-coded arc thickness
    and color, readable node labels, semi-transparent arcs (alpha=0.8) for overlapping
    connections
  - Fully deterministic data (no random seed needed), clean KISS code structure with
    correct use of Axes methods (not pyplot)
  weaknesses:
  - 'DE-01 (6/8): Design is strong but not yet FiveThirtyEight-level — non-protagonist
    nodes are all in INK_MUTED gray with no categorical color variation, limiting
    visual richness; adding even subtle Imprint palette color hints to key characters
    (e.g., using palette positions 2–4 for Bob/Carol/David) would elevate the design'
  - 'DE-02 (4/6): Beyond ax.axis(''off''), minimal visual refinement — no explicit
    grid, spine, or whitespace fine-tuning; adding a light horizontal rule or more
    intentional vertical spacing for the label area would complete the polished look'
  - 'LM-01 (4/5): Minor idiomatic issue — plt.setp(cbar.ax.yaxis.get_ticklabels(),
    color=INK_SOFT) is redundant with cbar.ax.tick_params(labelsize=8, colors=INK_SOFT)
    already set on the same element'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, no pure white.
      Chrome: Title "arc-basic · python · matplotlib · anyplot.ai" at 12pt is clearly readable in dark ink. Italic subtitle "Node size reflects connection activity · Alice (green) is the central character" at 8pt is readable in INK_MUTED. Colorbar label "Connection Strength" and tick labels (1/2/3) are clearly visible. All text dark on light background.
      Data: 10 nodes aligned along a horizontal baseline. Alice's node is brand green (#009E73), all other nodes are in muted gray (INK_MUTED #6B6A63). Nodes are sized proportionally to weighted degree — Alice is noticeably larger. 15 arcs curve above the baseline using cubic Bézier curves colored with imprint_seq (green→blue) based on connection strength (1=teal/green, 2=teal, 3=blue). Long-range arcs (Alice–Henry, Alice–Jack) rise to full canvas height. Semi-transparent arcs (alpha=0.8) handle overlap gracefully.
      Legibility verdict: PASS — all title, subtitle, node labels, colorbar text fully readable.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct theme surface, not pure black.
