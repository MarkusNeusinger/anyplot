      Data: Arc colors are identical to the light render — imprint_seq green→blue colormap is unchanged across themes. Alice's brand green node (#009E73) is identically rendered. Non-protagonist nodes appear in a slightly lighter gray tone against the dark background (INK_MUTED adapts to #A8A79F). Colorbar outline correctly adapts to INK_SOFT.
      Legibility verdict: PASS — all text clearly readable in light color on dark background. No dark-on-dark failures.
