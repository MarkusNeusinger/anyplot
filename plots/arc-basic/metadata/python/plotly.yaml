review:
  strengths:
  - Custom arc construction from scratch using parametric parabolas — genuinely creative
    use of go.Scatter for a chart type not natively in Plotly
  - Interactive filter buttons (updatemenus) cleanly toggle between all/strong/medium/weak
    arcs — a distinctively Plotly feature
  - 'Multiple redundant encodings: arc height (distance), color (strength), line width
    (strength), alpha (density management) — well-thought-out visual design'
  - 'Perfect spec compliance: all required features (nodes, edges, weights, height
    proportional to distance, semi-transparency, readable labels, color coding) are
    implemented'
  - Theme adaptation is thorough — backgrounds, text tokens, legend, annotation, and
    button colors all flip correctly between light and dark
  weaknesses:
  - 'Palette order violation: arc colors use Imprint positions 1, 6, 3 (green, cyan,
    blue) instead of canonical 1, 2, 3 (green, lavender, blue). Fix: change arc_styles[2]
    color from rgba(42, 188, 205, 0.82) (#2ABCCD, cyan) to rgba(196, 117, 253, 0.82)
    (#C475FD, Imprint position 2 lavender) to restore canonical ordering.'
  - The All button active state in dark mode renders with Plotly default bright-white
    highlight, which is visually jarring against dark chrome — manage button active
    state appearance for dark theme.
  - Design sophistication falls just below the 90-point threshold — slightly more
    polished typographic hierarchy (bold title, lighter subtitle) would push past
    it.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct theme surface, not pure white
      Chrome: Title "Character Interactions · arc-basic · python · plotly · anyplot.ai" centered at top in dark INK (#1A1A17), clearly readable. Muted subtitle in INK_MUTED below. Node labels (Alice through Jack) in dark INK at bottom of baseline. Legend text in INK_SOFT. Annotation "longest range" in INK_MUTED. Filter button labels in INK.
      Data: Arcs in three Imprint palette colors — green #009E73 (weak, weight 1), cyan #2ABCCD (medium, weight 2), blue #4467A3 (strong, weight 3) — with semi-transparency (0.65/0.82/0.95 alpha) and increasing line widths (3.5/4.5/6.0). Node circles with ELEVATED_BG fill and INK border. Horizontal baseline in INK_SOFT.
      Legibility verdict: PASS — all text elements clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct theme surface, not pure black
      Chrome: Title and subtitle appear in light-colored text (#F0EFE8 / INK for dark theme), clearly readable against dark surface. Node labels appear in light INK. Legend box uses ELEVATED_BG (#242420) with light-colored text. Annotation "longest range" is visible. Filter button text is readable. The active "All" button shows a brighter/lighter background (Plotly default active state) which is slightly jarring but does not obscure any text or cause dark-on-dark failure.
      Data: Arc colors are identical to light render — same green, cyan, and blue hues with same opacity and width values. Node circles visible with light-colored text labels. First series (weak/green) is still #009E73 — reads well on dark surface.
      Legibility verdict: PASS — all text elements readable against warm near-black background; no dark-on-dark failures detected; brand green #009E73 clearly visible
