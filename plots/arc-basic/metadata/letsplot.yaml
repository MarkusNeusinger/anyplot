    palette: dark navy (#1A3A5C) for strong (weight 3) connections, medium blue (#306998)
    for moderate (weight 2), and light steel blue (#6A9BB5) for weak (weight 1). Arc
    thickness also increases with weight. Nodes are yellow-filled circles (#FFD43B)
    with dark blue outlines, sized proportionally to total connection weight — Alice,
