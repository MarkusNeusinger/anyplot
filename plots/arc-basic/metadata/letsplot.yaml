  image_description: 'The plot displays a basic arc diagram with 10 character nodes
    (Alice, Bob, Carol, David, Eve, Frank, Grace, Henry, Iris, Jack) arranged along
    a horizontal baseline on a clean white background. Arcs curve above the baseline
    connecting pairs of nodes, with arc height proportional to the distance between
    connected nodes — the Alice-Jack arc spans the full width and is the tallest.
    Arcs use a monochromatic blue color scheme with three levels: Strong connections
    (weight 3) are thick dark navy (#1A3A5C), Moderate (weight 2) are medium blue
    (#306998), and Weak (weight 1) are thin light blue (#7FAABB) with varying transparency.
    Nodes are rendered as yellow-filled circles (#FFD43B) with dark blue outlines,
    sized proportionally to total connection weight — Alice and David appear as the
    largest hubs. Bold dark navy labels sit below each node. A manual legend in the
    upper right shows the three weight categories with matching line samples. The
    title "arc-basic · letsplot · pyplots.ai" appears in bold dark text at the top
    left.'
