review:
  strengths:
  - Dual weight encoding (opacity + linewidth both scale with edge weight — two visual
    channels for the same variable)
  - Clean minimal aesthetic with all spines removed, no grid, and no clutter — perfectly
    suited for arc diagrams
  - Correct arc diagram implementation using parametric semicircles — arcs above baseline
    with height proportional to node distance
  - 'Full theme adaptation with warm backgrounds (#FAF8F1 light / #1A1A17 dark) and
    adaptive chrome in both renders'
  - Realistic research collaboration network data with clear within-group and cross-group
    connection patterns
  - 'Perfect spec compliance: node labels, semi-transparent arcs, weight-encoded arcs,
    horizontal baseline all present'
  - Clean KISS code structure with reproducibility seed
  weaknesses:
  - No color distinction between within-group arcs (Alice-Bob, Eve-Frank, etc.) and
    cross-group arcs (Bob-Eve, Hank-Iris, etc.) — spec explicitly says "Consider color
    coding edges by type"; adding a second Imprint palette color for cross-group edges
    would substantially improve storytelling and DE-01
  - No legend or annotation explaining the weight encoding — viewers must infer that
    linewidth and opacity represent co-authorship paper count; a small legend element
    or axis annotation would improve interpretability
  - Node label fontsize=11 may render too small on mobile (~400px viewport); consider
    increasing to 13pt
  - Unused Random.seed!(42) — no actual random data generation in the code (all data
    is hardcoded); either remove the seed or use random data to justify it
  - LM-02 could be stronger — the implementation uses Makie primitives correctly but
    does not exploit any Makie-distinctive features beyond the color tuple syntax
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white. ✓
      Chrome: Title "arc-basic · julia · makie · anyplot.ai" in dark near-black text, centered at top — clearly readable. No axis labels or tick labels (hidden, appropriate for arc diagram). Node labels (Alice through Leo) in INK_SOFT dark gray below the baseline — all 12 names clearly readable at full resolution.
      Data: 17 arc curves in brand green #009E73 with varying opacity (0.3–0.8) and linewidth (1.0–3.5) scaled by edge weight. Node dots in #009E73 at markersize=16 with PAGE_BG stroke rings for definition. Horizontal baseline in INK_SOFT. Short arcs (adjacent nodes) cluster near the baseline; long-range arcs (Alice-Leo spanning 11 positions) soar to the upper portion of the canvas.
      Legibility verdict: PASS — all text readable, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black. ✓
      Chrome: Title in light cream text, clearly readable against dark background. Node labels in INK_SOFT (#B8B7B0 light gray) — all readable, no dark-on-dark issues. Baseline in lighter gray. ✓
      Data: Arc curves and node dots remain in #009E73 brand green — identical to light render; only chrome flips. ✓ Arcs appear slightly more vivid against the dark background, which increases visual pop.
      Legibility verdict: PASS — no dark-on-dark failures detected. All text visible against dark surface.
