  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) with appropriate contrast against dark text
      Chrome: Title "bar-stacked-percent · bokeh · anyplot.ai" rendered at 28pt in dark ink (#1A1A17), clearly readable. Axis labels "Quarter" (x) and "Market Share (%)" (y) at 22pt in dark ink, fully visible. Tick labels at 18pt in INK_SOFT (#4A4A44), distinct from background. Legend in top-right shows four categories (Apple, Samsung, Xiaomi, Others) with soft gray background (#FFFDF6) and border — excellent readability.
      Data: Five 100% stacked bars (Q1 2024–Q1 2025) with four color segments: Apple in #009E73 (brand green) at bottom, Samsung in #D55E00 (orange) above, Xiaomi in #0072B2 (blue) third, Others in #CC79A7 (reddish purple) at top. Percentage labels inside segments for values ≥10% (white text on green Apple segments, dark text on lighter segments). Y-axis grid (INK_SOFT, 10% alpha) subtle and non-intrusive. White bar edges (line_color=PAGE_BG, line_width=2) create visual separation between stacked components.
      Legibility verdict: PASS — all text is crisp and readable; no "light on light" failures; data colors are vibrant and distinct; grid is subtle without competing with data.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) with strong contrast against light text
      Chrome: Title rendered at 28pt in light ink (#F0EFE8), fully readable against dark background. Axis labels at 22pt in light ink, clearly visible. Tick labels at 18pt in INK_SOFT (#B8B7B0), excellent contrast. Legend background flipped to #242420 (elevated dark surface), border and text colors adjusted to light theme — all readable.
      Data: **Colors are IDENTICAL to light render** — Apple #009E73, Samsung #D55E00, Xiaomi #0072B2, Others #CC79A7 (only chrome flipped, not data). Percentage labels present with same conditional logic. Bar edges now use dark theme colors (darker line_color) and remain visible. Y-axis grid now light-colored (INK_SOFT inverted) at 10% alpha — subtle and appropriate for dark surface.
      Legibility verdict: PASS — no "dark on dark" failures; tick labels are light enough against near-black background; brand green #009E73 remains vibrant and readable on dark surface; data colors maintain their identity; no text contrast issues.

    Both renders pass legibility checks. Data color palette is consistent (Okabe-Ito positions 1–4 identical), only chrome adapts to theme. Perfect theme-adaptive implementation.
