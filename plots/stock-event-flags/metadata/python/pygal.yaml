review:
  strengths:
  - 'Correct Imprint palette assignment: price line uses brand green (#009E73), event
    types use positions 2-5 in canonical order with semantic red for split — no custom
    hexes.'
  - Variable connector line widths (earnings=3, split=4, news/dividend=2) create visual
    emphasis on high-significance events — a design detail beyond spec requirements.
  - 'Correct theme-adaptive chrome: background, foreground, foreground_subtle all
    derived from ANYPLOT_THEME env var for both light (#FAF8F1) and dark (#1A1A17)
    renders.'
  - Event markers use large dots_size=18 which makes flags visually prominent and
    easy to spot against the price line.
  - Connector dashed lines (dasharray='6,4') per event with color matching the event
    type creates clear visual linkage between flag and price level.
  - HTML output correctly included alongside PNG — leverages pygal's interactive JavaScript
    capabilities.
  - Compact, flat script with no unnecessary functions or classes — clean KISS structure.
  - 'Reproducible: np.random.seed(999) set; realistic financial data with plausible
    price range, event labels, and dates.'
  weaknesses:
  - Event value labels rendered at value_font_size=36 are noticeably smaller than
    legend (44) and tick labels (44) — borderline at mobile scale. Increase to 40-44
    to match hierarchy.
  - Flag heights are fixed per event type (earnings always at 0.12, dividend at 0.20,
    news at 0.28, split at 0.36 above max price) rather than using alternating or
    smart placement per-occurrence. The spec explicitly requests 'alternating heights
    or smart placement' — when two earnings events are near in time, their flags stack
    at the same Y level.
  - x_labels in a pygal XY chart (9 evenly-spaced month labels over 200 trading-day
    numeric indices) creates approximate rather than precise month alignment. The
    month label at index 22 (approx Aug) may not correspond exactly to the first Aug
    trading day. Consider using exact index positions computed from the DataFrame
    for more accurate tick placement.
  - Spines are fully visible — pygal doesn't expose a spine-removal API, but setting
    foreground_subtle closer to PAGE_BG or using chart border styling could reduce
    visual weight of the chart frame.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white.
      Chrome: Title "Tech Stock 2023 · stock-event-flags · python · pygal · anyplot.ai" is dark ink on off-white, clearly readable. Axis labels "Date" and "Stock Price ($)" are dark and legible. Monthly tick labels (Jul '23 through Mar '24) are dark and readable. Legend at the bottom (Price, Earnings, Dividend, News, Split) is clearly readable in dark ink.
      Data: Price line in brand green (#009E73) traces ~200 trading days from ~$240 up to ~$340-400 range. Nine event markers (large dots, dots_size=18) are positioned above the price range with dashed vertical connector lines. Earnings in lavender (#C475FD), Dividend in blue (#4467A3), News in ochre (#BD8233), Split in red (#AE3030). Event labels (e.g. "Q2 Beat", "$0.22", "Partnership", "FDA Approval") appear as small value labels (value_font_size=36) near each marker — readable at full resolution but borderline small.
      Legibility verdict: PASS — all primary text is readable. Value labels on event markers are small (36px) but present.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title, axis labels ("Date", "Stock Price ($)"), tick labels, and legend text all render in light cream (#F0EFE8 / foreground_strong=INK), clearly readable against the dark background. No dark-on-dark issues observed. Connector lines are slightly less visible on the dark background (light muted tone) but still distinguishable.
      Data: Data colors are identical to the light render — brand green price line, lavender/blue/ochre/red event markers. The connector dashed lines are in matching event type colors and visible against the dark background. No color identity shift between themes.
      Legibility verdict: PASS — all chrome text is readable. Event value labels are similarly small (36px) as in light render.
