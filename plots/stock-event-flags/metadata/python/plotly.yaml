      Data: Data colors identical to light render — green/red candlesticks, event marker colors unchanged. Only chrome flips as expected. Same Q4 Beat label hidden behind legend.
      Legibility verdict: PASS (with note: same Q4 Beat legend-overlap issue as light render)
