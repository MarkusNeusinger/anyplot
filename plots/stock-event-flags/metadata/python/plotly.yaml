review:
  strengths:
  - Correct candlestick OHLC with semantic green/red finance convention — exactly
    the right chart type for this spec
  - Alternating flag heights effectively prevent visual clustering of nearby events
  - Redundant encoding (color + distinct symbol shape per event type) makes the chart
    accessible beyond color alone
  - 'Idiomatic Plotly: go.Candlestick, unified hover, separate legend traces, rangeslider
    disabled, HTML export'
  - All theme tokens correctly applied — chrome flips cleanly between light and dark
  weaknesses:
  - Legend placement (top-left, y=0.99) collides with the Q4 Beat event flag (Jan
    25 2024) — the event marker's text label 'Q4 Beat' is fully hidden behind the
    legend box in both renders. Move legend to top-right (xanchor='right', x=0.99)
    or bottom-right to avoid this collision.
  - 'Palette order non-canonical: event_colors assigns Dividend->palette[2] and Split->palette[1],
    skipping canonical slot order. Should be Earnings->[0], Dividend->[1], News->[2],
    Split->[3].'
  - Four axis spines still visible (top + right retained). Remove top and right spines
    via xaxis.showline + yaxis.showline adjustments for cleaner L-shaped frame.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct
      Chrome: Title "stock-event-flags · python · plotly · anyplot.ai" dark text, clearly readable. Axis labels "Date" and "Price ($)" dark text, readable. Tick labels in INK_SOFT, readable.
      Data: Candlestick OHLC with green (#009E73) bullish and red (#AE3030) bearish candles. Seven event flags with symbols (star=Earnings green, diamond=Dividend blue, triangle=News ochre, square=Split purple). Dashed connector lines match flag colors. Six of seven event labels visible: "Div $0.50", "Product Launch", "Q1 Miss", "4:1 Split", "Div $0.55", "Q2 Beat". "Q4 Beat" label (Jan 2024) hidden behind legend box.
      Legibility verdict: PASS (with note: Q4 Beat event label obscured by legend box in top-left)

    Dark render (plot-dark.png):
