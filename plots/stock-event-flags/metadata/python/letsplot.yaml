review:
  strengths:
  - Semantic color assignment for event types using Imprint palette with financial
    semantics (Dividend→green, Earnings→blue, News→ochre, Split→red)
  - Redundant encoding with distinct shapes AND colors for each event type — improves
    CVD accessibility
  - Three-tier staggered flag heights effectively reduce crowding across the 9 events
  - Q2 shaded band directly connects the earnings miss event to the price decline
    period — good storytelling
  - Interactive tooltips via layer_tooltips for both price line and event markers
  - Correct canvas size (800×450 with scale=4 = 3200×1800) and dual output (PNG +
    HTML)
  - Fully theme-adaptive chrome with correct warm backgrounds and adaptive text/grid
    colors
  weaknesses:
  - Event label text (geom_text size=4mm) is quite small — the flag labels like Q4
    Beat, Div $0.25, Analyst Upgrade etc. are hard to read at mobile scale (400px
    width). Increase to size=5 or 6mm.
  - The 2:1 Split flag marker in the top-right corner is visually crowded — the label
    overlaps the plot boundary near the legend. Consider placing it lower or using
    a smaller offset for the text label.
  - Minor crowding between Q4 Beat and Div $0.25 labels in January-February area —
    the leftmost two events share similar x-positions and the stagger does not fully
    resolve the crowding.
  - 'Design excellence could be elevated: the price line uses INK_SOFT (neutral gray)
    which is correct but the chart lacks any additional emphasis on the key Q2 Miss
    narrative beyond the background band — consider a bolder visual treatment for
    the miss event.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — not pure white, correct anyplot surface.
      Chrome: Title "stock-event-flags · python · letsplot · anyplot.ai" in dark ink at top-left, fully readable. Axis title "Stock Price ($)" on Y-axis and "Date" on X-axis both clearly visible in dark ink. Tick labels in dark gray (INK_SOFT) along both axes readable. Grid lines very subtle light gray, not competing with data.
      Data: Price line in neutral dark gray with subtle area fill under it. Event flag markers: Dividend events as teal/green circles (#009E73 BRAND), Earnings as blue diamonds (#4467A3), News as ochre triangles (#BD8233), Split as red square (#AE3030). Dashed gray connector lines from each flag to the price level at that date. Q2 shaded band (pink-red tint, very low alpha) covers Jun-Aug 2024 period. Small text labels ("Q4 Beat", "Div $0.25", "Product Launch", etc.) appear above each flag marker. Legend on right side shows "Event Type" with all four categories.
      Legibility verdict: PASS — all text readable, though flag label text (size=4mm) is on the smaller side. Minor crowding near Jan-Feb area and top-right "2:1 Split" marker near legend boundary.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — not pure black, correct anyplot dark surface.
      Chrome: Title and axis labels now in light text (#F0EFE8 / #B8B7B0) against dark background — fully readable, no dark-on-dark failures. Grid lines subtly visible as lighter-than-background lines. Legend box uses elevated dark (#242420) with light legend text.
      Data: Price line now renders in light gray (#B8B7B0) on dark background — clearly visible. Event marker colors are IDENTICAL to light render: green circles (Dividend), blue diamonds (Earnings), ochre triangles (News), red square (Split) — only chrome flipped, data colors unchanged. Q2 shaded band shows as a darker red-tinted region against the near-black background, still distinguishable. Brand green #009E73 clearly visible on dark surface (Dividend markers).
      Legibility verdict: PASS — all text readable, no dark-on-dark failures identified.
