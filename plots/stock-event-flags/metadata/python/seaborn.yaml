  - 'DE-01 (5/8): Design is above default (custom palette, shape encoding, styled
    boxes) but does not reach publication-ready polish. The area fill alpha=0.07 is
    so subtle it contributes very little visually; increasing it to ~0.12 or adding
    a colour-coded vertical band for each event window would push toward FiveThirtyEight-level
    design.'
  - Annotation fontsize=7 produces ~5 px text at 400px mobile width — borderline unreadable
    at small viewport sizes. Raise to fontsize=8 (bold) to keep mobile legibility
    without impacting the desktop layout.
