review:
  strengths:
  - Native Highstock flags series with multiple shapes (squarepin, circlepin, flag)
    — a library-exclusive feature unavailable in other charting libraries
  - 'Semantic finance color exception correctly applied: bullish candles = #009E73,
    bearish = #AE3030 — respects domain convention while staying within the anyplot
    palette'
  - Complete theme adaptation across all chrome tokens (PAGE_BG, INK, INK_SOFT, GRID,
    ELEVATED_BG) — both renders are clean and correct
  - Starting price reference line creates a useful narrative anchor for the stock
    trajectory
  - Vertical event plotLines at precise dates satisfy the spec's precise date-alignment
    requirement
  - onSeries + allowOverlapX:false properly anchors flags to the price series and
    prevents collision
  weaknesses:
  - 'X-axis gridLines enabled (gridLineWidth:1) — style guide recommends Y-axis-only
    grid for stock/line charts; the horizontal grid bands compete visually with the
    7 vertical event plotLines; fix: set xAxis.gridLineWidth:0'
  - Subtitle font size (38px) is below the tick label baseline (44px) — creates an
    inverted hierarchy where secondary text is smaller than tertiary tick text; raise
    to at least 44px to restore correct hierarchy
  - Grid opacity 0.22 is at the upper end of the 0.15–0.25 acceptable range; reducing
    to 0.15 would produce a cleaner appearance consistent with the style guide reference
    value
