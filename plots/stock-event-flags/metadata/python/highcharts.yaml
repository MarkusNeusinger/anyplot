      Data: Candlestick chart spanning Jan–Jun 2024. Bullish candles = #009E73 (brand green), bearish = #AE3030 (matte red) — semantic finance exception correctly applied. 7 event flags above the price: Q4 / Q1 in lavender squarepins (#C475FD); D dividends in blue flags (#4467A3); N news in ochre flags (#BD8233); S split in cyan circlepin (#2ABCCD). Vertical dashed plotLines at each event date in INK_SOFT. Starting price horizontal reference line (dashed, INK_SOFT).
