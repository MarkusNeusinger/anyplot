review:
  strengths:
  - 'Full spec compliance: percentage labels, distinct anyplot palette colors, legend,
    exploded largest slice — all four required features present'
  - Center medallion using matplotlib.patches.Circle demonstrates library-native primitive
    drawing capability and adds meaningful data context (year + topic)
  - 'Correct square 2400×2400 canvas for pie chart; palette positions 1–5 in canonical
    order; backgrounds #FAF8F1 / #1A1A17 both correct'
  - 'Theme adaptation is thorough: textprops color=INK, legend frame facecolor=ELEVATED_BG/edgecolor=INK_SOFT,
    center text color=INK/INK_MUTED — dark render passes legibility check'
  - Clean, linear code with no functions/classes; only used imports; deterministic
    hardcoded data
  weaknesses:
  - Center medallion 'Global Cloud' text is fontsize=7pt (≈39 source px); at mobile
    400px display width this becomes ~6–7 px — borderline unreadable for supplementary
    context text. Raise to fontsize=8 or 9.
  - 'Design Excellence is restrained: beyond the center medallion the composition
    is standard. No visual hierarchy emphasis beyond the exploded slice. Consider
    adding a subtle radial gradient or outer glow to the exploded AWS slice to reinforce
    the focal point.'
  - Legend is positioned at bbox_to_anchor=(0.5, -0.08) which places it just below
    the axes; with tight_layout() there is limited bottom breathing room. Increasing
    bottom margin slightly (e.g. plt.subplots_adjust(bottom=0.12)) would add whitespace
    between pie and legend.
  - 'Minor spatial pressure around the Alibaba Cloud slice (4%): the small wedge,
    its 4.0% percentage label, and the ''Alibaba Cloud'' external label are close
    together. No overlap in renders, but labeldistance=1.15 causes the label to sit
    close to the ''Google Cloud'' label. Consider pctdistance=0.80 for very small
    slices.'
