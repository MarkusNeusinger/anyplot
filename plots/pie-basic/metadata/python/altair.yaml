review:
  strengths:
  - 'Excellent Imprint palette compliance: 6 categories in canonical order, correct
    theme-adaptive chrome in both renders'
  - 'Clever Altair-specific technique: radiusOffset + transform_filter split to implement
    exploded slice without manual coordinate math'
  - 'Thoughtful small-slice handling: separate text layer with larger radius and smaller
    font for 3%/4% slices prevents crowding'
  - 'Perfect spec compliance: all 4 required features (percentages, distinct colors,
    legend, exploded slice) fully implemented'
  - 'Factually grounded data: cloud market shares align with real 2023 figures; neutral
    business context'
  weaknesses:
  - 'Percentage label colors are driven by the inherited Color encoding rather than
    the intended INK/INK_SOFT mark property. Fix: add .encode(color=alt.value(INK))
    to override the encoding so labels remain readable in both themes regardless of
    slice hue.'
  - Blue (#4467A3) 11% label on dark background (#1A1A17) yields ~3.3:1 contrast (marginal
    for WCAG large text). The above fix would eliminate this concern by switching
    labels to theme-adaptive INK.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "pie-basic · python · altair · anyplot.ai" in dark ink, clearly readable. Subtitle "Global Cloud Infrastructure Market Share" in lighter ink. Legend "Provider" title in dark ink, labels in muted ink — all readable.
      Data: 6 slices using Imprint palette in canonical order: AWS green (#009E73), Azure lavender (#C475FD), Google Cloud blue (#4467A3), Alibaba ochre (#BD8233), Oracle red (#AE3030), Others cyan (#2ABCCD). First series (AWS) correctly uses brand green. Percentage labels colored by slice (encoding override), positioned outside pie. AWS slice exploded with radiusOffset=25.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and subtitle rendered in light (#F0EFE8) text — readable. Legend box uses elevated dark background (#242420) with light label text — correctly theme-adapted. No dark-on-dark failures for chrome elements.
      Data: Slice colors identical to light render (same green, purple, blue, ochre, red, cyan). Blue (#4467A3) "11%" label has ~3.3:1 contrast on near-black background (borderline WCAG large-text but visually legible at 2400×2400 canvas size).
      Legibility verdict: PASS — all text readable, marginal blue label contrast noted but acceptable at canvas size.
