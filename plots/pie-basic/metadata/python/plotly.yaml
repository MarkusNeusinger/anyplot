    all theme tokens applied correctly to both renders'
  - Effective data storytelling — Market Leader callout annotation in brand green,
    exploded Visa slice, subtitle providing clear context ('Global digital payment
    market share, 2024') together guide the viewer to the key insight
  - Clean, idiomatic Plotly code — customdata with hovertemplate providing rank info,
    uniformtext with mode='hide' for graceful small-slice handling, insidetextorientation='horizontal'
    for readability
  - Both renders pass theme-readability check — dark render shows light-colored title/legend/source
    text on near-black background with no dark-on-dark failures
  weaknesses:
  - Apple Pay (5% slice) has its inside label silently hidden by uniformtext minsize=10
    — the unlabeled slice looks slightly incomplete compared to all others; consider
    reducing minsize to 8 or using textposition='outside' with a leader line for the
    smallest slice so all 6 categories have visible on-chart labels
  - DE-01 design level is solid but not publication-ready — the callout and pull create
    good focal points, but the overall aesthetic is still closer to a 'configured
    default' than a polished editorial chart; adding a subtle radial gradient on the
    Visa slice or a thin divider line between the pie and legend area could push polish
    further
  - 'DQ-03 note: Apple Pay is a mobile wallet layered on top of card networks, not
    an independent payment processor at the same level as Visa/Mastercard; mixing
    card-network share (Visa 38%, Mastercard 26%) with wallet share (Apple Pay 5%)
    in the same chart mixes incompatible metrics — if retaining Apple Pay, a footnote
    clarifying the metric definition would remove ambiguity'
