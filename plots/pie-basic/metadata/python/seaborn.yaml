  - Edge color matching page background creates clean, professional slice separation
    between wedges.
  weaknesses:
  - Library Mastery is constrained — seaborn has no native pie chart primitive so
    the entire chart uses ax.pie() (matplotlib). Use sns.set_palette() explicitly
    and explore incorporating at least one seaborn-native element to differentiate
    from pure matplotlib.
  - 'DE-01 limited by generic visual footprint — consider converting to a donut chart
    (wedgeprops={''width'': 0.65}) with a center label, bold title, and subtle label
    backgrounds on small slices for better mobile readability.'
  - Noticeable whitespace gap between the bottom of the pie and the legend — tighten
    by reducing subplots_adjust bottom and adjusting bbox_to_anchor y-offset.
