  - 'Perfect spec compliance: all four required features (percentage labels, distinct
    colors, legend, explode emphasis) present and well-executed.'
  - 'Semantic color intelligence: brand green (#009E73) for market leader AWS, muted
    anchor for ''Others'' — correct palette application.'
  - Real-world data (2024 cloud market share) with plausible, factually grounded proportions.
  - Theme-adaptive chrome correctly threaded through title, autotext, and legend in
