  - 'Full spec compliance: percentage labels, distinct palette colors, legend with
    percentages, and exploded largest slice all implemented correctly.'
  - 'Excellent theme-adaptive implementation: slice label colors flip correctly for
    the muted Others slice in dark mode, preventing a light-on-light failure.'
  - Semantic use of the muted anchor for Others is idiomatic and correct; all four
    canonical palette positions used in order for named cloud providers.
  - Deterministic, realistic data (2024 cloud market share) with plausible proportions
    for the domain.
