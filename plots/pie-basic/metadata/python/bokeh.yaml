    or visual hierarchy beyond the explosion — consider de-emphasizing the Others
    slice label (smaller font or lower opacity) to reinforce the AWS focal point.'
  - 'LM-02 is limited: the Bokeh-specific LegendItem(index=i) pattern is used but
    no other distinctly Bokeh features (hover tooltips in the HTML, NumeralTickFormatter,
    CDSView filtering) are exercised.'
  - The 4% Alibaba wedge label is tight at 34pt bold inside a narrow slice — readable
    but marginally close to wedge boundaries; a slight font reduction would add breathing
    room.
