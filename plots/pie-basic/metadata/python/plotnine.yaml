review:
  strengths:
  - 'Correct anyplot palette in canonical order (green → lavender → blue → ochre →
    red → cyan) with #009E73 as first series'
  - Perfect spec compliance — percentage labels, legend, exploded largest slice (R&D),
    and distinct colors all implemented
  - Fully deterministic data with theme-adaptive chrome — both light and dark renders
    pass the theme-readability check
  - Clever use of geom_polygon + coord_equal to construct a pie chart in plotnine
    (no native pie geom), correctly computing wedge vertices and label positions
  - Realistic budget allocation dataset with plausible proportions that sum to 100%
  weaknesses:
  - Design storytelling is minimal (DE-03=2/6) — the exploded R&D slice is spec-required,
    not an additional design choice; the dominant 32% slice could be further emphasized
    (e.g. direct annotation with insight text, or stronger visual treatment beyond
    explode offset)
  - Library mastery is limited (LM-02=2/5) — the implementation demonstrates a workaround
    for plotnine's missing pie geom rather than leveraging distinctive plotnine strengths;
    idiomatic plotnine usage is correct but not sophisticated
  - Percentage label contrast is borderline on lighter slices — white (#FFFFFF) text
    on lavender (#C475FD, 22% slice) has ~2.5:1 contrast ratio which is below WCAG
    AA; consider black or very dark ink-colored text for the lavender and ochre slices,
    or use the INK token adaptively
  - Small Administration slice (4%) has no percentage label, slightly deviating from
    the spec requirement to include percentage labels on all slices — even a very
    small label placed outside the slice with a leader line would satisfy the spec
