review:
  strengths:
  - 'Perfect palette compliance: anyplot canonical order, theme-adaptive muted for
    Others rest category, correct backgrounds in both themes'
  - 'All four spec requirements met precisely: percentage labels, distinct colors,
    legend, exploded smallest slice (OPPO)'
  - 'Genuine data storytelling: subtitle + exploded slice + muted Others creates a
    clear, viewer-guided narrative'
  - Correct square canvas (2400x2400) appropriate for symmetric pie chart; all text
    explicitly sized
  - 'letsplot-distinctive features used well: layer_tooltips with formatted lines,
    layer_labels, interactive HTML export'
  weaknesses:
  - 'Percentage label text color inside slices is not explicitly set via a theme token
    — relies on lets-plot auto-contrast. For mid-luminance fills (ochre #BD8233),
    auto-contrast may produce inconsistent readability across themes. Add .color(INK)
    or .color(PAGE_BG) to layer_labels to explicitly control label contrast.'
  - 'DE-02 visual refinement limited: spacer and stroke are good, but legend frame
    could use tighter spacing to pie and a more deliberate border color using INK_SOFT
    in both themes.'
