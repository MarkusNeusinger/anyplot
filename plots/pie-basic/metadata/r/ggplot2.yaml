review:
  strengths:
  - Correct anyplot palette applied in canonical order; both themes render cleanly
    with proper chrome adaptation
  - Elegant use of theme_void() for clean pie chart presentation
  - Smart label suppression (if_else pct >= 5) prevents crowding on the tiny IT slice
    (4%)
  - Cumulative-sum ymid calculation correctly accounts for ggplot2 reversed stacking
    order
  - Fully deterministic data with realistic, neutral budget-allocation context
  - Both themes pass readability checks with no dark-on-dark or light-on-light issues
  - Clean flat script structure with perfect code quality score
  weaknesses:
  - 'Missing explode effect: spec explicitly requires slightly exploding the largest
    or smallest slice for emphasis — in ggplot2 coord_polar this is achieved by offsetting
    the target slice x aesthetic to ~1.1–1.15 for the largest slice (R&D 32%)'
  - 'Title left-biased on canvas: hjust=0.5 centers over the ggplot2 plot panel not
    the full canvas including legend — add plot.title.position = plot to theme() to
    center over the full figure width'
