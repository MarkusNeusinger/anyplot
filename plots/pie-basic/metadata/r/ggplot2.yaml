  strengths:
  - Full spec compliance — percentage labels, distinct colors, legend, and exploded
    largest slice all present and correct
  - Clever explode implementation via xmin/xmax offsets in geom_rect + coord_polar
    — non-trivial ggplot2 technique
  - Complete theme-adaptive chrome — INK, INK_SOFT, PAGE_BG, ELEVATED_BG correctly
    threaded through all elements
  - 'Correct anyplot palette in canonical slot order starting with #009E73 for R&D'
  - Correct 2400x2400 square canvas for a symmetric chart type
  - Clean linear code with named palette and factor-level ordering for deterministic
    legend
  weaknesses:
  - Minor center-hole artifact (white dot light / dark dot dark) at polar origin —
    caused by geom_rect xmin=0.5 not filling true center; visually noticeable
  - 'Slice dividers (color = PAGE_BG) vanish in dark mode — #1A1A17 border on #1A1A17
    background; adjacent slice colors provide separation but explicit dividers are
    lost — fix by using semi-transparent INK_SOFT color for borders'
  - 'Design excellence held back by defaults: no annotation callout on exploded slice,
    legend frame box is heavier than needed'
