review:
  strengths:
  - Correct anyplot palette in canonical order (Python=#009E73 first, then lavender,
    blue, ochre, red) with all colors identical across light/dark renders
  - Slice explosion implemented via Makie's translate! scene-graph API — idiomatic,
    not a matplotlib-style explode= argument
  - Dominant slice (Python 36%) emphasized with both physical explosion AND a bolder/larger
    percentage label (17pt vs 13pt for others), creating clear visual hierarchy
  - Legend includes percentage values alongside category names, providing dual data
    access without needing to read both legend and labels
  - 'Theme-adaptive chrome correctly implemented: INK/INK_SOFT tokens thread through
    title and legend labels, backgrounds flip cleanly between #FAF8F1 and #1A1A17'
  - All spines, grid, and tick marks hidden — appropriate minimal chrome for a pie
    chart
  - 'Full spec compliance: percentage labels on all slices, distinct colors, legend,
    and exploded slice'
  weaknesses:
  - Canvas utilization slightly uneven — there is noticeably more blank space below
    the pie circle than above it, suggesting the DataAspect() + limits! combination
    pushes the visible area upward relative to the canvas center
  - Title font size calculation results in size 20 (correct), but the title reads
    slightly compressed at this size relative to the canvas width — borderline but
    acceptable
  - Legend swatch colors look very small relative to legend text at the 2400x2400
    canvas; rowgap=14 is reasonable but the swatches could be slightly larger for
    mobile readability
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white
      Chrome: Bold title "Primary Programming Language · pie-basic · julia · makie · anyplot.ai" in dark near-black ink, clearly readable. No axis labels or tick labels (correctly suppressed for pie). Legend labels in dark ink on elevated-bg (#FFFDF6).
      Data: Five pie slices in anyplot canonical order — Python (#009E73 green, 36%), JavaScript (#C475FD lavender, 29.5%), Java (#4467A3 blue, 17%), C/C++ (#BD8233 ochre, 11.5%), TypeScript (#AE3030 red, 6%). Python slice is physically exploded outward. White percentage labels inside each slice; dominant slice label is bold and 17pt. Legend on the right shows category name + percentage.
      Legibility verdict: PASS — all text elements clearly readable against the light background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black
      Chrome: Title rendered in light cream (#F0EFE8-equivalent INK token) — clearly visible against dark background. Legend labels appear in light color. No dark-on-dark failures detected.
      Data: Identical palette colors to light render — Python green, JavaScript lavender, Java blue, C/C++ ochre, TypeScript red — all correctly theme-independent. White percentage labels remain visible against their respective colored slices.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures; chrome correctly adapts while data colors remain constant
