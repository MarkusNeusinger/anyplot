review:
  strengths:
  - Spec fully satisfied — percentages on every slice, distinct categorical colors,
    right-side legend, largest slice (Netflix 30%) cleanly exploded for emphasis.
  - Imprint palette positions 1–5 in canonical order via `d3.scaleOrdinal().range(t.palette)`;
    first series correctly `#009E73`; data colors pixel-identical across light and
    dark renders.
  - Theme-adaptive chrome via `t.ink` / `t.pageBg`; slice strokes flip naturally to
    the surface color in each theme, giving clean separation in both modes.
  - Deliberate in-slice label color `#FAF8F1` (instead of `t.ink`) — documented in
    an inline comment — guarantees readable percentages on the matte-red and blue
    palette slots in both themes.
  - 'Strong storytelling: leader-slice percentage label is enlarged to 44px / weight
    700 (vs 30px / 600 for the rest), reinforcing the explosion focal point with a
    typographic hierarchy.'
  - 'Idiomatic D3: `d3.pie().sort(null)`, `d3.arc()` with separate `labelArc` for
    centroid placement, `d3.maxIndex` for the focal slice, `selection.data().join()`
    for slices/labels/legend.'
  - 'Correct square 2400×2400 canvas via the `//# anyplot-orientation: square` directive
    — canvas gate passed.'
  weaknesses:
  - 'DE-03 storytelling could push further: the explosion + leader-label hierarchy
    is already good, but a brand-color emphasis on the Netflix legend row (e.g. bolder
    text or a left-edge color bar) would create a stronger viewer entry point.'
  - LM-02 distinctive features are conservative — the implementation uses `d3.pie`
    / `d3.arc` / `d3.scaleOrdinal` competently but does not lean on more distinctive
    D3 capabilities (e.g. polyline leader lines for outside labels, `d3.interpolate`
    for any computed style, hierarchy/partition for a richer composition).
