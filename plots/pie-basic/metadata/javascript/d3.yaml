review:
  strengths:
  - Faithfully implements spec — pie chart with percentage labels inside slices, distinct
    Imprint-palette colors, legend, and the largest slice (Netflix 30%) cleanly exploded
    for emphasis as the spec requested
  - 'Uses Imprint palette positions 1–5 in canonical order via d3.scaleOrdinal with
    tokens.palette, first series correctly #009E73 brand green, data colors identical
    across light and dark themes'
  - 'Theme-adaptive chrome: title and legend text use t.ink which flips correctly
    between dark and light; slice strokes use t.pageBg producing clean separations
    on the warm-cream light surface and dark dividers on the near-black dark surface'
  - 'Thoughtful color choice for percentage labels — the inline comment explains the
    deliberate use of #FAF8F1 cream as a constant high-contrast label color across
    both themes because near-black pageBg would fail contrast on the matte-red and
    blue slices'
  - 'Square 2400x2400 canvas via the //# anyplot-orientation: square directive — correct
    format for a symmetric pie chart'
  - 'Idiomatic D3: d3.pie() with sort:null preserves data order, d3.arc() generators,
    labelArc.centroid for label placement, d3.maxIndex to find the largest slice for
    explosion'
  weaknesses:
  - 'Minor KISS deviation: a small offset(a) helper function is defined to compute
    the explosion translation; could be inlined directly in the .attr(''transform'',
    ...) callbacks to keep the snippet fully top-to-bottom procedural, though the
    helper is small and readable as-is'
  - DE-03 storytelling is largely carried by the explosion alone — could be elevated
    by also bolding/enlarging the leader (Netflix 30%) percentage label or adding
    a subtle subtitle, but this is a stretch goal and not required by the spec
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white (#FAF8F1) — correct light theme surface, not pure white.
      Chrome: Title "pie-basic · javascript · d3 · anyplot.ai" centered at the top in dark ink (t.ink), bold and clearly readable against the cream background. Legend on the right side lists Netflix, Disney+, Amazon Prime, HBO Max, Hulu with rounded color swatches and dark text — all readable.
      Data: Five pie slices in Imprint palette positions 1–5 — Netflix brand green (#009E73, 30%, slightly exploded radially outward), Disney+ lavender (22%), Amazon Prime blue (18%), HBO Max ochre (16%), Hulu matte-red (14%). Percentage labels inside each slice are bold cream/white text, centered, very readable against every saturated slice. White-cream strokes (t.pageBg) between slices give clean separation.
      Legibility verdict: PASS — every text element is unambiguously readable, no dark-on-cream contrast issues, the exploded Netflix slice creates a clear focal point.

    Dark render (plot-dark.png):
      Background: warm near-black (#1A1A17) — correct dark theme surface, not pure black.
      Chrome: Same title now in light ink (t.ink flipped) on the dark background, fully readable. Legend swatches retain their data colors; legend text flipped to light ink — readable. No dark-on-dark failures anywhere.
      Data: Slice colors are pixel-identical to the light render (Imprint palette positions 1–5 in the same order) — only chrome flipped, exactly as required. Slice strokes are now dark (t.pageBg) which renders as near-black dividers between the saturated slice fills — visually clean. Percentage labels remain cream-white and still read clearly against every slice (the implementer explicitly chose #FAF8F1 instead of t.ink for the labels to guarantee high contrast against the saturated palette in both themes — good call).
      Legibility verdict: PASS — title, legend, and in-slice percentages all clearly readable. The brand green Netflix slice still pops against the dark surface.
