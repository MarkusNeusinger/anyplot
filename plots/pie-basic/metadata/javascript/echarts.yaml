review:
  strengths:
  - 'First series (Engineering) renders in brand green #009E73 — exact palette spec
    match, identical in both renders.'
  - Imprint palette positions 1-6 used in canonical order (green, lavender, blue,
    ochre, matte red, cyan) — colors unchanged across themes; only chrome flips.
  - Largest slice (Engineering, 42%) is exploded outward via selectedMode + selectedOffset,
    satisfying the spec's emphasis requirement and creating a clear focal point.
  - 'Smart per-slice label policy: tiny 3% slice gets an outside label with a leader
    line so the percentage isn''t squeezed, while larger slices keep crisp inside
    labels — uses avoidLabelOverlap as backup.'
  - 'Theme chrome is correct in both renders: warm off-white #FAF8F1 (light) / warm
    near-black #1A1A17 (dark) backgrounds, ink/inkSoft tokens threaded through title/legend/outside-labels
    with no dark-on-dark or light-on-light failures.'
  - Title format matches the mandated 'pie-basic · javascript · echarts · anyplot.ai'
    pattern exactly, centered with explicit fontSize.
  - 'Idiomatic ECharts: uses high-level setOption, per-item label overrides, selectedMode/selectedOffset
    for explode, animation:false, and wires chart.on(''finished'') to window.__anyplotReady
    so the harness screenshots a fully-drawn frame.'
  - 'Canvas square orientation declared via //# anyplot-orientation: square directive
    — saved PNGs are exactly 2400×2400.'
  - Realistic, neutral data (FY25 operating budget allocation across 6 departments,
    summing to 100%) — within the spec's 3-8 category range with good size variation
    including small slices (3%, 7%) that exercise the label-handling logic.
  weaknesses:
  - DE-01 Aesthetic Sophistication at 5/8 — design is solid (exploded focal slice,
    leader-line labels, white slice borders for separation) but stops short of FiveThirtyEight-level
    polish. To push higher, consider a subtle subtitle/footnote line in inkMuted (e.g.,
    'Engineering claims 42% of the FY25 operating budget') or a refined weight hierarchy
    on the legend.
  - DE-03 Data Storytelling at 4/6 — the explosion creates a focal point, but the
    chart could lean further into the story (e.g., a faint muted halo or a single
    annotation calling out the 42% headline, or muting non-focal slice opacity slightly
    to deepen the focal contrast).
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white matching #FAF8F1 — not pure white, theme-correct.
      Chrome: title "pie-basic · javascript · echarts · anyplot.ai" centered in dark ink (#1A1A17), fully readable above the chart. Legend at bottom with 6 rounded-rect color swatches and category names in soft ink — all readable, comfortable spacing.
      Data: 6-slice pie centered in the square canvas. Engineering 42% in brand green #009E73 (exploded outward via selectedOffset), Sales & Marketing 23% in lavender #C475FD, Operations 14% in blue #4467A3, Customer Success 11% in ochre #BD8233, R&D 7% in matte red #AE3030, General & Admin 3% in cyan #2ABCCD. Larger slices show white #FFFDF6 percentage labels inside; the 3% sliver uses an outside label with a leader line in soft ink. Thin pageBg-colored borders separate slices cleanly.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black matching #1A1A17 — not pure black, theme-correct.
      Chrome: title in light ink #F0EFE8, centered, fully readable. Legend at bottom uses light soft-ink text — readable; no dark-on-dark failures.
      Data: pie colors are pixel-identical to the light render — Engineering green, Sales lavender, Operations blue, Customer Success ochre, R&D matte red, General & Admin cyan, in the same canonical Imprint order. Inside white labels still read well on the saturated slice fills; the outside 3% label in soft light ink is visible against the dark background. The slice borders now follow the dark pageBg, so the visual separation reads as a subtle dark gap (intended).
      Legibility verdict: PASS

    Theme check: data colors identical across themes (only chrome flips). No dark-on-dark or light-on-light. Brand green #009E73 readable on both surfaces.
