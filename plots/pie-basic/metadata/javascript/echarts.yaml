review:
  strengths:
  - 'Imprint palette wired correctly: first series is brand green #009E73 and remaining
    slices follow the canonical palette order, identical between light and dark renders.'
  - 'Theme adaptation is clean — background flips between #FAF8F1 and #1A1A17, title/legend
    colors swap via t.ink/t.inkSoft, slice borders use t.pageBg so the visual separators
    stay theme-correct.'
  - 'Largest slice (Engineering, 42%) is exploded via ECharts'' native selectedMode/selectedOffset
    with selected: true on the largest item, satisfying the spec''s emphasis requirement
    using idiomatic ECharts.'
  - Title format matches the mandated 'pie-basic · javascript · echarts · anyplot.ai'
    string exactly.
  - 'All required spec features present: percentage labels inside slices, distinct
    categorical colors, horizontal legend at bottom for category identification, and
    exploded largest slice.'
  - Realistic and neutral dataset (FY25 operating budget allocation across six departments)
    summing to 100%, with a healthy spread of slice sizes that exercises the pie's
    expressive range.
  - 'Idiomatic ECharts setup: animation: false, transparent backgroundColor over the
    harness page, single chart on #container, no explicit size or devicePixelRatio,
    and a ''finished'' event listener that gates window.__anyplotReady for the screenshot
    harness.'
  - 'Clean code: KISS top-level script with no functions/classes, deterministic hard-coded
    data, no extra imports beyond the echarts global, well-commented sections.'
  weaknesses:
  - 'The ''3%'' label on the General & Admin slice is squeezed against the slice boundary
    in both renders — the leading ''3'' digit sits at/over the border line because
    the slice is only ~10.8° wide and label position: ''inside'' is too tight for
    such a small wedge. Consider switching tiny slices (<5%) to position: ''outside''
    with labelLine.show: true for them, or use a per-data label override so only the
    small slices get outside labels.'
  - DE-01 / DE-03 design hierarchy is solid but not exceptional — the chart relies
    entirely on the exploded slice for emphasis. Consider de-emphasizing the smaller
    slices (slightly lower opacity for the < 10% wedges, or using a single accent
    color for the largest slice with the rest in muted neutrals) to give the focal
    point even more weight.
  - 'LM-02: ECharts-distinctive features used are at the basic-to-moderate end (selectedMode
    + selectedOffset for the explode, avoidLabelOverlap, the ''finished'' event).
    A future iteration could showcase more ECharts-specific surface area — e.g. a
    roseType: ''radius'' / ''area'' nightingale variant gated behind a flag, richText
    label formatter combining slice name + percentage, or graphic elements for a center
    caption — without departing from the basic pie spec.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white at the spec-mandated #FAF8F1 — not pure white, not dark.
      Chrome: title "pie-basic · javascript · echarts · anyplot.ai" rendered in dark ink (t.ink), centered, ~32 px, clearly readable against the cream background. Horizontal legend at the bottom (six entries: Engineering, Sales & Marketing, Operations, Customer Success, R&D, General & Admin) with rounded-square swatches and dark-ish soft-ink labels — fully readable.
      Data: square pie with six slices. First series (Engineering, 42%) is the Imprint brand green #009E73 and is pulled out to the right via ECharts selectedOffset. Remaining slices follow the Imprint cycle in canonical order — Sales & Marketing in lilac/violet, Operations in deep blue, Customer Success in amber/ochre, R&D in deep red, General & Admin in cyan/teal. Percentage labels are rendered inside each slice in near-white (#FFFDF6) bold. Slice borders use the page background color, giving clean separators.
      Legibility verdict: PASS — title, legend labels, and percentage labels are all readable. The only borderline item is the "3%" label on the General & Admin slice, whose leading digit hugs the slice border because the wedge is too narrow for comfortable inside labels; it is still legible but is a minor VQ-02 deduction.

    Dark render (plot-dark.png):
      Background: warm near-black at the spec-mandated #1A1A17 — not pure black, not light.
      Chrome: same title centered at the top in light ink (t.ink resolves to a near-white in dark mode) — clearly readable against the near-black background. Legend at the bottom uses the same rounded-square swatches with light-ish soft-ink labels — fully readable, no dark-on-dark failure.
      Data: identical six-slice pie with identical Imprint data colors as the light render (brand green Engineering still #009E73; remaining hues unchanged). The slice border color flips to t.pageBg (dark) so the dark gaps now read as the surface separating the slices — visually pleasing. Inside percentage labels still in near-white, fully readable on every slice.
      Legibility verdict: PASS — all title, legend, and percentage labels are clearly visible; brand green still pops on the dark surface. Same minor "3%" boundary issue as in the light render, identical in both themes (as expected — only chrome flips).
