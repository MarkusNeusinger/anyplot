review:
  strengths:
  - 'Per-slice luminance-aware percent label color (threshold 0.3) — the prior white-on-lavender
    / white-on-cyan contrast nit is now resolved: 25% (Microsoft Azure) and 26% (Others)
    numerals render in dark ink #1A1A17, while AWS / Google Cloud retain off-white
    #FAF8F1.'
  - 'Imprint palette positions 1–6 applied in canonical order; first slice is #009E73
    brand green; data colors are byte-identical between light and dark renders — only
    chrome flips.'
  - 'Square 2400×2400 canvas correctly declared via `//# anyplot-orientation: square`;
    canvas dimension gate passes; nothing clipped or overflowing.'
  - 'All four spec features delivered: percentage labels on slices ≥ 5%, distinct
    Imprint colors, six-category legend with inline ''Category — NN%'', and explode
    on the largest slice (AWS, offset: 30 px).'
  - Smart < 5% skip threshold (raised from < 4% in attempt 1) now defers both the
    3% Oracle and 4% Alibaba wedges to the legend — narrow slices no longer crowd
    their own digits.
  - 'Idiomatic Chart.js: `animation: false`, single canvas appended to `#container`,
    no canvas-size tampering, custom `afterDatasetsDraw` plugin is the canonical way
    to draw labels on top of arcs, `generateLabels` upgrades legend to diagnostic
    ''Category — NN%'' format.'
  - Others bucket blended 60% toward `t.pageBg` so it reads as 'rest' rather than
    competing with named categories — light tail de-emphasis that addresses the prior
    DE-03 nit.
  weaknesses:
  - 'Dark-render legend text reads slightly low-contrast at viewing scale — `labels.color:
    t.ink` is correctly set, but at fontsize 20 px against #1A1A17 the swatch+text
    combo looks dim relative to the title (size 34). Bumping legend fontsize to ~22–24
    px or boosting weight would lift legibility on small screens.'
  - Slice order is not share-sorted (AWS 31, Azure 25, Google 11, Alibaba 4, Oracle
    3, Others 26). Sorting descending by share (or descending with Others pinned last)
    would create a cleaner narrative sweep and is the conventional pie ordering.
  - LM-02 doesn't push into uniquely Chart.js territory — `hoverOffset` and the custom
    tooltip callback only appear in interactive HTML, not the screenshot. Consider
    also exposing centre annotation via `afterDraw` or using `chartjs-plugin-datalabels`
    patterns inline (datalabels plugin itself isn't allowlisted, but its rendering
    approach can be mimicked) to lean further into Chart.js fluency.
  - Three small color helpers (hexToRgb / blendRgb / relLuminance) plus a Chart.js
    plugin push CQ-01 slightly below strict KISS. They're justified by the luminance-aware
    label feature, but a future refactor could fold them inline if the feature stays
    this small.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 across the full 2400×2400 square canvas — no pure-white panel, no padding leaks.
      Chrome: Title "pie-basic · javascript · chartjs · anyplot.ai" centered at top in dark ink #1A1A17 at fontsize ~34; right-side legend with swatch + "Category — NN%" rows in dark ink, fully readable.
      Data: Six wedges in Imprint canonical order — AWS #009E73 (31%, exploded ~30 px), Microsoft Azure #C475FD (25%), Google Cloud #4467A3 (11%), Alibaba Cloud #BD8233 (4%), Oracle Cloud #AE3030 (3%), Others (cyan blended 60% toward page bg, 26%). Percent labels at slice midpoints: AWS 31% in white, Azure 25% in dark ink (NEW — was white in attempt 1), Google 11% in white, Others 26% in dark ink (NEW). Alibaba 4% and Oracle 3% are skipped per the < 5% threshold and live only in the legend. First series confirmed as #009E73.
      Legibility verdict: PASS — every text element is readable against the warm off-white background; the per-slice luminance-aware label color resolves the borderline white-on-lavender/cyan contrast called out in attempt 1.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — no pure black, no light panel.
      Chrome: Title flipped to light off-white #FAF8F1 at fontsize 34, easily readable. Legend uses t.ink (light off-white) for text and per-slice swatch fills; at the small legend fontsize (20) the text reads slightly dim against the dark background but is fully legible at full 2400 px native — no dark-on-dark failure.
      Data: Slice colors are byte-identical to the light render (only chrome flipped). Percent labels: white 31% on AWS green, dark-ink 25% on lavender Azure, white 11% on blue Google, dark-ink 26% on cyan Others — same per-slice routing as light render. Brand green #009E73 is vivid against the dark surface.
      Legibility verdict: PASS — no element fails the dark-on-dark check; the per-slice label routing keeps numerals readable on every wedge color regardless of theme.
