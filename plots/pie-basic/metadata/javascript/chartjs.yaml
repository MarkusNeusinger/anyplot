review:
  strengths:
  - 'Square 2400x2400 canvas correctly declared via //# anyplot-orientation: square
    directive — passes the canvas dimension gate.'
  - 'Imprint palette applied in canonical order (green, lavender, blue, ochre, red,
    cyan); first slice AWS is brand green #009E73, satisfying VQ-07.'
  - 'Theme-adaptive chrome works: title and legend colors read from t.ink, slice separator
    borders use t.pageBg, so the data colors stay identical across light/dark while
    chrome flips cleanly.'
  - 'Spec features all present: percentage labels on slices (custom afterDatasetsDraw
    plugin), legend with category + percent (custom generateLabels callback), and
    a slight explode (offset=30) on the largest slice (AWS) per the spec''s emphasis
    hint.'
  - 'Idiomatic Chart.js: animation: false set as required, mount-node contract honored
    (creates one canvas, appends to #container), no canvas.width/height tampering,
    no imports — leverages the Chart global. The percent-label plugin is the canonical
    Chart.js way to draw on top of the chart.'
  - Smart < 4% threshold defers tiny-slice labels (Oracle Cloud, 3%) to the legend,
    avoiding label overlap on the narrow wedges.
  - 'Legend formatting upgrade: category name with percentage inline ("AWS — 31%")
    gives the legend itself diagnostic value, not just color identification.'
  weaknesses:
  - 'Percent-label fill is hardcoded to #FAF8F1 (light cream) regardless of slice
    color. Contrast against the lighter Imprint slices (lavender #C475FD on the 25%
    Microsoft Azure wedge and cyan #2ABCCD on the 26% Others wedge) is borderline
    — the 25%/26% white numerals are legible but visibly low-contrast in both renders.
    Consider picking the label color per-slice from a luminance threshold (white on
    dark slices, t.ink on light slices), or use a thin text stroke/outline that reads
    on any slice.'
  - The 4% label for Alibaba Cloud sits inside a very narrow ochre wedge; at fontsize=26px
    the digits crowd the wedge edges and a small portion of the text appears to bleed
    onto neighboring colors. Either lift the < 4% skip threshold to ~5%, route narrow-slice
    labels to leader lines outside the slice, or shrink the font for slices below
    ~6%.
  - 'DE-03 storytelling is light: the AWS leader is exploded but otherwise no visual
    hierarchy distinguishes the long tail. A subtle alpha or desaturation on the "Others"
    bucket — or sorting slices by share so the eye sweeps from leader to tail — would
    tell the parts-to-whole story more deliberately.'
  - 'LM-02 only lightly distinctive: the custom plugin and generateLabels callback
    are good Chart.js patterns, but the implementation doesn''t lean into anything
    that would set Chart.js apart from a static plotter (e.g. responsive aspect-aware
    datalabels, doughnut center-text trick, or a richly-styled tooltip — the tooltip
    is configured but never visible in the static PNG).'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — matches the brand light surface.
      Chrome: title "pie-basic · javascript · chartjs · anyplot.ai" centered at the top
        in dark ink, comfortably readable. Right-side legend in dark ink with palette
        swatches and "Category — NN%" entries — all six rows legible.
      Data: pie at the canvas center with six wedges in Imprint canonical order —
        AWS #009E73 (31%, exploded outward ~30 px), Microsoft Azure #C475FD (25%),
        Google Cloud #4467A3 (11%), Alibaba Cloud #BD8233 (4%), Oracle Cloud #AE3030 (3%),
        Others #2ABCCD (26%). White percent labels sit at each slice midpoint for shares
        >= 4%; the 3% Oracle slice has no label per the skip threshold. First series is
        brand green as required.
      Legibility verdict: PASS with caveat — chrome is fully readable, but the
        hardcoded #FAF8F1 percent-label color is borderline against the lighter
        palette members (lavender 25% and cyan 26% wedges). The 4% label on the narrow
        ochre wedge also flirts with the slice edges. No clipping, no AR-09 violation.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — matches the brand dark surface.
      Chrome: title and legend now in light ink (t.ink token flipped), all six legend
        entries clearly readable. Slice separator strokes are dark (t.pageBg) so each
        wedge sits on a thin dark gap rather than touching its neighbor — clean.
      Data: identical Imprint hues to the light render (only chrome flipped, as
        required). White percent labels read strongly across every wedge because the
        surrounding dark background means white text contrasts well even where a label
        grazes a slice edge. Brand green #009E73 is still vivid.
      Legibility verdict: PASS — no dark-on-dark failures. The white labels are
        universally readable on the dark surface; the light-render contrast caveat
        does not appear here.
