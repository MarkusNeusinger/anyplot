review:
  strengths:
  - Per-segment dendrogram branch coloring propagating cluster identity through the
    tree — non-trivial in Altair and visually highly effective
  - Interactive legend selection with alt.selection_point(bind='legend') and alt.condition
    for opacity filtering — genuinely distinctive Altair feature
  - 'Full theme-adaptive chrome: all INK/INK_SOFT tokens applied correctly to title,
    subtitle, axis labels, ticks, legend, and annotation; both renders pass the legibility
    check'
  - Annotation + amber threshold line creates a strong data story with minimal visual
    clutter
  - 'Canvas target compliance: pad-to-exact-3200x1800 pattern correctly implemented
    with fail-fast on overshoot'
  weaknesses:
  - Annotation text ('Setosa diverges / from Versicolor + Virginica') at dx=12 from
    the top merge node partially overlaps the gray connector branch — increase dx
    to 20-25 or shift annotation anchor further right
  - Leaf label font size of 10px is at the lower limit for mobile readability — increase
    to 11px in mark_text for leaf_text
  - In dark mode, leaf dot stroke=PAGE_BG (#1A1A17) creates an invisible ring (same
    color as background), losing dot separation for closely spaced leaves — use stroke=INK_SOFT
    instead for theme-adaptive borders
