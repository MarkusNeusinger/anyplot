review:
  strengths:
  - 'Perfect Imprint palette application: brand green first cluster, canonical order
    for second and third, with INK_SOFT above-threshold color creating natural visual
    hierarchy between within-cluster and between-cluster topology.'
  - LineCollection post-processing for rounded caps and thick lines — visually polished
    technique that lifts the dendrogram well above scipy/matplotlib defaults.
  - 'Fully theme-adaptive: all chrome tokens (INK, INK_SOFT, PAGE_BG) correctly flip
    between light and dark without any dark-on-dark failures.'
  - Iris dataset with realistic species-level measurement noise provides scientifically
    meaningful clustering that accurately reflects known iris taxonomy.
  - color_threshold computed programmatically from sorted distances — robust approach
    that correctly splits exactly 3 clusters regardless of random seed.
  weaknesses:
  - 'DE-01 could reach 6+ with one additional polish element: a subtle species-group
    annotation above each cluster (text labels Setosa, Versicolor, Virginica at the
    top of each sub-tree) would make the storytelling explicit and push aesthetic
    sophistication to publication-ready.'
  - 'LM-02: The LineCollection technique is impressive but the implementation could
    further demonstrate matplotlib distinctiveness by using ax.axhline to draw the
    color threshold line explicitly, making the visual cut visible to the reader.'
