review:
  strengths:
  - Correct dendrogram structure implemented from scratch using pygal XY with per-branch
    U-shape series — elegant workaround for a library without native dendrogram support
  - Stroke width scales with merge distance (min 5 + 8*(dist/max_dist)) — brilliant
    visual encoding that makes high-distance merges visually heavier and draws the
    eye to major cluster splits
  - 'Imprint palette applied correctly with semantic mapping: Setosa=#009E73, Versicolor=#C475FD,
    Virginica=#4467A3 — canonical order, first series is brand green'
  - Reference lines at within-species max and between-group merge distances add interpretive
    value and help viewers read the dendrogram's threshold story
  - Both PNG and interactive HTML output produced (pygal is interactive library),
    correct for the library type
  - Reproducible with np.random.seed(42); clean KISS structure; all font sizes explicitly
    set via Style object
  - Theme adaptation correct in both renders — chrome tokens flip, data colors stay
    identical across light and dark
  weaknesses:
  - Y-axis title 'Distance (Ward’s Method)' wraps to two lines in pygal’s vertical
    label rendering, producing awkward split text. Shorten to 'Distance (Ward)' or
    'Ward’s Distance' to fit on one line.
  - Legend reference-line labels are truncated by pygal (shows 'Within-species max
    (d…' and 'Between-group merge (…'). Shorten labels to e.g. 'Within-species max'
    and 'Between-species merge' to avoid truncation.
  - 'Upper ~60% of the plot Y-axis is empty dead space (all data merges below d=4,
    axis extends to d≈10.5). Reduce Y range by ~10% padding: range=(0, max_dist *
    1.15) instead of 1.05, and add an explicit max_dist annotation at the top merge
    point rather than wasting vertical space.'
  - 'DE-01 low: The plot renders with pygal’s default visual aesthetic. To lift polish:
    remove the bounding box/frame (add border=False if supported), tune legend box
    to use ELEVATED_BG (#FFFDF6 light / #242420 dark) for callout fill, and increase
    spacing between dendrogram bottom and x-axis.'
  - 'DE-02 low: The Y-grid uses pygal’s default dotted lines which appear somewhat
    prominent. Consider reducing grid opacity by relying on foreground_subtle being
    set to INK_MUTED (already done) but verify the resulting grid lines are subtle
    enough.'
  - Inter-cluster and Between-group-merge use very similar gray tones in dark mode
    (INK_MUTED=#A8A79F vs INK_SOFT=#B8B7B0). Differentiate by using ANYPLOT_AMBER
    for the between-cluster bridge or use a slightly contrasting color so the legend
    swatches are distinct.
  - Large whitespace gap between x-axis labels and legend at bottom — margin_bottom=140
    with legend_at_bottom creates dead space. Reduce margin_bottom to ~80 or adjust
    legend_box_size/spacing.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface consistent with #FAF8F1 — correct Imprint light chrome.
      Chrome: Title "Iris Species Clustering · dendrogram-basic · python · pygal · anyplot.ai" fully readable at top (~80% of width, expected for long mandated title). Y-axis title "Distance (Ward's Method)" renders as two wrapped lines — readable but awkward split. X-axis title "Sample" readable. Tick labels readable (rotated 35°, tight but not overlapping). Y-tick labels (0, 2, 4, 6, 8, 10) clearly visible. Legend at bottom with swatches clearly distinguished.
      Data: Three species colored correctly — Setosa (#009E73 green), Versicolor (#C475FD lavender), Virginica (#4467A3 blue). Inter-cluster bridge in gray (INK_MUTED). Amber dashed reference line for within-species max clearly visible. Gray dashed reference line for between-group merge visible. Stroke widths vary with merge distance — lower branches thinner, top inter-cluster bridge noticeably heavier. Dendrogram structure correct and readable.
      Legibility verdict: PASS — all text readable, no element unreadable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct Imprint dark chrome.
      Chrome: Title and all axis text render in light color against dark background. No dark-on-dark failures observed — all text is clearly light-colored. Tick labels, axis titles, and legend entries all clearly readable against the dark surface.
      Data: Data colors identical to light render — Setosa green, Versicolor lavender, Virginica blue are unchanged. Amber reference line clearly visible on dark background. Between-group merge reference line (INK_SOFT=#B8B7B0 in dark mode) appears as lighter gray dashed line, similar but visually distinct from the inter-cluster bridge (INK_MUTED=#A8A79F). Dendrogram structure fully visible.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures, theme-correct chrome throughout.
