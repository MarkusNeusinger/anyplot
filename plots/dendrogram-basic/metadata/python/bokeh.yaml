review:
  strengths:
  - 'Semantically meaningful color assignment: green (#009E73) for within-cluster
    cohesion and matte red (#AE3030) for between-cluster separation — exactly matching
    the Imprint palette''s semantic anchors'
  - Rich interactive HoverTool with line_policy='interp' on multi_line branches, exposing
    merge distance, cluster size, and left/right member lists — a distinctive Bokeh
    capability not replicable in static libraries
  - Sqrt-scale transformation on Y-axis spreads lower-level merges for better readability
  - Cluster threshold dashed line + annotation adds analytical context and creates
    a clear visual focal point
  - 'Both theme renders fully functional: correct PAGE_BG (#FAF8F1 / #1A1A17), theme-adaptive
    INK tokens on all chrome elements — no dark-on-dark or light-on-light failures'
  - Canonical font sizes (50pt title, 42pt axis labels, 34pt ticks/legend) produce
    well-proportioned text at 3200x1800
  - 'Clean axis: axis_line_color=None, all tick line colors removed, x-grid off, y-grid
    at 15% alpha'
  weaknesses:
  - 'VQ-04 (minor): The two series (Within-cluster / Between-cluster) are distinguished
    solely by green (#009E73) vs. matte red (#AE3030). For deuteranopia/protanopia
    users this hue pair is hard to separate — consider adding a secondary encoding
    such as line_dash=''dashed'' for the Between-cluster series or a line_dash pattern
    to make the categories distinguishable without color alone.'
  - 'DE-01 (moderate): Aesthetic sophistication is solid but not quite FiveThirtyEight-level
    — the legend sits in the default top_left without visual integration into the
    chart story, and the threshold annotation uses italic text without further emphasis.
    A subtle background rectangle under the ''cluster threshold'' label, or a bolder
    annotation arrow, would lift the design.'
  - 'LM-02 (minor): The interactive HTML is not exploiting Bokeh''s full power — no
    TapTool, no JS callback to highlight sub-trees on hover, no panel/widget for dynamic
    threshold adjustment. These are optional but would raise Library Mastery distinctiveness.'
