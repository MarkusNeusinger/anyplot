review:
  strengths:
  - Species-colored y-axis tick labels (bold, species hex) create immediate visual
    narrative — viewers see species boundaries at a glance without needing the legend
  - Row color strip correctly uses Imprint positions 1-3 (green/purple/blue) for Setosa/Versicolor/Virginica,
    consistent with palette rules
  - Theme-adaptive chrome correctly implemented — sns.set_theme rc dict covers all
    chrome tokens; dark render flips bg/text while data colors stay constant
  - imprint_seq colormap applied correctly for the single-polarity heatmap (green→blue
    gradient, no forbidden cmaps)
  - Square canvas (figsize=(6,6) × dpi=400 = 2400×2400) correctly chosen for the symmetric
    clustermap layout
  - Savefig omits bbox_inches — no canvas drift
  - Seed set both at np.random.seed(42) and random_state=42 inside groupby.apply —
    fully reproducible
  - 'Perfect spec compliance: iris dataset, ward linkage, 30 samples, species labels,
    both row and column dendrograms'
  weaknesses:
  - Legend placed inside heatmap (loc='upper right' on ax_heatmap) overlaps with data
    cells in the top-right quadrant, obscuring Setosa clustering information in both
    renders — move legend outside heatmap bounds (e.g. bbox_to_anchor=(1.15, 1) or
    position above colorbar)
  - Row colors column label 'Species' appears in x-axis tick labels alongside the
    feature names ('Sepal Length', 'Petal Width', etc.), causing visual crowding/partial
    overlap at the bottom-left of the x-axis area — consider setting xticklabels to
    the feature columns only, or explicitly excluding the row_colors column label
  - 'Virginica tick labels use #4467A3 (Imprint blue) which has limited contrast (~2:1)
    against the #1A1A17 dark background — readable but below WCAG AA for normal text;
    bolding mitigates this, but flagging for accessibility'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct, no pure white
      Chrome: title "dendrogram-basic · python · seaborn · anyplot.ai" in dark INK (#1A1A17), ~75% canvas width at fontsize=12 — readable. Axis labels "Iris Features" (x, bottom), "Iris Samples (by Species)" (y, right side rotated) in dark INK at fontsize=10 — readable. Tick labels at fontsize=8 in INK_SOFT (#4A4A44) — readable. Colorbar tick labels (2, 4, 6) readable. Colorbar label "Feature Value" (rotated, left side) readable.
      Data: Row dendrogram (left) shows three primary clusters corresponding to species. Column dendrogram (top) shows feature clustering. Heatmap uses imprint_seq (green→blue), revealing Setosa as distinctly green (low feature values), Versicolor/Virginica as mixed teal/blue. Row color strip: Setosa=#009E73, Versicolor=#C475FD, Virginica=#4467A3. Y-axis tick labels colored by species (bold). Species legend in upper-right of heatmap — overlaps ~4-6 data cells.
      Legibility verdict: PASS overall, but legend overlaps heatmap data cells in upper right.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct, no pure black
      Chrome: title in light INK (#F0EFE8) — clearly readable. Axis labels in INK (#F0EFE8) — readable. Tick labels in INK_SOFT (#B8B7B0) — readable. Dendrogram branch lines in INK_SOFT (#B8B7B0) — clearly visible on dark bg. No dark-on-dark failures.
      Data: Colors are identical to light render (Imprint data colors theme-independent). Setosa labels in #009E73 (high contrast on dark — good), Versicolor in #C475FD (high contrast — good), Virginica in #4467A3 (moderate contrast, ~2:1 — readable with bold weight but marginal). Legend box uses ELEVATED_BG (#242420) — distinct from PAGE_BG (#1A1A17).
      Legibility verdict: PASS overall. Virginica labels in #4467A3 on dark background are readable but have reduced contrast. Legend overlap present as in light render.
