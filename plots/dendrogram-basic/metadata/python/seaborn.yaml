review:
  strengths:
  - Excellent use of seaborn clustermap with row_colors for species annotation — a
    distinctly seaborn feature
  - Y-axis labels colored by species create immediate visual mapping between dendrogram
    structure and taxonomy
  - 'Correct Imprint palette: imprint_seq for heatmap continuous data, species colors
    from positions 1-3'
  - Complete theme adaptation with all chrome tokens set correctly for both light
    and dark renders
  - Ward linkage method with iris dataset produces scientifically meaningful clustering
    showing species separation
  - Species legend well-positioned outside heatmap to avoid data overlap
  weaknesses:
  - 30 y-axis labels at 8pt produce a very tight layout — labels are readable but
    spacing is at the minimum; a slightly smaller sample count (e.g. 8 per species
    = 24 total) or smaller fontsize would give more breathing room
  - Blue (#4467A3) text labels for Virginica samples have lower luminance contrast
    against the dark background (#1A1A17) — estimated ~3:1 ratio, below WCAG AA; consider
    using INK_SOFT token instead of species color for tick label coloring on dark
    theme
  - Colorbar positioned on the left (seaborn default) is functional but unconventional;
    right-side placement would match standard data-vis conventions
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) - correct
      Chrome: Title "dendrogram-basic · python · seaborn · anyplot.ai" at top in dark INK color, readable. Axis labels "Iris Features" (x) and "Iris Samples (by Species)" (y, right side) in dark INK. Tick labels at 8pt in INK_SOFT. Colorbar label "Feature Value" rotated on left.
      Data: Heatmap uses imprint_seq (green #009E73 → blue #4467A3) for feature values. Species colors: Setosa=#009E73 (green), Versicolor=#C475FD (purple), Virginica=#4467A3 (blue) - correct Imprint positions 1-3. Row color strip visible on left. Y-axis labels colored by species. Dendrograms on left and top in INK_SOFT color.
      Legibility verdict: PASS - all text readable, title fits within canvas (~65% width)

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) - correct
      Chrome: Title visible in light INK color (#F0EFE8). Axis labels and tick labels in light INK_SOFT (#B8B7B0). Dendrogram lines in lighter gray tone. Legend box has elevated dark background (#242420).
      Data: Heatmap colors identical to light render (imprint_seq green→blue). Species colors identical. Row color strip identical. Y-axis labels still colored by species - Setosa/Versicolor labels readable; Virginica blue (#4467A3) labels have slightly lower contrast on dark background.
      Legibility verdict: PASS with note - Virginica blue labels (#4467A3 on #1A1A17) have ~3:1 contrast ratio, below WCAG AA. Text is still visible but not ideal for accessibility.
