review:
  strengths:
  - 'Full spec compliance: Ward linkage dendrogram with scipy, correct axis labels,
    title format, and 15-sample iris dataset within the 10-50 recommended range'
  - 'Imprint palette in canonical order (green/lavender/blue/ochre) correctly applied
    to clusters, with first series (Setosa) using brand green #009E73'
  - Theme-adaptive chrome is fully wired — PAGE_BG, ELEVATED_BG, INK, INK_SOFT, INK_MUTED
    tokens used throughout title, axis, grid, legend, and annotations
  - Interactive tooltips via letsplot's native layer_tooltips() API — idiomatic and
    distinctive library feature, also exports plot-{THEME}.html
  - Color threshold line at 70% of max distance with annotation adds clear data storytelling
    — reveals which merges cross species boundaries
  - Both light and dark renders are fully legible with no dark-on-dark or light-on-light
    failures; data colors identical across both themes
  weaknesses:
  - Leaf label text (geom_text size=4mm) at the bottom is on the smaller side for
    the canvas scale — readable but could be bumped to size=4.5-5 for mobile readability
  - Minor crowding potential between the threshold annotation text and the rightmost
    dendrogram segment, though no actual pixel overlap observed
  - 'Design Excellence could be elevated further: the dendrogram structure itself
    is clear but there is no explicit annotation or callout highlighting the three
    main species groupings, which would reinforce the data story'
