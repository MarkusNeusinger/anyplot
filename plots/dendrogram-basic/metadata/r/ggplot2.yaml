review:
  strengths:
  - 'Perfect spec compliance: hierarchical clustering, leaf labels, branch heights
    all correct'
  - Correct Imprint palette — cluster 1 as brand green (#009E73), cluster 2 lavender
    (#C475FD), cluster 3 blue (#4467A3)
  - 'Excellent theme adaptation — both renders fully readable with appropriate chrome
    flipping between #FAF8F1 and #1A1A17'
  - Real gapminder data (European development indicators) provides meaningful, neutral,
    real-world context
  - Custom legend with guides(override.aes = list(label = '■', size = 4)) is polished
    and distinctly ggplot2
  - coord_flip() creates clean horizontal dendrogram orientation with proper axis
    labels
  - All font sizes explicitly set (title 12pt, axis title 10pt, tick labels 8pt, geom_text
    2.8)
  weaknesses:
  - Y-axis limits extend to -max_h*0.55 (~-4.4) while country labels sit at only -0.02*max_h
    (~-0.16), creating visible wasted space on the left side of the plot that is disproportionate
    to the label area
  - Cluster legend labels are abstract numbers ('1', '2', '3') with no narrative;
    a descriptive subtitle or cluster annotations contextualizing the grouping (e.g.
    'Nordic/Western', 'Southern', 'Eastern Europe') would add storytelling
  - Design sophistication limited to cluster coloring — additional polish (typography
    emphasis, subtle cluster banding or separator lines, or an explanatory subtitle)
    would elevate to publication quality
  - Manual dendrogram segment construction via loops is verbose and lower-level than
    idiomatic R/ggplot2; ggdendro::dendro_data() provides segment data more elegantly
    if available in the CI runtime
  - Segment linewidth=0.55 is slightly thin for the root-level branches at large merge
    distances — slightly thicker (0.7-0.8) would improve visual weight balance
