review:
  strengths:
  - Manual dendrogram geometry built from ggplot2 primitives (geom_segment + geom_text
    + coord_flip) demonstrates deep grammar-of-graphics mastery
  - 'Cluster coloring on leaf labels uses Imprint palette positions 1-3 correctly
    (#009E73, #C475FD, #4467A3) providing clear visual grouping'
  - Both light and dark themes render correctly with proper theme-adaptive chrome
    — no dark-on-dark failures
  - Real-world gapminder data (20 European countries by life expectancy, GDP, population)
    with informative subtitle providing full context
  - Canvas is exactly 3200x1800 landscape, all sizing follows ggplot2 style guide,
    legend framed with ELEVATED_BG and INK_SOFT border
  weaknesses:
  - No x-axis grid lines (horizontal after coord_flip) — a subtle grid on Ward's Distance
    axis would help readers estimate merge heights without visual clutter
  - Segment-building uses three nested for-loops with pre-allocated vectors; a vectorized
    or functional approach (mapply/vapply) would be cleaner idiomatic R
  - legend uses guide_legend(override.aes=list(label='■')) to force filled-square
    swatches — a minor workaround that works but is fragile if ggplot2 internals change
  - country labels at geom_text size=3.2mm (~9pt) are tight for 20 items in 1800px
    vertical space — readable but on the small side; size=3.5 would add comfort
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "dendrogram-basic · r · ggplot2 · anyplot.ai" in bold dark #1A1A17 at 12pt — fully readable. Subtitle in muted #4A4A44 at 8pt — readable. "Ward's Distance" x-axis label in dark ink at 10pt — readable. Tick labels (0, 2, 4, 6, 8) in INK_SOFT at 8pt — readable.
      Data: Horizontal dendrogram with 20 European countries. Leaf labels colored by cluster: lavender (#C475FD) for Northern/Western Europe cluster (Norway, Iceland, Finland, Belgium, Austria, Netherlands, Greece, Ireland, Denmark), green (#009E73) for Italy/France cluster, blue (#4467A3) for Eastern Europe cluster (Croatia, Albania, Montenegro, Bosnia and Herzegovina, Hungary, Bulgaria, Poland, Czech Republic, Germany). Dendrogram branches in INK_SOFT color against warm off-white background — clearly visible. Legend at top with styled border shows all three clusters.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light #F0EFE8 — fully readable against dark background. Subtitle in #B8B7B0 — readable. Axis labels and tick marks in appropriate light colors — no dark-on-dark failures detected. Legend background uses ELEVATED_BG #242420 with INK_SOFT border — visible and styled correctly.
      Data: Same cluster coloring as light render — #009E73 (green), #C475FD (lavender), #4467A3 (blue) — identical data colors, only chrome flips. Dendrogram branches appear in light/muted color against dark background — clearly visible. All country labels readable in their cluster colors on the dark surface.
      Legibility verdict: PASS — all text clearly readable against the warm near-black background; no dark-on-dark failures.
