  image_description: 'The plot displays a vertical dendrogram of 15 iris flower samples
    (5 each from Setosa, Versicolor, Virginica) clustered using Ward''s method. The
    tree structure uses color-coding: green segments for Setosa within-cluster merges,
    orange for Versicolor, purple for Virginica, and blue for inter-cluster merges
    above the color threshold. A dashed horizontal line marks the color threshold
    at approximately y=7.3. Leaf labels (Set-1 through Set-5, Ver-6 through Ver-10,
    Vir-11 through Vir-15) are angled ~40 degrees at the bottom. The y-axis is labeled
    "Ward Linkage Distance" with ticks from 0 to 10. A legend on the right shows the
    four cluster categories. The title reads "dendrogram-basic · letsplot · pyplots.ai"
    in bold at the top. The background is clean white with subtle horizontal grid
    lines. The layout is 16:9 landscape format.'
