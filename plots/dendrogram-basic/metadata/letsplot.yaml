review:
  strengths:
  - Excellent color-coding by species cluster with smart threshold-based assignment
    logic
  - Clean use of layer_tooltips() for interactive hover information (merge distance
    and cluster)
  - Real Iris dataset provides meaningful, interpretable dendrogram structure
  - Well-refined theme with removed x-axis chrome and subtle gridlines
  - Perfect code quality with reproducible seed and clean structure
  weaknesses:
  - Leaf label font size (10) is slightly small for the canvas — could be 12-13 for
    better readability
  - Y-axis range extends to 12 when max merge is ~10.5, wasting some vertical space
  - No legend mapping colors to cluster names (relying solely on label prefixes)
  - Design is good but not yet publication-quality — could add threshold line or cluster
    annotations
  image_description: 'The plot displays a dendrogram of 15 iris flower samples (5
    each of Setosa, Versicolor, and Virginica) clustered using Ward''s linkage method.
    The tree structure is color-coded by species cluster: green (#4DAF4A) for Setosa,
    orange (#FF7F00) for Versicolor, purple (#984EA3) for Virginica, and steel blue
    (#306998) for inter-cluster merges above the color threshold. The y-axis shows
    "Ward Linkage Distance" ranging from 0 to 12, with light gray horizontal gridlines.
    Leaf labels are rotated ~40 degrees at the bottom. The Setosa cluster merges at
    low distances (under 1.5), Versicolor around 1-2.5, and Virginica around 0.5-1.5,
    with the final inter-cluster merge near distance 10.5. The title reads "dendrogram-basic
    · letsplot · pyplots.ai" in bold at the top. The x-axis has no ticks or axis line,
    only the rotated sample labels. The background is clean and minimal.'
