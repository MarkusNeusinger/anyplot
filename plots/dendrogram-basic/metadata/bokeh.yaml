  image_description: 'The plot displays a dendrogram of iris species hierarchical
    clustering with 15 samples (5 each of Setosa, Versicolor, Virginica). The tree
    uses two colors: dark blue (#306998) for between-cluster merges (the top-level
    merge at distance ~10 connecting the Setosa group to the Versicolor/Virginica
    group) and gold (#D4A017) for within-cluster merges (all lower-level merges).
    U-shaped connectors link samples and sub-clusters at their merge distances. The
    x-axis labels are rotated ~45 degrees showing sample names (e.g., "Setosa-4",
    "Versicolor-1", "Virginica-3"), ordered by clustering proximity. The y-axis shows
    "Distance (Ward''s Method)" from 0 to ~10. A legend in the top-right distinguishes
    "Within-cluster" (gold) from "Between-cluster" (blue). The background is white
    with subtle y-axis grid lines. The outline is removed and the overall layout is
    clean. The clustering correctly groups species together, with Versicolor and Virginica
    merging before joining Setosa.'
