  image_description: The plot displays a dendrogram showing hierarchical clustering
    of 15 iris flower samples (5 Setosa, 5 Versicolor, 5 Virginica). The tree structure
    uses U-shaped branches with heights proportional to Ward linkage distances. The
    Setosa cluster (left side) is colored in warm orange, the Versicolor and Virginica
    clusters (right side) are both in muted green, and the top-level merge connecting
    the two main groups appears in Python Blue (#306998) at approximately distance
    10. The X-axis shows rotated sample labels (e.g., "Setosa-4", "Versicolor-1")
    at 45 degrees, and the Y-axis labeled "Distance (Ward)" ranges from 0 to 11 with
    subtle grid lines. The title reads "Iris Species Clustering · dendrogram-basic
    · highcharts · pyplots.ai". The background is white, and the layout fills the
    canvas well with generous bottom margin for the rotated labels.
