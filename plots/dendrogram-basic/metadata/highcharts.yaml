  improvements: []
  image_description: 'The plot displays a dendrogram (hierarchical clustering tree)
    of 15 iris flower samples across three species (Setosa, Versicolor, Virginica),
    each with 5 samples. The title reads "dendrogram-basic · highcharts · pyplots.ai"
    with a subtitle "Ward linkage of 15 iris samples — Setosa separates clearly at
    distance ≈10". Three distinct cluster regions are highlighted with light background
    shading — salmon/peach for Setosa (left), light blue for the central merge region,
    and lavender for Virginica (right). Dendrogram branches are color-coded: orange
    for Setosa sub-clusters, green for Versicolor and Virginica sub-clusters, and
    blue for the top-level merge connecting Setosa to the Versicolor-Virginica group.
    A red dashed horizontal line marks the cluster threshold at approximately d=7.1
    with a label on the right side. The Y-axis shows "Distance (Ward)" from 0 to 12
    with subtle gridlines. The X-axis shows "Sample" with individual sample labels
    rotated at ~45 degrees. Species group labels appear near the base of each cluster.'
