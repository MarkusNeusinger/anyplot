review:
  strengths:
  - Iris dataset provides realistic, neutral context
  - Species-colored branches semantically communicate cluster identity — color transitions
    from species to INK_SOFT on mixed merges is a clever design choice
  - Inline complete-linkage clustering correctly implemented without external dependencies
  - 'Full theme-adaptive chrome: all tokens correctly set for both renders'
  - Descriptive Y-axis label includes method name (complete linkage)
  - Correct title format with optional descriptive prefix
  - Top/right spines removed, subtle y-only grid, legend with elevated background
    frame
  weaknesses:
  - 'DE-01: Design polish could be elevated — typographic hierarchy is flat (all non-title
    labels at 12-14pt); consider slightly larger axis labels (16pt) vs tick labels
    (11pt) to create a clearer hierarchy'
  - 'LM-02: The dendrogram is drawn entirely with generic lines!() calls; no Makie-specific
    recipe or layout feature beyond fig[1,1]/fig[1,2] and LineElement legend — missed
    opportunity to demonstrate Makie distinctiveness (e.g., using Observable reactivity
    pattern, Makie recipes, or interactive annotation even if static)'
  - 'CQ-04: Inline clustering loop is functionally correct but verbose (~30 lines);
    a helper Dict comprehension or zip-based approach could condense it'
  - 'VQ-05: Upper portion of y-axis (~0.12 × max_height buffer) creates noticeable
    empty space in the top half of the plot area; ylims upper bound could be tightened
    slightly or a subtitle annotation added to fill the space meaningfully'
  - 'VQ-01: xticklabelsize=10 is slightly small for 15 labels at 3200px canvas — increase
    to 11-12pt for better mobile readability'
