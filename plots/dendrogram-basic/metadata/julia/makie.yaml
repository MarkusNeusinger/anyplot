review:
  strengths:
  - Custom hierarchical clustering implemented from scratch in pure Julia — correct
    complete-linkage agglomerative algorithm with proper DFS leaf ordering
  - Branch segments are individually colored by species purity (single-species subtrees
    share the species color; cross-species merges use INK_SOFT) — sophisticated visualization
    technique
  - vspan! background bands per species group add visual depth and reinforce cluster
    identity at 7% alpha — distinctively Makie
  - 'Full theme adaptation: all chrome tokens (title, axis labels, tick labels, spines,
    legend, grid) flip correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Canvas correctly targets 3200×1800 px via Figure(size=(1600,900)) + px_per_unit=2
  - Clean Legend with LineElement handles shows all four visual categories (3 species
    + Mixed)
  - xgridvisible=false keeps only the y-grid, reducing clutter on a chart where x-positions
    are purely ordinal
  weaknesses:
  - 'Palette order deviation: Versicolor assigned IMPRINT_PALETTE[3] (#4467A3 blue)
    and Virginica assigned IMPRINT_PALETTE[2] (#C475FD lavender), swapping positions
    2 and 3. Iris species have no strong real-world color associations, so canonical
    1→2→3 order should be used: Setosa=#009E73, Versicolor=#C475FD, Virginica=#4467A3.'
  - Leaf node markers (markersize=9) and internal merge node markers (markersize=7)
    are very small relative to the 3200×1800 canvas — they add subtle polish but are
    barely distinguishable at thumbnail scale. Consider markersize=12 for leaves and
    markersize=9 for internals.
  - Design Excellence is solid but not exceptional — the chart is functional and well-styled
    but lacks a clear focal point or annotation that draws the viewer to the key story
    (e.g., the late Setosa merge indicating it is the most distinct species).
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "Iris Clustering · dendrogram-basic · julia · makie · anyplot.ai" in dark INK (#1A1A17), clearly readable. X-axis label "Sample" and Y-axis label "Distance (complete linkage)" in dark INK. Tick labels (Se1–Se5, Ve1–Ve5, Vi1–Vi5 on x; 0, 2, 4 on y) in INK_SOFT (#4A4A44), readable. Top and right spines removed; left and bottom spines in INK_SOFT. Subtle y-only grid at 15% opacity.
      Data: Setosa subtree branches in #009E73 (brand green), Versicolor subtree in #4467A3 (blue), Virginica subtree in #C475FD (lavender). Cross-species merge branches rendered in INK_SOFT (dark gray). Three species background bands via vspan! at 7% alpha add soft colored fills behind each group. Small dot markers at leaf (markersize=9) and internal merge nodes (markersize=7). Legend on right shows all four categories with LineElement handles.
      Legibility verdict: PASS — all title, axis labels, and tick labels are clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title in light INK (#F0EFE8), clearly readable against dark background. Axis labels in INK token (light cream). Tick labels in INK_SOFT (#B8B7B0, light gray) — readable, no dark-on-dark failure. Spines and grid lines adapt correctly to dark chrome tokens.
      Data: Data colors are identical to light render — Setosa branches in #009E73, Versicolor in #4467A3, Virginica in #C475FD. Mixed/cross-species branches in INK_SOFT (#B8B7B0, light gray in dark mode) — clearly visible against dark background. Species background vspan bands appear as subtle dark-tinted overlays. Legend background uses ELEVATED_BG (#242420) with light label text.
      Legibility verdict: PASS — all text elements are readable against the dark background. No dark-on-dark failures observed.
