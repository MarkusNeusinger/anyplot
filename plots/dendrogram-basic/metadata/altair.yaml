review:
  strengths:
  - Excellent cluster-based branch coloring that visually communicates the hierarchical
    grouping structure
  - Interactive legend selection allowing species-level focus is a distinctive Altair
    feature
  - Proper use of scipy dendrogram with no_plot=True for data extraction then faithful
    Altair rendering
  - Clean species-colored leaf markers with white stroke for visual separation
  - Threshold reference line with label adds interpretive context
  weaknesses:
  - Leaf label font size (13pt) is too small for the canvas size — should be at least
    15-16pt
  - Some leaf labels in the middle section overlap due to density and rotation angle
  - Bottom margin is tight for the rotated leaf labels
  image_description: 'The plot shows a dendrogram of 15 iris flower samples (5 each
    of Setosa, Versicolor, Virginica) clustered using Ward''s method. Branches are
    colored by cluster assignment: blue (#306998) for Setosa, gold (#D4A017) for Versicolor/Virginica
    sub-clusters, and gray (#888888) for the top-level merge connecting the two major
    groups. A red dashed line at distance 5.0 marks the cluster threshold with an
    italic "cluster threshold" label. Leaf labels are rotated at ~45 degrees, colored
    by species, with filled circular markers at the base. The y-axis reads "Distance
    (Ward''s method)" with subtle dashed gridlines. A legend on the right shows three
    species with colored circles. Title reads "dendrogram-basic · altair · pyplots.ai"
    in the top-left. The Setosa group clearly separates at a high distance (~10.3)
    from the Versicolor/Virginica group, which itself splits around distance ~4.8.'
