review:
  strengths:
  - Excellent cluster-based branch coloring that propagates through the linkage hierarchy
    — makes species groupings immediately visible
  - Interactive legend selection (click to highlight species) leverages Altair declarative
    interactivity
  - Threshold reference line with annotation adds interpretive context
  - Clean, well-structured code that handles the complexity of building a dendrogram
    from scratch in Altair
  - Real Iris dataset provides meaningful, neutral scientific context
  weaknesses:
  - Leaf label font size (13pt) is slightly small for the canvas dimensions — could
    be 15-16pt
  - Design could push further with background color, more dramatic spine treatment,
    or annotation of key merge points
  - Some lower-distance merges have very short line segments that are harder to distinguish
  image_description: 'The plot displays a dendrogram of 15 iris flower samples clustered
    using Ward''s linkage method. The tree structure shows branches colored by cluster
    membership: blue (#306998) for Setosa (5 samples on the left), gold (#D4A017)
    for Versicolor (5 samples in the middle), and purple (#7B68AE) for Virginica (5
    samples on the right). Gray branches appear where mixed clusters merge at the
    top (~10.3 distance). A dashed red horizontal line at distance 5.0 marks the cluster
    threshold, labeled "cluster threshold" in italic red text. Leaf labels are rotated
    ~315 degrees at the bottom, colored by species, with filled circular markers at
    each leaf position. A subtitle reads "Ward''s linkage on Iris measurements — Setosa
    separates clearly from Versicolor/Virginica". The y-axis shows "Distance (Ward''s
    method)" from 0 to 12. A legend on the right identifies the three species with
    colored dots. The overall layout is clean with subtle grid lines and no axis frame.'
