review:
  strengths:
  - Excellent manual dendrogram construction — correctly implements U-shaped segments,
    leaf ordering, and node positioning from scratch since pygal lacks native dendrogram
    support
  - Perfect spec compliance with proper title format, realistic iris data, and correct
    hierarchical clustering
  - Clean, well-structured code with proper seed and explicit font sizing for the
    canvas dimensions
  - Good data choice — iris species create naturally meaningful clusters
  weaknesses:
  - No color differentiation between species clusters — all branches are the same
    blue, missing an opportunity for visual storytelling
  - Design is clean but generic — no visual hierarchy or emphasis to guide the viewer
    to the key Setosa separation
  - Library mastery is limited — mostly using basic XY plotting without leveraging
    distinctive pygal features
  - Right edge slightly crowded with the last label
  image_description: The plot displays a vertical dendrogram on a white background
    with blue (#306998) U-shaped branch lines. The title reads "Iris Species Clustering
    · dendrogram-basic · pygal · pyplots.ai" at the top. The x-axis labeled "Sample"
    shows 15 rotated labels (Setosa-1 through Setosa-5, Virginica-1 through Virginica-5,
    Versicolor-1 through Versicolor-5) in dendrogram leaf order. The y-axis labeled
    "Distance (Ward's Method)" ranges from 0 to 10. The hierarchical structure clearly
    shows Setosa samples clustering together on the left, then Virginica and Versicolor
    intermixing on the right, with a final merge at distance ~10 joining Setosa to
    the Virginica/Versicolor supercluster. Subtle horizontal gray grid lines appear
    on y-axis guides only. Branch heights are proportional to merge distances.
