  image_description: 'The plot displays a dendrogram of Iris species hierarchical
    clustering using pygal''s XY chart. The x-axis shows 15 sample labels (5 each
    of Setosa, Virginica, Versicolor) rotated at 45°, labeled "Sample". The y-axis
    shows "Distance (Ward''s Method)" from 0 to 10. U-shaped connectors represent
    cluster merges: blue (#306998) for Setosa intra-cluster merges (~0.3–1.1), green
    (#5BA55B) for Virginica (~0.5–1.5), orange (#E07A2F) for Versicolor (~0.5–1.7),
    and gray (#888888) for inter-cluster merges. Virginica and Versicolor merge at
    ~4.1, then join Setosa at ~10. The background is white with a light gray (#fafafa)
    plot area and subtle horizontal grid lines. A bottom legend shows all four color
    categories. Title reads "Iris Species Clustering · dendrogram-basic · pygal ·
    pyplots.ai".'
