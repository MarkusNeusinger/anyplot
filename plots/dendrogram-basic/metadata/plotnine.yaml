  image_description: 'The plot shows a dendrogram (hierarchical clustering tree) of
    15 iris flower samples (5 each of Setosa, Versicolor, and Virginica). The Y-axis
    displays "Ward Linkage Distance" ranging from 0 to ~11. The tree structure has
    species-colored branches: blue (#306998) for Setosa clusters on the left, green
    (#55A868) for Virginica in the middle and far right, orange (#E8833A) for Versicolor
    in the center-right, and grey (#888888) for mixed-species merges at the top level.
    A legend on the right shows "Branch Type" with entries for Setosa (pure), Versicolor
    (pure), Virginica (pure), and Mixed species. A dashed horizontal line near y≈10.5
    is annotated with "Setosa separates." Leaf labels are rotated 45° at the bottom,
    colored by species. The title reads "Iris Species Clustering · dendrogram-basic
    · plotnine · pyplots.ai". The background is clean white with minimal, subtle horizontal
    gridlines on the y-axis only.'
