review:
  strengths:
  - Complete-linkage hierarchical clustering implemented from scratch in pure JavaScript
    — no external scipy dependency, fully self-contained and deterministic
  - Expert use of MUI X coordinate hooks (useXScale, useYScale, useDrawingArea) to
    draw dendrogram branches precisely aligned to the chart's coordinate system
  - Species-colored leaf dots using Imprint palette positions 1–3 in canonical order
    create effective visual hierarchy — viewer immediately sees setosa cluster vs
    versicolor/virginica group
  - 'Both renders theme-adapt correctly: branch lines use t.ink (dark on light, light
    on dark), custom Legend uses t.ink for text, backgrounds match #FAF8F1 / #1A1A17'
  - Iris dataset is an ideal, scientifically neutral context for a dendrogram — labels
    (S-01…Vi-05) are compact and readable at -45° rotation, distance scale (0–5.5
    Euclidean) is factually correct
  weaknesses:
  - 'Design could be elevated: the dendrogram branches use a flat ink stroke with
    no color differentiation by cluster depth or species group — coloring sub-tree
    branches by the dominant species assignment would reinforce the visual story without
    adding complexity'
  - The chart has a large right-margin blank zone (~190 CSS px) above the legend;
    the legend items (3 rows) occupy only the top ~100 px of that 800+ px tall column
    — repositioning the legend closer to the data (e.g. top-left inset or embedded
    along the top of the dendrogram) would reduce visual imbalance
  - Y-axis label 'Distance (Complete Linkage)' at 15 CSS px is at the low end of the
    recommended range — bumping to 16–17 px would improve readability when scaled
    to mobile widths
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, no pure white.
      Chrome: Title "dendrogram-basic · javascript · muix · anyplot.ai" in bold dark ink, clearly readable, spans ~65% of canvas width. Y-axis label "Distance (Complete Linkage)" rotated 90°, readable though compact. X-axis tick labels (S-05, S-01, … Vi-05) rotated -45°, dark, well-spaced and readable. Y-axis ticks (0 to 5.5 in 0.5 steps) dark and clear. Legend in top-right margin shows three labeled species with colored circles — text in dark ink, readable.
      Data: Dendrogram branches drawn in dark ink (#1A1A17), strokeWidth=2, clean right-angle topology. Leaf dots: Iris setosa (#009E73 green, positions S-*), Iris versicolor (#C475FD lavender, Ve-*), Iris virginica (#4467A3 blue, Vi-*). Setosa cluster is tightly grouped on the left (merge height ~1.1); versicolor and virginica interleave with one virginica (Vi-02) adjacent to the versicolor group. Horizontal grid lines are subtle and unobtrusive.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title in light text (#F0EFE8) clearly visible on dark background. Y-axis label and all tick labels are light-colored on dark background — no dark-on-dark failure. Legend text renders in t.ink = #F0EFE8 (light). Grid lines are subtle light rules on dark surface.
      Data: Branch lines render in t.ink (#F0EFE8) — white/cream lines on dark background, clearly visible. Leaf dot colors are identical to the light render: #009E73 (setosa), #C475FD (versicolor), #4467A3 (virginica). Data color identity between light and dark confirmed.
      Legibility verdict: PASS — all chrome flips correctly; no dark-on-dark elements detected; data colors unchanged.
