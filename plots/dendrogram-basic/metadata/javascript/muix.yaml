review:
  strengths:
  - Correctly implements complete-linkage hierarchical clustering in pure JavaScript
    — the algorithm is accurate and deterministic
  - Species-colored leaf dots and labels provide immediate visual insight into how
    clusters map to the three iris species
  - 'Full theme-adaptivity: pageBg, ink, inkSoft, grid tokens used throughout; dark
    render has light-colored chrome with no dark-on-dark failures'
  - Imprint palette applied in canonical order (green→lavender→blue) for the three
    species
  - Clean Y-axis with descriptive label 'Distance (Complete Linkage)', proper tick
    values, and subtle horizontal grid lines
  - 'Correct title format: dendrogram-basic · javascript · muix · anyplot.ai'
  - All font sizes explicitly set; readable at full resolution in both light and dark
    themes
  weaknesses:
  - No MUI X chart components used — the entire chart is rendered as raw SVG without
    importing any @mui/x-charts components. Per muix.md, dendrograms are outside MUI
    X community scope; the implementation should either return NOT_FEASIBLE or use
    MUI X line/scatter chart to approximate the tree structure. Using pure SVG drops
    Library Mastery to near zero.
  - 'LM-01/LM-02: Scores 1/5 each because the implementation bypasses the MUI X chart
    API entirely. Even if SVG is necessary, the harness scaffold exists to use @mui/x-charts
    primitives.'
  - 'CQ-01 deduction: module-level helper functions (euclid, buildTree, leafOrder,
    assignX, getSegments) deviate from the KISS flat-script pattern; acceptable for
    complexity but worth noting.'
  - 'DE-01 (5/8): The design is polished but not publication-ready — no subtle visual
    differentiation between the three species cluster branches (all rendered with
    the same t.ink color); coloring the branch strokes by the dominant species of
    the subtree would add professional sophistication.'
  - 'DE-02 (4/6): Bottom portion of the canvas (below leaf labels) contains substantial
    empty whitespace — could reduce bottom margin or add a subtle baseline rule to
    tighten the layout.'
  - 'DE-03 (4/6): No annotations or callout highlighting the major merge events (e.g.,
    where Setosa finally joins Versicolor+Virginica) to guide the viewer''s interpretation.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white consistent with #FAF8F1 — correct light surface.
      Chrome: Title "dendrogram-basic · javascript · muix · anyplot.ai" in bold dark ink, well-centred, ~65% of canvas width. Y-axis label "Distance (Complete Linkage)" rotated 90°, dark ink, readable. Y-axis tick labels (0.00, 1.11, 2.21, 3.32, 4.42, 5.53) in dark-soft ink, clearly readable. Horizontal grid lines are very subtle (low-alpha grid token). All chrome text reads cleanly against the off-white background — no light-on-light failures.
      Data: Dendrogram branches rendered in dark ink (t.ink). Leaf dots radius 6, coloured by species: Iris setosa green (#009E73), Iris versicolor lavender (#C475FD), Iris virginica blue (#4467A3). Rotated -45° leaf labels match species colour. Legend top-right with three circle+label rows. Clustering structure clearly shows Setosa on the far left as a well-separated group, while Versicolor and Virginica share a closer sub-tree.
      Legibility verdict: PASS — all text elements are readable; no overlap detected.

    Dark render (plot-dark.png):
      Background: Warm near-black consistent with #1A1A17 — correct dark surface.
      Chrome: Title, Y-axis label, and tick labels all rendered in light ink (F0EFE8 / B8B7B0) — clearly visible against the dark surface. No dark-on-dark failures. Horizontal grid lines use the dark-theme grid token (low-alpha light rule) — subtle but present.
      Data: Dendrogram branches now render in light ink (white/near-white), clearly distinguishable from the dark background. Leaf dots and labels retain identical species colours (green, lavender, blue) — no hue shift between themes. Legend text in light ink, readable.
      Legibility verdict: PASS — all chrome adapts correctly to the dark surface; no unreadable elements identified.
