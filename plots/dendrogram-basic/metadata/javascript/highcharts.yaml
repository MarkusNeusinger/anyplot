review:
  strengths:
  - Expert use of Highcharts SVG renderer (render event, axis.toPixels, renderer.path/circle/text,
    group destroy/recreate) to implement a dendrogram not in the core bundle — exactly
    the right approach
  - Semantic two-color scheme using Imprint palette positions 1 (#009E73) and 3 (#4467A3)
    makes clusters immediately distinguishable before any label is read
  - Inline cluster labels in matching colors ('Data Science', 'Systems & Web') provide
    instant data storytelling without a legend
  - All font sizes explicitly set; both light and dark themes fully readable with
    correct warm-off-white / warm-near-black backgrounds and theme-adaptive chrome
  - Deterministic hard-coded data with a meaningful real-world domain (programming
    language paradigm clustering) — realistic and neutral
  weaknesses:
  - Leaf dots at radius:5 CSS px are slightly small on the 1600-px mount — increase
    to radius:7 for better visual weight
  - Leaf labels and inline cluster labels at 13px are at the lower end of the recommended
    range — bump to 14px for improved mobile readability
  - marginRight:30 is tight relative to the rotated C++ leaf label — increase to marginRight:50
    to add breathing room on the right edge
