review:
  strengths:
  - Semantic Imprint palette assignment — cool climates = brand green (#009E73), warm
    climates = ochre (#BD8233) — is both visually intuitive and palette-compliant
  - Subtitle adds meaningful context below the mandated title
  - Per-node italic cluster labels (Nordic, Temperate, Mediterranean, Tropical) add
    hierarchical interpretation without cluttering leaf nodes
  - Both themes fully pass readability checks — all chrome uses t.ink/t.inkSoft tokens
    correctly
  - 'Data context is excellent: 12 real-world cities in geographically accurate climate
    groups'
  - 'expandAndCollapse: false and roam: false correctly disable interactive features
    for static PNG output'
  weaknesses:
  - Branch heights are uniform (ECharts tree uses level-based spacing), not proportional
    to merge distances as the spec requests — this is an ECharts structural limitation,
    acknowledged in the code comment, but it is a spec gap
  - Helper functions city() and clusterLabel() deviate from strict KISS structure
    (no-functions pattern)
  - Cluster labels at fontSize 12px CSS are the smallest text element; borderline
    at mobile scale (~400px viewport)
  - 'LM-02: color cascading to descendant edges requires verbose per-node lineStyle
    repetition rather than a native ECharts inheritance mechanism — limits how distinctive
    the usage feels'
  image_description: |-
