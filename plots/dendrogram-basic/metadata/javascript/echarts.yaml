review:
  strengths:
  - 'Excellent semantic color coding: brand green (#009E73) for cool climates and
    Imprint ochre (#BD8233) for warm climates — intuitive real-world color mapping
    that immediately communicates the two main groups'
  - Both light and dark themes render correctly with warm off-white / near-black backgrounds,
    and all chrome (title, subtitle, legend) is properly theme-adaptive
  - Clean minimal design with no unnecessary axes or grid lines — appropriate for
    a dendrogram where the tree topology is the message
  - Factually accurate geographical climate groupings (Nordic, Temperate, Mediterranean,
    Tropical) with 12 real-world cities spanning the full cool-to-warm spectrum
  - 'Correct ECharts idioms: animation: false, transparent background, no explicit
    devicePixelRatio, expandAndCollapse: false to prevent interactive collapse'
  weaknesses:
  - 'Leaf city labels (fontSize: 14) become very small at 400px mobile viewport —
    the 400px thumbnail shows barely readable city names; increase leaf label fontSize
    to 16-18 to improve mobile legibility'
  - 'No quantitative distance axis: a true dendrogram shows merge distances proportionally
    on an axis (e.g., X-axis for horizontal layout), but the ECharts tree chart shows
    topology only; consider adding a schematic distance axis or horizontal scale ticks
    to convey the distance-proportional meaning'
  - 'Code verbosity: lineStyle and itemStyle are set individually on all 12 leaf nodes;
    test whether ECharts tree inherits these from parent branch nodes and remove per-leaf
    overrides if they are unnecessary'
  - 'DE-01 opportunity: design is clean and correct but the two-color dendrogram could
    be elevated with sub-group labels (e.g., ''Nordic'', ''Temperate'') shown as subtle
    annotations near the branch nodes, adding interpretive hierarchy without clutter'
  - The semantic exception for ochre (palette[3] for 'Warm Climates') is valid, but
    skipping palette[1] and palette[2] should be noted; canonical order would use
    palette[0] (green, used) and palette[1] (lavender) — the semantic override to
    ochre for warmth is correct but worth confirming the intent is clear
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white.
      Chrome: Title "dendrogram-basic · javascript · echarts · anyplot.ai" centered, bold, clearly dark text. Subtitle "Hierarchical clustering of 12 world cities by climate profile" in softer dark tone. Bottom-left custom legend with colored circle swatches labeled "Cool Climates" and "Warm Climates" — all readable.
      Data: Horizontal left-to-right tree. Root node at far left, two main branches diverging — upper branch in brand green (#009E73, Cool Climates: Oslo, Stockholm, Helsinki, London, Paris, Amsterdam), lower branch in Imprint ochre (#BD8233, Warm Climates: Barcelona, Rome, Athens, Singapore, Bangkok, Mumbai). Node circles at 8px, branch lines at 1.8px width. City name labels at 14px on the right side, readable at full resolution.
      Legibility verdict: PASS at desktop. MARGINAL at 400px mobile — city labels become very small (≈3px rendered), barely readable at mobile viewport.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title and subtitle text are light-colored and clearly visible against the dark background. Legend labels ("Cool Climates", "Warm Climates") are light-toned. No dark-on-dark failure observed — all text reads comfortably against the near-black surface.
      Data: Colors are identical to the light render — brand green for cool branch, ochre for warm branch, confirming Imprint data colors are theme-independent. Node and line colors unchanged.
      Legibility verdict: PASS at desktop. Same mobile-scale concern as light render (small leaf labels).
