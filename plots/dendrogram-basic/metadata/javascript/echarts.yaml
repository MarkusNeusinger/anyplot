      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, not pure white.
      Chrome: Title "dendrogram-basic · javascript · echarts · anyplot.ai" in dark ink (~22px CSS), readable. Subtitle "Hierarchical clustering of 12 world cities by climate profile" in inkSoft below. Custom graphic legend at bottom-left shows green/ochre circles with "Cool Climates" / "Warm Climates" labels — readable.
      Data: Two color families — brand green (#009E73) for Cool Climates branch (Oslo, Stockholm, Helsinki, London, Paris, Amsterdam) and ochre (#BD8233) for Warm Climates branch (Barcelona, Rome, Athens, Singapore, Bangkok, Mumbai). Italic cluster labels (Nordic, Temperate, Mediterranean, Tropical) annotate mid-level nodes. Leaf city names labeled to the right at fontSize 17.
      Legibility verdict: PASS — all text readable, no light-on-light issues, no overflow.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title and subtitle use light ink (t.ink = #F0EFE8 on dark) — clearly readable against dark background. Leaf city labels use t.inkSoft (#B8B7B0 on dark) — readable. Legend circles and text visible. No dark-on-dark failures.
      Data: Data colors are identical to light render — brand green (#009E73) for cool climates, ochre (#BD8233) for warm climates. Color identity across themes confirmed.
      Legibility verdict: PASS — all text readable, chrome correctly adapts to dark surface, data colors unchanged.
