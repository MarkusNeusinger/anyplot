review:
  strengths:
  - Implements full agglomerative (average-linkage) clustering from scratch in plain
    JS — deterministic, self-contained, and correct
  - 'Semantic color coding: species-specific sub-clusters use Imprint palette (green/lavender/blue),
    mixed-species merges flip to theme-adaptive inkSoft — an elegant design decision
    that encodes hierarchy semantically'
  - Creative use of Chart.js scatter + showLine with one dataset per bridge segment
    to render U-shaped connectors — non-trivial idiom that bypasses the library's
    chart-type limit
  - afterBuildTicks callback with custom label formatter correctly maps leaf positions
    to species names in DFS order
  - 'Both themes pass legibility check: correct pageBg (#FAF8F1 / #1A1A17), all chrome
    (title, axis labels, ticks) adapts correctly via tokens'
  - Real iris-dataset context with realistic Euclidean distances — scientifically
    grounded and neutral
  weaknesses:
  - 'Both X and Y gridlines are shown — for a dendrogram, only horizontal (Y-axis)
    gridlines help read merge heights; vertical gridlines add visual noise. Remove
    x-axis grid with `grid: { display: false }` on the x scale.'
  - X-axis tick font size is 13px, one px below the recommended 14px for the JS browser
    harness — raise to 14 for consistency.
  - 'No spine removal — Chart.js defaults to borders on all active axes. Setting `border:
    { display: false }` and relying only on the axis line (or using `display: false`
    for x-border) would give a cleaner L-shape aesthetic more aligned with the style
    guide.'
  - 'DE-01 and DE-02 have room to improve: the inter-species bridge color shift is
    thoughtful but the overall layout lacks the final polish pass (e.g. more generous
    top/bottom padding, removing x-axis gridlines, slightly larger title padding)
    that would elevate it to publication-ready.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct pageBg for light theme
      Chrome: Title "dendrogram-basic · javascript · chartjs · anyplot.ai" centered at top, dark ink color, clearly readable (~60% plot width). Y-axis title "Euclidean Distance" rotated, readable. X-axis tick labels (12 iris specimens, rotated 45°) readable. Y-axis ticks (0–4.9) readable in dark inkSoft color. Both-axis gridlines visible and subtle.
      Data: Setosa sub-clusters rendered in #009E73 (brand green, palette[0]). Versicolor sub-clusters in #C475FD (lavender, palette[1]). Virginica sub-clusters in #4467A3 (blue, palette[2]). Cross-species bridge segments rendered in t.inkSoft (~#4A4A44, dark gray) — the color shift at merge boundaries is semantically meaningful and visually clear.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct pageBg for dark theme
      Chrome: Title, y-axis title, axis tick labels all rendered in light ink colors (F0EFE8/B8B7B0 range) — clearly readable against dark background. Grid lines are subtle light-colored lines. No dark-on-dark failures detected.
      Data: Setosa green, Versicolor lavender, Virginica blue — all identical to light render (only chrome flips). Cross-species bridges now render in t.inkSoft dark (#B8B7B0, light gray) — remains clearly visible on dark surface and still semantically distinct from colored species branches.
      Legibility verdict: PASS — all text readable against near-black background; no dark-on-dark issues; brand green #009E73 remains visible
