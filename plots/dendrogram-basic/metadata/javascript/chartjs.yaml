review:
  strengths:
  - Implements complete average-linkage agglomerative clustering algorithm from scratch
    in JavaScript — technically impressive and fully reproducible
  - 'Smart use of Imprint palette: species-specific branches colored in palette[0-2],
    cross-species structural bridges use inkSoft for clear visual differentiation'
  - Both light and dark themes render correctly with proper theme-adaptive chrome
    throughout — no dark-on-dark failures
  - 'Correct Chart.js idioms: scatter+showLine, afterBuildTicks for custom tick placement,
    per-dataset colors, animation: false'
  weaknesses:
  - '"Versiclr" is a typo in the hardcoded data labels — should be "Versicolor" (affects
    all 4 Versicolor x-axis tick labels)'
  - 'No color legend: viewers must infer species-color mapping from leaf label names,
    which is workable but not immediately obvious when looking at the tree structure
    above'
  - Cross-species inkSoft bridges appear more visually prominent in dark mode (light
    grey) than in light mode (dark charcoal), creating slight weight imbalance between
    themes
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct per style guide
      Chrome: Title "dendrogram-basic · javascript · chartjs · anyplot.ai" in dark ink at top, readable. Y-axis label "Euclidean Distance" in dark ink, clearly legible. X-axis tick labels rotated 45° (specimen names), Y-axis tick labels 0–4.9, both in inkSoft — all readable.
      Data: Setosa cluster (left 4 leaves) in brand green #009E73 (palette[0]). Versicolor cluster (center 4 leaves) in lavender #C475FD (palette[1]). Virginica cluster (right 4 leaves) in blue #4467A3 (palette[2]). Cross-species bridges in inkSoft #4A4A44 (dark charcoal). Proportional branch heights correctly encode Euclidean distances.
      Note: "Versiclr" typo in hardcoded labels (should be "Versicolor")
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct per style guide
      Chrome: Title in light text (#F0EFE8 range), axis labels in inkSoft #B8B7B0 — all clearly legible on dark surface. No dark-on-dark failures found.
      Data: Colors identical to light render — Setosa green, Versicolor lavender, Virginica blue. Cross-species bridges now in inkSoft #B8B7B0 (light grey), slightly more visually prominent than in light mode but remains correct behavior.
      Legibility verdict: PASS — all text clearly readable against near-black background
