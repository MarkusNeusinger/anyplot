review:
  strengths:
  - 'Creative, technically sound solution to Chart.js''s uniform-bar-width limitation:
    a fine zero-gap category grid renders genuinely variable-width columns proportional
    to each region''s total revenue, with a blank slot standing in for the mekko gap
    between columns.'
  - Contrast-aware callout labels use a WCAG relative-luminance calculation to pick
    cream or ink text per segment color, so the '$210M · 42%' style labels stay legible
    on green, lavender, and blue alike in both themes.
  - Region data is deliberately differentiated (hardware-led North America/Asia Pacific,
    software-led Europe, services-led Latin America), giving the chart a real composition
    story instead of four identical splits.
  - Correct Imprint palette order (green, lavender, blue) confirmed identical across
    light/dark; theme-adaptive chrome (ink, grid, background) is correctly threaded
    through title/legend/axes.
  - Adaptive label text (falls back from '$210M · 42%' to '42%') avoids clipping/overflow
    inside narrower segments.
  weaknesses:
  - Only the single largest segment per region gets a value callout; smaller segments
    (e.g. Europe's Hardware/Services slices) have no label at all, so the spec's 'value
    labels on larger segments' is only partially realized — consider labeling any
    segment above a minimum width, not just the top one per column.
  - The `relativeLuminance` helper plus the `afterDatasetsDraw` plugin add real logic
    beyond the Imports → Data → Plot script shape the code-quality rubric prefers
    for a 'basic' spec entry — justified by the contrast feature, but worth noting
    as a minor KISS deviation.
  - The variable-width bar effect is achieved through a manual 100-slot category grid
    rather than a native Chart.js layout primitive; worth double-checking that very
    small regions still get at least one grid slot so they don't disappear at more
    extreme total-value ratios.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "marimekko-basic · javascript · chartjs · anyplot.ai" in bold dark ink, centered top. Legend below title (Hardware/Software/Services swatches + labels) in dark ink. Y-axis ticks (0%/25%/50%/75%/100%) and axis title "Share of Region Revenue" in dark/soft-dark ink. X-axis region labels (North America, Europe, Asia Pacific, Latin America) centered under each variable-width bar, with axis title "Region — bar width ∝ total revenue" below. All chrome is clearly readable against the light background.
      Data: Four stacked-bar "columns" of different widths (North America widest, Latin America narrowest), each split into three colored segments: Hardware (brand green #009E73, bottom), Software (lavender #C475FD, middle), Services (blue #4467A3, top). One callout label per region ("$210M · 42%", "$190M · 63%", "$100M · 43%", "$60M · 60%") sits on that region's largest segment, in cream or dark text depending on the segment's background luminance — all legible. First series is confirmed #009E73.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, legend, and axis labels now rendered in light ink/cream, clearly readable against the dark background. Grid line on the y-axis is subtle. No dark-on-dark text found anywhere (title, ticks, axis titles, legend, x-axis region names all light and legible).
      Data: Same three segment colors (green/lavender/blue) and callout labels as the light render — confirmed identical data colors, only chrome (background, text) flipped. Callout text contrast logic still picks legible text color per segment.
      Legibility verdict: PASS
