review:
  strengths:
  - Clean, idiomatic Chart.js implementation with correct Imprint palette order (#009E73,
    purple, blue) and theme-correct chrome in both renders
  - The fine zero-gap grid (barPercentage/categoryPercentage) that simulates variable-width
    Marimekko columns is a well-documented, genuine engineering solution to Chart.js's
    uniform-bar-width limitation, not a fake/plugin workaround
  - All font sizes explicitly set; no overlap, no clipping, no dark-on-dark or light-on-light
    failures in either theme
  - Title exactly matches the mandated format; legend labels match the dataset
  - Custom tooltip callbacks surface region, product, dollar value, and percentage
    share for the interactive HTML view
  weaknesses:
  - Product-mix composition is nearly identical across all four regions (Hardware
    ~25-37%, Software ~43-56%, Services ~18-20% everywhere) — the cross-tabulation
    story a Marimekko chart is meant to tell (composition differs across unevenly-sized
    groups) is muted because every column looks like a scaled copy of the others.
    Vary the shares more distinctly per region (e.g. make one region services-heavy,
    another hardware-heavy) so the composition differences are visually obvious, not
    just the widths.
  - No visual hierarchy or emphasis beyond the flat color blocks — no highlighted
    segment, no value/dollar callout on the larger segments, no annotation. Data storytelling
    stays at the default level.
  - The spec suggests 'value labels on larger segments for readability' — optional,
    but adding $ or % labels to the biggest segments (e.g. Software in each region)
    would strengthen both readability and storytelling at low cost.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "marimekko-basic · javascript · chartjs · anyplot.ai" in bold dark ink at top-center; legend swatches (Hardware/Software/Services) directly below the title; dark-ink axis titles ("Region — bar width ∝ total revenue" on X, "Share of Region Revenue" on Y); soft grey-brown tick labels (0/25/50/75/100% on Y, region names centered under each variable-width bar). All text is clearly legible against the light background.
      Data: Four stacked columns of very different widths (North America widest, Latin America narrowest) proportional to each region's total revenue. Each column is divided into three colored bands from bottom to top: green (#009E73, Hardware), purple/violet (Software), and blue (Services), with band heights proportional to each product's share of that region's revenue. A thin cream-colored gap separates adjacent columns.
      Legibility verdict: PASS — no overlap, no clipping at any canvas edge (checked North America/left and Latin America/right boundaries at pixel level), all labels readable.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, legend, and axis titles now rendered in light/white ink; tick labels in a lighter grey-brown tone. All chrome elements flipped appropriately for the dark surface.
      Data: Identical column widths, identical band heights, and identical data colors (#009E73 green, same purple, same blue) as the light render — confirmed pixel-for-pixel matching hues; only the chrome (background, text, grid) changed.
      Legibility verdict: PASS — no dark-on-dark failures; all title/axis/tick text is clearly visible light-on-dark; no clipping at either canvas edge.
