review:
  strengths:
  - Correctly solves the core-Highcharts limitation (no variwide/mekko module) by
    drawing segments as SVG rects positioned with axis.toPixels(), keeping the widths/heights
    mathematically exact against real linear axes rather than approximating with a
    native series type
  - Luminance-based label-color function guarantees every value label is readable
    against its own segment color in both themes, rather than a single hardcoded label
    color
  - Segment stroke color is bound to the page background token so dividers correctly
    flip between the light and dark cutout look
  - Axis-label formatter wraps each region name to that column's actual pixel width,
    preventing the narrowest column (Middle East & Africa) from overlapping its neighbor
  - Invisible scatter series at each segment centroid preserves real Highcharts legend/tooltip
    interactivity in the exported HTML despite the custom-drawn rectangles
  - 'Palette compliance is correct: first series is #009E73, colors identical between
    light/dark renders, chrome (background/text/grid) is the only thing that flips'
  - 'Spec compliance is thorough: bar width ∝ column total, segment height ∝ share
    within column, value labels present on segments, axis titles explain the width/height
    encoding'
  weaknesses:
  - No subtitle or annotation calling out the standout insight (e.g. Cloud Services'
    dominant share in North America/Asia Pacific) — a one-line subtitle would sharpen
    the data-storytelling focal point
  - X-axis category labels rely on useHTML wrapping with no visual tick marks; at
    very small (mobile ~400px) scale the two-line 'Middle East & Africa' label is
    legible but tight
  - Y-axis grid lines are present but the x-axis has none — an intentional design
    choice for this chart type, but worth a inline comment noting why so future edits
    don't 'fix' it by mistake
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1-consistent), not pure white, not dark.
      Chrome: Title "marimekko-basic · javascript · highcharts · anyplot.ai" in bold dark ink, clearly visible; x-axis title "Region — column width ∝ total regional revenue" and y-axis title "Share of Regional Revenue (%)" in soft ink, both legible; tick labels (region names, percentage ticks) legible in soft ink; legend at bottom with 4 swatches (Cloud Services, Software Licenses, Hardware, Professional Services) all legible.
      Data: Five variable-width columns (North America, Europe, Asia Pacific, Latin America, Middle East & Africa) each stacked with 4 colored segments (teal-green #009E73 = Cloud Services first series, violet = Software Licenses, blue = Hardware, amber = Professional Services). Segment area encodes both column width (regional total) and segment height (share within region). Every segment carries a "$XXXM" value label in white or near-black text depending on the segment's own luminance, always readable against its background. Thin light-colored strokes separate segments.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17-consistent), not pure black, not light.
      Chrome: Title, axis titles, and tick labels rendered in light/soft-light ink, all clearly visible against the dark background; legend swatches and labels legible; no dark-on-dark text anywhere.
      Data: Same column layout and identical segment colors as the light render (teal-green, violet, blue, amber) — only the chrome (background, text, divider stroke color, grid) flipped. Value labels remain readable (luminance-driven color choice holds in this theme too since it depends on segment color, not page theme). Thin dark strokes separate segments, correctly matching the dark page background token.
      Legibility verdict: PASS
