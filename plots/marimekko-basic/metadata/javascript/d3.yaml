review:
  strengths:
  - Genuine d3-hierarchy-based marimekko/mosaic tiling (d3.hierarchy + a custom dice-then-slice
    tile function built on d3.treemapDice/d3.treemapSlice) — the canonical, distinctive
    D3 technique for this chart type, directly addressing attempt 1's 'generic D3
    primitives' critique.
  - 'Design flourish: a dashed-outline callout box plus a ''LARGEST SEGMENT'' badge
    highlighting the single biggest segment across the whole dataset, giving the chart
    a clear focal point beyond a plain default marimekko.'
  - Reference quartile gridlines (25/50/75%) are now drawn above the bars at low opacity
    so they are actually visible — fixes attempt 1's issue where they were fully hidden
    underneath the opaque column rects.
  - 'Correct Marimekko encoding: bar widths proportional to each region''s total revenue,
    segment heights proportional to product-line share within the region, matching
    the spec''s core requirement exactly.'
  - 'Correct Imprint palette in canonical order (Software = #009E73 first, then lavender/blue/ochre),
    identical between light and dark renders — only chrome flips; theme-adaptive title/axis/tick/legend
    text threaded through t.ink/t.inkSoft throughout.'
  - Value labels adaptively suppressed on segments too small to hold them legibly
    (width > 140 && height > 90), avoiding clutter on the narrow Latin America column.
  - '''$XXXM total'' sub-labels bumped to 14px, fixing attempt 1''s borderline-13px
    mobile legibility note.'
  weaknesses:
  - All four regions share identical category rank-ordering (Software > Hardware >
    Services > Support) — reduces data realism/variety, carried over from attempt
    1's DQ-01 note. Vary at least one region's product mix (e.g. a region where Services
    or Hardware outranks Software) so the chart reads as more differentiated.
  - Two custom helper functions (regionTotal, marimekkoTile) are defined — justified
    and idiomatic for the d3.treemap().tile() API contract, but technically departs
    from the strict 'linear script, no functions' KISS guidance; minor deduction only.
  - Segment value-label and callout text use t.pageBg as fill, which flips to near-black
    in the dark theme; still legible on the saturated segment fills but has visibly
    lower contrast than the crisp white labels in the light render — consider a dedicated
    on-segment text token instead of reusing pageBg.
  - No explicit x-axis title (e.g. 'Region') — acceptable since category + total sub-labels
    serve that role per the spec, but leaves the axis pairing slightly asymmetric
    versus the explicitly labeled y-axis.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Bold dark title "marimekko-basic · javascript · d3 · anyplot.ai" centered at top; dark-ink x-axis category labels (North America, Europe, Asia Pacific, Latin America) in bold, with lighter-gray "$XXXM total" sub-labels beneath each; rotated y-axis title "Share of Regional Revenue" in soft ink; y-axis percentage ticks (0%-100%) in soft ink; legend (Software/Hardware/Services/Support swatches + labels) at far right in dark ink. All chrome is clearly readable against the light background.
      Data: Four variable-width stacked columns (Marimekko), widths proportional to each region's total ($840M/$600M/$500M/$180M), segment heights proportional to each product line's share. First series (Software) renders in Imprint brand green #009E73, followed by lavender (Hardware), blue (Services), and ochre (Support) — canonical Imprint order. Value labels ("$420M", "$150M", etc.) appear as white text inside the larger segments, clearly legible against the saturated fills. A dashed black outline plus "LARGEST SEGMENT" badge calls out the North America Software segment ($420M). Dashed quartile reference gridlines (25/50/75%) are visible crossing all four columns.
      Legibility verdict: PASS — all title, axis, tick, and legend text is clearly readable against the light surface; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, axis labels, tick labels, and legend text now rendered in light ink tones (white/light-gray), clearly legible against the dark surface. Rotated y-axis title and legend text also flip to light coloring correctly.
      Data: Data colors are identical to the light render (Software green #009E73, Hardware lavender, Services blue, Support ochre) — only chrome flipped, as required. Value labels and the "LARGEST SEGMENT" badge inside segments use a dark-ink fill (derived from the page-background token) which still reads clearly against the mid-to-high-saturation segment fills — legible, though noticeably lower contrast than the white labels in the light render. This is not a dark-on-dark failure since the labels sit on colored data fills, not on the page background itself. The dashed callout outline renders in a light color, clearly visible against the green segment.
      Legibility verdict: PASS — no dark-on-dark or light-on-light failures found; all chrome and data-embedded text remain legible in the dark theme.
