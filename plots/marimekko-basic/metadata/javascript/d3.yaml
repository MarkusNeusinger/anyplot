review:
  strengths:
  - 'Correct Marimekko encoding: bar widths proportional to each region''s total revenue,
    segment heights proportional to product-line share within the region — matches
    the spec''s core requirement exactly.'
  - Value labels are adaptively suppressed on segments too small to hold them legibly
    (col.width > 140 && height > 90), avoiding clutter on the narrow Latin America
    column.
  - 'Correct Imprint palette in canonical order (Software = #009E73 first, then lavender/blue/ochre)
    and identical between light and dark renders — only chrome flips.'
  - Theme-adaptive chrome (title, axis, tick, legend text) correctly threaded through
    t.ink / t.inkSoft tokens; legibility holds in both themes.
  - Columns are pre-sorted from largest to smallest region, reinforcing an implicit
    left-to-right visual hierarchy of declining total revenue.
  - Clean, idiomatic D3 data-join pattern (selection.data().join()) used consistently
    for columns, segments, and legend items.
  weaknesses:
  - 'Design Excellence sits close to library-default level: no strong custom flourish
    beyond the base marimekko encoding — consider emphasizing the largest segment/region
    (e.g. via weight, subtle callout, or an explicit ''largest market'' annotation)
    to push past ''correct but plain.'''
  - Reference quartile gridlines (25/50/75%) are drawn before the opaque column rects
    and are fully covered by them — visible only in the narrow 10px inter-column gaps,
    effectively invisible. Either z-order them above the bars at low opacity, or remove
    the dead code.
  - The '$XXXM total' sub-labels under each region name are set at 13px, below the
    ~14px JS-library baseline in the style guide — borderline legibility once scaled
    down to a ~400px mobile width.
  - Library Mastery usage is fairly generic D3 (scaleLinear/scaleOrdinal/axisLeft/selection.join)
    — none of D3's more distinctive modules (e.g. d3-hierarchy for a treemap-style
    layout, transitions, custom interpolators) are leveraged, making the implementation
    feel replicable in another charting library with minor syntax changes.
  - No explicit x-axis title (e.g. 'Region') — acceptable since region names + totals
    serve that role per the spec, but it leaves the axis pairing slightly asymmetric
    versus the y-axis's explicit label.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "marimekko-basic · javascript · d3 · anyplot.ai" centered at top; dark-ink x-axis category labels (North America, Europe, Asia Pacific, Latin America) in bold, with lighter-gray "$XXXM total" sub-labels beneath each; rotated y-axis title "Share of Regional Revenue" in soft ink; y-axis percentage ticks (0%-100%) in soft ink; legend (Software/Hardware/Services/Support swatches + labels) at far right in dark ink. All chrome is clearly readable against the light background.
      Data: Four variable-width stacked columns (Marimekko), widths proportional to each region's total ($840M/$600M/$500M/$180M), segment heights proportional to each product line's share. First series (Software) renders in Imprint brand green #009E73, followed by lavender (Hardware), blue (Services), and ochre (Support) — canonical Imprint order. Value labels ("$420M", "$150M", etc.) appear as light/off-white text inside the larger segments, clearly legible against the saturated fills. Thin light-colored strokes separate stacked segments.
      Legibility verdict: PASS — all title, axis, tick, and legend text is clearly readable against the light surface; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, axis labels, tick labels, and legend text now rendered in light ink tones (white/light-gray), clearly legible against the dark surface. Rotated y-axis title and legend text also flip to light coloring correctly.
      Data: Data colors are identical to the light render (Software green #009E73, Hardware lavender, Services blue, Support ochre) — only chrome flipped, as required. Value labels inside segments use a dark ink color (derived from the page-background token) which still reads clearly against the mid-to-high-saturation segment fills — this is not a dark-on-dark failure since the labels sit on colored data fills, not on the page background itself.
      Legibility verdict: PASS — no dark-on-dark or light-on-light failures found; all chrome and data-embedded text remain legible in the dark theme.
