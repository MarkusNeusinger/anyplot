review:
  strengths:
  - Correct hooks-based custom composition (useXScale/useYScale/useDrawingArea) —
    the idiomatic community-package way to build a mekko/mosaic chart type MUI X doesn't
    ship natively
  - 'Imprint palette applied in canonical order with the first series correctly at
    #009E73; data colors are pixel-identical between light and dark renders, only
    chrome flips'
  - 'Clever theme-robust label technique: segment value-labels are filled with t.pageBg
    (the page background color), so they read as white-on-color in light mode and
    near-black-on-color in dark mode — always legible against the vivid segment fills
    regardless of theme'
  - 'Realistic, well-varied retail dataset: column widths (total revenue) and segment
    shares genuinely differ across regions (e.g. South''s Apparel share exceeds Electronics,
    unlike the other four regions), avoiding a one-size-fits-all look'
  - Title format, legend labels, and axis (region names + % share + $ totals) all
    match the spec and are legible in both themes
  weaknesses:
  - 'Design Excellence is the weakest category: the flat rectangle composition reads
    as clean but standard rather than ''publication-ready'' — consider a subtle refinement
    pass (e.g. slightly softer divider strokes between segments, or a touch of depth/emphasis
    on the largest region) to lift DE-01 from ''strong'' toward ''exceptional'''
  - No visual emphasis calls out the standout insight (East is the clear revenue leader
    at $150M, nearly double the next-largest region) — a subtle color/weight accent
    or callout on that column would push Data Storytelling (DE-03) toward 'viewer
    immediately sees the insight'
  - The three static reference gridlines (25/50/75%) are useful but visually equal-weight
    to the segment dividers — lightening their opacity relative to the segment strokes
    would sharpen the structural hierarchy (chrome vs. data) for DE-02
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Dark-ink title ("Retail Revenue by Region & Product Line · marimekko-basic · javascript · muix · anyplot.ai"), dark legend text (Electronics/Apparel/Home Goods/Grocery with color swatches), dark region labels (North/South/East/West/Central) and dark column-total labels ($100M/$60M/$150M/$40M/$90M) above each bar, dark Y-axis percentage ticks (0%-100%) and a rotated "Share of Regional Revenue" axis label — all clearly legible against the light background.
      Data: Five variable-width stacked columns. First series (Electronics) renders in brand green #009E73, followed by lavender (Apparel), blue (Home Goods), and ochre (Grocery) — canonical Imprint order. Segment $ value labels are filled with the light page-background color, which reads as white-ish text and stays legible against every colored segment. Three subtle horizontal reference gridlines (25/50/75%) are visible but unobtrusive.
      Legibility verdict: PASS — no light-on-light text found anywhere.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title, legend text, region labels, column totals, and axis ticks/label all flip to light ink and remain fully legible against the dark background. No dark-on-dark chrome text found.
      Data: Segment colors are pixel-identical to the light render (green/lavender/blue/ochre in the same order), confirming Imprint data colors don't shift with theme. Segment value labels are filled with the dark page-background color, which reads as near-black text against the colorful segment fills — still clearly legible since the segments themselves are vivid, not dark.
      Legibility verdict: PASS — no dark-on-dark text found; brand green remains clearly visible.
