    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: All chrome (title, legend, region labels, totals, y-axis ticks/label) flips to light ink and stays fully legible. No dark-on-dark chrome failures anywhere.
      Data: Segment fill colors pixel-identical to the light render (only chrome flipped). Segment value labels flip to near-black text on the colored tiles; contrast is good on ochre/purple/teal tiles, borderline (~3.1:1) on the mid-blue Home Goods tiles specifically — readable in practice (bold text) but flagged as a minor weakness. Leader-column accent on East is equally visible.
      Legibility verdict: PASS (with one minor borderline-contrast note on blue-segment labels, not a failure)
