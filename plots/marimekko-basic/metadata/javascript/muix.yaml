review:
  strengths:
  - Leader-column visual accent (outline + bold total label + bold region label) directly
    resolves attempt 1's "no explicit emphasis on the standout data point" finding
    — East ($150M) now reads as the headline insight at a glance
  - 'Reference-gridline weight (strokeOpacity: 0.45) is now clearly subordinate to
    the solid segment dividers, resolving attempt 1''s chrome-hierarchy note'
  - Idiomatic low-level MUI X composition (useXScale/useYScale/useDrawingArea) — the
    correct community-package pattern for a chart type the library doesn't ship natively
  - Canonical Imprint palette with brand green first series; data colors verified
    pixel-identical between light and dark renders
  - 'Spec compliance is complete and numerically verified: column totals, segment
    shares, and labels all reconcile correctly across all 5 regions'
  weaknesses:
  - Segment value-label fill always uses t.pageBg regardless of the underlying tile
    color; reads well for most tiles but computes to a borderline ~3.1:1 contrast
    on the mid-tone blue Home Goods segments in dark mode (below 4.5:1 AA for that
    text size) — consider per-tile luminance-aware label color
  - ChartContainer does not set skipAnimation; harmless today since series={[]} means
    nothing MUI-X-native animates, but the library guide's "always set skipAnimation"
    rule is a defensive belt-and-braces measure worth adding
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Dark-ink title ("Retail Revenue by Region & Product Line · marimekko-basic · javascript · muix · anyplot.ai"), legend row, per-column $-total labels, and region names below the x-axis are all crisp and clearly readable. Y-axis "Share of Regional Revenue" title and % tick labels are legible with no clipping.
      Data: Four Imprint colors (teal/lavender/blue/ochre) in canonical order, first series = #009E73 brand green. Segment $-value labels render as near-white text, clearly legible on every tile. East column carries a bold outline + bold labels (leader accent).
