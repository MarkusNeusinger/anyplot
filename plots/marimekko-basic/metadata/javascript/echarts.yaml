review:
  strengths:
  - Correctly implements a non-native chart type (Marimekko/mekko) via an ECharts
    custom series, computing proportional column widths (by x-category total) and
    segment heights (by share within column) that match the data exactly.
  - Value labels are shown only on segments taller than ~58px, avoiding clutter on
    the smallest slices — a smart data-density adaptation.
  - Manual percentage y-axis (0/25/50/75/100%) plus per-column total labels ($950M,
    $720M, ...) add real analytical value beyond the bare stacked geometry.
  - First categorical color is brand green (#009E73, Software) and the remaining products
    follow the canonical Imprint palette order (lavender, blue, ochre); colors are
    pixel-identical between light and dark renders.
  - Theme-adaptive chrome (ink/inkSoft tokens, transparent background) threads through
    correctly in both renders — no dark-on-dark or light-on-light failures, no clipped
    text at any edge.
  - Clean, dependency-free, deterministic code with no fake interactivity; dynamic
    canvas-based text measurement centers the legend precisely.
  weaknesses:
  - 'White value-label text on the lighter Imprint palette segments has borderline-low
    contrast: lavender #C475FD (Hardware) measures ~2.9:1 and ochre #BD8233 (Consulting)
    ~3.3:1 against white, both at/below the WCAG AA large-text minimum of 3:1 — consider
    an ink-colored label on those two series instead of hardcoded white.'
  - No tooltip/formatter is configured on the custom series, so the interactive HTML
    build gives no way to inspect exact values for smaller segments that don't get
    an inline label — a missed opportunity for an interactive JS library.
  - The manual graphic-based legend is purely decorative (not wired to ECharts' native
    legend toggle behavior), so it can't be used to hide/show a product line in the
    interactive HTML output the way a real legend component would.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1, not pure white.
      Chrome: Bold dark title "marimekko-basic · javascript · echarts · anyplot.ai" centered at top; manual legend (Software/Hardware/Services/Consulting swatches + labels) centered below the title; y-axis line with 0/25/50/75/100% tick labels and a rotated "Share of Column Revenue" axis title on the far left; region names (North America, Europe, Asia Pacific, Latin America, Middle East & Africa) rotated ~25° under each variable-width column; bold column-total labels ($950M, $720M, $760M, $240M, $165M) above each bar. All chrome text is dark ink and clearly readable against the light background.
      Data: Five variable-width stacked columns. First series (Software) is brand green #009E73, followed by lavender (Hardware), blue (Services), and ochre (Consulting) — matching the canonical Imprint palette order. White bold value labels ($420M, $180M, etc.) appear inside segments large enough to hold them; the smallest segments (e.g. Middle East & Africa's $15M-scale slices) correctly omit labels to avoid clutter. Column widths are visibly proportional to the printed totals (North America widest at $950M, Middle East & Africa narrowest at $165M).
      Legibility verdict: PASS — all text is clearly readable; no light-on-light issues. Minor exception: white value-label text on the lavender and ochre segments has calculated contrast just at/below the 3:1 large-text threshold (see weaknesses), though it remained subjectively legible in the render.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17, not pure black.
      Chrome: Same layout as the light render with all ink text flipped to light gray/white — title, legend text, axis tick labels, rotated region names, and column totals are all light-colored and clearly readable against the dark background. No dark-on-dark failures found; region labels and axis ticks remain crisp at the canvas edges (checked via crops of the top and bottom strips).
      Data: Identical segment colors to the light render — green #009E73, lavender, blue, ochre — confirming only chrome (not data) flips between themes. White bold value labels remain in the same positions and segments as the light render.
      Legibility verdict: PASS — all chrome text is clearly readable against the dark surface; data colors confirmed identical to the light render.
