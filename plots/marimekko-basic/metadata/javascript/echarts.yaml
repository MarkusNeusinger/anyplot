review:
  strengths:
  - 'Fixed the prior WCAG contrast issue: segment label color now switches per-product
    (white on the green Software / blue Services slots, dark ink on the lighter lavender
    Hardware / ochre Consulting slots), with a comment explaining the WCAG AA large-text
    3:1 rationale.'
  - Added a tooltip formatter surfacing region, product, value, and share-of-column
    — gives the interactive HTML build a way to inspect exact values for segments
    too small to carry an inline label.
  - Correctly implements a non-native Marimekko chart type via an ECharts custom series
    + renderItem, with column widths proportional to region totals and segment heights
    proportional to in-column share, matching the source data exactly.
  - First categorical color is brand green (#009E73), remaining products follow canonical
    Imprint order; data colors are pixel-identical between light and dark renders.
  - Theme-adaptive chrome is correct in both renders — no dark-on-dark/light-on-light
    failures, no clipped text at any edge — and value labels are correctly suppressed
    on segments too short to hold text without overflow.
  - Clean, dependency-free, deterministic code with a manually constructed percentage
    axis and measured-text legend layout.
  weaknesses:
  - Leftover duplicate header comment block at the top of the file (two stacked 'anyplot.ai'
    / library-version / quality-score blocks, lines 1-9) — dead/conflicting comment
    text that should be cleaned up to a single header.
  - The manual graphic-based legend remains purely decorative — it cannot toggle series
    visibility the way ECharts' native legend component would in the interactive HTML
    output.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1), not pure white.
      Chrome: Bold dark title "marimekko-basic · javascript · echarts · anyplot.ai" centered at top; manual legend (Software/Hardware/Services/Consulting swatches) below it; a percentage y-axis (0/25/50/75/100%) with a rotated "Share of Column Revenue" label on the left; five variable-width stacked columns for regions, each with a rotated region-name label below and a bold dollar total ($950M/$720M/$760M/$240M/$165M) above. All chrome text is dark and clearly legible against the light background.
      Data: Column order/colors follow canonical Imprint order — Software = brand green #009E73, Hardware = lavender, Services = blue, Consulting = ochre. In-segment value labels use white text on the green/blue slots and dark ink text on the lavender/ochre slots (the WCAG contrast fix from attempt 1), and are correctly suppressed on segments too short to hold text (e.g. the small Consulting slice in Middle East & Africa).
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), not pure black.
      Chrome: Identical layout to the light render, with title, legend, axis ticks, rotated region labels, and column totals all flipped to light/white text and clearly readable — no dark-on-dark failures, no clipping at any edge.
      Data: Segment fill colors are pixel-identical to the light render (green/lavender/blue/ochre) — only chrome flipped, as required. Segment label colors (white vs. dark ink per product) are unchanged from the light render and remain legible against both the segment fill and the dark page background.
      Legibility verdict: PASS
