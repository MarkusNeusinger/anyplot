      Background: Warm off-white matching #FAF8F1, not pure white.
      Chrome: Title "Global Software Revenue Mix · marimekko-basic · r · ggplot2 · anyplot.ai" in dark ink top-left, fully legible. "Product line" legend with 4 swatches (green/lavender/blue/ochre) labeled Software/Hardware/Services/Support in medium-grey text. Italic annotation "Only region where Hardware outsells Software" with a thin curved arrow pointing to the Hardware/Services boundary in the Asia Pacific column. Rotated ~25 degree region tick labels, percent-formatted y-axis labels, all in readable dark/medium-grey ink.
      Data: Five variable-width stacked columns (North America, Asia Pacific, Europe, Latin America, Middle East), sorted by descending total revenue. Segment colors: Software=#009E73 (green), Hardware=#C475FD (lavender), Services=#4467A3 (blue), Support=#BD8233 (ochre) - canonical Imprint order, first series green as required. Bold white $XXXM labels on larger segments only (area-gated).
      Legibility verdict: PASS - all text, including the small annotation, reads clearly against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17, not pure black.
