review:
  strengths:
  - 'True marimekko construction: bar width encodes each region''s total revenue AND
    segment height encodes the within-region product share simultaneously — avoids
    the common ''fake-width stacked bar'' shortcut some marimekko implementations
    fall into'
  - Regions are sorted by descending total revenue, creating immediate visual hierarchy
    from widest (North America) to narrowest (Middle East) bar
  - Dollar-value labels are gated by segment area (>5% of total revenue), so labels
    appear only where they fit — the tiny Latin America/Middle East 'Support' slices
    stay clutter-free instead of overflowing with unreadable text
  - Correct Imprint palette in canonical order (Software=#009E73, Hardware=#C475FD,
    Services=#4467A3, Support=#BD8233); both light and dark renders are fully theme-adaptive
    with no clipping at any canvas edge
  - Title fontsize scales dynamically with title length via the style-guide's linear
    formula, so the mandated title fits cleanly without overflow
  - Clean, deterministic tidyverse pipeline (KISS structure, ragg PNG device, correct
    plot-{theme}.png output, no unused imports)
  weaknesses:
  - Library Mastery is generic — geom_rect + a dplyr pipeline is a technique portable
    to any grammar-of-graphics or patch-based plotting library; nothing here is distinctly
    ggplot2 (no stat_*, coord_*, or facet system). A ggplot2-idiomatic touch (e.g.
    annotate() for a callout, or geom_text(check_overlap = TRUE)) would raise Library
    Mastery
  - Data storytelling relies only on implicit hierarchy from the column sort order;
    there's no explicit callout on the most notable insight in the data — e.g. Asia
    Pacific is the only region where Hardware ($380M) outsells Software ($300M), a
    genuine crossover worth a short annotation
  - plot.margin is fairly tight (t=8, r=20, b=8, l=8); a touch more breathing room,
    especially around the legend row and below the rotated x-axis category labels,
    would push Visual Refinement further toward 'every detail polished'
  - Legend swatches sit close together at the 400px mobile thumbnail — still readable
    but slightly cramped; a bit more inter-item spacing would help
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — not pure white, not dark.
      Chrome: Title "Global Software Revenue Mix · marimekko-basic · r · ggplot2 · anyplot.ai" in dark ink at top-left, fully visible with no clipping. Horizontal legend below the title reads "Product line" with four swatches (green, lavender, blue, ochre) labeled Software / Hardware / Services / Support in medium-grey text. Y-axis shows 0%/25%/50%/75%/100% in dark-grey. X-axis shows five region names (North America, Asia Pacific, Europe, Latin America, Middle East) rotated ~25°, in medium-grey ink, centered under each variable-width column.
      Data: Five stacked, variable-width columns (marimekko/mekko layout). Column width is proportional to each region's total revenue (North America widest, Middle East narrowest); segment height within each column is proportional to product-line share. Bold white "$XXXM" labels appear on larger segments only. First series (Software) renders in the brand green #009E73.
      Legibility verdict: PASS — all text (title, legend, axis titles, tick labels, rotated category labels) is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — not pure black, not light.
      Chrome: Same title and legend, now rendered in light/off-white ink (title/legend text) and light-grey (tick labels, category labels) — fully legible against the dark surface. Thin near-black borders (matching the dark PAGE_BG) separate the stacked segments and the gaps between columns, which reads as crisp separation rather than dark-on-dark loss of detail, since the separator lines sit between saturated color fills, not over text.
      Data: Identical segment colors to the light render — Software green #009E73, Hardware lavender, Services blue, Support ochre — confirming the Imprint data palette does not shift between themes. Bold white value labels remain legible against every segment.
      Legibility verdict: PASS — no dark-on-dark failures found; all title/axis/tick/legend text is clearly visible, and the brand green remains vivid on the dark surface.
