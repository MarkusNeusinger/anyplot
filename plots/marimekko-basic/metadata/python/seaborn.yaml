review:
  strengths:
  - 'Correct Imprint palette in canonical order (#009E73 first series, then #C475FD/#4467A3/#BD8233)
    with identical data colors and theme-correct chrome (#FAF8F1/#1A1A17) verified
    on both renders'
  - 'Genuine data storytelling: the widest column (Asia Pacific) is emphasized with
    a bold outline and bolded axis label, reinforced by an explicit subtitle stating
    the insight'
  - All font sizes explicitly set; two-tier staggered x-axis labels prevent collisions
    between narrow columns (Latin America, Middle East) and their neighbors
  - Value labels are shown only on segments tall enough to hold them (height > 12%),
    keeping even the narrowest columns ($8B Apparel in Middle East) legible without
    clutter
  - Clean KISS structure, exact 3200x1800 canvas via figsize/dpi (no bbox_inches='tight'),
    no fake interactivity
  weaknesses:
  - 'Library Mastery is capped by a genuine seaborn limitation: no sns plotting function
    draws the chart itself (mpatches.Rectangle does), only sns.set_theme/color_palette/despine
    provide theming — acceptable given seaborn has no native Marimekko support, but
    keeps LM-02 low'
  - Data shows healthy variation across regions and products but no single region
    has a strongly dominant product line (e.g. one segment near 50%+ share) to demonstrate
    the full range of proportions a Marimekko chart can encode
  - Design Excellence is strong but stops short of a truly distinctive typographic
    or annotation treatment that would push it into top-tier 'publication-ready' territory
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Bold black title "marimekko-basic · python · seaborn · anyplot.ai" and italic dark-gray subtitle ("Asia Pacific leads with $203B total revenue — Electronics is the top product line globally") are both fully visible above the plot with clear margin (no clipping at top edge). Y-axis "Product Mix (%)" label and 0/25/50/75/100% ticks are dark and crisp against the light background. X-axis region names + totals are staggered across two vertical tiers (checked via crop) so no two labels collide, and the caption "Region (width ∝ total revenue)" sits below with a clean gap. Legend ("Product Line") is boxed, near the plot, fully inside the canvas with margin to the right edge.
      Data: Five variable-width columns (North America, Europe, Asia Pacific, Latin America, Middle East), each stacked with four product segments in Imprint order: Electronics (#009E73, first series), Apparel (purple), Food & Beverage (blue), Home Goods (tan). White 1px edges separate every segment. Value labels ($XXB) in bold white text are present on all segments and, after zoomed inspection of the narrow Latin America / Middle East columns, remain fully centered and legible down to $8B. Asia Pacific (the widest column) carries a bold black outline and a bolded axis label, matching the subtitle's callout.
