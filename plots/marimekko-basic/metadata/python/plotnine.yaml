    thin theme-background gaps elsewhere — confirmed by pixel inspection in both light
    and dark renders, this directly fixes the attempt-1 weakness that the highlight
    was text-only
  - 'Theme-adaptive chrome correctly threaded through in both renders: background,
    title/subtitle/axis/tick/legend text, and grid all flip correctly with no dark-on-dark
    or light-on-light failures'
  - geom_label used for value annotations with plotnine-specific rounded-box parameters
    (label_size, label_r, label_padding) instead of plain geom_text, a small but genuine
    plotnine-idiomatic touch over the generic geom_rect approach
  - Descriptive subtitle callout adds real narrative context, and the underlying numbers
    are internally consistent (200/380 = 53%, matching the rendered subtitle)
  - Clean KISS script structure with deterministic hardcoded data, only used imports,
    and correct plot-{theme}.png output naming
  weaknesses:
  - 'The attempt-1 fix for the legend box frame did NOT work: legend_background=element_rect(fill=ELEVATED_BG,
    color=None) still renders a clearly visible gray/dark border around the entire
    legend box in both light and dark renders (verified by pixel crop — a solid rectangular
    frame surrounds ''Product Line'' + all four entries). In plotnine''s matplotlib
    backend, passing color=None to the legend''s element_rect does not suppress the
    frame edge the way it does for other element_rect fills — it falls back to matplotlib''s
    default legend frame edge color. Fix by setting color to match the fill exactly
    (e.g. legend_background=element_rect(fill=ELEVATED_BG, color=ELEVATED_BG)) or
    by disabling the frame via the legend''s linewidth/edge property so no border
    pixels render at all.'
  - The alpha=0.6 intended to dim the 15 non-highlighted segments relative to the
    highlighted one does not visibly render — pixel sampling shows the 'dimmed' segments
    (e.g. Europe Electronics) are the exact same RGB (0,158,115) as the fully-opaque
    highlighted segment, with no blending toward the page background visible. The
    differentiation currently works only through the border-width/color change, not
    the alpha as coded; either remove the now-redundant alpha param or investigate
    why plotnine/matplotlib isn't compositing it (e.g. z-order/rasterization) so the
    intended dimming actually shows.
  - 'LM-02 remains only lightly distinctive: geom_label''s rounded-box params are
    a small plotnine-specific touch, but the core marimekko construction (geom_rect
    + manual cumulative-position math) is still the same generic ggplot2-family technique
    flagged in the prior review — consider a more plotnine-specific mastery signal
    (e.g. leveraging position adjustments or coord_cartesian tuning) to move beyond
    generic usage.'
