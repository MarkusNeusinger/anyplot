    segments so the visual reinforces the caption instead of relying on text alone.
  - 'LM-02: the geom_rect + manual cumulative-position computation is the standard/generic
    way any grammar-of-graphics library (this exact approach reads identically in
    ggplot2/R) builds a marimekko chart — it isn''t leveraging anything distinctive
    to plotnine specifically. Consider a plotnine-specific touch (e.g. geom_label
    for the value annotations with plotnine''s label padding/fill, or coord_cartesian
    tuning) to differentiate it from a generic ggplot2 port.'
