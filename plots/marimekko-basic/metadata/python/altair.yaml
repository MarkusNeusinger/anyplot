review:
  strengths:
  - 'Correct Marimekko mechanics: bar widths are proportional to region revenue totals
    and segment heights are proportional to each product''s share within the region.'
  - Value labels ($XXM) on every segment with adaptive text color (white on saturated
    fills, ink-dark on the lighter lavender fill) keeping every number readable.
  - Descending sort by region total creates an immediate visual hierarchy (Asia Pacific/North
    America widest, Latin America narrowest).
  - Region labels beneath each bar show both the category name and its total revenue,
    reinforcing the width-encodes-total mapping.
  - Correct Imprint palette canonical order (green/lavender/blue/ochre) and identical
    data colors across light and dark themes.
  - Theme-adaptive chrome (background, ink, legend fill) correctly threaded through
    configure_view/configure_axis/configure_legend for both renders.
  - Canvas padded to exactly 3200x1800 with no clipped text in either render.
  weaknesses:
  - Design Excellence is clean but generic — no distinctive visual flourish (e.g.
    subtle emphasis on the largest segment, more refined legend chrome) beyond the
    mandated palette and standard layering to lift it from competent to exceptional.
  - X-axis has no explicit axis title, relying solely on the region category labels
    beneath the bars — acceptable per the spec's own suggestion, but a small 'Region'
    context label would round out axis labeling symmetry with the Y-axis.
  - Altair's distinctive interactivity is under-used beyond tooltips (e.g. no legend-linked
    highlight/selection), leaving Library Mastery a bit generic for an interactive-capable
    library.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Bold dark title "marimekko-basic · python · altair · anyplot.ai" centered at top, ~55% of plot width (well within the 50-70% guideline). Y-axis "Product Mix (%)" title and 0-100 tick labels in dark ink, clearly legible. Bold dark region labels ("Asia Pacific ($300M)", "North America ($300M)", "Europe ($240M)", "Latin America ($130M)") centered under each variable-width bar. Legend "Product Line" box top-right with light fill, dark border/text, four color swatches (Electronics/Clothing/Food/Home).
      Data: Four columns of different widths (proportional to region revenue totals, sorted descending), each stacked with 4 segments in Imprint canonical order — green (#009E73, Electronics), lavender (#C475FD, Clothing), blue (#4467A3, Food), ochre (#BD8233, Home). Each segment carries a bold "$XXM" value label; text color adapts (white on green/blue/ochre, dark ink on lavender) for contrast. Thin light-colored strokes separate segments cleanly.
      Legibility verdict: PASS — all title, axis, tick, region-label, legend, and in-segment text is clearly readable against the light background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Same title now in light/off-white text, clearly visible. Y-axis title and tick labels rendered in light ink. Region labels under each bar rendered in bold light text. Legend box uses a dark elevated fill (#242420-style) with light border and light text, swatches unchanged.
      Data: Identical bar widths, segment order, and colors to the light render (green/lavender/blue/ochre) — confirmed no hue drift between themes. Segment value labels retain the same adaptive white/dark-ink logic and stay legible on both dark-rendered fills. Segment divider strokes render as a fine dark line against the same saturated fills, giving clean separation.
      Legibility verdict: PASS — no dark-on-dark failures; title, axis, ticks, region labels, legend, and segment labels are all clearly legible against the dark background.
