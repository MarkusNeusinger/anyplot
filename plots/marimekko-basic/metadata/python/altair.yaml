review:
  strengths:
  - 'Correct, faithful Marimekko construction: bar widths are exactly proportional
    to region totals (groupby + cumulative widths) and segment heights exactly proportional
    to each product''s share within the region — the core spec requirement is implemented
    precisely, not approximated'
  - 'Excellent Imprint palette compliance: Electronics=#009E73 (position 1), Clothing/Food/Home
    follow canonical positions 2-4 identically across both light and dark renders;
    theme chrome (background, text, grid, legend box) is fully theme-correct in both
    renders'
  - 'Thoughtful typographic detail: per-segment label text color (white vs. ink) is
    chosen based on background luminance (e.g. ink text on the light lavender Clothing
    segments instead of white), which most implementations get wrong'
  - 'Genuine data-storytelling touch: the single largest segment (North America Electronics,
    $120M) gets a dashed outline to draw the eye to the standout data point without
    adding fake annotations'
  - Real, functioning interactivity via alt.selection_point(bind='legend') + alt.condition
    — clicking a legend swatch isolates that product line across all regions in the
    HTML export; this is idiomatic, distinctive Altair/Vega-Lite declarative interaction,
    not decoration
  - 'Clean data quality: totals sum correctly per region (e.g. 120+80+60+40=300),
    values are realistic revenue figures, and the four regions have genuinely different
    totals (300/300/240/130) and different product mixes, giving good feature coverage'
  - No overlap, no clipping, generous and balanced whitespace at both 3200x1800 and
    the 400px mobile thumbnail — verified all text remains legible when scaled down
  weaknesses:
  - 'Design Excellence is strong but stops short of publication-grade: the layout,
    palette, and highlight are all mandated/standard choices applied well rather than
    a truly bespoke composition — a subtitle or short insight callout (e.g. noting
    North America''s outsized Electronics share) would push Data Storytelling further'
  - Legend-bound selection interactivity is a nice touch but is invisible in the static
    PNG review artifact — only verifiable in the HTML export
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "marimekko-basic · python · altair · anyplot.ai" in bold dark ink, centered, ~51% of plot width (well within bounds, no overflow). Y-axis title "Product Mix (%)" bold dark ink with clear units. X-axis region names + "($XXXM)" totals in bold dark ink, well spaced under each bar with no overlap. Tick labels and axis domain lines in soft ink-gray. Legend "Product Line" in a rounded off-white card, title bold dark, labels soft gray, circular swatches. All chrome elements clearly readable.
      Data: Four variable-width columns (Asia Pacific, North America, Europe, Latin America) stacked with four variable-height product segments each (Electronics=#009E73 green first series, Clothing=#C475FD lavender, Food=#4467A3 blue, Home=#BD8233 ochre) — exact canonical Imprint order. Each segment carries a bold value label ($XXM) in white or ink text chosen per-segment for contrast (ink text on the light lavender Clothing segments, white elsewhere). The largest segment (North America Electronics, $120M) has a black dashed outline drawing the eye to the standout value.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Title, axis title, tick labels, and region labels all flip to light cream/off-white text, fully readable against the dark background. Legend card flips to a dark elevated fill (#242420-ish) with a light gray border, title in bright cream, labels in soft light gray. No dark-on-dark text anywhere — every chrome element was verified individually (legend crop, x-axis crop, y-axis crop).
      Data: Identical four-color segment palette (#009E73/#C475FD/#4467A3/#BD8233) to the light render — only the chrome flipped, data colors are pixel-identical. The dashed highlight outline on the top segment switches to a light dashed stroke, still clearly visible against the green fill.
      Legibility verdict: PASS
