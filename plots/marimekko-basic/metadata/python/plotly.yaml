review:
  strengths:
  - Per-segment label ink is computed via WCAG relative luminance for each fill color,
    correctly flagging lavender (#C475FD) as too light for white text and switching
    to dark ink there — a genuinely sophisticated accessibility touch.
  - Callout annotation surfaces the actual insight (Asia Pacific is the largest market
    and most Consumer-heavy mix) instead of leaving the viewer to find it — strong
    data storytelling that directly ties to the computed data.
  - 'Correct, idiomatic Marimekko construction: plotly has no native mekko trace,
    so bar width (proportional to column totals) and per-segment base/height (proportional
    to within-column share) are computed manually and match the spec''s definition
    exactly.'
  - Theme-adaptive chrome (background, ink, grid, legend, hover, segment borders)
    is fully threaded through both renders, and Imprint palette data colors are pixel-identical
    between light and dark.
  - Rich hovertemplate with customdata (region, exact $ value, share %) adds real
    interactive value beyond the static PNG, appropriate for an interactive library.
  weaknesses:
  - 'Title is missing the mandated language segment: rendered as ''Market Share by
    Region · marimekko-basic · plotly · anyplot.ai'' but the required format is ''{spec-id}
    · {language} · {library} · anyplot.ai'' — ''python'' must appear between ''marimekko-basic''
    and ''plotly''. Fix: change the title text to ''...· marimekko-basic · python
    · plotly · anyplot.ai''.'
  - 'The legend (placed inside the plot area at x=0.8, y=1) fully overlaps and completely
    hides the ''$50M'' Consumer/Latin America segment label in both light and dark
    renders — verified by cropping the top-right region of both PNGs. Fix: move the
    legend outside the plotted bars (e.g. increase MARGIN_R and place the legend at
    x > 1 in paper coords, or move it below the chart) so it never sits on top of
    a bar segment, especially the narrowest column (Latin America).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Title "Market Share by Region · marimekko-basic · plotly · anyplot.ai" in dark ink, clearly visible. A boxed callout ("Asia Pacific: largest market (45% of total) / Consumer leads at 40% share") sits between the title and the plot with a light elevated fill and dark border/text. X-axis label "Region (width = market size)", y-axis label "Product Mix (share within region)" in dark ink, y-axis ticks in 20% increments with a subtle horizontal grid. A boxed legend ("Product Line": Consumer/SMB/Enterprise) sits inside the top-right of the plot area on a light elevated background with dark text.
      Data: Four variable-width stacked bars (North America, Europe, Asia Pacific, Latin America), each split into three segments (Enterprise = green #009E73 at the bottom, SMB = lavender #C475FD in the middle, Consumer = blue #4467A3 at the top), with white borders between segments. Each segment shows a "$XXM" value label in either white or black text chosen for contrast against its own fill. First (bottom) series is #009E73 as required.
      Legibility verdict: PASS overall — all title/axis/tick/legend text is readable — EXCEPT the legend box directly overlaps the top of the narrow Latin America bar and completely hides its Consumer segment's "$50M" label (confirmed via a pixel crop of the top-right region). This is a real, isolated overlap defect, not a broad legibility failure.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Same title, callout, and legend layout as the light render, now in light ink (#F0EFE8-family) on the dark elevated (#242420) callout/legend boxes with light borders. Grid lines are faint but visible. No dark-on-dark failures found — all title/axis/tick/legend text is light-colored against the dark background.
      Data: Identical segment colors to the light render (green #009E73, lavender #C475FD, blue #4467A3) — confirmed pixel-matching hues. Per-segment label ink (white or black) is chosen from each segment's own fill luminance, independent of page theme, and reads correctly in both cases (e.g. black text on lavender, white text on green/blue).
      Legibility verdict: PASS overall, same caveat as the light render — the legend box still fully hides the Latin America Consumer segment's "$50M" label. No other dark-on-dark or light-on-light issues found.
