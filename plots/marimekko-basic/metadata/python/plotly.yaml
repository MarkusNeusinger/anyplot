review:
  strengths:
  - Per-segment WCAG-contrast-aware label ink (computed via relative luminance, not
    hardcoded) guarantees every value label is legible against its own fill color
    in both themes
  - Explicit callout annotation names the actual insight (largest market + product
    mix leader) instead of leaving the viewer to find it - genuine data storytelling
  - Correct L-shaped spine treatment (bottom+left only) and y-axis-only subtle grid,
    matching the style guide's grid/spine guidance exactly
  - 'Full Imprint palette compliance: brand green #009E73 as the first series, canonical
    order for the rest, correct theme-adaptive backgrounds/chrome identical data colors
    across both renders'
  - Bar widths and segment heights are mathematically correct proportional representations
    of the underlying data (verified against source values)
  weaknesses:
  - Two small helper functions (_linearize, relative_luminance) deviate from the strict
    KISS 'no functions' ideal, though justified for computing accessible label contrast
  - The hovertemplate/customdata tooltip technique is solid but not unique to plotly
    among interactive libraries, limiting Library Mastery distinctiveness
  - The callout annotation text sits at 10px, the smallest text element on the chart
    - still legible but could be nudged up slightly given it carries the chart's key
    insight
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 - not pure white.
      Chrome: Title "Market Share by Region · marimekko-basic · python · plotly · anyplot.ai" in dark ink, clearly readable. X-axis title "Region (width = market size)" and y-axis title "Product Mix (share within region)" both dark ink, legible. Tick labels (region names, percentage ticks) in softer dark-gray ink, legible. Legend "Product Line" with Consumer/SMB/Enterprise entries in an elevated cream box with border, legible. Callout box above the plot area states the key insight in dark text on a cream box.
      Data: Four variable-width columns (North America, Europe, Asia Pacific, Latin America) stacked with three segments each (Enterprise green #009E73 at bottom, SMB lavender in middle, Consumer blue at top). Column width is visibly proportional to each region's total (Asia Pacific widest, Europe narrowest). Value labels ($M) are printed inside every segment, with per-segment ink color chosen for contrast: white text on the blue segments, dark text on the green and lavender segments (verified by pixel sampling - both choices pass WCAG contrast against their respective fills).
      Legibility verdict: PASS - all text confirmed readable against the light background, no light-on-light text found.

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 - not pure black.
      Chrome: Title, axis titles, and callout text render in light ink (near-white), tick labels in a softer light-gray ink - all clearly legible against the dark background. Legend box uses the darker "elevated" surface color with a light border, text legible. No dark-on-dark text found anywhere.
      Data: Identical column layout and identical segment colors (#009E73 green, lavender, blue) to the light render - confirms the data palette is theme-independent as required. Only the chrome (background, text ink, grid, box fills) flipped between themes.
      Legibility verdict: PASS - all text confirmed readable against the dark background; the per-segment contrast-aware ink logic (dark ink on green/lavender, white ink on blue) holds correctly in the dark render as well since it is computed from the fixed data-color luminance, independent of theme.
