review:
  strengths:
  - 'Correct Marimekko construction via geom_rect: bar width proportional to each
    region''s total value, segment height proportional to product share within the
    region — matches the specification exactly.'
  - 'Real data storytelling: per-region total annotations above each bar, a "Largest
    market" callout on Asia Pacific, and value labels shown only on segments large
    enough to hold text cleanly (width% x height% >= 300 threshold) — correctly omits
    labels on 3 of 4 Latin America segments while keeping the largest (Electronics,
    $40M) labeled.'
  - Custom layer_tooltips (region / product / value / share-of-region) is a genuine
    interactive lets-plot feature exposed in the HTML export, not decorative.
  - 'Full theme-adaptive chrome verified in both renders: identical Imprint palette
    (#009E73/#C475FD/#4467A3/#BD8233) across light/dark, correct #FAF8F1/#1A1A17 backgrounds,
    INK/INK_SOFT tokens threaded through axis text, legend, and annotations.'
  - Clean, deterministic, KISS-structured procedural script — no unused imports, no
    randomness, canvas exactly 3200x1800.
  weaknesses:
  - The "Largest market" callout floats above the Asia Pacific bar with no leader
    line/connector, leaving its association with that specific segment implicit —
    a thin connecting line or tighter vertical placement would make the link explicit.
  - Region-total annotations ("$315M total", etc.) and the callout box text sit close
    in size to each other and to the axis text, slightly flattening the hierarchy
    between primary segment labels and secondary annotations — a small size bump for
    the callout text would sharpen the focal point.
  - 'LM-02: beyond the tooltips, the implementation doesn''t showcase other distinctive
    lets-plot capabilities (e.g. interactive legend interactions, layer blending modes)
    that would further differentiate it from a generic ggplot-family port.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 — not pure white.
      Chrome: Title "marimekko-basic · python · letsplot · anyplot.ai" centered at top in dark ink, fully visible, not clipped. Axis titles "Market Size Distribution" (x) and "Share within Region (%)" (y) in dark ink. Tick labels (0%/25%/50%/75%/100% and the four rotated region names) in soft gray. Legend "Product Line" at right with elevated cream background and dark border, all four swatches + labels readable. All chrome elements clearly readable against the light background.
      Data: Four variable-width stacked columns (North America, Europe, Asia Pacific, Latin America) built from geom_rect segments. First series (Electronics) is the Imprint brand green #009E73, followed by lavender (Apparel), blue (Home Goods), and ochre (Food & Beverage) — canonical Imprint order. Bold white value labels ($120M, $85M, etc.) appear only on segments large enough to hold text cleanly; three small Latin America segments correctly omit labels. Italic gray "$XXXM total" annotations sit above each bar, and a bordered "Largest market" callout sits above the Asia Pacific column.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 — not pure black.
      Chrome: Title, axis titles, and tick labels render in light ink/soft-gray tokens, fully legible against the dark background. Legend background switches to the elevated dark tone (#242420) with light border and light-gray/white text — no dark-on-dark failures anywhere. Segment border strokes (which follow PAGE_BG) appropriately switch from cream to near-black, remaining visible as thin dividers between segments.
      Data: All four Imprint data colors (green/lavender/blue/ochre) are pixel-identical to the light render — only chrome flipped, confirming palette-position consistency. Value labels, total annotations, and the "Largest market" callout all remain legible on the dark surface.
      Legibility verdict: PASS
