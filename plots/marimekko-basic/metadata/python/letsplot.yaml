review:
  strengths:
  - 'Correct Marimekko construction: bar widths are proportional to each region''s
    total value AND segment heights are proportional to within-region share, matching
    the spec''s core requirement precisely.'
  - 'Genuine data storytelling: the leader-line callout on the largest market plus
    region-total annotations above each bar surface the width variable, which is otherwise
    easy to miss in a Marimekko chart.'
  - 'Full Imprint palette compliance in canonical order (#009E73, #C475FD, #4467A3,
    #BD8233), with theme-correct chrome (background, text, grid, legend box) consistent
    across both light and dark renders.'
  - 'Idiomatic, layered lets-plot usage: geom_rect + geom_text + geom_segment + geom_label
    composed cleanly, plus layer_tooltips() for rich multi-line hover detail in the
    HTML export.'
  - Clean, deterministic, KISS-structured code with an explicit visual-hierarchy comment
    (value labels > callout > region totals > tick labels) that shows real design
    intent.
  weaknesses:
  - In-segment value labels (size=3.6) and italic region-total annotations (size=3.2)
    are on the small side; at an ~400px mobile thumbnail these dense text elements
    risk shrinking to marginal legibility — consider nudging them up slightly for
    safety margin.
  - The legend carries a full border box (legend_background color=INK_SOFT draws a
    frame); per the style guide's decoration-removal checklist this could be dropped
    for an even more minimal look, though it is a minor aesthetic preference, not
    a defect.
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: title "marimekko-basic · python · letsplot · anyplot.ai" centered at top in dark ink, clearly readable. X-axis title "Market Size Distribution" and Y-axis title "Share within Region (%)" both in dark ink, similarly sized. Angled x-tick region names (North America, Europe, Asia Pacific, Latin America) and y-tick percentages (0%-100%) in soft gray, all legible. Legend "Product Line" at right with a thin gray border box, swatches and labels crisp. Italic gray "$XXXM total" annotations above each bar, plus a bold "Largest market" callout box with a leader line pointing to the Asia Pacific bar. No grid lines (removed by design).
      Data: Four variable-width bars (region totals: $315M, $320M, $425M, $130M), each stacked with four segments — Electronics (#009E73 green), Apparel (lavender), Home Goods (blue), Food & Beverage (ochre) — bold white dollar-value labels shown on segments large enough to hold text. First series is confirmed brand green #009E73.
      Legibility verdict: PASS — all text (title, axis titles, tick labels, legend, annotations, callout) reads clearly against the light background; no light-on-light issues found.

    Dark render (plot-dark.png):
      Background: warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: same layout as light render. Title, axis titles, and legend text now render in light ink/off-white, clearly visible against the dark background. Tick labels and italic region-total annotations use a lighter soft-gray tone that remains legible. The "Largest market" callout box now has a dark elevated fill with light text and a light border, and its leader line is a visible light-gray.
      Data: Identical segment colors to the light render — Electronics green, Apparel lavender, Home Goods blue, Food & Beverage ochre — confirming only chrome flipped, not data colors.
      Legibility verdict: PASS — no dark-on-dark failures observed; every text element (title, axes, ticks, legend, annotations, callout) is clearly legible against the near-black background.
