review:
  strengths:
  - Builds a fully custom, mathematically correct Marimekko chart from pygal's low-level
    Graph/SVG API (pygal has no native mekko type) — a single _column_layout helper
    computes x-position/width per column once and shares it across the highlight band,
    the segments, and the x-axis labels so the three passes can never drift out of
    sync with each other
  - 'Strong data storytelling: a faint focal-column spotlight tint plus a leader-line
    callout (''Largest market — 32% of revenue'') draws the eye straight to Asia Pacific
    without touching the categorical palette'
  - Segment percentage labels are only drawn when a segment is tall/wide enough to
    hold them, avoiding clutter on the smallest slices; region labels show both the
    category name and its width share as % of total
  - Realistic, plausible business dataset (5 regions × 4 product lines, revenue in
    $M) with genuinely different compositions per region rather than a repeated one-size-fits-all
    pattern
  - Theme tokens (INK, INK_MUTED, GRID_COLOR, PAGE_BG) are correctly threaded through
    nearly every custom-drawn chrome element, and the hand-drawn legend avoids the
    collision with the x-axis label stack that a previous review flagged
  weaknesses:
  - 'Segment fill colors are diluted by pygal''s built-in `.reactive{fill-opacity:.7}`
    CSS rule, because the segment rects use class "rect reactive tooltip-trigger".
    This alpha-blends every Imprint hue with the page background, so the SAME series
    measures a different absolute RGB in light vs dark (verified: brand green renders
    as rgb(75,185,152) in plot-light.png but rgb(8,119,87) in plot-dark.png) instead
    of the identical hex the style guide requires (''positions 1-7 must be identical
    between light and dark — only chrome flips''). Fix: drop ''reactive'' from the
    rect''s class list, or set fill-opacity="1" explicitly on each segment rect, so
    the pure Imprint hex renders unblended in both themes.'
  - The value-percentage <text> nodes set fill="white" explicitly in code, but the
    enclosing group uses class "series", which triggers pygal's built-in `.series
    text{fill:...}` stylesheet rule (a class selector, which beats a presentation
    attribute in CSS priority) — so the label silently renders in INK color instead
    of the coded white. It happens to still be legible only because Style.foreground
    is itself theme-adaptive, which is a fragile coincidence rather than an intentional
    fix. Rename the label group's class away from 'series' (a name pygal's own stylesheet
    already targets), or set the color via inline style="fill:white" so the intended
    color always wins regardless of pygal's bundled CSS.
  - Title is "marimekko-basic · pygal · anyplot.ai", omitting the required {language}
    segment — per SC-04 it should be "marimekko-basic · python · pygal · anyplot.ai".
  - The custom Marimekko class is a fairly large subclass (~300 lines, multiple private
    methods) which departs from the KISS "Imports → Data → Plot → Save, no functions/classes"
    ideal — understandable since pygal has no native mekko chart type, but worth a
    comment noting it's a required exception rather than a stylistic choice.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches the required #FAF8F1 surface (not pure white).
      Chrome: Dark-ink title "marimekko-basic · pygal · anyplot.ai" centered at top; five variable-width vertical stacked bars (North America, Europe, Asia Pacific, Latin America, MEA) sit on a 0-100% y-axis with dashed horizontal gridlines and "0%/25%/50%/75%/100%" tick labels; "Share within Region (%)" rotated y-axis title; "Region" x-axis title; each bar has a region name plus an italic "(NN%)" share-of-total label below it; a hand-drawn legend row (Enterprise/Consumer/SMB/Government swatches + text) sits under the x-axis labels; a leader-line callout above the widest bar reads "Largest market — 32% of revenue". All title/axis/tick/legend/callout text is clearly readable against the light background — no light-on-light issues.
      Data: Four stacked segments per bar (green Enterprise, purple Consumer, blue SMB, ochre Government) each carrying a bold in-segment "% share within region" label. First series (Enterprise) is intended to be the Imprint brand green #009E73, but pixel-sampling the rendered PNG shows the actual fill is rgb(75,185,152) — a lighter, desaturated mint, not the pure hex — because the segment rects pick up pygal's built-in `.reactive{fill-opacity:.7}` rule (see weaknesses) and get alpha-blended with the #FAF8F1 background.
      Legibility verdict: PASS (all text readable), but flag the color-fidelity issue above.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches the required #1A1A17 surface (not pure black).
      Chrome: Same layout as light — title, axis titles, tick labels, per-bar share labels, legend, and callout all recolored to light off-white/ink-soft tones. No dark-on-dark failures observed; every chrome element is clearly legible against the near-black background.
      Data: Same four-segment structure and same relative hues (green/purple/blue/ochre) as the light render, but pixel-sampling shows the Enterprise segment renders as rgb(8,119,87) here vs rgb(75,185,152) in the light render — a measurably different, darker forest-green rather than the identical #009E73 hex the style guide mandates ("only chrome may flip, positions 1-7 must be identical"). This confirms the same fill-opacity dilution bug applies in both themes, just blended toward a different background each time, so the data colors are NOT identical between light and dark as required.
      Legibility verdict: PASS for text; FAIL for palette-identity (see VQ-07 deduction) — data hues drift between themes instead of staying fixed.
