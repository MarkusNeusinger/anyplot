review:
  strengths:
  - 'Both attempt-1 review findings are now genuinely fixed and pixel-verified: the
    segment rects were renamed off pygal''s built-in ''reactive''/''series'' selectors
    to ''mekko-rect''/''mekko-serie'', and sampling plot-light.png vs plot-dark.png
    shows the Enterprise/Consumer/SMB segments render at the exact same RGB (0,158,115
    / 196,117,253 / 68,103,163) in both themes, matching the Imprint hex codes unblended
    — the fill-opacity dilution bug is gone.'
  - Title now reads 'marimekko-basic · python · pygal · anyplot.ai', correctly including
    the {language} segment SC-04 requires.
  - Builds a fully custom, mathematically correct Marimekko chart from pygal's low-level
    Graph/SVG API (pygal has no native mekko type) — a single _column_layout helper
    computes x-position/width per column once and shares it across the highlight band,
    the segments, and the x-axis labels so the three passes can never drift out of
    sync.
  - 'Strong data storytelling: a faint focal-column spotlight tint plus a leader-line
    callout (''Largest market — 32% of revenue'') draws the eye straight to Asia Pacific
    without touching the categorical palette.'
  - Segment percentage labels only draw when a segment is tall/wide enough to hold
    them, and the hand-drawn legend sits with a clean, collision-free gap below the
    x-axis label stack.
  - Realistic, plausible business dataset (5 regions × 4 product lines, revenue in
    $M) with genuinely different compositions per region rather than a repeated ratio.
  weaknesses:
  - Value-percentage labels use a flat font-size=36 regardless of segment size — the
    largest segments (Enterprise 40%, Consumer 39%) could carry a slightly larger
    label for hierarchy; not a legibility failure, just a missed refinement opportunity.
  - The custom Marimekko class is a ~330-line Graph subclass with several private
    methods, which departs from the KISS 'no functions/classes' ideal — justified
    since pygal has no native mekko chart type, but worth a one-line module comment
    noting it's a required exception rather than a stylistic choice.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches the required #FAF8F1 surface (not pure white).
      Chrome: Dark-ink title "marimekko-basic · python · pygal · anyplot.ai" centered at top, fully visible with no clipping; five variable-width vertical stacked bars (North America, Europe, Asia Pacific, Latin America, MEA) sit on a 0-100% y-axis with subtle dashed horizontal gridlines and "0%/25%/50%/75%/100%" tick labels; "Share within Region (%)" rotated y-axis title fully visible with margin to the left edge; "Region" x-axis title; each bar has a region name plus an italic "(NN%)" share-of-total label below it; a hand-drawn legend row (Enterprise/Consumer/SMB/Government swatches + text) sits with a clean gap below the x-axis labels, not colliding with anything; a leader-line callout above the widest bar reads "Largest market — 32% of revenue" with a comfortable gap below the title. All title/axis/tick/legend/callout text is clearly readable against the light background — no light-on-light issues. No element is clipped at any canvas edge (checked all four edges directly).
      Data: Four stacked segments per bar (green Enterprise, purple Consumer, blue SMB, ochre Government), each carrying a bold white in-segment "% share within region" label, clearly legible on every color. First series (Enterprise) pixel-samples to exactly rgb(0,158,115) = #009E73, the Imprint brand green, unblended — confirming the prior fill-opacity dilution bug (from pygal's built-in .reactive CSS rule) is fixed; the rects now use custom "mekko-rect"/"mekko-serie" classes instead of pygal's "reactive"/"series" selectors.
      Legibility verdict: PASS.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches the required #1A1A17 surface (not pure black).
      Chrome: Same layout as light — title, axis titles, tick labels, per-bar share labels, legend, and callout all recolored to light off-white/ink-soft tones. No dark-on-dark failures observed; every chrome element is clearly legible against the near-black background.
      Data: Pixel-sampling confirms the Enterprise/Consumer/SMB segments render at the IDENTICAL RGB as the light render — rgb(0,158,115), rgb(196,117,253), rgb(68,103,163) respectively — proving the Imprint categorical hues are now fixed and theme-independent (only chrome flips), resolving the VQ-07 finding from attempt 1.
