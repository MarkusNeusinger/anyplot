review:
  strengths:
  - 'Genuine two-dimensional Marimekko structure: bar widths are proportional to each
    region''s total (via widths dict computed from region_totals) and segment heights
    are proportional to each product''s share within the region — not a fixed-width
    stacked bar pretending to be a Marimekko chart.'
  - 'Real bokeh interactivity: one renderer per product drives an auto-built Legend
    (legend_label=) plus a shared HoverTool with formatted per-segment tooltips (Region/Product/Value/Share),
    and legend.click_policy=''hide'' lets users toggle series in the HTML detail view.'
  - 'Data storytelling: the leading region (Asia Pacific) gets a ★ marker and bold
    label with its total call-out, giving the chart a clear focal point instead of
    four visually equal bars.'
  - Value labels are conditionally shown only on segments large enough to hold them
    (height > 0.12, width > 0.08), avoiding clutter on the smaller Home & Garden /
    Latin America segments while still labeling the bars that matter.
  - 'Canvas and theme discipline: toolbar_location=None plus explicit min_border_*
    keeps the PNG at exactly 3200x1800 with no clipping, and PAGE_BG/INK/INK_SOFT
    tokens are threaded through background, title, legend, and region-label colors
    correctly in both renders.'
  - 'Palette compliance: first series (Electronics) is #009E73, remaining series follow
    the canonical Imprint order, and segment border lines use PAGE_BG so the theme-adaptive
    dividers blend cleanly on both light and dark surfaces.'
  weaknesses:
  - Value labels use fixed white text (text_color='white') on every segment, but the
    Apparel segment's fill (#C475FD, light purple) is bright enough that white-on-purple
    contrast is noticeably weaker than white-on-green/blue/amber elsewhere in the
    chart (~2.9:1, under the 3:1 minimum for large bold text) — pick text color per-segment
    (e.g. dark ink on the lighter purple fill, white elsewhere) or add a thin dark
    text outline so the $80B/$110B/$150B labels on Apparel read as crisply as the
    other three products.
  - Region labels below the bars are static Label() text placed at a fixed y=-0.04
    regardless of label length; a region name much longer than the current set (e.g.
    a longer country/segment name) could visually crowd the gap between adjacent bars
    since spacing isn't dynamically checked — not a problem with the current 4-region
    dataset but worth a defensive glance if the category count/label length ever changes.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white.
      Chrome: Bold dark title "marimekko-basic · bokeh · anyplot.ai" centered at top; a horizontal legend box (Electronics/Apparel/Home & Garden/Food & Beverage with color swatches) sits below the title in its own headroom band, clear of the bars; region names + totals ("North America ($400B)", "Europe ($350B)", "★ Asia Pacific ($600B)" bold, "Latin America ($150B)") sit below each bar in dark ink. All chrome text is clearly readable against the light background.
      Data: Four variable-width stacked bars (widths proportional to each region's $ total, tallest/widest = Asia Pacific). Segment heights are proportional to each product's share within the region. Colors follow the Imprint palette in canonical order: Electronics=#009E73 (green, first series correct), Apparel=#C475FD (light purple), Home & Garden=#4467A3 (blue), Food & Beverage=#BD8233 (amber). White dollar-value labels appear on segments large enough to hold them; labels on the green/blue/amber segments have strong contrast, labels on the lighter purple Apparel segments are legible but visibly lower-contrast.
      Legibility verdict: PASS (minor contrast softness on purple-segment labels only, not a failure).

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black.
      Chrome: Title and region labels render in light ink, clearly visible against the dark background; legend box uses an elevated dark fill (#242420-ish) with a soft INK_SOFT border and light gray label text — no dark-on-dark anywhere. Segment divider lines (rendered in PAGE_BG) correctly flip to the dark background color instead of staying white.
      Data: Identical four-bar structure and identical segment colors to the light render (#009E73/#C475FD/#4467A3/#BD8233 unchanged) — confirms only chrome flipped between themes, not data colors. White value labels remain readable on green/blue/amber; same mild contrast softness on the purple Apparel segments as in the light render.
      Legibility verdict: PASS (no dark-on-dark failures; same minor purple-segment label contrast note as light render).
