review:
  strengths:
  - 'Technically correct manual Marimekko built from poly! rectangles since Makie
    has no native geom: bar widths proportional to column totals, segment heights
    proportional to within-column share, matching the spec''s area-encoding requirement
    exactly.'
  - 'Strong information density: per-segment $ value labels plus column-total labels
    above each bar reinforce both dimensions (share and total spend) simultaneously;
    label_threshold intelligently suppresses labels on segments too small to hold
    text, avoiding overlap/clutter (e.g. Audio column shows no cramped labels).'
  - 'Theme-adaptive chrome is correctly implemented in both renders: FAF8F1/1A1A17
    backgrounds, INK/INK_SOFT text tokens, identical data colors between light and
    dark, and correct per-segment text contrast (white text on saturated green/blue
    fills, dark text on the lighter lavender fill).'
  - Clean Imprint palette usage in canonical order (green, lavender, blue) with a
    clear, unobtrusive legend; thin PAGE_BG-colored strokes between segments give
    the chart a polished, Highcharts-style separated-segment look.
  - Realistic, neutral data (digital ad spend by channel/objective) at plausible dollar
    scales with no missing-feature gaps versus the specification.
  weaknesses:
  - Title occupies only ~30% of plot width at titlesize=20, well under the 50-70%
    guideline for a title this length — increase titlesize to roughly 28-30 so it
    reads clearly at both full size and mobile thumbnail scale.
  - '`using Random` / `Random.seed!(42)` is imported but never exercised — the ad-spend
    `values` matrix is a hardcoded literal, not generated via any `rand`/`randn` call,
    so the seed is vestigial; either generate the data with actual randomness or drop
    the unused import.'
  - Data storytelling is competent but flat — every column gets identical treatment
    with no single focal point or emphasis (e.g. highlighting the largest channel/objective
    combination) to guide the viewer's eye.
  - Library mastery is solid but conservative — the implementation covers the required
    geometry via poly!/text!/Legend without showcasing any Makie-distinctive capability
    beyond the basics needed to fake the missing native chart type.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, consistent with #FAF8F1 — not pure white, not dark.
      Chrome: Title "marimekko-basic · julia · makie · anyplot.ai" in bold dark ink, centered top; xlabel "Channel (bar width ∝ total ad spend)" and ylabel "Share of Channel Spend" in dark ink; tick labels (channel names, 0-100% y-ticks) in a softer dark gray. All chrome elements are clearly legible against the light background. Left/bottom spines visible in soft gray, top/right spines removed, subtle horizontal gridlines.
      Data: Five variable-width bars (Social, Search, Video, Display, Audio) each stacked with three colored segments — green (#009E73, Brand Awareness), lavender (#C475FD, Performance), blue (#4467A3, Retention) — matching canonical Imprint palette order. White gaps separate segments. Per-segment $ labels use white text on green/blue fills and dark text on the lighter lavender fill, all clearly readable. Column-total $ labels sit above each bar in soft gray. Legend at right with color swatches and matching labels.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black, consistent with #1A1A17 — not pure black, not light.
      Chrome: Same title, axis labels, and tick labels now rendered in light ink (near-white for title/labels, softer light gray for ticks) — clearly visible against the dark background. Spines flip to a lighter soft gray; gridlines remain subtle. No dark-on-dark text found anywhere.
      Data: Identical green/lavender/blue segment colors and layout as the light render — only chrome (background, text, spines, gridlines, segment-gap stroke color) flips. Per-segment text contrast (white-on-fill / dark-on-fill) is preserved and still legible on the dark canvas; the dark-text label on the lavender segment reads clearly since the lavender fill itself doesn't change with theme.
      Legibility verdict: PASS
