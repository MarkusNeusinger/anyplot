review:
  strengths:
  - 'Correct marimekko/mekko construction: bar widths proportional to column totals
    and segment heights proportional to within-column share, with a small inter-bar
    gap for separation'
  - All font sizes explicitly set (title 29, axis labels 14, tick labels 12-13, data
    labels 15/13) and legible at full resolution in both themes
  - 'Smart label-density handling: a 4% grand-total threshold suppresses in-segment
    value labels on segments too small to hold text (e.g. the whole Audio bar), avoiding
    clutter/overlap without any manual per-case tuning'
  - Descriptive axis labels that explain the mekko encoding directly ('Channel (bar
    width ∝ total ad spend)', 'Share of Channel Spend') instead of generic X/Y
  - Column-total annotations above each bar reinforce the 'width = total spend' story
    and add a real, working layer of data storytelling
  - 'Imprint palette correctly applied: first series is #009E73, positions 2-3 follow
    canonical order, identical data colors across light/dark, theme-correct chrome
    (background, spines, grid, legend) in both renders'
  - 'Per-fill text contrast handled well: white text on the darker green/blue fills,
    dark text on the lighter lavender fill'
  - Clean KISS script structure with no functions/classes, correct save API (plot-$(THEME).png,
    px_per_unit=2)
  weaknesses:
  - 'The ''focal segment'' emphasis (largest single cell, Search/Performance = $260K)
    does not render at all: pixel inspection of both boundaries of that segment in
    both plot-light.png and plot-dark.png shows the plain default stroke (PAGE_BG
    color, ~3px width) rather than the intended bolder INK stroke (strokewidth=5)
    — is_focal styling is dead in the final image, so the ''one clear focal point''
    the code comments describe never reaches the viewer.'
  - The '★ ' star prefix on the focal label is also missing from the render — the
    segment shows plain '$260K' instead of '★ $260K' in both themes, suggesting CairoMakie's
    default font drops the U+2605 glyph silently; avoid relying on that character
    (try a plain '*', a triangle marker, or a separate annotation instead) and verify
    a stroke-width difference actually shows up in the saved PNG before relying on
    it for hierarchy.
  - Because the focal treatment is invisible, the plot's visual hierarchy beyond the
    inherent width/height encoding and the total-spend annotations is weaker than
    intended — DE-03 storytelling credit is capped accordingly.
  - Title sits noticeably smaller than the ~50-70% width guideline with a lot of unused
    whitespace above/below the legend block; not a defect, but there is room to grow
    the title or rebalance the legend's vertical position for a slightly more polished
    composition.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, matches #FAF8F1 (verified pixel value 250,248,241) — not pure white.
      Chrome: Bold dark title "marimekko-basic · julia · makie · anyplot.ai" centered at top, fully visible with comfortable margin, no clipping. Y-axis label "Share of Channel Spend" (rotated) and X-axis label "Channel (bar width ∝ total ad spend)" both dark ink, clearly readable. Tick labels (0%-100% on Y, Social/Search/Video/Display/Audio on X) in a softer ink-gray, readable. Legend "Objective" with 3 swatches (Brand Awareness/Performance/Retention) sits to the right of the plot, unframed, fully inside the canvas with a balanced right margin.
      Data: 5 variable-width stacked bars (widths ∝ column totals $450K/$360K/$310K/$140K/$50K). Segment colors bottom-to-top: brand green (#009E73, Brand Awareness), lavender (#C475FD, Performance), blue (#4467A3, Retention) — canonical Imprint order, first series is the brand green. In-segment dollar labels use white text on green/blue and dark text on lavender, both legible. Column-total labels sit above each bar. Segments below a size threshold (the entire Audio bar) correctly omit in-segment labels to avoid clutter.
      Legibility verdict: PASS — all title/label/tick/legend/data text is readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black, matches #1A1A17 (verified pixel value 26,26,23) — not pure black.
      Chrome: Title, axis labels, and legend flip to light ink (#F0EFE8-family) and remain fully readable; no dark-on-dark failures found in title, ticks, axis labels, or legend text. Grid, spines, and legend all read correctly on the dark surface.
      Data: Same brand-green/lavender/blue sequence, pixel-identical to the light render (confirmed by direct pixel sampling) — only the chrome flipped as required. In-segment text contrast (white-on-fill / dark-on-fill) still works correctly against both fills.
      Legibility verdict: PASS — no dark-on-dark or light-on-light failures in either render.

    Note: Pixel-level inspection of the Search/Performance segment (the intended "largest segment" focal point, $260K) shows its border stroke is identical in color and width to every other (non-focal) segment boundary in BOTH renders, and its label reads "$260K" rather than the code's intended "★ $260K" — the focal-emphasis code path does not visibly execute despite being logically correct in the source (is_focal correctly resolves to this cell). Flagged as a weakness, not a legibility failure, since it doesn't harm readability.
