review:
  strengths:
  - Realistic API response time data with proper statistical distributions
  - Correct theme handling with light/dark background and text color tokens
  - Proper Okabe-Ito palette implementation across all series
  - Clean, deterministic code with seed-based reproducibility
  - Correct title format and descriptive axis labels with units
  weaknesses:
  - Legend has 20 entries (4 endpoints × 5 series) making it completely unreadable
    — collapse to single explanation
  - Boxes are represented as vertical line segments with stroke-width variation, not
    actual nested rectangles — spec requires visual boxes that decrease in width for
    deeper quantiles
  - XY scatter API insufficient for boxen plots — need approach that draws actual
    boxes/rectangles or find alternative library
  - Colored rectangles at bottom appear to be legend artifacts but are unexplained
    and confusing
  - Stroke width variation (2, 2, 4, 6) cannot convey the nested quantile hierarchy
    that the spec requires
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct
      Chrome: Title, Y-axis "Response Time (ms)", X-axis "Endpoint" all clearly readable in dark text
      Data: Four vertical line segments per endpoint (teal, orange, blue, reddish-purple) representing quantile ranges; colored rectangles at bottom; many scattered points as outliers
      Grid: Subtle horizontal and vertical lines
      Legend: Contains 20 entries listing every series (API-Auth: Sixteenths, API-Auth: Eighths, etc.) — extremely crowded and nearly illegible
      Legibility verdict: FAIL — While individual text is readable, the legend with 20 entries is completely unusable. More critically, the visualization fails to show nested boxes — the spec requires "nested boxes representing letter values" with "boxes that decrease in width for deeper quantiles," but the implementation shows only vertical line segments with varying stroke widths, not actual nested rectangular boxes.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct
      Chrome: Title, axis labels all clearly visible in light text against dark background
      Data: Four vertical line segments per endpoint in the same colors (teal, orange, blue, reddish-purple); colored rectangles at bottom; scattered outlier points
      Grid: Subtle lines visible
      Legend: Same 20-entry legend as light render — equally unreadable
      Legibility verdict: FAIL for same reasons — all text is technically readable, but the legend is useless and the visualization fundamentally misrepresents the required plot type. Data colors are identical across both renders (only chrome flips), confirming proper theme handling. However, the nested box structure that defines a boxen plot is not visually represented in either render.

    Summary: Both renders fail the core requirement. The spec demands nested boxes with visual hierarchy, but the implementation approximates them with line segments. The 20-entry legend destroys usability in both themes.
