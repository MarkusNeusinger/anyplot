review:
  strengths:
  - 'Full theme-adaptive chrome: background, axis text, legend, and border all switch
    correctly between light (#FAF8F1) and dark (#1A1A17) renders'
  - Correct viridis colormap for continuous density data with well-styled colorbar
    (sized font, filled/bordered legend box)
  - 'Font hierarchy properly set: title 28px, axis labels 22px, tick labels 18px,
    legend 16px — readable at full resolution in both themes'
  - 'Clean Altair API usage: mark_rect with alt.Bin(maxbins=40) and count() aggregation
    is the idiomatic approach'
  - 'Excellent code quality: flat script, seed fixed, all imports used, dual PNG+HTML
    output with theme suffix'
  weaknesses:
  - 'Poor density gradient: with n=2000 and maxbins=40 most bins hold 1–10 counts,
    collapsing viridis to a nearly uniform mid-teal; the primary storytelling goal
    of a 2D histogram (revealing density variation) is largely invisible'
  - 'White/black ''holes'' inside the distribution cluster: empty bins (count=0) within
    the correlated blob create a fragmented pixel pattern instead of a smooth density
    field — reduce maxbins to ~20 or increase n to 5000+'
  - Colorbar title 'Count' is slightly clipped at the right canvas edge — add padding
    or reduce chart width by ~50px to avoid truncation
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. ✓
      Chrome: Title "histogram-2d · altair · anyplot.ai" in dark ink, clearly readable. Axis labels "Variable X" and "Variable Y" visible. Tick labels (values from -4.0 to 3.6 on Y, -4.00 to 3.20 on X) are legible. Colorbar legend labeled "Count" with viridis gradient — the "Count" title appears slightly clipped at the right canvas edge.
      Data: 2D heatmap of a bivariate normal distribution (ρ=0.7) showing a diagonal elongated cluster. Bins rendered in a nearly uniform mid-teal (mid-viridis) color. Very little density gradient is visible — outer sparse bins and dense inner bins appear almost identical in color. Empty bins within the cluster show as white (background) holes, creating a fragmented appearance.
      Legibility verdict: PASS — all text is readable against the light background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black. ✓
      Chrome: Title and axis labels rendered in light ink (F0EFE8), clearly readable against dark background. Tick labels light-colored and legible. Colorbar "Count" title also light. No dark-on-dark failures detected.
      Data: Identical teal/cyan bin colors as light render — data colors consistent across themes. ✓ Empty bins now appear as near-black (background) holes. Same poor density gradient as light render — the correlated elliptical shape is clear but internal density variation is invisible.
      Legibility verdict: PASS — all text readable against the dark background, no dark-on-dark failures.
