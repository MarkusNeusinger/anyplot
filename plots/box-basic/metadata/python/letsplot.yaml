review:
  strengths:
  - Excellent use of as_discrete(order_by='..middle..') for median-sorted categorical
    axis — a lets-plot-specific idiom that makes salary ranking immediately readable
  - Rich layer_tooltips() with per-stat lines (..middle.., ..lower.., ..upper.., ..ymin..,
    ..ymax..) delivers full interactivity in HTML output
  - Median dollar labels inside each box plus dashed overall-mean reference line provide
    strong at-a-glance data storytelling
  - 'Full theme-adaptive chrome: all INK/INK_SOFT/INK_MUTED tokens correctly threaded
    through every theme element; backgrounds correct (#FAF8F1 / #1A1A17) in both renders'
  - Clean flat code, seed-reproducible (seed=42), all imports used, proper dual-format
    PNG+HTML output
  weaknesses:
  - geom_text annotation in dark render renders with a visible light-colored background
    rectangle (lets-plot text-background feature), creating a tooltip-like artifact
    that overlaps the Sales box body and clashes with the '$69,376' median label —
    suppress with fill='transparent' or background=False equivalent on the annotation
    geom_text
  - 'Overlapping outlier circles: outlier_size=4 at scale=4 produces very large circles;
    Finance and Engineering each have 3 forced outliers at nearly identical positions
    that pile up visually — reduce to outlier_size=2.5 and spread injected outlier
    values across distinct positions (e.g. mean +/- [2.5, 3.0, 3.5]*std)'
  - Top and right panel spines not removed — add panel_border=element_blank() to theme()
    to achieve the recommended L-shaped frame
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "box-basic · python · letsplot · anyplot.ai" in bold dark ink, fully readable. Subtitle in INK_SOFT gray, readable. Axis labels "Department" (x) and "Annual Salary (USD)" (y) in dark ink, readable. Tick labels ($20,000–$140,000 and category names) in INK_SOFT, readable. Median dollar labels inside each box in bold INK, readable.
      Data: HR=ochre (#BD8233), Marketing=lavender (#C475FD), Sales=blue (#4467A3), Finance=matte-red (#AE3030), Engineering=brand green (#009E73). All palette positions 1–5 used in canonical order (data-insertion order). Outlier circles large but visible. Dashed reference line for overall mean visible.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title in warm near-white (INK=#F0EFE8), fully readable against dark background. Subtitle in INK_SOFT (#B8B7B0), readable. Axis labels and tick labels in light tones, readable. No dark-on-dark failures on any label or tick element.
      Data: Colors identical to light render (green, ochre, purple, blue, red all match). Notable issue: the geom_text annotation near the Sales box renders with a visible light-colored background rectangle in dark mode — a lets-plot text-background artifact that creates a tooltip-like overlay inside the Sales box body, partially overlapping with the "$69,376" median label. Outlier circles for Finance and Engineering overlap each other at their high-salary extremes.
      Legibility verdict: PASS (overall) — annotation artifact is a visual regression in dark mode but does not make text unreadable
