      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "box-basic · python · letsplot · anyplot.ai" bold dark text, clearly readable. Subtitle readable. Axis labels "Department" and "Annual Salary (USD)" dark and legible. Tick labels dark on light, clearly visible. Annotation text "Avg: $72,853 | Eng. +59% vs HR." is very small (size=3) and barely readable — marginally too small but technically present.
      Data: Five box plots with anyplot palette colors: HR=ochre (#BD8233), Marketing=lavender (#C475FD), Sales=blue (#4467A3), Finance=matte red (#AE3030), Engineering=green (#009E73). Ordered left-to-right by ascending median salary. Median labels bold inside each box. Outlier dots visible above whiskers. Dashed mean reference line.
      Legibility verdict: PASS (primary text excellent; annotation text marginally too small)

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black
      Chrome: Title and axis labels flip to light-colored text — clearly readable against dark background. Tick labels are light-on-dark, no dark-on-dark failures detected anywhere. Annotation text remains small but visible.
      Data: Colors are identical to light render — same ochre HR, lavender Marketing, blue Sales, red Finance, green Engineering boxes. Data integrity confirmed across themes.
      Legibility verdict: PASS (no dark-on-dark failures; annotation text small but same as light render)
