review:
  strengths:
  - 'Perfect spec compliance: all four required box-plot elements (IQR box, median
    line, 1.5xIQR whiskers, outlier points) implemented via Altair native mark_boxplot()'
  - 'Both themes fully theme-adaptive: PAGE_BG, INK, INK_SOFT tokens threaded into
    every configure_* call; data colors correctly theme-invariant'
  - Tooltip with Vega aggregation functions (median(), q1(), q3()) is idiomatic Altair
    and adds genuine interactive value
  - Clean flat code structure with correct canvas padding logic (pad-only, never crop)
  weaknesses:
  - Full 4-sided view border from configure_view(stroke=INK_SOFT) instead of L-shaped
    frame — set configure_view(stroke=None) and rely on axis domain lines for left/bottom
    frame
  - 'No data storytelling or visual hierarchy: Engineering highest median and HR narrowest/lowest
    distribution are key insights but nothing draws viewer attention (DE-03 = 2/6)'
  - ANYPLOT_PALETTE defined with only 5 entries instead of canonical 8 — expand to
    full palette
  - 'DE-01 could reach 6/8 with one more deliberate design touch: annotation on highest-salary
    department median or subtle opacity variation between boxes'
