review:
  strengths:
  - 'Excellent data design: 5 city zones with deliberately varied distribution shapes
    (narrow Park, bimodal Downtown, exponential Industrial) showcase all aspects of
    box plots including outliers, skew, and multimodality'
  - 'Smart outlier display: fliersize=0 paired with a semi-transparent stripplot (alpha=0.25,
    jitter=0.2) shows both the box summary and full raw-data distribution simultaneously
    — superior to default flier rendering'
  - Correct anyplot palette applied in canonical order (#009E73 first), no legend
    needed since color maps to x-axis categories, clean despined layout
  - Full theme-adaptive chrome with all tokens (INK, INK_SOFT, PAGE_BG) threaded to
    every element including tick_params colors — both renders are clean and readable
  - 'Modern seaborn API compliance: hue+legend=False pattern avoids palette-without-hue
    warning; sns.despine() and sns.set_theme(rc=...) used correctly'
  - Reproducible with np.random.seed(42); KISS structure throughout; all font sizes
    explicitly set
  weaknesses:
  - 'DE-01 moderate: well-configured and professional but not yet at ''strong design''
    tier — consider spacing refinements or a slightly bolder median line to create
    visual hierarchy within the boxes'
  - 'VQ-03 minor: strip plot size=3 at alpha=0.25 produces individually faint dots
    at medium density (~75-100 pts/zone); size=4 or alpha=0.35 would improve individual
    point visibility without cluttering'
  - 'LM-02: the boxplot+stripplot combination is seaborn-idiomatic but stops short
    of using any truly seaborn-exclusive feature (e.g., sns.catplot with inner=''point'',
    or a violinplot overlay option); consider whether a violin half or swarm layer
    would add distinctive value'
