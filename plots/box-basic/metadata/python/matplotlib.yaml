  strengths:
  - 'Perfect spec compliance: all four box plot requirements (median, outliers, whiskers,
    per-category colors) present and working.'
  - Realistic neutral salary dataset with deliberate high and low outliers that genuinely
    showcase the plot type.
  - Anyplot palette used correctly in canonical order; theme chrome adapts cleanly
    in both renders.
  - pe.withStroke path effects on box edges are a polished matplotlib-specific touch.
  - Data-driven annotations actively guide the reader to the key takeaways.
  - 'Code quality is exemplary: seed set, modern API, clean linear structure.'
  weaknesses:
  - The Tightest spread IQR=$11K annotation text box (for Retail, index 4) is placed
    at xytext=(tightest_idx - 0.8, median + 38) = (3.2, ~88), which lands directly
    on top of the Healthcare box (center x=3, Q1~78-Q3~107). Move the text box to
    the right of Retail or below it so it does not overlap any other series.
  - The Widest spread annotation for Finance uses xytext=(widest_idx + 1.7, ...) which
    places text between Finance and Healthcare columns; pulling it slightly higher
    or further right would add breathing room.
  - Red annotation text (#AE3030) on dark elevated background (#242420) passes but
    has lower contrast than the other callouts; consider using INK token for annotation
    text color in dark mode while keeping the box border in the series color.
