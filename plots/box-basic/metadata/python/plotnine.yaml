review:
  strengths:
  - 'Full spec compliance: median line, outliers, whiskers at 1.5*IQR, and distinct
    colors per category all correctly implemented via geom_boxplot + stat_summary'
  - 'Excellent data storytelling: bracket annotation shows Engineering vs Support
    salary gap, callout identifies Sales high outliers as senior hires, italic note
    highlights Support tight distribution'
  - 'Correct theme adaptation: both light (#FAF8F1) and dark (#1A1A17) renders use
    proper background tokens, theme-adaptive INK/INK_SOFT/INK_MUTED throughout text
    and annotations'
  - Departments ordered by ascending median salary (Support to Engineering) making
    the progressive hierarchy immediately readable
  - Diamond median markers via stat_summary(geom='point', shape='D') add precision
    beyond the standard box, and the anyplot palette is applied in canonical order
  weaknesses:
  - Annotation text at size=4.0 and 3.8 (plotnine mm units ≈ 11–11.4pt) is readable
    at 3200px full resolution but borderline at mobile scaling (~400px width); increase
    bracket annotation to size=4.5 and 'Narrow spread' to size=4.2 for safer mobile
    readability
  - 'Design refinement is solid but could push further: tick marks on both axes are
    already removed, but the box whisker lines use color=INK_SOFT which creates a
    slight visual heaviness — consider color=''#B8B7B0'' equivalent for less dominant
    whiskers'
  - 'LM-02 (Library Mastery): implementation correctly uses grammar of graphics composition
    and stat_summary, but misses an opportunity to use position_dodge or explicit
    stat layers that would showcase deeper plotnine-specific capability'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white
      Chrome: Title "box-basic · python · plotnine · anyplot.ai" in dark ink at 12pt, clearly visible at top. X-axis label "Department" and Y-axis label "Salary ($)" both dark and readable at 10pt. Tick labels (e.g. "$20k", "$40k") in INK_SOFT at 8pt — all legible. Subtle horizontal-only grid lines at ~15% opacity.
      Data: 5 box plots in anyplot palette canonical order: Support=green (#009E73), Marketing=lavender (#C475FD), Sales=blue (#4467A3), Research=ochre (#BD8233), Engineering=muted-red (#AE3030). Each box has a dark diamond median marker. Sales shows 3-4 high outliers near $130-140k; Research shows one low outlier near $18k. Bracket annotation at top: "Engineering earns $39k more than Support" with segment ticks. Label box "Senior hires\nabove market rate" with connector to Sales outlier cluster. Italic text "Narrow spread\n(σ ≈ $8k)" below Support box at $24k.
      Legibility verdict: PASS — all text is readable against light background; annotation text (size 4.0, 3.8) is borderline small at mobile scale but readable at full resolution.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title, axis labels, and tick labels all rendered in light cream/off-white text — clearly visible against dark background. No dark-on-dark failures detected. Grid lines visible in subtle light-on-dark style. Annotation texts correctly rendered in light INK (#F0EFE8) and INK_MUTED (#A8A79F).
      Data: Box plot colors are IDENTICAL to light render — green, lavender, blue, ochre, red — confirming palette colors are theme-independent. Diamond median markers appear in light cream (#F0EFE8) in the dark render (correctly using INK token which flips to light). Callout fill uses ELEVATED_BG (#242420) — correct dark elevated surface.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures; brand green #009E73 remains clearly visible on dark surface.
