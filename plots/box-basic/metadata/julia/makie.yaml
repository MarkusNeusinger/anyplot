  strengths:
  - Full spec compliance — median line, 1.5×IQR whiskers, outlier dots, and multi-category
    coloring all present
  - Intentional visual hierarchy via opacity (Engineering at 1.0, others at 0.5) creates
    a clear focal point without extra annotations
  - All-dept median reference line with annotation adds real analytical value and
    differentiates from a default boxplot
  - Theme-adaptive chrome correctly implemented across all elements (title, axis labels,
    ticks, spines, grid, median line)
  - Clean, reproducible flat script with appropriate Makie idioms (RGBAf, boxplot!
    per-observation colors, hlines!)
  - Perfect code and data quality — seeded, clean imports, realistic salary domain
  weaknesses:
  - 'Alpha transparency on data series (50% for non-Engineering boxes) makes effective
    displayed color theme-dependent: pastel on light, darker on dark. Fix: encode
    dimmed emphasis using a fixed hex mixed toward PAGE_BG rather than alpha-compositing
    with background.'
  - Annotation text fontsize=10 is too small for mobile readability. Increase to at
    least fontsize=12.
  - Annotation at x=0.58, y=all_median crowds Engineering lower-whisker region. Move
    to x=2.5 (center) or x=5.3 (right margin) to avoid overlap.
