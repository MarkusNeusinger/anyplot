  - Interactive HTML output saved alongside PNG (pygal's native capability leveraged)
  weaknesses:
  - Axis label font size (label_font_size=28) is significantly below the pygal style-guide
    recommendation of 56 and creates an inverted hierarchy — tick labels (major_label_font_size=44)
    appear larger than the axis titles 'Prediction Error' and 'Model Complexity'.
    Raise label_font_size to at least 44–50; if y_title overflows, increase chart
    margins or reduce the stroke_width workaround instead of shrinking axis labels.
  - to_px helper function defined in top-level scope — for KISS structure, inline
    the two arithmetic expressions directly at each call site (4 uses) to eliminate
    the function.
  - Direct annotations at x=9.0 ('Total Error', 'Variance', 'Bias²') are tightly clustered
    near the right edge of the chart area; at narrow viewports or when scaled down,
    the labels may crowd the axis boundary. Shift annotation x to ~8.0 and add a small
    horizontal text offset away from the right edge.
