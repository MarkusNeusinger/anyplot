review:
  strengths:
  - 'Semantic zone shading: green/purple plotBands semantically mirror the bias/variance
    color assignment — thoughtful design decision.'
  - Total Error visually prioritized via 8px line width (vs 5px for other curves),
    creating clear hierarchy without extra visual noise.
  - Complete formula subtitle satisfies the spec requirement elegantly.
  - Both themes fully theme-adaptive, with correct anyplot palette and background
    tokens in every text, legend, and chrome element.
  - plotBands + plotLines used idiomatically — best approach in Highcharts for zone
    annotations.
  weaknesses:
  - 'AreaSeries with fill_opacity=0 used instead of LineSeries/SplineSeries for the
    line-only curves. This causes the plotOptions.spline.marker: {enabled: false}
    to not apply to these series, leaving default markers visible at all 100 data
    points on Bias squared and Variance. Replace with proper series type or add marker:
    {enabled: False} directly on each series.'
  - 'No direct curve annotations: spec requires labeling each curve directly on the
    plot. Add in-plot text labels near the right-side endpoints of each curve (e.g.,
    using Highcharts dataLabels on the last point) instead of relying solely on the
    legend.'
  - 'All four chart spines remain visible. Remove the top and right axis lines by
    setting lineWidth: 0 on the right-side and top axis for an L-shaped frame per
    style guide defaults.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface.
      Chrome: Title (66px bold, dark #1A1A17) clearly readable. Axis labels (56px dark) and tick labels (44px, secondary color) all legible. Subtitle formula visible. Zone labels ("Underfitting Zone" in #009E73, "Overfitting Zone" in #C475FD) readable against lightly shaded bands. "Optimal" label near vertical dashed line readable.
      Data: Four curves — Bias² (#009E73, first series ✓), Variance (#C475FD), Irreducible Error (#4467A3, dotted), Total Error (#BD8233, thicker). Optimal point diamond (ochre) at approximately (2.2, 1.6). Shaded zones (green left, purple right).
