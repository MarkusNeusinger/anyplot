review:
  strengths:
  - Full spec compliance with all 4 required curves (bias squared, variance, irreducible
    error, total error), optimal point marker, formula annotation, shaded underfitting/overfitting
    zones, and direct curve labels
  - Intentional line-width hierarchy (7px total error, 5px bias/variance, 4px irreducible)
    creates clear visual prominence ordering with Total Error as the focal curve
  - 'Correct semantic palette usage — brand green #009E73 for the most important curve
    (Total Error), with anyplot canonical order for remaining series; Irreducible
    Error appropriately uses INK_SOFT as a reference baseline'
  - Both renders fully readable with proper theme-adaptive chrome tokens (INK/INK_SOFT)
    propagated to all non-data elements including Labels — no dark-on-dark failures
  - Strong Bokeh library mastery with BoxAnnotation for shaded zones, Span for vertical
    reference line, and Label for direct curve annotations — distinctive Bokeh models
    used effectively
  weaknesses:
  - Both X and Y grid lines are shown (p.xgrid and p.ygrid both active); for a line
    chart, style guide recommends Y-axis grid only — remove p.xgrid.grid_line_color
    or set to None
  - INK_MUTED variable is defined but never used — remove for cleaner code
  - p.outline_line_color = INK_SOFT adds a visible border box around the plot area;
    removing it (p.outline_line_color = None) would give a cleaner, more refined look
  - Optimal annotation at 22pt is the same size as the Irreducible Error label; increase
    to 26pt to match the visual prominence of the other primary curve labels
