      Data: Four smooth curves: Bias² in #009E73 (brand green, dashed), Variance in #C475FD (lavender, dashed), Irreducible Error in muted gray (dotted horizontal), Total Error in #AE3030 (red, solid, thickest). Shaded green zone for underfitting, shaded lavender zone for overfitting. Star marker at optimal complexity. Dashed red vertical line at optimal complexity. "Underfitting (High Bias)" in green text and "Overfitting (High Variance)" in lavender text in upper zone areas. Formula box "Total Error = Bias² + Variance + ε" centered in plot. Legend in top-left with border.
