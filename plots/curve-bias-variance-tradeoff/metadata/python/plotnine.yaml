  - Formula text and some curve labels are rendered at 3.2–3.5 mm (≈9–10 pt) — readable
    but on the smaller side; increasing to 3.8–4.0 mm would improve legibility on
    mobile-scaled views
  - 'Design Excellence has room to grow: DE-02 whitespace could be more generous (consider
    increasing plot margins), and DE-03 storytelling could be stronger by making the
    U-minimum of Total Error more visually prominent (e.g., a dot marker or callout
    at the optimal point)'
  - 'LM-02: No truly plotnine-distinctive feature used; consider using stat_smooth
    or a facet to demonstrate the ggplot2 grammar''s distinctive capabilities'
