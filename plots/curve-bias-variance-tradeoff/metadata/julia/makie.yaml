review:
  strengths:
  - All 4 required curves (Bias², Variance, Total Error, Irreducible Error) rendered
    with correct shapes — decreasing bias, increasing variance, U-shaped total, constant
    irreducible
  - Shaded underfitting/overfitting zones using vspan! with very low alpha (0.07)
    elegantly separate the two regimes without competing with data
  - Optimal complexity point marked with vertical dashed line plus scatter marker
    with stroke — immediately draws the eye
  - Direct curve labels placed on the plot (spec requirement) plus a legend — redundant
    labeling aids comprehension
  - Formula annotation 'Total Error = Bias² + Variance + Irreducible Error' connects
    the visual to the math
  - 'Correct Imprint palette in canonical order: #009E73 Bias², #C475FD Variance,
    #4467A3 Total Error, #BD8233 Irreducible Error, plus distinct linestyles for redundant
    encoding'
  - Both light (#FAF8F1) and dark (#1A1A17) renders are fully readable with proper
    theme-adaptive chrome throughout
  - 'All font sizes explicitly set: titlesize=20, labels=14, ticks=12, annotations=12'
  - 'Uses idiomatic CairoMakie primitives: vspan!, vlines!, axislegend with elevated
    ELEVATED_BG and frame styling'
  - 'Perfect code structure: KISS, reproducible seed, clean imports, correct output
    filename pattern'
  weaknesses:
  - Direct curve labels (Bias², Variance, Total Error, Irreducible Error) use fontsize=12,
    which is the smallest text in the chart — consider bumping to 13-14pt so they
    remain readable when the image is scaled to mobile widths (~400px)
  - Formula annotation at fontsize=12 right-aligned at the bottom right is easy to
    overlook — consider increasing to 13pt or adding a subtle background rect to make
    it stand out
  - 'DE-01/DE-02: Zone shading is at alpha=0.07, making it barely perceptible — bumping
    to 0.10-0.12 would make the underfitting/overfitting regions more visually distinct
    without overwhelming the data'
  - 'LM-02: The implementation could showcase more distinctly Makie-native features,
    such as using Makie''s Observable/Lift pattern for the optimal-point annotation
    or a Colorbar for a gradient effect on a secondary element'
