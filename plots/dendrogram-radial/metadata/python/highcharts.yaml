review:
  strengths:
  - Correct radial dendrogram topology with root-centered layout and distance-proportional
    branch lengths
  - 'Perfect Okabe-Ito palette with #009E73 as Cluster A; theme-adaptive chrome works
    correctly in both light and dark renders'
  - Neutral cross-cluster branches using INK_SOFT create clear visual hierarchy between
    intra-cluster and inter-cluster merges
  - Geometrically correct arc generation at constant radius for horizontal dendrogram
    connectors
  - Clean reproducible code with seed set and correct output artifacts (PNG + HTML
    for both themes)
  weaknesses:
  - 'Missing leaf labels: gene_labels array (Gene01-Gene40) is defined but never rendered
    around the circumference; spec explicitly requires leaf node names - add dataLabels
    to the leaf scatter series with rotation set per leaf angle'
  - Title font size 26px is below the 28px recommendation for pixel-based libraries;
    increase to 28px
  - Without leaf labels the plot cannot communicate which gene belongs to which cluster,
    significantly weakening data storytelling
