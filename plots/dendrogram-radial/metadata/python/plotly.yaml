review:
  strengths:
  - 'Correct radial dendrogram layout: root at center, leaves at circumference, branch
    lengths proportional to merge distance'
  - 'Proper Okabe-Ito palette in canonical order (#009E73, #D55E00, #0072B2) for the
    three species'
  - 'Sophisticated branch coloring: pure-species branches get their color, mixed branches
    rendered in neutral INK_SOFT - shows design thinking'
  - 'Full theme adaptation: background, text, legend, and inner branches correctly
    flip between light (#FAF8F1) and dark (#1A1A17) while data colors remain constant'
  - Interactive hover tooltips on leaf markers (plotly's distinctive feature) with
    species labels, plus HTML export
  - Uses real iris dataset with 36 leaves sampled 12 per species - well-chosen for
    demonstrating radial dendrogram's advantage over linear layouts
  - Square 3600x3600 output format is appropriate for the circular/symmetric chart
    type
  - Title, legend, and leaf labels all color-coded by species for consistent storytelling
  weaknesses:
  - Leaf label font size is 10px on a 1200px base figure - effective size ~30px on
    3600px output, below the recommended 18px guideline for pixel-based libraries;
    increase to 14-16px for better legibility
  - Label crowding at dense leaf clusters (bottom Vi group, top Se group) causes some
    overlap; a smart angular spacing check or text-offset logic would prevent this
  - Title format adds 'Iris Species Clustering · ' prefix before the required '{spec-id}
    · {library} · anyplot.ai' pattern - reorder to match required format exactly
  - Helper function branch_color() violates KISS structure (Imports → Data → Plot
    → Save, no functions); inline the color logic with a dict lookup
  - 'LM-02 could be stronger: plotly supports polar/scatterpolar trace types that
    could be leveraged instead of building the radial layout entirely from Cartesian
    Scatter traces'
  - Virginica leaf labels (#0072B2 blue) have lower contrast on the dark (#1A1A17)
    background than Setosa green and Versicolor orange; not a blocking issue but worth
    noting
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct theme surface.
      Chrome: Title "Iris Species Clustering · dendrogram-radial · plotly · anyplot.ai" in dark ink, centered at top, clearly readable. Legend in top-left shows Setosa/Versicolor/Virginica with marker+line samples. All chrome text is dark on the light background — no legibility failures.
      Data: Circular radial dendrogram with 36 leaves. Setosa branches in #009E73 (teal-green, upper-right arc), Versicolor branches in #D55E00 (orange-red, left arc), Virginica branches in #0072B2 (blue, lower-right arc). Mixed/root branches rendered in neutral gray (#4A4A44 INK_SOFT). Leaf markers with white edge rings. Leaf labels color-coded by species at ~1.10 radius. Some label crowding at dense clusters (bottom Vi group, top Se group).
      Legibility verdict: PASS — all title and legend text clearly readable. Leaf labels slightly small but distinguishable.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct dark surface.
      Chrome: Title and legend text are light-colored (#F0EFE8 INK), readable against the dark background. Inner/mixed branches render in #B8B7B0 (light gray INK_SOFT) — appropriate flip for dark theme. No dark-on-dark failures for title, legend, or inner branch color.
      Data: Identical data colors to light render — Setosa in #009E73, Versicolor in #D55E00, Virginica in #0072B2. Leaf markers retain their species colors with page-background edge rings (now dark). Leaf labels remain species-colored, matching the light render's identity.
      Legibility verdict: PASS — title, legend, and most leaf labels readable. Minor note: Virginica blue (#0072B2) leaf labels have somewhat lower contrast on the dark background compared to the greens/oranges, but not a blocking failure.
