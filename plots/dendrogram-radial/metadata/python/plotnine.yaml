review:
  strengths:
  - Correct Okabe-Ito palette with canonical ordering; both themes render correctly
    with no dark-on-dark failures
  - All cartesian chrome (grid, axes, border) correctly removed for circular layout
    — appropriate for dendrogram type
  - Dual-layer markers (inner leaf dots + outer ring squares) is a thoughtful design
    choice that reinforces cluster membership visually
  - Accurate radial coordinate transformation preserving branch-length proportionality
    (merge distances encoded as radial distances)
  - scipy hierarchical clustering (Ward linkage) with fcluster for proper clade assignment
  weaknesses:
  - Leaf text labels missing from circumference — spec explicitly lists labels (string[])
    as a required data element shown around the circumference; even abbreviated labels
    or species codes would fulfill this
  - Helper functions (x_to_theta, y_to_r, to_xy) violate KISS structure; consider
    inlining coordinate transforms
  - Title lacks font weight specification — element_text(size=24) but no weight='bold';
    adding weight='bold' would improve visual hierarchy
  - Legend at position (0.85, 0.12) slightly overlaps the outer ring data in both
    renders; repositioning outside the circle would improve layout
  - Inner leaf dots (size=3) are noticeably smaller than outer ring squares (size=5);
    consider increasing to size=4 for better visual balance
