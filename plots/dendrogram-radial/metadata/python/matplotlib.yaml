review:
  strengths:
  - Custom radial coordinate transformation (to_xy) correctly maps dendrogram icoord/dcoord
    to polar space with inner_r padding
  - 'Correct Okabe-Ito palette applied in canonical order; first series (Asteraceae)
    = #009E73'
  - 'Full theme-adaptive chrome: PAGE_BG, INK, INK_SOFT tokens applied to background,
    title, legend frame, leaf labels — both renders are readable'
  - link_color_func idiom correctly integrates scipy dendrogram branch coloring with
    per-family colors
  - Arc segments drawn at constant merge radius cleanly show horizontal branch spans
    in polar space
  - Legend uses Line2D marker handles with proper frame theming (ELEVATED_BG, INK_SOFT
    edge, INK_SOFT text)
  - np.random.seed(42) ensures full reproducibility; 12×12in square canvas is appropriate
    for a radial symmetric plot
  weaknesses:
  - Leaf labels at fontsize=6 are very small for a 3600×3600px canvas (≈25px glyph
    height); increase to 7-8pt or reduce to 40 species to improve legibility
  - Some label crowding in dense cluster regions (top arc, bottom arc) — angular gap
    of 7.2° between 50 leaves is tight; consider skipping every other label or using
    radial offset stagger
  - Branch linewidth=1.2 is thin at high resolution; 1.5-2.0pt would read more clearly
    without losing detail
  - DE-03 data storytelling is minimal — the grey inner branches are informative but
    a brief annotation calling out the most-distinct family grouping would elevate
    narrative clarity
  - 'CQ-01: two helper functions (to_xy, link_color_func) depart slightly from pure
    KISS; link_color_func is API-required but to_xy could be inlined'
