review:
  strengths:
  - Correct radial dendrogram with root at center and leaves at circumference
  - 'Elegant branch coloring: per-cluster colors within subtrees, neutral INK_SOFT
    for cross-cluster merges'
  - Arc connections at merge height drawn correctly (constant-radius arc sweep)
  - Both themes render correctly — background and chrome tokens properly applied,
    no dark-on-dark failures
  - Realistic plant-family context (Asteraceae, Rosaceae, Fabaceae, Poaceae, Lamiaceae)
    with plausible morphological data
  - 'Proper Okabe-Ito order: Asteraceae=#009E73 as first series, correct ordering
    through all 5 families'
  - np.random.seed(42) ensures full reproducibility
  - Leaf markers clearly visible at s=110 around the full circumference
  weaknesses:
  - No leaf/species labels around the circumference — spec explicitly lists 'labels
    (string[]) displayed around the circumference' as a data field; even abbreviated
    labels for the 50 species would satisfy this
  - Legend fontsize=14 is below the 16pt style-guide minimum for this canvas size
  - Helper functions (link_color_func, to_xy) technically violate CQ-01 'no functions/classes';
    they could be inlined or replaced with lambda+np.vectorize
  - Center area becomes visually cluttered where all cross-cluster branches converge
    — inner radius could be padded to push the root outward and open up the center
  - 'LM-01: a matplotlib polar projection (projection=''polar'') would be more idiomatic
    than a manual Cartesian-to-polar transform, though the manual approach is more
    flexible for this scipy dendrogram use case'
