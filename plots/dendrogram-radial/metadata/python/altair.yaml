review:
  strengths:
  - Correct radial dendrogram with root at center and leaves on circumference
  - Branch lengths proportional to hierarchical merge distance via 1.0 - dist/max_dist
    mapping
  - 'Branch and leaf dot colors follow Okabe-Ito palette in canonical order (Cluster
    1 = #009E73)'
  - Inter-cluster branches colored with INK_SOFT for clear theme-adaptive neutral
  - Both light (#FAF8F1) and dark (#1A1A17) backgrounds correctly applied
  - Interactive tooltips on leaf nodes (label + cluster) using Altair's tooltip encoding
  - Altair layer composition with detail='g:N' for grouped line segments is idiomatic
  - Custom horizontal legend built from dots + text layers avoids Altair legend API
    quirks
  - HTML output correctly saved alongside PNG
  - Gene expression domain provides realistic scientific context
  weaknesses:
  - Title font size is 22px (explicit but below the pixel-based library minimum of
    28px — increase to 28 or higher)
  - Leaf labels (G01–G30) are not rendered around the circumference — spec explicitly
    requires names displayed around the circumference; 30 nodes is feasible, use mark_text
    with angle encoding or radial positioning
  - 'CQ-01 penalty: branch_color() is a standalone function; inline the color lookup
    into the loop or use a dict lookup to keep the flat KISS structure'
  - 'DE-01/DE-02 room for improvement: add strokeOpacity variation to emphasize the
    outermost leaf-level branches, increase strokeWidth for primary clade lines vs
    secondary'
  - Slight excess empty space at the top of the canvas between title and dendrogram
    circle — increase chart height or shift circle upward by reducing the XY_DOM ceiling
  - 'LM-01: the geometry (arc/radial calculations) is pure numpy; Altair''s mark_arc
    or polar encodings are not used — comment or structure could make the Altair-specifics
    more prominent'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct, not pure white. PASS.
      Chrome: Title "dendrogram-radial · altair · anyplot.ai" in dark ink at top — clearly readable. No axis labels (appropriate for radial chart). Legend text "Cluster 1"–"Cluster 5" in medium gray below circle — readable.
      Data: 5 color-coded clusters: Cluster 1 = #009E73 (teal-green), Cluster 2 = #D55E00 (vermillion-orange), Cluster 3 = #0072B2 (blue), Cluster 4 = #CC79A7 (pink), Cluster 5 = #E69F00 (amber). Radial tree branches colored by cluster, with mixed-cluster (inter-clade) arcs in gray-brown INK_SOFT. Leaf dots at circumference match cluster colors. Lines strokeWidth=2 clearly visible. No leaf text labels around circumference.
      Legibility verdict: PASS — all visible text is readable against the light background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct. PASS.
      Chrome: Title text is light/white — clearly readable against dark background. Legend text appears light gray — readable. No dark-on-dark failures observed.
      Data: Data colors identical to light render — Cluster 1 teal-green, Cluster 2 orange, Cluster 3 blue, Cluster 4 pink, Cluster 5 amber. Inter-cluster arcs now appear lighter gray (INK_SOFT dark token = #B8B7B0). Leaf dots same colors. All branch lines clearly visible on dark background.
      Legibility verdict: PASS — no dark-on-dark text; all elements readable on the near-black surface.
