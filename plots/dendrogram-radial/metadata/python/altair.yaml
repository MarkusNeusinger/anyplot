review:
  strengths:
  - From-scratch radial dendrogram with correct scipy linkage geometry (arc arcs +
    radial segments)
  - INK_SOFT for mixed-cluster branches creates clear visual hierarchy
  - detail:N channel elegantly handles multi-segment line rendering
  - Both themes render correctly with proper background tokens and matching data colors
  - 'Full spec compliance: root-at-center, leaf-at-circumference, distance-proportional
    branch lengths, cluster coloring'
  weaknesses:
  - Gene leaf labels lack explicit fontSize — rendered via tooltip encoding at default
    size rather than a dedicated mark_text layer
  - branch_color() helper function violates KISS structure; should be inlined as vectorized
    pandas operation
  - Title fontSize=22px is below the 28px recommendation for pixel-based libraries
  - Generic gene names (G01-G30) reduce realism — named genes would improve DQ-02
  - Design polish could be elevated with more refined treatment of mixed-branch arcs
