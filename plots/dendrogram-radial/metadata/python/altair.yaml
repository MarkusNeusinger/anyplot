      Data: 5 clusters in Okabe-Ito order — Cluster 1 #009E73 (brand green), Cluster 2 #D55E00 (orange), Cluster 3 #0072B2 (blue), Cluster 4 #CC79A7 (reddish-purple), Cluster 5 #E69F00 (golden-yellow); mixed branches in INK_SOFT dark gray; leaf circles at size=100
