  weaknesses:
  - 'Library Mastery gap: `import pygal` is entirely absent — the implementation uses
    cairosvg directly to convert hand-built SVG, bypassing the pygal library API (Style,
    chart objects, interactive JS output) completely. For a pygal implementation,
    at minimum the pygal.Style token system should be used.'
  - 'No pygal interactivity: the HTML output embeds a static SVG instead of using
    pygal''s native JS tooltip/interaction layer. Pygal''s distinctive value is interactive
    chart rendering, which is unused.'
  - Defines a user-defined function (polar_xy) — CQ-01 prefers flat script structure;
    a one-liner lambda or inline formula would keep the code flat.
  - Leaf label font-size (28px) is at the lower edge of readability for 24 densely-placed
    radial labels on a 4800×2700 canvas; a few labels near the bottom arc are tight.
  - Legend text uses INK_SOFT rather than INK for the group names, making them slightly
    muted — especially noticeable in the dark theme.
