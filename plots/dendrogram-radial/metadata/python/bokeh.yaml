review:
  strengths:
  - Correct radial dendrogram with root at center and leaves at equal angular spacing
    around circumference
  - Branch coloring propagated from leaves up through merge nodes using cluster assignment
    — creates strong visual cluster identity
  - Metadata ring (colored dots at leaf tips) implements the optional spec feature
    cleanly
  - Arc segments between child branches correctly rendered at parent radius, producing
    smooth dendrogram joins
  - 'Full theme-adaptive chrome: background, title, legend, and label colors all correctly
    switch between light and dark'
  - Interactive HTML output alongside PNG — appropriate for Bokeh as an interactive
    library
  - Realistic gene expression clustering scenario with ward linkage and well-separated
    cluster centers
  weaknesses:
  - Canvas is 2700×2700 px instead of the required 3600×3600 px square format — reduces
    effective resolution and proportionally shrinks all text and elements
  - Leaf label font size 11pt is small for the canvas size; recommended minimum is
    18pt for pixel-based libraries at full resolution
  - Helper functions (polar_to_xy, get_leaf_cluster) violate the KISS no-functions-or-classes
    structure rule
  - Legend may be rendered very small or difficult to see at full resolution due to
    the undersized canvas
  - DE-01/DE-02 scores limited by lack of additional polish (e.g., subtle radial guide
    rings, refined typography hierarchy, or a subtle center marker)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white matching #FAF8F1 — correct light theme surface, not pure white
      Chrome: Title "dendrogram-radial · bokeh · anyplot.ai" visible as dark text at top-center. No axis labels (correct for radial layout). Gene labels placed at radius 1.08 from center in INK_SOFT (#4A4A44) — readable though somewhat small. Legend present at bottom-right.
      Data: Four distinct clusters color-coded with Okabe-Ito positions 1–4: teal-green (#009E73) for Cluster 1, orange (#D55E00) for Cluster 2, blue (#0072B2) for Cluster 3, reddish-purple (#CC79A7) for Cluster 4. Branch lines colored by cluster assignment from leaves through internal merge nodes. Colored dots at leaf tips serve as the metadata ring. Central merge area uses INK_SOFT gray.
      Legibility verdict: PASS — all text readable against warm off-white background; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black matching #1A1A17 — correct dark theme surface, not pure black
      Chrome: Title visible as light (#F0EFE8) text. Gene labels visible as light gray (#B8B7B0 INK_SOFT). Legend present with elevated dark background (#242420) and light label text.
      Data: All four cluster colors are identical to the light render — teal-green, orange, blue, reddish-purple. Branch lines and leaf dots maintain the same Okabe-Ito colors. Only chrome elements (background, text, legend fill) have flipped to dark theme.
      Legibility verdict: PASS — no dark-on-dark issues; all labels use theme-correct light tokens; #009E73 brand green clearly visible on dark surface.
