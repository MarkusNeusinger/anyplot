      Data: Empirical MMP curve in brand green #009E73 (solid, linewidth=1.3) sweeps from ~1100W at 1s to ~280W at 5h. CP model in lavender #C475FD (dashed, linewidth=1.0) visible from 2min onward. Horizontal dotted CP asymptote in INK_SOFT. Vertical dashed reference lines in INK_MUTED. Scattered green points (size=1.8, alpha=0.75) visible at every 3rd sample. First series is brand green #009E73.
