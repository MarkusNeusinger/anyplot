review:
  strengths:
  - 'Strong spec compliance: all required features present — log x-axis with human-readable
    tick labels, empirical MMP curve (green solid), CP model overlay (blue dashed),
    vertical reference markers at 5s/1min/5min/20min, CP asymptote with annotation'
  - 'Perfect data quality: realistic CP=280W, W''=20000J, Pmax=1100W parameters for
    a well-trained cyclist; full power-duration spectrum from 1s sprint to 5h endurance'
  - 'Excellent theme-adaptation: both light (#FAF8F1) and dark (#1A1A17) renders are
    fully readable with correctly flipped chrome tokens; no dark-on-dark failures'
  - 'Strong code structure: KISS linear layout, set.seed(42) reproducibility, guides(override.aes)
    for expert linetype+linewidth legend customization'
  - 'Good storytelling: reference duration guides and CP asymptote label contextualize
    the cycling performance narrative clearly'
  weaknesses:
  - 'VQ-06: Axis labels lack explicit units — y-axis reads ''Mean-Maximal Power''
    (should be ''Mean-Maximal Power (W)'') and x-axis reads ''Duration (log scale)''
    (should be ''Duration (s)'' or ''Duration (log scale, s)''); tick labels carry
    units but the axis label itself should too per style guide'
  - 'VQ-07: Imprint palette position 2 (#C475FD lavender) is skipped — CP Model uses
    position 3 (#4467A3 blue) directly. Either use canonical order (position 2 for
    CP Model) or add a semantic justification comment. Blue is not a mandatory semantic
    color for ''model fit'' lines in this context.'
  - 'CQ-03: library(dplyr) and library(scales) are imported but no functions from
    either package appear in the code — data.frame() is base R, expansion() is ggplot2-native,
    label formatting uses anonymous functions. Remove both unused imports.'
  - 'DE-02: Minor grid lines (panel.grid.minor) are visible in the rendered images,
    creating some visual noise in the flat lower region of the curve where MMP line,
    CP model, and CP asymptote converge. Consider removing minor grid or reducing
    its alpha further.'
  - 'DE-01: Design sophistication is above defaults but not publication-ready — consider
    removing minor grid entirely, tightening whitespace at bottom between chart and
    legend, and adding a subtle background fill difference to the legend panel to
    make it stand out more cleanly.'
