review:
  strengths:
  - 'Perfect spec compliance: all required features (MMP curve, CP model, log x-axis,
    reference duration markers, CP asymptote) present and correctly implemented'
  - Dual-scale coordination using scale_color_manual + scale_linetype_manual + guides(override.aes=)
    is exactly the right ggplot2 idiom for combined colour+linestyle legends
  - 'Full theme adaptation: both light and dark renders pass readability check with
    no dark-on-dark or light-on-light failures'
  - cummin() enforces the physically-required monotonicity of the MMP curve — a domain-correct
    detail
  - R-specific workaround for grid alpha (grDevices::adjustcolor) shows awareness
    of ggplot2 element_line alpha limitation
  weaknesses:
  - Reference duration annotation text (geom size=2.4, ~6.8pt) and CP label (size=2.6,
    ~7.4pt) are near the minimum readable threshold; increase to size 2.8-3.0 to improve
    legibility at mobile display widths
  - Scatter markers at size=1.8 with every-3rd thinning are quite subtle; increase
    to size=2.2-2.5 for more visual depth without cluttering (15 points is sparse
    enough)
  - 'Design Excellence headroom: consider adding a shaded W prime zone (geom_ribbon
    between empirical curve and CP asymptote, alpha=0.06-0.08) or annotating key reference
    power values alongside vertical duration guides to elevate storytelling'
