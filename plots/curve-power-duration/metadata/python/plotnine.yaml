  strengths:
  - 'Perfect spec compliance: log-x, empirical MMP curve, CP model overlay, reference
    duration markers, and CP asymptote all implemented correctly'
  - Correct Imprint palette usage with brand green first series and theme-adaptive
    chrome in both light and dark renders with no dark-on-dark issues
