review:
  strengths:
  - 'Physiologically-correct synthetic data: CP≈280W, W''=20000J, P_max≈1100W at 1s
    — all values match a well-trained road cyclist profile'
  - 'Correct Imprint palette in canonical order: empirical curve #009E73 (brand green),
    CP model #C475FD (lavender), CP asymptote #4467A3 (blue)'
  - Smart use of allow_interruptions=True so the CP model (valid only for t≥30s) naturally
    appears only from 30s onward without any code logic for gap rendering
  - Effective use of pygal x_labels_major + show_minor_x_labels=False to simulate
    log-scale behavior with clean major-tick labels (1s, 5s, 30s, 1min, 5min, 20min,
    1h, 5h)
  - Dual output (PNG + HTML) leverages pygal's interactive nature — users can hover
    for exact values in the HTML output
  - 'Theme-adaptive chrome is correct in both renders: light background #FAF8F1, dark
    background #1A1A17, no dark-on-dark failures'
  - Deterministic PCHIP interpolation for the empirical curve — reproducible without
    a random seed
  - Different line styles (solid with dots, dashed, dotted) provide clear visual distinction
    between the three series beyond color alone
  weaknesses:
  - 'Missing required vertical reference duration markers and labels at 5s (sprint),
    1min, 5min, and 20min (FTP proxy) — the spec explicitly requires ''Annotate reference
    durations with vertical markers and labels: 5 s sprint, 1 min, 5 min, and 20 min''.
    In pygal, these can be simulated as additional zero-height series with `show_dots=True`
    at specific x positions, or by using pygal''s `x_labels` secondary annotation
    approach. This is the most impactful missing feature.'
  - dots_size=6 is small for 15 sparse data points on a 3200px canvas — style guide
    says sparse data (<50 points) should have prominent markers; increase to dots_size=10
    or 12 for better visibility at mobile widths (~400px)
  - stroke_width=5 in the Style object is double the recommended 2.5 — this makes
    the empirical line noticeably thicker than convention; reduce to 2.5–3 to match
    the guide default
  - 'DE-01/DE-02: All 4 borders visible (default pygal box frame) reduces refinement.
    The spec asks for a sports-science/analytics style; consider using pygal''s Style
    opacity settings to mute the border or set show_x_guides=False to further reduce
    chrome noise.'
