      Data: Empirical curve in brand green (#009E73) — solid line with small dots, monotonically decreasing from ~1100W at 1s to ~274W at 5h. CP model overlay in lavender (#C475FD) — dashed line starting at 30s position (~947W), descending and converging toward CP asymptote. CP horizontal asymptote in blue (#4467A3) — thin dotted line at 280W spanning full width.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, not pure black
      Chrome: Title and all axis labels render in light cream text against the dark background — no dark-on-dark failures. Tick labels in muted light tone clearly visible. Legend at bottom readable with same 3 entries. Y-axis grid lines visible as subtle light dotted rules.
