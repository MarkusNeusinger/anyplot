    L-shaped frame (remove top and right spines); fix: set outline_line_color = None
    and rely on the left and bottom axis lines.'
  - 'The empirical and model curves overlap extensively in the PMAX plateau (1 s–30
    s) and the long-duration tail near CP, making it hard to see two distinct series.
    Fix: increase model line_width to 4–5 and/or reduce empirical line alpha to ~0.7
    to let the dashed model show through.'
  - Annotation font sizes (30pt for reference duration labels and CP label) are noticeably
    smaller than tick labels (34pt); aligning to 34pt would improve hierarchy consistency.
