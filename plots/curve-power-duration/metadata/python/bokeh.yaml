    chrome throughout both light and dark renders.
  - CustomJSTickFormatter produces clear human-readable log-axis tick labels (1 s
    → 5 h).
  - Four reference-duration vertical markers plus CP asymptote annotation tell the
    sports-science story effectively with minimal clutter.
  weaknesses:
