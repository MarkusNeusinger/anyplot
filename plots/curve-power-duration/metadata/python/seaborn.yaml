    skipping position 2 (#C475FD lavender). No strong semantic justification for reordering
    — canonical rule requires position 2 before position 3 for a two-series plot.'
  - 'LM-02 low seaborn feature usage: sns.lineplot() covers only the primary series;
    the CP model overlay, reference axvlines, axhline, and all annotations fall back
    to raw matplotlib. More seaborn-native styling (e.g. sns.despine, theme tokens
    via set_context) could strengthen library identity.'
  - 'VQ-01 minor: reference duration annotation labels at fontsize=7 are near the
    lower readability limit at mobile scale (~400px wide). Bumping to 8pt would match
    the axis tick size and improve thumbnail legibility.'
