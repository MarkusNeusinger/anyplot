review:
  strengths:
  - 'Perfect spec compliance — all required features implemented: log x-axis with
    human-readable labels, empirical MMP curve as primary series, CP model dashed
    overlay, all four reference duration markers (5s, 1min, 5min, 20min), and CP horizontal
    asymptote with label.'
  - Excellent theme adaptation — both light and dark renders display proper chrome
    switching (background, text, tick, grid tokens) with zero dark-on-dark issues.
  - Realistic and domain-authentic data — CP=280 W, W′=21 kJ, peak ~1100 W produce
    a curve shape that matches real well-trained cyclist power-duration profiles.
  - Clean KISS code structure with np.random.seed(42) for reproducibility, correct
    canvas (figsize=(8,4.5), dpi=400), and no bbox_inches=‘tight’ drift.
  weaknesses:
  - 'LM-02: The implementation leans heavily on matplotlib primitives (ax.plot, ax.axhline,
    ax.axvline, ax.text) for all secondary elements beyond the primary sns.lineplot
    call — seaborn-distinctive features are underused relative to what the library
    offers.'
  - 'DE-03: Reference duration markers label the x-position but do not annotate the
    corresponding power values — adding W callouts at 5s, 1min, 5min, and 20min would
    turn the chart into an actionable training-prescription tool and add meaningful
    data storytelling.'
  - 'DE-01: The overall design is clean but conservative; a subtle fill-between under
    the empirical curve (alpha ≈10%) would add visual depth and better distinguish
    the primary curve from the dashed model overlay at a glance.'
