review:
  strengths:
  - 'Perfect spec compliance: all required elements (log x-axis, empirical MMP curve,
    CP model overlay, reference duration markers, CP asymptote) correctly implemented.'
  - 'Excellent code quality: deterministic LCG, idiomatic Highcharts patterns, clean
    structure, correct token usage throughout.'
  - 'Perfect data quality: realistic sports-science context with physiologically accurate
    values (CP=280W, W''=20000J, peak ~1100W for 1s sprint) matching the spec.'
  - 'Correct Imprint palette usage: brand green (#009E73) as first series, lavender
    (#C475FD) as second, data colors identical between both renders.'
  - Custom x-axis formatter producing human-readable duration labels (e.g. '1 s',
    '5 min', '1 h') for the log axis.
  - Styled legend with elevated background (elevatedBg) and grid-colored border adds
    visual polish above generic defaults.
  - CP model starting at 45s is physiologically correct, and the CP=280W asymptote
    annotation clearly communicates the model parameter.
  weaknesses:
  - Y-axis min=0 wastes ~22% of chart height below the CP=280W data floor; set yAxis.min
    to approximately 200-220 to make the power-duration decay shape fill the chart
    area better and increase visual impact.
  - 'X-axis tick label visibility is unclear: ''10 s'' appears as a bottom tick but
    10 is not in tickPositions=[1,5,15,30,60,300,600,1200,3600,18000]; the intended
    human-readable positions may not be rendering correctly for the log axis. Consider
    using a tickPositioner function instead of tickPositions array for reliable log-axis
    enforcement.'
  - 'Highcharts default plot border (plotBorderWidth) is visible; setting chart.plotBorderWidth:
    0 would give a cleaner, more refined appearance consistent with the style guide''s
    spine-removal guidance.'
  - CP model only starts at 45s, creating a visual gap in the 1-45s range that may
    be confusing; consider extending the model line or adding a brief visual indicator
    of its physiological validity range.
