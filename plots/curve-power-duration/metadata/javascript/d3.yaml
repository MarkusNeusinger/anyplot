review:
  strengths:
  - 'Clean D3 idioms throughout: scaleLog, line with CatmullRom curve, SVG clipPath,
    axisBottom with custom tickValues/tickFormat — all idiomatic'
  - Deterministic LCG (seed=42) ensures reproducibility in the browser environment
    where Math.random cannot be seeded
  - Solid linestyle for empirical MMP vs dashed for CP model provides redundant encoding
    beyond color alone
  - 'All required spec features present: log X-axis, human-readable tick labels, empirical
    MMP curve, CP model overlay (dashed), reference duration markers (5s/1min/5min/20min
    FTP), CP horizontal asymptote with label'
  - 'Perfect data quality: physiologically accurate CP=280W, W’=20000J cyclist, monotonically-enforced
    empirical curve, neuromuscular-to-aerobic blend model'
  - 'Correct Imprint palette: palette[0] (#009E73) for empirical curve, palette[1]
    (#C475FD) for model fit; chrome tokens used throughout for theme-adaptive text
    and grid'
  - Clip path correctly prevents the CP model line (which diverges to infinity at
    t→0) from overflowing the plot area
  weaknesses:
  - Reference marker labels and legend text at 13px CSS (26px source) are slightly
    small; prefer 14–15px CSS so they remain readable when the PNG is scaled to ~400px
    mobile width
  - Empirical curve dots at r=4px CSS (8px source) are quite small for a 3200-px canvas
    and barely distinguishable at mobile scale — increase to r=6px CSS
  - 'Design Excellence could be elevated: consider adding explicit power-value annotations
    at the 5s / 5min / 20min reference durations (watt callouts) to create a clearer
    focal point and push storytelling beyond neutral display'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct
      Chrome: Title "curve-power-duration · javascript · d3 · anyplot.ai" in dark ink at 22px CSS — fully visible. Axis labels "Duration (log scale)" and "Mean-Maximal Power (W)" in dark ink at 16px CSS — clearly readable. X-axis tick labels (1s, 5s, 15s, 30s, 1min, 5min, 10min, 20min, 1h, 3h, 5h) and Y-axis tick labels (0W–1600W) at 14px CSS — clearly readable. Reference duration labels (5s, 1min, 5min, 20min / FTP) at 13px CSS — readable but slightly small.
      Data: Empirical MMP curve in #009E73 (brand green), solid line with small dots (r=4px). CP model fit in #C475FD (lavender), dashed line that diverges steeply at short durations and converges toward CP at long durations. CP asymptote dashed line at 280W with "CP = 280 W" label at right margin. Subtle vertical reference markers with annotations. Legend in bottom-right with elevated-bg box.
      Legibility verdict: PASS — all text readable; no light-on-light issues.

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct
      Chrome: Title and axis labels render in light ink (#F0EFE8 / #B8B7B0) — clearly visible against dark background. Tick labels light-colored — no dark-on-dark failures. Reference marker labels and legend text also appear in light tones. CP asymptote label "CP = 280 W" visible on right side.
      Data: Empirical MMP curve remains identical #009E73 green; CP model fit remains #C475FD lavender — data colors are identical to light render, only chrome flipped. Legend box uses elevated dark background (#242420), looks clean.
      Legibility verdict: PASS — all text readable against dark background; no dark-on-dark failures observed.
