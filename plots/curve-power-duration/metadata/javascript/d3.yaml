review:
  strengths:
  - 'Correct power-duration curve shape: monotonically decreasing empirical MMP curve
    with CP model overlay rendered cleanly'
  - 'Full Imprint palette compliance: empirical series in #009E73 (first series),
    CP model in palette[1] lavender, theme-adaptive chrome correct in both light and
    dark renders'
  - 'Excellent spec feature coverage: log x-axis, reference vertical lines at 5s/1min/5min/20min,
    CP horizontal asymptote with label, distinct empirical vs model visual encoding
    (solid vs dashed)'
  - Deterministic LCG RNG ensures reproducibility in the browser environment (no seeded
    Math.random available)
  - ClipPath properly confines the diverging CP model line (20000+ W at 1s) within
    the visible plot area
  - Clean legend with colored line samples matching the actual series styling (including
    dashed pattern for model)
  - 'Good data storytelling: physiological model with neuromuscular ceiling at short
    efforts, CP asymptote visible at long efforts, FTP reference marker contextualizes
    training use'
  weaknesses:
  - 'Y-axis max (yMax=1250) does not accommodate the first 2-3 empirical data points
    (~1470W at 1s, ~1370W at ~1.3s) which exceed yMax. These data points have negative
    SVG y-coordinates and are rendered outside the inner plot area — the curve enters
    from the top canvas edge and 2-3 dots float visibly in the title/margin area between
    y_svg≈30px and y_svg≈170px. Fix: either increase yMax to ~1600W (or compute it
    as Math.ceil(d3.max(empiricalPower) / 100) * 100 + 100), or add the same clip-path
    to the empirical curve and dots that is already applied to the model line. The
    empirical curve missing the clip path is the root cause.'
  - 'CQ-01 KISS deviation: three helper functions are defined (logspace, lcg, empiricalBase)
    when the data could be computed inline with a single loop. Not a severe issue
    but slightly over-engineered for this chart type.'
  - Reference duration label font-size=12px is smaller than recommended 14px minimum
    for the CSS mount; at full 3200px resolution the labels are readable but scale
    poorly. Increase to 13-14px to match tick label sizing.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light theme surface.
      Chrome: Title "curve-power-duration · javascript · d3 · anyplot.ai" at 22px bold, centered — readable dark text against off-white background. X-axis label "Duration (log scale)" and Y-axis label "Mean-Maximal Power (W)" at 16px, dark ink, both clearly readable. Tick labels at 14px readable. Reference labels ("5 s", "1 min", "5 min", "20 min", "(FTP)") at 12px inside the inner chart area. CP=280W label at 13px on the right side.
      Data: Empirical MMP curve in #009E73 (brand green), solid, 3.5px, with circular dots (r=4, pageBg stroke). CP model fit in #C475FD (Imprint palette[1] lavender), dashed 2.5px. Both clearly distinguishable. Vertical dashed reference lines at 5s, 1min, 5min, 20min in inkSoft. Horizontal CP asymptote at 280W in inkSoft dashed. Legend bottom-right with colored line samples.
      NOTABLE DEFECT: The empirical MMP curve enters from the TOP edge of the canvas. The first 2-3 data points at 1s (~1470W), ~1.3s (~1370W), and ~1.65s (~1280W) exceed yMax=1250W. These data points have negative SVG y-coordinates within the g group, placing them in the margin/title area. One dot appears at SVG y≈33 CSS (above the title at y=52 CSS) and another at SVG y≈83 CSS (in the margin between title and inner chart). The curve itself enters from the very top of the canvas because the 1s point is at SVG y≈-25 CSS (outside canvas, clipped by SVG overflow). The title text is still readable; the dots do not overlap with title text.
      Legibility verdict: PASS for chrome; NOTABLE DEFECT for data layout (y-axis range issue).

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface.
      Chrome: Title and axis labels render in light cream/off-white ink — all text clearly readable against the dark background. No dark-on-dark failures. Grid lines subtle. Tick labels and reference labels visible.
      Data: Empirical MMP curve remains #009E73 (identical to light render) — good visibility against dark background. CP model fit remains #C475FD lavender — slightly less vivid against dark background but still clearly visible and distinguishable. Data colors are identical to the light render (only chrome flips). Legend box uses elevatedBg (#242420) correctly.
      SAME DEFECT: The empirical MMP curve enters from the top canvas edge in the dark render identically to the light render. The floating dots in the margin area are visible in both themes.
      Legibility verdict: PASS for chrome; same y-axis range defect as light render.
