review:
  strengths:
  - Correct logarithmic X-axis with human-readable formatter (1s, 10s, 2min, etc.)
    — core spec requirement met
  - All four required reference duration vertical markers (5s, 1min, 5min, 20min)
    implemented idiomatically via ECharts markLine
  - CP asymptote horizontal dotted line adds important physiological context
  - Strong visual hierarchy across three series through line width (3.5 / 2.5 / 1.5)
    and linestyle (solid / dashed / dotted)
  - 'Both themes render cleanly: warm off-white (#FAF8F1) light, near-black (#1A1A17)
    dark — chrome fully theme-adaptive via t.ink / t.inkSoft / t.grid tokens'
  - Deterministic synthetic data with fixed boostPct array ensures reproducibility
    without a seeded RNG
  - KISS code structure — no functions or classes, flat linear script
  weaknesses:
  - 'Palette non-canonical order: second series uses palette[2] (#4467A3 blue) instead
    of palette[1] (#C475FD lavender), skipping a slot without documented semantic
    justification. The CP Asymptote at palette[4] (matte red) is defensible as a threshold/critical-limit
    anchor, but jumping from [0] to [2] for the model is an ordinal skip — fix by
    using palette[1] for the Critical Power Model or document semantic reasoning.'
  - CP Asymptote line (palette[4] dotted, width=1.5) is very thin and barely distinguishable
    from the grid, especially in the bottom-right region where the empirical curve
    converges toward 280W. Increase width to 2.0 and consider opacity 0.8+ to make
    it more prominent.
  - Reference marker labels (5 s, 1 min, 5 min, 20 min) are rendered at fontSize=12
    inside the top of the plot area — very small relative to the canvas and risk being
    missed. Increase to fontSize=14 and add padding/background to improve readability.
  - X-axis auto-ticks on log scale (1s, 10s, 2min, 17min, 2.8h, 5h) do not align with
    the sports-science canonical reference points the spec suggests (1s, 5s, 30s,
    1min, 5min, 20min, 1h). Consider manually setting xAxis.interval or using a fixed
    minorTick grid that includes the reference durations.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white surface (#FAF8F1) — correct, not pure white.
      Chrome: Bold centered title "curve-power-duration · javascript · echarts · anyplot.ai" in dark ink (#1A1A17), clearly legible. Y-axis label "Power (W)" and X-axis label "Duration" both visible in inkSoft. Tick labels in inkSoft (1s, 10s, 2min, 17min, 2.8h, 5h) readable. Grid lines are very subtle. Legend box has elevated background with border-radius — all three series labels readable.
      Data: Three lines visible — (1) Mean-Maximal Power as a thick green solid curve (#009E73, palette[0]) showing the characteristic power-duration decay from ~1200W at 1s to ~280W at 5h; (2) Critical Power Model as a blue dashed line (#4467A3, palette[2]) overlaid slightly below the empirical curve; (3) CP Asymptote as a thin red dotted horizontal line at 280W (#AE3030, palette[4]). Four vertical dashed reference markers at 5s, 1min, 5min, and 20min with small top labels.
      Legibility verdict: PASS — all text readable. Minor note: reference marker labels at the top (fontSize=12) are small. CP asymptote dotted line is subtle.

    Dark render (plot-dark.png):
      Background: Near-black surface (#1A1A17) — correct, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light-colored ink (#F0EFE8 / #B8B7B0) — fully readable against dark background. Legend box uses elevatedBg (#242420). Grid lines subtle against dark surface. No dark-on-dark failures observed — all text elements clearly visible.
      Data: Data colors identical to light render — green empirical curve (#009E73), blue dashed model (#4467A3), red dotted asymptote (#AE3030). Color identities preserved between themes. Brand green #009E73 reads well on the dark surface.
      Legibility verdict: PASS — no dark-on-dark text issues. All chrome elements correctly adapt via t.ink / t.inkSoft / t.grid tokens.
