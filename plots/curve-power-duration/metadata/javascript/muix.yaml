review:
  strengths:
  - 'Full spec compliance: log x-axis, empirical MMP curve, CP model dashed overlay,
    all four reference lines (5s/1min/5min/20min FTP), and horizontal CP asymptote
    at 280 W'
  - 'Excellent data quality: realistic well-trained cyclist profile (CP=280 W, W′=20
    kJ), LCG seed-42 noise with monotone enforcement, 55 log-spaced durations from
    1s to 5h'
  - 'Correct Imprint palette: brand green (#009E73) for primary series, lavender (#C475FD)
    for CP model, theme-adaptive chrome via ANYPLOT_TOKENS throughout'
  - 'Idiomatic MUI X patterns: ChartsReferenceLine for vertical/horizontal reference
    lines, sx-based CSS dash array for model line, connectNulls:false for null handling
    below 30s, valueFormatter for human-readable tick labels'
  weaknesses:
  - Reference line labels (especially 1 min at ~41% log-x position) overlap with the
    chart legend at the top of the plot area — increase top margin to ~60px and/or
    move legend via slotProps.legend with a top offset so label and legend do not
    compete for the same vertical band
  - Right margin (40px CSS) is tight for the Critical Power = 280 W label at labelAlign=end;
    increase to ~120px to guarantee it is never edge-clipped on narrower viewports
  - 'Design stays at MUI X defaults: chart frame (spines) still showing all four sides;
    no explicit grid styling to reduce opacity; legend has no elevated-surface background
    to separate it from reference line labels'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct light surface, not pure white.
      Chrome: Title "curve-power-duration · javascript · muix · anyplot.ai" at top center in dark ink, readable. Y-axis label "Mean-Maximal Power (W)" in dark text, readable. X-axis label "Effort Duration" in dark text, readable. Tick labels in dark text (13px CSS) at 1s, 5s, 30s, 1min, 5min, 20min, 1h, 2h, 5h — all readable. Reference line labels "5 s", "1 min", "5 min", "20 min (FTP)" at top of respective vertical lines; "1 min" label falls in close proximity to/overlapping with the legend items. "Critical Power = 280 W" label at right edge of horizontal asymptote, readable.
      Data: Empirical MMP curve in brand green (#009E73), solid, strokeWidth 3.5. CP model in lavender (#C475FD), dashed (12 6 pattern), strokeWidth 2.5. Both lines start high (~1100 W at 1s) and decay toward ~280 W at long durations. CP model starts at 30s and converges with empirical after ~5min. Four vertical reference lines and one horizontal CP line use inkSoft token (soft gray dashes).
      Legibility verdict: PASS — all labels readable; minor crowding between "1 min" reference label and legend.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark surface, not pure black.
      Chrome: Title in light text, readable. Axis labels in light text, readable. Tick labels in light text, readable. Reference line labels in inkSoft dark-mode token (#B8B7B0) — visible. Same "1 min" label crowding with legend persists. "Critical Power = 280 W" label in inkSoft light, readable. No dark-on-dark failures detected.
      Data: Data colors are identical to light render — green (#009E73) empirical, lavender (#C475FD) CP model. Same dashed/solid styling. The decay curve shape is identical and both lines remain clearly distinguishable against the dark background.
      Legibility verdict: PASS — all text readable against dark background; same minor reference-label/legend crowding as light render.
