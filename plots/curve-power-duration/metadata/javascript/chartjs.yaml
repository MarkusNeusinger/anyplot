review:
  strengths:
  - 'Perfect spec compliance: logarithmic time axis, empirical MMP curve, CP model
    overlay, all four reference markers (5s/1min/5min/20min), CP horizontal asymptote
    — nothing missing'
  - Realistic, domain-correct cycling physiology data (CP=280 W, W′=20 000 J, peak
    sprint ~1100 W)
  - Excellent Imprint palette and theme-chrome implementation — both light and dark
    renders are polished and data colours are identical across themes
  - Custom afterDraw annotation plugin elegantly draws reference lines and CP asymptote
    without any external plugin dependency
  - 'Clear visual hierarchy: solid line with markers (empirical) vs dashed no-markers
    (model) makes the two series instantly distinguishable'
  - All font sizes explicitly set, axes balanced, no overflow or overlap in either
    render
  weaknesses:
  - Rotated annotation labels (5 s sprint, 1 min, 5 min, 20 min) are rendered at 13
    px with alpha=0.75 — readable at full 3200x1800 resolution but may be marginal
    when scaled to ~400 px mobile width; increase to 14-15 px and alpha=0.85 for better
    mobile legibility
  - Power values at reference marks are not annotated (e.g. 430 W at 1 min, 316 W
    at 5 min) — the spec flags these as optional but adding them would strengthen
    data storytelling
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white
      Chrome: Title "curve-power-duration · javascript · chartjs · anyplot.ai" in dark ink at top, readable; Y-axis label "Power (W)" in dark ink, X-axis label "Duration" in dark ink; tick labels (220 W … 1180 W on Y, 1 s … 5 h on X) in ink-soft — all clearly readable against light background; legend at top readable; rotated reference-line labels ("5 s sprint", "1 min", "5 min", "20 min") in ink-soft with alpha — readable; "CP = 280 W" annotation at bottom-left readable
      Data: First series (empirical MMP curve) in #009E73 brand green as solid line with 3.5 px circular markers; second series (CP model) in #C475FD lavender as dashed line with no markers; both clearly distinguishable; empirical curve monotonically decreasing from ~1100 W at 1 s to ~276 W at 5 h; model line arcs from high values near t=22 s and converges toward CP=280 W asymptote; four dashed vertical reference lines; one dashed horizontal CP asymptote at 280 W
      Legibility verdict: PASS

