    5h) via ax.xticks, clearly communicating the duration spectrum
  - CP asymptote annotation with value and reference duration labels provide excellent
    data storytelling for sports-science readability
  - Scientifically accurate CP model with Y_MAX clipping (model only shown where P
    ≤ 1250W) and neuromuscular cap at short durations
