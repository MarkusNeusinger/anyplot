  - 'Full spec compliance: log-x axis, empirical MMP curve, CP model overlay, reference
    duration markers, and CP asymptote all correctly implemented'
  - 'Excellent Imprint palette usage: brand green #009E73 as first series (empirical),
    Imprint blue #4467A3 for CP model — identical across both themes'
  - Both themes work correctly — warm off-white (#FAF8F1) light background and near-black
    (#1A1A17) dark background with all chrome tokens properly flipped
  - Idiomatic Makie band! primitives used for W' reserve zone and MMP area fill, adding
    analytical depth without visual clutter
