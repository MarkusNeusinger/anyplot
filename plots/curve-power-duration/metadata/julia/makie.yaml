    becomes borderline small at mobile scale (~400px viewport from 3200px source);
    consider fontsize=13-14 for these annotations
  - W' reserve band fill (8% opacity) is nearly invisible in both renders — intentional
    as a subtle depth cue but could be slightly more prominent (12-15% opacity) to
    communicate the W' concept more clearly
  - 'DE-03 (data storytelling): the reference labels at the top (''5 s'', ''1 min'',
    ''5 min'', ''20 min (FTP)'') are small and could benefit from slight size increase
    or a brief annotation pointing to the FTP/CP significance'
  - 'LM-02: only uses standard Makie primitives (band!, vlines!, hlines!, axislegend);
    could leverage Makie''s more distinctive features such as Colorbar, Interactive-style
    annotations, or more complex layout compositions to better showcase the library'
