review:
  strengths:
  - 'Correct semantic color choice: red (#B71D27 from anyplot palette position 3)
    for loss/drawdown — valid semantic exception to canonical order'
  - 'Idiomatic ggplot2 grammar: geom_area + geom_line + geom_hline + geom_point with
    per-geom data= override — professional multi-layer composition'
  - Subtitle encodes all three key statistics (max drawdown %, duration, recovery
    status) cleanly below the title
  - Theme tokens fully wired (PAGE_BG, INK, INK_SOFT, INK_MUTED) — both renders pass
    the theme-readability check
  - Canvas dimensions correct (8×4.5 in @ dpi=400 = 3200×1800 px) and ragg device
    used properly
  - 'Drawdown calculation is correct: cummax(price) as running maximum, percentage
    formula per spec'
  - 'Clean code: flat script, set.seed(42), no unused imports, modern linewidth= syntax
    throughout'
  weaknesses:
  - Recovery points where drawdown returns to zero (new highs) are not explicitly
    marked on the chart — spec requires 'Indicate recovery points where drawdown returns
    to zero'. The mid-series recovery around Dec '21 is visually implied by the fill
    returning to 0% but has no marker, dot, or vertical annotation. Add geom_point()
    or geom_vline() for identified recovery_idx values.
  - 'Filled area is nearly invisible in dark render: geom_area(fill = ''#B71D27'',
    alpha = 0.25) on PAGE_BG ''#1A1A17'' produces ~rgb(66,27,27) — barely distinguishable
    from background. The ''depth and duration of drawdowns'' emphasis (key spec requirement)
    is significantly weakened in dark mode. Increase alpha to 0.40–0.50 for dark theme,
    or use a theme-conditional alpha value.'
  - Max drawdown PERIOD is not highlighted — only the trough point is marked. The
    spec says 'highlight the maximum drawdown period'; consider a geom_rect() or annotate('rect')
    spanning from the pre-peak to the trough date to show the full duration window.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Bold dark title "drawdown-basic · r · ggplot2 · anyplot.ai" fully readable; muted-ink subtitle "Maximum drawdown: -42.9% | Duration to trough: 354 days | Recovery: Not recovered" readable. Y-axis label "Drawdown from Peak (%)" in dark INK, tick labels in INK_SOFT — all legible. X-axis dates (Jun '21, Dec '21, Jun '22, Dec '22) clearly readable. Subtle horizontal gray grid lines. X-axis spine visible; no left/top/right spine (clean minimal layout).
      Data: Red (#B71D27) filled area from 0% baseline down to the drawdown line, alpha=0.25 giving a clear pink-red fill on the warm background. Bold red line traces portfolio drawdown through two bear periods. Open circle marker at maximum trough (Dec '22, ~-42.9%). Zero reference line in INK_SOFT.
      Legibility verdict: PASS — all text and data elements clearly readable against light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Light-text title and subtitle readable against dark background. Tick labels in B8B7B0 (INK_SOFT dark) clearly visible. Subtle light horizontal grid lines. Bottom axis spine in muted light color. No dark-on-dark text failures.
      Data: Red line (#B71D27) is vivid and clearly visible against dark background. Filled area alpha=0.25 over #1A1A17 renders as approximately rgb(66,27,27) — a very dark maroon, barely distinguishable from the background. The filled area effect that emphasizes drawdown depth is significantly weakened in dark mode; the chart relies primarily on the bright red line. Open circle marker at max drawdown trough visible. Data colors are identical between renders (only chrome flips).
      Legibility verdict: PASS for text (no dark-on-dark failures). PARTIAL PASS for data — line clearly visible, fill area much less prominent than in light mode.
