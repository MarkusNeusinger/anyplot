  strengths:
  - Semantic color logic (red=#B71D27 for loss, green=#009E73 for recovery) correctly
    applies anyplot semantic-exception rules
  - Hollow circle marker with strokewidth + strokecolor is Makie-distinctive technique
    that clearly marks the max DD trough
  - Multi-line stats annotation (Max DD %, Duration, Recovery) adds genuine informational
    value
  - 'Theme-adaptive chrome complete and correct: all axis/spine/label tokens flip
    properly; 48% fill alpha on dark compensates for reduced contrast'
  - KISS code structure with idiomatic Julia (let blocks, accumulate, vcat)
  - Custom categorical x-axis tick labels (Start / Year 1 / Year 2 / Year 3) improve
    readability over raw day numbers
  weaknesses:
  - Recovery point markers (green triangles at zero baseline) not visible in either
    render — data trajectory with seed 42 does not produce any new all-time highs
    after initial dips. Increase phase 3 mean daily return from 0.0025 to 0.0035 to
    guarantee at least one recovery.
  - Stats annotation text positioned inside semi-transparent red fill without background
    box — add rect! patch behind text using ELEVATED_BG for better legibility in both
    themes.
