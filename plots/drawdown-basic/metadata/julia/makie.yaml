review:
  strengths:
  - Correct drawdown calculation using running-peak accumulate method with realistic
    756-day phase-structured NAV data (bull/correction/recovery/consolidation)
  - Semantic use of red (#B71D27, palette position 3) is appropriate for financial
    loss — matching the style guide's finance semantic exception (loss/down → red)
  - Hollow circle marker elegantly highlights the maximum drawdown point, providing
    a clean focal point without visual clutter
  - Theme-adaptive fill alpha (0.28 light / 0.48 dark) shows careful cross-theme design
    attention
  - Complete theme token implementation — all chrome elements (title, labels, ticks,
    spines, grid) use INK/INK_SOFT tokens and adapt correctly in both renders
  - 'Canvas dimensions and save command exactly correct: resolution=(1600,900) × px_per_unit=2
    → 3200×1800 px'
  - Clean linear script with proper Random.seed!(42), only used imports, and no functions
    or classes
  weaknesses:
  - 'Missing recovery point markers: spec requires indicating where drawdown returns
    to zero (new highs), but the generated data never recovers and no recovery-point
    detection logic is implemented — consider filtering days where drawdown≈0 after
    initial dip and adding scatter markers'
  - 'Missing duration and recovery-time statistics: spec requires displaying max drawdown
    duration and recovery time alongside the max DD%, but only the percentage is annotated
    — add text stats (e.g. ''Duration: N days | Recovery: pending'') to the annotation
    or a small legend'
  - 'No underlying price/NAV series shown: spec says ''consider using a secondary
    y-axis or annotation to show the underlying price/value series'' — adding a faint
    secondary line for NAV would significantly improve data storytelling'
  - 'The ''Max DD: -49.5%'' annotation is visually disconnected from its hollow-circle
    marker (ann_x is offset +25 days, ann_y at 55% of trough depth) — adding a thin
    leader line or arrow from text to marker would clarify the link'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot surface, not pure white.
      Chrome: Title "drawdown-basic · julia · makie · anyplot.ai" in dark ink, clearly readable. Axis labels "Trading Day" (x) and "Drawdown (%)" (y) in dark ink, proportional size. Tick labels "Start / Year 1 / Year 2 / Year 3" on x-axis and "-20 / -40" on y-axis rendered in INK_SOFT grey, clearly legible. Subtle horizontal grid lines at y=-20 and y=-40 in near-transparent ink. Top and right spines removed; left and bottom spines in INK_SOFT. Hollow circle marker and "Max DD: -49.5%" annotation are readable.
      Data: Red (#B71D27) filled band from drawdown line down to zero baseline, fill alpha=0.28 (semi-transparent, appropriate). Red line (linewidth=2.2) on top of fill clearly traces the drawdown curve over 756 days. Hollow red-stroke circle marks the maximum drawdown trough at approximately day 480. Zero baseline rendered as a thin INK_SOFT horizontal rule. Drawdown trajectory: starts near 0, deepens to ~-49.5% trough around Year 1, partially recovers to ~-35% range by Year 3 but never returns to 0.
      Legibility verdict: PASS — all text is readable against the warm off-white background, no light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black.
      Chrome: Title, axis labels, and tick labels all rendered in light off-white ink (INK=#F0EFE8 / INK_SOFT=#B8B7B0). All text clearly readable against the dark background. Subtle grid lines visible. No dark-on-dark text failures detected.
      Data: Red fill area is more opaque (alpha=0.48 in dark mode) producing a bold, saturated red region that reads clearly against the near-black background. Red drawdown line visible on top of fill. Hollow circle marker retains white fill + red stroke, visible. "Max DD: -49.5%" annotation text in INK (light near-white) is readable. Data colors are identical to light render — only chrome flips.
      Legibility verdict: PASS — all text is readable against the dark background; no dark-on-dark failures.
