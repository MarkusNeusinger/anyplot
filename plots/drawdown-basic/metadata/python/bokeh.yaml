review:
  strengths:
  - Correct canvas dimensions (3200×1800) with toolbar_location=None and explicit
    min_border reservations
  - 'Excellent theme-adaptive chrome: all 6 token pairs (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT) applied throughout; both renders fully readable'
  - 'Valid semantic palette override: red (#B71D27) for drawdown/loss, green (#009E73)
    for recovery/new highs, sky blue (#16B8F3) for max DD accent — all from anyplot
    palette'
  - 'Clear visual focal point: sky blue max DD marker + ''-44.2%'' annotation draws
    the eye immediately'
  - 'Good Bokeh idioms: ColumnDataSource, HoverTool with datetime formatting, varea()
    for fill, Span for baseline, Label for annotation, plus HTML artifact'
  - CDP screenshot approach produces exact 3200×1800 output reliably; recovery markers
    and max DD marker are correctly positioned
  weaknesses:
  - Missing max drawdown duration and recovery time statistics — spec explicitly requires
    'maximum drawdown percentage, max drawdown duration, and recovery time' as displayed
    statistics; only the percentage (-44.2%) is shown; add text annotations or a legend
    note with duration (e.g. '180 days') and recovery time
  - Top and right plot spines are visible (outline_line_color=INK_SOFT keeps all 4
    spines) — style guide default is L-shaped frame (remove top+right); in Bokeh this
    requires setting p.outline_line_color='rgba(0,0,0,0)' and manually adding left+bottom
    axis line color via the xaxis/yaxis properties already set
  - Recovery markers (size=16, green triangles at y≈0) are quite small relative to
    the 3200×1800 canvas and cluster near the zero baseline, making them hard to see;
    increase to size=22-28 and consider offsetting them slightly above y=0 so they
    don't merge with the Span baseline
