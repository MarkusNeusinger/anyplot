review:
  strengths:
  - 'Semantic color design is exemplary: red=drawdown/loss, purple=max drawdown, green=recovery
    — all from anyplot palette with finance-convention semantic justification'
  - Multi-layer visualization (fill + trough marker + recovery markers) creates strong
    visual hierarchy without annotations
  - Font sizes explicitly set to pygal style-guide recommended values (title=66, label=56,
    tick=44, legend=44); both renders readable in both themes
  - Clean KISS code with deterministic seed (np.random.seed(42)) and proper theme-adaptive
    tokens
  - 'Correct output: both PNG and HTML generated for this interactive library'
  weaknesses:
  - 'Missing max drawdown duration and recovery time statistics — spec explicitly
    requires all three: ''maximum drawdown percentage, max drawdown duration, and
    recovery time.'' Add annotations or a stats legend box showing duration (days
    from peak to trough) and recovery time (days from trough to new high).'
  - Drawdown fill should be semi-transparent (spec says 'semi-transparent color')
    — the fill appears opaque; consider configuring opacity to ~60-70% so the underlying
    grid is visible through the fill.
  - 'foreground_subtle uses INK_SOFT (#4A4A44 light / #B8B7B0 dark) instead of style-guide''s
    INK_MUTED (#6B6A63 light / #A8A79F dark) for subtle foreground elements — minor
    chrome deviation.'
  - 'Design polish: consider adding a more prominent y=0 reference rule with a distinct
    line style (dashed or heavier weight) to emphasize the zero baseline for the drawdown
    chart.'
