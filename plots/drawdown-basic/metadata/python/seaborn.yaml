    each drawdown trough, or use vertical dashed lines instead.
  - Annotation fontsize=7.5 is quite small; the Duration line may be hard to read
    when scaled down. Increase to 9-10pt or use a stats box for clearer key-metric
    display.
  - DE-01 could reach strong design by widening the KDE panel, adding a gradient fill
    on the drawdown area, or a caption-level stats box showing max-DD, duration, and
    recovery days more prominently.
