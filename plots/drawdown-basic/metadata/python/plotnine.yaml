review:
  strengths:
  - Clean semantic color use (red for losses, green for recovery) with correct anyplot
    palette positions and semantic exception for finance domain
  - 'Well-implemented theme adaptation: correct backgrounds (#FAF8F1 light / #1A1A17
    dark), adaptive ribbon alpha (0.30 light / 0.55 dark), and proper INK token threading
    throughout'
  - Informative max drawdown annotation with white-filled circle marker draws the
    eye clearly to the worst moment in both renders
  - 'Excellent code quality: deterministic (seed=42), KISS structure, all imports
    used, correct plot-{THEME}.png output'
  - 'Good use of plotnine grammar: geom_ribbon + geom_line + geom_hline + geom_point
    + annotate compose cleanly; scale_x_datetime with date_breaks/date_labels is idiomatic'
  weaknesses:
  - 'Recovery point markers (green diamonds at y=0) are absent from both renders —
    the data with seed=42 never produces a clear transition from drawdown < -1.0%
    to drawdown >= -0.01% in a single day (gradual approach to new ATH is not captured
    by the filter). The recovery_df is effectively empty. Fix: broaden the recovery
    detection to capture any transition from drawdown < -2% in the prior N days back
    to >= -0.01%, or use a state-machine approach.'
  - 'Caption shows only 2 of 3 required statistics (max drawdown, max duration) because
    recovery_time is None — recovery time stat is absent. Fix: either ensure the data
    produces a real recovery, or mark recovery_time as N/A in the caption.'
  - 'Annotation text color uses INK (#1A1A17 in light, #F0EFE8 in dark) which is correct,
    but at the annotated position the label slightly overlaps the deep-red ribbon
    fill area — in dark mode the contrast is fine, but in light mode the pinkish ribbon
    behind the dark text reduces contrast marginally. Fix: add a small background
    box or offset the annotation further from the ribbon.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) throughout — correct theme surface, no pure white.
      Chrome: Title "drawdown-basic · python · plotnine · anyplot.ai" in dark ink, ~65% of plot width, fully readable. Y-axis label "Drawdown (%)" and X-axis label "Date" in dark ink, well-sized (10pt). Tick labels in INK_SOFT (#4A4A44), rotated 45° on X-axis (Jan 2022 through Apr 2023), all readable. Caption "Max Drawdown: -47.3% | Max Duration: 489 days" at bottom right in small tertiary text, legible. Grid lines very subtle (alpha=0.10). Dashed zero reference line in mid-gray.
      Data: Large red filled ribbon (alpha=0.30, #B71D27) from the drawdown line up to y=0. Red line traces the drawdown curve. White-filled circle with red stroke at max drawdown (~Sep 2022, -47.3%). Dark text annotation "Max Drawdown: -47.3%" to the right of the marker. No green recovery diamonds visible at y=0.
      Legibility verdict: PASS — all text elements are dark and clearly readable against the warm off-white background. No light-on-light issues.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) throughout — correct dark theme surface, no pure black.
      Chrome: Title, axis labels, tick labels all rendered in light cream/off-white tones (INK = #F0EFE8 in dark theme). All text clearly readable against the dark background. Caption in lighter tertiary tone still legible. Dashed zero line in light gray.
      Data: Same red ribbon but darker and more opaque (alpha=0.55 for dark mode), giving a deep crimson fill that remains clearly visible against the near-black background. Red drawdown line visible. White-outlined circle marker at max drawdown still identifiable. Annotation "Max Drawdown: -47.3%" in light cream text — readable against the dark background even over the ribbon area. Data colors (red ribbon/line) are identical to the light render; only chrome flips.
      Legibility verdict: PASS — no dark-on-dark failures observed. All text is light-colored and readable. The adaptive higher ribbon alpha in dark mode is an effective design choice.
