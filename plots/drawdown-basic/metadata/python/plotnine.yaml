review:
  strengths:
  - Excellent spec compliance — correct drawdown calculation, ribbon fill, max drawdown
    annotation, and key statistics caption
  - Proper theme-adaptive tokens with correct light (#FAF8F1) and dark (#1A1A17) backgrounds,
    all chrome elements adapt correctly
  - Idiomatic plotnine usage with geom_ribbon + geom_line + geom_hline + geom_point
    composition — well-layered grammar of graphics
  - 'Semantic color choices (red #B71D27 for drawdown losses, green #009E73 for recovery)
    are both from the anyplot palette and match financial conventions'
  - Clean reproducible code with np.random.seed(42) and flat KISS structure
  - Good annotation placement and stats caption (max drawdown %, max duration) add
    informational value
  weaknesses:
  - Dark mode ribbon fill is quite dark — alpha=0.30 over near-black (#1A1A17) background
    produces a very dark brownish (~#491B1C) filled area that significantly reduces
    the visual weight of the ribbon; consider raising alpha to 0.50-0.60 in dark mode,
    or using a lighter red tint
  - No visible recovery markers — data choice (continuous drawdown with no new all-time
    highs) means the green diamond recovery feature never renders; consider adjusting
    the synthetic data to include at least one full recovery cycle to demonstrate
    the feature
  - Recovery time statistic is absent from the caption because no recovery occurs
    in the dataset; the spec calls for displaying recovery time — adjust data to include
    a recovery, then compute and display it
  - Red-green semantic color pair (losses=red, recovery=green) poses CVD concern for
    deuteranopes/protanopes — mitigated by annotation text and numeric labels but
    worth noting
  - Annotation for max drawdown is colored INK (#1A1A17 in light) which renders as
    near-black on the light-red filled ribbon area — consider switching to a contrasting
    background or positioning annotation outside the ribbon area for better clarity
