      Data: Semi-transparent red (#B71D27 at 30% alpha) ribbon fills the area from the drawdown line down to zero baseline, creating a pink-red filled area. Solid dark red line (#B71D27) traces the drawdown curve. Dashed horizontal reference at zero in gray. A filled circle marker at the max drawdown point (~Sep 2022, -47.3%) with a white-ish stroke outline. Annotation text "Max Drawdown: -47.3%" positioned to the right of the marker. No green recovery markers visible (no full recovery in dataset period).
      First series color: #B71D27 (red) — semantic exception applies (loss/drawdown context), and #009E73 (green) reserved for recovery markers.
      Legibility verdict: PASS — all text is clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, matches the anyplot dark surface token.
      Chrome: Title in light cream (#F0EFE8), clearly visible. Axis labels and tick labels in #B8B7B0 (INK_SOFT dark token), readable. Grid lines are subtle. Caption in #A8A79F (INK_MUTED dark token).
      Data: The ribbon fill (alpha=0.30 over #1A1A17) produces a very dark brownish-red area (~#491B1C) that blends significantly into the near-black background — the filled area is present but its visual weight is noticeably reduced compared to the light render. The solid red (#B71D27) line overlay remains clearly visible and carries the drawdown shape. The max drawdown marker is a red filled circle. Annotation "Max Drawdown: -47.3%" appears in light cream (#F0EFE8) — readable. Data colors are identical to the light render (same red #B71D27 for data).
      Legibility verdict: PASS — all title, axis labels, tick labels, and annotation text are readable against the dark background. No dark-on-dark text failures observed. The main concern is reduced visual contrast of the ribbon fill in dark mode.
