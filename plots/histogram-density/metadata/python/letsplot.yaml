    instead of using INK/INK_SOFT/PAGE_BG tokens from letsplot.md'
  - 'Grid color hardcoded to #CCCCCC instead of using INK_SOFT token — won''t adapt
    between themes'
  - 'Overlay line uses #FFD43B (Okabe-Ito position 7 yellow) which violates style
    guide rule against thin lines with low luminance on light surfaces'
  - Dark mode grid is too prominent (should be subtle) due to hardcoded gray color
    not adapting to theme
  - 'Design polish minimal: uses default theme without customization, no distinctive
    letsplot features'
