review:
  strengths:
  - Layered gradient fill using seaborn light_palette creates excellent visual depth
    — the three stacked fill_between layers at different y-fractions give the area
    chart strong visual weight in both themes
  - Maintenance annotation with curved arrow and average reference line provide clear
    data storytelling focal points with minimal code
  - 'Perfect canvas compliance: figsize=(8, 4.5) dpi=400 → 3200×1800, no bbox_inches=tight
    in savefig'
  - 'Full theme adaptation: all chrome elements (title, labels, ticks, annotation
    text, arrow, avg label) use the correct INK/INK_SOFT/INK_MUTED tokens for both
    renders'
  - Comma-formatted y-axis ticks, rotated date labels, and y-only grid follow style-guide
    recommendations
  - Realistic website-visitor data with weekly patterns and a maintenance dip provides
    genuine analytical context
  weaknesses:
  - In dark mode the gradient fill layers are less perceptually distinct because sns.light_palette()
    generates light tints that read as muddy dark-greens at alpha=0.28 on the near-black
    background — consider theme-branching the fill alpha or using a dark-tint palette
    in dark mode for stronger layer separation
  - sns.set_theme(style=\"white\") is used instead of the library-guide recommended
    style=\"ticks\"; functionally identical after sns.despine() but deviates from
    the canonical baseline
  - Annotation fontsize=8 at mobile scale (~400 px wide) is at the lower legibility
    threshold — bumping to 9pt would add safety margin
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Title "area-basic · python · seaborn · anyplot.ai" in medium-weight dark ink (~12pt), spans ~70% of canvas width — expected for the mandated title length. Y-axis label "Visitors / day" and X-axis label "Date" both at 10pt in dark ink, balanced and readable. Tick labels at 8pt in INK_SOFT gray, x-axis labels rotated 30° (Mar 04, Mar 11, Mar 18, Mar 25). Comma-formatted y-axis ticks (0, 2,000 … 12,000). "Scheduled maintenance" annotation in dark semibold text with curved arrow pointing to the Mar 11 dip. "Avg: 8,055" italic label in INK_MUTED at right edge. All text is clearly readable against the light background — no light-on-light failures.
      Data: Three stacked fill_between layers using sns.light_palette(#009E73) tints (alpha=0.28 each) create a layered gradient from bottom to line. The brand-green #009E73 line at linewidth=2.5 sits prominently on top. Dashed gray reference line at the mean (~8,055). Sharp dip around Mar 10-12 (maintenance window) visible at ~2,000 visitors. Upward trend and weekly weekend drops clearly visible.
      Legibility verdict: PASS — all elements readable, no overflow or clipping observed.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title rendered in light #F0EFE8 cream text — clearly readable against dark background. Axis labels in same light ink. Tick labels in #B8B7B0 (INK_SOFT dark) — readable. "Scheduled maintenance" annotation in light cream text — readable. Arrow in medium-gray INK_SOFT — visible. "Avg: 8,055" italic label in #A8A79F muted — readable. No dark-on-dark failures observed; all chrome elements correctly use dark-mode tokens.
      Data: Brand green #009E73 line is identical to the light render — bright teal on dark background with strong contrast. Fill layer colors are identical hex values but appear as darker muted greens on the near-black background (the light-palette tints absorb differently on dark). The three fill layers are still distinguishable but with less contrast separation than in the light render. Weekly pattern and maintenance dip remain clearly visible.
      Legibility verdict: PASS — all text readable, no dark-on-dark failures. Fill layer distinction is slightly reduced vs. light mode but does not impair chart readability.
