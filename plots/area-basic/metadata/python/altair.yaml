review:
  strengths:
  - Correct area chart using mark_area() with idiomatic Altair gradient fill via alt.Gradient
    and alt.GradientStop
  - 'Perfect spec compliance: semi-transparent fill, gradient from baseline to line,
    gridlines, descriptive axis labels with units'
  - 'Excellent realistic data: daily website traffic with weekly pattern, upward trend,
    and a visible anomaly spike on Jan 15'
  - All theme-adaptive chrome tokens applied correctly — both light (#FAF8F1) and
    dark (#1A1A17) backgrounds use correct INK/INK_SOFT tokens
  - 'Clean idiomatic code: proper :T and :Q field type encodings, explicit font sizes
    matching style-guide defaults, no unnecessary complexity'
  - Dual HTML + PNG output correctly leverages Altair as an interactive library
  - 'Brand color #009E73 used for both line and gradient fill — data color is identical
    across both themes'
  weaknesses:
  - Grid lines appear on both X and Y axes — for a time-series area chart, Y-axis
    gridlines only would be more refined (remove X-axis grid with configure_axisX(grid=False))
  - 'Area fill in dark render is quite low contrast: the gradient stops rgba(0,158,115,0.05)
    to rgba(0,158,115,0.45) produce a dark teal that blends into the #1A1A17 background
    in the lower portion; increase the upper stop opacity to ~0.6 and consider a lighter
    minimum stop for dark theme'
  - No visual emphasis on the data spike (Jan 15, ~9300 visitors) or the overall upward
    trend — an annotation or reference line at the peak would improve data storytelling
    (DE-03)
  - X-axis grid lines are unnecessary visual noise for a time series; remove them
    so only horizontal Y-axis gridlines remain (standard best practice for line/area
    charts)
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface
      Chrome: Title "area-basic · python · altair · anyplot.ai" is bold dark text, clearly readable (~60% canvas width). Y-axis title "Daily Visitors (count)" and X-axis title "Date" both readable. Tick labels (Jan 01, Jan 03, ... Jan 29 at -30° rotation; 0, 1,000, ... 10,000 on Y) all clearly legible against the light background.
      Data: Area fill uses an alt.Gradient from rgba(0,158,115,0.05) at baseline to rgba(0,158,115,0.45) near the line — creating a gradient that fades from very light near y=0 to more visible teal near the data values. Line stroke is solid #009E73. Both horizontal and vertical grid lines visible at 15% opacity.
      Legibility verdict: PASS — all text clearly readable, no light-on-light issues

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface
      Chrome: Title and axis labels render in light INK (#F0EFE8) — clearly visible against dark background. Tick labels use INK_SOFT (#B8B7B0) — readable. No dark-on-dark text issues.
      Data: Line stroke #009E73 is vivid and clearly visible. Area fill gradient with max 45% opacity over the dark background produces a dark teal region — the lower portion (near y=0) has very low contrast with the background (5% opacity is nearly invisible on dark), but the upper/bulk of the fill area is distinguishable. Data colors are identical to light render.
      Legibility verdict: PASS — all text readable, but area fill is noticeably lower contrast in dark mode (upper portion of fill visible, lower portion fades into background)
