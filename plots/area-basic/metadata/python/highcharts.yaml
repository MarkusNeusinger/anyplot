review:
  strengths:
  - 'Complete theme adaptation: all chrome elements (title, axis labels, tick labels,
    grid, weekend bands, tooltip) correctly use INK/INK_SOFT/GRID tokens; both light
    and dark renders are visually correct with no dark-on-dark or light-on-light failures.'
  - 'Strong use of Highcharts-specific APIs: plotBands for weekend context, plotLines
    with styled label for peak annotation, linearGradient fill — well beyond a basic
    AreaSeries.'
  - 'Canonical export pipeline: CDP setDeviceMetricsOverride + PIL safety net ensures
    exact 3200x1800 output reliably; both PNG and HTML artifacts saved.'
  - Realistic and neutral data context (daily website visitors) with meaningful narrative
    backed by weekly seasonality, growth trend, and a descriptive subtitle.
  weaknesses:
  - Peak annotation label (32px) is smaller than tick labels (44px) — the label hierarchy
    places annotation text below ticks; bumping to ~38-40px would unify the lower-tier
    text layer.
  - Y-axis minimum is 1500 but data never falls below ~1,884 — the ~400-unit gap below
    data creates empty visual weight in the area fill, subtly exaggerating percentage
    changes; consider min=0 for honest baseline or min=1800 to reduce dead space.
  - 'Typographic hierarchy limited by uniform font family and minimal weight variation
    — adding fontWeight: ''300'' to the subtitle style would add professional typographic
    depth.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct, not pure white.
      Chrome: Title "area-basic · python · highcharts · anyplot.ai" in bold dark ink, spanning ~75-80% of plot width — readable. Subtitle in softer INK_SOFT. X-axis label "Day of Month" and Y-axis label "Daily Visitors" in dark INK at 56px — readable. Tick labels in INK_SOFT at 44px — readable. Peak annotation "▲ Peak: 3,734 visitors (Day 30)" in #AE3030 red at 32px bold — readable. Weekend plotBands as subtle green-tinted vertical bands.
      Data: Brand green #009E73 area fill with gradient from rgba(0,158,115,0.45) at line to near-transparent at baseline. 30 circular markers at radius=9 visible on each data point. Red dotted reference line at peak value.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct, not pure black.
      Chrome: Title and all axis labels flip to light ink (#F0EFE8 / #B8B7B0) — clearly visible against dark background. No dark-on-dark failures detected. Tick labels in #B8B7B0 clearly visible. Peak annotation in #AE3030 red — legible on dark background (bold, above WCAG large-text threshold). Weekend plotBands at higher opacity (rgba(0,158,115,0.22)) — appropriate for dark surface.
      Data: Brand green #009E73 area fill and markers are identical to light render — data colors unchanged as required. Grid lines use rgba(240,239,232,0.15) — subtle but present.
