review:
  strengths:
  - 'Palette and dual-theme implementation are textbook-correct: anyplot palette in
    canonical order, all chrome tokens derived from ANYPLOT_THEME, both renders visually
    identical data colors with flipped chrome.'
  - Cubic interpolation with opacity=0.47 fill produces a smooth, polished area chart
    visually superior to a linear-segment default.
  - Peak/low sparse-series markers are an idiomatic pygal technique that delivers
    clear data storytelling without fake UI.
  - sys.path fixup is a subtle but necessary correctness detail that prevents shadowing
    the pygal package with this file.
  - 'All spec requirements satisfied: semi-transparent fill, gridlines, labeled axes,
    realistic visitor data with weekly pattern.'
  weaknesses:
  - 'DE-01: Full chart border frame not suppressed — pygal renders a full border by
    default; setting border_colors or stroke_opacity to match PAGE_BG would soften
    the enclosing box for a lighter visual feel.'
  - 'DE-02: Trend line stroke width (3) is too close to main area stroke width (5);
    reducing trend to width=2 and widening dasharray (e.g. ''16, 8'') would improve
    visual hierarchy.'
  - 'VQ-01 (minor): data-point dot size (dots_size=12) could be slightly larger (14-16)
    to stay readable when scaled to mobile thumbnail width (~400 px).'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface.
      Chrome: Title "Daily Website Visitors · area-basic · python · pygal · anyplot.ai" spans ~75% of plot width at font size 66 — readable and proportionate. Y-axis label "Visitors" and x-axis label "Day of Month" are clear. Tick labels at major day intervals (1, 5, 10, 15, 20, 25, 30) and visitor counts (1000–2000) are legible. Legend at bottom with four labeled entries.
      Data: Main area filled with brand green #009E73 (opacity 0.47) with cubic interpolation; dashed lavender (#C475FD) trend line; large blue (#4467A3) peak dot at day 24 (2150); large ochre (#BD8233) low dot at day 6 (890). Horizontal grid lines subtle.
      Legibility verdict: PASS — all text clearly readable against the warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface.
      Chrome: Title, axis labels, tick labels, and legend text all flip to light-colored text, fully readable. No dark-on-dark failures observed.
      Data: Colors identical to light render — brand green area, lavender trend line, blue peak dot, ochre low dot. Only chrome elements flip between themes.
      Legibility verdict: PASS — all text clearly readable against the dark background; brand green #009E73 remains strong on dark surface.
