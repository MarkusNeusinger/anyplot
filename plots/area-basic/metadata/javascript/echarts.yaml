review:
  strengths:
  - Vertical LinearGradient area fill (70%->10% alpha) is a distinctive ECharts touch
    that matches the spec's 'gradient fill from bottom to line' note
  - 'Both renders theme-correct: warm off-white #FAF8F1 light / warm near-black #1A1A17
    dark, data colors identical between themes, only chrome flips'
  - Clean three-tier typographic hierarchy (title 30pt, axis names 20pt, tick labels
    16pt) plus removed grid borders give a publication-ready feel
  - Deterministic LCG seed=42 with realistic weekday/weekend cycle plus gentle upward
    trend tells a believable website-visitor story
  - 'Idiomatic ECharts patterns: animation:false, boundaryGap:false, smooth:true,
    showSymbol:false, emphasis.focus:''series'', no explicit init size, no devicePixelRatio
    override'
  weaknesses:
  - No data-storytelling overlays — adding an ECharts markPoint for the peak, a markLine
    for the mean, or a subtle annotation calling out the weekend dip would lift DE-03
    and LM-02 while staying squarely in ECharts idiom
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white surface around #FAF8F1 (correct light token, not pure white).
      Chrome: bold black title "area-basic · javascript · echarts · anyplot.ai" centered at top; "Daily Visitors" rotated Y-axis name on the left in soft ink (dark gray); "Date (May 2026)" X-axis name centered below the axis; tick labels (01, 04, 07 … 28 on X; 0, 3k, 6k, 9k, 12k, 15k on Y) in soft ink. All chrome readable against the light background.
      Data: smooth area chart in brand green #009E73 with a vertical LinearGradient fill from ~70% alpha at the top down to ~10% at the axis. First (and only) series uses palette[0] = #009E73 as required. Subtle horizontal split lines visible but unobtrusive. No spines.
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black surface around #1A1A17 (correct dark token, not pure black).
      Chrome: title in light ink; axis names and tick labels in soft (lighter) ink; no dark-on-dark failure observed — every element clearly readable.
      Data: identical brand green #009E73 line and vertical gradient fill — data colors do not change between themes, only the chrome flips as required.
      Legibility verdict: PASS
