review:
  strengths:
  - Implements the spec's gradient-fill recommendation faithfully via a scriptable
    CanvasGradient (opaque brand green at the line, fading to transparent at the axis)
    — exactly the 'visual appeal' hint the spec asks for, achieved using Chart.js'
    own scriptable-color API rather than a hacked plugin.
  - Peak annotation (dashed leader line + filled brand-green dot + pill-shaped label
    using elevatedBg + grid stroke) creates a clear focal point and shows real Chart.js
    plugin-API mastery via a custom `afterDatasetsDraw` plugin.
  - Theme tokens are threaded everywhere — title/axis-title in `t.ink`, ticks in `t.inkSoft`,
    grid in `t.grid`, annotation pill in `t.elevatedBg` — so both renders read cleanly
    without any dark-on-dark or light-on-light failures.
  - Deterministic seeded LCG, semantic synthetic data with weekend lift + linear growth
    + bounded noise — visitor counts are realistic for a small site and the silhouette
    is identical across the two renders.
  - Y-axis tick formatter uses `toLocaleString` for thousands separators (4,500 /
    4,000 / …), gridlines limited to the Y axis, X border kept and Y border dropped
    — restrained chrome that matches the style-guide intent.
  weaknesses:
  - Title fontsize 24pt on a 3200×1800 canvas is on the larger side relative to the
    rest of the chrome (tick labels at 16pt, axis titles at 20pt); the title is comfortably
    proportional but a touch more breathing room would feel even more refined — consider
    22pt.
  - The peak annotation's pill background uses `t.elevatedBg` with a 1 px `t.grid`
    stroke, which on the light render reads as a near-white box on the warm `#FAF8F1`
    page — readable, but the stroke is so faint it almost disappears. A slightly stronger
    contrast (e.g. fillStyle blend at ~92% opacity over the gradient) would make the
    callout pop more without going noisy.
  - '`Math.indexOf(Math.max(...visitors))` and `Math.max(...visitors)` are recomputed
    in the annotation closure each draw rather than memoized once — tiny perf concern
    only, but a single `const peakValue = Math.max(...visitors)` at module scope would
    be marginally cleaner.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 across the full mount — no white plot area, no painted-on rectangle, the chart sits flush on the page color.
      Chrome: Title "area-basic · javascript · chartjs · anyplot.ai" rendered in dark ink, centered above the plot. X-axis title "Date (September 2025)" and Y-axis title "Visitors per day" both in t.ink dark text. Tick labels (Sep 1, Sep 4, …, Sep 28 on X; 0 / 500 / 1,000 / … / 4,500 with thousands separators on Y) in t.inkSoft. Horizontal gridlines only (Y axis), subtle but visible. X-axis baseline border drawn in t.grid. Peak annotation in the upper-right ("Peak: 3,944 on Sep 28") sits inside a near-white pill with a hairline grid stroke, dashed leader line down to a brand-green dot on the silhouette.
      Data: Single area series in #009E73 brand green. Vertical CanvasGradient from ~70% opacity at the line to ~5% at the axis — produces a soft, depth-y fill that matches the spec's "gradient fill from bottom to line" note. Borderline at 3.5 px, tension 0.3 for gentle smoothing.
      Legibility verdict: PASS — every title, axis label, tick, and annotation is comfortably readable against the warm off-white.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 across the full mount — no painted-black plot area.
      Chrome: Same title text in light ink, axis titles in light ink, tick labels in t.inkSoft (a desaturated near-white), horizontal grid in t.grid (a low-contrast warm gray) — subtle but clearly visible. X baseline border same warm gray.
      Data: Brand green #009E73 area is IDENTICAL to the light render — same silhouette, same gradient stops, same line weight. Peak annotation pill switches to the dark t.elevatedBg with the same hairline stroke; the "Peak: 3,944 on Sep 28" text inside is in light ink and reads cleanly.
      Legibility verdict: PASS — no dark-on-dark failures. Title, axis labels, ticks, gridlines, peak label, and brand-green area are all clearly distinguishable. Both renders pass the theme-readability gate.
