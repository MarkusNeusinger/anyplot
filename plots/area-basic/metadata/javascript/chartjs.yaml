review:
  strengths:
  - 'First series uses Imprint brand green #009E73 with a soft alpha fill (~0.35),
    exactly matching the spec''s semi-transparent-fill guidance.'
  - Theme tokens are threaded consistently to title, axis titles, ticks, grid, and
    border — both renders are fully legible with correct warm off-white (#FAF8F1)
    and warm near-black (#1A1A17) chrome.
  - 'Idiomatic Chart.js: `type: line` + `fill: { target: ''origin'' }` + `tension:
    0.3` produces a smooth area silhouette without reaching for plugins; `animation:
    false` set as required.'
  - Deterministic seeded LCG (SEED=42) makes the area silhouette stable across renders;
    data has a sensible upward trend with weekend lifts that reads as plausible website
    traffic.
  - Axis titles are descriptive with month context ('Date (September 2025)', 'Visitors
    per day'), and the y-axis tick callback uses `toLocaleString` for thousands-separated
    counts.
  - 'Vertical grid hidden, horizontal grid subtle, `beginAtZero: true`, sensible `suggestedMax`
    headroom — clean editorial layout that emphasises the area shape.'
  weaknesses:
  - Spec mentions 'Consider gradient fill from bottom to line for visual appeal'.
    The current flat semi-transparent fill is fine but a `CanvasGradient` (brand-green
    opaque at the line, fading toward transparent at the axis) would lift DE-01/DE-03
    and add data storytelling depth.
  - Title fontsize 30pt is generous and the title spans ~70% of the landscape canvas
    width, which is acceptable but on the upper edge. If a gradient or other visual
    element is added that needs vertical breathing room, consider trimming to ~24pt.
  - 'Area shape is informative but the chart lacks any focal-point emphasis — e.g.
    a soft annotation at the Sep 28 peak (''Sep 28 peak: ~3,950'') would turn a generic
    line+fill into a storytelling chart and raise DE-03 above the default.'
  - No `aspectRatio`/legend customisation needed (single series), but the implementation
    does not leverage Chart.js distinctive features beyond `fill.target` and `tension`
    — e.g. `stepped` modes, segment styling, or per-point hover labels could push
    LM-02 higher.
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (~#FAF8F1), uniform across the canvas — not pure white, matches spec.
      Chrome: Title "area-basic · javascript · chartjs · anyplot.ai" centered at top in dark ink, fully readable. Y-axis title "Visitors per day" rotated on the left in dark ink; X-axis title "Date (September 2025)" centered at bottom in dark ink. Tick labels (Sep 1, Sep 4, ..., Sep 28 on x; 0, 500, ..., 4,500 on y) render in soft ink (#inkSoft) with strong contrast against the off-white. Horizontal grid lines subtle, vertical grid hidden — clean editorial look.
      Data: Brand green #009E73 line at ~3.5 px with a soft semi-transparent fill (~rgba(0,158,115,0.35)) underneath flowing to the zero baseline. Smooth tension produces a gentle area silhouette with peaks near Sep 7, Sep 13, Sep 20 and Sep 28. First-series brand green confirmed.
      Legibility verdict: PASS — all chrome readable, area is unmistakable.

    Dark render (plot-dark.png):
      Background: Warm near-black (~#1A1A17), uniform across the canvas — not pure black, matches spec.
      Chrome: Title in light ink centered at top, fully readable against the dark surface. Y-axis title "Visitors per day" rotated on the left in light ink; X-axis title "Date (September 2025)" centered at bottom in light ink. Tick labels render in soft-light ink with comfortable contrast — no dark-on-dark failures. Horizontal grid lines remain subtle but visible.
      Data: Same brand green #009E73 line; the fill reads slightly darker visually because the warm-black surface composites under the 35% alpha green, but the data hue itself is identical to the light render (palette[0] = #009E73 in both). Silhouette is byte-identical to the light render.
      Legibility verdict: PASS — all chrome readable against the warm-black surface; brand green still visible.
