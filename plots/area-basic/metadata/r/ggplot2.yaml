review:
  strengths:
  - Correct anyplot palette (#009E73 first series) with theme-adaptive chrome — backgrounds,
    text, and grid all flip correctly between light and dark
  - 'Idiomatic ggplot2 usage: geom_area + geom_line layer composition, scale_x_date
    with date_labels/date_breaks, scales::label_comma with suffix, expansion() for
    axis padding'
  - 'Thoughtful grid design: x-axis grid removed, subtle y-axis-only grid at linewidth=0.2,
    panel border removed, x-axis baseline kept for reference'
  - 'Excellent data quality: realistic website traffic scenario with upward growth
    trend and clear weekday/weekend oscillation pattern — perfectly suited for an
    area chart'
  - 'Perfect spec compliance: semi-transparent fill (alpha=0.35), continuous x-axis,
    descriptive axis labels, correct canvas (3200×1800)'
  weaknesses:
  - 'DE-03 LOW: No visual hierarchy or storytelling elements — the growth trend and
    weekly pattern are visible but no design emphasis guides the viewer to the insight.
    Add a geom_smooth trend line (in ANYPLOT_MUTED or INK_SOFT color) to make the
    upward trend explicit, and/or a geom_hline for the period average.'
  - 'DE-01 MODERATE: Design is clean but not sophisticated enough for top-tier — the
    composition of fill+line is good but lacks a focal point or emphasis that elevates
    it beyond a well-configured default. A subtle horizontal reference line or a smoothed
    overlay would add storytelling depth.'
  - 'Dark render fill opacity: alpha=0.35 of #009E73 composited over #1A1A17 produces
    a very dark forest green (~#114837), making the lower bulk of the area appear
    as a heavy opaque block with little visual variation. Consider raising alpha to
    0.45 to maintain visible semi-transparency in both themes, or conditionally adjust
    alpha by theme.'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct anyplot light surface, no pure white
      Chrome: Title "area-basic · r · ggplot2 · anyplot.ai" in bold dark ink at ~50% width, clearly readable. Axis label "Daily Visitors" (left, rotated) and "Date (2023)" (bottom) in dark ink at 10pt. Tick labels (0K, 5K, 10K on Y; Jan 09 through Apr 03 on X, rotated 30°) in INK_SOFT at 8pt — readable.
      Data: Area fill in brand green #009E73 at alpha=0.35 — semi-transparent, shows warm background through. Solid green line (#009E73) at linewidth=0.9 traces the peaks. Weekly oscillation pattern and upward growth trend clearly visible. Y-axis horizontal grid lines are subtle.
      Legibility verdict: PASS — all text readable, no dark-on-light failures, data elements clearly visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct anyplot dark surface, not pure black
      Chrome: Title in bold light text (#F0EFE8) — clearly readable against dark background. Axis labels and tick labels in INK_SOFT (#B8B7B0) — all readable, no dark-on-dark failures. Grid lines are subtle light-colored horizontal rules.
      Data: The area fill (#009E73 at alpha=0.35 over #1A1A17) composites to a dark forest green (~#114837) — distinctly different from the background but quite opaque and dark. The solid green line (#009E73) is bright against the dark fill and background, clearly showing the weekly oscillation and trend. Data colors are identical to light render (same #009E73); only chrome flips.
      Legibility verdict: PASS — all text readable against dark background, no dark-on-dark failures. Minor note: the composited dark fill creates a heavy visual block in the lower chart area (0K–5K range).
