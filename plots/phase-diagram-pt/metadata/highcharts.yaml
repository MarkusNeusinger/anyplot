  image_description: 'The plot shows a water pressure-temperature phase diagram on
    a light gray (#fafafa) background. The x-axis displays Temperature (K) from 200
    to 750, and the y-axis shows Pressure (Pa) on a logarithmic scale from 10 to ~2G.
    Three phase boundary curves are plotted: a blue dashed sublimation curve (low-temperature,
    low-pressure), a red solid vaporization curve sweeping from the triple point up
    to the critical point, and a green nearly-vertical melting curve rising from the
    triple point. Phase regions are labeled in large bold text: "SOLID" (upper-left,
    blue), "LIQUID" (center, blue), "GAS" (lower-right, green), and "SUPERCRITICAL
    FLUID" (upper-right, orange). The triple point is marked with a purple circle
    at 273.16 K / 611.7 Pa with a styled purple annotation box, and the critical point
    is marked with an orange diamond at 647.1 K / 22.06 MPa with a styled orange annotation
    box. Subtle area fills shade the gas region (light green) and liquid region (light
    blue). Plot bands highlight the solid region (left) and supercritical region (right).
    A custom HTML legend in the lower-right shows the three curve types. The title
    reads "Water Phase Diagram · phase-diagram-pt · highcharts · pyplots.ai".'
