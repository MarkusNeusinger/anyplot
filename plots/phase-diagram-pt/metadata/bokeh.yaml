  image_description: 'The plot displays a water pressure-temperature phase diagram
    with Temperature (K) on the x-axis (180-800 K) and Pressure (Pa) on a logarithmic
    y-axis (10^2 to 10^9 Pa). Four phase regions are shaded with distinct pastel colors:
    SOLID (light blue, left), LIQUID (light green, center-upper), GAS (light peach/orange,
    bottom-right), and SUPERCRITICAL FLUID (light purple, upper-right). Three dark
    blue phase boundary lines separate the regions: a sublimation curve (lower-left),
    a vaporization curve (center, from triple to critical point), and a nearly vertical
    melting curve (left side, negative slope for water). The triple point is marked
    with a red circle at 273.16 K / 611.73 Pa with a text annotation. The critical
    point is marked with a dark blue diamond at 647.1 K / 22.06 MPa with a text annotation.
    A dashed line extends upward from the critical point. Italic curve labels (Sublimation,
    Vaporization, Melting) are placed along the boundary lines. Bold region labels
    (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID) are placed within each phase area. The
    title reads "phase-diagram-pt · bokeh · pyplots.ai". The background is a subtle
    off-white with faint dashed grid lines.'
