review:
  strengths:
  - Physically realistic CO2 phase diagram data using Clausius-Clapeyron and sublimation
    curve equations anchored at the correct triple and critical points
  - All three phase boundaries clearly rendered with Imprint palette colors in canonical
    order plus redundant linetype encoding (solid/solid/dashed)
  - Comprehensive region labeling including SUPERCRITICAL FLUID region beyond the
    critical point
  - Special point markers (triple and critical) use hollow circles with theme-adaptive
    fill/stroke, cleanly annotated with coordinates
  - 'Full theme-adaptive chrome correctly implemented — background, text, grid all
    flip between #FAF8F1 and #1A1A17 surfaces'
  - Logarithmic pressure axis covers six orders of magnitude (0.001–2000 atm), appropriate
    for CO2
  weaknesses:
  - 'DE-01/DE-02: Top and right panel spines are kept (full box frame via panel.border).
    For a scientific diagram this is defensible, but removing the top/right spines
    would improve visual refinement per the style guide default.'
  - 'DE-02: Phase region backgrounds are not filled — adding subtle semi-transparent
    fills would significantly improve visual storytelling and region readability'
  - 'DE-03: The SUPERCRITICAL FLUID label at x=352, y=500 is placed in a somewhat
    crowded upper-right corner and partially overlaps the title area visually; moving
    it slightly lower would improve clarity'
  - 'Minor: Triple point annotation (size=2.8) and critical point annotation (size=2.8)
    render quite small — increasing to size=3.2 would improve mobile readability without
    crowding'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct anyplot light surface, not pure white.
      Chrome: Bold title "CO2 Phase Diagram · phase-diagram-pt · r · ggplot2 · anyplot.ai" clearly visible in near-black ink at ~80% canvas width. Axis labels "Temperature (K)" and "Pressure (atm)" in dark ink at 10pt, clearly readable. Tick labels in INK_SOFT (#4A4A44) at 8pt, all visible. Phase region labels (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID) in bold INK_MUTED, legible throughout. Triple and critical point annotations in INK_SOFT at size=2.8 — small but readable.
      Data: Three boundary curves using Imprint palette positions 1–3: Solid-Liquid in brand green #009E73 (solid line), Liquid-Gas in lavender #C475FD (solid line), Solid-Gas in blue #4467A3 (dashed line). Special point markers are hollow circles with ELEVATED_BG fill and INK stroke, clearly visible at size=4.5. Logarithmic Y-axis spans 0.001–2000 atm.
      Legibility verdict: PASS — all text elements readable against the light background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct anyplot dark surface, not pure black.
      Chrome: Title in light ink #F0EFE8, clearly readable. Axis labels and tick labels adapt to INK_SOFT (#B8B7B0) — all readable against dark surface. Phase region labels in INK_MUTED (#A8A79F) in bold, visible. No dark-on-dark failures observed. Annotations remain readable though small.
      Data: All three boundary curves — brand green #009E73, lavender #C475FD, blue #4467A3 — are identical to the light render. Data colors unchanged between themes as required. Special point markers use ELEVATED_BG (#242420) fill with INK (#F0EFE8) stroke, visually distinct.
      Legibility verdict: PASS — all text elements readable against the dark background; no dark-on-dark failures detected.
