review:
  strengths:
  - Complete spec implementation — all three phase boundaries, both special points
    with annotations, four phase regions with labels including supercritical fluid
  - Physically accurate CO2 data using real-world constants (triple point T=216.55K/P=5.18atm,
    critical point T=304.13K/P=72.8atm)
  - Dual visual encoding (color + linetype) improves CVD accessibility and boundary
    distinguishability
  - 'Correct Imprint palette in canonical order with brand green #009E73 as first
    (Solid-Liquid) series; proper theme-adaptive chrome throughout'
  - Log-scale y-axis (0.001–2000 atm) as recommended by spec; covers full pressure
    range appropriately
  weaknesses:
  - Phase region fills at alpha=0.05 are barely perceptible on the dark render — increase
    to alpha=0.08–0.10 for better region demarcation without obscuring boundary curves
  - Annotation text sizes (ggplot2 size 3.2–3.5 ≈ 9–10pt) are slightly small for secondary
    labels at mobile display scale — increase Triple Point/Critical Point annotations
    to size=3.8
  - Minor grid (panel.grid.minor) retained on log-scale plot adds subtle visual noise
    — consider removing or reducing alpha further to 0.06
