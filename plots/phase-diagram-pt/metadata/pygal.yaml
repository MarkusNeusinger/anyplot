  image_description: 'The plot shows a water phase diagram with temperature (K) on
    the x-axis (200-650) and pressure (Pa) on a logarithmic y-axis (~0.4-100,000,000).
    Three phase boundary curves are drawn: a blue sublimation curve (Solid-Gas) rising
    steeply from the lower left to the triple point, an orange vaporization curve
    (Liquid-Gas) extending from the triple point rightward and upward to the critical
    point, and a teal melting curve (Solid-Liquid) running nearly vertically upward
    from the triple point with a slight negative slope (correct for water). A red
    dot marks the triple point (~273 K, ~612 Pa) and a purple dot marks the critical
    point (~647 K, upper right edge). The legend at the bottom lists all five series
    with descriptive labels including coordinates. The background is white with subtle
    dashed grid lines. Phase region labels (Solid, Liquid, Gas) are absent from the
    plot area. The critical point dot appears at the far right edge of the chart,
    partially clipped.'
