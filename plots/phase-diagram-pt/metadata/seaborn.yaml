    bold text with an arrow. Phase regions are labeled in large semi-transparent text:
    SOLID (blue, left), GAS (orange, lower center), LIQUID (green, center), and SUPERCRITICAL
    FLUID (purple, upper right). Top and right spines are removed. Subtle grid lines
    appear on both axes. A legend in the lower right identifies the three curves.
