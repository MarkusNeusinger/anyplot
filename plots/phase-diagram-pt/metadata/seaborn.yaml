  image_description: 'The plot displays a water pressure-temperature phase diagram
    on a 16:9 canvas. The x-axis shows Temperature (K) from 200 to ~750, and the y-axis
    shows Pressure (Pa) on a logarithmic scale from 10^1 to 10^9. Three phase boundary
    curves are drawn: a blue sublimation curve (solid-gas) curving from the lower-left
    up to the triple point, an orange vaporization curve (liquid-gas) sweeping from
    the triple point up to the critical point, and a green melting curve (solid-liquid)
    running nearly vertically from the triple point upward. The triple point is marked
    with a red circle at ~273 K with a red annotation arrow and label reading "Triple
    Point (273.16 K, 611.7 Pa)". The critical point is marked with a purple diamond
    at ~647 K with a purple annotation arrow and label reading "Critical Point (647.1
    K, 22.1 MPa)". Large semi-transparent phase region labels (SOLID in blue, GAS
    in orange, LIQUID in green, SUPERCRITICAL FLUID in purple) are placed within their
    respective regions. Top and right spines are removed. A subtle grid is present
    on both axes at alpha=0.15. A legend in the bottom-right identifies the three
    curves. Title reads "Water Phase Diagram · phase-diagram-pt · seaborn · pyplots.ai".'
