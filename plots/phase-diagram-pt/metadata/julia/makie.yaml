review:
  strengths:
  - Physically accurate water phase diagram using Clausius-Clapeyron equations with
    correct triple point (273.16 K / 611.73 Pa) and critical point (647.1 K / 22.064
    MPa) constants
  - 'Perfect Imprint palette compliance: Liquid-Gas uses #009E73 brand green first,
    Solid-Liquid uses #C475FD lavender second, Solid-Gas uses #4467A3 blue third —
    canonical order maintained'
  - 'Full spec compliance: all three phase boundaries, triple/critical point markers
    with distinct shapes (circle vs star5), phase region labels (SOLID/LIQUID/GAS/SUPERCRITICAL
    FLUID), and logarithmic pressure axis'
  - Complete theme adaptation with all chrome tokens correctly threaded through —
    INK, INK_SOFT, INK_MUTED, PAGE_BG, ELEVATED_BG all correctly flip between light
    (#FAF8F1) and dark (#1A1A17)
  - Clean idiomatic CairoMakie code using yscale = log10 on Axis directly, axislegend
    with full styling, RGBAf for theme-adaptive grid color, and modern size= API
  weaknesses:
  - Annotation text uses fontsize=11 (22px effective in 3200x1800 output) — below
    the ~26px recommended minimum; both Triple Point and Critical Point annotation
    labels are hard to read at mobile scale-down (~400px); increase annotation fontsize
    to 13 or 14
  - SUPER-CRITICAL FLUID label positioned at T=657 with :left alignment sits very
    close to the right canvas margin — shift to an interior position (e.g. T=650,
    P=1.5e7) with (:center,:center) alignment to give the text more breathing room
  - xtickcolor and ytickcolor not explicitly set — the library template includes these
    for robust theme adaptation; add xtickcolor=INK_SOFT and ytickcolor=INK_SOFT to
    the Axis constructor
  - 'Design Excellence gap: no visual emphasis distinguishes the critical point region
    as the terminus of the liquid-gas curve; consider a subtle shaded region for the
    supercritical fluid zone or a colored band near the critical point to create a
    clear focal point'
