      Data: Three phase boundary curves — Liquid-Gas in #009E73 brand green (dominant, sweeping curve from triple point to critical point), Solid-Liquid in #C475FD lavender (near-vertical line on the left), Solid-Gas in #4467A3 blue (lower-left curve). Triple point marked with black circle (INK) at ~273K/600Pa. Critical point marked with black star at ~647K/22MPa. Phase region labels SOLID (left), LIQUID (upper center), GAS (lower center), SUPER-CRITICAL FLUID (top right) in INK_MUTED. Legend in bottom-right with elevated background frame.
      Legibility verdict: PASS — all main elements readable. Annotation text for Triple Point and Critical Point at fontsize=11 (~22px effective) is somewhat small but legible at full resolution. SUPER-CRITICAL FLUID label close to right canvas margin but fully visible.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct, clearly not pure black
