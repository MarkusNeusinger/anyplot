      Chrome: Title "Water Phase Diagram · phase-diagram-pt · julia · makie · anyplot.ai" in dark ink at top center, comfortably spanning ~70% of canvas width. X-axis label "Temperature (K)" and Y-axis label "Pressure (Pa)" in dark ink, clearly readable. Tick labels in #4A4A44 (INK_SOFT), log-scale Y-axis ticks visible. Top and right spines removed, left and bottom in INK_SOFT. Subtle grid lines at 12% INK opacity.
      Data: Three phase boundary curves — Liquid-Gas in #009E73 (brand green), Solid-Liquid in #C475FD (lavender), Solid-Gas in #4467A3 (blue). Triple point marked with filled black circle (size 16) at ~(273, 612 Pa), critical point with black star (size 18) at top right ~(647, 22 MPa). Phase region labels SOLID, LIQUID, GAS in bold INK_MUTED, SUPER-CRITICAL FLUID multi-line label at top right. Subtle near-transparent polygon shading in supercritical region. Legend in bottom-right with framed elevated background.
