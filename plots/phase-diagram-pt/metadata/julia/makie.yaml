review:
  strengths:
  - Scientifically accurate water phase diagram using real Clausius-Clapeyron equations,
    correct physical constants (triple point 273.16 K/611.73 Pa, critical point 647.1
    K/22.064 MPa), and water's anomalous negative-slope melting curve
  - 'Full spec compliance: all three phase boundary curves, triple point (circle)
    and critical point (star) with distinct markers and annotations, phase region
    labels, supercritical fluid region with subtle polygon shading, logarithmic pressure
    axis'
  - Excellent theme adaptation with all Imprint tokens (PAGE_BG, ELEVATED_BG, INK,
    INK_SOFT, INK_MUTED) correctly applied and data colors identical between light
    and dark renders
  - 'Idiomatic Makie usage: poly! for the supercritical polygon, yscale=log10 in Axis
    constructor, axislegend, RGBAf for alpha colors, Point2f[] for polygon vertices'
  - Clean code structure with well-documented physical constants and minimal complexity
    — no unnecessary abstractions
  weaknesses:
  - Annotation text at fontsize=13 renders at 26px on the 3200×1800 canvas — slightly
    small for annotation labels; increase Triple Point and Critical Point annotation
    fontsize to 15-16 for better readability
  - Supercritical region polygon shading at 8% opacity (SC_FILL) is almost imperceptibly
    subtle — bumping to 12-14% would make it more visually apparent without adding
    noise
  - SUPER-CRITICAL FLUID label at x=662 with :center alignment is tight against the
    right axis margin (right limit=680); shifting to x=655 or using :right alignment
    would give more breathing room
  image_description: |-
    Light render (plot-light.png):
