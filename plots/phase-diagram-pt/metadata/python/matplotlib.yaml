review:
  strengths:
  - Scientifically accurate water phase diagram with real physical constants and Clausius-Clapeyron
    equation curves
  - Excellent semantic color mapping across all four phase regions — water=green,
    ice=blue, atmosphere=cyan, supercritical heat=ochre — all using Imprint palette
  - matplotlib.patheffects.withStroke used to improve phase label readability over
    colored fill regions — a distinctive matplotlib-specific capability
  - 'Perfect theme adaptation: all chrome elements (text, grid, annotation boxes,
    spine colors) correctly flip between light and dark themes; data colors stay constant'
  - 'Complete spec compliance: water anomaly (negative slope solid-liquid boundary),
    both special points annotated with exact coordinates, log pressure scale, supercritical
    region clearly labeled'
  weaknesses:
  - Annotation text at 7.5pt is borderline readable at mobile widths (~400px) — increase
    to 8pt minimum
  - Path-effect strokes use PAGE_BG as foreground color, making them invisible in
    dark theme (dark stroke on dark background); use INK_MUTED instead for visible
    outlines in both themes
  - plt.tight_layout() slightly compresses whitespace; fig.subplots_adjust() would
    give more deliberate margin control
