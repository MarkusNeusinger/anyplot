review:
  strengths:
  - Thermodynamically accurate water phase diagram using real Clausius-Clapeyron equations
    with correct triple point (273.16 K / 611.73 Pa) and critical point (647.1 K /
    22.064 MPa) values
  - Altair-native hover interactivity via selection_point changes both line opacity
    and strokeWidth — a genuinely Altair-idiomatic technique
  - 'Correct Imprint palette in canonical order: #009E73 (Solid–Gas first), #C475FD
    (Liquid–Gas second), #4467A3 (Solid–Liquid third); ochre and matte-red for special
    points'
  - Phase region fills with 10% opacity matching palette colors add spatial context
    without competing with the boundary lines
  - Logarithmic pressure axis correctly handles 9 orders of magnitude (1 Pa to 1 GPa);
    water's anomalous negative-slope solid–liquid boundary is properly shown
  weaknesses:
  - Critical point annotation ('Critical Point\n647.1 K, 22.06 MPa') is partially
    obscured by the legend box in both renders because the data point falls in the
    upper-right corner where the orient='top-right' legend lives — change cp_label
    to align='left' with dx=+16 so the annotation text extends leftward away from
    the legend box, or shift the legend to orient='bottom-right'
  - Dashed grid lines (gridDash=[3, 3]) contradict the style guide which specifies
    solid thin lines — remove the gridDash parameter to revert to solid grid
  - Critical point marker (square) is likely partially or fully behind the legend
    box at (647.1 K, 22.06 MPa) — repositioning the legend to orient='bottom-right'
    or 'top-left' would expose both the marker and the annotation
