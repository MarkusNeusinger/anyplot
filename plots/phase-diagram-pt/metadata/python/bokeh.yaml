review:
  strengths:
  - Realistic Clausius-Clapeyron water phase diagram data with accurate triple point
    (273.16 K / 611.73 Pa) and critical point (647.1 K / 22.064 MPa) coordinates using
    actual enthalpies
  - 'Excellent Bokeh library feature utilization: HoverTool with custom multi-field
    tooltips on special markers, Span reference lines at critical coordinates, Arrow+NormalHead
    annotations — all distinctly Bokeh'
  - Semantically correct Imprint palette usage for phase regions (cyan=ice/solid,
    blue=liquid/water, ochre=gas/steam, lavender=supercritical) with justified semantic
    exception overriding canonical order
  - 'Complete theme-adaptive chrome: all text, grid, backgrounds, annotation box fills,
    and boundary line colors adapt correctly between light and dark renders'
  - 'All required spec features present: three phase boundaries (sublimation/vaporization/melting),
    triple point + critical point with markers and annotations, supercritical region,
    logarithmic pressure axis, water anomaly negative-slope melting curve'
  - 'Multi-level visual hierarchy: filled phase regions → boundary lines → boundary
    curve labels → region labels → special-point annotations with arrows and reference
    lines'
  weaknesses:
  - 'Phase fill alpha (0.18) produces very dark, barely distinguishable region colors
    in the dark render (#1A1A17 background) — ochre gas becomes near-black brown,
    blue liquid becomes near-black navy. Use theme-conditional alpha: ~0.30 for dark
    theme, 0.18 for light.'
  - Boundary curve labels (Sublimation, Vaporization, Melting) at 22pt italic INK_MUTED
    are noticeably smaller than tick labels (34pt), creating an inconsistent typographic
    hierarchy. Increase boundary labels to at least 26-28pt or match tick label size.
  - outline_line_color = INK_SOFT keeps all 4 spines (full box outline), deviating
    from style guide recommendation to remove top and right spines. Set p.outline_line_color
    = None and keep axis lines only via p.xaxis.axis_line_color / p.yaxis.axis_line_color.
  - Critical Point annotation text (#4467A3 blue) on dark elevated background (#242420)
    has low contrast (~2.6:1) — consider using a slightly lighter blue or the INK
    token with a color indicator alternative for better dark-mode readability.
