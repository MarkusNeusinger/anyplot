    Light render (plot-light.png):
      Background: Warm off-white #FAF8F1 — correct Imprint surface, not pure white.
      Chrome: Title "phase-diagram-pt · python · bokeh · anyplot.ai" in bold dark ink, fully readable, spans ~52% of canvas width. X-axis label "Temperature (K)" and Y-axis label "Pressure (Pa)" in italic dark ink, readable. Tick labels (powers-of-10 on log Y, 200–800 on X) in dark INK_SOFT, clear. Grid lines at ~12% alpha, subtle but visible.
      Data: Four phase regions as semi-transparent filled patches — SOLID (left, cyan #2ABCCD at 18% alpha), LIQUID (upper-middle, blue #4467A3 at 18% alpha), GAS (lower-right large area, ochre #BD8233 at 18% alpha), SUPERCRITICAL FLUID (top-right, lavender #C475FD at 15% alpha). Phase boundaries as INK_SOFT dark lines (~4px). Triple point as red circle (#AE3030) with glow ring, clearly visible. Critical point as blue diamond (#4467A3) with glow ring, clearly visible. Annotation boxes for both special points with ELEVATED_BG backgrounds and arrows. Region labels (SOLID, LIQUID, GAS) in bold semi-transparent ink, clear. Boundary curve labels (Sublimation, Vaporization, Melting) in italic INK_MUTED, angled, smaller than ticks but readable. Reference dotted lines at critical P and T.
      Legibility verdict: PASS — all text readable against warm off-white background.

    Dark render (plot-dark.png):
      Background: Warm near-black #1A1A17 — correct Imprint surface, not pure black.
      Chrome: Title in bold off-white #F0EFE8, fully readable. Axis labels in off-white, readable. Tick labels in INK_SOFT #B8B7B0 light gray, clearly readable against dark background. Grid lines subtle and visible. No dark-on-dark text failures detected.
