review:
  strengths:
  - Physically accurate water phase diagram using Clausius-Clapeyron equation — triple
    point (273.16 K, 611.73 Pa) and critical point (647.1 K, 22.064 MPa) match real-world
    water constants exactly
  - SVG post-processing via xml.etree.ElementTree injects phase region labels (SOLID,
    LIQUID, GAS, SUPERCRITICAL FLUID) and callout annotation lines — a sophisticated
    technique demonstrating deep pygal mastery
  - 'Correct Imprint palette order: Sublimation=green (#009E73), Vaporization=lavender
    (#C475FD), Melting=blue (#4467A3), Critical Point=ochre (#BD8233), Triple Point=matte-red
    (#AE3030)'
  - 'Full theme adaptation: PAGE_BG, INK, and INK_MUTED tokens wired through Style
    object and SVG callout text — dark render passes the dark-on-dark check cleanly'
  - Logarithmic Y-axis with y_labels=[1,100,1e4,1e6,1e8] plus smart value_formatter
    showing Pa/kPa/MPa — covers the full 8-decade pressure range of water phase behavior
  - Cubic interpolation (interpolate=\"cubic\", interpolation_precision=200) produces
    smooth phase boundary curves with no visible polygon artifacts
  weaknesses:
  - Callout sublabel text (\"273.16 K · 611.73 Pa\", \"647.1 K · 22.064 MPa\") is
    set to 30px — below the recommended minimum of ~36px for a 3200×1800 canvas. Increase
    to 34–36px for better mobile readability.
  - Phase region labels rendered at opacity 0.35 / 0.30 — intentionally subtle, but
    may be too faint when rendered at mobile thumbnail widths (~400px). Consider raising
    to 0.50–0.55 to improve legibility at small sizes.
  - No redundant encoding on the three phase boundary curves — all three are lines
    of similar weight, distinguishable by color only. Adding distinct linestyles (solid
    / dashed / dotted) would improve CVD accessibility for the 3-series line group.
