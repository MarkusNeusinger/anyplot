review:
  strengths:
  - Physically accurate water phase diagram with correct constants (triple point 273.16
    K/611.73 Pa, critical point 647.1 K/22.064 MPa, sublimation enthalpy 51059 J/mol,
    vaporization enthalpy 40700 J/mol) and water's anomalous negative melting slope
  - Phase-region labels (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID) at tasteful low
    opacity guide the reader without overwhelming the data
  - Logarithmic y-axis correctly implemented via logarithmic=True; human_readable=True
    auto-formats tick labels (1.0 Pa to 10.0 kPa to 1.0 MPa)
  - Cubic spline interpolation (interpolate='cubic') makes phase boundaries smooth
    and scientifically credible
  - All font sizes explicitly set via Style object; both themes fully readable with
    no dark-on-dark or light-on-light failures
  weaknesses:
  - 'Legend color mismatch for landmark points (SC-04): pygal applies palette-cycle
    colors to legend swatches (#BD8233 ochre for series 4, #AE3030 red for series
    5) independently of per-point ''color'' overrides. Triple-point dot renders red
    but its legend swatch is ochre; critical-point dot renders ochre but its legend
    swatch is red. Fix: remove per-point ''color'' keys and use explicit palette assignments
    at the series level so legend swatches match rendered dots.'
  - 'Design Excellence ceiling (DE-01/DE-02): No spine removal (top/right frame still
    present); typography hierarchy is functional but not refined; chart reads as a
    solid pygal default rather than publication-ready. Add annotation callout labels
    for triple/critical points and remove top/right frame spines via SVG post-processing.'
  - 'Minor KISS deviation (CQ-01): format_pressure utility function defined at module
    level; the formatting logic could be inlined or replaced with a lambda.'
  image_description: |-
    Light render (plot-light.png):
      Background: warm off-white #FAF8F1 — correct theme surface
      Chrome: title "phase-diagram-pt · python · pygal · anyplot.ai" centered in dark ink ~60% width; x-axis label "Temperature (K)" and y-axis label "Pressure (Pa)" in dark ink; tick labels (200 K, 300 K … 600 K; 1.0 Pa, 100.0 Pa, 10.0 kPa, 1.0 MPa) in dark ink — all readable
      Data: three boundary curves — brand green (#009E73) sublimation curve, lavender (#C475FD) vaporization curve, blue (#4467A3) melting curve; large dark-red dot at triple point (273.16 K, 611 Pa); large ochre dot at critical point (647.1 K, 22.1 MPa); phase region labels SOLID/LIQUID/GAS/SUPERCRITICAL FLUID at 0.30–0.35 opacity
      Legend color inconsistency: Triple Point swatch shows ochre (#BD8233) but dot is red (#AE3030); Critical Point swatch shows red but dot is ochre — per-point color override does not propagate to pygal legend swatches
      Legibility verdict: PASS

    Dark render (plot-dark.png):
      Background: warm near-black #1A1A17 — correct dark theme surface
      Chrome: title, axis labels, tick labels all rendered in light off-white ink — fully readable against dark background; no dark-on-dark failure detected; dashed grid lines subtly visible
      Data: identical colors to light render — green sublimation, lavender vaporization, blue melting, red triple point dot, ochre critical point dot; phase region labels same colors and opacity
      Legend color inconsistency persists (ochre swatch for triple point, red swatch for critical point)
      Legibility verdict: PASS
