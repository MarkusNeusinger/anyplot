review:
  strengths:
  - Scientifically accurate water phase diagram using Clausius-Clapeyron equations
    with real physical constants (triple point 273.16 K / 611.73 Pa, critical point
    647.1 K / 22.064 MPa) — all data verifiable against literature
  - Three boundary curves use distinct dash styles (ShortDash / LongDash / DashDot)
    in addition to Imprint palette colors, providing redundant encoding that aids
    colorblind readability
  - HTML dataLabels for triple point and critical point annotations are styled with
    matching palette-color backgrounds, creating visual coherence between marker and
    label
  - Logarithmic Y-axis correctly spans 10 Pa to 1 GPa to accommodate water's extreme
    pressure range
  - Phase region shading (translucent green for gas, translucent blue for liquid)
    plus bold region labels (SOLID / LIQUID / GAS / SUPERCRITICAL FLUID) give viewers
    immediate spatial orientation
  - Water's anomalous negative dP/dT melting slope is correctly represented — ice
    melts under pressure, a physically accurate detail not often seen in synthetic
    data
  - 'Theme-adaptive chrome is fully wired: PAGE_BG, INK, INK_SOFT, GRID, ELEVATED_BG
    all branch on ANYPLOT_THEME; both renders pass legibility checks'
  weaknesses:
  - 'DE-02: No explicit spine/axis-frame removal — Highcharts retains the default
    rectangular chart border; removing or muting the top and right axis lines (lineWidth:0
    on chart.options.x_axis.opposite and y_axis opposite) would tighten the L-shaped
    frame aesthetic'
  - 'DE-03: The custom HTML legend in the lower right is useful but sits isolated
    in empty whitespace below the critical-point region; repositioning it closer to
    the Vaporization curve terminus or inside the GAS region would strengthen the
    storytelling integration'
  - 'LM-01: All series are added as raw dict literals rather than typed series objects
    (LineSeries, ScatterSeries, AreaSeries) — the highcharts_core library provides
    typed classes that offer better IDE support and are the idiomatic pattern shown
    in the library guide'
  - 'VQ-01 minor: Annotation box font sizes (28px / 24px for triple/critical point
    text) are slightly small relative to the 44px tick label baseline; bumping to
    32px / 28px would improve readability when the image is displayed at smaller viewport
    widths'
