review:
  strengths:
  - 'Correct thermodynamic data for water: actual triple point (273.16 K, 611.73 Pa)
    and critical point (647.1 K, 22.064 MPa) using Clausius-Clapeyron equations'
  - Correct logarithmic pressure axis covering wide range (10 Pa to 1e9 Pa)
  - All four phase regions labeled clearly (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID)
    with appropriate placement
  - Styled HTML annotation boxes for triple and critical points with coordinate values
    — idiomatic Highcharts useHTML feature
  - 'Imprint palette applied correctly: sublimation curve = #009E73 (position 1),
    vaporization = #C475FD (position 2), melting = #4467A3 (position 3)'
  - 'Theme-adaptive chrome: all INK/INK_SOFT/PAGE_BG/GRID tokens correctly wired;
    both light and dark renders pass legibility check'
  - Dynamic title fontsize formula prevents overflow for long descriptive prefix
  - plotBands on X-axis for subtle region tinting — Highcharts-specific distinctive
    feature
  - Custom HTML legend in lower-right with dash-style visual representations
  - Canvas normalization via PIL ensures exact 3200×1800 output
  weaknesses:
  - 'Solid-liquid (melting) boundary is invisible due to data generation bug: slope
    direction is inverted. Code computes temp_sl_end = triple_t + (triple_p - y_max)
    / (-1.3e7) ≈ 350 K, then linspace(273.16, 350, 60) with pressure = triple_p +
    (T - triple_t) * (-1.3e7) — this produces negative pressures immediately after
    the triple point (beyond T=273.16, P drops below 0 Pa). Fix: for water''s anomalous
    negative dP/dT slope, the melting curve goes to LOWER temperatures at HIGHER pressures.
    Use temp_sl_end = triple_t + (triple_p - y_max) / (-1.3e7) → this gives ~196 K,
    then linspace(triple_t, temp_sl_end, 60) in reverse order (from 273.16 K downward
    to ~196 K) so pressure increases from 611.73 Pa to 1e9 Pa. Alternatively: temp_sl
    = np.linspace(196, 273.16, 60); pressure_sl = triple_p + (temp_sl - triple_t)
    * (-1.3e7).'
  - 'X-axis label ''Temperature (K)'' is rendered very close to the bottom canvas
    edge — add spacingBottom: 30 or increase marginBottom from 120 to 150 to give
    the 56px axis title more breathing room.'
  - 'Design Excellence: phase region fills help but the SOLID region lacks a clear
    boundary (melting curve absent makes the left region undefined). Once the melting
    curve is fixed, consider adding a matching background tint for the solid region
    using plotBands on the Y-axis or a rect annotation.'
  - 'LM-02: plotBands and useHTML dataLabels are good Highcharts-distinctive features,
    but consider adding renderer.label() or SVGRenderer for the custom legend to further
    showcase Highcharts SVG capabilities.'
