      Data: Sublimation curve in #009E73 (green, dashed, lower-left) — first series correctly assigned. Vaporization curve in #C475FD (lavender, long-dashed) sweeping from triple point to critical point area. Triple point at (273.16 K, 611.73 Pa) marked by ochre (#BD8233) circle with HTML annotation box. Critical point at (647.1 K, 22.06 MPa) marked by matte-red (#AE3030) diamond with HTML annotation box. Phase labels SOLID (upper-left), LIQUID (center), GAS (lower-right), SUPERCRITICAL FLUID (upper-right) in matching colors. Subtle green area fill below curves for GAS region, subtle blue fill for LIQUID region. Custom HTML legend in lower-right corner. MELTING curve is present in legend but NOT visible in the chart — data generation bug causes all pressure values to be negative (below y-axis min=10 Pa).
      Legibility verdict: PASS — all text readable against light background. No light-on-light failures.

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correctly matches the Imprint dark surface.
