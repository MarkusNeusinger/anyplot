  image_description: 'The plot shows a water pressure-temperature phase diagram on
    a 16:9 canvas. The x-axis displays Temperature (K) ranging from ~180 to ~750,
    and the y-axis shows Pressure on a logarithmic scale from ~10 Pa to ~1 GPa. Three
    phase boundary curves are drawn: Solid-Gas (blue, #306998) curving from lower-left
    to the triple point, Liquid-Gas (red, #e74c3c) curving from the triple point up
    to the critical point, and Solid-Liquid (green, #27ae60) running nearly vertically
    from the triple point upward. The triple point is marked with a yellow-filled
    circle at (273.16 K, 612 Pa) and the critical point at (647.1 K, 22.1 MPa). Phase
    regions are labeled in large semi-transparent bold text: SOLID (blue, upper-left),
    LIQUID (red, center-upper), GAS (green, lower-right), and SUPERCRITICAL FLUID
    (purple, upper-right). The background is white with a light gray panel, subtle
    major gridlines, and no minor gridlines. A legend on the right identifies the
    three boundary types.'
