review:
  strengths:
  - Custom afterDraw canvas plugin for phase region labels is elegant and idiomatic
    Chart.js — avoids hacky DOM overlays
  - Physically accurate CO2 phase diagram using Clausius-Clapeyron equations with
    real thermodynamic constants (triple point 216.55 K / 5.18 atm, critical point
    304.13 K / 72.8 atm)
  - Logarithmic Y-axis with clean power-of-10 tick formatting via callback — excellent
    log-scale handling for 5-order-of-magnitude pressure range
  - Dynamic title fontsize calculation (22 * 67 / title.length) prevents overflow
    on long descriptive title prefix
  - Complete Imprint palette compliance and full token-based theme adaptation (ink,
    inkSoft, grid, pageBg) throughout both light and dark renders
  weaknesses:
  - Default Chart.js 4-sided box border retained — removing top and right border lines
    would produce a cleaner scientific diagram aesthetic; use Chart.js v4 border color/display
    settings to achieve L-shaped frame
  - SUPER-CRITICAL region label split as two lines with orphaned hyphen ("SUPER-"
    / "CRITICAL") — change regionPlugin lines array to ["SUPER", "CRITICAL"] without
    hyphen
  - 'Triple point star marker fill color (#BD8233 ochre, palette[3]) visually dominated
    by large ink-colored border (borderWidth: 2) — reduce borderWidth to 1 on star
    and diamond markers so backgroundColor shows through more clearly'
  - Legend font size (15px) slightly larger than tick label font size (14px) — unify
    to 14px for consistent secondary text balance
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white (#FAF8F1) — correct theme surface, not pure white
      Chrome: Title "CO2 Phase Diagram · phase-diagram-pt · javascript · chartjs · anyplot.ai" centered in dark ink (~20pt dynamic size, fully readable). Axis labels "Temperature (K)" and "Pressure (atm)" in dark ink at 18pt. Tick labels in inkSoft at 14pt. Phase region labels (SOLID, LIQUID, GAS, SUPER-CRITICAL) at 50% opacity in inkSoft, all readable.
      Data: Three boundary curves — sublimation in #009E73 (brand green), vaporization in #C475FD (lavender), fusion in #4467A3 (blue). Triple point star marker at 216.55 K / 5.18 atm with ochre fill and ink border. Critical point diamond at 304.13 K / 72.8 atm in matte red #AE3030. First series = #009E73 confirmed.
      Legibility verdict: PASS — all text clearly readable against warm off-white background

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17) — correct dark theme surface, not pure black
