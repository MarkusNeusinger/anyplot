review:
  strengths:
  - Real CO₂ data with physically accurate triple and critical point constants (216.55
    K / 5.18 atm and 304.13 K / 72.8 atm) — a genuine scientific reference chart
  - Custom regionPlugin draws phase-region labels directly at thermodynamically correct
    positions using afterDraw canvas API
  - Custom lFramePlugin produces a clean L-shaped frame matching the anyplot style
    guide
  - Dynamic title font sizing scales correctly for the long mandated title
  - Logarithmic y-axis with custom tick callback displays clean decade labels (0.01,
    0.1, 1, 10, 100)
  - Imprint palette applied perfectly; data colors identical across both themes
  weaknesses:
  - Phase region labels at globalAlpha=0.5 on inkSoft are slightly faint at mobile
    scale; consider increasing alpha to 0.65–0.7 or using t.ink at 0.55 to improve
    small-size legibility
  - No background fill/shading for phase regions — adding subtle translucent fills
    using t.palette[i] at 0.06–0.08 alpha drawn in beforeDraw would elevate the aesthetic
    from functional to publication-ready (DE-01 improvement)
