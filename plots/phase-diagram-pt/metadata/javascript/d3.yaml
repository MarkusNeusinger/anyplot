  strengths:
  - 'Scientifically accurate water phase diagram using real constants: triple point
    at exactly 273.16 K / 611.73 Pa and critical point at 647.1 K / 22.064 MPa, with
    proper Clausius-Clapeyron equations for sublimation and vaporization curves'
  - 'Complete spec compliance: all three phase boundaries with distinct styles (solid
    lines + dashed for sublimation), all four phase regions labeled (SOLID, LIQUID,
    GAS, SUPERCRITICAL FLUID), triple and critical point markers with coordinate annotations'
  - 'Correct Imprint palette usage in canonical order: palette[0] #009E73 for solid-liquid,
    palette[1] #C475FD for liquid-gas, palette[2] #4467A3 for solid-gas, with redundant
    encoding (dashed line for sublimation) for CVD accessibility'
  - 'Idiomatic D3: d3.scaleLog for logarithmic pressure axis, d3.line().defined()
    for proper boundary clipping, SVG clipPath element for rendering within plot bounds,
    custom tick formatter with Unicode superscripts for scientific notation'
  - Full theme adaptation with all chrome tokens applied (inkSoft for ticks, ink for
    title/labels, grid for gridlines), data colors identical between light and dark
    renders
  - All font sizes explicitly set (14px tick labels, 16px axis labels and phase region
    labels, title dynamically scaled by length to prevent overflow)
  weaknesses:
  - addMarker arrow function introduces a minor KISS violation — could be inlined
    directly into the two call sites for stricter flat-script style
  - Axis domain paths not removed — both xAx and yAx domain lines are still rendered,
    creating a visible 4-sided box frame; remove with xAx.select('.domain').attr('stroke',
    'none') and yAx.select('.domain').attr('stroke', 'none') for cleaner L-shaped
    or frameless look per style guide
  - Triple point marker uses t.ink (theme-adaptive chrome token) as fill, making the
    marker flip from dark to light between themes; while semantically reasonable as
    a reference point, the legend also uses t.ink for the Triple point swatch — if
    strict data-color consistency is required, consider a fixed palette color (e.g.
    t.palette[4]) or document the intentional chrome-anchor usage
