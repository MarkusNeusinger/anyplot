    curve; subsequent series follow canonical Imprint order; data colors identical
    across both renders'
  - Theme-adaptive chrome works correctly in both light (#FAF8F1 bg) and dark (#1A1A17
    bg) renders with no dark-on-dark failures
  - Clean, deterministic, KISS code structure with meaningful physical constant comments;
    fully reproducible from fixed constants
  - Correct use of ECharts graphic component for phase-region overlay labels, a more
    advanced ECharts-specific pattern
  weaknesses:
