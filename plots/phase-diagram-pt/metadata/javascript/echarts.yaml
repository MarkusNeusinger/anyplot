    axis lines would increase visual refinement — consider axisLine: { show: false
    } on both axes, keeping only the subtle grid as structure'
  - 'DE-01 not at publication polish: Missing phase-region shading — adding markArea
    fills with low-opacity (~0.08) Imprint palette colors per phase region (SOLID,
    LIQUID, GAS, SUPERCRITICAL FLUID) is the highest-impact visual upgrade and also
    leverages a distinctive ECharts feature (LM-02)'
  - 'VQ-02 minor: Triple-point annotation ''Triple Point / 216.55 K, 5.19 atm'' placed
    position: ''right'' overlaps slightly with the rising lavender vaporization curve;
    change to position: ''bottom'' or add pixel offset to separate annotation from
    curve'
  - 'VQ-01 minor: Triple-point annotation fontSize: 13 is below tick label size (14px);
    bump to 14px for consistent hierarchy'
