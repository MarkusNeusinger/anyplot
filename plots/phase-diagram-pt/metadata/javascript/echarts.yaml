review:
  strengths:
  - Scientifically accurate CO₂ phase diagram using Clausius-Clapeyron equations with
    correct triple point (216.55 K / 5.185 atm) and critical point (304.13 K / 72.8
    atm) values
  - 'Full Imprint palette compliance: sublimation curve correctly uses brand green
    #009E73 as first series, all boundary colors and special-point markers drawn from
    t.palette'
  - Correct logarithmic Y-axis spanning 0.01–2000 atm accommodating the wide pressure
    range required for a realistic P-T diagram
  - 'Thoughtful multi-layer design: subtle markArea phase region shading (opacity
    0.08) + bold boundary curves (width 5) + labeled special-point markers + graphic
    text overlays create clear visual hierarchy'
  - 'Excellent spec coverage: all three phase boundaries, triple point, critical point,
    four region labels (SOLID, LIQUID, GAS, SUPERCRITICAL FLUID), and log pressure
    axis all present'
  - 'Theme-adaptive chrome fully wired: t.ink for primary text, t.inkSoft for secondary
    text and annotations, t.grid for grid lines — both renders are legible'
  - 'Clean idiomatic ECharts: animation:false, transparent background, explicit font
    sizes throughout, no devicePixelRatio override'
  weaknesses:
  - Triple point label (positioned 'bottom') may overlap the sublimation curve at
    its termination point — the two lines of text sit directly on the curve junction;
    consider offsetting the label to the right or using 'insideBottomRight' to clear
    the curve intersection
  - 'LM-02 partially missed: markArea and graphic are used well but the implementation
    doesn''t leverage ECharts visualMap, rich-text formatter, or tooltip customization
    for added sophistication'
  - Axis label nameTextStyle fontsize 18px is slightly larger than the ECharts guide
    default (14px for labels); while readable, it creates a mild size imbalance between
    axis title and tick labels (14px)
