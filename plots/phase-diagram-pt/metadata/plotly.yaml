  image_description: 'The plot displays a Water P-T Phase Diagram with Temperature
    (K) on the x-axis (range ~180-760 K) and Pressure (Pa) on a logarithmic y-axis
    (range 1-10B Pa). Three phase boundary curves are drawn: a dark blue sublimation
    curve from ~200 K to the triple point, a purple vaporization curve from the triple
    point to the critical point, and a teal green melting curve rising nearly vertically
    from the triple point. The triple point is marked with a red diamond at (273.16
    K, 611.73 Pa) with an annotation arrow. The critical point is marked with an orange
    star at (647.1 K, 2.206e7 Pa) with a long annotation arrow from the left. Phase
    regions are labeled in large semi-transparent text: SOLID on the left, LIQUID
    in the center, GAS at the bottom right, and Supercritical Fluid in smaller text
    at the top right. Very subtle colored fills shade each phase region. The legend
    appears in the upper left with all five trace entries. The title reads "Water
    P-T Phase Diagram · phase-diagram-pt · plotly · pyplots.ai". The plotly_white
    template provides a clean white background with subtle gridlines.'
