review:
  strengths:
  - Clear visual hierarchy from high-to-low importance
  - Well-organized horizontal bar layout makes feature names readable
  - Gradient color mapping effectively emphasizes importance scale
  - Value labels at bar ends provide precise information
  - Both light and dark renders are legible with good text contrast
  - Proper feature sorting by importance descending
  weaknesses:
  - Source code does not read ANYPLOT_THEME environment variable — no theme-adaptive
    color handling implementation
  - 'Hardcoded background color (#fafafa) instead of theme tokens (PAGE_BG: #FAF8F1
    light / #1A1A17 dark)'
  - Hardcoded text colors (#306998) instead of theme-adaptive tokens (INK / INK_SOFT)
  - Uses forbidden bokeh.io.export_png() instead of Selenium headless Chrome screenshot
    per bokeh library rules
  - Output filenames wrong — saves to 'plot.png' instead of 'plot-light.png' / 'plot-dark.png';
    breaks workflow integration
  - Uses Blues9 categorical palette for continuous importance gradient — should use
    viridis/cividis sequential colormap per style guide
  - Line color (#306998) may have suboptimal contrast on dark theme background
