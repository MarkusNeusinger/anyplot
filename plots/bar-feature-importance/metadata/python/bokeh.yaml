    and #666666 medium-gray don''t work on either surface)'
  image_description: |-
    Light render (plot-light.png):
      Background: Warm off-white, appears correct for #FAF8F1 light theme
      Chrome: Title "bar-feature-importance · bokeh · anyplot.ai" is readable in dark blue (#306998). Feature names on left are readable. Axis label and tick labels are clear.
      Data: Horizontal bars use a Blues9 gradient from light (lowest importance) to dark (highest importance), ranging from yellow (#FFD700 at top) to deep blue. Value labels are readable at 0.185, 0.162, 0.124, etc.
      Grid: Subtle dashed x-axis grid lines at appropriate opacity
      Legibility verdict: PASS - All text is readable against the light background

    Dark render (plot-dark.png):
      Background: Dark near-black, appears to be dark theme surface
      Chrome: CRITICAL FAILURE - Title is present but nearly unreadable. Feature names on left are extremely faint/dark gray against dark background. Axis labels and tick labels are also hard to read. Value labels at end of bars are barely visible.
      Data: Bars maintain the same gradient colors as light render (good), but are now on a dark background. The color gradient itself is visible and readable.
      Grid: Grid lines appear very faint on dark background
      Legibility verdict: FAIL - Title, axis labels, and value labels are "dark on dark" - text colors (#306998 and #666666) are far too dark for the dark background (#1A1A17). This is a critical theme-adaptation failure.

    The data colors (gradient) correctly remain identical between light and dark renders, but the chrome (text, grid, background) fails entirely in dark mode. The implementation does not read ANYPLOT_THEME and does not apply theme-adaptive tokens as documented in bokeh.md.
