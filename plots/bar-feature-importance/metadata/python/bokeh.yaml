      Data: Horizontal bars use gradient from light blue to dark blue (Blues9 reversed), sorted by importance (highest at top). Value labels displayed at end of each bar (0.185, 0.162, 0.124, etc.). Subtle dashed x-axis grid lines with 30% alpha provide light guidance without distraction.
      Layout: Good use of canvas space, all 12 features visible, bars well-spaced with readable labels
      Legibility verdict: PASS - all text readable, good contrast

    Dark render (plot-dark.png):
      Background: Warm near-black (#1A1A17), correctly theme-adapted
      Chrome: **CRITICAL ISSUE** - Title text remains in dark blue (#306998) on dark background, making it unreadable (dark-on-dark failure). Y-axis feature names appear to be light-colored and readable. Value labels and axis label text appear to be light-colored and readable.
      Data: Bars maintain identical blue gradient as light render (excellent - data colors are theme-independent). Grid and spacing unchanged.
      Legibility verdict: FAIL - Title is unreadable due to dark-on-dark color problem; implementation failed to adapt title color to dark theme using INK tokens
