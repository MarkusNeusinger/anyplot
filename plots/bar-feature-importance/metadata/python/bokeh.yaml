review:
  strengths:
  - Correct horizontal bar chart type with proper sorting by importance
  - Data colors (bar gradient) remain identical across light and dark renders
  - Value labels at bar endpoints provide precise importance scores
  - Realistic financial feature importance data with good variety of values
  - Font sizes explicitly set for all text elements (32pt title, 24pt labels, 18pt
    ticks)
  - Clean layout with good use of canvas space
  - Subtle grid styling that doesn't compete with data
  weaknesses:
  - 'Title color (#306998) not theme-adapted — remains dark blue on dark background
    in dark render, causing unreadable dark-on-dark text. Must use INK token (#1A1A17
    light / #F0EFE8 dark) for title.text_color'
  - Title domain incorrect — says 'pyplots.ai' instead of 'anyplot.ai' per spec format
  - Uses deprecated bokeh.io.export_png() which bokeh.md forbids. Must switch to Selenium/headless
    Chrome screenshot approach per library guide
  - Output files named 'plot.png' instead of 'plot-light.png'/'plot-dark.png'. Workflow
    expects theme-suffixed filenames
  - Palette choice (Blues9) is generic; style guide recommends viridis/cividis for
    continuous importance data. LinearColorMapper is correct technique but palette
    should follow guide
  - No environment-based theme support — should read ANYPLOT_THEME env var and set
    PAGE_BG, INK, INK_SOFT tokens for all colors
  - Other chrome colors (grid, axes, ticks) also hardcoded without theme tokens —
    needs full theme-adaptive refactor
  image_description: |-
