# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python dependencies (uv)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps(python):"
    groups:
      # Group minor/patch updates together
      python-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Frontend dependencies (yarn/npm)
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "deps(npm):"
    groups:
      # Group React ecosystem updates
      react:
        patterns:
          - "react*"
          - "@types/react*"
      # Group MUI updates
      mui:
        patterns:
          - "@mui/*"
      # Group minor/patch updates
      npm-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # vite 8.1.x (rolldown 1.1.x) emits a broken mui/emotion chunk with our
      # manualChunks split — the app white-screens with "TypeError: t is not a
      # function" at chunk init (took anyplot.ai down on 2026-07-23, see CHANGELOG).
      # jsdom tests can't catch a broken bundle, so a bump would auto-merge
      # green again. Pinned to 8.0.16; re-test in a browser before lifting.
      - dependency-name: "vite"
        update-types:
          [
            "version-update:semver-patch",
            "version-update:semver-minor",
            "version-update:semver-major",
          ]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    # "/" only scans .github/workflows — the composite actions' own `uses:`
    # pins (now SHA-pinned like the workflows) need their directories listed
    # explicitly to stay covered.
    directories:
      - "/"
      - "/.github/actions/setup-node"
      - "/.github/actions/setup-r"
      - "/.github/actions/setup-julia"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps(actions):"
    groups:
      actions:
        patterns:
          - "*"
