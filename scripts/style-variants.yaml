        - {regex: 'line_width\s*=\s*2\b', replace: "line_width=6"}
      highcharts:
        - {find: "--window-size=4800,2700", replace: "--window-size=2400,1350"}
        - {find: "--window-size=3600,3600", replace: "--window-size=1800,1800"}
        - {find: '"width": 4800,',  replace: '"width": 2400,'}
