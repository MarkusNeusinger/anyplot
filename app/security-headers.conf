# Security response headers for the frontend nginx (audit 2026-07-16).
#
# Included at server level in both server blocks of nginx.conf AND re-included
# inside every location that declares its own add_header — nginx's add_header
# does NOT merge across levels: a location with any add_header of its own
# silently drops all inherited headers. When adding an add_header to a new
# location, re-include this file there.
#
# CSP notes (must not break the SPA — see app/index.html and app/src):
# - script-src 'unsafe-inline': index.html ships inline scripts (theme
#   resolver, Eruda loader, Plausible stub); no nonce infra for a static file.
# - script-src cdn.jsdelivr.net: on-device debug console (Eruda) behind ?debug=1.
# - style-src 'unsafe-inline': MUI/emotion inject inline styles.
# - img/font/connect storage.googleapis.com: plot previews + MonoLisa fonts on GCS.
# - img/connect/frame api.anyplot.ai: API calls, og images, interactive-preview
#   iframe via /proxy/html (SpecDetailView.tsx).
# - connect plausible.io: analytics is proxied through /js/script.js and
#   /api/event ('self'), the direct host is allowed as a safety margin.
# - Plausible pageviews/events go to 'self' (/api/event), covered by connect-src.
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
# 180 days — moderate max-age, no includeSubDomains/preload (conservative first rollout).
add_header Strict-Transport-Security "max-age=15552000" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://storage.googleapis.com https://api.anyplot.ai; font-src 'self' data: https://storage.googleapis.com; connect-src 'self' https://api.anyplot.ai https://storage.googleapis.com https://plausible.io; frame-src 'self' https://api.anyplot.ai; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
