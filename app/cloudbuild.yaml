# Cloud Build configuration for anyplot Frontend
substitutions:
  _REGION: "europe-west4"
  _SERVICE_NAME: "anyplot-app"
  # Same-origin via the Cloudflare Worker bound to anyplot.ai/api/* (which
  # proxies to api.anyplot.ai). Keeps SPA fetch credentials on a single
  # cookie scope and avoids cross-origin redirects through CF Access.
  _VITE_API_URL: "/api"

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID",
        "-t",
        "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:latest",
        "--build-arg",
        "VITE_API_URL=${_VITE_API_URL}",
        "-f",
        "app/Dockerfile",
        "app",
      ]

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}"]

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image"
      - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
      - "--region"
      - "${_REGION}"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--timeout"
      - "60"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "3"
      - "--port"
      - "8080"
      - "--execution-environment"
      - "gen2"
      - "--cpu-throttling"
      - "--concurrency"
      - "15"

# Store images in Artifact Registry
images:
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:$BUILD_ID"
  - "europe-west4-docker.pkg.dev/$PROJECT_ID/anyplot/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
