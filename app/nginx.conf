# Bot detection for SEO — these bots get pre-rendered HTML with og:tags from
# /seo-proxy/, social bots (no JS) and search-engine bots alike. Google
# explicitly says serving prerendered HTML to crawlers is fine as long as the
# content matches what humans see; for a content-driven catalogue with ~3000
# spec/impl pages, having every URL claim the homepage's title/canonical/og:url
# (the SPA shell) costs weeks of indexing latency on new pages and risks the
# wrong title/description being indexed when client-side rendering fails.
map $http_user_agent $is_bot {
    default 0;
    # Search engines — historically excluded "because they render JS since 2019",
    # but in practice the prerendered HTML produces faster, more reliable
    # indexing for a content-driven catalogue. This path is invisible to human
    # traffic, so it is monitored continuously by
    # .github/workflows/bot-serving-check.yml (daily curl with bot UAs); after
    # any change here, also verify manually with
    # `curl -A "Googlebot" https://anyplot.ai/scatter-basic` — should return
    # the per-route title/canonical/og:url, not the empty SPA shell.
    ~*googlebot 1;
    # Search Console's URL inspection (Google-InspectionTool) and Google's
    # misc crawler (GoogleOther) do NOT contain "googlebot" in their UA —
    # without these entries they fell through to the SPA shell, so URL
    # inspection showed the wrong page (audit 2026-07-16).
    ~*google-inspectiontool 1;
    ~*googleother 1;
    ~*bingbot 1;
    ~*duckduckbot 1;
    ~*yandexbot 1;
    ~*baiduspider 1;
    ~*applebot 1;
    # Social Media
    ~*twitterbot 1;
    ~*facebookexternalhit 1;
    ~*linkedinbot 1;
    ~*pinterestbot 1;
    ~*redditbot 1;
    ~*tumblr 1;
    ~*mastodon 1;
    # Messaging Apps
    ~*slackbot 1;
    ~*discordbot 1;
    ~*telegrambot 1;
    ~*whatsapp 1;
    ~*signal 1;
    ~*viber 1;
    ~*skypeuripreview 1;
    ~*microsoft\ teams 1;
    ~*snapchat 1;
    # Link Preview Services
    ~*embedly 1;
    ~*quora\ link\ preview 1;
    ~*outbrain 1;
    ~*rogerbot 1;
    ~*showyoubot 1;
}

# Headless/automation clients for the analytics shield below. Distinct from
# $is_bot (which routes crawlers to prerendered HTML): these are the
# unfiltered synthetic waves — headless Chrome farms, scraper libraries —
# that fired real Plausible events and inflated visitor counts ~40%
# (audit 2026-07-08 High#7). An empty UA is never a real browser.
map $http_user_agent $is_headless_client {
    default 0;
    "" 1;
    ~*headlesschrome 1;
    ~*phantomjs 1;
    ~*puppeteer 1;
    ~*playwright 1;
    ~*selenium 1;
    ~*electron 1;
    ~*python-requests 1;
    ~*python-httpx 1;
    ~*aiohttp 1;
    ~*go-http-client 1;
    ~*okhttp 1;
    ~*(^|\s)curl/ 1;
    ~*wget/ 1;
}

server {
    listen 8080 default_server;
    server_name _;

    # Use Google DNS for dynamic upstream resolution (prevents startup crash when domain not yet in DNS)
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Root directory for serving files
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (server-level; re-included in locations below that
    # declare their own add_header, since add_header does not merge across
    # levels — see security-headers.conf).
    include /etc/nginx/security-headers.conf;

    # Compression - serve pre-compressed gzip files from Vite build when available
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_static on;

    # Vite-fingerprinted assets — filename changes on every build, safe to cache forever
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Stable-named static assets from /public (favicon.svg, logo.svg, og-image.png, fonts)
    # Short TTL so redeploys propagate within a week; revalidation allowed.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1w;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/security-headers.conf;
    }

    # Disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        include /etc/nginx/security-headers.conf;
    }

    # Named location for bot SEO proxy
    location @seo_proxy {
        set $seo_backend https://api.anyplot.ai;
        proxy_pass $seo_backend/seo-proxy$request_uri;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        # api.anyplot.ai serves a 4-deep Let's Encrypt chain (leaf -> YE1 ->
        # ISRG Root YE cross-sign -> ISRG Root X2); nginx's default verify
        # depth of 1 rejected it (SSL error 20) and every crawler got a 502.
        proxy_ssl_verify_depth 4;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    }

    # Serve robots.txt directly (must not go through bot proxy)
    location = /robots.txt {
        try_files $uri =404;
    }

    # Serve llms.txt directly — its consumers ARE bots, so without this exact
    # match a mapped crawler UA would be proxied to /seo-proxy/llms.txt (404)
    # instead of getting the file.
    location = /llms.txt {
        try_files $uri =404;
    }

    # SPA routing - serve index.html for all routes
    # Social media bots get redirected to backend for proper og:tags
    location / {
        # Redirect bots to SEO proxy via error_page trick (nginx-safe pattern)
        error_page 418 = @seo_proxy;
        if ($is_bot) {
            return 418;
        }
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint for Cloud Run
    location /_health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Proxy sitemap.xml to backend API (dynamic generation)
    location = /sitemap.xml {
        set $sitemap_backend https://api.anyplot.ai;
        proxy_pass $sitemap_backend/sitemap.xml;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
    }

    # Plausible Analytics Proxy (bypass ad blockers)
    location = /js/script.js {
        proxy_pass https://plausible.io/js/pa-VsZKkJS49nA8_SUzShW2z.js;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_buffering on;
    }

    location = /api/event {
        # Analytics shield: crawler and headless/automation UAs never reach
        # Plausible — they inflated visitors ~40% and broke trend lines
        # (audit 2026-07-08 High#7). 202 mirrors Plausible's accepted
        # response so clients don't retry.
        if ($is_bot) { return 202; }
        if ($is_headless_client) { return 202; }
        proxy_pass https://plausible.io/api/event;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

# python.anyplot.ai — language-filtered marketing subdomain.
#
# Strategy: serve identical content to anyplot.ai. The canonical tag always
# points back to the main-domain hub (anyplot.ai/{spec_id}) so Google
# consolidates link equity on a single URL while the subdomain stays available
# for marketing campaigns.
#
# Bot path (SEO crawlers): nginx proxies the hub to /seo-proxy/{spec} (no
# language segment — the language-filtered hub is /{spec}?language=python on
# the main domain, with the same canonical as the unfiltered hub). Library
# detail URLs keep the /python segment because those are content-unique.
#
# Human path: serves index.html for any spec route. The SPA may detect
# `window.location.hostname === 'python.anyplot.ai'` and append
# `?language=python` on spec routes so the grid renders filtered without
# changing the canonical.
server {
    listen 8080;
    server_name python.anyplot.ai;

    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (same include-per-add_header-location rule as the
    # main server block above).
    include /etc/nginx/security-headers.conf;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    gzip_static on;

    # Vite-fingerprinted assets — filename changes on every build, safe to cache forever
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Stable-named static assets from /public (favicon.svg, logo.svg, og-image.png, fonts)
    # Short TTL so redeploys propagate within a week; revalidation allowed.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1w;
        add_header Cache-Control "public, max-age=604800";
        include /etc/nginx/security-headers.conf;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        include /etc/nginx/security-headers.conf;
    }

    # Bot SEO proxy — proxy to backend.
    # /scatter-basic              -> /seo-proxy/scatter-basic            (hub, no language segment)
    # /scatter-basic/matplotlib   -> /seo-proxy/scatter-basic/python/matplotlib (detail, language in path)
    location @seo_proxy_python {
        set $seo_backend https://api.anyplot.ai;
        proxy_pass $seo_backend$python_seo_uri;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
        proxy_ssl_verify on;
        # Same 4-deep chain as @seo_proxy above — default depth 1 breaks it.
        proxy_ssl_verify_depth 4;
        proxy_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # Unlike the main server block this is not strictly required (this block's
    # `location /` fallback has no bot proxy and the spec-route regexes don't
    # match dotted paths) — kept as an explicit exact match so llms.txt serving
    # stays guaranteed even if a bot catch-all is added here later.
    location = /llms.txt {
        try_files $uri =404;
    }

    # Reserved/static frontend routes are served directly without rewrite
    location ~ ^/(plots|specs|libraries|palette|about|legal|mcp|stats|debug)(/|$) {
        try_files $uri $uri/ /index.html;
    }

    # /:specId -> hub on main domain (no language segment; canonical is /{spec_id})
    location ~ "^/(?<spec_id>[A-Za-z0-9][A-Za-z0-9-]*)/?$" {
        set $python_seo_uri /seo-proxy/$spec_id;
        error_page 418 = @seo_proxy_python;
        if ($is_bot) { return 418; }
        try_files /index.html =404;
    }

    # /:specId/:library -> detail on main domain (language stays in path)
    location ~ "^/(?<spec_id>[A-Za-z0-9][A-Za-z0-9-]*)/(?<library>[A-Za-z0-9][A-Za-z0-9-]*)/?$" {
        set $python_seo_uri /seo-proxy/$spec_id/python/$library;
        error_page 418 = @seo_proxy_python;
        if ($is_bot) { return 418; }
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /_health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location = /sitemap.xml {
        set $sitemap_backend https://api.anyplot.ai;
        proxy_pass $sitemap_backend/sitemap.xml;
        proxy_set_header Host api.anyplot.ai;
        proxy_ssl_server_name on;
    }

    location = /js/script.js {
        proxy_pass https://plausible.io/js/pa-VsZKkJS49nA8_SUzShW2z.js;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_buffering on;
    }

    location = /api/event {
        # Analytics shield: crawler and headless/automation UAs never reach
        # Plausible — they inflated visitors ~40% and broke trend lines
        # (audit 2026-07-08 High#7). 202 mirrors Plausible's accepted
        # response so clients don't retry.
        if ($is_bot) { return 202; }
        if ($is_headless_client) { return 202; }
        proxy_pass https://plausible.io/api/event;
        proxy_set_header Host plausible.io;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
